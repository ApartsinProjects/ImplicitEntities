collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Janet, why don't you start with where and when you were born?
- speaker: Respondent
  text: Okay. The very first thing I'm going to say is I love that you almost said "Choral" History Project. That's so lovely.
    I was born in Brooklyn, New York - Brooklyn being the largest borough geographically and population-wise, and being a
    huge center of populations from all over the world. That definitely had an impact on how I viewed life was that everyone
    spoke many languages, particularly everyone's grandparents, and every place smelled like a different kind of food. That
    definitely influenced my life. That was in the mid-50s and it was generally a working-class, middle-class neighborhood,
    mostly Italian and Irish, which means that my best friends were Catholic, or "Cat'lic," as you say in Brooklyn.
- speaker: Interviewer
  text: Why don't you just talk a little bit about your family, perhaps where they were from and just the various experiences
    that you had in your childhood?
- speaker: Respondent
  text: Well, there were a lot. Because both of my parents were teachers - my dad being a professor of physics at Cooper Union,
    a small private school funded by Peter Cooper to allow someone of any wealth or lack of wealth to get a good education.
    All you needed to do was to have ability. Of course, that's frequently associated with class if you had the opportunity
    to develop ability. But it allowed many working-class kids to get a higher education. My mom was an early childhood educator
    - music, movement and creative drama - and was a renegade. She was definitely an iconoclast. She broadcast many ways of
    teaching, which reminded teachers that the restriction of a lesson plan on a three-year-old was probably irrelevant. If
    you didn't already know a whole lot more than that child, maybe you shouldn't be teaching. The gist of some of her thoughts
    were, whatever they are juiced by, go with that. Teach them something about what they're excited about, what they're doing
    already. And use movement and song and make up stories about it. She wrote a lot of books and articles. She was either
    adored or vilified for that role of iconoclast. As I have described both of my parents' work, I will inform you that it's
    definitely informed me of how it is that I am in the world, which is to empower those who may not have access to resources,
    and to encourage people to be creative in what they do. And that both parents were teachers, and they were both in private
    schools, allowed us to have very long summers because in New York City, private schools closed earlier in the spring than
    public schools and started later in the fall than public schools. Which means our parents took my brother and I - I have
    a brother six years older than myself, Jody - we would get out of school early in June and we would all pile into a car
    - the car my parents had, some used car - and go somewhere in the country for 10 weeks. That would part of the trip along
    the way. We'd usually land somewhere where my dad would teach a course or take a course. We would stay there for a while
    and then wended our way back. So, we got to see a lot of the country, and we got to feel very comfortable in small spaces.
    It was lovely.
- speaker: Interviewer
  text: Also it's my understanding that you had a lot of people who were in the music field around your house. Maybe you can
    talk a little bit about that.
- speaker: Respondent
  text: 'Sure. I should say that that aforementioned brother, Jody Stecher, is quite a renowned musician, and started at age
    10 or 11 with an old Martin guitar that my mom had. He had a teacher for about four lessons and then outstripped her.
    [laughing] A combination of native talent, a great ear. By the time he was 16, he was playing mandolin with the Greenbrier
    Boys. In the 60s, they were the most well-known pop version - my apologies, Greenbrier Boys were quite authentic - but
    they were the most popular on the radio in the whole country. There were local folks in the South who were on local radio
    stations who were certainly better known. Jody started winning mandolin contests as a very early teenager, and was asked
    to sub with the Greenbrier Boys when he was 16. That was the year we went to Colorado, and that was the first year that
    my parents and I traveled without my brother. That was hard. I was 10. Music. My mom''s sister, Greta, and my mom were
    both big fans of folk music. In their libraries, which we came across as teenagers and in our own elderhood when we went
    through our parents'' belongings after they died, there was every issue of Sing Out!, and the predecessors, all of the
    people''s song - they didn''t call it a booklet but leaflet or flier - made out to them with their maiden names and at
    their birth address. So I know it was really early. Because of this interest in the music of the people''s movements for
    justice, they also hung out with the people who made the music. I was about, I want to say, 45 when I was in Washington,
    D.C. for one of the great labor arts exchanges - this is an annual celebration of labor culture that took place then at
    the George Meany Center, which became the National College - and Pete Seeger was there - he would come occasionally -
    and we were sitting around just gabbing and he said, "You know, your Aunt Greta was a Weaver, right?" This is my mother''s
    younger sister, seven years younger than my mother. It''s like "What?" "Yeah, Greta Brodie and Jackie Alper and Ronnie
    Gilbert were the three women in the Weavers that matched our three guys. We had a couple of rehearsals, because we were
    preparing to do some rally or something, and we sounded great. We made a date for the next rehearsal and Greta and Jackie
    said, ''Again?'' And that''s why they didn''t last." As we know, the Weavers are quite accomplished because they practiced.
    Greta and Jackie didn''t stick it out as performers, but they certainly stuck it out in the movement. Ronnie and my aunt,
    Greta, were friends for many, many years. Knowing Ronnie''s history is not on point here, but she would end up leaving
    the country, going to Canada. By the time she returned to the States to start her solo career and her career with Holly
    Near, my aunt had already died. She had died quite young of various strange diseases. She''s a textbook case, actually.
    She''s written up in all sorts of stuff. Another sort of sad story, but I will say now - because it''s significant in
    my evolution - that my aunt''s death in her forties allowed my mother to move to be a little wilder middle-aged woman.
    My aunt, Greta, was the kind of woman who traveled around the world by herself in the 50s and 60s, drove a convertible,
    didn''t wear a bra; was definitely out there leading - it wasn''t called women''s liberation, it was human liberation.
    She was being her full self. I think my mom was more of a conservative parent when her sister was possibly a wilder influence.
    But after her sister died, my mother let her hair grow down to her waist - my mom had long, long silver hair most of my
    life - and was much more willing to embrace the fullness of what''s a good life. I don''t know if she would have done
    that if her sister had survived. It was interesting. So, yes, music around the house. Records. Singing. My mom used to
    sing us into the kitchen. [singing] "Dinner! It''s dinner! Time to set the table." Of course, we''d answer: "No, Mom.
    No, Mom. I''m still watching TV." We''d turn everything into some kind of commercial because those were the phrases that
    you were accustomed to that were that short, little jingle. But her profession, her proclivity for developing our expressions,
    just her plain old preference for having a life that was animated made a very musical life. Jody played a gazillion instruments.
    They were all over the house. I had piano lessons, which I didn''t like. But my mom - smart mom, very smart mom in many
    ways - in this case was aware that I loved to sing, so she asked my piano teacher to stop giving me classical stuff and
    just give me songs. So I learned how to play and sing at the same time. That was a very significant skill of how to hold
    counterpoint and harmony in my brain simultaneously.'
- speaker: Interviewer
  text: Talk a little bit about your dad.
- speaker: Respondent
  text: Milton Stecher. My dad came from a fairly Jewish family, but very early on it made no sense to him. He didn't consider
    himself to have any religion whatsoever. He did, however, bring in the argumentative nature of the Jewish style of learning.
    I don't know if our listeners would know this. There is a very significant presence in any Jewish cultural house that
    grew up near anyone who studied religious law and lore. Because the manner in which religious Jews study the Torah and
    all of the other books is to argue each other out of it. The manner in which a [hedderbacher? Yiddish term] - the [hedder?]
    means room, the place where Jews study in the village, [bacher?] just means boy, the schoolboy, the student studies as
    they sit across a bench. You take a premise out of the Torah and you argue what's wrong with it. The religious Jews are
    so confident that they believe it is absolutely unarguable, and they will prove it to the student by having them argue
    themselves out of their argument. That is how religious Jews are taught. But the nature of arguing, that goes into everything.
    You don't have to be studying Judaism to really argue. The point is to arrive at the most accurate assessment of phenomena.
    That is a lofty goal and a lofty engagement. And if you grow up accustomed to it, it's fun. Some people wrestle. It's
    that, it's intellectual wrestling, and the engagement of engaging those muscles of analysis is enjoyable. You eventually
    get pinned or or you get tickled, but it's intellectual. So my dad brought that to our household quite certainly, and
    both my brother and I can argue with the best. He certainly developed my sense of all analysis and math. I'm now a bookkeeper.
    I was an office manager. I'm very much at ease with concepts. Both my parents would take the train into Manhattan, come
    home tired, slog back from the subway and take a nap. Sometimes one of them got home earlier than the other, but in any
    case, someone would lie down and take a nap. Of course, when your parents came home, you wanted them to pay attention,
    you wanted to get attention, so the way that my dad handled this was he would say, "Okay, draw your letters on my back."
    He would be lying on his stomach and I would be sitting on his tush. I would draw letters and he would say, "What does
    that spell?" Then we started in on math concepts. We're talking about three years old here. "Draw pi, cut it in half.
    How many pieces do you have? Cut that in half." So, with this geometry, I learned algebra before I was four or five, the
    basic concepts of half of what is what? So, a great influence, again, the father analysis. He might have been called a
    survivalist nowadays. He had no conservative values - he did not own any guns - but he believed that one should not be
    dependent upon, for him, capitalism to meet your needs. You should not be dependent upon a market. The market was out
    to get you. One should not be dependent upon the commercials that told you what your needs were. He needed - he was a
    child of the Depression - he needed to know how to do everything. So, he learned to bake, he learned to upholster, he
    made clothes, he made furniture, he made a stereo, he made instruments, he designed furniture as well as making it. He
    designed mosaics, he could do and fixed his own car with a stethoscope. He would go downstairs with a stethoscope and
    listen to every part of the car and figure it out. He also had remarkable - I don't know, it's a woo-woo component that
    I actually don't believe in, but I have the experience of my father. Whenever he found that a part was broken or needed
    replacement, he would walk around the neighborhood, poking through people's garbage, and find the old discarded appliances
    in the alleyways and the streets between houses, take it apart, find the part he needed, bring it home and install it.
    And, of course, it would work again.
