source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: So what was your life story prior to joining the Rainbow Coalition? Did you grow up in Washington state, or did you
    move here and things like that.
- speaker: Respondent
  text: I was born in a little town called Long Prairie in Minnesota, moved to Colorado when I was six, lived a couple years
    in Denver, and then four or five years in Boulder, then we moved to Paris, Texas, where I went to high school and then
    college in a nearby town. Then I joined the Army in 1968 foolishly, in retrospect, put two years in, spending most of
    that time trying to get out because they wanted me to go to Vietnam, and I was not planning on going to Vietnam, one part
    of my plan. On my third set of orders to Vietnam, they shipped me out here to Fort Lewis on my way to Vietnam, and I fell
    in love with this place. I'd filed as a conscientious objector. I was never officially recognized as one, but they could
    not ship me to a war zone while the application was pending, so I basically ran the clock and was discharged in the spring
    of 1970. By that time, I had really--this was home. Seattle was home by that point, so I went back to Paris, gathered
    up my belongings, and we relocated out here, and I've been here since.
- speaker: Interviewer
  text: Were you involved in electoral politics prior to the Jesse Jackson campaign?
- speaker: Respondent
  text: Not so much. I was peripheral. I did some mailing for Eugene McCarthy and but mostly my political activity was more
    direct action and more international solidarity through the--well, in the 70's, it was anti-Vietnam War and pro-Vietnam
    and... Yeah, into the end of the time after that there was South Africa support, Central America support, both Nicaragua
    and El Salvador. So not so much electoral politics. I mean, I would, you know, I wasn't opposed to it, but it just was
    not my world.
- speaker: Interviewer
  text: And when did you join the Rainbow Coalition? And what was the Rainbow doing at the time that made you want to join?
- speaker: Respondent
  text: 'Well, it was pre-Rainbow, actually, it was during the first Jackson campaign. And I was in the--Jesse''s platform
    really matched mine, not that I had a platform. But what he stood for is the things that I''d been standing for and fighting
    for for a while, and the thought of having somebody on the national scene that really represented a real progressive agenda
    intrigued me. I was involved with the labor movement at the time, and we formed a Labor for Jackson committee locally,
    and got to know the players: Ellie Menzies and Charles Rolland, you may have heard those names in the history. And you
    know, I have not found the documents in my archives that tell me just when in that path the Rainbow Coalition actually
    formed, but it was not right then. But I have on every clear memory of being at the Democratic Party convention down in
    Olympia and discovering people from all over the state that were Jackson supporters. And I think--I''m not sure if the
    national Rainbow was on the scene yet or not, folks with better memories can fill that blank in. But we knew at that point
    that there was some national--there was some statewide thing that needed to happen, you know? And whenever it happened,
    I know I was involved from the beginning. I was one of the founding members of Rainbow. We had our founding convention
    down at the Evergreen State College. And it was quite the deal. And we had governors and legislatures come speak to us,
    so we were on the radar from the very beginning. I mean, Jackson had put us all on the agenda, so that made that easy,
    you know. And then we formed either district or county chapters, and I was co chair of the Martin Luther King County Chapter.
    We weren''t the Martin Luther King County at that point. We were in the Rufus somebody, slave owner King County. We changed
    that. From the beginning I was involved with the Rainbow, yeah.'
- speaker: Interviewer
  text: And apart from being a founding member, what role did you play in the Washington State Rainbow Coalition, and what
    were the activities while you were involved?
- speaker: Respondent
  text: 'I know we were involved in anti-war stuff. By this point it was the Gulf War. We were--the Rainbow was a pretty viable
    part of a pretty big anti-war coalition here in town [Seattle] that worked for quite a while. I know there were people
    who we got elected or tried to get elected, I couldn''t think--well, there were, let''s see: Bob Hasegawa, Velma Veloria,
    Jesse Wineberry were state reps. We supported some, in retrospect, maybe some dubious folks like Patty Murray and Mike
    Lowry for governor. Mike was actually a stalwart from long before he was governor, you know, so he was our guy. There
    was sort of falling out that happened toward the end that we can get to chronologically, but he was accused of some sexual
    harassment, and we felt obligated to look into it. Oh, one of the big campaigns was--I don''t know if you heard of a guy
    named Brock Adams. He was a US senator, and he had this thing about drugging women and it started coming out in a big
    way. And the Rainbow and the National Organization of Women, I would say, were the critical players in bringing him down.
    We were just not going to allow this pedophile, this whatever he was to remain in office. It just wasn''t going to happen.
    And it was not too long after that, I''d say probably within a year, that this stuff with Mike Lowry came out, and we
    just felt like we had to do something. So we launched an investigation. We used the same person that had conducted an
    independent investigation, and they cleared him. She was Mary Alice Theiler, who''s now a federal judge, she was part
    of the Rainbow, she conducted the investigation. But Mike never really forgave us for even challenging him, which was
    sad, because, you know, we knew two things: we knew we had to do this investigation, and we knew how it was going to turn
    out, it was going to clear him. But yeah, I think every time I saw him after that, he would bring it up, which was a bummer,
    and then he died. Alright, that was a little jumping around, sorry.'
- speaker: Interviewer
  text: No, you're good. So how was the Washington State Rainbow Coalition structured? Can you talk a little about how decisions
    were made, or new members or new chapters form?
- speaker: Respondent
  text: Well, we were a state organization. We had--I think every county in the state had a chapter. Some of them were bigger
    than others, King County was--well, I'd say King County, Pierce County, Whatcom County were the biggest chapters. We had
    a state Steering Committee, which was made up of elected delegates from the various chapters. And then there were state
    officers. I think there might have been co-chairs, and whoever that you know, treasurer, secretary, you know, the primary
    officers who would make decisions between meetings, and the steering committee met regularly in various parts of the state.
    We always tried to go to different chapters every time, just so we were respecting each of the chapters. And that's where
    policy got made and decisions got made, and officers were elected, you know. So it was a pretty democratic organization,
    because there was accountability at all levels, from the top to bottom. It wasn't like a pretend kind of a thing.
- speaker: Interviewer
  text: All right. And what communities did the Rainbow organize in, such as, like the demographic--oh, and also the demographics
    of the Washington State Rainbow. And how did the Rainbow approach race, gender, and sexuality, and how does that impact
    the organizing of the Rainbow?
- speaker: Respondent
  text: Well, we were an anti-racist, anti-sexist, anti-misogynist, pro-LGBTQ, anti-war. We did a lot of support work in the
    farmworkers community. Actually, that was another campaign that we were pretty critically involved in, both east of the
    [Cascade] mountains and over here, the Rainbow was an important player in the Chateau Ste. Michelle winery campaign, where
    the United Farm Workers ultimately got a contract. And there was a lot of drama in that, but we were pretty staunch supporters
    of the farmworkers. So I'd say, you know, that that's where we did our work. So that's where we placed ourselves, so those
    were the communities we were known in, you know. We were also, you know, we were viewed in some circles and by some people
    as the conscience of the Democratic Party, or the junior partners in the Democratic Party, so we played in that arena.
    I'd say, for a few years running the state Democratic Party chapter, the party, their platform was the Rainbow platform.
    We had folks that did a lot of work on platform stuff, and then we organized within the various chapters, and we took
    our positions to the state and, you know, we were able to influence, influence at least in words, at least the words of
    the party. And at the national level too, I mean, we had delegates, Jackson delegates, and then Democratic Party delegates
    who had to carry the Jackson message to the national party and had an impact. I mean, not just the state Rainbow, because
    it was a national organization, right? We had people in from around the country, so we were able to impact the words of
    the national Democratic Party. I won't say we impacted, actually, the policy that much.
- speaker: Interviewer
  text: What would you consider to be some of the coalition achievements? And do you think that nationally and in Washington
    state, Rainbow had a long term impact on yourself and on electoral politics?
- speaker: Respondent
  text: 'I have not been much involved in electoral politics since then. I mean the impact--the Rainbow ended basically because
    we got squished by the Democratic Leadership Council of the Democratic Party. Bill Clinton did not want to see a progressive
    wing of the party, and they iced us out of a whole lot of stuff. Charles Rolland, who was one of the founders of the Rainbow,
    was the state Democratic Party chair at the time. I mean that''s kind of how deep our reach was in the state and the party.
    You know, we had Rainbow folks right up to the top. I don''t remember the date, but it was right toward the end of the
    Rainbow, and there were other things that were going on too, but Charles was--there was a big party meeting at the Westin,
    Clinton was there, and a bunch of other people, and Charles was summarily removed as chair of the party. And it was just,
    you know--a number of us quit the party at that point, just like, look, all this work is just--you guys just, just demolished
    everything we''ve been doing, you know. And I mean, some of us--I''m going to digress a little bit here, maybe. There
    were what I characterized as three wings of the Rainbow: There was the there was the wing that did see us as the conscience
    of the Democratic Party, and de facto a junior member of the party, but strategically in the party. There were folks that
    saw being part of the Democratic Party as a tactical decision to form links with people, identify progressives within
    the party, and ultimately start building a new party that really would represent people. And then there was another wing
    that couldn''t give a shit less about electoral politics. They were all about direct action and just being in the street.
    And those three wings worked pretty well together for a while. You know, we were able to have it like an inside-outside
    strategy. We understood, this is my role, that''s your role, we''re not going to argue about whether my role is better
    than your role or not, until it didn''t work. [laughs] Yeah, so I''m not sure why I engaged in that digression, there
    was a reason I did that. I can''t remember what it was. I''ll finish that story just because it ties in with the demise
    of the rainbow, it''s when the contradictions became to the point where just it was not working. This actually, I think,
    ties into a question you had at some point about what the impact of Imogene Bowen leaving was. Two things happened pretty
    much at the same time: the investigation of Mike Lowry, and a resolution that was put forth to the state chapter calling
    for a task force to investigate the possibility of forming an independent party, worded quite that way so we weren''t
    calling for the formation of an independent party, but we wanted to put it on the agenda. That caused the folks whose
    alliance to the Democratic Party was strategic to basically say, "This is it, we can''t deal with this anymore. You''re
    attacking the Demo'
