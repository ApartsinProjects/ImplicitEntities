turns:
- speaker: Interviewer
  text: Alright. First of all, what race or ethnicity do you identify yourself with?
- speaker: Respondent
  text: African American.
- speaker: Interviewer
  text: Awesome, perfect. And what about gender or sex?
- speaker: Respondent
  text: I identify with she/her pronouns.
- speaker: Interviewer
  text: Awesome. Okay, so what was your life story prior to joining the Rainbow Coalition? Where were you born? Or did you
    grow up in Washington State? Or if you didn't, did you move here? If so, why?
- speaker: Respondent
  text: 'I was born in Chicago, Illinois, and was raised primarily by my father and then my grandmother. My father was a precinct
    captain, very involved in his neighborhood. He knew all of his community, and he helped get people out to vote on Election
    Day. In those days, people were allowed to take the day off to vote. My father would go around and pick up elderly people
    and people with limited access to get them to the polls. So I was raised around politics and actually got to see my father
    at work a lot as a child.


    When I got to be a teenager, I moved to California and went to high school and college there. I got married in California
    and moved to Minneapolis, and then from Minneapolis moved to Seattle. My former husband was very involved in local politics
    as a precinct officer, and I would go to legislative district meetings with him, sometimes getting involved in projects.


    As time progressed, I got very involved in the Ted Kennedy campaign and became a national delegate for him in the 1980s.
    In 1984, I didn''t do much politics, but in 1987 I got very involved and became a delegate for Jesse Jackson, ending up
    as a national delegate for him. I got very involved with the Rainbow in 1987 and 1988. After the Democratic National Convention,
    which was impressive by the Jackson people, we surpassed many goals and made the country take notice that people of color
    and people with limited access could make a political impact.


    The Jesse Jackson campaign registered seven million new voters, bringing everyone to the table. It truly was a rainbow
    of colors, representing every stripe from brown, yellow, red, black, white, LGBTQI, and people with limited access. It
    left an impression on me that this country and political process could be accessible to everyone, not just select white
    males. That enthusiasm kept me involved.


    I felt there was nothing better than being with my people. I have a picture of the Washington State Rainbow from around
    1988 or 1989, probably in Yakima, with about forty or fifty of us. Seeing that picture brought tears to my eyes because
    I thought, "There''s my tribe, there''s my people." I was really moved by the solidarity and connection I felt with the
    Rainbow Coalition.


    So that was a long story to answer your question, but that''s how I got there and how we got to the Rainbow.'
- speaker: Interviewer
  text: Awesome. Were you involved—well, you mentioned a little bit about your involvement in electoral politics prior to
    '87. What in particular motivated you to the national campaign? And then how did you end up in the Washington State?
- speaker: Respondent
  text: 'I have a habit that once I lock onto a project, I tend to take it on tooth and nail. For the Kennedy campaign, I
    started off organizing the 11th District Democrats for Kennedy. I got really good at it, did trainings, and then organized
    the 32nd or 36th district as well, doing two districts at once. They asked me to go to Arizona to organize Kennedy people,
    which was a great experience. Then they asked me to go to California, but I was getting my college degree and chose to
    stay for that instead.


    They asked if I was interested in becoming a national delegate, and I ran and was the first delegate selected. When you
    became a Kennedy delegate, Ted Kennedy would call you personally. I got to talk with him on the phone, and he knew a lot
    about me. It felt very special to have a one-on-one conversation with a US Senator about campaign strategy and community
    thoughts. I was supposed to meet him in person during a campaign event, but a work conflict prevented that.


    So I knew what it was like to be a national delegate. In 1988, when I ran for national delegate for Jackson, I had some
    experience and could focus on strategy without being distracted by the process. I didn''t have money to go to Atlanta,
    so I fundraised with community support. I think it''s important to have delegates who can''t afford it themselves so the
    community helps them participate. I''ve been a national delegate twice and probably wouldn''t do it again, but I''d help
    someone else if they were worthy.


    Did I answer your question?'
- speaker: Interviewer
  text: Yes, and then also your involvement with the Washington State Rainbow Coalition. How did you go from national to the
    Rainbow?
- speaker: Respondent
  text: 'Because of the connections, I got to know Larry Gossett pretty well. Larry was the chair of the Washington State
    Rainbow Coalition and asked me to come on board as secretary. You have to get elected in, but many people knew me and
    my ability to connect, so they elected me secretary. I had been secretary in other organizations, so it wasn''t hard.


    We traveled all over the state. Each chapter would host the state meeting every two months. We would get up early and
    drive to places like Yakima or Spokane, sometimes staying overnight. We also went to Native American reservations, Bellingham,
    Centralia, and more. The meetings were only held once or twice a year in Seattle, so it was wonderful to meet people from
    all over who were passionate about politics and the Rainbow.'
- speaker: Interviewer
  text: And so what year was it that you joined the Rainbow Coalition, and what also were the activities? Could you expand
    more on the activities that they were doing around the time that you joined, or that maybe influenced your decision to
    becoming secretary?
- speaker: Respondent
  text: 'I worked closely with Charles Rolland, the state campaign manager for Jesse Jackson in 1987 and 1988. I can''t tell
    you exactly when I joined the Rainbow Coalition because it kind of morphed into it, but I''d say ''87 or ''88 for sure.


    The activities included going around to different communities to hear their concerns and supporting strike efforts like
    the immigrant workers strike against grape farmers. We influenced state legislature politics, such as supporting Jesse
    Wineberry to be Minority Whip, marking the first time an outside organization influenced inside legislature politics.


    We worked hard on the charter to include everyone from every stripe, which wasn''t always easy because people came with
    their own ideas about what the Rainbow should look like. We attended community events, held conventions, and went to Democratic
    Party conventions around the state to promote the Rainbow.


    We also talked to the Green Party a lot and invited their candidates to talk to us to understand Green politics. The only
    group we never really reached out to was the Republican Party because we didn''t feel they were inclusive. Even today,
    I wouldn''t spend energy trying to engage the Republican Party, especially given their support for someone like Trump,
    which is not the type of people we''re interested in.'
- speaker: Interviewer
  text: Yeah. And can you talk a little bit more about how your specific position as secretary worked? Like, what did your
    day to day look like? And yeah.
- speaker: Respondent
  text: My job was not only to keep the minutes of the meetings but also to contact all the members to make sure they knew
    when and where meetings were going to occur and the logistics. I also advised Larry and other elected officials on positions
    they should take. I was always inside the small executive meetings we had. We had an attorney, Mary Alice Theiler, who
