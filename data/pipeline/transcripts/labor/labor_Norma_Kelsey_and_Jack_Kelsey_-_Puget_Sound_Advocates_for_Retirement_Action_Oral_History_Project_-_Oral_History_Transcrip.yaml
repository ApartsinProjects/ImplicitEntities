collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Great. To start out, I just wanted to get a little bit of background information on you and your family. So, where
    were you born?
- speaker: Respondent
  text: I was born in Independence, Kansas, which is a small town in the southeastern corner of Kansas by the Missouri and
    Oklahoma borders. My father had been born in that town also. My grandparents had come there in a covered wagon, so I have
    many relatives still there. But thank gawd, I'm not in Kansas anymore. [laughter]
- speaker: Interviewer
  text: Was it your parents who homesteaded in Kansas, assuming they homesteaded?
- speaker: Respondent
  text: Yeah, my grandparents did. That was in the 1800s, of course. My father was born in 1912, the youngest of eight children,
    seven boys and one girl - poor girl.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1935, so I'm 82 years old now. My son, Jack, who's with me, is 65 years old.
- speaker: Interviewer
  text: Where was your mother born?
- speaker: Respondent
  text: My mother was born in a small town that no longer exists in Indiana. The name of the town was Petroleum. It was right
    outside of South Bend, Indiana. I was one of nine children, one of whom died in infancy, so I grew up with a lot of brothers
    and sisters, which was not unusual back then.
- speaker: Interviewer
  text: What number were you in the order of children?
- speaker: Respondent
  text: I was next to the oldest. I have an older sister a year and a half older than I. I keep reminding her that she's the
    oldest, [laughter] what any good sister should do.
- speaker: Interviewer
  text: What did your parents do?
- speaker: Respondent
  text: My father was a painter and my mother was a housewife until World War I. My father was drafted into World War II into
    the Navy and he was on an aircraft carrier. The war was going so badly at that time. It was towards the end of the war,
    about two years before the war was over. He had four children and was married when he was drafted. He was 34 years old.
    There were so many young men who were killed in that war that they were desperate for people then. When my father was
    drafted, his older brother went along to try to join the Navy so he could take care of his little brother, but they wouldn't
    take him. [laughing] He had a bad heart, so my dad had to go it alone.
- speaker: Interviewer
  text: So, he was in the Pacific?
- speaker: Respondent
  text: Yes, in the Pacific on an aircraft carrier.
- speaker: Interviewer
  text: Wow. So, you were a very young girl then when your father was drafted.
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Where did you go to school?
- speaker: Respondent
  text: Through grade school, I went to school in Independence. After my dad got out of the Navy, we moved to Wichita so that
    my father could find more work. We lived in Wichita where I went to the intermediate school, which then was a seventh,
    eighth and ninth grade. I then went to high school in Wichita. When I was in the 11th grade, I discovered boys, and I
    quit school. I got married. [laughing]
- speaker: Interviewer
  text: Oh, my gosh!
- speaker: Respondent
  text: I was just 16 when I got married. Then I got this gift. Jack was born the following year. Jack has been a delight
    in my life. He has some developmentally disabled problems, but he is a great man and I love him dearly.
- speaker: Interviewer
  text: You were married at a very young age, so that was your husband. What is his name?
- speaker: Respondent
  text: That was my first husband. My first husband, I was married to for seven and a half years. We had two more children.
    By the time I was 20, I had three children. Unfortunately, my husband was one of those men who believed that he owned
    his wife and children, so he was very brutal to us - physically, mentally, emotionally and spiritually. Finally, when
    I got away from him for the last time, we escaped with our lives.
- speaker: Interviewer
  text: You're very brave, Norma.
- speaker: Respondent
  text: Then I went home to my parents with my children, and my mother took care of my children while I found work. A year
    after I was divorced, I met a wonderful man who is my current husband. His name is Robert Kelsey. A year after we got
    married, he adopted my three children, and then we had a son between us, and he had a son from his prior marriage who
    came to live with us. Later in our marriage, we were foster parents to two more boys, who were twins. Their parents and
    grandparents had all died. Their parents had been friends of ours, so the boys came to live with us when they were 12
    years old and we raised them through high school. So, we had a big family. We were living in Fair Oaks, California, right
    outside of Sacramento when we were raising our family. It was a great place to have children then. My children all speak
    with such glowing terms of growing up in Fair Oaks, and of their father, too. My husband started a Boy Scout troop for
    mentally retarded young men, including my son, and my husband was the scoutmaster for the troop. He took them to jamborees,
    he took them camping, and told them that there wasn't anything they couldn't do. He had them put up their own tents, had
    them build their bonfires, had them cook. He was also the president of Jack's PTA for Jack's special school. Jack has
    always known that he's a special young man, and that the teachers that taught him are all angels. For someone to teach
    children who find it difficult to learn, and to teach them the same thing every day, over and over and over, I can't believe
    how they can do that, but they did. They taught Jack to print his name. That's all he could learn in reading and writing,
    but 10 years of going over the same thing, printing symbols that have no meaning, these teachers are wonderful.
- speaker: Interviewer
  text: What an amazing story.
- speaker: Respondent
  text: It is, yeah.
- speaker: Interviewer
  text: He must have been a very special person.
- speaker: Respondent
  text: Oh, they were.
- speaker: Interviewer
  text: I'm just curious how you got out to California from Kansas.
- speaker: Respondent
  text: My parents had moved to California, and that is where I got my divorce from my first husband and where I met my second
    husband. My parents had moved there, so my first husband and I moved there, too, and my grandparents had moved out there
    to California. Everybody moved there to find better jobs.
- speaker: Interviewer
  text: Was that after the war?
- speaker: Respondent
  text: Yes, that was after the war. After the war, we had moved to Wichita, and then moved to California. Like so many working-class
    people, you have to move where there's jobs. It was difficult for us to leave Kansas because that's really where our roots
    were and where all of our relatives were. But that is what makes this country. Just because you're born someplace doesn't
    mean that you have to stay there. And just because you're born with one belief, that doesn't mean that you have to continue
    to believe that. You keep reading, you keep informing yourself, you keep meeting other people and keep open to new ideas
    and new people and new experiences. I'm really happy that I had the opportunity to expand my horizons from that small
    town in Kansas.
- speaker: Interviewer
  text: Do you feel that those kinds of opportunities to change and develop your beliefs is something unique to the United
    States, or do you think that's more universal, or Western?
- speaker: Respondent
  text: I think that it's unique to people who are searching for something. Some people really can't seem to - they're afraid
    to go beyond the perimeters that they are familiar with. But in this country, I think that we have an unusual country
    in that everyone who came here was seeking something, so I think there are more people in this country that are willing
    to reach out and to go different places and experience more things. However, that doesn't mean that everyone does that.
    Even though people came to this country, a lot of people then say, "I will never move again," and they stay in one place
    and they become very bound to all of the ideas that are around them. Especially when you live in a small town, you don't
    want to go against what is the common belief. Independence is a very conservative place now. When we went back for a family
    reunion maybe 20 years ago, my aunts and uncles and cousins and all - they're all teachers and farmers and all that, and
    many of them have traveled but always come back to Independence - are very afraid of change, so they're not open to having
    their ideas that they believed 100 years ago challenged. I was astounded to find that even 20 years ago, their ideas should
    have changed. And they're good. They go to church, they're good Christians, but they thought that the poor were poor because
    they didn't work hard enough, and because they were that kind of people. They thought that women should stay at home and
    not go out and work and challenge men. As the Bible said, which is what they say, a man is the head of the house and a
    woman is supposed to do as she's told by her husband. They believe that the races should not mix. They believe in the
    things that should have been dropped years ago.
- speaker: Interviewer
  text: Do you think if you had stayed there you would still be the person you are today?
- speaker: Respondent
  text: No, I don't think I would have been. I think that I would probably, like everyone else, be afraid to be the nail that
    stuck its head up that is pounded down. I would probably have gone on going to the churches that taught the things, like
    the televangelists teach. I'm so happy that somehow, my life ended up that I left that environment and was able to expand
    my horizons and my thinking, and to meet people who taught me, teachers along the way. People just like me who somebody
    had taught them. I found that especially in the labor movement, and then through the labor movement in social issue movements
    where people have learned a different way of being, and they're willing to teach others. And they're open and they're
    friendly. People in our movement are warm and loving, and they're funny. [laughter] They go out of their way. They'll
    carry your coat the extra mile. I'm just fortunate to be in a movement with the kind of people that are in this movement.
- speaker: Interviewer
  text: I'm thinking a little bit chronologically here. We don't necessarily have to do that, but I also want to bring that
    in. When you think back about your early life, you're saying that there were people who inspired you, and who taught you,
    and helped you to expand your ideas and your beliefs. Can you think back and identify who some of these people were? I'd
    also like to see if we could tie that into how you got drawn into the labor movement.
- speaker: Respondent
  text: One of the most important influences on my early life was being a member of the Salvation Army Church. My grandmother
    had been a Salvationist for many years, and there was a Salvation Army Church there in Independence. My father was going
    to be a Salvation Army officer and he went to their training school before he went into the Navy, but he couldn't stand
    the severe weather there. He got an abscessed lung and had to go home. Then he met my mother. After they got married and
    had four children, he went into the service. He did not pursue going back to being a Salvation Army officer. Through my
    teenage years, my sister and I, even in Wichita, Kansas, went to the Salvation Army Church. The Salvation Army teaches
    that you should give; that it is our role in life to help others, and that we are fortunate when we have enough that we
    can give. So, I learned early on that life isn't
