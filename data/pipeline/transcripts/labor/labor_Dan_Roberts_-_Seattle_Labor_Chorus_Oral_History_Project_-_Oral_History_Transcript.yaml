collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Respondent
  text: 'My father was raised up on the Mount Baker Highway in the tiny town of Kendall, Washington, which usually doesn''t
    show up on maps; a little turn in the road. His father owned the country store and gas pump. It was one of those classic
    country stores. It''s now been turned into a large convenience store, with a modern gas station and a Subway restaurant
    in back. But definitely, country. My mother, on the other hand, was raised in the middle of Manhattan Island. So I always
    say I have country cred and city cred.


    My father was half-German and half-Welsh. His father''s father had migrated from Wales from a town that it hurts to try
    to pronounce, on the island of Anglesey up there in the northwest close to Wales.


    My mother''s father immigrated from eastern Romania when he was about six or seven years old. There was a pogrom going
    on and the policemen were running around shooting Jews. My grandfather''s oldest brother got in with group of young Jewish
    men who reversed the situation, went around shooting police. A number of families found it advisable to leave town quickly.
    They walked across Europe from Romania to Hamburg. Apparently they all took a bath in a Rothschild''s swimming pool somewhere
    in Germany. [laughing]


    I don''t know much about my paternal grandmother. She was German. She died before I was born. My maternal grandmother,
    her parents had immigrated from southern Poland.


    My dad grew up in the country; went to high school at Mount Baker High School in Deming; started at the University of
    Washington, and then the war broke out and he shipped out in the Merchant Marine. That''s how he spent the war was traveling
    around on cargo ships.


    He was the union representative on his ship, and at one point, some of the crew folks came up to him and said, "The officers
    get their pie in round tins and we get ours in these big square sheets. We want our pies in the round tins." So my father,
    sort of embarrassed, went up to the captain [laughing] and presented this issue, and somehow talked the captain into doing
    it that way. After that, everybody got their pies the same way.


    My mom went through the Ethical Culture schools in New York City, elementary through high school. That was a very strong
    influence on her later life. Then she went off to Antioch College which, at the time was about as far left as you could
    go in terms of a college. Apparently the big political division was between the Stalinists and the Trotskyites.


    Then she met this physicist, Jack, and they got married. They moved out so he could do his graduate work at UC-Berkeley.
    That''s how she got to the Bay Area. My dad got to the Bay Area because his oldest brother lived there. Four out of the
    six siblings ended up in the Bay Area.


    My parents met through their political associations and moved to Marin County, the suburbs to the north across the Golden
    Gate Bridge. I spent my childhood in Marin County, an extremely bourgeois kind of place. It was the second-richest county
    per capita in the country. We were kind of like middle class there. Anywhere else we would have been halfway comfortable.
    But because we didn''t have a large house and a swimming pool, we weren''t quite up there.


    I went to a progressive private school, Marin Country Day School, for second through sixth grade. It was very academically
    wonderful. Socially, it was not a very good thing for me. I had some outsider feelings. I don''t know whether it was partially
    because of my parents'' politics, and also because my father at the time was a practicing alcoholic. Years later, doing
    several years of Adult Children of Alcoholics work, I learned about the shame-based family, so I think there was something
    of that going on.


    The other piece of it was that the thing that I was best at was music, and the music teacher there basically played favorites
    with the kids from richer families. So I was not acknowledged for what I was good at. So it was very hard. I know people
    have had really crappy childhoods compared to mine, but looking at it, it was not a whole bunch of fun.


    There were good things. We did a lot of skiing. The family did a little bit of travel. And I was an only child, and parents
    made the decision that basically, I was just included. The only thing I didn''t go to were some of their political meetings.
    But I got to see all of the great British comedies - early Peter Sellers, Alec Guinness, all that stuff, and some of the
    art movies and stuff. When my parents went to them, I just went with them.'
- speaker: Interviewer
  text: What kind of values do you think that they passed on to you?
- speaker: Respondent
  text: 'People used to ask me what church I grew up in and I never could say. Southern atheist was the best one I could come
    up with. That was something that a friend of mine in the Tri-Cities turned me on to. Until one day, this Methodist minister,
    who actually fired me from being a choir director at Pasco First Methodist Church - which was a good thing; then I had
    my weekends back - he did a guest shot at the local Unitarian Church. That''s where I went after, went once a month to
    that, just because I was used to going to church. [laughing]


    He had just read a book about how Marxism really was a religion. It had martyrs, it had saints, it had hymns, it had a
    liturgy, it had a moral code, it had everything. It had the hierarchy. So that kind of gave me my religious upbringing,
    in the church of Marx and Lenin.


    It''s interesting, and I know Mom didn''t say anything about the fact of her Party affiliations. That''s how Mom and Dad
    met was through the Party. I think that people of her generation are still carrying the scars of the McCarthy period.
    I remember, when we got back from Europe after my parents split up, my mom told me, she said, "Probably you should never
    tell anybody except maybe the woman you''re going to marry that you''re a red diaper baby." Well, I married one. Sally
    is a red diaper baby, too. [laughing] Found that out the night I met her.


    But it''s an interesting difference because there''s been that much change, although it will be interesting to see whether
    if Bernie [Sanders] is the nominee if they''re going to do all the socialist crap at him. I think him more as kind of
    an advanced New Deal Democrat myself, because politics have been pushed so far to the right in the media.


    Anyway, I''m wandering.'
- speaker: Interviewer
  text: Anything more about your mom or dad?
- speaker: Respondent
  text: 'My dad stopped drinking when I was about 15 and began a spiritual quest. He went through AA. He had been nervous
    about the AA thing because he really wasn''t a religious person. His religion had been - and that was the god that failed
    - they left the Party after Hungary. Even though at the time, I remember them justifying Hungary by saying, "It was really
    all the old Fascists that were coming to take back over, the [Mikl6s] Horthy people. That''s why the Russians came in."


    He started doing lots of psychotherapy. He did all the kind of New Age stuff - he got Rolfed, he did past lives. He referred
    to himself as a self-improvement junkie. I did a lot of those things with him. I did scream therapy with him. We did some
    drugs together, went on backpacking trips and dropped acid and things like that.


    My dad and I were as much friends as we were parent and child. One time he was trying to convince me that I should just
    call him "Doug," and I said, "Sorry. I''ve been calling you dad too long, and you are my father, so we can still be friends."
    [laughing] It worked out. He died New Year''s Day 2006, up here. He''d been diagnosed with terminal lung cancer and he
    supposedly had six to eight months to live. He had been living in Sedona, Arizona, where he could indulge his New Age
    stuff to the full. [laughing] But we decided as a family that he should be up here, and that I should keep an eye on him
    through that time. He came up here in December and lasted about two weeks; came down with pneumonia and died.


    As you know, my mom''s still around, although she''s getting pretty vague. That interview, when I finally listened to
    it, I was aghast at how - I mean, I knew her short-term memory was messed up, but her long-term memory, there were all
    kinds of things that were just really confused or wrong. I wanted to get in touch with you and go back and correct it
    all. But it''s what she remembers.'
- speaker: Interviewer
  text: It's fine. Why don't you talk about your going to Europe. Were you 13?
- speaker: Respondent
  text: 'Thirteen and 14, yeah. My dad left and there was going to be a divorce. And it was a pretty nasty divorce, mostly
    about money. Basically, my mom exacted a pretty heavy price out of him to do the divorce, which meant that she had a piece
    of commercial property in Marin County that had maybe more than three good things - location, location, and location.
    It was about 500 yards from the main entrance to the main entrance to one of the two richest developments in Marin County.
    She''s still getting money off the mortgage off of that, and some child support.


    She''d always wanted to go to Europe. Her lawyer said, "You''re the marrying kind. I think you should get out of town
    for a while." One of the possibilities for her marrying was a guy who was actually gay, which was her department chair
    at the college she was teaching at, and it would have been basically a marriage of convenience. It would have been hanging
    out with old San Francisco, though.


    So, we went. Mom got in touch with Cambridge University and said she''d like to come and attend a few classes and stuff.
    They wrote her back this really warm "Dear colleague" letter. She was teaching at this little Catholic - well, it''s now
    Dominican University over in San Rafael, it used to be Dominican College. It was not exactly Harvard or anything, but
    they were just really sweet. So we ended up living for three months in Cambridge. That was like September through end
    of December.


    I was going to an English school, and during that time, first Dean Atcheson referred to Britain as a second-rate power.
    A British newsman was killed in Oxford, Mississippi, in the riots there. And, to top it all off, they had the Cuban missile
    crisis. [laughing] And there were NATO SAC bases like 20 miles north and 30 miles east of Cambridge. So, we knew we were
    in the crosshairs.


    The day when our ships were getting close to their ships, my last class was science, and the science teacher just lit
    into me. "You Americans run the world!" I said, "Hey, I can''t even vote! I want everybody to get along." And I remember
    leaving the campus, one of my English friends said to me, "See you tomorrow, Roberts, if there is one." I was like, oh,
    crap.


    But it was an amazing experience. I found out later like all the Monty Python folks, they were all at Cambridge at that
    time. They were doing funny little things there. It was an amazing place.


    The rest of the time we traveled. Shortly after we got to Europe - we were in Copenhagen - my mom got a telegram from
    her mother that her father had died. My mother was very much a daddy''s girl. As a matter of fact, her mom was pretty
    distant. That''s a whole other story we can get into.


    So, my grandmother came over, I think, in March, and we did this two-week cruise on the Mediterranean that was, again,
    a whole other story in itself. It was ship of fools. And we traveled around Italy, and then up through France and into
    England. I think that''s where we sent Grandma home. Then we went up to Scotland and back down and caught the SS France
    back home.


    Aside from summer school when I got home, the only school I had that year was the school in England. Then again, I was
    traveling in Europe with a college history teacher, so I think I learned a fair amount. Also she put me in charge of the
    money, so that was my math education. I learned how to do lire to francs in my head [laughing] and stuff like that, going
    through. And, of course, at school, when we had math class, I had to learn how to multiply in pounds, shillings and pence.
    So, you were doing base 12 and base 10.


    So I came back and got into the school. After sixth grade, my father basically insisted that I get out of the private
    school and go to a public school, which was actually a good thing for me. Academically, it was almost a wasted year. My
    homeroom teacher, who had me for half the day, was one of these guys who''d gotten out of the Army, gone to colleg'
