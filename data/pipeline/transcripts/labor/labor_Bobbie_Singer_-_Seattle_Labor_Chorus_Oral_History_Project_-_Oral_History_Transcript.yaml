collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Bobbie, why don't you just tell us where you were born and somethings about your childhood that you feel influenced
    your life?
- speaker: Respondent
  text: Do you want me to start talking now?
- speaker: Respondent
  text: Well, when I was a little girl, I grew up in a very rich family. My father was one of those people who came from Romania,
    but was a real mathematical genius. He invented a whole bunch of pieces and machinery and stuff like that. He also designed
    the what do you call it the sight that went on all the carbine rifles in World War I. He was a very, very brilliant man,
    and was very fond of me because my mother had not wanted to have any more children after she had my sister, and so she
    kind of ignored me. As a matter of fact, she had a governess for me that took care of me so that she wouldn't have to
    bother with me. I went to the Ethical Culture Schools in New York, which were a tremendous influence on me. Do you want
    me to describe that?
- speaker: Interviewer
  text: Yeah, why don't you describe that? That would be great.
- speaker: Respondent
  text: The Ethical Culture Schools started out with in first grade, you studied prehistoric man; in second grade you studied
    the Egyptians; in third grade you studied Greece; in fourth grade you studied Rome; in fifth grade you studied the Middle
    Ages; in sixth grade you studied the discovery of the New World and the whole Renaissance period. It was a very, very
    thorough education and something that I depended on for the rest of my life.
- speaker: Interviewer
  text: Were there any events in your childhood? What year were you born?
- speaker: Interviewer
  text: So you lived during the Depression. Did that have some influence on you?
- speaker: Respondent
  text: Well, my father was a very competent manufacturer, and he actually designed the gun sight that was used in World War
    II. He brought a lot of Jews over from Germany. He recognized what a sonofabitch Hitler was, and he brought - and at one
    time he had a lawyer and a doctor cleaning up his factory.
- speaker: Interviewer
  text: I know that Dan mentioned something about an apple seller when you were a child?
- speaker: Respondent
  text: Oh, yeah. There were these apple sellers on the corner and I had an allowance. I got a certain allowance from my parents,
    something like 75 cents a week, which meant that I had 10 cents carfare a day, and then the other five cents I spent on
    my apple seller. I bought an apple from him every day. One day, when I was walking toward the corner, a car jumped the
    curb and knocked the apple seller's apples all over the place, and the cops came and started beating up the apple seller.
    I went screaming down the street,
- speaker: Interviewer
  text: What do you think motivated you?
- speaker: Respondent
  text: Well, I don't know. I think that I had been motivated to deal with the underdog.
- speaker: Interviewer
  text: Is there anything else in your childhood that stands out?
- speaker: Respondent
  text: When I was a little girl, we lived across the street from the Museum of Natural History, and we used to play across
    the street jump rope and stuff like that. One day there was a family of kids who came out. There were three or four of
    them and they were, I don't know, nine, 11 and 13 years old, and they only had one coat for the three of them. Considering
    the fact that I had two coats, I gave one of the coats to one of the kids. When I got home, I was shivering because I'd
    given my coat away. My mother said to me, "Where is your coat?" I said, "I gave it to somebody who needed a coat, and
    I had more than one coat, so I gave my away." My mother got furious at me and she just said, "Oh, my goodness! Wait till
    your father gets home and he'll really spank you for giving your coat away." When my father came home, she told him what
    I had done, and he gave me a great big wink, like that, and smiled at me and kind of walked away, which was an approval
    of what I had done. My father was a great what do you call it when people give money away?
- speaker: Interviewer
  text: Philanthropist?
- speaker: Respondent
  text: Yeah, he was a great philanthropist and gave money away to help the Jews get out of Germany, and he helped, oh, just
    a lot of charities. He really believed in keeping his kinfolk very well, but giving as much money away as possible.
- speaker: Interviewer
  text: Tell me about your college years and teaching and things like that.
- speaker: Respondent
  text: After I graduated from the Fieldston School, which was the high school of the Ethical Culture Schools, I was accepted
    at, oh, I don't know, Radcliffe and Bryn Mawr and all these other schools, but I chose to go to Antioch College, which
    had a bad reputation in those days as a home of free love and communism. When I got to Antioch, I found that they were
    way, way behind in academics from where I was, because the Fieldston School had been a very tough school to get into.
    I was accepted at Radcliffe and Bryn Mawr and whatnot, but I chose to go to Antioch.
- speaker: Interviewer
  text: Is there anything that stands out at that time at Antioch that helped shape who you are?
- speaker: Respondent
  text: Well, yes. Antioch was called the home of free love and communism, and that influenced me a lot.
- speaker: Interviewer
  text: Sure. Tell me about your teaching career.
- speaker: Respondent
  text: When I got out of Antioch, I did a year of graduate work at the oh, god, what was it called Catholic University? Anyway,
    it was a pretty funny thing because here was this nice Jewish girl who was going to this Catholic university.
- speaker: Interviewer
  text: You want to talk about your marriages? I know Dan talked about you going over to Europe and things like that, and
    how did having Dan kind of change your life?
- speaker: Respondent
  text: Oh, Dan was my first and only child. Like he says, I'm his first and only mother. [chuckles] But we went to Europe
    for a year when Dan was... was he 12? I think so.
- speaker: Interviewer
  text: Yeah, I think so.
- speaker: Respondent
  text: Let's see he was born in 1949, so he must have been about 12 years old. We went to England first, and then we went
    to Copenhagen, Denmark, and we had a wonderful, wonderful time in Copenhagen. We lived with a woman who had been part
    of the Danish underground during World War II, when the Germans took over. She was very much in favor of Jewish people.
    She didn't like the Germans and she liked the Jewish people.
- speaker: Interviewer
  text: What happened when you were in England? Did you just live there, or is there anything special that stood out as far
    as your time in England?
- speaker: Respondent
  text: I lived in England many years later. We weren't in England for very long, we were mostly up in Denmark.
- speaker: Interviewer
  text: Why don't you skip ahead then and tell me about your time in England when you lived there for a time?
- speaker: Respondent
  text: When I lived in England I was married, and my husband was a psychologist. He got a year off to go study in what was
    the name of the institute?
- speaker: Respondent
  text: No. Oh, dear.
- speaker: Interviewer
  text: What part of England?
- speaker: Interviewer
  text: It was in London.
- speaker: Respondent
  text: Yeah, we were in Cambridge before that. The first time we went to England - or the first time I went to England -
    I went with Dan. That was the year that Dan and I spent in Europe. But that has nothing to do with my later period, year
    in England. My husband was a psychologist and he was studying at the what was it called the Sigmund Freud Institute or
    something? I was working at the Planned Parenthood what was it called? It was called something. I still support Planned
    Parenthood. But I can't remember what it was called in England.
- speaker: Interviewer
  text: Sorry, I can't help you. I don't know either. It's my understanding that you did teach at one time, at a later time
    even, in Berkeley, California. Is there any memories about being in Berkeley at that time?
- speaker: Respondent
  text: Oh, yeah. Berkeley was a very exciting place.
- speaker: Interviewer
  text: When were the years that you were there?
- speaker: Respondent
  text: Hmm. Let's see from the time I was about 35 to I lived in Berkeley for 50 years.
- speaker: Interviewer
  text: Were you part of the City Council there, or did you involve yourself in politics?
- speaker: Respondent
  text: Oh, I involved myself in a tremendous amount of politics in Berkeley.
- speaker: Interviewer
  text: Can you explain a little bit about that?
- speaker: Respondent
  text: I was never on the City Council, but I gave my support. In the elections, I gave a lot of support to the left-wing
    candidates.
- speaker: Interviewer
  text: Okay. I remember you talking one time about a student that you had, and that you were teaching, and he couldn't read
    but he had something to do with fire or something, that he wanted to burn down a bunch of buildings or something? And
    you really helped him out.
- speaker: Respondent
  text: Oh, yeah. There was a student of mine who was in the reading program, but he really hated it because the reading program
    was "Sally had a pink balloon," kind of stupid stuff, so I got him a book. We were looking out the window one day and
    he said something to me about how he would like to burn down the entire city of Berkeley with all the rich people's houses.
    I pointed out my house and I said, "Just don't burn that one down," and he said he wouldn't do it. So, I went to the library
    and got him a book that was about the slave rebellions before the Civil War, and I got him a dictionary to go with it.
    And he read the entire book, although he was supposed to be a non-reader. He wasn't supposed to be able to read, but I
    got him a dictionary to go with the book and he read the book. We kept in touch for a number of years afterwards, and
    he became a firefighter. He went to what do you call it? Junior college?
- speaker: Interviewer
  text: Yes, or community college. Is there anything more about that period of time when you were teaching? What kind of students
    did you teach?
- speaker: Respondent
  text: I taught what was that Catholic school I mentioned?
- speaker: Interviewer
  text: I'm sorry. You taught at a Catholic school?
- speaker: Respondent
  text: Yeah. I taught at a Catholic school, and I taught American history. It was a pretty strange experience for me because
    here was a nice Jewish girl who was teaching at a Catholic school. One of the nuns once said something to me about "How
    do you feel when we all stand in class, before class starts, and we say 'Hail Mary, Mother of God, blessed art thou among
    women, and blessed is the fruit of thy womb, Jesus'?" And I said, "Well, when you're saying that, I'm saying, 'Shema Yisrael
    Adonai eloheinu Adonai echad.'" Then she laughed and she said, "I wondered what you were muttering about all that time."
- speaker: Interviewer
  text: Can you translate that?
- speaker: Respondent
  text: Hear, O Israel, the Lord thy God, the Lord is One.
- speaker: Interviewer
  text: I understand, if I got this right, that you met Eleanor Roosevelt once?
- speaker: Interviewer
  text: What was the circumstance about that?
- speaker: Respondent
  text: Well, the Ethical Culture Schools only ran for about eight months. They started at the end of September and they ended
    in June. I did some volunteer work at a camp where we were trying to get it all fixed up so that the kids from the Lower
    West Side in Manhattan, who never saw a tree in their lives, could come up to the camp. I have this memory of I was whitewashing
    one of the bathrooms, and I had a towel around my head and around my hair to keep the paint from getting into my hair,
    and Eleanor Roosevelt came in with the head of the camp, and the woman introduced me. She said, "Mrs. Roosevelt, I'd like
    you to meet Rosalind. She's one of our volunteers." I was very embarrassed because I had my hair all turned up in a big
    towel, and I was wearing a pair of painter's overalls that were about four sizes too big for me. That was in June or July,
    and then the following January, I went to a meeting that was where I went to hear somebody speak. His name was John Lovejoy
    Elliott and they were from the Elliott-Lovejoy families that had been in the antislavery movement. And Mrs. Roosevelt
    came in with her retinue and she said, "Hello, Rosalind. How are you?" I almost fell over. I couldn't figure out how she
    even remembered me. I mentioned it to one of her nephews and he said, "She remembers for what you were doing, not for
    what your name was." No. "She remembered you for what you were doing, not for what you were wearing." Because I was all
    dressed up in my fanciest clothes, my black coat with a velvet collar and little headdress on my hair and whatnot.
- speaker: Interviewer
  text: Do you have any other recollections about Eleanor Roosevelt, or something that you were part of?
- speaker: Respondent
  text: Well, then I became very socially active kind of in Berkeley politics.
