collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: What local were you in?
- speaker: Interviewer
  text: Where's that located?
- speaker: Respondent
  text: Located in Eureka. That's the county seat of Humboldt County with a total population of about 133,000 people.
- speaker: Interviewer
  text: You're born in 1936. Can you tell me a little bit about growing up in France?
- speaker: Respondent
  text: I was born in a little village called Saint-Sylvestre. I lived there until 1941 where we, meaning the family - my
    parents were both born in the French Alps near Gap. This is where we moved in the Hautes-Alpes in 1941. From 1941 to 1951
    I had a wonderful time in a place called Gap, a city that I've visited many times now. When I remember it, it had about
    10,000 people. Now there's about 60,000 people.
- speaker: Interviewer
  text: Where is Gap?
- speaker: Respondent
  text: Gap is in the High Alps. Basically, the Tour de France this year stopped in Gap. It's a beautiful place. As we look
    at the Mediterranean, it is about an hour and a half by automobile. Gap is the beginning of Provence, as they call it
    'the door of Provence.'
- speaker: Interviewer
  text: Why 1941? That is a year that had much going on in Europe.
- speaker: Respondent
  text: The war was about to go full bloom. My father was drafted. I had an older sister, and I was the middle child. My younger
    brother was born that year, in 1941.
- speaker: Interviewer
  text: You say your father was about to be drafted. The Germans had already occupied France.
- speaker: Interviewer
  text: Were they going to draft him?
- speaker: Respondent
  text: He worked as a telephone operator for the French government.
- speaker: Interviewer
  text: So what do you mean by 'he was about to be drafted'?
- speaker: Respondent
  text: What I meant, drafted, he was no longer at home. He was shipped elsewhere, and so I never got to see my father in
    that period of time.
- speaker: Interviewer
  text: Do you know why they moved?
- speaker: Respondent
  text: It was probably economics. My father had spent six years in the US. He worked in the states of Idaho and Utah, mostly
    for French farmers. In 1931, he went back to France and married my mother. Why I'm here is that we have a long history
    dating back to the eighteen nineties and the immigration of a lot of people. Since immigration is the story of the world.
    We start immigrating to Colorado in the eighteen eighties where a great uncle of mine worked in the mines in Colorado.
    So that was the beginning of the history of the Olliviers and another family by the name of Vashier.
- speaker: Interviewer
  text: Was there any political involvement or, really, unionism in your family back then?
- speaker: Respondent
  text: Not that I can recall going through the history of the family, tracing it back. My father traced it back to 1592.
    So I can tell you exactly the history of the family through my father, who's the one who initiated all that research.
- speaker: Interviewer
  text: You mentioned the year 1951 that you're in Gap. What happens to your education and your experiences after that?
- speaker: Respondent
  text: In 1951 I was out of high school. I was 15 years old. Remember that in France you start school at three. 12 years
    later, you're out of high school at 16. Usually you can continue on to the lycée [French secondary school] another two
    years until you're 18. At that point, looking back at your educational background, they trace your future. Either you
    go into higher education or you become a tradesman. That's how that works. I truly believe that one of the problems that
    we have in this country is that we don't have trade schools. We need to go back into that type of system.
- speaker: Interviewer
  text: What did you do yourself at this point in time?
- speaker: Respondent
  text: I was 16, and I can tell the both of you that it was a real shock to my system. To be taken to another country. I'd
    had the opportunity to study English. Never did. Not only is it a culture shock, but there is that language barrier that
    keeps you from being able to communicate with your peers for at least a year or two.
- speaker: Interviewer
  text: How come the family moved to the United States?
- speaker: Respondent
  text: As I told you earlier, my father had been here before. At that point, which was six years past the end of World War
    II, France grew into more and more bureaucracy. My father worked for Nestlé at night, and my mother ran a second-hand
    store that we had in a great location in Gap. Basically my father became disenchanted with the system. Since my father
    could speak English, and he had been before. The whole history, going back to the Sidney-Olliviers, I had several uncles
    that lived in the United States. Uncle Joseph, Uncle Armand, Uncle Léon, who also lived in San Francisco. When we decided
    to come to the United States in 1951, we ended up living in Big Piney, Wyoming. Coming from what I had thought a very
    happy place to a desert elevated at about 5,200 feet where you have a lot of cows, and the weather was horrible, and there
    was no work for my father. Although we came to this country with some money, the money was going fast as my father didn't
    have an opportunity to go to work. We didn't stay there too long. We moved to Pocatello, Idaho for about six months. There
    the only opportunity my father had was to work on the railroad. My father was then 51 years old. He was no kid. So then,
    my parents decided to move to California where I had an uncle by the name of Armand. I'll go back into Armand since Armand
    is really tied to Harry Bridges. My uncle Armand was the youngest Ollivier. There were 13 Olliviers; my father came from
    a large family. That uncle, Armand, lived in San Francisco in 1934. Let's go back to us moving. Fieldbrook [California]
    is where my uncle Armand lived with my aunt Suzanne and my uncle Léon. They had bought the property in 1945. The first
    time I saw my uncle was probably 1944. Since he had been drafted, not only did my uncle Armand serve in the French army,
    but he was also drafted in the American army in World War II. That was the first time that I met my uncle Armand. We will
    go back a little further with him living as a cook. My aunt Suzanne worked for the Folger family, the coffee family, in
    San Francisco. One of the world's best cooks. They married in San Francisco in 1944. My uncle was working in the Embarcadero
    [San Francisco's waterfront road] in a small cafe where those two longshoremen were killed on the fifth of July, 1934.
    When I begin to speak with my uncle about Harry Bridges, he had all the respect in the world for Harry. When I was speaking
    with my uncle about the opportunity, that I was about to become a longshoreman, he said, 'Best move you've ever made,
    Charles.' It was a background starting with my uncle and the association. He never met Harry Bridges, but he certainly
    could read the newspapers every day. And the jail strike that took over after the killing of those longshoreman. Very
    interesting in the American history.
- speaker: Interviewer
  text: There's a little split between the time you come to the United States and you go on the waterfront in '66.
- speaker: Respondent
  text: Okay, let's go back a little bit. Out of high school at Arcata High where I started going to school right after we
    moved to Arcata [California] in the spring of 1952. Since I already had my high school diploma, I went to the high school,
    first of all, to learn English and, number two, to study American History and American Government. Those were the only
    two classes that I had. I had basically a vacation from studying. The change that I had from a real strict French schooling
    system to the American system was just like night and day! [laughing] It was great! A lot of playtime, not too many finals
    like you have in the European system. The French system remains one of the toughest in the world when it comes to education.
    They certainly take that seriously. But, so, out of high school, I went to work for a Purity store [grocery chain] as
    a bag boy, and I was making then about a dollar an hour, as I recall. I stayed there for a few months. I had the opportunity
    to work in a sawmill for about six months. There I built my muscles working on a green chain. If you know what a green
    chain is, it's not an easy job. From there, my father had gone to work for a plywood mill. A plywood mill was a whole
    lot easier work than pulling heavy lumber off a green chain. That's where I started working on the fifteenth of September
    1953. I was then 17 years old. I stayed there for 13 years. In the meantime, at the age of 21, I married Lorna Jean and
    we had three children together. We were divorced in 1969. In 1966, I saw an ad in the paper. It said application for B-registration
    in the longshoremen's industry, the waterfront industry. There was one fellow there that I worked with in the plywood
    mill whose father had been a longshoreman and was killed in San Francisco. His name was Hutch. He basically told me, 'Don't
    even try because it's a closed shop. Even though you saw the application, the chances are you're not going to make it.'
    What they advertised was they needed skilled help. One thing I could do very well was drive lift; that's what I did in
    that plywood mill. I had several different jobs. I didn't expect anything. Two months later came the regular application,
    and that was very specific. I filled it out. Again, the people that I worked with were telling me, 'Don't get too excited
    because you're not going to make it.' Then came the interview. I thought, well, the interview is going to be more serious.
    There I faced all the old-timers. In those days, Local 14 had about 140 members. You had all the hard-boileds on that
    committee, as I recall, made up usually of gang bosses. Their first question was, 'Can you do the work?' I said, 'I certainly
    am going to try. Yes, I'm sure I can do the work.' I gave them my background. They said 'What do you know about the longshoremen's
    union?' Since my uncle Armand was in San Francisco during the formation of the ILWU, I said, 'Well, all I can tell you
    is that I have nothing but respect for Harry Bridges. He's one of the finest union leaders that the world has ever known.'
    I wasn't trying to impress anybody. I had never worked as a casual worker. Hutch, whose father I talked about earlier,
    he said, 'Well, it sounds like, Charles, it's about to get serious. You should go down there and work. You may not like
    it.' On a Saturday, I went down since I wasn't working in the plywood mill. I went to the hiring hall. A lot of work in
    1966 in the Port of Eureka. They cleared the hall, and I was the only one left on the chair. The dispatcher says, 'Hey,
    you! You want a job?' I said, 'I sure do!' 'Go down to A Dock. Can you drive a lift?' I said, 'Yes, I can.' I went down,
    and it was a German ship. One of the hard noses of the local, his name was Kenny Swenson. Old gang boss. He said, 'Hey,
    Ollivier, remember when we interviewed you, you said you drive lift? Well, there's your chance.' Went down the hatch.
    The gang was made up of mostly the people who had interviewed me, so I was really on the spot. Well, working in a plywood
    mill - which was union, by the way. It was a union mill.
- speaker: Interviewer
  text: What union, for the record?
- speaker: Respondent
  text: Lumber and Sawmill Workers Union, 2789. I thought, well, now's my chance. The gang boss who was down there was Kenny
    Swenson. 'You just point and tell me where you want it.' Well, they couldn't bring it fast enough. By 10 o'clock we took
    a break, and those guys on the winches were going, [makes hand gesture for 'okay'] 'Ok!' About noon we'd already filled
    the lower hatch. Everybody was very happy because in those days they were looking at productivity. The gang boss solely
    functioned as a gang boss. The winch driver, whose name was John Anis, he had worked in the woods, and this guy was accustomed
    to hard work. He recognized my talents. So did the others. As we were working on the dock, he said, 'Hey Frenchman, come
    here.' He pulled out his sheet; he said, 'I want to show you something. You know we got Greeks in this local. We got blacks,
    we got Swedes, we got Norwegians. But we don't have any French people in here. I'm going to show you. You already had
    five stars, but now you got six. You're in!' It wasn't too long after that I went to work and got a B-book. That was the
    beginning of my career on the waterfront. I can tell you this - that I loved every minute of it. Never had so much fun
    in my whole life. The 35 years went very fast. I became involved upon my full registration - 18 months later. I received
    my B-book November 22nd, 1966. Eighteen months later I was fully registered as an A-member, and at that point I was ready
    to become an officer of that local. Whenever I ran, I was always elected. First on the executive board, Labor Relations,
    and the president many, many times. When you really get to know the family of the ILWU is when you go to a caucus. There
    you get to meet the créme de la créme. You get the feeling of how it really operates. Harry, of course, was still active
    in my first caucus convention - which was held right here! Right here in the city of the roses, Portland! My wife was
    with me. We were staying at the Hilton downtown. We were in the lobby, and I said, 'Carol, there's Harry!' Harry was having
    breakfast. I went right to where he was seated. He said, 'Sit down. Let's have breakfast together.' We had breakfast with
    Harry Bridges, which was for me a major accomplishment. To this day, there's no doubt that Harry will go down in a country
    where you don't have a history of labor. It's very short in your history books. Am I right? Yes. It's a shame that it
    is that way. Labor to me has always been a solution. Unfortunately, in this count
