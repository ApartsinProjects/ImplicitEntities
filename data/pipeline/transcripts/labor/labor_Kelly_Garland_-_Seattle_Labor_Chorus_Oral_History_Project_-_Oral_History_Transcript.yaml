collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Respondent
  text: My life has been a tapestry of rich and royal hue An everlasting vision of the ever-changing view A wondrous woven
    magic in bits of blue and gold A tapestry to feel and see, impossible to hold. - Carole King
- speaker: Interviewer
  text: Thank you. Kelly, why don't you just tell us where you were born and when and a little bit about your family.
- speaker: Respondent
  text: I was born in Santa Monica, California in 1962. My mother, when she was younger, she was from Ohio and she wanted
    to babysit the kids next door, and my grandmother told her no because they had polio. Polio, as you know, was going around
    big back then. I guess my mother kept urging her, could she, could she, and my grandmother finally said, "Yes, you can,
    but you must stay out of the house and just kind of check on the kids from there." I guess my mother ended up going into
    the house and she caught polio and the kids recovered. So the rest of her life, she had some paralysis and walked with
    a cane. It affected her in her school-age years. She was always trying to be accepted and play catch-up with everybody
    else, and I think, from what I understand, that she might have been a little bit promiscuous in trying to be accepted.
    I think I remember my grandfather once telling me that she had been busted in the back of a car with a man. I think she
    might have been in a home or two for pregnant teenagers. But anyhow, when she was 18. She hitchhiked all by herself from
    Ohio to California. I don't know anything really about my dad or how they met, but they got married, as far as I know.
    They had my brother, and we're not sure but we think that he has a different father because he doesn't look like my sister
    and I. He looks different. My mom and dad and my older brother, who's like three years older than me, and my older sister,
    who's two years older than me, and then me. All I really remember is my stepfather, Ernie. I used to have some photographs
    with my real father holding me when I was a baby. But I found out at some point that he went to prison. He got arrested
    back in the "Day of the Doors" in Venice Beach selling drugs, and he went to prison for it. At some point in between my
    travels, when I lived in California, I spoke to this Afghanistan woman who was my neighbor and she found out my story
    - or maybe it was a lady in New Zealand - and she says, "Oh, Kelly, you need to find your father." And I never felt so
    much urgency about it, so at some point later when I came home after my travels, I did look for him. I was in my twenties
    then and I wrote the prison that he was at and they said that he hadn't been in prison for years; that he had been on
    probation for years. Because I'm in my twenties and it was when I was a baby that he went to prison. And that even if
    they knew where he was, they would have to have his permission first. So, he went to prison for selling drugs, and then
    as far as I know, I think my mom remarried this person named Ernie. She really wasn't taking care of us and my stepfather,
    Ernie, called the social welfare people and kind of reported her. I guess the school reported us, too, because I found
    out somewhat recently from my brother that we didn't have any food at school and we were always sitting around others
    and kind of trying to eat their food or beg off of them. So, between the school and my foster father, they came by. She
    wasn't taking care of us. I think she'd been in a home a time or two for some mental issues, and when she came out - I'll
    get to that in a moment. But anyhow, we got taken away. I was five years old. She died sometime later when I was in my
    first foster home, I think it was, and I was six years old. I guess she kind of OD'd on the medicine they gave her from
    the mental home. These are all things I learned years ago, and that's what I think what happened. But my uncle told me
    that he came by once because she wouldn't pick up the phone, and he found her dead in bed. So I went into my first foster
    home. And I found out from my social worker that she was crying, "My baby! My baby! Don't take away my baby" when we left.
    They put my brother and sister in the same home, and then they put me in a home. And I'm not really sure how much those
    people loved me. I just know that my little brother used to ruin my stuff when I went to school, and then one day they
    came to me and said, "Hey, do you want to live on a farm?" And I thought, yeah, great. Animals. We'll go live on a farm.
    When she said that to me, I thought we were all going to live on a farm. But what she was trying to say is that I was
    going to live on a farm for myself in my next foster home. I went to my next foster home, and I loved my home. I had a
    little sister who had been adopted by this family. I lived here from the ages of seven to nine. There was no competition
    between my sister and I. We just loved it. We had horses and chickens. I was doing horse shows and bareback riding and
    barrel riding and all sorts of stuff back then, so I would have grown up to be like a cowgirl had I stayed with them.
    I loved my horse, and I was out in the country, and our chickens were on Gunsmoke and my mom was really good to me. I
    don't know if you want me to go through all the issues of why I left all these homes, but if you want me to, let me know.
- speaker: Interviewer
  text: Well, as it was you were transferred to another home because of [unintelligible].
- speaker: Respondent
  text: Yes, I was transferred to another home because the man was not quite right. I came home and my mom was in tears off
    the bus and walked me down along country road to our country house and kind of rode all over me and was crying and I was
    like "What's wrong? What's wrong?" And she told me that I had to leave. So, I went to my next foster home. That was my
    third foster home. The lady was Latino, I don't remember what country she was from. But I was very intrigued that there
    was another language and it was called Spanish, and my first words in Spanish from her were all cuss words, which I won't
    repeat here. But that was big for me to be opened up to culture and language. I loved that. But my dad was an idiot, my
    foster father, and he used to do abusive things and lock me out. Just not so good. Anyhow, they called the social worker
    and I went on to my next home. This is back in the late 60s, I guess, when pantsuits were big. I loved pantsuits, and
    I had this purple pantsuit that I had from them. I just knew when I came home from school before the social worker came
    to pick me up, they were going to take it from me and hide it. Even though I packed my stuff and hid that, I came home
    and it was no longer mine, so I was really disappointed about that. Then I go into my fourth foster home. In my fourth
    foster home, I move in with my sister and brother, the one that they moved into all together. This was a crazy home. I
    lived there for four years. I went through puberty there.
- speaker: Interviewer
  text: Something about you took some guitar lessons or piano lessons in that period?
- speaker: Respondent
  text: Okay. Wait, I'm sorry. Forget it. I am in my fourth home. My fifth home is the crazy home. That's where I went through
    puberty. So now I'm nine to elevenish and I'm going into my fourth foster home with my sister and brother - that part
    of it's true - and my mother that I loved so dearly from the country home and my second home, she was really lovely and
    she gave me piano lessons. That was my first sort of part with music really, as far as instruction goes. She didn't want
    to make my sister feel jealous, so even though she didn't know my sister, she gave her piano lessons, too. At the same
    time, I took guitar lessons. But as far as musically before that, in my second home with this nice lady in the country,
    I had a boyfriend named Mark Johnson and we used to go out during recess at school, and all the kids would be playing
    basketball or ball on the pavement, but we'd be far away across the field up against the fence where the trees are and
    we were singing and playing guitar and being musos and folkies and stuff. We loved it. It was just me and him and one
    other person. I think it was a guy, but I can't remember. But that was like really big. Then the home that I just came
    out of - the third foster home where the dad didn't like me and he was a big of an idiot and they took my pantsuit - in
    that home, they used to have people over and the Supremes were big then. They'd turn on the Supremes at their house parties
    and I'd stand in front of the living room and sing and dance for everybody. I'd be Diana Ross and the Supremes. [laughing]
    So that was a big thing for me. So, now I'm in my fourth home with my brother and sister. There were some issues. I don't
    know what you want me to go as far as like when the police came and picked me up at school. I don't mind.
- speaker: Interviewer
  text: Well, things happened.
- speaker: Respondent
  text: Yeah, so I got taken away by a police car from school with all my friends waving to me while I was in the back of
    a police car. It wasn't because of something I did, they were taking me to my new home. What can I say about that place?
    Just that there were some issues there. Musically was a big dud, but obviously musically at that time, I was seven to
    nine, so I was starting to sing a lot of Barbra Streisand and Karen Carpenter and stuff that was coming in at that time.
    Not really so much after that. I went to junior high. So far, the very beginning is my life is being very affected. First
    it's affected by the decisions that the adults in my life are making or not making, that is, my grandparents not taking
    me, my aunt and uncles not taking me. They were a little bit young but it would have been nice if my grandparents would
    have sort of stood up for me. I don't really know what the circumstances the rules are, but the decisions that adults
    make affect children. They don't really have any control, or they have no clue of what's going on. But these are the events
    that led up to my life. And it wasn't to stop there because the decisions that adults made in the successive homes after
    that continued to affect my life. So, that's the domino effect of it all. Now I'm leaving my fourth home and I'm going
    into my fifth home, which is a crazy home, which is this home right here. And I just want to say that in my second home,
    in the country home that I loved my foster mother because I know she loved me. And that's when we had the big earthquake
    in 69, and I used to wake up and she'd put the rollers in the pot and heat them up in boiling water and then put them
    on our hair. She was good to me. But she was a Christian, I believe, and I didn't know what that was. I just know we went
    to a community church, I think. I don't really remember anything, but I was very much introduced to the idea of God and
    Jesus back then. And I remember there were little pieces of paper that said, "If you believe in Jesus Christ and the Lord
    is your Lord and Savior, sign here." And I used to believe so I'd sign them everywhere. So that was my first introduction.
    My third home, nothing. My fourth home was Jehovah's Witness, actually. Went to a few things there, but I don't know how
    much followers there were. That was where I lived with my brother and sister first. We all got taken out of that home.
    My sister got taken to MacLaren Hall, which is a home for teenagers, and me and my brother got put in another foster home,
    waiting for my sister for when she was done with MacLaren Hall. This was the home that was a crazy home, when I went through
    puberty and my sister joined us. They were kind of really big on this family day and family night, but they were so abusive.
    We did drugs and angel dust. Once, they asked me for money when my sister and I were walking home from school. I didn't
    even think about a bank account but I guess I had one, and I didn't give it to them. But they wanted my money so they
    could go out and buy alcohol to have a neighborhood party for everybody. They were giving my brother acid. There was a
    lot of cigarettes, dope, alcohol, acid, PCP. All sorts of stuff was coming in there. My dad was in the Navy and he was
    having a lot of problems and he got kicked out, always trying to pick up on people. Then he opened a CB shop. There was
    just a lot of tension between them, too. My mom, she was full-blooded Italian and she was not a very nice girl. She was
    abusive, and we were just used as slaves in that home and their children could take advantage of us.
