source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Respondent
  text: I was born in 1946 in Davis, California, when it was a very small town. My dad was in the school of veterinary medicine
    at UC-Davis. My mom was a kindergarten teacher. I have a sister. They were not particularly political people, but they
    were very decent people. I got my values from them to sort of treat other people decently and be considerate of people
    less fortunate and all that stuff. And they sort of got me started in life. A couple things that were really formative
    were that I lived for a year in New Zealand when I was six, and I lived for six months in Taiwan in 1957, a very hot time
    in Taiwan and China. We had an anti-aircraft gun outside our compound, and I think that was also a formative experience,
    realizing the world was a large and complicated place. I went to Stanford. Finished Stanford and went into the Peace Corps
    in Somalia. I was in an agriculture and rural development project that was a complete fiasco, very poorly planned under
    very, very challenging circumstances. After six months of that pointlessness, moved into Mogadishu and did sports and
    recreation, mostly teaching kids how to play basketball. I was going to be the coach of a national basketball team before
    there was an assassination of the president and a military coup, and we were eventually thrown out. It was a very exciting
    experience.
- speaker: Interviewer
  text: Can you elaborate just a little bit more about that whole episode in your life?
- speaker: Respondent
  text: Sure. It was 1968. The choices really were to do something like the Peace Corps or go into the Army. The Vietnam War
    was hot and heavy and I knew I didn't want to do that. So, I ended up going to Somalia, which is on the east horn of Africa.
    I think people now know kind of where Somalia is; in 1968, nobody knew where Somalia was. We did our training on the Standing
    Rock Sioux Reservation in North Dakota on the banks of the Mississippi River. We built all our own buildings; dug a 30-yard-long,
    six-foot deep trench to run, I think it was a waterline. The idea was the buildings we left behind were going to be used
    for ice fishermen, somebody's bright idea. After three months of training, we went to Somalia, where we arrived right
    after the wet season hit, which meant the roads were impassable. So, we had to spend more time in Mogadishu than any of
    us wanted to. They gave us more language training, and then finally, after 300 hours of language instruction in what they
    told us was the hardest language in the world for English-speakers to learn, they sent most of us to a part of the country
    where nobody spoke the language. [chuckles] I remember vividly, after some preliminary contacts with this village that
    I went to where there were people with me that spoke that language, drove into town in a red International Harvester pickup,
    got out and said, "Hello." And people said, "What did he say?" I mean, people did not understand when I said hello. It
    sort of went downhill from there. We lived under very basic conditions in a tiny village in one of those circular huts
    made out of sticks and manure with a thatched roof. Nobody knew we were coming. Well, they knew we were coming but they
    weren't really prepared for our being there. No counterparts to work in agriculture. It was nuts. I stuck it out for about
    six months there, and then, like I say, moved into Mogadishu, where it was still a very, very different experience from
    home. It's an all-Muslim country. Very little contact with outsiders in general. Not a whole lot of colonial presence.
    I mean, southern Somalia was colonized by the Italians. I set out doing this sports and recreation thing, which worked
    quite well, actually. It had lots of challenges in doing things like getting cooperation to build a playground, and playground
    equipment was very problematic and challenging. But teaching kids to play basketball worked pretty well, and working with
    the other basketball players - the adults who helped coach. At one point, I think we had something like 45 school teams.
    I started that program and pulled in these guys that I knew from playing basketball. It really was quite satisfying. Then
    there was a very corrupt election and the incumbent party won, even though the opposition had a lot of support. A week
    after the installation of the President, the re-elected President was assassinated by somebody in his security team, and
    a week after that the army took over. They were sponsored by the Soviets, and national police, about the same size and
    importance, were sponsored by the U.S., so it was a real Cold War kind of a thing. Things got more problematic. A number
    of us had Somali girlfriends who would hear all this stuff, that they were monitoring us, keeping track of us, doing all
    this stuff. Didn't affect us that much, although we did have a party raided where the Somali guests were taken off to
    jail, held overnight. Then I was also arrested as the person who nominally hosted the party, even though there were several
    of us renting the apartment. Anyway, I had a sort of little kangaroo court kind of trial several weeks later, and we're
    fined $14 or something. But some of the Somalis - one guy I'm remembering had been educated in the U.S. and had just gotten
    home, and he was just outraged. So he mouthed off to the judge the first day we were there and he spent several days in
    jail waiting for our next court appearance. So, that was Somalia in a nutshell. I'm actually on the verge of publishing
    a book of my letters that I wrote at the time. That's why I have a lot of this on my mind.
- speaker: Interviewer
  text: Thank you. You mentioned that you had been to Stanford. I know we're kind of going back there, but anything stand
    out of Stanford that would have really influenced you for the rest of your life?
- speaker: Respondent
  text: Well, I went off to school as a small-town kid with pretty decent values, with some exposure to the rest of the world
    but I hadn't really thought about how the world operated. I got through the first couple of years at Stanford without
    that changing very much. Then I went to Stanford in Italy. I was actually in a fraternity house, which seems just very
    unlikely to me now. And it was a good bunch of guys; I'm still in close touch with a number of them, all, with one exception,
    very progressive, liberal people. But that was another era. But at Stanford in Italy, it was a cross-section of people
    at Stanford. Everybody was white because everybody at Stanford in the 1960s almost was white. But there were guys in SDS
    [Students for a Democratic Society], there were some women with very progressive political ideas. Just being exposed to
    that, even though I sort of pooh-poohed it, I remember very clearly a guy saying, "No, no, you should get to know more
    about the Black Panthers. They're not what the press tells you they are." I didn't actually act on much of that, but it
    got me thinking. By my senior year, I was completely opposed to the war. I don't think I did much about it, but there
    were debates in the fraternity house, and there were actually some divisions in the fraternity house that became very
    strong after I left. That whole thing, and then going to Somalia, living in a village, seeing how the rest of the world
    worked, we wanted to have a letter signed by a whole bunch of volunteers that would be published in the English-language
    paper. The ambassador heard about it and had us to his beach house to talk about why this would be a bad idea. Just a
    number of experiences like that just accumulated, I think. When I came home from the Peace Corps, the culture shock was
    horrible. I traveled for three months, then had about six months where I was just regrouping. Started law school. I went
    to Yale Law School, of all things, in the fall of 70, and it was really there where I think of myself as being actually
    politicized at Yale Law School, which seems bizarre. I was classmates with Bill Clinton; Hillary Clinton was a year older.
    Senators and judges and future law school deans, and all these really important people. But it was a very liberal place,
    and you were encouraged to think really liberally. I knew right away that I didn't really fit in much with my worldview,
    even as early in its development that it was at the time. I actually got a job working part-time in Legal Services. Then,
    it was in the ghetto in New Haven, working with people who were very political and very committed to servicing the poor
    and representing people that were really low-income, and talking to people about how they had holes in their floor and
    you could see the ground and all this stuff, just sort of the perils of poverty. I had an epiphany, one of my two epiphanies
    in life. I was representing this guy - don't remember his name, don't remember the case - I remember clearly he was a
    probably 60-year-old black guy, horrible alcoholic, really beat up the way some alcoholics are - scabs on his face, scars,
    all that. It just struck me out of the blue that I could be him and he could be me. Sperm and an egg, that's how we both
    got started. It's like a light went on and I continued on a very clear path that I'd just started on. After my first year
    of law school, went back to San Francisco and was what they now call an intern, which means I worked for free - they actually
    gave me $100 at the end of the summer - with a place called the Community Law Firm. They were upfront Marxists, and when
    I walked in the first time they had pictures of Chinese peasants and people like that on the wall and I thought, I don't
    get that. Why is that here? And two and a half months later, I understood exactly why those pictures were there; that
    the international working class, a lot of people were in it and all kinds of countries and people at that point had taken
    up revolutions to try and change things in their countries. And I think it's fair to say that it made me - there are lots
    of definitions for a revolutionary, but it made me start to think like a revolutionary. So, I did two more years of law
    school; helped start a chapter of the National Lawyers Guild, this very left-wing National Lawyers Guild, a national lawyers
    organization that had student chapters; began to study political thought more; audited a Spanish conversation class. I'd
    had Spanish at school growing up in the Central Valley of California, but my conversation ability wasn't very good, so
    this other guy and I got into this woman's conversation class. She didn't require us to do any homework. She said, "Just
    show up as frequently as you can and talk" - make these undergraduates have these conversations. She was very political,
    so it was just sort of one thing on top of another. Finished law school. My wife, Sasha Harmon, whom I met in law school,
    was a year ahead of me. She came to Seattle to work for Legal Services. A year later I followed, and worked for Legal
    Services in Everett and Mount Vernon. Did that for six or eight months, and then went to work on the border in Texas,
    a job that I tried to get when I graduated; they hired somebody else; he was a very short-timer, and then they called
    me to see if I still wanted this job. One of the most interesting things I've ever done was right on the southern tip
    of Texas near Brownsville, 80 percent Latino. This was the early and mid-70s. I was there two and a half years altogether.
    Just seeing the institutional racism and some overt racism was really eye-opening. I worked for a community organization
    that actually dissolved in a fistfight at the board of directors about a month before I got there. But they had the money
    from a foundation, so I represented almost all Mexican-Americans with various kinds of problems. The way I finally boiled
    it down was it was a farm worker practice with a civil rights twist. Did that and then came back to Seattle. There was
    a split in the Farm Workers Union, and we decided that when it became politically significant which New Year's Eve party
    you went to that that wasn't why I went down there. Sasha had a standing offer to come back and work as a lawyer for the
    Skokomish Indian Tribe. She had put that on hold to come be with me for part of the time in Texas, so we just packed up
    and moved back to Seattle. People that I knew through the Lawyers Guild were planning to start a law firm. It sounded
    good to me. There was a collective of six or eight people altogether, and two of us who had spouses that worked - had
    jobs - could help finance the start of this project - started a firm. It actually worked.
