collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Bill, can you tell me a little bit about yourself, just where you were born and when you were born?
- speaker: Respondent
  text: I was born eight months after the Second World War in February of 1946, in Oakland California in the Kaiser hospital.
- speaker: Interviewer
  text: Right, okay. Tell me a little bit about your parents, if you would, what countries they came from.
- speaker: Respondent
  text: My mom was Irish, Norwegian. Both her folks were first generation in the US. My granddad's father jumped ship in the
    port of Boston, wound up in textile factories in Paterson, New Jersey. My mom's mother - that was my mom's father. My
    mom's mother was born to a Unitarian Norwegian family, and she taught schools at the Rosebud Reservation, Dakota reservation,
    along with her sister at age 18 and 17. Granddad was an organizer for the [WW from the age of 18.
- speaker: Interviewer
  text: Your grandfather?
- speaker: Respondent
  text: My grandfather, named H.E. McGuckin, Henry Eugene McGuckin, member of the Flying Squad for the [WW [Industrial Workers
    of the World] in the nineteen-teens.
- speaker: Interviewer
  text: What town was he active in?
- speaker: Respondent
  text: He was in Butte [Montana]. He was he was all over. He was on the Flying Squad. He rode a lot of rails. Actually, he
    left home at age nine, when a priest had put his hand on his pants, when my granddad was passing through the halls of
    school, Catholic school. My granddad reported it to his father, and his father beat him that night. Nine years old, my
    granddad left home. Luckily, he was taken in by a good hobo, taught him the rules of the rails, I guess you could call
    it. He was a small, nine year old, skinny kid, so he was good for the hobo kitchen, because he could get in the truck
    garden. He could get in the chicken coop. As a profession, he wound up being a cook. He cooked a lot in hobo camps, initially,
    in two pound coffee cans, as he used to say. And from there, he became a cook in lumber camps, and so on.
- speaker: Interviewer
  text: What do you mean by Flying Squad?
- speaker: Respondent
  text: They rode the rails during the free speech movements, wherever there was trouble, they got on the rails and they would
    head that way.
- speaker: Interviewer
  text: What would they do then?
- speaker: Respondent
  text: Soapbox [impromptu speeches] mostly, soapbox mostly, organizing work. His son, my uncle, published our grandfather's
    recollections, he wanted to call it recollections. It was published as The Memoirs of a Wobbly by Kerr Press.
- speaker: Interviewer
  text: Where was it published?
- speaker: Respondent
  text: It was published by Kerr Press. I believe that's Chicago.
- speaker: Interviewer
  text: Kerr Press. You're right, of course. Okay, well -
- speaker: Respondent
  text: My mom was a worker in a warehouse. Shortly after I was born, she achieved the job through Warehouse Local 6, had
    been a welder during the war. My dad was shell shocked, we call it PTSD now. He was shell shocked in the Second World
    War. He made five major landings in the South Pacific before his 18th birthday in the Navy, he was a radar man. His tag
    said expendable. He carried a radar part along with four others, they carried the same part. One of them would make it,
    was the thought. He made it, but he made it pretty screwed up.
- speaker: Interviewer
  text: Yeah, maybe a little bit about the impact on his life. You know, you use the term now - is a little bit different.
    Traumatic and so forth.
- speaker: Respondent
  text: Yeah, it's a bit different, but it's the same thing, shellshocked.
- speaker: Interviewer
  text: Yeah, you use the old term. How did it infect him?
- speaker: Respondent
  text: You know, I don't truly know, Harvey. I didn't know my biological father until I was 44 years old. My mother and he
    separated before I was four, so I have one or two very vague memories of him.
- speaker: Interviewer
  text: What was his name, again?
- speaker: Respondent
  text: His name was William Joseph Maher M-A-H-E-R. I am William Joseph Maher III by birth. I took my stepfather's name at
    age 16 when I had to get a Social Security card to get a job.
- speaker: Interviewer
  text: What was your mom's name?
- speaker: Respondent
  text: My mom's name was Virginia Adair McGuckin, born October 4, 1926, on a mountaintop outside of Eugene, Oregon. Her birth
    was paid for in dried fruit and apricots.
- speaker: Interviewer
  text: What kind of politics did she have?
- speaker: Respondent
  text: She joined the Communist Party when she was 14.
- speaker: Interviewer
  text: Well, you have quite a rich background.
- speaker: Interviewer
  text: Would you say - Was she a major political influence on you?
- speaker: Interviewer
  text: She was mostly a single mother after your dad left?
- speaker: Respondent
  text: For about two and a half years, and then she met my stepfather, which became the only father I knew, the man whose
    name I carry today.
- speaker: Interviewer
  text: And what was his job in political record like?
- speaker: Respondent
  text: He and she met at Colgate Palmolive, as they both worked out of Local 6. He was an African American from a Black sharecropper
    family out of east Texas. He was the fourth of five sons. He actually worked as a casual on the docks in LA [Los Angeles],
    southern California immediately following the war, or during the war at the end of it, and got wind of the organizing
    drives that were taking place off dock in the Bay Area, and that maybe he could become a longshoreman there. He made the
    move north and wound up in the warehouse sector.
- speaker: Interviewer
  text: He ended up in the in the warehouse sector. Local 6?
- speaker: Respondent
  text: Local 6, yes, East Bay. Local 6, East Bay.
- speaker: Interviewer
  text: Did you give me his name? Think you did.
- speaker: Respondent
  text: He was born R.Q. Proctor, called Roscoe Quincy Proctor.
- speaker: Interviewer
  text: Okay. What was his politics like?
- speaker: Respondent
  text: He was a [?diehard?] red. The Black red. In fact, when I was like 14 years old, he was indicted. I think it was named
    the Smith-McCarran-Kennedy Act, where he was ordered to register as an agent of a foreign power because of his connection
    with the Communist Party USA, and subject to $1,000 a day fine and five years in prison for every day he did not sign.
    Well, he was indicted a year after the date when he was supposed to sign. His trial took place in the Old San Francisco
    Mint by former governor, a Black man married to a white [woman] - well, they didn't get married until later. Judge [?Cherry?]
    had been the previous Alabama governor at some point. Anyway, Roscoe was tried along with a guy named Fred Thompson on
    the East Coast, I believe that was his name. They were tried. I guess Fred was tried over there in RQ - that's what we
    call family name for Roscoe was tried in San Francisco.
- speaker: Interviewer
  text: You mentioned RQ came - what country did he come from? You mentioned it already.
- speaker: Respondent
  text: RQ, Roscoe?
- speaker: Interviewer
  text: Yeah, your mom's second husband, yeah.
- speaker: Respondent
  text: Okay, my stepdad, Roscoe? Roscoe Proctor? He came from Texas.
- speaker: Interviewer
  text: He came from Texas. He's a Texan, okay.
- speaker: Respondent
  text: Yes. The fourth son, fourth of five sons to a sharecropper.
- speaker: Interviewer
  text: Yeah, and which act was he - I mean, I'm trying to remember which act de was charged under, you mentioned it.
- speaker: Respondent
  text: Charged as an agent of a foreign power under the Smith-McCarran Act, I believe it was.
- speaker: Interviewer
  text: Okay. Do you recognize that - The Smith Act is usually for people who are -
- speaker: Respondent
  text: Roscoe Proctor vs. the United States of America.
- speaker: Interviewer
  text: Yeah, but I mean, normally under the Smith Act, most of the people were foreign born. Is that -
- speaker: Respondent
  text: Not true of Henry Winston, chairman of the Party.
- speaker: Interviewer
  text: Among the CP leadership at that time.
- speaker: Respondent
  text: Roscoe proctor vs. the United States of America.
- speaker: Interviewer
  text: Okay, did they put him in jail for a while?
- speaker: Respondent
  text: No, he was never jailed. I don't think he was bailed either. I'm not certain how all that went down. I was 13, 14
    years old.
- speaker: Interviewer
  text: Yeah, right, exactly. Well, tell me a little bit you're 13, 14 years old that time. Tell me a little about your early
    schooling, early life in Oakland.
- speaker: Respondent
  text: 'My early life in Oakland was, well, was spent in West Oakland, which at the time, was the largest per capita African
    American community west of the Mississippi. I attended, mostly primarily Black elementary schools: Longfellow, Durant
    Lafayette. Third grade Lafayette, it was preceding parents night, we were to draw artwork representing our family. I did
    a drawing with crayon that depicted a Black man and a white woman and me with red hair, and my little sister, who was
    of mixed marriage, holding my hand. The white teacher, who generally called on me because I was one of the two white students
    she had in the class if she wanted to ask the class a question, ridiculed me in front of the class. "Look at this." Showed
    it to - and the Black kids laughed, too. That sticks with me. So most of my close relationships were with Black youth
    as I grew up, and in my teens, you could not convince me that I was not Black. I tried my best to be a turkey. [laughs]
    Affected certain southern Texas drawl, my style was whatever was current in my African American community, that was my
    style.'
- speaker: Interviewer
  text: Did you get any trouble over that?
- speaker: Respondent
  text: Well, it was good trouble. Got in good trouble with my dad, who took me to task and made it clear to me, I had a different
    role to play in the struggle for equality. I had a responsibility to deny my privilege and to work on my fellow man, the
    white population, who I had little contact with at the time, but as I got on the waterfront, it became clear to me the
    message he had conveyed at that time, and even before.
- speaker: Interviewer
  text: Did that present some tension to you at that time? I mean, you know this is a difficult position to be in, in some
    ways. You know, your parents are left wingers, and then you're in this position vis avis the white community, and you're
    living in the Black community.
- speaker: Respondent
  text: Well, gosh, by the time I was eight or nine years old, I knew we lived an alternate existence, that the FBI [Federal
    Bureau of Investigation] wanted to talk to me at that age, that I was not to get in that car with them four guys in that
    Ford, the crew slowing by me, "Hey little boy, you want to ride home?" Or those that knocked on the door, I was the last
    key kid. Those that knocked on the door. "Can we talk with you or your parents here?" They were all - we just - whatever
    his name was from I Led Three Lives.
- speaker: Interviewer
  text: How did you deal with those guys, what'd you do about them?
- speaker: Respondent
  text: They talk to you. "I can't talk to you." Close the door. Just don't talk to him.
- speaker: Interviewer
  text: Okay, so you get to be - where'd you go to high school?
- speaker: Respondent
  text: Well, we moved out of West Oakland, when I was in the seventh grade. Went in my first year of junior high school.
    The first six weeks of that year were spent at Hoover Junior High in Oakland, which was, again, predominantly Black, maybe
    maybe 15 to 20% white working class and Latino. I went from there to South Berkeley, where I began to attend a very well-integrated
    school, Willard Junior High School. Our neighborhood was very working class but well-integrated. Across the street from
    us, the whole seven or eight houses up the block were Japanese families, all of whom had been interred at one time. On
    our side of the street there was Black and white families every other house practically, probably ten houses up the block.
    I had a very rude awakening when I tried to make friends at Willard Junior High School. I rode my three speed bike. It
    was used when I got it, and it looked used, but rode it and made friends with a white kid who had a nice shiny bike. And
    when school got over, I followed him up to his house, which was up toward the hills, and I had a sandwich which his mom
    made, and she obviously was a housewife, homemaker. Then he followed me down to our house on the flats. And he was very
    interested in our house, which was under remodeling. We made what had been
