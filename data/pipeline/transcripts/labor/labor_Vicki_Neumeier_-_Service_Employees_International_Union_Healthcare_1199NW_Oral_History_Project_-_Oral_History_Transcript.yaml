collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Thank you so much for sitting down with us. First thing we'd love to know is just a little bit about your background,
    your upbringing, and family. What got you into healthcare?
- speaker: Respondent
  text: You couldn't have anticipated that I would become a nurse. In high school, I certainly had no thoughts of that. My
    family was non college educated. My dad was an immigrant from Europe. He came when he was 14, no, maybe 16. He came from
    Germany. His parents - dad was German, mother was English. He married my mother, when he was in the Air Force and she
    was from a farming family in Kansas. They settled in Massachusetts, because that's where my dad's family was based at
    that point. I grew up in a suburban town much like say, Bellevue, Washington, back in the day before it got huge and minorities
    were not really present in that town. It was pretty much a white town and a lot of upwardly mobile families, put it that
    way. My generation was the first generation to go to college. I went to the University of Massachusetts, studied sociology,
    got out of school, was married. My husband and I moved to Seattle so he could go to graduate school and get his PhD in
    sociology. I thought I would get a job. That was 1971. Boeing had just laid off 50,000 people and although signs were
    up in Seattle, "The last person to leave Seattle, please turn out the lights." I finally found a job working in a factory
    soldering projectors. My dad had been involved in some unions, historically - not always - and I thought, you know, these
    guys on this assembly line really need a union. I started talking about that at work, and really got shut down pretty
    quickly. The boss was all over me. Anyway, decided this kind of a job wasn't for me. I decided to go back to school. What
    should I do? I don't know. Maybe go to law school. That's what my sister did. That's what my brother did. I didn't really
    want to be a lawyer. That kind of life didn't interest me. I wanted to kind of be like my mom, a stay at home kind of
    mom, maybe work part time. Then I found out they were giving away buckets of money to go to nursing school because there
    was such a shortage at that time. I thought, Oh, okay, I'll do that. Not only was my tuition paid, my books paid, it gave
    me a living stipend. My call to nursing was not a call to nursing, it was a call to an easier, what I thought, life (laughs).
    Another deception. Before too long, I had a daughter, eventually got divorced, and I was in a position of being a single
    mother. I was a single mother almost right after we formed the union and so grateful that we did form the union. I don't
    know how I could have possibly raised my daughter without the improvements that the union made, without the difference
    that the union made in so many ways. So, 1983-let's see - I graduated from nursing school in 1981, went to work for Group
    Health, had no intention of working anywhere else. I loved the idea of Group Health. No, not 1981, back up - '75 - the
    summer after I started working, there was a city wide strike. The WSNA was the only representation that nurses had back
    at that time, and they called for a city wide strike. We joined even though we had it actually better than most of the
    other hospitals in town anyway. It was a terrible strike. It was very poorly organized. Nobody won anything. People lost
    their positions. If they were on day shift, they got bumped to night shift. It was really a disaster and that experience
    made me think, We really need a real union, not this WSNA. I mean, they're good on professional issues and all that, but
    as a representative body, they were terrible. They were led by managers and academics. They weren't led by the frontline.
    Now, things have changed with the WSNA and they have improved. They had to, they had to improve to keep up with us, basically.
    At that time, they were not a good bargaining unit. When this idea kind of started bubbling up about Let's form a real
    union, I was really supportive at that idea, and did a lot of work. In my area, I was working in the hospital over on
    the Eastside, at the time. I did a lot of work trying to get people to understand why we really needed a real union. We
    voted to decertify the WSNA and to join ourselves in our own friendly union, which we initially called the Group Health
    Nurses Union. There were 1600, something like that, nurses - just nurses. That was the beginning.
- speaker: Interviewer
  text: You mentioned the union brought a lot of changes to you personally into the workplace. What were some of the working
    conditions like prior to the union - what did an average day look like for yourself?
- speaker: Respondent
  text: 'An average day was so unpredictable. I was working in the ICU and the census in ICU varies from zero to every bed
    filled. The acuity of the patients also varies from: you need two nurses for one patient, so you can take maybe two, three
    patients, yourself. Staffing was a huge issue. How many nurses would we need on a day, and that would vary hour to hour,
    if somebody died or got better and moved out. That changed the dynamic of the day. The manager would come along and say,
    "Oh, you discharged that one and that one died. You go home, you''re done for the day." And without pay, or you could
    use your vacation hours. You didn''t have a predictable paycheck. In that time period, you could never count on your paycheck.
    You could also be called in on your day off. And if you had been shorted hours yesterday, of course you were gonna say
    yes. You were basically on call 24/7 to this job trying to get your paycheck. That all changed in 1989 when we went on
    the 39 days strike. One of the biggest wins was the Low Census Fund and they could never send you home against your will
    again. They could ask for volunteers. If somebody wanted to go, great. Almost always somebody wanted to go. But if no
    one wanted to go then they had to find a project for you to do at work. Keep you there and pay you. That paycheck protection
    was huge - huge! - made a huge difference in our lives and we won better wages. In 1989, we settled a strike, but the
    real payoff came the next time we went to the table, when they put more money than we even asked for, out there. You know
    - did not want another strike. We were just shocked at how much they were offering for wages that following session that
    we went to the bargaining table. Amazing.'
- speaker: Interviewer
  text: Would you mind telling us a little bit more about how you found 1199, specifically, from what got you involved with
    that union?
- speaker: Respondent
  text: The organizing committee was looking for the best fit for a union. We wanted a union that was member led. Driven from
    the bottom, not the top. We wanted a democratic union. We wanted a progressive union that thought about things like civil
    rights, equity, and inclusion. We found 1199 New York to be a great model. I wish I'd done the research to remember what
    that organization was that they belonged to, that was - I don't even know if it still exists, but there was another -
    it wasn't SEIU at the time - it was another union. They had some problems and that union kind of broke up and part of
    them went to SEIU, and we joined the ones that went to SEIU.
- speaker: Interviewer
  text: What was your role in that organizing, specifically?
- speaker: Respondent
  text: Talking. Talking to people. Talking to my co-workers. Having meetings, having meetings after work. Going out to breakfast
    - I work night shift at the time - going out to breakfast with people so we could talk about how to organize ourselves
    into a new union.
- speaker: Interviewer
  text: What did you find to be your individual push to organize?
- speaker: Respondent
  text: I was, frankly, disgusted by the failure of that strike, that WSNA led back in '76. Ever since then, I thought, Geez,
    you know, maybe we should be teamsters. Maybe we should..., you know anything but this WSNA thing. I mean, they have their
    good points, but they were not good at being a union. They weren't a union.
- speaker: Interviewer
  text: On the topic of what makes good organizing, what makes bad organizing? What were the strategies that were most effective
    or ineffective throughout your journey?
- speaker: Respondent
  text: We imported an organizer, Glenn Goldstein, from New York. He was absolutely amazing. He probably worked 20 hours a
    day. He was willing to talk to anybody, go anywhere. He had a lot of experience. He knew the stories that he could tell
    about what happened in New York, and what they accomplished in New York. It was storytelling kind of stuff that made people
    listen, to think about how this could be different.
- speaker: Interviewer
  text: And what led up exactly to the strike. What did it look like behind the scenes?
- speaker: Respondent
  text: 1989 - we were frustrated at the bargaining table. We wanted to make progress. We had formed this union to make progress
    and we weren't getting there. We wanted some changes that were basically unheard of. We kind of hit a brick wall and we
    were talking about this idea of low census is wrong. You can't treat a professional registered nurse like you treat someone
    who picks grapes for a living. If the grapes aren't ripe, you don't work, right? That's not the kind of atmosphere that
    we wanted for our nurses. We wanted them to have a professional job and that included predictable pay. There were a lot
    of issues. The money was terrible. When I started my career in nursing, a checker at Safeway across the street made more
    money than me - as a professional nurse. They had a union at Safeway, UFCW. They were on strike the summer I started my
    career - for more money - and they made more than I did as a professional nurse. We knew we had a long way to go, and
    we were just kind of hitting this brick wall. No, it's always been this way. I'm not gonna change that. You have it slightly
    better than Swedish or Virginia Mason. And we did! We definitely had better healthcare. We had zero cost for health care-zero-no
    premium, no copay, no nothing, at the time. For you and your spouse and your family. Nothing. We worked at Group Health.
    They did have a point. We did have better in that way, but we were looking for more. We knew the only way to do it is
    to stand up and it took 39 days. That's the year we won the Low Census Fund and it changed the whole idea of how you could
    protect your paycheck. It made a huge difference.
- speaker: Interviewer
  text: You mentioned SEIU having a certain appeal as a union for you. Being more social justice oriented and things like
    that.
- speaker: Respondent
  text: No, no it wasn't SEIU at the time. 1199 New York.
- speaker: Interviewer
  text: 1199 New York was appealing to you because of the way that they organized. I'm curious, what did you witness, the
    industrial organizing model? How did that play out for you?
- speaker: Respondent
  text: We were just organizing nurses at that moment, but the intent was to go forward and organize. The other folks were
    in a different Local, the Service Group was in a Local Six. And then we did the new strength and unity plan where we brought
    everybody in an institution to the same local. Organizing the whole house, kind of thing, was in our minds.
- speaker: Interviewer
  text: And what about that appealed to you?
- speaker: Respondent
  text: Stronger Together. We knew that we would be stronger together. We haven't had to go under any long strikes at Group
    Health - now we're Kaiser - I think we've been on the picket line, probably five times over all. One day strike, two day
    strike, five day strike, strike over on the Eastern Washington side.
- speaker: Interviewer
  text: Very cool. What difference did you see you make specifically in the membership and the quality of care subsequently
    after the formation?
- speaker: Respondent
  text: Staffing is always the biggest issue in healthcare. If you don't have the right staff, you can't take good care of
    the patients. We had a joint Labor Management Committee that dealt with staffing, and was pretty effective over the years.
    I mean, we would come to the committee saying, Look, this is what we need. This is why we need it. And eventually, we
    almost always made some changes to improve things. So I think the work we did on staffing, probably the biggest success
    in terms of care for the patients.
- speaker: Interviewer
  text: Absolutely. Reflecting on all of those, what do you think were the specific moments for you that stand out in your
    mind along this journey of organizing Group Health?
- speaker: Respondent
  text: Well, it was very significant when we joined SEIU. That was probably the year before we went on that strike in '89.
    Because without the help of SEIU, which had the resources to help us have a hugely effective strike, I don't think we
    would have succeeded. I don't think it would have been as effective. The alignment with SEIU was huge. And then the -
    what we call the Nurse Wars when other hospitals decided they wanted to join the union, too. We were suddenly in this
    timeframe where if we didn't jump in and help organize them, they were going to go with somebody else. We wanted them
    to join us.
