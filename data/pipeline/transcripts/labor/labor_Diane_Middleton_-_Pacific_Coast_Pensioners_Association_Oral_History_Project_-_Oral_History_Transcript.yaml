collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me a little bit about your parents, about their background, about their jobs and their interests?
- speaker: Respondent
  text: Sure. My father--they've both passed now. My father was Italian, born and raised in St Louis [Missouri]. He was a
    musician. His parents were immigrants, and he moved to Detroit in the early 1940's and met my mom. My mom is Polish. Her
    entire family worked in the auto factories from the very, very early days. Her parents started to work at Dodge Main in
    1917 when it still made bicycles. So we had a very traditional family. My dad had a business. It was a music studio, and
    at one time it was the largest music studio in Michigan. And of course, it was in a Polish-Ukrainian neighborhood. Most
    of the people studied accordion. So that's--we lived above the business, which was kind of an unusual thing. And my mom
    worked in the business and worked afternoons. So that was me growing up.
- speaker: Interviewer
  text: You mentioned the auto industry. Were your relatives and friends and so forth affiliated at all with United Auto Workers?
- speaker: Respondent
  text: I'm sorry, I can't hear you.
- speaker: Interviewer
  text: Oh, you'd mentioned that your family on your mother's side, I believe you said, were auto workers.
- speaker: Respondent
  text: Yes, they all worked in the auto factory, and they all were very active in the United Auto Workers. And it was a very
    great influence on me that all of the relatives--my dad's family was in St Louis, so I'd only see them once a year, but
    all of my mom's relatives would recount their stories. You know, my aunt's working in a certain section of the plant,
    and they'd describe walking the picket line to try and get a pension, you know, many, many years before. And they regaled
    me with their stories of supporting the union and how much the union meant to them.
- speaker: Interviewer
  text: That's great. Can you tell me a little bit about your youth? You mentioned kind of an important sentence about you
    being a young woman searching for identity. Which side are you on, which side are you on? Can you fill us in a little
    bit about that?
- speaker: Respondent
  text: Let me go back a little before that. This was the 1940's and the 1950's. Women got married. They raised a family.
    They didn't go to school. That was the tradition in my family. And likewise for young men, they were taken to the job
    by their fathers. My mom had two sisters and one brother, and when her brother turned eighteen, my grandpa took him to
    the factory and said, "My kid's eighteen. What do you have for him?" And he started working at the same place my grandpa
    did. So that's kind of what the expectations were. Because my parents worked nights, because this music studio was open
    from two in the afternoon till ten at night and we lived above it, I was sort of a latchkey kid, except I didn't need
    a latchkey. I just walked up the stairs. But I was on my own most of the time. And a very, very big influence in my life
    was the corner. I didn't have a corner store, I had a corner library. A block from our house was a public library. And
    in those days, I mean, my family never bought books. I went to the library and read them there. And I met an amazing woman
    named Clara [Stanton] Jones who became a really close friend. She was the librarian, and she would always talk to me about
    what books I was reading. And from a very early age, she told me, "You're going to go to college. You're really smart,
    and you're going to go to college." And nobody in my family had said that. I met her when I was probably ten years old,
    and the reason she was such an influence in my life is because, of course, Detroit was quite segregated back in the forties
    and fifties, and we lived in a Polish-Ukrainian, which is to say white, neighborhood. Clara Jones was African American,
    and she was the smartest person I had ever met. As I grew into my teens, our relationship of her being a mentor, it became
    even deeper, and she invited me over to her home to meet her daughter. So I got to meet her daughter, who was about a
    year older than me. She lived on the other side of town. And interestingly enough, she lived in a much nicer area, because
    we lived in a factory neighborhood, and she lived in a neighborhood where skilled workers would live. So the houses were
    a little nice. And again, we lived above my dad's store, so it was real different from all the other kids. Anyway, in
    the course of this relationship with Mrs. Jones, as I got to know the family, I mean, I was amazed because her husband,
    who had a PhD, was working in the post office, because that was the only place an African American man could get a job
    in the fifties. So it was a tremendous influence on me. And of course, I assumed that all Black people were really, really
    smart, because this was the only one I met, and she was a lot smarter than everybody I knew. So it was a wonderful relationship.
    This woman went on to become the first African American woman who was the head of a major library. She eventually became
    the CEO of the Detroit Public Library, but she had a tremendous influence on me. That was definitely the reason I went
    to college, and I remained friends with her daughter until I started dating in my teens and double dating with Vanetta
    and her husband.
- speaker: Interviewer
  text: That's great. Around that period of time, I gather there's a young Japanese group associated with a guy named Warren
    [?Furutani?]. This is probably in the 1960's. You've mentioned that as also being something important in your early years.
- speaker: Respondent
  text: Much, much later. When you say there was a group, I think you're probably talking about a group--if you're talking
    about Warren [?Furutani?], that would have been in the very recent years.
- speaker: Interviewer
  text: That would have been in recent years?
- speaker: Respondent
  text: Yeah, I mean like five years ago, ten years ago to now.
- speaker: Respondent
  text: Go back in Detroit, sort of chronologically, because I think that's what you're doing. The next thing that happened
    is, as I graduated from my all girl Catholic high school, I was--I mean, the accepted thing to do was to get married.
    Met my boyfriend when I was fifteen, my first husband. And interestingly enough, well, he was the first boy I ever met
    that read books. He lived on the other side of town and went to an all boy Catholic high school. And you know, I started
    dating him when I was fifteen, family friends, that kind of thing. Got married when I was nineteen. At that point I had
    started Wayne State University. We were married for five years, and by the time I was in my mid-twenties, actually, I
    was like whatever 1968 would have been. I was twenty-five years old. We separated, wonderful man. We just were too young
    when we got married. And of course, I did have a son who was born in--[I] was married in '63, he was born in '66. And
    you know, it's just I could see myself becoming my parents. And that was the period of the greatest questioning, when
    I sort of asked, "What is this all about?" And it was as a result of Mrs. Jones and all the books she had me reading and
    so on, I sort of came to understand, wait a second, there's got to be more to life than finding one man, getting married,
    having kids and having a nice little life. This is a big world. By this time, in the late sixties, there was a question
    of women's rights, civil rights, anti-Vietnam War, all sorts of things were happening that I wasn't part of in Detroit,
    but I wanted to know about. And it sort of all came down to which side are you on. And that became a fundamental turning
    point for me, when I had to decide if I wanted to cross that line and look at the bigger world around me and what part
    I would play in it, and how I would make a contribution.
- speaker: Interviewer
  text: Great. I want to ask you just a little bit about Wayne State. You went to Wayne State for college. What did you major
    in?
- speaker: Respondent
  text: Interesting. When I started, I majored in history and sociology, but it was a real illustrative lesson that I share
    with kids today. I never thought about, what am I going to do with a degree in history and sociology? What will it equip
    me to do? And I sort of thought sociology would be this wonderful world of interacting with people and learning about
    groups. And of course, it wasn't. As I took more advanced sociology courses, I found out that what I'd be doing is designing
    studies and helping people check boxes. And I really didn't want to do that. So in the interim, I graduated high school
    in 1961, started college, got married in '63, went to work, because in those days, in our--and I say this somewhat sarcastically,
    there might be good things to be said about Catholic school education. I certainly had a fine education, learned how to
    read and all that sort of thing, but it was this odd situation where I realized, you know, when I was married, I was going
    to have to get a job. Both my husband and I were working, and although I had only eighteen months of college and not a
    single class in teaching, I got a job in a Catholic school teaching sixty first graders with no experience whatsoever.
    So I did that for a couple years, and by the time my husband and I separated in 1968, I had a year and a half of college
    and nothing else, had taught for a while. So it was the height of the Vietnam War, and an offhand remark, a friend said,
    "You know, what are you going to do with this history degree? You like history, why don't you go to law school? Law school
    is studying about history. That might be a good fit for you." And at the time, Wayne State had a program where if you
    completed three years of college, your fourth year of college, or your first year of law school would serve as your fourth
    year of college and give you a BA degree. So that's what I did. Never took the LSAT. I went to the university, and in
    1968 when I started Wayne State Law School, there were four women in my class of 125. And when I was applying for admission,
    I said, "Look, I'm newly divorced. I'm going to get, which was then the magnificent sum of $300 a month in alimony for
    nine months. So this first year of law school, I have to go to law school, because I'm only going to get this money for
    nine months, and it will enable me to not have to work full time." So even though I hadn't taken the LSAT, I think they
    probably were desperate to fill the seats, because this was the time when young men were being drafted. So I got into
    law school in 1968, never having taken the LSAT, one of four women, and finished law school in 1971.
- speaker: Interviewer
  text: What was it like being one of only four women in law school?
- speaker: Respondent
  text: Well, since I was a somewhat sheltered young woman--started dating when I was 15, married, when I was 19--I hadn't
    dated a lot. So to be one of four women and a class of 125 men, I will say that that first year of law school, the main
    thing that I did was go to the race horse and go to the track during the day to see the race horses, and then go to the
    track at night to see whatever they would call the trotters, they were horses that, you know, pulled these little not
    chariots, but whatever. And I played cards. I played bridge all day. And everybody had always said, "Oh, this is going
    to be hard, going from the local high school to the regional high school, going to college." And I always had all A's.
    So I thought, no problem, of course I'm going to get good grades. And I wound up being the second highest person on probation.
    So I thought after that first year, okay, a little less card playing, little less going to the track, going to buckle
    down. So I did, and I finished school. And it was really sort of this interesting experience, you know, being surrounded,
    being so outnumbered by men. And I did have to work. And I had interesting jobs going through law school. I mainly worked
    as a model in the auto shows, I was a narrator. So I put myself through law school working the auto shows in New York,
    Chicago, and Detroit. So that was kind of interesting and endeared me to my classmates, if you will, because it was a
    somewhat unique job.
- speaker: Interviewer
  text: It's remarkable.
- speaker: Respondent
  text: It's also, more significantly, where I had my first encounter with the National Lawyers Guild.
- speaker: Interviewer
  text: Yeah, I was going to say the National Lawyers Guild Labor Committee, you were there, gathered for five years?
- speaker: Respondent
  text: Yes, what happened was when I was in law school, the guild had a student chapter. And I, of course, had never heard
    of the National Lawyers Guild, but I was quite impressed when I did hear about it. Sufficiently impressed that when I
    graduated law school in 1971, I was ready for a change. And of course, in 1971, you were girl from Detroit, and I grew
