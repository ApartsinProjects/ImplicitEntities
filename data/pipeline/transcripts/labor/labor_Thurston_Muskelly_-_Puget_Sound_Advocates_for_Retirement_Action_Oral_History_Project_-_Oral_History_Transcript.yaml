collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Maybe we'll start with some general history of your family. Could you tell us your full name and a little bit about
    your family history - where your grandparents and your parents were born, and a little bit about them?
- speaker: Respondent
  text: 'My name is Thurston D. Muskelly. I was born in Union, South Carolina, and was educated in Salisbury, North Carolina.
    My early education was in Union, South Carolina. My grandfather built a church and a school. My mother''s name is Eloise
    Muskelly. My father''s name was Edward Muskelly. My father was an engineer for the Southern Railway. He operated Engine
    #34. My mother was a professor in English. She taught at Livingstone College in Salisbury, North Carolina. My mother was
    6''6" and weighed 250 pounds and wore a size 13 shoe. My father was 6''7", my height. All of my education was created
    in Salisbury, North Carolina. I had one sister and one brother, who are deceased. I''m the oldest child. I went into the
    Navy in 1950. My mother and my father signed for me to go into the Navy. I was shipped from Salisbury, North Carolina,
    to San Diego, California, for boot training. After I left boot training, I was put on the USS Albany, which is a heavy
    cruiser, and I was shipped into Korea. I stayed in Korea for two and a half years. In the first part of 1953, I was given
    shore duty, and I was shipped into Pensacola, Florida. There is a naval air station base there, Mainside. After I was
    shipped into Florida, I met my wife, who is Joyce C. Andrews. I went into a place of business where she was working. She
    was a carhop, the one that brought the tray to the car. It was Joe Martin''s Barbecue operation. She brought me my serving
    of a barbecue sandwich and I said, "You''re a cute little thing." She said, "You''re a foreigner, but I''ll talk to you.
    I''m not afraid of you." That''s how our courtship started. For the last two days that I was off of duty, I would go and
    get a barbecue sandwich. I asked Joyce''s mother for her hand on July 10, 1954. We were married in Louisville, Mississippi,
    in 1954. In 1955, I was shipped out from Pensacola, Florida, to Norfolk Naval Air Station in Norfolk, Virginia. By the
    good grace in God, it was the same I just left, the USS Albany. I was stationed in Norfolk, Virginia, for three years.
    I was discharged in Norfolk, Virginia. Joyce and myself made our home in Salisbury, North Carolina, which is my home.
    I worked for the VA Hospital for a year and a half. I left the VA Hospital after a year and a half and went to work in
    Youngstown, Ohio, as a crane operator in a steel mill. It was called Youngstown Tubing Company. I worked there for four
    years. They had a strike. My brother-in-law at the time was a private tutor in Seattle, Washington, in English. He wrote
    my wife and asked her to come out here for a vacation. She came out here and she loved it so well that she said, "Thurston,
    why don''t we move to Seattle?" We moved to Seattle in 1958. I went to work for the US Public Health Service Hospital
    in 1962. I went to work there as a janitor. I was making $1.73 an hour. After eight months, there was a German guy by
    the name of Mr. Munks. He came to me and said, "Mr. Muskelly, with your resume and with your knowledge and everything,
    and your educational background, I''m going to bring you into engineering." So, I worked as a janitor for eight months
    and I moved from a janitor to an engineer within eight months. I stayed as an engineer until we lost a fight in saving
    the US Public Health Service Hospital. My wife and I worked together on everything. I might be wrong, but in 1967 or 68,
    I met David Loud and Tommy Byers. There were a lot more but I can''t recall their names, but anyway, we met in this living
    room.'
- speaker: Interviewer
  text: How did you meet them?
- speaker: Respondent
  text: They were interested in healthcare. They were young, ambitious, and wanted to see something change in healthcare in
    Seattle. We met in this room here for, I guess, two or three years or longer. We started working on healthcare, and then
    we got a new director over there at the hospital. His name was Dr. Willard Johnson. Willard was out of Texas. He was a
    really humble man. He was real good. He understood human needs and that type of thing. He called me into his office one
    day and he said, "Thurston, I know that you're in charge of the union here at the hospital. I want to ask you for your
    help." He discussed that he had been in a meeting with the free clinics, and he had five percent of his hospital budget
    that he could donate to healthcare for people that didn't have healthcare and who couldn't afford to pay for healthcare.
    He would use the US Public Health Service Hospital as a backup for x-rays and lab work and for treating people that didn't
    have money for healthcare. I told him I would help him.
- speaker: Interviewer
  text: Can we go back for a little bit? You said you were in charge of the union. Can you tell us anything about how you
    got involved in the union and where that led you?
- speaker: Respondent
  text: A friend of mine - he's dead now - his name was Donald Fleets. He was in the union and they felt that the union was
    not presenting itself to the hospital administration what the needs of the employees were and that type of thing. He told
    me, "Thurston, you could be jeopardizing your job." I came home that night and I talked to the wife and the wife said,
    "Well, you can always find another job." So, I ran for president and I won. We started communicating with the administration
    at the hospital. We started telling what could be best for the employees and the patients. That's how it all started.
    Then Dr. Willard Johnson came. I realized that he was a Southerner, but he had great human touches. That's why I went
    along with him on being the president of the union. I'd already met Tommy, I'd met David, and I guess they can fill in
    with the other guys. I think that Bob Kaplan was the lawyer. He was a Jewish guy. We all met here. That's how I got involved.
    My job to Dr. Willard Johnson was to keep the groups informed, keep them up to date of what was going on, and how they
    could help to sustain this fight. That's what my involvement was.
- speaker: Interviewer
  text: Let me interject. The fight, which was really how we came to meet Thurston, was that the US Public Health Service
    Hospital here and all of its sister hospitals around the country were under a fairly immediate closure threat. The government
    was trying to close out that whole system of hospitals. As Thurston explained, the incredibly important role that Willard
    Johnson played was to open the doors of the hospitals to referrals from the free clinics for things that the clinics could
    not provide, with the idea that if the community at large felt that it had more of a stake in the fate of the hospital,
    there might be a way to build the political opposition to closure. The second thing he did was he introduced representatives
    of all the beneficiary groups of the hospital - the merchant seamen, the retired military, the Native Americans, the government
    employees and the free clinics - all to each other, and gave us a little encouragement. And, yes, we formed a coalition,
    the Public Healthcare Coalition. From its inception in 1971, for many years after, past when the hospital was no longer
    federal in 1981, Thurston and Tom and I were on the steering committee of that coalition, along with others representing
    all the groups. That was the context for closing Public Health Service, and we fought against that quite successfully.
    Ten years. We held off the wolves for 10 years. We had enough support in the community around the country that in 1981,
    when the Reagan administration was finally able to close the hospitals, we were able to cut a deal where the operation
    of the hospital could be taken over by an entity created by the city of Seattle, and Tom was very instrumental in creating
    the Pacific Hospital Preservation & Development Authority [PHPDA], which assumed operation of the hospital in 1981. That
    story continues to this day, but that was through 1981, so we worked together with Thurston hand and glove for years and
    years and years.
- speaker: Interviewer
  text: I imagine, Thurston, it took a lot of getting to know elected officials in your work.
- speaker: Respondent
  text: Well, it was. Just like I said before, Maggie is the greatest senator in my time, and Maggie is the greatest senator
    of all time.
- speaker: Interviewer
  text: Can you say who that is, for the record?
- speaker: Respondent
  text: Yes. He had feelings, he had charisma. He was just an outstanding senator. He could work with anyone. And he had patience.
- speaker: Interviewer
  text: And he was head of the Appropriations Committee. [laughing]
- speaker: Respondent
  text: Yes, he was head of the Appropriations Committee. He didn't guarantee anything. He didn't give you any hope. He would
    celebrate when you celebrated. He was quite a fellow.
- speaker: Interviewer
  text: You got to know him really well.
- speaker: Interviewer
  text: Just for the audience that might not know his name, could you tell us his name?
- speaker: Respondent
  text: His name was Warren Magnuson, and they called him "Maggie" for short. He figured that the employees at the hospital
    would go the extra mile for the people that couldn't afford healthcare. He gave them incentives. He set up a program called
    the Upward Mobility program. It was funded by the federal government. The hospital employees would have to file for it.
    The executive board would select individuals that would attend college to advance their education. But we didn't use their
    names, we used alphabetical order - A, B, C, D and on down the line. We didn't know their names. A lot of them got their
    PhDs. A lot of them went from LPNs to RNs. A lot of them went from nurse's assistant to LPNs. Maggie made arrangements
    so they would be compensated - paid for their education if they were willing to go to school at night. He was a great
    humanitarian. He was a great man. He ran the Washington delegation with an iron hand. What I mean by iron hand is everybody
    was on the same concept. Everybody knew what Maggie was going to fight for from the House of Representatives to the Senate.
    He kept them informed. He was a great man of communications. I guess that's where I learned a lot of it is the more people
    know the truth, then the truth will come out. I'm proud to be here. I'm 86 years old. Me and my wife were married 64 years.
    This would have been our 65th but she passed away. If this house could talk, it would really tell you somethings. But
    unfortunately, it can't talk. We gave a party here for Charles Royer. He became mayor. We also had other delegations from
    Washington that met here. I was telling you about Maggie. We ran out of vodka and Maggie told me, "Thurston, we're out
    of vodka. What's wrong?" I said, "I have to go and get some, Senator." I ran down to Second Avenue and a policeman, he
    was there, and he said, "Where are you going with all this vodka?" I said, "Senator Magnuson is down at the Catholic Seamen's
    Club." He said, "Where is your car?" I told him where my car was, and he drove up and he escorted me back to the Catholic
    Seamen's Club for Maggie. Even though Maggie loved to drink - everybody loves to drink, I love to drink - he still took
    care of business. Business came first. He was just an outstanding senator.
