collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Mr. Rinehart was president of the corporation which bought the Villa Alexandria property in 1928 and placed it on
    the market for subdivision and sale.
- speaker: Respondent
  text: His original Alexander Mitchell purchase consisted of one hundred and forty acres, and was a part of the original
    Craig Spanish grant.
- speaker: Respondent
  text: When I and three associates scoured the tract in 1926, the Villa Alexandria residence and other buildings were in
    a state of disrepair. The property had been vacant for some time, had been partially wrecked by vandals, and in 1927,
    to prevent further depredations, our company, the Villa Alexandria Corporation, had all buildings completely demolished
    with the lumber and other materials removed from the premises.
- speaker: Respondent
  text: The property still lacked purchasers, and during that year, 1927, it was turned over to the Telfair Stockton Company,
    who subdivided it into a series of waterfront locations. John H. Swisher, the cigar manufacturer, purchased the original
    homesite, erecting his magnificent Thalish type residence. Later his son, Carl Swisher, secured the adjoining lot, and
    another beautiful home arose. These two purchases started a demand for homesites in that area and it has subsequently
    developed into one of the highest class residential sections in the vicinity of Jacksonville.
- speaker: Respondent
  text: In the transaction, however, my associates and I lost a quarter of a million dollars.
- speaker: Interviewer
  text: Do you regret it?
- speaker: Respondent
  text: Step back to the middle office door and look through this window towards south Jacksonville.
- speaker: Respondent
  text: I did as he directed, and from this office window on the 16th floor of the Lynch Building, the city on the south side
    of the St. Johns was revealed like a framed picture. The broad bend in the river, the magnificent bridge connecting Jacksonville
    with South Jacksonville, the palatial homes lining the western waterfront, the various subdivisions Granada, Villa, Avondale,
    Colonial Manor, San Jose - the business section; and to the east the more modest homes of the St. Nicholas section, large
    passenger and freight boats coming up from the Atlantic, others departing with cargoes for world ports; further on estates
    like 'Keyetom,' 'Tilandia,' and others, with the broad ribbon of Atlantic Boulevard to the beaches separating the two
    sections.
- speaker: Respondent
  text: No, there are no regrets. Pioneers do not always win financially. Mostly, they pave the way and others reap the financial
    profits. But as I look through this window, I feel that a series of parties who had the vision I so manifested today,
    and I am glad to have had a part in developing the beauty of the south side. We were just a little ahead of the times.
- speaker: Respondent
  text: I do not remember much of the personal history of the original Alexander Mitchell or his son, A. B. Mitchell. The
    senior Mitchell was one of the early settlers. One of his activities was the organization of the Chicago, Milwaukee &
    St. Paul Railroad, with headquarters in Milwaukee.
- speaker: Respondent
  text: The son, A. B. Mitchell, was a banker in Milwaukee, also at one time was a U.S. Senator from Wisconsin. He was twice
    married. David Mitchell, a son by his first marriage, lived with his grandmother, who supervised his education, and otherwise
    cared for him. He is still a resident of Jacksonville.
- speaker: Respondent
  text: A daughter of A. B. Mitchell's by his second marriage is now Mrs. Jackson. She lived for many years in the Canal home,
    where she met and married her husband who is an official of the United Fruit Company. They now reside in Boston. She is
    a half-sister of David Mitchell.
- speaker: Respondent
  text: It is reported that Mrs. Mitchell lived on an income of around 200,000 per year, with many servants to carry out her
    lavish tasks of entertainment. She was very charitable, however, being especially interested in St. Luke's Hospital, which
    she helped to establish, as well as All Saints' Episcopal Church in south Jacksonville.
- speaker: Respondent
  text: The collapse of the bank in which her son was interested in Milwaukee entailed her property here to a considerable
    extent, so that in her reduced circumstances she had to let all of her servants go, carrying on with one old colored yard
    man.
- speaker: Respondent
  text: When we purchased the property in 1926, it was still much encumbered, and we had difficult time securing a clear title.
- speaker: Respondent
  text: I came to Jacksonville in 1889. It was then a sprawling village. The most populous residence section was between Pima
    Street (now Main) and Liberty Street on the east; and from Duval to Bay, in the same boundaries.
- speaker: Respondent
  text: These streets were all sand - there were no paved streets. In the early 1890's, Bay Street was paved with cypress
    blocks and it was considered a very fine improvement, but proved quite disappointing, as whenever it rained the water
    formed pools and the paving blocks would rise and float around in great style. Finally late one summer there was terrible
    rainfall over a period of days and the Bay Street paving blocks were washed off into the St. Johns River.
- speaker: Respondent
  text: Later Main Street, or Pine Street, as it was known then, was paved with brick out as far as Eighth Street. The old
    streetcar system used to run out that far. There was a row of palmettos planted on each side, and the drivers of the surreys
    which were used to carry the tourists of that day about town told them - 'Those palmettos were planted in that fashion
    by the Indians to mark an old trail.'
- speaker: Respondent
  text: 'The S. B. Hubbard home was on the corner of Bay and Liberty Streets, and these same drivers, in passing this home
    would say: ''That''s where Old Mother Hubbard lives.'''
- speaker: Respondent
  text: In the late 1880's there were only four families who had carriages and teams worthy of note. One of those was owned
    by S. B. Hubbard, the founder of the Hubbard Hardware Co. The carriage was the least of the kind for that period, the
    horses were matched bays, and the harness metal was silver-plated.
- speaker: Respondent
  text: It was an elaborate turnout and attracted much attention, when the family, a colored man in the driver's seat, used
    to ride out.
- speaker: Respondent
  text: To contrast that period with the present time, there are 80,000 automobile owners registered in Duval County.
- speaker: Respondent
  text: Bicycling was a popular pastime. I belonged to a club of a dozen or more riders and we used to ride out the Bay Street
    route, which was shell-paved from the end of the brick paving at Eighth Street, on over to Talleyrand Avenue and back
    by the river road through Fairfield. It was known as the 'loop' and did measure exactly ten miles for the round trip.
- speaker: Respondent
  text: I still have confidence in the judgment which made me select Jacksonville for a home, believing it good for the future,
    and the immediate prospect is exceedingly bright for the further advancement of Jacksonville and Duval County in particular,
    Florida in general.
- speaker: Respondent
  text: I am a Democrat and vote my party ticket. I believe in the Alma Democrat and President Roosevelt, who is earnestly
    trying to pull the United States out of the rut and better the living conditions for all of her citizens.
