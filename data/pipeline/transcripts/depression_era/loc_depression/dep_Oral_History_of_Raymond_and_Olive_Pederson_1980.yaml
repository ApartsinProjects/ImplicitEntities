collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Okay, I think this afternoon let's start by talking first about what you were doing prior to coming to the area and
    how you became interested in that particular area near La Quinta.
- speaker: Respondent
  text: Well, I don't think he will be able to talk to tell you anything.
- speaker: Interviewer
  text: What you want. His main interest was to raise flowers.
- speaker: Respondent
  text: He was looking for a place where he could raise flowers through the winter for the wholesale market. And he decided
    on that place and the man who had homesteaded our piece was Frieda Marshall's husband, George Marshall, and he or his
    father had been an associate of, was it Jacqueline Cochran or Jacqueline Cochran's? I guess he had worked for her at some
    other place because he was the one who was responsible for Jacqueline Cochran coming into the Valley, but he had homesteaded
    our property. And my husband bought it from him.
- speaker: Interviewer
  text: Had it homesteaded more than just your section?
- speaker: Respondent
  text: I don't think so. And Jack Berkett's grandfather had homesteaded the other eighty acres, and we bought eighty acres.
- speaker: Interviewer
  text: So you were right next to the Berkett ...
- speaker: Respondent
  text: Yes. And there was three hundred and some acres next to us, to the south, and I don't know who owned that at that
    time. A Mr. Cook had it later and sold it for two hundred dollars an acre.
- speaker: Interviewer
  text: Was Mr. Cook the one who had property in Indian Wells?
- speaker: Respondent
  text: No. He was a nurseryman that lived in Montebello. I don't know whether he had dreams of raising flowers down there
    or not, but he had it quite a number of years.
- speaker: Interviewer
  text: And then it was sold for that price and I guess it's worth quite a number of thousands of dollars today.
- speaker: Interviewer
  text: Now when did Mr. Peterson come to the area and what was he doing, where was he living at the time he bought the property?
- speaker: Respondent
  text: Well, you were living in Beverly Hills at that time, weren't you? His father was a building contractor up there and
    he was working with his father. And he also had a friend that was, what was his name? Jimmy. It was a French name, but
    I can't remember it. And he had been to Mexico with this man and had flown this man's airplane for him. And they landed
    right, did you land on the property?
- speaker: Interviewer
  text: You landed on the property?
- speaker: Respondent
  text: Well, it was the property of where the ... Yes. Well he bought that property first. That was a piece that was next
    door to Frances Hack. Do you know her place? And then later he bought the eighty acres and that was where he built a home.
    And then after we were married, that was where we lived. And the hundred and sixty acres he sold off in smaller pieces
    over the years. We don't have any of that now.
- speaker: Interviewer
  text: So you bought eighty acres where you landed the plane.
- speaker: Respondent
  text: No. No, a hundred and sixty acres.
- speaker: Interviewer
  text: Hundred and sixty.
- speaker: Respondent
  text: And then for quite a number of years that same piece, after he bought it, was used by La Quinta Hotel as the landing
    strip for their guests that flew in. And I don't think it's been developed yet, but the people that own it have dreams
    of doing something if they ever get the storm drain through there because it does go through part of that property.
- speaker: Interviewer
  text: Did you buy that property with the thought in mind also of raising flowers on it or using it as a landing strip?
- speaker: Respondent
  text: I went there, what happened, I went to Mexico and on the way home we had to land somewhere and in all the Valley that
    was the only place and then Walter Morgan took us to Indio and...
- speaker: Interviewer
  text: Did you stay overnight in Indio?
- speaker: Respondent
  text: No, we stayed out at the ranch, his ranch. We slept at his place. [chuckle] Walter Mai was the owner of the hotel
    and we came back, that was in 1923.
- speaker: Interviewer
  text: Did you build the house yourself?
- speaker: Interviewer
  text: Was it difficult to get materials?
- speaker: Interviewer
  text: It was an adobe house. The brick blocks were made right there. I made a box and everything like that.
- speaker: Interviewer
  text: Did you have help?
- speaker: Respondent
  text: Asked for some help.
- speaker: Interviewer
  text: Was Joe Valansuela back at the La Quinta Hotel at that time making tile?
- speaker: Respondent
  text: No. He worked later. He came in when the hotel was already built, didn't he?
- speaker: Interviewer
  text: Yes. And made the tile for the hotel.
- speaker: Respondent
  text: Yes. Is he alive yet?
- speaker: Interviewer
  text: I don't know that he's still, does he still around there?
- speaker: Respondent
  text: No, he isn't down there. The last that we heard of him, he was in a place called Aberhill that is near Corona and
    they make tile over there of all kinds. They have whatever you call the mining for the clay, clay pit over there, but
    now, whether he's still alive, we haven't heard in years. He is pretty old and he was twenty years old, older than I am.
    I knew him when he worked for me.
- speaker: Respondent
  text: Yes. He worked for me.
- speaker: Interviewer
  text: Was he working for you when he made tiles for everyone in the Valley area?
- speaker: Respondent
  text: No. Well, he just made the tiles for the jobs that you did.
- speaker: Respondent
  text: He built the home that Jacqueline Cochran has now. It was built for Steve Griffith, a paving contractor, and then
    it was sold to Kirsteiner. And then I understand that Jacqueline Cochran bought it from Mrs. Kirsteiner, not too many
    years ago, and then he also built a home for Zane Grey down in the Oasis area. And I guess the tile was used on both those
    houses. Well, that's what he means when Joe worked for him.
- speaker: Interviewer
  text: Who were your neighbors?
- speaker: Respondent
  text: There was just one.
- speaker: Interviewer
  text: Who was that?
- speaker: Respondent
  text: Well, there were up where the hotel is or right in that area there was Walter Morgan. He had homesteaded that ground
    and then built the hotel. And then there was a Sid Ices, I believe his name is, I-C-E-S. His brother was a secretary in
    the U. S. Government to some department, but I don't know whether it was agriculture or what department it was, and then
    a relative of his or his wife's by the name of Vaden owned a place and had planted trees there. That is just at the entrance
    going into the tract of La Quinta. It would be southwest of the hotel or southwest corner. I was down there a year ago
    last April and I think part of that storm drain was going through that area. They were taking out trees at the time and
    now whether homes had been built or whether it was just getting ready for the storm drain, I don't know. But up until
    two years ago, it still was a date ranch and he had planted a good many of the dates there. But there were those three
    that adjoined each other up by the hotel.
- speaker: Interviewer
  text: There was only about four people in the whole Valley and Walter Morgan and Sid Ices and...
- speaker: Interviewer
  text: That was in 1925.
- speaker: Respondent
  text: They lived around the hotel or where the hotel was eventually built. Then there was nothing between there and where
    our property was. And then going north the Berketts were next to us. And then a little further north and on the opposite
    side of the road was Point Happy that the Clarks owned. And that was all there was up in that area, so we knew who people
    were going to visit after the hotel was closed. Now the hotel always closed in April and from April until October or November,
    anybody that came down that drive was going to visit one of us back there, one of five people.
- speaker: Interviewer
  text: When did the Clarks build that ranch at Point Happy? Were they there when you...
- speaker: Respondent
  text: They were there in 1943.
- speaker: Interviewer
  text: Before you bought.
- speaker: Respondent
  text: Before I came. There was one other ranch that water come down and washed everything out here.
- speaker: Interviewer
  text: Well, but you had to go in on Avenue 52 to get to that place, didn't you? You couldn't get to it from our angle.
- speaker: Respondent
  text: That would have been somewhere close to the home ranch.
- speaker: Interviewer
  text: Do you know where that is?
- speaker: Respondent
  text: Well, that's on Avenue 52 and Washington. When you go straight down Washington, you run right into that place. Mr.
    Dawlings is the manager there. Now he's been there for a good many years. Not as long as we were there, but he can tell
    you a lot of the past history of the place.
- speaker: Interviewer
  text: Now is that the place that's older and it's kind of tucked in at the end of Washington Street here?
- speaker: Respondent
  text: Yes, it's right at the end of Washington. I think their entrance is right there. If you didn't make the turn, you'd
    go right into their place. Just three or four hundred feet in. And that house was built in 1925 because I put flowers
    up. I did it so I could build this house.
- speaker: Interviewer
  text: Are you speaking of Rosecrans' house?
- speaker: Interviewer
  text: I didn't know you ever worked on that. That was built by Rosecrans, wasn't it? He was the son of General Rosecrans.
    And then he sold the Holmes, and I think that's his name.
- speaker: Interviewer
  text: Holmes, was he involved with L. A. government or something?
- speaker: Respondent
  text: He was involved with the engineering of the things that the missiles have been shot from. I don't know. Launching?
    Yes. The launching pads.
- speaker: Interviewer
  text: Okay. You were talking earlier about the roads area, what was paved and what was not.
- speaker: Respondent
  text: Well, the only crossroad was Jackson, which was out from Indio. There were no other roads paved in that area anyplace.
    It was just, and Jackson really was a one way road. If you met anybody coming, two of your wheels had to be off from the
    sand and they had to do the same to get by.
- speaker: Interviewer
  text: What about where Washington Street is now? Has that always gone right by your ranch?
- speaker: Respondent
  text: Well, from 1930 it was, that must have been paved at that time because I can't ever remember them paving that. It
    went by our place and it turned about where Eisenhower is and went into the back part of the hotel, and that was where
    Ices had a place and then the next place was Walter Morgan and the next place was Vadens. And then some years later, a
    good many years later, I had their name on the tip of my tongue. I'll think of it later.
- speaker: Interviewer
  text: Did you hear something over there? I've had trouble with a mouse coming in my house.
- speaker: Respondent
  text: Yes, I heard something. I thought maybe your cassette player was on. It was turning off or something.
- speaker: Interviewer
  text: Did you ever hear why Walter Morgan chose that area for the hotel?
- speaker: Respondent
  text: No. He was there I think in 1920. He came down and homesteaded and he raised alfalfa. And it was the alfalfa or rather
    five of us.
- speaker: Interviewer
  text: Probably dented his crop.
- speaker: Respondent
  text: No, it was, you know, the road goes out there, you'd off the road or something. It had been mowed before you landed?
- speaker: Interviewer
  text: Yes, about any time. [laughter] Did he convince you of the worth of the area?
- speaker: Respondent
  text: Well, Walter Morgan and Ices, I got acquainted with them and they arrived, two people that I knew, and I was at a
    party that they put on for friends of theirs who lived in Indio and they came out to Indio. And it was at that party,
    fifty or sixty years ago, and they said I had bought the first hundred and sixty acres and I couldn't get any water because
    there was...
- speaker: Interviewer
  text: What are you trying to think? Who you bought?
- speaker: Respondent
  text: Block. B-L-O-C-K.
- speaker: Interviewer
  text: Yes. No, the next place, our place.
- speaker: Respondent
  text: Oh. Marshall.
- speaker: Interviewer
  text: Yes. They said Marshall was the party and he wasn't married. And they said, hey, why don't you buy that piece, and
    we were talking about the block and that was in 1923.
- speaker: Interviewer
  text: That sounds like a good way to get some property. [laughter]
- speaker: Respondent
  text: Hunt is the name I was trying to think of that built a home right across from the Vaden piece. And they were there
    quite a number of years, but they've both passed away too, so... well, they had started some development in the La Quinta
    area, I think, when the Hunts came in. And now it was through the Hunts that they started the Chamber of Commerce at La
    Quinta and they used to have a potluck dinner in their date packing house. I don't remember whether the meeting was once
    a month or twice a month, but everybody brought a dish and came down and had dinner together when they started that Chamber
    of Commerce.
- speaker: Interviewer
  text: About when was that, do you remember? About when and what?
- speaker: Respondent
  text: Oh, in the forties it seems to me it was during the war years because I remember too that a number of the women got
    together and did some sewing for the Red Cross and we met at their place too. And we all knit squares to put together
    for an afghan for the hospital at that time, so it was during the forties, the early forties.
- speaker: Interviewer
  text: When did the Desert Club start or why did it start, do you remember?
- speaker: Respondent
  text: Well, that was a development and they ... what to do and they came and bought that piece of ground and...
- speaker: Interviewer
  text: From Marshall? They bought that from Marshall?
- speaker: Respondent
  text: No. Well, Marshall had it, but whether it changed hands before they bought it, I'm not sure, but that's about where
    Marshall's home was, in that area.
- speaker: Respondent
  text: There was, I can't remember the name of the man that bought the Ices ranch and he bought the whole of the cove, all
    the way back, and he started that subdivision. And then the people that were working with him, they were all Jewish people,
    and this man was connected with the movies in some way in Hollywood. They had a scrap and so the two of them, Glick and
    Stone, I think was the two names.
- speaker: Respondent
  text: I built sixteen houses for Glick and Stone and had a fight with them too.
- speaker: Interviewer
  text: Why did they make the lots so small?
- speaker: Respondent
  text: Well, it was a money-making scheme. That's when we had the Jewish people. The lots were all made fifty by a hundred
    and fifty, and that was it. They had six hundred or more lots.
- speaker: Respondent
  text: In the beginning, the ones that they contacted were mostly doctors and lawyers, professional people, and those houses
    were built and completely furnished to the linen and the silverware and china and they sold for twenty-five hundred dollars.
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: When they were first completed in the 1940s. I built sixty of them. And to today's standards they were pretty well
    built.
- speaker: Interviewer
  text: They were cement block homes with tile roofs.
- speaker: Respondent
  text: They were good houses. There's a lot of them still standing, those original homes.
- speaker: Interviewer
  text: Twenty-five hundred dollars.
- speaker: Respondent
  text: Twenty-five hundred dollars.
- speaker: Interviewer
  text: There were several different styles of homes, but they were all of the block and of the tile roof.
- speaker: Interviewer
  text: Did they just originally build the sixty that you built for them?
- speaker: Respondent
  text: They were built in two months. I built them in two months.
