collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Kid, I always worked at Armour's. Some of them places in the yards ain't worth as--t. My sister Anna works in one
    of them two by four joints some cheap Jew owns. Armour's ain't so bad, and some departments like the one I work in, they
    call it the lard refinery, it's pretty clean there. What I do is operate one of these big automatic carton machines. These
    machines are up on a high platform and after I feed the empty carton and wrapper into a machine it comes out on a belt
    and the carton's packed with lard, and goes down on the floor by belt to the check girls. My machine is fixed for a rate
    of sixty cartons a minute. We used to stitch the boxes but now there's a great big machine and all them boxes are glued
    automatically. Say, lots of girls are out on account of that machine doing their work.
- speaker: Respondent
  text: They got a new rule now. They won't take no women over thirty. You got to go through a doctor's examination if they
    lay you off more than sixty days every time, even if you're an old timer. There was a woman in our department she was
    a big, fat woman. We used to call her Mama. She was laid off once and when she came back they wouldn't take her. Miss
    McCann, she's in charge of hiring all the women, she come out with her ass stuck out and she said,
- speaker: Respondent
  text: '''Mama, don''t you know it''s for your own sake we can''t take you back.'' ''Why you might have a heart attack at
    work and then the company would be held responsible. You shouldn''t be working at this any more.'' Say, kid, you shoulda
    heard Mama. She was so mad! She started yelling and hollering about how she was good enough to work there 4 months ago
    and how she was only 15 pounds heavier than when they laid her off last. She was a 215 pounder, but there was nothing
    wrong with her. She was stronger than most of us, like an ox. She didn''t have no weak heart. But old piss-in-the-face
    McCann just didn''t want her anymore and she wouldn''t take her back. Mama called her every name she knew in Polish, before
    she went.'
- speaker: Respondent
  text: I remember when they had them fights in the yards over the Unions. Some of the men got stabbed. Jesus, they had cops
    all over the place for a long time. It was kind of exciting. But I didn't know what it was all about anyhow. Didn't care
    to know, either.
- speaker: Respondent
  text: I worked in the refinery this last time until I was more than five months gone with what I got. It didn't show so
    much then. If they knew I was that way they wouldn't let me go to work. I got a bad eye lately too, my luck. My machine
    needs good eyes else I could get a hand mashed easy. It's a good thing we get 15 minutes morning and afternoon relief.
    We have half hour lunch. One minute late and we get docked half an hour.
