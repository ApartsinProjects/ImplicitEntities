collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Who put you in touch with informant?
- speaker: Respondent
  text: Last night's last race, there was an eight-horse race up, and some screwy dame, she had six tickets, on six different
    horses, all on the nose; and not one of them was hers. The winner only paid four to one, so she'd lost money anyway, even
    if she'd had the winner. That was over in Happy's joint.
- speaker: Respondent
  text: You know what house odds are. The house handicaps the horses the same way the track handicapper does and offers odds
    on 'em, and if you place your bet before the race comes up and the mutuels at the track start changing the odds too fast,
    you can take house prices if you want when you bet, up to a minute or two before the race comes up. The house usually
    pays more than the track odds, because as a rule, the prices always go down in the mutuels, especially if the horse is
    a favorite, if it's a good pony and it ain't no dog. You can't get house in Chicago no more; the books pay off on the
    mutuels.
- speaker: Respondent
  text: When the books had house prices, I remember one time, there was a guy who'd been betting deuces, fives and tens all
    afternoon, and knocking 'em off. And he was picking his own horses. There was a hot horse in the seventh race up at Arlington,
    and the guy picked it and wanted to bet five on it; but the book wouldn't give him house on it, because the guy had been
    picking 'em all day and the book thought it was a system horse and the system was clicking that day. It was a hot horse,
    but the guy had picked it accidentally; but he couldn't get house.
- speaker: Respondent
  text: Red was fixing up one of his joints one time, decorating it all over. There was a painter who worked there almost
    all winter. This painter, he'd be up on his ladder working away, and as he worked, he'd be keeping his eyes on the sheets
    and watching the ponies. They'd yell, 'They're off,' and this painter, he'd yell out, 'Give me two on so and so,' and
    when he was done with the job, he owed money to the book.
- speaker: Respondent
  text: You know what skeleton service is. Sometimes, if it's a small book, or if it's a track the book don't care too much
    about, they get only skeleton service; they don't get no description on the race; they just call the race and tell you
    when it is over and who won. If you don't close betting when the service tells you, wire tappers get in. The service protects
    you if you close your betting on time.
- speaker: Respondent
  text: You know Carl, the wall man at Red's. Well, he's betting one of these tracks that Red's getting skeleton service on.
    But he has too much to do, writing up the sheets and all, to keep watch when the race comes up for it to get off and to
    get his bets in on time, and he likes to play that track. The service says the race is coming off, and then it doesn't
    say nothing more till the race is over and it tells you who won and how much it paid. Carl, he has all the races at all
    the tracks to take care of, so for this track he keeps an alarm clock to tell when the race comes up so he can get his
    bets on time.
- speaker: Respondent
  text: Having so much to do, he sets the alarm so he can get two bucks on the horse.
- speaker: Respondent
  text: I was in there one day when the alarm goes off. Carl, he's working on a sheet, changing the prices that come over
    the wire, when the alarm goes off. He rushes over to shut off the alarm and goes over to make his bet. Just then the alarm
    goes off again, and he has to rush back to shut it off again—he didn't shut it off all the way the first time—and when
    he rushes back to the counter to make the bet, just as he gets there the service yells, 'They're off,' and it's too late
    to make a bet. And his horse wins.
- speaker: Respondent
  text: When D. was just five years old, Slim S. was shop boy at Ray's then (a sign shop), me and the wife had had a spat—you
    know me, old Dr. X.—and I'd left her for a while. I was living up above the shop—I was working for Ray then—and Slimy
    boy, he'd go down to see the wife and he'd bring D. back with him to see me. Later in the day, or maybe the next day he'd
    take the little fellow back to the wife.
- speaker: Respondent
  text: One day Slim came from the wife and he had D. with him. He couldn't find me in my room or in the shop, so he comes
    over to the book, and there I am. I had D. with me all afternoon. He'd sit beside me, never peeping, and every once in
    a while when they'd yell, 'They're off,' if there was something I liked in the race, I'd rush up to lay a half buck on
    it. The little guy, he wasn't saying nothing, just sitting there watching, taking it all in, unknown to me. It was like
    that for several races. Then they yell, 'They're off,' again, and I run up there, and the little guy, he tugs at my coat
    and says, 'Daddy, haven't you given them enough money already?' He noticed they wasn't giving me any.
- speaker: Respondent
  text: Every once in a while you'll hear the story about the horse player who was found dead in the street. He's got a ticket
    for a parlay in his pocket and the parlay won. I guess maybe it might happen sometime, that or something like it; why
    not?
- speaker: Respondent
  text: We was at the book one day—you know, for our daily whipping—me and Charley, and Charley, he says to me, 'Jesus, why
    don't we get together with Abe and write a book showing why you can't beat the races; you could make plenty and something
    like that; I bet it would go over big.
- speaker: Respondent
  text: Me, I pipe up, 'Yeah. And with all our money, why, we'd have enough to start playing our system.'
- speaker: Respondent
  text: Why, Goddamnit, Abe, a guy come to the book for six months with a tear in his pants so big he had it patched with
    two diaper pins. He played two bucks or so every day.
- speaker: Respondent
  text: And Carl, the sheet-writer, why, last winter he had a hole in his overcoat. He always had the scratch sheet in his
    hip pocket, and that scratch sheet stuck through that hole in his overcoat every time you saw him. Maybe he didn't repair
    it because it was easier to get at his pants pocket with that hole there, but I maintain he just couldn't take time off
    from thinking about the ponies. Anyway, it was funnier than hell seem that every day.
- speaker: Respondent
  text: A., the mechanic, he runs the auto repair joint across the street from the book. Every day he rushes in the front
    door of the book and out the back, making maybe a dozen bets a day. As if no one knows what he's doing. Stick around,
    you'll see him any minute now.
- speaker: Respondent
  text: Down at Happy's place, right across the street from it, there's a gas station. The owner runs it himself, and he's
    got two attendants with him there all the time. Happy was telling me about it the other day; he's been playing at Happy's
    about a year now.
- speaker: Respondent
  text: This guy, he makes so many bets, he keeps the attendants running back and forth across the street all day long. He
    makes so many bets, they're passing each other up, one going to the book, the other coming back, and the only thing he's
    worried about is they don't get hit by a street car crossing the street. Happy says, 'One is coming in the door and the
    other's going out.'
- speaker: Respondent
  text: Happy sends him four scratch sheets over every morning. He don't play no system. If he likes the name of a horse,
    he bets him; he don't bet information horses. And Happy says to me, 'And he still owns the gas station.'
- speaker: Respondent
  text: I was working in this saloon. The success of this saloon lay in the fact that as I was working there a familiar voice
    comes out, the e-o-leven voice; it was a book, with full racing service.
- speaker: Respondent
  text: There's a woman in this saloon—or book, which is right behind it—and I hear her talking. I look in there, and that
    dame, she didn't have no class at all. I hear her talking, about her and her girl chums. They're all together, philosophizing
    like a bunch of women would, and she says, 'Let's do something to keep from gambling.' So they make a date to go out golfing
    the next day. Just as they was about to break up, one of them said, 'Let's make it real early.' They jibber jabber around
    for a while, and then this second dame, she says, 'Oh, come on, let's make it early, because I want to get back in time
    for the first race.'
- speaker: Respondent
  text: There was an old woman in the book one day. It was just after the description of a race and she was standing there,
    all flustered. I walks up to her, and I asks very confidentially, 'Do you like the ponies?'
- speaker: Respondent
  text: She says, 'Yes.' She's just as confidential as I am. She says, 'I'm too old, you know, to have any other vices.' She
    knocked me off my pins with that one.
- speaker: Respondent
  text: That reminds me of an old woman. She's in the book every day. She's white-haired, and she's about sixty, and while
    she's watching the races she keeps rolling Bull Durham cigarettes. She handicaps her own horses.
- speaker: Respondent
  text: When the description starts coming in over the wire, the horse that's out in front, she always says to everyone in
    general, 'That's my number one horse.' Then there'd be another horse out in front, and she says, 'That's my number two
    horse.' Coming into the stretch, maybe there's still a third horse out in front, and she says, 'That's my number three
    horse.' If one of them three win, she's a swell handicapper, only she never puts money on nothing over them three horses,
    booting them in, and then they announce the winner; he ain't even got a call while the race was being run like as not.
    When that happens she goes back in a corner and's quiet as a mouse, till the next race comes up.
- speaker: Respondent
  text: You hear all kinds of stories about systems for beating the races. Some of the systems are mathematical, and some
    of them are handicapping one way or another, and some of them depend on numerology or astrology or following certain jockeys
    or certain ponies or certain tracks; none of them are any good. I got the only sure-fire system to beat the ponies. It
    goes like this—only you gotta go to the track to play it.
- speaker: Respondent
  text: Well, you go out to the track and you get as close as you can get to the rail when the race is being run. You've got
    you a pair of high-powered binoculars, and you train 'em on the ponies. The glasses are so powerful it brings the ponies
    right up to your eyes. So you train the glass on the pony that's carrying your dough, bring him right up close to your
    eyes—I'll zap whip him in it.
- speaker: Respondent
  text: 'C. runs around mouthing more excuses whenever he''s not on a winner than anyone I know of. He follows the scratch
    sheet; the scratch sheet''s his bible. He''s got what he calls a rook-bound system for the ponies, based on the scratch
    sheet. He has an idea if you play the first five horses on the sheet in a race you''re bound to win in the end. We know
    it can''t be done, but that''s neither here nor there. Here''re some of his excuses. He''ll say:'
- speaker: Respondent
  text: '"I didn''t know he was in the races. If I''d known he was in the race."'
- speaker: Respondent
  text: '"You know, that horse was fourth in the scratch sheet."'
- speaker: Respondent
  text: '"You know, that horse was among the first five on the scratch sheet."'
- speaker: Respondent
  text: '"See the weight on that horse? The best horse carries the most weight."'
- speaker: Respondent
  text: '"You see the boy on him? He''s the best boy in the country."'
- speaker: Respondent
  text: '"You know, I sent whosis over to the barber to get a buck so I could bet, and the barber didn''t have it."'
- speaker: Respondent
  text: I remember one night. There was Al, Everett, Charley, Slim, Arnold and me. We was all in Charley's room. Oh yes, there
    was Larry, too, Larry the physical culture enthusiast; Larry was my helper then. We was trying to figure the next day's
    races.
- speaker: Respondent
  text: Slim and me, we were checking over some systems. Charley was laying down in the bed; he was tired. Al was on the floor,
    on his elbow, and he had the winner finder—you know, the magnifying glass, and he had papers on the floor all spread out
    around him; he had the Racing Record, the Form, the Scratch Sheet, the Daily News and the Times turf selections; the whole
    floor was covered up with all those papers. Ray and Arnold, they was sitting over in the corner, figuring. And Larry,
    Larry was standing at the bed, doing calisthenics.
- speaker: Respondent
  text: Pretty soon Ray gets up to go out of the room, and I say to him, 'Be careful where you walk, Ray, you might step on
    an entry.' Then everything was quiet again; we were as studious as if it was the Library of Congress, or something like
    that.
