source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: HEN Chang Yen Mow, the new head of the new Department of Mines of the new Chinese Government, began to work about
    for a foreigner who should know much about mines and be honest, and who would therefore be a fit man to occupy the new
    post of Director-General of Mines. He bethought himself of an English group of mining men with whom he had once had some
    business relations. The principal expert adviser of this group had been the man who was now the head of the great London
    mining firm for which Herbert Hoover was working, and working very successfully, in West Australia. Chang applied to this
    group for a recommendation of a suitable man for him. Herbert Hoover was named and Chang Yen Mow, acting on the recommendation,
    offered the place to the youthful Quaker engineer, and the competent and confident young man of twenty-four, always ready
    for the newer, bigger thing, promptly accepted it.
- speaker: Respondent
  text: Two weeks after the cable offer and answer, a feverish fortnight devoted to a rapid clearing up of things in Australia,
    Hoover was on his way to London, to report personally to his employers about their own affairs as well as to get some
    information about the new undertaking. He wanted to find out before he got to China, if he could, something of what would
    be expected of a Director-General of Mines of the Chinese Empire. Perhaps he had in mind the possible necessity of "getting
    up" a little special knowledge about Chinese mines and mining ways before he tackled his new job, just as he had got up
    enough physiology in twenty-four hours to help get him into Stanford University, and enough typewriting in a weekend to
    fit him for entrance into Louis Janin's office in San Francisco.
- speaker: Respondent
  text: So after two weeks in the metropolis, eight or nine days on the Atlantic, two or three in New York, and five on the
    transcontinental trains, he found himself again in California and ready to make from there his second start to the faraway
    lands from which his loudest calls seemed to come—ready, that is, except for one thing.
- speaker: Respondent
  text: He was now, let us remember, at this beginning of the year 1899, not yet twenty-five years old, not that by half a
    year, indeed, and a half year could mean, as we have already seen, a great deal in Herbert Hoover's life. And he was a
    boy-man with a record of achievement already behind him, and a position already in his hands of much responsibility and
    opportunity. So he declared that the time had now come for the carrying out of the decision he had made in his college
    days of three years before. It was the little matter, you will promptly guess, and guess correctly, of marrying the girl
    of the geology department.
- speaker: Respondent
  text: He arrived in San Francisco the first of February, 1899. He spent the next few days in Monterey, "the old Pacific
    capital" of Stevenson's charming sketch, but of chief interest to Hoover as the place where Lou Henry lived. And here
    he was married at noon of Friday, February tenth. At two o'clock they left for San Francisco, and at noon the next day
    sailed for the empire of China.
- speaker: Respondent
  text: Into the sleepy, half Mexican, historic town on the curving sands of the shores of the blue Bay of Monterey this swift,
    breathlessly swift, boy-engineer had come from distant Australia, by way of Marseilles and London, had clutched up the
    beautiful daughter of the respected town banker, and was now carrying her off to distant China, where she was to live
    in all the state becoming the wife of the Director-General of Mines of the Celestial Empire.
- speaker: Respondent
  text: It was a bit too much for the old Pacific capital, which, of course, would hardly know—because she did not tell it—that
    the sudden appearance of the meteor bridegroom had been preceded by astronomical warnings to the prospective bride, of
    the nature of electric messages that came first from Australia, and then from other places along the yet unseen meteor's
    path. So there are solemn residents there today who shake their heads seriously when you remind them of this incident,
    and are inclined to suggest that nobody could be completely married in any such time and manner. Anyway, it wasn't quite
    fair to the town, which tries to maintain old Mexican traditions that go back to Spain of a full assortment of festivities
    incident to any proper marrying.
- speaker: Respondent
  text: The hurrying couple at least had time for breath-taking—and honeymoon—when once on board ship. For it is a month's
    voyaging from San Francisco to China, or at least was then. They had for seat-mates at table Frederick Palmer, the war
    correspondent, and wife, which was the beginning of a friendship that still endures. And there were, for other interesting
    companions, a secretary of our legation at Peking and his wife, and a quaint missionary pair who may or may not have survived
    the Boxer massacres.
- speaker: Respondent
  text: The work in China was at first rather simple. Mines, of course, there were, and had been for uncounted centuries.
    But what was needed by the new department was some sort of survey of the mineral resources and mining possibilities of
    the empire, and a tentative framing of a code of mining laws, so that the new development of the mines of the country
    which Chang hoped to initiate could be carried on to best advantage, and in such a way that private enterprise could participate
    in it.
- speaker: Respondent
  text: For centuries the mines had been crown property, and the ruler had simply let them out directly or through the viceroys,
    for either a stipulated annual rental or...
