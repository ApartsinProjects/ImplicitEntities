collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How's the weather down in Tidewater today?
- speaker: Respondent
  text: Just perfect, the last two days. It was terrible before that.
- speaker: Interviewer
  text: We had quite a winter, didn't we?
- speaker: Respondent
  text: We had a hell of a winter. Bad for the health too. A lot of the old people get a lot of colds with the changes in
    the weather all the time; that keeps them in the house. That's what's so bad.
- speaker: Interviewer
  text: I'd like to talk to you today about your long illustrious Navy career.
- speaker: Interviewer
  text: What are you going to do with this if you get it?
- speaker: Respondent
  text: Well, we have a very active oral history project here at BUMED. I understand that you're from Pennsylvania.
- speaker: Respondent
  text: Right. From a town called Coraopolis.
- speaker: Interviewer
  text: Where is that town near?
- speaker: Respondent
  text: About 11 miles down your high river from Pittsburgh. It's a steel town.
- speaker: Interviewer
  text: And you went to the local schools there?
- speaker: Respondent
  text: Until about the sixth grade, I guess. And I went down to Shenandoah Valley to school--prep school--and finished that,
    and then onto Augusta Military Academy.
- speaker: Interviewer
  text: And I understand that you're a VMI graduate also.
- speaker: Respondent
  text: No. When I finished and graduated from AMA I went over to VMI and I was only there a year. I went over so that my
    brother could go back to school. He's older than I am, and he had done nothing but go to two colleges and play football
    and quit at Christmas. So my dad said, "Look, times are hard." I'm talking about the 1930s. "Times are hard, and you'll
    go back to VMI with Joe, why you can go back to school. So he did and he went through and did fine.
- speaker: Respondent
  text: But I still wanted to be a physician so I went over to the University of Virginia and finished my premed work and
    went to medical school there. I only had one year at VMI. That was 1930-'31.
- speaker: Interviewer
  text: A number of years ago I did an interview with Dr. Lamont Pugh. And he told me The University--that's what they called
    it.
- speaker: Respondent
  text: That's what it was called then, The University. And if anyone called it anything else but The University, they said,
    where in the hell is that? The University was in Charlottesville, the University of Virginia.
- speaker: Interviewer
  text: When did you decide that you wanted to be a physician?
- speaker: Respondent
  text: When I was about 17 or 18, I came across an accident on the Philly Road in Pennsylvania and stopped, and we had several
    people who were badly injured. And I stayed with them for a couple of hours and helped them in the hospital. I had a couple
    of people with me and they were no damn good at all. So that's when I really got interested. And it started from there
    on. That's about the time that I went down to AMA in the Shenandoah Valley in Virginia, as a young kid. And I was just
    interested in it. And I kept talking to my father about it.
- speaker: Respondent
  text: The '30s in that area were terrible years and I was lucky to get to school at all. So VMI offered us, having been
    in Virginia for three years, and I guess the Military Academy is sort of a prep school for VMI. I was in on a scholarship.
    So was my brother. So it was pretty good.
- speaker: Respondent
  text: Then when I went to the University of Virginia, that wasn't as much as VMI because you had to furnish your own living
    and so forth. And the Depression was very, very deep and very hard on my family. And I hardly ever got back to Pittsburgh
    after I got over to the University of Virginia. One reason is I got married the second year I was over there. I was married
    when I was still in college, before I even went to medical school.
- speaker: Interviewer
  text: Tell me about your medical school experience. Did you go to the University medical school there?
- speaker: Respondent
  text: Yes, I did. I was admitted to the university school, went there, and graduated in 1937. I went to summer schools and
    that sort of thing for the two years that I was there, after I left VMI, and so I was a year ahead of my brother Rex at
    VMI, who came over to medical school after graduating from VMI. What I was trying to do was cut corners as much as I could.
- speaker: Interviewer
  text: So you graduated medical school and then you obviously at some point decided to try the Navy as a career. Was that
    because of the economic times at that point? Or did you just find the Navy to be a very good alternative to practicing
    privately?
- speaker: Respondent
  text: In those days when you finished medical school you took an internship and didn't get paid for it. And you looked for
    the best internship, the busiest one that you could find. And mine had another reason I wanted to go back. I hadn't been
    in Pittsburgh for some time, and my visits with my own family were very short and so on. So I was able to get an internship
    at the St. Francis Hospital in Pittsburgh. About February of the year after I went up there, it was time to go look for
    a job. I finished my internship and I wanted to be a surgeon. I looked around and I couldn't get a residency in surgery.
    They offered me one in gynecology, and I said no.
- speaker: Respondent
  text: And then what happened was the Navy ... My roommate was in the same boat that I was except that he wanted something
    else besides surgery. So he said, "We've got a recruiter around here. Why don't we go and talk to him?" And I said, "It's
    fine with me, anything for a job." So he came out.
- speaker: Respondent
  text: You may not know because you weren't in the Navy here, working for us in those days. But a recruiter was getting a
    residency in eye, ear, nose and throat at the Ear, Nose, and Throat Hospital at Pittsburgh. But in order to go there and
    maintain some income, he had to be in charge of recruiting for the whole district of Pittsburgh. So he did his residency
    as he could and did his recruiting as he could.
- speaker: Respondent
  text: He came out. He was a nice young fellow, a lieutenant, j.g. And we talked. There was an examination going on in the
    Naval Hospital at Philadelphia. I guess it was the first of April or so. And he said you really like the Navy, fine. I
    suppose there was a Navy Reserve then but we didn't hear much about it. And he's talking about a week long examination
    for the regular Navy. And if you look back in your history you'll find out that they weren't testing people in the Navy
    then.
- speaker: Respondent
  text: As a matter of fact, about that time, graduates from the Naval Academy were not all commissioned. They didn't have
    that many openings. So it was several years after that they commissioned all those people. They gave them some sort of
    a reserve type thing.
- speaker: Respondent
  text: But we went down and had a week's worth of examinations. If you failed any, they said so long. So my buddy, my roommate
    from the hospital, and I agreed that if either one of us passed them each time we'd stay on. If not, if we both failed
    some part, we would come on back to Pittsburgh. The Mother Superior at the hospital had reluctantly given us a week off
    and not only that she gave us a little money, which was very unusual. She said that was for the transfusions that you
    gave and didn't get paid for. And so we had about $30 a piece to go down there and spend a week. But when we were taking
    the exam, the hospital put us up in a room on the fourth or fifth deck. That was a new hospital.
- speaker: Interviewer
  text: Now which hospital was this?
- speaker: Respondent
  text: Philadelphia. It was a new hospital down at the end of Broad.
- speaker: Interviewer
  text: And Pattison Avenue.
- speaker: Respondent
  text: Yeah, right across from the park. Anyway, my roommate busted his physical examination. In those days everyone took
    the same eye examination, aviators and everyone else. And he failed his eye examination. And he was through. And damn
    if he didn't just stay along. We were in his uncle's car, which he had borrowed. But he stayed right with me until I finished.
- speaker: Respondent
  text: And Lamont Pugh was the chairman of the board who was giving us this examination. And I had met him somewhere. I don't
    know where, down at The University or somewhere. And he remembered my name, which is not that usual. On Friday we had
    an oral examination before the whole board. And I was up there and got started on some things. And he said, "Well, how
    are they doing in boxing over there at The University now?" We had the best boxing team in the country in those days.
    And I told him what I knew about it. I had done a little boxing at AMA and in my freshman year at VMI, but I was too busy
    over at The University.
- speaker: Respondent
  text: So we chatted about that and then the doctors wanted to ask him some questions, which I happened to know the answers
    to.
- speaker: Respondent
  text: So Lamont said, "Well, Yon, I guess we'll be seeing you if you want to come in." And I said, "I want to come in."
    So that was my first view or connection with Lamont Pugh. I got to know him pretty well after that.
- speaker: Interviewer
  text: He was quite a man, wasn't he?
- speaker: Respondent
  text: He was that. Highest decorated man in World War II, I guess, certainly in the Medical Corps.
- speaker: Interviewer
  text: The exam that you were telling me about. This was pretty much a written exam for a week?
- speaker: Respondent
  text: Oh, no... well, part of it. The first day, on Monday, it was the physical examination. You went through the whole
    works and if you passed that--and my roommate didn't... We had laboratory and pathology on one day. We had internal medicine
    on one day. We had radiology and dermatology, a couple of them mixed together, up thru Thursday. And each evening, when
    we were in these things, we had a test. Laboratory--you can imagine the kind of test that you got in laboratory doing
    staining and that sort of thing, and so on. (At St. Francis Hospital, the nuns had PhDs in laboratory work and they really
    rode us in the laboratory. The interns did all their work for them. But you learned something. The same thing was true
    in all the departments.)
- speaker: Respondent
  text: Then on Friday they had an oral examination to finish it off. And that was where each one individually went before
    the board, which consisted of about eight people, which were the people who had given you the exam, or the test. And they
    could ask questions if they wanted to. And they were not really supposed to tell you whether you were doing good or not.
    You were supposed to wait until you heard from the Navy Department.
- speaker: Respondent
  text: So I did. I heard from them and I got in. And I finished my internship the first of July. Then in August I got the
    word that I was in the Navy. I left for duty, I think about the 13th or 14th, or something like that, of August of 1938
    and reported to Newport.
- speaker: Interviewer
  text: Was there any type of an orientation into military life or did you just report to Newport and you were in and that
    was it?
- speaker: Respondent
  text: Yes, there was a very definite, almost a year's program down at the old Naval Hospital in Washington, DC, where all
    new candidates for the Medical Department went in and it was under the Bureau of Medicine Surgery. And it was in the hospital
    where the Bureau of Medicine Surgery was, and I think still is.
- speaker: Interviewer
  text: That's where I'm sitting right now.
- speaker: Respondent
  text: Well, that was a hospital that had this indoctrination period for new doctors coming in. And in those days they weren't
    taking ... It wasn't like a whole class of 15 or 20 guys were coming in; maybe three or four is what was coming in. But
    in about three or four years before I came in, no one came in. They didn't have any money to pay them.
- speaker: Respondent
  text: My orders were to Newport and the reason that I didn't have to go to indoctrination was that I had all this military
    training before. I'm sure that's one of the reasons. So I went up to Newport and my orders were to report to the commanding
    officer there to be assigned to this new destroyer. Well it wasn't a new destroyer, it was an old four-stack and it was
    one of four, and that was the first time they got enough money for oil and only one was going to go.
- speaker: Respondent
  text: That's something that you probably don't know. There were these numbers of excess military officers who were on active
    duty. And they were up to lieutenants. We went in as jaygees in those days. And these are lieutenants, which are pretty
    senior people in those days. Those who they couldn't afford or weren't in critical places, they sent out to CCC camps.
    Do you know what CCC camps are?
- speaker: Interviewer
  text: Civilian Conservation Corps.
- speaker: Respondent
  text: Exactly. They were the medical officers for those camps. And then when I came in, it was the time that they were getting
    a little money and they were coming back. So I never did go aboard that old four-stacker. There was a lieutenant who came
    back and he had been up in the mountains building these trails and all, that the CCC people did, and he got in about a
    week before I got back to Newport. And he told the commanding officer, "Look I've been up in the damn woods I want to
    go to sea." And the captain said, Go ahead, you take Yon's place, and I'll put Yon right here where you were going to
    go." So that's where I stayed.
- speaker: Interviewer
  text: At the Naval Hospital there.
- speaker: Respondent
  text: At the Naval Hospital at Newport and I was there a year.
- speaker: Interviewer
  text: What were your duties there?
- speaker: Respondent
  text: Well, I had the psychiatric ward. I had the contagious disease ward. I was on the surgical service, which I insisted
    that I wanted to be on in the first place. And I stood the watch, the OD watch. Everyone did that in those days.
- speaker: Respondent
  text: So I wasn't in a residency program. I was just a general Navy medical officer. And in those days many people went
    out and went to work and never did do any more than an internship. Residency was a rather unusual thing and just getting
    well established. Certainly, I kept telling them in the Bureau, "Look, you promised to get me some surgery."
- speaker: Respondent
  text: Well, they sent me down to the World's Fair detail then, in June, '39. And they had a little shed down there, Camp
    George Washington, where we had 250 Navy, 250 Marines, and 500 Army.
- speaker: Interviewer
  text: And this was near Flushing Meadows.
- speaker: Respondent
  text: That was in Flushing Meadows, right around the lake from the pool where they had all the swimming things, right around
    the corner there. I had a chief petty officer and five corpsmen. I had a sick bay with three beds in it, a dressing room.
    And the Navy Department--this was under the Navy Department, not BUMED--was running it. And the Navy Department obviously
    was trying to start to expand a little bit and they wanted publicity so they were very good to us, not only the medical,
    but all the other people there.
- speaker: Respondent
  text: We had extra rations and entertainment. And, of course, I had to have full dress and everything, four and aft hat
    and the rest of it. And my wife and I were invited to the dignitary things. They had princes and kings and everyone else
    coming in there. And they always had a big reception for it. And they wanted to show the uniforms. So we were always out
    there in full dress.
- speaker: Interviewer
  text: Now, your role was meant to help with any medical emergencies that may have arisen among the visitors to the fair
    site?
- speaker: Respondent
  text: Hold on. No. I had a thousand men there--the Army, Navy, and the Marine Corps. And I was their medical officer. Now
    I did do some things because the Army is big enough and they had a staff man who went for guard mount, which we had every
    day and rotated in the services. But the Marine Corps and the Navy didn't have enough officers so they dressed me up,
    and I went on guard mount every other day.
- speaker: Interviewer
  text: Dressed you up in an Army uniform?
- speaker: Respondent
  text: No, no. I was a Navy man, always Navy. I'd been with the Marine Corps a number of times and I've always worn a Navy
    uniform. Well, where were we?
