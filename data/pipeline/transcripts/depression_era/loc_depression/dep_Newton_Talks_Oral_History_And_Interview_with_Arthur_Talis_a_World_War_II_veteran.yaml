collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Mr. Talis, what is your connection to Newton?
- speaker: Respondent
  text: A resident of the - a resident of the - Newton Highlands, Mass.
- speaker: Interviewer
  text: Did you live in Newton before and after your service?
- speaker: Respondent
  text: No, I lived in Newton after my service with the Navy.
- speaker: Interviewer
  text: Where did you live before?
- speaker: Respondent
  text: In the South End, Boston.
- speaker: Interviewer
  text: What were you doing before you entered the service?
- speaker: Respondent
  text: I was in college evenings in 1945.
- speaker: Interviewer
  text: What were you studying?
- speaker: Respondent
  text: It was Business Course, Accounting and Taxation.
- speaker: Interviewer
  text: During your service what did you miss most about home, aside from family and friends?
- speaker: Respondent
  text: Freedom. I was not free to do my own thing. I had to buckle down to the military disciplines, and I went to school
    in the Navy when I first was in '45. I was sent to school in Great Lakes Training Center Naval for five weeks and then
    I was sent down to St. Louis Personnel Separation Center to discharge the Navy veterans coming back from the war.
- speaker: Interviewer
  text: How did you join and why did you choose that specific branch?
- speaker: Respondent
  text: Well, my brother, older brother was in the Navy and Harvard College Training ROTC, and I followed in the Navy's footsteps.
- speaker: Interviewer
  text: Was it by choice or draft?
- speaker: Interviewer
  text: How did you adapt to military life, including the physical regime, food, and social life?
- speaker: Respondent
  text: Very well. They gave me my three meals every day and they gave me a canvas piece of cotton to sleep on at night, and
    with my meals and lodging was in the Navy, it's just great, when I joined the ship USS Puget Sound CVE 113.
- speaker: Interviewer
  text: And where was that ship stationed?
- speaker: Respondent
  text: Alameda, California.
- speaker: Interviewer
  text: How did you stay in touch with family and friends back home?
- speaker: Respondent
  text: Well, that's a story. I was working in St. Louis, Missouri, and the captain of the ship got directions to get a disbursing
    clerk aboard his ship before his sailed for Manila, and before I knew it on the 19th of March I boarded the ship and the
    20th of March we set sail for the Philippine Islands. '46.
- speaker: Interviewer
  text: Do you remember arriving in the Philippines and what it was like?
- speaker: Respondent
  text: Yeah. The harbor was filled of sunken ships. The masts were protruding through the water. And it was eerie. And we
    were to deliver P80 shooting star jet planes to Clark Field in Manila.
- speaker: Interviewer
  text: Tell me about a few of your most memorable experiences.
- speaker: Respondent
  text: Well, these planes were tied down with wire rope on the decks and they were jets, the first jets that the United States
    was shipping across the ocean to a...Clark Field, and I wasn't going to fly those jets, because I didn't know a thing
    about them, except that I got pictures of them, in my, all of them, that they were tied down on the decks. And we were
    making our way to Manila and I didn't have a chance to write home on the 19th of March, and we were out 20 days to Manila.
- speaker: Interviewer
  text: On a lighter note, are there any particularly humorous or exciting memories from when you were on leave?
- speaker: Respondent
  text: Well, I was in storekeeping and storekeeping included the laundry, and laundry was the place where I clean my uniforms
    and underwear and pressed them on a compressor. And I thought that was really living religiously. So, I was in the disbursing
    office, line by line punching the computer and figuring the pay of the crew twice a month.
- speaker: Interviewer
  text: Do you recall the day your service ended?
- speaker: Respondent
  text: August 16th, '46.
- speaker: Interviewer
  text: What was it like on that day for you?
- speaker: Respondent
  text: Well, I was glad to be home. I didn't know how long the war would last. Now, they bombed Nagasaki and Japan with the
    atomic bomb in nighttime. At 3:00 in the morning all the lights went on and we had fought, and the Japanese gave up in
    July, I think, and then in August the Germans gave up. And I was glad of that, because my service would be terminated
    and I would get a discharge.
- speaker: Interviewer
  text: Could you tell us more about the day Nagasaki was bombed?
- speaker: Respondent
  text: July, that's a guess, 1946.
- speaker: Interviewer
  text: Do you remember your experience on that day?
- speaker: Respondent
  text: Yeah. I was asleep and then the lights went on and the shades went up and everybody was yelling, and I said, "What's
    going on?" "Japan has given up."
- speaker: Interviewer
  text: What was it like to return to civilian life?
- speaker: Respondent
  text: Well, freedom, freedom away from the military regime, a continuation of my college and career and family, of course.
    I was so pleased to be with my family. There were eight in our family.
- speaker: Interviewer
  text: Were those siblings?
- speaker: Respondent
  text: Five boys and one girl, and my dad and mom.
- speaker: Interviewer
  text: What did you go on to do after your schooling?
- speaker: Respondent
  text: Well, I was a bookkeeper for wholesale grocers and there was a bribery in the service of Internal Revenue, and Truman
    at that time, the civil service, and they set the exams for Deputy Collector of Internal Revenue Agent. So I took the
    exam and I passed and I was selected to work. I worked out in Springfield as an Internal Revenue Agent.
- speaker: Interviewer
  text: How did your service and experiences affect your life and your outlook on war and the military in general?
- speaker: Respondent
  text: Well, I pray to God for those who gave their lives during World War Two. There was nothing I could do for them. And
    the wounded coming back. I said to myself that I was fortunate that I wasn't dumped in the sea so long ago on the warship,
    but this was during, it was during a time of peace, not peace but secession of hostilities, they say. So, the war affected
    me and so many. We resumed our normal life and I had an eight year college course that I was following when I got back.
    I graduated in '52 with a Bachelor of Business Administration.
- speaker: Interviewer
  text: What would you like people to know a hundred years from now?
- speaker: Respondent
  text: That my service was honorable and my family was blessed with some kind of prosperity after the Depression. The Depression
    hit us hard because my father didn't have a job. He didn't work for years until the Works Progress Administration's Pick
    and Shovel, and that's what he said, he worked Pick and Shovel, $15 dollars a week. That was the most that he could work.
    They didn't allow people to work more than three days so that they would have more people employed.
- speaker: Interviewer
  text: What were you doing during that time?
- speaker: Respondent
  text: I was going to school. I was in grammar school, elementary school, high school, and then BU, college. Yeah.
- speaker: Interviewer
  text: Did you stay in touch with family and friends when you were in the war, with friends from back home?
- speaker: Respondent
  text: Yeah. I had written some letters to family mostly frequently, and friends.
- speaker: Interviewer
  text: If you don't mind me asking, how did you meet your wife?
- speaker: Respondent
  text: My wife? She had a girlfriend and I had her as a friend of mine dating her, and it so happened that I was invited
    to my wife's friend's home to meet her again before she left to get married to somebody else. And well, I met Maryanne
    then, and it was raining and she gave me her umbrella, so I had to return it. I returned the umbrella, and guess what.
    So, that's the way I met her.
- speaker: Interviewer
  text: Is there anything you would like to add?
- speaker: Respondent
  text: Well, our ship was loaded down with jets, and they were the first jets after the Germans had blitzed England with
    their buzz bombs. They were jets too. And when we found out that they had developed these jet planes they went into production
    with their possible jet planes, the first planes, and that was a remarkable thing, because if the Germans had developed
    their jets to the point where they would knock out our bombers and planes we would have been in an awful fix.
- speaker: Interviewer
  text: Is there anything else you would like to add?
- speaker: Respondent
  text: Well, I still have a buddy of mine on board ship, we had many times when we gabbed and we were standing on top of
    the flight deck, and out beyond several hundred feet was a spouting whale, and we were coming up on top of that whale.
    And I was afraid that we would be sunk, and I waved to the flight that there was a whale ahead of us, and we approached
    the whale and at the last moment he flipped over and dived, and we were saved.
- speaker: Interviewer
  text: Did you have any other good moments with your friend?
- speaker: Respondent
  text: Well, he went on to become a Minister, a Methodist Minister, and he lived in Illinois and we corresponded every Christmas
    card. Yeah, Paul Beech was his name.
- speaker: Interviewer
  text: Did you want to mention the international date line?
- speaker: Respondent
  text: Oh yeah. It was on our voyage to Manila. We were making our way up to the line and it was Easter Sunday, and the next
    day was Easter Sunday. So, we had two Easter Sundays. That occurred when we crossed the international date line. Yeah.
    So, we had a good crew. There were only 600 on our ship, because they had taken the flight squadron off our ship, the
    Marine squadron, they had taken it off to make way for these jet planes. Yeah. And then we went up to, we went to San
    Diego, San Francisco, Puget Sound, and that's where we hooked a ship in mothballs, they said mothballs.
- speaker: Respondent
  text: Well, what they did was they put a plastic webbing over all the gun and movable parts so that it would withstand weather
    and they moored it with other ships in Puget Sound. Yeah.
- speaker: Interviewer
  text: Is there anything else you would like to add?
- speaker: Respondent
  text: Well, I started high school at Boston Latin School, but after a few weeks I told my brother George, "I can't hack
    this regiment at Boston Latin." It was Latin, Greek, English, and the school was so cool and frigid to my liking, so he
    said, "Well, get something easier." So, across the street was a commercial high school, so I went there to High School
    of Commerce, and I graduated from there.
