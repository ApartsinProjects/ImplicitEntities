turns:
- speaker: Respondent
  text: Plattation songs - rowing songs, negro spirituals, lullaby, work songs.
- speaker: Respondent
  text: The ease with which she caught the melody from the rendition by an eighty-five year-old lady, singing from a childhood
    memory of the glamorous Florida in the days just preceding the War between the States - the latter 1814's, to be exact;
    the quick ear which caught the aria as the crooked voice strived to reach the high notes and flattened on the lower ones;
    the nimble fingers running up and down in deft tune to enliven the original negro interpolations; the right hand marking
    the notes on the ruled music paper, as the left softly struck the keys to confirm the tune -- all brought an exclamation
    of 'Marvelous!' from those in the room, who had been attracted by the unusual proceeding.
- speaker: Respondent
  text: Mrs. Lake is a woman of small stature, probably five feet tall, fifty-two years of age. Her blond hair, now mostly
    gray, was parted in the middle and waved softly over the ears to a small knot low on the neck in the back. Her blue eyes,
    set wide apart, below a wide level forehead, lighted with interest and enthusiasm as she was swiftly completing the four
    songs in the rough in the short space of two hours.
- speaker: Respondent
  text: She was dressed comfortably - the day was quite hot - in an inexpensive voile dress, with blue, her favorite color
    predominating. A pale blue oil plain parasol leaned against the piano. Rain or shine who carries a parasol - even her
    most intimate friends in Jacksonville have never seen her wearing a hat.
- speaker: Interviewer
  text: How do you do it?
- speaker: Respondent
  text: Well, I suppose it is a talent I inherited from my mother, who was a very fine musician.
- speaker: Respondent
  text: He was born in Athens, Georgia, in 1840.
- speaker: Respondent
  text: Her father was Heinrich von der Lieth, German, whose father was tailor to the Emperor of Germany, not Kaiser Wilhelm,
    but his father. One of his duties was to embroider the royal crest and coat-of-arms on the Emperor's clothing, as well
    as all household linen. He was a native of Hanover, Germany.
- speaker: Respondent
  text: My grandmother, his wife, came from Bolivia Diepmult, Germany, where she was born in 1804.
- speaker: Respondent
  text: Grandfather fled Germany because he did not approve the first of the compulsory military training instituted by Kaiser.
    He landed in Charleston, South Carolina, after a thirty days' trip across the ocean.
- speaker: Respondent
  text: There he met my grandmother, they were married, and came directly to Athens, Georgia section.
- speaker: Respondent
  text: My mother was born there in 1844 - she was just a small girl during the war between the States.
- speaker: Respondent
  text: My father was James Alfred Grant, whose ancestors came to American on the famous Mayflower.
- speaker: Respondent
  text: One of his most famous relatives was Josiah Bartlett, a signer of the Declaration of Independence. I have a very old
    book with a reproduction of the Declaration of Independence and Josiah Bartlett's name is very prominently written thereon.
- speaker: Respondent
  text: Leonard Grant, my father's paternal uncle, gave Grant's Park to Atlanta, now a beautiful landmark of the Georgia city.
- speaker: Respondent
  text: I went to the public schools in Athens, and then attended the private school for girls in Athens that my mother had
    attended in her young girlhood.
- speaker: Respondent
  text: The school was in charge of Nies Caine Oenowski, Russian lady of education, culture and refinement.
- speaker: Respondent
  text: By the way, Miss Oenowski's niece married Charles Horty, famous for his experiments in the turpentine industry, and
    his discovery of the process of converting scrub slash pine into paper used commercially in paper bag manufacture and
    also minor containers, and other byproducts of the pulp paper industry.
- speaker: Respondent
  text: I took the regular grades through Miss Oenowski's, also studied music there. There was an especially fine music department
    in connection with the school.
- speaker: Respondent
  text: When I graduated, she thought I possessed unusual talent as a pianist and secured for me a year's scholarship in the
    Chicago Musical College.
- speaker: Respondent
  text: I had wonderful training there, and after I graduated and back to Athens, then a year or so later, I went to Boston
    and enrolled in the Felton Pianoforte School, from which I also graduated.
- speaker: Respondent
  text: My studies in the two northern cities brought me into contact with many famous musicians. I knew Josef Hoffmann personally,
    and was influenced a great deal by his kindly interest and advice.
- speaker: Respondent
  text: Strange to say, in Chicago, I was thrown more with the theatrical element, rather than musicians. However, all the
    large theaters had famous orchestras, and their classical renditions and musical adaptations to the tempo of the play,
    were like high class concerts themselves.
- speaker: Respondent
  text: I met Joseph Jefferson, famous interpreter.
- speaker: Respondent
  text: Then there was Richard Mansfield, Jose Coughlan and his brother, Morris, Louis Jameson, renowned for his portrayal
    of Mephistopheles in Faust.
- speaker: Respondent
  text: In Boston I met Maxine Elliott, a most beautiful woman, and a star of no mean degree. There I heard Yaw in concert.
    She possessed a marvelous voice of great flexibility and wide range - from below middle C to almost an octave above high
    C.
- speaker: Respondent
  text: It was a great advantage culturally, I suppose, to most those famous people, but when you are a girl, you do not think
    of these things so much.
- speaker: Respondent
  text: In Boston we were required to attend noted recitals to note especially the manner and technique of experts.
- speaker: Respondent
  text: Then we would give concerts at the schools, for which invitations were sent to a selected few, kind thus we learned
    polish, poise, and the classic content of professional musicians.
- speaker: Respondent
  text: I remember one thing very distinctly in those recitals. The trainees were not allowed in the concert hall before our
    proper appearance on the program. We were required to remain in an upper, somewhat remote room, so that we would not be
    'jittery' or unnerved by the possible errors or misinterpretations of the scores by one preceding.
- speaker: Respondent
  text: Then when it came time for each one to perform, the pupil was calm, collected, and as fresh as if just opening the
    program. I practiced six hours a day at Felton School.
- speaker: Respondent
  text: I came to Jacksonville in September, 1906. It seems a long time ago, and it seems much longer when I look back upon
    my musical career, which started when I was so small I had to be lifted upon the piano stool.
- speaker: Respondent
  text: My mother was very musical, and also possessed a beautiful contralto voice. My father also possessed some ability
    as a musician, my two sisters were educated in music, so we lived in rather a musical atmosphere always. My sisters, however,
    did not keep up their music, but took business courses and later married, one living in Atlanta and the other, on the
    old home place near Athens.
- speaker: Respondent
  text: Shortly after coming to Jacksonville, I met my husband, who is a brother of Forrest, one of the most famous citizens
    of the city of Sanford, Florida, which he was mayor for fourteen consecutive terms. He is dead now, after a rather stormy
    career in his latter days.
- speaker: Respondent
  text: My husband and I are divorced, and I divide my time between my two children, a son in Jacksonville and a daughter,
    who has a dancing school in West Palm Beach, Florida.
- speaker: Respondent
  text: I have taught music at different times, played in concerts, both amateur and professional, and earned quite a reputation
    as a woman pianist.
- speaker: Respondent
  text: I never played in orchestras, however, until after I came to Jacksonville.
- speaker: Respondent
  text: When radio assumed its early proportions as a system of distributing music to the public, I was thrilled by its possibilities,
    and eagerly assisted in broadcasts when the first little station was established in an old shed down behind the Florida
    Times-Union building on Trent Avenue street.
- speaker: Respondent
  text: When WJAX, the municipal broadcasting station, was opened in Jacksonville with a program which lasted until three
    o'clock the next morning after Thanksgiving Day in 1926, I was a companionist on several of the numbers, and continued
    for many years, playing the accompanist for Henry Cornely and his associates, Prof. LePaige, and many others.
- speaker: Respondent
  text: I was glad to see the Federal Music Project established in 1936. I have been associated with the program in Florida
    from the beginning, also working in some capacity, and as accompanist in concerts for both public and private entertainments,
    the Federal Theatre, and others.
- speaker: Respondent
  text: It has been the salvation for old musicians, and an oasis in the land of promise for the younger element who needed
    its coordinated training, and I am in hopes that some way must be opened for its continuation.
- speaker: Respondent
  text: I think President Roosevelt's administration will go down in history as the greatest endeavor in humanitarianism ever
    promulgated, and I am heartily in favor of it. If he is able, or can be prevailed upon to accept a third term, I am all
    for it!
