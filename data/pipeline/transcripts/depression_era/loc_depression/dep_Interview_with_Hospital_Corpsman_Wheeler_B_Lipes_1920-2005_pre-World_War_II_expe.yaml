collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: You talked yesterday about your origins, about coming from New Castle, VA, and the fact that you had had rather humble
    beginnings. But the part we found fascinating was your working with your mother in the hospital. Was it at Norfolk when
    she was working at the hospital?
- speaker: Respondent
  text: No, she wasn't working at the hospital. She took care of a sick woman.
- speaker: Interviewer
  text: The chief petty officer's wife?
- speaker: Respondent
  text: Yes. In the quarters, and so I lived in the quarters.
- speaker: Interviewer
  text: You lived in the quarters?
- speaker: Respondent
  text: Yes, in their house.
- speaker: Interviewer
  text: How many children did your mother have with her at the time?
- speaker: Respondent
  text: Two, I think. There were two children and the woman.
- speaker: Interviewer
  text: And the chief was still alive? Was he at sea or was he there, too?
- speaker: Respondent
  text: He was there. His wife had to have constant care, so my mother took care of her.
- speaker: Interviewer
  text: That's when you got involved in direct medical care yourself, really. You helped out.
- speaker: Respondent
  text: I always wanted to be in the medical field. My great-grandmother was a Canadian, I think, best I can recall. I don't
    know much about that family. She owned a large pharmacy in Norfolk, and women pharmacists back in the 1800s were rare.
    Somewhere on my mother's side there were a couple of doctors in the family, but the branch I came from didn't have much
    going except peanuts. [Laughter]
- speaker: Interviewer
  text: You say they were from Suffolk [VA].
- speaker: Respondent
  text: Yes. They lived 8 or 10 miles beyond Suffolk, out in the farmland.
- speaker: Interviewer
  text: You say you helped your mother out. You were how old? You said, what, 8 or 10 years old at the time, when you were
    helping your mother take care of the--
- speaker: Respondent
  text: No. I was about 15, I guess, at that time.
- speaker: Interviewer
  text: When you said there were two children, were these the two children of the chief petty officer's wife?
- speaker: Respondent
  text: Yes. I'm the only son.
- speaker: Interviewer
  text: You're your mother's only son. So in the house there was the chief, his wife, his two children, your mother, and yourself,
    and you were 15.
- speaker: Interviewer
  text: Where was the naval hospital at Norfolk at that time? Was that the old hospital?
- speaker: Respondent
  text: It was the old hospital. It really was the old hospital at Portsmouth. It was across the Elizabeth River. And it was
    the old original building, with the dungeons in the basement.
- speaker: Interviewer
  text: Yes, it's still there, they are still using it.
- speaker: Respondent
  text: Yes. And if you look at those walls, scratched into the walls are initials and comments made by the prisoners. Some
    of them were Confederates and some were Yankees, because both sides used that dungeon area for their prisoners. And they
    had huge deadlights. They had that Roman architecture with these big steps that went up the front that extended nearly
    the full width facing the Elizabeth River, and they had deadlights of glass, big thick pieces of glass embedded, and that's
    how the light could get into the dungeon.
- speaker: Interviewer
  text: They're still there. The deadlights are still there. I've seen them. It hasn't changed.
- speaker: Respondent
  text: Your schooling in those days, when you were a teenager, did you go to the local schools there?
- speaker: Interviewer
  text: I went to school in Norfolk and didn't finish high school, and went along the way and got a GED completed and did
    my own self-education.
- speaker: Respondent
  text: You did a good job.
- speaker: Interviewer
  text: Then went to finish off at George Washington [University]. I took a lot of courses. But it's been fun.
- speaker: Respondent
  text: You were 15 when you were working at the Portsmouth Naval Hospital.
- speaker: Interviewer
  text: No, no, at the dispensary at the air station. See, I lived at the air station, and I spent almost all my time over
    at the dispensary.
- speaker: Respondent
  text: What would you do over there?
- speaker: Interviewer
  text: Well, they adopted me as a mascot, I guess. But they had somebody who would run the buffer. I don't think you would
    remember that, Bob, but there was green and red in laid linoleum, thick, and that stuff would glisten like a diamond when
    you polished it. So I ran the buffer. I went over to the galley and got food and served the evening meal to the patients.
    I helped punch capsules in the pharmacy. I could type. I typed around 100 words a minute. I was learning all the time,
    and I knew exactly what I wanted to do.
- speaker: Respondent
  text: That's where you decided to enlist in the Navy?
- speaker: Interviewer
  text: Yes. I had always wanted to be in the Navy.
- speaker: Respondent
  text: Which you did when you were 16.
- speaker: Respondent
  text: And you became a seaman right off, then, an apprentice seaman?
- speaker: Interviewer
  text: When they induct you, you're an apprentice seaman. We had some options, very few.
- speaker: Respondent
  text: What were the options?
- speaker: Interviewer
  text: You could go to the [U.S.] Naval Academy if you could pass that exam. You could become a striker, and a striker was
    a guy who worked with electricians to become an electrician's mate at some time, so they put after your name in parenthesis--striker.
- speaker: Respondent
  text: It could be any rating.
- speaker: Interviewer
  text: It could be whatever you wanted, except the Hospital Corps. You had to go to the Hospital Corps School, which was
    in San Diego.
- speaker: Respondent
  text: Did you go to a boot camp?
- speaker: Respondent
  text: Where was that located?
- speaker: Interviewer
  text: Norfolk. It used to be one of the large boot camps, except for San Diego. It was the big one.
- speaker: Respondent
  text: How long was that training?
- speaker: Interviewer
  text: The best I can recall, it was something like 8 or 10 weeks.
- speaker: Respondent
  text: Then they put you on the [USS] Nitro? [AE-2]
- speaker: Interviewer
  text: Yes. I was en route to San Diego and went aboard the Nitro as an apprentice seaman.
- speaker: Respondent
  text: That's seaman second?
- speaker: Interviewer
  text: You become a seaman second, I think, after 3 months. That was the progression.
- speaker: Respondent
  text: How long were you on the Nitro altogether, do you remember?
- speaker: Interviewer
  text: I think a month, month and a half, en route.
- speaker: Respondent
  text: You were going from the East Coast to the West Coast.
- speaker: Interviewer
  text: Through the [Panama] Canal to the West Coast to San Diego to go to school.
- speaker: Respondent
  text: I see. So they got double duty out of you. Instead of just sending you to school over land, they could get work out
    of you as a seaman going through the canal.
- speaker: Interviewer
  text: Oh, yes. Up there scrubbing those decks at 4 o'clock in the morning and using holystones and sand and salt water.
- speaker: Respondent
  text: So they had teak or wood decks?
- speaker: Interviewer
  text: Yes, they had wood decks. Do you know what a holystone is?
- speaker: Interviewer
  text: Well, there's a way you have to use a handle from a scrubber to make a holystone go back and forth on that wood, and
    they just bleach and become white with the salt and the sun. What a job.
- speaker: Respondent
  text: So you got to San Diego. That was in 1936, then, still.
- speaker: Respondent
  text: You told us a story about a boatswain's mate that you challenged, or didn't know that you had challenged.
- speaker: Interviewer
  text: I hadn't challenged him intentionally. [Laughter] I mean, I don't think most of us were that dumb. But this boatswain's
    mate was a typical brand of the time, who wore his hat squared right over his eyes and wore his boatswain's whistle around
    his neck whether he took a shower or was asleep, but he wore it all the time. He had a tattoo outlined on his chest, and
    on his navel were the claws of this eagle and the head of the eagle was right below his trachea.
- speaker: Respondent
  text: They had me painting in a winch house, the winch that operates all the booms which you load cargo. I had this bucket
    of red lead and was putting red lead on the winch. In those days, you painted anything that didn't move, and if it moved,
    you saluted it. [Laughter] The time came to go to chow, so I went to the noon meal and didn't care for that too much,
    so I came back early. I think we were in Miraflores locks, and I was standing over by the lifeline, just looking at the
    scenery, and this boatswain said, "Hey, get over here. Get in that winch house."
- speaker: Interviewer
  text: There were not as many rights then as there are now, and he certainly didn't say "please," and I didn't expect him
    to, because I understood the Navy's attitude. When I said to him, "I've got 10 more minutes," and he didn't say a word.
    He just slugged me and knocked me down and damaged my nose and took me down to the sick bay. They put a butterfly on it
    and took me back up and put me back in the winch house so I could continue painting. [Laughter]
- speaker: Respondent
  text: Years later, when I was on duty at the naval hospital in Philadelphia, I was a warrant officer, and they brought this
    patient into the emergency room on a stretcher. He'd fallen or had some accident. I saw him on the stretcher, and I walked
    over and looked down at him, and he had this outline of that eagle on his chest. I leaned over and said to him, "Are you
    'Jocko' Martin?"
- speaker: Interviewer
  text: He said, "Yes, sir, I am."
- speaker: Respondent
  text: He and I talked for a minute, and I told him I thought maybe he did me the biggest favor that could have been done.
    You know, it taught me a lesson that you keep your mouth shut, you might do better. [Laughter]
- speaker: Interviewer
  text: When you got to San Diego and got off the Nitro, you had additional training at that point.
- speaker: Interviewer
  text: You were just an apprentice seaman. You had already made up your mind that you wanted to be a striker? You said you
    couldn't be a striker.
- speaker: Respondent
  text: I had taken some exam at the end of the boot camp, and they gave me the school, Hospital Corps School, and so that's
    why my orders were sending me there. But you were not a hospital corpsman until you graduated from the Hospital Corps
    School. You were still a seaman second, and the hospital apprentice second class was the equivalent of a seaman second.
- speaker: Interviewer
  text: What was that school like? Can you recall some of the types of things you would have learned there, some of the courses?
- speaker: Respondent
  text: Yes. Anatomy, physiology, pharmacy, general administration, clerical things, laboratory, X-ray, nursing. So it covered
    a broad spectrum of those things which you would need in health care. I've forgotten what my marks were, but I think there
    were three of us in the top of the class of about thirty-some people, in which they were like a hundredth of a point or
    something apart. I had a knack for that.
- speaker: Interviewer
  text: Where was the school located? In the hospital?
- speaker: Respondent
  text: In the old naval hospital up on the hill. Have you been there?
- speaker: Respondent
  text: It was a gorgeous facility.
- speaker: Interviewer
  text: Is it Balboa Park?
- speaker: Respondent
  text: Balboa. Right across the street from Balboa Park.
- speaker: Interviewer
  text: Was it a new hospital at that time?
- speaker: Respondent
  text: Fairly new. It was Spanish architecture, just gorgeous. Down away from the highway and the park at the other end was
    a building that was four or five stories, and that was the Hospital Corps School. It was adjacent to a huge swimming pool,
    and so it was an idyllic setting.
- speaker: Interviewer
  text: I experienced my first earthquake there, and I remember as the building began to undulate, the teacher, a chief petty
    officer, when we started to get out of our chairs, he said, "Be calm. Stay in your seats"--ZIP!--and he was the first
    guy out of there. But he wanted to be sure no one was blocking the door. [Laughter] But the building rippled away.
- speaker: Respondent
  text: But the school was excellent. You had qualified people teaching us. Those of us who were in that school, we recognized
    the value of what was happening, of how you were getting an education. In those days, people had no jobs and no homes,
    usually. But as I mentioned about Foley, I thought the Depression was a time of prosperity, especially in the Navy. It
    gave security and education and a future, which the country didn't really have at the time. The rigidity of the Navy and
    the old rocks and shoals under which we operated, the only change that had been made in the articles of government of
    the Navy, the only changes that had been made since John Adams' time was that they did away with keel hauling and flogging,
    but everything else was still very rigid.
- speaker: Interviewer
  text: A friend of mine, who was a third class, I think, pharmacist's mate, was 3 minutes late for muster at 8 o'clock in
    the morning, and they gave him a bad conduct discharge. When the war came, he came back into the Navy and they brought
    him in as a second class. He went with the Marines, and he had all sorts of commendations for valor and Silver Stars.
    But this was the extreme, like my getting a 30-day restriction because I set the thermometer rack of six thermometers
    on the foot of the bed, and the patient moved his foot and they flipped off on the floor and broke. I had to waste the
    executive officer's time to appear before a mast to talk about my terrible offense of breaking those thermometers, and
    I received 30 days' restriction. And you could only count your working days as a day of restriction and not your usual
    off days. But you still couldn't leave the hospital, so you had to do 60 days to do 30 days' restriction. We stood port
    and starboard watches. Our working hours on the night shift was 9 to 7, not 11 to 7, so they were long days. But you didn't
    hear people complaining.
- speaker: Respondent
  text: This was in the hospital at Philadelphia. How did you get to Philadelphia? Did you go on the train or did they put
    you on another ship?
- speaker: Interviewer
  text: When I left the Hospital Corps School, they sent us to the receiving ship at the destroyer base in San Diego. They
    had a ship there, the USS Rigel [AD-13] and the Rigel was tied to a pier, and they had to dredge the coffee grounds from
    around it to move that thing when World War II came. The commanding officer of the ship and his wife lived on board, and
    they had window boxes under the porthole.
- speaker: Respondent
  text: I had to be on that ship a waiting transfer to the USS Texas [BB-35], and the Texas was coming down the coast and
    would be off San Diego, off Coronado Roads at whatever time in the morning, like 6 o'clock or 5 o'clock or whatever. We
    were put into a 50-foot motor launch, and three or four of us headed to sea. The seas were rough, it was dark, and typical
    of military life, you hurry up and wait, and so we were out there laying to in the Coronado Roads waiting for the Texas
    to show up, and went aboard and came back through the canal and on into Norfolk and from there, the train to Philadelphia.
- speaker: Interviewer
  text: Did you have any duty on the Texas?
- speaker: Respondent
  text: Oh, yes. I worked in the pharmacy.
- speaker: Interviewer
  text: How many medical officers were on the Texas at that time?
- speaker: Respondent
  text: Two, best I can remember.
- speaker: Interviewer
  text: And how many pharmacist's mates?
- speaker: Respondent
  text: I think there must have been 14 or 15.
- speaker: Interviewer
  text: So you just became a member of that sick bay.
- speaker: Respondent
  text: Yes, you're just a part of that. In fact, in the pharmacy, it was a long, narrow room, had a little counter, and behind
    that, under the porthole was a long leather bench, and I used to sleep on that bench rather than down in a hole someplace.
- speaker: Interviewer
  text: Were you issued a hammock?
- speaker: Respondent
  text: Oh, yes. I slept in a hammock.
- speaker: Interviewer
  text: You strung the hammock each day?
- speaker: Respondent
  text: Your hammock had to be wrapped around your sea bag. Your sea bag was packed, and then you put the hammock over it
    so you could pick up the whole thing and carry it. You had to tie it all together and stow it, and then when it was time
    that they put the signal out, the sound-off that you could put your hammocks up, then you would go through this routine
    and hook them up. When you had the flu or were sick, it was a struggle getting in and out of that thing. But you slept
    well, because it didn't matter what the ship did, they were practical.
- speaker: Interviewer
  text: What about the sea bag?
- speaker: Respondent
  text: There were bins on the outboard section, and they stand about 3 or 4 feet, and you set those things in there.
- speaker: Interviewer
  text: So you took the hammock out, pulled the sea bag from the hammock, put it back in the bin, and then put it up.
- speaker: Respondent
  text: See, if that's the sea bag, the hammock was brought around it and tied up here and secured, so that when you picked
    up the sea bag and ham
