collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: When papers was a penny a piece was the days when I was selling them. I was a little lad then, and I lived on the
    streets practically all day, days and nights both. We used to sneak in the burlesque houses or the all night places on
    West Madison Street and sleep there. The only trouble with that was the ushers would come around every hour or so and
    throw the flashlight in your face to see was you awake. You wasn't supposed to go to sleep. Sometimes they timed us out.
- speaker: Respondent
  text: We had a lot of dodges. A penny was a lot of money to us, and a nickel was a hell of a lot. A dime or a quarter was
    a fortune.
- speaker: Respondent
  text: I practically grew up on a pool table.
- speaker: Respondent
  text: Here's one of the dodges us news kids used to have in those days for making money.
- speaker: Respondent
  text: You know how a guy is when he buys a newspaper. He's a fez of something or other, baseball nine times out of ten,
    and he's got the boxscore habit. You hand him a paper, and right away he's looking at the boxscore; he's holding the paper
    in one hand, reading the scores, and the other hand's stuck out for the change; he takes his change by ear, see, by ear
    and touch if you get it; he's reading. So me, I lay a penny in his hand, if it's a nickel, say, that he gave me. Then
    I click the second penny on the first and count two.
- speaker: Respondent
  text: And the same with the third penny. Each time the penny drops on the other pennies in his hand. But the last penny
    I hold onto; I click it on the other pennies, but I don't let go on it, and he thinks he's got all of his change. Nine
    times out of ten he sticks the pennies in his pocket without even looking at them, and that's the dodge.
- speaker: Respondent
  text: Here's another petty larceny trick we had. We'd pull it at car stops where they had stop lights.
- speaker: Respondent
  text: When the streetcar was waiting for a red light to turn, we used to run up alongside the car and the people in the
    car would stick their hands through the windows for a paper. He'd stick his hand outside the window and maybe he'd have
    a nickel or a dime in it instead of the change, the penny, and later, when the war started, two pennies.
- speaker: Respondent
  text: If he gave us a nickel or a dime, it was just too bad. We'd fumble, try and we'd fumble-- boy, we sure had to dig
    deep for that change -- and we'd run along beside the car when it started, but-- it never failed-- we just couldn't reach
    him, the car would be picking up speed and we just couldn't reach his hand with that change. It never failed to happen.
- speaker: Respondent
  text: But I've had guys get off the car at the next stop and come back and make me give them their change. They were wised
    up, I guess, or maybe they'd sold papers once themselves. Anyway, I've had that happen to me.
- speaker: Respondent
  text: The big guys thought this one up. We pulled it every Christmas.
- speaker: Respondent
  text: 'They''d have cards printed up, and they''d sell them to us little fellows for a nickel a piece. Let''s see if I remember
    just what was on those cards. Something like this:'
- speaker: Respondent
  text: '"Christmas comes but once a year, and when it comes it brings good cheer; so open your purse without a tear."'
- speaker: Respondent
  text: Well, we paid a nickel a piece for those cards, and whenever we sold a paper we'd hand the card to the customer. Sometimes
    it was good for as much as a quarter. But this was the payoff. We always asked for the card back. They'd give us something,
    and they'd expect to keep the card, but we'd ask for it back; we'd use the same card over and over again-- it would cost
    us a nickel to get another one. We called the big guys the "midnight cuckoos" -- I don't remember why.
- speaker: Respondent
  text: It's funny what crazy things a guy will do when money's so important to him. I remember once Manuel, the narrator's
    brother, found a dollar bill on the floor of a saloon. I spent the rest of the night going in all of the saloons. I couldn't
    find a damn cent.
- speaker: Respondent
  text: The newsboy was always a good source of information in those days. Like the cops are today. Since the automobile came
    in, you'd be surprised to know how many kinds of questions are asked of the cops. But the newsboy was the original. You
    could find out from us almost anything you wanted to know, where the saloons were-- only you didn't have to ask much about
    them--, the location of the gambling joints, the whorehouses, almost anything, from the location of the First National
    Bank to the best place to get a piece of tail cheap.
- speaker: Interviewer
  text: Did I tell you the one about the time we tried to get the bathing suits, and didn't?
- speaker: Respondent
  text: You know what an island showcase is? This was twenty-twenty-five years ago. You've seen these stores with two big
    show windows outside the door and the door set way back, maybe fifteen-twenty feet or so. Well, in that entrance, between
    the windows up to the door, the stores used to have high glass showcases - they were always locked, with a padlock-- they
    were called island showcases.
- speaker: Respondent
  text: They were permanent showcases that stood in the lobby. You still see some of them.
- speaker: Respondent
  text: Well, this was in the summer. There were three of us that always palled around together. There was Harry and Benny
    and me. Harry wasn't around this time though. There was a place about a mile away, in the Italian neighborhood, where
    we used to go swimming. It used to cost us a penny apiece. It was hot as hell that day I remember, and we wanted to go
    swimming like all hell. Only we couldn't, because we didn't have no bathing suits.
- speaker: Respondent
  text: In this here island showcase I'm telling you about, Benny and me, we saw something that just fit the bill, bathing
    suits, lots of them, all kinds, and we went over and looked them over and picked out the ones we wanted-- one for Harry
    too; Harry wasn't with us, I think I told you.
- speaker: Respondent
  text: The payoff was the padlock on the showcase wasn't locked; so Benny and me, we made out plans, which ones to get and
    everything.
- speaker: Respondent
  text: Well, it was a long vigil. All evening and till about four o'clock in the morning. We knew enough not to take any
    chances. Every time we were ready to raid the case someone would come straggling along, sometimes the cop on the beat,
    sometimes some people walking the streets -- it wasn't till about four before we got the chance we was looking for.
- speaker: Respondent
  text: So we rushed over. The padlock wasn't locked, and we take it off and go to open the case. And I'll be a son of a bitch!
    - the goddamn thing had an inside lock, and it was locked.
- speaker: Respondent
  text: We was so mad we started to cry, both of us. We stood there blubbering like a couple babies. Jesus.
- speaker: Respondent
  text: Believe me, us kids used to be on the lookout; we was ready for anything. And there wasn't very much got by us either.
- speaker: Respondent
  text: I remember once I was in a one-armed restaurant--the place did a thriving business, and along about midnight, especially
    when it was cold, we used to go in to soak up some heat. They used to kick us out, but sometimes we'd buy some coffee--
    and then they'd have to let us stay a while anyway.
- speaker: Respondent
  text: Well, as I was saying, I was in there one night-- it was maybe twelve-one o'clock--when a guy comes in with what looks
    like a laundry package under his arm, and I'm on the make as usual, alert. It looked like a laundry package, but it was
    all wrapped up nice and I figured it wasn't no laundry. He got him something to eat; and he walked over to a seat; and
    this package, he sat on it.
- speaker: Respondent
  text: So, I go buy myself a cup of coffee, and I sit down in the seat right next to him. I keep dawdling and dawdling over
    my coffee, and I almost don't make it last. I figured maybe he'd forget that package.
- speaker: Respondent
  text: I kept busy reading one of my papers. It must've been along about one o'clock in the morning.
- speaker: Respondent
  text: Sure enough, when he gets up, he forgets to take the package, and quick as a flash I grab it and put it in between
    my papers, and then I sneak out. When I open it up a few blocks away, there's a classy silk shirt.
- speaker: Respondent
  text: I figure it must've cost seven-eight dollars, maybe ten. I couldn't do much with a thing like that.
- speaker: Respondent
  text: But I set a bright idea. It won't do me no harm, I figure, to be on the good side of one of the circulation men, and
    I offer it to him. He likes it and he says, "What do you want for it?"
- speaker: Respondent
  text: I wasn't figuring to sell it; I'd meant to give it to him, figuring it wouldn't do no harm to be on the good side
    of him that's all.
- speaker: Respondent
  text: But when he said that, me, I say, "We'll call it a hundred and fifty sheets." That'd be about ninety cents. No! -
    in those days the war was on and the price was raised to a penny, to us kids. A dollar and a half was all I got for it,
    in papers.
- speaker: Respondent
  text: There was a certain code among us kids, and the guy who didn't live up to it, that was just too bad for him. You observed
    it, or else.
- speaker: Respondent
  text: One of the things was, you couldn't sell on the corners where the fellows was. There wasn't stands in those days,
    they just piled the papers on the curb and put stones on top of them, and every busy corner was held down by some big
    guy. Us little kids, we ran around the streets, and we wasn't allowed to sell on any of those corners. If we did, we had
    to buy the paper back from the guy whose corner it was; and besides that, he'd boot us a good one.
- speaker: Respondent
  text: We were little kids. The women, especially, would buy from us in preference to the big guys, not realizing, of course,
    what they were letting us in for. I remember one time. I sold a paper and I had to buy it back. But I got a kick that
    time that hit the bull's eye. It was so terrific I felt it for days. But not only that.
- speaker: Respondent
  text: Every time I saw that guy, I would feel that kick.
- speaker: Respondent
  text: This is about that code again. The corners, the good spots, I told you about -- the big guys who owned them, they'd
    make deals with one of the younger fellows in the newsroom before going out on the street to buy them out at about midnight
    or one a.m. when the final pull begins. One of the big guys would say to one of the little guys, "Hey, punk, want to buy
    me out tonight?" And the little guy, if he said yes, it was his ass if he didn't, no matter how many papers the big guy
    had left over.
- speaker: Respondent
  text: Only this time, it was the wholesale price. Then you got caught on a corner when you had to pay what was coming to
    you or maybe later-- yes, you got it.
- speaker: Respondent
  text: No matter how often you sold on the corner, there'd be the big guy standing right behind you, and yes, got what was
    coming to thee or maybe later-- yes, you got it.
- speaker: Respondent
  text: Well, if you didn't keep your promise to buy the guy out, it was too bad. That was the code.
- speaker: Respondent
  text: I'd made a deal with a guy; said I'd buy him out. Along about twelve o'clock, when I looked to tell the drops he had
    left, there was more than I thought I could sell.
- speaker: Respondent
  text: But there isn't two ways about it, I had to buy them, and I did. But I started to bawl.
- speaker: Respondent
  text: While I was standing there crying, I sold all the papers.
- speaker: Respondent
  text: I was bawling like hell, and I ended up a sucker all the other kids when they straggled by if they wanted to sell
    me any of their sheets, saying "If you're stuck I'll buy some," and crying like all hell all of the time.
- speaker: Respondent
  text: 'When I was selling papers, if there wasn''t anything startling we could yell about to help sell the papers, we always
    got around it this way:'
- speaker: Respondent
  text: 'We''d look all over the sheet looking for a story from Washington, anything at all, no matter what it was, and then
    we''d yell like hell, we''d yell:'
- speaker: Respondent
  text: '"Read all about the White House Scandal: All about the White House Scandal: The White House Scandals Read all about
    it!"'
- speaker: Respondent
  text: Did I tell you about the time the three of us were locked up the same night, Miguel and me and Izzy? Brothers of the
    narrator.
- speaker: Respondent
  text: I was the oldest and Izzy was the youngest. Izzy's dead now.
- speaker: Respondent
  text: How he happened to be with me that night I don't know, because he was a real little guy. This happened about - well,
    about two o'clock in the morning I guess.
- speaker: Respondent
  text: Well, when one-two o'clock in the morning rolls around a cop happens to see Izzy--he's standing off by himself to
    one side--and because he's so little, picks him up. Manuel says to me, "You'll get hell, Phil, if you don't get him."
    And that was right, because I was the oldest one and I was responsible. So I goes to the station.
- speaker: Respondent
  text: I say to the desk sergeant, "I'll take him home, I'm his brother," but the desk sergeant picks me up too. While I'm
    standing there, the sergeant says to the cops, "There's a kid looking in the window. Go out around the back and bring
    him in." So there was the three of us; it was the big roundup; and away we went to the cooler.
- speaker: Respondent
  text: They called up the old folks, and my mother came down to get us. She talked to the sergeant to lecture us so we'd
    come in off the streets at night, and he made his lecture so good, especially to me, my mother got sore at me and wouldn't
    take me out, only Izzy and Manuel. She refused to take me out so I was left there for two-three days.
- speaker: Respondent
  text: The prize one is the one about the time the two cops searched me for the money and couldn't find it on me. I was eight
    years old then.
- speaker: Respondent
  text: I ran away from home.
- speaker: Respondent
  text: I was selling papers; it was on a Sunday, and me and another kid, we was working a rooming-house neighborhood.
