collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: There is a certain religious group who boast of being sanctified and unafraid, thus making the following incident
    which actually happened, a real joke.
- speaker: Respondent
  text: At the beginning of the services there were testimonials as to their fitness for the "kingdom" because they were sanctified,
    thus free from harm.
- speaker: Respondent
  text: The store-front church was crowded. At the completion of the testimonials the preacher announced, "I'm gonna talk
    shortly on 'Dry bones in the valley'."
- speaker: Respondent
  text: He thrilled them with vivid word pictures of death on a white horse riding through the valley, the grim reaper at
    harvest time.
- speaker: Respondent
  text: Under the spell of his appeal, the fury of his shouting and the magnetism of the songs with which he interspersed
    the sermon, they broke forth in a spasm of religious fervor that gratified his efforts.
- speaker: Respondent
  text: He hissed through his teeth with fiery vehemence, moaned, sobbed and grunted; ending with a chant that struck them
    with such poignancy, they were fairly lifted out of their seats.
- speaker: Respondent
  text: The conglomerate response of a men's hallelujahs, stamping of feet, clapping of hands and the rhythmic dancing of
    those who pranced up and down the aisles charged the air.
- speaker: Respondent
  text: The preacher gulped down glasses of water as sweat poured down his face. "You see the silent rider on his white horse
    but you ain't afraid cause you're God's own children, sanctified and saved by grace," he moaned.
- speaker: Respondent
  text: At this point the lights went out leaving the place pitch dark.
- speaker: Respondent
  text: There appeared a figure clad in white. Eyes bulged as they beheld the spectacle in white, a small light focused on
    it.
- speaker: Respondent
  text: There was a brief, tense silence followed by the noise of chairs being overturned, women screaming and the general
    commotion of everyone trying to get out of one door at the same time.
- speaker: Respondent
  text: The preacher proved himself adept at tackling and was the first out of the building.
- speaker: Respondent
  text: Three people knew what had actually happened. Three mischievous boys planned the thing. One turned out the light,
    another held the small flashlight and the third one clad in a sheet. The latter came near getting the worst of the deal
    for he was pretty well trampled before he could get out of the sheet.
- speaker: Respondent
  text: The story of the passage of scripture, "Moreover the dog licked Lazarus' sores," is an example of the strange interpretations
    put upon the bible. It is also something of a revelation as to the spontaneity and ease with which some of the folk can
    create verse.
- speaker: Respondent
  text: It is no uncommon thing for those Negroes who make up verses to old familiar tunes, to hear a sermon and sing three
    to ten new verses which they make up as they sing. There is always that repetition, of one or more lines such as "Oh my
    Lord... yes my Lord" or in the case of the song mentioned in the story, the line, "I got a home in that rock, don't you
    see," is repeated three times when the entire verse is sung.
- speaker: Respondent
  text: This spontaneous origin is true of the Negroes religious songs, work songs and social songs. The tune may be one common
    to everyone but the words are changed to express the singer's thought or idea. Plagiarism has no place in their conscience.
- speaker: Respondent
  text: Moreover, the dog licked Lazarus' sores.
- speaker: Respondent
  text: 'Preacher: (chanting) And Lazarus laid on Dives'' steps, a sick man, a beggar man, covered with sores from head to
    foot... sick unto death... (repeating) sick unto death...'
- speaker: Respondent
  text: 'Audience: Amen... Hallelujah... Praise his name...'
- speaker: Respondent
  text: 'Preacher: And the scriptures tells you that it was, moreover, the dog licked Lazarus'' sores... didja hear me? The
    bible say moreover the dog licked Lazarus'' sores. Then with strong emotion and weird intonations he asked, "Now what
    was the dog''s name I ask you what was the name of the dog that licked Lazarus'' sores?"'
- speaker: Respondent
  text: 'Audience: Preach the word brother! Tell the truth!'
- speaker: Respondent
  text: 'Preacher: All the years you been hearing about the dog what licked Lazarus'' sores and you ain''t never thought about
    what his name was. Moreover, he shouted, "Moreover, the dog licked Lazarus'' sores... the dog''s name was Moreover...
    don''t it say ''Moreover, the dog licked Lazarus'' sores''... says it plain as anything."'
- speaker: Respondent
  text: 'Audience (singing): Poor man Lazarus poor as I when he died he found a home on high, I got a home in that rock don''t
    you see. Now we know for the very first time the name, Moreover is divine, I got a home in that rock don''t you see.'
