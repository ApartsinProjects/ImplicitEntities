collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Yes, said the old Captain, I went west right after the war, in 1867 to be exact. Those were great old days. I went
    up the Missouri river to Fort Benton Montana. The blackfeet Indians were out in full force at that time. Old Chief Raven
    Claw had two thousand warriors at his back. Then, there were the mining camps, everything wide open day and night. We
    all had money and we all blew it in as soon as we got it. I remember when I made fourteen dollars a day working in the
    drift and I wouldn't have enough to pay my board bill at the end of the week. Expenses were high but I lost most of it
    bucking the tiger, that is, faro bank. The saloons were full all the time. There were shooting scrapes every day but that
    didn't make no difference in the population. There were always new people in town, cattle men, miners, road agents. I
    remember seeing five road agents hung one day. They'd just put 'em up on a pile of barrels, tie a rope around their necks,
    and kick the barrels from under them. When one of them named George Ives had gone AID and started to wiggle like a fish
    out of water, one of his pals named Boon Hallam looked at him and says, Cheer up Partner, I'll be in Hell with you in
    a few minutes. Yes, you'd run up against some strange characters out there in those days.
- speaker: Interviewer
  text: Captain, who is the strangest character you remember at that time?
- speaker: Respondent
  text: Just about the strangest was Liver Eatin Johnson. There was nothing against the man. He was a good fellow, just kind
    of inhuman like. He was a great big powerful fellow, a regular giant. Most of the time, he kept to himself and didn't
    have a word to say to anyone but sometimes, he would come into town and drink and when Liver Eatin got a couple of quarts
    under his belt, he was apt to get a little noisy. He was good natured but noisy and what's more, he was so big that he
    was likely to break anything that got in his way, glass or furniture or ordinary people, without even meaning to do it.
    One night when he had one of his jags on, the town Marshall came up to him and told him that he was under arrest. The
    Marshall came about up to his elbow and Johnson could have put him over his knee and spanked him. We all thought something
    like that or worse would happen. At least the Marshall might have had sense enough to draw a gun first and get the drop
    on his man. But he didn't. He and Liver Eatin were pretty good friends and Liver Eatin just went along with him as meek
    as a lamb. Now, the jail was a board shanty that didn't amount to anything. It was scarcely ever used. The Marshall told
    his prisoner that he could just sleep off his drunk and pay a fine next morning. But Liver Eatin Johnson wasn't that kind
    of a man. As soon as the Marshall was gone, he just put his back against the wall of that shanty and down it came. He
    kicked aside the ruts and simply walked out of town to his own cabin to sleep off his jag. Nobody ever asked him to pay
    a fine or even to help rebuild the jail.
- speaker: Respondent
  text: But the story I was going to tell you is how Liver Eatin Johnson got his name. He was out trapping one time and he
    ran out of food. Then, the Indians attacked. He was a good shot and when he killed seven of the bastards, they decided
    to leave him alone. Now, he was mighty hungry. He hadn't eaten for a day or so. The way Liver Eatin told it afterward
    was, I looked over them Indians and thought there might be good meat on some of them. I picked out the youngest for I
    figured that he was likely to be the tenderest. I didn't want all of him. Which part should I choose? I could cut me a
    nice steak if I wanted but no, thinks I, the choicest part will be the liver. There's nothing I like better than nice
    tender liver. And let me tell you, boys, I never had a choicer meal in all my days than the liver of that young Indian.
- speaker: Respondent
  text: I don't know whether Liver Eatin Johnson was naturally a cannibal or whether things just came out that way. But one
    time, later, he was out trapping with another man. Food was scarce as the time before and again, the Indians attacked.
    This time, Johnson's partner was killed but there were no dead Indians left around. Johnson knew that he could get back
    to the fort in a couple of days and there was a lot of extra meat on his partner that wouldn't be any good to a dead man.
    So he just cut off a leg from his dead partner and hung it over his saddle horn and went on his way. He took some meat
    off whenever he needed it and the leg was half eaten when he got to the fort. Out comes a young officer fresh from the
    states in his bright new uniform and says he, What have you got there on your saddle horn, Johnson? And Johnson answers
    him, The ham of a man. Then, the old timers around the fort came out and gathered up the young dude officer who had fainted
    and asked Johnson how it happened.
- speaker: Respondent
  text: Mr. X was definitely of the old west. His type was authentic and the picture would be incomplete and less interesting
    without it. He was a bit of a prospector and a good deal more of a promoter. The old Captain said Mr. X had done all his
    prospecting from a Pullman car window. Be that as it may, Mr. X was a genial liar. He had on tap a large enough supply
    of imagination and other people's experience which he always told as his own to make up for the time he had spent in the
    smoking car rather than the wilderness. Sometimes he expected to be believed and sometimes, it was pure stretching the
    story to get a laugh. No one believed him in either case, so it didn't matter.
- speaker: Respondent
  text: Sure, I've been in Alaska, said Mr. X one day when the conversation got around to that subject. I was there just before
    the gold rush or just after, I don't remember which but it wasn't 1898. I spent the winter there. Ye Gods, was it cold?
    When you went out, your breath would freeze on you so you could melt it down for ice water. When your breath froze, you
    had to knock it off. If enough of it accumulated, it would fall and crush your toes. There were five or six of us that
    lived up in a cabin. We had gone up into the mountains to prospect but the winter caught us.
- speaker: Respondent
  text: There was nothing for us to do but to lay up until Spring. We had plenty of sunnies and it wouldn't have been so bad
    if it weren't for the cold. It was cold enough to freeze your hair off. Well, there was a young fellow with us named Jimmy
    and he wasn't so strong. His family never should have let him come to a country like that. The rest of the party were
    hard and tough like me, you know, the kind that can eat rocks and ask why the Hell they make the boulders so soft nowadays.
    I felt sorry for Jimmy. I didn't think he could get through that Alaskan winter and he didn't. Poor Jimmy died. At last,
    the cold got him.
- speaker: Respondent
  text: Well now, we had a dead man on our hands and the question was what to do with him. We broke about a half dozen picks
    on the ground trying to dig a grave for Jimmy. We didn't have any dynamite and if we had, the ground was frozen so hard
    we couldn't have blasted a hole big enough for a grave anyway. Finally, I had a bright idea. It makes it hard sometimes
    to be the kind of man I am. When the rest throw up their hands, I just take everything over and get them out of their
    scrape. They just say, Leave it to X. He knows what to do. He'll get us out of this and do I come through? You bet.
- speaker: Respondent
  text: As I was saying, I had a bright idea. I called one of the other boys to help me carry Jimmy out of the cabin and we
    stood him up against the wall outside. I could see the boys look at each other and I knew they wondered what I had in
    mind. They didn't ask me though for they knew that if I made up my mind to do a thing, it would turn out all right.
- speaker: Respondent
  text: I let Jimmy stand out there all night and when we went out to look at him next morning, there he stood frozen as solid
    as cement. Then, I went and got a pile-driver that we had around the camp. We moved Jimmy away from the wall. We brought
    the pile-driver down on his head several times and there he was, fixed there in the frozen ground, standing upright and
    looking as natural as life. I wouldn't be surprised if he's there still.
- speaker: Respondent
  text: Dolan was a man past the middle age but he was not of the old west. He was of the new west, a modern hobo. When I
    knew him, he was one of the janitors in a medical school where I happened to be working as a student at the time. Dolan
    had had a variety of occupations.
- speaker: Respondent
  text: Sure, I've been a timber beast up in the North West, he would say to me. And I was a WO too. A lot of us used to carry
    the red card.
- speaker: Interviewer
  text: Say, Dolan, Pete doesn't think much of your way of life.
- speaker: Respondent
  text: Is that so, said Dolan. Yes, I continued. Pete says he wants to marry and settle down and live on a farm.
- speaker: Respondent
  text: I know, Dolan answered contemptuously. He's the kind of guy that will save for forty years to buy twenty acres.
- speaker: Respondent
  text: If these hoosiers would travel ten miles, they might learn something, Dolan would say. His use of the term Hoosier
    did not signify any particular hostility to the people of Indiana. He used it to mean hick. He was friendly with the students
    but he regarded most of them as naive and resented their tendency to patronize him.
- speaker: Interviewer
  text: I suppose, Dolan that you have traveled quite a little.
- speaker: Respondent
  text: Jah, Dolan answered curtly.
- speaker: Respondent
  text: Dolan flashed back, Pike's Peak. I built it. And then, when the news got around that I had built Pike's Peak and what
    a good job it was, they sent for me to come to California to come and build Yosemite Valley for them. I refused to go
    at first but finally when they coaxed me, I went out there. I finished Yosemite Valley in three days and when I had it
    all done, they said, Throw him out, the god damned bum. He's no good anyway.
- speaker: Respondent
  text: It is a truism that in this gorgeous fantastic aggregate we call America, the customs and traditions of older worlds
    meet and mingle with new conditions and a new life. As an extension of this fact, it frequently harasses the world of
    railroads and factories and mushroom cities, there is an echo of that spirit world born of pre-scientific thinking and
    primitive imagining, the reflex of a primitive society.
- speaker: Respondent
  text: This story was told me by an elderly Negro woman from the south. I should say, the two following stories were told
    me by her. She was interested in ghostly yarns. She was not an educated woman but she was far less superstitious than
    many people who have more advantages. We cannot too strongly insist that superstition is a cultural and not a racial phenomenon.
- speaker: Respondent
  text: In fact, with such people as the Negroes or the Irish who have a rich tradition of supernaturalism, the reaction is
    apt to be violent and pronounced in the reverse, when they find that their beliefs are myths. The sensationalism of Mr.
    Paul Maurana about a tavisms of the Negro blood calling them back to the dark ancestral jungle worship is misleading and
    pernicious.
- speaker: Respondent
  text: My narrator said, There are a lot of old tales down in the south where I came from. I don't know whether there's any
    truth in them or not. I remember one story that the old folks used to tell us. It was about a miller that married a woman
    and after he was married a while, he began to hear strange stories about his wife. Some folks said she was a witch. One
    evening when he came home late, he came into the house and called his wife but there was no answer. Then, a cat ran into
    the house and rested him and into the room where he and his wife slept. Just then, his wife came out of the room and said,
    Here I am dear. Did you call me? He was sure she wasn't there before and the cat wasn't anywhere around but he just never
    let on he noticed anything. After a while, his wife said to him, When you came in, a cat ran in here and he ran right
    through the house and right into the bedroom and jumped right out of the window. Did you see him?
- speaker: Respondent
  text: The husband just put her off let on like it was nothing to him. The next night, he pretended like he was real tired
    and wanted to go to bed early. He pretended to go to sleep right away but all the time, watched his wife to see what she
    would do. As soon as she thought it was all safe, she slid out of her skin and changed herself to a cat and was out of
    the window and away. And she just left her skin laying there on the bed. The miller knew then that his wife was a witch.
- speaker: Respondent
  text: He got up then and got some pepper and spilled it all over his wife's skin and the skin shrunk all up. Pretty soon,
    she came back and changed back to a woman again and tried to get into her skin but no matter how she tried, it wouldn't
    fit her. She cried out, skinny, skinny, don't you know me? But that didn't do any good either and finally, she just ran
    off without any skin and nobody ever saw her or heard of her again.
- speaker: Respondent
  text: There was another story that I used to hear, continued the Negro woman. Down in our part of the country, there was
    an old woman that everybody called Aunt Liza and people were afraid of her because we all knew she was a witch.
- speaker: Respondent
  text: One time, she and her husband that we called Uncle John had some sort of argument with a white man they'd done some
    work for. Now, this white man owned a big farm and all of a sudden, the funniest animals began to be born on his farm.
    There were sheep with feathers and chickens with wool. There were calves with pigs' snouts and pigs with horns.
- speaker: Respondent
  text: Of course, the farmer knew right away that it was Aunt Liza done all that mischief. So one day when he saw Uncle John
    going by, he stopped him and said, You tell Aunt Liza that if we don't take the spell off of them animals of mine, I'm
    going to get a silver bullet and kill her with it.
- speaker: Respondent
  text: Aunt Liza got afraid of him and didn't give him no more trouble.
