collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I carry away finished pork hocks. That is, when my table finishes the trimming of them, they box the hocks and I take
    it away to another table farther up. These boxes are heavy, they weigh a good thirty pounds a piece. The floor is greasy
    and that makes it easy to slip and fall all over the place. I almost broke my neck from one of the flops I took there.
    My arm was sore for three weeks after that. I remember I went over to the butcher shop a couple hours after I fell that
    time, and I wanted the doctor to take a look at my arm. It was swelled up like a ham, and hurt so I could hardly work.
    Well, the way he fixed me up! Like they always do in the butcher shop. Painted mercurochrome on my arm, gave me a pill
    and said I could go back to work.
- speaker: Respondent
  text: The doctors are lousy in that place. They don't give a hang about you. The girls always joke about the treatments
    they give you. Got a headache? Here you are. White pill. Dizzy spell? Take a pink pill. Cold? Take an aspirin. Sore throat?
    Take an aspirin. Infection? Paint it with mercurochrome or iodine, and let it go at that. Cut deep? Tape it. Katie Sullivan
    cut herself across the first joints of her three middle fingers. Doctor said it wasn't bad, just needed taping. Her fingers
    are deformed now. All crooked up. She can't unbend them. Those dirty company doctors.
- speaker: Respondent
  text: A lot of women keep at work until their fifth or sixth month of pregnancy. Couple of months after they came right
    back. Pregnant woman gets sick at work she won't go see the doctor. He'll just tell her to go home or shut up, she isn't
    supposed to be working there according to company rules and if she does, why, let her take the consequences. If she gets
    sore, he sends in a report and she gets laid off right away.
- speaker: Respondent
  text: Once there was a committee got up of people who were willing to pay a doctor to set up a clinic for yards workers.
    You know, to find out just how many had tuberculosis and heart diseases and all that. Armour's wouldn't let him do it.
    All he asked for was a little space for the clinic in the yards. He was going to furnish it with hospital equipment through
    the committee that was backing him. But they wouldn't give him a chance. They said that unfortunately there was no available
    space in the yards for a clinic. We were all for it, got signatures from the girls and all, but they wouldn't budge. That
    was before the union's time. If we had this contract signed and off our minds, we could start the ball really rolling
    for a yards clinic, sure.
