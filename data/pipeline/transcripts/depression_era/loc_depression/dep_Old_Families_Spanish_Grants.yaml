collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: In the year 1800, Major implo Mot, who had married Susan Orion Cooper, lost all his negroes by their escape on board
    a British warship right here on Amelia Island.
- speaker: Respondent
  text: In 1612 he lost all of his property and negroes by the Soldiers of the United States.
- speaker: Respondent
  text: In 1636 his family was reimbursed in part for the latter loss which was known in the family as the "Spanish Claim"
    by payment of $26,000 by the United States Government.
- speaker: Respondent
  text: Major James Pilot was the son of Rev. Jamie Pilot, who was a wealthy plantation owner near Charleston, S.C., and later
    became a famous preacher of his day, founded and built one of the largest Charleston churches.
- speaker: Respondent
  text: James Pilot was born on his father's plantation near Charleston, called "Wreherode." When the revolution came he entered
    the service and went to war. He was taken prisoner at Furiburg and held prisoner until the war closed.
- speaker: Respondent
  text: In the United States census of 1796 he was in South Carolina with his wife, two sons—one 16 and one 2—two daughters,
    and thirteen slaves.
- speaker: Respondent
  text: His brother, Major Charles Pilot, who also fought in the Revolutionary War, appears in this same census, with his
    wife, one son under sixteen, one daughter, and seventy-one slaves.
- speaker: Respondent
  text: As early as 1807 Major James Pilot and his son, Francis, are found on Aiken's Island, where James had a very large
    grant from the Spanish Government.
- speaker: Respondent
  text: His plantation adjoined those of John Vaughan and Robert Harrison, three families inter-married and related by marriage
    to many of the finest in the South. The Vaughan family and the Pilot family are tied up with old Savannah families.
- speaker: Respondent
  text: The Harrison grant was five hundred acres and the Pilot grant, six hundred and forty acres.
- speaker: Respondent
  text: These people and other early settlers, the Browards and Thorpes, lived around Darien, Georgia, but the land was swampy,
    the climate unhealthy, with long sieges of malaria and lingering fevers, so they left their rice fields and all their
    land in charge of overseers and set out in a body to find a more healthy location.
- speaker: Respondent
  text: They came in their boats with their families, and some of their negroes, and landed at the end of the island where
    Fernandina now is, and near the Vaughan grant, where Amelia City is.
- speaker: Respondent
  text: They scattered out, all but Sam Harrison, he'd decided to settle right on the end of the Island so his is the first
    of these plantations.
- speaker: Respondent
  text: The others came farther up the island and settled. The Thorpes and Browards went on over on the mainland to what is
    now Sawpit, and the Thorpes had two thousand acres of the best land in the South.
- speaker: Respondent
  text: Mrs. Thorpe managed it, and with her slaves raised everything they needed for food and supplies, horses, cattle, and
    Sea Island cotton. She was such a wonderful businesswoman that she was called Naueenie's Thorpe. Here, the land is nothing
    but swamp.
- speaker: Respondent
  text: The Browards located near what is now Duval Station.
- speaker: Respondent
  text: Recently, a descendant of Ann Thorpe told me that in an old house in the Carolinas owned by the family for many years,
    she had found some letters in the attic telling of this migration to Amelia Island and their settlement there.
- speaker: Respondent
  text: The letters stated they came into the little Spanish city of Fernandina and saw the officers in charge and obtained
    their grants the next day. The Spanish authorities told them they would have to live on the land a certain time to obtain
    their final title from the Spanish Government representatives at St. Augustine.
- speaker: Respondent
  text: I have found many old papers and made transcripts of the papers of the Harrison family, who were about 1790, and received
    their grant in 1796. This testimony shows not what had been raised the previous year on the Harrison Plantation and how
    much money they had received in Spanish gold for their crops, cattle, corn, sea island cotton, and the testimony showed
    that this was one of the finest plantations in the South.
- speaker: Respondent
  text: Another very interesting thing in connection with this testimony was that it stated in one of the buildings they had
    a machine for separating the seed from the cotton.
- speaker: Respondent
  text: I have been told that Eli Whitney, who invented the cotton gin, I believe in 1790—or probably 1792—visited Cumberland
    Island about that time across from Fernandina and it is probable he met the plantation owners and that this one of his
    early machines was used on the Harrison plantation.
- speaker: Respondent
  text: This transcript of testimony I turned over to Mrs. Ann Harrison, of Jacksonville, Florida, whose husband is a direct
    descendant of this Sam Harrison.
- speaker: Respondent
  text: The sons of this first Harrison were Robert, Sam, and Abraham. They divided up the land.
- speaker: Respondent
  text: Robert Harrison had a son who was a major. He married Mary Cooper who was a sister of General James Cooper who married
    the Vaughan girl.
- speaker: Respondent
  text: The first Robert Harrison was an officer of some kind in the English army, while his wife's father was an officer
    of the Revolutionary Army.
- speaker: Respondent
  text: Granddaughter Hebraia Morrison married Attis Cooper, a Williams of old Colonel John Cooper. Their son was Sam Harrison,
    Sr., one of whose sons was Roy Harrison, and the other is Colonel Sam Harrison, now of the United States Army in the Philippines.
- speaker: Respondent
  text: Robert Harrison had a son, Robert Harrison, who was a major in the Confederate Army, serving with considerable distinction,
    and spent the rest of his life after the War between the States on the old plantations.
- speaker: Respondent
  text: After the War was over, Major Robert Harrison deeded part of one thousand acres which he had acquired just south of
    the original Harrison plantation to different slaves he had owned who remained faithful, and their descendants still live
    in this land up towards the other end of the Island, known as Franklintown.
- speaker: Respondent
  text: She made out a will for Ellen Drummond, one of these slaves, on May 25, 1929, in her nineties then, and she must have
    been nearly a hundred when she died.
- speaker: Respondent
  text: She spoke the most perfect English. Aunt Ellen, as everybody called her, said she acquired her good education by sitting
    in the back of the school-room on the plantation while the children were receiving their education from private tutors,
    and she learned just as they did.
- speaker: Respondent
  text: Norris Drummond, one of Aunt Ellen's sons, has the largest section of this land and lives there now with some of his
    children.
- speaker: Respondent
  text: His father was Major Harrison's body servant during the War, and his grandmother was Mary Cooper's personal maid,
    that she brought with her when she came to be married.
- speaker: Respondent
  text: In the courthouses here in the first book of deeds is a re-record made in 1864 of a deed made by the first Major Harrison
    in trust to John Vaughan, his neighbor, also Colonel John Cooper, his father-in-law, and James, brother of Colonel John
    Cooper.
- speaker: Respondent
  text: Harrison reciting that whereas, on June 13, 1810, he was to be married to Mary S.W. Cooper, of Darien, Georgia, that
    he made this trust of all three plantations and one hundred slaves.
- speaker: Respondent
  text: It was the custom in these days, when a woman was going to be married, to put a considerable portion of his property
    in trust for his wife, so that if he had any business reverses, she would be protected.
- speaker: Respondent
  text: This deed was probably recorded in the early days and the records destroyed by fire, of which we have no data, and
    the deed re-recorded in the first book of records (a little thin book).
- speaker: Respondent
  text: The fine old homes of those plantations were destroyed during the War between the States by the Northern troops on
    one of their visits to Amelia Island.
