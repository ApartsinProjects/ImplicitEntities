collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: What was the goal of the Harlan County Library Literacy Project?
- speaker: Respondent
  text: The goal of the Harlan County Library Literacy Project was to produce six booklets about local people and issues,
    to be used as literacy materials in programs with Appalachian students.
- speaker: Interviewer
  text: How did the project change between the application and the actual start?
- speaker: Respondent
  text: Several occurrences changed the complexion of the project somewhat between the time the application for the grant
    was made and the time the project actually was able to begin. Further surveys of our Harlan County students indicated
    that their chief interest would be in seeing the project produce stories about people's experiences of living in Appalachia.
    They wanted to read material that valued their culture and helped to preserve it. They wanted to read about, and tell
    their children about, the way life was in Harlan County and the surrounding area while they were growing up.
- speaker: Interviewer
  text: What was the first booklet about and how was it received?
- speaker: Respondent
  text: The first booklet, Hard Times, Happy Times, is a collection of stories written by a student of Harlan County Literacy.
    It was received very enthusiastically by both our students and those from other community literacy programs in the area.
- speaker: Interviewer
  text: How were the other booklets developed?
- speaker: Respondent
  text: We found that although few students or local people felt comfortable writing such stories, many were willing to tell
    them. The rest of the booklets were developed through taped interviews with students and local characters from Harlan
    and Letcher Counties in Kentucky, and members of the Virginia Black Lung Association.
- speaker: Interviewer
  text: How were the booklets distributed and used?
- speaker: Respondent
  text: The booklets were distributed as they were completed and were sent to 28 libraries in the Eastern Kentucky area. They
    were taken by the Harlan County Literacy Staff to tutor training sessions and regional meetings of county literacy personnel
    throughout the area, as well as to the Kentucky Literacy Commission assemblies in Frankfort and Louisville. They were
    also shared with members of the Community Based Literacy coalition sponsored by the University of Tennessee. These programs
    are actively using the materials.
- speaker: Interviewer
  text: What feedback did you receive about the booklets?
- speaker: Respondent
  text: Evaluations mailed back to us were uniformly positive. Several tutors noted that having read stories that were similar
    to their own, many of their students were now willing to try writing about their own experiences. A number of programs
    requested more copies—in fact, all 500 copies of the first three booklets have now been placed in the hands of libraries
    and literacy programs. Requests are still coming in for the others.
- speaker: Interviewer
  text: How did the community respond to the booklets?
- speaker: Respondent
  text: The nature of the booklets has made them popular with the local public in general. One woman wrote, 'I want to request
    copies of your other books. Although I am enrolled in a Masters program, these books are sheer reading pleasure.' The
    project seems to have been good for the community as a whole. Our County Literacy Coordinator stated that given a choice,
    the local students consistently choose these materials over those from the publishing companies.
- speaker: Interviewer
  text: What role did the Harlan County Library play in the project?
- speaker: Respondent
  text: The Harlan County Library provided assistance in handling the financial aspects of the project, as well as in showcasing
    the booklets and making them available to local people. Both branches, in Harlan and Cumberland, Kentucky, were most cooperative.
    Several of the county libraries to whom the booklets were sent wrote notes expressing approval of the project.
- speaker: Interviewer
  text: What overall impact did the project have?
- speaker: Respondent
  text: Overall, the project has had a positive effect on Harlan County Literacy. It has gained attention for the program
    within the community and among the other literacy programs in the area. Harlan County Literacy received the Kentucky Literacy
    Commission's Outstanding Program Award in 1992, based on the production of original literacy materials. The program is
    seen as valuing the culture of the area, and thus valuing the background of our students.
- speaker: Interviewer
  text: Can you provide a summary of the budget and expenditures for the project?
- speaker: Respondent
  text: The total budget for 1992-93 was $15,530.80. Actual expenditures were $14,345.97. Personnel salaries were $0.60 less
    than budgeted due to an error in writing a check. Fringe benefits were less than budgeted due to a reduction in rate and
    an error in calculation. Travel was less than budgeted because some information had already been collected and less travel
    was needed. The cost of supplies was less than expected because some booklets were hand delivered rather than mailed.
    The cost of printing was less than budgeted and there was no expenditure for promotional activities.
