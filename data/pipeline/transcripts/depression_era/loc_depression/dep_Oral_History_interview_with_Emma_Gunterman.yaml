collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me about your background in Amsterdam and the rise of fascism?
- speaker: Respondent
  text: My mother was very involved in the woman suffrage movement, and early political influences shaped my views. I reflected
    a lot on prejudice and learned to accept differences, which had implications for peace education. The rise of Hitler in
    the 1930s was a terrifying time. My father died during that period, and I experienced the hardships that others in Holland
    faced during World War II.
- speaker: Interviewer
  text: What was your secondary education like in Holland?
- speaker: Respondent
  text: I attended school where girls took math, Latin, and Greek, which was somewhat unusual. The Depression affected Holland
    deeply. Later, I regained my mother's United States citizenship and came to the United States to attend Smith College
    in the 1930s. I also have a distant Jewish background.
- speaker: Interviewer
  text: How did Nazism and racism affect your time at Smith College and your later activities?
- speaker: Respondent
  text: Nazism and racism were very present issues. I returned to Holland for a vacation in 1936, which was eye-opening. Later,
    I taught in New York City and became active in the peace movement. I became a Socialist and learned about the differences
    between Communists and Socialists during the 1930s.
- speaker: Interviewer
  text: What was the Socialist and pacifist opposition to World War II like?
- speaker: Respondent
  text: Socialists and pacifists opposed World War II on principle. The pacifist argument was strong, and conscientious objectors
    faced many challenges. I worked for the peace movement and received political education at Socialist meetings in New York.
    I also did graduate work in math at Columbia University and eventually came to California with the peace movement, where
    I met Joe Gunterman.
- speaker: Interviewer
  text: Can you tell me about Joe Gunterman's background and your life together?
- speaker: Respondent
  text: Joe came from the Imperial Valley and taught at the Bank Street School in New York. He compared wealthy and deprived
    children in his work. We courted and lived in a farm labor camp in the San Joaquin Valley. I worked cutting spinach as
    a farm laborer. We got married and picked oranges. Joe was a conscientious objector during World War II and spent time
    at the USDA Forest Service camp in Oregon. There were different kinds of conscientious objectors, and some volunteered
    on various projects. I did domestic work while Joe was in the camp.
- speaker: Interviewer
  text: What was life like after having your first child and moving between camps?
- speaker: Respondent
  text: We had our first child, Karen, in Portland, Oregon. I worked on a farm in Michigan when Joe was transferred to another
    camp. We lived at the cooperative camp at Walhalla, Michigan, and then at the camp in Wellston, Michigan. Later, we transferred
    to the USDA Forest Service camp in the Feather River Canyon in California. We had our second child, Stanley, and lived
    in a CO 'walk-out' flat in San Francisco. We bought a duplex with friends in Berkeley, where I worked for the Berkeley
    Co-op and participated in the Berkeley Parent's Center. Eventually, we moved to a farm in Gridley, where I learned to
    garden and made puppets.
- speaker: Interviewer
  text: How did you support your family and community in Gridley?
- speaker: Respondent
  text: I made puppets to sell and worked at a peach cannery. Joe had a job with the Chico Enterprise-Record, and we compared
    farm labor coverage by the Chico Enterprise-Record and The Sacramento Bee. I worked as a bookkeeper for the Superintendent
    of Schools. We had our third child, Joanie, and our fourth child, Tommy. The farm labor camp in Gridley was a community,
    and I started the Summer Program there.
- speaker: Interviewer
  text: Can you describe the Summer Program at the Gridley farm labor camp?
- speaker: Respondent
  text: We had volunteer teachers at the summer school, and we arranged for the children to use the county library. The number
    of children attending the summer school in 1961 and 1962 grew, and many books were checked out by the children from the
    library. We provided health check-ups and child care for the children of farm laborers. Joe reported on labor issues,
    and eventually Chico State University took over the Summer Program.
- speaker: Interviewer
  text: How did you begin your work as a lobbyist?
- speaker: Respondent
  text: I began as a lobbyist by adding kindergarten to the McAteer Act for compensatory education. I met Leo McCarthy, and
    I saw the effect of an individual with a good suggestion. Farm labor families at Gridley were interested in child care,
    which led to work on Children's Centers in California. There was a lack of child care for farm workers, and cultural differences
    affected attitudes toward child care. I worked on a bill to provide Children's Centers in rural areas through counties,
    but an amendment requiring local school board consent had ramifications. We worked to get money in the budget for new
    Children's Centers and to keep the money there. Infant Centers were part of this effort. Later, I moved to Sacramento.
- speaker: Interviewer
  text: What was your experience lobbying as a consumer advocate?
- speaker: Respondent
  text: I began lobbying as a consumer advocate, comparing Helen Nelson and Kay Valerie as consumer counsels. I followed legislation
    for the Association of California Consumers, including bills regarding interest charges and wage garnishment reform. I
    worked to prevent bills from passing that were harmful, mobilized and educated the public, and learned to be a lobbyist
    by lobbying.
- speaker: Interviewer
  text: How did increased partisanship affect lobbying?
- speaker: Respondent
  text: There was an increase in legislative committees, staff, and consultants, which affected lobbying. Partisanship increased,
    making access to lobbyists more important. Talking to staff and having longevity and credibility were crucial. Putting
    out fact sheets helped. For example, I worked on a bill allowing the spouse of an individual on Medi-Cal to keep half
    of community property. Choosing an author for your bill and making your point briefly were important. I also worked on
    problems with labeling drugs and the generic drug bill. Reforms were achieved in small increments, such as with Adult
    Day Health Centers. There are advantages and disadvantages to working on issues incrementally.
- speaker: Interviewer
  text: What advice do you have for lobbyists?
- speaker: Respondent
  text: Deal straight with legislators and educate the public. Get constituents to write letters. Small bills have advantages.
    Don't spring surprises. Rally those affected by the bill. There needs to be a receptive mood in the state. Putting in
    a bill can be a means of organizing and educating.
- speaker: Interviewer
  text: Can you tell me about coalitions and public interest groups you worked with?
- speaker: Respondent
  text: I participated in 'The good guys' breakfast and the Legislative Round Table on women's issues. There were coalitions
    of public interest groups, including the Coalition for cost-of-living-adjustments. We worked on issues affecting people
    who 'fall between the cracks' in state assistance, such as a bill to grant AFDC to unemployed parents.
- speaker: Interviewer
  text: What was the background on AFDC increases and COLAs?
- speaker: Respondent
  text: There was a background on Supplemental Security Income (SSI) and automatic COLAs for AFDC recipients. The welfare
    situation after Prop 13 was difficult. We fought to retain automatic COLAs. Reagan made a distinction between the 'deserving'
    and 'undeserving' poor. Feminists often failed to see AFDC as a women's issue. There was a willingness to assist seniors
    but not women with children. Leo McCarthy defended COLAs for children on AFDC. Legislators helped in the COLA fight. General
    Assistance varied according to county.
- speaker: Interviewer
  text: What happened with the 1977 bill for state to take over General Assistance from counties?
- speaker: Respondent
  text: There was opposition by Jerry Brown. The way relief to counties could have affected the passage of Prop 13 was significant.
    The Petris bill on property tax relief prior to Prop 13 and the Smith bill to derail the Petris bill were part of the
    conflict. A conference to reconcile Smith and Petris bills failed on the last day of the legislative session. The legislature
    and Jerry Brown failed to pass property tax relief, and state General Assistance failed at the same time.
- speaker: Interviewer
  text: Can you tell me about starting the newsletter, On the Capitol Doorstep?
- speaker: Respondent
  text: I started the newsletter to provide information. There was conflict over child care between the California State Department
    of Education and the Department of Social Welfare. The Child Development Act of 1972 addressed infant care and care for
    sick children. State Senator Alan Short worked on special education and English as a Second Language. Child care for children
    with special needs was a focus. On the Capitol Doorstep helped inform people. We started child care on the UC Berkeley
    campus and other campuses. The Children's Lobby worked on getting fathers to pay child support, licensing child care providers,
    and improving the pay of child care workers.
- speaker: Interviewer
  text: What issues did you see regarding wages and health for caretakers?
- speaker: Respondent
  text: Professional women paid low wages for child care, and caretakers of the elderly also received low wages. Poor health
    and diet were common among low-income workers and AFDC recipients. Domestic violence and child abuse were serious issues.
    The Legislative Round Table on women's issues addressed these concerns. In-Home Supportive Services (IHSS) was recognized
    as a women's issue.
- speaker: Interviewer
  text: How did you become involved with California Rural Legal Assistance and related work?
- speaker: Respondent
  text: I began working for California Rural Legal Assistance (CRLA), focusing on funeral reform, wage garnishment reform,
    and landlord and tenant legislation. Legal services lobbyists worked with the Western Center for Law and Poverty. Reagan
    tried to cut CRLA funding and take away legal services legislative advocates. The National Senior Citizen Law Center and
    the Grey Panthers were involved. I began working for the CRLA Senior Program, selecting issues raised by clients of legal
    services. IHSS for the disabled and the Office of Administrative Law were also areas of focus. Younger disabled advocates
    worked for seniors.
- speaker: Interviewer
  text: Can you tell me about your work on IHSS regulations and administrative law?
- speaker: Respondent
  text: I worked with Greg Sanders of the Independent Living Center on IHSS regulations and administrative law.
- speaker: Interviewer
  text: What were the challenges in health care and nursing home reform?
- speaker: Respondent
  text: There was a lack of cost controls in health care and low pay to providers by Medi-Cal. The nursing home industry had
    significant influence, and nursing home workers were paid poorly. Nursing home reform included citations and fines to
    improve conditions.
- speaker: Interviewer
  text: What was your experience with legislators during nursing home reform efforts?
- speaker: Respondent
  text: Legislators sometimes treated people who testified at hearings rudely and made sexist remarks. I had longevity as
    a lobbyist and gained respect for work well done. Certain legislators had stature, such as Speaker of the Assembly Leo
    McCarthy and State Senator Walter W Stiern. The old leadership was different, and there was a lack of leadership when
    Prop 13 was passed. Anti-government attitudes were strong, and there was a need for discussion of issues.
- speaker: Interviewer
  text: Can you describe your work with Governor Deukmejian's appointments and budget issues?
- speaker: Respondent
  text: Governor Deukmejian's appointments involved political games on budget issues. I went on the California Rural Legal
    Assistance Foundation payroll and helped fund the Seniors in Sacramento newsletter. The Senior Legislature and the Senior
    Coalition were important. We raised funds to hire a successor and put out fact sheets on issues that concern seniors.
- speaker: Interviewer
  text: How did you continue your advocacy work later on?
- speaker: Respondent
  text: We held fundraising balls for CRLA. I stepped down as Director of the Senior Program and put out the 'Long-term Care'
    guide. Respite care for caretakers was a focus. I see lobbying as teaching.
