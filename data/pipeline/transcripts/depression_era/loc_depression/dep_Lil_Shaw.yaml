collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I start with my first job in the yards, pork trimming in Swift's. That job is in a cooler where there are no windows.
    It's always wet and the girls had to wear boots, or wooden shoes, and woolen socks, and long aprons. It's a messy job
    and the girls would get all bloody and wet and greasy right away.
- speaker: Respondent
  text: We had to change aprons at least twice a week and the company doesn't furnish them nor launder them for us.
- speaker: Respondent
  text: Pork trimming consists of trimming fat pork from the lean. All that's done with a knife, which you have to keep sharpening
    all the time because of the wetness and then the work naturally dulls your knife soon. It's very cold, and your hands
    get frozen and numbed and since it's piece work you have to work like mad to make anything.
- speaker: Respondent
  text: Hundreds of girls have their fingers all cut up on account of the rush. They're always sticking each other or themselves,
    accidentally, of course, knives slip out of their fingers, they get so cold, or greasy and bloody, or else because they're
    trying to make the above B rate. That's base rate. You had to earn bonus, and go over base rate. If you don't, they fire
    you.
- speaker: Respondent
  text: The pork, before it's trimmed, comes in barrels of 60 pounds or more, and we'd have to carry our barrels of meat up
    to the tables ourselves. The barrel itself weighs about twenty pounds. That'd be some work, and don't forget we didn't
    get paid for lugging them, either, we only got paid for the meat we trimmed and had weighed.
- speaker: Respondent
  text: Another thing, we used to have to come to work extra early in order to get any pails to work with. There weren't enough
    pails to go around and those who didn't have any couldn't do their work, they'd have to wait till somebody was finished
    with theirs, which usually never happened, because the girls hung on to their pails, being all piece workers they couldn't
    afford to sit around and wait, none of them.
- speaker: Respondent
  text: That made an awful lot of trouble. Everybody was always mad at everybody else, but it wasn't anybody's fault except
    the company's.
- speaker: Respondent
  text: To go to lunch we had to climb two flights of stairs, the steep kind, like fire escapes. Many times there would be
    serious accidents, women would slip on them because they had on their rubber boots, or those wooden shoes, and break their
    ankles or their legs, just all kinds of accidents.
- speaker: Respondent
  text: I got laid off there. The whole gang I was with, about 12 girls, got laid off. We couldn't make the rate, try as we
    would.
