collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: So, why don't you just start off by saying. . . say your name and where you live. You know, all the basic information.
    So, you are. . .
- speaker: Respondent
  text: I'm Barbara Baron. I was born Barbara Benoit and I was brought to Van Nuys when I was 2 months old, in probably May
    of 1937. And my parents had purchased the house like maybe January/February and I was born in March and then 2 months
    later we came and occupied the house.
- speaker: Interviewer
  text: So you were born in March. . .
- speaker: Interviewer
  text: How do you spell your last name?
- speaker: Respondent
  text: B-e-n-o-i-t was my family name.
- speaker: Interviewer
  text: Do you have any recollection of your grandparents?
- speaker: Respondent
  text: My grandparents were part., they had come out from Chicago. My mother was a Chicago woman and my father was from New
    Jersey. And my grandparents came to California, too, before I was born. So at one point, we were all living in the Van
    Nuys house. In fact, my grandmother died in that house. But they had lived a couple other places and came back to Sylvan
    Street in later years and my grandmother died here.
- speaker: Interviewer
  text: In what year did they come out, do you know?
- speaker: Respondent
  text: They came out probably. . .my mother and father were married in 1934, probably, grandparents came out in '35, '36.
- speaker: Interviewer
  text: And then what were their names?
- speaker: Respondent
  text: Rolfe. Max and Helen Rolfe? And my parents were Sylvia and Joseph Benoit.
- speaker: Interviewer
  text: And they were your paternal. . .?
- speaker: Interviewer
  text: Maternal. And do you remember what your grandparents did?
- speaker: Respondent
  text: He was a pharmacist.
- speaker: Interviewer
  text: Oh, he was?
- speaker: Respondent
  text: So he. . . when the depression happened in Chicago he was also a bank trustee or something and they lost quite a bit
    of money. And they came out here and he., at one point he sold cars and then when we were in La Jolla, my father was stationed
    at Camp Callan on Torrey Pines, which is now where the University of California at San Diego is, he ran the pharmacy there
    for a while.
- speaker: Interviewer
  text: And did he work here when they came up here, your grandfather?
- speaker: Respondent
  text: Well, he worked. . . when he was selling cars they were living in the Palisades.
- speaker: Interviewer
  text: So, do you know. . . where were your parents born?
- speaker: Respondent
  text: My mother was born in Peoria, IL and my father was from Camden, New Jersey; somewhere in there. The family was northern
    New Jersey and southern New Jersey.
- speaker: Interviewer
  text: And do you know the years they were born?
- speaker: Respondent
  text: Yeah. My mother was born in 1907, July 1, 1907 and my father December 19, 1904.
- speaker: Interviewer
  text: So they met or they came out here. . .
- speaker: Respondent
  text: My father came out here. . . in those days they were adventurers. My father's younger brother had come out riding
    the rails to California. So then my father and his friend, Art Stanley, drove out here in an old, you know, whatever a
    car was in about 19... probably 19.. he was maybe 20, so he would have been... in 1934, approximately. And he did landscaping
    and he worked for Yahkomeen Council, which was an old landscape firm in Pasadena. And he did some work at Cal Tech where
    he met Einstein. And he was in the Reserves, the Army Reserves, so when World War II. . . oh, first, he went into the
    CCC Corps. And he helped engineer. . . he was one of the people who built Castaic Town; he was involved with that. And
    then when the War broke out, then they called him up as a regular officer.
- speaker: Interviewer
  text: And then where was he during the War?
- speaker: Respondent
  text: He, first, he went to a. . . when the War broke out he was at Camp Callan he was provost marshal - Chief of Police.
    And then when the War broke out they gave him a hundred Black troops, military police, which were trained in Arizona -
    two locations, Fort Huachuca and Prescott and from there they went to New York and then went to North Africa and Italy.
- speaker: Interviewer
  text: So, CCC is...?
- speaker: Respondent
  text: Civilian Conservation Corps. So, he was on the dam for Castaic Lake; that project. And I don't know what other projects
    he was involved in because then the War happened and he was called up and became a military police officer.
- speaker: Interviewer
  text: Did he talk anything about being the head of a Black. . .
- speaker: Respondent
  text: No, he never talked about that. And I've only really learned by looking... since my mother died last year, looking
    at all the scrapbooks of his materials and what he had. . . And I took a whole grouping of things he had saved to Butterfields
    and it's going to be auctioned in June, as World War II memorabilia. And the people who were in World War II, and of course,
    I was a child - I was only eight and a half when he came home, so if he talked about it to anybody, I don't know. Those
    people who came back did not talk about the War because I know another friend of mine whose father was in the same time
    period and they just did not talk about it. And I was so young that I wouldn't be getting in on any of those conversations,
    anyway. I never did... he died when I was 32 and I never, you know. . . was motivated to ask him and I had never seen
    these scrapbooks until this last year.
- speaker: Interviewer
  text: And then your mother?
- speaker: Respondent
  text: She was from Chicago and had lived in Illinois most of their life, although, they had been in Michigan on a farm when
    she was quite small.
- speaker: Interviewer
  text: Where in Michigan?
- speaker: Respondent
  text: Dan's River.
- speaker: Interviewer
  text: Where is that?
- speaker: Respondent
  text: It's the Upper Peninsula. And my grandfather tried that out for a while, farming, and then they went back to Chicago
    and he was a pharmacist until. . . and my mother was pretty adventurous, she worked at Carson, Pirie, Scott, the big department
    store in downtown Chicago. So she came out here on vacation to visit relatives and on her second or third trip that she
    made out here, she met my father through a cousin and they were living at the Y together. And she met my adventurous father.
    And went back to Chicago and got her trousseau and came back out here and married him out here.
- speaker: Interviewer
  text: What year did they get married?
- speaker: Respondent
  text: 1934. And they lived a few different places with his work. I think they started out in Pasadena and then they lived
    in Santa Barbara when he was working on the Castaic project. I was born at Fort MacArthur, which you know, in San Pedro,
    which is now an adult school.
- speaker: Interviewer
  text: I know the guy who runs the museum.
- speaker: Respondent
  text: I've never been back there since I was born, so that's another thing I have to do.
- speaker: Interviewer
  text: They have a wonderful museum down there now. I didn't think I would be that fascinated by it, but it's got a great
    history. So, they lived down there. I just wanted to back up for a second. Did your father ever say anything meeting Einstein?
- speaker: Respondent
  text: He did. And I had two autograph pictures of Einstein, one of which I just sold, and I'm keeping the other one because
    it was autographed to my father. He wrote to him later when Einstein was at the Institute of Advanced Study and my father
    was stationed in Georgia and wrote him. . . two different times he wrote him and asked for autographed pictures and he
    got them. And the one that's autographed to my father's name I'm keeping and the other one I just sold.
- speaker: Interviewer
  text: Do a little visit to the Antiques Road Show. So, they lived in Pasadena for a while and so then you say they were
    living down there. . .
- speaker: Respondent
  text: They had a little property in the Palisades after I was born in Fort MacArthur and then they had bought the place
    in Van Nuys, you know, toward the end of my mother's pregnancy, so they moved into Van Nuys when I was two months old.
- speaker: Interviewer
  text: Do you remember where you were born there? Was it at home or in a hospital?
- speaker: Respondent
  text: At the hospital at Fort MacArthur. At the Army hospital.
- speaker: Interviewer
  text: On the actual Fort. That's amazing. Yeah, you definitely should take a field trip down there.
- speaker: Respondent
  text: Yeah, I mean to do that.
- speaker: Interviewer
  text: I'm also. . . for the LA Conservancy, I do a tour of San Pedro. Just a small part, just north of Fort MacArthur. So,
    two months later they come and they buy this house, and do you remember them ever talking about. . . you had told me already
    that this was an up-and-coming area. . .
- speaker: Respondent
  text: And my mother. . . they had a choice between, I forget where else they looked at houses, but they picked this place
    to buy and at that time, they were all small houses or rows of cottages on the lots; on the street.
- speaker: Interviewer
  text: On Sylvan, or just around?
- speaker: Respondent
  text: Yes, on Sylvan Street. And it was also one of the two wide streets. Sylvan Street and Hamlin are wider than the other
    East-West streets and they liked that. And there were pepper trees that were at the curb and they used to meet in the
    middle of the street. It was very shady and. . . most of the pepper trees are gone. There are a few left, but most of
    them have died. So, when I was in third or fourth grade range, we had been down in the San Diego area, La Jolla, for a
    while... we used to play hide and seek and we used the pepper trees and that was part of our hiding.
- speaker: Interviewer
  text: And at that time when they moved here, he was doing. . .?
- speaker: Respondent
  text: He was either CCC or a Reserve officer by that point. He had left behind the landscaping work and he had been called
    in because he was a Reserve officer in New Jersey; in the Reserves since high school, however they did that. And then
    when the War broke out... well, actually, before the War he went into Camp Callan in La Jolla when I was like maybe three,
    three and a half, because we went down there until he went overseas. And then during the War my mother sold that house,
    which would now be worth a fortune - we were three blocks from the beach - and came back here to Van Nuys when I was like
    eight.
- speaker: Interviewer
  text: So, then when he would go away from Van Nuys, you would rent, they would rent this house out.
- speaker: Respondent
  text: Yes, and interestingly enough, we had the same mailbox from Day One; Box 8, Van Nuys, California. And of course, the
    post office was originally on Sylvan Street. And we had the same phone number, 785-3929, which was. . . my parents never
    disconnected the line. The tenants, evidently, used the same phone number. So it's been the same phone number for 69 and
    some years.
- speaker: Interviewer
  text: Oh, my Gosh, that's incredible.
- speaker: Respondent
  text: I know, it is amazing. And people ask when I give the address. "Eight?" And I'm probably the oldest. . . it's the
    oldest box-holder in Van Nuys.
- speaker: Interviewer
  text: That's amazing. That's shocking. So, then, what area. . . do you have any memories before you started school, and,
    if not, what are the first memories you might have?
- speaker: Respondent
  text: I just remember when I was very young, we could walk up to Kester to visit a chicken farm at Kester and Sylvan Street.
    Mrs. Alcott, she was a friend of my mothers, I think, in the Business and Professional Woman's Club, and they ran a chicken
    farm at the end of the street. And it was very rural. And Sepulveda was cabbage fields. And we would drive over to. .
    . this is probably when I was a little bit older, when I was eight, and I remember driving over Beverly Glen to get to
    Westwood to go shopping in this little village of Westwood, which had the two spires there and the movie theatre and the
    gas station, I think, that had the spires. And beautiful flowers on the entry from Wilshire Boulevard into the little
    village. At the middle of Beverly Glen Canyon was like a horseback riding place and little cottages that were summer residences
    for people through Beverly Glen.
- speaker: Interviewer
  text: And why would you go. . . was that the. . .?
- speaker: Respondent
  text: Westwood was. . . you know, it was an outing to go to Westwood to shop. And I think they had nicer stores in there.
    And there was a bakery, Van de Kamps, at one of the markets there. And I just remember that was sort of a regular place
    to go.
- speaker: Interviewer
  text: And how was that drive? Was it considerably different then. . .
- speaker: Respondent
  text: Oh, my goodness. Beverly Glen was just a rural canyon like in the country.
- speaker: Interviewer
  text: Paved? Was it paved then?
- speaker: Respondent
  text: Oh, yeah, it was paved.
- speaker: Interviewer
  text: And probably not as many trees or anything like that.
- speaker: Respondent
  text: I just remember it was just all small places and the, you know, the horseback riding... one of my father's friends
    lived in (?) It was just country. And Sepulveda Boulevard; I just always can remember it was just vast fields of cabbage
    or whatever else was growing. And we'd go through the tunnel. . . you know, the mountain; of course, the tunnel was there,
    and I would say, I don't know how old I was, I would say, "Here come the tunnel." I remember that they would tell me that.
    . . that I would say that. And we would drive over to the Palisades, because at one point, my grandparents had a duplex
    at the Palisades.
- speaker: Interviewer
  text: And what did they take down to get over there? Sunset?
- speaker: Respondent
  text: Sunset. You would go Sepulveda to Sunset.
- speaker: Interviewer
  text: So you went to elementary school. . .
- speaker: Respondent
  text: Part of. . . I went to Van Nuys Elementary School a year and a half and I went to Van Nuys Junior High School in seventh
    and ninth grades and Van Nuys High School the early part of tenth grade and the early part of eleventh grade. I went to
    high school in Alaska, Van Nuys and Georgia. Go figure. I was an Army Brat.
- speaker: Interviewer
  text: So, you went to. . . in elementary school, which year and a half? The later part of grammar school?
- speaker: Respondent
  text: The latter part of third grade and all of fourth grade. And I think I walked there with friends. When I was in junior
    high we took the Pacific Electric. . . I was in the very first class, seventh grade, when Van Nuys Junior High School
    was first built. And they had to split the day because the building wasn't complete yet. So, part of us went in the morning
    and the other class went in the afternoon. I think I was in the morning class. We had to get there at some really early
    hour. And we took the... each of us who lived, you know, either on one side, east side or west side of Van Nuys Boulevard,
    would walk to the Boulevard and rendezvous on the Pacific Electric and took the Red Car down to the Junior High School.
- speaker: Interviewer
  text: And where was the Junior High School?
- speaker: Respondent
  text: The Junior High School is approximately... a little south of Chandler off of Vesper - on Vesper. I think when I was
    in ninth grade is when Bobs Big Boy opened down there. That was not the first Bobs Big Boy, but that was a big deal when
    that opened down there on Van Nuys Boulevard. It's a car dealership now.
- speaker: Interviewer
  text: Right. Do you remember exactly what the cross-street was?
- speaker: Respondent
  text: It was close to Chandler, but I don't know what the cross-street was.
- speaker: Interviewer
  text: Okay. So, then that was Junior High. Back up to elementary, do you remember., it was the newer; the present one.
- speaker: Respondent
  text: Yes, it was the present one. I hadn't seen that other picture before. And the same row of classes, that same building
    was there that I went to school with. I know which room I had third grade in along those, that row there. And there was
    still big trees on the playground. They've added (?)
- speaker: Interviewer
  text: Do you have any particular memories of that time period there?
- speaker: Respondent
  text: Getting rapped on my fingers with a ruler by Miss Zarinski, my third grade teacher. I had no idea (?)
- speaker: Interviewer
  text: What had you done?
- speaker: Respondent
  text: I have no idea. Probably talked too much
