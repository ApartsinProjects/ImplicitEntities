collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was born in Alabama in 1949. At four years old, I was pulling weeds out of a cotton field. I was pulling weeds out
    of a peanut patch. When it was time for me to start school, I didn't go. I had to work. Back there in Alabama, it's all
    kinds of work. Everyone can do something. I don't care how small your kids is, you can't stay home. You have to take them
    with you to the field.
- speaker: Interviewer
  text: Tell me about the place where you grew up. What was it like?
- speaker: Respondent
  text: There were five of us in my family. There were four kids and our mother. She say that my father got killed. She say
    someone ran over him before I was born. I don't want to seem real harsh. Back there it was real prejudiced. Before I was
    born even more.
- speaker: Interviewer
  text: So a white person ran over your father. What happened?
- speaker: Respondent
  text: My mother, she seen the tire skid marks. The driver came across the line. He came where my father was walking. He
    ran over my father. Then he went back to the street. My father dropped off the car. He landed in the street. I don't like
    that word, 'prejudice.' But that's the only word to use. It was slavery back there. But we didn't know that. We was just
    reared up to love and to survive.
- speaker: Respondent
  text: I grew up in Iowa. I grew up in a small town. I did bad in school. When I was nine, they put me in a special class.
    I don't know why I didn't learn to read. I don't know what happened. Why was I the one that didn't learn? My stepfather
    always tried to make me do my ABC's. He made me. He made me. He wanted me to learn. But he pushed me too hard.
- speaker: Respondent
  text: They made me eat vegetables, too. I'd be crying. But they made me eat. I can't stand vegetables now. I hate vegetables.
    Any kind of vegetables. I hate vegetables. I won't eat them. None at all. Because they made me. They'd just tell me to
    eat them. I can't stand them. I can't stand anything they made me do.
- speaker: Respondent
  text: I dropped out of school in grade 8. I ran away from home. I never went back. I was 14 years old then. Now I'm 24 years
    old. I know I can't do anything until I learn how to read. I get to feeling down at times. I'm feeling down at school
    now. I just don't think I can do no more. I want it all now.
- speaker: Respondent
  text: I have two children. I don't want to be on AFDC all my life. I want to do for myself. I've never did for myself before.
    I would like to work as a nurse. But I can't do that. I'm too scared. At school they tell me, 'It'll take time.' It will.
    I'm just starting out. But I'm still young. I'm willing to keep trying.
- speaker: Respondent
  text: I am a happy person. To me life is a gift. But I went through a lot of hell to get where I am. My parents broke up
    when I was a kid. I was tossed around a lot. My family was a Latin family. My mother and father were from Puerto Rico.
    We lived in New York. Nobody had time to read to me. They were just trying to speak English. They were just trying to
    survive. My father never read me a story. I felt that reading was something I could never get. That was dream land for
    me.
- speaker: Respondent
  text: I knew that my mind was good. I wanted to learn. But there was no one that really cared. New York was a bad place.
    My father hit me a lot. I was running in gangs at five years old. I was afraid all the time. I felt safer outside.
