collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I landed here first in 1883, when I was about eight years of age, but I do not remember much about the prominent people
    of Jacksonville of that period. I was sent abroad, went to school in different places, traveled over the world, and returned
    permanently to Jacksonville in 1893. Those days are not known as the 'gay nineties' and then 'nueve bonds,' said David
    Mitchell.
- speaker: Respondent
  text: The people I knew, and with whom I most frequently associated then were not the 'nice people' but racetrack followers,
    gamblers, etc., and I can give you chronological data on cock-fighting, which was one of my chief interests.
- speaker: Respondent
  text: I did know Don it. Barnett, Colonel Cookrell, and other citizens prominent in those days, who have become the 'first
    line of defense' for our fair city, as time has tested their quality and understanding. But I seem to be living now in
    a world of my own, as most of those with whom I associated are now dead at least. At least many of them.
- speaker: Respondent
  text: Where was I educated? Well, I went to more schools in more different places than anybody who ever lived in Duval County.
    You see, there were lots of things I would rather do than attend school, so three months was about as long as I ever lasted
    at any educational institution. I would either be expelled, or would get in such trouble that the old lady, my grandmother,
    would have me brought home. I went to Barium University, to the University of California at Berkeley, and to various schools
    in Washington, D.C.
- speaker: Respondent
  text: Through various associations with young men in the north and west, I learned to play polo and it was my favorite pastime.
- speaker: Respondent
  text: I got other young men interested and used to have some great games in a field at Avondale, a negro settlement adjoining
    the plot owned by the Cleveland Fibre factory where the big fire of May 3, 1901, started. It was not then in the city
    limits, and is in what is now the west Beaver Street section of Jacksonville. It was one level piece of flat section land,
    and made a splendid polo field.
- speaker: Respondent
  text: The young men who used to play were A. D. Dell, Dell, Montgomery Verse, an Englishman by the name of Curtiss, and
    two other Englishmen, E. Mary White and a Mr. Budlow. Mary White was the first agent for the Clyde steamship line, and
    visited the office on the river.
- speaker: Respondent
  text: Our polo ponies were not blooded stock, neither were they trained. Any likely looking ponies served our purposes.
    They were small race horses from 'scrub' tracks. One of the best ones I ever had I found one day hitched to a huckster's
    cart on Bridge Street. We looked like he would be quick in turning and fast on the field ideal for polo. I said to his
    owner, 'I wish to buy that pony. How much?' 'You pay me fifteen dollars, and you take,' said Dellani.
- speaker: Respondent
  text: I climbed on the cart and went home with him and the deal was closed. I had to almost half kill him before I broke
    him in. The pony was tough, quick, and ran like lightning. I christened him 'Bug' because he darted here and there with
    such fury. He was a delight to ride on the polo field. But one day I had a bad spill, no, not from any white polo activities,
    and the horse was sold.
- speaker: Respondent
  text: The last time I saw old Bug was one day out on the Fernandina road. He was hitched to a little road wagon and was
    engaged in the business of running away by himself, tearing down the road and running like the Devil. Evidently his polo
    training had re-assorted itself and he was going with horses in a hurry. He was a great gift to polo in our days, but
    was the gamest little horse I ever saw. He just would not quit, no matter how stiff the pampa.
- speaker: Respondent
  text: The first Jacksonville Country Club was established by W. A. Dell, Ben Barnett, Montgomery Verse, and others of the
    old polo players in Fairfield where the A. C. L. R. R. yards are located, just this side of the municipal docks, in 1893.
    It got off to a good start, and everything went very well from the beginning. We had a small clubhouse first, about 40
    by 60 feet in extent. We played golf, and once a week had field days, when we served tea to the ladies.
- speaker: Respondent
  text: Ike Firestone was another of those interested, and James Spratt, whom I have known since I was knee high to a duck.
- speaker: Respondent
  text: Don Barnett was the star polo player, and also golfer. We, that is, this same crowd, established a special golf club
    in South Jacksonville in 1896.
- speaker: Respondent
  text: We had an option on the farms in the section near the municipal docks where the first country club was established,
    which we sold when the A. C. L. R. R. desired to locate in that section, and established the Florida Country Club in the
    Riverside section. The Florida Country Club was more or less plebeian always, and later on Mr. McCollow, the English consul
    here, Mr. Montgomery Verse, and Mr. Angus, of the Timuquana Country Club, prissy, from the beginning.
- speaker: Respondent
  text: One of my boyhood friends here was Allan Oreeley, son of old man Oreeley, superintendent of the old Newman Acres Presbyterian
    graded school, who had been sitting on his stumps waiting for something to happen in Jacksonville for many years. Allen
    was a little older than I was. He used to ride around town in a little white may, and I would look unto him like he was
    a little tin god.
- speaker: Respondent
  text: One of the biggest chicken fights, or cock fights, we ever had was in 1904 right out in the middle of what is now
    the Avondale residential section. It was high hammock ground, and we went out there because it was a relief from the city.
    There was an old cracker by the name of Growoltio who had his home and a country store out there, three miles from the
    town house. We fought a game of six for a fat purse of a thousand dollars to the winner.
- speaker: Respondent
  text: On our side was old Ran Wilson, Major O. D. Boyleston, an officer of the 24th Carolina Infantry from Charleston, S.C.,
    during the war between the states, Clareskobetty and I. We were quite young. Jerry Smith from across the river was also
    in our crowd. It took place on the 20th of July.
- speaker: Respondent
  text: In those days there was hardly a week went by that we did not have a cock-fight or a horse race, with pretty stiff
    stakes and lots of betting.
- speaker: Respondent
  text: About that time the Seminole Club had moved down on Forsyth Street. It was first on the corner of Began, opposite
    the 'Sin Door Motel.' The members of this club were the ones I used to know the best, because every day at noon you could
    find the same bunch there. They were old Major Durkee (Dr. Durkee's father), Isaac Coffin, who was in charge of some northern
    land syndicate, with an office in Jacksonville, who always had plenty of money, Dr. Fernandes, Mr. Stank Diller, or Bank
    Leslie, the first agent of the Clyde line, R. H. Tiliggett, who married Laura Ambler, daughter of the banker.
- speaker: Respondent
  text: He used to own this building at the Law Exchange building. These young men were the main rapport of the bar in the
    Seminole Club, and the bar ran the club.
- speaker: Respondent
  text: Some people I used to know and like very much were Mr. McGinnie who owned a fine livery stable located where the Park
    Motel now is, with fine horses and carriages for hire. Their claim Tom Murray, engaged in the as business.
- speaker: Respondent
  text: Murray was the first United States marshal here after the war between the states. He went out with a single-handed
    capture of the last Ku Klux in Florida, about 50 miles from Palatka. Joe brought him into Palatka and down to Jacksonville
    by boat in the latter 1860s. There were as railroads in those days, and all traffic was by boats up the St. Johns river
    served by several different lines.
- speaker: Respondent
  text: I forgot their names now, but there were several enormous packets tied up at the Jacksonville wharves.
- speaker: Respondent
  text: There were big lumber mills, too, John Clarke, Flurry Clark, Cashes's, Nuckeyse, Fairchild's, and after them came
    the Summers in the early 1890s, or the latter 1880s, putting in at that time the biggest mill in the United States at
    milldale. The Summers established a record for themselves in financing. They were the old people who ever came to Florida
    with a bank roll and got out 'alive,' so to speak, but they invested at the right time, sold at the peak of the lumber
    industry, and retired with their heads high, the bit in their mouth, and their tails over the dashboard.
- speaker: Respondent
  text: 'In Jacksonville''s history, there are four things which will always stand out in my memory:'
- speaker: Respondent
  text: First was in my early boyhood the trip by boat up the St. Johns river and landing in Fairfield at the old state fairgrounds
    and they had good fairs in those days, with lots of entertainment and horse racing.
- speaker: Respondent
  text: Second, the great fire on May 3, 1901. I had been over in Tampa in the morning, and as I left to catch the boat across
    the river where a drapoolailted me to make the trip to Alexandria Villa, I passed the fire station where the central fire
    station now is on Adams and Main streets. The alarm sounded and red a chief Casey streamed out in the big 40-devil of
    a fire truck, drawn by the two handsome bay horses of the fire department.
- speaker: Respondent
  text: It was just 12 o'clock. It was a hot day, and I remember thinking to myself, 'Well! Old Missy has picked out a hot
    day, with heat rising in layers from the streets, for a fire, and I hope it does not last long.'
- speaker: Respondent
  text: I went on home four miles from the Jacksonville ferry, and as dinner was being served, I said to the butler, Pearson,
    what makes it so dark? Is there an eclipse of the sun? He went to the north window and looked towards Jacksonville, and
    rushed back with tense face, 'You're gel, Master David, it sure looked like the end of the world!'
- speaker: Respondent
  text: 'There was a camp of imported bamboos at least forty feet high growing on the lawn just about twelve feet from the
    north window, and above that was a sheet of flames from the burning Jacksonville, lurid and rearing, fanned by a high
    wind, and above that a pall of black smoke that obscured the sun and made it dark as night at our place. I shall never
    forget that picture: the sheet of flames above the bamboo and the black smoke rolling heavenward.'
- speaker: Respondent
  text: By 2 o'clock I was again at the ferry slip and took the last boat across to the Jacksonville side. My third memory
    is the picture of that wharf filled with precious belongings of Jacksonville citizens, who hoped in vain to gain transportation
    to the south side of the river. There were family portraits, clothing, bric-a-brac, baskets of silver, trunks filled with
    heirlooms and precious documents and papers, and the people with their panic-atticked faces as the fire leaped by bounds
    to the water's edge, destroying the wharf itself! No, I shall never forget that picture.
- speaker: Respondent
  text: 'I had a Sunday school teacher by the name of Mrs. Root, who kept a boarding house at Monroe and James Streets. I
    fought my way to the most house and from there saw a fourth picture: two big hotels, the Windsor and the St. James, flames
    shooting from every window, flames high in the air from the roofs, a million dollars going up in flames, but what a magnificent
    sight the two big buildings made as they yielded their greatness to the fire!'
- speaker: Respondent
  text: I somehow managed to make my way to the west side, or LaVilla section, and got home late that night.
- speaker: Respondent
  text: The most interesting people I have known in Jacksonville were Tom Murray, Major Boyleston, a South Carolinian, mentioned
    above, R. B. Burnett, who established the Barnett National Bank in 1877, Dr. J. Bingle, and Arthur Massett, who had charge
    of the Aster estate holding in Jacksonville.
- speaker: Respondent
  text: The first bank of the Barnetts was known as the National Bank of Jacksonville, and was located where the next building
    now stands on Bay Street, corner of Laura.
- speaker: Respondent
  text: When the first Gordon of whom there is any record at all, one of the companions of William the Conqueror, came over
    from Normandy with him to England, there was with him a Hugo de Mitchell from a little town in Normandy. When I was in
    Scotland in 1889 I saw the document giving the names of gallium, the Minorer's company, the gentlemen who were entitled
    to baronets and remember the mention of de Mitchell, the first Mitchell.
- speaker: Respondent
  text: The sheepskin record looked like a piece of wrapping paper, and it was difficult to decipher, but there are those
    who have since seen this document blur the same testimony. Sheriff William A. Ben in England six or eight months, he himself
    dictated the ones who were to be on knights of Scotland. He appointed King David, who was the first King of Scotland.
    David was looking for a wife, and made a deal by which his sister, Martha, was to be married to King David, and with her
    he sends a great train of followers, the Gordons, who were given land in Scotland (Aberdeen), and Hugo de Mitchell who
    also went to Aberdeen to settle on the land he was now given the title of 'Barl.'
- speaker: Respondent
  text: The Mitchells, as they later became known, have been land-owners in Scotland ever since. They did not emigrate from
    England, but came from France, the province of Normandy.
