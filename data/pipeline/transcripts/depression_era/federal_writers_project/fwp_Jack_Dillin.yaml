turns:
- speaker: Respondent
  text: A flight of steep stairs led to the large room which formed the upper story of the old laundry building where Jack
    Dillin and his children made their home. Jack's daughter Gladie opened the door at my knock and in a sweet voice and pleasant
    manner invited me to come in and be seated. She was neatly dressed and her curly brown hair was attractively brushed back
    from her forehead. "Papa," she said, "has just got in from grove work up at Highlands and is in the bath room washing
    up seas, but you be seated and wait for him." Jack then came in and though his blue denim overalls and jacket were soiled
    and work-stained, his face and hands were clean and his curly black hair was neatly combed though it had evaded an evident
    attempt to plaster it down with a wet brush. He extended his hand with the greeting, "Howdy, I'm proud to see you and
    don't mind a talkin to you. I'll be mighty glad to tell you what I can about the Citrus work. My own hut 17 toe I all
    new any e. person that knows the Life History of Jack Dallas papa kiader life I've h'd hap told meI lighter send to ens
    et then magazines ant git a blank to fill out about my life and 'ebbe /I -do sake a lot el merle'," said Jack seriously.
- speaker: Respondent
  text: 'Elsie then excused herself, put on her coat added a little rouge and powder to her face and said she was going downtown
    to get something for supper. As she went lightly down the narrow stairs Jack said: "That sure air a fine gal of mine and
    she air mighty pretty, new tint she." Then with a twinkle in his snapping dark brown eyes which belied his serious countenance
    he said: "Betas, folks says she looks just like me." That was something that would require imagination for Elsie was really
    very pretty with a healthy flush, really needing us rouges upon her tanned cheeks, while Jack''s face pallid and wrinkled
    and etched with pain and worry could hardly be called good looking though it did express character and determination.'
- speaker: Respondent
  text: Then Jack proved quite voluble and launched readily into the story of his life and his work in the Citrus. "I been
    a-werkin in the Citrus for 'round eighteen year now. Nos I ain't just 'sackly a Florida cracker but I sure am a Southerner
    and mighty proud of it. Both me an' my wife was born up in Alabama in Pendleton County, right near Lucia. We lived on
    joining farms and I know that WOUAU from the time she were a baby a-a ussin and then fur her to turn in am' do as she
    did. But, that's another part of my story. I'll tell you 'bout that later. Ni, wait a minits a ebbe 2 bettor tell you
    that rust off whilst Elsie is away. Elsie be right queer that -a -way, she know how her ma done us all, and she don't
    crave to go an live with her but she shore won't let nobody say nothial agin her ma, neither. An' if you want any story
    that's part of it so you jus' lissen to this," said Jack.
- speaker: Respondent
  text: 'He rocked excitedly for a few seconds and then after politely asking if I objected to tobacco he lighted a cigarette,
    inhaled deeply, then: "Hitt, ills'' like said, both no an'' her was born near Lucia and a knew each other all our lives
    we up an married right early. In most fifty years, and it must have been twenty-eight years ago. Ida, I guess was nigh
    on to twenty. She come from mighty fine people too and she were good lookin and always pleasant in her ways with folks.
    She were a Kell and the other side of her family was Riley, they was all high up in politics too. I never knowed so much
    about my folks excusing my father''s people, I heard him tell that his grand-daddy come over here from England but that''ll
    all knew.'
- speaker: Respondent
  text: Soon after we married her daddy up and died, but he left her forty acres of fine tar sands land. Her ma, and her brother
    both got forty acres each too, that's all the family she had. I never had but one brother and one sister neither. We was
    a farming on some rented land then so one day Ida said to me 'why don't we fix up my place so we can live there and stop
    paying this here rent.' Well I had a little money I had saved, the first and the last I ever did save too, and I thought
    that a good idea so I fixed the place all up nice like. I put a strong three strand wire fence all round them forty acres,
    I built a nice little house with a wood floor, no waste dirt floors for us, and a fireplace and glass windows too. By
    the time I got it all fixed up I spent nigh on to nine hundred dollars on it. I gave the County twenty-five dollars to
    help in fixing up the road, and they did it too, they put a good hard road right by our place, cause when I gave them
    twenty-five dollars a lot of tax paying folks did the same.
- speaker: Respondent
  text: Well, we farmed for a spell and made right good money too but we didn't save none of it for we was both young and
    liked a good time along with a little liquor now and then. Then we got to hearing what good and easy money they was a
    making down in Florida in the musk season rows the Lake then we had a chance to rent our place as we up and moved down
    here. That was nigh on to twenty years ago.
- speaker: Respondent
  text: While Jack paused for breath and to light another cigarette I noticed that the room was very neat and clean. The floor
    scrubbed till it literally gleamed as did the window panes. No shades were at the windows but half curtains of unbleached
    muslin embroidered in gay figures were placed at the four larger windows, the smaller ones were curtained with white scrim.
    Dishes were neatly piled in the old fashioned "kitchen safe." On some shelves there were a few canned goods and others
    held food in small dishes. The safe was screened to keep the flies out, which was very wise as the front doors of both
    floors were open and screenless. Two double beds, each neatly made were in opposite ends of the room and partly screened
    by muslin curtains, alongside one bed stood a cot also neatly made and with a gay quilt folded across the feet.
- speaker: Respondent
  text: Jack soon resumed his story however and demanded my attention. "The first thing we did was to go right down to the
    Lake near Sugary and start a bean farming. I couldn't get help and worked on the shares but me man, I wanted to be in
    it myself alone. I still had a little money so I put in a big bean crop for everybody said that was what to plant. Well
    just as the beans was most ready to gather there come a cold spell and a high wind and plumb minty all, and me too for
    that matter. Reckon I lost nigh on to five thousand dollars along with my house and what little fixings we had for they
    all got blessed away or broke up by the wind. I just did not know that on the green earth to do when here come a feller
    and said 'I been watching your work and I like the way you go about it, so you come on up to Sebring with me and give
    start work in my jumpin orange grove and see that you get something to eat till you sits on your feet again.' That man
    was Mr. O. Sebring, hisself, and I packed my wife, our two children, some quilts, a blanket, and a dollar and fifty cents,
    all we had, and went up here to Sebring and went to work for Mr. Sebring.
- speaker: Respondent
  text: Now I went right to work for him and did everything he told me and he paid fair wages too and was a good man to work
    for. I guess if I coulda left liquor alone I might be working for him right now though he ain't got the big groves he
    had then. After a while we did get a start but I ain't never had nothing for I never so old sit shut of the craving for
    liquor and that sure is an expense. I been trying lately to give it up and I think I touched a drop of Christmas. Come
    Christmas Day I know kind of liquor since was plain cold sober for the first Christmas Day in thirty years, ma'am. What
    I even went to Church on that Day this last time.
- speaker: Respondent
  text: Jack sighed deeply and a contemplative look came into his face. "As I was telling you, we stayed right here in Sebring
    and we rented a right nice house and got some furniture for it. We had our girl and our youngest boy here too, and Ida
    was living. She was a fine cook and when she worked outside like she done sometimes she cooked us a good dinner every
    day before she went to work."
- speaker: Respondent
  text: I asked Jack about Ida's work and he stated that she worked in the packing house. Sometimes she made as much as fifteen
    dollars a week, but more often it was ten or twelve, and the work was a steady like nature. Some spanies tried to avoid
    the work among the workers so they all stick. I done some packing house work too but I don't like it like the grove work.
    At the packing house I worked eight hours a day and got less twenty-five cents an hour each for session labor like loading
    the boxes, sorting up sacks. The packing house is piece work as for grapefruit they paid three cents a, for oranges seven
    and tangerines ten cents. That was math for skilled labor like that packing job takes but when you do know how you can
    make a right melt of money with it.
- speaker: Respondent
  text: Me and Ida, get on alright, and we didn't never quarrel or fuss. She never cussed no as I never cussed her even when
    I was deep in the liquor. She seemed to love us all as she'd sit up late nights, when she was in the packing houses mending
    our clothes for us. Then about two years ago she up and run off with a roller and she left us all and stayed right with
    him near here. Then she wrote to get a divorce and I told her to go on and if it I wouldn't do nothing to stop her. So
    she is married to that man and living up near Lucia and our place. She never tried to get the children or nothing of hers,
    what she left here. Reckon she knew I wouldn't let her have them a children. I'd a fought to the last ditch for them as
    you might say.
- speaker: Respondent
  text: After she left us one of my boys, next to the eldest Jess who's now most twenty, got in trouble but it was all a frame
    up against him and so, but anyway they sent him to jail. I sighed at his pardoned to me for I been right friendly with
    the judge and he knows how hard I was a trying to get some, but it all got no so riled up and I paid it so much mind that
    I got raising drunk and tried to drive my car and got arrested for it. I got put in jail too and lots of folks held that
    against me and so the judge he just couldn't give the boy ever to me. Most folks said he was a heap better off in the
    jail house than he were with me. Then whilst that there ruckus was going on a neighbor who was jealous up and went to
    judge and said Elsie was running on the streets day and night, and asked judge to give Elsie to her. They had a solemn
    trial too and lots of prominent folks here up and swore things what was not true about most and so judge he said, 'Jack,
    I don't like to do this but I'm going to give Elsie to this here lady for a year and see how you all get on for the evidence
    is mighty strong that you ain't taking the proper care of her.' Well, to me and there enough, he did give Elsie to that
    woman, I just can't sell her no lady though for she nigh about ruined little Elsie.
- speaker: Respondent
  text: She had a little money and she let Elsie spend a lot and do whatever she pleased and she made her vain-like and taught
    her to paint her face and her fingernails and I sure don't like none of that for folks in fixings, it don't look right.
    She put lots of fool notions in Elsie's head, yet do you know that when the year was up Elsie, she looked to come back
    to me and believe me I sure was proud. I up and told that woman and the judge too if anybody ever mess with me again and
    mess up my family like they done I sure am going to sit my shotgun and just pure graveyard kill them too, and I sure mean
    it!" Jack sighed deeply and seemed quite saddened by his narrative.
- speaker: Respondent
  text: He had well judged the time that Elsie would take for shopping too for her step was then heard on the stairs and in
    she came with several packages which she laid upon the table. Then she sat and sat near me and as Jack had ceased talking
    while he smoked she said shyly, "Would you like to see the quilts that my ma and I pieced?" Upon my assurance that I would
    indeed be very glad to see them as I was interested in handmade quilts she went to a trunk and brought out six neatly
    folded gay colored quilts.
- speaker: Respondent
  text: She made up all these designs too, don't you think they are pretty? Sometimes I think will name them each with a fancy
    pretty name but I never have done it yet." She ran small satin heads with tinted fingernails lovingly over the quilts
    as she talked. "Folks say we ought to put these quilts in the State and County fairs but we ain't done it. I would be
    scared they might get lost or stolen, and I want to keep them with me all the time." After I had sincerely admired each
    quilt in turn I helped her fold them and then she placed them back in the trunk and replaced the gay quilt which covered
    it.
- speaker: Respondent
  text: '"Papa," she said then, "I want to run down to the corner to see Mrs. Anders, she said she had a little present for
    me but might stay long." Jack said she could go and so she excused herself politely and again went out. Jack seemed to
    be listening to her footsteps down the stairway and out on the sidewalk and then he resumed his talks. "That there woman
    what kept her for a year did give her some nice clothes and taught her some good manners, and I reckon she would have
    seen learnt to paint up anyway. My boy Jimmy knew he ain''t never give me no trouble. Ever since he been a little feller
    large enough to ride a bicycle he been a W.W. Messenger excusing the time he was in the CCC, and in school. He''s now
    nineteen years old and he graduates from High School since June. He would let through a heap senior but he got disgusted
    when he got started the CCC and decided not to see it mere. Then the W.U. Manager told him to get a High school education
    and he could put to be an operator, but if he didn''t graduate he couldn''t never be one.'
- speaker: Respondent
  text: '"I didn''t want him to send him to CCC camp and if they''d sent Jess he might not be in all that heap of trouble
    now. But neither would do the way but they sure sent Jimmy, I think it was the WPA that sent him but ain''t sure, it might
    have been the WPA. Jimmy works now in the NIL, some Youth work he sails it and he makes fifteen dollars a month but with
    all his expenses in school he don''t save any, sometimes he helps me some though. Now he hoped to help IRA buy my new
    tag for the car I get to have it in my work truck. We get the bag while we have the money."'
