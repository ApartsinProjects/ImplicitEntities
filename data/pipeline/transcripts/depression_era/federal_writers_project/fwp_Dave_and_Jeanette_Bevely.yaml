collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Dave was stopping traffic at the busy intersection of Iowa Avenue and the Atlantic Coast Line Railroad. There he stood
    with the round galvanized sign with a handle, and the word "stop" printed on both sides. He was holding it above his head
    to warn the oncoming drivers in the automobiles that a train was approaching. The grinding of brakes on the mighty steel
    wheels could be heard as the Limited came pounding down the track enroute to Tampa, Florida. Dave said, "You better step
    back, this train makes a plenty of dust when it passes." All of a sudden it passes and the dust flies like a whirlwind.
    He then waved for the traffic to move on. In a few minutes the Avenue was cleared of the heavy traffic until time for
    the next train to pass. In his courteous way he waved for cars to go and seeing to their safety in passing the grade crossing.
    After completing his duty, Dave invited me to his little shed that sits beside the main line. There he rested himself
    on two rocks placed on top of one another. On the other side of the door was a nail keg with a burlap sack on it for a
    pillow. The shed was four feet in dimensions with a small stove sitting in the northeast corner and a water cooler sitting
    on a stand in the other corner. There was a dilapidated chair covered also with a burlap sack. Three lanterns were on
    a shelf on the west side; these he used at night to stop traffic. On the outside was a pile of wood, cut ready to burn
    in case he needed a fire. He had prepared it for his shift, which was from three o'clock P.M. to eleven o'clock P.M. Dave
    said on four passenger trains and six freight trains passes while I am on duty.
- speaker: Respondent
  text: Dave lives in a section house at Peel Lake, Lake Drive with his family consisting of his wife Jeanette, age 41, three
    stepchildren Mildred, age 30, who lives in Washington at home; Jennie Lee, age 20, who does the same; and Junior, a girl.
    The stepchildren away from home are Lee Early, age 25, married and lives in Trilby, Fla., and Theodore, age 20, married
    and has two children. Theodore lives next door to Dave in house number thirty-two.
- speaker: Respondent
  text: Dave stated that he was born in Jefferson County, Florida, December 5th, 1866. His father was Fred and mother Francis
    Beverly. He said that he has heard his father say he was five years old when freedom was declared. There were fourteen
    children in the family—seven boys and seven girls. The surviving five live in various sections of the States. His father
    married Julia Stern after the death of his mother. My parents were farmers in Jefferson County. I ran away from home when
    I was between twelve and thirteen years old. I strayed away on account of the treatment I received from my stepmother.
    Lots of boys stray away from home on that account. When I became a man I returned home, and there married to my first
    wife Rosetta Turner, at Monticello, Jefferson County, 1901. We separated in later years. I then married my second wife,
    Jeanette Billman, in 1926, Lakeland, Florida. We have no children.
- speaker: Respondent
  text: During my first marriage, I settled in Alachua County. I worked on the section gang on a railroad. They used wood
    burner engines. I received $1.50 per day. I came to Polk County, where I began working at the Kebblevale Phosphate Mine.
    I averaged on this job around seven dollars a week. We lived in the quarters built for the workers. After working there
    for three years, I returned to Jefferson County and worked on the farm with my father. Later I went to Moorehaven, in
    Glades County. There I worked on the extra gang of the Atlantic Coast Line cutting down railroad rails. Part of the time
    I cooked for the workers in the gang. Afterwards I quit the extra gang and went to work on the section gang with headquarters
    in Lake Wales, Florida. Here I worked from January to November in 1925. During this year I left and moved to Lakeland,
    Florida, where I have been ever since doing the same kind of work on the section gang. Most of my work has been in the
    yard here in Lakeland. This job that I am holding down now was given to me when the old man retired who used to be at
    this station here. When on the section gang I received $1.50 a day. Now I make $50.00 a month. I have been at this work
    a little over a year. There has not been an accident on this crossing since I took it over.
- speaker: Respondent
  text: I have to attend safety things held at different places. To be safe yourself you have to learn to make others safe.
    All of my luck comes from a good work record. I always wanted to work well from a kid up. My brother Jim is a watchman
    at the other crossing at Florida Avenue. He started in service together; he is forty-seven years old. I have another brother
    Bee who lives on the farm in Jefferson County.
- speaker: Respondent
  text: I have a good bossman, our foreman is Mr. Reese, up the Railroad Department. I never went to school a day in my life.
    When I left school I could neither read nor write my name. Now I can read and write anything. How I began, I would buy
    paper and envelopes, and had a friend who would do the writing for me. I wouldn't get any answer from them and when I
    got wise I found that he was signing his name to them. I noticed he would get lots of income. I could do all things about
    writing. From then on I began to learn to read and write.
- speaker: Respondent
  text: 'Yes, to my judgment I think a man should have an education. I read a good deal on this job. I use what I read. Dave
    arose from his stone seat and entered his shed, and brought out a few small books. They were as follows: The Bible, The
    Children''s Bible Questions Books, The Pocket Treasury, The Emphasized Gospel of St. John, and the Names of Comfort and
    Consolation.'
- speaker: Respondent
  text: I don't have time to fool with little old joke books. I like to read something that gives me consolation to my soul
    in regard to voting. Dave said, no sir; I never voted, never. I am not interested in voting. Ever since I first heard
    of voting through voting I never fooled with it.
- speaker: Respondent
  text: Yes, I am a member of the Primitive Baptist Church; our pastor is Rev. B. Bartley. The store of our church is in Wacahoota,
    Florida. I have been a church member since 1915. I have been a Usher, Board member, and a trustee. I have lived 14 years.
    My church went on account of my lot. We attend church regularly. A person couldn't live a better life than a Christian
    life. It's the finest life to live on earth. All the new fashion religious attitudes I live by, I have no faith in it.
    This old fashion religion will hold fast. I'll say it you.
- speaker: Respondent
  text: I also say religion will go out. I go to church and I am trying. I go to church, and at that time I considered devilish.
    I remember when I would chalk at me at the chicken, my till to the field where they were picking cotton. It was so small
    they had a six-pound sack and tried to kick cotton too. In making me work that kept me out of mischief. I think that started
    me off to work and being good.
- speaker: Respondent
  text: Dave is five feet and four inches in height, dark brown in complexion. He was dressed in overalls with a heavy gold
    chain hanging with an expensive watch on it. He displayed his watch and stated that it kept correct time. He stated that
    he has to have it checked every week by the jeweler. His old felt hat was black, and his gold teeth in front shined when
    he smiled. He has a pleasant personality and good common sense about conditions in general. Everyone in passing appeared
    to know him. They did not fail to speak to Dave.
- speaker: Respondent
  text: Dave said that he did not have to pay any rent for his home. The company supplies the house. The home on Lake Axe
    is painted gray with white trimmings like all the other section houses that line Lake Wire next to the Atlantic Coast
    Line Railroad. His wife was very pleasant and from observation she is a good housekeeper. They have two bedrooms, and
    the furniture was in very good shape. This day they were very neat in their attire. They stated that their grocery bill
    was never over per month, and they have everything they want. Dave said that he did not eat very much meat, sometimes
    little bacon; mostly I like vegetables and no sweets.
- speaker: Respondent
  text: There are about five more Colored families in this section, they are surrounded by white people. The exterior appearance
    was good. The lawn was green and well kept. There was a fence in front of the house and it was painted white. They all
    seemed to be happy together.
- speaker: Respondent
  text: Dave said, when I get off from work I go home and sleep. When I wake up I chop wood, and work around the lawn. I hardly
    have time to do anything else. I don't play any kind of games, am too old for that now. I have to take care of myself
    so I can make a living for my family. During these times there is no time for a fellow to fool around.
- speaker: Respondent
  text: At this time Dave said, "Well I must get on the job, it is time for a train to come through," and with a courteous
    bow he said goodbye.
