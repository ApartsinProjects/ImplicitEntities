collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: My father, Henry Outtine Dozier, came from Georgetown, South Carolina to Fernandina, Florida with Walter Oesohman,
    Sr., shortly before the War between the States. My mother was Cornelia AS* smi, daughter of Doctor Thomas a ward Scriven,
    of Beaufort District, South Carolina.
- speaker: Respondent
  text: My ancestors on my father's side were French and English, and the name has long been identified with the fate, fortunes,
    and history of the South. The earliest Dozier came to America in 1623, and my father was directly descended from Leotard
    Dozier who was born in Lunenburg, Virginia in 1710. The name 'Outtinei' is an anglicised version of one of our early French
    families whose name was 'Oothenneau'.
- speaker: Respondent
  text: My mother's family were of French, Scotch and Welsh extraction among them the Imports, Lanagrave Smith, of South Carolina,
    who was my mother's grandfather, John Scriven, a Georgia Patriot, and his brother, General James Scriven, of Revolutionary
    War fame.
- speaker: Respondent
  text: I was born in Fernandina in 1874. My father had died about four months previous. When I was a year and a half old,
    my mother moved to Atlanta. There was an older brother, Erwin, and a sister, Louise, two years older than I. My early
    education was secured in the public schools of Atlanta.
- speaker: Respondent
  text: Now did I happen to take up architecture, an unusual occupation for a woman? Well, even in my childhood I wanted to
    study architecture, and have drawn plans since I was seven. In fact, when I was just a little tot I used to draft patterns
    for doll dresses for my own and the neighbor children's dolls. It seemed the natural thing when I reached the age to decide
    what my life work was to be, to select architecture as a vocation.
- speaker: Respondent
  text: By the time I had finished high school, however, I had also become interested in astronomy, and I have often wondered
    whether I might not have attained more of a monetary success in that field; at least, there would not have been such enormous
    competition. I have always kept up my interest in astronomy, and study the subject seriously whenever I have the opportunity,
    so I may say that is my avocation.
- speaker: Respondent
  text: I served an apprenticeship of one year in an architect's office in Atlanta, then attended Pratt Institute for two
    years, afterwards enrolling at the Massachusetts Institute of Technology, in Boston, taking the full four years' course
    and graduating in 1899 with a B.S. degree in architecture.
- speaker: Respondent
  text: I practiced in Atlanta for thirteen and one-half years, moving to Jacksonville November 1, 1914.
- speaker: Respondent
  text: During the World War I, I was connected with the engineering Department of the City of Jacksonville. I opened my own
    office in the Bisbee Building in 1918, moving to the Barnett Building in 1926, being the second tenant to sign its contract
    for office space in this splendid new building, where I remained until the depression quite eliminated me. In fact, all
    architects and building engineers suffered severe curtailment of their business activities during this period though I
    located in the Peninsular Life Insurance Building, where I have had my office continuously since 1931.
- speaker: Respondent
  text: Probably my most outstanding piece of work in Atlanta is the Southern Ruralist Building, located on Hunter Street
    near Washington, built for the Episcopal Church. I used to do all of the plans for building authorized by Bishop Cleland
    Kinloch Nelson of that diocese.
- speaker: Respondent
  text: In Jacksonville, the Federal Reserve Bank Building, southwest corner of Church and Regan Streets, on which I was associate
    architect, is one of which I am always very proud. This building completed in 1924 is one on which the 'shifting sands
    of time' have had no effect, for its foundations are firmly anchored on a clay bed which extends two and one-half feet
    below the deepest footings. On account of the mean 12-ft. above water level of Jacksonville, it is sometimes a difficult
    engineering problem to secure firm foundations for large buildings and skyscrapers, but the Federal Reserve Bank is well
    built and soundly constructed and, I am happy to say, after its constant use all of these years, with heavy installations
    of gratings, shelving, massive safes with heavy combination doors, there is not a crack in the entire building.
- speaker: Respondent
  text: One of the most interesting assignments I ever had was the residence built for the Charles N. Welshans at Goodwin
    Street and the St. Johns River. It faces the river, is almost pure Georgian in style, and centering the front entrance
    is a lovely circular stairway which winds gracefully to the second floor. This residence is now the home of Dr. Thomas
    W. Palmer.
- speaker: Respondent
  text: Another splendid home for which I designed the plans and supervised building is that of Dr. W. Herbert Adams, on River
    Boulevard.
- speaker: Respondent
  text: A church, St. Paul's Negro Episcopal on Newnan Street, is one of the best examples of English architecture in Jacksonville,
    with the possible exception of the Church of the Good Shepherd. The negro mechanics of the congregation built the church,
    giving their services free. They changed the inside somewhat, but the outside is practically as designed, and is a beautiful
    example of its kind.
- speaker: Respondent
  text: The greater part of my work has been residences, apartments, and small churches.
- speaker: Interviewer
  text: What do you think of the modernistic trends in architecture?
- speaker: Respondent
  text: I do not like it. In fact, I consider it only a fad and, while I am no prophet, will give it about five years to wear
    itself out. Speaking of protests, I did, however, predict a five years' existence for the craze for the Florida-Mediterranean
    type of construction, and it did last, for just about that length of time. One quip in an architectural magazine recently
    referred to the modernistic as 'nudist architecture' which, in my opinion, very aptly describes it.
- speaker: Respondent
  text: One of the first residences I built after I graduated was that of Mr. John C. Cooper, Sr., Southwest corner of Market
    and Duval Streets, Jacksonville. It was completed in 1902. This was just after the fire of 1901 that wiped out all residences
    in that section. This house is in good condition and still occupied by Mrs. Cooper as a home. The same year I also built
    three houses on Monroe Street for my aunt, Mrs. O. P. Cooper. They are still standing and have been occupied continuously.
    This is the reason I contend that if you build a house which is in good style at the time and of first class materials,
    it is always good. This modernistic fad is 'jazz architecture'; it will not, in my opinion, last for any considerable
    period.
- speaker: Respondent
  text: Furthermore, I believe northern styles are absolutely unsuited to this State. Ivory homes should be designed for the
    climate and all materials should be suitable to this climate. I believe wherever it is possible it is wisdom to use all
    Florida materials, also Florida labor.
- speaker: Respondent
  text: For the houses I build, all material is purchased right here in Jacksonville.
- speaker: Interviewer
  text: What about air conditioning?
- speaker: Respondent
  text: As a means to further comfort at all seasons of the year, I believe in air conditioning of residences and other buildings.
    I use the gravity system special ventilator in the roof, arranging it to take advantage of the natural law that hot air
    will rise and pass out through the ventilator, with the cool air replacing it through the bottom in a continuous circulation.
    This can be put in residences and many other classes of buildings. It is not as quick as some other much advertised systems,
    but it is reliable and satisfactory and there is no cost for upkeep just the original outlay for the initial installation.
- speaker: Interviewer
  text: How has business been?
- speaker: Respondent
  text: When I came to Jacksonville, during the World War period and immediately afterwards, building was dead as a mackerel.
    Then the boom caused some excitement in building, but the depression brought a further slump. Now government stimulation
    has increased the demand for homes, and the 'own your own home' slogan has instigated the demand for new domiciles by
    persons who never before had any ambitions in this direction.
- speaker: Respondent
  text: However, the greater part of those homes built with government loans are of very flimsy construction. Most of them
    are erected without architectural supervision with no regard either for quality of materials or workmanship. They are
    built of topped lumber pointedly labeled as white as paper, and will not, in my opinion, last out the term of years of
    the government loan. The lumber companies handle most of the financing and construction of these homes, from a top cost
    of $3,600 downward and the owners themselves seem unaware of or indifferent to the type of construction they are obligating
    themselves to perform in install—
- speaker: Respondent
  text: The houses I build I insist must be constructed of untapped timber, full of rosin. These will endure and will really
    give good service for the money invested.
- speaker: Respondent
  text: I consider the best house for this climate, where everything permits, is the rammed earth construction, like that
    of Mexico and some of the Mediterranean countries. A great many homes in California are of this type, the earth put in
    like poured concrete and rammed down. This construction costs no more than a frame residence of the same proportions,
    and will last for two or three generations.
- speaker: Interviewer
  text: Do you believe in people owning their own homes?
- speaker: Respondent
  text: 'I do not know; young people, yes; but for the majority of persons, no. My sentiments on this subject are expressed
    in excerpts from the very able article printed in the Philadelphia Record of May 16, 1938, written by Stewart Chase of
    the Survey Graphic, in which Mr. Chase says: ''Homes is an unsafe investment. I advise most wage earners to rent; and
    most builders who do not wish to be caught in the next real estate debacle, to build for renters. Home ownership brings
    great hazards foreclosure and loss of equity to the owner.'
- speaker: Respondent
  text: '''In 1934 in this city (Philadelphia) a count showed 431,140 residential structures, out of which no less than 40
    percent were foreclosed during the preceding period of six years (from 1928) not including the very considerable number
    rescued at the last minute by the federal government through the Home Owners'' Loan Corporation. Nine out of ten homes
    don the chute. This situation prevails throughout the United States.'
- speaker: Respondent
  text: '''The building industry is not yet equipped to furnish in most sections of the country a sound modern dwelling unit
    for a family that cannot pay $30 a month, which is the limit for most dwellers. The way out is, therefore, in the rental
    housing field. Many workers who cannot afford accommodations offered by the private home can yet have them at costs they
    can afford by renting. And for rental projects there are today many advantages.'''
- speaker: Respondent
  text: This condition prevails generally, in Jacksonville as well as other sections. Very few are able to carry a mortgage
    on their home or a loan to its conclusion; and when they cannot keep up their payments, they not only lose their home
    and all they have paid in and improvements made at their own expense thereon, but they lose their equity as well, and
    have nothing with which to start over again.
- speaker: Interviewer
  text: What about religion?
- speaker: Respondent
  text: I am an Episcopalian dyed in the wool, so to speak. I am a firm believer in the influence of the Church. If it were
    not for the church, the world would be in a much worse shape than it is today. It is the 'anchor to windward' for every
    human being.
- speaker: Interviewer
  text: Do you vote?
- speaker: Respondent
  text: Yes, I vote. This is the individual's priceless privilege and duty. As to national politics, I consider some of the
    New Deal's policies good, some ought to be changed. I think President Roosevelt is too radical. His first administration
    was splendid, his remedial legislation was most noteworthy, and he no doubt saved the country from a revolution; but now
    he has too much power. The power should go back to Congress. I think, too, that President Roosevelt has been most unfortunate
    in his advisors.
- speaker: Respondent
  text: As far as the South is concerned, men above the Mason and Dixon line do nothing but exploit the South. They still
    think we are back in the Reconstruction days. If the South votes as a solid unit, we will get somewhere; if we do not,
    we will simply be ruined. If any section can work out a good tie like that in which we were left in the War between the
    States and the Reconstruction period, with the carpetbaggers around our nooks and without any help or whining, remember
    then we can take care of our problems in any situation.
- speaker: Respondent
  text: If the Roosevelt administration does not stop this class legislation, it will result in dire consequences. The last
    election went to his head, and I most certainly would not vote for him for a third term. For that matter, I would not
    favor a third term for any president.
- speaker: Respondent
  text: At this point Mr. Ulrich, for whom I am erecting a home in the San Jose section, South Jacksonville, came in with
    a worried look on his face, saying he had just been out to note progress and was not satisfied with the proposed location
    of a downspout which he feared would drain the water into a court, causing a mudhole.
- speaker: Respondent
  text: I forgot to tell you I have changed that, and my deft hands quickly drew a penciled diagram, showing the downspout
    carried to the far side of the building where it would drain into the concrete driveway. Mr. Ulrich looked much relieved.
- speaker: Respondent
  text: By the way, you can begin on the landscaping Monday. The sooner the better, now. First plant centipede grass then
    sow rye on top. When the rye attains its growth, cut it, but do not turn the sod under; that is where a great many people
    make a mistake.
- speaker: Respondent
  text: The general opinion prevails that rye acts as a fertiliser. It does more than this; a good stand of rye holds the
    roots of the planted grass on low ground, using the grass to take firm hold, and produces the prettiest lawns you can
    imagine.
