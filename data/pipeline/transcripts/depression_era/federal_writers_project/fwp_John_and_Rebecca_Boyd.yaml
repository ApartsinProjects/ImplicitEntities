collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was born October 9, 1870.
- speaker: Respondent
  text: I married John while he was working in Arcadia, Florida, December 11, 1900; my parents rented land to farm on All
    The Little Lottles Georgia; They once had one hundred and fifty acres, and called it a three bows farm. There were fifteen
    children in our family, all of them are deceased except myself.
- speaker: Respondent
  text: When we came to Lakeland we settled near the Atlantic Coast Line Railroads near Lake Wire. At that time, nearly all
    the colored people lived in that section. There was about one hundred colored people living in Lakeland at that time,
    now I hear them say that we have nearly four thousand colored people in Lakeland, coming up some. They came here from
    every place.
- speaker: Respondent
  text: Mattie was busy ironing in the back hallways, Rebecca called her, I called in and sat down. Now Mattie can tell you
    about herself, and she said, it is true that I am considered the first Negro child to be born in Lakeland. My parents
    were Willis and Gabriella Boyd. Willis died January 11, 1906, age 54. Gabriella died July 7, 1901, age 45. I was born
    May 18, 1886. I remembered the second colored child that was born in Lakeland, Lubenny (Mae birth record was seen) was
    born June 14, 1886, he is now living in Philadelphia, a niece and is known as Mrs. Livingston. She has three grown children.
    I know well the first white child born in Lakeland, she now lives in Tampa, Florida, Aisdora Lee Bouaker, who is W.V.M.,
    Shelm, Congressman Daniels' son Urcian was born the same month that Miss Dora Lee was born.
- speaker: Respondent
  text: Where we lived was a wilderness, one street was near the depot, that Anne street, and Mtuckey, Nettle were the main
    streets. Most of the business was located on Main street. I was born near Lakeland along the railroad. The sand trail
    with deep ruts in them, up to your knees were the main paths and roadways. The big wheels of the ox-carts cut them like
    this.
- speaker: Respondent
  text: This was the mode of travel then. I used to ride them many days, now riding to what we have now. But we thought we
    were getting there fast.
- speaker: Respondent
  text: In 1898, I think soldiers came around Lake Wire, Lake Morton, and Lake Hunter. They were on their way to the Spanish
    War in Cuba. You remember the sixth of May when the battleship Maine was sunk in 1898. The soldiers began touring in the
    first of April, and it was the last of August before they all left. Those were some exciting times around Lakeland.
- speaker: Respondent
  text: I remember the colored Tenth Cavalry, The Illinois, The 1st from Ohio and the 4th of New York. All of these were white
    soldiers. This place was the backing place from Tampa. As fast as the ships would take them to Cuba they would leave out
    of Lakeland. Some never did get to go to Cuba because the Tenth Cavalry had whisked them out under Colonel Roosevelt.
    These were some class. Talking about hard times, that was no name for it.
- speaker: Respondent
  text: I attended elementary schools maybe going as far as the sixth grade. At that time they did not have any more grades,
    until Prof. W.A. Rochelle brought the school up to the eighth grades. I left Lakeland and finished my schooling in Ocala
    at the Emerson school, going through the high school course.
- speaker: Respondent
  text: The first colored school located in Lakeland was Florida Avenue and street where the State Bank Building now stands.
    Later they moved it from there, they held school in the Methodist church one season, and in the Baptist church another,
    moving sometimes to the Masonic Hall. This was kept up until the first school was located in Apopka at Orange and Ohio
    Avenue in 1944. I taught in this school seven years, holding a third grade certificate. I have been widowed, but I divorced
    my husband. He is alive somewhere.
- speaker: Respondent
  text: Mattie was so something to be proud of being the first colored child born in Lakeland and still living to tell about
    it.
- speaker: Respondent
  text: I went to school myself. I attended the Bawltia school Thomasville, Georgia. I went as far as the seventh grade. The
    school building was built out of logs with only one large room. We had two teachers, and about one hundred and fifty children.
    At that time we only had three months schooling, way long before the last they gave us six months. This was not long after
    freedom. We would play jumping the rope, and sometimes baseball. The girls played on one side and the boys on the other.
    Back there they did not mix with the boys.
- speaker: Respondent
  text: When I came to Lakeland, I elected the first president of the Parent Teachers Association. We started with twenty
    members which grew to fifty members when I gave it up. I think education is the greatest thing in the world today. I don't
    think there is enough association of parents with teachers. Since Rochelle gave up the principalship I have not had the
    good fellowship with teachers. Things are different. We didn't have so many wayward girls during our time. When I first
    came here I remembered only eight churches, twenty five A.M.E. and five Methodists.
- speaker: Respondent
  text: I didn't know anything about Primitive Baptists at that time. That part of the Baptists looked up later. I have been
    a member of the Harmony Baptist Church thirty one years. I just do not belong to any others. When I was active in church,
    I was president of the B.Y.P.U., teacher of the first Bible Class, treasurer of the Sunday bench, head of the Deaconess
    Board, and President of the Women's Home Missionary Society. I tried to give my soul to my church work. I think that the
    saving of souls has retarded in the last few years. I think the cause of the condition is slackness on the part of the
    churches today. Years ago they were better. The old folks don't have any power over the young folks because they set wrong
    kind of rules.
- speaker: Respondent
  text: I had to give up all work when I had this stroke in 1965, the stroke on my left side. Now you see I am able to walk
    and use my hands. I have lost all of my teeth pulled out. You know bad teeth can poison your whole system. Before I was
    swept off of my feet I weighed one hundred sixty thirty pounds. I suffer mostly from high blood pressure. I have to watch
    my eating very carefully.
- speaker: Respondent
  text: Speaking of food, I remembered right after freedom in 1876 you could get a large hog for $15; butter 50 cents a pound;
    bushel of potatoes 20 cents; bushel of corn 25 cents; eggs six and two dozen for $3.40 and you had to carry them eight
    and ten miles to the next town to sell them. A big change now. With this trouble I am giving it cost me a great deal for
    special food that I have to eat. I only eat fish, lamb, grits, butter, whole wheat bread, and corn bread when it is cooked
    well.
- speaker: Respondent
  text: Before I had this stroke I could eat anything. John and the rest of the family eat most any things.
- speaker: Respondent
  text: I worry a great deal at times because I am not able to work like I used to. When I was on this farm in Georgia I was
    strong and worked hard. I hoed and picked cotton on my father's farm, only received 4 cents a hundred pounds. It was a
    whole lot of cotton to pick back there. They didn't have the cultivation like they have now. If you needed thirty five
    cents a day you would do better than those who worked in domestic service, because they only made $1.60 per week, so places
    they could only make $1.60 a month doing the housework and cooking. You sometimes had to cook for eight or ten in the
    family. I had my family to feed and look out for. The way the mistress did was to tell you to put a sack of potatoes in
    the stove, when ordered to go to the smokehouse, you were told to get the clus and ends of the meat to cook with the grease
    that was left you could give to your child then. That's the way they made up for their low pay. That's the way the pan
    came about, I mean servants carrying pans home when they finished work. Carrying pans home is no new thing. A child would
    starve if I didn't carry a pan home at night. Mistress would give us all the old clothes and shoes. After President Grover
    Cleveland and Harrison Amos changed and things began to pick up, sometimes we would get from $4 to $20 a week. Things
    began to get better still after President William McKinley's and Theodore Roosevelt's time. When we came to Florida we
    found wages better than we got in Georgia.
- speaker: Respondent
  text: I haven't worked out very much. I worked up a good laundry business here at home, I would average from $4.00 to $15.60
    a week when times were good. I thought once that this stroke I have came from washing a great deal. I was taught when
    I married John to care for him. A woman's place at home. I thought my duty way back there was to cook, mend clothes, and
    keep a good clean house for him. I knew if I was away I could not do that. I am with the old school. Things are different
    now. Everybody goes, and home takes care of itself.
- speaker: Respondent
  text: John followed work, Jr. at the phosphate mines from 1900 to 1907 with the nigger Bay phosphate Company. They are out
    of business now. He also railroaded some, working here in the Coast Line railroad yard until 1945. On this job he would
    average about $100.00 a month. John is a good well digger. He makes from $50 up to $100 cutting in wells and winkle systems
    in the groves. He had a call this morning to come out to Colonial Drive to clean out a well. John farms on our twenty
    acre farm located in the Southwest section of Lakeland. It is where Old Pa Di lived. You remember the old man who was
    over a hundred years old when he left the place. The shack is right on our land, let a man stay in there now. John has
    it done so well with the farm this year.
- speaker: Respondent
  text: Bryant works on relief. Mattie and Mary stay at home and help with the laundry work. Mattie makes around five dollars
    every week. Work is not so plentiful now, lots of folks do their own work at home. I am fond of laundry work. What John
    and myself accumulated was likely mostly from my laundry work. All would put our little bits together so we could have
    something. Once we owned four lots on this street. We lost these during the depression. All we saved was our house place
    and the twenty acres.
- speaker: Respondent
  text: Over time I begin to think that is too much since I have been unable to work. Bryant helps me out a lot. He is one
    son who has stuck to his mother. It took lots of money to get me back in shape. If it were not for help from this relief
    work, I could not have pulled through. It has been lots of help to us.
- speaker: Respondent
  text: I have tried to get an old age pension, but I haven't been able to prove my age. About this laundry work in this town,
    I recall when colored men did nearly all of it. Now they have big places to do the laundry work, and that cuts us down
    a lot. A few folks like it the old way still.
- speaker: Respondent
  text: If I were to vote again I would vote for the Democrats. I have voted since they allowed women to vote. John votes
    too. We never had any trouble voting. We felt like we had a right to vote paying so much taxes every year.
- speaker: Respondent
  text: Since I had this stroke I can't walk very far. I try to walk to the stores on Florida Avenue and back again to give
    me exercise. Just do that I keep busy with light work around the house. My biggest fun is working around the flowers and
    attending to my chickens. John usually mows and the house and yard when he is home. Sometimes he walks up the street and
    sits on the nights of Bryant's steps on Florida Avenue. All John does is with some of his old cronies. Then Bryant finishes
    work he likes to dress and walk down the street, go to the movies. He likes moving pictures. You can see for yourself,
    we are just plain folks, they go to church on Sundays, and that's about it. I don't go around like I used to, I still
    am doing the little things for folks in the community. When I was active I tried to do my best as long as I could. I liked
    it too to help others. I believe that is the reason the Lord has blessed me in my afflictions so far.
- speaker: Respondent
  text: To the delight of Rebecca, John came home. She said I am glad you came home while I was so serious here. Us shockbands
    and expressed his appreciation in my calling, he shunned his overalls, and washed his face and hands and remained in a
    clean overall and joined in the interview.
- speaker: Respondent
  text: John states that if you are talking about this, I can tell you the truth. If Rebecca had told you our story would
    be about the same. You know a waiter man by the name of Kayla Stephenson, he lives at 407 West 5th street, he used to
    live in a little house on 7th & Turner near the Washington park.
- speaker: Respondent
  text: Now he was the first man to sell me a lot in this town. He was one of Joe's first waiters to Nettie here in 1882 some
    years before I came. I have heard him say that Lakeland was named by Dr. Andrews, he was a man to know because he was
    in the meeting when it was named. Right after that they laid the town off in 1883 and 1884. They call him Judge now, he
    still owns lots of property in the white and colored section. The colored park he deeded it to the city to be used for
    a Negro park. I have worked hard trying to have something. I have never made anything easy in my life. From the looks
    of it, it looks like I have been a good man in my days. Since some of the folks have gone back to trucking and farming
    I have been kept busy digging wells and putting in sprinkling systems. I guess Rebecca told you about it. I always hard
    times has run through back to the soil. This has slowed me down with my work on the little farm. I don't have time to
    look.
