turns:
- speaker: Interviewer
  text: Then asked how she occupied her time.
- speaker: Respondent
  text: Jack gets up at five o'clock every morning and feeds the chickens, ducks and other animals, then he milks the cows.
    I get up at six o'clock to cook his breakfast and fix his lunch. By 6:30 Jack has finished with his chores and we eat
    breakfast, which usually consists of grits, eggs, biscuits and coffee. Sundays, we have pancakes and syrup or honey. By
    seven o'clock, Jack is ready to go to work. He works in a lumber yard about six miles from here and goes back and forth
    in a 1927 Ford sedan, the same car that we came to Florida in, she added. After Jack leaves it is time to get the children
    dressed and feed and get Joanne off to school. Joanne takes a school bus that picks the children up along the way. Then
    I either wash my clothes or go to work in the garden, chopping a few weeds and picking some vegetables. I work this way
    every day until 12:30, when I must stop and fix some lunch for myself and the children. After lunch and in the heat of
    the day I just cannot work in the open so I tidy up my house and, if I have a little time to spare, I lie down for a little
    while and make the children do the same. At three o'clock I'm at the garden again for about an hour and then I must stop
    to feed the chickens and milk the cow. By that time, it is about five o'clock and Jack has come home from work so I must
    start preparing supper. After Jack gets home he works in the garden, picking and hoeing until dark, then we have our supper.
    You see we cannot waste any daylight hours. Jack also works all day Sunday in the field.
- speaker: Interviewer
  text: How do you manage financially with the farm and your work?
- speaker: Respondent
  text: We do not have very much in the way of ready cash, but I suppose we are a lot better off than lots of folks. We are
    all healthy and happy together so I guess we have just as nice a living as anyone. Although Jack only makes $2.00 a week
    at the lumber company, we have managed to keep ourselves well and always have plenty of good substantial food to eat.
    Whatever we have left over in vegetables, we trade or sell to the neighbors or to the local store for something we need.
    We try to manage our farm so that we always have some kind of fresh vegetables at all times of the year. I preserve some
    and we always store up a supply of field corn to feed the cows and chickens when the grass is not so good. I hope to get
    us a few hogs next year so we can have our own fresh pork. About once a week, Jack will shoot a couple of rabbits and,
    of course, we have our chickens. We only eat the roosters and save all the hens for laying. Some day we hope to have a
    nice chicken farm here, but we will have to wait for a while as we must do some repairs on the house. Jack hopes to start
    on that this coming Monday. If we just had more time, we could do lots more but we can't afford to hire anybody and, of
    course, the children are too young to help.
- speaker: Interviewer
  text: How long have you been living here and what brought you to Florida?
- speaker: Respondent
  text: We have been here ten years now and we own this farm, and do not owe anyone a penny. We came here from a little town
    in Illinois. We have always been farm folks. This is the only place we have lived in Florida. Jack had a little saved
    up when we first got married and he owned his own farm. He sold his place and we decided to try our luck here. Since being
    here, we think that there is no other place in the world like it and we are contented and happy here. Of course, like
    everyone else we have our dreams and ambitions. We want to have running water, electricity and a new and larger house
    and each week, regardless of what we would like to spend, we put a little something away toward it. It isn't much, but
    we are still young and strong and feel that someday we will have what we want. As it is, we have good land and good health,
    plenty of good wholesome food, a roof over our heads, and good children so I guess the Lord has not been so hard on us
    and we are thankful for all we have.
- speaker: Interviewer
  text: What are your political affiliations and religious beliefs?
- speaker: Respondent
  text: When I first asked Margaret about her political affiliations she did not seem inclined to reply but later she said
    that they were Republicans. However, for all purposes of registration and for anyone's general knowledge they are Democrats
    since they came South. Nevertheless, she thinks that the present administration has done a lot for the poor folks. I believe
    in religion and formerly belonged to the Baptist council but it seems like now that we never have time to go to church.
    I try to teach the children the fundamentals of our religion though, and maybe some day we'll get caught up with everything
    so we can begin going to church again.
- speaker: Interviewer
  text: What are your hopes for your children’s education?
- speaker: Respondent
  text: We are trying our best to have a good home for our children and want them all to have a good education and go to school
    and maybe to college. Jack managed to graduate from high school but I was only able to finish grammar school. My folks
    were ailing and I was badly needed at home to help with the work, but I want my children to have a better chance.
