collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: N's getting the gate. Liquor. I don't know, but it looks as if there's more guys get fired out of the place for drinking
    too much than for any other reason. But they give the damnedest excuses. N. was caught drunk on the route the other day.
    They caught him with a bottle on him.
- speaker: Respondent
  text: I remember a couple months ago when they called him on that -- he'd been reported for drinking while carrying. They
    asked him about it, and while they were about it, they asked him how come he didn't make the schedule too. He said, "How'd
    you deliver on schedule if you had the heart trouble I have. I have to stop every so often and take a stimulant." He even
    went and got a certificate from a doctor.
- speaker: Respondent
  text: 'When we were temps, there was life in this damned old p. o. We weren''t afraid to raise hell and move around and
    talk. And that damned Main was full of so many rumors, so a bunch of us got together and organized a rumor hook squad.
    There were five of us. Whenever we saw any of the guys who always had confidential information on what was going to happen
    -- there''re always scads of people like that -- we''d jump up in the air, we''d leap up and grab a rumor, and then we''d
    pretend to read it: 242 were being appointed next week; 86 were being dropped; the whole list was to be put on in a bunch
    on the 15th; they''d decided to throw the list out; always something.'
- speaker: Respondent
  text: A fellow gets worried about his job and he's like an old woman; about the job he's a hypochondriac.
- speaker: Respondent
  text: In those days after we was done workin' we'd go on a binge. One day there was four or maybe five of us. For some reason
    or other we was talking about suicide. We was talking about suicide and one of the fellows disappears. We was on the bridge
    crossing the river. We didn't hear no splash or nothin', but we didn't notice he wasn't with us till we was nearly across,
    and anyway we didn't think. We all ran back on the bridge and looked over the rail trying to see into the water. We couldn't
    see nothin'. After a while we go to the P. O.; we was gonna report it there. But there's this guy big as life in the swing
    room.
- speaker: Respondent
  text: He'd only stepped behind a pillar when we missed him - he'd stepped behind a pillar to puke.
- speaker: Respondent
  text: 'This is the kind of guy you meet anywhere you go. We get to talkin'' while we''re workin'', and this guy, no matter
    who you''re discussin'', no matter who he is or what he''s done, this guy, he pipes up: "Yeah, he was a homo, too."'
- speaker: Respondent
  text: Sometimes there're cards coming through that're pretty funny. Sometimes you see obscene stuff too, but not very often.
    When we happen not to be workin' so hard, if the mail's light or something, and we see cards like that, we pass 'em around
    and everyone reads 'em. I don't remember any one thing in particular right now -- maybe later. One thing we get a bang
    out of, though, is the names the followers of Father Divine have on their mail. Let's see, there's Solemn and Peaceful,
    Bessie Blessed. Names like that.
- speaker: Respondent
  text: This is the kind of joke we pull on new fellows. There's a sub just come in to the station. He's been workin' a couple
    weeks already and his can's draggin'; he can't make the schedule. You don't have no idea how hard it is workin' the Negro
    district. So we tell him we'll give him a hint. We tell him to leave number 1 open; it's an office building and there's
    a room on the second floor that's always open, the regular carrier always stops there to finish tying the mail he ain't
    had time to tie up in the station. So he leaves some mail to separate in that room and punches out in plenty of time for
    the street. When he gets to this room, he finds it's a policy joint, and he comes back sore as hell.
- speaker: Respondent
  text: 'I was lugging my pack around one day. It was hot as hell and my can was draggin''. If my can''d been made of chalk,
    there''d have been a white line all the way from the station and back again. There''re a couple of little colored kids
    sittin'' on a step, and they''re laughin'' and pointin'' at me. One of ''em says, "Ain''t he lazy?", draggin'' it out
    and laughin'', like hell. I stop and I can''t help laughin'' myself. I say:'
- speaker: Respondent
  text: They almost fall over, laughing at that. One of 'em says, "No, you're just l-a-z-y, that's all, just l-a-z-y." I still
    can't help laughin' at that, every time I think of it.
- speaker: Respondent
  text: There was one tall guy workin' with us when we was tempin'. He was always goin' to lead a delegation to see the postmaster.
    We called him tom Der Hoche. There wasn't nothin' in Tom Der Hoche but talk. But there was some guys who did lead delegations.
    Not from the temps though. From the subs. Those guys had guts, if one looks down on them.
- speaker: Respondent
  text: 'We was all sittin'' in the saloon on the corner, and this drunk comes in and wants to know where B. is. "Where is
    that boy, B.?" he yells, "That boy, B., he''s got my check and he ain''t delivered it yet, and I sure needs it." He kept
    talkin'' like that, shoutin'' all over the place, and one of the colored carriers, L. -- he''s a big husky lad --, he
    says, "B. ain''t around. Anyway, you seem to be doin'' all right for yourself, even without your check." The drunk swings
    around and says:'
- speaker: Respondent
  text: L. stands up. "I did," he says. L. was drinkin' coffee, and he picks up the coffee cup, one of these tall thick mugs.
    L. says, "I did. You gonna make something of it." He's holdin' this coffee cup like he's gonna throw it.
- speaker: Respondent
  text: The drunk makes a move for his pocket and L. steps up close. "Now don't you go for that pocket," he says, "I know
    what you got there; don't you go for that pocket."
- speaker: Respondent
  text: The drunk, he stands there undecided. He's tryin' to make up his mind how far he can go with L. and L. looks tough
    enough so he decides he's got a fight on his hands if he wants it. So he backs away about one step, and you can see him
    tryin' to make up his mind. Then he says,
- speaker: Respondent
  text: '"What you grousin'' ''bout? I been workin'' for the government just as long as you have," and goes out.'
- speaker: Respondent
  text: We all bust out laughin'.
- speaker: Respondent
  text: Some people think because you're a carrier you know where everyone lives, not only in the neighborhood but all over
    the city. And it ain't always some farmer either.
- speaker: Respondent
  text: And some people, especially the old ones, the old maids, like to tell you all their troubles if you give 'em half
    a chance. And you're lucky if you make your schedule, even when the mail's only average, without stoppin' to talk to anyone.
- speaker: Respondent
  text: The Negroes ride the carriers a lot. There's little they're allowed to object to and make themselves heard, when they
    get the chance to beef, they use it; you're always gettin' kickbacks when you're deliverin' in the Negro neighborhood.
    In a way you can't blame them.
- speaker: Respondent
  text: We have a floral fund at the station. Some colored carrier's wife died and we sent her some flowers. The flowers were
    so mangy the fellows got together and sent flowers themselves. We pay ten cents each a month into that fund.
