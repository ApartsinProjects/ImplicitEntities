turns:
- speaker: Respondent
  text: Homer likes Negroes, and Negroes like Homer. Lots of them even have children for him. He is one of those most Americans,
    a genuine Florida cracker. Born on a small farm near Dinsmore, he left school after the fourth grade to help with the
    chores. When he was eighteen his father died; the farm was sold, and he and his mother moved to Jacksonville.
- speaker: Respondent
  text: Since then, for twenty-five years, he has been selling furniture, clothing, and burial insurance to Negroes, often
    for nothing down and about fifty cents per week. His gross competitors, whom he consistently outsells, call him niggerlover.
    Homer relies simply that a dollar is a dollar, regardless of the color of its former owners.
- speaker: Respondent
  text: Some of his attitudes towards Negroes are later representative of the attitudes of Southern white tenant farmers,
    wage workers, unemployed.
- speaker: Respondent
  text: I accompany him as he makes his rounds in the Negro sections. Skillfully he maneuvers his battered automobile through
    the deep sand ruts and the lumps at street crossings.
- speaker: Respondent
  text: The Negro shacks are dilapidated and unpainted; very few have plumbing, but are starred with men and sink on the back
    porch, and an outhouse.
- speaker: Respondent
  text: Homer is almost continuously blowing the horn at his Negro friends. A powerfully-built young man leaps from the path
    of the automobile, frowns at first, then recognizes Homer and grins.
- speaker: Respondent
  text: '"Look out dere Mister Homer," he shouts.'
- speaker: Respondent
  text: As we turn a corner Homer sullenly jams on the brakes. A gray-haired Negro man is leaning on the fence.
- speaker: Respondent
  text: '"Sell tell be hanged," Homer says to him. "I thought you was dead and in hell long ago. And here you is looking younger
    than ever. How many women you keeping now Uncle Henry?"'
- speaker: Respondent
  text: The old Negro laughs. "Mister Homer, you knows ahes too old for dat. How you been keeping yourself? Ah ain't seen
    you since the woods was burned."
- speaker: Respondent
  text: '"Oh I been around," says Homer. "How''s Harry? And all them fine grandchildren—near about grown I guess?"'
- speaker: Respondent
  text: '"Yes, suh, damn grown all right. But times is hard wid dew, like everybody else."'
- speaker: Respondent
  text: '"Now Henry, here''s my card. Better not let me hear of you buying from nobody but me."'
- speaker: Respondent
  text: '"Yes, suh Mister Homer. If''n there''s any money ahead, shall send for you."'
- speaker: Respondent
  text: '"You look out for them women now Henry," warns Homer as we drive away.'
- speaker: Interviewer
  text: I don't see how you remember so many faces.
- speaker: Respondent
  text: '"Remembering niggers'' names and faces and mines and troubles is what keeps me in business."'
- speaker: Respondent
  text: '"You must remember a great deal—they have such large families and so many troubles."'
- speaker: Respondent
  text: '"The two go together," he says, shifting gears to roll through the deep, dry sand. "What beats me is why niggers
    sin a hell of a lot worse than they is. They put up with more than I believe any other race or nearly could stand.'
- speaker: Respondent
  text: The nigger's cursed. The Bible says so. Cursed like the mule—the mule can't reproduce its kind. Course the nigger
    can do that much... it's a good thing, cause it keeps 'em satisfied. But the mule and the nigger ain't got no spirit—they
    was meant to work. Just looking at a nigger you can see he's cursed. He's cursed cause he's black."
- speaker: Interviewer
  text: What about the Chinese? Are they cursed because they're yellow?
- speaker: Respondent
  text: '"Well... no. Nigger is the Chinese''s natural color. But niggers sin like other people. They got no damn brain.'
- speaker: Respondent
  text: Their heads is too thick—you can't hardly kill a nigger by beating him in the head. You ever seen a nigger worry?
    I'll never will. You watch one sit down with his mind all made up to worry about one thing and another, first thing you
    know he'll be fast asleep."
- speaker: Respondent
  text: '"Perhaps that''s a good thing."'
- speaker: Respondent
  text: '"Maybe so. I wish I could do more, elevate and less worrying myself. If it any took so little to wake me handy as
    it does a nigger."'
- speaker: Interviewer
  text: You said Negroes aren't very intelligent. What about all the achievement from educators, doctors, lawyers, writers,
    and other professional men?
- speaker: Respondent
  text: '"Every white man got some sense is got it cause he''s got some white blood in him."'
- speaker: Respondent
  text: '"I read that psychologists have tried to discover if there are any differences in the intelligence of Whites and
    Negroes, and that they haven''t found any that might not be attributable to a difference in culture or background."'
- speaker: Respondent
  text: '"That might be true. All I''m hearing is that there is a problem to know what causes it."'
- speaker: Respondent
  text: He stops in front of a rickety and a abandoned-looking frame house. Scrawled near the low with a piece of chalk I
    see 'TILL 11,7 L 13 43 YEARS OLD.' There are no screens over the windows, and the glass panes are broken.
- speaker: Respondent
  text: Children of all ages are barely visible in the gloomy one-room interior.
- speaker: Interviewer
  text: What are you going to do here?
- speaker: Respondent
  text: '"Try to collect on a oil stove. I call the teacher, she owes for three weeks now. Early when one of my customers
    misses two weeks I ties their tail in a knot. But these teachers don''t get paid regular—half the time they work for nothing.
    I ain''t never aim to sell nothing to no nigger teachers no more."'
- speaker: Respondent
  text: He tries unto the door, and is met by a young woman.
- speaker: Respondent
  text: '"I''m so sorry to have to cut you off again, later Homer," she says, "but I haven''t received my check as yet. This
    makes three months now, and if I wasn''t living with my mother I don''t know what I would do. I walked to the school board
    about it yesterday, and they said they aren''t sure when the check will come. The minute I receive it certainly I''ll
    call you first."'
- speaker: Respondent
  text: '"Oh sister Hamilton," says Homer. "You know I''m being mighty cool to you. It''s mighty hard. An account sitting
    this far in arrears. You got sense enough to know I can''t give you goods away. I''m gonna wait on you a little while
    longer, but I''m leaning on you to hire work for me the next time I come out here."'
- speaker: Respondent
  text: '"I''ll do the very best I can," she promises. "And I certainly appreciate your being so lenient with me."'
- speaker: Respondent
  text: He walks slowly to the car, we drive on our way.
- speaker: Respondent
  text: 'After a few minutes he exclaims: "A nigger''s got no more use with schooling than he is with an airplane! What is
    it? This is one of the things ruining them now. Goes to school a while and start thinking they''re better than white.
    They get so no-count and sorry they sin no good to nobody. All they does is trying to figure out some way to make money
    for themselves.'
- speaker: Respondent
  text: They say the notion they want white-collar jobs.
- speaker: Interviewer
  text: Perhaps Negro schools aren't good enough?
- speaker: Respondent
  text: '"Although the constitution provides for the equal education of the races, this state spends about forty dollars per
    year for the education of every white child, and only about fourteen dollars for every 1,000 Negroes. And practically
    seventy-five percent of the Negro children leave school before completing the fifth grade."'
- speaker: Respondent
  text: '"I don''t tell you about Negro schools I look for, when the state''s spending twelve cents a year on each, there''s
    just twelve cents through slavery."'
- speaker: Interviewer
  text: Do you think it must be more lies to improve the schools, to teach trades and a culture rather than the traditional
    college courses which we rely on?
- speaker: Respondent
  text: '"How you figure? After you train them to be good mechanics and farmers, these boys don''t live long or far. The way
    things are being run, the work being done is use of the machines and farmers them a new job, a cinnamon motor, gasoline
    tractor."'
- speaker: Respondent
  text: As we enter, this place in front of the Lion Star Baptist Church, a group of women are gathered on the square, eating,
    smoking, and talking over a charcoal fire. A man lets out, walks over to a lone box, and beats loudly on the drum.
- speaker: Respondent
  text: '"They mull it and the people, you got to be so hateful winter for."'
- speaker: Respondent
  text: '"Roberta," he says, "I can see that sorry husband of yours is in trouble with a high-test year after year out of
    town."'
- speaker: Respondent
  text: Roberta listens to be in thought. "You be bites for ever."
- speaker: Respondent
  text: '"Prison enough. It''s the long end. You seen no size, no, I don''t know if I don''t, no no-count really let me you
    out for too many."'
- speaker: Respondent
  text: He connects an entire rib and begins to chew on it.
- speaker: Respondent
  text: '"Time for let some rib," he commands Roberta.'
- speaker: Respondent
  text: '"Gotta buy me a new pair of shoes."'
- speaker: Respondent
  text: He tosses her some, tells the person he's going to wire for that to strike him real if he hurries up. The bus comes
    for the church.
- speaker: Respondent
  text: '"Man, you better or bit me: Lew, sin again no good to fool with it."'
- speaker: Respondent
  text: '"Not how some of you a little order."'
- speaker: Respondent
  text: '"I got the blue sale going on every county."'
- speaker: Respondent
  text: '"It ain''t no street stuff—natural hills, men, sense."'
- speaker: Respondent
  text: '"I ain''t going to miss it."'
- speaker: Respondent
  text: '"Now we ain''t buying nothing when we ain''t got money?"'
- speaker: Respondent
  text: '"Few don''t need much. You got to make money anyhow."'
- speaker: Respondent
  text: '"In a spot. Oh, like to know how it''s been."'
- speaker: Respondent
  text: '"No, scarce as hens'' teeth. After a matter of noadlowd2, there''s plenty stuff... I ain''t had no steady work now
    for seven months. Last job I had, I worked for a lady. What had agent, women I mean, I worked full time and she seen well
    see but 30 dollars a week. Poor folk. In the town, house is lack for little or nothing."'
- speaker: Respondent
  text: '"When you are ready to retire, know, Roger."'
- speaker: Respondent
  text: '"Bra 3m3arfoota''s he sells to Roberta as we drive away.'
- speaker: Respondent
  text: '"Also, man a measure for a beer," Homer suggests. "Day blames some nicks after a beer or two over Nora to the Red
    Rooster."'
- speaker: Respondent
  text: We enter the Red Rooster, it is a typical juke joint. There are the requisite nickelodeon, booths, and small dance
    floor. A lector over the bar reels.
- speaker: Respondent
  text: Several young Negroes are seated at the bar talking. Boisterous may to the moon.
- speaker: Respondent
  text: The nickelodeon breaks into a full-voiced roar, playing a record that is currently popular.
- speaker: Respondent
  text: '"Hot nuts! Hot nuts! I got the hottest nuts in town! Anybody here gonna buy my nuts? Hot nuts for sale..."'
- speaker: Respondent
  text: The salutes at the bar are threatening and jitterbugging.
- speaker: Respondent
  text: A good man at my side. "Leave Homer, they's probably shoal."
- speaker: Respondent
  text: Though the times are bitter when we were at, in the old days.
- speaker: Respondent
  text: '"Now, some of them worth the pewter and lead to take the blow to his head."'
- speaker: Respondent
  text: '"That''s referred to as from the worst."'
- speaker: Respondent
  text: '"Those better information they have. Ain''t most of them smart slicks?"'
- speaker: Respondent
  text: Don't tire so that. For a while there is much choice between rooming, unemployment or relief in a city, and sharecropping,
    smoking, with turpentine, either charcoal, citrus or beans in the country.
- speaker: Respondent
  text: Of course, Negroes in properly rove healthy, unformed, in the trials of families and turbulent as a small novel. In
    Southern cities, it's significant.
- speaker: Respondent
  text: '"I don''t know nothing but no intelligence, but to know for a fact, I got nine out of ten more hoes or gonorrhea
    at one time or another during their lifetime in the houses I go to.'
- speaker: Respondent
  text: I can always you somebody broke out with floras. They don't want no sort of it unless they got it."
- speaker: Respondent
  text: '"If you know that thing is one of the sly counties, a lot of the city, even in the state, get free treatment to Negroes
    with syphilis."'
- speaker: Respondent
  text: '"The true niggers here in lucky, but the wily syphilis niggers is slow, they do no trade. A nigger will wait till
    he sits it rolled over there, run over to the hospital and smoke.'
- speaker: Respondent
  text: Shots some have real sore. He sees doctors he's owed it and ain't need no sore treatment.
- speaker: Respondent
  text: After a few years when it comes better on him it's too strong to cure so you burn us hate toes and noses, living then
    shots.
- speaker: Respondent
  text: Like mouth grew on mouth wounds, almost off a walk on top of the mile.
- speaker: Respondent
  text: Ammo smokes are pretty lame failure to earn a living.
- speaker: Respondent
  text: According to the last census, nearly half of the half million Negroes in this state are normally unemployed.
- speaker: Respondent
  text: And half of two-thirds of the people jobs is women. There's another thing ruining the men in the cities... they come
    to lie down for 1,000 laymen 00.11,10rt 0-4 The nigger on farms is in seven more flu I went to nine cities really not
    long ago, and beans, some fool politician even say that the reason because is rotting in the ground is owes the government
    meddling in agriculture.
- speaker: Respondent
  text: A man libel even saying that they ought to be lynched. The only man near here is a minister.
- speaker: Respondent
  text: Sitting one month a month for cotton instead of three cents.
- speaker: Respondent
  text: Like they see is a mouse the so miseducation or out.
- speaker: Respondent
  text: '"Politicians is ruining this country. The only free they ever were is during enslavement, and after that they elected
    steals all the money they can while my rest up for the next enslavement.'
- speaker: Respondent
  text: Roosevelt tried his best to help the poor man, but the white and crooked notification returns last about with it all.
- speaker: Respondent
  text: If it hadn't been for him, them men would steal ice coming to a long store neighbor.
- speaker: Respondent
  text: Let me tell you something a gaggle of a sign.
- speaker: Respondent
  text: Wages are lagging. The labor unions better get rid of their crooked leaders and make peace, steal out while Roosevelt
    is still in the White House—otherwise there ain't no telling what this outfit will be running this country near.
- speaker: Interviewer
  text: Why aren't the Negroes joining unions?
- speaker: Respondent
  text: '"They''ll join, but I don''t see much about it in the moors. More right recently there aren''t no Negro unions in
    the South to a rank of; there was men skilled with unions, but there after not no low directly connected with local white
    unions. Now industrial unions is really coming.'
- speaker: Respondent
  text: Men with teams, seamen, lorry, or even citrus workers, and filch like.
- speaker: Respondent
  text: You notice the loners tried to get about that citrus strike—said these niggers striking against load. Sometimes low
    maybe those niggers are militant, maybe they are never meant to be too serious. But I am many a man sake to be brought
    over there.
- speaker: Respondent
  text: The white man and nigger been so busy thin over little be what I don't even see, far from starving, that they haven't
    been able to see they ought to get together so they could demand higher wages. I reckon when that does happen the niggers
    will have a lot more writing to do to quit America.
- speaker: Respondent
  text: The whole thing is a big mess.
- speaker: Respondent
  text: More unions or lanterns what leaves down here from the North don't know how to be elsewhere, and less how to ban right
    stores. The old senators itself to act like they too much sense they thought they knew everything. All know is, I ain't
    when they objected. Rate is all mess.
- speaker: Respondent
  text: '"I say not much about white or organizing a bit.'
- speaker: Respondent
  text: If I were to organize niggers I'd have fifty percent of them in this county after all in three months.
- speaker: Respondent
  text: When you go out it right with a little time sing mines you can sell over anything. You ain't hardly tell a nigger
    a thing is so cool he won't believe you. All my life I been stuttered couldn't earn a tenth what they sold for. I've sold
