collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Well, there's nothing to fighting. Just come out fast from your corner, hit the other fellow as hard as you can and
    hit him first. That's all there is to fighting.
- speaker: Respondent
  text: What I should like to talk about is something else. Whiskey! There's the only fighter that ever really licked old
    John L. Jim Corbett, according to the record, knocked me out in New Orleans in 1892 but he only gave the finishing touches
    to what whiskey had already done to me. If I had met Jim Corbett before whiskey got me I'd have killed him. I stopped
    drinking long ago, but of course, too late. Too late for old John L., but not too late for millions of boys who are starting
    out to follow the same road. I desire to use the years of life which remain to me to warn these boys, to turn them back.
    John L. Sullivan, champion of the world, could not lick whiskey. What gives any one of them the notion that he can?
- speaker: Interviewer
  text: Who gave you the toughest fight of your career?
- speaker: Respondent
  text: Well, that's a question! Most of them were plenty tough. Jake Kilrain was one of the hardest to lick. Charley Mitchell,
    the Englishman, gave me a lot of trouble, too, but in a different way. By talking to me all the time in the ring, from
    the first bell, he got my goat. He threw more insults in my direction than blows. When I took out after him, he ran. He
    did not dare to stand up and slug with me and that is why I had trouble in licking him.
- speaker: Interviewer
  text: Yes, Charley Mitchell had the reputation of being a bad setter, all right, but should we expect too much of Englishmen?
- speaker: Respondent
  text: Well, no, not as a rule. I've known a few who were strictly on the up and up. None, particular.
- speaker: Interviewer
  text: Who was the king you mentioned?
- speaker: Respondent
  text: Why, King Edward VII. He was a real fellow. Common as an old shoe. We got well acquainted when I was across the pond.
- speaker: Interviewer
  text: That must have been the case.
- speaker: Respondent
  text: Oh, none of that stuff is true. I always remembered that I was an American, and never slobbered in the dirt to him
    or any other king. On the other hand, I treated King Edward with the full respect due his station at all times. This seemed
    to get on his nerves a little, because he told me, in exactly these words, to forget that he was royalty and to treat
    him just like he was one of the boys. After that, I did as he asked. I suppose all those newspaper yarns which try to
    make a chump out of me started on that account.
- speaker: Interviewer
  text: How about that story which tells about you killing a horse with one blow of your fist?
- speaker: Respondent
  text: That's another one. That never did happen. I always liked horses and I swear on the cross that I never killed one,
    with my fist or any other way.
- speaker: Respondent
  text: In fact, most of the real harm I ever did in this world was done to just one man, yours truly, John L. Sullivan. I
    make no secret of this. Given the fellas I pounded in the ring, they're all right again after a few days, always vowing
    fresh challenges at me if nothing had ever happened to them. Today many fighters make more money than I made when I was
    champion of the world.
- speaker: Respondent
  text: Fighters now seem to think of nothing but money. I thought first of the fact that I was champion of the world and
    I was always ready to prove that I was, anytime, anyplace against any intelligent fighter. I fought in barns, on barges
    with bare feet, and the gate was a secondary consideration. I would bet heavily on myself and, of course, always won until
    Jim Corbett beat me for the championship. That time I lost my shirt. Thousands of my friends all over the country, who
    thought I was unbeatable, I guess, lost their shirts, too. That is the thing which made me so sore about this fight.
- speaker: Interviewer
  text: Yes, the old-timers cannot understand, even today, how you came to lose. But I have never heard any man question your
    honesty.
- speaker: Respondent
  text: Well, I have traveled a hard road, but I have been honest all the way. I toured this country from one end to the other,
    offering $50 to any man who could stay on his feet for three rounds in the ring with me. Nobody ever collected, but don't
    think they didn't try! Can you imagine the champion of the world doing that today?
- speaker: Interviewer
  text: I couldn't and said so frankly. Then, judging the interview to be at an end, I started to leave.
- speaker: Respondent
  text: I realize that it is hard for me to say anything new about fighting. I never had a great deal to say, even when I
    was champion of the world, because, as you have said, I was a fighting champion, not a talking champion. I give you permission
    to write anything about me you please, within reasonable limits. My fighting days are all over and what's printed now
    makes little difference to me. If you can get some of the things I have said about whiskey past that city editor of yours,
    so much the better. If he wants a story about fighting he'll have to pay some attention to whiskey, because I say to you
    again, that in spite of the record, whiskey is the only fighter who ever naked John L. Sullivan, champion of the world!
