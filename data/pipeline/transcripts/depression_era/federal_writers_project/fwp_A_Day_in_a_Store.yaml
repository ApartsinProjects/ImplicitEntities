collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: It was in a cold drizzling rain that I made my visit to a very popular department store. It was such a disagreeable
    day, that few people would get out unless it was necessary for work or business, and thinking this would be a good day
    to get a story, I went early. As I opened the door, I was hailed by them all, wanting to know how I ever got out of a
    nice warm office to come down there on such a day. I told them, the same thing that brought them out was the cause of
    my getting out also. They were ordering coca colas and I was invited to join them. As we were finishing our drinks, Mr.
    Goldberg came in and wanted to know why we picked such a cold day for cold drinks. The store is heated by a large circulating
    heater in the center of the first floor. They were all around the heater waiting for the store to get warmer before they
    started their work of dusting counters and straightening stock. They were all talking about their different work. One
    clerk has the dry goods department which is on the first floor; a man is the one that has charge of the shoes and men's
    clothing which is also on the first floor; another clerk is saleslady in the ladies ready to wear and millinery department.
    This is located in a balcony that covers half of the first floor.
- speaker: Respondent
  text: 'As they went about their work, Mr. Goldberg said, "You know that this building is one of the oldest brick buildings
    in Athens, and was built when Broad St. was the main street in town. It is three stories: our department store has the
    first floor, the Joel Brothers, Jake a lawyer and Charles, have their offices on the second floor. On the third floor
    is an overall and work shirt plant. This plant was owned by the Joel brothers, but they have sold it to another company.
    It was in this building that Michael Brothers first started in business, and I think their home at that time was down
    on Oconee St; next Louis Morris had a dry goods store here for some years, and then it was bought by old man Abe Joel;
    he is dead now but the building is still owned by his sons. Joels were in business here for years, until the old man''s
    health got bad and he sold out his store to my father-in-law. He has also passed away. The Joel boys then opened up the
    overall plant on the third floor, and run it up until last year when they sold out to another company. We moved to Athens
    when I was about nine and I have been here since that time. I went to school here, graduated from the University of Georgia.
    I worked in my daddy''s store, here on Broad St. also while I was going to school. Those were great days, the boys don''t
    hit it as hard now as we did then.'
- speaker: Respondent
  text: I remember one night when the freshmen were having a banquet, the sophomores were trying to prevent the freshmen from
    attending. I was carried out below Princeton and tied out on the river bank to a tree. They told me that they would come
    back for me after the banquet was over, but if I should by any means be able to get away from the tree, I would be allowed
    to attend without any more trouble from then, and they left me there. It was getting night and I couldn't work those ropes
    loose. Finally I heard an old man over on the hill. He had been ploughing and was hollering at his mules, and that old
    gee-haw whoa mule, gee-haw sure sounded good to me and thinking he would help me I started yelling as loud as I could,
    he heard me and came to see what was the trouble. I begged him to untie me. He wanted to know what I would give him. I
    promised him a new pair of shoes if he would come to dad's store the next day. He cut the rope and I let out for home.
- speaker: Respondent
  text: Yes, I had to walk, but who minded that if we could outdo the sophomores. And I just knew I could get in now and they
    would not bother me any more that night. I went home battered and dressed in my tuxedo, even had the high top silk hat.
    I was feeling great, but it didn't last. I went strutting along head high in the air. As I reached the old Imperial Hotel,
    where the banquet was being held, the sophomores were all lined up. As they saw me, they wanted to know how in the hell
    I got away. I pulled off the high top hat and made a most polite bow to them. But, oh, boy, I paid for that. For in spite
    of that, gentlemen's agreement that when a freshman managed to work out of any place they put him he was free to go where
    he wanted to. They threw rotten eggs all over clothes and especially my nice high top hat. I was ruined. They wouldn't
    let me inside with all those rotten eggs on me. I finally managed by the help of one of my friends to get out of my clothes
    and he got up a couple of aprons and tied around me. That is how I attended the banquet, but yet some of them were worse
    off than I was.
- speaker: Respondent
  text: At this time an old negro woman came in wanting to see the manager. He asked her what he could do for her. She said,
    now just look here at this pair of shoes, they done busted plum out and I just got 'em Saturday night. Looking over the
    pair of felt house slippers, he said, "Aunty didn't you get them a little too small?" The answer came right back, "I didn't
    get 'em at all my gal done bought 'em for me." Mr. Goldberg laughed and told the shoe salesman to give her a new pair
    of house shoes. The old aunty thanked him and said, "I done told 'em that you would make 'em good." Two Negro men came
    in wanting to see some overall jumpers. The clerk called them to the back of the store where the overalls were and they
    first wanted to see some that had lining in them. But after they had looked at every one of them, they wanted to see some
    of them that weren't lined at all. They were shown these and told the prices of both. After examining both kinds for some
    time they decided the sizes weren't right and they would look around so somewhere else.
- speaker: Respondent
  text: As they departed, the clerk said, "That is what clerks get all through the day. Why sometimes I meet them at the door
    and ask if I can help them and they will walk all over the store and out again, without even answering me at all. Then
    sometimes they will walk around and then finally ask if we have a restroom. We have all kinds of experiences in our work,
    but we also have some very nice customers, and most of them are nice and it is a pleasure to wait on them." A lady came
    in looking for a handbag to match a suit. The clerk helped make the selection, also showing gloves to match the bag. The
    customer thanked her, as she paid for them, saying you have been so nice to take up so much time with me.
- speaker: Respondent
  text: After selling a man some children's socks, a lady, a child's sweater and cloth to another customer, she came back
    to answer the telephone. It was someone that wanted some of them to go out on the street to see if they couldn't find
    a dray, and be sure and get one that had a good horse and wagon. I asked if they had many calls like that and she said,
    "Why all the time. When it is not bad weather there are usually drays and trucks both around on Jackson St. and some people
    think we have time to hunt up a dray anytime they want one." A small well dressed man came in the store and asked for
    Mr. Goldberg, who introduced himself as Mr. Jacobson. He said he was from Florida and on his way to Hot Springs at his
    doctor's suggestion, and needed some help to get there. Mr. Goldberg asked him how long he had been sick. He said, "for
    some time. I am not accustomed to asking for help, but I spent everything I had trying to get well. I have always donated
    highly to our society for the help of Jews, and it is embarrassing now to have to ask for help myself. But I just can't
    stay here in this weather for it will put me right back in bed." Mr.
- speaker: Respondent
  text: Goldberg asked if he had been to the president of their society here. He said yes and that he gave him a place to
    stay the night before, but that was all he could do for him. He then called Mrs. Jake Joel, the president of the sisterhood.
    She refused to do anything at all for him. He asked her if he should get sick here, who should he refer to her or the
    Rabbi. He thanked her very politely, placed the telephone back on the desk and said, "I have never had anyone to talk
    to me that way before. They said that if I should get sick to call on the city that they were supposed to take care of
    folks like me. Well, when I had plenty of money I had plenty of friends." Asking who the rabbi was and where he lived
    he went out.
- speaker: Respondent
  text: A salesman came in to see the manager, said he had his new samples of ladies underwear and a lovely line of ladies
    blouses both wash and silk, sport and for dress wear in all the new shades that went with the new spring suits. Mr. Goldberg
    asked the clerks if there was anything in this line that they needed. But they said that they had already placed their
    orders. He wanted to know why he was never able to land an order from them. They said well, you are always too late. He
    said business wasn't as good with him this trip, and that he didn't think anyone made any money last year, and were lucky
    to break even. Mr. Goldberg told him that the fall of the year was when he did his best business for his largest buyers
    were farmers, but that it was very disappointing last fall. The farmers had short crops did not make anything, depended
    too much on their cotton and lost on that. And when the farmers fail I lose also as they do not have the money to spend.
- speaker: Respondent
  text: Two colored men came in wanted to see some men's underwear. The clerk asked if he wanted the union suits, hesitating,
    one of them said, "Yes sir, date it." They were shown a heavy weight which was too heavy, the light weight was too light
    "for work." Nothing was just right and they left to look around and if us don't find them then us'll sure be back. A girl
    came in and asked to see an umbrella. Mr. Goldberg waited on her as the others were busy. She asked for an oil skin, but
    when he showed those she wanted a cellophane one. After looking at these, also the cloth one she finally decided on the
    oil skin. Then she wanted to know if he had any rubber overshoes. He got out the old time overshoes and she said could
    she try them on over her wet oxfords, or if she would have to take her shoes off. He told her that he could not fit them
    on her feet for then they wouldn't fit the shoes. After working to get them on over the wet shoes, she said she would
    take the umbrella and come back later for the overshoes, and be sure and put them aside for her. As she went out, he told
    the clerk that if she came back to give her the 4 for she would never get the size 8 on her feet. And laughed this off.
    She also wanted to know if she just wore the overshoes without the shoes would they look any smaller.
- speaker: Respondent
  text: Two Negro girls came in the door. They were met by the clerk. She asked if she could help them. They just walked by
    her, went up to the ready to wear department. The clerk up there met them at the top of the steps with the same polite
    offer to help them. They walked by her looked at hats, pulled out dress racks, looked at them, then walked out of the
    store without speaking at all. The clerk downstairs finished waiting on some more customers, and said it was time for
    her to go to lunch. As she started out the door, she was met by the husband of one of her old customers. His wife wanted
    some cloth matched and no one could do it but her so she came back and waited on him and then she went on for lunch.
- speaker: Respondent
  text: I went up to the ready to wear department. Two Negro women were looking at a child's wash dress. One said it would
    take one size, but the other insisted on a smaller size. Finally after they bought the dress, then wanted to see the hats.
    The clerk was very considerate and showed the new hats which had just come and explained the different styles and colors,
    one of them picked up a small roll brim hat and said, "Ain't this pretty, I sure does like it, and I sure am coming back
    and it this very hat." The clerk asked if they wouldn't like to see some of the new spring dresses and especially the
    new suits. One of the women opened up a box she had and showed a new suit that she had just bought for 16.95 and wanted
    to know if their suits were as nice as the one she had just bought. Assuring the woman that she had suits just that nice,
    the other then said she was coming back to this store for her suit. As they went out, the clerk said it is all in a day's
    work.
- speaker: Respondent
  text: My motto is to do unto others as I would like to have them do for me, and I don't try to sell anyone else something
    that I would not want myself. I try to treat everyone fair in every way, and I do appreciate my customers, and I have
    built up a good business with them. Most of them are nice and considerate, of course we have some that are trying. But
    I can wait on them for hours and know that they are not going to buy. Only the other day, I sold a woman a coat. It was
    a hard sale, as she did not know just what she wanted, but after I had put it in the box and handed it to her, she said
    just reckon as how I won't take it. It took another good hour to sell her the coat all over again. And then I had another
    customer that I showed everything in this department and everything I showed her she said has got one just like it, and
    very often these young, flappers come in and try on dresses and hats just to have a place to smoke and rest, but they
    are usually very nice. One day a lady came and wanted to see my very latest dresses. After trying them all on and examining
    them to see how they were made she said I thank you very much. I am a dress maker and I just wanted to see how the new
    styles looked. It will give me new ideas in my work.
- speaker: Respondent
  text: Some people think clerks have an easy job, but they don't realize that we have to keep this stock in place and that
    it has to be brushed and dusted every day, and it takes hours to get it fixed back after a busy day. Then every season
    things have to be packed away to make room for the new things and I wonder every year as I pack and put away things if
    I will be here next year to unpack them. I have worked on this same block for 27 years. I asked her to tell me about it.
    She laughed and said, "Well, I will tell you what I can. I was young when I went to work right in this same store for
    Mr. Abe Joel. I had never worked before and I was started in at five dollars a week, but that was big money to me. I worked
    two weeks, then I was called to the office. I just knew I had done something wrong and my knees were shaking so I could
    hardly talk. But when I got there, they told me that I had tried hard to learn, and they were satisfied with my work,
    and they were raising my salary to ten dollars a week. Work is hard, but business was good then and didn't have so much
    competition. Farmers would come in to buy and they bought for the whole family and the bills amounted to something. We
    always got a bonus check at Christmas for Mr. Joel and...
