collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: We stopped and let them get in the back seat, although we told them that we could not go very far. I turned around
    and looked at the people for a minute, and they both said, almost together, 'Why I remember you and I am sure you ought
    to know us.' And then I did remember them, because I had given them a lift once before on another highway.
- speaker: Respondent
  text: Well, we have been in a few ups and downs since we saw you last. We went to Atlanta with money and we were lucky.
    We both got work and saved up everything we could, so we took all the money from the bank and landed in Taft.
- speaker: Respondent
  text: We had to have something to do so we kept a hotel. We enjoyed that so much because we could be together all the time.
    We made plenty and had the hotel furnished real nice. We've taken in lots of people that we didn't want, and we have taken
    care of a lot of men and women that we didn't think were married. But when they came and registered as man and wife, what
    else could we say if they were quiet and not noisy too? We just had to call the law and have them put out. But we were
    after the money, and we tried to not know anything unless we just had to.
- speaker: Respondent
  text: One of the biggest troubles we had was when a girl came running up the stairs and said to save her and her husband
    a room, that they would be back after the picture show closed. She was bareheaded and had on just a little silk print
    dress.
- speaker: Respondent
  text: We asked her where her husband was and did she have any baggage to bring up? She said, 'He is downstairs talking to
    a man and won't bring up any baggage tonight.' I said, 'All right then.' Of course, we rented several other rooms in the
    meantime and played several games of Chinese checkers. Around eleven-thirty o'clock they came in. I showed them to their
    rooms and gave them a pitcher of cold water.
- speaker: Respondent
  text: After everything got quiet, someone knocked on my door. It was two or three of my regular roomers and some man that
    was kind of settled wanted to know 'what kind of a place he had gotten in.' 'I guess we had dropped off to sleep,' I said.
    'Or?' 'Well, just listen,' they said. 'We don't know which room, but that woman is screaming her head off. I think the
    man is killing her, and if you don't do anything about it, we are.' So I asked them to go back to their rooms and I would
    see what I could do. They did so.
- speaker: Respondent
  text: So I went to the couple's room and knocked. I found the bed completely torn up. I mean the cover all over the floor,
    pillow cases torn up, and the girl lying on the floor. I looked around, and a pint bottle of whiskey and an empty ginger
    ale bottle was on the table. I said, 'What does this mean? I want this place put in order and for you two drunks to be
    quiet or get out. You are disturbing roomers.'
- speaker: Respondent
  text: I asked the girl if she was hurt. She said, 'No, we were just playing.' But I know that wasn't so. She was afraid
    to say anything also. I didn't hear anything else out of them though and they left early the next morning. They were just
    pitching a party.
- speaker: Respondent
  text: I have often had people to beat me out of room rent. Some have gotten by with it, too, but not many. One good looking
    young man left owing me seventeen dollars. I told him I would hold his baggage until he paid me and that I have had so
    much of it to do that I would hold them just to a certain time. Well, when that time was up he didn't come, so I sold
    his things. Some have left and didn't have anything to leave for security and some have left things that no use would
    have.
- speaker: Respondent
  text: I had a little low girl and her husband staying a while. I never could find out what kind of work he was doing, but
    the bill got around thirty dollars. I told them one day that I would have to have some money before the bill got too high.
    Well, that night they got the porter to go outside the window three stories below. They took six knots and made strings
    strong enough to hold their baggage and dropped it below to the porter. They had plenty of it, too. I heard a noise.
- speaker: Respondent
  text: Of course, it didn't sound like any ordinary noise, and I went down and caught them right in the act. I got so mad
    and made that porter carry every piece of it back and I fired him. The couple left, and I don't know what became of them.
- speaker: Respondent
  text: He quiet, Mr. Bryant, and let me talk a while. So she started, 'This was one time I was sure scared. One night a couple
    came in and asked if I had a porter to bring up their bags. I said 'Yes.' He came up with two of the heaviest suitcases
    I ever saw. My, that boy just could not get up with them. He tipped the boy, and he asked the man if he wanted those other
    bags brought in. He said no, that there wasn't anything in them, that they were just some he had bought. I had to give
    them one of my best rooms and I had some expensive spreads, pillow slips, blankets, and four new towels.
- speaker: Respondent
  text: The next morning they checked out. The porter said, 'Miss, those bags aren't near so heavy this morning as they were
    last night, but they are heavy enough.' Well, just was with me again. This time it just happened that the maid was ready
    to go in this room when they checked out. She came running to me saying, 'Lawdy, Miss, them folks done put six half-gallons
    of water in that closet and done took all the bed linen, towels, blankets, even took the scarfs off the tables and just
    everything.' Of course, the porter was putting the last bag in the car. I, Bryant, ran out and jumped on the running board
    just as the men was driving off, but Mr. Bryant came up the street they went. He finally told him to turn around and put
    those bags back where he got them or go to jail.
- speaker: Respondent
  text: Well, I was scared to death. I just knew Mr. Bryant would kill the man or get killed, but he didn't. He brought them
    back and the porter came upstairs. All the time he had their clothes locked in the car in the other bags and the fruit
    jars with water in the bottles he brought up.
- speaker: Respondent
  text: Oh, so many things happened while we were there. A hotel is interesting work. It is never the same. Something different
    is always happening.
- speaker: Respondent
  text: Mr. Bryant's mother died in Alabama, so we had to go. And we decided to not come back to New York. We packed two things
    we could in our car and left for Alabama. After all we could do for Mr. Bryant and everything was settled, we were restless
    again so we packed and started back to New York. Mr. Bryant was offered a job as mechanic in a mill.
- speaker: Respondent
  text: Everything was fine until it seemed that our car had never run any better. Just before we got to Atlanta the car caught
    on fire and burned up everything we had. When we left Alabama we took all the money we had and put it in the car door,
    thinking that if anything happened that the money would be safe. Mr. Bryant had just a little change in his pocket. All
    we saved was the clothes on our backs.
- speaker: Respondent
  text: We had to hitch-bike then. It was not long till a man came along and carried us to Ile, Georgia. We asked everybody
    we saw for some work because we didn't want to be beggars. That man had heard about our bad luck and so he carried us
    to Mr. Wilson.
- speaker: Respondent
  text: He gave us a job picking cotton. We were so glad to get anything, but my feet were so sore I just had to rest a day
    or two, but they got better. We picked cotton and made enough to pay our board and to get bus fare to Augusta. According
    to Mr. Bryant, he got a job polishing shoes a week in a store. We bought some clothes and shoes and some traveling bags
    and went to Virginia, where we both got jobs. I worked in the same store with Mr. Bryant. We made good, too. We got a
    nice place to live, a blanket and good furniture. It was pretty a living room suite as anybody wants, a maple and walnut
    bedroom suite, a two-hundred dollar radio, a general electric refrigerator, and a beautiful dinette suite.
- speaker: Respondent
  text: Well, we have gotten business off our feet as 40 or 50 people would say, but we got tired at Virginia and it looked
    like we would never have any one but me and Jake here. We never did have any children and I got no lung gas for one, too.
- speaker: Respondent
  text: So we packed up again and went back to Medium County. We have a small cabin to live in and a slow car to drive. And
    I suppose you are anxious to know what we are doing out here hitchhiking again. Well, I just wanted to get the thrill
    of it once more. But I think we are through with hitchhiking now, sons, I ain't 04.
- speaker: Respondent
  text: If I guess was mad Mr. Bryant ain't with us, so I think we will be happy now just as we are.
- speaker: Respondent
  text: I wish that I had done how with us, oh well, if we had not had to turn around and come back home.
