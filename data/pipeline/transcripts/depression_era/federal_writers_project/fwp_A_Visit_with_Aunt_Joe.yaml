source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I don't know if I will be able to tell you anything that will be of any interest or not, for I was born and raised
    in the country. My mother and father were living between here and Barnett Shoals and about two miles from Whitehall. When
    I was still very small, my daddy moved to Whitehall, but it was called Georgia Factory then, and about the first thing
    that I can remember that would be important is when Sherman came through Georgia.
- speaker: Respondent
  text: We were living at Georgia Factory then, and it was not like it is now. Every house and lot was fenced off to itself.
    The Whites had their home there also at that time. All the men that were not too old to go was in the war, except the
    Whites, they were at home. Everyone was scared when they heard the Yankees were coming, and people buried everything they
    could.
- speaker: Respondent
  text: The Yankees came through Franklin and Hart County, just tore up everything as they came through, took all the stock,
    cows, horses, mules and killed the hogs in the pens, and carried them along for the Yankee soldiers to eat, went through
    houses also, took anything they wanted especially everything they had to eat, and what they didn't want, they tore it
    up so badly that the people could not use it any more.
- speaker: Respondent
  text: My grandfather lived on Mr. Mauldin's place near Lavonia, Ga. and the Yankees came by their place. Mr. Mauldin got
    all his provisions and other things buried before they got there. He took up the floor of his kitchen and buried his things
    there. But my grandfather was not so lucky, as they caught him while he was trying to hide his provisions. Them Yankees
    took every bite they had to eat. Grandmother got down on her knees, prayed and begged them to leave her just enough of
    syrup and bread for her children's breakfast, but they wouldn't do even that, just poured the syrup out on the ground,
    and left them without anything to eat.
- speaker: Respondent
  text: At that time Augusta was the nearest place that you could buy anything, and it was a five day's trip from Grandfather's
    to Augusta in a wagon, and that was the only way people traveled then. One of my aunts had raised a little heifer, and
    she cried and begged them not to take her calf, but to leave her just that one thing, but it was carried off with the
    rest of the stock. They also killed their hogs and carried them off. After the Yankees left, Mr. Mauldin came down to
    Grandfather's, and told him that he would let him have enough to eat to last him until he could get to Augusta and buy
    something to eat.
- speaker: Respondent
  text: When they got near Georgia Factory, the people were so scared they didn't know what to do, for there was no one there
    except women and children, and they were working in the mill to make a living for the men were fighting. All of the Whites
    left and came to Athens to hide, except old man White's oldest son, Jim, he stayed hid out down on the river in an old
    hollow tree, with some blankets to sleep on. There was just one old man, Mr. Connelly, who was so old that he couldn't
    hardly get about left to look out for all the women and children. I was just about four years old at that time and I guess
    I was scared so bad, is why I remembered so well.
- speaker: Respondent
  text: We children climbed up on the gate post to watch as the long line of Yankees could be seen coming down the long hill.
    They said there were four hundred Yankees in that company. They were searching the houses as they came to them, said they
    were hunting for all the men, and that they were going to kill all the rich folks. They just went through everything in
    the houses. Then they went to the mill, said they were going to burn it up. The women got down on their knees and begged
    them not to burn up the mill, for that was the only way they had to make a living for their children.
- speaker: Respondent
  text: At first the soldiers would not listen to the women. Then they went into the mill, got all the cloth and thread, even
    tore the cloth off of the looms. Then they divided it among the women, and told them that they would kill them if they
    gave any of it back to the Whites. I guess you know that Whites run the mill at that time. Next, they went to the company
    store. Of course, it was locked up. They just busted out the doors and windows, went in, and brought out everything that
    was in it, piled it all up in front of the store. They then called all of the men on the place, divided all the stuff
    up among them, made them hold out their aprons and poured syrup in them. One woman asked them to let her get a pan to
    put the syrup in, but they told her to take it that way or not at all.
- speaker: Respondent
  text: They stayed around there for several days, hunting for the Whites, and the old man Connelly was slipping something
    to eat to Jim White in the old hollow tree when he could. When they left, people did not see anything of them for about
    a week, and everyone just knew they were gone. Jim White came up to the Connelly's one day to get him something to eat,
    and just as soon as he got in the house, someone run to the door and said, the Yankees are coming.
- speaker: Respondent
  text: Mr. White was scared so bad, he didn't know what to do, because he knew they would kill him if they found him. Mrs.
    Connelly had more mind about her than anyone else for she pulled the covers off the bed, and made him get between the
    feather bed and mattress. The Yankees were searching the houses again and when some of them got to her house, she was
    very busy making the bed. They asked her if any of the Whites were hid around there anywhere, and being a very truthful
    woman, she would not tell a story about it, but she didn't say there was either. She just told them that they could search
    the place and see if they could find anything.
- speaker: Respondent
  text: She told them to look upstairs, and in the kitchen, talking all the time to keep them from looking at the bed, finally
    tucking the cover around tight, she carried them out to search the smokehouse. After she got them out of the house, Mr.
    Connelly raised one corner of the cover a little so that Mr. White would not smother. But them Yankees stayed around there
    so long that he was almost dead. They just tore up the White home, even took the girls dresses out and gave them to the
    mill women, but after they left that time, they never came back any more.
- speaker: Respondent
  text: Times were sure different in them days from what they are today. Why, I never got to go to school much, as the only
    time we went to school was when all the work in the field was done, and then we would have to walk two or three miles.
    And had to stay all day then. I remember one time when I was seven, we had a celebration at the Old Standing Methodist
    Church. They used it for a school during the week, and church on Sunday. But this was a school celebration, people call
    them entertainments now.
- speaker: Respondent
  text: 'The children all had to recite. They were marched inside the church. The people were all on the outside under the
    trees where seats or benches had been fixed for them to sit on. The children would come out one at a time to say their
    piece. When it came time for me to go out I was just scared so bad, that I was shaking all over, and it wasn''t much that
    I had to say, let me see, I believe I can even say that now. The name of it was ''I am five years old Today'' and went
    like this: ''One I was a very little child And months have passed since then I am bigger and have taller grown I am five
    years old today. At first I could not talk or walk But now I can talk and walk about Can eat, run and play all day long
    For I am five years old today.'
- speaker: Respondent
  text: Not much to get scared about was it, but I sure had stage fright then, only we didn't know what that was, and because
    I said I was five I was mad years old, everyone thought I was five instead of seven. But them school celebrations were
    big days, everybody went, because they didn't have many places to go then. They would always have dinner on the ground,
    and you know right there in that old church was the first preaching I ever remember hearing. The old Preacher, Ellison
    Stone, was the preacher, but I still think they were good old days.
- speaker: Respondent
  text: I went to school at the paper mill and then at Princeton also. It was there at Princeton that we hated to go so bad,
    for we had a man teacher, Mr. Marion Dunaway and he was the meanest man I ever saw, none of the children liked him. He
    didn't have but one arm, but he sure would whip the little children. The big boys that he was afraid of, he would make
    them stand in front of the classes, on one foot. The spring where we got water was a pretty good distance from the school,
    or rather church, for he taught school in the church. And he would not let us get a drink of water, even at dinner time,
    we were not allowed to leave the school grounds unless we lived near enough to go home for dinner.
- speaker: Respondent
  text: One day it rained awful hard, and there were mud holes out in the yard, and we took our tin cups and drank water out
    of those mud holes. I told my father about that, and he was so mad, he bought a bucket and dipper for me to carry to school,
    and said Mr. Dunaway had better let us have water to drink. The next morning I carried the bucket and dipper to school
    with me. He wanted to know what I brought that thing to school for, I told him what my father said, and he sent one of
    the older boys to the spring for a bucket of water and we did not have any more trouble about getting water.
- speaker: Respondent
  text: The older boys liked to worry him. One day, they didn't know their lesson, and he put two of them in a small closet
    under the altar and told them they had to stay there. Later he got uneasy about them, afraid that they might smother,
    and he tried to get them to come out. They refused told him they were going to stay there all night, and let the people
    find them there, then they would know what kind of man they were paying to teach school. This scared him, for he knew
    that none of the children liked him and that it would ruin him. So he begged, and pleaded with them, but they worried
    him till time to go home before they would come out, and how we kids did enjoy seeing him beg.
- speaker: Respondent
  text: His children went to school also, and his girl Cora and I were good friends. She was always wanting me to go home
    with her and spend the night. I went one time but never wanted to go again. For he made us study until eight o'clock and
    then go to bed. He wouldn't let us play at all. He was just as mean at home as he was at school.
- speaker: Respondent
  text: I tell you things and times are changed. I was raised by candle lights for we didn't even have oil lamps for a long
    time and I bet I have made a million candles. I had molds to make them, put a string in then poured the hot tallow on
    them and they were put aside to get cold. We had homemade wooden candle sticks to burn the candles in. That was all the
    light we had for years.
- speaker: Respondent
  text: We burned oak and hickory wood in the fireplace, and let me tell you something right now, that fire was very carefully
    covered at night. For matches were scarce and hard to get. If we went visiting and our fire went out, then we had to borrow
    a little fire from our nearest neighbor, or start it with flint and gun powder. I have watched my father start it that
    way many a time.
- speaker: Respondent
  text: We cooked on fireplaces too, had what we called pot racks. They were built in the fireplace and we hung the pots on
    them to boil baked in ovens, and things seemed much better then than they do now. People were hardly ever sick. Why, I
    was nine years old before I ever heard of anybody dying. Then a little Negro boy died not so far from our place. Mama
    told us that she would carry us to see him, for they was going to bury him down in the ground. I couldn't believe that
    he was dead, and told mama that he was just asleep. We just couldn't believe that he was really dead, until we saw him
    buried.
- speaker: Respondent
  text: I guess I was in the first cyclone that was ever in Georgia. I was small, but was large enough to work in the field.
    Me and little brother, wanted to go to see our grandmother. I remember that it was one Saturday morning. Mama at first
    said we could go. Then she said we had better wait, as it looked like it might rain. We went on to Adie field, and about
    two hours later, the sun came out. Father came to the field and told us that we could go now, for they didn't think it
    was going to rain.
- speaker: Respondent
  text: It was about four miles to grandmother's house and we had to walk, part of the way was through woods, but we were
    used to it and did not mind the walk. It didn't seem like we had got anywhere until it began to turn so dark, and the
    wind started blowing, and when we got through the wood we could hardly see how to walk, and the wind was getting worse,
