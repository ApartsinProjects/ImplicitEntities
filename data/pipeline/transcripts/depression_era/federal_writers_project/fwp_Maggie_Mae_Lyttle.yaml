collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Two children in family, a sister. We had plenty of good, wholesome food but not a whole lot of enjoyment. There were
    some Negro families around who had everything and they used to feel embarrassed. She thinks God provides size of family
    (likes large families) and feels that no matter how large the family, God will provide. Nobody should try to cut off the
    family. Take what God sends. Her uncle had a large family and she enjoyed being with cousins.
- speaker: Respondent
  text: My mother took in washing and ironing. All of them worked in the fields at times. She loved to shop and pick cotton
    on her uncle's farm. He paid her and her sister for work and he had 21 children of his own, all by one mother. Maggie
    liked to be with them.
- speaker: Respondent
  text: She came from a good family. Mother's parents were Margaret and Richard Humphrey (ex-slaves). He was foreman on a
    large plantation, but never owned the farm or home. Had no need for one. They had 10 children, 6 girls, 4 boys. Her father's
    parents were James and Caroline Lyttle, farmers too. They had a big family, 6 girls, 7 boys. Her grandparents on both
    sides were slaves. Mother's folks from Virginia. Father's from North Carolina.
- speaker: Respondent
  text: Her family life was happy and she was satisfied. Feels that she has a family to be proud of.
- speaker: Respondent
  text: Mother taught her and sister at home until they got in second reader because they had to go so far to school that
    her mother was afraid to send them. Maggie learned her alphabets very early because she was promised a big doll by her
    father so she learned them so early she could hardly talk.
- speaker: Respondent
  text: Went through twelfth grade in Columbia, S.C. (Benedict College). Mother sent them off to school because she was afraid
    for them to get around. Finished her dressmaking course, but not her college because they didn't live on campus and had
    to miss school a lot because no arrangement was made sometimes to get them to school, so she got discouraged and quit
    after twelfth grade.
- speaker: Respondent
  text: Was converted at 8 years old. Got baptized until 14 years old because parents thought she was too young. She has never
    danced, nor ever played cards. Never been on the dance floor. Parents did not like it and she was converted early and
    did not have no wish to.
- speaker: Respondent
  text: She believes in education for everybody and wishes even now (though she is blind) that there was a way to get her
    a college degree. She thinks it helps a person to make a living and then it is a good thing to raise children by.
- speaker: Respondent
  text: She does not think the school system of today is so good. She thinks the schools farther back were more particular
    about their schools and their school teachers were to see if they knew their studies, were of good moral standing but
    looks like now the parents do not seem to care.
- speaker: Respondent
  text: I would like to be a teacher for the blind, always had the missionary spirit and wanted to do something to uplift
    humanity. Idea of a good life is to be a light-bearer for a few worth.
- speaker: Respondent
  text: She would buy a little home with a little comfort in it for her and her children. Has not thought much of a car. Lover
    owned a car but built a trust for hauling wood for a little while, but wouldn't keep up the payments on it. She has 4
    children living, 3 dead, oldest 15.
- speaker: Respondent
  text: Cannot make money now like she used to. Am hardly living. Gets $15 a month aid to the blind pension and that is not
    enough to fill her needs, being blind with four children and a widow. Seen a widow around 12 years.
- speaker: Respondent
  text: Nor in some powers shoot one-third of needs only. If she pays one bill, has just to leave another off. Root seeds
    of family is a boost to stay in so they can hold up their heads. Feels keenly the need of a home for the sake of her 15
    year old daughter. Next seed is plenty to eat. Next, some books for the children. She believes she could get along right
    well on $30 a month.
- speaker: Respondent
  text: People who make money honestly are not in the wrong for having it. It's a fine thing to work and she has always done
    so. Owning property and money are like talents some folks can manage better than others. People ought to be able to dispose
    of their property as they desire.
- speaker: Respondent
  text: She has voted. Last time she voted for Harding. She could not remember whether he was a Democrat or Republican. Would
    vote for the man who meant the people the most good. She does not think much about the new ideas about relief and property
    and capitalism because she feels that the really deserving don't get much help. Some others who don't deserve get much
    more.
- speaker: Respondent
  text: Have been in the hospital once that was during the time I went blind, I paid out about $600; other than that, I have
    not spent very much, only a little now and then on the children.
- speaker: Respondent
  text: I know about the value of a balanced diet, but it is impossible to think of trying to balance it; it is all that I
    can do to get them the commonest kind of food, meal after meal.
- speaker: Respondent
  text: Live in one room that I furnished myself and it is kept about as clean as you can expect with four or five people
    living in it.
