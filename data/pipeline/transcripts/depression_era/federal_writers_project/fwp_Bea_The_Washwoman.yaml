source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: 'I reached Sarah''s house, and knocked at the front door, three voices greet me. "Here we is come ''round to the back."
    I made my way to the back yard, jumping a mud hole in the walk, the grass that mired down every step I took. It had been
    raining lots that week, however, the sun was shining on that particular afternoon. In the back yard two negro girls were
    bending over old fashion ash tubs washing. There were four lines filled with clothes drying in the sun. Sarah was sitting
    on the porch talking to another Negro woman, I heard her say: "It''s too bad we had to get in it." When she saw me, she
    said: "Lawdy Mistress, if I had known it was a white lady I would have let you come through the house so you wouldn''t
    get your shoes muddy." She called to one of her daughters who was washing. "Celine, fit that clean pot rag baking on that
    chair, and come here and wipe mistress''s shoes off for her." I told her that was quite all right I didn''t mind a little
    mud. "Well, that''s all right then, but come here and get ready a chair. ''Cause me for not getting up I has been sick
    in bed with the flues, this is the first day I has been up, and I is powerful weak. But I couldn''t stay in no longer
    ''cause I had to see the children was all clothes clean.'
- speaker: Respondent
  text: She is about five feet tall and is very black, she was wearing a black and white dress of some thin material, a red
    waist over this, a knee-length olpok wool coat, a white cloth wound turban fashiony around her head, black shoes and gray
    cotton stockings. "Yesterday, when us was out there in the yard washing I got ain't fixing to let Negroes come through
    my house in bad weather tracking up my house." What is your name I asked the woman? "My name is Sarah Hill, but they calls
    me Be for short." I asked, how long have you been washing for the white folks? "Oh, my gracious mistress, going on thirty-five
    years I am sure about that." Well, would you mind telling me about your experiences as a washwoman? "Now, Mistress, what
    in the name of the Lord do you want to know that for?" I stated my mission, she laughed. "Well, if you want a history
    of my life I can tell you what I knows. Yet and still, I am sure you can find somebody else who had a better story than
    me to tell. 'Cause what I knows ain't no account you know colored folks don't have money to do things like white folks
    does, leastwise us don't.
- speaker: Respondent
  text: '"I have been working every since I knowed what work was. I maided and cooked before I married, I maided a while and
    cooked a while. After I married and started having children I couldn''t do no good at working out. So I stayed home and
    took in washing." Sarah stopped talking to me to give orders to the girls washing. "Look here sister that sheet belongs
    in that white sack. Just look at that dirt you got on that man''s shirt tail, rub it out before it gets dry. Celine, get
    up off them steps and get back to that wash tub. If I don''t come out here and stay in behind you you wouldn''t finish
    washing today." "Well, Ma, I am hungry and you won''t cook us no dinner." "You finish that washing then you can cook something
    to eat yourself. That''s what I done when you wasn''t big enough to help me."'
- speaker: Respondent
  text: '"Mistress, I used to get good money for washing. I have made about ten dollars heap of weeks way back yonder. I used
    to have a heap of washings then, now don''t get near as much for them as I used to. And folks are lots harder to please.
    Now I am ready to put them down. "I am getting too old to do family washings any more. Both of my girls had good jobs,
    but I won''t be able to do all my work, so they had to stop, so they could help me. The last white woman sister worked
    for was a good lady. I done her washing too. I told sister she loved that white lady and her children as well as she did
    us. "I washed for a family of Jews who paid me $4.00 a week. You know them kind of folks is about wanting you to do their
    work for nothing. Well, the lady kept cutting me down 2 at a time until she got to $0 I put her washing down. I was thinking
    about washing for for that little. They had ten and twelve sheets in trash for every week. Twenty and thirty towels, twenty-four
    pillow cases three and four table clothes and no end to shirts and other things."'
- speaker: Respondent
  text: 'She stopped talking to watch two roosters fighting in the yard, while the girls threw rocks at them. She yelled at
    them: "Celine, sister, get back to your washing. Celine come in the kitchen and start off the stove and thin it down and
    stir it good so it won''t be lumpy. Sister bring me Professor Yank''s socks here and let me turn them. You are liable
    to let ''em get mixed with them other folkses clothes then he will fuss if they lost. "Once I was washing for a family,
    who I had washed for a long time. After they were ready to be sent home, sister took them. The lady sent me word one of
    the little boy''s shirts was not in the laundry I had sent home. Well, we asked everybody we washed for if they had a
    shirt what didn''t belong to them nobody had seen it. I reckon sister lost it ''cause she was working for the lady and
    knowed the shirt was in the wash when the lady got ''em up. So sister had to make her money what the lady paid her for
    working and buy the little boy a new shirt. That didn''t look right in a way, yet and still sister was responsible for
    them clothes from the house to be washed and took ''em back.'
- speaker: Respondent
  text: '"Ma''am, I have been working all my life. My mammy and daddy died when I was about three years old. I went to live
    with my brother and sister-in-law and nursed their children. My sister-in-law was a mighty good trainer, she learned me
    how to clean up good and cook. I knowed better than to leave any cat faces in the clothes when I ironed them. She whipped
    me many a time ''cause it didn''t wash the clothes clean. ''Course I am speaking about when I got big enough to do them
    things. "I was born in Elberton, and have several aunts living there now. My mammy didn''t work out none, she stayed home
    and kept the children. She had a pen of hogs and cows to look after. My Pa was a blacksmith. They lived in Tignall before
    they moved to Elberton. After they died I went back to Tignall to live with my brother. Ma''am, I wasn''t big enough to
    work in the field when I first went to live with him, I just worked ''round the house doing what little I could.'
- speaker: Respondent
  text: '"I just have two girls and two boys one is the cook at the Varsity and the other one is an insurance agent in Flint,
    Michigan. They come to see me Christmas. My girls maids when I am well enough to do the washings I take in. I don''t have
    but two big family washings and I was for two students. I have been washing for Professor long before he married his wife.
    I don''t wash for her, the cook does her washing. A man came by selling produce, the girl Sarah sister asked her mother:
    "Let''s buy some turnip greens I want some boiled victuals." "You know I ain''t got no money, today is Wednesday and I
    won''t have none before payday when I gets my wash money." "Tell, I''m going to tell Aim to charge it. I want a cake too."
    "No you don''t just get me a half pound of butter." The negress yelled: "Say Mr. Waters does you have any turnip greens?"
    "No" "Well do you got a cake?" "No," "Well what has you got?" "Us has been washing hard all day and we is hungry." "I
    just have potatoes today." Huh," said Sarah, "He just wanted me to know he was still selling things and come by here in
    an empty wagon. That white man knows I will pay him when I gets my money payday, I ain''t never failed to pay him yet
    and he has been coming ''round here a long time.'
- speaker: Respondent
  text: 'Her husband is a preacher, he came about this time, "Mama," he said in a deep voice to his wife: "I was hoping you
    had dinner ready. I have got to go to a deacons meeting tonight, and I want to go down to the courthouse to the trial,
    therefore I wanted to eat before I left." "Papa, you know I don''t feel like cooking and if I can''t sit out there and
    keep sister and Celine over that wash tub lazy won''t ever get through." I reckon I had better go on down the street and
    see sister Mary Jones you know she ain''t been well for a long time. I am mighty uneasy about her, I am afraid she won''t
    last much longer. She sure will be missed out of my congregation at the church.'
- speaker: Respondent
  text: My second visit to Sarah's was made in the pouring rain, which is perched on a high hill. The red clay. I knocked
    on the door and a young black girl invited me in. "Come in mistress." she invited. I asked if Sarah was at home, before
    she could answer, Sarah called "Here I am in here come in to the fire." I entered the room from a narrow hall that had
    two red scatter rugs on the floor, and a hall stand with a red umbrella resting on it. In the bedroom Sarah sat patching.
    There was an old style wood bed, an iron bed, dresser, several chairs a table, trunk and curtains that needed laundering,
    a much worn rug almost covered the floor. "Have to chair in front of the fire and dry your feet, sister take mistress
    coat and spread it over that chair to dry." I asked her if she was ready to finish telling me about herself.
- speaker: Respondent
  text: '"Lawdy, mistress, I have thought and thought. I was sick when you was here before my brother had just died and I
    have had a house full of company up ''til last Sunday. I have had so much expense trying to buy something for them to
    eat and it has been raining so much I couldn''t do no good at washing, everything I had taught to tell you has left me.
    Sister do you remember what I told you to keep with so I could tell her?" "I can''t remember you told me so much. "I ain''t
    collected much money here lately and it takes all I make to pay house rent, and a little something to eat. ''Tain''t nothing
    left to buy even a pair of cotton stockings with. I did want to have a supper for the church but it''s been too bad for
    that. I buy the food and cook it then I let the folks know about it and they come and buy their supper. Sometimes I has
    a fish fry, then a I has a oyster supper. I gets 25 cents for every plate sold. After I pay for the food I buy, I turn
    the rest over to the church. If I don''t get to washing I will have to have a supper to get some money for ourselves -
    it looks like.'
- speaker: Respondent
  text: '"I told sister and Celine today looks like I will have to hire them out instead of keeping them home to help me.
    Sister had a chance to work for a lady who has just come to Athens and gone in business of some kind for herself, but
    she lived so far from my house I knowed she couldn''t get there on time these winter days. Looks like I don''t know what
    I am going to do for money. Whitt has gone out to find a job, but ain''t nobody going to have no carpenter work done ''til
    spring unless they have to. He ought to fix the leak in the kitchen, but the house don''t belong to us. Looks like the
    man what owns it won''t fix it no now. "Sister show the lady the house if she wants to see it." "Oh, mama the lady don''t
    want to see the house, she come here to get your story about washing." I would like to see your house. "See there told
    you so, go on and it will give me a chance to think about what I want to say. Right now I can''t get my mind off that
    tub of clothes on the back porch."'
- speaker: Respondent
  text: I followed the girl through the hall to the living room. There was a three piece jacquard velour living room suit,
    a studio couch, dresser, organ, a mahogany library table with a coal oil lamp, books and magazines on it, another table
    of golden oak with a crochet cover and radio on it. The table was placed back of the divan, pictures of the family as
    well as others were scattered about on the wall. A heater and rug on the floor completed the furnishings of this room
    also red draperies with ball fringe and cream scrim curtains at the two windows. "My brother gave us that table with the
    lamp on it when he was here two years ago. We don't play the organ any more since we got out battery set radio, unless
    we have company and they want to play and sing. "Come in here this is our dining room." There was a golden oak suit in
    this room. Round table with a white cloth on it and a cheap glass fruit bowl. On the sideboard were several pieces of
    glass ware and a vase filled with artificial daisies reflecting in the mirror in the sideboard. Curtains at the window
    are of scrim a fruit picture on the wall and a curtain stretched across one corner of the room for a closet.
- speaker: Respondent
  text: '"I hate to take you in the kitchen." said the girl. "It leaks so you might get your feet wet." There was a bucket
    under the leak in the kitchen. In the small room, was a wood stove, an old dresser used as a cabinet, in large glass jars
    on the makeshift cabinet, was filled with flour, sugar, meal and lard there was a eating table and over this hung two
    huge hams and a middling of meat. The girl said: "I sure wish papa would let us cut one of them hams, but he said we couldn''t
    because they are not to be cut until summer."'
- speaker: Respondent
  text: Whitt came in the back door as we were talking about the hams. "Good evening Miss, how do you like the looks of them
    hams?" Oh, they look good to me I replied. "Yes, ma'am, they sure does, they wouldn't be here now if I let the old woman
    and the girls have their way. I told them the other day when they wanted to cut one. I was thinking about it. They had
    already run away with it too fast now." By last time we had one on the back porch I entered into another bedroom which
    was furnished very much like the other. Bed, filled with clothes to be washed as well as a folding couch, dresser, a few
    chairs and curtains at the windows. Think it is a five-room house ceiled with wide boards. The framed house was at one
    time painted gray. There was a swing on the porch and a cracker-sack to wipe muddy feet on. The only shrubbery in the
    yard was a few bushes of privet hedge planted near the porch. "We so added the yard in Bermuda grass to keep it from washing."
    the girl told me.
- speaker: Respondent
  text: Again I went into the room where Sarah sat still patching the pants. How did you like them hams?" I think they pretty
    fine. Whitt interrupted, "Sarah when we cuts them hams I am going to send Miss a nice thin slice." "There are three of
    us I told him. "Then I will send you three nice thin slices." "We never lucky about getting washings, it's the weather
    that raises us up. I get $1.50 for a family washing and 75 cents for one person when I started washing look like I was
    afraid to start, I was sure I couldn't please the white folks. Then I started at it and I must have pleased the folks
    'cause they come to me when I wasn't expecting them too. That's what I tell Celine about getting a job, she is scared
    the folks won't be pleased with her work.
- speaker: Respondent
  text: '"In bad weather folks don''t realize you don''t have no way of boiling clothes, of course we do wash in the house,
    and rinse the clothes as good as we can, they does get dingy in the..."'
