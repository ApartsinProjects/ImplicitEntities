turns:
- speaker: Respondent
  text: We met on the evening at Main and AIWA Street on a busy Saturday afternoon. She saw me first, she on the inside and
    I on the outside of the busy traffic lane of shoppers, mad pushing her way through, clamped my hand and placed her arm
    around my shoulder in happy greeting. I was glad to see my 74-year-old friend, and as I noted how strong and straight
    and tall she was, one glance at her face showed me she was not in the best of health.
- speaker: Interviewer
  text: How are you?
- speaker: Respondent
  text: Not so good. I have been down to John's in Miami for three months, and while there I had my teeth out at his insistence,
    as they were in bad condition. The dentist said I should have done this years ago, and that it will be some time before
    the poison gets out of my system.
- speaker: Interviewer
  text: I remarked on the apparent good fit and natural appearance of her store teeth, as she pulled them, and inquired about
    John and his family.
- speaker: Respondent
  text: John Devan was reared in Jackson Hills, studied law, and in the 1920s became Probate Judge of Duval County. His friends
    were legion, but in his mother's opinion, John was too popular. He drew a good salary, but looked like he could never
    get ahead financially. So, when there was a splendid opening with a ideal known law firm in Miami, he relocated with his
    family to the southern metropolis of Florida eight years ago. Reports come back to Jacksonville of his advancement in
    his profession, of his apparent prosperity, with rumors he would be a candidate for Governor of Florida in the 1940 election.
- speaker: Respondent
  text: Oh, they are all fine. The children are in college, the two older ones, the younger in Junior High, and John is so
    busy we always had to catch him on the run to talk with him. He is in politics up to his eyebrows, but it does not make
    any difference what you hear to the contrary, John is a good boy he'll be able to take care of himself. John is 56 years
    of age but is still a boy to his doting mother. Yes, he is smart, and while politics is a treacherous game, even for the
    most experienced, John's many friends in Jacksonville are not uneasy, and will all support him if he decides to come out
    as a candidate for the highest office the State can bestow.
- speaker: Interviewer
  text: I asked if she was living alone in her home here.
- speaker: Respondent
  text: Oh, no. I'm never alone. I have the best children in the world, and while none of them are living here right now,
    when I am in the old house, there is always some of the grandchildren. Louise came down from South Carolina the day before
    I arrived, and had everything in order. I came in last Sunday evening.
- speaker: Respondent
  text: I'll have to be on my way now, as I still have some groceries to get for tomorrow's dinner. My car is parked up by
    the Courthouse, where I've had a special spot reserved for years.
- speaker: Interviewer
  text: Did you say you had some tickets for the moving picture to be sponsored by the Eastern Star Chapter next week?
- speaker: Respondent
  text: Yes, give me about ten. I'll go through John's old office when I come down Monday to see about my taxes. Most of the
    old employees who used to work for him are still there. I'll romp all over them and sell every one of those tickets before
    I leave.
- speaker: Respondent
  text: She laughed slyly in reminiscence at the good nature of John's old office help, and the readiness with which they
    purchased tickets for benefits, balls, and other entertainments she is interested in, her Church affiliations, her Eastern
    Star Chapter, her C. Chapter in all of which she is an active participant and supporter.
- speaker: Respondent
  text: If you'll be down on the courthouse steps on the north side Monday at 2 o'clock, I'll pick you up and we'll come home
    and have a nice visit.
- speaker: Respondent
  text: You may be sure that I was there at 2 p.m. on the appointed spot, and so was Mrs. Devan, is a business woman, visiting
    neither time nor words to squander. Her business transacted, here she comes, her eyes bright and sparkling.
- speaker: Interviewer
  text: No, not when I'm traipsing around like this. I don't need them. John used to say Mother, I do believe you can see
    from here to Texas! John is evidently the favorite of her five children. Of course, I have a pair of reading glasses in
    my purse, if I have to sign papers or any emergency comes up that I need to read something, but glasses are not necessary
    for what I do mostly now.
- speaker: Respondent
  text: By this time we were in the not new model, but a good one, Santa in good condition. He swung it around, made for Oswalt
    Street, and straight across the viaduct to her home on East Church Street in Jacksonville. All this part of town is so
    dear to me. You know about ten years ago, my children thought I should move over into the Riverside section, to own some
    property on Park Street, and nothing would do but for me to move into it. I did, even transferred my membership from the
    Fairfield Methodist where our family had attended so long and joined the Riverside Park Methodist Church. But I never
    felt at home there were so many strangers, and I missed my old friends and neighbors. So after three years, I came back
    over here.
- speaker: Respondent
  text: By this time she had steered the car into the driveway. It was a big old rumbling house, with wide porches, two lovely
    magnolia trees which had grown up with the neighborhood on either side of the old fashioned brick walk to the front steps,
    vines, trellises with roses, beds of azaleas, a magnificent wisteria forty years old flowering the posts of the porch
    had reached out to the live oak tree at the corner, and one could picture the heavy purple blooms in the early spring
    and summer among the glossy leaves and the gray strands of Spanish moss.
- speaker: Respondent
  text: The front door, with its frieze outlined with squares of colored glass red, amber of a period in vogue fifty years
    ago, opened us as if by magic. Martha, slim, smiling, colored in, neatly dressed in a black house dress with white lawn
    apron and maid's cap with black ribbon band, bade us come in.
- speaker: Interviewer
  text: This is Martha?
- speaker: Respondent
  text: Named after who? Martha was, said Martha Allen, and I think it's the prettiest name in the world. I belong to the
    though my last name's Dawson.
- speaker: Respondent
  text: Mrs. Devan did not seem to be at all embarrassed at this joining in the conversation by the maid, and laughingly said
    Martha Allen is great-granddaughter of the Martha we brought from South Carolina, when Mr. Devan and I came down here
    from our native state in 1890.
- speaker: Respondent
  text: The entrance hall opened into a comfortable living room, well furnished, a worn rug on the floor, the furniture of
    good substantial walnut, the comfortable rocking chairs with their high curved backs, the homemade cushions, all bespoke
    an intelligent effort to combine good selections with lasting qualities to make a room that could be lived in by home
    folks, as well visitors. The October sun came through the long South and west windows, with their draperies of starched
    scrim and bright flowered chintz.
- speaker: Respondent
  text: 'The rocker by the low walnut table with its lamp and a basket with sewing materials looked as if it might be the
    favorite resting spot of Mrs. Devan, and as I hesitated on being asked to sit down, she went directly to this rocker,
    and oh, seated herself she said:'
- speaker: Respondent
  text: I feel I've grown up here, my family life history would really be the history of Fairfield and its surroundings.
- speaker: Respondent
  text: I was born in Gardin, South Carolina, on October 11, 1864. I was the youngest of a family of ten. My three older brothers
    served in the War between the States, but my father and mother were gray-haired from the time I could remember.
- speaker: Respondent
  text: We went through the usual vicissitudes of the southerners of that section in War times, my father being too old to
    muster service, he stayed at home and kept on running the general store. My earliest recollections are of playing around
    the porch in the front of the store, which was also the post office, and of listening to the conversations of the neighbors
    and the country folk as they came to purchase or to inquire for mail. You know a general store offered everything, dry
    goods as piece goods was designated buttons, thread, yarn all the women crocheted and knitted, especially gloves and stockings,
    as these articles could not be sourced them, since no factories manufactured them in those days. Then there were the staple
    groceries sugar, coffee, flour, etc. The country people brought in butter, eggs, side meat, hams, bacon, dried apples,
    pears, peaches, etc., and traded these a peculiar system of 'to have and have not.' They all had accounts at the store,
    and my father's accounts of sale and credit were most interesting. A quarter of leaf, 6.00; a mutton, 4.75; a bushel of
    dried peaches, 80 cents; 3 yards of homespun jeans - this was much in demand for the making of men's suits, and women
    made them too, by the way - per yard; 10 dozen fresh eggs at 10 cents per dozen; honey 5 cents per pound. There were no
    canned vegetables and fruits, like we can buy now, and there was no home canning. Preserving of fruit pears, peaches,
    plums, apples, by cooking them thoroughly in honey and placing in three gallon jars or churns of stoneware was the only
    place of carrying these over for winter use. Our food was all fresh and of good quality. We had plenty of good fresh milk,
    buttermilk, meats, and fresh vegetables in season. Our family was all strong and healthy.
- speaker: Respondent
  text: One of my brothers was lost in the War, but the other two came back home in 1866.
- speaker: Respondent
  text: Of course, I do not remember much about the Reconstruction period, but by the time I was growing up my family was
    fairly prosperous and I was sent to the Columbia Female Academy, at Columbia, S.C., to complete my education. There were
    no free schools. I received my early training at home, and later attended a subscription school or two of six months schools
    where the teacher charged a dollar a month per pupil, usually having twenty or so at a term.
- speaker: Respondent
  text: There were no co-eds in those days. The boys went away to college, to Harvard and Yale, if the family would afford
    it, to Lexington to attend Washington and Lee, or to Suwannee. We were especially trained in deportment at the Columbia
    Female Academies always made to remember we were ladies with bearing and manner accordingly. A teacher was always with
    us, even when we went out for our daily walks and exercise. There were about sixty young ladies when I attended.
- speaker: Respondent
  text: We were taught music and painting, sewing that is, fine sewing, embroidering, and all sorts of handwork. Morning and
    evening there was prayer service, and of course on Sundays we went in a body to a pond services at the local Episcopal
    Church. We cultivated a taste for good literature, the Glasscoat poetry, novels of established reputation, read The Scottish
    Sir Walter Scott's books, Milton and Shakespeare.
- speaker: Respondent
  text: I finished school when I was eighteen, and later in the summer met Mr. Agar Charles Dubose at Simmonsville, S.C.,
    and we were married a year later.
- speaker: Respondent
  text: In 1890, we came to Florida with our three children, locating at Hawthorne, a thriving railroad junction in a section
    of Florida that was just being opened up, and where Mr. Devan had purchased a large acreage.
- speaker: Respondent
  text: We brought Martha and John, our negro servants, from Thomasonville, but they were not used to farm work, neither were
    we, so in 1894 we had an opportunity to trade the farm and move for section of Fairfield, in Jacksonville, and came here
    bringing Martha and John with us.
- speaker: Respondent
  text: On the corner of that next lot across the street, Mr. Devan established a real estate office. I had always kept my
    father's books at the store, so that being natural should help my husband.
- speaker: Respondent
  text: Our family had by now increased to two boys and three girls. This way lost our son and son. There was plenty of work
    at the house and the office, so we at Thomasonville for Martha and John, a two young daughters. One helped with the housework
    and children's care, the other took care of the office, and run the errands. Martha did the cooking, and John took care
    of the horses and acted as coachman.
- speaker: Respondent
  text: Those were busy, happy years. We prospered. Several years later, we took in a store at Oakland and Florida Ave, on
    a real estate deal, and I run the store. The children were away at school, so we did not need so many horses, and I took
    John to help with the heavy work and to act as handyman around the store. It was a busy life. We had notions as they were
    called thread, buttons, hooks and eyes, dressmakers' findings most of these things out of style in this age of zippers
    and zappers and I carried some piece goods.
- speaker: Interviewer
  text: Was the store ever held up? I asked, recalling a brutal hold-up and murder of the proprietor of a soft drink establishment
    in the same neighborhood a year ago.
- speaker: Respondent
  text: Mercy, Mel I never thought of such a thing. That was a nice neighborhood, thirty years ago, the streetcars passed
    the door, negroes lived all around, in fact, they were some of my best customers, but they were working, law-abiding residents,
    and it never entered my mind to be afraid.
- speaker: Respondent
  text: I usually took in around ten to fifteen dollars per day, as the women would rather patronize me than take the long
    trip to town, as Jacksonville was called.
- speaker: Respondent
  text: Yes, I am a firm believer in the Church and its influence. We joined the Fairfield Methodist Church, which was near
    our home, and all of our children attended the Sunday School and Church services from the time they were little youngsters.
- speaker: Respondent
  text: I have always been a firm believer in Jacksonville. It has splendid opportunities for everybody. My daughters are
    scattered one with her family in Washington, D.C., one in Daytona Beach, and one in West Palm Beach, and a granddaughter
    married and living in Charleston, but all are near enough that I can visit them when I feel like it, and we are to have
    a grand Christmas homecoming this year everybody will be here.
- speaker: Respondent
  text: And so I left this friendly woman who had made a success of her life and that of her five children, happy and contented
    in her declining years, but not helpless, still active and interested in her church and other organizations of which she
    is a member.
