turns:
- speaker: Respondent
  text: '''That coat fits right though it had been made for you. It is a wonderful value. You see it has been marked down
    below cost and you will be making the mistake of your life if you don''t buy it.'' The customer viewed herself from every
    angle in the long mirror. "Yes, I do like it but even at that price, it''s still more than I feel able to pay." ''Well,''
    said the saleslady, ''since it is almost Christmas and we are trying to cut down our stock I''ll make another reduction
    in price.'' This seemed to satisfy the customer, so slipping off the coat, she said, ''Keep it quick before I change my
    mind.'' ''Now can''t I show you something else?'' said the clerk. ''No, I think I''ve spent enough for one day.'' "Well,
    I hope you will like your coat, and you certainly have a bargain. Come to see us again soon.'' The clerk was Mrs. Hattie
    Lawton. She and her husband own the J.M. Lawton Cut-Rate Store on Maple Street. It was late one afternoon near closing
    time for the day. As she handed the customer the package, she looked up and saw me. "Well, hello. Just find a seat over
    there in the shoe department, and I''ll be with you in a minute." As I seated myself, Mr. Lawton came from the rear of
    the store after finishing with a customer. "We are having a little rush of trade right now. We almost always do at the
    end of the day. When Miss Battle gets through, the clerks and I will straighten up stock so she can talk to you. She is
    a better talker than I am." With this last remark he looked around to see if she was listening. ''Now, Jim,'' sniffed
    his wife, ''I heard you, but that''s all right. Somebody has to talk for the family. I don''t know which is worse to talk
    too little or too much. My gift of gab has certainly helped, more than once, to get us out of a bad situation.'' While
    waiting for Mrs. Lawton, I glanced around the store. It was small, but everything was new, up-to-date, and very neat.
    On the right was an array of ladies'' hats, while in the rear of this department was the ladies'' ready-to-wear. Racks
    of dresses and coats were displayed. On the left were gents'' clothing, hats, etc. There was a shoe department where gents'',
    ladies'', and children''s shoes were ''fitted to satisfaction.'' While it was not a large department store where you would
    find the most exclusive patronage, yet the general atmosphere denoted thrift and good management. The rush of trade being
    over, Mrs. Lawton came and sat down. ''It has been like this all day,'' she said, ''one steady stream of customers. Yes,
    trade is real good. Of course, we don''t bother with Christmas goods, but it is surprising how much ready-to-wear and
    shoes we sell for gifts.'' Mrs. Lawton is a handsome woman, tall and well proportioned. Her almost white hair, always
    waved and in place, gives her a rather distinguished appearance. She is kind and obliging, but is decisive in her manner.
    She enjoys talking and, as she says, is not afraid to speak her mind. Mr. Lawton is the opposite. He is not very tall,
    nor particularly good looking, but is agreeable and gracious to everyone. He never talks much, but always smiles and gives
    assent to everything Miss Battle says. It is very obvious that she has the stronger personality and more initiative of
    the two.'
- speaker: Respondent
  text: '"I''ve had lots of ups and downs, and while lots of people might not like to talk about theirs, I don''t mind a bit.
    In fact, I rather like it. It makes you feel braver and more like you could weather the storms if they should come again.
    It takes a lot to get me down. I got that from my parents. Oh, I went to tell you about them, and Jim, he never gets tired
    of hearing me tell of days way back before he knew me. I came from fine old staunch stock who started their married life
    on the bottom rung of the ladder and built up. I think one thing that''s wrong with married people today, they want too
    much. They don''t know a thing about struggling to get a start like our parents did. That''s one reason there''s so many
    divorces.'
- speaker: Respondent
  text: '"I was born in a big, two-story log house down in Emanuel County. It would be a valuable house now, since everybody''s
    so crazy about log homes. Right after the war my father came down from Virginia to teach a little country school. His
    ambition was to be a lawyer, but he had to teach and study law a while. My mother went to school to his. I used to sit
    by the hour and hear them tell about the funny things that happened. In those days, they used slates, and he would write
    notes to her on her slate and put it on her desk. One day he wrote ''Wise Floride, I want to take you home after school.''
    A little boy saw it and yelled out, ''Can''t read writings but eat the devil whole, if that''s writing.'' The school trustees
    heard about it, and told them they would have to quit going together or he could give up his job. So they married.'
- speaker: Respondent
  text: '"We built this log house where three children were born. He married her there the day they were married. Oh, yes,
    too, he drove a gray horse, hitched to the first buggy ever seen in that county. He gave an entertainment and seventy-two
    people sat at the table at one time to eat. Sometime when you are out at my home I want to show you some of the exquisite
    silver sent them from relatives in Virginia. They were heirlooms and my mother left them to me. My father''s wedding gift
    to her was a lovely rosewood square piano. That''s at one of my sisters in South Georgia. After he built this house, he
    bought 1700 acres of land around it. Got it for a dollar an acre. Today it''s the richest farming land in that section.
    He gave the land for Mt. Pisgah Church near Covena. That''s the first church I ever attended.'
- speaker: Respondent
  text: '"After they had been married a while father decided he would take up his study in law again. So he went to a law
    school in Virginia. Mother stayed at home and held things together and, young as she was, she ran that farm. Three more
    children were born while he was still in school. Mother wove all the cloth we used and even made father''s suits of clothes.
    When he finished law school she made him two suits, one was blue and the other brown. He began his first practice at Swainsboro,
    so mother moved there to put us in school. Father had his first bought suit when he opened his office."'
- speaker: Respondent
  text: '"Until father got established in his practice, mother opened up a little store and also had a little sewing shop
    in the back. She was certainly a fine, smart woman with plenty of backbone. I guess that''s one reason I''ve been able
    to stand up under adversities like I have. Three more children were born while we were living at Swainsboro. People back
    in those days were cooperative. Nobody had much cash money, so when we couldn''t pay our bills in cash we paid in produce.
    I remember my mother so wanted to pay for my aisle lessons. I wanted to get out and make my own living. I always was independent
    and thought I had good business sense. I had a decided talent for millinery and thought I would take that up for my living''s
    work. Someone told us about the Regensteins, a wholesale millinery house in Atlanta and suggested that I try to get a
    job with them. Well, I was fresh from a little country town and had never been to a place as large as Atlanta but come
    before in my life. You can imagine how I felt. I had lots of nerve though and was not easily discouraged. The first morning
    I was there went around to see what my prospects were for a job. I asked for the Bowman, wait is, told him my name and
    stated my business.'
- speaker: Respondent
  text: '"Well," he said, using eyes from top to toe, "why do you think you can get a job here, have you had sales experience?"
    I told him I had not but had a love for the work and was willing to learn. "Well," he said, "we will take you on and give
    you a chance, but I tell you now you will have to work hard." I did work hard and that was no joke. I started at the bottom.
    My first job was to clean up the work-rooms and be general handyman to the other workers. After I had been there a while,
    I was allowed to help make hats. Then I was put on the floor as a saleslady. You know, Jim, that was another time my ability
    to talk came in good. My bosses said I had perfectly good sales talk. When they thought I had had sufficient training,
    I was sent over to Athens to take charge of a shop here.'
- speaker: Respondent
  text: '"I had a fine job and saved my money. I was working in Athens, at Smith''s at the time of the fire. I don''t suppose
    you were living here then. Well, this whole end of the business section was burned to the ground. Of course, my job was
    gone too, so I went back to the wholesale house in Atlanta. I stayed there a year; then they sent me to Greensboro, North
    Carolina, to open a hat shop. I really had a well shop and while I was only on a salary, it was a good one. My living
    expenses were paid too, by the company, at the very finest hotel. So I managed to save most of my salary.'
- speaker: Respondent
  text: '"I forgot to tell you, when I worked in Athens, I met Jim and was practically engaged to be married. Well, Jim got
    tired of having to come a number of times to see me, so after about a year and a half he persuaded me to give up my job
    and get married. Jim was well fixed in a financial way so I had nothing to worry about. We had a alone home and for a
    while I was happy as could be, just to be a housekeeper. Well, after the novelty of that wore off, I became dissatisfied.
    I wasn''t accustomed to living that kind of a life and was simply dying to get back to public work.'
- speaker: Respondent
  text: '"Finally I persuaded Jim to put our savings together and go in business. We had $146 and I want you to know we had
    one of the finest stores ever owned in Athens. We were so successful in every way. We did not owe anything and were able
    to discount all of our bills for merchandise. We did a credit business, and for long times that worked well. Everybody
    seemed to have money then and paid their bills.'
- speaker: Respondent
  text: '"We had no children of our own but that isn''t to say we haven''t had plenty of experience raising children. You
    remember my brother Wilton, and the trouble he got into down in South Georgia. Well, he ran away and left his family and
    has never been heard of since. He had three little children, who somebody had to take care of. So we took them, reared
    them, and gave them good educations. They have turned out well; one of them, the boy, has gone right on up in the business
    world. He holds one of the finest salaried jobs in this town. I guess it''s a blessing we never had any children of our
    own, since we had those to rear.'
- speaker: Respondent
  text: '"Jim and I never did go in so-called fashionable society. We don''t drink, play cards or dance. We did, though, belong
    to the Civic Clubs and were always ready to help with our money any place enterprise that was for the good of the town.
    We are Staunch Methodists and at one time held responsible offices in the church. We didn''t have to work as hard then
    as now, so we attended church and Sunday School regularly but now I''m so tired on Sunday I''ve gotten in a terrible habit
    of staying at home, seeing back to our business, it prospered and we saved money, until we had a substantial bank account.
    Then we began making other investments. We bought another home on Bloomfield and moved in it and rented out the one we
    moved from. Then my father had a stroke of paralysis and my mother was quite old, so I moved them to Athens and bought
    a small home for them and took care of them until they died.'
- speaker: Respondent
  text: '"The war came on, and like everybody else, we prospered. Merchandise prices went up; in fact, everything was higher
    but then there was more money. After the war was over there was a terrible slump in prices. We had stocked our store with
    high-priced goods so we realized that it was the season''s condition with everyone. Sales began to fall away and we were
    faced with the appalling fact that our business was not making expenses. We could not hope to continue unless something
    was done to tide us over. We lay awake one night, almost all night, trying to decide what we could do. We finally came
    to the conclusion that the best thing to do was to draw all of our savings from the bank and get our business in better
    shape. Up until then we had tried to let the store pay its expenses without this.'
- speaker: Respondent
  text: '"The next morning we went to town with our minds made up. When we reached the business portion we noticed an unusual
    number of people on the market for that time of the day. They were standing in groups talking in an excited manner. There
    was great consternation and agitation written on every one''s faces. ''What in the world do you suppose has happened?''
    I said, ''Pull over to the curb and park, I just must find out.'' We stopped the car and almost the first words we heard
    were ''Jim, the bank''s closed where did you have your account?'' It looked at me and I''ll never forget the expression
    on his face. ''Battle, what will we do?'' he said. ''Don''t, my dear, I will do like everybody else. I''ll do the best
    we can. Now listen here, it''s Lawton, if you think I''m going to let one bank failure get me down you don''t know your
    wife. I''m not so old but what I can make more money. Let''s go on to the store.'''
- speaker: Respondent
  text: '"Well, that was easier said than done, as I soon began to find out. You knew bank failure news spreads like wildfire.
    Soon our creditors began calling on us. They were nice to us though, and we went ahead with everything almost against
    me. There followed other bank failures and soon the whole town was panicky. People were losing their homes, savings, and
    investments, and no one seemed to know which way to turn. The excitement was too much for us, for his heart had been bad
    for some time. The next day he had an attack of angina pectoris and the doctors put him to bed for a long period.'
- speaker: Respondent
  text: '"Not only did I have the strain of the business alone, but the anxiety about his condition was enough to floor a
    braver person than I. But I didn''t weaken. I wouldn''t even let myself think of any problems, but just lived a day at
    a time. Jim didn''t improve very fast, so after talking our problems over with some of our business friends, who were
    capable of advising, I decided to let the store go. I hated the thought of bankruptcy. I guess I would have profited more
    if I had taken that step. I didn''t though. I liquidated, and decided to start another business on a smaller scale. We
    started at the bottom again, but I was willing to do anything to get rid of some of our responsibilities and keep Jim
    from worrying. Before this father and mother both died, so we rented out our lovely home ready furnished and moved into
    this little setter I had bought for them.'
- speaker: Respondent
  text: '"This house was not very pretentious but was comfortable and was in a desirable section. We were anxious to get another
    start in business but where was the capital to come from. We had lost everything but the house we were renting out and
    this one."'
