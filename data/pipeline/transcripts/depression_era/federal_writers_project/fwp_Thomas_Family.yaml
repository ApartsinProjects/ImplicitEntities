collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: At one time the small, square, box-like house had evidently been painted but its color was now nondescript. Front
    and back porches, with rotten sills, melted away from the house. The steps seemed ready to fall apart, while the porch
    roofs appeared to be in a state of imminent collapse.
- speaker: Respondent
  text: The two windows of the house were hung with rusty, ragged screens, which were so awry that a large bird could enter
    with ease, and which afforded little protection against flies and mosquitoes. One pane of glass had been broken from one
    window, and the opening was stuffed with rags and newspapers.
- speaker: Respondent
  text: 'About the house stood citrus trees, both orange and grapefruit, heavily laden with fruit. Much had fallen and lay
    decaying upon the ground. The yard was cluttered with an assortment of trash: tin cans, old bones bleaching in the sun,
    rotting fruit, piles of brush, trimmings from some leafy vegetables, many bean hulls, and heaps of cinders and charred
    wood, evidence of many mash days.'
- speaker: Respondent
  text: A rusty broken wire fence staggered along the side yard and supported a small scrawny bougainvillea growing from which
    blossomed a few small sprays of magenta-colored flowers.
- speaker: Respondent
  text: At the rear of the house, some twenty feet from the rear of the back porch stood a lopsided outdoor earth toilet with
    a piece of torn stocking in lieu of a door. About twenty feet from this end, some ten feet from the side of the house,
    on a gentle downward slope, stood the pump which supplied the family with water.
- speaker: Respondent
  text: About the pump on the soft wet earth more vegetable scraps and decayed fruit had been scattered, while small pools
    of greasy water in the sogginess at the pump's base dully reflected the brilliant Florida sunlight.
- speaker: Respondent
  text: At my knock, a tiny, dirty girl scrambled up from the hall floor and ran screaming into one of the small front rooms,
    and a small dirty boy peeped through the broken door. Then, a woman in soiled clothes, with her head tightly bound in
    a grimy cloth, came to the door from the room in which the little girl had disappeared.
- speaker: Respondent
  text: I made known my errand and asked for Mr. Thome. The woman stated that he had gone to work but that she was Mrs. Thome
    and would be glad to talk to me. She then offered a lone but work-worn weathered head in greeting and invited me to come
    in.
- speaker: Respondent
  text: 'We entered the front room on the right side. Then she excused herself for a moment and went across the hall. Soon
    she returned and sitting down opposite me in a dilapidated rocking chair, she said: "I just had to see how well we were
    getting on. That''s my sister here in that room there. In connection with me and the room across the narrow hall, and
    she sure has been powerful ill. Ailing. Hit times a right part of my work looking after her, too.'
- speaker: Respondent
  text: That poor girl, she sure has had a time. About three weeks ago her baby came, and she was right puny long before time
    for it. She got up week after it came and seemed to feel right well, then she was looking with a fever and a terrible
    cough. It seemed like no matter what we did for her, it didn't do no good at all.
- speaker: Respondent
  text: We had no relief of good. There is a nurse that lives right across the road there. These she come over and said it
    sure looked like the pneumonia to her, and that we'd better send for Doc. We didn't know whether he'd come or not so we
    went for him to bring in the baby. Well, she kept on a-wailing till we sent for him, and he come.
- speaker: Respondent
  text: That girl sure was low-down too, very ill when he did either. And he said she was just about to have the pneumonia,
    just like the nurse said. He gave some pills for her to take regular and sold for her to eat some and some juice. I don't
    like them things, and I don't see why she can't eat what she likes actually when she is so sick.
- speaker: Respondent
  text: Then the women, she been screaming every day and a-bringing soup and coffee and she gave me a fixin' some orange juice.
    Well, and while I left she was still in it she about night on to throwed a fit, see she did. But she said it ought to
    be grapefruit juice instead of the orange when all the fever colds is sheaving, then she run house and got one of them
    little mites of wire strainers and said I must strain all the juice through that.
- speaker: Respondent
  text: My, ma'am, that just takes all the goodness out of the juice and you know it. Poor Nellie, she's been so puny for
    such a long time.
- speaker: Respondent
  text: Not too long ago, she seen her men a-fighting with mother and he got knocked plum out. Poor Nellie, she thought he
    was killed and so she went a-clumb raving crazy. I was to be sent to the home to see a scene. It seemed like she never
    would get out of there neither, and George, her old man, he weren't hurt none to speak of. Just knocked out.
- speaker: Respondent
  text: About eleven months ago or so, they did turn her out and then of course as soon as she got home she got in the family
    way right away, and with this here youngun that she just had. She was sick and puny the whole time too, and just a ghost
    would do her but she met us and stayed with us.
- speaker: Respondent
  text: Well, we took her and George, and Billy their little boy and we been keeping them all this time for George he just
    couldn't do nothing to do.
- speaker: Respondent
  text: George, he went down Lake Okeechobee any just before the baby come. And the reason was, Harris he told him he just
    couldn't keep his job any longer unless he had some booze.
- speaker: Respondent
  text: Per Harris, he don't hardly ever have no work neither. George, he got mad, and he left clutter here and went to the
    like country. As promised to send me and Nellie some money when he got a job, but he ain't sent but three dollars yet
    and we had to use that for food.
- speaker: Respondent
  text: We borrowed two dollars from the nurse-woman over there and he ain't been able to pay that back yet, which... I wrote
    he got a job but it takes a while on to till he makes to live for himself.
- speaker: Respondent
  text: At Nellie, she had a powerful hard time with the baby too. About three weeks before it did come she got mighty sick
    and we thought it was her time and we sent for Doc. He come, and he turned the baby too, so he stayed right there all
    night because it is too far to town and we didn't have no way of sending him word in a hurry, because he hurried right
    on.
- speaker: Respondent
  text: Come morning there wasn't no baby, and Nellie didn't have the time neither. See, Doc sure was mad. He told us to be
    sure the next time not to send for him till we was sure. I thought it was a right good joke on him for he is educated
    to be a doctor and he thought it was Nellie's time too.
- speaker: Respondent
  text: 'Then she smiled meditatively: "Love to think of it, that was a good joke on me too for I am a midwife, and alone
    had me fooled too. I never had no training for seeing; it''s just a talent what I got. Guess I am nigh on to 34 babies
    for my relatives and neighbors, and other folks what has heard of me.'
- speaker: Respondent
  text: I never charge nothing for it. But if they want us to stay and miss spell, then I charge something. Folks say I ought
    to get registered with the state then I could charge something, but what good would that do, most of the folks what sends
    for us is as poor as I am.
- speaker: Respondent
  text: Guess you wonder why we had Doc for Nellie with us as a midwife, but she was so puny all the time I was scared of
    handling her case.
- speaker: Respondent
  text: Well, a sickness, it sure is a terrible, terrible thing, and we had our share lately," sighed Mrs. Thome. "My boy
    Joey, and the only just boy we got so far, he been mighty puny for most a year now.
- speaker: Respondent
  text: He took a swelling in his nose and his face hurt him so something terrible. I had Doc to see him, and he said Joey
    had the diphtheria of the nose. He doctored on him for a spell, but Joey, he didn't seem to get no better.
- speaker: Respondent
  text: Doc said then he must go to Tampa to a nose specialist and he got the County to help some. The County officer he weren't
    satisfied none, seemed like, with what Doc said.
- speaker: Respondent
  text: At first he had another doctor to see Joey. He didn't say just what was ailing him, but they took him to Tampa.
- speaker: Respondent
  text: Now, that doctor in Tampa said he had sinus trouble, and had a growth in his nose. He also claimed he must have a
    bone out of his nose, but he never done it. He just gave Joey some medicine to put in his nose and throat and sent him
    home.
- speaker: Respondent
  text: Guess he charged so much the County wouldn't pay it; I heard that Doc charged them nigh on to a hundred dollars for
    what he done for Joey. Joey's a mite better now, but when he gets in a cold his head hurts him so something terrible.
- speaker: Respondent
  text: He goes to school though most of the time, but he sure looks puny-like. Not so well neither. Got a breaking out on
    my legs and feet.
- speaker: Respondent
  text: It itches terrible. Use to hurt like when I'm a-scratching, and in the wet, then it sores. Doctor is some medicine
    for it and told us what to get to help it. But who ever heard of what you eat, making you sick of will, like she says
    it did? Melanoma right, homes.
- speaker: Respondent
  text: I also has the headache lots, but everybody else in the house is bothered by this stuff. Sad or hair, and lots of
    folks wants it to have it.
- speaker: Respondent
  text: I always had heavy long hair and I ain't never had it out neither, so why should I do it now? That's about as foolish
    as what you said, making you well or slow. A lot of maimes take Aspirin and it helps a lot.
- speaker: Respondent
  text: The nurse-woman said maybe it's my eyes that needs a fixing, but I ain't got no money for that and guess I wouldn't
    wear the glasses even if I had them.
- speaker: Respondent
  text: Please, ma'am, now as a wait, let me see how Nellie's getting on. She seems so powerful low-down like, half to fetch
    her mighty close.
- speaker: Respondent
  text: As Mrs. Moons talked she moved quietly toward the other room. While she attended her sister I looked at my surroundings.
    The house was just a shell, not even soiled. Flimsy partitions about six feet high divided the house into four small rooms.
- speaker: Respondent
  text: Doorways two feet in the partitions, and grimy muslin curtains were hung haphazardly in place of doors. The room in
    which I sat had the window stuffed with old newspapers.
- speaker: Respondent
  text: A small shelf against a wall held a comb, brush, soap dish, time meter and room and sided in supporting a crooked
    old mirror hanging above it upon a large nail. Two beds with dingy covers, a meager pallet upon the floor, a rickety chair
    and a rude unpainted homemade sloth closet, also hung with a griller or towel, completed the furniture of the room.
- speaker: Respondent
  text: Some clothing hung from nails on the wall at the head of one bed, and several pairs of shoes, old and worn, were tossed
    at random under the other bed.
- speaker: Respondent
  text: From all court/tile hung more or less askew, I had a fairly good view of seven or more of each room. The room in which
    I sat opened into the kitchen where a rusty wood-burning stove could be seen, together with a rough table and a narrow
    bench.
- speaker: Respondent
  text: Upon the table stood a large wet set of what looked like very grassy distillate over which swarmed a cloud of mosquito
    fruit gnats. Shelves against the wall behind the stove held an array of dishes, cooked uncovered food, towels, and bottles.
- speaker: Respondent
  text: Across the hall where rags and the in tent joy could be seen the foot of Nellie's bed and hanging from a nail in the
    wall beyond was a soiled night-dress. A narrow cot stood partly in the opening of the other small room adjoining the kitchen.
    All floors were extremely greasy and stained.
- speaker: Respondent
  text: The hall which led straight through the house was dark and grimy.
- speaker: Respondent
  text: Mrs. Thome returned to the room carrying an infant its thin quonset while a rose and wavered through the house. It
    was soon stilled as she began rocking vigorously and at the same time shaking the baby up and down in her arms.
- speaker: Respondent
  text: This seems to be a-resting a little better now, so I thought if I brought the baby in car whilst we talked, she might
    could sleep some.
- speaker: Respondent
  text: Lots of folks said it was a powerful sign for Nellie to have this baby after that crazy spell of hers, but we'll all
    be proud of it. And why shouldn't she have more younguns? It seems to be all over that crazy way now, when it's the Lord's
    will, younguns will come, don't nobody have none to say they shouldn't, I know.
- speaker: Respondent
  text: I got four now and I'll be right smart proud if more come as poor as we is. Younguns is a heap of expense and pastimes,
    they is a heap of worry and grief, like poor little Joey I been telling you about.
- speaker: Respondent
  text: But they is worth all the trouble and worry and expense. Harris he don't pay them so much mind. Of course he loves
    them and he does his best for them I reckon, but he just don't seem to get the pleasure out of them like I do.
- speaker: Respondent
  text: See them two little fellers playing out under that orange tree, right in the dirt? Well, that's my little girl, the
    youngest, Ruthie. She's just three years old. Johnnie there, is Harris's boy that Mo had long before that crazy spell
    came on her.
- speaker: Respondent
  text: Then we got a boy too, he's the one I been talking about, he's most eight years old. Willis, who is most fourteen,
    and Grace who is sixteen. Them's my two oldest daughters. I do hope they get home before you leave. I want you to see
    them; they both are so sweet and pretty.
- speaker: Respondent
  text: Well, that's my family of younguns so far. Seems like I never did have as many younguns as some folks do and they
    is so far apart in age alone.
- speaker: Respondent
  text: Mrs. Thome peers up the road. "Yes, I sure hope they get here soon, I know you will love them. I try to teach them
    good manners, and to stay dressed nice too, and fix themselves up.
- speaker: Respondent
  text: I never let them girls wash no dishes or clothes, or do no scrubbing, for that hurts their hands. The nurse-woman,
    she thinks it's so something terrible that I don't let Willis and Grace to work more.
- speaker: Respondent
  text: But poor little things, I guess they'll learn to work if they marry poor boys. Boys like them that learns hard work
    always has it to do, and I don't want to see my girls so that.
- speaker: Respondent
  text: Don't love him. That makes us kind of sorry too, for he sure is a good boy and don't have no bad habits still. I'd
    kind of like for her to marry him. Harris, he gets awful mad though and he says Grace is too young to even go with the
    boys yet, but don't think so.
- speaker: Respondent
  text: I want both my girls to marry young. Oh, Grace's been it working yet, he's just eighteen and still going to school,
    he's in the same grade with Grace, the eighth.
- speaker: Respondent
  text: But if they marry, he would get a job right easy, but he'd have to find some aim to do things for.
- speaker: Respondent
  text: Just then a tall, dark, rather sullen looking man strode into the house, and Mrs. Thome introduced him as her husband.
    "Harris, I thought you went to work for Vic. See this morning! And I told this here lets you was working, she wanted to
    ask you about the citrus lot and I been telling her the best I could.
- speaker: Respondent
  text: But what's the matter, you ain't working? Miss. Noels said there's two days work for you!
- speaker: Respondent
  text: 'After speaking politely to us, Harris said: "No, I didn''t go to Miss Boole, why should she be in such a hurry for
    that work, that place of hers has stood all summer without no cars. I been out looking for a house to move to. I''m not
    forgot we have to move and two weeks have, you know."'
