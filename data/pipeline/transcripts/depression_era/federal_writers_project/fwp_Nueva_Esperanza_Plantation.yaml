source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: That's all 114 land across the road, said Mrs. Barnwell. That dirt road was put through my place by the road department
    of Nassau County about six years ago. It extends for three miles right through the center of the old plantation.
- speaker: Respondent
  text: By the way, this Zetterow family is the fourth generation of their name in Nassau County. They used to own four ten
    hundred acres over here to the right, but they have sold most of it. It was wonderfully rich land, and belonged originally
    to a Mrs. Starratt. The Goffin family now own a considerable section which runs to the ...menu River, giving them large
    beds of oysters. At one time they did quite considerable business of running oysters commercially, in addition to disposing
    of quantities of fresh oysters commercially.
- speaker: Respondent
  text: I used to teach this boy, Oscar Zetterow's father, who one day brought his little sister, Irene, to school for the
    day. Irene was about five years old. Some of the children had found a nest with two young birds in it, blown down from
    a tree in a storm. My son, Woodward Barnwell, who was a second-grader at the time, brought in a little shrub, placing
    the birds on a small branch. The birds got excited from so many children chattering around them, and one, gathering strength
    as it warmed up in the sun from the east window, began to hop around on the floor, then suddenly raising its wings flew
    out the open window. Little Irene ran to Woodward and cried excitedly, 'One little bird flew out the window. Did you see
    it fly?'
- speaker: Respondent
  text: Oscar and his wife, Orb, run the filling station here, and they have a small store in the back with supplies of staple
    groceries. It is open day and night, they relieve each other at the work. I see Oscar is on duty now, so guess Orb is
    still asleep, having been up most of the night.
- speaker: Respondent
  text: Oscar, how about some ice? asked Mrs. Barnwell. I have a long Georgia watermelon in the car here, and must have some
    ice to cool it.
- speaker: Respondent
  text: Oscar brought out a 20-lb piece of ice, well wrapped in heavy paper, and placed it in the box, with the cold drinks
    and milk, along with some canned meats and a loaf of bread to make sandwiches when we arrived at our destination.
- speaker: Respondent
  text: Turn left here, Mrs. Barnwell instructed the chauffeur, Dallas, and keep right on this county road until we get to
    the Avenue.
- speaker: Respondent
  text: The Avenue, Mrs. Barnwell explained, is about a mile farther on, and turns west, flanked on either side by immense
    old live oak trees, leading to the yard gate of the old plantation manor house.
- speaker: Respondent
  text: You want to know how we rate this nice road? Well, you see it was always just a country lane, sometimes with trees
    blown across by storms, and about seven years ago I wrote the State Road Department, calling the attention to the length
    of time our family, the O'Neills, have been living here over a hundred and fifty years paying taxes and doing our part
    towards the upkeep of the county, and asked about their building a road through the place, as it was a kind of county
    highway. It was not long before they sent a survey party out, and the result was this nice dirt road three miles long
    and thirty foot wide through our property.
- speaker: Respondent
  text: Look at the cattle! Every year I fatten free about two hundred head of cows and calves belonging to neighbors that
    range free over my land. There used to be fences, but they are all gone now, and there is no way of keeping them in bounds.
- speaker: Respondent
  text: The original grant to my great-grandmother comprised 1,073 acres, given to her for distinguished services rendered
    by my great-grandfather, Henry O'Neill, to the Spanish Crown when Florida and a large part of Georgia was under Spanish
    dominion. The seat of government for this section was at what is now St. Mary's, Georgia, a few miles northeast of Fernandina.
    My great-grandfather was killed by a Spanish outlaw, and for this his widow was given this immense grant of land, a captain's
    mansion, and also a Star of Montpelier, a kind of special award signed by the King of Spain. Of this latter, I just learned
    thirty years ago, through an interested friend who went to Spain and found the report of the grant, the pension and the
    award in the Spanish Archives in that city.
- speaker: Respondent
  text: After Henry O'Neill died, his widow, Margaret, married William Hollingsworth, of Saint Marys. They had two daughters,
    Alisa and Mary.
- speaker: Respondent
  text: Alisa Hollingsworth married a Mr. Baird, and Mary married Levan Gunby, an Englishman. My mother was a daughter of
    Mary and Levan Gunby.
- speaker: Respondent
  text: In an old deed I was looking over three years ago, I discovered that my mother's grandfather, William Hollingsworth,
    was given a memorial in Duval County, because during the Revolutionary War he had with his troops won a battle at 'Camp
    New Hope' named for our New Hope Plantation. The spot bears a marker also with this information.
- speaker: Respondent
  text: As she talked we were driven through the rich soil of the old four hundred-acre cornfield, now grown up in shrubs
    and young pine trees.
- speaker: Respondent
  text: Said Mrs. Barnwell, giving each 174 acres. This lot on the right was my sister, Florence's share. She died many years
    ago, and her children now live in New York.
- speaker: Respondent
  text: The land to the left of the road belongs to my brother, Dunbar, who lives in California.
- speaker: Respondent
  text: Through some litigation, I heard my father say, one hundred and eighty acres went to outsiders.
- speaker: Respondent
  text: My parcel is a little more than the other heirs, as my husband and I bought out some of the others' share, and I have
    one parcel of 100 acres, one of one hundred and seventy-four acres where the old homestead is, and another small lot of
    thirty-five acres, a little more than three hundred acres, all told.
- speaker: Respondent
  text: The land on the left is a section belonging to my son, O'Neill Barnwell, two hundred and ninety acres, goes down here
    about two miles west to Lanceford Creek, or as it is now known Clark's River and east to the Amelia River.
- speaker: Respondent
  text: My land is all being turpentined, under contract to Powell and have. Mr. Powell lives in Jacksonville, and Mr. Shave,
    in Fernandina. They pay ten cents a tree, which brings in around five hundred dollars per year. In six or seven years,
    the turpentine will be exhausted, and I'll have the trees back, either all dead or fit only for pulpwood.
- speaker: Respondent
  text: Right along here to the left was the big four hundred acre cornfield, as I remember it when a young girl, and, to
    the right, after the war, was the vegetable section, where they raised carrots, cabbages, beets, potatoes, peas, and other
    garden truck, which was grown in such quantities that the field hands used to gather it, cart it to the dock on Lanceford
    Creek, and load it on barges, from where it was loaded direct into freighters and shipped to the New York markets.
- speaker: Respondent
  text: Later on it was planted in immense vineyards of Niagara grapes, which did very well at the beginning, but finally
    died out, as that species of grape requires lots of water, and this too for some reason, a particularly dry section.
- speaker: Respondent
  text: Well, here we are at the Avenue. It's only about half a mile through this shady grove of big live oaks to the house.
- speaker: Respondent
  text: We have been traveling north on the county road, now we're going due west on the avenue.
- speaker: Respondent
  text: Here is the arch we passed under the arching limbs of two large live oaks, one on either side of the drive.
- speaker: Respondent
  text: In that big grove over there to the right was our family schoolhouse, where we were taught by a tutor until we were
    sufficiently educated to go off to college.
- speaker: Respondent
  text: There at the end of the Avenue is Lanceford Creek, or Clark's River, as we call it now. Smell the salt water? The
    tide is out, and you can see a good view of the 'oyster tree' a live oak almost in the river as the land has eroded away.
    See the oysters clinging to the roots and the branches that are in the water at flood tide?
- speaker: Respondent
  text: The chauffeur stopped the car and got out to open the gate to the yard fence around the house, to keep the cattle
    out.
- speaker: Respondent
  text: You can park right under the old cedar tree, where we'll have our lunch, said Mrs. Barnwell; as he brought the car
    up under an age-old scraggly cedar, the main trunk towering up for thirty feet.
- speaker: Respondent
  text: We alighted after an hour's ride from Jacksonville over almost the identical route that used to require two and a
    half hours in a light buggy drawn by a fast-stepping horse.
- speaker: Respondent
  text: The three-story house built in 1882 from lumber used in the construction of the original house, erected by Mrs. Barnwell's
    father, Henry O'Neil, when he brought his bride to this spot in 1832, loomed stark and desolate. Minns paint, the hand-hewn
    weatherboarding, the open porches running the full length of the house on the south and west sides, with the upper galleries
    the same length. The huge windows with red-painted shutters from floor to ceiling, indicated a grandeur one with the past
    century. The handsome hand-carved black walnut doors front, back, and in the partitions of opening rooms alone retained
    the hand polished luster of one hundred and seven years.
- speaker: Respondent
  text: The house faces west, on a point marking a wide turn in the Clark River to the north. Between boxed hedgerows wide,
    weatherbeaten steps lead up to the piazza, with hand wrought furniture, arm chairs and settees of oak and palmetto strips,
    shaved with an adze and fashioned into comfortable resting places by hands of former stalwart men in the family, now passed
    to their reward.
- speaker: Respondent
  text: 'We followed with more or less reverence, as Mrs. Barnwell, now fifty, led the way down the side porch to the south
    entrance to the house where she was born in 1904, where she and her three sisters and four brothers led happy, carefree
    lives in the glamorous days before the War between the States. Saving her cane she is recovering from a broken right ankle
    suffered six months ago from slipping on the stairway in the Jacksonville home of her lifelong friend, Mrs. Arthur T.
    Williams she said: Down through that avenue of trees along the north bank of the cove was the double row of cabins occupied
    by the hundred slaves owned by my father. The buildings are all gone, but some of the old brick fireplaces and chimneys
    of the gibbing remain. There are twenty in all, and they extended south for a half mile, as each cabin had its garden
    spot, its pig-pen and chicken house. You can still see traces of the road between the cabins.'
- speaker: Respondent
  text: My father and mother planted those four magnolia trees in the south yard between here and the fence, and also the
    big bay tree, when they came to live here in 1832. One of the lovely old trees has died there is the stump. I had a tree
    surgeon work on it, but it was too far gone. The big one over there the last in the row is twelve feet in circumference,
    six foot in diameter, with a spread of eighty feet. I believe it is the largest magnolia anywhere around.
- speaker: Respondent
  text: One time an insurance man came out here to look over the buildings, and said he would rather insure that tree, as
    he believed it was a better risk than the house.
- speaker: Respondent
  text: About fifteen hundred yards northeast of the house is the old cemetery where my mother and father, two infants, and
    one or two other members of the family are buried. There are no headstones to indicate which is which. A strong wooden
    fence, pilings painted white each year has long ago been torn down by wandering cattle, and I had the plot enclosed with
    a coping of concrete, but I know it is all overgrown with brambles and shrubs and now we would have a hard time finding
    it.
- speaker: Respondent
  text: At the sound of our voices, a middle-aged woman came out of the front door, and introduced us - Mrs. Toomer.
- speaker: Respondent
  text: Together, Mr. and Mrs. Toomer came through Jacksonville and having been informed by friends that Nueva Asperanza was
    not occupied, asked if they might come over for the summer and make a few repairs, as everything is in such a dilapidated
    condition. I gave permission for them to occupy the place it is delightful here in the summertime. Mr. Toomer is a musician,
    and we thought maybe he could get some of my songs, old plantation work-songs, spirituals, and negro melodies that used
    to be sung on the place, in shape for publishing.
- speaker: Respondent
  text: They have a boarder, a carpenter, and he is to fix the fence, and do other work to help pay for his room, board and
    lodging.
- speaker: Respondent
  text: Mrs. Toomer acknowledged the introduction, and on being asked where her husband was, launched into a detailed description
    of a near tragedy the swing in of the old dock, which gave way when a truckload of their friends from Jacksonville, including
    the mother, father, two young girls and a friend, were crossing ten days ago.
- speaker: Respondent
  text: Mr. Toomer, observing that in their excitement they were all gathering in one spot, yelled frantically from his position
    near the old well, fifteen feet away, for some of them to get back on land quickly. The warning came late, and as he ran
    at the first cracking of the rotten timbers, he got on the falling dock just as it went down with the other five and his
    wife, and was pinned under a fallen log which lay across both ankles.
- speaker: Respondent
  text: The mother and father and Mrs. Toomer extricated themselves, the two young girls fainted and fell to the beach, and
    Mr. Toomer was unable to move.
- speaker: Respondent
  text: The two girls each had suffered sprained ankles, and being unable to walk, were carried to the truck, along with Mr.
    Toomer, and the father took them to a physician in Fernandina as quickly as possible.
- speaker: Respondent
  text: The girls' injuries turned out to be bad sprains, but Mr. Toomer suffered a broken right ankle, and was returned to
    the plantation by his friends, who went back to Jacksonville.
- speaker: Respondent
  text: He faces six weeks of invalidism, which he says is very trying, as he had planned to do so much to help restore the
    old place and the outlying buildings.
- speaker: Respondent
  text: The Toomers, from their own conversation, are victims of wanderlust.
