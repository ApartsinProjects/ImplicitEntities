collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How did you earn the money?
- speaker: Respondent
  text: Well, I cleaned three offices every day, a doctor, a dentist and a lawyer, and received $1.60 per month from each
    one. Then I kept a barber shop in order, and part of the time I drove a taxi, and had a little piece of ground outside
    of town where I raised the feed for my horse. I had some help from home, but not enough to enable me to attend school
    without earning part of my expenses. I was living again with my grandmother, and she lived to see me finish my junior
    year at college. She lived to see me a man, and had helped me to a place where I could take care of myself. She was a
    good Christian woman, and it pleased her to see her grandson making good. I became superintendent of the A.M.E. Sunday
    School when I was sixteen years old, and continued in that office until I moved from Salisbury. That also was a pleasure
    and a comfort to my grandmother.
- speaker: Interviewer
  text: Is it true that Father Devine was in Miami a year ago?
- speaker: Respondent
  text: I think it is; many of our people are carried away with him, and there are some who follow him who are not colored.
- speaker: Interviewer
  text: What is your opinion of him?
- speaker: Respondent
  text: Oh, he's just another racket, just another scheme to get ignorant, easily impressed victims into the net. Nobody knows,
    and nobody seems to be able to find out where he gets his money, but he gets it and keeps on going. We have to reach our
    people through the church and school; charlatans like Father Divine work upon the credulous and the only way to save them
    is to cure them of their credulity.
- speaker: Interviewer
  text: What can you tell us about the Funeral Insurance Plan to which so many Negroes adhere?
- speaker: Respondent
  text: 'Well, that is another racket. It was started as a means to help colored people save towards a fund that would pay
    funeral expenses when needed. We found that funerals were costing too much, and people were being fleeced and being made
    to pay often more than double what the funeral really cost, and unless they fulfilled every requirement laid down in a
    contract hard for them to understand, they did not get any benefits at all. For instance, the contract required that the
    death must occur in Dade County. If you happened to be in another county and met with an accident, your contract was void.
    If you were all paid up except for one payment which was not due yet, you lost everything because you were not paid up
    at the time of death. The racketeers were so persuasive that you could not keep our people from signing up with them.
    We got up a committee and went to Tallahassee and tried to have these racketeers dealt with by legislation on the ground
    that they were doing an insurance business without a license. The effort failed because it had white backing. Then, we
    saw that we must fight fire with fire. I at once organized a funeral benefit society of my own, had canvassers all over
    colored town, and registered hundreds of subscribers. But I also did this: I gave them a square deal, so that they got
    the worth of their money, and I also made it a leading item in my plan, that if they died before their contract was paid
    up, they were properly buried and the family had time to pay the balance, and no matter where they died, they were given
    burial. They did not have to die inside of Dade County; that''s how we got rid of that racket. There are many more partial
    payment and installment payment plans that must be taken care of. I intend to serve my people in this way as long as I
    live.'
- speaker: Interviewer
  text: Did your son attend the Miami schools?
- speaker: Respondent
  text: Just the grade school. The colored high school was not good enough when he was here. We have a different man this
    year, and he has brought the standard up and is still building a school where we can send our children with perfect confidence.
- speaker: Interviewer
  text: Where does voodooism come from and why does it have such a hold on the Negro?
- speaker: Respondent
  text: It comes from the Bahamas and from Jamaica and especially from Haiti, and it holds the Negro because he is naturally
    a superstitious creature. That is one of the things which the church and the school must persistently and strenuously
    resist. We have to educate our children to know how foolish these things are, and give them religious instruction that
    will turn their hearts to the true God and the teachings of Christ. We have to lift them out of their superstition and
    give them new ideals.
