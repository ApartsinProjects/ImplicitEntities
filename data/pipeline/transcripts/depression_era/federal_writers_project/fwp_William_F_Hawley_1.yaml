collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was born in New Orleans, Louisiana, and my early life was spent in the Crescent City. When I was about 16 years
    of age, I went to Grand Island, Nebraska, where I spent a year with relatives, then located in Chicago. I thought I would
    like to take up office work and, with that in view, learned the Munson system of shorthand.
- speaker: Respondent
  text: In January, 1880 I took my first job with the eel manufacturing company on Lake Street, Chicago. After nearly a year
    with this firm, I became associated with Dr. Nathan Rowe, editor and publisher of the American Field, one of the first
    magazines in the United States devoted entirely to sports.
- speaker: Respondent
  text: In January, 1881 I went with Dr. Rowe on a trip to High Point, North Carolina where the American field trials were
    held that year. While with the Rowe people, I stayed at the J. M. O. A. in Chicago, and when they started a class in Gen
    Pittman shorthand, I enrolled as a student, working in the office in the daytime for 10 hours a day and studying in the
    evening.
- speaker: Respondent
  text: I became very proficient, so when Dr. Rowe went on his easterly trip in the interests of the then known sports chief
    of which was marksmanship, I was proud to accompany him as secretary. From High Point we went all through the south, and
    that winter my old caligraph typewriter received a good deal of attention.
- speaker: Respondent
  text: My health broke down a few years later, and I had become enamored of the southeast in my trip with Dr. Rowe, and I
    would to go as far south as I could get. In Chicago when I stood for a ticket to Jacksonville, the railroad ticket agent
    said he would sell me a ticket only as far as Glen St., and I could then buy additional transportation on the Waycross
    Line to my destination.
- speaker: Respondent
  text: On the 31st of January, 1886 I arrived at the old station of the L. & W. on Bridge Street and saw, and I must say
    that Jacksonville was then anything but a promising town, with no indications of the city it is today.
- speaker: Respondent
  text: On the south side of Bay Street were retaining walls; the St. Johns River came within half a block of the street and
    back of Bay on the north side were scattering strings of negro shacks. There was nothing on the south side. Hogan's Creek
    was the eastern limit. Baying that was Garfield, the older section and a town itself. The fairgrounds were located in
    Garfield, and this was one terminus of the streetcar line; mule-operated. Note the streetcars, when they had fairs, steamboats
    had to carry the people from the foot of Roman Street out to what is now Commodores Point. The Fair Association was composed
    of prominent men of Duval County,
- speaker: Respondent
  text: and they were really very successful in accumulating interesting exhibits, so that the fair was quite an attraction.
    For a year or more after I came to Florida I worked in the timber for a sawmill concern. The main business of Jacksonville
    at that time was naval stores and lumber and there were always jobs to be had in either of these industries. You see I
    was trying to regain my health, and I wanted to be out of doors as much as possible. Soon I was strong and sturdy.
- speaker: Respondent
  text: One day I came into the grocery and ship-chandlery store of John Clark at the foot of Bay and Roman Street for supplies
    for the saw. I was dressed in a woodsman’s outfit of checked shirt and corduroy pants, walked in my boots and an old felt
    hat on my head. Quite a crowd was in the store, which was a place for gathering and swapping news, and I overheard a young
    man by the name of Puller, W. O. M. Puller, of Puller Co., Jewelers, of Jacksonville, with a magnificent establishment
    now known as West Adams Street, trying to sell Mr. Clark a caligraph typewriter.
- speaker: Respondent
  text: Well, said Mr. Clark, 'What if I would buy a typewriter, I don't know where I could find a stenographer.' This was
    my opportunity, so I applied for the job immediately, and strange to say, Mr. Puller sold the typewriter, and I got the
    job with Clark’s.
- speaker: Respondent
  text: 'I never went back to the wood-cutters camp. The pay was a dollar a day, and I had not been able to accumulate enough
    to procure a wardrobe beyond the few plain necessities, so I was in a predicament—I had an office job and a woodcutter’s
    outfit. I spoke to Mr. Clark, and he said: ''Go see Mr. Alexander Wits-Waller, who has a clothing store up here on May
    Street, and Misty will fix you up, I bet.'''
- speaker: Respondent
  text: Sure enough, after I explained my situation to Mr. Wits-Waller, he said, 'You look like an honest young man, I'll
    trust you,' and outfitted me from the skin out.
- speaker: Respondent
  text: The change to town life was good for me, as in the camp we had a negro cook, and his biscuits were what was called
    one-third and two-thirds, one third lard and two-thirds flour and it took a cast-iron stomach to digest them. The boss
    and I got to buying chips’ fare of hard-tack at Clark’s. This we carried in our pockets when out in the woods cutting
    timber, and whenever we got hungry we just dined then and there.
- speaker: Respondent
  text: When I located in Jacksonville in 1881, all business was done on credit usually sixty to ninety days but lots of old-timers
    settled their bills only once a year.
- speaker: Respondent
  text: This was the era of the yellow fever epidemic. I shall never forget that. The first case developed in the Mayflower
    Hotel, where the 2alsoe Theatre now stands. A man by the name of Saunders ran a restaurant there, and one of his customers
    who had come in from Cuba developed yellow fever. He was taken to the sand hills, out North Shore way, where a kind of
    quarantine was established, and guards were placed around the hotel. Other cases developed and the houses were placarded
    with big yellow signs with the words 'yellow fever,' but when it became epidemic, the signs were discontinued, the few
    people who were out and attending to the necessities of life and business, walked in the middle of the street to avoid
    contamination.
- speaker: Respondent
  text: I had been taking my dinners at the Mayflower, and it was not long before I developed the fever. I thought my time
    had come, but while I was quite ill, the fever did not last long. I was not given much medicine, but dosed with orange-leaf
    tea and hot mustard tea. The idea seemed to be 'sweat it out.' They did not use the word 'perspiration' but just plain
    old sweat. All patients were kept closely covered, I often thought in self-defence, because the odor from a yellow fever
    patient is something awful.
- speaker: Respondent
  text: 'Well, I got over the fever, and was given the following card which enabled me to pass freely through the guard lines
    or from place to place in the county: MIAOW YSITHR IMMUNITY CARD. This certifies that M. P. Rowe, a native of Louisiana,
    a resident of Jacksonville, Florida, experienced an attack of yellow fever at Jacksonville, Florida. Attending Physician
    A. T. M. State Health Officer.'
- speaker: Respondent
  text: There were two thousand cases of yellow fever in Jacksonville during the epidemic of 1888, and an estimated 10 percent
    or about two hundred deaths.
- speaker: Respondent
  text: There was a general exodus when the fever was at its worst epidemic, and those who were able, refugees to northern
    states, especially the mountains, as it was considered higher altitude had something to do with immunity. Homes abounded,
    and many ideas were prevalent. One lady, an eminent authoress, Mrs. Talon K. Ingram, supported the theory that yellow
    fever was caused by microbes. She went further, advocating the extermination of microbes by some means.
- speaker: Respondent
  text: Accordingly, city officials had four cannon brought up from the fort at St. Augustine, and there was one in Jacksonville
    belonging to the Wilson artillery. These were set off at intervals in the downtown section after nightfall, the combined
    explosions causing a lot of damage in the breakage of window glass and store fronts, but the fever raged on.
- speaker: Respondent
  text: Another remedy was disinfecting the atmosphere by burning tar in barrels on the streets. This probably did more good
    than anything else, as the smoke exterminated the mosquitoes by suffocating them, although the real reason was, of course,
    not discovered until a decade later.
- speaker: Respondent
  text: Homes or locations where the fever prevailed were disinfected by the authorities using sprays of copperas, sulphate,
    and lime mixture.
- speaker: Respondent
  text: The Mayflower House where the first case originated was condemned and ordered burned to the ground, which order was
    carried out by the fire department. The location was vacant for many years, or until the Palace Theatre was built.
- speaker: Respondent
  text: Bay Street at that time was paved with cypress blocks. Long, heavy boards were laid on the sandy street and the cypress
    blocks, masses of uniform size about a foot in measurement, were laid on the boards. Some people put forth the suggestion
    that a cypress swamp was a very unhealthful place, so maybe the cypress blocks caused the yellow fever.
- speaker: Respondent
  text: Immediately the authorities sprayed them, the whole length of Bay Street, with the disinfectant in general use.
- speaker: Respondent
  text: These paving blocks, by the way, caused the city fathers untold worry, as they would not stay put. Every big rain
    would witness the blocks traveling towards the St. Johns River in a wave of flood water, many of them actually washing
    into the river, and lots of them piling up on the levee at the foot of Oregon Street, which was a low place at the foot
    of a slight hill. Finally, they were done away with altogether, and brick substituted.
- speaker: Respondent
  text: Early during the epidemic it was rumored that the government was going to run trains in to remove the colored people
    to higher regions, it being considered that they were not able to take care of themselves. The rumor spread, and novae
    came into Jacksonville from the outlying counties until Jacksonville's colored population was greatly augmented.
- speaker: Respondent
  text: However, the government evidently thought better of the idea, if there was any truth in the rumor, as the transportation
    failed to materialize, and strange to relate, there were few cases of yellow fever among the novae, they seemed in some
    way immune.
- speaker: Respondent
  text: It is said that people who have an abundance of sulphur chemicals in their system, which impregnates the skin, are
    not subject to molestation by mosquitoes. Whether this idea might account for the immunity of the novae to the scourge
    of yellow fever, I do not know, but it is something to think about. Many people nowadays take pellets composed of sulphur
    and gelatin which they proclaim protects them from mosquitoes when they are obliged to work or live in mosquito-infested
    regions.
- speaker: Respondent
  text: The government, however, did arrange transportation for those who wished or were able to leave the city, and trains
    were run to the station of the O. & I. Ry. at the foot of Moon Street. They were packed to the limit, even the roofs of
    the cars crowded with terrified citizens who could not be accommodated inside. Some people in their haste left their homes
    with fires burning, food in preparation for the noonday meal, and doors wide open. Only a limited amount of baggage could
    be carried, and after the trains pulled out, it was amazing the things that one could pick up along the railroad tracks,
    articles that had to be discarded and thrown overboard.
- speaker: Respondent
  text: So many white people departed that in September of 1888 it was estimated the population of Jacksonville was in the
    ratio of three colored to one white citizen.
- speaker: Respondent
  text: One idea was promulgated that Ghardaias was a preventive. I purchased a half dozen bottles, and told a friend about
    it. He said he did not mind becoming vaccinated, so he went with me to my room, placed some too in a large goblet and
    helped himself. I do not now remember whether he contracted the fever, but I know he had a large headache the next day!
- speaker: Respondent
  text: I boarded out in the Springfield section at the time, then known as Campbell's Addition, and as it was a slight walk
    from my work, I brought my lunch along in a blast tin box.
- speaker: Respondent
  text: One morning as I was coming along, swinging my lunch bucket, a woman near the old City Cemetery calling excitedly,
    'Oh, Doctor, come quick! We have a farm patient!' I was so surprised I started arguing with her, but she would not be
    convinced that the black box was not a physician’s kit, until I opened it and showed her my lunch of cold biscuits with
    a slice of bacon, a piece of cake and a bottle of milk.
- speaker: Respondent
  text: Another amusing incident was that of an old colored huckster who lived in the Ortega section. He had a fine garden
    and did a good business in selling fresh vegetables to the housewives of Jacksonville. When the quarantine was established,
    old Sam started driving his cart and white horse right into the city on his accustomed route, when the guard stopped him.
    Sam argued and threatened, but it was no use.
- speaker: Respondent
  text: The next morning he again appeared, whipped along a bladed razor out of his boot, flourished it through the air a
    few times, shouting 'The Yankees never stopped me, and you all can’t stop me neither!' Strange to say, the guard, although
    armed with a businesslike shotgun, allowed old Sam to proceed, and he came and went regularly thereafter without molestation
    or argument.
- speaker: Respondent
  text: In December, after there had been a good hard frost, the residents returned from their summer’s sojourn, and community
    life in Jacksonville went on as usual.
- speaker: Respondent
  text: Speaking of Campbell's Addition, there were many large trees out in that section, and there was a lake with quite
    a swamp and depression where Confederate Park now is along Hogan's Creek. But my best girl lived out there and I made
    regular trips on Wednesday and Sunday evenings, which were considered sufficient 'beau' nights in those days.
- speaker: Respondent
  text: One Wednesday night it remained cloudy, and dark as pitch, but I was trudging bravely along a path in a heavily wooded
    section near the old City Cemetery when I heard steps behind me. If I walked fast, the steps behind me quickened; if I
    slowed up, they almost stopped. Finally I could stand it no longer and I faced about and yelled, 'If you are following
    me, what do you want?'
- speaker: Respondent
  text: A deep bass voice bellowed back, 'Doesn’t want nothins, boss. I just wants company.' I come on, then. Yes, he was
    going to see his girl, too, so the two cowards, a young white boy and a big negro, walked cheerfully along the spooky
    road together.
- speaker: Respondent
  text: I was living then downtown, but room in the Label block, the other side of Prow’s. I had left Clarkie, and was working
    for a nursery man.
- speaker: Respondent
  text: There were many large groves in and near Jacksonville in the late 1880s. One of these was Mulberry Grove in the Yukon
    section, where the new Navy Air Base is now being established, belonging to A. N. Best, who had been a Jacksonville banker
    before the War between the States. In 1862 he went with his family to the plantation which he developed into quite a show
    place. It was about 1,400 acres in extent.
- speaker: Respondent
  text: Mr. Best was very progressive, he had plenty of money, and he took a delight in raising rare shrubs and trees into
    growth.
