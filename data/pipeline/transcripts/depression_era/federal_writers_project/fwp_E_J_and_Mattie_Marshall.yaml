collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me about your background and how you came to live here?
- speaker: Respondent
  text: I was born in Ageflold, South Carolina, on November 16, 1869. My mom and dad were Asserd and Frances Marshalls, both
    deceased now. They were former slaves. Their mother, his name was Crafts, and his family were considered aristocratic
    folks. They were well known in South Carolina. My pa brought $30,000 from Newberry to Aiken, South Carolina for them one
    time. It was to pay for a large plantation that the Crafts bought.
- speaker: Interviewer
  text: What brought you to Florida?
- speaker: Respondent
  text: I came to Plant City from South Carolina and worked for the Western Union Telegraph Company. They trained me as an
    electrician when I was young. I also had the distinction of being promoted in less time than any man on the job. In three
    months I came from apprentice to line repairman. At that time, the Western Union was stationed at Lake, Florida. Later
    I came to Tampa to work in the electric market. I lived in Hillsborough County around 43 years, right between Tampa and
    Plant City. I have been living here 38 years this coming January.
- speaker: Interviewer
  text: What can you tell me about the community here when you first arrived?
- speaker: Respondent
  text: When I first came to Plant City, there were not very many colored folks here. Now the Negroes are just about half.
    There are more living within the city limits. I moved into this house in 1910. The strawberry business isn't a real business.
    The cost of a nursery is from $20 to $25 an acre. I cultivate eight acres now. See that nice tractor over yonder in the
    field? That's mine. The colored man running it is a fine Christian-hearted fellow, and he's reliable too.
- speaker: Interviewer
  text: What are some of the challenges you have faced as a farmer here?
- speaker: Respondent
  text: Some of the tenants make money here, and some don't. Some live their own lives. They mine other things besides strawberries
    too. They practically feed themselves off the land. The $15 shot they have to pay for the use of the land is too much,
    but that's the boss price. What can I do about it? One thing that worries me about the game is the differences in price
    for our goods. They give us colored farmers one price for our fees when the market is calling for another. I talked to
    a big grower from up Norfolk, Virginia. That's the place where they build ships, isn't it? They raise stuff here and sell
    it at a greater profit. If you don't sell through the cooperative and attempt to ship independently, I hear birds here
    were ahead of your shipment, then the advantage goes to them. We poor folks can claim to have no education. I only had
    four years of schooling.
- speaker: Interviewer
  text: How do you feel about the political situation and your involvement?
- speaker: Respondent
  text: I haven't voted in the last two years. I got disgusted. I always voted Republican. I dance my politics. If I do it
    again, it's gonna be Democrat. That's what white folks disgust me with the Republicans. They are a small group. For us,
    they do in days the people's best. That is what is a big mess. We do have to be sly and for the good of all, not just
    the party.
- speaker: Interviewer
  text: What do you do for recreation and health?
- speaker: Respondent
  text: Since past basic health is the best globe, but it does us good and builds us up in health. All folks' health has been
    pretty good as tested. I like boats outdoors. Base balls is a mess. The boys that play baseball and banana other games,
    but that's plus fools' advice. I take mine in the garden with the snake music. You can sit something cool off that.
- speaker: Interviewer
  text: Do you raise livestock as well?
- speaker: Respondent
  text: I think in non-farm areas, I miss raising livestock. I think to make a so at it, ranch, and there's madonna too. In
    most, I own a cattleman. That's a little better. I raise eggs and bottom. You must have a horse to plow. I will run up
    them cattle. I sure like cattle. I keep talking about those.
- speaker: Interviewer
  text: How has the depression affected your business?
- speaker: Respondent
  text: Since the depression came, things have been impaired. I also up real business about 40 years. I never tried to be
    a leader all my life, but it's made difficult like to America. Jo's. I lost lots of property. I sold that. Like times
    has lost stars the last several years, I had to get rid of it. I realize a party fair living from my income. I got my
    share after I settled with.
- speaker: Interviewer
  text: Can you tell me about your church and community involvement?
- speaker: Respondent
  text: To visit some or do well, it is pure to yourself. On the field, I try to keep on his side. See a preacher for the
    Allen Chapel AME Church. The pastor is Rev. Cooper. I belong to the church free since birth. I have a lifetime of service
    in it. Also, tribute to a tireless life. I don't go to church much now as I used to. When I get older, you seem to slow
    down a little. Well, get that way sometimes. I like some fun of people not seen from the new.
- speaker: Interviewer
  text: What else would you like to share about your life here?
- speaker: Respondent
  text: Besides the great existence with the Enterprise tends to lead to the messer business, the mike and file aren't regular
    as you go. Tan is a good, kind man, but some come to church without it, feel less done. I can go or lay down a dollar
    and make cells my name so loud, you hear it all around the block. But that, you barely notice he dropped in any time.
    He hardly says a thing to you. That's what I mean. Can I tell you about that general business? You bet I never often things
    to watch. What we watch are here. I care most of yet lost out on the oil list about better. I love good old southern broads
    and believe I sure got a memo with her to go. It's ten. Um, that's best your life.
- speaker: Interviewer
  text: What are some of your hobbies or interests?
- speaker: Respondent
  text: I also like raising hens, means, 'seofects' heifers, starter, fries, all kinds of stock. I have a fine flock of White
    Rock chickens and am also trying to get a new strain of these from the Willis Tennessee. The some home neck that weighs
    from six to seven pounds. I also farm the roads.
