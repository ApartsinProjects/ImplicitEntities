collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: About third or fourth cousins a little too far back to brag about but it is true that his great-grandfather and great-great-grandfather
    were brothers. My great-great-grandfather was Judah Benjamin, and there have really been Judahs, Juliens, and Philips
    among the boys of the family. Our forebears were German Jews.
- speaker: Respondent
  text: Judah Y. Benjamin's father went to England and from there to the West Indies. His name was Philip Benjamin, born about
    1782. His mother was Rebecca de Mendes Benjamin, and they emigrated from London, England, to St. Thomas, British West
    Indies, in 1808, shortly after their marriage. Judah was born there about 1811, in the town of St. Croix. There was an
    elder brother, Charles, and two younger sisters. The son Benjamin moved to the United States, where they had originally
    intended to go, about 1818, landing at Wilmington, North Carolina.
- speaker: Respondent
  text: Young Judah attended school for three years at Fayetteville, North Carolina, later attending Yale University from
    1824 to 1827, which he left at the end of the three-year period without taking a degree. The family removed to Charleston,
    South Carolina, and after many vicissitudes, during which the father died, settled in New Orleans, where Judah had established
    himself as a lawyer, becoming associated with Thomas Bell, who later became Chief Justice of Louisiana.
- speaker: Respondent
  text: His older sister married Abraham Levy in 1826, and his younger sister became the mother of Julius Kruttschnitt, the
    railroad manager and promoter, who was born in New Orleans in 1864. His own mother, Rebecca de Mendes Benjamin, died there
    in 1847.
- speaker: Respondent
  text: I am interested in history, and a few years ago I made a special trip to New Orleans to get more light on Judah P.
    Benjamin's life in Louisiana, but there is not much to be learned now outside of what has been originally published in
    Hero Sutler's 'Biography of Judah P. Benjamin' and Lester Darnick's 'History of the Race in America.'
- speaker: Respondent
  text: It seems from investigation that Judah had a very bad habit of tearing up all personal letters and comments, so that
    very few personal documents have ever been available.
- speaker: Respondent
  text: My son has been most anxious to consult original family records in Germany, with a view to building a 'family tree'
    so to speak, but conditions there for the past several years have made that an utter impossibility, and now we may never
    be able to learn anything from that end.
- speaker: Respondent
  text: 'My father, Lazarus Benjamin, came to the United States in the latter 1800s. Then people emigrated those days, they
    usually had family connections to whom they could appeal for counsel and assistance until they became established in their
    new affiliations. My father went first to Charleston where he had an older brother, Dion. Two other brothers came with
    him from Germany: Solomon and William, who located in the South Carolina city, but saw further, more of a pioneering spirit,
    came to Florida, and located in Ocala in 1860, just shortly before the war between the states.'
- speaker: Respondent
  text: He had become an American citizen and when the South seceded, he promptly enlisted in the Confederate army, serving
    throughout the war.
- speaker: Respondent
  text: The only letter I ever saw from Judah P. Benjamin was one directed to my father's brother, regarding his discharge
    from the Confederate forces. It was in our possession for some time, but I loaned it to my cousin in Atlanta, who is a
    direct descendant of the paroled soldier, and have not seen it for some years. I do not know if that letter can be located
    now.
- speaker: Respondent
  text: My father had continuous residence in Florida from the time he located in Ocala until he died in the 1880s.
- speaker: Respondent
  text: I remember hearing him say that on his return from the war he stayed all night at Joe Neokham's house in Wade. Neokham
    had been a railroad center and quite known before the war. Neokham operated a store there.
- speaker: Respondent
  text: On returning to Ocala he engaged in the trucking business, and Geo. Munger who used to clerk here in the county courthouse
    told me he checked freight delivered by father to the boat line running from Ocala to Silver Springs, his first job as
    a young man just starting out on his own.
- speaker: Respondent
  text: My father built the first artificial ice plant in Ocala in 1880, and later installed two more in that section of Florida.
- speaker: Respondent
  text: My brother, Day, and I were both born in Ocala. We were educated in Atlanta, Georgia.
- speaker: Respondent
  text: My first trip to Jacksonville was by train in 1888. I was not a little boy and had on a new pair of shoes, of which
    I was very proud, so I was delighted when we got off at the depot, the railroad station at Hogan's Creek, to see the plank
    walk that ran up to Bay Street. There were very few sidewalks here at that time, and I did not relish the idea of ploughing
    through the deep sand and soiling my brand new shoes.
- speaker: Respondent
  text: I located here permanently in 1907, but right after the fire of 1901 I did considerable work in the restoration of
    the West Building, the Royal-Upchurch Building, and the Gardner Building with the Cohen Brothers store. These buildings
    were left a ruin, but had been badly damaged.
- speaker: Respondent
  text: When I established my home here, Jacksonville had a population of about 30,000. The fire was a blessing in disguise,
    as it really put the town on its feet, it started taking steps forward and has never stopped. And now we have the naval
    air base finally assured; very few people now realize the magnitude of this project and the asset it will be to Jacksonville.
- speaker: Respondent
  text: We are talking about disasters, the best thing that ever happened to the state of Florida generally was the big freeze
    of 1894. It took attention away from the 'all-eggs-in-one-basket' crop of citrus, and started the development of the truck
    axle, small fruit business. Providing an all-the-year-round income instead of depending on the one crop.
- speaker: Respondent
  text: I remember father telling me when he first came to Ocala that a great deal of long staple cotton, the Sea Island variety,
    was raised in that section. There were plantations, and the picking and ginning and shipping of cotton in Alachua and
    Marion counties was a rather momentous business. I am glad to see the revival of planting of Sea Island cotton again in
    those sections, since the agricultural experts have conquered the boll weevil.
- speaker: Respondent
  text: Speaking of history, a friend of mine sent me from Connecticut a book called 'The New Florida' published in 1887,
    a very good word picture of Florida in those days, and dwells particularly on the treatment of negroes in the state. The
    author, whose name I do not recall, states the black row was well treated, considered in most cases family responsibilities,
    and at no time was there visible any such distressing incidents as dwelt upon by Harriet Beecher Stowe in her Uncle Tom's
    Cabin. I shall be glad to bring it down to my office either when you come back again.
- speaker: Respondent
  text: In other recent interesting articles just published in the May issue of The Military Engineer, one of the leading
    engineering publications, is seven days' diary of a Confederate soldier on his journey from Petersburg, Virginia, to the
    surrender of Lee's army at Appomattox in 1865. The morale of the rugged, weary, starving soldiers had not been broken
    or undermined and they were still willing to carry on.
- speaker: Respondent
  text: I have no family papers or documents of importance, but do possess a muster roll, an original manuscript written in
    almost legible hand by my mother's brother, member of Charleston, South Carolina, regiment. The captain's name was Fox,
    and every name on the roll is Irish. The interesting part is that the record was kept up to date; it tells the full name
    of each enlisted soldier, where he was from, all promotions, also what became of him, if not, whether paroled, on sick
    leave, killed or captured. I got it about 14 months ago.
- speaker: Respondent
  text: Fourteen years ago upon a banquet in Charleston, referring to this muster roll, and Captain Fox was still living,
    being present at the dinner. They wanted me to give it to them for the Charleston museum, but did not, although I almost
    think I should, as it is really South Carolina history and where it belongs, it belongs.
- speaker: Respondent
  text: What has been almost an interesting job? Well, I would not be able to say of fifteen. They are all interesting, some
    present difficult problems, but for the most part they are just routine.
- speaker: Respondent
  text: My son, you see, is an engineer, expects to have considerable work in this establishing of new roads. I suppose it
    will be most interesting, since this is in line with newer kill projects and most modern construction methods.
- speaker: Respondent
  text: Returning again to historical matters, our family has even undertaken that on store Davis Yule and Judah P. Benjamin
    were joined through some relationship or other.
- speaker: Respondent
  text: Yule was on St. Thomas island in the West Indies in 1810 and Benjamin in 1811 and it is mere conjecture as to whether
    the kinship of two well-known families drew the respective families to get together on this British possession at about
    the same time. The paternal Yule was racial Portuguese, whose father, through participation in state Mexican affairs in
    an official capacity, had been designated Prince of the empire. The overthrow of the dynasty forced the Yules to flee
    from Mexico to England.
- speaker: Respondent
  text: When after a course of time their son was forced to go into business, the mother insisted on him assuming her family
    name of Levy to avoid the loss of a caste or prince's son engaged in common trade. So, when David Yule was known first
    as David Levy, later assuming his correct family name of Yule.
- speaker: Respondent
  text: The Benjamin, so far as we have been able to investigate, have a known bearer on Benjamin generation after generation
    but the union of any Yule to Levy and back again to Yule has resulted in a slight 'band' in the families.
- speaker: Respondent
  text: But, as I said before, my man is an indefatigable researcher, and an ardent Southerner he always points to fight the
    war of the Confederacy all over again and I am in hopes he will have the opportunity to find time to get the full relationship
    of the two families straightened out.
