collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I always have to rest a while after dinner. What is all the trouble with my gallbladder, stones, heart, liver, kidneys,
    and bladder? The doctor said I must lie down for an hour.
- speaker: Interviewer
  text: Can you tell me about your life and especially how you learned the barber trade?
- speaker: Respondent
  text: Well, I've been a barber most all my life, started to learn it when I was just thirteen and knew no other work. I
    literally grew up as a barber. My elder brother owned the shop and I worked there. I started with small tasks and learned
    everything about the trade over the years.
- speaker: Interviewer
  text: What was it like growing up in the barber shop?
- speaker: Respondent
  text: It was like a family business. I was always around the instruments and tools. I even used to eat my teeth on the handle
    of a shaving brush. It was a hard but satisfying life.
- speaker: Interviewer
  text: How has your health been affected over the years?
- speaker: Respondent
  text: I've had terrible spells with my heart and feel very weak sometimes. I was operated on for a fibroid tumor that was
    as large as a grapefruit. The operation probably saved my life, but since then I've had heart trouble and gallbladder
    issues. The doctor wants to operate again but we don't have the money right now.
- speaker: Interviewer
  text: How do you manage your health day to day?
- speaker: Respondent
  text: I take a lot of medicine every day, including digitalis for my heart. I try to rest after meals and avoid too much
    work. My wife and I are very careful about diet and medicine. We are grateful for the help of our doctor.
- speaker: Interviewer
  text: Can you tell me about your daily life and surroundings?
- speaker: Respondent
  text: My home is neat and well kept. I have a nice stove that I am proud of. I like to keep things clean and orderly. I
    enjoy working in the yard and taking care of my home.
- speaker: Interviewer
  text: What about your neighbors and community?
- speaker: Respondent
  text: There are some troubles with neighbors, like noisy dogs and chickens running loose. People don't always follow the
    rules, and it can be frustrating. But I feel sorry for some children who don't have much care at home.
- speaker: Interviewer
  text: Do you have children?
- speaker: Respondent
  text: No, I never had children. After my operation, it was impossible. Sometimes I think children behave differently depending
    on their parents. I am glad we have no children.
- speaker: Interviewer
  text: What are your thoughts on birth control?
- speaker: Respondent
  text: I think birth control should be promoted intelligently everywhere. There is no reason for large families that cannot
    be cared for properly. It is hard for poor families to support many children. I hope the time will come when birth control
    is accepted and used widely.
- speaker: Interviewer
  text: Can you tell me about your early life and family background?
- speaker: Respondent
  text: I was born in Rome, Georgia, almost sixty years ago. We lived there about eight years after I was born, then moved
    to Atlanta. My father was a blacksmith, my mother a laundress. I had one brother and three sisters. My father was of German
    descent but looked more like me with dark eyes and straight black hair.
