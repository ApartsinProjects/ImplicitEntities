collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: 'There''s a girl who lives over on Sacramento who teaches school over on the west side, over in the Polish neighborhood.
    One of the Polish kids, he had an awful bad pair of tonsils. You know how the schools nowadays have medical examinations
    and all that kind of stuff. Well, the doctor orders them tonsils to come out, and the kid, he comes to school regular
    but his tonsils, they never come out. The teacher gets sore and she sends a note home with the kid, saying he can''t come
    back to school till he''s got his tonsils out. This girl, she told me the story herself. It''s true, so help me. Next
    morning there''s the kid back in school again, big as life. The teacher said, "I thought I told you you couldn''t come
    back to school again till your tonsils were taken out." The kid, he says, well, his tonsils was taken out. But he''d been
    in school only the day before, and the teacher''s sort of sore. She says: "How could you''ve had your tonsils out? You
    were in school yesterday. What doctor did it? Didn''t he tell you to stay at home and in bed?" But the kid, he says, nope,
    it wasn''t no doctor who took his tonsils out, His old lady took ''em out. With a scissors. So this girl, she looks in
    the kids mouth. Sure enough, he''d had his tonsils out. That''s how tough them Polacks are, tough and dumb.'
- speaker: Respondent
  text: Tough? That one ain't nothing to the one I heard. This one happened in Morris' Packing. A woman who's working there,
    she stops working and goes to the toilet. She's in there a while, and then she comes out and goes to work again. While
    she was in there she'd had a kid. That's how tough they are. The kid? I don't know what happened to it. I'm only telling
    you what I heard. I know the guy who told it to me, and he runs around with a girl who works in the same place with this
    dame I'm telling you about. She told it to him.
- speaker: Respondent
  text: Well, I know one. And it's true, too; I know the dame. She didn't feel so good and she went to see the doctor. The
    doc says she has bad tonsils, and he cuts them out. But the woman keeps complaining about how her throat feels, and her
    husband, he takes a look—the doc's left a thread hanging; you know how they do sometimes. So the husband, he says, "I
    know what's wrong with you," and he takes a pair of scissors and cuts off the thread. She ain't talked right since; he
    cut off more than he should've. Now, this wasn't no Polack neither, and I know the dame. I know her old man, too.
- speaker: Respondent
  text: These two guys, they meet in the saloon. I'm standing there drinking and I hear them talking. One guy, he's got a
    shiner, and the other guy, he wants to know how he come to pick it up. He says, "Jesus, how'd you come to get that?" This
    guy with the shiner, he says, "Well, ya see, Joe, he meets me, and he gets to arguing with me. Get going, I says to him,
    or I'll mess ya up." And then, he picks up a common housebrick, a common housebrick, and he lets me have it. So I ups
    and lays him out stinking.
- speaker: Respondent
  text: Remember when Louis fought Schmeling the last time? Knocked him out almost before it got started? I was listening
    to the fight at a gas station on Cottage out south here. Well, the fight's all over and the crowd's beginning to disappear,
    almost before it'd had time to get together, when along comes a Hebe. The Hebe says, "Well, how's the fight coming?" The
    attendant says, "It's all over." The Hebe stands there a minute not saying anything and looking sort of disappointed.
    He'd wanted to hear the fight. I guess; he didn't even know yet who'd won. Then he says, "What d'ya mean, it's all over?"
    The Hebe spits. "Phyehl," he says, "Ya don't get nothing for your money anymore!" And then he walks away. I almost split
    a gut.
- speaker: Respondent
  text: Remember when the Informer was playing around town? I was down at T's Bookstore one day, about that time. I was broke
    and I was trying to get rid of some of my first editions. T asked me if I had a first of the Informer. I said, "No. Let's
    see, that's by Liam O'Flaherty, isn't it?" I said, "No, lo, that's by Liam O'Flaherty." I knew damn well it was, but Targ
    insisted it was by Sean O'Casey, so I finally said, "Goddamn it. Well, Goddamn," I said. Targ said, "Why, what's wrong?"
    "Oh, the hell," I said, "according to you, I've been collecting the wrong author all these years." And with that one,
    I left him to think it over.
- speaker: Respondent
  text: There's a bookseller on South Wabash who don't like browsers. I was talking to him one day, and he says, "Them browsers,
    I don't leave them around." If he saw a browser with a book, he'd go up to him and say, "I bet you don't have enough money
    to buy that book." He'd insult him out of the store. When he talked about his books he'd always say, "I got a good stock
    of merchandise here, a good stock of merchandise." That's all books meant to him, nothing more, a good stock of merchandise.
    He boasts he's read only one book in his life. He told me what it was, but I forget. He says, "I don't read books. I don't
    want to read books. I notice guys who read books don't do no good at selling them." That's the kind of a guy he is.
- speaker: Respondent
  text: During prohibition in this here saloon all you could buy was near beer; that is, if the barkeep didn't know you. If
    the barkeep knew you, you asked for near beer and when he brought it to you he always asked you if you wanted it straight
    or spiked. If you said you wanted it spiked, he took a bottle of alky out of his hip pocket and put a couple drops of
    alky in the beer. That was spiking it, putting in those couple drops. I used to get my beer spiked every once in a while
    just to see if his hand would slip. But it never did.
- speaker: Respondent
  text: We was having an argument with this guy, because he always claimed he'd gone through the ninth grade in school and
    we knew goddamn well he didn't. After a while it gets hot and we trip him up and he admits he quit school when he was
    in the third grade. He quit the third grade to get married. I said to him, "You're so goddamn dumb you don't know from
    Tuesday." Going through the ninth grade? Hell.
- speaker: Respondent
  text: There's something for you. See that sign? "Quiet, please, Men Are Drinking." (In a tavern.) There's an elderly gent
    who comes to this hotel to dictate love letters to the public stenographer. It's a weekly affair. Sometimes the letters
    are quite intimate. All we can figure out is that because he doesn't write them the dame can't sue him because of them.
- speaker: Respondent
  text: You didn't grow up in the city, I can see that. I have. When I get on a streetcar and I see an empty seat, I don't
    make a rush for it, I look for a puke. I sit in the back of the car and I see a guy's eyes light up at the sight of a
    vacant seat and he makes for it, and I know there's a farmer.
- speaker: Respondent
  text: They say that house is really high class. They guarantee you won't get no disease there. But if you do, they fix you
    up; they pay the doctor and the hospital bills. Only they charge you like hell, they charge twenty-five bucks a crack.
    Naw, I ain't never been there.
- speaker: Respondent
  text: I went down to Grant Park one night real early. There was some guest artist there I wanted to hear, this blind pianist.
    I sat right behind the rows they reserve for the critics. There was an old white-haired guy in the critics' row—I figured
    he was from one of the newspapers. He kept stealing looks at a paper he had with him all through the concert, and I got
    to wondering what it was he was so interested in. When the concert was over, he laid the paper down on his seat. I hung
    around a while, trying to get a look at it. Finally I did. What do you think it was?
- speaker: Respondent
  text: It was the Form, the Daily Racing Form.
- speaker: Respondent
  text: In the city you're always looking for someone to make you. I never take a streetcar home on a date. I'll see a drunk,
    and I'll wager you money, if I see a drunk on the car, he'll sit next to me, he'll sing or he'll sleep on my shoulder
    or he'll talk to me. Why? Because he recognizes a kindred spirit? Why is it? My red nose? If a guy asks me where a place
    is downtown, I look him over, I wonder what's next. He says, "Where's 75th Cottage?" and I tell him and invariably wait
    for something else. Invariably he'll muscle you for carfare. I always suspect anyone speaking to me at a carstop.
- speaker: Respondent
  text: During prohibition T. and I had an old jalopy, and one weekend we took a trip up to Windsor, Ontario and back. We
    had a bottle of bonded liquor with us when we started out from Chicago, meaning to drink it on the way. At the last minute,
    though, B. wanted to come along. You know B., straightlaced and prim and moral as hell. We were trying to make B. for
    something or other that time—I don't remember what—and so we decided we'd take him along. Imagine carrying a bottle of
    bonded stuff, during prohibition, all the way to Windsor and back, without even so much as smelling it. But we did.
- speaker: Respondent
  text: We got back at B. another time, we fixed him good. T. and I and B. were together on a trip—it was to Fort Wayne that
    time. We stopped at a hotel, and T. and I had one room and B. had another. We watched, and when B. was out of the room,
    T. slipped in and put a batch of ice cubes in his bed. Afterwards, when B. went to bed, he jumped out quicker than he
    got in. Being so straightlaced and prim, he was too embarrassed to call for dry bedclothes from the hotel but came instead
    and pounded on our door for us to let him in. He had the lights out and made believe we weren't in. He spent half the
    night in the hall outside our door.
- speaker: Respondent
  text: Once T. and I went to a Polish carnival. I've got blind on Polish pop, if you know what that is. We'd been drinking
    whiskey and gin before we went out even. So you can imagine what we were like. Out at the carnival they had a giant swing,
    and we decided we'd ride it. I was the first to start heaving. Together we cleaned that whole pork out. The guy that was
    running the swing, even he had to leave the machine.
- speaker: Respondent
  text: You remember Indian Joe who used to run a speed trap outside Chicago here? They got him finally, the automobile association
    did, I think. I know a guy who pulled a fast one on him. Indian Joe used to have guys stand at the railroad crossing at
    night, and when cars stopped for it, one of these guys would slip up behind a car and cut the wires to the tail light.
    Then Indian Joe would pick them up and sock them a heavy fine. C. got caught that way. C. talked Indian Joe into believing
    he was a Chicago businessman, driving a friend's car, and Indian Joe took a check from him for the fine. C. signed the
    check "U. R. A. Pratt." Indian Joe didn't know he'd been screwed till he went in to cash the check and the bank teller
    laughed at him. Then he traced the car and went looking for C. with a gun. U. kept out of his way though.
- speaker: Respondent
  text: C. was a gangster. He'd never been in the really big time though. Here's another story about him for you. A pal of
    his was indicted for murder once and skipped to Wisconsin. After he'd laid low a while, he came back to Chicago and got
    a hideout in one of the suburbs. Instead of hiding in it though, he went riding on the streets. It sounds screwy as hell,
    but he was picked up one day not for murder but for speeding. He wasn't recognized and of course he didn't give his right
    name. C. heard about it right away. C. had been an assistant or deputy or something in the district attorney's office
    years ago, before prohibition, and he'd managed some way to keep his badge—probably claimed to have lost it or something.
    Anyway, as soon as he heard what'd happened, he calls up this police station. He gives his right name and everything.
    He tells them they've picked up a guy for speeding who's wanted for murder in Chicago, he tells them the guy's right name
    and he tells them this is the district attorney's office and they're sending him, C., out to bring the guy in, will they
    turn him over? They'll do the same sometime when they pick up someone these other coppers want. It was okay. So C. goes
    out and flashes his badge and they turn the friend over to him. The two of them jump into C's car and beat it back to
    Wisconsin. This friend of C's, he was caught later and sent up. C. got away with it and nothing ever happened to him.
    He died of heart failure one day he was about fifty or so. He left a wife and scads of kids. They're poor as hell; they
    don't have a dime.
- speaker: Respondent
  text: I'll tell you what I saw C. do one day. I saw it with my own eyes. I was pumping gas in those days, and C. used to
    hang around the station. He'd try to sell cars to fellows who looked right to him, and one time, right at the station,
    he sold a guy a car. Gave him a song and dance about a guy who had a car and had to get rid of it cheap because there
    was sickness in the family. He told the guy to wait, and then he went out and stole a car like the one he'd described
    and brought it back and collected.
- speaker: Respondent
  text: This guy, Ray, he's the kind of guy who'll never pay a bill unless it's a photo finish. There's nothing closer than
    a split-second lens, I say.
- speaker: Respondent
  text: The trouble with working in the taverns is, they're always wanting something extra, something for nothing, that old
    egg in their beer; and sometimes, when you're lettering up a joint, you have to give it to them. But cause they threaten
    to throw the beer out if you don't give them what they want, and you undo all the salesman's work. Pretty soon, then,
    the brewery'll be throwing you out.
- speaker: Respondent
  text: This guy I'm working with, his boss owns a coal and ice business. He has a colored lad working for him as a coal hiker.
    This colored lad's about six foot five, and he's all muscle and bone, no fat. The boss gets the idea a picture of this
    colored lad hiking coal ought to be used for advertising on the bulletin we're painting. So the lad I'm working with snaps
    a picture. The hiker's pretty pleased; he comes up to the boss and he says, "Mr. W., you gonna put me up on that sign?"
