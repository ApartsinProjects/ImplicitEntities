collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: My family came to Jacksonville from Flint, Michigan, in 1870, when I was a very small child. My father, L. Gibson,
    had been ordered to Florida by his physician, being a victim of consumption, or tuberculosis, as it is now called. The
    Gibsons were early settlers of Michigan, my father being of the fourth generation of that family in that state.
- speaker: Respondent
  text: When we first came to this section, we boarded with the family of ex-Governor Harrison Reed, living in his old Reed
    house on Platt Street in South Jacksonville. The house is still standing in its original location, but was that in the
    manner of a small estate of twelve acres, on which was planted a splendid bearing orange grove, and other tropical fruits
    and shrubs. This was in 1879.
- speaker: Respondent
  text: We were considered Yankees, and were not very popular at that period of Florida's history. Harrison Reed was the first
    Territorial Governor of Florida, also a Yankee, from Milwaukee, Wisconsin, so it was natural that we should seek congenial
    friends.
- speaker: Respondent
  text: The Reeds had a small son, Harrison Reed, Jr., and he and I, being about the same age, were cordial playmates of preschool
    age, and had good times romping around the big house and exploring the estate. We were very fond of oats, and I remember
    at one time we possessed in joint ownership a magnificent colony of sixteen. They were all kinds, mostly scrubs or the
    common alley variety, but we loved them dearly, dressed them up, put paper boots on them, and fed them until they were
    as fat as butter.
- speaker: Respondent
  text: It was not long until my father secured a position bookkeeper with the Barnett bank. He was the third man employed.
    The firm consisted of B. Barnett, Mr. Cooper, and then my father was added. The staff of three carried on the rapidly
    growing business of the institution. The bank was located in a small building on the same corner where Burchett's Department
    Store now stands, southwest corner of Forsyth and Main (or Duval Street, as it is known today). When I look back now,
    it seems impossible almost to realize that the Barnett Bank of Jacksonville now employs around three hundred people. It
    was not a National bank, but was known then as the bank of Jacksonville.
- speaker: Respondent
  text: When my father died in 1911, he was an assistant cashier in the Barnett bank.
- speaker: Respondent
  text: We lived with the Reeds for years or so, then my father purchased an adjoining plot, which also contained an orange
    grove, built a house, and then the street was laid out through past the house in 1886. It was called Gibson Street, after
    my family. The big old red house is still standing.
- speaker: Respondent
  text: Governor Harrison Reed was a brother of Mrs. Alexander Mitchell, also from Milwaukee, who owned the 'Villa Alexandria'
    as it was on the A. Johns Avenue, farther out on the south side, where the Fisher property now is. In passing, she came
    frequently to visit the Reeds, and we got to know her very well.
- speaker: Respondent
  text: Mrs. Mitchell was a tall, well-built woman, and very dignified in her manner and speech. She was middle-aged, as I
    first remember her, with her hair quite gray. Her eyes were blue. She was a woman much cultured, a world traveler, and
    quite artistic.
- speaker: Respondent
  text: She took a fancy to me, and as a child along growing up in her big house, she often took me to Villa Alexandria to
    stay with her overnight or over the weekend. The house was a big rambling three-story structure, all frame, and not gaudy,
    pretentious from the outside, but the inside was most beautiful.
- speaker: Respondent
  text: Mrs. Mitchell used to humor me when I would be her guest by giving me my choice of the room I was to occupy. There
    was a French room, with dainty blue and gold finished white antique furniture, with heavy brocade draperies, and lots
    of windows of mirrors French beveled in gold frames, everything very dainty and French. This was my favorite.
- speaker: Respondent
  text: Then there was the Japanese bedroom, with heavy dark lacquers and furniture, with rugs and other furnishings from
    Japan; and the antique room, furnished in early American. On the other side of the house was a rather large bedroom, all
    gray and straw color.
- speaker: Respondent
  text: Mrs. Mitchell's own bedroom was very beautiful. It had a big bay window which faced the river. The windows in the
    room were hung with white silk curtains with over-drapes of heavy blue brocade. On one side of her bed she had a tall
    screen with three doors that folded. Those doors were all full-length heavy mirrors, and the other side was of yellow
    plush. Three steps led up to her bedroom from the hall, which caused some people to remark 'The steps led up to her throne.'
    The woodwork in the room was all decorated with hand-carvings. It was reported she had secured these carvings in France,
    had them carefully taken down, read, brought over here and installed in her room. All the little cabinets, the paintings
    on the walls are French, and there were many round and oval mirrors of French style.
- speaker: Respondent
  text: The dining room was a masterpiece of magnificence. It was quite large. The dining table occupied the center of the
    room, which could accommodate seventy-five guests. Cabinets were built in on two sides of the room, with glass doors,
    and in these were stored her magnificent imported china. In one was a marvelous collection of teapots from all over the
    world, patiently collected on her many trips abroad. Ordinarily the table was in the middle of the room, but then only
    a few guests were present, it was shoved up into the expansive bay window looking out upon the St. Johns River. Fine paintings
    by European masters adorned the walls of this room.
- speaker: Respondent
  text: Mrs. Mitchell's son, John, was married to a divorcee. The son was rich and spoiled, the Swiss wife was high tempered
    and a variegated, and when they separated, Mrs. Mitchell took the small son, Weide, whom the court proceedings in divorce
    suit had awarded to the father. He was then about seven years of age.
- speaker: Respondent
  text: The first time I saw David Mitchell was when his grandmother, Mrs. Alexander Mitchell, brought him back to South Jacksonville
    early one fall. This was in 1893. He was a small, fair-haired youngster, dressed in a blue serge soldier suit, ornamented
    with gold braid.
- speaker: Respondent
  text: I remember he had a couple of ferocious bulldogs, which he trained to catch and kill oats. This, to Harrison Reed
    and me, was the height of cruelty, and we were not very fond of the 'little heathen'. He used to hire the negroes to bring
    oats to Villa Alexandria, which he would toss loose and then stick his ferocious bulldogs on them. If the dogs caught
    the oats, they would tear them apart. It was terrible.
- speaker: Respondent
  text: There was no doubt of David's being a legitimate son, as I remember all the talk about the separation and divorce
    of the father and mother in Milwaukee.
- speaker: Respondent
  text: David was the apple of his grandmother's eye, and she lavished everything upon him. He was also very fond of his grandmother
    and was always loyal to her.
- speaker: Respondent
  text: I remember his courtship with Kittie Parrott, who was Kittie Sutton, whom Mr. Parrott adopted after he married her
    mother, Mrs. Lillie Sutton. She had vowed she would marry the richest man in Jacksonville, and so she set her sights for
    David Mitchell. He was a sport, riding wild peals, drinking, gambling, and idling away his time. But they were married,
    and I remember when the little boy, Alexander Mitchell, named for his great-grandfather, was born. He was a cute little
    baby and I have lots of snapshots of him, as my mother used to take care of him a great deal, when Kittie came over to
    visit in Jacksonville.
- speaker: Respondent
  text: She would come as far as our house, and we would walk down to the river and put out a little white flag, when a rowboat
    would be sent over to bring the passenger to this side of the river. They were landed at the foot of Newnan Street. My
    father had his own rowboat, and made the trip across the river each day, storing the boat at the Florida Yacht Club basin
    on the river.
- speaker: Respondent
  text: When David Mitchell met with a terrible accident spill from a fast polo pony, he suffered a concussion of the brain
    and other injuries, being unconscious for a period of six weeks or so. Kittie Zuriett-Mitchell, swelled she did not wish
    to be tied to a broken man, so she talked of divorcing David, who was practically an invalid, and not accountable for
    his speech or actions for a long time. Her father, who was an important official of the Florida East Coast Railroad, was
    rather stern with her, telling her she had married David for better or for worse, and it was up to her to remember her
    vows. He refused to live with him, however, and immediately upon the death of her father she initiated proceedings for
    divorce. In the meantime, she had become involved in associations with disreputable, local married men, causing a lot
    of scandal, and it was reported she lived with him for several years before his death and he was able to make her his
    legal wife. After he died, she married for the third time, now living in West Palm Beach, having attained some modicum
    of respectability after her wild notions. The son, Alexander Mitchell, is now employed in the bond department of the Barnett
    Bank. He was quite small when his father and mother separated, and probably knows very little about the Mitchells.
- speaker: Respondent
  text: His grandmother, Mrs. Lint Parrett, was very fond of him, however, felt she died, in him. Till she left him her beautiful
    residence on A. Johns Avenue in the Jacksonville suburb of Avondale. Young Alexander Mitchell was born in 1900.
- speaker: Respondent
  text: The first ferryboat operated on the St. Johns was in 1896 or 1894. It was called the Armington, and I used to come
    over on it to Jacksonville to attend the Bradford Institute, a private school operated by Mrs. Drow Williams, under the
    auspices of the Episcopal Church.
- speaker: Respondent
  text: The next ferry was called the Mechanic. It belonged to the Flagler system and would get the trains at the foot of
    Hogan Street and carry freight and passengers over to the south side station of the Florida East Coast Railway.
- speaker: Respondent
  text: The bridge was started about that time, and my mother who died in 1914, said she wished she might live to see the
    bridge completed and the two cities, Jacksonville and South Jacksonville, joined together.
- speaker: Respondent
  text: During the fire of May 3, 1901, we children were awed by the spectacle from the south side of the river. It must have
    been either on a Saturday or some holiday, we were home from school. It started about noon. We had been forbidden to go
    down through the orange grove which ran to the water's edge. Our place was all fenced in, and there was a gate on the
    river side, but we never went beyond the gate. The flames kept shooting up and the black smoke rolling in, so we decided
    to go up to the roof of the house. We mounted the stairs to the attic, and through a window climbed out on the roof, from
    which we had a magnificent view. I remember the smoke and flame which came from the roof of the Catholic Church after
    a blazing brand was wafted through by the high wind, and we watched as the church was rapidly consumed.
- speaker: Respondent
  text: Along in the evening the fire began to bring people over to the south side whose homes and belongings were destroyed
    in the fire, their clothing in shreds and the soles burned from their feet as they walked through the hot ashes. That
    night we had nineteen guests.
- speaker: Respondent
  text: The burning brands fell in every direction during the height of the fire. The fire department simply could not keep
    up with them and even the next burning buildings were still snapping.
- speaker: Respondent
  text: Father stayed at his post in the Barnett Bank until 5 o'clock on the morning after the fire. The bank did not burn,
    as the fire lifted and burned the next block. Everything in the other direction, up in the block where the Woman's Club
    now is, was destroyed also.
- speaker: Respondent
  text: Harrison Reed, or Harry Reed, as we called him, when he finished school, went to work for Lite Hubbard Hardware Co.
    Later he was offered a position with the Standard Oil Co., having charge of their warehouse in Jacksonville. That is when
    we parted company, as mother thought 'warehouseman' was not good enough for her daughter to keep company with. When the
    Standard Oil Company became more prosperous and influential, Harrison Reed was promoted, until he finally became the Florida
    manager. He is retired now, having a beautiful home in San Jose. He must be a multi-millionaire, as he sold hundreds of
    acres to the real estate company developing San Jose Estates, one of Jacksonville's most beautiful residential suburbs.
    He has quite a collection of valuable historical relics pertaining to his family treasured from his father's time, when
    he was Territorial governor.
- speaker: Respondent
  text: Getting back to Mrs. Mitchell, she was always a devout Episcopalian, and when South Jacksonville was building up,
    she conceived the idea of building a chapel on the south side. The spot being selected, she got people interested, and
    no one was more enthusiastic than my own dear mother. You see, being Yankees, we had few close friends, so mother had
    little social activity and was glad to give her time to helping Mrs. Mitchell in establishing the little All Saints Chapel,
    as it was known.
- speaker: Respondent
  text: 'I remember that my father used to go hunting with Mr. Holmes and through this association they became fast friends.
    One day Mr. Holmes said: ''Gibson, I am going to have my wife call on Mrs. Gibson, so we can be family friends.'' My father
    was so slighted when he brought this message home, but my mother said ''No, she''ll not call - we''re too much Yankee
    for her'' and sure enough she didn''t.'
- speaker: Respondent
  text: If you will come back tomorrow, I will tell you more about the Mitchells and All Saints church, also the yellow fever
    epidemic of 1888.
