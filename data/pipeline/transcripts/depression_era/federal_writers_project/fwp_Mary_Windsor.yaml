collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: There ain't no gate but you kin raise up the wire and come through the fence that way. Has been a drain to make us
    a gate over since we come here but he don't seem to find no time for it. Sure enough there were no gate in the rusty ten-strand
    barbed wire fence around the house but the strands were hung loosely on the crooked posts, and it was an easy matter to
    crawl under the lowest strand.
- speaker: Respondent
  text: Please don't chase them little biddies eatin the room, for that old hen, she won't be quiet till she gets them all
    out with her. They'll cause a mess when sick in bed and can't chase them out. They're always a-loiterin for scraps and
    crumbs. I declare, I believe one or two is in the kitchen yet, they sure do nest here no this way. Would you mind so?
- speaker: Respondent
  text: Florida then, oat please, I feel sorry to bother you like this, ma'am, but there ain't nobody else to call.
- speaker: Respondent
  text: The tiny chicks were urged out the front door to be taken under the protecting wing of the irate hen. The other chickens
    were then chased from the kitchen table. They made their protesting way into the back yard where they lingered about the
    steps.
- speaker: Respondent
  text: With order restored for the time being, the comely young woman with dark curly red hair spoke again. She lay in the
    soiled bed covered with several dingy blankets and said, "This here house don't look very clean ma'am. I've been sick
    now with chills and fever for most of the week, and haven't been able to clean and scrub and do as I belong to. Teeny
    there, she don't feel so good neither, feels bad with the fever too, and Willie, I went to town this morning to get some
    fever medicine he ain't got back yet."
- speaker: Respondent
  text: Teeny proved to be a tiny tow-headed girl of two or three years of age. She was cuddled down in the blankets next
    to her mother.
- speaker: Respondent
  text: To man, we don't never have a doctor, living so far out this way and all that no more medicine neither. I feel better
    as soon as I take a few doses of that fever medicine. I try to always keep it in the house for there ain't no telling
    just when them chills will strike. I lost the medicine, it gave out the last time I was so sick and I kept a-waiting thinking
    maybe I wouldn't have no more chills. Soon as Willie gets back and I start the medicine again, I feel better. Ma'am, I
    don't know just what kind he'll get this time. Feels like it's better to change the medicine a lot and he sure knows too,
    for Willie, he knows a been about nearly everything like."
- speaker: Respondent
  text: She looked dreamily out across the clearing as if the sight for Willie’s return would make him materialize at once.
    "Then Willie is home and these Florida chills start, he always keeps me up warm and puts a stove lid to my feet. Then
    he fixes the medicine for me, too. He always knows just what to do best over everything like, he’s got such a fine education.
    Teeny here, she has the chills too and she takes the medicine, but sometimes it makes her sick to her stomach. Sometimes
    I think we need a doctor but I expect he knows about as much.
- speaker: Respondent
  text: Gene is about four years old now. Willie and me have been married about five years, I think it is. But I don't pay
    no mind to dates like, and time does run so quick. I’ve been having these chills and fever off and on all the time like.
    I might have had other babies by now if I hadn’t been so ill. I heard that sometimes it keeps more babies from coming.
    I wouldn’t mind two or three more if they didn’t come along too quick. I feel like it would be real nice for Teeny to
    have a little brother to play with.
- speaker: Respondent
  text: Willie don’t never say much but he likes babies, too. I believe he would be glad, especially if it was a boy. He says
    it’s a lot better to have boys; they are easier to raise and are more help with the farm.
- speaker: Respondent
  text: I sure do wish we had a big farm, Willie, he’s always a-planning to be one like. Willie, he was raised on a farm too
    and he sure knows a lot about farms. He worked on a lot of places, too, cropping for other folks. And if them folks had
    me all just done like he told them to, they’d have made a better crop," she said sincerely.
- speaker: Respondent
  text: Together Willie and I were both born in Florida. We’ve lived here all the time, we ain’t never been out of the state.
    I’m almost 33 years old now and Willie, I reckon he’s about 35. I don’t rightly know where we were born, but it was in
    Florida. I was born over in Hardee County, out in the country almost like this here. My daddy, he was a farmer, but he
    never had no very big farm. I don’t know where my family come from to start with.
- speaker: Respondent
  text: After drinking a glass of water I secured for her from a bucket on a bench outside the kitchen door, she continued.
- speaker: Respondent
  text: After we was married Willie, he worked on farms and in the strawberry fields in Hardee County a lot. He lost a fortune
    in them strawberry fields and through no fault of his. You see he had most a hundred dollars he made a sawmill just before
    we got married, so he went in with another man to raise berries. But the man he wouldn’t do like Willie said and they
    both lost all their money. It sure rose up to fail bad and can’t never help that so now Willie’s more like.
- speaker: Respondent
  text: In reply to the question about the mill work, Mary stated with pride, "Willie, he is a sawyer, and he can run one
    of them circular saws better than most anybody else. I guess there just ain’t nothing that he can’t do, he got so much
    schoolin and knows so much."
- speaker: Respondent
  text: I reckon Willie would get lots of work most anywhere, but he can’t do much in the mill or at farming for it hurts
    his back like. Sometimes though he works in the mill and then have more money but it ain’t ever enough and it don’t last
    long for things is so high. Willie, he has worked around on lots of farms, but seems like he knows so much better he to
    do the work and it most always makes the folks mad at him. I guess they’re just jealous.
- speaker: Respondent
  text: Seems like Willie, he just don’t hold no job for long, even when it don’t hurt his back. He always knows a better
    way to do most any kind of work, and sometimes he gets mad and says the clerk just ain’t worth fooling with.
- speaker: Respondent
  text: I’d be mighty glad when we can buy me a great big farm, something like.
- speaker: Respondent
  text: Willie is a-planning to do. I want a big farm, too, and a fine big house, but I don’t see no chance of it now. I hope
    we won’t be a-living so far out in the woods then. Willie likes it out here and I do, too, only I get real lonesome sometimes.
    And it’s worse when I’m so sick, because then I wish I had some neighbors to come in. I sure am glad you come today, so
    you could talk to me a while.
- speaker: Respondent
  text: This bare place is all right for us now because it don’t pay no rent. I do like to be left alone by nobody. But I’d
    like to be near a town and see folks and things, and maybe we might get there sometimes if we lived in it. I used to like
    to go down before Willie and me were married.
- speaker: Respondent
  text: I haven’t been to a dance or a show for a long time now. I expect I cannot now. I don’t have no way to get no place
    living out here, it’s so mighty long way to town. It ain’t often I see a car along the grade either, and it’s a long way
    to the grade from here.
- speaker: Respondent
  text: Now I wouldn’t want folks always a-running in and telling me how to do things and making like, but I would like to
    visit some. It’s so far to any place that it is now, by the time I get where I’m going I’m too tired to visit. I wish
    somebody comes along with a car and carries us where we want to go, but that’s a lot often.
- speaker: Respondent
  text: Sometimes I think I might like to try living in a city, but I expect it would get mighty full of the dust, and noise,
    and smoke, and all those pestering things I hear about. Out here it is quiet and the air is pure and sweet, and don’t
    the pines look pretty swaying in the sunshine? I’ve been to some of the big towns around here, and they look mighty alone
    at night with all the streetlights. But I don’t see how people sleep, and when they is sick it must be just awful. But
    people who live there get to see a lot of things, go to the champ to and there is lots of places to go to. If we lived
    in town we might be able to go to the moving pictures sometimes and there is a lot of nice things to go to, like band
    playing and parades.
- speaker: Respondent
  text: It might be better for Teeny, if she has to be raised in town, but I don’t know. Some folks are smarter than others,
    but there is none who was raised in the country and there just about nobody no smarter than what he is. When Teeny gets
    ready to go to school I expect we’ll have to move if she is still living out here, for she never could walk to the gentle
    and the school is through all these woods all by herself.
- speaker: Respondent
  text: Mary spoke in of 'verbal' families then feel well and sized money or food real bad in times, and make over to one
    of the farms around here and keep the mark. I do anything they want me to, but mostly it’s working in the field. Sometimes
    they make no money, mostly a dollar a day.
- speaker: Respondent
  text: If I get there real early then I bring food for me and Teeny and sometimes also some tools to bring home. But sometimes
    they want to take all vegetables for their order that don’t suit so well, but don’t say nothing.
- speaker: Respondent
  text: Most of us don’t like vegetables much, you know, but we eat them some when we can too. I heard they are awful healthy
    to it, but I don’t see why, they so close mostly like our feed to us. Willie is planning to raise big gardens, but he
    don’t never seem to get to it. He does raise a cabbage and some turnip greens. I like them better if they’re cooked with
    plenty of salted meat. Willie says the climate is too cold in the winter so he couldn’t grow it and he couldn’t sell it.
    There are folks around here that sell their vegetables and make a lot of money too.
- speaker: Respondent
  text: I would like to get fresh milk for Teeny, but we can’t afford it out here, and she might not like it anyway. When
    she has the money to get it I get her canned milk. She drinks it sweeter than rum she often has it. She sure does like
    clean milk though, and the butter tastes better.
- speaker: Respondent
  text: When she was a real little youngun I used to tie a rime of dried meat around her hand so she could eat it and it would
    keep her from crying lots of times.
- speaker: Respondent
  text: Teeny is real lively, she is good for arrangements, but it worries me. I always get the idea there is something ailing
    the matter with her. She always had so bad a lot, and still does it too. I used to gaze lovingly at the tousled little
    head and gristly face that peeped timidly from the tumble of bed.
- speaker: Respondent
  text: Speaking of finances I try and save money or food real bad in times, and make over to one of the farms around here
    and keep the mark. I do anything they want me to, but mostly it’s working in the field. Sometimes they make no money,
    mostly a dollar a day.
- speaker: Respondent
  text: Maybe both children are not near as sore as the farms around here, but it hurts being weak so to do that work. Seems
    so slow so much of the time, and lots of times we have to take dirty vegetables, and we don’t like that. We might get
    a little meat and bread too sometimes, but not very often.
- speaker: Respondent
  text: It seems they just don’t farm right around here anyway, and he don’t like to try it their way, and they won’t let
    him work his own way.
- speaker: Respondent
  text: I don’t rightly know how much it could take for us to have the food we want and some clothes and everything. I ain’t
    no hand for figures.
- speaker: Respondent
  text: Sure it was hard to talk to you about that, ma’am, but I do wish we had all the food we want, and some good clothes
    to wear, and a home, and a car, too.
- speaker: Respondent
  text: I want to have as much schooling as Willie, I guess he went some through high school. He knows so much, and he can
    read and write real well, and figure and wood work real good. I suppose there just ain’t no writing he can’t do it and
    ask him a question but what he answers it.
- speaker: Respondent
  text: Willie went to school all regular, but I quit in the sixth grade when I got his age just a little time before Willie
    and me married. I learned to read and write real well and a little about our country, and geography, but I never could
    figure none.
- speaker: Respondent
  text: What does a person need with so much schooling anyway? Figuring wouldn’t do no good; I ain’t never had no use for
    it. I guess schooling is all right for them that wants a lot of it, but it takes a heap of time and money to keep at it
    like some folks do. Ma, she never had much schooling and she got on all right. She never made us girls go regular neither,
    that means, if we begged to stay home, she let us.
- speaker: Respondent
  text: But there’s Willie with all his schooling and the fine hand he can write and the figures he can do and all his knowledge
    about so many things. But he never got on much and I believe he’d been just as well without so much learning. Willie claims
    they spend too much money on the schools nowadays with all them new things they teach. They even teach the boys how to
    fix cars and run engines and the like. But Willie, he could do all that without no learning about it in school.
- speaker: Respondent
  text: I do like to read some, I like love stories and them movie magazines with all the pictures of the actresses in them.
    We don’t never get no magazines unless somebody gives us some, for it seems like all the money we get goes for food and
    a few clothes. Even when Willie to work steady for a little while, it don’t seem to have nothing.
- speaker: Respondent
  text: 'Mary stated that she had no interest in politics and knew very little about such matters: "I have voted some," she
    said with pride, "and just like Willie told me to do. He knows all about it and just what to do. I never made sense why
    me and went to vote, my ma never did. But Willie says it’s the law and we all gotta do it. I don’t know what it’s all
    about, I never paid much mind. Besides it don’t make no difference to me about all them strange folks I don’t never know
    or been a-running this here country. Willie, he says things is better than they was, and the government, it has given
    work to lots of people and kept them from starving, like it ain’t never done before. But lots of people say we all got
    to pay it back same time as the money but that there don’t make no sense to me, for folks spends the money as soon as
    they get it. Anyway, how we going to pay it back?"'
- speaker: Respondent
  text: 'Mary then spoke of the church and religion: "We, ma, we don’t never go.'
