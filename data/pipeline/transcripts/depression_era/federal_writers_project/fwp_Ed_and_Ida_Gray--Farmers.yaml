collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: My children work hard on our place. This is their only source of income.
- speaker: Respondent
  text: Ed is very intelligent, plain well looking man, very in complexion, dressed in overalls, and wide brim hat was sitting
    back on his head.
- speaker: Respondent
  text: Ida is very stout, mulatto in color, dull orange dress with white fibers, an apron covered part of it, and an old
    straw hat was perched on her head.
- speaker: Respondent
  text: Rosa Lee is very large, with dark complexion, he was very quiet and did not have very much to say.
- speaker: Respondent
  text: Bessie said, we are fortunate to have strawberries on hand. Yesterday we received $1.57 a box for the berries. We
    are busy trying to get some of them ready for the market. We have a large market in Plant City, supposed to be the largest
    market in the world. When we take the strawberries to the market, all we have to do is drive right to it and they give
    you your price right now.
- speaker: Respondent
  text: During this conversation Ed had gone back to the field and soon returned with his mule P. Jack hitched to sled. On
    the sled were several boxes of strawberries. It is easy to get the berries in from the field this way. The sled does not
    ruin the grounds.
- speaker: Respondent
  text: Jack is well trained, as he had unloaded the strawberries, walked over to the water pump and stopped. Ed began to
    pump a tub full of water, Jack drank until he was satisfied himself. Then he stood perfectly quiet while I barked and
    jumped up after him.
- speaker: Respondent
  text: Fennie who had gone in the field appeared again in the shed. Fennie said, I come over to help father yoke his strawberries,
    we have a small plot planted over to our place.
- speaker: Respondent
  text: Fennie is much smaller than her other two sisters, and brown in complexion. She had on brown gingham dress, and a
    straw hat. She said, I like to work on the farm. We have a small log cabin over on the fields about a mile from here.
    You can see our cabin if you just look around this side of the shed.
- speaker: Respondent
  text: We reach it by the path across the fields, three acres. We try to raise food for ourselves to sell most of the time.
    My husband works for other people when he is not just started.
- speaker: Respondent
  text: I was born in Madison, Florida, January 15, 1876. I lived around Live Oaks Florida, nearly eighteen years. I came
    to Hillsborough County during 1942. I spent a few years in Plant City before coming out here in 11.
- speaker: Respondent
  text: I have two brothers living in Tampa, Florida, James and Henry Gray.
- speaker: Respondent
  text: When I first came to this place it was a wilderness. The road we came over was just a trail, and now it is not much
    better. They are working it for hard surface. You couldn't see this distance when I first came out here; in fact you could
    not see as far as my house which is about fifty feet to the road. It was all thicket. I cleared every spot in this place.
- speaker: Respondent
  text: I still have plenty to do from the looks of all them stumps standing up in the field. I expect to blow them out this
    summer. I remember when the C P, that's the Florida Central Peninsular Railroad, ran through here. It is now the Plant
    System.
- speaker: Respondent
  text: They call it the ACL. The old timers only know it as the Plant system. There were very few Negro families settled
    out here when I came. Only in the last few years have they settled.
- speaker: Respondent
  text: My wife was born in Madison, Florida. She does not know her birth date. Bessie can tell you. Bessie said mother was
    born in 18--. We love to keep up with mother's age because she soon forgets. All of her people were born around Madison,
    Florida. She doesn't know too much about her people. Pa and Ma were old slaves and married in that section.
- speaker: Respondent
  text: I said, I was educated in Live Oak Florida. I went as far as the 11th grade. All of my children went as far as the
    6th and 10th grade. Bessie went as far as the 10th grade.
- speaker: Respondent
  text: Bessie said, I had to go to school in a car with other children who went to Plant City. They don't live a school bus
    running out here because there is not enough children to have one. We have a small school down the road which only goes
    as high as the eighth grade.
- speaker: Respondent
  text: I spent some time in Florida Agricultural and Mechanical College. I was one of the girls of the thirteen chosen to
    go to the College selected by the NYA to take a four month course in Home Economics. All of our expenses were paid by
    the NYA. I like that kind of work, and I am planning to go back in the fall and try to complete the course.
- speaker: Respondent
  text: Some day I hope to teach the subject. We bore little course in our school in Plant City. Our little school out here
    begins their term in April and closes in December. They do that to allow the parents to use their children in the field
    to pick strawberries. Some work out for others and make money for them.
- speaker: Respondent
  text: Ed said, while we are talking about education I do read a little at times. Instruction is that education and religion
    are the two greatest powers on earth.
- speaker: Respondent
  text: Religion should be first, and the rest will come. I belong to the Missionary Baptist Church at Antioch. We have service
    twice a month. Our pastor comes out from Tampa, Leo or Tia.
- speaker: Respondent
  text: We look for his Sunday to come because we have such good services. We hardly miss our church service because we feel
    that God will bless you if you worship him. I don't like the way some things are handled in this world and especially
    the people whom I consider to be so religious. Sometimes they play with religion and that is something that you shall
    not play with. I don't believe in playing with the Lord's works.
- speaker: Respondent
  text: When I first settled here there was no church out here. More families kept coming and soon we had a small church going.
    When I first came out here folks said I was crazy, but who is crazy now. One thing I haven't been on relief since I have
    been out here, and hope never to go on. I manage to make enough to take care of myself and family. Somehow the Lord has
    helped me to make a living out of it.
- speaker: Respondent
  text: My biggest crop is strawberries and beans. I grow baby limas, peas, Irish potatoes, sweet potatoes, corn, peppers,
    cucumbers, onions, tomatoes, and other vegetables for the table. I hated to plow up two acres of strawberries to make
    room for my spring crops and just at the time strawberries are bringing good prices.
- speaker: Respondent
  text: I sometimes have enough income to carry me through from one butchering to another. You saw my hogs with those fine
    pigs coming on. Up at the end of the field at the edge of the orange grove there is a crude hog pen built. A large hog
    with five pigs are busy rooting away. We have chickens who are good layers.
- speaker: Respondent
  text: Sometimes we take the eggs to town and swap them for flour and meal. The most we look for is clothes, and we only
    need them on Sunday. I can make out with overalls. That's all a fellow needs when he is farming. We are not so far from
    towns and you can hit the hard road one mile either way. It only takes ten minutes to go to town. That's why I keep that
    old T-Model Ford. It's a 1925 model. I use it to haul my berries to market.
- speaker: Respondent
  text: I am sorry to leave you, I must take this load of berries to town. I will soon be back.
- speaker: Respondent
  text: He said while cranking up his car, I have a large tract of sugar cane growing down there near the ditch. I also raise
    peanuts, I use them mostly to fatten my hogs.
- speaker: Respondent
  text: He was off down the dirt roads all you could hear was the jugs jug of the Ford hitting and missing.
- speaker: Respondent
  text: Bessie said, we manage to keep pretty healthy around here. Our nearest doctor is located in Plant City, and we have
    a few midwives here.
- speaker: Respondent
  text: Ida said, that's all I had when my children were born. A pretty healthy looking bunch, ain't they? If we get a cut
    just get some old axle grease and rub it in good. If the cut is too deep get some cobweb and that will stop the blood
    from running. In olden time people didn't know what a doctor was. Every time you turn around now, it has to be a doctor
    for this and a doctor for that. They cut you open for the least little pain. I don't see no sense in it, no I don't.
- speaker: Respondent
  text: Bessie said, I wouldn't live in the city, it is too crowded. If I didn't own a home I wouldn't live there. I like
    to farm, it is not crowded. You can have all the freedom you want. No one to look into your back door.
- speaker: Respondent
  text: Ida had hunted the children to the little store down the road for kerosene so she could cook their dinner. Ida walked
    to the fence to see if they were coming, having a mutt towel over her shoulders, and still had very little to say.
- speaker: Respondent
  text: Ed had returned from Plant City, and seemed pleased over the price he received for his berries, stating that they
    had given him 15 cents for his strawberries. And thank goodness I still have more in the field.
- speaker: Interviewer
  text: Ed was asked if he ever voted.
- speaker: Respondent
  text: I have never voted any place. I have always been a man to attend to my own business and leave other people's alone.
    In some places it is hard for a colored man to vote. I have never troubled myself about it. I suppose all of this voting
    business is what hurts some prices on what you raise.
- speaker: Respondent
  text: I sometimes get a hold of newspapers and read them. And sometimes around the market I hear the folks talking about
    politics and the war. Do you think we will ever fight again? I hope not. The next war won't be like the last one.
- speaker: Respondent
  text: Bessie, who showed interest in the interview said, what I learned in school has helped me a lot around here. We have
    a canning center out here in this settlement. We take our provisions up to the center and can them. See the boxes stacked
    next to the kitchen cabinet? They are full of canned goods.
- speaker: Respondent
  text: We can them and pack them back into the boxes, and keep in a cool place. We make our own syrup too. Sometimes have
    to have flour, but we exchange eggs for what we want.
- speaker: Respondent
  text: I also learned how to make sweet things while in school. Some Sundays I try putting making something sweet for dinner.
- speaker: Respondent
  text: Rosa Lee less busy in the house, walking around singing some old time song. Later she donned her straw hat, joked
    up a hoe sitting next to the kitchen door, walked to the field and began hoeing the corn while she sang.
- speaker: Respondent
  text: The interior of the home was rustic and was partially celled, long logs ran across the ceiling, and the tin roof could
    be seen. The rooms were partitioned off with rough cut lumber, with cretonne curtains hanging at the doors.
- speaker: Respondent
  text: The front room used for a sitting and bedroom. The furnishings consisted of a double bed, an old trunk, a dresser,
    and one chair and rocker.
- speaker: Respondent
  text: The other bedroom was very spacious consisting of three beds and a dresser. There were curtains at the windows. The
    kitchen furniture consisted of a three hole briler, a large kitchen cabinet, a large round dining room table, and several
    chairs.
- speaker: Respondent
  text: A little room was adjoining the house, next to the kitchen door which was once used as a kitchen, Bessie stated.
- speaker: Respondent
  text: The floors were bare and nearly waste from scrubbing. The interior of the house was clean and neatly arranged in spite
    of the crude furnishings.
- speaker: Respondent
  text: During all this time Ed kept busy moving back and forth from the field. He said, now I rest a while and talk to you
    some more. I be at on the door sill. I'm trying to put in my spring crop. If we could only get some rain we would get
    off to a good start. You noticed how dry everything is now, really badly.
- speaker: Respondent
  text: If I had electricity I could tell what the weather is by using the radio. Then I could own a radio. The best we can
    depend upon now is to look at the sky and watch.
- speaker: Respondent
  text: Farming is nice when you have everything to farm with. One thing we can borrow from one another here in the settlement.
    A poor colored man sees a hard time on the farm. Oh well I guess a poor everybody has it hard. Rich folks buy up acres
    of land and put folks out to farm. That makes it hard to get hold of land. I need twenty acres more, but I have no way
    to stretch out. I was lucky when I got hold of this piece of land.
- speaker: Interviewer
  text: Now you want to know what I do when I am not work
