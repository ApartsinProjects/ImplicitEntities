collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Yes, I am a pioneer, and about the only one left of the early settlers. I was born January 31, 1858, in Sidney, a
    small town near Williamsport, Pennsylvania. My father was J. C. Maley, a Scotch emigrant, while my mother was of Irish
    ancestry. I was the eldest of five children.
- speaker: Respondent
  text: In the early part of 1867, Mr. J. Mohan, a neighbor of mine, made a trip to Florida in search of milder climate and
    a business location in this frontier country, and found what he desired at Port Orange, on the Halifax Peninsula, where
    about a year before Dr. J. M. Hawks had established a sawmill. This section at that time had marvelous stands of live
    oaks.
- speaker: Respondent
  text: Having made arrangements with Dr. Hawks to work at the sawmill, he returned to Pennsylvania, persuading my father
    to come with his wife and two children. I was eight years old at this time.
- speaker: Respondent
  text: We embarked on a steamer at Baltimore for Savannah, which we reached after eight days, having been roughly tossed
    about by a severe storm. At Savannah we boarded the steamer Darlington, continuing our journey on the inland waterway
    to Fernandina, Jacksonville, then via the St. Johns to Enterprise, now known as DeLand Springs. We spent the night there
    very comfortably at the Brook House, owned by Jacob Brook, an early St. Johns River steamboat captain. The steamboat Darlington
    was one of a line of river boats he also owned and operated.
- speaker: Respondent
  text: The next day we went by wagon trail to New Smyrna and from there to our destination on the Halifax Peninsula to Port
    Orange, about six miles north of here. Two weeks had elapsed since we left our home in Pennsylvania.
- speaker: Respondent
  text: The sawmill never was a success as a business venture because it was too difficult to market the lumber. They had
    to depend on intermittent schooners to carry the cargo to coastwise ports. The schooners were not sturdy, and more than
    one was beached in heavy storms or wrecked by the heavy lumber shifting, causing the boats to capsize, so many months
    of work and effort became prey to the angry ocean, with no financial return.
- speaker: Respondent
  text: However, those pioneers were hard-working and persistent, and in the next few years three more families had been added
    to the settlement, and Dr. Hawks established the post office, which he named Port Orange, on account of the groves which
    were being set out in native sections and also the prevalence of solitary orange trees.
- speaker: Respondent
  text: Dr. Hawks claimed that a letter simply addressed 'Port Orange' would be delivered promptly to this Florida post office,
    as it was the only one so named in the entire United States. In 1870 or so, Dr. Hawks abandoned the sawmill business,
    leaving this locality and founding the town of Hawks Point, now known as Edgewater, farther down the coast.
- speaker: Respondent
  text: Mr. Day of Mansfield, Ohio, was famous as the developer of this territory. He was looking for a location to establish
    a colony. We drove over to Port Orange with my father, spending about 40 days in our home, during which he and my father
    went up and down the Halifax River looking for a spot for the proposed colony.
- speaker: Respondent
  text: This section, part of the old William Grant of Spanish days, was finally selected, and in the fall of 1870, the colony
    was organized for Mr. Day of Mansfield, Ohio, not for the town of Patton, Ohio, as is sometimes erroneously stated. It
    was established with nine families from the Ohio city.
- speaker: Respondent
  text: During the summer, Day erected a sawmill nearby, had lumber cut, and built a large building out of the native product
    of his mill, naming it the Colony House, in which the colonists were to live until they were able to get settled in their
    own homes.
- speaker: Respondent
  text: Since then we have always had a hotel of some sort in Port Orange called the Colony House. Mrs. Mary Hoyt bought the
    original, changed the name to the Palmetto House, and operated it as a small hotel, the first hostelry, by the way, of
    Volusia County.
- speaker: Respondent
  text: It burned down about twelve years ago, everything being totally destroyed. The building was vacant at the time, and
    it is supposed the fire was started by tramps or other vagrants sleeping temporarily in the building. It was too bad,
    as it was such a famous landmark.
- speaker: Respondent
  text: Mr. Day and my father became firm friends, and a year later he induced my father to leave Port Orange, which had become
    almost depopulated after the decline of the local sawmill, so in 1871 we came to Daytona.
- speaker: Respondent
  text: I forgot to say that Dr. Hawks' company was called the Florida Land and Lumber Company, and the sawmill was known
    as the Port Orange Mills. There were a few negro laborers who came down with the mills. After Dr. Hawks' departure, the
    post office was discontinued, and the name given to another post office six miles south of here, previously known as Hob
    Daniels. So the original Port Orange and the present town of that name were really twelve miles apart.
- speaker: Respondent
  text: In the meantime, our old Pennsylvania neighbor, Mr. Mitchell, bought an orange grove at Oak Hill below now Smyrna,
    and located there.
- speaker: Respondent
  text: Daytons prospered from the first. Mr. Day was a fine businessman, a good manager, and seemed to think of everything.
    My father built a splendid home for the family right on the corner of Cedar Street and what is now Beach Avenue. The building
    was constructed of lumber from the local mill.
- speaker: Respondent
  text: The next year, Captain Swift, contractor for the United States government, came down from Rowe, Bellfort, Massachusetts,
    with a crew of between four and five hundred men, live oak cutters.
- speaker: Respondent
  text: The government had some sort of a contract, perhaps such as is known as 'timber rights,' for the Williamson grant.
    Large sawmills were established, and this army of men busied themselves for a number of years during the fall and winter
    period in cutting and sawing into lumber the live oak timber for government shipbuilding. The men lived in camps, and
    Captain Swift operated a commissary from which they obtained their food supplies.
- speaker: Respondent
  text: My father worked at anything he could get to do. He was a carpenter, also a blacksmith, and between the two trades
    he kept fairly busy. Then, too, he set out an orange grove, which he tended himself, selling the fruit at fair prices.
    Like the other early settlers, he had to adapt himself to many situations then it came to earning a living in this new
    country. If he had been like some people today, with only one trade, he would have had a hard time getting along.
- speaker: Respondent
  text: The first school was established in 1872, taught by J. W. Smith. His daughter, Bertha, Mrs. Charles Smith, whom she
    married, is still living here. She is a few years older than I, and is the only one of the early settlers besides myself
    still living here. Her grandson is H. L. Smith.
- speaker: Respondent
  text: Among the other residents when we came here were Miley Vick and family, the Sulkers, the Burdicks, Captain K. H. McIntyre,
    Arthur West, an Englishman, John Trist and his family, Dr. Coleman and his family, with Mr. Johnson, Mrs. Coleman's father.
    Mr. Chamberlain, botanist, had a place with greenhouses on Beach Street where he had a splendid collection of native Florida
    plants and flowers. It was just a hobby with him, as he never pretended to commercialize his collection.
- speaker: Respondent
  text: Then there was Mr. Day's cousin, Van Bibb Day, with his two sons, Nat and James. Loomis Avenue is named for one son.
- speaker: Respondent
  text: Mr. George Woodruff was another early settler, and George and Charley with their sister, Mrs. Townsend, all from Ohio.
- speaker: Respondent
  text: Mrs. Mollie Ling Swett, of New Smyrna, is a descendant of one of the pioneer families, the only one who went from
    Port Orange to that section. She is a great-granddaughter of Mrs. Maley. Lots of historical data. Grace A. Lou, daughter
    of Mrs. Sheldon, is also living.
- speaker: Respondent
  text: William King was another early settler; he was a bachelor. On the other side of the river was J. H. Bethepher, another
    of the Pennsylvania Dutch.
- speaker: Respondent
  text: My husband, William Jackson, was a native of Glasgow, Scotland. He came to Jacksonville in 1872 and was a bookkeeper
    for John Clark, operating a general merchandise and liquor store on Bay Street, serving mostly as a ship chandler, as
    the Jacksonville harbor was alive with steamboats in those days, and he had a good business. He lived with the Clarks
    family on Savannah Street. He knew Judge John Locke Yoggott and others of the pioneer families of Jacksonville.
- speaker: Respondent
  text: Mr. Jackson came to Daytona early in 1876 and we were married that same year. We had a big wedding, everybody came,
    and still had a good time. They did not overserve us, but there was a wedding dinner and champagne and plenty to eat.
    We lived with my father's family for seven years until we built this home in the middle of the block on Velar Street,
    adjoining my father's place on the corner of Beach Street.
- speaker: Respondent
  text: When we went to housekeeping, my mother gave us my sister, Nether, the youngest and twin of my brother John Maley.
    She said, 'You have her, as we have no one else to take care of.' Nether has been a great help and of much comfort to
    me during the long years past. There she sits, always busy at something, she said, directing her eyes to a slender white-haired
    woman sewing by the window in the adjoining room.
- speaker: Respondent
  text: Mr. William P. Burr had the first store in Daytona. He died shortly after my husband and I were married in 1874, and
    Mr. Jacklen bought it, operating it for many years. It carried general merchandise, dry goods, boots, shoes, hardware,
    groceries, and provisions of all kinds.
- speaker: Respondent
  text: My husband became prominent in the business affairs of the city, was on the school board, a member of the board of
    city commissioners, and was postmaster when he died in 1917. My mother was postmistress first, he acting as her deputy,
    and when she passed on, he became postmaster.
- speaker: Respondent
  text: 'We had five daughters, two dying in infancy. I remember my youngest daughter, Isabel, saying one day to a visitor
    who patted her on the jaw and asked if she had any brothers, and she answered: ''No, sir, just us three girls, and not
    a boy among ''em.'' Isabel, the name of your sonny husband, and another laughter two years later. Sideline, a clerk in
    the Daytona Book and Stationery Store, 232 South Beach Street, is the only one of my children left.'
- speaker: Respondent
  text: And this is the house he built a few years later, a substantial building, as the Iowa fiber was a hall where all ages
    could gather. It was the only place in the 1880s where public gatherings could be accommodated. The first Masonic lodge
    was organized and met here regularly for many years.
- speaker: Respondent
  text: You may be interested in this in the sense of the banquet tendered the officials of the St. Johns and Halifax River
    railroad on November 2, 1886, upon the extension of the line to this point.
- speaker: Respondent
  text: The St. Johns and Halifax River railroad is another important link in the Florida east coast or eastern system.
- speaker: Respondent
  text: At the time of the banquet, an ice factory had been in operation here for a short time previously. It was established
    by a Mr. Bush in 1886 on North Beach Street. Before that, Mr. Jackson supplied the town's requirements by having ice shipped
    by schooner daily from Jacksonville. People learned quickly to make and freeze ice cream, which was always a feature at
    picnics and parties.
- speaker: Respondent
  text: I do not know just what the 'Roman' cream was, listed on the menu, unless it was flavored with Italian wine.
- speaker: Respondent
  text: This is a picture of the old Colony House; and this is the Ocean View, a later hotel, incorporated now in the Prince
    George. This is Mr. Jackson's old store, and this the new one, which he sold the year before he died. This is our first
    home of my father, J. C. Maley, on the corner of Beach Road and Cedar Street. This is my husband's pleasure boat, the
    steamer White, which lived to run between here and the Indian River. It was too early, however, for such large watercraft
    to be popular, and in 1886 he sold it to the Jacksonville, Tampa and Key West railroad, for use in their service at Key
    West.
- speaker: Respondent
  text: All those photographs were made by S. A. Northrop, the first photographer to locate in Daytona. Mr. Harris has passed
    away, but his daughter, Miss Uslia Harris, still lives here and may have other early pictures of this section.
- speaker: Respondent
  text: Wait until I get my other glasses. I have never had bifocals, as I never thought I would like them, so I use separate
    reading glasses and so if I can't locate my old paper.
- speaker: Respondent
  text: Here is the Sunday Daytona Smash News Animal, February 19, 1890, giving a write-up of the first train into Daytona.
    Such tide was when they held the celebration and banquet in November, 1889, with some of the old photographs illustrating
    the article.
- speaker: Respondent
  text: You can see in this picture of Mr. Amok Jones' first store how close it was to the river, with a rowboat beached right
    in front. That was the way we used to travel in the early days. The Seek family had boats and they used to row up and
    down the river on Sundays and to visit each other.
