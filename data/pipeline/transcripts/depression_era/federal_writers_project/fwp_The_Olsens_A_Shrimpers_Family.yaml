collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Replying to my inquiry about the migration of the shrimp fleet,
- speaker: Respondent
  text: 'You know our best season here is in the winter and treats from other sections also make their winter headquarters
    here, but now the season is just about over and the shrimp are getting scarce, so it won''t be long until the boats or
    some of them will seek other fishing grounds: watching the migration of the shrimp, the boats move along the coast, both
    Atlantic and Gulf, depending on the seasons and the catch. Brunswick, Georgia, and Beaufort, South Carolina are the two
    points on the south Atlantic coast most generally used as headquarters for the fishing fleet during the summer months
    and on Biloxi, Miss., the Gulf coast, Morgan City, Louisiana and Galveston, Texas. This time Mr. Olsen is starting out
    for the Gulf coast, but in other years when fishing off the Atlantic coast, we just pack up the things absolutely necessary,
    put them in the car, and when we reach Brunswick or Beaufort, we rent rooms or a small house and live as simply as possible.
    Of course, we who have children of school age always return home in the early fall in time for the opening of school,
    so that the children''s education will not be interrupted.'
- speaker: Interviewer
  text: Curious about the beginning of the shrimp industry here, as we know it, find that it originated about 1913 in Fernandina,
    Florida.
- speaker: Respondent
  text: St. Augustine, having a harbor well protected and amply deep for small boats, soon attracted fishermen who gradually
    built up a lucrative business. Swedes, Italians, Spanish, Portuguese, and Greeks in the fleet, and also a number of negro
    helpers are employed. The narrow San Sebastian River offers safe anchorage to the many small craft that have their headquarters
    here during the season. Packing houses were erected, and also a canning factory, where the shrimp are prepared for the
    canning process. The completed products of this factory are shipped to various sections of the United States, and also
    to foreign markets. Formerly the fresh shrimp were packed in barrels of ice and shipped by freight or express, but now
    most of the shipments are made in refrigerated trucks owned and operated by several local dealers and in this manner quick
    delivery is made directly to the northern markets, New York City being the main distributing point. The price on fresh
    shrimp, wholesale, averages about ten cents per pound but in New York this is with the heads removed before shipping.
    One hundred pounds of shrimp, as caught, equal fifty-six pounds with heads off. The average boat catch for a local six-month
    season would average about 260,000 pounds. This is an average for a good season. Seasons vary from year to year. The equipment
    is costly, upkeep of the boats, wages of the crew and general overhead expenses must be considered. The local eating places
    serve shrimp prepared in some form, boned, in salads, and fried. The shrimp fried in St. Augustine style have won quite
    a reputation among the visitors, and to meet the demand of 'Please tell us just how this is done and why do they taste
    so differently from other places we have visited,' printed recipes are distributed at the local Chamber of Commerce office.
- speaker: Interviewer
  text: Mrs. Olsen, I asked, have you always lived in St. Augustine?
- speaker: Respondent
  text: I was born right out here on the St. Johns River and have spent practically all my time in St. Augustine. My father
    was German (chill), he passed away a long time ago. Of course you could see, said Mrs. Olsen, that Gus is a Swede; he
    was born in Sweden but has been here since 1920.
- speaker: Interviewer
  text: Asking about their interest in politics,
- speaker: Respondent
  text: We are Democrats and vote at election time; interested in local, civic government, as well as the National Government,
    especially as it affects working conditions. Deeply concerned in the local movement for harbor improvement, as the shifting
    sand bars and channels, and the insufficient depth over the bar for larger boats, have, for several years made passage
    in and out of the harbor dangerous, especially in rough weather.
- speaker: Interviewer
  text: Asking Mrs. Olsen if she is willing to have her name used in this interview,
- speaker: Respondent
  text: 'Oh, of course it is alright; you know some people seem to think that the ones who shrimp or fish for a living live
    in shacks, haven''t any education or comfort, and while we have to economize and have many things to contend with, such
    as bad seasons, stormy weather sometimes, when the boats can''t go and costly accidents such as happened recently, outside,
    but taken as a whole, we try to live comfortably and give to the children the schooling and training that will enable
    them to take care of themselves later on; well, at least, we hope they will be desirable citizens. Mrs. Olsen is very
    proud of her son and daughter, and spoke so kindly of Mr. Olsen: Gus, she said, is much a good husband, and he loves the
    two children as much as though they were his own, and they have all the affection and respect for him due to a father.'
- speaker: Interviewer
  text: Asking about her earlier life,
- speaker: Respondent
  text: Now let's just omit that, after all that is a personal matter.
