collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Gladys attended boarding school, where she graduated with honors. She is quite an artist and also writes poetry. While
    she has never taken any lessons in art, she draws quite well, and her poems, which she writes on all occasions and on
    many subjects, mostly about children, are quite worthy of attention. Good Housekeeping and other magazines of note have
    told her they considered them good, but not quite in line for their magazines. She is very persistent and keeps hoping
    to be able to get them published someday.
- speaker: Respondent
  text: Married at an early age, not realizing that the man she married was irresponsible, or rather, not taking the matter
    into consideration as of any importance whatsoever, she found some years of her life rather stormy. Although her husband
    was unfaithful to her and was kind and pleasant at home, a willing worker, and a pleasant companion, without the assistance
    of her husband's people, and sometimes that of her own father, she would have had very hard rows, as he could not resist
    the temptation to drink, and money in his pocket meant self-indulgence to such an extent that the family moods were neglectful.
- speaker: Respondent
  text: After trying various places for work in which she had no experience, she was finally able to secure employment through
    the Government on a WPA project, being placed in the office of the Recreational Center. When first entering the office,
    she had no experience whatsoever, except that one had learned to type on a borrowed machine used at home. Her work was
    not so hard and her employer kind and helpful, and she learned very quickly, and is now quite able to handle all matters
    pertaining to her work without difficulty. She is now studying shorthand alone, having secured a manual and learned the
    fundamentals of the study, and taking as much dictation as possible in her routine work.
- speaker: Respondent
  text: Though Gladys, all of her husband's people, and all of his friends (for he has a charming personality and makes friends
    easily) tried to help him overcome his drinking, he allowed the habit to grow, and it eventually affected his disposition,
    his ability to work, and life became a nightmare of worry, fear, and uncertainty. Finally, realizing that it was unfair
    to her children, to her mother-in-law, who was loyally standing by to help her in her fight to care for her children,
    and to herself, she secured a divorce.
- speaker: Respondent
  text: Caring deeply for him, not only as her husband and the father of her children, but as a diseased, rather than a self-indulged
    man, she carries the load of maintaining the home, educating her boys, and giving them the high ideals of a Christian
    home, with chin up and a smile for all, although an ache is deep in her heart. Her greatest burden is having her children
    ask for their daddy.
- speaker: Respondent
  text: Her father, though very weak, was devoted to his family and was never too busy to build a toy for his boys, or show
    them the rules of a game, or enter their play with them. He was always a 'pal' to his sons, mind if he is never able to
    be with them a great deal, they will always treasure the memory of their father as they only saw his gentleness and were
    protected from the unpleasant alleys that went with the life he was living.
- speaker: Respondent
  text: Through her work, she has been able to secure rooms for herself, her mother-in-law, and her children at a much cheaper
    rental than she could otherwise get, being near the playground with which she is connected in her work. The children go
    to the playground and are under the supervision of a very able director, who is also a friend of Gladys. The environment
    of her home is not of the standard to which she is accustomed or that she desires, as the children are thrown with children
    of illiterate classes to some extent, and they quite easily acquire their vernacular of speech and other mannerisms. Billy,
    the younger son, only six years old in his baby days, uses very correct idioms, very unusual for a child of his years.
- speaker: Respondent
  text: Since moving into this community, Billy adopted the manner of speech of the children he plays with. A few days ago,
    the playground being closed as the leaders had gone home, and children came to the door, Billy, in a very courteous manner,
    said to the door, 'The playground is closed.' His colloquialism has already come and went.
- speaker: Respondent
  text: The mother often worries lest, by trying to give them the material things they need, she gives them an environment
    that will be detrimental to their character building; then, she will try to figure that the best in them will develop
    with hardships also. She usually stays on the fence as to whether she is right or wrong.
- speaker: Respondent
  text: For a person who fled had no hardships in youth, and nothing to bring out the steel in her character during early
    days, Gladys has developed a wonderful strength of endurance, and with it all she carries a pleasantness that is rather
    contagious to those with whom she comes in contact. The usual remark that is made when speaking of her is that she is
    'the sweetest of good'.
- speaker: Respondent
  text: The older boy, 'Sonny,' who is nearly ten years old, is very large for his age, and is considered by anyone who doesn't
    know his age to be about twelve or fourteen. He is larger than some of the fourteen-year-old boys who are his associates.
    He is very bright and he masters his studies easily. During the first three years of school, he was an honor pupil almost
    every month, missed only by illness. Since moving to the present location, although his marks are high, his average being
    90 to 94.42, he has not been able to attain the honor roll. His mother will be elated the first of the month, being confident
    that he will make it this month; and when the card comes at the end of the tenth with one or two demerits, she sulks,
    for his disposition is to be either in the heights or the depths—there is no middle course.
- speaker: Respondent
  text: 'After talking the matter over with the teachers in that ward, she has been advised that it is hard for any boy to
    make the honor roll in this particular grade, as a certain element in the ascendant discourages the whole grade, and ''Jenny''
    is not different—just a boy. This month he made ''A'' on every subject, 100 in attendance, and 99 in deportment. A note
    from the teacher said: ''This beautiful card would not be ruined by chewing gum,'' and it was learned that on the last
    day, ''Sonny'' had a mouth full (almost a whole package) of gum, and did not try to keep the teacher from seeing it, but
    rather displayed it, so the general conclusion is that he is afraid of being called a sissy by the boys in the grade,
    and deliberately failed to make the honor roll.'
- speaker: Respondent
  text: Billy is not so bright in his studies; it is harder for him to grasp a concept, or else he is too energetic or nervous
    to concentrate. He was rather handicapped in starting out; his books were not some and the other classes were ahead of
    him and he could not catch up easily; then too, his teacher said he was very sensitive, and it is not so in the home that
    his feelings can be hurt very easily. He is bright, small of stature, white-haired and freckled faced, with his front
    teeth wide apart; in fact, a freckled-faced boy, shown on a magazine cover.
- speaker: Respondent
  text: The mother-in-law and daughter-in-law are very close companions; each striving at all times to do something that will
    help the other, and praise for the other being constantly given. It is quite unusual to find such companionship existing
    between mother-in-law and daughter-in-law. The work of the home is carried on by each of them, the grandmother caring
    for the home and the children while the mother works, she doing quite a lot of the work at home after her office hours.
    Gladys prepares breakfast in the morning, dresses the children for school, prepares their lunch, and does as much as possible
    to 'clean house' before she leaves, as the grandmother does not rest well at night and sleeps late.
- speaker: Respondent
  text: The grandmother prepares the dinner, sews, and sometimes does the washing on the washing machine that is furnished
    by the Community Chest, but as it is rather hard for her, and she is susceptible to cold, Gladys does much of this work
    after she returns at night. The ironing and other work is divided between them, the one having the most leisure doing
    the job.
- speaker: Respondent
  text: On Saturday, most of the house-cleaning is done, and everything laid aside for Sunday morning, when Gladys dresses
    the two children and herself for Sunday school and church, which is missed only on the rarest occasions, and the children
    consider it a part of their weekly routine to attend. Sunday school is just as essential to them as day school, and they
    carry their Bibles to recall the standard of excellence. When the meals are served, grace is always said at the table
    by 'Sonny,' but Billy will not allow anyone to begin eating until it is over.
- speaker: Respondent
  text: The general health of the family is good. The children have had the usual ailments of measles, mumps, sometimes tonsillitis
    in a light form. At this time, Sonny has the mumps, but is getting along nicely, and except for being out of school, it
    is of little consequence. The grandmother had very serious throat infection about a year ago, but her sister took her
    to the hospital for treatment, taking care of the expenses entailed.
- speaker: Respondent
  text: She was fed through the veins for a week as she recuperated from this illness, but is not very strong. She has other
    children who are in much better circumstances financially, who could give her every care and aid and are within taxi miles
    to do so, but she feels that she can be of use to Gladys with her children, and will not leave her to go to her own children
    to live.
- speaker: Respondent
  text: The diet for the family is varied. The main item on the menu being milk and butter. The grandmother and smaller son,
    Billy, both depend almost entirely upon milk as a diet. Sometimes Billy will eat nothing but milk and bread. About three
    years ago the situation was rather acute, as the family budget would not allow for a sufficient amount of milk for the
    family. An aunt bought a cow, paid $5.00 for her, and found her to be a five-gallon-a-day cow, when properly fed.
- speaker: Respondent
  text: At the present time they are unable to keep her at home, as there is no barn at the Recreational Center, where they
    live now, so a man in the country is feeding and caring for her, and giving the family a gallon of sweet milk per day,
    which cares for the situation very nicely. They have been offered a nice sum for this cow, but are unwilling to sell her.
- speaker: Respondent
  text: They also have green vegetables quite often, and most of the time they keep a small garden with turnip, freeho, collard,
    onions, and lettuce. At this time they are minus the garden also, but they manage to get the vegetables cheaply. They
    also serve dried beans, butter beans, and peas often. Very little meat is used, although the grandmother and smaller grandson
    are great 'meat eaters'.
- speaker: Respondent
  text: The main recreation, or diversion, for Gladys is the association with her husband's brother and his wife. The two
    families have always been very close, and now they spend each weekend together. One Saturday and Sunday will be spent
    at the home of Gladys, and the next weekend with the brother-in-law and sister-in-law; each carries a small supply of
    groceries to help care for the weekend meals, without expense to the other. They all attend Sunday school and church on
    Sunday mornings.
- speaker: Respondent
  text: The home is rather hard to describe. It was at one time a home for underprivileged children, but the house has been
    abandoned and a new one built. The old building was taken over by the local sponsors as a recreational center for the
    children in this district. They also installed a washing machine for the benefit of the women in that community. A janitor
    is kept to keep a fire and hot water for the use of the women in their washing.
- speaker: Respondent
  text: Each person is allowed to use the machine, with hot and cold water, one near, for a dime. The grandmother looks after
    the engagements and collects for the use of the machine, which amount is turned in to the sponsors for the upkeep of the
    machine. The old home is large, and from the outside looks very nice, setting back from the street, with a large yard,
    with big cedar trees surrounding. The walls are bad, the plaster being broken in many places, the floors uneven, and the
    room which they use is badly lighted. They have to burn electric lights all day, but anything over the dollar minimum
    they pay is provided by the sponsors. They furnish their own fuel, but the house rent is given free for the care of the
    home and services rendered.
