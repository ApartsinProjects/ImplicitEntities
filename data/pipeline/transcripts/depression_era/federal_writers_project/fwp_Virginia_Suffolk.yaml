turns:
- speaker: Respondent
  text: My husband, John, had male pork to do in town today, so he wasn't here until eight. I came to do this after he made
    his deliveries. He wouldn't be much help anyway, he wasn't like to talk, but I do.
- speaker: Respondent
  text: To often tell John that he is fortunate having such a lovable wife, else we would be hermits and live off in the woods
    somewhere, instead of on this lovely lake here in Leon Park. He is growing old now and seems to care less for the world
    and other people all the time. However, he's just as kind and good-hearted as anyone on earth and never objects to me
    having all the friends I put. He also lets me bring people here for help and assistance.
- speaker: Respondent
  text: John is proud of that clock, it is very old and somewhat delicate. The chimes are a lovely stopping sadness than a
    with a strain; they start up again if they fail to chime in the night, we both wake up lamentably, otherwise we sleep
    soundly.
- speaker: Respondent
  text: That old Mr. Thomas has been a fine friend. He used to see John so often; John was hurt in a car wreck. Yes, John
    was seriously injured as a young girl in a highway car crash raining out from a side street and crashed into our old lumina
    ground. As I just mentioned, John is so kind-hearted, and when he was able to leave the hospital after that accident there
    was another man there who didn't have anyone to help him. He had been struck by a hit and run driver and the culprit,
    who was the son of wealthy petunia, refused to deal.
- speaker: Respondent
  text: I kept it, was more or less for about five months. I had to take care of it all over twice. Our travels were terribly
    limited at that time, but friends came in and helped, and often lived in hospital to calm just to take care and we suffered
    too badly.
- speaker: Respondent
  text: That man who was his boss had been working there before he got hurt, giving the women dollar audit for his upkeep.
    However, I didn't feel that the money belonged to it well or him anyway. If budgets stop applied, John got hurt and he
    didn't kill anything. So I put every bit of it when that, I wasn't sure he'd ever get well and make his way. I put it
    away for safe keeping.
- speaker: Respondent
  text: What do you suppose he did? The man claimed as she advised her to escape about. It took that money and bought a car.
    There you go, so old said that he couldn't ever make a thing, and he took the money I'd saved and bought a car.
- speaker: Respondent
  text: I was born in Bradford in the north of England some 55 years ago. I had five brothers and three sisters. My father
    was the only son of wealthy parents, and he was an actor. I never knew to practice medicine, if not ever did. So he liked
    to experiment and engage in medical research. Often stated that he studied medicine for its science alone.
- speaker: Respondent
  text: I too loved the outdoors and instruments in study, so I spent more time browsing on my hobbies than I did with my
    own studies. I never thought of being a doctor, however, although those ideas for women were practically unheard of then,
    not did I grow up filled with strong desire to be of help to my people.
- speaker: Respondent
  text: To complete my literary course, in all I persuaded my father to let me be in training for a nurse. For 14 years I
    spent at home looking, I do not know, for the schools were very different in those times, and then my education was strictly
    by private instruction with a governess.
- speaker: Respondent
  text: In starting my training to be a nurse, I entered the Blackburn Infirmary in Lancashire. I suppose my father little
    dreamed that I would persevere and finish the rigorous course, but I did and graduated as I was nearing 21. After this
    completed I nursed in England for several years, and made a specialty of children's cases.
- speaker: Respondent
  text: People always seem interested in pictures of England; these are my parents and my girlhood two. Though I had plenty
    of work in England, I was filled with a strong desire to come to the United States. I had always felt a great interest
    in this land of mine; and would read and study all that could about it. I always enjoyed meeting Americans and questioned
    them unduly about their homeland.
- speaker: Respondent
  text: This country always seemed such a land of opportunity for youth. In England we were somewhat limited, mostly the middle
    classes, whereas the United States seemed to offer an unlimited chance for self expression and advancement.
- speaker: Respondent
  text: As my training progressed, so did my determination to come to this country. I bided my time and worked for several
    years in London. During that time, my father who was violently opposed to my coming here, passed away. My mother had never
    made such objections, and, as she had other children with her, I was free to leave about 1904 or 1905; I do not know exact
    year it was so it was no longer so.
- speaker: Respondent
  text: I did not stay long in New York, because of that child whose riot, whom you see there. I had just finished nursing
    her through a long illness when I made my trip to see.
- speaker: Respondent
  text: Not long after arriving, probably four months or six, I received a telegram stating need to return to England grieving
    for not to touch on event that it had caused a rift. They also sent for my passage. Returning to London immediately, I
    nursed rather into health, and when she became well I came back to Texas this time to settle.
- speaker: Respondent
  text: The same picture you see further to the left is the little girl when she was nearly grown. I kept in touch with her
    for some years after coming here, but I don't know where she is anymore.
- speaker: Respondent
  text: In speaking of England, one usually thinks of us all as tea drinkers, but in the south of England coffee is used as
    freely as it is here in this country. A number of people here have asked me how to make tea. Well, there's different ways
    and different tastes. Some of my people like it boiled until it is literally black, others add leaves to those already
    steeped and pour boiling water over its mass when placed on the hob to brew, makes a black thick tea.
- speaker: Respondent
  text: You know in my homeland many of the homes have hobs, these are heavy iron stands built in the fireplace and are used
    for hanging the teapot on. But the proper way to make a brew is to pour boiling water on fresh leaves, let it stand for
    a minute then pour it off and you have a fine delicate tea. In England we always serve tea about five in the afternoon
    accompanied by sandwiches, often and frequently, toast and jam.
- speaker: Respondent
  text: We kept servants they were served with what we called a pickup every morning at 11. If this were not provided they
    were higher. Pickup rates consisted of whatever leftovers were on hand. I continued the practice of this custom after
    coming to the United States and whenever I had fortunate enough to have a servant.
- speaker: Respondent
  text: Potato cakes are another favorite foods of the English peoples. They are made from mashed potatoes mixed with a little
    flour, thinned with water and cooked like pancakes.
- speaker: Respondent
  text: While on the subject of foods, I might as well say that it didn't take me too long to learn to use grapefruit juices
    in my cooking, because I've been using it in breads and cakes ever since I came to the bridge sections and that's been
    a long time ago. But some people think just because Texas got that idea out it's new.
- speaker: Respondent
  text: I specialized in diets and foods along with my training as a nurse; and after coming to the United States I spent
    some time at the Seattle hospital extending my studies and research work.
- speaker: Respondent
  text: It certainly is a wonder that the English people remain so hale and hearty the way they eat, for besides their regular
    meals and tea, it is nothing to enjoy a midnight snack. Just the eating habits at some of the people right here in New
    York are a message. They serve nothing for anything hot fried or boiled salt pork, fried bread and collard greens. Of
    course the greens are all right, but the others, by, oh, how do they endure it!
- speaker: Respondent
  text: Sometimes I try to help them assume the proper methods of living, especially where foods are concerned, but it is
    a difficult and thankless task.
- speaker: Respondent
  text: Shortly after I came to this country a brother and sister of mine came to Canada to live. I visited them there several
    times but did not find the country particularly appealing, so decided to take out citizenship papers here in America.
    My family booms, very angry at this and some oral argument ensued. One of my sisters wrote as from London to remember
    the blue blood in my veins. Well, for the time being I let the matter drop and some way or other I found time to take
    it up.
- speaker: Respondent
  text: I did write my sister and tell her that I'd rather be a citizen of the United States than have all the blue blood
    in Nubia and, furthered my statement to her by explaining that my blood looked as red as any. This infuriated her, but
    I held my ground.
- speaker: Respondent
  text: After a period of two years in New York and at the Greek Sams to return, I developed a bronchial trouble and the physician
    under whom I was working advised that I come to Florida for the winter. I came to Jacksonville, and on arriving liked
    it so well I stayed several years.
- speaker: Respondent
  text: I know you want me to go on with the history of my poultry farm, but just let me tell you about a custom that I brought
    along, besides the tea drinking.
- speaker: Respondent
  text: That custom is Shrove Tuesday, or Pancake Tuesday as we always called it. We children used to look forward to that
    day, and lived in anticipation until it arrived. Our dinner on that particular Tuesday we always had pancakes and meat
    pancakes they were.
- speaker: Respondent
  text: They were made of milk and eggs mixed with oats flour, poured very thin, consistency to the consistency of a wafer.
    Of course, most skillful ones used for frying them, because our daily mass was large, but regardless of pan sizes, only
    one cake was cooked at a time. This resulted in many pancakes of various sizes, but they were stacked up in tall piles,
    and when all were done so too, our places at the table and the pass into olden, no more than one at a time, spread with
    melted butter, sprinkled with sugar and lemon juice and rolled up gently like a stick, to be eaten with tea.
- speaker: Respondent
  text: I taught my friends that custom when I first came here, but within the lots for others I have lost my status at moving
    this type of pancake, so I have given the custom up entirely.
- speaker: Respondent
  text: He gathered up the two things and took them to the kitchen; the two dogs lolled about the floor awaiting her return.
- speaker: Respondent
  text: In speaking of England, one usually thinks of us all as tea drinkers, but in the south of England coffee is used as
    freely as it is here in this country.
