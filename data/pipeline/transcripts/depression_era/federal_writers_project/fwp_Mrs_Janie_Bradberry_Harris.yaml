collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Mrs. Henry was sitting at her desk busy making out reports. Are you too busy to talk to me this morning? I asked her.
    It all depends on what it is and how long it will take you. You know I can't take my working hours to talk personal matters.
    But first tell me what it is you want to know? I told her I would like to get her life history and wanted one of a WPA
    Project Supervisor. What do you want me to tell you? I asked her if I could see her at her home. Why, yes if you have
    a way to get out to my house, but I live way out on Tallassee Road. I guess I can talk and work too. I am waiting for
    my head boss to come and since I am not so busy this rainy day I expect you had better see me now. She is a large woman
    weighing about two hundred pounds, has gray hair and wears glasses. She was wearing a one-piece black dress, the skirt
    and sleeves were crepe and the body of the waist was cut velvet. She also wore black slippers and gray hose. Awake. Astute
    and shows she is very much interested in her work. She began, I was raised right here in Clarke County and was the oldest
    of seven. There were three girls and four boys in our family. There is nothing interesting about my childhood. We played
    and scrapped as children will do; and then we were large enough we helped in the field if there was anything for us to
    do.
- speaker: Respondent
  text: I dropped corn and beans many a day and picked cotton I was a good cotton picker. I remember distinctly there is a
    big difference back when I was a child and now. My father was an overseer for a man who had a large farm. We had plenty
    to eat and wear. We raised everything we ate at home. My father was also a basket weaver and made some of the daintiest
    little baskets you ever saw. He sold lots of them, the most of his income was from selling cattle, he raised lots of them
    for sale. When my sister and I wanted a new hat or dress, we sold eggs, milk, butter, apples or anything else we could
    find to sell. We lived near Barnett Shoals and we could always dispose of any surplus supplies we couldn't use, selling
    things to the people who worked in the mill. I remember I had a cousin who worked in the cotton mill at Barnett Shoals,
    whenever I went to see her, she would save up all the tin buckets and give them to me to take home. We thought we were
    rich when we got them tin buckets, they were rare things for country people to have. When I was 14 years old I bought
    a sewing machine. I ordered it from Sears and Roebuck, and paid for it sewing for Negroes.
- speaker: Respondent
  text: When they were building the electric plant at Barnett Shoals my sister and I used to sell buttermilk to the men working
    on the plant for 5 cents a glass. My favorite sport was horseback riding believe it or not. You wouldn't think it true
    to look at me now. We attended Sunday school in a country school house, the same building we went to school in. All my
    people are Baptist. I was 14 years old when I joined church at Oolinth Baptist church and was baptized in Big Creek, not
    far from the church.
- speaker: Respondent
  text: I knew my husband all my life we were both reared in the same neighborhood and went to school together. When we married
    we didn't have a wedding, just came to Athens and got married at my cousin's house her husband was a preacher. My husband
    worked for the Athens Railway and Electric Company, now the Georgia Power Company. He started to work for them when he
    was 15 years old and was still in their service at the time of his death 11 years ago. He started working for them as
    an errand boy until he learned what to do, then when the plant was made built they gave him a regular job making $90 a
    month. When he was made plant manager he made $165 a month. My husband didn't go to war because he was operating the power
    plant. We had been married 11 years when he died. I have 4 children two girls and 2 boys, The oldest a boy is 17.
- speaker: Respondent
  text: The day he was killed at the plant at Tallassee where we were transferred from Barnett Shoals in 1926. We had just
    returned from a 2 weeks vacation. The children were cross and sleepy so I told him I would give them a bath put them to
    bed and after I got the house in order I would go to the plant and stay with him as I often did. He agreed to this as
    the boss from Atlanta was coming the next day on an inspection trip and my husband wanted everything shining for them
    as that was the orders his boss here had given him. I had just gotten the children in bed and was tying the sheet of soiled
    clothes to be sent to the wash woman the next day when the telephone rang and a man at the plant told me to come down
    quick my husband had been hurt. I ran all the way he died soon after I got there. His death was caused from a broken insulator.
    It probably wouldn't have killed him, but he had been walking the grass and his shoes and clothes were damp.
- speaker: Respondent
  text: After his death the company paid me $50 a month until the workman's compensation was paid, which was about three thousand
    and six hundred dollars. After that was paid, they gave me a job looking after the property at Tallassee until the new
    plant was built and they put men out there. Then I had to look out for myself. I got $25 a month a house to live in and
    lights and water furnished free. They let me live in the house now. That is the reason I don't move in town. The first
    year I took charge after my husband's death, and paddling my own canoe I made $85 that year selling milk, butter, chickens
    and eggs. I was out of work from December, 1937 until March of 1938. Did I try everywhere to find work I asked everyone
    I knew for a job. Many a day I have gone back home wondering where to try next. Finally one day I went to the Welfare
    Office, asked for work and they sent me to the sewing room. What a revelation that was to me. That was my first job on
    WPA and if it wasn't for the government work I don't know what people like us would do. In this day and time you can't
    get office work to do or even a job as saleslady. The people employing help want young attractive people with pep and
    energy.
- speaker: Respondent
  text: My work at the sewing room was very pleasant, however I didn't stay there very long before I was transferred to another
    project paying more. I was there from March until July. I was sent to the Housekeeping Aid Project as an Aid and in October
    of last year I was made Supervisor of the project.
- speaker: Respondent
  text: 'Someone knocking knocked on the office door Mrs. Henry answered it: Good morning, what can I do for you this morning?
    Good morning, said the visitor. Carson is my name I work over here at the University at the barn, I heard about your work
    and thought I would investigate about getting a nurse to wait on my wife and son, my wife had been sick since Christmas,
    now my son come down sick and I need some help. I went to the Welfare Office and they sent me to you. Where do you live?
    asked Mrs. Henry. Over here on Ag Hill. What is the address? Tain''t got none except Ag. Well, you take this blank to
    the Welfare Office and they will fill it out for you and you bring it back to me then I will see what I can do for you.
    He left, but was more back in a few minutes. Say, lady I took this slip where you told me to. I didn''t get to talk to
    the one you told me to as a big head lady was coming out the office, she took the paper, read it and told me to give it
    back to you they didn''t have nothing to do with it. All right, just give it to me and I will look after it for you, as
    there was a misunderstanding on the part of the person with whom you talked to.'
- speaker: Respondent
  text: He started to leave, with the door open his hand on the door knob, he turned back and stuck his bald head through
    the open door. Look here lady; if you want a recommendation just call Sheriff Jackson he will tell you all you want to
    know about me. I am a deputy sheriff of this county, I have a daughter working here in town, my son has been working for
    the city and I have a daughter working in Atlanta, but she has got to go back today. I have been working all my life and
    married when I was 17 years old. This is the first time I have ever asked for help before. We need somebody right away.
    The bills are piled up on me so since Christmas it has got me down, and I would appreciate anything you can do for me.
    Now, you must remember Mr. Carson our Aids are not nurses. They do practical nursing and look after the home while the
    mother or whoever is in charge of the home is not able to see after it. I understand, but I need somebody bad and would
    like to have them today.
- speaker: Respondent
  text: 'He left Mrs. Henry was silent a few moments: Now, I don''t see why they can''t hire someone to do the work however,
    when a case is reported we have to investigate it whether it''s a worthy one or not. You know this is one way I think
    the government is spending their money that really is worthwhile, of course all the projects are or they wouldn''t have
    been created. But this one helps humanity in more ways than one. It gives us work and in doing this it helps others who
    are not able to help themselves. We have 8 workers most of the time. Seven of them are white and we have one Negro helper.
    This negro is a practical nurse. She hadn''t had a job in months when she was put on this project, and was only on the
    job a day and a half when she got outside work to do making $15 a week, she worked 2 weeks. When a person gets outside
    employment to do, which we are supposed to do, they are automatically dropped from the project and if by any reason they
    lose their job then they are taken back again after the case is thoroughly investigated.'
- speaker: Respondent
  text: As I have already stated this project was created to help those who are not able to help themselves, and to make living
    conditions in the home worthwhile. You know yourself when you are in the dumps and everything goes wrong all we need is
    a friendly pat on the back to help us along, and that is the objective of WPA. We train these women on the project to
    go into homes where the families are not able to hire help when they are sick, to have their work done. They do practically
    everything there is to be done, except the family washing and heavy scrub work. Of course you know yourself if you had
    illness in your home and no one to help you, and there were several small children you wouldn't have time for that sort
    of work. They clean house, cook, sew or mend if it is necessary, care for the children as well as cooking the proper food
    for the family and patient and they do wash the patients clothes. In fact they do everything a nurse and housekeeper does,
    but give medicine that is not allowed.
- speaker: Respondent
  text: Then after the mother is well again, before the Aid leaves meals are planned by the aid showing them how to cook it
    to get the best food value out of it. You know some people cook their food all day, in that case the food isn't fit to
    eat. We also teach children as well as the grown ups how to eat at the table, also how to set the table and serve a meal.
    As well as to keep a clean neat house. We also encourage them to be clean with themselves, however, there are some people
    who won't do any better no matter how much you talk to them. After the aids leave a home, they drop in as if for a friendly
    chat just to see how their plans are progressing. It is remarkable to find the improvement in some homes and very disheartening
    to go into the home of those who don't have any pride worth so ever.
- speaker: Respondent
  text: We have a group meeting of the workers in my office once a week, we get an outsider to talk to us regarding sometimes
    its the head of the Red Cross here in town. She tells us how to make bandages, make beds and care for the sick. We also
    have our Clarke County Home Demonstration Agent to give us a talk on how to prepare food for the sick as well as for the
    children, how to set the table and table manners. You would be surprised how little some people know about such things.
    I didn't know as much as I thought I did myself about lots of things I have learned since I came on this project.
- speaker: Respondent
  text: We had a group meeting one day, presided over by our Home Demonstration Agent, talking about how to care for the home,
    food, setting the table and manners. One of the workers was so impressed she went home and began with the children up
    to her mother. Teaching them the nice ways of doing in the home. Now it's attractive as it can be considering what she
    has to do with in her home. The other night I got so mad at my oldest son, he came rushing in without washing his face
    and hands. He went to the table grabbed up his cup of coffee without sitting down to the table. I asked, Son why don't
    you sit down and eat like you ought to instead of gobbling your food up like a hog. Oh, mama I ain't got no time to fool
    with table manners hang with it, I want it now, you know that won't the way I have got to go. And him to act.
- speaker: Respondent
  text: One way we make money for our project, as our sponsors did not supply any for it. I made marmalade at night and the
    aids sold it after they got off from work. However, we didn't make a great deal it did give us a little to carry on in
    our project and the money needed could not be obtained. This money was used to buy provisions for demonstrations we have
    once a week in teaching the aids how to prepare a diet for sick people. Most of our food is furnished by the commodities,
    but not what we use otherwise.
- speaker: Respondent
  text: We have a loan closet, most of the linen was donated by the aids, however, several organizations have given a few
    sheets, pillow cases and gowns. These things are loaned to the sick attended by our aids. When the patient is well again
    they are taken up laundered and put back in the closet. You know lots of people don't have what they need and these things
    have to be provided for.
- speaker: Respondent
  text: One day a case was reported, so I went to investigate it. I found a widow with two children, she and one of the children
    were sick in bed. There was no one to do anything for them but a man she had hanging around. She called him her boyfriend.
    We went in that home and took the woman and child in charge. We cleaned the house washed their clothes and cooked their
    food, the man never left. We tired of him staying there doing nothing while we waited on him too. She didn't realize he
    didn't care anything for her only to eat up what she had, and a place to sleep. I put him to work cleaning yard and burning
    trash. So the next day I made him scrub floors, each day we gave him a different job. He soon got tired of working and
    left. Of course we had to get rid of him in a nice way, so she wouldn't get mad with us about it, and not let him know
    what we were up to.
- speaker: Respondent
  text: The aids wear white uniforms, and go quietly about their work in the home just like any nurse would do. It is strictly
    against the rules to relate anything they see and hear other than what they go to do.
