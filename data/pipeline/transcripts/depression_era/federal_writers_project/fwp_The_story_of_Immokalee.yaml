turns:
- speaker: Respondent
  text: 'The story of Immokalse, as given to me by Mrs. Platt, had special interest. When I first came here, Dean Wolin, pioneer
    and United States Commissioner to the Seminole Indians, said that Immokalse was an old Seminole camping ground as noted
    in the literature given out by tourist offices. Dean Sp:0mM said that it was originally just a cattle grazing and growing
    moment started by some settlers from Fort Myers. Port Ar''s Chamber of Commerce said he was wrong, that it was Indian.
    A map of Florida by Rand & Molly, dated 1895, did not show anything in that part of Lee County, save Lake Trafford and
    Old Fort Foster. Captain J. F. Jaudon agreed with Dean Sp:0mM, so I have been investigating and finally found Mrs. Platt.
    I believe her story is right. I have written to the Post Office Department about it. Mrs. Platt has opened another line
    of study for me, namely: when and how the use of water, ground cornmeal and the question of leavening came to be used
    in Florida''s early days. I have started out to question grocers as to how sales of plain and self-rising flours sell,
    as to amount at different times of year, and to the class of buyers. I have also started to find out when cracker women
    started to use baking powder, and to get recipes of the olden time. I have set out to find out what they did for coffee
    in the days of 1881 through the next ten years when conditions were so unsettled and times were so hard. Hope to bring
    in soon some recipes for making substitute for coffee. Am working among southern women to secure information. There is
    a chance that I may be able to go over to the west coast after January 1st, to visit Everglades, Cohopee, Chokoloskes
    and perhaps Immokalse. May also go up Road 28 as far as it goes toward the Lake. This will enable me to see the scored
    islands of the Toquestas which, I believe, are the old encampment ground used by Captain Dawson and Captain Wright while
    scouting through the Everglades in the days of Fort Dallas. Am gathering data on this also. Through Mrs. Platt, I hope
    to secure more clues to other lines of information.'
- speaker: Respondent
  text: The house stands well back from the street. It is a simple structure, typical of the rural southland, a one-story
    frame building set up on a foundation off the ground in case of wet weather and allowing air underneath. It is a single
    gable house with porch across the entire front, and a smaller rear stoop giving protection to the kitchen door. In the
    backward areas of northern Florida we would expect to see the wide chimney of a fireplace, or maybe two of them, if the
    cooking is still done on the hearth. Of late years however, we find that stoves have found a place in the kitchen, and
    the open fire is maintained only in the living room. In the home we are entering, there is a good range in the kitchen,
    and if there happens to be a cold spell in Lake County, it is only necessary to leave the door open into the kitchen and
    put more wood into the cookstove. At the side of the house is a generous sized stack of wood out just right for the stove.
    The house faces the south and has a clear exposure on the east also, thus receiving all the benefit of the southeast wind
    and the morning sun.
- speaker: Respondent
  text: The house which has withstood three hurricanes, is built on that simple plan of a large living room which has the
    main entrance from the porch. A door at the rear of the room leads to a narrow hall, from which there is a door into the
    bathroom, and at the other end of the hall is the kitchen. Bedrooms open off the front room, the hall just mentioned,
    and from the side of the kitchen. Two of these bedrooms were built on when the family needed more sleeping space; originally,
    they were a side porch. There is a solar heater on the roof. At the rear of the house is an outdoor laundry, a platform
    with a shed shelter, where the tubs are set near a covered rain barrel. The city pipe is also conveniently near the tubs.
    A boil pot is set up on blocks nearby and the wire line is stretched from pole and tree. The yard all around the house
    is well wooded and planted with a profusion of hibiscus, or cotons, and azaleas that form a background for the summer
    flowering annuals blooming beside the house. Rows of small flowering plants grow along the edge of the concrete walks
    that lead to the front steps, and continue around to the back door and down the yard to the small chicken yard. Here a
    few hens turn the table scraps into eggs for the aged couple and the two sons who live with them. A widowed daughter and
    her child, a girl in Junior High, live in a small two-room house on the same lot. There is a fish pool, and a few trees
    give shade as well as fruit in season.
- speaker: Respondent
  text: There used to be a good garden on the adjoining lot, but old age has brought failing sight to John Burrell who in
    his prime was a successful gardener and stock raiser. Among the trees and shrubbery in the yard are hibiscus of many shades
    on the same bush, and citrus trees budded and grafted in former years when his vision was clear and his hand was steady.
    Unless it is cold and wet, the front door always stands invitingly open, and as you knock and enter, a cheerful voice
    bids you welcome. In fact, your coming was seen by the little lady on the bed, for she looks out of the window all day
    long. Mary is seventy-eight years old, and not very strong on her feet but still gets around although not able to walk
    far or much at a time. She is a real pioneer woman, or as she expresses it, a real genuine Florida cracker. She sits upon
    her neatly made bed, wearing a print housedress, her slippers on the floor within reach. The old-fashioned solid wood
    rocking chair near the bed helps Mary to pass the hours, as she knits, crochets, sews or reads. Her Bible, prayer book,
    the daily newspaper and a Ladies Home Journal all within reach reveal the source of her knowledge of current events. She
    has many visitors, and as she says, there is so much that is interesting in the world that one doesn't need to gossip.
- speaker: Respondent
  text: 'John, her husband, who is several years older, often joins the conversation and is most entertaining in his description
    of early times in Florida. He is an expert citrus worker and until recent years, when his sight failed and his hand grew
    unsteady, he made a comfortable living by bussing, grafting, and pruning fruit trees. As a diversion, he grafted hibiscus
    and other trees and bushes; there are many odd combinations in the Allapattah section of Miami as a result of John''s
    efforts to produce something different. He also kept a fine garden when he was able and supplied the neighborhood with
    okra, sweet potatoes and greens of unusual quality, for his garden lay in the rich marl prairie that was once a plough
    forming part of the waterway of the old Allapattah River, now designated as Reybold''s Canal. There is one piece of furniture
    in the plain comfortable living room that attracts attention: the old clock that sets on a shelf where its face is visible
    from all directions. It is a loud ticking 9-day clock, which has to be wound with a big key and which strikes the hour
    with a measured, far-reaching stroke that seems to vibrate through the whole house. Asked how old the clock is, Mary says
    she doesn''t know. It was in her grandfather''s house as far back as she can remember. They called it the old clock then,
    so it must be at least a century old. The house furnishings include hand woven blankets, hand braided rugs, and other
    old fashioned things, interesting, comfortable and noteworthy because of their quality; durable like all things handmade
    by the pioneer woman, who furnished her home with articles prepared from material produced on the plantation. Linen, cotton
    and wool were all raised and prepared at home, the thread dyed from homemade dyes, that still retain their color, their
    loveliness increased by the softening of age.'
- speaker: Respondent
  text: Mary says that her own family, the Brennans of South Carolina, came to America from England among the early colonists.
    She does not know just when, but her grandmother was born in Madison County, Florida. Her uncles and aunts, with their
    families, also lived in Madison County and just over the line in Brooks and Thomas Counties, Georgia. The country up around
    there is still full of relations, she said. They were all slave owners. Some of the family owned more slaves than others.
    One uncle living in Madison had, in addition to his town residence, three large plantations, manned by many slaves who
    worked the plantations under the management of an overseer. Among the crops raised were cotton, sugarcane, corn, tobacco,
    peanuts, sorghum; these were all grown in quantity, so that after home needs for family and slaves were counted out, there
    was a surplus for market, which brought cash for the farm owner. They also had gardens and raised all kinds of vegetables,
    and of fruit trees there were peach, apple, plum and pears; the pecan is native in this locality. This tree really belongs
    to the hickory family and, at that time, it was a rather small, hard shelled nut. It grew well and was generally distributed
    over northern Florida and southern Georgia. The Creek Indians found it one of the important items of their winter food
    supply, every family gathering all they could each season.
- speaker: Respondent
  text: At the time of which we speak, before the Civil War, northern Florida was still thinly populated, the pine trees were
    still in their prime, and there were many oaks and wild pecans. The wild persimmon was also a native of this area. The
    wild, or razorback hog was not so much in evidence at that time, but every farmer raised many hogs, the corn and peanuts
    being the main feed crops. To these were added the refuse of the sorghum and also sweet potatoes. The hogs foraged under
    the oak and pecan trees. Those that strayed away became wild and thus began the vast number of wild pigs running at large.
    Mary did not remember the special breeds of hogs which were raised in this south in these early days; it was more a matter
    of selection than of breed. Runts were fattened and butchered as soon as possible. A good mill of either sex was retained
    for breeding, and service was exchanged among farmers. They had good hogs in those days, but when everything was demoralized
    during war days, and through the terrible days of reconstruction, many people were unable to feed their stock, there were
    no Negroes to work the farms, and everything went to ruin.
- speaker: Respondent
  text: That is why the native stock of cattle and pigs was so poor in Florida. North Florida, where Mary's people had lived
    for generations, was a cattle and hog country. Both the planters and their slaves had all the meat they wanted, such as
    beef, pork, poultry and wild game. During the four years of the war, times were hard, but the climax came with reconstruction
    when carpetbaggers took control. Mary remembers the days when slaves were still with her family. Her own father had only
    a few, one being the old mama, who cared for the children and directed the housework. This woman had a son about thirty
    years of age, who managed the farm and was a general handy man; there were several younger slaves, especially Mammy's
    children who did chores, both in the house and on the land. Often slaves were sent over by other members of the family,
    when planting time came around, or when crops were harvested, cane cut and syrup was boiled, and when the hogs were killed
    and the meat cured. The neighborly feeling among all the white families extended to their slaves, and Mary remembers those
    days as a time of peace and plenty.
- speaker: Interviewer
  text: Asked how the planters arranged matters when slaves from one plantation married into another family.
- speaker: Respondent
  text: She explained that, as far as possible, the owners encouraged their slaves to marry within their own plantation. When
    a slave wanted to marry outside, however, he always told his master and matters would be adjusted. Either the two masters
    would arrive at an understanding and usually the woman slave was bought by the master of the man, or sometimes if the
    two lands were adjoining, arrangements would be made for the wife to live with her husband on the land of his master,
    while she would go back and forth to work for her own master.
- speaker: Interviewer
  text: I asked if it were true that some slave owners bred slaves for the market as one breeds farm animals. Such, we had
    heard, was the case.
- speaker: Respondent
  text: 'Not unkindly, this truly southern woman said, that is just another instance of how the North was misinformed about
    conditions in the South. There were slave dealers, it is true who did that, but it was not done as generally as most northern
    people thought. Remember, she continued, it was Yankee ships that brought the slaves over, and because the Negro could
    not stand the severe weather of the north, the Yankees disposed of them in the South. That started the slave business.
    It is true that some slave owners abused their slaves: some men, even among Yankees, will kick a horse or beat a dog when
    angry. They have Humane Societies to make people be kind to animals, and in all these horse races, they are very kind
    to their horses and won''t tolerate a stableman who in any way neglects the animal he is caring for. That is because the
    owner of that horse has his money tied up in the animal. Now, don''t you suppose that when a planter paid good hard cash
    for a slave, and was depending on that slave to work his land, and raise and harvest the crop that was to make his money,
    he would take care of that slave?'
- speaker: Respondent
  text: She went on to describe how the Negroes had their little homes, each family to itself, and how they were fed and clothed
    by the master. If sick they had medical care. They have veterinarians for animals, don't they? she asked. In addition
    to supplies regularly furnished by the master, each slave family was allowed to make a little garden, or maybe have a
    hog of their own. Often a runt was given to a Negro boy and he took great pride in showing the master what he could do
    with it. What about whipping? I asked. Well, she said, we did whip them when they had to have it; Our parents whipped
    us when we needed it, and we whipped our children when they needed it. Of course, now it is considered wrong to whip a
    child no matter how much he needs it. But as to the slaves, whipping was not as general nor as severe as Harriet Beecher
    Stowe says it was. There were some Simon Legrees on some of the plantations, but not as many as northern people think.
    Discipline had to be maintained, and there were other ways of punishing besides whipping. Some
