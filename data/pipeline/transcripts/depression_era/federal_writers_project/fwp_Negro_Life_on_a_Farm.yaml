turns:
- speaker: Respondent
  text: Lawdy me, Miss! You scairt me near to death. Is dere sumpin I can do for you?
- speaker: Interviewer
  text: Well, Aunt Cella, it looks like you are too busy to do what I want.
- speaker: Respondent
  text: Lawd Miss! Ilse done got all dese floss scoured an' de windows washed an' evsything out sunning. We kin sit rathere
    in de sunshine and you kin tell me whet you want. Ilse gona rest a little while now till dese flo's dry and den Pee gona
    fix me some dinner.
- speaker: Interviewer
  text: Tell me something ob what you want Miss.
- speaker: Respondent
  text: All right if I kin remember 'unpin to tell you dat will do some good. I was born de second year after de surrender.
    We all was big farmers and had to work hard; us chillun would go to de field. At dinner time ma would bring our dinner
    nnd a big pail of water fo' us. We crawled up under de wagon to git in de shade. Pa would be tired, too, but he'd finally
    say, 'Come on out kids, lets go back to de fields now. Welse done rested long enuff.' My school days was short 'cause
    we was pa' folks an' had to work. Cogse Miss, us had plenty to eat and some clogs. We lived close to Mr. dilliam Henry
    Morton. I was getting up pretty good size an' Mr. Morton had a boy working fo' him dat he sho did lak. He got to noticing
    me. I laked him too. Mr. Morton noticed us an' he knowed was a smart gal, so he got us married right dere in his own house.
    He give us a small house to live in an' a mule art' cow an' some farm to ras to work with. I started right out to having
    babies, but I was stout as a mule an' went to de fields just de same an' went side by side of Peter up den cotton rows.
    We picked three hundred pounds of cotton evoy day. I plowed, too. I would work right up till bedtime. My fust chile was
    born when I was thirteen; I didn'tknow what it was all a boutitill I had the baby. But Miss, we didn'tstop. I had a baby
    evly nine months 'till I had twenty-five. Now don'tlook at me lak dat, Miss, 'cause it is de truf. We made good as long
    as Peter lived. We tried to raise all of de chilluns right. Mr. Morton tol' us dat he thought we ought to stop a while.
    Well, some of den chilluns got up big enuff to git married and they started havint chilluns right when my last chile was
    born. I was jug' ready to git down an' my daughter was sick with her's. I got dere an' done all I could to' her an' went
    home and mine come. I prayed then, Miss, for God to never let me have no no' babies, an' you know I stopped right then.
- speaker: Interviewer
  text: Was Peter good to you during all this time Aunt Cella?
- speaker: Respondent
  text: Oh, yes, we loved each other, only one time did he step out on me dat I knows of. A gal lived not far from us dat
    looked good. Mr. Morton had her there on his place to work. I was stayinl hone no' now an' Peter was in de field with
    die gal. When her baby was born de po' gal died and left a baby boy. Nobody could tell who de pa was. Peter was right
    cute about it when he come and said, 'Cella I'se dat baby's pa an' I want us to take him an' raise him. I asked him how
    come he didn'ttell me befo' de gal died. He said, 'Cella, I was afraid you would kill dat gal, an' I didn'twant you to
    go to de gallus an' be hund.$ I don'tthink dey had no electrik chairs den. We just took de baby an' let de matter drop
    'cause we still loved each other.
- speaker: Respondent
  text: Miss, my pa and ma was slaves, but you know dey never would tell us much about it. I °ain'tremember who rue dere Mistess
    and Ureter, but I remember hearini dam say one time dat dey eno was good to 'em. Dey a llus giv'em good food an' good
    clo's but dey wouldn't let them have any books Dey would slip sometimes an' look at de papers an' try to read 'es.
- speaker: Respondent
  text: My grandma an' grandpa was slaves, too, Ma said. They had good white folk's and grandpa an' grandma married 'cause
    dere white folks owned both of 'am. You know, Miss, I guess dat is who I takes a tter, 'cause dey had twenty-eight chilluns.
    Dat tickled dere white folks to death 'cause dey didn'thave to buy no so' slaves. Long as grandpa and grandma had chilluns
    dey had a big farm an' dat family of niggers was all dey needed, but I'se kind o' glad I won'tborn in den days.
- speaker: Respondent
  text: Pee proud o' all my chilluns an' grandchilluns, too.
- speaker: Respondent
  text: Tardy me, Miss, dis is my baby chile. Bless her heart; she a llus thinks 0 her ma.
