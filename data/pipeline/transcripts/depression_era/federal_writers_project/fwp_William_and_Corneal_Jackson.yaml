turns:
- speaker: Respondent
  text: I started work in 1916. I only worked three months out of the year. The rest of the time I was in school, no first
    or warranty.
- speaker: Respondent
  text: I waited for work at the phosphate company. They’re out of mines.
- speaker: Respondent
  text: My first work was carrying water. The second year I clerked in the main office. After that I worked in the plant.
    I had a chance to work on an electric motor and later I operated a switchboard. At that time I was making 25 cents an
    hour.
- speaker: Respondent
  text: I have worked steadily since 1920 with the Southern Phosphate Corporation.
- speaker: Respondent
  text: My job paid me 2.60 dollars a day. I got a promotion to lineman helper. I left that job and got another promotion
    to nozzle man. That job paid dry.
- speaker: Respondent
  text: In 1926 I changed jobs and worked as a motor operator in the locomotive department. I also learned a great deal about
    phosphate mining.
- speaker: Respondent
  text: I learned a lot about the machinery used to clip top rock off the phosphate. The plant is large and complex.
- speaker: Respondent
  text: Hydraulic presses are used to flood through the phosphate. The pressure ranges from 160 to 200 pounds per square inch
    depending on the size of the iron, which are operated by electric long.
- speaker: Respondent
  text: They used to use a present lamp nasal man’s trial is 30 cents per row eight hours including a party.
- speaker: Respondent
  text: The phosphate is moved to the mill where it is crushed and then loaded into gondolas. The gondolas carry it to the
    drying plant where it is dried on roasters.
- speaker: Respondent
  text: After drying, it is carried into the drying bin, then to the phosphate storage. The rock is dumped into pits, then
    taken by elevators to various ships where it is transported to different countries or ports.
- speaker: Respondent
  text: There is a group of men who slide the flatting gong. They set up the equipment for mining. Then the pit crew comes
    along and they do the venting.
- speaker: Respondent
  text: They work on three shifts of eight hours each. Each shift consists of the foreman, lineman, and four laborers. Their
    transportation is from the quarters to the pit and back in company trucks so they don’t have to worry about transport.
- speaker: Respondent
  text: Since they have learned to work in the modern ways, the method used on the mine eliminates the strain from power.
    They also try to make everything safe for the employees.
- speaker: Respondent
  text: The majority of the men in our quarters are community minded. Each worker tries to look out for the other fellow on
    the job.
- speaker: Respondent
  text: I’m not worried now if I don’t meet my bills. It keeps me below a decent standard of living. I have to pay in town
    park each month for Corneal and mother, that amounts to 4.00 dollars.
- speaker: Respondent
  text: Then there is the furniture bill, which is 6.00 dollars a month, and now we’re trying to buy that out. That’s another
    5.50 dollars on the month.
- speaker: Respondent
  text: When we go to town, our transportation costs 50 cents round trip, which would be 1.00 dollar for both of us to go
    and come back.
- speaker: Respondent
  text: Our food averages from 14.00 to 18.00 dollars a month. For a low-cost food diet at the company store, we average about
    9.00 dollars a week.
- speaker: Respondent
  text: Next we have to buy wood which costs 3.00 dollars a strand, and a strand only lasts one month. So you can see how
    it goes.
- speaker: Respondent
  text: 'Corneal reached in the drawer of a nearby chest and handed me the card system used in paying off the employees of
    the phosphate company. It read as follows:'
- speaker: Respondent
  text: 'No 0 1101. This check must be enclosed with signature (a mark) of payee. Wages period ending 945.06. Deductions:
    Old Age Benefit 0.26, Store 0.26, Rent 0.26, Insurance 0.60. Total.'
- speaker: Respondent
  text: Employees memorandum - Detach before using check. Social Security Number 261-06-919.
- speaker: Respondent
  text: When I had finished my inspection of this card, William resumed his story.
- speaker: Respondent
  text: I would like to venture into a new field or trade, but under present conditions I must go out and find anything. There
    are some other jobs that I wanted though.
- speaker: Respondent
  text: My main objection on this job is low pay and injury to my health.
- speaker: Respondent
  text: Another thing is that if I’m not properly clad while on the job, it’s liable to catch cold and then get pneumonia.
