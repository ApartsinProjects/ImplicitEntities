- speaker: Respondent
  text: Yeah, that's a good lineup of different aspects, I think. Yeah, alright. So, just initially, to kind of answer your
    question a little bit - you know, my gig calendar - I mean, starting my last public performance, jazz gig, was March 11
    at Hell's Kitchen. Phil was on it, actually.
- speaker: Respondent
  text: Yeah, it was a great gig. God, it was so much fun to play. But - that was right before - it was really heating up
    then. It was like, There's this terrible virus da-da-da-da-da, What's going to happen with the venues? Etc, etc. And the
    decisions had not really been made at that point, but I remember the following week, I had probably seven gigs or something,
    which is - since you're doing this interview about it, that was reasonably common. I'd have a minimum of five - anywhere
    from five to eight a week. I went from 100 miles an hour to zero, basically overnight. So, as soon as everyone made the
    decision, that it's no longer safe to be in the venues - and then shortly following that, the venues closed to try to
    cut their losses as best they can. And so people were really freaked out by the whole thing. So that's what happened with
    that. Then that went away. I mean - All my gigs, my regular gigs, the airport, The Lexington, Midtown Global Market, the
    place I play at in White Bear Lake, Ingredients Cafe, Hell's Kitchen. Just everything - the Dakota Jazz Club. So, in all
    honesty, I'm fortunate because at my age, I was lucky enough to be immersed in super busy periods and, I don't know if
    lucrative is the right word in the music business - I see lucrative as being relative, you know what I mean? For being
    a career jazz musician, I feel like I did well enough that I could set myself up for a slow time. Thank God. I got turned
    - I got rejected for all the unemployment, everything. I got one week of it and then I got turned away for everything
    else because I still have my online students. I was making just enough money that I was disqualified for everything. So,
    by canceling my students, I would have made like four times the money. You know what I mean? But I don't want to.
- speaker: Interviewer
  text: That's such a hard place to be in and I think it's really representative of the system at play - is that if you're
    trying to work, especially teach, which is a service in itself - not talking about performing as a service and that whole
    aspect of performing artists, but that's sometimes a gray area with people not understanding what the arts give to a public,
    but education and teaching is a lot more black and white and we could say, This is a public good and teach - educate students.
    So you're going, Well, if I want to be a contributing member and teach, then I'm not going to make money, but if I cancel
    and not do, kind of, my moral good and keep these students, then I can make money. It's -
- speaker: Respondent
  text: Isn't that something? Yeah, that's a - really well put. That's a great point. It is more clear cut, obviously. It's
    a service and people are studying with you like you're a teacher, just like you go to college, although I'm not accredited
    or anything, but I'm jazz school or whatever, like most guys. The thing is - for one thing, the unemployment money, if
    I understand correctly, runs out at the end of July anyway. So, it's short term, but the fact that they set it up - I
    told everybody going into it including my wife, who is really knowledgeable about all this stuff - I said, I won't get
    anything, you watch. There's always a way that a musician is going to get screwed out of whatever. Sure enough, I got
    to the two yard line with all this crap, including like long, long - waiting on the phone on hold for three hours. Then,
    when it all came down to it, No, you're making $34 a week too much. And that was it. But I told Karen I'd rather - That's
    one thing that's actually been a shining light of all this sad period is still having that, and all my students from Cadenza.
    Everybody I taught there, they all came with me online.
- speaker: Interviewer
  text: Wow. Yeah. Awesome. How was that switch? Had you done any online teaching previously?
- speaker: Respondent
  text: Never. And it was hard the first few weeks. I'm just - be honest and blunt about it. It really sucked because of the
    tech aspect. I'm not a computer guy. I'm not young enough to have grown up with it. Everything I learned from a tech standpoint
    is retroactive. So, right now, the system you see, the headphones, and everything I'm doing, I'm running through my interface.
    I didn't know what an interface was until - Yeah, long story short, I did all this stuff. I ordered the interface online.
    I researched it, made the best decision I possibly could with all this stuff. And then, of course, the way things are,
    you order from Amazon or wherever, it's there the next day, and I needed it. But, actually, I gave a few lessons for a
    couple weeks without it, and the whole thing was just, like, all the lessons were more about the technical problems than
    actual lessons. And I was thinking, This isn't gonna work. This is ridiculous. Yeah, but I got this hooked up, and so,
    now, if you can hear and see me clearly and all that, that's what the end result was. So, now I can give decent lessons.
    You can't really play together. There's the lag, which you've probably read about. You know, no matter how strong the
    connection is, there's always enough of a lag that that you can't play together.
- speaker: Interviewer
  text: Yeah, that's something that I've thought about not only with private teaching, but as I've talked to people like Chris
    or adjunct professors and maybe even - I don't know if you've talked to Pete about it because I know he was at Macalester
    and I can imagine he was adjunct. But -
- speaker: Respondent
  text: He's still been there. I mean - they're figuring out their whole deal.
- speaker: Interviewer
  text: But - you were at Cadenza, and I would assume you were an independent contractor.
- speaker: Respondent
  text: Yeah, exactly.
- speaker: Interviewer
  text: What did they do, or what have you heard, if you talk to Pete about it - what was it - if I can formulate my question
    a little more - the responsibility of the educator to essentially acquire a new skill of IT and tech - What has that been
    like, of placing the burden on the educator to acquire a new skill in order to maintain a lifestyle versus an organization
    providing help and a framework? You can continue working through Cadenza or through the university and a lot of stuff
    I've read about adding more on the plate of educators, so that -
- speaker: Respondent
  text: That's a great question. Yeah. So, it's like what I was saying - Basically, it all falls on you. For one thing, because
    everybody was in - it's chaos. And, I'm good friends with Dan, who owns Cadenza and, of course, he obviously has his work
    cut out for him. So, there's instructors at the store, just like everywhere else - the younger instructors that are more
    in on the computer thing, it was obviously easier for them. There's a lot of instructors, say, like my age or whatever.
    There's plenty of them that're older than I am. They just couldn't do it. They just bowed out. They said, "No, I'll just
    have to come back when lessons start up again." So, in that case, you - it's like I was saying earlier, you just hope
    that they're kind of set up, but yeah, I did get it going, and now, I learned a lot. I have to be honest, like, just what
    I learned by being actually forced to do it myself. I mean, trial and error, and really frustrating. It's like anything
    - I learned more about these operating systems and everything than I had ever known by 10 times more. So, in that respect,
    it's helpful. It's not like I would want to really do it all the time. I want to go back to in-person lessons as soon
    as possible because it's better for everybody. It's better for the student. It's just more enjoyable, and the learning
    situation is much better, in my opinion. But you but you've had to adapt your lesson format and what you actually work
    on, and how you teach, how you approach it with online lessons. More of it falls on the student because you can't play
    together and I can give people examples, but it's more like I tell the student, Okay, try to have this prepared, we'll
    go over this, and they understand that they'll have to sit and play things for me by themselves more than they used to
    in one-on-one lessons.
- speaker: Interviewer
  text: In kind of a silver lining attitude, that might push - it depends on probably the students that you're teaching, but
