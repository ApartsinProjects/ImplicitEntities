collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Where were you born and raised?
- speaker: Respondent
  text: I was born in Richmond County, South Carolina, the second year after freedom. I remained in South Carolina until 1911.
    There I engaged in farming and doing other odd jobs. My parents were Steven and Susan Scott, who were slaves. Their slave
    masters were Kellum and Scribner. There were five in my family.
- speaker: Interviewer
  text: When did you come to Florida and what did you do here?
- speaker: Respondent
  text: I came to Florida in 1911 and was a grown man when I reached Florida. I worked in the turpentine stills from place
    to place. I lived in Homosassa, Citrus County, seven miles from Arcadia until I moved to my present location in 1926.
- speaker: Interviewer
  text: Can you tell me about your family and marriages?
- speaker: Respondent
  text: I married twice. My first wife was Rosa Spanish. We were married in Arcadia, Florida, in 1914. There was one child
    born during our wedlock. This child died with the influenza. My second marriage was to Rosa Lee Jupiter. We were married
    in our present home by Mr. Mitchell of Lake Wales on March 11th, 1966. I had lived the life of a bachelor until that time.
    Before I married, my niece Annie Graham made her home with me.
- speaker: Interviewer
  text: Did you have any schooling?
- speaker: Respondent
  text: I only had a little schooling. I can only write my name and that is all. They had no grades when I went to school.
    I was raised by my grandmother Caroline Bryant, and when her eyesight failed, I had to stop school. She was an old slave
    woman. I stopped school to try to make her some bread. The book that I studied was the Blue Back Webster. I went as far
    as the syllable called Baker. The other part I took up in my head, learning from time to time. An education is something
    that every man should have; it keeps him from getting cheated.
- speaker: Interviewer
  text: What kind of work have you done all your life?
- speaker: Respondent
  text: We have all farmed all of our lives. All I know has been following a mule behind a plow. As a young man, I worked
    on the farm and sometimes hired myself out doing odd jobs. I remember once working for a man for a week digging ditches.
    We knocked off naturally at twelve o'clock. He hired us at one dollar and seventy-five cents a day. He took our times
    and said he had to go to the bank in town to get our money. We sat lying by the side of the road and waited and waited,
    but no one came back. Finally, the sun came along and asked us what we were waiting for. We told him why we were waiting.
    He said he thought the man was in Plant City in his car at his filling station. We were left in the ditch. This has happened
    to me more than once. Folks are rude to say you leave you without any grits.
- speaker: Interviewer
  text: What do you think about having your own farm?
- speaker: Respondent
  text: I always wanted a home of my own and tried hard to have a good farm. I am happy with something growing around me,
    food, some animals to care for. At present, I have a few around me. See those fine cows out there in the field? There
    are three cows and one fine bull. We have a few chickens in the back and four hogs. That's why I think a fellow should
    have something of his own. I am always going to have something. The good Lord said that he would take care of me, and
    I am going to see that he does.
- speaker: Interviewer
  text: Are you involved in any church activities?
- speaker: Respondent
  text: I am a member of the Baptist Church. I joined because the spirit is there. The little church you see standing over
    yonder, I am the pastor of it. I have a lot of members when they are present. God called me to preach my back in 1941.
    I believe that every man should be governed by us on earth.
- speaker: Interviewer
  text: Can you tell me about how you got your land and built your home?
- speaker: Respondent
  text: This land was given to me by Mrs. Graham. Before, I lived on the other side of the creek at Castle. I could not raise
    very much waft. The land being low and when a heavy rain would come, it would drown out all of my crops. After homesteading
    and paying four dollars a year taxes, she gave me the deeds. I have ten acres; two of them are cleared and the rest are
    woods and swampland. This old piece of house that you see here was built from an old house given to me in Carter. I hauled
    the lumber one half mile in a wheelbarrow and built it myself.
- speaker: Interviewer
  text: Can you describe your house and farm?
- speaker: Respondent
  text: The house was weather-boarded with no windows, only board shutters. If that house had glass, it would fall down. It
    wouldn't stand any glasses. The weather boarding on the outside was rough and the ends were not evenly nailed on, some
    protruding beyond the end of the house. The top was covered with some old second-hand galvanized tin. It was badly bent
    and looked to be leak-proof. The chimney on the east side was very crudely built. It looked like it was ready to fall
    down. There is a little shed about twenty feet from the house where I keep my farm tools. It was shakily built with plenty
    of space between the boarding. The front was wide open, and hanging on the rafters were dried seed and peas used for cooking.
    In front of the house, a well-cultivated strawberry patch was in bloom. A crudely built cypress fence separated the strawberry
    field from the house.
- speaker: Interviewer
  text: What kind of animals do you keep on your farm?
- speaker: Respondent
  text: Alongside the shed was a stack of wood obtained from my land. My whole cleared site was fenced in with cypress poles
    cut from the timber land. At the rear of the house, there was another acre cleared and part of it was set out in vegetables.
    In the east corner, there was a crudely built enclosure out of cypress poles used to quarter my four hogs. Near this enclosure
    was the outhouse with no roof over it. On the north side of the field was a chicken yard, and next to the chicken yard
    was my rickety built barn. The barn was built out of cypress poles and covered with old tin and wide boards. The yard
    space was fenced in. There was a wide gate with space enough for a cart or wagon to pass through. In this unsanitary arrangement,
    the cows were milked once a day.
- speaker: Interviewer
  text: Can you describe the interior of your house?
- speaker: Respondent
  text: Inside the house, there was some homemade furniture. In the front room, a large fireplace was the only means of obtaining
    heat. In front of it were irons. The fireplace was used to heat the irons when she ironed. The walls were covered with
    newspaper and magazines. The floors were bare, with only a small rug on the front room floor. The boards were unevenly
    matched on the floor and left cracks in between them; you could see the ground and feel the air coming up through them.
    In this room was a long table without any covering on it and an old type Singer sewing machine. Hanging in the middle
    of the room from a rafter was a bunch of oranges. The bedrooms were very crowded, with no way of letting air or light
    in except opening the shutters, although there was plenty of air from the cracks in the walls and floor. A shed covered
    the open space sheltering the kitchen which set apart from the rest of the house. It was very small and crowded with a
    small wood stove, a wood box, old trunk, and a table filled with dishes.
- speaker: Interviewer
  text: How do you manage water and cleanliness in your home?
- speaker: Respondent
  text: Everything was very clean and orderly arranged in this crude home. We had two barrels near the kitchen with a large
    galvanized pipe running from the roof to catch the rainwater. On top of the barrel was a bag that was used as a filter
    for the water, and another pipe joined the second barrel with a fine mesh screen and rag over one end. Out of this barrel,
    the water was used. It was clear and clean. Around it were lots of trinkets used in and around the house. Two old-time
    iron pots were close by. With pride, I showed my wagon, which was a wheelbarrow, stating that the horse was not able to
    pull very much, meaning myself.
- speaker: Interviewer
  text: Can you tell me about your experience in the Spanish-American War?
- speaker: Respondent
  text: I enlisted as a soldier in the Spanish-American War. I was thirty years old at Suwanneeville, N.C. I was a member
    of Major Young's Company. We went up from Savannah, Georgia, and started to Cuba. After landing about two o'clock, while
    out to sea about midnight, the boat turned around and headed back to Savannah. There we learned that the war was over,
    then we were mustered out. We left the dock singing and shouting, and everyone was on their way home. Lawdy, those were
    plenty of trouble during them times, only folks didn't argue over things as long as they do now.
- speaker: Interviewer
  text: What kind of food do you like and how do you manage your meals?
- speaker: Respondent
  text: That old lady of mine can cook up a mess. She can do more with fat bacon than a monkey can with peanuts. I like fat
    meat, pork, collard greens, peas, cabbage, grits, and good old cornbread. Now and then I kill a chicken when one of the
    brethren come around. We have plenty of eggs during laying seasons. Our meat supply comes from the hogs that we butcher
    at a salt down. When we run out of green vegetables, we fall back on the dried vegetables we have stored away.
- speaker: Interviewer
  text: Have you ever voted in Florida?
- speaker: Respondent
  text: I voted in South Carolina, and I never voted in Florida. Once I started to vote, I was told that a nigger could not
    vote in a cracker election. So I stayed from the polls since. I think the government is picking up in places like soda
    when mixed with cornmeal.
- speaker: Interviewer
  text: How is your health and how do you take care of yourself?
- speaker: Respondent
  text: If I am not able to do hard work except what I do below on my little farm, I was ruptured some years ago, and I can't
    lift anything heavy. I feel good otherwise. When I feel bad, I take my sassafras tea. That brings me around. Over there
    in that shed, I keep plenty on hand.
- speaker: Interviewer
  text: What do you do when you are not working?
- speaker: Respondent
  text: When not working, you can find me and that old sticking pipe sitting out in front of the house when the weather is
    good. When it gets cold, I come inside by the fireplace. You see by our work that we are ready for the cold weather. Sometimes
    my neighbors come over and talk. That old lady goes around more than I do. Halida, she is a busy body.
