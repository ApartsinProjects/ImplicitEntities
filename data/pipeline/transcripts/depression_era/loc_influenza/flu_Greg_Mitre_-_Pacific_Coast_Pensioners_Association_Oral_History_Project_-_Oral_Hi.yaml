source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me when you were born and where you were born?
- speaker: Respondent
  text: I was born June 12, 1958, in San Pedro, California.
- speaker: Interviewer
  text: Okay, tell me something about your parents, if you can, what countries they came from and what work they did.
- speaker: Respondent
  text: My father was half Argentinian and half Armenian, and his mother and father lived in Los Angeles downtown. He was
    born in downtown Los Angeles. And my grandmother worked as a cashier for Safeway, a union cashier for Safeway. And my
    mother grew up in San Gabriel, in a staunch Catholic family and attended the same convent that Lucille Roybal-Allard,
    who was a congresswoman who is now a harbor commissioner in LA, attended. And they moved down to San Pedro in the early
    '50s. My father loved to surf, loved the ocean, and so he moved the family down there in about 1952, I think. And my father
    owned a very small tire shop in downtown Los Angeles, where he catered to a lot of the new car dealers, changing out their
    wheels and tires. And that was a big Armenian enclave of tire dealers that were in Los Angeles, and my uncle started the
    business in the '20s, and my dad took over.
- speaker: Interviewer
  text: Wow, was your dad at all political?
- speaker: Respondent
  text: Not the least bit.
- speaker: Interviewer
  text: How about your mom?
- speaker: Respondent
  text: Not the least bit.
- speaker: Interviewer
  text: Okay. They were Democrats, or any...
- speaker: Respondent
  text: I don't think they were. They weren't active at all.
- speaker: Interviewer
  text: They weren't interested?
- speaker: Respondent
  text: My dad was a small business owner, and if anyway, I would say he probably leaned Republican because he was a small
    business owner. But they weren't active politically whatsoever.
- speaker: Interviewer
  text: How'd that influence you in your own political thinking, if there was any when you were just a kid?
- speaker: Respondent
  text: It really didn't. I didn't become politically involved until after I got out of high school and I started my career
    and running around on the docks and being involved. My first job actually was bagging groceries as a retail clerk.
- speaker: Interviewer
  text: Okay, was gonna ask you about youth schooling, early jobs? You just mentioned early jobs, but a little bit about your
    early life?
- speaker: Respondent
  text: Yeah, I'm grew up in a nice community of San Pedro. We had a nice home near the beach. I liked to surf more than I
    liked to go to school. So school was challenging, I didn't get great grades. My older brother got very good grades, my
    older brother Mike, was very, very intelligent and went on and got a master's degree. But I didn't follow in those footsteps.
    I graduated from high school and got a job in a market through my uncle, and was a member of the Retail Clerks [International
    Union] for a very, very short time, I was 15 years old. And from then, I started looking and hanging around on the waterfront,
    on the docks.
- speaker: Interviewer
  text: Did you play sports in high school?
- speaker: Respondent
  text: Yes, I did. Yeah, I played tennis, I played volleyball, I swam, I did a bunch of--I did whatever I could.
- speaker: Interviewer
  text: I gather, you know, you're very active in the athletic department.
- speaker: Respondent
  text: Yeah, I like to work out.
- speaker: Interviewer
  text: Right, any military experience?
- speaker: Interviewer
  text: Right. Okay, maybe then we can gravitate toward the fact that you ended up going to University of Southern California.
    You were on the polo team. Excuse me, water polo team.
- speaker: Respondent
  text: Coached, I coached water polo at USC.
- speaker: Interviewer
  text: Oh you coached? How did you get into the position of doing that?
- speaker: Respondent
  text: My youngest son started playing water polo when he was eight or nine years old, and I had always swam and I played
    little pickup games, I never played competitively. But I learned the sport from a guy named Jovan Vavic, who was the coach
    at USC, and I coached his son in club when they were very, very young, because he was the coach of the university. And
    so my son and his son became very good friends. I coached club for about ten years, and then when my son went to high
    school, I decided to start coaching on the college level, and he hired me at USC.
- speaker: Interviewer
  text: And your son, did your son play at USC?
- speaker: Respondent
  text: My son did eventually go to USC after high school, and was very successful. Won four national championships in four
    years at USC. He was a goalie.
- speaker: Interviewer
  text: That's impressive. How do you learn to coach if you haven't played that particular sport?
- speaker: Respondent
  text: Two ways. One is water polo is a very easy sport to learn. It's very much like basketball and putting the ball in
    the goal and things like that. And you know, it's more of teaching kids to become athletic and learn how to swim and tread
    water at the same time. It's a team sport. If you don't play as a team, you don't win. And it's just something that when
    you have a guy like Jovan Vavic, who played as a very, very young child, played on the Yugoslavian national team, played
    on the Olympic team, when you have a guy like that teaching you, and you listen to him, it came very easy.
- speaker: Interviewer
  text: Okay, that's great. Yes. How did you gravitate toward getting into the ILWU?
- speaker: Respondent
  text: Well, it was interesting. My second job I got was as a deckhand on a water taxi, and I got that through a friend of
    mine whose father ran the water taxi. He was a skipper, and he kind of took me under his wing. And I think I was about
    seventeen years old. My older brother Mike was working down--and Mike was five years older than me, and he was working
    in the harbor. He'd got a couple jobs through the IBU [Inland Boatmen's Union], and this gentleman told me that if I went
    down to the IBU, I could maybe get a dispatch to this water taxi company and start working as a deckhand. So I did, and
    I started hanging around there, and I had a Volkswagen van that I used to sleep in. And so I would sleep down by where
    the office was, and whenever they needed a deckhand, they would knock on the window because they knew I was outside a
    sleep, so I got a lot of work. And this gentleman who kind of took me under his wing, taught me the ropes and taught me
    about being a deckhand and how to run a boat, taught me how to run a boat and actually encouraged me to go get my license.
    So I went to a class at Harbor Occupational Center in San Pedro, and then I went to another class at the Maritime Academy
    up in Vallejo, and it was a ocean operator class is what they called it, with a radar endorsement. So I went and got my
    license, and came back from getting my license and fell into a job at Catalina Cruises, where they were hiring. They needed
    experienced operators. They didn't need deckhands, they needed operators. So I went and kind of fudged my way into it
    and told him I had run a boat, run a water taxi, and they gave me a shot. I was twenty-one years old, I had just gotten
    my license, and I got a job as an operator Catalina Cruises.
- speaker: Interviewer
  text: These vessels went out to Catalina Island?
- speaker: Respondent
  text: They were ferries that went back and forth to Catalina Island, carrying 700 passengers. They were 140-foot steel vessels.
    And another guy there took me under his wing, and he taught me there. I was a second operator for one summer, and then
    I was a first operator the second year I was there, I was the youngest first operator they had ever had. And I really,
    really enjoyed that job. We didn't just go to Catalina. We did a lot of harbor charters around the harbors. We did whale
    watches in the winter. You know, we went to various places on Catalina. There's five camps on Catalina, Boy Scout camp,
    different institute, Marine Institute. So it was very interesting. I've always had a love of the ocean, I've always been
    drawn to the ocean. My father loved to surf, I love to surf. I love to swim in the ocean. So for me, it was almost getting
    paid to do what I love to do, go out on the water every day.
- speaker: Interviewer
  text: So you had no college after high school?
- speaker: Respondent
  text: Very little. I went to USC for a very short time and studied political science and dabbed at maybe going to law school,
    but no. And then I went to Seattle. I went to Seattle Central Community College to get my tankerman's endorsement, which
    is another endorsement I got on my license. Got my tow boat endorsement to be a tugboat operator, because I thought I
    might want to go in that direction as I was working as a captain at Catalina Cruises. So I did a couple different things,
    and I never sit still. I'm always busy. I'm always active. So yeah, I dabbled here and there, but I ended up--Catalina
    Cruises was probably the most difficult job I ever left, of all the jobs I've had.
- speaker: Interviewer
  text: And how long did you work at that job?
- speaker: Respondent
  text: Well, I actually did both after I got hired as a longshoreman, I still continued to run the boats part time. I worked
    there fifteen years and almost probably nine years that I was a longshoreman, I worked both jobs.
- speaker: Interviewer
  text: Okay, and how did you get to the ILWU?
- speaker: Respondent
  text: Interesting story. I was working for the IBU, for Catalina Cruises when I first started and because I was not high
    in seniority, I was a young operator, the work was very seasonal. So I would only work about five months out of the year,
    May to September, October, and then we would get pretty much laid off. A lot of us would go on unemployment. Myself, the
    first year, I went to Indonesia and went surfing, went to Bali and went to Mexico, and I just took off. And then the second
    year, I remember that somebody told me that the ILWU was giving jobs to sister locals, and we called it extra work. That
    was before they had a structured casual hall. There was no casual hall. There was no casual--we didn't have identified
    casuals. So what would happen is--
- speaker: Interviewer
  text: What year is this approximately?
- speaker: Respondent
  text: Oh, this would have been in 1981, '82. I think my first ILWU job was 1980. And what we would do is we would all meet
    on the corner near the dispatch hall, and one of our guys, and I was one of the guys that they elected would be the runner,
    and we would go into the ILWU dispatch hall, into a room on the side called the meat locker, and all of the sister locals,
    the fisherman's union, the scalers union, the IBU, we would all sit in there. And when they finished dispatch, one of
    the dispatchers would come out, and he'd say, "How many guys do you have?" And I'd say, "We have eight or ten or whatever."
    And he would hand me eight or ten jobs, UTR [utility tractor rig] jobs, or whatever it was, and I'd go back down to the
    corner, I'd pass them all out, and we'd go to work for the day, and it was casual work. And that's how I got my first
    taste of driving UTR, shoveling in the hole, throwing bananas, all of those things that I went on to do later. My first
    taste was as an unidentified casual with the IBU.
- speaker: Interviewer
  text: You remember your first day doing that kind of work?
- speaker: Respondent
  text: Yeah, I vividly remember it.
- speaker: Interviewer
  text: Can you describe it?
- speaker: Respondent
  text: Yeah, I got dispatched to a dock in Long Beach called Long Beach 208, and it was a banana dock, and the banana ship
    was there. I had been alongside a banana ship on a barge, but I'd never been on the dock side and been inside. I didn't
    know how it worked. And I got there, and, you know, I was with a couple of guys that were also casuals, and we handed
    our tickets to the boss, and the boss says, "Okay, you're in hatch four. Go down into hatch four, and you'll see the hatch
    boss is down there." And we went down, and we got on the ship, and we walked down into the hatch. And you know, none of
    us were prepared, we didn't have any gear or anything. We were in sweatpants and, you know, tennis shoes, sweatpants and
    a sweatshirt. And the boss said, "Okay, here's all the boxes. Here's the gravities," they call them, which are these conveyors
    that you set the conveyors up so you can slide the boxes along the conveyor. And then one guy stands at the end of the
    conveyor and throws them into the pocket. And he said, "I don't care what you guys do. I don't care who's doing what,
    but every other one of those pockets better be full of a banana box as it goes up out of the ship, or you guys are all
    going to be in trouble or going to get fired." So there was three of us, and we were down there, and we were at different
    hatches. So when he meant every other pocket, that conveyor is turning, and there's pockets in there, and you got to put
