source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Clark, why don't you just give a little background on yourself?
- speaker: Respondent
  text: Well, Clark Gayton - Carver Clark Gayton. Son of Carver Gayton, there in Seattle, as you know, and great nephew of
    your grandfather. I was born in 1963 in Seattle, and, as soon as I was born, we moved out to Jersey, sand came back. Ended
    up going to Harrison, which I think they changed the name of the school now. I went to Meany and Madrona, graduated from
    Garfield. And while I was at Garfield, I took the course - Advanced Placement courses at Cornish and also at the University
    of Washington. After getting out, finishing high school, I went to school at Berklee, graduated from there and moved to
    the Bay Area, where I worked for the most part of three years. And around 1987 moved to New York City where I've been
    ever since.
- speaker: Interviewer
  text: Cool. I think one thing that's interesting - this is why a great time to talk to you - Right now, there's just been
    a lot of - with the COVID stuff, but then also happening with protests - there's been a lot of kind of stuff happening
    in New York. Why don't you discuss, first and foremost, how this all changed your career currently, in regards to tours
    getting canceled - maybe you can kind of talk a little about that.
- speaker: Respondent
  text: Yeah. It all kind of happened pretty abruptly. I'm not sure if - it was for me. There was a couple people in my life
    that were there telling me that this thing is coming and it's gonna be crazy. And a lot of people were early on - were
    stocking up on toilet paper and canned food and all that sort of thing. And I - over the years, these things - we've had
    these threats, the bird fever and SARS and all this sort of thing and nothing really happened to me. To be quite honest,
    I didn't take it that seriously - like this thing that they talked about, nothing's gonna happen. So that was really my
    thought. But, then, what happened is I started really noticing people around me getting sick. And shows getting canceled
    because people were so sick that they couldn't even get out of bed. And that's when I said, Okay, well, this is something
    else. What actually happened, initially, for me, is I ended up covering for a bunch of guys that couldn't make gigs in
    the last few weeks before the shutdown. And those gigs went fine. But, then, within probably three days after my last
    gig, they did announce that they're shutting everything down. Let me put it like this - it got out to people all around
    the country that had tours and gigs - people started just canceling gigs. And, so, I think within three days, my entire
    schedule for the year was cleared. I had a couple tours planned, and all my local gigs were canceled. So, within about
    three days, everything went belly up, and I realized that this is different. This isn't going to be a - this isn't going
    to blow over like the other stuff.
- speaker: Interviewer
  text: Sure. Yeah, and I have a my - the teacher that I study with at U dub. He lived in New York for a number of years.
    He probably - he said it best - just everything was put on pause, where it's - everything is like - tours or shows - It's
    like, they were canceled now and then hopefully transplanted to later on next year.
- speaker: Respondent
  text: Yeah, that's kind of what they told me - that all the gigs not canceled, is postponed, and, in my life, if you say
    something is gonna be postponed 'til next year then, to me, it's just not happening. It's canceled, basically, because
    I can't plan for a year in advance. I could barely plan three months in advance. Things change so rapidly, and I tend
    not to take gigs three months in advance. I just kinda take everything week to two weeks in advance, that way, 'cause
    things just happen so quickly. But I had a tour of Spain that was supposed to happen in June. That was canceled. And also
    had a slated tour with Springsteen that was supposed to happen, and that got canceled, so I lost a lot. And, yeah, it
    was pretty devastating. A lot of musicians were very distraught. And so I think a lot of people mentally were - I mean,
    I actually lost a lot of friends from the disease, a lot of musician friends, because my opinion of - musicians are very
    vulnerable right now because they just live hand to mouth so they - a lot of guys didn't know - I think a lot of my friends
    just gave up, I believe. Yeah, I can't be sure, but I think a couple of my friends have committed suicide because it was
    so - So, yeah, it was was pretty rough, and we're trying to keep everybody's morale up. That's kind of what we're doing
    these days is trying to keep everybody's heads up and try to keep people engaged, and not get depressed. Look at the bright
    side, any silver lining that is to be seen. We're trying to direct everybody's attention towards that.
- speaker: Interviewer
  text: Yeah, absolutely, and the biggest thing that I've been taking away from all of this happening is just the sense of
    community and sense of family and a sense of friends and really strengthening these as much as possible because I think
    it's just very important right now since we can't see each other, we can't interact - especially for the importance in
    our role as musicians and artists. We give back to the world that way.
- speaker: Respondent
  text: Yeah, absolutely. I'm a little bit guarded about that. I mean, I guess you called me so I guess you want my opinion,
    but I am very apprehensive about - I think a lot of weight - For a lot of people, their way of dealing with it is just
    to record themselves playing and throwing it up on YouTube or Facebook. I've been trying to steer away from that because,
    as you know, the value of music is - it's been devalued to almost zero. So, I tried not to do - post and then do things
    for free. I think this is actually a good time for musicians to kind of establish - try to get back some of the value
    that we lost by just not providing that comfort for everybody. If you want it, you're gonna have to pay for it, you know,
    and pay correctly. You, because we don't have to Spotify and Pandora and ASCAP is useless and BMI is useless. The only
    thing I have is to very carefully delegate who, what I give my product to, if that makes any sense.
- speaker: Interviewer
  text: Yeah, absolutely, and actually, talking - the conversation because this whole COVID thing really exposed a lot of
    issues in the music industry, exposed a lot. From your perspective - a majority of your income is based off performing,
    right? And gigging?
- speaker: Respondent
  text: Yeah, recording. It's been very much a mixed bag of different things and I've been - it's been fortunate, but most
    of the stuff I do involves me being around people, so that's kind of why everything got shut down. But what has been my
    saving grace this whole time is having a remote recording setup at home. And that's kind of what has kept everything above
    water up until this point. So, I've produced a couple records, I've been doing recording for people's records, and sending
    tracks out to people, and vice versa. So, that's been the thing that's really kept things going. So, I'm very grateful
    for that, and I try to encourage that for all musicians right now to figure out some way to record remotely so you can
    still work.
- speaker: Interviewer
  text: Yeah, absolutely. Well, it's funny, because I started school - started a master's degree earlier this year, and I
    was, obviously, studying privately and then this last few months has just been just that is just getting this home studio
    situation flushed out, because we're essentially going to be here for a little bit -
- speaker: Respondent
  text: 'It looks like it. There''s been some others - Some people are working on solutions, as you know, all the time, trying
    to figure out how to play remotely together. My opinion: it''s kind of a waste of time, and the technology isn''t there
    yet - the kind of bandwidth to really do something like that that''s available to everybody. I remember The Rolling Stones
    tried to do it, and it was unsuccessful. So I don''t think I''ll be able to do that from the Bronx. But I''m actually
    doing a live show tomorrow, matter of fact, with a Bronx firm approximately got some public funding, and we''re going
    to try - we''re using these different platforms and different applications to try to do this thing. It''s not going to
    be completely live. We''re working from some tracks already being in place, having soloists play live to two tracks that
    were pre-recorded and see how that works.'
- speaker: Interviewer
  text: Yeah, absolutely. Well, again, it's just adapt; we have this technology, and it's just a matter of, Okay, what's the
    - how far can we take it to still keep - to progress and keep moving?
- speaker: Respondent
  text: What about - Have people trying to do shows outdoors, that sort of thing, in Seattle?
- speaker: Interviewer
  text: It's been hard because, first of all, the weather has been bad. Seattle, right now, has been - Seattle, it's not a
    big city. So, a lot of the protests that have been happening of late have just kind of overtaken the city. And, just generally,
    I don't know how much exposure you had to the scene up there. The Seattle scene - it doesn't have - it just really relies
    on the venues and the clubs. There hasn't - I haven't really noticed much of that push to try and get outdoor things going.
    I know people have done it on a whim, just to come play out, but there hasn't really been any cohesive thing that has
    happened. It's kind of been dormant. It's been really - it's been hard on the city, Seattle, because you're dealing with
    this tech industry that just engulfs Seattle, and the venues - There's a lot of great venues and was a great music scene,
    but it just has this stranglehold already - before this happened. And now you're having this reality that a lot of these
    great venues, that are really trying to help musicians and the art community, are just trying to open back up. And so
    there's - it's just constant juggling a lot. There's so many artists, musicians there - people were just trying to get
    some decent footing and it's been tricky trying to figure out how, at least with Seattle, how they're gonna rebound from
    it.
- speaker: Respondent
  text: People get scared - You really gotta think outside the box. I'm actually - Next month, I'm moving. I'm going to move
    from my place in the Bronx - upstate. And the reason being - near Woodstock - But the reason being just to be someplace
    where there's a little bit more openness. And I believe that they're going to have more shows in places that are more
    rural, or just not so densely populated. I think those - I'm guessing it might be a good idea for musicians to concentrate
    on those kinds of areas to do shows. I'm going to be doing my own shows in abandoned driveway theaters, shit like that,
    and have people view from the car, and broadcast through Facebook to hear everything. And it's just an idea. I don't know
    if it's gonna work. I know they're doing that in Europe. They are doing that in Europe and I think it's been pretty successful.
    I know Seattle - there's probably some places to try to do that, but I think it's going to take people thinking outside
    the box to - people got to work, they got to play, so got to figure out ways to do it. I don't have any answers, but that's
    gonna be what I'm going to attempt to do until things level out a little bit better.
- speaker: Interviewer
  text: That's really great. Honestly, at this point, like I said, it's just thinking outside the box is kind of a necessity
    here because we never - I've never been in this situation before where you can go outside, but you can't really see any
    people or anything like that. And it's hard with musicians. Are you a part of any type of - Is there any type of support
    for the artist community in New York or any type of organizations that help in any way?
- speaker: Respondent
  text: 'Not really. There''s a couple of organizations that I''ve been involved with: the Jazz Foundation, which is a national,
    nationwide organization, but based in New York. They''ve been helpful, the Jazz Foundation. And there''s also the Louis
    Armstrong Foundation that - they actually issued grants to a few jazz musicians, local jazz musicians. I was fortunate
    to get one of those. And I got another grant from the MusiCares Foundation, which is the Grammys, basically. They passed
    on a grant to me, so - But there is no - the musicians union is useless. They''re not doing anything. But there''s really
    no organization that just deals with this head on. But Wynton Marsalis is, I think - he''s the head of the Louis Armstrong
    Foundation - I think he''s the one that made sure guys got some grants in their pocket, but it doesn''t - It solves just
    a few problems because, obviously, not everybody is a jazz musician, and not everybody knows Wynton, and not everybody''s
