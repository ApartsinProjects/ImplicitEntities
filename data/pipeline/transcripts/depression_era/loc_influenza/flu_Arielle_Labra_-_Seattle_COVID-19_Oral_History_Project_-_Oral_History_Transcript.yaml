turns:
- speaker: Interviewer
  text: And how is your work been impacted or disrupted by the pandemic?
- speaker: Respondent
  text: Well, it changed quite a bit. It's interesting cause I feel like before the pandemic, when people talk about like,
    grocery folks, they will feel like oh yeah, grocery folks "like ugh they're just like people who work in a grocery" and
    now it's like "no, they're saviors essential workers we couldn't do without them". So like on one aspect that like now
    we're like superheroes or something. And then it became it started, like, things started to be more difficult like as
    I said before, in the last question, like I have my I have to be worth more things now. Because now like with all the
    masks, I was like, Okay, I'm having my - wore my masks, but now I have to work with next to this person. And we're not
    really social distancing. So we're not really like, following the guidelines, but still like I have to work. Like we don't
    have a lot of time space over here. So like it was, I don't know, like, there was a lot of things to take an account and
    like, oh, there's someone who came into the store with a little mask. Like that's not really my job to tell someone, "please
    wear mask", but still I feel uncomfortable with that. And I don't know also, I felt like I had more work to do not only
    like the mental work of like, oh, yeah, I have to work my mask and all this coworkers next to me, there's not a ton of
    space for us to work in. But also, I feel like I have way more work work to do. I worked in the deli, a PCC. And I was
    feeling that I was doing the job of two or three people sometimes, and I will get home exhausted. I've never felt so tired
    in my life after a shift (chuckles) in when I worked at grocery. Yeah, it was quite intense.
- speaker: Interviewer
  text: Yeah. And did you ever feel in danger or that your health was threatened on the job as a result of the pandemic?
- speaker: Respondent
  text: I'm not really not really, cause I don't know I try to. I try. And I try to keep trying to really be responsible and
    be safe. I would only take my mask off if I was really alone. Like there was no one around me. like I always tried to
    take my own precautions, because I didn't really trust the management. I don't - I don't really trust any management and
    how- - how every country are dealing with the COVID I'm like, no smells. Again, I'm not trusting anybody. I'm just gonna
    do my thing. So yeah.
- speaker: Interviewer
  text: Yeah. So did your employer provide personal protective equipment?
- speaker: Respondent
  text: Yeah, they did give us masks and well, they also made a sacred temperatures and whatnot.
- speaker: Interviewer
  text: And did you receive hazard pay as a result of the pandemic?
- speaker: Respondent
  text: Yes, but not immediately. Like, actually, we had to kind of fight for it. Because PCC wasn't really giving in at the
    beginning. And then they were like, okay, we're gonna raise. We're gonna give you a $4 hazard pay. Yay! (Chuckles).
- speaker: Interviewer
  text: Yeah. So can you tell me more about your experience trying to fight for this hazard pay from your employer.
- speaker: Respondent
  text: Well, I, it was infuriating honestly. [?in audible?] In the end, we're the ones who are putting your lives on the
    line with all this money about [?in audible?] taking care of and everything. But in the end, we're the ones who are there
    in the frontlines. So it was really infuriating when at the beginning, when the ex CEO, the CEO at the time was like,
    oh, no, PCC is just a small Co Op, we can't afford to hazard pay to all our employees, it was like excuse, honestly, something
    that really helped the fire was a lot of customers reached out. And we're like, this is not okay. Like, you're not really
    thinking about [?Inaudible ?] right now. Like they need they. It's not fair. And it wasn't, it didn't take a lot of time.
    It didn't take a lot of time. And I honestly think that it didn't take so much time for the company to chip in. But if
    not, I don't know, I remember like the people from the Union were coming really frequently into the store talking to us,
    like asking you the same questions like how this is me feel like what can we do? And I feel like it was like, kind of
    two weeks, a two week process until the company will say, Yeah, sure. We're gonna give them hazard paid. Customers threaten
    us with(audio cuts off) that. So yeah, it was really stressful. I don't know. I didn't, I didn't feel safe. I was like,
    if they don't really care about us, like I didn't feel cared for.
- speaker: Interviewer
  text: Yeah, and earlier you spoke about, like, grocery workers were suddenly treated as if they were heroes, like all these
    frontline workers are heroes.
- speaker: Interviewer
  text: Would you agree with that or disagree or what do you think?
- speaker: Respondent
  text: I mean, I Well, I think that grocery workers have always been essential. Just like now we're looking at them with
    a different lens, like a different perspective. Um, I do appreciate to deeply appreciate and people that are still working
    groceries, I just couldn't do it anymore. It was not good for my health. But um, I do respect them quite a bit. And I
    do think they're kind of superheroes because it's it takes a lot. It takes a lot not not only like physical energy, but
    a lot of mental energy to be in a grocery store working this times.
- speaker: Interviewer
  text: Did you access any government or community support due to the virus?
- speaker: Respondent
  text: Um, yes, I did get some unemployment benefits.
- speaker: Interviewer
  text: So what was your experience? Like getting the unemployment benefits? And Did you face any challenges in the process?
- speaker: Respondent
  text: Well, I did face some challenges, cause in the beginning, my unemployment benefits were not accepted. And then the
    it went through, like, it was kinda like, the tough, I was a little bit tough to get through it, to actually make it work.
    Currently, I'm not receiving unemployment benefits anymore. But I did receive quite a bit chunk, especially towards the
    beginning of the pandemic, it's when I received more help from my unemployment benefits. Um, but yeah, it was really helpful.
    But it was kind of hard because I said, like, in the beginning, they didn't accept it until they did and it took me a
    minute to get it going.
- speaker: Interviewer
  text: All right. Now, can you walk me through a typical day in your life during the pandemic, from the time you wake up
    to the time we go to sleep?
- speaker: Respondent
  text: Um, well, now that it's cold the - the first thing I do is I check how cold it's outside or if it's going to rain.
    (chuckles) Um, and I feel like. It takes me like 10 minutes to leave my house, because it's like, I have to grab my jacket.
    And then I'm like, Oh, I have my shoes on. It's like, I have my mask. Yes, I have my mask. And well, I don't drive. So
    I have to check the bus schedule. And I'm checking the bus schedule and I'm like, oh, yeah, my wallet with me. Yeah, I
    have my wallet. And my mask. Yes. And I feel like now I'm really used to like now if I don't see someone with a mask,
    and I just see their faces. I'm really uncomfortable. But now I don't know I even I am even kind of grateful for the mask
    situation because now it's so cool to accuse my face warm. But yeah, I just go out, although not all the time, because
    I've mainly worked from home, but the days that I do go out for my other gigs. It just feels like um, what's the word?
    I'm just, I don't know, I'm just going to - go do my thing. I don't really, in the past, I feel like I would like stop
    in different shops and whatnot, and maybe like, hang out or like ask somebody to hang out. But now it just like go out.
    I go to work, and I come back. Or like even if I don't go to work and I have to go somewhere. I just plan to go to that
    place. And then I come back. I don't really I don't I don't really I don't feel it really feel as much liberty or freedom
    as before. And also because I want to be safe and responsible. I don't wanna I don't want to really get COVID or get anybody
    COVID so yeah, it's way more planned. I feel like my life is way more planned now with COVID.
- speaker: Interviewer
  text: Yeah, and he raised the issue of like mask wearing very frequently or and I was I wanted know, like, in what ways
    do you or your social circle wear masks are practice social distancing - practice social distancing, or other strategy
    - other strategies during the pandemic?
- speaker: Respondent
  text: Well, for once well it depends if it's like my close friends or like my family. I really don't wear masks around them
    and they don't work masks around me because I don't know. It's the close circle. We know each other. I know where they've
    been. And I know where they want to - the day before or something so with them, it's kind of more flexible. But I do when
    I do approach a new group of people I always ask like, Oh, do you feel comfortable if I have my mask on or if I have my
    mask off? Although I feel like people ask me more that than I ask it. Because I usually take my mask like the last minute
    if I have to like drink water or something like take my mask, drink a sip and then put it back. But I've mainly lean more
    towards the mask rather than social distancing because sometimes you just can't social distance really, because the space
    is too small. Or yeah, the space is too small so it's not really possible to search for this and so I really way more
    masks and well now with the vaccines. I feel like also vaccination the vaccination card, it's like the new ideas. It's
    fake. I feel like everybody when they see you, it's like oh yeah, I just got my third my third shot. I just got my boosters.
    I'm good, I'm fine. Don't worry about me or like, Don't worry, I won't get you COVID I have my third shot. But I still
    I still really wore masks, because I don't. I feel like in the end masks is what are keeping us safe the most.
- speaker: Interviewer
  text: Yeah, thanks for sharing. And in general, what do you think have been the most challenging parts of life during the
    pandemic for you?
- speaker: Respondent
  text: Um, well, kind of going, kind of going back a little bit to, again, the possibility or the flexibility that I had
    before the pandemic, whereas I didn't really have to think much if I went outside, like, if I forgot my phone, it was
    fine. But now, now I feel I feel like every move I do is has to be planned. And I don't really feel like I have a lot
    of flexibility and freedom. And also, I don't really feel comfortable in most scenarios when I'm outside, because I'm
    always very conscious of like, Oh, what if there was like an outbreak right here right now? Where am I? Like, I don't?
    I don't know. I feel like I also stopped doing a lot of outside activities. And, yeah, I don't know, it's especially challenging
    because I think that as a society, we depended a lot on the outside and what's outside of our houses. So now that everything
    well, everything, I feel like nowadays, like, I don't know, you can go to movies and wear a mask, and it's fine. B
