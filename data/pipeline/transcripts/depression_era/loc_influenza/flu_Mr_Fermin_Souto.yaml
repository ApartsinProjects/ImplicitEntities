collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was born in the little village of Perrol de Paliciam, Spin in June of 1658, I have reached the advanced age of 77
    years. My father was a stonecutter, toiling from sun up until night, my mother was born and raised in the country. I am,
    therefore, a plebeian. My parents were poor people, and in those days a poor man could only look forward to a very meagre
    education. This was the education that I acquired. I never obtained a degree or title of any kind. I was especially interested
    in Universal History and Geography. These were my post studies.
- speaker: Respondent
  text: On October 30th of 1870, a friend took me to Havana, Cuba, although usually the people from Galicia, my province,
    went to Argentine and Uruguay; while the Asturians and those from the region of Santander went to Cuba. I was then only
    twelve years of age. This friend put me to work, at that tender age, in a hat factory situated in Unto street No. 165.
    I was very badly treated during the time I worked at this place. Part of my duties consisted in going every day to a coal
    yard and fetch coal with which to heat the flat irons. The owner of this coal yard was a kind and sympathetic man. I made
    him a confidant of all my troubles, telling him of the ill treatment I was receiving at the hat factory. This man had
    a nephew who owned a variety store in the town of Santiago de las Vegas, some seventeen miles from Havana. One day, to
    my immense joy, he took me there to work for his nephew. In a comparatively short time I knew everyone in town, and was
    much esteemed by all. Here I passed the best years of my life.
- speaker: Respondent
  text: It was the custom of the owner of this variety store to purchase old newspapers at a very low price. With these newspapers
    he would wrap the different articles that were sold. I remember that I used to dig into this pile of old newspapers, reading
    avidly every scrap of news I could find. One day, while looking over these newspapers, I came upon a very old number of
    the "Jornal de la Habana" (Spectator of Havana) in which I found mostly interesting articles on the Civil War of the United
    States, depicting the various battles that had been fought between the North and the South. From then on I would seek
    every bit of news from the United States, reading with the greatest interest anything about Washington or Lincoln; in
    fact anything I could get a hold of that dealt with the United States.
- speaker: Respondent
  text: I remember well a song in Spanish that once appeared in a newspaper, and which I memorized word for word. I was then
    eighteen years of age.
- speaker: Respondent
  text: I remember when very young a beautiful forehead I saw, a man standing near your image, one day I disclosed. Landed,
    ignorant, with stuttering lips, "Who is he?" I asked, "His name I implore." And while with his right your image he adored,
    with radiant joy, his face to me he turned. With so nervous accents, that pride denoted.
- speaker: Respondent
  text: About this time I met a classmaker by the name of Federico, who had been in New York for many years. I told him that
    I had every desire to go to the United States, but did not know what to do, for although I should be able to save a little
    money, what was I to do in New York when this money gave out, not even knowing how to speak English. He then told me that
    the best thing I could do was to learn how to make cigars. In that manner I could easily find work in New York. I, therefore,
    decided to learn the trade, and come to the United States.
- speaker: Respondent
  text: When I imparted my decision to the owner of the variety store, he told me that it was pure foolhardiness, that the
    cigar-makers were a lazy needy, and that I should remove such a foolish idea from my head. He took the whole thing hard,
    but nothing daunted me. I went to see a cigar manufacturer, who was a friend of mine, in Santiago de las Vegas, and he
    told me that I must pledge myself to work two years as an apprentice. There and then I signed the contract and bent all
    my energies to the learning of the cigar trade. As soon as I left the variety store, the owner closed that store and another
    branch he had.
- speaker: Respondent
  text: At the end of the two years I was well versed in the cigar industry. It was about this time that I came across a friend
    of mine who had been a co-worker with me at the variety store. He was at that time planning on setting up a general variety
    store, and asked me if I would go to work with him. I foresaw that this was everything I needed in order to obtain sufficient
    funds for my trip to New York, worked one year and eleven months at this place, during which time I saved everything I
    could.
- speaker: Respondent
  text: Another thing that proved favorable to me was that Mr. Diego Lopez Trujillo was established in New York City, operating
    a small cigar factory. He had been a resident of Santiago de las Vegas, so I procured myself with a recommendation to
    him. As soon as I reached New York City, the place of my dreams, I was employed by Mr. Trujillo, and my worries for the
    present were over.
- speaker: Respondent
  text: One of the first things I did was to become a citizen of my chosen country. My citizenship papers were issued on October
    15th, 1884.
- speaker: Respondent
  text: 'It was in this same year that I married the daughter of Mr. Diego Lopez Trujillo. We had three children in New York:
    two daughters and one son. Of these, two died, a girl and a boy. The little girl died of scarlet fever, due to a very
    poor lodging house, which my brother had chosen for me. For several days we were unable to bury her due to a terrible
    blizzard and a great amount of snow that had fallen. We had to wait until the railroad tracks between Broadway and Williamsburg
    to Cypress Hill Cemetery had been cleared.'
- speaker: Respondent
  text: The reader can well imagine the anguish we went through seeing our little daughter in state day in and day out. The
    boy died when he was teething.
- speaker: Respondent
  text: Shortly after my marriage, my father-in-law moved his little factory to Key West. There, fortune smiled at his constant
    efforts, and he built one of the largest factories in Key West. He became immensely rich.
- speaker: Respondent
  text: In the year 1889 there was a great epidemic of "flu" in New York City. It spread like wildfire throughout the city.
    My wife contracted the disease, and as a result her lungs were seriously affected. Due to her condition I found it impossible
    to allow her to remain in New York City during the winter months, so I took advantage of an invitation from my father-in-law
    to come to Key West with my wife and our remaining daughter and pass the winters there, as the climate was very temperate.
- speaker: Respondent
  text: Upon my arrival in Key West with my wife and little daughter, I found that a strike had been declared in all the cigar
    factories. The cigar makers were demanding a $1.00 increase per thousand on the cigar brands, and also that a Regulation
    Committee be appointed. Seeing this state of affairs, and realizing that if I remained there I would be living off my
    father-in-law, I decided to return to New York, and leave my wife and daughter in Key West until winter was over.
- speaker: Respondent
  text: On my way to New York, however, I passed through Tampa, and noted that everyone was well satisfied and working hard.
    Here I found an old friend of mine from New York, Mr. Marie Pandas of the factory of Lozano Pandas Co. Talking with him,
    he showed me the many advantages in Tampa, and prevailed upon me to remain. I, therefore, decided to stay here and work
    for Mr. Pandas. When winter was over, I went back to Key West for my family, and from there returned to New York City.
    There I went to work at the principal factory of Mr. Enrique Pandas which was situated on Pearl Street. Several years
    afterwards, however, Mr. Pandas removed that factory, and enlarged the one in Tampa.
- speaker: Respondent
  text: In the winter of 1890, my wife once more took sick, and I hurried her off to Key West. I remained alone in New York,
    and experienced the severest cold weather that I can remember. I would think of the wonderful winter I had passed in Tampa,
    and remember that while winter was at its worst in New York, the flowers bloomed here. I felt something akin to homesickness
    for Tampa, although I had spent only a few months here. One day while looking over the various things of my wife, and
    which goes to make a home, I decided that I would not remain another day in New York. I, therefore, wrote to my wife saying
    that I was leaving for Tampa, bade "goodbye" to all my friends in New York, and arrived here in January of 1891. Since
    then I have remained here for good.
- speaker: Respondent
  text: I am surrounded here by friends, even the "paving stones" in all this city know me. My wife was finally cured here.
    She presented me with another son here, who is now 31 years old. My daughter remarried here and has three sons. The oldest
    is working for Lykes Brothers; another one has a poultry market; and the youngest is studying radio. They do not loiter
    about on streets, smoking cigarettes, and using profane language like most of the youths of today in this city. They earn
    what they eat. They have been brought up properly.
- speaker: Respondent
  text: My son, who was born in Tampa, is married and has three small boys. He works at the factory of Bantaella as picker,
    and is much esteemed there.
- speaker: Respondent
  text: I worked at the factory of Lozano Pandas Co., up to the time the factory was consumed by fire.
- speaker: Respondent
  text: In New York I had been working with Mr. Cuesta, Mr. Ray, Mr. Santaella and several others. They had been cigar makers.
    And then the above mentioned men became great cigar manufacturers in Tampa.
- speaker: Respondent
  text: Then the factory of Lozano Pandas & Co. was destroyed by fire. I went to work with Mr. Cuesta. He was then part owner
    of the Cuesta-Ballard Tobacco Co. which was situated where Havana-Tampa is today located, corner 22nd Street and 10th
    Avenue. While working here the cigar makers requested that I read to them. I took up these duties willingly, making cigars
    part time and reading at other times. I used to translate for them the "New York Herald," "The Stigen" of Jacksonville,
    and "The Tampa Daily Leader." Later Mr. Cuesta separated from Mr. Ballard, setting up a cigar factory with Mr. Rey in
    West Tampa. I went with Mr. Cuesta and worked for him for over twenty years, rigging, translating and making cigars, all
    within the day's work.
- speaker: Respondent
  text: A great friendship sprung between Mr. Cuesta and myself, a friendship that had started in New York. Although he is
    now very old, feeble, and barely able to get around, he comes to the Spanish Club in his car to see me. If he is unable
    to get out of the car without help, he usually sends in the chauffeur to let me know that he is here. I then go out and
    have a nice little chat with him.
- speaker: Respondent
  text: I was appointed Secretary of the Centro Espanol in the year 1900, and served until 1906. In 1906 I went back to work
    at the cigar factory. However, in 1916 I was again recalled to the Spanish Club. Since then I have held this position
    permanently.
- speaker: Respondent
  text: I have a brother, now 70 years of age, living at Wells Village, Connecticut. He is a true Yankee, and a great admirer
    of Mr. Roosevelt.
- speaker: Respondent
  text: I have always dressed within my means, or in other words, wear only that for which I am able to pay, not like many
    who go about dressed like a millionaire, without a cent in their pocket and owing money to every store in Tampa.
- speaker: Respondent
  text: Upwards of $2,000,000 have passed through my hands since I have been Secretary of the Centro Espanol, and although
    it has never been requested of me, I have placed myself under bond with two companies.
- speaker: Respondent
  text: Many of our members are unable to pay their monthly fee, as they are not working. However, we do not cast him aside
    because the effects of the depression have reached him. We administer medical aid and medicine whenever he is sick. The
    receipts unpaid of the Club sum up to $2,997. The Seccion de Propagandas, a department of the Club that takes care of
    investigating all unpaid receipts, paying the receipts of those who are out of work, has paid nearly all of the above
    sum and having a balance now of $949.00.
- speaker: Respondent
  text: 'On March 27th we paid for doctors and help at the sanatorium as follows: Doctors $1,381.66, employees of the Sanatorium...
    It will be noted that I paid this amount four days before the end of the month.'
- speaker: Respondent
  text: Many of the members have so much faith in me that they also entrust me their money to save for them.
- speaker: Respondent
  text: The objects of this corporation shall be to render voluntary assistance and relief to all worthy members in case of
    misfortune or distress, to extend to them educational facilities, and to encourage and promote among them, and their families,
    recreation and social intercourse; but in no case shall any member be entitled to or receive any pecuniary gain or profit
    from any of the operations or transactions of the Corporation. Its principal office shall be in the City of Tampa, County
    of Hillsborough and the State of Florida, but its establishments for relief, recreation or entertainment may be located
    anywhere in the said county of Hillsborough.
- speaker: Respondent
  text: My personal opinion of the cigar industry is that it is going from bad to worse. If conditions are not remedied soon
    in this city, we will soon be in the deplorable condition Key West found itself recently. The machineries for making cigars
    are at the root of all this evil. Over 600 women, who were employed as cigar banders, have been thrown out, due to the
    cigar banding machine. Countless numbers of cigar workers are today unemployed due to cigar making machines.
- speaker: Respondent
  text: On the other hand, the cigar manufacturers here try to compete with the manufacturers of the North in the production
    of cheap cigars.
