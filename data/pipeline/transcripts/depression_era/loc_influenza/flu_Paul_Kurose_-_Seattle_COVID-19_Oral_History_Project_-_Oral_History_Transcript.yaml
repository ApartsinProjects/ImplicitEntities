turns:
- speaker: Interviewer
  text: Okay, so then we will start with just your demographic information. What is your name? And can you please spell it
    out for me?
- speaker: Respondent
  text: Paul -- PAUL Mitsuo Kurose. It's Paul, Mitsuo, Kurose.
- speaker: Interviewer
  text: Great, and then how old are you?
- speaker: Interviewer
  text: And what is your date of birth?
- speaker: Respondent
  text: September 26 1956.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: Seattle, Washington.
- speaker: Interviewer
  text: What gender, if any, do you identify with?
- speaker: Interviewer
  text: And what pronouns do you use?
- speaker: Respondent
  text: He, him, his.
- speaker: Interviewer
  text: And then what race or ethnicity do you identify as?
- speaker: Respondent
  text: Japanese American.
- speaker: Interviewer
  text: Okay. And then how important is your racial or ethnic background to you?
- speaker: Respondent
  text: It's very important.
- speaker: Interviewer
  text: Do you want to tell me a little bit more about that?
- speaker: Respondent
  text: Um, (pauses), I think just, family history (pauses), life experiences are very tied into who I am in my racial identity.
    Growing up being very aware of that, and being made aware of what did my parents and grandparents had experienced related
    to race. Being very aware of what our community had, and still was encountering and still is encountering, (pauses), in
    addition to just that racial identity in terms of Japanese American just as a person of color growing up in America, living
    in America, is something that's very significant. And I'm very aware that.
- speaker: Interviewer
  text: I just have one followup question that you can touch on or not, but you said you were aware of this growing up or
    made aware, how were you, I guess, how were you made aware of was it was it by the community? Was it by life experiences?
    Was it by explicit teaching from family members?
- speaker: Respondent
  text: I think all of the above. So certainly, I think, teaching and being enlightened by family members was a huge part
    of that, because I think a lot of people grow up in similar circumstances, and they're not as aware. Or, or, maybe they
    kind of block it out, I think. I mean, I think there's (chuckles), I think you can't not be aware because,- the you know,
    things happen, things you experience. I guess you could interpret things differently. But I think it was very apparent
    to me that so much had to do with race. And again, part of it being apparent to me was because of my parents and elder
    siblings and my younger sister as well. I mean, we all were very conscious about it. And, yeah, and it was very clear
    from things we saw, things we had seen that race did play a major factor in all of it.
- speaker: Interviewer
  text: Okay, thank you so much for elaborating on that. And then kind of building off that, can you talk about any social,
    political, ethnic, racial, or religious communities that you are regularly-- regularly connected with right now? If any?
- speaker: Respondent
  text: Yeah, I mean, I'm connected with the community I grew up in, in Seattle Central District. So I think that there's
    a community of people who grew up in this district that - we might not consistently connect with each other formally,
    but there's connections that we have as a community that I think - many of us identify strongly with and identify strongly
    with each other. The Japanese American community as well, you know, I grew up here in Seattle, and have been part of that
    community as well. I think, again, not, like membership in organizations so much as just being connected, - and involved
    in different things. I do have some connections with some organizations now, with Japanese American Citizens League. They
    award a scholarship every year in my mom's name in honor of my mom. So I'm involved with that, significantly. I take part
    in that scholarship committee every year. And with the Japanese American Citizens League, we do some activities at a middle
    school in Seattle named after my mom. So there's connections I have there with that organization. - In my workplace, I
    mean, I work at the Seattle-- at North Seattle College, which is in the Seattle College District, used to be called Community
    College District. We have an Asian affinity group, Asian Pacific Islander affinity group that I was, I'm a part of. It's
    not real active, but we started it up a few years back. And I'm also currently a much more active group is we have a BIPOC
    caucus within our teacher's union in the Seattle College District, the American Federation of Teachers, local 1789. And
    what else? And then this pandemic has changed somethings up quite a bit, but you know, just a lot of community involvement,
    both in the Asian American and communities of color and Seattle.
- speaker: Respondent
  text: Maybe that's everything.
- speaker: Interviewer
  text: Okay. Wow, wonderful. You shared so much. I have a couple followup questions for you to elaborate on a few want. Starting
    with one of the first groups you talked about just being involved in you said, you grew up in Seattle Central District,
    and you don't always explicitly connect with those people. But there are things you share because of your experiences.
    What are some of those things tied to the Central District that you feel connect you?
- speaker: Respondent
  text: I think, well don't just think, I know, there's a lot of solidarity between and among those of us who grew up in the
    Central District and identified strongly with each other. We encountered a lot of the same experiences. We're living in
    the same circumstances. So you know that was Central to that. And I think through that we also developed a real, I think
    consciousness about race in America, and (pauses) kind of a commitment to addressing a lot of the issues that we as people
    of color encounter in America. And, you know, and throughout the world, I mean, I think there's identification that (pauses)
    through that experience, we developed with each other. And, yeah, so that's, I kind of feel like, you know, we, I see
    people still connect with people who some of them are my elders, from the community, some of them were you know, just
    lots of different connections. As a teacher, sometimes I would have students who were family members of people I grew
    up with, and so there were connections there that were meaningful and deep, and we were connected. So, I think a lot of
    us feel that connection, kind of that's who we are (chuckles) you know. So very connected that way. And it was, -It was
    a diverse community as well. I mean, it was predominantly people of color. That's where we were all historically, in Seattle,
    restricted to live was with each other. And (pauses) some positive things come out of that, you know, in appreciating
    each other. Sometimes some negative things come out as well, you know, we sometimes see that some of that conflict between
    in among different groups that should be in solidarity with one another, if they understood the situation better. That
    sounds kind of cocky about it. But I think that's a lot of times that's the case is that we're pitted against each other.
    And sometimes we're not seeing that (pauses) You know, amongst each other, we're not the enemies. We're not enemies. We're
    fighting against the same kinds of injustices.
- speaker: Interviewer
  text: Yeah, thank you for sharing so much more about that. And kind of your history growing up there and how that's influenced
    you today with your connections, understandings. I have one more question about you listed so many things you're involved
    in. I have one more question for this section. You said you're involved in the Japanese American Citizens League, and
    it's actually there [?had?] I believe you said there's a scholarship in your mom's name and a middle school. Can you tell
    me your mother's name and spell it out?
- speaker: Respondent
  text: Her name is Aki, A ki, Kurose, Kurose. Her full first name is actually Akiko, Akiko, but she always went by Aki, we
    just come in with Japanese names. And what else did you say? That's her name spelled it out?
- speaker: Interviewer
  text: That was my first part of my question. And then my second part was I wanted to ask you, what can you tell me a little
    bit more about your involvement in this organization and how there came to be a scholarship and a Middle School associated
    with your your mother.
- speaker: Respondent
  text: My mom and older siblings, but mainly my sister Ruth and older sister Ruth Ann, were involved with JACL from way back.
    I never was really active in it. I was involved in different ways with different things that they did you know and supported
    different things that they got involved with at times. And you know, one thing, you know, there was a lot of education
    and activism around Japanese American incarceration World War II incarceration that initially the JACL wasn't really very
    strongly (pauses) progressive about I think, but, it evolved into being very active in the redress movement to have (pauses)
    it acknowledged, formally acknowledged, by the US government, the wrong that was done the injustice that was committed
    against our people. So my mom and older sister, as far as our family goes, were the ones who were primarily -- my dad
    as well, not quite as much because he was one of those who really committed himself to our family. He worked seven days
    a week, so usually seven nights a week, graveyard shift, so he wasn't as- as active, but he was definitely very, took
    strong positions on such matters. And, my mom got recognized by -- well, the two things I mentioned were after she passed
    away, but she got a lot of recognition. I'm, we're very grateful that she got a letter of recognition as well when she
    was still living for a lot of the work that she did. She was an activist. She was a Quaker, so she was really involved
    in peace activism. But she also got involved in other social justice causes. We grew up here in the central district.
    This house I'm living in is our family home. The realtors won't sell it to my parents when my parents bought it in 1961,
    because it's on the other side of the 34th Avenue red line that exists up in my drawing neighborhood. Because 34th Avenue
    is the ridge and we're on the side of the ridge that goes down toward the lake and that was racially restricted. But the
    owner of the home so house to our parents around the realtor Lake Washington Realty, not being willing to sell it to us.
    To my parents, that was only five, so not to me. But my mom got active. I don't know if she got active in a lot of the
    Fair Housing stuff before that, but I -I do know, that I learned for being active in a lot of the fair housing, protests
    and such. Back in the 60s, so she she was very, she was very involved. And then she -she went back to school when me and
    my younger sister were old enough. We had six kids in the family. So once we got to be of age where she could go off to
    finish her education. She did that. She started working with Project head start when it first began in the city. She worked
    with Dorothy Hollingsworth in Daisy Dawson, Daisy Tibbs Dawson in getting that program off the ground in this in Seattle.
    Dorothy Hollingsworth was the one who really led that and then she became a kindergarten first grade teacher. She taught
    at Martin Luther King elementary school under Louise McKinney, who was the principal there her husband, Reverend Samuel
    B. McKinney. But then my mom got the equivalent of getting bused like I got bused from the central district to North Seattle
    as a student. She got transferred from the central district to North Seattle, because they -the school district was doing
    this thing to try and desegregate faculty as well. And she encountered a lot in having that happen to her but she won
    a lot of people in the community that she was bused or she was transferred into that bus that she drove she transferred
    into she really won them over and they really later supported her tremendously and we're appreciative. We weren't very
    appreciative initially with the response they gave her. But later, our family's really appreciative of the support and
    recognition that That community gave her once they got past their initial ignorance about who she was. Anyway, so she
    got a lot of recognition, she got a Presidential Award. And then when she passed away a lot of them, actually not just
    the Japanese American citizens League, a lot of community members, of all many different backgrounds advocated for her
    for a school in Seattle being named after one of the Seattle Public Schools, and it was Sharpless Middle School, and our
    Sharpless junior high, and then they changed it and named it in her honor. So that was pretty special for us. And then,
    and then the Japanese American citizens league started up a scholarship in her recognition as well. And that's so I've
    been involved with that actually, where this Saturday we're awarding, we do it every year, but the Saturday is our awards.
    Used to be a banquet can do a banquet, now but award ceremony where I get to present the Aki Croesus scholarship to a
    college student. So that's nice.
