source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Could you introduce yourself? How old are you? Where were you born?
- speaker: Respondent
  text: Hi, my name is Randall Rodriguez. I was originally born in California. I'm forty years old. I use he/him pronouns.
- speaker: Interviewer
  text: Could you also tell us the race or ethnicity you identify as and how important this is to your background? In addition,
    any social, political, racial, religious communities that you are connected with?
- speaker: Respondent
  text: I am a Chicanx man. I don't know if I would say it's incredibly important. It's something that I--My heritage is something
    that I struggle trying to identify with. I think that's something common with the Chicanx experience, always trying to
    find our place in society or something like that. I am a UFCW 21 member. That's one of my, I guess we would say political
    and also work affiliations.
- speaker: Interviewer
  text: If you have any religious communities that are also connected with, if you would like to elaborate on your union participation,
    that'd be great as well.
- speaker: Respondent
  text: I'm not a religious person. I am kind of on the outskirts, not a key member to the union. I'm a big supporter of my
    union. But I also don't take time and volunteer with them or anything like that. Partially because I have only been a
    part of the union since the pandemic started. But I'm a pro-union guy kind of through and through.
- speaker: Interviewer
  text: Would you mind describing your occupational history up to today? Where did you work before the pandemic and also your
    current profession?
- speaker: Respondent
  text: I have been a bartender and server for about twenty two and a half years prior to the pandemic. I lost both of my
    jobs. I was working at a place on Capitol Hill and just started at a place in White Center as a bartender when the pandemic
    hit, and I lost both of my jobs within about forty five minutes of each other. My partner has been a manager at a supermarket,
    our local grocery store for about sixteen years. She was able to get me a job working with her because they were incredibly
    short staffed, and I didn't have as much to do. I am technically on sabbatical at the moment from the grocery store. But
    that's just because school has kind of been busy. And the store has also kind of mellowed out a little bit where they
    don't have the same kind of hours that they need for me.
- speaker: Interviewer
  text: Can you run me through a typical day at work before the pandemic?
- speaker: Respondent
  text: Yeah. So I worked about--I usually worked three or four days a week, I was on the night shift, I was at that bar on
    Capitol Hill that I worked at. (laughs) I had the title of bar manager. I would do some of the training and stuff and
    we would hire and I was responsible for picking up and dropping off dried goods and perishable goods. In that industry,
    typically you get your spirits and your beer delivered to you. You don't have to send somebody to do that other stuff.
    Somebody has to physically go and take care of, and I used to do that. I typically worked--I would get to work about seven,
    seven thirty and then I would work. The shift kind of ended at around four in the morning. I was typically there till
    about five or six though just because I had other stuff that I had to do. Then I would come home and sleep for a few hours
    before I got back up. I would work weekends. I typically worked Thursday, Friday, Saturday night. Sometimes Mondays too.
- speaker: Interviewer
  text: That sounds like a very long shift.
- speaker: Respondent
  text: (laughs) It was a very, very long shift. It's hard to be doing almost twelve hours a day, especially when it's in
    the middle of the night. (laughs)
- speaker: Interviewer
  text: I can only imagine. How can you say that COVID-19 has impacted your work life? I know you said that you were laid
    off. But, maybe in relation to your supermarket job, how would you say that COVID-19 influenced and changed it?
- speaker: Respondent
  text: The hours were definitely a lot better. (laughs) But the pay was a lot lower. I made at the grocery store about a
    third of what I made bartending. Although because of the union, I was able to have extra health insurance, which I had
    through my partner beforehand, but more health insurance, and then there's more benefits that go along with it. It was
    a challenging pay cut for us to deal with as a family.
- speaker: Interviewer
  text: You probably relied a lot on tips at the bar.
- speaker: Interviewer
  text: Were you able to get a hazard pay increase from the city of Seattle while working at the supermarket?
- speaker: Respondent
  text: I was. But it was as a grocery worker. So it wasn't--My unemployment was related to my yearly annual income that I
    made from the bar. But the hazard pay was related to being a grocery worker at that point.
- speaker: Interviewer
  text: When Governor Inslee designated the Stay Home, Stay Healthy order were you classified as an essential worker?
- speaker: Respondent
  text: At first, no. Once I took the job at the grocery store, then I was classified as an essential worker.
- speaker: Interviewer
  text: I was also very lucky to get an essential worker job, which I still have. Now I would like you to describe a work
    day during the pandemic. What are the changes, the difficulties, the stresses that you may have had?
- speaker: Respondent
  text: (laughs) The grocery store industry, especially at the very beginning, was really challenging, because it was the
    one place that kind of anyone could go, and everyone could go, it was still open. It became sort of a social gathering
    place, but everyone was in a really heightened state of stress. It was everybody's worst experience of their lives trying
    to deal with what was happening personally, locally, nationally, and everything. People were at their worst, they were
    having the worst days of their lives as they were there. There were assaults on employees, coworkers, people trying to
    steal things, people freaking out because we were out of toilet paper, there was that big toilet paper thing at the beginning,
    too. We suffered from that also. (laughs) People really struggled with us being out of things like toilet paper. Yeast
    and flour was something that for like a month, we just couldn't get and couldn't keep. People had a really hard time with
    that too, customers especially. The store I work at has a big demographic of elderly people that shop there. They had
    a heightened sense of fear as they were shopping. One of the things that we did to help curb that and we weren't able
    to do it right away was we implemented a curbside service where people would call in, give a list of stuff that they needed,
    and then we'd have someone shop for them and then take it out to their car with face shields and all kinds of things and
    try to keep them as safe as possible. But it took a little while to get going. Once it did get going, it was part of the
    new normal that started to happen at the grocery store. At first, it was really, (laughs) really interesting to see when
    everybody's having the worst day of their life, how that interaction goes.
- speaker: Interviewer
  text: Did you ever have to resolve any conflicts between customers and yourself or other employees? Was there a lot of that
    going on besides the general freaking out?
- speaker: Respondent
  text: There was a lot of that going on. That was one of the things that--It didn't affect me a whole lot. I was a last resort
    person when there was a big conflict going on. Some of that I think comes from my bartending history though too, where
    I would do that. I have a lot of experience doing that. By the time somebody is asking me for help to deal with an unruly
    customer or somebody who's having a bad day, or somebody who's trying to steal something, by the time they've come and
    asked me, things have gotten bad. Then we're basically waiting for the police to show up at that point. But that happened
    a few times. Usually with theft, the thing that they would ask me to come and help with, that's something that I have
    some experience with.
- speaker: Interviewer
  text: Thank you for your answers. We're going to move on to health and safety now. At your current job were you provided
    with PPE (personal protective equipment) and if not, how did you obtain it?
- speaker: Respondent
  text: That's an interesting one. The grocery store did provide PPE for us, but it was really challenging. At first, we weren't
    able to get anything. There was a huge shortage of gloves and masks. And there was a huge shortage of bags too, which
    was kind of a weird thing. Our employer put up some plexiglass barriers and stuff. We have a co-worker whose family is
    in the shipping industry, I believe in China, and nobody in the area in our part of Seattle, in our industry was able
    to get masks and gloves, disposable gloves, from a corporate supplier. But he was able to call in a favor from a cousin
    or something like that and got a shipment within a couple of weeks of gloves and masks and some other things. Some other
    disinfectants I think was the other thing was on that shipment. They were able to provide that for us. But we had to use
    some backdoor channels to do it, which I thought was interesting.
- speaker: Interviewer
  text: I remember specifically that isopropyl alcohol was sold out for months.
- speaker: Respondent
  text: Yeah, and what's the other--Hydrogen peroxide too. I think maybe it was alcohol was the other thing that was on that
    shipment. We were out of that for a while.
- speaker: Interviewer
  text: Have you ever felt that your life or your health were in danger as a result of working during COVID-19?
- speaker: Respondent
  text: Yes. My partner and I live with our daughter, who is about to turn twelve. We also live with her parents. We're in
    a multi-generational household. Both of my in-laws are high-risk individuals, so there was always a concern about that.
    My grandmother died of COVID-19. At one point we had a big outbreak at the store among employees. And so that was really
    scary. My partner and I were able to--We have some friends who are really into camping, which I think is hideous, personally,
    but they love it. So they have more than one camper, like a tow-behind fifth wheel type trailer camper, and they brought
    one to our house and we put it in our back alley, and ran some cords out to it. My partner and I stayed in a camper for
    just a little bit, I think six weeks while the outbreak was happening at the store (pauses) to kind of keep everybody
    safe in our house.
- speaker: Interviewer
  text: I'm very sorry to hear about the loss of your grandmother. It's very tragic.
- speaker: Respondent
  text: It was really hard on my mom, too, because she couldn't go and be with her because of that. I think that's an experience
    that a lot of people have.
- speaker: Interviewer
  text: Absolutely. The fact that 500,000 people and more have died is really a tragedy and something that needs to be reckoned
    with. Have you ever contracted COVID-19 or did you feel that you have?
- speaker: Respondent
  text: No. After that outbreak at the store, we waited for the health department to give us like--You want to take this many
    weeks since the last outbreak or since the last confirmed case. And then go get tested. We got tested several times and
    kept up on that but never tested positive. I never did an antibody test. But I'm guessing I didn't.
- speaker: Interviewer
  text: That's good to hear. I've also never gotten COVID-19 as far as I know. For the company you currently work for, how
    would you rate their response to COVID-19 as well as their support to you and your other employees? Were they effective,
    did they move quickly enough? Did you receive proper compensation for your labor?
- speaker: Respondent
  text: 'That''s kind of a mixed bag. I felt like our company did a really good job of health and safety protocols within
    the store. The other protocols that go along with that: being paid for labor, being compensated for overtime, provided
    scaffolding, being able to take time off and have coverage, things like that have been really bad. We''ve been anonymous
    so far. So I think it''ll be alright. But recently, our owner went to all of the department heads and said, You need to
    figure out a way to keep the COVID-19 numbers as high as they are because the grocery industry has made a lot of money
    during the pandemic. That''s his new charge. This person''s new charge to all of the department heads is to make sure
    that he keeps the quarterly figures that high, which I thought was out of touch and distasteful. In the meantime, I know
    that the union did a lot to try to get grocery workers ahead on the vaccine list, get hazard pay and things like that.
    I know that''s been challenging, a lot of what ended up being effective for the union wasn''t necessarily collective bargaining,
    but pressure on local governments to do things and to have the city or the county or the state step in and do things.
    The Plexiglas barriers, for instance, that was something that kind of came from UFCW working with governments--Local and
    I think the state governments actually that they worked with, to implement those standards and get Plexiglas installed
    in check stands and things like that. We were part of that. There wasn''t a resistance to it. Our owner wasn''t like,
    We''re not putting those things in here. But I know that that came from the union. I don''t know if that answered your
    question, or if I just kind of went off on a tangent there?'
