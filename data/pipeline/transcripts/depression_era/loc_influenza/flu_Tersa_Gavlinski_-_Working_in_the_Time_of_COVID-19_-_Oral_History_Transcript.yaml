collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How has your work been impacted or disrupted by the pandemic?
- speaker: Respondent
  text: It became really different right away, I guess, in that they cut a significant portion of the routes, and so even
    somewhere back around March 10, my first half of my shift was cut. So then I just - I still had to go into work and hang
    out on my bus for about an hour and a half before I could start my second piece of work! (laughs) But then, what else?
    It was like things gradually rolled out little by little, like as far as mask wearing or like what was expected of people.
    Rear boarding, I think, happened right away, and they didn't charge people for getting on the bus. And then that - I don't
    think that's where they primarily got their income source, but then it became - I think it's sort of like a financial
    issue, but the union has fought hard for our safety, and so we still don't have any front boarding, because they haven't
    been able to agree on a shield that is - works and is safe. It's kind of in the process right now, where they're trying
    to test them out to make sure the reflection doesn't cause too much of a problem.
- speaker: Interviewer
  text: You all were designated frontline workers and essential workers by the stay at home order, is that right?
- speaker: Interviewer
  text: Did you ever feel in danger on your job as a result of the pandemic?
- speaker: Respondent
  text: 'I mean - moderately, just because you''re exposed to the public and you''re in a closed airspace. But I, personally,
    would try to calm my parents'' fears when it came to thinking about that because I would have like a minimum number of
    people per day and it seemed like, like maybe 10 maximum. And so, compared to a driver that''s working 8 or 10-hour days,
    I don''t have the same exposure rate. And I tried to you know, clean my own work area, even though they''re doing more
    deep cleaning on the buses and stuff. So I bring sanitary wipes and wipe down the steering wheel and everything: the microphone
    and the intercom; all the - all the stuff around me.'
- speaker: Interviewer
  text: Did your employer provide personal protective equipment? And when did they do that?
- speaker: Respondent
  text: Eventually - (breathes) I might have to look that up! But I want to say it happened in May. (laughs) As far as the
    masks and gloves and wipes. They had different times when that was rolled out, but it was much later than they should
    have!
- speaker: Interviewer
  text: That's interesting because the order went into place in the middle of March!
- speaker: Respondent
  text: It's still an issue about how to enforce passengers wearing masks on buses! (laughs)
- speaker: Interviewer
  text: Did you all receive hazard pay as a result of the pandemic? Did you get hazard pay?
- speaker: Respondent
  text: 'I don''t think so. We recently received a kind of a check, and I''m not sure if that''s exactly what it was for.
    I know that they were arguing for it in the union. But then, by the time we were arguing for it, we were also trying to
    like keep our contract, which is something that they agree upon every three years. And they had agreed to it and then
    the pandemic happened, and then they''re sort of like: "Well, maybe not!" (laughs) We had a big letter writing campaign
    and trying to get lots of people to talk to the Seattle City Council and most of the people ended up supporting us to
    have that contract go through But [King County Executive] Dow Constantine didn''t want to since they are having budgetary
    issues, and they''re trying to make cuts wherever they can. But we really felt it was unfair to have the frontline workers
    be the ones that were cut! And they still did end up cutting; 2,200 part-timers were let go in August. And that''s a first
    for Metro, like they have always tried to reduce lots of different avenues. I don''t think they''ve ever laid anyone off
    before. But I don''t know if I answered your question. (laughs) We did get $1,000. I don''t think it was for hazard pay.
    I think it was for something else, but I can circle back with you. (laughs)'
- speaker: Interviewer
  text: You all were in the middle of contract negotiations, and so am I understanding you correctly, that you're saying that
    you had bargained it and they'd come to an agreement and then they kind of finagled out of it at the last minute because
    their budget had changed? So they decided that they weren't going to necessarily give you the cost of living increases
    or whatever that they had originally agreed to?
- speaker: Respondent
  text: Well, they tried! And then, I think with enough union pressure and letter writing from the drivers, talking to their
    representatives on the Seattle City Council, they were able to convince the majority - I think it was like a eight to
    nine, or like- I think one person voted against it. But everybody else voted to keep the contract the way it was, so we
    did end up getting our cost of living raise and this thousand dollars (laughs) which maybe was hazard pay?
- speaker: Interviewer
  text: So do I understand correctly because you all are public employees, you have to - Those things have to be approved
    by the Council and maybe the County Council too, to bargain - or finalize the contract?
- speaker: Respondent
  text: That's what I understood.
- speaker: Interviewer
  text: So if the contract did pass, how are they able to lay folks off in August? That's interesting.
- speaker: Respondent
  text: Um, I'm not sure - I don't know why they were able to.
- speaker: Interviewer
  text: Do you happen to know - If the county tried to change its terms a little bit in the finalized contract, did the union
    try to add any terms relating to health and safety or anything relating to the pandemic in the last round of the contract
    as they went towards approval?
- speaker: Respondent
  text: I think they just wanted - I know they were fighting for health and safety this whole time. But I think they just
    wanted the Council to honor what they had already kind of agreed to. So I don't know that they added anything.
- speaker: Interviewer
  text: I know that ATU 587 is more of an industrial model, right? So it's, it's the bus operators and the transit operators,
    and folks that work in the shop, right? And the people who service the vehicles and clean them? Are they all represented?
- speaker: Respondent
  text: I believe so.
- speaker: Interviewer
  text: I'm just wondering if you could paint a picture or describe a little bit about how the employer, and the union, and
    your co-workers have responded to these overall events? You've touched on this, but what is your general impression about
    how that's been?
- speaker: Respondent
  text: Well, all my co-workers sort of represent all of Seattle, in a way; it's just like a slice right through. There isn't
    necessarily a "kind of person." And so, there were lots of people that were like - I know there was a mechanic that I
    dealt with who thought the pandemic was a conspiracy theory made up at the beginning and he just thought - And others
    were "mask shaming" if people started like before. There was two operators that I know of that started before March wearing
    a mask, and they got a lot of flack for it! And even when even when the rule was finally instated, there was still even
    desk people that would kind of half-ass, do it! (laughs) And so, it became this gradual, higher and higher percentage
    of people that would wear a mask, even at work! (laughs) And it's like, there's some that would believe that "If you're
    going to get sick, you're going to get sick!" (laughs) Like "I can't. There's nothing I can do to stop that from happening!"
    (laughs) But, you know, I think all the precautions really make a difference.
- speaker: Interviewer
  text: You alluded to the fact that they have switched to backloading the bus instead of front loading the bus and that there
    was the gradual adoption of masks by the operators, and then some debate about the shield. Have you all been able to establish
    or maintain social distancing? And how, if you didn't always have that equipment. How has that evolved over time?
- speaker: Respondent
  text: With co-workers? I just try to spend as little time as possible at the base around people and they do have it taped
    off and ask you to social distance. Whether or not that happens or not is another story! Even the shields at work went
    in so much later than - I want to say they got a window shield in June for where we sign in, and, you know, they had those
    at Lowe's almost the second week, comparatively. And then you pretty much are able to distance at work on the bus. I think
    it can be trickier for passengers, but they put down - They put down the signs in different seats to try to keep people
    from sitting next to each other, and so depending on the bus size - For a 40 foot bus, you can have 12 passengers, and
    then for a 60 foot bus, you can have 18 passengers and then they can put a "full coach" sign and pass people up because
    it would be unsafe after that point. (laughs)
- speaker: Interviewer
  text: What's the fare practice now? You said at first they had waived it, how are they doing that now?
- speaker: Respondent
  text: We haven't been collecting any fares since March. So I'm sure that impacts the budget. I know it's not like their
    main source of income, but it's gonna have its effects. (laughs)
- speaker: Interviewer
  text: Do you have any sense about how your work and how your exposure during the pandemic compares to your colleagues that
    are in the same industry that aren't represented by a union?
- speaker: Respondent
  text: You mean like other bus drivers and other cities or?
- speaker: Interviewer
  text: Well, ones that don't have a union to represent them? Because it seems like you've been describing the union as playing
    an advocacy role about health and safety. And I'm curious if you happen to know of anybody who isn't a member of a union
    who does the same job and what their impressions are?
- speaker: Respondent
  text: I don't really know that many. If you're familiar whether or not Spokane has a union, I know that they - I was there
    in August and I know that they have shields (laughs) and are boarding at the front again. So whether or not (laughs) they
    got it because they didn't have a union I don't know. I sometimes think that the union also hinders the process because
    sometimes the - Not the union itself, they're there for your safety, but each person that's testing it is saying that
    "there's too much reflective glare, and it's unsafe to drive with this thing." And I think at some point you just have
    to be like, "This is what we got to work with! (laughs) And try to make it as safe as you can!"
- speaker: Interviewer
  text: Seattle seems like it's the hotbed of the pandemic, and here Spokane has the shields in place way earlier?
- speaker: Respondent
  text: I know! Bizarre!
