source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: And I wonder if you could say, how old you are, and where you were born.
- speaker: Respondent
  text: I was born in Honolulu, Hawaii. 1975. And I cannot remember if I'm 47 or 48 right now. (laughs)
- speaker: Interviewer
  text: And then what gender, if any, do you identify with? What are your preferred pronouns?
- speaker: Interviewer
  text: And then what race or ethnicity do you identify as, and how important is that racial or ethnic background to you?
- speaker: Respondent
  text: I'm Puerto Rican, German, Irish, Cheyenne Indian. (pauses) I guess because I'm--and I was born in Hawaii--so I guess
    because I'm so mixed, it's not that important to me. (laughs) I know that it's a strange thing to say, but it's really
    not. Yeah, it's not that important to me. I prefer to be described as like a light skinned black person or, like, not
    white. Yeah.
- speaker: Interviewer
  text: You said, you mentioned being born in Honolulu. Do you feel like that kind of aligns with some of the larger Hawaiian
    culture, which is such a great mixture of different people coming together?
- speaker: Respondent
  text: I think so, yeah. Just because--it's just--it is such a great mixture of everyone coming together. I never really
    experienced racism until I moved here. (laughs) So, yeah.
- speaker: Interviewer
  text: Nice distinction for Washington. (laughs) And so can you talk about what social, political, or ethnic, or racial,
    or religious communities that you regularly connect with or participate with?
- speaker: Respondent
  text: When I was small we were Christian, and then we were Catholic, and then we went back to Christian and so now I'm just--I
    just believe in a higher power, not necessarily like God or Jesus or anything, just sort of like a higher power, I believe
    that there is something out there that could guide us. And what were the other questions? (laughs)
- speaker: Interviewer
  text: I think this was sort of trying to get out like what civic or community or cultural organizations are you regularly
    part of to kind of get a sense of how you fit within the community and, you know, your activism, your, you know, community
    activities.
- speaker: Respondent
  text: I would say that I'm a Democrat. Until recently, within the last four or five years, I haven't really been politically
    active. But now I am starting to pay a lot more attention, watching the news a lot more, not taking voting for granted.
    Just when, like, when the pamphlet comes, like, looking at the pamphlet and studying it and figuring out who I actually
    want to vote for, instead of just, you know, A, B, C. (laughs) And I guess ever since I hurt my back, I haven't really
    been going out much. So I don't really--I don't really have like a big community that I associate with much anymore. Because
    I don't really--I don't really go out much anymore.
- speaker: Interviewer
  text: And when did you hurt your back?
- speaker: Respondent
  text: Oh, I hurt my back about five years ago. About 15 years ago, I had fallen and I fractured my tailbone. And about five
    years ago, my back had been hurting and causing me problems, and I stood up from my desk at work and I was just in such
    excruciating pain. I couldn't move, I couldn't speak. When I could finally move again, I just grabbed my stuff and I went
    home. And my back has been not good since then. (laughs)
- speaker: Interviewer
  text: Oh, God, sorry, yeah. Is that partly what led you to more gig work structures, because it's hard to sit or...
- speaker: Respondent
  text: Yeah, because I can't work in that sort of function anymore. Like, I never know what my pain levels are going to be,
    so I can't work in, like, a nine to five job anymore. I just can't sit there for that long. And also, I can't work in
    that structured, like, nine to five, Monday through Friday because there are some mornings where my back hurts, and I
    can't, I can't actually get up. So I would have to--I wouldn't--I wouldn't be able to get there at nine. And then I was
    actually fired from my job. And that's when I had a friend who did gig work on the side. And then she--I went on the ride
    along with her, and then that's how I started doing it full time. (pauses) And then gig work is, like, the only industry
    that allows me to, like, work around my pain levels and work at, like, a pace and intensity that's good for me for that
    time. Then another thing I really like about gig work is, like, I don't have a manager over my shoulder anymore. Nobody's
    counting my keystrokes or timing my bathroom breaks. I'm not--I don't have to buy Girl Scout cookies, (laughs) or wrapping
    paper, or candles...
- speaker: Interviewer
  text: Has it been challenging to--Oftentimes, people talk in ergonomics about like repetitive stress injury, like bending
    over to pick up stuff to deliver stuff. Has that been a challenge, too?
- speaker: Respondent
  text: Sometimes I just deliver food so it's not that heavy. I don't--I looked into doing, like, Amazon. But yeah, I can't
    take the risk that I'd get something heavy. Like right now, like, walking up a five story walk up is challenging for me.
    So if I had to carry a big package up a five story, there's no way I could do it, yeah, so...
- speaker: Interviewer
  text: This is really interesting to understand what a specific choice all these things are for you. How would you describe
    your occupation or profession and what company you currently work for?
- speaker: Respondent
  text: So, I work for GrubHub. Sometimes I do DoorDash. I used to do Postmates, but they changed their pay structure. So
    I don't do them anymore, because my pay got cut in half from them just overnight. So I stick with GrubHub, try to do DoorDash
    every once in a while just to stay current. Just in case something happens, I have something to fall back on. And what
    was the other part of your question? (laughs)
- speaker: Interviewer
  text: Oh, that was pretty much it. And I was just wondering, you know, how many years have you been unemployed in this job
    or jobs?
- speaker: Respondent
  text: For gig work, GrubHub, Postmates, DoorDash, I've been doing that for just about four years.
- speaker: Interviewer
  text: And I wonder if you could talk about if you're a member of a union or another kind of worker organization, and if
    so, for how long and what the name of that organization or organizations are?
- speaker: Respondent
  text: So, gig workers we don't really have a union. I've been doing a lot of work with Working Washington, just to get things
    (pauses) more fair and equitable for gig workers. I really started getting more involved with them at the beginning of
    the pandemic just because I just thought, like, things have to change. And it's not like I have to change them, but I
    felt like I have to change them for me. And so the only way that I could make sure that things changed for me for the
    better is if I went and changed it. (laughs) So I started working with Working Washington a lot more, became a lot more
    involved, and that's how sort of I came--started becoming a lot more political and paying more attention to that sort
    of thing.
- speaker: Interviewer
  text: Was there like a particular precipitating event or a time when you met somebody from them? Or did they have an action?
    Or did you have a particular realization in your job where it led you to them?
- speaker: Interviewer
  text: Could you remember Emily's last name?
- speaker: Respondent
  text: I'm not sure how I met Emily from Working Washington. I think she's on Facebook, maybe, I'm not sure how--I don't
    remember how I met her. I'm pretty sure it was on Facebook. And she kept calling me and trying to get me more involved.
    And she wanted me to speak at these meetings. And I just didn't want to do any of that kind of stuff, I just thought,
    ehh, nothing's going to change. Like, that's all useless. And then the things that she was talking about, like getting
    us more, better pay and benefits and stuff like that, I was like they're never going to do that. Why would they do that?
    And so, I just didn't really believe what she believed at the time was, or she still does, is that the power is with the
    people, and if we band together, we can push the corporations and the political parties and everyone to our will, instead
    of the other way around. So she truly believes that, and I didn't think it was possible. But when the pandemic hit, I
    just thought, things have to change. They have to get better. We do need benefits, we do need sick time, we do work, too.
    And so gig work is work, and we deserve the rights as traditional employees. Yeah, the same rights.
- speaker: Respondent
  text: Oh, let me look on my phone.
- speaker: Interviewer
  text: Thanks. I'm sorry. I tried to look at a website, but I can't.
- speaker: Respondent
  text: Her last name is Dhatt, D-H-A-T-T.
- speaker: Interviewer
  text: Oh, yeah, that's right. Okay. Thank you. And let's see. And you sort of alluded to this, so how long have you been
    involved with Working Washington? I can't remember--did you see this specific time amount?
- speaker: Respondent
  text: Just like I said, I don't remember how I met Emily, or how she started calling me and wanting me to do stuff. So I
    don't remember how long I sort of pushed her off. But when it--when the pandemic hit, that's when I became a lot more
    involved and a lot more willing to do the speeches and do the meetings and that sort of thing.
- speaker: Interviewer
  text: Ah, but you were involved before the pandemic? Okay.
- speaker: Respondent
  text: No, no, not really, no.
- speaker: Interviewer
  text: Okay. But you--
- speaker: Respondent
  text: I always sort of pushed her off, yeah.
- speaker: Interviewer
  text: I see. Okay, thank you for clarifying that. I wonder whether--and this is--I know that there's probably going to be
    multiple answers to this because we've been in this pandemic for so long. But can you run me through, like, a typical
    day at work before the pandemic? You know, sort of from the time you woke up to the time you went to bed? So, kind of,
    we get an idea about what a typical day, if there's even such a thing for your work?
- speaker: Respondent
  text: Yeah, so a typical day for me before the pandemic was I would usually get up in the morning, I would try to get up
    around nine or ten depending on my pain levels, what I could do. Probably did, like, some light housework or--I have a
    hobby that I build cat furniture. (laughs) So I probably maybe built some cat furniture or, you know, cut some wood or
    something like that. Yeah, then usually I would always try to schedule myself for like four or five. So around three,
    I would, like, you know, whatever I was doing, whatever project I was working on, finish up whatever housework I was doing.
    I rarely ever fold my laundry, so I'd probably just dump it on my bed. (laughs) And then work from four or five to, like,
    ten, eleven, or midnight. Tried to--Before the pandemic, I would say it was really easy to make, like $100, or so, a night.
    And I used to have a budget where I had to make so much money per day in order to pay all my bills. So I broke it down
    that way, so like, every time I went out, I would have to make this much to be able to pay all my bills. But after the
    pandemic, my days were pretty much the same. But when, especially when the restaurants closed down and part of the lockdowns,
    I started going out much earlier. Like one, sometimes noon, and I would stay out until curfew hit and I believe, then
    it was like seven. And then because a lot of people got laid off, a lot of people were just flocking to gig work. And
    then--Like the gig--the gig companies, they were making, like, a ton of money because everyone had to have everything
    delivered. But gig workers, there weren't enough orders for all of us. So you would end up waiting, like, like an hour
    for an order. And then you get to the restaurant and then you have, like, another half an hour, 45 minutes. And I know
    a lot of people know about the toilet paper shortage, but there were a lot of shortages around that time, there was a
    food container shortage. There was a lot of food items like a cinnamon shortage, rice shortage. And so a lot of these
    restaurants were doing just insane substitutions. And a lot of times they weren't telling their customers, so you'd deliver
    something they'd be like, "What's this?" Yeah, so--Oh, and then also the way we deliver now changed, we used to have to
    hand the person the order, but now we can just leave it at their door.
- speaker: Interviewer
  text: Yeah, thank you for explaining that. And then how do you take breaks throughout the day between orders? Or--how do
    yo
