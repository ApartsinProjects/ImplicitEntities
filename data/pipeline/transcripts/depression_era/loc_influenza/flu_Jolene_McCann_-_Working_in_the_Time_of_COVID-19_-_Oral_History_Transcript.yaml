turns:
- speaker: Interviewer
  text: So I wanted to first of all ask - if you're comfortable - Ask how old you are, what your birth date is and where you
    were born?
- speaker: Respondent
  text: Yeah. I am 38 years old. I was born on December 12, 1981 in Youngstown, Ohio.
- speaker: Interviewer
  text: Oh! A steel town! Nice!
- speaker: Interviewer
  text: Yeah. What gender, if any, do you prefer to identify with? And what are your pronouns?
- speaker: Respondent
  text: My pronouns are she and her and I identify as a woman.
- speaker: Interviewer
  text: Okay, thanks.
- speaker: Interviewer
  text: And in terms of race, or ethnicity? How do you identify and how important is your racial or ethnic background to you?
- speaker: Respondent
  text: I identify as a white person. I think it's really important for white people to own their identity and start to unpacked
    how white supremacy and things that we take for granted, are part of like who they are and how they engage with the world.
    So as far as - identity is important so I can disrupt some of these systems that are existing.
- speaker: Interviewer
  text: Yeah. And I thank you for acknowledging that and part of the reason why we're asking these questions that are almost
    presumptive is we're trying to make sure that we're not normalizing that, and we're trying to name it. And also, sometimes
    people look for interviews for demographic aspects of it. So this next question will kind of unpack some of that. I was
    wondering if you could talk about what social political, ethnic, racial or religious communities you regularly are in
    contact with?
- speaker: Respondent
  text: Yeah, so I was raised Catholic, but I'm a Unitarian now. So when I do seek church and actual fellowship in real life,
    it's at either of the Unitarian churches here in Seattle. And I've always been involved in or ganized labor movements
    wherever I am, whether it's at grad school, or it's as a teacher, so certainly my work with the SEA [Seattle Education
    Association] is important to me and just being engaged with larger labor issues as they're unfolding is important to me.
    So I'm a proud Franklin High School Activities Coordinator and teacher and I've taught in Seattle for 15 years. So a lot
    of the educators who are organizing around labor issues and, right now, trying to make Ethnic Studies happen, and opening
    up our own school at Franklin to working with these amazing professionals to make that happen. So I guess those are the
    communities that I'm in vested in right now, and historically.
- speaker: Interviewer
  text: Thank you. So you're a member of - you mentioned SEA, so Seattle Education Association, is that right?
- speaker: Interviewer
  text: How long have you been a member of the union and what offices have you served?
- speaker: Respondent
  text: I think the - one of the most important parts of labor is that you have a strong site-based organizational model.
    And I have been a building rep at Franklin High School for a lot of my tenure there. So I bounced from being a rep to
    an alternate. I grew up in the labor movement, and I really enjoy connecting with other teachers and other people who
    are active in that community, and serving my peers and my fellow members in that capacity. So I'm usually building rep
    and we do building level stuff. This summer, the Union had a Community Action Team that I did a little bit of work with,
    talking about how we engage the community with some of these common struggles. I'm really excited to see SEA moving more
    in that direction of engaging in the community and seeing how a lot of the struggles we're dealing with as teachers are,
    you know, systemic.
- speaker: Interviewer
  text: Is being a Building Rep akin to being like a shop steward in another locale?
- speaker: Interviewer
  text: Okay. And I wonder - Oh, sorry.!
- speaker: Respondent
  text: I was just gonna say we provide support to members if they're in some kind of conflict, but we also connect with our
    members and try to represent them and their concerns to the larger SEA body.
- speaker: Interviewer
  text: You mentioned how you come from a labor background. That sounds interesting. I was wondering if you could talk about
    your background there?
- speaker: Respondent
  text: Yeah. So my grandfather was a very proud Teamster and my grandmother was a member of the United Auto Workers; spent
    her life working at Lordstown, just outside of Youngstown. We're hearing a lot about Lordstown in this election. I'm trying
    not to get emotional here; my grandfather passed recently. So I just grew up by - being raised by people who came to the
    labor movement when they were young, in the [19]30s and [19]40s and had lived through this kind of "golden age of regulated
    capitalism," that had produced an outcome that they saw, you know, in decline. And I always was able to talk with them
    about political issues and I - as a child, when there were strikes, or there were work actions, my family talked about
    this. We would get together after church on Sundays, we'd always be together on Sunday, sit around a big table and talk
    politics. And the idea was that you might be nine, but somebody wants to know what you thought and you should have some
    thoughts and be thinking critically about things. So, I guess in that way, I was kind of raised in the labor movement,
    and in a very political family.
- speaker: Interviewer
  text: And you mentioned that - Am I correct in remembering that you said that you were here for - taught for 15 years? In
    your current job? Did you move to Seattle then? Or when did you come outhere?
- speaker: Respondent
  text: So at the end of - I went to Kent State University, and I am a very proud Golden Flash. I graduated from there and
    - President Trump - It's funny for me now to think about President Trump because I can remember being so upset by George
    W. Bush that we expatriated and left to go to Canada. And, now, you long for a war criminal, because it's a whole other
    world we're in. So, I attended graduate school at the University of British Columbia. I have a history degree from UBC,
    and my husband and I lived there. Immigrating to another country is a challenge, and my husband ended up getting a job
    here in Seattle. So we- He was-- My husband grew up in California, we met at university, but we felt like Seattle was
    as close as we could get to Vancouver without actually being in Vancouver. So here we are!
- speaker: Interviewer
  text: (laughing) Poised to go across the border, if it's necessary!
- speaker: Respondent
  text: (daughs) We're very close, right? I have my master's, I'll be like, "I'm coming back for the PhD, you know?" (/a ughs)
- speaker: Interviewer
  text: (laughing) Well, I find that sometimes to get a sense of people's work, especially before the pandemic, because we've
    been so disrupted - I wondered if you could walk me through a typical day of your work before the pandemic, from the time
    you woke up to the time you went to bed?
- speaker: Respondent
  text: Yeah. Okay. So, I have this amazing job, because half of my job is being an activities coordinator, and advising student
    government and working with all of our student leaders. And I'm obviously partial to Franklin High School, but it is one
    of the most diverse high schools in the city. So, you have this opportunity to work with an extraordinary group of young
    people. And the school itself has this history of political activism and engagement. That's a part of the culture. So
    I think that's what attracts a lot of us who work at Franklin and work so hard at Franklin to continue doing that. My
    average day before the pandemic was waking up at like six o'clock in the morning, doing stuff around my house, getting
    my son who's nine ready to go, being with my husband, all that stuff. And then we would go and I walk and I drop my son
    off at Kimball. I live on North Beacon Hill and I go on, walk down to Franklin, or when it's raining my husband would
    drop us off. But I get to school and kind of hit the ground running at school. And I love being activities coordinator.
    You get to engage with kids, and they come to you with all kinds of amazing and crazy and sometimes stressful situations.
    But it's very active, you don'tknow what's going to happen and what's going on with them. But I love planning and coordinating
    with them and working with teenagers and just helping them understand the framework so they can use their own agency to
    organize and make things happen and seeing that come to life is a big deal. So half of my day is spent working to help
    make those activities happen and working with the students to build that. And the other half of my day, I am teaching
    Advanced Placement Human Geography. And our goal is to create global citizens so I have a great time there. So it's a
    mixture of teaching, but then planning activities, working with student leaders, kids in clubs and stuff that - they're
    trying to organize all their projects. And, like a lot of teachers, school might end at - officially at 4:10 - contract
    hours end - But most of us just keep on working. (/a ughs) So typically, I would have been there in the afternoon, connecting
    with my colleagues, connecting with students, grading until I would go and pick up my own kiddo and come home, and dinner,
    kinda just collapse in the bed, right? We go hard, teachers. I do. So, yeah.
- speaker: Interviewer
  text: My father's an elementary school teacher. So I saw the other side of that, and I really appreciate your sharing that
    scope. Thank you.
- speaker: Interviewer
  text: I was wondering if you could talk about the specific ways in which-- First of all, I wanted to double check that you
    are designated a frontline or essential worker by the Washington Governor's "Stay Home, Stay Healthy Order"? Were you
    - for teachers?
- speaker: Respondent
  text: I don'tthink that teachers were. I don'tknow that teachers were, but there was this issue about when teachers would
    come back - what was happening with schools. You know, teachers - we are essential, but our work can also be done virtually,
    which we're doing right now. So, I can'trecall the exact - when the Governor designated that or not, but I do think that--
    I mean, I think it's an in teresting term to have for anybody for being an essential worker. And sometimes it would seem
    that it's a euphemism for being expendable, and that's curious, too. But--
- speaker: Interviewer
  text: Can you talk about the ways in which your work was disrupted or has been disrupted by the pandemic?
- speaker: Respondent
  text: 'Oh, yes. I mean, we work with students who are oftentimes under extraordinary stressors already. And when we-- I''ve
    never been more passionate about our city in vesting in city wide broadband internet until this happened, and you realized
    - It should not, I believe, had taken a pandemic for a city like Seattle to make sure its students all had laptops, or
    had connections to in ternet or in ternet activity! As teachers, we''re doing stuff and, a lot of times, teachers are
    making a lot of assumptions about what children have access to at home. So this, in some ways, it was a positive disruption
    to bring attention to this problem that had always existed, but was seemingly in surmountable. And we threw everything
    we had at it and I wish we had done that sooner! So figuring out how to get everybody their tech, figuring out how to
    get people internet, to get their hotspots. In particular, with activities, you''re looking at a group of children last
    year who were like: "I''m sorry, you''re not having a prom. I''m sorry, we''re not having a graduation." And there was
    a grieving process with that, that I think all the activities coordinators in Seattle, there''s 10 of us - you''re really
    working hard with these kids and (sighs), you know, that that was happening. So I think sometimes we need to take time
    to pause and look at our mental health and how we''re experiencing things and what''s going on. And what I like seeing
    is that, increasingly, teachers are being able to build more time into building these relationships with students. So,
    in some ways, the pandemic disrupted this kind of rigid grind culture of doing all this stuff, and has allowed some time
    for us to authentically engage with kids, and connect with them on this level. So, the disruptions have been problematic,
    but I think they also present us with a lot of opportunities.'
- speaker: Interviewer
  text: You were mentioning some of the aspects of the way in which a technology gap can recreate some of the in equities
    of so ciety. Do you know of some of the strategies that your students have used to try to get access to Wi Fi or the technology
    that they need to attend their classes, and what some of the stories that you've heard were?
- speaker: Respondent
  text: Yeah, we have an in credible group of my colleagues who are working with students and are doing home visits and connecting
    with them. So students connect with us, let us know they need a hotspot, or they need help. We had s
