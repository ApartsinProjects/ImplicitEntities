turns:
- speaker: Interviewer
  text: So what is your occupation or profession?
- speaker: Respondent
  text: I work for Service Employees International Union 1199 Northwest, which is a healthcare local, and my current title
    is Racial Justice and Education Director.
- speaker: Interviewer
  text: How long have you been a member of your union?
- speaker: Respondent
  text: I have worked at the Union for 11 years at this time, and I worked for the Union for about three to four years earlier
    in my career.
- speaker: Interviewer
  text: Alright, and can you run me through a typical day at work before the pandemic from the time you woke up to the time
    you went to bed?
- speaker: Respondent
  text: Sure, um, it's a little bit hard to remember. [laughs] But, I usually would get up and leave the house around either
    7 or 8am. And I would typically drive to either one of the local hospitals that we work with or to our office, which is
    in Renton. And, you know, sometimes I had meetings in other locations as well, but I would usually have in person meetings
    first thing in morning, and would be in meetings in different locations all day, and usually would get home sometime between
    6 and 7pm.
- speaker: Interviewer
  text: And how has your work been impacted or disrupted by the pandemic?
- speaker: Respondent
  text: Well, I would say that, it's -it's changed a lot. Um, I, we're pretty much solely from home at this point, I have
    done a few meetings here and there. But mostly at home on Zoom, or on phone calls. And I would say that my days are pretty
    packed from usually my first meeting is like 8am. And until usually into the evening. And one of the big things that I
    do is do workshops. And so one of the things that I really had to figure out was how to conduct workshops online on Zoom.
    And so I use a lot of Google Slides and other sort of mixed media online, to conduct workshops now, whereas before the
    pandemic, we would use a lot of big paper, or we would, you know, print a lot of things out, and now everything is just
    electronic.
- speaker: Interviewer
  text: And would you mind telling me a bit more about these workshops, and especially their content, and what they may have
    to do with issues in the workplace?
- speaker: Respondent
  text: Yeah, so, I am, or, I have been responsible for the sort of education and training of members and staff and actually,
    through the pandemic, my role in the Union change somewhat, as well. But, so a lot of what I'm focused on particularly
    now is connected to racial justice, which, within our union, we're applying a racial justice lens to everything that we're
    doing. And so, I have a lot of responsibility for helping to develop our racial justice analysis, and then bring that
    into all of the different pieces of work that we might do. So, the workshops that we do are anything from sort of beginning
    level of analysis of understanding about race and racism and racial justice, to more, you know, sort of complex things.
    I would say one of the biggest workshops that we really had to revamp during the pandemic was for our delegates. So leaders
    in the workplace when they're identified, and then tested, organizers then have a conversation with them about stepping
    into their leadership and into a leadership role, which is called Becoming a delegate. And so when leaders commit to become
    leaders of the Union, they go through our initial delegate workshop. Before the pandemic, it was an eight hour workshop
    that was conducted in person. And because we represent members from all across the state, people would drive or fly into
    Renton to come together for this workshop. So since the pandemic, we've broken it up into a three part series, that is
    all online. So in some ways, you know, it's more accessible for some of the members because they don't have to fly or
    drive and they can just log on to their computer. And we also have members now in Montana, so that's, you know, pretty,
    pretty awesome for people to be able to join together online on zoom in a workshop. So our initial delegate workshop we
    had to do think about, okay, so if we're gonna separate this into three different chunks, how do we need to make sure
    that we're starting and ending each of the chunks so that it, you know, make sense. And one of the hardest parts of what
    we had to redo was actually connected to our racial justice work, there was a basic workshop that was called the inequality
    exercise. And when we were in person, we would, we had these, like paper bags that we would put candy in. And we would
    pass out the paper bags, and it would simulate sort of inequality amongst people. And we've not been able to find a really
    great way of replicating that activity, because, you know, people don't can't like have something physical in that way.
    And so we've tried a few different exercises. And it's been interesting to sort of see the differences of how people are
    grasping some of the concepts around inequality differently, being in a zoom format, and not being able to do this one
    activity that we used to do. And I could go on and on and on about workshops, if there's more, you want me to tell you
    about it?
- speaker: Interviewer
  text: Yeah, and following up on that, since you're an organizer, I was just wondering, what changes what major changes,
    you would say, has the pandemic brought on the workplaces that you work with?
- speaker: Respondent
  text: So, [? Inaudible ?] health care workers. And so the pandemic has really, really impacted our workforce in pretty major
    ways. You know, since the beginning, people just had to show up and do everything that was required and needed to be able
    to support sort of the crush on the healthcare system. And, you know, I remember in the beginning, it was really scary,
    because there were no clear protocols in place for how to protect workers, what to do, how to care for these patients.
    And, you know, in each of our hospitals and healthcare entities, it's been handled really differently. And at the time
    of the beginning of the pandemic I was working with, with members at Swedish Medical Center, we were in the middle of
    bargaining, when all of this happened, and we had to figure out how to finish bargaining the contract. And then we also
    had to help quickly negotiate protections for people. And there was some pretty, you know, crazy things that happened
    in the very beginning. That I could tell you about, that were pretty upsetting in terms of ways in which workers were
    actually getting terminated in and when they were doing things just to try to keep themselves safe. And there's a pretty
    big disparity within the healthcare system. And one of the one of the big things that I have worked on and worked on during
    that bargaining was connected to environmental [? Inaudible ?] workers, which are housekeepers, people who cleaned the
    hospitals. And during COVID, you know, that role is critical. You know, you have to have a clean healthcare facility in
    order to care for patients. And one of the things that our members often talk about is that they're really the frontline
    of infection control. And so, in the beginning of the pandemic, the employer refusing to give a 95 to environmental services
    workers, and we organized and workers stood up to say, we need to have you know, all of the protective PPE to ensure that
    we're safe inside of the hospital. You know, they were having to go into COVID rooms and clean them before it was even
    clear exactly what the protocols should be. And in different facilities people came together and stood up for themselves
    in in those ways and in other places where we aren't as strong, particularly amongst environmental services workers. Um,
    you know, they were just wearing regular surgical masks. And so, you know, what was amazing was that when workers at Swedish
    won the ability to wear a 95, you know, other workers were inspired by that to stand up to say, we all deserve proper
    PPE, not just nurses.
- speaker: Respondent
  text: Oh, is it okay, if I add on? Yeah, um, one of the other things, I think that has been pretty huge, is, I'm figuring
    out how there are incentives for workers to keep working through the pandemic. And so that that's one of the big things
    that we're working on now is organizing memorandums of understanding for incentive pay, and winning it for all workers,
    not just for some workers that the employer views as being more important than others. And, and then, you know, everything
    with the vaccine was also a pretty big deal. And, you know, ensuring that our members were getting the vaccine, and then
    once the mandate was put into place, you know, there was a lot of negotiations that had to happen, and we had to represent
    all of our members, whether people wanted to get vaccinated or not. And, you know, we strongly encouraged people to become
    vaccinated, working in the healthcare facility, but we also had to represent people who, you know, had religious exemptions,
    or, you know, flat out refuse to get vaccinated.
- speaker: Interviewer
  text: And following up on the points you made, I was wondering, you know, based on what you've seen, how has the pandemic
    impacted the labor movement, either in general, or locally, in your union, or in the workplaces that you work with?
- speaker: Respondent
  text: Well, I would say from organizer perspective, we've had to figure out how to keep organizing in ways that are different
    than what we used to do. You know, we used to go sit in hospital cafeterias, you know, go and talk to workers in the workplace.
    And, you know, we've had to figure out workarounds, whether it's, you know, meeting via zoom or phone calls, meeting outside
    the building, doing quick pap handoffs to keep ourselves safe. And I would say that, you know, that's been a pretty big
    challenge. And I would say that the pandemic has required, you know, unions to be responsive to the membership, because
    people have huge needs at this time. And I would say that, my hope is that workers see why a union is needed. Now, more
    than ever, that by having a strong union is really the only ability that you have to negotiate something in terms of protections
    in terms of getting, you know, the compensation and other things that people deserve working through this pandemic. And,
    you know, we saw in this fall, you know, huge amount of strikes taking place, I'm including in my union. And we've continued
    to see -- workers organizing throughout this time, you know, exciting over the semester, seeing workers at Amazon and
    Starbucks, and the other industries organizing and standing up for what they need. And so I think that that's really exciting.
    I think in terms of our labor movement, we have really had to figure out how to ensure that the union is being responsive
    to what folks need now. One of the things that we organized through a pala both locally and nationally. Were spaces for
    people to come together to both talk about what was going on with a pandemic, but also some of the, you know, anti Asian
    xenophobia that's been going on over the past couple of years. Which, you know, obviously, there's been, you know, the
    rise in Black Lives Matter and organizing around racism and racial justice. That, um, you know, we've also had to figure
    out how we join in those efforts and stand up for black lives, as well, as I'm organized to say, you know, there's actually
    something specific happening right now to -to Asian Americans. Um, you know, in the beginning of the pandemic Trump talking
    about the Wu pan flu, there's definitely, you know, a specific impact on Asian Americans in the United States and elsewhere,
    because of that, um, and, and I even had an experience with that myself here in Seattle, just walking down the street.
- speaker: Interviewer
  text: Anti Asian hate is definitely a big topic during the pandemic, and many people have been impacted. So, I would like
    to, if you're comfortable sharing, I like to hear more about your own experience with anti-Asian hate.
- speaker: Respondent
  text: You want me to adjust with the sun being weird?
- speaker: Interviewer
  text: I think it's fine as it is.
- speaker: Respondent
  text: Um, so I, this was actually, at the end of January of 2020. I was walking down the street in Seattle on Broadway.
    I had just gotten some coffees or maybe I was going to get the coffee. I can't remember I was getting coffee. [laughs]
    And I, you know, it was before people were being told to wear masks, and, um, I had gotten some coffee, and I was walking
    down the street and these two guys walked past me. And, um, they started yelling at me to wear a mask to put on a mask.
    And I was like, "what, what, what didn't you say?" And they were like, "Yeah, I said it, put on a mask!" And I was like,
    Whoa, you know, and I, I was so startled because, you know, I had never had that experience before, like having some random
    people like screaming at me on the street. And I was like, What the heck uh, I guess it's because I'm Asian. And I think
    they muttered something under their breath to like, you know, a racial slur. I can't totally remember. But I think that
    that occurred. And, um, and I was just really shaken up, you know, and I got in the car, and I called my husband and I
    was like, Oh, my God, you know, this just happened to me, I can't believe this. And I've heard, you know, other stories
    of colleagues of mine, you know, having similar experiences. I was actually on a conference call with one of our fellow
    SEIU (Service Employees International Union) API (Asian American Pacific Islander Caucus) leaders in the Bay Area. And
    he was on the BART ( Bay Area Rapid Transit) and he was getting harassed while they were on the phone with him. And so,
    you know, all of those things were really scary. And then when the, you know, nail nail salon shootings happened in Georgia,
    um, we were, you know, really rattled. And we, we started organizing, you know, some specific spaces for people to be
    able to come together and talk about that. And Seattle lapolla also designed a workshop to be able to bring to unions
    to help people understand sort of the historical nature of what what is happening, and that anti Asian hates, you know,
    has been a part of, you know, the fabric of racism in this country and has particularly spiked, you know, during, um,
    you know, certain pandemics like the yellow fever and you know, other things like that.
