collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you talk about what social, political, ethnic, racial, or religious communities you regularly connect with or
    participate in?
- speaker: Respondent
  text: I'm a member of the Seattle Chapter of the Asian Pacific American Labor Alliance [APALA]. And also I'm active in my
    union, which does political activities. And that's sort of my main group affiliation.
- speaker: Interviewer
  text: And where do you live now?
- speaker: Respondent
  text: In the north part of Seattle.
- speaker: Interviewer
  text: Can you tell me what is your occupation or profession?
- speaker: Respondent
  text: I work at the Post Office [United States Postal Service], my job title is Lead Clerk. And I've done that for a long
    time.
- speaker: Interviewer
  text: So how long have you been employed as a lead clerk? Or how long have you been employed in your industry?
- speaker: Respondent
  text: I've worked for the Post Office since 1986. And I've been a lead clerk for the last three and a half years.
- speaker: Interviewer
  text: And how long have you been a member of APALA?
- speaker: Respondent
  text: APALA, since probably around, somewhat right after it was formed around 1998 I would guess. I'm not exact on that.
    But it's been at least 20 years.
- speaker: Interviewer
  text: And are you also a member of the American Postal Workers Union [APWU]?
- speaker: Respondent
  text: Yes, I've been a member of that since I started working in the Post Office in 1986.
- speaker: Interviewer
  text: And have you served in any offices within the union? Do you remember?
- speaker: Respondent
  text: I have. Currently I'm the vice president of my union local and also steward. And in the past, I've been assistant
    craft director, and legislative director, as well as sergeant at arms for briefly.
- speaker: Interviewer
  text: All right. Thank you. Now, can you run me through a typical day at work before the pandemic, from the time you woke
    up to the time you went to bed?
- speaker: Respondent
  text: Well, I get up, have breakfast, get ready for work. It's not too far away. My wife usually drops me off there in the
    morning, that's when I start. And I usually go in and assess the situation and move empty equipment around, set things
    up for the day. See what the staffing is at the window. And then usually I'll work on the window for a good chunk of the
    day as a retail clerk, sort of selling stamps to people, helping them ship packages, answering questions, that sort of
    thing. But also as lead clerk, I'm sort of directing traffic as far as who goes to break next and who goes to lunch. And
    we have dispatches of mail three times a day. So we have to sort of get things labeled and organized and sorted out in
    various containers to put out on our loading dock. And for those three times a day, we push out containers, four or five
    containers for the first couple of dispatches, at the end of the day, all the mail gets pushed out in various store locations,
    including mail with the carriers and brought back. So that's an important part of the job, getting the mail out of the
    post office as well as accepting packages, and items that people have already printed their postage for, which they drop
    off at our counter. And it's generally a fair amount of that, especially recently. So at the end of the day, of doing
    those sorts of things, I'm lead clerk. So when we close for the day, then everybody has to count their cash and checks
    and turn them in and I have to count them and assemble all that and put it in a special registered bag for depositing
    the bank. And then I have to go out into the lobby and sort of clean up the mess customers have made and stock the lobby
    for the next morning. And also do some sort of administrative work after, do timekeeping, and do some reports, and then
    set things up for the next day. And then if I'm the last person in the building, which happens sometimes, I'll have to
    lock things up and set the alarm, close a couple of gates, chain some doors, and then head on home. And then when I get
    home, usually I--first thing I do is unpack my lunch and start making lunch for the next day, and then maybe chill out
    reading the newspaper, shower, go to bed and then repeat.
- speaker: Interviewer
  text: And just to clarify, were you designated a frontline or essential worker by the Washington governor's stay home stay
    healthy order?
- speaker: Respondent
  text: Yes, we were designated as essential workers.
- speaker: Interviewer
  text: How would you say your work has been impacted or disrupted by the COVID-19 pandemic?
- speaker: Respondent
  text: Well, especially because we were dealing with the public, it changed a lot of the dynamics of interacting with customers.
    So from early on in the pandemic, everyone was required to wear masks, we started requiring customers to wear masks if
    they were coming in. And there were markers put on the floor so that people would social distance. So customers in the
    lobby were spaced in certain spaces. And then we were also opening our doors to the outside air to help with ventilation.
    So there are two sets of double doors leading into our lobby. So since early on in the pandemic, we've had to keep both
    sets of doors open, regardless of the weather, whether it was really hot, or really cold. And our air conditioning or
    heating hasn't always worked, so it led to some very cold environments inside. But we sort of accepted that as the price
    of, you know, maintaining a healthy environment. At some point last year, in 2020, they put up plexiglass shields through
    spit guards between us and the customers that were hanging service protection. And then they also put in a plexiglass
    shield in between workstations later on. So that, you know, we weren't six feet or more apart from our co-workers until,
    you know, and there was no protection until they put in those shields between us. And so they've also done away with,
    I guess, congregating in the break room, so there's no big get-together lunches. And we used to have a holiday tradition
    of having a big--actually, they would have two Thanksgiving meals every year, because people have different days off.
    So the people who missed it the first time, they would do like another Thanksgiving, and there were people who would throw
    some money into a pot and some dishes were bought, or people would bring in their dishes they made at home, and the same
    at Christmas time. And those were both canceled last year and this year because of the pandemic. And because we're not
    encouraging people to share food, of course. So when we go into the break room, we're allowed to take our masks off when
    we're eating, of course. But generally, people sit apart, there's only three tables in the break room. So there might
    be three people in there. Recently, I've seen more people sitting at the same table. And also early on in the pandemic,
    people weren't quite as good at following the distancing precautions until, you know, everybody kind of got used to it.
    So those are some changes that were made. Yeah, I guess that's what comes to mind readily.
