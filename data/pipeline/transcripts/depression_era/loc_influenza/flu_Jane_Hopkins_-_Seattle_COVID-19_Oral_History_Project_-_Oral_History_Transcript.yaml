collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: What gender if any, do you identify as and what are your pronouns?
- speaker: Respondent
  text: I'm a female. And she/her.
- speaker: Interviewer
  text: What race or ethnicity do you identify as and how important is your racial ethnic background to you?
- speaker: Respondent
  text: I am Black. And it's very important to me because I am a woman of color. And that's who I am. So I can't - you know
    - That's just who I am.
- speaker: Interviewer
  text: Can you talk about what social, political, ethnic, racial or religious communities you regularly connect with or participate
    in?
- speaker: Respondent
  text: I work a lot in the labor movement, as well. And I spend a lot of time with my African family.
- speaker: Interviewer
  text: Where do you live now?
- speaker: Respondent
  text: Snohomish, Washington.
- speaker: Interviewer
  text: Now we'll move on to questions about occupational information. So what is your occupation or profession?
- speaker: Respondent
  text: Could you repeat that again? Sorry.
- speaker: Interviewer
  text: What is your occupation or profession?
- speaker: Respondent
  text: The Executive Vice President of SEIU Healthcare 1199 Northwest. I am also a registered nurse.
- speaker: Interviewer
  text: How long have you been employed as a registered nurse? And how long have you been employed in SEIU 1199 Northwest?
- speaker: Respondent
  text: I have been a nurse for 21 years, and I have been employed at SEIU 1199 since 2000.
- speaker: Interviewer
  text: How long have you been a member of SEIU 1199 Northwest?
- speaker: Respondent
  text: Since 2000. 21 years.
- speaker: Interviewer
  text: So can you run me through a typical day in your life before the pandemic from the time you woke up to the time you
    went to bed?
- speaker: Respondent
  text: Well, I spent a lot of time in meetings, but I spent a lot of time really working on what our members need, as we
    are a union and really working with different members of the union to make life better for our members, whether it is
    to address grievances, whether it's really meeting with members that work directly with organizers that work directly
    with members to make sure that they have what they need every day. So it's really what I do all day, every day.
- speaker: Interviewer
  text: And how has your work been impacted or disrupted by the pandemic?
- speaker: Respondent
  text: I would say it's not been disrupted, what it's done is just - I'm just doing more and during the pandemic, our members
    need more research, more resources, more information, what is needed for them so that they can safely look after patients
    every day. So I would say the work is just multiplied since the pandemic, especially at the beginning, when COVID started,
    because our members didn't know what was going to happen to them, did not know what was going to happen to their jobs,
    did not know what's going to happen to how to care for patients, did not know if they're going to have the equipment they
    needed to be able to give good care. And how they're going to look after people knowing that they might get COVID and
    have to take that home to their families every day. So it was a very stressful time for members and, as a union, needed
    to be there to help them navigate through this horrible time that they've had to go through in the two years.
- speaker: Interviewer
  text: Would you mind elaborating a bit more on the specific resources or needs of the union members, which has been really
    influenced by the toll the pandemic has taken on health care workers?
- speaker: Respondent
  text: It has, at the beginning of the pandemic, there was the CDC was the body that really told healthcare workers the standards
    that needed to happen, and it was really difficult at the beginning of the pandemic, when all of a sudden we knew as a
    union, we knew that our members knew that this virus was airborne. And there was a lot of - We're being told by employers,
    we're being told by government entities, we're being told by the CDC that it was droplets. And if that was the case, the
    way that was needed for us, for the members, for our members was different. It was a droplet, there was a different treatment,
    if there was aerosol, there was different treatment. We continued to fight them, push and tell everyone that we believe
    that this was aerosol, and that our members needed to wear masks, and that was the highest standard, that it didn't matter,
    that even if it was droplets, like they said, even though we believed and knew that it was aerosol, that we always needed
    to give the best protection to every worker. And that meant that every worker needed to have an n95 mask. So there was
    literally this hierarchical environment, in hospitals, and in healthcare fields where people that made the most got the
    best protection and people that made the least got the least protection. Our union represents healthcare workers wall-to-wall
    in a hospital, whether you're a nurse, a nurse practitioner, or you are a housekeeper that's cleaning the rooms, all these
    jobs were important, and everybody needed to be protected the same. And we were pushing very hard that everyone that worked
    in a hospital needed to get n95. That was the biggest piece of work that we did at the beginning. And also what happened
    if our members got COVID? Are they going to be protected? Are they going to be given time off so that they can actually
    stay home and they're going to, or one employer is going to force them to come in when we knew that they were going to,
    when we knew that they were going to have to stay home? Is the employer going to pay for them to stay home, or they have
    to use all through the benefit time for them to stay home. So when there is a catastrophe in their family's life, they
    could not take time off. Because they've used it all on this pandemic. So we worked a lot on that. We worked with government
    entities to see if we can get hotels, for people that are really worried about taking this illness home. Can we get hotel
    rooms for healthcare workers, so that they can go home? They can stay the night, they don't have to worry about taking
    their families home while working on transportation, making sure that they get free transportation, making sure that they
    have free parking. We thought we worked on making sure that everybody knew the information that we had like, immediately,
    right didn't wait. You know, it was like live yielding information about all the things that we knew about the pandemic,
    all the resources that we had, all the places that people can go for help when they needed a pandemic, you know, when
    they needed help. We knew that staffing was going to be an issue. So we have been fighting and working really hard to
    make sure that hospitals are going to be well staffed. So there are a lot of things that we need to do even after two
    years to make sure that workers are safe, that workers are being heard in this pandemic so that they can have what they
    need. We worked a lot in the past few months, we'll be working on mental health. Our members are traumatized. They've
    got PTSD, watching people die every day. And what are we doing? What are employers doing? What is the government doing
    to help them feel so that they can deal so that they can deal with the trauma that this pandemic is causing to their mental
    health? That's a lot.
- speaker: Interviewer
  text: If you're comfortable sharing more, are there any specific actions that you or your union took to address the issue
    of mental health?
- speaker: Respondent
  text: 'We had a couple of town halls where we talked about where we had experts come in, and tried and worked with-, tell
    people what they needed to do. We also have worked with our members to work with employers to make it easier for people
    to have access to counseling. It''s still a problem, still an issue. And also, we really wanted to make sure that employers
    gave people rest days so that they can take vacation days, and that has still been - That''s been a biggest problem: because
    of short staffing people have never been able to take time off. So although we''ve done some work, there''s still so much
    more to do to help with the mental health of our healthcare workers, and all they''ve done and how we can make sure that
    they can survive this pandemic and continue to stay in the healthcare field after this is over.'
- speaker: Interviewer
  text: Earlier, you also mentioned that your employer did not provide n95 masks at first. So I would like to know more about
    how you and your union organized to work toward healthier workers having n95 masks for even the lowest paid workers.
- speaker: Respondent
  text: We took several avenues because we knew that it was going to take a lot for the public to be aware, and to get our
    members the right masks that they needed. So we went to the legislature, we talked to the governor, we talked to all these
    political people. We had Joint Labor Management Committee meetings with employers and asked for n95s. We then had to take
    actions as workers. So there were a lot of times where, right at the beginning, we're doing massive actions when workers
    will do actions outside the workplace where they say, "I need my n95s." So we did all that. And also, we were able to
    get mask donations from the public. But mainly, it was really the workers standing together as a union making this huge
    cry, that, you want us to look up to you? We need to be safe, and we need to make sure that we have the right masks."
    So the workers were out there outside of the facility saying "we need masks." And the public had to hear. I know that
    there wasn't enough and they had to really work very hard to increase the production for masks, but if our members hadn't
    stood up as unions, and we didn't have the avenues that we had, more healthcare workers would have died from this virus.
    Another thing that I was really proud of for this work is the fact that racial justice was so important that we could
    see that this pandemic had really shown that people of color, especially people of color that had low paying jobs, were
    the ones that got the resources last. And we were able, as a union, to really bring to the surface and let people see
    how racism are showing up even at this time of the pandemic and where they would say, "The housekeeper who goes in a room
    to clean the room does not know need an n95, but a nurse does." Right? And that all the information on this virus was
    only done in English, and it was not done in different languages in the hospital. That was not the right thing to do.
    And our members really fought very, very hard to really raise the issue of racism and how we can reduce that by really
    asking the employees to really remember the people that are not being seen, right? To make sure that information has been
    translated so that everyone understands the risks for this illness, and what people need to do to protect themselves.
- speaker: Interviewer
  text: Can you elaborate more on how your union took action to address issues of racial justice or language justice in the
    context of the pandemic?
- speaker: Respondent
  text: We needed to be everywhere, right? We did everything that we did as a union, including our members, because our members,
    this has been for SEIU 1199. And a huge issue was about really working to make every member understand that affects the
    intellect, that racial justice is the only way that we're going to have the best to be able to give the best care to everyone.
    And the way that we could have better unions, right? And so every conversation we had, we were really looking at it through
    that lens, right? Whether we're talking about PPE, whether we're talking about time off, whether we're talking about childcare,
    whether we're talking about information, what are we doing to make sure that we are looking at everything through that
    lens. And I think because we're able to do that, you see that the conversations are really hard, whether it's about people
    getting vaccinated, whether it was about getting masks, it was really who was what are we not looking at? What lens are
    we looking at and what lens - What is that default lens? And how can we make sure that we're not looking through that
    default lens, that we're looking through this racial justice lens, equity lens, so that everybody can have what they need?
- speaker: Interviewer
  text: A wave of protests for the Black Lives Matter Movement emerged during the spring of 2020. And it really serves to
    highlight the racial disparities and people's experience of COVID-19. So what are your thoughts and observations regarding
    this movement?
- speaker: Respondent
  text: I think the Black Lives Matter Movement has been around for a long time. I'm really glad that, you know, it's now
    a slogan that everybody uses. But you know, I think then it became a thing that even corporations that are saying we believe
    in Black Lives Matter, really. But the policies have not changed, right? So I think, yes, it's good that we're talking
    about Black Lives Matter. But the only time that black lives are really going to matter is when we see changes in policy,
    when we see every policy that people are looking at and making sure that we are looking through the lens of black lives.
    I always say to people - because being a black woman having to experience racism, and even being a leader now in the union,
    knowing that our union itself is built on institutional racism. How can we dismantle that, that every institution has
    to dismantle that racism, and every institution needs to dismantle white supremacy. Every. It's all built on that. Even
    the little things that we do, the everyday decisions that we make, are influenced by white supremacy. How, When we look
    at things through the lens of a black person, a black woman, all decisions are better. Because if we look after the people
    that are getting the least, the people that are getting the most will get what they need as well.
- speaker: Interviewer
  text: I wanted to know a bit more of your role as a registered nurse. So I'm assuming you were designated an essential worker
    by the Washington governor's "Stay at Home, Stay Healthy" order. Is this correct?
- speaker: Respondent
  text: Yes, we were
