source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: And then I wonder if you can - this is kind of a funny question, because I'm going to ask you if you could run me
    through a typical day of work before the pandemic. But the funny thing is, I don't know of anybody who has a "typical"
    day to work, but (/a ughs)
- speaker: Respondent
  text: 'My typical day is still the same, it just depends. The only thing that''s changed is, I go to work every day, and
    I''m an essential worker, of course, and I do direct patient care. So, as my job as a CNA, I do vitals, I help do bed
    changes, I transfer patients to and from the bathroom. Basically, I do everyday patient care. I help them bathe, I help
    them do their dailies, but I work graveyard shift. So a lot of it''s at nighttime, so I set them up in the morning, get
    ready for that. And then I''m on the surgical floor. So I do post op stuff. So sometimes we have post op patients that
    I do vitals on, and I have to keep track of, make sure the vitals are kept and make sure the eyes, nose are correct. And
    so my everyday patient care, the only thing that''s changed since the pandemic came in is now we''re having to use PPE
    all the time. And it depends on what kind of patient I have, if I - I already had some kind of isolation patients for
    C. diff, and different things like that where everybody had gone up. Now I have to watch out, we need to watch out for
    the COVID patients because we do get an occasional COVID patient on our floor. And that''s a whole different story with
    the N-95s and the PAPRs and the CAPRs that we use. So that''s how it''s really changed is: It depends on what kind of
    isolation - We''re wearing masks, and we''re wearing eye protection all the time. And now it depends on what kind of isolation
    before you go into rooms. The other thing is, is when we were in Bremerton hospital, we had cohort rooms, so we had two
    people in a room. And now with a new Silverdale Hospital, every room is a private room. And every room has a capability
    of a negative airflow, which is pertinent for the pandemic.'
- speaker: Interviewer
  text: Well, you mentioned some of the ways things have changed, then. Can you think of other ways that your - both your
    work and your personal life has been disrupted or impacted by the pandemic?
- speaker: Respondent
  text: Well, I know that my personal life, my passion is Kitsap County sports, youth sports and everything. And with not
    having been able to do sports right now, it's been really, really hard. The WIAA [Washington Interscholastic Activities
    Association] did - just announced the other day that we're gonna probably go with our high school season. We're gonna
    start with football, it looks like on February 1, possibly. So hopefully, we start getting kids back into school and we
    hopefully will get some youth sports going. Because I think it's really important because with our kids sitting at home
    with just the Zoom kind of stuff for school and all that, I don't think they're getting out and getting physically fit
    like they should be. And it's a real problem.
- speaker: Interviewer
  text: It sounds like you probably were working the whole time because you were designated [an essential] worker. Is that
    correct?
- speaker: Respondent
  text: Yeah, my - During that whole pandemic thing, our hospital came down with an exposure of over like 100 people. So workers
    were out of work. We had like 76 workers that went out. And my floor was one of the ones that were infected, and I ended
    up having to work extra. I'm still - with this pandemic thing going on now - I'm still working extra shifts and everything
    and extra hours because we don't have enough staff to cover because we still have people going out with COVID every so
    often. And with the new hospital, it's hard to get nurses - extra nurses and extra staff, because we used to get travelers
    that come in. But with this pandemic going on travelers are going everywhere, because everybody needs help right now.
- speaker: Interviewer
  text: 'You''ve touched on this: Did you ever feel like your health was in danger or threatened on the job?'
- speaker: Respondent
  text: They tested us when the pandemic came out. And then, I was really sick in February. And so I actually got an antibody
    test probably about three months ago, and it came out positive. So I think before the pandemic came out in February, I
    thought we had flu-like symptoms, but they said it wasn't the flu. But I think I actually had COVID - Well, I definitely
    had COVID at some time because I had the COVID antibodies. And since then, I've actually had - I get tested periodically,
    like every two, three weeks - depends on our floor, and then I did just recently get my second vaccination shot. So I
    am vaccinated now.
- speaker: Interviewer
  text: Oh, congratulations! That's great.
- speaker: Interviewer
  text: Did your employer, were they able to provide personal protective equipment at the beginning of the pandemic?
- speaker: Respondent
  text: So the personal - Yeah, at the beginning, they didn't really. They were kind of hoarding it. And myself and another
    nurse, when this outbreak happened, we actually are the ones that came out on the news against our hospital! I was on
    channel - on all the major news channels and NPR and everything. So I was involved in that whole thing and bringing out
    that, along with Senator Emily Randall came on with us and we went on a press conference with our union. Emily Randall,
    myself and Cindy Frank went on a press conference and we brought knowledge to the people outside the hospital that we
    weren't getting proper PPE. They weren't giving us the proper mask, and we were having to use the same mask over and over
    again kind of thing. And there was a contamination kind of thing going on, and it just wasn't right. So the Health Department,
    Labor and [Industries (L&I)], and everything came into our hospital and they noticed it, and they ended up having to change
    the way things are done. And now we are getting the proper PPE that we need. It took me and another person and coming
    out and saying, "Hey, we're not getting a proper - This is why this is happening." But we finally, in the end, I feel
    more confident for myself and my co-workers that we got the proper PPE from the hospital now.
- speaker: Interviewer
  text: What was the process of you surfacing that issue? Like with the union? How did that evolve?
- speaker: Respondent
  text: So we were actually under contract negotiation at the time for the pro techs. So we were actually working towards
    that and trying to get more PPE. And we were working towards the hospital. So we've already been working with the union
    trying to get more PPE and the hospital said they couldn't get it. So we were working with the Health Department and our
    union was working with it, too. (dogs barking) We're working with different - dentists and stuff that weren't working,
    and we're trying to get their PPE to bring into the hospital to donate it to the hospital. So we already had started the
    whole thing, but then when the pandemic hit, it just made it so it was easier for us to get our word out and, and tell
    our story.
- speaker: Interviewer
  text: Were there any strategies like people bringing their own PPE to work? Or how did y'all get it?
- speaker: Respondent
  text: People were bringing their own masks, we were - because we were allowed to wear regular masks. And then they made
    it so you can't bring your own mask in, you have to use their paper masks. And you had to get your temperature taken.
    Like now, every day when I go into work, now I have to answer a couple questions. They ask me if I've had any symptoms
    or anything, I have to use hand sanitizer in front of the person, put a new mask on. And then there's a thermometer thing
    that you look, your face goes into, and it tells you, "Welcome." And if you don't have your mask on, and you look at the
    thing, it says, "Please put on your mask." It tells you that. So it reads your face and everything, it reads your temperature
    and it tells you that you're good. It tells the person behind the glass that you're good so you can move on with your
    day.
- speaker: Interviewer
  text: How did your work responsibilities change with COVID in terms of all the sanitation and washing hands and wearing
    or not wearing PPE?
- speaker: Respondent
  text: So we're more aggressive on wiping things down. We have a timetable where you're supposed to wipe your area down every
    two hours with these bleach wipe things that they have. We have different kinds of wipes and stuff. So we're wiping down
    our area more, we're wiping down our screens, we're wiping down our computer screens, we try to keep it - So I work graveyard
    shift, there's only limited people. So we like to try to stay on the same computer and everything. So it's your work area.
    So that way, it's more sanitary. And I know that it's me that touched that the last time and I'm using this scanner thing
    so - And then, with my equipment, every time I go into, we try to use the same equipment in each room, if we get enough
    where my vital stuff is in the room and I wipe it down at least twice, three times a shift. There's keyboards that we're
    sharing in there, we wipe them down. As soon as you're done, I wipe it down after I'm done scanning the patient and typing
    in there. But it's gone to where we're more aware of what's going on. And we're cleaning up our areas or cleaning more
    than we would normally.
