collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: The New Year is here. May your lives be filled with peace. May all illness remain far away. May all your desires be
    fulfilled. May all the good things in this world bless you.
- speaker: Respondent
  text: I came to this country because our country was going through some changes resulting in my family having to leave.
    So, we decided to come here. We escaped to Ubon Refugee Camp. We were interviewed and were able to come. We lived in Ubon
    Refugee Camp for 7 or 8 months before we were allowed to resettle to America.
- speaker: Respondent
  text: There was one sponsor, his name was Dr. Jerry. He had opened a clinic in Ubon Refugee Camp. He walked past our house
    and saw the kids playing. He asked, "Where do you want to resettle? Do you want to go to America or France?" I replied,
    "I know French, so I want to go to France." He said, "Don't go. Come stay with me in Rochester." I did not know where
    Rochester was. So, we came with him and resettled in Rochester. We lived there for 16 years. My children all went to school
    there. He took care of us. America helped us.
- speaker: Respondent
  text: Speaking of education, I was a Buddhist monk for 20 years. I had the opportunity to go to Thailand to attend Chulalongkorn
    University for four years. It was 1960.
- speaker: Respondent
  text: 'I currently serve the community. I participate in temple activities. I am a Mor Phone, an officiant. I do it because
    the community needs an officiant. Since I disrobed as a monk, this is all I do. It has been about 30 to 40 years now.
    I am able to do all kinds of ceremonies, about 14 to 15 kinds. For example: a wedding ceremony, blessing the sick, celebrating
    a new job, all sorts of things.'
- speaker: Respondent
  text: I like to write my own blessings. People really appreciate it. For example, the New Year, I do not use old blessings.
    I learned this as I was once an ordained monk. I can change things to compile new meanings. People like it and want to
    use my blessings. It is like poetry. I can write a lot of poems. I like doing this.
- speaker: Respondent
  text: I still go officiate. I am getting old. I would like younger people to go officiate. I teach a few people, 40 to 50
    years old. They now know how to say all the chants. Many old people are dying. There are only two elders left that are
    able to officiate ceremonies. That is the nature of things.
- speaker: Respondent
  text: May you live a long life until you are tired of this world. May you be full of beauty and good spirit. May you have
    happiness. May you have strength that is renown in the world.
