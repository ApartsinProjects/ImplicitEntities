collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My father was born and raised in Naples, Italy in a little town on the coast called Monte Di Procida. He lived there
    all his life with his mother, father, 4 sisters, and 1 brother.
- speaker: Respondent
  text: On September 8, 1987 he decided to travel over to the United States of America with some friends of his. He was 22
    years old at the time and flew from Rome into New York City.
- speaker: Respondent
  text: Upon his arrival him and his friends drove down to Baltimore where they all lived together and my father started his
    first job in a restaurant.
- speaker: Respondent
  text: Throughout the next couple of years in America he moved around Maryland, only leaving once to live in Virginia for
    6 months but soon after he came right back.
- speaker: Respondent
  text: Fast forwarding to 8 years he met my mother in Towson, Maryland. At the time my father was working in a pizza shop
    next to the coffee shop where my mother was working, it was called "Donna's".
- speaker: Respondent
  text: He asked her out several times and after she finally said yes they had their first date on January 11, 1995.
- speaker: Respondent
  text: Five months after their first date they were married, resulting in not only a lifetime of happiness for them both
    but also a green card for my father and the beginning of his residency.
- speaker: Respondent
  text: Before one can become a citizen of the United States one has to be a resident for a certain amount of years.
- speaker: Respondent
  text: There are several ways one can obtain a green card and become a resident of the U.S. First can be through marriage,
    to either a citizen of America or another resident.
- speaker: Respondent
  text: Another way can be through an application process some people call the "lottery", you send in an application for your
    residency and if you are lucky and get chosen you get the green card!
- speaker: Respondent
  text: There are other ways such as a labor contract or an investment deal one can go through but those are not as popular
    of a choice.
- speaker: Respondent
  text: After one becomes a resident and obtains their green card they need to be one for a certain amount of years before
    applying for their citizenship.
- speaker: Respondent
  text: If you become a resident through marriage you only have to wait 3 years but if you become a resident through the "lottery"
    then you have to wait for 5 years.
- speaker: Respondent
  text: Since my father married my mother who was already a citizen of the United States he only had to wait 3 years before
    applying for his citizenship.
- speaker: Respondent
  text: After those 3 years were up he started his long process to become a citizen.
- speaker: Respondent
  text: First, he had to fill out lots of forms and find sponsors. Sponsors are close family friends or relatives who will
    write letters of recommendations for my father vouching for his want to become a citizen.
- speaker: Respondent
  text: Second, he had to go through an interview with an immigration officer that asked him a range of questions ultimately
    trying to find out if his love with my mom was genuine and his want to become a citizen was true.
- speaker: Respondent
  text: Last, my father had to pass a test on America which consisted of around 100 questions about the history, the language,
    and writing and speaking portion as well.
- speaker: Respondent
  text: After my father passed all of that he waited for his date to be sworn in.
- speaker: Respondent
  text: My father's date to be sworn into the United States as a citizen was April 30, 2004 which was my 7th birthday.
- speaker: Respondent
  text: In honor of him becoming a citizen there was United States flag flown over the United States Capitol.
