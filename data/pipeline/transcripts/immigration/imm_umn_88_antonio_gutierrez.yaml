collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: At the age of 16 I was forced to immigrate to California with close family relatives due to my father's death from
    a fatal heart attack.
- speaker: Respondent
  text: I established myself in Hayward, California and attended San Leandro High School.
- speaker: Respondent
  text: During my last year in high school, I decided to join a youth program that encouraged young teens to find careers
    after completing high school.
- speaker: Respondent
  text: I was quickly intrigued by a welding program offered.
- speaker: Respondent
  text: I not only found love in welding but also fell in love with a young woman in the program, Anna Wildman.
- speaker: Respondent
  text: I would do whatever was possible to always catch a glimpse of Anna, as would she.
- speaker: Respondent
  text: We would meet up frequently after school on the school rooftop and watch the sunset together.
- speaker: Respondent
  text: Back then, San Leandro was a Sundown town, meaning it was mostly a white neighborhood encouraged to discriminate against
    non-white races with local laws and sometimes even violence.
- speaker: Respondent
  text: It was extremely dangerous for any people of color to be out in the evening, including me, a Latino man, with a white
    young lady.
- speaker: Respondent
  text: The consequences were very intense but I truly believed Anna Wildman was the love of my life.
- speaker: Respondent
  text: Due to societal disapproval of biracial relationships, we were forced to keep our love for each other a secret.
- speaker: Respondent
  text: After two and a half years of dating, Anna agreed for me to meet her family.
- speaker: Respondent
  text: Anna's parents were let down by our relationship but were willing to approve of me as long as I made Anna truly happy
    and was able to provide for her.
- speaker: Respondent
  text: At the age of 25, after years of hiding our relationship and hard work, we were able to get married and purchase our
    own home with the help of my mother and father's inheritance money.
- speaker: Respondent
  text: I admit the moment of overwhelm when buying my house on the same street I used to run down while the sun was setting,
    fearing for my life, looking side to side.
- speaker: Respondent
  text: That day I promised to never feel belittled by anyone, including the sunset.
- speaker: Respondent
  text: On December 28, 1977, at 3:37 am, Anna Wildman gave birth to our son Antonio Jr.
- speaker: Respondent
  text: Sadly, Anna died while giving birth but I continued to live up to my motto and commemorate every sunset to Anna Wildman.
