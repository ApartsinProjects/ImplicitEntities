- speaker: Respondent
  text: His family became refugees after the civil war in Laos. They spent two and a half years in refugee camps in Thailand,
    undergoing countless medical exams, before finally being resettled in the United States in 1986. He lived in Sacramento,
    CA and College Park, GA before moving to Minnesota, where he grew up. He holds a B.A. in Anthropology and an M.A. in Southeast
    Asian Studies.
