collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Many people associate Anaheim, California with Disney Land but for me Anaheim is this 'other home/family'. Ethnically,
    I am half Filipino and half White. However, I spent almost my entire life being raised by my White mother and know little
    about my Filipino family or culture.
- speaker: Respondent
  text: Although I know little about my Filipino background I still experience life as an 'Asian American.' It doesn't matter
    that the only language I can speak is English because my experiences in life have largely been influenced by how other
    people can physically see me.
- speaker: Respondent
  text: I remember growing up and my kind and loving mother would always be asked if my sister and I were adopted. I think
    people meant well but their curiosity was often misplaced and hurtful.
- speaker: Respondent
  text: Growing up, it was confusing to not know a whole lot about my father's family and Filipino background. Technically,
    I'm a second-generation immigrant because my father came to this country with his parents when he was a young child.
- speaker: Respondent
  text: I did not encounter the same barriers and obstacles in life that other second-generation immigrants might have. However,
    I have encountered some of the more negative stereotypes that affect Asian Americans such as the racist jokes and stereotyping.
- speaker: Respondent
  text: While I endured these experiences I was always left wondering that maybe if I knew more about my Filipino background
    that maybe I wouldn't feel the same.
- speaker: Respondent
  text: I love my beautiful mother but there are some things that she cannot understand.
- speaker: Respondent
  text: 'A few of the memories I have of my family in California are: the holiday cards I would receive for Christmas or my
    birthday. My father''s side of the family practices Catholicism and takes their beliefs very seriously.'
- speaker: Respondent
  text: My sister and I still receive cards that have Bible verses written on the card or inside of the card.
- speaker: Respondent
  text: I am very thankful for both sides of my family who have both taught me very different but both equally important ideas.
- speaker: Respondent
  text: This picture of my sister and I represents the emotional and spiritual journey that we have taken together. The photo
    also celebrates the unique challenges and success of my biracial family.
- speaker: Respondent
  text: I believe that growing up as Filipino and White person has given me a personal sense of strength and power.
- speaker: Respondent
  text: I think it's important to continue to encourage and inspire other biracial people to explore their unique ethnic background.
