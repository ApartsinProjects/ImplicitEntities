collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: When my great, great, great grandfather William Orr left Northern Ireland for America in 1837 he was but 12 years
    of age. He remembered, "The home leaving was a sorrowful one, and the journey on foot, too, for our good neighbors accompanied
    us for miles, turning back as they grew tired, crying and saying 'the Lord have mercy on you and guard your soul, we will
    never see you again,' which proved true, as none of us ever returned to our childhood home where tho' poor and humble,
    we spent the happiest days of our life."
- speaker: Respondent
  text: He ended up in Watkins, N.Y. where his love of home and family always came first. He recalled one such prank. "I was
    young for the work which my master required of me-hoeing potatoes- and in the afternoon of the first day, tired and warm
    and feet hurting, I planned a way of escape. I took off my shoes and purposely left them in the potato patch, then after
    supper, told the man I had to go out and get them. I grabbed them and ran as hard as I could home and never went back."
- speaker: Respondent
  text: Eventually he became "bound out" to a Reverend Rolette, a minister and farmer. He was able to negotiate schooling
    every winter, which aided him in later years becoming a teacher. He even taught eventual Speaker of the House of Representatives
    David B. Benderson.
- speaker: Respondent
  text: But what he remembered most was, "how the Reverend got a day behind in his calculations because of a holiday, and
    one Sunday A. M. he ordered us out to work, and we went, thinking it a great joke. Soon church bells began to ring, the
    people drove by looking and wondering at the person working on the Sabbath. Finally we told him why the bells were ringing
    (for church) and he was so humiliated he never preached again. My family and I laughed about it every Sunday thereafter."
- speaker: Respondent
  text: Although he came from very little, he truly embodied the American spirit and made his a story of success, focused
    on family. And he began a family that still exists today.
- speaker: Respondent
  text: My favorite memory of his was how his siblings and he would question his mother about the Bible, which she read to
    them along with Irish folk-lore, fairy tales, and superstitions. "I recall, how in answer to our questioning, she told
    us heaven could be seen from the tops of the sycamore trees (in our yard). We nearly broke our necks climbing to the topmost
    limb and then were disappointed."
- speaker: Respondent
  text: I love the image of my ancestor, full of hope only a child can possess, rushing from their humble abode to climb and
    see heaven. I think that resolve to learn, to see, to discover aided him in forging a life in America, and his legacy
    lives on today in family.
