collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Francisco Guzman Llamas es mi padre y es encargado de proveer y pagar todo lo que se ocupa en la casa. Angelica Gonzalez
    Duran es mi madre y ayuda a mi padre y a mi y mis hermanos. Elda Guzman Gonzalez es mi hermana y estudia en la universidad.
    A Elda le encanta salir en familia para conversar. Michael Guzman Gonzalez es mi hermano menor y va a Garden City Elementary
    School. A Michael le encanta futbol como a mí y nosotros jugamos en unos equipos. Eso es un poco de lo que es mi familia
    que amo tanto. Mi mamá y papá son del mismo pueblo y ahí se conocieron. Yo y mis hermanos nos conocimos a nuestros papás
    cuando nacimos. Mi familia ha vivido en México y Minnesota. Siempre hemos vivido juntos. En México vivíamos a gusto pero
    no había muchas oportunidades de trabajo y por eso tuvimos que emigrar a Minnesota buscando una mejor vida. Yo solo viví
    un año en México y el resto en Minnesota. Mi hermana Elda solo vivió tres años en México y el resto en Minnesota. Mi hermano
    Michael ha vivido en Minnesota por toda su vida. Cuando hemos salido todos juntos de paseo a diferentes partes nos hemos
    sentido muy a gusto y contentos porque nos hemos divertido mucho y sentir más cerca a cada uno. Mis padres nos han compartido
    a mis hermanos y a mí la experiencia cuando nacimos y que fue algo maravilloso. Mis hermanos y yo aprendiendo experiencias
    nuevas como los cambios de escuelas y aprendiendo más culturas y conociendo más personas. Mis padres adaptándose a la
    vida de aquí en los Estados Unidos. Que somos una familia con altas y bajas pero que hemos ido superándolas. Somos una
    familia diversa porque a pesar que somos familia pensamos diferentes maneras. Somos una familia imperfecta pero tratamos
    de ser unida.
