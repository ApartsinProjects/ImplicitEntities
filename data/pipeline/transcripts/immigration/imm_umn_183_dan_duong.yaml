collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Dan Duong, and this is my immigrant story. While growing up in Vietnam, my dad had worked for VietNam Electricity
    Company (EVN), which is the only company that provides electricity-related services to the country. Because EVN is so
    large and they have such high demand for more workers, the company established its own university, which is the Electric
    Power University (EPU) to train students with skills they could bring to their future careers related to electricity.
- speaker: Respondent
  text: The realistic path for me after graduating high school in 2010 was to attend EPU, graduate after four years, and become
    employed for EVN because my dad had worked there for so long so that EVN would've given me a preferred admission into
    EPU as well as a lot of financial aid and a greater chance at being hired into their business.
- speaker: Respondent
  text: For financial reasons and because this was a relatively easy route for me, my parents wanted me to go in this direction,
    but I hated the education system in Vietnam. I hated how my high school was run, and my friends in college told me that
    I would not have the right to choose what I want to study in college.
- speaker: Respondent
  text: Also, I know that if my family and I stayed in Vietnam, I would've for sure given up my passion for piano during college.
- speaker: Respondent
  text: On the other hand, the media and my family in America told me that my future would be bright in the U.S. So, when
    I was told that I had the chance to go to the States, my first thought was, like, Oh, I'm going to Berklee College of
    Music in Boston! That was my first thought, like, Okay, my dream is coming true!
- speaker: Respondent
  text: Because I dreamed of a better future, where I could have some say in what my career would be, and because I wanted
    the same opportunity for my sister, I convinced my parents that we needed to leave Vietnam.
- speaker: Respondent
  text: A few months after I turned 18, my family and I moved to Boston for a little while before settling in La Crosse, Wisconsin.
- speaker: Respondent
  text: My aunt, who sponsored us, decided that it would be best for me to learn the English language and the American culture
    by repeating high school.
- speaker: Respondent
  text: It was frustrating at the time because, as a high school student who was four years older than my classmates, I didn't
    like how immature everyone was, and it was hard for me to communicate because everyone around me could only speak English,
    and I didn't speak any English.
- speaker: Respondent
  text: It was also frustrating at home because my grandpa didn't understand why I had to repeat all four years of high school
    in America because I was such a good student back in Vietnam, so he would question why it was taking me so long to graduate.
- speaker: Respondent
  text: Thankfully, toward the end of high school, I gained some confidence in my English and so school became more enjoyable.
- speaker: Respondent
  text: Finally, I was able to graduate with the class of 2014.
- speaker: Respondent
  text: Now, I'm studying Mathematical Biology at the University of Minnesota-Twin Cities, with the hope to become an orthodontist.
- speaker: Respondent
  text: As a young girl in Vietnam, I never would've thought that this would be my career choice because I was never given
    a choice when it came to careers, but I had the determination to chase my dream of a better future.
- speaker: Respondent
  text: Step by step, I'm on my way to achieving my goal now.
