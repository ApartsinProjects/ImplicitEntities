collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Guatemala and lived there for 18 years. I had a beautiful childhood, but living with my single mother
    and two siblings plus being a low-income family drove us to immigrate to the United States.
- speaker: Respondent
  text: The trip was a bit difficult for me because I was so young and I left a part of my family in my country not knowing
    when I would return.
- speaker: Respondent
  text: When I arrived in the United States, I was reunited with my uncles, cousins and others who were waiting for me.
- speaker: Respondent
  text: The change was drastic and it was not easy despite the help of my family members. Integrating into a new culture,
    community and a new language was not easy, especially the language barrier.
- speaker: Respondent
  text: However, with perseverance and effort everything can be done. I managed to adapt to a new country and all the changes
    that come with it.
- speaker: Respondent
  text: The people who have definitely influenced my life are my mother, my wife and my children. They have been my greatest
    influence and have impacted my life in a positive way.
- speaker: Respondent
  text: Thanks to them I have learned to become a better person and they have encouraged me to continue in everything I have
    set out to do since I arrived to the United States.
- speaker: Respondent
  text: Without a doubt, one of the experiences that influenced me the most was the drastic change of residence.
- speaker: Respondent
  text: The drastic change of residence affected me in a positive way because due to the circumstances I was fortunate enough
    to be able to expand my horizons.
- speaker: Respondent
  text: I learned about the diversity of different ethnic groups and their many traditions and different ways of living.
- speaker: Respondent
  text: It has been a unique experience and has taught me a lot.
- speaker: Respondent
  text: Sharing my story allows others to know about myself and the struggles that I went through.
- speaker: Respondent
  text: I want others to see and cherish the opportunities that this country has to offer.
- speaker: Respondent
  text: As an immigrant I want to be an example for younger people to pursue their dreams and for them to become an example
    for the next generation to come.
- speaker: Respondent
  text: No matter the circumstances that you may find yourself in, always be positive.
- speaker: Respondent
  text: I think that the key to survival is to always have respect for others regardless of their age, appearance or color.
- speaker: Respondent
  text: All we need is love.
