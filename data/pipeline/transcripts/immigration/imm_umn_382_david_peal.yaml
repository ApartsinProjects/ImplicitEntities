collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about where you were born and your early life?
- speaker: Respondent
  text: I was born on the West Coast of Africa. I moved to the U.S. because of a civil war in my country.
- speaker: Interviewer
  text: What was it like growing up after you moved to the U.S.?
- speaker: Respondent
  text: I grew up in Massachusetts. It was a big change from where I was born, but I adapted over time.
- speaker: Interviewer
  text: Where did you go to college?
- speaker: Respondent
  text: I attended Gustavus Adolphus College.
- speaker: Interviewer
  text: How do you reflect on your successes so far?
- speaker: Respondent
  text: I feel grateful for the opportunities I've had. Moving here was difficult, but it opened many doors for me.
