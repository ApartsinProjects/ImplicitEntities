collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I grew up in Tijuana, Mexico, in a big family but a small house. It was always noisy with people coming and going.
    We didn't have much money, so we couldn't afford a bigger place.
- speaker: Interviewer
  text: What were your dreams growing up?
- speaker: Respondent
  text: I had a passion for horses. I started learning how to train them and dreamed of owning my own horse track one day
    to train and sell horses for a living. I was really good at it and knew it was what I wanted to do.
- speaker: Interviewer
  text: Did you get to pursue that dream?
- speaker: Respondent
  text: Yes, after a lot of hard work and dedication, I opened my own horse track in Tijuana. I was making a living doing
    what I loved. I also met a beautiful girl who joined me on this journey. I felt very happy with the life I had created.
- speaker: Interviewer
  text: What happened that changed everything?
- speaker: Respondent
  text: One of my employees kept dropping cigarette butts on the track, even though he knew it was a fire hazard. Eventually,
    the horse track caught fire and burned down. I lost everything I had worked for.
- speaker: Interviewer
  text: How did you handle that loss?
- speaker: Respondent
  text: It was devastating. My future became uncertain, especially since my wife was pregnant. We decided to leave Mexico
    and move to California to live with her family. We arrived with nothing but the clothes on our backs.
- speaker: Interviewer
  text: What was it like starting over in California?
- speaker: Respondent
  text: It was scary. I questioned if my future would work out at all. But with a baby on the way, I didn't have much choice.
    I didn't give up my passion and began training horses again, this time in California.
- speaker: Interviewer
  text: How did your life progress after that?
- speaker: Respondent
  text: Slowly, my career started rebuilding. Our baby girl, Sunday, was born and we loved her dearly. We got a house and
    continued our lives happily in Alameda County, training horses. I became a citizen and felt the joy of success again.
- speaker: Interviewer
  text: How do you feel about your life now?
- speaker: Respondent
  text: While Mexico will always be my home, I am very proud of the second home I have created here in California. I couldn't
    be happier.
