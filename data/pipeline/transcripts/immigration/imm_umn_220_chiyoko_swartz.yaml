collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience moving to the United States and how you adjusted to life here?
- speaker: Respondent
  text: When we arrived in Minnesota, I was not sure if I wanted to stay. We had no winter clothes, and walking onto the tarmac
    into the cold Minnesota winter was quite a change from Okinawa. Being a mixed-race family, some people viewed us as an
    oddity, and others were hostile because anti-Japanese sentiment was still alive. I could hardly communicate with anyone
    since I was the only Japanese. But with the assurance of my book, I was able to care for my family in this unfamiliar
    world.
- speaker: Interviewer
  text: What was the book you mentioned, and how did it help you?
- speaker: Respondent
  text: The book is called Katei Igaku Zensho. It's a Japanese medical and parenting reference book. I bought it just days
    before leaving Japan, hoping it would help me manage my pregnancy and growing family in a new culture. It became my support,
    providing information and confidence in my own language on how to care for my family.
- speaker: Interviewer
  text: How did your family and social support change after moving to Southern California?
- speaker: Respondent
  text: After a few months in Minnesota, we moved to the Los Angeles area. My family grew to five children by 1969. At first,
    I was anxious because I had no support network. But there were more Japanese and Okinawans in Southern California. Through
    new friendships made in English classes, a Japanese-American church, and an Okinawan club, I gradually built a support
    system and became comfortable in America. My book remained an important resource throughout my life, not just for information
    but for reassurance and confidence.
