collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your journey from Cambodia to the United States?
- speaker: Respondent
  text: My journey started in Cambodia when I was 18 years old. My family and I traveled on foot from Cambodia to Thailand.
    We crossed rivers and were caught by Vietnamese soldiers along the way.
- speaker: Interviewer
  text: What happened after you reached Thailand?
- speaker: Respondent
  text: After Thailand, we went to Indonesia and Singapore. While we were there, we learned as much English as we could. Then,
    a Catholic church sponsored us to come to America.
- speaker: Interviewer
  text: Where did you first arrive in the United States?
- speaker: Respondent
  text: The first place we stopped was Alaska. After that, we moved to Minnesota, where we lived for about a year.
- speaker: Interviewer
  text: What was life like in Minnesota?
- speaker: Respondent
  text: In Minnesota, we took a family photo after a family member won an award in junior high. It was a good time, but after
    a year, we moved to California.
- speaker: Interviewer
  text: How was your experience living in California?
- speaker: Respondent
  text: We lived in an apartment in San Jose. This is where I really began my life as an American. I went to Yerbabuena High
    School, but I was discriminated against because I didn't know English well.
- speaker: Interviewer
  text: How did you handle the language barrier?
- speaker: Respondent
  text: I struggled with English over the years, but I learned as much as I could. Eventually, I graduated from Yerbabuena
    High School.
- speaker: Interviewer
  text: What did you do after graduating?
- speaker: Respondent
  text: I started my adult life. I met my husband, got married, and had two children. I also became an aunt and made lots
    of family memories.
- speaker: Interviewer
  text: What was your first job in the United States?
- speaker: Respondent
  text: My first job was flipping burgers at Wendy's. Later in life, I owned my own donut shop and deli shop for 16 years.
