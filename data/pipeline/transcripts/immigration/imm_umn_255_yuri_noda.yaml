collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hey there! Let me just tell you a little bit of myself. Since a young age, I had been moving and traveling around
    the world. My mom took me to explore the world to many countries, despite the fact that my mom is a single mother. I am
    Yuri born and raised in Tokyo who went on a little adventure that drastically changed my life completely. This is just
    the beginning of my story.
- speaker: Respondent
  text: I had been a curious child. Throughout way too many "mother and daughter trips," she taught me to always challenge
    things out of my comfort zone. So that's what I did. At the age of 16, I quit my high school and went to Canada to study
    abroad by myself. I was lucky enough to be chosen as a scholarship student from the Canadian government.
- speaker: Respondent
  text: But I also had a big struggle I faced. It was pressure. The scholarship was merit-based, only one student per one
    nationality, which is out of all 12,500 Japanese international students in British Columbia, I was chosen to be representative.
    Growing up longing to study abroad, getting a scholarship as an international student meant a lot to me.
- speaker: Respondent
  text: However, while it boosted my motivation to study abroad by myself, it also started to put high expectation to myself,
    that "I need to be successful." Studying abroad requires lots of money. In order to save up for the tuition, I worked
    13 hours a day for two months. The result started to show on a number, but I felt I was missing out something important
    in my life, which was my happiness.
- speaker: Respondent
  text: It was not the happiest moment. My thought was simply occupied by the fear not to betray the expectation. This drove
    me to purposely see the people around me if they are beneficial or not. However, the tensity within myself started to
    loosen up when I met so many amazing friends around me and surrounded by the diverse community in Canada.
- speaker: Respondent
  text: Some were adopted, some have a similar family background, some escaped from countries to live a better life. Since
    then, I started to simply enjoy my life, such as joining a volleyball club, dancing, and fundraising for Nonprofit Organization.
    Every day was a new finding to me, and it completely changed my perspective to see the world.
- speaker: Respondent
  text: I began to see how much I am blessed to receive the opportunity despite my circumstance of my family, and genuinely
    appreciate what I have at this moment. Going somewhere new makes people easy to be in a shell and stuck in a comfort zone.
    But now, anything I felt challenging, I own it, as it is a new learning opportunity.
- speaker: Respondent
  text: Once the realization, I no longer felt being trapped. I started to appreciate what I have in front of me, I could
    let go of the negativity of certain expectation, which changed my life drastically, and this is just the beginning of
    my story.
