collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I am Xai Phia Yang. Around 1970 or 71, the elders told me that if I could touch my ear with the opposite arm I would
    be able to go to school. 1971 was the year I first attended school. So I went to grade 1. I didn't know what it meant
    to go to school. You arrive, sit in a room, and someone teaches but you don't yet comprehend what is being taught. Afterwards,
    I practiced enough to understand. I knew how to read. After 2 years I advanced to grade 2. After another year, in 1973-1974,
    I advanced to grade 3. I was just about to test into grade 4 when the country fell. At that point in my life, I never
    imagined what was going to happen.
- speaker: Respondent
  text: Trying to escape a war torn country was a terrifying thing. We were starving and frightened. Afraid of being chased,
    of mines and bombs in our path, and of being ambushed. These three things terrified us. We ran for 7 days. Of course,
    that memory is not very clear. When we reached the river bank and were about to cross, it was such a sorrowful moment.
    Then we arrived in the refugee camp.
- speaker: Respondent
  text: The moment I arrived, I started going to school. At that time, if you had money, you could sit in the classroom. When
    you didn't have money, you had to sit outside the building and just listen. That was how I learned throughout my life.
    When my older brother received a recommendation to work at the hospital, he then recommended my cousin, who then recommended
    me, which allowed me to study and become a nurse too.
- speaker: Respondent
  text: At that time, learning was still difficult. They taught us well, the Americans, but it was hard to grasp the meaning
    of things. It was hard to understand but we persevered and tested out. Afterwards, we were able to work. The first cohorts
    were able to go help the Thai people outside the camp. I wanted to go as well, but couldn't, because I didn't have the
    papers. My very first job was as a nurse.
- speaker: Respondent
  text: Afterwards, I changed departments to be a public health worker to ensure the welfare of residents in the Ban Vinai
    refugee camp. Then, when my older brother and those before me went to America, those of us who were still in the camps
    were able to gradually fill the vacant positions. So, I was able to be a nurse, medic, and coordinator for the camp.
- speaker: Respondent
  text: Then the camp closed in 1992. After the closing, we went to Phanat Nikhon camp. In Phanat Nikhon, I registered and
    interviewed to immigrate to America. This way, I could bring my family to this country, to find success and knowledge
    in order for my children to learn and grow, so that my children can see more of the world and the goodness in this world.
- speaker: Respondent
  text: That isn't to say there weren't good things in Laos, but there were few opportunities for education. Without money,
    you couldn't go far in education. Our livelihood was through farming and it was just enough to eat to survive. We couldn't
    go very far with our studies.
- speaker: Respondent
  text: Arriving in this country, we have to try harder, my children have the chance to be successful, they need to follow
    and achieve their dreams. That's the most important. That is all.
