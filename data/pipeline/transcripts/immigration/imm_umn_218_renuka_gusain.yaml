collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience moving to different countries as a child?
- speaker: Respondent
  text: I was born in India, which I call my passport country, but I moved a lot because my father was a diplomat. We first
    went to Beijing, China, where we stayed for almost five years. Then we moved to Saudi Arabia, briefly back to India, and
    then to Abu Dhabi in the United Arab Emirates. This pattern continued until I came to the United States for my Ph.D.,
    and I've stayed here since.
- speaker: Interviewer
  text: How did all this moving affect your sense of home and culture?
- speaker: Respondent
  text: For me, culture shock was virtually nonexistent. The tangible aspects of a place didn't define home; people did. Thanks
    to my parents normalizing our migration, I felt that nowhere was home and everywhere was home. I never felt like I was
    in a strange, foreign land—just somewhere surrounded by people I love.
- speaker: Interviewer
  text: What insights did you gain from living in so many different countries?
- speaker: Respondent
  text: Living in so many places taught me that humans are extremely complex, but often people categorize others by just one
    dominant aspect of their identity, like nationality, ethnicity, or religion. I learned early on to separate people's behavior
    from their nationality. When you stop focusing on that one facet, you see that the core goodness and unpleasantness of
    people is the same everywhere.
- speaker: Interviewer
  text: Can you give an example of the goodness you've seen around the world?
- speaker: Respondent
  text: My mother is a great example. She would speak kindly to everyone she met in every country we lived in, trying to learn
    their language and understand their culture. Talking to everyone, regardless of the categories we might impose, is something
    I definitely inherited from her.
- speaker: Interviewer
  text: How do you view cultural identity given your experiences?
- speaker: Respondent
  text: While I challenge the idea that people can be inherently explained by nationality or ethnicity, I do value cultural
    identity. My parents made sure to preserve our Indian culture by keeping Indian texts in the house, making Indian food,
    and celebrating Indian holidays no matter where we lived.
- speaker: Interviewer
  text: How do you incorporate your experiences into your work as an educator?
- speaker: Respondent
  text: I use my position to teach about my culture and challenge my students with metacognitive activities that make them
    think about how they categorize people. It's important to help them see beyond simple labels.
