collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Since I was only four when I moved away from Lima, Peru, I don't remember much of my life back there. Instead, I remember
    how my family carried the culture of Peru to Salt Lake City and also how we assimilated to our new culture.
- speaker: Interviewer
  text: What was it like when your family first arrived in Salt Lake City?
- speaker: Respondent
  text: When we first arrived, we lived near Cottonwood Heights. I remember when my family started to interact with the new
    culture, we all started to change, especially my father and my mother.
- speaker: Interviewer
  text: Can you tell me more about your parents during those first few years?
- speaker: Respondent
  text: In the first few years living in Utah, I saw less and less of my father. I only saw him at night when he came home
    from his job as a personal contractor. My parents were very stressed with their new workload, trying to learn English,
    and trying to understand the ins and outs of the new culture.
- speaker: Interviewer
  text: Were there any positive experiences during that time?
- speaker: Respondent
  text: Yes, there were positives. We moved to a nicer part of town called Suncrest. My parents started to make the most of
    our new life. They bought designer clothes, took vacations, bought a couple of cars, and developed our dream house, all
    things that weren't available in Peru.
- speaker: Interviewer
  text: How did you perceive your family's identity during this time?
- speaker: Respondent
  text: 'I realized there were two identities within my family: the American side and the Peruvian side. From the outside,
    we looked like an everyday middle-class family with cars, a decent house, and some spending money. But inside our home,
    the culture was Peruvian. My father still listened to Peruvian music, my mother cooked Peruvian food, and the textiles
    and artwork around the house were mainly Peruvian. We also spoke Spanish.'
- speaker: Interviewer
  text: What does this say about immigrant families and their cultural identity?
- speaker: Respondent
  text: It shows how an immigrant family can come to the United States, assimilate to the culture to a certain degree, but
    also retain the culture of their homeland. We became American and citizens, but we will always retain the Peruvian side
    of our identity for the rest of our lives.
