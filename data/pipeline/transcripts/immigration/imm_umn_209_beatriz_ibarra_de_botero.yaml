collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'My name is Beatriz Ibarra de Botero. I was born in Colombia, in a city called Garzón, Huila. Later I was taken to
    Bogotá. My mother got sick and went to Cali, and from that point on, I was left alone with my younger brothers. My mom
    later returned to Huila, and they told me to go back and take care of her because she had cancer. My mom got sicker and
    eventually died. So I went to Cali and started working. Then I met my children''s father. We fell in love, and after some
    time, we got married. I had 5 children. The youngest, she came to the United States. After she came, little by little,
    all of them came. The youngest is now in Canada doing her PhD. We''ve been here more than 5 years now, and my daughter
    says that now we can apply for citizenship. We are working on learning English, but it is really hard. Hopefully I can
    learn quickly because it is very stressful to be at work where almost all Latinos know a second language. You feel bad
    because you feel discriminated against because they know a second language and you don''t. My daughter asked us where
    we would like to be for our final years, if we wanted to stay here in Minnesota, or in Canada, or in Colombia, or with
    my other daughter who lives in Dallas, Texas. She asked us if we wanted to be there, but I said that I liked Minnesota
    better. I liked everything: the weather, the different seasons, the people are very kind. I like the way of life, it''s
    very good: transportation, people have a lot of respect for pedestrians, you can be assured that if you cross a street,
    the cars are going to wait for you. I liked that a lot. There''s a lot of culture, a very good level of culture. It''s
    not like in Colombia where people go at red lights and there are a lot of accidents. Here, they follow rules a lot. I
    like that. My husband and I have been together 46 years. We are still together. There haven''t been any problems. We''re
    fine and we love each other. I''m very happy with life. I love life, nature, everything. I pray to God that we have good
    health and that our children also can enjoy life and live peaceful and happy.'
