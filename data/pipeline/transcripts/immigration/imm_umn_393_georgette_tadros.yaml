collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about how you met your husband?
- speaker: Respondent
  text: I was on the beach one day when a man named Adly Iskandar caught my eye. He thought I was extremely beautiful and
    asked around to find out who I was. As was tradition in Egypt, he approached my father to ask for my hand in marriage,
    despite having never even spoken to me before.
- speaker: Interviewer
  text: What happened after he approached your father?
- speaker: Respondent
  text: My father agreed, and we entered the engagement period, where we got to know each other. Despite being extremely against
    the marriage at first, I eventually fell for him, and changed my name to Georgette Iskandar after we were married.
- speaker: Interviewer
  text: Did you continue your education after marriage?
- speaker: Respondent
  text: Yes, close to my marriage, I received a scholarship to get my PhD in Paris at an elite university. I studied a French
    writer for my thesis and lived in Paris for 10 years. During that time, my husband became a doctor.
- speaker: Interviewer
  text: Where did you and your husband live after Paris?
- speaker: Respondent
  text: We went back and forth between Paris and London, where Adly worked, before eventually deciding to move to the US in
    1969.
- speaker: Interviewer
  text: What were the reasons for moving to the US?
- speaker: Respondent
  text: There were several reasons. One was the tense religious climate back home in Egypt. Egypt was about half Islam and
    half Christian, and due to the growing conflicts, we felt we'd be better off in the US. Also, Adly received a job offer
    to become a doctor in Boston.
- speaker: Interviewer
  text: Did Adly have to redo his medical training in the US?
- speaker: Respondent
  text: Yes, he had to redo his residency because his Egyptian and English residencies weren't valid in the US.
- speaker: Interviewer
  text: How was your immigration process to the US?
- speaker: Respondent
  text: We were able to get to the US very easily since both of us were highly educated and contributed to the workforce.
    We went through the proper channels to get green cards, and it wasn't a complicated process to gain citizenship. However,
    we were luckier than others.
- speaker: Interviewer
  text: What was the broader context of Egyptian immigration to the US at that time?
- speaker: Respondent
  text: Thousands of Egyptians immigrated to the US between 1967 and 1977 after Egypt's defeat in the 6-Day War, which wrecked
    the economy. The US made reforms to prejudicial immigration laws in 1965, allowing more Egyptians to immigrate, but later
    decreased the number in 1980. Newer immigrants were sometimes barred from communities made up of older immigrants, and
    language barriers didn't help their advancement.
- speaker: Interviewer
  text: What kind of work did you do in the US?
- speaker: Respondent
  text: I worked as a trilingual translator for immigration courts, speaking Arabic, French, and English, and as a docent
    at the Museum of Fine Arts in Boston. Later, I was a very successful realtor.
- speaker: Interviewer
  text: Did your family also move to the US?
- speaker: Respondent
  text: Yes, my husband and I were among the first in our families to move to the US, but both families slowly came over.
    My brother started a date ranch in Palm Springs that kept the family together. I was also good at finding Egyptian and
    French communities in Boston, which I became a part of.
- speaker: Interviewer
  text: Can you tell me about your later years?
- speaker: Respondent
  text: I passed away in 2021 with two children and six grandchildren, and I was surrounded by my family until the very end.
    I am buried in Boston next to my husband, and I will live on for generations to come.
