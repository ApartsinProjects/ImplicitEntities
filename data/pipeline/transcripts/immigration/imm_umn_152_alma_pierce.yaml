collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I am Alma, I'm from Mexico, I have two kids, Fernando, he's 13 years old and Lucero, she's 6 years old. I was married
    19 years but my husband died 4 years ago. After becoming a widow I decided to change my life and this included a change
    of country because the situation in my country is very harsh, there is a lot of insecurity, the government doesn't help
    people, education system is deficient and salaries are very low.
- speaker: Respondent
  text: We have been living 15 months here, in this country, and it has been very difficult to adapt to the language and to
    the long and cold winter. But this time has helped me to be calmer, more relaxed. I have been many things that I have
    never experienced, my children love snow and enjoy it as much as summer.
- speaker: Respondent
  text: Now I'm married to a good man who loves me and loves my children and although he doesn't speak Spanish our relationship
    is very good. I want a better life for my children, better education, and better opportunities. At this moment my priority
    is my family and can work hard to get everything I want and be in direct contact with nature and forget the pollution
    and the traffic that exists in Mexico City.
- speaker: Respondent
  text: I was born in Mexico City and lived there for 40 years. The great majority of my work family was also born in the
    same city. I have to say that living in Mexico has only affected us in a positive way because we are all honest and hard
    working people without any type of bias.
- speaker: Respondent
  text: The story of how I met my husband is very simple. It was here in Anchorage, Alaska. My uncle introduced him to me
    and it was almost love at first sight.
- speaker: Respondent
  text: The best experience we had as a family was the first time we visited the United States because we went to Disneyland,
    Sea World, Lego Land, and visited some cousins that lived in San Diego and Los Angeles.
- speaker: Respondent
  text: During this time we have been living in this city Anchorage, are more in like than before. We spent more time together,
    but we can't stop missing our relatives. My children miss their cousins a lot and I miss my sister and my mom very much.
- speaker: Respondent
  text: I want my family to know that we are very happy to have been able to change life completely. There is a lot of opportunity,
    security, and nature nearby. Living in the United States fulfills a dream I had since I was a child and now I have been
    able to achieve this.
- speaker: Respondent
  text: The last thing I would like to add is that my big dream is for my children to be happy, independent, and to start
    a career in order to work in the future. My personal dream is to work, have a house, and live the rest of my life with
    my husband Chris.
