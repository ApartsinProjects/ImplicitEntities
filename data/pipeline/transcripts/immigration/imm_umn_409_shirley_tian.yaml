collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My parents met in Japan. My dad lived in Beijing, my mom lived in Shanghai, and I was an accident, so it was pretty
    hard to balance everything at once. My maternal grandparents raised me until I was 2 years old, and I would accidentally
    call my aunts "mom" because I lowkey didn't know who my mom was. Although I don't remember it much, I can still picture
    our many chickens, our huge vegetable garden, our shop, and the courtyard across from the shop where everyone would gather
    to dance Guangchangwu.
- speaker: Respondent
  text: We weren't supposed to move to the US - my mom had her whole career set out in Japan, but my dad couldn't get a job
    there. He found a research position at USofC instead, and dragged us all the way over here. My poor mom basically let
    go of all her dreams to come here, taking an under-the-table cash job. We left behind all the rest of our family. Even
    17 years later, we are still the only family members on this side of the world, and I haven't gotten the chance to go
    back and visit in 10 years. I miss them all dearly.
- speaker: Respondent
  text: 'We moved into a tiny apartment in Columbia, SC with one mattress, on the floor, and I refused to go anywhere without
    my chicken. We didn''t have a car, but my mom had dropped me off at my preschool one day and got a call: "Shirley is safe,
    please don''t worry - she just forgot her chicken." So my mom walked all the way to my preschool to drop off my god-blessed
    chicken.'
- speaker: Respondent
  text: I was 2 years old and didn't speak English at the time, but was fluent in Shanghainese. My dad spoke a different dialect
    of Chinese (since my parents didn't really raise me until we got to the US), so in two months I switched entirely from
    Shanghainese to Mandarin. I was also pretty annoying in preschool - I spoke absolutely no English, but I would repeat
    every single thing my teacher said, like a terribly obnoxious parrot.
- speaker: Respondent
  text: I was pretty stressed out by the move and cried ALL THE TIME. It was bad. Our apartment neighbors filed a noise complaint
    and the police came to our door and I was yet again crying my head off and my mom had opened the door to the police right
    after I had peed on her. Good lord. Sorry mom…
- speaker: Respondent
  text: We have since moved to Charlotte, NC, and have grown to love it. My little brother is now 12 years, born in the US,
    is now 12 years old, and my parents and I very recently received our US citizenships. We love traveling, and I still take
    all my photos on the same Canon digital camera that all my baby photos were taken on.
