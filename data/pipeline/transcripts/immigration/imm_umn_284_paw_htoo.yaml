collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: When I think back, all I remember was a difficult life in Burma. My house got burned and my farm got destroyed by
    Burmese soldiers. My family had to live in temporary villages because of the battles between Karen and Burmese soldiers.
    Life was unfair because our Karen people were kicked out of our beautiful land and we couldn't own any properties we have.
    Burmese soldiers were willing to take anything away from us. Rice was our main food but it was unaffordable since different
    ethnic groups in Burma were developing and fewer people were working on the farm.
- speaker: Respondent
  text: Because battles always happened in Burma, my parents escaped to a Thai refugee camp in 1997. As refugees, we got support
    from the United Nations such as food, shelter, and clothing. My family lived in a Thai refugee camp for more than twelve
    years.
- speaker: Respondent
  text: In 2000, the United Nations allowed Karen refugees to come to the United States to start a better life. For this reason,
    my family got a chance to apply for an interview in 2007. After we got accepted for interview, the United Nations checked
    my family background and then they gave us a physical. My family passed the interview and then we got an International
    Organization for Migration bag the day before we came to the United States. This bag was really important for my family
    because it helped us get to a new land and my family would have a beautiful life in the United States.
- speaker: Respondent
  text: Life in Burma was unimaginable, but luckily my family got a big opportunity to come to the United States and build
    our new life. Life in the United States is wonderful and way easier than our own country. We have freedom of education
    and equal rights. I vowed to myself that I will always remember what my family went through. I feel safe living a new
    life in Minnesota and being with my family.
