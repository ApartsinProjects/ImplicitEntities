collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'My name is Rothana Walbolt. I''m from Cambodia. Cambodia has been through a lot of difficulty during the time that
    I grew up. All the time when I grew up, all I remember is running. So, when I was six years old, the Khmer Rouge had split
    me away from my family to work on a rice field. For a while working, a lot of us got sick, not enough food to eat. And
    later on found a letter—my dad had wrote a letter to the commander saying that my mom is really sick and he needed us
    to be home. So, gladly, that commander let us go with my dad. Some commanders were very mean and some were very kind.
    So, gladly that he let us go home to see my mom. And then the next day, the war started, and my mom and dad brought us
    to run to the pond and somehow I kind of hesitated, didn''t want to go to the pond. I remember the smell and the feel
    of the whistle of bullets past my ear and my mom grabbed me down and pushed me into the pond. So we''re all in the pond
    and then later on my dad said, you know, don''t move. So we didn''t move and then later on we felt like there were snakes,
    a lot of snakes. I got goosebumps. A lot of snakes. Don''t know what kind, don''t know what kind it is. So we stood there
    and did not move, and gladly the snakes swam around to another side of the pond. So we finally, the UN had called all
    of us to go to the camp, the different camps. So we got into the truck and went to the Khao I Dang camp. And that''s how
    we stayed there for a while. That''s how I grew up there at the Khao I Dang camp. And then later on we found a letter
    from a family living in the US: my uncle looking for family. So my uncle, he came here. He''s a soldier so he came here
    first and he lost all his family. So he wrote a letter with his picture, put it in the camp, looking for family. So that''s
    how my dad knew him and we wrote that we were here, we were in the camp. So we wrote letters back and forth and connected
    with each other and then we had an interview with immigration and we passed the test, and we came to the US. The first
    year that we came to the US was the first Fourth of July. And when the fireworks started my mom ran to the basement when
    the fireworks started because it sounded like, you know, war. So she ran downstairs and she called all her children to
    go downstairs and we let her know that it''s not war, it''s just the fireworks. Most of us Cambodians that lived in the
    camp think that USA is a heavenly place to live because we have everything. We don''t have to worry about food. We don''t
    have to worry about what we wear. We have everything. Over there in the camp, we were glad to survive, you know, to have
    food to eat. Instead, we have so much choice: what kind of food we are going to eat today and over there we ate the same
    thing. So when we have a space, we like to invite the elderly and the youth, you know, to talk to each other. To connect.
    Most of the kids they grew up here, they don''t know how difficult it is for a parent, that they sacrifice for them. When
    they get here, they just see everything here, and they are happy, they grow up, they have friends, they have food, they
    have… but the elder and during my time, during my parents'', it''s: grow up with fear, grow up with starvation. So we
    have not lived like this. No, we grew up in the jungle, in the camp, in the tent.'
