collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Huaraches. Not the Nike shoes or the food, but the sandals worn by everyone in my family who crossed the Mexican-American
    border. The sandals that carried my family into a new world, and the sandals that we continue to wear today.
- speaker: Respondent
  text: My dad doesn't talk much about his life in Mexico on his own but when he does, he always has something fascinating
    to say. He reminisces on how Mexico was before the cartels in his area came. How everyone was outside playing on the street
    til late.
- speaker: Respondent
  text: He tells us about how he was really good at all the sports in his middle school, he was on every sports team and often
    got in trouble for getting into fights with players of the opposing team. He would also tell us how my abuela would scold
    him for getting into trouble and he would get his own whooping at home.
- speaker: Respondent
  text: Yet there are fights he knew not to engage in. He didn't fight my grandparents on leaving school to work and help
    support the eleven-person household that he lived in. And he knew not to engage in any fights with the cartels creeping
    into his area, especially when they came knocking on the door trying to buy my family's land.
- speaker: Respondent
  text: But life is unpredictable so when the cartel sent death threats to my dad and uncles, they grabbed pictures and documents,
    clothes and hygiene products, water, and everything that they would need. They put on their huaraches and began the journey
    to escape gang violence and poverty in their homeland.
- speaker: Respondent
  text: In the early 2000s, my dad crossed the Southern border around three times. The first time it was him and his brothers
    looking to establish a new life in "el Norte", they worked on horse ranches in central North Carolina, where I'm from.
- speaker: Respondent
  text: He ended up getting detained by immigration officers but they miraculously let him go. He was already making a life
    for himself in the United States, gaining valuable work experience and new hobbies like martial arts.
- speaker: Respondent
  text: He crossed a second and third time to help the rest of his siblings cross and other people from his hometown. As the
    eldest sibling in the United States, my dad assumed a parental role to his younger siblings, as young as 15.
- speaker: Respondent
  text: I just think it's really funny how my aunts would often introduce their boyfriends to my dad when they were beginning
    to date in the US.
- speaker: Respondent
  text: My dad met my mom in the U.S. and started their family. In order to provide for his family, my dad started his own
    landscaping and irrigation business, using the skills and knowledge he gained on the ranches.
- speaker: Respondent
  text: He became a successful business owner and now he specializes in hardscaping and fencing, with huaraches on his feet.
- speaker: Respondent
  text: In Mexican culture, kids take off their dad's work boots as a sign of respect. I did that and so did my siblings.
    After taking off his work boots, he would immediately look for his huaraches, and couldn't relax if he did not have his
    huaraches on.
- speaker: Respondent
  text: His huaraches now have red, white, and green patterns embroidered onto them along with some white embroidered roosters.
    These sandals have continued to support my dad in the United States and remind him of Mexico, even though it's been well
    over 20 years since he last stepped foot into Mexico.
- speaker: Respondent
  text: The huaraches supporting his body remind him of his younger years in Mexico, lindo y querido, a feeling of comfort
    and a warm familiarity.
- speaker: Respondent
  text: Even though others may look down on us because we wear sandals associated with poverty and rural Mexico, we will continue
    to wear huaraches to honor our lineage and my father's sacrifices to provide us with a better life.
