collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: During the late 19th century one of the Jewish community's greatest leaders was born in Russia. This leader was named
    Hymen Goldman.
- speaker: Respondent
  text: During Goldman's childhood he faced the fear of being drafted into the Russian military, because in Russia when a
    male reached the proper age they could be drafted.
- speaker: Respondent
  text: This fear and the possibility of having a better life with more opportunities caused him to want to emigrate from
    Russia.
- speaker: Respondent
  text: While this was a lot for a fourteen year old to do all on his own, he persuaded his uncle and aunt to buy tickets
    to get to Canada where some of his other relatives lived.
- speaker: Respondent
  text: After time the aunt realized she was happy in Russia and wanted to stay but it left two pre-paid tickets remaining.
- speaker: Respondent
  text: His uncle then gave one of the tickets to a young boy of already military age and left one ticket open.
- speaker: Respondent
  text: This boy's name was Malech and by the time he was given the ticket it was time for the boys to leave.
- speaker: Respondent
  text: Since there was no railroad that arrived at a port to go to Canada in Russia the two boys had to pass the border.
- speaker: Respondent
  text: As they were doing so they got caught and were put in jail.
- speaker: Respondent
  text: Luckily, they escaped by bribing.
- speaker: Respondent
  text: They got on a train to get to a ship and eventually arrived in Canada.
- speaker: Respondent
  text: When they arrived they had only 20 cents to their names.
- speaker: Respondent
  text: They then settled with Hymen's family and got jobs working at a factory.
- speaker: Respondent
  text: Both Malech and Hymen hated their jobs and decided to quit to become peddlers for his other Uncle's business in the
    country.
- speaker: Respondent
  text: While pedaling, Hymen received a letter from Aaron Goldman from Washington D.C.. Aaron was Hymen's biological father
    that wasn't there for him as a child.
- speaker: Respondent
  text: The letter exclaimed that Aaron had used his contacts in Europe to learn that Hymen had traveled to Canada and wished
    to see him.
- speaker: Respondent
  text: This angered Hymen because his father wasn't there for him when he needed him but was also dazed since it was a way
    for him to get to America.
- speaker: Respondent
  text: Hymen went back and forth on whether or not to go, but before deciding, he decided to save his money in order to bring
    the rest of his family from Russia to Canada.
- speaker: Respondent
  text: The thought of his family being in Canada comforted him because if he didn't like America he could still have a family
    to come back to in Canada.
- speaker: Respondent
  text: Hymen then prepared to go to America where he fell in love with Washington D.C.
- speaker: Respondent
  text: He quit his pedaling job to become a salesman and started his American Dream life.
- speaker: Respondent
  text: He began to learn English and make more money.
- speaker: Respondent
  text: But despite these improvements he missed his family but knew that these opportunities would benefit them.
- speaker: Respondent
  text: In America he found love and embraced his religion, Judaism.
- speaker: Respondent
  text: He joined a Zionist party where he met his first wife Sadie.
- speaker: Respondent
  text: He married Sadie and started his family in America with three boys.
- speaker: Respondent
  text: With the birth of his kids his family that remained in Canada came to the U.S.
- speaker: Respondent
  text: All of these changes made Hymen realize that he didn't want to be a salesman anymore and went into the tobacco business.
- speaker: Respondent
  text: He partnered with his father in law and founded the Standard Cigar and Tobacco Company, which was D.C's biggest cigar
    distributor at the time.
- speaker: Respondent
  text: During this time Sadie died leaving him heartbroken, but it didn't stop him from working.
- speaker: Respondent
  text: He continued to succeed in the tobacco industry and support his sons through college and the war.
- speaker: Respondent
  text: After some time had passed he remarried to a woman named Yetta.
- speaker: Respondent
  text: Throughout Yetta's and Hymen's relationship, Hymen began to embrace his religion again by helping the Jewish community
    in countless ways.
- speaker: Respondent
  text: For starters, he was the founder of the Jewish Community Center that is now a national organization that works to
    promote Jewish culture and education.
- speaker: Respondent
  text: At this time that he founded the JCC, Israel was founded causing a forest to be named after him.
- speaker: Respondent
  text: This forest was next to the forest and monument of the John F. Kennedy Peace Forest since he had helped kindle peace
    between the two countries at the time.
- speaker: Respondent
  text: His charitable acts continued onto his son who donated a huge amount of money to the Holocaust museum and was the
    president of the Jewish Community Council of Greater Washington; and chairman of the National Community Relations Advisory
    Council.
- speaker: Respondent
  text: Overall Hymen Goldman's story is the ideal rags to riches story through the eyes of immigration.
- speaker: Respondent
  text: This information came from Hymen's primary source of his own memoir "I Could Write A Book", and even includes his
    family that he dedicates this book to on a page.
