collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Moving to a new country, there are different medical treatment methods that collide with pre-existing treatment methods.
    The Hmong people come from the country Laos but was driven out due to military reasons. Because of these military factors,
    the Hmong population decreased and had to seek refuge in the forest or in the neighboring countries.
- speaker: Respondent
  text: Not having a community to thrive in and always on the run, it was difficult to stay in one place. With poor living
    conditions, most of the human labor was focused on providing money, food, and other living expenses, and not so much on
    education.
- speaker: Respondent
  text: For medical purposes a shaman would be contacted to cleanse the human spirit of all the evils. Treatment methods travel
    quickly through verbal communication rather than knowing the actual facts behind the method. This is like the previous
    ointment used except most Hmong people believe in fake stories of how an herb cures such medical condition.
- speaker: Respondent
  text: Being born in the United States, there were colliding issues between medical technology and cultural beliefs and whether
    they could be trusted upon.
- speaker: Respondent
  text: I was admitted to the hospital on August 16, 2016 for experiencing vertigo and breathing problems. I was diagnosed
    in October 2016 with a medical disease called Multiple Sclerosis. It's a neurodegenerating disease in which one's immune
    system recognizes a threat in the body when there really isn't.
- speaker: Respondent
  text: There is no cure and the cause is unknown. It attacks the myelin on the nerves. Myelin helps transmit information
    along the nerves from point a to point b. An example of vertigo is when a motionless person feels the sensations that
    the objects around them are constantly moving.
- speaker: Respondent
  text: At first, I didn't want to believe it, but as newer symptoms occurred, I slowly began to believe that I actually had
    a disease. My parents and grandma don't know what this medical condition is because it is not physically visible nor are
    there words for the modern medical terminology. My father does not believe that I have a disease.
- speaker: Respondent
  text: While admitted to the hospital, I had a large needle injected into my spine to take out the cerebral fluid for further
    analysis, which eventually led to my diagnosis.
- speaker: Respondent
  text: Different from the medical procedures in the Hmong culture, I take a medication called copaxone. I inject this medication
    three times a week with a tool that helps the needle get to where it needs to be injected which is under the skin layer.
- speaker: Respondent
  text: With their limited medical knowledge, my parents cannot understand my medical condition. Though I live with this disease
    now, I don't know what will happen but I know that I can't give up on the mysteries of life yet.
