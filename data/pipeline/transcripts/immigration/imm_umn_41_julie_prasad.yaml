collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: So, who are you and what is your story?
- speaker: Respondent
  text: My name is Julie. My actual name is Agnish Prasad and I go by Julie and I've been here in the United States for 25
    years. I migrated here October 4th, 1992 from Fiji Islands and the process, the process it took me to get here was twelve
    years. My uncle sponsored me and my family to come to the United States, and it's a ten year difference, you have to wait
    for the immigration, for the paperwork and then a whole year for the police just to get your clearance out. So the process
    is like up to ten to twelve years to migrate to US. And, Fiji, is, its very overpopulated country and its multicultural
    country, Indians, Japanese, Fijians, they all live there. In the year 1879, January Indian people were shipped out from
    India to Fiji to do the cotton plantation and since then the Indian people has been outgrowing generations over generations
    in Fiji. And, Fiji is actually a country of Fijian people, Native American people, it's like the Native Americans. And,
    there is a, that's how its been growing up, that's how Indian people from India, they ended up in Fiji, they had to go
    to the plantations, cotton plantations, and since from there it's just generations and that's how we all ended up in Fiji.
    And, the reason we migrated here is the poverty, the overpopulater, the overpopulation and, there's a, you know, everything
    is so expensive. There's not enough money there, you know. My dad, he use to be, he is a tailor and he used to have a
    shop really like right on the street to make his living, you know, and my parents, my dad and my mom, my mom used to raise
    chickens and ducks and I used to help my mom bring money in the house. you know, after I would get off from school I would
    come home, and you know, help her to do anything to bring in the money and so we could all have food to eat and clothing.
    And you know, my uncle who is actually like a god to us, who made our life so much better here by bringing us here. And
    you know, I am very thankful because Fiji is there is hardly you know there is no money over there, schooling is so expensive,
    there is hardly an jobs out there. The money that they made from the jobs are not enough. And everything, the groceries
    are so expensive. The school fees are so expensive. A lot of parents cannot afford schooling and they cannot afford food
    and shelter and that's one of the reasons that everybody have a dream to migrate to overseas, such as America and Australia,
    New Zealand, anywhere they find the opportunities to come here, either its a tourist visa or a visiting visa or you know
    anything that could just get sponsored by any of their family to come here. you know, I am very blessed to be here today
    and able to provide everything for my kids. I have a better job for the better opportunity, and my husband, and they are
    able to get everything that they want, which we couldn't have. There was times where my dad didn't have money to go buy
    actual food, so we would go drink a glass of water before we would go to bed. That was our dinner. And I hope that no
    one else goes through what we went through to Fiji. This is my daughter, and I am always telling her that we shouldn't
    be forgetting our roots. We Indians and this is what we going to be. We shouldn't be ashamed of ourself. And you know,
    I want her to be in touch with our Indian culture and Indian religions. And you know, just to be proud to be an Indian.
    Thank you.
