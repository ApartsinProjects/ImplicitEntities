collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My family and I used to live in Umpiem Refugee Camp. We come to America because we want to get a better life, freedom,
    and better job.
- speaker: Respondent
  text: We got to America September 19, 2008. When my family and I got to America, we made sure to bring everything we need,
    like cultural clothes, family photos, and other stuff.
- speaker: Respondent
  text: When we are here in the United States, first we lived in Arizona. We had a lot of problems. We do not speak English.
    We do not have jobs. It is hard to find a job. And then no one helps you.
- speaker: Respondent
  text: We didn't have money to pay the bills, like house bill, phone bill, electric bill, and a water bill.
- speaker: Respondent
  text: When we moved to Minnesota in 2010 we knew that a lot of Karen people are in Minnesota, that we have a community here,
    a lot of people likely to help you out, so that's why we moved here to Minnesota.
- speaker: Respondent
  text: And then when I moved here, I saw a lot of friends, a lot of old friends who used to live in the same camp with me.
- speaker: Respondent
  text: All my project today is a family photo, how I find it or get it. I asking my grandma and my parents to find it.
- speaker: Respondent
  text: A plan in my life is to keep it and remember it.
- speaker: Respondent
  text: This photo is more important to me because I love my family and I love to show my family to the next generation.
