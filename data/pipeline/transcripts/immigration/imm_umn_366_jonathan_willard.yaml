collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Throughout history there have been many famous tables, tables which bound people together. Tables like the Round Table
    for King Arthur and the table for the Last Supper. They were tables that witnessed the greatness and unity of groups of
    men and women. But tables do not have to be famous to bind.
- speaker: Respondent
  text: My mother, Ephrosine Willard is an American born to Americans, and, she is a Greek among Greeks. She described her
    life as a melding between two cultures, the culture of her country and the culture of her family.
- speaker: Respondent
  text: 'For her family, the table was the center for everything Greek: Easter, Christmas, funerals and many other feasts.
    When my dad met my mom, he was shocked by how much of the family''s life centered around the table: it was what held the
    family together.'
- speaker: Respondent
  text: 'My grandparents bought the table when my mom was 8, but she still has the table. She likes to call the kitchen the
    lifeblood of the family: it''s where we all gather, and it is where we celebrate being a family. And the table is still
    the center of all that.'
- speaker: Respondent
  text: 'The Greek calendar is filled with feasts and celebrations, so the table is where we celebrate Easter, Christmas,
    funerals and many other feasts. In Greek tradition, every food is a symbol for a part of our life: white cookies symbolize
    purity, red eggs the blood of Christ.'
- speaker: Respondent
  text: Together we gather around to celebrate feasts common to many peoples, but we as a family celebrate as Greeks. It gives
    us a history and a richness.
- speaker: Respondent
  text: 'We, as my Mom''s children, lead busy lives: we come and go, creating stories of our own, but our mother''s culture
    and life still form our lives, even now. Rather than merely having our own stories, we have our mother''s, and her mother''s,
    and her grandmother''s.'
- speaker: Respondent
  text: My mom is an American, but she has a history as old as Greece. It's the table that holds that history for her.
- speaker: Respondent
  text: When my Mom was growing up, she lived close to all her family members, but now they are dispersed throughout the country
    and the time she spends with them grows less and less.
- speaker: Respondent
  text: 'But, through our traditions and celebrations, our family still lives as a family: we get together for Easter and
    Christmas, and, since we are American, Thanksgiving too.'
- speaker: Respondent
  text: 'Many of our feasts are American, but my Mom and her siblings celebrate them the Greek way: with food, food, food
    and more food.'
