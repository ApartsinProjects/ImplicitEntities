collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I remember not knowing what to expect, but what I did know was that this was not going to be an easy journey.
- speaker: Respondent
  text: I was told not to pack a lot but to bring a lot of water and food. We got on a bus to a place close to Tijuana, near
    the border, and were told that we were going to have to walk three days in the desert.
- speaker: Respondent
  text: The trip ended up being two days longer. There was no real explanation for this, but I believe that the coyote, aka
    the smuggler, got lost.
- speaker: Respondent
  text: We ran out of food and water but ended up making it to the United States.
- speaker: Respondent
  text: On my journey, I saw and heard a lot of things that not any kid should have to go through. For example, I saw so many
    people getting left behind and would hear women get raped at night by these smugglers. It's heartbreaking, but people
    go through that type of thing every day.
- speaker: Respondent
  text: Arriving in the United States was hard to adjust to at first because my first language was Spanish, so it was frustrating
    for me to understand, especially with the learning disability I have. Things were just a thousand times harder.
- speaker: Respondent
  text: But with time and commitment, I did big things. I now own my own construction business, and we're financially stable
    thanks to my hard work and dedication.
- speaker: Respondent
  text: Life in the United States and Mexico are two very different things. Policies aren't as important as they are here,
    and there are so many things that aren't allowed over here that are allowed over there. For example, riding in the back
    of a truck.
- speaker: Respondent
  text: It took me time to adjust to the new rules, but I eventually caught on to them.
- speaker: Respondent
  text: I went to Sequoia High School, but eventually I came to the conclusion that school wasn't for me, so I started to
    work in construction and after a few years of putting in work, I became my own boss.
- speaker: Respondent
  text: I'm proud of what I have become and the amount of work I have put into my future.
