collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I remember as if it happened yesterday. The day I left my country was tough, saying good bye to my family and friends
    was not easy. I grew up in small town in Mexico, where everyone knows each other; I was raised in a home of the three
    younger sisters. My parents did not achieve an education higher than elementary school, but they always encouraged all
    of us to learn as much as we could and not to be afraid of challenges. I came from a family who support each other.
- speaker: Respondent
  text: The decision to leave everything behind and move to the USA was a big step for my family and me. English was my biggest
    challenge and my biggest fear, I always thought what am I going to do, if I cannot simply ask for some food? Even though
    my husband speaks English fairly well and he could ask for me, but I couldn't speak for myself anymore.
- speaker: Respondent
  text: Moving from another country meant that I had to start my life all over again, with no family around to support me.
    Every second I was here, I just wanted to be home. I missed my family so much. I was afraid all the time of getting sick
    with the fear of going to the doctor and not understanding a single word.
- speaker: Respondent
  text: I remember the day my tooth broke and I was willing to tolerate the pain for two days due to the fear of speaking
    in English, but I couldn't stand the pain any more, and I went to the dentist. My husband was with me the first hour only
    filling the paperwork, but then he had to go back to work and I was alone.
- speaker: Respondent
  text: I was lucky that one of the nurses spoke Spanish, so he explained that they must pull out my tooth. The nurse had
    to leave and then the dentist tried to explain everything to me. He asked me something and I only nodded my head, but
    I didn't understand what he was saying.
- speaker: Respondent
  text: When he started the procedure, I immediately felt the pain, the anesthesia had not worked correctly and my tears ran
    down my cheeks. Then after some time the nurse saved me and explained that I should raise my hand if I wasn't comfortable
    or I felt pain, so I did and the dentist gave me more anesthesia. So finally, my nightmare ended. It was all because I
    couldn't understand English.
- speaker: Respondent
  text: Since that day I made a goal for myself to learn English. Now I have been taking English class at Second Start since
    September 2014 and I can understand more. I have met nice people who have supported me in my reaching milestone to learn
    English and I'm enjoying every moment, I'm still learning because if I think I can do it, it can be done.
