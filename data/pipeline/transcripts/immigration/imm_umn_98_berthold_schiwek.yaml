collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My grandfather was born in 1932 in Sensburg, Poland. He grew up with his siblings Waltraud, Manfred, and Bernhard.
    The Schiwek family owned a small farm. While the father served as a driver for the supply headquarters during the war,
    the mother had to run the farm with the children. They sold their products on the black market to have something to eat
    daily. It was a hard time.
- speaker: Respondent
  text: After the war ended, the area was occupied by Russian troops. My grandfather's sister was abducted and their house
    was plundered. In October 1947, they were ordered to make their way to Germany. Alone with the things they could carry,
    mother Schiwek and her three sons fled. They were transported in cattle wagons from Sensburg to Waltershausen in Thuringia.
- speaker: Respondent
  text: In their homeland, they were forbidden to speak German. After this oppression, my grandfather was surprised to see
    Germans armed at the border after the lost war. In the former prisoner camp, the refugees were divided into the four zones
    if they had no relatives. The family was picked up by Aunt Emma, the father's sister.
- speaker: Respondent
  text: Through her, the family learned that the father had settled in Western Pomerania. The family reunited in Steinhagen.
    There, they shared an estate with several families and lived off agriculture. My grandfather had not been able to finish
    school in Poland and now worked as a young man on the lands.
- speaker: Respondent
  text: After some time, the father was able to buy a house for the family. He worked at the fire department, and my grandfather
    had the chance to start an apprenticeship as a mechanic. It was a difficult time because most apprentices had started
    their training at 16 and were skilled journeymen by 19. My grandfather began his training at 19 and held a lower rank.
- speaker: Respondent
  text: Due to his great passion for vehicles, he was happy to have passed his journeyman's exam and could now enjoy his new
    freedoms. He met his wife Gerda and had three children with her. Meanwhile, he is a great-grandfather and lives in Stralsund.
