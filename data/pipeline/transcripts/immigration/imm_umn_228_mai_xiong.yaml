collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My mother's story. She was born and raised in a small province in Laos called Xieng Khouang. She lived and grew up
    there until the age of 14 with 6 of her older sisters and 5 of her older brothers.
- speaker: Respondent
  text: As her family ran through the jungle of Laos, 3 of her older brothers passed away due to heavy illnesses and being
    shot at and killed by the militia. My mother wept as she told me this story.
- speaker: Respondent
  text: She said she could always remember the constant screaming of denial and outrageous sobbing from her brothers and sisters
    and the panic of her only mother.
- speaker: Respondent
  text: After leaving 3 of her brothers behind in the unknown forest of Laos, they arrived in Vang Vieng where it was home
    for the next 3 months before having to leave it all over again.
- speaker: Respondent
  text: There in Vang Vieng is where my mother met my father. They both got married at one of my uncle's bamboo and wooden
    homes where they surely celebrated in recognizing my parents' love.
- speaker: Respondent
  text: After a week had passed, they all began to hear about new news of attacks on close villages near where they were staying.
- speaker: Respondent
  text: My parents soon decided to quickly leave and head out west, into Thailand, to seek refuge from the anticipated outcomes.
- speaker: Respondent
  text: Once reaching the refugee camps in Thailand, all the thoughts that my mother could think was a life in the United
    States free of thunderous bomb dropping, earth-shattering motion, and lightning fast bullets.
- speaker: Respondent
  text: As she settled with the few clothes and valuable objects that she had, she began to imagine the stories that her own
    family would get to endure one day.
