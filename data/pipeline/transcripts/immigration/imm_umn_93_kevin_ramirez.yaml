collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My family and I work hard for what we want and really don't give up and we don't take things for granted. We love
    and care for one another and are good people regardless of what people think my culture represents in the US.
- speaker: Respondent
  text: That being said, growing up as a first generation American is a cool and at times annoying experience.
- speaker: Respondent
  text: My Dad immigrated to the US in the mid to late 90's from Honduras via foot, train, car, bike etc. He came with his
    sister Sandra, it took them together roughly 3 ½ months to get here.
- speaker: Respondent
  text: My Mom immigrated to the US at about the same time my dad did and she came from Colombia with her Mom and Brother
    via airplane.
- speaker: Respondent
  text: Growing up for them was fairly different in the sense that my dad and his family didn't really have money and they
    lived in the country. They were also farmers and they were self dependent.
- speaker: Respondent
  text: At the age of 7 he started working in the fields with his dad collecting the full bags of produce and loading them
    up in the trailer for roughly 8-10 hours a day 7 days a week and when it wasn't harvesting season he'd go around San Pedro
    Sula looking for any and all work to get money to support his family.
- speaker: Respondent
  text: Yet his parents were extremely strict with him and raised him right and he shared those lessons with me.
- speaker: Respondent
  text: My mom grew up completely different from my dad because she came from a wealthy Colombian family that owned a large
    chain of furniture stores and she didn't have to work until a couple years after she came to America.
- speaker: Respondent
  text: Yet her family was very strict with her and they made sure she grew up to be a very well respected and liked woman
    which she did grow up to be that.
- speaker: Respondent
  text: They were both raised fairly strict and in sense 'right' which is good because I strongly agree that they raised me
    to be a smart, well behaved polite young man and I am very grateful for that.
- speaker: Respondent
  text: Although having immigrant parents isn't always fun at times, for instance not being able to hang out with people like
    ever and getting spanked for the dumbest things (I don't get spanked anymore) and having to start working at an early
    age and taking up major responsibilities around the house and family.
- speaker: Respondent
  text: Although the upsides are with those responsibilities I learned a lot of things.
- speaker: Respondent
  text: For an average 17 year old, knowing how to drive a truck with 20 foot trailer and knowing how to reverse it is pretty
    beneficial for the work I do with my dad.
- speaker: Respondent
  text: They've taught me how to be street smart and not give in to things and to just be as good of a person that you can
    be because you don't know if you have tomorrow.
- speaker: Respondent
  text: They've taught me how to defend myself both verbally and physically and how to grow whatever you have and make it
    better than before.
- speaker: Respondent
  text: I like that lesson because both my parents had literally nothing when they came to the US and learned and learned
    and when it came time to apply they knew, they did it.
- speaker: Respondent
  text: We have our own company because of that and it is very profitable and we have a large clientele to where we're overbooked
    some weeks!
- speaker: Respondent
  text: My favorite lesson they've taught me is how to cherish the little things because when kids my age no matter the gender,
    ethnicity, religion etc we take our parents hard work for granted and that's wrong.
- speaker: Respondent
  text: My dad comes home at 3 in the morning sometimes with blistered hands yet he'll be up and ready to go out the door
    at 7 in the morning and if my brothers or mom ask for something he doesn't hesitate and he'll get it for us and we've
    learned to appreciate that because not many people are like that.
- speaker: Respondent
  text: When you think of my family and me or people of my race don't think of us as bad people who 'steal' or take other
    people's jobs and just take advantage of the public assistance programs.
- speaker: Respondent
  text: Think of us as hard working, kind people who care for one another and love each other a lot.
