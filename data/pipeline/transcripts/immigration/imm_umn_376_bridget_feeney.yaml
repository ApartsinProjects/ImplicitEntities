collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about Bridget Feeney's early life in Ireland?
- speaker: Respondent
  text: Bridget Feeney grew up in the rural countryside of Ireland. She moved to the U.S. in 1900 to follow in her older sister's
    footsteps and made a life for herself in Boston.
- speaker: Interviewer
  text: What motivated her to move to the United States?
- speaker: Respondent
  text: She was inspired by her older sister who had already moved to the U.S., so she decided to follow her and seek better
    opportunities.
- speaker: Interviewer
  text: How did she establish herself once she arrived in Boston?
- speaker: Respondent
  text: She worked hard to build a life for herself, integrating into the community and finding work that allowed her to support
    herself and eventually her family.
