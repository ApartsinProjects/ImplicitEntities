collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your journey back to Guatemala with your children?
- speaker: Respondent
  text: In 2017, I decided to return to my home country to reunite with long lost friends, a close childhood friend, and family.
    In early 2018, I received news that I would be able to travel home in August. After a few passport and plane ticket complications,
    I was able to secure my family's spot on a plane bound for Guatemala City.
- speaker: Interviewer
  text: What was it like when you arrived back in Guatemala?
- speaker: Respondent
  text: I was shocked to find just how much I had missed, especially the food. Foods such as fiambre, beef soup, and hot fresh
    tamales had definitely been missed. Food has always been a driving force in expressing my culture here in the States.
- speaker: Interviewer
  text: What other aspects of Guatemalan culture do you appreciate?
- speaker: Respondent
  text: I really appreciate the art, which stems from ancient Maya pottery. Nearly 40% of the modern Guatemalan population
    is indigenous Mayan. Handmade pottery in this country has been considered some of the best in the world due to its historical
    significance.
- speaker: Interviewer
  text: What places did you visit during your trip?
- speaker: Respondent
  text: I planned to visit Rio Dulce and Tikal, two very vital historical places in Guatemalan history. I first visited Rio
    Dulce with my family and childhood friend, Hugo, who still lives in Guatemala. We visited the Castle of San Felipe de
    Lara, a Spanish colonial fort at the entrance of Lake Izabal. The fort was built in the early 17th century to protect
    the Port of San Antonio from invading English pirates. The fort is still standing, and we had the time of our lives touring
    it.
- speaker: Interviewer
  text: Tell me about your visit to Tikal.
- speaker: Respondent
  text: Tikal is a beautiful Mayan ruin with five major pyramids, built around 700 AD. It attracts millions of visitors each
    year. This site has significance to me because of my fond memories with my late uncle there. I even recall a monkey named
    Tammy that was caught by my uncle at Tikal and given to me as a gift. Unfortunately, after I left Guatemala, Tammy was
    given to a zoo where she lived out the rest of her life in captivity. Seeing Tikal again with my sons made it even better
    the second time around.
- speaker: Interviewer
  text: What did you do with your sons during the trip?
- speaker: Respondent
  text: Since it was their first time seeing Guatemala and its culture, I took them to Guatemala City. At a population of
    3.7 million, it is the largest city in Central America. We visited many unique tourist spots, including the Guatemalan
    National Palace, which was constructed between 1939 and 1943 and houses Guatemala's Cabinet and 50th President, Mr. Jimmy
    Cabrera. We also saw the oldest Cathedral in Guatemala City, constructed between 1782 and 1871, taking 81 years to complete.
- speaker: Interviewer
  text: Did you see anything else notable during your visit?
- speaker: Respondent
  text: Yes, we saw Volcán de Fuego, a Guatemalan volcano known for constant low-level activity. However, on June 3rd, 2018,
    it erupted, damaging much in its path.
- speaker: Interviewer
  text: How would you describe your journey home overall?
- speaker: Respondent
  text: My journey home was nothing short of spectacular for me and my family. It was a meaningful experience to reconnect
    with my culture and share it with my children.
