collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My newlywed parents arrived in the US during the autumn of 1974 with two suitcases full of fashion forward clothing,
    osenbe (rice crackers) and a set of 30 Japanese encyclopedias.
- speaker: Respondent
  text: My mother immigrated to the US with my father, who was earlier drafted into the US army as a paratrooper in the Vietnam
    War and was now being relocated from Camp Zama in the Kanagawa Prefecture of Japan, to Fort Ord in Marina, California.
- speaker: Respondent
  text: As you'd imagine, my grandparents, who had lived through World War I and II, weren't entirely thrilled about their
    daughter moving to the US with a member of the US army.
- speaker: Respondent
  text: To them, the US was considered an enemy due to the oppressive nature of the Japanese government and the misinformation
    being drilled into its citizens.
- speaker: Respondent
  text: However, their view of the US gradually changed as my mother and father grasped onto opportunity, went to college,
    and worked towards maintaining successful professions.
- speaker: Interviewer
  text: When asked about my grandparent's changing perspective about Japan-US relations, what did your mother say?
- speaker: Respondent
  text: My mother exclaimed, "My parents view of America changed when they saw that I was happy and I was taking every opportunity
    I could get. Isn't that what being a parent is about? Wanting your child to be happy no matter how painful for you it
    is to see them go?"
- speaker: Respondent
  text: My grandmother proceeded to visit the US seven times until the age of 80, especially during the years when I was an
    infant.
- speaker: Respondent
  text: Silly enough though, my mother still holds onto her set of Japanese encyclopedias bestowed upon her by her parents
    during her high school years despite their low income.
- speaker: Interviewer
  text: When asked about the importance of those encyclopedias, what did your mother say?
- speaker: Respondent
  text: She often responds, "Well, I don't want to lose it so I hold onto it. I like to have it; it's nothing dramatic!"
- speaker: Respondent
  text: However, it's easy to see that these books function as a connection back to my mother's roots - to her parents and
    to the land where she grew up.
