collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My great-great grandfather Peter August Adolphson embarked on a remarkably difficult and extraordinary journey to
    the United States in the late 19th century. Peter overcame many challenges in immigrating to the United States, and his
    story of learning a new language, operating a successful business, and raising a family is a remarkable example of an
    immigrant's commitment to realizing the American dream.
- speaker: Respondent
  text: Peter August Adolphson lived in a small, rural community in Smaland, Sweden. Peter was the oldest of seven children
    in a relatively poor family. When Peter turned 18 in 1886, he had a difficult time finding work in Sweden, so he and his
    family decided that it was in everyone's best interest if he emigrated to America to pursue greater opportunities.
- speaker: Respondent
  text: This farewell must have been a difficult one for Peter and his family because they knew they would likely never see
    each other again, since travel was extremely slow and expensive at the time.
- speaker: Respondent
  text: Peter came to America on a pre-paid ticket from his uncle, Frank Holmberg, who had been living in America for a few
    years. Peter traveled by ship from Sweden to England then to Quebec and then finally to Chicago, Illinois.
- speaker: Respondent
  text: Once in America, Peter was advised to change the spelling of his last name to Adolphson with just one "s" to better
    conform to American society's expectations about assimilation.
- speaker: Respondent
  text: After spending some time in Chicago, Peter heard of many Swedish immigrants settling in southern Minnesota. With a
    new last name, speaking no English, and not knowing anyone, my great-great grandfather Peter Adolphson made his way to
    southern Minnesota and finally settled down in the small town of St. Peter.
- speaker: Respondent
  text: Back home in Sweden, Peter's father owned and operated a small shoe shop, and he passed his knowledge onto Peter.
    This skill came in handy for Peter when he tried to find work in America.
- speaker: Respondent
  text: After 43 years of hard work at a small shoe store in St. Peter, Peter Adolphson became the owner and operator of the
    store in 1933 at the height of the great depression.
- speaker: Respondent
  text: Peter named the store "Adolphson shoes" and ran the business with the help of his son Albin.
- speaker: Respondent
  text: Peter even reunited with some of his family members as his brother Andrew and sisters Esther and Jenny joined him
    in settling southern Minnesota.
- speaker: Respondent
  text: Peter's brother Andrew was an employee at the store and he became co-owner with Peter's son Albin when Peter passed
    away in 1943.
- speaker: Respondent
  text: Andrew and Albin continued to operate Adolphson Shoes until the store closed in 1965.
- speaker: Respondent
  text: Peter was happily married to his wife Anna for 51 years. They raised 4 children together, all of whom attended Gustavus
    Adolphus College, which is the college I attend today.
- speaker: Respondent
  text: Gustavus owns a house named the "Adolphson House" which is named after Peter and his relatives, that is available
    for students to live in every year.
- speaker: Respondent
  text: Peter Adolphson learned a new language, operated a successful business, and raised a family in a new country.
- speaker: Respondent
  text: Peter had a tremendous amount of patience and a strong work ethic which helped him overcome numerous challenges on
    his journey to the United States.
- speaker: Respondent
  text: Peter's values of hard work and patience are still evident today in St. Peter and in my family.
- speaker: Respondent
  text: His story, like many others then and now, is a great example of the American dream.
