collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is November. I was born in Mae Ra Moe refugee camp in Thailand. In 2011 my mom applied to come to the U.S
    to look for new opportunities. A month later we got a permission slip that said we can go to the U.S. On our way to the
    airport we had to carry an IOM bag that the staff gave us. When we were on the bus the whole thing was quiet. No one was
    talking. After we got off the bus we had to walk like 5 minutes to the airport. My family didn't know how to speak Thai
    so it was difficult for us. We didn't know where to go and the security called an interpreter for us that could speak
    Burmese. When the interpreter arrived my mom started to ask him where to go. He had a conversation with my mom, and then
    he told us to run to the airport. Maybe we didn't have much time left. And he ran too. I wondered why didn't he wait for
    us. My mom's shoe fell off and she couldn't run anymore. I knew my mom was exhausted, so I ran as fast as I can to catch
    the interpreter guy. I tried to tell him my mom was exhausted, but he yelled at me to keep running. I pulled his hand
    and grabbed his shirt and showed him where my mom was. With a loud and nervous voice I told him, "Do you not see her?
    She cannot run anymore!" But he just turned back around and started to run again. He didn't give a damn about us at all.
    We tried to walk slowly for our mother so she wouldn't feel dizzy and exhausted. Fortunately we still got on the plane
    on time. When the plane went up I felt like I'm in a peaceful world because there was nothing around me. I didn't have
    to worry about people who was not helpful to me. When we arrived to Minnesota on the first night, I felt like I wanted
    to go back to Thailand because I left a lot of things behind like my best friend and my dog. When I started to realize
    that I couldn't go back, I decided to build my American dream here in the United States. I started to go to school and
    meet a lot of people. Some of them are dissimilar for me, but we get along very well. I know I can make friends without
    difficulty, even though whose languages I didn't know how to speak. Now I'm very proud of myself that I get to talk about
    my journey and I am [in audible]. As you can see, I'm in eleventh grade without worries for a single thing. I'm ready
    for anything that comes along.
