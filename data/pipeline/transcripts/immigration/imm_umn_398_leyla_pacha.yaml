collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Nací en el 2007 y crecí durante mis 14 años en Ecuador, provincia de Imbabura, en una casa cerca de mis abuelos y
    algunos tíos con los que convivía todos los días. Mi vida era feliz porque me gustaba vivir allí, siempre salía con mis
    amigos y estaba con las personas que quiero. La escuela en la que estudiaba era muy grande y con muchos espacios verdes,
    había una granja y podías elegir la especialidad de industrialización de alimentos donde cocinabas.
- speaker: Respondent
  text: Mi mamá era comerciante y salía a trabajar todos los días en una plaza, mientras que mis hermanas y yo íbamos a estudiar
    en una escuela a 20 minutos de mi casa. Me fui de mi país porque mi mamá se estaba quedando sin trabajo, la economía allí
    se volvió mala, todo subió de precio y habían muchas protestas gracias al último presidente de Ecuador.
- speaker: Respondent
  text: Mi mamá tomó la decisión de irnos y viajamos en un bus desde mi casa hasta la frontera de Colombia para iniciar el
    viaje país por país hasta llegar a Estados Unidos. Vino conmigo mi mamá, mis dos hermanas, mi tía, mis dos primos pequeños
    y una amiga de mi mamá.
- speaker: Respondent
  text: Dejé en Ecuador a mis abuelos, mis demás tíos, primos, amigos y animales porque ellos están acostumbrados allá y no
    tenían necesidad de venir, además no podía llevar mascotas. Traje conmigo pocas cosas como mi maleta y celular y dejé
    toda mi ropa y todas las cosas de mi casa porque eran muchas cosas pesadas como para traerlas.
- speaker: Respondent
  text: Me sentí muy triste y un poco enojada porque no quería dejar toda mi vida allá y fue una decisión que mi mamá tomó
    sin mucho tiempo, así que no me pude despedir de algunas personas. Al final tu país originario siempre será tu lugar seguro
    y siempre encontrarás estabilidad donde sea que estés.
- speaker: Respondent
  text: Este país es diferente al mío porque aquí no conozco a casi nadie, es un lugar donde hay demasiados edificios y grandes
    lugares, también hay diferentes nacionalidades y culturas y se habla más el inglés que el español. El transporte también
    fue algo muy confuso para mí cuando llegué a este país porque al entrar al tren, sentía como si estuviera en un túnel
    sin salida, sin saber a dónde ir.
- speaker: Respondent
  text: Me gusta estar aquí porque es un país que tiene lugares hermosos al que ir, nueva gente que puedo conocer, nuevas
    oportunidades y un buen futuro. Es como un viaje de vacaciones largo que siempre quise pero a veces extraño mi país y
    todo lo que tenía allá.
