collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: What were the first things you noticed when moving to America?
- speaker: Respondent
  text: So many people had so many inaccurate assumptions about Canada. I immediately noticed that living in the South alone
    was very different. The biggest transitions were the accents, seeing the Confederate flag in every direction I looked,
    and the overwhelming presence of guns and weapons.
- speaker: Interviewer
  text: Can you tell me more about your experiences with weapons and how that compared to Canada?
- speaker: Respondent
  text: Before coming to America, I had only ever seen the Confederate flag in textbooks and only ever seen a firearm on the
    hip of a police officer. I was shocked when a girl at work had pepper spray on her keychain. Weapons are not that prevalent
    in Canada, so it was a shock to see them so socially accepted here.
- speaker: Interviewer
  text: How long have you been in the United States and what are your plans?
- speaker: Respondent
  text: I've been in the United States for going on six years, and I plan to stay as long as my visa gets approved. I've formed
    many relationships here and plan to continue those and seek a teaching opportunity in the States. The American dollar
    is worth more, so staying here to work just makes sense for me.
- speaker: Interviewer
  text: How do you maintain your relationship with your family back in Canada?
- speaker: Respondent
  text: My mom, dad, and brother still live in Toronto and I have an extremely close relationship with them. It's difficult
    that we are so physically far from each other, and shipping anything across the border is even more expensive than normal.
    I'm counting down the days until they get to come to my graduate school graduation in May of 2019.
- speaker: Interviewer
  text: What advice would you give to someone who is befriending an immigrant about what to say or not say?
- speaker: Respondent
  text: Educate yourselves. Some of the most offensive comments I have received have been simply from a lack of knowledge
    about my culture and where I am from. People who aren't from here work really hard to get a visa and legally be here,
    so that should be respected in itself. America claims to be very welcoming, but I have been in clear instances where they
    are not.
- speaker: Interviewer
  text: What do you think your story teaches about cultural differences between Canada and the United States?
- speaker: Respondent
  text: Just because we are not far from another country physically, that does not mean our cultures are not drastically different.
    The little things I point out are things that most Americans see as normal and just a part of daily life. Not that American
    culture is any less than any other, but some of the significant things I noticed should work as a wake-up signal to how
    the United States is viewed from the outside.
