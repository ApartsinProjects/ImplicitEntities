collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Yel T. Paw. I'm 16 years old and I came from Thailand in 2000, about 8 or 9 years ago. My parents were
    born in Burma. They went through a lot of struggles to get to where they are now. Before I was born my parents had to
    accept a hard life from the Burman soldiers. In Burma there were lots of dangers.
- speaker: Respondent
  text: One day my parents decided to move to the United States because in Thailand it was hard to find jobs, and it was hard
    to build a life there. They were worried about a lot of things. Because in my parents' generation they couldn't go to
    school. They had to work all day in the hot sun even though they wanted to go to school.
- speaker: Respondent
  text: My parents moved to the United States because they wanted their children to get educated and have more opportunities
    for good things.
- speaker: Respondent
  text: When I first came to the United States I struggled a lot because I didn't know anything about life in America. I was
    worried that I didn't know anybody. I worried that people might laugh at me when I did something wrong.
- speaker: Respondent
  text: Right now my parents don't know any of the English words and they have to go work every day. Every morning they work
    because they have to feed us and take care of us. It's hard for them. And that is why we are here.
- speaker: Respondent
  text: Nowhere we have a nice place, nice school, and everything is like amazing. I feel like I'm in heaven.
