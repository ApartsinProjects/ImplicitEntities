collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My life and that of my family is in Minnesota today, but like most other immigrants and refugees my pathway to Minnesota
    began far away. It is this picture of me in a refugee camp that really describes my pathway to Minnesota. My family and
    I settled in other areas such as Kenya, Tanzania and Ethiopia. However, Banadir refugee camp holds my childhood memories.
- speaker: Respondent
  text: This particular place holds my childhood memory because I do not remember anything from Somalia. The most memorable
    event that happened in this camp has always been told by my elders. It was in 1997; I was six years old. I remember our
    mom went to the market around 1:00pm and having ate lunch my aunt asked us to take naps.
- speaker: Respondent
  text: 'Surely after considering the fact that our tent was located at the edge of the camp we saw many people running and
    shouting, "Fire!" from afar. Although it was not visible from our side, there was evidence of black smoke that covered
    half of the camp. Fortunately we escaped the fire but we lost everything: food, clothing, our tent, and mostly our memories
    including pictures.'
- speaker: Respondent
  text: This picture was taken hours after the fire wore off. Some were fortunate to grabbing the first thing they could carry
    with them. Others, like my family, lost everything, and many lost their lives in the fire. This experience has been a
    memorable event that I will never forget. We have been fortunate enough to have lived through such an event and to be
    able to look back today and still be thankful.
- speaker: Respondent
  text: The saddest memory about this picture of a refugee camp is the fact that I grew up without a place to call home. Today,
    living in Minnesota is the best memory I can share. I can say that my younger siblings have their own place to call home.
