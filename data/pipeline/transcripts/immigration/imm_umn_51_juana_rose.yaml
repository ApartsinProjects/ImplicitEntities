collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Juana Rosa. I'm from the Dominican Republic. My life in my home country was very stressful. Although my
    country is very beautiful it is hard for single mothers to keep their children. In general I miss my land. I arrived 3
    months ago and during this time the life of my children has mainly changed very positively. My life has been harder because
    I have had to get used to the new way of life here in the United States. The language has been a factor that has held
    me back a lot since I had to start from scratch. Even though my parents and my sister live here, I miss my uncles and
    cousins a lot. In my country, I was a teacher, which is something that I did with a lot of love. I cannot here because
    of the language barrier. In spite of this it is an opportunity to improve my life.
