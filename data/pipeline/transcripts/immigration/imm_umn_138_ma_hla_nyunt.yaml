collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Ma Hla Nyunt. I am from Burma and I speak Karen. I lived in a Thai refugee camp for a long time. Every
    day in the refugee camp, I took care of my kids, and worked as a volunteer at the nursery school. Sometimes I felt sad
    about my life. In our refugee camp, adults and married people can't attend school. Also, you can't find a job outside
    the refugee camp. This is why I felt sad sometimes.
- speaker: Respondent
  text: One day, I talked to my husband about moving to the United States. I applied to be a refugee and my husband allowed
    me to immigrate to the U.S. with my two kids, but he didn't come with me.
- speaker: Respondent
  text: After I arrived in the United States, I decided to go to school. That was my first start. I wanted to learn English
    and get a better job like some people do. I didn't want to just stay home and take care of my kids.
- speaker: Respondent
  text: That's how I lived in the Thai refugee camp. I realized that my life will never change if I don't think about doing
    different things. That is why I am here, to improve my English and study hard. My dream is to become an early childhood
    education teacher.
