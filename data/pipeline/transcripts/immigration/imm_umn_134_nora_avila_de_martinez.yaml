collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hello. My name is Nora Martinez. I am from Mexico. On December 24, 1998 my husband and I we took the decision to move
    to Minnesota, looking for a better future.
- speaker: Respondent
  text: On Christmas Eve, we came to St. Paul, Minnesota and started our life together, far away from our families.
- speaker: Respondent
  text: It was a tough decision, but we needed to keep moving forward for our children, looking for better opportunities,
    better life.
- speaker: Respondent
  text: We do miss a lot of our family members but we need to keep moving.
- speaker: Respondent
  text: These days, when I decided to move to Minnesota, I brought with me something very special, which is my wedding dress.
- speaker: Respondent
  text: My wedding dress is very special because it was designed by my mother and her best friend.
- speaker: Respondent
  text: They worked a lot on it. They made it special for me.
- speaker: Respondent
  text: It might not cost a lot for others, for me it means a lot and it's worth a lot because every single thing that was
    sewed on it, it was sewed by my mother's hand.
- speaker: Respondent
  text: So this dress is very special for me.
- speaker: Respondent
  text: And I hope that one day, one of my daughters can wear it on their wedding day.
