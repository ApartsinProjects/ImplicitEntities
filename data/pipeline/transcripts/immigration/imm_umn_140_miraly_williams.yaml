collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in the province of Cebu in the Philippines. I met my future husband, an American, on Yahoo! Chat. He came
    to visit me in the Philippines in September 2006. We decided to get married and it was a year before my paperwork was
    processed. I came to the United States on July 19, 2008 and we got married soon after.
- speaker: Respondent
  text: I grew up in Guanbacil Cebu, Philippines with my parents. My life before I came to the United States was just simple
    and ordinary. I am a person who always wanted to help my family.
- speaker: Respondent
  text: I took the flight alone for more than 22 hours. The reason why I came to the United States was to be with my husband
    and to seek a better future.
- speaker: Respondent
  text: When I came to the United States I also brought my luggage, passport, and my documents as proof that I am not a terrorist.
    All my things I left with my sisters because I know one day I can get all those kinds of things back.
- speaker: Respondent
  text: When I moved to Minnesota, I left my family and friends behind. Now, I live in West St. Paul, Minnesota because my
    husband lives here.
- speaker: Respondent
  text: Today I will share with all of you the photographs that always move my heart. These pictures that I have above are
    important to me because they are the first pictures that my husband and I took together. These pictures remind me of the
    first time we met in September 2006.
- speaker: Respondent
  text: These pictures show that he met everything he said about coming to the Philippines to see me. When I look at these
    pictures above, it will always remind me about how my husband brought my family together, especially my dad.
- speaker: Respondent
  text: When I look at these pictures, I remember my dad telling me how much he loves us. Even though he doesn't show it to
    us, deep inside he always will.
- speaker: Respondent
  text: Seeing this picture of Super Ferry reminds me of the time I traveled with my parents to the capital of the Philippines.
    It was after my husband left, and I was going to do my visa interview and my medical examinations.
- speaker: Respondent
  text: My parents gave me the strength to pass both of these things. When I was doing these things, my parents also took
    the chance to visit all the relatives that they had not seen for many years.
- speaker: Respondent
  text: These pictures remind me of the people who tried to bring me down, and all the criticism that I could never do it.
    Today, when I look at these pictures, I have a big smile on my face while thinking about these words because I made it
    this far.
- speaker: Respondent
  text: This picture shows that no matter how far you are from your loved ones, as long as you have faith, trust, and love
    for each other, you will make it.
- speaker: Respondent
  text: Now, I have become a citizen of the United States and I have a stable job as a certified manager so I can support
    my family. I am thankful for the people who inspire me and the people who have helped me to get this far.
