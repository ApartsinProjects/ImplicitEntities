collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Somalia. I studied middle school eight years in Somalia before civil war. I have eight kids in Somalia.
    My country civil war, 1991. My family come in Kenya, 1991. When I was Kenya, seven kids. Ali he died in Somalia. Now,
    twelve kids. I live in Kenya 14 years.
- speaker: Respondent
  text: My son Shermake get out America 1992 and he sent every month money. $200. My process start in 2000 and they checked
    my health every year in Nairobi for four years. I came to America July 7, 2005.
- speaker: Respondent
  text: I had my mother's picture with me to help me remember her and help me to memory her idea about education. I keep the
    picture with me always. When I come to America carried African clothes and this picture.
- speaker: Respondent
  text: I have four kids in the school. My daughter in college. My son is graduated Lincoln High School. My son South High
    School senior. My son Sanford Middle School. Now I study English at home.
- speaker: Respondent
  text: My picture of my mother is not on the wall. I keep it suitcase with other important about memories from Somalia. My
    mother's name Asha Ali. My mother no school in Somalia. She has a business selling clothes and animals, goat and sheep.
- speaker: Respondent
  text: When I look picture of my mom, I love my mom. [Says "I love my mom" in Somali.]
