collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi, my name is Anna Xiong. I am going to talk about my father's basket. My parents lived in Laos. My parents didn't
    go to the United States because they might thought something would happen to us. A few Hmong people came to the United
    States and several of them came to live in Thailand. I was born in Thailand. My parents - we came to the United States
    in 2004.
- speaker: Respondent
  text: There were many types of bamboo baskets to carry. My father loved to make bamboo baskets. He always makes them for
    my mom and I. We carried those baskets behind our backs to go to a farm. Often, its contents were grain and pieces of
    wood on her back. The basket comes with everything. Without it, we can't hold everything in his hands.
- speaker: Respondent
  text: My father and his siblings loved to make baskets for their wives. They gather around to take turns to help each other.
    They can finish quickly. My father had been taught to make the baskets since he was a kid.
- speaker: Respondent
  text: My mom always put chicken wrapped with banana leaves and some chile pepper put in the basket. My father loves spicy
    food so much.
- speaker: Respondent
  text: The husbands made baskets to carry things. The wives sewed paj ntaub to earn money for their family. When we were
    in Thailand, my mom taught me how to sew paj ntaub. I can make more money to help my parents. Hmong people only paid twenty
    dollars for it.
- speaker: Respondent
  text: The basket is still important today. We still use the basket to show the audience what it does. We want the new generation
    to learn about it. In Hmong New Year, some girls dance with the baskets and dance with them.
