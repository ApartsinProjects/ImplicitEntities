collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: There were children coming from school. And they were so sloppy looking. I thought they were orphans or something.
    I had visions of beautiful ribbons on their hair and the kids didn't have uniforms or anything. Then we got out at, we
    came up to 63rd Street and then they, the streets were so dirty. Garbage all around the place and I couldn't get here
    fast enough, that everything was so beautiful and clean and all this. But it, I soon broke in with the whole thing.
