collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Moving to the United States has always been my dream. Matter of fact, it is a dream come true. I was born in Nairobi,
    Kenya in December 9th 1990. I am the last born of 5 children that includes 3 handsome brothers and 1 beautiful sister.
    My family calls me Bill.
- speaker: Respondent
  text: When I was six months old, my mother got an opportunity that saw her moving to the United States by herself. The immigration
    laws must have been too strict, that she was not able to carry a six month old baby along with her.
- speaker: Respondent
  text: According to the African culture, raising a child is not just a parental responsibility, but the whole community is
    involved as well, as it was in my case. I grew up around so many uncles and aunts, who would not hesitate to smack my
    behind if I seemed to lose my direction. My family was there to celebrate all my birthdays, as they watched me grow.
- speaker: Respondent
  text: Even when we were worlds apart with my mom, she would still send me lots of gifts, letters, and voice recordings on
    tapes which would play her voice, expressing her unconditional love for me. These were followed by constant phone calls
    that always checked on us.
- speaker: Respondent
  text: My mom made her first trip back to Kenya when I was 9 years old. It was such an emotional moment for her, more than
    it was for me, when we first hugged each other. That must have been the very best moment of my life.
- speaker: Respondent
  text: After my mom's visit, my siblings moved to the United States at different times. This was a happy moment for me, and
    at the same time sad. It was happy because I would be getting even more gifts and attention, at the same time it was going
    to be sad because I would miss them.
- speaker: Respondent
  text: In the winter of 2012, I moved to the United States for school. That was the first Christmas that we were all united
    as siblings in my mother's house in Virginia. As a tradition, lots of African and American food were prepared.
- speaker: Respondent
  text: I was able to start college in the Spring of 2013 at Minneapolis Community and Technical College. One of the main
    challenges I faced was the cold winters. My brothers tease me now, that I can survive in any weather, since I survived
    in the Minnesota cold.
- speaker: Respondent
  text: A year later, in the winter of 2012, I lost my mom to a battle of cancer. I am still grateful because she had nurtured
    my brothers and sister in her special ways, hence I still get to see her presence in each and every one of them.
- speaker: Respondent
  text: They are all settled with good jobs and family, and all play a major role in supporting me in my education. I am now
    in junior year in the University of Minnesota, pursuing a degree in Computer Science.
- speaker: Respondent
  text: I hope to graduate and start an IT company back in Kenya, where I will be able to help the less fortunate children
    by funding for their education so that they would be able to achieve their dreams as well.
