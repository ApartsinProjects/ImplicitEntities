collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Everyone holds a goal or a dream when they come to America. Some people are here to meet new friends; some are here
    to work; and some are here to study. While everyone has diverse objectives, they're all here for some reasons, just like
    me. I am here to pursue my unattainable, but greatly desired ultimate dream, to become a surgeon in the U.S.
- speaker: Respondent
  text: I was born and raised in Hong Kong, and flew across the Pacific Ocean to Washington state three years ago. That is
    the beginning chapter of my journey. The pathway to achieve my goal is definitely harsh and bitter. First of all, language
    is a barrier. This is probably the most irritating thing that I am still struggling with.
- speaker: Respondent
  text: To be honest, I was a lazy student back in high school. I slept on the desk during class and missed all the homework,
    and needless to say, my exam results were predictably awful. As a student who was used to neglecting homework and who
    chilled with friends all day and night, the decision to study medicine has brought me to a point that I have to study
    twice as hard as other students who also have the same goal as me in order to keep up the school work.
- speaker: Respondent
  text: Actually, my friends in Hong Kong and here in America were all so surprised when they heard about my changes, but
    they supported my decision and encouraged my effort by sending me warm messages.
- speaker: Respondent
  text: During the three years I spent in Washington, I volunteered at a hospital because I believed it would give me a chance
    to understand clearly what exactly being a doctor is. Although I wasn't qualified to work as an assistant, helping directly
    with the medical staff as a receptionist has brought me some experiences that I never thought I would encounter before.
- speaker: Respondent
  text: I remembered one embarrassing moment on the first day of my work when a call was dialed to my working desk. A doctor
    had just finished taking a blood sample from a patient and needed a volunteer to carry it to the laboratory for analysis.
    After she finished her last word, I was sweating! I couldn't understand a word of what she asked me to do, and all I could
    do at that time was to have her repeat and repeat her sentences.
- speaker: Respondent
  text: Although she was patient and nice, I believed she was getting tired of repeating her sentences six times, so she asked
    me to pass the phone to my co-worker. He eventually completed what he was asked to do by listening to the doctor's request
    at once.
- speaker: Respondent
  text: Even though my co-worker tried to cheer me up and encourage my first effort, that incident really upset me. But I
    didn't give up and I tried my best to adapt to the working environment. Eventually, I became independent without asking
    for assistance from my co-workers. I became proud to say I was one of the volunteers at that hospital.
- speaker: Respondent
  text: These three years, I have met so many friends from all over the world. Although we all have different dreams, we recognize
    and support each other all the time. Such friendship wouldn't be acquired if I didn't decide to pursue my dream in America.
- speaker: Respondent
  text: The road to be a surgeon is rugged and difficult, but it is also exciting and wonderful.
