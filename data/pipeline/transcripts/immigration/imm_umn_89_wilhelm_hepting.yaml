collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: In the fall of 1918 a wave of Spanish Influenza swept over Canada, attacking young Wilhelm, a boy on a German Lutheran
    farm in Manitoba, Canada, causing him to become ill with double pneumonia.
- speaker: Respondent
  text: For twenty days the town doctor came to their home. On the final day as the doctor was leaving he gave the young Wilhelm
    no more than twenty minutes to live.
- speaker: Respondent
  text: In an effort of final desperation his father poured a teaspoon of kerosene oil down his throat to clear his lungs
    and normalize his breathing.
- speaker: Respondent
  text: Somehow the remedy worked, and though sickly and weighing below 85 pounds Wilhelm recovered.
- speaker: Respondent
  text: While ill, Wilhelm made a secret pact in order for a full recovery.
- speaker: Respondent
  text: Coming from a strongly religious German Lutheran community, Wilhelm pleaded with God that if he was graced with a
    full recovery he would devote his life to God, as he said, preferably through ministry.
- speaker: Respondent
  text: This pact remained essentially secret, until 1922 when Pastor Swechmann from Edmonton, Alberta visited the local parish
    one Sunday and preached the need for ministers.
- speaker: Respondent
  text: That day Wilhelm Hepting and his cousin Henry Fry made an agreement to both become pastors.
- speaker: Respondent
  text: After some deliberation with their families and the local pastor, it was agreed that the boys, at that point 19 and
    20 years old, would travel south of the border to Saint Paul, Minnesota to attend Concordia College.
- speaker: Respondent
  text: It took several hours of exchange with the US immigration office to convince the official there that they truly were
    going to the US to become ministers and not something more sinister.
- speaker: Respondent
  text: After one train and one cab, the two cousins were in Saint Paul.
- speaker: Respondent
  text: A diary from his schooling years in 1928 reveals a message, as Wilhelm later in his life would reiterate, that his
    migration was driven by a sense of vocation and religious belief.
- speaker: Respondent
  text: Many of the entries speak about his training or ventures to different religious functions.
- speaker: Respondent
  text: Sports and physical activity also dominated his writings.
- speaker: Respondent
  text: As he wrote in his remembrance of Athletics at Concordia, do not ruin your body through neglect of exercise; much
    less neglect your studies and overemphasize your athletics.
- speaker: Respondent
  text: Wilhelm Hepting was my great-grandfather through my father's mother.
- speaker: Respondent
  text: His immigration marks part of my own family's, thus my own, immigration history.
- speaker: Respondent
  text: This immigration story has greatly shaped my family's lives, as my grandmother too went into Lutheran ministry through
    teaching and my father has spent much of his life focused on sport and religion.
- speaker: Respondent
  text: But further, it illustrates to me how migrations and migration history have shaped and informed the lives of all Americans.
- speaker: Respondent
  text: The migration decision and experiences of Wilhelm not only affected his life, but subsequently affected the location,
    culture, and ideals that my family embraced.
- speaker: Respondent
  text: This is not only Wilhelm Hepting's immigration story, but also mine.
