collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Moo Hay Tha Say. I was just a refugee from Thailand. Before my family moved to Thailand, my family and
    my Karen people went through some difficult things in Burma. The Burmese soldiers didn't like us. They wanted us to get
    out of Burma. My family and my Karen people started to run. We were just looking for a better place to live.
- speaker: Respondent
  text: I saw them running, I saw the houses were glowing. I heard gunshots, I heard people screaming and yelling for help.
    I could smell the smoke because the Burmese soldiers were burning down our villages.
- speaker: Respondent
  text: It took time to travel from Burma to Thailand. When we saw the Burmese soldiers, we started to pack up our stuff and
    started to run. When we got to another place that would be safe for us to sleep, we would start to build a small house
    so we could sleep in it.
- speaker: Respondent
  text: I didn't really smell any sweet foods. I was on my mom's back. It felt soft. It was slippery when it was raining but
    it was okay when it is not raining. The weather was fine there. It was not too cold and not too hot.
- speaker: Respondent
  text: I could already walk at that time, but my mom was carrying me all the time. We didn't have a lot food to eat, no foods
    that were sour, no foods that were spicy and no salts, so everything was tasteless.
- speaker: Respondent
  text: My family and my Karen people never stopped running and never gave up. We were just looking for a place that our Karen
    people could call "home." A lot of them got injured, a lot of them made it and some didn't.
- speaker: Respondent
  text: We made it to Thailand and my family lived there about a year before moving to the US. There are a lot of Karen people
    who are still running for their lives. Now I see that my Karen people live in many different places because of the Burmese
    soldiers.
