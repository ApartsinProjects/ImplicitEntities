collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My aunt Crystal came to US in 1995. She was originally from Yunnan China. Her hometown was Lijiang. Lijiang is a prefecture-level
    city in the northwest of Yunnan province in China. Lijiang is famous because of the Old Town.
- speaker: Respondent
  text: The Lijiang Old Town is famous for its orderly system of waterways and bridges. My aunt owned a bar in Old Town of
    Lijiang. The world famous Old Town of Lijiang is a UNESCO Heritage Site. It also was where she met her husband.
- speaker: Respondent
  text: My aunt Crystal was a famous singer in her hometown. She also sung in her own bar. Her husband fell in love with her
    because of her beautiful voice.
- speaker: Respondent
  text: My aunt Crystal is Nakhi people that are an ethnic group inhabiting the foothills of Himalayas in the northwest part
    of China. I am Nakhi people too.
- speaker: Respondent
  text: My aunt Crystal met her husband at Lijiang in 1993. She married my uncle Ben in 1995. My uncle Ben was an American
    colonel. My uncle Ben was my aunt's second husband. My uncle was from Seattle, Washington.
- speaker: Respondent
  text: Since my aunt married my uncle, she came to U.S. with her husband. They settled down in a small county in Seattle.
    Now, they have lived in Seattle for 20 years.
- speaker: Respondent
  text: Her eldest daughter moved to Seattle 10 years ago. Now, her eldest daughter Cindy has graduated from Seattle community
    college, and she works for an accounting firm in Seattle.
- speaker: Respondent
  text: Cindy recently married her husband, who is a Chinese that immigrated to U.S. They had their little girl, Taylor, in
    1998. Taylor now is a high school student in Seattle.
- speaker: Respondent
  text: Crystal got her green card 19 years ago. Now, she came back to China once 5 years. My aunt said she doesn't want to
    be a citizen of America because she goes back home frequently, and she doesn't want to apply for China visa.
- speaker: Respondent
  text: Now, my uncle Ben has retired from military. And my aunt works for Seattle Ensemble of Songs and Dances as a singer.
    Their mission is to promote Chinese indigenous culture and arts overseas.
- speaker: Respondent
  text: So, she has many shows in one year, and she is enjoying it. They have happy lives now.
