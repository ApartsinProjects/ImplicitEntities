collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in the Philippines, in Bacolod City, Negros Island August 26, 1943. I was 19 years old, in February 1962.
    I arrived in San Francisco. I was going to school in Bacolod run by the Christian brothers, and they had a lot of influence
    on me. They spoke English in school and the only way to improve myself at that time was just to get out of, you know,
    where I was. And I had a lot of encouragement from them, the school. Even at that time, the schools were using American
    books, run by the Christian brothers, the same books they had in California. I was lucky in that way. But it was a very
    expensive school. The only way I could stay in that school was to work for my tuition. So I did that. So, I was working
    since I was nine. I never had a summer vacation. When the school ends, the next day I'm working. I work till the school
    opens again. That was—you know, I didn't know any better. Yes, it was a hard life, but that was the sacrifice I had to
    do to be in this great school. So I think it's paid off. You know, immigrants are always looking for a better life. Immigrants
    we work hard to achieve that. You know, they sacrifice. The ultimate goals of immigrants I think, I'm one of them, that
    the ultimate goal is all about the kids. To have the kids have a better life. Immigrants sacrifice themselves for the
    kids to have a better education, to have a better life, that's all it was; I mean for us. So in some ways, like for me,
    I accomplished that. With all the kids went to college, had a profession. Yeah. Yeah, that's the accomplishment. Yeah,
    it's done, you know. It's done. So anything above that is extra.
