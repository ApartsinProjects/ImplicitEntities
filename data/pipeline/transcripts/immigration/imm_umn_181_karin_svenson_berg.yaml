collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My parents named me Karin after my Swedish great-grandmother, Karin Svenson Berg. Karin was my mother's father's mother
    or in Swedish, my mor far mor. My mother told me a wonderful story about how Karin came to America. In the late 1800s
    she was a University of Lund educated woman who was teaching school in her home town of Osbi.
- speaker: Respondent
  text: Karin was engaged to be married to Andrew Berg, a young man from Osbi who had previously immigrated to America with
    his brother Nils. Karin and Andrew corresponded, and the plan was for Karin to join Andrew in America where they could
    be married. Sadly Andrew died here in Minnesota before Karin could come over.
- speaker: Respondent
  text: Nils was going through Andrew's letters and found the correspondence between Andrew and Karin. Though Nils and Karin
    had never met, Nils wrote to Karin and said, "If you still want to come to America you can come over and marry me." Karin
    agreed. She travelled alone, first by steamship and then by train to Mora, Minnesota.
- speaker: Respondent
  text: Nils met her at the train depot and they were married at the Kanabec County courthouse. From there they travelled
    on horseback to Nils' home in Wahkon, Minnesota, which is about 30 miles northwest of Mora. My grandfather Arthur Berg,
    their only child, was born in 1903. Karin and Nils lived in Wahkon the rest of their lives.
- speaker: Respondent
  text: After my mother died I found a box among her things, a tin box from the 1800s that had been Karin's. When I opened
    the box I found several things, but among those things was a tiny box with Andrew's picture in it. Karin had never forgotten
    her first love. They grew up in the same town in Osbi. That's how I am sure she met Andrew, but she had never met his
    brother Nils, so that's just an amazing story.
- speaker: Respondent
  text: I wouldn't be here today if they hadn't met and married. My mother gave me many things that Karin brought from Sweden,
    including the basket box that she carried with her on the boat from Sweden to America, which I have. She had written her
    name, painted her name, Karin Svenson, on the front.
- speaker: Respondent
  text: I also have, which my mother gave me, an egg coddler set, a six silver set, which Karin's school children in 1902,
    the year she left Sweden, had given her and inscribed on that egg coddler set is "from grateful school children to their
    teacher Karin Svenson." And it has the date of 1902.
- speaker: Respondent
  text: They also gave her, which my mother gave me, a silver decorative chalice that also has the engraving on it, that same
    engraving. She also brought with her many things, but also things that reminded her of home, because I think as she was
    leaving she knew that she would never go back.
- speaker: Respondent
  text: Family is important to us, as I am sure it is to many people, and our immigrant story is one wonderful, fun, and amazing
    story. So I love to pass that on to my children and I appreciate the opportunity to pass it on to everyone.
