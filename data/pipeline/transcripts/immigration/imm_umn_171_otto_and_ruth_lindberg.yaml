collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your great-great-grandparents' immigration story from Sweden to Minnesota?
- speaker: Respondent
  text: Otto Lindberg was born in 1885 in Värmland, and Ruth was born in 1886 in Småland. They both came to Minnesota in 1904,
    but they did not know each other before immigrating. They met at the Swedish Tabernacle Church in downtown Minneapolis,
    where Otto sang in the choir, and they married soon after.
- speaker: Interviewer
  text: What do you know about their family and how they maintained their Swedish heritage?
- speaker: Respondent
  text: Otto and Ruth had two children, including my great-grandmother Katherine, who was born in 1920. Although she was born
    in Minnesota, my great-grandmother's Swedish roots were an extremely important part of her life. She grew up speaking
    Swedish, and everyone in my family called her Mormor, which means grandmother in Swedish. Some of Mormor's extended family
    on her mother's side still live in Sweden, and she often traveled there to visit them.
- speaker: Interviewer
  text: How did your great-grandmother contribute to preserving Swedish culture in your family?
- speaker: Respondent
  text: Mormor was a strong supporter of the American Swedish Institute in Minneapolis, and one of its rooms is even named
    after her. She was a strong presence in my life until her death in 2012, and she constantly ensured that my family remembered
    our Swedish culture. The emphasis that she placed on our heritage lives on in her children, grandchildren, and great-grandchildren.
- speaker: Interviewer
  text: Are there any specific Swedish traditions that your family continues to celebrate?
- speaker: Respondent
  text: Yes, as Mormor got older, Swedish customs became even more important for her as a way to acknowledge our family's
    history. One of the most significant traditions that she started in my family was celebrating Santa Lucia Day, which is
    a traditional Scandinavian event. Typically celebrated on December 13th, Santa Lucia Day commemorates Saint Lucia, who
    was killed in the year 304 because of her Christian beliefs. My family celebrates Santa Lucia on Christmas Eve, but we
    still follow many of the holiday's usual elements. One of the girls dresses up as Santa Lucia and serves cookies to the
    rest of the family. We also sing the traditional song and read the story of Saint Lucia.
- speaker: Interviewer
  text: What does this tradition mean to your family?
- speaker: Respondent
  text: This tradition allows my family to remember our Swedish heritage and feel a sense of connection with our ancestors
    who immigrated from Sweden. My family's history is an important part of my life because it has shaped who I am today.
    Being aware of my ancestry and participating in Swedish traditions allows me and my family to honor Otto and Ruth's story
    and my great-grandmother's commitment to keeping their legacy alive.
