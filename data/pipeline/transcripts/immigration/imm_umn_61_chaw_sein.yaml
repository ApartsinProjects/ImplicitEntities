collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Chaw Sein. I was born in Thailand, Umpiem Refugee Camps, but my parents, sister, and grandparents were
    born in Burma. Because the DKBA burned down their village, my parents, sister, and grandparents had to move to Thailand
    Umpiem Refugee Camps in 1999. While my mother and family were escaping, I was in her womb.
- speaker: Respondent
  text: When I lived in Thailand, I did not get enough education. I was only in first grade when my mom decided that she wanted
    to move to the United States.
- speaker: Respondent
  text: Before the day that we were supposed to come to America, we celebrated. All my friends and my mom's friends came to
    celebrate with us. After we ate, me and my friends played jump rope and my mom and her friends talked and laughed. We
    had so much fun.
- speaker: Respondent
  text: The next morning, on April 29, 2008, we woke up early at 6:00AM, got ready, and went down to the front of the road
    to wait for the taxi.
- speaker: Respondent
  text: When I was in the taxi from Thailand to Mae Sot I felt really dizzy because I had never ridden in a taxi before.
- speaker: Respondent
  text: We stayed at Mae Sot for 5 hours. While we were there, I saw people selling food by the side of the street and it
    smelled so sweet, so my mom bought me and my sister meat balls.
- speaker: Respondent
  text: After 5 hours of waiting we got on a double decker bus that took us to Bangkok. We waited at Bangkok for an hour.
    While we were there, we saw a lot of refugee families waiting for taxis. The people who worked at Bangkok hotel gave us
    rice soup to eat. It tasted so delicious.
- speaker: Respondent
  text: Then we got on a plane and flew to New York. On the plane I was really tired, so I fell asleep, and when I woke up
    I saw food on the table in front of me. Then I tried the food and it tasted disgusting.
- speaker: Respondent
  text: When we got to New York, we got on another plane and flew to Georgia. We landed in Hartsfield Jackson Atlanta International
    Airport. When we got off the plane we saw our caseworker. She took us to our apartment. It was so big.
- speaker: Respondent
  text: While I was there in Georgia I was really happy that we got to live in a big apartment that was made out of strong
    brick instead of bamboo and leaves. Inside of our apartment there were 3 big rooms and in the fridge there was fried rice
    and chicken wings.
- speaker: Respondent
  text: After living in Georgia for 3 years my mom decided to move to Minnesota because we don't have good medication in Georgia.
- speaker: Respondent
  text: Now in Minnesota I have a good opportunity to get education and have a better life.
