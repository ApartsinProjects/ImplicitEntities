collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Even though I'm only Polish on my mother's side of the family, I've always felt more connected with my Polish ancestry
    than any other heritage. Part of this is just due to the sheer size of this branch of my family; my mother came from a
    family of 7, and I am one of 16 grandchildren on the Ostrowski side.
- speaker: Respondent
  text: I've always been fascinated by my great-grandmother, Vincenta. She was born Vincenta Jasiewicz, sometime around 1893
    or 1894. We don't know exactly where she was born, but we know that it was in a part of Poland that was occupied by Russia
    because she spoke both fluent Polish and Russian.
- speaker: Respondent
  text: She immigrated to the United States at the age of 16; my great-grandfather, Michael Subocz, had already been living
    in Grand Rapids, Michigan at that point, and had returned to Poland with the goal of taking a wife.
- speaker: Respondent
  text: Michael tragically died in a roofing accident in his early thirties, leaving behind 5 children. Vincenta remarried
    Julius Suchocki soon after being widowed, but I think that in her mind she would always be a Subocz. When she died she
    was buried next to her husband Michael, not Julius.
- speaker: Respondent
  text: Vincenta lived her entire adult life in a Polish enclave of Grand Rapids, Michigan, and she never fully learned English.
    She had a hard life during the Great Depression, and she and her children frequently went without.
- speaker: Respondent
  text: At some point, she got a finger stuck in an old-fashioned washing machine and had to have half of it amputated; my
    mother remembers that her grandma lovingly referred to her short finger as "Stubby," and would tease the kids with it.
- speaker: Respondent
  text: My grandma, Mary, remembered having to wear rags on her feet in the winter time as a child, and gathering coal from
    the street so they could light their stove.
- speaker: Respondent
  text: My great aunt, Eleanor, my grandmother's little sister, was born so prematurely that she was not thought likely to
    survive. She was so small that she slept most of her first year of life in a repurposed drawer from a living room cabinet.
- speaker: Respondent
  text: There was little money for medical or dental care, and my grandmother had to have all of her teeth pulled out by the
    time she was a teenager; she wore an ill-fitting set of dentures for many years.
- speaker: Respondent
  text: Dealing with this as such a young immigrant mother had to have been traumatic for Vincenta, but I never heard of her
    complaining.
- speaker: Respondent
  text: Now that I have my own children, I think of Vincenta's immigrant experience quite a bit. She died before any of her
    great-grandchildren were born, but in the constant flood of family storytelling, she has always been a part of my life.
