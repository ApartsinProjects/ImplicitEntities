collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I hated Korean school.
- speaker: Respondent
  text: Me too. That's why I quit it but you guys kept going.
- speaker: Respondent
  text: Yeah, because we needed to graduate.
- speaker: Respondent
  text: You went to Korean school?
- speaker: Respondent
  text: I don't remember this.
- speaker: Respondent
  text: When did you go?
- speaker: Respondent
  text: I don't know.
- speaker: Respondent
  text: Are you sure it was Korean school?
- speaker: Respondent
  text: We went during JEI.
- speaker: Respondent
  text: That doesn't count.
- speaker: Respondent
  text: We're talking about that church-sponsored thing.
- speaker: Respondent
  text: Oh… See, I don't know how you guys get wrangled into it.
- speaker: Respondent
  text: I think also it's interesting that I had to translate so much as a little kid. Um…
- speaker: Interviewer
  text: Can we talk about that?
- speaker: Respondent
  text: Yeah, let's talk about it.
- speaker: Respondent
  text: I was always…. I was always so confused. I was like- wait how does Elinor not know Korean and then translating and
    then what? How does that happen?
- speaker: Respondent
  text: You know what I mean?
- speaker: Respondent
  text: Really? Um… I don't know.
- speaker: Respondent
  text: Do you think I was just bull-shitting the whole time?
- speaker: Respondent
  text: Elinor has magical skills.
- speaker: Respondent
  text: No, I mean it was like a very big burden that I don't think as a kid or any kid should be able to-
- speaker: Respondent
  text: to take on. Um…
- speaker: Respondent
  text: All this legal shit and you're like if I do this wrong like…
- speaker: Respondent
  text: They might get in trouble or like all this pressure to do it right.
- speaker: Respondent
  text: That's not cool.
- speaker: Respondent
  text: But I think that- that's also what forced my reading comprehension to go way up…
- speaker: Respondent
  text: maybe is having to read and um…
- speaker: Respondent
  text: explain documents that I didn't understand. I don't think I still do.
- speaker: Respondent
  text: I don't understand how we did it when we were younger.
- speaker: Respondent
  text: They just they must have just asked us and then been like "Oops."
- speaker: Respondent
  text: Remember how much I hated going to Korean restaurants?
- speaker: Respondent
  text: Mmm… No, but why? I thought it was because you didn't want to eat meat.
- speaker: Respondent
  text: Well, I mean that too, I guess, but the reason I hated going to Korean restaurants was because I was so uncomfortable.
- speaker: Respondent
  text: All I wanted to do was go to like American restaurants and they probably were just as uncomfortable if not more.
- speaker: Interviewer
  text: Why was it uncomfortable for you to go to Korean restaurants?
- speaker: Respondent
  text: Because remember? I would always ask, "What's this one?"
- speaker: Respondent
  text: and then I would always get the same thing because I don't know what else to get.
- speaker: Respondent
  text: I didn't know that.
- speaker: Respondent
  text: Yeah, and I mean there was a booger on a cup.
- speaker: Respondent
  text: I feel like that's the biggest thing.
- speaker: Respondent
  text: No, but I mean like I am actually very uncomfortable in like Korean restaurants so I can sympathize.
- speaker: Interviewer
  text: With the family?
- speaker: Respondent
  text: I hated going to like American restaurants with them because I was embarrassed of them.
- speaker: Respondent
  text: Oh… Yeah...
- speaker: Respondent
  text: Yeah, I know. It's really shitty.
- speaker: Respondent
  text: Yeah, because we obviously don't have accents but people are still going to see us as foreigners.
- speaker: Respondent
  text: Well the reason I didn't continue Korean school was because I was mad at the parents because they kept saying, "Oh,
    no matter how hard you try, no one is going to think of you as an American." And already my identities were just like
    so confused. Because no one clarified like you can be both. You can be proud of both identities. So I think that's what
    I lost out on as a kid. And I really, I regret that.
- speaker: Respondent
  text: Erica and I had more like Korean culturally things.
- speaker: Respondent
  text: Oh, okay. I see.
- speaker: Respondent
  text: That we can feel more solid in that.
- speaker: Respondent
  text: But I definitely, don't you feel, though, like you are sometimes not either? Do you know what I am saying?
- speaker: Respondent
  text: Oh yeah, yeah, yeah, yeah.
- speaker: Respondent
  text: Right, right, right. So I think… Isn't that what Elinor was getting at? That's why I was like, "Yeah, I can see that."
- speaker: Respondent
  text: But I don't, I don't, I don't feel as like…
- speaker: Respondent
  text: Yeah, yeah, yeah.
- speaker: Respondent
  text: I don't know how to word that… lost?
- speaker: Respondent
  text: In their own way, they showed their appreciation for us and- and we that wasn't the appreciation we needed, but that
    was their way and we didn't understand that because of all the barriers of communication. Because that's my easy go-to
    answer like, "No, we can't communicate." Like literally, I can't communicate though.
- speaker: Respondent
  text: But… Uh… I don't know. I just like, right now I can't have a peace with it, I don't think.
