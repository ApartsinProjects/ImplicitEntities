collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My family is basically my parents, my mom and my dad, my two older brothers, me, and my young sister. My background
    of my family is primarily Hispanic. My mom and my dad, they immigrated from Mexico. My Mexican heritage is very important
    to me. I myself try not to lose my heritage, my background within the majority group. I try to keep as much of my culture
    as much as I can.
- speaker: Respondent
  text: My parents, they have always been there for me, especially my mom. She is like the biggest role model, especially
    now that I am a senior in college. My parents instilled in all of us really that you are responsible for your own actions
    and your own decisions. Therefore I am responsible for how my life is driven.
- speaker: Respondent
  text: I am the first within my immediate family and my extended family to complete college and go to college. And so I really
    don't see it as a pressure really, I haven't really looked at it that way, but I have looked at it more as I want to make
    my family proud.
- speaker: Respondent
  text: Like when I would talk to my mom about her childhood and her upbringing, it was very sheltered and very closed off.
    She didn't want her kids to live that sheltered and closed off life. My mom impacts me a lot because of the fact that
    she didn't get to see herself graduate and she also told us that she wanted us to do great and to graduate from college.
- speaker: Respondent
  text: So a lot of her words were like "don't stop", "keep going", "you are almost there". They also resonate with me every
    time, especially when I am doing an assignment and I feel like I want to give up, my mom's always in the back of my head
    motivating me.
- speaker: Respondent
  text: College, it can be hard, but it's worth it in the end. You do learn a lot about yourself. And because of that I am
    excited to graduate, but as well as don't want to graduate yet. I want to hold on to that college career.
- speaker: Respondent
  text: I do want to extend my wings and go out to the world and share what I've learned and about myself to the rest of my
    community, whatever the community I will be able to in the future.
- speaker: Respondent
  text: Knowing that when I go walk the stage and see my family, especially my mom, who was always the backbone for everything
    really, it will be great. She always gave us the image of her being proud of us walking across the stage for college and
    she basically doesn't want us to live the life that she lived.
- speaker: Respondent
  text: Growing up and having to immigrate and having to live a life of struggle all the time. She wanted us to have life
    easier than she did growing up and I want to make her proud.
