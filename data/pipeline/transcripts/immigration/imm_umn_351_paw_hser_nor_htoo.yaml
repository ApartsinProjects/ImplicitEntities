collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Paw Hser Nor Htoo. I was born in Thailand, Nu Poe refugee camp. But my parents and my sister were born
    in Burma. All my relatives are from Burma. Because of the civil war in Burma my parents had to move to Thailand refugee
    Nu Poe camp. They moved to Thailand Nu Poe refugee camp in 1997.
- speaker: Respondent
  text: Even when they lived in Thailand refugee camp, they didn't have a right to do whatever they wanted. Also they didn't
    have enough food to eat. They didn't have a right to go out of the camp and find a job.
- speaker: Respondent
  text: When I lived in Thailand I had a chance to go to school, but I didn't have a lot of opportunity to get education.
    That is why my family decided to come to America.
- speaker: Respondent
  text: I remember the day my mom told me that we were going to move. It was in 2012. I was very excited when I heard that
    because I wanted to come to America.
- speaker: Respondent
  text: On that night, my family had a celebration and all my friends and family came over. We talked, ate and laughed together.
    Everyone had a good time.
- speaker: Respondent
  text: In the morning, I left Thailand. The last thing I saw in Thailand is my house and my cousin. He sat at the front of
    the house. He was crying and felt so depressed, and the house was empty and lonely.
- speaker: Respondent
  text: My friend and I cried because we would not see each other anymore.
- speaker: Respondent
  text: When I got on the airplane I was petrified because I had never been on an airplane before.
- speaker: Respondent
  text: When we were on the airplane my family didn't know anything and we didn't know how to speak English.
- speaker: Respondent
  text: I was fearful when the plane took off because it made a lot of noise.
- speaker: Respondent
  text: When I went to the bathroom, I got stuck inside. Then I started to cry and I called someone to help me.
- speaker: Respondent
  text: When they tried to talk to me, I didn't know what they were saying, so, I had to show them by talking with my hands.
- speaker: Respondent
  text: Then they told me to go back to my seat and I sit quietly.
- speaker: Respondent
  text: After that, they brought some food for me. I did not like the food in the airplane. The food smelled musty and also,
    when I ate those food, I wanted to throw up.
- speaker: Respondent
  text: When we were in New York airport we had no one to continue to tell us the way how we had to come to Minnesota.
- speaker: Respondent
  text: We waited there almost one hour and we didn't know where we had to go and which airplane we need to ride.
- speaker: Respondent
  text: For a moment, we saw one white man. He was really tall and he wore a blue shirt and black pants. He came to us and
    showed us where we had to go.
- speaker: Respondent
  text: We rode the third airplane to Minnesota.
- speaker: Respondent
  text: When I first time in Minnesota I feel surprised because it is my first time saw the snow and it was very cold.
- speaker: Respondent
  text: When we were in the Minneapolis airport I saw my cousin and some of my friends came to pick us up and waited for us.
- speaker: Respondent
  text: I was so joyful and weary at the same time.
- speaker: Respondent
  text: Now, I have a good opportunity to get an education, have a safe life, good friends, and to have a happy life.
