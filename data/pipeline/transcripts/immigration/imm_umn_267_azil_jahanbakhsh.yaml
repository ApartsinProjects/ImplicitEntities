collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and where you were born?
- speaker: Respondent
  text: I was born in Tehran, the capital city of Iran, on June 14th, 1963. I grew up in a two-parent household with both
    of my parents being educators.
- speaker: Interviewer
  text: What were your parents' professions?
- speaker: Respondent
  text: My mother was a sports instructor and a women's volleyball and basketball coach at a local club. She originally spoke
    Farsi. My father was a school teacher who later became a principal and worked for the Department of Education in Iran.
    He originally spoke Turkish.
- speaker: Interviewer
  text: What significant events happened in your family during your childhood?
- speaker: Respondent
  text: When I was 12 years old, my 18-year-old older brother passed away in a tragic car accident. This was a very hard time
    for my family, especially for my father, who became nearly mute for over six months.
- speaker: Interviewer
  text: How did your family respond to this tragedy?
- speaker: Respondent
  text: About a year after the accident, my father decided that we should leave Iran and start fresh somewhere new. So in
    1977, my parents retired and we moved to Frankfurt, Germany.
- speaker: Interviewer
  text: What was it like moving to Germany?
- speaker: Respondent
  text: I was in 8th grade and spoke no German when we arrived. We lived there for just over four years, and I eventually
    learned the language. I graduated from high school in Frankfurt in 1981.
- speaker: Interviewer
  text: Did your family stay in Germany after your graduation?
- speaker: Respondent
  text: No, my father wanted to move back to Iran to be with family and speak his original language. But I was against it
    because of the Iran/Iraq war and the possibility of being drafted into the military.
- speaker: Interviewer
  text: What did you decide to do instead?
- speaker: Respondent
  text: I asked my father what he would do if he were me, and he said to go to Australia. So we applied for immigrant status
    there, but I was also playing soccer in Germany at the time.
- speaker: Interviewer
  text: How did soccer influence your next steps?
- speaker: Respondent
  text: My high school coach knew an American scout who came to watch me play. The scout wanted me to play soccer at the State
    University of New York in Plattsburgh and offered to help me financially.
- speaker: Interviewer
  text: Did you face any challenges moving to the United States?
- speaker: Respondent
  text: Yes, I applied for a student visa twice and was denied. The embassy said they didn't want Iranians because of the
    hostage situation in Iran. But a senator helped by sending a letter, and I got my visa quickly after that.
- speaker: Interviewer
  text: What was your experience like when you arrived in the U.S.?
- speaker: Respondent
  text: I arrived at JFK airport and was confident in my English, but I had a hard time understanding because Americans spoke
    so fast. I went directly to SUNY Plattsburgh and started playing soccer, which helped me make friends and feel welcome.
- speaker: Interviewer
  text: How did you find the cultural differences between Iran, Germany, and the U.S.?
- speaker: Respondent
  text: The change from Iran to Germany was big, and the change from Germany to the U.S. was just as big. In Germany, I was
    treated like a foreigner, but in the U.S., I found the lifestyle to be the easiest by far.
- speaker: Interviewer
  text: When did you become a U.S. citizen?
- speaker: Respondent
  text: I was eligible at 23 but waited until I was 31 to apply. My father, who died in 1992, begged me not to because Iran
    didn't recognize dual citizenship, and he was worried I wouldn't be able to return.
- speaker: Interviewer
  text: Can you tell me about your family now?
- speaker: Respondent
  text: By 1988, I had two kids, a daughter named Janelle and a son named Keon. Later, in 2000, my youngest son Mateen was
    born. Living in three countries, playing college soccer, and raising my children has been quite a journey.
