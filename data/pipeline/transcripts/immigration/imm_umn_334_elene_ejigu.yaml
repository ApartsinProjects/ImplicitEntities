collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in a small city in Ethiopia called Dessie on October 9th, 1997. When my parents had me and my sister, they
    decided to stay and raise us in our grandparents' house. I grew up surrounded by a big family and this made me feel protected
    and secure.
- speaker: Respondent
  text: When my father passed away unexpectedly in 2003, I became very attached to my mom. The fear of losing both my parents
    made me paranoid and I started to follow my mom everywhere she went.
- speaker: Respondent
  text: In 2004, when I was 7 years old, one of the most heartbreaking and life-changing things happened. My mom won the visa
    lottery to come to the United States. I was too little to remember, but my family told me that I used to beg my mom not
    to go.
- speaker: Respondent
  text: This wasn't an easy decision for her. She didn't know anyone in the United States, and her whole family lived in Ethiopia.
    But she was determined to give me and my sister the best life possible. So she left everything she had behind and came
    to America in search of the 'American Dream'.
- speaker: Respondent
  text: At the time, I didn't understand why she would leave us behind and I became angry and confused. My grandparents raised
    my sister and me when my mom left. They always reminded us of our mom's sacrifice and the things we could accomplish when
    we went to America.
- speaker: Respondent
  text: During those times, I sometimes felt alone, and I was scared that I would not reunite with my mom. I was also anxious
    that something would happen to her, and I became depressed.
- speaker: Respondent
  text: When the 35W bridge collapsed in Minneapolis in 2007, I couldn't stop crying until my mom called us to tell us that
    she was okay. I used to assume somehow my mom was hurt whenever I heard about tragic events that happened outside of Ethiopia.
- speaker: Respondent
  text: When I saw my cousins and my friends with their parents, it added to my depression. Not having my mom when I graduated
    from middle school or when I accomplished something important in my life was very difficult.
- speaker: Respondent
  text: Through all these hard times and as I started to grow up, I started to understand why my mom left us. I understood
    that it wasn't easy for her to leave us and that it was the hardest decision that she ever had to make in her life.
- speaker: Respondent
  text: When she came to the US she stayed at a family friend's house for a year until she could afford her own place. She
    had to work two jobs, day and night, to get her own place and most importantly to save up enough money for our visa process
    and to send money back to us in Ethiopia.
- speaker: Respondent
  text: She came to America hoping to achieve the 'American dream' and that became a reality when my sister and I came to
    the US and started our first day of school.
- speaker: Respondent
  text: This influenced me so that when I came to America when I was 11 years old, I was determined to work hard in school
    and take advantage of every opportunity I could get. I wanted to prove to my mom that I will never forget the sacrifices
    she made to get me to where I am today.
