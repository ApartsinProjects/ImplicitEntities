collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My uncle Yu Chen studied abroad to pursue a Ph.D. in chemistry 20 years ago at Virginia Tech. After graduation, he
    worked at Appleton, Wisconsin. By now, he is 41 years old, but he is still single. He is not married yet.
- speaker: Respondent
  text: He felt that the most difficult time was when he first came to the United States to seek a Ph.D. At that time, there
    were not many Chinese people at school, and there was no developed communication method to contact his family conveniently.
    He felt so lonely.
- speaker: Respondent
  text: Also, because of his polymer major, he was checked for his visa twice when he was a graduate student.
- speaker: Respondent
  text: On a Black Friday morning, he got up early to buy beer. When he was waiting in line, he noticed that he was the only
    Asian in the whole line.
- speaker: Respondent
  text: Most of the immigrants might have a hard time getting their United States identity, but my uncle didn't have any difficulty
    gaining his green card, as he has his degree, publications, and recommendation letters.
- speaker: Respondent
  text: The only thing really annoying him was that the green card wait time was too long. There are too many Chinese workers
    waiting in line to get their identity in the U.S.
- speaker: Respondent
  text: He very much regrets staying in the U.S. He told me, if he went back to China, he would be able to have more time
    to spend with his family and friends.
- speaker: Respondent
  text: Another reason is peer pressure. He was very proud of himself when he came to the United States 20 years ago because
    he was the only one who studied abroad to broaden his horizon while others stayed domestic.
- speaker: Respondent
  text: At that time, people felt that the United States was better than China. Then China developed rapidly, she experienced
    the golden 20 years.
- speaker: Respondent
  text: My uncle worked for decades and still is a senior research chemist in the U.S. But his classmates who stayed in China
    have already won the first prize of National Natural Science.
- speaker: Respondent
  text: Also, many people are professors at universities in China. Their social status and income are very high.
- speaker: Respondent
  text: This fact, equivalent to showing my uncle heaven then bringing him back home, creates a very hard transition.
- speaker: Respondent
  text: Although he didn't tell me clearly, in his mind he was far worse than his peers.
- speaker: Respondent
  text: Also, I mentioned before that he isn't married yet. He said that if he stayed in the United States, he would still
    have a chance to get married, but if he returned, he would not be able to get married.
- speaker: Respondent
  text: Because in China, a male who wants to get married has to own his house, otherwise the female family will not agree
    to marry.
- speaker: Respondent
  text: The house will cost a lot in China. My uncle cannot afford to buy a house in China.
- speaker: Respondent
  text: His major is polymer which is not a popular major in recent years. In China, there is no available good position for
    him now.
- speaker: Respondent
  text: Several years ago, there were spots good for him, but he didn't go back to China. He missed that great opportunity,
    the golden years.
- speaker: Respondent
  text: Maybe in the future, if chemistry becomes a hot industry, he would leave the U.S.
- speaker: Respondent
  text: He says, "I am just studying and working in the United States for the time being."
- speaker: Respondent
  text: My uncle's life is like an atom. He is an electron outside of the nucleus. The U.S. is a nucleus which is the center
    of the atom. He cannot bond with the nucleus, and he cannot separate from it.
