collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: At first, when we still youth, I went to youth conference, so we met over there. And we just, kind of, barely know
    each other by name. Not a good relationship yet.
- speaker: Respondent
  text: Back in Laos, you know, birth country, I think it is taught us a lot to become a hard‐worker man. We had to work hard
    in order to earn money.
- speaker: Respondent
  text: Yes, I was so pleased and very grateful I have lived in 2 countries, and I've learned a lot about my native country,
    like Laos. And when we came this country, then I have learned a lot. So, I speak 3 languages, and I know the traditional,
    like in my country that we don't have everything like this country, and when we came here we had everything so I had lots
    of experience.
- speaker: Respondent
  text: Yeah, it is very awful. Why is that? Because when the World War II was over, wars continued into our parents, and
    continued to us, and we had to move place to place and never had a peaceful life in a permanent place.
- speaker: Respondent
  text: I lived a life of very danger because in the middle of the night we seen bullets fly all over our village. So we had
    to get up and run, run for life, so that was difficult. And since that, I so young, but we had to move one village for
    a couple of months, and then we had to move again because the war is keep going. So, we had very difficult. We could not
    have any permanent house or life to live.
- speaker: Respondent
  text: When we came to this country, we had more opportunities to learn, to adapt to the new culture of this country which
    we had to learn how to live as an American.
- speaker: Respondent
  text: For me, it like opened my eyes so I can see in this country they have more education, and I know that there's lots
    of love in this country, that love other countries and love to the poor, so it's so blessed that I have lived this country
    so we see lots of love from this country.
- speaker: Respondent
  text: I just want to let other people know that, I myself, when I came to this country, I had to work hard in order for
    living. Because, when I came to this country, I can see that the American people ‐ they not lazy at all. They work hard
    everyday. So, I'm one of the hard‐workers in this country in order to help myself, to raise my family, and to become a
    successful man.
- speaker: Respondent
  text: For me, I want other people to understand for me that even I don't speak English very well, I don't understand very,
    but like my husband says we work hard. After we were at this country for 6 days, we work, we got a job, so we work even
    when we don't speak any English.
