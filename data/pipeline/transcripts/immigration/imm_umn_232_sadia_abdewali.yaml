collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Sadia. I'm twenty years old right now. I came from Somalia originally but we went to Kenya in 1999. We
    migrated from there to Minnesota first, around 2000. At that time I was five years old. Then we didn't stay in Minnesota
    for long due to not having much family. So we migrated to Seattle; again, another migration. But I was young. Started
    my life, went to school, felt like a normal kid.
- speaker: Respondent
  text: So in 2012, after I finished high school, I decided that I might as well take a journey back home. I've always had
    this feeling where I didn't have a connection with my father due to such a young age of divorce where I didn't know -
    and I didn't know really what happened to my father and mother, but I knew that I had to separate from both of them and
    live with my grandma.
- speaker: Respondent
  text: So, I was like, in 2012, I have nothing to do, I have two years to think about what I want to be, I might as well
    go back home and see my father and see the country, because the media portrays it as this horrific place where there's
    war and there's no peace. I mean, that happens, but there's a good side and a bad side about everything in this world.
- speaker: Respondent
  text: So, I went there just with an open mind, by myself. Saw my father; had a moment with him, had a weight off my shoulders.
    I went back to different places in Somalia and traveled around - of course, that's what we do.
- speaker: Respondent
  text: Then as I was there I got a whole different view in life, going there and seeing these people. It really changed my
    life 'til this day. It changed me to a point that I want to go back and help the people that I see, but this time, I want
    to be more experienced in why I want to help them and learn what I want to help them and how I can change these people's
    lives.
- speaker: Respondent
  text: After all, it starts with one person and we can all do it. And I hope the people that are listening to this that they
    don't just see me as another kid that's westernized, "You don't know much about Somalia," but when I went back it taught
    me a lot. It changed my life. I think every kid should go and have the opportunity to go see it.
