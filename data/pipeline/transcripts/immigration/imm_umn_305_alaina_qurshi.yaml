collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Karachi, Pakistan, and moved to America with my mother when I was six months old to be with my father.
    My father was adopted into an American family at a young age, so although he became very Americanized, he still kept close
    contact with his family back in Pakistan and maintained some traditions in his life.
- speaker: Respondent
  text: My parents met through an arranged marriage. Since my mother is very traditional and my father is very Americanized,
    growing up I had a fairly normal American childhood. I was able to be who I was and wear what I wanted until fourth grade.
- speaker: Respondent
  text: Then my mother began to dress me in long sleeves and jeans, even in the summer months. She did this to cover me up
    and uphold some Pakistani tradition that was being concealed. I didn't understand why I needed to cover up, so I started
    to bring extra clothes after school and change in the bathroom.
- speaker: Respondent
  text: I didn't do this to rebel against my parents; I just felt the need to fit in with the other kids. As I've grown through
    my teenage years, I no longer feel the need to disobey my mother's rules, but I still don't agree with them.
- speaker: Respondent
  text: The rules my mother sets not only affect me but also cause many conflicts between my parents. My father feels like
    my mother is forcing a culture on me, and he doesn't agree with that. Their arguments escalate until my mother decides
    to move out of the house and get her own apartment, but she always returns after a month or so.
- speaker: Respondent
  text: Having a culture forced among me has caused me to have many internal struggles with my identity as Pakistani or American.
    I identify as American but still acknowledge my Pakistani roots.
- speaker: Respondent
  text: When I grow up, and if I ever have children of my own, I plan to educate them on their heritage but not force any
    traditions on them.
