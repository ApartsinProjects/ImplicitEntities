collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: The United States of America, a country created with the hands of immigrants. Immigrants have been in our history
    from the very beginning, no matter what people have said.
- speaker: Respondent
  text: My family friend, Maria has been in the US since she was 7, hoping for the American Dream this country has promised
    various immigrants.
- speaker: Respondent
  text: Maria was born in Mexico in the State Michoacan. The pueblo that she lived in was Zitacuaro.
- speaker: Respondent
  text: When Maria was young, her mom left to the United States to search for a better future. Soon after, she came back and
    took Maria and her older brother to have a better opportunity for herself and her kids.
- speaker: Respondent
  text: Maria, not knowing anything but her pueblo, was terrified and disappointed that she had to leave her grandma, who
    she was very fond of.
- speaker: Respondent
  text: Before crossing the border, her mother gave her a gold necklace with a little angel on it and told her that this angel
    will protect her throughout her journey.
- speaker: Respondent
  text: Once she was in America, she had never felt so uncomfortable and scared as she was that day. The environment was completely
    different. There were huge buildings, large paved roads, and other things she had never seen before.
- speaker: Respondent
  text: Living in Mexico was completely different than it is here in the US. The city was so huge, while in Mexico the town
    was small where everyone knew everyone.
- speaker: Respondent
  text: Here Maria came and knew no one, but luckily her mom would take her to places that were bilingual and had various
    Spanish speaking people to talk to.
- speaker: Respondent
  text: Her mom also put her in a bilingual school, which was Maria's first time seeing people of another ethnicity than her
    own.
- speaker: Respondent
  text: It was a change for her, but though she struggled to get comfortable with all the changes in her society, she grew
    to love her area and the people around her.
- speaker: Respondent
  text: One thing that has kept her connected to Mexico is the food. California being such a diverse state has helped Maria
    keep to her roots.
- speaker: Respondent
  text: She drives up to Fruitvale and eats tacos, enchiladas, or some raspados.
- speaker: Respondent
  text: Her mom luckily also makes her favorite Mexican food, which is some enchiladas and makes Maria extremely happy knowing
    that her roots are still with her and her family.
- speaker: Respondent
  text: With the chaos in the society that has been currently happening, many immigrants are fearing for their life here in
    the states.
- speaker: Respondent
  text: Maria, having her family here, fears that one day something might happen.
- speaker: Respondent
  text: Even though she lives in California, a very liberal state with laws that protect immigrants to an extent, you never
    know what can happen nowadays.
- speaker: Respondent
  text: Luckily Maria took the opportunity to apply and receive DACA and attends college to pursue a great career and help
    her family in the future, as her family has always helped her before.
- speaker: Respondent
  text: Though she is covered with DACA, there will always be that fear of something happening.
- speaker: Respondent
  text: As she explains the hardship of today's society, Maria tells me how grateful she is about being here in the US.
- speaker: Respondent
  text: There are a lot more opportunities to grow higher and live better here in the US than back in Mexico.
- speaker: Respondent
  text: She does miss her hometown and her grandma the most, but her life is here now.
- speaker: Respondent
  text: Maria wants people to know that immigrants aren't here to take people's jobs and to cause chaos in this country but
    are here to pursue a better future.
