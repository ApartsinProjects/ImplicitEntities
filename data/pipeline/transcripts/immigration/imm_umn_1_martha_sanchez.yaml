collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My mother's name is Martha Sanchez. She was born in the city of Apatzingan, in Michoacán, Mexico, in 1976 with several
    other siblings. She had lived there all her life and enjoyed living there. My father and mother met in Apatzingan, in
    the same pueblo. They got married in 1994 and they immigrated to America in the same year. My mother had my sister at
    the age of 19 in 1995. She stayed for a while but wanted to go back to Mexico because her father had died. So she did
    go back and took my sister with her and stayed there for a bit, but eventually came back in 2002 and ended up staying
    to be reunited with my father in California. Two years later, I was born. We lived in East Palo Alto, where a lot of the
    people who lived there were of color. I think this helped my parents socialize and make friends. There were other Latinos
    who could relate to what they had went through. I also grew up with friends whose parents were also immigrants. I was
    lucky to have them. I think that back then, there wasn't as much of a focus on immigration as there is now and that coming
    then would have been better than now. And I am proud of my parents and their decision to come. They're brave for coming
    over, knowing that they would be discriminated because if they hadn't come, my brother and I probably wouldn't have been
    born.
