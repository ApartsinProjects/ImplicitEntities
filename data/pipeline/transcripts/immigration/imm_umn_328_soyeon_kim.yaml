collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Out of my 22 years of life, I lived in three different countries, and lived in 15 houses. My family started off in
    Asia and ended up in North America. This is the story of how my family immigrated to the United States of America.
- speaker: Respondent
  text: Early morning of November 22, 1993, I was born as Soyeon Kim in South Korea.
- speaker: Respondent
  text: My family moved to America in 1997 because my dad was assigned to the Hyundai laboratory in Ann Arbor, Michigan. Because
    I spoke Korean at home and English at school, I was able to communicate in both languages within a short period of time.
    On the other hand, my younger brother did not talk until he was four. My parents were extremely worried. However, looking
    back at it now, we believe that being exposed to both languages caused a collision for him.
- speaker: Respondent
  text: I was a very timid child, so I had a tough time getting used to the new lifestyle. I refused to go to school because
    I was nervous and scared. I had headaches, stomachaches, and would even throw up sometimes. Apparently my parents sent
    me to the doctor because they thought I had some kind of illness.
- speaker: Respondent
  text: We moved to Gyeonggi Province, South Korea in 2002. Since I had to make new friends in a new setting, I felt uncomfortable.
    I had to leave my comfort zone. Although I could speak Korean, my classmates were on a different level. I would always
    fail spelling quizzes and take a longer time doing school work. Again, I did not want to go to school. I liked my old
    teacher, school, and neighborhood better. However, as time went by, I slowly adjusted to the new place and made a lot
    of friends.
- speaker: Respondent
  text: After living in both countries, my parents preferred the living style and education system of the U.S. They decided
    to immigrate to America. The process took several years, so before it was too late for my brother and me to learn English,
    we moved to Canada in 2007. A year later, we were notified that the immigration process was completed. After finishing
    up all the documentation, we packed our stuff and drove from London, Ontario to Statesboro, Georgia.
- speaker: Respondent
  text: It was difficult interpreting what people were saying because of the strong southern accent. It took me a while to
    get used to it. Getting used to all the attention was something new as well. There were not many Asian people in Statesboro,
    so they would always assume that we were Chinese. Students would say "Ching-Chong-Ching" behind our backs and make fun
    of us.
- speaker: Respondent
  text: In 2009, we moved to Newnan, Georgia because of my dad's job. After graduating from high school in 2012, I moved to
    Athens, GA in order to attend the University of Georgia. I am currently majoring in Mechanical Engineering.
- speaker: Respondent
  text: Within 22 years, I changed my name and country of citizenship. Last April, my brother and I became citizens of America.
    From Soyeon Kim, I became Jessica Soyeon Kim.
- speaker: Respondent
  text: 'Dramatic changes in life can be scary and even questionable. However, over the course of immigration, I came up with
    a life motto: Everything happens for a reason. Living in America helped me with English, living in Korea helped me with
    Korean and to build up my identity, and coming back to America, it shaped me to be who I am today. Even though I may have
    wished that it wouldn''t have happened at that time, I am glad that everything happened.'
- speaker: Respondent
  text: So, this is the story of how my family immigrated to America. I hope you enjoyed it! Thank you.
