collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'I first came to the United States to attend a summer camp, I remember it was 2016. After a while I realized that
    Chinese students not only had to adjust to the language difference, but also faced a considerable challenge: American
    Chinese food. So this is a story about how to accept this culinary experience.'
- speaker: Respondent
  text: During the second week after arriving in Sacramento, I vividly remember that I couldn't wait to explore the local
    Chinese restaurants since my homestay mom took me in n out every day, and I was really looking forward to finding a hint
    of my hometown. However, I soon realized that the so-called "Chinese food" was not what I was expecting.
- speaker: Respondent
  text: After finding a Chinese restaurant with a 4.3 rating on Google Maps, I couldn't wait to try it. I saw the familiar
    names Kung Pao Chicken and Fried Noodles (chow mein) on the menu, and without hesitation, I ordered both, only to be served
    with mushy sweet chicken and limp noodles.
- speaker: Respondent
  text: I was surprised to find that Chinese food here is reinterpreted and adapted to suit local tastes. After continuous
    attempts, I began to understand and accept the reality of this American-style Chinese food.
- speaker: Respondent
  text: So I learned to look for dishes on the menu that were relatively less Americanized, such as stir-fried beef with broccoli
    or stir-fried pork with chili peppers (although I can't eat a lot of spicy). I realized that American Chinese food has
    its own unique charm in this foreign country.
- speaker: Respondent
  text: At the camp, I shared these experiences with my American friends, who laughed about the strange changes in "Chinese
    food". They joked that it was not only a culinary experience, but also a cultural adventure.
- speaker: Respondent
  text: One of my friends who went with me joked that he plans to write a book called "A Chinese Student's Guide to Surviving
    Cuisine in the U.S.", with the title of the first page being "How to Find the Taste of China in American Chinese Food".
- speaker: Respondent
  text: Through this experience, I learned not only how to find delicious food in a foreign country, but also how to face
    life's challenges with humor and an open mind. I realize that adapting and appreciating the local culture can always bring
    unexpected rewards and fun wherever it is.
