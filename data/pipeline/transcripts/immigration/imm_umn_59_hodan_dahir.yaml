collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'Asalam Alekum. My name is Hodan Dahir. I am Somali. I was born in Somalia. I have seven children: four boys and three
    girls. I lived in Kenya in a refugee camp. I come to the U.S. in 2007 in New York. Then I come to Minneapolis. Then I
    get a house. Now I live with my family. I am working. My children are in school.'
- speaker: Respondent
  text: 'I know how to cook the delicious Somali food: canjeera, bariis, soor, pasta, hilib, hilibari, and muufo. Canjeerada
    waxaad ucuni kartaa quraac iyo qado ahaan, waxaa laga sameeyaa bur iyo galeey. The canjaaro you eat it for breakfast and
    lunch sometimes. It is made out of flour and corn.'
- speaker: Respondent
  text: Qadada waxaa ku cuni kartaa bariis iyo hilib ari ma bariis iyo hilib geel. Sometimes with the rice you eat it with
    goat meat or camel meat for lunch.
- speaker: Respondent
  text: Muufada waa lagu qadeeya wana lagu casheyn karaa. Muufo you eat for dinner or lunch.
- speaker: Respondent
  text: Canbuulada waxa laga sameeyaa digir iyo galeey, casho ahaan ayaa loo cunaa. Cambuulo, is made out of beans and corn.
    It's for dinner.
- speaker: Respondent
  text: Soorta waa lagu qadeeya waxa lagu darsadaa caano ama maraq. Soor you sometimes have it for lunch with buttermilk or
    soup.
- speaker: Respondent
  text: Cunooyinkan oo dhan waxan ku sameeya dalka Mareykanka. I make all this food in the U.S.
- speaker: Respondent
  text: Caruurteydu way jecelyihiin waayo waa dhaqankayaga, waana muhim in aan karino cuno aan dhaqan uleenahay. My kids love
    the food because it's our cultural and it's important that we cook food from our culture.
