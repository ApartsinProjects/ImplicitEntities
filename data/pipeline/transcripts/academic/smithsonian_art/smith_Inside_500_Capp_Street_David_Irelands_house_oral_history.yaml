collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about the house at 500 Capp Street and how it became your art?
- speaker: Respondent
  text: Well, 500 Capp Street is not just a house to me; it's a living artwork. I acquired it in the late 1970s and began
    transforming it using materials like concrete, wax, wallpaper, and dirt. Each element and accumulation, like brooms, shoes,
    and hair, contributes to the overall piece. The house embodies my concept of art as an action rather than a static object.
- speaker: Interviewer
  text: What inspired you to use such unconventional materials in your work?
- speaker: Respondent
  text: I was interested in breaking away from traditional art forms. Using materials like concrete and wax allowed me to
    engage with the physical space in a tactile way. The idea was to challenge the viewer's perception and to integrate the
    art with the environment, making the house itself a canvas and a sculpture.
- speaker: Interviewer
  text: How do you see the relationship between the house and your other artworks?
- speaker: Respondent
  text: The house is central to my practice. It’s a continuous project where the boundaries between living space and art blur.
    Other works, like the dumb balls or the use of wallpaper patties, are extensions of the same philosophy—art as an ongoing
    action that involves the space and materials around us.
- speaker: Interviewer
  text: Could you describe the process of restoring and modifying the house?
- speaker: Respondent
  text: Restoration was part of the art. I didn't just fix the house; I altered it to reveal its history and to create new
    layers of meaning. For example, I poured concrete over floors and walls, applied wax coatings, and incorporated found
    objects. Each intervention was deliberate, aiming to preserve the past while transforming the present.
- speaker: Interviewer
  text: What role do you think the viewer plays in experiencing your work at 500 Capp Street?
- speaker: Respondent
  text: The viewer is essential. The house invites people to engage with the space actively, to notice details and to feel
    the textures and atmospheres. It’s not about passive observation but about participation and reflection on what art can
    be.
- speaker: Interviewer
  text: How has your background influenced your approach to art and this house?
- speaker: Respondent
  text: My education in industrial design and my experiences in various art schools shaped my understanding of materials and
    space. Growing up in Bellingham and later studying in California exposed me to different cultural influences, including
    African art, which informed my appreciation for the ritualistic and material aspects of art-making.
- speaker: Interviewer
  text: Can you talk about the significance of the 'maintenance action' you performed at the house?
- speaker: Respondent
  text: The maintenance action was about preserving the artwork as a living entity. It involved ongoing care and intervention,
    like cleaning, repairing, and adding new elements. This continuous process reflects the idea that art is never finished
    but always evolving.
- speaker: Interviewer
  text: What do you hope people take away from visiting 500 Capp Street?
- speaker: Respondent
  text: I hope visitors understand that art can be integrated into everyday life and that the boundaries between art and life
    are fluid. The house is a testament to the idea that art is an action, a way of living and perceiving the world around
    us.
