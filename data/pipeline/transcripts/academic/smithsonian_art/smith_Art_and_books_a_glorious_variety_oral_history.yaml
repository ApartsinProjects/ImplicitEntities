collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early interest in art?
- speaker: Respondent
  text: Yes, I was very interested in art from a young age. Growing up in Italy, I was surrounded by beautiful landscapes
    and historic art, which inspired me greatly.
- speaker: Interviewer
  text: How did you come to the United States?
- speaker: Respondent
  text: I moved to the American West from Tuscany. It was a big change, but it opened many opportunities for me in art and
    printing.
- speaker: Interviewer
  text: What was your experience working with The Grabhorn Press?
- speaker: Respondent
  text: Working with The Grabhorn Press was a wonderful experience. I was able to combine my skills in illustration and printing,
    creating beautiful books that reflected my artistic vision.
- speaker: Interviewer
  text: Can you describe your style of illustration?
- speaker: Respondent
  text: My style is influenced by the early Renaissance, with a focus on hand-colored and illuminated details. I enjoy creating
    unique initials and decorative elements that bring the text to life.
- speaker: Interviewer
  text: What are some of your most memorable projects?
- speaker: Respondent
  text: One of my favorite projects was The Voyage and Travaile of Sir John Maundevile. It included thirty-one illustrations
    and thirty-four hand-illuminated initials, each different and done freestyle. It was a labor of love.
- speaker: Interviewer
  text: How has your work evolved over the years?
- speaker: Respondent
  text: While my technique has matured, the passion and dedication remain the same. Even after fifty years, my hand and eye
    for color are as steady and bright as ever.
- speaker: Interviewer
  text: Have you also written books?
- speaker: Respondent
  text: Yes, I have written several books, often drawing from my own experiences and family background in Tuscany. My writing
    style is anecdotal and aims to capture the lives of Italians in America.
- speaker: Interviewer
  text: What does San Francisco mean to you?
- speaker: Respondent
  text: San Francisco is like a second home to me. Even when I lived away, my books kept me connected to the city. Now that
    I am back, I cherish being part of its vibrant cultural life.
