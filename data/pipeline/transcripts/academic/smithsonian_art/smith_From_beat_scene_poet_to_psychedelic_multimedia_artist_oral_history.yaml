collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early experiences with poetry and how you got started?
- speaker: Respondent
  text: I started discovering poetry in my childhood in New York City. It was a gradual process, influenced by the environment
    and the people I met along the way.
- speaker: Interviewer
  text: What brought you to California and how did that affect your work?
- speaker: Respondent
  text: I moved to California in the late 1940s. The West Coast alternative scene was very different from New York, and it
    really shaped my poetic style and artistic direction.
- speaker: Interviewer
  text: How did your relationships influence your creative life?
- speaker: Respondent
  text: My relationships, especially with Jane and later Ann, were deeply intertwined with my work. They provided both inspiration
    and challenges that pushed me to grow as an artist.
- speaker: Interviewer
  text: What was your involvement with the Beat aesthetic and the poetry scene in the 1950s?
- speaker: Respondent
  text: In the 1950s, I was very much involved with the Beat scene. I met Allen Ginsberg and others, and my poetry reflected
    the energy and troubles of that time, including some experiences in Brazil and New York.
- speaker: Interviewer
  text: Can you describe your work with Playboy magazine and your life in San Francisco during the 1960s?
- speaker: Respondent
  text: During the 1960s, I wrote for Playboy magazine and lived on a houseboat in Sausalito. It was a vibrant time, full
    of public relations work and connections with high society, but also a period of personal exploration.
- speaker: Interviewer
  text: How did you transition into psychedelic multimedia art?
- speaker: Respondent
  text: The transition came naturally as I became involved with USCO and multimedia art. We took the show on the road to places
    like Vancouver, Seattle, MIT, and Harvard, blending technology and psychedelia in new ways.
- speaker: Interviewer
  text: What role did technology play in your art?
- speaker: Respondent
  text: Technology was central. It allowed me to explore new forms of expression, combining poetry, visuals, and sound. Collaborations
    with people like Michael Callahan and Intermedia Systems Corp. were crucial.
- speaker: Interviewer
  text: How did your spiritual beliefs influence your work?
- speaker: Respondent
  text: Spirituality, including influences from Rabbi Zalman Schachter and Eastern traditions, deeply informed my art and
    life, providing a framework for understanding and creativity.
- speaker: Interviewer
  text: What led you to enter the family cheese import business?
- speaker: Respondent
  text: In the 1980s, I shifted focus to the family cheese business. It was a practical decision but also an opportunity to
    explore creativity and responsibility in a different field.
- speaker: Interviewer
  text: Looking back, how do you reflect on your journey as an artist and poet?
- speaker: Respondent
  text: Reflecting on my journey, I see a continuous thread of exploration, whether in poetry, multimedia art, or business.
    Each phase taught me something new about creativity, ethics, and life.
