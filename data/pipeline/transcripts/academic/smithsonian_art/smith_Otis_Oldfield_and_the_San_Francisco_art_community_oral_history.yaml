collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early years and your education as a child in Santa Rosa?
- speaker: Respondent
  text: I was born and raised in Santa Rosa. I attended school there and was always interested in art from a young age. I
    studied at the Arts & Crafts school in Berkeley during my high school years and continued part-time while working as a
    commercial artist.
- speaker: Interviewer
  text: How did you first meet Otis Oldfield?
- speaker: Respondent
  text: We met through the art community in San Francisco. Otis was teaching private classes at the Mark Hopkins Art Institute,
    and I took night classes there. We became close through those connections and eventually married.
- speaker: Interviewer
  text: What was your early married life like?
- speaker: Respondent
  text: It was a wonderful time. We had two daughters and were deeply involved in the San Francisco art scene. Otis was very
    dedicated to his work and teaching, and I supported him while pursuing my own art.
- speaker: Interviewer
  text: Can you describe Otis's background and his time in Paris?
- speaker: Respondent
  text: Otis came from a family with a strong artistic background. He traveled and studied extensively in Paris from 1909
    to 1924, which greatly influenced his style. He returned to San Francisco with a unique approach that was initially considered
    avant-garde.
- speaker: Interviewer
  text: What kind of work did Otis do when he returned to San Francisco?
- speaker: Respondent
  text: He was involved in exhibitions, bookbinding, and teaching. He also illustrated books and created drawings of local
    people. Otis was very versatile and respected in the art community.
- speaker: Interviewer
  text: How did Otis's style relate to the art trends of his time?
- speaker: Respondent
  text: Otis remained true to his individual style and did not follow the Abstract Expressionism trend of the 1950s. He valued
    nature and decorative art and preferred artists like Renoir and Matisse.
- speaker: Interviewer
  text: Can you tell me about your experiences with other artists in San Francisco?
- speaker: Respondent
  text: We had close friendships with many artists like Piazzoni, Rinaldo Cuneo, Ralph Stackpole, and Maynard Dixon. The art
    community was vibrant, and we often gathered in places like Elgin's and Coppa's restaurants.
- speaker: Interviewer
  text: What was Otis's approach to teaching?
- speaker: Respondent
  text: Otis loved teaching and was very dedicated to his students. He taught at various institutions and also gave private
    lessons. He believed in developing strong drawing skills, which he honed in Paris.
- speaker: Interviewer
  text: How did Otis and you contribute to the rehabilitation of wounded veterans during World War II?
- speaker: Respondent
  text: We both volunteered to help rehabilitate wounded veterans through art. Otis worked with the Arts & Crafts school,
    and I volunteered with the Red Cross Bureau of Inquiry. We also reviewed and juried artwork created by hospitalized veterans.
- speaker: Interviewer
  text: Can you share some memories of Diego Rivera's visits to San Francisco?
- speaker: Respondent
  text: Diego Rivera was a sweet and kind man. He lived in Ralph Stackpole's studio for a time and was involved in the local
    art scene. We also knew Frida Rivera and saw the impact Diego had on mural artists in San Francisco.
- speaker: Interviewer
  text: What was Otis's involvement with the Coit Tower murals?
- speaker: Respondent
  text: Otis, along with Cuneo and DelPino, painted murals for Coit Tower. It was an exciting time watching the artists at
    work and being part of that historic project.
- speaker: Interviewer
  text: How did Otis view the commercial art world?
- speaker: Respondent
  text: Otis only did commercial art for the San Francisco Call. He preferred fine art and was very skilled in pencil sketching
    and drawing, skills he developed in Paris.
- speaker: Interviewer
  text: Did Otis ever join any artists' groups?
- speaker: Respondent
  text: He was reluctant but did join Kenneth Rexroth's artists group for a short time. Rexroth called him an anarchist, which
    Otis agreed with, but he didn't stay long in the group.
- speaker: Interviewer
  text: Can you tell me about Otis's students and his influence on them?
- speaker: Respondent
  text: Otis taught many students, including Nathan Oliveira, Diebenkorn, and Hassel Smith. He was a significant influence
    on their development as artists.
- speaker: Interviewer
  text: What were Otis's thoughts on 20th-century art?
- speaker: Respondent
  text: He had strong ideas and was critical of some trends. He valued nature and decorative art and was not swayed by the
    avant-garde movements that became popular later.
- speaker: Interviewer
  text: How did you and Otis balance your individual art careers with your family life?
- speaker: Respondent
  text: We supported each other and made sure to nurture both our art and our family. It was a joyful and fulfilling life,
    surrounded by creativity and love.
