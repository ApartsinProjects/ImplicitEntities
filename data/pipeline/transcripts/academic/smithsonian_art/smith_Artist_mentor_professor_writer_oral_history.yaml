collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early influences and how you became interested in fiber arts?
- speaker: Respondent
  text: Well, my early influences came from my family. My grandmother did tatting, and my sisters were into embroidery. During
    the Depression years, patchwork quilts were common in our home. I had a high school art teacher who encouraged me, and
    I explored Chicago's art scene. I was also encouraged to write, but the appeal of weaving really caught me.
- speaker: Interviewer
  text: What was your experience like at Columbia University and in practice-teaching?
- speaker: Respondent
  text: At Columbia, I studied and practiced teaching. I also made marionettes, which was a creative outlet for me. It was
    a formative time that helped shape my approach to art and teaching.
- speaker: Interviewer
  text: How did your army service and time at Cranbrook influence your career?
- speaker: Respondent
  text: Teaching and working with students was always important to me. I taught in Puyallup and served in the Army in Alaska.
    Later, at Cranbrook Academy, I deepened my understanding of design and weaving. Teaching weaving at the University of
    Washington was another significant step.
- speaker: Interviewer
  text: What led you to teach at the University of California, Berkeley?
- speaker: Respondent
  text: I was invited to teach at Berkeley, which was a great opportunity. I worked in the College of Letters and Science
    and later in the Department of Architecture. The faculty members had diverse teaching styles, which enriched the environment.
- speaker: Interviewer
  text: How would you describe your teaching style and philosophy?
- speaker: Respondent
  text: I valued creativity and encouraged originality. I believed in high standards but also freedom in expression. I tried
    to balance teaching load with student response and fostered an environment where students could exhibit their work and
    develop their own voice.
- speaker: Interviewer
  text: Can you talk about the influence of other fiber artists in the Bay Area?
- speaker: Respondent
  text: Certainly. Dorothy Liebes and Trude Guermonprez were major influences. Dorothy's studio generated innovative fiber
    concepts and designs for industry. Trude was a remarkable teacher at the California College of Arts and Crafts. Their
    work and the local culture shaped the fiber arts movement here.
- speaker: Interviewer
  text: How do you view the relationship between fiber art and industry?
- speaker: Respondent
  text: There is a balance to be struck. Industry offers opportunities for fabric design and production, but teaching and
    artistic freedom are essential. I tried to maintain standards while exploring new techniques and materials.
- speaker: Interviewer
  text: What role does playfulness and simplicity have in your work?
- speaker: Respondent
  text: Playfulness is very important. I often find amusement in what fascinates people, even things that might be considered
    ugly but are kind of wonderful. Simplicity helps communicate ideas clearly and effectively.
- speaker: Interviewer
  text: How do you see the future of fiber arts?
- speaker: Respondent
  text: Fiber arts are evolving with new materials and techniques. Communication and self-expression remain central. The movement
    is urban and global, and I believe it will continue to grow and diversify.
- speaker: Interviewer
  text: Can you tell me about your work as a writer and lecturer?
- speaker: Respondent
  text: I've written several books and articles, including on baskets and paisley. Lecturing allows me to share insights and
    engage with audiences. I value spontaneity but also thoughtful judgment in my presentations.
- speaker: Interviewer
  text: What advice would you give to emerging fiber artists?
- speaker: Respondent
  text: Be open to all influences and materials. Experiment and try new techniques. Maintain high standards but allow yourself
    freedom. Most importantly, find your own voice and enjoy the process.
