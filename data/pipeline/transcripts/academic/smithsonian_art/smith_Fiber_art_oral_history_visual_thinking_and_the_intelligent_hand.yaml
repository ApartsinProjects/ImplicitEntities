collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early years and how you became interested in fiber art?
- speaker: Respondent
  text: I grew up in Hungary during World War II, and my family had to escape to America. My mother was an artist, and we
    often painted side-by-side. That experience really sparked my own calling as an artist. I was always attracted to working
    with my hands and materials like fibers and textiles.
- speaker: Interviewer
  text: How did your immigrant experience influence your art?
- speaker: Respondent
  text: Being an immigrant gave me a sense of otherness that broadened my sympathies and sharpened my powers of observation
    and expression. It made me more open to different cultures and ideas, which has been very important in my work and teaching.
- speaker: Interviewer
  text: What role did your education play in your development as an artist?
- speaker: Respondent
  text: I studied at the University of California, Berkeley, where I found a broader approach in the Design Department. I
    was very interested in combining academic courses with art classes, especially focusing on three-dimensional visual information
    and direct-hand methods. This interdisciplinary approach really shaped my work.
- speaker: Interviewer
  text: Can you describe your experience with the Fiberworks Center for the Textile Arts?
- speaker: Respondent
  text: Fiberworks was a nonprofit organization that grew out of a business venture. It was a place where creativity belonged
    to everybody. We developed workshops, exhibitions, and events that brought together artists and the community. It was
    exciting to watch the creative process and to help build an institution that supported fiber artists.
- speaker: Interviewer
  text: How did your travels influence your artistic practice?
- speaker: Respondent
  text: Traveling, especially to places like India and Afghanistan, was a form of self-education for me. I learned a lot from
    primary-source textiles and traditional techniques like patola weaving and tie-dye. These experiences enriched my understanding
    of materials and cultural diversity, which I incorporated into my work and teaching.
- speaker: Interviewer
  text: What challenges did you face in your academic career?
- speaker: Respondent
  text: There were many challenges, including budget cuts, minimal support for visual arts, and the need to advocate for our
    programs. I also worked on affirmative action activities and tried to create a more human and inclusive environment for
    students and faculty. Balancing teaching, research, and administrative duties was demanding but rewarding.
- speaker: Interviewer
  text: How do you view the relationship between art and mathematics in your work?
- speaker: Respondent
  text: I see a strong connection between art and mathematics, especially in three-dimensional visual thinking. Understanding
    spatial relationships and structures is crucial in fiber art. I participated in art and mathematics conferences that explored
    these interdisciplinary questions, which helped me develop new ways of thinking about my work.
- speaker: Interviewer
  text: What advice do you give your students about creativity?
- speaker: Respondent
  text: I encourage my students to travel, to see and learn from different cultures, and to experiment with materials and
    techniques. I ask them to be generous with their discoveries and to embrace the unknown. Creativity is about being open,
    letting go of the rational at times, and allowing spontaneity to guide the process.
