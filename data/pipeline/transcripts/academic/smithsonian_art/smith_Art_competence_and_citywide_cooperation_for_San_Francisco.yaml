collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and family background?
- speaker: Respondent
  text: I was born in Norwalk, California, in 1926. My family came from Japan, and we were involved in truck farming in California.
    Growing up, I attended school and learned English while also maintaining our cultural traditions.
- speaker: Interviewer
  text: How did your family’s cultural background influence your upbringing?
- speaker: Respondent
  text: My family was Buddhist, but we also attended a Quaker church in Whittier. This blend of cultures gave me a unique
    perspective growing up. We worked hard on the farm, and I learned a lot about discipline and responsibility from that
    experience.
- speaker: Interviewer
  text: What was your experience like during World War II?
- speaker: Respondent
  text: It was a difficult time. My father was interned, and our family was moved from Santa Anita to Arkansas. Despite these
    hardships, I continued my education and eventually went to Milwaukee State Teachers College.
- speaker: Interviewer
  text: How did your education shape your artistic career?
- speaker: Respondent
  text: Attending Milwaukee State Teachers College and later Black Mountain College exposed me to many artists and new ideas.
    I learned about different art forms and was inspired to explore wire sculpture and other mediums.
- speaker: Interviewer
  text: Can you describe your work with wire sculpture?
- speaker: Respondent
  text: I started experimenting with crocheting wire to create sculptures. It was a way to combine craft and fine art, and
    I found it very satisfying. My wire sculptures have been exhibited in various museums and galleries over the years.
- speaker: Interviewer
  text: How did you balance your art with family life?
- speaker: Respondent
  text: I chose to stay at home to raise my children and integrate my art into daily life. I turned down professional offers
    that included housekeepers because I wanted to be involved in my family’s life while continuing my artistic work.
- speaker: Interviewer
  text: What role has community played in your art?
- speaker: Respondent
  text: Community is central to my work. I have worked with children, parents, teachers, and public officials on murals, gardens,
    and festivals. Art is a way to bring people together and create something meaningful for everyone.
- speaker: Interviewer
  text: Can you talk about your involvement with public art commissions?
- speaker: Respondent
  text: I have served on several art commissions, including the San Francisco Art Commission and the California Arts Commission.
    These roles allowed me to advocate for artists and help integrate art into public spaces and government programs.
- speaker: Interviewer
  text: What advice do you have for artists trying to make a living?
- speaker: Respondent
  text: It's important to be productive and to practice your art regularly. Time not spent on art can be the enemy of talent.
    Also, artists should seek ways to organize and make their voices heard in the community and government.
- speaker: Interviewer
  text: How do you view the relationship between art and education?
- speaker: Respondent
  text: Art should be integrated into education to enrich students' experiences. I have worked in schools to bring artists,
    parents, and teachers together to create murals and other projects that engage children and foster creativity.
- speaker: Interviewer
  text: What are some of the challenges you have faced as an artist?
- speaker: Respondent
  text: Balancing family, community work, and my own art has been challenging. Also, navigating bureaucracies and securing
    funding for public art projects requires patience and persistence.
- speaker: Interviewer
  text: What do you hope your legacy will be?
- speaker: Respondent
  text: I hope to be remembered as someone who brought art into the community and helped others find their creative voices.
    Art is not just for galleries; it belongs in everyday life and public spaces.
