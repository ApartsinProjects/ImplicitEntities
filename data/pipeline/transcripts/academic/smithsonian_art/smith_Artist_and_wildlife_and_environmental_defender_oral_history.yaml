source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early childhood and family background?
- speaker: Respondent
  text: I grew up in Berkeley, in a family that valued nature and conservation. My early memories are filled with the beauty
    of the Sierra and the influence of naturalists and writers who inspired me.
- speaker: Interviewer
  text: What role did education play in shaping your interests?
- speaker: Respondent
  text: I attended Mills College and studied art and museum work. My education broadened my perspective and deepened my appreciation
    for both art and the natural world.
- speaker: Interviewer
  text: How did your marriages influence your life and work?
- speaker: Respondent
  text: My first marriage took me to Chicago and Carmel, where I was exposed to different environments and communities. My
    second marriage to Nathaniel Owings brought me closer to conservation efforts and architectural preservation.
- speaker: Interviewer
  text: What motivated your involvement in conservation, particularly with the sea otter and mountain lion?
- speaker: Respondent
  text: I was deeply moved by the plight of these animals. The sea otter faced threats from fishermen, and the mountain lion
    was hunted extensively. I felt compelled to act, combining scientific facts with emotional appeal to protect them.
- speaker: Interviewer
  text: Can you describe your work with the California State Park Commission?
- speaker: Respondent
  text: Serving on the commission from 1963 to 1969, I worked to save the redwoods and opposed projects that threatened natural
    areas. It was challenging, especially as a woman in a male-dominated field, but I was determined to make a difference.
- speaker: Interviewer
  text: What were some of the key challenges you faced in conservation politics?
- speaker: Respondent
  text: There were many, including political opposition, personal attacks, and balancing tradeoffs. Fighting a freeway in
    Big Sur was particularly intense, involving property owners, government agencies, and public opinion.
- speaker: Interviewer
  text: How did your artistic background influence your conservation efforts?
- speaker: Respondent
  text: Art taught me to see beauty and detail, which translated into a passionate commitment to preserving natural landscapes.
    I also used art to communicate and inspire others about environmental issues.
- speaker: Interviewer
  text: What are some memorable experiences from your conservation campaigns?
- speaker: Respondent
  text: One vivid memory is confronting abalone fishermen with Ian McMillan to protect sea otters. Another is the legislative
    battles to remove the mountain lion bounty, which involved dramatic hearings and public engagement.
- speaker: Interviewer
  text: How do you view the relationship between people and nature?
- speaker: Respondent
  text: I believe people must respect and protect nature. Our survival depends on it. Conservation is not just about saving
    animals or trees but about preserving the balance that sustains us all.
