collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: What led you to return to Southern California from Arizona?
- speaker: Respondent
  text: 'Well, I had a problem there of survival. Arizona is a wonderful place, especially an Indian reservation, but when
    you run out of money, there''s not much you can do but come back to where you were. I didn''t want to go back to Hermosa
    Beach, I wanted to get away from that area for a while. I owned the house there, rented that to people. And I said, well,
    what would be a good compromise between the sea and Arizona, where I could get the terrain of nature and mountains, and
    yet be close to the sea so I could go swimming and bodysurfing if I wanted to? And something flashed on me: Topanga Canyon.
    At that time, there were a group of artists living there, and rent was so cheap it was incredible. The first house we
    lived in was about five bedrooms and a huge living room and studio, and it was, I think, $57.50 a month rent. I stayed
    there until the landlord dynamited a big rock in front of the place, and kind of changed the geographic position of the
    house, his house and all the rest of the houses in the neighborhood. Yeah, that was on Fernwood Pacific Drive. A guy named
    Vance Sanders. He meant well. He did scare the people a bit. So in sheer desperation - I didn''t know what to do, and
    this wonderful woman who lived about three blocks away said, "I have a house for rent up on the top of the hill with a
    view that you just won''t believe." And she said, "It''s such a beautiful house, and an acre with gardens all landscaped,
    I''d have to charge you $90 a month rent for it." So I moved up there after a year of the other place.'
- speaker: Interviewer
  text: Is that the house that didn't have any water?
- speaker: Respondent
  text: No, that's another one. That was after the one on Summit Drive. There I met a lot of wonderful people. I got very
    stimulated by Topanga and by the artists who lived there. That's where I met Karl Nolde, the German expressionist. He
    lived across the road from me.
- speaker: Interviewer
  text: Nole or Nolde?
- speaker: Interviewer
  text: Is he any relation to Emil Nolde?
- speaker: Respondent
  text: Yeah, he was the brother of Emil Nolde. But he called himself Kanol in America, Karl Kanol, of Karl Nol of Nolde.
    He kept you laughing from night to day, wonderful German. I could go on with stories about him for years. Incredible what
    he got into, just living in Topanga.
- speaker: Interviewer
  text: Well, maybe you could just give us one of the stories about Karl Nolde?
- speaker: Respondent
  text: 'Well, I wouldn''t know where to start with that, because he was always having-- He was a painter who painted German
    expressionist painting. He still is a German expressionist, and he is still painting, but now he lives in Mexico in Guanajuato.
    He''s lived there since about 1957. He liked to buy old automobiles. He had sort of an obsession for old vehicles in the
    thirties: ''37, ''36 models, ''35, ''32. One story I can tell you, he also painted houses to make a living. But his house
    was stacked with paintings, and he hung paintings on top of paintings in the house. He lived next door to a woman who
    kept monkeys, who had a monkey farm up the canyon, a Mrs. Buckman. He lived next door to her. The monkey-farm lady had
    about three hundred monkeys. She would dress up the most wonderful monkeys in clothes, all sorts of suits and neckties
    and shirts, and bring them down to the market in Topanga in a group. They''d go into the store and drive the storekeeper
    crazy, and the butcher, they''d be up on the butcher''s counter. The whole monkey farm burned down one day. Two monkeys
    got in a fight over a cigarette and a match and set fire to the hay. Burned the whole place down before they could do
    anything. She lost about, oh, 50 percent of her animals. The fire department tried to hook up the water, but the bigger
    monkeys were unhooking it all the time. They were up on the fire truck putting the hats on. Like the chimps -'
- speaker: Interviewer
  text: Did the monkeys escape?
- speaker: Respondent
  text: Yeah, well, they were all out of their cages running around wild. The fire department was so frustrated-- Actually,
    when they went back after the fire was over, down to the station in Topanga-- Bob Etts, he was my friend, he told me the
    story. When they got back they were all talking about the crazy fire and all these crazy animals. They went out, and there
    were two monkeys that were unrolling the hose out of the fire truck at the fire station. [laughter] Well, Karl became
    a neighbor of Mrs. Buckman, who slept with an ape and had a donkey that was always right in the middle of the road. In
    order to make an entrance into my house and Karl's-- And Hazelett lived up there, he had the Hound of the Baskerville.
    It was a big dog he'd named something or other. He had these huge hounds. The three entries where it was very steep, at
    night we'd come home at one, two in the morning, the donkey would be lying across the road. We'd have to get out and sit
    on a steep angle and pull this animal off the road to get by him, he wouldn't move. We told Mrs. Buckman about it a hundred
    times; it didn't do any good. Karl was always painting, but he left his window open. One night there was a knock at the
    door, and there was a monkey, or two monkeys, dressed up in Lederhosen. He opened the door and they both jumped up on
    him and hugged him while the other monkeys came through the back window. They were throwing his brushes all over the studio,
    you know. Karl was going mad with these monkeys. So that was a typical Topanga story. As for his cars, that's a whole
    different thing--that goes on and on and on. The things caught on fire, and he was arrested. He drove one car to Santa
    Monica down on the Pacific Coast Highway near the overpass, the Wilshire overpass. It ran out of gas. So he went to get
    gasoline, and he came back and the car was gone; somebody had stolen it. So he went to the Santa Monica City Hall, told
    the police, reported it. He hitchhiked back to Topanga, and then he got his other car. He drove that down, and that broke
    down in the middle of the highway. He went for help at a gas station, came back and that one was stolen. He went to the
    city hall again, and they refused to accept his complaints. They said he was crazy and threw him in jail. [laughter] So
    he finally got out after he convinced them that he was not crazy, and he really did have two cars, and they were both
    stolen on the same day within four hours of each other. He went home and got his old truck. He had to paint some house
    in the San Fernando Valley, and he's going down the hill, and he got down there and this woman stopped dead in front of
    him and slammed on the brakes, and he rear-ended her. Well, when he did that, all of the paint in the truck tipped over,
    and the lids came off and it started running all over the floor--green, white paints, mixed. The policeman screamed at
    Karl to get out of the truck. And he said, with German accent, "I can't get out of the truck, I'm stuck." And he said,
    "What do you mean you're stuck?" "I'll pull you out." So he opened the door to pull Karl out, and when he did that all
    the paint ran out all over the policeman's pants and boots, completely down over his feet and legs. So Karl was again
    taken in that day, in Van Nuys. He had these things happen to him. One car caught on fire on the Pacific Coast Highway,
    in the back seat, and he had nothing to do, so he kept running over across the traffic getting sand in his hands to pour
    on it, to put out the fire. [laughter] Back and forth. Karl's eighty-two now. When he was seventy-nine, they had the Cervantes
    Festival in Mexico, in Guanajuato. Karl walked up to the conductor, the conductor of the Leipzig Symphony Orchestra. They
    played Mahler, and when they got all through, he said, "You know, Mahler was my hero, and Bruno Walter was my hero." And
    the man said, "Who are you?" He says, "Why do you ask?" He said, "We've been looking for you for years, you've been lost."
    He said, "How do you mean that?" He said, "Half of our museum is full of your work. I'll send you a catalog." So they
    sent him a catalog this thick, and just about half of the book was his paintings, his works. So they invited him to have
    a retrospective on his eightieth birthday of all that work and his new works. So he went to Leipzig to celebrate that.
    I had him for a neighbor and all other kinds of eccentrically wonderful people for neighbors. Topanga was a place where
    you didn't expect anybody to come in it, and the people who lived there, you didn't expect would ever leave.
- speaker: Interviewer
  text: Was Topanga more isolated then? Was it harder to get in and out from the highway?
- speaker: Respondent
  text: No. It was for a while, because they cut the highway off, took one mile out of the curves, and you couldn't go to
    the coast at all. It was all shut up from the coast up to Topanga, to remove these curves. So if we came home before two
    in the morning-- They'd let natives through on this dirt road, but no one else. If you came home after two in the morning.
    It was locked up and you had to walk home. I remember those ley cold nights going up that canyon, and
