turns:
- speaker: Interviewer
  text: I was first introduced to the world of wood turning by the industrial designer Henry Dreyfuss in 1948. We had a meeting
    at his home in Pasadena, California, concerning some furniture that he wanted me to do for his new home. During my visit
    he showed me some bowls that I had commented on. He told me that a friend of his, James Prestini, had made them for him.
    I had never seen bowls turned so thin and to such perfection. Some years later I met Bob Stocksdale at the Los Angeles
    County Fair. We both had been invited to show and demonstrate how we worked. This took place in 1952.
- speaker: Respondent
  text: At that time Bob was primarily turning salad bowls and smaller serving bowls that were being sold at Gump's in San
    Francisco, though his first sales outlet was at the Helen Winnemore Gallery and also at a gallery in Washington, D.C.
- speaker: Interviewer
  text: We met again in 1957 at the first American Craft Council Conference at Asilomar (Monterey). That was the beginning
