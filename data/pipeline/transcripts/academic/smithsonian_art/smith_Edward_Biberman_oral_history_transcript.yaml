collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: You were born in 1904, October . . .
- speaker: Respondent
  text: . . . twenty-third.
- speaker: Interviewer
  text: Twenty-third. In Philadelphia. Your father owned a factory?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: What kind of factory was it?
- speaker: Respondent
  text: A dress factory. As you probably know, a great deal of manufacturing in the garment industry came into the hands of
    first-generation immigrants, of whom my father was one. He and his three brothers operated what became a very successful
    business.
- speaker: Interviewer
  text: Is it a business that they started?
- speaker: Respondent
  text: They started it; and until very recently, when it went public, it was a very important firm. None of the original
    four brothers, with the exception of a surviving brother who is no longer active, participate. They went public many years
    ago and, I understand, did very badly from that time on. [laughter] But my father and three brothers were the active owners,
    and they started it.
- speaker: Interviewer
  text: Your mother was also from Russia?
