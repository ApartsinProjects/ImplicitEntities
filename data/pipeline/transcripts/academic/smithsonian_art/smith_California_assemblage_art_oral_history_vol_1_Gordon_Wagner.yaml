collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood and early influences?
- speaker: Respondent
  text: I grew up in Redondo Beach and Athens-on-the-Hill. My parents were very supportive, and I started painting and building
    things at a young age. Meeting Norman S. Chamberlain was a significant influence on my early development as an artist.
- speaker: Interviewer
  text: What was life like on the beach during your youth?
- speaker: Respondent
  text: Life on the beach was vibrant and full of energy. There were rumrunners and beach-front gangs, and the amusement zone
    in Redondo Beach was a central part of the community. It was a unique environment that shaped much of my artistic vision.
- speaker: Interviewer
  text: How did your relationship with Norman S. Chamberlain impact your work?
- speaker: Respondent
  text: Living and working with Norman Chamberlain exposed me to European influences and other local artists. He was a mentor
    who helped me refine my skills and broaden my perspective on art.
- speaker: Interviewer
  text: What was your educational background?
- speaker: Respondent
  text: I attended UCLA for three years and earned a B.A. in engineering. I also studied at the University of California,
    Berkeley, and spent a year at the Chouinard Art Institute. Additionally, I received private instruction from Norman S.
    Chamberlain.
- speaker: Interviewer
  text: Can you describe your career before becoming a full-time artist?
- speaker: Respondent
  text: I worked as a tool and die maker and tool design engineer for various companies, including North American Aviation
    and Hughes Aircraft, from 1934 to 1958. This technical background influenced my approach to art, especially in my assemblages
    and constructions.
- speaker: Interviewer
  text: How did your art evolve over the years?
- speaker: Respondent
  text: My work went through several periods, starting with amusement zone paintings and drawings in the 1920s and 1930s,
    moving to Big Sur and marine paintings in the 1940s, and then to assemblages and mobiles in the late 1940s and 1950s.
    Later, I explored themes from Native American culture, Mexican influences, and psychedelic art.
- speaker: Interviewer
  text: What role did your time in Mexico play in your artistic development?
- speaker: Respondent
  text: Mexico had a profound impact on my work. The imagery, culture, and spiritual aspects influenced my assemblages and
    paintings. I incorporated symbols and motifs from Mexican cemeteries and folk art, which added depth and meaning to my
    pieces.
- speaker: Interviewer
  text: Can you talk about your involvement with Native American culture?
- speaker: Respondent
  text: I was deeply interested in American Indian myths and legends, especially those of the Navaho and Hopi. I spent time
    on the Navaho reservation and was influenced by their traditional and progressive factions. This connection enriched my
    art and introduced new themes and symbols.
- speaker: Interviewer
  text: How did you transition from engineering to full-time art?
- speaker: Respondent
  text: After my first wife passed away, I quit engineering and moved to Mexico to focus on my art. It was a turning point
    that allowed me to dedicate myself fully to creating and teaching art.
- speaker: Interviewer
  text: What was the art scene like in Los Angeles during the late 1950s and early 1960s?
- speaker: Respondent
  text: The L.A. art scene was dynamic but also had its challenges. There was an art 'syndicate' that influenced galleries
    and exhibitions. I had interactions with figures like Silvan Simone and Maurice Tuchman, and the scene was a mix of traditional
    and emerging styles, including Funk art and assemblage.
- speaker: Interviewer
  text: How do you view the role of critics and the art market?
- speaker: Respondent
  text: Critics can be both helpful and limiting. I have my views on the art market and how it affects artists. I believe
    in staying true to one's vision rather than catering to trends or critics' expectations.
- speaker: Interviewer
  text: Can you describe some of your notable assemblage pieces?
- speaker: Respondent
  text: Pieces like 'Piece of Pieces from the Sea,' 'Between Heaven and Hell,' and 'Sir Deauville' are examples of my assemblage
    work. They often incorporate found objects and explore themes of time, memory, and spirituality.
- speaker: Interviewer
  text: What teaching positions have you held throughout your career?
- speaker: Respondent
  text: I've taught at various institutions, including the Valley Center of the Arts, Palos Verdes Community Arts Center,
    Barnsdall Art Center, Rustic Canyon Art Center, and Angel's Gate Cultural Center, among others. Teaching has been an important
    part of my life, allowing me to share my knowledge and passion for art.
- speaker: Interviewer
  text: What are some of the exhibitions where your work has been shown?
- speaker: Respondent
  text: My work has been exhibited widely, including one-man shows at the Silvan Simone Gallery in Los Angeles, the Phoenix
    Art Museum, and the Long Beach Museum of Art. Group exhibitions include the Pasadena Museum of Art, Los Angeles County
    Museum of History, Science, and Art, and international venues in Europe.
- speaker: Interviewer
  text: How do you incorporate symbolism from different cultures in your work?
- speaker: Respondent
  text: I draw on symbols from Mexican, Native American, and other cultures, blending them with my own experiences and ideas.
    This fusion creates layers of meaning and connects my work to broader human themes.
- speaker: Interviewer
  text: What is the significance of playing card imagery in your art?
- speaker: Respondent
  text: Playing card imagery, such as the 'Fool' series, represents themes of chance, fate, and the human condition. It allows
    me to explore narrative and symbolic content in a visually engaging way.
- speaker: Interviewer
  text: Can you discuss your use of assemblage as a meditation on time?
- speaker: Respondent
  text: Assemblage allows me to bring together objects from different times and places, creating a dialogue between past and
    present. It's a way to reflect on timelessness and the passage of time through art.
- speaker: Interviewer
  text: How has your engineering background influenced your artistic practice?
- speaker: Respondent
  text: My engineering experience gave me a strong foundation in design, structure, and materials. It helped me approach art
    with a technical understanding, especially in constructing mobiles, light machines, and assemblages.
- speaker: Interviewer
  text: What are some of the themes you explore in your later works?
- speaker: Respondent
  text: In my later works, I focus on themes like spirituality, mythology, memory, and the intersection of technology and
    nature. The 'Whiskey Marine' series, for example, explores icons and power objects with a deep symbolic resonance.
- speaker: Interviewer
  text: How do you see your legacy as an artist?
- speaker: Respondent
  text: I hope my work contributes to a broader understanding of assemblage and mixed media art. I want to inspire others
    to see the beauty in found objects and to explore the connections between cultures, time, and personal experience.
