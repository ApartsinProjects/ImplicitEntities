collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your experiences teaching history at Ewing Christian College in India?
- speaker: Respondent
  text: Yes, I taught history at Ewing Christian College during 1917-1918. It was a fascinating time because I was immersed
    in the culture and history of India, learning about the Moghul Empire and the complexities of Indian society under British
    rule.
- speaker: Interviewer
  text: What was your impression of the Indian Civil Service and the educational system there?
- speaker: Respondent
  text: The Indian Civil Service was quite elite, and the educational system was designed to train the elite for administrative
    roles. There were sectarian colleges and religious training schools, but also nonreligious institutions. The British influence
    was strong, and education was often geared towards maintaining colonial control.
- speaker: Interviewer
  text: How did you find living arrangements and daily life while you were in India?
- speaker: Respondent
  text: Living arrangements were modest. Transportation was limited, and daily life involved adapting to local customs and
    climate. I remember hiking in the hills and dealing with health challenges like typhoid fever and the influenza epidemic.
    It was a challenging but enriching experience.
- speaker: Interviewer
  text: After India, you worked in China. Can you describe your work there?
- speaker: Respondent
  text: In China, I worked around 1922-1925, initially with the YMCA and then in social work. I was involved in famine relief
    and observed the impact of warlords. I also taught at Chinghua College and experienced the complexities of Westerners
    living standards in China, the customs service, and the political environment including treaties and extraterritorial
    rights.
- speaker: Interviewer
  text: What was your experience traveling on the Trans-Siberian Railroad?
- speaker: Respondent
  text: Traveling from Mukden to Moscow on the Trans-Siberian Railroad in 1925 was quite an adventure. I had a stopover in
    Moscow where I observed the Soviets' New Economic Policy and even met Madame Krupskaya. It was a unique opportunity to
    see the contrasts between East and West during a turbulent period.
- speaker: Interviewer
  text: How did your academic career develop after your international experiences?
- speaker: Respondent
  text: After returning to the US, I taught economics at Columbia College from 1925 to 1933. I was influenced by Keynesian
    economics and focused on government and private enterprise. I also taught Introduction to Contemporary Civilization in
    the West and received career advice from senior professors.
- speaker: Interviewer
  text: Can you discuss your role in the Roosevelt and Truman administrations?
- speaker: Respondent
  text: I served in various government posts from 1933 to 1951, including the Resettlement Administration, Social Security
    Board's Bureau of Research and Statistics, and the Commerce Department. I worked on consumer interests, quotas, reciprocal
    trade agreements, and wartime economic planning. I was involved in the War Production Board and later in the Mission for
    Economic Affairs related to the Marshall Plan.
- speaker: Interviewer
  text: What was your involvement with the Marshall Plan and NATO negotiations?
- speaker: Respondent
  text: I participated in the planning and implementation of the Marshall Plan, including the Paris Conference in 1948 and
    NATO negotiations in 1951. My work involved coordinating economic aid, agreements on coal, food, and railways, and addressing
    diplomatic and military concerns during the post-war reconstruction.
- speaker: Interviewer
  text: How did your career transition to academia at the University of California, Berkeley?
- speaker: Respondent
  text: In 1951, I became a Professor of Political Science at UC Berkeley and directed the Bureau of International Relations.
    I focused on international studies, the Peace Corps, and fostering programs related to foreign affairs. I also worked
    on understanding the university's administrative structure and promoting international cooperation.
- speaker: Interviewer
  text: What were some of the challenges and achievements in your work with international programs at Berkeley?
- speaker: Respondent
  text: One challenge was balancing academic criticism with practical international relations work. We developed programs
    in Indonesia and other countries, collaborated with the Institute of International Studies, and supported international
    visitors. We also navigated issues related to immigration, communism, and cultural understanding during the Cold War era.
