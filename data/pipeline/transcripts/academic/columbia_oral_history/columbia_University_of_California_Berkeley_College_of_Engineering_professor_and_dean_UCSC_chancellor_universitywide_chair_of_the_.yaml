source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and childhood?
- speaker: Respondent
  text: I was born and raised in Stockton, California. My family has deep roots there, and I had a fairly typical childhood
    for the time. My parents were very supportive of education and instilled strong values in me from an early age.
- speaker: Interviewer
  text: What influenced your decision to attend UC Berkeley?
- speaker: Respondent
  text: Several factors played into that decision. My family valued education highly, and UC Berkeley was a prestigious institution
    close to home. Also, I was interested in engineering, and Berkeley had a strong program in that field.
- speaker: Interviewer
  text: How did your experience at Berkeley shape your career path?
- speaker: Respondent
  text: My time at Berkeley was formative. I was involved in the V-12 Navy program during World War II, which gave me discipline
    and a sense of purpose. Academically, I was challenged and inspired by my professors, which motivated me to pursue graduate
    studies and eventually a career in academia and administration.
- speaker: Interviewer
  text: Can you describe your military service during World War II?
- speaker: Respondent
  text: I enlisted in the Naval Reserve and was part of the V-12 program, which was designed to train officers quickly. I
    served in the 125th Naval Construction Battalion in Okinawa. The experience taught me leadership and resilience, and it
    influenced my post-war plans significantly.
- speaker: Interviewer
  text: What was your graduate study experience like?
- speaker: Respondent
  text: I pursued my Ph.D. at the University of Illinois in Theoretical and Applied Mechanics. It was a rigorous program,
    and I had the opportunity to work with some outstanding faculty and fellow students. It was also a time of personal growth,
    as I got married and started a family during that period.
- speaker: Interviewer
  text: How did you transition from graduate studies to your academic career?
- speaker: Respondent
  text: After completing my Ph.D., I returned to UC Berkeley as a faculty member in the College of Engineering. I started
    as a lecturer and gradually took on more responsibilities, including research and administrative roles. It was a natural
    progression fueled by my passion for teaching and engineering research.
- speaker: Interviewer
  text: What were some highlights of your time as a faculty member at Berkeley?
- speaker: Respondent
  text: I worked on various research projects, including structural mechanics and viscoelasticity. I also enjoyed mentoring
    graduate students and collaborating with colleagues. One memorable achievement was receiving the Wason Medal with my colleague
    Boris Bresler. Additionally, I was involved in the development of new research facilities and programs.
- speaker: Interviewer
  text: Can you tell me about your sabbatical year in Ireland?
- speaker: Respondent
  text: I spent a year at University College, Cork, as a Fulbright lecturer. It was a wonderful experience both professionally
    and personally. I engaged with faculty and students there, traveled extensively with my family, and gained new perspectives
    on engineering education and research.
- speaker: Interviewer
  text: How did your administrative roles evolve over time?
- speaker: Respondent
  text: I gradually took on more leadership roles, starting as vice chairman of my division and eventually becoming dean of
    the College of Engineering. Later, I served as chancellor at UC Santa Cruz and as a university-wide vice president. Each
    role brought new challenges and opportunities to influence higher education.
- speaker: Interviewer
  text: What were some of your priorities as dean of the College of Engineering?
- speaker: Respondent
  text: I focused on supporting underrepresented minorities in engineering, fundraising for new facilities like the Computer
    Science building, and fostering strong relationships with industry. I also emphasized open communication and encouraged
    young faculty to develop their careers.
- speaker: Interviewer
  text: How did you approach diversity and affirmative action during your tenure?
- speaker: Respondent
  text: I was committed to increasing diversity within the engineering faculty and student body. We implemented programs to
    support underrepresented groups and worked to create an inclusive environment. It was an ongoing effort that required
    collaboration and persistence.
- speaker: Interviewer
  text: What reflections do you have on shared governance and faculty roles?
- speaker: Respondent
  text: Shared governance is essential for a healthy university. Faculty must have a voice in decision-making, especially
    regarding academic matters. Throughout my career, I participated in the Academic Council and various committees to help
    shape policies and advocate for faculty interests.
- speaker: Interviewer
  text: Can you share some thoughts on the relationship between academia and industry?
- speaker: Respondent
  text: Collaboration with industry is vital for engineering education and research. It provides practical perspectives, funding
    opportunities, and pathways for students into the workforce. I worked to strengthen these ties while maintaining academic
    integrity and independence.
- speaker: Interviewer
  text: What advice would you give to young engineers and academics today?
- speaker: Respondent
  text: Stay curious and committed to lifelong learning. Balance your technical expertise with a broad understanding of societal
    needs. Engage with your community and be open to interdisciplinary collaboration. And remember, integrity and perseverance
    are key to a fulfilling career.
