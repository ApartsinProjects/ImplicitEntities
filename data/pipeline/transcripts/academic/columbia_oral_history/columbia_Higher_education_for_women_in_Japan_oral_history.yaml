collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Dean Holmes, what was your experience in Higher Education for Women prior to your appointment to SCAP?
- speaker: Respondent
  text: I took my undergraduate work at Whitman College in Washington. Then I went on to get my Master's degree and my Ph.D.
    in Student Personnel work at Teachers College, Columbia University. Before I went to my position at SCAP, I had been for
    sixteen years a Dean of Women, first at Drury College in Springfield, Missouri; then at the State College of Washington,
    Pullman, Washington. During that time I had had a year's leave of absence and spent that year as professor of history
    at Kobe Jogakuin, and there I learned a great deal under the tutelage of Dr. Charlotte DeForest, long time president of
    that college, about the problems of women's education in Japan. It was from my contacts at that position that I believe
    my appointment came, to be Adviser on Higher Education for Women in Japan for SCAP.
- speaker: Interviewer
  text: Can you tell us about the organization of SCAP?
- speaker: Respondent
  text: When I reported for duty at Radio Tokyo on August 7th, 1946 I found the military section of SCAP, the Supreme Command
    of Allied Powers, had been on duty there since September 22nd, 1945. During that year the Occupation pattern had been
    set up to become very efficient in several different areas. And among those areas was a Civil Information and Education
    section. It was to this section that I was assigned. The directive for this section was first that a viable system of
    education for a democracy should be established in Japan as quickly as possible. That might involve stamping out remnants
    of the old militaristic regime, and it certainly would mean a good deal of rethinking of objectives and of new curriculum
    in relation to those objectives. Lieutenant-Colonel Donald Dugent was chief of the section. He had had some experience
    in Japanese schools before the war. Colonel Mark Orr was head of the Education Division. Eileen Donovan, a WAG, a former
    junior high school teacher in Boston, was to work with me on women's education. The staff had been making contacts in
    the previous year with educators throughout Japan and had a very good working relationship with many such people before
    any civilian advisers came into the picture. In March of 1946 an Education Mission had been sent out from the United States.
    Thirty prominent university professors and administrators had been there for one month making their recommendations about
    possible changes in the educational system of Japan. There also had been appointed their counterpart, the Japan Education
    Reform Committee, under the chairmanship of President Shigeru Nombara, who was at that time president of Tokyo Imperial
    University. Recommendations from these two bodies of educators formed the guide along which the Education Division made
    its recommendations and plans in conjunction with officials of the Japanese Ministry of Education, the Mombusho. It was
    a directive from General MacArthur that all changes brought about at any point in the government of Japan should be done
    through and with the existing Japanese officials.
- speaker: Interviewer
  text: I think maybe another question now. Could you describe a bit more the makeup of the Mombusho?
- speaker: Respondent
  text: It was a federal ministry of education and had very strict and definite control over the whole educational system
    of Japan from the primary schools right through the universities.
- speaker: Interviewer
  text: And who was the head of the Mombusho?
- speaker: Respondent
  text: The Minister of Education, and, of course, he varied from time to time. Dr. Tatsuo Morita was the Minister during
    most of the time that I was in Japan. Well, there were chiefs of bureaus in the Mombusho and heads of sections. The two
    men who worked with the education division of C.I.E. most consistently were Mr. Katsui from the social education section
    of the Mombusho and Mr. D. Hidaka, who was chief of the Bureau of Higher Schools of the Mombusho.
- speaker: Interviewer
  text: With whom did you work?
- speaker: Respondent
  text: I worked with both of these men. It was imperative that anything that we hoped would get done would be sent through
    these men or committees whom they might appoint to the Mombusho, where any action to be undertaken would be decided upon
    and sent either to the Diet or to the Minister, who might be able to make such changes. By the time I arrived the staff
    had been for some time discussing with various officials of the Mombusho the sort of education which would be the best
    preparation for responsible citizenship in a Democratic Japan.
