source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early years and how you became interested in mining geology?
- speaker: Respondent
  text: I graduated from the University of California-Berkeley in 1922 with a B.S. in mining engineering. After graduation,
    I took a job as an engineer and mine surveyor at the Carson Hill Gold Mines on the Mother Lode. In 1924, I received an
    M.A. in mining geology from Columbia University.
- speaker: Interviewer
  text: What was your first position with the Anaconda Company?
- speaker: Respondent
  text: Following a Journal Club presentation by Reno Sales, I interviewed with him and accepted a job in Butte, Montana with
    Anaconda Copper Company. I entered the Butte geological department in 1924 and was given regular underground beats mapping
    the Diamond, Mt. View, and Mt. Con Mines. There, I learned the systematic and practical Anaconda system for mapping.
- speaker: Interviewer
  text: What were some of the important cases or projects you worked on early in your career?
- speaker: Respondent
  text: While at Butte, I participated in the last major apex litigation—the Elm Orlu/Badger case. It was won by Anaconda
    on the strength of sound geologic mapping by Sales and other geologists who demonstrated the post-mineral nature of a
    key fault offsetting the lode.
- speaker: Interviewer
  text: Can you describe your work in Cananea, Mexico?
- speaker: Respondent
  text: In 1927, Sales sent me to Cananea to map and evaluate the recently discovered La Colorada orebody and to set up a
    Butte-style geological department and system. My meticulous mapping of the Colorada orebody described the classic goblet
    form of this zoned, high-grade breccia, perched on the apex of a mineralized porphyry stock and lying 1,000 feet beneath
    a telltale ring of small quartz veinlets. This work remains one of the best documented cases of the genetic relations
    between magmas and ore-forming processes.
- speaker: Interviewer
  text: What roles did you take on after your time in Cananea?
- speaker: Respondent
  text: In 1937, after nearly 10 years working at Cananea and in exploration for gold and base metals in Sonora, I was transferred
    back to the United States to head up western US exploration for Anaconda. I was made chief geologist of the International
    Smelting and Refining Company, an Anaconda subsidiary, in 1944. Upon Sales' retirement in 1949, I became chief geologist
    of Anaconda and remained in that role for 20 years. I was given the additional title of vice president in 1957.
- speaker: Interviewer
  text: What were some of the major discoveries or projects during your tenure as chief geologist?
- speaker: Respondent
  text: During the 1940s and 1950s, major new copper mines were discovered and brought into production at Yerington, Nevada
    and El Salvador, Chile. My role in both of these discoveries was similar and critical. On early field trips, I recognized
    the significance of mineralized outcrops at these prospects. I then assigned competent men to map and test the prospects—Bob
    Moehlman and Alex McDonald to Yerington and Bill Swayne to El Salvador.
- speaker: Interviewer
  text: Did you have involvement in exploration outside of copper?
- speaker: Respondent
  text: Yes, during the 1940s, I sent Jack Knaebel and Glenn Waterman to explore for gold in Omai and other areas of British
    Guyana and Brazil. In the 1950s, my team explored a large area of Santa Fe Railroad and Laguna Indian Reservation lands
    in New Mexico for uranium. The Haystack Butte, Jackpile, and Paguate orebodies were found, developed, and mined. They
    provided much needed income for Anaconda during periods of low copper prices.
- speaker: Interviewer
  text: What was your role after moving to Anaconda's head office in New York?
- speaker: Respondent
  text: In 1956, I was transferred to Anaconda's head office in New York to integrate operations and geological work. I was
    named vice president in 1957. I served as director and member of the executive committee from 1966 until my retirement
    in 1970. I also served as a consultant to Anaconda until 1975, completing a half century of active, loyal service.
- speaker: Interviewer
  text: How did you expand Anaconda's exploration activities during your leadership?
- speaker: Respondent
  text: During my term as chief geologist and vice president in Salt Lake and New York, I expanded Anaconda's worldwide exploration
    activities, especially in Chile, Canada, and Australia. A large number of significant properties were acquired, tested,
    and in some cases, put into production. These included Britannia Beach, British Columbia; Caribou, New Brunswick; and
    Red Ross, Australia.
- speaker: Interviewer
  text: What was your approach to integrating geological research with mining operations?
- speaker: Respondent
  text: I expanded the concept of integrating geological research work into active mining operations and exploration. This
    concept had been initiated in the 1940s by Reno Sales. I believed that combining research with operations was essential
    for success.
- speaker: Interviewer
  text: Can you share something about your personal life and how it complemented your career?
- speaker: Respondent
  text: I was a quiet and very courteous gentleman who delighted in my wife's rambunctious, fun-loving, and at times irreverent
    Irish wit. She accompanied me on many inspection trips and provided the perfect complement and backup for my travels and
    social occasions throughout our long marriage. Margaret was also a good mining-camp wife during our days together at Butte
    and Cananea.
- speaker: Interviewer
  text: What was your perspective on the future potential of the Butte District?
- speaker: Respondent
  text: During the last decade of my life, I focused my geologic thoughts on the remaining exploration potential of the Butte
    District. I usually visited the Montana Geological Resources department during my annual fishing trips on the Gallatin
    River. I believed that there was more copper to be found in Butte than has been produced to date.
- speaker: Interviewer
  text: How would you describe your legacy and impact on the field of mining geology?
- speaker: Respondent
  text: I was an inspiration to my professional associates and large family alike. I was a geologist's chief geologist, a
    mentor to scores of geologists of all ages, and to some, an ever-youthful geological father.
