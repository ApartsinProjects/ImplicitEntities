collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early education and how you became interested in librarianship?
- speaker: Respondent
  text: I started out at Columbia's library school in the late 1920s. I was very interested in the field because I saw it
    as a way to combine my love of books and research with public service.
- speaker: Interviewer
  text: What was your experience like working at the American Library Association in the early 1930s?
- speaker: Respondent
  text: Working at the ALA from 1930 to 1933 was very formative. It gave me a broad view of the profession and the challenges
    libraries faced nationally during the Depression.
- speaker: Interviewer
  text: How did your time at the University of Chicago's graduate library school influence your career?
- speaker: Respondent
  text: Chicago was a rigorous program. It deepened my understanding of library science and prepared me for academic and administrative
    roles later on.
- speaker: Interviewer
  text: What led you to become Dean of the School of Librarianship at Berkeley in 1946?
- speaker: Respondent
  text: After several university positions and wartime service, I was invited to Berkeley to lead the school. It was an exciting
    opportunity to shape library education on the West Coast.
- speaker: Interviewer
  text: What were some of the major changes you implemented as Dean?
- speaker: Respondent
  text: We expanded the faculty and student body, introduced doctoral programs, and replaced the graduate certificate with
    Bachelor and then Master of Library Science degrees. We also developed the Library School Library as a branch of the main
    library.
- speaker: Interviewer
  text: How did the school respond to the challenges of the postwar period?
- speaker: Respondent
  text: We focused on specialization and growth, adapting to the increasing complexity of librarianship and the needs of a
    growing student population.
- speaker: Interviewer
  text: Can you describe your relationship with colleagues and the campus community?
- speaker: Respondent
  text: We had a collaborative environment. I worked closely with faculty, the library administration, and campus leaders
    like Clark Kerr to advance the school's mission.
- speaker: Interviewer
  text: What was your perspective on the loyalty oath controversy?
- speaker: Respondent
  text: It was a difficult time. The loyalty oath raised questions about academic freedom and personal conscience, and it
    affected many faculty and staff.
- speaker: Interviewer
  text: How did you approach teaching and curriculum development?
- speaker: Respondent
  text: I emphasized practical skills alongside theory, aiming to prepare students for the evolving demands of librarianship.
    Courses in administration and research were important components.
- speaker: Interviewer
  text: What were your thoughts on the introduction of computers and automation in libraries?
- speaker: Respondent
  text: I saw the potential early on. Under Raynard Swank's deanship, we began integrating technology into the curriculum
    and research, which was essential for the future of the profession.
- speaker: Interviewer
  text: How did the school change after you stepped down as Dean?
- speaker: Respondent
  text: Raynard Swank took over and focused on modernization, including the move to South Hall and the establishment of the
    Institute of Library Research.
- speaker: Interviewer
  text: What do you think about the evolution of librarianship and library education today?
- speaker: Respondent
  text: The field has transformed dramatically with digital technology. While traditional skills remain important, new competencies
    are essential. The school has had to adapt its mission accordingly.
- speaker: Interviewer
  text: Looking back, what are you most proud of in your career?
- speaker: Respondent
  text: I'm proud of helping to build a strong, respected program at Berkeley that trained many capable librarians and scholars
    who contributed to the profession.
