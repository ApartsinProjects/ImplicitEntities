collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early memories?
- speaker: Respondent
  text: My family history is quite rich. My mother was Sara Bard Field, a noted feminist and writer, and my stepfather had
    a strong interest in Chinese furniture and paintings. Growing up in the San Francisco Bay area, I was fascinated by the
    oriental world, often visiting Chinatown and Chinese shops.
- speaker: Interviewer
  text: How did your interest in Asian art develop?
- speaker: Respondent
  text: It really took shape when I studied under Langdon Warner at Harvard. That experience fueled my passion for Asian aesthetics
    and culture, especially Japanese art. I was dismayed to find so few works of Asian art on the West Coast, despite the
    large Chinese and Japanese communities here.
- speaker: Interviewer
  text: What role did you play in promoting Asian art in Northern California?
- speaker: Respondent
  text: When I learned that Avery Brundage was considering finding a home for his extensive collection of Asian art, I conceived
    the idea of forming a group to negotiate with him. This led to the creation of the Society for Asian Art, which successfully
    persuaded Brundage to bring his collection to San Francisco.
- speaker: Interviewer
  text: Can you describe your teaching career?
- speaker: Respondent
  text: I taught Asian art history at Mills College for twenty years. It was challenging at times, especially as a woman in
    a women's college where the art department was openly hostile towards art historians, particularly female ones. But I
    was deeply committed to my work and to my students.
- speaker: Interviewer
  text: How did your mother's activism influence you?
- speaker: Respondent
  text: My mother's feminist activism definitely shaped my views and concerns about women's issues. I was very aware of the
    complexities women face balancing professional and family life, and I often questioned how younger women managed these
    pressures.
- speaker: Interviewer
  text: What are some memorable experiences from your travels related to Asian art?
- speaker: Respondent
  text: Traveling to Asia, especially Indonesia during the political turmoil, was eye-opening. I was determined to be an informed
    traveler, learning everything I could about the monuments and culture. It was a lifelong passion to keep learning and
    exploring new intellectual horizons.
