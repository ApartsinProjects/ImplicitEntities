collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early training in German?
- speaker: Respondent
  text: Yes, I was very interested in German from a young age. I studied it extensively during my school years.
- speaker: Interviewer
  text: What about your college days? What was your focus then?
- speaker: Respondent
  text: In college, I concentrated on the classics, particularly Latin and Greek. Latin was very important at the time as
    a tool for acquiring culture.
- speaker: Interviewer
  text: How did you come to teach Latin conversationally?
- speaker: Respondent
  text: I believed that Latin should be a living language, so I worked hard to teach it conversationally. I even worked twelve
    hours a day to master it as a spoken language.
- speaker: Interviewer
  text: What was your experience like studying abroad?
- speaker: Respondent
  text: I went to a European university for graduate study to prepare myself properly for a professorship in Latin. It was
    a rigorous and enriching experience.
- speaker: Interviewer
  text: Can you tell me about your friendship with John Dewey?
- speaker: Respondent
  text: John Dewey was a good friend of mine for over sixty years. We shared many intellectual discussions and he greatly
    influenced my thinking.
- speaker: Interviewer
  text: What led you to the University of California?
- speaker: Respondent
  text: I was called to Cal to teach Latin. It was an exciting opportunity to be part of a growing university and to contribute
    to its academic life.
- speaker: Interviewer
  text: How did you contribute to the Berkeley Music Association?
- speaker: Respondent
  text: I helped bring eastern concert artists to California year after year and supported the association both spiritually
    and financially.
- speaker: Interviewer
  text: What role did you play in the development of the Berkeley Public Library?
- speaker: Respondent
  text: I worked to transform the tiny storefront library into a grand structure financed by Carnegie funds, ensuring it served
    the community well.
- speaker: Interviewer
  text: What was your involvement during World War I?
- speaker: Respondent
  text: I handled the liaison agency between Washington, D.C. and the University of California military bureau, coordinating
    efforts during the war.
- speaker: Interviewer
  text: Can you describe your role in University Extension?
- speaker: Respondent
  text: I created and ran University of California Extension for over fifteen years, developing curricula that served a wide
    range of people including immigrants, laborers, and prisoners.
- speaker: Interviewer
  text: How did you maintain your health and productivity over the years?
- speaker: Respondent
  text: I have always been purposeful in my activities. Since I was a graduate student, I gave myself Swedish massages three
    times a day, took daily walks, and kept a diary every day since I was seventeen.
- speaker: Interviewer
  text: What was your daily routine like?
- speaker: Respondent
  text: Each day was well planned. I devoted time to intellectual and physical relaxation, and I worked diligently on my academic
    and personal projects.
- speaker: Interviewer
  text: How did you balance your academic work with your personal interests?
- speaker: Respondent
  text: I read extensively, graded papers daily, wrote poetry, and played golf regularly. This balance kept me active and
    engaged.
- speaker: Interviewer
  text: What was your experience with the Berkeley fire relief efforts?
- speaker: Respondent
  text: I headed the relief committee during the disastrous Berkeley fire in 1923, helping coordinate aid and recovery for
    the community.
- speaker: Interviewer
  text: Can you tell me about your involvement in local politics?
- speaker: Respondent
  text: In 1945, I was a reluctant mayoral candidate in Berkeley, placed on the ballot by friends who wanted a moderate option
    between extreme left and right candidates.
- speaker: Interviewer
  text: What organizations did you help establish?
- speaker: Respondent
  text: I was an instigator for several organizations including the Philological Association of the Pacific Coast, the American
    Association for Adult Education, the University of California Faculty Club, and the English Speaking Union.
- speaker: Interviewer
  text: How did you view the decline of classical languages?
- speaker: Respondent
  text: I witnessed the gradual decline of Latin and Greek as practical modern languages gained prominence, which was a significant
    shift in academic focus.
- speaker: Interviewer
  text: What was your approach to teaching during this transition?
- speaker: Respondent
  text: I continued to teach Latin conversationally and worked to keep the classical languages relevant despite changing trends.
- speaker: Interviewer
  text: How did you contribute to labor education?
- speaker: Respondent
  text: I started Extension's Department of Labor Education, focusing on education for workers in a democracy and addressing
    issues related to communism and labor rights.
- speaker: Interviewer
  text: What was your involvement with prisoner education?
- speaker: Respondent
  text: We developed educational programs for prisoners, including those in Alcatraz and San Quentin, aiming to provide meaningful
    learning opportunities.
- speaker: Interviewer
  text: How did you manage relations between Extension and the university faculty?
- speaker: Respondent
  text: I worked to maintain good relations, ensuring that Extension's programs complemented the university's academic mission
    and faculty interests.
