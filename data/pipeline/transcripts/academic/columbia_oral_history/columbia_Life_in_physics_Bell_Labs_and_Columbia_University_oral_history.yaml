collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early education?
- speaker: Respondent
  text: I come from a family in South Carolina. I attended Furman University and then Duke before going to Caltech for my
    graduate studies.
- speaker: Interviewer
  text: What sparked your interest in physics?
- speaker: Respondent
  text: I had a feeling for how things work from a young age. My boyhood interests were very much in natural science and understanding
    the world around me.
- speaker: Interviewer
  text: How did your early education influence your career path?
- speaker: Respondent
  text: My first physics course was very influential. I was fascinated by quantum mechanics, nuclear physics, and relativity,
    which shaped my future research interests.
- speaker: Interviewer
  text: What was your experience like at Caltech?
- speaker: Respondent
  text: Caltech was a remarkable place with great physicists like Smythe, Zwicky, Oppenheimer, and Pauling. I enjoyed music
    and hikes with fellow students, and my doctoral thesis was a significant milestone.
- speaker: Interviewer
  text: How did you come to work at Bell Telephone Laboratories?
- speaker: Respondent
  text: In 1939, I was looking for a job and Bell Labs was a leading place for research. I joined their seminar group and
    was assigned to radar work during World War II.
- speaker: Interviewer
  text: What was your role during the war?
- speaker: Respondent
  text: I worked on radar technology, collaborating with the MIT Radiation Laboratory. It was a time of urgency and secrecy,
    but very important work.
- speaker: Interviewer
  text: What happened after the war?
- speaker: Respondent
  text: After the war, I continued work in microwave spectroscopy at Bell Labs, but eventually moved to Columbia University
    in 1948 to become a professor of physics.
- speaker: Interviewer
  text: Can you describe your work at Columbia University?
- speaker: Respondent
  text: At Columbia, I focused on microwave spectroscopy and was involved with the Office of Naval Research. I also conducted
    experiments with ammonia and studied hyper-fine structure.
- speaker: Interviewer
  text: How did the idea for the maser come about?
- speaker: Respondent
  text: The discovery was a gradual process. It involved understanding stimulated emission and overcoming skepticism. The
    breakthrough came in the early 1950s, with key contributions from my colleagues.
- speaker: Interviewer
  text: What challenges did you face with publication and patents?
- speaker: Respondent
  text: There were disputes over priority and patent rights, including claims from the Soviet Union. Navigating patent law
    was complex, but we secured patents for the maser.
- speaker: Interviewer
  text: How did the military respond to your work?
- speaker: Respondent
  text: The Air Force and Navy showed interest, especially for millimeter wave applications. I served on committees and worked
    with defense agencies to advance the technology.
- speaker: Interviewer
  text: What was your involvement with the Institute for Defense Analyses?
- speaker: Respondent
  text: I joined IDA in 1959, working on various defense-related projects and serving on the President's Science Advisory
    Committee. It was a period of intense government engagement.
- speaker: Interviewer
  text: How did your career evolve after that?
- speaker: Respondent
  text: I continued research and advisory roles, including at MIT as provost and professor. Later, I became a University Professor
    at Berkeley, focusing on astrophysics and infrared research.
- speaker: Interviewer
  text: What are your thoughts on the impact of the Nobel Prize on science?
- speaker: Respondent
  text: The Nobel Prize brings recognition and can inspire others, but science is a collective effort. The prize also brings
    responsibilities and public attention.
- speaker: Interviewer
  text: Can you tell me about your work in astronomy?
- speaker: Respondent
  text: I have been involved in radio astronomy, searching for molecules in space using microwave techniques. It was initially
    slow to gain acceptance but has become an important field.
- speaker: Interviewer
  text: How do you view the relationship between science and government?
- speaker: Respondent
  text: Scientists have a role to play within government to provide expertise and guidance. However, there are challenges,
    especially during times of political tension.
- speaker: Interviewer
  text: What advice would you give to young scientists today?
- speaker: Respondent
  text: Be curious, persistent, and open to new ideas. Collaboration and intuition are important, but so is rigorous testing
    and objectivity.
