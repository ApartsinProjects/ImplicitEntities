collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Mr. Enoch Percy French has been a timber cruiser for how long?
- speaker: Respondent
  text: When you get right down to it, I'd say since about 1900. I was born in Gruerneville in 1882 and Dad and I come to
    Scotia in December, 1889, and the family come up in 1890. We moved to Rio Dell and Dad, who was a lumberman, was loggin'
    for the Pacific Lumber Company at Scotia.
- speaker: Interviewer
  text: Your father came out from Maine, didn't he?
- speaker: Respondent
  text: Yes. He was a state-of-Mainer. He moved to Michigan first and worked for Eddy Brothers in a logging camp and then
    to California. Then they come out here and looked Dad up when they started to buy the Pacific Lumber Company holdings.
    So we done a great deal of their checking on that timber.
- speaker: Interviewer
  text: That was the holding from which was purchased the Rockefeller Forest, the Avenue of Giants, and the Garden Club of
    America Grove. The Pacific Lumber Company is still the largest lumber company up in that general region around Scotia.
    Mr. French, how did you get interested in working in the woods?
- speaker: Respondent
  text: Well, I started about 1890; I'd be eight years old then. Dad took me down there in Scotia and to keep me busy he put
    me with the old teamster who took care of the oxen. They always did this logging with oxen, and they gave me the job of
    feeding them their grain. Anyway, I'd get up at four o'clock every morning to feed them and get their bedding ready. There
    were anywhere from twelve to twenty oxen; they were used as teams to haul logs. They'd usually have six or seven yokes
    and that's fourteen oxen. Then I went from there, after we got through there, and Dad started checking around for these
    companies and he took me out to run compass for him. A cruiser has to have a compass.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: This brought me up to about sixteen or seventeen years old.
- speaker: Interviewer
  text: This was about 1898 or '99?
- speaker: Respondent
  text: Well, somewhere around 1900.
- speaker: Interviewer
  text: Here we have a bound volume which illustrates Mr. French's cruises. This was made at a later date, 1930, when the
    State Park Commission was dealing with the Pacific Lumber Company to buy the Rockefeller Forest. Percy, why don't you
    indicate what timber cruising is for and what its methods are and how you trained for that kind of work. Then you can
    tell us something about cruising for the Rockefeller Forest in the Pacific Lumber Company's holdings.
- speaker: Respondent
  text: Well, I went out with my Dad, running compass and checking with him about 1900, then about 1906 I started to cruise
    myself.
- speaker: Interviewer
  text: Before I turned on the tape recorder you were telling us that your Dad was a pretty rugged man to learn the trade
    under.
- speaker: Respondent
  text: Yes, he was. He got us out at daylight and always got home after dark. You see, he was an expert at lumbering himself
    because he'd cruised, bought, and sold timber for others and owned two or three mills. If he brought a cruise in on 40
    acres he'd put down, say, 'Two million board feet of timber on this,' and this was his mill cut. He'd size up the timber
    when he cruised and report only what was worth milling. Dad was a great one to bring his reports in on a chip of wood.
- speaker: Interviewer
  text: In other words, Dad was a comparative cruiser. But...
