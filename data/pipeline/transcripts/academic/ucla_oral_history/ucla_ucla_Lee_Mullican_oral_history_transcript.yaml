collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: I'm going to start by asking you where and when you were born.
- speaker: Respondent
  text: I was born in Chickasha, Oklahoma, in 1919. Early in December, which makes me Sagittarius, [laughter] on, as my mother
    tells me, a very cold, wintry night. I was born at home, and my father - it was a blizzard, actually, and the doctor could
    hardly get there--had to cut down some dead trees around the house to keep the house warm so my mother could go through
    with the birth.
- speaker: Interviewer
  text: He had to make fires out of the . . .
- speaker: Respondent
  text: That's right. So it was a small town in Oklahoma, just south of Oklahoma City.
- speaker: Interviewer
  text: Tell me a bit about the structure of your family. Were there other siblings?
- speaker: Respondent
  text: Yes, at that time I had an older sister Mahota. There had also been another sister Lavilla who had died when she was
    about two years old. A brother Howard was born three years later. So I was the third child, the first male child. My mother's
    name was Zula Jolley, and my father's given name was Harris Nichols.
- speaker: Interviewer
  text: And when you were growing up, what sort of things got you interested in making art and drawing and that kind of thing?
- speaker: Respondent
  text: Well, it took quite a while. My mother had taken art lessons at the local college - this was before I was born - and
    was interested in painting and drawing. But she was very busy being a wife and mother, so she didn't have all that much
    time to paint. She loved to travel; we did a lot of traveling. And she always took sketch books. So actually my first
    interest in art came through what she was doing. And the time finally came when she went on a trip, I think to Florida,
    and I was left alone in the house with my sister. And I went into a closet and discovered her kit of oil paints; and I
    decided while she was gone I'd see what I could do. So I took some cardboard, set it up on her easel, and took out the
    paints and began to play around.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: Well, I guess by this time I was about fifteen or sixteen. It being a small town, there was no art instruction in
    the public schools. Particularly in grade school, I remember, there was just nothing, except perhaps some kind of cut-out
    papers and paste, paste things together. Kindergarten stuff.
- speaker: Interviewer
  text: What was your father like?
- speaker: Respondent
  text: My father was strictly a businessman. He devoted all of his time to his office - and to his church, and of course
    to the family. But he--well, it's interesting - had ridden up from Texas on a horse as a young man.
- speaker: Interviewer
  text: He was from Texas?
- speaker: Respondent
  text: He was born in Texas. He later came to Indian territory with his parents and began to teach school. And he met my
    mother; my mother was his pupil. She had come from North Carolina a few years before. And while he was teaching, he was
    also working in a bank, and also worked in a dry goods store, clerking. He was a successful businessman all his life.
    And I'm sure when I finally declared, after I graduated from high school, that I was going to take art courses, he must
    have been very alarmed. He was certainly hoping that I'd become some kind of businessman, like himself, I'm sure.
- speaker: Interviewer
  text: Now, Chickasha--is that how you pronounce it?
- speaker: Respondent
  text: Yes, Chickasha. An Indian word.
- speaker: Interviewer
  text: Was it principally an oil town?
- speaker: Respondent
  text: Well, no. In recent years they have discovered a lot of oil there, but at that time it was just a small town in Indian
    territory, with many Indian tribes centered in that area after their removal from the South. It was mostly an agricultural
    town. And I lived in town. I had uncles and aunts who lived on farms, and I spent a lot of time with them. But I really
    grew up, you know, a small-town boy, with all of the problems and all of the fun that go with it.
