collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: What are your dreams and hopes for Estes Park?
- speaker: Respondent
  text: That ... oh, my dreams and hopes for Estes Park. That we would still have diversity in the future; that's a big one.
- speaker: Interviewer
  text: What kind of diversity?
- speaker: Respondent
  text: Economic diversity. Diversity of professions - people that come with different skills and different education or trades,
    whatever. That we would be able to make a whole community that will be a safe community; we will be safe from some of
    the things out there in the world that are pretty ugly.
- speaker: Respondent
  text: You know, people make parking the biggest thing in the world in Estes Park but if you look at the war in Iraq, that's
    pretty scary. If you look at the bombings in the UK, that's pretty scary. We have a pretty idyllic life here and our trials
    are really pretty minimal in the scheme of the whole world.
- speaker: Respondent
  text: I would hope that our environment stays healthy and protected because that's part of why a lot of us are here. I would
    hope that our children want to come home and continue the history that some of their families have in the valley. I would
    hope that people want to stay here, not just for 10 years but for an entire lifetime so that we maintain continuity of
    ideas and visions. And, yeah, visions change, but I think there are a lot of good things that have been started that need
    to continue.
- speaker: Respondent
  text: I would hope that this community is insulated from too much money and the ugliness that comes with that. I would hope
    that people would still care about each other, that they would still be compassionate about their neighbors, their friends,
    their family. I think those are my biggest hopes.
- speaker: Interviewer
  text: Is there anything I haven't asked you that you would like to say?
- speaker: Respondent
  text: Wow. I think we've pretty much covered everything; I can't think of anything.
