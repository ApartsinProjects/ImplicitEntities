collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: John, can you tell me when you were born and where you were born?
- speaker: Respondent
  text: I was born in the year 1933, March 3 - and March is also the third month of the year - and you can question my mother's
    honor, but she said it was around 3:00 in the morning, too, when I was born. And I've never won a thing with threes. [laughter]
    The horses I've bet and the rest of it still doesn't work.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in North Vancouver, but the name comes from my grandfather who jumped ship. He was from Chile, and he jumped
    ship in BC. And he was a longshoreman on the Vancouver Island at one time, and he married my grandmother, who was a First
    Nations Squamish princess, and they raised a family. I think you're all familiar with the Lions Gate Bridge?
- speaker: Respondent
  text: Well, my dad was born just east, right at the footing of the bridge there. There was a slough called Cordocedo Slough,
    and that's where he was born. My dad was a longshoreman, too, till he had an unfortunate accident and lost his leg, so
    he never recovered to go back to longshoring.
- speaker: Interviewer
  text: Take me back. How many other Chilean families?
- speaker: Respondent
  text: Oh, there's a multi, multi, multi that integrated with the Squamish Nation up there, and also the white community,
    too.
- speaker: Interviewer
  text: They were in Seattle and Tacoma, too, the Chileans.
- speaker: Respondent
  text: Well, this was told to me. This is secondhand, again, is that when they depleted the fur trade in the Columbia River
    area, they moved north, up into the Fraser River there for the harvest of the fur-bearing animals. And, as a result, some
    of the supervisors, which they had brought from Hawaii - the Sandwich Island people - were all managing the Natives at
    the Columbia River - they came north, and my mother is one of the descendents of the Hawaiians, too. Then the other side,
    we don't - I'm not a racist, you must understand me, but we don't broadcast the other part, My grandfather, he was Welsh.
    [laughter] So it's a real screwed up - you want a mixup of things, consomme soup, that's us.
- speaker: Interviewer
  text: It's interesting. They were called Kanaka.
- speaker: Respondent
  text: That's right, Kanakas. And there's different interpretations. I found that I have relatives right in Hawaii still,
    through DNA.
- speaker: Interviewer
  text: There are still Chileans on the Seattle waterfront.
- speaker: Interviewer
  text: They go way back to the 1870s and 80s.
- speaker: Respondent
  text: Well, those ships used to - they'd load lumber where my mother was born in British Columbia - it was called Moodyville.
- speaker: Interviewer
  text: Yes, that's the first.
- speaker: Respondent
  text: There was even a settlement they called Kanaka Row with all the Hawaiians living in the area. There was segregation,
    there's no doubt there. The people from the commonwealth lived in one area and the other people, the Kanakas, lived in
    another one. The Nahus, the Cordocedos, they were all Hawaiian descent.
- speaker: Interviewer
  text: We only have their nicknames.
- speaker: Respondent
  text: It's mentioned if you read that book our Pensioners put out, Man Along the Shore.
- speaker: Respondent
  text: There's a section in there about the Kanaka Row.
- speaker: Interviewer
  text: I've always been interested in the origin of the concept of rotation of the job, and that comes out of Moodyville;
    the idea that people took their turn at the work, who shared the workload.
- speaker: Respondent
  text: I really can't help you with that. I just know what happened there when I was there, just prior to school age. I can
    remember going with my father down to the hiring hall on the Indian Reserve, and they were called the Bow and Arrow Gangs.
    That was the Squamish and they had their own - now, they didn't know anything about unions or anything like that. It was
    just set up by the employers. They loaded the lumber. But then there was a vacuum there because in Vancouver Harbor -
    on the other side, on the south side in Vancouver proper - they had the other general cargo. But they didn't load lumber
    over there because the mills were all on the north shore. As a result, they finally decided that they would integrate,
    and they did. They shared the work. Same thing as we're doing now and this is our 50th anniversary of sharing the work
    right through the whole harbor.
- speaker: Interviewer
  text: You say "they" decided to share the work. Who decided to share the work?
- speaker: Respondent
  text: The employers. They had their own gangs. They had the lumber carriers, the lumber loaders, and they were all First
    Nations people.
- speaker: Interviewer
  text: Do you have any idea why the employer decided that?
- speaker: Respondent
  text: I guess it was straight that they'd have a shortage each way. We fought that for all my time within activity in the
    union, we've had that problem right through up there. It's in peaks and valleys. We'd get going and we'd have a yard full
    of lumber and a ship would come and take it away and then there's nothing left. You'd have to assemble the next cargo.
    So there was never a steady flow of cargo or ships through there. Mind you, these are sailing ships I'm talking about.
    In the present stage, it's changed a lot. But now we've just changed from water transport. Never mind the containers.
    We've got a dock up there that's full of steel. We've got the imports in there, and that was built as a lumber dock for
    all the small gyppo companies to ship out of there. Because there was one major company, Seaboard Marine shipping, up
    there, affiliated with General Steam in San Francisco, and you had to be a member of the mill there, and be assessed and
    pay. So the little gyppo outfit couldn't survive. They finally did build a dock for them, but now there's no lumber moving.
    It's all going by containers or rail cars.
- speaker: Interviewer
  text: But John, when they integrated - if I understand you right, to make sure the tape understands you - you think the
    employer decided that they didn't want to have any shortages, so that's why they'd integrate the workforce.
- speaker: Respondent
  text: Yeah. What I understand is that the lumber carriers would load a ship, but they wouldn't allow them to go to Vancouver
    to do the general cargo, the bulk-rate cargo. That was it. It was segregated, the two sides. I don't know if any of the
    Vancouver gangs from the Port of Vancouver coming over to the north shore's work.
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: This was in the very beginning of shipping, like sailboats and that. I should qualify one thing, why I agreed - those
    fellows asked me to come up there - I was the president in 1965 of the Port of Vancouver and then again in 69. Nobody
    was stupid enough to take the job except me because we had to fire the negotiating committee. [laughter] So we went through
    turmoil at that time. And the last office, I was the vice president of the Canadian area.
- speaker: Interviewer
  text: You were vice president of the Canadian area?
- speaker: Interviewer
  text: That was before you retired. What year did you retire?
- speaker: Respondent
  text: I retired in 1996. I've been retired 20 years this year.
- speaker: Interviewer
  text: Can I ask, do they have longshore sections in the cemetery that goes back to very early, the First Nations?
- speaker: Respondent
  text: Yes, well, a lot of those were. That's where the lumber carriers are buried there, and that's in the mission.
- speaker: Interviewer
  text: Are they buried together?
- speaker: Respondent
  text: No, no, no. Nothing like that. My grandfather, the Chilean, he's buried in North Vancouver in the First Nations -
    the Squamish Nations - graveyard. In fact, I went and started to clean it up. I found him. I guess it was 60 years before
    I found him.
- speaker: Interviewer
  text: Yeah, it's important to me. I've chased longshore graveyards, and the founders are buried in separate sections of
    the cemetery in Seattle, Portland, Tacoma, Port Townsend, and I was trying to track back where they got that idea. All
    of the ideas came from British Columbia down into Washington State, a lot of them anyway. You know the 10 Principles of
    the ILWU? A lot of those originated in British Columbia. They were the first to organize. I did track, in 1922 they had
    an enrollment in Canada of First Nation, and that's the first list that we have of longshore by occupation, so I knew
    from that. In the early book, Man Along the Shore - that wonderful book -
- speaker: Respondent
  text: That was all Pensioners.
- speaker: Interviewer
  text: Yeah. You were the one who started the idea of having books on longshore locals. Interesting. When did you get the
    idea of doing the book, Man Along the Shore? Do you know?
- speaker: Respondent
  text: Oh, god. We'll have to order supper if we want to go into that. It's a long trail there, a long trail.
- speaker: Interviewer
  text: I'll come up and have dinner with you. [laughter]
- speaker: Respondent
  text: At first, it was a company union, as you say. And why I agreed to come here is that I am a great advocate and admirer
    and respect Harry Bridges, number one - I'm a socialist, too - and he taught me more just by listening to him my whole
    life. I'm 83 now. But I've sat - never kissed his ass or anything like that - but I turned around and listened to all
    his knowledge come out. It's unfortunate that him and Louis Goldblatt had a little bit of a fallout. But as far as Canada
    goes, he was just the greatest. But he couldn't get across the line, if you remember right. During McCarthyism, if he
    went across the line into Canada, they wouldn't let him back in the States. [laughter]
- speaker: Interviewer
  text: Oh, you bet! They were waiting for that.
- speaker: Respondent
  text: It cost the membership millions of dollars to keep him out of jail, and a piece of paper that said he was the only
    American that wasn't a communist. [laughter] But I listened to him in Hawaii, I've listened - he came up to help us, and
    he supplied the Northwest gettys, and Bob Robinson, the vice president, has spent lots of time with us. I was just a young
    fellow then, in my early twenties, and they taught me a lot. I listened to them, and I didn't know anything about unions.
    What the hell did I know about unions?
- speaker: Interviewer
  text: There were quite a few from Canada who migrated down the West Coast, to Seattle and to Portland. There are still quite
    a few Canadians by birth whom moved in to work. But the First Nations must have stayed pretty close to British Columbia.
- speaker: Respondent
  text: Well, there was no boundary for the First Nations. They could go freely across the border. They didn't have to carry
    a passport or anything. I had a first cousin, Ralph Bend, and he was a walking boss in Seattle. He was from the Squamish
    Nation in Vancouver. My brother-in-law also was working. Stu Bombary, a professional lacrosse player, who came west and
    played lacrosse up in Canada, and then he ended up down in Los Angeles, Local 13.
- speaker: Interviewer
  text: What was it like growing up as a First Nations member? Can you describe what life was like? Did you feel discrimination?
    Did you feel separated from the general population? Can you give us a feel for that?
- speaker: Respondent
  text: Harvey, you hit the nail on the head. The First Nations, what happened there was - I'm getting a little long-winded
    but there's no other way I can explain it - my grandmother, in her wisdom - the First Nations person - and my grandfather
    moved off the Reserve. There was a dispute about him. Now, mind you, him jumping ship, he had about 10 different names
    to stay one step ahead of immigration. I don't even know if there was an immigration bureaucracy at that particular time
    or what, but he changed his name quite a few times. And he moved off and he took the family. Well, the standard of living
    came up for the whole family. It was the Cordocedos, the Silvas, the Campos and these other Chilean sailors married into
    the family through my aunts. They all lived in a couple houses right under the Lions Gate Bridge. But as time went on,
    we moved off, and the standard of living come up. My grandfather even had a gas boat. Everybody else was paddling and
    he had a gas boat. They did all right, and we've never looked back. So, I was raised in a white community. How I guess
    I was more or less accepted, I was never that great, but I'd participate in a lot of sports. I played lacrosse and soccer
    and baseball and basketball, so the community accepted me.
- speaker: Interviewer
  text: Was that part of the white community accepting you, do you think, because you were an athlete?
- speaker: Respondent
  text: Yeah, probably. Because there's no doubt there was - in 1957, there was still on that Reserve - and it's a very wealthy
    band - they still had outhouses. There was poverty there
