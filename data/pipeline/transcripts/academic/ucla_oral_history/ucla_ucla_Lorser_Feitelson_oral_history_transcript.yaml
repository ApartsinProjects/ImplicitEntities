turns:
- speaker: Respondent
  text: '... say, from the circumstances that are not theory, but actual experience. And since I''ve been here, not quite
    fifty years, but sort of closing in on it--I came to L.A. in 1927--I found that in all my experience in metropolitan areas,
    so far as the art world was concerned, the circumstances in Los Angeles were completely unrelated to the circumstances
    outside L.A. San Francisco was like New York or like London, or like any old city. There were sections where the artists
    were located: the more successful lived in one area, and the mavericks lived in another. The mavericks usually live in
    the area that at one time had been very respectable and now is no longer desirable; so you have beautiful old houses,
    and the artist moves in and gets it for next to nothing, and he fixes it up; then it becomes fashionable and the landlord
    pushes him out. It is the old business, like it happened in Greenwich Village, you see. And then you had the artists who
    really must let the world know that they are successful, in order to increase the prices of their pictures and to get
    better portrait commissions. I mean, it''s a social business. Like the doctor or the lawyer--if he''s in Beverly Hills,
    it''s a different price. But here you had nothing of this kind, for the very simple reason that the nature of this city
    of Los Angeles was like a cancer spreading in every direction. It had no center. It was so many villages. You had a downtown
    district, which reminded one of New York City in a very small way, but even that wasn''t centralized. There were new business
    areas--a cluster here, a cluster there--and it''s only by their growth that they sort of met. By the time they met, whole
    areas were no longer stylish, and new ones had developed. Now, to give you an idea, so you''ll get a very clear idea:
    in ''28, a friend of mine, a sculptor, Ward Montague, was doing a job of some kind of stonecarving, in I don''t even know
    what part of the building of the Bullocks Wilshire. That was considered a folly! Who'
