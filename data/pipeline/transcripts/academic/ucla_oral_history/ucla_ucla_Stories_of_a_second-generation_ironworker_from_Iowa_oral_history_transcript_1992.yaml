collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: What can you tell me about your family background and early life?
- speaker: Respondent
  text: I was born in Iowa in 1918. My family was involved in the Free Methodist Church, and I grew up in Waterloo. My father
    was an ironworker, and I followed in his footsteps.
- speaker: Interviewer
  text: How did you come to Richmond, California?
- speaker: Respondent
  text: During World War II, I moved to Richmond to work at the Kaiser Shipyards. The shipyards were booming, and there was
    a huge demand for workers.
- speaker: Interviewer
  text: What was it like working at the Kaiser Shipyards during the war?
- speaker: Respondent
  text: It was intense. The schedule was demanding, and there was a lot of supervision. But there was also camaraderie among
    the workers. We played pranks and supported each other. Women welders were a new sight then, and they did great work.
- speaker: Interviewer
  text: Can you talk about the health risks involved in ironworking?
- speaker: Respondent
  text: Yes, ironworking is tough on the body. There are risks from heavy lifting, working at heights, and exposure to hazardous
    materials. Over time, many of us developed health issues related to the trade.
- speaker: Interviewer
  text: How did the workforce change in terms of diversity?
- speaker: Respondent
  text: During the war, many women and minorities entered the trade. It wasn't always easy for them, but they proved themselves
    capable. The Richmond-San Rafael Bridge project also employed a diverse group of ironworkers.
- speaker: Interviewer
  text: What happened to Richmond after the war ended?
- speaker: Respondent
  text: After the war, many industries left Richmond, and a lot of people were suddenly unemployed. But many stayed, building
    new lives here. The city changed a lot, and the downtown area suffered during redevelopment in the 1960s.
- speaker: Interviewer
  text: How did the community respond to these changes?
- speaker: Respondent
  text: There was a lot of anger and sadness over the loss of the downtown district. People felt the city lost its center.
    Efforts to rebuild and attract new businesses have been ongoing.
- speaker: Interviewer
  text: Do you have any memorable stories from your time working on the waterfront?
- speaker: Respondent
  text: There are many. I remember fishing trips with the Ghio brothers and the tough but rewarding work on the shipyards.
    The sense of community among workers was strong despite the hardships.
