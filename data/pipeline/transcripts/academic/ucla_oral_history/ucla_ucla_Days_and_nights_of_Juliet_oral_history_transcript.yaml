collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: First, Mrs. Man Ray, I'd like you to tell me something about your background and life before you met your husband.
- speaker: Respondent
  text: I lived in New York City. I was born New York, New York, as they say, and grew up there and became a dancer with Martha
    Graham. I met some artists in New York City who taught me a bit about dada and surrealism; and when I took a weekend trip
    from New York to L.A., 1940, I met Man Ray. Well, being a dancer, I didn't know very much about art, painting or sculpture,
    objects or photography, but I saw the first painting of Man Ray at the Columbia University Museum, I think it was, and
    I fell in love with it. It was called The Rope Dancer Accompanies Herself with Her Shadows, which I believe is now in
    the Museum of Modern Art in New York City. Well anyway, the first weekend when I met Man Ray, he was there purely by accident.
    He escaped Paris during - when the Nazis came in. He stayed there a while, but then he left. Being an American citizen
    he was allowed to leave. And some friend in New York was going out West and took him for a ride. I knew this friend, and
    he said, "I know this artist who's very, very unhappy and would like to go take you out to dinner." And the first thing,
    when I met Man Ray, I was able to talk to him about Paul Eluard, the poet, about Marcel Duchamp, Tristan Tzara. I knew
    all about it because this friend of mine in New York talked to me at length about it. But I absolutely didn't know he
    was a photographer or did these marvelous photographs. And then when we talked, we walked up the boulevard here, and he
    took me for a row in Westlake Park. That same day we talked all about art. He was very happy, believe me. And then he
    said, I gave him the secret word. I don't know what the secret word was that I gave him, but the third day I was living
    - we were together. And gradually we got a studio on Vine Street, a living quarter in the same building, and then he started
    to paint madly. He painted the Revolving Doors, which had originally been just collages in 1916-17. He did the ten paintings
    in oil. Before he ever photographed me, he did drawings of me, which were quite wonderful. Then he told me he was a photographer.
    Actually he didn't. A friend of mine showed me a picture in a magazine, and that's how I knew. He wasn't very excited
    about his photography.
- speaker: Interviewer
  text: He was just modest?
- speaker: Respondent
  text: No, he wasn't modest at all. It was just like a lithograph, one of the black and white, for his art. Then he started
    photographing me quite a bit and painting me. He has lots of portraits and things of me, of that period in Hollywood.
    That was ten years he did a vast amount of painting and drawing, and he taught; he had some pupils here.
- speaker: Interviewer
  text: Who were they?
- speaker: Respondent
  text: The only one I remember, I remember there was a waitress. Of course they paid for their - She would come twice a week,
    she was very gifted, I don't know her name. Daisy I think her first name was. And then there was Florence Homolka for
    photography. And then there were a few producers' wives, who were able to pay a bit of money. In order to live.
- speaker: Interviewer
  text: Which ones?
- speaker: Respondent
  text: Well, there was the wife of--oh, dear me - William Wyler. I think his wife, very beautiful woman. And various others
    I just don't remember. I remember he did - made a lot of chess sets, designed, and some of the lovely people who came
    to visit us. Ava Gardner and Hedy Lamarr played chess, and they would come and play chess. It was very lovely to see such
    beautiful women playing chess.
- speaker: Interviewer
  text: Were you a chess player?
- speaker: Respondent
  text: No, he taught me how to play, and I played, but I never could get to the end game. It was always difficult. But I
    played, because you had nobody else to play with except twice a month, perhaps. Then a friend of ours called Bill Copley
    rented a firehouse, and he had a club. Friends would come to play chess and paint from the models. It was a very nice
    time.
- speaker: Interviewer
  text: How did you meet Copley?
- speaker: Respondent
  text: Copley came, it was 1947, I believe. And he had just - He was very much interested in having a gallery of art. And
    he had some money from his father. He had a friend called John Taylor, who knew art quite well. I mean he knew all about
    surrealism and dada; he knew those artists. So they started this gallery, Man Ray gave them the names of Max Ernst, Matta,
    the painter. Marcel Duchamp; and there were six exhibitions that Copley had.
- speaker: Respondent
  text: Joseph Cornell, and I don't really remember. But anyway, after six, not a painting was sold to the Hollywood people;
    and Mr. Copley guaranteed each artist 20 percent of the exhibition, which was very good. And he, in exchange, received
    an important painting or sculpture. Then he closed down the gallery because nothing was sold. Stop a while.
- speaker: Interviewer
  text: You'd mentioned that the Copley Gallery closed.
- speaker: Respondent
  text: Oh, yes, folded up. Oh, one person bought, I believe it was, a Max Ernst and never, never came to call for it. When
    he bought it, he was stone drunk; and when the gallery was closing. Bill searched out for him, and he never even remembered
    that he bought this painting. But Copley gave it to him anyway. He was a big steel man, whose name I don't remember. It
    doesn't make any difference. I don't know what happened. Oh, I think in 1944 there was some interest in a modern museum
    here in Los Angeles, here in Los Angeles. And that was rather interesting. They gave, had an exhibition of objects. He
    made all these - now Where's my book here? - objects which he called Objects of My Affection. There were no paintings
    on the wall. In the middle of the gallery they put, maybe, sort of a pool table and a steering wheel, which moved on springs
    and looked very erotic, like a man's sex, that went back and forth. You could push this table, and there were children
    who would come, and we told them, "Push the table, have fun, touch everything," which they did because the children loved
    it, all his objects. And the names of the objects were very interesting too. I'm finished for the moment.
- speaker: Respondent
  text: Some of the - one of the objects was named The Sunkist. And why? Because it was the broken box, crisscrossed, of Sunkist
    oranges. But it looked very sad, for some reason. I loved it very much. And there was one called Abracadabra, with tiny
    little pieces of wood, just pieces of wood he would find in the studio or on the street, called It Moves Ever So Little,
    because, when you shook it, it moved a tiny bit. And I just heard recently, this year, 1981, it was sold in London auction
    by somebody. So some of these objects that looked so delicate still exist.
- speaker: Interviewer
  text: Do you remember the price?
- speaker: Respondent
  text: No, I didn't. I didn't get the catalog from Sotheby's to find out the price. One was called The Silent Harp, which
    was on a tin can with a violin head and some broken strings attached. It just didn't move, it was just silent. And of
    course there was Trompe l'Oeuf, which was a photograph of an egg in a toilet seat. And then there were many wonderful
    examples of those objects, which I said before were shown in this gallery, which as we were leaving California we just
    gave to some people or they were destroyed; he destroyed them. There was quite a wonderful one called The Palet Table
    which he used to paint a picture on; and the legs were made out of baseball bats, but small baseball bats, children's
    baseball bats. And there was a hole in there to put a can of paint, and there was this lovely person, called Kate Steinitz,
    who wanted it madly, and she got it. Now it's in the museum here. County Museum. I believe she left it in her will to
    the County Museum.
- speaker: Interviewer
  text: What else seems memorable about the years you lived in Hollywood?
- speaker: Respondent
  text: Oh, yes, because we met so many people. There was a very good friend we met, Walter Arensberg, the collector. I met
    Walter and his wife, quite lovely. They lived right in Hollywood. And there was this man called "Allie" Lewin, Albert
    Lewin, who fell in love with Man Ray's work, with him, his personality, right away. And we went often to his house, and
    he bought some paintings, was given some paintings and drawings. Lewin lived in a house made by Neutra, the modern architect.
    It's right on the beach of Santa Monica. And Lewin said afterward, when we met him in New York, after he retired from
    films, that Mae West bought his studio, and he was delighted that she was sitting naked in his shower.
