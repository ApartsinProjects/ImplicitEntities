source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Okay. Maybe you could tell us where you were born.
- speaker: Respondent
  text: I was born on July 25, 1912, in East Los Angeles, a section which was then called Belvedere.
- speaker: Interviewer
  text: All right then, very good. Do you know much about your parents in terms of occupation or their background?
- speaker: Respondent
  text: My father was a machinist and millwright and was one of the very early workers in fruit canning in California. He
    started in the fruit-canning business when they were soldering the lids on the cans by hand. During his many years working
    in the fruit-canning business, he developed quite a few machines for the canning of fruit--notably a grader, a device
    for grading the fruit in various sizes, and some very ingenious devices for transporting the empty cans from the freight
    cars to the workers, who were busy filling the cans with the fruit.
- speaker: Interviewer
  text: I see--kind of an industrial engineering application.
- speaker: Respondent
  text: Yes, he was, as I said, a millwright and a machinist, and when I was a boy one of the many pleasures I had was turning
    the forge for him to heat up the iron, which he then made into various workable forms.
- speaker: Interviewer
  text: You mentioned the area called Belvedere. Exactly what kind of cross streets are we talking about here?
- speaker: Respondent
  text: We're talking about the Los Angeles County area immediately adjacent to the city of Los Angeles, which then, as now,
    stopped at Indiana Street. And Belvedere was the unincorporated area immediately east of Indiana. This was long before
    Belvedere Gardens was developed by the Janss Investment Company--which is now the great section called East Los Angeles.
    When I was a boy, the Los Angeles Creamery Company had the vast undeveloped area immediately east of Eastern Avenue, which
    was the boundary line for the Calvary Cemetery.
- speaker: Interviewer
  text: Can you remember a very early address where you lived?
- speaker: Respondent
  text: I lived at 225 South Herbert Street.
- speaker: Interviewer
  text: Herbert Street. I'm going to write down these proper names on a separate sheet so that when these are typed it's much
    easier for them to figure it out, as many proper names, like Janss and Herbert, as I can remember to put down.
- speaker: Respondent
  text: Janss is the great investment company that made their money in Belvedere, Belvedere Gardens, and then went out to
    Westwood and developed Westwood and gave the large acreage to UCLA.
- speaker: Interviewer
  text: Yes, in between times they may have developed Burbank also, or maybe that was earlier. I know they were responsible
    for the subdivision of Burbank. All right, now, in growing up did you attend public schools or--?
- speaker: Respondent
  text: Of course. Let me tell you about my mother first. My mother's maiden name is Martha Bohmke. She came to the United
    States from Germany when she was sixteen years old, not knowing the language and just coming to stay with an older sister
    in Chicago.
- speaker: Interviewer
  text: This makes you the first generation of native-born Americans in that family, that side of the family.
- speaker: Respondent
  text: That particular family. My father was an old Pennsylvanian who was brought to California by his uncle when he was
    still a boy. We don't know exactly how old he was, but we assume that he was under ten years of age, and his uncle and
    his father lived in Stockton. His father was a doctor.
- speaker: Interviewer
  text: Then your mother, Martha Bohmke, if that's pronounced anywhere near right-- I'm interested to know if you could give
    us just a personal comment or two. Was she primarily a homemaker?
- speaker: Respondent
  text: Entirely, yes.
- speaker: Interviewer
  text: And what brothers or sisters did you have?
- speaker: Respondent
  text: I have three brothers, two older and one younger.
- speaker: Interviewer
  text: What are their names?
- speaker: Respondent
  text: The oldest is Robert, the second oldest is Theodore--named after Theodore Roosevelt, who was president when he was
    born--then I come along, and my younger brother, Carl. My oldest brother, Robert, died of the flu when he was nine years
    old.
- speaker: Interviewer
  text: Can you tell us what schools you attended?
- speaker: Respondent
  text: I attended Belvedere Elementary School on the corner of First and Rowan avenues from the first through the eighth
    grade. Charles J. Fox was the principal of Belvedere Elementary. Upon graduation from Belvedere Elementary in the eighth
    grade, I went over to the new Belvedere Junior High School, which had just opened, and Fox was also appointed principal
    of Belvedere Junior High School. I attended Belvedere Junior High School for only one year, the ninth grade. During that
    time, I was president of the student body and very much interested in the junior high school printshop. Chester L. Bond
    was my printing teacher, and it was due to his interest that I became so firmly attached to printing. He was an interesting
    man, a Seventh-Day Adventist who had worked up at the great Adventist publishing plant in Mountain View, up near Palo
    Alto, and was an excellent printer.
- speaker: Interviewer
  text: While you were growing up, and before having your first printing experience, did you have any particular consciousness
    of striving toward a particular goal or professional objective?
- speaker: Respondent
  text: No. I knew I had no vocational choice, but my mother, coming as she did from a society that made great emphasis upon
    learning a trade, was very much interested when I found printing, and encouraged me very much to follow it.
- speaker: Interviewer
  text: Now, this would have been in the ninth grade.
- speaker: Respondent
  text: In the ninth grade, yeah.
- speaker: Interviewer
  text: We'll come back--
- speaker: Interviewer
  text: All right, we'll come back to that, but let's continue with the biographical format if we can here, just a little.
- speaker: Respondent
  text: After I graduated from Belvedere Junior High School, I went out to East Los Angeles, to Garfield High School which
