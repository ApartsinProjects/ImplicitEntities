collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: I was born in Sweden and my father was into plant breeding, finding new varieties of mostly potatoes but also rye
    and other things. He was second-generation educated - my grandfather was in the same business - but before that, he comes
    from farmer stock. My mother was an elementary school teacher. Her father, my grandfather, was sea captain. He owned his
    own ships. So, I come from middle-class family, I would say. We were five siblings. My brother was the oldest one. I'm
    in the middle, so one older sister and two younger sisters. So, maybe talk about my childhood?
- speaker: Interviewer
  text: Yeah, just a little bit, maybe about some of the values perhaps that your family passed on to you.
- speaker: Respondent
  text: I would say that my family values was on the conservative side, particularly my father. He belonged to Hégerpartiet,
    which is the conservative party, which always used to say it was as conservative as George McGovern was. [laughter] Conservatives
    in Sweden are not very conservative. Now it's a little bit different thing. They are kind of right-wingers in Sweden.
    I'm sure they were in those days, too, but that was his affiliation. I would go to the youth dances and stuff organized
    by Hégerpartiet. I'm not sure where my mother was in those days, but I do know that my father was very impressed by [Tage]
    Erlander, who was the Prime Minister in those days, and Social Democrats. So I know that at the end of his life, he actually
    voted Social Democrat. But my mother, was she [unintelligible] or not? But she was pretty radical - progressive, not radical.
    She was progressive in her views, and definitely loved the Social Democrats and what they had done for our country. I
    actually remember from my childhood that discussion about universal healthcare, for example. The talk about that the first
    time it was introduced - I looked up on the Net the other day - was when I was nine years old. Then I think universal
    healthcare came into being when I was 18, 19. I think [in] my childhood, I was pretty much of a loner. Part of that was
    that by the time I was supposed to start school, I could read and write, so they put me in second grade, which is not
    a great thing to do with a little kid. Because everybody knew each other and I was totally outside. But I became the teacher's
    pet [laughing] which didn't help. It didn't help. Eventually, my continued schooling was in [unintelligible] I went to
    gymnasium. Of course, I took the train, so I was outsider there, too, because everybody else lived in town or had a much
    shorter commute than I did. I actually had dispensation to come half an hour late every morning, so I missed the morning
    prayer - which was okay with me. [laughing] Speaking about that, I came from a very secular home. My parents were not
    at all religious. My maternal grandparents were churchgoers, and I don't know about paternal grandparents because I never
    knew them. They were gone by the time I came along. Before 1959, you had to belong to a church in Sweden. Most Swedish
    were born into the Lutheran Church. And, of course, the Lutheran Church was the one who kept the books on when you were
    born, and when you moved out of the town, you had to report to the church and when you died, they recorded you. So you
    had this fantastic recording way back in Sweden if you want to figure out your family history. Of course, you could be
    [Swedish word]. You could belong to another church but you couldn't just [pick things?] out of the Lutheran Church unless
    you wanted to claim another denomination. In 59, that changed. In our little town of 3,000, my father and my brother's
    best friend, they went to the [Swedish word] to the offices and exited the church. [laughing] Two people. We don't know
    about anybody else, but the two of them together. Just a little a side there.
- speaker: Interviewer
  text: I remember you mentioning one time when you were 15 and your father gave you a book.
- speaker: Respondent
  text: A book that had a tremendous influence on the way I was thinking about life and politics. It was called [Swedish name
    and Swedish author]. [It] was about a man who couldn't read and write - that's what he means - and how he lost his farm
    because of that; that he was illiterate. Had a great, deep influence on me [in those days?].
- speaker: Interviewer
  text: I also remember you mentioning one time that your family took in a child.
- speaker: Respondent
  text: Yeah. During the Finnish Winter War, Finland sent many of their children to Sweden for safekeeping. We had a boy,
    his name was [Eskokari?]. I'm not quite sure how old he was. He probably like 11 or 12, something like that. This was
    a national policy, and organized, but I think this boy's father was also a plant breeder - which my father was - in [unintelligible].
    I think the arrangement was somewhat private, but we have a piece of paper - we have a document - from the President -
    are there presidents in Finland? - thanking us, thanking the family for taking care of [Esko]. That also led to a lot
    of interchange. [Esko] had two younger sisters and my brother, who was the exchange for [Esko], had four younger sisters.
    My brother ended up going to Finland after the wars were all over, and then his two younger sisters came to visit us in
    turn, exchanging with me and my older sister. And then my two younger sisters got to go Finland in exchange with cousins
    of these. Then we lost contact for quite a while, but I understand my brother took up contact with Esko later on in life,
    and he became a doctor.
- speaker: Interviewer
  text: Why don't you talk a little bit about school, maybe where you went to college.
- speaker: Respondent
  text: We don't have a college. Sweden in those days had elementary school, which was seven years. After five or six years,
    you would go on to a four-year school called [Swedish word]. And since I had skipped first grade, I still went for fifth
    grade, so I was at least one year younger than most everybody else in the [Swedish word]. That school was in my hometown,
    which was a town of like 3,000 people, small town. After that I went to gymnasium, which is pre-university. What would
    you call it here? It's between high school and college. In gymnasium, you would sort of choose the direction you wanted
    to go. You had three options. You could go the mathematical option, or you could go to language, including Latin, or you
    could go social studies. Now it's different, but that's what it was in those days. You had nine or 10 subjects that you
    studied, including [Swedish word] - Christianity. That was always part of the education. You always had a morning prayer
    in this secular Sweden of yours. [laughing] You had the morning prayer and you studied. Mostly you would study the Bible
    and very little about other religions really. I went the mathematical line. Math was my very, very favorite subject. I
    remember, since I very seldom went out for fun on Saturdays because in my little town of [Swedish town name] there wasn't
    much fun to be had on Saturdays. My favorite thing was to do math problems. [laughing] Isn't that so sad? If you think
    about it, it's really sad. When I finished gymnasium, then you choose your path in life. My father said to me, "You'd
    better become a teacher because you're not smart enough to go to university." So that's what I did. [chuckles] Like my
    mother. She was a teacher, too, an elementary school teacher. So, kind of a sad state of affairs. That was a two-year
    education. After that, I went out to middle Sweden to [Swedish town] and taught elementary school for two years, and then
    I taught math for two years, physics and chemistry.
- speaker: Interviewer
  text: Could you talk about that?
- speaker: Interviewer
  text: About my math?
- speaker: Interviewer
  text: Yeah, about teaching math.
- speaker: Respondent
  text: I had several classes, but one class in particular was in [Swedish word], which I talked about the education after
    elementary school. I got this class that I was warned was a very difficult class. They had actually sent their previous
    teacher [and] she had a nervous breakdown. The class was 30 students, and half of the class had failed the math the year
    before. So, here I am. How old was I? Twenty-one years old, and these kids were like 14. I did have a tough time with
    them in the beginning. There was especially one girl that was sort of the center - the ringleader - and she had boys around
    her all the time when I came into the classroom. But whatever happens, I got them on my side, so we started studying seriously.
    There was a lot to catch up on. Two years later, when they took the test that was sent down from Stockholm, which decided
    whether they would pass math or not and pass their final exam, nobody failed and half the class was A student, they aced
    the test. One of the things I'm most proud of. But part of that story is that the student of mine who had the toughest
    time, who actually was the only one who squeaked by, his name was [Lars Willihammer?]. After I moved to Seattle, I got
    this package in the mail. It was [Lars Willihammer's] doctors dissertation. He invited me to his doctor's celebration.
    I found out later this was his second doctorate. One was in education and the other one was in philosophy. And there was
    a really dedication in the book to me as so mebody who had inspired him. So, I have been in touch with him and actually
    he or ganized a class meeting two years ago, so I met some of the old students. He had managed to contact all the survivors
    - there were six dead a mong others, [unintelligible], who was the ringleader of that - which was really pretty fantastic.
    I went out to [Swedish town name] to the old school town. He hosted me and took me around and we had a lovely time. It
    was just really quite amazing.
- speaker: Interviewer
  text: Why don't you talk to me a little bit about your background in music before we go on.
- speaker: Respondent
  text: Not much background, except one thing that I do remember was when we were kids. We would have something called Saturday
    evenings, especially before Christmastime because we could make a little bit of money to buy Christmas presents for. There
    were competitions and stuff. But one thing that he did was sit down at the piano with us girls - my brother was gone -
    and we were singing. He was one-hand piano. He was not a good piano player, but he played with one hand. That's one memory
    I had. We all, I think, had good singing voices and loved to sing. Then I got piano lessons, so I learned to read music
    relatively well. That's really good for me now in Labor Chorus to be able to read the music. I haven't kept up the piano
    playing. Part of my education my teacher's education was to play. So the two years I went to that college, I rented a
    piano. Had to, it was part of the curriculum. I became relatively proficient, but never felt that I had the talent to
    play, so gave it up and haven't played since. At the teacher's college, there were two choruses, one that everybody was
    part of - I think it was probably obligatory - and then there was the more advanced chorus that you had to audition for,
    and I sang alto in that. I've always been alto. One specific memory I have of singing was when my grandmother was dying.
    She had a pulmonary embolism and we were called to her bedside. The family assembled and she requested that me and my
    sisters sing to her, which we did. I think I was 11 and my older sister 13, and my younger sister said she was there,
    but I don't remember. I sang alto already then, so I must have had some singing experience in school that I don't quite
    remember.
- speaker: Interviewer
  text: How did you come to go to the United States?
- speaker: Respondent
  text: Oh, adventure. Just looking for adventure. [laughing] My father had been to the United States a couple of times. He
    went to the University of Minnesota in Minneapolis in his line of research. He always talked so well about the United
    States, so like "I want to go there." I made a friend who was one of the teachers in [Swedish]. She had spent a couple
    of years and she had friends, and they sponsored me. In those days, you had to be sponsored. But Sweden had a big quota,
    so I got a green card. The mother of one of these people who sponsored me took me in. I stayed with her and I got a job
    eventually, after six weeks, at the Laboratory of Human Development at Harvard. [chuckles] Through a Danish girl, I got
    in contact with them. Her professor was doing a research study between adolescents in Denmark and United States, and he
    was planning to do a similar one with Swedish adolescents. I was hired to be his research assistant in this study. Then
    Nixon came to power and the money froze. But then I was there already, so I became the secretary to a Dr. Sheldon White,
    who was doing research with adolescents. I saw Sesame Street being born there, Dr. [Gerald] Lesser. I would travel to
    New York every so often to work with, I don't remember the woman's name, and they created Sesame Street.
