collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your ancestors and your parents?
- speaker: Respondent
  text: I was born in Oregon, and my family has been pioneers on the West Coast. My mother had a strong sense of spatial design
    which influenced me greatly.
- speaker: Interviewer
  text: What was your first exposure to art like?
- speaker: Respondent
  text: I was exposed to art early on through my mother’s interests and encouragement. I started creative projects as a child
    and was always drawn to artistic expression.
- speaker: Interviewer
  text: How did your schooling influence your art?
- speaker: Respondent
  text: In high school, I had art teachers who nurtured my talents. Later, at Mills College, I studied with Alexander Archipenko,
    which was pivotal. I also taught at the Anna Head School in Berkeley, which helped me find inner strength and develop
    my philosophy of teaching.
- speaker: Interviewer
  text: What was your experience like as a teacher?
- speaker: Respondent
  text: Teaching was very rewarding. I enjoyed promoting creativity and helping students explore their inner feelings through
    art. It was a way to give back and stay connected to the art community.
- speaker: Interviewer
  text: How did your career evolve after teaching?
- speaker: Respondent
  text: I wrote for Arts and Architecture and eventually left San Francisco for Europe in 1950. That trip was supposed to
    be six weeks but turned into thirteen years. I wanted to immerse myself in a broader cultural context and learn from major
    figures in modern sculpture.
- speaker: Interviewer
  text: What was your experience in Europe like?
- speaker: Respondent
  text: I lived in a small studio in St.-Germain-des-Pres in Paris. I met and worked with artists like Henry Moore and Constantin
    Brancusi. It was a time of intense growth and experimentation. I also developed new techniques and materials, moving from
    traditional wood and clay to bronze, copper, steel, plastics, and glass.
- speaker: Interviewer
  text: Can you describe some of your notable works from that period?
- speaker: Respondent
  text: In 1954, I created a floor-to-ceiling sculpture for the Galleriea Spazio in Rome. In 1957, I made a set of gates for
    Princess Pignatelli’s grotto in Santa Marinella, which introduced my 'sign and ensemble' concept. Later, Peggy Guggenheim
    commissioned gates for her Venetian palazzo after I led an Italian art tour in 1960.
- speaker: Interviewer
  text: What brought you back to America?
- speaker: Respondent
  text: An invitation from Esther Robles to create a fountain in Los Angeles in 1961 brought me back. Since then, I have completed
    many sculptural commissions in Southern California.
- speaker: Interviewer
  text: Tell me about some of your major commissions in California.
- speaker: Respondent
  text: In 1965, I designed 'Structure and Flow, No. 2' for the California Federal Savings and Loan Building on Wilshire Boulevard.
    That led to 'Game Wall' at California State University, Fullerton, and 'U as a Set' for California State University, Long
    Beach. In 1966, I created 'Three Fires' for the Fresno Mall, my first work from my Venice studio.
- speaker: Interviewer
  text: What was your most ambitious project?
- speaker: Respondent
  text: The exterior sculpture at St. Basil's Catholic Church was my most ambitious. It included a rectory screen, eight screenlike
    entrance doors, and fifteen three-dimensional stained glass windows, completed between 1966 and 1969.
