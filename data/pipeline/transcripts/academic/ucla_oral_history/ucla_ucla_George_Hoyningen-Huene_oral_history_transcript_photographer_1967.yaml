collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: I was born in St. Petersburg, Russia. St. Petersburg is now called Leningrad. This was in 1900.
- speaker: Respondent
  text: My father was a Baltic nobleman and he was quite a rider, a gentlemen rider; he won very many races, and was sort
    of a... you may call it a "glamour boy" of his time. He was in the service of the Czar. He was in the Chevalier Guard
    Regiment, and he remained in the service of the Czar as head equerry, which meant purchasing all the horses for the Imperial
    stables.
- speaker: Respondent
  text: My mother was Ann Van Ness Lothrop from Grosse Pointe, Michigan, the daughter of state Senator George Van Ness Lothrop,
    who became United States Minister to Russia. In those days we didn't have ambassadors in Russia. That is how my mother
    met my father. In those days, children were rather estranged from their parents, and most of their education was given
    over first to nurses and then to tutors. I remember seeing my mother on rare occasions—she was extremely busy taking her
    daughters out to various balls and parties, and before they would go off to a ball they would come up and say good night
    to me. I was still a child and I was always amazed at the beautiful dresses they wore and the slight smell of eau de cologne
    and powder. In those days, dresses were very elaborate, and the transformation took quite a long time from day to evening.
- speaker: Respondent
  text: I seldom saw my father. He was usually on his estate in Estonia, or he was traveling and buying horses for the Emperor.
    Our estate in Estonia was not very large. He was passionately devoted to improving housing conditions for the local peasants
    and digging irrigation canals, and, of course, whenever a horse of the Imperial stables wasn't absolutely perfect, the
    Emperor would let my father have it, so he had quite a large stable. I learned to ride at an early age, though they say
    that my father started riding when he was five.
- speaker: Respondent
  text: I was very backward in school, and I disliked the climate of St. Petersburg. We had winter days where the sun hardly
    rose above the horizon and we never saw daylight. We had kerosene lamps; later electricity came into being, and the trolleys,
    which were horse-drawn, became electrically drawn, which was a great help because we didn't have to see the poor horses
    slipping on the ice and being whipped back into position.
- speaker: Respondent
  text: St. Petersburg was a very curious city. It was, I think, the most aristocratic city in the world. There were very
    few stores; there was a big sort of store in the arcades which sold books and cheap clothes and hardware, and there was
    a delicatessen store I remember which was quite wonderful with Art Nouveau bronze fixtures in the shape of a huge arc
    of reeds. The ends of the reeds were tubular electric bulbs, and of course there were mountains of fish and caviar and
    venison. Then there was another shop which was called Fleur De Nice, which imported flowers from the French Riviera by
    train every day. These flowers found their ways into the drawing rooms and boudoirs of St. Petersburg.
- speaker: Respondent
  text: The most impressive sight of St. Petersburg was the line of palaces which faced the river, along the embankment. The
    embankment was of parquet, not polished, but paved in wood, and the little bridges which crossed the canals, which were
    offshoots from the delta of the river Neva, were paved in cobblestones. It was very curious to observe the difference
    of noise (in the winter, there were the horse-drawn sledges and in the summer, carriages, all of which were noiseless)
    on the wooden pavement—then there would be a slight clatter as they crossed these slight small bridges. Most of the palaces
    in St. Petersburg were on the waterfront, and the river was extremely wide. It must have been over a quarter of a mile.
    Across from the great palaces was the very grim fortress of St. Peter and St. Paul, with a Baroque church and a needle
    of gold rising to the sky.
- speaker: Respondent
  text: In the spring, the great phenomenon of the ice floe would start. There was a trolley crossing the river, and of course
    with the first sign of the ice melting the tracks were removed and stored for the next year. Then came this emptiness
    and sudden black lines crossing like lightning over this expanse of whiteness, and then, with a terrific thunder, the
    ice would split and all these blocks of ice would crash against each other, framed by granite walls, with a thundering
    noise. This was a sort of "rite of spring." Then the Emperor would come down with the clergy and his suite and bless the
    waters.
- speaker: Respondent
  text: In the summer, we used to spend a lot of time in Estonia, and my mother's relatives would come over and visit us.
    Sometimes we would go abroad, either to the French Riviera or Italy or Germany. Most of my mother's shopping had to be
    done in Berlin, as well as taking care of her children's teeth. There was no good dentist in St. Petersburg, but there
    was an excellent American dentist in Berlin, so we had to go to Berlin for that. My mother used to buy her clothes in
    Paris. Shopping was very limited in Russia.
- speaker: Respondent
  text: As I have said, I was very backward in school. I hated the climate of St. Petersburg, and after having visited a German
    Lutheran school, I joined the Imperial Lyceum, which was a semi-military aristocratic school where the great Russian poet
    Pushkin had studied. The discipline was very severe.
- speaker: Respondent
  text: By that time, World War I had broken out. Incidentally, my father and my mother entertained Count Leopold von Berchtold
    and his wife at our estate in Estonia. Count Berchtold was the Austrian minister of foreign affairs who did everything
    he could to promote war. My family was very much criticized for that. It would be very much the same as if somebody here
    would entertain Mr. Ribbentrop before World War II, although there was no political implication there whatsoever. My father
    was extremely pessimistic about the outcome of World War I and always said that Russia had absolutely no reason to fight
    in that war; that she was sort of railroaded into it, and this is partly true. The country was not prepared for this tremendous
    effort.
- speaker: Respondent
  text: Soon after, around the middle of World War I, my mother and I went to live in Yalta where she bought a small house
    giving out on the Black Sea. I studied at the gymnasia of Yalta. One day the news came that the Czar had abdicated. A
    few months prior to that, friends of ours whom we knew very well had conspired to murder Rasputin, the disgrace of Russia,
    and by that save the monarchy. But it was too late. My father always criticized Prince Felix Yussupov and said that although
    it was a very good thing that he did away with the charlatan monk, his action was in the tradition of the Borgias, to
    invite guests and poison them. The revolution came very suddenly and everybody was very much relieved that the Czar had
    abdicated and that there was going to be a change of the regime. This was universal. We were delighted at the news, because
    we thought that Russia could continue the war effort. But by degrees things went from bad to worse. By that time, Russia
    tried another offensive but the armies collapsed.
- speaker: Respondent
  text: My mother had visited the Dowager Empress who was a great friend of hers—as you know, the Dowager Empress was the
    sister of Queen Alexandra. She was Danish. Maria Feodorovna was staying in the palace in Livadia near Yalta in the Crimea.
    Soon after that our house was raided, and some Red sailors from Sevastopol naval base arrested us and searched the house.
    They found in my mother's room under the bed a typewriter, and not knowing what it was they assumed that, as she had visited
    the Empress, she was probably a spy and the typewriter was a radio set to communicate across the Black Sea with the Sultan
    of Turkey.
- speaker: Respondent
  text: However, this was a warning; and although my mother, being American, didn't quite realize what was happening in Russia,
    I, having been brought up by socialist students, saw that this was going to be a profound change—but it wasn't going the
    way the socialists wanted it to go. It was probably going to be a take-over by this very small but powerful party called
    the Bolsheviks, which we now call the Communists; and in that case, as their slogan was "Death to the Bourgeois," I didn't
    see any hope whatsoever in remaining in that country. I was too young to join the army; besides, the army had collapsed,
    and I persuaded my mother to do everything in her power to leave for England where we had some influential friends who
    could arrange for our entry.
- speaker: Respondent
  text: We went to St. Petersburg, which by that time was renamed Petrograd. My father was in Estonia, so my mother went to
    her friend, the American ambassador, who in turn obtained an exit permit for us from Kerensky. We could take very little
    with us. Everything that remained in St. Petersburg was lost.
- speaker: Respondent
  text: We traveled over Finland to Sweden. I was in my school uniform. The first thing I had to do was to get out of it and
    buy a suit of clothes. Then we managed to go to Norway and wait for our final passage to England, which at that time was
    a dangerous passage as the submarine war was at its greatest height. This was in the late summer of 1917.
- speaker: Respondent
  text: In England, I went to grammar school where I had to learn everything all over again.
- speaker: Respondent
  text: After the Armistice of 1918 and the collapse of the Central Powers, there were several fronts which opened up in Russia
    against the Central Communist government. I thought I might be useful and joined up as a private soldier in the British
    Army. The British Army would not give foreigners officers' commissions, so I had to be a private; later on I became a
    sergeant. I was in the barracks in the Tower of London, of all places, which was rather colorful! I was given an arctic
    outfit and told that I was going to go to Archangel, where American troops were fighting the reds. But, by some fluke,
    they put us on a ship and landed us in France. We boarded a train which took us three weeks to get to the tip of Italy
    (in spite of the arctic clothes), then to a camp in Salonika in Macedonia; and then afterwards, via Constantinople, to
    South Russia.
- speaker: Respondent
  text: We were not a fighting force. We were a mission of instructors and I was an interpreter. As a matter of fact, I hardly
    spoke at all because everything I said was what someone else was telling somebody else, and I was interpreting it from
    one language to another.
- speaker: Respondent
  text: We moved our headquarters from Ekaterinodar to Taganrog on the Sea of Azov, and I remember one summer night in the
    sergeants' mess when the camp commandant came in very abruptly. He was very much upset by something, and he told us that
    a brigand by the name of Makhno gathered a force of about 30,000 men and had surrounded the city. Now, Makhno and his
    bands were marauding brigands who killed everybody they encountered. We were only 2,000 Britishers, and there were a certain
    number of Russian troops which were not too reliable.
- speaker: Respondent
  text: So the next day we put on a show of force and paraded a few tanks around the city. By evening, after a lot of machinegun
    firing in the outskirts, Makhno's troops just disappeared into space. Nobody ever heard of them since. Very strange. It
    was like the times of Attila, when the Huns would suddenly come up with great forces and then disappear into the vast
    plains of Southern Russia.
- speaker: Respondent
  text: I always wanted to get to the front and see some action, and as winter came they sent me with several officers and
    a few other sergeants up to Tsaritsyn which was later renamed Stalingrad, (now Volgograd), where the great battle of Stalingrad
    took place in World War II. Tsaritsyn was on the Volga north of the Caspian Sea and on the border of the great Astrakhan
    steppes. Across the river were the Bolshevik lines commanded by Stalin, and when he took Tsaritsyn he named it Stalingrad
    in his honor.
- speaker: Respondent
  text: Well, the worst enemy was spotted typhus fever, which is not like typhoid, but typhus, which is communicated by lice.
    There was no inoculation against it, and, as time went on, tens of thousands of people were lying dead in the streets
    and on the railway station platforms. You had to thread your way among these wretched people. The dead would be hauled
    onto trucks and their boots taken off, because the living needed boots. You always saw these dirty feet sticking out of
    the back of the trucks. It was sinister, like the later photographs of Buchenwald. This was frightfully depressing.
- speaker: Respondent
  text: One day we were told that we had to evacuate in forty-eight hours, and the bombardment of Tsaritsyn started. General
    Peter Nicolaievich Wrangel was in command of the White Russian forces. General Wrangel had married my sister's sister-in-law,
    and I had known him and Baroness Wrangel since my childhood. I saw him once on parade. Baroness Wrangel was a nurse and
    tending to the wounded. Finally we had to evacuate, my officers and myself. We all were contaminated and we could hardly
    move. It was just by a miracle that we got out of the place. There was a tremendous rush for trucks, we had horses which
    we had to load onto these cattle trucks, and we somehow managed, against a lot of Russian resistance.
