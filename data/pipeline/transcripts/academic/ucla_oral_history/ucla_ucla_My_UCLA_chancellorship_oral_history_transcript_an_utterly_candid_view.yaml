collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about the moment you first learned that UCLA was interested in bringing you west to be chancellor?
- speaker: Respondent
  text: Yes, I remember that moment quite clearly. It was unexpected but very exciting. I was at the University of Kansas,
    and suddenly there was this invitation from Clark Kerr to consider the chancellorship at UCLA. It was a big decision,
    and I had to weigh many factors.
- speaker: Interviewer
  text: What were some of the factors you considered when deciding whether to leave Kansas for UCLA?
- speaker: Respondent
  text: Well, I thought about the challenges at UCLA, the potential to make a difference, and also the personal implications
    for my family. The university was in a different stage, and I felt I could bring some energy and leadership to help it
    grow.
- speaker: Interviewer
  text: How did your meeting with the UC regents go when discussing the appointment?
- speaker: Respondent
  text: The meeting was quite positive. The regents were interested in my vision and experience. I discussed my ideas about
    university administration and the importance of academic quality, especially the role of the library as a measure of distinction.
- speaker: Interviewer
  text: Can you describe your initial impressions when you visited UCLA and met the community?
- speaker: Respondent
  text: I was warmly received by the Chandlers and other community members. I also had discussions with alumni and faculty,
    which helped me understand the campus culture and the expectations for the chancellor's role.
- speaker: Interviewer
  text: What were some of the early challenges you faced as chancellor at UCLA?
- speaker: Respondent
  text: There were many, including budget battles, conflicts over authority, and the need to establish autonomy for the campus.
    I also had to navigate relationships with Clark Kerr and other university officials.
- speaker: Interviewer
  text: How did you approach building support for the university, especially regarding the library?
- speaker: Respondent
  text: I believed strongly that a great library was essential to academic quality. I worked to convince alumni, legislators,
    and faculty that investing in the library was investing in the university's future. This was not just an abstract belief;
    I was personally passionate about books and scholarship.
- speaker: Interviewer
  text: Can you tell me about your interest in the arts and how that influenced your work at UCLA?
- speaker: Respondent
  text: I was always attracted to programs and people that combined brilliance and enthusiasm with knowledge. I supported
    modern sculpture, ethnic arts, and scholars who brought energy and expertise. The UCLA sculpture garden, which bears my
    name, is a testament to that commitment.
- speaker: Interviewer
  text: What led to your decision to step down as chancellor?
- speaker: Respondent
  text: The actual reason was fatigue. The job was intense and demanding. There were also political changes with the Reagan
    administration that affected the university environment. I was offered other opportunities, such as chairing the Times-Mirror
    board, which I accepted.
- speaker: Interviewer
  text: Looking back, how do you view your impact on both the University of Kansas and UCLA?
- speaker: Respondent
  text: I believe I helped transform both universities by bringing personal dynamism, a strong sense of pride, and a commitment
    to excellence. It was not just about administration but about inspiring people and raising standards across the board.
