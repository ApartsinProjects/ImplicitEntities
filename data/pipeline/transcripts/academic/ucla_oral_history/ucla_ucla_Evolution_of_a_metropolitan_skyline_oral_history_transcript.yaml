source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family's background and how it influenced your career in architecture?
- speaker: Respondent
  text: My mother's side of the family, the Borchard family, had a ranch in Ventura County. My parents met through family
    connections, and my mother's brothers and sister were quite influential in my early life. My father's side was deeply
    involved in architecture; my father, Albert C. Martin, Sr., was an architectural engineer who introduced steel and reinforced
    concrete into building construction. This family environment naturally led me to pursue architecture.
- speaker: Interviewer
  text: What was it like growing up in a family so involved in architecture and construction?
- speaker: Respondent
  text: It was a large and convivial family. My father had some health problems, including epilepsy and issues with drinking,
    which affected the family. Despite that, I spent a lot of time on construction sites as a youth, which gave me practical
    experience and a deep appreciation for the work.
- speaker: Interviewer
  text: How did your education shape your architectural philosophy?
- speaker: Respondent
  text: I entered USC and learned the new concepts of the Bauhaus school of architecture. The Depression and World War II
    had a big impact on Los Angeles and the architectural profession. During difficult times, our firm struggled but eventually
    got back on its feet. I admired architects like Frank Lloyd Wright and Willem Dudok, and I preferred an architecture richer
    than Bauhaus, focusing on classic design elements.
- speaker: Interviewer
  text: Can you describe some of the significant projects your firm worked on?
- speaker: Respondent
  text: Our firm designed many important buildings in Los Angeles, including the Department of Water and Power Building, the
    May Company stores, and the ARCO Towers. We also pioneered shopping malls like the Lakewood Shopping Center and Eastland
    Shopping Center. I was particularly proud of designing St. Basil's Church on Wilshire Boulevard.
- speaker: Interviewer
  text: What innovations did your firm bring to architecture and urban planning?
- speaker: Respondent
  text: We introduced computer analysis of earthquake movements, which was innovative at the time. We also focused on creating
    open spaces in urban landscapes and worked on plans to improve transportation systems in Los Angeles. Our designs often
    balanced functionality with aesthetic and environmental concerns.
- speaker: Interviewer
  text: How did you see the evolution of architectural styles during your career?
- speaker: Respondent
  text: There was a shift from Beaux-Arts to modern architecture. Over time, architecture moved toward humanism and understanding
    the nature of materials. I valued organic structure to create unified buildings and was influenced by architects like
    Frank Lloyd Wright. The trend also included more lightweight metallic walls and energy-saving measures.
- speaker: Interviewer
  text: What role did community involvement and city planning play in your work?
- speaker: Respondent
  text: My brother Ed and I were involved in community affairs and city planning. I served as chairman of the Los Angeles
    Bicentennial Committee, which involved organizing events and fundraising. We believed in the necessity of private sector
    initiative and leadership to complement government efforts in urban development.
- speaker: Interviewer
  text: What are your thoughts on the future development of Los Angeles?
- speaker: Respondent
  text: Los Angeles has become increasingly integrated ethnically, and I see a trend toward more human-scaled environments
    downtown. There's a need to renovate areas like Wilshire Boulevard and to optimize space in buildings while incorporating
    energy-saving measures. Open space remains crucial in the urban landscape to sustain life and improve quality of living.
