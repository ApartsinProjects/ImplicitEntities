collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Will you tell me a little about your early childhood?
- speaker: Respondent
  text: Briefly stated, I was born in Dixon near Sacramento on December 24, 1873. We were farmers, worked in the wheat fields.
    Our family was rather large and I was one of the younger ones. We left in '76 and went up to Shasta County and established
    a home on Cow Creek about six miles east of Anderson near Redding. I lost my sight in 1881. The last day that I was at
    all conscious of vision was my eighth birthday, December 24, 1881. The cause of my blindness was a severe attack of poison
    oak. I heard the doctor tell my father that I was dangerously ill and that he must choose between trying to save my eyesight
    or trying to save my life and that the latter would be the wiser choice. After many weeks of sickness during most of which
    time I was unconscious, I began to recover but with the definitely established fact that I was permanently blind. I remember
    clearly when the day finally arrived on which I was to be permitted to get out of bed and be dressed. Many of the neighbors
    came to see how I would manage. There had been quite a bit of excitement about Mr. Perry's blind boy. When I started to
    dress, they were all elaborating at great length on how wonderful it was that I could do this or that thing, largely,
    I think, to make me feel better. When they handed me my shoes, two or three said, "Oh, you mustn't do that. You'll have
    to tell him which foot to put that on." Of course I put it on my foot myself. Well, I was the most wonderful being they
    had ever heard of. How would I know which foot to put the shoe on? Why, anyone would know. However, it pleased me and
    I remember very distinctly that I thought I was fooling them and I felt pretty proud of it. I never explained how I told
    about my shoes. I expect I was a mystery to them and I was quite willing to keep that up. As for melancholy or heartaches
    or all that sort of stuff, I never had any. In fact, I received so much attention that I rather regretted that I hadn't
    gone blind before. When I got up from my sickness, I felt very fine apparently and the only great change was that all
    my brothers and sisters went to school. I did not go. No one ever thought of asking me to go.
- speaker: Interviewer
  text: With a horse and wagon?
- speaker: Respondent
  text: I wouldn't have minded going but I think I accepted the view that I could not conform to the requirements for learning
    anything in school. Now I think it would have been very much better if I had gone to school and I think I could have learned—that's
    my present opinion. Before I lost my sight, I had attended a one-room schoolhouse with pupils ranging from six to twenty
    years of age. I was about halfway through the first reader and I had learned to count, except I couldn't remember the
    number thirty. My father's business was hauling lumber. There were a lot of saw mills up in the mountains east of Redding
    and the timber had to be cut, sawed up into lumber and then someone had to haul it down to the railroad at Anderson. We
    had two wagons fastened together and eight horses driven by a jerk line. My father was inclined to keep me with him as
    much as he could. When we went on these trips, he would let me go along with him. The head two horses, the leaders, had
    bells on their shoulders and I can remember, I used to like to listen to them. He would let me ride on one of the wheelers,
    one of the rear horses. I enjoyed that very much. My father passed away in July of 1883 from "galloping tuberculosis."
    He had heard of and corresponded with the people at the School for the Blind in Berkeley, California. He never told me
    anything about that. So arrangements were made to send me down. I came down in August of '83. I was not quite ten years
    old.
- speaker: Interviewer
  text: Was Mr. Wilkinson a relative of the principal?
- speaker: Respondent
  text: As for the school, it was up here on Derby Street. Parker Street would run right into the main building. At that time
    the blind and the deaf children were all in the same building. There were about sixty blind children. The school was considered
    a school for the deaf because they had, I guess, a couple of hundred of them there. The blind were, so to speak, permitted
    to stay in a deaf school. They had two or three dormitories. The blind boys had two stories in one of those buildings
    and the blind girls lived about the same way over in their area. There would be deaf children in that same dormitory.
    The life was very new and strange to me. My experiences had been out in the country, not in the city. I knew a good deal
    about climbing trees and robbing birds' nests and looking at ants and helping curry the horses—we had a good many horses—and
    that sort of thing. But I had never been in a city and it puzzled me a great deal. We had two teachers for the blind,
    so two school rooms. A lady taught the lower grades and a gentleman, Mr. Charles Wilkinson, taught the other. They were
    not trained people as we speak of trained teachers now, but for some reason they were both wonderful teachers. How these
    two people educated all these children varying from six to nineteen or twenty has always been a mystery to me. Mr. Wilkinson
    had to do a great deal of individual teaching, and yet he kept us all busy. I finally got through what you would call
    the tenth grade now. Mr. Wilkinson was a brother of the principal. The principal was Mr. Warring Wilkinson. Mr. Warring
    Wilkinson was a much better trained and educated man, but a very different type. He was strictly the administrator. Mr.
    Charles Wilkinson was a boy that was grown up. He was quite boyish and he was very much loved by everybody.
- speaker: Interviewer
  text: Did the blind students like Mr. Warring Wilkinson?
- speaker: Respondent
  text: Some did, but they didn't see as much of him. He didn't have the time to give to us. I liked him very much and he
    took a great interest in me, more than he ever had in anybody, for some reason. I think because the story is this way.
    They decided they wanted to have a contest in arithmetic between three deaf boys and three blind boys. They tried to get
    the best ones they could and I was one of the blind boys. Arithmetic came easy to me. One of the teachers of the deaf
    was going to put a problem of multiplication on the board and read it at the same time and we were to raise our hands
    when we were ready to give the answer. He said, "Multiply 297 by 368." That quick, I gave the answer. A great many of
    them thought that was very strange; they began to think that I knew what the example was before I came in. It was very
    simple. 297 is 300 minus 3, so all I had to do was to multiply by 3 twice, first to get 300 times 368 and then subtract
    3 times 368 from the first answer. Well, that not only puzzled the boys but the teachers got all excited. They all thought
    that I was a wonder and I didn't tell them how I did it. I thought I was getting a lot of glory and the less I talked,
    the more glory I was getting. Do you understand what I did?
- speaker: Interviewer
  text: Yes. I think they teach the children in school now to do that.
- speaker: Respondent
  text: Yes, I've always taught them to do that way. Well, that established me as a great mathematician. Numbers did come
    very easily to me. I did not take much interest in English. These three or four of us who were getting along to the tenth
    grade used to try to figure out what we were going to do when we grew up. Older people think that children don't think
    very much, but I think they are very much mistaken, particularly about children who are problems like we were. How could
    a blind person make a living? None of us ever heard of a blind man making a living. The subject of what we were going
    to do was avoided, avoided by me because I knew that if I had sprung any of the hopes I had on any of the adults they
