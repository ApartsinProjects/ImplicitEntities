turns:
- speaker: Respondent
  text: Well, let me just start. [laughs] And we'll see what we get. I was born in Denver, Colorado, October 29, 1931. People
    discovered that that's a Scorpio sign, which I have never paid much attention to, but it does-- People who believe in
    it use it. It turns out I do have characteristics that those people who believe in it associate with [Scorpio].
- speaker: Interviewer
  text: What are you thinking of?
- speaker: Respondent
  text: Well, a Scorpio - I'm not sure. A Scorpio is a kind of self-centered person, rather direct and-- I shouldn't say direct.
    But there is an interest in sensuality. I shouldn't even be talking about this, because it's really someone else's opinion
    about astrology, which I don't necessarily believe in. But anyway, I am a Scorpio. The reason I was born in Denver-- My
    father was a Lutheran minister who was assigned to a church in Denver, Colorado, I think probably the year I was born.
    It was a mission church, which means that there is no church there. You go into a community, try to find the Lutherans
    [laughs], and get them excited or whatever, open a church, a mission church, which in this case I recall - not directly
    but from photographs --was a storefront church in Denver, Colorado, which you are assigned to for a period of time to
    determine whether there is a congregation possible in this district or this city or whatever. So that was his job. So
    I was born there. Prior to that time, he and my mother had been to a couple of other places in Colorado doing the same
    thing, which I presume didn't materialize. I mean, whatever the survey was didn't produce enough people or whatever. And
    then, after the Denver situation, we also lived in other cities in Colorado. Golden comes to mind - Now I can't remember,
    but they were in the vicinity of Denver and things like that. So that's the occasion of being born there. I'm not sure
    how to begin. But anyway, in 1939--this would now be eight years later - my father falls in love with one of the parishioners
    of this mission church--right? - which they had established by that time. I didn't know any of this until much later,
    but-- So he falls in love, leaves the whole situation, runs off with this woman-- And it's not just that it's some woman,
    it's because it's a church person; that's the bad part of the whole deal, right? So he comes to California, presumably
    with this woman, goes to Hawaii, presumably with this woman. Maybe this is now 1940, something like that. The facts are
