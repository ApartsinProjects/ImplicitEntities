source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Purchase of Father Junipero Serra document - Dedication to Haydee Noya--Zamorano Club meetings and membership--Thomas
    W. Temple II and his work with mission archives - Father Jose Thompson and the De la Guerra papers--Remodeling of San
    Juan Capistrano Mission--Holdings and collections of the Huntington Library - History of the Huntington - Classification
    of materials--Experiences in Germany, 1945--Work in historical section of Seventh Army - William B. Goddard - Visit to
    Neuschwanstein--Linderhof--Europe at the close of World War II--European libraries and bookstores--Morocco--Gerald McDonald.
- speaker: Respondent
  text: I purchased a document related to Father Junipero Serra which I dedicated to Haydee Noya. I was involved in the Zamorano
    Club meetings and membership. Thomas W. Temple II worked extensively with mission archives, and Father Jose Thompson was
    connected to the De la Guerra papers. I also participated in the remodeling of the San Juan Capistrano Mission. The Huntington
    Library's holdings and collections are vast, and I have a deep interest in its history and classification of materials.
    During my time in Germany in 1945, I worked in the historical section of the Seventh Army under William B. Goddard. I
    visited places like Neuschwanstein and Linderhof. Europe at the close of World War II was a fascinating place, with many
    libraries and bookstores. I also spent time in Morocco and had connections with Gerald McDonald.
- speaker: Interviewer
  text: Can you tell me about your experiences meeting the Guillens and the Bou Helals in Morocco, and your collection activities
    there?
- speaker: Respondent
  text: Meeting the Guillens and the Bou Helals in Rabat was a significant part of my time in Morocco. I was involved in collection
    activities there, working with Prosper Ricard and Louis Endres. I developed an interest in Moroccan bindings and had the
    opportunity to meet the Guillens in Paris as well. My postwar army life included Information and Education programs, and
    I attended the University of Paris, taking courses at the Institut d'Ethnologie with Yvonne Oddon. I also met Harper Kelley
    and lived in arrangements that allowed me to meet members of the Resistance. I collected early Resistance memoirs and
    was aware of the abuses of I and E. I was awarded a military decoration and eventually returned to the U.S. to begin work
    at the Huntington Library and resume my academic career under Joseph B. Lockey at UCLA.
- speaker: Interviewer
  text: What was your experience like in the Lockey seminars and your decision to attend library school?
- speaker: Respondent
  text: Lockey's seminars were intellectually stimulating and rigorous. A typical session involved deep discussions and research
    assignments. I worked as a research assistant in the Department of History under John Caughey. Eventually, I decided to
    attend library school to further my career. My first employment as a librarian followed that decision.
- speaker: Interviewer
  text: Could you describe your introduction to book collecting and your early collecting activities?
- speaker: Respondent
  text: My introduction to book collecting began with an interest in bibliographers of Americana and Americana-ana. I developed
    criteria for collecting and focused on principal collections. During wartime, I continued collecting, including items
    like 'Pozzuolana' and works from handpress and fine printing, as well as pilgrim presses. I also collected Indian illustrators,
    local history, genealogy, and cemetery records. I inherited a legacy from Gerald McDonald and worked at the New York Public
    Library researching Noah Webster. I had colleagues there and collected eighteenth-century Mexican engravings.
- speaker: Interviewer
  text: Can you tell me about the founding of the UCLA Anthropological Society and its early days?
- speaker: Respondent
  text: I founded the UCLA Anthropological Society during a time when anthropology was still developing at UCLA, around 1937.
    The first meetings of the society had early membership and initial programs. We had first officers, dinners, and communications
    within the society. One notable event was mounting the Pueblo Indian exhibit in 1938.
