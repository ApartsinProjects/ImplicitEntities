collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Was that just kind of the policy that you and Lorser established, because his is fairly brief, the same way.
- speaker: Respondent
  text: Yeah. Well, we both feel that private lives are private lives, and that there's just too much pandering to the curiosity
    that people have. Of course, some artists have had adventurous and exciting lives, and perhaps it's worthwhile going into
    that; perhaps it means something in particular in regard to their work. But anyway, we've sort of stuck to that - [laughter]
    the brief biography, list of exhibitions, and so forth.
- speaker: Interviewer
  text: Because it presents you in a very kind of anonymous, but very professional, way. It's an interesting kind of stance
    to take, I think. It's also curious that you bothered to give your birthdate, because most women won't.
- speaker: Respondent
  text: Well, Fidel, I started doing that when I didn't care who knew when I was born, you see, so I'm stuck with it. I might
    just as well come out with it every time anybody asks because they can find out if I don't tell them.
- speaker: Interviewer
  text: Okay. And do you remember anything of Chicago?
- speaker: Respondent
  text: Oh, I remember very little. I was four and a half when my family moved out here, and they came out in December, I
    think, 1912. And I have just little vignette, fragmentary memories, you know. I was thinking about that today, apropos
    of this whole subject of what it means to be an artist working in Los Angeles and so forth. After all, Los Angeles is
    the West; it's Pacific Coast. In Pasadena, I grew up with mountains before me and a big meadow across the street and so
    on. And all my memories of Chicago, except maybe one, are of interiors. It's all very closed in. My mother used to say
    that. At that time in Chicago, there'd been a lot of kidnappings, and people with small children were terrified that their
    children would be snatched away if they weren't kept under close supervision and in their own yards - not only in their
    own yards but with someone to keep an eye on them. So we lived in a flat building; I don't know whether it was two or
    three stories high, but each floor was a home. And one funny memory I have is of going out - we were up above the ground
    floor, I know - and there was a big porch on the back, and it seemed to be open, except that it had a railing. And a woman
    came out on the porch of the next building (and you know there probably wasn't more than that much space between the buildings),
    and she had a present for me. She gave it to me by putting it on the end of an umbrella. It was tied in a paper with a
    string and she hooked the umbrella into this and reached it across to me. I think it was a little set of dishes. I don't
    know whatever happened to them. But I remember that - I mean, just a vignette, you know. I don't know who she was or why
    she gave me a present, but I remember this thing with the umbrella and the parcel tied with a string. Other little things
    - I seem to remember falling into a snowdrift once - but not much outdoor stuff, you know. Mostly just indoors.
- speaker: Interviewer
  text: Was there an official reason or set of reasons your family came to California?
- speaker: Respondent
  text: The main reason was my mother's health. Chicago has a fierce climate. They also, at that time, were having those black
    fogs, fog cum coal dust, coal smoke. Every winter she'd have this terrible bronchitis, and the doctor said, "You'd better
    get out of here while the going's good." She'd already had some trouble as a young girl with bronchitis or some kind of
    lung congestion that hung on and hung on and hung on and was finally cured. And my father had a cousin who already lived
    in Pasadena
