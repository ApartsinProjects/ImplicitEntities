collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Awesome, and - if you would just like to share what it is that you do, and just a typical day for you.
- speaker: Respondent
  text: 'Great. I''m the CEO of Classical King FM, which is the classical music station that serves the Puget Sound region:
    Seattle, Bellevue and beyond. It''s a public radio station, meaning we''re a nonprofit organization, and therefore, fundraising
    is a part of my responsibility, along with really overseeing all the operations for the station. So, even when it isn''t
    a pandemic, I don''t really have a typical day, necessarily, which is part of what I like about the job. But, you know,
    typically, my job is to oversee, really, all aspects of the operation. I report to a board of directors, so I work closely
    with them as well. And the buck stops with me.'
- speaker: Interviewer
  text: That's so awesome to hear. How do you feel like those responsibilities have kind of morphed during COVID?
- speaker: Respondent
  text: Great question. They definitely have morphed. I would say when the pandemic first started, it was - we had actually
    just moved into a new building two weeks before the stay at home order was issued. So we were getting used to being in
    a new space, and we had all new equipment, and a new automation system, and it was a really tough time to immediately
    have to go into a crisis, because we had just completed this huge project that had taken about a year. So, there were
    sort of three things swirling around in my brain right at the beginning. One was, How do I keep the staff safe? The other
    was making the decision that we needed to continue to operate in our space, and we needed to be in our building and not
    stay at home, working from home. Some radio stations did work from home, and shifted their announcers, even, and all of
    their staff members to working from home, or most of their staff members. We sent some staff members home to work for
    a while, but basically, the core programming team was here every day in the office. So, part of my job began to be reading
    everything I possibly could about COVID and Coronavirus, so that I could understand the ever changing landscape and try
    to change our internal protocols to keep everybody safe and healthy. So, the life and safety of the staff became a top
    concern, something that's not usually as big of a concern in our world. So, that felt like a huge amount of pressure,
    and a lot of responsibility. And also, scary in that we were dealing with something that nobody knew anything about, brand
    new, brand new illness, so so that was definitely probably the most challenging part. And then the other part was also
    keeping the staff calm. You know, saying we - there's a lot that we can't control, but there are things that we can control;
    and we can control how we operate to be extra safe. So again, as the guidance changed, and we began to - to know more
    about the virus and how it transmits, etc., we kept changing our protocols for how we work, to make certain that we could
    do our best job of keeping people safe. Also, just caution people constantly, on a weekly basis, to be careful. Not to
    take any risks in their personal life, because any risk they took, they were going to bring into the office. So, how do
    we operate - especially being in a new environment, and then, also, how do I keep people safe - was at the top. And then
    very quickly, it became how do we serve our listeners? Well, they are stuck at home, right? They can't go out. They're
    scared, many of them are living alone, without their usual social networks, in terms of being able to see people. So,
    how do we - what do we do on the air to try to serve our listeners well? And the first decision I made, that we were never
    going to say the words Coronavirus and COVID-19 on the air.
- speaker: Interviewer
  text: Interesting.
- speaker: Respondent
  text: The reason I made that decision is because you could go to so many places to get non-stop, you know, talk about COVID
    and Coronavirus. There were very few places you could go to get a break; And as we were all coping with the stress of
    the pandemic, and also, really understanding that no one knew anything about this disease, and that - we were getting
    information, but it wasn't necessarily solid information we could trust for a lot of reasons.
- speaker: Interviewer
  text: Going and having a place to just get away from it and not have to think about it was really important for mental health,
    'cause mental health obviously has taken a huge toll for really everybody during the pandemic, more so for some groups
    than others, but - having that mental health break, and that respite was important. And that ended up being a really good
    decision, and we heard from many of our listeners; they would write and call to thank us for being that kind of safe space
    they could go and never hear about COVID. So we were - it ended up being a good decision. It was kind of a hard decision
    and hard for some of our staff members to understand, because it felt like, "Well, this is what we're living, shouldn't
    we be talking about it?" So, helping them understand people have an infinite number of places they can go for information,
    we don't need to be one of them, we need to be that mental health break. So - that was an early decision that we made.
    Another decision that we made a little further along the line as this stay at home order went on longer, was that people
    had more time to be interactive with us. So we started a weekly all request day. Every Friday, we played requests, and
    we figured it would make Friday feel more like Friday for people who did something special, since there really wasn't
    that much to distinguish one day from the other.
- speaker: Respondent
  text: And then, the other side of it is that listeners could hear their requests, and really feel like the station was their
    companion, and was there for them, too, during the pandemic. So, that was another example of something we did to change
    our programming to meet the needs of our listeners.
- speaker: Interviewer
  text: That's awesome. Yeah, because thinking about it, when I think about when COVID was kind of like in full force, and
    it was very new. It didn't matter where you went, everything was kind of like COVID COVID COVID in your face. So, having
    that just little - it's refuge. For listeners, that's just - that's a very awesome service. And you mentioned that it
    was something that you really had to try and explain to, I guess the employees and workers at Classical King FM for that
    decision. How did that go over? Was it more of a positive experience?
- speaker: Respondent
  text: You know, I think so, ultimately. What I was able to explain to them, is we know from research that's been done on
    the classical music audience over a lot of years, really, that one of the things - there are three major reasons that
    people tuned to a classical station. One is it's soothing and relaxing, but also intelligent. So, it's not elevator music,
    soothing, but it's the experience of listening to the music is so soothing, and they've actually done studies that listening
    to classical music can calm people down and it can lower their blood pressure. So, there's a physiological thing that
    happens, that we don't fully understand why, but this particular kind of music does have a soothing and calming effect
    on people. Even if the music itself isn't very soothing. It's, some of it's frenetic, and energetic, and bombastic, and
    loud. But still, the overall experience is one that it feels like, you're just - you're able to just breathe and take
    a minute, and it's soothing and relaxing. So, that's one reason that people listen. Another is that it helps them focus.
    It's the kind of music they can listen to and work, and feel like it helps them concentrate more. And then the third reason
    is just it reminds them of aesthetic beauty, you know, beautiful things that human beings are capable of creating. So
    in this case, because we know that people come to us for that kind of soothing experience, that it wasn't going to be
    very soothing to talk about COVID and Coronavirus all the time, because that immediately leads to stress, right? Every
    time you hear the words. So, explaining that to the staff, you know, helps them understand why, in this particular case,
    not mentioning it was more of a service than trying to communicate that yes, we're here living with you and COVID by mentioning
    it, when we all know everybody's living in COVID.
- speaker: Respondent
  text: None of us no, none of us get to escape it. It's not something that happens to one group of people and not the other.
    It's something that happens to every single person around the globe. So, we didn't need - everybody knew that, we didn't
    need to remind them of it. What we needed to be was that place that was still a break, and soothing, and relaxing for
    them. So that helped them understand it. And you know, as we went along, and we started to get really positive feedback
    from listeners, then that helped a lot too.
- speaker: Interviewer
  text: Yes, yes. So, with having everyone - stay in the office during this time, and really trying to make that stay at home
    order work - I guess the nature of radio is kind of remote, in a sense, but what was the main reasoning that went into
    having everyone work from the station still?
- speaker: Respondent
  text: Well, some people did work from home in the beginning, we - anyone who could work from home did. But, our programming
    staff, the announcers, they need the studios, and the microphones, and all the equipment to do the broadcasting part.
    And again, some stations, kind of issued a computer and a microphone to announcers and had them do the work from home.
    But if you do that, you're recording in advance, you're recording your shift in advance, you're not live. We felt that
    it was really important to be live in the moment with our listeners. And for them to have that feeling that there's somebody
    who's with me in this - terrible journey we're all going through. But, here's my friend Dave, or here's my friend Maggie,
    or here's my friend Brad. You know, the announcers that they know, that they listened to all the time. They're still there
    for them, and they're still - they still sound the same, as they always did. So, we felt like that was really important
    in terms of our service to our listeners. And what we did to make that safe, is we have multiple studios we can broadcast
    from, so - and again, we were in a brand new building. So, all the equipment was new, all the furniture was new. We had
    a brand new, state of the art HVAC system for air handling, to be sure we could bring in outside air and filter - do all
    that, plus we bought HEPA filters and we put those in all the studios additional filtering. So that a person - and then
    we put tape all over the equipment, so that we could sanitize the equipment, you know, easily, without destroying it after
    every shift. So, we had a sanitizing procedure and we had the extra HEPA filters, and we had people alternate studios.
    So, no one went immediately into a studio someone else had used. We also issued everyone their own microphone windscreen.
    So, you use yours and you brought yours in and you put it on; so that you weren't using the same windscreen somebody else
    was using. So, there were things that we could do that would - allow us to operate safely and for them to feel safe. After
    about - I don't know, six weeks of working that way, where part of the staff was in the office and part of the staff was
    at home, it became really clear to me that the staff members working at home full time were struggling.
- speaker: Respondent
  text: This is a group of people who they really like being together and they like being in the office. So, they were not
    enjoying working from home, it was actually starting to have mental health consequences for them. So, I started bringing
    everybody else back, and what we did is staggered shifts. So we didn't have, you know, everybody in the space at the same
    time. So, we staggered shifts and days. So, some people would come in three days a week, some people five days a week,
    depending on their job. Some people would come in and work kind of late afternoon into the evening. Some people would
    come in early in the morning. So - but everybody was around other people. Everyone got to be around other people and talk
    to other people and have that human interaction. So, doing it that way and we're still operating that way right now. That
    felt safe to everybody. But, it also eliminated the problems that I was seeing in productivity and just focus. And people
    kind of really struggling. It eliminated that because people did get to come in and be together. So, it was definitely
    a process. But, you know, at that point in time, when I realized that there were mental health consequences; mental health
    is just as important as physical health, right? You cannot ignore that. And, it was just - it was just necessary to bring
    people back. And by that time, we definitely - I mean, we didn't know everything at that point, because, partly, the government
    was lying to us. But, that's another story, right? [laugh] But we felt like we could do it in a way that was safe and
    I moved people out of their - out of the thoughts they worked in to stagger, to create more social distancing. So, we
    were able to do it enough that we felt like it was safe to bring people back. And so, all but two people have worked in
    the office most of the time. Two people have worked full time at home, because they had either autoimmune issues or someone
    close to them with autoimmune issues, and it was way safer for them to work from home.
