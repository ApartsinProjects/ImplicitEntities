collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Tell me a little bit, if you would, about your early life, your youth, your early experiences before you got into
    ILWU.
- speaker: Respondent
  text: Just before getting on the ILWU I worked for Shell Chemical for ten years. I was very active in the OCAW union, which
    was - our little plant was 100 percent and very active. Matter of fact, I clashed quite a bit with the company and I was
    the secretary of the group for several years and, on that committee. It kind of - pretty soon I just gave up the ghost
    and went down the waterfront to work.
- speaker: Interviewer
  text: How did you get from Grass Valley to that company?
- speaker: Respondent
  text: I got from there well, I went in the army in '54, got out in '55 and went to Oregon and worked with my brother Ken,
    he drove Cat [Caterpillar machinery] and I set [logging] chokers behind him. I worked up there out of Glendale, Oregon
    for a year, and then that closed down. When the woods closed down in Oregon, it closes down. And so, I had two brothers
    in southern California. Matter of fact they were just both going into the longshore union, one in the clerks union - one
    in 63, one in Local 13. And I came down here and they helped me - matter of fact, one got me in the job at Shell, helped
    me get the job at Shell and then ten years later the other one helped me get into the clerks union and I went into the
    clerks union in 1968.
- speaker: Interviewer
  text: How did he help you get in?
- speaker: Respondent
  text: He helped me with a test, very extensively with the test. And he helped me as far as different people to meet. Mostly,
    it was to get on the list for the test, and exactly how he did that I don't know.
- speaker: Interviewer
  text: Were your brothers union guys too?
- speaker: Respondent
  text: Yeah, both of them. You bet. My brother Raymond was in the union clerk in 63. And my brother Chuck was in Local 13.
- speaker: Interviewer
  text: How about your parents? Were they union activists?
- speaker: Respondent
  text: No, my father was a gold miner. He mined gold for 55 years in northern California. And then he was, at 67, he took
    a job with a county and worked in the county road for another almost 20 years.
- speaker: Interviewer
  text: Okay, so you're down in southern Cal and you get in 1968. Did you know much about the ILWU before that?
- speaker: Respondent
  text: No. Yes, well, actually my brother Chuck worked in Stockton [California] for three years after he got out of high
    school in '49. And he talked a lot about working on ships and Harry Bridges and different things. So I did know a little
    bit about it.
- speaker: Interviewer
  text: How did you view it?
- speaker: Respondent
  text: Oh, I thought it would be a pretty nifty place to work myself. I never thought too much about it until I moved to
    southern California.
- speaker: Interviewer
  text: Tell me about your first day on the job, particularly as a clerk. You come in as a clerk--actually you didn't do longshore
    as such.
- speaker: Respondent
  text: No. Actually I did longshore when I first got to southern California for the first six months out of the employment
    office and then my brother got me the white card, which it gave me permission to get the extra jobs for the clerks hall.
    And my first day in the job in the clerk's hall was -
- speaker: Interviewer
  text: Why don't you tell us your first day on the waterfront as working as a longshoreman?
- speaker: Respondent
  text: Okay. My first day working as a longshoreman? I drove forklift. We were picking up sacks with a forklift and drive
    them to the hook. And I remember dropping these bags, I tried to go too fast and I kept dropping the bags and these longshoremen
    were very nice to me, kept putting the bags back on my pelleport. It was interesting.
- speaker: Interviewer
  text: How can you drive a forklift on the first day? Usually that doesn't happen 'til you been around a while.
- speaker: Respondent
  text: It was the extra job. That's what it was, it was the forklift job. 'Course I knew how to drive a forklift but it's
    just that I never worked on the waterfront.
- speaker: Interviewer
  text: Where'd you learn how to drive a forklift?
- speaker: Respondent
  text: Oh in lumber companies in northern California.
- speaker: Interviewer
  text: How about your first day clerking?
- speaker: Respondent
  text: My first day clerking...
- speaker: Interviewer
  text: Before you do that let me ask you, were there any hard products you ever worked when you were doing longshore work
    that six-month period? Miserable? Did you work hides or something like it?
- speaker: Respondent
  text: Well we used to work hides and just kind of on a clean-up thing. But most of it we worked were nitrates. Restack nitrates
    and stuff like that as a cooper. We did the re-coopering work - that was pretty tedious jobs. We used to stack lead ingots
    and things like that. It was pretty demanding work, physically.
- speaker: Interviewer
  text: How so, can you describe it?
- speaker: Respondent
  text: Just ingots were heavy, very heavy, and you just had to stack them up and band them. And then, of course we would
    handle cotton and we would take all the bales, we'd have to roll them over, stand them up, band them and then put them
    on big - and load them into the ships sometimes, six or more at a time. The bales of cotton.
- speaker: Interviewer
  text: Was it pleasant work?
- speaker: Respondent
  text: Pleasant work? It was demanding but it was interesting.
- speaker: Interviewer
  text: You understand when I say something like that I'm trying to elicit a response, of some sort. Was it positive or negative?
- speaker: Respondent
  text: Say that again.
- speaker: Interviewer
  text: Oh, when I'm asking you a question like was it pleasant work, I'm eliciting a response, maybe you think it was, maybe
    you think it wasn't...
- speaker: Respondent
  text: I would say that most of my work down there was always pleasant, whether it was a hard job or not. The waterfront
    wasn't really the hard - to me it wasn't the hardest place to work. I've worked harder jobs in the lumber companies and
    even in Shell, handling 500 pound drums. You know, that was a hard job.
- speaker: Interviewer
  text: What'd you do handling those drums? Why were you handling them?
- speaker: Respondent
  text: Oh we had to move them from place to place. They would load the drums and they needed the area to load more drums,
    so we would go ahead and roll the drums so sometimes we had to roll them to a pallet board or to a different area. It
    was a one-man job. You'd break the drum and roll it by yourself to where it was going.
- speaker: Interviewer
  text: Tell me about your first day on the job as a clerk in '68?
- speaker: Respondent
  text: Yes. That was at Door 14, at the Matson Company, Berth 198, Wilmington, [California] and I went to there and I ran
    into a man by the name of Morey Segal. And Morey Segal, I didn't realize was ending his - he was a B-man in the union
    but his career was ending because he was going into the real estate business. Of course, Morey got into the real estate
    business and did just fabulous in the real estate business in San Pedro.
- speaker: Interviewer
  text: What was work like the first day? If you can remember?
- speaker: Respondent
  text: Oh, just nice and easy. Standing at the end of the truck, checking cargo into the truck as the truck driver loaded
    it. You hardly worked more than two, three trucks a day. Back in the loadings, you had to load the whole truck sometimes
    it took several hours to do that.
- speaker: Interviewer
  text: Do you have anything to add about working cargos? Good cargos? Pleasant cargos? Unpleasant cargos? Hard work? Easy?
    Anything to add on?
- speaker: Respondent
  text: Yeah well, cargo as a clerk?
- speaker: Respondent
  text: Okay, as a clerk. Yeah, I would say that working at the army dock whether it was banding - banding, tying motorcycles
    on racks. First we'd build the rack then we'd band the motorcycles on the rack so we could ship it overseas. It was a
    demanding job, sometimes you would band only two or three a day.
- speaker: Interviewer
  text: I thought, would that be Local 13 work rather than Local 63?
- speaker: Respondent
  text: No, because it was cooper work. It was considered cooper work and so the clerks did all the re cooperative cargo.
- speaker: Interviewer
  text: That's interesting. You had an active background as in having been involved in the old workers, I guess, did you get
    active in Local 63 at some point?
- speaker: Respondent
  text: In politics? No.
- speaker: Interviewer
  text: Union politics?
- speaker: Respondent
  text: Nope. No sir.
- speaker: Interviewer
  text: You ran for office?
- speaker: Interviewer
  text: Active on committees?
- speaker: Respondent
  text: No sir. Nothing.
- speaker: Respondent
  text: I didn't do any of this extracurricular stuff until I retired. [smiles]
- speaker: Interviewer
  text: Really! Interesting. What did you hear about the 1934 strike? Was there a discussion about it at some point? Did guys
    tell you about it?
- speaker: Respondent
  text: Yes, of course I read many stories on it and you know, the story of - The Rose Story and different writers, and it's
    just to me - it's sad but glorious because of what the longshoreman won. And they won. That was a strike they won. It
    was written for them to win it and they did. It was fantastic, I think.
- speaker: Interviewer
  text: Okay. There's a strike in 1971. You'd been in for three years, do you remember what you did during the strike?
- speaker: Respondent
  text: Yes, I was full picket duty, Berth 146 Wilmington [California].
- speaker: Interviewer
  text: Do you remember much about it? Can you tell it to us?
- speaker: Respondent
  text: Yes. Our picket duty there was just to watch at the gate there would generally be about six to ten of us there at
    the - and we had little shack there, a place to barbecue, a place for all our food, big Hawaiian man by the name of Soonac
    Wasimi would see me, came down and I would bring my ukulele and he'd play my ukulele and we had a big time. And when we'd
    get a little tired we'd have a football game out in the middle of the street. Just by the time everybody would get a little
    hungry, the bosses would come with their truck of food and give us food and drink. It was a fun time. And the nice thing
    about the '71, '72 strike is that almost everybody was well-heeled. I didn't know anybody that lost anything because of
    that strike.
- speaker: Interviewer
  text: The bosses would come by with their food?
- speaker: Respondent
  text: Oh yeah, with trucks of food.
- speaker: Interviewer
  text: Which bosses were they?
- speaker: Respondent
  text: Oh the bosses, they were collecting unemployment. Our bosses - yeah. Our bosses in Local 94, yeah.
- speaker: Respondent
  text: Oh yeah, Jim North and those guys - sure.
- speaker: Interviewer
  text: Well if your income had stopped at this time how did you get by economically?
- speaker: Respondent
  text: Economically, I had a little money in the bank. I only used few hundred dollars of it. My wife at the time - this
    is my late wife - she was a beauty operator and she kept working. She worked through that and then I picked up a few extra
    jobs. I didn't work any jobs at all for about a month, then I had an opportunity to work at the army dock a day or two
    a week because it stayed open - the army dock stayed open so I worked there. Just enough to get by and you know, we didn't
    owe much, we had an $83 payment on the house and a $40 payment on the car. That was about it. So we managed.
- speaker: Interviewer
  text: What about the 2002 lockout? If you look at Conor that's also good.
- speaker: Respondent
  text: I just retired. I retired in August of 2002 and I went down and visited the picket line and I had torn my Achilles
    tendon and was on crutches or else I would've been - and I told my wife that I was going down and walk the picket. She
    said, "No you're not," because I was - two days after I got this cast on my foot and got the crutches I went down to visit
    them but then the next day I got in the car and drove to Denver, Colorado. So that was my lockout. I didn't know much
    about it.
- speaker: Interviewer
  text: And when did you retire again?
- speaker: Respondent
  text: August 1, 2002.
- speaker: Interviewer
  text: And how old were you?
- speaker: Respondent
  text: I was 68 years old.
- speaker: Interviewer
  text: Okay, why did you decide to retire at that point? Some people stay longer?
- speaker: Respondent
  text: Yeah I know, I could've too, I didn't. I don't know. I had a building I owned. I owned this apartment building in
    San Pedro and I had it on the market, and I told the wife, "If we sell this building I'm going to retire." And I sold
    it on day 25 of July and retired August the first.
- speaker: Interviewer
  text: Were you active in writing and doing poetry all the way along? When did you start that?
- speaker: Respondent
  text: I actually started writing poetry in the early nineteen-seventies. I wrote a little poem about the [Nevada County]
    Narrow Gauge Railroad that went from Colfax [California] to Nevada City [California]. 'Course it was a railroad I used
    to see when we used to drive to town we'd see the little train here and there and everywhere. And it was about the little
    towns of grass falling in Nevada City and the narrow gauge railroad and that's the first poem of any conse
