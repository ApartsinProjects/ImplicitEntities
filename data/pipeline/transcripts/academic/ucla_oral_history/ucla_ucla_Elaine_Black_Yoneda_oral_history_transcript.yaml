collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and background?
- speaker: Respondent
  text: I was born in 1906 in California. My parents were immigrants, and I grew up in a working-class neighborhood.
- speaker: Interviewer
  text: What were some of the challenges you faced growing up?
- speaker: Respondent
  text: Well, there were many challenges, especially with discrimination and economic hardships. But my family was very supportive,
    and we always stuck together.
- speaker: Interviewer
  text: How did you become involved in activism?
- speaker: Respondent
  text: I became interested in social justice issues during the Great Depression. I saw so many people suffering, and I wanted
    to do something to help.
- speaker: Interviewer
  text: What kind of activism did you participate in?
- speaker: Respondent
  text: I was involved in labor organizing and civil rights movements. We fought for better working conditions and equal rights
    for all.
- speaker: Interviewer
  text: Can you share a memorable experience from your activism?
- speaker: Respondent
  text: One time, we organized a large protest that brought together people from different communities. It was powerful to
    see everyone united for a common cause.
- speaker: Interviewer
  text: How did your activism impact your personal life?
- speaker: Respondent
  text: It was difficult at times. I faced backlash and even threats. But I believed in the cause, so I kept going.
- speaker: Interviewer
  text: What advice would you give to young activists today?
- speaker: Respondent
  text: Stay committed, educate yourself, and work together. Change takes time, but it's worth it.
