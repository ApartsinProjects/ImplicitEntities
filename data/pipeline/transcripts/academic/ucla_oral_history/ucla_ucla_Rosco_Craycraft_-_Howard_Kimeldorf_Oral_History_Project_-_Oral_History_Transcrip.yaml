collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Why don't you begin by telling me how you got onto the waterfront, the first year you were there, and why you came
    onto the waterfront, and what work was like at that time.
- speaker: Respondent
  text: I came onto the waterfront in 1929 in Portland, Oregon. That was the Depression days. It was almost impossible to
    pick up work anyplace. I had starts in different opportunities, different lines of work. Machine work and so forth. Business
    after business was going out of business. Depression was on us.
- speaker: Interviewer
  text: About how old were you in 1929?
- speaker: Respondent
  text: 24 years old.
- speaker: Respondent
  text: Married, two children to feed. We were living in Portland at that time in a small four-room house. I went down on
    the waterfront, trying to pick up a couple hours' work. In fact, I was trying to pick up work anyplace I could get a job
    in those days. Even if you only made four bits, you know. The Depression was getting worse all the time. I happened to
    run into an old friend on the waterfront by the name Ory Cole, C-O-L-E. Ory's was working in a steady gang. In those days,
    we had preference gangs. Extra work come along, you could fill in. I happened to pick up a job filling in in the Pete
    Hendrickson gang. Due to age, which was at that time, when a man began to slow down, the waterfront employers would let
    him go. It was up to the boss to maintain a high standard of production in his gangs. Attrition was heavy amongst the
    elderly people. They were always looking for younger men. There were no unions on the waterfront.
- speaker: Interviewer
  text: Could I ask you a question about that? Was there a blue book union in Portland, a so-called blue book union?
- speaker: Respondent
  text: No, there was no blue book union in Portland. But there were quite a few men who were union men, after they broke
    the union in 1921. These men were always the backbone who tried to organize. At age at that time, but as they got older,
    and couldn't hit the fast pace, they were eliminated. They were interested in an organized union. I happened to get into
    a gang where several of the old-timers in the gang. That's where I learned my basic background on what had transpired
    in the strikes previous to that. Made me more determined if ever I had an opportunity, I'd work and see if I could help
    build a union. For protection in my older years as I aged.
- speaker: Interviewer
  text: Can I ask you a question about that? Did the men ever talk about the 1922 strike?
- speaker: Respondent
  text: Oh yes. Old-timers were always talking about the '22 strike. The younger men like myself learned what did transpire
    in the previous history of the unions.
- speaker: Interviewer
  text: What did they say about the '22 strike? Can you remember the kinds of lessons they learned?
- speaker: Respondent
  text: Well, you're saying '22. If I recall correctly, it was '21 the final union, they told them, was broke. In those days,
    it was through them that we learned, the younger men. That basically the unions were not organized correctly. Each port
    had a separate contract with the waterfront employers. Then, if one port went out on strike, the other ports would be
    working. Even in the Columbia River, like the small locals, like in Rainier, Oregon or Astoria, Oregon, they'd be out
    on the strike, and the Portland local would continue working and all the other locals in the area. That always tended
    to break the strikes. It was easy to reroute it. The older workers told us, if we ever started to organize again, we should
    organize coastwise. When a strike would occur in one union, the other unions would strike. The waterfront could not play
    one union against the other.
- speaker: Interviewer
  text: How about industrial forms of organization? Was that stressed versus craft unionism? Or did they talk about that?
- speaker: Respondent
  text: Well, we always had talk of the industrial forms of organization. The old Industrial Workers of the World, IWW, was
    prominent in a lot of people's mind. But the pitfalls of the IWW was that they were very good at organizing, but they
    would not take any political action. So what they would gain on the economic front, they would lose through legislation.
    You want to recall, too, the Palmer Raids happened in the early twenties. When the Palmer Raids came in, they railroaded
    the more militant people into the jails or sent them on down the road, as the case may be. That kept labor in a turmoil
    all the time. It makes it seem ridiculous today that we see the administration is out trying to organize unions, as they
    claim, in Poland, when here in the United States they're doing all they can to break unions. We have the local example
    here in the Cuddy Packing Plant where the owners of the Cuddy Packing Plant sold out the industry to members of the Cuddy
    administration and re-opened the plant at 50% of the wages of the workers in the plant.
- speaker: Interviewer
  text: Is that right? Was that meat packers?
- speaker: Respondent
  text: Yes, the meat packers. Cuddy Packing Company. We have other organizations here in the city trying to follow the same
    line. Over in the mining belt, in Idaho, they're shutting down mines and reopening with scab labor. They're bringing in
    all these immigrants from Vietnam, so-called people who helped us win the war. It's a position the unions, that they helped
    us win the war by buying them off. What the hell are we going to do with them once they get in the United States? Somebody
    over there offers them more money to help them defeat us? And they're using them as scabs all around, every place you
    go they're using them as immigrants. All these immigrants. They're even bringing in Poles now, in theory to protect them.
    We can't understand why they can't stay home and protect their own union, same as we protected our unions. They're bringing
    them in here and using them as strike breakers here. All with the blessing of the government.
- speaker: Interviewer
  text: It's a familiar pattern throughout American history.
- speaker: Respondent
  text: It's a familiar pattern that here they want to break the unions. Then they turn around and try to tell us through
    the press and the media that they're supporting the unions in Poland.
- speaker: Interviewer
  text: Yeah. Not the first time there's been hypocrites.
- speaker: Respondent
  text: I got it. It's ridiculous.
- speaker: Interviewer
  text: Yeah, Wall Street Journal had a front page editorial, when the Polish workers organized their unions, how great it
    was that public workers had the right to strike. The following day denounced PATCO for doing the same thing.
- speaker: Respondent
  text: Yeah, yeah. It's pitiful.
- speaker: Interviewer
  text: It is. We have the lowest level of unionization of any capitalist country in the world, the United States. 20 percent
    of the workers in this country are organized. It's really remarkably low, one out of five.
- speaker: Respondent
  text: In 1931, at the height of the Depression, we started reorganizing. In Portland, we put up a considerable membership
    within the union, but we couldn't hold the membership until the Wagner Act was passed.
- speaker: Interviewer
  text: How many people were mobilized in '31, or organized? Was it an actual union, or was it sort of secretive, or?
- speaker: Respondent
  text: No, secret to this extent - if you were too proud of a man in the union, and your thoughts were well-known, the employer
    would try to eliminate those. You want to remember, the employers had full charge of the hiring. We had a man running
    our organization in Seattle, the employers' man, Jack O'Neil. What he tried to organize and get into the organization
    was ex-prize fighters and athletic type of men.
- speaker: Interviewer
  text: This was in Seattle or Portland?
- speaker: Interviewer
  text: Portland, okay.
- speaker: Respondent
  text: See, you want to remember, I'm from Portland local, and I transferred up here in the early fifties. So my history
    is the Columbia River history. When we did go out on strike in 1934, the ones that he had organized tried to break the
    union and keep the union down was our best goon squads.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: Our best supporters. I could enumerate them by name, which would not serve any purpose, but...
- speaker: Interviewer
  text: They were brought in as just kind of tough guys, right? To, uh -
- speaker: Respondent
  text: They were given the preference job, which at that time the preference job is the Admiral Line. The minimum pay in
    those days was two hours, so I guess you have all that stuff without me going into that.
- speaker: Interviewer
  text: Could I ask you few more questions about the impact of the Wobblies? You said that the older men were the ones who
    taught you these lessons. Were the older men more likely to have been the Wobblies? If there were any around?
- speaker: Respondent
  text: No, the older men, you want to remember-see, we were totally union men. The older men were not Wobblies; they were
    members of the union. A lot of the older men resented the Wobblies. They figured - see the Wobbly theory, if you want
    to know the history of the Wobblies, the Wobbly theory is one crew going and one crew coming. That was the Wobbly theory.
    Three men to every job, and they didn't believe in any political action. They didn't believe in solidifying their gains
    through politics.
- speaker: Interviewer
  text: What do you mean, "three men to every job"?
- speaker: Respondent
  text: Say that you wanted to organize a sawmill. You go into a sawmill, and you try to organize the men on the job, what
    you call the stunt jumpers, the homebodies. Our term in those days was "scissorbill." In other words, a scissorbill was
    whatever the employer'd give him. He'd accept it because he wanted to stay on the job and take care of it. But a lot of
    those men could move on account of their family. We'd try to organize the good ones. Then the one crew coming would be,
    like, say I'd go into a plant sawmill like tonight. Or I'd go in late afternoon, too late to probably work that day, and
    I'd get me a job in the mill from the foreman. He'd give me a check for to get my supper and my breakfast and bed so I
    could go to work the next morning. Then I'd go out on the job - that'd be your crew coming. You go out on the job the
    next morning. If you didn't like the job, or maybe you was relieving the Wobblies already on the job. The Wobbly on the
    job, he wouldn't like this. This was wrong; that was wrong. He wanted this kind of condition; he wanted new bedsheets
    and so on. He couldn't get those, the hell with it! He'd go. So that's what we call one crew coming, one crew working,
    one crew going. Maybe you'd belong to all three crews as I'd explained it. You might come in today; you might stay two
    or three days; then you'd go on to the next place. But, to see, there, to the scissorbills -
- speaker: Interviewer
  text: Were you a Wobbly?
- speaker: Respondent
  text: Back in those days.
- speaker: Respondent
  text: Back in the early twenties.
- speaker: Interviewer
  text: In the lumber camps?
- speaker: Respondent
  text: In the sawmills and so on. That's where I got my start.
- speaker: Interviewer
  text: What did your father do for employment?
- speaker: Respondent
  text: My father was a sawmill man all his life.
- speaker: Interviewer
  text: Was he a Wobbly?
- speaker: Respondent
  text: No, he wasn't. No, but he was a union man. I mean, he joined a union the first time the union's come into the sawmills
    and all.
- speaker: Interviewer
  text: So you were a Wobbly. That's interesting. You must have been a -
- speaker: Respondent
  text: I was a young kid.
- speaker: Interviewer
  text: Yeah, really young. I talk to some of the old Wobblies who -
- speaker: Respondent
  text: I had a lot of experience with the Wobblies. That's why I'm so politically-minded today. Because I seen our mistakes
    so bad.
- speaker: Interviewer
  text: Now, I've always read the books where they talk about how the Wobblies would not engage in political action. This
    was the cause for the later split between them and the more political radical groups. But what did it mean to a worker,
    a longshoreman on the waterfront, what was the importance of political action anyway? They could get everything they wanted
    through economic slow-downs and things like that.
- speaker: Respondent
  text: Yeah, but see, they take it away from you. They'll say the union's gotten too strong. They'll say that you gain a
    lot through accidents, like we're in the fight now with the Senate Bill 1182, where they're trying to take away the gains
    we made in the laws for accidents, for protection. See, I was hurt. Strained my back. Prior to the 1934 strike. This was
    when the waterfront employers were in charge of everything. I had my back muscles tore pretty bad, but I was off six weeks.
    I had to be off six weeks to collect my first week of pay. The first week, I don't get a dime, unless I'm off six weeks.
    If I go back to work inside of six weeks, I lose the first week. So they were in collusion with most of the doctors. I
    remember very distinctly myself
