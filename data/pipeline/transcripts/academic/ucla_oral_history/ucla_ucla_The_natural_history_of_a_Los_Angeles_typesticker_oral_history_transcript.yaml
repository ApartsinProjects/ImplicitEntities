collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Maybe we could begin by asking just a couple of very general things. Maybe you could tell us some obvious facts, like
    your birth date, and where you were born, and perhaps whether you have any brothers and sisters or not, or - just a little
    bit of official family background pertaining to yourself.
- speaker: Respondent
  text: I was born in Los Angeles in November 1907. Had a brother, but he died when I was still a little child.
- speaker: Interviewer
  text: I see. What date was it in November? Do you mind?
- speaker: Respondent
  text: Twenty-eighth.
- speaker: Interviewer
  text: Twenty-eighth of November.
- speaker: Respondent
  text: Yes. I'm a Sagittarius.
- speaker: Interviewer
  text: Nineteen...?
- speaker: Respondent
  text: . . . seven.
- speaker: Interviewer
  text: . . . seven. I see. And would you have been born at home, as many people were at that time?
- speaker: Interviewer
  text: And where did you live?
- speaker: Respondent
  text: At 1532 Rockwood Street.
- speaker: Respondent
  text: Yes, it's one block north of Beverly Boulevard and parallel to it, runs from Glendale Boulevard to Union Avenue.
- speaker: Interviewer
  text: And did you live there for very long? Was this your childhood residence?
- speaker: Respondent
  text: For eight years.
- speaker: Interviewer
  text: What kind of a house was it?
- speaker: Respondent
  text: Redwood, two-story, frame redwood house built with those square nails, hammered nails. It was built back in the 1870s,
    thereabouts.
- speaker: Interviewer
  text: And could you tell us, perhaps, as you mentioned when we talked once before, just a little about how the Cheneys happened
    to come to California?
- speaker: Respondent
  text: Oh, Lord, let's see. Well, first, my grandfather was a Methodist missionary. He came around the Horn to Austin, Nevada,
    back in '69; and then he went back to Massachusetts and was a minister for a year or two back there, married. And my father
    was born in Boston. And they came out to California again--my father was about a year old - settled in Plumas County,
    where my grandfather went into the law and became a judge, the county judge at Plumas County.
- speaker: Interviewer
  text: And then later, I think you said, he came down . . .
- speaker: Respondent
  text: He was state senator from Plumas County in Sacramento and then came to Los Angeles in '83.
- speaker: Interviewer
  text: Was there any particular event that brought him here, that you would know of?
- speaker: Respondent
  text: I don't know. Probably it looked like more opportunity down here.
- speaker: Interviewer
  text: Well, that was the time of the land boom, wasn't it, in Los Angeles?
- speaker: Respondent
  text: In the eighties, yes.
- speaker: Interviewer
  text: And then he remained here, did he, the rest of his life?
- speaker: Interviewer
  text: Let's see. And where was - I think you said where your father was born, but would you say it again, for me?
- speaker: Respondent
  text: Oh, he was born in Boston.
- speaker: Interviewer
  text: Boston. And then. . . ?
- speaker: Respondent
  text: And didn't live there more than a year or two.
- speaker: Interviewer
  text: Right, right, right. So he really grew up here in California.
- speaker: Interviewer
  text: For all practical purposes. What school did you attend as an elementary school child?
- speaker: Respondent
  text: Union Avenue School. It was at Union and Beverly, or First Street, as it was at that time. Union Avenue - went through
    the eighth grade, as we used to do in those days - and to L.A. High.
- speaker: Interviewer
  text: Now, which L.A. High was that? Was that the one. . .
- speaker: Respondent
  text: It was the Los Angeles High School. Oh, the one on Rimpau - Olympic and Rimpau, now - but it's the only L.A. High.
- speaker: Interviewer
  text: Was it in the location of the present L.A. High?
- speaker: Respondent
  text: Yes. I think that was built there about 1919 or something like that.
- speaker: Interviewer
  text: The one they've just torn down, last year, or a year or two ago. But you didn't attend - did you attend that school?
    The one. . . ?
- speaker: Respondent
  text: Yes, that one, not the one down on Fort Moore Hill.
