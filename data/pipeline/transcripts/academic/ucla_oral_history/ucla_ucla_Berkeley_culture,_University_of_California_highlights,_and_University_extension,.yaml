collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early training in German?
- speaker: Respondent
  text: Yes, I was very interested in German from a young age. I studied it extensively during my high school and college
    days.
- speaker: Interviewer
  text: What about your college days? What was your focus then?
- speaker: Respondent
  text: In college, I focused on classics, particularly Latin and Greek. Latin was considered very important at the time for
    acquiring culture.
- speaker: Interviewer
  text: Did you have any notable experiences during your graduate study abroad?
- speaker: Respondent
  text: Yes, I went to a European university for academic preparation. I worked very hard to master Latin as a live, spoken
    language, practicing up to twelve hours a day until I succeeded.
- speaker: Interviewer
  text: How did you approach teaching Latin conversationally?
- speaker: Respondent
  text: I believed in teaching Latin as a living language, encouraging students to speak it conversationally rather than just
    reading it.
- speaker: Interviewer
  text: What changes did you observe in the status of classical languages over your career?
- speaker: Respondent
  text: I witnessed the gradual decline of classical languages as modern languages gained prominence. Latin and Greek departments
    eventually merged due to this shift.
- speaker: Interviewer
  text: Can you tell me about your involvement with the Philological Association of the Pacific Coast?
- speaker: Respondent
  text: I was an instigator in founding the Philological Association of the Pacific Coast, which became an important organization
    in academic life.
- speaker: Interviewer
  text: What was your family and faculty life like in Berkeley?
- speaker: Respondent
  text: My family life was intertwined with my faculty life. I was married to Maud Wilkinson, and we had children. Social
    life was active, with many faculty dinners and gatherings.
- speaker: Interviewer
  text: Did you have any notable friendships during your time in Berkeley?
- speaker: Respondent
  text: Yes, I had a sixty-year friendship with John Dewey, among others like John Muir and William Keith.
- speaker: Interviewer
  text: What role did you play in the Berkeley Music Association?
- speaker: Respondent
  text: I provided spirit and fundraising power to bring eastern concert artists to California year after year through the
    Berkeley Music Association.
- speaker: Interviewer
  text: How did you contribute to the Berkeley Public Library?
- speaker: Respondent
  text: I helped transform the tiny storefront public library into a grand structure financed by Carnegie funds, designed
    by John Galen Howard.
- speaker: Interviewer
  text: What was your role during World War I?
- speaker: Respondent
  text: I handled the complex liaison agency between Washington, D.C. and the University of California military bureau during
    World War I.
- speaker: Interviewer
  text: Can you describe your involvement with University Extension?
- speaker: Respondent
  text: I created and ran University of California Extension for over fifteen years, developing curricula that served a wide
    range of people including housewives, businessmen, immigrants, laborers, the unemployed, and prisoners.
- speaker: Interviewer
  text: What was your philosophy regarding lifelong learning?
- speaker: Respondent
  text: I wanted to create a people whose taste for learning was habit-forming, making education accessible and continuous
    throughout life.
- speaker: Interviewer
  text: How did you maintain your personal well-being throughout your life?
- speaker: Respondent
  text: I kept a diary every day since I was seventeen, gave myself Swedish massages three times daily since graduate school,
    and took an hour-long walk each day for over sixty years to relax both intellect and body.
- speaker: Interviewer
  text: What was your daily routine like?
- speaker: Respondent
  text: My day-to-day life was well planned. I was purposeful and disciplined, always aiming to be 'an arrow, not driftwood.'
- speaker: Interviewer
  text: Can you describe your living environment in San Francisco?
- speaker: Respondent
  text: I lived in a tall white apartment building with a superb view of the Golden Gate. My study was cluttered with maps,
    travel posters, books, diaries, and a grandfather clock.
- speaker: Interviewer
  text: How did you feel about your physical condition in your later years?
- speaker: Respondent
  text: Even in my nineties, I had the relaxed gait of a young man and a lively sparkle in my eyes. I continued to win golf
    tournaments until transportation difficulties arose.
- speaker: Interviewer
  text: Did your interviews often take unexpected turns?
- speaker: Respondent
  text: Yes, sometimes I would recall stories spontaneously, like my friendship with John Dewey, which would change the direction
    of the session.
