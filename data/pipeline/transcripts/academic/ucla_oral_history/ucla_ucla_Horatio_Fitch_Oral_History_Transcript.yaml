collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: This was in '51 when we fixed the - built the cabin. It was just a two-acre plot here and his sons had a sawmill.
    Now, these are actually logs here. And I came out at Easter time of '51. My wife talked me into what we did. We had a
    big house back in Champaign. She said, "This is too expensive for us." And it probably was. So, she said, "Let's build
    a small house and then get a cabin in Estes Park." And she talked me into it. We had two kids. At that time they were
    eight or ten years old, something like that. She said that the kids ought to get out of Illinois. See, I was teaching
    at the University of Illinois, and they ought to get out in the summer time. The truth was she was from Pueblo originally.
    She didn't want to go back to Pueblo, but she wanted to go to Colorado. So, she talked me into it, and we built this house.
- speaker: Respondent
  text: We had several real estate people. I had several real estate people come up from Estes Park, but frankly I don't like
    Estes Park. I never have. It's too touristy. So, somebody told me that Sig Warier - have you heard of him? Sig Warier
    had just laid out this place here. It had roads and two-acre lots before the state said you had to have certain-sized
    lots. He laid it out in two acres, which as far as I was concerned was fine because in summer on a dark night I could
    see the lights of the next cabin if they were there. However, they're not there hardly at all; so, I'm just about a loner,
    so to speak, here. Well, I came out, and somebody referred me to Sig Warier. I'll tell you who it was - old man Ramey,
    whom you probably recall.
- speaker: Respondent
  text: I don't know that I met his son at that time. Is his son still selling real estate?
- speaker: Interviewer
  text: I think so.
- speaker: Respondent
  text: I think maybe he is. Maybe he died a few years ago. A peculiar thing is when my wife died in '72, they showed me an
    empty site. I don't like cremation, although I think it's fine for those who do. My wife wanted to be donated to a hospital
    or medical school, but I didn't like the idea of medical students saying, "Oh, she..." and so I decided to go ahead and
    buy a lot in a cemetery in Longmont. Say, I understand Estes Park is trying to get a cemetery.
- speaker: Interviewer
  text: They've been talking about it, different ones.
- speaker: Respondent
  text: Well, actually, I don't know if - oh, it would be used all right, but it doesn't make sense to have to go to Longmont
    all the time. Well, she died in the Longmont Hospital. The first thing they asked me is, "Whom do you want to be your
    undertaker?" I didn't know from nothing, and I thought about it afterward that when I mentioned one, I detailed an undertaker
    to go ahead. They inject something into the body so that medical school can't use it any longer. At least that was so
    fourteen years ago - twelve years ago.
- speaker: Respondent
  text: Anyway, we went down there, and when I went out to the lot, the lot we bought is right next to John Ramey's lot. The
    man who projected this sale here is buried right next - where I'm buried now - because my name's down there! It's true,
    but there's a blank space for the date.
- speaker: Interviewer
  text: You're going to be linked to him forever! Up here and down there, too!
- speaker: Respondent
  text: Well, anyway, the point was that Sig Warier said that he could arrange to build a house here if I'd draw the plans,
    and he'd have it ready for us to move in the Fourth of July. Wow, that was Easter time.
- speaker: Respondent
  text: The house that we built was just this part. That was the outside wall there. And so, we came out the Fourth of July.
    We found there was just a concrete foundation in a hurry, and we spent all summer - our boy was eight or nine years old,
    and our girl could help. And we got the thing, so we moved in Labor Day - about the time that we had to go back. We moved
    in, and there was absolutely nothing except the log walls. Of course, the logs shrank the first year; and so, the next
    year we had to caulk all around. So, everything you see in here except those eaves up there, I did myself.
- speaker: Interviewer
  text: You did a great job on it.
- speaker: Respondent
  text: Well, I think it looks pretty nice. Of course, as I told the people back home, "I built a log cabin out there, and
    every year since then I've been building it again."
- speaker: Interviewer
  text: Did you have the attic finished, too, when you built it?
- speaker: Respondent
  text: No. Actually, the original cabin went straight up to the ridge pole. See, we had no heating. That fireplace was the
    only heating we had except for an electric heater that my wife would put in the bathroom when she wanted to take a bath.
- speaker: Respondent
  text: That was all. Some people put in a cooking stove, which is a wood stove. But my wife thought it was much easier to
    put an electric stove in there, which she did. Everything was electric in here because we never tried to consider natural
    gas here. I put in an electric hot water heater from Sears Roebuck.
- speaker: Respondent
  text: We did have a second floor. At that time we put in a partition from the ridge pole down because I wanted one room
    for the girl and the other room for the boy, which seemed to be the easiest thing, except if you're tall enough. The kids
    were short enough; but if you were tall enough, you touched the ceiling all the time.
- speaker: Interviewer
  text: Even up at the ridge pole?
- speaker: Respondent
  text: Oh, no, not at the ridge pole.
- speaker: Interviewer
  text: But most of the room.
- speaker: Respondent
  text: The bed was under the eaves, and she had a heck of a time trying to make a bed.
- speaker: Interviewer
  text: Guaranteed a headache!
- speaker: Interviewer
  text: When did you add on the rest of the house?
- speaker: Respondent
  text: Maybe I told you this one time. I was due to retire in '69. The University retires you. You sign the last contract
    when you're sixty-eight; and when you're sixty-nine, unless you're a special person, which I wasn't, you are out. You
    were just automatically retired. So, about 1967 we decided to - my wife decided that we'd better retire anywhere in the
    country, as long as it was Colorado.
- speaker: Respondent
  text: I thought it would be very nice to retire right back there where I'd already spent forty years of my life, and she
    thought it would be nice to retire in Colorado. Of course, you understand who won!
- speaker: Interviewer
  text: And you're still here.
- speaker: Respondent
  text: Actually, after I did retire here, I was glad I did. Sometimes at that time, I didn't say so. I thought it was a foolish
    idea because I had an idea that the snow would be about that deep up here. How would we get around? It would be terrible.
    But in '67 we first decided that the thing to do would be to buy a house in Longmont and use this for summer instead of
    a permanent place, not try to winterize it at all. So, I bought a house on Gay Street. At least, I put the down payment
    down. And then, I'm glad that the thing fell through because I don't think I'd like to live on Gay Street.
- speaker: Interviewer
  text: The name has changed in meaning.
- speaker: Respondent
  text: At that time it didn't mean anything except there was a book - have you heard of Robert Horner's On Gay Street?
- speaker: Respondent
  text: It was a book in the 1920's or something. I don't know. My sister had it. Anyway, the real estate dealer called me
    up and said, "I've got to return your down payment. I thought you were going to pay the whole thing." But at that time
    IBM was getting more people, and he said a fellow from IBM came in, and he had spot cash for the whole thing. So, that
    fell through. Dorothy and I talked it over, and we said, "Well, probably it wouldn't cost any more to winterize this place
    than it would to buy a house down there. We'll see if we can live here."
- speaker: Respondent
  text: See, there was no furnace here and no place for a furnace and no water. Sig Warier has had a very good spring up -
    about a half mile up the road, here by the west side of the road. The pipe is still there, but that's all there is. He
    served all these cabins around here; and then, people began to dig their own wells because the pipe was on top the surface
    of the ground, and it would freeze.
- speaker: Interviewer
  text: Yeah, it would freeze.
- speaker: Respondent
  text: And it would freeze up Labor Day. We automatically shut the thing off Labor Day, and we automatically opened it Memorial
    Day. If you were here any time in the winter or in the fall, you just couldn't have any water.
- speaker: Interviewer
  text: You could melt snow.
- speaker: Respondent
  text: Yes, that's true! So, more and more people began putting in wells. Finally, I think, we and one or two others - he
    had about twenty lots around here that he was serving, but there were only maybe three of us who thought that we would
    not bother next year. If there was no show of water, get a well. So, we didn't have any trouble with the little well about
    sixty-five feet down. I had water. He said, "I don't think you'd be satisfied with that. It may not go completely dry,"
    but he talked me into ten more feet, which I'm glad I did. And we have never had the slightest bit of trouble with our
    water. It comes in - see, in the new part. We put a basement in where we could put a furnace, and there's nothing in the
    basement except junk, the water pump, and the furnace.
- speaker: Respondent
  text: When we came back from Illinois and when I came back from Bloomington, we had a heavy wind coming up. I said, "I hope
    it doesn't blow that pilot light out!"
- speaker: Respondent
  text: Got there, and sure enough it had! It was still warm. The house - see where the thermostat sets in the...? Well, when
    we got here it was 45, so apparently it had not been blown off very long. I was very glad that Bonnie could do the job.
    I had done it before. That's not the first time the pilot's blown out, but I have trouble seeing down in there. So, I
    was glad she was here. That's the story of the house.
- speaker: Interviewer
  text: It feels very, very comfortable here.
- speaker: Respondent
  text: Yes, I think I asked her to set it on 70 or something like that.
- speaker: Interviewer
  text: Well, why don't you show Mel the rest of the house?
- speaker: Respondent
  text: I was going to say, "Let's go around this museum!"
- speaker: Respondent
  text: Right behind you, do you know what that is?
- speaker: Interviewer
  text: Is that Meeker?
- speaker: Respondent
  text: That is Meeker done by my sister-in-law, who incidentally also was my brother's wife. My older brother married my
    wife's older sister long before we were married, and she fancied herself as an artist. As far as I'm concerned, you're
    supposed to sign pictures, but...
- speaker: Interviewer
  text: Elisabeth S. Fitch, 19 -
- speaker: Respondent
  text: Elizabeth Stanke Fitch.
- speaker: Interviewer
  text: Is that 1961?
- speaker: Respondent
  text: I would guess it is. She came, and she stayed here. I guess they stayed here a while. She tried to paint Meekers from
    here, but there were too many trees in the way. So, she went up to Meeker Park and set up her easel. She had kids here
    and kids there watching her, but everything worked out nicely.
- speaker: Interviewer
  text: That's great!
- speaker: Respondent
  text: In other words that's Meeker Park taken from Meeker Park Lodge.
- speaker: Interviewer
  text: U-huh. That's pretty.
- speaker: Respondent
  text: I like it very much.
- speaker: Respondent
  text: The next one - can you identify that thing there?
- speaker: Interviewer
  text: Yes. That's really nice.
- speaker: Respondent
  text: The University of Illinois was cleaning out their library of all old battered books, and they had a cart outside where
    the trashman would pick up the things. I picked up this book, and this envelope was in the back cover of the book. The
    book was How to get to the Gold Fields of California. And the date was something around 1815. I threw the book away. I
    wish I hadn't. Even though it was in bad shape, it was interesting.
- speaker: Interviewer
  text: They have a lot of California identified over here. There are certain - not a lot - areas I recognize. I have my specs
    up in Estes. I'll squint at it here.
- speaker: Interviewer
  text: That's really a beautiful map.
- speaker: Respondent
  text: Did you find West Virginia?
- speaker: Interviewer
  text: There was none at that time, was there?
- speaker: Respondent
  text: You're certainly right. Of course, West Virginia came in during the Civil War, which was ten years later.
- speaker: Interviewer
  text: So, this was 1850's, this map.
- speaker: Respondent
  text: Either 1850 or 1851.
- speaker: Interviewer
  text: A lot of Pennsylvania used to be Virginia, too, didn't it?
- speaker: Respondent
  text: Well, it's not after the Mason-Dixon line.
- speaker: Respondent
  text: That's the one they fought over when the states were first formed, but after they had the Mason-Dixon line, I guess
    they agreed on it. The thing that is directly below - that is one of the things that I -
- speaker: Interviewer
  text: U-huh, you mean that stock certificate?
- speaker: Interviewer
  text: Where was Silver City? Is that the one that is in Nevada?
- speaker: Respondent
  text: No, that's Arkansas.
- speaker: Interviewer
  text: Oh, Arkansas!
- speaker: Respondent
  text: I don't know whether they ever had much gold there, but they had coal.
- speaker: Interviewer
  text: This was your father's?
- speaker: Interviewer
  text: Walter Fitch.
- speaker: Respondent
  text: Walter Fitch was my father, and as near as I could figure out he used to take various and sundry things because people
    didn't have money to pay all the time. I know one time he had a colored man. He bought a high-wheeled automobile, which
    was sold by Sears Roebuck, for our use when my brother was fifteen and I was thirteen; and this colored man worked out
    his doctor bill, probably for delivering a baby, fixing up that thing so it would run. I've got some pictures of it. I
    think he got this thing as a trade for his services, and apparently it's an old...
- speaker: Respondent
  text: I took the stock certificate to Boettcher and Company a couple of years ago, and they said they've got the same thing
    in their offices down there. They said, "You might try going to the State of Arkansas." But they thought probably it was
    no good. My wife was always acquisitive, and she saw that among the family treasures somewhere. She said, "Who belongs
    to that?" I said, "I don't know. Nobody seems to have claimed it." She said, "Let's take it!"
- speaker: Respondent
  text: And she did!
- speaker: Interviewer
  text: Well, the certificates themselves are worth something to collectors.
- speaker: Respondent
  text: Well, that's what I had in mind.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: I put a frame on it last year, and I hung it this morning.
- speaker: Interviewer
  text: That's really - I like those.
- speaker: Respondent
  text: It isn't a thing... It was an original.
- speaker: Interviewer
  text: Oh, no! Yeah, the Silver City Mining Company.
- speaker: Interviewer
  text: As far as the actual cash value of this thing, wouldn't it be the same as it would be for a collector's item?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: This rug is interesting, too.
- speaker: Respondent
  text: That's another one of my... That old rug - my wife's father - it must have been about 1890. My folks were married
    in 1892, and I think her folks were married a few years later. When her father was a young man working in Pueblo, he worked
    for the CF. He worked in the stores that the coal companies have around here and there. He took a vacation down to either
    New Mexico or Arizona, or maybe both. I don't know how he got that thing, but he came home with a big rug....
- speaker: Respondent
  text: Doubled over that much. I had to double it to keep it in there then. The darned fools had it in their dining-room,
    under the dining-room table. They had mother and father, four kids, and a couple of grandparents, I suppose, tramping
    on that. Fortunately or unfortunately, it has a couple o
