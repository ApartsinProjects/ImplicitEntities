source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early experiences?
- speaker: Respondent
  text: I grew up near Santa Barbara, California, and have always been close to the sea. As a child, I lived for a year in
    Tahiti while my father wrote a novel. During World War II, I was stationed on Peleliu Island in the Carolines and later
    on Saipan.
- speaker: Interviewer
  text: What were your interests as a youngster?
- speaker: Respondent
  text: I drew extensively as a grade-school youngster, often constructing battle scenes from my imagination. I was fascinated
    by medieval chivalry and made my own weapons and costumes. I was also intrigued by mechanical devices and was active in
    Soap Box Derby competition, eventually winning a Los Angeles championship which allowed me to enter the national contest
    in Akron, Ohio. I have also built several houses on Mountain Drive in Santa Barbara.
- speaker: Interviewer
  text: What was your educational path?
- speaker: Respondent
  text: After attending public schools, I enrolled in the Marin School for Boys, a preparatory school founded by a relative.
    I graduated at sixteen, then enrolled in the University of Southern California for a summer before entering Stanford.
    I intended to become a scientist or engineer and was interested in the design of airplanes and spacecraft. My education
    was interrupted by a stint in the coast artillery. Afterwards, returning to Stanford, I decided to follow my natural predilections
    and become an artist. I majored in art and graduated in June 1949.
- speaker: Interviewer
  text: Who were some of your influences during your studies?
- speaker: Respondent
  text: Stanford offered many courses in the arts, including sculpture on an independent-study basis. I was particularly excited
    by Frederic Spiegelberg, a specialist in Asian philosophies and religions, for whom I illustrated a book. Through a relative,
    I met artist Jean Varda, who became my mentor. I was also inspired by the vital art scene of San Francisco in the late
    1940s.
- speaker: Interviewer
  text: What did you do after graduating from Stanford?
- speaker: Respondent
  text: I lived in Europe for one year. With Paris as my base, I explored the great museums and monuments of France, Italy,
    Ireland, and England, and met and visited several prominent artists, including Jean Helion, Constantin Brancusi, Alberto
    Giacometti, Augustus John, and Henry Moore. Through Peggy Guggenheim, I saw my first Jackson Pollock. Throughout this
    trip, I made numerous drawings.
- speaker: Interviewer
  text: What did you do upon returning to Santa Barbara?
- speaker: Respondent
  text: I took several courses in studio art at the University of California there, including ceramics, welding, and metal
    casting. I also participated in a drama group in Ojai organized by Iris Tree, designing props, sets, costumes, and lighting
    effects.
- speaker: Interviewer
  text: What was your initial employment after your studies?
- speaker: Respondent
  text: I worked as a draftsman, an occupation I enjoyed but which did not leave me sufficient time for my art. I continued
    to make sculpture at home but found the pace too hectic and decided that teaching would allow me the freedom to pursue
    my own interests. I then concentrated on building a body of work and a reputation; I had a one-man show at the Santa Barbara
    Art Museum, won a prize at the Los Angeles County Museum, and gained representation by the Paul Kantor Gallery.
- speaker: Interviewer
  text: How did you come to teach at UCLA?
- speaker: Respondent
  text: I was offered two teaching positions in 1957; I accepted an offer at UCLA because I considered myself a California
    artist, refusing a position at a new campus of the State University of New York.
- speaker: Interviewer
  text: Can you describe your role at UCLA?
- speaker: Respondent
  text: I have been a member of the UCLA Department of Art for twenty years, presently as full professor. I am head of sculpture,
    an area that I helped develop. I am particularly proud of the sculpture facilities and equipment I designed and obtained
    for the Dickson Art Center, which opened in 1964. I am also proud of my numerous students who have achieved widespread
    recognition.
- speaker: Interviewer
  text: Who are some of your notable students?
- speaker: Respondent
  text: Artists such as Loren Madsen, Tony Berlant, Lloyd Hamrol, and Judy Chicago have experimented in many media and eventually
    found their own forms of expression, inside and outside of sculpture.
- speaker: Interviewer
  text: Can you tell me about the 'Electric Art' exhibition you organized?
- speaker: Respondent
  text: I organized 'Electric Art' for the UCLA Art Galleries. After visits throughout the country, I selected forty artists—such
    as Stephen Antonakos, Takis, and Chryssa—who were investigating the use of advanced technological means to produce art.
    The exhibition was a huge success, particularly in stimulating visits by students and faculty from throughout the campus.
    The art and technology movement has been of continuing interest to a number of artists since that time.
- speaker: Interviewer
  text: What materials and media have you worked with as a sculptor?
- speaker: Respondent
  text: I have worked in a variety of media. I began by carving wood and later moved to concrete and wire. In my bronze and
    steel sculptures, I have been particularly influenced by David Smith and Isamu Noguchi. Though my forms are largely abstract,
    they are based on the human figure and often have symbolic titles.
- speaker: Interviewer
  text: When did you begin working with water in your sculptures?
- speaker: Respondent
  text: About 1965, I began working with water. Subsequently, I have built and designed many fountains, called water 'blades'
    and 'wands,' for individuals and public places. Major commissions include Fountain Square in Cincinnati, a public square
    in Racine, Wisconsin, and the Los Angeles Times plant in Costa Mesa, California. The largest number of my fountains, forming
    the most complex statement, are found in the El Paseo de Saratoga shopping center near San Jose, California.
- speaker: Interviewer
  text: What is your perspective on water as a sculptural element?
- speaker: Respondent
  text: Water has a dual quality, which is both soothing and awakening. Ultimately, I am concerned with creating and controlling
    a complete environment, as I did in a shrine to Saint Francis of Assisi in Cincinnati.
- speaker: Interviewer
  text: Can you explain your work with 'Sky Fountains' and events?
- speaker: Respondent
  text: Because a work's effect on its viewers is highly important to me, I have moved into an area called 'Sky Fountains,'
    which are events staged in public. By flying Mylar structures or unfurling curtains, I establish a relationship with collaborators
    and spectators. These are usually one-day activities, which leave no trace on the environment but are fully documented.
    I have been a regular contributor to the New York Avant-Garde Art Festival.
- speaker: Interviewer
  text: How do you view the Los Angeles art community?
- speaker: Respondent
  text: I remain devoted to Southern California. I find Los Angeles an internationally important art center, in terms of its
    influential lifestyles, technological discoveries, and number of gifted individuals.
- speaker: Interviewer
  text: What are some of your personal interests outside of art?
- speaker: Respondent
  text: I continue to skin dive; I am a staunch defender of marine life. I reside near the sea in Santa Monica with my wife,
    who directs an underwater photography agency.
