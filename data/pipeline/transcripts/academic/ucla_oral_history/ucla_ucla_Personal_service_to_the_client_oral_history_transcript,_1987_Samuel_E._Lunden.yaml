turns:
- speaker: Interviewer
  text: Mr. Lunden, where and when were you born?
- speaker: Respondent
  text: I was born in [the neighborhood of] Austin in Chicago, Illinois, on July 14, 1897.
- speaker: Interviewer
  text: Tell me something about your parents.
- speaker: Respondent
  text: 'I am a first-generation American. My parents were born in Sweden in the Uppsala area, about forty miles north of
    Stockholm. My father''s name was Albert Axel Lunden, born on July 5, 1860, and died in 1931 at the age of seventy-one
    in Pasadena, California. My mother was Christina Eugenia Erickson, born on November 5, 1861, and died in 1942 at the age
    of eighty-one in Pasadena, California. Both were born in the Uppsala area but in different suburbs. My father came to
    the United States in 1890. The Swedish spelling of the name was L-U-N-D-I-N. Dad changed it when he came to America because
    he found that the e sounded like i and the i sounded like e. My mother came to the United States in 1893, and her maiden
    name, Erickson, was spelled in Sweden E-R-I-K-S-S-O-N. They were married in Elgin, Illinois, in 1893. My grandfather,
    Eric Lundin, was born in 1812. He was a tailor. My great-grandfather was also a tailor. They were in the Uppsala region.
    My grandfather on my mother''s side was Jan Eric Eriksson, a farmer, born in 1825, also in the Uppsala region. It would
    seem that going back at least six generations, they were all farmers. In Sweden the government owned most of the land
    and leased it to the farmers. It was about 1915 when my cousin Carl John Erickson called me from Chicago and asked if
    we should renew the family lease on the old farm in Sweden. We agreed not to. It was in the following way that the farmers
    worked: Some of the six generations owned the farm itself but not the land, and others simply worked on the farm. Some
    of them until they could afford to have a farm of their own. The Lunden family included the oldest, my brother Albert
    Carl; then myself, Samuel Eugene; my brother Edgar Daniel; my sister Signe Marie; and my brother Clarence David, the youngest.'
- speaker: Interviewer
  text: What did your father do for a living in Illinois?
- speaker: Respondent
  text: 'My father had been in the army in Sweden for two years, as generally required, and at the termination of his service
    he studied cabinetwork, probably night school, and was a very able cabinetmaker according to his certificates of approbation.
    When he came to this country he started as a carpenter and later became a contractor-builder. My oldest memory was this:
