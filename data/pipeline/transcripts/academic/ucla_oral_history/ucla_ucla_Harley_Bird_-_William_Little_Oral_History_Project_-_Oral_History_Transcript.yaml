source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: 'Well, my involvement, as well as Tyree''s, evolved out of our involvement with the Central Contractors Association
    in 1969, the early part of 1969. I met Tyree through a friend of mine. I was working at Boeing at the time. I had begun
    to feel the ineptness of what I was doing at Boeing, and in my life and lifestyle, et cetera. I started going to community
    meetings and getting involved in community affairs and that sort of thing. Subsequently, I attended a large number or
    quite a few community meetings, a lot of which were Central Contractors Association meetings. At that time, the primary
    issue was minority involvement in the construction industry and the trades. As a result of going to those meetings and
    meeting Tyree and getting involved in the organization, I left Boeing and went to work for the Central Contractors Association
    as a business manager. Tyree at the time was Chairman of the Board or Director or something. He had played the primary
    role in organizing the Central Contractors Association. We had the age-old problem, then again, as the progress, or lack
    of progress you might say, of minority contractors in dealing with the problems that they perceived that they had were
    not in the best interest of the minority worker. We still go back to the old question of management and labor situations:
    the problems that minority contractors had bonding, getting jobs and contracts, getting involved in learning the technical
    aspects of capitalism, period. We weren''t into that at that time. The central issue at the time at that time, as we perceived
    it, and the problem being employment for minorities in the community, youth as well as older Blacks. The unemployment
    rate was tremendous, approximately 45 to 50% at the time. A large percentage of young Black males at the age of 27, 28
    had never had a job of any kind. Anyway, to kind of sum that up: because of those differences of ideology, at that juncture,
    and I guess because also of the time, 1969, and the newness and the attention that the whole issue brought upon the Central
    Contractors Association, and the personalities involved, and the lack of sophistication by some of the minority contractors,
    I think had a great deal to do with both my leaving and Tyree Scott''s leaving the Central Contractors Association. We
    can go into more detail, expound on those points. After that time, there was a considerable amount of effort and energy
    expended by a lot of people, not just Tyree or myself, or Michael Ross, but a lot of people that really believed in what
    we were trying to do, and that was to improve employment opportunities for Blacks in a very high paying trade, the construction
    industry. We saw a need to develop an organization around facilitating that effort, continuing that effort that was started
    under the guise of the organizational banners of the Central Contractors Association. In September of ''70, we started
    - Actually, it was in the Summer of ''70, this was after or during the time of the successful litigation was brought against
    four of the building trades. A number of people were named in that court order, Black journeymen who were not members
    of the labor unions. Those people were contacted, and organizational effort was put forth to organize those people into
    a group of people, into an organization that could facilitate their needs and desires essentially. The organization became
    the United Construction Workers Association. The primary interest and the motive was simply not jobs for jobs sake, but
    an educational process at the same time, you know, to educate and try to instill other kinds of meanings into the organization
    rather than a job for jobs sake. We weren''t interested in becoming a service-oriented organization. At the time there
    were lots of them. Seattle Model Cities Program was in full swing, there were concentrated employment programs set up,
    et cetera, that provided those kind of social-oriented services, to get a person a job, to get a person''s transportation
    to a job, get a person''s tools for the job, essentially do everything for the person which would facilitate his employment.
    We were interested. We knew that we had to do those kinds of things, but at the same time, the objective was to educate
    those workers as to why they were in the condition they were in, and to teach them something about the system and how
    it worked, and why it was what it was, and to try to start a basis of some kind of more permanent kinds of changes, more
    permanent kinds of attitude changes that we could deal with the problem in its entirety as we perceived it at the time.
    At the same time, we went through a growth process. We learned a great deal about the kinds of things we could do and
    couldn''t do with respect to organization of the community. One of the main lessons I think, now that I look back over
    it, is that those essential services, as an organization tool, has to be provided. In other words, you can talk about
    the philosophy of the system of capitalism, the whys, the wherefores, et cetera, but if a guy is hungry, doesn''t have
    a job, he''s got a family to feed and a light bill to pay and shoes to buy for his kids, it falls on deaf ears. So it
    was necessary to provide jobs and employment opportunities and to continue to keep those people working. Also, to change
    some attitudes in the white community, attitudes that were prevalent not only in Seattle but across the country. There
    were many, many Title VII cases brought against companies and industries and the relief was never effectuated. The cases
    were won. A year after the cases were won nobody went to work, there was no enforcement mechanism by which court orders
    were enforced. Therefore, making the whole ordeal of going through a lengthy trial process, making it nothing, the end
    results being worth nothing. So, we saw that the organization was based around 8618, a lawsuit brought by justice. The
    interest that the organization had in the community was around jobs, and around those kinds of services that the organization
    could provide. At the same time, we didn''t perpetuate the kind of poverty crapping attitude that was existing in other
    poverty programs. You know, white shirt and tie, executive director, the whole concept of a designed poverty program.
    People that were employed at the United Construction Workers were people that worked at one time or another in the trades.
    They were guys that you might say, come up through the ranks. Guys that felt the need to bring about some change, and
    people really understood what it meant to be unemployed and Black in the community. The selection criteria was not based
    upon one''s degree, or lack of degree, from a college or university, or a high school, as far as that goes, but his ability
    to be able to communicate and deal effectively with the concerns and interests of the workers that he was representing.
    That''s the thing that I like most about the United Construction Workers. The glamour aspects of job closures and demonstrations,
    et cetera, press conferences and the like, was really basically an organizational tool. We used to have a saying that
    jobs and discrimination was just a means by which to organize. Nobody''s sole objective in life should be to get a job.
    If we could all live at a decent standard of living without working, of course that would be ideal, but that''s not possible.
    Employment discrimination in jobs were a means by which we could organize the people in the community. We did other things
    other than work around simply the job issue. We tried to deal with other kinds of issues that affected the community,
    other kinds of issues that affected workers from an organizational standpoint. So ask me some questions about - Because
    I might go off -'
- speaker: Interviewer
  text: You doing fine. Weren't you there when they initially started to - No. I don't think that's an appropriate question.
    Let me go back further. Do you know anything about the types of intercommunity that evolved during that period of time,
    early '69, when you first started to shut down jobs, the airport, the county building, these other places, how the other
    elements of the community reacted. Let me be a little more specific in that. Let's talk primarily about Keve Bray and
    the Black House group.
- speaker: Respondent
  text: Ok. In the sixties, the Black community was entrenched in the whole poverty crapping institution, the whole Model
    Cities concepts, social oriented kinds of programs that were going to come into the Black community and deal effectively
    with all the problems of the Black community within the Black community. Essentially, no external pressures were being
    placed on the white community that perpetuated the kinds of problems we had. So we had a situation where, all of a sudden,
    from nowhere, we had money dumped into the community. A lot of attention was directed toward the Black community. At the
    same time, there were a lot of people in the community that were intellectually capable of taking advantage of the situation
    and perpetuating their own self interest and their own philosophy. I'm not saying right or wrong, but at the expense of,
    I'd say, the community at large, it was, as I perceived it, as almost being a situation where certain people felt that
    they were who they were and therefore were entitled to a monarchy type of role in the community dealing with all kinds
    of issues.
- speaker: Interviewer
  text: What type of term did you say?
- speaker: Respondent
  text: Monarch. Royalty.
- speaker: Interviewer
  text: Ok. I understand.
- speaker: Respondent
  text: And it wasn't just Keve Bray and that group, or a few minority contractors, it was also the Black clergy, for example,
    who traditionally have been looked upon by the white community as the leaders of the Black community. For what reasons?
    No matter what the issue was, they were the people that the white community came and got their opinions as to what to
    do or what not to do, et cetera. They were always thrown in the leadership kind of role. The same kind of thing existed
    in our situation with the Black clergy until the lines were established as to what areas they were to be involved in and
    what areas we were to be involved in. The situation with Keve Bray and that whole philosophy that they had, that organization,
    I think was really based on that Keith was an intelligent individual in many respects. In a lot of respects he wasn't.
    I think he had a few mental problems, as did some of his captains and his lieutenants. At any rate, they felt that anything
    that dealt with the Black community and the decision making process, especially the things attributed to press coverage,
    the various superficial kind of visual - How do you say it - Credible or whatever you want to call it. They were the ones
    who were deserving of that and no one else, period, and that they knew what was best, whether it was for Black construction
    workers, or cab drivers, or restaurant owners, or whoever. At the time, they had a newspaper, and every week they would
    come down very hard on some Black in the community as they perceived to be the problem. Then, they even tag them with
    names such as Mac the Knife with respect to Reverend McKinney. I think it was an exercise of mental masturbation within
    the community itself perpetuating on the blood of other Blacks and the problem itself rather than addressing the real
    problem at the heart. We had the same situation develop, and one of the major reasons why it was real apparent that the
    separation had to be made between the efforts of organizing minority workers and minority contractors because the interests
    of both couldn't be served. The Central Contractors Association had been attempting to get a Model Cities grant. There
    was money set aside in the Model Cities Program for the development of minority contractors and minority business enterprise
    programs. But Walter Hundley, coming from the streets more or less, had a very good feel for what went on, and he knew
    the characters involved in almost every aspect, because he did come up, and the personalities, and basically what their
    intent was, and where their interests lie. So he was very cautious in giving up money to the Central Contractors Association
    as it was constituted without certain kinds of safeguards to make sure that certain individuals wouldn't take advantage
    of it. They would reap all the benefits where the majority of the minority contractors wouldn't get anything. One aspect
    of the program was that we signed the contract with Model Cities. On a Sunday afternoon we had a meeting with Walt Hundley
    in Model Cities' Office. Walt Hundley instructed everybody, the Board of Directors of the Central Contractors Association,
    myself, and Tyree, that if there was any change in the leadership of the organization that he would suspend the contract.
    At the time, it was a revolving fund of about $100,000 for loans to contractors as well as administrative money to hire
