collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your first experiences joining the University Club?
- speaker: Respondent
  text: I joined the University Club in the early days when it was still a small, close-knit group. The members were mostly
    graduates from Eastern universities, and it was a place where we could find camaraderie and intellectual fellowship away
    from home.
- speaker: Interviewer
  text: What was the atmosphere like in the club during those early years?
- speaker: Respondent
  text: The atmosphere was quite formal but friendly. We had a strong sense of tradition and exclusivity. The club was a refuge
    for men who had left their families and roots behind in the East, so it was important for us to have a place where we
    felt at home.
- speaker: Interviewer
  text: How did the club handle the challenges of the 1906 earthquake and the subsequent years?
- speaker: Respondent
  text: The earthquake was a devastating event for the club, as it destroyed many of our early records and the clubhouse itself.
    But the members showed great devotion and generosity, which helped the club survive through those tough times, including
    the wars and the depression.
- speaker: Interviewer
  text: Can you describe some of the social activities and traditions that were part of the club?
- speaker: Respondent
  text: We had a variety of social activities, including parties, dinners, and games like dominoes and squash. The club also
    had a literature and arts committee, and we displayed artworks in the gallery. These activities fostered a strong sense
    of community among members.
- speaker: Interviewer
  text: What was the club's stance on admitting women as members?
- speaker: Respondent
  text: For many years, the club was an all-men's institution, admitting women only as guests starting in 1942. It wasn't
    until 1988 that the club amended its bylaws to include women as members, following legal and social pressures to end discrimination.
- speaker: Interviewer
  text: How did the club respond to the legal challenges regarding discrimination and membership policies?
- speaker: Respondent
  text: The club initially upheld its traditional all-men status but took steps to comply with antidiscrimination ordinances
    by ending acceptance of payments from outside sources. After the Supreme Court upheld similar ordinances, the club reconsidered
    and eventually amended its bylaws to admit women.
- speaker: Interviewer
  text: What role did the club play in the professional and social lives of its members?
- speaker: Respondent
  text: The club was a hub for business connections and social networking. It provided a space where members could relax,
    share ideas, and build relationships that often extended into their professional lives.
- speaker: Interviewer
  text: Can you share any memorable anecdotes or stories from your time at the club?
- speaker: Respondent
  text: There are many stories, but one that stands out is the 830 Powell Street caper, a humorous incident involving some
    members that highlighted the camaraderie and playful spirit within the club. These moments helped strengthen our bonds.
- speaker: Interviewer
  text: How has the club evolved over the years in terms of membership and activities?
- speaker: Respondent
  text: The club has grown and adapted to changing times. Membership has become more diverse, and activities have expanded
    to include a wider range of interests. Despite these changes, the spirit of fellowship and tradition remains strong.
