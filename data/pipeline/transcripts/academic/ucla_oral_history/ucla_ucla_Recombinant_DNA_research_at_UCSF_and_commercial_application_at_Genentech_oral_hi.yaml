source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early interest in microbial genetics?
- speaker: Respondent
  text: Yes, I became interested in microbial genetics during my graduate studies at the University of Pittsburgh. It was
    a fascinating field because it combined genetics with microbiology, allowing us to understand the fundamental processes
    of life at a molecular level.
- speaker: Interviewer
  text: What led you to focus on recombinant DNA research?
- speaker: Respondent
  text: My postdoctoral work at Yale exposed me to bacterial plasmids and gene mapping, which sparked my interest in DNA recombination.
    The potential to manipulate DNA fragments and understand gene function was very exciting, and it seemed like a promising
    area for scientific breakthroughs.
- speaker: Interviewer
  text: How did your collaboration with Stanley Cohen begin?
- speaker: Respondent
  text: We met at a plasmid meeting in Hawaii in 1972. Our complementary expertise—his in plasmid biology and mine in restriction
    enzymes—led us to collaborate on experiments combining prokaryotic and eukaryotic DNA. This collaboration was crucial
    for the development of recombinant DNA technology.
- speaker: Interviewer
  text: What were some of the challenges you faced regarding biohazards?
- speaker: Respondent
  text: There was significant concern about the safety of recombinant DNA research. We had to carefully consider potential
    risks, which led to the research moratorium and the Asilomar Conference in 1975. The goal was to establish guidelines
    to ensure safe and responsible research practices.
- speaker: Interviewer
  text: Can you describe the impact of the NIH guidelines on your work?
- speaker: Respondent
  text: The NIH guidelines provided a framework for conducting recombinant DNA research safely. They helped standardize practices
    across laboratories and addressed public concerns, which was essential for the continued development and diffusion of
    the technology.
- speaker: Interviewer
  text: How did the idea of commercial applications for recombinant DNA technology come about?
- speaker: Respondent
  text: As we achieved cloning successes, it became clear that recombinant DNA had significant commercial potential. This
    realization led to the founding of Genentech in 1976, where we aimed to develop products like somatostatin and human insulin
    using this technology.
- speaker: Interviewer
  text: What was your role in the formation and early development of Genentech?
- speaker: Respondent
  text: I co-founded Genentech with Robert Swanson. My role was to provide scientific leadership and help recruit talented
    scientists. I focused on demonstrating the technology's feasibility and guiding the company's early research projects.
- speaker: Interviewer
  text: How did your academic work at UCSF relate to your involvement with Genentech?
- speaker: Respondent
  text: While I was deeply involved in Genentech's formation, I decided not to participate directly in its research to avoid
    conflicts of interest. However, my academic work provided the foundational science that enabled Genentech's commercial
    success.
- speaker: Interviewer
  text: What were some of the key technologies that enabled biotechnology to advance?
- speaker: Respondent
  text: Key technologies included restriction enzymes, plasmid vectors, DNA sequencing, and chemical DNA synthesis. These
    tools allowed us to manipulate and study genes in ways that were previously impossible, driving the biotechnology revolution.
- speaker: Interviewer
  text: How do you define good science?
- speaker: Respondent
  text: Good science is rigorous, reproducible, and innovative. It requires careful experimentation, critical thinking, and
    a willingness to challenge existing ideas. Communication through publishing is also vital to share findings and advance
    the field.
