collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Well, let's start maybe with the beginning. Who you are, where you were born, and what brought you to Estes Park.
- speaker: Respondent
  text: Well, I can start there. Are you ready now?
- speaker: Respondent
  text: I was born in Denver... Denver, Colorado. I'm a Colorado boy, and I came to Estes Park in 1931. Of course, I was in
    the grocery business. I was running a chain store in Boulder when I was eighteen years old. Then, that Honor Brite Company
    which was back out of Greeley called me and wanted me to come to work for them. Of course, my being single, it didn't
    make any difference whether I was living in Boulder or where. So, I went to work for them - went to Fort Collins. They
    then transferred me to Loveland, and then they transferred me to Estes Park. So, I came into Estes Park in 1931 and took
    this store over. That's how I got to Estes Park.
- speaker: Interviewer
  text: Now, that's the store next to the bank? The old bank -
- speaker: Respondent
  text: No, that's the one that old Sam Service -
- speaker: Interviewer
  text: Sam Service, O.K.
- speaker: Respondent
  text: That's the Sam Service -
- speaker: Interviewer
  text: Then, when did you go up to the -
- speaker: Respondent
  text: I went up there in 1936.
- speaker: Interviewer
  text: Next to the Estes Park Bank.
- speaker: Respondent
  text: I bought out Harry Boyd.
- speaker: Respondent
  text: So, we were up there in 1936. I was up there for twenty-one and a half years. Then, we built our building down there
    where I am now in 1957.
- speaker: Respondent
  text: So, we've been there ever since.
- speaker: Interviewer
  text: When you were up there was that your own or were you still affiliated with Honor Brite?
- speaker: Respondent
  text: Oh, no. That was our own. My brother and I were partners, and we called it Brodie Brothers.
- speaker: Interviewer
  text: What was your brother's name?
- speaker: Respondent
  text: Chester. We called him Chet. He never was here. He was a silent partner, more or less. He and I were going to go into
    business together. He wanted to go into the trucking business, and I wanted to go into the grocery business. So, he said,
    'I'll make more money accidentally than if you try to on purpose.' So, that's the way we did it.
- speaker: Interviewer
  text: Did you go to school in Denver?
- speaker: Interviewer
  text: Where did you go to school?
- speaker: Respondent
  text: I went to Columbia and Skinner and North.
- speaker: Interviewer
  text: Oh, did you? I went to West.
- speaker: Respondent
  text: I didn't go to college, but I graduated from high school.
- speaker: Interviewer
  text: Well, you got up here in the grocery business just in time to greet the Great Depression, didn't you?
- speaker: Respondent
  text: Well, probably. I got started steadily in 1927.
- speaker: Interviewer
  text: Oh, did you?
- speaker: Respondent
  text: Twenty-seven, yes.
- speaker: Interviewer
  text: Well, you got a head start on it. How long have you - have you always run charge accounts for patrons?
- speaker: Respondent
  text: No, no, no. We don't run charge accounts. All we use charge accounts for is convenience for those that have money.
    It's a convenience is all that we use charge accounts for. It's not to help anybody out that doesn't have any money. It's
    convenience for those that have money. It's more convenient for them to pay their bills once a month rather than write
    checks every day. That's why we carry them.
- speaker: Interviewer
  text: Did you ever hear in the grocery business of lagniappe?
- speaker: Respondent
  text: Hear of who?
- speaker: Interviewer
  text: Lagniappe. That used to be - that's an old Cajun term, I think. But, anyway, it's where the--whoever is in the grocery
    business and other kinds of business where people pay a monthly bill the grocer used to give a little sack of candy or
    something to the kids ....
- speaker: Respondent
  text: When I was a kid in Denver, we used to patronize a certain grocery store. It was the practice. That's the reason I
    know.
- speaker: Interviewer
  text: I know, my mother used to give me the checks to pay our bills of the month down there, too, and that used to be the
    same thing. That's like the old barber candy stick when you went to the barber.
- speaker: Interviewer
  text: Yes! Well, now you were in the store up by the bank when you went into service.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Because I remember Ted Spencer was in there -
- speaker: Respondent
  text: He ran the store while I was gone.
- speaker: Interviewer
  text: Yes, that's what I thought.
- speaker: Interviewer
  text: What branch of the service were you in?
- speaker: Respondent
  text: I was in the infantry.
- speaker: Interviewer
  text: And you were at Camp Roberts - for how long?
- speaker: Respondent
  text: Almost two years. They kept me there. They didn't ship me. And, then, they kept me; and then, I was going to ship
    out. The old man got a hold of me and talked to me out on the field there for two hours. I decided to stay.
- speaker: Interviewer
  text: In your public service up here, how long did you serve as mayor of Estes?
- speaker: Respondent
  text: I was on the city council for thirty-two years and served as mayor for two separate terms for eleven years.
- speaker: Interviewer
  text: What years were those?
- speaker: Respondent
  text: It was in the 1950's. I've forgotten how many, but Glen Prtfsierf was mayor. He resigned, and I finished his term.
    Then, I ran three of my own, which was six years; and his year was seven. Then I gave my end of the gavel to Pop Graves,
    and Pop had it for about sixteen years. Then, he handed the gavel back to me, and I took it over again for another four
    years. I quit in '72.
- speaker: Interviewer
  text: That's a long time, isn't it?
- speaker: Respondent
  text: It got to be a part of my life. That's the reason I had to quit.
- speaker: Interviewer
  text: What during that long period of time stands out in your mind as some of the most exciting events that happened in
    Estes Park?
- speaker: Respondent
  text: Well, the most exciting things probably were that we had the drilling of the Adams Tunnel up here, you know. Magoffin
    had the contract, and things were pretty active around here. We slid out of that without having any trouble with our economy
    at all. We just slid right out of there and right into our regular economy. Of course, I signed water contracts that we
    had for years there with the government and one thing and another, but then - zoning, we started zoning. With one thing
    and another it kept a person pretty busy.
- speaker: Interviewer
  text: What are your most vivid memories about the opening of Trail Ridge?
- speaker: Respondent
  text: I've been up on top shaking hands with the mayor on the other side for a good number of years, and we got to thinking
    there was nobody else going to do that except Fred McLaren and me. He was up there, and we shook hands and opened it up.
    It used to be quite an occasion. We did that for years. I don't know how many years it was. It was a lot of them. Sometimes
    we could go up to the top, and sometimes we had to drive around.
- speaker: Interviewer
  text: But you always had the ceremony?
- speaker: Respondent
  text: Oh, yes, we had that. But sometimes we went in the gate there to Rainbow Curve, and they closed the gate behind us
    and had the bulldozers that, you know, opened the road so far to have the opening. Then, we'd turn around and come back.
    They'd lock the gate again, and maybe it wouldn't be open for a couple of weeks. We'd been there.
- speaker: Interviewer
  text: All that time that you served on the city council did you have any women on the council?
- speaker: Interviewer
  text: In the period of time that you served on the city council were there any women?
- speaker: Respondent
  text: No, all male.
- speaker: Interviewer
  text: Was Mrs. Houston the first woman elected?
- speaker: Respondent
  text: I understand she was.
- speaker: Interviewer
  text: What percentage of the people who worked on Trail Ridge, the governmental housing, and the dam - when did the dam
    come in here? I can't remember. When did we first get the -
- speaker: Respondent
  text: Gee, I've forgotten just what the date was. I remember when we used to call it 'The Meadows' before the dam.
- speaker: Interviewer
  text: Yes, that's where I used to fish.
- speaker: Respondent
  text: But I can't remember the exact dates -
- speaker: Interviewer
  text: I think it was '49, and then they filled it in '50, I believe.
- speaker: Interviewer
  text: I think it was after the war.
- speaker: Respondent
  text: It was a long time building because I remember in the early '40's it was going, and everybody that lived here had
    come up and lived in anything they could get.
- speaker: Interviewer
  text: Well, the tunnel started in the late '30's.
- speaker: Respondent
  text: They worked on that for several years.
- speaker: Interviewer
  text: What I was really going to ask was do you have any recollections of the indices or index of the impact of the governmental
    workers who were housed up here during the time this activity was going on?
- speaker: Respondent
  text: Well, we had lots of them that wanted certain things done, too; but I don't know, we always kind of figured out that
    was going to be for the town, you know. If we did what a lot of them wanted to do, why it would have been an awful liability
    to the town. So, we didn't do it. Now, why there are none of those people around anymore. So, it was good that we held
    out and did what we thought was proper.
- speaker: Interviewer
  text: Yes, they had a union office up here at one time.
- speaker: Respondent
  text: Yes, sure, but we never had any trouble. We had a lot of people working around here, but when that quit we slid right
    into our regular economy. Everything just worked fine.
- speaker: Interviewer
  text: Well, I know that everything that anybody could rent - a garage or a summer home or anything went for rentals to those
    people because they had to have housing.
- speaker: Interviewer
  text: What are some of the biggest changes that have happened that you remember? I mean like - I know the tunnel was one
    thing that caused a lot of change in Estes. Are there other things that stick out that were turning points as the flood
    was last year?
- speaker: Respondent
  text: I don't know how you folks feel about it; but if it wasn't for the National Park, you know, a lot of us wouldn't be
    here.
- speaker: Respondent
  text: Because that's the main attraction that we have. Of course, the tunnel helped; and, of course, we had other things.
    The National Park expanded a little; and, of course, the city expanded. Then, when we started zoning, why we zoned and
    found that you couldn't zone it all at once. You had to take it piece by piece, which was good. I happened to be home
    when at one of their meetings here Larimer County tried to zone the whole county. I went back and said, 'Boy, that's no
    way to start doing that!' So, when I came back why we started and took in the north end first and then kept adding to
    it. It worked out really well. People saw the benefit of zoning. So, that's how it is.
- speaker: Interviewer
  text: Do you associate any particular period or administration of county government as being more productive, like being
    a diamond in a coal bin in terms of relationships with the city?
- speaker: Respondent
  text: Well, we used to go down to the county and tell them we were the biggest city in the county because if they take average
    population, we were.
- speaker: Respondent
  text: And, of course, when Alf Landon ran for President of the United States, he had his headquarters here.
- speaker: Interviewer
  text: I remember that, and that's the last time I rode a horse down Main Street with Alf Landon!
- speaker: Interviewer
  text: Where did he stay? Was it out at Meadowdale?
- speaker: Respondent
  text: No, he had McGraw Ranch.
- speaker: Respondent
  text: He had his headquarters at McGraw Ranch.
- speaker: Interviewer
  text: That was an interesting period. Who were some of the other outstanding personalities or national figures?
- speaker: Respondent
  text: Oh, we had Bob Mitchum here once, and we had, oh, 'A Queen for a Day.' We had programs when it started. We were lucky,
    and we got the right people. I don't know. We just bugged along, and it seemed as though we had everything to offer. We
    had the - I don't know how to put it, but we had the climate, the clientele, and everything else. It seemed to work really
    well as far as we were concerned.
- speaker: Interviewer
  text: Who stands out in your mind as having the best relationship or making the greatest contribution from the Park Service
    to the -
- speaker: Respondent
  text: Well, David Canfield was the one who did an awful lot for the Park; and, of course, his wife Helen. I can remember
    when Helen Canfield and Margaret Rostel wrote an ad for a special issue of the Trail for me. Their theme was 'Have fun
    with food!' And here just about eight years ago King Soopers came out with it and said, 'Have fun with food!' We had that
    slogan years and years before, but she did a lot of good. She was the daughter of the fellow who founded Stanford University.
- speaker: Interviewer
  text: Oh, is that so?
- speaker: Respondent
  text: She did a lot for me, people's hearing. She was hard of hearing herself, but she did a lot for that. She sent a lot
    of kids to college that nobody ever knew about.
- speaker: Interviewer
  text: What was her name again?
- speaker: Respondent
  text: Helen Canfield.
- speaker: Interviewer
  text: Canfield. She wasn't any relation to the Canfield Hotel in Greeley?
- speaker: Respondent
  text: No, David Canfield was superintendent at that time, and he was -
- speaker: Interviewer
  text: Yes, he was great.
- speaker: Interviewer
  text: Do I take it that she was the daughter of Leland Stanford?
- speaker: Respondent
  text: Probably. I think she's probably the only daughter, I'm not sure, but she was a wealthy person. She really was, but
    you'd never know it.
- speaker: Interviewer
  text: Did they live in the Park area or in the middle of town?
- speaker: Respondent
  text: No, they lived out here above McGraw Ranch. I mean -
- speaker: Respondent
  text: MacGregor Ranch. They had a house there. They had two homes up there.
- speaker: Interviewer
  text: And then at one time didn't they live down there where Maces bought along the river?
- speaker: Respondent
  text: They bought a couple along the river there.
- speaker: Interviewer
  text: Yes, u-hm yes. I don't know whether it was because they couldn't get up to the upper one.
- speaker: Respondent
  text: Well, Dave had that cabin, and he just kept it, you know, to have his friends and everybody else come up and use it
    during the summer. He had a set of rules there that he left, you know, saying, 'Put the dirty laundry here and the clean
    laundry there' and anything else. He donated that to them just as he did in Arizona.
- speaker: Interviewer
  text: Is he still living at all?
- speaker: Respondent
  text: No, no, there isn't a chance of it.
- speaker: Interviewer
  text: Ron, do you know Jesse Jay's wife's name?
- speaker: Interviewer
  text: Somebody has been bugging me about that, and I couldn't come up with that name.
- speaker: Interviewer
  text: What was her last name?
