turns:
- speaker: Interviewer
  text: You were born in Chicago in 1914. Would you like to tell me a little bit about your childhood and what you remember?
    Why don't we start with what your parents were like and what you remember.
- speaker: Respondent
  text: I remember the fire station around the corner and the police station around the corner vaguely. At that particular
    time on our street we had gaslights, and a man would come around every evening and light up the gaslights. And the fire
    department and the police department equipment were drawn by horses instead of cars. We had a house - my mother and father
    and myself; and we had several Dalmatian dogs, and in the backyard next to a playpen we had chickens, as most people did
    in those days. And one thing that stands out in my mind is that every Sunday we had chicken on the table. They'd be sort
    of pets to me, but every Sunday there'd be one missing. My father'd do away with one. It was quite a terrifying experience
    at a young age to sit down to dinner eating one of my pets I used to play with through the cage.
- speaker: Interviewer
  text: In the neighborhood in Chicago, did you live in an apartment?
- speaker: Respondent
  text: No, it was a house. That part of Chicago, at that time, was on the outskirts of a pickle farm, Budlong Pickle Farm,
    as I recall. There were a lot of trees and woods, and I recall my father used to play tennis with another neighbor of
    ours by the name of Kraft, who used to have a cheese business. He had a wagon. He'd go around the neighborhood selling
    cheese. It was the beginning of the Kraft Cheese Company. My father played tennis every Saturday with Mr. Kraft.
- speaker: Interviewer
  text: Your father's name was German.
- speaker: Respondent
  text: George Woelffer.
- speaker: Interviewer
  text: George Woelffer. Tell me your full name, and what your mother might have had in mind.
- speaker: Respondent
  text: My full name was Emerson Seville Woelffer. Seville came from her father, who was Algernon Sidney Seville, who was
    in the music business, QRS Piano Rolls, in Memphis, Tennessee, and he worked many of the player-piano rolls, transcribing
    them from the piano onto the player rolls with W. C. Handy. I recall my grandfather coming up maybe once a year and always
    bringing me some fabulous kind of gift in the way of a musical instrument, which I had no desire for. And I remember one
    time he brought a huge, huge box, a huge paintbox with all sorts of colors and brushes in it.
- speaker: Interviewer
  text: What was the other family name that your mother's so proud of?
- speaker: Respondent
  text: De la Fontaine. That was her mother's maiden name, and her two aunts, from Saint Croix, Switzerland. That's the French
    side of the family, and my father's side was the German side of the family. His father was in the meat-processing business
    with a man by the name of Oscar Mayer. They worked side by side making sausages. And then Oscar Mayer took off on his
    own one day and started his own business, which is Oscar Mayer now.
- speaker: Interviewer
  text: And de la Fontaine was related to the famous French fabulist.
- speaker: Respondent
  text: Right. My mother's grandfather was de la Fontaine, and his wife was Paillard, and the family still lives in Saint
    Croix, Switzerland--Paillards. The whole town is Paillard. Paillards make the Bolex movie camera and the Hermes typewriter.
    They first started out making music boxes.
- speaker: Interviewer
