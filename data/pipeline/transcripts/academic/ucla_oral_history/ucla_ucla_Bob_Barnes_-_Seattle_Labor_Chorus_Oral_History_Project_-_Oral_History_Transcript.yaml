collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Bob, why don't you just give us a little bit of history - where you were born, the date, etc?
- speaker: Respondent
  text: Okay. I was born in Long Prairie, Minnesota on January 30, 1946. We lived in Long Prairie for about six years. My
    dad was a second-generation small business owner. He had a clothing store in Long Prairie. He'd go out to Colorado every
    year with some buddies to go mule deer hunting, and loved that, and loved Colorado. He, with some consultation with my
    mom, decided they were going to move to Colorado. In 1952, we moved to Denver, where we stayed for a year, and Aurora
    for a year, and then Boulder till 1960. He bought a motel up in Boulder. We lived on the outskirts of town, close to the
    Boulder River. We used to climb on the flatirons. It was an idyllic place. Boulder, at that time, was 25,000 people. I
    have one brother. He's two years younger than me. He currently lives in Provo, Utah. In 1960, we moved to Paris, Texas.
    That was a major culture shock for me because I'd done a lot of my growing up in Boulder, which was a fairly enlightened
    town. It was desegregated. Paris in 1960 Texas, most everyplace down there was still segregated, so I went to a segregated
    high school, which was weirdly not weird. I was fairly oblivious to all that stuff at the time. It was only after the
    fact that was really damn weird. The school was desegregated when my brother was still in high school. I think I was in
    the last graduating class that went through the segregated era. It was pretty weird down there. I can remember driving
    into Greenville, Texas, which was on the way to Dallas, and there was a huge sign over the main road into town saying
    Welcome to Greenville, home of the blackest soil and the whitest people. And they were proud of that. That stayed up for
    a few years after the federal law changed. Because I was in this weird place, I brought with me this damn Yankee-ness,
    which still is an issue, but back in the 60s, the Civil War was still really a live. I was kind of an outsider. It took
    me a while to claim some turf there. I spoke a foreign dialect. I thought everybody else spoke a foreign dialect. I couldn't
    understand half the people for the first couple months I was there. [laughing] I remember one teacher who was from the
    North who spoke a similar dialect to me, and I went up to her one day and in the second week and I said, "I'm so glad
    you're here. I can understand you." She was an anchor. My dad and mom, I would say, were soft-core racists. They weren't
    cross-burners, but my dad - and this was probably motivated as much by his business sense as anything - did not rent rooms
    to people of color. When the law came down and he was forced to, he would segregate in the farthest units in the motel,
    which, interestingly, were the nicest rooms in the whole motel. Black families would come in and rent rooms and they'd
    get the best rooms. After the folks had checked in, Dad would always write on the registration cards and put a C up in
    the upper corner, of course, standing for colored. When I got wind of that, I'd go down every night and write W on all
    of the rest of the cards. I don't know what motivated me to do that. I had no civil rights training. I had no friends
    who were in the Civil Rights Movement. The only thing I knew about was what I read in the paper, and the Paris Daily News
    wasn't particularly sympathetic to the civil right struggle, but it just seemed weird that he would do that, so I responded
    in like.
- speaker: Respondent
  text: I was always interested in music. I was one of those kids who hung with other kids and we'd pretend we were DJs and
    put on little shows on the back deck. I hooked up with some kids in high school, a couple of whom played instruments.
    Just on a serendipity thing, we put together an act for our German club. We all had taken German class. We did a couple
    of songs and got known as the guys that did music and that stuck. Probably in our junior and for sure senior high school
    years, we had a couple of folk groups. One was the Kinsmen. One was the Oxfords. I was kind of in the Kinsman, and all
    the way in the Oxfords. It was a Smothers Brothers rip-off. We did straight up a lot of the Smothers Brothers stuff. We
    also put on shows. We performed at assemblies. We funded our first couple class reunions by putting on a variety show
    called "A Midsummer Nightmare" that we brought a bunch of talent in and we all performed in. [laughing] Had a great time.
    We stuck together through high school, and in junior college - I went to Paris Junior College in Paris, Texas, and most
    of my gang went to PJC also - we discovered, along with Bob Dylan and a whole bunch of other people, you could plug your
    guitars in and make them electric. We formed one of the first rock 'n' roll bands in East Texas. I think there were two
    others at the time. We did a lot of gigs on the weekends and played a lot. I think I probably played and practiced music
    more than I studied. It's amazing I got a degree. I moved and all of the band moved to Commerce, Texas, which is about
    40 miles from Paris, where we went to East Texas State University. Kept the band together and played every weekend.
- speaker: Interviewer
  text: What did you play?
- speaker: Respondent
  text: I played bass. I wasn't that good on the guitar, and the bass had fewer strings, and we needed a bass player. [laughing]
    So, I bought me a bass and taught myself how to play it. That got us through those years. I also played in a jug band
    called the 1928 Hupmobile, based on a 1928 Hupmobile car that sat out in front of the coolest barbecue joint in Commerce,
    Texas. I always said that I played in a jug band for fun and a rock 'n' roll band for money. We didn't make enough money
    - enough to pay for our gear, which was kind of expensive, and the liquor. Drank a lot of liquor during those years. [laughing]
    Once again, I don't know how I got a degree because we were spending a lot of time doing music. I also got exposed a little
    bit to politics, and it was just by default, in a way. One of my roommates - who was a little more political than me,
    and I wasn't much - probably the most political act we did was we'd sing Country Joe Fish's Fixin' to Die Rag, about the
    war. But my roomie, David, hooked with some folks from the Students for a Democratic Society in Austin and invited them
    to come out and put on - they were doing little roadshows. It'd be a festival. They'd bring people in and have speakers
    and have music. We rented a field in the outskirts of Commerce and publicized this, and we realized that we were getting
    in a whole lot of trouble because we were in East Texas in 1968 and there were a lot of redneck cowboys down there who
    didn't cotton too much to the likes of the SDS and the radical politics that they brought with them.
- speaker: Respondent
  text: We thought we were going to have a pretty hostile time. We went into the day and became pretty trepidatious because
    there had been some threats made and a few confrontations. But these folks that came in from Austin knew what they were
    doing, and they knew how to defuse situations. We ended up having an amazing festival. A lot of people came. For me, the
    high point of the whole thing was afterwards, a bunch of us got together in a tavern, and a bunch of these cowboys came,
    and we all had a great time talking. By the time the evening was over, we were best buddies. It was an example of the
    transformativeness of just speaking truth, being out there with your politics and not being confrontational about it,
    and having a good time with it. It was amazing to see that happen before my eyes. During this same period of time, I had
    already joined the Army in an advanced enlistment program. I was about to graduate from college - this was 1968 - and
    I didn't want to go to grad school, wasn't planning on getting married and having kids, and didn't have huge moral objections
    to joining the Army, so I joined the Army. This was the three-month period before I actually went in. Some of these guys
    from the SDS were trying to talk me out of going. I wasn't opposed to it, but they were speaking a language I didn't understand.
    It was like they were talking over my head and I just didn't get it.
- speaker: Respondent
  text: So, in September 1968, I found myself at Fort Polk, Louisiana, four years older than most of the kids I was in basic
    training with, and a lot whiter than most of the kids I was in basic training with. Most of the folks were there because
    they'd either been drafted or given a choice by a judge for some minor infraction they'd committed that they could either
    go to jail or join the Army, and they figured that was the better choice. I was supposed to be headed for officer candidate
    school. That was one of the things that I'd signed up for. I realized early on several things. One, this was a mistake
    - I did not belong here in this Army thing - and two that there was no way I was going to be in a position of leading
    these kids in a war that I was already mildly opposed to. The premise upon which I'd joined the Army - this was my Army
    recruiter friend - was that I was going to be in the Adjutant General's Corps. I was going to go to embassy parties in
    D.C. for four years, and it would be easy duty. Oh, by the way, you do have to sign up for combat training, but that doesn't
    mean anything because you won't be going into combat. I bought it. I was totally naive about all of this stuff. Unfortunately,
    my friends in the SDS, when they were trying to convince me otherwise, were speaking a language I didn't understand. I
    went through basic training. I went through advanced infantry training pretty much every day thinking, this is not going
    to work. I don't know what I'm going to do. I wanted to throw my gun away and walk off, knowing that no good would come
    of that.
- speaker: Respondent
  text: Then another one of these transformative moments happened. We were scheduled to graduate from advanced infantry training
    and most of the guys were going to ship out to 'Nam. A couple weeks after Christmas, we were all given a week off for
    Christmas break and told, "Come back for the two weeks and you'll get your orders, but you'll have a two-week leave to
    go say good-bye to your families." This was the premise upon which we all took off for Christmas break. When we got back,
    that changed. We were told, "You're immediately going to get shipped out to wherever your orders say you're going to."
    For most of the kids, it was Vietnam. People were angry, freaked out, upset, didn't know what the hell to do. None of
    us did.
- speaker: Respondent
  text: I had kept the phone number of one of the guys from the SDS and called him. Larry Caroline was his name. Good guy.
    I called him and said, "Larry, what the hell? We've got a crisis here. Help us out. Give us some advice." He told me about
    conscientious objector status. It was probably the only legal way you could get out of combat. A tough path, but it was
    a way. We also talked about deserting and going to Canada, but those were other options, or just refusing orders and going
    to jail. People were doing that, but that was a rough choice, too. But he laid out the spectrum of choices that we could
    take. He also suggested that if people went AWOL and stated, after they'd left, that they were going to come back in two
    weeks and comply with their orders that the likelihood of them facing serious charges would be greatly reduced because
    the Army was looking for their cannon fodder. I got that word out and for the first couple days, there was this kind of
    excitement that was way too visible probably, and people were openly talking about leaving. When people are marching in
    the Army, there's the chants that folks do. Left, Right. This was whole companies doing this. Left. Right. AWOL. It was
    pretty out there. But the last week that all stopped and there was this kind of quiet, calm, determined feeling that just
    permeated, and I didn't know if that was just that people were freaked out that nothing was going to happen or what, because
    you don't know. This was a pretty big deal. After eight weeks of basic training, having your humanity hammered out of
    you, and being taught to be totally subservient, to take a stand like that is
