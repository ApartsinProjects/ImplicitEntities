source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and how you became interested in art?
- speaker: Respondent
  text: I was born in Fort Dodge, Iowa, but my family moved to Vancouver, Canada, and then to California. From a young age,
    I enjoyed designing, drawing, and printing. An art teacher noticed my enthusiasm and gave me private art classes after
    school. My parents were very supportive and encouraged me to be original in my artistic endeavors.
- speaker: Interviewer
  text: What led you to enter the Immaculate Heart of Mary religious community?
- speaker: Respondent
  text: After high school, I entered the Immaculate Heart of Mary community and took the name Sister Mary Corita. It was a
    significant part of my life, and I earned my BA from Immaculate Heart College in 1941. I also took classes at Otis and
    Chouinard art institutes and later earned a master's degree in art history at USC in 1951.
- speaker: Interviewer
  text: How did your experiences at Immaculate Heart College influence your art?
- speaker: Respondent
  text: Being part of the community and college faculty brought me into contact with great teachers like Alois Schardt and
    Charles Eames. They guided my artistic and intellectual direction, teaching me the value of change and constancy in art.
    I became dissatisfied with the limitations of figurative art and was attracted to abstract expressionism. I also learned
    serigraphy skills from Mrs. Alfredo Martinez.
- speaker: Interviewer
  text: Can you tell me about your print The Lord Is with Thee and its significance?
- speaker: Respondent
  text: In 1952, my serigraph The Lord Is with Thee won first prize at the Los Angeles County Museum show and the California
    State Fair, among others. This success encouraged me tremendously and pushed me to continue in that direction. My work
    often has a religious quality, aiming to synthesize reasoning with intuition and the critical with the creative.
- speaker: Interviewer
  text: What was your role as head of the Immaculate Heart College Department of Art?
- speaker: Respondent
  text: From 1964 to 1968, I established the art program as one of the more progressive in the country. I helped start a folk
    art collection, expanded it through purchases in Europe and America, and initiated the Great Men series, which brought
    eminent artists and thinkers into contact with the college community, especially the art students. I also involved students
    in commissioned projects like IBM's Christmas exhibit in New York.
- speaker: Interviewer
  text: How did social and political issues influence your work during the 1960s and 70s?
- speaker: Respondent
  text: My friendships with Philip and Daniel Berrigan, Joseph Pintauro, and Gerald Huckaby led to collaborations on their
    publications. Through my art, I echoed and supported socially and politically conscious statements. The civil rights movement
    and the Vietnam War stimulated awareness in the Immaculate Heart community and challenged students to incorporate broad,
    catholic themes in their work. Though my statements were often criticized as too radical, the community supported me.
- speaker: Interviewer
  text: What led to your decision to leave the religious community?
- speaker: Respondent
  text: In 1968, my quest for individualism, which until then had only been expressed through my art, surfaced in my decision
    to leave the religious community. This was just before the community decided to establish its own decrees of renewal.
    I also retired from teaching to devote full-time attention to my work.
- speaker: Interviewer
  text: Can you describe some of your commercial commissions and public works?
- speaker: Respondent
  text: I have done many commercial commissions and prints for companies like Container Corporation, Reynolds Aluminum, and
    International Graphic Arts Society. For the 1964 New York World's Fair, I designed the Beatitude Wall, a forty-foot mural
    for the Vatican Pavilion. Some of my public works include a 150-foot rainbow for the Boston Gas Company's natural gas
    tank and a twenty-foot mural for Bon Secour Hospital in Methuen, Massachusetts.
- speaker: Interviewer
  text: How has your work been recognized and where can it be found?
- speaker: Respondent
  text: My works are in permanent collections at museums such as the Victoria and Albert Museum in London, the Art Institute
    of Chicago, the Museum of Modern Art, the National Gallery of Art, and the Bibliotheque Nationale in Paris. I was named
    one of the 'Top Nine Women of the Year' by the Los Angeles Times and recognized in Harper's Bazaar's special edition of
    'American Women of Accomplishment.'
- speaker: Interviewer
  text: Where do you currently live and work?
- speaker: Respondent
  text: I reside in Boston, where I work on commissioned projects and design prints for distribution to the twenty-six galleries
    that represent me across the country.
