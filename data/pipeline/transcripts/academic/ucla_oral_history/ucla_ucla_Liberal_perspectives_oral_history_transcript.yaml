collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early life?
- speaker: Respondent
  text: My grandparents emigrated from Europe. My grandfather was Harrison, and my grandmother was also from the Harrison
    family. My parents met and married, then moved to Detroit where my father had a jewelry business. We had relatives like
    Aunt Nettie and Uncle Milt, and my father only took one vacation. Later, we moved to California, stopping in Chicago and
    then taking a train trip to Los Angeles. We settled in the Wilshire District, and I got my first job there.
- speaker: Interviewer
  text: What were your early educational experiences like?
- speaker: Respondent
  text: I attended the Third Street School and then John Burroughs Junior High. I was an early reader and had good teachers
    at Burroughs. I had a musical bent and performed in the school orchestra. Later, I went to Fairfax High School where I
    was involved in debating and had my first journalism assignment. My family was Jewish, but our attitude toward religion
    was somewhat relaxed. I also developed political interests and had friends in a group called The 31 Club.
- speaker: Interviewer
  text: How did the Great Depression affect your family and your education?
- speaker: Respondent
  text: The Depression had a significant impact on my family. I entered UCLA in 1933, and the campus atmosphere was quite
    different then. I started on a premed curriculum but became involved with the Bruin newspaper. I worked with editors like
    Kate Gordon and majored in psychology, studying under faculty such as Grace Fernald and Frank Davis. I wrote for the Bruin
    and eventually became its editor.
- speaker: Interviewer
  text: What were some of the challenges you faced as editor of the Bruin?
- speaker: Respondent
  text: I campaigned against commercialized athletics and was active in student activities. There was interplay with the student
    council, and I worked with people like Cliff Carpenter and Frank Wilkinson. I had conflicts with Tom Lambert, which led
    to me being fired and then reinstated. I was involved in choosing a student body president, Bob Schroeder, and participated
    in events like the all-University sings and a farewell banquet.
- speaker: Interviewer
  text: Can you tell me about the student government revolution in 1934?
- speaker: Respondent
  text: Yes, it was a significant time. We elected John Burnside, and there was an open forum. Moore suspended four student
    council members, and I led an investigating committee to defend the students. Their parents got involved, and there were
    pro-administration demonstrators. Eventually, Sproul reinstated the students, and Moore admitted his error. Ernest Carroll
    Moore and his wife Dorothea were important figures, and Moore's farewell was notable. I was also involved with the University
    Religious Conference during this time.
- speaker: Interviewer
  text: What were some of your experiences with the University Religious Conference and your travels in Europe?
- speaker: Respondent
  text: I worked with Tom Evans and helped found the URC. Adaline Guenther found me for this work. I applied for a Rhodes
    Scholarship and served on a committee to choose the baccalaureate speaker. In 1937, I traveled to Europe, visiting Italy
    and later meeting E.M. Forster. In Germany, I met German Jews, and in Paris, I met Gertrude Stein. I attended her 1934
    lecture in Pasadena and visited her home at 27, rue de Fleurus. I also met Bernard Fay and was invited to Bilignin. I
    visited a monastery as well.
- speaker: Interviewer
  text: How did your relationship with Gertrude Stein and Bernard Fay influence you?
- speaker: Respondent
  text: Gertrude Stein and Bernard Fay were influential. After returning to Los Angeles, I joined the URC staff and worked
    on radio programming and fund raising. I met film executives and was summoned by Selznick. I was involved with the Jewish
    Community Council and met Sol Lesser. I also had a stint at screenwriting and was invited to New York by the National
    Conference of Christians and Jews. There, I met Dorothy Paley and visited her home in Manhasset. I also met Bill Saroyan
    in 1936 and published nine of his stories.
- speaker: Interviewer
  text: What were your activities related to the Conference Press and your political views in the late 1930s?
- speaker: Respondent
  text: I worked on the Conference Press and published a second publication called What Are Masterpieces? I had contact with
    Henry Miller and met F. Scott Fitzgerald. Thornton Wilder spoke about Fitzgerald. In 1937, I was involved in peace strikes
    and converted to interventionism. In 1940, I was invited to Washington to work in the Office of Civilian Defense. In 1941,
    I was in Washington with Fiorello LaGuardia, the OCD head, and met Mrs. Roosevelt and Scottie Fitzgerald. I attempted
    to sell radio shows to NBC and had some contact with President Roosevelt.
- speaker: Interviewer
  text: Can you describe your experiences during World War II?
- speaker: Respondent
  text: I worked in Washington when Pearl Harbor was announced. I traveled to California with LaGuardia, Mrs. Roosevelt, and
    Joseph Lash. I thought about the relocation of Japanese-Americans. I tried to join the Navy but was turned down, so I
    joined the RAF and underwent pilot training. Later, I switched to the U.S. Army Air Corps and attended control tower school.
    I had a three-day pass to the White House and met President Roosevelt. The idea for the American Veterans Committee germinated
    during this time, with Adaline Guenther involved.
- speaker: Interviewer
  text: What were your experiences overseas during the war?
- speaker: Respondent
  text: I was stationed at Deming, New Mexico, where Mrs. Roosevelt visited and spoke to the men. I transferred overseas via
    San Francisco and traveled across the Pacific to New Guinea. I met Lieutenant Howard and published a commemorative magazine.
    Later, I transferred to the Historical Section in Manila. After the surrender, I traveled to Japan and discussed the atom
    bomb with physicist Karl Compton. I was in Okinawa and traveled with George Weller. At one point, I went AWOL.
- speaker: Interviewer
  text: What did you observe during your time in Japan after the war?
- speaker: Respondent
  text: I took a railroad ride through Japan and arrived at Nagasaki, witnessing the devastation caused by the bomb. I observed
    the reactions of the Japanese and visited POW camps. I noticed different attitudes between British and American personnel.
    I was sent to Tokyo by Weller and interviewed Japanese socialists, including Toyohito Kagawa, a paradoxical philosopher.
    I was discovered by my commanding officer and discharged from service. Afterward, I became involved with the American
    Veterans Committee, finding Charles Bolte and early organizing efforts both at home and overseas. The AVC had a distinct
    philosophy.
- speaker: Interviewer
  text: How did the American Veterans Committee develop and what challenges did it face?
- speaker: Respondent
  text: Louis Greenbaum and the American Legion were involved. I took a vacation in Key West and met Pauline Hemingway. We
    planned the AVC convention and discovered Adam Yarmolinsky. Membership concentrated, and I met General Eisenhower. We
    battled the communist faction within AVC and faced right-wing opposition from people like Westbrook Pegler. The Independent
    Progressive Caucus was formed, and we raised funds. The convention at Des Moines was a victory, though I was a target
    of communists. AVC leaders were leaders of the future. We had staff members and faced problems in Hollywood. The Unity
    Caucus was formed to build the AVC Caucus.
- speaker: Interviewer
  text: Can you discuss the anticommunist issues within AVC and your time in New York?
- speaker: Respondent
  text: I wrote a letter to John Roche commenting on his study of AVC. Adaline Guenther played a key role. We found Charles
    Bolte and Lincoln Lauterstein. Anticommunist issues arose, with Fred Borden emphasizing programs. The communist challenge
    to AVC leadership was significant. Michael Straight and the Unity Caucus were involved. The California situation was active,
    with many AVC leaders engaged.
- speaker: Interviewer
  text: What was your experience at Oxford and your academic influences?
- speaker: Respondent
  text: I outdid the Communists in AVC and wrote a postscript to the John Roche letter. I spent a year in New York before
    deciding to apply to Oxford, specifically Balliol College. Life at Oxford involved tutorials and interaction with A.D.
    Lindsay, the master of Balliol, whose philosophy influenced me. I met Nick Katzenback, Isaiah Berlin, G.D.H. Cole, Harold
    Lasky, and Tony Benn. I was part of the American Association and had a visit from Thornton Wilder. We discussed the communist
    takeover of Czechoslovakia.
- speaker: Interviewer
  text: Can you tell me about your travels and connections in Europe during this time?
- speaker: Respondent
  text: I studied Czech at Oxford and met Marietta Fitzgerald Tree. I first met her in New York and was invited to Ditchley
    near Oxford. I learned to shoot and took trips to the Continent, including Italy where I visited a monsignor and Santayana.
    In Paris, I met Alice B. Toklas and visited Gertrude Stein's 'gallery.' Toklas spoke about France in 1948. I collected
    Stein materials and was invited to work for General Lucius Clay in Berlin. I roomed with John Golay.
- speaker: Interviewer
  text: What were your activities upon returning as AVC chairman?
- speaker: Respondent
  text: I chose a new direction and returned as AVC chairman. I raised funds, including from Nelson Rockefeller. There was
    a proposed merger with AMVETS, but it was not approved. We held a convention in Chicago where I met Nancy Blaine and Mrs.
    Emmons Blaine, a philanthropist. I had brief congressional aspirations and noted the 1948 freshman congressmen.
- speaker: Interviewer
  text: How did the World Veterans Foundation develop and what was your role?
- speaker: Respondent
  text: The AVC was involved in Clubhouse Organizations and the world veterans' organization. The World Veterans Foundation
    was established in France. European delegates attended the constitutional convention, as did American delegates. Elliott
    Newcombe was elected secretary-general. We received a grant from the Carnegie Endowment for International Peace, which
    helped the growth of the World Federation. I traveled to Asia seeking member organizations, including the Philippines.
    Successors to Newcombe and politics of the federation affected world peace. Jacques Katel was involved. Mrs. Roosevelt
    visited Paris, and I had lunches with Alice B. Toklas before her death. There were French-English language problems at
    the federation. I returned to the United States and was invited to advise a committee on democracy in Germany. I resettled
    in Bonn, lived on the Drachenfels, married Nancy Blaine, and honeymooned in Paris.
- speaker: Interviewer
  text: Can you share about your later years and personal life?
- speaker: Respondent
  text: There was a story of mystery and intrigue upon my return to Germany. I traveled extensively in Europe with Nancy Blaine
    Harrison. Mrs. Emmons Blaine influenced philanthropy and liberal causes. Eventually, I returned to the U.S. and lived
    in New York.
