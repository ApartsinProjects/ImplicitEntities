source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: What was your life story prior to joining the Rainbow Coalition? Did you grow up in Washington state, or did you move
    here? And if so, when and why?
- speaker: Respondent
  text: I'm an East Coast guy, and I moved here in 1975, mainly because I was fired from the Cornell faculty. And colleagues
    that I knew professionally here at the University of Washington were starting a new program called social management of
    technology, and asked me if I'd be interested in applying. They had one slot open for either a lawyer or a planner, and
    I have both law degrees and regional planning degrees. And so the timing was perfect. I applied and was accepted. Came
    here with tenure, which was, in retrospect, important for me to have requested. I mean, the visit here went very well,
    and the director of the program drove me to the airport to leave, rather than getting a graduate student to do it. And
    he said to me, in effect, "How do you think you might respond if we made you an offer?" And I said, "I think you're doing
    some really interesting stuff here, and I like the plans that you're making, but of course, if you make me an offer, it
    should be with tenure." Now I had been teaching for five years at Cornell and was published and knew him through professional
    associations and stuff like that, so it wasn't an outrageous ask. And when the offer came, it was with tenure, which since
    a lot of what I did, professionally and in the community was considered quote "controversial," having tenure protected
    me because my appointment was through the College of Engineering, and my areas of work were evaluating technologies along
    their social, political, economic, legal aspects and ramifications. So to be honest with you, most of the donors to the
    College of Engineering represent firms and companies that don't particularly want critical analyses of their technologies
    that they've made all their money. [laughs] So it was a lot of stress in the relationship and the tenure protected me.
- speaker: Interviewer
  text: Were you involved in electoral politics prior to the Jesse Jackson campaign, and why did you become involved in that
    campaign, and what led you to the Washington State Rainbow Coalition?
- speaker: Respondent
  text: Well, that's a lot of questions. Yes, I've been involved in politics since I was a kid in New York City. My mother
    and I were involved in efforts to reform efforts within the Democratic Party in New York City, which we're talking now
    about the 1950's, 1960's. And I came from a family that was always very interested in what was going on. My grandmother,
    my dad's mother, wrote a kind of autobiography, and when she was being courted by my grandfather, she talked about how
    her family invited him over for dinner, and they would quote "talk about the affairs of the day." So it's in the cultural
    context within which I grew up to be interested and involved in things. I don't remember the exact dates of the Jesse
    Jackson campaign or of the formulation of the Rainbow Coalition. I went back and found a date of 1993 that I did an event
    which I'll talk to you about. But can you refresh my memory about what the dates were of his campaign, Jackson's campaign?
- speaker: Interviewer
  text: Yeah, so that would be '84, and then once again in '88.
- speaker: Respondent
  text: I think it was that the later campaign, he spoke at the Seattle Center, at the mural amphitheater, as I recall, and
    I was asked by local organizers to introduce him. So what do you have as the date of the formation of the Washington State
    Rainbow Coalition?
- speaker: Interviewer
  text: I would say around like '84 there was a lot of work around the Jesse Jackson campaign, and then obviously it grew
    more.
- speaker: Respondent
  text: Okay, so I was pretty much involved in the organizing since the beginning, but I don't think I was particularly involved
    in Jackson's '84 campaign. As I say, I think it was his second campaign when the event was held at the Seattle Center,
    and I remember chatting with him before, you know, I introduced him, "Hi, I'm Phil Bereano. I'm going to be introducing
    you." Et cetera, et cetera. And I'm pretty sure that was his second campaign. But I do remember the early days of the
    and the earliest meetings of the Rainbow Coalition. I just didn't have the calendar date. We met at the Central Area Motivation
    Project, CAMP, on 18th [Avenue].
- speaker: Interviewer
  text: And can you talk a little bit about why you were involved, what led you to your involvement in the Rainbow?
- speaker: Respondent
  text: Well, as I say, I've always been involved in community politics. I moved here in 1975, and I had been involved in
    a number of things in the late 70's, and always of course with a progressive kind of bend. And so, for example, in 1979,
    I went illegally to Cuba through--there was a center for Cuban studies in New York City that put these things together.
    We left from Montreal, you know, so that my passport was just stamped with the Canadian stamps, and the Cuban entry stamp
    was on a separate piece of paper, and so on. And I was involved in a very early men's group here that was feminist in
    orientation. So I began to know and work with a lot of the people who became co-founders, or whatever you want to call
    it, of the Rainbow Coalition. So when this thing was nucleating, I was one of the people, and I was a gay activist, so
    I certainly brought that perspective into the mix. Yeah, I think that's my earliest recollections, right. And we had these
    meetings, as I say, at CAMP, and yeah. Now I was also as you may know, getting very active in the American Civil Liberties
    Union, and I was on the board of the state affiliate. And eventually, not at the time that we're focusing on, but eventually,
    after that, I became a member of the National Board of the ACLU, where I was for twenty-five years. So a lot of my activism
    was channeled into civil liberties kinds of issues and through the ACLU. And then later on, of course, during the AIDS
    crisis, I got involved in the formation of ACT UP [AIDS Coalition to Unleash Power]. But that was by that stage, we're
    talking now about the late 80's. The Rainbow Coalition, the Washington State Rainbow Coalition, wasn't, to my recollection,
    really very strong and active at that time. Is that your understanding? Yeah.
- speaker: Interviewer
  text: Awesome. And was there anything in particular--actually, what role did you play in the Washington State Rainbow Coalition,
    and what were the organization's activities while you were involved?
- speaker: Respondent
  text: Well, I wouldn't say that I was one of the leaders. Let's put it that way. I had other activities in the community,
    like the ACLU and civil liberties where I would definitely say my role was a more leadership role. But there were not,
    in my recollection, very many LGBTQ people active in the Rainbow Coalition. So certainly, I guess to some extent, I was
    considered as a liaison to that community. We had a number of major battles, political battles here with attempts to repeal
    the Seattle city civil rights legislation that protected gay people in housing and et cetera. Which, of course, the ACLU
    was very involved in. Yeah, so I think that was sort of the role that I would be set to play. However, when I said to
    you about the date 1993, when Larry Gossett first decided to run for the [King] County council, and he had his big kickoff
    event, his kickoff campaign, he asked me if I would give the keynote speech, the keynote talk, and that was in 1993. I
    looked it up when he joined, when he was elected to the council, it might have been in the fall of '92, I don't know.
    His bio says in 1993 he was elected to the King County Council. So that probably was the fall of '93. So I of course knew
    Larry and worked with him through the Rainbow Coalition. And there were a number of other people active in the Rainbow
    Coalition that I did work with. I did a certain amount of work with folks from El Centro de la Raza, and yeah. I knew,
    I knew Bob Santos, and I'm thinking about some of the people who were the most active in different communities. And I
    did not know, of the ones who were usually noted from that period, I did not know Bernie Whitebear, who was very prominent
    in the Native American community. But certainly in terms of the Asian American community, the Latino community, the Black
    community, as well as a lot of progressive white activists. I had lots of connections and did lots of issue organizing
    with them.
- speaker: Interviewer
  text: And in relation to that, could you talk a little bit about what communities did the Rainbow Coalition organize in?
    What were the demographics of the Washington State Rainbow, and how did the Rainbow approach race, gender, and sexuality,
    and how does that impact the organizing of the Rainbow?
- speaker: Respondent
  text: Well, again, you're packing a lot into your questions. I don't know whether I have a particular take on responding
    to that, as compared to other people whom you're interviewing. The Rainbow Coalition, obviously, was an early manifestation
    of kind of politics, or political currents or whatever, that are even more prominent today. That's to say, you know, you
    take something like El Centro, if you know the history. Folks--I was not involved, this is prior to my time--took over
    this abandoned school building and declared that it was going to be, it's like the African American History Museum down
    on MLK in the Central District. It was the same thing. It was an abandoned school building, and it was taken over by activists,
    and after a period of time, the city or the school board said, "Okay, you can have it," kind of thing. So the Rainbow
    Coalition did not, in my recollection, play a particularly strong leadership role in LGBT organizing. There were other
    organizations in that community that did, but of course it was very supportive. And I guess you could say that also about
    the various ethnic communities, there were leadership organizations. The Rainbow Coalition was a coalition, I guess that's
    the best way to--it was a way for people to be supportive of other communities of which they were not primarily a member,
    which I think was very important for there to be that kind of cross fertilization and cross support. And the Rainbow Coalition
    served that purpose. And then, of course, it did provide a focus for the Jesse Jackson campaigns, yes. But it's very interesting,
    I haven't thought this through, why it sort of tapered off in terms of strength and effectiveness. It may have been that
    the organizing within the individual communities became so strong and so prominent that people were certainly continued
    to be, reflexively, continued to be supportive of things that were going on in other communities. You know, I mean, there
    was still a lot of cross support, but I don't recall. I mean, after a period of time, it wasn't like the Rainbow Coalition
    met regularly and said, "Okay, now we have to deal with this issue that the Black community is facing," sort of thing.
    But it did provide, the Washington State Rainbow Coalition certainly did provide a structure for a lot of support. Could
    that support have come? Would it have come in the same way? Well, there would have been attempts to do it, but I don't
    know if they would have been as effective. I mean, it became important if you want to support something that is facing
    a particular community to know and to work with, have worked with some of the people who were taking on a leadership role
    in that community, right? You're better able to be effective or be of assistance. So certainly the Rainbow Coalition provided
    that. I would not call it a mass organization. You know, it's not like--we each had lots of contacts, and again, many
    of the people active in the Rainbow Coalition were there formally or informally as representatives of other organizations.
