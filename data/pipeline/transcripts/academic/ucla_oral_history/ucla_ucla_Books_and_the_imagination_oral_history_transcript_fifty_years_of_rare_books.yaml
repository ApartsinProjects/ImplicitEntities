collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early years in Fort Worth and how you got started in bookselling?
- speaker: Respondent
  text: I was raised in Texas and moved to Southern California as a young man. I arrived destitute with a wife and child.
    I worked at any itinerant job I could find to support my family, and eventually found a niche as a bookseller in a hallway
    on Hope Street, close by the Los Angeles Public Library and across from the Bible Institute.
- speaker: Interviewer
  text: What was it like when you first started your bookshop?
- speaker: Respondent
  text: It was a very small space, just five or six feet wide, that had once been the hall entrance to a stairway leading
    up to some abandoned rooms. I established my first bookshop there. It was always worth the stop just to chat with me,
    even if people didn't buy much because my stock was made up of rare books.
- speaker: Interviewer
  text: How did Los Angeles influence your work and the literary scene?
- speaker: Respondent
  text: Los Angeles was known as 'The Queen of the Cow Counties' with a pleasant climate where the chief objective was to
    enjoy it. There had been minor literary activities early in the century, but in general, Southern California was artistically
    and literarily barren. I arrived at an opportune time as Los Angeles was just beginning to awaken.
- speaker: Interviewer
  text: Can you describe the development of your shops over the years?
- speaker: Respondent
  text: I moved my shop around the corner on Sixth Street to slightly larger quarters. Lloyd Wright designed a charming place
    for me. He did another one a few years later down the street, and Walter Bearman designed a perfect beauty in the old
    coach house of the Earle estate on Carondolet just off Wilshire Boulevard. Finally, I moved to the Red Barn on La Cienega
    Boulevard.
- speaker: Interviewer
  text: Who were some of the people that gathered around your shop?
- speaker: Respondent
  text: My shop attracted a vibrant group of people—writers, artists, printers, and book collectors. They came not only for
    the books but also to enjoy the stimulation of a small renaissance enhanced by my enthusiasm and articulate leadership.
- speaker: Interviewer
  text: What role did your shop play in the literary community?
- speaker: Respondent
  text: It was a gathering place for young writers who started a magazine called Opinion. The magazine was published to give
    currency to pure passion and prejudices, intelligently written on subjects of pertinency and interest. Contributors included
    Louis Adamic, Merle Armitage, Walter Arensberg, Carl Haverlin, Phil Townsend Hanna, Carey McWilliams, W.W. Robinson, Paul
    Jordan-Smith, and Lloyd Wright.
- speaker: Interviewer
  text: Did your shop have any connection to the arts beyond books?
- speaker: Respondent
  text: Yes, in a back corner of the shop was a small art gallery where I hung many important shows with foresight and taste—Edward
    Weston, Paul Landacre, Rockwell Kent, Marie Laurencin, and Kathe Kollwitz. Most were the first shows of these artists'
    works in the West.
- speaker: Interviewer
  text: How did you influence printing and publishing in Los Angeles?
- speaker: Respondent
  text: I induced the premier printer in Los Angeles, Bruce McCallister, to cooperate in publishing a couple of books, including
    Los Angeles in the Sunny Seventies and Sarah Bixby Smith's Adobe Days. This led to the formation of my Primavera Press,
    one of the first publishing houses in Los Angeles. I encouraged and commissioned young printers emerging in the early
    thirties.
- speaker: Interviewer
  text: Can you tell me about some of the printers and projects you worked with?
- speaker: Respondent
  text: I helped Grant Dahlstrom operate Arthur Ellis's Albion handpress to produce the Ampersand books. I had Saul Marks
    print my catalog, The King's Treasury of Pleasant Books & Precious Manuscripts. It is possibly as handsome a catalog as
    has ever been printed, though by the time it was delivered, most of the books had been sold. I also gave commissions for
    pamphlets by Carl Sandburg—the first of many to follow.
