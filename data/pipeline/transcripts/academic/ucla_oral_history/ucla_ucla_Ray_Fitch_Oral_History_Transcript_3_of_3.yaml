turns:
- speaker: Respondent
  text: I was trying to pick up my train of thought. I won the semi-final heat on the second day, and then we had about two
    and a half hours for me to think about the fact that I had just broken the world's record in the thing. Now, the world's
    record nowadays - it's so much faster than it was then. My world's record was 47.8 seconds. Imbock's world record was
    48 flat, and the world's record that Eric Liddell would break in the final heat was 47.6. Those aren't comparable to nowadays,
    but there is a lot of reason why - more efficient track and more training where we in those days trained while we worked.
    Nowadays they train for a year or so before the finals, and the one fact I've tried to reiterate here is that nowadays
    they know that the quarter mile is a sprint all the way, and these fellows are sprinters. In those days they thought of
    the quarter mile as a little distance race. And we were trained - coached to lay back in the middle, as we called it in
    those days "to coast in the middle of the race" and then speed at the start and a big burst of speed at the end, which
    I thought I could do with Eric Liddell.
- speaker: Interviewer
  text: So, then you came on back directly after your week in England?
- speaker: Respondent
  text: We went back to our camp. It seemed logical because we had to wait for a certain time when the boat was due, and there
    was no place else for us to go. So, this was the last day at the camp, but it's after we went to England.
- speaker: Interviewer
  text: You went back to France and then came - -
- speaker: Respondent
  text: We went back to France, I should say. I don't know that there was anything particular about the trip back except for
    the fact that we had about half as many athletes and twice as many people along who were girls fortunately.
- speaker: Interviewer
  text: Did you get a good welcome when you went back, when you got back into the United States?
- speaker: Respondent
  text: Well, we had a "Fifth Avenue" welcome. We had a parade up Fifth Avenue, and we went up to the steps of the New York
    City Hall. Mayor Highland, I believe his name was, at that time, gave a welcoming speech and so on. It wasn't anything
    like Lindbergh's, but it was still a very good thing. There was on the Olympic Team a high school boy, who was a sprinter
    on the Olympic Team, from the New York area. People began yelling his name - I can't think what it was now, and the Olympic
    Team took it up. They said, "Rodney for mayor, Rodney for mayor, Rodney for mayor." So, we marched down Fifth Avenue yelling
    that...!
- speaker: Interviewer
  text: Well, let's see. Loud speaker - I guess he's giving a speech or just showing off.
- speaker: Respondent
  text: Oh, he's showing off, yes.
- speaker: Interviewer
  text: Smoking wasn't forbidden for athletes?
- speaker: Respondent
  text: Not on the trip back. I don't remember ever having seen any athletes on the way over smoking.
- speaker: Interviewer
  text: Dolly Netter?
- speaker: Respondent
  text: One of the girls - there were three girls I got acquainted with on the way back. Two of them were American society.
    They went to college just outside of San Francisco. What is that famous girls' college in California? One of them was
    from Connecticut and went to college clear across the country. They were very nice girls, and I was interested in them.
    And the third girl was about as far away from them as you could imagine. She was an English - what do they call their
    vaudeville shows? Wait a minute, they have a name over there. Well, the English vaudeville. She was a dancer in the English
    vaudeville, and she got to be so good that she became a dancing teacher and was sent over to teach an English company
    in New York to put on a dance at a revue. She was very nice, and her name was Dolly Netter. I got acquainted with her.
    It was quite a little difference from the society girls, but I enjoyed all three of them.
- speaker: Interviewer
  text: That made the trip interesting.
- speaker: Respondent
  text: Green Goddess!
- speaker: Interviewer
  text: That's the goddess of liberty.
- speaker: Respondent
  text: Yes, and "A good picture," Ann says. It looks like the heads are cut off.
- speaker: Interviewer
  text: Yes, it cut off the man's head. Ann Rathum. That was my Connecticut girl. I was really caught with her - if Connecticut
    hadn't been such a long way away! I might have found a wife there because she was worthwhile.
- speaker: Interviewer
  text: And I guess this is the newspaperman coming aboard and so forth.
- speaker: Respondent
  text: This is on the deck. Most of us were gathered there. And that's about it.
- speaker: Respondent
  text: And I guess we stayed overnight in New York. Then, what a letdown - got on the train and went back to Chicago. The
    next day started - eight hours of work again. I got back and reported to work. I told the boss, "I'm back, and I had a
    nice trip." And he said, "Why did you come back so soon?" I said, "I thought I had a job here, and I should get back as
    soon as I could." He said, "You were on the Olympic Teams, why didn't you go to Rome or Stockholm or some place where
    a lot of the athletes went?" Imagine how I felt; I got back just too soon!
- speaker: Interviewer
  text: What was your life then after the Olympics?
- speaker: Respondent
  text: 'After the Olympics, as I said, I went right back to the same job at the Chicago Union Station Company, and I saw
    the station rise up to eight stories, which at that time was as high as it went. It is higher now. Then, as I said, an
    engineer is an educated tramp. The engineers were getting fired right and left because their jobs would run out. My job
    as an inspector of public utilities - they were still putting in new utilities, and I was needed. But finally in 192?
    the boss, and he wasn''t the original boss, he was just a secondary one that was left there - he called me in and said,
    "Horace, (he called me Horace for four years!) I''m afraid your job is over with. I''m afraid that you''re out of a job
    from now on." Which I certainly didn''t wonder about because I was just waiting for the axe for a while, and my job was
    over. So, I went to an engineering - actually, I was talking to a friend, I said, He said, "I saw in Printers'' Ink (Printers''
    Ink is a magazine about publishers) that an engineering magazine wants an associate editor, an assistant editor." And
    I looked up the copy of Printers'' Ink, and it was in Chicago. I went over, and I got the job. So, for two years I was
    an assistant and an associate editor of Rock Products Magazine, which deals with quarries, sand and gravel plants, cement,
    and all that kind of thing. That took me to - all over the country. I got as far down as Georgia, Nebraska, and Wisconsin.
    I did cover some conventions. National Safety Council in New York City. I went to Horseheads, New York, which is a town
    that has a history, I don''t doubt, though I don''t know it. So, I was going around. One week of every two: one week we''d
    stay in Chicago and put our paper together and write our stories; the next week we''d get in our own car and go maybe
    to Iowa, maybe to Wisconsin - wherever there was a good story for a cement plant or about the building of these things
    and the operation of them. But, you see what that did to training. Now, I was still running for the Chicago Athletic Association
    in good standing, but for those two years I would be out of town and usually at a hotel or something like that where -
    where could you find a place to train? And when I got back to Chicago, we worked overtime. If I tried to train after I''d
    had a day''s work on the paper, I''d get home about nine o''clock at night. That''s no good.'
- speaker: Interviewer
  text: Were you married at that time?
- speaker: Respondent
  text: Right at the end of that - no, not quite then. I was married the following year. So, in 1927 to 1929 I was in a very
    bad position to train, and the Olympics were to be at Amsterdam in 1928. I had decided that frankly I thought that I'd
    had such an easy time in the 1924 Olympics that I could make the '28 Olympics, and I think I could have if I had had a
    chance to train. So, I trained as much as I could, and the tryouts were at the new Philadelphia stadium which they called
    the Sesquecentennial Stadium because it was one hundred and fifty years after the Declaration of Independence. It has
    another name now, but it's still there. And I got through in the trials. I got through the preliminaries, the second race,
    but in the semi-finals I had pulled a muscle. I just couldn't run, and so I was out of it. And I said when I got out,
    when I stopped panting, I said, "That is my race!" And it was.
- speaker: Interviewer
  text: What did your life consist of then after your Olympics?
- speaker: Respondent
  text: I had the dirtiest thing, I think. There was an associate editor at Rock Products who thought he had a better job,
    and so he resigned. I was promptly made associate editor. And then his job didn't pan out, and he came back to the editor-in-chief
    - and I think this is skullduggery. He said, "I want my old job back." The editor-in-chief said, "You've got it." Then,
    he called me in and said, "Sorry, you're out of a job." Just like that! And so, what could I do? I talked to a friend
    of mine, a fraternity brother. In fact, he was later my best man at my wedding. And I said, "What in the heck can I do?
    It's a hard time to get a job right now." The Depression hadn't started, but it was a hard time. He said, "You graduated
    in engineering, why don't you go down to the University of Illinois and ask for a job on the faculty?" I said, "Huh? I'm
    no professor. I never did talk in front of a class!" He said, "Well, you've got your degree, so why don't you go? You
    won't lose anything." I'll be darned if I didn't go down there and get the job without more than half trying! So, I became
    - at the end, in September, 1929 I became an instructor at the University of Illinois. And I've never regretted it since.
    Very good success.
- speaker: Interviewer
  text: You stayed there for a long time?
- speaker: Respondent
  text: Actually, no. I went back. I went there in 1929 and about a month after I went there, the big crash came. Whoop-de-do!
    It was really something, but it didn't affect colleges for a couple of years yet. It was the small-time daily worker that
    got affected first. Finally, in 1932, it affected the colleges, and the head of our department called us in - all four
    of us - and said, "Sorry, boys, the powers that be, the president's office says that we've got to cut our faculty down.
    So, I've got to cut two of you fellows off the staff." We looked at each other. We were all young fellows and all married
    within the last four years. And then, he sort of smiled and said, "Now, I know that maybe because you're all married,
    you're worried about getting another job. You all want to be college teachers, and to be a college teacher you've got
    to have a Master's Degree. Not any of you have got a Master's yet, but you could get one if you'd stay another year. So,
    I proposition you, take half time for the next year and finish your Master's Degree. Then, you can go anywhere you want
    to." And we looked at each other, and I suppose all of us were worried to death what our wives would say. So, we said,
    "Yes, we'll do it." And you know, we lived on half salary, and we lived well. Maybe because we had wives to tell us how
    to spend our money, I don't know.
- speaker: Interviewer
  text: That helps.
- speaker: Respondent
  text: But actually it worked out fine. We didn't have any - we didn't feel deprived, I mean. We didn't eat fillet mignon
    or things like that, but it just worked out fine. All four of us got our Master's Degrees, and then the following year
    they did have to fire all of us, but we were ready to get a job out teaching. The only time that I was out of teaching
    after 1929 was that following year. That was the year that FDR came into the Presidency, and he started the - had it started--
    the Civilian Conservation Corps. The Dean of Engineering wrote to the head of our State of Illinois CCC and said, "We've
    got a bunch of good men who don't have jobs." That included four of us and some recent graduates, too. And so, the four
    of us were all given CCC camps to operate the engineering part. They had an army major to take care of the discipline,
    but we did all the engineering. We had these young engineers and "ag" engineers to be our lieutenants. Each one of them
    had a squad of his own, six or eight - I think it was about eight men each one had, and we had a pickup truck. I had a
    pickup truck to go around and visit all of the work that they were doing and see what they were doing. It was really very
    nice.
- speaker: Interviewer
  text: And what kind of work did they do?
- speaker: Respondent
  text: Well, of course, in the mountains they did a lot of trail-making. Not being any mountains to speak of in Illinois,
    there are some - don't laugh! There are some in Illinois, but what we did was erosion control because there were a lot
    of places where the fields were being eroded. And we built dams; we planted trees; we planted special grasses like lapradisa,
    which holds the soil in place. We did enough so that I wrote a Master's - no, not a Master's degree, a Civil Engineering
    degree on the erosion control for small drainage areas. You see, some of these that have crazy names. I think that's a
    pretty good name - "Erosion Control for Small Drainage Areas"! We built dams; some of them were six or eight feet high.
    And the farmers were glad to have them because they made ponds, not very big ponds, but the boys like building log dams.
    It was fun. They didn't care so much about planting trees, but, boy, we planted a lot of them.
- speaker: Interviewer
  text: Where did you go? How long did you work for the CCC?
- speaker: Respondent
  text: Well, I got the job in June and then stayed there a year, which included - by the way - we were at Pittsfield, Illinois.
    Do you know where that is?
- speaker: Respondent
  text: Well, it's right - it's in a county which is half-way - which stretches from the Mississippi to the Illinois right
    across that -
- speaker: Interviewer
  text: The bottom?
- speaker: Respondent
  text: No, it's the hilliest place in Illinois! That county is all up and down, which is completely different from most of
    Illinois. And that's why they had so much erosion there because it was hilly country. I stayed there; and about November,
    I guess, they said, "Pick up your camp, entire camp, two hundred fellows and all the personnel and go to the Ohio River
    at - well, there's a State Park down there on the Ohio River in Illinois. We had a barracks built right in the State Park,
    and we stayed there all winter so we could work all winter because there's not much snow on the ground. Then, in the winter
    we went back to Pittsfield again so that that really is an exciting thing to take a couple - we had World War I trucks,
    which were always breaking down, and we had a fine older man who could fix those trucks up. I don't know how he did it,
    but he kept those trucks - each individual group had a truck of its own, and he kept them running. I don't know how he
    did it. And I stayed there until a year after September. My wife and I had talked. We had had a good time while we were
    there, but I found out that she liked being a faculty wife. I liked - I don't know why - I just seemed to fit into teaching,
    so we decided to look in to there are certain organizations which hire teachers. They may hire them in botany or something
    like that, but I was interested in the ones that hire them in engineering. And it was pretty hard to get into college
