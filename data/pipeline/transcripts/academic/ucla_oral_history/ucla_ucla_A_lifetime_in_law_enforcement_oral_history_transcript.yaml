collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family and early years in Nebraska?
- speaker: Respondent
  text: I was born in Stamford, Nebraska, in a small town. My upbringing was very much that of a small-town Midwestern boy.
    My father managed to make an auto parts business successful during the Depression.
- speaker: Interviewer
  text: What first interested you in law enforcement?
- speaker: Respondent
  text: I was always interested in either the military or the Federal Bureau of Investigation. I had an appointment to the
    United States Naval Academy at Annapolis, but it failed because of my color blindness. So I entered law school at the
    University of Nebraska and joined ROTC.
- speaker: Interviewer
  text: What was your career path after law school?
- speaker: Respondent
  text: After graduating in 1940, I joined the FBI. My career there was a political credential of sorts. I also served in
    the military during the war. Later, I moved to Los Angeles and worked in the legal field. I became involved with the Pasadena
    Young Republicans and was eventually elected Los Angeles County Republican chairman.
- speaker: Interviewer
  text: How did you become a judge?
- speaker: Respondent
  text: I became acquainted with Robert H. Finch, which helped me become a Los Angeles Municipal Court judge. My wife Mildred
    was also politically active and ran for state senate in 1952.
- speaker: Interviewer
  text: Tell me about your 1958 campaign for Los Angeles County superior court judgeship.
- speaker: Respondent
  text: It was a tough race because the incumbent had an electoral advantage. But it was an important step in my career. We
    also had associations with Richard Nixon during that time.
- speaker: Interviewer
  text: What about your personal meetings with President Nixon?
- speaker: Respondent
  text: I had several personal meetings with him, which were significant in my political career.
- speaker: Interviewer
  text: Why did you decide to run for Los Angeles County district attorney in 1964?
- speaker: Respondent
  text: I wanted to take a nonpartisan stance and focus on law enforcement. I had support from the black community and the
    Los Angeles Police Department. I also worked to recruit minorities into law enforcement and appointed Earl Broady as deputy
    district attorney.
- speaker: Interviewer
  text: What was your relationship like with Attorney General Thomas C. Lynch?
- speaker: Respondent
  text: We had a good working relationship. The district attorney's office worked closely with the Reagan administration during
    that time.
- speaker: Interviewer
  text: Tell me about your 1970 campaign for state attorney general.
- speaker: Respondent
  text: I faced primary opponents and focused on issues like organized crime, consumer concerns, environmental issues, and
    busing. The general election was against Charles O'Brien. It was difficult to raise money for a statewide race, but I
    had support from Governor Reagan and used the Baus and Ross campaign firm.
- speaker: Interviewer
  text: What changes did you make in the state attorney general's office?
- speaker: Respondent
  text: We reorganized the office and developed the Division of Special Operations. Charles Barrett was chief deputy. We sought
    opposing staff positions on controversial issues and appointed moderates to command positions. We also established regional
    law enforcement offices.
- speaker: Interviewer
  text: How was your working relationship with Governor Reagan?
- speaker: Respondent
  text: It was very good. We worked together on the California Council on Criminal Justice and the Office of Criminal Justice
    Planning. We distributed federal funds from the Law Enforcement Assistance Administration and practiced grantsmanship.
- speaker: Interviewer
  text: What were some criticisms of the council activities?
- speaker: Respondent
  text: Some criticized the funding for technological gadgetry and the way decisions were moved through the council.
- speaker: Interviewer
  text: What was your role in recommending legislation?
- speaker: Respondent
  text: The attorney general's office was responsible for recommending legislation. We worked on the 'Onion Field' legislative
    package and dealt with the Assembly Committee on Criminal Procedure.
- speaker: Interviewer
  text: How did the Serrano decision impact your work?
- speaker: Respondent
  text: It had an impact on reapportionment and the death penalty ruling, which we had to address.
- speaker: Interviewer
  text: What was your personal position on the death penalty?
- speaker: Respondent
  text: I supported the death penalty and had to consider the effect of U.S. Supreme Court decisions on state law.
- speaker: Interviewer
  text: What other stands did the attorney general's office take?
- speaker: Respondent
  text: We took action against substandard nursing homes and were involved in the Commission on Judicial Appointments.
- speaker: Interviewer
  text: Tell me about judicial appointments during your tenure.
- speaker: Respondent
  text: We dealt with appointments like William Clark and Rose Elizabeth Bird. There were issues about qualifications and
    the judicial appointment process. Paul Halvonik was another appointment.
- speaker: Interviewer
  text: Did you consider running for governor?
- speaker: Respondent
  text: Yes, I thought about it. I ran for reelection as attorney general in 1974 against William Norris.
- speaker: Interviewer
  text: What were some issues in the 1974 campaign?
- speaker: Respondent
  text: The Geotek incident was used against me, and there was a charge that I was 'soft on child molester.' It was a tough
    campaign.
- speaker: Interviewer
  text: How do you assess the Reagan administration's performance in criminal justice?
- speaker: Respondent
  text: I think it performed well. I also evaluate myself as attorney general and compare myself with Jerry Brown.
