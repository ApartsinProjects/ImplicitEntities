turns:
- speaker: Respondent
  text: I am Scott Dorman; I have lived here for 39 years.
- speaker: Interviewer
  text: What motivated your family to move to Estes Park?
- speaker: Respondent
  text: Well, we lived in a town called Gold Hill, which is just west of Boulder, a little mining town. And my family at the
    time moved up here and I was only 14, so I felt like I was not old enough to go out on my own so I'd better move with
    them. And it's kind of an interesting story in that I came on horseback to town because we had a couple of horses and
    the only ... we didn't have a horse trailer so I rode one of the horses from Gold Hill to here; it took 24 hours. So I
    came to town on horseback.
- speaker: Interviewer
  text: What was your first impression as you came over the hill into Estes?
- speaker: Respondent
  text: Relief to finally get off that horse [laughs], but it was ... I came down Highway 7, so didn't really go into downtown
    area. I had been in downtown a couple of times earlier that summer for the family, just kind of showing us where we were
    going to move to. And to me, it was kind of carnival-looking type of atmosphere at that time - lots of lights, neon signs,
    and they had arcades and things downtown. So I thought, "Boy, this is going to be pretty fun."
- speaker: Interviewer
  text: Now, what was the motivation for your parents to pack up and move?
- speaker: Respondent
  text: A job; job motivations.
- speaker: Interviewer
  text: Well, when you moved here, you went to Estes Park High School.
- speaker: Interviewer
  text: Can you tell me a little bit about your high school experience?
- speaker: Respondent
  text: My high school experience. Well, I moved here in the ninth grade. We had moved around quite a bit in previous years;
    originally from upstate New York and left there in the fifth grade. And then about every year, it seemed like we were
    moving, for a while. So I was a little intimidated coming to a new school; I felt like it was a little difficult. But
    I adapted and had an okay high school experience. I wasn't really into studying as much as I probably should have been.
    But I made it through high school and graduated.
- speaker: Interviewer
  text: Now, what was it like going to school in a community that has a fairly small population?
- speaker: Respondent
  text: Well, it wasn't as small as what I had just come from. So I mean, when we left Gold Hill, our family - I have ten
    brothers and sisters - we were half the population of that community. So moving to Estes Park was actually quite a step
    up as far as population-wise, so I didn't really consider it a small community at that time.
- speaker: Interviewer
  text: Well, great. I read that you've had a number of different kinds of jobs before settling in the position that you're
    in now. You seem to have done just about everything. What motivated you to try all those different things?
- speaker: Respondent
  text: Well, most of those were during my high school years. I worked . . . they had kind of work study programs and things
    and I, you know, washed dishes and I bussed tables and I worked as a bellhop at the Stanley Hotel for a little while and
    I worked at McGraw Ranch for two summers. So it was just kind of to earn extra money for the family at that time. So a
    lot of those earlier jobs, I had quite a few different ones. After I graduated from high school, I thought I wanted to
    be an aircraft mechanic, so I went to school down in Broomfield, Colorado Aerotech, to become an aircraft, AMT, mechanic.
    During that time, I kind of got interested in electronics and I started in the electronics field, working with cable TV,
    and then also eventually working as an electrical contractor; getting my license and all of that.
- speaker: Interviewer
  text: Did you always harbor an interest in the firefighting profession, or was this something you stumbled upon?
- speaker: Respondent
  text: Oh, no. I actually - actually, my mom even had given me a picture, a photograph, that she had taken when I was about
    two - diapers drooping with . . . washing a fire chief struck; or, car. I had always ... (it was a pedal car) and I had
    always wanted to be a firefighter. I think every little boy always ... if something that they always want to do. So it
    was always in the back of my mind that that's what I wanted to do. In Estes Park, I never thought about it ever being
    a career, but it was always an interest.
- speaker: Interviewer
  text: Well, I see that you've brought us some examples of different hats that you're worn during your career, or just different
    hats that are representative of. . . ?
- speaker: Respondent
  text: These are all different hats that I have worn since I've been on the fire department, and I've been on for, now, 22
    years. This was the first hat that I'd worn. At that time, we just put tape across to put your name, and it had worn off
    so I just put a new one on there; and they just wrote your name on there. But as a rookie, at that time, you got all the
    old equipment - which you still do as a rookie nowadays, but our equipment's a little bit better. The bunker gear that
    we wore was real heavy then; it was canvas on the outside with wool liner, so it was very heavy and bulky. And this was
    the helmet - probably not a lot of protection, but it gave me some. That was the first one I wore that first year. And
    then I graduated up to this helmet. You see they're all . . . actually, they're kind of black. It's not dirt; it's actually
    smoke that's burned into the helmet so it won't wash off. But I wore this one for quite a few years. This was the newer
    style at that time; urban-style helmet. Then when I became a chief, I got the same style helmet but moved up to a white
    helmet. And you can see this one's been pretty hot at times as well. I wore this one for . . . let's see, about ... I
    got this in '97, so I wore it until just last year. Then we changed to a new helmet, which is this style. And since it's
    fairly new, it looks new; it hasn't had very much exposure to fire yet at this point, but. . . .
- speaker: Interviewer
  text: Now, as fire chief, how often do you actually go out on fires, or what makes that . . . determines that?
- speaker: Respondent
  text: Well, we have . . . run under what's called incident command system. So the first firefighter that arrives on scene
    is actually the incident commander. So they run the fire unless it's too large or something that they can't handle, and
    then they will transfer command up to the next officer or to the chief. Many times, the chief is the first one on scene
    because the chiefs, whether it's myself or one of my assistants, go directly to the fire, where everybody else has to
    go to the fire station first to get the apparatus and then go to the fire. So quite often, we are the first ones on scene.
    And as first one on scene, we are . . . our job is to organize and orchestrate what's going on - to make sure that the
    other apparatus is placed properly, we have the right equipment that's responding, and kind of prioritize what needs to
    be done, whether it's rescue or fire suppression or whatever. Quite often, I will find myself not in the commander position,
    but I will be working as a firefighter. And those are kind of the best times because then I don't have to worry about
    anything else except doing one specific job. And, like all firefighters, we enjoy going inside and doing the hot work,
    I guess.
- speaker: Interviewer
  text: Well, what sorts of positions have you held in the fire department?
- speaker: Respondent
  text: I have been a training officer; I've been a safety officer; been an assistant chief; of course, chief. Just your firefighter.
    I've been a dive team member as one of the original founders of our dive rescue team. We had four members that started
    a dive team and I'm the only one that's still on the department. I also helped start our EMS program. I first got on,
    I wanted to become an EMT, so I was an EMT for 14 years as well. So I've had a lot of different hats and different types
    of things throughout the years.
- speaker: Interviewer
  text: Now, what was the motivation to become fire chief? Was it just a logical progression or. . . ?
- speaker: Respondent
  text: I felt that there were some ... an area that I could make some changes in that I felt like needed to be made. I was
    asked by some of the other members if maybe I would want to step up into that position; I was already an assistant chief
    at that time. And it was kind of a natural progression. I don't think, when I originally got on as a firefighter, I ever
    thought about being the fire chief. I think I just got on wanting to be a firefighter, so that was maybe exciting enough.
- speaker: Interviewer
  text: Well, great. What do you find to be the most challenging aspect about being the fire chief?
- speaker: Respondent
  text: The most challenging aspect. It would have to be the motivation of the volunteers. I'm dealing with a lot of different
    personalities, a lot of different age groups. As volunteer firefighters, I've got really young people and some older firefighters
    as well. And trying to find out what motivates those people and interests them to keep coming to fires and to keep doing
    the training. It's not like we're a New York City department where there's so much excitement going on every day that
    just responding to calls is excitement enough. We don't have that situation - even though our call volume has been increasing,
    there still has to be something done to motivate the people. And also for retention, to keep them on the department. It
    used to be that . . . when I first got on, we ran about 85 calls a year, I think, that first year. We're running about
    500 calls now a year, so that has helped in the motivation. But we also look at how long people are staying on. It was
    very common, back then, for the firefighters to do 20 years of service. Volunteerism isn't the same as it used to be,
    and nationally, a volunteer firefighter does three years. We do much better than that; we're probably up around seven
    or eight years, on an average, for a firefighter, and we feel lucky if we can get ten years out of a firefighter. Not
    to say that we still don't have some that are putting in the 20 years, but it's a far less number now than it used to
    be.
- speaker: Interviewer
  text: What do you think's responsible for that shift in volunteerism?
- speaker: Respondent
  text: I think quite a few different things. One is just the economics of it. Back when I first started, 22 years ago, there
    weren't so many . . . households didn't need both parents working to bring in enough income to pay the bills. There was
    more time available. We didn't run as many calls so the training wasn't quite as rigid so there was a lot more time available
    for them to donate to the department. That time is very limited now. And I think that a lot of the younger firefighters
    that come in to be a volunteer look at it as maybe a steppingstone to become a career. So some of it's attitude, some
    of it's just the economics of the era now.
- speaker: Interviewer
  text: How have you seen the balance of men and women in the volunteer positions change over your tenure there?
- speaker: Respondent
  text: Men and women - as far as men and women firefighters, or. . . ? Volunteers, yes.
- speaker: Interviewer
  text: The . . . when we first started, we didn't have any women on the department; when I first started, I should say. And
    it wasn't until probably about eight or nine years ago that we had our first woman firefighter. And that was probably
    quite a change for the firefighters themselves, to diversify and to realize that, yes, women can do this job just as well
    as they can. And unfortunately, just because of the size of our community we don't get very many women that try out. But
    I'm not sure if I answered your question or not. Right now, we don't have any women on the department; the last one that
    we had moved out of the area.
- speaker: Interviewer
  text: Good. What sorts of . . . actually, what do you feel has been your greatest accomplishment since becoming fire chief?
- speaker: Respondent
  text: My greatest accomplishment as a firefighter or fire chief or as personal accomplishments?
- speaker: Interviewer
  text: It could be either.
- speaker: Respondent
  text: Well, personally, it would have to be just being able to make a good living in Estes Park. I mean, that's a challenge
    for a lot of people. And to be able to live here and be able to build a home and to have a living, I feel like that's
    a . . . and have a great family. I have six kids and five grandkids and one on the way, and be able to have all that,
    that's a great personal accomplishment. Professionally, I would think it's taking the department from where it was as
    far as even how it was, a very professional department, and moving it up even a step higher and making it more professional,
    and continuing on with what I was taught and sharing that information and knowledge with the new firefighters that are
    coming in. So hopefully, leading us in a new direction to do our jobs safer and more professionally.
- speaker: Interviewer
  text: How do you think the Estes Park Fire Department compares with other communities of the same size?
- speaker: Respondent
  text: Of the same size, I think that we are doing an extremely good job. I think that we would be right at the top of any
    of the others. We take training and safety very seriously. Our members are some of the most dedicated people I've ever
    met and I think that that shows in our responses and just the commitment that they have to go to the extra trainings and
    to respond to calls in the middle of the night and do all of that. We have increased our ISO rating, which is Insurance
    Services Offices rating, from a Class 6 to a Class 4, which equates to quite a bit of savings to the community in insurance
    premiums. Just for them to be able to want to go that extra step to do that is not anything that was really asked of them
    to do, but they felt like it was something more they could do to the community; not just responding to calls but we saw
    an area where we could help the community financially and ... by becoming a better fire department and doing certain things.
    And that was a big accomplishment for the firefighters to do that.
- speaker: Interviewer
  text: What do you think is responsible for the increased number of calls over the past couple of decades?
- speaker: Respondent
  text: A couple of things. One is our scope of services. When I first got on, a fire department responded to fire-related
    incidents. We did some rescue-type things but no medical, we didn't do any ambulance type of calls or extrications; that
    was all done by a private ambulance service at that time, even the vehicle extrications. We didn't do any of the hazardous
    materials cleanup; we didn't have a dive team. So a lot of it is just increasing, or expanding, our scope of services.
    We do a lot more to the community. The community expects a lot more from us so we provide those services. So of course,
    that's going to increase our call volume. Another item is just population growth. I mean, we've seen a tremendous growth
    in population in our area and because of that, of course, our call volume's going to go up as well.
- speaker: Interviewer
  text: Good. Well, you've hinted at that, but how do you feel like Estes Park has changed in general over the years?
- speaker: Respondent
  text: I would say that a lot of it is because of the population that we've had; growth. Also, Estes Park, when I first came
    here as a 14-year-old, it was pretty much a summertime community. People moved here to try to work in the tourist trade,
