collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Mr. McClure, how long have you been in work for the blind?
- speaker: Respondent
  text: Since 1950, in the Department of Social Welfare. The first aid to the blind law was enacted in 1929 and became effective
    in August and I went to work for the State at that time on a temporary basis, getting out application forms. In 1930 it
    really got rolling.
- speaker: Interviewer
  text: Mr. Sundquist, were you in on getting that law passed?
- speaker: Respondent
  text: Yes, I was one of those who was interested, under the leadership of Dr. Perry. While Dr. Perry was a teacher at the
    School for the Blind in Berkeley, from about 1912 until he retired in about 1945, he came into contact with and inspired
    many blind persons, one of whom was Ernest Crowley, who became a member of the State Legislature in 1936 and remained
    there until his death in 1958 or 1953.
- speaker: Interviewer
  text: Mr. Crowley was blind?
- speaker: Respondent
  text: Right. Mr. Crowley was the author of the first aid to the blind law which was drafted by Mr. Crowley and Dr. Perry
    and was enacted in 1929.
- speaker: Interviewer
  text: Prior to the 1929 statute granting aid to the blind, what was necessary?
- speaker: Respondent
  text: It was necessary for the organized blind of California to propose an initiative amending the State Constitution which
    had heretofore precluded the possibility of the State Legislature granting any state funds directly to any individuals
    or on behalf of any individuals. So Article 4, Section 22 was amended by, at that time, the most overwhelming Yes vote
    ever given an initiative measure by the people in 1928, to permit the legislature to grant money to the counties to help
    them to assist needy blind persons.
- speaker: Interviewer
  text: What group of organized blind people worked on that?
- speaker: Respondent
  text: 'This was the precursor of the California Council for the Blind, which was not established until 1934. It was a group
    established by Dr. Perry in 1898 called the California Alumni Association of Self-Supporting Blind. That was the nucleus.
    And there were those closely identified with Dr. Perry: Mr. Raymond Henderson of Bakersfield, who has since passed away
    and who was a great labor attorney over the years; Ernest Crowley.'
- speaker: Interviewer
  text: Was Ernest Crowley a student of Dr. Perry?
- speaker: Respondent
  text: Yes, he was a student at the School for the Blind in Berkeley and later a student at the University of California.
    He took his law degree. I think it was largely through Dr. Perry's prodding that Mr. Crowley's folks were convinced that
    he could become someone important.
- speaker: Interviewer
  text: What about Raymond Henderson?
- speaker: Respondent
  text: Mr. Henderson was also a student at the School for the Blind around the turn of the century, pretty much with Dr.
    Perry. Under Dr. Perry's inspiration he went to the University here in Berkeley and became a very successful labor attorney.
    He died about five years ago.
- speaker: Interviewer
  text: Were you a student of Dr. Perry?
- speaker: Respondent
  text: Yes, I entered the School for the Blind in Berkeley in 1918 and was there about four years, finishing sixth, seventh,
    eighth grades and high school and then I entered the University of California in 1922. It was in 1918 that I first came
    in contact with Dr. Newel Perry.
- speaker: Interviewer
  text: Was Dr. tenBroek a student there at that time?
- speaker: Respondent
  text: Yes, I think Chick tenBroek, as we call him, must be about six or seven years younger than I am, but he was one of
    the younger kids, as we put it.
- speaker: Interviewer
  text: Did these kids and these University students work on this initiative?
- speaker: Respondent
  text: Yes, they took an active part and became very interested in trying to better the lot of blind persons in California.
- speaker: Respondent
  text: At the time that Dr. Perry and his fellow crusaders were beginning to blaze new trails in this whole area of social
    endeavor, the lot of the blind, by and large, was a very unhappy one. They were persons who were perhaps locked up in
    the institution company so that nobody would see them. They had no money with which to buy tobacco or do anything else.
    They were really second-class citizens. It never occurred to almost anyone that a blind person could go to a university,
    let alone aspire to secure a doctorate degree. Until, pretty much, Dr. Perry began to pioneer that area. He graduated
    from the University in 1896, I believe, got his master's here and then went to Munich, Germany, to get his Ph.D. in mathematics.
