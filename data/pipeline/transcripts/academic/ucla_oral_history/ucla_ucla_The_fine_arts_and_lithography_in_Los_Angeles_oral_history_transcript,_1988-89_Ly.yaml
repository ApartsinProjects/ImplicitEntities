turns:
- speaker: Interviewer
  text: I'd like to begin our discussion today by talking a little bit about your background. Would you mind telling me a
    little about your family, where they're from and how they came to California?
- speaker: Respondent
  text: The family originally came from northern Switzerland and southern Germany. That is, the Kistler family. My maternal
    grandmother was English. The Kistlers migrated to this country from Germany in about 1723 or around that date. They first
    settled in New York and finally drifted down to Pennsylvania, where they established themselves. There is a Kistler Valley
    in Pennsylvania now, which is outside of Allentown. It's quite a beautiful, green valley and farming and dairy country.
    I've been back there twice, and I'm the only member of this branch of the family that's been back to the old home. The
    first time I went back, we ran into some Kistlers there. There were quite a few of them living there at that time. That
    was back in about 1940, in that area. I thought that I had probably run into a group of people that were representative
    of the whole family. They had a big stone house and a large barn. They were farming people. I was working in New York
    at the time and I had a New York license on my car, so that they were quite suspicious of me and didn't receive me very
    well, although I did make it clear that I was a Kistler. I found the valley there a very beautiful place. There's a church
    up on the hill. There's a cemetery, and most of the stones in the cemetery were Kistler stones. I'm not sure-- Well, the
    second time we went back was with Lelah here. We came in from Ohio and down into Pennsylvania. We ran into some people
    at the head of this valley that were quilting, making a quilt. It was quite a beautiful thing. We were quite impressed
    with it. They said that they still got together every Saturday, I think it was, and did some quilting. When was that date?
    Do you remember, Lelah? You remember the date thereabout? Yeah, it was right in there, '81 or '82. So after visiting with
    these very nice people for a while, why, we went on down the road, and I found a sign on a garage. It said "William A.
    Kistler Garage." That was my father's name, and I felt quite at home. Then we went on down the valley a little ways, and
    we came to a sign that said "Aunt Grade's Gift Shop." I stopped and I said, "Let's go in and see Aunt Gracie and see what
    she knows." So we went up the driveway a little ways, and there was a stone house to the left of the road. We looked around
    there, and we found a cornerstone on the house that said, "This house was built in 1812"--was it, Lelah?--"by Samuel Kistler."
    I have a Bible, an old Bible, and it says in it, "This belongs to Samuel Kistler." Well, there were so many Kistlers there
    and there were so many Samuels, I don't know whether they're any of my relatives or not. But I kind of felt at home. I
    felt as though I'd struck gold when we hit there and we ran into this Samuel Kistler and that I had a Bible of his. It
    was a very beautiful place and quite prosperous, however, because they had another house built up on the hill, and that
    house had a plaque on it that said it was built in 1825, I think. So the difference between the two dates, they were quite
    prosperous apparently. They had been able to afford a better house and had built it there. They had a nice duck pond down
    below, and we chased the ducks around and tried to get them to come and eat, but they wouldn't have anything to do with
