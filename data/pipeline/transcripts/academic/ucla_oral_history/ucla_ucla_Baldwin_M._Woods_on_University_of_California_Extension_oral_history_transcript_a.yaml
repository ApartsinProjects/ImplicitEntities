collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: Extension began interesting me several years ago, and I served on the Extension Advisory Board for some time, about
    1938 or 1940. Then in 1942 the President asked me to become Director. I had not been in the administration for several
    years and I was then without an administrative post. And so he and I had quite a conversation about this, and I agreed
    to write him. I agreed to write him what I believed. And then he would write me a note saying what he thought about it.
    And we would reach some common ground.
- speaker: Respondent
  text: Now I have known the President a long time since about 1911 or 1915, and I've worked with him since 1915 or 1916,
    so that there was no problem of getting acquainted with him, although there are some administrators who do find it a problem,
    but that is another story. I thought that first of all we should think of the largest group to whom we would render services
    as a group that contained alumni of this and other institutions. We should not think, however, of Extension as a remedial
    service to take care of the people who didn't finish high school, because the high schools of the state public school
    system now have a service of that type.
- speaker: Interviewer
  text: The Junior college system?
- speaker: Respondent
  text: Yes, and they have a public and adult service that affects more than a million and a half or two million people a
    year and is almost free. The State of California has on the whole the most adequate general pattern of adult service that
    there is in any state. New York State has probably second, and then some other states have some very good services. Pennsylvania
    State University and the University of Michigan have good services.
- speaker: Respondent
  text: So I wrote the President saying that I thought we should plan first to serve our own graduates and the graduates of
    other universities and colleges. And that we should plan to serve them so that they could keep up. I made the point, and
    I think I made it last time, that when you are graduated from college, you know, you've been exposed to instruction and
    courses that cover about half of what you need, and within a few years after you leave, the instruction you've received
    is out of date, and so are you. So that it doesn't, you can't assume at all that you're educated completely.
- speaker: Respondent
  text: That isn't so. Then I told him I thought we should also seek very strong support from the faculty. We should persuade
    the departments, convince the departments, that each department had something that ought to be done towards our classes,
    and that when we got that arranged, we would then seek correlation with the departments. We should be meticulous about
    following the rules of the Academic Senate for approvals, even though we were mistreated in the process, which would be
    likely to happen. It hasn't happened as much as I thought it would. We should also be interested in the general culture
    of people.
- speaker: Respondent
  text: So we would have perhaps a three-part program. First, dealing with keeping people up to date in their professions;
    second, keeping them up to date in the understanding of the duties of citizenship, which are changing. The emphasis is
    changing. Their basic phenomena and requirements are of course the same. They're the ones that are usually talked about
    in the newspaper as though they constituted the whole thing. But they don't. And in that third place we should try to
    have a pattern of study that would help a man keep up to date in adjusting to himself as he grew older and matured, because
    that was the original aim of the college, to make the man a personal philosopher, study the philosophers so that you got
    a philosophy of life. And that's one of the reasons why the early colleges nearly always had theology in their curricula
    because theology so commonly plays a part. We do not teach theology, at least sectionalism.
- speaker: Respondent
  text: I mean sectarianism, and so we would start more with a philosophy, and those three things put together would be the
    program for a while, and it would take you about twenty years' work on each one of them, so it would take the rest of
    his life.
- speaker: Respondent
  text: The president wrote back and I think that those ideas coincided with his own thinking very closely, and he hoped I
    would go ahead.
- speaker: Respondent
  text: So I did. Beginning in the summer of 1942, I became Director. I caused some disturbances, inevitably. I had tried
    to cause very few because the people in Extension to be effective and ambitious and have freedom of action and must have
    a sense of freedom about them. The motto of Stanford University is useful, "Die luft die freiheit," "The wind of freedom
    blows." And of course our own is not bad, "Let there be light."
- speaker: Interviewer
  text: A bit I wanted to ask you a question - you went in in 1942, during the war years. Were there unusual demands and pressures
    on Extension at that time?
- speaker: Respondent
  text: Yes. And they taxed some ability as administrator because they shouldn't have been. I mean to say there were disagreements
    about who should have run them which should not have existed. It should not have existed. It should have been resolved
    through conference and give-and-take.
- speaker: Interviewer
  text: Disagreements as to who should run what?
- speaker: Respondent
  text: The instruction in certain fields useful to wartime. For example, the training of men for the shipyards in the upper
    levels. And so on. And as a result the President finally decided that beginning time College of Engineering would run
    all of the courses that dealt with engineering, science, business administration, and were useful for training various
    personnel. It was a challenging subject, and I was on the National Advisory Committee appointed by the President of the
    United States to run that program, so that to have it assigned to a different agency here made it a little awkward. I
    talked with the engineering people. I'd been in engineering so many years. They all looked at me with a certain amount
    of deference; I was the old timer.
- speaker: Respondent
  text: So we started with these courses. They were running them. I kept back and forth from Washington in a meeting at least
    once a month to a regular meeting back there. We set up a small office with about three or four people in it, and worked
    very well. The main thing was to persuade the manufacturer of wartime material that he needed to do any instructing. He
    thought that he didn't need anything or he'd just go out and hire some more engineers. But we had the national figures
    and we knew that the supply was about gone, that when he went out to hire them, there wouldn't be any. So we said, "What
    have you done about trying women to do jobs that engineers usually do?" Some of them held up both hands in horror at that
    and said that of course the women could not succeed, and we thought the girls could do it. Of course that would be a crazy
    idea of professors. But we had the last word in that because we trained them for mechanical drawing and airplane design,
    for example, design of parts and for certain other things, blueprint reading.
- speaker: Interviewer
  text: Did you make any effort to recruit students or did they just come?
- speaker: Respondent
  text: We used the company and got students in cooperation with them into a class. We broke a rule that had been in effect
    for years. We had had a rule over the years that anyone who met the qualifications for admission to a class could take
    it. In this case you had companies who didn't want the students that were going to work for them mixed up with anybody
    else. Trade secrets they had that they wanted to tell them. I knew about that. If he's been a professor of engineering,
    he knows those things. And so we finally decided since we seemed to run up against a stone wall on that every time to
    make exceptions, if they would supply us a full class. Then we would let the class consist solely of prospective employees.
    Nobody else could get into it.
- speaker: Interviewer
  text: There was a shortage of teachers generally in this period. How did you get teachers to teach these subjects?
- speaker: Respondent
  text: They went out and got them. It was very interesting. The University had not had so much pressure on its own teachers,
    and the teaching assistants, and so on were available. Unfortunately a good many of them didn't know enough in the applied
    side. In physics, for example, they would know more about nuclear physics than anybody on the outside but to teach just
    nuclear physics wouldn't do the job; you had to teach what happened when you tried to apply it. For example, building
    the atomic bomb was an engineering project, not a science project, which lots of people never realized. But in the process
    a lot of physicists learned to be engineers. They caused a good many headaches, but they came along fairly well. And no
    doubt the engineers caused their headaches too.
- speaker: Respondent
  text: This was the way it was done, and pretty much, it was found that the girls could do better drawing and better blueprint
    reading and better designing than the boys could. This was extremely comforting to some of us, who wanted - the women
    weren't working at that time as they are now. The increase in the percentage of women who work since 1942 or '43 is really
    phenomenal. I don't remember what it is right now, but at one time or other I've known.
- speaker: Respondent
  text: So that was roughly the way the classes were. How we insisted that we should have some classes at high levels where
    we said, some of your vice presidents would be the teachers. "Mr. Douglas, you detach a few of your vice presidents."
    He said, "They're working twenty-two hours a day trying to turn out airplanes. We can't have them around teaching." We
    said, "They will turn out a few more airplanes a day if you'll just let them do a little teaching, because they will teach
    a good deal and they will learn a great deal from the questions they'll have to answer, and they'll be astonished at how
    many they can't answer."
- speaker: Respondent
  text: Well, this was some more of the problem of the professor. So this inducing of the companies to use their own personnel
    as teachers, we to approve each one separately. We examined his credentials just as the Budget Committee does. Made it
    very hard for them. They couldn't understand this process. But the thing went quite well. I would go to a meeting in Washington,
