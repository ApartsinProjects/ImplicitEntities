collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: You were born in San Francisco?
- speaker: Interviewer
  text: Then you are a native Californian.
- speaker: Interviewer
  text: It's very fitting there that you should have been the first living person, now that Mr. Caldeira is dead, to have
    seen the Plate. Did you go to the University of California?
- speaker: Respondent
  text: No, I never did, I was born December 31, 1871 and the family moved over to France at the end of '79. From that time
    then, I went to school and college in France and passed my examinations there. In the meantime my father had kept his
    interests here and he used to make trips occasionally to attend to business here. In 1890 I came back and became a resident
    of California until the present, with, of course, many trips to Europe in between.
- speaker: Interviewer
  text: Yes, I understand you just got back from Europe.
- speaker: Interviewer
  text: What was your position in 1933?
- speaker: Respondent
  text: In 1933 I was with the Bank of America. I was Chairman of the Board.
- speaker: Interviewer
  text: What was the occasion of your being over at Drake's Bay that day?
- speaker: Interviewer
  text: You had gone out shooting?
- speaker: Respondent
  text: Shooting quail. I was a member of a country club that had shooting rights on about 15,000 acres of land between Point
    Reyes Station and the Pacific Ocean (including a strip of land on Drake's Bay). The country club owned a club house located
    on the road between Point Reyes and the lighthouse.
- speaker: Interviewer
  text: This country club was a part of the Pacific Union Club?
- speaker: Respondent
  text: Not exactly a part. It was an off-shoot of it. None but members of the Pacific Union Club were eligible for membership
    in the country club. At that time it was down to very few members. They were all, of course, Pacific Union Club members.
- speaker: Interviewer
  text: You have listed here as members, Mr. Frank Anderson, President of the Bank of California.
- speaker: Respondent
  text: Yes, he was a member.
- speaker: Interviewer
  text: And Mr. Harry Pair.
- speaker: Respondent
  text: Yes. Mr. Anderson has died since but Mr. Pair is living.
- speaker: Interviewer
  text: Mr. H. W. Van Sicklen.
- speaker: Respondent
  text: Yes, he was a member of both the Pacific and the country club.
- speaker: Interviewer
  text: And Mr. Volkmann, Mr. Allen Chickering, and yourself. Did they all go out shooting there quite often?
- speaker: Respondent
  text: Oh yes, they all went shooting there often.
- speaker: Interviewer
  text: At the time you went out there, the day the Plate was found, were any of your friends with you?
- speaker: Respondent
  text: No, not at that place. They were shooting on other parts of the property.
- speaker: Interviewer
  text: So you were out alone, so to speak?
- speaker: Respondent
  text: I was alone there with one of the club men and with my chauffeur.
- speaker: Interviewer
  text: What was your chauffeur's name?
- speaker: Respondent
  text: We used to call him "Kelly," but his real name was...
- speaker: Interviewer
  text: I noted in one account that it was William Caldeira.
- speaker: Respondent
  text: Caldeira, yes.
