source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early musical education and how you discovered your gift of perfect pitch?
- speaker: Respondent
  text: I was born in St. Petersburg, and my first piano lessons were given by my aunt, Isabelle Vengerova, who was an accomplished
    pianist. She discovered early on that I had perfect pitch, which is considered essential for musicianship. When she became
    a professor at the St. Petersburg Conservatory, I entered her piano class. Before being admitted, I auditioned before
    Alexander Glazunov himself and was given the highest possible grade.
- speaker: Interviewer
  text: What were your ambitions as a young musician?
- speaker: Respondent
  text: My overriding ambition was to become a concert pianist. I was confident in my abilities but neglected my practice,
    which meant that a career as a virtuoso never materialized. Instead, I earned my living playing in silent movies and giving
    lessons.
- speaker: Interviewer
  text: How did the political situation in Russia affect your life and career?
- speaker: Respondent
  text: When World War I broke out, I was called up but served in a regimental band in St. Petersburg rather than at the front.
    As the revolution made life dangerous, I left Petrograd and moved south. From 1918 to 1923, I was displaced, spending
    time in Kiev, Yalta, Istanbul, Bulgaria, and finally Paris.
- speaker: Interviewer
  text: What was your experience working with Serge Koussevitzky?
- speaker: Respondent
  text: In Paris, I met Koussevitzky, who engaged me as a rehearsal pianist. This was very useful because I learned the works
    of Stravinsky and other modern masters. I even prepared a performing edition of Le Sacre du Printemps that Koussevitzky
    used for many years.
- speaker: Interviewer
  text: How did you come to the United States and what were your early experiences here?
- speaker: Respondent
  text: I arrived in America in 1923 as an opera coach at the Eastman School of Music in Rochester. I spoke no English at
    first but learned quickly with the help of my friend Paul Horgan. Later, I resumed working with Koussevitzky in Boston,
    but our relationship soured and we parted ways.
- speaker: Interviewer
  text: Can you tell me about your conducting career and your work with modern American composers?
- speaker: Respondent
  text: In 1927, I organized the Chamber Orchestra of Boston to premiere works by avant-garde American composers like Henry
    Cowell and Charles Ives. Their music was difficult for most conductors, but I was committed to presenting it. We gave
    premieres of Ives's Three Places in New England and Cowell's Suite for piano and orchestra, among others.
- speaker: Interviewer
  text: What challenges did you face as a conductor of modern music?
- speaker: Respondent
  text: There was a lot of resistance. For example, when I programmed Ives and Schoenberg at the Hollywood Bowl in 1934, the
    audience reacted very negatively. After that, my conducting career came to an abrupt end because I was considered too
    radical.
- speaker: Interviewer
  text: How did you shift your focus after your conducting career ended?
- speaker: Respondent
  text: I turned to musicology and lexicography, producing important books like Music Since 1900 and the Lexicon of Musical
    Invective. I also traveled extensively, including to South America and the Soviet Union, promoting modern music and fostering
    cultural exchange.
- speaker: Interviewer
  text: What are some of your contributions to music theory and education?
- speaker: Respondent
  text: My Thesaurus of Scales and Melodic Patterns, published in 1948, has become very popular among jazz musicians. I have
    also edited major reference works like the International Cyclopedia of Music and Musicians and Baker's Biographical Dictionary
    of Musicians.
- speaker: Interviewer
  text: Are you still composing music?
- speaker: Respondent
  text: Yes, I continue to compose. My first published work in the U.S. was a piano suite called Studies in Black and White
    in 1928. More recently, I published an album of fifty Minitudes for piano, which are very small pieces.
