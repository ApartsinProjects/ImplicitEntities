collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early impressions of Los Angeles?
- speaker: Respondent
  text: I was born in Atlanta, Georgia, and moved to Los Angeles where I had various jobs, attended school, and was active
    in church. My early experiences shaped my views on community and opportunity.
- speaker: Interviewer
  text: What role did you play during World War I?
- speaker: Respondent
  text: I served in the war and was involved in supporting black hospitals and efforts toward hospital integration.
- speaker: Interviewer
  text: How did the Great Migration affect the black community in Los Angeles?
- speaker: Respondent
  text: The Great Migration brought many African Americans to Los Angeles, leading to rapid growth of the black community
    but also housing problems and racial discrimination in real estate.
- speaker: Interviewer
  text: Can you describe your involvement with the People's Independent Church of Christ and other social activities?
- speaker: Respondent
  text: I was involved in founding the People's Independent Church of Christ and participated in social activities including
    the Negro baseball league and the Young People's Lyceum.
- speaker: Interviewer
  text: Tell me about the founding of Golden State Mutual Life Insurance Company.
- speaker: Respondent
  text: Golden State Mutual was founded by Norman Houston, William Nickerson, and myself. We developed the company by selling
    certificates of contribution to community supporters and overcame legislative challenges aimed at preventing a black-owned
    insurance company.
- speaker: Interviewer
  text: How did Golden State Mutual grow and what was its business philosophy?
- speaker: Respondent
  text: We expanded to Oakland and learned the insurance business thoroughly. Our philosophy was to provide opportunities
    for young employees and break race barriers in the industry.
- speaker: Interviewer
  text: What were your civic activities and roles within Golden State Mutual?
- speaker: Respondent
  text: I served on the grand jury, was involved with the National Negro Insurance Association, and helped break race barriers.
    Within Golden State, responsibilities were divided to support company growth and community ties.
- speaker: Interviewer
  text: How did Golden State Mutual handle racial policies and community support?
- speaker: Respondent
  text: We maintained strong ties to black churches, supported minority foundations, and navigated challenges during the Depression
    era to serve our community effectively.
- speaker: Interviewer
  text: What was the impact of the Great Migration and the Depression on Golden State Mutual?
- speaker: Respondent
  text: The Great Migration provided a growing clientele, and despite the Depression, we expanded to Chicago and cooperated
    with other black-owned insurance companies, leading to enormous growth in the 1940s and 1950s.
- speaker: Interviewer
  text: Can you discuss leadership opportunities and commendations you received?
- speaker: Respondent
  text: Golden State provided financial security and leadership opportunities for employees. I received commendations for
    my work with selective service boards, postwar reemployment programs, and community affairs.
- speaker: Interviewer
  text: What was your involvement with the Los Angeles Housing Authority Commission?
- speaker: Respondent
  text: I served on the commission, became its president, and was involved in public housing programs, facing controversies
    and political pressures including those related to Chavez Ravine.
- speaker: Interviewer
  text: How did you interact with city officials and organizations like the NAACP?
- speaker: Respondent
  text: I had disagreements with Mayor Sam Yorty, served on various committees, and was involved with the NAACP, especially
    reacting to incidents like the arrest of Dr. H. Claude Hudson.
- speaker: Interviewer
  text: What role did the YMCA and Urban League play in the black community?
- speaker: Respondent
  text: The YMCA was important for desegregation efforts and community support. The Urban League provided skilled labor job-training
    programs and worked closely with Hollywood and other organizations.
- speaker: Interviewer
  text: How did political affiliations and social conditions affect the black community?
- speaker: Respondent
  text: Social conditions improved but challenges remained, especially under the Reagan administration. The black community
    shifted political support from the Republican to the Democratic party, and progress required continued effort.
- speaker: Interviewer
  text: What is the current status of Golden State Mutual and your views on politics and civil rights?
- speaker: Respondent
  text: Golden State is coping with economic difficulties and preparing for the future. I have associations with political
    figures like Richard Nixon but distinguish politics from civil rights, valuing leaders like Ralph Bunche for their influence.
- speaker: Interviewer
  text: Can you share your thoughts on opportunities for black athletes and figures like Jackie Robinson?
- speaker: Respondent
  text: Opportunities for black athletes to improve themselves have increased, and figures like Jackie Robinson have been
    instrumental in breaking barriers and inspiring progress.
