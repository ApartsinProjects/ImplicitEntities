turns:
- speaker: Interviewer
  text: Can you tell me about your early intellectual beginnings and how you became interested in social science?
- speaker: Respondent
  text: My early intellectual beginnings were shaped by the intellectual environment in Vienna during the 1920s and 1930s.
    I was particularly influenced by the Austrian school of economics and the works of Ludwig von Mises. The intellectual
    climate was rich with debates on positivism, socialism, and the role of social science in understanding society.
- speaker: Interviewer
  text: What was the intellectual atmosphere like at the University of Vienna during your studies?
- speaker: Respondent
  text: The University of Vienna was a vibrant place with many intellectual currents. There was a strong tradition of philosophical
    positivism influenced by Ernst Mach, and also a significant presence of Roman Catholic intellectual thought. The university
    fostered discussions on methodology and social science, and I was part of a circle called the Geistkreis, which was deeply
    engaged in these topics.
- speaker: Interviewer
  text: How did your experience at the London School of Economics influence your thinking?
- speaker: Respondent
  text: Teaching at the London School of Economics exposed me to a different intellectual climate, one that was more influenced
    by socialist intellectual currents and the work of Lionel Robbins. It was a place where economic thought was evolving,
    and I was able to engage with economists who were shaping twentieth-century English economic thought, including debates
    around Keynesian economics.
- speaker: Interviewer
  text: Could you describe your views on the role of competition in economic systems?
- speaker: Respondent
  text: Competition is essential as it acts as a mechanism for discovery and coordination in the market. It disciplines national
    monetary policy, for example, through mechanisms like the gold standard. Competition applied to money supply and exchange
    rates helps maintain economic stability and prevents arbitrary interventions that can distort the market.
- speaker: Interviewer
  text: What are your thoughts on the welfare state and central planning?
- speaker: Respondent
  text: I have been critical of central planning and the welfare state because they tend to undermine the spontaneous order
    that arises from decentralized decision-making. The Road to Serfdom discusses how central planning can lead to a loss
    of individual freedom and the dangers of rationalist interventions that ignore the complexity of social phenomena.
- speaker: Interviewer
  text: How do you view the relationship between instinct and civilization?
- speaker: Respondent
  text: Human values arise from three sources, including instinct and civilization. Civilization imposes cultural restraints
    that shape behavior beyond mere instinct. This cultural evolution is unconstructed and emerges over time, allowing for
    the development of social order and cooperation that cannot be explained solely by biological instincts.
- speaker: Interviewer
  text: What is your perspective on the intellectual history of anti-market thought?
- speaker: Respondent
  text: Anti-market thought often stems from misunderstandings about the nature of markets and social justice. There is a
    cultural origin to what is considered 'civilized' behavior, and market ethics form the basis for a civilized society.
    Demythologizing history and understanding the role of unions and popularizing libertarian principles are important in
    addressing these intellectual currents.
- speaker: Interviewer
  text: How do you assess the concept of equality in political discourse?
- speaker: Respondent
  text: Equality is a complex concept that is often misunderstood. Libertarian currents emphasize individual freedom rather
    than enforced equality. Government should provide a framework for freedom but not impose artificial equality, which can
    lead to coercion and undermine liberty.
- speaker: Interviewer
  text: Can you share your experiences with the Committee on Social Thought at the University of Chicago?
- speaker: Respondent
  text: Joining the Committee on Social Thought allowed me to engage with economists and intellectuals from various disciplines.
    It was a place for interdisciplinary dialogue, which enriched my understanding of economics as part of a broader social
    science. The interactions with figures like Frank Knight and Jacob Viner were particularly formative.
- speaker: Interviewer
  text: What are your views on the usefulness of aggregates and statistics in economics?
- speaker: Respondent
  text: Aggregates and statistics can be useful tools, but they often create myths about data in economics. Prediction in
    economics is difficult because social phenomena are complex and influenced by many factors. Epistemology in economics
    must recognize the limits of scientific precision and the role of interpretation.
- speaker: Interviewer
  text: How do you see the relationship between political institutions and democracy?
- speaker: Respondent
  text: Political institutions shape the direction of democracy by establishing rules and limits. The U.S. Constitution, for
    example, balances material law and formal law to protect freedom. Market society and free society depend on institutions
    that uphold individual rights and prevent the tyranny of the majority.
- speaker: Interviewer
  text: What influenced your interest in social science and economics?
- speaker: Respondent
  text: My interest was influenced by my experiences during World War I and the intellectual environment shaped by Mises and
    other Austrian economists. Economic practice is a form of unconstructed cultural evolution, and I was drawn to understanding
    how social orders emerge spontaneously rather than through conscious design.
- speaker: Interviewer
  text: How do you view the limits of economic science?
- speaker: Respondent
  text: Economic science has limits because it deals with human behavior, which is not always predictable or quantifiable.
    The Austrian and English traditions emphasize the importance of understanding the subjective nature of value and the pitfalls
    of relying solely on mathematical models or statistics.
- speaker: Interviewer
  text: What are your thoughts on the perils of unlimited democracy?
- speaker: Respondent
  text: Unlimited democracy can lead to the erosion of individual freedoms if majority rule is unchecked. There must be constitutional
    limits and a framework that protects minority rights and the rule of law to prevent the tyranny of the majority and preserve
    liberty.
- speaker: Interviewer
  text: How do you see the role of education in transmitting social values?
- speaker: Respondent
  text: Education plays a crucial role in transmitting social values and shaping intellectual styles. It can either reinforce
    traditions that support a free society or promote ideologies that undermine it. The Austrian tradition in economics emphasizes
    the importance of intellectual rigor and critical thinking.
- speaker: Interviewer
  text: Can you discuss the intellectual influences of Ludwig Wittgenstein on your work?
- speaker: Respondent
  text: Wittgenstein's work on language and logic influenced my understanding of the limits of knowledge and the importance
    of clarity in intellectual discourse. His sensory order and pattern prediction concepts resonate with the challenges of
    interpreting social phenomena and the limits of scientific knowledge in economics.
- speaker: Interviewer
  text: What is your perspective on law as a paradigm of institutional evolution?
- speaker: Respondent
  text: Law evolves as a form of institutional evolution that reflects social values and knowledge. Prices, for example, are
    a form of dispersed knowledge that law helps to organize. The threat to liberty often comes from attempts to impose rationalist
    constructivism rather than allowing evolutionary processes to shape social order.
- speaker: Interviewer
  text: How do you view the relationship between constitutions and political power?
- speaker: Respondent
  text: Constitutions organize principles and arbiters of conduct, setting limits on governmental power. They are essential
    for reimposing limits and ensuring that political opinion is influenced by consistent principles rather than arbitrary
    decisions.
- speaker: Interviewer
  text: What are your thoughts on spontaneous order and its role in society?
- speaker: Respondent
  text: Spontaneous order is the natural evolution of social institutions and practices without central design. It is evident
    in the evolution of Roman private law and the U.S. Constitution. This order supports classical liberalism and protects
    individual freedom against special-interest democracy and affirmative action policies that can discriminate.
- speaker: Interviewer
  text: How do you distinguish between 'material' law and 'formal' law?
- speaker: Respondent
  text: Material law concerns the substance and content of laws, while formal law relates to the procedures and structures
    through which laws are applied. Evolution through design often involves balancing these aspects to maintain social order
    and justice.
- speaker: Interviewer
  text: Can you describe your experiences with the joint seminar with Lionel Robbins at the London School of Economics?
- speaker: Respondent
  text: The joint seminar was an important intellectual forum where we discussed prices, production, and economic theory.
    Robbins was a significant influence, and the seminar helped shape my understanding of economic prediction and the meaning
    of prices in a market economy.
- speaker: Interviewer
  text: What are your views on the future of liberal principles?
- speaker: Respondent
  text: I believe liberal principles remain vital for preserving freedom and economic prosperity. However, challenges such
    as government intervention and inflation require vigilance. Personal moral dilemmas and the influence of economists like
    William Hutt also shape the ongoing development of liberal thought.
- speaker: Interviewer
  text: How did your early influences in economics shape your intellectual development?
- speaker: Respondent
  text: Early influences included the intellectual life of early twentieth-century Vienna and the works of Adam Smith. Issues
    in economics during the 1920s and 1930s, including capital theory and the socialist calculation debate, were formative.
    My work habits and approach to intellectual debates were shaped by these experiences.
- speaker: Interviewer
  text: How do you evaluate your own works and their impact?
- speaker: Respondent
  text: I have reflected on my works critically, recognizing intellectual origins and watershed moments such as The Road to
    Serfdom. The Ricardo effect and other innovative ideas emerged from these intellectual debates and have contributed to
    economic thought.
- speaker: Interviewer
  text: What are your thoughts on contemporary American culture and its intellectual challenges?
- speaker: Respondent
  text: Contemporary American culture is characterized by rapid change and a proliferation of information. World War I was
    a historical watershed that challenged traditional morals. Intellectuals play a crucial role in society, but there are
    fluctuations in popularity and controversies, such as those surrounding The Road to Serfdom.
- speaker: Interviewer
  text: How do you view socialism and psychoanalysis in society?
- speaker: Respondent
  text: Socialism in Great Britain and psychoanalysis have influenced cultural and intellectual currents. Freedom is a product
    of cultural restraints, and law and morals function to maintain culture. Perceptions of the United States vary, but these
    themes are central to understanding social dynamics.
- speaker: Interviewer
  text: Can you share your thoughts on the excitement of creativity and the role of instincts in civilization?
- speaker: Respondent
  text: Creativity and enjoyment in work are vital for accomplishment and recognition. Instincts and civilization interact,
    with intellectual threats to civilization arising from misunderstandings. Early intellectual interests often focus on
    these themes, highlighting the importance of honesty in a civilized society.
- speaker: Interviewer
  text: How do you see the relationship between economists and government?
- speaker: Respondent
  text: Economists often act as intermediaries between scholars and the public, but there can be intellectual incompatibilities.
    Religion remains inscrutable, and honesty is crucial for maintaining a civilized society. The relationship between economics
    and government is complex and requires careful navigation.
