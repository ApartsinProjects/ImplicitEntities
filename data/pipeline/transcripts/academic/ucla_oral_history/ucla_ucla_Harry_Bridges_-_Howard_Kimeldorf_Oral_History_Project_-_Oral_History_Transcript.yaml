collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: In 1924 - first of all, the union out here was busted up in the strike in 1916. That was before I ever came to this
    country, you see. I didn't land until about 1920. And then, I went to sea, and finally came back to the West Coast in
    1922 and went on the waterfront to work as a longshoreman for the latter part of 1922. 1924, the ILA charter, was issued
    by Ryan on the ILA on the East Coast, in San Francisco, the year 1924.
- speaker: Respondent
  text: Well that was one. So that didn't get anywhere, because we had a strong company union then. The "blue book" union,
    the Bay Area Longshoremen Association, see. And that union was very powerful, and the new ILA union was not able to fight
    that company union effectively.
- speaker: Respondent
  text: 1924, '25, '26 were prosperous years on the waterfront. There was lots of work, incidentally. And at the time, it
    was the company union got a lot of support from the official Labor movement, the company union. And eventually, there
    was a charter issued to it, by the Local Labor Council. Well, I must say that Ryan - now this was without Ryan's support
    or agreement, and he raised hell about it and got it canceled. Now this is 1924. Then the battle went on for the rest
    of the twenties, on the waterfront, trying to do certain things - I was a part of that, but it was kind of rank-and-file
    fights.
- speaker: Respondent
  text: Now the Marine Workers Industrial Union, which was a Party, a Communist Party, so-called union, was very active. At
    the same time, a couple of organizations - one organization called the Trade Union Unity League, that which preached that
    the organization, that could be the AFL unions, the CIO - no, there was no CIO - and the Party unions that there was unity
    in the whole AFL, regardless of your political beliefs, see. Of course, that was all - to unite the labor movement nationally
    there was a Trade Union Unity League and there was a Trade Union Education League. They were both Party organizations
    and they were very active. And this went on during all the twenties, till we come to the crash, the stock market crash
    in '28, see? So that borders the Depression. There was a lot of other activity. And then the -
- speaker: Interviewer
  text: I have a question about the MWIU and those unions. Did they have much of an impact among the longshoremen at that
    time?
- speaker: Respondent
  text: What the MWIU?
- speaker: Respondent
  text: Oh yes. But these longshoremen did not agree, you see. At that time. Now because the MWIU had a good program, which
    we aimed at later on a different way of the longshoremen and the seamen only in one union. And - but it wasn't the right
    thing to do. And we changed that around when we got going. And the unions really started organizing, probably in '32 onto
    '33 and so on, see. So that's the whole background. And Ryan did not oppose our organization. That is, organizing the
    union. Now there was a union, the local union being in existence all during the twenties, up in Tacoma. An ILA union and
    they had close contact with Joe Ryan. So that's how the whole thing came together. And Ryan, he supported the organization
    of the union all right. And issued the charters. But he was opposed to many of our politics, especially when we started
    something new in the union at that time. There had to be rank-and-file union all in control by the rank-and-file at all
    times. He didn't like that.
- speaker: Interviewer
  text: No, of course not. Let me ask you a couple of questions, just before we get to the '34 strike area, the Albion Hall
    caucuses was studied an awful lot by the government, my interests are not the same by any means. [chuckles]
- speaker: Respondent
  text: Who was that? What was that?
- speaker: Interviewer
  text: The Albion Hall? Caucus within the ILA?
- speaker: Respondent
  text: Oh that was our union!
- speaker: Interviewer
  text: Yeah. Now -
- speaker: Respondent
  text: Yeah, the Albion Hall, we set up a committee in 1933. I think it was '33, sure. Right in the middle of '33. We called
    ourselves the Committee of 500 to carry on the rank-and-file program in the unions. And to elect officers. And this committee
    used to be the Albion Hall, it was the Albion Hall Committee. The Committee of 500, the rank-and-file committee - it was
    more like the Committee of 50, you see.
- speaker: Interviewer
  text: So the Committee of 500 was the same as the Albion Hall Caucus?
- speaker: Interviewer
  text: Oh, I didn't realize that, okay.
- speaker: Respondent
  text: It was a rank-and-file committee we set up, we took over the marine workers paper - I think it was the Waterfront
    Worker - and we took it over and started published that and this and there, published by a rank-and-file group. All that
    stuff, all that stuff was in our library, the union library.
- speaker: Interviewer
  text: I've seen it, yeah.
- speaker: Respondent
  text: Well alright, the Waterfront Worker.
- speaker: Interviewer
  text: Let me ask you some questions, because I think, my own feeling is one of the reasons that--sort of left-wing leaders
    were much stronger in San Francisco than even anywhere on the West Coast was because they got inside the ILA before the
    '34 strike took place. So that guys like you, and Bulcke and a few others were in a position of being recognized rank-and-file
    leaders. And what I'm trying to figure out is why you decided to go inside the ILA, at that time, rather than to stay
    on the outside, and maybe organize in the MWIU, or something like that? Do you remember ever talking about those alternatives?
- speaker: Respondent
  text: No. Oh yeah, sure, we used to have all those alternatives. See us with the IWW, see us with the Wobblies! The Wobblies
    were very powerful out here at the time, in the twenties. You know they had a strike in Los Angeles. That was in '23,
    they had a strike in Portland in '22, I think. So yeah, we considered, we discussed those - the question of the MWIU.
    And we organized a meeting with the leader, I believe we had one. But I think - in 1933 we made a - that's when we made
    the decision, with the understanding and the cooperation of the Communist Party and the leadership of the MWIU, we would've
    had just a longshore union.
- speaker: Interviewer
  text: Okay, but the reason it's interesting to me is because the Communist Party line at that time - as I read it - was
    that we should build dual revolutionary unions, and yet, Sam Darcy, you know him?
- speaker: Respondent
  text: Sure, yeah. Sam Darcy and I were very good friends.
- speaker: Interviewer
  text: You were with him for quite a bit.
- speaker: Respondent
  text: And he was a great supporter of the strike and he organized the whole thing. Yeah, he was one of the ones - he was
    one of the parties we met with to say we couldn't go to the MWIU route, but we built a - have a longshore union, but then
    we set up a federation, which we amended into the Maritime American Federation of all the other unions. Then, we had a
    joint marine strike in '34, which included all the Waterfront unions and all the discretionary seamen.
- speaker: Interviewer
  text: Why do you think the left-wing forces were stronger in San Francisco during the thirties than in other ports? Do you
    have any ideas about that?
- speaker: Respondent
  text: I don't know. I'm not so sure I would say that. But San Francisco was a key port on the West Coast. A big, powerful
    port. And that's where the majority of the workers are. The biggest movement on the coast at that time was San Francisco.
    Now of course, in Los Angeles and their harbor down there - L.A. at that time was well-known as an open shop town. So
    we had our difficulties. But of course it wasn't the same, certainly it wasn't true for all the Northwest.
- speaker: Interviewer
  text: Let me ask you one other set of questions before we leave the thirties, and that's about the attitudes of the ship
    owners, how would you characterize their attitudes towards the unions at that time?
- speaker: Respondent
  text: Anti-union.
- speaker: Interviewer
  text: You want to elaborate that a little bit?
- speaker: Respondent
  text: Well there was a anti-communist drive. And there was a newspaper around there that said - a law firm around here -
    I forget his name there now - anyway, he was their best lawyer.
- speaker: Interviewer
  text: Was that it?
- speaker: Interviewer
  text: Was it Nomacoe?
- speaker: Respondent
  text: No, no. He was pro-red. Nomaco.
- speaker: Interviewer
  text: Oh, you're talking about it from their standpoint, huh?
- speaker: Respondent
  text: I'm talking about the employers, see. The ship owners and the Tom Plant was for the key leaders there. There was a
    law firm that used to represent William Randolph Hearst. And they got the anti-communist program going. When it came down
    to the '34 strike, they published a - in the San Francisco Chronicle as well as The San Francisco Examiner - story about
    the Party - that it wasn't a strike, it was a revolution, directed from Moscow. And if I took who was the chairman of
    the strike, I took my orders from Moscow.
- speaker: Interviewer
  text: I read that stuff, yeah.
- speaker: Respondent
  text: Right, then you know that.
- speaker: Interviewer
  text: What did the workers think when they read that sort of stuff? Do you have any idea?
- speaker: Respondent
  text: Well, some of them were persuaded. But we stayed with the workers down below and talked to them, and they got wise,
    you know just how it is. When San Jose, it was the - it wasn't the strike, it was a revolution. Well, then the works in.
- speaker: Interviewer
  text: Okay, how about the role of the Communist Party during the Maritime Strike? How important was that role?
- speaker: Respondent
  text: Very important, they were 100 percent in support. Very important. In a matter of fact, they had paper out here called
    the Western Worker and, in fact they made a maritime edition of the Western Worker about the official organization of
    the strike.
- speaker: Interviewer
  text: They also handed a lot of literature, on their own, and they submitted articles to the Waterfront Worker at the time,
    and they were arguing about the class nature of the struggle and everything else. Do you think the workers were influenced
    or at all radicalized by their -
- speaker: Respondent
  text: Well, now we did - now that was before we took over the Waterfront Worker. We had some articles because we were a
    bunch of editors. We all worked on the paper, there was no specific editor. We were all amateurs, you see - a little bit
    of help. So we're the ones that wrote those articles, and there wasn't much of that as far as I recall in the paper. If
    you going back - I'm talking about -
- speaker: Interviewer
  text: Okay, yeah the Waterfront Worker, you're right, there wasn't too much in there.
- speaker: Respondent
  text: That was after - that was before we took it over.
- speaker: Interviewer
  text: Yeah, okay. But the Party sent out a lot of - they did leaflets on their own, I know that.
- speaker: Respondent
  text: They were - they helped in any way. They were the ones that moved in, and they helped in any way they could. No doubt
    about that. They were a very, very important a venue of support.
- speaker: Interviewer
  text: Do you think it radicalized any of the rank-and-filers?
- speaker: Respondent
  text: Sure it did.
- speaker: Interviewer
  text: How about the violence that was directed against the men? I know it was very extensive, especially in San Francisco
    during the strike.
- speaker: Respondent
  text: Violence, yes, by the police department and by - they organized by what they called - vigilantes. And they were organized
    within - they had leadership from the labor movement.
- speaker: Interviewer
  text: How did the men relate to that violence? I mean what did they think about that? It almost seemed like there was a
    war going on, from what I read.
- speaker: Respondent
  text: Well they didn't budge. They were wise to what was going on. See, they were against the violence. Well, they were
    ready to meet it with violence. I had to tell them this was no way of doing it, you see. You had to meet them with mass
    strength of the strike.
- speaker: Interviewer
  text: Did - Many times the state would intervene against the strikers, either with the National Guard or something like
    that?
- speaker: Respondent
  text: No, they intervened after the big battle of July, July the fifth, when the ship owners, together with the - by that
    time that they started the Industrial Association, they took over operation from the strike away from the ship owners.
    And they were going to talk to the city government at that time, who launched a program who opened the port to them. The
    docks were chock-a-block with cargo by this time. Because the ships were unloaded by strike-breakers, but the stuff still
    stayed on the docks because the Teamsters weren't hauling. So on July the fifth, or July the third, the ship owners didn't,
    but the Industrial Association or the corporation, or the city government decided to open up the port. That was on the
    big battle of July fifth, and that's where we had our two men killed and the big battle, and it was on that battle the
    mayor issued a request to call out the National Guard, which they did. They put on enough pressure. So the governor at
    that time
