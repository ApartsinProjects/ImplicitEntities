collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your first performance and how you got started with dancing classes?
- speaker: Respondent
  text: I first saw a performance in Melton Mowbray, and that really inspired me. I started dancing classes where the barre
    was above my head. I began pointe work in socks, which was quite unusual. Queenie Green was one of my early influences.
    I was really bitten by the dance bug early on.
- speaker: Interviewer
  text: What role did your parents play in your early dance experiences?
- speaker: Respondent
  text: My mother and father were very supportive. They encouraged me to perform and take classes. I started performing at
    night when I was only eight years old. I had a real facility for memorization, which helped a lot.
- speaker: Interviewer
  text: What was your schooling like alongside your dance training?
- speaker: Respondent
  text: I attended a convent school and then had a private governess. I was three years ahead in school. During recess, I
    would hide under a desk to finish my homework so I could attend ballet school at night.
- speaker: Interviewer
  text: How did World War II affect your dancing and training?
- speaker: Respondent
  text: During the war, I performed on military bases. I studied for The Royal Academy of Dancing and Cecchetti examinations
    simultaneously. Wartime food rationing was tough, but I had private lessons with Mary Skeaping and studied and performed
    with Lydia Kyasht's company.
- speaker: Interviewer
  text: Can you tell me about your experience auditioning for the Sadler's Wells Ballet?
- speaker: Respondent
  text: I moved near London on my own at fifteen to attend the Sadler's Wells School. I observed company classes and performances
    and took classes at The New Theatre. Unfortunately, I had a devastating knee injury, but I went on to teach the junior
    associates group of the Sadler's Wells School.
- speaker: Interviewer
  text: What was it like being part of the development of Ninette de Valois' syllabus?
- speaker: Respondent
  text: It was a very exciting time. I was involved in forming the day school, the dancing school, and the Sadler's Wells
    Theatre Ballet. We worked on the level system of the school and helped develop the syllabus. I also observed Frederick
    Ashton and others choreograph works for the company.
- speaker: Interviewer
  text: How did the Sadler's Wells School evolve during your time there?
- speaker: Respondent
  text: The school grew in size and moved locations. We incorporated dancing classes into the day school and introduced uniforms
    and an education teacher. The bursar, Kathleen Hills, later became my mother-in-law. We also started to see television
    for the first time and met Brian.
- speaker: Interviewer
  text: What was your experience teaching ballet in Turkey?
- speaker: Respondent
  text: I was asked by Ninette de Valois to teach in Turkey for a year. I got a Turkish passport and had to react to inoculations.
    Living in Ankara, I taught ballet to children with Joy Newton. We had to learn Turkish to be paid and followed strict
    protocol regarding eating in public places. We made dancing clothes for the students and wrote a syllabus for the Turkish
    school.
- speaker: Interviewer
  text: How did cultural differences affect your teaching in Turkey?
- speaker: Respondent
  text: The children were beautifully mannered and cried when given corrections. There were difficulties teaching with limited
    Turkish language and trying to find pointe shoes and rosin. Turkish protocol about talking about body parts also affected
    how we taught ballet.
- speaker: Interviewer
  text: What happened after you left Turkey?
- speaker: Respondent
  text: The school in Turkey was carried on by Beatrice Appleyard, then Molly Lake and Travis Kemp. I felt the foundation
    had been set. Back in England, the Sadler's Wells School attained accreditation and began to consider adding a boarding
    school. Naomi Capon created a documentary about the Sadler's Wells School.
