collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name first.
- speaker: Respondent
  text: My name is Heiji Aoki.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: I am from Tochigi Prefecture.
- speaker: Interviewer
  text: Tell me about your family.
- speaker: Respondent
  text: My family lived on the outskirt of Utsunomiya City, but that part is in the city now. My mother was the second wife,
    and I had 2 stepbrothers and one stepsister. I was the oldest son and I had 3 real brothers and one sister. None of the
    boys succeeded the family, so my sister took a husband and succeeded.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1897. I am 81 years old now.
- speaker: Interviewer
  text: What was the occupation of your father?
- speaker: Respondent
  text: He was a farmer.
- speaker: Interviewer
  text: Did he have a large farmland and succeeded?
- speaker: Respondent
  text: No, it was in Japan, so the land was very small compared to ranches here. I remember him doing real estate business
    on the side.
- speaker: Interviewer
  text: Was your father a strict man?
- speaker: Respondent
  text: He was not too strict. When I was little our family was well-to-do in the village and had a store-house. My father
    and my grandfather lost money in speculation of some kind or something. Since then we became poor, so when I was around
    12 years old I went to Tokyo as an apprentice boy as I was the oldest son and there were many younger children in the
    family.
- speaker: Interviewer
  text: Was there much difference in ages between you and your stepbrother?
- speaker: Respondent
  text: No, not much. He is in Tokyo now, and his daughter, who is my niece and her husband came to visit me from Japan about
    3 years ago. They stayed with us for 3 weeks, and I showed them around.
- speaker: Interviewer
  text: Did your stepbrothers give you a hard time when you were little?
- speaker: Respondent
  text: No, not much. I went to Tokyo when I was around 12 years old. There were 3 children to the first wife. Then my mother
    came, and I was born. My grandparents lived in a retirement house next door, so they raised the first wife's children
    when my mother came. As the children grew to each other we used to quarrel. When the other children made me cry my mother
    used to hit me crying.
- speaker: Interviewer
  text: Why did she do that?
- speaker: Respondent
  text: In Japan we call it "nasanu-naka" (no blood relation). The first wife's children are not her own by blood. As I was
    her own child she loved me, but she hit me while she was crying. It was a complicated family. My father's brothers were
    living with us, too. My sister took a husband and succeeded the family.
- speaker: Interviewer
  text: Why didn't a son succeed the family?
- speaker: Respondent
  text: As we left home and went to Tokyo or other big cities when we were young, we didn't want to farm any more. The first
    wife's son was supposed to succeed the family but he didn't, and I was here, so my sister succeeded the family.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She didn't have much education, but she was very sentimental and a perfect mother. She was adopted to a big family
    which did not have any children. A few years later 2 children were born in that family, so she came to our village.
- speaker: Interviewer
  text: Your mother had a lonely childhood, didn't she?
- speaker: Respondent
  text: Yes, it was a complicated family. Her husband's brothers were living in the same family, and on top of that there
    were 3 children by the former wife. She came to such a family. Young people nowadays would not be able to stand that kind
    of a case.
- speaker: Interviewer
  text: How were your grandparents?
- speaker: Respondent
  text: They were in retirement, so they took care of the first wife's children. Grandfather lived till about 80 years old.
    My uncle died about 2 months ago.
- speaker: Interviewer
  text: How much education did you have?
- speaker: Respondent
  text: I only went to a grammar school.
- speaker: Interviewer
  text: Was it 6 years?
- speaker: Respondent
  text: In those days it was 4 years. That was the compulsory education. The year after I graduated it became 6 years.
- speaker: Interviewer
  text: Do you remember about your schooldays?
- speaker: Respondent
  text: I don't have anything to talk about it.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: I didn't like it, and I had younger brothers, so I went to Tokyo.
- speaker: Interviewer
  text: What kind of thing did you play?
- speaker: Respondent
  text: Around New Year we played tops or flew kites. When it snowed we walked on stilts. Nowadays there are so many cars
    that we cannot go to our neighbor's except from the back.
- speaker: Interviewer
  text: Did you go fishing when you were a child?
- speaker: Interviewer
  text: What did you do after school?
- speaker: Respondent
  text: I did not help the family much as I was little. In summertime we went to the bamboo thicket and picked up bamboo sheath
    and sold them to make pocket money.
- speaker: Interviewer
  text: What do they do with them?
- speaker: Respondent
  text: In those days we hardly used papers. When we buy pastry, miso or when we take lunch we wrapped them in bamboo sheath.
- speaker: Interviewer
  text: Were they big bamboo?
- speaker: Respondent
  text: We dried bamboo sheath and used them for wrapping.
- speaker: Interviewer
  text: How much did they cost?
- speaker: Respondent
  text: They were very cheap. We sold them to make pocket money.
- speaker: Interviewer
  text: About how many sheath did you pick?
- speaker: Respondent
  text: We picked 10 to 15 bundles of them, and sold them to merchants who came to buy them.
- speaker: Interviewer
  text: What did you do when you went to Tokyo at the age of 12?
- speaker: Respondent
  text: At first I went to a tabi (Japanese socks) maker's as an apprentice. In those days they were not made in factories
    but at homes. It was domestic industry, so there was no other worker beside me.
- speaker: Interviewer
  text: Did your father know?
- speaker: Respondent
  text: My father didn't, but my relation's son who was attending Waseda University was boarding at this tabi maker's home,
    and heard that they needed a helper.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: Just a little bit of sewing or going on errands. Of course I didn't get paid. In those days you had new Kimono made
    on bon festival (festival of lantern) and New Years and get to go home.
- speaker: Interviewer
  text: About how many days could you stay home?
- speaker: Respondent
  text: Overnight. I don't know about people who lived far away. We could go home twice a year.
- speaker: Interviewer
  text: Was it very hard?
- speaker: Respondent
  text: I didn't have a hard time.
- speaker: Interviewer
  text: Were they kind to you?
- speaker: Respondent
  text: Yes. I stayed in Tokyo since then, and worked at a pastry shop and other places until I reached the draft age.
- speaker: Interviewer
  text: About how many years did you work at the tabi or shop?
- speaker: Respondent
  text: I didn't work there too long, less than two years.
- speaker: Interviewer
  text: Where did you go from there?
- speaker: Respondent
  text: I think I worked at a pastry shop.
- speaker: Interviewer
  text: What did you do at the pastry shop?
- speaker: Respondent
  text: I was still young then, so I did odd jobs. When I worked at Kimuraya bakery in Mita near Keio University I was older,
    so I remember about that time well.
- speaker: Interviewer
  text: You moved around, didn't you?
- speaker: Respondent
  text: Yes, I moved around when I was young.
- speaker: Interviewer
  text: What kind of recollections do you have about the time you were in Tokyo?
- speaker: Respondent
  text: I remember when Emperor Meiji died I was in Mita which was not far from the Imperial Palace. It was in August and
    was hot in the daytime, so people went to the Imperial Plaza at night to pray for his recovery. All kinds of organizations
    and individuals came carrying paper lanterns. We left home to enjoy the evening cool, but when we arrived at the Imperial
    Plaza we saw people sitting on the ground and praying. I still remember that scene. Then there was the Imperial funeral.
    The day after the funeral General Nogi and his wife committed suicide, and the extra was out reporting their death. Later
    the blood stained floor mat of General Nogi's room was shown to the public.
- speaker: Interviewer
  text: What kind of hardship did you have while you were working as a shopboy?
- speaker: Respondent
  text: I was healthy, so I did not feel anything hard.
- speaker: Interviewer
  text: About what time did you get up in the morning?
- speaker: Respondent
  text: I usually got up between 6 and 7 in the morning. In those days there was no Saturdays or Sundays. The bakers had the
    1st and the 15th of the month off, but the apprentice boys did not have any day off.
- speaker: Interviewer
  text: Did you eat breakfast after you got up around 6 or 7 O'clock?
- speaker: Respondent
  text: When I worked at Ehmura-Ya Bakery I delivered bread to regular customers' houses before breakfast. I had breakfast
    after that. Then I walked around the residential area taking orders. In those days sake (rice wine) stores, fish stores
    and other stores took orders from the customers in residential areas.
- speaker: Interviewer
  text: About what time did you come back?
- speaker: Respondent
  text: After coming back from taking orders I ate lunch, and delivered the merchandise in the afternoon.
- speaker: Interviewer
  text: What did you do at night time?
- speaker: Respondent
  text: I helped in the store and those who baked in the kitchen.
- speaker: Interviewer
  text: About what time did you go to bed?
- speaker: Respondent
  text: I think I used to go to bed around 10 O'clock in those days.
- speaker: Interviewer
  text: What did you call your master?
- speaker: Respondent
  text: I called him danna (master).
- speaker: Interviewer
  text: Have you ever been scolded by your master?
- speaker: Respondent
  text: I don't remember being scolded.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: I came here in 1920.
- speaker: Interviewer
  text: What about the great earthquake in Kanto area?
- speaker: Respondent
  text: I think it was two years after I came here. I think it was in 1922 or 1923. I was working in a summer house of a white
    family in Santa Barbara then. It was Sunday and it was my day off, so I went to town with some cooks, when extra came
    out telling us that there was a big earthquake in Tokyo. I remember it well.
- speaker: Interviewer
  text: Were you at the bakery until you came to America?
- speaker: Respondent
  text: No, I was on a ship. The reason I got on board the ship was that one of the customers whom I used to take orders from
    was the chief engineer of a steamship of Nihon Yusen Company. I became very friendly with them and told them that I wanted
    to be on board a ship. He got me a job as a baker on board his ship.
- speaker: Interviewer
  text: How long did you do that?
- speaker: Respondent
  text: Quite a long time. I was on board the ship during the World War I. The ship went around the Cape of Good Hope twice.
    As it was during the war we could not use Suez Canal. As German submarines were around, a destroyer guarded a fleet of
    about 10 merchant ships. I remember such a time.
- speaker: Interviewer
  text: Were you on board the ship for a few years?
- speaker: Interviewer
  text: What kind of recollections do you have about the life on board the ship?
- speaker: Respondent
  text: The life on board the ship was a lot of fun. If you are on a European line you leave from Yokohama, stop at Kobe,
    Nagasaki or Moji, and then go to Shanghai. From there you go through India, Singapore and Marseille in France to London,
    so it is much fun. You can land at some places, but at some places the ship stops just to load and unload cargo so you
    cannot land. London is the last stop, and then we come back to Yokohama. While the ship is in the dock in Yokohama we
    have time, so we take turns in taking days off. I had a lot of fun.
- speaker: Interviewer
  text: How did you feel when you saw a foreign country for the first time?
- speaker: Respondent
  text: I was on a Shanghai line at first, so Shanghai was the first foreign place I saw. In those days Chinese coolies had
    their hair braided in pigtails, so I looked at them with curiosity.
- speaker: Interviewer
  text: How did you feel when you went to Europe for the first time?
- speaker: Respondent
  text: When I landed at London some church ladies showed us around the city. I saw the tombs of kings and queens in a cathedral.
- speaker: Interviewer
  text: Unlike other Isseis, you have seen the world before you came to America, haven't you?
- speaker: Respondent
  text: Yes, I have.
- speaker: Interviewer
  text: Did you move to other jobs when you were 12 because you wanted to, or how did you change jobs?
- speaker: Respondent
  text: At first I worked at a tailor shop where they made tabis and shirts. There was a sembei (rice crackers) store next
    door, the owner of which was a relation of the tailor. As they were busy I helped them.
- speaker: Interviewer
  text: You didn't change jobs because you wanted to, didn't you?
- speaker: Respondent
  text: As it was next door and they were related to each other I helped them, and finally I went to work there. I liked that
    job better.
- speaker: Interviewer
  text: How did you get a job at a bakery?
- speaker: Respondent
  text: I was 16 or 17 then, so I went to an employment office and got the job.
- speaker: Interviewer
  text: Did you want to do something else besides working at a tailor shop or a sembei store?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: How often did you go home during that time?
- speaker: Respondent
  text: I didn't go home much, maybe about once or twice a year.
- speaker: Interviewer
  text: Your family couldn't say anything to you, couldn't they?
- speaker: Respondent
  text: No, they couldn't. That was a job, so I just visited them. It was like that in Japan in those days. My family was
    a farmer, but we were farming in a small scale, so we were poor.
- speaker: Interviewer
  text: What made you decide to come to America?
- speaker: Respondent
  text: As I said before, I was on a ship. At that time I was on a ship of a steamship company between Yokohama and San Francisco.
    I think I was on Korea Maru the last time I came here. In those days there were many picture brides and third class passengers
    and I got acquainted with them. I made a friend with one of the passengers who asked me to come to America, so I decided
    to come here. In those days the crew of the ship could not land at San Francisco, as they might run away. The reason why
    they would run away was that Japanese could not come to America even if they wanted to, so many people came here illegally.
- speaker: Interviewer
  text: How did you come here?
- speaker: Respondent
  text: As I was on the ship for a long time I had seniority among crew, so I could land at San Francisco. I became acquainted
    with a Japanese farmer in Stockton, and told them that I would go there on my next voyage. When I came to San Francisco
    the next time I landed there and took a train to Stockton.
- speaker: Interviewer
  text: Then you didn't go to Angel Island?
- speaker: Respondent
  text: No, I landed without going to Angel Island. I didn't have a passport. After the war I acquired American citizenship.
- speaker: Interviewer
  text: When did you come to America for the first time as a ship's crew?
- speaker: Respondent
  text: It was after I took the physical for the draft, so I think I was 24 or 25 years old.
- speaker: Interviewer
  text: Was it around 1915?
- speaker: Respondent
  text: Yes, it was. No, I landed here in 1920.
- speaker: Interviewer
  text: When did you come to San Francisco for the first time as a crew of the Korea Maru?
- speaker: Respondent
  text: It was about 2 years before I landed here.
- speaker: Interviewer
  text: Do you remember the Isseis and picture brides on board your ship?
- speaker: Respondent
  text: In those days the third class passengers slept on bunks around the hatch. The passage was about 50 yen from Japan
    to America and it took 14 to 15 days. There were many picture brides. Other people could not come here then.
- speaker: Interviewer
  text: Were there many stories about the picture brides on board the ship?
- speaker: Respondent
  text: I didn't hear much about them.
- speaker: Interviewer
  text: What kind of thing do you remember about Isseis on board the ship?
- speaker: Respondent
  text: In those days there were some men who were coming back from Japan after visiting their families, and picture brides.
    At night time Chinese came around selling rice porridge. We had supper around 5 o'clock, and around 9 o'clock Chinese
    cooks sold rice porridge for 10¢ a bowl. It was good.
- speaker: Interviewer
  text: What were you doing on board the ship?
- speaker: Respondent
  text: I was a baker.
- speaker: Interviewer
  text: At one time while I was on the Seattle line the ship went through a storm, and the mast was blown away. We were scared
    then. During the voyage there were entertainments in the first, second and third class and had fun. Did passengers become
    romantic and become good friends during the voyage?
- speaker: Respondent
  text: Yes, we bunked in a small room. Nowadays there are unions and they treat you better, but in those days there were
    no unions so the wages were cheap, but we didn't complain. It is a good feeling to arrive in port. We were young, so we
    went out as soon as we arrived in port.
- speaker: Interviewer
  text: What did you do after you went ashore, took a train and arrived in Stockton?
- speaker: Respondent
  text: They were growing onions there. I think it was around August or September as they had just finished harvesting the
    crops. We pulled up the onion, dried them, cut off the tops and put them in bags. In those days there were no machines.
    We even dug up potatoes with hoes.
- speaker: Interviewer
  text: Did you work at that ranch?
