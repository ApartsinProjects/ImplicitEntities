collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I attended a regular elementary school for four years.
- speaker: Interviewer
  text: Do you remember your elementary school days?
- speaker: Respondent
  text: I don't remember anything especially.
- speaker: Interviewer
  text: Did you have fun?
- speaker: Respondent
  text: No, not really.
- speaker: Interviewer
  text: You liked school, didn't you?
- speaker: Respondent
  text: Yes, I did. I just babysat my little brother, who was two years old, after school.
- speaker: Interviewer
  text: What was the most joyful thing for you during your school days?
- speaker: Respondent
  text: It was fun to play with friends in the mountains and fields.
- speaker: Interviewer
  text: What did you do in the mountains?
- speaker: Respondent
  text: A friend of mine's house was located on a mountain. She and I played and babysat simultaneously.
- speaker: Interviewer
  text: Did you just babysit?
- speaker: Respondent
  text: Yes. Both of us held babies on our backs and played.
- speaker: Interviewer
  text: Do you remember your teacher?
- speaker: Respondent
  text: Yes, I do. Our first teacher was Mr. Ohtani, who was twenty-one years old at that time. We had a female teacher for
    the third and fourth year of elementary school.
- speaker: Interviewer
  text: Were your teachers strict?
- speaker: Respondent
  text: No, they weren't too strict. The elementary school education was extended from four to six years after I had graduated
    from elementary school. I wanted to go to school for two more years. Both my brother, who was in the Army, and my sister
    encouraged me to go to school. However, I gave it up. My father was planning to leave for the U.S., and I was expected
    to help my mother after my father's departure.
- speaker: Interviewer
  text: How old were you at that time?
- speaker: Respondent
  text: I was twelve years old. My father left Japan in May after I had graduated from elementary school.
- speaker: Interviewer
  text: Do you remember your father?
- speaker: Interviewer
  text: What kind of person was he?
- speaker: Respondent
  text: He didn't scold us unreasonably. He took good care of us.
- speaker: Interviewer
  text: Did you babysit even after graduating from elementary school?
- speaker: Respondent
  text: I learned to sew.
- speaker: Interviewer
  text: Your father left Japan when you were twelve years old. Did your mother then work outside of the home?
- speaker: Respondent
  text: No, she didn't. She had a weaving business at home. My aunt, who was a textile dealer, sold my mother's products.
    My father worked as a railroad worker. He got injured very badly in an accident at work. It was on the sixth of December.
    Though he was injured seriously, he insisted on walking back to his camp. He stopped three times on the way to go back
    to the camp and vomited each time. A cook from the camp notified a friend of my father's, with whom my father had sailed
    to the U.S. The friend was a re-entree. He carried my father to a railroad hospital; however, my father passed away at
    five a.m. on the following morning.
- speaker: Interviewer
  text: That's too bad. How many brothers and sisters do you have?
- speaker: Respondent
  text: I have two brothers and three sisters.
- speaker: Interviewer
  text: What number are you among the six children in your family?
- speaker: Respondent
  text: I was the fourth child. Some acquaintances urged me to leave for the U.S., but my mother didn't want me to do so.
    Trusting a co-between who was one of our relatives, I married Seno. The relative said that Seno, who had been to the U.S.
    before, wouldn't return there again. Seno returned to the U.S. six months after we were married. I was alone in Japan
    for three years. Seno finally persuaded me to join him in the U.S. I didn't want to come to the U.S.; on the other hand,
    I didn't want to cause my mother to worry about my marriage.
- speaker: Interviewer
  text: How old were you when you came to the U.S.?
- speaker: Respondent
  text: I was twenty-one years old.
- speaker: Interviewer
  text: What had you been doing until you got married?
- speaker: Respondent
  text: I had been helping my brother with his business since I was thirteen. My brother dyed the Yamamai fabrics yellow.
    I studied sewing whenever his business was slow in April, May and June.
- speaker: Interviewer
  text: Who was your co-between?
- speaker: Respondent
  text: My cousin's husband and his uncle were our co-betweens. I found them to be liars later.
- speaker: Interviewer
  text: Did you get angry when you found out the truth that Mr. Seno was planning to return to the U.S.?
- speaker: Respondent
  text: I didn't feel happy about it, but I couldn't do anything. I found myself pregnant after Seno had left Japan. The baby
    was born dead. My brother told me, "It sounds reasonable for you to divorce Seno, for he told you a lie." However, human
    society doesn't work that way.
- speaker: Interviewer
  text: You came to the U.S. three years later than Mr. Seno, then it was in 1914, wasn't it?
- speaker: Respondent
  text: I believe so.
- speaker: Interviewer
  text: What kind of people were on board the ship?
- speaker: Respondent
  text: Most of the passengers were picture-brides and those who were going to re-enter the U.S. It took thirteen days to
    get to San Francisco.
- speaker: Interviewer
  text: What was life on the boat like?
- speaker: Respondent
  text: The boat rolled very much. A room service boy said that it was rare for a boat to roll so much. I didn't get seasick,
    though.
- speaker: Interviewer
  text: Did anything special happen during the voyage?
- speaker: Respondent
  text: No, nothing special happened.
- speaker: Interviewer
  text: Did you have any kind of examination on Angel Island?
- speaker: Respondent
  text: Yes, we did. We had a physical examination. We were also asked many questions there.
- speaker: Interviewer
  text: Well, I can't remember.
- speaker: Interviewer
  text: How long did you stay on Angel Island?
- speaker: Respondent
  text: We stayed there for three or four days.
- speaker: Interviewer
  text: Where did you go from Angel Island?
- speaker: Respondent
  text: Mr. Seno picked me up and took me to Florin. We produced grapes and strawberries there until the war broke out.
- speaker: Interviewer
  text: Did Mr. Seno own a farm?
- speaker: Respondent
  text: Yes, he did. He had a 10-acre farm. Our children helped us a lot. Mr. Seno wanted to enlarge his farm and bought a
    15-acre farm of mowing grass. Strawberries didn't grow well there. It took a few years for us to succeed in producing
    grapes. However, the price of grapes had dropped by that time. Mr. Seno and I, with so many children, were at a loss.
- speaker: Interviewer
  text: Was it during the depression?
- speaker: Respondent
  text: I'm sure it was. We dug out all of the grape trees.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: We have seven children. Having a large family, we couldn't live on Seno's income alone. But it was impossible for
    us to get employed by somebody as a family. We finally decided to sell the farm. The war broke out before long, and we
    moved to an assembly center.
- speaker: Interviewer
  text: Did you produce only grapes and strawberries?
- speaker: Interviewer
  text: What did you imagine the U.S. would be like when you were in Japan?
- speaker: Respondent
  text: I never imagined that I would have such a hard life. I didn't want to come to the U.S. in the first place.
- speaker: Interviewer
  text: Was it because your father had died in the U.S.?
- speaker: Respondent
  text: No. Apart from his death, I just didn't want to come here.
- speaker: Interviewer
  text: How long did you stay in San Francisco?
- speaker: Respondent
  text: I stayed there for a week.
- speaker: Interviewer
  text: What was your first impression of the U.S.?
- speaker: Respondent
  text: I didn't have a first impression or anything like that. I just stayed in a hotel with some other Japanese people.
- speaker: Interviewer
  text: How did white people treat you?
- speaker: Respondent
  text: Not being able to speak English, we didn't have direct contact with white people. When we sold the grapes and strawberries
    to white businessmen, we talked to them through interpreters. Sometimes we were deceived by middlemen. There weren't any
    educated people around there.
- speaker: Interviewer
  text: What was the hardest problem in your life?
- speaker: Respondent
  text: Everyday living was very difficult. Our life was the hardest in 1933. We sold our grapes to a company owned by white
    people, in October. They didn't buy anything from us till the following March. We sold a little to Mr. Tanigawa, who owned
    a store. We didn't know how to make ends meet. In the midst of our trouble, Mr. Yamada from Sacramento came over and gave
    us five sacks of rice, dried sea-slug and some red beets. He said that we could survive on them until the company resumed
    their business with us. I still visit Mr. Yamada's grave once in a while and thank him for all the kindness he showed
    us in those days. Though we didn't have any meat or fish, we had enough rice every day during the depression. None of
    our children got sick. Since we couldn't afford bread, I fixed rice-balls for our children to take out to school. Mr.
    Yamada gave me sake-lees, and I made vegetables preserved in sake-lees.
- speaker: Interviewer
  text: How much rice was in each sack?
- speaker: Respondent
  text: There was one hundred kilograms of rice in each sack. Mr. and Mrs. Yamada led us and our children to Christianity.
    They took us to church in their truck every Sunday. The Sakakibaras, the Shigenos and the Murakamis were all our church
    friends. The people living on the other side of the street were all Buddhists. I'm grateful to the Lord for giving us
    the opportunity to live among Christians on this side of the street. My Christian friends encouraged me to join a ladies'
    association at church. A friend of mine who was a member of the Salvation Army told me about Reverend Baba from Oxnard.
    Reverend Baba was planning to give a sermon. The friend took us to listen to the sermon in his truck. At the end of the
    sermon, Reverend Baba gave us a blessing. As soon as I got his blessing, I started feeling heavy in my head. This lasted
    for a few days. At the same time, I found myself in tears all of the time. I didn't wish to die with my children any longer.
    One night, the friend visited me to see how I was doing. He was told by Reverend Baba to visit me. Reverend Baba believed
    that I was to be saved by the Lord. I didn't want to attend the Salvation Army meeting any more, for I was afraid that
    I might feel too moved to control my tears. However, I went to the meeting on the following Sunday. When Reverend Baba
    gave me a blessing, I felt as if lukewarm water had been poured over me from head to toe. I was happier than ever before,
    after that.
- speaker: Interviewer
  text: What happened to your husband?
- speaker: Respondent
  text: My husband had been suffering from apoplexy for thirteen years. One evening in December, I fed him dinner in his bed
    as usual. While I was eating my dinner, I was called by him twice. I told him to let me finish eating dinner. When I entered
    his room after dinner, I saw him sitting on his bed. He looked beside himself. I laid him down and went to bed. On the
    following morning, I saw him lying unconsciously. Though I called for a doctor in the morning, none came till evening.
    The doctor said that a vein in Mr. Seno's brain was broken. I was told to observe Mr. Seno's condition overnight and send
    him to a hospital if his condition wasn't any better. I called an ambulance on the following morning and sent Seno to
    a hospital. He didn't talk. He couldn't eat or drink by himself. He died after thirty-seven days.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: It was seven years ago. It was on the third of October.
- speaker: Interviewer
  text: What was your greatest pleasure in life in those days?
- speaker: Respondent
  text: I had none. A church was established when my oldest child was five. Attending church was the only pleasure I had.
    Reverend Suda gave me a ride.
- speaker: Interviewer
  text: What else made you unhappy?
- speaker: Respondent
  text: I was unhappy about my life itself. However, I appreciated having the Lord's protection.
- speaker: Interviewer
  text: Did you want to return to Japan at that time?
- speaker: Respondent
  text: Yes, I did, for my mother was sick in bed. On the other hand, I wondered if we could survive in Japan. In 1961, my
    children urged me to return to Japan. Mr. Seno was sick, but his doctor said that Mr. Seno should be all right. I went
    back to Japan with my grandson for two months.
- speaker: Interviewer
  text: Could Japanese people buy land at that time?
- speaker: Respondent
  text: No, we couldn't. We registered our three children's names when we bought the property. Japanese people could purchase
    property when Mr. Seno bought the 10-acre farm. Our three children were the legal purchasers of the 15-acre farm.
- speaker: Interviewer
  text: Did your children attend a sex-segregated school?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: How did you feel about that?
- speaker: Respondent
  text: I took it for granted, because Japanese children at that time didn't speak English well.
- speaker: Interviewer
  text: What did you think when you heard of the Pearl Harbor attack?
- speaker: Respondent
  text: I worried about Japan.
- speaker: Interviewer
  text: What did your husband say about it?
- speaker: Respondent
  text: He said that Japan had done a terrible thing. We couldn't do anything about it, though.
- speaker: Interviewer
  text: Were you afraid what might happen to you?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: What was your evacuation like?
- speaker: Respondent
  text: We didn't have too many household things in the first place. Mr. and Mrs. Brown, a neighbor family, helped a lot.
    They moved to Sacramento, and an Italian family moved in. The Italian family was nice, too. It was this family that bought
    our land. I was just grateful to the Lord for letting such a large family as ours survive.
- speaker: Interviewer
  text: Do you remember Mr. and Mrs. Brown well?
- speaker: Respondent
  text: Yes, I do. They gave us various things when we were starving.
- speaker: Interviewer
  text: Was Mr. Brown a college professor?
- speaker: Respondent
  text: I heard that he used to teach at some college.
- speaker: Interviewer
  text: Where were you evacuated to?
- speaker: Respondent
  text: We stayed in the Manzanita Camp.
- speaker: Interviewer
  text: What was it like?
- speaker: Respondent
  text: Well, we lived in relative comfort.
- speaker: Interviewer
  text: The hut you lived in was rough, wasn't it?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: What did you feel about being evacuated to a camp?
- speaker: Respondent
  text: Having been near starvation before the evacuation, we didn't feel miserable about our camp life.
- speaker: Interviewer
  text: What do you remember about the camp?
- speaker: Respondent
  text: I just attended church regularly. I worked as a kitchen helper from early morning till evening.
- speaker: Interviewer
  text: What did Mr. Seno do?
- speaker: Respondent
  text: He and Mr. Sakakibara also worked in the kitchen.
- speaker: Interviewer
  text: Did anything unusual occur in the camp?
- speaker: Respondent
  text: I don't recall anything unusual.
- speaker: Interviewer
  text: Did you move to any other camp from Manzanita?
- speaker: Respondent
  text: No. We stayed there for three years until we moved to Denver for our children's education. We chose Denver because
    we had acquaintances there. Our children attended school, and I worked at a hotel.
- speaker: Interviewer
  text: How long did you stay in Denver?
- speaker: Respondent
  text: I stayed there only six months. One of our daughters, who left the camp before us, was working in Washington D.C.
    She was going to marry a man in Florin. Therefore, we returned to Florin. Mr. Seno was so happy back in Florin that he
    didn't want to go to Denver again. I only had two weeks off from my work, but I gave up on going back to Denver.
- speaker: Interviewer
  text: What did you do with your things in Denver?
- speaker: Respondent
  text: There were two daughters left in Denver. One of them was about to graduate from high school. They came back to Florin
    together after finishing school. The one who graduated from high school in Denver entered a business college in Sacramento.
    She is married and has three children, but she is still working for a city public office here.
- speaker: Interviewer
  text: When did you return to Florin? You returned to Florin after the War, didn't you?
- speaker: Respondent
  text: Yes, we did.
- speaker: Interviewer
  text: Did you come back to your old house?
- speaker: Respondent
  text: No. We had already sold our house. The Italian family rented us their boy's house for two months. Then, we moved to
    a church hall. We divided the hall with our things. We lived there and found employment outside. One of our sons, who
    was released from the Army when we were in Denver, was with us there. He came back to Florin with us because of his sister's
    wedding. He moved to some other place for his schooling, but he came back to us later.
- speaker: Interviewer
  text: Had you sold your property before you were evacuated?
- speaker: Respondent
  text: Our property was up for sale for a long time. A year or so before we left the camp, the Italian family bought it.
    When we returned to Florin, they asked me if we wanted to own the property again. We didn't intend to grow fruits in Florin
    again.
- speaker: Interviewer
  text: Did you sell both the 10-acre and 15-acre farms?
- speaker: Respondent
  text: Yes. We sold 25 acres altogether. Two of our daughters were unmarried and one son couldn't find a job anywhere. Then,
    he decided to stay in Sacramento and become a gardener.
- speaker: Interviewer
  text: Do you remember the Loyalty problem?
- speaker: Respondent
  text: I'm sorry, but I don't remember.
- speaker: Interviewer
  text: What did you think about the Nisei going to war?
- speaker: Respondent
  text: I thought it inevitable for them to go to war.
- speaker: Interviewer
  text: Did anybody condemn you for sending your sons to the war?
