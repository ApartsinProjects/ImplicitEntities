collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: What is the most important lesson that you learned from Buddhism?
- speaker: Respondent
  text: I was unable to attend the worship service so often because of my children. Just recently, I am attending constantly.
    I feel I am undeservedly blessed when I listen to the words. But when my children were little, I just couldn't make it.
- speaker: Interviewer
  text: You have two copies of your family register, don't you?
- speaker: Respondent
  text: No, I have just one.
- speaker: Interviewer
  text: You have a few copies.
- speaker: Respondent
  text: The other day when Priest Ishimoki visited me, I asked him to write in English "Don't burn this box." on this trunk
    full of my records. He wrote in neat "Keep this box."
- speaker: Respondent
  text: Yes, here it is, in red ink.
- speaker: Respondent
  text: I had written on this "Don't burn this" in Japanese, since I don't know how to write in English, although I can read
    English.
- speaker: Interviewer
  text: Mrs. Tanaka, since Rev. Takarabe visited me with much trouble, why don't you join us and talk?
- speaker: Respondent
  text: I came from Japan. Thinking the education in Japan was better for their children, parents used to send them to school
    in Japan. But when the children came back home from Japan after finishing school, they naturally found a cool gap between
    their parents and themselves because of the long-time separation. It was a sort of difficult situation. I thought that
    life was all like this, and that this was my given destiny.
- speaker: Interviewer
  text: When did you come back from Japan?
- speaker: Respondent
  text: I came back during the Hoover Depression.
- speaker: Interviewer
  text: Oh, that was the worst time. How old were you at that time?
- speaker: Respondent
  text: I was 18 years old.
- speaker: Interviewer
  text: You came back after finishing schooling?
- speaker: Respondent
  text: I went to Japan at the age of 6 and came back here when I was 18 years old after graduating a high school.
- speaker: Interviewer
  text: The exclusionary movement against us was strong, wasn't it?
- speaker: Respondent
  text: Yes. And there still exists the mood.
- speaker: Respondent
  text: The Chronicle was really bad to us.
- speaker: Interviewer
  text: It was the Hearst's newspaper in San Francisco, wasn't it?
- speaker: Respondent
  text: They say that the World War II was a racial war. It was too bad for the Japanese people that Japan lost, but it turned
    out good actually. After the war, a lot of Japanese people here were employed. Before the war, few of us had been employed
    by the State. They didn't employ Japanese.
- speaker: Respondent
  text: This tastes hot.
- speaker: Interviewer
  text: Please go get some green.
- speaker: Respondent
  text: No, this is enough. No, thank you.
- speaker: Respondent
  text: I didn't know when you were coming, so I didn't prepare.
- speaker: Respondent
  text: I also would like to have manju, so Mrs. Tanaka, would you please?
- speaker: Respondent
  text: No, please don't mind. If you would like to have it, please go ahead.
- speaker: Respondent
  text: I've got some to serve my family altar, and it is still there untouched. Please get a little bit.
- speaker: Interviewer
  text: Manju? What kind shall I get?
- speaker: Respondent
  text: Combination.
- speaker: Interviewer
  text: Please get five or so.
- speaker: Interviewer
  text: Were you expecting a baby in Japan?
- speaker: Respondent
  text: Everyone looks pretty when she is young.
- speaker: Interviewer
  text: You were 18 years old. You look very pretty.
- speaker: Respondent
  text: 'American Consulate, Kobe, Japan. I, Mitsuyo Sakada, a housewife, subject of Japan. The passport number is 377517.
    Dated January 14, 1918. Issued by Japanese Foreign Office. I am about to go to the United States accompanied by a daughter
    under 20 years of age as follows: Symiko Sakada ... Is she the eldest?'
- speaker: Respondent
  text: She often comes to see me here.
- speaker: Interviewer
  text: Is she a wife of a coffee shop owner?
- speaker: Respondent
  text: No, she is Yoshino.
- speaker: Respondent
  text: Sumiko Sakada, born at Oakland, California, USA, June 16, 1916.
- speaker: Respondent
  text: Received a telegram saying that my father was in a critical condition, I went back to Japan with this daughter and
    another daughter who was in the onimes. This is the passport issued at that time, isn't it?
- speaker: Interviewer
  text: According to this, you only took Sumiko with you.
- speaker: Respondent
  text: Is that so? What is this, then?
- speaker: Interviewer
  text: This is a passport?
- speaker: Respondent
  text: Passport? Is it?
- speaker: Interviewer
  text: What is the happiest thing that you have experienced in your life?
- speaker: Respondent
  text: Well, happy events don't remain in my memory. How could I remember everything happened in the past since it is a long
    time. I still remember how happy I was when I visited Japan. I went back to Japan for the first time in 13 years, receiving
    the telegram that my father was dangerously ill.
- speaker: Interviewer
  text: Did you go back alone?
- speaker: Respondent
  text: I took Sumiko and Yoshiko, who was married with Mr. Oshima, with me. It only took two days to get to Yokohama by boat.
    Sumiko still wore a diaper, but instead of washing them, I threw them away in the sea from the boat.
- speaker: Respondent
  text: In 1908, she was born, Yoshiko was the eldest daughter, wasn't she? So she was already 10 years old at that time.
    Kimiko married into the Miyamotos.
- speaker: Respondent
  text: Mrs. Tanaka came back from a store.
- speaker: Respondent
  text: Are you going to serve one to your family altar?
- speaker: Respondent
  text: No, not today, since I have served before.
- speaker: Respondent
  text: Please help yourself.
- speaker: Interviewer
  text: Thank you. Please take one, grandmother.
- speaker: Respondent
  text: I'm so sorry for such an impolite entertaining.
- speaker: Interviewer
  text: That's quite all right. I would like to make a copy of this, if she doesn't mind.
- speaker: Respondent
  text: Sure. These days, copying is really easy. Not so long ago, the grandmother of Nijohji wrote for a newspaper - every
    record she had. She keeps the paper and showed me when I visited her. She is very good at writing things. She wrote how
    she entered the camp and every detail about the camp.
- speaker: Respondent
  text: We, human beings, can't tell what is going to happen to us in the future. I was so little at that time. I once ran
    a hotel here.
- speaker: Interviewer
  text: Is that so? What is the name of it?
- speaker: Respondent
  text: It's already gone now.
- speaker: Interviewer
  text: Does Mrs. Miyasaki know it?
- speaker: Respondent
  text: Which Miyasaki?
- speaker: Interviewer
  text: Mrs. Ai Miyasaki.
- speaker: Respondent
  text: Oh, Mrs. Miyasaki here. She was not running a hotel at that time. What was she doing?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: I think she once ran a hotel.
- speaker: Respondent
  text: I don't think so, although I'm not sure. When she got out of the camp, she stayed in a hotel in Fresno for a while
    before coming back here in Sacramento. My husband was born here, so he wanted to come back here. First we were thinking
    to go to live in Japan, but he didn't know Japanese. Finally, we decided to stay in America.
- speaker: Respondent
  text: Please, please help yourself.
- speaker: Respondent
  text: Thank you, but I have already had one. How about you?
- speaker: Respondent
  text: I had enough, thank you. Oh, I am so sorry for this and should have prepared to receive you beforehand.
- speaker: Interviewer
  text: In this trunk, you have three of the same copies. Can I borrow one of them to copy? I'm going to return this.
- speaker: Respondent
  text: Please hand it to Mrs. Miyasaki.
- speaker: Interviewer
  text: No. I'm going to come back here again to return it.
- speaker: Respondent
  text: I really hope that Mr. Mayeda could come back sooner. Is he still there?
- speaker: Interviewer
  text: Yes, since he has just had an operation, he can't move yet.
- speaker: Respondent
  text: There was a commanding officer named Webster or something. Anyway, my husband was a true-born Nisei, and couldn't
    write Japanese at all. At that time, they didn't teach Japanese. Also America was not so much developed. Therefore, when
    I came back here from Japan, I was surprised and couldn't believe that this was America. I thought that Japan was much
    more civilized. In Fresno, there was no lights nor any facility at all, so my parents said,
- speaker: Respondent
  text: Anyway, my husband didn't go to a Japanese language school. One day this commanding officer said, "Jap is Jap." Getting
    mad at his words, he answered "no, no" at first to the question of allegiance. Then he changed his answer to "yes", which
    meant that he was faithful to America although he would not go for service. They sent him to Gerome. I, myself, answered,
    "yes, yes." And I had an interview and heard that my husband answered "no, no." Hearing this, I was so surprised. Where
    could you find such a fool who told an American commander that he wished Japan won the war? That was funny, indeed, although
    everybody was too, too nervous.
- speaker: Interviewer
  text: Grandma, Sansei and Yonsei don't know about the Issei so well. They don't know Issei's culture or hardships they went
    through. What kind of things would you like to tell them if you have a chance?
- speaker: Respondent
  text: In my opinion, Japan should inherit and protect its tradition, so should we, the Japanese people in America. We shouldn't
    lose the traditional ethics as a Japanese. For example, look at some foreigners in this country. We say we are an American,
    although it is a Japanese-American, and that is true. But one thing that we always have to keep in our mind is that we
    are Japanese.
- speaker: Interviewer
  text: What do you think about this, grandma? Do you think that Sansei should consider himself a Japanese?
- speaker: Respondent
  text: Well, everybody has its own character. Some listen to their parent's words, some don't. So it is hard to tell.
- speaker: Interviewer
  text: Do you want to tell them that they are Japanese?
- speaker: Respondent
  text: Yes. For myself, I am proud of my being a Japanese, and happy to be a Japanese.
- speaker: Respondent
  text: At the same time, the Japanese people in Japan should also be proud of being Japanese. I always say to the people
    who came to Japan, "Don't misunderstand this country. You think that America is a rich country, don't you? It looks fine
    only externally, but watch out! Go and see the east side of the slums or ghetto. They say that America is a country of
    morality, but that's not true at all. Don't overestimate America. It is the country of Japan that proves our existence
    as Japanese." I always tell this to the people who are going back to Japan. Don't tumble down!
- speaker: Respondent
  text: I said, "Don't fall down!" It's going to be a big trouble if you fall down.
- speaker: Interviewer
  text: Grandma, do you have something to tell the Sansei? Is there anything that you would like to teach to young people?
- speaker: Respondent
  text: I would like to tell them to be proud of being Japanese, but I can't, because I don't know English. I also want to
    tell them that I am very proud of being a Japanese. There were a number of Japanese war sons.
- speaker: Respondent
  text: Some, like Mr. Kinya Noguchi, say that we should get together regardless of nationality so that we could get more
    familiar feeling with America.
- speaker: Interviewer
  text: What do you mean?
- speaker: Respondent
  text: Since this country consists of various different races, people here should unite together in order to make this country.
- speaker: Interviewer
  text: Did Noguchi say this?
- speaker: Respondent
  text: Yes. It may be one way. It is proudly said that they are going to have a Japanese-descent President in Brazil soon.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: I am from Kagoshima.
- speaker: Interviewer
  text: Kagoshima? Then do you know Tsuchimoshi Kaikyoshi? He is also from Kagoshima.
- speaker: Respondent
  text: Yes, I know him.
- speaker: Respondent
  text: Anyway, I wonder what is going to happen.
- speaker: Respondent
  text: I think we are really lucky.
- speaker: Interviewer
  text: No, I don't think so.
- speaker: Respondent
  text: Because you know both English and Japanese.
- speaker: Interviewer
  text: No, no. That's why I am unlucky. Look at my sister and brother. They have never been to Japan, although my brother
    has been there for a little while from sixth grade to eighth grade. Then he continued his schooling here and went to a
    college for a while. And they are much better than I in a way. It is said that America is a country of working. People
    from Japan always are surprised, "Oh, are you working?" So I answer, "Don't you know that America is a country of labor?"
    It is hard to say which is better, since the natures of these two countries are different. In Japan, they honor family
    first, while we honor each individual here in America. We have to be independent here.
- speaker: Respondent
  text: I feel sorry that I didn't learn English in the Camp at Tule Lake.
- speaker: Interviewer
  text: No, you shouldn't.
- speaker: Respondent
  text: But we need English to live here.
- speaker: Interviewer
  text: So you learned only shamisen at Tule Lake?
- speaker: Respondent
  text: Yes, I did only shamisen, and gave up everything else, such as flower arrangement.
- speaker: Interviewer
  text: Didn't you work there?
- speaker: Respondent
  text: Yes, I did grass washing.
- speaker: Interviewer
  text: No, no. I mean in the camp.
- speaker: Respondent
  text: 'One thought you had asked me about the hotel. In Tule Lake, I washed dishes. There was a man from San Jose who also
    worked in the kitchen. I heard that he is already dead. When we were leaving the camp, he made a poem: Sera-arai, Kansha
    Kansha de Sayohnara. Leaving the Camp, I now send with many thanks, A farewell to dish washing.'
- speaker: Respondent
  text: Some miss the camp, because the food was secured for us who had a lot of little children to grow. I was so worried
    when my children coughed. I don't know if this camping was better for us or not.
- speaker: Respondent
  text: How happy Mr. and Mrs. Itano, since they are still together, and their son is a man of steady.
- speaker: Respondent
  text: My child, who is a girl, is now teaching at a college. She graduated U.C. I sometimes feel that she may have a different
    way of thinking from mine because she was born and bred in America. I really think that religion is important to us.
- speaker: Respondent
  text: I don't care what kind of religion. Any religion as long as I am a Buddhist. If we didn't plant a religion in our
    children's mind since they were young, they would become bad and spoiled. If they've got a religious heart, they couldn't
    do bad things when they felt like it. I can say this without any doubt.
- speaker: Respondent
  text: In Japan, Issei were taught these kind of things in a moral class, but they don't teach morals in America. Religion
    is the one that teaches us morals. Maybe this causes the difference. Issei and their children could get along and communicate
    well, but Nisei and Sansei can't. I think this is because of the lack of education. I would say to children, "I was grown
    up in Buddhism, if you want to take this religion, take it." And I would plant religious heart in them while they were
    young. The white people educate their children with a religion. This is one difference between the white people and the
    Japanese people.
- speaker: Respondent
  text: Another difference is that the Japanese people think much of shame while the white people value pride. I guess this
    makes the difference between Caucasians and the Japanese people. If they had pride, they couldn't do bad things. But I
    am not sure.
- speaker: Interviewer
  text: Since you know a lot of white people, I wonder how you feel about their way. Anyway, religion is important. We have
    to plant religious heart in our children. You see, every child has a critical period at the age of 18 or so. At that time,
    it is easy for him to stray from the right path, and he usually doesn't care about his parents' feeling. This is the very
    time that parents have to counsel them. They should not leave their child as he is. Issei didn't have so many delinquent
    children, while quite a few children of Nisei and Sansei are degraded.
- speaker: Respondent
  text: I think this is because of the parents' education to their children, religiously or morally.
- speaker: Interviewer
  text: You came here by boat, didn't you? Do you remember anything about the boat? What happened in the boat?
- speaker: Respondent
  text: It was the first time for me to get on a boat, so I got sea sick. I didn't go up on deck. So from the next trip, I
    always traveled to Japan in the first cabin.
- speaker: Interviewer
  text: What kind of people were on board?
- speaker: Respondent
  text: Japanese people were not so many and mainly Chinese people were on board. It was a long, long way. I got sick.
- speaker: Interviewer
  text: How did white people treat you?
- speaker: Respondent
  text: I didn't become acquainted with any white people, since I didn't have a chance. I always stayed in my room.
- speaker: Respondent
  text: That sounds true, because you don't know English.
- speaker: Interviewer
  text: Didn't you help your husband? Did you take care of your children all the time?
- speaker: Respondent
  text: Of course she must have helped her husband's florist.
- speaker: Respondent
  text: He was allowed to land since his eyes were good, while I couldn't because of my eyes. He landed first and sent an
    eye doctor to me.
- speaker: Interviewer
  text: But didn't you help your husband after getting settled in Oakland?
- speaker: Respondent
  text: Me? No, I didn't, because I had the children to take care of.
