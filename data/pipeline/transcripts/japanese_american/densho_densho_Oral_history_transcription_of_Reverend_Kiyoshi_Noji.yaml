collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I would like to ask some questions about yourself. First, will you please tell me your name?
- speaker: Respondent
  text: My name is Kiyoshi Noji.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Miyagi Prefecture, Japan. A village north of the city of Sendai.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: In the year of 1899.
- speaker: Interviewer
  text: Then you are 75 years old now.
- speaker: Respondent
  text: Yes, I am 75 years old.
- speaker: Interviewer
  text: How far up did you go to school in Japan?
- speaker: Respondent
  text: I went to Tohoku-gakuin (Tohoku Seminary), a Christian mission school in Sendai. I completed my high school, college,
    and one year of the theology school there, and then came to the United States.
- speaker: Interviewer
  text: How many years of elementary education did you have?
- speaker: Respondent
  text: I had eight years of elementary education, five years in high school, four years in college, and I took one year of
    preparatory course to enter theology school.
- speaker: Interviewer
  text: Did you enter theology school soon after you came to this country?
- speaker: Respondent
  text: Yes, I went to the Pacific School of Religion and received my Bachelor of Divinity and took a post graduate course
    at Princeton and received the Master's degree.
- speaker: Interviewer
  text: First, I would like to ask about your life in Japan and then about your life in the United States. What was the occupation
    of your family?
- speaker: Respondent
  text: They were farmers.
- speaker: Interviewer
  text: Were you the eldest child?
- speaker: Respondent
  text: No, there were six of us and I was the second from the youngest, but my younger sister died when she was young.
- speaker: Interviewer
  text: How many boys were there?
- speaker: Respondent
  text: There were four boys including myself and two girls.
- speaker: Interviewer
  text: Your father wasn't a Christian, was he?
- speaker: Respondent
  text: No, his religion was Zenshu Buddhist. My ancestors were all Zenshu.
- speaker: Interviewer
  text: What sort of a person was your father?
- speaker: Respondent
  text: My ancestors were Samurais until my grandfather's time. Samurais were abolished after that so my father became a farmer.
- speaker: Interviewer
  text: What sort of personality did your father have?
- speaker: Respondent
  text: He was brought up in the old way and was very strict. My ancestors were all very close to Zenshu priests.
- speaker: Interviewer
  text: Did you go for any Zenshu training?
- speaker: Respondent
  text: When the priests came around, I went to hear their messages with my father and grandfather. I didn't understand them
    very well.
- speaker: Interviewer
  text: Do you have any memories of your childhood days?
- speaker: Respondent
  text: My mother passed away when I was six years old and I missed her very much. I was physically weak, lonely, and didn't
    have many friends.
- speaker: Interviewer
  text: Who raised you?
- speaker: Respondent
  text: My grandmother and my elder sister did. My sister was only five years older than I but she took good care of me. My
    brothers did, too, because I wasn't healthy.
- speaker: Interviewer
  text: Do you remember something about your elementary school days?
- speaker: Respondent
  text: There is nothing particular. My school principal was very dear to me. When I graduated from elementary school, he
    asked me to remain for a while and he offered to help me if I wanted to go to his school. He knew that my brother who
    was twelve years older than I attended a military preparatory school and he asked if I wanted to go to the same school.
    I thought of it but I gave up the idea because I was physically weak. I was weak and didn't have a mother and was very
    lonely. I visited the Zenshu priest quite often and thought he was great and wanted to be like him. I liked religion from
    my childhood days. My eldest brother was a military man but my second eldest brother became a Christian. I think he turned
    to Christianity because he didn't have a mother. I had an uncle in the navy. He heard Christian sermons in Yokosuka (naval
    base) and was impressed and he used to come and tell us about it and persuaded us to become Christians. We were friends
    of the Zenshu priests and didn't like it at first but my second eldest brother was moved and he started to go to the Christian
    meetings with my uncle. Rev. Kikuchi, who is retired now and lives in Southern California, is my cousin. Mrs. Kikuchi's
    home was the meeting place for Christians in our area. I started to go to the meetings and my elder sister started to
    go. My second eldest brother was very faithful. He entered Tohoku-gakuin to become a Christian minister but changed his
    mind and came home because he felt he should take over the farming as our eldest brother was a military man and away from
    home. He decided to work and send me to the mission school to become a Christian minister. I started to attend Bible classes
    from about the age of twelve and was serious about becoming a Christian minister.
- speaker: Interviewer
  text: What did your father think of this?
- speaker: Respondent
  text: He didn't look very happy about it at first but he didn't say anything. I think he felt sorry for us because we didn't
    have a mother.
- speaker: Interviewer
  text: Was your grandfather living?
- speaker: Respondent
  text: He was deceased by then.
- speaker: Interviewer
  text: What did you enjoy most when you were a child?
- speaker: Respondent
  text: I enjoyed going to Christian meetings the most. We lived in the country and there were no other fellowship meetings.
    After completing junior high school, my cousin and I enrolled in high school at Tohoku-gakuin, a mission school located
    in Sendai City.
- speaker: Interviewer
  text: Do you remember any war?
- speaker: Respondent
  text: Yes, I remember sending off soldiers with my mother when I was about six years old. It was in the year of Meiji 37.
- speaker: Interviewer
  text: Your mother was living then, wasn't she?
- speaker: Interviewer
  text: What did she die of?
- speaker: Respondent
  text: She died in childbirth. The child died, too. At the time of war, I remember when the government needed horses, they
    requisitioned farmer's horses, too. When ours was taken, our family fed him with miso soup and walked with the horse quite
    far to send him off.
- speaker: Interviewer
  text: Did the horse come back?
- speaker: Respondent
  text: No, he didn't come back.
- speaker: Interviewer
  text: What else do you remember?
- speaker: Respondent
  text: When the Japanese-Russian war ended, there was a victory parade. I went to see it. My uncle came back, too.
- speaker: Interviewer
  text: What was your high school social life like?
- speaker: Respondent
  text: I was healthier then and I enjoyed it. It was a missionary school and there were many teachers and we received a Christian
    education. I always attended the Christian Young Men's club meetings. When I was in my senior year, I was sent to a Christian
    Young Men's Conference at Gotemba (near Mt. Fuji) as a delegate. It was the first time I left my home town and was very
    impressed listening to great speakers.
- speaker: Interviewer
  text: Where did you go after you graduated from high school?
- speaker: Respondent
  text: I entered the school of liberal arts at the same school which was a three year course in preparation for theology
    school. I studied English, foreign and Japanese literature, etc.
- speaker: Interviewer
  text: What kind of literature was there?
- speaker: Respondent
  text: I read Shakespeare and other translations of famous literature and was very impressed.
- speaker: Interviewer
  text: How did you get to know about America during your school days?
- speaker: Respondent
  text: The President of our school and many teachers were from America. We had many visitors from America, too. The financial
    supporters of Tohoku-gakuin (means Northeastern Institute) from America came to see us quite often and talked to us. The
    teachers who went back to America on furloughs would come back and tell us about their trip and so forth.
- speaker: Interviewer
  text: Did this school have from high school up to graduate school?
- speaker: Respondent
  text: Yes, high school, college, and theology school.
- speaker: Interviewer
  text: Were you planning to come to America?
- speaker: Respondent
  text: My cousin, Rev. Kikuchi, came to America ahead of me. That was the reason I made up my mind to come.
- speaker: Interviewer
  text: Did he graduate from Theology School in Japan before he came?
- speaker: Respondent
  text: Yes, he did. When I came to America, he had already completed graduate school at Princeton and was the pastor at Wintersburg
    Church. I went there when I arrived in America.
- speaker: Interviewer
  text: Did your family approve of your coming to America?
- speaker: Respondent
  text: My second eldest brother who wanted me to become a Christian minister was very happy about it.
- speaker: Interviewer
  text: Was your father living then?
- speaker: Respondent
  text: No, he was deceased.
- speaker: Interviewer
  text: What sort of people did you meet on the ship?
- speaker: Respondent
  text: There were many Chinese laborers. I came as a third class passenger and it was terrible.
- speaker: Interviewer
  text: Why was that?
- speaker: Respondent
  text: We had to sleep in bunk beds in the bottom of the ship. It was in 1926, two years after the immigration law was in
    effect. I was able to come on a student visa. I had a letter from the President of the Pacific School of Religion showing
    that I was to enroll in that school.
- speaker: Interviewer
  text: Japanese were not allowed to come then, were they?
- speaker: Respondent
  text: Japanese could not come to work.
- speaker: Interviewer
  text: Was there other Japanese passengers on your ship?
- speaker: Respondent
  text: I don't remember well. There may have been a few Japanese on the ship.
- speaker: Interviewer
  text: Then there were many Chinese on the ship, weren't there?
- speaker: Respondent
  text: Yes, I was surprised to see so many Chinese on a Japanese ship.
- speaker: Interviewer
  text: Did you stop in Hawaii?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: Do you remember anything that happened on the ship?
- speaker: Respondent
  text: No, I don't remember.
- speaker: Interviewer
  text: Do you remember going to the immigration office?
- speaker: Respondent
  text: The ship arrived in San Francisco and I went to the immigration office. Mr. Tomizawa, who was the secretary of the
    YMCA in San Francisco, was the first to meet me. He was a graduate of Tohoku-gakuin ahead of me. There were other alumni
    in California. I wrote to Mr. Sato, who lived in Oakland, to let him know that I was coming. He asked Mr. Tomizawa to
    meet me since he was the interpreter for the immigration office. I had no difficulty landing.
- speaker: Interviewer
  text: Then you arrived in San Francisco?
- speaker: Respondent
  text: Yes, I arrived in December. Then I went to Rev. Kikuchi's place in Wintersburg and stayed there until the school semester
    started in mid-January. I was at the Pacific School of Religion for three and a half years.
- speaker: Interviewer
  text: How was your English?
- speaker: Respondent
  text: It wasn't very good, but when I think of it now, I had a very good English professor, Dr. Paul Gilhart at Tohoku-gakuin.
    He taught us good pronunciation from the very beginning and it has helped me a lot. I didn't suffer with English as much
    as some others did. His son might be teaching at the International Christian University in Tokyo, now.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I stayed at the dormitory in Berkeley and was treated well. I think there were some anti-Japanese feelings then. I
    remember a member of the Oakland Japanese Methodist Church, Miss Yukiko Furuta, achieved exceptionally good grades in
    high school, but she was not asked to speak as a valedictorian at the time of her graduation because she was Japanese.
    I read about it in a Japanese newspaper and was shocked. I heard there were other cases like this in California.
- speaker: Interviewer
  text: You were treated well by Caucasian teachers while you were in Japan. Have you felt any difference while associating
    with Caucasians since you came to this country?
- speaker: Respondent
  text: I don't remember encountering any ill feelings. I think it is because my contacts and associates were with Christians
    and I attended Christian gatherings mainly. After the war broke out, there were many shocking incidents.
- speaker: Interviewer
  text: Let's talk about wartime later. When you came to America, what were your difficulties?
- speaker: Respondent
  text: I don't remember any. As students, we lived a simple life and we were young.
- speaker: Interviewer
  text: How old were you when you came to America?
- speaker: Respondent
  text: I was 27 years old.
- speaker: Interviewer
  text: Were there any sad occasions?
- speaker: Respondent
  text: No, I don't think there were any.
- speaker: Interviewer
  text: Any comical happenings?
- speaker: Respondent
  text: There was an Egyptian student at the dormitory and he used to prepare tasty food for us. I wanted to return his kindness.
    One day, I went shopping and found some pretty persimmons. I bought some and brought them back to the dormitory and told
    my Egyptian friend that the fruit was delicious. He took a bite and made an awful face. I took a bite and found out that
    they were puckery persimmons. I didn't know that we were supposed to wait until the fruit softened and sweetened.
- speaker: Interviewer
  text: Were there any other incidents?
- speaker: Respondent
  text: When I was at Princeton, other students had girlfriends or fiancees and they waited for letters to come from them.
    I wasn't interested in girls or getting married at that time and had no girlfriend. When my good friend asked me why I
    didn't receive any letters from girls, I told them I was already engaged. A few students came to my room and searched
    for proof, but they didn't find anything. There was another incident. A letter written in Japanese came to the school
    office minus the outside envelope. School officials thought it was an application and wanted me to read it. I read it
    and found out it was a nice letter to a student from Kochi, Japan, from his girlfriend. I couldn't bring it to him, so
    I put it under his door and one day asked him if he got the letter. He asked if I had read it, but I told him I hadn't
    and told him what had happened. There were seven or eight Japanese students at Princeton. One of the students was Katsukei
    Nakamura, a commando in the Japanese Navy who was married to General Togo's niece. He was sent over to study by the Navy
    Department. He was an interesting person to talk to and wasn't arrogant at all like some officers. He wanted to see all
    he could while he was there. He attended our prayer meetings and went to dance parties, too. During one summer vacation,
    a couple of members of the Japanese Embassy staff from Washington, D.C., came to study at Princeton. One was a captain
    and the other was a first lieutenant. The three decided to take a trip to the Southern states and they made plans. One
    was to research on the history, one to study the geography, and the third to study facilities. One day, all of us Japanese
    got together and started talking. The debate turned to Japanese Shintoism and Christianity. The young man from Kochi was
    an eloquent speaker and I think he won the debate. I think the captain from Washington, D.C., gave in but said he couldn't
    change from Shinto. After the three returned from vacation, we gathered at the dormitory again to hear about their trip.
    They evidently visited the school that Booker T. Washington established. They told us that when the Negroes at the school
    heard that the three were Japanese Navy men, they gave a big welcome.
