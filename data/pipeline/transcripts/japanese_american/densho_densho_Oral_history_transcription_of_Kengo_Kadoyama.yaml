collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Can you tell me about your first impressions of America?
- speaker: Respondent
  text: Very civilized country.
- speaker: Interviewer
  text: What kind of work did you do when you first arrived?
- speaker: Respondent
  text: Went into farming, later worked in a sawmill.
- speaker: Interviewer
  text: Did you have many encounters with white people at that time?
- speaker: Respondent
  text: Few encounters with white people so cannot say. Very few memories.
- speaker: Interviewer
  text: Did you experience any discrimination?
- speaker: Respondent
  text: Discrimination and lack of knowledge in English. Yes, but not physically harmed.
- speaker: Interviewer
  text: Did you attend school or take any classes?
- speaker: Respondent
  text: Went to night school.
- speaker: Interviewer
  text: What was your living situation like after the war?
- speaker: Respondent
  text: Around 75 dollars a month, 1959. $16,000. Beacon Hill, Seattle. No real estate.
- speaker: Interviewer
  text: Did you apply for citizenship?
- speaker: Respondent
  text: Yes, when applying for citizenship.
- speaker: Interviewer
  text: What activities did you enjoy?
- speaker: Respondent
  text: Play Go, attend movies, and take walks.
- speaker: Interviewer
  text: How was life during the depression period?
- speaker: Respondent
  text: Business was slow and raising children without a adequate income. After World War II.
- speaker: Interviewer
  text: How were Japanese people treated during World War II?
- speaker: Respondent
  text: Treated Japanese as the enemy and with much hatred. Too shocked to feel anything.
- speaker: Interviewer
  text: How did you learn about the evacuation?
- speaker: Respondent
  text: Through papers, radio, and notices posted on utility poles.
- speaker: Interviewer
  text: What was your reaction to the evacuation?
- speaker: Respondent
  text: Very uncertain about future. Friends felt very sorry that it had to happen.
- speaker: Interviewer
  text: What did you do with your possessions before leaving?
- speaker: Respondent
  text: Sold business and possessions. Took only minimum permitted. About $5,000.
- speaker: Interviewer
  text: Did your children show any concern?
- speaker: Respondent
  text: Seventeen, sixteen, and twelve. Did not show any concern.
- speaker: Interviewer
  text: Can you describe the assembly and relocation centers?
- speaker: Respondent
  text: Fuyallup Center, Minidoka, Idaho. Makeshift barns and converted stadium. Nothing impressive.
- speaker: Interviewer
  text: Were there any conflicts among the internees?
- speaker: Respondent
  text: Issei and Nisei having disputes because of conflicting ideas.
- speaker: Interviewer
  text: How did you personally feel about being in America during this time?
- speaker: Respondent
  text: Being in America, personally felt that one should be loyal to America.
- speaker: Interviewer
  text: How did you feel about the outside pressure?
- speaker: Respondent
  text: Relieved because of outside pressure.
- speaker: Interviewer
  text: Did the Nisei contribute to the country during internment?
- speaker: Respondent
  text: Since the Nisei were American citizens, they should contribute to the country by volunteering.
- speaker: Interviewer
  text: What activities did you do in the camps?
- speaker: Respondent
  text: Gardening, playing Go, taking walks, etc.
- speaker: Interviewer
  text: What kind of work did you do in the camps?
- speaker: Respondent
  text: Farming, the smashing and disposal of empty cans and containers.
- speaker: Interviewer
  text: Did you attend religious services?
- speaker: Respondent
  text: Attended many religious services of different religions.
- speaker: Interviewer
  text: How was life inside the camp compared to outside?
- speaker: Respondent
  text: Not much different from outside. Protection from outside discrimination.
- speaker: Interviewer
  text: Did you have any plans after leaving the camps?
- speaker: Respondent
  text: Seeking employment and education of son.
- speaker: Interviewer
  text: Where did you resettle after leaving the camps?
- speaker: Respondent
  text: To outskirts of Chicago, Illinois.
- speaker: Interviewer
  text: Did you have family there?
- speaker: Respondent
  text: Uncle was working there in greenhouses.
- speaker: Interviewer
  text: What kind of job did you get?
- speaker: Respondent
  text: Job in greenhouse.
- speaker: Interviewer
  text: Did you use any hostels for resettlement?
- speaker: Respondent
  text: Did not have opportunity to take advantage of hostels.
- speaker: Interviewer
  text: Did you have any encounters with white churches?
- speaker: Respondent
  text: No encounters with white churches.
- speaker: Interviewer
  text: Did elders encourage attendance at services?
- speaker: Respondent
  text: Elders and officers called on people to attend services.
- speaker: Interviewer
  text: How was your financial situation during resettlement?
- speaker: Respondent
  text: Not too good.
- speaker: Interviewer
  text: What were your goals for your son?
- speaker: Respondent
  text: Did best to see son go through college.
- speaker: Interviewer
  text: How did you find housing?
- speaker: Respondent
  text: Found house through real estate agent. Self employed (apartment).
- speaker: Interviewer
  text: Did you return to Seattle eventually?
- speaker: Respondent
  text: Returned to Seattle after everything had settled so did not have much difficulties.
- speaker: Interviewer
  text: Would you like to serve the church in any way?
- speaker: Respondent
  text: Would like to serve the church in any way possible.
