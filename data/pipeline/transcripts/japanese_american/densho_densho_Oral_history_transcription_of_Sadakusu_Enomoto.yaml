collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Sadakusu Enomoto.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In Meiji 23.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I am 85 years old.
- speaker: Interviewer
  text: Mr. Enomoto, how far did you go to school in Japan?
- speaker: Respondent
  text: Junior high school.
- speaker: Interviewer
  text: What did your family do?
- speaker: Respondent
  text: They were farmers.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were three of us and I am the youngest.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: In the year of Meiji 32.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I was 19 years old.
- speaker: Interviewer
  text: What city did you arrive?
- speaker: Respondent
  text: In San Francisco.
- speaker: Interviewer
  text: What was your reason for coming to America?
- speaker: Respondent
  text: A person from my home town, Mr. Domoto, who operated North American, told me that there was a great future in America.
    I decided to come with him and his bride and came on the same ship. I worked as a school boy for 7 years and did house
    work, etc. Then I bought 5 acres on contract in Redwood City and decided to grow flowers.
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: It was in 1907. After the earthquake in 1906, I had to leave there because of the fire.
- speaker: Interviewer
  text: Do you remember something about your school boy days?
- speaker: Respondent
  text: I went to school and when I was at home, I helped in the kitchen.
- speaker: Interviewer
  text: Did you make any mistakes?
- speaker: Respondent
  text: When I was offered oatmeal mush in the morning, I didn't know how to eat it, so I used my knife to cut it up into
    chunks and ate it with a fork. The waitress told me I wasn't supposed to eat it in that way. I didn't understand her well
    at that time but she said I was supposed to put sugar and milk on the mush, break it up with a spoon and eat it. It seems
    funny now.
- speaker: Interviewer
  text: Did you have any difficulties when you came?
- speaker: Respondent
  text: I didn't have the experience as a school boy and when I tried out at first, I didn't get hired. But I got used to
    the job in about a year. I was receiving only about $1.50 per week.
- speaker: Interviewer
  text: You did this seven years?
- speaker: Respondent
  text: Yes, I did this 7 years. I decided I couldn't get anywhere keeping on this way and pondered what I should do. There
    was some land for sale and a friend said I could grow flowers there. 5 acres was $1,750.00, $200.00 down and $15.00 per
    month payment. I didn't have any difficulty.
- speaker: Interviewer
  text: Where was this?
- speaker: Respondent
  text: In Redwood City, California.
- speaker: Interviewer
  text: Were you able to purchase land then?
- speaker: Respondent
  text: Yes. Around 1910, Alien Land Law came into effect and noncitizens were not able to buy land after that. I got married
    in Japan and brought my wife to America about that time. The law was that if I died, the land would be taken by the state
    and could not be transferred to my wife. When my child was born, I changed it into a corporation on myself, my wife, and
    my child. This was a loophole that we were able to do. We made it into a joint stock company, Enomoto Company, so the
    family could hold the land and expand. The land is valuable now. Once I was asked to march in a parade as a pioneer in
    Redwood City.
- speaker: Interviewer
  text: Is your business kept on now?
- speaker: Respondent
  text: Yes. My children are carrying on the business.
- speaker: Interviewer
  text: Did you have any difficulty since you started the business?
- speaker: Respondent
  text: Yes, during the war.
- speaker: Interviewer
  text: How was it at the beginning?
- speaker: Respondent
  text: There was anti-Japanese feeling then but we worked faithfully and our Japanese employees were all good workers. Neighbors
    liked us and we didn't have much difficulty, but some Italian operators failed in their businesses.
- speaker: Interviewer
  text: How many employees did you have then?
- speaker: Respondent
  text: About 10 people. When we were short of supply, we bought flowers from other growers and shipped them to all parts
    of the United States. There were many Chinese growers then. Flowers were cheap at that time.
- speaker: Interviewer
  text: What were you growing?
- speaker: Respondent
  text: Mostly carnations in greenhouses. Too many people started to grow carnations since then and the price came down. Then
    we started to grow roses. We have 10 acres in Half Moon Bay and we have a new 100,000 square foot greenhouse in Redwood
    City. My grandson operates the new place with an Italian helper.
- speaker: Interviewer
  text: When you first started, were the employees all Issei Japanese?
- speaker: Interviewer
  text: If you had failure at any time, please tell me about it.
- speaker: Respondent
  text: Everything went pretty well. Sometimes we had inexperienced employees and flowers weren't very good but we managed
    to buy flowers from other growers to ship out and make up for it.
- speaker: Interviewer
  text: Was this after the earthquake in San Francisco?
- speaker: Interviewer
  text: When did the Anti-Japanese Movement begin?
- speaker: Respondent
  text: About 1912. The state created the Alien Land Law. A person who bought before the law was able to keep the land but
    could not transfer the property to others. Therefore, we started a corporation. A man was able to buy land. Most Japanese
    have citizenship now so there is no difficulty in buying land.
- speaker: Interviewer
  text: When you came to America, were there about 200 Japanese in the San Francisco area?
- speaker: Interviewer
  text: When did you get to know Dr. Sturge?
- speaker: Respondent
  text: I think it was before the earthquake. I learned English from him. I think he died around 1917. He was friendly to
    Japanese and he was the superintendent of the Japanese Presbyterian Churches.
- speaker: Interviewer
  text: When did you get married?
- speaker: Interviewer
  text: How did you get married?
- speaker: Respondent
  text: I went to Japan, met her and got married in about 6 months and brought her to this country.
- speaker: Interviewer
  text: Was she from Wakayama?
- speaker: Interviewer
  text: Did you continue your flower growing business?
- speaker: Respondent
  text: Yes. I was also importing some things from Japan such as fertilizers. Japan had good fertilizers such as fish meal,
    oil cake, etc. I was investigated when the war broke out because I was doing quite a big import business. Federal investigators
    came and checked all my books. At that time, Japanese Association Presidents, businessmen, and men in import-export business
    were interned. I was interned also.
- speaker: Interviewer
  text: Where did you go to?
- speaker: Respondent
  text: To an internment camp in North Dakota. My wife and five children moved to Denver, Colorado. When the evacuation order
    came, they moved on their own and did not go into WRA centers. After my hearing was over, I joined my family in Denver
    from North Dakota. We rented a house and stayed there until the war ended.
- speaker: Interviewer
  text: Did anything happen at the internment camp?
- speaker: Respondent
  text: The government controlled the camp and everything was run orderly. I think the United States took good care of us.
    Food was plentiful. I don't know what Japan would have done under similar circumstances.
- speaker: Interviewer
  text: Were there any problems?
- speaker: Respondent
  text: No, there weren't any particular problems.
- speaker: Interviewer
  text: Did you think it was wrong?
- speaker: Respondent
  text: No, because it was wartime. I thought the Japanese government was probably doing the same.
- speaker: Interviewer
  text: Did you feel any danger for your life?
- speaker: Respondent
  text: No, I didn't think so. When we were travelling by train, the shades were always down and whenever we stopped, there
    were machine guns, but there were so many of us together that I wasn't scared. I thought they did those things because
    of the war.
- speaker: Interviewer
  text: Do you remember something else about the camp?
- speaker: Respondent
  text: Please tell me what you did during the Depression.
- speaker: Interviewer
  text: I sold about the same amount of flowers.
- speaker: Interviewer
  text: Weren't there bankruptcies, etc.?
- speaker: Respondent
  text: There were some. There were many accounts that I couldn't collect but I made it through the Depression.
- speaker: Interviewer
  text: What bank did you do business with at that time?
- speaker: Respondent
  text: The Anglo California Bank. They helped me when I needed it.
- speaker: Interviewer
  text: Weren't there Japanese banks too?
- speaker: Respondent
  text: Yes, there were the Sumitomo and the Yokohama Specie banks, but I didn't use them.
- speaker: Interviewer
  text: Didn't most firms use the Japanese banks?
- speaker: Respondent
  text: Most Japanese firms did business with the Yokohama Specie Bank, but for a business like mine they didn't loan out
    any money. I didn't ask, but I thought they didn't. The American banks were good to me.
- speaker: Interviewer
  text: How was your business when Pearl Harbor was attacked?
- speaker: Respondent
  text: Around that time, I was doing business on a smaller scale. When the war broke out, business stopped.
- speaker: Interviewer
  text: Were Japanese children put in a segregated school around here?
- speaker: Respondent
  text: No, not around here.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I was surprised but there wasn't anything we could do about it. Rumors started that we would be put in camps but I
    didn't think we would be killed.
- speaker: Interviewer
  text: When the war started, did you feel any danger for your business?
- speaker: Respondent
  text: I thought there would be no business.
- speaker: Interviewer
  text: When did the FBI come to your place?
- speaker: Respondent
  text: About one week after Pearl Harbor was attacked.
- speaker: Interviewer
  text: Did they close your business?
- speaker: Respondent
  text: No, they let us carry on the business but they investigated our books, etc. I didn't do anything illegal and wasn't
    afraid at all.
- speaker: Interviewer
  text: Then did they take you to an internment camp about one month later?
- speaker: Interviewer
  text: Did you close your business?
- speaker: Respondent
  text: Yes, I closed my business.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: Nearly 60 years old.
- speaker: Interviewer
  text: Were your children helping you run your business then?
- speaker: Respondent
  text: Yes, my son was studying at U.C. but when the war broke out he quit school to help me. After the war, he went back
    to U.C. and graduated.
- speaker: Interviewer
  text: Was he your eldest son?
- speaker: Interviewer
  text: What did you do with the business while you were in Denver?
- speaker: Respondent
  text: We closed the flower business, and the nursery was taken care of by the Association.
- speaker: Interviewer
  text: What did you do in Denver?
- speaker: Respondent
  text: I didn't do anything. A year after we moved there, I started to receive Social Security. One of my daughters worked
    as a stenographer.
- speaker: Interviewer
  text: When the war broke out, you were near retirement age, weren't you?
- speaker: Respondent
  text: Yes, I retired. We couldn't make money by having someone else manage the flower business. We had to watch and buy
    fresh and good quality. It's hard to do this when you leave it up to employees.
- speaker: Interviewer
  text: When did you return to California?
- speaker: Respondent
  text: Soon after the war ended.
- speaker: Interviewer
  text: Did you feel any anti-Japanese feeling before the war broke out?
- speaker: Respondent
  text: No, I didn't feel any.
- speaker: Interviewer
  text: When you returned after the war, was the business returned to you?
- speaker: Respondent
  text: I didn't open any business. The nursery was returned to me without any trouble. During the war, the people who ran
    it made money and they were happy. My second son is running the import business within the nursery now.
- speaker: Interviewer
  text: What is he growing now?
- speaker: Interviewer
  text: When you first came to America, what were Japanese doing in San Francisco?
- speaker: Respondent
  text: There were many laundry and dry cleaning establishments. There must have been 120 or 130. It didn't take much investment
    and a man could start this type of business and make money.
- speaker: Interviewer
  text: What else did the Japanese do?
- speaker: Respondent
  text: There were some in the import-export business, but not very many.
- speaker: Interviewer
  text: When did the Sumitomo and the Yokohama Specie Banks open their business?
- speaker: Respondent
  text: When I came, the Specie Bank was already established in San Francisco.
- speaker: Interviewer
  text: What sort of hardships did Japanese have when they came to America? Language difficulty?
- speaker: Respondent
  text: Yes, not knowing English was a hardship. There were many businesses dealing with Japanese, such as eating places.
- speaker: Interviewer
  text: In Sacramento, I heard that there were some people in the prostitution business.
- speaker: Respondent
  text: Yes, there were prostitutes. There were quite a few Japanese women already in the Chinese section of the town when
    I came.
- speaker: Interviewer
  text: Were there gambling places?
- speaker: Respondent
  text: There were one or two Japanese gambling places in San Francisco. Some went but I didn't like it and I didn't go.
- speaker: Interviewer
  text: Did you come from Japan and were you a Christian minister in Japan?
- speaker: Respondent
  text: No, I went to Theological school in this country after I came to America.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Kagoshima, Japan, and I was raised in Manchuria when I was young.
- speaker: Interviewer
  text: I've been to Manchuria once.
- speaker: Respondent
  text: When was it?
- speaker: Interviewer
  text: It was before the war.
- speaker: Respondent
  text: How long were you there?
- speaker: Interviewer
  text: I was there working for a firm.
- speaker: Interviewer
  text: When you arrived in San Francisco, did you go to Angel Island?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: How long did you stay?
- speaker: Respondent
  text: I stayed two days.
- speaker: Interviewer
  text: Where did you settle first?
- speaker: Respondent
  text: I went to a Japanese boarding house in San Francisco. I had a friend who looked after me.
- speaker: Interviewer
  text: Who taught you the flower business?
- speaker: Respondent
  text: No one taught me. My brother was here and he was working for a person who operated a flower business so I decided
    to go into this business.
- speaker: Interviewer
  text: You didn't go through hardships such as some Japanese went through, did you? Your business went smoothly?
- speaker: Respondent
  text: Yes. I learned English from Dr. Sturge and was able to converse enough for my business. I also went to Heald's college
    in the evenings.
- speaker: Interviewer
  text: How old is your eldest child now?
- speaker: Respondent
  text: He is near 60. He is in the nursery business in Redwood City. My grandchildren are grown, too. My married daughter's
    family (Oku family) has a large nursery in Half Moon Bay. I think they have about 30 acres.
- speaker: Interviewer
  text: What sort of people were on the ship when you came to America?
- speaker: Respondent
  text: There was one passenger in the first class and he was on his way to Europe. I came in the second class. The ship was
    an English ship.
- speaker: Interviewer
  text: Were you the only Japanese?
- speaker: Respondent
  text: No, there must have been about 30 Japanese on the ship.
- speaker: Interviewer
  text: Were they all young?
- speaker: Respondent
  text: Yes, they were young. Many were students.
- speaker: Interviewer
  text: Do you have five children?
- speaker: Interviewer
  text: When did your first wife pass away?
- speaker: Respondent
  text: About ten years after we got married. I went to Japan again and married my second wife. She died when I was 73 years
    old.
