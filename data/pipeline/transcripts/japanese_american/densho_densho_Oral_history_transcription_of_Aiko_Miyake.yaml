collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Shall we do it in here? At first I'll ask you about the time you lived in Japan. Where did you come from?
- speaker: Respondent
  text: Okayama prefecture.
- speaker: Interviewer
  text: Where about in Okayama?
- speaker: Interviewer
  text: What was your family's occupation? Were they farmers?
- speaker: Interviewer
  text: How many children were in your family? How many brothers and sisters did you have?
- speaker: Respondent
  text: There were eight of them.
- speaker: Interviewer
  text: Eight of them?
- speaker: Respondent
  text: Yes, all of them are living.
- speaker: Interviewer
  text: Were you the oldest?
- speaker: Respondent
  text: I was the second child.
- speaker: Interviewer
  text: Before you came to the United States, there were a lot of events that happened while you were in Japan, such as the
    Sino-Japanese War, the Russo-Japanese War, World War I, the Manchu Conflict, etc. Do you remember the Sino-Japanese War?
- speaker: Interviewer
  text: How about the Russo-Japanese War?
- speaker: Respondent
  text: It happened when I was about five. I don't remember very much about it, but I do recall that there was a lantern parade.
    It must have been when the war was over. I remember also we sang the song 'Japanese Won, Japanese Won, Russo Lost'.
- speaker: Interviewer
  text: How about World War I?
- speaker: Respondent
  text: It was the time I was going to high school.
- speaker: Interviewer
  text: What do you remember?
- speaker: Respondent
  text: I remember very little. I remember that Tsingtao fell. It was one day in fall when I had gone to a picnic, far away
    in the mountains. We came back by boat in the night. The people in the town were very excited. The lanterns were lit.
    The people were running around. I heard that Tsingtao had fallen and that they were going to have a lantern parade.
- speaker: Interviewer
  text: World War I affected mainly Europe. Japan was not very much affected, was it?
- speaker: Respondent
  text: No, it was not. At that time Japan had a treaty with the allies. Germany had occupied Tsingtao. Russia got Port Arthur
    then. The Japanese attacked Tsingtao and took it away from Germany.
- speaker: Interviewer
  text: How about the Manchu Conflict?
- speaker: Respondent
  text: I was here in the United States then.
- speaker: Interviewer
  text: How much education did you receive in Japan?
- speaker: Respondent
  text: After graduation from high school, I attended a normal school (Shihan Nibu). Many students who wanted to become teachers
    went to normal school for four years after finishing the eighth grade, but the school I went to you entered after finishing
    four years of high school. I had to learn within one year how to teach children, the management of children, the history
    of education, child psychology etc. There were so many books to read in one year.
- speaker: Interviewer
  text: After four years of high school you went to normal school?
- speaker: Respondent
  text: Yes, when you finished normal school you received a teaching certificate. You could teach up to eighth grade with
    it. There were alternatives, some of the graduates could only teach up to sixth grade, and some of them could only teach
    sewing in elementary schools.
- speaker: Interviewer
  text: Do you know about the teachers colleges (Koto Shihan)?
- speaker: Respondent
  text: The teachers colleges were different from the school I went to. After graduation from teachers college you could teach
    in a high school. When I was in high school my teacher asked me about my chances of going to teachers college. I asked
    my father and he said, 'If I send you I must send the others too.' I had so many brothers and sisters. Besides many girls
    got married after the school anyway. I decided a normal school was good enough for me.
- speaker: Interviewer
  text: Not many girls went to high school then?
- speaker: Respondent
  text: You are right. There were not many.
- speaker: Interviewer
  text: What size of town did you live in?
- speaker: Respondent
  text: I lived on the edge of the town.
- speaker: Interviewer
  text: How many population?
- speaker: Respondent
  text: Around 5,000 to 6,000.
- speaker: Interviewer
  text: How many girls went to girls high school? Very few?
- speaker: Respondent
  text: From my elementary class perhaps three. Some of the girls came from the seventh grade, maybe three or four of them.
    The high school I went to also had a vocational school where you learned sewing, home economics, etc. Some of the other
    girls went there.
- speaker: Interviewer
  text: How many students were in the class?
- speaker: Respondent
  text: If I remember correctly, there were around thirty.
- speaker: Interviewer
  text: How many entered from your elementary school?
- speaker: Respondent
  text: There were three of them.
- speaker: Interviewer
  text: How many girls went to normal school from your high school class?
- speaker: Respondent
  text: There were three from my class.
- speaker: Interviewer
  text: How large was the class?
- speaker: Respondent
  text: Do you mean the high school class?
- speaker: Respondent
  text: A little more than thirty.
- speaker: Interviewer
  text: From that class only three of them went to the normal school?
- speaker: Respondent
  text: Yes, but there was a girl who came into the high school after the eighth grade (Koto-Ka) so if I count her there were
    four of us.
- speaker: Interviewer
  text: Do you remember the great Kanto earthquake?
- speaker: Respondent
  text: Yes, at that time I happened to be living in Japan. There were many rumors. Something about the Koreans were rioting.
    My brother was living in Tokyo then. He came home in the confusion and told the family that there were lots of chances
    for money making. He wanted to sell some of our family's assets to help him in his money making scheme.
- speaker: Interviewer
  text: What did your family do?
- speaker: Respondent
  text: We did nothing. The relatives were against the idea.
- speaker: Interviewer
  text: What about the Koreans? I remember my grandmother mentioned something about this also.
- speaker: Respondent
  text: There were stories about stealing.
- speaker: Interviewer
  text: Did they do the bad things?
- speaker: Respondent
  text: My grandfather remembered that someone told him, 'You had better shave your mustache. You'll be mistaken for a Korean'.
- speaker: Interviewer
  text: Do you remember the tidal wave or plague?
- speaker: Interviewer
  text: What were the most memorable things that you remember of Japan? Including happy or sad things.
- speaker: Respondent
  text: The happy times I had were New Years, Obon (fall ceremony of Buddhism) and the shrine festivals.
- speaker: Interviewer
  text: What did you do on New Years?
- speaker: Respondent
  text: On those days we played Hanetsuki (similar to badminton), Sugoroku (Monopoly like game) and Karuta (a card game).
- speaker: Interviewer
  text: Karuta, you mean one hundred poems by one hundred poets?
- speaker: Respondent
  text: Yes, I wasn't too good at it. The making of rice cakes for the New Year was a happy memory too. Everyone got up very
    early in the morning. All the neighbors got together and made the rice cakes.
- speaker: Interviewer
  text: Did your area have the custom of Otoshidama?
- speaker: Interviewer
  text: The children go around saying 'Happy New Year'. The neighbors and relatives give the children some spending money
    in return, ten yen, fifteen yen, maybe in your time more like five sen, ten sen.
- speaker: Respondent
  text: I remember the word 'Otoshidama' but it is not very clear to me what I did.
- speaker: Interviewer
  text: Let me see what else....
- speaker: Interviewer
  text: What kinds?
- speaker: Respondent
  text: Hachiman, Oinari, etc., there were some festivals in summer too, but in November and December we had big festivals.
    There were festival events all along the bank of the river. There was a ferry boat on the river. A big bridge was put
    across the river. There were many people that came from far away places. There were many beggars on the river bank. Nearby
    the shrine there were lots of shows and people selling old fashioned candy such as cotton candy, stone candy, etc. Those
    goodies were only sold at the festivals so they were more precious. There were also Nozoki (penny arcades). There were
    other festivals too, Uji-Gami (native gods), Hachiman (a warrior god), Obon (a Buddhism ceremony), but those were not
    as large as the ones I mentioned before.
- speaker: Interviewer
  text: What was the largest festival?
- speaker: Respondent
  text: It was Oinari.
- speaker: Interviewer
  text: Oinari? Was this worshipping the fox?
- speaker: Respondent
  text: Yes, I believe me I never gave much thought about it. I heard something about that you put some fried bean curds in
    the front of the shrine and the fox comes out and eats them. The shrine's priest was a high school teacher. He taught
    Japanese.
- speaker: Interviewer
  text: How about Hachiman? Is it worshipping Genji? (an old noble warrior)
- speaker: Respondent
  text: Yes, I think so.
- speaker: Interviewer
  text: What did your family believe in?
- speaker: Respondent
  text: Shingon Shu (a Buddhist sect).
- speaker: Interviewer
  text: Who established it?
- speaker: Respondent
  text: Who was it... It was one of the oldest Buddhist sects in Japan.
- speaker: Interviewer
  text: Was he one of the poets in 'One Hundred Poems by One Hundred Poets'?
- speaker: Respondent
  text: He started in the Koya Mountains. I have forgotten lots of things.
- speaker: Interviewer
  text: I've forgotten too. When did you hear about Christ?
- speaker: Respondent
  text: When I was a child there was a playmate who was a daughter of a minister of a Christian faith. She was always saying
    'My grandmother is a star in the sky'.
- speaker: Interviewer
  text: What did you hear about the Christians?
- speaker: Respondent
  text: I don't remember too much about it although I remember Yaso Masa. He was a farmer. I thought his name was Yaso Masa
    but really Yaso meant Christian in Japanese. I guess he became a Christian and therefore the people called him Yaso, a
    Christian. There was a church in the town, but I never went. I remember reading a gospel once. I don't remember when.
- speaker: Interviewer
  text: Who brought it to you?
- speaker: Respondent
  text: Probably my brother. I don't remember clearly.
- speaker: Interviewer
  text: Was there any social trouble in Japan prior to your coming to the United States?
- speaker: Respondent
  text: It was the time that World War I was over, momentarily a peace time. It was the Come Sodo (rice riot).
- speaker: Interviewer
  text: What was it?
- speaker: Respondent
  text: Some hungry poor people got together and looted some rich people.
- speaker: Interviewer
  text: Did it happen in your town?
- speaker: Respondent
  text: No, it did not happen in my town.
- speaker: Interviewer
  text: What was the reason that you came to America? Your marriage?
- speaker: Respondent
  text: Yes. There weren't good job opportunities in Japan. I thought that life would be better in America. My brother-in-law
    owned a few houses and where my husband came from they produced straw-mats. My brother-in-law suggested that they engage
    in a business there or in Manchuria, but my husband wanted to return to America. I had heard rather pessimistic stories
    about America that there were differences between what people believe and the actual conditions. Myself, I never thought
    of going to America.
- speaker: Interviewer
  text: When you got married did you know that you were coming to America?
- speaker: Respondent
  text: No, I had no idea. I thought that we would be living in Japan.
- speaker: Interviewer
  text: What did your husband do for a living when he was here?
- speaker: Respondent
  text: He was in the express business till he came back to Japan.
- speaker: Interviewer
  text: What was it?
- speaker: Respondent
  text: It was delivering things.
- speaker: Interviewer
  text: I see, it was hard labor wasn't it?
- speaker: Respondent
  text: I don't think it was too hard. It was not like these days. He sold that business when he left the U.S.
- speaker: Interviewer
  text: What did he do then?
- speaker: Respondent
  text: He worked at the cannery, a salmon cannery.
- speaker: Interviewer
  text: I'll go back for a little. I'll ask you about your trip to the States. When did you leave Japan?
- speaker: Respondent
  text: In July, the fifth or sixth, I think.
- speaker: Interviewer
  text: In what year?
- speaker: Interviewer
  text: Did you stop at Hawaii?
- speaker: Respondent
  text: No, we stopped at Seattle first then Portland.
- speaker: Interviewer
  text: What kind of people were on the ship?
- speaker: Respondent
  text: Let me see... Many of them were just like us, not well off, taking the economy class trip.
- speaker: Interviewer
  text: What was the condition of the voyage? Was it crowded?
- speaker: Respondent
  text: It wasn't too bad. It wasn't too good either. There were rows of bunk beds that I remember.
- speaker: Interviewer
  text: How large was the ship? How many people were on board?
- speaker: Respondent
  text: I don't remember anymore.
- speaker: Interviewer
  text: How long did the trip take?
- speaker: Respondent
  text: Perhaps two weeks.
- speaker: Interviewer
  text: What were the things that you remember while you were on the ship?
- speaker: Respondent
  text: The first two or three days I was sea-sick. I thought that we don't know a single soul on the ship, but there was
    a man that my husband knew. He came from Kyushu, an educated fine person. I don't remember much about it anymore... I
    remember that I was crying sometimes.
- speaker: Interviewer
  text: What did you think about the States? I mean before landing in the States?
- speaker: Respondent
  text: I guess I was a very insensitive person. I didn't give it much thought.
- speaker: Interviewer
  text: Did you think that this was destiny?
- speaker: Respondent
  text: No, like I said, I did not give it much thought.
- speaker: Interviewer
  text: When you landed in the States what was your first impression? Did you land at Seattle?
- speaker: Interviewer
  text: What was your first impression?
- speaker: Respondent
  text: I'm hazy about what I felt at first. I remember that I thought the market was huge. The cantaloupes were stacked up
    like a mountain.
- speaker: Interviewer
  text: You went through the immigration office, didn't you?
- speaker: Interviewer
  text: How did they treat you?
- speaker: Respondent
  text: It wasn't too bad.
- speaker: Interviewer
  text: What did you do at first, after arriving in the States?
- speaker: Respondent
  text: From Washington State we went to Portland. We visited my husband's old acquaintances, then we went to Astoria's cannery.
    I ate some food which was cooked by a Chinese. The people there were saying delicious, but to me it was bad. In the cannery
    the married couples lived in the houses, but the bachelors lived in the dormitory, eating the Chinese cook's food. They
    asked me if I wanted to work there since I had no children. I worked there one day then they told me that there was someone
    who wanted work. I worked only one day the whole time that I was there.
- speaker: Interviewer
  text: Was the cannery run by a Japanese?
- speaker: Respondent
  text: Yes, it was. Every day I read a book or did some knitting.
- speaker: Interviewer
  text: Did you eat with your husband?
- speaker: Respondent
  text: Yes. Sometimes the bachelors asked me if I could make Osushi. I had no experience and besides it was hard to cook
    rice with a little kerosene stove. I went to see the Chinese cook and asked him to cook rice for Osushi.
- speaker: Interviewer
  text: What was your first impression when you first saw a Caucasian?
- speaker: Respondent
  text: To tell you the truth... nothing special. I felt that I had come from a far place.
- speaker: Interviewer
  text: What were the sad things that happened to you while you were here?
- speaker: Respondent
  text: I couldn't say. The really sad things didn't happen to me.
- speaker: Interviewer
  text: How about the happy things?
- speaker: Respondent
  text: I didn't experience the really happy things either.
- speaker: Interviewer
  text: Have you had any grievances?
- speaker: Respondent
  text: No, I guess I had an uneventful life.
- speaker: Interviewer
  text: How about funny things?
- speaker: Respondent
  text: A funny thing was my English. It wasn't really communicable. When I said 'No', I meant 'yes' in English. 'Yes' was
    'No'.
- speaker: Interviewer
  text: How did you get married? What I mean, was it by arrangement?
- speaker: Respondent
  text: Yes, my mother's sister married Miyake. I married her husband's younger brother. My uncle-in-law made the arrangement.
- speaker: Interviewer
  text: Did you know your husband before you married him?
- speaker: Respondent
  text: No, I didn't.
