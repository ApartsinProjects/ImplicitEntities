collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: So I know you're very involved in the Nikkei community here. So how have you seen it sort of transform or change,
    even from post-war until now? Like taking Sawtelle, for example, as a Japanese American hub.
- speaker: Respondent
  text: It's pretty much disappeared, the JA hub. Two years ago the LA city council recognized Sawtelle Japantown but it's
    sort of the tail-end. Sawtelle in the 20s and 30s, it was sort of a ghetto. Westwood was here, Bel-Air was there, Brentwood
    is over there, Pacific Palisades, and they says, 'OK Jap, come and take care of my grass, take care of my landscape, but
    you live over here.' Redlined and all that. And then after the war they became much more entrepreneurial because the Nisei
    came out before World War Two. It was the Nisei that said, "Arigato." Kibei and Nisei and that was the thing to do. Go
    to Japan and get educated. Start a business or work for a business or whatever. But you come back and what do you do?
    Gardening, market, things like that. But you're always subservient to your Issei dad.
- speaker: Interviewer
  text: What was his job here? What was he doing?
- speaker: Respondent
  text: I don't know. He had a laundry. He made geta [footwear]. Because I remember my uncle lit fire to the laundry. He was
    a little old brat you know. Make chaos all over the community and so he'd take a fire and burn somebody's shirt and grandpa
    or grandma would have to run over and apologize. He was good at making geta because he didn't have any shoes. In other
    words, they survived the best way they could. A lot of it was just farming.
- speaker: Interviewer
  text: What prefecture were they from?
- speaker: Respondent
  text: Hiroshima. Yes so he went back to Japan. Acting like a big old kingpin. He had some kind of disease. But he was an
    alcoholic, too. He liked to drink. So he didn't last very long. And Grandma, when I went in 1950 I right after the Korean
    War started, I talked to my grandma. I talked to her for a long time. Delightful lady. She brought up the kids. Shipped
    them back here in 1924, that time period when the anti-Japanese legislation came on. So they returned here and stayed
    with the Yokoyama family and the old man got mad and said, "I can't support all these women here. The two sisters. 'So,
    you go get married. You go get married.' So that's how my dad got married to one. And then the other daughter to another
    family.
- speaker: Respondent
  text: So it was the desire of all the people or most of the people to go back to Japan with gold mountain. And, when you
    think about it, what the hell are they're going to go back to? What are they going to be doing? They're still young yet,
    they've got a whole life a head of them, then they got a war coming on or whatever. But in the '70s, Japan was ruling
    the world economically so it was great. But right after '45 people got out of camp but there was nothing. They had to
    build. And it was the Nisei that built. And the JACL was all Nisei, they wouldn't accept an Issei. So there was a lot
    of resentment against the JACL. Because no Issei could do anything with JACL.
- speaker: Interviewer
  text: I didn't know that. So they purposely kept the Issei out?
- speaker: Respondent
  text: The Nisei kept the Issei out. That's why like, the Manzanar riot, the Kibei guys ganged up on the JACL people, they
    were all Nisei. Same thing in the Poston riot. These riots were all prompted against the JACL because they were Nisei.
    But see before the war it was always the Nisei subservient to the Issei. That's to me anyway, that's my interpretation.
    Then the next thing is right after camp, the people came out and the Issei couldn't speak English. So how are they going
    to go and live? They have to go to a boarding house. How did they negotiate in the boarding house? Or how are they going
    to go and buy something? Then the Nisei then had to come out of their shell and say, Okay, Dad. Get lost, I'll take care
    of it.
- speaker: Respondent
  text: And that's why Sawtelle really was a boomtown. Sawtelle was really important in the late '40s and '50s. Then come
    about '65 when the big wave of shin-Issei, new Issei coming in because they were getting the prelude to '70 boons for
    the Japanese.
- speaker: Respondent
  text: So for me, the '50s and '60s were great times because I got into academics and my dad said, "You're no farmer. You
    ain't going to succeed in farming. So you better use your head. I won't give you any money I don't have any." Because
    when they came out of camp they had nothing. So then I went into academics.
- speaker: Interviewer
  text: So you yourself, your family was where? Were you in the L.A. area?
- speaker: Respondent
  text: No I'm San Diego, Northern San Diego. My dad and his brother both were strawberry farmers. So then we went into camp
    with three cousins.
- speaker: Interviewer
  text: And you have a family of six, you were the oldest?
- speaker: Respondent
  text: We're sort of like two families because me, my older sister and second sister, we were all born in the '20s and '30s.
    And the three others, Tak came along in 39, Judy in '40 and Eiko in '45. We're like two families. We really don't know
    each other that well. That's why when Tak became this famous cinematographer and all that, we didn't talk.
- speaker: Interviewer
  text: Not super close with the younger siblings.
- speaker: Respondent
  text: No. My dad sort of took a little different turn when he was raising us. He wanted me to go to Japan. Become a Kibei.
    Go get educated, come back here, do whatever you want. But with Tak, young kid. Two or three years old when he went to
    camp. My father wanted to be the block manager, he became the block manager. He lost all interest in going back to Japan.
    He flipped around and became much more American. And so the three younger kids, they grew up American. They don't know
    Japan at all. They don't know kanji, they don't know hiragana or any of the language. And they can listen. My dad and
    mom can't speak English but at least they can understand.
- speaker: Interviewer
  text: So that happened in camp?
- speaker: Respondent
  text: Before camp because when Tak went into camp, Judy went into camp, my mom just about died in camp that first year because
    it was so damn hot. And I remember I used to have to go to the canteen every day. And they kept saying, 'Hey get your
    ass out of here. We're ain't going to give you anymore ice.' But everybody suffered if they weren't used to the heat.
    So mom just about perished, died.
- speaker: Interviewer
  text: So if your Dad made this switch in his raising of you, was that because he knew the war was happening and he thought,
    'We'd better really assimilate or better assimilate these younger children?' Or what do you think that was.
- speaker: Respondent
  text: Well in my case, seeing he already wanted me to go to Japan. I was already 12 years old, 1940. He wanted me to go
    to Japan and get an education. Me and my cousin. It's a good thing we didn't go.
- speaker: Interviewer
  text: Yeah. You would've been stuck.
- speaker: Respondent
  text: We would've been stuck, right. I would've been conscripted for the Army, then we'd be suffering and all that. So it's
    a good decision saying that, 'We don't have any money to send you.'
- speaker: Interviewer
  text: But he wanted that initially.
- speaker: Respondent
  text: Yeah, that's what he wanted. So his views were pro-Japan. During the war too or throughout?
- speaker: Interviewer
  text: Just sort of at the beginning of the war when Japan was winning. Then, it changed. And he became the block manager.
    He'd start talking for the community of the block. You know there are 16 barracks in a block and he became a spokesperson
    for that. And then he started building ponds and bridges you know to beautify the block? And then my uncle, my father's
    older brother was very craft-oriented so he'd take mesquite and make bird pins, make different kinds of crafts. And he'd
    build bridges, go fishing. So they became much more Americanized. In other words the whole view of pro-Japan changed to
    not anti-Japan but pro-American.
- speaker: Respondent
  text: It was like a sense of self-preservation too. But it's sad because it took away the identity of the Issei or the Kibei
    that felt like they didn't have a say anymore.
- speaker: Interviewer
  text: That's right. That's why in camp, they make a big noise about those that went to the army, 442, 100th and glorify
    them. And then there were people that said, 'Well, I don't understand anything about worship of the Emperor. Loyalty to
    the Emperor. And so you have that Frank Emi, and no-no resistance group, and Tule Lake became a segregation camp. So you
    know you get the divide among the Japanese. It's an interesting period of Japanese American history. That's why what you're
    doing is very exciting, I think.
- speaker: Respondent
  text: It is because now that so much time has passed I think even. The people I speak with are getting more honest about
    how or they're taking guesses with how their parents might have felt. I think as people get older they realize you know,
    'I want to say this truth about my past.'
- speaker: Interviewer
  text: Yeah. What do you think?
- speaker: Respondent
  text: Being the baby of the family I had way too much fun.
- speaker: Interviewer
  text: You have opinions.
- speaker: Respondent
  text: Well my father was probably the hardest person to understand. He's very strong minded and my mother was very gentle
    and she took everything.
- speaker: Interviewer
  text: Your Mom was tremendous.
- speaker: Respondent
  text: I know. She's a smart lady, man.
- speaker: Interviewer
  text: Your old man was a grouch.
- speaker: Respondent
  text: I'd always hear him say, Bakayaro! Means 'He's stupid.' Always kept saying that I thought, 'Oh no there he goes again.'
    He's a mean old dad.
- speaker: Interviewer
  text: Was he Issei, Kibei?
- speaker: Interviewer
  text: And your mother too?
- speaker: Respondent
  text: Yeah. But I was the youngest so I got to be spoiled rotten. I had it made. It was hot in there [Poston] but I had
    a ball in there. I mean I got dark, well, I got darker and my sister is very fair, she's a beauty queen. She's very musical.
    What happened to me? But she stood out. Not that she bragged, she was just naturally beautiful, so I was a nothing. But
    I had fun being the baby of the family. I had it good. I've really been lucky.
- speaker: Interviewer
  text: So it was just fun for you because being a kid-
- speaker: Respondent
  text: Yeah, I was only about five or six in camp. I learned to play in the camp. I didn't know any better.
- speaker: Interviewer
  text: And how old was your oldest sibling at the time?
- speaker: Respondent
  text: Well Yuki was born in 1926. George was born around 1930, something like that. But then you have two families sort
    of like a second marriage. You're the product of the second marriage. Your mom and your dad had families of their own
    before. So all together you're about 13, 14 kids.
- speaker: Respondent
  text: Oh, golly I'm the baby of the family. Didn't know any better.
- speaker: Respondent
  text: But then you know, there's a theory of mine that they all had big families because they needed big families. And forget
    about education. Today all you do is push a button, just like a slot machine.
- speaker: Respondent
  text: But you got to go to university earlier than other Japanese.
- speaker: Interviewer
  text: And where did you go to school?
- speaker: Respondent
  text: UCLA. I got all my degrees there pretty much.
- speaker: Interviewer
  text: And what did you study?
- speaker: Respondent
  text: I was going to go into engineering. I got accepted to Berkeley engineering school. Then I opted to go into the army
    instead. So I volunteered for the military and then I got caught in the Korean War. And then by the time I got out I figured
    engineering is not for me, I really need to get into management. Corporate management. My first job offer was ABCC. Atomic
    Bomb Casualty Commission in Hiroshima.
- speaker: Respondent
  text: Right after the bomb hit, seven years later I graduated from UCLA in a Management Program and one of the first job
    offers was ABCC personnel director. And I went to her dad and said, 'I want to take your daughter to Hiroshima with me.'
    And he says no. Her sister had to get married first.
- speaker: Respondent
  text: Very traditional.
- speaker: Respondent
  text: Yeah that's the Issei way of doing things. So I couldn't take her so I didn't take the job. But it would have been
    a completely different life if I went, took her. We'd be Japanese all the way through.
- speaker: Interviewer
  text: And so how did you two meet?
- speaker: Respondent
  text: How did we meet?
- speaker: Respondent
  text: You came to the market where I worked. Sawtelle Fish Market.
- speaker: Respondent
  text: You were a little brat there. She was on Sawtelle. Her father was a manju maker and a tofu maker.
- speaker: Respondent
  text: My brother filleted the fish. He was really good, talented. Beautiful work.
- speaker: Respondent
  text: Then her sister did the cash register.
- speaker: Respondent
  text: Oh boy, what'd I do?
- speaker: Respondent
  text: And you took over. You couldn't even count change.
- speaker: Interviewer
  text: So your family owned this market, then.
- speaker: Respondent
  text: Yeah right on Sawtelle, right in the middle.
- speaker: Respondent
  text: But your mom liked me, that's why. But we really met at Bob Fujimoto's gas station right there. I was working there
    for Bob. He's not a relative or anything.
- speaker: Interviewer
  text: And your families didn't know each other at all before?
- speaker: Respondent
  text: No. I met you at the gas station. You drove in and you said, 'One gallon, one dollar,' or whatever.
- speaker: Interviewer
  text: So you were pumping gas?
- speaker: Respondent
  text: Yeah, it was pumping gas.
- speaker: Respondent
  text: Funny how we met,
