collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I would like you to state your name first.
- speaker: Respondent
  text: My name is Masamoto Nishimura.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Tottori Ken, Hino-Gun, a mountain side.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In Jan 26, 1895, 28th year of Meiji.
- speaker: Interviewer
  text: Do you remember anything from your childhood?
- speaker: Respondent
  text: I was given to another family as yoshi when I was one year old and three months. I was given to my uncle's family.
    My father and my uncle and others got together and built a construction company. At the time when I went to his family
    as a yoshi, he had a sake store. My father had a soy sauce store at a different location. He was not a Christian yet.
    It was when I was three years old when he became a Christian.
- speaker: Interviewer
  text: There was very few Christians at that time.
- speaker: Respondent
  text: That's right. My sister was born a year and a half later. By that time my father was a Christian.
- speaker: Interviewer
  text: What was the reason why your father had become a Christian?
- speaker: Respondent
  text: My father's family was very wealthy, so he did whatever he wanted to do. He also traveled a lot. They say, 'Even the
    dog which walks around comes across interesting things.' He met a missionary in Matsue. He was the famous missionary named
    Rev. Bacton. He was taught by this missionary and received Baptism. My mother also became a Christian. I didn't know my
    real parents until I was 6 years old. When I became 6 years old, my father (uncle) died of stroke. At that time I discovered
    that I had real parents. After her husband died my mother (real aunt) went back to her parents' home. I lived with my
    grandparents. My real father sold the sake store. He must have been in his 50's. He failed in the business and he did
    not know how to deal with himself. This was his weakness. That's why it was easy for him to enter the faith.
- speaker: Interviewer
  text: Do you have any other recollection from your childhood?
- speaker: Respondent
  text: Well, I remember when I was 3 or four years old. I was taken to a famous shrine by my adopted parents. This shrine
    was said to be the guardian for Japanese Sake which was located in Matsue in Shimane Ken. At that time we stayed in an
    inn. I still remember that experience. There was a small stream right in front of that shrine. There were many fish in
    that stream and I enjoyed watching them.
- speaker: Interviewer
  text: How about your schools?
- speaker: Respondent
  text: I went up to 4th grade in Chugakko (12th grade) and then came to America. Before that my grandfather died when I was
    11 years old. It was in Gandarys. I went to Yonago where my mother lived and entered Koto Shogako (8th grade). Then I
    entered Chugakko (Middle school). I had to quit it in the middle of the fourth grade in middle school and came to America.
- speaker: Interviewer
  text: When you say Chugakko, it is comparable to the high school here?
- speaker: Interviewer
  text: Were you Christian then?
- speaker: Respondent
  text: Yes, I was exposed to it, however, I was not a Christian. My real father came to America when I was about 10 years
    old. He went to Hawaii and then to the mainland. From that time on I lived with my mother in Yonago. When I came to America,
    I was with my younger sister. My father came to America ahead of me. My sister and I were the last to come. My father
    had a flower business in Oakland. When I came I helped my father's business. I was 17 years old then. Because my parents
    were Christians, I was made to go to church from the next Sunday. It was the Oakland Methodist Church. I received baptism
    next year. However, I was not a real Christian yet. At that time there was a minister by the name of Zenzo Watanabe. He
    is now over 90 years old, if he is still alive. He came to our home and led a Bible study. I listened to it quite a few
    times. My heart began to be awakened. So I began to read the Bible real well. I became a real Christian when I was 19
    years old.
- speaker: Interviewer
  text: You were 16 when you came to America.
- speaker: Respondent
  text: Yes, I was 17 years old.
- speaker: Interviewer
  text: I would like to hear your experience of coming to America.
- speaker: Respondent
  text: My sister was attending women's high school from the mission outpost. I was in a dormitory and attended a middle school.
    When I came to America, my father's friend took care of me in Tokyo. It was 1912. I came to America with my sister. I
    have 9 brothers and sisters. The ship I came on was called Perusha Maru. Many passengers were returnees. There were many
    who came back to get married. We stopped at Hawaii, only one day though, for sightseeing. Then we ate dinner at a restaurant.
    At that time that famous Titanic sunk. I saw that on a newspaper. I was really surprised. The life on board was really
    bad. I was rather a bad young man who learned to gamble. I gambled on the ship and lost all the money I had. At that time
    each person had to have at least $50 as a 'show money.' It is a preparation money. In case one failed to pass inspection,
    he would have enough money to go back to Japan. One couldn't get on board if he didn't have that money. I had $100 for
    my sister and myself. I lost $60 of it. I didn't know what to do. Then a man who was returning to America said that he
    would loan me the money. So he loaned me enough to pass the inspection. I returned the money to him as soon as I landed.
- speaker: Interviewer
  text: What else do you remember from the life on board?
- speaker: Respondent
  text: There were some who were returnees who ate American food all the time. One of them got seasick and couldn't eat any
    food. So he gave them to me. It was real good food, too.
- speaker: Interviewer
  text: When you left Japan, what kind of country did you think America was?
- speaker: Respondent
  text: I used to think that everybody in America was Christian. So I thought Americans would not drink or smoke and they
    would not commit crimes. However, when I came, it was not too much different from my own country.
- speaker: Interviewer
  text: What did your parents tell you?
- speaker: Respondent
  text: I didn't hear anything from my parents.
- speaker: Interviewer
  text: Where did you land?
- speaker: Respondent
  text: San Francisco.
- speaker: Interviewer
  text: How was your first impression of America?
- speaker: Respondent
  text: My older brother came to see me. He came to America 2 years before.
- speaker: Interviewer
  text: How about in the Immigration office?
- speaker: Respondent
  text: Well, no problem. They did not ask me to show the money. I went to Oakland directly, to my parents' home.
- speaker: Interviewer
  text: What do you remember about the first week in the USA?
- speaker: Respondent
  text: 'Well, that night, you see, I spent all the money I had. So I was really worried that my father might ask me about
    that money. Then he came over to my room and called my name. He asked me about the money. I said: I spent it and I had
    only $40 left. My father said, ''Is that so. But don''t do things like that any more.'' At that time I learned for the
    first time my father''s love towards me. He didn''t even scold me. He just said, ''Is that so. But don''t do it any more.''
    That was all. So I was very touched and I cried a lot in my bed alone.'
- speaker: Interviewer
  text: Did your sister know about it?
- speaker: Respondent
  text: No, I don't think so.
- speaker: Interviewer
  text: Then you began to help your father's flower business. Was that right?
- speaker: Respondent
  text: Yes. There was a man, by the name of Nishimura who was my sister's husband, who was a longtime Christian. He used
    to read a lot of books. He had a lot of books about Christianity. So I began to read them, too. I read them very seriously,
    too. I read about the history of Reformation and also about the martyrs who died so willingly. When I read this, I knew
    there was something which I couldn't grasp. I read some more books. It was on Oct. 28, 1915 that I confessed my sins before
    God and entered the faith.
- speaker: Interviewer
  text: Did you go to school at that time?
- speaker: Respondent
  text: No. I did go to night school for English. It was for everyone, not just for Japanese. So I didn't understand it very
    well. I don't remember very well about that. I attended it for about one year. After I became a Christian, I began to
    study harder. I helped my father for 5 and 1/2 years. Then I received a call to become an evangelist. I told this to my
    father. He asked me to help him a few more years. At that time, I couldn't go to school right away. So I bought an English
    Bible and began to read it. I read it many times over, so even though I didn't understand each word, I understood what
    I was reading. This is how I studied English.
- speaker: Interviewer
  text: When you helped your father, did he have other workers?
- speaker: Respondent
  text: Yes, Mr. Nishimura was my workmate. He was very methodical. He worked hard when he worked. He studied very hard when
    he finished his work. These were my experiences. I learned from those books and from Mr. Nishimura. Rev. Watanabe went
    back to Japan in 1925. I studied under him, too. After that I attended a Free Methodist Church in Berkeley. I helped a
    missionary there. I began to preach there, too. I couldn't do that every Sunday, though.
- speaker: Interviewer
  text: Isn't Bay Area the original place of Japanese evangelism?
- speaker: Respondent
  text: Yes, in San Francisco. Then it came to Oakland. At that time, there was no exceptional people. All of them were the
    same. There was a large floral shop, Domotos. There were other floral stores, too. Other than that many worked as domestic
    workers, or at dress shops. There was an insurance agent in the Oakland church. He is still well in Oakland. His name
    is Takeshita. Most of them had jobs as domestic workers or school boys. I don't know how much my brother-in-law, Nishimura,
    used to make, but there was a man who came to America recently. He was paid $30 with room and board. Others who worked
    at the floral shop like Portuguese or Spanish were paid $1.25 a day. He had to bring his own lunch. They worked 8 hours
    a day. They worked very hard without break.
- speaker: Respondent
  text: Then, I went to Northwest Nazarene College in Idaho. I knew its president. My idea was that I wanted to study for
    2 years and then become an evangelist. However, when I got there, I found out that I wasn't ready. I had to begin from
    high school. I got some credit for the subjects I had in Japan. I finished it in 5 and 1/2 years and I graduated from
    that college in 1923.
- speaker: Interviewer
  text: Can you remember any interesting recollection from that time?
- speaker: Respondent
  text: The school was very nice. I felt very good. It was based on Nazarene Church. They were very good to me. When they
    had some events, they invited me to come, too. When I went there, I didn't understand any English. I went back to my father's
    house during summer vacation. When I came back my younger brothers talked to me in English but I didn't understand what
    they were talking about. I was really disappointed in my ability. I felt like quitting school. When I came back the next
    summer vacation, I could understand them much better. So I finished high school and college. Everyone was good to me beginning
    with the president down the line.
- speaker: Interviewer
  text: Have you encountered any discrimination?
- speaker: Respondent
  text: No, not at all. On the contrary, they were very good to me. I suppose it might have to do with the fact that I was
    a foreigner. I also attended white people's church there, too. I became a member there. I did everything which other white
    people would do. After 2 years, I began to work at the evangelism outpost with my friend. We evangelized people in the
    vicinity. However, he came back to California, so I had to do it all by myself. I continued this till I graduated from
    the college. I still correspond with those people whom I met during that time.
- speaker: Interviewer
  text: What happened when you finished the college?
- speaker: Respondent
  text: I finished school in 1923. Right before I finished my college, I received a license as a minister from Nazarene Church.
    So when I graduated from the college, I received ordination. On the way back to California, I stepped out onto a certain
    railroad station. There I met a white missionary who had just returned from Japan. He was a Free Methodist. He said that
    he was going to be the head of West Coast Free Methodist Conference. He wanted me to come with him and join him for his
    work. Well, I had to think about it. After some thought, I decided to work in the Free Methodist Conference. I think I
    gave the final reply after I came back home. I graduated from the college in the middle of June and began to work in a
    Free Methodist Church in Los Angeles.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: Let's see, I was 28 years old.
- speaker: Interviewer
  text: Were you married then?
- speaker: Respondent
  text: No, I wasn't. I thought I had to study as much as I could, so I attended Theological School at USC as I worked as
    a pastor. Well, it was very difficult to be enrolled at the university while I worked as a pastor. So I had to withdraw
    from the university. I also tried other times, too, but again I could not continue. I think that it was not good. So I
    resigned as the pastor at the end of 1925 and enrolled at the university full time. Soon after that I got married. We
    got married in Glendale, near Los Angeles.
- speaker: Interviewer
  text: How did you meet with your wife?
- speaker: Respondent
  text: There was a famous Kanto Daishinsai (Kanto Great Earthquake) in 1923. I came to Los Angeles on Sep. 1, 1923. It was
    the day after the earthquake. I read about it on a newspaper. Soon after that American Salvation Army rose up for Emergency
    Aid work. Japanese Salvation Army in San Francisco also rose up for the occasion and began to solicit donations from Japanese
    communities. For this work two officers of the Salvation Army came to Los Angeles from San Francisco. These two were visiting
    Japanese families in many areas with a Los Angeles area commander. I met them at a home where they were visiting. I knew
    Mr. Tsukamoto (the commander), so he introduced me to these two ladies. One of these ladies became my wife later on. She
    was a Captain then. However, because of the regulation of the Salvation Army, we couldn't get married right away. My sister's
    husband joined the Salvation Army. He became our go-between and we were engaged. We were married on Apr. 14, 1925.
