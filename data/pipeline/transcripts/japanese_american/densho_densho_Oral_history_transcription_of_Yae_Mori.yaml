collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1900.
- speaker: Interviewer
  text: Are you 77 years old now?
- speaker: Respondent
  text: Yes, I am 77 years old this year.
- speaker: Interviewer
  text: Are you from Osaka?
- speaker: Interviewer
  text: Are there many people from Osaka here?
- speaker: Respondent
  text: No, I don't hear about people from Osaka. There are many people from Hiroshima and Wakayama, but not too many people
    from Osaka.
- speaker: Interviewer
  text: What was the occupation of your family?
- speaker: Respondent
  text: My father was in printing business in Osaka. He did the printing for churches. Of course both my parents were members
    of Temma Church in Osaka, and my father served as a deacon for many years. He was in printing business hiring young apprentices
    in his shop. We were not rich. I had 2 older brothers and an older sister, and I was the youngest of the four. When my
    brother was around 12 or 13, my father got in financial difficulties, so he sent my brother out to Tokyo to work as a
    shopboy at a bookstore. My father continued his business, but as he was a serious man and was not good at business he
    finally closed the shop and moved to a small place, and worked as a foreman in a printing company. When I graduated from
    the grammar school I was ready to go to a girls' high school, but my father told me that he could not let me go to a girls'
    high school after sending out my brother to apprenticeship, so I went to a junior high school thinking I could go to a
    high school after graduating from the junior high school. However, when I graduated from the junior high school my brother
    wanted me to go to Tokyo and help him as his wife was ill. I went to Tokyo when I was 16 years old. Since then I lived
    in Tokyo.
- speaker: Interviewer
  text: Did you stay home?
- speaker: Respondent
  text: Yes, I stayed at my brother's home. I wanted to go to school very badly. In those days there was a correspondence
    course, so I studied it to get ready for the girls' high school, but I did not have a chance to go to school, and I was
    asked in marriage. My mother's cousin was a pastor of Bancho Church in Kojimachi, Tokyo for many years. He used to come
    to America often as a peace representative before the war, and he told me about my husband. I could not have come to America
    after 1924, so in fall of 1923 my husband went back to Japan, and we were married in my uncle's church in Tokyo. Then
    we came to America together. I have been a Congregational member of the Methodist church. An old member of the Methodist
    church here is the one who took my husband back to Japan to look for a bride. He was going to introduce his niece as a
    wife, but she was already married, so he asked my uncle who was a pastor if he knew someone who would go to America as
    a bride, and they started talking about me, and we were married.
- speaker: Interviewer
  text: How old was your husband when you got married?
- speaker: Respondent
  text: He was 29 and I was 23. My husband was a tailor in Berkeley. I did housework in a white family for about a month because
    I wanted to see a white family. Before I came to America I learned English from my aunt who was a high school teacher
    so I could understand English a little. That was the only time I worked in a white family. After my husband quit the tailoring
    business he started a dry cleaning business.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: It was from around 1930 till the war broke out.
- speaker: Interviewer
  text: Did the Depression come when he was in tailor business?
- speaker: Respondent
  text: No, he was in dry cleaning business then. He started the dry cleaning business in 1929, and the Depression started
    around 1930.
- speaker: Interviewer
  text: Were you badly off then?
- speaker: Respondent
  text: Yes, we were, but we got some installment money back, so we had some spending money. We could take only what we could
    carry with our hands when we went to camp. We left everything in the store, pressers and customers' clothes and everything
    else.
- speaker: Interviewer
  text: Couldn't you sell them?
- speaker: Respondent
  text: No, we couldn't sell them.
- speaker: Interviewer
  text: Was it because they knew you were leaving?
- speaker: Respondent
  text: Yes, but nobody wanted to buy them, and even if they did they would pay almost nothing, so it was better to leave
    them there.
- speaker: Interviewer
  text: Did you go to Tanforan first?
- speaker: Respondent
  text: Yes, we did. We had 3 daughters, so we could live in a new barracks and not in the stable. The floor was made of coarse
    boards so weeds and insects crawled through the cracks in the floors and it was unpleasant, but we were better off than
    those in the stables.
- speaker: Interviewer
  text: Why did your husband quit the tailoring business?
- speaker: Respondent
  text: I think he could not make the ends meet by tailoring business. The other reason was that he was asked to buy a dry
    cleaning business from a man who was going back to Japan. As he did not have any experience in the dry cleaning business
    he could not make money, and we lived from hand to mouth.
- speaker: Interviewer
  text: Was there any big incident in your family?
- speaker: Respondent
  text: Yes. When our oldest son was 2 years old he had convulsion from high fever and died. We called a doctor, who put the
    baby in a tub of hot water and then in cold water, but he died. It was a heart-breaking experience.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: It was in 1925. At that time I was pregnant with a daughter. About 4 months after our son died, the daughter was born.
    She is 51 years old and is married to a man who owns a hardware store in San Francisco.
- speaker: Interviewer
  text: How many children do you have altogether?
- speaker: Respondent
  text: I have 3 daughters who were born after I lost my son.
- speaker: Interviewer
  text: Are they all girls?
- speaker: Respondent
  text: Yes, they are. They were born 5 years apart. The oldest daughter is in San Francisco, and the second daughter is in
    San Jose. The third daughter is married and lives in Los Angeles.
- speaker: Interviewer
  text: Do you have any recollection of the time you went to Tanforan Center?
- speaker: Respondent
  text: At Tanforan there was a regulation that one member of the family had to work. My husband was in the hospital with
    heart trouble, and I had stomach trouble, so our daughter worked in the kitchen as a waitress.
- speaker: Interviewer
  text: When there were so many Japanese together, didn't some people become rough?
- speaker: Respondent
  text: Yes. There was a group of people who believed Japan was winning the war. When airplanes flew overhead they said Japanese
    are coming. Those people were sent to Tule Lake.
- speaker: Interviewer
  text: Did you go to Topaz from the beginning?
- speaker: Respondent
  text: Yes, we did. We went from Tanforan to Topaz.
- speaker: Interviewer
  text: Wasn't Topaz a sandy place?
- speaker: Respondent
  text: Yes, it was in the desert. It was desert as far as we could see. After about 3 days train ride they let us off in
    the middle of the desert. I was scared when I saw such a big desert in America. They pulled the shades on the windows
    and did not let us see outside when the trains went through cities. We could see out in the desert.
- speaker: Interviewer
  text: Did you think your life was in danger in the camp?
- speaker: Respondent
  text: Yes, not only when we went to the camp, but when the war broke out, truckloads of soldiers passed by, and there was
    uneasy feeling. I thought Japan had started a terrible thing. My husband came here as a yobiyose since his father was
    in America. He was like a Nisei rather than an Issei, so he did not think that Japan was going to win the war, but he
    did not say that because he could have got in trouble if he said.
- speaker: Interviewer
  text: Didn't you think Japan would win the war?
- speaker: Respondent
  text: I am a woman but I knew little about America, so I thought Japan had done a reckless thing. As I was brought up as
    a Christian family I knew about America a little better than other people. After the war my husband died, so I bought
    a dry cleaning business from Mr. Takahashi and managed it alone for 10 years.
- speaker: Interviewer
  text: When was the hardest time for you?
- speaker: Respondent
  text: It was when I was operating a dry cleaning store alone. I felt like crying.
- speaker: Interviewer
  text: Were your daughters all grown up when you came home from the camp?
- speaker: Respondent
  text: Yes, the oldest daughter was married, but the youngest one was 15 years old when my husband died.
- speaker: Interviewer
  text: Then you brought her up alone, didn't you?
- speaker: Respondent
  text: Yes. After graduating from high school she got a scholarship from an art school in Oakland, and studied there. Her
    teacher said she had talent for art, and she liked art, so she went to the school.
- speaker: Interviewer
  text: Were you an agent in cleaning business?
- speaker: Respondent
  text: Yes, I was. When the customers bring clothes, I tag them and leave them in bundles. Then Mr. Takahashi's cleaner picks
    them up, cleans them and brings them back. I do alteration if needed, check the clothes and give them to the customers.
- speaker: Interviewer
  text: Wasn't Mr. Takahashi not in cleaning business after he came back from the camp?
- speaker: Respondent
  text: No, he wasn't, but his son was. His son was going into something else, so I bought the business. We have been associating
    with the Takahashis for over 50 years.
- speaker: Interviewer
  text: How many years did you continue the cleaning business?
- speaker: Respondent
  text: Nearly 10 years. Then I got gallstone. After an operation I quit the business. As my daughter was married and living
    in San Francisco, I moved to San Francisco and rented an apartment.
- speaker: Interviewer
  text: Did you retire since then?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What year did you come back from the camp?
- speaker: Respondent
  text: We left the camp as soon as the war was over.
- speaker: Interviewer
  text: Did you come back right away?
- speaker: Respondent
  text: The war ended on August 15, and we left there the following month. As our older daughter got a scholarship in a college
    in Cleveland, Ohio, we wondered if we should go there or go back to East Bay. As the weather was not good in the East,
    and as my husband's health was not good we thought it was better to go back to East Bay rather than going to a strange
    place. We went back to Oakland and stayed at the dormitory of a church. My husband got a job at a white tailor shop, and
    I did some domestic work at a white family.
- speaker: Interviewer
  text: Was your husband still alive then?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: When did he die?
- speaker: Respondent
  text: He died when he was 49 and I was 42 then. Many people had hard time during the war. I think people in Japan had harder
    times.
- speaker: Interviewer
  text: Did you start the dry cleaning business after your husband died?
- speaker: Respondent
  text: Yes, I did. The pastor of the church told me that Mr. Takahashi was looking for someone to take over his business,
    and since I was in dry cleaning business before, asked me if I would like to try. I bought the right to the business and
    started it. I worked from 8 in the morning till 6 in the afternoon, Mondays through Saturday without any rest.
- speaker: Interviewer
  text: Were you engaged by the time your husband went back to Japan to get married?
- speaker: Respondent
  text: No, I didn't know him. I wanted to come to America. The daughter of the pastor who arranged the marriage for me was
    married and lived in Los Angeles, so I knew about America and liked America better than Japan. I think that is why my
    uncle brought the marriage proposal from America to me.
- speaker: Interviewer
  text: Are you glad you came to America?
- speaker: Respondent
  text: I wanted to come here, so I think it was good that I came here. I went back to Japan after 39 years, then 4 years
    ago and again last month. I went back to Japan 3 times. I am glad I lived in America. The life in America suits me better.
- speaker: Interviewer
  text: Have you ever had any unpleasant experience with the white people?
- speaker: Respondent
  text: As my father was in printing business when I was little, foreign teachers from mission schools used to come to our
    shop. I used to call their names and greeted them, so I guess I was used to the white people. I never had ill feeling
    toward the white people.
- speaker: Interviewer
  text: Did you think it was unfair that you had to be evacuated or did you think it was right?
- speaker: Respondent
  text: I think it was unfair. I thought Japan's action was reasonable.
- speaker: Interviewer
  text: Why did you think so?
- speaker: Respondent
  text: At that time I was excited and could not think rationally, but later I thought America challenged Japan to fight and
    Japan was forced to fight.
- speaker: Interviewer
  text: What did you think about being put in a camp?
- speaker: Respondent
  text: They fed us rice and other food suitable for Japanese. We were given plenty of food which was hard to get outside,
    so I think we were better off in the camp than outside.
- speaker: Interviewer
  text: What was your opinion on loyalty?
- speaker: Respondent
  text: I acquired the American citizenship and became an American, but I don't think a Japanese cannot become completely
    an American. Of course, we have to do our duty as a citizen in our daily lives. I am a Japanese so I have a Japanese spirit.
- speaker: Interviewer
  text: Were you questioned on the loyalty in the camp?
- speaker: Respondent
  text: Yes, we were.
- speaker: Interviewer
  text: How did you feel about it then?
- speaker: Respondent
  text: I had a lonely feeling, but as long as we live in America I thought we had to be loyal to America.
- speaker: Interviewer
  text: Did your children have dual citizenship, or were they Americans?
- speaker: Respondent
  text: Of course they were Americans. They are girls, so I don't think they have troubles like boys do.
- speaker: Interviewer
  text: Were there many people in the camp who caused troubles?
- speaker: Respondent
  text: Yes, there were. They were transferred to Tule Lake to go back to Japan, but they are back here. Recently there is
    a dispute going on concerning Iva Toguri's American citizenship. I think citizenship is a very important issue.
- speaker: Interviewer
  text: Were there many books at your house?
- speaker: Respondent
  text: I think there were. As my father closed his store when I was in my teens, I didn't see too many books.
- speaker: Interviewer
  text: Did you study about Ninomiya Kinjiro when you were in school?
- speaker: Interviewer
  text: Was your father the first generation Christian?
- speaker: Respondent
  text: Yes, but my mother was the second generation Christian. Mother's mother was a Christian. I think my father became
    a Christian after he married mother. I didn't know about it until Mr. Uchida brought back from Japan a book about 100
    Japanese Christians. I found my grandmother's name.
- speaker: Interviewer
  text: Was America different from what you were imagining when you were in Japan?
- speaker: Respondent
  text: I did not feel any amazing difference. As I was born and raised in the city, the buildings and customs were not like
    those in the country. I was amazed by the spaciousness in America, but otherwise I did not feel too much difference from
    Tokyo. As I was brought up as a Christian since my Sunday school days I did not have strong faith as those who have converted
    to Christianity from Buddhism, but I have a strong feeling which cannot be extinguished deep in my heart. Last October
    and November I went to Kyushu with a church group and visited where 26 saints were martyred and other historical sites
    of early Christianity. When I thought about the strong faith of olden day Christians I felt pain deep in my heart.
- speaker: Interviewer
  text: Did you stop at Hawaii on your way here?
- speaker: Respondent
  text: Yes, we did, and we went ashore there. The name of the ship was Senyo Maru and it took 17 days. I was seasick and
    could not get up until we reached Hawaii. Japanese food was served only to the first class passengers, and the second
    and the third passengers were served Western-style food. As I could not get up, my husband brought some Japanese food
    from the first class dining room to me. Funny thing is that as soon as you stand on the ground, your seasick is gone.
    Most Isseis had a hard time as we did not understand the language.
- speaker: Interviewer
  text: Do you belong to any organizations such as Japanese Association?
- speaker: Respondent
  text: No. As my husband was like a Nisei, he did not send our children to a Japanese language school, but had a tutor teach
    them Japanese. He did not belong to any organization such as kenjin-kai. He belonged just to the church and no other organization.
- speaker: Interviewer
  text: Did you belong to the kenjin-kai?
- speaker: Respondent
  text: No, we didn't.
- speaker: Interviewer
  text: Aren't there kenjin-kai around here?
- speaker: Respondent
  text: Yes, there are.
