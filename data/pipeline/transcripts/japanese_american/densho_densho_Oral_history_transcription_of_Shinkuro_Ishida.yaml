collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Hiroshima, Japan.
- speaker: Interviewer
  text: How old are you or when were you born?
- speaker: Respondent
  text: November 20, 1870—the 20th year of Meiji. So I'm 86 years old.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: I have four boys. I did have ten children altogether, but two of them died.
- speaker: Interviewer
  text: Where does your daughter Ruth rank?
- speaker: Respondent
  text: She is the second oldest.
- speaker: Interviewer
  text: What did your father do in Japan?
- speaker: Respondent
  text: He was a farmer.
- speaker: Interviewer
  text: What kind of person was he? Was he very strict?
- speaker: Respondent
  text: No, he was not too strict with us. He was a very good man and also a good father. Besides being a farmer, he spent
    a lot of time in the military forces. He lived to the age of seventy-two.
- speaker: Interviewer
  text: How about your mother?
- speaker: Respondent
  text: She died at a fairly early age, when she was in her sixties. I don't remember exactly when.
- speaker: Interviewer
  text: Do you have brothers and sisters?
- speaker: Respondent
  text: Yes. There were five of us, three brothers and two sisters. I'm the eldest.
- speaker: Interviewer
  text: What do you consider was the most important thing in life to your father?
- speaker: Respondent
  text: I'm not sure, but I guess it would have been his work, farming.
- speaker: Interviewer
  text: Did he talk a lot with you about different things?
- speaker: Respondent
  text: That is so long ago, when I was a child, so I'm afraid I can't recall anything in particular.
- speaker: Interviewer
  text: Were there a lot of books in your home?
- speaker: Respondent
  text: We only had a few.
- speaker: Interviewer
  text: Do you ever remember reading about Ninomiya Sontoku?
- speaker: Interviewer
  text: What was your religion? Were you Buddhists?
- speaker: Respondent
  text: Yes, we were.
- speaker: Interviewer
  text: Were you Shinshu?
- speaker: Respondent
  text: No, we belonged to the Zenshu.
- speaker: Interviewer
  text: Was the place you lived in a town or village?
- speaker: Respondent
  text: Village—Jinseki gun, Nagato village.
- speaker: Interviewer
  text: Do you remember any special things that happened in your village?
- speaker: Interviewer
  text: How far did you go in school?
- speaker: Respondent
  text: I did not graduate from elementary school.
- speaker: Interviewer
  text: What sort of things did you learn in school?
- speaker: Respondent
  text: When we were children, it was mostly reading that we learned. We went through five or six readers. We also had physical
    education.
- speaker: Interviewer
  text: Do you remember any of your school teachers?
- speaker: Respondent
  text: I remember the first one we had.
- speaker: Interviewer
  text: What was he like?
- speaker: Respondent
  text: His name was Mr. Tange Gunpei. He was a very fine teacher. He very rarely got angry.
- speaker: Interviewer
  text: Were you ever scolded?
- speaker: Respondent
  text: Not very often. Once in a while, we'd fool around on the way to school and were late, then he would be annoyed and
    reprimand us.
- speaker: Interviewer
  text: The Sino-Japanese War was on about the time we were going to school. That was in the 7th and 8th year of Meiji; and
    the Russian Japanese war was just ending when I arrived in America. What do you remember of the Sino Japanese War?
- speaker: Respondent
  text: We used to go from school to the village and see the men off who were going to fight for their country.
- speaker: Interviewer
  text: There must have been a lot of casualties.
- speaker: Respondent
  text: Actually during the Sino Japanese War, there were not too many. One thing I remember clearly about the Sino Japanese
    War was that one man from our village returned home with a medal of honor. He was so elated and excited, he decided to
    celebrate the occasion. He stopped in town to have a few drinks. But sad to say, he ended up in a fight with someone and
    his medal was taken away from him.
- speaker: Interviewer
  text: You mean it was stolen?
- speaker: Respondent
  text: No, a government official who saw him drunk and fighting just took the medal from him. If you get this important medal,
    you are paid or rewarded a certain sum of money from the government every year. But since the medal was reclaimed, the
    man was deprived of both medal and money.
- speaker: Interviewer
  text: Did you have history as one of your subjects in school?
- speaker: Respondent
  text: No, we didn't have it then.
- speaker: Interviewer
  text: How about lessons in morals?
- speaker: Respondent
  text: Yes, we had morals or ethics as a subject and "Tokuhon" which consisted of learning not only how to read the Chinese
    and Japanese characters, but also how to write them.
- speaker: Interviewer
  text: Did you ever go to Okinawa when you were young?
- speaker: Interviewer
  text: Did you hear anything about Christianity in those days?
- speaker: Respondent
  text: No, we never heard anything about it.
- speaker: Interviewer
  text: How about the Russian Japanese war. Do you have any recollections of it?
- speaker: Respondent
  text: The only thing I recall is going to the village to bid farewell to the men who were leaving for war.
- speaker: Interviewer
  text: For what reason did you come to the United States?
- speaker: Respondent
  text: As 7 I) went to Hawaii first for one year before coming to America.
- speaker: Interviewer
  text: But why did you want to come to the States?
- speaker: Respondent
  text: I did not have much money when I boarded the boat to come to America. And when we got there, we could not land in
    San Francisco because the city had been destroyed by fire; so we landed in Oakland.
- speaker: Interviewer
  text: You came over in 1906 then?
- speaker: Interviewer
  text: Since you were the eldest son, wasn't it difficult for you to get your parents permission to leave home?
- speaker: Respondent
  text: No, we were free. It seems to me that there was some particular reason for my going to Hawaii. There were folks in
    that country who were looking for people to go over there to work.
- speaker: Interviewer
  text: Didn't you want to stay in your own country?
- speaker: Respondent
  text: I was young then and enthusiastic when it came to new adventures.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: About 17 years old.
- speaker: Interviewer
  text: What sort of country did you imagine America to be before you came here?
- speaker: Respondent
  text: I wanted to see the huge continent. Boat fares were very cheap; and the ship "Manchuria," which I travelled on was
    a pretty big vessel.
- speaker: Interviewer
  text: What kind of people were on the ship?
- speaker: Respondent
  text: The ship's crew were all Chinese and the majority of the passengers were as well.
- speaker: Interviewer
  text: What do you remember about your arrival in Hawaii?
- speaker: Respondent
  text: My aim was to find work and make money. However, since I only stayed over there one year, I was unable to do very
    much.
- speaker: Interviewer
  text: Where did you work, in the sugar cane fields?
- speaker: Respondent
  text: Yes, we had to keep the plants watered and cut them down when they were ready for harvest.
- speaker: Interviewer
  text: I guess the pay was not too good was it?
- speaker: Respondent
  text: We got $1.65 for a whole day's work. They gave us a lunch to take to the fields, but they deducted board and room.
- speaker: Interviewer
  text: Was it hard work?
- speaker: Respondent
  text: Yes, very hard. We'd start at 8:00 in the morning and finish at 5:00 in the evening. Once we had a strike which lasted
    a week. This was the only unusual incident. I believe two Japanese who were leaders were killed.
- speaker: Interviewer
  text: What thought went through your mind when you arrived in Oakland?
- speaker: Respondent
  text: I wanted to find some kind of employment immediately. There were Japanese who were looking for men to work on the
    railroad. Until they were ready for me, I slept in a box car for a couple of days; then I joined the working crew.
- speaker: Respondent
  text: My co-workers told me it would not take long till we arrived at our destination, but actually it was a three day journey.
    We finally arrived in Cheyenne, Wyoming. We were there for a few days, then I was assigned to another railroad section.
    The only problem with the railroad was it did not pay much. However, I heard that there was a great need for people to
    work in the sugar beet fields in Colorado; so I decided to try working in the fields again, but I found the work too strenuous
    and quit after a month of hard work. I moved to Denver and found a job in a boarding house making beds etc. for a year.
- speaker: Interviewer
  text: Was this a Japanese owned boarding house?
- speaker: Respondent
  text: Yes. I stayed in Denver for approximately two years. There weren't too many Japanese in Denver then. There was a Japanese
    restaurant, barber and the boarding house.
- speaker: Respondent
  text: From Denver, I went up to Seattle in 1908. In 1909 there was a state fair. My stay in Seattle was also about two years.
    Up in Seattle they were looking for men to work on ships as cabin stewards. This sounded interesting so I decided to try
    it. The cook on the ship I was assigned to was Japanese so I was happy to have someone I could converse with.
- speaker: Respondent
  text: The ship left Seattle and headed first for New Mexico. We were not loaded with anything when we left New Mexico, but
    in Newcastle, Australia, our schooner was loaded with coal which we took back to Portland, Oregon. After this trip, I
    returned to Seattle. Now that I had money to spend again, I did some travelling around to various places.
- speaker: Interviewer
  text: How old were you now?
- speaker: Respondent
  text: I was about nineteen and in Japan it was the age young men were drafted in the army. Since I was not at home to be
    drafted, my father had to pay a fine.
- speaker: Respondent
  text: Australia was a wonderful place. There were ever so many great big beautiful chestnut trees.
- speaker: Interviewer
  text: What else did you like about Australia?
- speaker: Respondent
  text: I thought it was a very lovely place.
- speaker: Interviewer
  text: Didn't you think about living over there?
- speaker: Respondent
  text: At that time my home was on the ship, but I wanted to come back to America.
- speaker: Interviewer
  text: Did you have any relatives or friends who came from the same district as yourself in Japan?
- speaker: Respondent
  text: Yes, but I met a few people in Tacoma, Washington who came from the same area.
- speaker: Interviewer
  text: What did you think of the Caucasians in those days? Did they ridicule or persecute you in any way?
- speaker: Respondent
  text: No, they didn't.
- speaker: Respondent
  text: When I think back now of working on the ship without knowing a word of English, it seems like a miracle! Of course
    the cook was Japanese, so I was able to talk with him.
- speaker: Interviewer
  text: Did you have any difficult experiences then?
- speaker: Respondent
  text: I can't remember off hand.
- speaker: Interviewer
  text: What leisure activities did you participate in?
- speaker: Respondent
  text: Pool was very very popular and I spent a lot of time playing it.
- speaker: Respondent
  text: One thing nice about living in Seattle was that meals at certain restaurants were very cheap. You could get a good
    meal of rice with a few side dishes of vegetables, fish, meat etc. for as little as ten or fifteen cents. There were only
    two or three places where you could get this reasonable meal which was known as the "Ten cent Special." Young people like
    to fool around and that is what I and my friends did in our spare time.
- speaker: Respondent
  text: Even though I could not speak much English, I took a job in a bar. Three other Japanese were employed here, and the
    pay was excellent. On good days, I made $16.00. I thought this was wonderful.
- speaker: Interviewer
  text: Was the owner a Japanese?
- speaker: Respondent
  text: No, it was owned by a Caucasian. My job was as a waiter mainly, but I also washed dishes and helped in any cleaning
    up that was to be done. The salary I earned didn't last too long as I used it on pool, food and fooling around with women.
- speaker: Interviewer
  text: Did you encounter any painful experiences?
- speaker: Respondent
  text: No I didn't. Perhaps this was because I was still young and single.
- speaker: Respondent
  text: One desire I had was to go to Alaska. But you could not go unless you had at least $50.00. I saved up the money to
    go but someone stole it.
- speaker: Interviewer
  text: How long did you work at the bar?
- speaker: Respondent
  text: For a year.
- speaker: Interviewer
  text: Was the stolen money your earnings from working in the bar?
- speaker: Respondent
  text: Yes. Besides my monthly paycheck, we got tips from our customers—ten to fifteen cents per customer, and this soon
    mounted up to a nice sum; but I am sad to say one Japanese worker tricked me and I lost my $50.00. This was the best place
    I worked at.
- speaker: Interviewer
  text: Did you leave the bar because of the unfortunate experience?
- speaker: Respondent
  text: No, I quit because I thought of becoming a barber, but this did not work out.
- speaker: Interviewer
  text: What did you do after you quit the bar?
- speaker: Respondent
  text: I moved from Seattle to California—to Sacramento. This is where I thought of trying out working in a barber shop,
    but I did not succeed. By this time I was broke so I came down to Stockton and worked in the potato fields. I did this
    one whole winter. Then I moved to Stockton and continued in the potato business for a while. Once again I was able to
    make some money. This time I bought a pool room with what I had saved. It was not long before I sold the pool room and
    bought a restaurant instead. Having had to hire cooks and helpers, it was quite an undertaking.
- speaker: Respondent
  text: About this time my father figured it was time for me to marry, so he sent a girl to me from Japan.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: That was in 1911.
- speaker: Interviewer
  text: Did they send you a picture of your bride?
- speaker: Respondent
  text: Yes—it was what we call a "picture bride or picture wedding" arrangement.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I was twenty-seven.
- speaker: Interviewer
  text: And how old was your wife?
- speaker: Respondent
  text: She was three years younger than I, so that would make her twenty-four.
- speaker: Interviewer
  text: Were you thinking of getting married then anyway?
- speaker: Respondent
  text: No, I had no intentions of getting married so soon, but there was nothing I could do but get married since they had
    gone to all the trouble of sending me a bride from Japan.
- speaker: Respondent
  text: I went to Angel Island in San Francisco with her photo to meet her.
- speaker: Interviewer
  text: Were you able to recognize her immediately?
- speaker: Respondent
  text: Yes. The girls had to show the $50.00 they had brought to get married with before they were allowed to go ashore.
- speaker: Respondent
  text: I had to borrow $75.00 from a farmer I had worked for. With this, I was able to get my bride through all the red tape
    and bring her to Stockton.
- speaker: Respondent
  text: As I mentioned before, I came to this country to make money, but it seemed like I was always spending more than I
    earned. Potato farmers made pretty good money. Farmers got a very good price for their potatoes. They sold at $5.00 per
    sack. A plentiful harvest brought in one-hundred and twenty sacks of potatoes per acre.
- speaker: Interviewer
  text: Were you working on the potato farm when your wife arrived from Japan?
- speaker: Respondent
  text: Yes. And after she came, we worked at the same place for two years. There was a "share crop" arrangement and this
    was great because we could borrow all the necessary equipment.
- speaker: Interviewer
  text: Did you live in an apartment after you were married?
- speaker: Respondent
  text: No, we gave up farming and moved to Stockton City and started a restaurant. However, it seemed like we could never
    save money. We spent a lot on food and pleasures.
- speaker: Interviewer
  text: Even after your wife arrived?
- speaker: Respondent
  text: Yes, I was still so young then.
- speaker: Interviewer
  text: How long after your wife came, did you start a family?
- speaker: Respondent
  text: The year she came, our first child Bradd was born. Ruth was our second child.
