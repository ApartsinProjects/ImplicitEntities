collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I wanted to start off with what a typical day was like for you before the war. And so I know you were a teenager,
    and what were your parents doing, and what was a day like for you?
- speaker: Respondent
  text: Well, to tell you the truth, in 1933 is when my mother passed and so I had no mother from eight years old on, and
    I had no father from when I was four years old on. They both passed by the time I was four and eight and so my brother
    was the eldest of them, who was only 11 years old and quit high school and supported us. The Depression was nothing doing
    for anyone and he as a teenager had to find a job to support his sisters. He had two little sisters and one younger sister
    who was just a year and a half younger than he. And so they both quit high school and he found a job, he watered plants
    at a nursery as a teenager and brought a few dollars home to support us and my sister found a job in a produce market
    washing vegetables and things. You know they were only 17 and 16 so that was pretty hard.
- speaker: Respondent
  text: So my mother, when she was thriving, she was a music teacher and so we always had music in the house because she loved
    it. She was a teacher of shamisen and odori and gidayu, joruri, they called it I think, and so I picked it up from there
    when I was a little girl.
- speaker: Respondent
  text: I think when I was five years old I appeared on stage singing joruri and opera type thing with my mother, didn't know
    I was learning that just by listening to her play and teaching her students. I was behind the door listening. I started
    copying her and she was surprised. So she put me on the stage, at a recital.
- speaker: Interviewer
  text: She must have thought you were good, that you could actually sing.
- speaker: Respondent
  text: Well she never told me I was good but she put me on the stage.
- speaker: Interviewer
  text: Did your mother study music in Japan?
- speaker: Respondent
  text: Yes we went to Japan in 1999 with all my brothers and sisters to look for mother and father's family. We didn't know
    anything about them. And so someone told us where they're from. So we went to those two places in Japan and found out
    that she was just a little renegade. She would not go to school she would cut classes and go to the music school and just
    listen on the side and to try to learn how to play shamisen to sing and to dance. And so they went after her every day
    after school because she was a truant. And so they would bring her home and she would sneak away and do it again. They
    finally gave up and sent her to music school. So when she came over here was ready to teach, she was just a youngster
    when she came here. But was ready to teach.
- speaker: Respondent
  text: Just driven, she just loved it.
- speaker: Respondent
  text: She always told my brother and sister, if you even have a dime save it and go see music. Go see plays, and always
    stick in the arts like that. She's an Issei, you know? She had that drive for her children, she says you got to keep on
    with music.
- speaker: Interviewer
  text: Yeah that's unique. You don't hear that push for the arts. What prefecture was your mother from?
- speaker: Respondent
  text: My mother is from Chiba near Tokyo. And my father was from Okayama which was a pottery area, they made the bizen-yaki.
    My mother she was always, you know, doing something with students and she loved to go fishing, to go abalone picking,
    and she was like an all around kind of a person, she did everything. So I guess my sister and I kind of took after her.
    We would not sit at home and read books, we were always going about and around.
- speaker: Interviewer
  text: You wanted to be active. So do you remember the day that Pearl Harbor happened?
- speaker: Respondent
  text: Yes. I was 16, almost 16 and a half. And we just heard on the radio because we had the Sunday radio on and we were
    shocked, we were just bewildered. Japan attacking a big country like this. I was just shocked and the neighbor on one
    side would shun us and just threw daggers at us and started calling us names right away. But the one across the street,
    they were Italians and they were the sweetest, nicest, kindest people and the daughter was my very best friend, and the
    son was my oldest brother's best friend too. So they were always supportive. And in fact when I got married, I named one
    of my daughters after her.
- speaker: Interviewer
  text: Oh wow. So the parents obviously were sympathetic, good people.
- speaker: Respondent
  text: Yes, she would bake the Italian breads and bring it over and make pasta bring it over. They were just really sweet,
    kind, honest people and they're the only ones that I could really remember that were real kind to my brother, who is our
    guardian at that time. They would they put his car up on the block for him during the war time when we were incarcerated,
    kept it for him and ran it for him to keep it going. Just sweet, kind people. They were around, but we just didn't see
    too many of them.
- speaker: Interviewer
  text: That's true. Yeah there was just pockets. It wasn't a popular thing to be kind.
- speaker: Respondent
  text: No, you were not supported.
- speaker: Interviewer
  text: Was your neighborhood diverse? Was it Japanese?
- speaker: Respondent
  text: No Japanese, we were the only Japanese except for behind us there they were very good to us because we had no parents
    and so they said just help yourself to what was out in the yard, free, out in the field and take what you want.
- speaker: Interviewer
  text: How sweet, and where were you living?
- speaker: Interviewer
  text: And so you kind of saw this backlash, some of this backlash towards you and your family.
- speaker: Respondent
  text: Oh yes, in school especially. One teacher before the evacuation order went out she says, "When you're going, when
    you're leaving?" She was very crude and I just had to keep my head down and say "I don't know," because I really didn't
    know, I was quite naive. I had no idea what was happening, what was going to happen to us. My brother took it all in and
    he would never let us know. I don't know, he was trying to keep it from us or he didn't want to or he just felt so ashamed
    or sad that this was going to happen to us. He knew nothing about what was going to eventually be our fate. He just knew
    that we had to leave so we didn't own our home. We had a rental and then we had no money we were very poor so we couldn't
    buy suitcases.
- speaker: Respondent
  text: So my sister, the eldest, she was already married by then. She was, she got married at 19 years old, 1937, and she
    went out and bought heavy canvas and sewed duffel bags for us and we took all of our belongings in duffel bags. I remember
    it was a striped canvas. We just took our clothing. There's nothing else we could take. So my mother's instruments and
    she even did some barbering on the side, her barbering things were put into the Japanese school, and they stored it for
    us. Then we found out that a lot of people broke into it or the person who was supposed to be guarding it were letting
    people come in, so a lot of the things were lost. Some of the things my brother was able to recover but not some of our
    precious things.
- speaker: Interviewer
  text: Were your mother's instruments there?
- speaker: Respondent
  text: She had shamisen and we had the piano, beautiful piano. She played all kinds of instruments and she just learned all
    on her own she never took lessons. She could play violin, the piano, shakuhachi and the drum and the shamisen. Yes she
    just knew how to do it. I never saw it, my sister told me a master shamisen instructor came from Japan to test her and
    he played the tsugaru, a real fast one and she kept up with him. He was surprised and she had no lessons. But she could
    keep up with him because she had that in her mind that she could do it. So anyhow, I understand she was quite talented
    but I didn't even hear it, because this was before my time and I was too busy playing outside, maybe.
- speaker: Interviewer
  text: And so your brother, as a surrogate parent at his young age and he knew you had to leave, what was that conversation
    and do you remember what he said?
- speaker: Respondent
  text: Like I said I was very naive and I said, "Oh we're going to go someplace? Oh goodie!" You know we were poor - we got
    to go see movies and go to the ocean, go to the funhouse house and all that, that was our going places. When they said
    we're going to take a bus and go someplace, I said "yay." I was dumb and 16 years old. My little sister and I went thinking
    we were going to go to a camp. You know, so when we got there, what a shocker it was, but that's how my brother prepared
    us, we have to leave everything. We can only take this. We have to leave and we don't know when we're going to come back.
    That was what he told us and he never told us it was done because the government said we had to leave the Pacific coast,
    he never told us that.
- speaker: Interviewer
  text: When did you find out that it was a government order?
- speaker: Respondent
  text: Along the way there, we said, "Where are we going?" And he says, "We're going to a place where we have to stay where
    we don't know how long we're going to stay but we don't know where it's going to be either." It was a shock to see the
    vast area of black tar papers. We were shocked. That's what we're going to live in? You know, and I thought, "How long?
    What's going on?" We were all just bewildered. I cried that night because I had no idea what was happening to us. We had
    no future that we could count on, that it was done for us. We stayed there until they told us we couldn't, because we
    didn't have to or something. But I didn't even think ahead of that, about what's going to happen after we get out of here.
- speaker: Interviewer
  text: When did you know it was all Japanese Americans? That was a shocker. That was a shock to you as well?
- speaker: Respondent
  text: Yes, because being where I was it was a community of Japanese farmers, we never associated with them because they
    were different. I mean they were squares, and we were crazy, you know, we were really nuts and crazy about doing things
    that Japanese parents would frown on. Roller skating, and running around in the pasture and gathering mushrooms and things
    like that. Those kids never did that, they went to Japanese school and they were nice little girls. So that was not good
    for me not to be able to associate until I went to camp, then I made some wonderful friends and we're still friends to
    this day. We still get together. We made a club called The Modernaires in camp and they were all my age. It was fun.
- speaker: Interviewer
  text: So when you got into camp and you started making friends, how did the singing come along? How did you become the one
    that was asked to sing?
- speaker: Respondent
  text: Before the war they used to have the Nisei Week talent shows. I as a 13 year old and a 14 year old, I went with my
    brother because he liked to sing and he loved music, and so I tried that and I was asked to sing with a talent show. Two
    years in a row I sang in that Nisei Week talent show. So by the time I went to camp when I was 16 they knew that I used
    to sing. Then they asked me to sing. One of the first functions I sang at was when they were introducing the Japanese
    faculty with the Caucasian administration and they asked me to sing, no accompaniment. And I got up and sang and then
    I sang "Tangerine." At that time it was a song that was popular and then next time they had another get together I just
    sang with the piano and the music teacher used to accompany me.
- speaker: Interviewer
  text: Were you still practicing or taking any kind of lessons?
- speaker: Respondent
  text: I took lessons when I was 12 years old until I was 15, 16 almost. The reason I got to take singing lessons at a time
    when my brother could barely afford to put food on the table is that he bribed me not to go to Japan with my little sister
    with my step father. My mother remarried right after my father died because she had so many children and so right after,
    I'm sure within a year or so she remarried. And so he had a child with my mother, and he wanted to go back to Japan to
    start life anew because he didn't want to have this millstone around his neck of having so many kids. So he took his son
    but he said he'd take my little sister and I, Mary, with him, maybe as a token expression to try to make it easier for
    my brother to support us. So my brother says, "No, I don't want them to be separated," so he said, "If you don't go and
    you stay I'll send you to singing school." Okay, I'm staying! It costs 50 cents for him to send me to singing school.
    50 cents. That was a big deal for him to put that money out because he used to put a dollar on the table for my sister
    to go shopping to buy food for us.
- speaker: Interviewer
  text: It went a long way back then.
- speaker: Respondent
  text: Yeah it did. Yeah to buy bread, meat, milk and all that for school. So that's amazing that he knew that, that for
    you was enough.
- speaker: Interviewer
  text: Oh yes, he knew that's what I wanted.
- speaker: Interviewer
  text: So you were closer with your brother.
- speaker: Respondent
  text: Yes, so I named my first son after him.
- speaker: Interviewer
  text: What is his name?
- speaker: Respondent
  text: Akira, Frank. Akira so I named my son Alan Akira, none of my children have Japanese names but he's the only one I
    gave a Japanese name to.
- speaker: Interviewer
  text: When did your brother pass? Was he around for quite a while?
- speaker: Respondent
  text: Yes. He died in 2012.
- speaker: Interviewer
  text: He really lived a long time.
- speaker: Respondent
  text: 1916 he was born.
- speaker: Interviewer
  text: Going back into Manzanar again, was there one person that gave you that nickname "the songbird"?
- speaker: Respondent
  text: I don't know who gave me that nickname, but I kind of think it could have been the music director of the camp, Louie
    Frizzell. He took me under his wing and he used to go out into the camp on the days when he didn't have to teach and bring
