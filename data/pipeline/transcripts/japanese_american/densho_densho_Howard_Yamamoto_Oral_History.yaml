- speaker: Respondent
  text: I'm just trying to gather my thoughts here. Basically when Japan bombed Pearl Harbor, first of all, any of the minority,
    they were considered second class citizens. So, I mean this is just my thought. A lot of people have criticized our generation.
    Why didn't we fight it? Why didn't we protest? Well, when you're considered a small group - and another thing, Japanese
    just don't say anything. It's not in the culture.
- speaker: Interviewer
  text: No. You know why this interest is up now? It's the Sanseis, third generation.
- speaker: Respondent
  text: It's very different, the people who went through it versus people that are relatives hearing about it. Our generation
    started because people like you were starting to pick up on it. It was kind of interesting, how much people knew about
    it. When I was taking a course at San Francisco State, it was something that had to do with social studies. I gave mine
    on the internment. The prof, well she was a visiting prof, she really didn't know what I was talking about. And she said,
    "What are these pictures here, the barracks?" "They were in prison, essentially, behind barbed wires." "No!" A couple
    of the students go, "Oh yeah." But you could see it in her eyes. She was puzzled.
- speaker: Interviewer
  text: I'm sure she couldn't even conceive of it.
- speaker: Respondent
  text: You just don't gather a hundred thousand people and put them away. Of course it wasn't really publicized. But anyway,
    it was interesting, this perception, of what happened during WWII. When the war started, they were given a few months
    I think we were given until February, March. I was four years old. Or just turned four. And what I remember most was my
    mother, panicking. She was panicking. And I remember the house we lived in, right in the middle was a potbelly stove.
    She burnt anything that had anything to do with Japanese like books, records, pictures, any of that, she burnt. Because
    what was happening was a lot of her friends were being picked up.
- speaker: Interviewer
  text: Individually?
- speaker: Respondent
  text: Individually. She'd say Mr. So-and-so got picked up or so-and-so got picked up, you know. And panicking. And for good
    reason. Because my father, before he came to U.S., he was in the Japanese Navy.
- speaker: Interviewer
  text: They'd have a target on him.
- speaker: Respondent
  text: Yeah, he was in the Japanese navy. And he changed his name. So Yamamoto isn't my real name. It's Tanaguchi. Essentially,
    as far as I could figure out, he was an illegal. Which was very common, especially with the Chinese. Well, changing the
    names anyway is very common. Yamamoto was his aunt I think, who lived here in the United States. My mother was surprised
    as to why wasn't he picked up, if anything.
- speaker: Interviewer
  text: He just flew under the radar.
- speaker: Respondent
  text: He should have been one of them to go to Crystal City. But those that were sent to Crystal City were people who were
    in some organization. It may have been as innocent as a shigin [Japanese poetry] group and all that which the FBI deemed
    as being dangerous organizations. And at that time, the Japanese were pretty much isolated, somewhat. And a lot of it
    was self-isolation, by the way. They formed little clubs and so forth. And I think that's part of the reason they deemed
    certain organizations or certain clubs as dangerous or subversive. I was surprised to see pictures of the people in Tule
    Lake. But there was a radical group and they were exercising. But they were in a military line, with the hachimaki. My
    dad and Bob remember being taught by Kibei who were teaching them the same military style. So in essence you did have
    some radicals in there. But I don't know much about Tule Lake. I don't know much about camp, for that matter.
- speaker: Interviewer
  text: Well on the flip side, a lot of people have no idea Keetley Farms existed and that there were people who were able
    to seek a place where he could evade Japaneto, Gorman or Halon a lien, why Mr. Wada took it upon himself essentially move
    his family. Howard's travel permit to leave California Because I don't think this order to voluntarily evacuate came up
    yet. I mean he went out way before that, just to look around. From what I understand he went to different areas like Nevada,
    a lot of places in Utah and such. And boom, denied.
- speaker: Respondent
  text: They wouldn't take a resettlement community?
- speaker: Interviewer
  text: They just didn't want the Japanese. But when the word got out among the Japanese, that in fact he was out looking
    for a place to resettle, first his relatives wanted to jump. "You should take us." And then word got out further. "Would
    you take us?" He found a place in Keetley. And then he came back and his plan was to farm. But who do you choose to go
    out? So he picked them by occupations. Especially farmers. Now my father was picked - well, first they were good friends,
    good buddies. But he was initially picked because he was a carpenter. So as a carpenter, there's some use to the colony.
- speaker: Interviewer
  text: And how did they meet?
- speaker: Respondent
  text: Wada was a big time produce man. He was pretty wealthy. And anyway, my dad worked for him for a while. And they come
    from the same prefecture in Japan, Wakayama. So that's how he got on. Wada himself has eighth grade education, that's
    it. When he undertook this voluntary evacuation, he was only 35. Can you imagine doing it?
- speaker: Interviewer
  text: Nope, not at all.
- speaker: Respondent
  text: Yeah. His English is broken, broken English. And then having to go in front of the city council to plead with them
    to please let them in. Quite an undertaking, quite an undertaking, it took a lot of guts. And how he did it? I don't know.
    He had to go in front of the city council in Heber, which is right next to Keetley and convince the people to let us in
    with the owner of the ranch, George Fisher. They became real good friends and I guess Fisher and Fred really had to fight
    to get the city council to approve. Fisher had something like 3,000 acres. It was an abandoned mining town. So he wanted
    Wada to come in but they had to really, really work their tails off just to convince them. Wada even had a talk with the
    governor of Utah, Maw. Somehow I think Maw got a hold of Fisher and they negotiated. Fred, I remember, in his later years,
    talked very highly of Fisher, he liked him. I would think part of the reason the people in Heber gave in was their religion,
    Mormon. Because the Mormons were under a lot of persecution. So I think they would understand.
- speaker: Interviewer
  text: How would you describe Mr. Wada's personality?
- speaker: Respondent
  text: He was very self-confident. Just a very self-confident person. Wasn't among the Japanese, from what I understand,
    the most popular.
- speaker: Interviewer
  text: Really. He just rubbed people the wrong way?
- speaker: Respondent
  text: In the Japanese group, you don't stand out, stay within the confines. I mean, that guy stood out. I remember when
    Mr. Wada attended my dad's funeral. And we spent some time at my mom's house. He's pretty gruff, but I love him. He says,
    "Goddamn Habo, [Howard's nickname] you wasted your life being a goddamn teacher. I could have made you into a successful
    businessman." And I say, "Oh okay! Why didn't you tell me that?" Yeah, he had a really, very strong personality.
- speaker: Interviewer
  text: Well for someone like that, the prospect of being in prison is enough to make you want to get a group of people to
    try and keep your freedom. I understand that.
