- speaker: Interviewer
  text: Do you remember if there was any convincing that Mr. Wada needed to do with your family?
- speaker: Respondent
  text: No, that I have no idea.
- speaker: Interviewer
  text: To get back to the history, they were allowed to voluntarily leave California. And I think there was something like
    10,000 permits given out. Out of that 10,000, only few made it. Not many. Some of what I read is that they were turned
    away at the border. Some others put in for a permit with the intention of leaving but changed their minds. Because where
    you going to go? Unless you have a family or friend who was willing to take you who lived in the Midwest somewhere. Just
    to go out there blind, is, no. And also as far as travel is concerned, mobility was limited. Then, it was a two-lane road.
    And it was an arduous trip. Very few gas stations, very few motels and so forth. So, your mobility was pretty well limited
    for a lot of people. So the Wadas did a semi-caravan. They had a few trucks to carry some furniture, not a lot. I think
    each family was allowed to pick one or two. Because they only had about four trucks or something like that. And whatever
    you could take in your car. The rest you had to sell or store. So we did travel and as I remember, we never stayed at
    a motel. My mother was very apprehensive about going in and asking for a room. So on the trip there, I remember we slept
    in the car to Utah. And I remember she was very apprehensive about going into restaurants.
- speaker: Respondent
  text: Because of the feeling against Japanese?
- speaker: Interviewer
  text: Yeah, being stared at. Well, she was almost paranoid. [laughs] When we did stop at a rest stop, we'd order a bunch
    of sandwiches to carry us through so she doesn't have to go to any other restaurants. But it was hard, it was hard on
    the parents. Was it hard on me? I don't know, I don't remember that much, the hardship. But the parents, my god. Could
    I do it? No. I couldn't do it. I can't imagine myself doing it.
- speaker: Respondent
  text: I remember going to Keetley and it was really snowing, it was just covered in snow. I went back right after I got
    married.
- speaker: Interviewer
  text: So is it designated as a historical site?
- speaker: Respondent
  text: You know what it is? It's underwater. It's a reservoir. All of it now?
- speaker: Interviewer
  text: It's all under water. They made a lake. It's a valley, it's a depression and they flooded it. I don't know if they
    made a dam for power or what. But it's a lake.
- speaker: Interviewer
  text: When did that happen?
- speaker: Respondent
  text: That happened, oh gosh, had to be twenty years ago. But anyway, yeah it's funny how I remember the store. There's
    one picture, where we lived. It was a big building and they turned that into a motel after we left. And I remember the
    guys who were up on top of the roof and throwing blocks of ice because it just built up. When we drove in, we had people,
    like an advance party that was there. And then we were all assigned to these rooms. We lived in there.
- speaker: Respondent
  text: So where the families stayed was in a makeshift hotel?
- speaker: Interviewer
  text: Or if it was a big family, they went to some of these homes. We were spread out in the valley. Myself, we were in
    this motel and right next to the motel was a little house, little shed. And I remember later on, after a year we moved
    into the little shed. Individual house - I wouldn't even call it a house. I don't think it was bigger than the living
    room. And when we went back they stored snow equipment in there. I says, "Hey, this is where I lived!" Initially whatever
    homes were there were abandoned at the time.
