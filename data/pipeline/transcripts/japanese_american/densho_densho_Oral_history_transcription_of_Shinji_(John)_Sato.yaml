collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Do you remember things you did in Japan when you were young?
- speaker: Respondent
  text: I remember some. I came to this country when I was 14. I grew up by my mother until I was 14 years old. I came here
    when I was about to finish grammar school. My father was a boss of a fruit ranch in Napa, so I went there.
- speaker: Interviewer
  text: What do you remember about things that happened when you were young?
- speaker: Respondent
  text: When I was 5 years old my grandfather died. My uncle who was 29 years old and single died around that time. My grandfather
    used to carry me on his back when he burned charcoal. I remember picking silverberry riding on my grandfather's back.
- speaker: Interviewer
  text: Were you brought up by your mother?
- speaker: Respondent
  text: My father came to Hawaii as an immigrant around 1901. He was in Napa at the time of 1906 earthquake. I heard that
    at the time of the earthquake many people from Chiba Prefecture escaped from San Francisco and came to my father's ranch.
    My father gave them food and work such as picking pears. His boss had a large dry yard, so my father let them work in
    the dry yard.
- speaker: Interviewer
  text: What is a dry yard?
- speaker: Respondent
  text: It is a place to dry fruits such as pear and peach. The boss bought the fruits which the neighbors brought to sell,
    and had women cut and dry them. Mr. Tule was the boss, and my father worked under him as a foreman. I was like a yobiyose,
    but I wasn't, as I came here with my father who came back to America. My mother brought me up from the time I was 3 years
    old until I was 14.
- speaker: Interviewer
  text: Were you lonesome in Japan without your father?
- speaker: Respondent
  text: I was only about 3 years old, so I didn't feel that way. I remember my mother had a hard time bringing up five children.
- speaker: Interviewer
  text: Who was the oldest?
- speaker: Respondent
  text: My older brother was. Then my older sister, and another older brother. I was the 4th one. The 5th one was my younger
    sister. Yasuko whom I brought here is the youngest daughter of my sister. She married Mr. Maeda from Hiroshima, and has
    been living in Sacramento for a few years. She visits us every week without fail.
- speaker: Interviewer
  text: What kind of things were fun in Japan?
- speaker: Respondent
  text: There wasn't anything especially fun. I have a picture taken with my two best friends in the neighborhood. We were
    three heroes who used to catch mudfish and crabs together day and night. Now there are no mudfish nor crabs. I went back
    to Japan three times, but every time I went there they came to see me, and we did the same things we used to do when we
    were little. One of them used to live in front of my house, and the other one lived on the side of my house. The one who
    lives in front of my house still lives there, as he is the heir. The other one became a carpenter, and as he was adopted
    he moved away from our neighborhood, but he came to see me whenever I went there. I was healthy and big for my age. It
    must have been good at school, for my teacher made me the class president all the time. Many people know me. When I go
    back there they hold an alumni meeting for me. Ohana-san who went to school with me comes to the meeting, too. Like myself,
    she just went to grammar school. Then she married an immigrant and went to Hawaii. We were good friends. When I go back
    to Japan she always gives me $1,000 as a parting gift. She is still well and alive. I grew up like that until I was 14
    years old. Before my father came back, my uncle and my grandfather died, so my mother had a hard time.
- speaker: Interviewer
  text: What kind of hardships did she have?
- speaker: Respondent
  text: She had a hard time making a living. We were very poor. I was lucky. My oldest sister was sent out to work, and my
    brother went to work at my uncle's. I was too young to work, so I stayed home with my mother and my younger sister. Until
    I became 14 years old I didn't go anywhere, and depended on my parents. When my father came home from America he brought
    some money back with him, so our lives became easier. My younger sister was a baby then, so she was loved. I was older,
    so my father didn't take me anywhere. He took my mother and my sister everywhere in Japan. My father died when he was
    73 years old.
- speaker: Interviewer
  text: Did you come here with your father when you were 14?
- speaker: Interviewer
  text: Did the whole family come here?
- speaker: Respondent
  text: No, he brought just me. I made arrangements to call my older brother here by the following year. I got on a bicycle
    and went to the Japanese Association to get a certificate, and to the Japanese Consulate to put in a petition to call
    him. When my brother came here I was around 17 years old, so I was a grownup. When I came here I was a 14-year-old child,
    but in about a year I could speak English without any difficulty. I worked at a white family for a year, so I could speak
    English well enough to argue with my master. As my father was sickly, my brother and I decided to send him back to Japan.
    For a year after my father left, his friend was the boss of the fruit ranch, but when I was 18 I became the boss.
- speaker: Respondent
  text: As we thought there was not much future in the fruit ranch, we sold it and my brother and I went to Oregon to farm.
    We bought an Italian prune ranch in Salem, Oregon and worked hard. As I was a hard worker I paid off half of the ranch.
    Of course, my brother paid off half, also. When we paid off the ranch, my brother went to Sacramento to grow strawberry,
    and as he needed the capital, so I bought his share, and paid $1,500 which was about the half of the estimated price.
    Both of us worked hard to grow strawberry.
- speaker: Interviewer
  text: Did you come back from Oregon?
- speaker: Respondent
  text: We bought land in Oregon, but there was not much work, so we went to Sacramento, Los Angeles, Imperial Valley and
    Arizona. I worked harder than anybody else everywhere I went. In the Imperial Valley, when the temperature was 115 degrees,
    the wind was like fire. In those days there was no paved roads. When the road was covered with dust, they poured water
    on the road, and used the part which was not wet. But when that side was covered with dust, they used the side where they
    poured water and dried. We transported melons and watermelons on horsebacks on dried part of the road.
- speaker: Respondent
  text: In those days many people smuggled themselves from Mexico. My brother and I were the only ones who had passports,
    and the rest of them smuggled themselves from Mexico. Among them, a man named Nakamura was caught and was put in jail
    in Brawley. I visited him in the jail. I felt sorry for him as he was only 27 years old then. As it was his first offense
    he was sent back to Mexico. Later he wrote and told me that he was thinking about smuggling himself into America again.
    I think he was caught again and was deported to Japan as I didn't hear from him since. He was from a good family, but
    he came to America for some family reason. He was a poor young man. My brother and I had passports, but other 5 did not
    have passports.
- speaker: Respondent
  text: We worked hard, but we made only $5 for working all day. As soon as we finished our work in Imperial Valley, we went
    to Arizona. Phoenix was very hot. We worked at Mr. Yamamoto's ranch. He was a graduate of Waseda University, and was a
    frank and hearty man. He was growing on 200 acres using horses. He went shopping at grocery stores and other stores on
    horseback. My brother and I worked there about 20 days. We did piece work on contract, so we could not stop until the
    work was finished. One night, when we finished loading a 45 lb load on the horse-drawn wagon around 10 o'clock at night,
    a big thunder storm came. The wind was so strong that it blew away the camp. It was lucky that I fell down on the ground,
    because a big tree flew over my head. When I went to the scene after it stopped thundering I found out that a big tree
    had fallen on top of the wagon. Luckily no men nor horses were injured. I was surprised to find my load under a fallen
    tree. It happened during 20 days I worked there.
- speaker: Respondent
  text: I was only about 21, so I worked hard and came back to Napa. I worked as a farm laborer for a year, but I quit it
    as there was much expense although I made good money. I became a foreman at Napa, so I did everything.
- speaker: Interviewer
  text: What did you grow in Imperial Valley?
- speaker: Respondent
  text: A single man had a 40-acre cantaloupe ranch, so we grew them by contract. My brother and I left the camp at daybreak
    with bags on our backs, and worked in the field in 115 degree weather. Before that we picked oranges in North Pomona.
    I liked to work silently but my brother liked better jobs, so he worked as a ape in Los Angeles. He caught the measles,
    so I went to Los Angeles and talked him into going to North Pomona and pick oranges with me as it was better for his health.
    We worked at Mr. Sasaki's camp in North Pomona till June.
- speaker: Respondent
  text: Then my brother went to Imperial Valley. I was going there with him, but as I still owed some money on the land, and
    had to make some traveling expenses, I stayed behind for about a week to ten days. As I was good at pruning, I was asked
    to stay there and work. I was young, and wanted to make money, so I went to Imperial Valley. I think I made about $10
    a day. Seven of us went around 40 acres and could pick only about two crates of cantaloupe. The boss wanted 2 crates as
    he could sell them and make money. We worked hard for the boss disregarding our interest. Until about 10 o'clock at night
    everybody worked, some picking, some packing. We stayed there for about a month.
- speaker: Respondent
  text: When the work was finished we went to Phoenix, Arizona. I was just a farm laborer. I came to America as a non-immigrant
    as my father was a foreman of a ranch. Non-immigrants had to go to their prefectural office to get their passports. Immigrants
    had to get their passports from Kanagawa Prefectural office. I received my passport from Chiba Prefectural office. I came
    to America with a passport of a non-immigrant, although I was just an immigrant.
- speaker: Respondent
  text: I went back to Napa, and succeeding my father became a foreman of the pear ranch. Then I went to Oregon and bought
    land. From there I went to Sacramento and helped my brother grow strawberry. Then I started going to school. I attended
    Healds College for a while.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was about 25 years old then. When I was 27, Woodbridge Act (a resolution presented by a Congresswoman Woodbridge
    that no Japanese could enter America after July, 1924) passed the Congress. My brother gave me some money to go back to
    Japan and meet his wife's niece as a prospective bride, so I went back to Japan after I quit Healds College. Things did
    not go well and I could not marry her, so I married my present wife and came back to America with her in 1922. I have
    been a farmer since then. I think it was better to be a farmer. When I had five children I decided to become an American.
    As my brother and I each had five children, my mother told me that there was no place for us to live in Japan. My father
    bought house and land and prepared for us to go back to Japan, but my mother was a sensible woman who told us not to go
    back to Japan as there was no place for us to live there.
- speaker: Respondent
  text: That is why we bought this ranch 43 years ago. It was a poor ranch. My brother said 20 acres out of 40 acres is very
    bad, so I took the bad part and had my sons help me level the land after school and grew crops and made it into a nice
    ranch. I gave much thought about settlers. When I was young I attended a naturalization class in adult education whenever
    I found time. I wanted to know what the immigrants from Europe did. Japanese immigrants came here to make money, but I
    thought it was no good if we do not become settlers. My brother bought 40 acres in front and I bought 40 acres in back.
    I leveled the land and sent my children to school. I told everybody that we could not do it in our generation, but in
    our children and grandchildren's generation there will be great people among Japanese settlers. If Japanese go back to
    Japan with money they made, that is the end. They would go back to the poor country and would live in poverty. That is
    no good. I said that to everybody even in camps, so people hated me. Our ancestors came here about a hundred years ago
    and made plans to settle down, so we should become settlers. In order to plant our posterity here, we should educate them
    first, and then they should have strong faith. I told young people that those who have faith and can do things on their
    own are better than those who go to school by invitation. Some people thought I was too Americanized. I like to be Americanized.
    My son went to Valley Forge representing 28 Baptist church. I think that is natural. It is no good if only Japanese get
    together and do things. I tell my children that they should go into American world and become fine American citizens instead
    of becoming fine Japanese.
- speaker: Respondent
  text: I still remember that my mother told me to become an American. My children and grandchildren are all mixed. I tell
    them that is right. They should bring their children up to be fine Americans. It is good to know that we are Japanese,
    but we should not act like Japanese too much.
- speaker: Respondent
  text: I started farming 43 years ago. It is not good for children to have nothing to do, so after school I let my older
    sons level the ground by machine, and I let the younger ones do hoeing. My wife worked hard too. I had a big family, so
    when everybody worked, the farming was done. If I were a carpenter I had to work by myself, and other people would have
    nothing to do. That would be no good for the children.
- speaker: Respondent
  text: I built this house 43 years ago with my wife. We didn't have electricity then, so my wife held the lantern while I
    pounded the nails. We farmed in the daytime, and after we put the children in bed my wife and I built this house. I knew
    the carpentry. I worked as a shoemaker in the camp. There were about 5,000 people in Camp II, but there wasn't anybody
    to repair shoes. As my children were wearing out their shoes, I learned how to repair shoes and also helped others. I
    worked as a carpenter for a year, and a shoemaker for a year. In the third year I thought Japan would lose the war as
    Saipan fell, so I left the camp earlier. When I left the camp a year before the war ended everybody in Block 229 saw me
    off. As I worked for the block, the block manager presented me with a shirt and a pair of pants.
- speaker: Respondent
  text: I went to Kingsburg, Colorado where my brother was. I knew the man in charge of a dance hall, Mr. James Crawford.
    When we went to Colorado in April it was still snowing. I was a laborer. My wife did the thinning, topping and sorting
    on onion. We worked there for a year, and bought an old car. Our oldest son had enlisted in the Army when he was 17, before
    finishing high school. Our oldest daughter worked her way through the University of Michigan. She is a school teacher
    in Sacramento now. I sent all my children through college.
- speaker: Interviewer
  text: What kind of difficulties did you have when you bought land here?
- speaker: Respondent
  text: There wasn't any difficulties as my wife and I worked hard. We led a very happy life.
- speaker: Interviewer
  text: About what time did you start working in the morning?
- speaker: Respondent
  text: Sometimes we were early and sometimes late. Neither of us are early risers. We both were healthy and worked hard.
    We grew strawberry, and after that we have been going.
