source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Let's start with your mom's side of the family. We're going to start with your mom's parents. Is that okay? Your grandparents.
- speaker: Interviewer
  text: If you could tell me what your grandfather's name was.
- speaker: Respondent
  text: Okay. It was Kisaburo Konichi.
- speaker: Interviewer
  text: And where and when was he born?
- speaker: Respondent
  text: Oh. He was born in, I think like, 1865 or something, in Japan. I think it was Yokohama or close to there.
- speaker: Interviewer
  text: What was his family doing for a living in Japan?
- speaker: Respondent
  text: Well, I heard that his family, or his father was a groom to a samurai. I guess, you know, before the Meiji Restoration.
    But I don't know any more than that. And I don't know what my grandfather was doing. I guess he was still very young when
    he came here. He came in the 1890's.
- speaker: Interviewer
  text: Oh, he did?
- speaker: Respondent
  text: Yeah. Is my understanding.
- speaker: Interviewer
  text: What inspired him to make that journey across the ocean to the US?
- speaker: Respondent
  text: I really don't know except he did have, I think, eight brothers. And he was one of the younger ones. So it could have
    just been that his prospects didn't look very good.
- speaker: Interviewer
  text: Yeah. Where did he end up landing in the US and settling down?
- speaker: Respondent
  text: He apparently first settled in San Francisco. And the family story is that he was there when the earthquake happened.
    And he was so frightened by that that he walked - I mean, I guess he first got on a ferry or something over to the other
    side of the bay. And then he walked all the way to Sacramento. And that's where he was living when my mother was born.
- speaker: Interviewer
  text: Okay. So let's talk about your grandmother.
- speaker: Interviewer
  text: What is her name? Your mom's mom.
- speaker: Respondent
  text: Her name is Chiyo Konishi.
- speaker: Interviewer
  text: And where and when was she born?
- speaker: Respondent
  text: She was born in Yokohama in 1890. Yeah. And her father was fairly well off. I think he was a whiskey, I believe, Suntory
    whiskey distributor in that area.
- speaker: Respondent
  text: Yeah. Her mother became ill and she died when my grandmother was in her early teens. Her father had brought in this
    geisha, who, I guess, you know, he was having some relationship with to first help take care of my grandmother's mother.
    And then after my grandmother's mother passed away, she married him. And -
- speaker: Interviewer
  text: The woman who was the geisha married into the family.
- speaker: Respondent
  text: Yes. Right. Yeah. So my grandmother has a half-brother from that marriage. And we still are in touch with that half-brother's
    family. You know, grandchildren at this point.
- speaker: Interviewer
  text: What was your grandmother's maiden name?
- speaker: Interviewer
  text: And that was the family that was running the whiskey distribution?
- speaker: Interviewer
  text: How did your grandmother come to marry your grandpa?
- speaker: Respondent
  text: I believe they were introduced. I think my grandfather went back to Japan and somehow, I don't know how, but they
    were introduced. Yeah. And I think, you know, it might have been a little hard for my grandmother at that point because
    there's now a step-mother in the house and new baby, and all. Yeah.
- speaker: Interviewer
  text: Maybe a way to get a little bit more freedom from that situation.
- speaker: Interviewer
  text: Did you know your grandmother when you were growing up?
- speaker: Respondent
  text: Oh, yeah. In fact, she lived with us the whole time I was growing up. Yeah. From camp all the way 'til - she passed
    away when I was 28.
- speaker: Interviewer
  text: What did she share with you about what it was like for her to move from Japan to the United States? It just seems
    like such a huge step to take.
- speaker: Respondent
  text: Yeah. You know, I think it wasn't so bad because - well, I'm not sure if they lived in the Japanese area in Sacramento,
    but I kind of think so. But then they moved to Los Angeles by 1913 or so. So maybe three years or so after my grandmother
    had come. And they lived right in Little Tokyo. And so there was a whole Japanese community there. And she actually never
    learned to speak English her whole life and she got along very well.
- speaker: Respondent
  text: You know? So.
- speaker: Interviewer
  text: Did she ever talk about what that ship journey was like?
- speaker: Respondent
  text: No, she didn't. I know that when she was in Yokohama, I think they really lived in the city. And apparently, she didn't
    cook ever. They always got their food from vendors. I guess that was pretty common when you were living in the city. And
    my mother used to always complain about my grandmother not knowing how to cook. But anyway, she did cook for us all the
    time I was growing up.
- speaker: Interviewer
  text: Just not for your mom apparently. Would you describe your grandmother's personality for us?
- speaker: Respondent
  text: Gosh. She was just pretty accepting of everything. She just did everything for us. I mean, she didn't like me, in
    fact, to help her with taking care of the house or anything. So she cleaned the house. She washed the dishes. She did
    our laundry and everything. And then my mom was working like, six days a week, at one point seven days a week. And my
    grandmother was really, you know, watching out for things. Like, if I needed clothes or that type of thing, it was my
    grandmother who would take care of it. Yeah.
- speaker: Interviewer
  text: Did you two have a close relationship when you were young?
- speaker: Respondent
  text: I wouldn't say it was close. But certainly, she was almost more like a parent than my parents were because they were
    just working so much and away from home. Yeah. And she spoke, you know, only Japanese. I did speak Japanese when I was
    growing up, but I didn't know a lot of the more adult words to be able to have a real conversation with her. So.
- speaker: Interviewer
  text: Right. Yeah. When she and your grandfather moved onto Los Angeles, and you said they were living in Little Tokyo,
    what were they doing for a living there?
- speaker: Respondent
  text: Well, my grandfather used to have a go parlor right in their living room. And I guess it was like, a place where men
    would come and pretty much hang out all day and they'd bet on the games and all. And my mom said that when my grandfather
    died, they just found a bunch of IOUs in his desk. So.
- speaker: Interviewer
  text: Of men who owed money?
- speaker: Respondent
  text: Owed money to him. Yeah. Because he was a fairly, what do you call it, a ranked go player. He had gotten some kind
    of degree of mastery of that. And so, I guess he was pretty good.
- speaker: Interviewer
  text: So he was beating a lot of the people who came to the parlor.
- speaker: Interviewer
  text: I see. Was that his business, was running the go parlor?
- speaker: Respondent
  text: That really was. But he also used to do posters for like, community events and things. You know, they would have like,
    at a concert or something, they would have posters that had all the names of all the performers on them. And so he would
    make those in Japanese. So I guess he was a good calligrapher. Yeah.
- speaker: Interviewer
  text: I was curious about what your grandparents had been doing in Sacramento before moving down to Los Angeles?
- speaker: Respondent
  text: All I heard was that he used to make those posters and things like that. So, yeah.
- speaker: Interviewer
  text: Maybe that was also his -
- speaker: Respondent
  text: Oh. And I think he also taught Japanese some. And he did in Los Angeles too.
- speaker: Interviewer
  text: Are you aware if your grandfather ever learned English?
- speaker: Respondent
  text: I really don't know. Yeah. Because he died in the '30s. So, yeah. I never met him.
- speaker: Interviewer
  text: First of all, what's your mother's name?
- speaker: Respondent
  text: Her name is Chie Konishi. It was. And now it's Tsuchiya.
- speaker: Interviewer
  text: Yeah. And where and when was your mother born?
- speaker: Respondent
  text: She was born in 1911 in Sacramento when they still lived up there.
- speaker: Interviewer
  text: So, they moved down to LA just when she was two years old, about.
- speaker: Respondent
  text: About. Yeah.
- speaker: Interviewer
  text: Does she have sisters or brothers?
- speaker: Respondent
  text: She has a younger sister, Michiko. Yeah. One year younger.
- speaker: Interviewer
  text: Where was Michiko born?
- speaker: Respondent
  text: I believe she was also born in Sacramento. Yeah.
- speaker: Interviewer
  text: What did your mom tell you about her childhood and what it was like to grow up in Little Tokyo?
- speaker: Respondent
  text: Yeah. Well, I remember her telling me that they went to the public grammar school, Amelia Street School there close
    to Little Tokyo. And that the teacher wouldn't let them speak Japanese in school. They had to speak English. And then
    of course, her parents, especially her father, was very strict that they had to speak Japanese at home. So there was a
    real division. My mother used to talk about the penny lunches at Amelia Street School. That you could get like, milk for
    a penny and then dessert for two pennies or something. I guess it would cost maybe five cents to have your lunch there.
    And there were a lot of Japanese children who went to that school. And I guess they all wanted to talk Japanese, but they
    weren't allowed to while they were in school.
- speaker: Interviewer
  text: Yeah. Must have felt, sort of, caught between two worlds.
- speaker: Respondent
  text: Yes. Yes. And then, let's see. My mother and my aunt also used to be in these movies back in the '20s, or maybe '10s,
    when they were still like, maybe 10 years old or so. And they were with fairly famous Japanese actors. I don't know if
    they showed those films like, in Little Tokyo here or if they only showed them back in Japan. But, yeah. They were in
    movies that were clearly Japanese movies, you know, where sometimes their costumes would be Japanese and all. So, that
    was kind of interesting. They used to go out to - where is that - Venice or West LA where the studios were. And they made
    those movies. We have some photos of them in those movies.
- speaker: Interviewer
  text: Who was the production company?
- speaker: Respondent
  text: I don't know. I mean, we might have it in our scrapbooks. But I don't really know. I remember that she had said that
    like, Sessue Hayakawa who was fairly famous in the '50s and '60s, that he was an actor who was in some of the movies.
    So, yeah. That was, kind of, an interesting, sort of, side story to my mom's growing up.
- speaker: Interviewer
  text: What roles were they playing in the films?
- speaker: Respondent
  text: Well, the one that I particularly remember is that my aunt played a sailor boy in one of the movies. And she had a
    little sailor outfit on. And, yeah. I think my mom was always wearing a Japanese kimono. But I don't know the roles.
- speaker: Interviewer
  text: Are these movies still in existence somewhere?
- speaker: Respondent
  text: I have no idea.
- speaker: Interviewer
  text: We'll have to go on an archival dig to see if we can find them.
- speaker: Respondent
  text: Yeah. Right. Right.
- speaker: Interviewer
  text: Was your family - or, go ahead.
- speaker: Respondent
  text: Oh, I was just going to say, another thing my mom used to tell me about her father - oh, he was very strict. And he
    would have these sessions where my mom and aunt would have to just sit very still for an hour. You know, maybe to him,
    it was meditation or something. But it was pretty hard on them. And then also, he really believed in the Japanese horoscope.
- speaker: Respondent
  text: And whenever they wanted to go somewhere, he would read the horoscope for the day and tell them if they could go or
    not.
- speaker: Interviewer
  text: Where would that horoscope have been printed?
- speaker: Respondent
  text: Well, I guess in Japan.
- speaker: Interviewer
  text: Yeah. And then it was published in like, I don't know if Rafu Shimpo -
- speaker: Interviewer
  text: '- existed at that point. But in one of the newspapers that -'
- speaker: Respondent
  text: Oh, no. It was a book. I mean, we still used to get it when I was young. It was for the whole year. But they had something
    for every day in there. Yeah.
- speaker: Interviewer
  text: I'm unfamiliar with the horoscope book. That's interesting.
- speaker: Respondent
  text: Oh, yeah. They used to sell it in Little Tokyo when I was growing up. And my parents would always get one every year.
    They didn't really go by it very much, but they would look to see if it was going to be a good year or a bad year.
- speaker: Interviewer
  text: Yeah. Was your mom's family religious? Did they attend church or temple?
- speaker: Respondent
  text: I don't think her parents did. My mother and aunt went to the Buddhist Sunday School in Little Tokyo. And like, they
    belonged to - what was it called? Young Buddhist Women's Association or something like that. And they went to several
    of the California statewide
