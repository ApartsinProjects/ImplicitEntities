collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: It might take a couple of afternoons, but I would like to ask you questions about your childhood, reasons for your
    coming to the USA, your life in the US and all. Would you please begin with your name?
- speaker: Respondent
  text: My name is Wataru Ishisaka.
- speaker: Interviewer
  text: You were born in Kumamoto ken. When were you born?
- speaker: Respondent
  text: I was born in 1906. It was about the time when my father was in the Nichiro senso (Russo-Japan war). I was born in
    June, but the family had to wait until father came home, so the day I was entered into koseki (family register) was December
    20.
- speaker: Interviewer
  text: What kind of man was he?
- speaker: Respondent
  text: He was a professional military man. He came to this country in 1908. He went to war twice, and he didn't like it.
    He managed to be sent to the US to do research on shoe making. He should have continued in that line, but as you know,
    in Japan, only a certain class of people go into that work, so he didn't. The official purpose of him coming over here
    was to research shoe making, but the real reason was to bring his brother (my uncle) back to Japan. My uncle was in Tokyo,
    but he went bankrupt, so he mortgaged all his property and came to the US. My uncle never came home so my father came
    to the US when I was two years old. However, he too, got hung up here and didn't return. We, the youngest brother also
    came here to bring the two elder brothers back to Japan, but he, too, ended up staying here. He was very educated and
    could have done well in Japan, but that's the way it goes. Finally, these three brothers couldn't meet their mother's
    deathbed wish. It was such an unhappy thing. I used to hear about those things from my grandmother on my father's side,
    that we had three generation Yoshi (adopted sons) in our family, because they didn't have sons. All of the brothers, my
    father and uncles, ended up in the USA. I wanted to go to the university in Japan--Waseda University. I was ready to go
    there. Papa used to tell us that we could go to college in Japan or go abroad to school, like in England. One thing I
    asked was that I wanted to go to school to become a learned person. Well, I really wanted to come to the USA, too. I had
    a yearning for America. Meanwhile, this grandma died and my mother and us got left in Japan. My father was in Walnut Grove.
    He came home for his mother's funeral, but he didn't have any money. He had to borrow money from my mother. Well, he was
    a military man, so if he stayed in Japan, he had to go to war. I suppose that's why he stayed out of Japan. He also told
    me to go to the USA, then I didn't have to go to war. We sold everything we had and went to Nagasaki. We stayed there
    for twenty days and then, my father, mother and I, the three of us together, came to the USA. I had an older brother and
    also another brother who was born in this country. He is 19 years younger than I am.
- speaker: Interviewer
  text: You told me about a person who had influence you the most.
- speaker: Respondent
  text: Yes. He was my greatgrandpa. He did not have a son, so he made his brother like his son. But this younger brother
    was really undependable. He went abroad to Italy and England and came home with all kinds of debts. Greatgrandpa had to
    mortgage his property and send him money. This greatgrandpa was a big man, over 6 feet tall. He was an educated man and
    was able to write "fude" very well. He was a man of character. He died when I was six years old. Because of this greatgrandpa,
    Papa was able to receive a wife from the family with a good reputation. Well, I think my father's idea of avoiding war
    was the right one. Three of my cousins died during the war.
- speaker: Interviewer
  text: Do you remember what this great grandpa did?
- speaker: Respondent
  text: Yes. This greatgrandpa came from a "Ghoshi" a great farmers' family who acted as a village chief. His family tree
    goes back about 1,100 years from Iwami-no-kuni. He was in Iwami, but his tribe lost battles here and there and finally
    settled in Kumamoto. His family graves are big ones with large round stones and the names of each generation are written
    on it.
- speaker: Interviewer
  text: Was this the greatgrandpa who said that education was very important?
- speaker: Respondent
  text: Yes. It was he who said that. Well, the foundation of family life was education. This is the reason why I wanted to
    go to school and send my sons to school. I wanted to show you the letter which my father wrote before he died in Japan,
    but unfortunately, my brother had lost it. In any case, my father did go to school for 12 years, but he went into the
    hills to catch birds so he didn't remember too much. However, before he died, he sent us a letter saying that we should
    not be fooled by bad women and concentrate on education, because that is the only way to discipline ourselves and build
    up character. This was his last word. I really wanted to show that to my niece and nephews, but I wouldn't find it. My
    father said in it, that even if he died, we didn't have to go back to Japan. "Educate your children, because that's more
    important than coming back to Japan just to attend my funeral," he said. My father was a really carefree person when it
    came to money. I would like to tell you this about him. He said, "People say, 'Go to war! Go to war!' but people don't
    know what war is." The Sino-Japan war wasn't that bad, but the Russo-Japan war was really bad, since Russia was a strong
    country. The battle was very fierce. When the Japanese soldiers had nothing to protect themselves from a savage element,
    so they collected dead frozen soldiers, both Japanese and Russian, and they arranged them to lean against rifles in order
    to make walls against the wind and snow. He used to say that war is really a cruel thing. He always said that we should
    abolish war from the world. He did go to battle at Horten afterwards. He heard that soldiers from his own town died there
    as a result of a savage battle. He took 12 tin cans filled with water and rode a horse to Horten. The Russian soldiers
    and Japanese soldiers were dead and lying on top of each other. Some lost a head, some lost a leg, and all the bodies
    were damaged one way or the other. There were those who were still alive and were begging for water. If you give them
    water, then it was the end for them. They would die immediately after that. Papa said that he took from him two horses,
    but he couldn't find his friend. He gave water to everybody who wanted it, Russians as well as Japanese. Then he came
    back. It was such a savage scene.
- speaker: Interviewer
  text: My father said that he never wanted to send his sons to war. His troop was chasing Russian troops to Horten and then
    to Diren.
- speaker: Respondent
  text: He was about 250 lb, however, he weighed half as much as he did when he came back from the war. He died when he was
    81 years old.
- speaker: Interviewer
  text: How long had your father stayed in the USA?
- speaker: Respondent
  text: Well, from 1908 to 1951. He was here during the war. We didn't let him work after he reached 60 years old. He stayed
    with us. My wife used to take him all over the place. He was really happy during those days. One day he said, "You have
    settled down well. So I would like to go to Japan to die." It was in 1951. Well, he went to Japan and died in 1952.
- speaker: Interviewer
  text: How about your mother?
- speaker: Respondent
  text: She was a very strong man-like woman. Average man couldn't even if he fought against her. She was a very strong willed
    person. While my father was in the USA, she took care of 2 very active young sons, and took care of the entire farm. It
    was really man's job, but she was able to do that. When she got mad, she was really fierce, making her eyes like dishes.
    It's really funny, you know. In Japan when a person died, they used to place him in a sitting position in a square casket
    with a white dress and bury him. Well, my mother didn't like that at all. She said, "I don't like to feel cramped even
    after I die." She was such a person. She said that it would look more relaxed in an American style casket, so she liked
    that better than a Japanese casket. It's life in one of the reasons why she felt that America was better than that of
    Japan.
- speaker: Interviewer
  text: My mother went to Consulate General of America for 5 times to get visa. But they did not accept her application at
    all. (That's after Papa died.) So I got really angry. I went to see Sacramento Mayor. He said that it was really unreasonable,
    why should a mother of a citizen be refused to come to the USA. So he wrote 2 letters, did sign and send them out to the
    Consulate General of the USA in Fukuoka. Well, within 2 weeks my mother got a letter which said that she could go to America
    to join her sons. That's how she was able to come to join us again in 1953.
- speaker: Respondent
  text: You see mother went back to Japan with my father in 1951. Well, Japanese people are tradition oriented people, so
    she went there to have prayers said by Buddhist priests for her ancestors. After that and after Papa's funeral she was
    ready to come back to the USA. It was very difficult for to get my mother back to the USA.
- speaker: Interviewer
  text: When did you come to the USA?
- speaker: Respondent
  text: I was born in 1906 and came to the USA in 1923 when I was 18 years old.
- speaker: Interviewer
  text: Do you remember anything from your childhood?
- speaker: Respondent
  text: Yes. I do. We went to see "Suisenji" Temple which was created by Lord Hosokawa. It was such a pleasant memory that
    I haven't forgotten. I must have been 4 or 5. At that time Papa was already in this country.
- speaker: Interviewer
  text: When you graduated from high school, you were getting ready to go to college there, right?
- speaker: Respondent
  text: Yes. I was ready to go to Waseda University. But my father called me to the States. I was the same with my older brother
    who was going to attend Meiji University. I think it was better for me to come to the USA.
- speaker: Interviewer
  text: Your father was in the State then.
- speaker: Respondent
  text: Yes. He came here when I was 2 years old. My brother was 5 then.
- speaker: Interviewer
  text: You mean Waseda Univ. was already in existence?
- speaker: Respondent
  text: Yes. Waseda was built on 20th year of Meiji by a politician by the name of Ohkuma Shigenobu who was liberal Party
    member.
- speaker: Interviewer
  text: Do you have any painful memory from your childhood?
- speaker: Respondent
  text: No. I'm not bragging, but we were lacking none when we were small. So I don't remember anything of those bad memories.
    First of all we had lots of property. Secondly, Papa used to send money to us. We were rather raised as a rich man's sons.
    So we didn't have to go through much suffering economically. However, I was such a rascal. I was a champion fighter. Though
    I might look very weak now, there was no one who can beat me up in Sumo wrestling. During my high school period no one
    could beat me in Sumo wrestling and also in street fighting. My parents were summoned by principals many times because
    of my conduct. Here, I was cut here once by a knife. I never used a knife but you see we were supposed to carry a thin
    Japanese towel, as a student. I always carried sand wrapped around the towel. When a situation got dangerous, I took it
    out and hit them with that. It was a very good weapon. Even a Judo players could be struck down by it. You know there
    were some sufferings, too, come to think of it. Well, studying for example was very difficult and was quite suffering.
    It was a quite ordeal.
- speaker: Interviewer
  text: At that time high school was 5 years (after 6 years of elementary school) wasn't it?
- speaker: Respondent
  text: Yes. I guess street fighting was very exciting to me. We used to go to boys high school. Girls went to girls' high
    schools. It was OK when we walked together with other boys. But sometimes when I was walking by myself, those girls surrounded
    me and embarrassed me. I couldn't hit them, yet I couldn't run, since I got surrounded. I was very embarrassed and was
    mad, but I couldn't do a thing about it. Those girls held each other's hands and they wouldn't let me pass the street.
    I couldn't go through the human barriers. I walked backward, blushing all over the place. They really like to tease boys,
    when they got a chance. I was very young high school boy. They were also in high school, but they were sexually awakened
    earlier than boys. So they liked to do things like that. Well, me acting in a way very interesting.
- speaker: Interviewer
  text: At that time there were many high schools in the area. I liked English, but Chinese was very difficult for me. I felt
    why should I study things like that. I was also very aggravated by the presence of military officers on campus. They were
    a master Sergeant and a first lieutenant who drilled us once a week. I really hated this because they didn't know a thing
    about the world. Yet, they behaved like they were on top of the world. Before we began a drill, they would examine our
    grooming and our pockets (for cigarettes and other illegal things). I thought they should not be on campus, because a
    campus should be manned free of those oppressive figures. They would teach us gymnastics. I was very good at that, particularly
    a high bar. Well, a master Sergeant was a middle aged man. I guess he wanted to show off his skill. So he got up on the
    high bar, however, unfortunately he wasn't good, and he fell off. So I started to laugh.
- speaker: Respondent
  text: Then everybody started laughing. So this Master Sergeant got really mad at me.
- speaker: Interviewer
  text: Was he mad?
- speaker: Respondent
  text: Did he beat you?
- speaker: Interviewer
  text: No. If he did, then I would fight back. But he was really mad. I was expelled from school for 3 days. The hardest
    thing was the drill which we were put through with real soldiers during Sino-Japan war. Guns of that last era was very
