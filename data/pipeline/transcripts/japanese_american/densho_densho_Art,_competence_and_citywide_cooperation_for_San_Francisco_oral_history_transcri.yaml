turns:
- speaker: Interviewer
  text: Can you tell me about your early life and family background?
- speaker: Respondent
  text: I was born in Norwalk, California, in 1926. My family came from Japan, and we lived on a farm in California. My parents
    were Buddhists, but we also attended a Quaker church in Whittier. Growing up, I was involved in truck farming and learned
    a lot about hard work and community.
- speaker: Interviewer
  text: What was your experience like in school and learning English?
- speaker: Respondent
  text: School was challenging at first because I had to learn English. I remember playing on the playground and trying to
    fit in. I was interested in art and music, and I had some wonderful teachers who encouraged me. It was a mix of learning
    language and culture, which shaped who I became.
- speaker: Interviewer
  text: How did World War II affect you and your family?
- speaker: Respondent
  text: It was a difficult time. My father was interned, and our family was sent from Santa Anita to Arkansas. We had to adjust
    from farm life to living in a camp. Later, I went to Milwaukee State Teachers College, and I heard about Black Mountain
    College, which inspired me to visit Mexico and explore art further.
- speaker: Interviewer
  text: Can you describe your development as an artist, especially your wire sculptures?
- speaker: Respondent
  text: I started working at home, crocheting wire to create sculptures. It was a way to try out design and express myself.
    I decided to remain at home to raise my children but continued to take commissions, which was a sacrifice but also fulfilling.
    My wire sculptures evolved over time, and I became curious about materials and design relationships.
- speaker: Interviewer
  text: What role did you play in art education and community projects in San Francisco?
- speaker: Respondent
  text: I worked closely with schools, parents, teachers, and administrators to bring art into the community. We created murals,
    mosaics, and gardens, involving children and adults alike. I helped organize art festivals and workshops, emphasizing
    self-reliance and learning what is important. It was about combining skills and sharing techniques to enrich the community.
- speaker: Interviewer
  text: How did you contribute to public art commissions and support for artists?
- speaker: Respondent
  text: I served on various art commissions, including the San Francisco Art Commission and advisory panels for the California
    Arts Commission. I advocated for public support for artists and helped integrate art into government and public life.
    We worked on projects like the Hyatt Fountain and promoted the Two Percent for Art program to fund public artworks.
- speaker: Interviewer
  text: What is your personal philosophy regarding art and productivity?
- speaker: Respondent
  text: I believe in the need to be productive and to use time wisely because time not spent on art can be the artist's enemy.
    I think personal responsibility and stacking multiple benefits in projects are important. Skilled people bringing change
    and educating teachers are hopeful signs for the future of art and community.
- speaker: Interviewer
  text: Can you share your thoughts on working with children and community in art projects?
- speaker: Respondent
  text: Working with children and the community is essential. I have led many groups in creating art together, which builds
    a sense of purpose and belonging. Whether through dough figures, murals, or gardening, these activities help people express
    themselves and connect with others. It's about liberation and learning through collaboration.
- speaker: Interviewer
  text: How do you balance your roles as an artist, mother, and community leader?
- speaker: Respondent
  text: It has been a challenge but also a joy. I chose to keep my own house and share in raising my children while continuing
    my art. I integrate my art into daily life and community activities. Being a natural leader, I also question my decisions
    and choices, but I find satisfaction in contributing to both family and society through art.
