collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Can you describe how grandma and grandpa met?
- speaker: Respondent
  text: In Loomis where Grandpa was born, they were trying to arrange for him to get married and to work on a fruit farm.
    He didn't want to farm, so he fled to San Francisco. He was attending adult night school where he met my mom. She was
    only 17 years old and he was ten years older and seven or eight months after they met, they got married in May 1934. That
    age gap was very prominent in the Japanese community.
- speaker: Interviewer
  text: Do you think there was love in their marriage?
- speaker: Respondent
  text: There was never any holding hands or talking. I'd see my mom cry occasionally, before the war. My mom wasn't that
    literate or educated but I didn't see any kind of sweet tenderness. I didn't want my relationship with a woman that way
    when I grew up. I used to get examples of how men treat ladies by watching movies.
- speaker: Interviewer
  text: Was it just a convenience for them to be married?
- speaker: Respondent
  text: I guess my dad proposed to my mom and instead of being all alone, with only her sister in San Francisco, she said
    yes. But my mom's sister objected to him. She did not like him, so there was a friction there.
- speaker: Interviewer
  text: Do you remember a typical day before the war in San Francisco?
- speaker: Respondent
  text: They were both working cleaning people's homes. But they were taking turns and had to find someone to sit for me so
    there was an elderly Japanese man half a block down, who had a shoe repair shop and so he had this rotating handle where
    you would cut with a blade the leather. So there were lots of chunks of leather leftover and I would play with that. The
    last place on Baker Street I kind of remember, and I almost got hit by a car. Across the street the whole block was demolished
    for some reason. All the homes were gone, but there was an open area. My dad I think got a kite and so with some neighborhood
    kids we were flying it above that lot. And I was all excited and I remember I went inside to retrieve something and then
    when I came out, I wasn't paying attention to the cars crossing but a car came from my right. I didn't look but the guy
    honked his horn and stopped. But I came that close to being hit and then my dad had a fit. They were also trying to enroll
    me into a Catholic school and there were nuns, and it scared the heck out of me. And you know they're smiling and all
    that and my mom is doing the best she can to enroll me, I remember. And I wouldn't go into the school grounds because
    I was afraid. She was going to leave me but I was yelling. I started to run halfway down the street, I just had this terrible
    fear of these Catholic nuns because of the way they dressed. So as it turned out maybe it was a good thing. I never asked
    why they tried enroll me. I was attending kindergarten and that was the extent of my English learning, then the war broke
    out. I do recall playing [Japanese] '78 records all the time so that's where I have memories of these Japanese songs before
    the war. There were military songs, so I could hum those easily.
- speaker: Interviewer
  text: Do you remember the day Pearl Harbor happened?
- speaker: Respondent
  text: I got some hint that there was a war in progress and that it involved Japan. That's where I became aware of my Japanese
    heritage. I know they were talking and I would hear conversations with my dad's acquaintances and from their body language,
    it was serious what was in store for them. And obviously years later I remembered it had to be that anti-Japanese feeling.
    I remember waiting in line, and then I knew something was going on. It was ominous. Years later, I didn't know the reason
    for my exile but it sobered me up quickly the day we arrived at Tanforan. The distinct military people on one side and
    the other people registration. We had these tags dangling, it looked like it was for postal delivery. Even a kid could
    ascertain, 'What were we doing in this line?' Everything was painstakingly slow. I think I told you when I went to go
    take a Chinese girl out on a date in high school, her mother wouldn't let her go out. I go to the house and the girl says,
    'You're Japanese.' And I just say, "Yeah, I am. And you're Chinese." And she says, 'I'm sorry, my mom won't let me go
    out with you.' Even that, it goes back to the time when Japan was invading China.
- speaker: Interviewer
  text: Was there anything else that made you aware something bad was happening?
- speaker: Respondent
  text: One day all the Boys' Day dolls were out. I came home after we were set to go to camp and the house was already bare.
    And there was this nice white lady talking to my mother and she was about to give all of my dolls away. And I was screaming
    like mad. My mom and her laughed, and she said, "Well I guess that's okay." I just had a fit, I put my arms out and said,
    'No!' Then it was wrapped in paper, and we left some of our few belongings in a garage somewhere. I don't know who, but
    it was someone in San Francisco. Obviously it couldn't have been a Japanese family. There was also a curfew in effect,
    I don't think you could be out in the streets at some ridiculous time, like 6:30 at night. There was a map of shaded areas
    that were restricted to the Japanese. He was in the wrong area. But how could you tell? You live there and I could see
    my dad being ignorant of that fact. I know that because he re-told that story, never to me. And then my mom used to say
    that we weren't rich but he was spending money on cameras, and it was taken away.
- speaker: Interviewer
  text: What about the day you left for the assembly center?
- speaker: Respondent
  text: All I remember was waiting at the train station on one side of a line and that these guys were holding guns. They
    weren't pointing them at us, but what were we going to do? They didn't even have to carry it. Why are we standing over
    here with name tags? They weren't abusing us but it was still cruel, of course. Herding us into the middle of nowhere.
- speaker: Interviewer
  text: What are your most vivid memories at Santa Anita?
- speaker: Respondent
  text: There were all these insects flying around. There was a horse fly. They were huge, like the size of a dragonfly. The
    first purchase my parents got at Santa Anita was a mosquito net to cover my bed. The showers were hard to get used to.
    We used those individual stalls for washing down the horses. So the nozzle was really wide, maybe a foot across and you
    had to pull this chain. My mother would lather me up and pull the chain and the water would come down. It was like being
    drenched by a bucket, so that kind of frightened me as a little kid. And this is funny, well not funny. But army trucks
    would pull up and someone would shout, 'How many in your family?' And they would just throw the toilet paper at you and
    you had to go pick it up. That lack of human dignity, it just went on and on. I didn't comprehend what crime we were being
    accused of. But then I realized we must've done something, like why am I here? So that part of going into the barracks,
    it's funny but after the stables in Santa Anita, it was like checking into the Fairmont Hotel at Topaz. As primitive as
    it was. When we first moved in, there were pinewood boards on the floor but they had a separation. You could see the ground.
    Inside every room was a potbelly stove but there were cracks between the boards. So when the dust storms came, it would
    just come up into the room. We were given linoleum to cover the floors but it didn't really help. There was a lot of white
    chalk there, and I heard it was alkaline or something. Something that's unhealthy. So when the wind blew strongly, it
    would just whirl around the whole camp. And if we were stranded somewhere and blocks away from our home, we would have
    to hide and wait for the dust storm to subside.
- speaker: Interviewer
  text: Since you were alone with grandma, what do you remember about moving from Topaz to Tule Lake?
- speaker: Respondent
  text: It was just solemn and grim. No one was happy, we had to keep the shades closed all the time. The train would stop
    and stall constantly so we would peek constantly under the shades. But I remember seeing telephone poles that were tilting
    to one side. At Tule Lake all the kids were running around unsupervised. But she did start working at the mess hall.
- speaker: Interviewer
  text: How about Tule Lake?
- speaker: Respondent
  text: Even when it was dinner time and we were waiting, there would be searchlights going around. Just like a concentration
    camp, these floodlights would be going all around the camp or sometimes they would lock in on a window. So there wasn't
    privacy. Sometimes late at night I would go to the toilet and you had to walk in the middle part of the block. And sometimes
    a searchlight would come on from the perimeter and just follow you. So just like a prisoner, they were watching you with
    these floodlights. And the people who were the dependents of the guards lived on the other side of the camp, we would
    see Caucasian kids playing. The biggest treat in those four years was that went with my mom to see their living quarters.
    Our friend Suzy Sakamoto was cleaning their houses and she gave us some See's candy. There were couches, it was nice.
- speaker: Interviewer
  text: What were Grandma and Grandpa doing?
- speaker: Respondent
  text: Grandma worked in the mess hall. But that was the problem. Since the administration were hakujins, you had to speak
    English in order to get a job. So that was the reason all these Kibei [second generation Americans educated in Japan]
    didn't have anything to do. They sat around. After a while, you're bound to get radical, and if you have all of your education
    in Japan, it's ingrained. In the beginning, Japan was pretty aggressive. For a while it looked like they would be a threat
    to the U.S. But Grandpa was extremely angry. He thought the treatment was terribly unfair. And so he'd talk about it in
    Japanese, the court procedure of the U.S. law. It wasn't even practiced at all. They used the word "relocate." But Tule
    Lake was a very violent place. Fighting, ganging up on people.
- speaker: Interviewer
  text: Do you think that the lack of parenting and upheaval affected everyone or just your parents?
- speaker: Respondent
  text: Everyone, definitely. If anything my dad was on my butt quite a bit compared to the other fathers. Maybe because I
    was the only son. All of my friends had a lot of brothers and sisters. But the children were the victims of this. And
    that was because fathers of a family behaved like they weren't the head of a family. Not having that regimented work schedule;
    they weren't doing anything. Sure they're being fed three times a day, not doing anything. So they had forgotten they
    were the father figure. They would just sit and dine with their friends and didn't really care about their children and
    look to see they were eating properly.
- speaker: Interviewer
  text: What do you remember seeing?
- speaker: Respondent
  text: I was impressionable, and I was observing adults with nothing to do, it must've been all that kind of hopelessness.
    The men were just doing what they felt. So the propensity of gambling among Japanese was prevalent and they had a casino-like
    atmosphere. And if you enjoyed drinking, well, they needed something to stimulate them, I guess. So they made this sake
    but it would make them very sick and they would throw up. You could hear them coming home in the middle of the night.
- speaker: Interviewer
  text: But there was only a problem between people who were divided along the two ideologies, right?
- speaker: Respondent
  text: Yeah. And you knew where they were from if you got into an argument, pro or con Japanese. There's nowhere else to
    go, everyone lives in the same type of barrack, so you're marked. There's no security and so people were bursting in and
    people were beating up the guy or the husband. I heard that going around. And my dad, I think, was involved and that was
    the reason he was taken away from Topaz. I saw him get handcuffed and taken away as I was coming home from school. He
    looked at me but didn't even acknowledge. And my mom was just hysterical, just crying like mad. It was just my mom and
    I who went to Tule Lake in Block 49 and he went to Leupp.
- speaker: Interviewer
  text: One day he came home and was released. He got into the same mode, teaching Japanese in high school. But there was
    an argument in the next block, with a crowd forming of people yelling at each other. I remember my dad going out there,
    too. He was relatively tall back then compared to other Japanese so he stood out. So, was he going around beating people
    up?
- speaker: Respondent
  text: That part I can't confirm. But I know he was considered dangerous according to an FBI report. But he never joined
    that Hoshidan group. He had a 2x4 and the length was over six feet but he tapered it to make it narrower like a handle,
    like a baseball bat. And on the other end he had two spikes, nails in there. So if he was being targeted to be beaten
    up, he was taking that with him to the bathroom. He was carrying it in the middle of the night. If he was deemed a dog,
    or enemy or a spy, he might have been in fear for his life. And with his kendo experience he might have been formidable
    if he had to use it.
- speaker: Interviewer
  text: So then from Tule Lake, maybe a year went by after he came home, and here again I came around the corner and he was
    taken away. So I watched him twice being handcuffed. And this time he was taken to Leupp, Arizona. Years later they would
    advertise getting this group together and write it in hiragana and katakana. It would be at a Chinese restaurant or somewhere
    in Japantown. Maybe at some point, it became a badge of honor for them.
- speaker: Respondent
  text: They're fighting their own war in their mind. No one in Japan cares a hoot about what they're doing for Japan, or
    if they were. It's not psychoanalyzing them but maybe it was the only
