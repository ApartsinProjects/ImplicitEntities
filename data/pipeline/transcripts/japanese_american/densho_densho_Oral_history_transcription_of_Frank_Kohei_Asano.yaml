collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: My impression of America was that it was a huge country and everything was very convenient. People seemed wealthy.
    I was delighted. Hakujins were very friendly. My friend owned a restaurant so I helped him. I thought the Caucasians treated
    me with kindness. My main problem was not being able to speak the language and to communicate freely. The only incident
    that I recall is when I was traveling to Los Angeles from San Francisco, the children called me "Jap," which kind of upset
    me.
- speaker: Respondent
  text: In Japan, my wife and I belonged to the same church. She was the minister's daughter. We were married in San Francisco
    Reformed Church. I have no interesting stories to relate about picture brides. I did not experience any homesickness nor
    any hardship. I had many American friends at the church so I can't recall any discriminatory acts, but I do remember the
    time when a barber refused to cut my hair.
- speaker: Respondent
  text: I learned English in Japan and when I came to America I attended night school which was sponsored by the church. After
    several years, I received about $20 to $30 a month in some places with room and board. I purchased 20 acres of land which
    was planted with grapes in 1920 - $300 an acre and ten years to pay - from an American farmer who was moving out of state.
    I bought it in my daughter's name. No organizations helped me. Since there was no need for their assistance, I did not
    ask for any.
- speaker: Respondent
  text: I did not have any particular kind of hobby or entertainment that I enjoyed. The problem I had in rearing our children
    was more or less financial, and I wanted to give my children the benefit of higher education. I am very thankful now that
    my children are educated and have their own families and are doing well. I did not send the children back to Japan, but
    upon learning that my wife's mother was gravely ill, my wife and three children went to Japan to see her and they stayed
    three years.
- speaker: Respondent
  text: Since I lived on a farm in the country I did not make any contribution or service during World War I but I purchased
    bonds as much as I can and prayed for peace. I only heard rumors about segregated schools. When I was about ten years
    old, a lady missionary treated me with much kindness and I learned about Christianity from her.
- speaker: Respondent
  text: During the Depression, I had to close my art goods shop which I owned in Chinatown, San Francisco. After marriage,
    I decided to stay permanently in America.
- speaker: Respondent
  text: The attitude of the Americans was no different - it was the same as usual. I thought it was against the Japanese Bushido
    spirit. As a Japanese, I was ashamed. I thought it was a cowardly act. At that time, I was a member of the office staff
    at the Japanese American newspaper so I knew about it. I was prepared for the eventual relocation of all Japanese so I
    was not too surprised. I sold all my furniture very cheaply and followed the government's order. My American friends were
    very sympathetic, and so were the members of the American churches.
- speaker: Respondent
  text: My eldest daughter was 23 years old, my eldest son 21 years old, my next daughter 19 years old and my youngest son
    9 years old.
- speaker: Respondent
  text: We were taken to Tanforan, a former race track which was located about ten miles south of San Francisco. When we arrived
    everything was incomplete and left much to be desired. Food was very poor. It was in a state of confusion and no form
    of civil government. In early October, we moved from Tanforan Assembly Center to Topaz Relocation Center in Utah.
- speaker: Respondent
  text: In Topaz, our pastor, S. F. Methodist Church, Rev. Taro Goto, was assaulted one night because some people thought
    he was a spy. Professor Chiura Obata was also attacked and public feelings were high. Niseis are American born citizens
    so it is natural that they should be faithful to America. My eldest son, Paul, with my consent, was among the first to
    volunteer for the army.
- speaker: Respondent
  text: From the first we were resigned to the fact that we would be considered as an enemy and was not particularly surprised
    that we were put into concentration camp.
- speaker: Respondent
  text: In relocation camp, we enjoyed freedom of religion so the churches were opened and services held. That to me, as a
    Christian, was a comfort and joy. I am working on a farming project. In true American way, we had religious freedom, church
    life was more earnest than when we were outside. Fortunately, schools opened and the children were assured education so
    we were grateful for that.
- speaker: Respondent
  text: Since there were no connections with the outside world, no worry about money or shelter, we regained our presence
    of mind and had opportunity for reflection, for religion, for study. These were valuable and meaningful for me. My faith
    did not change but it became more heightened and I was able to pray more earnestly.
- speaker: Respondent
  text: We left Topaz Relocation Center around the middle of October 1945, when the evacuation order was rescinded and we
    were free to relocate any place we chose. I went to Salt Lake City to look for work, and learned about a rental of five
    acres of land in nearby Sandy, of course to make a living for myself and wife and to farm. We tried mink farming and on
    the side grew vegetables. We transferred our membership from S. F. Methodist Church to the S. L. Church of Christ.
- speaker: Respondent
  text: Since Salt Lake City is the headquarters for the Mormon religion, people generally are friendly and there was no discrimination.
    To give my children the benefit of higher education was my aim. Two years later through Rev T. Ota's recommendation, we
    moved to Bountiful.
- speaker: Respondent
  text: And I worked as a grower for XK Lund Florist. I worked full time until I was 65 years old and for five years I worked
    half a day and the other half a day I grew flowers on my own. There was no distressing experience. The Japanese church
    in Salt Lake City welcomed new members and helped us in many ways.
- speaker: Respondent
  text: As a Christian, my hope is that the kingdom of God will come on earth and that there will be peace on earth.
