collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in May, 1902.
- speaker: Interviewer
  text: What kind of family were you from?
- speaker: Respondent
  text: It was a farming family. My brother came to America in 1915 when my father summoned him, so I was thinking about coming
    to America. In those days our family was growing citrus fruits and were exporting them to Manchuria, so I was thinking
    about going there, too. My brother wanted me to come to America so that we could be partners, but in those days a brother
    could not summon another brother. Therefore my brother summoned his mother first, and 6 months later mother summoned me
    to America.
- speaker: Interviewer
  text: Were you 19 years old when you came?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: I would like to ask you about the period before you came to America. What about your schooling?
- speaker: Respondent
  text: I attended the primary school for 8 years. The high school was 5 years, but I quit after 3 years to come to America.
- speaker: Interviewer
  text: Do you have any memories of your schooldays?
- speaker: Respondent
  text: I don't have any special memories. I liked sports. In those days kendo (swordsmanship) was popular, so I learned it.
    I also liked sumo. Thinking back, memories of my classmates who studied side by side come back to my mind. When we grow
    old that kind of thing becomes fond memories.
- speaker: Interviewer
  text: What kind of parents did you have?
- speaker: Respondent
  text: My great grandfather was a samurai, and he went to war of 1879. I remember fairly that he had a scratch on his head.
    Later, my father started a business, but as he was an ex-Samurai he was not good at business. When I was 2 years old my
    father came to America. My mother brought 2 boys and an older sister up by herself. The year my sister graduated from
    high school my father summoned her. It was 1915, the year of the Panama Exposition in San Francisco.
- speaker: Interviewer
  text: Do you remember the Sino-Japanese War or the Russo-Japanese War?
- speaker: Respondent
  text: I don't remember directly. I only learned about the wars from my teachers when I started going to school.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: The family religion was Buddhism. While my mother was bringing up often children all alone my sister was weak and
    became seriously ill. She did not know which religion to believe as people said this or that god was responsive to a person's
    prayer, but an ardent she finally became a believer in Tenrikyo. In those days she did not have any worries in making
    a living, but she had worried about the children.
- speaker: Interviewer
  text: As it was 1921, there were still some picture brides, weren't there?
- speaker: Respondent
  text: The picture marriage was prohibited after 1924, so they could still come then.
- speaker: Interviewer
  text: Were there many picture brides on board the ship?
- speaker: Respondent
  text: Yes, there were. As the picture marriage was going to be prohibited after 1927, people told me to get married and
    bring the wife with me. I was summoned by my mother to get education, and I was still young, so I did not have any intention
    of getting married then.
- speaker: Interviewer
  text: Do you have recollections of the life on board the ship?
- speaker: Respondent
  text: I did not know anybody when the ship left Kobe. There were many men who went back to Japan to take wives. They called
    me 'young man' and took good care of me.
- speaker: Interviewer
  text: Were there any incidents on board the ship?
- speaker: Respondent
  text: No, I don't think anything particular happened on board the ship. During 21 days of voyage, I think I stayed up only
    about 10 days. The ship hit the storm, and even the crew got seasick, and we did not eat for about 3 days. I heard that
    flying fish would come up on the deck, so even when I was not feeling well I went on the deck to catch flying fish as
    I liked fishing. It was a rough voyage.
- speaker: Interviewer
  text: What kind of a country did you think America was before you came here?
- speaker: Respondent
  text: I had heard about America from men who went to America from our village and came home in glory. On top of that my
    mother and brother were in America, so I came here without any worries.
- speaker: Interviewer
  text: What is your present religion?
- speaker: Respondent
  text: My mother summoned me, but she wanted to go back to Japan. When she received a letter from her only daughter who was
    married then telling mother that she had not been well since she gave birth to a baby, mother wanted to go back to Japan
    at once and take care of her daughter, so she went back to Japan. When she left America she told us that as there was
    no Tenrikyo in Northern California, we had better become Christians as America was a Christian country. My wife had been
    going to Methodist church ever since she was young. At the time we were going to get married I was still a Buddhist, but
    as it was my mother's wish we decided to get married in a Christian church. Then a minister baptized me and I became a
    Christian.
- speaker: Interviewer
  text: Do you remember the name of the ship on which you came to America?
- speaker: Respondent
  text: It was a small ship named Nihon Maru. It was the last voyage for that ship from Japan. In Japan they say that the
    sea is roughest in February and August. I left Kobe on 3rd or 4th of March, went to Kobe and stayed there for a day. Then
    we continued the voyage. We arrived in San Francisco at night of March 30, and landed on March 31. It took almost a month.
- speaker: Interviewer
  text: Did you say it was in 1921?
- speaker: Respondent
  text: Yes, it was. It was the last voyage for Nihon Maru.
- speaker: Interviewer
  text: What kind of people were on board the ship? Were there anybody you knew?
- speaker: Respondent
  text: No, there wasn't.
- speaker: Interviewer
  text: Did you learn about America through your brother's letters?
- speaker: Interviewer
  text: It wasn't a reckless act to come to America from Wakayama Prefecture in those days, wasn't it?
- speaker: Respondent
  text: No, it wasn't, as many people came to America from Wakayama Prefecture. I had been dreaming about living in a stately
    brick house when we landed in San Francisco. We got on board a train from San Francisco to Fresno. As the train went southward,
    I asked my sister if the house we were going to live was like this or like that, but she did not give me a definite answer.
    In those days even Americans in the country lived in humble cottages you cannot imagine now, without electricity but only
    lamps. That was the kind of house we were settled.
- speaker: Interviewer
  text: Was it like a barn?
- speaker: Respondent
  text: At grape harvesting season the number of workers increase, so I have lived in such a place. When I lied down on the
    bed I could see the stars. Unlike Japanese houses, the roof was made of thin board, and after being exposed to wind and
    rain for many years there were spaces between the boards. Large or small we had our own houses in Japan. For about 2 years
    I did not feel comfortable, and sometimes I thought I would be better off if I went back to Japan. Even a man like me
    felt that way, so it is natural that picture brides had problems when they got there. They received pictures of their
    taken husbands-to-be in nice suits in front of their landlords' nice homes, and did not know anything besides what they
    saw in the pictures.
- speaker: Interviewer
  text: Did you have any trouble at the Immigration office?
- speaker: Respondent
  text: I came with a passport of a non-immigrant, so everything went smoothly. I was lucky in that respect.
- speaker: Interviewer
  text: Did you go straight to Fresno after staying in San Francisco 3 to 4 days?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Who else were there in Fresno? Was your father there, too?
- speaker: Respondent
  text: No, father was dead by then. As father died and my brother could not summon me, he summoned mother, and mother summoned
    me.
- speaker: Interviewer
  text: Did you have one older brother?
- speaker: Interviewer
  text: Was your mother living there when you went there?
- speaker: Respondent
  text: Yes, she was. She was there only one year before she went back to Japan.
- speaker: Interviewer
  text: How was the language when you first got there?
- speaker: Respondent
  text: I could get along with my broken English. The farm work is not very hard once I learned how to do it. I remember we
    pruned grape in winter. The foreman taught me which branches to cut. Other men were older. Isseis in those days were between
    40 to 50 years old, but as I was only 19, they looked old to me. When I cut the branches, the foreman came and told me
    that I had cut some good branches. Something like pruning takes skill and experience.
- speaker: Interviewer
  text: Did you work with Isseis?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Was the foreman a white man?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: How was the life of Japanese farm laborers in those days?
- speaker: Respondent
  text: Some people lived in camps, where they had Japanese cooks who prepared meals for them. In those days there were some
    Japanese food such as dried mushrooms and kanpyo (dried gourd shavings).
- speaker: Interviewer
  text: Do you have any happy or sad memories of those days?
- speaker: Respondent
  text: When I was 17 or 18 years old in Japan I was a cunaene school and was not doing anything else much except helping
    with the housework during the vacation, so it was hard work for me to work from morning till night. After about two years
    I got used to the work and thought I could stand it. I was paid by the hour.
- speaker: Interviewer
  text: How much were you paid?
- speaker: Respondent
  text: When I came here in 1921 the wage was 45 to 50 cents an hour, so I earned $4.50 to $5 working 10 hours. Then the Depression
    came, and at its lowest point around 1929 to 1932 it came down to 15 cents an hour. Of course the cost of living was cheap,
    too, in those days. By that time I was independent, and had a farm of my own, so I was lucky. I could hire laborers cheap,
    but the produce was cheap, too. It was quite easy for me to manage.
- speaker: Interviewer
  text: Did you do any other work besides grape?
- speaker: Respondent
  text: Once my wife and I managed an apartment in Fresno city besides farming. I mainly produced grape and fruits, but I
    also grew melon. Some years I had much profit, and other years I did not make any money.
- speaker: Interviewer
  text: Did you lease the land for farming?
- speaker: Respondent
  text: Yes, I did, but it was very inconvenient. In those days the anti-Japanese land act was in effect, and naturalized
    aliens could not own or lease land. As my wife had American citizenship we used her name, but before I got married I used
    the name of a Hawaiian who acquired American citizenship by fighting in World War II. Some white people who did not like
    Japanese frowned upon when Japanese tried to lease land, but on the other hand there were some white people who were very
    kind to Japanese.
- speaker: Interviewer
  text: What kind of organizations were there that helped Japanese in those days?
- speaker: Respondent
  text: Japanese Association was the one and only political organization. Whenever there was any trouble between Japanese
    and Americans they took the trouble of mediating.
- speaker: Interviewer
  text: Was it just in Central California?
- speaker: Respondent
  text: Each area had its own Japanese Association, and there was the Federation of all Japanese Associations on top of them.
- speaker: Interviewer
  text: Were there associations of people from different prefectures?
- speaker: Respondent
  text: There were prefectural associations under Japanese Association. In Central California there were many people from
    Hiroshima Prefecture, and they organized Hiroshima Kenjin-Kai and were doing well, so I organized the Wakayama Kenjin-Kai.
    When the World War II broke out and we were evacuated it became extinct. When we came home after the war we were so busy
    with rebuilding our lives that we did not have time to organize the Kenjin-Kai. Moreover, counties and cities did not
    like Japanese to establish such organizations in those days. It is not like that now.
- speaker: Interviewer
  text: Didn't you get any help from churches?
- speaker: Respondent
  text: They were kind to us when we evacuated. Especially the opinions of religious organizations were regarded quite seriously.
    At that time I felt thankful that I belonged to a Christian church. At first we were put in a makeshift assembly center
    in Fresno. We were allowed to take only a limited amount of belongings, so I went there with nothing but the clothes I
    was wearing. We were taken there by a bus from Selma. The ladies group from the white churches served refreshments and
    comforted us. When I think back about that time my heart is filled with deep emotion.
- speaker: Interviewer
  text: Did you get married before the war or after the war?
- speaker: Respondent
  text: It was before the war. We were married in 1932, at the bottom of the Depression.
- speaker: Interviewer
  text: How were the lives of Japanese around here during the Depression?
- speaker: Respondent
  text: I leased the land and managed a farm. In those days you could not make the ends meet if you owned the land. People
    who did not own land were better off. If you do not invest money into tools, and using the landlord's tools provide only
    the labor, you get some income. But if you manage your own farm, you have to make payments on land, and you might get
    in red when you shipped fruits. In those days many people had Bank Of America reclaim the land as they could not make
    payments.
- speaker: Interviewer
  text: Were there any people who found it hard to make their living?
- speaker: Respondent
  text: There may have been some, but in those days Japanese helped each other. Nowadays if you want to start a business and
    need the money, you can borrow it from banks if you have some security, but in those days Japanese did not have any fixed
    property, so the banks did not lend them any money. Therefore, people lend money among friends and helped each other.
    In those days people helped each other in such warmhearted way that is unbelievable nowadays.
- speaker: Interviewer
  text: Do you know of any story of Japanese helping each other?
- speaker: Respondent
  text: In those days some people around Dinuba planted string beans, tomato and cucumber in winter and harvested them in
    early spring. They took the crop to markets and made good profit. It took about $300 to grow an acre of those produce,
    and $3,000 for 10 acres, but it was hard to collect that much money, so 4 to 5 people put out some money each month to
    help. One year we made a big profit, but on the other hand we lost money some years. There were countless times we tided
    over difficult situations.
- speaker: Interviewer
  text: We farmers know anything but farming. I always thought it would be better if farmers take their produce directly to
    the market instead of having the brokers handle the produce. What did you do?
- speaker: Respondent
  text: I bought two trucks and went into trucking business once. I packed the table grape I produced and took them to the
    market in San Francisco and Oakland. That was before I got married. I think it was around 1925 or 26. The market in San
    Francisco opened around 1 or 2 A.M., so I used to leave here around 10 o'clock the night before. One night my truck broke
    down in Turlock. The axle of the truck was broken, so I pulled on the roadside. It was around 11 P.M. and no garage was
    open, so I thought I had to spend the night there. I put red lanterns in front and back of the truck and was waiting for
