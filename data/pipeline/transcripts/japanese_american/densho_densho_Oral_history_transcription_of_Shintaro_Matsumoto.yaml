collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name first.
- speaker: Respondent
  text: My Japanese name is Shintaro Matsumoto.
- speaker: Interviewer
  text: Do you have an American name?
- speaker: Respondent
  text: My American name is Frank.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on January 25, 1899.
- speaker: Interviewer
  text: Are you 78 years old now?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Hiroshima Prefecture.
- speaker: Interviewer
  text: What kind of a family are you from?
- speaker: Respondent
  text: It was a farm household.
- speaker: Interviewer
  text: Was it a big farm?
- speaker: Respondent
  text: No, it was a small farm. My father was in America, so I was brought up by my grandmother.
- speaker: Interviewer
  text: Were both your parents in America?
- speaker: Respondent
  text: My mother died when I was little, and I came here when I was 13 years and 9 months old summoned by my father.
- speaker: Interviewer
  text: Were you raised by your grandparents when you were little?
- speaker: Respondent
  text: My grandfather was not alive, just grandmother was. She died when I was about 10 years old, so I was brought up by
    my aunt until I came to America.
- speaker: Interviewer
  text: How old were you when your father came to America?
- speaker: Respondent
  text: He went to Hawaii when I was about 2 years old, and came to America from Hawaii.
- speaker: Interviewer
  text: Then you didn't remember him, did you?
- speaker: Respondent
  text: No, I didn't remember him at all.
- speaker: Interviewer
  text: What do you remember about your childhood days with your grandmother?
- speaker: Respondent
  text: I don't remember much, but I lived happily until my grandmother passed away. I went to school.
- speaker: Interviewer
  text: Weren't you lonely?
- speaker: Respondent
  text: I was used to that kind of life so I didn't feel particularly lonely, but after grandmother died I had a hard time.
- speaker: Interviewer
  text: Were you afraid of giving trouble?
- speaker: Respondent
  text: Yes, as my aunt had about 3 children of her own. She made me help farming and help around the house after school.
- speaker: Interviewer
  text: How much schooling did you have?
- speaker: Respondent
  text: I was in the second year of junior high school when Emperor Meiji died. That year my passport was issued, and I came
    to America. That was 1913.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: Yes, I liked school.
- speaker: Interviewer
  text: What do you remember about your schooldays?
- speaker: Respondent
  text: I liked school, but it was far from home, about 13 ri, so it took much time to walk to school and back.
- speaker: Interviewer
  text: Do you remember about your friends?
- speaker: Respondent
  text: I remember a schoolmate. I met him when I went back to Japan twice.
- speaker: Interviewer
  text: Did your parents send money to your grandmother?
- speaker: Respondent
  text: Yes, my father sent money for us to live on.
- speaker: Interviewer
  text: Were you the only child?
- speaker: Respondent
  text: I had a sister a year younger than I, but she was brought up in another family.
- speaker: Interviewer
  text: Did you meet your sister while you were in Japan?
- speaker: Respondent
  text: I met her once or twice.
- speaker: Interviewer
  text: Did your mother die here or in Japan?
- speaker: Respondent
  text: She died in Japan.
- speaker: Interviewer
  text: How old were you when your mother died?
- speaker: Respondent
  text: I think she died when I was in 6th grade.
- speaker: Interviewer
  text: Were you around 12 or 13 then?
- speaker: Respondent
  text: Yes. I was around 12 or 13 years.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: She was a gentle person.
- speaker: Interviewer
  text: Have you ever been scolded by your mother?
- speaker: Respondent
  text: I was a naughty boy, so I was scolded by her once in a while.
- speaker: Interviewer
  text: Do you remember something special such as being scolded or praised by your mother?
- speaker: Respondent
  text: I don't remember anything special as I was little.
- speaker: Interviewer
  text: Have you ever become ill?
- speaker: Respondent
  text: No, I haven't.
- speaker: Interviewer
  text: How did you come to America?
- speaker: Respondent
  text: When I was around 13 I wrote often to my father asking him to summon me to America. That is how I came here when I
    was 13 years and 9 months old.
- speaker: Interviewer
  text: Did you want to come here?
- speaker: Respondent
  text: Yes, I wanted to come here.
- speaker: Interviewer
  text: Did you come here 3 years after your grandmother died?
- speaker: Respondent
  text: I was with my aunt for 4 to 5 years as my grandmother died.
- speaker: Interviewer
  text: Was she your aunt on father's side or mother's side?
- speaker: Respondent
  text: She was my father's side. I left Japan when I was little, and have been living here for over 60 years.
- speaker: Interviewer
  text: What kind of a country did you think America was before you came here?
- speaker: Respondent
  text: America was a country where Japanese were attracted by, so I wanted to go to America. I was not the only one, but
    many Japanese had that kind of yearning.
- speaker: Interviewer
  text: Where did the ship sail from?
- speaker: Respondent
  text: I got on board the ship from Kobe, and landed at San Francisco.
- speaker: Interviewer
  text: Did anyone take you to the ship, or did you go there alone?
- speaker: Respondent
  text: My aunt took me to Kobe.
- speaker: Interviewer
  text: Were you very happy to come here?
- speaker: Respondent
  text: Yes, I was very happy as I had hopes of meeting my father and seeing America.
- speaker: Interviewer
  text: Did you come here alone at the age of 14?
- speaker: Respondent
  text: My father took a picture bride, so I came here with my stepmother.
- speaker: Interviewer
  text: Haven't your father and the stepmother never met before then?
- speaker: Respondent
  text: It was a picture marriage. My aunt who was my father's sister acted as a go-between.
- speaker: Interviewer
  text: Did your father go home then?
- speaker: Respondent
  text: No, he didn't.
- speaker: Interviewer
  text: It was the first time he saw the bride, wasn't it?
- speaker: Respondent
  text: Of course it was, as it was the picture marriage.
- speaker: Interviewer
  text: Was it in Los Angeles?
- speaker: Respondent
  text: I think it was around that time.
- speaker: Interviewer
  text: Could you talk to your stepmother, or were you shy to talk to her?
- speaker: Respondent
  text: Nothing happened until we got there. After we came here and 3 stepbro children were, we did not get along well, so
    when I was around 17 I became independent.
- speaker: Interviewer
  text: Do you remember about the voyage?
- speaker: Respondent
  text: It was a big ship called Mongolia-Go. I remember about the voyage.
- speaker: Interviewer
  text: How was it?
- speaker: Respondent
  text: In those days the meals on the ship were Chinese food. As I was not used to it I had a hard time. They served Chinese
    food day after day on the ship. In those days the Chinese food on the ship was not good.
- speaker: Interviewer
  text: Did you make friends on the ship?
- speaker: Respondent
  text: I was young, and other passengers were grown ups, so I didn't find friends.
- speaker: Interviewer
  text: Were there any other young passengers?
- speaker: Respondent
  text: I was about the only young passenger.
- speaker: Interviewer
  text: Were there other picture brides on board the ship?
- speaker: Respondent
  text: Yes, there were many. In those days the picture marriage was popular, and there were many picture brides from Japan,
    but more than 50% of them were from Okinawa.
- speaker: Interviewer
  text: Were they going to Hawaii?
- speaker: Respondent
  text: Some of them were going to Hawaii, and some of them were coming to America.
- speaker: Interviewer
  text: Did you get seasick?
- speaker: Interviewer
  text: Did anything interesting happen on board the ship?
- speaker: Respondent
  text: I don't remember anything interesting happened.
- speaker: Interviewer
  text: Did the ship go to Hawaii first?
- speaker: Respondent
  text: It stopped at Honolulu overnight. We landed and went to a bath house and restaurant, but we came back to the ship
    to sleep.
- speaker: Interviewer
  text: Where did you take a bath?
- speaker: Respondent
  text: At a Japanese bath house in Honolulu.
- speaker: Interviewer
  text: Did you go to Angel Island when you came to San Francisco?
- speaker: Respondent
  text: Yes, we did. In those days they were strict about hookworms. When we had physical examination they found out that
    both my stepmother and I had hookworms, so we were hospitalized there for a week. We passed the test a week later.
- speaker: Interviewer
  text: Did they give you medicine to take?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: Where did you meet your father for the first time?
- speaker: Respondent
  text: I met him for the first time on Angel Island.
- speaker: Interviewer
  text: How did you feel when you saw your father for the first time?
- speaker: Respondent
  text: I was introduced to my father, so I thought he was my father.
- speaker: Interviewer
  text: Could you call him 'Otousan' (father) right away?
- speaker: Respondent
  text: I never saw him before, so I was not too excited. My father was more interested in his bride who came with me.
- speaker: Interviewer
  text: How was the meeting of your father and the bride?
- speaker: Respondent
  text: As I was a child and did not know about the adults, I think my father was happy.
- speaker: Interviewer
  text: Could you land after you got out of Angel Island?
- speaker: Respondent
  text: After we were released from Angel Island we went to San Francisco by a ferry boat and landed there.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: We went to a hotel and stayed in San Francisco for about 3 days shopping for my clothes, and my stepmother's dresses.
    We went sight-seeing for one day. Then we went to Sebastopol.
- speaker: Interviewer
  text: What was your father doing then?
- speaker: Respondent
  text: He was in apple drying business.
- speaker: Interviewer
  text: Did he own the business?
- speaker: Respondent
  text: Yes, he did. It was a small place, but he had 3 or 4 employees.
- speaker: Interviewer
  text: How long was he in America by then?
- speaker: Respondent
  text: I don't know the old record, but I heard that he was in Hawaii for about 5 years before he came to America. I heard
    that he worked on the railroad when he first came from Hawaii.
- speaker: Interviewer
  text: Was it in San Francisco?
- speaker: Respondent
  text: My father came to Seattle from Hawaii, and from Seattle he went to work on the railroad. When I came to America he
    was living at Sebastopol.
- speaker: Interviewer
  text: What was the first impression of San Francisco when you arrived there?
- speaker: Respondent
  text: I thought San Francisco was a beautiful place. When the ship arrived there in the dawn we went on the deck and watched
    the scenery. That impression is still deep in my heart.
- speaker: Interviewer
  text: What did you think when you went to Sebastopol?
- speaker: Respondent
  text: It was in the country, and there was nothing but apple orchards so I felt kind of lonesome when I first went there.
    There were no nice houses like new, and we all lived in something like cabins. I thought America was a nice place ever
    since I landed here.
- speaker: Interviewer
  text: Did the life with your father and stepmother start there?
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: I was only 14, so about 4 or 5 days after I got there I started going to school.
- speaker: Interviewer
  text: How was the school?
- speaker: Respondent
  text: I didn't understand a word of English, but the white pupils were kind to me.
- speaker: Interviewer
  text: Did you start from the first grade?
- speaker: Respondent
  text: Yes, I did. The funny thing is, that although I was the first grader I went to the 4th grade class for math.
- speaker: Interviewer
  text: How many years did you attend the grammar school?
- speaker: Respondent
  text: I went there 3 winters. At summer time my father made me quit school to help him with apples, so I went to school
    only about 3 months during the winter. Even if I wanted to go to school my father didn't let me go to school so that I
    could help him. For 3 years I worked as a schoolboy and attended the grammar school during the winter season.
- speaker: Interviewer
  text: Did you work as a schoolboy when you were 14?
- speaker: Respondent
  text: Yes, when I was 14, 15 and 16 I worked as a schoolboy only in winter time.
- speaker: Interviewer
  text: How was it when you lived in a white family?
- speaker: Respondent
  text: It was not hard when I worked hard even though I could not speak English well. The mistress loved me. I was given
    50¢ spending money and went to school. Before I went to school I helped with breakfast and washed dishes. At dinner time
    I set the table first and then took the food that the mistress cooked to the table. As for the housework the mistress
    let me clean only the kitchen. She cleaned the living room and the bedroom. I wish my father had let me go to school for
    3 years during the summer too.
- speaker: Interviewer
  text: Was your father a strict man?
- speaker: Respondent
  text: He was quite strict. I was born in Japan and did not know the paternal love. As for my father, he did not bring me
    up, so he did not have much love for me. On the other hand my stepmother had 3 children one after another, so he loved
    them more.
- speaker: Interviewer
  text: How old was your father then?
- speaker: Respondent
  text: I think he was over 40 years old.
- speaker: Interviewer
  text: About how old was your stepmother?
- speaker: Respondent
  text: She was 32 years old when she came here with me.
- speaker: Interviewer
  text: Did you become independent when you were 17 years old?
- speaker: Respondent
  text: I did not get along well with my stepmother, so I lived away from home. I went to work in Sacramento, Isleton, Fresno,
    Lodi and all over. I carried a blanket on my back and went from one place to another doing farm labor.
- speaker: Interviewer
  text: Did you get separated from your family?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Didn't you feel helpless as you were only 17?
- speaker: Respondent
  text: I didn't feel that way as I wanted to live independently without depending on my parents.
- speaker: Interviewer
  text: How long did you continue that kind of life?
- speaker: Respondent
  text: When I was 20 years old I got married. The girl was a sister of my father's friend. As we were friends and lived close
    to each other we got married.
- speaker: Interviewer
  text: Was she in Japan then?
- speaker: Respondent
  text: Yes, she was. Her sister was married to a man in America. As her husband was from the same town as my father, they
    were friends. She mentioned that she had a sister who wanted to come to America, so my father asked me if I wanted her
    as my bride.
- speaker: Interviewer
  text: Did you want to get married then?
- speaker: Respondent
  text: My father advised me to get married, but I was not too interested in getting married. I got married because of my
    father.
- speaker: Interviewer
  text: Did your wife come from Japan all by herself?
- speaker: Respondent
  text: Mine was a picture marriage, also. Parents made the arrangements and sent me her picture and the marriage was made
    up.
- speaker: Interviewer
  text: Did you pick her up when she got here?
- speaker: Respondent
  text: No, she came by a ship.
- speaker: Interviewer
  text: Did you pick her up from the port?
- speaker: Respondent
  text: I went to pick her up with her sister as I didn't know which one was my wife.
- speaker: Interviewer
  text: How did you feel when you saw your wife for the first time?
- speaker: Respondent
  text: I did not have a bad impression.
- speaker: Interviewer
  text: What did you say to her when you met her for the first time? Did you call her name or did you say 'Hello'?
- speaker: Respondent
  text: Her sister introduced her to me, and she greeted me by saying, 'Yoroshiku' ('Please have your favor toward me'). I
    said 'Yoroshiku' to her.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I went back to Sebastopol with her. I was not living with my parents then, so I did all kinds of work by myself.
- speaker: Interviewer
  text: What did you do at first?
- speaker: Respondent
  text: At first I was engaged in the dehydration of apples. Later I got in poultry business.
- speaker: Interviewer
  text: Was that business to get eggs or to raise chicken?
- speaker: Respondent
  text: To get eggs. I think it was around 1932 or 1933. When I started the poultry business the Great Depression came, and
    it ended in bankrupt in 3 to 4 years.
- speaker: Interviewer
  text: Did you get married when you were 21 years old?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Were you in apple business for about 10 years then?
- speaker: Respondent
  text: Yes, I was in apple business until I started the poultry business. After I saved some money I started the poultry
    business, which ended in a big failure.
- speaker: Interviewer
  text: Were you in poultry business for about 5 years?
- speaker: Respondent
  text: About 4 years.
- speaker: Interviewer
  text: Couldn't you sell the eggs?
- speaker: Respondent
  text: I could sell them. The wheat was about $1.20 to $1.30 for 100 pounds, and the best quality eggs sold for 11¢ a dozen.
    Small eggs were only 6¢ a dozen. They were so cheap that it didn't pay. In those days a big piece of pork sold for about
    25¢. During the Depression there were no jobs even if you wanted to work. Those who had money in the banks could not withdraw
    money from the banks.
- speaker: Interviewer
  text: When was it that you could not continue the business any more?
- speaker: Respondent
  text: I went back to apple drying business around 1936 or 37.
- speaker: Interviewer
  text: The Depression continued till around 1933, didn't it?
- speaker: Respondent
  text: Yes, it continued for about 2 years.
