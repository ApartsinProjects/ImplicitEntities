collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Can you talk about how your father immigrated to the United States? Do you know how they met? Do you know what brought
    them to the US?
- speaker: Respondent
  text: I don't know the details but they met while my dad, Hideo, was in dental school before he graduated dental school.
    And my mother, Chiyo, worked in a flower shop at the time. I was born at the height of the Depression, 1932.
- speaker: Interviewer
  text: What is your birthday?
- speaker: Respondent
  text: July 7, 1932.
- speaker: Interviewer
  text: Did you have other siblings?
- speaker: Respondent
  text: Two brothers. Dennis and Dale. They were twins. I was the eldest.
- speaker: Interviewer
  text: Are your brothers still around?
- speaker: Respondent
  text: One is still around, the other passed away five or six years ago.
- speaker: Interviewer
  text: Where was your father from in Japan?
- speaker: Respondent
  text: The Inaba brothers Ibaraki. Outside of Tokyo. He immigrated when he was something like 10 years. And after that he
    says he saw his parents working from dark in the morning to after dark at night. And he says, I was too lazy to work that
    hard. He said he was determined to go to dental school and do something a lot easier.
- speaker: Interviewer
  text: Because they were farming?
- speaker: Respondent
  text: Farming, yeah. And I remember still remember my grandfather. He was up really early and he worked all day and come
    in at night and he'd still be doing some cleaning up, like the vegetables he would take to the market to sell. He wanted
    to keep that horse moving to plow the fields.
- speaker: Interviewer
  text: So your father's parents were here in the States, but did they bring your father as a young boy at ten years old?
- speaker: Respondent
  text: That I don't even know.
- speaker: Interviewer
  text: So I'm assuming they didn't own their land?
- speaker: Respondent
  text: No, no they didn't. They were foreigners and by law they were forbidden to buy land. So they had to buy land in the
    name of their children.
- speaker: Interviewer
  text: What were they farming?
- speaker: Respondent
  text: 'It was called truck farming. A little bit of everything. That was the safest way to have an income because you don''t
    want to specialize in some vegetable that didn''t have a market this coming year. And they''re so cheap that you couldn''t
    make much of a living. So just to protect themselves, they grew a little bit of everything: green beans, dry onions, asparagus,
    celery, lettuce.'
- speaker: Respondent
  text: And my uncle, to balance out things because he had seven kids, a lot of kids to feed, he didn't want to take a chance
    on specializing at any one vegetable to feed the family. What happens if he planted something that everybody else had?
    And he wouldn't get much for it. So he bought a lot of land as it became available. So he ended up with quite a bit of
    land for his farming. And to spread his risk, he decided, well, I think I'll go into raising chickens. First they came
    up with these cages, they're just barely enough, they couldn't even turn around. But rows and rows and he ended up with
    quite a few, I forgot how many thousands of chickens, all in cages, all lined up with water trickling down all the way
    down for them to drink. And food was distributed the same way - a wagon with feed and he'd just sprinkle it all the way
    down. And that way he figured by the time they started laying eggs that it would be spreading their farming risk instead
    of vegetables and that kind of stuff, he had chickens. And as it turned out, he says it stabilized his income, made it
    much better. So he expanded that and he became a Safeway egg producer. So he had a contract with Safeways in order to
    provide them a supply of eggs.
- speaker: Interviewer
  text: He became very successful then.
- speaker: Respondent
  text: Oh, yeah, he did alright. He did alright. He bought a lot of land as it became available to him 'cause I don't think
    he even had a credit card. He was just like my dad, he never had a credit card. He didn't believe in it.
- speaker: Interviewer
  text: So your father's family was in Riverside.
- speaker: Respondent
  text: Yeah. Washington is where they immigrated to from Japan.
- speaker: Interviewer
  text: And your mother, where was she born?
- speaker: Respondent
  text: She was born in Washington state.
- speaker: Interviewer
  text: Where did she grow up?
- speaker: Interviewer
  text: And so she was Nisei?
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: And was her family also farming?
- speaker: Respondent
  text: Actually they were big time farmers. He had milk cows, that's what he did for a living.
- speaker: Interviewer
  text: So we're going to jump a few years. So by the time that the war broke out, you were about ten, do you remember that
    day of Pearl Harbor?
- speaker: Respondent
  text: Not really, no.
- speaker: Interviewer
  text: Is there anything around that time that you remember? Do you remember when you started hearing about a war between
    Japan and the U.S.?
- speaker: Respondent
  text: Well, yeah, vaguely, because I didn't understand the concept of what was going on. I just remember my dad saying that
    the FBI came up to his office when he was working on a patient and they waited until he finished and then took him down
    to the jail and fingerprinted him and arrested him that day.
- speaker: Interviewer
  text: So he opened his own practice?
- speaker: Interviewer
  text: Were your parents involved in other community activities? Were they teachers or Buddhist?
- speaker: Respondent
  text: No, nothing like that. He did support the Japanese community church in Riverside by donations. And I know he made
    friends with some ministers of other churches and he volunteered to help the poor people get their teeth fixed for free.
    He never talked about it. You know, I actually came across that part by accident. He never talked about that, the charity
    work that he was doing.
- speaker: Interviewer
  text: How did you find out?
- speaker: Respondent
  text: 'I was paid, I forgot what it was, five dollars a week, to go to his office on Sundays to clean it up, fix the magazines
    and all the other stuff, and mop the linoleum floors. And I went there one time and he had patients and I must have looked
    kind of puzzled. So that''s when he told me what was going on: that he would get patients referred to by some church ministers
    and he would donate I think one Sunday a month to do dental work for free.'
- speaker: Interviewer
  text: Oh, wow. And were these other Japanese people?
- speaker: Respondent
  text: No, anybody. Yeah. Referred by the ministers of the various church. He didn't like to talk about it. He says I'm not
    doing it to get publicity. That's why he didn't do any of that through the Japanese church because everybody would hear
    about it.
- speaker: Interviewer
  text: Your community that you were in Riverside at this time, was it diverse? Was it mostly Japanese American families?
- speaker: Respondent
  text: No, no. It was a very minority Japanese community.
- speaker: Interviewer
  text: Do you remember anything that changed for you at school after Pearl Harbor? Did anybody say anything to you?
- speaker: Respondent
  text: I remember that the first friends I made after we came home to Riverside were a group of Mexican kids because I guess
    they had more sympathy for what was going on.
- speaker: Interviewer
  text: And you're talking about after the war?
- speaker: Respondent
  text: After the war.
- speaker: Interviewer
  text: They could feel an affinity to you.
- speaker: Respondent
  text: Yeah, they put themselves in our shoes saying, "It could be us." We were born here and yet it didn't make any difference.
    When the war started we were all considered aliens. Even if you're a U.S. citizen born here, raised here, never left the
    country.
- speaker: Interviewer
  text: Did your parents speak to you in Japanese? Did you grow up speaking Japanese?
- speaker: Respondent
  text: No because my dad was an Issei and my mom was born here, so English was spoken at home. It was our language except
    when we had visitors like Grandma or Grandpa visit because they spoke very little English and it was broken English.
- speaker: Interviewer
  text: So could you communicate with your grandparents?
- speaker: Respondent
  text: Not bad. You know, we knew generally what they were saying.
- speaker: Interviewer
  text: So do you remember your parents saying anything about this tension or the war that had broken out between the two
    countries?
- speaker: Respondent
  text: No, they didn't talk about it. I think it was easier to handle hidden away or pushed to the background than to talk
    about it, you know because first of all, my dad was taken away right away because he was considered an alien. And so my
    mom had to take over everything else, including canceling all the appointments. And we were fortunate that the land lady
    who owned the building where my dad had his office, she was a really rich lady from Pasadena. And her chauffeur - and
    this is back in the early '40s, to have a chauffeur, a legitimate chauffeur, she had to be a legitimate millionaire because
    there weren't that many. And she came right away when she heard about it. She had a chauffeur drive her to Riverside and
    she told my dad, "Don't worry about your office." And she and my mom went to J.C. Penney, bought a bunch of sheets, covered
    everything up with sheets, the dental equipment, the sofas and tables and everything. And she says, "Don't worry about
    the rent. You don't have to pay any money until you come back." She's really nice. But see, she knew Japanese because
    her chauffeur was Japanese, her gardener was Japanese. So she was familiar and she was well educated. So she knew what
    was going on. She knew it was illegal what the government was doing. And so, you know, she was really nice.
- speaker: Interviewer
  text: Very. And so was your father's place still intact when you came back?
- speaker: Respondent
  text: Oh, yeah. He says it was all intact.
- speaker: Interviewer
  text: That was very fortunate for your family. Do you know how long the FBI held your father?
- speaker: Respondent
  text: He was in jail. He never got home until after the war. He was arrested, fingerprinted, photographed, and then went
    to Lordsburg, New Mexico as a first place. And then from there he was sent to Texas, Crystal City. And we were sent to
    Manzanar.
- speaker: Interviewer
  text: I didn't realize they didn't reunite you before going to camp. So what did you think? Did you assume something awful
    happened to your father?
- speaker: Respondent
  text: No, no. My mother told us what was going on or tried to explain to us but it was something I couldn't completely wrap
    my head around.
- speaker: Interviewer
  text: Did you say he was processed at Santa Anita? I thought you had a story where you guys got to see him through the fence
    at Santa Anita before he got shipped out or something.
- speaker: Respondent
  text: Yeah, that's where one of the first emergency centers was set up because it was a big area. They put up fencing all
    the way around. And so we visited him on certain days. Maybe it was Saturday or Sunday, and so we got to see him through
    the fence.
- speaker: Interviewer
  text: And this was before you yourself and your family had to go to camp, is that right?
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: And then where were you sent with your mother and your brothers?
- speaker: Respondent
  text: Well, we all moved to Los Angeles. We knew we were going to go into one of the quote "relocation centers" which is
    prison. And we knew that was going to happen so we wanted to stay together. We all moved to Grandma's house in Los Angeles
    so we could all at least be together. So we were like in a package when we went to Manzanar.
- speaker: Interviewer
  text: Is this your mother's parents or your father's?
- speaker: Respondent
  text: My mother's parents.
- speaker: Interviewer
  text: So did you go to an assembly center before or did you go straight to Manzanar?
- speaker: Respondent
  text: Straight to Manzanar. They put us on a train and we headed out there.
- speaker: Interviewer
  text: Do you remember the train ride from L.A. to Manzanar?
- speaker: Respondent
  text: Yeah. It was just nothing fancy about it, just an old train with bench seats. And I remember we were stuck. Before
    we got to Manzanar the train had stopped for refueling or water or whatever. And there were a few people who came and
    brought us water, some juices, you know, citizens that lived around. Or I forgot what town it was but it wasn't a big
    town, it was farming community. And we really appreciated that because everybody was panicking and prejudiced. And here,
    these people came with whatever they could afford.
- speaker: Interviewer
  text: And they would just hand it up to people in the train?
- speaker: Respondent
  text: Yeah, they just came by and the windows would go up and they would hand things to us.
- speaker: Interviewer
  text: I've never heard of that happening in any other experience of people from these little towns coming up to the trains.
    And I have to backtrack for a second because I wanted to ask about your home in Riverside. Did you have to get rid of
    your belongings? What happened with your home?
- speaker: Respondent
  text: Oh, I think my folks were fortunate because both being educated, they had educated friends which realized hey, this
    is not right, this is illegal. And so they looked after us and volunteered to look after their property. So my mom and
    dad were fortunate having enough close friends that said, "Don't worry about it, we'll look after your property." So we
    took our personal furniture, put it into one bedroom, put a lock on it, and some of the furniture went into the garage
    part where they had a big room there that we could put furniture and just lock it up. And they looked after it and rented
    out the house. They collected the rent and put it into my folks' checking account. Yeah, they're really good.
- speaker: Interviewer
  text: That's amazing.
- speaker: Respondent
  text: Well but these were all educated people, so they knew what was going on. There was a difference between our next door
    neighbor who was uneducated, panicking, emotional. And she testified that my dad at night would go up, climb these great
    big walnut trees with a flashlight and signal enemy planes coming by. She testified under oath, this is the truth.
- speaker: Interviewer
  text: And of course, they believed her.
- speaker: Respondent
  text: Oh yeah, yeah. She was a living witness [laughs].
- speaker: Interviewer
  text: Do you remember even saying goodbye to your father from Santa Anita?
- speaker: Respondent
  text: Not really, no.
- speaker: Interviewer
  text: And you felt like you would see him again? You weren't afraid that something would happen?
- speaker: Respondent
  text: Well, no because I didn't really know what was going on.
- speaker: Interviewer
  text: So when you actually got to Manzanar, what were your first impressions of camp and you know, moving into this new
    place.
- speaker: Respondent
  text: They're like military barracks. It's just row on row on row of houses hastily put together on lumber that was about
    one by six with gaps in between because they're in a hurry to put it together so they
