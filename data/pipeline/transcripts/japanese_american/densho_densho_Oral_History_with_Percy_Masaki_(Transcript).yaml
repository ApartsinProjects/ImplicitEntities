source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Can you tell me when you were born?
- speaker: Respondent
  text: Yes. I was born in Sacramento, near or just behind the present Coca Cola plant on Stockton Boulevard, August 12, 1910.
- speaker: Interviewer
  text: Were you the only child?
- speaker: Respondent
  text: Yes, I was the only child, although I had a step-brother who was born in Japan. Yeah a step-daughter, I mean step-sister,
    that's right.
- speaker: Interviewer
  text: Were there any other Japanese families in that area?
- speaker: Respondent
  text: No. Since my father was working for Gerber and he was President of the California National Bank, and his estate was
    more like a cattle ranch, so therefore, there was no other Japanese living around it.
- speaker: Interviewer
  text: And how long did you father stay in that area?
- speaker: Respondent
  text: He must have stayed about possibly six years before, since my mother came and I was born. Possibly I was two years
    old when they moved out of there.
- speaker: Interviewer
  text: Now where did you move from there?
- speaker: Respondent
  text: From there we moved to possibly Broderick, Yolo County, on a five acre, five acre piece of truck driving farm.
- speaker: Interviewer
  text: And raised?
- speaker: Respondent
  text: Raised the vegetable like pepper, eggplant, Japanese pumpkin, [hard to hear, counter 025], and cucumbers and stuff
    like that I think. I was too small to be too much involved in what they were doing.
- speaker: Interviewer
  text: Now you were mentioning a language school, they had one in Broderick?
- speaker: Respondent
  text: Yes. They had a one room, a good size one room school building, and the teacher had her living quarters and they also
    had a tutor. I remember her name as Takahashi.
- speaker: Interviewer
  text: Was there anything else taught besides the language?
- speaker: Respondent
  text: No, the Japanese language was talked only for one hour after the regular school. I think we went five days or six
    days a week. That was about it.
- speaker: Interviewer
  text: With maybe 10 to 15 students?
- speaker: Respondent
  text: Possibly, that's about it. About 15 students, possibly, it might have been 20 or 30 that could attend, but the family
    was not able to pay the tuition, so they kept them home or. I know one family that the father was very well educated,
    and he was teaching the two sons -
- speaker: Interviewer
  text: So you stayed in Broderick for about six years?
- speaker: Interviewer
  text: And then from there your family moved to Sacramento
- speaker: Respondent
  text: Sacramento City and my father got tired of not doing too much but he wanted to go back to the farming again. And possibly
    he was thinking of us, my cousin and I, growing up in town not doing too much won't be a good habit for us, so we went
    to Riverside area on Riverside Boulevard on 15 acres on hilly ground. He depended on us to do the plowing and the heavy
    work because he was possibly around 65 years of age.
- speaker: Interviewer
  text: This would be about 1920 or so?
- speaker: Respondent
  text: Uh, let's see, possibly a little more than that I guess. Possibly I could have been about 15 years, 14 or 15 years
    old.
- speaker: Interviewer
  text: So that would put it about 1924 or 1925?
- speaker: Interviewer
  text: Did you have a tractor in those days?
- speaker: Respondent
  text: No, we never owned a tractor in all of that time. I noticed that the next door had the Fordson Tractor. But we had
    the horse. And I still remember one horse walked fast, walked real fast and the other horse walked real slow. So we had
    a hard time plowing with it.
- speaker: Interviewer
  text: So you used a team of horses?
- speaker: Respondent
  text: Team of horses to plow. To cultivate we used one. But when you go too fast when you cultivate it kind of throws the
    dirt up to high. So it wasn't a good idea to move too fast. But, I think that we bought kind of oddball horses [laughs].
- speaker: Interviewer
  text: And did you get a chance to go to any Japanese language schools while you were on that side?
- speaker: Respondent
  text: No, in Riverside I never got to go to Japanese language school. But, during my ten year, approximate ten years time
    that we were in Riverside, the Riverside group did come up with a small Japanese school. But I never attended.
- speaker: Interviewer
  text: Do you remember where it was located?
- speaker: Respondent
  text: It was just less than half a mile south of Sutterville Road off Riverside Boulevard. Just, close to the present Portuguese
    Hall is now there. But the Japanese school was I think tom down during the wartime.
- speaker: Interviewer
  text: Now if you were 14 or 15 then, were you going to high school?
- speaker: Respondent
  text: Yes. I was going to high school. I remember taking a [hard to hear, counter 078] passenger car and going to Sacramento
    High. Which is quite a distance, possibly ten miles away.
- speaker: Interviewer
  text: Now grammar school you went to grammar school in Broderick?
- speaker: Respondent
  text: Yes, and I also went to grammar school in Sutterville Road which is close to our farm.
- speaker: Interviewer
  text: Do you remember the name of that school?
- speaker: Respondent
  text: Uh, that was, we just to call it the Sutterville Heights. And of course that building is now gone, built up into residential.
- speaker: Interviewer
  text: Now after high school, did you still continue to farm at that?
- speaker: Respondent
  text: Yes, we continued to farm the Riverside until myself and my cousin both graduated from High School. My cousin was
    about two years younger so after I graduated from high school I farmed an extra three years and then when he graduated,
    we, my father quit farming because he was also getting old and for about, quitting the fann, my father took myself and
    my mother to Japan for six months to, more like a vacation. That was about in 1931, that's right.
- speaker: Interviewer
  text: Now this so this would be your first trip to Japan?
- speaker: Respondent
  text: Oh yes, the first trip for myself to Japan, although my father had gone several times prior in the recent days.
- speaker: Interviewer
  text: Do you remember what your first impression of Japan was?
- speaker: Respondent
  text: Well, first of all, my father always made a connection with a friend who he used to farm together with in Broderick,
    so therefore, he would find a place to stay close to his place, so we used to go back and forth to our friends, Wakahira's
    place. They had two daughters. Possibly a little bit younger than I was and we used to go out and kill our time over there,
    watch, they're were doing the sewing. So they were just about out of high school themselves. And both of them were sewing.
    So we, I, I was out there and hang around and kill time. [Mrs. Masaki's voice in background saying "tell them about that."
    laughing]
- speaker: Respondent
  text: So recently when we, when I went home to Japan again, about I would say oh five years ago, we went to visit the, I
    went to visit the girl that I visited 50 years prior. And by golly, she was still sewing, [wife laughs in background].
    So she must have sewed for fifty years at least, [all laugh] And, in the meantime she had gone through a lot of grief,
    the atomic bomb and both of the girls survived but the father and mother had disappeared. And her husband had died in,
    in the Philippine combat. So she had two daughters and now she has grandchildren.
- speaker: Interviewer
  text: So your parents home is in Hiroshima?
- speaker: Respondent
  text: So, so yeah my parents are from Hiroshima, both of them.
- speaker: Interviewer
  text: Do you remember if their marriage was arranged or a picture bride maybe?
- speaker: Respondent
  text: It may not be a picture bride, but I'm pretty sure it was arranged because when she came to America she brought his
    adopted son with her. They landed in Vancouver, Canada, British Columbia. And, I think that somebody had gone, went after
    the two. I think many of them came to Vancouver at that time.
- speaker: Interviewer
  text: So that probably would have been around 1906, 1907?
- speaker: Respondent
  text: Yeah, something like that. Yeah.
- speaker: Interviewer
  text: So you spent six months in Japan and then you returned to Sacramento?
- speaker: Respondent
  text: Yeah. And at this time um, my brother had the drive-in market going for two years, and I went to work for my brother.
    And in the meantime, I got married. And a few more years I worked for my brother and when I learned enough, I started
    my own in North Sacramento.
- speaker: Interviewer
  text: It sounds like you didn't have much time to play baseball or basketball or any of that, social kinds of things.
- speaker: Respondent
  text: The only thing I can remember is uh, I played a little baseball. I don't know what team, but I know I was playing
    either Sacramento or, I don't think it was Broderick, I think it was a Sacramento team. We used to play in West Sacramento.
- speaker: Interviewer
  text: You mean there was a baseball diamond in West Sacramento?
- speaker: Respondent
  text: There was a baseball diamond, yeah, in West Sacramento.
- speaker: Interviewer
  text: Did the Japanese community have any annual events?
- speaker: Respondent
  text: Yeah, the, in Broderick they had an annual picnic. And I can still remember how baloney and fresh bread tasted with
    a soda water.
- speaker: Interviewer
  text: Was that the first time you were exposed to a baloney sandwich, huh?
- speaker: Respondent
  text: Possibly. [Mrs. Masaki laughs in background]
- speaker: Interviewer
  text: And this would be the entire Japanese community around Sacramento.
- speaker: Respondent
  text: Uh, that was just the Broderick area group picnic.
- speaker: Interviewer
  text: How many people do you think?
- speaker: Respondent
  text: Possibly, there must have been at least 100 people came, because when they have a picnic, Broderick picnic, possibly
    people from surrounding area came. So I know, I remember that there was a lot of prizes. There was a bicycle race, racing,
    tire racing, wrestling match, running race, all sorts of races, I remember, and the prizes were pretty nice.
- speaker: Interviewer
  text: And did that picnic continue up until the war?
- speaker: Respondent
  text: I really don't know about that because we left the area early, so I can't remember whether they continued or not but
    I'm pretty sure that the population didn't decrease so they had the gathering.
- speaker: Interviewer
  text: Now once you left the farm and you started working and what was that a fruit stand? Your brother's? You were living
    in town then.
- speaker: Respondent
  text: Yes, I was living at 3 ld and T Street. Where my son was born. That building is still there and the color is the same,
    [laughs]
- speaker: Interviewer
  text: Now was that still part of the Japanese area? Or was that a little farther -
- speaker: Respondent
  text: I would say that was a Japanese area because there was a lot of Japanese, possibly thinking of buying into the or
    renting into the people that was working for SP. Those people moved out and the Japanese moved in. There were no Colored
    people out that way at that time, but Japanese and Italian and Portuguese people are all mixed in there.
- speaker: Interviewer
  text: Do you remember if there was a bank?
- speaker: Respondent
  text: No, there was no bank that I know of. Possibly the closest bank from around our area was in uh, around K Street and
    L Street. J, K, and L.
- speaker: Interviewer
  text: So Sumitomo Bank hadn't come in yet then?
- speaker: Respondent
  text: Uh, Sumitomo Bank was, came in after the war. Or was it at 4 th and L Street, was that a Yokohama Specie Bank or a
    Sumitomo Bank? [asks Mrs. Masaki in the background, she answers "I don't know.] One of them. [I don't know.] But that
    was the only Japanese bank, and others were the Bank of America, and that was the Bank of Italy that they used to call
    it. And uh
- speaker: Interviewer
  text: Do you know if the Japanese traded there?
- speaker: Respondent
  text: Uh, no, I don't remember too much about Japanese trading at the bank, because I was too young to go back and forth
    to banks. I remember going to William Miller's bank, I think it was California National Bank at 4 th and J Street. I remember
    going in there. And getting balled out for bringing all of the pennies, loose, [he and Mrs. Masaki laugh, she says piggy
    bank] You were supposed to put them into the penny, wrap it up into so many chunks, you know. And if you bring them in
    and loose, a bunch of pennies, a couple of hundred pennies, they don't like it. That was the first balling out I ever
    got, going to bank.
- speaker: Interviewer
  text: Do you remember if any of the public buildings were off limits to Japanese? Swimming pools or theaters, or?
- speaker: Respondent
  text: Yeah, even from the time that I was in the Riverside area, the Riverside bath was off limits to Japanese.
- speaker: Interviewer
  text: Do you remember where it was located?
- speaker: Respondent
  text: Yeah, that was at just the entrance of the Southland Park, on the Riverside Boulevard. That was the end of the street
    car line, and that's where the Jewish Temple is right now. That used to be, that big area used to be a swimming, a swimming
    pool.
- speaker: Interviewer
  text: Did they have a sign or?
- speaker: Respondent
  text: No, it didn't have any signs.
- speaker: Interviewer
  text: You just knew it was off limits?
- speaker: Respondent
  text: But that was strictly off limits. No Japanese could get in. For that matter, even after the War, close to our home
    right here there was off limits to my brother, until uh, he and some people got together and put the whole thing in the
    right situation for kids could go swimming.
- speaker: Interviewer
  text: You mean out in North, North Sacramento?
- speaker: Interviewer
  text: A swimming pool that was off limits? Do you remember any other public accommodations in Sacramento that were restricted?
- speaker: Respondent
  text: Oh, let's see, no I don't, I can't think of any.
- speaker: Interviewer
  text: Ok, now, you were farming what, during the Depression?
- speaker: Respondent
  text: 'Uh, during the Depression, [Mrs. Masaki: we got married] Yeah, I got married during the Depression, but at the same
    time I was working for my brother.'
- speaker: Interviewer
  text: Do you have any memories of what it was like during the Depression?
- speaker: Respondent
  text: I never felt the Depression. In fact, uh, in some parts of the Depression I did better than the, I did better at making
    money. Things were cheap and, and for in stance for like string beans, which was a possibly, was five cents a pound for
    to buy. You could buy a fifty pound bag for $ 1. The farmer was making nothing, but at the same time, I was I could get
    better mark up. I was making better money [hard to hear, counter 272]. So at that time uh, part of the Depression time,
    I think I did very well as far as annual profit, I made pretty good.
- speaker: Interviewer
  text: Ok, now so did you meet your wife, was that arranged or was that?
- speaker: Respondent
  text: 'Well my wife was connected with my, my cousin''s marriage to uh, their to her cousin. So, we knew each other so that
    I was going to my cousin''s place and I used to see her so. We knew each other, and yet again uh, it was still a [Mrs.
    Masaki in background: Nakodo] Yeah a -'
- speaker: Interviewer
  text: You had a go between.
- speaker: Respondent
  text: Go between, yeah.
- speaker: Interviewer
  text: What year was, did you get married?
- speaker: Respondent
  text: 1932. [Mrs. Masaki agrees]. It was at the peak of the Depression time.
- speaker: Interviewer
  text: And you continued to live on 3 ld and T Street?
- speaker: Respondent
  text: Let's see [Mrs. Masaki says uh huh], yeah that's right we were still living in, at the 3 rd and T Street. Yeah.
- speaker: Interviewer
  text: And any children?
- speaker: Respondent
  text: Yeah we had one, one child at 3 rd and T. And then we moved in a year or two to 17 th and 2424 17 th Street where
    Allstate
