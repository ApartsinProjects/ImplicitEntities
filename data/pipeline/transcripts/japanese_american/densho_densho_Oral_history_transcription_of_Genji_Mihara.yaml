collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: For sports I was in boating. Later I played baseball and kendo (Japanese fencing).
- speaker: Interviewer
  text: Did you have any other hobby?
- speaker: Respondent
  text: I didn't have anything special except reading and writing Japanese poems. In 1933 my poem was selected in the New
    Year poetry party and I was granted an audience with the Emperor. Since my wife died I have been busy, so I have not been
    writing poems.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: I was born in 1890.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I am 87 years old now. I am going to make a speech at the centennial banquet of Christianity. I became a Christian
    when I came to America, so I have been a Christian for 70 years.
- speaker: Interviewer
  text: Did you come here when you were 17 years old?
- speaker: Respondent
  text: Yes. I was 18 in Japanese way of counting, but 17 in Western way.
- speaker: Interviewer
  text: What kind of America did you think when you wanted to go and see it?
- speaker: Respondent
  text: My cousin who was 20 years old said, "Let's go to America together" so I came here. I was planning on going back to
    Japan, but I got married and had children, so I could not go back to Japan. My sister took a husband and inherited the
    family. It was from my curiosity that I came to America. I had a dream.
- speaker: Interviewer
  text: Did you hear much about America when you were 17?
- speaker: Respondent
  text: I read about America in books and magazines. In those days there was a magazine called "Jitsugyo No Nihon" (Industrial
    Japan) which was published monthly. It wrote good things and hardly any bad thing about America. It said San Francisco
    does not like Japanese, but Seattle is all right. One pastor said that San Francisco was punished by the earthquake because
    it oppressed Japanese. That is why I decided not to go to San Francisco, and came to Seattle by ship.
- speaker: Interviewer
  text: Did your father let you come here without any argument?
- speaker: Respondent
  text: At first he told me not to go, but just told him that I was coming back he let me go.
- speaker: Interviewer
  text: Where did the ship set sail from?
- speaker: Respondent
  text: From Yokohama. It took 16 days to sail from Yokohama to Seattle.
- speaker: Interviewer
  text: Do you remember about your voyage?
- speaker: Respondent
  text: I did not get seasick, but my cousin got seasick and didn't eat much. It didn't bother me, but it was long 16 days.
- speaker: Interviewer
  text: Were the passengers all men in those days?
- speaker: Respondent
  text: Of course. For many years after I came here there were just men. As I joined the church, I went to the street corner
    with old church members and invited young men to church. I did that for about 5 years.
- speaker: Interviewer
  text: Weren't there any women on board the ship?
- speaker: Respondent
  text: No, women were not coming here in those days.
- speaker: Interviewer
  text: What do you remember about your voyage?
- speaker: Respondent
  text: I don't remember much, but when we crossed the dateline the ship's crew entertained us by singing and dancing.
- speaker: Interviewer
  text: Was it a Japanese ship?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Respondent
  text: It was Shinano Maru.
- speaker: Interviewer
  text: What year did you come here?
- speaker: Interviewer
  text: Then it was the year after the great earthquake in San Francisco?
- speaker: Respondent
  text: Yes, it was. That is why everybody came to Seattle instead of San Francisco. Even now people in Los Angeles say that
    they arrived in Seattle and then went there. San Francisco had bad reputation as Japanese children born in America were
    not allowed to go to public schools. That is why people say San Francisco was destroyed by the great earthquake.
- speaker: Interviewer
  text: How did you feel when the ship entered the harbor of Seattle?
- speaker: Respondent
  text: It arrived here at night time, and the harbor was beautiful with lights. In those days there were not many electric
    lights in Japan, so I thought America was beautiful. There were no cars in those days, and people were riding carriages.
- speaker: Interviewer
  text: How was the city of Seattle?
- speaker: Respondent
  text: It had many slopes, and streets were not too good. I remember them washing sands off of Jackson Street to level the
    street before they paved it.
- speaker: Interviewer
  text: How did you feel when you had the first contact with the white people in Seattle?
- speaker: Respondent
  text: I thought the white people were very kind. I met with the white people because I joined the church. I had to learn
    English, so I worked as a schoolboy. The ladies at the church taught us English very kindly. Sometimes they gave us coffee
    or tea and cookies. I never thought about such a thing in Japan. That is why many people came to church. They did not
    come to church because of the religion, but because they taught us English and treated us with kindness. As they were
    so kind we decided to attend the Sunday worship service.
- speaker: Interviewer
  text: Did you become a schoolboy as soon as you came here?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Did you receive inspections when you arrived here?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What did they check?
- speaker: Respondent
  text: At first they gave us a physical examination. Then they asked us how much money we had, where we were going and what
    we were going to do. At that time Japanese pastors were interpreters, so they introduced me to the church.
- speaker: Interviewer
  text: Didn't you get any unpleasant feeling at the Immigration office?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: What did you do the first day?
- speaker: Respondent
  text: I stayed at a hotel named Taiho-Kan. The following day I went to the church.
- speaker: Interviewer
  text: Was it a Japanese church?
- speaker: Respondent
  text: Yes, it was. It is the Japanese Presbyterian Church which I belong to now. It had just started then. At that time
    it was not an independent church. It was a branch of the Seattle First Presbyterian Church.
- speaker: Interviewer
  text: How did you find out about the church?
- speaker: Respondent
  text: Rev. Fukumatsu Okazaki who was the founder of the Baptist Church was the interpreter at the Immigration Office. He
    asked me where I was going, so I told him that I had not decided yet. When I talked about Rev. Shimanuki in Japan, he
    told me that Rev. Shimanuki is a Presbyterian, so go to the Presbyterian church here and Rev. Inouye will take care of
    me. That is why I went there. I was lucky.
- speaker: Respondent
  text: In those days Seattle was still a bad town, worse than the Chinatown here. It had gambling places, prostitute houses
    and Japanese racketeers, but by Christian influence it was changed completely. That is why I have been a Christian leader
    for 40 years. There are Buddhist, Shinto, Konko-Kyo, Seicho-No-Ie and many other religious organizations here. Everybody
    knows me as a Christian, but everyone in the Japanese community cooperates with me, so it is not difficult to get along.
    In some places they fight each other.
- speaker: Interviewer
  text: Did you become a schoolboy in a white family?
- speaker: Respondent
  text: Yes, I did. The family was very kind to me. On Sunday the master used to go out with a book. I was wondering why he
    went out with a book on Sunday which was his day off. I found out later that it was the Bible.
- speaker: Interviewer
  text: Was he a teacher?
- speaker: Respondent
  text: He was the principal of a grade school. His name was Mr. Stanton. When I went to school I was told that Mr. Stanton
    was an elder of the church. A few of my schoolmates decided to attend a worship service. I think God prepared me a way.
- speaker: Interviewer
  text: Was there a Japanese church within that church?
- speaker: Respondent
  text: No, there was a room for Japanese worship service.
- speaker: Interviewer
  text: Did it have any relationship with the First Presbyterian Church?
- speaker: Respondent
  text: No, it didn't. It was a branch of the First Presbyterian Church.
- speaker: Interviewer
  text: That is why the elder knew about it, didn't he?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Who found the schoolboy's job for you?
- speaker: Respondent
  text: The Japanese Presbyterian Church did. In those days there were just young people, so the church took care of them
    more than teaching the gospel. About 4 boys shared a small room. The church took care of finding places to live and jobs.
    The jobs were posted on the board in the church. Japanese boys had reputation as hard workers, so jobs were not hard to
    find.
- speaker: Interviewer
  text: How long did you work as a schoolboy in that family?
- speaker: Respondent
  text: About two years.
- speaker: Interviewer
  text: Did you have fun?
- speaker: Respondent
  text: Yes, because the Mrs. was a nice lady. In Japan they do not treat the people outside same as the member of the family.
    After working here for two years I found out that people treat us equally. I understood it after I became a Christian.
    They had a son, little younger than I, but they treated me the same as they treated him. When she bought apples, she gave
    me apples just as she gave his son apples. It is not like that in Japan because of the family system. I gradually understood
    the good points of Christians.
- speaker: Respondent
  text: Since then I joined the street-corner gospel mission every Sunday. Seattle is a cold place but I didn't miss it. We
    occupied the best corner as 20 to 30 young men gathered. In those days all the churches had morning and evening services.
    In the morning they held worship services, and in the evening they held the gospel meetings. We stood on the street corner
    from 6 o'clock in the evening.
- speaker: Interviewer
  text: Did you hold the meeting on the street?
- speaker: Respondent
  text: We held it on the street corner where many young men passed by. If the speaker was good, they would stop and listen,
    but a poor speaker talked they went away. That is why the chairman left the good speaker till the end. In those days there
    was the Church Federation, so other churches joined us.
- speaker: Interviewer
  text: What did you do in the street meeting?
- speaker: Respondent
  text: We gave testimonies.
- speaker: Interviewer
  text: Didn't you have any music?
- speaker: Respondent
  text: There was a man who played an accordion, so they came to listen to him. They were all bachelors. There were no girls
    nor wives then. They came later. Sometimes there were hecklers, but we paid no attention to them. I think it was good
    that we held the meeting on the street corners for 5 years.
- speaker: Interviewer
  text: Did you do that for 5 years?
- speaker: Respondent
  text: Yes, every Sunday.
- speaker: Interviewer
  text: About how many people came to church by it?
- speaker: Respondent
  text: Quite a few people came. As our church was closest to downtown. In those days there were no cars, so we walked with
    them to church.
- speaker: Interviewer
  text: After about 5 people gave testimonies did you take the people to the church?
- speaker: Respondent
  text: Yes, we did, when it was time. Quite a few people were baptized.
- speaker: Respondent
  text: At one time a Japanese had a fight with a Black man and killed him with a knife. He was tried and was sentenced to
    die. Japanese people tried to help him, and asked the minister of the First Presbyterian Church, Dr. Mathews, who asked
    for retrial saying that the death sentence was too severe. The retrial was held, and the judge sentenced him to 10 years.
    As Dr. Mathews was an influential man he asked the judge to change the sentence to one to 20 years. Later Dr. Mathews
    and Rev. Inouye went to the prison in Walla Walla and brought him back. This man, Arata Usaburo made testimony on the
    street corner, so many people gathered to hear him talk. That happened 65 years ago.
- speaker: Interviewer
  text: Do you remember any other story like that?
- speaker: Respondent
  text: There is another story. A man who was working as a dayworker in California gambled and lost money, so he stole his
    mistress's jewelry and pawned it to get money. She hired a detective, who told her that the Japanese man who worked in
    her house was suspicious. She became angry with him saying that the worker was a good man and would not do such a thing.
    She fired the detective. This man could not stay there. He spent all the money, so he quit the job and came to Seattle.
    He was going toward the railroad track to kill himself, when he heard the music by accordion. Someone was making a testimony.
    He came to our meeting. The man said that he should not kill himself. He came to our church and confessed that he stole
    the jewelry, but the mistress was so good that he could not stay there. He asked Rev. Inouye what to do. Rev. Inouye told
    him that he should give himself up to the police. I was young then, so I argued with the pastor saying that he didn't
    have to go to the police if he confessed his crime. The pastor said that the man should not hide his crime. The man gave
    himself up to the police in Seattle, and was sent to California, where he was put in a jail. The man was spiritually tormented,
    but he became well after he went to jail. This is another story that came from the roadside mission.
- speaker: Interviewer
  text: Do you think you might have been dragged into gambling and other bad things if you were not connected with the church?
- speaker: Respondent
  text: Yes, because it was dangerous for a young man to be alone without his family. When I stood at the street corner I
    used to say, "There is a place north of the Rocky where the water divides. One which comes this way flows into the Pacific
    Ocean, but if it goes the other way it flows into the Mississippi. You are only in your twenties, so it does not hurt
    to come to the church. Just come and see." Many people joined the churches in Seattle. Not only the churches but the whole
    society became good. I have put up a sign that I am a Christian. There is an election every year in the Nikkeijin Kai.
    I have served 6 years before the war and 29 years after the war, total of 35 years. There are 500 members in the Nikkeijin
    Kai. Among them are members of Tenrikyo, Seicho-No-Iye and Buddhists among them. Christians not only propagate its teaching
    but serve in the community. Members of the Tenrikyo church cut the lawn in front of the Nikkeijin Kai office every month.
- speaker: Interviewer
  text: When did you start the Nikkeijin Kai?
- speaker: Respondent
  text: In 1935. I served 6 years since then till the war broke out. After coming back from the camp I organized a relief
    association and sent goods to Japan for 7 years. It was after we came back from the camp and we didn't have much money
    but we sent $20,000 to RARA. We asked women's associations of churches to collect old clothes, and sent 330 tons of clothes
    to Japan. After that I reorganized the Nikkeijin Kai.
- speaker: Interviewer
  text: What does R.A.R.A. material mean?
- speaker: Respondent
  text: Japan was in bad shape after the war. People did not have food to eat nor clothes to wear, so we collected old clothes
    and sent them to Japan. The U.S. government did not allow Nikkeijin Kai to send materials directly to Japan. We had to
    take them to the organization called RARA which in turn sent them to Japan. Some Japanese in Seattle complained that it
    looked like Americans sent the goods to Japan. I said, "Even if one person could wear a sweater, it does not matter if
    Japanese in Seattle sent it or not." In the meantime I received a letter of appreciation. "See. You complained, but they
    knew who sent them." So they were all happy.
- speaker: Interviewer
  text: What is R.A.R.A. abbreviation of?
- speaker: Respondent
  text: I don't remember what it was, but they distributed goods especially to orphanage and to poor people. American Friend
    Service Committee collected the material. We took the things we collected to them, and they sent them to Japan.
- speaker: Interviewer
  text: What did you do after you worked as a schoolboy?
- speaker: Respondent
  text: My father was a merchant in Japan, and he sent me some merchandise for me to sell here. In 1909 there was the Alaska
    Yukon Exposition in Seattle, so I opened a store in it. The business was pretty good, and they sold good. Then Christmas
    came, so I sold goods in downtown, and they sold good. I leased a store and sold such merchandise as Japanese flower vase
    and boxes. The business was good only in December, but I had no business the rest of the time. In 2 years I was in debt.
    I was a Christian then, so I decided to work and pay back the debt. I became a waiter at a restaurant.
- speaker: Interviewer
  text: Was it a white restaurant?
- speaker: Respondent
  text: No, it was a Japanese restaurant. I worked and paid back all the debts.
