collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I was born on December 3, 1888, at Takaishimura, Takaoka-gun (Tosa-shi, Kochi-ken currently). My family were half-time
    farmers. We had stone-cutting business, too.
- speaker: Respondent
  text: I was five or six years old at the time of the Sino-Japanese War. I remember some stories I heard from other people.
    I still remember a soldier's cap with holes of bullets.
- speaker: Respondent
  text: Since the Russo-Japanese War was ten years after the Sino-Japanese War, I was pretty aware of what was going on. However,
    I do not seem to remember anything particularly.
- speaker: Respondent
  text: World War I was in 1914, wasn't it? I did not go to the war, so I have nothing to talk about.
- speaker: Respondent
  text: I know about the Manchurian event, but I cannot tell when it happened.
- speaker: Respondent
  text: Nothing in particular happened as happy events. I must have had an ordinary life.
- speaker: Respondent
  text: Though I did not experience the Kanto earthquake personally, I heard about the aftereffects such as a tidal wave and
    epidemic.
- speaker: Respondent
  text: My family's religion was the Shingon Sect of Buddhism. The Shingon Sect is close to the Nichiren Sect and Zen Sect.
    The teacher of the Shingon Sect is Kobo Taishi. I understand that there are quite a few believers of this sect in Shikoku
    more than any other part of Japan.
- speaker: Respondent
  text: I heard a little about Christianity when I was little although I did not have any direct contact with Christians.
    No missionaries came to our town. I remember somebody told me that Christianity would bring happiness to one's bosom when
    one passes away.
- speaker: Respondent
  text: I have about eight years of education.
- speaker: Respondent
  text: I left Japan for the United States in 1906. It was not so long after the Russo-Japanese War, the country was poor
    and the government encouraged people to go abroad to make money. I mean Hawaii by going abroad. At that time people went
    to Hawaii mostly. Those who could come to the mainland were either those who were invited to come or those who were specialists
    in certain fields and came here to research. In my case it was rather easy. I could come to the mainland after stopping
    over in Hawaii for two days because of the bad weather.
- speaker: Respondent
  text: The reason why I came to this country was to make money. I had one brother and two sisters. I am the second but the
    oldest son.
- speaker: Respondent
  text: As my father had a debt, he sent me to this country to make money. I sacrificed myself for my father for the first
    ten years in the States. I paid all the debt back. At that time it took it for granted that a child would become a sacrifice
    of his own family although such a thing is almost inconceivable today. My father seemed to have got into debt in one year
    when he failed in raising silkworms.
- speaker: Respondent
  text: I was in Hawaii for two days. People at a Japanese inn on the island took care of paperwork necessary to come to the
    mainland. They first asked us if we wanted to work in Hawaii or on the mainland. People from Kochi-ken seldom worked on
    the island. We got our passports stamped in Hawaii and we were all set when we came to the mainland. It was easy to come
    to the United States, but we needed some money.
- speaker: Respondent
  text: We took a boat named 'Iminsen' (immigration ship) from Japan to Hawaii which, I think, was about 12,000 tons. There
    were three or four of this type of boats. From Hawaii we took a different boat, 'Alameda' which was rather small. People
    who were aboard from Japan were mostly people like myself, who wanted to work here to have money. Most of the economy
    class passengers got off in Hawaii. I don't know the passengers of the first and second classes. On the ship we had a
    light play put up by crews once or twice as recreation. It took twelve days from Japan to Hawaii and another eight days
    from Hawaii to the West Coast.
- speaker: Respondent
  text: I was not particularly surprised when I first landed. I just thought that America was a huge country. Different kinds
    of food, clothes, language, etc., did not bother me so much.
- speaker: Respondent
  text: I thought San Francisco was a nice town since it was before the earthquake. The earthquake came after six months.
    Anti-Japanese feeling was prevalent at that time and kids used to throw rocks at us. I had to run away. There was no other
    way I could do. It happened frequently. Other Japanese, too, had this experience. It was really vexing, but I could not
    have gained upon them.
- speaker: Respondent
  text: I did not work in San Francisco, I just stayed overnight there and the following day I took a boat down to an island
    near Stockton. A friend of mine gave me an address down there. When the owner of the inn knew where I was going, he said
    that it would be dangerous to go down there. I got to the place about midnight and spent the night at a warehouse. I remember
    it was still pretty cold. I think it was about the middle of March. I was with another Japanese.
- speaker: Respondent
  text: Next morning we heard chicken, which made us realize that people were around. We were pleased and waited until the
    dawn. We met an Italian to whom we showed the address. He did not understand English either but took us to a nearby Japanese
    camp although this was not the one we were supposed to go. In this camp we met some people we knew. They sent a messenger
    for us and we took a boat again to go to the other camp. Even within the island it was easier to go by boat.
- speaker: Respondent
  text: Though I was seventeen, I did not particularly feel helpless. I did not have any trouble with the Immigration Office.
    I got the passport and other papers in Hawaii before I came to the mainland.
- speaker: Respondent
  text: I did not have any particular problem when I first came to this country. Most of the time I was with other Japanese.
    I had trouble with English only when I went shopping. It was really inconvenient.
- speaker: Respondent
  text: In the first camp we worked in the onion field for a month or so. The land that we did the work on was managed by
    someone. After a month or so we went to a neighboring island and we had a job of digging potatoes. We used a boat to go
    around. It was about August when we finished up with digging potatoes. Then we came up to Sacramento for picking something
    which was rather popular among the young. The work lasted until the middle of September. We went to pick grapes next.
    When I was picking grapes, I suffered from beriberi. My friend also had beriberi. We were hospitalized in a hospital managed
    by someone in Sacramento. We were in the hospital for about a month. When we got well, we spent the New Year's Day at
    a camp on Riverside where my friend's friend was.
- speaker: Respondent
  text: In spring everybody went to work. So I followed them although my legs were not strong enough. Our boss was kind and
    gave me an easy job of getting rid of birds from the field using a rifle where the seeds of barley were just sown. While
    I was working on this, which was about the end of March, water started covering the island. The island where I was was
    the last one to be covered by water. We waited at a warehouse for four or five days, hoping that water would subside,
    but it never did. We decided to look for other jobs. We went to a Japanese camp in San Leandro. There we picked something
    and green peas, and planted tomatoes. Though my legs were still weak, I managed to work somehow.
- speaker: Respondent
  text: After a while I decided to go back to Sacramento since there was not much work left there. One friend, however, begged
    me not to leave, for he did not like to be left alone. It was about the end of June or July. This friend, myself and one
    other guy tried the work of chopping wood, which was rather an unusual work in midsummer.
- speaker: Respondent
  text: For cherry trees, for instance, we could earn only fifty cents per tree after we chopped down the tree, dug the root
    up, cut the tree into pieces of certain size and piled them up. It was quite a job, but they paid just fifty cents per
    tree. Today nobody would do this.
- speaker: Respondent
  text: Though the pay was very meager, I could earn $1.50 if I worked on three trees a day, which was equivalent to regular
    wage per day at that time. I did this work for a while and then came out to Sacramento. It was about the fall. There was
    not any job around in Sacramento.
- speaker: Respondent
  text: A friend of mine who was playing around used to come to my place for dinner. I could not help feeding him although
    I did not have much.
- speaker: Respondent
  text: I asked him if he liked to work with me. He said that he would. We were coming along. We formed a new gang and went
    to Naples near Santa Barbara as a section gang for the railroad. There were somewhere between twelve and fifteen people
    in this gang. The weather was nice out there and the work was not so hard. However, we soon found that the rail was rolling
    so much that it was really dangerous to work on it. We asked our boss if he would pay us for the work we did for the first
    few days. The boss would not. Thus we ran away after three days. The boss was a Japanese. Two other young Japanese asked
    us if they could come along and four of us left the camp together.
- speaker: Respondent
  text: The boss must have had trouble in carrying on the work after we left. Finally we went down to Los Angeles. We worked
    in the area between Huntington Beach and Santa Ana for about half a year, cutting celeries. I cannot remember what they
    were doing, but there were many Japanese in that area. We had a so-called commission boss.
- speaker: Respondent
  text: He called us up the night before about where we were going to work tomorrow. We took lunch with us to the work. I
    had the New Year's Day down there that year. Before long the celery season came to the end, then we went to pick oranges
    and lemons. Before I finished the work, I went to Gardena to help my friend. At that time there were strawberry fields
    in Gardena. When the strawberry season was over, I was asked to come to the mountain area in Venice.
- speaker: Respondent
  text: On the fairly large land a Japanese was growing barley, and potatoes, onions and corn in the intervals of barley.
    I worked for this guy for about half a year.
- speaker: Interviewer
  text: Did you get married while you were in the United States?
- speaker: Respondent
  text: I received a telegraph from my family saying that my father was very sick. I went back to Japan right away. However,
    my father had already passed away before I got there since I had to go home by boat. I could not come back to the United
    States immediately.
- speaker: Respondent
  text: While I was staying in Japan, I married my present wife. It was 1917. It was eleven years after I left Japan. My wife
    came to the United States six months after I came back. She came to Riverside first and both of us worked there.
- speaker: Interviewer
  text: Did your wife go to the Los Angeles area with you?
- speaker: Respondent
  text: No, it was not much after I came from Japan that I went to Los Angeles. I think it was 1907 or 1908.
- speaker: Respondent
  text: In Japan most of the marriages at that time were arranged by parents or relatives and mine was, too. My friend's father
    arranged it for me. We did not go to the shrine nor temple for the ceremony.
- speaker: Respondent
  text: I remember that our go-between acted as a chairman at the party. He gave a short speech and we exchanged nuptial cups.
- speaker: Interviewer
  text: Your marriage was not so-called picture marriage. Do you remember any problems you heard about this kind of marriage?
- speaker: Respondent
  text: I understand that there were quite a few problems. Since they did not see each other before marriage other than through
    picture, there must have been some unexpected things. I heard some cases in which they got separated or either wife or
    husband left the other partner.
- speaker: Interviewer
  text: Did you hear a case like this among your friends?
- speaker: Respondent
  text: No, not among my friends.
- speaker: Interviewer
  text: Then, most of these marriages were successful, aren't they?
- speaker: Respondent
  text: Less, I think.
- speaker: Interviewer
  text: Have you ever become homesick?
- speaker: Respondent
  text: No, I did not become homesick.
- speaker: Interviewer
  text: Did you receive any discrimination while you were working in the field here and there?
- speaker: Respondent
  text: No, not particularly. It was only in a town when somebody threw stones at me. San Francisco was particularly bad.
- speaker: Respondent
  text: I did not have time to learn English for the first ten years. Later I went to school for a few months in winter when
    it could not work. I did this for a couple years.
- speaker: Respondent
  text: I was in Stockton when I received the telegraph about my father's sickness. I was in southern California for the first
    couple years, and later I worked in the Stockton and Sacramento area although I did not go back to the island where I
    worked earlier. My income at that time was about a dollar fifty per day. This was not enough in winter when the job was
    scarce.
- speaker: Respondent
  text: In a regular camp we spent twenty cents for food. I guess we paid about twenty-five or thirty cents for our room per
    day. When I worked here and there, I stayed in the boarding house. In one house I remember that I paid fifty cents just
    for the room, although it was really nice one. Even when I ate at restaurants, I did not need more than twenty or twenty-five
    cents for food a day.
- speaker: Respondent
  text: I built a house by myself in 1919. It was the year after my wife came to the United States.
- speaker: Respondent
  text: In 1919 we joined the Japanese settlement in Merced, where I worked before when I was still single. The colony was
    started by Kyutaro Abiko of the Nichibei. The colony had 2500 acres. It was 175 dollars per acre. With regard to the payment,
    we were supposed to put twenty percent downpayment which was thirty-five dollars and pay the rest for next eight years,
    which meant we made payment of about 50 dollars every month. Thus, it was rather easy to buy land. By the name of Mr.
    Abiko, the American bank took charge of selling the land.
- speaker: Respondent
  text: It looked easy to start but the problem was that we could not get many people interested in this. The other Japanese
    colony in Cortez was very successful.
