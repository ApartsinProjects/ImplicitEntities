turns:
- speaker: Respondent
  text: I used to see him when he used to come and visit. He would sit there and my mom would run out and get an isho of sake.
    She'd go to the kitchen, heat it up, bring it in, and he'd be sitting in the living room drinking sake. Pretty soon he
    goes, "clunk," and my mom brings a futon, just covers him.
- speaker: Respondent
  text: Another thing was, he surprised a lot of the people, the occupation people in Japan, the American occupation, because
    he spoke English. But he dressed like an old Japanese farmer. He's just standing there and people are talkin', he could
    understand what they're saying.
- speaker: Interviewer
  text: So both your grandpa and your mom were very, kind of a head of their time almost.
- speaker: Respondent
  text: Oh yeah. My mom was way ahead of her time. You didn't see any Issei ladies driving a car! The husband always drove
    the car.
- speaker: Interviewer
  text: Right, right. What kind of person was your dad?
- speaker: Respondent
  text: He was very quiet. He didn't talk very much. When he did I'd have to listen. He was a concert violinist. I don't know
    how he became a concert violinist but my mom was the piano accompanist. That was in Seattle, he worked at a jewelry store.
    And he did this violin thing, so I heard. And when we moved to L.A., I guess he opened a fruit and vegetable stand in
    a store. But he taught violin to people that wanted to learn. And they used to come to the house. And he used to teach
    violin.
- speaker: Interviewer
  text: Do you remember hearing that?
- speaker: Respondent
  text: I remember that. And the thing was, he tried to teach me. Never try to learn from your dad [laughs].
- speaker: Interviewer
  text: That didn't work so well?
- speaker: Respondent
  text: He tried for two years and I still don't know how to play the violin. But you know, he's really stern. I had to practice.
    And if I made a mistake, you know the Japanese [scowls].
- speaker: Interviewer
  text: It's worse for your own child. You're stricter, right? And then your mother, too, was a pianist - she played as well?
- speaker: Respondent
  text: Yeah I guess she played. I wasn't aware then because I was too young. When we were living in Hollywood, she was working
    [as a] domestic. But like I said, she spoke English so you know, she could go anywhere.
- speaker: Interviewer
  text: And did you have siblings?
- speaker: Respondent
  text: I had one sister. Yeah. She passed away, so.
- speaker: Interviewer
  text: Was this your older or younger sister?
- speaker: Interviewer
  text: And so what kind of community were you growing up in in Hollywood?
- speaker: Respondent
  text: Well it was a pretty nice community, it was mostly caucasians. You know, and there were about five or six Japanese
    families there. And we even had a Chinese movie star. I don't know if you've ever heard of Anna May Wong? She lived on
    our street. And we had this family, became famous. John Aiso. He was the judge for O.J. Simpson. He lived a couple of
    doors up. It was a nice neighborhood, you know. And I never felt discriminated against, it was nice, you could just go
    play with the caucasian kids, we played football, kick the can.
- speaker: Interviewer
  text: You were friends with all of these other kids in the neighborhood.
- speaker: Respondent
  text: Yeah. But, you know, there weren't too many kids my age. So it was kind of hard. There was one kid that was my age,
    we kind of grew up together, and his parents sent him to Japan.
- speaker: Interviewer
  text: So everyone was mostly older than you?
- speaker: Respondent
  text: Yeah. And my sister was no fun because I don't want to play girl's games all the time. But I did; hopscotch, Jacks,
    and jump rope. But usually, I fend for myself and I would pack a lunch and I'd go hiking up the Hollywood Hills. And I
    used to hike up to the Griffith Park Observatory. That was my favorite place to go. And once or twice I hiked up to the
    Hollywoodland sign. And I used to hike up there by myself because there's nothing else to do.
- speaker: Interviewer
  text: So you just kind of enjoyed being on your own.
- speaker: Respondent
  text: Yeah, I guess I'm pretty easy to accommodate 'cause I just do my own thing.
- speaker: Interviewer
  text: So at the time of, say 1941, your mom was working as a domestic and your dad had the fruit and vegetable stand. Did
    you feel like it was a pretty comfortable life?
- speaker: Respondent
  text: I felt comfortable. I guess my mom felt comfortable, my dad had to work pretty hard. But as far as I could remember,
    they seemed to be pretty happy, We weren't rich or anything, but we made out and never starved and always had clothes.
    So, yeah, it was a good life, I thought.
- speaker: Interviewer
  text: So what do you remember about the day Pearl Harbor happened?
- speaker: Respondent
  text: Oh, that was terrible. I had these Caucasian friends that we would go fly model airplanes. And they took me down to
    Gardena. And we're flying model airplanes and all of a sudden I hear somebody say, "The Japs bombed Pearl Harbor!" I go,
    where the heck is Pearl Harbor? I didn't know what Pearl Harbor was. And everybody kept saying this and I felt kind of
    bad because I'm Japanese, you know. And so my friends felt it, too. So they packed up and we left. But it was kind of
    weird.
- speaker: Interviewer
  text: So then you went home and your parents -
- speaker: Respondent
  text: Well, my dad, he kind of blamed Roosevelt, because he said they're the kind of hard on Japan with all the embargoes
    and all this stuff. And so, that's just what he told me one time. I was too young. It's just that, one day I'm an American
    next day I'm a "Jap." And that was a weird feeling for me because Monday after when I went to school, it was horrible.
    You know, all the kids are saying "Jap this, Jap that." You know I just felt like, you know, 'cause I am one. But I survived.
- speaker: Interviewer
  text: Did the kids at school treat you any differently?
- speaker: Respondent
  text: Not really I didn't feel it.
- speaker: Interviewer
  text: Because even though you're Japanese - your friends didn't teach you like the enemy, if you will.
- speaker: Respondent
  text: Well, some of the kids looked at me kind of funny, you know. I was just starting to go to junior high school.
- speaker: Interviewer
  text: And you were one of the only Japanese American kids in the class?
- speaker: Respondent
  text: Yeah. There weren't too many in there.
- speaker: Interviewer
  text: And so did your mom and dad have a conversation, either with you and your sister, or do you remember?
- speaker: Respondent
  text: I don't remember them saying anything except they talked about Japan, and it wasn't their fault. They had to do it.
    You know, that Japanese propaganda, so. Other than that it was a terrible experience for me. All of a sudden, I'm the
    enemy. And the thing of it is like, I didn't feel any discrimination at all while I growing up in Hollywood. Except one
    time when I was in grammar school, this kid used to tease me about slanty eyes and all this stuff and I told him to quit
    and stop it but he kept going, so I punched him out [laughs]. And he goes running home, brings back his mom and dad. He
    has a black eye. And in the meantime they call my mom, and I knew I was in trouble. But I told 'em I told that guy, "Leave
    me alone, to just be quiet." So he got in trouble, not me.
- speaker: Interviewer
  text: Oh, that's good.
- speaker: Respondent
  text: Other than that I had no problems with it. I used to sit around with my Italian friends and when we were supposed
    to go to camp he says, "Well, I guess we're going to be next." It never happened, right? [laughs]. I don't know why they
    didn't do it to the Germans or Italians. That's what I kept thinking, you know. But it's just that we're different. We're
    talking and we didn't know why we had to go to camp.
- speaker: Interviewer
  text: Something I always think is interesting is you know, December 7th. The holidays were coming up right after, and it's
    Christmas. Do you remember anything about that time?
- speaker: Respondent
  text: No, I don't really remember. We just had Christmas, I guess, as usual. My uncle was there, too. You asked [what are]
    some of the fond memories? My uncle had this Ford, rumble seat, and I used to love to ride the rumble seat and we'd go
    to the beach, you know, I'm sitting in the back. I used to love to sit in that rumble seat, catch the air, you know?
- speaker: Interviewer
  text: Can we get your parents names and then your sister's name?
- speaker: Respondent
  text: My mother's name was Tomiko. And my father's name was Eiro. My sister's name was Lillian, Yoshiko. It's another thing.
    My mom when she registered me for school it was my Japanese name. My English name wasn't even included. Yeah so all through
    my childhood, I was Eiichi Yamashiro. And try to go to school and have the teacher call the roll.
- speaker: Interviewer
  text: So when did you pick up Richard?
- speaker: Respondent
  text: After camp. Yeah I go, this is too much. So I changed my name to Richard E. Yamashiro.
- speaker: Interviewer
  text: So you always had Richard as a name.
- speaker: Respondent
  text: Yeah, it's my middle name. I just switched it.
- speaker: Interviewer
  text: But in camp I would assume everyone would be okay calling you Eiichi.
- speaker: Respondent
  text: Yeah, but you know, we had caucasian teachers. And they couldn't say Eiichi.
- speaker: Interviewer
  text: So at the time of the executive order, when that came out, what did your family have to do to prepare for that?
- speaker: Respondent
  text: Well, my dad had to get rid of his business. I think that was really hard for him 'cause he worked so hard. I didn't
    realize this until I was much older but that was the hardest thing for him. And that made him kind of bitter, too. Because
    he felt, that's why he took me back to Japan. He says, "I want to go back to my own country, where this will never happen
    to me again." And I didn't understand that at that time because I said, "Dad, I don't want to go to Japan because that's
    your country, not my country. I was born and raised here." He said he didn't care. So him and me became, we were at odds
    for a long time, you know, 'cause I didn't go to Japan. But at 16 I didn't have a choice, I was a minor.
- speaker: Respondent
  text: Yeah, and my mom, she was busy sorting things out and trying to sell stuff. But it was horrible. I remember people
    coming in and offering peanuts for your stuff. I don't know if mom did it but I remember some people who had these Japanese
    dish sets, they'd take them in the back and they'd break them all into pieces 'cause they don't want to sell it for. But
    my mom had enough sense to take all the family pictures and stuff and bring it with us.
- speaker: Interviewer
  text: So she didn't burn anything.
- speaker: Respondent
  text: No she didn't burn. I don't think she could do it 'cause that had a lot of memories for her. So, my son has album
    or I would've brought it and showed you.
- speaker: Interviewer
  text: And did your dad's business have a name?
- speaker: Respondent
  text: No it was in a store. Yeah. And he ran the fruit and vegetable part of it. The other guy had a grocery part.
- speaker: Interviewer
  text: Where was that located?
- speaker: Respondent
  text: Hollywood. On Sunset Boulevard.
- speaker: Interviewer
  text: When you actually had to leave for camp, did you go to an assembly center?
- speaker: Respondent
  text: No. See, my uncle lived by the Hollywood Bowl. And so we had an option of going with him, or him going with us. And
    they said that his group would go straight to Manzanar. Our group would go to Santa Anita. And she says, "Oh, I don't
    want to move twice." And so opted to go with him straight to Manzanar, which was smart.
- speaker: Respondent
  text: I don't remember the date, but I remember they put us on a bus, Greyhound bus and pulled the shades down so people
    wouldn't see us, I guess or I don't know. I couldn't understand why we had to pull the shades down. You know whether they
    didn't want people see us or they didn't want us to see them.
- speaker: Interviewer
  text: What was the mood like for your family at this time?
- speaker: Respondent
  text: Well, my dad was kind of upset. My mom was, but she kinda - you know the Japanese gaman and you know, all that stuff.
- speaker: Interviewer
  text: And your sister at this time, how old is she?
- speaker: Respondent
  text: She's two years older than me. But she didn't say anything. She's just the quiet type.
- speaker: Interviewer
  text: Did you communicate with your parents mostly in English or did you speak Japanese?
- speaker: Respondent
  text: Half and half. My mom was speaking English and all of a sudden she'd switched to Japanese back to English. You know,
    she couldn't just say something she would tell me in Japanese. I'll tell you something funny. When I was in the army,
    she used to write me letters and I'm reading the letter and all of a sudden I go like this [Richard motions turning paper
    clockwise]. And my friends are saying, "What are you doing?" I says, "Well, my mom starts off in English and then when
    she gets stuck she writes in Japanese so I gotta tip it over like this" [laughs].
- speaker: Interviewer
  text: So did you grow up pretty much bilingual? Did you speak Japanese?
- speaker: Respondent
  text: Oh, yeah. They made us go to Japanese school. That was the routine for the Japanese who were living around there because
    they sent all their kids to Japanese school. And I used to hate it because Saturday we had to spend all day at Japanese
    school. And all the other kids are playing and I'm getting on the bus going to Japanese school. And Japanese school was
    like Japan, you know with the ruler and stuff? I hated it, but you know, didn't have a choice. But it kind of helped to
    learn Japanese 'cause it came in handy later when we went to Japan. But I'm starting to forget most of my Japanese because
    I have nobody to talk to now. I have nobody to talk to because for me, my mom was alive. I could talk to her, when my
    mother in law was alive, I could talk to her. When I worked at Hewlett Packard I had a bunch of Japanese war brides and
    I could talk to them. My kids don't speak Japanese.
- speaker: Interviewer
  text: How many kids do you have?
- speaker: Respondent
  text: I have three boys. I always wanted a girl, which I never got. And my youngest son got married and he gave me three
    granddaughters. My granddaughters are something else.
- speaker: Interviewer
  text: So going into Manzanar, what were some of the most vivid memories that you have of actually arriving and seeing the
    landscape?
- speaker: Respondent
  text: You know when you get there you think wow, what a desolate place in the middle of the desert. And the experience of
    going through the barbed wire fence and having a guard towers there was something else. For a young kid you think, what
    am I doing here? So it was shocking.
- speaker: Respondent
  text: It was shocking! You know, I'm not used to living in a barbed wire compound with guard towers, with weapons pointed
    at you. But like I said, I got used to it. I even snuck out [laughs].
- speaker: Interviewer
  text: When did you start doing that?
- speaker: Respondent
  text: It was probably about a year. Probably about a year or two later.
- speaker: Interviewer
  text: Do you remember your block and your barrack?
- speaker: Respondent
  text: Yeah. Block 34. Building five. I think it was "A."
- speaker: Interviewer
  text: What did you do on some of those first days? You were all with your parents, how did you kind of manage to live in
    the barrack?
- speaker: Respondent
  text: It was kind of hard because when we first got to Manzanar, they were short of barracks. And so they stuck us in this
    room with another family, just one of the little rooms and then they put a blanket in between, and there's four of us
    and three of them, because that was the first baby born in Manzanar. It was something else.
- speaker: Respondent
  text: And then had to get used to going to the bathroom. And I think it was hard for my mom because they're not used to
    going out there and they have four or five commodes all lined up. And you just sit there with your neighbor, you know?
    Guys, you get used to it. But I think my mom and them had a hard time with that. You're taking a community shower, you
    know. That didn't bother me.
- speaker: Interviewer
  text: Yeah for the women it was harder.
- speaker: Respondent
  text: Yeah I think for the women it was difficult. A lot of them had the chamba because in Manzanar it snowed. And if you
    wanted to go to the bathroom you had to get out of the barracks and walk down to the bathroom. So that became a common
    thing. That was hard on my parents, I think. My mom.
- speaker: Interviewer
  text: Absolutely.
- speaker: Respondent
  text: It was tough. They could at least put partitions but no, it's just commodes lined up.
- speaker: Interviewer
  text: Very dehumanizing.
- speaker: Respondent
  text: Very, very much.
- speaker: Interviewer
  text: Did your parents end up working in camp?
- speaker: Respondent
  text: In Manzanar my father became a policeman. So I couldn't get into trouble [laughs]. And my mother, I think she worked
    in the mess hall. I'm not sure, most of the people worked in a mess hall, so. [But] yeah he became a policeman. So I had
    to behave myself.
