collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Kokan Oshiro.
- speaker: Interviewer
  text: How much schooling did you have?
- speaker: Respondent
  text: I had 8th grade education.
- speaker: Interviewer
  text: Where is your birthplace?
- speaker: Respondent
  text: It is Okinawa.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1902. I will be 74 in May.
- speaker: Interviewer
  text: What was your father's profession?
- speaker: Respondent
  text: He was an elementary teacher for about 3 to 4 years. Then he worked at the village office as an officer. In those
    days there was the land adjustment, and my father was in charge of measuring each land in our village for the tax purpose.
    In olden days only farmers could own land. The land was allotted according to the size of the family. Every 10 years there
    was a readjustment of allocation. The land included good land, bad land, forest and everything. Villages that had small
    population had small allocation and villages with large population had big land allocated. It was still the same way after
    the Meiji Restoration. My father was in charge of measuring each lot in our village for the tax purpose.
- speaker: Interviewer
  text: Why did they have readjustment every 10 years?
- speaker: Respondent
  text: It was like today's Communist policy. The government policy was like that in those days. That may be because the poor
    villages should not stay poor all the time. Large families were allocated big land. Some families with many small children
    and a few adults could not cultivate the land and they had to pay tax according to the size of the land, so they returned
    some of the land. On the other hand, families with many adult workers received more land.
- speaker: Interviewer
  text: Whose policy was that?
- speaker: Respondent
  text: It was the policy of Okinawa government.
- speaker: Interviewer
  text: Was there a feudal lord in Okinawa in those days?
- speaker: Respondent
  text: Okinawa was ruled by a king. In olden days there was a rivalry of powerful leaders in Okinawa. Gradually they were
    unified into 3 tribes, Northern, Central and Southern. In those days they were trading with China, Malaya and Thailand,
    but mostly with China. The leader of each tribe was called Ohnushi (Big lord). At that time a messenger came from China
    saying that China will make the Southern lord a king. I think that was China's diplomacy.
- speaker: Interviewer
  text: Was Okinawa unified since then?
- speaker: Respondent
  text: The son of Tametomo Minamoto married the Southern lord's daughter. Since Tametomo's son became the king of Central
    Tribe and won the wars, the Central Tribe became strong and conquered the Southern Tribe and unified the three tribes.
    After that the 'Sho' family has been ruling Okinawa, and the present family is the third one. When a king became extravagant
    he was defeated in election. There was election in Okinawa since the olden days. The ancestor of the present 'Sho' family
    was a farmer who came from an island in North and became King Shoen.
- speaker: Interviewer
  text: Does that family still continue to exist?
- speaker: Respondent
  text: Yes, it does. The descendant of King Shoen is still living. An American historian says that Okinawa was the model
    for Japan. Tokugawa government followed the example of Okinawa. Japan learned a lot from Okinawa. Okinawa was a territory
    of Satsuma clan in olden days.
- speaker: Interviewer
  text: Did Satsuma clan actually conquer Okinawa?
- speaker: Respondent
  text: No, they couldn't because it was too far away. If Satsuma tried to conquer Okinawa they had to go there by ship. Then
    they would have been defeated at the port. Gradually they conquered southern part of Ryukyu. Then they attacked from the
    north and finally they conquered Ryukyu.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: It was Hideyoshi Toyotomi's time. After Satsuma started governing Ryukyu, officers of Satsuma Clan started coming
    in to Okinawa. Under Tokugawa government Satsuma clan could not trade with foreign countries, but through Okinawa they
    traded with China and crossing the South Seas they went as far as Europe. They took all the good merchandise back to Satsuma
    and sold them so they made much money. When Hideyoshi Toyotomi conquered Korea, he ordered Okinawa to send soldiers but
    Okinawa refused, so with that as an excuse Hideyoshi conquered Okinawa. Since then Okinawans could not own weapons. When
    the British fleet came to Okinawa they said Okinawa is an unarmed peaceful island. I think missionaries were in Okinawa
    since early days. I think Uragami in Nagasaki was named by a missionary. There is a place with the same name in Okinawa
    and on Miyako Island. A missionary named lived in Okinawa for about 10 years. In those days all the religion except Shingon
    Sect was prohibited so he could not evangelize, but Okinawa was influenced by Christianity.
- speaker: Interviewer
  text: Was your father an officer of the village office?
- speaker: Respondent
  text: Yes, he worked for the village office. Then he came to America.
- speaker: Interviewer
  text: How long did the reallocation of the land last?
- speaker: Respondent
  text: Okinawa became one of Japan's prefectures around 1879, so I think it continued until then. As there was a regulation
    in Okinawa that land belonged only to farmers, descendants of 'samurai' could not buy or own land.
- speaker: Interviewer
  text: Then there was not much difference between the rich and the poor, wasn't there?
- speaker: Respondent
  text: There seemed to have been difference between the rich and the poor from olden days. The land allocation system was
    made later. The price of land was very high, but when the farmers made money they bought the land. Rich people in the
    country expanded their land that way.
- speaker: Interviewer
  text: Could they buy land at your father's time?
- speaker: Respondent
  text: They couldn't buy land any more then. There was land allocation until Okinawa became a prefecture in 1879. At Meiji
    Restoration time when clans were abolished and prefectures were established many samurai who were in the country renounced
    their clan and became civilians so that they could receive land. My father's grandfather was one of them. He renounced
    the 'samurai' clan and became a farmer.
- speaker: Interviewer
  text: Were those who worked at the village office descendants of 'samurai'?
- speaker: Respondent
  text: No, they were farmers. The village master represented the lords of the land.
- speaker: Interviewer
  text: Did the village master get paid from the village office?
- speaker: Respondent
  text: The village office paid his salary.
- speaker: Interviewer
  text: Did he own land?
- speaker: Respondent
  text: Yes, he did as he was a farmer. In Okinawa a person who was elected as the lord of the land 3 times received the treatment
    of a minister. He could not become a 'samurai' but he had a higher position than a regular 'samurai'.
- speaker: Interviewer
  text: Were there 'samurai' also?
- speaker: Respondent
  text: Yes, there were many 'samurai'. There were 'samurais' who had jobs and those who did not have jobs but were fed and
    received salary.
- speaker: Interviewer
  text: Did they serve their feudal lords?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: The system was much different from that in Kagoshima, wasn't it?
- speaker: Respondent
  text: The farming system was much different from that in Kagoshima.
- speaker: Interviewer
  text: Didn't the people in Okinawa receive better treatment?
- speaker: Respondent
  text: It might have been good, but after Okinawa was occupied by Kagoshima people in Okinawa had to pay tax to Kagoshima
    as well as Okinawa. Even after the Meiji Restoration the system was not reformed for a long time, so the people had to
    pay much tax. Every time people ran for the Diet they promised to reduce tax but they could not do it for a long time.
    It seems that it is better after the war. Sugar was produced in Okinawa, yet people in Okinawa had to pay the consumption
    tax. Until recent years Okinawa suffered from heavy taxation.
- speaker: Interviewer
  text: What kind of a person was your father?
- speaker: Respondent
  text: I was separated from my father when I was 3 years old, and when I arrived in San Francisco in August, he had passed
    away in June of that year so I don't know him.
- speaker: Interviewer
  text: Where did your father come to?
- speaker: Respondent
  text: He went to Hawaii first and then came here. He went to Hawaii in 1904 and came to America in 1905.
- speaker: Interviewer
  text: Then you don't know about your father, don't you?
- speaker: Respondent
  text: I just heard about him from his friends.
- speaker: Interviewer
  text: What was your father doing?
- speaker: Respondent
  text: He was farming in Imperial Valley. He was the first one from Okinawa to go to Imperial Valley. For about 2 to 3 years
    he did not make money but later with 3 other people, his oldest brother, Mr. Nakamura and Mr. Ohta as partners leased
    40 acres and farmed. Around 1910 they made profit and each man saved about $3,000, so my uncle said, 'Let's go back to
    Japan.' My father said he would not go back to Japan until he saved more than $10,000, so his brother went back to Japan
    alone. Mr. Ohta worked in a produce market for a while but later opened Star Market in Los Angeles with Mr. Hirashiki
    as his partner. He is one of the most successful men from my prefecture. He managed the store until he was evacuated.
    Mr. Nakamura was a son of the wealthiest farmer in Okinawa. He came to America to avoid the draft. As he was from a rich
    family he didn't know the value of money, so he spent all the money in Los Angeles.
- speaker: Interviewer
  text: What had become of him?
- speaker: Respondent
  text: He was farming in Fresno but he became crazy from drinking too much and finally went back to Japan and died there.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: He went to Los Angeles and started a hog-raising business as it seemed promising, but they could not get garbage from
    the City. Then the City of Los Angeles made a regulation that they could not raise hogs within a certain distance from
    the city. The hog raisers got together and took it to the court but they lost. As there was no space big enough to raise
    hogs he moved the hogs to Imperial Valley by trailers. He leased land, fenced it and put hogs there but as Imperial Valley
    is hot the hogs died one by one, and he lost all the money. Since then he had been poor. The year he died he made profit,
    but as he died before I came here the money was frozen by the government, so after I came here I had to go to court many
    times to claim it.
- speaker: Interviewer
  text: What about your mother?
- speaker: Respondent
  text: She came to America with me.
- speaker: Interviewer
  text: How many brothers and sisters do you have?
- speaker: Respondent
  text: Just two of us.
- speaker: Interviewer
  text: You were brought by your mother, weren't you?
- speaker: Respondent
  text: Yes. She died during the war.
- speaker: Interviewer
  text: What about your grandparents?
- speaker: Respondent
  text: I had grandparents on father's side and mother's side. They died after we came to America in their 80s.
- speaker: Interviewer
  text: Was your mother a strong person or a gentle person?
- speaker: Respondent
  text: She was healthy and was known as a strong woman in the village. Her father was a landlord but I heard my mother and
    her sister among 5 children were always put to work.
- speaker: Interviewer
  text: What was the reason you came to America?
- speaker: Respondent
  text: I came here as a 'yobiyose'. Father summoned his wife and children because he was going to settle down here.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was not quite 17 years old then. I became 17 after I came here.
- speaker: Interviewer
  text: When you were in Japan, what kind of country did you think America was?
- speaker: Respondent
  text: My uncle told me about America, especially about Imperial Valley.
- speaker: Interviewer
  text: What kind of thing did he tell you?
- speaker: Respondent
  text: He brought back photographs taken in those days. He showed me pictures of men as dark as the Blacks wearing Mexican
    hats and working in the field. When I asked, 'Do you work like that in America?', he answered, 'How can you make money
    if you don't work hard? It is a mistake to think that you lead easy lives in America.' My uncle was a talkative, stouthearted
    and sturdy built man. He brought knives for cutting grapes and showed me how to pick grapes. Every year at grape season
    he went to Fresno to pick grapes. On the way home he stopped at Ishimitsu Company in Los Angeles and spent all the money
    he earned buying Japanese food to be sent to Brawley. One year he earned only $20 to spend at Ishimitsu Company.
- speaker: Interviewer
  text: Many Issei came to America thinking they will make a fortune.
- speaker: Respondent
  text: I came here thinking I will make a fortune, but I didn't think I could make money without working hard as I heard
    the story from my uncle. My uncle told me that there are no houses in Imperial Valley, so we live in tents in the desert
    where there is nothing around. He said we do not stay in one place but move to another place in about 3 years. When I
    asked what they do about water there he said that water comes from the Colorado River so they do not lack water.
- speaker: Interviewer
  text: Where did you get on board the ship when you came here?
- speaker: Respondent
  text: I got on board the ship from Kobe. I took a ship from Naha to Kobe. I could not get a passport until I came to Kobe.
    I transferred ship at Kagoshima and went to Kobe. It took 1.5 days from Okinawa to Kagoshima, then 4 days from Kagoshima
    to Kobe stopping here and there.
- speaker: Interviewer
  text: Was the passport issued right away?
- speaker: Respondent
  text: We get application forms for passport at the village office. After the police signs the paper we take it to the Prefectural
    office. Then when we go to Kobe we get the passport issued. There was a bad policeman in the Police Department who would
    not sign the paper unless we bribed him.
- speaker: Interviewer
  text: Was he a police officer?
- speaker: Respondent
  text: There was a policeman in our village who would not put his seal on the application so it took a long time. I think
    that delayed my arrival in America; I could not get in time for my father's death. After we gave him presents he put his
    seal on the application. In 1926 I saw that policeman in our district, but I did not feel like talking to him.
- speaker: Interviewer
  text: Did many people come from Okinawa?
- speaker: Respondent
  text: Compared to other prefectures not too many people came to America from Okinawa, but many people went to Hawaii and
    South America. About 80% of Japanese in Argentina are from Okinawa, and about 60% of Japanese in Brazil are from Okinawa.
    I think there are about 600,000 Japanese in Brazil. Especially after the war many Japanese went there from Okinawa. I
    think 40% of Japanese in Peru are from Okinawa, so I can say that most Japanese in South America are from Okinawa.
- speaker: Interviewer
  text: What kind of passengers were on board the ship?
- speaker: Respondent
  text: There were many picture brides and young yobiyose men. In Kobe all the hotels were full, more than 20 people slept
    in one room. The ships were so crowded that people had to draw lots to decide who get the passage. Those who drew blanks
    could not come.
- speaker: Interviewer
  text: Did you come here in 1919?
- speaker: Respondent
  text: I came here in 1918. I think I left Kobe on July 17.
- speaker: Interviewer
  text: Did you get your passport right away in Kobe?
- speaker: Respondent
  text: Yes, I did. Those who won the passage had the eye examination and roundworm test, and when you passed the tests you
    could go.
- speaker: Interviewer
  text: Did you win the passage?
- speaker: Respondent
  text: Yes, but I still had to wait a month for the result of the drawing.
- speaker: Interviewer
  text: Did you stay in a hotel during that time?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: The hotel people must have made profit.
- speaker: Respondent
  text: In those days the hotel charges were very cheap.
- speaker: Interviewer
  text: Do you remember anything that happened on board the ship?
- speaker: Respondent
  text: We repeated the same thing day after day, and there wasn't anything special.
- speaker: Interviewer
  text: Did you talk to the picture brides?
- speaker: Respondent
  text: Yes, I did once, but I don't remember what we talked about. They were from around 18 to 23 years. I was young compared
    with them.
- speaker: Interviewer
  text: Did you stop off at Hawaii?
- speaker: Respondent
  text: Yes, we did. I think we stayed there for about 3 days. As my mother became seasick on board the ship I bought pineapples
    when we arrived.
