collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: No, to San Francisco... Let me see, how long did it take from... I didn't stop in Hawaii. I went to Seattle.
- speaker: Respondent
  text: Oh, I see. To Hawaii, let me see... didn't it take about nine days; anyway it seemed like 16 days altogether... but
    I was so seasick, I thought no matter what happened I'd never want to ride on a boat again, that's how sick I got!
- speaker: Interviewer
  text: Did you look forward to coming to America?
- speaker: Respondent
  text: Yes, I wanted to come to America. I wanted to come so much! I needed to come to America and so I did! Then, when I
    did come, it was so different from the way I imagined it would be when I was still in Japan. When I was about to arrive,
    my husband said to me, "All the young people are saying 'America, America' and look forward to coming, but there is a
    big mountain. If you haven't climbed Mt. Fuji, you haven't seen anything..." so, don't be disappointed, he had warned
    me. And sure enough, when I got here, it was just exactly as he had said; really now, after you've been in Japan and you
    come over here, it was so desolate! Our friends were few and all of us being Japanese and not understanding English, it
    was so difficult and you became homesick, you know. And I wondered why I had come to such a place and I was so unhappy.
- speaker: Interviewer
  text: Where did you settle?
- speaker: Respondent
  text: Uh, Stockton at first. We were in Stockton for about a year and then we went to Marysville and in Marysville, we stayed
    for two or three years, you see, and after that we came to East Sacramento and there, until then, we had a grocery.
- speaker: Respondent
  text: Nowadays, most of the Nisei marry for love, but in our day, ours were all arranged marriages or picture-bride marriages,
    you see. Even persons in Japan, contact among the young people wasn't permitted; therefore, the majority of Japanese of
    my age group all of them were arranged marriages. Mine was one of them, so you see, we didn't know how to make a living
    and really, when there's an age difference of over ten years, you know they say 'ten years make an epoch'. There's a difference
    in age and you don't understand the ways of life and then to come to this country and there were so many things to worry
    about, you know. Anyway, there were times when I thought, if only there were no children; there were even times like that,
    and I worked so hard and I really! There was a time I cried and prayed to God to please keep my soul on a righteous path
    and then since we lived in the country where it's spacious, the children had a dog that had puppies and they were always
    hungry and I didn't know about dog food. I couldn't understand English, neither of us could, so I would boil the dog's
    milk and put it over some rice and give it to the puppies and they loved it! Then, the puppies got big enough to waddle
    around and while they all gathered around the food in this big pan with soggy rice and milk, I noticed the mother dog
    sitting back in the corner watching her pups and wondering what they were eating and at that time I was so impressed!
    Mama, I thought, really, even a mother dog knows such love for her children and here I was, born a human being, honestly,
    I was so disgusted with myself that I decided then that I must do my best for the children's sake, for the children's
    welfare. That's the way I thought at that time.
- speaker: Respondent
  text: So, then, now this year will mark our 7th anniversary since I was married and there have been sad times, miserable
    times, but really, so then, we've had a relatively happy life and if it hadn't been for that, we might not have managed
    and I'm feeling grateful.
- speaker: Interviewer
  text: How old were you when you were married?
- speaker: Respondent
  text: 21 years old. I was exactly 21. It was 7 years ago.
- speaker: Interviewer
  text: Let's begin with your name first.
- speaker: Respondent
  text: I'm Miyake, Aiko. In Japan, I'm from Okayama-ken, Taka-machi. In the 21st year, January 1st we were married and everyone
    in Japan said, "Don't go to America. Wouldn't it be better to find something to do here in Japan?" They all said one thing
    or another to discourage us from coming to America. Miyake said there wasn't anything special to do that he liked in Japan
    and my husband said it would be better to go to America, so I thought I'd better come with him so I came even if I didn't
    really want to come to America, I didn't want to stay behind in Japan since he insisted, so I came with him in July. When
    we left Yokohama it was exactly the 4th of July, fireworks were on display and my husband informed me that that was for
    America's Independence Day. Then, when we got to Seattle and from there we went to Portland. Then, in Portland he worked
    in a store; then since they needed workers on the railroad further inland in the mountains and seeing that we wouldn't
    come, they took us away into the mountain country. The foreman was Japanese and since we were a married couple, they pulled
    along a house for us and let's see, how many years was it we stayed now?
- speaker: Interviewer
  text: Were they all Japanese?
- speaker: Respondent
  text: Yes, Japanese. The cook was from Kumamoto and now and then he'd say something in the Kumamoto dialect that we couldn't
    understand. And there was this 'meat-house', I wondered what in the world it was... a small, let's see, 16 by 9 or 16
    square or so. It was in the hills among the trees in a grove, this little house built to hang the meat where it was cool
    and it wouldn't spoil, you see. Really, the trains passing every now and then was all we ever saw. That was all there
    was for us Japanese and it was a very lonesome feeling. So at one point...
- speaker: Respondent
  text: I, just myself, longed very much to go back to Japan. I was concerned especially about the children not hearing the
    Japanese language, so if the children grew up in America as Japanese, my Japanese instincts were still very strong because
    there was prejudice...
- speaker: Respondent
  text: Not prejudice. I didn't feel or think there was any prejudice or experience any as such.
- speaker: Interviewer
  text: Mrs. Miyake, did you teach the children here or start a Japanese school or teach any children here?
- speaker: Respondent
  text: No, I have never taught. Mrs. Takatsuki started a Japanese school. I've never taught in America. When the children
    were smaller I taught them at home, you know.
- speaker: Interviewer
  text: Do you have children?
- speaker: Respondent
  text: Three. When the eldest was one and I was pregnant, I returned to Japan and then, in 192, before a law was passed that
    Japanese could not come to America, I came back. At that time I returned. But then, when I was in Japan, I had planned
    to stay until, as we all dreamed in those old days years ago, my husband made his fortune and would return to Japan and
    to bring up the children at my parent's home. However, I was also thinking how difficult it would be to bring up children
    without my husband. Whenever my brother would visit, the children would climb onto his lap right away, substituting him
    for their father and just as I was thinking, "this is not good," I received a letter asking if I wouldn't come back to
    America. So, for the children's sake, at first I went back to Japan thinking it was better for their welfare, but then
    I decided it was more important for them to be brought up by both parents and so I came back and they started grammar
    school. I would receive inquiries from Japan about sending the children to school in Japan, but at that point, I was convinced
    it was important to bring one's children up by one's own hand and not leave the job to someone else.
- speaker: Interviewer
  text: Was there a depression in Japan?
- speaker: Respondent
  text: No, when we came there wasn't that much of a depression because it was during the Taisho period. A year later there
    was a tragedy in the Tokyo Kanto area. It wasn't that much of a depression. But it wasn't anything like it is now. It
    seems their economy is really booming!
- speaker: Interviewer
  text: Why do young people in Japan want to come to America?
- speaker: Respondent
  text: No, it wasn't for that reason. It's because when the young people in Japan hear about America, they get carried away!
    They hear about all the dollars and they think that's the place to go. America, where everybody is rich, the Japanese
    are thinking. Therefore, when we go back to Japan and take, you know, just a small gift, they seem to think, "What kind
    of gift is that to bring back from America?" Our relatives are thinking, "Is that all they brought?" So, America is the
    hope of all the young people where all the wealth is so they want to come so badly with all their hopes and dreams. And
    then when they get here and it's not really the way they thought it would be... Now, the Nisei are really well-off, to
    my way of thinking. They have a beautiful education and the Issei, well, among us, that is to say, there were some who
    were pretty well educated, but for the most part, they had to immigrate with little education and ended up in the country
    doing farm and domestic work. There was no choice for them, neh. Therefore, the Nisei grew up in an orderly manner because
    they grew up in the country where it was spacious and there was no chance to get into trouble and the parents had many
    hardships working hard and the children had the conscience to feel they should bail out even if a little, so they felt
    a responsibility, so they didn't get bad. That's the way I feel anyway. The Sansei now are getting too much attention,
    getting spoiled in my opinion. The parents are well educated, they live in beautiful homes, they're given everything they
    want. Because of this their standard of living is too selfish.
- speaker: Respondent
  text: The Issei that have the education of the Nisei are very few. Everybody went to grammar school. The men went as far
    as what they call a common school (Jinjyo Gakko) in our day, similar to the junior high schools here, I guess it's called.
    That's as far as they were able to go, like my husband. That is the way it was, and the women were better educated than
    the men sometimes, the wives, that is. So that caused some friction, but for the sake of the children, the Issei women,
    90% of them, the Issei who became mothers thought of the wellbeing of their children, that they should become successful,
    outstanding citizens. That was foremost in all their minds.
- speaker: Interviewer
  text: Were all of the passengers on the boats from Japan Japanese?
- speaker: Respondent
  text: Yes, mostly Japanese. About the time we came, picture-bride marriages had been outlawed, so they had to go fetch the
    wives so there were scads of couples on board coming here together!
- speaker: Interviewer
  text: So, when you disembarked at San Francisco, did all of you who came together go together to one place? Or did you separate?
- speaker: Respondent
  text: Once we got to San Francisco, we all disbanded and went where our husbands were and dispersed to Fresno or Stockton
    or wherever else.
- speaker: Interviewer
  text: Were there communities of Japanese like in Fresno or Stockton? Is that where you went?
- speaker: Respondent
  text: Oh yes, indeed. There were gatherings of Japanese; not like it is today. Like Marysville, for instance, Stockton,
    and Sacramento flourished, and there were a great number of Japanese laborers.
- speaker: Interviewer
  text: But it was lonesome even if you were here together, since Japan I suppose?
- speaker: Respondent
  text: Yes, second.
- speaker: Interviewer
  text: Was there some interesting or funny experience that you can remember because of the difference in the American and
    Japanese cultures? Do you have any recollection?
- speaker: Respondent
  text: Let me see...
- speaker: Interviewer
  text: Did you wear Japanese clothes? Did you come here in Japanese dress?
- speaker: Respondent
  text: Yes, we came in kimonos. But once we got there we couldn't wear kimonos; after all, we couldn't wear foreign clothes
    and were careful not to wear kimonos and wore dresses and suits and not Japanese clothing. So you know, my feet hurt so
    much [laughs]. When we were going to school, even to jyogakko, they wore shoes, but we wore wooden clogs (geta) and in
    our prefecture, the boys wore shoes to Normal School, but for everyday, for sewing school, we wore ordinary red thonged
    geta with our uniforms, so we'd never worn shoes! So these were those pointed-toe shoes and my feet hurt and hurt [laughs]
    and I couldn't go anywhere! I couldn't even walk. That was one of my biggest problems! [laughs]
- speaker: Interviewer
  text: How about the beds?
- speaker: Respondent
  text: What, bed? Oh, I liked the beds. They felt comfortable. They felt good. My aching feet were my downfall [laughs].
    I couldn't walk. In a geta or slippers, your feet could spread out, but in shoes, my poor toes were squeezed together
    and they hurt! [laughs]
- speaker: Interviewer
  text: Miyake-san, can you recall something?
- speaker: Respondent
  text: So, the second time I came, we came to Sacramento. At that time, the landlord lived upstairs and he was Portuguese.
    And so to converse [laughs] in my broken English, we couldn't communicate. 'Yes' and 'No' are opposite in meaning, you
    see. When he'd ask, "Is this yours?" (Does this belong to you?) and since it wasn't mine, I'd say, "Ee-yeh, is it yours?"
- speaker: Respondent
  text: That you know is often mistaken. In Japanese, we say 'hai' (yes), that is so to everything. And so, therefore, in
    this country, if one should ask "Is so and so at home?" You're supposed to say, "no." In Japanese, "yes, that is" is what
    we'd answer. And so with that in mind, we say "yes." [laughs] And then they'll say "Wassamatta? You just said they're
    not at home" and then you say "yeah" again they'd complain. At times like that we couldn't understand and we'd have a
    misunderstanding [laughs]. In that respect, there was a difference.
- speaker: Interviewer
  text: Did the white people treat you well when you first came?
- speaker: Respondent
  text: Yes, they were very good to us. After all, Americans, how do you say, lived in a spacious country and they were big-hearted,
    so we were thankful, as compared to Japanese who were limited to small islands and their thinking was small. When they
    get ahead a little they tend to be boastful. Countries have a national trait, you know. And Americans living in a spacious
    land, as a whole, they tend to think big, so I was impressed.
- speaker: Interviewer
  text: Before you came from Japan, did you have work first or did you find work after you got here?
- speaker: Respondent
  text: No, my husband was continuously in farm work, you see.
