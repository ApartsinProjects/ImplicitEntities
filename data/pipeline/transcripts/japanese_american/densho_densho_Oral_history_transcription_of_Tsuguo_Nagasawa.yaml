collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Let's start from your childhood days, chronologically. From the time you were born?
- speaker: Respondent
  text: My name is Tsugue Nagasawa.
- speaker: Interviewer
  text: What part of Japan were you born in?
- speaker: Respondent
  text: I was born in Yamanashi-ken.
- speaker: Interviewer
  text: Are there many people here from Yamanashi-ken?
- speaker: Respondent
  text: No, not too many. Mr. Tambara, Mr. Itano of your church, as you know, they are all from Okayama-ken. Now that it's
    the Nisei's era, people don't talk about their birthplaces too often. My birthplace is Yamanashi-ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in the 29th year of the Meiji period. It was on the 27th of December, after Christmas.
- speaker: Interviewer
  text: How old are you this year?
- speaker: Respondent
  text: I'm 78 years old.
- speaker: Interviewer
  text: You're 78 years old this year. You look healthy.
- speaker: Respondent
  text: Sometimes I work. Today is Monday. Mondays I usually have a day off every week.
- speaker: Interviewer
  text: Do you work the rest of the week?
- speaker: Respondent
  text: I'm off on Sundays. Saturdays, Sundays, and Mondays I don't work full-time; only part-time.
- speaker: Interviewer
  text: That's more than enough.
- speaker: Respondent
  text: Lack of exercise... One of the reasons is I'd rather move my body. Staying home, I tend to be inactive.
- speaker: Interviewer
  text: What was your family occupation in Japan?
- speaker: Respondent
  text: My family produced rape oil. In the old days, before electric and gas lights had been invented, rape oil was used
    for lighting at night. My father was still young. Our family was an old one. I was born in a family whose business was
    producing rape oil.
- speaker: Respondent
  text: When I was 2 or 3 years old, the family business wasn't very interesting. When my father was 21 or 22 years old, he
    quit his business. He went to a coal mining camp in Amakusa, Kumamoto-ken. People could keep books at that time. My father
    worked as a bookkeeper in Kumamoto. He stayed in Amakusa for a while. He happened to know about the United States and
    came to the United States.
- speaker: Interviewer
  text: Your father?
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was 5 or 6 years old then.
- speaker: Interviewer
  text: Did your father come all by himself?
- speaker: Respondent
  text: My father came all by himself. I was raised by my uncle and aunt. My grandmother was there, too. She raised me in
    place of my father. Without her, I might not have grown up well. I believe she was my true benefactor. She raised me.
- speaker: Interviewer
  text: Was she your real grandmother?
- speaker: Respondent
  text: Yes, she was. My father, who was her only son, came to the United States early in his life. She raised me in place
    of my father. I wasn't alone, though. I had my elder brother.
- speaker: Respondent
  text: My elder brother was Koichi Nagasawa. He graduated from Waseda University and Chicago University in the United States.
    He was a scholar. He was employed by the Mitsubishi Company, a large company. He was killed by a bomb during the war.
    He was in Japan. Unfortunately, only one person out of ten thousand. He was killed by a bomb dropped by the United States.
    He believed Japan wouldn't win the war against the United States. He, who didn't like the war, was killed by a United
    States bomb. Koichi Nagasawa. He wrote quite a few books.
- speaker: Interviewer
  text: Did he write about the United States or Japan?
- speaker: Respondent
  text: Both about the United States and Japan. He was close to Isoroku Yamamoto. He had a connection. The Mitsubishi Company
    sold goods to the Navy. The other party bought the goods. He had something in common with Isoroku-san. Isoroku-san didn't
    like the war, either. He didn't want to fight against the United States, from the bottom of his heart. However, he couldn't
    help it, for it was his duty. I feel sorry for him. My elder brother was in the same position.
- speaker: Respondent
  text: They did their duty hopelessly. Both of them had the same sentiment. Both had to do their duty. One party, the Mitsubishi
    Company, sold goods to the Navy. The other party, the Navy, bought the goods. They had such a relationship.
- speaker: Interviewer
  text: Where was your father in the United States?
- speaker: Respondent
  text: He was in San Francisco. I landed at the time of the great earthquake. When I came, my father was in Los Angeles.
    Reverend Kawashima and Reverend Komura of the Methodist church. The Methodist ministers knew the Issei very well in the
    old days. Reverend Uyemura in Portland. Reverend Hayashi?
- speaker: Interviewer
  text: I know Reverend Hayashi. He was a minister here in Sacramento.
- speaker: Respondent
  text: That's right. Reverend Hayashi is a nice person. Do you know Reverend Taro Goto of Walnut Grove?
- speaker: Respondent
  text: He died. He also came to Portland. In Portland, Reverend Taro Goto didn't like the venue there. Reverend Goto wanted
    to change the church. Though my father took charge of finance and stood up for him, the church affairs didn't turn out
    well. At that time, Reverend Nakajo of your church... have you heard of him?
- speaker: Interviewer
  text: No, I haven't.
- speaker: Respondent
  text: Reverend Nakajo was the minister of that church. He quit because he didn't like it there. He established the Presbyterian
    church in Portland independently. Reverend Nakajo was big, much bigger than Reverend Goto.
- speaker: Respondent
  text: Yes, I will. Your father was active at the Methodist church, wasn't he? An annual meeting of the Methodist churches
    was held. My father followed the minister as far as Los Angeles in the south and as far as Seattle and Portland in the
    north. Only along the coast then. He traveled along the coast. Almost everybody knew Raine Nagasawa, my father.
- speaker: Interviewer
  text: What was his occupation?
- speaker: Respondent
  text: My father's occupation was with the railroad company in Portland. In those days, he took a vacation to do some church
    work. A few times two weeks. The church work was pretty hard. The Portland church in those days was small. My father was
    with the church in Los Angeles for a long time. Then, he went to the church in Portland. My father went there first. My
    father's relative, his niece, called him to Portland.
- speaker: Interviewer
  text: Then your father almost always worked for the railroad company?
- speaker: Respondent
  text: That was his occupation. He was a gardener in Los Angeles. In the old days, in 1915 and 1916, gardeners were different
    from gardeners today. They didn't have any automobiles. Their resources were limited. They didn't have any power motors.
- speaker: Interviewer
  text: Let's go back a little. You were raised by your grandmother.
- speaker: Respondent
  text: Yes, my grandmother raised me.
- speaker: Interviewer
  text: Both you and your elder brother?
- speaker: Respondent
  text: My elder brother was left to another relative. I was left to my father's family.
- speaker: Interviewer
  text: Was your mother in the United States?
- speaker: Respondent
  text: No. My mother wasn't around. My father and mother consented later, and my mother re-married. Though I was small, I
    knew not every relative was nice. The result was such. My elder brother and I had hardships since our childhood days.
- speaker: Interviewer
  text: What kind of person was your grandmother?
- speaker: Respondent
  text: My grandmother was born in Shinshu. Her family was an ardent religious family, the Nichiren sect. Her family was a
    family of property. They used to brew sake. They didn't brew sake any longer then. They educated their children. Two children
    became medical doctors, one became an Army major, one became a college-educated architect, one became a local banker,
    and another became a local practitioner. She was born in a family of property. Her husband wasn't good at economizing.
    They didn't starve, but they were compelled to reduce their farms.
- speaker: Interviewer
  text: Your grandmother?
- speaker: Interviewer
  text: Those successful men were your uncles?
- speaker: Respondent
  text: Those successful men were my uncles and uncles-in-law. Some uncles weren't blood-related. The medical doctor was my
    cousin.
- speaker: Interviewer
  text: Was she strict or gentle?
- speaker: Respondent
  text: She was both strict and gentle. She did her best for me. Without my father and mother, I was raised at my aunt's place.
    My uncle, who was an adopted groom, was strict. For as long as I can remember. My aunt was my father's elder sister, and
    she was blood-related. She was different from my uncle. My elder brother acquired an education smoothly.
- speaker: Respondent
  text: I wanted to make an education as much as my elder brother did. Though my cousins were all for my education, my uncle,
    who was the financer, was very strict with me. I couldn't pursue an education. I started at the middle school, but I had
    my father call me here before my graduation.
- speaker: Interviewer
  text: How old were you when you came here?
- speaker: Respondent
  text: I was already 20 years old. In 1915. The Panama Fair was being held in San Francisco then. I came here the same year.
    Having taken a look at the fair, I went to Los Angeles.
- speaker: Interviewer
  text: Until you reached the age 20, your aunt or your grandmother raised you?
- speaker: Respondent
  text: My grandmother.
- speaker: Interviewer
  text: Was your grandmother your father's mother?
- speaker: Respondent
  text: Yes, she was.
- speaker: Interviewer
  text: During the time you were growing up at her place, did you experience anything sad or happy?
- speaker: Respondent
  text: Though I received a school education, I wasn't raised by my parents. The family was a farming family, which needed
    a lot of helping hands. I helped them after school. I couldn't study as much as other children. As a result, my grades
    naturally went down. After work, being small, I felt too sleepy to study. I had a hard time. Compared to my elder brother,
    they said I wasn't too smart. I wasn't dull, I just didn't have time to study. I could have beat anybody if I had studied
    after school. In my childhood days, if I had studied enough, I could have beat anybody. I was healthy.
- speaker: Respondent
  text: School grades aren't the main thing, but good health is. I didn't have any disease. I believe that.
- speaker: Interviewer
  text: What were your pleasures?
- speaker: Respondent
  text: Pleasures in my childhood days? Well, in Japan we had festivals. Being in the countryside, we went to the river to
    swim. I wasn't free financially. I wasn't given enough money. I was so healthy that I enjoyed school excursions and athletic
    meetings.
- speaker: Interviewer
  text: Your condition was different from others with parents.
- speaker: Respondent
  text: Being raised by parents is different from being raised by an uncle and an aunt. They don't do enough. Some uncles
    and aunts may be able to provide enough. It was some experience which I can't express in words. That's for sure. How happy
    those children are who are raised by their parents! Whether they're financially better off or not is another thing. I
    don't say I didn't have any love; but I didn't have enough parental love. There's a difference between true parents and
    others.
- speaker: Interviewer
  text: What motivated you to come to the United States? Why did you make up your mind to do so?
- speaker: Respondent
  text: My elementary school teacher and others told me I was so healthy that I would be drafted sooner or later. They suggested
    that I should go to the United States. My uncle and aunt wrote to my father and negotiated. Being called over was a legal
    matter at that time. I was called over by my parent.
- speaker: Interviewer
  text: Was it when you were 20 years old?
- speaker: Respondent
  text: Yes, it was. I wanted to be called over sooner.
- speaker: Interviewer
  text: Before the age of 20, did you work on the farm?
- speaker: Respondent
  text: I attended school.
- speaker: Interviewer
  text: Middle school?
- speaker: Respondent
  text: Yes. The school system in those days was set up that we attended elementary school till the age of 17. Upon graduation
    from higher elementary, we were 16 or 17 years old. We started schooling late, at the age of 8. For eight years. We reached
    16 or 17. That was the old system. They start a little early today.
- speaker: Interviewer
  text: A regular elementary school?
- speaker: Respondent
  text: After graduating from higher elementary school, I worked for a while. Helping the family, I attended a school for
    kenbun. Later, I attended a higher training school at Ichigaya in Tokyo. That was what you call a boy's school. I came
    to the United States before graduating from there.
- speaker: Interviewer
  text: What did you think the United States would be like?
- speaker: Respondent
  text: I thought the United States would be a huge, free country. However, I knew I'd have to work. It would be difficult
    to rely on my father. I worked as a schoolboy for one family. I attended school, I did domestic work in the morning and
    in the evening. Since I had no school on Saturdays, I worked all day. An eight-hour work day paid $1.50 then. Anyway,
    salaries were low at that time. Though the United States is a large nation, you can't make it without working hard. It
    was too much for me to rely on my father financially. I was fairly mature. I was different from young people today. Being
    a schoolboy, I worked all day on Saturdays. Everybody went to church on Sundays.
- speaker: Interviewer
  text: You hadn't seen your father for fifteen years?
- speaker: Respondent
  text: That's right. I hadn't seen him for fifteen years.
- speaker: Interviewer
  text: How did you feel when you saw him for the first time?
- speaker: Respondent
  text: Having been apart from him since my childhood, I appreciated having my own father. However, I was too old to rely
    on my father completely. I set up my mind to work as much as possible in order to go through school. I became a working
    student.
- speaker: Interviewer
  text: Did you feel a little reserved with your father?
- speaker: Respondent
  text: Yes, I did. Being fairly old, I felt so even with my own father. When I was short of money, I asked my father for
    money. I felt bad about it. I thought I should work and study as hard as possible. There were some fatherless working
    students. I appreciated the fact that I had a father whom I could ask for petty cash.
- speaker: Interviewer
  text: Was your father single then?
- speaker: Respondent
  text: He never got married again. He came here when he was 24 years old. He never married again.
- speaker: Interviewer
  text: How long did you work as a schoolboy?
- speaker: Respondent
  text: Well, in Los Angeles, yes, in 1915, 16, 17, for three years. My father's niece was in Portland. There was a famous
    man from Yamanashi-ken named Masajiro Furuya, who owned two banks.
- speaker: Interviewer
  text: Have you heard of him?
- speaker: Respondent
  text: Yes, I have. He was in Seattle, wasn't he?
- speaker: Interviewer
  text: In Seattle.
- speaker: Respondent
  text: My father's niece urged us to work for his store. My father and I went from Los Angeles to Seattle. We worked at Masajiro
    Furuya's store. He was a Christian. He became a Christian leader in the end. If I had known Mr. Furuya's destiny, I would
    have been better off in Los Angeles. Due to his banks, his store and everything went bankrupt. I don't say he didn't have
    enough property power. It was a bad time. It was the time of the anti-Japanese movement in the government. The bank superintendent
    and other related people in Washington State caused the bankruptcy.
- speaker: Interviewer
  text: What do you remember about the three years you stayed with a white family in Los Angeles?
- speaker: Respondent
  text: The white family, due to the racial difference, they are strict. I had to work hard to satisfy them. I got up early
    in the morning to fix breakfast. They didn't depend on me for breakfast, for I had to go to school. After school in the
    evening, I had to prepare the table and had to cook right away. I had to work hard to satisfy the white people. For example,
    they didn't like anything untidy. I had to put on two pairs of white overalls and an apron when I set the table and everything.
    After dinner...
