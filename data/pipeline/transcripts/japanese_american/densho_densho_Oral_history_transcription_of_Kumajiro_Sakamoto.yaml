collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please state your name.
- speaker: Respondent
  text: I am Sakamoto, Kumajiro.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Fukushima Ken, Japan.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: Is that right? You are still driving. What is your work?
- speaker: Respondent
  text: I am a gardener. I work every day. Three days for 1/2 day and the rest is 6 to 7 hours for three days. I go to work
    6 days a week.
- speaker: Interviewer
  text: What did your father do in Japan?
- speaker: Interviewer
  text: Your mother?
- speaker: Respondent
  text: My mother was his helper.
- speaker: Interviewer
  text: What kind of things do you remember about your father and mother?
- speaker: Respondent
  text: My father and mother were very conscientious workers in the country. My father and mother were Buddhists. My aunt,
    on the other hand, married into a Christian family. They were one of the first Christians in Japan. My aunt cared for
    me and often took me to church. So I was exposed to Christian church ever since I was very young, though I was not Christian.
    However, my aunt and uncle were very conscientious Christians, so they always talked to me about Christianity.
- speaker: Interviewer
  text: What kind of church was it?
- speaker: Respondent
  text: A Baptist church.
- speaker: Interviewer
  text: Was it a large church?
- speaker: Respondent
  text: It was a small church. After all, it was the very first church in our area, and the members were 5 or 6 people of
    believers. The church was small.
- speaker: Interviewer
  text: Did you go to school in Japan?
- speaker: Respondent
  text: Yes. In Japan I went through Chugakko (Middle school).
- speaker: Interviewer
  text: How many years altogether?
- speaker: Respondent
  text: From the first... Jinjo Sho Gakko (elementary school) which was 4 years, Kohtoh Shogakko (Junior High School) which
    was 4 years, Chugakko (Middle School) which was 5 years. All together 13 years. But I went from Chugakko, no, from the
    3rd year of Kohtoh Shogakko to the Chugakko. So, I finished it in 12 years.
- speaker: Interviewer
  text: Talking about your school years, what type of school was it? What kind of things did you do?
- speaker: Respondent
  text: The school of that era was all—not like this country where subjects are chosen by students, the schools were all public,
    and government funded, and all the students took the same subjects. My school was especially... the principal was loyal
    to the military, and also, my principal's supporter was an Army Lieutenant Colonel. Because of this relationship, they
    all encouraged us to enter Shikan Gakko (The Military Academy). School was very formal and strict. They stressed the ideals
    such as 'You must stand 3 steps behind teachers, so that you may not step on their shadows.' Our education was very militaristic.
    Among the students the military style was very much stressed and exercised. For example, the upper classmen received respect
    from the lower classmen. (Actually respect was demanded from the lower class students.) It was a very strict school.
- speaker: Interviewer
  text: What subject did you like?
- speaker: Respondent
  text: I liked mathematics. I did not like English very well. Not liking English, a person like me should not have come to
    America, but I did. My cousin had a silk fabric store, and they said that it would be nice if I could come to the USA
    and help him with his business. So that is why I came. Even after I came to America, at first intention was to go to school,
    but I did not go to school at all. All these years I worked as a laborer.
- speaker: Interviewer
  text: When you were in Japan what kind of events took place? How was the society?
- speaker: Respondent
  text: During my childhood days, the Nishin Senso (Sino-Japan War) was on. Idealistic thoughts... pacifism was a very popular
    thought among students.
- speaker: Interviewer
  text: There weren't very many who went to Chugakko at that time, were there?
- speaker: Respondent
  text: Not many. From my town only 5 or 6 students went. I do not know the percentage, but it was very few.
- speaker: Interviewer
  text: You must have been respected by all.
- speaker: Respondent
  text: Well, yes. I did receive respect, I felt. Because there were very few who went to Chugakko from my village.
- speaker: Interviewer
  text: Then the reason you came to America was the connection with the fabric product?
- speaker: Respondent
  text: Well, I was young and as soon as I finished Chugakko I came. The purpose of my coming to the States was to study language.
- speaker: Interviewer
  text: So you were a foreign student. How old were you?
- speaker: Respondent
  text: I was 20 years old.
- speaker: Interviewer
  text: When did you come?
- speaker: Respondent
  text: It was 1906.
- speaker: Interviewer
  text: Where did you enter America?
- speaker: Respondent
  text: Tacoma, Washington.
- speaker: Interviewer
  text: What was your very first impression?
- speaker: Respondent
  text: When I came to Tacoma, on the boat, I was sea sick. At that time it took 19 days. I was sick for 17 days. After that,
    2 days before I reached Tacoma, I began to feel better. I saw the green trees growing up to the seashore. We came in from
    Victoria to Tacoma. All that time, there were the big trees growing all over, as if they were surrounding the ocean. I
    thought, how rich the soil must be. I slept in Tacoma one night. The next day, I went to Seattle. On the last day of 1906
    I landed on Tacoma, and I came to Seattle on the New Year's Day of 1907. At that time, I came to Seattle, my impression
    was... right at first, the town was large. And the evening when I arrived, I noticed big roads, and a wagon pulled by
    horses. My thought was that everything was very big. The next morning, I woke and went out and was surprised to see so
    many Japanese. When I first came to America, I thought that I would not see any Japanese nor be able to speak Japanese,
    but I woke up on New Year's Day and went out in the street and saw the Japanese all lined up. I felt that it was the same
    as though I were in Japan. It was the time when there was very little work. The Japanese all worked during the summer,
    but winter came and there was no work, so they came to town. That's why there were so many Japanese there. I was surprised
    because there were so many Japanese. I felt that from now on I must work. It was during the time of depression and there
    was no work, so I worried about job for a while. Other people did not go to the places where the pay was low. At the employment
    office where there were left over jobs. Since I just came from Japan and my money was diminishing very fast, so I thought
    that I had better go to work. So I went to work.
- speaker: Interviewer
  text: How much money did you have?
- speaker: Respondent
  text: All of us needed to have at least $50 to show at the Immigration Office. This was called Misekin (showing money).
    Also I had another $60 for my expense. You needed to have $50 to show otherwise you could not land.
- speaker: Interviewer
  text: What kind of a country did you think America was?
- speaker: Respondent
  text: America? My uncle and aunt were Christians and they knew many missionaries. America is a Christian country, truly
    a Christian country full of love and kindness, I thought.
- speaker: Interviewer
  text: So, when you came, your thought and the reality. Of how things were... did they match? Were you disappointed?
- speaker: Respondent
  text: No, I was not disappointed. If I were to come to America to study or work, I expected to work that meant even to serve,
    and many things would happen. I was prepared. If I were to work, I was prepared to face hardship. Therefore, I did not
    feel any let down.
- speaker: Interviewer
  text: Were there many Japanese on the boat with you?
- speaker: Respondent
  text: No. The boat I came on was a foreign ship. At first I was going to come on the Japanese passenger ship, but my eyes
    were bad and I could not come soon that. So I decided that any ship will do. So I came on the foreign ship; the British
    ship which came to Japan. It was a cargo ship. There were 47 people on board.
- speaker: Interviewer
  text: Were they Japanese?
- speaker: Respondent
  text: Yes, mostly men. Maybe there were a few women, but in our room it was all men.
- speaker: Interviewer
  text: From Tacoma to Seattle, then from Seattle where did you go?
- speaker: Respondent
  text: From Seattle, well, I was there from January to August. I worked at a nursery then, a white man's nursery. Then from
    there I worked with strawberry farm. The owner was very good to me. They encouraged me to stay, but my brother, my cousin
    who was in California kept calling for me, so I quit and left to go to my cousin. I feel that I would have been better
    off had I stayed where I was, because there were no other Japanese. Up to now, I never knew English. If I had stayed,
    I would have learned to speak English fluently. There, I could be independent, acquired some land, there were no restrictions
    on owning land, and become an independent farmer. Perhaps, but my cousin kept calling, so I came to California. I came
    to Covina and worked at the orange ranch.
- speaker: Interviewer
  text: At that time, what kind of work did you do?
- speaker: Respondent
  text: At that time, I was a laborer, just a laborer. Every day I went to pick orange from a camp. I worked, picked oranges,
    pruned the trees. I did everything which had to be done in that orange grove, such as picking, pruning, irrigating and
    the rest.
- speaker: Interviewer
  text: Were you living in a boarding house?
- speaker: Respondent
  text: Boarding house? No, we lived in a camp. It was a camp for workers who worked on the orange groves. There were about
    80 to 40 people lived there depending on the seasons. There was one boss. We slept there, had meals. We paid 5% commission.
    We were assessed on the cost of the food. We paid for our food.
- speaker: Interviewer
  text: From what time did you work?
- speaker: Respondent
  text: From 7 am to 5 pm, 9 hours. At that time we got paid $2.00 per day. Then it became $2.25. It must have been about
    1909. Then I managed a camp of my own from 1911 to 1915 in Rialto, this side of San Bernardino.
- speaker: Interviewer
  text: To have a camp of your own, what do you do?
- speaker: Respondent
  text: I gather the people, then from the grower or the packing house (Orange packing house owner) comes the request for
    a number of people. From my camp, I send the people there as the order come in. Orders come in in the evening or in the
    very morning. I receive 5% of the workers' pay. That is my handling expense. The food, the camp's boss takes care of that.
    The cost of the food is divided by the number of workers and each one pays his share of the cost of food to the boss.
- speaker: Interviewer
  text: How many people were there?
- speaker: Respondent
  text: About 50 people.
- speaker: Interviewer
  text: At your home?
- speaker: Respondent
  text: My house. I had its workers. There were Mexicans during the orange picking time. When the orange was finished, there
    weren't as many. When the workers were gone, there were 10 people for orange pruning, irrigation and people who drove
    the horses. When the request come for them, I send them over.
- speaker: Interviewer
  text: The people were living in barracks? Were they rented?
- speaker: Respondent
  text: Yes. Rented. I rented the large land and built the houses. In my case, my house was already there. It was operated
    before. So I moved into it, and I built the kitchen house and other buildings.
- speaker: Interviewer
  text: What was your concerns in your management of the boarding house?
- speaker: Respondent
  text: At that time I considered my house a Christian house. So, at camp drinking whiskey or gambling or other bad things
    were prohibited. Bad things were not done. I did not allow it. Just considered it a Christian camp.
- speaker: Interviewer
  text: Were there any complaints?
- speaker: Respondent
  text: Sometimes there were complaints, and some sneaked in whiskey and drank. But I tried very hard to have no gambling
    or smoking.
- speaker: Interviewer
  text: Were there any problems with prostitutes?
- speaker: Respondent
  text: There were. But they did not come to my place. I managed honestly so the food cost was very cheap, compared to other
    camps. So they were glad about that.
- speaker: Interviewer
  text: Why did you get out of the job?
- speaker: Respondent
  text: There were not much work available, so I quit. Camp's boss, no the packing house's boss needed workers. Then, the
    Japanese people were fewer and became difficult to gather Japanese workers. At the beginning, the Japanese worked on oranges,
    strawberries, cantaloupes. There were many people doing this type of work. But gradually, they began their own business,
    vegetables and others and it became harder to gather them. Many camps ended like this.
- speaker: Interviewer
  text: After that where did you go?
- speaker: Respondent
  text: I worked in a store in Los Angeles. I worked about 3 years, and then I worked at a vegetable market. As I grew older
    and became the age when I should get married, my younger sister came and said, 'Big brother, you should get married.'
    So the issue of marriage came up. Okay. If I were to marry, I will not get the chance to carry a blanket and travel, so
    before I marry, I shall travel all over. So I decided to travel with blanket. I went to Brawley near Mexico.
- speaker: Interviewer
  text: Did you take just one blanket on your back?
- speaker: Respondent
  text: Yes. I took the one blanket. I took my entire possession on my back; clothes and all I owned wrapped in the blanket
    and went to work. Melon... sowing through harvest. Then went to pick grapes in Fresno. Then came back and went to Japan,
    got married, and returned.
- speaker: Interviewer
  text: Your entire possession... what kind of thing did you have?
- speaker: Respondent
  text: My entire possession consisted of the blanket, one suit, work clothes, that's all. I wrapped everything in my blanket
    and tied it with a rope. Took it to a station and rode with the blanket by my side until I reached my destination. Then
    I slept in the blanket. On the bus. At Brawley, there was a house, but in Fresno during the season there was no room,
    so I slept in the blanket outside or in tent.
- speaker: Interviewer
  text: Did you carry any money? Cash?
- speaker: Respondent
  text: Yes. Cash, mostly. But I had some money in the bank. In Los Angeles or in my case, I left it at my friend's place.
    Generally speaking, I did not give much care to management of money. Not much. What shall I say... I was not concerned
    about it very much.
- speaker: Interviewer
  text: When you went to pick grapes, oranges and melon, what do you remember from that period?
- speaker: Respondent
  text: I did not consider work as a hardship. I decided to work, so I worked. I worked diligently. When it came to work,
    I was diligent. I never had other people criticize me as lazy.
