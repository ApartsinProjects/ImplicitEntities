collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Lets start with your name, please.
- speaker: Respondent
  text: My name is Akamine, Akamine Kosei.
- speaker: Interviewer
  text: What characters do you use in your name?
- speaker: Respondent
  text: '"Aka" as in this stroke and Mine as in "Yamamine".'
- speaker: Interviewer
  text: And your first name?
- speaker: Respondent
  text: Kosei, "Saiwai" or happiness and Nari as in Yukinari.
- speaker: Interviewer
  text: What country are you from?
- speaker: Respondent
  text: I'm from Okinawa.
- speaker: Interviewer
  text: I haven't met many Okinawans here.
- speaker: Respondent
  text: No, but there are many Okinawans in Hawaii.
- speaker: Respondent
  text: There's too many.
- speaker: Interviewer
  text: Where in Okinawa did you come from?
- speaker: Respondent
  text: Before the war, I lived in the suburbs. Now it is called Naha city.
- speaker: Interviewer
  text: The Capital city?
- speaker: Respondent
  text: Yes, Naha city, Aza and Oroku.
- speaker: Interviewer
  text: When were you born? In what year?
- speaker: Respondent
  text: In the year "38", which will make me about 70 years old.
- speaker: Interviewer
  text: Do you mean 1338?
- speaker: Respondent
  text: No, I mean 38th year in the Meiji Era.
- speaker: Interviewer
  text: That will be around 1900?
- speaker: Respondent
  text: That will be 1903.
- speaker: Interviewer
  text: Now lets talk about Okinawa around the year 1905. Do you remember any of your childhood experiences? Like the Russian
    and Japanese war or the Japanese and Chinese war?
- speaker: Respondent
  text: I don't remember the Russian and Japanese War.
- speaker: Interviewer
  text: Were you in Hawaii during WW I?
- speaker: Interviewer
  text: How was it like in Okinawa when you were a child? What was it like?
- speaker: Respondent
  text: We lived a poor life. My family was farmers.
- speaker: Interviewer
  text: What crops did you grow?
- speaker: Respondent
  text: Sugar and broomcorn. At our farm around July or August we would go harvest the broomcorn and make a traditional broomcorn
    cake to present to the dead ancestor. This day was our holiday. We displayed this cake for about a week or so. That is
    what we grew broom corn for. And the crops we sold at the store. We had sweet potatoes, horseradishes and other vegetables.
- speaker: Interviewer
  text: That was Okinawa about 50 years ago?
- speaker: Interviewer
  text: About 1971, I went to Okinawa for Japanese Christian Association and visited many churches there.
- speaker: Respondent
  text: So you went to Okinawa.
- speaker: Interviewer
  text: Yes, I went from Naka to Takejima.
- speaker: Respondent
  text: About what year?
- speaker: Interviewer
  text: Around 1970 - 1971, but I am sure it was in '71.
- speaker: Respondent
  text: Do you remember a lady evangelist?
- speaker: Interviewer
  text: In Okinawa?
- speaker: Respondent
  text: Yes, she was born in Kyushu, Japan, but was raised in Okinawa. I cannot recall her name.
- speaker: Interviewer
  text: Did you have any happy memories of your childhood?
- speaker: Respondent
  text: We were close to the ocean, we went swimming, fishing, and hunting. I enjoyed that the most. We also divided into
    teams and played with a ball made out of clay.
- speaker: Interviewer
  text: How far in school did you get to in Naha?
- speaker: Respondent
  text: When I entered middle school I was called to come to Hawaii when I was about 16. I never had a chance to attend a
    Japanese school. The immigration law was being changed in 1924, so my parents wanted me to come over to Hawaii before
    the deadline. So I never really finished school in Okinawa.
- speaker: Interviewer
  text: Tell me about your parents?
- speaker: Respondent
  text: My parents came to Hawaii as immigrants. They came to the place called "Whykeyada" an island and worked cutting canes.
    There were very few people who were share croppers. They all worked for sugar companies and worked in fields. They were
    just farm workers.
- speaker: Interviewer
  text: Were your parents been in Hawaii long time?
- speaker: Respondent
  text: No, I don't think so. They worked there for over 10 years. My parents went to Hawaii while I was still a toddler.
    I was raised by my grandparents. We had lots of aunts and uncles.
- speaker: Interviewer
  text: How about your brothers and sisters?
- speaker: Respondent
  text: I have two. One of them was born in Hawaii and he is teaching in Hawaii. He was sent to an island in the South Pacific
    to study soil by the University of Hawaii. This is my younger brother. My other brother was in Okinawa, but died during
    the W.W. II.
- speaker: Interviewer
  text: How was the trip to Hawaii?
- speaker: Respondent
  text: We came on the ship by the name of Siberia Maru. I got sea sick. It must have taken over 10 days. It must have been
    1 or 2 am when the ship left Naha. It arrived Kagoshima about the same time on the next day. Then the ship came to Kobe.
    It arrived in the afternoon. When we arrived in Kobe a hotel clerk came to meet us. He was sent by a hotel called Ebisuya.
    It was owned by an Okinawan. Then we stayed there for 10 days. Then we came to Yokohama in the afternoon. We just stayed
    on the ship in Yokohama. We just had only 2 hours. Then we came to Hawaii straight.
- speaker: Interviewer
  text: How was the relationship between Okinawa and Japanese government?
- speaker: Respondent
  text: Well, I don't think there was anything special, however, I remember hearing that Okinawa was taxed heavily on the
    imported goods.
- speaker: Interviewer
  text: Then Okinawa was already a part of Japan.
- speaker: Respondent
  text: Yes, I think so. It was from the beginning of Meiji period that Okinawa became a part of Japan. We were oppressed
    by Satsuma Han (Lord Shimazu's government before Meiji period). Okinawa was very prosperous before it was governed by
    Satsuma Han. Everyone lived a good life there. At that time Japan had not started trading with China, yet. However, Okinawa
    was already trading with China and was very prosperous economically. Then Satsuma came to govern us and we were oppressed
    by them. So the Okinawans lost incentive to work because they were heavily taxed and lost hope for their future. They
    say that in Okinawa women work very hard, but men are lazy. From that time on men learned to play Zamisen (Okinawan string
    instrument) and played around.
- speaker: Interviewer
  text: Did you come on the Siberia Maru by yourself?
- speaker: Respondent
  text: Yes. There were many people on the ship. There were many women on the ship, too. You see, the immigration law was
    going to be tightened and no one could come over afterwards. So the single men who were in the States started calling
    their wives all of sudden. There were many of those women who went to Hawaii.
- speaker: Interviewer
  text: Do you remember anything happened on the ship?
- speaker: Respondent
  text: No, I don't remember anything special. It was the first time for me to take such a long trip, so I was very lonesome.
    When I climbed up on the deck, the only thing I could see was water and sky. The ship was rolling and I had no enjoyment.
    I wished that the ship arrives at Hawaii quickly.
- speaker: Interviewer
  text: Did you make any friends on the ship?
- speaker: Respondent
  text: No. It didn't especially.
- speaker: Interviewer
  text: When you arrived at Hawaii, what happen?
- speaker: Respondent
  text: My father came to pick me up.
- speaker: Interviewer
  text: How did you feel?
- speaker: Respondent
  text: First, we were sent to the Immigration Office, and then we were examined. Then we got OK. The thing that was encouraging
    and gave me a peace of mind was that there was a couple who was going back to Hawaii. They knew my parents very well.
    They took me around the Island. You see I never had ice cream before. They treated me to ice cream for the first time
    in my life. We did have 'Ramune (soda water) and shaved ice over Azuki (sweet red beans). However, I don't think we had
    ice cream in Okinawa. At least it was the first time for me in Hawaii.
- speaker: Interviewer
  text: How was your first impression of Hawaii.
- speaker: Respondent
  text: Yes. I stayed in Honolulu for a week. The first and the deepest impression was that the white women were driving cars.
    The other thing that I was very impressed was that in Hawaii everything was open. You see, Hawaii was very warm, and the
    cars and houses were wide open. I felt that Hawaii was in summer season all the year around.
- speaker: Interviewer
  text: Naha, Okinawa must be a warm place, too.
- speaker: Respondent
  text: Yes, it is. However, it was not like there in Hawaii.
- speaker: Respondent
  text: Then, we went to Hawaii Island. My father was working for a plantation. There must have been 20 families and 100 workers
    resided in a camp of the plantation. This house was built by the plantation owner. All these 100 people were from Japan,
    Issei. I don't think there are many of them alive today. In Hawaii, I was still a small boy and I did not receive a very
    good impression. My father used to take picture of Hawaii and sent it to us to Okinawa. I used to think that work over
    there must be a clean and nice job. However, when I came to Hawaii, I saw the reality. There was a great big difference
    between the picture and the real situation. I was very disappointed. I used to think that people in Hawaii must have easy
    jobs and living very comfortably. It rained almost everyday there. If you look at it from a different point of view you
    might say that sugar canes grew very well because of the rain.
- speaker: Respondent
  text: I worked there for almost 4 months in the plantation. Then I went to Honolulu and went to school, doing a school boy
    work.
- speaker: Interviewer
  text: What was your mother doing in the plantation? Was she working, too?
- speaker: Respondent
  text: My mother? Yes, by the time I went there, my brother was already 11 or 12, and she had small children, so she was
    not working. However, those women who did not have children worked in the cane fields. At that time we received $2.00
    per day. We worked 10 hours a day. In Okinawa it was only 50¢ for a whole day's work.
- speaker: Interviewer
  text: I would like to know more about the working condition in the plantation.
- speaker: Respondent
  text: We got up about 5:00 in the morning and went out to work around 6:00 am. You see, we had to take a train and if we
    missed the train, we could not go to work. It rained so hard that we didn't have to wash nor change cloth often. It was
    just once a week. If you get wet, you just hung your cloth on a wall to dry it. Even if it was wet, we had to wear it
    next morning. It's because it rained everyday, so we could not change our cloth often. So it was very cold in the morning
    in the winter. We were shivering. Sometimes rain got into our Bento (lunch packed in a box). We had to eat rain soaked
    lunch sometimes. In Hawaii, they say even if you forget your lunch, you cannot forget your rain gear.
- speaker: Interviewer
  text: How comfortable was your living there?
- speaker: Respondent
  text: It was not very good. I thought it was a little more civilized in Hawaii, but it was terrible. We did eat better,
    though. Houses were bungalows built by the plantation owner. It was just like those of army barracks. It had a bedroom
    and kitchen. Toilet was a very primitive one. Someone had to clean the toilet. It was his fulltime job. It was very primitive.
- speaker: Interviewer
  text: How about Ofuro (Japanese Bath)?
- speaker: Respondent
  text: Yes. Somebody gets the bath ready by 4:00pm. Men got in the bath first, then the women. Everybody took bath. We needed
    it. You see, because we were drenched everyday.
- speaker: Interviewer
  text: You stayed there for 4 months, then you went out to Honolulu, right?
- speaker: Respondent
  text: Yes. I felt that I needed to study. You see, I did not go to school in Okinawa very much, only elementary school.
    So I went to Honolulu after 4 months and went to school. It was an English school for Japanese students. It was sponsored
    by Episcopal church. People who came from Okinawa and mainland Japan went to this school. Then I found a job as a school
    boy. I went there long time. There were about 20 students. It must have been about 6 hours of studies. We studied not
    only English but also other subjects as well.
- speaker: Interviewer
  text: What was your favorite subjects?
- speaker: Respondent
  text: Well, I didn't have any. Except that I knew I had to study English very hard, such as reading and conversation. If
    I were to live in this country, I had to know English.
- speaker: Interviewer
  text: Do you remember anything from this school time?
- speaker: Respondent
  text: Let's see. I can't recall anything from the classroom, but they used to have a lot of picnic. Even one for lunch time.
    Because it was very warm in Hawaii, all the year around, so they even got together in the evening. We got together and
    made a bonfire and cooked meat or onan. These things were the most enjoyable thing while I was there.
- speaker: Interviewer
  text: Did you have much communication with your parents?
- speaker: Respondent
  text: You see, while I was there in order to go to Hawaii Island, I had to leave Honolulu in the afternoon on a ship, I
    would not reach Hawaii Island before 6:00am on the next day. Now they say there is no ferry anymore. They all use airplane
    now. It was not every year, but every other year that I was able to visit my parents.
- speaker: Interviewer
  text: How long did you attend the school?
- speaker: Respondent
  text: I went to a grammar school, high school and then I also attended a Bible school for 2 years. So I must have attended
    school quite a long time.
- speaker: Interviewer
  text: I would like to go back a little. What was the religion of your family?
- speaker: Respondent
  text: It was an ancestral worship. It might be similar to Shinshu Buddhism.
- speaker: Interviewer
  text: Then by the time you came to Hawaii you knew something about Christianity.
- speaker: Respondent
  text: When I came to Hawaii and attended the school, I went to church on Sunday mornings.
- speaker: Interviewer
  text: Did you know anything about Christianity before?
- speaker: Respondent
  text: No. I did not know anything about Christianity while I was in Okinawa. I remember family that there was a teacher
    who belong to a certain denomination of Christian faith. Christianity was not encouraged there. Because they said that
    this religion was different from the others. The people of village did not associate with them closely. People did not
    think well of Christianity then. However, when I came to Hawaii and began to attend the school, I began to attend the
    worship. It was the school sponsored by Episcopalian church. It had a Japanese minister, Rev. Fukao. He must be gone by
    now. We were taught by him. This church was a Japanese church. There were about 20 members. It was the first time for
    me to go to church.
- speaker: Interviewer
  text: When did you get marry?
- speaker: Respondent
  text: I got married in Hawaii? No. After I came to the mainland. You see, after I graduated from the school at Episcopalian
    church, I went to the school at Yora (a private school). I attended it for 2 years. Then I went to Mackinley High School,
    a public school, for 2 years. Then I entered a Bible school. It must have been about 2 years. The reason why I went to
    the Bible school was that the minister of the church I attended was a man from Okinawa Ken. He advised me to become an
    evangelist. That's why I went to the Bible School. However, at the end of the 2nd year the Bible school went bankrupt
    because of the lack of student and so the lack of fund. Then I went back
