collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name please?
- speaker: Respondent
  text: Kono, Juhei.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Hiroshima Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: January 9, 1898. I am seventy six years old now.
- speaker: Interviewer
  text: What is your educational background?
- speaker: Respondent
  text: I came over here before graduating from elementary school in Japan.
- speaker: Interviewer
  text: Then in the U.S. you acquired all the rest of your education after that?
- speaker: Respondent
  text: Yes. I did. There, I studied in the U.S. everything that any Japanese student would learn in school. Coming over here,
    I was disappointed at the U.S., and soon I was ready to go back to Japan. In the meantime I was studying by myself the
    high school correspondence course so as to take a college entrance examination in Japan. But around that time I began
    to change my mind. I thought, you see, "I am in the U.S. now, and this country has been filled with anti-Japanese mood.
    This could be one of the challenges for me to work with. Why don't I stay here and do something about it more actively?"
    After all, well, I had been on my own for quite a while as far as studying was concerned.
- speaker: Interviewer
  text: Then, you studied theology in this country?
- speaker: Respondent
  text: Yes. I finished both my college and seminary here. I went to the University of Puget Sound, now located in Tacoma.
    As for the seminary, I went to the Pacific School of Religion in Berkeley, where I received my B.D. and M.A. Since I was
    mainly interested in philosophy and theology, I majored in philosophy in college, and in the seminary I studied theology
    for the most part. I am one of those what they call, yobiyose-immigrants.
- speaker: Interviewer
  text: How old were you when you came?
- speaker: Respondent
  text: I came here at the age of 13.
- speaker: Interviewer
  text: Was your father already over here?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: What was he doing?
- speaker: Respondent
  text: Farming, near Tacoma. I helped him on the farm when I came, and did not go to school.
- speaker: Interviewer
  text: What kind of things do you remember in Japan? You were with your mother, weren't you?
- speaker: Respondent
  text: Yes, that's right. I was the only one in my family to be with her at that time. Having spent my life there for 13
    years, I sure remember a lot of things I did when I was still young; playing on the mountains, fishing in the rivers,
    things of that sort.
- speaker: Interviewer
  text: Could you tell us about happy moments you had, or about sad things?
- speaker: Respondent
  text: Well, talking about sad thing, one reason my father came to this country, to begin with, was that he wanted to recover
    from the loss in his previous business he had in Japan. You see, his business once thriving started decaying little by
    little. Witnessing him lose the property one by one was just too much for me, even though I was only a little kid then.
    Things started going away from his hands. And at the same time, it caused a lot of confusions along with it in our daily
    life. "Things of this sort are...what should I say, unpleasant memories I had during my early days." My uncle was an artist,
    a painter. Being an artist, he was very poor. However he was, at the same time, a master in judo. So, I was brought up
    in that kind of family atmosphere from the beginning of my life. This artist uncle used to tell me, "You are gifted in
    arts. Why don't you try hard to develop 'that' talent?" I was, however, not really interested even that all.
- speaker: Interviewer
  text: What was your family religion?
- speaker: Respondent
  text: Buddhism. It was of Shinshu Sect. My family was a very pious Buddhist family, and our next door neighbor was a Buddhist
    temple, with which we kept a special companionship as neighbors. We were very pious, and dedicated Buddhists.
- speaker: Interviewer
  text: Did you hear of Christianity before you left Japan?
- speaker: Respondent
  text: No, I didn't. It's all after I came over here.
- speaker: Interviewer
  text: You and your mother...in Japan... Well, were you the only son in the family?
- speaker: Respondent
  text: No. I had an older brother in Japan.
- speaker: Interviewer
  text: Two of you, you and your mother, came over here, is that right?
- speaker: Respondent
  text: No, I came by myself.
- speaker: Interviewer
  text: You left your mother back in Japan, then?
- speaker: Respondent
  text: Yes, that's right. When I was thirteen, I came over here by myself. My brother stayed in Japan.
- speaker: Interviewer
  text: At the age of 13; isn't it really much too young?
- speaker: Respondent
  text: That ages right.
- speaker: Interviewer
  text: How did it happen that you came to study?
- speaker: Respondent
  text: Well, the main reason was that my father who was here already was getting older and older, and thought it would be
    of help to him if I came and helped his work, and that he was thinking to come back to Japan after paying back his debts
    as soon as possible. That's what he kind of had in his mind.
- speaker: Interviewer
  text: A 13 year old by coming here to work?
- speaker: Respondent
  text: Well, right, you know, to help him out. You see, it was a farm work, and I was 13 already. I started to work right
    after I came. Therefore, I studied while I worked. I taught myself while I worked. I did study very hard, almost furiously,
    you might say. I would often go into detail and try to memorize such subjects as Chinese history, Eastern history, and
    others.
- speaker: Interviewer
  text: That's all after you came over here, isn't it?
- speaker: Interviewer
  text: Studying during the night?
- speaker: Respondent
  text: Yes, and all by myself. I was hoping then to go back to Japan and take examinations. To make that possible you have
    to study more and harder than you ordinarily learn in school, otherwise it's a bit too difficult to pass those entrance
    examinations. That's why I used to study really furiously.
- speaker: Interviewer
  text: Were you, then, willing to come here, or were you not?
- speaker: Respondent
  text: Well, I was still a kid. My father badly wanted... It was about the time when yobiyose-immigrants were to be ended,
    and the mood was such that if he didn't call me in then, he never could. So, I came just one year before the regulations
    on yobiyose immigration were revised. Under such circumstances he decided to invite me at that time. My brother could
    have been of more help to him, he rather was just looking for a helping hand, but my brother naturally had to look after
    the family. Then it was the second son's turn, so I came at last.
- speaker: Interviewer
  text: Do you remember something that happened while you were on the ship?
- speaker: Respondent
  text: While on board? Well, the kinds of things that I remember on the ship are those of untidy, sloppy behaviors of some
    people from Japan.
- speaker: Interviewer
  text: What kind of untidiness and sloppiness, for example?
- speaker: Respondent
  text: A vast majority of people came third class at that time. I came third class, too. When I talk of untidy things, although
    it is very difficult to point out certain specific matters, I'm talking mainly of the people's thinking, their viewpoints,
    you know. I really thought, "Are these people all right?" Besides that, nothing much is particular.
- speaker: Interviewer
  text: Weren't there many women on the same ship, too?
- speaker: Respondent
  text: Yes, that's right. And I heard about the affairs between some men and women while on board, though I was only a kid.
    Not to be only a kid, you see. I was quite concerned about such a matter in a way kids are concerned about certain things,
    and felt bad if that kind of thing should be let go unquestioned. The saying goes, "Don't feel guilty doing anything in
    a place you are passing through," and I have to say, even in those days when people go overseas, they are apt to think
    that way. No sense of responsibilities of shame.
- speaker: Interviewer
  text: Were those women on board coming as picture-brides?
- speaker: Respondent
  text: They might have been so in those days. I think they probably were.
- speaker: Interviewer
  text: What was your expectation of the USA before you left Japan?
- speaker: Respondent
  text: Well, what I had in mind was one that must be no different from anybody else's in Japan. "Since America is a rich
    country, the people must be living in a nicer place. Once I get there, we must be living in a nicer place than we are
    now in Japan." I believe I was thinking something like that. So, you see, I expected to be able to have a better life
    here. However, back in those days, the situation was especially terrible with Japanese everywhere, in California, over
    here, over there, no matter where they lived. The houses where Japanese were living were just like, let's see, like those
    chicken coops, narrow and small. The picture was the same everywhere. It was like that where I came to, and just about
    the same with many other Japanese I visited here and there. The houses for Japanese people at that time were just like
    a little bit widened and remodeled stables. It was true in California, too. Recently, well, even after the war it was
    very much the same. After the war, take for instance, I often used to visit Brawley of the Imperial Valley, California.
    And the Japanese people in the area were just like that. You see, this is after the war. Once their land lease was expired,
    they had 4 horse pull their house, and moved on to another field to work. It was really like that even after the war.
    Those Japanese farmers' situation in Brawley after the war truly reminded me of my early days in this country, because
    it was similar to the living conditions of Japanese people around Seattle and Tacoma a long, long time ago, around the
    time when I came to America. Today the situation is different, and you can hardly find any of such people nowadays.
- speaker: Interviewer
  text: How was the white people's attitude towards Japanese then?
- speaker: Respondent
  text: Well, in those days we were living in the countryside, and so we experienced less hostilities than those in the cities.
    But once you were out in the cities, it was all different, well, being called Japs was almost everyday thing. Hardly anybody—maybe
    with an exception of women—called us 'Japanese' as clearly as it should be said. Some people commented, "Please don't
    be offended when we say 'Jap.' It's only a word. It's almost an abbreviation by stopping at 'p' when we are supposed to
    say actually 'Japanese.' So, just take it as such, and don't be offended," but of course it is still distasteful to us
    anyway. So I used to tell them, "We don't hear it nice at all." That's not all... From around that time the anti-Japanese
    wave was gradually on its uprising. As it went on, I heard that people even spit on Japanese on the street. In fact, I
    myself was spit upon more than a few times. Eventually this sort of thing caused us to think that America was not a place
    to stay longer, and that it would be much better to go back to Japan. This is one of the reasons why so many people at
    that time wanted to go back to Japan as soon as they saved enough money. Those who had never been insulted before in their
    life back in Japan had to take such insults, since the educated and not-so-educated all alike were insulted indiscriminately
    once they were in this country. Therefore, we thought we should not stay so long in such a place, for a long time we thought
    that way... Well, until the outbreak of the war. As you may well know, the kind of very insulting attitude towards Japanese
    right before the war... Whether you were a college graduate or even a Phi Beta Kappa holder, it just didn't make any difference
    at all. As a result even college graduates with excellent academic records became barbers, or worked at laundry, or on
    farms and so on. Around right before the war started, discrimination against Japanese was much too harsh to that extent.
    Therefore, many Japanese people were really discouraged to, let's say, 'spread their wings and work in full.' Some people
    began to think that it might be better for them to leave this country as soon as possible and go back to Japan. In fact
    there were lots of people like that before the war, and a considerable number of them did go back to Japan then. Those
    of us who are still here today are the ones who put up with those experiences, and decided to stay and fought against
    the anti-Japanese atmosphere of the time.
- speaker: Interviewer
  text: How were Japanese people living during the period of 1920 through 1925?
- speaker: Respondent
  text: Well, just about the same, except that the wages became better gradually. Even so, the period between 1920 till around
    1925 was after all the worst time that America ever had. In 1919 this thing of picture bride was put under a ban, and
    then came the ban on immigration altogether. You see, the Gentleman's Agreement came to an end, and the immigration was
    banned... Such was the time, and the exclusion movement against Japanese became more and more extensive each day. Look
    at politicians of those days. They would say, "I am in favor of the exclusion of Japanese," and that became a part of
    their campaign platform, out of which they eventually gained more vote.
