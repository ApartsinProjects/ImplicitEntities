collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please state your name.
- speaker: Respondent
  text: Kusachi, Masaji.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Okayama.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: 1903. I am 75 years old now.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: He was in this country before I was born. He came back to Japan and again he was back in America. I came here as his
    yobiyose (summoned one) in 1919. My father was not working very hard when I came here. He was helping my older brother.
    He was growing strawberries. He bought a piece of land and growing strawberries. However, he went back to Japan three
    years after I came here.
- speaker: Interviewer
  text: You said you came here in 1919.
- speaker: Respondent
  text: Yes. I was 16 years old. I lived with my mother till then. I was working as a sales clerk at the agricultural cooperative
    association. It was soon after I graduated from Kohto Shogakko. Then I came over here.
- speaker: Interviewer
  text: What kind of person was your mother?
- speaker: Respondent
  text: She was a very strict person, but was very gentle in some way.
- speaker: Interviewer
  text: Were you scolded by her?
- speaker: Respondent
  text: Yes, (laugh)... She was very strict. I have 4 brothers and sisters. I am the last one. Both of my elder brothers were
    gone. I still have my older sister in Japan. She must be 80 years old this year. She was farming. My family was farmers.
    We own a field. We produced enough to eat. We also had peach and others. We had rice paddy. We helped others, too. During
    the summer time, I used swamp peaches and shipped them out. I must have been 14 or 15 years old. I just graduated from
    the school.
- speaker: Interviewer
  text: How far did you go in your schooling?
- speaker: Respondent
  text: I went to Jinjo Koto Gakko (8th year). I liked school very much. There were 42 students in my class. I was the 2nd
    smallest boy in the class. I had good friends. One of them is still alive. Even if I visit Japan, none of my classmates
    are alive except this one. I do remember this man who was from my village, but I wouldn't even be able to recognize students
    from other villages. I do remember one woman, but I don't know the rest. There were also those who went to war in the
    South East Asia and died.
- speaker: Interviewer
  text: What do you remember from the time when you lived with your mother?
- speaker: Respondent
  text: Let's see... my mother used to take me to visit a temple, my family belonged to Nichiren Sect.
- speaker: Interviewer
  text: What kind of games and plays did you do?
- speaker: Respondent
  text: I used to go fishing with my good friend. We set a trap with a straw and a big bottle. We put some sake lees in the
    bottle and put in the bottom of the stream. Sake lees got dissolved and washed downstream. Haye (a dance) would swim upstream
    and come into the trap. They would go around to the upstream and come into the bottle. The mouth of the bottle is set
    in such a way that once they got in, they couldn't get out. We used to do this a lot. We could catch many of them in that
    manner. We used to set about 3 traps at a time. There is a saying chikuba no tomo (a childhood of bamboo horse), the time
    when I played around with my childhood friend was the best time. I used to make a tall bamboo horse. If the other had
    a 5 ft horse, then I would make a 6 ft horse, and rode around it. We used to play with it a lot. When a boy stepped over
    a ditch, then I would do the same. I suppose kids nowadays wouldn't play with a bamboo horse anymore, even in Japan. I'm
    really impressed by the word, "chikuba no tomo".
- speaker: Interviewer
  text: Did you like any subjects at school?
- speaker: Respondent
  text: Well, I didn't like those study subjects very well, however I liked to draw pictures.
- speaker: Interviewer
  text: What kind of job did you do at the Agricultural Cooperative Association?
- speaker: Respondent
  text: Oh, it was a sales clerk. They sold a lot of things such as groceries, dry goods, tools and others. In the beginning
    I was just a sales clerk, however, soon after that I began to do some wholesale purchasing for the association. I would
    take an inventory of the store and look over the materials which might be needed. Then I would go to the wholesale store
    and order those items. I used to go to the town of Okayama which was about 2 to 3 miles away. The thing which I was afraid
    of was when we had exceptional sales, Obon (the day of the Feast of Lanterns) and the new year. I was really afraid of
    those dates. In Japan those days were prime target for burglary. Usually my friend used to come and stay with me. However,
    he wouldn't come to stay with me on those days. Once I slept with a wooden sword under my pillow. However, I was never
    burglarized. I used to take the whole income of the day to the manager of the association. So I didn't have any cash with
    me. Even though I didn't have money, some people might think that I have the receipts of the sale. That's why it was very
    dangerous. Those receipts were very large, because most of the time people buy things on credit, but they paid up on these
    days. So I would say there was somewhere between ¥3,000 to ¥4,000. There were about 50 families in that village. There
    was not much cash exchanged on the average day. There was also a peach cooperative association, too. A broker would bring
    his cash and leave it with the association. That was why farmers didn't have to worry about not being paid. They had the
    cash already. So they sent their peaches to that man. I was also afraid of that day, too. Brokers from Osaka, Kobe and
    Nagoya used to come and left the cash with us, so it would be over ¥3,000 or even ¥4,000. They did that so that the brokers
    can make sure that they got the peaches. In the beginning farmers suffered a lot because they didn't get their money when
    they sent out their peaches. Soon they installed that kind of system. There were many cases of fraud before that. I still
    remember one case. A man came from Tsuruga and asked us to send peaches to him. At that time we had Tenshin peach, which
    was pointed at the top and red inside. He wanted to have that peach. So we sent a cargo to him, but we never received
    the payment. Later on we changed to the cash system. Even if we went to look for him, we wouldn't be able to find him.
- speaker: Interviewer
  text: Were farmers in your area poor or rich?
- speaker: Respondent
  text: They were rather well to do, I think. Nowadays they grow hot house grapes, so they are very well to do. However, they
    do need a big capital to do this. They used to use coal to heat the hot house, but they use oil now, so it's really easy
    to control heat. However, it's more expensive that way. But all of them are doing well with large setups. There are quite
    a few people who gross several million yen a year.
- speaker: Interviewer
  text: How long did you work there?
- speaker: Respondent
  text: I worked there for 2 years, when I was 14 and 15 years old.
- speaker: Interviewer
  text: Have you made any mistake there?
- speaker: Respondent
  text: No, I don't think so. However, I do remember one thing though many sacks of Fu (a light dry cake made of gluten) were
    eaten up by mice. It was a very expensive thing. They used to use that for summer cooking. We had bought them from wholesale
    and hung them from the ceiling. But mice got into that, too. From that time on I became very good at catching mice. I
    filled a big jar with water till very close to the top, floated chaff on the surface. So they think it's a pile of chaff,
    but actually it's deep water underneath, so they got drowned in it. It was a good method, so I cleaned up all the mice
    we had in the storage room. This method didn't need any of my time. There was no smell or anything, so they came in one
    after another.
- speaker: Respondent
  text: Well, I came here when I was 16 years old, but I didn't expect to stay here this long.
- speaker: Interviewer
  text: What was the reason why you came to this country?
- speaker: Respondent
  text: Well, I had my father here. He called me to this country.
- speaker: Interviewer
  text: What did you think of America before you came here?
- speaker: Respondent
  text: Well, I was coming to a country where I did not know anything about, so I was very uneasy. When I graduated from school,
    I had to decide whether or not I should continue my schooling or come to America. My father told me to come, so I came.
- speaker: Interviewer
  text: Did your father tell you anything about America?
- speaker: Respondent
  text: No, he didn't say anything. Except that it was an unknown country and I was very curious about it.
- speaker: Interviewer
  text: Were there anyone in your village who came to America?
- speaker: Respondent
  text: Yes, there were. My cousin came over here ahead of me, too. There were two or three people of my neighborhood who
    had come ahead of me. One of them was in Salt Lake City. He had passed away. One of them was in Oregon, but he also passed
    away. There was one who smuggled in. He got caught and was sent back to Japan. It must have been in 1924 to 1926. There
    were quite a few people who smuggled in during that period. They came here as seamen, and jumped in Portland River. There
    were brokers for this, too. There were many smuggling at that time. You see, they passed the law in 1924 so that Japanese
    couldn't immigrate any more. So smuggling became very frequent because of curiosity, I think. They had contacted a broker
    over here, and he would hide him away as soon as he landed. Those brokers were Japanese. They were mostly gambling joint
    workers. As soon as they got there, they would send them away as railroad workers, or farm workers.
- speaker: Interviewer
  text: When you left Japan where did you get on board?
- speaker: Respondent
  text: Yokohama. I was by myself. I left my mother there. My sister was already married by that time. My older brother was
    in Japanese Navy. He entered Navy when he was 19 years old. My mother was a very cheerful person. All the villagers liked
    her, so I don't think she was lonesome. She never came to America.
- speaker: Interviewer
  text: How was the trip on the boat?
- speaker: Respondent
  text: There were young men from Sendai and Kagoshima who stayed with me at an inn called Fukuiya. We were in the same room
    and traveled together. However, we had zuzu ben (Tohoku brogue) and Kagoshima ben (Kagoshima dialect) which were very
    difficult to understand. So we had a very bad communication problem. I thought, "Even within Japan there are places where
    spoken words cannot be understood." It was my first experience and felt that Japan was a very large country. Well, right
    before we got on board, they discovered that three of us had hookworms. So we had to be hospitalized for a while. It looked
    as if the hospital room was an attic. We couldn't eat anything and our digestive system was cleaned out. So we were completely
    exhausted. So we had to wait for the next ship. There was about 2 weeks wait. It was during August, so three of us went
    swimming every day in Yokohama. As soon as we ate breakfast at the inn, we took an electric car and went to beach. You
    see, we were just out of our starvation diet and were very hungry. At the beach they used to sell dango (dumpling) on
    skewer. Each skewer had 4 dango on. Three of us ate all the dango one store had. It was a store managed by an old woman.
    Well, finally we passed physical and got on the next ship which was Africa Maru. I didn't get seasick, so it was Ok on
    board. It took 14 days to come to Seattle. When we came to Seattle, they discovered that I still had the hookworms. So
    I was detained in the immigration office again. I was there for three weeks. They examined you only once a week. So I
    was there for three weeks. It was very hard. I felt like I was placed in a jail. We were fed Chinese food. When we went
    to eat, they counted the number of those who went. We ate meal and then when we came back, they counted the number again.
    When we slept, it was like silkworm beds. The day after I failed the examination for the hookworms, they made me take
    medicine and castor oil. On top of that, I couldn't go to the mess hall. At that time a friend of mine sprinkled sugar
    on a bread, hid it somewhere and brought it back to me. I also did that for other people, too. You know we were really
    hungry.
- speaker: Interviewer
  text: Is that Immigration office on an island?
- speaker: Respondent
  text: No, it was right in the middle of Seattle. That old building is still standing there. It turned black though. It had
    iron bars on the window. It was only for Japanese. But the cook was a Chinese.
- speaker: Interviewer
  text: Did you feel as if you were in jail?
- speaker: Respondent
  text: Yes, I did. It was very uncomfortable. When a person was released from confinement, he would buy something and gave
    it to the fellow detainees, such as candies, or fruits. We were really happy to receive them. So when I got out, I also
    bought something and gave it to them. You see, there was nothing we could eat except the meal time. There was nothing
    we could buy either. The food had really strong odor. The thing I didn't like most looked like boiled straw. We just couldn't
    eat it. I still don't know what that was. So the only thing we could eat was a piece of bread sprinkled with sugar. Even
    rice, we ate it raw sometimes, but Chinese rice is very dry and has an odor. We weren't used to it so we couldn't eat
    it. We ended up eating a lot of bread. I felt as if we were put in a jail for three weeks.
- speaker: Interviewer
  text: Did you see any graffiti?
- speaker: Respondent
  text: No, I didn't see anything like that.
- speaker: Interviewer
  text: Did you remember your father?
- speaker: Respondent
  text: Yes, I did. You see I had my older brother here, earlier. But I lived with my father for about 12 years. As soon as
    I was released from the immigration office, I was taken to Hood River. At that time there was no such thing as highway.
    It was a dirt road. It was in a mountain and I got in there after dark. I was aware of large trees on both sides of the
    road, so I was wondering how far I was taken away from the civilization. In the morning I saw fields, so I felt that it
    was only a countryside. It was in the beginning of November. I left my home in the end of October.
