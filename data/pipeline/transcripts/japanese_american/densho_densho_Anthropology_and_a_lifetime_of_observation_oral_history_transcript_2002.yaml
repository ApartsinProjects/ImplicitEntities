turns:
- speaker: Interviewer
  text: Can you tell me about your early family background and how it influenced your interest in anthropology?
- speaker: Respondent
  text: Well, my father's family was from Minnesota, and they had a strong sense of community and tradition. My mother was
    very interested in reading and education, which definitely shaped my intellectual curiosity. Growing up, I was always
    aware of rituals and social customs, which later became a focus in my anthropological work.
- speaker: Interviewer
  text: What were some of the key experiences during your undergraduate years that led you to pursue anthropology?
- speaker: Respondent
  text: I attended the University of Minnesota, where I was fortunate to study under Albert Jenks and others who encouraged
    me to look at social forces and traditions. Working with Ruth and Wilson Wallis was particularly influential, as was my
    summer work with the Pomo Indians in California. These experiences gave me practical insights into life histories and
    cultural practices.
- speaker: Interviewer
  text: How did your work with the Makah Indians and at the Poston War Relocation Camp shape your approach to anthropology?
- speaker: Respondent
  text: Those were formative experiences. With the Makah, I learned to work closely with a community and understand their
    social structures. The Poston War Relocation Camp exposed me to the harsh realities of displacement and the importance
    of documenting people's stories. Both experiences deepened my commitment to ethnographic fieldwork and social justice.
- speaker: Interviewer
  text: What led you to Northern Rhodesia in 1946, and how did your work there develop?
- speaker: Respondent
  text: I went to Northern Rhodesia to work with Max Gluckman at the Rhodes-Livingstone Institute. It was an exciting time,
    and I was involved in studying social organization and rituals, including work on the rain shrine. The fieldwork was challenging
    but rewarding, and it helped me develop a more nuanced anthropological perspective.
- speaker: Interviewer
  text: Can you describe your research on the Gwembe Tonga and the forced resettlement study?
- speaker: Respondent
  text: Starting in 1956, I studied the Gwembe Tonga who were being forcibly resettled due to a dam project. It was a complex
    situation involving political and social upheaval. We looked at migration patterns, community responses, and the impact
    of displacement. It was difficult work, but it provided important insights into resilience and adaptation.
- speaker: Interviewer
  text: How did your academic career evolve after your fieldwork in Africa?
- speaker: Respondent
  text: After my fieldwork, I held positions at Manchester University and later at Boston University, where I continued my
    research and teaching. Eventually, I joined UC Berkeley's Department of Anthropology in 1964, where I was involved in
    faculty groups, committees, and mentoring students. My work expanded to include broader issues in social anthropology
    and ethics.
- speaker: Interviewer
  text: What were some of the challenges and achievements you experienced as a woman in academia during your career?
- speaker: Respondent
  text: There were certainly challenges, including discrimination and underrepresentation. I was involved in the 1970 report
    on the status of women at Berkeley and participated in women's faculty clubs. Standing up and being counted was important,
    and over time, progress was made. I also valued mentoring younger women and contributing to a more inclusive academic
    environment.
- speaker: Interviewer
  text: Can you share your thoughts on the evolution of social-cultural anthropology over your career?
- speaker: Respondent
  text: Social-cultural anthropology has evolved significantly, becoming more reflexive and interdisciplinary. There has been
    a greater emphasis on ethics, collaboration, and understanding global changes. My own work has reflected these shifts,
    especially in studying migration, resettlement, and the complexities of social life in changing contexts.
- speaker: Interviewer
  text: What advice would you give to future anthropologists based on your lifetime of observation and research?
- speaker: Respondent
  text: I would advise them to be deeply engaged with the communities they study, to be open to new perspectives, and to maintain
    ethical integrity. Anthropology is about understanding people in all their complexity, and that requires patience, respect,
    and a willingness to learn continuously.
