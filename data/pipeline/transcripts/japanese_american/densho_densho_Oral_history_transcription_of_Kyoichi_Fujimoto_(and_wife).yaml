collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please state your name.
- speaker: Respondent
  text: My name is Kyoichi Fujimoto.
- speaker: Interviewer
  text: How do you write it in Chinese letters?
- speaker: Respondent
  text: Fujimoto is like wistaria's Fuji and moto is like a book. Kyo is like a palace and Ichi is a letter similar to seasons.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in Meiji, thirtieth year, 1897. I was born in Yamaguchi Ken.
- speaker: Interviewer
  text: Did you say that you were born in Yamaguchi Ken?
- speaker: Interviewer
  text: What do you remember about your childhood life? Do you remember anything particularly well?
- speaker: Respondent
  text: I was born in the thirtieth of Meiji. When I was about to finish 8th grade in Japanese school my father who was living
    in Stockton knew a man called Jinnojo Hayashi who also lived here in Stockton. He arranged the way so that I could come
    to America when I became 15. It was a fall I remember. I arrived at San Francisco in the Poe.
- speaker: Interviewer
  text: Many second and third generation Japanese here would like to know what living conditions were like in Japan when you
    were growing up there. Do you remember anything?
- speaker: Respondent
  text: I was too little to notice much of anything. I left Japan when I was 15. I arrived at San Francisco. It was the time
    President Taft was visiting San Francisco. There was much commotion in the town. My father couldn't come and meet me at
    the port. I was sent to the immigration office in Angel Island. I stayed there ten days with a group of stowaways. There
    was a big celebration going on because of the President's visit. Many offices were closed. Finally when it was over my
    father came to Angel Island and I met him for the first time in my life. I was allowed to enter San Francisco. I went
    to Stockton from San Francisco. I stayed at Mr. Jinnojo Hayashi's place in Stockton. Mr. Hayashi was an agent for "Nichibei
    Daily". He also engaged in the business of growing asparagus down the river. He was well known among the people in Stockton,
    as well as Mr. Kinji Ushijima. Mr. Matsumoto was a well educated man, very intelligent. Many people depended on his knowledge.
    He was too educated for just an ordinary farmer.
- speaker: Interviewer
  text: Where was your father then?
- speaker: Respondent
  text: He used to live here. He was with Mr. Jinnojo Hayashi and Mr. Renjutsu Matsusita. They all came from the same area
    in Japan. My father worked in the asparagus field on Orlude Island.
- speaker: Interviewer
  text: Where is this?
- speaker: Respondent
  text: It is in the San Joaquin River. The Island still produces asparagus as of today. It will be harvesting time in another
    week or so. I went to the Island first, but I wanted to go to school, so I moved into town to 121 East Rafaet, Stockton,
    where Mr. Hayashi operated the "Nichibei Daily". In that building one section was for the newspaper. The second floor
    was a picture studio run by a Japanese, Mr. Niiyama. In the dark corner of the same building there was a Presbyterian
    Church. It was a very small room as I remember.
- speaker: Interviewer
  text: When did your father arrive in Stockton?
- speaker: Respondent
  text: He left Japan when I was a baby. He went to Hawaii first, then came here. He was here about fourteen years when I
    came to America. I was told that I was two years old when he came to the States.
- speaker: Interviewer
  text: Did you come here all by yourself from Japan?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What kind of a ship were you on?
- speaker: Respondent
  text: The name of the ship was the "Tenyo-Maru". Yokohama Port was only a name then. There was no pier. The ship stayed
    far away from the shore. There were row-boats that transported us to the ships. I left Japan in the middle of the fall.
    I remember how pretty Mount Fuji looked.
- speaker: Interviewer
  text: Do you remember what kind of people were on the ship?
- speaker: Respondent
  text: There were no children of my age going to a foreign country then. I was the only child on that ship. There were not
    too many immigrants then. The time was before the picture bride. It was difficult to come to America in those days.
- speaker: Interviewer
  text: Was there something memorable that happened while you were on the ship?
- speaker: Respondent
  text: There wasn't anything special that I remember. The ship took seventeen days.
- speaker: Interviewer
  text: Did you have any idea what America was like?
- speaker: Respondent
  text: I had no opportunity to read many books about America. I knew the story about George Washington, "The Cherry Tree
    and His Ax" the story telling about his honesty, also I knew that the country is a Christian country.
- speaker: Interviewer
  text: Did your father tell you about America?
- speaker: Respondent
  text: No, not really. I never lived with my father. As soon as I came to America I lived in town while my father lived in
    the countryside. My mother divorced my father and left me when I was little. I grew up not knowing my parents. My grandmother
    took care of me. I did not have a very happy childhood. I remember that I cried a lot. I knew that I was an orphan.
- speaker: Interviewer
  text: I understand that you stayed on Angel Island for a while. When were you allowed to come into San Francisco?
- speaker: Respondent
  text: Like I mentioned before, because I had no one to come and get me, I wasn't able to enter San Francisco. There was
    much commotion because of the visit of the President. Many governmental agencies were closed including Angel Island. My
    father came to San Francisco but he was unable to meet me. I was sent to Angel Island. I stayed on the Island for about
    two weeks. I think I told you that I had to room with stowaways.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: About two weeks. I had just come from Japan. I wasn't used to the food there. I couldn't eat. The food smelled awful.
    For two weeks I drank nothing but many cups of coffee. I put lots of cubes of sugar in them. I survived somehow.
- speaker: Interviewer
  text: After that what did you do?
- speaker: Respondent
  text: As soon as my father came and got me out of Angel Island, I entered San Francisco. From San Francisco I went to Orlude
    Island. I stayed with my father about a week, then I left there for town. I lived with Mr. Jinnojo Hayashi and Mr. Makoto
    Kobayashi, who was a pastor. They were my guardians. I went to school from there.
- speaker: Interviewer
  text: How long did you stay in San Francisco?
- speaker: Respondent
  text: I stayed only two days.
- speaker: Interviewer
  text: What was San Francisco like then?
- speaker: Respondent
  text: It wasn't like these days. It was right after the big earthquake; very few automobiles were on the streets. It wasn't
    too pretty a city then. It was a big city I thought.
- speaker: Interviewer
  text: What impressed you most?
- speaker: Respondent
  text: I was impressed by the beauty of the harbor. There were ferries on the bay. There was no bridge then.
- speaker: Interviewer
  text: You mean you crossed the bay by a boat?
- speaker: Respondent
  text: That is right. There was the pier at Santa Fe. There was a train station near the pier. Every time a boat came in
    a train waited for the customers. I took a train from Santa Fe. It took around seventy minutes to get to Orlude Island.
    I was flabbergasted by the country's broadness. There were no mountains that I could see. Also there were not many houses.
- speaker: Interviewer
  text: How about the language problem?
- speaker: Respondent
  text: I couldn't speak English at all then. I knew the English alphabet. I was interested in the idea of going to America.
    I taught myself the English alphabet when I was ten. I could spell my name in English and words like Japan, Yokohama etc.
    in English.
- speaker: Interviewer
  text: Could you tell me about the life in Orlude Island?
- speaker: Respondent
  text: I wanted to go to school so I moved into town, 121 La Feat. Mr. Niitsuta had a picture studio upstairs and Mr. Jinnojo
    Hayashi had the "Nichibei Daily" downstairs. I lived in one of the rooms there. I got up every early in the morning and
    delivered the newspaper.
- speaker: Interviewer
  text: The papers were Japanese newspapers?
- speaker: Respondent
  text: Yes, they were the "Nichibei Daily". Later they changed the name to "Hokubei Asahi". Also I delivered the "Shinsekai"
    and the "Ofu Nippo". At the time "Ofu Nippo" was published in Sacramento. In the morning I delivered the "Nichibei" and
    the "Shinsekai". At lunch time I delivered the "Ofu Nippo". After school, around 3:30 in the afternoon I went to an American
    family's house and helped the cook and washed dishes. I got some money for doing that. I lived in the room next to the
    Presbyterian Church. In the same building there lived Mr. Niitsuta who operated a picture studio. He had a wife. His wife
    cooked for all of us, including the pastor. Mr. Jinnojo Hayashi and I, we lived together for some time, that is why I'm
    very familiar with a church because I lived with a pastor for a while.
- speaker: Interviewer
  text: How many copies of the Japanese Newspaper did you deliver?
- speaker: Respondent
  text: About eighty copies a day. Then "Nichibei Daily" had more subscription than the other papers.
- speaker: Interviewer
  text: You mean the other paper that was in this area?
- speaker: Respondent
  text: Yes, that was in this town. There were many Japanese who lived down the river. In the Island many other Japanese lived
    in the camps. There was a ferry that went to the islands every morning carrying the mail. There were around fifty copies
    of the newspapers that came from San Francisco to be delivered to the Island.
- speaker: Interviewer
  text: Were the newspapers published daily?
- speaker: Respondent
  text: Yes, they were. I got up every morning at five. I went to the post office and waited. The post office opened at six.
    I received the papers and sorted them. The ferry made four trips till nine o'clock in the morning. I got on the boat with
    the papers and went to different islands. After I finished delivering on the islands, I went around the town. I still
    remember how many copies I delivered. The copies were usually around eighty. I carried two bags full of the newspapers,
    one bag for the "Nichibei" and the other for the "Shinsekai". I hardly had time to eat breakfast in those days. I usually
    ate an apple and ran for school. During the lunch break I delivered the "Ofu Nippo". The newspapers were usually thirty
    or thirty-five copies. There were many days that I didn't eat breakfast nor lunch. I did not have a very easy life.
- speaker: Interviewer
  text: Would you tell me about school?
- speaker: Respondent
  text: Yes. I entered first grade in the elementary school. I finished 8th grade in four years, then I entered high school
    here in 1917... no, it was 1913. I was the first Japanese to graduate from high school in this town.
- speaker: Interviewer
  text: Were there many Japanese who lived here when you came?
- speaker: Respondent
  text: Yes, there were. It was the time that they started cultivating down the river. Many Japanese laborers gathered down
    there. I would estimate that around 6,000 Japanese were here, perhaps 2,000 in the town, the rest of them lived in the
    country and the islands. Most of them were young bachelors.
- speaker: Interviewer
  text: Didn't they go to school?
- speaker: Respondent
  text: No, they were already grown men. They were too late to enter elementary school. I was sixteen but fortunately I was
    small in size, still I was pretty big compared with the boys eight or nine years old. It was very hard for me at the beginning.
    I told myself that I should bear it for a while. It was the time that the Presbyterian Church and the Buddhist church
    for the Japanese started here. There were all kinds of Japanese here. They needed some organization. Many of them indulged
    in gambling. Most of them were young men. Many of them were like my father. He went to Hawaii first and there was an immigration
    law that prohibited the Japanese from coming to the States in the future. They thought that if they missed the chance,
    they would never get into America. Many men entered America in a hurry. They were all about thirty years old, young men
    but too old to enter elementary school. They must work; besides there were no schools for those men here. They worked
    as a house-boy, a cook or a farm laborer. If you want to know the history of the Japanese and the churches in Stockton
    you must know Mr. Jinnojo Hayashi, Mr. Kinji Ushijima and Mr. Matsumoto who came from Kumamoto Ken. They started agricultural
    businesses down the river. You must know them so that you will understand how the Japanese immigrant community in Stockton
    was formed. I would like you to know that at the beginning there were only sixty Japanese in Stockton. Mr. Kinji Ushijima
    and Mr. Matsumoto thought that there was a good farming opportunity down the river. They found a Caucasian financier and
    dredged the rich soil from the river. They dredged fertile soil from the river and made an island in the middle of the
    river. Mr. Ushijima started this farming. Because of Mr. Ushijima the farming was very successful and prospered. Mr. Matsumoto
    who came from Kumamoto Ken started cultivating Sharman Island. He was a stockholder in the "Stockton Hotel", which is
    the oldest building in Stockton. He was a founder of the "Shima Tract", which is operating as of today. It is a strip
    of island of about seven acres. Half of the island was natural so that it was easy to build the land on it. It was a very
    successful operation. His operation was interesting enough to obtain the Caucasian's financings. He got enough capital
    and started cultivating Bacon Island in 1911. There are few Japanese still living in the Island. When I came here at the
    time that island did not exist. It was a little mound of dirt in the river. Like I said before, the farming was very successful.
    There were all kinds of people. All of them had a job. Soon they indulged themselves in gambling. The Chinese owned the
    gambling establishments.
- speaker: Interviewer
  text: You mentioned asparagus. Were they cultivating asparagus then?
- speaker: Respondent
  text: Yes, they were. There was a cannery. They canned asparagus and sold quite a lot.
- speaker: Respondent
  text: There were potatoes. In those days asparagus wasn't familiar.
