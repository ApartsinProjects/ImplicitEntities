collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I understand that you were born in Akita Prefecture, and went to Ueno in Tokyo. Did you have ten brothers and sisters?
- speaker: Respondent
  text: Yes, I was adopted. My father was the station master of Ueno station.
- speaker: Interviewer
  text: When you were little your father's friend's baby died, and you were nursed by the baby's mother. Then they adopted
    you because they loved you.
- speaker: Interviewer
  text: When your father went to Tokyo did you go with him?
- speaker: Respondent
  text: He worked at Ueno station, I learned to play samisen from a mistress who owned a sembei (rice cake) store in Kanda.
    I was 11 years old when I started learning samisen. I memorized the tunes while I was watching other students practise,
    so when my turn came it was easy. I had a good memory then, but now my memory is bad because I am 97 years old.
- speaker: Interviewer
  text: How many years did you study samisen, about 5 years?
- speaker: Respondent
  text: Longer than that.
- speaker: Interviewer
  text: How much education did you have?
- speaker: Respondent
  text: I quit school after the 6th grade.
- speaker: Interviewer
  text: Did you get married?
- speaker: Respondent
  text: Women did not have much education in those days. Yet I taught nagauta (a long epic song) music in Seattle. I could
    not teach dance because it was a different school.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: I did not hate it, but I was too busy with samisen lessons.
- speaker: Interviewer
  text: What did you do after you quit school?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: It was 77 years ago.
- speaker: Interviewer
  text: Did you get married in Japan?
- speaker: Respondent
  text: No, here. The manager of Furuya Company in Seattle acted as a go-between. In those days Nishiyori bought merchandise
    from the Furuya Co. and sent them to railroad gang in Montana. One day Mr. Furuya asked Nishiyori if he wanted to marry
    a girl who had just come from Japan. Nishiyori thought I was too young, because he was 16 years older than I was. He was
    a short man, and when we had a picture taken together I looked taller with my high-heel shoes, so we had another picture
    taken with me sitting down, and sent it to Japan.
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I came to America in 1905.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was about 20, so boys followed me around. When I was working at a white family, I had a nail stuck in my finger
    and I was hospitalized in Seattle General Hospital. There were 8 ladies in one room, and they called me 'Jap lady.' I
    did not have money to pay the hospital, but a doctor paid the bill for me. I think he wanted to marry me, but I did not
    want to marry the doctor.
- speaker: Interviewer
  text: Did you come to America alone?
- speaker: Respondent
  text: I cannot tell you.
- speaker: Respondent
  text: My sweetheart smuggled me in here to study English. I was going to return to Japan in about 3 years, but I came to
    like it here so much that I did not want to go back. When I wrote a letter to my sweetheart telling him that I decided
    to stay here, he wrote me a kind letter telling me to be careful not to marry a drunkard or a good-for-nothing man.
- speaker: Interviewer
  text: Did the letter come from home?
- speaker: Respondent
  text: No, not from my father, but from my sweetheart. I came to Seattle in 1905, and went to a Methodist church. Bishop
    Togo took me to a room and let me stay there overnight for 15 cents. I did not have money, and I did not know English
    so I wanted to learn English.
- speaker: Interviewer
  text: About how many years did you study English?
- speaker: Respondent
  text: I could not study. I went to work at Rev. Martin's. Mrs. Martin could not hear well. Rev. Martin used to say long
    prayers before every meal, before going to bed or after he got up. I wished he would say shorter prayers, but I couldn't
    tell him that.
- speaker: Interviewer
  text: When did you have an operation on your legs?
- speaker: Respondent
  text: I had my legs amputated last year.
- speaker: Interviewer
  text: Did you stay at the church when you were single?
- speaker: Respondent
  text: I did housework at the pastor's home.
- speaker: Interviewer
  text: Did you get married after that?
- speaker: Respondent
  text: Mr. Furuya was the match-maker. Nishiyori was 16 years older than I was.
- speaker: Interviewer
  text: Was your husband in Wyoming?
- speaker: Respondent
  text: No, he was in Montana. He went food and clothes to Montana from Seattle.
- speaker: Interviewer
  text: Where did you live after you got married?
- speaker: Respondent
  text: In Seattle.
- speaker: Interviewer
  text: Did your husband work for Furuya Co.?
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I think I was around 20.
- speaker: Interviewer
  text: Was your husband a good man?
- speaker: Respondent
  text: He was too scrupulous. He wanted even his pants to be creased neatly.
- speaker: Interviewer
  text: Did you quarrel?
- speaker: Respondent
  text: I didn't like to quarrel, so I avoided it.
- speaker: Interviewer
  text: Did he hit you?
- speaker: Respondent
  text: No, never. If he had hit me I would not have stayed with him not even a day.
- speaker: Interviewer
  text: How long did your husband work for Furuya Co.?
- speaker: Respondent
  text: He did not work for Furuya Co. He worked for the Oriental Trading Co. He sent merchandise to Montana through Furuya
    Co.
- speaker: Interviewer
  text: Did he travel around?
- speaker: Interviewer
  text: How did the depression hit you?
- speaker: Respondent
  text: It did not hit me too hard because I was working. I made pancakes and cookies in place of bread. I learned how to
    cook.
- speaker: Interviewer
  text: Did you continue doing housework after you got married?
- speaker: Interviewer
  text: Did you do alteration on shirts to be sent to Montana?
- speaker: Respondent
  text: Yes, I did. In those days we had old-fashioned sewing machine about made a lot of noise. Later we bought a new machine
    for 200.
- speaker: Interviewer
  text: How many children did you have?
- speaker: Respondent
  text: Just one, but I have grandchildren.
- speaker: Interviewer
  text: How long did your husband work for the Oriental Trading Co.?
- speaker: Respondent
  text: Did he work till the war broke out?
- speaker: Interviewer
  text: Yes, he did. In those days there were not many Japanese who could speak and read English like he did. I did not like
    him too well but I married him because I thought it would have been inconvenient if I married a man who could not speak
    English. He was 16 years older, and very scrupulous. He never wore wrinkled clothes.
- speaker: Interviewer
  text: Did you suffer hardship during the depression?
- speaker: Respondent
  text: Everybody suffered hardship during the depression. I think the businessmen had a hard time.
- speaker: Interviewer
  text: Did anything interesting happen when you came here?
- speaker: Respondent
  text: Nothing interesting happened, but when I was in the hospital boys came to see me with candies and flowers.
- speaker: Interviewer
  text: Were they Japanese?
- speaker: Respondent
  text: Yes, they were all Japanese. The doctor was a Japanese, too. He did not charge me for the hospital or operation fee.
- speaker: Interviewer
  text: Did your husband make much money?
- speaker: Respondent
  text: Not too much. He was paid $75 a month, so it was not bad in those days.
- speaker: Interviewer
  text: Did you have enough money while your husband worked for the Oriental Trading Co.?
- speaker: Respondent
  text: He was paid $75 which was good money in those days, but there was much social expenses. When friends come we had to
    serve dinner or drinks.
- speaker: Interviewer
  text: Were there many single Issei men in those days?
- speaker: Respondent
  text: Yes, there were.
- speaker: Interviewer
  text: Were they not too good?
- speaker: Respondent
  text: They came to visit me while I was in the hospital.
- speaker: Interviewer
  text: Did single men gamble?
- speaker: Respondent
  text: I think they did. It was no good.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I thought a terrible thing has happened. My husband was sick in bed at that time. He said that if this lasted long
    Japan would be defeated because Japan does not have material to make weapons. I think he was right.
- speaker: Interviewer
  text: When did your husband die?
- speaker: Respondent
  text: On January 24, 1942 from asthma. The doctor told him to stop smoking, but he didn't quit until he died.
- speaker: Interviewer
  text: Was it hard to evacuate without your husband?
- speaker: Respondent
  text: Yes, it was hard as he was gone. The boat on which my grandchildren came to attend the funeral refused to let them
    land as they were enemy aliens. I knew a white policeman, so I had to ask him to bring my grandchildren to the funeral.
- speaker: Interviewer
  text: Where was the Oriental Trading Company?
- speaker: Respondent
  text: It was in Seattle.
- speaker: Interviewer
  text: Did you live in Seattle then?
- speaker: Interviewer
  text: Where did your son live?
- speaker: Respondent
  text: He lived on Vashon Island.
- speaker: Interviewer
  text: Did you have the funeral without any trouble?
- speaker: Respondent
  text: Yes, I did. We had bought a plot in a cemetery on Vashon Island, so he was buried there.
- speaker: Interviewer
  text: Did many people attend the funeral from Seattle?
- speaker: Respondent
  text: Many of my friends came to Vashon Island, with Rev. Machinda.
- speaker: Interviewer
  text: How old was he when he died?
- speaker: Respondent
  text: He was 77 years old.
- speaker: Interviewer
  text: Did you evacuate after the funeral?
- speaker: Respondent
  text: Yes, I did. I was 60 years old and a widow, so some men wanted to marry me, but I didn't want to. When I put on make-up,
    wore a wig and danced on the stage I looked young.
- speaker: Interviewer
  text: Where did you go first?
- speaker: Interviewer
  text: How was Pinedale?
- speaker: Respondent
  text: I think it was on 4th July that I danced. It was so dusty that my hair was white with dust.
- speaker: Interviewer
  text: How was your quarter?
- speaker: Respondent
  text: It was just a barrack.
- speaker: Interviewer
  text: Was it very inconvenient?
- speaker: Respondent
  text: We had to stand in a line to be served at the mess hall. It was so hot that people fainted. More young people fainted
    than old people.
- speaker: Interviewer
  text: Did you work at Pinedale?
- speaker: Interviewer
  text: Did you learn anything?
- speaker: Respondent
  text: I taught dancing.
- speaker: Interviewer
  text: How was the food?
- speaker: Respondent
  text: I thought it was good.
- speaker: Interviewer
  text: How was the life at Pinedale?
- speaker: Respondent
  text: It was not bad, but it was hot.
- speaker: Interviewer
  text: Where did you go from there?
- speaker: Respondent
  text: I went to Tule Lake.
- speaker: Interviewer
  text: How was Tule Lake?
- speaker: Respondent
  text: It was very hot there, too.
- speaker: Interviewer
  text: Did you work?
- speaker: Interviewer
  text: Did you teach dance at Tule Lake?
- speaker: Respondent
  text: I do not remember if I taught dance or samisen. I remember teaching nagauta.
- speaker: Interviewer
  text: Did you take your samisen to the camp with you?
- speaker: Respondent
  text: I took one with me. It is broken now. I will play it for you someday.
- speaker: Interviewer
  text: How was the life in camp?
- speaker: Respondent
  text: I was very busy as 7 or 8 people came to learn dance and samisen.
- speaker: Interviewer
  text: Did your students perform on the stage in the camp?
- speaker: Respondent
  text: Yes. My legs were still good then.
- speaker: Interviewer
  text: You didn't get married any more?
- speaker: Respondent
  text: No, I was already 60 years old then. But when I wore a wig, put on make-up and danced on the stage, people wanted
    to marry me. The make-up made me look like a doll, and I didn't look 60.
- speaker: Interviewer
  text: Did you stay in Tule Lake all the time?
- speaker: Interviewer
  text: Didn't you move to other camps?
- speaker: Respondent
  text: There were 5 camps, and they all wanted me to come as I was the only one who could sing gidayu (a kind of ballad drama).
- speaker: Interviewer
  text: Did you have your voice trained for gidayu?
- speaker: Respondent
  text: Yes, my gidayu teacher was the best samisen player. He was very strict.
- speaker: Interviewer
  text: Wasn't there a loyalty problem in Tule Lake?
- speaker: Respondent
  text: Yes, there were families split by here and there.
- speaker: Interviewer
  text: Which side were you loyal to?
- speaker: Respondent
  text: I had to be on my son's side. My son was born in Japan, so he was not an American citizen.
- speaker: Interviewer
  text: There were 2 questions; one was on loyalty and the other one was on draft. Were you going to stay here?
- speaker: Respondent
  text: Yes, because I didn't have any other place to go to.
- speaker: Interviewer
  text: Do you have one son or two sons?
- speaker: Interviewer
  text: Was he born in America?
- speaker: Respondent
  text: He was born in Japan.
- speaker: Interviewer
  text: Was he born when you went back to Japan?
- speaker: Interviewer
  text: Did you stay in Tule Lake all the time?
- speaker: Respondent
  text: I went to four different camps; Jerome, Hart Mountain and Roach.
- speaker: Interviewer
  text: Where did you go first?
- speaker: Respondent
  text: I think I went to Jerome.
- speaker: Interviewer
  text: Did anything interesting happen in camp?
- speaker: Respondent
  text: Nothing interesting happened, but I was very busy teaching students. I had plenty to eat because everybody brought
    Japanese food to me.
- speaker: Interviewer
  text: Where did you go after you left the camp?
- speaker: Respondent
  text: I think I came back to Seattle.
- speaker: Interviewer
  text: Where were your son then?
- speaker: Respondent
  text: I think he was on Vashon.
- speaker: Interviewer
  text: Did he go into service?
- speaker: Respondent
  text: No, he didn't.
- speaker: Interviewer
  text: When did you start smoking?
- speaker: Respondent
  text: One day my husband and I went to pick huckleberry on Vashon Island. When lunch time came we found out that a dog had
    carried away our lunch. We were hungry so we ate huckleberry. Then my husband took a pipe out of his pocket and started
    smoking, and said it was better than huckleberry. I asked for a puff, and that is how I started smoking.
- speaker: Interviewer
  text: Have you been back to Japan?
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: Long time ago I went to Japan with my husband. I didn't stay too long because my relatives in Akita were troublesome.
    There are many beautiful women in Akita. That is why they are called Akita Bijin (beautiful women).
- speaker: Interviewer
  text: You must have been very beautiful.
- speaker: Respondent
  text: I don't know about that. When I put on make-up, wore a kimono and danced on the stage in Tule Lake, people said I
    looked like a doll.
- speaker: Interviewer
  text: Did you say that your son was born in Japan?
- speaker: Respondent
  text: Yes, and I brought him here when he was 6 or 7. He had the northeastern accent, so my husband did not understand him
    well.
- speaker: Interviewer
  text: How long did you study samisen?
- speaker: Respondent
  text: My samisen teacher was a wife of a sembei store owner. She was surprised that I memorized the music well.
- speaker: Interviewer
  text: Did you study under other teachers?
- speaker: Respondent
  text: I studied nagauta under a teacher in Kanda, Tokyo. I studied gidayu under another teacher. He was a very strict teacher,
    but he taught a blind student very kindly. I think because he knew that the blind student had to make a living with the
    music.
- speaker: Interviewer
  text: Since you could sing and dance, did anybody tell you to become a geisha?
- speaker: Respondent
  text: Yes, but I didn't want to. I just wanted to teach. I could teach nagauta, but I couldn't teach dance because of different
    school.
- speaker: Interviewer
  text: Don't you think you should have stayed in Japan?
- speaker: Respondent
  text: Maybe I should have, but I don't like it in Japan because the people are too bothersome and irritate me.
- speaker: Interviewer
  text: What kind of a man was your sweetheart?
- speaker: Respondent
  text: He was a politician. He sent me here for me to study English.
- speaker: Interviewer
  text: Did he send you any money for schooling?
- speaker: Respondent
  text: No, I had to work.
- speaker: Interviewer
  text: Were you supposed to marry him after you went back to Japan?
- speaker: Respondent
  text: Yes, I came here with such intention, but after I came here I didn't want to go back to Japan because it is too bothersome
    over there.
- speaker: Interviewer
  text: When was the most difficult time since you came to America?
- speaker: Respondent
  text: It was the time my husband and I cleared the land on Vashon Island. If we had $150 they would have cleared the land
    for us, but we did not have the money, so my husband and I piled up the branches of trees and burned them. It was a very
    hard work.
- speaker: Interviewer
  text: Did you buy the land?
- speaker: Respondent
  text: Yes, in 1909 we bought 5 acres of land for $45 an acre. It was $225 all together. We are leasing it for about $160
    now. My son is now living in the house we built. His first wife was killed by a car accident. Then he married a white
    woman, but she ran away with another man after spending all his money. He is living alone now.
- speaker: Interviewer
  text: How old is he now?
- speaker: Respondent
  text: He is 65 years old. He takes good care of me.
- speaker: Interviewer
  text: When did you go back to Japan?
- speaker: Respondent
  text: Before the war, more than 30 years ago.
- speaker: Interviewer
  text: Did you go back with your husband?
- speaker: Respondent
  text: I think he went to say good-bye to his relatives. He died when he was 77 years old.
- speaker: Interviewer
  text: Was your son born while you were in Japan?
- speaker: Respondent
  text: Yes, he was. He has his citizenship paper. I have three grandchildren and one great grandchild. I had a picture taken
    with him.
- speaker: Interviewer
  text: Were you around 25 years old when you came to America?
- speaker: Respondent
  text: About 23 or 24.
- speaker: Respondent
  text: The bamboo curtain reminds me of a song. Shall I sing it?
- speaker: Interviewer
  text: Yes, please.
- speaker: Respondent
  text: Take ni uguisu Nightingale on the bamboo Ume ni wa Suzume And sparrow on the plum Oya, kore wa kichigai Oh! what a
    crazy mistake Torichigai
