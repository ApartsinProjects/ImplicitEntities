collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I have many memories of life in Japan, but it was for only 18 years -- a very short time, and I cannot recall too
    many events which were especially sad or painful. I do remember, though, about the time when I was a student. I did not
    have to worry about anything. I just went to the mountains and rivers with friends, played around with them, or had quarrels
    with them occasionally. All these things are now a part of very pleasant memories.
- speaker: Respondent
  text: Talking about a hardship, at that time it was the beginning of the spread of civilization in Japan. There were very
    few schools open. There was only one middle school in 8 villages which was enclosed in the radius of about 18 miles. It
    was too far to travel, so there were quite a few boys and girls staying at a boarding house to study at the middle school.
- speaker: Respondent
  text: As far as my own situation was concerned, I had to walk over 2 miles to school. Of course, it was a countryside where
    there were no street cars, nor trains. They did not even have horse buggies to take us to school.
- speaker: Respondent
  text: During the winter season I got up around 5:00 a.m., wore a simple slipper-like thing (called zori) which was made
    out of straws, put over blanket, and walked through the snow in the mountain.
- speaker: Respondent
  text: At that time the level of civilization in Japan and economic level were very poor, education was not spread among
    people, there were very few people who could write official documents. I remember that my brother used to write for his
    neighbors various official papers, and he was very much appreciated by these village people.
- speaker: Respondent
  text: It was such a period that there were very few wealthy farmers and it was just about their top ability to give their
    children the compulsory education which was elementary schooling.
- speaker: Respondent
  text: There were only 10 boys and girls who were able to advance to middle school in the whole village, and just about 1
    or 2 students who were able to go to high school.
- speaker: Respondent
  text: It was such a period that if you were able to graduate from a high school, you would be able to work as a salesman,
    or clerk of the city government, or village government, or only a policeman in a village or a mailman.
- speaker: Respondent
  text: I do remember a few things about family life, food and clothing. First of all I had never seen an electric lamp. If
    you were a little wealthier, then you would use a lantern--an oil lamp surrounded by rice paper. In an ordinary family
    they used 'kantera', a petroleum oil burning on a small wick in a tin can, which emitted light equal to 5 candles.
- speaker: Respondent
  text: When old people smoked tobacco, they did not have matches, so they struck stones to light their tobacco. I think that
    period was the dawn of scientific modern civilization and there were lots of things left from the primitive culture, too.
- speaker: Respondent
  text: My family religion was Buddhism--Jodo-shinshu. My father was a very serious believer. In the morning he would face
    the east and clap his hands to thank God, and in the evening he would light the lantern and offer a bowl of hot rice as
    offering, and offer Buddhist's prayer (Okyo) as he rang a chime. And then, after all this, we relaxed and sat around the
    table for the dinner. That was our daily family ritual.
- speaker: Respondent
  text: My father's posture of prayer in the morning and in the evening towards God and Buddha gave us an unspoken lesson,
    though we were very small and did not understand anything.
- speaker: Respondent
  text: My mother was a very kind and tender woman. Whenever I was scolded by my father or brothers, she would come around
    my side. The words I still remember very well from the childhood were the words she spoke to me at the table. She said,
    'If you disrespect rice grains, then you will go blind.' Even though I was very small, I used to wonder about the relationship
    between rice and my eyeballs, and I used to mutter about that in my mind. But in front of my mother and father I used
    to say, 'Itadakimas' (which means I'll begin eating) and be very careful not to drop any rice.
- speaker: Respondent
  text: Since then, spring breezes, and autumn rains and many decades have passed away, and today father and mother have passed
    on, and the time has come for my turn. Today I still think that my father's humble posture towards God and Buddha indicated
    to our uneducated minds existence of something like God or Buddha, and that attitude became the first stop to lead me
    to Christian faith, and I am forever grateful.
- speaker: Respondent
  text: Again, I think mother's words were true, for I became aware of the spirit of gratitude, and as I reflect upon my mother's
    words, I cannot help but confess my limitations. 'You will go blind' means that you will not be able to see. And the opposite
    of that, to be able to see, means to see things through the eyes of the heart which cannot be seen through the eyes.
- speaker: Respondent
  text: In other words, when we treat things with disrespect, then our eyes in our heart go blind, and we become heartless,
    ungrateful persons. My mother was telling us that even if our eyes are open, if you cannot be grateful, then our life
    would be as low as that of dogs and cats.
- speaker: Respondent
  text: When we come to think of it, even a grain of rice is the result of the gift of nature, and the hard labor and sweat
    of many, many people. Even a bowl of rice is the basic material which becomes my flesh and blood. I really appreciated
    my mother's words when she told us to be appreciative even toward a grain of rice.
- speaker: Respondent
  text: I really learned that parent's words and deeds influence children and in the area of faith they give keys to influence
    life. These are the recollections of 60 years ago, about family life and social situations.
- speaker: Interviewer
  text: Can you tell me about your schooling and education?
- speaker: Respondent
  text: As I have said before, our school was far away from our village. There was a time when kids played around and were
    late for school. So a new school was built in the town of Shiomachi, and I moved to this school, and was graduated from
    there. I also entered a special class, preparation for advanced school, and learned English (reader 4), algebra, world
    history, Japanese history, and Chinese. I think it was on the level of 3rd grade high school.
- speaker: Respondent
  text: After that I sent applications to agricultural schools in Okayama and Teacher's College in Hiroshima Ken, but every
    time I failed because I did not pass the physical examination. I was very disappointed and depressed, and I felt that
    my future was black.
- speaker: Respondent
  text: At that time there was an enthusiastic immigration movement, and two or three persons who graduated before me, and
    my own teacher, Mr. Heitaro Wakabayashi, who wrote 'Iafu Shogyokaigisho no Shoki' (Memoirs from Chamber of Commerce in
    Los Angeles) later, had already come to the United States of America. So these things had become the motive for my decision
    to go overseas.
- speaker: Respondent
  text: I did not have much education and I did not know too much about the situation of society. I had no experience in labor,
    I just had my own body. My first step in the direction of independence was not so flowery, and I did not have much significant
    hope for the future. It was a future that I had to take. I did not have any other choice, and because of this, I could
    not help but feel some helplessness.
- speaker: Respondent
  text: I still remember distinctly the feeling of the extraordinary situation of my leaving home; I reflected on that cherished
    love of my parents, brothers and sisters, the mountains and rivers where I spent such happy times, even a flower in our
    garden; and trying to remember these thoughts and feelings as long as possible in my heart. It was very difficult to part
    from these things.
- speaker: Respondent
  text: 'A Chinese poem came to my mind: A young man leaves his native town and if he is not successful in his learning he
    shall not return. Bones of ancestors may be buried in the hills of native town. Man can be buried in any mountains of
    the world. I suppose I did have a little bit of courage to be able to die abroad.'
- speaker: Interviewer
  text: Can you tell me about your trip to the United States?
- speaker: Respondent
  text: I don't remember too much about the trip to the United States. The year and the date of the arrival is not certain
    because of the loss of the records. But I came to the United States in the fall of 1906. The name of the ship was Koria
    Maru which was about 12 to 13 thousand tons. I was put on the bottom of the ship with cargos. I was given one of the bottom
    beds, and people on top of me were seasick and vomiting very badly. I remember that well.
- speaker: Interviewer
  text: What was your experience when you landed in San Francisco?
- speaker: Respondent
  text: When I landed in San Francisco, I was checked on Deuddenal worms and eyes. There were no difficulties there and I
    have no recollections about the Immigration Office.
- speaker: Respondent
  text: Since I had come from a countryside where there were no such things as street cars nor electric lights, my first impression
    of America was tremendous. Everything I saw and heard was so special and curious, especially the high-rise buildings which
    were sticking out in the sky like a forest.
- speaker: Respondent
  text: These things seemed so magnificent to me. I was truly surprised by the wide city streets and all those things suggested
    the greatness of America. I also thought that this country must be the gathering place of millionaires.
- speaker: Respondent
  text: On the other hand, there was one thing which disappointed me because of the lack of knowledge. It was this - I thought
    all the people who lived abroad, especially Japanese people, had had a high level of education and worked in high level
    offices with important responsibilities. On the contrary, all the people I met wore workers' blue jeans, and the only
    thing they had were a kori (Japanese luggage). They were laborers whose only possession was often what they wore.
- speaker: Respondent
  text: Of course, I was one of them. In order not to spend the money I had brought from Japan, I had to work. The owner of
    the hotel where I stayed, Mikado Hotel, found a job for me in Watsonville. It was a job at an apple canning factory in
    the countryside.
- speaker: Respondent
  text: The boss of the camp was a Chinese and I ate dry Chinese rice for the first time. There were about 20 young men working
    there. At night we would spread blankets on the floor and sleep there having our heads on the same side. I could not sleep
    well, and during the night I used to think about the happy time at home and felt cold tears rolling down my cheek, and
    regret the fact that I came to the United States. I still cannot forget about these things.
- speaker: Respondent
  text: This job was finished within 3 weeks and I came back to the hotel and stayed for a while.
- speaker: Respondent
  text: In any case, we were in America several thousand miles from our home towns. The first business of the day to eat;
    second, in order to live like a human being, I had to learn English. So I tried to learn words from the dictionaries and
    English conversation every night, and I looked for a job in the daytime.
- speaker: Respondent
  text: One day the owner of the hotel told me, 'Hey, there is a good job for you. One family is looking for a school boy.
    Would you like to go? The salary is low but in the near future you may be able to go to night school. Besides, if you
    help the lady of the house to cook, she will teach you how to cook. In America when you become an established cook, you've
    got it made. Wherever you go you'll never miss a square meal.' He recommended me to this job. I thought 'they'll feed
    me and teach me English.' There was no better job than this, so I decided to try it out.
- speaker: Respondent
  text: I got the telephone number and the address, and finally arrived at the house. The house was painted white and looked
    like an estate of a wealthy man. It looked to me like that because rich farmers in Japan had the house with white walls.
    I thought it must be the same in America.
- speaker: Respondent
  text: I was a little scared. But I forced myself to ring the door bell. There was a voice of a woman and then the door was
    opened quietly. So I gave her a name card of the hotel owner and told her why I came. Then she said, 'Come in' and let
    me in the house. It was the first time that I saw the inside of a white man's house.
- speaker: Respondent
  text: It was late afternoon and there was much light in the room. The floor was very shiny, and white like a castle.
- speaker: Respondent
  text: As a person from a countryside, I was very surprised. She asked me to sit down in a chair, and then the lady of house
    told me all kinds of things. Unfortunately, I could not understand what she told me, and what I said could not be understood.
    I was so embarrassed. So I said 'Good bye' and ran away from her.
- speaker: Respondent
  text: When I come to think about these things, they sound like comedies, but because I was very serious...
