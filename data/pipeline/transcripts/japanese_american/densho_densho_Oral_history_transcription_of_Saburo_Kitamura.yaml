collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your birthplace?
- speaker: Respondent
  text: Hiroshima Prefecture is my birthplace.
- speaker: Interviewer
  text: Please tell me your name?
- speaker: Respondent
  text: My name is Saburo Kitamura.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1897.
- speaker: Interviewer
  text: When did you come here to America?
- speaker: Respondent
  text: I came to America in 1918, the year when World War 1 ended.
- speaker: Interviewer
  text: Do you remember anything about the war?
- speaker: Respondent
  text: It was the war between Germany and Japan, and it ended in the year when I got to America. I came to America as a student
    during the war, but because of the war America was short of hands. Therefore, I might have been sent back to Japan unless
    I answered "Yes" to the question of the Immigration Office if I would work here. So I had to say that I was going to work.
    I landed here in America on August 12, 1918, and it was the season of fruits. I went to Suisun to work as an apple cutter,
    I also gathered prunes on the ground.
- speaker: Interviewer
  text: What do you remember that you experienced in Japan? Hardships and happy experiences.
- speaker: Respondent
  text: The hardest time I had in Japan was that my family became bankrupt when I was going to graduate from a senior high
    school and I became unable to go to a senior high school. I was going to go to a college in Tokyo. Because of the bankruptcy,
    I missed almost two years. Since I had an uncle in Hawaii, I asked him to finance me at a college in America, and I came
    to America. But two years had already passed since I graduated the senior high school. I had to make a lot of papers for
    going abroad to study. At the time when I graduated the junior high school, it was already time for me to have a conscriptional
    examination. So I processed the application for going abroad postponing the examination. One thing that troubled me a
    lot in Tokyo was that I had beriberi and my legs began to be swollen. So I had to go back to my town. But I postponed
    it until a summer vacation, because I was afraid that I might be drafted as a soldier if I came back home before the coming
    vacation. And I came to America in 1918 through many difficult paperwork.
- speaker: Interviewer
  text: How far did you go to school?
- speaker: Respondent
  text: I graduated only from a senior high school. Although I took an entrance examination for a college in Tokyo and passed
    it, I didn't attend the school so much actually. I had a very hard time living in Tokyo supporting myself, because my
    family was unable to send me money. So I thought that it was much better for me to go to America than staying in Japan.
- speaker: Interviewer
  text: Did you work to support yourself?
- speaker: Respondent
  text: I was a houseboy there. I lived in a doctor's house once, but I had to move twice or three times in the short period
    while I was in Tokyo, because they didn't understand my dialect of my town so much, I felt so depressed.
- speaker: Interviewer
  text: Do you remember any happy experiences?
- speaker: Respondent
  text: I was happy when I ran very hard in athletic meetings at school, I was very good at running, especially long-distance
    running. I couldn't get prizes in short-distance running races, but I always won the first or the second prizes whenever
    I ran in long-distance races. The longest distance I ever ran in my life was 24 kilometers in a marathon race, but I was
    wiped out after the race.
- speaker: Interviewer
  text: What else do you remember about your school life?
- speaker: Respondent
  text: The school life I had in Japan was very simple, and the same things were repeated over and over again. The most embarrassing
    thing that I experienced was Heichiku Taisow. The teachers were very strict with our clothes. We had to wear the same
    shoes and puttees as soldiers did to do the exercises. The poor students like me had to wear the cheap second-hand shoes
    used by soldiers, because we couldn't afford nice and new pair, and they ruined my feet badly. So I used to be scolded
    by the teachers.
- speaker: Interviewer
  text: What was your family doing?
- speaker: Respondent
  text: They were farmers.
- speaker: Interviewer
  text: Were they doing widely?
- speaker: Respondent
  text: No, before, they had large farms, but when I grew up, only a small farm was left and we were very poor.
- speaker: Interviewer
  text: What religion did they have?
- speaker: Respondent
  text: They were Buddhists and belonged to Nishi-Honganji (the West Central Buddhism Temple), but for me, it was in my 9th
    grade when I became a Christian. At that time, I was weak in English. There were three English classes, and I got a failure
    mark of 6.0 in one of the three. If I had had 6.5 points, I should have been all right. The reason why I got such a bad
    mark was that I had promised with one of my friends not to prepare for the exam. It was in the second quarter of the school
    year, so I had to make up for this in the third quarter. There was a Methodist church just a few doors from my aunt's
    house that owned a dry-goods store. Mr. Shimose who was teaching English to 7th and 8th grade at my junior high school
    was also living in the church so I knew him well. I said to him, "Mr. Shimose, I am very weak in English, and I got a
    failure mark. Would you please tutor me after school?" Then he told me that he would do anytime I came over to his house.
    So I went to his house, which was a church and an organ and some chairs were set for the service, and began to attend
    the Sunday worship services. The minister, whose name was Seki Matsushita, wore a long, white beard. When I was leaving
    for America, he said to me, "You had better get baptized before going to America." So I answered, "But, sir, I don't understand
    Christianity yet, so it is useless for me to receive baptism." But he told me that it was good for me if I went to America,
    "What shall I do when I become to dislike to be a Christian and want to quit being it after baptized?" I cannot forget
    what the minister answered to my question. He said, "You may quit if you want to, but once Jesus Christ caught you, you
    would be surely coming back to Him. We human beings sometimes become to lose our faith, but the Lord would never give
    up those who are baptized." "Is it then all right for me to be baptized?", I asked. He said it was all right, and I received
    baptism from him.
- speaker: Respondent
  text: When I was coming to America, I had an introduction to some people here in America from Mr. Tasuku Harada who was
    the President of Doshisha University, and it helped me very much. He knew quite a few people working in banks in America,
    so I had much to be thankful for from those people.
- speaker: Interviewer
  text: How was the social conditions in Japan when you were a junior high student?
- speaker: Respondent
  text: It was the time when the war was about to break out, so the social conditions were bad, and colored in military tones.
    We the senior high school students also had to be trained just the same way as the soldiers did. They made us hang on
    our shoulder a second-hand gun from the soldiers, and in a military-exercise class, a first lieutenant was the teacher
    to train us. Usually we had to stay in military for 3 years after volunteering, but for those who had graduated from a
    senior high school, only one year of the military life was enough, because they had already received such an amount of
    military training at school. They also held maneuver per year for us the students.
- speaker: Interviewer
  text: How many hours a week did you have such trainings at school?
- speaker: Respondent
  text: We had physical exercises every day, and there were two kinds of exercises; the military-training exercises and the
    ordinary physical ones. We had the military training classes twice a week for 2 hours, and the ordinary exercise classes
    also twice a week, so we had a total of 4 hours of physical exercise a week.
- speaker: Interviewer
  text: What had you been thinking about America before you came here?
- speaker: Respondent
  text: Before I came to America, I had studied a lot about this country. I thought that America was a country of freedom.
    I had already gotten a permission to enter the Amoa Institute in Chicago. It is a technology school founded by Mr. Amoa.
- speaker: Interviewer
  text: What do you remember about the experience on the boat?
- speaker: Respondent
  text: There was a problem occurred to me that bothered me a lot. My uncle in Hawaii had sent me the money to get a first-class
    boat ticket, but I thought that it was too much for me who was a mere student to go to America by the first class. So
    I spent almost all of the money in Japan. Since my parents had not traveled so much, I took them to all over the places
    in Kansai area (around Osaka, Kyoto). I also took my elder sister who was living in Osaka with us to go sightseeing. Although
    I was coming back to Japan in 3 years, I somehow had a feeling that I would not be seeing them again. That was why I took
    my parents to go sightseeing. We visited a lot of places in Kyoto, Nara and some others, so my father finally had to tell
    me to take a break one day because of the rain. I didn't care about spending money, for I had already gotten a third-class
    ticket on a boat to go abroad. All I had to save was 50 dollars to show immigrant officers in America when I got there.
    I was thinking that the uncle in Hawaii would prepare everything for me to go to Chicago when I arrived in Honolulu. But
    I found out that he was in another island and unable to meet me in Honolulu. I tried various ways such as sending telegrams
    to contact him. I had to pay for the hotel I stayed. And the money became 20 dollars less than 50 dollars which I should
    have had at least. I was lost and didn't know what to do. All the people around me were strangers to me. There was a man
    from Kishu (Kinki area in Japan) that I had acquainted with since we had been on board, and I thought this was the only
    man I knew that I could ask for his favor. So I asked him, "Would you please lend me 20 dollars, because I spent them
    out of 50 dollars," Then he laughed loudly and said to me, "Don't worry! I will lend you. Ha! Ha!" And he lent me the
    money. Finally I was able to land in the mainland of America. People told me that we had to have a lot of difficult examinations
    when we landed, but that was not true. An officer named Mrs. Ostton made me read a small card written in English and admitted
    me of my landing. But those who came in the third class cabin had to go to the Immigration Office to stay there for a
    while, while those who came in the first cabin didn't have to. So I spent the immigration office life there for some time.
- speaker: Interviewer
  text: How was the life there at the Immigration Office?
- speaker: Respondent
  text: Treasure Island in San Francisco was the territory of the Immigration Office. They sent all the third-class passengers
    and the sick people to that island directly from the boats, and examined us physically and some other ways completely.
    When we passed all the examinations, we could get out of the island. They handed us to those who came to meet us. Since
    I didn't expect such a person, I was worried a little bit, but I could land without any problems.
- speaker: Interviewer
  text: How many days have you been there?
- speaker: Respondent
  text: I have stayed there more than a week. They put wire net fences all around so that we could not escape.
- speaker: Interviewer
  text: Were you afraid?
- speaker: Respondent
  text: I didn't feel so good because of the fence.
- speaker: Interviewer
  text: What kind of people were on board?
- speaker: Respondent
  text: The people in the third-class cabin were mainly workers.
- speaker: Interviewer
  text: Were they all men?
- speaker: Respondent
  text: No, there were quite a few women on board who were to get married through exchanging pictures, but the time of arranging
    the marriage through pictures was almost ending, and they were the last wives married in such a way.
- speaker: Interviewer
  text: Was that in 1918?
- speaker: Respondent
  text: Yes, it was. Since I used to row a boat in Japan, I didn't even think that I might get seasick. On the contrary, I
    got sick, being put in the shaky third-class cabin, and was unable to eat food. I said to myself, "If I couldn't eat like
    this all the time, I would not be able to walk when I got to San Francisco. I have to eat something." I encouraged myself
    and went up to a dining room. Mr. Harada had given me an introduction to a professor of Tokyo University named Dr. Matsumoto
    who was also going to America by the same boat. He was in the first cabin, that was really gorgeous compared with the
    stinky dark third cabin. I visited him and talked for a while. Then he asked me if I would like to get anything. So I
    said, "Doctor, I got seasick and didn't feel like eating at all, since the cabin is way below and stinky. I would like
    you to get me something to eat." "O.K, what do you want?", he asked me. But I was not familiar with the European food,
    I couldn't tell the name of the food easily. Only thing I could remember was "Ham and Eggs", and I ordered it. It was
    very good, it was the best food I had had in my life, and I was relieved again.
- speaker: Interviewer
  text: How was the boat? Was it big?
- speaker: Respondent
  text: Yes, it was the biggest boat at that time. Her name was Shunyoh Maru, and her weight was 13,000 tons.
- speaker: Interviewer
  text: What else do you remember about the boat?
- speaker: Respondent
  text: No, I don't remember so much. I just couldn't eat, and had to lie down on the bed all the time.
- speaker: Interviewer
  text: So did I. What was the first impression you had when you came to America?
- speaker: Respondent
  text: The purpose of my coming to America was to study applied science such as cosmetics, but the first thing that surprised
    me a lot was the number of cars. In Japan at that time, we didn't have so many cars. In fact, in the country, we didn't
    see a car at all, of course in Tokyo there were some. But in San Francisco, there were quite a few cars running, and I
    even thought to myself, "Shall I study automobiles instead?" Anyway, I went to Amoa Institute in Chicago, but I had to
    take examinations. Since I was weak in English, in the examination of English I couldn't write some passages by Shakespeare,
    which was the question of the English examination.
