collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Yes, I did write down some dates, here. Is that right! May I see it? May be as you refer to it, you could tell me
    all kinds of stories. Please tell me your name.
- speaker: Respondent
  text: Hanato, Hisayo.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Hiroshima Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: April 5th, 1899.
- speaker: Interviewer
  text: Well, then you are 75 years old now. You are very healthy and strong.
- speaker: Respondent
  text: Yes, thank you.
- speaker: Interviewer
  text: What did your father do in Japan?
- speaker: Respondent
  text: He was a farmer. He was not that strict. He was an average father.
- speaker: Interviewer
  text: How about your mother?
- speaker: Respondent
  text: She was a woman of the old time traditional woman. She did not have any education. However, she was a very tender
    and loving person. When we were small, many people used to come and talk to my mother with whispering voices. Then, as
    the result of that discussion, my mother would take out something and give it to them. As a child, I used to think why
    those people who came to talk to mother would cry like that. I thought it was strange. She used to welcome Komusoh (a
    strolling flute player; usually a Buddhist monk) or other traveling monks to stay overnight. She was very kind and polite
    and really took care of those people. There were also young married women who did not have good relationship with their
    stepmothers, came to talk to her and stayed overnight, too. We were really used to those people who stayed overnight at
    our house. When I became a young woman, I asked my mother, "Why do those people who come to see you cry?" Then she said,
    "I cannot say anything about this, because once this leaves my mouth it can create a big trouble. There are many people
    who are very poor and miserable." That's all she told me. She never said anything about what they had told her. When I
    think about it now, after I became old, I think my mother was a very wise and admirable person. You see, she came from
    a similar troubled family. When her father died, the oldest brother became a prodigal son and created a big debt and had
    to sell everything to return the debt. This brother died leaving 4 children and a wife behind. They had to auction off
    everything they had. It was a very strange situation. You see this you would expect their relatives to come around and
    help you. However, when they auctioned off their possessions, the price did not go up, no matter how many times they tried.
    They even tried to provide more sake and did everything, but the price of those items did not go up. They were wondering
    why nobody was bidding them higher. Later on they found out that the relatives got together and conspired against my mother's
    family so that the price would not go up higher. When I heard this, I was really angry. I asked her which families did
    this to our family. However, my mother would not tell us by names. She was right by not telling us their names, you know,
    otherwise it'll affect my own relationship to my cousins, since they are not responsible to this act. So when I think
    about all these things, I'm very impressed by my mother's character and her wisdom. My mother was such an outstanding
    person even though I'm such a foolish and limited person.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I have 7 brothers and sisters. I'm the 7th child. Three boys and five girls. I'm the youngest girl in my family. I
    was rather sensitive about being 5th girl and having 7 brothers and sisters. I always hoped that they would not ask me
    about it.
- speaker: Interviewer
  text: Was your father a farmer?
- speaker: Respondent
  text: Yes, he was. He was not a big farmer.
- speaker: Interviewer
  text: What was your religious background?
- speaker: Respondent
  text: Buddhism. The main temple was Nishihonganji.
- speaker: Interviewer
  text: Did you receive much religious education?
- speaker: Respondent
  text: You see, my mother was such a religious person that I was sent to a Sunday school held at a Buddhist temple. It was
    held on Saturday night.
- speaker: Interviewer
  text: Do you remember anything from the classes?
- speaker: Respondent
  text: Yes. I used to remember 'Okyo'. I've forgotten now, but I was able to recite it by heart.
- speaker: Interviewer
  text: Did you learn anything about life itself, such as you should be good to your parents or something like that?
- speaker: Respondent
  text: No, I don't think so. The main thing we learned was to be able to say Okyo by ourselves.
- speaker: Interviewer
  text: I can't quite remember when it was, but one day a white man came to our town with a "Gento" (a magic lantern slides).
    He borrowed our room and showed slides. It was a story of Jesus Christ. At the time the story he showed was about the
    Samaritan woman giving water to Jesus. There, Jesus says that those who drink from me will never thirst. When I heard
    this, even though I was a small child, this story stuck to my heart very heavily. Till that time, I was sent to a Buddhist
    Sunday school, but I went there not because I wanted to go, but it was like a play for me. So it didn't have much meaning.
    I went to hear sermons by a Buddhist priest, too. He would say, "Do you understand it now? Have you grasped some meaning
    (or gained some hit)?" (He used to use the word Anji) However, I used to ask in my mind, "What is 'anji'?" It was at this
    level so it was not really meaningful. However, when this white evangelist came and showed us the slides, I was really
    struck by it. I can't tell you exactly how I was struck by it but I remembered the incident very well. He came to our
    town occasionally and I would see him on a street. I really wanted to go see him sometimes. At the Otera (temple) they
    used to teach "Tea Ceremony" and "Flower Arrangement" to me since I was very small. So I used to respect Buddhist priest
    very well, too.
- speaker: Interviewer
  text: When you were small, what kinds of things were enjoyable to you?
- speaker: Respondent
  text: Well, I really can't tell you, except school picnic or local festivals at the temple, or shrine. There was my grandmother's
    house in the next village. So I was really glad to go to the next village for the festivals. You see, when I was going
    to school, there weren't very many things that we could do, so the school picnics were very popular.
- speaker: Interviewer
  text: Have you gone into a hill to play?
- speaker: Respondent
  text: No. We did not go into a hill to play, but going to town was very special occasion for me, such as going to see a
    painting exhibit, or field trip to a museum or something. We used to walk over 5 Ri (over 12 miles) singing songs. This
    was such an enjoyable experience. We used to get up very early in the morning to get ready for this.
- speaker: Interviewer
  text: What did you do at the festivals?
- speaker: Respondent
  text: We saw "Omikoshi" (a portable shrine being carried by many young men) there. We also looked around small booths along
    the road selling and showing all kinds of things. We offered a prayer at the shrine and came home. There were peek holes
    to show pictures. My parents dressed me up in a very fine Kimono and went out with our friends. It was such an enjoyable
    experience.
- speaker: Interviewer
  text: How far did you go in your schooling?
- speaker: Respondent
  text: I went to Koto Shogaku (8th grade), however, later on I went to a sewing school, learned many things there. I also
    learned tea ceremony and flower arrangement. There were necessary education for young woman.
- speaker: Interviewer
  text: Do you remember anything about your school teachers?
- speaker: Respondent
  text: Yes, I do. There was a woman teacher who came from Shimane Ken. She was a very strict teacher and was very kind. I
    remember her very well.
- speaker: Interviewer
  text: Do you remember any hardship during your school year?
- speaker: Respondent
  text: Well, I was above average, but I was not at the top in my class, so I might have had some problems there. However,
    when I was in the 2nd grade in Koto Shogakko there was a holiday called Chikyo Setsu (the birthday of the Empress) and
    we were to bring one go (1/3 pint) and five sen (1/100 of Yen) to school. We cooked rice and bought vegetable and meat
    for a side dish and ate together. We also had a talent show for our enjoyment. I think it was the first time that we had
    such a program. This was so enjoyable that I remembered this day. On the next day, I think it was, there was a student
    in my class who was a member of Shin Hei Min (meaning new citizens; lowest class of people). I was such a tomboy that
    I used to do some mean things to her. You know, it was a kind of matter of fact at that time. We thought that we were
    supposed to do bad things to Shin Hei Min people. Well, there was another such person in the class ahead of me. Well,
    on the next day of that Chikyo Setsu, I said to her, "It was such a fun wasn't it, yesterday!" Then she said, "Is that
    so!" So, I was very surprised and said, "You mean you didn't come to the celebration yesterday?" She said, "No. I didn't
    come." I said, "Why didn't you come? It was such a fun!" Then, she said, "If I came, others would not like me." That's
    what she said. When I heard that, even though I was a small child, it hurt me terribly in my heart. There were more stories
    about those people, but I would not say this any more. However, I say this much. They were in such a miserable situation
    that it used to hurt me very much. Well, up to that time I did all kinds of things without thinking. When I saw my Geta
    placed right next to the one belonged to Shin Hei Min, I used to say, "Put it away from mine. It's dirty!" You see, I
    didn't know how much it might have hurt them. I thought it was quite ordinary thing to say things like that. There were
    many incidents like that. However, when I heard that girl say that she couldn't come, it really struck me in my heart.
    I really felt bad about what I had been doing to them. After that, I never did anything bad to them anymore. I remember
    this very well.
- speaker: Interviewer
  text: Was there many problems with Shin Hei Min?
- speaker: Respondent
  text: No, there was no big problems with those people in our village. However, there were many of them lived in the next
    village, and that's where my Kotoshogakko was located. That's how I came in contact with them in my school. There must
    have been many such small troubles, but it did not develop into big troubles.
- speaker: Interviewer
  text: Was there any trouble in your village?
- speaker: Respondent
  text: I don't remember any troubles, except that we had a flood when I was very small. There was no problems in the town,
    but people lived in the upper reaches of the river were flooded out. They suffered a lot. Houses and bridges were washed
    down and there were people calling for help.
- speaker: Interviewer
  text: Was there any earthquake?
- speaker: Respondent
  text: No, I don't remember.
- speaker: Interviewer
  text: What kind of subjects did you like in your school?
- speaker: Respondent
  text: I didn't like arithmetic at all. I liked reading and composition. I particularly liked history.
- speaker: Interviewer
  text: Did you have Shushin (Moral teaching)?
- speaker: Respondent
  text: Yes, we did. I liked it very much.
- speaker: Interviewer
  text: What kind of things did he teach you?
- speaker: Respondent
  text: Well, filial piety (Oyakoko). That was the basic teaching.
- speaker: Interviewer
  text: What did you do after school?
- speaker: Respondent
  text: I learned sewing or helped my older sister when she had her baby.
- speaker: Interviewer
  text: Do you remember any war?
- speaker: Respondent
  text: Yes, I remember Nichiro Sensoh (Russo-Japan War). I do remember this. I must have been 6 or 7 years old. At that time
    there was the Headquarter of the Fifth Division of the Imperial Army in Hiroshima. In any case, my home town was only
    two Ri (5 miles) from Hiroshima. It was rather close to the Headquarter. All the soldiers from all over Japan were gathering
    at Hiroshima. All of them had to find lodging, so they stayed with families nearby Hiroshima. Our parents also received
    a few young soldiers and they used to tie up horses at the gate. It might sound as if I'm bragging about my mother again,
    but she really took care of them. When they left our house, it was at night. We stood by roadside and saw them marching
    away. We held a chochin (a paper lantern) with our mon (family crest) on. Then one of the soldiers who stayed with us,
    who used to call my mother Okasan (mother), came out of the line and bowed his head to my mother and said, "Okasan, I'll
    be going now. Thank you for taking care of me." Unfortunately, he died in action. Those young soldiers were really good
    to us and took us around. When we were in school, we used to go and see soldiers off every day with flags. The main railroad
    passed nearby our town, so we went to the railroad station and waved our flags, saying "Banzai~ Banzai!" (May you live
    10,000 years.) Sometimes, some of the young people in our town was drafted and left with other soldiers. So if you go
    to the station seeing them off with flags, parents of the soldier used to give us tangerines. I was really happy to receive
    those tangerines [laughs]. I still remember those things. If we didn't go to the railroad station, then we went to the
    edge of our village, right up to the mountain road.
- speaker: Interviewer
  text: Let's see. After you graduated from your school, you went to a sewing school and also helped your sister when she
    had her baby. What was the circumstance under which you came to the U.S.?
- speaker: Respondent
  text: Our town did not have any industries at all. So many of our villagers came to Hawaii and to the USA to work. I don't
    know exactly what is the main reason why I came to America. However, many of my friends came to America. One of my older
    brothers came to Hawaii and the other to America. So I was yearning to come to America. I did not have a high hope or
    anything like that, but I did want to come here. Well, it was toward the end of Picture Bride Era when my husband to be
    came back to Japan. We were matched by a Nakaudo (go-between). My older brother in America was pale and my mother worried
    about him very much. She just worried so much, day in and day out, so much so that I thought if I could go to America
    and take care of him,
