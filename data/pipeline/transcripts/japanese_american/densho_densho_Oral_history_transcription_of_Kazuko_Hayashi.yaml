collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Kazuko Hayashi and they say that when you put the 'Ko' after the end of a name, that means that it is in
    the old style and young people don't use that word anymore.
- speaker: Interviewer
  text: Is there any meaning to that name?
- speaker: Respondent
  text: Yes. There are meanings to that writing. From my ancestors a long time ago, our family kept using the same kind of
    writings for names. My mother showed me a family tree and she said that each family chose a particular writing, a particular
    Kanji, for the name of their children. The name was particularly important for boys and when you came to the time when
    you had to state your full name, particularly when you went to war or something like that, you had to have a good family
    name. My brother's name was Gunya-no-Mato-Chikasei. He was two years older than I was. These names were all written in
    the family book. Well, girls don't have such long names. My father was the Shinto priest at the Kampei Taisha. My father
    died when I was eight years old. He died of a heart attack, I think. The Kampei Taisha, which is one of the most important
    shrines of the Shinto sect, was located in the mountains. Ogami-Jinsha and Kasumi Jinja were other important shrines.
    My father also worked in these shrines, too. Well, we come from such an old and good family and he was a respectable man
    because he came from such a good family. But our family name has fallen because of the death of my father. I have two
    brothers and two sisters, they were much elder than I was. Last year, one sister died, who was 86 years old. Everyone
    else has died so I am the only one left. My mother was quite a different person.
- speaker: Interviewer
  text: I want to ask about your mother later, but I would like to know if there is any meaning to your name, Kazuko.
- speaker: Respondent
  text: Oh, I really don't know. The only thing I know is that Kazuko is the Kanji which comes down in the family for girls.
    It is a very good Kanji. My father was an only son and my mother was an only daughter. My father was one of the survivors
    of Ako Hanshi. You know about the Chushingura story? Well, he was a Samurai but after the fall of the Ako Lord, he had
    to become an unattached Samurai. He used to have a Chonmage and Hakori-Hakama. I used to have a picture of them but when
    our house was burned in Livingston, the picture was burned with the house. You know, the pictures were printed on glass,
    and it wasn't paper like we see now. That picture was burned when we had the fire in Livingston.
- speaker: Interviewer
  text: When you say Guuji, he is the highest ranking priest in the Shinto Shrine, isn't it?
- speaker: Respondent
  text: Well, there are rankings among them and my father was called 'Shogoi', the fifth, and that was his ranking when he
    died. Well, the order to take certain positions used to come from the emperor and we called this kind of official letter
    'Jitei', and I happened to have one of them right here. Well, this letter has the emperor's sign, 'Kikuno Gomon', the
    sign of the Chrysanthemum, which is used as a watermark on the paper. My family used to have lots of these papers, but
    they say they were burned in Tokyo, when Tokyo was bombed by the American bombers. My father was a respectable man, but
    he didn't have a job because of the fall of his Lord Ako, and he was looking for a job. In the beginning he did work for
    a Buddhist Temple as a priest and then after that, he found work as a Shinto priest. Before I was born, there was a war
    called 'Shimi-Senso', and at that time Christians lived in Iwakai. And there my mother was born. When she was small, there
    was a plague and both of her parents died of Cholera. They say there was an enormous amount of wealth left for her. Her
    family was in the Sake making business. Her grandfather was called Asahi Ohachi, and he was a very famous man. He was
    called a man's man and was able to present himself in front of the emperor. She was taught by this grandfather. Well,
    I was born in 1964 year of Meiji. When my father was sixteen he was able to take a picture with the emperor and the picture
    was sent to me and I had the picture here. I didn't know anything about these things. My mother used to tell me all about
    my father, mother and their background. That is a different story, but is it OK?
- speaker: Interviewer
  text: Yes, please continue.
- speaker: Respondent
  text: Well, I had two brothers. My oldest brother was about 20 years old and he wanted to begin business with a foreign
    country, and he wanted to send shoyu to America. In order to make Shoyu, he built a factory in Kobe. I was in Sakai when
    I was a little girl, but this business was not successful and my brother died all of a sudden. And when I came to think
    about it, my brother must have used too much of his brain. He died, anyways. The next brother was in Sakai, and he went
    to school in Momoyama, a little school. When my brother was in the second year of middle school, my mother took him out
    and took him to Doshisha University in Kyoto. The Doshisha University was founded in the Christian tradition and my father
    was a Shinto priest, so there was quite conflict there. Though we did not have any immediate relatives, there was a man
    named Nakata Norinobu, and he was a judge. He became very famous when he prosecuted a national criminal, Omi Kentaro.
    They said that he planned to bring some kind of chaos into the Japanese Government. He brought charges against this man
    and then he became very famous from this case. In any case, my mother had quite a bit of wealth, and she sent him to school
    until he became an independent lawyer. This man was my father's good friend, in fact he was just like my father's little
    brother and we used to call him uncle. Well, he went to Tokyo when I was about 14 years old. Because I was working around
    the house, he took me to Tokyo, he liked me very much. He had a house, a mansion in Okubo, near Shinjuku and there he
    had a job of tracing out family trees of noble families. They usually had very respectable people as his clients.
- speaker: Interviewer
  text: What kind of work did you do for him?
- speaker: Respondent
  text: This man, instead of hiring a maid, made me work around the house. He used to call me, 'Kazuke, Kazuko' all the time.
    He used to take me all over the place. At that time, I didn't have my father even though mother was still healthy. I don't
    remember how old his son was, but then, he became an Army Lieutenant, and I don't quite remember his name. He was transferred
    to Formosa with the Army, and he wanted to take me with him. However, my mother opposed. She said, 'Kazu has been working
    as a maid all this time, but if she goes to Formosa, she must begin a new vocation as a maid which she is not well prepared
    for!'
- speaker: Interviewer
  text: Did you go to Formosa?
- speaker: Respondent
  text: In any case this man married a woman from a noble family and their wedding was a magnificent one. It was a custom
    of a wealthy family to retain a woman called 'Machijoro' (waiting woman), who took care of the man's needs until his bride
    moved in. My mother was the head of the women who assisted the wedding reception. She sat at the head of the entrances
    followed by the rest of the maids to receive gifts from the visitors. After they got married they left for Taiwan (Formosa).
    Because of my mother's opposition I did not go to Taiwan with the newly wed. So I stayed with my mother and assisted her
    because she was not able to hire a maid.
- speaker: Interviewer
  text: What was your education like?
- speaker: Respondent
  text: I finished elementary school and part of a middle school, however, I was unable to attend further than that. The rest
    of my time in Japan was spent working for my mother as a maid. My brother graduated from Doshisha University and come
    to think of it, he was studying languages. My mother wanted him to be a medical doctor. When I was 4 years old, my sister
    died. We used to have a summer house in Osaka, and she was married when she was about 16 years old. She was pregnant when
    she died. My other sister used to correspond with the man for a long time until he died. My mother was quite different
    from the average Japanese woman. She used to look around the Doshisha University and the dorms. I had to stay with a housekeeper
    at home. The other sister had to go along with her when my mother went to the University. The one my mother took, was
    the oldest one and she was able to do anything she wanted. She was quite spoiled. My brother worked for a bank, a foreign
    bank, the 'Gaikoku Ginko', owned by foreign countries. When I was 11 years old, this emperor's father, the present emperor's
    grandfather, came to see Osaka. Because my brother was able to speak French and English, he worked as a translator, so
    he was able to bring home some cakes, and some things like that, which were given to him by the emperor. He brought them
    home and my mother cut them up into small pieces and distributed them among friends and relatives. She put on the formal
    wear, called Montsuki, to do this. It was such an honor, and this kind of thing did not happen to common people. So she
    felt that it was such honor and considered it as a very special occasion.
- speaker: Interviewer
  text: What happened after your father died?
- speaker: Respondent
  text: Well, anyway, my father was a very respectable man (erai hito). My mother was a respectable woman, too, when I come
    to think about it. When my father died, there was no such thing as pension so we had to do something to keep living. My
    mother borrowed a Buddhist Temple and there she sold antique things which my father had collected. I remember this vaguely
    because I was still a very small then. I imagine that how my mother raised money for our livelihood. I also remember Sino-Japan
    War. At that time I was in the second grade in elementary school. I used to make special clothes by cotton and sent them
    to the soldiers at the battle fields. Lots of people used to come to our house to do this. People were making button holes
    and everything there. So my mother was quite an active person.
- speaker: Interviewer
  text: Where did you live after that?
- speaker: Respondent
  text: After that we moved to my uncle's place. Even though we moved to my uncle's place, my mother and her brother lived
    in separate places. I lived with my uncle. His wife's name was the same name as mine, Kazuke, but she died early. My uncle
    was taken care of by my mother. So he was very good to us. He used to call my mother 'Onesan' (older sister) and took
    care of her and me really well. When I was 19 years old, my mother died all of a sudden. Before the death of my mother
    my brother graduated from Doshisha University and we moved to Tokyo and Yokohama. When my mother died his teacher, Mr.
    Wine, came to visit us.
- speaker: Interviewer
  text: Did your brother have any health problems?
- speaker: Respondent
  text: My brother had a sickness, edema and whenever he got sick Mr. Wine came and prayed for him. It was before my mother
    died, so my mother and I used to sit by them and said 'Amen' at the end of a prayer. I didn't know anything about those
    things at that time.
- speaker: Interviewer
  text: What happened to your family's possessions?
- speaker: Respondent
  text: My mother had a lot of nice looking cut glasses. We had all these nice things, but little by little we had to sell
    them. I suppose she had to sell them so that we would be able to live.
- speaker: Interviewer
  text: What happened when you came to Yokohama?
- speaker: Respondent
  text: When we came to Yokohama my brother worked for the Franchise Tax, and my sister got married to one of his fellow workers.
    I used to go shopping and there was this old man who stopped me and asked me where my house was. He had a cane and actually
    he was a judge in Nagasaki. I didn't know anything about this, so I told him where I lived, and he came to see us suddenly.
    My mother was still alive and was quite surprised and asked me who he was. This man asked my mother if he could marry
    my sister. Well, I ended up wearing a formal Kimono for the wedding ceremony of my sister and this man. You see, though
    he was a judge in Nagasaki, he came to Yokohama and worked at the Franchise Tax with my brother.
- speaker: Interviewer
  text: What was your childhood like?
- speaker: Respondent
  text: I used to run around all over the place so my mother used to say, 'Oh, you are such a trouble maker.' When we were
    in Yokohama we lived very close to the sea and we used to see foreigners, Caucasians, very often. Lots and lots of things
    happened there. When you asked me about the old time lots of memories come back to me.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: 83 years old now. And this March 25 I will be 84.
- speaker: Interviewer
  text: Do you remember the Russo-Japan War?
- speaker: Respondent
  text: No. I don't really remember, I think I was in Yokohama then, but I have a feeling that my mother and my sister were
    already passed on by that time. You know, my sister died leaving two children. I just can't remember the exact year though.
    I used to keep a diary.
- speaker: Interviewer
  text: Do you still have the diary?
- speaker: Respondent
  text: No. You said we went to Camp in 1942; I don't know what happened to it afterward. When we went into the Camp, my son
    found a job in Chicago, so the head of the camp allowed him to go out of it. We entered the Camp (Arizona) around July
    from Salinas and next March we left for Chicago. My two daughters, Osame and Yuki, also left the camp because they were
    going to attend a nursing school in Philadelphia.
- speaker: Interviewer
  text: Do you remember anything about World War I or the Manchurian event?
- speaker: Respondent
  text: Well, my children weren't involved and I don't remember anything about these events. But I have something to tell
    you. You see, I came to Livingston in 1909. At that time I was pregnant with a son named Ryuze. However, his father died
    before he was born. I tried to raise him. My husband, Mr. Minejima, died 6:15 am of the 4th of July 1911. He passed away
    at the California School of Medicine in San Francisco, the University Hospital. Mr. Junzo Nakamura who was my husband's
    cousin, took the remains of my husband back to Japan in the middle of September because there was no graveyard in Livingston.
