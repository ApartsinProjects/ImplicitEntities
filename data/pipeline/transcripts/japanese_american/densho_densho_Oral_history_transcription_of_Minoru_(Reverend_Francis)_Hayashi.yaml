collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Are you ready?
- speaker: Interviewer
  text: For the tape-recording, will you tell me your name again?
- speaker: Respondent
  text: Yes, Minoru... I added my middle name, Francis, when I came here. When I was naturalized, I officially became Minoru
    Francis Hayashi.
- speaker: Interviewer
  text: Which part of Japan are you from?
- speaker: Respondent
  text: Yamaguchi-prefecture. The town called Tafuse. Former Prime Minister Kishi and Former Prime Minister Sato are from
    the same town.
- speaker: Interviewer
  text: When is your birthday?
- speaker: Respondent
  text: August 3, 1897.
- speaker: Interviewer
  text: You must be in your eighties. 1897...
- speaker: Respondent
  text: 1897. I am seventy-seven this year.
- speaker: Interviewer
  text: How many brothers do you have?
- speaker: Respondent
  text: I had three, but one died. There were four children altogether. I'm the only one left now.
- speaker: Interviewer
  text: What was your position?
- speaker: Respondent
  text: Second oldest. Leaving my elder brother and me, my parents came to the United States. We were raised by our grandfather
    and grandmother. My two younger brothers were born in San Francisco. My other younger brother died right after his birth.
    My youngest brother went to Japan after graduating from the University of California. He died in February, 191 in Sendai.
    He was an assistant for an English professor.
- speaker: Interviewer
  text: How old were you when your parents came here?
- speaker: Respondent
  text: My father came here when I was three and a half, followed by my mother the following year. My father left in 1901.
    That means I was about three and a half.
- speaker: Interviewer
  text: What was your father doing?
- speaker: Respondent
  text: He was running a boarding house in San Francisco. My parents were.
- speaker: Interviewer
  text: Were you raised by your grandmother?
- speaker: Respondent
  text: My grandfather and grandmother. My grandfather wasn't named Hayashi by birth. He used to be a priest of the Shingon
    sect. His temple was closed down because of the Religious Reformation during the Meiji period. He was given the property
    of the temple, which was called Rin-ji. Rin is also pronounced Hayashi. He was given the name Hayashi. In those days priests
    of the Shingon sect weren't allowed to marry. After he was named Hayashi, he married my grandmother. Not having any children,
    they adopted my mother. My father was an adopted-groom. His last name was Hironaka. My grandfather's last name Miguchi
    was changed to Hayashi.
- speaker: Interviewer
  text: What type of people were your grandfather and grandmother?
- speaker: Respondent
  text: They loved us and took very good care of us. Succeeding to the property of the temple, they had a small home built;
    which was in my childhood. When I left for here, they were still living there. My elder brother remained there. He was
    an elementary school teacher at the beginning. Being a teacher's college graduate, he was promoted to principal. He became
    a county official then he became a prefectural supervisor; that was because the county was changed to a prefecture. My
    wife's father was from the same county. My elder brother was a principal there. Being a prefectural supervisor, he made
    the rounds of the schools. My wife's mother lived in the same prefecture; so, they tied each other.
- speaker: Interviewer
  text: What do you remember about your grandfather?
- speaker: Respondent
  text: Getting up in the morning, he washed his face and worshiped the sun outside. Coming into the house, he performed his
    morning worship at the place where the family water was located.
- speaker: Interviewer
  text: Was it the Shingon sect?
- speaker: Respondent
  text: He had become a layman before my father and mother's departure.
- speaker: Interviewer
  text: Yet, your grandparents were members of the Shingon sect, weren't they?
- speaker: Interviewer
  text: Did he recite a sutra?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Was he a strict man?
- speaker: Respondent
  text: He was strict. Especially so, since Buddhists are purists. He valued cleanliness.
- speaker: Interviewer
  text: Cleanliness?
- speaker: Respondent
  text: Yes. He was very particular about not being dirty. I remember he kept his body clean.
- speaker: Interviewer
  text: Speaking of keeping his body clean, I think the Japanese take baths very often. Did the custom stem from Buddhism?
- speaker: Respondent
  text: It's from Zen.
- speaker: Interviewer
  text: Oh, is that so? I didn't know that.
- speaker: Respondent
  text: My mother helped poor people, without telling my grandfather, whenever they came to her. She was scolded by my grandfather
    once in a while. As I mentioned before, they adopted my mother, for they didn't have any children. Though my grandmother
    was actually my aunt, I called her grandmother.
- speaker: Interviewer
  text: Do you remember anything joyful or anything you were scolded for during the days when you were being raised by your
    grandparents?
- speaker: Respondent
  text: Yes, I remember.
- speaker: Interviewer
  text: What do you remember?
- speaker: Respondent
  text: When my father left, I was only about four, I remember everybody went to see him off. When my mother left, I was five.
    As my mother got into the train, I got in, too. Then, a lady from next door pulled me out of the train. I cried. The neighbor
    lady said, "Don't cry. She'll come back with a basketful of money." The basket she showed me was one with a lot of holes
    for draining water from rice plants. I didn't think money could be saved very well in that kind of basket. My grandfather
    and grandmother scolded me when my mother was still in Japan. I was scolded after my father left. I went outside and went
    to a store located in front of my home. I cried out loud, saying, "Daddy, daddy."
- speaker: Interviewer
  text: You must have felt sad.
- speaker: Respondent
  text: I guess I felt sad. When I was still in elementary school, my father was in the United States, working as a cleaning
    man for a white family. He fell down and got hurt while he was cleaning some windows on the second floor. He wrote us
    that he couldn't send us money, because he was hospitalized. I felt sad, for no money would be sent to us. We had a celebration
    at the elementary school when Japan won the Russo-Japanese War in 1905. During the war, we had an image of Buddha and
    a Jizo or a guardian deity of children, at home; because our house used to be a temple. Every time I passed the Jizo,
    I prayed for Japan's victory. Though I was a small child, I was conscious of the war.
- speaker: Interviewer
  text: I see. How far did you go in school while you were in Japan?
- speaker: Respondent
  text: Up to the eighth grade. I came to the United States when I was a junior high school student. I attended a junior high
    school established by Gavis. Mr. Sato was in the same class. He was a little younger. Mr. Kishi and Mr. Sato are brothers.
    Mr. Kishi was adopted by his uncle and his name was changed to Kishi. Mr. Kishi was two years older than I, and Mr. Sato
    was one year younger than I. Our class got together and had our class picture taken. So, I have a picture which Mr. Sato
    is in. Mr. Kishi was bright. We respected him in those days.
- speaker: Interviewer
  text: Do you remember anything about your elementary school days?
- speaker: Respondent
  text: I remember the time when I went to elementary school for the first time. And also the times in between, for example,
    the playground, etc.
- speaker: Interviewer
  text: What do you remember about the first day?
- speaker: Respondent
  text: Other students looked big, as if they were adults. That's about all for the first time. Kyucho means something like
    a committee chairman. The pupil sitting next to me made something out of some paper. Attracted by it, I copied him. The
    teacher came to him and asked him, "Why did you do this?" He said, "It's fun to make it." I wasn't the only one. Hayashi
    did it, too. We weren't allowed to go outside during recess. I had to stay in the classroom. I was so sad that I didn't
    even tell my grandparents about it.
- speaker: Interviewer
  text: Was your grandmother gentle?
- speaker: Respondent
  text: Yes, she was gentle. She fed me well. Not being a real mother, she pampered me all the more.
- speaker: Interviewer
  text: Do you remember anything about your elementary school teachers?
- speaker: Respondent
  text: Not too much. One teacher, named Tokuro Sumita, lived near my house. His son was in my class.
- speaker: Interviewer
  text: What type of teacher was he?
- speaker: Respondent
  text: I was scolded by him very often. The teacher frequently used the term ore to refer to himself in his talk. I don't
    remember any other teachers.
- speaker: Interviewer
  text: What subject did you like best in elementary school?
- speaker: Respondent
  text: I don't remember. In junior high school, I liked Chinese classics. I didn't like English too much. When I was in the
    fourth grade, my parents called me to the United States. I felt I should study English. Our teacher of English, who was
    Japanese, taught us only translations. One hour each week, we had a conversation class with an American teacher. He was
    a teacher of a nearby senior high school for commerce. He came to our school to teach us for one hour a week. Feeling
    its importance, I studied English conversation very hard. Before coming here, I visited him at his home to say good-by.
    I felt too shy to enter his home. I walked back and forth in front of his home. Going in, I told him. He asked me, "What
    part of the United States are you going to?" I said, "I'm going to San Francisco where my parents are." He said he was
    from an eastern state. I don't remember which state it was. Another teacher, who was a Geography teacher, had visited
    the United States. He told us about San Francisco, the bus which used to be located in front of Cripass, and the ferry-boat
    between Oakland and San Francisco.
- speaker: Interviewer
  text: Did your father and mother write to you often?
- speaker: Respondent
  text: Yes. My father wrote in detail about the earthquake of 1906. They were evacuated, carrying some suitcases. I may be
    confused by what my mother told me later on.
- speaker: Interviewer
  text: What did she tell you?
- speaker: Respondent
  text: Because of the fire, they had to get out. They tied a rope to the suitcases and drew them out when they were evacuated.
    About the suitcases, they put some food for an emergency in the suitcases at the time of evacuation.
- speaker: Respondent
  text: I'm not sure if I'd heard of such things through their letters or if I was told about them in the United States. In
    addition, when I was in Japan, we were shown slides, which used to be called the gento in Japanese. It was at school that
    everybody gathered and saw the slides on the earthquake in San Francisco.
- speaker: Interviewer
  text: What were your pleasures during your childhood?
- speaker: Respondent
  text: I don't remember very many things about my childhood. There was a tree in front of my house when I was little. I climbed
    up it. I thought it was a big tree. When I returned to Japan thirteen years ago, I saw it and found out that it wasn't
    too big. My house was built out of the temple building. When I was in high school, we built a new room for guests. There
    was some kind of tree in back of it. The tree had fruit which I smashed with my feet. The tree was there. I plucked off
    the peaches and ate them. We also gave out some to others. They were different from the peaches you see in the United
    States. They were smaller. Since my grandfather was old, he delegated me to parties. It was when I was in the sixth grade
    of elementary school. Elementary school used to be for four years. It was extended to six years during my school days.
    I went to a higher elementary school for two years. In those days, we made rice-cakes at home. I was told by my grandparents
    to deliver some to the people who came to our house for help. The people persuaded me to go in. Since they didn't have
    anything to treat me to, they served the rice-cakes I delivered.
- speaker: Interviewer
  text: Was it a poor family?
- speaker: Respondent
  text: Poor families walked around seeking for work.
- speaker: Interviewer
  text: You gave it to those people?
- speaker: Respondent
  text: We paid wages. In addition, once in a while, we delivered something to them. I was in elementary school then.
- speaker: Interviewer
  text: What kind of recreation did you have in your higher elementary school days?
- speaker: Respondent
  text: Fishing? No, not too much fishing.
- speaker: Interviewer
  text: Didn't you have any mountains?
- speaker: Respondent
  text: Yes, we had some mountains. We had a pond or a lake. It was an irrigation ditch. I went there to swim during the summer
    season. My mother's home was located on the coast. In summer, I visited my grandmother and played on the beach. I used
    to think the place was clean. When I went there thirteen years ago, I found it dirty. I went to see shrimp in the process
    of being dried. Barefooted workers in a pile of shrimp were drying it. Observing the scene, I felt it dirty. The beach
    I used to think clean had become dirty.
- speaker: Interviewer
  text: How was your junior high school life?
- speaker: Respondent
  text: During my junior high school days, I stayed in a dormitory. We had a definite class consciousness. If you are a freshman,
    the second and the third grade students teased you, freshman. There were two dormitory buildings. One was for freshmen
    and the second-graders, the other was for the upper class students to move into. When I was little, we didn't have any
    electricity at home. When a lower-class student failed to light the lamp in the hallway, some upper-class students teased
    him, saying, "You don't have enough oil. It's dark in here. Put in more oil."
- speaker: Interviewer
  text: Why were you called to the United States by your parents?
- speaker: Respondent
  text: In Japan, we didn't have enough money for me to obtain a higher education. It was expensive; whereas, it didn't cost
    too much to go to school in the United States. My parents felt it would be hard to raise a girl in the United States.
    So, they sent my younger sister to Japan. One man from our town came back with her. I and my grandmother went to pick
    her up. I was still in elementary school then.
