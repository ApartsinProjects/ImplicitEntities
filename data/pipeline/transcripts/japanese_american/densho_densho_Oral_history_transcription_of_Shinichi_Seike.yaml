collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: My name is Shinichi Seike. I was born in Doi-mura, Higashiuba Gun, Ehime en.
- speaker: Interviewer
  text: Oh, Ehime Ken? When were you born?
- speaker: Respondent
  text: I was born on January 5th in Meiji 21 (1888), so I am 86 years old this year.
- speaker: Interviewer
  text: You are healthy, aren't you!
- speaker: Respondent
  text: I can still drive a car.
- speaker: Interviewer
  text: That is really something! Do you have some material that you wrote? Shall I let you read it first?
- speaker: Respondent
  text: It's just a brief record, since I forget easily.
- speaker: Interviewer
  text: First, I am going to ask about your home where you were born. You were born in Ehime Ken, and?
- speaker: Respondent
  text: Yes, my home was in the real peace and I was brought up there. When I was at the age of 16, I started to go to the
    Yahata Commercial High School which was 13 to 14 ri (about 2.5 miles) away from the house. My family was poor. This was
    about 60 years ago. In those days in the rural area, only rich people sent their sons to high school, and the rest didn't.
    But my mother strongly believed that she had to send me to high school at any cost. At that time, we were suffering from
    poverty because my father had failed in a big project and gone bankrupt. She thought that she had to send me to the school
    only because of being poor, and insisted, "I am going to send Shinichi to the school by all means even if I have to eat
    nothing." There was a rich family living in our neighborhood that happened to be our relative. Every time she went to
    the house to apologize that we could not make a payment for the debt, she took me with her. I still remember that she
    used to apologize, saying, "We cannot make a payment now, so please give us some more time," putting her hands and forehead
    on tatami floor, crying. I could imagine that my parents were greatly suffering from poverty, but they thought they had
    to have me educated. They went to one of their relatives, very rich and some business successfully, to borrow the money
    for my education. Even they, being rich, were not sending their children to high school. Being in the country, it was
    14 to 15 ri away from the town, that was almost the same distance from here to Tacoma. It cost quite a bit of money to
    send children to the high school there because of boarding cost and so on. Everybody opposed to her idea, but my mother
    strongly insisted on my going to the school, and sent me to Yahata Commercial High School. Receiving a 4 year education
    there, I went back home, although I didn't have any particular job since it was such a rural area.
- speaker: Respondent
  text: My family was still in poverty. At that time, going to America was prevalent among people, but in my village, not
    so many people could get the visa while quite a few visas were being issued to the people near the city of Yahata as you
    can see that quite a few Japanese in Seattle are from Yahata. Thinking that I might be able to get a visa if I had gone
    to Yahata, I put my name on the Kiryu family register, since my friend Kiryu says "Come to my place. You may be able to
    get a visa if you apply it from my family." I tried it this way, in vain. My father wanted me to go to America to make
    money to pay the debt off. I tried so hard in various ways to get the visa, but I couldn't. So I applied for an immigrant
    visa to Hawaii, since it was also popular then. But the policeman who came to my house to research about myself reported
    that he did not admit me as an immigrant. I was having a hard time in obtaining the visa. When I was going to the high
    school, I had the English teacher from Sendai named Ouchi. He became the manager of the Rikko-Kai Association in Tokyo
    whose president was Kihei Shimazaki. Quite a few members of the Rikko-Kai were going to America. I wrote him a letter
    and said, "I would like to go to America. What would you think of this idea?" He told me to come to Tokyo, so I went to
    Tokyo at once. At that time, it cost quite a bit to go to Tokyo, and I hesitated for a moment. But I managed to borrow
    money to go to Tokyo, and began to board at Mr. Ouchi's house. At that time, there was an Association called Rikko-Kai
    and they were sending quite a few people to the U.S. and South America.
- speaker: Respondent
  text: The president, Mr. Shimazaki was quite a man in Japan equal to Mr. Gunpei Yamamura. He was from Sendai, and founded
    the Rikko-kai whose purpose was to send immigrants overseas. He thought that Christian education had to be given to them
    before going abroad, he had a big, fine hall built and advertised the association loudly. Quite a few youth gathered to
    his place. He didn't have any money when he had the big hall built, but he believed that with religious faith he could
    solve the money problem anyway because of the mercy of God. I heard that he had had a hard time being accused by the contractors
    of the building. He was suffering from T.B. and often coughed out blood, I heard. He was a great man in educating the
    youth, and sending them not only to the U.S. but South America. Quite a few of them are still living in those places.
    I, myself, went to Tokyo, looking to Mr. Ouchi for help. There were various homes such as the Betania Home, where 5 to
    8 people boarded. They did their cooking or the landlady cooked for them. I, myself, was boarding at Mr. Ouchi's house
    and attending the Rikko-kai. I was in the association about one year and a half to almost two years. We had a five minute
    private interview with Mr. Shimazaki in the morning. A list of order of the interviews was made up. This interview should
    be only for 5 minutes. I had seen him twice during my stay there. He encouraged me saying, "How are you doing?" He was
    a minister of Nihon Kiristo Kyodan (Japanese United Church of Christ). Of course there was a church in Rikko-kai, but
    it was not the real one since Rikko-kai was an association. It had English teachers. Various subjects were set to be taught.
    Quite a few youth from all around Japan gathered. One time, when I was there, about 150 to 200 people gathered. There
    was a big hall for them. The purpose of the Kai was to encourage and lead the youth to Christianity and send them overseas.
- speaker: Respondent
  text: For brides, a special system to educate them was arranged. These were the intentions of Mr. Shimazaki, and I was one
    of those who were trained and educated by him. I heard that he had coughed out blood sometimes, but he said, "I won't
    die even if I cough out blood, because I believe in Christianity. I'll keep on going to the end." He was quite a spirited
    man. During the interview, he said, "I heard that you would like to go to America. Do you know anybody helpful?" I said,
    "Yes, I do." He said, "What kind of acquaintance is he?" I had a relative who was a member of the Diet. When I was in
    the Kai the Diet was convoked and he happened to be in Tokyo. His name was Mr. Watanabe. So I said, "He has come to Tokyo
    from my prefecture." He said, "That's very good. Go to see him." There was a discount cable-car running around 7 o'clock
    in the morning. I got up really early in the morning to take it. The Dietman was staying at a big hotel, and wasn't getting
    up before 10 o'clock in the morning. I put on hakama took the cable-car, got to the hotel early in the morning, and waited
    for him. I explained my idea and said that I would like to go to America. He said, "I see. I know the governor of Ehime
    ken very well." He was elected a member of the Diet from the Ken (prefecture). Also my high school mate was a secretary
    for the governor, Mr. Saionji. He said, "I am writing a letter to Saionji at once. Send in the application that you would
    like to go to America. I'll write and ask him to issue a passport to you. Send in the application at once." In those days,
    the conditions to issue the passports to America were very strict.
- speaker: Respondent
  text: You had to have a guarantor in the U.S. to take care of you when you got sick. They were investigating very closely
    into these conditions, and if you didn't meet the conditions, you could not go to the U.S. Fortunately, Mr. Watanabe,
    the Dietman became the guarantor of myself. Also the father of one of my friends, Mr. Shiba, who was a dealer in wine
    and very rich, became my guarantor. With these two guarantors I sent in the application. I was enrolled at the Meiji University
    in Tokyo, because they would not issue a passport to those who were not going to school. In case they came to investigate
    my situation, I had to be boarding at quite a place. Mr. Shimazaki asked the elder of his church to let me board at his
    house. He said, "You don't have to live in his house. It will do if we have his maid tell the policeman that the person
    named Shinichi Seike is boarding at the house in case he came to investigate." Thus, I was enrolled at the Meiji University,
    started to go to the University, arranged to look like I was boarding at this influential man and elder, and sent in the
    application for the passport.
- speaker: Respondent
  text: Less than one month, the passport was issued to me. I wrote to my home that I obtained the passport. They didn't do
    any investigation on me, since I applied for it with the Dietman's recommendation. In those days it cost quite a bit of
    money to go back to my home from Tokyo about 30 to 50 Yen, although I don't remember exactly. I wrote to my father and
    said, "I finally got my passport. I am leaving for America on this day. Shall I come back home to say farewell or not?"
    My mother wrote to me and told me to come home, but it cost a lot of money to go back home, so I decided to leave Japan
    for America without going back home. Everybody that was studying at Rikko-kai in Tokyo worked his way through school,
    delivering newspapers or milk, working as a navvy to earn money for lodging and personal expenses. I, myself, worked as
    a navvy riding on a water wheel when a bridge was being thrown in Ochamomizu area. Since it was costly for those who had
    come from the country to live in Tokyo, everybody worked this way to earn his own expenses. I stayed there for one and
    a half year, working and earning my personal expenses. It was in 1908 that I came to America.
- speaker: Respondent
  text: In the church in Kanda, they used to have a service in the morning and in the evening, and I earnestly attended the
    services since I was trying very hard to go to America. Before leaving for the U.S., I was baptized by Mr. Shimazaki at
    the Nihon Church of Christ in Mitatsuji-Cho, Kanda. A group of 16 people or so including myself came to the U.S. together.
- speaker: Interviewer
  text: Were they also from the Kai?
- speaker: Respondent
  text: Yes, 16 people from Rikko-Kai came to America together. At that time, the members of Rikko-kai used to go to various
    places to preach Christianity, beating a drum like the Salvation Army does. We talked to the people about Christianity.
    Some strongly opposed to us. When we, a group of 20 to 30 people, visited a place to preach, carrying a big lantern on
    which the letters of Rikko-kai were drawn, beating a drum, some people threw stones to us, disparaging roundly. We, realizing
    that it was too dangerous, ran away from the place and got back. This happened two, or three times. Thus, I was living
    in Tokyo, receiving lessons from Mr. Shimazaki, being engaged in mission, helping some office works. In April of 1908,
    we, a group of 16 people, left for the U.S. by the small boat named Iyo-Maru. It took 17 to 18 days to get here in those
    days. When we got together on deck and were holding a service, singing hymns, quite a few Christians among the 300 people
    on board began to gather to join us from nowhere, made a circle, and we could hold such a splendid service every morning.
    Being young, we were spiritful. Since I was the oldest-timer of the group, I became the chairman. We successfully held
    services, sang hymns, and visited the people to talk about Christianity on the boat. It was the time that I was 21 years
    old. Thus, I came to America. Having been trained very hard by Mr. Shimazaki in Tokyo, having been able to understand
    Christianity to some degree, I did my best even on the boat. In 1907, a severe depression attacked the U.S., and the people
    were having a hard time to make a living. The year we came to the U.S., in 1908 jobs started to be available again gradually.
- speaker: Interviewer
  text: Did you come to Seattle directly?
- speaker: Respondent
  text: Yes, we did. I landed at Seattle. Mr. Yoshioka interpreted for me when I was checked by Immigration officers there.
    My turn came. In those days we had to have guarantee money of $50 with us to enter the U.S. We lent $50 to those who didn't
    have so that everybody had the $50 in his pocket when we were checked by the Immigration officers. My turn came. He asked
    me some questions such as what I was going to do in the U.S. Mr. Yoshioka interpreted for me conveniently, and I just
    agreed, saying, "Yes, that's right." Thus I was able to go through the Immigration office without any problems. There
    was a chapter of Rikko-kai in Seattle, and those who had come from Japan could stay at its boarding house.
