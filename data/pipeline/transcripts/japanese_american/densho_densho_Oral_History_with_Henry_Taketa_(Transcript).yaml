collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please state your date of birth and where you were born?
- speaker: Respondent
  text: I was born near Florin in Sacramento County, California. It would be the outskirt of Sacramento, the City of Sacramento.
- speaker: Interviewer
  text: What year do you remember?
- speaker: Respondent
  text: The year was January 5, 1913.
- speaker: Interviewer
  text: How long did your family stay in that particular area?
- speaker: Respondent
  text: I think my father settled there back in 1900. My mother joined him in 1907 or thereabouts, after they were married
    and that was their domicile until 1918, when the Taketa family moved into Sacramento and located their family home on
    5th and Capitol, what is now Capitol Avenue, formerly N Street.
- speaker: Interviewer
  text: Do you know why they moved into town?
- speaker: Respondent
  text: My dad had a business of selling life insurance as well as farming, and so it was more conducive to his insurance
    business to be in I think in the city rather than remaining out in the country.
- speaker: Interviewer
  text: Now how many brothers and sisters?
- speaker: Respondent
  text: I have one brother, one older brother, and one older sister. My sister, Mai, is the eldest in the family, of the three
    children.
- speaker: Interviewer
  text: So you started grammar school in the City of Sacramento?
- speaker: Respondent
  text: I started grammar school here in the city at Lincoln. Lincoln Grammar School at 4th and 5th at P Street. Whereas my
    brother and sister, they started their initial grammar school and process at the Enterprise School in the neighborhood
    of where we lived.
- speaker: Interviewer
  text: That was on Elder Creek wasn't it?
- speaker: Respondent
  text: Well we lived on Elder Creek Road but the Enterprise School was located, I think on what they call Orange Avenue,
    or something like that.
- speaker: Interviewer
  text: Now while you were in Sacramento, did you parents sort of encourage you to go to the Japanese School, the Japanese
    Language School?
- speaker: Respondent
  text: I think most families encouraged that in one way, shape or form. And most of us went to Shakuagawa which was under
    the auspice of the Buddhist Church in Sacramento.
- speaker: Interviewer
  text: How many years did you attend?
- speaker: Respondent
  text: I attended about seven years, after going to your grade school, then after hours, five days a week you went to a one
    hour, one hour and a half, of Japanese language school.
- speaker: Interviewer
  text: That was everyday? After school?
- speaker: Respondent
  text: Five days a week.
- speaker: Interviewer
  text: Do you remember anything that was taught other than language?
- speaker: Respondent
  text: Basically it was language.
- speaker: Interviewer
  text: They didn't teach morals or etiquette?
- speaker: Respondent
  text: Not that I recall.
- speaker: Interviewer
  text: Anything that might be considered propaganda?
- speaker: Respondent
  text: I don't recall. I don't think so, there might have been something in the readers that we used, assigned to each class
    that might have had some reflections upon Japan because these were Japanese language books published in Japan. And I assume
    that they were being used in Japan and were brought over here for our purpose. So there might be some taint in terms of
    teaching, you know, subjects that are more prone to the Japanese of Japan.
- speaker: Interviewer
  text: 'Did you participate in any organized activity: Baseball, or sumo, or kendo, or anything while you were growing up?'
- speaker: Respondent
  text: In high school we did. Because everybody played something when they were kids, you know, as compared to today, which
    is pretty much a sit and watch type of activity, watching a television, watch other people play sports and so forth. In
    those days, you know, to pass the time you had to do things for yourself, and I think most of us played at least baseball,
    and then some of us played tennis, and basketball depending upon the season. A few of us played on the high school team
    whether it was baseball, basketball, or some may have even gotten into track and football.
- speaker: Interviewer
  text: Now for high school, you went to Sacramento High?
- speaker: Respondent
  text: That's correct, Sacramento High School, after Sutter Junior High.
- speaker: Interviewer
  text: Was that pretty much a mixed student body?
- speaker: Respondent
  text: It was primarily a white populated school at that time, with a percentage of Orientals and a percentage of other minorities,
    but I would imagine if you put the minorities together and it would still be in a very small minority.
- speaker: Interviewer
  text: Did you face any kind of hostilities or feelings of uneasiness?
- speaker: Respondent
  text: Not necessarily, but on the whole while you are in school you are pretty much on an integrated level, but when it
    comes to social even, as it relates to school activities, I think you redefine your place, or status and you socialize
    more with your own people as compared to the majority of the student body.
- speaker: Interviewer
  text: What kind of impression do you have of Japan Town? Obviously you lived almost right in the center of it.
- speaker: Respondent
  text: Well you don't have, as I recall you know, it is not an impression in and of itself, that was a way of life. The Japanese
    had its little quarter, the Portuguese had, was on the other side of the railroad tracks. There were very few Colored
    people, and they were scattered throughout the entire community. So it is hard to say, you know, whether something definitely
    remained in my mind other than to say that the Japanese people were isolated into somewhat of a given area. The Chinese
    people were up on I Street and J Street, and they were on K on down to maybe P Street, between 2nd and 6th Street and
    then beyond that would be the Portuguese, and the Italian, towards South Side Park. The rest of the community would be
    maybe lily white.
- speaker: Interviewer
  text: Was there any interaction between the Japanese and the Italians or the Portuguese or?
- speaker: Respondent
  text: Not necessarily, not that I recall anything of that nature. It's, after school, you pretty much associated with your
    own group.
- speaker: Interviewer
  text: And plus if you had to go language school, that brought you right back into the Japanese Community after school.
- speaker: Respondent
  text: Well, you were, when you returned home from school you were in the Japanese community per se. There were a few who
    were in the outlying areas, and then others who came to say Sacramento High who came from the rural areas. Such as the
    Riverside Park area, Oak Park, even the [hard to hear] station area used to bring in students from the, to the high school
    from that area.
- speaker: Interviewer
  text: Do you remember any celebrations that the Community itself celebrated, as a community?
- speaker: Respondent
  text: I think from time to time there would be something, especially in the spring time, you would have the so-called Sacramento
    Picnic and they were held on the other side of the, in the Broderick area across the river.
- speaker: Interviewer
  text: How many people would attend one of these things?
- speaker: Respondent
  text: It is hard to say but then, I think the whole community was represented in terms of attendance.
- speaker: Interviewer
  text: What might you say, five or six hundred?
- speaker: Respondent
  text: Oh I would imagine it could be maybe several thousand.
- speaker: Interviewer
  text: Now in your own family, did your family celebrate both Japanese holidays and American holidays?
- speaker: Respondent
  text: It was fairly customary, customarily like for instance New Years was more of a Japanese New Years, the way in which
    the Japanese used to celebrate their holidays. Whereas Christmas, Thanksgiving, Fourth of July, would be the American
    way. Outside of these given, recognized holidays I don't think there was much celebration such as birthday and [hard to
    hear]. Now the churches may have observed their own traditional observances which brought the congregation together from
    time to time.
- speaker: Respondent
  text: But on the broad basis, I think we celebrated holidays as recognized in the United, you know, by the majority of populations,
    Fourth of July, Memorial Day, Thanksgiving, Christmas, New Years and so forth. Now New Years would have a little more
    Japanese taint to it, even today, that may be, that would be something that had been carried over from our grandparent's
    generation. But, primarily in terms of the type of food that we eat, on the particular occasion. So all in all, I think
    even though the Japanese-Americans were somewhat isolated what they did was pretty much along the line of American tradition.
- speaker: Interviewer
  text: Do you remember any places that were public accommodations where Japanese couldn't get into or use?
- speaker: Respondent
  text: That was a way of life at one time. That certain private, say swimming pools, open to the white population may not
    be open to the Japanese.
- speaker: Interviewer
  text: Would there be a sign or is it just something that everybody understood?
- speaker: Respondent
  text: Well, there might, I don't think there was any sign but assuming you sought admission, you might have been rejected
    at that time. And perhaps by custom you get to know what is available and what is not available.
- speaker: Interviewer
  text: Now during the Depression, I imagine you were still, let's see, you probably already finished high school?
- speaker: Respondent
  text: I was just getting, I had just gotten out of high school and going to junior college when the Depression got under
    way.
- speaker: Interviewer
  text: Do you remember what effect it had on, on your family?
- speaker: Respondent
  text: Well it was disastrous to the, for most families in the sense that we were all hard put to make two ends meet. We
    were involved in farming at the time, as well as my father's selling insurance and he started his insurance business back
    in 1912, and he would have completed his twentieth year towards his retirement in what they call [hard to hear] in 1932.
    But he could not generate adequate insurance in 1931 and 1932 was a disaster year for him, in terms of having clients
    to buy insurance, so in a sense he went out and bought insurance for his own people. He paid the first premium to get
    the history of insurance for his retirement program. And unfortunately, in his situation, he had a type of retirement
    program was called for, it's called for average of the first fifteen years and worst of the last five years, and 1932
    was a disaster year for him, so the only way he could salvage was to buy his, to go out and buy insurance for people who
    could not afford to buy it themselves.
- speaker: Interviewer
  text: So actually he would pay the maybe the first few premiums and then?
- speaker: Respondent
  text: The first premium.
- speaker: Interviewer
  text: And would the client repay him down the road?
- speaker: Respondent
  text: No, no, that was a gift, more or less, you know. And as far as farming went, as I vaguely recall, the family with
    maybe together with a few other growers in the Florin area would ship the cargo of grapes, say to New York, and then when
    the consignment sale took place back east, they would get a billing from Southern Pacific Company for cost of shipping
    which was not covered by the price of goods sold. And so, you know, it was really tough going. And a common saying of
    the time was "starving, knee deep in wheat." And that was taking place. They used to dump cargos of oranges just to try
    to hold up the price.
- speaker: Interviewer
  text: Do you remember any businesses going under in Japan Town?
- speaker: Respondent
  text: I don't recall per se because I was just a student at that time, but I would assume some businesses closed. Because
    we don't have the procedure of bankruptcy so forth and so on, as you would, be more noticeable today. I would very much
    assume that some businesses had to close down and some farmers had to give up farming for themselves and turn to laboring
    and that sort of thing. It was a disaster for everybody. So I think on the whole, the Japanese people survived a little
    better than the others because maybe they learned to live a little more frugally, and got by for a little less than what
    the other people had to contend with. On the other hand, that the Orientals and many of the other minorities were not
    privileged to get under such thing as CCC of the time, Civilian Conservation Corps which came into being, WPA, and that
    sort of governmental agency relief program.
- speaker: Interviewer
  text: There seemed to be a lot of, like the stores would give their patrons credit, and that seems to have gotten some of
    the people in the Japanese community by. They could settle their accounts at the end of the year.
- speaker: Respondent
  text: I think there was a great deal of trying to help each other. There was a great deal of I think mutual assistance of
    a kind built into the Japanese-American society at the time.
- speaker: Interviewer
  text: Now at junior college, did you have an idea that you were going to go into law?
- speaker: Respondent
  text: That is a kind of a hard thing to say because you know, we were facing Depression and one thing that concerned me
    was that if I went to a full four years of university, two years of junior college, and two years of university, and then
    into professional school it would be a heavy financial load on my parents, so I took a short cut. Instead of going into
    say the University of California or some other school of higher learning, I went from Sacramento Junior College into Hastings
    Law School. Because the avenue was available to me. But if I went the four year route, I might have maybe chosen say medical,
    as my chosen profession, rather than law. So it was a short cut, because of the necessity of the time.
- speaker: Interviewer
  text: So were there very many lawyers in the Japanese Community at that time?
- speaker: Respondent
  text: There was one. There was Walter Tsukamoto, who came into Sacramento. He was a Sacramentan by, I think he was born
    in Hawaii, and came to Sacramento as a child and grew up here, went to the local schools, the University of California,
    Bolt Hall Law School, and then he came back to Sacramento to practice, and I think he entered practice sometime in the
    later part of the 1920s which would be about 1928 or 1929.
- speaker: Interviewer
  text: So actually before Walter Tsukamoto there weren't any lawyers?
- speaker: Respondent
  text: No, he was the first one.
- speaker: Interviewer
  text: I have come across some, you know, pictures of Japanese in these albums and underneath it says lawyer. But I sort
    of wonder where they got their education, you know, it doesn't say if they are certified.
- speaker: Respondent
  text: Maybe correspondence school? Or they might have gone to American School so to speak and acquired a sufficient knowledge
    so that they became interpreters, and they would be a go between a Japanese client and say a Caucasian attorney. Serving
    as an interpreter to overcome the language ability.
- speaker: Interviewer
  text: So now you went to Hastings Law School and that's a three year program?
- speaker: Respondent
  text: From 1932 to 1935.
- speaker: Interviewer
  text: And you came back,
- speaker: Respondent
  text: Came back and took my bar, and passed it, the same year as my graduation, and shortly after that went into practice
    of the law.
- speaker: Interviewer
  text: In Sacramento?
- speaker: Respondent
  text: Beginning of 1936.
- speaker: Interviewer
  text: So that in Sacramento there were two Nisei lawyers.
- speaker: Respondent
  text: Up to World War II.
- speaker: Interviewer
  text: Up to World War II. What kind of cases would you handle? Did they run the gamut or did you specialize in certain kinds
    of-
