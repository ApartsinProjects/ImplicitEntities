collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Shigeru Mayeda.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1902. So I'm 72 years old.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Niigata Ken. Well, I was born in Hawaii. I was there till I was 6 years old. But I was sent back to Japan to learn
    Japanese. I finished elementary school, 6 years, and attended 3 more years of middle school. After that I came back to
    the U.S.A.
- speaker: Interviewer
  text: Well then you must feel more comfortable in English than in Japanese.
- speaker: Respondent
  text: Now, I'm a non-native in English; I did study English, but once I got used to Japanese, I could not get out of it.
    It's because pronunciation is so different. But when I came to Fresno to go to school, there were very few Japanese there.
    So I had to learn to live with whites when I came back to the U.S.A.
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: I worked in the railroad. It was not an easy job. I had an opportunity to visit Japan in 1942.
- speaker: Interviewer
  text: Right before the war?
- speaker: Respondent
  text: Yes. I stayed there for 35 months, got married and brought back my bride to America. I went to Loomis first. I farmed
    there. It was the time when Japanese could not lease land, but I had citizenship so I was able to buy and lease land.
    I also let my friends use my name to buy land. However, several years later I moved out of there because I was afraid
    because I thought it was illegal. I sold my land there. At that time I heard that Mr. Abiko was selling land in Cortez,
    so I bought about 20 acres where there was a small ditch. We moved over here and began to farm. It was the time when Cortez
    Church still had that small manse. Later I joined Cortez Christian Church with my wife. I was a church member in Cortez.
    Well, actually another reason why I moved to Cortez was because a child was born to us, and I wanted to settle down someplace
    and raise children. The land I bought in Cortez used to belong to an old man. He could not keep up with his work so he
    decided to give it up. I was able to buy it very cheap.
- speaker: Interviewer
  text: What happened to your wife?
- speaker: Respondent
  text: My wife died when she gave birth to the third child. She was not very healthy. We had a funeral service in this church,
    though the building was an old and smaller one.
- speaker: Interviewer
  text: What happened after that?
- speaker: Respondent
  text: I raised 3 children by myself as I farmed. When they grew up and became independent, one went to Fresno and began
    gardening. He quit that lately and began to buy and sell stocks. The other son is in Los Angeles. My daughter is in Cortez.
    She is married and I live with her family. I did not want to go to Los Angeles. I sold my house and bought a mobile house.
    I'm retired now and doing nothing.
- speaker: Interviewer
  text: Now that everybody is here, I would like you to tell me your names.
- speaker: Respondent
  text: My name is Kajioka. I was born in Fukui Ken. It was a quiet countryside.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: Thirtieth year of Meiji. I'm 75 years old now. When I was 20, I came to Watsonville from Japan. I've been here in
    Cortez for 53, 54 years. It must have been 1919 when I came to Cortez.
- speaker: Interviewer
  text: Did you come to the U.S. as a bride?
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Mrs. Mai Yoshioka.
- speaker: Interviewer
  text: Where did you come from?
- speaker: Respondent
  text: I came from Niigata Ken, but I was married to a man who is from Fukuoka. And in fact I was born in Hawaii.
- speaker: Interviewer
  text: Oh, then you are Nisei. Do you feel freer in English than in Japanese?
- speaker: Respondent
  text: Now, it was the thing of the past. My father was Yoshi. He had to inherit the family tradition and continue family
    name. So he had to go back to Japan. Naturally I was brought back to Japan with him. We were supposed to come back here
    in 3 years, but things did not go the way we planned.
- speaker: Interviewer
  text: So you were born in Hawaii.
- speaker: Respondent
  text: Yes. I was brought back to Japan when I was 3 years old.
- speaker: Interviewer
  text: When did you come to Cortez?
- speaker: Respondent
  text: I came here in 1920. My husband came to America in 1909. He came here in 1919 to look over the land.
- speaker: Interviewer
  text: When you came to the U.S.A., where was your husband?
- speaker: Respondent
  text: He was in Watsonville.
- speaker: Interviewer
  text: Then you know Kenzo Yoshida.
- speaker: Respondent
  text: My husband knew him well, too. He also knew Mr. Shikuma well. My brother was in the same class with his son.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Mrs. Maju Sakaguchi.
- speaker: Interviewer
  text: What is the meaning of your name?
- speaker: Respondent
  text: Well, my name was given to me in Japan so I don't know.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Kumamoto Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 28th year of Meiji (1895).
- speaker: Interviewer
  text: When did you come here?
- speaker: Respondent
  text: I came to the U.S.A. in 1915 and I came to Cortez in 1923. I came to San Jose first. I lived there for 6 years before
    I came here.
- speaker: Interviewer
  text: Your husband was farming in both places, is that right?
- speaker: Respondent
  text: Yes. Thirteen families came to Cortez in the beginning. At that time there was nothing here. My husband and I came
    right over there across the railroad with my uncle.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Mrs. Akio Yamamoto, and I'm from Yamaguchi Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1902.
- speaker: Interviewer
  text: When did you come to the U.S.A.?
- speaker: Interviewer
  text: Did you come to Cortez right away?
- speaker: Respondent
  text: No. I went to Salinas first. I came here in 1924. So I have been here just about 50 years.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Saburo Narita.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Kanagawa Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: October 5, 1903.
- speaker: Interviewer
  text: When did you come over here?
- speaker: Respondent
  text: I came over here in 1921.
- speaker: Interviewer
  text: Where did you live first?
- speaker: Respondent
  text: Alameda County. My parents were there. So I am 'yobiyose'.
- speaker: Interviewer
  text: When did you come to Cortez?
- speaker: Respondent
  text: It was 1933. I came here in October and was married in December.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: My name is Mrs. Haruko Narita. I was born in Miye Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1914.
- speaker: Interviewer
  text: When did you come over here?
- speaker: Respondent
  text: I was 10 months old when I was brought to the U.S.A.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: He was farming in Fremont.
- speaker: Interviewer
  text: Then he came to Cortez.
- speaker: Respondent
  text: Yes, in 1919. I think it was in December.
- speaker: Interviewer
  text: Then you met your husband here.
- speaker: Respondent
  text: Well, my husband came here later. My wife's father was really a pioneer. You see, her family were all girls, except
    her father, of course. Their neighbor asked me one day if I would like to move up here to help the family. So I decided
    to come up here and I got married to Haruko. Until then I was farming in Fremont. I was working in ranches.
- speaker: Interviewer
  text: Now that I got to know all of you, I would like to ask you all kinds of questions. Things like precise dates were
    not that important. I am interested in your experiences and things happened in the past. What I like to know is your experiences,
    joyous, sad, tragic, and all these things which affected your life very deeply. I am going to record them and translate
    them and make them available for Sansei and Yonsei. So I would like you to tell me as much as you can, as informally as
    you wish.
- speaker: Respondent
  text: A few minutes ago someone said that Cortez was started by 11 families.
- speaker: Interviewer
  text: Do you remember who they were?
- speaker: Respondent
  text: They were Kubo's, Grandpa Kajioka and his sons, Murofuji's, Naritas, Yuges, Kuwahara's, Nakamura's.
- speaker: Interviewer
  text: What was the reason why they came to settle in Cortez?
- speaker: Respondent
  text: You see we were in Watsonville and Hollister a few years before we came here. Anyway he always said, 'If we work with
    lettuce and strawberries all the time, we have to move around. When children become school age, they must change schools
    all over the place. One month in this school and next month that school. We don't make much money now. Even if we have
    to work harder, we will do so to save money and settle down in some place so that we can send kids to school to the same
    school all the year around.' This was my husband's wish. That's why we came here and settled down.
- speaker: Respondent
  text: Well, it was alright to come here, but it was very hard. The only thing which kept us going was our wine grapes. When
    spring came, we planted onions and strawberries and all kinds of things.
- speaker: Interviewer
  text: You know that Livingston was started as a colony. Was it the same with Cortez?
- speaker: Respondent
  text: There was no relationship between Livingston and Cortez. Though it was through different procedures, both groups were
    promoted by Mr. Abiko and Mr. Shimanouchi. Mr. Shimanouchi was a newspaper writer. My husband used to know him well.
- speaker: Respondent
  text: Well, by the time we came here Livingston Colony was already in progress. Livingston Colony was started in 1913, so
    we got started 6 years behind.
- speaker: Interviewer
  text: The World War I was in 1918, wasn't it? When you got started here, America was in a good economic condition.
- speaker: Respondent
  text: When they (Japanese farmers in Cortez) came here they had a little money. You see they made money during the war,
    and that's why they were able to buy land here. Though I was not here in the beginning, I heard many stories about this.
    These people who made money during the war did not go back to Japan. Instead, they were advised by Mr. Abiko to buy land
    in Cortez-Livingston Area. So they came here, instead of going back to Japan. There were those who did go back to Japan.
    But people here are those who wanted to settle down and send kids to the same school, so that they did not have to keep
    changing schools every year. Kids would have to change schools every so often if you were share-croppers. So they bought
    their own land here and settled down.
- speaker: Respondent
  text: However, when they came here and settled down, they faced Depression. It was the time when they were ready to produce
    grapes. It took just about that long to cultivate this wilderness.
- speaker: Interviewer
  text: What happened during the time of Depression?
- speaker: Respondent
  text: We grew strawberries, eggplants, vegetables, as much as we could, as far as water could reach. We had grapes, but
    we had to live till grapes were ready. So we had to have these vegetables and others which grew fast. You see, when we
    bought the land, we could not pay it off all at once. We had to make payments every month.
- speaker: Respondent
  text: We took a mortgage. But before we could pay it all off, we had to go to Fresno and make new contract to extend the
    mortgage. My father had to go down there 3 times to change the contract.
- speaker: Respondent
  text: Mr. Yoneyama, Mr. Yoshida, and my father-in-law had to go down to Fresno many more times than that. You see, I came
    here 13 years after the colony was established and they were still struggling with the same mortgage. It was 7% and was
    very expensive. We could not pay the principal. We had to pay interest on the interest. So it was very difficult. It was
    the time of President Hoover, and the time of prohibition. So we could not sell wine grapes. That's why it was very difficult.
- speaker: Respondent
  text: On top of that we could not sell anything. For example, Mr. Kono sold grapes for juice, but he could not collect money
    from the company. Early that year, some of the grapes froze, so people brought something to eat for us. But by the end
    of the year those people who tried to help us earlier had to be helped.
- speaker: Respondent
  text: We had to cut off ripe grapes in order to trim the vines. We also sent grapes to the East, but they could not sell
    them either. So they charged us $400 to dump them. We really suffered a lot to pay this $400 off.
- speaker: Interviewer
  text: Why is it that you had to pay $400?
- speaker: Respondent
  text: Well, you know, we were asking them to sell grapes for us. So when the grapes were not sold, we had to pay for the
    shipping and dumping costs. It was the same story with everyone around here. The time was 1930, 31, and 32. Banks were
    closed and money could not be withdrawn.
- speaker: Interviewer
  text: I would like to go back a bit. You could not buy land could you?
- speaker: Respondent
  text: Well, the late Mr. Calding, a lawyer made a suggestion that if we buy a land in the name of Nisei children then it
    was possible for us to buy land. Nisei were citizens and they had a right to do so. So each family became a corporation
    and each children owned stocks of the family land, and parents were workers for them. We had to show these things on the
    paper. They say there were loopholes in law and this family corporation was legally acceptable. So that's how we were
    able to buy land. Parents were just consultants and caretakers.
- speaker: Interviewer
  text: When you came back from the camp, a law was passed which in effect said that since Nisei were too small to earn enough
    money to buy land and in fact was bought for them by alien parents who bought the land. So it was against the spirit of
    the alien land law. So Nisei were not to inherit the land. Did you have any problems in regard to this law? It must have
    taken place around 1948 years in San Diego. One Nisei owned land was being taken away from him. Do you remember anything
    like that?
- speaker: Respondent
  text: Yes. I kind of remember that. It was a test case. It also happened to Fujita brothers in Petaluma. They won the case
    though. Their parents bought the land in their name. Fortunately they won the case. So there was no more problem afterwards.
- speaker: Interviewer
  text: You must suffer a lot before the depression, about the time you began to cultivate Cortez. What do you remember most?
- speaker: Respondent
  text: I remember the year when my father died. It was 1931. In the fall grapevine must be trimmed and we had to cut off
    ripe grapes from the vine. I remember that well. It was so tragic, because we lost our father that year. I was the first
    of 7 girls. I had to quit going high school because I had to help my mother. I was 2nd year in high school. The other
    girls were able to graduate from high schools. It was a very difficult year for us. We could not sell even half of grapes
    the year after. The rest were wasted.
- speaker: Interviewer
  text: You must feel really bad about the fact that you had to quit school.
- speaker: Respondent
  text: Oh yes. But we had to eat before we were able to go to school.
- speaker: Interviewer
  text: Your father passed away leaving wife and 7 daughters.
- speaker: Interviewer
  text: How were you able to make living?
- speaker: Respondent
  text: Well, even if we were girls, we all worked in the field, worked with a horse and plowed the soil. We did everything
    that man did.
- speaker: Respondent
  text: Well, they did everything, got a horse ready to plow, made ditches to draw water. I came here two years after her
    father died. It was a sandy land and even if I pulled a horse and plow to make ditches, the small banks collapsed. On
    top of that it was very hot.
- speaker: Respondent
  text: My husband came from a very cool place, so it was very hard for him.
- speaker: Respondent
  text: During the summer I used to have a towel around my neck. I could not eat lunch because it was so hot. However, I came
    here during winter, so I got used to it gradually. I was in Alameda County, and it was a very cool place. I did not know
    what it means to be in a hot weather there. It never went up over 80°. But here it was over 100°. We used to use 8 - 10
    inch pipes to lead water. They got so hot and even if I handled them with gloves, I burned my hand.
