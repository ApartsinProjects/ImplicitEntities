collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name at first.
- speaker: Respondent
  text: It is Hikozo Kawasaki.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Kumamoto.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I am 93 now, born on February 28.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: He was a farmer.
- speaker: Interviewer
  text: What did he grow?
- speaker: Respondent
  text: He grew rice.
- speaker: Interviewer
  text: How much land did he own?
- speaker: Respondent
  text: I heard that he inherited 7 to 8 chobu from his father, but when I left there he had only about 4 chobu.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He was a farmer, but when he was young he was a soldier and farmed on the side. If there was a war he went to war
    carrying a rifle.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: She was a doctor's daughter but she died when I was 4 years old, and a stepmother came. I did not like school. My
    real mother would have scolded me and sent me to school, but my stepmother didn't, so I went to school only up to 6th
    grade.
- speaker: Interviewer
  text: Did you ever miss your real mother?
- speaker: Respondent
  text: Of course I did. I was only 4 years old, so I missed her very much. It is pitiful not to have a mother.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: A sister and an older brother.
- speaker: Interviewer
  text: Were there any children of your stepmother?
- speaker: Respondent
  text: He succeeded the family. My brother became a teacher after graduating from school. I left home when I was 18 and went
    to school for a while.
- speaker: Interviewer
  text: What did you do after finishing the 6th grade?
- speaker: Respondent
  text: I helped my father farm. When I was 18 I decided to study as I could not even read a newspaper. I worked at school
    during the day and studied at night.
- speaker: Interviewer
  text: What kind of a school was it?
- speaker: Respondent
  text: It was an agricultural school. I worked there in the daytime as I was better than teachers in practical training.
    I studied under the dormitory master at night.
- speaker: Interviewer
  text: You told me before that you started working when you were 12 years old, didn't you?
- speaker: Respondent
  text: Yes, I started working in the field since I was 12. When I was in the 6th grade my brother asked me who I think should
    farm, he or I. I told him that he should go to school, and I would farm.
- speaker: Interviewer
  text: Didn't you want to go to school?
- speaker: Respondent
  text: I didn't like school.
- speaker: Interviewer
  text: What kind of fun did you have when you were little?
- speaker: Respondent
  text: Festivals were fun.
- speaker: Interviewer
  text: Did you have any sad memories?
- speaker: Respondent
  text: I didn't have any sad memories as I was a boy.
- speaker: Interviewer
  text: Did you get along well with your stepmother?
- speaker: Respondent
  text: She took good care of me. I was farming, but as I grew older I thought I should study, so I ran away from home. When
    my brother came to the city he told me to go home, but I told him that I wanted to live my own life so I would not go
    home.
- speaker: Interviewer
  text: Was your father the only man at home?
- speaker: Respondent
  text: He had two hired men and one woman.
- speaker: Interviewer
  text: Were there only two sons?
- speaker: Respondent
  text: One was born later. That is why I left home.
- speaker: Interviewer
  text: Was he your stepmother's son?
- speaker: Respondent
  text: Yes, a boy was born to my stepmother, so I left home as I didn't want to bother her.
- speaker: Interviewer
  text: Were you supposed to be the heir?
- speaker: Respondent
  text: No, I had an older brother, who was attending a school. As I didn't learn well they did not encourage me. I had a
    hard time.
- speaker: Interviewer
  text: What was hard? About what time did you get up in the morning?
- speaker: Respondent
  text: In Japan we got up at daybreak. In those days farmers had hard times as tax was high, and we had not recovered from
    the damage of the Ten Year War. It was the same everywhere. Other people who came to America told me that they came here
    because it was too hard to make a living there.
- speaker: Interviewer
  text: Did you go to work after you finished the 6th grade?
- speaker: Respondent
  text: Yes, I worked very hard.
- speaker: Interviewer
  text: How about night time?
- speaker: Respondent
  text: It was easy in summer. We worked till it got dark. In winter we went to woods and cut down trees for firewood to be
    used all year round. All the Japanese farmers grew up doing that kind of work.
- speaker: Interviewer
  text: When did you start using horses?
- speaker: Respondent
  text: Since I was 11 years old.
- speaker: Interviewer
  text: Did you work with your father?
- speaker: Respondent
  text: Yes. My father taught me how to work. He liked my brother as he worked hard. He told him to study. My brother came
    to America after I came here. He was in Formosa for a while but he didn't do well there as he was not used to work in
    Japan. When I was in Santa Maria he came to this country.
- speaker: Interviewer
  text: Do you remember about the Ten Year War?
- speaker: Respondent
  text: I only heard about it from older people.
- speaker: Interviewer
  text: What kind of thing did you hear about it? Do you remember?
- speaker: Respondent
  text: I heard that the war of Tabaruzaka and Kanakugi was fierce, and many people died in the war. Four brothers of my relative
    went to war with Saigo Takamori and only one came home alive.
- speaker: Interviewer
  text: Were some people from Kumamoto on Saigo's side?
- speaker: Respondent
  text: Yes, many were. All my relatives were on Saigo's side except my father and his brother. They all took swords and rifles
    when they left for war.
- speaker: Interviewer
  text: I thought Saigo did not like people from Kumamoto.
- speaker: Respondent
  text: No, if he didn't like them he wouldn't have them join him. My wife's father was 16 when he went to war. When the war
    was over he was not beheaded as he was only 16 years old.
- speaker: Interviewer
  text: Did everybody like Saigo?
- speaker: Respondent
  text: Yes, they did. All the soldiers were on Saigo's side.
- speaker: Interviewer
  text: How did you happen to come to America?
- speaker: Respondent
  text: I thought it was no use staying in Japan. I was working at school then, so I asked the principal where I should go.
    He told me to go to America, so I came here.
- speaker: Interviewer
  text: Was the school in Kumamoto City?
- speaker: Interviewer
  text: Was it a private school?
- speaker: Respondent
  text: No, it was a prefectural school. I was not a student. I worked there. I got up early in the morning and took care
    of horses and cows and milked the cows. I received salary after 6 months.
- speaker: Interviewer
  text: How long did you stay at the school?
- speaker: Respondent
  text: I think I stayed there for about a year and a half.
- speaker: Interviewer
  text: How old were you when you came to America?
- speaker: Respondent
  text: I think I was 21 years old.
- speaker: Interviewer
  text: What year was it then?
- speaker: Respondent
  text: It was November 1899.
- speaker: Interviewer
  text: Where did you land?
- speaker: Respondent
  text: I landed in Canada and then came to Sacramento by train.
- speaker: Interviewer
  text: Did your parents say anything when you left Japan?
- speaker: Respondent
  text: They told me to go, and gave me some money. They told me that I would not have been any good staying in Japan, so
    leave soon.
- speaker: Interviewer
  text: Where did the ship sail from?
- speaker: Respondent
  text: From Kobe. It was an old ship.
- speaker: Interviewer
  text: Did the ship stop at Tokyo?
- speaker: Respondent
  text: No, it stopped at Yokohama. It stopped there 2 or 3 nights so we went ashore to have dinner.
- speaker: Interviewer
  text: Did you go straight to Canada from there?
- speaker: Interviewer
  text: Did they give you a physical examination in Canada?
- speaker: Respondent
  text: Not much, just eyes. Then they asked me where I was going, so I told them that I was going to America. Then they stamped
    my passport.
- speaker: Interviewer
  text: Wasn't there any strict examination when you came here?
- speaker: Respondent
  text: No, there wasn't. They helped us if we had legal passports.
- speaker: Interviewer
  text: Was the passport issued without any trouble in Japan?
- speaker: Respondent
  text: It was issued at once as I had a certificate from school. If I didn't have it I couldn't have come here. Around 1900
    Japanese could go to Hawaii easily, but could not come to America.
- speaker: Interviewer
  text: What did you give as the reason for coming to America?
- speaker: Respondent
  text: I was at school, so a teacher wrote a letter for me.
- speaker: Interviewer
  text: Did you come here as a student?
- speaker: Respondent
  text: I came as a researcher for the agricultural school.
- speaker: Interviewer
  text: You came here early for a Japanese, didn't you?
- speaker: Respondent
  text: Yes, but there were people who came before me. In those days we could come here if we knew someone who were here already
    and send for us, but if we didn't know anybody here it was hard to come here. Around 1900 many Japanese moved from Hawaii,
    but it was stopped not long after that.
- speaker: Interviewer
  text: What kind of people were on board the ship?
- speaker: Respondent
  text: It was a British ship. There were some people who were coming back to America for the second time bringing a few students
    with them. There were altogether 12 or 13 people on board.
- speaker: Interviewer
  text: Do you remember any names?
- speaker: Respondent
  text: I forgot. I just remember one name. A man named Tamekichi Nishiyama was working as a policeman in Canada, so I only
    remember his name. When I told a friend at Tacoma that I was on the same ship with a man named Tamekichi Nishiyama, he
    said that he was from the same village.
- speaker: Interviewer
  text: What kind of a country did you think America was?
- speaker: Respondent
  text: I thought it was a good place as people save money and send them home.
- speaker: Interviewer
  text: How did you feel when you arrived in Canada?
- speaker: Respondent
  text: I thought it was a nice place. At that time the British consul told me that he would give me land, but I could not
    do anything without money. He told me that he would give me financial help, but I didn't know anything, so I left there.
- speaker: Interviewer
  text: Didn't you want to stay in Canada?
- speaker: Respondent
  text: No, it was too cold. I needed the money, and I had to develop the land so I didn't stay there.
- speaker: Interviewer
  text: How long did you stay in Canada?
- speaker: Respondent
  text: I stayed there for about a week.
- speaker: Interviewer
  text: Did you go sight-seeing?
- speaker: Respondent
  text: No, I didn't. I just went to see a sawmill.
- speaker: Interviewer
  text: Were there many Japanese?
- speaker: Respondent
  text: Many Japanese were working at the sawmill.
- speaker: Interviewer
  text: Did you come here without knowing anybody here?
- speaker: Respondent
  text: I didn't know anybody.
- speaker: Interviewer
  text: Who took care of you in Canada?
- speaker: Interviewer
  text: Could you find your way around?
- speaker: Respondent
  text: No, but people from a Japanese hotel picked me up and took good care of me. People were very kind in those days. There
    was only one Japanese hotel in Victoria then. I think his name was Ozawa. I was surprised when I went there the year before
    last. It has become a big city.
- speaker: Interviewer
  text: Was Victoria a small town then?
- speaker: Interviewer
  text: Did you come to Sacramento by train?
- speaker: Respondent
  text: I came to Sacramento by train. People from Hiroshima were here.
- speaker: Interviewer
  text: Did you come to Sacramento because people who came on the same ship with you came to Sacramento?
- speaker: Respondent
  text: They came here before me. I stayed in Canada for a while. We had a difficult time on the train as we did not know
    English. We could not eat, so an American bought bread and other food and gave us. We wanted to pay him but he did not
    take the money.
- speaker: Interviewer
  text: How long did it take by train?
- speaker: Respondent
  text: I think it took one or two nights.
- speaker: Interviewer
  text: What other difficulties did you have?
- speaker: Respondent
  text: I didn't have any difficulty since I came here.
- speaker: Interviewer
  text: Was language the only difficulty?
- speaker: Respondent
  text: That was the only difficulty. After we came to Sacramento we stayed near a man from Kumamoto who had a barber shop.
    There was a man named Matsumoto who was farming in Delta district. I stayed there for about a week, and then went to Guadalupe
    and stayed there for 7 years.
- speaker: Interviewer
  text: Why did you go to Santa Maria?
- speaker: Respondent
  text: Because my friend's relatives were there.
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: I grew sugar beets. I went there two years ago and found out that everyone has passed away. Rev. Futaba, a Buddhist
    priest took me to the cemetery. I was surprised to find about ten of my friends buried there.
- speaker: Interviewer
  text: Did you live in Guadalupe for 6 years?
- speaker: Respondent
  text: Yes. I raised sugar beets there for 8 years.
- speaker: Interviewer
  text: Whom did you work for?
- speaker: Respondent
  text: Mr. Hagiya. Then I moved to Santa Maria as my friends were there. I made friends with a few people from Kagoshima
    there.
- speaker: Interviewer
  text: How was the life in Santa Maria then? Was everybody single?
- speaker: Respondent
  text: Yes, everybody was single. Married men were quite old.
- speaker: Interviewer
  text: Were you around 27 or 28 then?
- speaker: Respondent
  text: Yes. I was around 26 or 27 when I was in Santa Maria.
- speaker: Interviewer
  text: How was the relationship with the white people?
- speaker: Respondent
  text: It was not bad.
- speaker: Interviewer
  text: Were they friendly with you?
- speaker: Respondent
  text: Yes, they were. When I went to get a job the wife asked, then she would tell me where to go.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: '"Trabajo" means work. "Comero" means to eat. She asked me if I wanted a job or I wanted to eat.'
- speaker: Interviewer
  text: Is that Spanish?
- speaker: Respondent
  text: I think she was Spanish. They were good to me. When we didn't have sugar beets work after June, they used to give
    me a job of hoeing. They were good to me.
- speaker: Interviewer
  text: Were you single then?
- speaker: Respondent
  text: There were no married men then.
- speaker: Interviewer
  text: What else do you remember about those days?
- speaker: Respondent
  text: It was good that I had many friends.
- speaker: Interviewer
  text: Weren't you lonesome?
- speaker: Respondent
  text: I wasn't lonesome at all. I had a good time. In those days a few people from Kagoshima were working at the sugar beets
    ranch at the season, and when I went there they used to invite me to dinner.
- speaker: Interviewer
  text: What kind of recreation did you have then?
- speaker: Respondent
  text: We used to go out after work and gambled or played billiard. There wasn't anything else to do.
- speaker: Interviewer
  text: Were there many Japanese there?
- speaker: Respondent
  text: Yes, there were. On the other side of Santa Maria was Mr. Hirokawa from Hiroshima, and Mr. Asano from Okayama. At
    Buna was Mr. Tanaka from Hiroshima. He wasn't there any more when I went back there.
- speaker: Interviewer
  text: What kind of place did you sleep at?
- speaker: Respondent
  text: I slept in the camp.
- speaker: Interviewer
  text: Did you live in a camp?
- speaker: Interviewer
  text: Did they find a job for you in the camp?
- speaker: Respondent
  text: Mr. Hagiya gave us subcontract in sugar beets. If 30 people had a subcontract of 7,000 acres, each person had quite
    a bit. The boss of the camp took his share first, and then divided the rest to everybody. We had a contract of so much
    for each acre. When we figure how much for thinning and how much for hoeing we have some money left over. The boss took
    the commission and gave us the rest.
- speaker: Interviewer
  text: Did you have your meals in camp?
- speaker: Respondent
  text: Yes, they had hired people to cook for us.
- speaker: Interviewer
  text: Was the food good?
- speaker: Respondent
  text: Yes, it was good. People who worked for the railroad before used to say that our miso (bean paste) tasted good.
- speaker: Interviewer
  text: I heard that those who worked on railroad had a hard time.
- speaker: Respondent
  text: Yes, they did. Food was good at our camp.
- speaker: Interviewer
  text: Maybe because there were many Japanese.
- speaker: Respondent
  text: It was really good. We could not have worked on sugar beets eating poor food. Everybody was raising chicken outside
    Santa Maria, so they bought chicken by a truckload, and bought eggs by a case at a time. That is why our food was good.
- speaker: Interviewer
  text: What time did you start working in the morning?
- speaker: Respondent
  text: From 6 o'clock. We worked from 6 o'clock in the morning till 6 o'clock in the evening. When we did the irrigation
    we worked 24 hours a day without sleep. We worked hard.
- speaker: Interviewer
  text: Did you do that for 6 years?
- speaker: Respondent
  text: For 8 years.
- speaker: Interviewer
  text: How could your body take so much work?
- speaker: Respondent
  text: It couldn't, especially irrigation. I did it all the while I worked there. They needed someone who knew well about
    it as it was dangerous. We got scolded if we let the water overflow. There was no gravel on the road, so in summertime
    when cars sped by, the dirt flew all over the place. The buses between Santa Maria and Guadalupe passed by every day.
