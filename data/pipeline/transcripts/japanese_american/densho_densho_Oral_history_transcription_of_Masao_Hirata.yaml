collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name.
- speaker: Respondent
  text: My name is Masao Hirata.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: $284 Toshine-Mura Iwano, Shimomashi-Gun in Kumamoto Prefecture. I was a commoner.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on the 31st of May in Meiji 36.
- speaker: Interviewer
  text: Do you remember the big events which happened in Japan, such as the Sino-Japanese War and World War I?
- speaker: Respondent
  text: I remember just World War I.
- speaker: Interviewer
  text: What happened at that time?
- speaker: Respondent
  text: Some songs were sung about the fall of the city of Chintao when Kowshu Bay was surrendered. We had the best time at
    that time.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: It was about Taishow 7 or 8, I remember, for I came to America in Taishow 9.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: Two more months and I was be seventeen years old when I came here.
- speaker: Interviewer
  text: Can you remember some happy memories in Japan?
- speaker: Respondent
  text: I remember two plays that I played in in my elementary school days. One was Daiku Yoigeki, which was played when I
    was in the third grade. The other was Faithful Lieutenant Hirose, played when I was in the fourth grade. They were my
    happy memories. Then my mother died of an infectious disease. It happened when I was in the fourth grade, so I had a hard
    time graduating from elementary school, working as a baby-sitter and at various tasks. That was the beginning of my hardships.
- speaker: Interviewer
  text: What kind of hardships have you experienced?
- speaker: Respondent
  text: My father was in America when I was born. Then my mother died when I was in the fourth grade, so I had to live with
    my grandparents. As soon as I graduated from elementary school, I was sent to a family as a live-in baby-sitter. After
    the child of the family died, I did farm work. I got paid only eight yen a year. At that time one big sack of millet cost
    two yen, and 18,000 cc (4.756 gallons) of rice cost four yen. I worked for a year and got two sacks of millet and 18,000
    cc of rice.
- speaker: Interviewer
  text: Were you the only child in the family?
- speaker: Respondent
  text: Yes, I was. There was a girl living with us. She was a daughter of my uncle. Since my father was in America, my uncle
    and his daughter were living with us.
- speaker: Interviewer
  text: What do you remember about your mother?
- speaker: Respondent
  text: She used to go to her parent's house, since her husband was away in America. Well, one memory about her was on the
    wedding day of my aunt. I was in the second or third grade and very little. I fretted for my mother. Then my mother bound
    me to a big pala with a thick cord, scolding.
- speaker: Interviewer
  text: Do you remember anything about what your mother said to you?
- speaker: Respondent
  text: I don't remember so well.
- speaker: Interviewer
  text: What do you remember about your school days?
- speaker: Respondent
  text: When I was in the third grade, the teacher, named Motomura, who was a woman, told us a story about iridescent insects
    during lunch time.
- speaker: Interviewer
  text: What was the story of the insect?
- speaker: Respondent
  text: 'I don''t remember so well, but something like this: although the insect is pretty outside, it is not, actually.'
- speaker: Interviewer
  text: Was that something moral?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Do you remember about the teachers you had?
- speaker: Respondent
  text: Yes, I do. When I was in the first and second grade, Mr. Funabara, who was a Shinto priest, was my teacher. Then in
    the third grade, I had a woman teacher, Kimi Motomura, who told us a lot of stories. Mr. Yoshitake was my fourth grade
    teacher. In the fifth and sixth grades, Mr. Shohei Imazu, who was an assistant principal, was my teacher.
- speaker: Interviewer
  text: Were they strict?
- speaker: Respondent
  text: No, I didn't have many strict teachers. But they were stricter than the teachers now.
- speaker: Interviewer
  text: What do you remember about your school life?
- speaker: Respondent
  text: We had athletic meetings and literally every year. To me, the athletic meetings were the most pleasant and memorable.
- speaker: Interviewer
  text: How about sad memories?
- speaker: Respondent
  text: After my mother's death, I sometimes couldn't go to school, because I had to baby-sit. Sometimes I went to school
    with the baby on my back. But I had to go back home because it interrupted my study. It was sad for me to think that I
    couldn't study very much while everyone else in the class could.
- speaker: Interviewer
  text: Was that when you were in the fourth grade?
- speaker: Respondent
  text: Yes, it was in the fourth, fifth and sixth grades that I had to baby-sit. After my mother's death, my grandmother
    started to go to work, so I was the only person that was able to baby-sit.
- speaker: Interviewer
  text: How long did you work at your uncle's home after your babysitting?
- speaker: Respondent
  text: I worked as a baby-sitter there for one year. When I was fifteen years old, I stayed home and helped with housework.
    Then I went to work when I was sixteen years old, and got paid 36 yen a year, which was 10 sen (1 yen equals 100 sen)
    a day. Then I returned home to help the family. And I found myself to be already eighteen years old. I thought that spending
    my life in that way helping the family was dull and meaningless and that I had to do something for it. My mother's brother
    was a deputy mayor of a town office, and he said to me one day, "Masao, you are now eighteen years old. Since your father
    is in America, why don't you ask him to send you to America? If it's impossible, how about going to Brazil, where my youngest
    brother is?" It happened to be the time when World War I was over and the people in America began to come back to Japan.
    There was a man among them that was with my father in America. He said to me, "Oh, yes. I know him and have his address.
    Write him a letter." And I did. I said to him in the letter, "I am now eighteen years old. Though I haven't met you yet,
    please read this letter if you think me your son. If you don't read this, I would not think you my father, and will go
    to Brazil or somewhere else." Then he sent me 200 dollars, which was worth 400 yen at that time. Fifty dollars from among
    the money was for showing the American Immigration Office, and it cost ninety-four yen to go to America by boat.
- speaker: Interviewer
  text: Hadn't your father written any letters to Japan before that?
- speaker: Respondent
  text: No, he hadn't. Since my mother died, I think he tried to get some money in a hurry. But he couldn't. Since he didn't
    write to me, I couldn't write, either, because of no mailing address. Since my father moved here and there to get work,
    he couldn't write.
- speaker: Interviewer
  text: How long had he been in America by then?
- speaker: Respondent
  text: He had been there for eighteen years. He came to America the year I was born.
- speaker: Interviewer
  text: Did you think that your father was unreasonable?
- speaker: Respondent
  text: Yes, I thought he was a cruel man. He didn't let his son go to school, and his son was alone without his mother. It
    was natural for me to think what a bad father he was.
- speaker: Interviewer
  text: Anyway, did you decide to come to America?
- speaker: Respondent
  text: Yes, I did. My father took proceedings for my immigration. As a reasoning for my immigration, he wrote on a paper
    that he needed a worker for the vineyard which he owned with his friend Mr. Katsuichi Kameyama. So I came here.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: I came in 1920. I came to America with a boat from Nagasaki on the 24th of July, 1920. The boat dropped in Kobe, Shimizu,
    and Yokohama. It left Yokohama on the 27th of July and arrived in San Francisco via Hawaii on the 13th of August. The
    name of the boat was Kurea-Maru of the Toyo Steamship Company. There was my father to meet me. It was the first meeting
    between father and son.
- speaker: Interviewer
  text: How was it?
- speaker: Respondent
  text: Well, I was able to recognize him as my father, for I had seen his pictures. But I didn't feel a real emotion for
    him that he was my father. I rather had dearer feeling for my uncle. Because I was already 18 years old and had been with
    him for all these years. My father bought me a suit and a suitcase, and we stayed the night in San Francisco. We left
    San Francisco on the 14th of August and the next morning we got to Del Ray in Fresno. Surprisingly enough, it was so hot
    in Fresno, being over 105°, while it was cold in San Francisco even in August. I would never forget this experience. Then
    on the 20th of that month, I started to work, picking up grapes. Dozens of people came into a camp to pick up grapes,
    but there were no houses for us to live in. We had to make our bed by ourselves. We piled up the boxes for raisins two
    stories high under a peach tree, put some hay on the boxes, and covered it with a canvas. This was the bed for us. When
    we slept, we hung up a mosquito net, whose one side was hung from a branch of the peach tree and the other side from a
    stick we drove into the ground. Picking grapes was my first job in America.
- speaker: Interviewer
  text: Were you glad to come to America?
- speaker: Respondent
  text: I worked very hard from early morning when it was still dark to late evening after dark, and got fifteen or sixteen
    dollars a day since times were the best in 1920. This amount of money was worth twice as much in Japan. Just imagine that
    I got paid thirty-six yen a year in Japan working hard. Of course they got paid one yen a day if they worked on road construction,
    thirty yen a month. So I worked very hard there with my father.
- speaker: Interviewer
  text: How much did you get a day?
- speaker: Respondent
  text: They paid us 3.9 to 4 cents per tray, so if we worked very hard, we got fifteen to sixteen dollars a day. That was
    the same amount of money as we worked for a month in Japan. The main purpose for us to come to America was to earn money,
    so we worked very hard. I injured my right knee and became unable to bend it, because I worked too hard. So I had to have
    another hard time to cure it, being punctured with a needle.
- speaker: Interviewer
  text: Did anything sad or happy happen to you there?
- speaker: Respondent
  text: Nothing happened. Just nothing except my time like mad. I didn't know English or anything about America at all. Getting
    up early in the morning, I got lunch and a bagful of water. Then I went to a place where trucks were. Sometimes the people
    from the vineyard came to pick me up. And I worked and worked. That was everything. There was nothing else besides working.
    The work was really hard. After the period of picking grapes was over, I asked my father to let me go to school. I was
    going to study as a school boy. But it was very difficult to be a school boy because I was unable to understand any English
    at all. So I entered a boarding school of the Buddhist Society in Fresno in October of that year and stayed there until
    June the next year. At that time it cost only 250 dollars a year for going to school. Since I was eager to go to school,
    I worked very hard during the summer vacation to save money for the school. My father went for work to Enkyo Valley to
    pick cucumbers, but he didn't seem like coming back though the school was about to start. I didn't understand why, because
    he didn't write to me. He usually came back to Fresno by the end of August when the season of picking grapes started.
    But he didn't come back even when September came. I was worried. Then I received news that he was unable to come back
    because of illness and no money to come back. I was shocked. He was my only parent. How could I go to school, leaving
    my sick father alone? At once I sent the 250 dollar check, which was for my tuition, to my father in Arizona. He finally
    came back and thanked me with tears.
- speaker: Respondent
  text: We thought that it was not good for us to remain unsettled picking grapes, so we started farming together. Then came
    the time of depression. The price of grapes dropped from fifteen cents to two cents per pound. In 1923, anti-Japanese
    laws such as banning the inheritance of land and the Japanese immigration were legislated. That was the same time that
    the big earthquake in Tokyo happened. So I decided not to do farming against the law and came here to Los Angeles in 1924.
    There was a pastor named Rev. Katsuhiro Iseri who was one of my father's friends. His younger brother graduated from Stanford
    University, couldn't find a job here and was going back to Japan. I was invited to the farewell party for him at this
    church. And this was the first time for me to come across the church, of which I became a member of later. I believe now
    that God led me here to become a Christian.
- speaker: Interviewer
  text: What did you do in Los Angeles?
- speaker: Respondent
  text: First, I worked on a strawberry farm of my friend's elder brother in Torrance, picking strawberries. Mr. Tohru Maeda
    was the name of the friend who used to live in the same town in Japan and came to America with me. Later, I grew strawberries.
    In 1929 I got married and had my first daughter in 1930. In 1931, Dr. Tashiro asked me to reclaim the 40 acre land in
    Cotura Valley which he bought. I didn't want to go to Fresno where it was hot. But he insisted on my reclamation of the
    land. He said that he was going to grow grapefruits on 30 acres of the land and that I could use the rest of the 10 acres
    free for three years. I couldn't refuse him, because he asked me so earnestly, and I went there. In 1939, the year the
    Olympics were held in Los Angeles, twin sons were born. I was working in Fresno taking care of my two year old daughter,
    while my wife was in Los Angeles. Then I received a call from Los Angeles that my wife had an operation in a hospital
    and twin sons were born. At once I had to return all the way to Los Angeles with my little daughter. Then the second daughter
    was born, next the third daughter, the third son, and the fourth son were born. Unfortunately, we lost our fourth son.
    We had a hard time bringing up all the children. The next hardship waiting for us was the outbreak of World War II.
- speaker: Interviewer
  text: Was your wife living in Los Angeles before the war broke out?
- speaker: Respondent
  text: Yes. In Fresno we couldn't get good doctors, and Dr. Tashiro suggested that she stay in Los Angeles. So I left her
    in her parent's house.
