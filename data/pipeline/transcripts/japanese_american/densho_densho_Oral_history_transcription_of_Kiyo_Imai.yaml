collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I went everywhere. I was born in Ibaragi Prefecture, but stayed there till I was 4 years old. As my father received
    assignment to different places we went to Yamanashi where we stayed the longest, then to Shizuoka and Nagano and finally
    to Chiba, where he retired.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1891.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I am 86 years old now.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He was not too strict nor too loose. He was an old Methodist, so another he was a righteous man. When we were in Yamanashi
    there was another church about 25 miles away, and he had to go there once a week. It was very cold in Yamanashi in winter.
    After the service he used to walk home in the snow and came home around 1 or 2 o'clock in the morning. I saw my father's
    devotion when I was young, I wanted to become an evangelist, and I attended a theological seminary.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: My mother was born in Ibaragi Prefecture, also, and was a friend of my father since grammar school days, so they were
    married. Mother came from a rich family but she did not have much education. She only had 8 years of schooling, but she
    brought us up in the poverty helping our father.
- speaker: Interviewer
  text: Was your father a pastor when he got married?
- speaker: Respondent
  text: No, he was not a pastor yet. He wanted to become a physician but did not have enough money, so he worked as a newspaperman
    in Tokyo. In the meantime a Canadian missionary, Dr. McDonald came to Tokyo and my father was introduced to Christianity
    and became a Christian. Later he decided to become a pastor, and went to a theological seminary in Tokyo. When I was 2
    or 3 years old I was baptized by Dr. McDonald.
- speaker: Interviewer
  text: What do you remember about your family when you were a child?
- speaker: Respondent
  text: He was a strict Methodist, so we had worship service before each meal. My father read the Bible, then he prayed, mother
    prayed and sometimes children prayed before we had meals.
- speaker: Interviewer
  text: Have you ever been scolded by your father?
- speaker: Respondent
  text: He was strict, so he scolded us. I remember when I was in grammar school in Nagano Prefecture I complained about my
    lunch one day. Father became angry and threw the lunch box down from upstairs. I still remember that. He never laid hands
    on us.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were 8 of us counting the ones already deceased. As the pastor had very little income we did not have enough
    nourishment, so the children died one after another of tuberculosis. First my older sister died of T.B. when she was 15
    years old. Then my younger sister died just before she graduated from high school. My younger brother who went to a school
    in Chicago after almost graduating from college in Japan also died of T.B. My youngest brother, also, died of T.B. In
    those days the pastor was so poor that we didn't have enough money to buy rice for the next day. It is not like pastors
    now who have good income. My younger brother who retired in Tokyo recently after about 40 years of service, and I are
    the only ones alive.
- speaker: Interviewer
  text: I am surprised your mother who was brought up in a rich family could stand the life of poverty.
- speaker: Respondent
  text: She came from a rich family. As I told you before, my father wanted to become a physician, but his father could not
    afford to send him to school. My grandfather was a son of a rich man and served as a mayor, but he lost his fortune in
    land or something so he could not send my father to college. My father was working as a newspaperman when he was led to
    Christianity by Dr. McDonald and became a pastor. My mother worked hard as a pastor's wife.
- speaker: Interviewer
  text: Did you ever hear your mother complain?
- speaker: Respondent
  text: No, she never complained. She must have had some worries, but she never complained. I am very grateful to her for
    that.
- speaker: Interviewer
  text: What do you remember about your mother?
- speaker: Respondent
  text: She was a quiet woman, and did whatever my father told her to do. She was a typical Japanese wife. She was sorry she
    could not help us with the school work as she did not have much education. She had only 8th grade education, so when we
    asked something difficult she could not help us. Then she used to say she wished she had more education. She was a typical
    wife and worked hard for her husband and children. I am still grateful to her.
- speaker: Interviewer
  text: She was a gentle mother, wasn't she?
- speaker: Respondent
  text: Yes, she was a gentle mother, and did not scold us much. When I left for America she cried. I was married 3 years
    after I came to America. One year I went back to Japan with 2 oldest children, and stayed in Chiba with my mother for
    a month. She took good care of her grandchildren then. When we said good-bye before we came home she looked very sad.
    I cannot forget the sad expression on her face. That was the last time I saw her. She died not too long after that.
- speaker: Interviewer
  text: How many years did you go to grade school?
- speaker: Respondent
  text: In those days grade school was 4 years and junior high school was 4 years. After 4 years of grammar school I attended
    the Toyo Eiwa Girls' High School in Azabu, Tokyo. I was there for 4 years when my father was assigned to a church in Yamanashi
    Prefecture, so I attended a high school there and graduated it. After that I wondered whether I should become a kindergarten
    teacher or attend a seminary and become a missionary. After I prayed I decided to become a missionary and attended a Bible
    school in Yokohama and graduated from it. After I graduated from the Bible School I received my first appointment to a
    church in Nagoya and stayed there for a year. Then I received an appointment to a church in Toyohashi, and worked there
    as a church worker for 5 years. After that I was assigned to Mita Methodist Church in Tokyo. About 2 years after I started
    working there, a church in Los Angeles wanted me to come and work there as they were having much trouble with picture
    brides. Another worker named Ms. Hiraoka and I went to Los Angeles together and worked there for 1 and a half years, but
    as they did not need two women workers I went to San Francisco and worked at the present Pine Methodist Church for 2 years.
    In the meantime Imai and I were married in 1923.
- speaker: Interviewer
  text: What kind of case do you remember when you were taking care of the picture brides in Los Angeles?
- speaker: Respondent
  text: I forgot the names but young brides could not get along with old husbands, and were beaten and cried. It was very
    tragic. I went to their homes and helped them. The minister went between them and granted them divorce if they wanted.
    I worked with the minister.
- speaker: Interviewer
  text: Did some brides remarry?
- speaker: Respondent
  text: Some of them lived alone, and others married men who lived in America. In the meantime picture brides were prohibited
    by law, so those people stopped coming to America.
- speaker: Interviewer
  text: When did you come to Los Angeles?
- speaker: Interviewer
  text: What else do you remember about the picture brides?
- speaker: Respondent
  text: As you know, no new picture brides came after 1920. A year and a half later I went to San Francisco and worked at
    the present Pine Methodist Church. In those days there were many picture brides there. I lived in the Women's Home which
    was run by the Missionary Society. Many children whose parents were divorced, and picture brides lived there, so I became
    friends with them. I did not live in Los Angeles long, so I did not take care of them as much as I did in San Francisco.
    There were many unfortunate people in San Francisco.
- speaker: Interviewer
  text: What other cases were there?
- speaker: Respondent
  text: The biggest problem was the difference in ages. As husbands were old they did not get along with young wives. As the
    brides came here just by looking at photographs, they did not know what kind of men their husbands were. Men who worked
    as domestic workers or gardeners had their photographs taken in front of nice homes where they worked and sent them to
    the brides, so the brides came here thinking that their husbands were well-to-do living in big houses. That was the reason
    why they did not get along well. Some wives ran away not only in San Francisco, but one woman came to the Women's Home
    from Napa. I had a scary experience when her husband came after her to the Home.
- speaker: Interviewer
  text: What did you do when the husband came after the wife?
- speaker: Respondent
  text: It was too complicated so the pastor called the lawyer. At one time a policeman came. I think someone informed the
    police that a bad husband was coming after his wife, so the police came to protect her. I had many such scary experiences.
- speaker: Interviewer
  text: Did the police protect the wife?
- speaker: Respondent
  text: I think the head of the Home informed the police that a man was coming after his wife, and asked the police to protect
    her. The man was arrested. I don't know what happened after that. I think the man came to beat her up. In the meantime
    the picture brides stopped coming, so there was no more such work. As I told you before, there were many children of divorced
    parents in the home, but as they got older and got married they left the home.
- speaker: Interviewer
  text: Did most picture brides hold out?
- speaker: Respondent
  text: Yes, they did. They put up with their husbands. In the meantime children were born and things got better. There were
    many such cases. There was big difference in ages between the husbands and wives. Men around 50 years old married women
    around 25 years old. There were brides younger than 20. It is hardly possible that they get along well. Some women were
    married to men as old as their grandfathers. In those days men did not have much education, but most women were well-educated,
    so they did not get along well. I took care of many such brides.
- speaker: Interviewer
  text: How did you get to meet Mr. Imai?
- speaker: Respondent
  text: He came to the church in San Francisco once in a while, and we came to know each other there. Mr. Endo, a member of
    Pine Methodist Church was Imai's friend, and he introduced me to him. I was planning on returning to Japan in 3 years
    so I did not have any intention of getting married.
- speaker: Interviewer
  text: Was it a love marriage?
- speaker: Respondent
  text: I would not have married him if I didn't like him. We were married in 1923, the year of the great earthquake in Tokyo.
- speaker: Interviewer
  text: What was the difference of age between you and Mr. Imai?
- speaker: Respondent
  text: Imai was born in 1885 and I was born in 1891, so he was about 6 years older.
- speaker: Interviewer
  text: Did Rev. Imai minister in Walnut Grove?
- speaker: Respondent
  text: He went there in 1915, and married me 7 years later.
- speaker: Interviewer
  text: What kind of a place was Walnut Grove in those days?
- speaker: Respondent
  text: It was a dirty Chinese gambling town. Imai wanted to abolish gambling, so he brought the Salvation Army band and marched
    for anti-gambling. In Stockton a man was killed by gamblers. Imai took Sunday school children with him, and with a big
    banner which read, 'Anti-Gambling' marched through the Chinatown and Japantown singing hymns and other songs. He was nearly
    killed a couple of times but he was not injured much. He worked hard to abolish gambling. It is a quiet town now, but
    it was like that in those days.
- speaker: Interviewer
  text: Did you go there 7 years after he went there?
- speaker: Respondent
  text: He worked there for 15 years. I was there for only 7 years, so I went there 8 years after he got there.
- speaker: Interviewer
  text: What kind of a country did you think America was before you came here?
- speaker: Respondent
  text: I did not hear anything bad, so I thought it was a beautiful place with clean society and high standard of living.
    I came here to help someone. When I came to Los Angeles I stayed at Children's Home where unfortunate children were living.
    As there were about 3 white people taking care of them I did not work there, but I made friends with them and ate with
    them. I worked mostly at the church.
- speaker: Interviewer
  text: What else do you remember about Walnut Grove?
- speaker: Respondent
  text: Many things happened while I lived there for 7 years.
- speaker: Interviewer
  text: What kind of things happened?
- speaker: Respondent
  text: There were not many members at first, so Imai had to preach to about 3 members. Later, the number of members gradually
    increased. The happiest thing that happened there was that Dr. Akamatsu who is ill in New York now became an evangelist
    from our church. How he became an evangelist was like this. One night we gave him a farewell party before he left for
    a college in the East. That night, Mr. Nagawa, a father of a Sunday school pupil came to the party drunk. When Saburo
    Akamatsu gave a testimony saying that he decided to go to a college in the East and become an evangelist, I think Mr.
    Nagawa understood it and was moved by it. In front of many people he said in tears, 'I am very sorry I gave all of you
    and my wife much trouble by drinking. When I heard Saburo say that he decided to become an evangelist I was very sorry
    for what I have done.' He was drunk but he repented in front of all the people, and encouraged Saburo to do his best.
    Saburo was encouraged all the more and became an evangelist. That was the happiest thing that happened while we were there.
    There were also some husbands and wives who quarrelled and came to the manse all the time. We were like social workers.
    I liked that kind of work. As you have heard, Imai did not go to a seminary, so he did not have deep knowledge of the
    Bible, nor deliver fine sermons. Instead, he helped unfortunate people. He was like a social worker.
- speaker: Interviewer
  text: Did husbands and wives come to the manse when they quarrelled?
- speaker: Respondent
  text: Wives usually came crying when they were beaten up by husbands. When we asked why, we found out that there was big
    difference in ages or education. After the children are born they control themselves and do not quarrel as much. Some
    husbands and wives were divorced. My husband used to make peace between two sides. He was good at that. In 1930 he was
    appointed to come to Dinuba.
- speaker: Interviewer
  text: Were there many gambling houses in Walnut Grove?
- speaker: Respondent
  text: There are still some in Chinatown, but they are not as rough as they used to be.
- speaker: Interviewer
  text: When many Isseis were there?
- speaker: Respondent
  text: They used to go there all the time. That is why they lost all the money they earned. That was one of the reasons for
    quarrels between husbands and wives. When the men lost all the money they earned, and the wives complained about it, they
    started quarrelling. Then their children came crying, and it was miserable. No more Japanese come from Japan now, and
    only the Niseis and Sanseis are there. Walnut Grove was a special place in America. Nowadays it is not allowed by the
    law, but in those days there was a segregated school. The Blacks attended the white school while Chinese and Japanese
    attended the Oriental School. Children who went to the Oriental School were not good at English. The government does not
    allow segregated schools, so now they all go to a beautiful grade school. Children who attended the Oriental School could
    not speak English well. As we had lived in Walnut Grove for 15 years, I knew we were going to move soon. So in July I
    went to San Francisco and enrolled my oldest daughter in kindergarten. As she did not hear English in the Oriental School
    in Walnut Grove she did not understand English when she went to school in San Francisco. When her teacher said, 'Forward
    march!' she just stood there while other pupils all marched away. In September we moved to Dinuba, but she had a hard
    time in the first.
