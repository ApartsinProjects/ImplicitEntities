collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When and where were you born?
- speaker: Respondent
  text: I was born in Okayama in January, 1900.
- speaker: Interviewer
  text: Do you remember about your father and mother?
- speaker: Interviewer
  text: What kind of father was he?
- speaker: Respondent
  text: He worked at a bank.
- speaker: Interviewer
  text: Then he was a very intelligent man in those days, wasn't he?
- speaker: Respondent
  text: He never farmed.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had eight, four boys and four girls. I was the sixth from the top.
- speaker: Interviewer
  text: Did you live in the city?
- speaker: Respondent
  text: We lived in the country, but the children all went to school in the city, so it was financially difficult.
- speaker: Interviewer
  text: How much education did you have?
- speaker: Respondent
  text: I graduated from high school. I attended six years in grade school and four years in high school.
- speaker: Interviewer
  text: Was your father a gentle or a strict man?
- speaker: Respondent
  text: Like most Japanese men, he was not very friendly, but not too strict.
- speaker: Interviewer
  text: What kind of education did he have?
- speaker: Respondent
  text: Not much. One of his relatives attended Doshisha College, but he could not go there as he was the only son. That is
    why he let all his children attend schools if they wanted to.
- speaker: Interviewer
  text: What kind of mother did you have?
- speaker: Respondent
  text: She was a hard worker. She was attending a teachers' college in Okayama, but she had to quit it when she was about
    17 as she had to get married. She always regretted that she could not finish the school.
- speaker: Interviewer
  text: Was your mother very gentle or strict?
- speaker: Respondent
  text: She was normal. She scolded us but not always.
- speaker: Interviewer
  text: Was she very friendly to you?
- speaker: Respondent
  text: Yes, very much so. When the children came home on vacation, we all gathered around her. Father was not very happy
    about it but we all went to her.
- speaker: Interviewer
  text: Did you have grandparents?
- speaker: Respondent
  text: Yes, I had a grandmother. She was a very nice person, and we were influenced by her very much.
- speaker: Interviewer
  text: How were you influenced?
- speaker: Respondent
  text: She used to admonish us by using old sayings or proverbs, and quieted us when we were angry. My mother was busy with
    many children, so grandmother took care of us. She loved reading books, especially history books, and told us many stories.
    We had many books at home, so I read a lot of books since I was a child.
- speaker: Interviewer
  text: Do you remember anything that your grandmother told you?
- speaker: Respondent
  text: I forgot but she told us many fables.
- speaker: Interviewer
  text: Was she your father's mother?
- speaker: Respondent
  text: Yes, she was. She used to live with us. She liked growing flowers and giving them to other people. Some people still
    remember her kindness and tell it to my sister.
- speaker: Interviewer
  text: What kind of thing do they say?
- speaker: Respondent
  text: There was a family which lived across from our house. They lost their parents and did not have enough to eat. My grandmother
    would hide some food under her apron and took them to their house every evening. Those people are well to do now, but
    they are still grateful to my grandmother. It was too bad my mother died before grandmother died.
- speaker: Interviewer
  text: Did you get along well with your brothers?
- speaker: Respondent
  text: One died young with T.B. We quarrelled once in a while, but we were good friends.
- speaker: Interviewer
  text: What did your older brothers do?
- speaker: Respondent
  text: My oldest brother graduated from Bunka University, and worked for the Ministry of Agriculture.
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: Nakahara Shigeki. He is over 80 years old now.
- speaker: Interviewer
  text: What did your second oldest brother do?
- speaker: Respondent
  text: He worked for Mitsu Bussan after graduating from college. He used to go to Australia to buy wool. He died.
- speaker: Interviewer
  text: The third brother?
- speaker: Respondent
  text: He is a mechanical engineer. He is 77 years old now and is ready to retire. My oldest sister who was a teacher died,
    and the second oldest sister married a doctor.
- speaker: Interviewer
  text: Who had the most influence on your life?
- speaker: Respondent
  text: It was my mother. It was my mother who told me to come here.
- speaker: Interviewer
  text: Is there anything taught by your mother or grandmother that you still remember?
- speaker: Respondent
  text: I do not remember anything special at this moment, but seeing my mother as a wife in an old family, I did not want
    to be a wife in an old family. My mother also thought that I would not make a good wife in an old family, so she met my
    husband-to-be and asked many questions. After meeting Itano my mother said that he is an honest hard worker, so even if
    he did not get rich he will have enough to live on. I am glad I did not tell my mother what a hard life I led in America
    at first.
- speaker: Interviewer
  text: Did you learn about Ninomiya Sontoku when you were young?
- speaker: Respondent
  text: Yes, I did, but I was not too impressed by him.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: Buddhism, Koyasan.
- speaker: Interviewer
  text: Were your parents ardent believers?
- speaker: Respondent
  text: No, not too ardent, but my grandmother was.
- speaker: Interviewer
  text: How was your school days?
- speaker: Respondent
  text: I had fun. I was always number one in the class.
- speaker: Interviewer
  text: Were you the class president?
- speaker: Respondent
  text: No, it was co-educational so boys were always president.
- speaker: Interviewer
  text: Did you think it was unfair?
- speaker: Respondent
  text: Now I didn't mind. But as I was the tallest in the class, I had to hold hands with the shortest boy. He did not like
    it so he wanted me to hold his little finger.
- speaker: Interviewer
  text: What was fun in your grammar school days?
- speaker: Interviewer
  text: Did you have fun in your high school days?
- speaker: Respondent
  text: Yes. As my three brothers were attending schools, I was not supposed to go to school, but luckily I passed the entrance
    exam so I could go to the high school.
- speaker: Interviewer
  text: What kind of thing did you talk about in high school? Did you talk about marriage?
- speaker: Respondent
  text: I was only 12 years old when I entered the high school, and graduated when I was 16 so I did not talk anything like
    that.
- speaker: Interviewer
  text: Were there any boy-girl relationships?
- speaker: Respondent
  text: No, there wasn't. Only some girls received letters from some boys in the family.
- speaker: Interviewer
  text: What kind of village did you grow up in?
- speaker: Respondent
  text: It was a little village.
- speaker: Interviewer
  text: Do you remember any happenings in the village?
- speaker: Respondent
  text: Nothing much happened.
- speaker: Interviewer
  text: What subject did you like in grammar school?
- speaker: Respondent
  text: I liked math, but I did not like composition.
- speaker: Interviewer
  text: Did you like Shushin? (Ethics)
- speaker: Respondent
  text: I did not like it much, but I had to study it.
- speaker: Interviewer
  text: What do you remember in your childhood, war big?
- speaker: Respondent
  text: There wasn't any war. The World War I ended when I came to America in 1918.
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I was not quite 18 yet.
- speaker: Interviewer
  text: Didn't some girls get married around 16?
- speaker: Respondent
  text: No, I don't think so. My mother married young and had a hard time, so she did not want me to get married young. When
    I told my mother that I did not want to get married and go far away, she said that even if I lived closer I may have hardship,
    so she encouraged me to come to America.
- speaker: Interviewer
  text: Did you know anything about America then?
- speaker: Respondent
  text: No, I did not know anything about America. There wasn't anybody who came to America from our village. There were some
    from Itano's village. I was somewhat related to Itano.
- speaker: Interviewer
  text: Have you heard about Christianity before then?
- speaker: Respondent
  text: No, never. But my father had a friend in the village who was a Christian. Itano's sister married a Christian and came
    to America.
- speaker: Interviewer
  text: How did you get to marry Mr. Itano?
- speaker: Respondent
  text: Itano came back to Japan after graduating from school, and I was introduced as a far relation.
- speaker: Interviewer
  text: Did your mother decide that you should marry Mr. Itano?
- speaker: Respondent
  text: No. After father came home from his business trip both families met and talked. My mother did not force me to marry
    him. She left it up to me to decide. I trusted my mother, so I decided to marry him.
- speaker: Interviewer
  text: What did your father say?
- speaker: Respondent
  text: He thought Itano was C.K.
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: It was latter part of 1917. He was temporarily exempted from the draft, so we hurried and had our marriage ceremony
    in October, and came to America in February of the following year.
- speaker: Interviewer
  text: When did you meet Mr. Itano for the first time?
- speaker: Respondent
  text: When we all met at Itano's aunt's house. We did not say anything to each other.
- speaker: Interviewer
  text: What was your first impression of him?
- speaker: Respondent
  text: My brothers were all big, so I thought he was a small man.
- speaker: Interviewer
  text: It must have been hard to make such a big decision?
- speaker: Respondent
  text: Yes, but I was lucky. Many women had so much trouble with their husbands.
- speaker: Interviewer
  text: What kind of trouble did they have?
- speaker: Respondent
  text: Some husbands did not have good skills, jobs, drank or gambled. Many people went back to Japan because they did not
    have jobs.
- speaker: Interviewer
  text: Did you leave Japan in December?
- speaker: Respondent
  text: We left in February and arrived here in March.
- speaker: Interviewer
  text: How was the trip?
- speaker: Respondent
  text: I was seasick, and could not go to the dining room, so I asked the boy to bring me some cooked rice.
- speaker: Interviewer
  text: Were there many picture brides on the ship?
- speaker: Respondent
  text: Yes, they were mostly in the third class, but there were some in second class.
- speaker: Interviewer
  text: Do you know if those picture brides were successful here?
- speaker: Respondent
  text: I don't know any picture brides except Kiyama-san who was in the same cabin with me.
- speaker: Interviewer
  text: Did you hear about picture brides after you came here?
- speaker: Respondent
  text: Yes. Some brides did not have any place to go so they went to Salvation Army for help.
- speaker: Interviewer
  text: Was there much disorder in the society?
- speaker: Respondent
  text: No, it was not too bad, but restaurants were very prosperous. In 1920 picture brides were prohibited, and after that
    men went back to Japan to take brides. Those brides are the youngest ones now.
- speaker: Interviewer
  text: Did you land at Hawaii?
- speaker: Respondent
  text: Yes, and one of Itano's acquaintances treated us with bonito sashimi. It was very delicious. I felt better after we
    landed at Hawaii, and I did not get seasick.
- speaker: Interviewer
  text: Where did you land at in America?
- speaker: Respondent
  text: San Francisco.
- speaker: Interviewer
  text: Did you go to Angel Island?
- speaker: Respondent
  text: No. Only people who came alone or who had disease went there.
- speaker: Interviewer
  text: Where did you stay in San Francisco?
- speaker: Respondent
  text: We stayed at our friend's.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I thought it was a big country.
- speaker: Interviewer
  text: How did you feel when you saw the white people?
- speaker: Respondent
  text: I didn't have any special feeling. When I started going to school I felt lonesome.
- speaker: Interviewer
  text: Did you become a schoolgirl right away?
- speaker: Respondent
  text: No. Sakamoto was working at his friend's ranch in Yolo, so Itano went there. I could not go to the camp with him,
    so I worked as a schoolgirl in Burlingame.
- speaker: Interviewer
  text: What did you do as a schoolgirl?
- speaker: Respondent
  text: I did housework, cleaning house, washing clothes etc.
- speaker: Interviewer
  text: How was your English?
- speaker: Respondent
  text: I did not do too well. I studied English in high school, but my conversation was poor, so I had to use a dictionary.
- speaker: Interviewer
  text: How long did you work as a schoolgirl?
- speaker: Respondent
  text: About half a year. Then Itano told me to go to San Francisco, and attend an English class at the Buddhist church in
    the morning and learn sewing in the afternoon; so I did.
- speaker: Interviewer
  text: Did Mr. Itano come to see you while you were working as a schoolgirl?
- speaker: Respondent
  text: Yes, once in a while.
- speaker: Interviewer
  text: About once a week?
- speaker: Respondent
  text: No, not so often. I was lonesome but I could not do anything about it. After a while Itano went to farm in Freeport.
    He asked me if I wanted to go with him, so I said, of course I wanted to go there. Then we went to the country.
- speaker: Interviewer
  text: How long did you stay in San Francisco?
- speaker: Respondent
  text: Less than a year. We were in Sacramento by the Armistice Day.
- speaker: Interviewer
  text: Did you work with your husband when you came to Sacramento?
- speaker: Respondent
  text: No, my husband did not let me work outside. I stayed home and cooked.
- speaker: Interviewer
  text: About how many people did you cook for?
- speaker: Respondent
  text: Usually about four to five people. When there were many laborers we hired cooks, but they did not stay long because
    the laborers complained too much.
- speaker: Interviewer
  text: What kind of things did Mr. Itano grow?
- speaker: Respondent
  text: All kinds of things like tomato, onion, potato, corn etc. but he was not a good farmer so they did not grow well.
- speaker: Interviewer
  text: Where did he graduate from?
- speaker: Respondent
  text: Agricultural Department of the University of California, Berkeley, but he decided to become a farmer. Other farmers
    must have laughed at him, but he was very serious. Two years later when we were ready to move in town, he was asked to
    teach a school, and become a secretary of Nihonjin-Kai (Japanese Association). Mr. Takasugi who had been working as a
    translator had to go back to Japan, and asked my husband to take care of his business while he was gone, so he worked
    at the office on 4th and L as a translator and interpreter. He had to interpret at the Court House or translate some contracts.
    After that he started the insurance business.
- speaker: Interviewer
  text: What kind of hardship did you have when you were in Freeport?
- speaker: Respondent
  text: It was worse than the life in the country in Japan. I had to cook rice over a gasoline can with chopped wood.
- speaker: Interviewer
  text: Weren't you surprised when you came from Japan?
- speaker: Respondent
  text: Yes, I was, but I am glad I never mentioned a word about that kind of life to my folks in Japan. It is a funny story
    now, so when I tell them about it they don't believe me.
- speaker: Interviewer
  text: Do you think you did not experience as much hardship as some other women?
- speaker: Respondent
  text: Now because I lived in the country only for about two years, and moved to town a little after Harvey was born. Some
    women had a hard time because their husbands were not dependable.
- speaker: Interviewer
  text: Were there many irresponsible husbands?
- speaker: Respondent
  text: Yes, there were quite a few. The wives had a hard time because of debts, but some wise wives went out to work to pay
    the debts. I did not experience much hardship. Only the life in the country was rough, so I was surprised.
- speaker: Interviewer
  text: What do you mean by rough?
- speaker: Respondent
  text: Getting up early in the morning, and cooking on the floor of the kitchen burning firewood.
- speaker: Interviewer
  text: Did you pull weeds?
- speaker: Interviewer
  text: Did you wash?
- speaker: Respondent
  text: Of course, I had to.
- speaker: Interviewer
  text: What year did you move to the town of Sacramento?
- speaker: Respondent
  text: In 1920, two or three months after Harvey was born. We rented one room.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: Maybe about three months. Then we rented two rooms and a kitchen of a house across from the Toriumi's.
- speaker: Interviewer
  text: Did Mr. Itano's work go well since 1920?
- speaker: Respondent
  text: There was not a day we did not have money because he received cash for his service. We were not in red even during
    the depression even when the banks were closed.
