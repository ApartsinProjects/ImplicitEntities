collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Does this church in Livingston have some relation with the Yamato Colony?
- speaker: Respondent
  text: Yes. In 1906 it started. There used to be the Nichibei Shinbun, (which doesn't exist anymore) whose president was
    Mr. Kotaro Abiko. He had planned to build an ideal Christian colony. In 1906, from the Nichibei kangyosha, a real estate
    company, he bought 3,000 acres of land, and shared it with those who wanted to. Thirteen families shared it, and they
    started the colony. For the more correct and precise information, Mr. Kazuo Masuda, who is a second generation around
    65 years old, has the record of it.
- speaker: Respondent
  text: I came to this country in 1906 or so, when the colony had just started, and stayed in Yugo. It was in 1920 when I
    got to this colony. So the information I have before 1920 is the perceived great what I have heard from other people.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Kashiwase, Katsuchika.
- speaker: Interviewer
  text: What part of Japan did you come from?
- speaker: Respondent
  text: I came from Ashikaga in Tochigi Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1885, and I have just recently celebrated my 88-year-old birthday.
- speaker: Interviewer
  text: Please tell me what you know.
- speaker: Respondent
  text: Well, in my church, there is a lady whose name is Hayashi. Yes. She was a wife of Mr. Minejima, who was the first
    village headman of the colony.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Chiyo Okuye.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born at Hirosaki in Aomori Prefecture, but bred in Tokyo.
- speaker: Interviewer
  text: Where were you born, Mrs. Kashiwase?
- speaker: Respondent
  text: I was born at Kiryu in Gumma Prefecture, where it is very close to where my husband was born.
- speaker: Interviewer
  text: Please tell me what you know about the Yamato Colony.
- speaker: Respondent
  text: Well, it is hard to decide where to begin. Mrs. Okuye's deceased father, Mr. Seinosuke Okuye kept a diary, so she
    must know more about the colony.
- speaker: Interviewer
  text: Please tell me what he wrote in his diary, Mrs. Okuye.
- speaker: Respondent
  text: He wrote about a lot of things, mainly about the colony and himself.
- speaker: Interviewer
  text: Is 1906 the year when this Yamato Colony started?
- speaker: Interviewer
  text: Was Mr. Minejima the first village headman?
- speaker: Interviewer
  text: When did he die?
- speaker: Respondent
  text: He died very young, before his eldest child was born.
- speaker: Respondent
  text: According to my father's diary, he was sent to a hospital in San Francisco and died in 1908 or 1909. He was from Chiba
    Prefecture.
- speaker: Interviewer
  text: At that time, how many families had been living there?
- speaker: Respondent
  text: 'At the beginning of the colony, there were 13 families: The Naka''s, Kishi''s, Sato''s, Minobe''s, Hamaguchi''s,
    Masuda''s, Nobuchika''s, Miyahara''s, Okuda''s, Maeda''s, Tanji''s, and Washizu''s.'
- speaker: Interviewer
  text: Are all the members of these families still living?
- speaker: Respondent
  text: Some of them were married and had their family, and some of them were single. Almost all of the pioneers have already
    died. The persons still living are only Mr. Minoru Kishi and Mr. Kazuo Masuda. Mr. Kazuo was the first baby born here.
    He is now over 60 years old.
- speaker: Interviewer
  text: What kind of hardships did you experience in the Yamato Colony, Livingston?
- speaker: Respondent
  text: Here, it used to be a wild, waste land, full of grasses, and the only power we could afford was from horses, or we
    had to work by our hands. We didn't have tractors at that time. It was an extraordinary hardship that we experienced.
    It was awfully hot in summer. It was also the time of depression, so we couldn't get much money from our products.
- speaker: Respondent
  text: The houses were here, and there alone without electricity among tall, wild grasses seen in the desert. They were taller
    than human beings. When we visited our neighbors at night, we took the paths which wild rabbits made, carrying a lamp.
    Since the grasses were taller than us, and it was dark, we often found ourselves back to our house instead of our friend's
    house.
- speaker: Respondent
  text: We were all young and needed money, but it was almost impossible to find someone who would let us work, because they
    were all the same pioneers like us. Some in good health, like Mr. Tsuchiya, walked all the way to Fresno to pick grapes.
- speaker: Interviewer
  text: How far is it from here to Fresno?
- speaker: Respondent
  text: It is 70 miles, and further from there, they went to town and to country. Besides the difficulty of getting work,
    the weather was terribly hot. In summer, it was over 100°F degrees almost every day. Even the eggs of chickens laid in
    sand were cooked by the heat. This is a real story, though it is hard to believe.
- speaker: Interviewer
  text: Mrs. Okuye, did you come to this country with your father?
- speaker: Respondent
  text: No, I didn't. First, my father came here in 1907 to inspect the situations and circumstances of America. After the
    three-month inspection, he visited this area, decided to buy some piece of land here and paid some amount of money for
    it. There was a man named Mr. Naka already living here, who had been a teacher of an agricultural school in Japan, so
    my father asked him to plant so-and-so called trees for some acres, and so-and-so for some, and paid for the seedlings
    before going back to Japan.
- speaker: Respondent
  text: 'Then he saw some equipment built for watering. This water was from the melted snow of Yosemite. He wanted to see
    its source in Yosemite. He asked Mr. Minejima to show the place to him, and went there with Mr. Minejima. My father was
    a devout Christian. Visiting the place, he was greatly impressed by it. In his diary, he wrote about his feelings in the
    following way: "I was very much moved by the great work done by God. I am sure we will be all right using this great water.
    I prayed to God all night long in a field at the back of the house where I was going to stay, and I asked God to show
    me what to do." He decided to live here. Then, he went back to Japan to bring his family here. He took his wife, me, and
    my husband. He left my elder sister who had graduated from Doshisha Jogakko (Woman''s School), because she was almost
    going to finish the schooling of being a kindergarten teacher at Shoen in Kobe. He adopted a daughter from a relative
    and took her with him, too.'
- speaker: Interviewer
  text: How old were you when you came here?
- speaker: Respondent
  text: I was 21 years old then.
- speaker: Interviewer
  text: When did you come here?
- speaker: Respondent
  text: I came here in 1921.
- speaker: Interviewer
  text: Mr. Kashiwase, when did you come here?
- speaker: Respondent
  text: I got here in Livingston in 1920. As I mentioned before, I came to America in 1906 and had been in San Francisco for
    15 years before I moved here. I thought it was good for my children's future, though I had no experience of farming.
- speaker: Interviewer
  text: What was the first impression when you came here?
- speaker: Respondent
  text: I had no experience nor knowledge about farming. Everything was new to me. But, as in an old saying, "Practice makes
    perfect." I did all my best. Though I was young enough not to hesitate doing anything, I am still amazed about what I
    have done.
- speaker: Interviewer
  text: What were you before coming here?
- speaker: Respondent
  text: I worked as a laundryman. I also made women's hats. At that time, feather hats were very popular. I made a lot of
    things using feathers—decorating hats, mufflers, and more. It is really something that each person entered quite a different
    world and did unknown and strange things. My father-in-law was a civil engineer of Ohkura Civil Engineering Company in
    Japan.
- speaker: Respondent
  text: Mrs. Okuye's father was a famous independent missionary in Meiji era, whose name was Missionary Shinpei Homma.
- speaker: Respondent
  text: My father-in-law was a person who guided my father into Christian life. So I met my husband through the relation between
    my father-in-law and my father, and my father always called him his father.
- speaker: Interviewer
  text: Mr. Kashiwase, was it before you came here that the exclusionary movement against the Japanese people happened?
- speaker: Respondent
  text: I bought some piece of land here in Livingston with Mr. Yamamoto in April, 1920. I saw a big sign saying "No more
    Japanese ordered here." They were put up where anyone coming from anywhere—from Turlock or from Fresno—could recognize
    the signs. My father took a picture of it. It was written in huge letters. My husband often said that the condition of
    the rejection here in Livingston was better and soft, because it said "No more Japanese." At some other places, it said
    "No Japanese wanted here."
- speaker: Interviewer
  text: When did it happen?
- speaker: Respondent
  text: It happened in 1919 and 1920.
- speaker: Interviewer
  text: Did any confusion or uprisings occur because of the incident?
- speaker: Respondent
  text: No. Nothing violent happened here. Because the Japanese people living here were Christian, they didn't like violence.
- speaker: Interviewer
  text: Did Mr. Abiko possess this land?
- speaker: Respondent
  text: Yes. He did under the name of Kangyo Real Estate Company.
- speaker: Interviewer
  text: How many acres did he have?
- speaker: Respondent
  text: I don't know the exact number, but I guess he had about 3,000 acres here.
- speaker: Interviewer
  text: How were the days of the depression in the 30's, especially in 1932?
- speaker: Respondent
  text: In the depression period, we couldn't sell what we grew. Here we mainly grew grapes, but we also grew peaches. The
    crop which we had taken a lot of pain since the spring time couldn't be sold at all. I remember that I struck the grapes
    down off the vines when pruning. We had a very hard time then; but, those who had experienced the World War I here didn't
    suffer so much in the depression period, because they had earned a lot of money during the war period. Those who came
    here after the war like us had to struggle against hard living, because we invested all the money in the farms.
- speaker: Interviewer
  text: So the people in Yamato Colony had some good times when they made money, didn't they?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: It was during the World War I, that times were good for the people here. Everything could be sold well for a good
    price, and the Japanese people here also earned a lot of money by selling grapes they grew.
- speaker: Interviewer
  text: How many people were living here when you came here in 1920?
- speaker: Respondent
  text: Quite a few people were living here, though the roads were not as good as they are now, but it is hard to tell. The
    church had been already moved to the place where it is now. At first we attended the little old church at Mr. Kishi's
    farm. It was already full of people and active. This village has been distinct from the other Japanese colonies, because
    the villagers here were all Christian, while the people of the other places belonged to some other religions such as Seiehino-ie
    and Buddhism.
- speaker: Respondent
  text: Once we happened to be unable to have a pastor unless we belonged to a certain denomination of the church, so we used
    to gather in the church and pray that we might get a pastor. My father mainly led us and we prayed very hard. There was
    a Methodist Church of Americans in Merced, and those who came here earlier than us sent their children to the Sunday School
    of the Church. They took the children on the wagon, which they used for carrying grapes.
- speaker: Respondent
  text: As the time passed and the children grew up, they got baptized at the Methodist Church, and the number of the children
    baptized at the Methodist's increased. We thought that it was wrong that the parents and their children belonged to different
    churches. We finally decided to have our church here join the Methodist Church, the same as the children's. This church
    became Methodist. My father belonged to Kumiai Church and had been an old member of Reinanjakaku Church. I suppose he
    wanted to remain belonging to Kumiai denomination, although he didn't express himself.
- speaker: Interviewer
  text: When was it that the church became Methodist?
- speaker: Respondent
  text: I guess it was around in 1923 or so, but I can't remember well. At the beginning, we started our church as a self-supporting
    one, without belonging to any denomination. We had called it "Nipponjin-Kiristo-Kyokai" (Japanese Christian Church). It
    was after the period of Rev. Seno that the church became Methodist, so it was during the period of Rev. Fujii that we
    joined the Methodist denomination. Rev. Jiryu Fujii used to be a Buddhist priest before becoming a pastor, and he stayed
    here for eight years. He held a church service in this church in the morning, those in the afternoon he went to a church
    in Cortez, to hold a service there.
- speaker: Respondent
  text: My father used to go there. At the beginning of the colony we didn't have our church. We used to have a service in
    our own house by turns. My father was a person who couldn't live a day without a church, so he helped Mr. Fukushima who
    had already two sons at a theological school in Berkeley. Mr. Fukushima used to be a sub-pastor of Reinanjakaku church.
    He graduated the school at the age of 26 and was sent to Fresno. So my father became not only a member of his church in
    Fresno, but also an official of the church. In his diary he mentions that he often went to Fresno train to attend a conference
    of the church and stayed one night over there. He also asked Reverend Fukushima to come over to Livingston. He opened
    a Sunday School at the house of Mr. Masuda, Mr. Naka, and some other places. Mr. Kishi, Mr. Minoru, Mary and Rose Naka
    used to be the pupils, so Mr. Fukushima was the first pastor we had in this colony.
- speaker: Respondent
  text: Then came Reverend Kodaira, who used to be a pastor of the Kumiai Church in Deland. Since my father was a member of
    the Kumiai Church and knew a lot of pastors of the church, he asked Rev. Kodaira to come to Livingston. At that time quite
    a few young people were attending the service. One day Rev. Kodaira told them to be baptized, but they didn't know it.
    One of them said to him, "What is it? I smoke and drink. Am I still a Christian?" He came to church and baptized them.
