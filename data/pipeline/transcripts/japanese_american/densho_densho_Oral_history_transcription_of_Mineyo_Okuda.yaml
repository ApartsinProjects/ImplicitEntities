collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: To begin with, tell me your name please.
- speaker: Respondent
  text: My name is Okuda, Mineyo.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Wakayama Prefecture.
- speaker: Interviewer
  text: What did your family do?
- speaker: Respondent
  text: It was a farm household.
- speaker: Interviewer
  text: What did you grow?
- speaker: Respondent
  text: In those days we were growing rice, oats and vegetables. As I was going to school I did not help much. We hired many
    people when we harvested rice and oats.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He brought us up strictly, but he was a very sensible man and sent me to a girls' high school. In those days only
    a few girls went to girls' high school from our village. I took an examination from the sixth grade and entered Wakayama
    Girls' High school.
- speaker: Interviewer
  text: After you graduated from high school, what happened?
- speaker: Respondent
  text: After I graduated from high school my parents bought me a sewing machine and sent me to a sewing school for a year
    as they thought we never knew what kind of misfortune a woman might meet in the future. At school I learned sewing and
    embroidery. While I was attending the sewing school I was engaged to a man who was my relation. A year later he came home
    to bring me to America. I came here with him in 1919.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: She was a very gentle woman. She loved me so much that she did not want to part with me, but my father said if she
    wants to come home anytime she wants to, so we should let her go when there is a chance of a good marriage. That is how
    I came here.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was 18 years old. I graduated from high school when I was 17.
- speaker: Interviewer
  text: Was your mother a gentle person?
- speaker: Respondent
  text: Yes, she was very gentle, but she taught me good manners such as greeting guests or serving tea.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had one sister and four brothers. I was second from the last.
- speaker: Interviewer
  text: Do you remember about your school days?
- speaker: Respondent
  text: I learned many things.
- speaker: Interviewer
  text: Did you have fun?
- speaker: Respondent
  text: I had fun so I could have gone to school longer, but there was an offer of marriage, so my parents thought I should
    learn domestic things. In Japan they start talking about marriage as soon as you finish high school, and matchmakers try
    to arrange marriages. The parents pick whoever they think will make their daughters the happiest. I came here relying
    on my parents' opinions. In those days there were hardly any love marriages.
- speaker: Interviewer
  text: Did you know that you were coming to America?
- speaker: Respondent
  text: When I graduated from high school I started receiving letters from him, and my uncle acted as a go-between. My cousin
    was married to Okuda's brother, and they were working as partners here. My husband was his younger brother. I came here
    thinking I would be able to stand the life of a farmer as I was born as a farmer's daughter.
- speaker: Interviewer
  text: Have you met Mr. Okuda before?
- speaker: Respondent
  text: I met his older brother when my cousin married him, so we were related. He was here since he was young so I didn't
    know him, but I trusted him because of his older brother.
- speaker: Interviewer
  text: When did you see your husband for the first time?
- speaker: Respondent
  text: He could not go back to Japan unless he was engaged, so we were engaged. Then he went to Japan after harvesting grape.
    We were married there and came here in April.
- speaker: Interviewer
  text: How did you feel when you saw him for the first time?
- speaker: Respondent
  text: I didn't have any special feeling. I heard from my parents that he was a very sincere and serious man, so I thought
    he looks like he was.
- speaker: Interviewer
  text: Were you happy when you saw him for the first time?
- speaker: Respondent
  text: It was arranged, so I didn't have any special feeling.
- speaker: Interviewer
  text: In a song it says, 'Why does a bride cry tying her gold-broaded sash?'. Did you cry, too?
- speaker: Respondent
  text: No, I didn't. My cousin was here and wrote me and told me all about here. I knew it was hotter in Livingston than
    in Hiroshima, so I was prepared for the heat. Indeed, it was hot here without coolers.
- speaker: Interviewer
  text: Was Mr. Okuda already in Livingston?
- speaker: Respondent
  text: He was farming here.
- speaker: Interviewer
  text: Did he farm from the beginning?
- speaker: Respondent
  text: No, his brother came to America first, and he came here after his brother. He helped his brother who was managing
    an art goods store in San Francisco with Mr. Yoshitaro Mayeda as partners, but the store was burned to the ground by the
    great earthquake. Then they decided to go to Livingston on Mr. Abiko's project. My husband had a grocery store at Winters
    at the time of the earthquake so he took some food to help his brother in San Francisco. He told me that when he went
    to San Francisco he had to help build roads so he did not get to meet his brother for a week. While he was working dripping
    with sweat, Mr. Mayeda happened to come by pulling a wagon. He went with Mayeda to the place his brother was staying and
    gave the food and helped them. My husband closed the store in Winters and came here before his brother did. When my husband's
    brother and Mrs. Mayeda joined him here they bought a piece of land as partners and established the Kisen Farming Company.
    Before I came here they divided the land, and my husband and his brother worked as partners.
- speaker: Interviewer
  text: Did you have a wedding ceremony before you came here?
- speaker: Interviewer
  text: Where did you have the wedding ceremony?
- speaker: Respondent
  text: At my husband's home. In Wakayama the weddings are held at the groom's hometown. We had our wedding in December, and
    came here in April. The trip was in place of the honeymoon. My sister was in a rooming business in Seattle at that time.
    As I had not seen her for a long time, we went to see her as well as sightseeing. It took me ten days to arrive at Seattle
    by a foreign ship. We saw Canada, Victoria, and stayed in Seattle for a week. We arrived here on April 20. It was a sort
    of a honeymoon.
- speaker: Interviewer
  text: What kind of people were on the ship?
- speaker: Respondent
  text: It was a foreign ship but there were many Japanese on board. I think it was called Ajiya (Asia)-Go. It was a big ship.
- speaker: Interviewer
  text: Were there any brides?
- speaker: Respondent
  text: Yes, I think so. There were about five women in our room. Men and women stayed in separate rooms.
- speaker: Interviewer
  text: Were you with other women?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Even the couples were not together?
- speaker: Respondent
  text: I think, in the first class the couple can stay together. All the passengers in our room were Japanese, so we could
    talk with each other. A lady from Okinawa was a bit hard for us to understand, but we talked with her. It took one night
    to go from Victoria to Seattle. The day we arrived in Seattle must have been a holiday or something for there were no
    immigration officers there, so we had to stay at the Immigration office overnight. There were many beds without mattress.
    They were hard but we slept there that night. I cannot forget the delicious salmon we had at the Immigration office. Next
    day we arrived in Seattle, and we took a cab to my sister's. My sister was waiting for us, so we stayed at her hotel and
    went sight-seeing for a week.
- speaker: Interviewer
  text: Was the voyage fun?
- speaker: Respondent
  text: I did not get seasick. We just spent the days resting and talking. After we got off the ship we went sight-seeing.
    We saw a famous 42-storied building. It was April, and it was raining in Seattle. My sister's friend took us around in
    a car and showed us places and took us shopping. I came in Kimono, so I had my sister help me buy American clothes.
- speaker: Interviewer
  text: How did you feel when you had Western clothes on?
- speaker: Respondent
  text: Sometimes I wore dresses when I was going to school in Japan.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I was too busy to notice as my sister, her friend, my husband's brother came and we had to talk to them. They wanted
    us to stay longer, but my husband had to go back to work, so we came here together.
- speaker: Interviewer
  text: Did you think America was a nice place?
- speaker: Respondent
  text: I thought America was no comparison to Japan. When I arrived at Seattle I was surprised the buildings were very stately
    compared to those in Wakayama City which was a developed city. I heard and read in letters about America, but when I saw
    it I thought it was really splendid.
- speaker: Interviewer
  text: Did you come here after sight-seeing?
- speaker: Respondent
  text: Yes, by train.
- speaker: Interviewer
  text: What did you think when you came to Livingston?
- speaker: Respondent
  text: At that time Livingston was not developed yet. I heard about it from my sister, but there was no electricity then.
    I think we did without electricity for five or six years. Finally, Mr. Takahashi and Mr. Hamaguchi had electricity laid
    on for drying grape. Where we lived was far from there, so we were told that if the neighbors get together and buy a lot
    of electrical appliances they would install electricity. Therefore we bought them and finally had electricity laid on.
    When I was in Japan in school days I had never lived in a place without electricity. Here we had to cook on kerosene stove,
    and I had to cook for hired hands, so it was hard. My sister taught me how to cook. I thought it was entirely different
    from my girlhood. I could not go back to Japan so I had to bear the hardship.
- speaker: Interviewer
  text: Did you want to go back to Japan?
- speaker: Respondent
  text: I did not want to go back as I had made up my mind to bear the hardship here. I heard that it was hot here and there
    were many flies. I came here on April 20, but it was already hot. My husband took me around the village on a horse-drawn
    buggy to introduce me as we were married in Japan. It was an inconvenient place so it took about three days to go around
    the village. Then we were settled down. Until this house was built here we stayed in the tank house. We stayed upstairs
    and cooked downstairs. We lived there for two to three months. It was a completely different life from my girlhood. Everybody
    who came here had the same kind of hardship. I was too busy to write to Japan so my mother was worried about me and she
    was the first one to write to me. If I told her that we did not have electricity she would have worried, so I just told
    her that I was well and doing fine.
- speaker: Interviewer
  text: Did your hardship begin after you came here?
- speaker: Interviewer
  text: Did you work hard?
- speaker: Respondent
  text: I didn't work in the field.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: I cooked. In summer season we hired people so I helped cooking. I learned to pack grapes and cut peaches to be dried.
- speaker: Interviewer
  text: Was it hard work?
- speaker: Respondent
  text: Many Mexicans came to do it, so I learned to do it in spare time from cooking. When I came here the grapes were young,
    and they used to cut the tops of grapes. So I learned to do that. It was young so I did it as an exercise, but when it
    came to work it was not easy. That was a long time ago.
- speaker: Interviewer
  text: Were you lonesome when you first came here?
- speaker: Respondent
  text: In Japan I had many friends, but I did not have any friends here at first, so I used to go to my sister's all the
    time. There were many people from Wakayama Prefecture in my neighborhood, and soon we became good friends and we visited
    each other, so I was not lonesome. Only I could not understand Mexicans who came to work. I wished I learned English more.
    I could not make myself understood with my English.
- speaker: Interviewer
  text: Was this a hot place?
- speaker: Respondent
  text: Yes, it was very hot. It went over 100 degrees. I heard that it is hotter in Fresno.
- speaker: Interviewer
  text: Were there trees here?
- speaker: Respondent
  text: There were some trees around the house. We planted many trees since I came here.
- speaker: Interviewer
  text: What was the hardest thing for you when you first came here?
- speaker: Respondent
  text: That I did not understand the language was the hardest thing.
- speaker: Interviewer
  text: About how many people did you hire?
- speaker: Respondent
  text: Mexicans lived in another house, so I did not have to take care of them.
- speaker: Interviewer
  text: About how many?
- speaker: Respondent
  text: In winter time we hired four or five Japanese for pruning as Mexicans were not skillful for that. We had one or two
    people working for us all through the year, and at harvest time we hired fourteen or fifteen Japanese.
- speaker: Interviewer
  text: Were they Isseis?
- speaker: Respondent
  text: They were mostly single Isseis, but we hired married couples as cooks for three months during the summer.
- speaker: Interviewer
  text: What kind of people were single Isseis?
- speaker: Respondent
  text: They were well educated kind people, and some of them were college graduates. I worked with them in the packing shed,
    and they were kind to me and called me 'Mrs.'. I had asked the people at the boarding house to send us good people, so
    they were refined people, and they worked for us for a long time.
- speaker: Interviewer
  text: Why were those people single?
- speaker: Respondent
  text: There were all kinds of people. Some people had wives and children in Japan, and others spent all the money and could
    not go back to Japan. They worked for us until the war broke out. The things have changed in the past few years. Now the
    tractors are used, and we don't see a single horse. When we evacuated we left the horses behind.
- speaker: Interviewer
  text: Do you have any reminiscence of the days you first came here?
- speaker: Respondent
  text: I don't have anything special. I knew I was going to become a Christian when I came here. I was a Buddhist when I
    was in Japan, but since I came here I thought I would become a Christian, and I was baptized by Rev. Fujii.
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: It was on Easter of 1922. My husband had been attending church before, but he waited for me to come here and we were
    baptized together.
- speaker: Interviewer
  text: You didn't go to church in Japan, didn't you?
- speaker: Respondent
  text: I attended Buddhist church. When I was in high school, I had Christian teachers and friends, so I knew about Christianity.
    My family's religion was Buddhism since my ancestors, so I was converted since I came here.
- speaker: Interviewer
  text: Do you think you worked hard since you came here?
- speaker: Respondent
  text: I think I helped as much as I could.
- speaker: Interviewer
  text: Did you get up early in the morning?
- speaker: Respondent
  text: Yes, I got up early.
- speaker: Interviewer
  text: About what time?
- speaker: Respondent
  text: I think I got up around 5 o'clock because I had to cook breakfast, and did the housework before we left home at 8
    o'clock.
- speaker: Interviewer
  text: About what time did you work till?
- speaker: Respondent
  text: When we had hired help we had to quit working at a certain time, so I think we worked till 5 or 6 o'clock.
- speaker: Interviewer
  text: What time did you go to bed?
- speaker: Respondent
  text: I had to clean up, so I think I went to bed around 11 o'clock.
- speaker: Interviewer
  text: Did you wash before you went to bed?
- speaker: Respondent
  text: When I had much clothes to wash my husband helped me. I cooked, and my husband helped me wash dishes and take care
    of children. When we had hired helpers I excused myself from church to cook, but my husband continued going to church
    every Sunday since he was baptized. When I could not attend the church, my husband told me the outline of the sermon.
    When we went to the church together he helped me get ready. When the children started going to Sunday school I went to
    church.
