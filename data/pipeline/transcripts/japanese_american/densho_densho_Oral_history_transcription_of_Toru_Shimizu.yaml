collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I remember we were examined at the immigration office and had to stay a few days at the detention center.
- speaker: Respondent
  text: My first impression was one of surprise to see the wide roads and the fact that there were miso and shoyu.
- speaker: Respondent
  text: I was questioned regarding several matters but I was treated well.
- speaker: Respondent
  text: When I first landed in America I stayed with my brother and sister and my first job was wood chopping. In spring,
    I was planning to enter elementary school and practice English conversation.
- speaker: Respondent
  text: I associated mostly with the Japanese people so there was a little opportunity to get acquainted with Caucasians.
- speaker: Respondent
  text: After I came to America my father, who was in Japan, fell ill, and I had to support the family because of being the
    first born son. It was difficult to do farm work because I was a student then.
- speaker: Respondent
  text: I returned to Japan for an arranged marriage. We were married at a Shinto shrine by a Shinto priest and after the
    wedding ceremony, had a feast.
- speaker: Respondent
  text: I had no relationship with the Caucasians except on business matters. I got used to the American way of life as my
    children grew up.
- speaker: Respondent
  text: After the beginning of World War II, we moved from California to Utah and experienced many hardships.
- speaker: Respondent
  text: I studied English for five years in high school in Japan and after I came to America I attended an elementary school
    for three years.
- speaker: Respondent
  text: Farming is not a very profitable business and I was at a disadvantage because of the bank's high interest rate.
- speaker: Respondent
  text: We left Los Angeles and settled in Utah. I purchased eleven acres of land for $7,600. The house was in a very poor
    condition. We encountered little difficulty because the owner did not want to sell the land and the house to a Japanese.
    Then my eldest son transferred from UCLA in Los Angeles to the University of Utah and he helped us by engaging a lawyer
    to buy the property.
- speaker: Respondent
  text: I have an orchard and also grow strawberries.
- speaker: Respondent
  text: Japanese organizations did not help me; I was just a member. If I had any problems and asked for their assistance,
    they would have helped me.
- speaker: Respondent
  text: Because of my daily farming chores, I did not have any opportunity to enjoy entertainment or hobbies; not because
    there were no entertainment.
- speaker: Respondent
  text: I hoped to rear my children to become worthy persons; therefore, we, as their parents, were discreet in words and
    deeds because parents' daily words and deeds have an important effect upon children.
- speaker: Respondent
  text: At first, my desire was to have my children educated in Japan, but since I had no relatives in Japan, I had no one
    who could take care of them so I brought them up in America. Now, when I think of this fact, I am thankful that I reared
    them myself and I realized that parents should rear their own children.
- speaker: Respondent
  text: During World War II, I sent many things which were desperately needed in Japan to our relatives and acquaintances
    and which were very much appreciated by them. I realized I had to help them from America, thereby obtaining the status
    of permanent residence.
- speaker: Respondent
  text: I thought that Niseis would be in a more advantageous position if they knew Japanese language.
- speaker: Respondent
  text: I learned about God's love extending from neighbor's love and was baptized at a church in Seattle in 1936.
- speaker: Respondent
  text: During the Depression period, I was in Seattle, and working as a gardener. My work decreased to almost half and I
    had difficulty in paying my telephone bills.
- speaker: Respondent
  text: I had always planned to return to Japan, but I resolved to settle in America after Japan was defeated in the World
    War II. I realized how difficult it would be to live in Japan after the war and besides America is my children's country.
- speaker: Respondent
  text: On the surface, the Caucasians did not say anything, but really they didn't like Japanese and did not trust them.
- speaker: Respondent
  text: The Japanese attack on Pearl Harbor resulted from the American pressure on Japan for oil, and I was embarrassed by
    this event.
- speaker: Respondent
  text: At the time when the notice of relocation was announced I was operating a nursery for the second year in Seattle.
    I thought that the relocation notice applied only to the Isseis and so was prepared to turn my nursery over to my eldest
    son to operate. But when I learned that the notice included all Niseis as well, I was disappointed. I sold my nursery
    shop which was worth $20,000 for only $1,000 and prepared for relocation.
- speaker: Respondent
  text: Caucasians considered their own advantages, too. At first, they asked us to give them aid if the Japanese military
    forces landed in America. But after they learned about the evacuation, they probably realized that the order would be
    carried out.
- speaker: Respondent
  text: My eldest son was nineteen and a half years old, and in total there were six children, all two years apart in ages.
- speaker: Respondent
  text: At that time I belonged to the Seattle church and the pastor came and consulted with me but there was no solution
    because he himself was in the same fate with me. Pastor Nicholson also visited me.
- speaker: Respondent
  text: We moved to Springville, Utah and I worked on a collective farm. Then I moved to the present address in Salt Lake
    City and cultivated strawberries and grew fruits.
- speaker: Respondent
  text: Considering the view, apparently the loyalty of Niseis is right.
- speaker: Respondent
  text: It is not right to draft Niseis while they were being evacuated and treated as an enemy.
- speaker: Respondent
  text: My wife and I celebrated our golden wedding anniversary and I also celebrated my 80th birthday. Now I am content with
    my retired life and am able to enjoy my hobby. I have no care because my children are living well and I am thankful that
    I have fourteen grandchildren.
- speaker: Respondent
  text: The Japanese who have lived in America are lacking in cooperation and foresight; therefore, the Japanese society progressed
    slowly, even if an individual had succeeded in his own business. I think it is important to have generous love and cooperation.
