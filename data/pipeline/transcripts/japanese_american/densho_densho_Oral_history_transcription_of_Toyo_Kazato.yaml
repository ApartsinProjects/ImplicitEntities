collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: First, please state your name.
- speaker: Respondent
  text: My name is Toyo Kazato.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: Iwakuni, Yamaguchi Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in Aug. 20, in 19th year of Meiji (1887).
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: 1966. Autumn of the year when there was a big earthquake. The earthquake was in spring. San Francisco was all torn
    up.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I was 20 years old.
- speaker: Interviewer
  text: I would like to know something about your home. What kind of home was yours?
- speaker: Respondent
  text: Well, my father was a poor Samurai. My father died young when I was 4 years old. I had a younger brother. I had older
    brother, too, but they didn't have to worry about him. However, they had to worry about me and my younger brother.
- speaker: Interviewer
  text: What did your mother do?
- speaker: Respondent
  text: My mother stayed at home, however. When the feudal system came to an end, my father received some money. So he bought
    rice field. We used to get enough rice from this field to live. We had enough expense money. My mother sewed for relatives.
    My older brother must send us some money, too. I remember those things.
- speaker: Interviewer
  text: Did you live with grandparents?
- speaker: Respondent
  text: No, I don't know them. So we, three of us, my mother, my brother and I, lived together. Sometimes my older brother
    and sister-in-law came to visit us.
- speaker: Interviewer
  text: Do you have any special recollection from that time?
- speaker: Respondent
  text: When I think about it, my father must die of a stroke.
- speaker: Interviewer
  text: Did he like to drink?
- speaker: Respondent
  text: I have a feeling that he must like to drink.
- speaker: Interviewer
  text: How about your schooling?
- speaker: Respondent
  text: After I graduated from a grammar school, at that time you see higher education for women were not encouraged. Only
    a few people from our village got to go to high school. I really wanted to go to high school. However, my mother had to
    work around the house. So she didn't want me to go out of house. Beside, we didn't have enough money to send me to school.
    So I didn't have the chance to go to high school. I always talked about wanting to go to high school. I really must put
    lots of pressure on mother.
- speaker: Interviewer
  text: It so happened that there was a Methodist church in Iwakuni. There was also an outpost for evangelism. A man came
    to the made for evangelical meetings. He was not a full minister, yet. That outpost, when I think about it, must have
    been Presbyterian outpost. My neighbor used to take me to the outpost for Sunday school.
- speaker: Respondent
  text: Well, the teacher there asked me if I was interested in going to a mission school. So I attended a mission school
    in Yamaguchi. It was about 20 Ri from our house. It was quite a distance. However, my older brother was attending middle
    school in Yamaguchi. He also advanced to high school in Yamaguchi. He wanted to become a military officer, so he couldn't
    go to college, because of economic reasons.
- speaker: Respondent
  text: At that time people in Iwakuni used to think that if a boy is not a military man, he wasn't a man. It was such a period
    in its history, so he became a military man.
- speaker: Respondent
  text: I entered the mission school very hastily. I passed the examination for the 2nd level in the school. I graduated from
    it. However, people who started out from the Yoka (preparatory course) were very good in English especially in pronunciation
    and others. However, us who started from the middle could not catch up with them.
- speaker: Respondent
  text: Two graduates from the mission school received scholarships to go to Joshi Gakuin (Women's College) in Tokyo. So we
    were saying that we should go to Tokyo together. At that time Russo-Japan war started and my older brother had to go to
    the war and came back seriously wounded. He could not be taken care of at the battle field, so he was sent back to Ujina
    for treatment.
- speaker: Respondent
  text: He sent me a letter saying that I should wait to go to Tokyo because he might not live. And if he had died, then he
    couldn't help me to attend the college. Well, he was seriously wounded, so I said I'll take care of him. My friend was
    very angry with me, because she wanted me to go to Tokyo with her but I couldn't. However, this couldn't be helped. So
    I missed the chance to go to college.
- speaker: Respondent
  text: Meanwhile, a missionary told me that he was coming back to America and if I were interested in coming to America with
    him. I thought that it might be better for me to come to America than to go to college. I thought that it might be better
    for me to come to America. I'll learn English much quicker this way. However, I told him that I was to go to Joshi Gakuin
    later on. Then he said, "I know. My niece helps there. So I could talk to them about you. If you want to go to America,
    I'll be able to take you." So I really thought about this. This was a good opportunity.
- speaker: Respondent
  text: So I made a preparation to come to America. I went back to my mother and told her about it. I expected her to oppose
    my idea. However, my older brother was getting better by then. So he agreed with me. He thought that it would be good
    for me to go.
- speaker: Respondent
  text: It had been about a half year since he came back wounded. So he was at home. Then I got ready and came to America.
    According to the missionary, there was a professor of Zoology who went to Japan and stayed there for a while. He was so
    intrigued by Japanese that he wanted to help a Japanese student. I was asked if I were interested in staying with this
    family. I thought it might be an interesting experience.
- speaker: Respondent
  text: So I came to America with this missionary. It was in 1906.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: Well, I was so eager to do what I set out to do. So I really didn't think about the things which were coming at me.
    This missionary had a sister in the East who was very ill. So he was in a hurry to reach East. He had told me to go to
    Berkeley from San Francisco by myself.
- speaker: Respondent
  text: So he just left me there. It was in the late afternoon. He told me to take a ferry boat. And when I arrived at Oakland,
    I should take a train which said Berkeley. Then, upon arriving at Berkeley, I was to go to East Hall. Well, I wasn't afraid
    or anything. When I was on the boat, I saw a Japanese man, looked like a business man, reading a newspaper. He didn't
    even say a word to me. I was rather blabbergasted. However, I had a place to go, so...
- speaker: Respondent
  text: I was told to come in Japanese Kimono, so I wore Kimono and had Furoshiki in my hand.
- speaker: Respondent
  text: When the ferry arrived, I looked up. I saw a sign which said, "Berkeley". At that time I was not very good at English,
    so however, I could understand a little. In the ship that missionary said, "Miss Ota, you'll have a trouble if you don't
    speak English." However, I was very reluctant to talk to him in English. So I didn't speak in English at all. However,
    when I got on the train to Berkeley, there was no one to talk to in Japanese.
- speaker: Respondent
  text: When I look around in the train there was an old man sitting next to me. So I said "I am going to East Hall. Would
    you please tell me how to get there?" He said, "Alright."
- speaker: Respondent
  text: Anyway Berkeley didn't come for a long time. Well, the sun was setting and I began to wonder what was going to happen.
    So I was looking out the window. Then, I saw a sign which said, "Daigaku Ryokan" (University Hotel). When I saw that I
    felt that I was approaching the University, so I felt good.
- speaker: Respondent
  text: Soon the train stopped. He said that it was the West Gate of the University. I was going to the East Hall, so I were
    to go to the other end of the University. I was to walk straight along the street. I thanked him and got off the train.
- speaker: Respondent
  text: I walked on the campus by myself. However, it was getting dark and I couldn't see things well. Soon I saw a huge wagon
    came by. Later on I found out that it was a hay wagon. There were some people on top of it. So I asked them about the
    East Hall. They told me that it was a way over there. So I continued to walk.
- speaker: Respondent
  text: Then I met a person on foot. I asked him about East Hall. He said it was at the other end. I was to walk all the way
    to the other side of fence. He asked me why I was going there. So I said that I came here to study. I was going to visit
    with Dr. Litter. This man told me that he had a Japanese school girl at home, so I should come over to visit them.
- speaker: Respondent
  text: He was a school teacher. I continued to walk. It was already dark. When I got there, there was a fence and I couldn't
    get out. I thought it might be the boundary. Then I saw a huge building. So I went there and went up the steps. I knocked
    on the door. No one answered. I was wondering what to do.
- speaker: Respondent
  text: It wasn't cold. I thought if I got out of the campus, I would be lost. So if I were to stay there, it was within the
    campus, so I would be safe. I wasn't too hungry or cold.
- speaker: Respondent
  text: I sat there on a step. There were many steps to the top. I looked up the sky. I saw lots of stars. I remembered Sunday
    school songs. "The stars in the sky, no one can count, flowers of the field, no one cannot count. But God knows every
    one of them." I remembered this song, so I was humming it. I thought "God told me to come to America, that's why I came,
    so God is with me." This was my conviction.
- speaker: Respondent
  text: Soon I saw a light coming toward me. I thought, "Oh, someone is coming towards me. He is smoking a cigarette. If I
    don't make use of this chance, I may not have another one." So I hurried down to the ground level. Well, this man was
    so surprised he started to run away.
- speaker: Respondent
  text: I suppose he felt very strange or something.
- speaker: Respondent
  text: I forgot now what I said, because I just couldn't let him go without answering my question. I didn't know how to say
    "moshi moshi" (Hello, Hello) in English, but I must have said something. In any case I said, "Where is East Hall?" Then
    he stopped running and came over.
- speaker: Respondent
  text: He said, "This is East Hall." He went up the stairs and knocked on the door. No one came to the door. He said, "Let's
    go around to the back." So we went back.
- speaker: Respondent
  text: We could see a light, but it turned out to be the moon light.
- speaker: Respondent
  text: He said that he was going to graduate from the university very soon. He was going to Library to study. He said that
    Dr. Litter comes here in the daytime to give lectures but he wasn't there in the evening. He said that he didn't know
    where Dr. Litter lived. But he could go to Library and find his address.
- speaker: Respondent
  text: I was really glad about it. I felt that God was still helping me. So I followed him to the library. He carried my
    luggage and walked over to the library. He asked me if I wanted to come in. I said that I would wait outside.
- speaker: Respondent
  text: There were a lot of young people coming to library to study. In a little while he found Dr. Litter's address and brought
    it to me. Then he said, "Let's go." He took me to his house. On the way over there he taught me many things, "This is
    YWCA where girls get together and have good time."
- speaker: Respondent
  text: Finally, he brought me to the Litters. Well, Mrs. Litter was so surprised. She said, "Oh, my! I wouldn't even walk
    through there in daytime! You mean you walked through there by yourself?"
- speaker: Respondent
  text: Well, finally the missionary wrote a letter saying that he should have taken me to the Litters personally. He apologized
    later on. But then things were over by that time. Everyone said that they were glad that I arrived there safely. I came
    to America with this strange experience.
- speaker: Respondent
  text: However, I wasn't that surprised, or afraid. Later on people told me, "You met many missionaries and you might think
    Americans were all like missionaries. However, there are many bad people, too. So you should not be walking around by
    yourself." So they didn't let me attend Japanese Association meetings for a long time.
- speaker: Respondent
  text: I was received into the Litter family. I should have asked the young man's name and address so that I could thank
    him later. I did ask his name though. He did say that his name was Dale. But that's all he told me, so I couldn't thank
    him later on.
- speaker: Respondent
  text: Mrs. Litter gave me a soup and gave me a bath. She knew that Japanese like to take a real hot bath. Then, I went to
    sleep. Mrs. Litter's house was destroyed by the earthquake, so she was staying at her friend's house. There was a white
    school girl from Fresno staying with them.
- speaker: Respondent
  text: So, I could not stay there with the Litters. They asked me if I would go to her sister's home in Fresno. Well, I couldn't
    say no, so I said "Alright." That is why I came to Fresno.
- speaker: Respondent
  text: When I came, they put me on the train in the evening. They made me a lunch and asked a conductor to let me off at
    Fresno, because there would be someone to pick me up. So I took the evening train again.
- speaker: Respondent
  text: When I arrived at Fresno, Mrs. Litter's older sister and daughter's husband who was a dentist, were there to meet
    me. After that I was safe and protected.
- speaker: Respondent
  text: At that time people used horse buggie. So on Sundays they used to take me to church. It took me about a year before
    I could go to Japanese church. I came here to go to school, so I asked them to send me to school. I had to insist on it.
    So they allowed me to go to Fresno High School. I did have to take an examination.
- speaker: Respondent
  text: However, things didn't go the way I wanted. So I was disgusted and finally I got married. I couldn't do things I wanted
    to, but I suppose my children could do what I wanted to do. I shoved all my burdens to my children.
- speaker: Respondent
  text: After I got married I really went through struggles.
- speaker: Interviewer
  text: What kind of jobs did you do when you were at the white people's house?
- speaker: Respondent
  text: The wife was about to give birth. They had three children and the 4th was being born. The baby arrived soon after
    I got there, so I had to take care of these three children. They had a Japanese cook, so I didn't have to do anything
    about cooking.
- speaker: Respondent
  text: I went to high school for less than 2 years. The reason why I quit is because I couldn't advance the way I wanted.
    When I thought about it, I couldn't graduate from school and go back to Japan as soon as I wanted. If I were to remain
    single, my mother in Japan would worry about me. So I decided to get married if there was an appropriate person.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: It was in 1910. I think about 4 years after I got here. I met him at church. My name was Toyo Ohta, so I became Kazato.
    He was a graduate of an agricultural school in Chiba Ken. There were a half dozen people who came from the same school
    and they farmed together. They created Doshi Nojo (Cooperative Farm) in Sangar and wanted to make a success of it. However,
    it didn't go the way they wanted.
- speaker: Interviewer
  text: Where did you get married?
