collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: At first, please tell me your name?
- speaker: Respondent
  text: My name is Maju Sakaguchi.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in 1895.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I am 80 years old.
- speaker: Interviewer
  text: Did you go to school when you were little?
- speaker: Respondent
  text: Yes, I did but as we were a farming family in the country, I did not go to school much. In those days my mother told
    me that a girl does not have to get much education but had better learn sewing and weaving. Nowadays schooling is important,
    but in those days I did not get much education.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He was a very gentle and quiet person, and was loved by everyone.
- speaker: Interviewer
  text: Was he a farmer?
- speaker: Respondent
  text: Yes, he was. As he had a big farm I helped out in the field once in a while instead of going to school.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was a very cheerful person. She came from a place named Matsuo. She did not have much education, either, so she
    worked in the field. She was a high-spirited mother and was loved by everyone. She died of cancer of the stomach when
    she was about 62 years old.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were 5 of us.
- speaker: Interviewer
  text: Were you the oldest?
- speaker: Respondent
  text: I was the third one.
- speaker: Interviewer
  text: Do you remember how you played when you were little?
- speaker: Respondent
  text: When I went to school I was honest and quiet so I was liked by everyone. I liked singing very much. In those days
    playing games was popular. The teacher called me, 'Maju Uemura, come here,' and we used to play games.
- speaker: Interviewer
  text: What kind of games did you play with your friends?
- speaker: Respondent
  text: After I came home from school I played all kinds of games with my friends.
- speaker: Interviewer
  text: Did you play in woods?
- speaker: Respondent
  text: I am afraid of insects, so I did not go to woods much. I didn't even go tea picking when it was the season to pick
    tea. I am still afraid of insects, so I do not pick tomatoes. My mother was the same way. My grandchildren took after
    me.
- speaker: Interviewer
  text: What kind of things do you remember about your childhood?
- speaker: Respondent
  text: When I grew older I attended a sewing school which was by the sea. When I saw the waves beat upon the seashore I could
    not keep my mind on the sewing as I wanted to swim. I was scolded by mother when I went home. She could see sure I swam
    as my face was sunburned and my hair was sandy. When I saw the ocean I wanted to swim so badly that I could not sit still.
- speaker: Interviewer
  text: About how old were you then?
- speaker: Respondent
  text: I think I was around 15 then.
- speaker: Interviewer
  text: Did you have friends?
- speaker: Respondent
  text: Yes, I had 5 or 6 friends who said, 'Let's swim.' So as soon as the teacher left we jumped in the sea.
- speaker: Interviewer
  text: Could you catch fish and shellfish?
- speaker: Respondent
  text: Yes, we could catch shellfish in our village. Fishermen used to catch fish. As we were farmers we did not have time
    to go fishing so my mother used to buy fish from the fishermen.
- speaker: Interviewer
  text: What other kind of things did you do for fun?
- speaker: Respondent
  text: When 5 or 6 friends got together we played jump rope, baseball and all kinds of games. As there was a big open space
    in front of our house children gathered there and played baseball and hide and seek.
- speaker: Interviewer
  text: How many years did you study sewing?
- speaker: Respondent
  text: Until I came to America.
- speaker: Interviewer
  text: How old were you when you came here?
- speaker: Respondent
  text: I was 21 years old.
- speaker: Interviewer
  text: Did you keep on going to sewing school every day after you became older?
- speaker: Respondent
  text: It was not a sewing school. About 10 girls went to the home of a sewing teacher in the village and learned sewing.
    I used to weave, too, when I was young. My older sister was a good weaver, so mother used to tell me that I should be
    able to weave as well as my sister did. I liked to weave, but mother told me that the cloth I weaved lacked luster.
- speaker: Interviewer
  text: Did you have fun during your girlhood?
- speaker: Respondent
  text: My parents were strict and did not let me go to a theater with other girls. I did not do anything wrong, but they
    were strict. It is good. Here, if my grandchildren want to go to a show, my daughter-in-law will let them go, but in my
    time my parents said a girl should not go to such a place.
- speaker: Interviewer
  text: Were you unhappy when you were told that you could not go?
- speaker: Respondent
  text: I did not go. Yet I was told that I could not go even though I cried as I was naive. Some of my friends went even
    if they were told not to go.
- speaker: Interviewer
  text: Did you associate with boys when you were young?
- speaker: Respondent
  text: In Japan, especially in the country, it was strict. I was told to go with an older person even to a bath-house at
    night. We did not do anything wrong but my parents were strict.
- speaker: Interviewer
  text: Were there any young people who did something wrong?
- speaker: Respondent
  text: Yes, there were. Two of my friends got in trouble. That is why my parents were strict.
- speaker: Interviewer
  text: What happened to them?
- speaker: Respondent
  text: They got pregnant without getting married.
- speaker: Interviewer
  text: What had become of them?
- speaker: Respondent
  text: They had abortion, I felt sorry for them.
- speaker: Interviewer
  text: Did both of them have an abortion?
- speaker: Respondent
  text: I think one girl who lived two doors from my house had an abortion. Her family raised many silkworms, and this girl
    worked till late at night picking mulberry leaves for silkworms. I think her mother was not strict. She became friendly
    with a man who worked for her family. She became pregnant but they could not get married, so she had an abortion.
- speaker: Interviewer
  text: What had become of that girl?
- speaker: Respondent
  text: She married late because of that. The man was adopted into another family.
- speaker: Interviewer
  text: Was the man from the same village?
- speaker: Respondent
  text: Yes, he was, and he worked for the family.
- speaker: Interviewer
  text: What else do you remember about your village?
- speaker: Respondent
  text: In Japan when it does not rain for a long time, people beat the drums and pray for the rain. I used to go and watch
    it. It was very noisy. When laying foundation for schools or other buildings, the villagers gathered and pounded the ground.
    I used to volunteer to help. We pounded the ground keeping time with songs. It was fun.
- speaker: Interviewer
  text: When you were young was there any young man you liked?
- speaker: Respondent
  text: No, there wasn't. I wanted to come to America, but my father tried to stop me saying, 'If you stay in Japan you can
    find a good husband, so you don't have to go so far away.' He was a man of old times so he must have felt pity for me
    when I wanted to go on a trip. He stopped me, but my uncle said it would be good for young people to travel and work hard.
    That is why I decided to come here.
- speaker: Interviewer
  text: How did you come to America? Was it by marriage?
- speaker: Respondent
  text: Yes, it was a picture marriage.
- speaker: Interviewer
  text: How were you matched?
- speaker: Respondent
  text: My father-in-law's mother lived near my house. She said her grandson should take me as a wife so started arranging
    a marriage. I hear that is how I came here.
- speaker: Interviewer
  text: Did Mr. Sakaguchi send you a photograph of himself?
- speaker: Respondent
  text: He used to come and visit his grandmother when he was little. My father told me that he was a bad boy when he was
    little, so I should not marry him as he might give me a hard time. I thought he might have been bad when he was little,
    but he might be good now. As I wanted to come to America I did not listen to my parents and came to America.
- speaker: Interviewer
  text: Why did you want to come to America?
- speaker: Respondent
  text: I thought America was a good country where I could make a lot of money and wear good clothes so I came here but it
    was my mistake.
- speaker: Interviewer
  text: Who was the go-between?
- speaker: Respondent
  text: Sakaguchi's aunt persuaded me to marry him. I said I might not be able to go as I had bad eyes, but she told me that
    if I go to the doctor my eyes would be all right, so I went to an eye doctor for a while. It took so long to get my eyes
    cured. My mother told me to give up going to America, but I did not want to give up after going to the eye doctor so long.
    Fortunately I passed the eye examination.
- speaker: Respondent
  text: Although we had met when we were little, it was just like a picture marriage. When I arrived in port I wondered which
    man was my husband. I heard him shout 'Is Maju Sakaguchi there?' so I answered, 'Here I am.' He must have wondered how
    I looked like.
- speaker: Respondent
  text: In those days I was very fat weighing about 130 pounds. When we came home his friends asked him, 'Did you meet your
    kami-san (wife)?' He answered, 'Yes I did.' 'How was she? Was she fat or skinny?' they asked. 'She was as fat as a ball,'
    he answered. He was displeased.
- speaker: Respondent
  text: My husband had a strawberry ranch then. His face was red and full of pimples. I thought he was drunk, but I found
    out that his face was sunburnt from working outside.
- speaker: Interviewer
  text: Were you 21 years old then?
- speaker: Interviewer
  text: How old was your husband?
- speaker: Respondent
  text: He was a year older than I, so I might have looked older than him as I was fat.
- speaker: Interviewer
  text: How did you feel when you saw your husband for the first time?
- speaker: Respondent
  text: I was surprised. I thought he looked nice, but his face was sunburned as he worked in the country. One woman received
    a picture of her husband taken when he was young. When she arrived here the man who greeted her was an old man so she
    was very disappointed. She did not say a word when she came out of Angel Island. I felt sorry for her. I still wonder
    what had become of her. There were many women like her.
- speaker: Interviewer
  text: Were there any picture marriages that did not go well?
- speaker: Respondent
  text: Yes, there were. I heard some women went back to Japan without getting married. There was no such case on the ship
    I came on. Some women eloped with another man. It was pitiful for either husband or the wife. People nowadays are fortunate.
    They can associate with each other and get married if they want to, or don't get married if they don't want to. But the
    picture marriage did not have such freedom.
- speaker: Interviewer
  text: The picture bride could not go back to Japan, couldn't they?
- speaker: Respondent
  text: No, they could not. They just tagged along with tears in their eyes. In the meantime children were born. Many people
    did not have a good time in their lives. My husband's parents and two sisters were here so I was loved by them. In those
    days there were many single men without families. My husband had a strawberry ranch when I came here.
- speaker: Interviewer
  text: Where was that?
- speaker: Respondent
  text: In San Jose. In those days we did not have a car. My sister-in-law's husband met me at the bus stop. When I asked
    where our house was he told me that the house with the lights on was the house of my father-in-law whom I had never met.
    After we passed by my father-in-law's house there was a beautiful house with a pretty garden. When I asked where our house
    was, he pointed to the house in the prune ranch and said that was our house. I said, 'Is that our house? It is in the
    wood, isn't it?' He said yes.
- speaker: Respondent
  text: When we came to the house many elderly women were cooking in the washtubs as they were going to have a party for me.
    I was surprised.
- speaker: Interviewer
  text: What were they cooking?
- speaker: Respondent
  text: They had turned bathtubs over and burning firewood under them and I cannot forget how they were cooking. I was embarrassed,
    as I was not pretty and was very fat. People used to say, 'Mr. Sakaguchi's bride is very fat.'
- speaker: Interviewer
  text: Was his grandmother there then?
- speaker: Respondent
  text: Yes, his grandmother and grandfather were there. He was summoned by his parents and so were his sisters, so it was
    a big family.
- speaker: Interviewer
  text: Around what year was that?
- speaker: Respondent
  text: His mother and sisters came about 3 years before I did.
- speaker: Interviewer
  text: What year did you come to America as a bride?
- speaker: Respondent
  text: I came here in 1916.
- speaker: Interviewer
  text: Did you go to San Jose?
- speaker: Interviewer
  text: Was your husband a sharecropper then?
- speaker: Respondent
  text: Yes, he was a sharecropper of strawberries.
- speaker: Respondent
  text: My husband's grandparents, parents, sister-in-law with 2 children were living in the same house. It was a big family
    but I became homesick and wanted to go home many times.
- speaker: Interviewer
  text: Did you want to cry?
- speaker: Respondent
  text: Yes, I did. I didn't know which direction Japan was, but I faced north and cried many times. As my husband had many
    sisters he was not too kind to me. We never went anywhere together.
- speaker: Interviewer
  text: What was the hardest experience?
- speaker: Respondent
  text: I came to America thinking it was a good place, but it wasn't. I thought I was punished for coming to America disobeying
    my parents.
- speaker: Interviewer
  text: You worked, didn't you?
- speaker: Respondent
  text: Yes, of course. I worked every day pulling weeds between strawberries. The days were long. In Japan we took a rest
    after working for a while until noontime, so it was hard.
- speaker: Interviewer
  text: What was your impression of San Jose when you first went there?
- speaker: Respondent
  text: I was not used to the work, so even after someone taught me how to do it, it did not work well. Yet I worked hard
    thinking I had to do what others are doing, and finally I became good at the work. Many times I was scolded by my husband.
    He used to holler at me, 'Hurry up we have to ship them!' We took the strawberries to the Farmers' Association. People
    worked fast as they were used to the work. I was very slow so I was ashamed of myself.
