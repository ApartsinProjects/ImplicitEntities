collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Do you remember about your childhood?
- speaker: Respondent
  text: My mother was a daughter of a descendant from town. I had one younger brother and sisters.
- speaker: Interviewer
  text: How far did you go to school?
- speaker: Respondent
  text: I studied the anatomy of the body for 2 years. At the same time I studied obstetrics. In those days we had to work
    at a hospital after we graduated from the school, so I did. I thought I would rather work in Tokyo than in the country,
    so I went to work.
- speaker: Interviewer
  text: Did you study nursing and midwifery at the same time?
- speaker: Respondent
  text: Yes, I did. I started working there promising that I would work there for 2 years, but I could not be on my own in
    2 years, so I worked for longer.
- speaker: Interviewer
  text: Do you have any episode as a midwife?
- speaker: Respondent
  text: There are some. At first I was marvelled at the human body, but in the course of time I learned a lot. I worked at
    all kinds of families, rich or poor. When I received a phone call, sometimes I went to that house by a car, rickshaw or
    walked. I had to be careful not to let the customer pay too much expense. When my doctor went to a poor family sometimes
    he had to pay from his own pocket. In those days there was no such danger. By that time I was physically and mentally
    ready. Only one time I was annoyed because the husband of the patient bothered my work. At one time I went to the home
    of a movie director as his wife was having a baby. He was in another room not worrying about her. We don't have to worry
    because her muscle would not shrink and she needed care.
- speaker: Interviewer
  text: Tell me the other episodes as a midwife.
- speaker: Respondent
  text: What I didn't like most was to be bothered when I was working. In those days after a midwife helped the childbirth
    she was hired to stay in that family for a week or two or sometimes a month or even a year. When I went to work at Prince
    Asano's residence I was told to stay. I had just come out from the country when I went to Prince Asano's. The head of
    the hospital was very strict about the language we used, so he made us practise speech. I also worked in the pharmacy
    of the hospital. The reason I went to Tokyo was to become a pharmacist.
- speaker: Interviewer
  text: What was fun when you were young?
- speaker: Respondent
  text: I didn't have fun as I had older sisters. When I was in grammar school I never played after I came home from school.
    I had a cousin but I had to work after school so I could not play. I was kind of rebellious as I had to work and could
    not play. I think mother was very strict.
- speaker: Interviewer
  text: Did you have any sad experience when you were little?
- speaker: Respondent
  text: I didn't have any sad experience when I was little as our family were wealthy and I was spoilt as a village master's
    granddaughter. When I was in grammar school, I did not have any sad experience.
- speaker: Interviewer
  text: Did you have any time to play?
- speaker: Respondent
  text: I had some time to play, but I was put to work when my friends came to play with me. I didn't like that, but I was
    resigned that mother wanted me to do that. When I became older I did not regret that.
- speaker: Interviewer
  text: What was your father's occupation?
- speaker: Respondent
  text: He was a farmer. He was the only son who had a weak stomach, so he led a life like a young retired man fishing. When
    he became healthy he worked more.
- speaker: Interviewer
  text: Did you have your own way when you were young?
- speaker: Respondent
  text: I was not allowed to have my own way, so I had to obey whatever my parents told me to do, or otherwise I could not
    get what I wanted.
