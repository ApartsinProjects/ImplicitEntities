collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I would like to ask you many questions today, so I would like you to answer them frankly and with as much detail as
    possible. Where were you born?
- speaker: Respondent
  text: I was born in Tokyo, but I moved around so much that I don't really know exactly where.
- speaker: Interviewer
  text: Where were you born Mrs. Fukuda?
- speaker: Respondent
  text: I was born in Kumamoto-ken.
- speaker: Interviewer
  text: When did you come to the United States?
- speaker: Respondent
  text: I came here in 1917.
- speaker: Interviewer
  text: Can you tell me something about your family in Japan?
- speaker: Respondent
  text: Well, my father came over here alone. My mother died when I was very small, so I was raised by my relatives. I had
    to work when I was in the 6th grade in elementary school. The reason I came to the United States was because my father
    called me. This is called "Yobiyose."
- speaker: Interviewer
  text: Are you a Nisei then?
- speaker: Respondent
  text: I am not a Nisei. I'm not a Kibei either. I am not a pioneer Issei. People like me were called Yobiyose, because we
    were brought over here by these Pioneers. But I call myself Issei because I did work with these Pioneers. I think I have
    been here for 52 years, since I came here in 1917.
- speaker: Interviewer
  text: Then you came here after the alien land law came into effect in 1913.
- speaker: Respondent
  text: When I came here, Japanese people could not buy land anywhere. I don't think Japanese people could even lease land.
- speaker: Interviewer
  text: What was your father doing then?
- speaker: Respondent
  text: My father was working as a share cropper in Oakland raising tomatoes and cucumbers. He worked for landlords and raised
    their crops. I think the rate was on a 50-50 basis. The reason my father came to the United States was to begin a business.
    My father brought canned goods and pickles from Japan and sold them in the Hayward area. It did not work out very well,
    so he had to quit. Then he began to work as a share cropper. When I came here things were not going very well. In fact,
    he even lost some money. You could lose money as a share cropper you know. Some years were good, but others were not.
    The year I came was not a good year, because he lost quite a bit of money the year before and he could not recover from
    it. So when I came to the USA, my father was working at a cannery, too. I was a houseboy in Walnut Creek and San Francisco.
    That was the pattern of my life during the early years in this country.
- speaker: Interviewer
  text: Did your father stay in the Oakland area all the time?
- speaker: Respondent
  text: No, he had to move around. It all depended on the availability of the jobs as a share cropper since it was on a yearly
    basis.
- speaker: Interviewer
  text: What about your work and schooling?
- speaker: Respondent
  text: I became a school boy in San Francisco. My wage was very cheap. I was paid $1.50 a week. My work was first of all
    to make breakfast for the family and then to clean up the kitchen. After that, I went to an English school for Japanese
    people located at the Pine Methodist Church. I would get home about 4:00 p.m. and do some chores. Monday was wash day.
    It was not like today; we did not have washing machines. So I had to boil tubfuls of water and wash them by hand. Tuesday
    was ironing day. Basketfuls of clothes were waiting for me. Wednesday I cleaned the yard. The fourth day I forgot now
    what I did. Anyway, I did all kinds of things like painting, cleaning house, and other odd jobs. On Saturday, at least
    for a half day, I had to clean the house. Sunday was my day off. I did not have to do anything. I had to pay $2.00 for
    tuition at school. I had to take a street car to get there. I guess I was there from the summer of 1917 to the next year.
- speaker: Interviewer
  text: When did you come from Japan?
- speaker: Respondent
  text: I came with my parents to the United States in 1922. However, we were classified as Hi-Imin (non-immigrant). My parents
    had a business, so I came as their helper.
- speaker: Interviewer
  text: Then both of you have backgrounds in business. When did you get married?
- speaker: Respondent
  text: It was in 1926. I don't think my wife had a background in business to speak of.
- speaker: Interviewer
  text: But her family had a business, right?
- speaker: Respondent
  text: We were in Wyoming, but we came back to Sacramento. My brother used to work for Aki Shoten, I think old timers know
    that store very well. Because he was in Sacramento, we came to live with him. We decided to settle down here.
- speaker: Interviewer
  text: Then Mr. Fukuda, where did you go afterwards?
- speaker: Respondent
  text: During summer vacation, I went to a farm to work. I had to accumulate enough money to go to school for the next school
    year. Most of the students used to do this. We used to look forward to this time to work. I used to go to the Oakland
    area to work. I also worked in a cannery in Monterey. I was able to accumulate a small amount of money and returned to
    San Francisco to go to school. Because of personal reasons, I left the home where I was a school boy and went to San Diego
    and worked in a nursery for a while. It was owned by Japanese people, but my work was just like a school boy. I went to
    elementary school there, too. I must have been 19 years old at that time. The owner of the nursery sold his property and
    went back to Japan. So I had to go back to San Francisco. There I did some house work. Then the summer came, so I went
    to San Jose and worked for a nurseryman again. At that time my father came back to the USA, bringing back his second wife.
    Well, I worked for about a month and a half with my father. As I felt that I still had to go to school, I left my father's
    house again and went back to San Francisco. I spent several years doing these things. The problem between Japan and the
    USA began to worsen. About that time I was planning to go back to Japan. Well, you see the situation in the USA was not
    that good. We could not obtain citizenship, and we were ill treated. I wanted to go back to Japan, since I had not been
    back for a while. Just at that time I was injured, so I missed the opportunity. You see, I had to spend quite a bit of
    money for my injury.
- speaker: Interviewer
  text: Well then, how did you meet your wife?
- speaker: Respondent
  text: You see, I was a member of the Presbyterian Church in Sacramento (It's your church) and he was a member of the Baptist
    Church, and he used to come over for meetings. I belonged to the Fujinkai. It did not amount to much, but old and young
    ladies got together and made tea for the people who attended the meetings. Well, he began the drug store at that time
    on 3rd and N Streets. (There is no building there anymore.) There is nothing there anymore. He lived in the store and
    a man living near the store whose name was Mr. Nakama, a member of the Presbyterian Church, became the "Nakaudo" for him,
    and the parents of Rev. D. Toriumi became the "Nakaudo" for my side, because they were just like my parents. Mrs. Toriumi
    was my sewing teacher and I almost lived there. That's how the discussion about our marriage advanced.
- speaker: Interviewer
  text: Then when did you come to Sacramento?
- speaker: Respondent
  text: Well, as share cropper in Oakland, I think it was cucumbers that I raised. I did not lose money nor did I make too
    much. I wanted to go to town and begin a business. There was a man by the name of Tagawa in San Lorenzo. He told me that
    if I wanted to go to Los Angeles, I ought to look up Rev. Nishimura. So I found him in Los Angeles. The first floor of
    his house was a chapel, and the second floor was a boarding house. Many people stayed there. So I decided to stay with
    him. I began to learn something about faith at that time. After that I came up to Sacramento as I used to know a man who
    lived in the lower area of the Sacramento River. I thought I had better study English for a few more years, so I went
    back to high school. I did not learn too much because I did not have a good basic education under my belt. In the beginning
    it was OK.
