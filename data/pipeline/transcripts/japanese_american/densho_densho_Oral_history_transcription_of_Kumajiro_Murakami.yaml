collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Kumajiro Murakami.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Yamaguchi-Ken, Japan.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I will be 94 in March 1975.
- speaker: Interviewer
  text: What was your father like? Was he strict?
- speaker: Respondent
  text: My father was not strict.
- speaker: Interviewer
  text: Was your mother strict?
- speaker: Respondent
  text: No, she was not. My father drank quite heavily and he died rather young. His work was hard too. In those days, farmers
    inhaled a lot of dust while thrashing rice. My father developed pneumonia. My grandfather lived until he was 94 years
    old.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were seven of us.
- speaker: Interviewer
  text: Where were you from the eldest?
- speaker: Respondent
  text: There were five boys and two girls. I was the fourth from the eldest. My brothers and sisters have all passed away.
    Some died during the last war. Some were house building carpenters and some were ship building carpenters. They were in
    Tokyo during the war and got killed by the bombing. One lived in Taiwan (Formosa) and died in an accident while working
    at a sugar factory. My elder brother owned a hotel. He and his wife went to a show one night, when it started to rain,
    he ran home and died soon after he reached home from a heart attack. He was still in his twenties. He went to live in
    a city because he did not like farming.
- speaker: Interviewer
  text: Did you attend school in Japan?
- speaker: Respondent
  text: I only went four years because I had ear trouble from swimming a lot. We lived near the sea. About that time, many
    Japanese started to come to Hawaii. I was among that group.
- speaker: Interviewer
  text: Did you go to sea a lot?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Did you do fishing?
- speaker: Respondent
  text: I didn't do much fishing but I played in the water. My ear trouble started from a lot of diving. I came to Hawaii
    and became very ill with a high fever. I got some kind of an infection. I was treated by doctors and got well. The fever
    might have killed the bacterias. I never had ear trouble since.
- speaker: Interviewer
  text: Did you like to go to school? Do you remember your school days?
- speaker: Respondent
  text: Yes, I remember some things.
- speaker: Interviewer
  text: What do you remember?
- speaker: Respondent
  text: It was a long time ago and the elementary schools were four years. I memorized arithmetic by poems. I liked it and
    I was good at it. I liked to go to school.
- speaker: Interviewer
  text: Was your teachers kind?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: What did you enjoy most while you were in Japan?
- speaker: Respondent
  text: In the summer, I liked to play with boats in the water. And in the winter, I enjoyed going to the mountains to chop
    wood and build bonfires. One brother was a boat carpenter and one was a house carpenter.
- speaker: Interviewer
  text: Your father was a farmer. Was he good at carpenter work?
- speaker: Respondent
  text: He had many children. Some helped the farm and some were carpenters.
- speaker: Interviewer
  text: Do you remember any war while you were in Japan?
- speaker: Respondent
  text: Yes. I was 15 years old when war broke out with China. I wrote a letter to the government asking them to let me go
    as a soldier but was refused because I was too young. The war ended after I came to Hawaii.
- speaker: Interviewer
  text: Where were you when the Russian-Japanese War broke out?
- speaker: Respondent
  text: I was over here.
- speaker: Interviewer
  text: When did you leave Japan?
- speaker: Respondent
  text: I think it was in Meiji 31 (1898).
- speaker: Interviewer
  text: Is it 1898 here?
- speaker: Respondent
  text: I think it was.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I think I was about 17 years old.
- speaker: Interviewer
  text: What did you do until you came to Hawaii?
- speaker: Respondent
  text: Helped on the farm and attended school too. Sometimes, I played on the way to school and ate my lunch at the blacksmith's
    place. Sometimes, I went by the beach and played there.
- speaker: Interviewer
  text: What did you do in Hawaii?
- speaker: Respondent
  text: I worked in the sugar cane field. For about 3 years, we had a contract with a sugar refining company to grow sugar
    cane. We did not have enough rain in those years and the crop was bad. We made just enough for room and board. I decided
    it wasn't worth staying there so I wrote to a hotel in Honolulu to find out if I could come to Mainland America. The reply
    was that I could so I went to Honolulu by myself, stayed there few days and came to America.
- speaker: Interviewer
  text: How long did you stay in Hawaii?
- speaker: Respondent
  text: I stayed about three years.
- speaker: Interviewer
  text: On the steamship to Hawaii from Japan, were all the passengers headed for Hawaii?
- speaker: Respondent
  text: There were other foreigners on the ship, too. It was an American steamship named "Sonoma." I think it took one week
    from Hawaii to Mainland America.
- speaker: Interviewer
  text: How long did it take from Japan to Hawaii?
- speaker: Respondent
  text: It took over 10 days.
- speaker: Interviewer
  text: Did anything happen on the ship?
- speaker: Respondent
  text: No, nothing happened. They used coal in those days. I helped move the coal to the boiler room because it was more
    fun than doing nothing on the ship. When I landed in Hawaii and while I was waiting for transportation to a small island,
    I caught typhoid fever. It took about 12 hours to the other island. As soon as I got there, I entered the company hospital
    because I was very sick with high fever and dysentery. Many other Japanese were there and every day about three persons
    died from the disease. There was a very kind nurse. She fed me with cooked rice liquid. I was one of the fortunate ones.
    I got well and my ear got well, too. I went through many hardships.
- speaker: Interviewer
  text: What kind of hardships did you go through?
- speaker: Respondent
  text: In Hawaii, it wasn't too hard. We had a contract with a sugar refinery and we were on our own. Some laborers had a
    watchman on a horse—one watchman to about 20 men. If anyone was slow, the watchman used a whip on him. One of my friends
    got angry after he was whipped. He fought with the watchman (white man) and was put in jail for about a week. We took
    food to him every day.
- speaker: Interviewer
  text: What time did you start work in the morning?
- speaker: Respondent
  text: We started at 6 A.M. and worked til 4 P.M.
- speaker: Interviewer
  text: Were there something interesting in Hawaii?
- speaker: Respondent
  text: I guess it was horse racing. I owned a horse myself. I raised him from a pony and I rode to work on him. One day,
    we decided to race my horse with a Portuguese man's horse. We went to other horse races and made bets, too. There were
    some fun but there were dangers, too.
- speaker: Interviewer
  text: What kind of dangers?
- speaker: Respondent
  text: I suffered a disease with high fever, fell from the horse, and etc.
- speaker: Interviewer
  text: When you came to America, where did you settle?
- speaker: Respondent
  text: I came to San Francisco on the steamship "Sonoma." It took one week then.
- speaker: Interviewer
  text: Where did you go from San Francisco?
- speaker: Respondent
  text: I came to Watsonville because I had relatives here.
- speaker: Interviewer
  text: What did you do after you arrived here?
- speaker: Respondent
  text: I went to work on my relative's strawberry farm. My sister-in-law's brother operated the ranch. He was in the reserve
    in the Japanese Army and had to return to Japan to fight a war. I think it was the Japanese-Russian War. My older brother
    from Japan came to operate the farm.
- speaker: Interviewer
  text: Did Japan call on reserves who were here in this country?
- speaker: Respondent
  text: Yes, they did. I remember sending him off at Palo Alto station with a Japanese flag in my hand.
- speaker: Interviewer
  text: Were you able to wave Japanese flags?
- speaker: Respondent
  text: Yes, in those days we could.
- speaker: Interviewer
  text: Was the work very hard?
- speaker: Respondent
  text: Some work was hard—such as sugar beet work. Picking up potatoes wasn't easy but I don't think it was that hard.
- speaker: Interviewer
  text: You came to Watsonville and didn't you move to anywhere else?
- speaker: Respondent
  text: I was in Sur near the sea just south of Monterey for a while. There was a place where lime was dug out. I worked there.
    We transported the lime in a wagon from the hillside and transferred the big barrels to a boat which took the lime elsewhere.
    There were about 30 Japanese men working there and I cooked for them. I remember there was a whole side of beef hanging
    from a ceiling which I took pieces of meat to use. Some men worked on road construction. I remember hearing dynamite blasts
    when they were breaking rocks.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: I think I was there about half a year.
- speaker: Interviewer
  text: Where did you go from there?
- speaker: Respondent
  text: I came back to Watsonville to grow strawberries.
- speaker: Interviewer
  text: Did you buy a farm?
- speaker: Respondent
  text: Yes, I operated a farm.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: I got married in 1909.
- speaker: Interviewer
  text: How did you get married?
- speaker: Respondent
  text: My mother in Japan selected the bride.
- speaker: Interviewer
  text: Did you know her before?
- speaker: Respondent
  text: I knew her when she was a little girl.
- speaker: Interviewer
  text: Were you happy when you got married?
- speaker: Respondent
  text: I think I was.
- speaker: Interviewer
  text: Was she in Watsonville?
- speaker: Respondent
  text: Yes, I went to meet her in San Francisco when she arrived and brought her to Watsonville.
- speaker: Interviewer
  text: When did you have children?
- speaker: Respondent
  text: In a few years.
- speaker: Interviewer
  text: Did you say your child was taken to Japan?
- speaker: Respondent
  text: Yes, he was taken over there to study but returned to United States in couple of years. He was the eldest and died
    rather young.
- speaker: Interviewer
  text: Did you succeed in strawberry farming?
- speaker: Respondent
  text: It wasn't too bad.
- speaker: Interviewer
  text: How big did you farm?
- speaker: Respondent
  text: One patch was 21 acres and another was 20 acres. Strawberry plants are good for three years.
- speaker: Interviewer
  text: Do you keep on planting?
- speaker: Respondent
  text: It's not good to plant in the same place continuously. We alternate places to plant. Lettuce grew very well where
    old strawberry plants were pulled out.
- speaker: Interviewer
  text: How many children did you have?
- speaker: Respondent
  text: I had two boys (sons) and three girls (daughters).
- speaker: Interviewer
  text: Did you say one son died early?
- speaker: Respondent
  text: Yes. The other son lives here.
- speaker: Interviewer
  text: How did you do during the Depression?
- speaker: Respondent
  text: I didn't feel it too much because everything was cheaper then. In 1915, I got a place which was 50 acres and there
    were a lot of tall trees on it. I had the trees removed with powder. I had around 10 men working for me then. They used
    horses to remove the stumps. I grew more strawberries that year thinking I would make money because of the "World Fair."
    I was disappointed because people did not buy that much. It was a five partner enterprise and we lost money. We broke
    up partnership. I started a small farm again and gradually regained my losses.
- speaker: Interviewer
  text: During the 1933 Depression, what did you do?
- speaker: Respondent
  text: I did alright then.
- speaker: Interviewer
  text: When was the Buddhist Church here built?
- speaker: Respondent
  text: It was after I came here.
- speaker: Interviewer
  text: Were you friendly with the caucasians?
- speaker: Respondent
  text: I leased 50 acres from a caucasian and operated a farm near the airport. This was just before WWII. I had a house,
    several working men's quarters, barn, tool shed and etc., total of 11 buildings. I left everything when we evacuated.
    Some mean people pointed guns at us after the war broke out. I had strawberries near the ocean, too. The army built fences
    all along there.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked by the Japanese?
- speaker: Respondent
  text: I was shocked.
- speaker: Interviewer
  text: Did you think the Japanese were in danger?
- speaker: Respondent
  text: Yes, I did. I thought the Japanese in Hawaii would be killed.
- speaker: Interviewer
  text: Did you think you were in danger?
- speaker: Respondent
  text: I didn't think we were because we were not in Hawaii.
- speaker: Interviewer
  text: Did you think the United States government would do something?
- speaker: Respondent
  text: I didn't think so but someone shot a gun from the road.
- speaker: Interviewer
  text: Did you go to an Assembly Center?
- speaker: Respondent
  text: We went to Salinas Assembly Center and then to Poston, Arizona WRA Center. We used a lot of fertilizer and had some
    very nice strawberries growing that spring. We had to leave everything and it was a big loss. I had quite a few people
    working for me too.
- speaker: Interviewer
  text: How did you feel when you entered the Assembly Center?
- speaker: Respondent
  text: There were so many of us in the same situation, we couldn't grieve. It wasn't very nice.
- speaker: Interviewer
  text: How was the food?
- speaker: Respondent
  text: Food was alright. We had enough.
- speaker: Interviewer
  text: Were there any unpleasant incidents?
- speaker: Respondent
  text: I didn't think so. We weren't lonesome because there were so many of us. There were inconveniences. The toilets were
    bad. I'll never forget. We had no right to complain.
- speaker: Interviewer
  text: Did you line up to go to mess halls?
- speaker: Respondent
  text: Yes, we did. It was better in the Relocation Center.
- speaker: Interviewer
  text: How was it in Poston?
- speaker: Respondent
  text: It was better. We had a lot of water, had swimming pool and etc. The weather was very hot—around 102 degrees.
- speaker: Interviewer
  text: Did you work in the center?
- speaker: Respondent
  text: I helped the cook. In between our work, we picked up nails (which was dropped by the carpenters when building barracks)
    from the sand and built an entertainment stand from scrap of lumber.
- speaker: Interviewer
  text: What was your hobby?
- speaker: Respondent
  text: I carved birds from wood. And I was a good rice cooker.
- speaker: Interviewer
  text: Were you about 60 years old when you entered the camp?
- speaker: Respondent
  text: Yes. I didn't have to work too hard.
- speaker: Interviewer
  text: Did you do any "Shigin" (Japanese poetry singing)?
- speaker: Respondent
  text: Yes, I did. I have done this about 20 years.
- speaker: Interviewer
  text: Did you do any "Go" or "Shogi" (Japanese chess game)?
- speaker: Respondent
  text: No, I didn't. I had a set but I gave it away.
- speaker: Interviewer
  text: Did you sign the "Loyalty" questionnaire?
- speaker: Respondent
  text: It was for the Niseis. I didn't have to.
- speaker: Interviewer
  text: What did you think of Niseis being put in camps?
- speaker: Respondent
  text: It wasn't good but I thought it couldn't be helped. Many Niseis went into the U.S. Army from camp and were sent overseas.
    My eldest son wasn't taken because he had skin trouble. He died in Chicago. The other went into service.
- speaker: Interviewer
  text: Did you think it was alright for Niseis to go into the army?
- speaker: Respondent
  text: Yes, I thought so. After the war was over, I couldn't farm by myself. I made an appeal to have my son discharged.
- speaker: Interviewer
  text: When did you leave the relocation center?
- speaker: Respondent
  text: '[No answer in transcript]'
- speaker: Interviewer
  text: Did you return directly to California?
- speaker: Respondent
  text: No, we were in Chicago about 6 months.
- speaker: Interviewer
  text: Did you lose your son then?
- speaker: Respondent
  text: No, he died after that. He remained in Chicago and worked as a bartender.
- speaker: Interviewer
  text: Did you work in Chicago?
- speaker: Respondent
  text: No, I stayed home and watched my grandchild. My wife and others went to work.
- speaker: Interviewer
  text: When you were cooking in Camp, do you remember anything that happened?
- speaker: Respondent
  text: There wasn't anything special. When I wasn't working, I went fishing in a river nearby.
- speaker: Interviewer
  text: Did you think Japan would win the war?
- speaker: Respondent
  text: There were all kinds of remorse. I didn't want Japan to lose but I didn't think they could win.
- speaker: Interviewer
  text: Were there people in camp who thought Japan would win?
- speaker: Respondent
  text: Yes, there were some.
