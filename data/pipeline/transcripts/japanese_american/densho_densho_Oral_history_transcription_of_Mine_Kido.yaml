collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I really appreciate this opportunity to ask you questions.
- speaker: Respondent
  text: Oh, whatever information I can supply you with, I'll do my best.
- speaker: Interviewer
  text: Oh, I really appreciate that. First of all what is your name, please?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Riverside, California.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: Were you raised there?
- speaker: Respondent
  text: I was raised there. I finished Jr. College there, too.
- speaker: Interviewer
  text: What kind of things do you remember in your childhood? Say in your elementary school period?
- speaker: Respondent
  text: What kind of things are you talking about?
- speaker: Interviewer
  text: Well, for instance, did you have to help your parents?
- speaker: Respondent
  text: Yes. My father had a restaurant so I had to help him. In fact, all the children had to help at the restaurant after
    school.
- speaker: Interviewer
  text: How long did you help?
- speaker: Respondent
  text: I worked there as long as I stayed in Riverside. I didn't work anywhere else.
- speaker: Interviewer
  text: When did you come home from school?
- speaker: Respondent
  text: I came home around 3:30 pm and worked at the restaurant and we all came home together so that would be about 9:00
    pm. In my high school and Jr. College days I had to do my homework after I came back from the restaurant, after 9:00 pm.
    Seldom was I able to do homework at the restaurant. Whenever a customer came in, I had to serve him.
- speaker: Interviewer
  text: How long were you able to study after that?
- speaker: Respondent
  text: Well, I'll tell you. My mother was so strict that she wouldn't let us stay up too late. We usually had to quit by
    10:00 or 10:30 pm, so we really didn't have much time to study. That's why I had to rush through my study and my lessons
    were not thoroughly prepared, you might say.
- speaker: Interviewer
  text: Did you like to study?
- speaker: Respondent
  text: Yes, I did. I was always provoked because my parents would not let me stay up late to study. You know I did rather
    poorly and did not speak English when I went to school first. So until the fifth grade my grades were very poor, because
    I only spoke Japanese. And then as I progressed I lost all my Japanese; I hardly remembered any.
- speaker: Interviewer
  text: When you entered elementary school, did you have any other difficulties? Do you remember any hardships or things like
    you didn't understand what the teacher was talking about?
- speaker: Respondent
  text: Yes. When I started kindergarten, it was terrible. I was very embarrassed.
- speaker: Interviewer
  text: Did you cry a lot?
- speaker: Respondent
  text: Well, I don't recall, but I was lonesome because I was the only Japanese. My schoolmates were all white, except for
    a few Mexicans and in my lower grades there was no Mexicans. In fact there was a special school where Negroes had to go
    to. Most of them lived in that district and they could only go to that school.
- speaker: Interviewer
  text: Do you remember any experiences of being rejected or discriminated against?
- speaker: Respondent
  text: Yes. I had just one or two people that I got friendly with and I retained them all through school. And well, I haven't
    seen one of my friends for quite a few years now. I understand that she still inquires about me if I am alright. I had
    a friend after I started driving. We used to come home together, I used to bring her home. But she used to be ashamed
    of driving in my old Ford with me. But I never thought anything of it because as friends we were alright. But it looked
    to me that she was ashamed of being seen with me in that car. Of course it was that old Model T and she used to shrink
    in the car. But then, she used to come and wait for me. We used to go to school together and come home together. It was
    in my high school.
- speaker: Interviewer
  text: Do you remember any happy occasions in your elementary school period?
- speaker: Respondent
  text: I had some good teachers. I liked my music teacher. I learned how to read notes from her. Then I had very nice teachers.
- speaker: Interviewer
  text: You were a very good student, weren't you?
- speaker: Respondent
  text: Yes, after fourth grade I got pretty good. In fact I graduated from high school on the honor roll. The grading then
    was very strict and with my English of course, I had a difficult time. My teacher in junior year in high school didn't
    like Japanese. But otherwise I could have gotten A in that course, but I didn't. We had what they called honor roll and
    honorable mention. The honor roll was for the first 10, and the honorable mention was the next ten. At that time I was
    in the honorable mention, I was number 17. And yet, my grades were 65% A's. I might have been on the honor roll if you
    are a girl because my class was all smart. If I were in the boys' high school I probably stood up higher. But then, most
    of my friends were smart. The first ten were way in the 90's. But then when I asked boys, the boys when I spoke to them,
    the boys' high school and girls' high school had joint graduation. For the first ten they were even 50% A's, so it didn't
    show how high up girls really were.
- speaker: Respondent
  text: And when I wanted to go to Junior college, my mother said that high school was enough. My father said that even if
    I went on to college, I wouldn't have a chance in America because especially if you were a girl, because prejudices were
    too strong, and we wouldn't get good jobs, especially teaching, because that was what I wanted to do. I wanted to become
    a language teacher. But my father didn't think that I would have a chance.
- speaker: Interviewer
  text: What kind of language did you want to teach? Japanese?
- speaker: Respondent
  text: No. Any foreign language, if I could get in. I took 4 years of Spanish and three years of Latin, besides four years
    of English in high school. And then when I went to Junior College, I took two years of English and two years of French.
    So my language background was adequate.
- speaker: Interviewer
  text: So your parents did let you go to Junior College.
- speaker: Respondent
  text: Yes, but I had to work like mad to go, because I should be helping. Well, I guess I should be helping, because my
    father was having a hard time. And there was a depression. See, I had a brother who was going to college, he was going
    to a Medical School. So it was pretty hard for my father. Especially since he had six children in the family and he was
    running his restaurant by himself. Of course my mother was helping, too. She started helping later in the year. I remember
    that when we started, he had several cooks. But times got harder, you know, and my father could not afford to hire cooks,
    so my mother became a cook. In fact she was better than most of those cooks.
- speaker: Interviewer
  text: I would like to go back to your younger time. What do you remember about sad events?
- speaker: Respondent
  text: Well, I'll tell you one thing that happened that made me feel bad and made me afraid of my neighbors. My father was
    fighting a case in court. He bought a house in John Hagen's name, my name, my sisters and my younger brothers' to show
    an alien father could buy land in the name of his children for the sake of his children. And it took him three years to
    fight that case and finally won. It happened when I was in second or third grade and until 1919, I think it went up to
    the State Supreme Court. He did win that a father could buy land in the name of his children. When I was going to school
    in those days, I used to be afraid to walk the street to go to school because kids made fun of me. In fact my sister and
    I used to walk pretty scared down the street. We always felt that they stick dogs on us because there were some dogs in
    our neighborhood. Any time we were walking down the street, you know, they started barking and chasing us. And then there
    was a nice lady who offered us a basket of fruit and my mother said, "Don't ever accept any food from neighbors." Because
    while the case was going on, you know, a delegation of neighbors came over and talked to my parents because they wanted
    my father to give up that property. They didn't want us living there. I remember when they came in. I was really afraid
    then. I think I was only around eight or nine years old. Then it was the time when my daughter went to camp. Maybe you
    should read up on the Harada Decision.
- speaker: Interviewer
  text: Do you think then this kind of feeling of injustice which was brought upon you by your white neighbors persisted on
    you for a long time?
- speaker: Respondent
  text: No. Funny thing is that except one neighbor, well, in fact there were two neighbors who lived across the street from
    us who never did differ. Yeah, people across the street from us never did get friendly with us. But the people who lived
    on our side of the street became very friendly with us. The lady who was most easy was a civil war veteran's wife, and
    she became a widow. My mother used to send her food. I remember my mother used to send a turkey dinner on Thanksgiving
    Day, and I think we were the only family who were doing that for this old lady next door to us. And then there were a
    couple of old ladies a few doors over. We became very friendly with them. Then the people on the other side, her husband
    was a barber and she used to be a beautician but she retired early. They were very nice to us. And then the funny thing
    is the family who were across the street from us were Germans, and yet they were the ones who were meanest, you know.
    And the lady who was at the corner, she was very persistent about us not living there. But, oh we found bad neighbors
    and good neighbors, too. But then they were across the street and we were never across the street, so we could not get
    friendly with them. We just didn't associate with them. Besides, my parents worked all day and were never home. We always
    came home at night. So... and then none of us ever ran around the neighborhood, because we weren't there, so they had
    no reason to be so vicious in their attitude toward us. I guess they just didn't like the idea of foreign elements coming
    in.
- speaker: Interviewer
  text: Maybe you could tell me about your parents.
- speaker: Respondent
  text: My father was a normal school graduate from Japan. And my mother, I think she had a hard time in Japan. She came from
    a Samurai family. When she got married to my father, my father suddenly decided he was teaching school in Japan and life
    was too confining there, so he agreed with his friends to join the US navy and came to America. So they worked on the
    Navy boat and he was on the coast guard cutter that went up and down the Pacific Coast. And then my mother and oldest
    brother who was Arlene's father, remained in Japan all the time while my father was in the Navy. That was in Fukuoka.
    I guess it was four or five years. My mother didn't join my father until my brother was 6 years old. I think he was 5
    or 6 when he came to America. He was born in Japan. Then my father who was on this coast guard cutter, but then, negro
    stewards in the navy were striking for higher pay. And then one time when the boat was in San Francisco, Japanese busboys
    and stewards had taken a day off and couldn't get back on the boat, packet people didn't let them. They were threatened
    that if they came back in, because those negros wanted to keep all the jobs for themselves. Because they were striking
    for higher pay and the Japanese figured that it was better than trying to ask for the higher pay. They were thinking of
    the chances. So Japanese and Negroes chased the Japanese away. That's how my father was not able to get back on the boat.
    Ever since then my father had been trying to get considered as a Spanish War veteran, because this happened around 1898
    and subsequent years. He also wanted to get citizenship. And then they told him finally around 1935 or 1938, anyway a
    few years before the war broke out they finally told him that he could have gotten citizenship if he served 13 more days.
    So he never got his citizenship. But never did he ever say that he didn't want his citizenship. He wanted it and he felt
    that he should have it because he was in the US navy at the time of the Spanish-American War. That's my parents' background.
- speaker: Interviewer
  text: Not very many Japanese were brave enough to fight things in court. He must have had guts.
- speaker: Respondent
  text: No. He had some good American friends and they told him to go ahead and fight it. And in my hometown there was a man
    who used to run that famous Riverside Mission Inn, Frank Miller, he told my father, "I cannot help you because I haven't
    means. But go to see my brother who will help you." So he went to see him. I think his older brother's name was Ed Miller
    and he went over to see Ed Miller and he said, "Sure go ahead and fight it. If you need money or if they try to take away
    your land from you, I'll buy it. Then you can live there." Then, he got an attorney and this attorney helped him to fight
    the case. So he got this attorney and got started it. I remember at that time that he appealed to the Japanese Association
    and Kenjinkai to help him out. They all said that they couldn't help him. So he went on his own. He didn't get anything
    from the Japanese community except from those who gave him moral support. You know it's different fame now because you
    have people like Edison Uno and others.
