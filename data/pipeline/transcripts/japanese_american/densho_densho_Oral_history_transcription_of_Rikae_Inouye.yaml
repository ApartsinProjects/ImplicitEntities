collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When I pronounce it.....
- speaker: Respondent
  text: It sounds like that when I feel embarrassed.
- speaker: Interviewer
  text: Are you comfortable?
- speaker: Interviewer
  text: First, will you tell me your name clearly?
- speaker: Respondent
  text: My name.....my birth place....
- speaker: Interviewer
  text: No. Your name.
- speaker: Respondent
  text: Rikae Inouye.
- speaker: Interviewer
  text: How do you write Rikae?
- speaker: Respondent
  text: I always use katakana. Many people use various kanji to write my name. I prefer katakana.
- speaker: Interviewer
  text: What does Rikae mean? No meaning?
- speaker: Respondent
  text: The meaning is that I was named after my grandmother. My grandmother's name was Rika. She gave her name to her youngest
    grandchild.
- speaker: Interviewer
  text: Where did it come from?
- speaker: Respondent
  text: I don't know. It was my grandmother's. I don't know where it came from.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: Mikemi-town, Nishiwa-county, Ehime-prefecture.
- speaker: Interviewer
  text: What kind of family are you from?
- speaker: Respondent
  text: Farmers. Not peasants. I was raised in a farming family. I like farming very much.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Ehime-prefecture. The same place.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: On the sixth of February.
- speaker: Interviewer
  text: In what year?
- speaker: Respondent
  text: '[unintelligible]'
- speaker: Interviewer
  text: You are seventy-five years old now.
- speaker: Respondent
  text: I've become seventy-seven now. February has passed.
- speaker: Interviewer
  text: What was your family religion? Buddhism?
- speaker: Respondent
  text: They were ardent Zen Buddhists. There have been temple or shrine officials in our family for generations. They have
    been taking care of lots of things. I guess they're doing that even now.
- speaker: Interviewer
  text: What do you remember about your family during your childhood?
- speaker: Respondent
  text: What impressed me the most is that our family was a farm family. When I was thirteen or fourteen years old, I wanted
    to dress up, seeing others in beautiful outfits. There were business families as well as farm families. I had my kimono
    ordered. My grandfather once said, "Farmers should lead a suitable life as farmers. Everybody wants to indulge in luxury.
    You can indulge in luxury without being taught, whereas you can't have a humble life unless you learn it during your childhood
    days. Since it is not good for you, I don't want you to indulge in luxury." I didn't appreciate that at the time. I'm
    leading such a humble life even now. I went back to farming twice after I came to the United States. I went out to farm
    in Washington. In those days, the humble life which my grandfather had told me about helped a lot. I was very grateful
    to him. I am grateful to him even now.
- speaker: Interviewer
  text: What kind of person was your father?
- speaker: Respondent
  text: My father was also a farmer.
- speaker: Interviewer
  text: What kind of reputation did he have?
- speaker: Respondent
  text: He was a village official for a long time. However, our family didn't like the role of village politician. Though
    they did a lot for the village, they didn't like to be politicians or committee members.
- speaker: Respondent
  text: Village politician wasn't a suitable position for a farmer. Every time the village meeting was held, my family pointed
    out that farmers should lead a suitable life as farmers. Though we weren't actively participating in village politics,
    our family members were village officials for a long time. We were loved by the villagers.
- speaker: Interviewer
  text: What kind of person was your mother?
- speaker: Respondent
  text: My mother was a bright woman. For my moral training... my father died when I was ten years old. I was the worst tomboy.
    After my father's death, my mother didn't want me to feel lonely. She said, "Don't be discouraged just because you don't
    have your father." Since the age of eleven, I had been learning tea-ceremony with a Buddhist priest, who was a teacher
    of tea-ceremony. It was meant for my moral training. Returning home, I was told that we didn't have time to have a tea-ceremony
    at home and that learning tea-ceremony was for my moral training. Whenever I was ill-mannered or vain at home, I was reproved
    for my bad manners. I had been learning tea-ceremony since the age of eleven. The priest attended an annual tea-ceremony
    held at the temple's headquarters. I was the youngest in the class at that time. The priest, school principal and the
    village chief's wife... I was the only child among them. My mother asked the priest to give me moral training among those
    people rather than the tea-ceremony itself. Being lonely and by myself, I invited three or four friends to form a group.
- speaker: Respondent
  text: Yes. I thank my family.
- speaker: Interviewer
  text: How far did you go in school?
- speaker: Respondent
  text: There weren't any girl's schools in our village then. There was a 6-year elementary school and a 2-year junior high
    school. I attended an evening school with my friends for one year. I had never attended a girl's school.
- speaker: Interviewer
  text: What do you remember about your junior high school or elementary school days?
- speaker: Respondent
  text: Our school life was based on moral training.
- speaker: Interviewer
  text: It was based on moral training?
- speaker: Respondent
  text: I wasn't good at History or Geography. I was fond of listening to the lecture in the Morals course. Female students
    learned all of the manners for females. I liked them, but I didn't like the academic subjects.
- speaker: Interviewer
  text: What kind of interesting things occurred?
- speaker: Respondent
  text: It had fun every day. At the time of graduation, I felt lonely after the commencement exercise. Opening the window
    on the second floor, I saw the school building. I cried by myself.
- speaker: Respondent
  text: Missing the school, I cried. I loved it very much.
- speaker: Interviewer
  text: You must have liked your teachers.
- speaker: Respondent
  text: Yes. All of the teachers were kind.
- speaker: Interviewer
  text: You missed them.
- speaker: Respondent
  text: I missed the school, which was full of love. I wasn't good at athletic meets or school hiking trips. My legs were
    weak since my childhood days. While climbing a mountain, our teacher said, "Rika, you're great" and held my hand. I am
    grateful to the teacher even now. I wanted to go with the others.
- speaker: Interviewer
  text: What about sad happenings or things of that nature?
- speaker: Respondent
  text: I had nothing sad in my life. My life was full of love. I thank my home life, which was full of love. Being raised
    in a home with love, I had never heard of speaking ill of others behind their backs. When my parents talked about their
    problems... the problem of "ukeban" and various problems.
- speaker: Interviewer
  text: What's ukeban?
- speaker: Respondent
  text: Ukeban. You help somebody to get a loan by giving them your seal on. He gets loan from a bank. The problem always
    arose and my parents talked about it. They soon stopped their discussion, saying, "We don't have to talk about such a
    thing in front of children." They didn't talk about problems concerning others in front of children. Our home was sweet,
    a home of love.
- speaker: Interviewer
  text: After your father's death, your grandfather.....
- speaker: Respondent
  text: My grandfather was an adopted son. My grandfather and grandmother didn't have any children. There were three brothers
    in my grandfather's family. His younger brother was adopted by somebody. His youngest brother was adopted by him to succeed
    to him. My grandfather's youngest brother and my mother succeeded to my grandmother's surname. Including my grandfather
    and grandmother, everybody was living happily together at home. We loved one another. I had my grandfather. He was a nice
    grandfather.
- speaker: Interviewer
  text: What were you taught in the way of religious education?
- speaker: Respondent
  text: Our religion was the Zen sect. I'm sure you know most of what there is to know about it. Speaking of religious education,
    I was told that I shouldn't be impolite or ill-mannered in any way. My parents and grandparents always said to me, "You
    shouldn't do anything bad. Heaven knows, the earth knows, and people know about it." It's a good saying. I don't know
    if they meant God by Heaven. I'd heard of Christianity for the first time after I came to the United States. Buddhism
    was popular.
- speaker: Interviewer
  text: Heaven knows.....and what?
- speaker: Respondent
  text: Heaven knows. Heaven knows about it at first. Heaven knows, the earth knows, and people know about it. Though it may
    not seem likely on the surface; Heaven, the earth and people all know about it. You yourself will know about it eventually.
    My grandmother was in the habit of saying so. I think it is a good saying. Heaven was God for my grandmother. I'm not
    sure. She may have just considered Heaven to be God. I had only a Buddhist education.
- speaker: Interviewer
  text: When did you marry?
- speaker: Respondent
  text: My marriage. There was some problem about it. My family, having some family property, had a certain amount of cash
    assets. A problem arose then. Though I wasn't married, I was betrothed to a brewer's family.
- speaker: Respondent
  text: A sake brewing family. They were prosperous. I was betrothed to their son who was attending a school of commerce.
    I got married there. I kept the books for the store for three years. My husband was still in school, so the relationship
    between us wasn't like that of a couple for three years. I wasn't interested in marriage. Going back home, we didn't have
    anything to say to each other. That is because our parents decided for me to stay at their home. The family was from outside
    the village. They weren't native villagers. They were a sake brewing business family. They built a two-storied storage
    house. Their business was prosperous. My family, trusting that family, betrothed me to them. Their business didn't go
    well because of the high liquor tax. The liquor tax was several thousand yen. They couldn't pay it. Being unable to pay,
    they went to my family for help. They had my parents give them their seal and got a loan from a bank. Both of my parents-in-law
    were kind to me. They asked me, "If you have a talk with your grandfather, he may give his seal. Will you go and talk
    to him?" I, being just out of school, was seventeen years old.
- speaker: Interviewer
  text: Seventeen years old?
- speaker: Respondent
  text: Yes. It was soon after I had graduated from school. Being asked by me, my grandfather didn't have any choice. He gave
    his seal right away. It was three thousand and some hundred yen in those days. It was a long time ago. A few people, feeling
    sorry for them, loaned them five hundred yen. They received a sum of one thousand yen. The bank loan was two thousand
    and several hundred yen. Later on, we found out that they were deceivers. They took advantage of my grandfather. He, giving
    the seal of the Miura family, had taken full responsibility. He asked them to write a deed for payment. But they didn't.
    People started saying that, if the Miuras, though they've been deceived, are still placing their daughter there. That
    means the Miuras are receiving some grand money. My father caught such rumors. He didn't receive any money from them.
    It was incredible then. God, I can never forget it. My parents-in-law kept me as a hostage for money. I didn't know that.
    My own family didn't know that, either. Being farmers, they didn't have any contact with business people. Later on, we
    found that they were deceivers. Deceivers are good at deceiving people. They were always kind to me. I once had a dangerous
    experience. When their liquor business was about to go bankrupt, their younger daughter, their son was ten and their daughter
    was eight. The older ones were in school. All of the brothers and sisters-in-law were attached to me. They decided to
    apprentice their 10-year-old son to a priest, for he didn't like fish. They said, "If you take him, he'll go there." I
    had a dangerous experience. I took him to the temple for an apprenticeship. It was dangerous.
- speaker: Interviewer
  text: What kind of danger were you in?
- speaker: Respondent
  text: The danger of rape. Some men were there. In Japan, people sleep together beneath mosquito nets. I wasn't doubtful
    at all. It was incredible. Feeling something strange, I woke up. I got out of the mosquito netting. I spent the night
    outside the temple till morning. I appreciated the fact that the man had gone already. I had been told to come back home
    by my family. Since my in-laws were kind to me, I didn't want to go back to my family. I made up my mind then. I had enough
    to speak up about if I should encounter any problems. I said, "Let me go back to my family. I don't feel well." Then,
    I went back to my family. That was the end of it. I tell this only to you. I had never told this to my family. My life
    has been protected by the Lord through our minister. I'm not sure, but it seems that the Lord, or love was protecting
    me. They schemed to extort money after attacking me. Once a girl is attacked, you know. It was a chance for them. I never
    returned to them after that. My father-in-law often visited me to see how I was feeling. I didn't see him, declaring that
    I wasn't feeling well. My mother was a bright woman. She always had a live-in manservant. She went to pick up my belongings
    with the manservant. I thank the Lord even now for having protected me at that time. He protects even a non-believer if
    one is righteous. I believe I'm saved and protected by the Lord Jesus Christ because my grandfather's home was full of
    love and he took care of others. As a rental payment, peasants delivered a lot of rice in the fall season. My grandfather
    didn't take it all. He packed some rice in a sack and told the farmers to eat it for dinner. My grandmother loved to drink.
    She heated sake and served it to the peasants with side dishes. They, being satisfied, went back home. My grandfather
    didn't take all of the rice. He packed some to the peasants. We called that "ono" or paying one's rent in goods. We treated
    the peasants in such a way. I believe that in return for my grandfather's good deeds, I've been unconsciously protected
    by the Lord and that's why I'm here today.
- speaker: Interviewer
  text: What happened with the loan?
- speaker: Respondent
  text: My family was responsible for the whole thing, for we'd given our seal. It was two thousand and several hundred yen.
    Two people loaned five hundred yen each, one thousand yen altogether. Our family was responsible for two thousand and
    several hundred yen in those days.
- speaker: Interviewer
  text: Did your family pay for it?
- speaker: Respondent
  text: My grandfather knew if he had bought more farms, he would have to pay more taxes. Owning more than one cho of farmland
    was enough. It was better to buy forest whenever it was available, for the taxes were less. It takes ten years for kunugi
    or a kind of oak to grow, ten years for a pine tree, and fifty years for a cedar. When we cut down the trees, we had to
    pay a lot of income tax. But the tax on forest land wasn't as much as the farm tax. We had a big cedar mountain. Once
    each generation or once every fifty years... During my elder brother's era, we had trees big enough to cut down. Sell.
