turns:
- speaker: Respondent
  text: Yes. I was taken from Japan... Then I went to Cincinnati directly. My husband was working as a cook at Mr. Julian's
    house who was a statesman. By the time we returned there, he had been elected as the Secretary of the Treasury. It was
    a Christian home, and whenever an important thing occurred, he invited a pastor to his house to pray for the family and
    did something after that.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: I'm afraid that I can't pronounce clearly, because I don't have any teeth... I am now under dental treatment.
- speaker: Interviewer
  text: That's all fine. I can understand.
- speaker: Respondent
  text: I was born in Osaka-fu. My husband Tomita was born in Nara and I am used to thinking myself from Nara, since I came
    to America. Whenever I was asked where I was from, I unconsciously answered that I was a Nara-Ken jin (a person from Nara
    Prefecture).
- speaker: Interviewer
  text: Did you also come here as a bride?
- speaker: Respondent
  text: Well, when our marriage was arranged, Tomita was in Yakima, which was a little bit more interior from Seattle. He
    came back to Japan to take me. We got married in autumn, 1920, and left for America in the spring of 1921 by boat. Then
    we went to Yakima and worked as farmers for eight years before moving to the suburbs of Seattle.
- speaker: Interviewer
  text: Before asking, I had better write your names down. Your name is...
- speaker: Respondent
  text: Oteshi. 'Oteshi' means useful.
- speaker: Interviewer
  text: And your name is...
- speaker: Respondent
  text: Shigeru Hidaka.
- speaker: Interviewer
  text: There is also a man named Hidaka who is a friend of my father and living in Kagoshima. Are there a lot of surname
    Hidaka where you came from?
- speaker: Respondent
  text: Yes, there are quite a few of them, even if there is no family relationship. A list of the people who graduated from
    a school and went abroad was sent to me once. In it, I saw quite a few Hidakas.
- speaker: Interviewer
  text: What was the most impressive experience you have had in Japan while you were young?
- speaker: Respondent
  text: When I was little, I was very sickly. I was sickly for a while even after coming to this country. My mother said that
    I had been always suffering from diarrhea and troubled her a lot. When I was nine years old or so, I got pneumonia and
    had to have a leave of absence from school for one year. I was so pale, and almost dying. At school, pupils said that
    I had consumption, and did not come close to me. They used to make fun of me and leave seats.
- speaker: Respondent
  text: This is the most impressive memory I remember now. It was a miserable experience, but I began to lead a religious
    life because of this. Later, I finally got tuberculosis. From suffering this, I got to know Jesus Christ, and it is my
    testimony.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: One of them is when I went to Minatogawa in Kobe area, which is famous for Masashige Kusunoki (a historically famous
    and brave samurai). I felt that it was a very nice place, and that impressed me. Another impressive memory is when I went
    to Osaka, taken by my grandmother to see a plane fly for the first time in Japan. The airplane fell to the ground, but
    I thought that Osaka was also a nice place. These are my memories that I was impressed so much by.
- speaker: Interviewer
  text: How about you, Mrs. Tomita?
- speaker: Respondent
  text: I hardly had a hard time in Japan, so I don't have any particular memory to talk about except one. I remember this
    clearly although I was very young at that time. My father went to the Russo-Japanese War. I heard that he had been to
    the Sino-Japanese War, too, before I was born in Meiji 29 (1896). It was in 1904 and 1905 that the war occurred. In Japan,
    at that time, people were not supposed to cry in public even when their family member went to war, because it was supposed
    to be an honor to fight for the country as a loyal man of the Emperor. Even so, we used to cry secretly within our home
    and go to a shrine to do Ohyakudo-mairi, to pray for his coming back safe. All the family members who were able to walk,
    used to go to the shrine every day by turns. When my father was fighting in Russia, I was only seven years old and just
    started going to elementary school. When my turn came, I used to go to the shrine to do ohyakudo.
- speaker: Interviewer
  text: What is ohyakudo?
- speaker: Respondent
  text: Ohyakudo means that we go around a shrine a hundred times alone praying for a thing. We go around the shrine building
    once first, then we go to pray at the shrine to return our father safe from the war. Then we go around the building again.
    We repeat this a hundred times.
- speaker: Interviewer
  text: This is what we call ochyakudo. Therefore, I felt, although I was too little to understand, that a war was an awful
    thing. I often saw my grandmother and my mother crying in secret. On the contrary, when we sent him to the war with our
    villagers, we used to hurrah joyously, singing songs and saying that it was a happy event. To my little heart, it seemed
    very strange, and I wondered which was true at first. After we sent him to the war, I had to do ohyakudo-mairi to pray
    for his safety. This made me realize that a war was a very sad and awful thing because we didn't know if he could survive
    or not. I felt strongly the sadness of a war.
- speaker: Interviewer
  text: What happened to your father?
- speaker: Respondent
  text: He came back safe. How happy I was when he came home! I still remember it. All the people of the village went over
    on the outskirts of the village to meet him, and indeed this time everybody was happy, drinking, and singing loud. Yes,
    I keenly realized how awful a war would be, and would never forget the experience. Later, when I got older, I have encountered
    wars some times, including the World War II, 30 years ago. The bitterness of wars sank into my mind through these so deeply
    that I really think that we should not make a war any more.
- speaker: Respondent
  text: My father, after coming back from the war, often told me that we had to win the war by all means once we started it.
    I asked him why. Then he said, 'Those who lost a war could not say anything even if they were treated awfully by those
    who won. They have to stand all the unreasonable things, while the side that won the war can do anything bad.' To think
    of his words, he was wrong. Although Japan lost the World War II, America didn't do anything so bad, did it? I realized
    that he was wrong. Even if they won a war, they should not kill or hurt innocent women. I think the Japanese military
    at that time was...
- speaker: Interviewer
  text: How about you, Mr. Oteshi?
- speaker: Respondent
  text: When I was in the sixth grade of elementary school, a teacher took us, totally three classes, to the downtown of Hiroshima
    to show new buildings and novel things such as illumination, since we didn't have an opportunity to see them where we
    were living. We visited Chinretsukan Museum, which became later the only building remained standing after the atomic bomb
    was dropped over the city while everything else was burned to ashes. The building was made by reinforced concrete, and
    the iron frame of a dome of the building remained as it was. Last year, I went to Japan and visited the place, which reminded
    me of those days when I was young.
- speaker: Interviewer
  text: Do you have any memory when you were little or going to school?
- speaker: Respondent
  text: There is a memory about the time when I finished schooling. All my cousins entered Jogakko (Women's high school),
    and I couldn't because my family was poor. I used to cry whenever I saw my friends going to Jogakko wearing a hakama,
    which was a symbol of Jogakko students. I wished I could have gone. I was so sad.
- speaker: Interviewer
  text: How many members were there in your family?
- speaker: Respondent
  text: There were nine. When my father was 47 years old, he became blind because of a cataract. For eight years after this,
    he had tried everything to recover his sight, going on a pilgrimage to Shikoku or consulting a doctor in Kobe. He lost
    his sight anyway. We became poorer and poorer after this, so I couldn't have so much schooling, just for four years.
- speaker: Interviewer
  text: They had seven children, didn't they?
- speaker: Respondent
  text: No, they had six children and a grandmother. I was the third child from the top.
- speaker: Interviewer
  text: How many boys did they have?
- speaker: Respondent
  text: They had four boys.
- speaker: Interviewer
  text: Therefore, they had two girls, didn't they?
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had eight brothers and sisters, and I was the second child. The eldest child was a girl, then me, and seven more
    children under me; a boy, a girl, a boy, a girl, a boy, a girl and a boy. Totally nine children they had, four boys and
    five girls. Two were killed by a war, and one died from illness. At the time when I went back to Japan, six years ago,
    six children including me were still alive. They said it was very rare to find a family where six children were still
    alive and got together. Two years ago, my direct younger sister died, so at present five children are remaining.
- speaker: Respondent
  text: A memory of my school days was a sad one. My mother was a sickly person, maybe that was because she had had nine children,
    one after another, and her body got weaker. She suffered from every kind of trouble. When she was about to recover from
    one disease, another one was getting worse. Every part of her body was in trouble, and even a doctor was amazed at her.
    She was pale at the time. Therefore, I keenly felt that nothing was more precious than health. When I was a student, I
    lived in a dorm. I usually didn't think of her when I was there, but whenever I was coming home on a vacation, I always
    hoped to see her in good health. However, she was always pale and taking medicine. Since I was a teenager, I was always
    thinking that I would have been the happiest girl if only my mother had been well.
- speaker: Respondent
  text: With her health, she survived until after a few years that I got married, and came to America. In those days, they
    used to get married very young, so she was not at such an age to die. She died before 50 years of age. I still think that
    being healthy is the most valuable thing for human beings. That was the only worry for me when I was young.
- speaker: Interviewer
  text: Is there anything else to talk about when you were a pupil?
- speaker: Respondent
  text: In winter just before I started my schooling, my uncle who was three years older than I, took me to his school to
    show me literary exercises. I can't forget this. It was before the opening. The room was in pell-mell with the audience
    and those who were decorating programs. There was a charcoal brazier in the room. It so happened that I was pushed by
    the crowd into the tall brazier, and my head was in the hot ash. Fortunately the ash was not burning, but it was very,
    very hot. The whole room was in an uproar, and by the time when I was pulled out of the brazier, my knees and arms were
    burnt severely.
- speaker: Respondent
  text: Feeling too hot, I scratched the burns with my hands, not knowing that it was a bad thing to do because of my ignorance.
    Then the skin got peeled and dangled from my body, which I felt and knew, although I couldn't see. They guessed that I
    had to have my head treated as soon as possible, otherwise I should be bald-headed. I ran back home crying bitterly, since
    it was not far away from school. It was an evening already and dusky. Seeing me, my mother almost fainted with the shock,
    and lost her head. The neighbors recommended that juice of a plant would do very well for a burn, but my mother would
    never listen to them. She thought that she had to take me to a doctor to receive proper treatment. She thought that it
    was her duty to raise me safe and fine for herself while her husband was away in America. She also felt that she had to
    raise a fine man to hand to her husband when he came back and that it was her fault if I got bald-headed.
- speaker: Respondent
  text: The San-in district where I was born, was cold, as you know. It was also snowing that night. She covered me with a
    cloth completely, and took me all the way to a doctor. The doctor was an old and hot-tempered man. He made his wife boil
    phenol hurriedly after deciding to wash my head with it. He held me down and began to scrape the skin of my head roughly
    with gauze soaked in hot phenol. The pain was so strong that I struggled very hard to escape from him, throwing his tools.
    Finally I was pinned down by three people. He scraped the skin completely grinding his teeth, and bandaged my head firmly.
    Every day for 45 days, she had taken me to the doctor, because he had to wash my head every day to prevent the pores of
    the skin from being crushed and shut. She covered my head completely with a hood to protect my head from the wind, and
    carried me, who was seven years old, every day for 45 days.
- speaker: Interviewer
  text: Isn't that something? Then the New Year's Day came.
- speaker: Respondent
  text: Living in a rural village, we used to celebrate it, gathering and having gochiso (a big dinner) together. They served
    mochi (rice cake), and I liked mochi very much, but the mochi served to me didn't stretch long enough as it should have,
    and snapped off when I stretched it. I looked at the other's mochi, but theirs did not snap off and stretched very long,
    making a thin string. 'What's wrong with my mochi?' I complained. My mother told me later that she had cried hearing this.
    The reason was that it was bad for my skin of my head to eat very starchy mochi or oily fish like sardines.
- speaker: Respondent
  text: With her great care, my head recovered completely like this. I really thank her, and that impressed her very much.
    My mother used to tell me persistently, 'Your father is in America now, and I have to raise you for myself having a hard
    time.' 'Tell me if you want anything, I'll get it by all means.' 'You must not do bad things.' 'You must never rob anything
    of others.' 'Study hard.' Therefore, on the first day of elementary school, when our teacher asked us to write something
    on the blackboard, I was the only one that could write letters. I wrote my name in katakana (the square form of kana--Japanese
    syllabary), and was praised by the teacher. There was nobody else that was able to write letters. In this way, I began
    to like school, and finished my schooling until junior high, elected as a class leader every year.
- speaker: Respondent
  text: When I was in the fifth grade, my mother suffered from purpura, and was almost dying. Her hair fell off completely.
    We even asked a priest to do leave-taking ceremony. Worried, I didn't study at all, and because of that, my school grades
    suddenly dropped tremendously. Anyway, with her encouraging me, I graduated the Junior high school safely. Though I was
    not so sharp, teachers appreciated my gentle personality. Well, this may sound like a boastful account of my own experiences,
    but this is what I experienced.
- speaker: Respondent
  text: Yes, that's right. Mr. Hidaka and Oteshi are very precious persons in our church now.
- speaker: Interviewer
  text: Mr. Otoshi, do you have anything else to talk about?
- speaker: Respondent
  text: Well, I just remember that I was a naughty boy when I was a pupil.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: Well, I was not talkative at all. I knew that I could not win a quarrel, so I always struck the first blow. I was
    called a scuffler.
- speaker: Interviewer
  text: Were you strong?
- speaker: Respondent
  text: Although I was small, I was good at fights. When I was a pupil of elementary school, I was very good at Judo and gymnastics.
- speaker: Interviewer
  text: Before coming to America, what did you think about this country?
