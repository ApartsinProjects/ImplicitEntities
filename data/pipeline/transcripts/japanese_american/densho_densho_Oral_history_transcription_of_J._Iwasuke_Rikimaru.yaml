collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: To begin with, please tell me your name.
- speaker: Respondent
  text: Rikimaru Iwasuke. I was given a Christian name Joseph, so I
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Fukuoka Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: On December 23, 1891. I am 83 years old now.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had 3 brothers and 3 sisters.
- speaker: Interviewer
  text: Where do you stand among your brothers and sisters?
- speaker: Respondent
  text: I am the second from the bottom.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: My father was a local leader. He worked as a village master, treasurer and assistant village master. He came from
    an old farming family which owned much land. He did not work himself but hired people to do the work, and he took care
    of the village.
- speaker: Interviewer
  text: Was your father a strict man or a gentle man?
- speaker: Respondent
  text: He was a gentle man, but when we did anything wrong he was strict.
- speaker: Interviewer
  text: Was he a religious man?
- speaker: Respondent
  text: Yes, he was. Our family religion was Shinshu.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: She came from a neighboring village. She, too, was from an old family, and she was an ardent Buddhist.
- speaker: Interviewer
  text: Was she a gentle person?
- speaker: Respondent
  text: Yes, but she was also strict.
- speaker: Interviewer
  text: Have you ever been scolded?
- speaker: Respondent
  text: I seldom quarrelled with anyone, so I don't remember being scolded.
- speaker: Interviewer
  text: How much education did you have?
- speaker: Respondent
  text: After graduating from grammar school I attended a county agricultural school as the high school was too far from our
    village. I attended the agricultural school for 3 years. Then I came here. That year my older sister married a man who
    went to Japan looking for a bride, and came to America. His name was Rikimaru. As I was getting tired of the school I
    had him call me here.
- speaker: Interviewer
  text: What was your real name?
- speaker: Respondent
  text: It was Tatsuguchi.
- speaker: Interviewer
  text: Were you adopted?
- speaker: Respondent
  text: Yes, I was. They were old and did not have children, so they adopted me, but a child was born after that.
- speaker: Interviewer
  text: Did you like school in Japan?
- speaker: Respondent
  text: I didn't particularly like it or dislike it, so it went on smoothly.
- speaker: Interviewer
  text: Do you remember anything that happened while you were in school?
- speaker: Respondent
  text: I don't remember anything special. However, I remember I was put in a special class of mentally gifted children before
    I graduated from the grade school.
- speaker: Interviewer
  text: What do you remember that was fun?
- speaker: Respondent
  text: In those days there was nothing especially fun to do except to study and play.
- speaker: Interviewer
  text: Did you play on the hills?
- speaker: Respondent
  text: There was a hill in the village, and we went there to gather corn. My family was old and owned a lot of hills and
    fields so I went there to pick corn. We raised silkworm in our village. As our house was big my mother raised silkworm,
    so I picked mulberry leaves for silkworm. The property is still there. I went back to Japan about 3 times every 3 to 4
    years. My brother is 4 years older than I. He has two sons who have succeeded his work.
- speaker: Interviewer
  text: Was there a river or a sea nearby?
- speaker: Respondent
  text: Yes, it was near a sea, about 23 miles away. There was a branch of a river called Okawa in our village, so I used
    to play there.
- speaker: Interviewer
  text: Did you go fishing?
- speaker: Respondent
  text: Yes. I used to go and catch trout.
- speaker: Interviewer
  text: How did you catch them, by a net or a fishing rod?
- speaker: Respondent
  text: With a small net.
- speaker: Interviewer
  text: Did you have fun while you were in the agricultural school?
- speaker: Respondent
  text: It was a county school; students came from everywhere and I made many new friends. The capital of our county was in
    Togo, and my father was a member of the county assembly. As the school was also in Togo, father used to visit there often.
    That is why I attended the agricultural school.
- speaker: Interviewer
  text: As your father was a great man he must have treated the children well.
- speaker: Respondent
  text: He was not a great man, but a leader, so the children were also respected.
- speaker: Interviewer
  text: Looking back, do you think you had fun in your childhood?
- speaker: Respondent
  text: Yes. Every time I went back to Japan I went to the hills and fields where I used to play and recalled the olden days.
    Many of my friends have already passed away.
- speaker: Interviewer
  text: What kind of thing do you especially remember?
- speaker: Respondent
  text: I remember playing on the hills in the back of the house when I was in grammar school. I also remember going to the
    village office where my father worked and was treated for lunch.
- speaker: Interviewer
  text: Do you remember any special happenings in the village?
- speaker: Respondent
  text: When I went back there last time it had become a town combined with a few other villages.
- speaker: Interviewer
  text: Were there such things as the rice riot in your village?
- speaker: Respondent
  text: No, nothing like that happened. I think the rice riot happened after I came to America. As my father was a landlord
    the tenant paid bags of rice as land rent. There was a place under the front room to store rice.
- speaker: Interviewer
  text: Did you have fun at New Years?
- speaker: Respondent
  text: Villagers used to get together and played baseball with children.
- speaker: Interviewer
  text: Did you have good things to eat?
- speaker: Respondent
  text: In farmers' houses they used to eat millet, wheat mixed with rice or just white rice. In our family we ate white rice,
    or rice mixed with wheat as it was good for the health. Poor people used to eat millet, but not in our family.
- speaker: Interviewer
  text: Were there maids and servants in your family?
- speaker: Respondent
  text: When I was little we had maids and servants. I remember being taken to places on the maid's back. The servant pulled
    weeds in the field.
- speaker: Interviewer
  text: Was there any war?
- speaker: Respondent
  text: I heard about the Sino-Japanese War from my father, especially about the siege of a castle in Botandai.
- speaker: Interviewer
  text: What kind of thing did he tell you?
- speaker: Respondent
  text: I heard... I forgot. Mr. Onodera's grandfather led the troops in attacking the castle. My father used to tell me such
    stories after supper. My uncle (mother's brother) knew a lot about history, and when such people as he came to visit us
    he used to tell me stories about Takeda Shingen, Nobunaga and Ishida Mitsunari.
- speaker: Interviewer
  text: Did you like to hear those stories?
- speaker: Respondent
  text: Yes, I listened well.
- speaker: Interviewer
  text: Did you have ethics at school?
- speaker: Respondent
  text: It was an important subject in olden days. We used to learn moral lessons from the biographies of great people. One
    teacher encouraged us to save money. He taught us not to spend even a penny on useless things, but to spend as much money
    as we can for a useful purpose. He was a good teacher of ethics.
- speaker: Interviewer
  text: We don't have ethics now, but do you think we should have it?
- speaker: Respondent
  text: I think we should have it.
- speaker: Interviewer
  text: What kind of story do you remember?
- speaker: Respondent
  text: I remember about Takayama Hikokuro who was loyal to the Emperor. He used to worship the Emperor from the Sanjo Bridge
    in Kyoto every morning.
- speaker: Interviewer
  text: What other story do you remember?
- speaker: Respondent
  text: In olden days there were rebels against the Emperor. At one time they put the Emperor in a prison. Takayama Hikokuro
    pasted by a window a Chinese poem which meant that he was coming to rescue the Emperor, so don't be discouraged.
- speaker: Interviewer
  text: Did you learn about Ninomiya Sontoku?
- speaker: Respondent
  text: I learned a lot about him as he was a reformer of farm villages. As he was a representative of Japanese farmers we
    learned about him in the ethics without fail.
- speaker: Interviewer
  text: Did you learn about Japanese myth?
- speaker: Respondent
  text: Yes. Amaterasu Okami is supposed to have descended to Kyushu. I think the ancestor of the Emperor came from the Continent,
    and conquering Kumaso who were the natives went to Kyoto and ascended the throne.
- speaker: Interviewer
  text: How do you interpret the myth?
- speaker: Respondent
  text: In those days I didn't think it as a myth, but as a story of olden days. I thought it was the story of not gods but
    people who built our country.
- speaker: Interviewer
  text: Did you think that way from the beginning?
- speaker: Respondent
  text: I did not take it that way when I heard it, but later I came to interpret that way.
- speaker: Interviewer
  text: When you learned it at school did you accept it that way?
- speaker: Respondent
  text: Yes, I accepted it as I was taught.
- speaker: Interviewer
  text: Did you think Japanese schools were good compared to schools here?
- speaker: Respondent
  text: Yes, I think it was good. After I came here I attended a high school at night. Then I attended a business college
    before I began my career.
- speaker: Interviewer
  text: How old were you when you came to America?
- speaker: Respondent
  text: I was about 17 years old.
- speaker: Interviewer
  text: How did you happen to come here?
- speaker: Respondent
  text: My older sister got married and came here, so I had them send for me.
- speaker: Interviewer
  text: Did you want to come to America?
- speaker: Respondent
  text: I didn't have such desire at that time. I came here because my sister told me to come here.
- speaker: Interviewer
  text: What kind of a country did you think America was?
- speaker: Respondent
  text: I learned about Admiral Perry in the history, but I had a vague idea about America.
- speaker: Interviewer
  text: Did you think America was a nice country?
- speaker: Respondent
  text: Yes, I did. It started importing Occidental culture to Japan. Chinese culture came to Japan through Korea.
- speaker: Interviewer
  text: Where did the ship leave from?
- speaker: Respondent
  text: From Yokohama.
- speaker: Interviewer
  text: Do you remember anything about the ship?
- speaker: Respondent
  text: I was a third class passenger, so I was in the lower part of the ship.
- speaker: Interviewer
  text: Did you get seasick?
- speaker: Respondent
  text: Only one day. After that I got used to it. In those days we could not come straight to America. We came through Victoria
    and landed at Vancouver. Then we came to San Francisco by a ship.
- speaker: Interviewer
  text: What year was it? Was it around 1917?
- speaker: Respondent
  text: I was here when they had the Exhibition in 1915. Around 1915 I was a student in Sacramento.
- speaker: Interviewer
  text: What kind of people were on board the ship when you came?
- speaker: Respondent
  text: They were immigrants who came here to work. I was yobiyose so I was treated differently.
- speaker: Interviewer
  text: Were there any picture brides?
- speaker: Respondent
  text: That was much later.
- speaker: Interviewer
  text: Did you come here before or after the San Francisco earthquake?
- speaker: Respondent
  text: It was a little after the earthquake.
- speaker: Interviewer
  text: How did you feel when you arrived Victoria?
- speaker: Respondent
  text: I thought it was a fine city. In those days some parts of the...
- speaker: Interviewer
  text: About how many days did you stay at Victoria?
- speaker: Respondent
  text: I think I stayed there 2 or 3 nights. Then I went to Vancouver.
- speaker: Interviewer
  text: Where did you stay?
- speaker: Respondent
  text: I stayed at a hotel.
- speaker: Interviewer
  text: Was it a Japanese hotel?
- speaker: Respondent
  text: I think it was. I stayed at a Japanese hotel in Vancouver, too.
- speaker: Interviewer
  text: How did you go from the ship to the hotel?
- speaker: Respondent
  text: By a carriage.
- speaker: Interviewer
  text: How could you tell the driver where you wanted to go?
- speaker: Respondent
  text: I had a note that showed where I wanted to go.
- speaker: Interviewer
  text: Did you know the name of the hotel or did you ask someone?
- speaker: Respondent
  text: I think there were some Japanese.
- speaker: Interviewer
  text: How did you feel when you stayed there for 3 days?
- speaker: Respondent
  text: I thought it was a lot different from Japan. I was impressed by the spaciousness in Canada and in America.
- speaker: Interviewer
  text: Did you come to Vancouver by a ship?
- speaker: Respondent
  text: Yes. Then I went to Victoria by a ferry. From there I went to Vancouver and came to San Francisco by a ship.
- speaker: Interviewer
  text: How was San Francisco?
- speaker: Respondent
  text: It was after the great earthquake and there were ruins as far as I could see. A carriage took me to a Japanese hotel
    through the ruin.
- speaker: Interviewer
  text: About how many days did you stay there?
- speaker: Respondent
  text: About 2 to 3 days. Then my step-father came from Sacramento to pick me up, so I went to Sacramento with him. My sister
    was there. My step father was growing grape and strawberry.
- speaker: Interviewer
  text: Whereabouts in Sacramento was it?
- speaker: Respondent
  text: It was near Florin Road. I went to a grammar school there. I was quite big for a pupil, so the teacher helped me.
    I used to get up around 2 o'clock in the morning and brushed the horses and got them ready to be harnessed before I had
    breakfast. The horses had to be fed well as they worked all day.
- speaker: Interviewer
  text: It was hard, wasn't it?
- speaker: Respondent
  text: I was young I didn't think it was hard. After that I went to school.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Have you taken care of horses in Japan?
- speaker: Respondent
  text: We had cows but no horses. The servants did that kind of work at home, so I have never done it before.
- speaker: Interviewer
  text: Did you think you came to an awful place?
- speaker: Respondent
  text: I thought it was fun.
- speaker: Interviewer
  text: What time was the school over?
- speaker: Respondent
  text: At 3 o'clock.
- speaker: Interviewer
  text: What time did it start?
- speaker: Respondent
  text: At 9 o'clock. I worked before school and after school.
- speaker: Interviewer
  text: After I got older I quit that school and went to a school in town. As I got older I went to the market to sell strawberry.
- speaker: Interviewer
  text: About what time did you go to bed at night?
- speaker: Respondent
  text: I went to bed after supper, about 7 or 8 o'clock. When we were young we worked hard without complaining.
- speaker: Interviewer
  text: Did American children kid you when you went to school?
- speaker: Respondent
  text: They were kind to me. It was in the village, not in town, so people were friendlier. I made friends even though I
    could not speak English well.
- speaker: Interviewer
  text: Where did you go after you graduated from the grade school?
- speaker: Respondent
  text: I was young my foster father was afraid I would learn bad things, so he put me under the care of a pastor of a Methodist
    church in Sacramento. In winter I stayed at church and attended a night school.
- speaker: Interviewer
  text: Which school did you go to?
- speaker: Respondent
  text: Night department of a high school in Sacramento.
- speaker: Interviewer
  text: How long did you continue that kind of life?
- speaker: Respondent
  text: By and by I taught Sunday School at church. On weekdays I worked, but on Saturday I came to my room and studied Bible
    under the pastor. With that material I taught Sunday School. I served as a principal of Sunday School for a long time.
- speaker: Interviewer
  text: About how long did you live in Sacramento?
- speaker: Respondent
  text: Until 1941. My job was to take the strawberry from my foster father's ranch to the market and sell them. The buyers
    used to knock down the price, so I established a strawberry growers' association, and started to ship the strawberry to
    the East.
- speaker: Interviewer
  text: Around what year was this?
- speaker: Respondent
  text: I don't remember well.
- speaker: Interviewer
  text: Was it before or after the Depression?
- speaker: Respondent
  text: It was before the Depression.
- speaker: Interviewer
  text: Where was the market?
- speaker: Respondent
  text: On I Street in Sacramento, between the 3rd and the 4th Avenues.
- speaker: Interviewer
  text: Did only Japanese go there?
- speaker: Respondent
  text: People from different countries gathered there.
- speaker: Interviewer
  text: Was it mostly Japanese who brought strawberry?
- speaker: Respondent
  text: Yes, they were. There were strawberry and raspberry. I became friends with wholesale dealers, so I gathered the produce
    of those who could not sell, and asked them to sell the produce.
- speaker: Interviewer
  text: I liked to help people. Later, when the war broke out we had to be registered. I didn't want to go to war, but I said
    I would help, and I helped Japanese register at the county office.
- speaker: Interviewer
  text: What were you doing when you were around 20 years old?
- speaker: Respondent
  text: I was helping my foster father. I never had a business of my own as I had an idea that it was a shame to work for
    myself. I tried to work for the society. I did not have that kind of an idea at first, but I gradually came to think that
    way.
- speaker: Interviewer
  text: What were you doing during the Depression?
- speaker: Respondent
  text: I had moved from Sacramento to Livingston, and was working for the Grape Growers' Association and the Fruit Growers'
    Association. I also helped the Egg Plant Growers' Association in Cortez.
- speaker: Interviewer
  text: When did you move to Livingston?
- speaker: Respondent
  text: Before the Depression.
