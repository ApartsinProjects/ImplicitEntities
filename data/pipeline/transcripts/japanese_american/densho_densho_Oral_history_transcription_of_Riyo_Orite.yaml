collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: This project is meant for the Sansei and yonsei, who don't know about the Issei. Translating it into English, we'll
    make it available for them to read and understand what kind of hardship and pleasures the Issei had. You don't have to
    tell me anything extraordinary, but just about your daily life.
- speaker: Respondent
  text: Reverend, has this started recording already?
- speaker: Interviewer
  text: Yes. Don't worry.
- speaker: Respondent
  text: Speaking about the time I came here from Japan—I came here and landed in Seattle in June of 1914. My husband, then
    working for a railroad company, took me to Wyoming. On the way, we stopped at Ogden and stayed there a week, just for
    fun. Then, we got to (Warrence), Wyoming. Being in a foreign country for the first time, I couldn't understand the language
    spoken here. I felt sorry to have come to such a distant place in the countryside. Six other people were working with
    my husband. I was told to cook for them starting the following day. Knowing only Japanese, I couldn't understand anything
    said while I was cooking. Every time I heard English, I remembered Japan and felt lonely. I was eighteen years old then.
- speaker: Respondent
  text: I remembered my home and missed it. The people there ordered me to cook fried potatoes. But I didn't know what fried
    potatoes were. I asked a Japanese person, who had been there longer than I, what fried potatoes were. He told me that
    fried potatoes were something like Japanese 'Tempura.' I got used to the life there gradually. In the morning, I cooked
    'miso shiru' (a Japanese soup eaten for breakfast, which is made of soybean paste). We couldn't get rice easily at that
    time. I cooked hot cakes and fried potatoes.
- speaker: Respondent
  text: We rarely had a feast. We just had some fried potatoes with eggs. I fixed 'miso shiru' whenever we had rice. We usually
    ate American style meals. There were six people working there. The wage at that time was 15 cents an hour. The workers
    went to work at seven in the morning and came back home at five in the evening. They worked for ten hours. It would have
    their dinner prepared by the time they came back home.
- speaker: Respondent
  text: In those days, we were short of everything. We bought food about once a month. We traveled 300 miles to Ogden on a
    train to buy food once a month. It was a freight train for grocery items. Once in a while, Cal, Y Cane came over and we
    bought meat and vegetables from them. I repeated the same routine day after day. Wyoming is a large open plain. No matter
    how far you go, you don't see any growing trees. I looked at the sun reverently every morning and night. I just thought
    about my home.
- speaker: Respondent
  text: One night in October, I woke up—I’m not following the right sequence..?
- speaker: Interviewer
  text: That's all right.
- speaker: Respondent
  text: I got to Wyoming in June, around Memorial Day. People visited their ancestors' graves. We visited old people's graves.
    It got cold in Wyoming about two months later. Water freezes at the end of August there. Then, the winter season came.
    When I woke up during the night I saw something white. I was amazed to see such a strange thing. It turned out to be a
    rabbit. I had seen domesticated rabbits in Japan. I was surprised and gazed at them for a long time. I thought in my mind,
    'Rabbits and the moon are supposed to be related. My mother must be somewhere under this moon.' I felt lonely.
- speaker: Respondent
  text: I passed my days in loneliness. I cooked, washed and cleaned for the other people every day. A year later, our first
    child was born. Being busy with my daily chores, I gradually forgot about Japan. Our children grew up and reached school
    age. The company hired a teacher. Our children learned grammar or something in Wyoming. We wanted our children to learn
    Japanese. I was thinking of returning to Japan with our children.
- speaker: Respondent
  text: In 1927 a friend of ours, who was going to return to Japan, advised us to move here. There was a Japanese school here.
    Thus, we moved to Sacramento in 1927. Since there was a Japanese school here, we postponed returning to Japan. Our children
    attended the Japanese school. We were thinking of returning to Japan after their graduation from high school. However,
    we missed the opportunity to carry out our plan.
- speaker: Respondent
  text: Our children graduated from high school, and we started running a boarding house. Our customers were all Japanese.
    We came here in 1927 and around 1930 the Depression started. I'll never forget the Depression. One family couldn't afford
    shoes for their children to wear to school. Some people couldn't afford bread. The panic struck us.
- speaker: Respondent
  text: Running a boarding house, we couldn't inconvenience our customers in spite of the panic. We had a hard time in getting
    necessary commodities in sufficient quantity to sustain our business. Economic conditions were getting better by 1936.
    Having grown up, our children were taking care of themselves by that time. We just took care of ourselves. Around the
    time George graduated from high school, my husband died. It was in 1940. I was at a loss with my children. I had to cook
    for other people. My children, who were only students, couldn't help me. It was hard for me as a woman to run the business
    alone. On the other hand, I didn't know any other way to make our living.
- speaker: Interviewer
  text: How many children did you have then?
- speaker: Respondent
  text: I had three boys. My husband died in 1940. I had neither a successor for my husband nor an alternative business. If
    I hadn't run the business by myself, I and my children would have starved. In 1941, the war broke out. I felt more uncertain
    then than at the time of my husband's death.
- speaker: Respondent
  text: Hearing a lot of rumors from my customers every day, I felt uneasy. They tried to encourage me, but I felt helpless
    about the boarding house. I was procrastinating about closing my business. Then, the evacuation came along. The evacuation
    was awful. Because of racial prejudice, people threw rocks at us. I felt scared and worried. Most of the Japanese stores
    were closed down. I had to shop at a Chinese store in order to feed my customers. I had to pack my things. However, I
    was unable to do this as long as the customers remained. Finally, the evacuation day drew near.
- speaker: Respondent
  text: I asked the customers to move out ten days ahead so that I could set things right. The customers left ten days ahead.
    My smallest child was happy about moving to a camp. He was playing with the fruit trees in the garden. My children weren't
    any help at all. It was a free house with sixty rooms. I had to clean each room. Each bedroom was equipped with a bed,
    dresser, chair, bedspread, quilt and so on.
- speaker: Respondent
  text: I requested the government to pay $5 for each room. They didn't pay me that much. I said yes but that’s what they
    told me. I left the boarding house to them almost free of charge. It couldn't be helped. It may sound silly, but I only
    got paid $150 for a sixty room building. I had no choice. I decided to move to the camp with some of my personal belongings.
    One of my boys was working at a grocery store. He brought a truck from the store. We loaded our things on the truck and
    sent them to the camp. An inspector told us that we were going to be kept in the camp and that we weren't allowed to drive
    to the camp. He suggested us to hire a driver. We hired an Italian driver.
- speaker: Interviewer
  text: You didn't take a train, but went to the camp by yourselves?
- speaker: Respondent
  text: Since the camp was close, we sent our things to the camp on truck. We took a bus.
- speaker: Interviewer
  text: Everybody together?
- speaker: Respondent
  text: Yes. We went there. We were the very last Japanese people left in Sacramento. We had heard from various people that
    we weren't allowed to take knives and clothing. If you had too much, you would have to give up some at the camp. We were
    supposed to be provided meals in the camp. Therefore, I left all of my plates and dishes on the table. I regretted having
    left them home after I found out the true situation in the camp. It was too late. Thus, we got to the camp.
- speaker: Respondent
  text: I'll never forget that it was in the middle of June, on the fifteenth. On the 4th of July, we were moved to Tule Lake.
- speaker: Interviewer
  text: Where did you go at first?
- speaker: Respondent
  text: We went to Walerga. We didn't stay in Walerga longer than two months. We were transferred to Tule Lake on 4th of July.
    After dark, we were moved by train. We got to the Shasta Mountains toward dawn. I saw day breaking. We arrived at Tule
    Lake. We arrived at Tule Lake in 1942—at the end of 1942. We stayed there for less than two years. We were moved to Topaz
    next. There were only Japanese people there.
- speaker: Respondent
  text: There were lots of skilled people there, who started classes to teach various things. Topaz is located on reclaimed
    land and used to be a lake. So, we found a lot of shells. We picked up shells and worked on them. We made artificial flowers
    and pins for our dresses in one class. Before coming to the camp, I had to plan a menu and cook for the others. Thinking
    back, I enjoyed camp life. I didn't have to cook breakfast after getting up in the morning. Going back to my room, I didn't
    have to cook dinner. If it hadn't been during war time, life there could have been a paradise. A bath was made for us.
    Meals were served. We didn't have to wash dishes. It was as if we were millionaires. I had no idea what would happen to
    Japanese. However, I appreciated being able to lead such a life in spite of the war.
- speaker: Respondent
  text: I lived there with gratitude. There was an English class, sewing class and some other classes in the camp. You were
    free to choose any class according to your interests, which was nice. It may sound silly to tell you such a thing, but
    one highly educated married lady came to the camp. She said, 'You'd better learn English by all means. You won't stay
    here for good. When you have your own job, you will need English. When you eat out, you won't know how to order your food.
    You'd better learn English at any rate.' She advised us to study English. I decided to attend an English class. The more
    I began to understand, the more things I felt interested in. We stayed in Topaz till 1945.
- speaker: Respondent
  text: We came here from Richmond in October. In Richmond we were given an allotment, which wasn't too much, for a soldier's
    family. We were given a room. We had to work for our living. There were a lot of domestic jobs in Berkeley. I hadn't worked
    for others before. I started working as something like a trainee at first. One day a Japanese person, who owned a laundry,
    came and offered me a job. The pay was $100 a month. I preferred to work for a Japanese person. I worked at the Japanese
    owned place for a year.
- speaker: Respondent
  text: I'm not speaking in chronological order, but my son Henry was drafted although he had five children. He joined the
    armed force. I felt uncertain then. He joined the service from Topaz. It was in the midst of the war disaster, so that
    I was afraid he might not return alive. Everybody around me sympathized with me. The head of the camp felt sorry for me
    and suggested that I should write a letter to my son. The letter was delivered to him through Salt Lake City and the Red
    Cross. He answered. 'It's an order from the federal government. You have no choice. Don't say such a cowardly thing if
    you'd like to serve your country. I must go.' He was sent to Fort Oklahoma and got training for forty days. Finally, he
    was given an overseas assignment. He had a short leave at Topaz in order to bid us goodbye. He started to leave for somewhere
    overseas from Salt Lake City. I didn't know where he had been assigned. He wrote me that he was in charge of a cannon.
- speaker: Respondent
  text: The people in the camp encouraged me by saying that my son wouldn't die. But it was a war. By the time he'd finished
    his overseas assignment, the President of the U.S. died and the war was over. He was sent to Germany for a while and came
    back after a year or so. He returned to Topaz, and then to Richmond. He couldn't find any job here. Having five children,
    he couldn't loiter his time away. He investigated various job possibilities all in vain. His parents were in Hawaii. Then,
    his family moved to Hawaii. He got a government job in that field. After having lived in Hawaii for fifteen years, he
    came back to Richmond.
- speaker: Respondent
  text: His younger sister Yoshie's husband was drafted and joined the army from Tule Lake. During the war, he was sent to
    the New Guinea area. Meanwhile, the war had ended. He was sent to Japan and stayed there for six or seven years. They
    had a child. He called Yoshie and their child to Japan. They stayed in Japan for three years.
- speaker: Respondent
  text: He could have retired and received a pension if he had been patient a little longer. However, he believed it wasn't
    good for his child to move so often. He said he would have his own business after getting out of the service. Then, he
    resigned. He began his import business in San Francisco. The large established companies were doing their business on
    a large scale. He had to have a lot of cash. Being an import agent, he had to pay in advance for the goods ordered by
    his clients. He quit his business.
- speaker: Respondent
  text: One of my boys was running a market there. The boy was busy with his business in Los Angeles and here. He called Yoshie's
    husband and they started running the market together. They have been in the business ever since. I had had a lot of lonely
    experiences before that.
- speaker: Respondent
  text: My daughter said I was lucky because all of my children had been grown-ups and they didn't cause me any hardships.
    She was struggling with her small children in the camp. We cried together. We were put in different places according to
    family units. She was put in with her family and I was put in with my family. When we left.
