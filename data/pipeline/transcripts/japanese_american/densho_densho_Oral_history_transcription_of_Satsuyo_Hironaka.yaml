collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Will you please tell me your name.
- speaker: Respondent
  text: Hironaka Satsuyo.
- speaker: Interviewer
  text: And where's your home town?
- speaker: Respondent
  text: It is in Yamaguchi Ken, Iwakuni.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in Meiji 17.
- speaker: Interviewer
  text: Meiji 17? How old are you now?
- speaker: Respondent
  text: I am 90 years old.
- speaker: Interviewer
  text: You are in good health aren't you?
- speaker: Respondent
  text: Because I am well and working...I have worked very hard. The caucasian old ladies said, "How old?" when I worked.
    They were all surprised when I said, "80 years old." They were surprised to hear my age and said, "You are old, but that's
    all right." We must be working so that you can eat over here. It is rather comfortable now. (financially)
- speaker: Interviewer
  text: I'd like to ask you about the things in Japan. What did your mother and father do?
- speaker: Respondent
  text: My father's name is Suematsu, and my mother's Wasa.
- speaker: Interviewer
  text: What did your father do? What was his job?
- speaker: Respondent
  text: He was a farmer.
- speaker: Interviewer
  text: Did he own his land?
- speaker: Respondent
  text: Yes, he had a little bit.
- speaker: Interviewer
  text: What kind of a person was your father? Was he a gentle person?
- speaker: Respondent
  text: Well, nobody hated him. Our surname was Sekikawa and people in our village were often saying, "Sekikawa, Sekikawa,"
    so that they liked us. We took good care of people too when they came to ask us a favor. We could not say no. We don't
    have any education... We sure liked to take care of people.
- speaker: Interviewer
  text: Did you go to school in Japan?
- speaker: Respondent
  text: I did not go to school very much. I only went to a grade school.
- speaker: Interviewer
  text: Four years of grade school?
- speaker: Respondent
  text: Yes, four years. My parents wanted me to go, but my elder sisters... She had a child and she was pulling for wanting
    to take a child out. That's why I did not go to school very much.
- speaker: Interviewer
  text: Do you remember about the school?
- speaker: Respondent
  text: Well, not really, I remember some of the things.
- speaker: Interviewer
  text: Do you remember about your teacher?
- speaker: Respondent
  text: I know some of the names.
- speaker: Interviewer
  text: Was he a good teacher?
- speaker: Interviewer
  text: Was he kind?
- speaker: Respondent
  text: Yes, well...ah... I knew his name...
- speaker: Interviewer
  text: That's all right.
- speaker: Interviewer
  text: What things were fun or interesting to you when you were a little child?
- speaker: Respondent
  text: I only liked to talk to people while I was standing. I just like to talk. [laughing]
- speaker: Interviewer
  text: Was it a fairy tale type story?
- speaker: Respondent
  text: It was a tale, for instance, Fuji Mt., honey bee and so forth. It was when I was a child and I did not go to good
    school. So the stories were limited. The stories were about dogs or honey bees or crows.
- speaker: Interviewer
  text: Do you remember the stories now?
- speaker: Respondent
  text: Yes, only a little. The stories were, for instance, how high is Mt. Fuji or Was the crow dutiful to his parents? (oyakoko)
    and so forth.
- speaker: Interviewer
  text: Please tell me the story about the crow.
- speaker: Respondent
  text: The crows are dutiful to their parents because when children perch on a tree branch, they let the parents perch first,
    and the children will perch after the parents. It was said that a mother has authority over a child...
- speaker: Interviewer
  text: What kind of a story was the honey bee story?
- speaker: Respondent
  text: The honey bees also are dutiful to their parents because they gather honey and bring it home to the parents. The children
    were expected to be dutiful to their parents. Because we did not go to a good school, the stories we heard were only concerning
    about being dutiful to our parents. They expected us to be dutiful to our parents. They said, "Listen to parents." The
    stories were always this sort of thing. We don't have any education or anything. Just the stories of obligation to our
    parents. I did not go to school very much.
- speaker: Interviewer
  text: What kind of things were fun at the school?
- speaker: Respondent
  text: The stories. When I was a child, I talked so much that they said for me to speak, so I made up stories about Mt. Fuji,
    or honey bees and talked.
- speaker: Interviewer
  text: Did you tell any other stories?
- speaker: Respondent
  text: A story about a great wise Washington in America, who made epeds ark to his parents when he was a young boy, but everybody
    else wasn't. There weren't very many stories because I was still a child at that time.
- speaker: Interviewer
  text: What is your family's religion? Buddhism?
- speaker: Respondent
  text: Buddhism. It is Shinshu.
- speaker: Interviewer
  text: Was your father a very religious man?
- speaker: Respondent
  text: Yes, he was a very religious man. He liked to take care of people when they come for imposing requests.
- speaker: Interviewer
  text: The place you stayed, was it a town or village?
- speaker: Respondent
  text: I was in the country. We were farmers.
- speaker: Interviewer
  text: What kind of village was it? Were there many people?
- speaker: Respondent
  text: It was not a very big village. There were about 200 houses.
- speaker: Interviewer
  text: What did you learn at your school?
- speaker: Respondent
  text: I did not go to school very much. I learned some I RO HA. I did not go to a higher school because I had many sisters
    and brothers.
- speaker: Respondent
  text: Nine sisters and brothers.
- speaker: Interviewer
  text: What number were you?
- speaker: Respondent
  text: I am 6th. My sisters and I are old timers, and did not go to school. But my mother said we should know about I RO
    HA. Since my older sisters did not go to school, they said, "We did not go to school and they don't go to school." and
    they don't let me go. I just could not go.
- speaker: Interviewer
  text: Do you remember the thing about the war?
- speaker: Respondent
  text: I don't remember it very well.
- speaker: Interviewer
  text: What did you do before you married?
- speaker: Respondent
  text: Before my marriage?...I married very young...
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I was 17 years old.
- speaker: Interviewer
  text: Oh... 17 years old. How did you get married?
- speaker: Respondent
  text: Because both of us were MUKIYO (meaning not known by translator), we got married.
- speaker: Interviewer
  text: Was that Mr. Hironaka?
- speaker: Respondent
  text: Yes. It was Sekikawa.
- speaker: Interviewer
  text: How old was Mr. Hironaka?
- speaker: Respondent
  text: He was 17 years old.
- speaker: Interviewer
  text: Mr. Hironaka, too?
- speaker: Respondent
  text: No, I was 18 years old.
- speaker: Interviewer
  text: Oh, I see. He was 17 years old. You married young did not you?
- speaker: Respondent
  text: Yes, we were young. So it wasn't just a typical... [laughing]... We were still just like children then. We pretended
    to be like adults in those days.
- speaker: Interviewer
  text: When you married, you dated according to a match maker did not you?
- speaker: Interviewer
  text: What do you remember about the date? How did you feel about it?
- speaker: Respondent
  text: What things? But I don't remember the details.
- speaker: Interviewer
  text: Did you wish to get married at that time?
- speaker: Respondent
  text: Because it was NEKI (meaning not clear)... because we were a young couple...I did not give any thought to it, I did
    not think about it. I was young and I just got married.
- speaker: Interviewer
  text: Did you want to get married?
- speaker: Respondent
  text: Yes. It was a quiet marriage.
- speaker: Interviewer
  text: Were you happy?
- speaker: Respondent
  text: Yes, I was happy. Because I loved him.
- speaker: Interviewer
  text: Oh, You loved him.
- speaker: Respondent
  text: '[laughing] ...unintelligible...'
- speaker: Interviewer
  text: Did you know him a long time?
- speaker: Respondent
  text: Yes, ever since when we were children.
- speaker: Interviewer
  text: You were together!
- speaker: Respondent
  text: We liked each other.
- speaker: Interviewer
  text: Was that so.
- speaker: Respondent
  text: We played together for a long time. I was a year older, but we liked each other since we were children. We just played
    together without any intentions. When we grew up, we loved each other.
- speaker: Interviewer
  text: That is great!
- speaker: Respondent
  text: No matter what our parents said, it could not be helped when people are in love.
- speaker: Interviewer
  text: But you are the lucky ones that you could do something like that.
- speaker: Respondent
  text: Yes, I am happy. After I came over here, they said, "You are a lucky one, and there are no more luckier person than
    you." He was a year younger, but a rather wise man. After we came here, he worked at... [unintelligible]...
- speaker: Interviewer
  text: After your marriage, when did you come to America?
- speaker: Respondent
  text: When I came... I was 18 years old.
- speaker: Interviewer
  text: And you married and...
- speaker: Respondent
  text: I was married when I was 17 years old.
- speaker: Interviewer
  text: Did you come right away?
- speaker: Respondent
  text: Yes, right away. He came here at first.
- speaker: Interviewer
  text: Oh, He was here already.
- speaker: Respondent
  text: Yes, he came here right away. We had a child. We left the child alone, and four or five years later the child came
    here. The child was walking.
- speaker: Interviewer
  text: Then, your husband came over here after his marriage and came here alone.
- speaker: Respondent
  text: Yes, we were already married and had the child.
- speaker: Interviewer
  text: Was Mr. Hironaka in America before that?
- speaker: Respondent
  text: No, he was not. He came here after we were married.
- speaker: Interviewer
  text: So, you came here two or three years later.
- speaker: Respondent
  text: Yes, I followed him.
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: Sacramento.
- speaker: Interviewer
  text: Did you come to Sacramento straight from Japan?
- speaker: Respondent
  text: Right, straight.
- speaker: Interviewer
  text: What did you think about America?
- speaker: Respondent
  text: I remember quite well. America was not that great, but when I left Japan, my father was hanging down from the Meats
    and said, "Don't stay too long in America. Come back and see me while I am well." I recall the incident once in a while.
    And that was that.
- speaker: Interviewer
  text: Was that the end of it?
- speaker: Respondent
  text: Yes, that's all. I did not go back to Japan and could not see him after all. Because I remember the last words, I
    did try to go to Japan, but I just could not do it. I thought, when I have saved two thousand dollars, I will go to Japan.
    But that two thousand dollars I could not make.
- speaker: Interviewer
  text: And, what did you do after you came to Sacramento?
- speaker: Respondent
  text: A farmer. We had an orchard, and used a lot of people, around 20 to 30, and we hired a cook. I did not go out and
    stayed at the ranch. Meantime, I had a child and I could not do the work. We hired a cook because we could not handle
    20 to 30 people's meals.
- speaker: Interviewer
  text: When you left Japan to come to America, did you come by ship?
- speaker: Interviewer
  text: What do you remember about the things in the ship?
- speaker: Respondent
  text: Oh, because I was seasick, I could not pay attention to anything else. I was on the deck all the time. I could not
    eat for ten days, but I remained calm. They offered me food to eat, but because I was seasick I could not eat. About five
    days later we came to Seattle. The ship's captain said, "Don't let the seasick people lie there." and he scolded a man
    on the ship. We were in beds, "Because we will cause trouble," he said. A girl from Fukuoka and I were in beds. The captain
    said to the man to bring us to the deck. He dragged us to the deck. Since that time, my seasickness was gone, and I started
    to eat. Until that time I hated the breakfast also. I had to ask someone to help me to go to the bathroom. Because the
    captain's orders, people with seasickness can't stay in bed all the time. So a man on the ship came to get me out of my
    bed to go to the deck. I was up and around about from that time on. We came to Seattle.
- speaker: Interviewer
  text: Were there many Japanese on board?
- speaker: Respondent
  text: No, it seemed, there weren't very many on board. Because I came here earlier... And I came here in the Meiji Era.
- speaker: Interviewer
  text: Did your husband come to get you when you came to Seattle?
- speaker: Respondent
  text: Yes, he was there punctually.
- speaker: Interviewer
  text: You had a child by that time.
- speaker: Respondent
  text: Yes, I had a child in Japan.
- speaker: Interviewer
  text: Oh, you left the child and came here.
- speaker: Respondent
  text: Yes, I left the child there and came.
- speaker: Interviewer
  text: And where did you go from Seattle?
- speaker: Respondent
  text: Sacramento.
- speaker: Interviewer
  text: Did you come straight to Sacramento?
- speaker: Respondent
  text: He brought me to the fruit's ranch ... when I came there was a cook, and I did not have to do anything.
- speaker: Interviewer
  text: How was your daily life in America at first?
- speaker: Respondent
  text: There were a lot of people, and I thought, America consisted of a lot of soldiers.
- speaker: Interviewer
  text: What kind of hardships did you have when you came?
- speaker: Respondent
  text: Well... not at that time, but after a while, I thought, the country of America sure has lots of soldiers. It is a
    big job to cook for them. Because people were needed...
- speaker: Interviewer
  text: What did you do? Did you work?
- speaker: Respondent
  text: Even the cook was here, I did a little cooking when I came, but I did not have to work.
- speaker: Interviewer
  text: You became pregnant right away?
- speaker: Respondent
  text: Yes, right away, I had a child. I was young then.
- speaker: Interviewer
  text: You were 18 years old.
- speaker: Respondent
  text: I was 17 years old. I married young. I stayed in Japan alone and came here.
- speaker: Interviewer
  text: What kind of hardships did you have?
- speaker: Respondent
  text: I had hard time after I quit being a farmer. Not very specifically but when you hire a man to do the job, there were
    other kinds of worries.
- speaker: Interviewer
  text: What kind of worries?
- speaker: Respondent
  text: If we hire a man every year, I worried with my child. And had to have lots of soldiers in America to operate the orchard.
    After my child's birth, we hired a cook so I had idle time on my hands because of not doing any cooking.
- speaker: Interviewer
  text: What did you think about Caucasians?
- speaker: Respondent
  text: Caucasians... Caucasians... when they came near me, I managed to avoid them because I could not understand what they
    were saying.
- speaker: Interviewer
  text: Did you want to go back to Japan at that time?
- speaker: Respondent
  text: I wanted to go back as soon as possible so I worked hard.
- speaker: Interviewer
  text: Were hired hands all Japanese?
- speaker: Respondent
  text: Caucasians too. They were commuting, but the Japanese stayed with us. We had a big house ...
- speaker: Interviewer
  text: Were they all Japanese?
- speaker: Respondent
  text: Yes, Japanese. If Japanese weren't coming, there won't be any workers. They had jobs from us because we had fruits.
    Rather young to have a big ranch, but he managed.
- speaker: Interviewer
  text: Did you buy the lot?
- speaker: Respondent
  text: We bought a hundred acres of orchard land.
- speaker: Interviewer
  text: Did you buy it yourself?
- speaker: Respondent
  text: A master, a Caucasian's ranch.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: Children?...well...how many... Six...seven...
- speaker: Interviewer
  text: You lost one...eight.
- speaker: Respondent
  text: Plus one in Japan? She brought there. She lost one with pneumonia. She had a set of twins and five boys and three
    girls. It had lots of children. Because of a lot of children, I could not go to Japan, and I have lived i
