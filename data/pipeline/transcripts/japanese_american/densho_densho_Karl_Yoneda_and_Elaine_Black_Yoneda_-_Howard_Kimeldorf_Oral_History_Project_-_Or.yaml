collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Why don't you tell me how the two of you got involved - I guess first Elaine and then Karl - in the ILWU or on the
    waterfront? What year and the circumstances.
- speaker: Respondent
  text: Well, I was the district secretary of the International Labor Defense, or ILD as it was known for short, which was
    an organization that provided legal and bail and prison relief for those arrested in that period. And employed demonstrations
    or attempts to organize unions and strikes. As a result, I was an honorary member of the ILA San Francisco Strike Committee,
    and met with the strike committee and with their subcommittee on defense issues around arrests that were taking place.
- speaker: Interviewer
  text: Karl, when do you get into the picture, into the waterfront? What year?
- speaker: Respondent
  text: I would say 1933 when I moved to San Francisco from Los Angeles. There happened to be an editor of Rodo Shimbun, which
    means "Labor News," a Japanese-language organ of the Communist Party USA.
- speaker: Interviewer
  text: That was 1933?
- speaker: Respondent
  text: 1933. From 1933 on, I was on the district bureau of the District 13 Communist Party of California.
- speaker: Interviewer
  text: Oh! I didn't know that.
- speaker: Respondent
  text: Which is composed of five members. We had weekly meetings. When talk of a strike on the waterfront was imminent, John
    Schomaker was assigned to meet with the district bureau. That's how I knew exactly what transpired on the waterfront.
    I wish I took notes those days, every week, but I was busy editing Rodo Shimbun. I described just briefly about that period
    in my autobiography.
- speaker: Interviewer
  text: I've heard of this. Is this available now?
- speaker: Respondent
  text: No, it's supposed to come out the end of this month, but it looks like next month.
- speaker: Interviewer
  text: Is it the UCLA Institute that putting it out?
- speaker: Respondent
  text: Yeah, the Japanese -
- speaker: Respondent
  text: No, the Asian -
- speaker: Respondent
  text: Asian American Studies Center.
- speaker: Respondent
  text: With a special grant from the regents for it to be in book form.
- speaker: Interviewer
  text: Wow, great. Maybe I'll get a copy when I'm down there.
- speaker: Respondent
  text: Yeah, so, that's how I - sort of the backdoor into the 1934 picture. Naturally, during the '34 strike, I don't do
    [in audible], but since he asked me, my assignment was the publishing committee. John Schomaker was the chairman of the
    publishing committee. A good writer. We have to give him credit for it.
- speaker: Respondent
  text: He became an agent, you know.
- speaker: Respondent
  text: He approached me to publicize the fact that quite a few Japanese seamen were scabbing, and also they were recruiting
    scabs all over the city, in Japantown, as well as Chinatown. So why don't you write up a leaflet in Chinese and Japanese
    and distribute among Chinatown and Japantown asking for support of the strike as well as not to scab. Then we had many
    Japanese members - most of these Japan-born - in the Agriculture Works Industrial Union, part of the Trade Union Unity
    League.
- speaker: Interviewer
  text: Ok, before we get there, let me - I want to back up a little bit and ask if either of you remember any agitation that
    the Marine Workers Industrial Union conducted on the waterfront in 1932 or 1933?
- speaker: Respondent
  text: I came to San Francisco in April of '33.
- speaker: Interviewer
  text: From where, can I ask?
- speaker: Respondent
  text: L.A. I had been the district secretary down in L.A. There were two distinct districts of the ILD in California because
    of the raids of terror in both areas. It was just impossible to work it from one office. The Red Squads that they had
    in L.A. as well as here. Actually the strike era was not really the time that I met - I met waterfront workers from the
    time I came here because there were attempts - the unemployed people, people who were arrested having meetings on the
    waterfront and somebody would be arrested so I was down at the waterfront not just during the strike but in '33 on. The
    Marine Workers Industrial Union was a little stronger in '33 on the East Coast, and then, when the strike broke out, they
    were more noticeable and more activity in that field, as far as I can recall. I don't recall going to any Marine Workers
    Industrial Union meetings before the strike, but I do recall addressing the longshoremen on certain issues, what was happening
    around the waterfront, the arrests and the attacks. Let's say, August first, when the youth had their anti-war day. There
    were attacks in '33 -
- speaker: Interviewer
  text: What were you saying in 1933 when you got onto a soapbox on the waterfront?
- speaker: Respondent
  text: It was anti-war; fascism was just beginning to rise, and we really didn't realize how horrible it was, but we knew
    it was something that we just wouldn't like to have here in the United States. So it was anti-war and anti-fascist. The
    right to organize. The right to protest and not be arrested. Of course, they kept arresting and breaking up meetings.
    Street meetings were being broken up by the Red Squad, and the charges were refusing to move, disturbing the peace, distributing
    leaflets.
- speaker: Interviewer
  text: Did you ever talk about concrete grievances that longshoremen might have experienced at that point in time?
- speaker: Respondent
  text: No, I don't recall that. As far as what happened within the union structure, that really wasn't my role to say, "Why
    do you want $1/hour? Why don't you want more?" That was not my role. My role was, if there'd been any arrests, to issue
    leaflets around the cases asking people to pack the courtrooms. So these people who were arrested, whose rights were violated
    - the right to gather and protest and to meet and to speak were being violated. That was the role, to point out the violation
    of the Bill of Rights and other rights that we thought we had and which were being violated by the police who were instruments
    of the industrial association and the ship owners.
- speaker: Interviewer
  text: What were your impressions of the longshoremen in terms of their political consciousness or lack of it, in '33?
- speaker: Respondent
  text: The first time I came to San Francisco from L.A. for a free Tom Mooney conference that was to be held, I came by train
    and got off the train in Oakland, took a ferry across. It was early in the morning, and I saw what I thought was a mob
    of men. It turned out to be the shape-up. I thought that a riot was imminent. There were shouts here and there. I didn't
    understand what it is. I found out afterwards that's what they called the shape-up, where they came and where the ship
    owners would pick certain ones, their favorites. "You!" And then somebody back shouting, "I got a family! Why don't you
    pick me?" Or something like that. I did not recognize what it was. I was a little apprehensive of what was I getting into?
    That nobody had warned me that, when I get to the ferry building, watch it or you'll be grabbed by a group of mad men!
    Of course they weren't, but there were shouts. I didn't know why he was with his finger indicating. So that was my first
    impression. I can laugh now, but at that time I was a little apprehensive. But I found out what it was about, that it
    was a daily occurrence. Of course wondered how they could exist under that condition.
- speaker: Interviewer
  text: When you talked to them, how large were the crowds of men that would gather around when you spoke, for instance? Do
    you have any idea?
- speaker: Respondent
  text: Well, it depended what time the meeting was. If it was lunch hour - of course, they were spread up and down the waterfront.
    There was a workers' bookshop, a progressive bookshop, that was run by the Communist Party on the waterfront, and there'd
    be a lot of guys coming by and picking up the paper and other material. Occasionally there'd be someone from the national
    office, like Mother Bloor, would come out, and we'd have a street meeting there. There were quite a number that would
    listen. If they were working, none of them left their jobs to come out and listen to us. I don't think we attempted to
    have meetings while they were still working. It was either before they went to work - if there was some issue, like the
    Scottsboro Nine or Mooney and things like that, we'd have rallies on the waterfront at noon hour. There was considerable
    interest.
- speaker: Interviewer
  text: Do you remember Sam Darcy and Nate Branch and those guys?
- speaker: Respondent
  text: Jim Branch. Yes, I do remember them.
- speaker: Interviewer
  text: Were they very good speakers?
- speaker: Respondent
  text: Both of them were good speakers, yes. Both with different styles. Branch, of course, was an Englishman so he had an
    English accent. Not very thick but it was there. Darcy was quite a - not a rabble rouser, but he was -
- speaker: Respondent
  text: An orator, yes.
- speaker: Interviewer
  text: He's still alive and kicking, you know? I correspond with him.
- speaker: Respondent
  text: Really? Yeah, I remember.
- speaker: Respondent
  text: Let me tell you the Sam Darcy. The Communist Party used to have a mass meeting at the California Hall in San Francisco,
    near City Hall. Used to pack -
- speaker: Respondent
  text: No, we were in the Scottish Hall. Of course, the California Hall then had the Nazi headquarters there. Or was that
    before?
- speaker: Respondent
  text: No, this was before the '34 strike. He was such an orator, Darcy, that when they appealed for membership in the Communist
    Party, you ought to see - literally hundreds of hands going up.
- speaker: Interviewer
  text: Who was this speaking?
- speaker: Respondent
  text: YCL members went around and distributed the applications. Really those were the days! The Communist Party was growing
    and strong.
- speaker: Interviewer
  text: This was before '34?
- speaker: Respondent
  text: And during '34, too, the meetings and rallies.
- speaker: Interviewer
  text: Let me ask you about Albion Hall. Did either of you have direct experience with that?
- speaker: Respondent
  text: We went to meetings there.
- speaker: Interviewer
  text: Both of you did?
- speaker: Respondent
  text: Maybe once or twice, I guess.
- speaker: Respondent
  text: I went more than once or twice.
- speaker: Interviewer
  text: Can you tell me what they talked about in Albion Hall generally? The kinds of issues that were raised?
- speaker: Respondent
  text: Well, I believe around trade union and the major thing here was the waterfront, the major industry. The warehouses
    weren't being organized at that time. There were some.
- speaker: Interviewer
  text: So it was directed at questions of strategy in the union, or?
- speaker: Respondent
  text: Some of it. There were times, if I recall some of the meetings, where I gave my report on defense and where it was
    headed, and then leave. Asked to be excused. I did not stay for the whole meeting because perhaps I had to go and talk
    in a park around civil rights, or having a mass rally for the Scottsboro Boys, the Kentucky miners, Mooney, you know.
    I wouldn't stay for the whole meeting. I couldn't really pinpoint if any strategies - like saying, "Tomorrow, we're going
    to walk off at this and this pier," - I don't know if anything like that took place.
- speaker: Interviewer
  text: Did they discuss larger political issues as well, do you remember? Like, "Socialism is really what we have to fight
    for," and trade unions -
- speaker: Respondent
  text: Well, that the ultimate goal has to be socialism so that we're all in better working conditions. Under capitalism,
    it will not be possible to really to have all the things -
- speaker: Interviewer
  text: So those things were talked about? It wasn't just a question of where we're going to walk out next.
- speaker: Respondent
  text: No, when it came close to an election time or something like that, they would talk about candidates that we should
    support, too, whether they were Communist candidates. There were a number running for Board of Supervisors, for instance.
    Whether or not they could get their local to endorse the party slate of candidates. In some instances, we were supported.
    Not in '34, but later on I ran for the Board of Supervisors and had the endorsement of the longshoremen. So on the Board
    of Supervisors I was non-partisan, but I was also known as Communist - endorsed by the Communist Party.
- speaker: Respondent
  text: I think you can safely say that it was a real rank-and-file movement
