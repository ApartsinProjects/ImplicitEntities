collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: And what about your mother's family in Japan? Can you tell me about them?
- speaker: Respondent
  text: No, I have no information about my mother's side. I do know that she was an orphan, and so she was adopted by my grandmother,
    who immigrated to the United States, and then, later, asked her to come over. And she came to the United States when she
    was 13.
- speaker: Interviewer
  text: Your mother did?
- speaker: Respondent
  text: My mother came to the United States, emigrated when she was 13.
- speaker: Interviewer
  text: And what brought your grandmother to the United States?
- speaker: Respondent
  text: I don't even know her birth date. I do know she was born in Saga, as the rest of the family were, because I know she
    returned to Japan, let's see, about 1929.
- speaker: Interviewer
  text: And this was your grandmother?
- speaker: Respondent
  text: That's my grandmother. That's my mother's mother. Now, my grandfather and grandmother lived in Japan. I never met
    them. I don't even know their names.
- speaker: Interviewer
  text: And where did your father settle when he came to the United States?
- speaker: Respondent
  text: He finally settled in Los Angeles.
- speaker: Interviewer
  text: And what did he do in Los Angeles?
- speaker: Respondent
  text: Well, he and my mother bought a small hotel in Skid Row, Los Angeles, on Winston Street. That's the place where I
    was born. It is a small Skid Row hotel, upstairs, above a saloon and restaurant. And it catered mostly to the transient
    guests, although there were a few permanent residents. There were maybe two or three couples, and two or three single
    women. But most of the hotel guests were transient men who stayed, some for a long time, and some for a short time.
- speaker: Interviewer
  text: And so, what did your father do before he met your mother, when he was in Los Angeles?
- speaker: Respondent
  text: Well, he was running the hotel.
- speaker: Interviewer
  text: Ok, so, he operated the hotel?
- speaker: Respondent
  text: Yeah. He was the owner-operator.
- speaker: Interviewer
  text: And how did he meet your mother?
- speaker: Respondent
  text: I'm not sure how it happened, but the chances are he used a bakashakunin.
- speaker: Interviewer
  text: And can you explain that for me?
- speaker: Respondent
  text: Yeah. And shall I spell it for you?
- speaker: Interviewer
  text: Sure, that would be great.
- speaker: Respondent
  text: Ok. B-A-K-A-S-H-A-K-U-N-I-N. And that is a marriage broker. And marriage brokers were generally around, at that time,
    to help men find wives.
- speaker: Interviewer
  text: And so, that's how you think that your father and your mother met each other?
- speaker: Respondent
  text: The chances are good that that's the way it happened, yes.
- speaker: Interviewer
  text: And do you know when they were married?
- speaker: Respondent
  text: July 14, 1917.
- speaker: Interviewer
  text: And did your mother work in the hotel as well, after they were married?
- speaker: Respondent
  text: Yes. She helped out quite a bit in the hotel.
- speaker: Interviewer
  text: And can you tell me about each of your siblings, in order of when they were born?
- speaker: Respondent
  text: Yeah. My brother was born June 1, 1917. Would that be right?
- speaker: Interviewer
  text: And what's his name?
- speaker: Respondent
  text: Bill H. His for Hideo - H-I-D-E-O. And this was Bill, not William. My parents decided to name all three of their children
    with American first names and Japanese middle names, because they wanted their children to identify themselves as Americans,
    not as Japanese, but not to forget the fact they were of Japanese ancestry, which I thought was kind of an interesting
    way to go.
- speaker: Interviewer
  text: Yeah, that is interesting.
- speaker: Respondent
  text: But it also illustrated the fact that they identified themselves completely with the United States. So, my older brother
    was Bill H. Kusuda. And he was born in 1917 - June - and I was born in October of 1922. So, there's the gap of years between
    us, and I'll explain that later. And then, my sister was born October 6, 1924. So, there's two years between us. Her name
    is Helen Chiyoko - C-H-I-Y-O-K-O - Kusuda. And she later got married - Yamamoto - Y-A-M-A-M-O-T-O - and then, later, got
    divorced. She had three children, all three of whom are boys living in Los Angeles. My brother is deceased, and my sister
    is now living in assisted living in Los Angeles. Now, the reason for the gap in age between my older brother and me -
    about two years before I was born, there was a stillborn boy. And it was because of that, that my parents decided that
    I would be born in a hospital. And that hospital birth was successful, and so, when the third pregnancy came along, they
    decided to go back to the midwifery situation.
- speaker: Interviewer
  text: Oh, interesting.
- speaker: Respondent
  text: Yeah, so that's the reason why there is a big gap between my brother and me.
- speaker: Interviewer
  text: And what kind of relationship did you have with your siblings growing up?
- speaker: Respondent
  text: My brother, being older than I, had friends who were in a different age group. And he also, being the number-one son,
    got all the privileges. And my sister and I got the leavings. And so, all of our clothes, practically speaking, were hand
    me downs. He got all the privileges of being the first boy and the son, which meant that he got things that we did not
    get, primarily because our family scraped along. And we were able to make ends meet, but then, just barely. And so, what
    they did was, tried to give my older brother everything possible. And that meant that the two of us younger siblings were
    not able to live as well as my brother did. It's kind of a strange situation, but in some families, this is the way it
    goes with the firstborn son. And it has to be the firstborn son. It's not the firstborn daughter. It's the firstborn son,
    who will carry the name along.
- speaker: Interviewer
  text: Do you remember finding that difficult as a child?
- speaker: Respondent
  text: Extremely difficult, yes. So, my sister and I were kind of left to our own. And the culture then was that parents
    did not over worry about what happened to their children if they were allowed to wander around outside. And so, when I
    was at the age of six, they allowed me to take my sister, who was four, four or five blocks away from where the hotel
    was to wander around the city streets, which we did, in an area which had penny arcades, movies, five-and-ten stores,
    and other places of interest to young children. So, taking my sister along with me, I wandered around the really unsavory
    streets of Downtown LA. And my parents were not worried about us. They had no fears about what people would do. Society
    was quite different from what it is right now. So, my sister and I had very good relationships between us. I felt very
    protective of her, and I continue to do so. And my brother treated us as younger siblings. We were taught to address my
    brother as nisan. Nisan is "brother" - "older brother," I guess. And my sister had to call me Haruo nisan, to distinguish
    me from my brother. So, we both called my older brother nisan. And then, my sister called me Haruo nisan. And then, I
    called my sister by her name, Chiyoko. So, we had a social gradation, which were carried over from Japanese culture. So
    there's a respect built in for the older sibling.
- speaker: Interviewer
  text: Can you tell me a little bit about your mother and father, and about their personalities, or what they were like?
- speaker: Respondent
  text: Yeah, my father was extremely hardworking, trustworthy, and very good to his children. My mother was also hardworking,
    trustworthy, faithful to my father, and was an excellent mother to the three of us. Both of them were very busy with their
    work, because when I was around seven, which would make it 1929, my father and mother decided to sell the hotel, and leave
    that Skid Row area for the west side of LA, because they felt that the educational opportunities in the west side LA,
    were much better than those in the area which we were living in, in the hotel. So, they were correct. The elementary,
    junior high, and high schools in the west side were excellent. So, both my brother and I graduated from Los Angeles High
    School. And their graduation rates were extremely high, as were their rates for college entrance. So, the schooling was
    good in the area that my father and mother chose to buy their small, family, neighborhood grocery store. They finally
    had to sell the store in 1938, because the competition with chain stores became overwhelming, and their capability to
    continue operating the neighborhood grocery store diminished considerably. Eventually, my father, instead of going through
    bankruptcy, decided to sell all of the produce and inventory that he had in the store, and then we had to move back to
    Skid Row, LA. And, instead of going bankrupt, what he did was, he paid off all his bills later on, after he was able to
    find work, after leaving his owner-operated business himself.
- speaker: Interviewer
  text: And what did he do for a job when you moved back to the Skid Row area?
- speaker: Respondent
  text: He found a job as a worker in a fruit-and-vegetable department of a large grocery store. And my mother found a job
    in a laundry. My father had a second job as a part-time, nighttime clerk in a hotel. So, he worked as a fulltime grocery-store
    clerk, and a part-time night hotel clerk. And my mother was a fulltime laundry worker in a large laundry in the neighborhood.
- speaker: Interviewer
  text: And can you describe the community near Skid Row for me, and what kind of people lived in that area?
- speaker: Respondent
  text: They were transients and drunkards. Many were criminals. And there were also some fairly decent people who lived in
    our hotel. Even though I was four and five and six years of age, they were very nice to me. They talked about the kinds
    of jobs that they had, and I recollect a number of their experiences that they shared with me. I found it to be a very
    interesting experience, having grownups talk to me about what they did for their living, and what they hoped to be doing
    in the future.
- speaker: Interviewer
  text: Can you tell me about maybe a couple of those people, that you remember speaking with?
- speaker: Respondent
  text: Ok. One was working in the movies, and he was a grip. And I asked him, "What's a grip?" And it turns out that the
    grip is the one who moves a lot of the movie equipment around. And his ambition was to become the best boy. So I asked
    him, "What's a best boy?" And he said the best boy is the foreman of all the grips. And they have a better job. They get
    more money. And that was his ambition, to become a best boy. So, I found two terms that I had never heard before, and
    never heard of since. But I have seen both terms in the movie credits. And there continues to be grips, and there continues
    to be best boys. So, now I can understand what his ambition was.
