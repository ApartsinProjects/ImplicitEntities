collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: About the wars, well, at the time of war I reported to the authority that I was going to join the army, but they never
    drafted me.
- speaker: Interviewer
  text: Was that World War I?
- speaker: Respondent
  text: That's right, World War I. I don't remember much about those things. For example, when Manshu jihen broke out, I was
    here in this country.
- speaker: Interviewer
  text: Do you remember reading about those things on newspapers?
- speaker: Respondent
  text: It's not good up here, so I don't quite remember. I've forgotten then.
- speaker: Interviewer
  text: Do you remember any events like tsunami, earthquake, plagues? How about happy events, sad events, things you suffered?
- speaker: Respondent
  text: Ya, about a few things.
- speaker: Interviewer
  text: What were the happy memories you have about your boyhood?
- speaker: Respondent
  text: There weren't that many happy things in Japan.
- speaker: Interviewer
  text: How about the New Year's Day?
- speaker: Respondent
  text: On those occasions, New Year's Day for one, a lot of people brought us presents and gifts, so...
- speaker: Interviewer
  text: And how about playing with your friends? Remember?
- speaker: Respondent
  text: Playing with friends, well, not really remember any.
- speaker: Interviewer
  text: Any sad events or times?
- speaker: Respondent
  text: Nothing really sad I can recall.
- speaker: Interviewer
  text: How about hardships you went through?
- speaker: Respondent
  text: Nothing like that, either. After all, my family was fairly well-to-do, I don't mean it was, but my family had less
    problems than average families, I would say. But then, my wife tells me that I was really a bad boy back in Japan. At
    the back of my house was a street leading to a school, which was right two houses down the street. She says I used to
    do some bad things to those kids who were going to the school.
- speaker: Interviewer
  text: Do you remember any earthquakes and plagues?
- speaker: Interviewer
  text: Religion of family?
- speaker: Respondent
  text: Zen. I don't think it was Shin-shu, it was Zen-shu.
- speaker: Interviewer
  text: Did you hear anything about Christianity in Japan?
- speaker: Respondent
  text: No. Well, I did hear something about it because people used to say, "Here comes Yaso." Probably Christians might have
    been in our neighborhood.
- speaker: Interviewer
  text: How was the condition of your family when you left Japan?
- speaker: Respondent
  text: I don't quite remember.
- speaker: Interviewer
  text: Do you recall anything about your family?
- speaker: Respondent
  text: Yes, I sure do. My father's health wasn't well. So, my brother was doing his work at someone else's home at the age
    of eighteen. My mother died when she was forty-two, that's about five years after I came over here. Ever since my father
    lived alone, but because of his poor health condition, he started raising something. He loved it. He used to pick them
    up in the river, and then took care of them at home.
- speaker: Interviewer
  text: How much formal education did you have?
- speaker: Respondent
  text: Fourth grade in Junjo regular elementary school, I think I can say that, because I went up to the first year in Koto
    high elementary school, then quit. I used to hate school. I would go swimming so often. I was a rebel.
- speaker: Interviewer
  text: What was the reason why you came over to the U.S.A.?
- speaker: Respondent
  text: A friend of ours in town was living here already. I wanted to come over, too, so I asked my father to give me some
    money. He refused, saying that I didn't have to go. My family had a rich relative. I went to then, too. Then my mother
    says, "Don't you ever go." She was angry. So I came back home. Knowing that there was nothing much left to do, I came
    back home. There was a factory, a big flour factory right in my neighborhood. At Shiraishi in Sendai, which was around
    seven ri from where I lived, there was a factory, a similar one, that I knew. When I was eighteen, I went out there, thinking
    to take a job there. Parents didn't give me any money, you see. A long time ago. I went to Shiraishi, learned the work.
    Then I went to the nearby factory. I did this for one week. Well, soon, a manager by the name of Suzuki says, "What brings
    you over here?" Then he goes, "Can you make this thing work?" "Sure, I can make it work," I said. It was to pour water
    from high above, well, around one-jo five shaku high, just about from over here to there. Anyway, I showed him that I
    could work on it. He says, "It's very unusual. How come?" So I told him honestly, "To tell you the truth, I went to Sendai
    and learned it."
- speaker: Interviewer
  text: You came over here thinking you might find a new place and opportunities in the U.S.A.? With lots of hope?
- speaker: Respondent
  text: Everybody was saying something good is here, so I gave it a try.
- speaker: Interviewer
  text: When did you leave Japan? Did you go through Hawaii?
- speaker: Respondent
  text: To America—over here.
- speaker: Interviewer
  text: When did you arrive here from Japan?
- speaker: Respondent
  text: No, I went to Hawaii first, on the New Year's Day of 1904.
- speaker: Interviewer
  text: Then, when to the mainland?
- speaker: Respondent
  text: I believe it was in 1907. Wait a minute, maybe 6. At that time—that's right, I came over here before the earthquake.
    So it's in 6.
- speaker: Interviewer
  text: If you did go through Hawaii, how was the condition there?
- speaker: Respondent
  text: It was very nice in Hawaii. I got out there first, and then came here right away.
- speaker: Interviewer
  text: What kind of people were on the ship?
- speaker: Respondent
  text: On the ship were almost exclusively Japanese. Some from Wakayama-ken, others from Yamaguchi-ken, a lot others.
- speaker: Interviewer
  text: What kind of ship?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: Do you remember anything which happened on the ship?
- speaker: Respondent
  text: Nothing spectacular. Such entertainment as I don't recall.
- speaker: Interviewer
  text: What was your expectation of America?
- speaker: Respondent
  text: I don't think I had any definite idea as to what to do; I was still young then.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: Nineteen, though I got here when I was twenty. I spent close to two years in Hawaii.
- speaker: Interviewer
  text: On the way here you thought America was a good country?
- speaker: Respondent
  text: I came with the idea that this is a nice country.
- speaker: Interviewer
  text: A nice country in what way?
- speaker: Respondent
  text: Hearing people say that you can make a good money out of any kind of work. I was planning to go back to Japan after
    making a good money, to begin with.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: How did immigration officers treat you?
- speaker: Respondent
  text: At the immigration we had little trouble, 'cause there wasn't any inspection. The same in Hawaii. There was a man
    by the name of Katsunumas; he was from Fukushima-ken, who told me that he would let me go wherever I wanted to.
- speaker: Respondent
  text: When I was in a place, a friend of mine wanted me to come to another place to raise sugar cane. And then I went to
    raise sugar cane.
- speaker: Interviewer
  text: What did you do when you landed in America for the first time? Jobs?
- speaker: Respondent
  text: First, since I didn't know the language, I worked at a white man's house. The guy I worked for had a white house,
    and a big businessman himself, keeping something inside his house. He also had a store. Besides that, he had a ranch on
    the right side of his house. He used to give me some vegetables from there. I would go pick up vegetables in the mornings,
    then do something overnight. Other than for this man, I worked at a home of a school teacher, a woman raising chickens.
    I was doing some work. This was it; and was all right. I was doing an easy work. Later on a friend of mine in Riverside,
    by the name of Higuchi or Iguchi, invited me to come to Riverside. I had a bicycle then. He said, "In Riverside you can
    make twenty-five cents more easily. By doing a piece-work you can make a lot more within a few years." He kept pushing
    me to come over there, so I quit working for this white person, and headed for Riverside.
- speaker: Interviewer
  text: How did white people treat you?
- speaker: Respondent
  text: White people were nice, because of reasons I don't recall.
- speaker: Interviewer
  text: How did they treat you?
- speaker: Respondent
  text: No threat nor nothing bad in particular from them. They taught us good things and anything. It was all right then.
- speaker: Interviewer
  text: Memories concerning various situations—happy experiences, sad experiences, funny ones, bad ones, frightening ones,
    helpless ones?
- speaker: Respondent
  text: Nothing particularly.
- speaker: Interviewer
  text: Anything Kuyashi?
- speaker: Respondent
  text: In the meantime I went to Mexico after coming over to this country, with help of someone in San Diego to take or collect
    something. I was there for about a year, having been forced to quit, they took my permit. I came back here because I could
    not work any longer.
- speaker: Interviewer
  text: Some funny things?
- speaker: Respondent
  text: Nothing of that sort.
- speaker: Interviewer
  text: Troublesome situations?
- speaker: Respondent
  text: Yes, there were some troublesome times while in Mexico. I was in San Martin, an island, to gather or take something.
    Since there weren't enough workers around, we went to San Quentin to recruit some on a hand-boat. Three of us were in
    that tiny boat, and then it went under the wave; then this tiny boat got a wreck on the bottom. Well, we came to Ensenada.
    We had something, but while we were on land, they were looking at it then flipped over with it in hands, and broke it.
    So we went to the Mexican Immigration Office. They called someone and they helped us go off shore. Those things were hard.
- speaker: Interviewer
  text: How did you find your bride?
- speaker: Respondent
  text: 'I was granted one from Japan. I was in Japan then, you see, in 1922. It all happened this way: A man by the name
    of Nagasaki, having everything all ready—clothes, cost, even passport—just very casually told me, "Why don''t you make
    a trip to Japan?" And I didn''t know anything about this. "How can I go to Japan, I don''t have money?" Well, for more
    than ten years I didn''t keep any record of my money, just received it and spent it. Just worked and worked. This man,
    Nagasaki, was apparently saving everything for me. You see, I used to go to bar restaurants for drinks with someone. Nagasaki
    was a worker at a restaurant before. On weekend I used to go out for drinking. Then, Mrs. Nagasaki says, "You are going
    to be broke and in trouble when you leave us. You might have picked up your drinking habit around here, but you better
    stop it for Christ sake." She said this to me all the time. But I was spending my money in that stuff. But at the time
    of going to Japan having kept the record straight, he or she told me, "Here''s the money. More than you can spend in Japan."
    This was in 1920. Since they got even the papers done and everything else, I could do nothing but to go, so I went to
    Japan. I had a friend in Santa Barbara, and he was back in Japan earlier than I was. When in Japan I told him that I was
    to leave there again for the U.S. Then he says, "Well, then, this time you have to back there with a wife. I am going
    to find you one." So I said, "I don''t want one. I got to go back soon." Again he said, "Yes, you''re going back with
    your wife!" He said we would go and see my wife to-be, so I followed him. He was going towards the direction of my wife''s
    home, her old home, I mean; which I was familiar with, towards Sawaya. I asked him, "Are you going to Sawaya?" He answered,
    "That''s right." When we got there, madam of Sawaya was there. I just kept quiet myself, but she kindly said, "Welcome.
    Good to see you."'
- speaker: Interviewer
  text: So you were married in Japan?
- speaker: Respondent
  text: Yes, in Japan.
- speaker: Interviewer
  text: In Japanese style?
- speaker: Respondent
  text: Yes, Japanese wedding.
- speaker: Interviewer
  text: Do you remember any interesting stories about picture brides?
- speaker: Respondent
  text: No, not at all. I've heard of somebody else's picture bride, but...
- speaker: Interviewer
  text: Have you ever been homesick?
- speaker: Respondent
  text: I didn't have that much desire to go back to Japan at the time. I wanted to stay here for a little more while, then
    go back. Back in Japan I said I was coming back to Japan after ten years. That ten years became some tens of years already.
- speaker: Interviewer
  text: What kind of hardship did you have in order to get used to the American way of life?
- speaker: Respondent
  text: I had a hard time since I didn't understand English. Even so, when I was staying at the white man's place in Oxnard,
    the one that I mentioned before, I didn't need anything. When I was told to do something, then I do it, and show it, that's
    all. You don't need to talk anything at all. Then at the teacher's house, though I didn't go because I hated school, I
    was told all the time to come to school any time. But I wouldn't go.
- speaker: Interviewer
  text: How much income did you have in the first few years?
- speaker: Respondent
  text: Gee, in the very beginning it was very low, fifteen cents.
- speaker: Interviewer
  text: When I was in Oxnard, I got paid forty-five dollars. It was a good salary. Forty-five was very good.
- speaker: Interviewer
  text: When did you buy your house?
- speaker: Respondent
  text: This one? Well, right after I came back here. I bought this with less than one year upon returning, so that makes
    it been twenty-two to three years.
- speaker: Interviewer
  text: Did you have any difficulties then?
- speaker: Respondent
  text: No, nothing really. I got this right away without any problems.
- speaker: Interviewer
  text: Do you remember how much it was?
- speaker: Respondent
  text: Well, very little I remember. I paid about thirteen to fourteen thousand dollars. There were no houses available to
    rent, but there were some for sales.
- speaker: Interviewer
  text: Did anybody help you?
- speaker: Respondent
  text: No, nobody.
- speaker: Interviewer
  text: Did you buy any real estate? To do what? And how much was it?
- speaker: Respondent
  text: No, I've never bought any land.
- speaker: Interviewer
  text: Japanese organizations like JACL, kenjinkai, churches, Japanese council, farm organizations, helped you in any way?
- speaker: Respondent
  text: I've been making contributions to JACL and others, on different occasions.
- speaker: Interviewer
  text: Have the organizations helped you in any way?
- speaker: Respondent
  text: I've helped organizations, too, like churches. To a Buddhist church, when they were building while I was in Los Angeles,
    quite a lot.
- speaker: Interviewer
  text: Oh, that's when you helped them. But how about the case that they, the organizations, helping you?
- speaker: Respondent
  text: They didn't help me.
- speaker: Interviewer
  text: What kind of entertainment, hobbies, and other things did you enjoy?
- speaker: Respondent
  text: I had a little hobbies, but not that many. What I like is, when I was still young, I liked playing pool best. Because
    I was working then. Other than that I haven't done that much of anything, either. Playing poker, I still don't know how
    to play it. I haven't done those things at all.
- speaker: Interviewer
  text: What do you remember about rearing children?
- speaker: Respondent
  text: I don't have any painful memories of it. When I was all by myself, when I was with my wife, or with my kids, I could
    get along with them so rearing kids was an enjoyable thing to me.
- speaker: Interviewer
  text: Did you send your children back to Japan? Why?
- speaker: Respondent
  text: No, I haven't. I wouldn't send them because if you do there would be less loving feelings between the children and
    the parents.
- speaker: Interviewer
  text: What kind of contributions did you make during World War I?
- speaker: Respondent
  text: Well, I didn't think of it.
- speaker: Interviewer
  text: Do you remember anything about segregated schools?
- speaker: Respondent
  text: Well, I thought nothing about it, either.
- speaker: Interviewer
  text: When did you come in contact with Christianity?
- speaker: Respondent
  text: That's after the war started. After I was in Colorado. A Reverend used to come around while I was over here, but after
    in Colorado I followed someone.
- speaker: Interviewer
  text: What kind of hardship did you experience?
- speaker: Respondent
  text: I had hardships but I don't recall specifics.
- speaker: Interviewer
  text: When did you decide to stay here permanently?
- speaker: Respondent
  text: That was after the war ended. I didn't even think of permanently settling down here before the war. Before the eviction
    I was saying that I would go back to Japan once.
- speaker: Interviewer
  text: What kind of attitude did whites have towards Japanese?
- speaker: Respondent
  text: They did nothing particularly bad to us. At the time of eviction, there were some rumors that someone would do us
    harm, but nothing happened to us. Instead they treated us better.
- speaker: Interviewer
  text: When Japan attacked Pearl Harbor, what did you think first of all? How did you feel?
