collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Okayama Prefecture about 50 miles from Okayama City.
- speaker: Interviewer
  text: Did you go to school after you came to America?
- speaker: Respondent
  text: Yes, I did. I worked for a while as a houseboy to earn some capital to attend school. I entered Tamalpais High School
    in Mills Valley in Marin County. In 1913, I graduated from the high school and entered the University of California and
    graduated in 1917. In those days, students were few at the University of California and there were only 40 to 50 in the
    graduating class.
- speaker: Interviewer
  text: How old were you when you graduated from high school?
- speaker: Respondent
  text: I was 28 years old when I graduated from the University and finished high school 4 years earlier. You see, I graduated
    in 1917, and I was born in 1889. I was the only Japanese in the graduating class of the high school, too.
- speaker: Interviewer
  text: Did you come here to attend school?
- speaker: Respondent
  text: Yes. I wanted to enter school to study. In fact, when I left Japan, my plan was to return in 10 years after finishing
    college.
- speaker: Interviewer
  text: Did you come to Marin County first?
- speaker: Respondent
  text: I landed in Seattle and came down to San Francisco but stayed there for 3 or 4 months. Moved to Mills Valley after
    I found a houseboy job and saved a little money. It was a few years afterward that I entered high school. I came over
    in 1906 entered high school in 1910, graduated from high school in 1913 and from the university in 1917.
- speaker: Interviewer
  text: What was your major in College?
- speaker: Respondent
  text: I was an agriculture major. Those days, there wasn't any job for a Japanese graduating from the University, but I
    was planning to start farming. I went back to Japan to look for a wife, after coming back with a wife, I started farming
    in Freeport just opposite of today's Sacramento Executive Airport.
- speaker: Interviewer
  text: Did you ever think of getting employment in some company?
- speaker: Respondent
  text: No. I knew then that a job was hard to come by for a Japanese. If one wanted to work for a Japanese, there were jobs
    such as a fruit stand attendant. There was a person who majored in commercial subjects and got a job at the Sumitomo Bank
    in San Francisco for low wages. There were very few that had jobs in those days because jobs were scarce. There were more
    that went back to Japan after finishing school due to the lack of employment.
- speaker: Interviewer
  text: What kind of farming did you do in Freeport?
- speaker: Respondent
  text: With two partners, we leased three hundred acres of land for $10,000 to raise, but my partners and I were so inexperienced
    that the venture was a total failure. After this sad experience, we came out to Sacramento to live. I did some interpreting
    work and some odd jobs to make a living for about 3 years. Then I went into the insurance business till the outbreak of
    the war, at which time I had to give it up because I was interned, first in Bismarck, North Dakota, then to Roseburg and
    Santa Fe, New Mexico.
- speaker: Interviewer
  text: Those were special camps, weren't they?
- speaker: Respondent
  text: They were internment camps and different from the relocation camps where everyone else was sent. Those who were considered
    to be leaders of the Japanese community and dangerous enemy aliens were sent to internment camp. It wasn't like a jail
    but; for one night I was detained in the City Jail on February 16, 1942. In this town there were three persons who got
    picked up the day the war broke out. One of them was Mr. Giichi Aoki and another was Mr. Rikitaro Sato, who was then the
    president of the Japanese Association and Jukichi Miyakawa, local manager of the Nichi Bei Shinbun (newspaper). I didn't
    get picked up until February 16 of the following year along with about 10 others. We stayed in town one night and were
    moved to Silver Avenue, in San Francisco, where the immigration office was. Here we got together with those who were arrested
    in other communities and finally shipped out to Bismarck, North Dakota, by train. After a month's stay there, we were
    sent to Roseburg and then to Santa Fe, New Mexico. After getting paroled from the internment camp, I joined my family
    at Tule Lake Relocation Center on July 4, 1943. We were separated from each other for about a year and a half.
- speaker: Interviewer
  text: Were your children all grown up?
- speaker: Respondent
  text: My eldest son Harvey finished U.C. but he was not able to take the final examination due to the evacuation. Since
    he had maintained a record of straight 'A' all through college, they allowed him 'A' grades without having the final tests.
    He was the first person in the history of the University who maintained a straight 'A' all through the academic years,
    and received a gold medal for it. It was sent to him in Tule Lake. He was in Berkeley attending school at the time of
    the outbreak of the war, but he joined the family in Sacramento and went to Walerga Assembly Center near Sacramento and
    to Tule Lake in Northern California near Klamath Falls, Oregon.
- speaker: Interviewer
  text: Was employment available for Japanese University graduates then?
- speaker: Respondent
  text: No. Jobs were scarce before the war. So Harvey wandered about his major subject, though he liked science. He said
    that if he could graduate at the top of his class, then he might have a good chance for a job. He majored in Chemistry
    and also studied Pre-Med and finished at the top of his class. He sent applications to many schools of medicine, was accepted
    by many schools at that time. He had a chance of being accepted by Northwestern University to further his medical training,
    but he was turned down because he was a Japanese American and the project was under contract with the Navy Dept. He was
    accepted to St. Louis School of Medicine. When he left the Tule Lake Camp, he was probably one of the first persons to
    have left the camp. Tsuyoshi was just out of Sacramento Junior College so he followed Harvey to St. Louis and enrolled
    in Washington University. Our daughter, Edith, went into University of Wisconsin from Jerome, Arkansas. Our youngest son,
    Masashi, went to high school in Tule Lake, Jerome, Amache and graduated from a high school in Chicago and joined his sister
    at the University of Wisconsin. Tsuyoshi was drafted into the Armed Forces after finishing Washington University and was
    stationed in Japan. After his discharge from the service, he enrolled at Stanford University to study law. Daughter got
    married after coming back to Sacramento. Masashi finished University of Wisconsin and entered medical school in Detroit.
- speaker: Interviewer
  text: Being a University graduate yourself and having your children become a lawyer and doctors, did you have to remind
    them to study all the time?
- speaker: Respondent
  text: I wanted them to have an ambition and objective, especially for the boys. For my daughter it was different. She went
    to New York to work in a hospital and became a dietician. For my boys, I guided them to go on to post graduate schools
    to become professional men.
- speaker: Interviewer
  text: What kind of pressure did you apply to your children?
- speaker: Respondent
  text: I never applied any pressure, except encouragement, and I never helped them with their homework nor did I scold them
    to study. However, I did graduate from college and I felt that they should be able to go on to postgraduate or medical
    school. I gave every boy in the state ambition to become PhD or MD.
- speaker: Interviewer
  text: One thing good about Japanese was that they encouraged their children to go to school and even to higher education.
- speaker: Respondent
  text: Yes, I agree. When I was farming here, we had Portuguese and Italians as our neighbors. They did not encourage their
    children to go even to high school. They said their children didn't have to go to school since they were going to become
    farmers. As for Japanese, everybody felt that their children had to go through at least high school. So there are very
    few Japanese who didn't graduate from high school.
- speaker: Interviewer
  text: What kind of family in Japan did you come from?
- speaker: Respondent
  text: We came from a long line of 'Shoya' family who were village leaders, and my educational background in Japan is limited
    to 8 years of elementary and junior high, even this was not common then. I walked 4 to 5 miles each way to attend junior
    high. After junior high, I entered a commercial school where only a very few from our village were able to attend.
- speaker: Interviewer
  text: Even though the Issei came here with a minimum amount of education, why do you think they insisted that their children
    get an education?
- speaker: Respondent
  text: I think that, as much as the Issei wanted to get a good education in Japan, they couldn't. Because of this they wanted
    their children to receive a good education. As far as my family was concerned, we did not come from a rich family, even
    though we were of the old family and were looked upon as leaders of the village. My father worked in a bank and his brother
    was a congressman from our district. The main reason why I did not get my college education in Japan was that I came from
    a family of 3 boys and 2 girls and to educate all of us was very expensive and a costly undertaking for my father. I was
    the oldest son, besides, my family was not rich and I could not let my father support me, since my father had to send
    other brothers to school and take care of my sisters. So I decided to come to America and go to school by myself. There
    were many students who came to America from my commercial school. There were about 10 of them. So I decided to work my
    way through school as much as I can. So after graduating from the commercial school, with about 12 of my friends, we decided
    to come to this country and work our way through school.
- speaker: Interviewer
  text: You mean you didn't have to stay in Japan and continue your family line?
- speaker: Respondent
  text: No, they didn't say that. There were some people who said that they will send me to further my education in Japan,
    but I didn't want that. I felt that I should be able to do it by myself. However, my second brother was able to go to
    normal school and then became a teacher. The third one went to the middle school and high school and then to a college.
    Then, my sisters went to high school, too. I was such a financial burden. So I didn't want to depend on my father to go
    to school.
- speaker: Interviewer
  text: What is your first most memorable experience in this country?
- speaker: Respondent
  text: There were many students who were so disappointed and said that they didn't want to work. But I was really determined
    to work and go to school, so soon after getting off the boat I got a job as a school boy through an employment agency.
    I still remember that at San Francisco. My room was in the basement of the house and the sound of the rain hitting the
    sidewalk was so loud. A room like that is not fit to live in by today's standard. After a while I got a job in Mills Valley
    and the place was a lot better. I don't remember any hardship, maybe because I was determined to get an education at any
    cost. I understood a little bit of English when I came over because I had 3 years of English at the commercial school
    in Japan. However, speaking English was very poor. I also could not hear what they said very well. Just like anybody else,
    I could not distinguish between R and L sounds.
- speaker: Interviewer
  text: Before coming to this country, what sort of preparation did you make?
- speaker: Respondent
  text: To get used to high and hard collar was one of the things and make arrangements for the third class fare. The one
    way fare on the ship was about $50.00 to $70.00. I came to Seattle first and the next day left for San Francisco by boat.
    I think I left Japan with about ¥100 ($50.00 at that time). I eventually returned the amount to the family in Japan before
    I started high school here. I worked hard because I wanted to return the money.
- speaker: Interviewer
  text: What did you do after graduating from the University of California?
- speaker: Respondent
  text: There was no job, so I went to Walnut Grove and worked for Mr. Matsumoto who had a celery ranch. There I made enough
    money to buy a fare to go to Japan.
- speaker: Interviewer
  text: Why did you want to come back here after returning to Japan?
- speaker: Respondent
  text: Even though I finished a University in agriculture, there were no jobs available in Japan as a college graduate. I
    could have taught English in school but rather than do that, I wanted to try farming here. So soon after we were married,
    we returned to America. I told my father that I had no preparation for wedding, but he insisted that I should get married.
    So we got married even though I had no plan to support my wife.
- speaker: Interviewer
  text: What sort of experience do you have in the way of discrimination?
- speaker: Respondent
  text: I have had no personal experience. I heard that some people got stoned in San Francisco but nothing like that ever
    happened to me.
- speaker: Interviewer
  text: Do you recall anything regarding the Alien Land Law?
- speaker: Respondent
  text: It did not affect me directly at that time because I was still attending school. We learned from our friend an attorney,
    that we could get around this new law by setting up a corporation headed by a U.S. citizen, some Nisei, and lease out
    land to the Issei farmers. I began farming in 1918. At that time I could lease land for 3 years. So I could farm without
    setting up a corporation. After that they required that they had to set up a corporation. It was after 1920, I believe.
    I myself quit farming before that. I farmed between 1918 and 1920. I failed farming, so I left it. It must have been after
    that. Most of the people who wanted to farm could not lease land, so they had to set up corporations. In it Nisei who
    was citizens, had to head the corporation.
- speaker: Interviewer
  text: Do you have any recollection about the picture brides?
- speaker: Respondent
  text: I heard of a few cases of someone else's picture was sent to their future bride and when they met for the first time,
    they didn't look alike.
