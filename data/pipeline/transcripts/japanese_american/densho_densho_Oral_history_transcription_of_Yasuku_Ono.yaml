collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I was born on October 28, 1883, in Fukushima-ken, Gori, Utshima Mura. I am 94 years old.
- speaker: Respondent
  text: During the Russo-Japanese War, I was in primary school. During the Sino-Japanese and World War, and Manchurian events,
    I was here in America. I remember them.
- speaker: Respondent
  text: I have no recollection of any sad events during Kanto Daishinsai because I was here in America.
- speaker: Respondent
  text: My family was Buddhist. I heard rumors about Christianity and attended many meetings.
- speaker: Respondent
  text: I attended grammar school and three years of night school.
- speaker: Respondent
  text: I came to America to make money. I landed in America by way of Hawaii on January 3, 1903. Hawaii at that time was
    not much different from Japan. The name of the ship was Korea Maru. The passengers were all laborers. I have no particular
    recollection of anything which happened on the ship.
- speaker: Respondent
  text: I thought America was a good country and worked immediately for a railroad company.
- speaker: Respondent
  text: I thought it was a good country. I do not remember anything about how the immigration officers treated me. When I
    first came to America and worked for the railroad company, I thought I would be ridiculed but there was no such incident.
    I did not have any trouble. I learned English so there was no hardship about communicating. Everything I did, I was working
    for the railroad and was treated with kindness for which I am grateful.
- speaker: Respondent
  text: During those days, all single men drank and gambled during pay time and on Saturdays but I did not participate in
    such entertainments. Whenever I came by, the men hid their cards saying, 'Here comes a Christian, here comes a Christian.'
- speaker: Respondent
  text: My uncle found a bride for me. He brought my boat fare and took care of everything for me. I was married in Seattle.
    I have no comments regarding picture brides.
- speaker: Respondent
  text: I did not feel any homesickness. Everything went smoothly. I do not recall any hardships. I got along fine everywhere
    I went because I knew English. I experienced no discrimination. I thought there was no better country. The salary was
    very cheap, one hour 17.3 cents.
- speaker: Respondent
  text: This present house I bought in my son's name. I paid $5,000. I bought the land and the house together. I did not require
    any help and did not request help from any associations. I bought it myself and with my own money.
- speaker: Respondent
  text: I do not have any pleasure, just working. I like fishing.
- speaker: Respondent
  text: In order to bring up my children in the way we desired, up to the time of high school graduation, they were not allowed
    to eat between meals.
- speaker: Respondent
  text: I would have liked to send my children to Japan but when they graduated high school, they were Americanized and did
    not want to go to Japan.
- speaker: Respondent
  text: Yes, I have a few recollections. During World War I, I was a timekeeper. Many of the workers were exempted from draft
    because they were working for the railroad.
- speaker: Respondent
  text: I did not have any experience with segregated schools but I thought it was not a good thing.
- speaker: Respondent
  text: I heard about Christianity around 1903. In order to make it my own religion, I made every effort to find out more
    about it and I was baptized in 1904.
- speaker: Respondent
  text: During the Depression, everyone suffered but I did not experience any hardships.
- speaker: Respondent
  text: Railroad people were good to me so I was grateful for being in such a good country.
- speaker: Respondent
  text: I made up my mind not to return to Japan in 1910.
- speaker: Respondent
  text: Everyone who was friendly yesterday changed and kept us more or less at a respectable arm's distance during World
    War II.
- speaker: Respondent
  text: When Japan attacked Pearl Harbor, we did not think it was a war, we thought it was a joke.
- speaker: Respondent
  text: I was working at the railroad. Since I had responsibility, I had to make my rounds and when I went to the roundhouse
    and other places, workers said that if Ono comes around we will kill him and do this and that to me but I went without
    fear.
- speaker: Respondent
  text: When I was notified that I had to leave the camp within three days, I was really surprised. At any rate, after working
    for so long, I had lingering regrets about leaving.
- speaker: Respondent
  text: All my American friends advised me not to go to camp so I decided against it.
- speaker: Respondent
  text: My American friends all sympathized with me. My most gratifying incident was when a letter from my American friend
    came saying that war was between country and country and not between person and person and that our relation would not
    change.
- speaker: Respondent
  text: Since I did not have any property, all I had was money in the bank, the move was easy. We had to move out of the railroad
    yard within three days so within three days we moved to Utah and settled in Clearfield, where we grew sugar beets and
    tomatoes. At that time we had a good crop of sugar beets and tomatoes and the boss was very happy. After one year, around
    Thanksgiving time, we moved to our present Salt Lake City address.
- speaker: Respondent
  text: One son was 19 years old and the other 18. One son volunteered for the army in 1942.
- speaker: Respondent
  text: Mormon church members were very good to us.
- speaker: Respondent
  text: I did not have to go to any relocation camp so I relocated to Salt Lake City.
- speaker: Respondent
  text: I think Niseis are citizens of this country so they should be faithful to America.
- speaker: Respondent
  text: At any rate everywhere I went, I had no worry nor fear. Everyone was good to us.
- speaker: Respondent
  text: I wanted to have my children receive a good education. My eldest son was always studying.
- speaker: Respondent
  text: No one helped me. My children found the house and I bought it. I was working for the county hospital and worked 16
    years. I did not experience any hardships or suffering. Everyone was good to us.
- speaker: Respondent
  text: Always depend on God and receive His guidance and protection and go to heaven is our only desire.
