turns:
- speaker: Interviewer
  text: J.C. Alston, when were you born? And which theater of World War II did you serve in, Pacific or European? Your branch
    of service and highest rank? Did you enlist, or were you drafted?
- speaker: Respondent
  text: I wouldn'thave been at Pearl Harbor if I didn't.
- speaker: Interviewer
  text: What year did you enlist? And you enlisted from West Texas? Is that where you were when you enlisted? What were you
    doing before you enlisted?
- speaker: Interviewer
  text: What was I doing? Oh, besides a little schooling, I did delivery for a drug store.
- speaker: Interviewer
  text: So how old would that have made you when you enlisted? Unmarried when you enlisted? What was your reason for joining
    initially?
- speaker: Respondent
  text: Well, the boys in our group, three of us, we decided that we would join the Navy. We decided we didn'twant none of
    that walking; we wanted to ride. (Laughter) So we went to Dallas for our examination, and they accepted us and we went
    to San Diego for boot camp.
- speaker: Interviewer
  text: Were these three high school friends? Were you related to any of these other guys?
- speaker: Respondent
  text: I wasn'trelated to them.
- speaker: Interviewer
  text: Just friends from back home? So what were your...about initially signing up, I'm assuming you were excited about it,
    what other emotions were going through you when you finally made that decision to commit to the Navy?
- speaker: Respondent
  text: Oh, it's been so many years. I don'tknow if I can tell you. Well, we were a little bit excited. They accepted us,
    so. They told us not to bring any clothes or anything, because when we got there, the clothes we had would be given away
    to the Salvation Army, and we'd get our uniforms from the Navy. So, we got on that train and went to San Diego.
- speaker: Interviewer
  text: Had you had any family serve in the military before, or were you the first one?
- speaker: Respondent
  text: Uh, I'm the first one in our family who went into the service. During World War II, my brothers, they served, two
    of them. I guess they went like I did.
- speaker: Interviewer
  text: Did you serve with any of your brothers on the USS California? In San Diego, what was your boot camp experience like?
- speaker: Respondent
  text: Oh, it wasn't too bad. Or course, I was one of the lucky ones. I didn'thave to do KP.
- speaker: Interviewer
  text: You didn'thave to do what? What does that stand for?
- speaker: Respondent
  text: That's where you go to the chow hall and work. (Laughter) DANIEL
- speaker: Interviewer
  text: So you didn'thave to work your way through boot camp? Good. What were some of the things you did to make it through
    boot camp? Anything specific that you did to get yourself through that time?
- speaker: Respondent
  text: No, no. If we got in a little trouble, we'd have to get out on the grounds and walk for a few hours.
- speaker: Interviewer
  text: But you behaved pretty well?
- speaker: Respondent
  text: Yeah, I got out of that. I behaved. (Laughter)
- speaker: Interviewer
  text: How long was your boot camp experience? How long did that take? Eight weeks? And when you were finished, you were
    sent where?
- speaker: Respondent
  text: Well, they wanted to give us examinations. So we decided that we wanted to go a board a ship. So we decided we would
    miss some of the questions so that they wouldn'tsend us to school. (Laughter) But uh, they took one of them anyway. He
    might not have did that, I don'tknow, but I did. But he didn't get on the same ship I did. To get on the California, from
    San Diego, we had to go up to Long Beach.
- speaker: Interviewer
  text: What were your first days in the service like?
- speaker: Respondent
  text: Well, shots. Clothes issued.
- speaker: Interviewer
  text: Lots of paperwork?
- speaker: Respondent
  text: Nah, not too much paperwork. See the Navy was a little different than the other branches. We got thirty-six dollars
    a month; they got twenty-one. So the first four months, we didn't get but twenty-one, and we paid for all our uniforms.
    After that, we got thirty-six a month, but we bought our own clothes. In the Army, they were issued theirs. Anything we
    got, we bought.
- speaker: Interviewer
  text: So how long were you in Long Beach? Is that where the USS California was, in Long Beach? So, how long was the stay
    in Long Beach before you headed to Pearl Harbor? About a month. K. So we're talking...
- speaker: Respondent
  text: We left October the 1st to go to Hawaii.
- speaker: Interviewer
  text: In that month, what did you all do? We you all just training for, preparing for what might happen? Or what were y'all
    doing in that month before you all left?
- speaker: Respondent
  text: Well, we were assigned gun mounts. We'd had training on loading them. After we got over there, we'd leave on Monday,
    and we'd come in Friday, spend the weekend in port. One section would have the duty. We had four sections on the ship.
    One would be the duty section. And uh, so, we would do the watches on the ship. Of course, there were a lot of divisions.
    The admiral would come by, with the speaker, announcing for them to stand at attention. We didn'thave to salute him every
    time we saw him, we'd just salute him one time in the morning. The deck forces, they kind of did the maintenance on top.
    They'd clean, sweep it down every so often. We had a good deal, all ships didn't do that but ours. We paid a guy to take
    care of the chow. We had two tables, and he'd bring the food to the table, and we'd sit down just like at home and then
    get up and leave. And each man, there were twenty of them, would pay him a dollar a piece on payday, which was twice a
    month. But he made more money there than his regular salary.
- speaker: Interviewer
  text: You had the weekends off in port?
- speaker: Respondent
  text: Yeah, if we weren't the duty section.
- speaker: Interviewer
  text: So, you were in Pearl Harbor for about two months prior to December 7th, correct? Can you walk us through the attack
    that day on December 7th? What it was like for you?
- speaker: Respondent
  text: Yeah. Our section was duty section, and I had 4-8 watch in the afternoon. And the only aircraft we had in their pulled
    out about sundown and left. And I had 4-8 watch, and well I had 4-8 watch the next morning. Well, the PD takes long patrols,
    but they can fly along ways. The water was so slick that morning. They were on pontoons. So he tried to take off and he
    couldn'tmake it. So he made three of four runs. When it was so slick, it made a vacuum on them pontoons. So they got a
    PT boat out there to run across. So, they had come out to raise the flag, and I was fixing to get relieved so I could
    go eat. I hadn'teaten breakfast when it started. We got three torpedoes and one bomb hit. One torpedo didn't hit the hub,
    it hit the rudder. They flooded the opposite side to keep it from rolling over like the Oklahoma. We evacuated the ship
    and went to the Island over to our stations. That's where all the planes landed. We were the closest ones to the island.
    Maybe from like here to the street is how far we had to go to the island. So we evacuated, then we went back a board.
    That was the first wave. We got back a board. We was sunk, but we was up. We still had some anti-aircraft guns that were
    still above water. We went a board and we still thought it was going to roll over. About that time, the second wave come
    in. The Nevada was the only one that got in the way. They had come by about that time, so I know it saved some lives on
    the California because they looked after her. She run in the ground about two or three hundred yards from where we were,
    to keep it from blocking the channel. Of course it sunk. And we abandoned ship again the second time, went over to the
    Island. So, they were fighting the fire on the water and the ship, and they finally got the anchor chain around where
    we tied up, so it stayed upright. We went back a board that night. Somebody shot, and when they did, well everybody started
    shooting. They shot down a couple of planes, didn'tkill the pilots. They bailed out. They were mad as a hornet. Then,
    the next day, West Virginia was tied up out port, and the Maryland was in port. Well the Maryland got one bomb hit, but
    you couldn't hit it with a torpedo. So they pulled her out there, course they was trying to find places for everybody,
    so I went a board the Maryland. And they blew the quay up, took the Tennessee out. It got a bomb hit. The bomb hit the
    middle gun on the Tennessee, and the shrapnel killed the captain over on the West Virginia. We came out, I didn't see
    it, I heard it, when the Arizona blew up. Course I didn'tknow that was what happened at the time, but it wasn'tlong before
    we figured it out. But it was a tanker. Pulled up in there right behind us, between us and the Maryland and the West Virginia.
    Now early that morning, 'course I didn'thear this until later, a destroyer out there started fighting with a sub, and
    they sank it. They never could find it until a few years ago. It wasn'twhere they thought it was, but they finally found
    it. And that was the first Japanese prison of war. It was one of them two-man subs. They didn'thave much of a navigation
    system, because they followed a big one, the mother ship. And they run it up on the beach. So they didn'tknow where they
    was going. I stayed on the Maryland until it came back to the states in January to get repairs and put different guns
    on it. At that time we had 50s and 20 millimeters, but we didn'thave no 40 millimeters. It's got 40 millimeters in a quad,
    thaf s 4 guns in a quad. Here is a picture of it.
- speaker: Interviewer
  text: This is the Maryland or the California?
- speaker: Respondent
  text: No, that's the USS West Virginia, after they redone it. I got transferred to it, and I stayed on it until the end
    of the war.
- speaker: Interviewer
  text: You were transferred there in '42? So how long were you back in the states after Pearl Harbor?
- speaker: Respondent
  text: Oh, when they were working on that one, I got transferred to it. They kept most of the people over there as these
    ships come in when they were damaged. They use their personnel to build a crew back up, so they didn'thave to bring people
    from the States all the way out there. And then some of the guys who'd been along time, they'd come back and get new construction.
    Of course they'd have to test it before they left, all the guns and everything. See if they needed to do any more work
    on it before they went back out to the war zone. But, when we went to the Philippines. We could stand up on deck, and
    any direction you looked, you couldn't see nothing but ships. About 1:00, all these Japanese planes come out, all them
    radars on all their ships, we dove down through the deck of one of those converter jetters. We took some of the people
    on our ship, from different ones. Of course they sink it, there couldn't be no fire on the__(??) after dark. But that
    was the only plane come out. That was the only hit that was made. After we made the landings, we were up in___(??)gulf,
    and they brought General Doug in there. They sent him a shore, you know, taking the news reel with reporters, and all
    that. Well the first time, they didn'tthink it was good enough so they had to go back and do it over. We use those 16-inch
    guns to support the army, so if they needed a target, said they needed to take it out, so we'd take it out. Different
    ships that have their duty, that would be their duty for the day, whatever the army called for. Fire, why the ship would
    take it. The third day, we had to get kamikazes, and we finally had to go back up the straits a ways. We finally shot
    down the first four, the next one caught us. But we were still lucky, the plane crashed and the gasoline stuff only killed
    9 people. The bomb went down on the third deck, and it split in two like a watermelon.
- speaker: Interviewer
  text: So this is all in the Philippines?
- speaker: Respondent
  text: Uh-huh. And, uh, and then that storm came in. and we all went out in the China Sea. Of course there was a couple of
    destroyers, and they ran out of fuel. We all seen them, because we couldn'tcontrol them, nobody could rescue them. So
    we lost them. That's when I decided I didn'twant on one of them destroyers, get me on one of them little ones. (Laughter)
    All those waves coming up to the number two turret on there, about a forty to fifty foot wave. Them little ones, you just
    see the top of them every once in a while.
- speaker: Interviewer
  text: Now, 1 don'twant to jump back too far, but I do want to hear a little more about Pearl Harbor. When you hear those
    sirens going off, telling you to get to yours battle stations, what's going through your head? What sort of emotions?
    Are you so trained that you're just all about your duty? Are you panicking?
- speaker: Respondent
  text: "Oh, no. We just go to our battle stations where we're assigned. And of course, they get down below first. And they\
    \ said \"this is not a drill,\" so we went to our stations. As far as I was concerned, I didn'texpect, nobody expected\
    \ anything. So until it hit the ship, you know well \x97 anybody that says they weren'tscared, well they're just not quite\
    \ telling the truth. Of course it hits them after it's over more than it did at the time. The army had put up a radar,\
    \ and they just missed training on it. And this guy told them that there was a bunch of planes coming in. They said \"\
    oh, we've got some big 17s coming in from the States, don'tworry about it.\" He says, \"There weren't any 17 planes in\
    \ this bunch.\" And they just dismissed it. Of course they was in a different place than I was. They was a few minutes\
    \ from hitting us whenever that happened. And they shot down some of the 17s because they weren'tarmed. They just ran\
    \ them over there where they had bases for them at the time. Yeah. Lot of them, they got burned from the burning on top\
    \ of the water. And they take em over on the dock and they buried them. Of course every time they talk, someone always\
    \ adds to or takes away from the numbers of how many was killed, but around 2,600 roughly."
- speaker: Interviewer
  text: Did you lose any close friends that day? JC
- speaker: Respondent
  text: Yeah, I did. See we had what you call a peace time crew. After the war come along, we was carrying about 1,600 on
    a battleship. But the Pennsylvania was in dry dock when the bomb hit. There was two smaller ships in dry dock in front
    of it, and it destroyed them. And where the carriers were tied up, they sunk both of them, because they had maps and had
    their targets marked. They come over the ship, it was so low, you could see them just as plain as could be. In fact some
    of them had to really pull up to keep from getting__(??) their own ship. Well they raised the Nevada, West Virginia, and
    the California. The Oklahoma, it rolled over, and they raised it after the war. Some salvage company was to wing it to
    the states, and they run into___(??). It sunk. They lost it. And of course the Arizona's still there, and the old Utah
    on the other side of the island, it's still there. It was a target ship for aircraft planes. They took the superstructure
    off, and it had a flat deck. It was remote control, it didn'thave people on it, working on it. They sunk it, I guess they
    thought it was an aircraft carrier because it did kind of like it in a way. If sstill there, it took part of it away,
    you won'thear nothing about it because not many got killed on it, I think 66 or something like that. They took part of
    it away so those super carriers could come down to Fort Island.
- speaker: Interviewer
  text: So have you been back to Pearl Harbor since that day?
- speaker: Respondent
  text: Oh yeah. I went back on the 49* and 50th anniversary. They took the USS Missouri over there. I don'tknow why they
    did that. I guess they was trying to get the Island, get visitors over there. They should have left it in Seattle, where
    most people would have saw it. Of course you know, during the war over there with Iraq, they use them. They put missiles
    on them, but it still took a bigger crew and it was slow.
- speaker: Interviewer
  text: Whaf s it like going back? (Tape 1, Side B) We just asked Mr. Alston what it was like going back to Pearl Harbor to
    visit again?
- speaker: Respondent
  text: '...and then Diamondhead. Really when you come in, thaf s the only two things I really could remember. You know it
    changed so much. When we were there, there was like a farm to market road going from the naval base to town. Now they
    got a six-lane highway. Little different. Of course, we went out there. Well, the people kept us, you know, signing autographs.
    The visitors was there in the visitors'' center. We were there at the visitors'' center where they had the ceremony.___(??)
    They buried anybody who was on the Arizona. If they wanted to be buried, they cremated them and put them in a little tube
    and take them down there and tie it down. And they buried three on the fiftieth anniversary that day. Now, used to, we
    had to___(??) the buried, and go__(??) over there at the landing, over at Fort Island. But now, they got a, well, they
    got a floating section in it. When the ships come around, they just unhook it and tow it around the ship and go on through.
    And you can drive over there for Fort Island. And then, we spent a lot of time signing autographs. They, uh, did give
    us coffee and donuts and stuff. (Laughter) And on the fiftieth anniversary, Colin Powell, he spoke there. And last time,___(??)
    his name right now, he made the talk. It was one of the Japanese, that was his twentieth year on the fiftieth anniversary.
    He comes back every year. He comes back every year. He brought his interpreter and gave the speech. He, uh, prayed for
    peace. And he was one of the pilots that day, on December the seventh. But he''s become a Christian, and he comes every
    year on his own expense. And they let him get up there and talk with the interpreters. And he prayed for peace. I said
    well, I don''tknow how many, you know, converted to Christianity, the Japanese, but probably more than you''d think. They
    turned out to be a pretty good ally.'
- speaker: Respondent
  text: Going back to that day, at the end of that day, how did things change? The spirits of you and everyone around you?
    What changed? Knowing that the U.S. was entering the war at that point?
- speaker: Respondent
  text: Well, everybody was nervous. They thought maybe they would come back, but they didn't. You know, they went and made
    landings on the Philippines. They tried to destroy the fleet, what planes was in that area, and they figured by the time
    we got everything back going, we wouldn'thave the will to fight. But they was wrong. That just really kicked things off
    when they did that. And the old admiral, he went to school over here. He says, "we woke up a giant." He didn'twant to
    do it. He wasn't in favor of it, but he wasn't the one in charge, so. Well we had to eat over, they didn'ttear of the
    mess hall or anything over there, but they did tear up the hospital on Fort Island, they hit it with a bomb.___(??), thaf
    swhere everybody had to go eat, pretty well. You know, except the Maryland crew and the Tennessee, because they didn'thave
    no space once they pulled the Maryland out and the Tennessee out, some went a board them to kind of cut down on the personnel
    and eat over there. I'd say about ten days after that, a aircraft carrier the plane was taking off Fort Island, and somebody
    left the crane up in the air. And he flew into that crane, and that bomb on that plane went off when it hit the ground.
    And I, of course everybody looked and wondered what happened because we couldn't see it for the buildings where we were
    at the ship. I don'tknow if it killed anybody or not. But, here's the Arizona___(??) if you never have seen it up close.
    Now how much of a chance of a rainbow on December the seventh? Hmm. December 7th, 1999. A rainbow right over the top of
    it.
- speaker: Interviewer
  text: What a cool picture. Who signed this one? Do you know, who would that be? No, I don't. That may be the guy that took
    the picture, I don'tknow. That's probably who it was. So they could make copies and give out.
- speaker: Interviewer
  text: So, you, in '43 joined the West Virginia, and you headed, what was the first campaign you headed out on the West Virginia?
    The Philippines or...?
- speaker: Interviewer
  text: No,__(??) Islands, and then the Philippines, and then Iwo Jima, and then Okinawa.
- speaker: Respondent
  text: Which of those is the most memorable? I guess you took them all at one time, but which of them is the most memorable
    campaign? Which one do you remember the most vividly?
- speaker: Respondent
  text: Um, well, we had a lot more trouble in the Philippines. See, when we were there, we was up in the straits. And one
    of our subs out in the China Sea said there was a fleet of seventeen ships from Japan, Japanese ships, coming, and they
    was going to come up the straits. Well the captain said," eat early, go to your battle stations, we don'tknow what time
    they'll arrive, but we'll be ready." So, they come up the straits, with those big guns, you've got to take them off at
    least twenty-five degrees to keep__(??) the deck so you get recoil from the gun, if 11 take part of it. And the ship and
    the water it'll take the rest of it. So, but knowing the Japanese, they didn't go by that rule at all. But we were broadsided,
    five of us battleships, waiting on them when they came in. And I think we fired 93 rounds, or 16 each__(?), 2,250 pounds.
    And I don'tknow how many the other ships fired. But we sunk them all but two, and they were crippled. And they went back
    up the strait a little ways, and the next morning, a plane sank them. But that was, you know, that wait was worse than
    the battle I think. You know, just waiting for them to come in. They come in about 3:00 in the morning. We were the last
    battle between big ships. And Iwo Jima, it was far enough in the mainland that those Japanese planes, most of them, couldn't
    fly that far. So they didn't.__(??) got hit one night. She had night fighters up. And, uh, of course it was burning, so
    they designate an area out there for them to bail out, had destroyers going out there to pick up the pilots. They lost
    planes, and they put out the fire on the ship. Uh, but they stayed, still stayed in operation. They didn't -didn'tknock
    them out of operation. And, uh, we were using spotters from it, those planes off the carriers, for spotters, because they
    dug in them mountains way back in there. They'd be three stories maybe in some places down in the rock. Anywhere you could
    find an opening, our ships would try to put one of them in jail. I know we buried a lot of them a live, we didn'tbury
    enough of them. I can'tunderstand how come they had so many! And they didn'tthink they had that many troops. They had
    about 22,000 troops. They was taking it mainly while those big bombers if they got hit or something, and you know, and
    damaged a little bit so they could land and they wouldn'thave to go all the way back to land. And it was far enough away
    from Japan that, you know, the planes wouldn'tgive you any trouble. So, I saw them put up the flag. I was sitting up there
    in the 40s watching what was going on. 1 could see these little old army carriers, personnel carriers,__(??) and it stop
    and got hit, stop. Because there wasn'tthat much cover on that little old island for people, you know, the ones landing
    and coming up. Well they were all__(??). We all lost a little more personnel, everyone. We lost about 6,050 on Iwo Jima.
    We lost about 13,000 on Okinawa. We lost 38 ships sunk and 43 damages from suiciders. Of course, people don'tthink about
    it, but at night, when the moon's shining, you can see a ship on the water just as good as you can in the daytime. But
    what we'd do is at night, we'd pull in there and anchor. And the most.... Ones hitting the water every once in a while,
    boom! But we never did get hit. Another ship, just come back, been repaired, and come back and anchor right beside us,
    got hit the next night. So it, you know, you never know about them things.
- speaker: Interviewer
  text: So, did I hear you correctly, from where you were standing on the West Virginia, you saw the flag being raised?
- speaker: Interviewer
  text: Did you realize at that moment how important that would be in the public's mind? Those images in that battle? What
    was going through your mind when you saw this?
- speaker: Respondent
  text: Well, when we saw that, well we knew that they didn'thave it secure, but they was along ways in securing the island.
    And it never got dark - because we used starshells. You know, it's kind like a, when it fires, it blows up, kind of like
    a fire with a parachute on it. Gets lit up. Well, all the ships were firing and that island never got dark, for I guess
    five days anyway. Of course, you know, we'd fire every so often, and then that ship would fire. And then you know, we'd
    just take it in alternation and kept it lit up.
- speaker: Interviewer
  text: How many ships were around Iwo Jima? Now that I couldn'ttell you. They was all around. 1 couldn'ttell you how many
    was on the opposite side from where we were. What was your part during the combat on the ship? What was your duty? Loading
    the 40-millimeters. Loading the 40-millimeters?
- speaker: Interviewer
  text: "Now, after they redone the ships, we had eight twin 5-inch mounts. They were a nticraft guns, and of course after\
    \ they got radar, you know, where they could kind of get the mileage, they set these__(??) of these things where they\
    \ loaded them, as they loaded them in ~ at the height, with the planes coming in. And of course it burst up there, you\
    \ know, in the shrapnel. Well, the Japanese planes weren'thard to shoot down, because they didn'thave no armor on them.\
    \ They wanted speed, but right after the war started, they put that bigger engine in the Navy fighters and they could\
    \ outfly them and they had armor and everything. So, at first, they was having a ball, the Japanese was. Because ours\
    \ would get after it, you know, they keep flying, and they'd kind of more stall out. Well, when they did that, that Japanese\
    \ would come back on him, not from up above \x97 come back on him. And they was having some pretty good luck at shooting\
    \ them down. Well after they put that big engine in there, when they saw one of them coming, well they run."
- speaker: Respondent
  text: This may seem like a silly question, but you said it was - the skies were constantly lit up for five solid days, how
    did you all go about sleeping and eating and just normal, like, things that you need during those constant battles?
- speaker: Respondent
  text: Well, uh, just so many would go eat at a time. They'd fix sandwiches and stuff. And, uh, take it back of there to
    our duty, to the gun, and eat. But we didn'thave too many suiciders there, it was too far away from the mainland. So,
    like our ship, with the firepower, if one did come in and we got on him, most of the time we'd shoot him down. When we
    was in the Philippines, the first plane got close enough that the wing landed on the quarter deck. The next one, the motor
    hit the side of the ship. And then the third one, I guess it killed the pilot and of course he was coming down. He went
    down right beside the ship, in the water, didn't hit the ship. The fourth one he was a little further out. But the fifth
    one, it hit us. Now I'll give this. Where did I leave it?
- speaker: Interviewer
  text: Is that it there on the table? Here it is. That is a copy of the original peace treaty and this is the instruments
    of surrender that go along with it. Ya'H take that. I make copies to give to people that wants them... This was taken
    in 1942 after the war started. That was me.
- speaker: Respondent
  text: Good looking man.
- speaker: Interviewer
  text: Yeah. (Laughter)
- speaker: Respondent
  text: I don'tknow about that. (Laughter)
- speaker: Interviewer
  text: So you're around nineteen here? Hmm.. Well just some - we asked you about these before we started. I just want to
    get these on record. Were you ever a prisoner of war? And, uh, any medals or honors from your time?
- speaker: Respondent
  text: Well, all the theaters we got ribbons for. And, uh, you know, we put five stars on the ribbons for each of the campaigns.
    Of course they had the Philippines medal. Each one of them had a set. They didn'tgive us the medals. We just got ribbons
    put on our chests.
- speaker: Interviewer
  text: So you've given those away?
- speaker: Respondent
  text: Yeah. I give them to grandkids along time ago because I didn'tfigure I'd ever need them. (Laughter)
- speaker: Interviewer
  text: Uh, now as you're out on the ship, how do you stay in touch with family and friends back home? Letterwriting?
- speaker: Respondent
  text: The only thing they had was mail. They give us these little cards because they censored them, you know. They didn'twant
    anybody telling where we were or nothing like that. If anything like that got in there they cut it out.
- speaker: Interviewer
  text: So how often, how often did you receive mail from back home? Pretty in frequent, or...?
- speaker: Respondent
  text: Not too frequent. There was a lot of times they'd be bringing the mail to a base where they refuel, ammunition, food,
    restocked the ships. And the ship might be called out to do a special duty and see he'd miss it. And he'd catch up later
    sometime.
- speaker: Interviewer
  text: So you didn'tpick the mail up____(??).
- speaker: Respondent
  text: No, nuh-uh. Now they did bring some. They'd have a destroyer come around and make the ships with the mail. But that
    didn'thappen too often.
- speaker: Interviewer
  text: For those of us who haven'tbeen on a ship before, how did you keep yourself entertained? How did the guys pass the
    time?
- speaker: Respondent
  text: Oh, we had some old movies. We had a band on the ship.
- speaker: Interviewer
  text: Hmm. Did you have a lot of downtime a day? Did it vary from day to day?
- speaker: Respondent
  text: It varied a little. It would depend on the watches and where we were going and what we were going to do. From one
    island to the other, they had these little old radio control buttons and we'd___(??) on the way to the next campaign.
    Them things was hard to hit.
- speaker: Interviewer
  text: That's pretty funny. Do you remember any funny or unusual events that happened just in downtime or throughout your
    service?
- speaker: Respondent
  text: Uh, we picked up one pilot. He was from the carrier. When they start to land on them carriers, well sometimes they
    kind of make a vacuum and the plane would drop in the water at the back of the ship. 'Course they'd save the pilot Most
    times they'd lose the plane. But, they brought him over and got him some dry clothes. That was the third time that week
    that he had been picked up out of the water. (Laughter) I told him, I said, "I believe I'd tell them to put me on a different
    duty." (Laughter)
- speaker: Interviewer
  text: Had you, had you picked him up all three times?
- speaker: Respondent
  text: No. Just once. But I just - you know, he was the one that told it. (Laughter) "This is the third time." I said, "Third
    time's a charm." (Laughter) And then another incident that happened. One of our carriers. There was two Japanese planes
    that got lost and they tried to land on the carrier. And they waved them off, 'cause you know they wasn'tmaking the approach
    right. And the second time they come around, they discovered they were Japanese planes. And they decide, they discovered
    that they was our ships and they flew on off. I don'tknow where they went. (Laughter)
- speaker: Respondent
  text: Did you, uh, I'm assuming the time on that carrier with those men that you formed some pretty close bonds. Are you
    still in contact with any of the men that you served with on the West Virginia?
- speaker: Interviewer
  text: We have a ship's reunion every year, but I -1 uh, lef s see. About ten years ago I went. We had it up here at Branson
    and I went. Most of the guys was there. I knew a few of them. Most of the guys that was there came on it after the war
    was over, you know, before they decommissioned it, so I didn'tknow them.
- speaker: Interviewer
  text: You showed us some pictures. Did you keep a written record or journal of your day- to-day activities?
- speaker: Respondent
  text: You didn't? No time for that. Too much work? (Laughter) Do you remember the day that your service ended? Where you
    still out when the peace treaty was signed?
- speaker: Interviewer
  text: We were in the, I went up in the harbor. ...when they signed it. Yeah. There were several ships that went in there.
- speaker: Respondent
  text: So you were all they way up on the island.
- speaker: Interviewer
  text: Well, we didn't go up on the shore, but we were in the straits there in the harbor. Uh, you know it's kind of funny
    in a way. Here are all these ships of ours cruising up the middle of it and here are all the Japanese jumping of in the,
    and they're swimming. When the old 'Moto said, "War's over," the fighting was over. They just went to normal activities.
    (Laughter)
- speaker: Interviewer
  text: So did you have any interaction with the Japanese public at all? I mean, were you guys received well. I, mean I don't...
- speaker: Respondent
  text: Well, we couldn'tunderstand most of them. We couldn'tunderstand Japanese. But there was one teacher. She could speak
    English, and she said, uh... Them big B29s, they didn'tpaint them, they were silver. But they'd start a fire big enough
    that they could see that glitter up in the sky. They was using in cindiary bombs burning. I don'tknow why they didn'tgive
    up before they did. I guess that they thought they might not have to totally surrender. But man they, they didn'thave
    nothing. And, uh, also the Army. We did go a bit over on the beach. And the Army had leads, and they'd take us up there
    where they had dropped them atom bombs. But, I didn't go. They didn'trealize how dangerous it was or they wouldn'thave
    been going either. (Laughter) But anyway, that was along time. The prisoners of war that they had, we took them on different
    ships so that they could get medical and air transportation back to the States. They had been on water and rice so long
    that they could punch their (pointing to calf muscle) in like that and it would stay.
- speaker: Interviewer
  text: I don'tknow what kind health, you know, in later years they had. I always wondered about it.
- speaker: Interviewer
  text: So, that day the treated was signed, was that the day your service ended? Did you go back home after that, or did
    you...
- speaker: Respondent
  text: No. We stayed until everything was secure. We stayed in there, I don'tknow, fifteen or twenty days. And, uh, then
    the ships started leaving and going back. But every ship that went back, if it had any kind of room, it went by these
    islands and picked up passengers going back - bringing them back to the States. We stopped by the Philippines and picked
    up a bunch. I liked to have got electricuted. We stopped by Pearl Harbor. That's the first time I had been back in Pearl
    Harbor in three years. We stopped in there overnight. There was this guy welding. It had rained a bit and it was wet.
    That old cable with that rubber on it had a break in it. I didn't see it. I was just walking along and I stepped on the
    thing. I couldn't get off of it until he let off the torch. (Laughter)
- speaker: Interviewer
  text: So it took about a, I guess a month or so to get back from Japan? Is that about right? No. I think about ten days.
    But, from the time the war ended you were probably gone a month? Give or take.
- speaker: Interviewer
  text: Oh, yeah. Over a month. Of course, they one's whose time was out, they could go back. If you were a visitor on a ship,
    passenger, you just get what they'll give you.___(??) I said, "Nah, it don'tmake that much difference. I'm just going
    to stay where I am." Some of them did go off, and the ship got called off or something, and we beat them back to the States.
    (Laughter) So when did you finally leave the Navy? When were you finally finished. Forty-five. Yeah. What was your, what
    were your feelings that day? Glad to be out? Or...
- speaker: Interviewer
  text: Oh, yeah. I didn't, you know, 1 had done figured out it didn'twant to make it my career.
- speaker: Interviewer
  text: So you had signed a four year agreement with the Navy? Did you return home after that day?
- speaker: Interviewer
  text: Yeah. We came on the train. From San Diego, we came on the train down to a little air base down there around Houston
    and got discharged. And we caught a ride back to Temple. So what did you do? In '45 when you got back, did you get a job?
    Get married?
- speaker: Interviewer
  text: No. My cousin lived out in Plainview, out there by Lubbock. He said he couldn't get nobody to help him, and it was
    time to cut the wheat. He said, "Oh, I'll pay you good." You know___(??) my cousin. So I said, "Okay. I'll try it." I
    went out there and worked a couple of months. I come back and, uh, I made an application to the VA hospital here in Temple
    and went to work. With service time and that I had thirty-eight and a half years when I retired from out there.
- speaker: Interviewer
  text: So you went to work at the hospital? Is that what you said? Doing what there? What were you doing at the hospital?
- speaker: Interviewer
  text: Well, first I drove a truck. Then I went into the fire department. We did guard work along with the fire department.
    Then we got some of those patients from Waco. (TAPE 2, SIDE A)
- speaker: Respondent
  text: Mr. Alston just told us that he was working as a member of the firefighters. Go a head.
- speaker: Interviewer
  text: And, uh, separated us then. We had a guard house and used to lock them up. They did____(??) you know they were allowed
    to go to town. They'd get drunk and we'd put them in the guard house to keep them from, you know, disturbing the rest
    of them so they couldn'tsleep. And some of the medical wards, Dr._____(??), that's the first thing he would do. He'd call
    us and say, "You'd better make a check tonight. I want to get some sleep." (Laughter) We'd check them wards down, you
    know. We'd find some whiskey pretty well every time. (Laughter) There was one guy. He was a double amputee. They had him
    over in the lockup ward for the mental patients. They couldn'tkeep him sober. We picked up the film after they had the
    show. We'd pick up the film and put it up at the gate for the film man to pick them up and leave the new ones. And as
    I started in -1 started out rather - here come this guy with a sack. "What you got in that sack?" He had eleven pints
    of vodka. (Laughter) I took him up there to the ward. He was kind of irresponsible anyway. I told the nurse, I said, "Now
    keep him on the ward. He's bringing stuff in here to so mebody else." Well, when I started to take the film to the gate
    I met him again and he had three more. (Laughter) So that guy, he didn't get none that night. Him and his wife lived next
    door to us there for a while. He was a double amputee. He had an eye out. I know he had a lot of problems, medical problems
    from the war, but he wasn'tsolving any of them by being drunk all the time.
- speaker: Interviewer
  text: You were living where at this time? How have your experiences from the war affected you afterward?
- speaker: Respondent
  text: Well, I've had lots of nightmares and stuff over the years. Those five inch .38s were right there above where we were
    on the .40s, and it made me heard of hearing. They finally, uh, they told me they'd give me my medicine free and they
    give me my hearing a ides. Well, I'd bought hearing aids from Martin Audiology. Cost me five thousand bucks. I could hear
    better with them when I first put them in, but then I'd sweat and I couldn'thear as good with them. And my ears got infected.
    First one thing then another on that account, so I quit wearing them. I told them if, you know, I couldn'twear them. Now
    I don'tknow whether if they use another type of material or what it might make a difference. But they told me anytime
    I wanted to try them to come on up there and they'd try to fit me with some. So, so far I....
- speaker: Interviewer
  text: So your hearing was affected by combat? Oh yeah. Them five inch right there over my head. Now the sixteen inch, they
    stuck out quite a ways. They had more of a rumble. They didn'thave quite a crack like the five inch did. So you said you
    had nightmares for a while. Did you, did those just go away? Not completely. I still have them at times.
- speaker: Respondent
  text: Did you just kind of wait them out? Did you just let them go away? Did you seek help? Did the VA provide any help
    for stuff like that or were there just too many of you guys to...
- speaker: Interviewer
  text: Nah. Too many of them. Well, I took medicine for them a while. And I didn'tknow if ya'll would ask me what that was.
    (Pointing across the room)
- speaker: Respondent
  text: No sir, we haven't.
- speaker: Interviewer
  text: That*s a Japanese flag from World War II. (Chuckles) I got it from another guy. I wanted to get a, to put it in the
    museum up at Fredericksburg but the guy died before we could get any in formation on how he got a hold of it. The Rising
    Sun. So, when we go to schools and everything, I take all of this stuff with us when we make talks to the schools. Do
    you do that often?
- speaker: Respondent
  text: We've made about everyone in Waco. We've made, uh this little town over here, between here and Marl in. I can'tthink
    of the name of it right now, but anyway. We've been here twice at Troy. We've been to that Christian school on [FM] 93
    three times. We've made the academies. You know, the military academies in Waco, all three of them - Navy, Marines, Army,
    Air Force. Well, four of them. Then this last year we went up to Region XII in Waco, and we did it on cameras.
- speaker: Interviewer
  text: What was that like? Different? It was different. It was alright except they didn't get to ask many questions or get
    many answers because it took too long. Of course, when we go to schools we lay it out to them and then let them as the
    questions.
- speaker: Interviewer
  text: So who are you traveling with? Which group are you with when you are making these talks? Well, another guy from Chapter
    10 out of Waco.
- speaker: Interviewer
  text: Did you know him during war or did you meet him afterward? Did you know him during your service or did you meet him
    afterward. No. He was on a different ship. I didn'tknow him.
- speaker: Respondent
  text: What was his name? Frank Curry. Well, Mr. Alston, is there anything - we've exhausted our questions - is there anything
    about your experience that we haven'tasked that you would like to tell us about?
- speaker: Respondent
  text: When we went to the Okinawa, you know, they had them people believing we was so mean that the women was going up on
    the high side and throwing the kids off in the ocean. But they found out pretty quick that that wasn't so, and then they
    got some help from the people that lived on the island somehow. And, uh, they discovered them and destroyed them. But,
    they had made a bunch of- rigged up a bomb on a little old, well like a motorboat. I don'tknow how well it was made. I
    didn't see any. And destroyed them because they was going to use them at night at try to hit the side of the ship with
    them. It would just be a suicide mission. And after the war was over we found out a lot of things. That, uh, they was
    working on a bubonic plague, and if they used the charge to, you know, to scatter them it killed them. They never did
    figure out a way to deliver them. We would have had a lot more trouble, they would have had trouble here in the States
    from that. They sent balloons up, you know, and they tried to set the forest fires up in the southwest - northwest, I
    mean, during the war. And these Japanese, they would - they built a torpedo where the guy could get in it. And he would
    guide it to the ship. Well, he's dead if he hit it and he's dead if he missed it. They couldn't, they couldn'tretrieve
    him. After that was out a while it would kind of get rusty and it wouldn't, the little charge wouldn'tkick it off every
    time. They'd bring the guy back in the sub, go in there, and clean that all up, and start that process again. Now can
    you imagine a man training for that? Now thaf s the kind of people we had to fool with.
- speaker: Interviewer
  text: So, help me understand. At Okinawa, the Japanese women - is this what you were saying - were throwing there children
    over the cliffs? Why would they do that? Out of fear of the Americans?
- speaker: Interviewer
  text: Yeah. That's right. They had them that scared. And you know, those Japanese, it was an honor to die for the emperor.
    It was a disgrace to get captured. We didn't get many of them captured. When we shot all of them ships, got all them ships
    and was going to the shore, they had hand grenades and stuff. Our Army Rangers had to shoot them in the water just coming
    out. They wouldn'tgive up.
- speaker: Respondent
  text: But, from what you know of the Japanese people, they seem to really - once they found out more about Americans and
    appreciated...
- speaker: Interviewer
  text: '''Cause they never was told anything except what they wanted them to hear. Did you have any personal run-ins with
    Japanese citizens?'
- speaker: Interviewer
  text: Nah. No. They'd be some on Hawaii Islands when we'd go over there for anniversaries, and the oldest ones, you know,
    they'd just kind of duck their head, you know, and walk around us. They would, you know, walk right by us. Of course,
    the younger ones, they didn'tknow any different.
- speaker: Respondent
  text: In America there was a lot of fear of the Japanese people. What was ya'll - what were the general feelings of the
    people in the service towards the Japanese people?
- speaker: Respondent
  text: Well, generally wasn'tthat bad. I mean, you know, the people as a whole, they just done what they was told. Just like
    any country, just like Germany over there and the Nazis. Most of them didn'twant to fight. Of course there was some of
    them at did. They had a hard time convincing them Samurai to, you know, they wanted to keep on fighting. And, the guy
    was in our chapter up there. He was in the Marines. He was in the 1st Marines, and he said they were going to be the first
    ones a shore. They told them there would probably be 110% casualties. That meant none of them would probably make it out
    a live. I'm sure they had tunnels dug in the main island just like they did in these other places, and they'd have to
    bring them out of there. They would have lost more people on both sides. You know, they keep saying we shouldn'thave dropped
    the atom bombs, but they would have lost more people and we would have lost a bunch of people if they hadn'tdropped them.
    So, Harry, he was - he could see that, and everybody else could except the Japanese. (Laughter) Now what happened to the
    Marines on Okinawa, they had a tunnel dug through that rock. Uh, they'd make there way up there - fight all day and they'd
    get up there. Well, at night them Japanese came down that tunnel, reinforcements, and they'd push them back. (Laughter)
    So, they kind of figured out what was happening, and then they started blowing up the tunnels____(??) go up and down it.____(??)
    got caught in there, well that would be the end. My neighbors give me these. (Reaching for two minted coins) One of them
    is of 9/11. The other is of Pearl Harbor. There's something on both sides.
- speaker: Interviewer
  text: I didn'tknow who give them to me. You know, they had a party for my 85th birthday. I didn'tknow, I thought it was
    just our group going to eat out. I don'tknow where they got them, and I don'tknow how they found it was my birthday. (Laughter)
    But anyway, they brought them over here to me. They live over here in this house across the street.
- speaker: Respondent
  text: Well, Mr. Alston, you sure have experienced a lot in your days. We really appreciate the opportunity to sit and hear
    a little bit from you.
- speaker: Interviewer
  text: Yeah. Well, I don'twant to keep you too long. (END OF TAPE)
