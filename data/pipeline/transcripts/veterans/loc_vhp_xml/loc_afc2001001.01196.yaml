source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: I enlisted.
- speaker: Interviewer
  text: Why did you choose the Air Force Reserves?
- speaker: Respondent
  text: Number one, I felt the Air Force was -- of the four military branches, I liked the Air Force the best. I have a mechanical
    background, and I knew that working on aircraft was -- well, aircraft are certainly very high-quality, high-precision
    mechanical devices, and I enjoyed that type of technology and mechanical work and just felt that that was the best --
    best fit with my mechanical skills.
- speaker: Interviewer
  text: And where were you living at the time? Do you recall your first days in the service? Did you go through, like, a boot
    camp situation?
- speaker: Respondent
  text: I enlisted the 1st of December, then did not go to basic training until sometime in January of '65.
- speaker: Interviewer
  text: Basic training was down at Lackland Air Force Base in San Antonio, Texas. So I spent six weeks at basic training in
    Lackland, and that was not particularly fun. Wasn't it? Was it pretty challenging?
- speaker: Respondent
  text: Oh, yeah. Oh, yeah. Mentally and physically? Absolutely. Absolutely.
- speaker: Interviewer
  text: Do you remember any of your instructors?
- speaker: Respondent
  text: Yeah. I remember both of them. I don't recall their names. One of 'em was Sergeant Peace. And I don't recall the other
    fellow's name.
- speaker: Interviewer
  text: How did you personally get through the experience? It was just kind of grin and bear it or --
- speaker: Respondent
  text: Yeah. Yeah. Yeah, exactly. I had learned or heard from others beforehand, said "Just don't volunteer for anything.
    Just keep your mouth shut. Do what you're supposed to do. And don't make a big stir." And I made it through in good shape.
- speaker: Interviewer
  text: So the Vietnam War was going on? After basic training, where did you go from there?
- speaker: Respondent
  text: My next step was off to tech school. When I enlisted in the Air Force Reserve I had an option of two slots that were
    open at the Air Force base. One of them was reciprocating engine aircraft mechanic, and that's what I wanted. I wanted
    to work on the aircraft. So I went to tech school at Shepherd Air Force Base, Wichita Falls, Texas, and that was about
    a 13-, 14-week tech school to learn about becoming a mechanic on reciprocating or piston engine aircraft.
- speaker: Interviewer
  text: And I came home in June of '65 after completion of tech school. Back to Indianapolis? Back home. So you had some time
    off, so to speak?
- speaker: Respondent
  text: Um-hum. And then went back to work and then back to school.
- speaker: Interviewer
  text: So you had further training, then, after that?
- speaker: Respondent
  text: No. I went back to Purdue Extension. I was attending Purdue Extension.
- speaker: Interviewer
  text: Okay. So, you went back to Purdue. Then at what point did they call you up again?
- speaker: Respondent
  text: Well, once I got in the Air Force Reserve I thought "Well, I've got it made. I avoided the draft and probably will
    have avoided going to Vietnam." And I thought "Well, perhaps I've got it made." And then on April 11th of 1968 the announcement
    came over the radio, all the news media all across the country that the Secretary of Defense was activating about 24,500
    reservists and Guard people all across the country. And the unit that I was attached to down at Bakalar Air Force Base,
    the 930th Tactical Airlift Group, was one of those units that was announced for the activation. And we had a 30-day period
    to get our personal effects in order. And then we reported for active duty down at Bakalar Air Force Base on Monday, May
    13, 1968. And there were all total, there were about roughly 350 reservists that reported for active duty at that point
    in time. We did not know why we were called nor did we know what our mission would be at that point in time. As it turned
    out, we were the only Air Force Reserve unit flying C-119 aircraft that was activated. And the Air Force had a very special
    mission in mind for us, but we didn't know it at the time.
- speaker: Interviewer
  text: Okay. So what happened next?
- speaker: Respondent
  text: Well, we reported on May 13th. Shortly after going through all of the in-processing and so forth and immunizations
    and that sort of thing, shortly after that we learned that the unit was going to be transferred over to Lockbourne Air
    Force Base over at Columbus, Ohio, and that's on the south side of Columbus. It's now Rickenbacker Air National Guard
    Base, I believe. But, the unit was being transferred over there to pick up our new mission. So I think by June 15th of
    '68 we had all packed up our equipment and 18 aircraft and we all transferred over to Lockbourne Air Force Base. And once
    we got over to Lockbourne we started to learn much more about what our mission was going to be. The name was changed --
    when we were activated we were the 71st Tactical Airlift Squadron, and then shortly after we arrived over at Lockbourne
    Air Force Base the unit was redesignated 71st Air Commando Squadron. That lasted for three weeks. And then on July the
    8th, I believe, the entire Air Force Air Commando Command was renamed from Air Commando to Special Operations. So our
    unit then became 71st Special Operations Squadron, and it remained so until our unit returned home in 1969. While we were
    at Lockbourne, we then learned substantial more details of our mission, and the mission was that the C-119 conventional
    cargo type aircraft were being replaced and upgraded -- or, converted, I should say, to gunships. The C-119 gunship program
    was to replace the AC-47 gunships that were currently being used at Vietnam, being used very successfully. But the C-47
    gunships had a lot of restrictions and drawbacks, and the Air Force was looking for a better gunship platform to use for
    that type of weapon, and the C-119 was selected as an interim aircraft or a newer gunship. So during the summer of 1968
    we -- the entire unit -- that includes flight crews and aircraft maintenance personnel -- all went through training and
    familiarization to become --
- speaker: Interviewer
  text: With that aircraft?
- speaker: Respondent
  text: With the gunships. As we started receiving the converted cargo aircraft as gunships, then we began training on the
    new gunships. Not only flight crews, but also ground maintenance people. So, we spent the entire summer of '68 transitioning
    from the normal cargo aircraft over to the gunships. And flight crews spent a considerable amount of time learning the
    new ships, especially the weapon systems on the aircraft. Also during those summer months we started receiving more personnel
    from the regular Air Force ranks to augment the reservists to complete -- we had 18 gunships, and ultimately before we
    shipped out for Vietnam we ended up with 24 flight crews.
