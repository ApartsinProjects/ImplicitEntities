source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: Joe, when you entered the military, where were you living just before that? What were you doing? Were you in school,
    or what?
- speaker: Respondent
  text: I was at the University of Chicago, in the business school there. Of course, we all had very much on our minds. What,
    when and where we might want to enlist or what kind of program might be suitable for our particular circumstances. As
    everybody knows, at that time, it was almost a full court press war effort by both the civilian population as well as
    all in the military, to get the goals done and overcome those people who chose to attack us on December 7, 1941.
- speaker: Interviewer
  text: So, what year did you end up enlisting?
- speaker: Respondent
  text: Actually, there were several programs available to college students, and I enlisted in what was called the 'V7 program,'
    which, ultimately, it was attractive to potential officers for the U.S. Navy - Naval Reserve, really.
- speaker: Interviewer
  text: So you enlisted in the Navy?
- speaker: Respondent
  text: I enlisted in that program on September 15, 1942. Of course, I was allowed to continue school until they ordered me
    to active duty. And that could have been two weeks, two months, two years - at their convenience, of course, to accommodate
    their needs.
- speaker: Interviewer
  text: So at the time it was common for people to look for ways to enlist, or ways to participate?
- speaker: Respondent
  text: Yes. You had some choices, of course. You knew, of course, you were eligible for the draft like every eligible male
    civilian. So, at some point you kind of balanced either being a doughboy in a mud hole or foxhole, or maybe a cleaner
    kind of thing would be in the ocean (chuckles).
- speaker: Interviewer
  text: And that's why you chose the Navy!
- speaker: Respondent
  text: Pretty much so. I would say that certainly was a factor. Not that the Navy was potentially all that much a bed of
    roses. But at least you were clean! You were not in mud, and you were not in water. And the only thing that I could think
    of would be that North Atlantic run - I forget the name of it. But that would have been winter - very, very difficult
    duty aboard ship, whether it was a cargo ship or an accompanying destroyer to the fleet that ran to Mermansk and other
    places like that. And, of course, the threat of submarines was always there. And at some point, I don't know whatever
    duty they would… send me, but at least I was more comfortable in hot weather in the Pacific than I would have been in
    that North Atlantic duty.
- speaker: Interviewer
  text: Okay, so you picked the Navy. Where were you inducted?
- speaker: Respondent
  text: I was ordered to active duty. When I enlisted in the Navy as an apprentice seaman in class V7, I was immediately transferred
    to inactive duty. And then I was ordered to active duty on September 30, 1943.
- speaker: Interviewer
  text: So a year later.
- speaker: Respondent
  text: Yes, that's right, it was a year later. And, of course, we were all confused in school. When we were going to get
    called up, how serious was it to miss school for you, and I happened to be accepted into the business school from a two-year
    junior college - Morton Junior College. And at the University of Chicago, it was entirely up to you - you didn't have
    to be at class; the quarterly exams would cover a proficiency. The way they graded at that time - passing grades. And
    having been used to the regimen of mandatory class attendance, mandatory submission of class work, testing and all that,
    I found this sort of new reading in U of C rules. We couldn't take class work too seriously if we might be in the Navy
    next month. So there was suddenly a little awakening, and the ball's in my court, and you had to make those choices whether
    to go to class or not to go to class. So there was a transition there from a new kind of freedom into responsibility.
- speaker: Interviewer
  text: Okay. So, you were inducted where?
- speaker: Respondent
  text: I was to report to active duty at the University of Notre Dame as an apprentice seaman for that particular class of
    V7 candidates.
- speaker: Interviewer
  text: Okay. What were your first days like on active duty when you were at Notre Dame?
- speaker: Respondent
  text: Like any other apprentice seaman, I'd say it was like that for any major induction facility. You went through the
    same routine. Forget that you were potentially going to be an officer. You did the same calisthenics, reveille was at
    5:00 or 6:00 a.m. - whatever it was, it was cold in that period of time to get out into the field for calisthenics and
    running and all that! Basically, once you passed the apprentice seaman 30 day program, then you went into class work as
    a midshipman.
- speaker: Interviewer
  text: How did you feel when you started the program, when you were inducted? You said you went from the regimentation of
    going to class every day and doing assignments every day, to the University of Chicago where they said it was really up
    to you, and they were much more relaxed about those rules, to all of a sudden going back to having to be here, get up
    at this time, you eat at this time, you do your exercises?
- speaker: Respondent
  text: I had no problem with it at all. I think I needed, at that age in my life and at that point - I was still single,
    I hadn't met my future wife - and I considered it very helpful to order my life a little better. And, as it turned out,
    when we started the midshipman classes - and they consisted of about four or five navigation and gunnery and seamanship
    and naval protocol; the "spit and polish" stuff, rules and regulations. It turned out that I seemed to do reasonably well,
    to the extent that when it came to final exams, because of my classroom record, I was excused from the final exams. And
    they interviewed me as a potential instructor - to continue on there as an instructor. And my poor roommate, who was from
    the south, he had to struggle through every one of those exams, and he was very slow with them. He was very intelligent,
    very gentlemanly, but a little in the southern way and tradition, he had a hard time getting moving in the cold weather
    (chuckles a little). One of his biggest treats, a personal thing, was when he had a few sticks of sugarcane from home,
    and he just bit it off and said, "Joe, I have a piece of the south practically." (both chuckle)
- speaker: Interviewer
  text: So what was your day like when you were going through this initial training phase?
- speaker: Respondent
  text: Classroom work, classroom work, classroom work, test, test, test, the continued physical programs - calisthenics -
    pretty much a five-day solid week. And Saturday, generally, you had a port watch and a starboard watch. And we got Saturday's
    and Sunday's off every second weekend.
- speaker: Interviewer
  text: You had a port watch and a starboard watch - you weren't on a ship, so where were you watching?
- speaker: Respondent
  text: No, no. That was Navy terminology, and you're either one or the other from day one. And port watch, in that case,
    in classroom conditions and educational and training stays on base and has some other duties included - a little bit of
    security and keeping watch. The starboard watch, then, at that time has shore leave.
- speaker: Interviewer
  text: So it was just dividing you into two groups, and half had leave and half stayed.
- speaker: Respondent
  text: And that continues on throughout the whole Navy - port and starboard watch, on ships as well as wherever you're based.
    So that makes it rather simple. You can plan, you know, and of course there are tough conditions when you're in combat
    and things like that. But generally that's the Navy system, if you will.
- speaker: Interviewer
  text: Okay. So you said you'd be awakened at 5:00 or 6:00?
- speaker: Respondent
  text: Well, pretty much so. I would say 6:00 was a reasonable recollection. The first thing you'd do was to throw on some
    sweats, and you'd go out onto the Notre Dame field - the stadium - out for calisthenics and a certain amount of running;
    the physical part of it. And you'd probably have that for maybe a half hour, forty minutes. And you'd return to quarters.
    And, of course, there was shower time until breakfast. You'd shower and then you'd get whatever the uniform of the day
    was.
- speaker: Interviewer
  text: Were you staying in the dormitories? The regular college dormitories?
- speaker: Interviewer
  text: So you weren't in a barracks type of arrangement.
- speaker: Respondent
  text: No, not there.
- speaker: Interviewer
  text: How many of you were in a room - two to a room?
- speaker: Respondent
  text: Two to a room. We had a particular dormitory - what was the name - Baden Hall, I think. So when my family visited
    Notre Dame, I asked them to see if it is still there. It was pretty old and decrepit when we were there, and I wondered
    if sixty years later if it was still up and running! (chuckles) And I guess it was, including the golden dome.
- speaker: Interviewer
  text: So you'd get up, do your calisthenics, come back, go to breakfast - what time did your classes start, then?
- speaker: Respondent
  text: Well, I would say they started at 9:00. That's probably accurate. Maybe even a little earlier - 8:30, perhaps. You'd
    have a half hour to get showered and dressed, then about a half hour for breakfast.
- speaker: Interviewer
  text: And you were in uniforms?
- speaker: Respondent
  text: We all had the same uniform - yes.
- speaker: Interviewer
  text: So, were you in classes - was this a separate part of the university, or were you in some classes with the other university
    students as well?
- speaker: Respondent
  text: No. They just used the facilities, but it was strictly just Navy oriented classes.
- speaker: Interviewer
  text: So what types of classes were they - what did you cover in the classes?
- speaker: Respondent
  text: Navigation, for one; seamanship, gunnery, damage control and there had to be at least one more probably. Let's see.
    You'd have aircraft identification, slipped into maybe perhaps gunnery classes - Japanese aircraft, Nazis' aircraft -
    to be able to, they'd flash it on the screen and so forth and you had cards and things like that.
- speaker: Interviewer
  text: So you had to find the right card and show them what it was?
- speaker: Respondent
  text: And get to know what a Japanese Zero looked like, and the Nazi planes - it's so long ago I've forgotten what some
    of those names were. But, anyway - yes, we had regular classes of perhaps about 45 to 50 minutes. And of course you'd
    go into the mess hall for lunch. And everything evolved around that - all your meals. There were still students there,
    and we shared the mess hall with a section. For us, there was also a V12 section at the same time, which was Navy air
    pilots - I think they went through the same to become a commissioned officer, and then they went on to their aviation
    training. And there was a certain amount of rivalry when we were all at the same football game together - Annapolis Navy
    team played Notre Dame (both chuckle), and it was quite something to be sitting in the stands with your uniform and knowing
    you're in the Navy, and here they're playing what little there was of football in those days. There weren't that many
    candidates. But there were reasons - some had legitimate physical reasons.
- speaker: Interviewer
  text: You said you had some conflicted feelings during those games. (both chuckle)
- speaker: Respondent
  text: Well, a little bit, sure, of course. But they were exciting, obviously. It was an opportunity. And that was something
    through my whole Navy career - it created opportunities as well as anxieties. The travel part - like I said, I was single.
    I didn't save a lot of money, and I said, "Once I see this world, they're going to have a hard time keeping me home!"
    It didn't work out that way, it didn't work out that way (chuckles), because of resources, and you made commitments, and
    you started raising a family, finishing your school and things like that. And, so, those things get set aside while you
    focus on resuming some kind of what you might describe as normal life and a career, if you will.
- speaker: Interviewer
  text: And so, when you were at Notre Dame and you had your Navy classes, but you still saw the other students there - the
    regular Notre Dame students, the civilians - did you mingle at all?
- speaker: Respondent
  text: 'Very little interplay. Very little interplay. Because we were all housed - it was all our programming and our house
    - I''ve got a picture: this section 42 I was in, whatever - and I think the sections consisted of maybe 24 men, and then
    they become a larger thing, you become a battalion, you went through the usual parades and so forth. But I had a picture
    of our section. And it was alphabetical, the way they cut them off, just like in high school. And every one of those men
    who we lived with for four months signed their names and addresses on the back of the picture, and I still have the photo
    somewhere. But that was the beginning - that was pre-battle - the job was getting prepared, getting ready.'
- speaker: Interviewer
  text: So how long were you there - you said four months?
- speaker: Respondent
  text: It was four months - one month as an apprentice seaman, and three months; it was a ninety day program which they used
    to call '90 day wonders.' We sardonically called it '90 day blunders!' And you'd become an Ensign, an 'officer and a gentleman'
    when you'd complete that.
- speaker: Interviewer
  text: So where did you go after those four months?
- speaker: Respondent
  text: My next assignment -- I was appointed an Ensign on the 20th of January 1944, and 8 days later I had to report to Little
    Creek, Virginia, for amphibious training.
- speaker: Interviewer
  text: So at this point you were just short of your 22nd birthday?
- speaker: Respondent
  text: Yes, how about that! Well, no - I was born in March. Oh, 1922. Okay.
- speaker: Interviewer
  text: So you were just short of your 22nd birthday.
- speaker: Respondent
  text: Oh, yes. That's correct. I'm sorry. I was thinking of when we were married, after the war. Okay. Yes. You're absolutely
    correct.
- speaker: Interviewer
  text: So you went to … Little Creek, Virginia, until May.
- speaker: Interviewer
  text: How did you get to Little Creek?
- speaker: Respondent
  text: We all had orders and they'd reimburse transportation. There was a system - reimbursement for travel expenses.
- speaker: Interviewer
  text: So you had to get there on your own.
- speaker: Respondent
  text: Yes, pretty much so. I think anyone who was close between here and the east coast, we rode the New York Central and
    Pennsylvania Railroad on the same day, and we picked up several classmates. Just a little side thing - there was one fellow
    who was from Shaker Heights, Ohio. And his father had enough clout with some tremendously large corporation. So, rather
    than his going to downtown Cleveland to get on the train, they just pulled the signal at the Shaker Heights crossing and
    the train stopped just for him! (both chuckle). You were looking for little personal vignettes. So, yes, we went by train.
- speaker: Interviewer
  text: So you went by train and you got to Virginia. What did you do there?
- speaker: Respondent
  text: This was when we actually physically came in contact with small boats - landing craft. So we got trained in landing
    craft operations. And these were basically the 36' ones. Later on there were a lot bigger ones. But we were on the small
    ones.
- speaker: Interviewer
  text: And what did you learn to do with them?
- speaker: Respondent
  text: Well, each one had a crew of four, and you learned a little bit about the operation on the diesel motors, you had
    50mm guns - two gun positions - you had to learn how to operate, you had beaching - either personal landing or vehicles,
    whatever it might be - and you learned formations - tried to for
