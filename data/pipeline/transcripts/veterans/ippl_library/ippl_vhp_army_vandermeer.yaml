collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: Howard, tell us where you were living before you entered the service. What was your life like just before you went
    in?
- speaker: Respondent
  text: Well, I was one of seven children, and I was on the tail end of the food chain. We lived in the Roseland area in Chicago.
    That's the only home I really ever knew when I was young. I went to Fenger High School which is still in Chicago. Not
    too long after that I got a few part-time jobs. Eventually my number came up and I was drafted into the service.
- speaker: Interviewer
  text: How old were you when you were drafted? Had you already graduated from high school?
- speaker: Respondent
  text: Oh, yes. So I had a notice that was sent to my parents' house that said I had to report to the local draft board and
    I went there. So I went to the draft board and there was a school bus sitting there. There were about 35 of us they herded
    on the bus. May I inject some humor?
- speaker: Interviewer
  text: Sure. Absolutely.
- speaker: Respondent
  text: 'They took us downtown to some big induction place. We got in this room. And by the way, on the bus very few people
    were talking to each other. I think they felt like I did: What''s going to happen to me next!'
- speaker: Interviewer
  text: How did your parents react; your family? Did they expect this?
- speaker: Respondent
  text: Oh, yes. Yes. In that day and age that was quite good. So we got in this room and there was this very long table with
    about 8 or 9 officers sitting by it. The first fellow took my papers, looked them over and stamped them "Navy." And I
    looked at him and said, "I don't want to go into the Navy." He said, "Well, I'll be darned. If you don't want to go into
    the Navy, I'll call the Secretary of the Navy and tell him that." And, of course, I couldn't find a crack small enough
    to crawl into. So he said, "I want you to come with me; follow me." I told him, "I don't mind serving my country. I just
    don't want to be in the Navy. That's all." And everybody is looking at me. I felt so humiliated - almost shameful. He
    took me in an end office. There was an officer in there who probably was a psychologist. And he said to me, "Young man,
    I understand you don't want to be in the Navy. Can you give me a good reason for that? Because, you know, Dutchmen are
    the world's best sailors. They brought all the tea from Indonesia in frigates, in big sailing vessels, into England and
    Rotterdam. And you don't like the Navy?" I said, "Not really." He asked, "Why?" I said, "Well, if the captain makes a
    mistake and turns the boat to port instead of the other way and they take a torpedo, we'll all go down because of the
    captain's mistake. And that's why I'd rather be in the Army. I'll have better control over my own destiny than having
    someone like a captain figuring it out for me." This man sat back and said, "Well, I'll tell you something. You're the
    only person I'll ever change this for. That was a good reason." So he scratched it out and wrote down, "Army." And that
    was the beginning of my military career. I was skinny, shook up, and apprehensive about everything that was going to happen
    to me. And that's where I am.
- speaker: Interviewer
  text: Where were you that day?
- speaker: Respondent
  text: We went to Fort Sheridan. We were only there for a short time.
- speaker: Interviewer
  text: And what happened besides your conversation about Army or Navy? What else happened while you were there?
- speaker: Respondent
  text: Nothing much. That was sort of a holding pattern for new draftees.
- speaker: Interviewer
  text: How many men were in that facility that you saw?
- speaker: Respondent
  text: I really don't know, but there were a whole lot of them. They were coming from all over the Midwest. My busload was
    only a little tiny bit. They finally gave the orders and put some of us on a train. We went to Fort Roberts, California
    where I took basic training in field artillery.
- speaker: Interviewer
  text: So at Fort Sheridan you got your equipment, you sworn in - all of that.
- speaker: Interviewer
  text: And then you got on a train.
- speaker: Respondent
  text: And went to Camp Roberts.
- speaker: Interviewer
  text: How long did that train trip take?
- speaker: Respondent
  text: I think it was almost two days.
- speaker: Interviewer
  text: Did you know anybody on the train from your neighborhood?
- speaker: Respondent
  text: Never knew a person.
- speaker: Interviewer
  text: What was the train trip like? Did you guys play cards? Did you read? Was it noisy, quiet?
- speaker: Respondent
  text: I think some of the soldiers-to-be because of the length of the train ride. I was talking to a fellow who was sitting
    near me. And people were starting to fraternize with each other. They don't have any choice! When we got there, that's
    when I got my basic training in field artillery.
- speaker: Interviewer
  text: Had you been to California before?
- speaker: Respondent
  text: Never. It was a new experience.
- speaker: Interviewer
  text: What was it like when you stepped off the train? Did they have a bus waiting for you?
- speaker: Respondent
  text: They had buses waiting for us. They put us in a barrack and we had a half a day to settle down. The next morning we
    had to go on a march.
- speaker: Interviewer
  text: What was your barrack like? Was it a one-level barrack - like a Quonset hut kind of thing?
- speaker: Respondent
  text: It was a two-story barrack.
- speaker: Interviewer
  text: Bunk beds or individual beds?
- speaker: Respondent
  text: Bunk beds. I spent my first night in that barrack. I was on the first floor. I don't know how they picked me for the
    first floor. The next day we went on a forced march.
- speaker: Interviewer
  text: And how did they wake you up? Very gently, right?
- speaker: Interviewer
  text: How did they wake you up? Do you remember?
- speaker: Respondent
  text: Well, the first sergeant hollered from the end of the hall, "Everybody up!"
- speaker: Interviewer
  text: And how much time did you have before he came down the row?
- speaker: Respondent
  text: I'd say ten or fifteen minutes. And so he'd say, "Fall out." And everybody would go outside, line up and then we started
    our first march. He was a rather nice man. I was very impressionable. I like people who like people, and he was quite
    nice. After, I believe it was nine months, our orders were changed. We had heard that the war was going bad and they needed
    more soldiers overseas.
- speaker: Interviewer
  text: Let's back up a little bit. You're doing your forced march. Tell me a little bit about what it was like during those
    nine months.
- speaker: Respondent
  text: It was kind of nice. I'd never been in an area where there were such big hills and nearby mountains.
- speaker: Interviewer
  text: Certainly not in Chicago!
- speaker: Respondent
  text: That's right. We were trained to use 105mm howitzers, and we would go out to a place called Hunter Liggett, which
    is a huge military reservation. And we'd fire at targets somebody put up on the mountainside. That's really what I was
    trained for.
- speaker: Interviewer
  text: Was this part of your initial training - your basic training - or was this part of your MOS?
- speaker: Respondent
  text: That was basic training. So finally I came up and they told several of us we were going to get a furlough, and we'd
    have five days. So we went back home, and I spent four days with my family.
- speaker: Interviewer
  text: How did you get back home?
- speaker: Respondent
  text: By train. And then I had to report to South Camp Polk in Louisiana.
- speaker: Interviewer
  text: When you went to visit your family, did they tell you why you were getting a furlough?
- speaker: Respondent
  text: No. They just said you were getting a furlough.
- speaker: Interviewer
  text: Yes. Because we were between different training sessions. So you had your basic training, and you talked about the
    march you did that first morning. Tell us a little more about what it was like in a typical day during that time. What
    was your wake-up time?
- speaker: Respondent
  text: We got up generally at 6:30 every morning. Every day we had a fall-out outside to do exercises - push-ups and things
    like that; that was a daily routine. And sometimes we'd hitch our guns behind a truck and go up into the mountains and
    start shooting at targets.
- speaker: Interviewer
  text: Did you have classroom time at all?
- speaker: Respondent
  text: We did. Not very often.
- speaker: Interviewer
  text: What sort of classroom training did you have?
- speaker: Respondent
  text: That kind of training, in a classroom, had much to do with safety of the equipment we were using - how to use it,
    how to load a shell, how to catch a hot shell when it's fired and things like that. That's really what the school part
    was.
- speaker: Interviewer
  text: You had to learn how to use a rifle, too?
- speaker: Interviewer
  text: Had you fired a gun before?
- speaker: Respondent
  text: Well, I was a hunter.
- speaker: Interviewer
  text: So that was not new to you.
- speaker: Interviewer
  text: What were your meals like?
- speaker: Respondent
  text: I don't even remember, but they were good.
- speaker: Interviewer
  text: You were probably hungry by the time meal time came around!
- speaker: Respondent
  text: That's right. And on weekends I met a fellow - he and I became sort of friends. He said, "Howard, do you want to come
    with me? I'm going home near Los Angeles." I said, "I don't know. I was going to go to church on the base here." He said,
    "I'll take you to something you'll never forget." So I went with him and we hitch-hiked to Los Angeles.
- speaker: Interviewer
  text: Were you in uniform?
- speaker: Respondent
  text: Oh, sure. And he took me to hear Aimee Semple McPherson, a famous woman pastor. Do you remember her?
- speaker: Respondent
  text: She really blew me away! She's dancing around up on the stage. I'm from an old Dutch family, and we don't do that
    in church! But she was just so dramatic. And her sermon was good. Then my friend took me to his parents' house and we
    had dinner. Then we had to quickly leave to go back to the camp.
- speaker: Interviewer
  text: You had to be back by a certain time?
- speaker: Respondent
  text: Yes. I think it was 7:00 or 7:30.
- speaker: Interviewer
  text: What happened if you didn't get back in time?
- speaker: Respondent
  text: Nothing, really. They weren't that strict. But I did that for almost nine months. And I got to see a little bit of
    California that way. And that was a rather interesting experience because I never thought in my life I'd be working on
    a 105mm canon. That's a big thing! It kind of surprised me. I really felt bad when I was told I was going to get a furlough
    and then was told I'd have to report to Camp Polk. One of the staff sergeants who was in charge of our barrack, he said,
    "I want to tell you guys something. You can set your clock by this. You're going to go to Camp Polk South. There's only
    one place worse than North Camp Polk, and that's South Camp Polk. They're going to walk you 50 miles a day. You're going
    to learn how to crawl under machine gun fire. When they get through with you, you're going to be a soldier's soldier."
    I got a little bit worried!
- speaker: Interviewer
  text: It didn't sound like fun, did it?
- speaker: Respondent
  text: He didn't paint a pretty picture! So when I got there at Camp Polk I had a tech sergeant who was in charge of our
    barrack. He was an older fellow. I don't know why he liked me, but I didn't get some of the dirty details that some of
    the other guys got.
- speaker: Interviewer
  text: What did some of the other guys get?
- speaker: Respondent
  text: Well, I always had my bed made. He'd come out and inspect how your bed was made every morning.
- speaker: Interviewer
  text: And if he didn't like it, what would happen?
- speaker: Respondent
  text: He'd just grab one end, throw it across the hall, you'd go get it and do it again. He never did that to me. I guess
    that came from my upbringing. I was raised in a large family and everybody had their place, and everything had its place.
    I just do that intuitively. I don't need a letter or orders! So he took sort of a shine to me. I don't remember how long
    we were there - but it seemed like forever because they worked us so terribly hard. We went through calisthenics, we went
    through all sorts of exercises, road marches; we crawled under live machine gun fire.
- speaker: Interviewer
  text: So that sergeant in California had been right.
- speaker: Respondent
  text: That's right; absolutely. And as we went along we finally were told we were going to go overseas.
- speaker: Interviewer
  text: Did they tell you where overseas?
- speaker: Respondent
  text: No, they didn't say anything. They just said we were going to be mounting up the following week and going to a ship-out
    station on the east coast. They took us to the east coast. I forget the name of the fort we were in.
- speaker: Interviewer
  text: By train again?
- speaker: Interviewer
  text: Were you able to tell your family that you were leaving?
- speaker: Interviewer
  text: Were you able to be in contact with your family during your basic training at all?
- speaker: Respondent
  text: Yes. Of course in those days the telephones were not that frequent and cheap. My mother had a nickel jar and you'd
    put in a nickel in every time you made a call. We were on the frugal side. But we finally got to the east coast. I think
    we were there for two days, and then we got aboard a ship.
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Respondent
  text: No, I don't. I remember the one going to Japan - that was the Sea Bass. But I don't remember the other one. But it
    was a passenger ship that was converted to a military ship. And on the back of it - the fan tail - they mounted a canon
    and off we went.
- speaker: Interviewer
  text: How many men do you think were on the ship? Do you have any idea?
- speaker: Respondent
  text: Oh, I would say there had to be 1200.
- speaker: Respondent
  text: All Army. All from the 8th Armored Division, 49th Infantry Battalion, which I was in. So we moved as a unit. And we
    got to England and they put us on another train.
- speaker: Interviewer
  text: How long did the trip take you across the Atlantic?
- speaker: Respondent
  text: I think that took us three or four days.
- speaker: Interviewer
  text: That was a pretty quick trip.
- speaker: Respondent
  text: I can't be sure. But I know at one time there was a submarine alert.
- speaker: Interviewer
  text: What did you have to do?
- speaker: Respondent
  text: 'Well, we were told when we got on the ship if anything happened what to do: go back to your bunk and stay there.
    So they had this alert. And some of the crew men fired this big gun in the back. It must have been 155mm. And it shook
    the boat so bad that some of the water pipes came loose. When you were down in the galley where you eat, there was about
    a foot of water. So when the ship rolls this way there''s three feet here and nothing up here, then it changes to the
    other side. And that was one of the exciting moments on that trip across the Atlantic. And the Germans were sinking our
    ships like all get out. Fortunately we made it.'
- speaker: Interviewer
  text: Now you said you were told to go to your bunks. Did you have regular bunks, or were they the hammocks?
- speaker: Respondent
  text: They were the hammocks.
- speaker: Interviewer
  text: How many high?
- speaker: Respondent
  text: Three hammocks high.
- speaker: Interviewer
  text: Three high. And how many were in each room - in the space? Were you in individual cabins?
- speaker: Respondent
  text: No. We didn't go in individual cabins. You were in big rooms.
- speaker: Interviewer
  text: So where were you - the top, middle or lower hammock?
- speaker: Respondent
  text: I was in the middle.
- speaker: Interviewer
  text: You were in the middle.
- speaker: Respondent
  text: 'So we finally got to England and they took us to a place called "Kidderminster," a quaint little English village.
    And I didn''t know what was going to happen. Several of us got along pretty good. We kept asking questions of other people:
    "What do they do in Kidderminster?" Finally we found out we were going to have some more advance training.'
- speaker: Interviewer
  text: What year was this? Do you remember?
- speaker: Respondent
  text: This was all in 1944. We were taught how to ride the back of a tank.
- speaker: Interviewer
  text: Than back of a tank.
- speaker: Respondent
  text: Hang on to the back of a tank, up on the tank, but laying down on it. Then the tanks would go down some big hills
    and back up again. The object was to hang on! So we did that for about two weeks. Then we shipped out and went across
    the channel. We were nowhere near Omaha Beach or any of that; we were late-comers to the war. When we got there we went
    to Pont-a-Mousson, France - almost as far as you could go in France without going into Belgium. There we were billeted
    in a field.
- speaker: Interviewer
  text: What were your living conditions like?
