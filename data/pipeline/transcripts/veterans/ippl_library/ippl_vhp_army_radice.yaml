turns:
- speaker: Interviewer
  text: Gerry, where were you and what were you doing at the time you decided to go into the Army?
- speaker: Respondent
  text: March 5, 1939, I joined the Illinois National Guard, primarily to learn how to ride a horse. Because at that time
    the field artillery, in which I became an officer later, was horse drawn. And I became a wheel horse driver, which meant
    I had the horses closest to the wheel on the lead. We went up to Camp McCoy, Wisconsin, and I was the wheel horse driver
    and I got off the horse after camping. I'm an equestrian, whatever that word is. I became a gunner on the 75mm French
    howitzer, which was a gun that was used in WWI. By 1940, about a year later, we were mechanized. We had old GMC trucks
    and Ford trucks and we were able to pull the howitzers around. On March 5 or 6 of 1941, actually, it was in September
    of 1940, we were told we were going to be federalized and put in active duty. That was going to be November and it was
    delayed until March. So in March we were federalized, and about two weeks later we went down to Camp Forrest, Tennessee
    - about the middle of the state. We helped the contractor build the fort, build the buildings, put the roofs on, put the
    sidings on, make the sidewalks. And at the same time we went into our training of using 105, I mean, well at that time
    it was 75mm howitzers. And then later on, in 1941, we received the 105's, which was the basic weapon for light field artillery
    until the end of the war. The other artillery weapon that was used was the 105, but the 155 howitzer. In the Illinois
    National Guard there were three battalions, three regiments, of artillery. One was a 155 howitzer, and there were two
    75 or 105 howitzer. I was in the 124th field artillery out of 5200 Cottage Grove in Washington Park, Chicago.
- speaker: Interviewer
  text: What were your feelings and what were the feelings of the other guys in the unit when you were federalized. I mean,
    obviously there was a war going on in Europe. What was the mood or the feeling?
- speaker: Respondent
  text: We didn't know what the hell was going on! It was all strange to us. We were at the bottom of the hill. We didn't
    know what was going on. All we did was accept what was happening.
- speaker: Interviewer
  text: And where were you when Pearl Harbor was bombed and you got the news on that?
- speaker: Respondent
  text: When Pearl Harbor was bombed I was still a Private, which was on December 7, 1941. And it just so happened that, in
    order to make some extra money, I became a motion picture projectionist. And I was the projectionist for one of the theaters
    in Camp Forrest. That Sunday night I was projecting. I'm not sure what the movie was, now, but the MP's came in and closed
    us up and said Pearl Harbor had been bombed, we were at war, and go back to your units.
- speaker: Interviewer
  text: That was the evening of 1941.
- speaker: Respondent
  text: That was about 7:00 Chicago time. 1941.
- speaker: Interviewer
  text: And then what happened?
- speaker: Respondent
  text: Well, we just went back to work, back to study and back to learning our trade of being artillery.
- speaker: Interviewer
  text: And at this point you were still in Tennessee.
- speaker: Respondent
  text: Yes. This was all in Tennessee.
- speaker: Interviewer
  text: And when did you get your first orders to move out?
- speaker: Respondent
  text: Well, actually, we were in Camp Forrest. And when we were there I applied, I think it was in May, I applied to go
    to Officer Candidate School at Fort Sill. I was accepted, and I went to Fort Sill around the 15th of July, 1942. And I
    graduated October 22, 1942, from Officer Candidate School, Class 35.
- speaker: Interviewer
  text: What was Officer Candidate School like?
- speaker: Respondent
  text: It was hell! But we were there to learn, we were there to develop, we were there to do, and we were there to learn
    why we were doing what we did.
- speaker: Interviewer
  text: So you were trained for the field artillery, and was it - a lot of book work, field work - what sort of things?
- speaker: Respondent
  text: We had to learn infantry tactics from a different point of view, and that the artillery supported the infantry. My
    primary jobs, and all the people at that time, were taught to be observers - to be field artillery observers, to assist
    the infantry in accomplishing their missions, or their goals of overcoming the enemy wherever we were.
- speaker: Interviewer
  text: So as an observer, where would you have been? Would you have been up with the infantry?
- speaker: Respondent
  text: I was with the infantry in all of the invasions except one. I was with the infantry of the lead company of the lead
    battalion. I was personally as an officer. They would change about every four days - they would change the enlisted men.
    But they didn't - I'm not sure why - they didn't want the enlisted men to get too scared, I guess it would be.
- speaker: Interviewer
  text: So basically you were trained for this in camp.
- speaker: Respondent
  text: In camp both at Camp Forrest, Tennessee, but when I graduated I was assigned to the 7th Division at Camp Luis Obispo,
    California. From there we went to Fort Ord, California. Then in May and June - in May of 1943 we went to retake the island
    of Attu in the Aleutians.
- speaker: Interviewer
  text: So you were actually in the Battle of Attu.
- speaker: Interviewer
  text: And what was that like? I mean, by the Aleutians we mean the string of islands off the coast of Alaska.
- speaker: Respondent
  text: No, we were 1,000 miles west of Kodiak. Way off the coast of Alaska. Way off the coast - almost to the international
    dateline.
- speaker: Interviewer
  text: Okay. And you went on to Attu. What were you expecting? What had you been prepared for in terms of given equipment?
- speaker: Respondent
  text: We had just come off the desert, and we were expecting to go to North Africa to be troops that were fighting Rommel.
    And in place of that, on the boat we went out to San Francisco Bay and we expected to turn left. We turned right and we
    didn't know where we were going. And there weren't maybe 15 people aboard ship who knew where we were going. It was about
    a day afterward they told us what we were going to do.
- speaker: Interviewer
  text: Did you have any idea that the Japanese, I mean was the public aware that the Japanese had occupied U.S. territory
    in Alaska?
- speaker: Respondent
  text: The Japanese occupied the island of Attu at the end of the Aleutian chain - not the land of Alaska, but the Aleutian
    chain. And also the island of Kiska where they had a submarine base.
- speaker: Interviewer
  text: They had a submarine base there. And you were aware of that before you got on the boat, but you didn't know where
    you were going.
- speaker: Respondent
  text: We were not aware of where we were going when we got on the boat. It wasn't until about the next morning that we were
    going northwest, and that's when the officers were called together and told, and the officers told the enlisted men. And
    the enlisted men said what in the hell were we going to do now!
- speaker: Interviewer
  text: Was your artillery with you on board ship?
- speaker: Respondent
  text: The answer is yes. We had LST's that had weapons and trucks. But right now I'm vague about that, too. We had LST's
    that had - they had 1 battalion of 105's and the trucks, too, to drive the guns off the ship onto the land. On the liberty
    ship I was on, I don't know. We had men on the liberty ship - both infantry and support groups. When we got to Attu, there
    were LSM's and LST's. When we hit the beach - the ship I was on went to the wharf and we'd get up on the wharf - I mean
    some of us did. The rest of us were out in the bay, loading off the liberty ship on to the LSM's to take us ashore. It
    was really a disorganized - it was the worst failure the War Department ever had in its history. There's a book on it
    called "The Thousand Mile War in the Aleutians," and it says in there that we were ill prepared, ill organized - I'm trying
    to think of other words that were said. We didn't have the right equipment for Attu. We didn't have the right boots, we
    didn't have the right clothing, we still had suntans, we didn't have wool clothing. We had blankets when we needed sleeping
    bags.
- speaker: Interviewer
  text: What were the temperatures like when you got to Attu?
- speaker: Respondent
  text: 40's, 50's. It was cold. The whole Aleutian chain out there is foggy. And for May and June through the end of August,
    after we went into Kiska, we didn't have 15 to 20 days of sunshine. We would occasionally have sunshine during the day,
    but the fog would come in and it would just blow the sunshine away. And we would have low hanging clouds. It was cold
    and the wind was always blowing. It was a hell of a way to learn how to fight a war!
- speaker: Interviewer
  text: Did you get any opposition from the Japanese initially? Or when did you first encounter Japanese?
- speaker: Respondent
  text: We got ashore without too much trouble. It was only the next day when we were advancing up the hills. And I cannot
    think right now of the names of all the hills that were there. It was when we hit their gun positions we encountered the
    Japanese. And we had artillery. We had a hell of a time getting the artillery ashore, and getting the artillery in place
    to assist the infantry. It was because there was tundra there. And tundra is about three or four inches thick and then
    there is water. And you'd sink into it. Even the cat - the small caterpillar - had a hell of a time tracking.
- speaker: Interviewer
  text: It was a kind of desolate marsh.
- speaker: Respondent
  text: It wasn't a marsh. It was mountains and very little stuff grew. It didn't have much roots. There were no trees. It
    was rock, tundra and very low grass - it didn't have much sunshine to grow for a long time.
- speaker: Interviewer
  text: You'd sink into the tundra because it was wet.
- speaker: Respondent
  text: That's right. You sat down on it and when you got up your ass was wet. It was that simple.
- speaker: Interviewer
  text: And did you find the Japanese - was it pretty tough resistance, I would imagine?
- speaker: Respondent
  text: We didn't know what it was like. We just went ahead. It was very difficult. They were dug in. They were expecting
    us. They resisted us. It was a hell of a way to learn how to fight. We weren't trained for that kind of activity. We were
    trained for the desert. But being the average American man can assimilate to his new conditions. We had a bunch of guys
    who were from Texas, Oklahoma, California, Nevada, Arizona. They were all farmers and off the ground, and they just knew
    how to make things work. We city boys didn't know our asses from a hole in the ground.
- speaker: Interviewer
  text: What was the strategic importance of this island?
- speaker: Respondent
  text: It had an air base. It had an air field in which a plane could take off. The Japanese didn't have it very long and
    they didn't improve it. We improved it - not we, but the Army Air Force at that time sent out planes west to observe what
    was going on north, west and south of Attu and Kiska.
- speaker: Interviewer
  text: How long was the Battle of Attu really going on in terms of …
- speaker: Respondent
  text: The battle was supposed to take a week. It took about six weeks. It was toward the end of June that we actually secured
    the island.
- speaker: Interviewer
  text: About six weeks.
- speaker: Respondent
  text: The end of June sometime.
- speaker: Interviewer
  text: And did any of the Japanese actually surrender, or were there a lot of suicides?
- speaker: Respondent
  text: There were very few prisoners. They died in their sense of duty. We had to kill in our sense of duty.
- speaker: Interviewer
  text: And after you secured Attu you were part of the invasion force or liberation force for the island of Kiska.
- speaker: Respondent
  text: I did not get to Kiska. I personally didn't get to Kiska. Our division sent a combat team along with Canadian troops
    to land on the north side of Kiska. Then they went south to where the Japanese submarine base was.
- speaker: Interviewer
  text: Where were you at this point?
- speaker: Respondent
  text: I was still on the ship. We did not go ashore at Kiska. I'm not sure which of our division went ashore. I'm not even
    sure if our artillery went ashore. We didn't know what was there, and there was no place as far as I knew to land. But
    the Japanese would not defend something coming from the north. They would defend coming from the south. We came from the
    north over the hills and there was no defense. The only opposition was with each other in the fog, because we didn't know
    where the other was. I was not on Kiska.
- speaker: Interviewer
  text: So you were, then, assisting building the air field?
- speaker: Respondent
  text: No. We were just there waiting for the next orders. There were engineers that built the air field - I mean, that rebuilt
    the air field. They put these metal landing gears that fitted together for about 5,000 feet. And each of us took a tour
    of duty higher and higher - about 2,000 feet high - for about a week, about five days, just to observe what was going
    on, to make sure there were no ship had fallen out of radio contact, which was maybe about five miles away from where
    we were down the side of the hill, down to where the Division Headquarters was.
- speaker: Interviewer
  text: Okay. And when did you get orders to move out from Attu?
- speaker: Respondent
  text: I don't know when we moved, when we got orders. I know we left Attu, I'm going to say we moved around the first of
    September of 1943, and went south to Hawaii.
- speaker: Interviewer
  text: Now what was Hawaii like - I mean compared to Attu?
- speaker: Respondent
  text: Exact opposite. It was warm. We had our khaki's. We moved into a Schofield barracks area and began our normal training
    of shooting and observing. We just got up every day, went and trained and went back and slept. We did this until the end
    of 1943. Because we knew we were going to have another invasion. We were planning for it. The other invasion was going
    to be Kwajalein. We were there first in 1944.
- speaker: Interviewer
  text: What was it like being in Hawaii just two years after Pearl Harbor?
- speaker: Respondent
  text: It was heaven! It was heaven.
- speaker: Interviewer
  text: Okay. So the next invasion was of that island, and what was that like?
- speaker: Respondent
  text: Kwajalein. That was an atoll in the Marshall's. It was at the south end of the Marshall atolls. Eniwetok was at the
    north end. The marines went in on the north end and we went in on the south end. The marines had very little opposition
    up there. We had a lot of opposition. They had well defined pill boxes, machine guns and all the rest of the stuff they
    could fire at us. In the Kwajalein operation I was assigned - I didn't volunteer, I was assigned - to a Navy ship. I was
    assigned to the USS San Francisco. There were three of us that were assigned from each of the battalions to observe from
    Navy ships to observe Navy gunfire on the atoll. And when the troops got ashore to assist them in the light 105 howitzers
    firing. Because the atoll was about 20' high off the water. It was almost straight shooting. What we needed was to land
    the rounds on top of or in front of to distract the people inside the pill boxes so that our troops could overtake them.
- speaker: Interviewer
  text: So you were actually helping to direct the naval gunfire at that point?
- speaker: Respondent
  text: Before the Army landed. Yes. After the Army landed, then I directed the field artillery.
- speaker: Interviewer
  text: Was that from the ship again?
- speaker: Respondent
  text: No. I was up in the air. I flew in a Navy airplane. The cruisers at that time had observation planes, called SOC's,
    Sopwith Camels. They were World War I airplanes - they were pontoons. They could land on water and be picked up on water.
    The function at that time was they were catapulted out up in the air, flew around, did our job, came back and landed on
    the water, taxied over to the ship. The ship picked us up and put us back in the catapult.
- speaker: Interviewer
  text: So you were directing the Army artillery fire from the plane.
- speaker: Respondent
  text: From 1,000 to 2,000 feet up. We were out of the line of fire. One of our guys was killed because the captain, I think
    from the 31st, he should have turned right and the pilot turned left and got hit by our own fire and died. I was s
