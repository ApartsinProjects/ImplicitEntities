collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: So, Frank, where were you living before you entered the service? What was your life like at that time?
- speaker: Respondent
  text: I was living in Rossford, Ohio, with Mom and Dad, and 3 brothers and 3 sisters. I was going to a high school - a vocational
    school instead of a college prep school because my Dad wanted me to have a skill. So he actually sent me to Toledo, Ohio,
    to the Macomber Vocational School, so that I could pick up a skill. The skill I was being taught at the school was auto
    mechanics. So my tenth and eleventh grades in high school were two weeks in classrooms for a regular education - English,
    math and so forth - and two weeks in a shop or working for somebody as an apprentice in auto mechanics.
- speaker: Interviewer
  text: So you just flip-flopped back and forth - two weeks of one then two weeks of the other?
- speaker: Respondent
  text: 'That is correct. And there was also another group that took my job when I was in school, and I took the job when
    he was in school - another guy and I had the same job: two weeks on and two weeks off.'
- speaker: Interviewer
  text: So you shared the job.
- speaker: Respondent
  text: Yes, we did. And we also shared the shop at the school. The school also had a shop that if you didn't have a job you
    could still stay in the shop and still be trained in the career you were looking for.
- speaker: Interviewer
  text: You said you went into the Army.
- speaker: Respondent
  text: Yes, I did. Instead of going into my senior year, in August of 1946 my friend and I decided we wanted to join the
    Army because the GI Bill was going to expire at the end of the year. We decided we should have the GI Bill. We said, "Oh,
    boy. That's going to be great and we could go to college." So we joined the Army.
- speaker: Interviewer
  text: So you were 16 at the time.
- speaker: Respondent
  text: I was 16 at the time. That is correct.
- speaker: Interviewer
  text: How did your parents react when you told them you wanted to go into the Army?
- speaker: Respondent
  text: My two brothers were already in and out. There was a big family at home - there were seven kids. So they said, "Fine!
    Where do I sign?"
- speaker: Interviewer
  text: So, even though you were under age, they were okay with it.
- speaker: Respondent
  text: Yes. They were.
- speaker: Interviewer
  text: Did they have to give their permission?
- speaker: Respondent
  text: They had to sign the papers, yes. So they signed the papers. Then I needed the papers to be verified by some legal
    person that they signed it, which I had done. So all we had to do was turn the papers in to the Army.
- speaker: Interviewer
  text: So you had three years of high school and were just waiting for your senior year, and that's when you went in.
- speaker: Respondent
  text: That is correct. I had 9, 10, and 11. I was supposed to graduate in June of 1947, and all those guys I met in Japan
    later on did graduate from the Rossford High School in June of 1947, and most of them were draftees, or about to be drafted
    and joined up also. So, from my little town there were eight of us in the Yokohama area who would meet on the weekends
    and drink a little beer and stuff like that.
- speaker: Interviewer
  text: Why did you choose the Army?
- speaker: Respondent
  text: Well, to join the Navy was a two-year enlistment, but you had to bring your parents to the recruiting station. I didn't
    think that would work too well, so we didn't do the two-year program with the Navy. After we first tried we figured out
    it probably wasn't going to work for me, so we then switched over to the Army, which had 18 month enlistments. We filled
    out the papers, got them notarized and brought them in. That was it.
- speaker: Interviewer
  text: When did you go into the service?
- speaker: Respondent
  text: August of 1946.
- speaker: Interviewer
  text: Where were you inducted?
- speaker: Respondent
  text: Camp Atterbury in Indianapolis, Indiana.
- speaker: Interviewer
  text: What do you remember of those first days? What was your induction like?
- speaker: Respondent
  text: Induction was very simple. You get shots and this and that. But that was not a problem for the first day.
- speaker: Interviewer
  text: Were there a lot of guys getting inducted at the same time as you?
- speaker: Respondent
  text: Yes, sure. But my buddy and I were being inducted together.
- speaker: Interviewer
  text: How did you get from Ohio to Indianapolis?
- speaker: Respondent
  text: I really don't remember how I got there. I did a lot of trips, though, from Indianapolis to Rossford by hitch-hiking,
    because I was retained at Camp Atterbury for about six weeks. During that six weeks I had weekends off. So I would go
    home, and I would hitch-hike to Rossford, and on Monday morning I'd hitch-hike back.
- speaker: Interviewer
  text: In your uniform?
- speaker: Respondent
  text: In uniform, and absolutely no problem. I could get almost to my doorstep.
- speaker: Interviewer
  text: So when you were inducted, you got to Camp Atterbury. Were you inducted individually? Was it a group? Did they process
    you in long lines getting shots?
- speaker: Respondent
  text: Yes, we did all of that. Also, when we had spare time - Camp Atterbury was phasing down, so we were used to do little
    details. One of the details we were doing was the closing of the PX, which is a military store. In the PX was a stand-up
    piano. They wanted the stand-up piano taken to the dump. So we loaded the stand-up piano into a two-and-a-half ton truck,
    which had a cover over the top. We got it loaded up. The truck backed up to a little fire in the dumper where we were
    going to dump it, and we were going to push it over. But somebody said, "You can't do that. Because if you dump it over
    it will hit the top of the truck and take the top off." It was a canvas top. "You have to lay it down first." So we said
    fine, we would lay it down. Then we were laying it down, asking if everybody's feet were out of the way. And we dropped
    it. Somebody didn't have their foot out of the way. That's why I was there six weeks. I spent six weeks at Wakeman General
    Hospital, which was a general hospital at Camp Atterbury, and all the guys who were still recovering for a year after
    the war were in there. So I was in there in a ward right there with all those guys.
- speaker: Interviewer
  text: From having a piano on your foot.
- speaker: Respondent
  text: On my right big toe.
- speaker: Interviewer
  text: Did it break it?
- speaker: Respondent
  text: It crushed it. I lost the nail, but it grew back.
- speaker: Interviewer
  text: So when they ask how you were wounded?
- speaker: Respondent
  text: They didn't. But various wards would have the local ladies put on Sunday dinners for the wards. Well, they finally
    got to our ward and I went out to dinner. And I'm sitting there and the lady comes over. She asked, "Aren't you a little
    young to be in the war?" I said, "Yes, I am. I've only been in the Army two weeks!" So I spent my first six weeks in the
    hospital. It was a great hospital. What you saw there was pretty grim. Guys were shot up pretty bad. Mostly it was probably
    arms and legs - shoulders and arms and legs - in the ward I was in. At that time I also spent most of my spare time by
    going to the dentist. I came from a family who didn't have that much money, so we never did dentists. So I had all my
    teeth filled during the six weeks while I was recovering.
- speaker: Interviewer
  text: So you spent six weeks getting your body together!
- speaker: Respondent
  text: I was able to go home, though. I cut a hole in my shoe and I could walk without a shoe on the front toe. And I ended
    up coming home to a football game. My little town high school was playing the next town, and I went to a football game
    on Friday night.
- speaker: Interviewer
  text: So you hitch-hiked with your bad toe.
- speaker: Respondent
  text: Yes, I sure did. And it worked out fine.
- speaker: Interviewer
  text: When your toe was healed and your teeth were fixed, you were living in the camp. What were your living conditions
    like at Camp Atterbury?
- speaker: Respondent
  text: Camp Atterbury conditions were very good. There were barracks.
- speaker: Interviewer
  text: Tell us about the barracks. What were they like? Were they Quonset huts?
- speaker: Respondent
  text: No. They were regular built barracks. It was a regular, first-class military base.
- speaker: Interviewer
  text: How many guys were on your floor?
- speaker: Respondent
  text: In the barracks itself, maybe 24 - 12 and 12 on each side.
- speaker: Interviewer
  text: Were they bunk beds?
- speaker: Respondent
  text: They were always bunk beds.
- speaker: Interviewer
  text: Were you on the top or the bottom?
- speaker: Respondent
  text: They weren't doubles; they were single bunk beds.
- speaker: Interviewer
  text: They were twin singles, not the stacked beds.
- speaker: Respondent
  text: No, they weren't stacked beds.
- speaker: Interviewer
  text: What time did you get up?
- speaker: Respondent
  text: Actually, we used to have bugle call at 6:00 in the morning. Then we'd have reveille at night - 10:00 at night or
    something like that. But I didn't spend much time at Camp Atterbury, other than in the hospital. When I was pretty well
    cured of the injury, I was then shipped out to a basic training camp.
- speaker: Interviewer
  text: So you went from Camp Atterbury to where?
- speaker: Respondent
  text: Fort Eustis, Virginia, for the Transportation Corps Basic Training. I was transferred into the transportation corps
    basic training. That was, in essence, I was there until late December of 1946.
- speaker: Interviewer
  text: So you were only there for a few months.
- speaker: Respondent
  text: I would say approaching three - two-and-a-half to three months - for basic training.
- speaker: Interviewer
  text: What did basic training include?
- speaker: Respondent
  text: You name it - everything! A lot of marching, a lot of exercise, a lot of special things that you're supposed to do;
    how to dig holes and how to remove a truck out of a trench or out of mud; rifle training and sub-machine gun training;
    obstacle courses - everything to keep you healthy and moving along, and learning things about the military.
- speaker: Interviewer
  text: Had you fired a gun before?
- speaker: Respondent
  text: A shotgun at home.
- speaker: Interviewer
  text: So using arms was not new to you.
- speaker: Respondent
  text: No. Using a rifle was, and using a sub-machine gun was. I never had a sub-machine gun.
- speaker: Interviewer
  text: But you had fired some sort of gun before.
- speaker: Respondent
  text: Yes - the shotgun.
- speaker: Interviewer
  text: Were you a hunter?
- speaker: Respondent
  text: Yes - pheasant and rabbit. I didn't hunt deer, just pheasants and rabbits.
- speaker: Interviewer
  text: You were at Fort Eustis for a couple of months. Tell me what a typical day was like for you there? What time did you
    get up and how were you awakened?
- speaker: Respondent
  text: Well, we'd be getting up at 6:00 in the morning. If you didn't get up the first sergeant would come walking through
    and he made enough noise that you better get your butt out of bed.
- speaker: Interviewer
  text: He didn't gently waken you.
- speaker: Respondent
  text: No. And the next thing you knew, you lined up at 7:00 and they marched you off to breakfast. You had your breakfast
    and you came back and started doing your daily duties.
- speaker: Interviewer
  text: What kind of food did you have for breakfast?
- speaker: Respondent
  text: It was just like home - not much different from what you'd have at home.
- speaker: Interviewer
  text: Eggs, bacon?
- speaker: Respondent
  text: Eggs, bacon; even cereal if you wanted.
- speaker: Interviewer
  text: Did you have a timeframe in which you had to eat?
- speaker: Respondent
  text: Yes. You had a regular metal plate that was your eating tray with little sections. You had to go through a line, and
    it was buffet style - served to you buffet style. You'd go back to your table and eat with your buddies. Then you went
    back, rinsed your tray off and turned it in to them for a final washing.
- speaker: Interviewer
  text: Could you go back for more? Did you have time for more?
- speaker: Respondent
  text: No. Once you were served, you'd been fed. It was the same type of tray you used for all three meals.
- speaker: Interviewer
  text: Was the food good?
- speaker: Respondent
  text: Oh, yeah. The food in the military for me was good all the time.
- speaker: Interviewer
  text: What were your living quarters like there?
- speaker: Respondent
  text: We were in a barracks, with 24 guys on the first floor. That was about it. We had our own latrine where you'd shower,
    which was at one end of the barracks. Everything was, if you will, kind of like living in a motel.
- speaker: Interviewer
  text: You had gone there from Camp Atterbury. How did you get there?
- speaker: Respondent
  text: On a train.
- speaker: Interviewer
  text: Was it a troop train or a regular train?
- speaker: Respondent
  text: I hate to tell you this story, but I will. It was a regular train, and it was an overnighter. We were traveling and
    had sleeping accommodations on the train. On the train, the sleeping accommodation was an upper bunk - two persons to
    a bunk. Two persons to a bunk! Head to toe, though. I couldn't believe the military was putting two persons on a bunk
    overnight to go to Fort Eustis, Virginia. But that's what it was.
- speaker: Interviewer
  text: Did you know the person you bunked with?
- speaker: Respondent
  text: Oh, yeah. He was one of my buddies. He was from the south - kind of a hillbilly buddy. Yeah, I knew him.
- speaker: Interviewer
  text: Did you know him before the train ride?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Well, that would make it a little easier, I would think.
- speaker: Respondent
  text: Yes, a little bit.
- speaker: Interviewer
  text: On that train ride down there, how did you pass the time?
- speaker: Respondent
  text: Just like a regular person. You were traveling just like a civilian. We had the car - the car was the military car.
- speaker: Interviewer
  text: All military.
- speaker: Respondent
  text: Yes, that was our car that was going to Fort Eustis.
- speaker: Interviewer
  text: Did they feed you on the train?
- speaker: Respondent
  text: Yes. We ate on the train just like we were regular passengers. They didn't treat us any differently.
- speaker: Interviewer
  text: How did the other passengers on the train react to you?
- speaker: Respondent
  text: They never interfered. We never saw them.
- speaker: Interviewer
  text: You were just really separated from them.
- speaker: Respondent
  text: Yes. We never saw them. That's how we got there. I remember that train ride!
- speaker: Interviewer
  text: So you were at Fort Eustis, and you're getting your basic training - calisthenics. Had you ever been away from home
    like that before?
- speaker: Respondent
  text: Not like that, no. I may have been away from home for a week before, but nothing more than a week. I'd never been
    away to speak of. I remember taking a motorcycle ride with my cousin up to Pike's Peak. But it was like a five-day ride
    in Colorado - it may have been four or five days. We even had a tent and slept in the tent. We never went to a hotel or
    motel or anything. But other than that, no.
- speaker: Interviewer
  text: But you had been away from home for a little bit.
- speaker: Respondent
  text: For four or five days, yes.
- speaker: Interviewer
  text: Were any of your buddies from home in the group you were with?
- speaker: Interviewer
  text: So you didn't know anybody when you got there.
- speaker: Respondent
  text: Right, except for the guys I moved with from Atterbury. They were all strangers.
- speaker: Interviewer
  text: So you'd get up. You had calisthenics. You ate.
- speaker: Respondent
  text: Yes. And marched around.
- speaker: Interviewer
  text: You did a lot of marching!
- speaker: Respondent
  text: Right. Every ten minutes, though, we'd have a break. You could break and it was always, "Smoke if you've got 'em."
    I didn't smoke, so every ten minutes I'd get a five minute nap. I just laid down on the ground somewhere and took a five
    minute nap. That was pretty good!
- speaker: Interviewer
  text: Did anybody ever get in any trouble for doing stuff?
- speaker: Respondent
  text: Not in basic training, no. But in Japan, yes.
- speaker: Interviewer
  text: So you did your three months?
- speaker: Respondent
  text: Two-and-a-half months.
- speaker: Interviewer
  text: Did you have any classroom work, or was it all just exercise and in the field?
- speaker: Respondent
  text: No classroom work.
- speaker: Interviewer
  text: Just physical stuff.
- speaker: Interviewer
  text: While you were there, were you able to communicate with your family?
- speaker: Respondent
  text: Letter writing.
- speaker: Respondent
  text: We didn't have a phone, I don't think. Just letter writing.
- speaker: Interviewer
  text: Were you able to get packages from home?
- speaker: Respondent
  text: Yes. Sure. We always got mail.
- speaker: Interviewer
  text: Did you ever get any packages besides letters - food or anything else?
- speaker: Respondent
  text: Probably not from home, but at that time I had left a girlfriend behind. And she sent me some stuff every now and
    then.
- speaker: Interviewer
  text: Did you share it with the guys, or was that your stash?
- speaker: Respondent
  text: You better! Yes, I shared it with the guys.
- speaker: Interviewer
  text: At the end of your basic training did you have a ceremony of any type?
- speaker: Respondent
  text: Oh, sure. Graduation! Flags and parades - all of that stuff. Yes, very much so.
- speaker: Interviewer
  text: Were any of your family able to come to graduation?
- speaker: Respondent
  text: No. They wouldn't have come anyway. Our family was a big family and my Dad was a factory worker. He struggled to keep
    us going. We didn't have a car. That's okay. That's the way it went. But no family or anyone came to see me graduate.
    I had a picture, but I couldn't find it - a group picture. It's a round home somewhere.
