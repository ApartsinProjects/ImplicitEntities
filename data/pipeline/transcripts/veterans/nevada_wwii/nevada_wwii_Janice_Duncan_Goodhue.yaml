collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: I had known Gregor Duncan for several years in San Francisco, and deep down I guess I was always in love with him.
    But I was younger, and at first he didn't pay much attention to me. He was an illustrator for a San Francisco afternoon
    newspaper before moving to New York to advance his career.
- speaker: Respondent
  text: When I went east to study nursing at Johns Hopkins, I started seeing him again. I didn't finish my nursing education,
    but married Gregor instead, for which I was never sorry. We were married in 1938 at New York City Hall.
- speaker: Respondent
  text: Gregor did commercial drawings for Collier's and Reader's Digest, and some illustrations for children's books. He
    did well commercially because he could work very quickly, doing beautiful pen-and-inks and charcoals. I worked as the
    art director's secretary for Compton Advertising, an enormous agency. One of their clients was Proctor and Gamble.
- speaker: Respondent
  text: When Gregor's mother died, his draft status changed to 1 A. He immediately reported to the draft board because we
    weren't going to try to fool our government, and he was drafted into the Army Air Corps in 1942. The Air Corps used all
    those wonderful old hotels in Atlantic City for ground crew training, and Gregor was sent there for weeks. By this time
    I had left Compton and was working for OWI, the Office of War Information and propaganda analysis.
- speaker: Respondent
  text: Fascinating. I remember taking the Pennsylvania Railroad train to Atlantic City - everything was crowded and everyone
    standing up, but there was a sense of camaraderie, even though the conditions were simply awful off base. Some very greedy
    people in Atlantic City rented apartments or rooms for only eight hours, so they had three shifts. We could only go in
    for eight hours, so meeting with Gregor in Atlantic City was not the best, but that's all we could do at the time.
- speaker: Respondent
  text: Gregor was next assigned to Lowrey Field in Denver, Colorado, where he did a portrait of General Marshall. Lowrey
    was where mechanics were trained for the ground crews for all of the planes. After training, he was sent to Tarpon Springs,
    Florida. By then they recognized him as an artist and transferred him into public relations.
- speaker: Respondent
  text: Meanwhile I stayed with OWI, knowing that Gregor might be sent overseas. We discussed it and decided that if I volunteered
    for the American Red Cross that would probably be better. I was interviewed, accepted the position, and went to Washington
    D.C. in May of 1943. We were there six weeks at American University for our training. From there we went on the S.S. Monterey
    troop ship to North Africa, which took six days. There were about five thousand troops and about thirty Red Cross volunteers
    on board.
- speaker: Respondent
  text: As soon as we were in Casablanca, we were bivouacked and lived in tents while we were waiting to be assigned to other
    parts of Africa. I was assigned to Algiers to the Enlisted Men's Club. That was a wonderful, big building, about seven
    stories tall. It was a billet, so we had showers, cots, blankets, and pillows for two floors. But we only had a limited
    number of cots, so the men would sign up in the morning, then they could be out all day and come back and spend the night,
    like at a youth hostel or YMCA. Every club had coffee and doughnuts, but we also had a mess hall that the soldiers could
    go to. We had a wonderful big rec hall, which had been the auditorium of the school - that's where Bob Hope came to entertain
    the troops.
- speaker: Respondent
  text: Algiers was a beautiful city. As a matter of fact, it reminded me a little of Santa Barbara, because it's built on
    a hill and the climate is similar. It was the site of Allied headquarters before they went back to London for the big
    invasion - AFHQ was right up the hill from us. Because the British didn't have money to spend for recreation centers,
    any enlisted man from the British, Australian, and South African services could come to our club. We also had a separate
    officer's club. Right next door was another excellent building which housed Stars and Stripes and the British Ministry
    of Information.
- speaker: Respondent
  text: The lectures held at the club were very popular, and we had movies playing during the day and different movies every
    week. We always had ping-pong, checkers, chess, and other types of games. We had paperbacks, best sellers and comic books,
    and we set up a library. Young Algerian women who were students, mostly French and English, lived nearby, and we had them
    in for dances.
- speaker: Respondent
  text: The enlisted men came from all over the United States, and they all had different accents. They always asked where
    we were from, and they liked the fact that I was from San Francisco. Then, of course, we asked them about themselves and
    if they had family or girlfriends. They always wanted to show their pictures immediately, which was perfectly normal,
    and whether you were interested or not, you certainly pretended you were. That was what you were there for. You listened
    a lot. Some of them would flirt, but they were uptight. I mean, when you think of what they had been doing ....
- speaker: Respondent
  text: 'A tragic thing happened when we first were sent to Algiers from Casablanca: We were given an S.O.S. to get on a plane
    to go to Tunis to have an evening dance and party for some fliers who had just come back from a mission. They were crews
    from the Liberators, the B-24s just back from the Ploesti raids, but we weren''t told that. Some other women and I went
    with these men and went swimming in the Bay of Carthage, stayed up all night, drank and ate with them. That was a terrible
    thing ... [begins to cry] Half of them had lost their planes, their men . . . but they never mentioned a thing. We had
    a wonderful night, moonlight on the Bay of Carthage, a beautiful bay outside of Tunis. The next day .... [pauses, crying]
    They had some British friends who had motorcycles, and we rode up a hillside. It was wild, but it was all you could do.'
- speaker: Respondent
  text: It was only later that I learned about the tragedy of the Ploesti oil field raid. That was really awful, but fortunately
    I didn't know it at the time. I'll never forget, we had a wonderful time swimming in the Bay of Carthage. I'm not even
    sure we had any clothes on.
- speaker: Respondent
  text: Later Gregor turned up in Algiers, and that was unheard of, because he was an enlisted man. Fortunately with Stars
    and Stripes, rank didn't matter. He had some time off and I had some time off, so we rode an Algerian bus to the edge
    of the Sahara desert where the American army had taken over a hotel for R&R. Before the war it had been among a fabulous
    chain of French hotels all through North Africa - Trans-Atlantique. Fantastic. It couldn't have been better.
- speaker: Respondent
  text: Who should be there but this wonderful author who wrote How Green Was My Valley, Richard Llewellyn. He was with British
    military in formation and was on R&R. He and Gregor became great friends, and they go to the Arab quarter together. I
    can't go because I'm a woman, but Llewellyn asks me if I would type some papers for him. Oh my God, I was thrilled to
    death! And, of course, the Arab quarter - God knows what they did. They probably drank horrible stuff, and when they came
    back they were not feeling very well. But we had a wonderful time. I even have some pictures of Gregor on a camel, in
    the Sahara desert, and on a broken-down bus, running on charcoal and smelly - all the people with their animals and everything.
    But to Gregor and me, what did it matter?
- speaker: Respondent
  text: After Algiers, I was sent with two Red Cross women to Sardinia, with a B-26 bomb group. The whole Italian Army and
    Air Corps had just surrendered to us, so we lived in the Italian Fascist officers quarters, and they were outside looking
    in. They had no place to go. It was cock-eyed. It was awful. I was there four months, October '43 to February - spent
    a Christmas there. We were put in a great big building which the airmen had used to store ammo. Our doughnut machine was
    shipped to us from Chicago, so we had this big doughnut machine and all the flour in this ammo depot.
- speaker: Respondent
  text: Later, Gregor was sent to Naples, but by that time I had come back to Algiers, where I saw him briefly before he was
    re-assigned. Stars and Stripes was closing its Algiers office, and after I helped close the American Red Cross Enlisted
    Men's Club in Algiers, my next assignment was also Naples. Fortunately I arrived in Naples just a couple of days before
    Gregor left for Anzio. When I first saw him, he came in with Bill Mauldin, and Bill tells a story about me running out
    and being so glad to see him, and a picture was taken at that time, too. It was a magical time, and so unusual for us
    to be able to see each other during the war.
- speaker: Respondent
  text: Stars and Stripes had a very nice old villa, and Gregor and I had a couple of delightful days. One night there was
    an air raid warning. We would have to go all the way down from the fifth floor to a bomb shelter which was really more
    like a subway than an underground shelter, and the Italians were running so fast and furiously that we felt we would be
    trampled, so we decided to stay up top. It didn't happen to be a very severe air raid, but there were times you just didn't
    do what they told you to do.
- speaker: Respondent
  text: Gregor soon left to join our invasion forces at Anzio. I had a choice of going either to Capri or Ischia for R&R.
    I chose Ischia, because that was a British R&R. Having been with American airmen on Sardinia, even if I'm on R&R, they
    think I belong to them; so I knew that at Capri I would have no R&R for myself. The British would pay no attention to
    me. Ischia was just beautiful, and it hadn't been spoiled like Capri. I walked up to a monastery, and whose name did I
    see on the guest list but Greta Garbo. You could see how they were all living high, wide and handsome before the war.
- speaker: Respondent
  text: I was there when a good friend of ours, a correspondent from the Chicago Sun Times, sent a message that I was to come
    back to Naples immediately. When I arrived, he was on the dock to tell me that Gregor had been killed at Anzio. There
    was nothing to do. We walked around, and he took me to a black market Italian restaurant for lunch. We drank and drank,
    and ate something and drank.
- speaker: Respondent
  text: That night there was a gathering of Stars and Stripes people in a bombed-out village. A Yank correspondent had just
    returned from Yugoslavia with a British correspondent - they had had a meeting with Tito and the partisans up in the mountains,
    and they had just come back to Italy. I was semi-here and not here, because I was still in a state of shock. And yet,
    you get around. You're on your feet, and you keep going. That whole evening took me out of myself and Gregor and everything,
    and I was listening to them tell about their meeting with Tito. That was May of 1944.
- speaker: Respondent
  text: Once Gregor was gone, I could not work again in an enlisted men's club, because - and rightfully so - they talked
    about how much they hated the war, and how they wanted to go home. I knew that I couldn't handle that anymore. So I asked
    to be reassigned and was sent to a hospital unit, the 38th Evacuation Hospital. It was in Rome and had been at Anzio.
    Everyone there was weary. I have pictures of them. They were in a daze, having been in Anzio so long. They just bivouacked
    around one of the gorgeous, big fountains of Rome, taking their beds and tents in the little park, and all of them wading
    in their hospital gowns and robes. They'd throw off their combat boots and dip their feet in the big fountain.
- speaker: Respondent
  text: From Rome, they were ready to go on north. That's when they leap-frogged the 11th and the 38th Evacuation Hospitals.
    The 11th started out first, and then we followed them. When they set up their tent and bivouacked, then we went over them,
    so to speak. When we were settled, then they advanced. One or the other was always closest to the action, like in MASH,
    for immediate care of the wounded. We (the American Red Cross) were responsible for so-called recreation. All the cigarettes,
    candies, and games came to us. We set up a rec tent, and a couple of GIs went out and got us an upright piano. The patients
    would come into the tent once they were ambulatory. If they were invalids, we had to go serve them in their beds.
- speaker: Respondent
  text: We got bogged down in this part of Italy for a long time, because the Germans had us stopped. We were bivouacked in
    Pisa, which isn't too far from Livorno, a little inland from the coast. The Red Cross women, the nurses, and I were asked
    to go in an ambulance to the beach one day. We were supposed to have a picnic on the beach with the Nisei 100th Battalion,
    442nd Regiment, who were getting ready to go into southern France. They had fishing boats, and we had music, and we swam
    in the sea.
- speaker: Respondent
  text: After Pisa I left Italy, because I'd been overseas eighteen months and the situation was so grim. Following Gregor's
    death I had become particularly sensitive and angry. I might have had battle fatigue just like the veterans. Anyway, I
    was not good for anything any more, so it was time to go.
- speaker: Respondent
  text: 'When I got back to the states it was Christmastime, 1944. Gregor''s sister still lived in San Francisco, and we had
    remained good friends, so I went to spend Christmas with her. That Christmas . . . oh, it was awful. It was awful for
    everyone. I dragged my way through it. Sometimes I wonder if I really lived through that time of war. The memories become
    like a movie: sometimes a good movie, sometimes a bad movie.'
