  text: UMN Immigrant Stories Collection ['United States'] Moo Say was born in Mai Lah Ooo, Thailand in 2000. file:///F/Immigrant%20Stories%20Transfer/Say,%20Moo/Moo%20Say%20Transcription.txt[7/6/2017
    3:12:06 PM] My name is Moo Hay Tha Say. I was just a refugee from Thailand. Before my family moved to Thailand, my family
    and my Karen people went through some difficult things in Burma. The Burmese soldiers didn'tlike us. They wanted us to
    get out of Burma. My family and my Karen people started to run. We were just looking for a better place to live. I saw
    them running, I saw the houses were glowing. I heard gunshots, I heard people screaming and yelling for help. I could
    smell the smoke because the Burmese soldiers were burning down our villages. It took time to travel from Burma to Thailand.
    When we saw the Burmese soldiers, we started to pack up our stuff and started to run. When we got to a another place that
    would be safe for us to sleep, we would start to build a small house so we could sleep in it. I didn'treally smell any
    sweet foods. I was on my mom's back. It felt soft. It was slippery when it was raining but it was okay when it is not
    raining. The weather was fine there. It was not too cold and not too hot. I could already walk at that time, but my mom
    was carrying me all the time. We didn'thave a lot food to eat, no foods that were sour, no foods that were spicy and no
    salts, so everything was tasteless. My family and my Karen people never stopped running and never gave up. We were just
    looking for a place that our Karen people could call "home." A lot of them got injured, a lot of them made it and some
    didn't. We made it to Thailand and my family lived there about a year before moving to the US. There are a lot of Karen
    people who are still running for their lives. Now I see that my Karen people live in many different places because of
    the Burmese soldiers.
