- speaker: Interviewer
  text: 'How long did the reallocation of the land last? It seems A: Okinawa became one of Japan''s prefectures around 1879,
    so I think it continued until then. As there was a regulation in Okinawa that'
- speaker: Respondent
  text: land belonged only to farmers, descendants of 'samurai' could not
- speaker: Interviewer
  text: Then there was not much difference between the rich and the poor, wasn'tthere?
- speaker: Respondent
  text: There seemed to have been difference between the rich and the poor from olden days. The land allocation system was
    made later. The price of land was very high, but when the farmers made money they bought the land. Rich people in the
    country expanded their land
- speaker: Interviewer
  text: Could they buy land at your father's time? They couldn't buy land any.gore then. There was land allocation until Okinawa
    became a prefecture in 1879. At Meiji Restoration time when clans were abolished and prefectures were established
- speaker: Respondent
  text: many samurai who were in the country renounced their clan and became civilians so that they could receive land. My
    father's
- speaker: Interviewer
  text: grandfather was one of them. He renounced the "samurai' clan and ; Were those who worked at the village office descendants
    of 'samurai'?
- speaker: Interviewer
  text: ': No, they were farmers. The village master represented the lords of the : Did the village master get paid from the
    village office?'
- speaker: Respondent
  text: ': The village office paid his salary. : Yes, he did as he was a farmer. In Okinawa a person who was elected'
- speaker: Respondent
  text: as the lord of the land 3 times received the treatment of a minister. He could not become a 'samurai' but he had a
    higher position than a
- speaker: Respondent
  text: '; Wére there ''gamurai'' also? : Yes, there were many *samurai*. There were ''samurais'' who had jobs and those who
    did not have jobs but were fed and received Salary.'
- speaker: Interviewer
  text: ': Did they served their feudal lords? : Yes, they did. : The system was much different from that in Kagoshima, wasn''t
    it?'
- speaker: Respondent
  text: ': The farming system was much different from that in Kagoshima.'
- speaker: Interviewer
  text: Didn't the people in Okinawa received better treatment?
- speaker: Respondent
  text: ': It might have been good, but after Okinawa was occupied by Kagoshima people in Okinawa had to pay tax to Kagoshima
    as well as Okinawa.'
- speaker: Respondent
  text: Even after the Meiji Restoration the system was not reformed for along time, so the poeple had to pay much tax. Everytime
    people ran for the Diet they promised to reduce tax but they could not it for along time. It seems that it is better after
    the war. Sugar was produced in Okinawa, yet people in Okinawa had to pay the consumption tax. Until recent years Okinawa
    suffered from
- speaker: Interviewer
  text: 'What kind of a person was your father? : I was separated from my father when I was 3 years old, and when'
- speaker: Interviewer
  text: 'I arrived in San Francisco in August, he had passed away in June of that year so I don''tknow hin. : Where did yourfather
    come to?'
- speaker: Respondent
  text: ': He went to Hawaii first and then came here. He went to Hawaii in 1904 and came to America in 1905.'
- speaker: Interviewer
  text: 'Then you don''tknow about your father, don''t you? : I just heard about him from his friends. What was your father
    doing? : He was farming in Imperial Valley. He was the first one from'
- speaker: Respondent
  text: Okinawa to go to Imperial Valley. For about 2 to 3 years he did not make money but later with 3 other people, his
    oldest brother,
- speaker: Respondent
  text: 'Mr. Nakamura and Mr. Ohta as partners leased 40 acres and farmed. Around 1910 they made profit: and each man saved
    about $3,000, so'
- speaker: Respondent
  text: my uncle said, "Let's go back to Japan." My father said he would not go back to Japan until he saved more than $10,000,
    so his brother went back to Japan a lone. Mr. Ohta worked in a produce market for a while but later opened Star Market
    in Los Angeles with Mr. Hirashiki as his partner. He is one of the most successful man from my prefecture. He managed
    the store until he was evacuated. Mr. Nakamura was a son of the wealthiest farmer in Okinawa. He
- speaker: Respondent
  text: came to America to a void the draft. As he was from a rich family he didn'tknow the value of money, So he spent all
    the money in Los
- speaker: Interviewer
  text: What had become of him?
- speaker: Respondent
  text: ': He was farming in Fresno but he became crazy from drinking too much and finally went back to Japan and died there.'
- speaker: Respondent
  text: ': What did your father do? He went to Los Angeles and started a hog-raising business as it seemed promising, but
    they could not get garbage from the City, Then the City of Los Angeles made a regulation that they could not'
- speaker: Respondent
  text: raise hogs within a certain distance from the city. The hog raisers . got together and took it to the court but they
    lost. As there was
- speaker: Respondent
  text: no space big enough to raise hogs he mowed the' hogs to Imperial Valley by trailers. = .He leased land, fenced it
    and put hogs there but as Imperial Valley is hot the hogs died one by one, and he lost all the money. '"igince then he
    had been poor. The year he died
- speaker: Respondent
  text: he made profit, but as he died before I came here the money was frozen by. the government, so after I came here I
    had to go to court many times to claim it.
- speaker: Interviewer
  text: 'What about your mother? She came to America with me. How many brothers and sister do you have? A: Just two of us.'
- speaker: Interviewer
  text: 'You were broght by your mother, weren''t you? Yes. She died during the war. What about your grandparents? A: I had
    grandparents on father''s side and mother''s side. They died'
- speaker: Respondent
  text: after we came to America in their 80s.
- speaker: Interviewer
  text: 'Was you mother a strong person or a gentle person? A: She was healthy and was known as a strong woman in the village.
    Her father was a landlord but I heard my mother and her sister'
- speaker: Respondent
  text: 'a mong 5 children were always put to work. Q: What was the reason you came to America? A: I came here as a "yobiyose''.
    Father summond his wife and children because he was going to settle down here.'
- speaker: Interviewer
  text: How old were you then? I was not quite 17 years old then. I became 17 after I came here. When you were in Japan, what
    kind of country did you think America was? My uncle told me about America, especially about Imperial Valley.
- speaker: Respondent
  text: 'What kind of thing did he tell you? He brought back photographs taken in those days. He showed me pictures of men
    as dark as the Blacks wearing Mexican hats and working in the field. When I asked, "Do you work like that in America?",
    he answered, "How can you make money if you don''twork hard? It is a mistake to think that you lead easy lives in America."
    My uncle was a talkative, strouthearted and sturdy built man. He brought knives for cutting grapes and showed-me how to
    pick, grapes. Every: year at grape'' beasonihd'' went to Fresné to: pick ''grapes.'' On. wie the way home he stopped at
    Ishimitsu Company in Los Angeles and spent all the money he earned buying Japanese. food to be sent to'
- speaker: Respondent
  text: 'Brawley. One year he earned only $20 to spend at Ishimitsu Company. : Many Issei came to America thinking they will
    make a fortune.'
- speaker: Respondent
  text: ': I came here thinking I will make a fortune, but I didn''tthink I could make money without working hard as I heard
    the story from'
- speaker: Respondent
  text: my uncle. My uncle told me that there are no houses in Imperial Valley, sq we live in tents in the desert where there
    is nothing around. He said we do not stay in one place but move to another place in about 3 years. When I asked what they
    do about water there he said that water comes from the Colorado River so they do not
- speaker: Interviewer
  text: Where did you get on board the ship when you came here?
- speaker: Respondent
  text: ': I got on board the ship from Kobe. I took a ship from Naha to Kobe. I could not get a passport until I came to
    Kote. I transfered ship at Kagoshima and went to Kobe. It took 1% days from'
- speaker: Interviewer
  text: 'Okinawa to Kagoshima, then 4 days from Kogashima to Kobe stopping : Was the passport issued right away?'
- speaker: Respondent
  text: ': We get application forms for passport at the village office. After the police signs the paper we take it to the
    Prefectural office. Then when we go to Kobe we get the passport issued. There was a bad policeman in the Police Department
    who would not Sign the paper unless we bribed him.'
- speaker: Interviewer
  text: Was he a'police officer?
- speaker: Respondent
  text: ': There was a policeman in our village who would not put his seal on the application so it took along time. I think
    that delayed my'
- speaker: Respondent
  text: '; : , Consequently : ; arrival in America: a could not get in time for my father''s death. After we gave him presents
    he put his seal on the application. In 1926 I saw that policeman in our district, but I did not feel like'
- speaker: Interviewer
  text: ': Did many people come, from Okinawa? : Compared to other prefectures not too many people came to America'
- speaker: Respondent
  text: from Okinawa, but many people went to Hawaii. and Soith America. About 80% of Japanese iAreentina, ., from Okinawa,
    and about 60% of Japanese in Brazil are from Okinawa. I think there are about 600,000 Japanese in Brazil. Especially after
    the war many Japanese went there from Okinawa. I think 40% of Japanese in Peru are from Okinawa, so I
- speaker: Interviewer
  text: Can say that most Japanese in South America are from Okinawa. What kind of passengers were on board the ship?
- speaker: Respondent
  text: There were many picture brides. and young yobiyose men. In Kobe and all the hotels were full , more than 20 people
    slept in one room.
- speaker: Respondent
  text: The ships were So crowded that people had to draw lots to decide who get the passage. Those who drew blanks could
    not come.
- speaker: Interviewer
  text: 'Did you come here..in 1919? : I came here in 1918. I think I left Kobe on July 17. : Did you get your passport right
    away in Kobe? .'
- speaker: Respondent
  text: ; Yes, I did. Those who won the passage had the eye examination and roundworm test, and when you passed the tests
    you could go.
- speaker: Interviewer
  text: 'Did you win the passage? Yes, but I still. had to. wait..a.month for the result of the drawing. : Did you stay in
    a hotel during that time? ives, Lidid. The hotel people must have made profit.'
- speaker: Interviewer
  text: 'In those days the hotel charges werevery cheap. : Do you remember. a hything..that happened on board the ship?'
- speaker: Interviewer
  text: ': We repeated the same thing day after day, and there wasn''tanything : Did you talk to the picture brides? -'
- speaker: Respondent
  text: ': Yes, I did once, but I don''tremember what we talked about. es They were,from around 18 to 23 years. I was young
    compared with'
- speaker: Interviewer
  text: 'Did you stop off at Hawaii? A: Yes, we did. I think we stayed there for about 3 days. As my mother became seasick
    on board the ship I bought pineapples when'
- speaker: Respondent
  text: we arrived in Hawaii and gave them to her. Since then she became
- speaker: Interviewer
  text: 'Didn*t you get seasick? A: I didn''tfeel well for a while after the ship left Kobe, but after'
- speaker: Respondent
  text: a while I became well and I had better appetite than ever. Niy younger brother became seasick. Men and women had different
    compartments. We used to go and see mother, tut we were chased out by porters
- speaker: Interviewer
  text: Where did you go from Hawaii? We came straight to San Francisco. As we stopped over at Hawaii for 3 days, it took
    altogether 17 days from Kobe to San Francisco. We were taken to the Immigration Office on Angel Island where we
- speaker: Respondent
  text: had a check-up. People came to the Angel Island to meé4® passengers.
- speaker: Interviewer
  text: 'Your father had passed away, didn''t he? A: Yes, An interpreter at the Immigration asked me if it is true that'
- speaker: Respondent
  text: my father passed away, so I said I had not herard such thing.
- speaker: Interviewer
  text: Weren't you surprised to hear such thing?
- speaker: Respondent
  text: I thought it was strange as I thought father was still well. A man from the same village came to meet us. I wondered
    if he was my father although he looked different from the photograph. He took care of us. As there was mother and two
    children my father's friends
- speaker: Respondent
  text: got together and asked us if we would like to farm together, so we farmed with him in Imperial Valley for about 3
    years.
- speaker: Respondent
  text: It was right after the World War I and the business was good, so we could make money no matter what we grew.
- speaker: Interviewer
  text: 'Q: What did you grow? : We grew green peas, corn and cantaloupe. After we moved to a 50 acre ranch we grew to matoe,
    cantaloupe and peas.'
- speaker: Interviewer
  text: ': Did you work with him as - partners? : My brother wis still ir''s chool, ''so'' I workea with him as'' partners.'
- speaker: Interviewer
  text: 'soon after I came here I learned to plough using horses. : Did you think you couldn''t do it as your father was not
    there?'
- speaker: Interviewer
  text: ': I had the partner so I didn''tfeel helpless. Was your partner your relation? : No, he was from the same village.
    Our families knew each other.'
- speaker: Respondent
  text: When he became 37 years old he did not have to worry about being drafted, so he went back to Japan to take a wife
    and come back here. But when he went home his father would not let him come back to America. As he did not take too much
    money I sent him $300 for
- speaker: Respondent
  text: the passage but he did not come back. Since I lost my partner I became a farm laborer and want from one place to another
    carrying a blanket on my back.
- speaker: Interviewer
  text: 'Did you do that in Imperial Valley? Imperial Valley and Fresno area. : Wasn''t Imperial Valley a hot place? : Yes,
    it was. My uncle used to say, "I wonder if you can stand'
- speaker: Respondent
  text: 'the heat when you go there." It was a very hot place. We can Stand the heat up to 120 degrees but we cannot stand
    it when it gets over that. That was by the standard thermometer at the Water Company in Brawley. The Water Company was
    surrounded by lakes and there were many gum trees around it, so it was cooler there. When we filled a washtub: with water
    and left it in the sun it became so hot that we could not. put our hands: in ite. If: we filled the'' bathtub with water
    in the daytime it became hot, but if you get'
- speaker: Respondent
  text: in it without heating the water it made your body itch. We had to heat it and add water in it before we could get
    in. In town people heated water by putting pipes on the roof, and used it as hot water, but they could not use the water
    for bath unless they heat it once.
- speaker: Respondent
  text: 'If we used cold water for bath we would get heat rash. : About what time did you start working in the morning? :
    At ordinary time we worked from 7 in the morning till 7 in the evening, but at cantaloupe harvest season we started working
    around 4,'
- speaker: Interviewer
  text: What about lunch break?
- speaker: Respondent
  text: ': We had about an hour for lunch braak. At melon harvest season we worked till after midnight and left for work at
    4 so we did not'
- speaker: Interviewer
  text: 'have much time to sleep. We had to get up before 4 to eat breakfast. : Won''tthat kind of life affect your health?'
- speaker: Respondent
  text: '* No, because it is only for about a month. The rest of the time we take care of melon by hoeing and watering them.'
- speaker: Interviewer
  text: ': Did your father die in Imperial Valley? : He died ina hospital in San Francisco. : Did he get ill in Imperial Valley?'
- speaker: Respondent
  text: ': Was it because of the heat? : Spanish Flu was rampant in those days and even young people died one after another.
    I think he died of Flu. My father had asthma, so my uncle used to say that father could not live in cold climate.'
- speaker: Interviewer
  text: Could you work in such heat in Imperial Valley?
- speaker: Respondent
  text: ': We had to work at melon time or melon would spoil. We had to carry melon which weighed about 70 pounds a bagfull.'
- speaker: Respondent
  text: ': I am surprised the people don''t die from heat often People ,collapsed from sunstroke.. I heard that in olden days'
- speaker: Respondent
  text: students from San Francisco went to Imperial Valley to pick cantaloupe and died of sunstroke. It was like the bottom
    of hell. low there is a big highway from Los Angeles so we don't get that feeling, but in those days a narrow road took
    us down, the valley
- speaker: Interviewer
  text: 'from Indio, so we felt as if we were going to the bottom of hell. : What kind of recollections do you have about
    the first 3 years?'
- speaker: Interviewer
  text: 'What kind of hardships did you experience? : As I was young then I did not know what hardship was. I just'
- speaker: Respondent
  text: Did you live in a tent? The room When I came here the houses were made of wood. , Nhere workers slept was about 10
    feet by 12 feet, and where I slept was about 10 feet by 8 feet. When the lease was over, we . put the house on a wagon,
    and moved it. The house was a one-bedroom small house surrounded by screen. The walls were made of thin cedar board and
    the roof
- speaker: Respondent
  text: was made of thin board. When the house became old we could see the moon lying on the bed through the cracks in the
    roof.
- speaker: Interviewer
  text: ': When we-think a boutiit mow, it was a terrible place, wasn''t it? : Yes, it was. In those days there were no coolers,,
    when it was'
- speaker: Respondent
  text: hot children could not even cry. After the harvest season was over, whether. ;we made profit..or not we let wives
    and children go to Los
- speaker: Respondent
  text: Angeles area for vacation from July to September. The husbands staywd behind and prepared for planting in the fall.
    After people became wiser they found a cool place on top of a hill on way to
- speaker: Respondent
  text: San Diego. An.old. couple.owned about 10 acres and were living there. someone rented some land and put up a tent and
    spent one summer ther. There was plenty of water which came from the fountain on top of the
- speaker: Respondent
  text: hill so children could play with water hose. People from Imperial Valley found that place one after another, and finally
    everybody from Imperial Valley started going there. We even had Sunday School
- speaker: Interviewer
  text: there. Children had summer school there, and went back :to Imperial Valley when the school started. How was the winter
    in Imperial Valley?
- speaker: Respondent
  text: It was very cold. There was a pond for horses to drink water fron. During the night water foze and there was about
    2 inches of ice
- speaker: Respondent
  text: on the pond. We had to break the ice with an axe so that horses could drink water. It was that cold at night time,
    but it was warm in the daytime. WhHen the wind blew it was cold even in the
- speaker: Interviewer
  text: ': Why did Japanese go to such a place? : Because they could pick cantaloupe early there. Most cantaloupe'
- speaker: Interviewer
  text: 'were produced there. : Were there many Japanese? : Yes, there were. Japanese Association was active there. When a'
- speaker: Respondent
  text: man was elected as the president of the Japanese Association he thought as if he became a minister. There was an old
    man from Shizuoka named Mr. Endo. He did not have any education but he
- speaker: Respondent
  text: had a big farm and made a fortune. He became the head grower of Girard Company and his name was on the crates. As
    he shipped so much produce to New York, the railroad company gave him a free trip to New York. As he became rich he wanted
    to become a president of the Imperial Valley Japanese Association. He paid membership fee to Japanese Association for
    all his workers and was elected the president. There was such a period. Japanese Association
- speaker: Respondent
  text: was very active then, and to become its secretary was the highest honor for educated Japanese.
- speaker: Interviewer
  text: 'When you came over here were there many single Issei men? A: Yes, there were. After that time they could go back
    to Japan to'
- speaker: Respondent
  text: get married, so many men did that.
- speaker: Interviewer
  text: 'Were there any gambling houses in Imperial Valley? A: There was Tokyo Club in Brawley in those days. There was a
    big casino in Mexicali but not too many Americans went there as it'
- speaker: Respondent
  text: was too hot. Chinese gambling houses were prosperous.
- speaker: Interviewer
  text: 'Were there many Chinese gambling houses? A: Chinese gambling houses were prosperous in Mexicali. There the'
- speaker: Respondent
  text: back part of small stores were gambling places and brothels.
- speaker: Interviewer
  text: Did many people lose money at gambling houses and brothels?
- speaker: Respondent
  text: Yes. Many people went there from Imperial Valley. In winter many white people went there, but as the business was
    not too good they made casinos in Encinada. After that casinos were built in Las Vegas.
- speaker: Interviewer
  text: Did many single ~ lose money?
- speaker: Respondent
  text: They lost money in Chinese gambling.' Tokyo Club 'was' operated by Japanese but was like Chinese gambling. There were
    such places in Sacramento, Stockton, Fresno and Los Angles. Around the time I came here the boss of the club was a big
    shot, and I hear th were fights between the clubs.
- speaker: Interviewer
  text: Did you know anybody who lost his fortune? I didn*tknow anybody who had much money. Only some people lost
- speaker: Interviewer
  text: ': When you came here - Isseis. were in their 40s and 50s weren''t : Did many of them give in to drinking and gambling?'
- speaker: Interviewer
  text: ': Did you think older Isseis were loose? : It fall depends on that person. There.were many serious people, but'
- speaker: Respondent
  text: on the other hand there were many who led loose lives. Many Isseis were absorbed in gambling. Many Isseis who could
    not marry and who could not manage a business well went from one camp to another carrying blankets on their shoulders.
    I experienced going from one camp to another, but when I Went to camps in Fresno most Isseis
- speaker: Interviewer
  text: 'talked mostly about gambling. : About how many years did you spend as a,farm laborer? : I think I did it for about
    6 years.'
- speaker: Interviewer
  text: 'Where did you do that? in : Mostly Imperial Valley and worked at friend''s house. Did you go to Fresno and San Diego
    during the 6 years?'
- speaker: Respondent
  text: ': I did not go to San Diego.or Arizona. After the harvest in Imperial Valley I used to go to Turlock.'
- speaker: Interviewer
  text: Where was your mother then?
- speaker: Respondent
  text: ': AS she was lonely she went back to Japan after 9 months. : How about your younger brother? : He went to San Francisco
    and worked as a schoolboy. He stayed there'
- speaker: Interviewer
  text: 'How many years younger is he? : He is 3 years younger. : He was young then, wasn''t he? : He was only 13 or 14 years
    old when I came here.'
- speaker: Interviewer
  text: ': You didn''thave any responsibility, didn''t you? : No, I only sent some money to mother. What kind of recolllections
    do you have about your transcient days?'
- speaker: Respondent
  text: ': Itdidn''tfeel like a hardship as I was young. It was kind of fun. There were many young men a ound my age who were
    doing the same then. They are all settled down and many of them are living around Los'
- speaker: Interviewer
  text: ': Where did you sleep when you were a transcient? : In most places in the country there were camps and in town there
    were'
- speaker: Respondent
  text: boarding houses. I stayed in a boarding house and went to work from there. It was like that in Fresno.
- speaker: Interviewer
  text: ': Did you work at different places every day? : Not everyday. We stayed at one camp for one season, but if that'
- speaker: Respondent
  text: camp was not good we want to another camp.
- speaker: Interviewer
  text: It was quite,easygoing life" wasn't it?
- speaker: Respondent
  text: ': Yes, it was. If those who gambled lost all the money they earned they did not have money to pay the boarding house,
    but as I did not gamble I did not have to worry about the boarding money nor spending money. As I always had enough spending
    money I went to another camp if I did not like that camp. One year I went around many camps. It'
- speaker: Interviewer
  text: 'was quite fun as I get to know different places. I went as far : Was it hot around Fresno? : Yes, 1t was. At grape
    season it was very hot. How was it compared to Imperial Valley?'
- speaker: Respondent
  text: 'It was not as hot as Imperial Valley. We used to go to Fresno when it was the hottest. It is the hottest in Imperial
    Valley in August used to but we,leave there in first part of July .to go: to Fresno.'
- speaker: Interviewer
  text: 'When did you get married? .Q: How old were you then? I was 32 years old then. What did you do after the transcient
    period? I started growing strawberry in Florin.'
- speaker: Interviewer
  text: 'Why did you start growing strawberry in Florin? A: My friend Mr. Dakusaku lived in Turlock. He went to Fresno for
    a year and then was pdanning to go to Los Angeles with me. When we were getting ready to go to Los Angeles he received
    an in vitation from Mr. Nakamura of Florin to go there and grow strawberry with him. When we came here there was space
    in Mr. Jenkin''s ranch where we could grow strawberry without paying rent if we grew grape between Strawberry. Mr. Daksaku
    stayed there and I went back to Imperial Valley. After melon time in _. ! Imperial Valley I went to Turlock to harvest
    melon there. Then I went to Florin to visit Mr. Dakusaku. The day I arrived in Florin was the wedding day of Mr. Nakazato''s
    daughter and I was invited. I stayed at Mr. Dakusaku''s house and helped him. Also the go-between of the marriage wanted
    me to pick grape so I helped him. I worked around here for a while. In 1926 I went back to Japan, stayed there for half
    and year and came back'
- speaker: Interviewer
  text: 'Did you want to go back to Japan? I wanted to see my mother as I sent her back to Japan a lone. Did you take your
    wife then? A: No, I was only 24 years old then. The work in America was hard so I did not want to come back to America,
    but as I was running'
- speaker: Respondent
  text: out of money and:I-was told that I may be drafted for military service, I came back in a hurry.
- speaker: Interviewer
  text: Did you come back to Florin from Japan?
- speaker: Respondent
  text: 'Yes, I daa. wher I came back in April of 1927 the strawberry was ready, so I started picking them. The work was hard
    after doing nothing for a while. We had an uncle named Gibo. As his family : in Japan heard nothing from him for along
    time, my mother asked me to look for him when I came to America. In the winter of 1927 Mr. Matsushima who was an officer
    af Salvation Army in Sacramento asked Mr. Dakusaku to hold a funeral for a man from Okinawa named'
- speaker: Respondent
  text: Kinoshita. We did not know of anybody by that name from Okinawa so we went to see him and found out that he was the
    man who went
- speaker: Respondent
  text: to Mr. Dakusaku's and asked for some money to buy bread as he was penniless after _failing. in business in Colorado
    and fled to California. I think he died from pneumonia. He was a gambler. Since Mr. Matsushima asked us to hold a funeral,
    people from Okinawa met at Mr. Miyagi's in Oak Park. At that time Mr. Miyagi's relative came and told ts that there was
    a single man named Gibo
- speaker: Respondent
  text: in Vacaville and he would. be the same way when he die I thought he must be my uncle, so I went to Vacaville to see
    him. When I told him that I was Kozo Oshiro's son he did not believe me. Gibo was a gambler and he did not save money
    so he did not write to Japan.
- speaker: Respondent
  text: I brought Uncle Gibo to Florin, and leasing the land started growing strawberry with him. After working for about
    a month and
- speaker: Respondent
  text: a half Gibo wanted to gamble. He asked me to take him to town but I didn't. TI had to fight with him everyday and
    he finally left.
- speaker: Respondent
  text: ': How old was he then? I think he was around 60 years old. When my brother was going back to Japan I asked him to
    take the uncle back with him. I sent him back to japan with the money he saved here, but he could not stay'
- speaker: Interviewer
  text: 'home. He had a son same age as my brother and 3 older daughters. : How did his family make a living?'
- speaker: Respondent
  text: ': His family was well to do so they did not have trouble in making a : I guess he could not stay there as he did
    not bring up the children.'
- speaker: Respondent
  text: ': Since he gambled all his life he could not live steadily in Japan. : What had become of him? ; He was coming back
    to America and went as far as Tokyo with my'
- speaker: Respondent
  text: brother but as he did not have a visa he was stuck at Yokohama for a while. He asked me to send him the passage, so
    I did and
- speaker: Respondent
  text: he came back. I thught he would have been cured, but he wasn't. He worked here and there and died of cancer. When
    I heard that he
- speaker: Respondent
  text: was ill in Lodi I brought him here. As he had a daughter in Hawaii I woote to her and she took him to Hawaii. Four
    days after he went there he died. In Hawaii there were many Japanese from the same
- speaker: Respondent
  text: 'village, so I heard that they gave him a big funeral. : He put everybody to trouble, didn''t he? : Gamblers were
    all like that. There were many people like him in'
- speaker: Interviewer
  text: 'Q: Was his family rich? It wasn''trich but had enough to live on. Were there gamblers" families that had difficulties
    making a living?'
- speaker: Interviewer
  text: 'Yes, there were many such families. Did you settle down here and grew strawberry? A: Yes. Before the war I bought.
    land and was farming, but during the'
- speaker: Respondent
  text: bépressioh I' could not make "payments. I stayed there until evacuation.
- speaker: Interviewer
  text: What did you do during the Depression? Could you make a living?
- speaker: Respondent
  text: At that time the Strawberry Company lend us money, but only a little at a time. We bought food from stores on credit.
    We bought a year's supply of food from Mr. Akiyama's store on credit. The company did not lend us much money but they
    lend us money to pay for the food.
- speaker: Interviewer
  text: 'Were there many peple around here who had difficulties making a living? A: Yes, there were. I don''tknow how people
    brought up their children. There were many small children but not many people who could work,'
- speaker: Respondent
  text: hard Issei all had, times in those days.
- speaker: Interviewer
  text: Did you get married during the Depression? Yes, we did. She was put to work as soon as she came here.
- speaker: Interviewer
  text: 'How did you get married? A: We are distant relations. My wife was born in Hawaii. As her father'
- speaker: Respondent
  text: was in Hawaii she came to Hawaii. I went to Hawaii and brought her
- speaker: Interviewer
  text: How old were you (Mrs. 0.) then? I was not quite 18 years old. We had a wedding here, but we needed
- speaker: Respondent
  text: the signatures of parents, so we sent the certificate to Hawaii to -have it signed. Then we were legally married.
- speaker: Interviewer
  text: 'Did you know about America, then, Mr. Oshiro? No, I didn''t as I just came from Japan. Were you surprised? A: I thought
    America was a better place. I came here at the poorest'
- speaker: Respondent
  text: time. I had net experience hardship in Japan.
- speaker: Interviewer
  text: 'You didn''thave to give up your land, didn''t you? A: When we were in camp in Fresno the landlord came to the camp
    to make'
- speaker: Respondent
  text: me sign the paper that I would return the land, so I did.
- speaker: Interviewer
  text: 'Did you lease the land or buy the land? A: I bought the land for $1,200 but I paid only#200 and was paying only the
    interest to $1,000 balance.'
- speaker: Interviewer
  text: 'Could you buy the land? A: I bought it in my wife''s name. As soon as she came here she went'
- speaker: Respondent
  text: picking strawberry at Mills. As the wages was cheap two of us made only about $80. While we were commuting to Mills
    our car broke down.
- speaker: Respondent
  text: Did you have to work outside even though you own land? We could not make a living with only the produce from our land.
    Every year we went out to work. Even big children all went to
- speaker: Interviewer
  text: 'work at Mills. The wages were 15¢ an hour'' then. : Did the things get better after a while? : It did not get much
    better, except the wages went up.'
- speaker: Interviewer
  text: 'When were your children born? : The first one was born in 1936. : Did you continue working there until the war broke
    out?'
- speaker: Respondent
  text: ': We worked at other people''s house besides taking care of our own. Sometimes we would start the pump for watering
    in the morning before we went to work. By the time we came home the field was watered, so'
- speaker: Interviewer
  text: 'I would stop the pump. : How.much did you pay,interest on $1,000? : When we borrowed money from the company they
    charged 10% interest.'
- speaker: Respondent
  text: ': Was that a Japanese company? : The strawberry companies were all owned by Japanese. : How much interest did you
    pay for $1,000 you owed on the land?'
- speaker: Respondent
  text: ': I don''tremember well, but I think it was 4 or 5%. The company paid the electric bill because if we did not pay
    the electric bill we'
- speaker: Interviewer
  text: 'could not water the strawberry and they will be dried up. : How did you feel when you heard about the Pearl Harbor
    attack?'
- speaker: Respondent
  text: ': I didn''tbelieve it at first. I was worried if the war might break out but I didn''tthink it would really happen.
    Since America started boycotting Japanese goods I was afraid the war might break out. I didn''tknow that the war broke
    out until the nest day. We were'
- speaker: Respondent
  text: going to show a movie at the Methdist Church so I went around selling tickets. When I went to Mr. Yoshino next door
    to go to church with
- speaker: Respondent
  text: him to arrange chairs for the movie Mr. Yoshino said, "Don't you know that the war broke out between America and Japan?"
    "Ts that true?" I said as I could not believe it. "You are so easy-going. It is not time to arrange chairs" Said Mr. Yoshino.
    We did not
- speaker: Interviewer
  text: 'have a chance to refund the money for the tickets. : What were you doing that Sunday? Pol TOPeot whats dae,'
- speaker: Interviewer
  text: ': Did you think you were in danger? : I was the auditor of the Heimusha Kai, so my name was on the black'
- speaker: Respondent
  text: list with 5 other officers of the Society. The F.B.I. a gent came and asked me many questions about the Heimusha Kai.
    The president Mr. Tsuji was a furniture salesman. .In those days he went around selling 011 stoves so he was not home
    whenever the F.B.I. a gents came. The vice-president Mr. Mizugami worked at various places
- speaker: Respondent
  text: so he was not home either. The F.B.I. a gents went to the secretary Mr. Miyoshi*shouse a couple of times. They also
    met Mr. Kamei
- speaker: Respondent
  text: who was in gasoline retail business. Mr. Tanaka and I were always home. They came to the field where I was working
    and asked many
- speaker: Respondent
  text: questions about Heimusha.Kai. He even knew things we did not know. Finally he told me that I did not have to worry.
- speaker: Interviewer
  text: Did you know that he was an F.B.1. a gent?
- speaker: Respondent
  text: ': I knew that F.B.I. would investigate me. I had met him at Mr. Nakamura''s when his daughter committed suicide by
    jumping in a river, so I knew he was an a gent and he knew me, too. He understood'
- speaker: Interviewer
  text: ': Did you find out that you had to go to camp? : A little while after the war broke out the newspapers reported that'
- speaker: Respondent
  text: we would be put in camps. My wife's two brothers were in the Japanese Army. The older brother was a doctor and the
    younger one was an officer. There was a picture of him in uniform wearing a saber. We burnt that pidute and most other
    pietupas of my wife's brothers in uniforms. We were told that we could not take this and that so we threw away all kinds
    of things. Before the war I had subscibed to 2 Japanese magazines, 'Kodan Club" and the 'King'. TI had a pile of them
    so TI burnt them as the fuel for the bath. We had a hard time burning them as
- speaker: Respondent
  text: they did not burn well. The F.B.I. a gents did not come to Florin. We had a hard time at the time of evacuation. When
    I went to register one morning I was told to leave the next morning. TI had boxes ready to put strawberry in but I did
    not have time to do that so I asked my landlord to do that. He took me to Elk Grove, too. While it was light we took farm
    equipments outside and furnitures to the landlord's barn and stored them there. At night we had to clear the house. I
    didn'tknow where to begin, but my wife's cousin who came from Hawaii told me that we should clear one room at a time,
    so we did. As children were small we made .them Sleep on the mattress
- speaker: Interviewer
  text: 'in the living room. We stayed up all night packing everything by the : Was that your own house? : Yes, it was. A
    Filippino is living there now.'
- speaker: Interviewer
  text: ': Did you wonder what would become of you? : When we left we did not even dream of coming back to Florin.'
- speaker: Respondent
  text: I thought we might be able to get out after the war was over, but I didn'tthink we could come back to California.
    I think most
- speaker: Interviewer
  text: 'Japanese felt the same way. : Did you still work in the field everyday? much : In winter time we do not work, but
    when it gets warmer I will. Were you worried when you heard about the Pearl Harbor attack?'
- speaker: Respondent
  text: ': Yes, I was. My wife''s father had been living in Hawaii, but he went back to Japan by the last ship before the
    war broke out as his wife and children were in Japan. When the war between America and Japan broke out we were worried
    about the future, but we could not do'
- speaker: Respondent
  text: ': Did you think you were in danger? : As America stopped selling goods to Japan I'' thought America was going to
    fight with Japan, but I did not think it would start so soon. As 2 envoys, Kurusu and Nomura came from Japan I hoped they
    would negotiate for peace. We read in Japanese newspapers that America was getting ready to fight with Japan, but American
    public did not know that. America was waiting for Japan.to start the war before they declared war against Japan. When
    Japan attacked Pearl'
- speaker: Respondent
  text: Harbor they said Japan started the war without declaring it, so they declared war against Japan. Even 'the man from
    whom I bought
- speaker: Respondent
  text: the land told me that Japan made a mistake by starting the war. - I could not reason with him as my English was not
    good enough.
- speaker: Respondent
  text: After the war broke out the F.B.I. started watching Japanese. I heard that in Mayall temporarily hired a gents pretending
    they were searching took valuable items such as watches and jewelry. Mr. Iwasa of Mayall was ill in bed, but F.B.I. a
    gents pulled him down from the bed and beat him up. If I remember correctly he hang himself in his pain. His funeral was
    held right before the evacuation. Some people had their sashimi knives taken away as F.B.I. claimed they were weapons
    and some people were arrested for having them. 'Mrs. Sakuma had been in bed with illness for over 10 years. I heard that
    F.B.I. took her wedding ring and a gold watch. In Florin people were scared that F.B.I. would come but luckily they didn't
    as they had already investigated us. Around here only the influential people were arrested but in Delano all the men except
    2 were arrested because they donated,
- speaker: Interviewer
  text: to the Heimusha Kai. There were all kinds of rumors. Were you afraid you might be killed? No, I didn'thave that kind
    of worry.
- speaker: Interviewer
  text: ': Did you think you would be in terned? : I was afraid I might be as my name was on the blacklist because I'
- speaker: Respondent
  text: was connected with the Heimusha Kai. At that time my wife was pregnant with our second daughter so I was worried.
- speaker: Interviewer
  text: 'Did you already had one child? We already had 3.and she was the 4th child. : How old was your oldest child then?'
- speaker: Respondent
  text: 'He had started going to grammar school. : What did you do with your belongings when you evacuated? : We packed and
    took whatever we could with us. We put farm equipments and things we could not take to the yard and barn of our landlord.
    I went to Elk Grove one day to register and I was told to evacuate the next morning. It was afternoon when I came home.
    While it was light we carried farm equipments and other things to the landlord''s, and at night we cleared the house.
    We had to separate the things we take and things we leave and pack them. We had to.clear.& méoms butT didn''tknow where
    to start. My wife''s cousin who was from Hawaii told me that we should do one room at'
- speaker: Respondent
  text: a time. We packed things we take in suitcaseg and asked the landlord to store the rest of the things in his barm.
    When we came home almost everything was there except one new bed which was missing. some people had lots of thhngs stolen
    but our landlord kept them for us.
- speaker: Interviewer
  text: Where did you go then?
- speaker: Respondent
  text: ': Early next morning the landlord put us and all the neighbors in his truck and took us to Elk Grove, and from there
    we went to the County'
- speaker: Respondent
  text: 'Fairground in Fresno. From Fresno we went to Jerome, Arkansas. : How long did you stay in Fresno? : We went there
    in April and left there in September for Arkansas.'
- speaker: Respondent
  text: The train took Northern route through Sacramento, Utah and Wyoming so it took one week. Once in a while the train
    stopped and let us
- speaker: Respondent
  text: off. The train stopped at Laramie, Wyoming and let us off. In Salt Lake City the train stopped for along time while
    they changed the
- speaker: Respondent
  text: 'dining cars, but did not let us off. We left Fresno after we ates breakfast, but -wée: did not get lunch or supper.
    The train was run by Santa Fe Railroad, and from there it was run by a Western railroad. At Stockton the train stopped
    for over half a-day while they connected the diner that came from san Francisco. After the train left Stockton we were
    given supper and breakfast along the Feather River. People with small children could stay in pullman, so my wife and chiidren
    did, but I stayed in another car. Three or four people'
- speaker: Respondent
  text: had to squeeze in one eat. Didn'tchildren get hungry and cry? Yes, they said they were hungry. When we left Fresno
    we bought some cookies and other snack but we ate them up while we were in Stockton. At Salt Lake City, too, the train
    stopped over half a day and they did not give us one meal. By then we had used up all the food, so
- speaker: Respondent
  text: we shared whatever was left with the people on the same coach. Usually the people who were in the same block in Fresno
    were on the
- speaker: Respondent
  text: Same coaych so we shared the food like one family. How was the assembly center in Fresno? Was it in convenient? It
    was not like living in our own home as there was public lavatory
- speaker: Interviewer
  text: ': What kind of difficulties did you have? We had to eat with others at meal time, so we did not have freedom.'
- speaker: Interviewer
  text: How were the housing? They were barracks with black paper on the wall and the ceiling. We were there during the summer,
    so it was very hot.
- speaker: Respondent
  text: ': How did you feel when you entered Fresno Assembly Center? : I felt as if I were put in a jail. The camp was surrounded
    by a fence. There were watch towers here and there with sentinels watching. Outside the fence soldiers patrolled and we
    were told not to go near the fence, At that time Japanese in Fresno had not evacuated yet. some Japanese near the camp
    were growing melons, and Indian pickers used to throw some cantaloupe across the street, but later soldiers made them
    stop doimg that. That ranch belonged to an American company and the foreman was a Japanese. Later Japanese in Fresno were'
- speaker: Respondent
  text: ; How was the mealtime? In those days Japanese were not used to community life. It was pitiful because we had to line
    up for food. We were given only one serving, So young men were not filled. They ate in a hurry and went to another mess
    hall, stood in a line and ate. I heard that some young men ate in 3 mess halls. Around that time there were bad white
    people in the kitchen. They took out Bologna and other meat from the kitchen and
- speaker: Interviewer
  text: 'sold them outside and made much money as meat was rationed. : What else do you remember about Fresno Assembly Center?'
- speaker: Interviewer
  text: ': I distributed coal to kitchens. * Was there any incident in Fresno Assembly Center? I don''tremember any in Fresno.'
- speaker: Respondent
  text: ': Were there anybody who quarrelled? 2 MO. Not in Beene: Fresno was quite peaceful. I heard that in Santa Anita a
    group of young men became unruly. When we went to Jerome people from Santa Anita were there, too. People from Fresno were
    a ftaid of them at first, but after we get to know them we found out that Japanese were Japanese. There were all kinds
    of rumors. After we voted for loyalty, people were divided into loyal group and disloyal group.'
- speaker: Respondent
  text: ': How did you think about the loyalty? I thought they asked strange questions. To the question, "Do you pledge loyalty
    to America?" I answered that if I was given American citizenship I will pledge loyalty to America. I did not answer ''no''?
    as I live in America, but I could not betray Japan when I do not have American citizenship . I heard that American government
    later'
- speaker: Interviewer
  text: 'admitted that it was a mistake to have asked such questions. : What did you think about Nisei going to war?'
- speaker: Respondent
  text: ': I did not feel too good about them going to fight against their parents'' country. Yet I did not tell them not
    to go. They were born in eee they are American citizens so they should do whatever they decided to do. Many Niseis believed:
    what they read in American newspapers and said Japan was wrong for attacking Pearl'
- speaker: Respondent
  text: Harbor. Nisei who did not pledge loyalty to America were sent to Tule Lake. In the camp we called them *Washoi gumi'
    as they used to
- speaker: Respondent
  text: 'run around the block shouting, "Washoi! Washoi!" : Did those people ever beat up others? : Nothing that violent happened.
    in Jerome. I heard that there were'
- speaker: Respondent
  text: such incidents in Tule Lake. Mr. Hitimi's brother was killed there. There were all kinds of wild rumors going around.
    In Jerome old men gathered in the boiler room and talked about unfounded news of
- speaker: Interviewer
  text: What kind of work did you do in Jerome?
- speaker: Respondent
  text: ': I worked in the kitchen. At first I worked as one of the clean-up crew of mess halls and kitchen. There were 5
    of us. In Jerome we used wood as fuel in stoves. Since those who were assigned to chop wood could not chop all the wood
    for the camp, each block sent volunteers to chop wood. As the clean-up crew were all strong men we were told to chop wood,
    so we chopped wood everyday. When Jerome was closed there were 2 big piles of chopped wood left. In wintertime'
- speaker: Respondent
  text: it was a hard job to get the trees out of the Swamp-like place. We hitched wagon on horses and pulled them out.
- speaker: Respondent
  text: ': Were they dead trees? No, we cut down living trees. Sometimes we cut down huge oak trees. They would have made
    good lumber, but we used them as firewood.'
- speaker: Respondent
  text: The life in camp was not good for the education of children. They played where the parents could not watch, so we
    did not know what they were doing. Parents who had growing children had worries especially mothers worried a lot about
    their children. Our children
- speaker: Respondent
  text: were of playful age, but we did not know what we were doing. We stayed in Jerome the longest. We lived in Gifa almost
    2 years.
- speaker: Interviewer
  text: Did you leave Jerome?
- speaker: Respondent
  text: Jerome was the best camp but it was closed first. The head of Camp Jerome was a good man. We usually could not sell
    the vegetables we grew in the camp, but in Jerome we grew good turnip, so women washed and bundled them into bunches and
    sold them. Hat money we bought chicken, so we had chicken about twice a week; once as fried chicken and another time as
    stew. As Jerome was close to Gulf of Mexico we were fed shrimp and oysters. I don'tthink people outside ate as good as
    we did. People in the camp were so spoilt that they did not eat beans or spaghetti. I cooked spaghetti like udon, and
    people ate it for a while.
- speaker: Respondent
  text: After we moved to Gila we had chicken may be once while we were there. People in Gila Camp were surprised to hear
    that we ate shrimps
- speaker: Respondent
  text: 'and oysters in Jerome. Only rice was good. It was Texas rice. Q:What was your hobby? A: I did not have any hobby.
    My neighbor invited me to go and learn Shigin but I refused as I could not sing.'
- speaker: Interviewer
  text: Didn't you do anything besides work in the camp?
- speaker: Respondent
  text: '"A: In Arkansas we went: in the wood to cut knobs of trees, and after pealing the bark off we made all kinds of things.
    | I went to the wood with a saw and an ax to cut the knobs of trees, but as I did not know what kind of knobs to pick
    I used to come back with an empty bag'
- speaker: Interviewer
  text: 'when others went back with sack full of knobs. I enjoyed the walking in the wood very much. : Weren''tthere many
    snakes in Arkansas?'
- speaker: Respondent
  text: ': Yes, there were 3 or 4 kinds of poisonius snakes. They were Moccasin, Rattle snakes and anther kind. There was
    a small snake'
- speaker: Respondent
  text: about 14 feet long and very poisonous. If you were bitten by one of them it was fatal. Some young Japanese who were
    sent to the
- speaker: Respondent
  text: camp from Hawaii used to catch rattlers which were about 4 feet long and about 5 inches in diameter. They had 17 or
    18 bells. These young men used to get up early in the..morning to catch them.
- speaker: Interviewer
  text: What did they do with the snakes?
- speaker: Respondent
  text: They put-.snakes in boxes with a wire net and kept them in their rooms.
- speaker: Interviewer
  text: What did they feed the snakes with?
- speaker: Respondent
  text: ': I didn''t ask what they feed the snakes with. The people in that block felt uneasy. In the next block a Hawaiian
    caught a rattler,'
- speaker: Respondent
  text: pulled its .fang and used to play with it, but by and by the grew back and bit him and the man was taken to the hospital.
- speaker: Interviewer
  text: ': Does the fang grow back in after it is pulled? : It seems that way. Aren*tthere snakes in Okinawa, also?'
- speaker: Respondent
  text: ; There are habu in Okinawa. Its poison is the worst. If you bitten by it the part which was bitten becomes deformed.
    even
- speaker: Interviewer
  text: '; Were there anybody in the camp who ate snakes? : I didn''thear such thing. They make medicine out of snakes,'
- speaker: Respondent
  text: I caught one rattler in Gila. When I went to a canal to see are any turtles I saw a rattler. I threw rocks at it and
