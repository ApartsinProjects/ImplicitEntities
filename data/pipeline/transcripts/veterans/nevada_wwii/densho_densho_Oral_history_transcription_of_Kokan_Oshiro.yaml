- speaker: Respondent
  text: '"Name of in terviewer: Takarabe Date: 1/9/76 Place: Sacramento Dtadietn yeati fall. : My name is Kokan Oshiro.'
- speaker: Interviewer
  text: ': How much schooling did you have? I had 8th grade education. : Where is your birthplace? ; When were you born?'
- speaker: Interviewer
  text: ': I was born in 1902. I will be 74 in May. : What was your father''s profession? : He was an elementary teacher for
    about 3 to 4 years. Then he worked'
- speaker: Respondent
  text: at the village office as an officer. In those days there was the land adjustment, and my father was in charge of measuring
    each land in our village for the tax purpose. In olden days only farmers could own land. The land was a lloted according
    to the size of the family. Every 10 years there was a readjustment of allocation. 'The land included good land, bad land,
    forrest and everything. Villages that had small population had small allocation and villages with large population had
    big land allocated. It was still the same way after the Meiji Restoration. My father was in charge of measuring
- speaker: Respondent
  text: 'each lot in our village for the tax purpose. : Why did they have readjustment every 10 years? It was like today''s
    Communist policy. The government policy was'
- speaker: Respondent
  text: like that in those days. That may be because the poor villages should not stay poor all the time. Large families were
    allocated big land. Some families with many small children and a few adults could not cultivate the land and they had
    to pay tax according to
- speaker: Respondent
  text: esize of the land, so they returned some of the land. On the other hand, families with many adult workers received
    more land.
- speaker: Interviewer
  text: Whose policy was that? It was the policy of Okinawa government. Was there a feudal lord in Okinawa in those days?
- speaker: Respondent
  text: Okinawa was ruled by a king. In olden days there was a rivalry of powerful leaders in Okinawa. Gradually they were
    unified into 3 tribes, Northern, ,Central and Southern. ic. In those days they were trading with China, Malaya and Thailand,
    but mostly with China. The leader of each tribe was called Ohnushi (Big lord). At that time a messenger came from China
    saying that China will make the
- speaker: Respondent
  text: Southern lord a king. I think that was China's diplomacy. Was Okinawa unified since then? The son of Tametomo Minamoto
    married the Southern lord's daughter. Sine Tametomo*s son became the king of Central Tribe and won the wars, the Central
    Tribe became strong and conquored the Southern Tribe and unified the three tribes.
- speaker: Respondent
  text: After that the '"Sho' family has been ruling Okinawa, and the present family is the third one. When a king became
    extravagant he was defeated in election. There was election in Okinawa since
- speaker: Respondent
  text: the olden days. The ancestor of the present 'Sho* family was a farmer who came from an island in North and became
    King Shoen.
- speaker: Interviewer
  text: Does that family still continue to exist?
- speaker: Respondent
  text: Yes, it does. The decendant of King Shoen is still living. An American historian says that Okinawa was the model for
    Japan. Tokugawa government followed the example of Okinawa. Japan learned a lot from Okinawa. Okinawa was a territory
    of Satsuma clan in
- speaker: Interviewer
  text: Did Satsuma clan actually conquor Okinawa?
- speaker: Respondent
  text: No, they couldn'tbecause it was too far away. If Satsuma tried to conquor Okinawa they had to go there by ship. Then
    they would have been defeated at the port. Gradually they conquord' southern part of Ryukyu. Then they attacked from the
    north and finally they conquored
- speaker: Respondent
  text: It' was Hideyoshi Toyotomi's time. After Satsuma started governing Ryukyu, officers of Satsuma Clan started coming
    in to Okinwawa. Under Tokugawa government Satsuma clan could not trade with foreign countries, but through Okinawa they
    traded with China and crossing the South Seas they went as far as Europe. They took all the good merchandise back to Satsuma
    and sold them so they made much money.
- speaker: Respondent
  text: 'When Hideyoshi Toyotomi conquered Korea, he ordered Okinawa to send soldiers but Okinawa refused, so with that as
    an excuse Hideyashi conquered Okinawa. Since then Okinawans: could not own weapons. When'
- speaker: Respondent
  text: the British fleet came to Okinawa they said Okinawa is an unarmed peaceful island. I think missionaries were in Okinawa
    since early daxs.
- speaker: Respondent
  text: I think Uragami in Nagasaki was named by a missionary. There is a place with the same name in Okinawa and on Miyako
    Island. A missionary named lived in Okinawa for about 10 years. In those days all the religion except Shingon Sect. was
    prohibited so he could not evangelize, but Okinawa was influenced by Christianity.
- speaker: Interviewer
  text: Was your father an officer of the village office? yes, he worked for the village office. Then he came to America.
