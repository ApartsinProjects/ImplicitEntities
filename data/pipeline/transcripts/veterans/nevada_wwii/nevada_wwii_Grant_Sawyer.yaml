collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: Dissatisfied with the way things were going, I began trying to get into Officers Candidate School. At first I couldn't
    pass the eye exam; so I memorized some charts, figuring that if I recognized the first line of the chart they were using,
    I could breeze through it, no problem, [laughter] Finally I got a chart that I knew, passed the physical at Camp Fannin,
    and wound up in OCS at Camp Lee, Virginia. After about three months, I came out a second lieutenant in the quartermaster
    corps.
- speaker: Respondent
  text: Then it was off to the Philippines on a troop-replacement ship. A lot of the old guys that I shipped over with were
    physically deficient, like myself. By that time they were taking people up into their early forties, I think. None of
    us, I would say, was cream of the crop! I was so blind that I was afraid I would get into some kind of situation and lose
    my glasses and wouldn't be able to see, and that could have been a total disaster. So I carried several extra sets of
    glasses on me in my cartridge belt, my pockets and elsewhere.
- speaker: Respondent
  text: The Army didn't care whether you were in the quartermaster corps or what, you went where the action was, and when
    we landed in the Philippines I was given command of an infantry platoon. Most of my men weren't at all prepared to go
    into combat; nevertheless, we were in a Philippine battle zone. For about a week we bivouacked out next to a rice paddy
    with our guns and equipment, and right across the paddy were the Japanese. Everywhere there were booby traps and that
    sort of thing, and caves with Japanese soldiers still fighting from them. We also met resistance and sporadic gunfire
    in the suburbs of Manila, where we conducted a cleaning-up operation.
- speaker: Respondent
  text: It was a great relief to me when I got lucky and got out of that situation. One day a truck loaded with people came
    out from central Manila. They were there to interview us for selection to the Philippine Civil Affairs Unit, the PCAU,
    which was being formed in the headquarters group. I was one of two picked to go to the unit, and I spent the rest of my
    time in the Philippines in Manila.
- speaker: Respondent
  text: The Japanese had occupied the Philippines for most of the war. Now we in the PCAU were supposed to restore civilian
    government and transfer its functions back to the Filipino people. We started by going out to the POW camps around Manila,
    freeing the prisoners. Then I was placed in charge of an entire district of the city; I was sort of the governor of that
    whole district, and I ran the schools and did all the things that military governors were supposed to do. On one inspection
    tour of a school, I found GIs lined up through the courtyard and down the street about a block and a half. I thought,
    "What the hell is going on here?" It turned out that as district commander I had been running a major house of prostitution
    in the school, unbeknownst to me until I followed the line all the way up to where the action was! I was forced to shut
    it down against my best judgment, [laughter]
- speaker: Respondent
  text: You put in so much time on duty, and you got to go to a rest camp. Shortly before the end of the war I was sent to
    one in Baguio, northern Luzon. Since I was the only quartermaster officer there, I was put in charge of its kitchen -
    I knew nothing whatsoever about any kitchen, but that's the way things were in those last days of World War II. Soon after
    I arrived the Japanese surrender was announced, and hundreds of troops just dropped everything and rushed out of the camp.
    Most were gone for several days, a week or more; and then gradually, one-by-one, they wandered back and were accounted
    for. It was the strangest thing - soldiers just fled the camp and went into Manila and got drunk and celebrated!
- speaker: Respondent
  text: All told, I was in the Philippines for about a year. We had been scheduled to go to Japan for the expected invasion,
    but we were redirected to Korea, where I filled somewhat the same role in Seoul as I had in Manila. The Japanese had occupied
    Korea for forty years, and they owned and controlled everything. When the war ended and the Japanese left, the Koreans
    were totally unprepared for independence, so our unit moved in and set up a transition government. I was a part of that
    until my discharge in the summer of 1946.
- speaker: Respondent
  text: 'We were discharged from service in those days based on points - they would calculate how many you had, and when you
    reached a certain number you were discharged. I had to wait about a year after the war was over; there were times when
    I wondered if I would ever get out. [laughter] Still, even though it was a much longer period than I would have liked,
    I consider the four years that I spent in the service the most valuable four years of my life. Of course, that''s easy
    for me to say: I wasn''t killed or injured, and any deprivations that I suffered turned out to be in my own best interest.'
- speaker: Respondent
  text: There were so many things you had to learn in order to survive the experience. Service in the military gives people
    a chance to grow up; it also tests people individually. Somebody would say, "Today we go on a fifteen-mile hike, and you're
    carrying a pack of forty pounds." There was no way! Then, much to your amazement, you did it. It just about killed you,
    but you did it. You had to learn to share and to endure, and to relate to the kind of people you had never met or been
    around before, both racial and otherwise. You had to develop an approach to life that enabled you to cope, even when the
    situation was very bad. No matter how frightened you were, you had to accept that things were probably going to get better;
    and you had no control over anything, anyway! [laughter]
- speaker: Respondent
  text: I came out of the service a different man - more mature, more understanding of the other person's point of view. I
    had learned how to handle people. When I first went in, I was reluctant to take orders from sergeants who I thought probably
    couldn't even read or write. We get up at five o'clock in the morning, do this or do that, and I'm thinking, "Who is this
    son-of-a-bitch to tell me what to do?" I'd never been able to handle authority well anyway, but I had to learn that those
    virtual illiterates had a role. They could be very good at what they did; maybe a lot better than me, even though I considered
    myself superior in background and education. I was quite young when I went in, and I had a lot to learn.
- speaker: Respondent
  text: Since the war, I've always believed that compulsory military service is a good idea. Some veterans complain about
    their war experiences, how terrible they were - and, I am sure they were for many people - but the generation that came
    out of World War II was one of the most productive that this country has ever seen. We felt we had lost time, so we had
    to hurry. After we got home, we set out to accomplish things fast.
