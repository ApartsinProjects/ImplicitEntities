  text: UMN Immigrant Stories Collection ['United States'] Chaw Sein was born in Umpiem Refugee Camp in Thailand in 2000.
    Her family had left Burma because of war. In 2008, her family resettled in the United States, living in Georgia for three
    years before moving to Minnesota. file:///F/Immigrant%20Stories%20Transfer/Sein,%20Chaw/Chaw%20Sein%20Transcription.txt[7/18/2017
    12:46:45 PM] My name is Chaw Sein. I was born in Thailand, Umpiem Refugee Camps, but my parents, sister, and grandparents
    were born in Burma. Because the DKBA [Democratic Karen Buddhist Army] burned down their village, my parents, sister, and
    grandparents have to moved to Thailand Umpiem Refugee Camps in 1999. While my mother and family were escaping, I was in
    her womb. When I lived in Thailand, I did not get enough education. I was only in first grade when my mom decided that
    she wanted to moved to the United States. Before the day that we were supposed to come to America, we celebrated. All
    my friends and my mom's friends came to celebrate with us. After we ate, me and my friends we played jump rope and my
    mom and her friends talked and laughed. We had so much fun. The next morning, on April 29, 2008, we woke up early at 6:00AM,
    got ready, and went down to the front of the road to wait for the taxi. When I was in the taxi from Thailand to Mae Sot
    I felt really dizzy because I had never ridden in a taxi before. We stayed at Mae Sot for 5 hours. While we were there,
    I saw people selling food by the side of the street and it smelled so sweet, so my mom bought me and my sister meat balls.
    After 5 hours of waiting we got on a double decker bus that took us to Bangkok. We waited at Bangkok for an hour. While
    we were there, we saw a lot of refugee families waiting for taxis. The people who worked at Bangkok hotel gave us rice
    soup to eat. It tasted so delicious. Then we got on a plane and flew to New York. On the plane I was really tired, so
    I fell a sleep, and when I woke up I saw food on the table in front of me. Then I tried the food and it tasted disgusting.
    When we got to New York, we got on another plane and flew to Georgia. We landed in Hartsfield Jackson Atlanta International
    Airport. When we got off the plane we saw our caseworker. She took us to our apartment. It was so big. While I was there
    in Georgia I was really happy that we got to live in a big apartment that was made out of strong brick instead of bamboo
    and leaves. Inside of our apartment there were 3 big rooms and in the fridge there was fried rice and chicken wings. After
    living in Georgia for 3 years my mom decided to move to Minnesota because we don'thave good medication in Georgia. Now
    in Minnesota I have a good opportunity to get education and have a better life.
