collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: Garage to send a wrecker out to tow me in, and while we were waiting, I turned on the radio. They were announcing
    that Pearl Harbor had been bombed.
- speaker: Respondent
  text: Soon all the guys were being drafted, and everyone in Sparks knew when your number was up. One Friday Chick Gazin,
    the head of the draft board, told me, "Well, you'll be gone Monday."
- speaker: Respondent
  text: '"Oh, yeah," I said. "I''ll be gone." I didn''t tell him I had already enlisted in the Navy Air Corps.'
- speaker: Respondent
  text: Like a couple of my buddies, I had gone over to Sacramento to join the Army Air Force; unlike them, I flunked the
    written test. I didn't even get to take the physical! [laughter] So I decided to go Navy, and I just took a train on down
    to San Francisco.
- speaker: Respondent
  text: The Navy aviation selection board was in the Ferry Building, right there on the bay. I go up to the second floor and
    take the written exam, and I ace it.
- speaker: Respondent
  text: Then they start to give me a physical, and the corpsman says, "You know, if you're five-foot-nine, you've got to weigh
    a hundred and twenty-two pounds; and you only weigh a hundred and twenty-one... And I thought, "Jesus, I'm dying."
- speaker: Respondent
  text: '"Look," he said, "a street car stops out front. It will take you to Ninth Street, where there''s a big grocery store.
    Go in and buy two quarts of milk and six bananas. At fifteen minutes to one, get on the first street car coming back down
    to the Ferry Building, and eat those bananas and drink that milk. When you get off, come straight upstairs and I''ll weigh
    you."'
- speaker: Respondent
  text: I did what he told me; and when I got on the scales, he said, "You weigh a hundred and twenty-two and a half. You're
    in!"
- speaker: Respondent
  text: Not quite. The physical also revealed that I needed surgery to correct a problem with breathing through my nose. So
    the Navy gave me a deferment, and I got my nose taken care of in Reno; and three months later, back in San Francisco again,
    I enlisted. We all stood and raised our right hands and took the oath and joined the Navy.
- speaker: Respondent
  text: Going into the war, the Navy had thought they might lose as many as twenty-five thousand pilots. When they found out
    that they were going to lose closer to twenty-five hundred, they stretched flight training out, and gave us more and more
    classes, and made the experience more and more difficult. I went through twenty-six months of this! They kept saying that
    the pilots they were producing were going to be better trained, better qualified than the guys who were already out there;
    but in the end they never needed most of us.
- speaker: Respondent
  text: For me, training began in the spring of 1943 with Flight Preparatory School at Cal Poly in San Luis Obispo. Four hundred
    of us were in this program, which gave us three hours of physical training a day and five hours of academics. We were
    the first to enter it. Before, cadets had gone straight to Pre-flight, and then into flying. Preparatory added six months
    to your training, and it enabled the Navy to stockpile large numbers of aviation cadets.
- speaker: Respondent
  text: 'So many fresh recruits were coming in that they didn''t have enough uniforms for us. We would wear slacks and sweaters
    into town on Sunday to see a movie, and the soldiers from the fort would taunt us: "Draft dodger! What''s the matter with
    you, pal? Chicken shit?" [laughter] And there''s nothing we can do: no matter what we tell them, they ain''t going to
    believe us.'
- speaker: Respondent
  text: After preparatory training I was in a group that was sent to Ely, Nevada, if you can believe that! We took the Southern
    Pacific to Cobre, where we got off and waited for hours on the station platform until a Nevada Northern passenger train
    came up to take us down to Ely. We trained there for about three months, and the situation was pretty relaxed... not much
    discipline. For a uniform we were issued some "pinks" - khaki pants that they had probably bought at Penney's or something.
    I mean, they just handed them to you and you wore them, and you wore a black tie.
- speaker: Respondent
  text: The Navy had contracted with a guy named Kokendorfer to provide the flying service. He owned the airplanes, which
    were Piper Cubs, and he hired the instructors who taught us to fly. In addition to flight training, we learned aircraft
    recognition and "essentials of Naval service," navigation, math, physics... Our physical training was led by an old athletic
    director at Ely High School named Dan Bledsoe. Hungry Dan... [laughter] At the University of Nevada he had been an outstanding
    high jumper.
- speaker: Respondent
  text: We lived in a beat-up old CCC barracks that had been relocated to the field, and there were communal showers and a
    mess hall. A Chinaman named Sim Tom, who owned a restaurant in town, ran the mess hall and gave us our meals. And there
    was a little recreation area that had a juke box big as a piano. Jesus, I will never forget it, because they played the
    tune so many times - Vaughn Monroe singing "Fly Me to the Moon." All night, every night, [laughter]
- speaker: Respondent
  text: At Ely I learned to fly an airplane. Before taking me up for the first time, my instructor asked, "What do you know
    about flying?"
- speaker: Respondent
  text: '"I''ve never been in an airplane," I said.'
- speaker: Respondent
  text: 'He just looked at me: "You''ve got to be kidding. How did you get here?"'
- speaker: Respondent
  text: My instructor was a guy named Marty Kromberg. (After the war he started an agricultural flight training school out
    at Stead, and then he had one at Minden.) Kromberg was a great instructor, and I naturally took to flying. After only
    four hours of instruction he told me, "You could solo now, but they won't let you." In those days you were expected to
    solo at eight hours. If you didn't, you might get what they called "captain's time." You'd be put with your instructor
    for two more hours; and then you soloed, or you were gone.
- speaker: Respondent
  text: My day to solo finally came. Kromberg told me, "Now you're going up by yourself. No problem. Just remember that I'm
    180 pounds that won't be in the airplane this time. It's going to take off quicker and land slower. Don't panic when it
    doesn't want to land!" [laughter]
- speaker: Respondent
  text: I looked around. I wasn't used to that front seat, you know, and I looked around the cockpit; and then I look out
    and I can see the instructors standing down there, waiting, watching me. Oh, God! So I give it the gun, and up I go and
    make the turns, and I finally get lined up with the runway and start down,
- speaker: Respondent
  text: and all of a sudden it was like I had forgotten everything I knew... Just bring it down on instinct and land the thing
    in a daze, and they come over and shake my hand through the open side-screen, and then I taxi the plane up to the hangar.
- speaker: Respondent
  text: A bunch of cadets was standing around, and Marty yelled, "He just soloed!" They ran over laughing and shouting, pulled
    me from the airplane and carried me across the runway to a fifty-gallon drum filled with water, where they dunked me.
    I was elated, but I didn't go out and celebrate. It was just that....
- speaker: Respondent
  text: 'You know, there''s something that goes on in a war. During World War II, the military couldn''t handle the sheer
    volume of enlistees. Everyone wanted to go. We were mad: we were mad at the Germans; we were mad at the Japanese; we were
    just pissed off! A strange, exciting time, but.... December 8, Monday morning after Pearl Harbor, Benny Garrett and Bill
    Blake had enlisted in the Army Air Corps. Suddenly these buddies, two of my best friends, were gone, on their way; and
    both of them got killed. Screw it.'
- speaker: Respondent
  text: After soloing, I stayed on Piper Cubs for another sixty-five, seventy hours. Now we were doing more precise things.
    The instructors didn't say this, but they were really trying to teach us that an airplane was built to fly, and if you
    leave it alone it does a pretty good job all by itself. But you have to make it go where you want it to go. They'd put
    you in across-wind situation and say, "Go down that road." And to do it, you're just crabbing along, almost flying the
    thing sideways.
- speaker: Respondent
  text: We got to be pretty good fliers. They told us we couldn't do acrobatics in those Piper Cubs, but we'd take them up
    behind Mt. Wheeler where they couldn't see us, and loop them and roll them and do all sorts of things, [laughter] Still,
    we were just beginners. Over in Tonopah the Army had a squadron of pilots training on P-39s, which were some airplanes
    in those days. They'd fly over to Ely and buzz our field before landing, and then get out and strut around, you know.
    We thought, "Oh, Jesus. Look at this."
- speaker: Respondent
  text: Our field was sixty-two hundred feet above sea level, and the performance of our Cubs was limited - they only had
    little four-cylinder, seventy-five horsepower Continental engines, which were breathing hard at that altitude. Climbing
    took time - lots of it. [laughter] If you were going to practice spins, you took off and climbed for an hour; and then,
    right over the airport, you spun your plane and landed it.
- speaker: Respondent
  text: Ely's elevation was so high that in the heat of the day the air wasn't thick enough to get much lift off the wings
    of an airplane. So we'd get up at four o'clock in the morning and fly until ten, and then we'd goof around and have lunch
    before starting our ground school classes. Our flying schedule brought us up against a Navy rule that aviation cadets
    had to have eight hours sleep each night. For us to get eight hours, we had to be in bed by eight o'clock... and hell,
    there'd still be two hours of light left! So the guys would lie there in bed, and laugh and joke and talk. No sleeping,
    but we were in bed.
- speaker: Respondent
  text: Sometimes for fun we'd chase jackrabbits at night. Twenty guys, each with a stick in his hand, would spread out in
    a line, and we'd run down a jackrabbit in about two minutes. They won't run straight; if they did, you couldn't catch
    one. But they'd go to zig-zagging, and when one cut away from you, it'd run right into another guy.
- speaker: Respondent
  text: Weekends, most of us would go into town, but a couple of our instructors were from Reno, and they'd sometimes fly
    their planes home. Two of my friends flew back with them once - at Eureka they landed on the highway and taxied up to
    the gas station, filled up, took off, and flew on to Reno. As for me, my Aunt Vega lived in Ely, and I was a pretty steady
    boarder at her place on Saturdays and Sundays. She was always having a bunch of us in for meals, and we'd do our drinking
    in a bar across the street from the Nevada Hotel. Up the road, McGill was the site of a huge copper smelter, and a big
    copper pit mine was just a few miles out of town to the west, at Ruth. Ely was the county seat, but it was really a miner's
    town, just as wide open as you can get. Weekends were fun.
- speaker: Respondent
  text: We had about eighty-five hours in Cubs, and then things got serious. After three months training as aviation cadets
    at Ely, we were sent to St. Mary's College in Moraga, California, for what the Navy was then calling Pre-flight. Eighteen
    months later, following training at bases in California, Kansas, Illinois, Texas, and Florida, I returned to Nevada as
    a torpedo bomber pilot.
- speaker: Respondent
  text: When I had graduated from flight school at Corpus Christi, I had thought I was going to fly fighter planes. But I
    looked at my orders, and I was assigned to the naval air station at Fort Lauderdale, Florida, for torpedo bomber training.
    There I qualified in the massive TBM Avenger, a powerful single-engined torpedo bomber that was fast and stable at low
    altitudes, but had heavy controls. Even though it flew like a truck, it was a very effective airplane. At last I felt
    that I was getting close to going to war.
- speaker: Respondent
  text: Towards the end of 1944, after qualifying on the TBM, I was transferred into CASU-6, which was stationed at Alameda,
    California. CASU stood for Carrier Air Service Unit - pilots were attached to it pending assignment to an air group. One
    afternoon early in 1945 my roommate Skinner tells me, "We got assigned to Air Group 13. It's been to sea once, and now
    we're going to join it for regrouping and additional training at some goddamned place called Fallon, Nevada. Have you
    ever heard of it?"
- speaker: Respondent
  text: I said, "That's only sixty miles from home."
- speaker: Respondent
  text: When we got to Fallon we really went huckley-buckley; we got with it; we knew we were going overseas from there, and
    it wouldn't be long. I was giving my all, and it paid off. When you regroup, each squadron leader flies with all his young
    pilots to decide who's going to be his wing man, and the skipper of my squadron, a guy named Ben Williams, picked me.
    I felt honored. It was quite a deal.
- speaker: Respondent
  text: Much of our time at Fallon was spent practicing bombing and torpedo runs. For torpedo practice we were using Pyramid
    Lake, which is on a Paiute Indian reservation and is fished by them. Their presence didn't matter. Hell, we were at war!
    There wasn't any of the commotion you'd have today... I mean, if we wanted to use their lake, go get it. Right? But our
    torpedo runs were done from the center of the lake north, to stay well clear of the town of Nixon down on the southern
    shore.
- speaker: Respondent
  text: 'Our practice runs served a dual purpose: When you dropped a torpedo in combat in World War II, it wasn''t on its
    maiden voyage; it had had ten drops before it ever got there. This was because early in the war the Navy had a lot of
    trouble with torpedoes. After they were launched they''d go straight to the bottom, or they''d surface and run erratically;
    one submarine even sunk itself. To get the bugs out of the things before they were sent to the fleet, the Navy began having
    each torpedo dropped nine times, with factory overhauls after the third, sixth, and ninth drops. If a torpedo was still
    running hot, straight, and normal, it was then sent to ordnance, filled full of torpex, and taken out to the fleet.'
- speaker: Respondent
  text: For practice drops, our torpedoes ran with only half a charge of alcohol fuel in their engines, and in place of the
    explosive torpex warhead, they carried water with dye marker in their noses. A little pump forced the dye out as the torpedo
    was running. We would zoom down over the mountains ringing Pyramid Lake, put our Avengers right on the water, and thunder
    in toward the target - a three-hundred foot line between a boat and the buoy it was to wing. (Three hundred feet was equivalent
    to the length of a destroyer.) We'd make our drops and climb out of there, while observers watched to see where our torpedoes
    ran - whether they were hits or misses. And we had to practice coming in at different angles.
- speaker: Respondent
  text: When a torpedo ran out of alcohol, it would surface, blowing out the remaining water and dye marker. That made it
    buoyant enough so that its nose, which was painted yellow, bobbed up out of the water. The boat would retrieve the spent
    torpedoes and return them to shore to be sent back to our base for refueling and rearming.
- speaker: Respondent
  text: 'One day after we''d dropped our stuff on the lake, we flew back to Fallon and encountered a snow storm right over
    the base. The air officer radioed us, "Go out ten or twelve miles. There''s a big dry lake out there. Land on it. And,"
    he said, "I''m going to repeat this three times: Land with your wheels down; wheels down; wheels down!" [laughter] We
    flew out and put down on the playa, and sat in the desert silence for a couple of hours. There was no storm or anything
    out'
