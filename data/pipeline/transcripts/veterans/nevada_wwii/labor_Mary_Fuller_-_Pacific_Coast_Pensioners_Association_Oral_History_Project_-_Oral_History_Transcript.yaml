collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Interviewer
  text: Mary, can you tell me when you were born and where you were born?
- speaker: Respondent
  text: I was born in Seattle, Washington, September 18, 1952.
- speaker: Interviewer
  text: Is today your birthday?
- speaker: Respondent
  text: Today is my birthday.
- speaker: Interviewer
  text: Happy birthday. That's great.
- speaker: Interviewer
  text: Where did your parents come from? Tell me something about your parents' background.
- speaker: Respondent
  text: My parents are both from Canada. They migrated down here, or came down, in 1951. I have two older sisters and an older
    brother who are Canadian, but they have since taken their papers out and they're U.S. citizens, and then a younger brother
    and sister who were born down here in the U.S. with me.
- speaker: Interviewer
  text: How come they came down here from Canada?
- speaker: Respondent
  text: I think work opportunity. They both were in the military, the Canadian Air Force. My dad was an electronic technician
    and I think it was a better work opportunity down here.
- speaker: Interviewer
  text: But if he was in the Canadian military, how could he just come down here?
- speaker: Respondent
  text: When he got out of the military, when they both got out, when they were both discharged.
- speaker: Interviewer
  text: So, they were a military family. Were they politically involved in any way, or interested?
- speaker: Respondent
  text: I don't think so. I don't know for sure, but I don't think so.
- speaker: Interviewer
  text: Unions at all?
- speaker: Respondent
  text: No. I believe I probably am the first in a union. Since then my brothers were in unions, and my sister was in a union,
    but not as strong as the ILWU.
- speaker: Interviewer
  text: Where is it that they settled in Seattle?
- speaker: Respondent
  text: In north Seattle, in Shoreline. That's where I grew up is Shoreline.
- speaker: Interviewer
  text: What's it like growing up in the 50s and 60s in Shoreline?
- speaker: Respondent
  text: Well . . . very white. [chuckles] There wasn't a lot of racial mix up there. Just a Leave-It-to-Beaver-type family.
    Went to school, came home. Dad had a piano. He used to play the piano and we'd sing around the piano. It was a very good
    upbringing. Six kids in the family, so we had a lot of people to play with.
- speaker: Interviewer
  text: And your dad was doing electronics?
- speaker: Respondent
  text: Yes, he was an electronic technician.
- speaker: Interviewer
  text: What was your schooling like?
- speaker: Respondent
  text: Well, I went to school in Shoreline there and high school, Shoreline High School. Typical public school. I graduated
    and went to a couple years [of] college, but never graduated college. I went to work.
- speaker: Interviewer
  text: Where did you go to college?
- speaker: Respondent
  text: Shoreline Community College.
- speaker: Interviewer
  text: What kind of work did you do before you came into the ILWU?
- speaker: Respondent
  text: After I graduated, I got hired by Mitsui O.S.K. Lines, and I worked for Mitsui O.S.K. Lines for about four years.
    I used to work directly with the Port of Seattle, the people in the Port of Seattle, and one of the bosses at the Port
    of Seattle, Frank Clark, was going to hire some people, and he told me, "Mary, put your application in." So, I did, and
    I went to work for the Port of Seattle. I think it was about eight years at the Port of Seattle, something like that,
    when in 1980, they opened up for women to become longshoremen.
- speaker: Interviewer
  text: What did you do for the Port of Seattle?
- speaker: Respondent
  text: I worked in a warehouse. I worked directly with the longshoremen and with the clerks. I was the one that got all their
    paperwork ready for them. And I worked with Customs. I was kind of the go-between between the longshoremen and Customs
    or the clerks and Customs. When they had to take women in 1980, the guys - and I feel real good about this - some of the
    guys came to me and said, "Mary, put your application in." So, I did, and when I got interviewed, the guy from the PMA
    [Pacific Maritime Association] and the guy from the union - the guy from the PMA really didn't say anything. It was [Joe?]
    Weber. I don't know if you know who Weber is. But the guy from the union, he just looked at me and he says, "Do you think
    you can do the job?" And all I told him is, "I'll give it 110 percent. I'll do everything I can." He says, "Okay."
