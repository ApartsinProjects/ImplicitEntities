collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: Oh, God, boot camp was like walking right off this planet! The ordeal was just never-ending, and you were in absolute
    fear of your life the whole time. You bitched to your buddies at night, but you didn't complain to anybody else; you just
    did it, no matter what. You were afraid to fail - absolutely a deathly fear of not making it, not getting through with
    the platoon. Oh, that was awful to think about, so everybody helped each other and it ended up being a great time.
- speaker: Respondent
  text: Boot camp is an experience that no Marine ever forgets, and most Marines never forget their drill instructors - they
    were getting us ready to go fight a war after just eight weeks at boot camp. A lot of our drill instructors had been on
    Guadalcanal, and they would tell you sea stories that would curl your hair. I thought, "Oh, geez, just... I can't wait,
    can't wait, can't wait! Give me my rifle. Let me go!" The physical demands didn't bother me so much, but the mental aspect
    got to you, you know. There was absolutely no privacy at any time. You stood in line to go to the bathroom, and whether
    you were showering or going to the bathroom or in your tent or a Quonset hut, it was always with a bunch of people. It
    didn't take long to get used to that, and after a while it was OK, because all of these guys were friends - your buddies.
    But everything was huckledy-buck - like once our DIs came off liberty about half drunk, and they decided to break us all
    out and drill us for a while. They ran us around that drill field until we dropped, until they had everybody in the platoon
    sitting down or lying down or out.
- speaker: Respondent
  text: We were one of the first platoons to get an M-1 rifle, which made us all mad, because we wanted the '03. It doesn't
    take you long when you join the Marine Corps to try to get salty, which means acting like you've been in there a long
    time. Oh, we envied these guys that could talk about going through boot camp with an '03. [laughter]
- speaker: Respondent
  text: 'At the end of boot camp everybody got different assignments, and I went up to Camp Mathews because I was a good shot.
    I wound up at the rifle range as a coach for about six months. It was great duty, because you''re the boss: and it''s
    kind of fun to teach them to be good shooters. Of course, it also made a better shot out of me. Once in a while you''d
    say, "Now, wait a minute, kid. Let me show you how to do this," and you better hit what you were talking about so you
    don''t look like a dummy. Afterwards, I could do things with a rifle in the off-hand position that I would have needed
    the prone position to do a month earlier.'
- speaker: Respondent
  text: By now you had had time enough to get a little bit nervous about going into combat, wondering how you're going to
    react. While you're in boot camp, whoowee, you know, just let me at them! Once you're out, you're thinking, "Wow, maybe
    this might not be such a hot idea." [laughter]
- speaker: Respondent
  text: After Camp Mathews I was stationed at Camp Pendleton, where one of the big things to do was to steal a jeep. You could
    start one easy until the drivers started taking the rotors out of the distributor. Well, it didn't take long for somebody
    to come up with a spare rotor, [laughter] Anyway, this kid in the squad, he stole a jeep this one day and said, "Why don't
    we go hunting?" So we all grabbed our rifles and took off. Now, Camp Pendleton is a big place, and we were way back up
    in the mountains, in a meadow, and the jeep got bogged down. We couldn't get it out! We were miles from anywhere, so we
    took off hiking and finally got down to the main road through the camp at one o'clock in the morning. Here comes a jeep
    with a lieutenant in it. He loads us up and takes us in. We walk into the squad bay, and the duty corporal has already
    got a chaser waiting for us, because all three of us were supposed to go on watch at midnight. It is now about two in
    the morning and they march us straight to the brig.
- speaker: Respondent
  text: We spent Friday night, Saturday and Sunday in the brig there, and that was the toughest three days I ever spent anywhere.
    I never got beat up so much! They had guys in there for murder, desertion . . . oh, it was awful! We weren't fighting
    back; they were just beating on us. And when they weren't doing it, the guards were, [laughter] Tough brig. They'd make
    a Christian out of you in a hurry.
- speaker: Respondent
  text: 'Monday morning were standing there in front of the colonel, and he is just chewing on us something terrible. The
    worst thing he said was, "And I know what you''re doing: you''re trying to keep from going into combat with your outfit."
    "Oh, Jesus! No, Sir! No, no! We want to go! [laughter] Give us combat; don''t give us the brig!" He really nailed us to
    the wall, but he didn''t give us any more brig time. We went back to our outfit, and two days later we were aboard ship
    and shoo - gone! That''s the only time I really got in any serious trouble. I''ve been in trouble a couple other times,
    but nothing that I couldn''t handle. Nothing that hurt your career, and that was the important part.'
- speaker: Respondent
  text: When the 4th Division was all put together at Camp Pendleton, we left the United States and went directly into combat
    and made an amphibious landing in the Marshall Islands. The advance party made sure everything was set up right at Maui.
    Then the main outfit came over, and then the rear echelon came along with all of the leftovers. I wound up in the rear
    echelon, so I didn't make the landing in the Marshalls. When the division came back to Hawaii, we rejoined our companies
    and started training for Saipan and Tinian. We did it all on a daily basis - squad, platoon, company - and it all culminated
    with a big ten-day division exercise out in the field. Then we went aboard ship and let the sailors practice with us -
    get in the landing boats every day, and just circle and circle and make skirmish lines, which go toward the shore in a
    circle. We'd have to sit in those boats all day long just breathing that diesel exhaust, getting seasick.
- speaker: Respondent
  text: When we left Maui to go to Saipan, we stopped at Pearl Harbor first for a little liberty. We tied up alongside the
    Oklahoma; it was sitting on the bottom. The Arizona was behind us, and they had gangways from our ship down onto the sunken
    Oklahoma, and then from the Oklahoma over onto Ford Island. When we didn't have anything to do, we'd go down on the Oklahoma
    and climb around inside of it. In those compartments way underneath there, they'd find remains. They'd bring them up and
    put them in a cardboard ration box up on deck that had bones in it. That was really bad . . . kind of eerie, just before
    we left to go to Saipan.
- speaker: Respondent
  text: The tactics of the Japanese were to let the initial waves come in and get piled up on the beach, and then start artillery
    fire on the beach. So we landed under a lot of artillery. That's when the Marine Corps wised up to the fact that you didn't
    waste much time on the beach. Once the ramp went down on that boat, you got ashore and kept going. Our battalion was about
    maybe the seventh, eighth, or ninth wave. I was scared, but you didn't want anybody else to see your real emotions. The
    first time you go into combat, you have all of these different pictures in your mind as to what it's going to be like
    ... but you don't really know until you trip over your first dead body or hear a bullet whistle by your ear for the first
    time. Then all of a sudden you're in the real world. But you're there, and you're going to make the best of it.
- speaker: Respondent
  text: 'I had a vest that had three rows of pockets, four or five across, and you put grenades in them. It was heavy, but
    we just loved everything and would load ourselves down. Later on, you knew how much you could safely carry, but you never
    wanted to run out. Same way with water. Water discipline was a big thing in those days: it was almost a court-martial
    offense if you drank more than a canteen of water a day.'
- speaker: Respondent
  text: Going in, we dumped our packs on the beach, then picked up our rifle and ammunition and grenades and took off. Food
    and blankets - that has to come to you. And where we were, we didn't need to worry about any sleeping accommodations.
    You just lay out on the ground, slept like a baby ... I mean, if you can get sleep at all. The first few days on Saipan,
    it was so hot you could barely pick up a clod of dirt. Even the rain was warm.
- speaker: Respondent
  text: After about twenty-six days, when we had secured the island, we went up to Marpi Point at the north end of it. Here
    we saw the Japanese forces and civilians killing themselves - hundreds of them literally committing suicide. We were bivouacked
    behind a hundred-foot cliff of volcanic rock above them. Below us, the lava evened off at just above sea level, and then
    there was another little step down to sea level where the waves would wash over, just white. This lava had formed huge
    pockets, all over-grown with brush, and it had caves underneath. It was full of Japanese, just full of them. The Japanese
    army people maintained the civilians that were there, including the women and the kids and all.
- speaker: Respondent
  text: We sat there for five or six days watching bunches of people commit suicide in groups. Some people just jumped into
    the ocean - maybe twenty-five, thirty people. They'd walk out to where the surf was washing over the lava rock and get
    in a tight group. I'm assuming they were praying, because you could hear them chanting something. And then all of a sudden,
    there was a muffled kawhoom, and the surf turned red for the next half hour. They used grenades and mines and that kind
    of thing. The people on the outside edges, the concussion might have hurt them, but it didn't kill them, so they'd jump
    into the ocean. Pretty soon the water'd start running white again, and later on another group would go out there.
- speaker: Respondent
  text: 'It was weird. I didn''t really feel any sympathy for them - because they were the enemy: so, "who cared?" But we
    were trying to persuade them not to do it.'
- speaker: Respondent
  text: I mean, that was just a natural reaction for us. We were throwing cigarettes, food and water to them, and we had interpreters
    up there with bullhorns talking to them. We used a couple of captured Japanese to tell them, "Hey, I'm so and so, and
    they're treating me OK. Come on out." But we didn't save a soul - not a single person out of five or six hundred.
- speaker: Respondent
  text: 'As bad as this was, it was the tail end of the mass suicides in Saipan. There had been many, many more who had killed
    themselves off the cliff, the Regular Army guys and their families. Saipan was the first Japanese territory that we took
    during the war. Everything else up until that point we had taken back for the Dutch or the Australians or somebody: but
    on Saipan, the Japanese garrison had been there for years. The soldiers had raised their families there, and whole families
    would jump off the cliff. That happened before we got there.'
- speaker: Respondent
  text: After ... it seemed like forever, but finally there were no more. The sad part about it is that after sitting at Marpi
    Point all that time watching that mess, a couple of guys from our platoon were down there mopping up, and they were killed
    by snipers who were still back in the caves. After that, you'd hear a shot go off in the cave. The Japanese soldier had
    just shot his last Marine, and then he shot himself.
- speaker: Respondent
  text: When we finished with Marpi Point, we were thinking, "Ah, well, it's over. The flag's up, la-di-da. Gee, we're all
    finished." Instead they turn us around, and we form a skirmish line, and we walk back down the whole length of that island,
    [laughter] Mop it up some more. That gave us a chance to hunt for more souvenirs - swords and pistols.
- speaker: Respondent
  text: When I landed on Saipan I was a rifleman, and that's low man on the totem pole; but by the end of the operation I
    was a BAR man because of casualties. When a BAR man gets hit you have to take up his BAR, because it's a more important
    weapon than the M-1.
- speaker: Respondent
  text: 'On the southern end of Saipan, you look right across and see Tinian. In maybe two weeks we went aboard LSTs and landed
    on Tinian. That was a really good operation - slick, because everybody just knew what to do: I knew what you were going
    to do; you knew what I was going to do under a certain set of circumstances. It was teamwork. The Japanese probably didn''t
    think it was the Marine Corps landing; it was too well organized. (Usually we confused them, because we''d be so screwed
    up.) [laughter] We landed on two small beaches, each just wide enough for one tractor to come in at a time. They thought
    we would land on some good beaches on the other side of the island, so we didn''t have any real resistance until that
    night when they counter-attacked with tanks and artillery and mortars. But we stopped them.'
- speaker: Respondent
  text: After forty-five days of combat, our company went aboard a cargo ship rigged to carry prisoners. We took a load of
    Japanese prisoners back to Hawaii, dropped them off at Pearl Harbor, and then we went over to Maui to start training again.
    Replacements came in to build the company back up to strength. (Our company was about 125 men, but we'd get up to about
    200, because we would have heavy weapons attached to us, mortars and machine gun sections.) The replacements were just
    nobody until they'd also been shot at. It's funny how that establishes a caste system, [laughter] They bivouacked right
    across from us, and the word got around, "Well, these are your replacements."
- speaker: Respondent
  text: 'You''re looking across the street at some guy who may take your place. In the 4th Marine Division we all wore an
    insignia on our utility jackets - like a half moon with a number that represented your regiment, your battalion, your
    company, and your rank. (When you saw a person, you knew what rank he was. You didn''t want to call him a son-of-a-bitch
    if he was the colonel.) Our number was 433 - "4" meant the 24th Marine Regiment; "3" was the 3rd Battalion; and the other
    "3" was for the third company, which was "K" company: thus, K Company, 3rd Battalion, 24th Marines. The replacements had
    stenciled on their backs all except the last number, so you could pinpoint them right down to the battalion that they
    were going to, but not what company.'
- speaker: Respondent
  text: Somebody would always know someone over in division headquarters, graves registration, and before an operation, you'd
    find out how many grave markers they were making. You'd find out that they had ten thousand plaques made, and say, "Oh,
    boy, this is going to be some kind of an operation!" [laughter] When we landed on Iwo Jima, they were ready to replace
    us right away ... just had to stick another number on their backs. We ran up a 150 percent casualty rate in the first
    fifteen, twenty days. I got hit on the seventh day. I was a corporal then, and I was a fire-team leader, responsible for
    three other guys. I'm important!
- speaker: Respondent
  text: The landing wasn't much fun. That was a nasty looking island right from the beginning. When we first saw it in the
    morning, it
