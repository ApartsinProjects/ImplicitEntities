- speaker: Respondent
  text: 'UMN Immigrant Stories Collection Rodrigo Botero Ibarra [''Botero Ibarra, Rodrigo''] [''United States''] Rodrigo Botero
    Ibarra was born in Cali, Colombia in 1970. He graduated from the Universidad del Valle with a degree in to pographic engineering
    and worked as a topographic engineer and university instructor. He came to the United States in 2014 to study English
    at the University of Minnesota in the hopes of pursuing a PhD at the University. Rodrigo Botero Transcription Mi nombre
    es Rodrigo Botero. Yo soy de Cali, Colombia, es una ciudad pequeña, muy cálida. En esa ciudad yo he vivido la mayor parte
    de mi vida, toda mi vida prácticamente. Mis estudios: fui a la Universidad, la primera Universidad fue una Universidad
    privada, la universidad Javeriana yluego ingresé a la Universidad del Valle por primera vez. Me gradué en Ingeniería Topográfica
    yhice a lgunos trabajos como topógrafo, pero principalmente me desempeñaba como profesor, como docente. Luego en la Javeriana
    estoy terminando la maestría, estoy haciendo la tesis de la maestría en sistemas y computación yestoy a plicando al doctorado
    en matemáticas aquí en la Universidad de Minnesota. Bueno, hay muchos motivos, pero el principal motivo es que aquí está
    prácticamente toda la familia mía: mis hermanas, mis papas, to dos acá. Ellos querían que viniera acá, específicamente
    a Minnesota. Estoy con mi familia con mi esposa con mi hijo. Estamos viviendo con mis papas. Y porque la Universidad de
    Minnesota me ha parecido una muy buena universidad, yporque me ha gustado el a mbiente tranquilo en la ciudad. De a lguna
    manera la gente es a gradable. En verano me gusta mucho el verde. Se parece mucho a mi ciudad a Cali. Aquí en Minnesota
    estoy estudiando inglés en estos momentos, porque en el doctorado se requiere que nosotros tengamos un nivel bastante
    alto [de] inglés hablado, porque muy probablemente nos toca dar clases, a la vez que estoy esperando la respuesta de la
    aplicación del doctorado. La Universidad de Minnesota fue la primer Universidad que conocí yrealmente me gustó, me agradó
    el a mbiente, y la atención de las personas es muy diferente en mi país. Básicamente, vengo acá porque he querido a vanzar
    en mis estudios en el doctorado. En Colombia tenemos doctorado pero digamos que en el caso mío a mí se me han cerrado
    las puertas, básicamente por la edad, porque ya tengo 45 años y en Colombia pensar en un doctorado en matemáticas a los
    45 años, no. La gente dice que no. Todo mundo dice que no. En Colombia de to das maneras hay muchos problemas con el conocimiento,
    con las personas que manejan el conocimiento. Hay muchas dificultades. Y aquí está la investigación de punta, aquí está
    el conocimiento, aquí la gente no tiene problemas con nada. En el futuro yo planeo regresar a Colombia, hasta a hora ese
    es mi plan. Las oportunidades de trabajo para un doctorado, para una persona como yo, son bastante buenas, son bastante
    a mplias, me gustaría regresar ytrabajar en investigación. Muchas gracias. Translation My name is Rodrigo Botero. I''m
    from Cali, Colombia. It is a small city, very warm. I lived there almost all my life. My education: the first university
    I went to was a private one, the Universidad Javeriana. Then I entered the Universidad del Valle for the first time. I
    graduated with a major in to pographic engineering. I worked a little as a topographer, but mostly I worked as a teacher
    and university instructor. I''m finishing my master''s degree at the Universidad Javeriana. I''m working on my thesis
    in computer systems, and I''m applying to the PhD program in mathematics here at the University of Minnesota. There are
    a lot of reasons but the main reason is that almost all my family is here: my sisters, my parents, everyone is here. They
    wanted me to come to Minnesota. I came with my family: my wife, my son. We are living with my parents. Another reason
    is because the University of Minnesota seems like a great school and because I like the peaceful environment of the city.
    The people here a revery kind. In the summer, I like all the green a lot. It''s very much like my city, Cali. Here in
    Minnesota, I''m studying English because the PhD program requires us to have a very high level of spoken English because
    we would have to teach. In the meantime, I''m waiting for a decision on my PhD application. The University of Minnesota
    was the first university that I got to know and like. I liked the environment, the people. It''s very different from my
    country. I have come here to continue my studies and get a PhD. In Colombia we have PhD programs, but in my case, the
    doors are closed for me because of my age. I''m 45 now, and in Colombia getting a PhD in mathematics at 45 is unthinkable.
    Everyone says no. In Colombia, there are a lot of problems with knowledge and with the people who control it. There are
    lots of problems. Besides, here there is cutting-edge research, expertise; here people do not have problems of any kind.
    In the future, I would like to go back to Colombia. That''s my plan. There are good job opportunities with a PhD. I would
    like to go back and work in research. Thank you very much.'
