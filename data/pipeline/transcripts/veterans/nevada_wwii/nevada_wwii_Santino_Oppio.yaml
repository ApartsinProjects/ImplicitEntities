collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: We knocked out a Messerschmitt, shot it down - that was quite an incident, shooting an airplane down with a rifle.
    We also hit the pilot in the leg.
- speaker: Respondent
  text: When the plane was hit, it made a circle and came back. The pilot didn't even put the wheels down - he belly landed.
- speaker: Respondent
  text: 'One time I jumped in my foxhole and there was a dead German in it, but I never killed anybody. Let''s put it this
    way: the enemy''s hiding, too; if you see someone, he''s hiding and you''re hiding. The only people that actually kill
    are those who ....'
- speaker: Respondent
  text: On the bank of the Volturno River there were Germans firing at us, but it was so pitch dark they were just firing
    their machine guns hoping to hit something. I've heard bullets come pretty close, but I never got hit. I was on the ground
    all the time. I'm looking for who's out there and for something to protect me.
- speaker: Respondent
  text: North of Nuremberg we were walking through the streets, and from the corner of my eye I noticed movement behind us.
    I turned around and there was a guy who was going to throw a grenade at us, one of those German grenades with a handle.
    We captured him. He was happy too - he didn't have to fight any more wars.
- speaker: Respondent
  text: I was in there all the way, all the way. Nobody ever told me, "Hey, your turn to go home. Pack your bag and go." Nobody
    ever came over for me.
- speaker: Respondent
  text: War doesn't make any sense. I'm fighting because some politician told me I had to go in the Army and I had to fight
    - that's all it is. The more war is around you, the less you care. A guy gets killed, and he is just a guy; if you don't
    know him, you go on about your business. There is no connection. It's ugly.
- speaker: Respondent
  text: When I got home I forgot the war. It died, and I forgot it. Nobody listened to me, nobody . . . they didn't give a
    damn. They're just damn glad it's over with, and that's the way I feel. But it's of value for younger people to understand
    what the war was all about - if people will listen, it does a lot to prevent war. I don't want to see any more war. I
    hate it.
