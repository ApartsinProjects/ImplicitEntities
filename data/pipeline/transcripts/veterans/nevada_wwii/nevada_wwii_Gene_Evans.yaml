collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: I FELT LIKE PART OF THE NAVY FAMILY and would have gotten an appointment to the Academy except for one thing - I couldn't
    be accepted because I had, quote, "a facial defect." Eventually, I decided to try to become a pilot in the Army Air Corps.
    For this I needed two years of college, so in 1940 I joined a friend at Washington State College in Pullman.
- speaker: Respondent
  text: I was on the football team. Whenever we returned to town from an away game, the student body came out - the bands
    were there, the cheerleaders were there, and everybody was happy whether you had won or lost. On Sunday, December 7, 1941,
    we returned to Pullman from an away game which we had lost, 7-0. When the train stopped, instead of the sound of a band
    playing, it was dead silent. Someone on the platform said, "Haven't you heard? The Japanese bombed Pearl Harbor!" I get
    goose bumps just thinking about this day. All those kids that I had gone to high school with in Annapolis had been to
    Pearl somewhere along the line. I said, "Christ, we're at war," and then it kind of hit home.
- speaker: Respondent
  text: 'The college soon became almost a ghost campus, because guys were leaving. I was in ROTC and wanted to go on to advanced
    ROTC, but I ran into the same old bugaboo, the face. Every time an Air Corps recruiter would come, I''d be the first in
    line, but I''d always get the same thing: "Hey, I''m sorry. You got a facial defect." I also got turned down by the Navy
    and the Marines. I started to get mad. I''d say, "Check with my coaches. I''m physically OK. I got 20/20 vision. Hell,
    I got great eye-hand coordination. I''m good."'
- speaker: Respondent
  text: 'I had registered for the draft and was 1 A, but my number never came up, so I wrote a letter to President Roosevelt:
    "I''ve been turned down by various branches of the service only because I have a facial defect. I had infantile paralysis,
    just as you had. You''ve gone on to become the president of our country. I just want to serve as an officer in the armed
    forces, but I can''t, and I don''t understand. Can you give me an explanation?" I got an answer back, but not from the
    president. The matter had been turned over to the surgeon general of the Navy, who sent a letter saying, "We have reviewed
    your case and find your problem is disqualifying. Thank you for your interest."'
- speaker: Respondent
  text: Now I'm really pissed! [laughter] I'm really hot. If I can't be an officer .... All I want to do is . . . get killed.
    Really. I'm going to prove to them that I'm good enough to get killed! So I joined a program called the enlisted reserve.
    In the ERC you could finish out school, and I was in the Army.
- speaker: Respondent
  text: After basic training at Camp Roberts and a stint as a corporal in the training cadre at Ft. Ord, I was sent to Hawaii
    to join I Company, 3rd Battalion, 7th Infantry Division. Shortly after I arrived we started loading up to go to Yap, a
    little island just north of Iwo Jima. About the third day at sea, we pick up a radio announcement from "Tokyo Rose," who
    was very big in the Pacific in those days. She was playing all the good music, and she had a great voice. "Aren't you
    homesick for this, boys? Why don't you tell your superior officers to let you out of there and go on home? You don't want
    to do this. And oh, you boys of the 7th Infantry, you'll like Yap. We've got a great welcoming party set for you. Unfortunately,
    a lot of you are never going home."
- speaker: Respondent
  text: '"Yap!" How in the hell? By now we''re getting goose bumps. They knew where we were going and the day we were going
    to land. They had the whole thing down, and our orders had been sealed until we got to sea. I thought, "Well, maybe I
    don''t want to die yet. Jesus Christ! I mean, give me a chance to at least get a shore and make myself known." The whole
    day, we keep getting music interspersed with these little messages from Tokyo Rose. Finally we get an order to proceed
    to Eniwetok in the Marshalls, where we have an R&R (rest and recreation) on the beach. They''ve got beer, and gosh, you
    don''t get much beer out there. All that stuff on Yap disappears, and we get in formation on the Philippines instead.'
- speaker: Respondent
  text: On October 20th we're landing on Leyte. I'm expecting to go in as bodyguard to Capt. James Parker, the company commander
    whose code name is "Swede," but instead I'm assigned to his assistant, a lieutenant whose first name is Bruno, code name
    "Bear." The first wave hits and is under fire. The second wave goes in and a couple of the landing craft get knocked out;
    one gets hit right alongside of us, and some bodies are floating around. I'm in the third wave. The ramp drops, and I
    go maybe ten feet and hit the ground, because there are mortars coming in, and they're peppering us pretty good. K Company
    has landed to my right, and by the time I get out of the way of a tank so I can see what the hell's happening, here comes
    a Nip. He's got the longest goddamned bayonet you'll ever want to see. It has to be about thirty feet long, [laughter]
    (We had stubby little suckers that didn't sparkle. Japanese bayonets were all steel, stainless looking. The sun would
    hit them and they'd glitter.) Here he's racing right at me. I know damn well he is, and I'm enthralled ... this is what
    good movies are made of, and I'm wondering what John Wayne would do.
- speaker: Respondent
  text: 'Coming up on my right is Sergeant Aspenwall from K Company - an American Indian. We just call him Chief. The Chief
    does a very classic maneuver that you''re taught in basic training: he takes his rifle and knocks the Jap''s bayonet down,
    and then swings up with his rifle butt and catches him in the face, knocks him backward, and then punches his bayonet
    into the Jap''s chest.'
- speaker: Respondent
  text: 'I said, "Damn! Chief did that by the book!" Meanwhile, I hadn''t made a move to shoot this sucker, and I could have.
    I had him in sight for thirty yards. I have thought back on it many times: why didn''t I do something? It wasn''t that
    I was frozen with fear; hell, it didn''t bother me at all. I was just... so entranced by this picture.'
- speaker: Respondent
  text: Alongside of me is a chubby little corporal, the company clerk. He was a violin virtuoso, played in the Chicago Philharmonic
    Orchestra, but now he's lying on his belly on Leyte with a carbine in his hands, and he's scared. We don't know where
    anybody is. I'm not with my platoon, I'm not with the squad, and I don't know where the officers from headquarters company
    are. This young man tags on to me, and we are alone.
- speaker: Respondent
  text: We get off the beach, and to our right is a little coconut grove surrounding a grass shack, with a little white fence
    around it. I start toward that, because there's some bullets snapping around and mortars are going off periodically. We
    come into heavy grass, maybe three feet tall, and to my left the grass starts to wiggle. I'm carrying an M-l, and I give
    it a quick burst - bam, bam, bam.
- speaker: Respondent
  text: From the grass I hear, "Oh . . . oh!" and I think, "God, I got my first Jap." Then I see what I've shot. The scared
    corporal keeps asking, "What is it? What is it?" "A fucking pig," I tell him. [laughter] I shot a pig in the grass.
- speaker: Respondent
  text: We start moving again, looking for our company, walking along very gingerly and kind of crouched, and suddenly I fall
    down a well. I look up and here's the corporal sitting on the side looking down at me. It seemed like a lifetime, but
    in four or five minutes another figure appears looking down at me. It's Bear, and he says, "What the hell you doing down
    there, Evans?"
- speaker: Respondent
  text: It was very, very hot, and we were all soaking wet from perspiration. I said, He says, "Well, the war is up here!"
    I said, "Good. Let it stay." [laughter] God, we had this whole conversation before he finally helps me up and out.
- speaker: Respondent
  text: We find our outfit, or the remnants of the right flank of it, and they're pinned down in a swamp by machine gun fire
    coming out of a grove of banana trees. We lie down in the muck, and I'm crawling, when one of the soldiers gets bit by
    a snake. Well, I get up and start running, because I've always been afraid of snakes. Everybody thinks I'm making an assault,
    so the whole damn outfit gets up and starts running, and they take this airfield. I'm still kind of on my own, away from
    all of this. Nobody really cares about me, and that's OK, because I'm not with any squad; I'm not with a platoon; I'm
    with the company commander, and I don't know where in the hell he is. And he's not that anxious to find out where I am,
    either.
- speaker: Respondent
  text: That night I dig in alongside a dirt road. I've already dug about a foot down when here comes Bear again, so I have
    to dig the hole a little wider. The corporal has dug himself a little slit trench. About midnight or one o'clock, here
    come Japanese tanks down this road. The lead tank has infantry riding on its back. We start firing at them, and their
    machine gun starts spraying the area. As they go past me, just a few feet away, a bazooka nails the tank in the rear.
    The thing bursts into flames immediately and, Christ, Japs are coming off of it all over the place - just five or six,
    but it seemed like a mess of them. The hatch of the tank pops open, and a guy who had to be a Sumo wrestler comes out
    like a woman getting out of a girdle. As he gets up, he's silhouetted by the fire out of the tank, and I put a whole burst
    into him - bam, bam, bam. Let him have it good, and he flops back over the opening. There's a couple other guys inside,
    and they can't get out. You can hear them screaming, and .... One of our guys yells, "Burn, you bastards!" And they did.
    The tank burned right there, and it got so hot that I had to get out of there.
- speaker: Respondent
  text: A couple of tanks had gone on through down to the beach, and in about forty minutes, here they come back. We've got
    Japs all around us, and we have a pretty interesting evening .... We finally get it calmed down about four o'clock in
    the morning, but a couple of hours later, here come more tanks. We have a cruiser and a couple of destroyers out in the
    bay giving fire support to our unit as were moving a head, so we call for some fire on the tanks. Unfortunately, the first
    two rounds are short - they land in right amongst us. The platoon sergeant is hit. . . Carbone, big Italian guy, nice
    guy. The Navy was a little off target, and we weren't carrying flags on our helmets or anything like that. It was human
    error; it wasn't intentional. But the guys were pissed at the Navy, as they always were anytime you came under friendly
    fire.
- speaker: Respondent
  text: We get on a hill, and I finally catch up to the company commander. I'm supposed to be protecting this guy, and I think
    he should be protecting me, because he's a nut! I say, "Swede, I don't know what the hell you're trying to prove, but
    you're trying to get me killed!"
- speaker: Respondent
  text: Swede says, "Oh, hell, stay with me and we'll get through this sucker." It's a tough hill. The platoon sergeant gets
    hit; a couple of squad leaders get hit. We get blown back, and they're doing a good job on us when Bear goes berserk -
    decides he's going to take this hill alone. He starts out, saying, "The Bear's gone over the mountain!"
- speaker: Respondent
  text: Swede yells at me, "Get him, Evans!" [laughter] I jump up and make a flying tackle, like in my football days, and
    roll Bear back down the hill. We call medics in, and the next time I see him he's in a straitjacket, still saying, "The
    Bear's gone over the mountain! The Bear's gone over the mountain!" I guess they call it combat fatigue, but.... He really
    went off his rocker after just a couple of days.
- speaker: Respondent
  text: I was on Leyte from October 20 to December 8, and got hit twice. The first time was a bomb fragment in the hand. It
    was a nominal wound, but it meant a Purple Heart. Then, while we were watching the landing of the 77th Infantry at Ormoc
    on December 8th, the last battle on Leyte, I am embarrassed to say I caught a mortar fragment in my butt. They couldn't
    take it out in the field, so I was sent to a hospital in New Guinea.
- speaker: Respondent
  text: 'When I recovered enough to go back to my unit, a reinforced battalion was being put together to go to Camote, where
    the Japanese had massacred and raped and killed women, children, dogs, cats - whatever was on the island. A lieutenant
    colonel was cashiered out because he wouldn''t take us: "No, these guys just come off the line, and they need some time.
    Give them a chance; I won''t take them." They relieved him of his command, and we spent three days of just nothing but
    a solid fire fight with about five thousand Japanese. We had maybe five hundred men total. It was a hell of a battle,
    but it was a good one.'
- speaker: Respondent
  text: From there, we got the call to go to Okinawa, which was on the way to Tokyo. We landed in the middle of the island
    - two Marine divisions to our left, and two Army divisions to the right. That was Easter Sunday, 1945 . . . April Fool's
    Day. It was the easiest landing in the whole Pacific, in the whole war! The Japanese had all moved south because the Marines
    had made a feint on the southern end of the island. When we turned south, we caught the whole Japanese force. They had
    nothing but cave after cave after cave on the hills. And at Conical Hill, I got hit again.
- speaker: Respondent
  text: We had just come up to the base of it, to Rocky Crags, and I was on my knees digging in. Right behind me a guy could
    see mortar shells coming in, kind of fluttering as they come, and he yells, "Evans! Look out!" As I turn to look, the
    mortar fin hits my shoulder, glances off and kills the kid that yelled at me. Blew me over! If it had hit me in the chest,
    that would've been all she wrote. Fate or whatever caused this young boy to yell; caused me to turn to look at him; caused
    the shell to catch me with its fin. If the nose had hit my chest, it obviously would have exploded. Now, why? How do you
    answer that? I don't know. Maybe I should've got it and he should've lived.
- speaker: Respondent
  text: 'I got hit on May 8th, went to the naval hospital on Guam, and when I got back our unit already had orders for the
    invasion of Japan. Boy, was I glad that they dropped that atom bomb. Truman went miles high in my estimation. And I read
    now that it''s politically incorrect to say that the atomic bomb was a good thing. There are a hell of a lot of people
    alive today who are very thankful that that bomb was dropped, and that the second one went, too. It was a feeling of euphoria:
    "Boy, this sucker is over, and I made it!"'
- speaker: Respondent
  text: I had a problem getting out of the Army, because they couldn't find my service record. They put me in a holding company
    on Saipan for two months after I got out of the hospital. I finally got back to the headquarters company, determined to
    find my records myself. It took a company clerk just four minutes to find them, but the last entry was when I left the
    states. I had been overseas over two years and been in three operations. Every operation was a certain number of points
    - every citation, every wound, every Purple Heart was a certain number of points. I was really upset!
- speaker: Respondent
  text: And here comes a cocky master sergeant, with all the piping and the big chevrons on his shoulder, trying to call me
    a private. I offered to knock the Christ out of this guy. I said, "Well, it doesn't take a goddamn rob
