  text: UMN Immigrant Stories Collection ['United States'] Hanh Huynh was born in Vietnam in 1983. She came to the United
    States in 2012 and is a student at St. Paul College. Hanh Huynh Transcription "My Old Bracelet" My home is located in
    Vinh Long town in southern Vietnam. It is only a small town, but it is a place that gave me some specific presents such
    as the love of nature, the love of family, and the love of friendship. All of these are kept carefully in my mind until
    now. I also have an old cheap present, my old bracelet, from my grandmother. I always keep it carefully, and it had a
    special influence on my life when I came in Minnesota. My bracelet is the stone light red color. It is very old. I have
    had it about 16 years. It was a present from my grandma when I passed a high school examination with the highest score.
    It's not an expensive present, but I like so much because of its color and its meaning. Furthermore, she always helps
    the elderly, the homeless. She was always with me, gave me advice, and showed me what should I do when I had problems.
    Her behavior influenced my thinking, and my decisions in life awhenI grew up. That is the reason why I always keep my
    bracelet with me, wherever I go, and whatever I do. In 2008, I married and four years later, I came to Minnesota. At first
    living in the United States everything was so different. I felt nervous because I couldn't go anywhere by myself, or communicate
    with others in English. I also miss my home so much. At that time, my grandma phoned and convinced me not to give up.
    She said the beginning is not always easy. The more I try, the more successful I will be. Until now, I have been living
    in Minnesota for three years. I have a small happy family with my husband and my little daughter. I have also studied
    at Saint Paul College. I think it is a good chance for me to practice my English, especially to get certificate to find
    a better job in the future. Now, my grandma is too old to remember everything. I wish I had a chance to go back to my
    home to visit her. I will wear this bracelet forever even though it is old, has no value as gold or silver. It reminds
    me the love of my grandmother, and how I get faith in my life especially here in Minnesota. When I was a child, my parents
    often went far away for their work, so my grandmother took care of me. Her name is Ba Tran. She is an honest and in dependent
    person with an optimistic outlook. She never gives up and tries her best to so lve her problem.
