collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: I thought that if you're drafted, you receive basic training, you go overseas, and you're killed - one, two, three,
    four. So the urgency to join up before being drafted, have some control over your destiny, was pretty heavy. It was wintertime,
    and I drove over Donner Summit in some pretty hairy weather to enter the Navy V-5 program. In V-5 you eventually became
    a cadet and took the flying course.
- speaker: Respondent
  text: After introductory basic training at Oakland, we went to Corpus Christi, Texas, for nine months of serious flight
    training. I got along fine, except for little things. Mornings I had to wait for five guys to get ready before the six
    of us could march over to the dining hall. Well, in my mind that was ridiculous, so I got caught going over there by myself
    and got two hours on the ramp and one week's restrictions. All the guys who had committed some sort of an indiscretion
    marched back and forth behind the administration building where they had lanes, and I ran into pretty much the same guys
    all the time. You'd pass a guy going one way and say something, then you'd pass him going the other way, and he'd reply.
    You'd have a conversation, but it would move really slow and give you a lot of time to think. Even the day before I graduated
    I was marching time on the ramp.
- speaker: Respondent
  text: We all started flying the same thing, what they called N3Ns - those yellow biplanes. During basic, you flew a little
    heavier plane. We also practiced flying in a Link trainer, which is like a little plane that sits on a box. It has a deal
    that draws your course, so your instructor can see what you're doing. That was maddening mentally, because the enlisted
    men were instructors, and they didn't much care what we did. There was a lot of horsing around. You could hold the wing
    on your buddy's Link trainer, and he couldn't turn. Then there's a screw on the side to simulate rough air. You could
    unscrew that, and the thing would be bouncing around like it was in heavy wind, and guys would do that to their friends.
    You might be simulating coming in for a landing, and all of a sudden you're in a spin, [laughter]
- speaker: Respondent
  text: After that, we specialized, and I went to advanced dive bomb training. We learned that ideally you go in at seventy
    degrees, dive on the target, drop your bomb, pull out and go home. (You're supposed to pull out between two thousand and
    fifteen hundred feet, but in actual combat, when you see those little red blobs of anti-aircraft fire floating up toward
    you, you have a tendency to pull out a little early.) We were taught that when attacking a naval target, the fighters
    were supposed to go in and strafe the enemy ship's anti-aircraft emplacements. Next, we dive bombers would come in and
    give the target a hard time. Then the torpedo bombers would come in and finish it off. That was the theory. What really
    happened in combat was, the fighters didn't get the antiaircraft guys. We'd go in and have plenty of anti-aircraft to
    face. Then the poor torpedo bombers come in at a low angle to drop their torpedoes, and they got a good ration of anti-aircraft;
    fire. There was quite a difference between theory and actual practice, [laughter]
- speaker: Respondent
  text: After a year of flight training, including carrier landings on Chesapeake Bay, I went to Rhode Island and joined Bombing
    Squadron 42 aboard the U.S.S. Ranger. I was nervous and a little afraid, unsure of what it was all about. You work toward
    going with a fleet and joining a squadron, but here are a bunch of guys that have been together for ages, and you're the
    new guy. It's like kids changing schools - pretty soon you get to know some of the guys and check out in a plane, and
    then you're one of the gang.
- speaker: Respondent
  text: Our squadron had thirty planes and forty pilots, and we flew once every couple of days. In the Atlantic, we didn't
    encounter many enemies. The ship went to Newfoundland, where we flew anti-sub missions, and it was a big joke. (Some pilots
    would spot a whale, and they'd drop a depth charge; they had special designations for guys like that.) It was very boring,
    flying in a set pattern to check the area as the ship goes forward. When we weren't flying, the boredom was also pretty
    heavy; but still, you're in the game. You do things, anything to break the monotony. Once we signed all the books in the
    ship's library, "From the author to the gang on the Ranger." That took a little time, [laughter] They had phones for communication
    within the ship, so sometimes a guy would call up and say, "We got to go get the beer. The gals are bringing the sandwiches,
    and they'll be by in about a half hour." Just kidding around.
- speaker: Respondent
  text: Mail was really an important element, so I wrote to a lot of people hoping I'd get replies. I wrote to Liz (later
    my wife), Dorothy Hammer, Helen Murphy, and some of the guys I knew that were in different branches in the service. I
    also subscribed to the Carson City Daily Appeal. That went over big with those Ivy league guys from the east coast, but
    the hell with them, [laughter] You always tried to get some mail, even if it was just a letter from the American Legion
    telling you what a great deal it would be for you to join when you got out. It was mail. My mother was really heavy on
    writing, so I enjoyed that. She'd keep me up on what was happening, what some of my friends were doing, and she sent me
    gifts at Christmas.
- speaker: Respondent
  text: We had a great vacation in the Atlantic, but it was all over when we went to the Pacific. It took us six days to sail
    to Hilo, Hawaii from San Diego, where we practiced more on our new Curtiss Helldivers before we went to Saipan and picked
    up the Bunker Hill. We had to stay on Saipan for a couple of weeks, and here was a lot of drinking going on. We would
    go to the bar, and they wouldn't sell you just one beer - it had to be a case! We'd have a table with friends and drink
    beer until it was all gone.
- speaker: Respondent
  text: On Saipan, they issued us helmets, and we lived in tents and learned how to use the water. You took a helmet full
    of water, and you have to do it in the right order or it could be unpleasant. First thing, you brush your teeth with the
    water; then you wash your face in it and shave. We were also introduced to a type of margarine that wouldn't melt. In
    the tropics, ordinary butter would be liquid, but this stuff - you could put a blow torch onto it, and it wouldn't melt,
    [laughter]
- speaker: Respondent
  text: We went into action in September, 1944. I had gone to aerial reconnaissance photo school when we were changing planes,
    so I hustled the ship's photographer and said, "Let my gunner carry a camera." He had a little gun back there that was
    about as effective as throwing rocks, but he also shot pictures. We'd get back and develop them, and they made one set
    for the ship, one for the air group, and one for me. I had some great action pictures. But one day I didn't come back,
    and when you got shot down, they just packed all your stuff and sent it to Clearfield, Utah, where they took what they
    wanted and then sent it on to your folks. They got my photos.
- speaker: Respondent
  text: One thing that really made me feel important was when I was flying anti-sub and spotted what looked like a fifty-gallon
    drum. I phoned it in, and the whole goddamned task force made a turn... and the size of that group of ships was just enormous!
    They sent a destroyer out, and it exploded the depth charge. That's about as big as a guy from Carson City can get!
- speaker: Respondent
  text: We took off in squadrons of fifteen planes, usually fighters first, and when the ships were underway in the daytime,
    fighters patrolled for any enemy. As we taxied before takeoff, if the engine didn't sound right the pilot would shut it
    down. When this happened during an attack, the pilot and the gunner would climb out of the disabled plane and they'd just
    push it over the side, because they had to get it out of the way to keep everybody coming. By the time we got up, enemy
    aircraft were practically nil; and if any did show up, the fighters were racing each other to get to them.
- speaker: Respondent
  text: My first attack, I dove on a destroyer. When I came back to the ship I told them it was a cruiser, because I didn't
    figure a destroyer could have that many guns! That's from being a new guy - you're excited like that. It seemed like we'd
    attack every weekend. You'd wake up, and the ship would be headed east, which would be away from all that crap. Saturday
    morning you'd wake up, and the ship was steaming full bore back toward the Philippines for another attack.
- speaker: Respondent
  text: When I looked around the ready room after each attack, I'd see we'd lost a couple of guys. I'm an odds player, and
    I didn't like the odds. I figured, "Hell, maybe in twenty days, it will be all new faces in here." Well, it didn't work
    quite that way, because the new guys would get shot down, too. Chester Knozek, my gunner, and I didn't fly too many missions
    together - I'd say five - because they hit me early. It was a standard deal. There were ships in Manila Bay, and we dove
    on shipping. About half way down I got hit at about five thousand feet. I was coming down at a seventy degree angle...
    supposedly seventy. (It's never seventy; if the wind's right, it can be ninety.) I got hit in the wing, and I took one
    underneath the engine, but I continued with my dive. I thought, "Those dirty .... I'm going to do it to somebody." I dropped
    my bomb, but there was a little fire burning over where they had punctured my gas tank, and the controls weren't quite
    right; you can tell.
- speaker: Respondent
  text: 'I pulled out at about two thousand, and something hot came up and hit me in the face. I called back, "It''s getting
    too hot in here. Let''s go over the side." Hell, I looked back, and Chester was already gone, [laughter] He must have
    been sitting there with one foot on the edge. They say dive toward the wing, but it looks like you''re going to run right
    into the tail. The directions the Navy gave you amounted to some pipe dream from an intelligence officer in Washington:
    they sounded great, but in actual practice, man, you''re busy and you''re going down pretty fast. I unhooked my safety
    belt, and all I had to do was stand up and I was gone.'
- speaker: Respondent
  text: They always said to have your parachute straps tight, which I never did, because my back got to hurting toward the
    end of a flight and I'd be squirming around a lot. They also said, "What you do after you hit the water is open this thing
    and undo the legs, and sit there, and then you pop your Mae West," but I popped my Mae West before I hit the water. We
    never had any training with the parachute at all, except to pull that thing.
- speaker: Respondent
  text: The pilot had a rubber raft as part of his parachute pack. The gunner didn't have anything, because he had to get
    out past his gun. So we had a one-man raft, me and Chester. I was heavier, so after I collected him I sat in the back,
    and he sat leaning up against me. The Japs put out small boats to pick us up, but every time they put out a boat, our
    fighters would come in and strafe it. They tried twice, and then they quit. Meantime, we were floating toward the mouth
    of Manila Bay. I was glad to be alive and on the water, but I also felt it was a hell of a long ways from Carson City,
    and I'd be lucky if I ever got back.
- speaker: Respondent
  text: We were not looking at the big picture, just doing what we had to do in order to survive at this instant right here.
    Seaweed was floating all over from the bombing attack, and we pulled some over our yellow raft. A snake curled out of
    the seaweed, so we both tucked our pants in our socks and continued on. [laughter] We had no food, but we did have water
    which we were using very sparingly, because the water cans were only half full. And since we didn't have any cigarettes,
    I thought this was a great opportunity for me to quit smoking, [laughter] The weather was beautiful, just perfect, clear.
    I got so sunburned... even my eyelids. Every place that salt water rubbed against my skin got a sore, like my pant legs
    rubbing up against my leg.
- speaker: Respondent
  text: We were at the mercy of the tides. We took turns rowing with the paddles, but we floated past Corregidor and out into
    the China Sea. We headed southwest toward another island. We thought the best bet was to get the hell away from Luzon,
    because our intelligence guys had said it was just lousy with Japs. When we'd take a break, we had a blue tarp we could
    pull over the raft, so it wouldn't be too obvious.
- speaker: Respondent
  text: We floated for two days and two nights. Suddenly, in the middle of the third afternoon, some kind of fish came up
    and cut big holes in the bottom of our raft. I hit it with my fist, but by then the goddamned holes were in the raft,
    and then we were swimming. We lost our pistols; I had a thirty-eight. It was a long ways to shore, but we had our Mae
    Wests on, and we swam until after dark and finally made land. When we got close to land, we agreed to be quiet and go
    in, because we didn't know whether we were going into a Jap camp or what. That's the last I saw of Chester until Hawaii,
    because he swam into a different inlet than I did. Later, he said he looked all over hell for me, and I looked all over
    for him, because, man... this is a time when you really need company!
- speaker: Respondent
  text: That night I pulled up on the beach and emptied my shoes, took off my Mae West and kind of half-heartedly buried it.
    I was getting a little goofy. It's night, and it's dark, and when I look up at the sky, I see spotlights in a lattice-work
    pattern. Then some guy from my squadron comes down and says, "The BOQ is up on the hill. They haven't finished it yet,
    but it isn't bad." I was seeing things, so I just crapped out on the beach and slept.
- speaker: Respondent
  text: 'In the morning, I saw the beach was deserted. I looked around for Chester, but I didn''t think of going beyond the
    other edge of this little rang beach, as the Filipinos called it. I climbed to the top of the hill, and it was all jungle
    as far as I could see, so I went back down to the beach; and now I''m getting thirsty, because there''s no water. That
    thirst gets to you. I didn''t miss the food, but man, that thirst was... In the survival book, it said go at least fifteen
    feet above the high water mark and dig a well: "The water will be brackish, but it will be OK." So I dug a well and drank
    some of the water. Then I threw up. I drank some more, and threw up a second time. This time there was a little blood
    in it, so I decided that water wasn''t quite what we''d been looking for, and I tried chewing on roots. That''s damn unsatisfying,
    and by now I was one thirsty customer.'
- speaker: Respondent
  text: Some Filipinos went by in a boat, spotted me and pulled in on shore. By now I'm spooky, so I ran up this little creek
    bed and ducked off to one side in the heavy jungle. These guys weren't very good at tracking, and they went straight up
    that little creek bed. [laughter] They were hollering, "Hey, American!" The guys in suits and the guys that were rowing
    were raising their hands with fingers extended, and I thought, "Jesus, those guys are flipping me off! This is bad news."
    [laughter] I found out late
