  text: 'UMN Immigrant Stories Collection Archanaa Suntharalingam Archanaa Suntharalingam was born in Malaysia in 1995. She
    grew up in Kuala Lumpur and came to the United States in 2016 to study at the University of Minnesota. file:///F/Immigrant%20Stories%20Transfer/Suntharalingam,%20Archanaa/Archanaa%20Suntharalingam%20Transcription.txt[7/6/2017
    2:48:37 PM] Hi. I am Archanaa Suntharalingam and I am a proud Malaysian. When I came to the United States in 2016 to study
    at the University of Minnesota, I learned how important language has shaped my identity. As I got connected at the school,
    I found myself speaking one type of English to my American friends and another type of English to my Malaysian friends.
    And I guess, this is because I can speak a different dialect of English: Malaysian English. English has been expanded
    and enriched by the many cultures living in Malaysia, which are Malay, Chinese and Indian. The Malaysian English dialect
    is manifested in a unique speech rhythm, pronunciation, and by the creation of new words. These new words are combinations
    of words from our Mother tongues. People from Chinese communities speak Mandarin, and Hokkien, a mong other Chinese dialects,
    and people from Indian communities, like my family, speak Tamil, a mong other Indian dialects. In school, the national
    language, Malay, and British English are taught and spoken equally throughout the years. But a mong my friends in Malaysia,
    we speak Malaysian English to each other. I grew up mostly speaking English to my friends because I am from a large city,
    Kuala Lumpur. However, English use in so cial settings is less prevalent in rural areas. An example of a Malaysian English
    phrase is Abuden. This is a typical Malaysian response to an obvious question. For example, I told a friend I would keep
    her cat while she went on vacation, but I didn''trealise I would have to feed the cat. My friend replies: Abuden? Did
    you expect the cat to go look for food on its own? Abuden means "What else did you expect?" or "Wasn''tthat obvious?"
    Although it is difficult to track down the origins of words, some say the origin of this expression is a combination of
    the word ''ah boh'' from a Chinese dialect, Hokkien, which directly translates to ''if not'' and the English word, then.
    And there''s a whole list of other words that we have created like: Potong stim [killjoy], Fuyoh [wow], Rempit [motorcyclist],
    pokai [broke/out of $$]. Now that live in the U.S. I rarely use Malaysian English, and it only comes out when I am spending
    time with my Malaysian friends. Often, the test of being a successful immigrant in United States society is speaking English
    well. And some may argue that "Malaysian English" is imperfect English, but I would say that it is a valid variation of
    English. Just as British English was changed by the people in the United States to American English, so too did Malaysians
    create their own unique dialect of English. In the beginning stages of the United States, their English was viewed as
    in ferior to British English. But over time it has gained legitimacy and wide spread use. Although Malaysian English is
    not as established or well-known, it is the product and manifestation of the many cultures present in my home country,
    and in that way that we have taken English and made it our own.'
