collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: 'Veterans of the Civil Rights Movement -- Interview with Quinton Baker Interview: Quinton E. Baker February 23, 2002
    Re: Being a gay Black man active in the Chapel Hill NC Civil Rights Movement Originally published by Southern Oral History
    Program in Documenting the American South, University Library, The University of North Carolina at Chapel Hill (see citation,
    for details). Interview Participants: Quinton E. Baker, interviewee Chris McGinnis, interviewer [START OF TAPE 1, SIDE
    A] McGinnis: Hello, this is Chris McGinnis, today, is Saturday, February 23, and I am in terviewing Mr. Quinton Baker
    at his home in Hillsborough, North Carolina. This tape is a continuing series of in terviews that will contribute to Gay
    and Lesbian Southern History Project, which is part of the Southern Oral History Program at UNC Chapel Hill. This project
    is currently focusing on the history of gay men, lesbian, bisexual and transgender history in Chapel Hill and the Triangle
    area over the twentieth century. This tape will be stored in the Southern Historical Collection, which is located in Wilson
    Library on the campus of the University of North Carolina at Chapel Hill. The number for this tape is 02.23.02-QB.1, here
    we go. Well, first off Quinton, just to this is a general question that I ask everybody, tell me a little bit about where
    you were born, where you grew up and, just as general synopsis of the early years. [Laughter] Baker: The early years.
    I was born in Greenville, North Carolina and I spent the first eighteen years there. I was born in a family of four children.
    I am the youngest of four. My parents were laborers. My mother was a domestic, my father was a laborer, we lived in town,
    at that time, Greenville was about 21,000 people. McGinnis: What did your father do, did he work in a textile mill? Baker:
    My father did various jobs, he worked in a furniture store, he so metimes worked in the fields, he worked in the tobacco
    factory, so that there was never one job, there was just a series.'
- speaker: Respondent
  text: 'A variety. Baker: A variety of jobs, he even learned to repair televisions while he was working for the furniture
    store, but he was never really compensated for that, so. McGinnis: So, you had two brothers and a sister? Baker: I had
    two brothers and a sister. I have my sisterMy oldest brother and my sister are still a live, I lost a brother a year and
    a half ago to cancer and so both of my parents are deceased, most of my immediate family are deceased exceptbasically
    it is just me, my brother and sister, my nieces and nephews that are still here. McGinnis: When, as you were growing up
    in Greenville, when did you start realizing that you were different and potentially a gay, a gay man? Baker: Well, I guess
    realizing that I was different was very early. I don''tknow about putting a name on it. McGinnis: Right. Baker: Probably
    very early realizing that I was very different, but different for various reasons, it didn''thave anything to do with
    sexual differences as much as what my in terests were. I was more interested in walks, sitting by the river, readingnot
    interested in what most of the males were doing, during my period, which was more hanging out at the pool hall, that kind
    of thing, that was not my in terest, and so that made me stand out, and I guess I realized thatwell, probably very young,
    I probably realized it when I was very young and I wanted toI was in a dance recital and I wanted to dance, and my father
    was not going to hear of that, so those kind of things just kind of made it stand out for me. McGinnis: I see, I see.
    Baker: But, you know, in terms ofI don''treally know any difference in terms of sexual kinds of things because in that
    period, there were all kinds of sexual fooling around with young people, boys with each other, so it McGinnis: It was
    just common in everyone''s growing-up experience. Baker: Yeah, some people did, some people didn''t, it was sort of a
    common thing, but no one made it, it wasn''t, "This makes you one." One way or the other.'
- speaker: Respondent
  text: 'Probably the point at which I realized that there was a difference in terms of sexual perspectives might have been
    high school. McGinnis: I see. Baker: And that was probably because one of the people that was very openly gay and flamboyant
    in high school, and was always ridiculed by the principal and I was always befriending him, so [Laughter] McGinnis: I
    see, were you scared to be associated with the flamboyant one? Baker: No. No, I was not afraid to be associated with him.
    I mean, I had gone through enough of being called various names, "sissy" and other things that that didn''tbother me.
    Obviously, it bothered me, it made me uncomfortable, but it didn''tkeep me from associating withI never really liked to
    see anyone put down or hurt or ostracized and so the more that they would sort of taunt Lester, the more that I would
    try to be there to say, "You know, there are people who are not friendly, or who don''t" McGinnis: You extended a friendly
    hand to Lester. Baker: Oh, Lester, you know, Lester was quite capable of [Laughter] McGinnis: Doing that on his own Baker:
    Of defending himself. [Laughter] But he was always, he was in need of someone to talk to, or someone to hang out with,
    and I would do that, yeah. McGinnis: This, the school that you grew up in was segregated I take it? Baker: Oh yes, I grew
    up in segregated North Carolina. This was C.M. Eppes High School, it was the all-black high school there. It was sometime
    long after thatYou have to remember that my next birthday, I will be sixty years old, so I am not [Laughter] McGinnis:
    Right, well, you hold it very well. Baker: Well, I am, and so that, I grew up in a segregated environment, I grew up in
    a community, you did not think about it so much. The time that you thought about segregation was when you were interacting
    or were in an environment where whites were around. Otherwise, you did not think about it. I mean, it was the normal course.
    Obviously, I thought about it as I got older in high school, but during that period, is how I grew up.'
- speaker: Respondent
  text: 'Right, right. Did you grow up with the white community very much? Baker: Only because I worked in high school, I
    was [pause] In order to prevent going into the tobacco fields and prime tobacco in the summer, I had a year round job.
    I didn''tsell, I shined shoes in downtown Greenville at a local shoe repair shop. McGinnis: Oh, okay. Baker: So, I did
    that every day after school, and then I did it all day. So, I entered, so most of my customers, most of the people that
    came in were, who actually got shoeshines were white. There would be a few, but not many, African Americans that would
    get a shoe shine. So, that kind of in teraction and the other interaction would be in terms of buying clothes or things
    of that nature, but there was no other interaction with whites. McGinnis: I don''tblame you, I would do anything that
    I could not to go out in the tobacco fields. [Laughter] Anything at all. Baker: Well, I started out there, I started,
    there was trucking tobacco, and this is one of those incidences where you get to know that you are different, because
    I wasn''tvery good. Because I was first of all, afraid of horses, and so one can''ttruck tobacco particularly in that
    period if one is afraid of horses because one has to get behind them to hook the wagon up. And so, I was not, I was never
    very good at doing those things that my father thought I needed to do as a male. [Laughter] McGinnis: To be a man. Baker:
    To be a man. And so, that always stood out. McGinnis: Was your father always kind of pushing you into the manly roles
    in general, or was there just a Baker: I think that my father knew that I was different, wanted desperately to so mehow
    not, to correct this, to make me not different, so that he gave me a hard time often about being different. Sometimes
    he would raise questions with me like, "Why do you have to be so different?" And it wasn''tlike anything other than I
    talked differently than most of the people around me. The way that I did things was different, and so he would, I tended
    to talk more to adults than I did to people my own age, I think my father was just genuinely worried that I was setting
    myself up for a miserable existence and so he was trying to protect me.'
- speaker: Respondent
  text: 'I see. Baker: It did not make our relationship work very well, but [Laughter] McGinnis: But you knew that he had
    good intentions. Baker: Yes, I was born [pause] I am the youngest of the four. Probably, without being conceited, probably
    came out with a slight degree more intelligence, so for a number of years, I was very smart, quick to learn, very curious,
    very in dependent, not willing to be told, "Do it because I say so." And leave it at that. McGinnis: Oh, that sounds very
    familiar. [Laughter] Baker: Always having my side of the story and my father was a very traditional man that said, "I
    say it, you do it, you don''tquestion me, as long as you live under my roof, you do as I say" And so he had difficulty
    with me just because of the personality. Also because I was the only kid that worked all of the time and had my own money,
    and then we had fights about money, because of course at that period, more so than now, if he wanted to, he could go and
    have my employer pay him and not pay me, so [Laughter] McGinnis: That could be a big sticking point. Baker: Yes, but he
    didn''t do that, but he madeit was understood that I was to give him half of my earnings, however small they might have
    been. And that was kind of difficult when you are making thirty dollars a week or something like that, you have got to
    give fifteen to your dad. [Laughter] McGinnis: Yeah, it was not easy. So, was Lester the first openly, well, I wouldn''tgay
    person, I was going to say openly gay person that you ever remember interacting with? Baker: No, because there was a teacher
    that was commonly known that he was, "Funny" there were people in the community. ItI don''tthink the lines were as clear
    and as sharp as they are now. I mean, everyone says how homophobic the African American community is. I think that the
    African American community appears more homophobic since desegregation than prior to desegregation. McGinnis: Yeah, I
    remember reading this. Baker: I don''trecall the kind of things that people do now, when I was growing up.'
- speaker: Respondent
  text: 'I mean, the, this particular teacher was also the choir director at the church. He was kind of swishy, but he was
    never really ostracized. He may have been talked about being, "funny" but no one really cast him out. They took advantage
    of his abilities to teach and his abilities to conduct a choir. So that, you knowand Lesterthe only reason that Lester
    was pointed out was because he was so flamboyant and he was flaunting. It was more of his feminism than it was the fact
    that he was in fact gay. I think that was the fact of it. So, it is hard for me to think back to, "Well, when do you first
    interact?" Because I interacted with people who were gay, who may have been gay, or who I later discovered were gay all
    of the time in terms of that community, but there was not, we were not segregated in our community as a little clique
    of people. McGinnis: Right, there was not the gay people in the black community. Baker: That''s right, it wasn''t the
    gay people that were in the black community. McGinnis: They were just there Baker: They were there McGinnis: They were
    there and people did not massively care. Baker: People knew, people did not make a big deal about it, but somebody may
    have talked about it behind somebody''s back. Oh, they would taunt, other kids taunted, you know, the way kids do McGinnis:
    Right Baker: but it wasn''t it wasn''t a political or so cial issue that created an element in our community or culture
    that was either outcast by the rest of the community, you know. "Oh, you can''tdeal with them because they are gay. Oh,
    you can''ttalk to this person, or you shouldn''t be in volved." I didn''texperience any of that. McGinnis: Do you think
    that, could you say after desegregation, this may have made more, do you think that religious right played a role, and
    the movement of the religious right played a role in that "ostracization" of gays within the African American community,
    or the representation of homophobia within the African American community, or the representation of homophobia within
    the African American community?'
- speaker: Respondent
  text: 'I am sure that that probably happened and that had something to do with it. I think that what, and it is very hard
    to think about this. I think that as deep segregation took place and there was more interaction between African Americans
    and whites, I have noticed that African Americans have taken on more of the cultural standards that whites had. Being
    anti-homosexual, I think, was stronger in the white community than it was in our community and we have gotten McGinnis:
    More mainstream Baker: More mainstream, and because of television and a whole number of things, all of those kinds of
    things have come to play, and I think that the African Americans are expressing. I still don''t, maybe I am naive, I still
    don''tthink that African Americans are as anti-gay as people think they are. I think that there is more of a tendency
    to for in stance, Iwe interact with some older African American members of communities that I worked in. And many of them,
    I think, most of these people know I am gay, it is not something that they want to talk about, it is not so methingbut
    I am a dearest friend. There is nothing that they wouldn''t do for me. So, the question is, you know, given where they
    are coming from, given their level of understanding, to what advantage is it to me to force this issue on them. They know
    I live with Ron. They know where we live, they know the house, they come here and do things, they know we do almost without
    each other, so what, who are we fooling? [Laughter] McGinnis: Right, exactly, exactly. It is an unspoken thing. Baker:
    It is an unspoken, sort of, it is about me, it is about us as people as people rather than about us as sexual beings.
    McGinnis: I have seen that generally, I think that that may be a southern standard too, because as long as you don''ttalk
    about it, it is all right. Now, if people become gay activists in the sense of continually fighting for gay rights, and
    you are talking about it. One of the biggest things, I think for people in the South, is not that people are asking for
    those rights as much as they are actually talking about this thing that is best left unspoken, which most sexual things
    are in southern societies.'
- speaker: Respondent
  text: 'Right, most sexual things. Anything that is different is left unspoken in the South. [Laughter] McGinnis: People
    don''ttalk about it. Baker: You know, I mean, I think that it is evident in terms of what is going on with the Latino/Hispanic
    population, and that is the southerners have a lot of difficulty dealing with difference, regardless of where that difference
    is, we would rather you pretend that there is no difference there than you to call attention to the fact that you are
    different. McGinnis: Right. Baker: So, that seems to be what I experienced. But I just think that, you know, it isthere
    have been gay choir directors in African American churches since McGinnis: From the beginning of time. Baker: As long
    as I have been black. [Laughter] And so it is not, even with ministers in terms of who say that we have not gay people
    in their church. I mean, obviously they can''teven possibly think, if they turn around and look, and many of the ministers
    themselves are gay so, you know, I don''tknow what that uncomfortableness is, but I do think that there is, there is a
    negative reaction to what I think African Americans think as being white. Being gay is more a white thing. Even identifying
    or using "gay" to describe who you are, comes from a white culture and not for an African American culture. [Laughter]
    McGinnis: Right, okay. Baker: And so, you know, I think that is part of what you are getting at. McGinnis: Okay, so, from
    high school, 18 you graduated, did you always plan on going to college? Is that what your plan had been, did you get a
    lot of encouragement? Baker: Yeah, oh yeah, oh yeah I got lots of encouragement to go to college. McGinnis: Did any of
    your other siblings go to college? Baker: Yes, my oldest brother went to college. My parents werevery big about education;
    my parents were interestingly, very middle class for poor people. [Laughter] Culturally middle class for poor people.
    They never forced us to stay out of school to work. In fact, the one thing that all of us had to do beyond anything else
    is that we all had to finish high school.'
- speaker: Respondent
  text: 'Whether we chose to go to college was a choice that we in dividually could make, but we had to finish high school.
    There was no choice in that, and so that, I always planned to go to college. It is in teresting, you see, I did not do
    well academically in high school until ninth grade. I wasI had a buddy and we used to hang out and party and carry on
    and we did that until at the ninth grade, he stayed back and I went forward. McGinnis: And you lost the bad influence.
    Baker: And so, I lost the bad influence [Laughter] and then I started to do well in school, and so I got a scholarship
    to go to Central. McGinnis: Okay, tell me a little bit about going to Central. Waswhat were you early memories of that
    in the first year or two? Because you did not finish your degree at Central, correct? Baker: No, nope, nope, nope. I was
    at Central for three and a half years, almost four years, the reason I did not finish my degree at Central was because
    I was sentenced to prison. McGinnis: Right. Baker: It was an in teresting time; I think that going to Central was the
    first time that I was with a group of people that clearly identified themselves as members of the group, members of the
    family. McGinnis: The gay people. Baker: The gay people, yes, yes. [Laughter] I was trying to remember the term, because
    there were always, there were two terms used when I was in college. One identified us as a people of color, as separate
    from white people that we used when white people were around as a way of and the other was the identification of the small
    group of gay men that were a part of it. [pause] MyI am trying to remember my first year at Central. Gosh, it has been
    along time now. There were a few friends that I had at Central who were gay, or whom we hung out together around the campus,
    or did things together. One of them was a turned out later became a roommate who was from Kannapolis, Morris Johnson,
    I don''tknow if youand [pause] and the others were various and sundry other people, they were the people that were gay
    that hung out together, and there were the people that we thought should be gay who didn''thang out.'
- speaker: Respondent
  text: 'Who had girlfriends. Baker: Right. McGinnis: But interacted sexually. Baker: Right, but a lot of my McGinnis: And
    for our listeners, we should say N.C. Central University, which is in Baker: Durham, yeah, it was North Carolina College
    at Durham, at the time. It is now known as North Carolina Central University. Because I became active in the civil rights
    movement early in my career at Central, actually in my first year at Central McGinnis: What got you interested in it,
    was it something that? Baker: Actually, it was something that started before I left high school. I always resented not
    being able to do things, or being told that there was a limit as to what I could do, and so that the movement to change
    that was very important to me, not so muchbecause it would change the way that I could interact with the world. I often
    use, you know, coming from Greenville, you know that East Carolina University is there now. It was East Carolina Teacher''s
    College at the time. When I was growing up, the only thing that a person of color could do on that campus was work in
    the kitchen or as a janitor. We were not even allowed to attend performances or anything over there, and I remember very
    clearly early on in my career, I mean my life that there was a performanceI think it was Fred Waring and the Pennsylvanians
    or something that was over there and I wanted to go because I was singing in the high school choir and I was not permitted
    to go and it was those kinds of things thatit was going downtown with my mother and not being able to get something at
    the lunch counter, or dealing with the segregated signs which made it very easy for me to become engaged in the civil
    rights movement. There is not particular impetus at school, or there was no in cident, it was just that this was something
    that I needed to do. McGinnis: It was a continual life trend that you were just following through with. Baker: Yes, right,
    this was just McGinnis: So, there were already organizations that were, as with any college, that were activist in nature
    and Baker: There was the student NAACP that was active on the campus that was very active.'
- speaker: Respondent
  text: 'The sit-ins had begun in the year beforehad begun in the spring, I entered school in the fall, so there was one of
    the people engaged in the early sit-ins in Durham. McGinnis: This was 1960? Baker: 1960 was Lacy Streeter, who was from
    Greenville, and I was in school with his brother, so there was some connection, so when I came to Central finding that
    group of people who were actively engaged was what I looked for, so McGinnis: Okay, great. So, obviously demonstrations
    started happening on the sit-in level in the different areas and the local level. What brought you to Chapel Hill? Why
    weren''t you demonstrating, or maybe you were demonstrating in Durham? You were demonstrating all over? Tell me a little
    bit about the demonstrations. Baker: Okay, I was very much engaged in the movement in Durham, by the time I became the
    president of the student chapter of the NAACP on the campus, I was involved with the Durham youth group that was involved.
    I was one of the leaders around Floyd McKissick during the period of time, we had a major thrust in Durham to desegregate
    Durham in 1962, ''63. We had massive demonstrations downtown, we had boycotts of the stores and we were having, we were
    doing mass rallies in the evening. At one of the mass rallies in Durham. McGinnis: Was this made up predominantly of college
    aged students? Baker: No McGinnis: Or was it from the community as a whole? Baker: It was from the community as a whole.
    It was high school and college, and the college students were not that, you know. If you look at the core of us, it was
    a core of a few of us from college and a few students from Hillside High School that were really engaged and a few students
    from Duke, they came in later on, that were actually engaged in sort of the core activities of the student rights movement
    in and around Durham. Floyd McKissick at that time was the state youth, was with the NAACP, and was pretty much the legal
    advisor for the group in Durham, and so he was really sort of our mentor and it was through him that we spent a lot of
    our time planning demonstrations, planning the negotiations and talking to people.'
- speaker: Respondent
  text: 'I am sorry, what was his name again? Baker: Floyd B. McKissick. You can''tmiss him, I think he was the first African
    American to attend the University of North Carolina law school in 1950-something, okay? McGinnis: I knew he so unded familiar.
    Baker: Okay, okay, and so that was how we got involved. How I got involved in Chapel Hill was that at one of the rallies,
    when we were doing this massive campaign, John Dunne and Pat Cusick came to the rally and obviously, they sort of latched
    on to trying to get to know people in there and they had created this group in Chapel Hill that was engaged in trying
    to desegregate things in Chapel Hill, they asked for assistance in helping them to better learn demonstrations, to do
    the non-violent protest stuff.[1] In addition to that, John Dunne and I began a relationship and that actually John -
    McGinnis: Tell me a little bit about both of them. Describe John Dunne and Pat Cusick at that time. Baker: Okay, John
    Dunne was a Morehead Scholar from Brecksville, Ohio, who was quite gregarious, quite bright, and quite an opportunist.
    [Laughter] McGinnis: People told me he was quite attractive too. Baker: He was - I guess so [Laughter] He was not - he
    was dark haired, he was actually considered black Irish, okay. He was quite attractive, he was quite the charmer and he
    was what have you, and that was probably part of the whole thing. Pat on the other hand was a southerner from Alabama,
    who was in the computer department at UNC. He was a student and he was working. He was a programmer. McGinnis: I did not
    realize that there was a computer department in the 1960s. Baker: Yeah, there was, he was a big person doing a lot of
    programming in computers. I tell him, I say, "Think of how wealthy you would have been had you - " McGinnis: - had you
    stuck with computers - Baker: [Laughter] - stuck with computers." He was, but they, Pat particularly, were involved in
    the Student Peace Union and so there were, there was a connection between their efforts in the peace movement and the
    civil rights movement, and so in Chapel Hill there was Harold Foster who was an African American who was involved in this
    group and in various university people, but I cam primarily, how I got involved in Chapel Hill was during the summer of
    ''63 - I think it was ''63 - I am forgetting some of this stuff now, after the major thrust that we had in Durham to desegregate,
    we developed a group called the NAACP Commandos.'
- speaker: Respondent
  text: 'And that was a group of 15 of us, that went around the state to assist communities in non-violent demonstrations.
    McGinnis: I was going to say, it doesn''tsound very non-violent. "Commandos!" Later known as the Black Panthers. [Laughter]
    Baker: Probably most of us might have been, and I guess that I was assigned to Chapel Hill. McGinnis: Okay. Baker: So
    that is how I got involved in Chapel Hill. McGinnis: So describe Chapel Hill in 1962. Was there a gay bar at the time?
    Or a bar that had a gay influence? Did you socialize much there, or was it all activism? Baker: It was mostly activism.
    You know, it is really interesting, this is one of the things that I tried to tell - McGinnis: The Tempo Room was kind
    of active around that time. Baker: The who? McGinnis: The Tempo Room Baker: Where? McGinnis: It was under, it is where
    Goodfellows is now, before that it was the Groundhog Cafi and it was basically across the street from Julian''s, downstairs,
    and was a mixed bar. And so, that was one of the things, when I was reading the first chapter that was done by Jim Sears,
    which we will talk about later, I was thinking, "They keep not mentioning the bar, I have to ask him, did you go to the
    bar?" Baker: No, I didn''t go to the bar, I did not know that there was a bar. McGinnis: Did you know in the Durham-Chapel
    Hill area or anything in that there was there was any place that gay men hung out, because it was also not segregated?
    Baker: Nope, did not know, did not go there. McGinnis: Just was not your focus and not the way that you met guys, going
    to a bar. Baker: No, most of the time that I was going to Chapel Hill, I was involved with John Dunne. I spent most of
    our time together at his, he had a room in a wonderful house on Franklin Street. He had friends, Professor Spearman, Walter
    Spearman and his wife were all friends of John Dunne''s. Most of the activities, most of the things that we did when we
    were in Chapel Hill was about the movement, it was about civil rights, it was not about gayness.'
- speaker: Respondent
  text: 'I am trying to even think - McGinnis: You can only have too many focuses. Baker: Right, yeah, it just wasn''t a place
    - We had friends and we knew people that were gay. I am trying to think, I did not even know that, because I used to make
    comments that there was not even a gay bar in Chapel Hill, that is how little we knew about that. I mean, we would do
    things like, I knew John Knowles. I think I talked to you about John Knowles, before. A Separate Peace is a book that
    he wrote, I could not think about it. He was at UNC and Reynolds Price was at Duke and John knew them, or knew people
    with them and we were invited to a party at John Knowles'' house, or we went to a party. But you know, when we went to
    a party at someone''s house, it was always mixed, I mean, it was not a gay thing. McGinnis: Right, the gays were there
    and they seemed too - Baker: Gays were there. I mean, John Knowles was gay, Reynolds Price is gay, they all, they had
    the parties, there were all kinds of young men around, I think that is the only one that I really remember there were,
    but that is the only thing that I knew, you know. McGinnis: Was it kind of scandalous to people that not only were you
    in a gay relationship, but that it was a biracial relationship as well in this period of time? I mean, I guess that with
    a lot of people, this did not even register, you were just friends. Because people see what they want to see. Baker: Right,
    well it registered at the time, Floyd McKissick had left the NAACP and gone to CORE [Congress of Racial Equality, a civil
    rights organization founded by James Farmer], Charles McClain had become the state youth advisor for the NAACP, and he
    complained to the national board that I as in volved in a relationship with a white male and I had to go to New York,
    because I was state youth, I wasn''tjust the local - McGinnis: So, what was the issue, that you were involved with a male,
    or that you were involved with a white male? [Laughter] Baker: It was an issue that I was involved with a male, I think,
    more so than it was that I was involved with a white male.'
- speaker: Respondent
  text: 'So, that was more the issue. And it was an issue, which I refused to answer, by the way. I was brought to them and
    - McGinnis: You said that it was none of their business basically. Baker: Basically, I said, that - Well, you see the
    charges were trumped up, it had to do with disloyalty, it had to do with not being loyal to the NAACP and being more loyal
    to CORE or something, which was simply not true and the issue was that I was the state youth president for the NAACP,
    so that made it an issue, but in that complaint, they also folded in this relationship with John and my "overprotectivness"
    and what have you with John. McGinnis: So, homophobia was an underlying factor? Baker: Oh yeah, I think, yes, yes, yes.
    But you see, it was very funny during the time, because the national youth secretary for the NAACP was a gay male, whom
