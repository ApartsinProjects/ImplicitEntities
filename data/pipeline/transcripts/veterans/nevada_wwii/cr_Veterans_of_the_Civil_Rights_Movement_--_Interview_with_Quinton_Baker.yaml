    now is that the gay culture?" McGinnis: And you are wondering, "How did I get that as Quinton Baker?" Baker: Absolutely,
    absolutely. [Laughter] You know, how. McGinnis: If somebody put me in this, I would be of fended, and I am like, "I am
    not a drag queen, but I certainly would not be - " Baker: I am of fended, you know, [pause] I mean, we used to have a
    statement, that Pat and I used to make all of the time when we were in Boston, and I went to gay clubs once I was in the
    cities, I went to gay clubs, we danced. I understand that aspect, that there is a need for places where people can be
    free, they can express how they feel, they can relax, what have you.'
- speaker: Respondent
  text: 'But, if you take "Queer as Folk" a lot of the stuff that I see on there, I go, "Wait a minute, what is this?" McGinnis:
    Oh really? Baker: You know, what is it? McGinnis: Because, I see it, and I say, "They got it!" [Laughter] That is exactly
    the way it is. Baker: Ah, I see. McGinnis: That could be, I don''tmean to anything bad by this, but that may be a slightly
    generational thing. If they had something forty years from now and I am watching it, I am like, "What is this, is this
    what we are doing now?" Baker: That kind of thing, well, some. McGinnis: That is a generational thing. Baker: Some things
    I recognize, but to some degree, maybe it is. My sense is, for in stance if you take Brian who is - McGinnis: Right, Brian
    Kinney.[4] Baker: Who is constantly in and out of you know - McGinnis: He is just screwing everybody - Baker: He is screwing
    everybody, you know, there are probably are people doing that. But that is not really the way that I remember - first
    of all we spent too much time trying to figure out how, trying to figure out how we were going to meet people, or if you
    met someone, that was not the first thing you wanted to do. McGinnis: Well, being in Chapel Hill, you probably just had
    limited interaction between John Dunne and Pat Cusick, but were you a witness, I am sure that they existed in Durham as
    well, in fact I know they did, but did you know about public sex venues that gay men went to? Because those were the areas
    where people like Brian Kinney were at, who might have that sexually charged kind of lifestyle. Baker: Well, I knew that
    people picked up people, or went to the bus station in Durham, but that is all I knew. McGinnis: Uh, huh. Right, it was
    just not an area where you interacted, because you werevery focused in the activist culture. Baker: I was very focused
    in the activist culture. I was also very much romantic. I, you know, sex for the sake of having sex was never - McGinnis:
    An issue - Baker: - never an issue for me. McGinnis: If you did not know and connect with the person, it wasn''tgoing
    to happen.'
- speaker: Respondent
  text: 'It wasn''t, wasn''tgoing to happen. I just didn''twant that. And if I met somebody and had sex with them, it was
    always with the anticipation, hope or dream that it was going to be something. I was always looking for a companion or
    partner; I wasn''tlooking for some - McGinnis: One night stand - Baker: One-night stand. And I would never do public things.
    I mean, Jesus! [Laughter] McGinnis: It is diversity within our culture. [Said in a silly voice] Baker: Yes, it is diversity
    within our culture. I accept that, but I just, you know, I like, all my life I have been trying to understand the glory
    holes. I just, what is satisfying? McGinnis: What kind of gratification do you get by that kind of? Baker: And I am not
    putting it down - McGinnis: Oh, no, no, no. Baker: I want somebody to help me understand what that - McGinnis: Well, I
    think that, and it is interesting, because when I interview people and some people put down my work because I talk about
    that culture. So I can probably give you my paper and you can read a little bit about it and understand it. But, there
    are different areas within the gay community, there are the, which I could probably talk about more. There are the public
    sex culture, there is the party circuit culture, there is the bar culture, the dinner parties, and there is the activist
    culture. And in general, those are the four areas. Some people are active in all four. Some people are just in that niche,
    some people only have sex in public places because it is a big turn on and it may be repressed issues, and maybe they
    are bisexual, and maybe they are denial, maybe they are just gay men who like to have fun, so there is that segment, and
    that is applicable to all of the other areas, and so, anyway. It is in teresting. I think that some people just find it
    very gratifying and exciting, kind of dangerous kind of thing. Maybe they are exhibitionists. Baker: Yeah, I guess. I
    guess I have always been, I mean I think one of the things that made it possible for me to function in and around Chapel
    Hill or be in Chapel Hill was the relationship.'
- speaker: Respondent
  text: 'The relationship with John was very important to me. And it was being in that relationship and our being in the movement
    together that was a real strong force in our lives together, because John was very active, we demonstrated together, we
    protected each other - we were there - McGinnis: You were there for each other. Baker: The way we related as people. McGinnis:
    Do you think that people generally knew in the straight white community and everything else that you were in a relationship?
    Baker: Oh yeah, I think so. McGinnis: Did they try to use it? Obviously, the NAACP, but did anybody try to attack the
    gay issue when you were being activists? Or was that something that was ever brought up? Baker: No. McGinnis: That is
    in teresting. Because you would think that would be such a wonderful tool for them to utilize. Baker: Yes, but they didn''t.
    McGinnis: Actually that is one area in which civility was certainly practiced. Baker: Civility was practiced because we
    were in and out of - [Laughter] I mean, we were. McGinnis: Did you guys ever have any PDA, public displays of affection?
    Did you ever hold hands or anything like that in public or anything of that nature? Baker: No, no, we didn''t do that.
    McGinnis: Some people had suggested that. Baker: That we did? McGinnis: Yeah, like hold hands or something. Baker: No,
    we didn''thold hands, we would sit close to each other, and we would touch each other. McGinnis: Shoulder to shoulder.
    Baker: Shoulder to shoulder or something or jostling around, but no, not, not any PDAs that I remember. But at my age,
    I may not remember anything. [Laughter] McGinnis: Do you remember Perry Deane Young? Baker: Yes, I do remember Perry Deane
    Young. McGinnis: He still lives in Chapel Hill, he has moved back now. Baker: Yes, oh really? McGinnis: I interviewed
    him. He lives in the basement of the Women''s Center. Baker: Yes, I do remember that. McGinnis: Do you remember Sam Hull.
    Not Sam Hull, Bill Hull. Baker: Yes, I remember Bill. I remember the name, I doubt if I would remember the person if I
    saw him.'
- speaker: Respondent
  text: 'And those were known as gay people to you when you were there? Baker: Yeah, I think they were, you know. McGinnis:
    If you had to through out a general percentage, how many gay men do you think were involved in the black civil rights
    movement in Chapel Hill? [pause] Was it a sizable percentage? Were they just some of the more notable personalities? Or
    were they just a few people? You, Pat, John, Perry Deane Young maybe, Bill Hull, they said there were others. Baker: There
    were others, and I - I mean Harold Foster was sort of bi, I think. McGinnis: That was still a period of time when free
    love was still going on, people were more ambiguous. Harold, what was his last name? Baker: Foster. You haven''t run across
    his name in this? McGinnis: I don''tthink so. Baker: He is an African American. I can think of - McGinnis: Would you say
    that it was twenty percent in terms of leadership, was it almost a majority? Baker: Well, in Chapel Hill the leadership
    was pretty much gay, yeah. But, I would say that the number of people participating, would say that it had to be maybe
    20%, I don''tknow how many - [pause] McGinnis: And a majority of the leadership or - ? Baker: A majority of the leadership.
    If you think about it, it was me, John, and Pat, we were the key and then there was - McGinnis: Were you really called
    the Father, Son and Holy Ghost? Baker: Unfortunately, that is how John Ehle referred to us in that book. McGinnis: And
    that was the name of the chapter in Jim Sears. Baker: Yeah, that is because he picked it up from John Ehle. McGinnis:
    But you were not known as that. Baker: No, we were not known as that, we were known as John, Pat and Quinton. [Laughter]
    That is not what we were known as, no, no, no, no, we were not known as that, we were never known as that. No one ever
    called us that, or even referred of us as that. We used to tease and say, "Yeah, you were the holy spook." [Laughter]
    The interesting thing is that because our relationship was interracial and because we did something that was almost unheard
    of, because we did share a house in Durham.'
- speaker: Respondent
  text: 'How long were you together with John? Three years, four years? Baker: Until ''64. It was two, about three years.
    Yeah, yeah. Then it was very difficult for people not to know about the relationship. It was common knowledge at Central
    about our relationship. I am sure it was pretty much common knowledge here. John may have had more of a knowledge of our
    involvement in a gay circle in Chapel Hill than I. It is still, things were not as - there were few people and few places
    that black people were being invited to come in and participate fully, so they [Chapel Hillians] may have not. I mean,
    you know, we still have to remember the kinds of things that we had, you have to remember. You know, Pat was evicted from
    his apartment because I visited him on Spring Lane and because I stayed there a couple of times, and you still had things
    happening in people''s lives. McGinnis: So tell me about this court thing. Well, the culmination of your, you know your
    demonstrations and so forth, how it led to having a court appearance, which led to - Baker: A court appearance? [Laughter]
    Yes. McGinnis: I didn''tknow quite how to phrase it. You were seen before a judge. Tell me about the judge and tell me
    about the charges and tell me about the results of that for you, John and Pat. Baker: Well, first of all, we were - Chapel
    Hill being a major thrust in ''63, we really created havoc in Chapel Hill with the demonstrations, we had people sitting
    across the streets which were bigger then than basketball games. We had people who were doing massive demonstrations in
    the middle of the street. And so we were then - the official charge was obstructing traffic and resisting arrest. We were
    tried here in Hillsborough at the Orange County Courthouse. McGinnis: Was there not a courthouse in Chapel Hill at the
    time? Baker: No, but we were county, there was a courthouse in Chapel Hill. McGinnis: Then why were you not tried there?
    Baker: Now was there a courthouse? No, there wasn''tbecause the post office.'
- speaker: Respondent
  text: 'What is now the courthouse, was the post office in Chapel Hill. McGinnis: Okay, I think that it serves as both. Baker:
    Well, at the time it was just a post office, because the old post office was just a post office where we had demonstrations
    and those things. I think that the county had jurisdiction, I think that it was a different process at the time, so we
    weren''ttried in a municipal court; we were tried in the Orange County Superior Court. Perhaps it was relative to the
    indictment. But, we were tried in Hillsborough. Judge Raymond B. Mallard was the judge, who was really very much opposed
    to what we were doing and part of the way in which he punished us was that he - McGinnis: The charges sound very limited,
    I mean - Baker: They were limited. McGinnis: what were they again? They were obstructing traffic - Baker: And resisting
    arrest. McGinnis: Which normally would just get a slap on the wrist. Baker: Right. McGinnis: So you got thesevery miniscule
    charges. Baker: Very miniscule charges, a lot of them. McGinnis: We did it twenty-five times. [Laughter] So every time
    that this happens, they had the police - Baker: Every time they arrested us, every time we allowed ourselves to be arrested,
    then we would have charges at the - . We didn''t get any - we might have had a few trespassing charges also against us.
    But the real charges that we were taken to court on was the obstructing and there were a large number of us. There were
    several of us, in fact, but what Judge Mallard did was to, since he knew that we were all students, he would not set a
    trial date or give us a calendar, he would make us come to court and we sat there for six weeks from eight in the morning
    to five in the afternoon, he would not allow us to read, he would not all of us to talk, or anything, we had to sit there
    in the courtroom and be quiet and listen. McGinnis: Is it fair to say that he was probably, that he was a racist? That
    he was pro-segregation. Baker: Oh, yes, it was fair. I think that it is fairly fair.'
- speaker: Respondent
  text: 'I think that was definitely trying to punish us, and punish us beyond what he though he could do in terms of court-wise.
    McGinnis: Every thing that he could possibly think that he could do, he was going to do. Baker: And he identified those
    people who were in leadership positions, and he made sure that we got difficult sentences. McGinnis: He was cutting off
    the head of the snake. Baker: Yes, right, yes. And so when I was tried, when each of us was tried he would pass, what
    was then the solicitor, it is now the attorney general, he would ask the solicitor if we were leaders. And then the solicitor
    would give some indication of his knowledge about our involvement in the movement. I was particularly targeted because
    I was the sort of mastermind of the demonstration. We would plan the demonstration, what we were going to do, but I would
    be the one to execute it and carry it out. And so, when I was tried, when Judge Mallard asked if I were a leader, the
    solicitor responded, "Your honor, if this were a Western you would call him Ramrod." McGinnis: Okay. [Laughter] Baker:
    And he [the judge] thanked them and said this isn''t a Western, but he is still, so that basically what happened is that
    we all got fairly excessive sentences. McGinnis: Were there demonstrations outside of the courthouse when this was going
    on? Baker: No, because most of us were inside. [Laughter] The leadership and everybody that was pretty much involved were
    in court together. McGinnis: So, do you think that the judge was basically in cahoots with the prosecutor in saying, "We
    think they''ve - how are we going to get rid of this problem, this is how we are going to do it?" Baker: We had embarrassed
    Chapel Hill and Orange County. McGinnis: And so now there was a price to pay. Baker: There was a price to pay. McGinnis:
    Embarrassed in the sense that you had exposed how progressive they really weren''t? Baker: Right, the Southern Part of
    Heaven turned out to be a little bit north of Hell. [Laughter] No, it was just that I think that.'
- speaker: Respondent
  text: 'You exposed it for what it was, and now there were ramifications for hurting their names as a progressive - . Baker:
    Right, that''s right. There were a lot of people who were even supposedly supportive of us who were of fended by the image
    that we had created of Chapel Hill particularly since it had gotten national. It wasn''tjust a local thing it was national
    image. So there was price to be paid for creating this kind of havoc in this wonderful serene community and in Orange
    County. McGinnis: It hurt their pride, in terms of being represented - Baker: That''s right. And so there was no protest
    from University people or anybody about the sentence. McGinnis: Wow. Baker: There was nothing in terms of the harsh sentences
    that we got. McGinnis: Were you, Pat and John the only people sentenced to prison? Baker: No, no, me, Pat, John, Buddy
    Tieger (his name is Joseph by the way, we call him Buddy), there were Lou Calhoun, there were probably eight or nine of
    us that were sentenced. McGinnis: Were you all sentenced to the same a mount of time? Baker: No, and we went to different
    places, different prisons. McGinnis: All eight of you? Baker: Yeah, pretty much. Well, John and I wound up in the same
    prison. McGinnis: You and John? Baker: Me, John and Lou Calhoun. It was really strange, first of all - McGinnis: What
    was the sentence? Baker: Mine was a year and a half. I don''tknow what the others were total. McGinnis: Did you expect
    jail time or was it a surprise? Baker: Yes, I expected jail time. What they did was, they thought - McKissick tried to
    get me off, or tried to get me off by telling them that I was scheduled to graduate in June and so - McGinnis: He was
    your attorney. Baker: Yes. What the judge did was simply hold up Capus for Commitment until June. McGinnis: Capus for
    Commitment, what is that? Baker: Well, when you are sentenced, there is a commitment form, or there is a thing where they
    either take your right away, instead of them taking me right away, they issued a thing that I had to turn myself in on
    a particular date in order to serve my jail time.'
- speaker: Respondent
  text: 'He was allowing me to graduate, supposedly. McGinnis: But, simultaneously, you were in court, so of course you couldn''t.
    Baker: There was no way that I was going to graduate, it was just a ploy that McKissick was using trying to get minimal
    or trying to get me paroled or something. McGinnis: So, he just - Baker: So he made an example, he was like, "Okay, we''ll
    show you what we''ll do." He won''thave to go to jail right away. [Laughter] We are going to be kind. McGinnis: We are
    going to be distracting him the entire time. Baker: Which was, which was more difficult for me because everybody else
    who was sentenced, went right away. I was out for a month, this was in April. I think I had a month and about a half that
    I was out running around knowing that on a particular day - McGinnis: Did you think about leaving entirely? Baker: No,
    no, I was going to turn myself in, and so my friend - McGinnis: Was it part of the passive resistance kind of thing? Baker:
    Yeah, I wouldn''t do that [run from his sentence]. So that, Walter Spearman, who was John''s and my friend, picked me
    up that day and brought me to the Orange County Jail where I turned myself in. McGinnis: Where? Did you stay in the Orange
    County Jail? Baker: Overnight. McGinnis: And then what was the jail that you were sent to? Baker: Then I was sent to Sandy
    Ridge which is right outside of Greensboro and then from Sandy Ridge, they transferred me to Morganton. And Morganton
    is where John and Lou and I were and Pat stayed at Sandy Ridge. McGinnis: Did you get press coverage while you were in
    jail or when you were being transferred in? Baker: No. McGinnis: You were just an understood casualty of the civil rights
    movement. Baker: Yeah. McGinnis: And people going into it, knew that there was that possibility. Baker: Yes, I mean, I
    had been sentenced to jail before. I was sentenced in Goldsboro and I served thirty days in the county jail there, so
    that was - McGinnis: What was jail like? Was it pretty - I mean obviously jail is terrible, but - Baker: Jail, prison,
    which one?'
- speaker: Respondent
  text: 'Either one, jail or prison. I am sorry, I mean prison. Baker: Okay. I was telling somebody, I think I was telling
    Ron''s father just recently - McGinnis: Was it dangerous? Baker: No, we were in a minimum security institution. The reason
    that we were sent far away, Morganton is, as you know, west of here. The reason we were sent far away - McGinnis: Sam
    Ervin, that is where he is from. Baker: Right. They knew that we would not cooperate if they put us in a segregated prison.
    They knew that they would have had a hunger strike; they knew that would have had difficulties. I mean, there was no way,
    and I think that either the governor or so mebody made it clear that there was no way that we were going to do all of
    this for desegregation and then accept being put in a segregated prison and do nothing. So, they transferred us to - McGinnis:
    To a void a reason to demonstrate. Baker: They transferred us to places where there were desegregated prisons. McGinnis:
    Was Terry Sanford the governor at the time? Baker: Yes. McGinnis: Wow. Baker: Terry Sanford was the governor at the time.
    And so, prison was, we worked not like you see them on the highway now, we cut down the trees and we burned the bush and
    we built roads in the dead of summer in the heat. It was very much. We were - the prison was a dormitory, so it was like
    split. There was a hallway in the middle, there was sort of a cell on this side and the bunks were sort of around the
    wall like that, with the door was here, the TV would be over the door, and it was just two bunks per person. You were
    told when to get up, you were told when to go to bed. You were given a change of clean clothes once a week, you could
    take a shower every day, but you didn''thave anything clean to put on. If there were enough guards on duty, we got yard
    time sometime after we came in. Mostly on weekends, we would get yard time, because when we came in from work, it was
    just dinner. You were allowed to write three letters a week. You had to have people on your list, people that you could
    receive mail from, you could receive a newspaper.'
- speaker: Respondent
  text: 'Everything that came into the prison was read, people could send you money that was kept in a, sort of an account
    for you, you were given plastic dollars, and you could pull out so much of it at a time in order to buy candy bars or
    those sorts of things. You - it was interesting to talk to the people who were there, they were there for different reasons
    than we were. I wrote about twelve letters every week. I wrote my three - and people who were illiterate and didn''tknow
    what to say. I think that the most poignant thing about it is that you - being in there for the period of time that I
    was, which wasn''treally - relatively speaking wasn''tthat long - McGinnis: Did you spend the full year and a half? Baker:
    No, I didn''t, I served for four months and then Terry Sanford got us out. McGinnis: He just excused or pardoned you?
    Baker: No, they paroled us. I went to the University of Wisconsin on parole. And John went to Harvard on parole - he went
    to Yale, I''m sorry. McGinnis: Did you and John maintain your relationship in jail, or was there not really any opportunity?
    Baker: No, we did not maintain our relationship in jail. There were opportunities, but I wasn''tmaintaining a relationship
    with anybody in jail, that was the common conversation around there. [Laughter] McGinnis: Common conversation about homosexual
    activity? Baker: Yeah. McGinnis: Hooking up in jail. Baker: Hooking up in jail. Drop the soap. McGinnis: Right. Baker:
    All of the stuff. McGinnis: So you were not maintaining any kind of relationship - [END OF TAPE 1, SIDE B] [START OF TAPE
    2, SIDE A] McGinnis: This is the third side of my interview with Quinton Baker; the number for this tape is 02.23.02-QB.3.
    So, you never really got a chance to see John, John Dunne in prison. You might see him in passing - Baker: I would see
    him in passing, I would talk to him through the bars, but we didn''treally have a chance to in teract, and part of it.
    McGinnis: You didn''twant to have any kind of sexual relationship in jail?'
- speaker: Respondent
  text: 'No. McGinnis: And why? You seem adamant about that. Baker: No, I did not want to have any kind of sexual relationship
    in jail. McGinnis: Were you worried that if you were with one person, then that would lead to expectations of you being
    with other people, was there any threat of physical violence, it was minimum security, so - Baker: It was minimum security,
    it was a dormitory, and it was about survival. Prison is about survival. McGinnis: So, even being minimum security, it
    is about survival. Baker: It is about survival. It is about being able. Survival involves more than just physical survival.
    It is the psychological and emotional support that you get from other prisoners. If you get identified as a "punk" - McGinnis:
    Meaning someone who has sex? Baker: Someone who has sex or someone is being used by other men in prison. McGinnis: Exactly.
    Baker: It does not, your survival gets compromised. Your ability to in teract. McGinnis: You are seen as a sexual object
    and not an equal. Baker: That''s right and you become that. McGinnis: Not as a peer necessarily. Baker: Right. And though
    I would - it was. I had to learn how to in teract with prisoners in a way that could be so cial and have them respect
    me. For in stance, because I didn''tlook at the television and go crazy when there were beautiful women on there, or half
    naked on there, they had to respect that, okay. But I wanted them to respect that because that was the kind of person
    I am. I didn''twant them to respect that by saying, "Oh well, you know how he is, this and that." I didn''twant the identification
    of being gay to be what they saw as my motivation for my behavior, I wanted them to understand who I was as a human being.
    And my sexuality, however important, is only a part of who I am, okay? And I really would rather people learn and appreciate
    or dislike or what have you - McGinnis: See it as a facet, not as a whole package. Baker: Right, please, you know, if
    you are going to hate me, hate me for who you have experienced me as being.'
- speaker: Respondent
  text: 'Don''thate me for what you assume I am, by what you think I do sexually. And so, in prison I protected that. McGinnis:
    I see. Describe, I am backpedaling a little bit, but describe Judge Mallard. How old was he, what did he basically look
    like? Did he have a heavy accent? Baker: No, he didn''thave a heavy accent. He was a reasonably, he was a small man, and
    if I remember him correctly, gosh you know, I don''treally remember a lot about him. I know that he was not necessarily
    large in stature. He was relatively mild mannered. A bit of a southern accent, kind of paranoid, he was paranoid because
    I understand he used to go to the door with a gun in his hand after all of these trials and things, but I don''tknow,
    he just seemed to be hostile. And out to punish us. McGinnis: Did he seem very biased on the bench, it wasn''tlike he
    - Did he make the decisions, or was there a jury? Baker: No, there wasn''t a jury, he made the decisions. McGinnis: He
    was the judge and jury. Baker: He was the judge and jury, there was not a jury involved. McGinnis: And it was obvious,
    I mean, he wasn''thiding the fact that he was going to get you and while he was on the bench there was not even an attempt
    at - Baker: No, because if you would try to read something, or you tried to do something, he would haul your butt up there
    in contempt of his court. He told you that you could not read, he laid out the record. McGinnis: You were expected to
    sit there and look. Baker: You were expected to sit there and look. McGinnis: Was it easy to fall a sleep in this situation
    when you were waiting for your court date? Baker: You couldn''tfall a sleep. You couldn''tfall a sleep, you couldn''tread,
    you couldn''ttalk, you just had to sit there. McGinnis: It was almost like prison or worse. Baker: That''s right. He created
    a prison of the court. And we did this for six weeks and if you did anything that he told you that you could not do in
    the room, he would call you up. He was stern. McGinnis: Did he make multiple biased comments there, or was it just his
    general actions?'
- speaker: Respondent
  text: 'No, it was just his actions. He didn''tmake any biased comments, he just let the facts be presented. I mean, by the
    time he got to us, he had gone through so many other cases; you were no longer listening to him. [Laughter] McGinnis:
    You had heard all of the other cases. You just knew that it was time to go through the motions. Baker: Yeah, yeah, oh,
    we were ready to jump up for joy finally when he said that we were going to be tried. [Laughter] McGinnis: Okay. Baker:
    You know it''s, he wasn''t too - McGinnis: It was an unspoken thing, he wasn''tlike permeating this, exuding this, "I
    am out to get these people who have caused problems." Baker: He didn''t put himself in any situation that people could
    - McGinnis: Accuse him of being biased. Baker: Accuse him of being cruel or being biased. McGinnis: But everybody knew
    that under the surface that he had an agenda, and he was going to take care of things. Baker: Right. McGinnis: And you
    knew that going into this? Baker: No, what do you mean going into it? McGinnis: Well, I mean knowing that once you were
    going to go in front of this judge, he had a reputation of doing this kind of thing. Baker: No, he had no reputation of
    doing this as far as - He did this because of the civil rights movement in Chapel Hill. He didn''thave a reputation that
    we knew anything about. Of doing anything like this before the - and I don''trecall hearing anybody saying that he did
    anything after that was similar to what he did during this period. McGinnis: This was purely a persona thing because you
    attacked his home and his reputation. A graduate of UNC, or at least law school? Baker: Yeah, yeah, probably. We didn''tknow
    much about Judge Mallard. We just knew Raymond B. Mallard. And you have to understand - McGinnis: Did you ever run into
    him later in life, or not? Baker: No, no, no, gosh no. Never did. [Quinton knocks on wood] McGinnis: Because he is probably
    dead now. Baker: Other people did. People told me stories about, you know, his paranoia and his divorce and things of
    that nature with his, but I didn''t run into him.'
- speaker: Respondent
  text: 'You have to understand that to a large degree, my focus and the focus that I spent a lot of time with, was about
    the movement and about civil rights and about improving that aspect of the life. People who were white were white people,
    okay? [Laughter] McGinnis: Okay, I just, I understand what you are saying, but it is kind of funny - Baker: And so there
    were no expectations that they were going to be, there was never an expectation that whites were going to be, I mean there
    was effort to try to hope that somebody was going to respond differently, but there was never any expectation that whites
    were going to respond to me positively. McGinnis: You always expected the work, and there was always a given that you
    would go into these places and there was a white person and they are going to be doing things to - Baker: Particularly
    during this period. You have to think about it, I had been doused with ammonia and Clorox, I had been beaten up with broomsticks,
    I had been dragged down steps by police officers, why would I go to court and - McGinnis: I guess it is safe to say that
    you were relatively cynical that this point. [Laughter] Baker: Why would I go to court expecting that I am going to find
    a nice friendly white judge sitting up there, and you know during that period, there were no African American judges around
    here. McGinnis: Right, right, right, I understand. It is important to be reminded of the perspective. [Laughter] So what
    happened after court and jail, you said, you went to Wisconsin and John went to Harvard, and - Baker: Yeah, John - [pause]
    McGinnis: And Pat, where did he go? Baker: Pat went to Boston. Lou went to Philadelphia. McGinnis: So you just were just
    dispersed all over the place, you had done your part. Baker: We didn''tdisperse voluntarily - McGinnis: Oh, were you required
    to not - Baker: I was paroled to New York, where my parents had been forced to move, but I was paroled - McGinnis: Oh
    my god, what did your parents think of all of this? Baker: My parents - McGinnis: I guess they would be supportive, and
    yet their lives were massively disrupted.'
- speaker: Respondent
  text: 'Their lives were massively disrupted, they never asked me to stop, they never tried to pressure me to stop, though
    they got a lot of pressure from people in my hometown, which as you know is Greenville, as you know they got a lot from
    around the high school - trying to get them to get me to stop what I was doing - they never did, the only thing my father
    ever said to me was, "I wish you would leave those white folks a lone." McGinnis: But that was the most he said. Baker:
    That was the most. They were - My mother was terrified of me, I can remember that when I was doused with ammonia and Clorox
    at that - someone sent the picture to my mother where I had fallen out the door - but the paper, they sent the picture
    from a newspaper - but the picture says, "Boy shot" - McGinnis: Oh my god. Baker: And so my mother was always terrified
    that something was going to happen, but she never vocalized, she never told me about it. McGinnis: She was not terrified
    of you; she was terrified that something was going to happen. Baker: She was terrified that something was going to happen
    to me, that I was going to be killed or something like that. They - eventually, they could no longer get employment. The
    way in which the white community tried to pressure them into stopping me was to make it impossible for them to make a
    living and that is why they had to move to New York. My mother moved first, my father came after them, and then my sister,
    so by the time that I was paroled, they were on Long Island, and I was paroled to New York. McGinnis: Did they live there
    for the rest of their lives? Baker: Yeah, they lived there for the rest of their life. My mother always wanted to come
    back home, but she never did. When I was tried, Judge Mallard did not want to accept the fact that I was a native North
    Carolinian. No self-respecting - McGinnis: North Carolinian would do this. Baker: Would do what I was doing. And so, it
    was easy when I was out, that I be gone, so that is why. And I was on parole for five years, so.'
- speaker: Respondent
  text: 'So he knew the arrangement that you would be paroled to New York. Baker: No, I think that Terry Sanford, John Ehle
    was an associate of Terry Sanford. I think - John Ehle had done the book - I think they decided before Terry Sanford left
    office as governor, that one of the things that he would do was to get us out of prison.[5] But he did not make any -
    I mean, anybody who praises Terry Sanford for his great openness, he made a great liberal stance by simply wiping the
    slate clean, he went through the legal processes of having us paroled, but paroling us so mewhere else. Now, they did
    work to get us - both me and John in school because we''re still the ones. Lou, I think, had finished, so he got a job
    in Philadelphia. Pat was no longer a student, so he got work in Boston. So they made sure that we were either gainfully
    employed or in a school. Wisconsin accepted me two weeks after school had begun, so obviously somebody was influencing
    somebody there. So that is how we got out of prison - McGinnis: So did you have a semester left when you went to Wisconsin?
    Baker: A semester? Yeah, right. [Laughter] McGinnis: Well, you said three and a half years, I don''tknow. Baker: Well,
    I did three and a half years, but I lost twenty-four credits, I lost more than that. McGinnis: So you had a year - no,
    no, no. Baker: I had quite, I had two years - McGinnis: Oh, in the transfer process. Baker: So, I was in Wisconsin from
    ''64 to ''67. McGinnis: Okay, and at that point, it was no activism, you were just concentrating - Baker: Well, at first,
    I was still active, there is no way to take the activism out, one of the earliest things was to organize a - I was with
    the student human relation council there, and I helped organize a trip to the South for students to, so that they could
    talk to people who were engaged in the civil rights movementhere, in North Carolina, and I did get permission to come
    back to the state to do that. McGinnis: What did you eventually get a degree in? Baker: Trouble, no - [Laughter] Social
    and Political Philosophy.'
- speaker: Respondent
  text: 'Okay, and what did you do with that once you got out? What did you do, what did you become in terms of your employment?
    Baker: Gosh, I did so much. I don''tknow. I was the, I initially worked for the Poverty Program. I was part of a community
    action agency and then I directed the Milwaukee Inner City Arts Council, which was connected at that time to the movement
    of improving cultural awareness and sensitivity in the black community through the arts. And so, I was the director of
    that program. Then I, when I left there and I went to, that was in Milwaukee, and I left there and I went to Boston and
    I worked in the Mayor''s Office of Cultural Affairs. And then I worked for another non-profit organization called the
    Education Development Center. All of that time - McGinnis: So you did a lot of work for the public in governmental positions.
    Baker: Yes, and in, or in non-profit agencies, yeah. Most of my work has been - and then I got tired and thought. McGinnis:
    [Laughter] You just got tired after that, I would have been tired after the first thing. Baker: Yeah, I just thought that
    I had done a lot for - McGinnis: The community - Baker: And had not done anything for me, and didn''treally know, and
    so I decided to try the profit sector for a while. And I did that and I worked in a department store and then I went to
    the stock brokerage firm and then I opened a restaurant. McGinnis: Oh, what kind of restaurant? Baker: A small, gourmet
    restaurant in North Hampton Mass. McGinnis: Oh, okay. A gourmet restaurant, what would something that we would know today
    that it would be analogous to maybe? Was it like Crook''s Corner, was it like Henry''s Bistro, was it like, Frazier''s
    is, if you know what Frazier''s is in Raleigh. Baker: No, I don''tknow what Frazier''s is in Raleigh. McGinnis: That is
    the main gay restaurant in Raleigh, where a lot of gay clientele go. Baker: It was more like - [pause] It would - I am
    trying to think of what in Chapel Hill would be comparable to, there is nothing really that I can think of.'
- speaker: Respondent
  text: 'My restaurant was about forty seats, it was what we called "casually elegant" and the food was at the time, it was
    Nouvelle Cuisine and we in troduced Cajun and Creole food to the area. But it was layered table cloth, hand blown crystal,
    open candles, so it had - but not pretentious. [Laughter] McGinnis: Well, I can see that. Baker: And it was not pretentious
    at the time. It was not pretentious because we did things that, for in stance, the wait staff did not wear uniforms, as
    people knew them. The uniform for my wait staff was brown pants or skirts down, brown shoes, but then they could wear
    anything in a shirt or blouse that matched the dicor. What I didn''twant was I didn''twant them to be, to stand out as
    they moved about the room so that you would automatically notice them. It wasn''tthis stiff kind of thing. McGinnis: Okay,
    I see what you are saying. It would normally be white shirts and black - Baker: Yeah, it would be white shirts and black
    slacks, and I didn''twant to do that. McGinnis: For totally understandable reasons. Baker: Yeah, I didn''twant that. So,
    and then I decided to come back home. McGinnis: Come back to North Carolina. When was this, what year? What decade? Baker:
    1990. McGinnis: 1990, wow, so how long was the restaurant opened? Baker: Three years. McGinnis: Oh, so it was ''87 to
    ''90? Baker: ''82 to ''85 I think it was. Yeah, ''82 to ''85 - and then after I left my own restaurant, because I was
    a head of my time, I was in an area where people were used to food hanging off the plate, they were used to large quantities,
    I was doing - McGinnis: Quality not quantity. Baker: Right, you could get quite full at my restaurant; you just had to
    order all of the courses to do so, but yeah. I managed other people''s restaurants for a while. I managed other people''s
    restaurants, I was fascinated by the restaurant industry, I did that as a part of working my way through Wisconsin, I
    did that until my mother died, and then I decided that I needed to get out of the restaurant industry, I was burned out,
    because it is twenty-four seven.'
- speaker: Respondent
  text: 'And at the time, I said, I think I was reading what''s his name - Oh my god, I can''teven remember his name anymore
    - I was reading a book that was talking about what had happened in terms of segregation and integration, It was talking
    about how we were re-segregating ourselves, we were talking about particularly around UMass where people of color and
    white people were not even - wouldn''t be in the same vicinities of each other - and I decided that I would - that I had
    not been in the South to live since it desegregated, I had no clue as to what life in the South was like. I had long believed
    that the South had a greater shot of achieving full integration than did the North because at least there were relationships
    or contact, but I wanted to see. So, I decided, it was a decision to either come back here or to go to Wisconsin, to go
    back to Wisconsin, which was where I had a really - for some reason, I never really, as much as I loved it, I never found
    a niche in a Northeast, Boston was just not, I couldn''t, I didn''tfind a niche with the African American community in
    the Northeast because, for my perception, I was not willing to pretend that I was not educated, that I wasn''t a member
    and I didn''t fit in there. The gay community in Boston is very segregated - McGinnis: You had sold out in the black community
    because you had become educated and so forth? Baker: No, it was because all of the educated people pretended like they
    weren''teducated, you know, like they were one of the people growing up in the - McGinnis: Slums or whatever and had never
    gotten an education - Baker: Right and it wasn''ttrue, and also Boston is this kind of closed community anyway and so
    most of in teractions that I had in Boston was in the gay community, but it was the white gay community and that wasn''t,
    I didn''tquite find a niche there, although I lived in a house, the people''s whose house I lived in, had been together
    for - when I moved in 15 years or more and they were, and they were really good to me.'
- speaker: Respondent
  text: 'It was a good relationship, I had the run of the house, this was a six story brownstone, I had two floors at the
    bottom and I pretty much had the run of the house in terms of the way - But still, I felt that I wasn''tdoing, that I
    wasn''tthriving, I wasn''tgrowing, I wasn''t - McGinnis: Reaching your full potential - Baker: Right and so I decided
    that I needed to, you know, and I knew that geographical cures don''twork, so I wasn''treally, but I needed to go back,
    I needed to get back into an environment - McGinnis: Geographical what? Baker: Cures. McGinnis: Oh, cures. Baker: Cures,
    don''twork, at least I believed at that time - McGinnis: Nothing magical was going to happen if you moved back to the
    South. Baker: Nothing magical was going to happen. But I decided that I was going to come back anyway, I wanted to come
    south, and so I decided to come here. At the same time, at the beginning of that time, I had met Ron. McGinnis: In 1990
    you came to Hillsborough. Baker: 1990 I came to Hillsborough, I have been in this house since 1990. McGinnis: So, for
    twelve years. Baker: Righthere. McGinnis: So, you came down, bought this house, you met Ron here? Baker: Rented this house.
    McGinnis: Oh, you rented this house? Baker: Rented this house, then we bought this house. [Laughter] I met Ron in Massachusetts.
    Ron was working at a health club that I attended on my day off and I met Ron there and before we came down here, we decided
    to go cross country together, so we spent much of the time, I was just trying, I was not - McGinnis: Were you out to find
    yourself? Baker: Yeah, I was just trying to figure out, I had actually suggested to him that he go across country, because
    he had not ventured out. The I said, "Well, why am I telling you to go across country? I should go across country, I have
    never been across country." And so, that is how we met. McGinnis: Oh, okay, so what do you do in Hillsborough, what do
    you do in North Carolina? Baker: What do I do in North Carolina? Oh, god. Right at the moment I am an in dependent consultant,
    I work with community based organizations, academic institutions and health agencies, primarily helping to address issues
    of health and well being particularly helping people understand how to work in communities, how you build relationships
    and how you partner in communities.'
- speaker: Respondent
  text: 'You counsel people on how to network and how to network and build coalitions. Baker: Particularly academic and health
    agencies that are interested in worked in particular communities of color. I try to help them understand how to work with
    the communities of colors the academic institutions and those. But, my work has ventured out. I came here, I went back
    into the community action agency, I, my - she is no longer a live, the person who, when I first came here I worked in
    the community church as a part of the administrative staff and then this person called me and she said that she had a
    job that she thought I might be in terested in, she called me in to talk to me about it, and she said, "I am looking for
    somebody who is not intimidated by people with PhDs and I think you would fit this." [Laughter] And so she brought me
    into a program called the Community Based Public Health Initiative. It was a Kellogg-funded initiative and that lasted
    for five years. In the course of that time, I built quite a reputation, and credibility for myself as a person understanding
    the work in communities and how. And so, Kellogg and others have used me as a consultant, sending me to various places
    across the country. I have had the privilege of being a part of a faculty for the Salzburg Seminar in Salzburg, Austria.
    McGinnis: Oh, wonderful. Baker: Yes, and so I have been really involved in trying to strengthen particular communities
    of colors for more self reliance. If we look at the civil rights movement and we look at other periods after and we look
    at all of the programs that were supposed to radically change the quality of life for people who are poor, we created
    some middle class people who work in the area, and we left a lot of promises, but we really haven''tradically shifted
    the power relationship for poor communities in the dominant society. And so, a lot of my work is about shifting that relationship.
    McGinnis: This is going to be one little thing that I wanted you to comment on, because it is something that I wanted
    to discuss, and then we can get back on the chronological track.'
- speaker: Respondent
  text: 'You knew Martin Luther King. You met Martin Luther King or at least spoke with him. Baker: Yes. McGinnis: Did he
    ever verbalize or, I guess you could assume acknowledge the role of gay people within the black civil rights movement?
    Because really, I guess when you ran into him, it may have just been strategy sessions and general meetings and that kind
    of thing. Baker: Yeah, you know. McGinnis: Obviously, one of his people organized the March on Washington. Baker: Yeah,
    I know more of his, of the people around him, more so than Dr. King and no, I didn''t get a sense. No, I think that the
    sense that I got was that Dr. King was not very comfortable with the gay people in the movement, and I know he wasn''tvery
    comfortable with Bayard Rustin, and so that is to some degree Bayard - that''s why Bayard had such a back seat. McGinnis:
    A peripheral role. Baker: Right, he had a crucial role, but it was behind the scenes in the process, so that was all that
    I can say about that. McGinnis: Did you see - did you know this from the actions, or did you see his thought process or
    his reaction to certain issues or gay people or - Baker: No, I really didn''t see that, I mean, I don''tthink that it
    was - McGinnis: You just knew that he was a little uncomfortable. Baker: I know that he wasn''tthat comfortable with Bayard
    more than anything else, and I knew that because John was - McGinnis: Was that a personal thing, or was it a gay thing
    - Baker: It probably was, I don''tknow, I really don''tknow, I can''t say. I mean, much of what I knew about that had
    to do with the fact that John worked with Bayard - John Dunne - worked with Bayard Rustin for a summer. McGinnis: For
    a summer, was this after - ? Baker: You know, because those kind of issues were - I mean, because to some degree it was
    like the relationship between me and John, where in the relationship was there - the focus was on the movement, and whenever
    we in teracted with people if they were not gay, it was mostly about the movement, so what people''s personal reactions
    or responses were, I have no clue.'
- speaker: Respondent
  text: 'So, when John worked, I guess when you worked through John that when John worked for Bayard, he saw things that would
    indicate this discomfort. Baker: Yeah, Dr. King was not very comfortable with - I mean Bayard was not closeted by any
    means. [Laughter] McGinnis: How not, was he just flamboyant, or was he - ? Baker: Yeah, Bayard was a bit flamboyant. McGinnis:
    And he went out to the clubs and had fun and whatever. Baker: Right. McGinnis: And whatever. Baker: And whatever, yeah.
    McGinnis: And so he wasn''thiding it, he wasn''tconforming by any stretch of the imagination. Baker: No, he wasn''thiding
    it. Bayard was not, it was not a secret. [Laughter] McGinnis: Is he still a live? Baker: No. McGinnis: Did he die of HIV?
    Baker: I don''tremember, I don''tknow, I don''tknow. McGinnis: I don''to fficially know either. Okay, so that flamboyancy
    was a little bit out there, and - Baker: Yeah, it was like to some degree, I think - McGinnis: And Martin Luther King
    was definitely a traditional southern male in that way. Baker: Right. McGinnis: He didn''tlike this in your face kind
    of homosexuality kind of thing. Baker: Right, James Baldwin. I knew James Baldwin and I think that there was a bit of
    tension between Dr. King and James Baldwin because of James Baldwin''s sexuality. And certainly, he was not hiding anything
    from anybody in the process. [Laughter] McGinnis: James Baldwin sounds very familiar. Baker: James Baldwin is the author,
    probably the intellectual giant of the 60s. Another Country, Nobody Knows My Name. [Laughter] McGinnis: Oh, I have read
    some of his books. Baker: Giovanni''s Room. McGinnis: Okay, great, wonderful, I really do appreciate it, that is another
    big question that I had. So, what happened to other people? Were you a ware of what John Dunne did later in his life?
    Baker: Yes, yes. McGinnis: I was surprised that he later married a woman. Baker: Oh yeah. [Laughter] Why would you be
    surprised? McGinnis: I don''tknow enough about him. Baker: That''s probably why - McGinnis: Was he a bisexual, was it
    something that was - Baker: I told you when we started this that John Dunne was opportunistic.'
- speaker: Respondent
  text: 'John slept with both men and women, his dominant sexual activity was with men, but he would marry because that was
    what he needed and he had, he has two, I understand, very fine young gentlemen now, his sons. But he married a woman and
    - McGinnis: And she was oblivious, or? Baker: Oh, it is painful, Chris, painful to think of what happened there because
    it was not until after he was diagnosed with cancer and he was dying that he told her all that he did. I mean, he would
    tell her things like, "I was in love with him, and I was constantly bothering him." Or something, he wouldn''ttell the
    truth about the nature of our relationship. And he was going to, he would make trips to Boston, he would come from New
    Hampshire and places and he had a male lover that the would visit and see, but she knew nothing about any of this. McGinnis:
    I see. Baker: - and so she didn''t not know anything about this until the final days. McGinnis: Until his final days.
    She might have thought that he did have relationships before they were married, she was not a ware of the in fidelity
    during the course - Baker: That''s right. And he and I stopped talking to each other - it is probably petty, he came to
    visit me once in Wisconsin and he was gung ho to jump in bed with one of my friends or roommates and I had not seen him
    for years, I mean, we did not have a relationship at that time, but I was - McGinnis: The point was, he had come to see
    you. And he was trying to sleep with your roommate. Baker: Yeah, I thought that it still was kind of offensive. And then
    he in vited me to his wedding. [Laughter] McGinnis: Did you feel like he had sold out to be marrying and mainstreaming
    like this? Or did that bother you? Baker: [Quinton sighs uncomfortably] I didn''tthink he had sold out. McGinnis: Because
    you knew that he didn''treally prefer women. Baker: I just knew it was - McGinnis: It was just a continuation of the general
    personality of John Dunne. Baker: If it was to his advantage, he would sleep with his mother.'
- speaker: Respondent
  text: '[Laughter] Okay? But I as annoyed by the fact that I was invited to his wedding, but I wasn''tinvited to participate
    in any way in his wedding, and people that he knew less than two or three years, were asked to be the best man, to be
    the ushers, what have you. And so, I said to myself, "Why am I going to spend all of this money to go to Boston from Wisconsin
    to sit through his wedding? Nah, not doing it." McGinnis: So, does it bother you that this was a heterosexual wedding?
    Baker: No. McGinnis: Did you consider John bisexual? Baker: I considered John a hypocrite, a phony. McGinnis: Because
    he was basically a gay man. Baker: He was still basically a gay man, he was still sleeping with - McGinnis: He just wanted
    the privilege of having a wife. Baker: Right, but he was never able to be - McGinnis: The privileges which came with having
    a wife. Baker: Right, right, he was never faithful to anyone. So, it didn''t, these were just patterns of John. McGinnis:
    Was John a Brian Kinney? Baker: [pause] No, because John had the capacity of making you think that he loved you. I mean,
    part of his charm was that he would make you very special in his world. It would not be obvious that you were being used
    in a way as with Brian. John was much more than that, but John would also make you think that it was the right thing to
    do. I can remember one of the kids that he had, that he was sharing an apartment with in Boston while he was doing some
    other things, came home and found John with someone else, in their bed. McGinnis: One of his children came home, and it
    was a male, I take it? Baker: Not one of his children, no, this is the guy that John was staying with in Boston, came
    to the apartment. McGinnis: Oh, one of the kids that he was dating. Baker: Yeah, one of the young guys, one of the kids
    that he was dating, came home. John had picked somebody up and was in the apartment with that person and John''s response
    was to in vite the kid to join them. McGinnis: To come join them. Baker: With no, no clue - McGinnis: He didn''tmiss a
    beat.'
- speaker: Respondent
  text: 'He didn''tmiss a beat, and I thought, "God, he is terrific." So, that was John. McGinnis: So, he was pretty Machiavellian.
    Baker: Yes, yes. But, he could be a very sweet, charming, man, but he was very Machiavellian. I don''tthink that we would
    have ever. It is in teresting, John and I didn''thave a relationship, we started off and then John met someone at Central
    that he liked and found more charming, and he was trying to balance the two of us, and at the time I was traveling for
    the national NAACP and I was going away and I said to him, "When, I go away, I am not coming back, I don''twant to see
    you. I don''twant to have - " And that was when I got the commitment from John. McGinnis: I see, because then it would
    be a competitive thing, and you were running away, so the chase was back on. Baker: Yep, I was saying, "See ya." McGinnis:
    And he knew that that was a line in the sand drawn. Baker: Yes. McGinnis: Did you think that would happen, that statement?
    I don''twant to see you again? Baker: Nope, I just knew. McGinnis: You just knew that was the best thing for you. Baker:
    I knew that I didn''twant to play the game that he was playing. I knew that I didn''twant to try to figure out a weekend
    that we would get together. I got tired of hearing, "Well, I don''tknow if we can get together, Clinton may be coming
    - " It is in teresting, because the person''s name was Clinton. [Laughter] McGinnis: That is too strange. Baker: Yeah,
    I know. McGinnis: Clinton/Quinton sound so similar. Baker: Yeah, that is too strange, yes. So, I just got tired of hearing,
    "Well I don''tknow, maybe." And then being there, when Clinton didn''tshow up, or being there when he thought he was going
    to get together with Clinton and he didn''tshow up and therefore, I became the sort of fallback person, and I just said,
    "I have had enough of this." McGinnis: Did he prefer black men? Did John Dunne prefer black men, or - ? Baker: [pause]
    I don''tthink it started off that way. McGinnis: But it may have evolved that way - Baker: But it may have evolved that
    way.'
- speaker: Respondent
  text: 'Pat definitely preferred black men. McGinnis: Pat was not even a practicing homosexual until after the black civil
    rights movement, correct? He just happened to realize that he was gay, and just happened to be - Baker: Right, he was
    non-practicing, he was actually, I just remember now - McGinnis: And there is a quote of that in the book. Baker: - And
    I just remember now who it is that I was talking about who was on the Daily Tar Heel at the time that we knew, that was
    much more conservative, because we used to tease Pat because Pat was fantasizing about him and that was Peter Harkness
    and his father was a, was he a reporter, a Washington reporter? McGinnis: Was Peter Harkness gay or was he just attractive?
    Baker: He was just blond, attractive, it is so funny, because once Pat came out, then the blond, attractive Peter Harknesses
    was no longer attractive for him, he was totally in the other camp. McGinnis: Two last questions. Jim Sears, let''s talk
    about his work and what he has done. When were you approached and was it, when were you approached and what was written?
    And let''s talk about your thoughts on this. Baker: Okay, I was approached, James Sears approached me, I don''tremember
    the date prior to the book, but he approached me because Pat had suggested that he - McGinnis: Was this after you had
    moved to North Carolina? Baker: Oh yeah, I was here. This was here [Hillsborough]. McGinnis: Early mid-''90s? Baker: I
    guess mid''-90s, I don''t. I think it was mid-''90s, when did he do this book? McGinnis: May have even been in the ''80s.
    Baker: In ''97, so he must have approached me in ''96 - ''95, ''96. He came here and he had a - McGinnis: Was it similar
    to the interview that we are doing now? Baker: Yes, he was at the Holiday Inn in Chapel Hill. He had a room. I a greed
    to meet him there and we did the interview and we did the conversation. I would not have talked to Jim Sears, I had no
    in terest of doing the interview, whatsoever, and the only reason that I talked to him was because Pat suggested that
    I should do him, talk to him.'
- speaker: Respondent
  text: 'Pat thought that it was important, he thought that it was an important issue that we get out there. Pat has been
    very out and political as a gay person in Boston for the last, I don''tknow, the past, I don''tknow, eleven years, twelve
    years or so. McGinnis: Oh, okay, so he is someone who actually transferred those skills to the gay rights movement. Baker:
    Yeah, but he is still very much involved in community action and is still very much involved in civil rights and the issues
    of poverty, it is just that he is just very much out and makes it a part of his work, in that process. I simply, and so
    I responded to Pat. James, Jim Sears came, he did the interview, we talked, I thought that it was a fairly decent interview,
    I tried to tell him, pretty much, similar to what we had done here, a little bit more history about growing up and that
    kind of thing and then I read the, the galleys, and I sent him a note back saying that this is not an accurate description
    of my life and what I told you - McGinnis: What was in accurate about it? Baker: In order to give it more, I don''tknow,
    interest or color, there were things that he said about my father, about my family working that wasn''ttrue that I didn''t
    say, how he described them, I don''tremember. Oh, let''s see [Quinton pages through his book]. McGinnis: Did you make
    any notes in that while you were reading it? Baker: No, I didn''t, because I never read the book. Once I read the other
    thing, I just said, "Forget it." McGinnis: Right. Baker: This was not a passion of mine; this was not something that I
    wanted to have happen. I was doing him a favor. I also felt that he lied because when he came back to do some work on
    - [pause] See, this is the thing, he says, "My father had been convicted of assault and battery." That is not true. McGinnis:
    Oh my goodness. Baker: My father had gone to prison, he had been convicted, but it was not assault and battery. McGinnis:
    That is a pretty big thing. [Laughter] Baker: Yeah, yeah. McGinnis: What had your father gone for?'
- speaker: Respondent
  text: 'I had forgotten what it was now. McGinnis: But it wasn''tassault and battery? Baker: It wasn''tassault and battery,
    no. And, I don''tknow. McGinnis: Were there other in consistencies? You said that he was trying to make some connection
    between the black civil rights movement and the gay - Baker: Yeah. McGinnis: Did you feel that you were being led in the
    interview, and in what way? Baker: Well, I never made the connections; I never made the connections that he made in the
    book, once he wrote the book. It wasn''t me that was saying that there was the connections that were there. It was him
    interpreting them. I am trying to find some of this stuff. [pause] No, see, "Growing up gay in the South for Quinton''s
    generation meant beingQuinton''s first knowledge of any type of sexual activity between the races came through Avery,
    who was making money hand over fist." I don''teven know what he is talking about. Unless he is talking about Lester and
    changed the name, who was in fact, making money with - McGinnis: Was he being a prostitute? Baker: No, in those days,
    you know, there was this thing of - McGinnis: You had these sugar daddies. Baker: Whites would come through the neighborhood
    and pick up black women or black men, whatever their proclivities, and take them off for sexual gratification and pay
    them some kind of thing. It wasn''t the kind of formalized prostitution that you are thinking of, but it was really hustling,
    but it was not generalized hustling, because it was really directed toward white people in that process. And Lester used
    to do some of that. But the thing is that. I mean, I do talk about them riding through the community, but I don''tknow.
    He changed the names of some people, because he didn''thave the permission to use their name. I don''tremember, my feelings
    were, and maybe I felt a little bit about Jim Sears as I felt about, as I thought about John. My feelings about Jim was
    that it was an opportunistic interview that was not so much about protecting the truth about what it is I had to say,
    or the what the truth was, it was about getting a particular point of view that he had, and I just wasn''tvery comfortable
    with it.'
- speaker: Respondent
  text: 'Also, he promised to talk to me again about - [END OF TAPE 2, SIDE A] [START OF TAPE 2, SIDE B] McGinnis: I am sorry.
    Baker: That is all right. McGinnis: Okay, we are on the forth side of the interview with Quinton Baker, the number for
    this tape is, 02.23.02-QB.4 Baker: I - the experience of having the interview, I guess I felt almost as if there was almost
    some kind of connection or some kind of a - McGinnis: This is Jim Sears? Baker: Jim Sears - that there was some kind of
    - you know he talked about his relationship, his partner, his work, and then you almost felt that there was some kind
    of trust factor that was being built. Once the book came out and then he started - I felt betrayed by that trust factor.
    McGinnis: So he built - was it a period of meetings that he built this trust factor up? Baker: Right, yes, and I felt
    that - McGinnis: There was a rapport built to hopefully have a more open - Baker: Yeah, and I felt that he exploited that.
    I have not heard from him since. I had no clue that I had been mentioned in the new book.[6] McGinnis: I remember when
    we spoke about that, and I was thinking, "Should I have mentioned this?" Baker: I had no clue, and then when he spoke
    in Raleigh, the business group, in which he did this description of me and Pat being lovers, it was all for his, for him
    to sell his book, because it was not true about the way of our relationship. McGinnis: He wasn''tbeing a real historian;
    he was just making up things to - Baker: Right, and Pat and I had been friends all of these years. McGinnis: You had just
    been sexual. Baker: We had never had a sexual relationship, it never even crossed our minds, okay, we were just friends,
    and what ever he said was sort of like, "The son of a black sharecropper and the grandson of a founder of the Ku Klux
    Klan are lovers." I mean that''s - McGinnis: Were you invited to come to the Business Guild?[7] Baker: Didn''tknow that
    it was coming to town. McGinnis: And that they were going to be talking about you.'
- speaker: Respondent
  text: 'Didn''thave a clue. If I hadn''t had a friend who''s an attorney who was present and called me up to tell me what
    had happened, I would have had no idea. McGinnis: Had you spoken to Jim [Sears] about this later on? Baker: No. McGinnis:
    Did you ask him not to have that initially shared? Baker: Yes. McGinnis: I mean, not to even have the - you didn''teven
    want it published necessarily in Lonely Hunters, "The Father, Son, and Holy Ghost?" Baker: He had the right to use the
    tape for the book but he did not have any right to use the tape publicly in any way whatsoever. McGinnis: And certainly
    not for the second book. Baker: And not for the second book, no. McGinnis: Okay, when I spoke to you on the phone for
    the first time, and I was surprised that I had gotten you [Laughter] so it was something. Baker: I was surprised that
    you had got me too. [Laughter] McGinnis: You were like, "Damn, I got caught." You said something to the effect of, "I
    want to be known for something, I don''twant my legacy to necessarily be just the civil rights movement and my activism
    that I was involved in the 1960s, If I am remembered, I want to be remembered for a broader picture." I think that is
    the idea that you expressed to me. Correct me if I am wrong. Why don''t you tell me a little bit about this and for the
    people who will be listening to this, what you want to be remembered for beyond just the civil rights movement. Maybe
    that is just a facet, but other things. Baker: Well, a significant a mount of my energy and my life has been spent on
    issues of justice of issues of fairness and equity; I have been involved in a lot of efforts with communities and strengthening
    those relationships. I would like for my legacy to be the totality, excuse me, of my life. I have also spent a lot of
    time with people about relationships and how we are friends and how we are not friends, or how we accept people. It is
    all connected to what perhaps, prompted me to be in volved in the civil rights movement, but I think I have made significant
    contributions to life and the well-being of mankind since 1960, my life did not stop with 1960 and so if you are going
    to talk about me, talk about what I am doing currently, if you want to relate that to my work in the ''60s, that is okay,
    but just don''ttalk about what I did in the ''60s, or what radical I was in the ''60s.'
- speaker: Respondent
  text: 'I am not the same person I was in the 1960s, I mean - . McGinnis: You are still a radical now. Baker: I am radical
    in different ways. I won''tmarch. I will not march. McGinnis: Would you go to a pride parade? Baker: I don''t go, I don''tmarch
    for anything. [Laughter] McGinnis: You have done your dues. Baker: I have paid my dues in terms of marching. I have been
    to a pride parade. The only pride parade that I have ever been in was in Boston, and that was really at a very controversial
    time, because it was a time that I was in a stock brokerage firm. I mean I have made my statements, but I have to do it
    the way that I do it. I cannot do it the way that people think it ought to be done. When I came back here, many people
    in the Chapel Hill community wanted me to be the same person that I was when I left in the ''60s. Or that they knew and
    how they related to me. I am a different person. My analysis of conditions and problems that we face are different now.
    And my actions are predicated on that analysis, not some analysis before. I would like people to stop marching every Martin
    Luther King Day. I mean, you would think that the only legacy that he left was marching. [Laughter] In terms of that,
    we have to find a different way. So, that''s all my statement means. I am doing different things, they are all connected
    to what I believe is right and just in this society - look at the total picture. McGinnis: Is there anything else that
    you would like to add? Baker: No. McGinnis: Thank you very much. [Laughter] END OF INTERVIEW Notes: 1. The rally that
    Quinton is referring to was held the day after the election of a new mayor in Durham, Mayor Grabarek. The exact date of
    this meeting was Tuesday, May 21, 1963 at St. Joseph''s Church in Durham, North Carolina. 2. Chris is referring to the
    federal law the "Defense of Marriage Act" passed in the mid-1990s which defines a marriage as a union between a man and
    a woman, patently excluding gays and lesbians from marriage. 3. The Sears papers are a collection housed in the rare books
    and manuscripts department of Duke University.'
- speaker: Respondent
  text: 'In this collection are Dr. Sears''s research notes, which include copies of the column written by Armistead Maupin.
    The column was entitled, "View from the Hill," and was very conservative on economic and race issues. This column was
    written from 1963 to 1964. 4. Brian Kinney is a fictional character in a Showtime Movie miniseries entitled "Queer as
    Folk." This mini-series/sitcom focuses on the lives of several gay men and lesbians in Pittsburgh, Pennsylvania. 6. The
    Free Men Rebels, Rubyfruit and Rhinestones 7. The business guild being discussed is the Triangle Business and Professional
    Guild (TBPG) a business organization made up of Gay, Lesbian, Bisexual and Transgender people and their allies. Oral History
