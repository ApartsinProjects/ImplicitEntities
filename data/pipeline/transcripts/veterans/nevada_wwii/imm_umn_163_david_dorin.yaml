  text: 'UMN Immigrant Stories Collection [''Guillies, Holden''] [''United States''] [''Origin Poland'', ''Origin Poland (Warsaw)'',
    ''Ethnicity Jewish''] URL: ============================================================ 12694_Holden_Guillies__export_script.txt[1/25/21,
    11:01:09 AM] My grandfather''s life was punctuated by movement and defined by his search for business opportunity and
    success. David Dorin, was born in Warsaw, Poland on July 12, 1920. He was a Russian Jew whose family had fled to the Republic
    of Poland to escape violent Russian pogroms. With aid from the American Jewish Joint Distribution Committee, David''s
    father purchased his family''s ticket to America in 1923. Unlike most Jewish Immigrants who entered the US through Ellis
    Island, the Dorosinski family (who''s name was changed to Dorin at the border) arrived in Portland, Maine and then moved
    to New York City. After struggling to find steady work and a home for three years, his family moved to Atlanta, Georgia.
    For the first 9 years of his life, my grandfather was on the move and he would continue to move throughout his life. David
    went to elementary and junior high school in Atlanta, but life as a Jewish immigrant family in Depression-era Atlanta
    was challenging. The search for work brought the Dorin''s back to New York City, where David remained in New York until
    1941 when he graduated from New York City College which was commonly called the Harvard of the Proletariat at the time.
    As a 23 year old college grad David embarked on his journey for post-grad success which brought him to his next adventure.
    He simultaneously became a US citizen and enlisted in the US Army Air Force as a staff sergeant. His drive for success
    led him to climb the ranks of the US Army and brought him to Japan where he served as a US Intelligence Spy. After three
    years and with the conclusion of WWII, David was honorably discharged at Fort Dix, New Jersey in 1946. With no home beckoning
    for his return, David''s search for success brought him back to Ohio where he enrolled at The Ohio State University and
    received his MBA 2 years later. MBA in hand, a 28 year old David''s nomadic search for success continued. He bounced around,
    moving to Chicago where he met and married his wife Shirley. However, Love was not enough to keep David in Chicago, his
    desire for business success wasn''t met and he moved to Los Angeles with his wife. By the age of 30 this Russian-Jewish
    immigrant''s search for success had led to him becoming an in ternational Spy, a US war veteran, a US citizen, and an
    MBA graduate. At this point he realized that he didn''thave to travel to find success, he had created his own success
    throughout his life. After moving to LA, his education, connections around the US, and lack of physical place inspired
    him to create his own career as an industrial real estate a gent, broker, and property developer. His travels and the
    wide variety of people he met made him a fascinating real estate a gent and his business education made him a savy real
    estate investor. In 1959 he founded Dorin Realty Company Inc. and joined with Jewish men across the US to found the Association
    of Industrial Realtors. David continued to travel with his family thorughout his life; now with his focus on enjoying
    the people he met and relationships he formed. He passed away in 2014 having stepped foot on each continent.'
