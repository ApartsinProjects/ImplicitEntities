collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: We were in 7-A almost four months, and then they moved us to Stalag 17 for more space. The number of airmen coming
    down was growing. There were four thousand in Stalag 17 before the end of the war, and there were other camps all over
    the place.
- speaker: Respondent
  text: The night we arrived at Stalag 17 we disembarked from the box cars and were marched up along hill and herded into
    a big warehouse that was full of straw with dust in the air. Immediately, I started having trouble breathing; I was almost
    asphyxiated. I guess it was asthma, which I had never had before.
- speaker: Respondent
  text: Some GIs pointed out to the Germans how much distress I was in, and they let two GIs cross their hands to make a "firemans
    sling" for me, and carry me up another hill to a hospital for the occupied countries - there were Poles, Bulgarians, and
    other nationalities there, and the staff of the hospital were prisoners from the different foreign countries. To treat
    me they took me into a large, warm room - looked almost like a shower room, because the steam was so dense - and laid
    me down on the floor, with all these heads looming over me.
- speaker: Respondent
  text: I was the first American many of them had seen since 1940, since the fall of Paris. They gave me a shot which had
    an immediate effect. After recovering, I was able to stay there as liaison with our camp for about three months. I would
    check people in and make sure that they had the proper care, as much as you can expect, and report back to our camp leader.
- speaker: Respondent
  text: These Belgians, French, and Poles were able to get outside. Since they were from occupied countries, they were assigned
    to work details, and could go into Krems to pick up things they needed. After I had become acclimated, they invited me
    to go along. They dressed me like a Polish soldier, very shabby, and put me on the back of a wagon. We had decided that
    if we were stopped for any reason, I would pretend to be dumb, and they would have to speak for me.
- speaker: Respondent
  text: A German staff car pulled up behind us, didn't cause any problems; they were just waiting to pass. But after the German
    car passed, we noticed that my very bright watch band was showing. It's remarkable that they didn't see it. After that,
    they took great pride in telling people that I was American, and proving it by my watch or my dog tags. This was only
    1943, but seeing me was like news that we were on our way to winning the war.
- speaker: Respondent
  text: Eventually, another young man was sent to the hospital to replace me, because he could speak French. I moved down
    to the barracks and helped set up a small clinic, where we could treat people with colds and minor ailments rather than
    send them up the hill to the hospital. While I was working up at the hospital I had been able to smuggle various supplies
    and hospital things down to the camp, and we were able to set up a pretty good little clinic.
- speaker: Respondent
  text: The staff included a couple of doctors who had been captured in North Africa, and we were able to screen thirty or
    forty GIs a day. I put my attention to that job, which helped a great deal in overcoming the boredom of being a prisoner.
- speaker: Respondent
  text: There was a separate room for the staff, so I was in much better straits than those who were still sleeping on those
    three-tier bunks.
- speaker: Respondent
  text: Ken Kurtenbach, who was from Montana, just naturally took up the position of leader of Stalag 17 - we called him our
    "conference man." Kurtenbach had his advisory committee of certain people; and there was a barracks leader in every barracks,
    and he had his people and a chain of command.
- speaker: Respondent
  text: We had a big stove that we fed coal or anything, like broken-up furniture and bed slats. Winters were cold, and getting
    fuel was very difficult, so once in a while someone would take a slat out from under one of the mattresses. It wasn't
    uncommon for guys getting in bed to fall through, [laughter] Everybody used that stove to prepare what little food you
    had.
- speaker: Respondent
  text: Once in a while we received a Red Cross parcel, and it had everything in it they could think of - Spam, NesCafe, crackers,
    some kind of margarine; more like condiments than food . . . but you could trade for potatoes from the Russians or you
    could trade for onions. My mother, God bless her, knew I didn't smoke, but she sent me cartons of cigarettes anyway. She
    just knew I could do something with them, so I was rich in that situation.
- speaker: Respondent
  text: We had a double fence between our compound and the Russians over which we could throw things. So we were able to supplement
    our diets pretty good. They would deliver these huge pitchers of beet jam to our compound, but we discovered one day that
    the Russians thought that the jam was going to the Germans. They had been doing some awful things to it, and we never
    knew until they told us. [laughter]
- speaker: Respondent
  text: I dreaded the morning wake-up call, when the guards come roaring into the barracks, yelling, "Raus mit du! Raus" Everybody
    had to get dressed in a very short time and go out in the yard while they checked to see if we were all there.
- speaker: Respondent
  text: We were able to cover absences to some extent... to make it look like people who had gone over the fence were still
    there. Sometimes we were able to get Russians to take the place of GIs who had gotten out, because life was better in
    our compounds than in theirs.
- speaker: Respondent
  text: There were several escape plans, and they were ingenious. We had an escape committee which had to approve a plan,
    because attempts could endanger other people. An escape could cause retribution, so they wanted to be certain it was viable,
    and they didn't want you running into another attempt at the same time.
- speaker: Respondent
  text: Probably the most popular method of escape was tunneling, and the earth beneath the camp was absolutely honey-combed
    with tunnels, and tunnels running into tunnels. But there was a German called "the mole" going around jamming a big, sharp
    iron pole in the ground looking for tunnels, which he usually found - I'm not aware that we ever did complete one.
- speaker: Respondent
  text: There were other ways to go, too. Sometimes you could get through one gate into another compound by bribing the guard
    with cigarettes. Prisoners in some of the other compounds were working outside the camp. To us, that was simply an open
    door.
- speaker: Respondent
  text: I once started to go with about ten others through gate into the Russian compound. We were told that the guard had
    been bribed and was willing to let us through, but suddenly everything got very tense. It didn't feel right, so we all
    took off. In several escapes like that, the guards would let them take place, and then they would shoot.
- speaker: Respondent
  text: Everybody made the best of being a prisoner. In fact, I even have some nostalgic memories of the camp, the friends
    I made, and some very funny experiences with the Germans . . . and some very serious ones, too.
- speaker: Respondent
  text: 'The GIs were quite remarkable in making things work and keeping spirits up and even having fun: One man would come
    into the barracks and get on a stool and read off the news for the day; tin smiths would make cups and things for you
    out of tin; one guy had a camera, and he secretly photographed life in the compound for about a year, and put out a little
    book immediately after he arrived home.'
- speaker: Respondent
  text: Other guys would work up little shows, which were very well done, because out of four thousand people, you're going
    to find somebody who can do anything, right? And we started getting parcels from our families at mail call.
- speaker: Respondent
  text: We began forming groups of three or four people who would combine all the food that they gathered and cook together.
    In one of these combines, a Tennessee guy proceeded to make some home brew by fermenting potatoes. It was awful! [laughter]
    When they called roll the following morning, all these drunken GIs were in the ranks, and their condition was really noticeable.
    They were reeling around, and the Germans could not figure out where they had gotten drink.
- speaker: Respondent
  text: We were given potatoes and German bread, which was literally one-third sawdust, but it was satisfactory with our margarine.
    We were also able to get a Red Cross parcel once in a while to supplement everything. Although there were times when we
    felt deprived, we learned how to ration and work with what we had so well that we weren't that bad off.
- speaker: Respondent
  text: We thought we were badly treated and deprived, but when we got home and learned what was going on in Japan, we knew
    it hadn't been that bad.
- speaker: Respondent
  text: There must have been ten radios in the camp within a year, and we got our news from BBC. I was invited into a linen
    room in the hospital late one evening to listen to a shortwave radio receiving news on the advance of the Russians from
    the east.
- speaker: Respondent
  text: I put tissue paper over a map there, and marked it to show how the front had advanced. Then this piece of paper, with
    only a line on it, was smuggled back to the Lager, where it was placed over a duplicate map to show where everything stood.
- speaker: Respondent
  text: To hide things like radios, we had this big bucket of awful-looking slush, filled right up to the brim. They very
    carefully hung it on a hook; and under it, in a false bottom, was a radio. It was just the sort of thing the Germans would
    see and avoid . . . you wouldn't go near it.
- speaker: Respondent
  text: Every once in a while the Germans would pull a surprise raid of the barracks, looking for anything they could find.
    Somebody would yell, "Dogs!" and everybody would scramble to the top of the bunks. The dogs were vicious, and they'd have
    to hold them, but that was the German deterrent.
- speaker: Respondent
  text: It was always a bad scene, because we didn't realize they were coming until they were in the barracks in the middle
    of the night. Once in a while they would turn up a map, maybe a radio, and they would confiscate it. Depending on what
    it was they found in your area, you could go in the cooler, which was a cell used to keep you in isolation until they
    thought you had learned a lesson, [laughter]
- speaker: Respondent
  text: We got to the point where we weren't so careless, and eventually we were able to anticipate raids, and even bribe
    or make friends with guards so we'd be forewarned. The guards realized that we had more than they did. We probably ate
    just as well as them, and they were always asking for a cigarette. They really enjoyed American cigarettes.
- speaker: Respondent
  text: It was cold. We had the clothes we were wearing when we got to camp . . . there must have been an opportunity to get
    another set of clothes. I think shoes came in from the Red Cross, because when I got out of the turret, I came out so
    fast that I left my shoes behind stuck in the foot controls and bailed out in my socks.
- speaker: Respondent
  text: 'Germany had signed the Geneva Convention, but they adhered to it mostly by keeping you alive. Later, we learned how
    German POWs were treated in this country. I got back soon enough to see it: They ate well, and they even went to dances,
    and some of them escaped and melded right into American society and are still here. I was astonished and angry.'
- speaker: Respondent
  text: 'As compared to the prisoners of Japan, very few of us POWs in Europe came out intimidated or traumatized from being
    in a prison camp. That may have been largely because we were able to mingle freely among ourselves and able to connect
    with anybody: just go down your street and into a barracks and find a friend, invite him to dinner, [laughter] So, as
    difficult as the living conditions were, and as harsh as the punishment would be for various things, it wasn''t that bad.'
- speaker: Respondent
  text: I got back to the United States in February of 1945, thanks to bronchial pneumonia I'd contracted earlier. Our camp
    gathered together the very seriously injured and impaired, and submitted a list of which ones should be repatriated or
    traded.
- speaker: Respondent
  text: By then I had gotten over my pneumonia, but since they had a record of it, it was decided that I should fake the illness
    in order to communicate with the outside on such things as the number of us in camp, the infantry around, the radio shortwave
    signals, et cetera. I spent a couple of intensive days being briefed on information like that.
- speaker: Respondent
  text: Then a Swiss and German commission of doctors came through, sitting at long tables, and each one of us presented his
    problem. I did my best job of wheezing, and they let me go.
- speaker: Respondent
  text: When we were repatriated, several of us were transported through Germany at the height of air raids. They purposely
    left us sitting in marshalling yards, where all the trains arrive and switch cars, and we were sure we were going to get
    killed before we got out of there. It's hard to beat a marshalling yard for a great target, [laughter]
- speaker: Respondent
  text: When we arrived at the Swiss border, the train stopped. We knew we weren't safe until we crossed over. After quite
    a while, the train started to move again, and when we crossed to Geneva, everybody went crazy, cheering. We were free!
    We were going to be well. Nothing else mattered, but we also felt sorrow for all our friends left behind. Every one of
    them had given us something to bring back, something to say to their parents.
- speaker: Respondent
  text: Our camp leader, Kenneth Kurtenbach, had told me not to talk to anybody lower in rank than two majors, because what
    I knew was so secret and important that he didn't want it just spewed out. But in debriefing at Marseilles, my demand
    to have two majors present did not go over at all!
- speaker: Respondent
  text: For a while I thought they had decided to ignore me; but finally they accepted that I was serious, and they flew me
    to Washington on priority for debriefing. When I arrived at Walter Reed Hospital, two majors came in. I was glad they
    arrived before I forgot everything! [laughter]
- speaker: Respondent
  text: I had lost perhaps ten pounds in captivity, but ten pounds off me was a lot. It took a while to realize what I'd been
    through, and to realize how my mother and relatives regarded me as changed, more serious, contemplative .... I have said
    some of the things recorded in this oral history interview before, but I've never gone through the whole story like this.
- speaker: Respondent
  text: We were all anxious to get on with our lives, and I glossed everything . . . never filled in some of the details until
    now.
- speaker: Respondent
  text: Charles Craig. His death continues to haunt me, especially on May 21st. At the very beginning, I used May 21st as
    an excuse to go out and get drunk, [laughter] But I was never sure why I was doing it - whether it was celebration or
    remorse.
- speaker: Respondent
  text: Remembering and talking about it for the record has given me a different perspective, and I've got another theory
    now about what happened. Seeing those two men dead, but so composed, just like sleeping, I realize they weren't in the
    crash, because the plane exploded.
- speaker: Respondent
  text: Auld's 'chute - he couldn't get it on, which I finally realize. I wonder if they tried to go out with one 'chute?
    It's possible they decided to cling together and try going down in one 'chute. That's really far-fetched, I think. Maybe
    they were just too close to the ground when they jumped.
- speaker: Respondent
  text: I'll never have an answer, but I keep thinking about it, because Craig was a guy who saved my life and didn't get
    out himself.
