- speaker: Interviewer
  text: 'I would like to ask your name first. My name is Heiji Kurokawa. I was born in Wakayama Prefecture. : When were you.born?'
- speaker: Interviewer
  text: 'I landed in San Francisco on March 21, 1921. : What year were you born? I was born in May, 1902. What kind of family
    were you from?'
- speaker: Respondent
  text: It was a farming family. My brother :-came to America in 1915 when my father summoned him, so I was thinking about
    coming to America. In those days our-family was growing citrus fruits and were exporting them to Manchuria, so I was thinking
    about going there, too. My brother wanted me to come to America so that we could be partners, but in those days a brother
    could not summon another brother. Therefore my brother summoned his mother first, and 6 months later
- speaker: Respondent
  text: 'mother summoned me to America. @ ie ro) He v4) Ir | Q NY) By) Were you 19 years old when you cam : I would like to
    ask you about the period before you came to America.'
- speaker: Interviewer
  text: 'What about your schooling? : I attended the primary school for 8 years. The high school was 5 years, but I quit after
    3 years to come to America.'
- speaker: Respondent
  text: Do you have any memories of your schooldays? I don'thave any special memories. I liked sports. In those days kendo
    (swordsmanship). was popular, so I learned it. I also liked sumo. Thinking back, memor#s of my classmates who studied
    side by side come back to my mind. When we grow old that kind of thing
- speaker: Interviewer
  text: 'become fond memories. : What kind of parents did you have? My great grandfather was a samurai, and he went to war
    of 1879.'
- speaker: Respondent
  text: I remember faitly that he had a sezatch on his head. Later, my father started a business, but as he was an ex-Samurai
    he was not good at business. When I was 2 years old my father came to America. My mother brought 2 boys and an older sister
    up by herself. The year my sister graduated from high school my father summond her.
- speaker: Interviewer
  text: 'It was 1915, the year of the Panama Exposition in San Francisco. : Do you remember the Sino-Japanese War or the Russo-Japanese
    War?'
- speaker: Respondent
  text: I don*tremember directly. I only learned about the wars from my teachers when I started going to school.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: The family religion was Buddhism. While my mother was bringing up often children all a lone my sister was weak and
    became seriously ill, She did not know which religion to believe as people said this or that god was responsive to a person's
    prayer, but an ardent she finally became ~, believer in Tenrikyo. In those days she
- speaker: Interviewer
  text: 'did not have any worries in making a living, but she had worried : Js it was 1921, there were still some picture
    brides, werenY''tthere?'
- speaker: Interviewer
  text: ': The picture marriage was prohibited after 1924, so they could still Were there many picture brides on board the
    ship?'
- speaker: Respondent
  text: ': Yes, there were. As the picture marriage was going to be prohibated after 1927, people told me to get married and
    bring the wife with me. I was summond by my mother to get education, and I was still young, so I did not have any intention
    of getting married then.'
- speaker: Interviewer
  text: 'Do you have recollections of the life on board the ship? A: I did not know anybody when the ship left Kobe. There
    were many men who went back to Japan to take wives. They called me "young man" and'
- speaker: Respondent
  text: took good care of me.
- speaker: Interviewer
  text: Were there any incidents on board the ship?
- speaker: Respondent
  text: No, I don'tthink anything particular happened on board the ship. During 21 days of voyage, I think I stayed up only
    about 10 days. The ship hit the storm, and even the crew got seasick, and we did not eat for about 3 days. I heard that
    flying fish would come up on the deck, so ever was not feeling well I went on the deck to catch flying fish as I liked
    fishing. It was a rough voyage.
- speaker: Interviewer
  text: 'What kind of a country did you think America was before you came here? A: I had heard about America from men who
    went to America from our village'
- speaker: Respondent
  text: and came home in glory. On top of that my mother and brother were in America, so I came here without any worries.
- speaker: Respondent
  text: 'What is your preden: religion? My mother summond me, but she wanted to go back to Japan. When she received a letter
    from her only daughter who was married then tellmng mother that she had not been well since she gave birth to a baby,
    mother wanted to go back to Japan at once and take care of'
- speaker: Respondent
  text: her daughter, so she went back to Japan. When she left America she told us that as there was no Tenrikyo in Northern
    California,
- speaker: Respondent
  text: we had better become Christians as America was a Christian country. My wife had been going to Methodist church ever
    since she was young. At the time we were going to get married I was still a Buddhist, but aS it was my mother's wish we
    decided to get married in a Christian
- speaker: Respondent
  text: church. Then a monister baptized me and I became a Christian. Do you remember the name of the ship on which you came
    to America? It was a small ship named Nihon Maru. It was the last voyage for that ship from Japan. In Japan they say that
    the sea is roughest in February and August. I left Kobe on 3rd or 4th of March, went ta Kobe and stayed there for a day.
    Then we continued the voyage. We arrived in San Francisco at night of March 30, and landed on
- speaker: Interviewer
  text: 'March 31. It t@ok almost a month. : Did you say it was in 1921? Yes, it was. It was the last voyage for Nihon Maru.'
- speaker: Interviewer
  text: ': What kind of people were on board the ship? Were there anybody you : Did you learn about America through your brother''s
    letters?'
- speaker: Respondent
  text: 'It wasn''t a wreckless act to come to America from Wakayama Prefecture in those days, wasn''t it? : No, it wasn''t,
    as many people came to America from Wakayama Prefecture. I had been dreaming about living in a stately brick house when
    we landed in San Francisco. We got on board a train from San Francisco to Fresno. As the train went southward, I asked
    my sister'
- speaker: Respondent
  text: if. the house we were going to live was like this or like that, but she did not give me a definite answer. In those
    days even Americans
- speaker: Respondent
  text: in the country lived in humble cottages you cannot imagine now, without electricity but only lamps. That was the kind
    of house we were
- speaker: Respondent
  text: At grape harvesting season the number of workers in crease, so I have lived in such a place. When I lied down on the
    bed I could see the stars. Unlike Japanese houses, the roof was made of think board,
- speaker: Respondent
  text: and after being exposed to wind and rain for many years there were spaces between the boards. Large or small we had
    our own houses in Japan. For about 2 years I did not feel comfortable, and sdetimes
- speaker: Respondent
  text: I thought I would be better off if I went back to Japan. Even a man like me felt that way, so it is natural that picture
    brides had problems when they gothere. They received' pictures of their
- speaker: Respondent
  text: taken husbands-to-be,in nice suits in front of their landlords* nice homes, and did not know anything besides what
    they saw in the
- speaker: Interviewer
  text: ': De you have any trouble at : Did you hear stories about picture brides? How many days did you stay in San Francisco
    after you landed there?'
- speaker: Interviewer
  text: 'I stayed there for 3 nights to pick up my luggage. : What was your first impression of San Francisco then?'
- speaker: Respondent
  text: 'In those days most transportations were streetcars, so I hardly saw any buses or taxis like now. / : How did you
    feel when you landed an San Francisco and saw people'
- speaker: Respondent
  text: '''I realized that I came to a foreign country. I had seen some white people in Japan before, but every person who
    passed by were tall and had_ big noses. The ship I was on was a Japanese ship, and most of the passengers were Japanese,
    but when I landed in San Francisco'
- speaker: Respondent
  text: there were so many Americans that I realized that I came to a foreign country. 3 " the Immigration office? I came
    with a passport of a non-immigrant, so everything went
- speaker: Respondent
  text: 'smoothly. I was lucky in that respect. : Did you go straight to Fresno after staying in San Francisco 3 to'
- speaker: Interviewer
  text: 'Who else were there in Fresno? Was your father there, too? A: No, father was dead by then. As father died and my
    brother could'
- speaker: Respondent
  text: not summon me, he summoned mother, and mother summonded me.
- speaker: Interviewer
  text: 'Did you have one older brother? Was your mother livnhg there when you went there? A: Yes, she was. She was there
    only one year before she went back How was the language when you first got there?'
- speaker: Respondent
  text: I could get along with my broken English. The farm work is not very hard once I learned how to do it. I remember we
    pruned grape in winter. The forman taught me which branches to cut. Other men were older. Isseis in those days were between
    40 to 50 years old, but as I was only 19, they looked old to me.
- speaker: Respondent
  text: When I cut the branches, the forman came and told me that I Had" cut some good branches. Something like pruning takes
    skill and
- speaker: Interviewer
  text: 'Did you work with Isseis? Was the forman a white man? How was the life of Japanese farm laborers in those days? A:
    Some people lived in camps, where they had Japanese cooks who'
- speaker: Respondent
  text: prepared meals for them. In those days there were some Japanese food such as dried mushrooms and kanpyo( dried gourd
    shavings)
- speaker: Interviewer
  text: Do you have any happy or sad memories of those days?
- speaker: Respondent
  text: When I was 17 or 18 years old in Japan I was a cunaene school and was not doing anything else much except helping
    with the housework during the vacation, so it was hard work for me to work from morning till night. After about two years
    I got used to the work and thought I could stand it. I was paid by the hour.
- speaker: Interviewer
  text: How much were you paid?
- speaker: Respondent
  text: When I came here in 1921 the wage was 45 +6 50¢ an hour, so I earned $4.50 to $5 working 10 hours. Then the Depression
    came, and at its lowest point around 1929 to 1932 it came down to 15¢ an hour. Of course the cost of livng was cheap,
    too, in those days. By that time I was in dependent, and had a farm of my own, so I was lucky. I could hire laborers cheap,
    but the produce was cheap, too. It was quite easy for me to manage.
- speaker: Interviewer
  text: Did you do any' other work besides grape? Once my wife and I managed an apartment in Fresno city besides
- speaker: Respondent
  text: farming, 1 maindy prduced grape and fruits, but I also grew melon. Some years I had much profit, and other years Taid
    not
- speaker: Respondent
  text: Did you lease the land for farming? Yes, I did, but it was very in convenient . In those days the anti-Japanese land
    aat was in effect, and naturalized a liens could not own or lease land. As my wife had American citizenship we used her
    name, but before I got married I used the name of a Hawaiian who acquired American citizenship by fighting in the World
    War Il.
- speaker: Respondent
  text: Some white people who did not like Japanese frowned upon when Japanese tried to lease land, but on the other hand
    there were
- speaker: Respondent
  text: 'some white people who werevery kind to Japanese. : What kind of or ganizations were there that helped Japanese in'
- speaker: Interviewer
  text: those days? Japanese Association was the one and only political organization. Whenever there was any trouble between
    Japanese and Americans
- speaker: Interviewer
  text: 'they took the trouble of mediating, : Was it just in Central California? : Each area had its own Japanese Association,
    and there was the'
- speaker: Interviewer
  text: Federation of all Japanese Association on top of them. Were there associations of people from different prefectures?
    the
- speaker: Respondent
  text: ': There were prefectural associations under Japanese Association. tn Central California - there were many people
    from Hiroshima Prefecture, and they organized Hiroshima Kenjin-Kai and were doing well, so I organized'
- speaker: Respondent
  text: the Wakayama Kenjin-Kai. When the World 'lar II broke out and we were evacuated it became extinct. When. we cane home
    after the war we were so busy with rebuilding our lives that we did not have time to organize the Kenjin-Kai. Moreover,
    counties and cities did not like Japanese to establish such organizations
- speaker: Respondent
  text: in those days. It is not like that now. Didn't you get any help from churches? They were kind to us when we evacuated.
    Especially the opinions of religious organizations were regarded quite seriously. At that time I felt thankful that I
    belonged to a Christian church. At first we were put in a makeship assembly center in Fresno. We
- speaker: Respondent
  text: were allowed to take only a limited a mount of belongings, yo I -went there with nothing but the clothes I was wearing.
    We were
- speaker: Respondent
  text: taken there by a bus from Selma. The ladies froup from the white churches served refreshments and comforted us. When
    I think back about that time my heart is filled with deep emotion.
- speaker: Interviewer
  text: Did you get married before the war or after the war?
- speaker: Respondent
  text: ': It was before the war. We were married in 1932, at the bottom of'
- speaker: Interviewer
  text: How - the lives of Japanese around here during the Depression?
- speaker: Respondent
  text: I leased the land and managed a farm. In those days you could not make the ends meet if you owned the land. People
    who did not own land were better off. If you do not in vest money in to ols, and
- speaker: Respondent
  text: using the landlord's tool _ provide only the labor, you get some in come. But if you manage your own farm, you have
    to make payments
- speaker: Respondent
  text: on land, and you might get in red when you shipped fruits. In those days many people had Bank Of America reclaim _
    the land as they could not make payments.
- speaker: Interviewer
  text: Were there any people who found tt.hard to make their living?
- speaker: Respondent
  text: There may have been some, but in those days Japanese helped each other. Nowadays if you want to start a business and
    need the money, you can borrow it from banks if you have some security, but in those days Japanese did not have any fixed
    property, so the banks did not lend them any money. Therefore, people lend - = money a mong friends and helped each other.
    In those days people helped each other in such warmhearted way that is unbelievable nowadays..
- speaker: Interviewer
  text: Do you know of any story of Japanese helping each other? In those days some people around Dinuba planted string beans,
- speaker: Respondent
  text: 'to matoe and cucumber in winter and harvested them in early spring. They took the crop to markets and made good profit.
    It took about #300 to grow lacre of those produce, and $3,000 for 10 acres, but it was hard to collect that much money,
    so 4 to. 5 people put out some money each month to help. One year we made a big profit, but'
- speaker: Respondent
  text: on the other hand we lost money some years. There wére.countless::! times we tided over difficult situations.
- speaker: Respondent
  text: 'do net K: We farmers, know anything but farming. I always thought it would be better if farmers take their produce
    directly to the market instead of having the brokers handle the produce. Therefore'
- speaker: Respondent
  text: I bought two trucks and went into trucking business once. I packed the table grape I produced -and took them to the
    market in San Francisco and Oakland. That was before I got married. I think it was around 1925 or 26. The market.in San
    Francisco opened around 1 or 2 A.M., so I used to leave here around 10 o*clock the night before. One night my truck broke
    down in Turlock. The axel of the truck was broken, sol pulled on the roadside. It was around 1l B.M. and no garage was
    open, so lI thouhgt I had to spend the night there. I put red lanterns in front and back of the truck and was waiting
    for the dawn. Then a car came by with an old couple in it. The man asked me what had happened, so I told him that the
    axel of my truck was broken and I could not go to the market. He told me that no garage was open but he knew thehousecof
    a mechanic, so he would take me there. When we got there the boss of the garage said he would
- speaker: Respondent
  text: send for the part from a factay in Stockton by the first bus in the morning. It was around 1 A.M. The gentleman took
    me to his house and took care of i serving me coffee. While we were talking I saw a picture of Jesus in the parlor, aiid
    I found out that he was a devout Christian.
- speaker: Respondent
  text: As he talked I could not understand some, but I understood most of what he said. I thought Christianity was a religion
    of love
- speaker: Respondent
  text: and it was a good religion. I had no in tention of converting, but I could not forget what I learned through the good
    deed. Lt é remember was 1924 or 1925, about 50 years ago but I can still le face.
- speaker: Interviewer
  text: 'Have you met him since then? A: Yes, every time I went by his house I took some grape and or fange.'
- speaker: Respondent
  text: He was quite old then, so I think he has passed away by now.
- speaker: Interviewer
  text: How did you meet your wife?
- speaker: Respondent
  text: In those days there were matchmakers. I had a friend who was an imsurance a gent. He lived in Fresno. My wife was
    from Lemore in Turare County, and her father was farming there. As I was farming by myself he told me that I should get
    married as it would be in convenient to live a lone. Jokingly I asked him to find a suitable wife for me, so he introduced
    her to me. I did not know her till then. In olden days in Japan people checked family lineage before marriage. People
    a voided families which had bad reputation. As she was from the same village in Japan we could check her family
- speaker: Interviewer
  text: Were you 26 years old then? I was 27 or 28 years old. How were the weddings in those days?
- speaker: Respondent
  text: In those days there were two go-betweens; one representing Kurokawa family, and the other representing the bride's
    family. As the insurance business was prosperous, he said we should have a big wedding, so we had a big wedding for those
    days. ~ the wedding took place at a Methdist Church in Fresno.
- speaker: Interviewer
  text: Is your brother still living here?
- speaker: Respondent
  text: 'A: No, he died in 1963. Didn*t he go back to Japan? No, he didn''t. I had 6 cousins living in Brazil. When they went
    there I gave them some American dollars to buy land there. Two cousins are growing tea and rice, and their younger brother
    had'
- speaker: Respondent
  text: 'a grocery store in San Paulo. As we were so to speak partners they wanted us to visit them, so we went there in 1963.
    The life style in the city of San Paulo was not much different from here, but the tea was grown in the country. It was
    grown on the slope of a hill so that the water would run downhill when it eanaak They grow rice on the flat ground. When
    we arrived there we received a telegram from my: sister-in-law saying has my brother was seriously ill. The next moring
    we recieved anther telegram Saying that he had passed away. As we had just got there, we did'
- speaker: Interviewer
  text: 'not go back for the funeral. : Didn/t you see him on his deathbed? : No, we didn''t. I don''tknow why but it always
    happens that way.'
- speaker: Respondent
  text: Before my mother passed away in 1945 we received a telegram from Japan telling us that she was seriously ill. We were
    getting ready to go back to Japan, but in those days we could not leave America until we wrote to Washington and got a
    permission to leave as we were considered enemy a liens. I was told that it would take about a month to get that permission.
    Then we heard that my mother had passed away. It was no use going back to
- speaker: Respondent
  text: Japan after she died, and further more we had not received the persmission to leave, so we did not go back to Japan.
- speaker: Interviewer
  text: How many children do you have? I have 3 children; one son and two daughters. '
- speaker: Respondent
  text: ': Where and how did you find out about the Pearl Harbor attack? : It was Sunday morning. In those days we were living
    in Madera. That morning I had taken my oldest daughter to the Japanese Language school and came back. When I picked her
    up from school and came home she told me that Japanese seemed to have attacked Pearl Harbor. That was the first time I
    heard the news. We were expecting something like that might happen sooner or later, but we did not think it would happen
    so suddenly. In those days I used to listen to news from Japan by a short wave radio.'
- speaker: Respondent
  text: Two days after the Pearl Harbor attack, the sheriff of Madera County came to my house with two deputy sheriffs to
    search my house. At that time my two daughters had gone to school, but my youngest son had a cold so he was staying home
    and was listening to the radio. They came in the house and started looking around the house. They asked me why the boy
    was not in school, so I told them that I had let him stay home as he had a cold. They started asking me if I had cameras
    or rifles. I told them I had one or two rifles, so they listed them. In those days we lived in a We had a habit of buying
    a whole years spply a renics when it came out in mid-Octoter or in November and stored them. At that time I had 15 sacks
    of 100l1bs bags of rice. A friend of mine who had a
- speaker: Respondent
  text: meqlet grocery store in Hawaii told me that sugar may become short, so I had bought 400 pounds of sugar. I had put
    them in boxes that we put
- speaker: Respondent
  text: 200 pounds of raisin. I had put 2,000 pounds of rice-and sugar in sacks, and putting 2 sacks in each box piled the
    boxes, The sheriff asked me what I was going to do storing so much food. He asked me if I was going to feed the Japanese
    Army when they landed
- speaker: Respondent
  text: here. I didn'tknow if he was joking or not, but I did not feel comfortable. I had put some clothes we did not wear
    ane ers trunks and put them upstairs. They asked me what were in the trunk, so I told them that there were some clothes
    we did not use everyday in them. The sheriff told me to open the trunks, so I went downstairs and got a key bunch. I knew
    there was a portrait of the Emperor and a Japanese sword in one of. the trunks. We were told that Dr. Taira's father was
    arrested by FBI and was taken away for having the Emperor's portrait, so we had telephone message to - destroy or hide
    the Emperor's portraits. I had hidden it between
- speaker: Respondent
  text: a quilt in a trunk. As I tried to open the trunks my had trembled and none of the keys opened the trunk, and I did
    not know what to
- speaker: Respondent
  text: do. Then the sheriff told me that I did not have to open the trunks, so I was saved. After the Manchurian War the
    military music was popular in Japan, and many people around here had records. I had many of them, so I broke and buried
    many of them, but I had kept some of them in the trunk. I was worried they would find then, but I was glad I did not have
    to open the trunk.
- speaker: Interviewer
  text: Did the sheriff go back after that' He told me to bring the radio and the rifle to the sheriff's office
- speaker: Respondent
  text: so I took them there a few days later.
- speaker: Interviewer
  text: 'Do you remember if there were anything besides radio and rifle? . What about cameras? A: We took cameras, also. A
    few weeks later we were told to pick up the radio. They had disassembled the shortwave radio so that we could not listen
    to the shortwave but we could listen to the local'
- speaker: Respondent
  text: news. In those days we wanted to listen to Japanese news such as the announcement from the Imperial Headquarters.
- speaker: Interviewer
  text: Weren't you suspected? No, not specially. That was the end of it. I heard that some ministers, especially Buddhist
    ministers and officers of Kenjin Kai were suspected. Did you have such experience?
- speaker: Respondent
  text: Two or three newspapermen from Fresno were arrested. In those days late Mr. Sakamoto who was the president of the
    Japanese Association knew the sheriff well. He asked the sheriff not to jarrest any more Japanese as we would not sabotage
    against the government, and when the order comes from the government for us to evacuate we would obey the order and evacuate.
    He also sent a cable to a Congressman in Washington asking him to help us stating our position. The Congressman helped
    us, too. Central pera a was good on the whole,
- speaker: Respondent
  text: but Delano was not. All Japanese men ,were arrested no matter what their occupations were.
- speaker: Interviewer
  text: How old were your oldest child then?
- speaker: Respondent
  text: A:She was 9, the next one was 7 and the youngest son was 5%
- speaker: Interviewer
  text: When did you enter the assembly center? It was in May of 1942. It was on my birthday. How was your life from the time
    of Pearl Harbor attack and the time you went into the assembly center?
- speaker: Interviewer
  text: There was a standstill order and.we could not go outside the 5-miles radius from home. We had to get permission to
    go to Fresno. It was
- speaker: Respondent
  text: almost impossible to go anywhere.
- speaker: Interviewer
  text: 'Jas the order for all Japanese? Yes, it was applied to all Japanese What had become of people who had been teaching
    at Japanese language schools? A: I heard that Japanese teachers of Madera Japanese Language School'
- speaker: Respondent
  text: were questioned but they were not arrested.
- speaker: Interviewer
  text: What was the attitude of your white friends?
- speaker: Respondent
  text: Their attitude changed. For in stance, the landlord whoses ranch I worked for over 10 years did not pay me about $2,000
    which was coming to me on the strength of the law that stated they could not pay more than the living allowance to a liens
    at one time. But as l
- speaker: Respondent
  text: had taken steps to collect it, it was sent to me through the attorney when we went to the relocation center in Arizona.
- speaker: Respondent
  text: ': How did you go to the assembly center from Madera? A: We went there by a car,.and the person who bought the car
    drove it back from there. The a mount of luggage we could take was very limited, so we could only take something kike
    an overnight suitcase.'
- speaker: Interviewer
  text: 'How long did you stay at the assembly center? We were there for about 24 months. Did you stay there till around the
    end of July or first: part of August? Yes, till around the latter part of July. Whereabout in Arizona did you go to?'
- speaker: Respondent
  text: We went to Camp II in Gita, Arizona, which was about 40 miles from Phoenix. There were Camp I and Camp II in Gila.
    The capacity of
- speaker: Interviewer
  text: Camp II was around 22,000 to 23,000. What was your biggest worries when you went to the assembly center?
- speaker: Respondent
  text: I was most concerned about the children's education. When a large 'group of people live together, there are many children
    who are around the same age as yours outside yowr door. Of course there were grade school to highschool in relocation
    centers. There were regular teachers but most of them were temporary teachers, so the
- speaker: Respondent
  text: quality of education was not like the public school outside. I think that was the biggest concern of the parents who
    had children.
- speaker: Interviewer
  text: ': Were you worried as to what would become of them in the future? Whom could you consult with when you had such concers?'
- speaker: Respondent
  text: ': Higher ups in the administration office and ministers of different religion gave consel and helped us in many ways.
    Quite a few people who never knew about Christianity before they went to camp were led to Christianity through the pastors''
    kindness and were baptized in the camp. Even tha Buddhist boys and girls who did'
- speaker: Respondent
  text: 'not believe in any religion were married by Christian pastors. : How was it when you went from the assembly center
    to the relocation'
- speaker: Respondent
  text: ': At that time we werevery lonely. The ladies of a church in Selma encouraged us saying, "We don''tthink that kind
    of condition will last long. Ie will remember you in our prayers, so please be'
- speaker: Respondent
  text: 'patient. Before long favorable time will come for Japanese." : Did you go to Gila by a train? : Yes, we did. We could
    not see outside as the blinds were closed,'
- speaker: Interviewer
  text: 'so we did not know where we were. There were MPs on each coach. : It must have been a hard trip in summer with children?'
- speaker: Respondent
  text: ': Yes, it was. Out youngest son was 5 years old, so it was not too bad, but it was hard for people with babies. -'
- speaker: Interviewer
  text: About how many days did it take to go from here to Gila? We lefthere in the morning and arrived there late that afternoon.
    Then you didn'thave to sleep on the train, didn*t you?
- speaker: Respondent
  text: No, we didn't. But when we arrived there it was raining hard. I heard that it didn'train much in Arizona, but we were
    caught in a heavy rain storm. By the time we arrived there the barracks were almost ready, but such things as water pipes
    were not quite ready, so we wanted to dig the ground. Anyway, such a huge installation was built in the middle of the
    desert, so it was not
