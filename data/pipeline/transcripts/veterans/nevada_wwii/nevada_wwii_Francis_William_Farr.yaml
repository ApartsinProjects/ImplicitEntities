collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: 'From Fort Douglas we were shipped to Fort McClellan, Alabama, for basic training. It was as different from our introductory
    training as day and night. We were introduced to Tech Sergeant Meadows. He was the toughest, meanest, most foul-mouthed
    person I had ever met. I had never heard those kinds of words - telling you to "F-this" and "F-that," and telling us:
    "Come on you dog faces; line up!" But if this is what it took, I wanted to become like him. He wasn''t going to wear me
    down.'
- speaker: Respondent
  text: I had more skills than some of the others. I had hunted and been a Boy Scout, and could shoot and use a compass, so
    the sergeant called out Leo and me to be squad leaders. We learned to handle arms, what a rifle was - and it was not a
    gun! It was a "piece." And you had better know every damn piece of this "piece" so that you can clean it and take care
    of it. It was very regimented. Tough, but meaningful later.
- speaker: Respondent
  text: At the time we thought, "Why are you doing this? I can take this apart, put it together and clean it. Right?" Later
    it paid off. We learned to protect each other. We learned various formations. We learned to shoot a rifle. We learned
    to throw grenades. We learned to run obstacle courses. We learned competitiveness. If you run that obstacle course and
    beat everyone else, you got a weekend pass; otherwise, you have to stay in camp.
- speaker: Respondent
  text: Basic training was really tough, physically and mentally both. We trained from 5:45 a.m. to 8:00 at night with breaks
    for dinner and supper, and every hour we got a ten minute break. Since I didn't smoke, during breaks they gave me extra
    things to do while the other guys had a cigarette. I decided to smoke!
- speaker: Respondent
  text: After the first six week we had very little time off. We were in classrooms all day learning about the enemy - what
    they were, what they looked like, what they smelled like. We learned to identify their equipment, and then the next day
    we would go out on the range and listen to their weapons firing and listen to our weapons so we could detect the difference.
    We learned the art of self defense and hand-to-hand combat. We were told that the Germans were big and strong and totally
    regimented, so you could parry their weapons to the left and give them a butt stroke or a slash. For the Japanese, however,
    you had to learn to use your hands and your knife - it was more physical one-on-one kind of confrontations.
- speaker: Respondent
  text: 'I didn''t think I would have any problem whatsoever with killing, but I was not really shooting or being shot at.
    I was playing a game of war. We would choose sides, red and blue, and it was a challenge for me to beat the other team
    - to go beyond what we were taught and use our own initiative. One time I walked maybe six, seven kilometers out of the
    way to be able to get back to the headquarters of the red team and capture them while crawling through the mud. We had
    a motto: "You kill or be killed." That was pretty plain, but it was still play.'
- speaker: Respondent
  text: We'd get off on weekends and we could do anything we wanted, but I had never been exposed to any kind of boozing or
    smoking or girls. In fact, the military training about girls made you afraid to touch one, because they showed you what
    syphilis, gonorrhea, and all those things did to people. They issued condoms to all soldiers; but we were scared, even
    though our hormones were running wild. I thought, "I would like to kiss a girl, because this might be the last girl I'll
    ever meet in my life or ever see." I hadn't even held a girl yet. I met one girl and we dated a couple of times, held
    hands, and kissed ... but I didn't know anything about sex. I was trying to encourage it, but scared to death because
    of these films, and I certainly didn't want to hurt a girl; I had learned to respect them.
- speaker: Respondent
  text: On graduation day, because we had done such a good job in our training, the three of us from Sparks were selected
    to remain as training cadre for the new recruits. It broke our hearts, because we had wanted to go into combat. But now
    I become Tech Sergeant Meadows! I stood up in front, and I saluted my platoon every morning and had them count off "Dress
    right, dress! Attention! Report!" That's pretty good. Now I'm telling these people what to do rather than someone telling
    me. Several people from the Citadel, V.M.I., and Georgia Tech came to McClellan. They had had three years of college and
    were very well educated, but here I am - a kid who dropped out of high school with a foul mouth, who no longer uses proper
    English and has become a tough drill sergeant - telling these people what to do, when to do it, how to do it, where to
    do it, and why to do it.
- speaker: Respondent
  text: One day Jack Streeter came into camp and was assigned to a hut right next to mine. He was older than I was, but he
    was from my hometown, and I was calling him out, standing him at attention, turning him right and left. He said, "They
    shipped me down here for training, and I don't need any so-and-so training. I want to get the hell out of here." One day
    he got very angry and walked into one of the huts across the parade ground and talked to the commanding officer, challenging
    him to fisticuffs if he did not ship him out of there. Within days he was assigned to the 1st Division, which was invading
    North Africa.
- speaker: Respondent
  text: I continued there for a month or two, but I figured I had reached my apex - the peak of my training. I was as tough
    and as strong as I could be. I wanted to go into combat. On July 1st, I finally went up to the commanding officer and
    asked them if they would ship me out.
- speaker: Respondent
  text: We sailed for five days on the S.S. Manhattan, crowded in with our packs and our clothing and our shoes and our rifles
    and our bandoliers, which held ammunition. Combat ready. The trip was no pleasure cruise. We were crowded and seasick
    and could only be on deck for a couple hours each day. As we unloaded in Liverpool, England, these little kids were screaming
    because they were so hungry, so we were throwing our candy bars and our rations down to them. They'd dive in the water,
    and boy, they were good swimmers. Pretty soon we started throwing money, too. We thought we could feed them. I had received
    some of the best food during training, and they weren't getting anything. I flashed back to the days during the Depression
    when I stood in line with my grandfather, who was crippled, to receive moldy cheese and grapefruit and crackers. I remembered
    what it was like to be hungry.
- speaker: Respondent
  text: The invasion had already started, and I was assigned to a replacement depot outside of Liverpool. Every day we were
    trained, then sat around and waited, and trained and sat around and waited. One day they came in and called our names
    and we loaded up on trucks. We went back to the wharf and were put on a carrier. I was assigned to the 28th Infantry Division.
    I was replacing a platoon leader who had been lost, so I was promoted right there on the spot to staff sergeant.
- speaker: Respondent
  text: We landed on Omaha Beach on the 16th of July, and everything was moving off the beach, up over into the flatlands
    and the hedgerows. As I hit the beach, downed planes were still smoking from the original invasion weeks before, and I
    saw the wrecked vehicles and all the debris. The 28th had moved forward seven or eight kilometers from the beach, and
    I set out to join them. I was carrying this seventy-pound pack, climbing up the cliffs our soldiers had fought for. When
    I got to the top I said, "I can't carry all this crap and still be effective." So I took off my pack and threw everything
    away. I kept only my shelter half, four grenades, my rifle, my first aid pack, my water, my gun belt, and two bandoliers
    of ammunition.
- speaker: Respondent
  text: That evening I made it to my division. It was dark and spooky and scary, and there was a certain smell that I had
    never smelled before . . . diesel fuel and death. And I had seen my first dead soldiers, Germans half buried, still on
    the ground. We were dug in, and I didn't know where . . . didn't know north, south, east, or west. Off in the distance
    we could hear shelling and shooting, but we weren't really involved with it right there. I now had eleven men that I was
    responsible for, so I went from hole to hole to hole and introduced myself. I felt a little bit out of place, because
    they all had a 28th Infantry Division insignia on their uniforms, which the Germans called the "The Bloody Bucket."
- speaker: Respondent
  text: I had my riflemen, my scouts, and my BAR man, who had the Browning Automatic Rifle that shoots very rapidly. He carries
    many clips of ammunition and is a person you rely on to give you rapid fire, to be able to cover you and everyone else
    as you engage the enemy. Each squad had some rapid firepower, plus their own weapons, which mostly were all M-l's - an
    eight-round rifle that you shove ammunition into while it shoots semi-automatically, and the clip flies out. For survival,
    each of us was issued what we called an "asshole compass" - a thumbnail compass, very small - and an overlay of France
    up through Paris on silk. I put that in the fly in my trousers, so if I was captured and they were frisking me, they wouldn't
    find it.
- speaker: Respondent
  text: 'The next morning, all I could see were hedgerows and flat land. There was all kinds of activity, but still we had
    not engaged in any combat. We were ordered to advance forward, but the Germans had machine guns zeroed in at the exact
    height of these hedgerows. As we crawled over, they just shot the shit out of us! I''d never seen paratroopers shot and
    hanging from their parachutes in the trees. This wasn''t what I was trained for. I was trained in open fields in Alabama,
    and I''d never seen a hedgerow in my life! I was scared to death! But I knew I had a duty to perform: either kill or be
    killed.'
- speaker: Respondent
  text: We couldn't go forward, so we held a little conference and decided that rather than go over, we'd start digging. Once
    we had a little embrasure through the hedgerow, we could start firing and reduce their fire. Well, several days went by,
    and we didn't progress very well. Finally, we brought up some TDs - tank destroyers - to fire at the Germans, because
    they had some huge 88s sitting over there, and they were in position to just blow us out! Soon after, our tanks arrived
    with huge teeth on the front of them for ripping through hedgerows. I was assigned to protect one of these as it cut big
    swaths through the hedgerows so we could go through. After that we advanced quite rapidly from July until August.
- speaker: Respondent
  text: While fighting, we heard a rumor that there was going to be a massive airstrike on St. Lo. We were supposed to withdraw
    twelve kilometers, because it was going to be the bombing of all bombings. Somehow the message got mixed up, and we only
    withdrew six kilometers, so we were still within range of the bombing smoke put out for the airplanes to locate and bomb
    the town. While my platoon and I were eating K rations at 0600 one morning, we heard some airplanes. They started bombing
    off in the distance about a mile from us. There were thousands of them, and it went on until 1300, one right after another.
    In the end, we found out that 5,000 airplanes flew that day. It was terrible. We laid there with the vibrations of bombs
    for seven hours. Unbelievable! Just massive fire! Our ears were ringing - it was a horrible noise! Two or three days later
    we found out that General McNair and his people were within the perimeter of the smoke, and he was killed by our own bombs.
    A lot of our people were killed by our own bombing.
- speaker: Respondent
  text: When we went through St. Lo, we marched down some of the dirtiest, dustiest streets I've ever seen. There were human
    bodies everywhere, German soldiers, and the buildings were a mess. I didn't see any life whatsoever. And now I knew that
    we were at war. So far I had not shot anyone, although I had fired my weapon in the hedgerows. The combat divisions that
    had experience in North Africa were up front, and we were being held in reserve.
- speaker: Respondent
  text: On the morning we were going to engage the enemy for the first time, I saw this huge headquarters off in the distance
    with big German flags, and Germans all over the area. You could hear them making all kinds of noises and shouting, because
    they had not seen us yet. When we came out of the forest, we jumped into some of these hedgerows and got behind them.
    As we attacked, an amphibious jeep was going right across in front of us. We fired on it and killed them. Then we started
    firing on the headquarters, and people came running out. We threw grenades into the building. Then we went inside.
- speaker: Respondent
  text: I went up on the second floor and got this flag that I had focused on during the fight. I wanted that flag for a souvenir.
    I also saw a rifle with a beautiful scope on it, and I wanted that, so I broke it off and wrapped it in this flag and
    put it in my shirt. That's when I was told that if you carry any German paraphernalia whatsoever, and are captured, they
    will cut off your penis and your private parts and shove them in your mouth! So we were pretty scared. But I still thought
    "Hey, if I survive, I've got it! If I don't survive, I won't know, and they're not going to capture me!" I mean, I had
    that kind of confidence. Nobody was going to capture me.
- speaker: Respondent
  text: We marched for another day and a half without engaging any enemy. Every night we would change our code messages so
    that we could identify who the enemy was and who they were not. For example, one night it would be "Babe Ruth." You would
    challenge somebody and say, "Halt, Babe!" and if they said, "Ruth," we'd let them come in. The next day you'd change that
    same word to Chicago, Illinois; the next day to Frank Sinatra. You remembered that password from day to day, because it
    was your life.
- speaker: Respondent
  text: 'One night after we dug in, a tank driver walked into our positions with two guys. For some reason or other, we were
    being very lax, so we didn''t fire on him. He started talking to us: "Hey, I got a tank down here, and it''s in real serious
    trouble, and the Germans are on the other side. Would you guys come down and help me?" He had on these coveralls and a
    tank helmet, and he looked like an American tank guy; he talked like an American tank guy. I said, "Sure, we''ll move
    on down there and take a look."'
- speaker: Respondent
  text: We started down this little ravine. I took my BAR man with me; I took the squad rather than the whole platoon. It's
    twilight, and just as we leveled out, this guy yelled something. I'll never forget this as long as I live. Two German
    machine guns opened up on us. We hit the ground. Unfortunately, some of my guys were hit. They had us pinned down. We
    could not move, so I started crawling. We'd learned to stay as low as you can and just inch forward. The first thing you
    do when you hit the ground is push up a little dirt with the butt of the rifle.
- speaker: Respondent
  text: There was a lull, just for a second. Then CLICK! Like metal hitting metal! The machine gun stopped, and my BAR man
    and I jumped up, and he started firing the BAR while I jumped in this hole with these guys - Germans. I grabbed one guy,
    and he throws his hand up, "Oh, me Polak. Me Polak. Don't shoot!" I turned the son of a bitch over and pok
