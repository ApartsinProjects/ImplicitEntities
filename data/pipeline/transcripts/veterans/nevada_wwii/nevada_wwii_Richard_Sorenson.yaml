collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: After basic training I was assigned to the 3rd Battalion of the 24th Regiment, 4th Marine Division. We trained from
    the end of February, 1943, until we left for combat on January 13th of 1944, and our training was very extensive. We first
    trained as a platoon of three machine gun squads, and then we trained with infantry companies which we were supporting
    - each machine gun squad was assigned to a platoon of infantry. We were in line, firing over the heads of the troops at
    night. During the day we'd set up our machine guns by digging a gun emplacement and putting the machine gun in there,
    and then making out what they called a range card. On a 180 degree fan from your gun, you'd mark every tree, every mound,
    every feature of the terrain. Then you would memorize the exact location of each feature so that you knew the number of
    clicks of deflection and elevation required to train your gun on it. We also memorized the clicks of elevation to fire
    over mounds or rises so that if any enemy troops were coming in at any sector, you could cover them at night.
- speaker: Respondent
  text: We had a nine-man squad. The positions were gunner, assistant gunner, third man, and then six men behind them who
    carried ammo. Each half hour, you rotated - the gunman moved back to the ninth man position, and everybody else moved
    up one. That way everybody learned everybody else's job, so that in combat, when one of the squad got wounded or killed,
    everybody knew what his job was and could rotate into it and perform it.
- speaker: Respondent
  text: In combat, people get killed. This is drilled into you; it's common knowledge; but you always feel that it's going
    to be somebody else and not you. We were trained to kill and destroy, because that's the only purpose of the military
    in wartime. As gloomy as it may be, it's a fact of life. We were told "It's either you or the enemy, and make damn sure
    it's the enemy that dies." As our sergeant once said, "Any fool can die for his country, but you're going to live for
    yours." That's the attitude we had - we weren't going to die; it was the enemy that was going to die.
- speaker: Respondent
  text: In January, 1944, we boarded a ship and sailed to Hawaii, where we stayed overnight. We took on fresh fruit, and we
    took on fuel, and then the next morning we pulled out to rendezvous with the rest of an invasion force. In addition to
    our Marine division they'd brought in the Army's Seventh Infantry Division. The task force was made up of aircraft carriers,
    six battlewagons, I don't know how many cruisers, and a whole host of destroyers. And we were right in the center of the
    convoy.
- speaker: Respondent
  text: The rumor was we were headed for Truk, which would have been a pretty bloody battle. Truk was north of the Marshall
    Islands, and it was well fortified by the Japanese, in an area that we had bombed till there was hardly anything left
    of it. But the high command had decided we should go right into the center of the Marshall Islands. There were a lot of
    objections, even from Washington, because we could literally be cut off there, since other fortified islands were further
    to the east.
- speaker: Respondent
  text: We were about four days out when an officer called our platoon together. It was then that we learned we would be landing
    at Kwajalein, on Namur island. They took us up where they had a mock-up of the island, and showed us where each unit was
    going to land. We were told we would be in the first wave, landing just left of the pier, and we were told what our objective
    was going to be. The mock-up showed all the pill boxes and the blockhouses, emplacements, tank traps, and all the obstacles
    that we would run into. It also showed the roads that were on the island, although you couldn't find them after the battle
    started - you just followed the shell fire and the destruction.
- speaker: Respondent
  text: That night it was raining and we were sitting on the deck talking, and one of the guys said, "Well, when we land and
    we get into fighting, what happens if a grenade comes into our hole?" I said, "Somebody will have to take it, because
    we've got to keep that gun in action." (The important thing, as far as our squad was concerned, was to keep that gun operating
    because we were in support of the infantry.) One of the guys said, "You shouldn't talk about that!" But lo and behold,
    the next day that's just what happened!
- speaker: Respondent
  text: On the morning of the landing we knew exactly where we would land, what our objective was, when we were expected to
    reach it, and what kind of opposition we would get. LSTs (Landing Ship Tanks) had already landed troops at five small
    islands off shore. Only one was occupied, and it was only occupied by a couple of squads of Japanese who offered practically
    no resistance. Our artillery batteries had set up there to give us support for our landing. In addition, the battlewagons
    had been shelling the island for about three days, and the cruisers and destroyers had moved in, and they were giving
    us fire support.
- speaker: Respondent
  text: Aboard ship we were getting our guns and ammunition ready, and they issued us machetes and gas masks and all these
    things. We were also issued our live grenades - six grenades and a hundred-and-sixty rounds of ammunition. Fully loaded,
    we carried about eighty pounds of equipment on us, not counting the weight of the ammunition boxes for the machine gun.
- speaker: Respondent
  text: Once inside the lagoon we set up on the weather deck, because they didn't have room for us below. We're sitting there
    going over our objective, where we were going to land, and all these sorts of things, but nothing is happening. In taking
    the artillery to the little islands some of the landing craft got lost coming back to their mother ships, and it delayed
    our going in to the beach. Finally we disembarked into the LSTs; instead of landing at eight o'clock, we didn't land until
    noon.
- speaker: Respondent
  text: 'We hit the beach and had gone in about a hundred yards, and I was in a hole with another guy. We were spread out:
    the gun was up ahead and we were coming up with the ammo. We were leaning against the east side of this big crater made
    by a sixteen-inch shell from a battleship, when all of a sudden the earth just shook (I thought it was an earthquake),
    and then there was a tremendous blast. A Japanese blockhouse had been attacked by E Company, which didn''t know that the
    blockhouse was filled with torpedo warheads - thousands and thousands of pounds of high explosives. They threw a satchel
    charge up against the blockhouse and blew a hole in, and then threw another charge through the hole. She went up, and
    it looked like the whole island .... Pieces of concrete blew back and out, and sailors were wounded on the decks of the
    ships. Everything turned black with all the smoke and debris and concrete falling down. If we had been on the other side
    of our hole, we would have been buried in big chunks of concrete. The explosion practically wiped out E Company; they
    had about eighty percent casualties.'
- speaker: Respondent
  text: I was in the 3rd Battalion, which moved up and got up ahead. The regimental commander ordered us to pull back and
    line up with the 2nd Battalion so that we were not ahead of them, because sometimes units fire into their own troops.
    But we didn't all get the word. Thirty-six of us were still up there fighting when it got dark. The Navy sent up flares
    all night long to light up the battlefield. When one went up, you would freeze so the Japanese couldn't pick you out and
    shoot you, and then you would move again when it burned out. This went on all night.
- speaker: Respondent
  text: The next morning, as the sun comes up, we find that we're completely surrounded. Every direction we look, there are
    Japanese, [laughter] We started killing them as fast as we could, and they were shooting at us, and we ended up with about
    eighteen wounded men in our hole. We were practically out of ammunition, only had a few grenades with us, and we were
    catching mortar fire, machine gun fire, and rifle fire from our own troops back on the line, who were firing in because
    they didn't know we were there to stop the attack. Then a grenade was thrown into our hole.
- speaker: Respondent
  text: I didn't see it come in. Somebody yelled "grenade!" and I turned around and there it was. It was closest to me, so
    I went down on it. I remember it going off - it was like somebody was lifting me in the air. I went up, and I felt that
    I was just sitting in the air and then coming down, boom! I looked over, and nobody else was hit - they had all flattened
    out, you know.
- speaker: Respondent
  text: And then I felt sick to my stomach. I knew I was wounded, but the shock didn't register in my brain right away - the
    pain is so great that your brain cuts it off. You just know that you're hit and you get this sick feeling, at first in
    your stomach. Or at least I did. But I was conscious, and I handed three grenades over to one of the guys and took off
    my ammunition belt and then I just laid down. Somebody said, "You need to get away from here." So I crawled back to another
    hole and laid there, and a corpsman came over and put stuff on my wounds and tied off the artery in my leg. I put my arm
    up, and it was nothing but blood and pieces of skin, and the blood came streaming down into my eyes and ran down to the
    lower part of my body. The way the corpsman was looking at me just said, "Boy, you're not going to be around long."
- speaker: Respondent
  text: The other guys came by and looked at me. I said, "I need a cigarette." So one of the guys got out a cigarette and
    lit it. And I said, "God, I'm thirsty. I need some water." The corpsman said, "Oh, no! No water. You've got a stomach
    wound and you can't have any water." I was dying of thirst. I had two canteens of water with me, but I hadn't had time
    to drink any - all during that night and everything, I hadn't taken a drink ... and when you're losing blood you get terribly
    thirsty, because you're losing bodily fluids.
- speaker: Respondent
  text: The corpsman gave me a shot of morphine, and I started passing out, coming to, and passing out. That was just the
    start of the attack, and I remember thinking, "Geez, I hope the Japs don't get in on us, because then I'm a dead man.
    I have nothing to fight back with - no gun or ammunition." (If I had not fallen on that grenade, there would have been
    many other Marines wounded there in that hole; and if we had been overrun, the Japs would have slit our throats or shot
    us. We weren't taking any prisoners and neither were they.)
- speaker: Respondent
  text: Then they carried me out. We had just gotten out of the hole when a sniper hit one of the litter carriers. (We Marines
    used our bandsmen as litter carriers, and we lost a lot of bandsmen in the war.) Another fellow ran up and grabbed me.
    He took me down to the beach, and they put me on a landing craft. I looked over and here was a fellow from my platoon,
    Bob White. His whole arm was gone, cut off right below his shoulder. He had a tourniquet around it to stop the blood -
    he was bleeding very bad. I remember looking at him and he looked at me, and we both shook our heads. But I still didn't
    feel I was going to die. The next thing I remember is they were hoisting me up alongside the ship with a boom. My helmet
    came off, and I kept telling them that I needed it. I was in shock by then, I'm sure. They swung me up onto a Liberty
    ship, a troop carrier, and I blacked out.
- speaker: Respondent
  text: I was taken to the officers' wardroom, which they had made into an operating room. Two ship's doctors there saw all
    the seriously wounded Marines who were supposed to be taken out to the hospital ship. Next thing I remember was waking
    up and looking at these doctors who had just finished taking shrapnel out of me and pumping blood into me - three pints
    of whole blood and two of plasma. I said, "Doctors, I want to thank you for saving my life." Then I passed out again.
- speaker: Respondent
  text: I don't remember anything more for about three days. Then a corpsman came around, and he said, "You know, I was there
    with the doctors assisting the operation. When we looked at you we wouldn't give a plugged nickel for your life." He couldn't
    even get my pulse - he couldn't find a vein because I'd lost so much blood.
- speaker: Respondent
  text: We were in the harbor until the twelfth of February. During all that time I couldn't get up; I was lying there and
    they had the wounds open and I got gangrene infection. I knew that I was draining, and they had several tubes running
    out of me because my urethra was completely torn up. I was hit in the right leg and upper thigh, in the right arm, under
    the ankle, in the stomach and intestines ... among other places. I smelled terrible - I could smell these wounds, and
    they were all green. My arm was green where the wound was laid open to the bone. They took eleven pieces of shrapnel out
    of me, they said.
- speaker: Respondent
  text: Finally they took us wounded men off the ship, and the Navy had ambulances waiting for us. I had nothing covering
    me but bandages and a blanket, and I remember this nurse coming up. She was going to take the blanket off, and I wouldn't
    let go of that blanket. She said, "Son, there isn't anything you got that I haven't seen. Let go." So I let go of it because
    she was an officer and I'm just a private. You do what the officers say. [laughter] She looked at my wounds and said,
    "Take this man to urology." Over I went.
- speaker: Respondent
  text: Well, the urologist was Dr. Davidson, I'll never forget. (Tremendous. He was a Navy commander and had been years in
    urology.) "Buddy," he said, "we're going to have a difficult time. You're going to have to go through a series of operations.
    I don't know whether we're going to be successful or not because we have to rebuild your urinary canal completely."
- speaker: Respondent
  text: After all the shrapnel had been cut out of me and my wounds had healed to the point where I could walk, I was sent
    back to the Seattle Navy Hospital. There I endured a protracted series of operations on my bladder. After four months
    or so I was getting around all right, so I went on a work detail, because unless you were working you couldn't get liberty.
    I was supervising the digging up of shut-off valves for the water mains. We had one shovel and one pick, and a four or
    five man crew. I was in charge of four guys - two working and two who sat down, [laughter] I was doing that when the commanding
    general came around with the commanding officer of the hospital. He said, "What are you doing this for?"
- speaker: Respondent
  text: I said, "To earn liberty sir." He says, "Well, you don't have to do that anymore. You got open gate liberty and you're
    no longer a private. You're a PFC." They notified me that I was to receive the Medal of Honor, but they told me I couldn't
    say anything to anybody, not even my parents.
- speaker: Respondent
  text: Ten days before I was to be decorated I was called in to talk with Captain John T. Boone. He had received the Medal
    of Honor in World War I, having gone out under fire and brought back wounded Marines. He sat me down and talked to me
    for a good two hours, and he told me that I was going to get all kinds of publicity and people were going to make a big
    fuss over me. "You're going to be put on a pedestal," he said. "Just remember that whatever you do, people are going to
