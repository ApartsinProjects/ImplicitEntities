- speaker: Respondent
  text: Particularly those Sicilians down south - they had the lingo that even here in the states if you had to talk to one
    of them, I couldn'tmake out what they were saying. Was there a separation between the Sicilians and the northern Italians
    here in Reno? Well, normally...of course, you had to go to the Sicilians because there was no other Learning the Blacksmith
