    services, I think he went out of business. [The Bolletino was published in Reno from 1915 to 1944. - ed.] He had some
    of his nephews that was helping him, and they were picked up and went in the army, and it was left to him a lone and he
    quit. He went into the insurance business; his family has been in the insurance business ever since, up to this time.
    His grand-nephew or some of his relatives are still running the insurance company today. He passed away years ago. Can
    you remember what the editorial policy of that paper might have been? Can you remember what he might have been suggesting
    should be done? No, he was broad-minded in that respect. I couldn'tremember, because outside of so mebody getting married
    or... sometimes I would read about a wedding, but I never did subscribe to his paper.
- speaker: Respondent
  text: Did the Italian community get involved in politics? Not very well. And I'll tell you one point that makes you laugh.
    There was one saloon, the Bello Monte Bar, that was run by a man by the name of Louis Avanzino. He felt as though he was
    quite popular, and he knew all the ranchers up in the valley, the Truckee Meadows. At one time he decided that he would
    run for county commissioner or something to that effect. He got a horse and buggy from the livery stable, and he spent
    the whole day up in the valley telling these Italians that he's going to run for a certain position, so on, so forth -
    to vote for him. And everyone shook hands and promised him that they would vote. The day the election came along, he only
    had one vote from all the Italians in the valley. He was dumbfounded; he was taken by surprise. And after he thought it
    over considerably, he says, "I'm going to get that horse and buggy, go back and thank every one of those fellows for their
    cooperation in voting for me." So he took the same horse and buggy, went up in the valley, and he went to every house
    that he stopped at in the first place, and every one swore by him that that one vote, that that was his! [laughter] But
    it must have been at least 25 or 30 votes to be had, and he only had one. It sounds as if the Italians weren'tvery active
    politically, then? Well, he was well-liked to a certain extent, but he was sort of a tightwad, you know He wouldn'tgive
    a dime of his money to... and let you starve to death. And they knew it. Those guys there in the valley knew who he was!
    [laughs] Were there any social or fraternal organizations for Italians that were operating prior to the First World War?
    Not that I know of; there was no lodge or clubs or anything of that sort. Was there an Italian doctor that may have treated
    the...? Yes. His name was [Antonio] Minniggio. He was a very fine man and a very good doctor. And matter of fact, he was
    in Reno when I came here, and I became familiar with him or knew him since a couple of years after I was here.
- speaker: Respondent
  text: He lived to be 89 or 90 years of age. He was going from the Washoe General Hospital to Saint Mary's Hospital...walk,
    hike. And on the way from one place to the next, sometimes he had many customers that he would stop to see, and he would
    make house visits. Some patients he treated with on ion packs, bacon around the neck, and other home remedies. But I felt
