    go to court and fight the senator to get my money, because he's too big!" That would have been in the 1930s, though, more
    than likely. Yes. I know that you have an in terest in sports. You've had an in terest in sports all you life, as I understand
    it. To a certain extent, yes. I wasn'tcrazy or drop everything that I was doing to go to the fights, but I don'tthink
    I missed very many of them, no! In the years before the First World War, were there any Italian sporting activities that
    took place in town? Any bocci ball or anything like that? Well, they had places where they were playing these bocci ,
    you know. And anyone that had a saloon somewhere, in the backyard they would have a strip of land that was about 10 foot
    wide and 30 foot long. They played these wood balls, you know. The main game was for a quart of whiskey.... maybe a quart
    of whiskey or a half a gallon of beer or something of that sort - mostly beer. Was it just Italian people playing that,
    or was it other nationalities? Oh, there was the French and the German people; they would play that mixed. And sometimes,
    even some of the nigger, some of the half-breed guys, they were playing bocci . Were there any other sports that people
    liked to participate in, particularly Italian people, that you can remember? No, as far as the sports are concerned, I
    don'tknow of any other. What would you do with your leisure time? There was those that they liked to go hunting, you know,
    in the early days. And that is why you see maybe one or maybe half a dozen guys walk along in the path with a rifle on
    their back.
- speaker: Respondent
  text: They go until they get tired and maybe go on top of a hill somewhere. Sometime they don't go more than 2 miles out
    of town; they go back and do not bring home anything. And I was just like one of them. I had a .22 rifle. Sometimes I
    would go out, and if I didn't see anything to shoot, then I'd shoot a tree just for the sake to see how steady you' re
    able to shoot. And there was a lot of fishermen. Today they got to have a license, but in the early days everybody that
    feel like going out there and catch a couple of fish, they go out there in the river. They fish in there for a couple
    of hours sometimes, and they catch a half dozen fish, and they take them home, and that was the end of the sport. Well,
    for a young man like you - you would have been 17, 18, 19 years old at that time - it must have been somewhat difficult
    to meet women. You didn'tbelong to the church; I think you told me that earlier. No. What sort of so cializing were you
    able to do? Well, that is kind of a sport. I had an automobile - a 2-cylinder Metz, it was. It was built in 1907. This
    automobile was kind of a small affair, and the motor was under the seat. I liked the automobile, and I wanted to ride,
    but as far as to be attractive so I can get a girl to ride with me, that was an impossibility! [laughter] It was next
    door to being a wheelbarrow, you might say. There was a fellow who became mayor, named Harry Stewart; he had a Buick coupe.
    [Harry E. Stewart, a man of reformist inclination, was mayor of Reno from 1919 to 1923. - ed.] So this Buick of his happened
    to break a spring one time, and he brought it to my shop to make a new spring leaf for him. But I took the measurements
    - the length from the front wheel to the rear wheel - and I extended the frame on my 2-cylinder Metz so that my Metz was
    just as long as his Buick. [chuckling] And I put in a decent seat...and I had a treatment to put a decent cushion on,
    and had them laced back. So as I grew up, in those years when we were going along, I had no trouble to pick up girls to
    take them out for a ride, you understand, in my own car.
- speaker: Respondent
  text: The sad situation was that this car was... well, it was made in 1907. It had tires that they called clinch tires.
    They were not like the ones that they have today that was easy to change. In those days it was hard to change. The rubber
    had to stretch, and the.... But I wouldn'thardly go out into a place where there was a puddle of water out in the road,
    because it was operated by friction drive. If the water by any chance would splash into the friction drive - the wheel
    that was bearing against the disk, like - it would slip, and then you would be stuck right in the middle of the puddle
    of water and have no chance to get out of there until you do something about drying where the water splashed into your
    transmission, you might call it. And sometime I had a girl that I had to plead quite a bit to get her to go out with me
    for a ride. She would suggest that we go to Moana Springs; that's where the baseball game was, you know. But those days
    there was no paved road; you did get in the puddle of water regardless; you had to get in to get to Moana. And sure enough,
    when I got into this puddle of water, I know what was happening, [laughs] I had to have rags, and open up in the back
    of the seat to try to dry up where the disk transmission was so we could get it going. And she was badly embarrassed.
    I could see from the looks on her face! [laughing] No women were working in the blacksmith shop; you told me that there
    weren't any women with you learning English; you weren'tgoing to church. How would you meet women? Well, like if we go
    in the restaurant sometime, when you eat breakfast in a place, you might be sitting right next to a lady. And they had
    women waiting on table. This young girl that I was trying to court was named Gertrude "Goldie" Battley. (She later married
    Len Savage of Savage and Sons.) She lived in the rooming house where I had to work. And we became quite friendly, particularly
