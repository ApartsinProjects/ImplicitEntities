collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: 'Giovanni Ginocchio with the Central Pacific and on the Comstock, 1863-1873 My parents were born in north Italy, in
    Comuneglia di Varese Ligure, at that time in the county of Genoa. My dad, Giovanni Ginocchio, came to this country in
    1864, when he was 17 or 18 years of age. Back in the old country, they tried to sneak out of there before it was time
    to go serve in the army. If you left the country after 18 years of age, it was like deserting the army, and you stood
    the chance of going to jail for desertion. He came out; he was in the neighborhood of between 17 and 18 years of age when
    he came to the United States. He came in the company of a cousin of his, whose name was also Giovanni Ginocchio. They
    landed in San Francisco; from Genoa to San Francisco it took them 6 months out on the water. When they landed in San Francisco,
    my father''s cousin, being that he was a blacksmith by trade, found a job the second day after he landed [at a shop that
    later became the Union Iron Works]. My dad had no trade, and consequently was searching for a job...for anything to do
    to keep himself busy at work. R. T. King: Where was your dad staying? Did he stay with any relatives or friends in San
    Francisco? Was there anybody for him to stay with when he came here? No. He had to walk up toward North Beach, and he
    saw the name of an Italian on the front of a building, and he walked in, and he made himself at home. He stayed in there
    till he found a job. He stayed in there about a week. It was an Italian restaurant and hotel. Did he know anybody or have
    any relatives in San Francisco? No, he didn''thave a soul to go to. But he made up his mind at the time that if he''ll
    ever get married and have a child and a family, that he would make his son a blacksmith, because his cousin got a job
    the second day and my dad was walking the streets! [laughter] So, when, 10 years later, after he went back to the old
    country and he got married, and I happened to be the first one of 6 children in the family, then he sure enough made a
    blacksmith out of me when I was still going to school.'
- speaker: Respondent
  text: I had half a day of school and the other half a day of working in the shop learning the trade as a blacksmith. I had
    2 1/2 years work as a blacksmith before I came to this country. And then after I came here, I did have relatives in a
    blacksmith shop in Reno, and I got a job through them. He landed in North Beach, and in some Italian restaurant they told
    him that people were looking for men to go to work for the Central Pacific Railroad. They were building up the railroad
    from Sacramento to Salt Lake City, Utah. He got a job, and he worked for them 5 or 6 years. [Construction of the Central
    Pacific commenced in 1863. The rails were joined with those of the Union Pacific at Promontory Point, Utah, 10 May 1869.
    - ed.] Do you know what he was doing? In what capacity was he working? First he was sent to help unload a railroad engine
    which had arrived on an English ship. He was a general helper (common laborer) but after he got onto it, he became a cook.
    For the next 3 or 4 years he was a cook. On Thursday of every week he was giving an Italian food with spaghetti and different
    Italian..., so he became quite famous a mong the gang, for the reason that they had to eat Chinese dishes. Since he was
    able to produce an Italian dish, why, he was quite welcome to be a cook, [laughter] As a laborer, he began laying track
    in. They had a bunch of men to lay 30- or 40-foot rail, and they had to all pack it by hand and get it in place and nail
    it down so that they make a railroad. But there was a gang a head of him that were cutting down trees, and there were
    engineers that would design the location, the heights, and so on and so forth, of the railroad to be built, you understand.
    He would tell me that in the summertime, from Sacramento up on top of the hills [the Sierra Nevada] that they had to have
    a fire through the night to keep the wild animals away - the lions and all kind of wild animal that would come and eat
    everything that they can get a hold of. So there was a gang each night that would stay up for the night to watch...to
    keep a fire burning and to watch so that the animal don't get in.
- speaker: Respondent
  text: However, in the summer he said that they were sleeping outside in their blanket, and the snake...they would crawl
    right alongside of it; when they wake up in the morning, they found a snake and sometimes 2 of them in the blanket rolled
    up with them. He said they didn'tlike the looks of it; they didn'tlike the idea of having a snake, but if you didn'tharm
    them, they didn'thurt you. Was he working with other Italian laborers? Oh, yes, there was other Italians. There was all
    nationalities there - the Chinee, most of them. The majority of the people that was working there was Chinee people. But
    they had all sorts of nationalities - German, French and Swedes and Spaniard and Mexican. He thought it was almost every
    nationality in the country, there was somebody there. Was he learning to speak English at that time? Well, he was learning
    through the associating with the people that he had to work with. They had a key man that was... understand English and
    explain to them in Italian to do a certain job. But he was quite eager and anxious to learn the language the best he can
    by working with others. And he had other Italian friends with him, I take it? Yes. Did he talk to you about when they
    got over the summit, finally and reached Nevada? Oh, yes. Well, when they got to Reno...at that time Reno hasn't any name
    yet. However, he discovered that there was a country road that was coming in north and south and east and west. And he
    said at that particular time that someday - since they're building a railroad - at that crossroads there may be a town.
    The officials of the Central Pacific, when they got to this point in Nevada, they were selling lots for $100 a piece.
    But they were not taking any money outside of gold; you had to pay $100 in gold, and you can have a lot. My dad was anxious
    to have a lot all right, but he didn'thave the gold; he had the currency, and he had the silver that they give to him
    - once a month he would receive pay. They were not spending any money because they were eating along with the railroad
    as they would travel.
- speaker: Respondent
  text: So they were working 7 days a week from sunup to sunset for one dollar. And at that, he had enough money to buy a
    lot, but, as I say, he didn'thave the gold. He had the money in currency and silver, but he couldn't buy it because he
    didn'thave the gold. But those that was able to buy lots, they were buying lots in that railroad crossing for $100 per
    lot. Did he know any other people who bought a lot there? Oh, yes, he knew a lot. There was some Italians.... See, most
    of the people that bought were German people. He said the German had managed to get a hold of the gold somehow or other.
    They bought most of the lots. And the Chinee, they bought very few. Well, he said that it was in a minority like all the
    rest of the people that...if they did have the money, they didn'thave the gold, so they couldn't buy the lot to start
    with. Did your father talk to you at all about meeting Indians while building the railroad? Oh, yes. Some of the Indian,
    they were looking for a job; they were looking for money, you know, to.... The common Indian, they were looking for a
    job. But the big chiefs, they didn'tlike to see the idea of building up a road. They felt as though whatever the white
    people were doing, they were stealing from them; that sooner or later they had to fight to chase the white people away,
    and that it was better to get rid of the white people before they got started...which at that day, in their own way, they
    might have had a point. However, he said that the working people - the ones that were looking for a job - they didn'thave
    any trouble with those Indians. The Indians were willing to work with the white people. Can you recall whether he was
    talking about Indians in California or in Nevada? Well, they were at both sides. They were at California first, and then
    there was the Indian from Pyramid Lake. I remember he mentioned people that were from the Pyramid Lake in Nevada. He did
    say Indians from Pyramid Lake were hiring on? Yes, yes. Did he tell you what sorts of things they would do?
- speaker: Respondent
  text: Were they common laborers? They were common laborer - pick and shovel. Were they being paid the same a mount as non-
    Indian people? The pay was the same for everyone - a dollar a day for all of them, plus they had to feed them. Five years
    my father worked for the Central Pacific. He was a laborer, but after a couple of years he turned out to be one of the
    cooks. Since the Chinee people were doing the cooking, they dictated terms, you might say - you would either starve to
    death or sign up with the Chinee. They were the kingpin. As far as the railroad was concerned, the Chinee people, they
    thought they owned the railroad. There was a time when the workers had fights and they had arguments a mong themselves.
    They didn'tfight the Chinee people, because there was too many Chinee to fight. You know, maybe there was half a dozen
    white people, and there was 20 or 30 Chinee. And you don'tknow...you start a fight with one; before the fight is over,
    how many Chinee are you going to have on your neck? When they had the upper hand, how would they exercise that power?
    What would they get your father and other non-Chinese, to do? Well, "you'll eat what we cook or else." And you can either
    eat it or get out, if you want to go look for a job someplace else. Now, when you talk about the job, there did have to
    be a superior somebody to either hire you or fire you. The Chinee had no right to fire you. However, they can make life
    so damned miserable for you, they can give you what they want....see fit for you to eat, so that you get so sick and tired
    that eventually you walk out on your own, because you don'tcare to eat any longer what the Chinee people give you. And
    that's what I mean, the Chinee people had the upper hand. They pretty much dictate their own terms, or they starve you
    to death, or they give you what's left out of so mebody else. They bring you to the point that you just as soon quit and
    get out than try to put up with them any longer. My dad, as I said, he kind of decided he was with them in the first place,
    so that he could get his foot in.
- speaker: Respondent
  text: The people that was working there, they were fed up with Chinese food. He told them that he can cook some of the Italian
    dishes if they'd get behind him to let the big shots know that he can cook. So they didn'twaste any time to let the people
    know that they got a fellow that could cook Italian meal. The first job that he had, he was only allowed to work on Thursday;
    that's when he was giving spaghetti and Italian dishes. And they becamevery taken up with his cooking, that they got behind
    him and they not only asked him to work on Thursday, but to be one of the cooks for his job. He learned, even through
    the Chinese, to cook different dishes besides the Italian dishes, but they were given the Italian flavor, especially when
    you use garlic and tomatoes and different peppers and so on and so forth, that he said that he became quite a famous cook;
    after a while, everybody likes him. And he was willing to work as a cook rather than to work out in the field to lay railroad
    ties. Had he learned how to cook in the old country? No, he never had any experience outside of what he learned from his
    mother when he was a young man! [laughs] But he did know how to cook spaghetti and different things, you know. Was he
    paid the same as a cook as he was as a laborer? Yes, they paid him the same as a cook - a dollar a day for everybody.
    What did your father like to do in his time off when he was working on the railroad? Did he do any exploring? Well, when
    he was on the railroad, they would just walk around maybe a mile, but that was as far as...they didn't do any exploring
    at the time. Did he tell you anything about crossing the desert with the railroad? Well, he said the worst thing that
    they had was the wind blowing - practically 12 months out of the year there was a windstorm. And there was a time that
    he said that you'd think there was a mountain standing in front of you, and the next day the sand would be blown out,
    and it was a flat; and then 2 days later it'd be a mountain again.
- speaker: Respondent
  text: And he said that this was kind of a mysterious affair for him to understand - that the land would blow to the point
    to build up a mountain and disappear overnight. But this apparently was a severe desert, very severe. I'm curious as to
    what your father was doing with his wages. Was he saving them? Was he sending them back to Italy? No, all the time that
    he was working for the railroad, he didn'thave a chance to get mail or to send mail because there was no postal service.
    And whenever they were paid money, they were given a check, and it was cashed. They'd get silver and paper; he was carrying
    it in his pocket. And like one day in Sacramento...there was bankers in Sacramento, and they were cashing checks to the
    post office. They were getting money in a larger city like Sacramento and San Francisco and Oakland. But there was no
    place in Nevada that could cash a check. He had checks that he carried for 6 months in his pocket; he never cashed it
    until he got to Salt Lake City. Once he cashed the check, did he send the money back to Italy, or did he keep it in this
    country? No, he was keeping it to himself. He never mentioned any time to send any money anywhere. No. Did he tell you
    anything about the joining of the 2 railroad lines? Was he present when the...? That was a great affair. That was like
    a celebration day when the 2 railroads made connection. Near Salt Lake City there was a particular spot that I don'tremember
    the name now [Promontory Point] that they'd driven a gold spike. There was a spike that was made in the San Francisco
    mint, and it was taken up to Salt Lake City. Was your father there when the gold spike was driven? Yes, yes. Tell me what
    he told you about that day. There was a great celebration when the 2 companies made connection. The big officials that
    were in charge of the project of the railroad system, they became quite friendly with the working people as well. And
    that was a great state of affair, a big doing. The last thing they did, when the 2 railroads made connection, they'd driven
    that golden spike, which was made in San Francisco through the mint.
- speaker: Respondent
  text: And from there on the people got their check, and they got dispersed, and that's when my dad moved from Salt Lake
    City to Virginia City and went to work in the mining. The mining...their day's pay was $4 a day for 8 hours, while for
    the railroad it was from sunup to sundown for $1! How did your dad get to Virginia City? Well, after they made the railroad
    connection, they had cars, so they were taking people from place to places. Anyone that worked for the railroad was given
    free pass to go to the near points - like those in Sacramento Valley, they were taken to Sacramento on the railroad expense.
    They were given even food and money to get to the place where they want to be discharged. Where did your father want to
    be discharged? In Virginia City. So he didn'teven go back to San Francisco to see the Italian community there or anything?
    No. After he got discharged from the railroad, my father wanted to go to Virginia City to work in the mine. They had heard
    about paying $4 a day. It was sticking in his craw that if he can get on that $4 a day for 8 hours, that that actually
    would be something worth trying to get, and which he got by trying. Did he tell you how he got hired? What happened the
    first day he got to Virginia City? Did he ever tell you about that? No. It seemed that there was a lot of Italians there.
    He mingled with the Italian people, but he had no trouble to find a job, as they were looking for workers. And this Italian
    restaurant and hotel, they were putting up lodging and feeding him 3 meals a day. And he had no trouble when he land in
    Virginia City as far as speaking the language; he said you could speak Italian any place, and they understand what you
    want, what you're saying, [chuckling] Which mine did he go to work for? There was a mine that they used to call the C
    & C mine - he worked for it. Apparently it was the biggest mine in Virginia City at the time. [Various sources refer to
    the C & C mine as either the California & Consolidated Virginia or the Consolidated Virginia & California.
- speaker: Respondent
  text: The Consolidated Virginia purchased part of the California in 1874, but it is uncertain when this combination first
    received the appellation C & C. - ed.] There was the Comstock; there was El Dorado; there was many different mines with
    different names. But Virginia City's biggest mine, that was the C & C mine. And they had a frame, which even in the latest
    years, the frame was still standing. It was a great big plank structure affair up in there, and there was a great big
    cast-iron wheel with the cable that was going down in the mine up and down. I think it was one of the last pieces of machinery
    dismantled out of Virginia City; it was there even in 1930. What was his first job at the C & C? He was working down in
    the shaft like all the rest of the miners - just pick and shovel, digging gold. They had the engineers, the different
    ones, to tell them which direction to work. They had magnets, they had mercury to tell which direction to go where the
    gold was. Or, there was iron as well as silver in different directions, but they had engineers to tell them to dig in
    this direction, and they had machinery to test each place that indicate where the metal was. Did he tell you what a working
    day was like down there? Can you recall what he might have told you and describe to me what a day beneath the earth was
    like at the time that he was working for the C & C? No, there isn'tanything that I can remember of when he was down in
    the shaft. He said that there were 4 and 6 and 8 men in a bunch, you know. Sometime they were digging in the rocks, and
    2 men would work, and 4 were resting; then the 2 men, they rest, and then the other 2...they were sort of working around
    in so many hours a shift. But they work on the hard rocks. He said that there was a time that he didn't see for the life
    of him that there was anything coming out of those rocks, but he said eventually they were producing gold. Were the men
    on his crew other Italians? You know, the majority of the working men there was Italian and Mexican and Swedes.
- speaker: Respondent
  text: But the German people, they were more connected with the higher up, like the engineer. They knew which way to dig
    to pick up the better rock, to pick up the better mineral. And the main engineer, he said they were German people - the
    one that actually pointed out which way to do the digging. And he said they werevery fine people to deal with. They werevery
    white; they were not driving slaves. He said that they werevery good people to work for. There was a time that they even
    get in and they taking a pick and they do a little digging themselves just to see if they were in the right direction,
    if they were digging the right kind of a rock. He said that he became very fond of the German people to working shoulder
    to shoulder down in the mine, in the shafts. How many years was he at Virginia City? He was up there 4 years or a little
    better. At that time he had made a little money, and he decide to sort of retire and go back to the old country. That's
    when he got married. Was your father a religious man? Did he belong to the Catholic church? Well, yes. Back there in Italy,
    there's no other religion but Catholic, and they make you Catholic whether you're knowing it even or not. But he wasn'tvery
    religious; he didn't go to the church, [laughs] He was a Mason. Shortly after he got to Virginia City he learned that
    if he belonged to the particular branch of a club or so ciety, particularly the Catholic church, they shaking you up for
    money. They want donation; they want hands out. And there were priests, sometime, they put themselves at the end of the
    tunnel and when you come out, the first thing they ask, "Well, how much do you want to donate to the church?" And he said
    he suddenly turned cold against the religious part. He got to the point that he said that he was not a Catholic in the
    first place! [laughter] Did he belong to any social clubs? No, no, no. Although he said that they had a club - I don'tremember
    the name now - but there was a typical miners' club, you know, that was sort of a lodge hall like a union hall that you
    gather in there for social time and serving beer.
- speaker: Respondent
  text: It seemed that particularly the German beer was the main kind of a drink that you can have - a very large glass of
    beer for a nickel. Were there any places in Virginia City where Italians would gather on their time off? Yes, there was.
    Like I said, it looked like those were the places where the priests would hang around for hands out...he stayed away as
    much as he can; he didn'tlike to have to meet any face to face, to have to turn them down. And he said that he had to
    work like all the rest of them to make a dollar; that he didn't see fit to hand it out free of charge because somebody
    has a church or is connected with a church. So as far as religion was concerned, he said that he turned kind of cool.
    The other large Catholic group up there was the Irish. Did your father tell you anything about the Irish? He said the
    Irish, they're very religious. He said that the Irish people - some of them - they would give a half of their paycheck.
    He said some of those Irish, they were so.... He said they had along talk with these Catholic priests; that the Catholic
    priests were wise enough to get a hold of those Irish and get their money, regardless of how the outcome was for the men.
    Maybe sometimes they run short of money, but they would have plenty to give to the church donation. He said the Irish
    people, they were very generous, and so was the Mexican and the Spaniard - some of the Spaniards, he said, not all of
    them. Some [chuckling], they came wise, he said, that they would stay away. But these priests, they had people that could
    mingle with them, you know, to try to talk them out of the money. Did your father get along well with the Irish people?
    Very well, yes. My dad was a good mixer. He didn'thave any trouble to get along with anyone, even with the Indian, [chuckles]
    What did he tell you about Indians up at Virginia City? Did he talk about their presence there? The Indian people, they
    were not so welcome in a mining town. Why? Well, for some reason, the Indians had in mind that whatever they were picking
    out of there, it was stealing from them.
- speaker: Respondent
  text: The Indians were not in favor to have any miners up there, and the Indians were not given a job in the mine. Even
    though the Indian would try to get into the mining camp, the people that had charge, they would not hire an Indian. They
    were the last people to consider. Even to work on the outside, the Indian had no foothold in Virginia City. Of course,
    there were small groups of Indians camped around Virginia City. Did your father tell you about them or what they might
    have been doing? Well, they were more or less like a janitor worker, like working on the outside of a hotel, trying to
    keep the place clean, or dishwashers or stuff of that sort. They were hired by the white people. But as far as go to work
    in the mine, he never saw an Indian working in the mine; he never did see one, to work down in the shaft in the mine.
    He said that some a mong the white people, instead of getting married, they were living with the Indian. But it was like
    you see today in this city of Reno, that boys and girls at the university live together; they're not married. However,
    if a white man would live with an Indian, they would just a gree to live with each other; the white man would take care
    of the woman, but as far as getting any pay, the Indian...they were not getting hardly any pay to speak of. No. [No Indian
    prostitution.] Did they marry the Indian women? No, he didn'tknow of anyone that they would marry an Indian woman. He
    didn't know of anybody. What would they do with the Indian children? The women would have children by the white men, wouldn'tthey?
    Well, there was some of the people, but I did not get to that point to get any light in that direction. I'm not really
    in the position to give any particular in stance. My father never talked about that. And I never did find out about my
    father and women. He never told me! [laughs] That's along time.... But there was white women...there was prostitutes up
    in Virginia City, where they had their own home. You pay a dollar and get what you want, and that was the end...the beginning
    and the finish, all of it.
- speaker: Respondent
  text: '[chuckles] Prostitution was in Virginia and Carson City, in every town in Nevada from that time on. And they were
    making money. Even when it got down in 1930 in Tonopah and Goldfield, there was a man by the name of George Wingfield
    in Reno, that was like... he was not a mayor, but he was more than a mayor; he was like the governor, you might call it.
    He had banks and he had prostitutes, and these prostitutes would learn from the miner where the gold mine was. And they
    would find out, more or less, which place it was, and the next day they''d tell George Wingfield where he should buy stock...where
    the gold was, that the prostitute learned from the miner the night before. George Wingfield was taking care of those prostitutes,
    and they were well taken care of, financially and home and society and so on and so forth, through George Wingfield''s
    doing. Where did you learn this? Well, I learned from different...after I land here myself in Reno, and I learned from
    day by day as you go along, in places of my own line of endeavor. I hear people talk about it. Did your father ever say
    anything about the miners'' union? Well, you practically had to be a member of the union if you wanted a job to start
    with. You had to pay $100 to join the union, and from there on it was like a brotherhood affair. The union would fight
    your battle if it''s necessary, but he said they never had got to a point to have any strikes or have any union difficulties.
    There was only one union, and you had to be a member of the union if you wanted to be a miner. He had no trouble with
    the union, and he had no trouble as far as working conditions. The 8 hours was to work in days and 6 days a week, Sunday
    off. The condition was very satisfactory all the way through. The restaurant where they were serving meals, they were
    serving them good meals, too. They would give plenty - all that you can eat. Some of those Italian places, they had a
    long table. It was like a family affair that every 4 persons there was given one quart of wine or one quart of beer.'
- speaker: Respondent
  text: You can have beer if you want with your meal, or you can have wine. And the living condition was very good. He said
    that was the best he ever had all the time he was in the United States. He didn'thave any complaint about the meals or
    about the working conditions. He didn'tcomplain about the safety conditions in the mine either? No, no, no. Very often
    the miners' union did find fault with some of the mines. Well, he said if so mebody'd had his nose out of joint, that
    they were complaining and bellyaching about things that they had no business to complain about. He says it just was some
    kind of fellow that would travel in reverse; that they were not satisfied with what you give them, what you're doing.
    But they had their open chance - if you didn'tlike the condition, you can walk out. You were not compelled to stay there
    unless you want to. Was he there when Virginia City burned in the great fire of 1875? That was later. He had left by that
    time. [While he was in Virginia City] they were exploring around. Particularly, they were hunting. You know, those days
    there was all kind of a wild animal that you can shoot - birds as well as turkey, and there was any kind of animal that
    you find up in the hill, they had no trouble to pick up. There was lion...kill a lion and sell it to the restaurant people.
    They were eating lions? Mountain lions? Oh, yes, they were eating mountain lion; they would eat all sorts of wild animal,
    yes. He said the hardest part was to pack them, for they were kind of heavy. From the place where they did the killing
    to getting to Virginia City, it was kind of a chore to pack them on their back, you understand. From time to time he was
    going down to what they call now Reno. At that time the first building that was put up at this crossing was the Riverside
    Hotel. A man by the name of [Myron C.] Lake put up the bridge, and every time that anyone wanted to cross that bridge,
    he had to pay IOC That was the fare for any individual to cross the river. However, in the summer when the water was low,
    they had in the river stone laid up so that the person can jump from one rock to the next to cross the river.
- speaker: Respondent
  text: And he was telling this; that there was a time some of the women, they were so hard up for money that they would pull
    their dresses up to their knee and jump on the rocks like the men did, from one to the next, to cross the river. And the
    men, they were standing up on the river bank to watch the ladies with their dress up to their knee, because in those days
    the lady had long dress clear down to their shoes! [laughter] Anyone that had a team of horses, they had to pay $1 to
    cross the Lake Street bridge to go anywhere. If you used the bridge, you had to pay $1 for it. Supplies were coming in,
    particularly from north Nevada; they were bringing in lumber and meat to go to Virginia City. They were coming in from
    the north to go to Virginia City. And each one of those teams - if they had more than 2 horses, the price was $2. If it
    was just one horse and the wagon, it was $1, and if they had 4 horses, it was $4 to cross the river. Your father saw all
    these things? He told you about these...? He saw, he saw. They had Sunday off, and they were going out to explore in different
    directions. He was very much fond of the ford...the crossing in Reno. He made many trips from Virginia City to Reno just
    to see the lay of the land. He was still inclined to have liked to buy some of the lots. However, the price...that was
    no longer $100 per lot; it went up overnight to over $200 a lot. He was talking about the Indians, that they were carrying
    their babies on their shoulder, on their back. You know, they had those baskets that they were.... As a rule, the man
    was sort of the chief, like, but the woman, she was the underdog. She not only had to pack the baby, but they sometimes
    had to pack the bedding and the different kind of stuff that they had to carry. The woman was the horse of the family,
    while the man was acting as the chief. He might go a head and see what the lay of the land is, or which way to cross the
    river to go to California. But the main object was that the lady was the underdog, and the man was the chief of the family
    - the Indian.
- speaker: Respondent
  text: Was there any form of entertainment for miners here at Lake's Crossing? At the time those German people were building
    a dance hall up in Virginia City. And this dance hall had a spring underneath that, when you danced, the floor itself
    would go up and down just like the spring on a wagon. They say that when you ride on a wagon with a spring, it would give
    a little up and down; so was the dance hall built on those terms, under those conditions. Do you remember the name of
    the dance hall? No. He might have mentioned it, but I didn'tremember it. Well, can you remember anything else about Lake's
    Crossing or about the area down here that became Reno? What else did he tell you about this area? Well, this man, Lake,
    apparently was just like an Indian chief; he really had the upper hand. He would dictate to everybody that come across,
    regardless of which way they went, that he was the kingpin, you might call it. He was the chief of the place, and there
    was nobody could cross the bridge, unless they would pay the 104 or whatever they had. There was no one to get across
    on the bridge free of charge - none of that. And it seemed as though there were some hard-core nuts in those days, some
    tough characters, used to go up to Virginia City. But regardless of how tough they were, this man, Lake, wasn'tgiving
    up to anybody. Sometimes he had to have a gun, point the rifle at so mebody's chest, but he didn'tkill anyone. However,
    he scared them to death. You said your father on Sundays liked to go out and explore and see the lay of the land. Not
    only him, but many of his associates that he was working with. The main place to go to explore was down in Reno and this
    Lake's Crossing, they used to call it. Shortly after they start to build homes and they start to make lots and give so
    many acres of land. The first governor that came across Nevada was a fellow by name Nye. I think he came from Salt Lake
    City. When the town got to be big enough, they made him the governor of the state. [James W.
- speaker: Respondent
  text: Nye was territorial governor of Nevada, 1861-1864. Giovanni Ginocchio entered the state with the Central Pacific in
    1868, when H. G. Blasdel was governor. - ed.] And from that time on, the people that was deeply interested in the mines...there
    were practical people in San Francisco, and they decided to build a railroad, and it was the railroad to connect from
    Virginia City to the crossing in Reno. There were people who were coming here from San Francisco to Virginia City Did
    he ever tell you how he would get down from Virginia City? He would have probably come down to Reno by the V & T [Virginia
    & Truckee Railroad], wouldn't he? The railroad was the best...see, in those days every 2 hours there was a train coming
    into Reno - a passenger train and a freight train, every 2 hours around the clock; even at 2:00 or 3:00 in the morning,
    there was a train coming in and a train going out of Reno. My dad and all the rest of the people who were up there were
    coming into Reno through the V & T Railroad. They had a passenger train, and the service was very good. You could go back
    and forth in the day and at night. The town of Reno was actually growing up from Virginia City. A lot of the buildings
    that were set up in Reno, they either were financed from Virginia City, or some of the buildings that there were in Virginia
    City were brought into Reno. I know some of the buildings. Like on Chestnut Street across the railroad toward the university,
    there was a 3-story building. Right offhand I don'tremember the name, but I think that some of the building still stands
    up today in Chestnut Street. Now they call it Arlington, but in those days it was Chestnut. And actually, Reno was built
    up by the gold that came down from Virginia City. Did your father tell you anything about what Carson City was like in
    the 1870s? Well, Carson City was the capital of the state. And when you talk about law or lawyers and doctors and so on
    and so forth, the headquarters was in Carson City. But he wasn't a politician; he wasn't too concerned with what was going
    on in Carson City.
- speaker: Respondent
  text: Did he ever go down to Carson City? Oh, yes. He said that there was a time that rather than take the trip to Reno,
    they would take a trip to Carson, which wasn't too far away from Virginia City. He was pretty well familiar with Carson
    City, also Genoa. Genoa was one of the first towns that actually was promoted by the Mormon religion from Salt Lake City.
    He found out that when they were going to Genoa, the name was taken off of the same Genoa County that he was born and
    raised in Italy, and he felt a lot like there was a family tie to go to Genoa. He always said it was a good farming place,
    that there was good land, and there were large farmers that had great big herds of stock - sheep and cows and horses and
    so on and so forth. Genoa was just a small place of about half a dozen residents, you might call it. He said that they
    had rich land up in the hills, and they had flat land, and they had plenty of water from the snow that melted through
    the summer, and they were raising stock down there. That's when these Dangberg brothers and different ones settled and
    got hold of the land and raised farming. And he said that on many different occasions, particularly in Genoa, that at
    that time they didn'thave to have gold; you can buy a piece of land at your price. He said that many settled, and he had
    the [idea] to settle in there, too, at one time, but the job that he had was too good to quit. So he stayed with the mine
    at $4 a day. Did he tell you if there were any Italian families living down around Genoa at that time? He didn'tmention
    any Italians being there, but he did mention there was a lot of German people there. There was a lot of German people....
    Actually, the settlers were of Mormon descent, although there were German descent people that settled there to start with.
    Carson Valley, where Genoa is, was supplying a good deal of the food for the Virginia City mines. Did your father tell
    you anything about that connection between Carson Valley and Virginia City? No, he hardly mentioned Carson Valley to me
    at any time.
- speaker: Respondent
  text: Did he go to Genoa because of its name? On account of its name. He said that he liked Genoa, and a few families that
    were there - they werevery good people to mingle with. They welcomed you to their home, and keep you like if you was a
    member of the family. And whenever you leave, they want you to return. He says many times that he felt that instead of
    going back to work in the mine, to stay there; he was satisfied that he could have got a job as a farmer, but he didn't
    see fit to make the change. Now, you've already told me that there were a great number of Italians working in the mines
    in Virginia City. There were other Italians in Nevada at that time who were not miners. Did your father ever tell you
    about anything that other Italians were doing? Well, those that were not in the mining game, they were farmers. There
    was people who would lease or engage themselves, even to work for wages in a farm, and they would work the whole summer
    and fall of the year for a dollar a day with the understanding that through the wintertime, when they're not able to do
    any work, they would be fed 3 meals a day and stay in a farm. They would take care of the cow or feed the animal - horses
    and whatever they have. But many Italian people, they would stay with the farmer all year around, with the understanding
    that they would still get a dollar a day in the wintertime and fed just to take care of the animal. Did your father tell
    you about this? Yes, my dad told me about this. Your father, while he was on the railroad, worked and associated with
    a lot of Chinese people. Did he tell you anything about Chinese people in Virginia City? Well, the Chinese people in Virginia
    City was a different story than what they had with the railroad. With the railroad, they had the upper hand because they
    were the cooks, but in Virginia City they turn out to be like the dishwashers. They were not the kingpin any longer. They
    were taken in like a second place. Who were the cooks? Well, they had white people; they had the women cook, and they
    had a white generation - they didn'thave many Chinee.
- speaker: Respondent
  text: There was some Chinee restaurants that you can go, and they cook their own meal in Chinese style. But as far as the
    Chinee having any hands on the miners, there were not. The Chinee took second place, when you talk about Virginia City
    and the Chinee people. And the same thing took place in Carson City. They had Chinee restaurants, but the white people,
    they had the upper hand. They were the major hotels and the major restaurants, and the Chinese people were coming in second.
    In Virginia City the Chinese were dishwashers; they were doing janitor work, and they were taking care outside - like
    a hotel that had something green, and had some flowers and had trees, something they were cultivating outside the hotel.
    The Chinee people, they would take care of that. They were doing sort of second-class work, you might say, as far as...
    they were not leaders in their line of endeavor any longer. They had to take what they get. You were telling me earlier
    about a dance hall at Virginia City that had a spring floor on it. Yes. They had a dance hail, and it was built by German
    people. I think the name was Becker. Becker was actually the leading mechanic to build this dance hall. Hehad it on springs,
    and as men and women would get out on the floor to dance; the more there was, the more ups and downs the floor was giving.
    You were not only dancing, but you were flying, you might say! [laughter] Tell me something about those dances. Did he
    tell you what kind of music was being played? Was it German or Italian or...? Oh, well, it was some of all of them, but
    the German had the upper hand. The German had their own waltz...I forgot the name; he mentioned some of the names that
    they were dancing. The ladies those days was wearing long dresses. When they get to a certain place that they were going
    around, you know, their skirt was taking along swing. I've see the picture myself of the dances that were given in Virginia
    City in that particular dance hall. There was actually amusement to see men and women out in the hall dancing, and the
    musicians were German; they were singing German songs, particularly.
- speaker: Respondent
  text: Offhand I don't remember, but.... But you get the impression it was German, and not Italian or something else? Yes,
    very much so, yes. You mentioned a photograph. Did your father bring any photographs back to Italy? Yes, my dad had some
    photographs. I never got to see them after I left there, but he did have some of the pictures of the railroad that they
    were building. And he had some photos of animals that they were killing. Before daylight in the morning, some of those
    wild animals were making approach to jump at the white people. And that's when they were ready to shoot, and in some cases
    they shoot a lot. They shoot lion, tigers and wolves; and I don'tknow, different....coyotes and.... And sometimes they
    would skin them and eat them for their meal. My dad cooked some of those wild animals. At Virginia City, he would go out
    on Sunday and.... Well, there was no Sunday - those days they were working day in and day out, but at any time they could
    take a day off. There was no trouble. If tomorrow looks to be a nice day, they would ask them to take a day off; they
    were willing to let them have it. Some of them would go out, and it seemed as though the lion was the main thing that
    they liked to shoot; it seemed as though the lion meat was more wanted by the white people than other animal. But he was
    cooking the wild animal. [The "lion" in question is the western mountain lion. - ed .] Did he have his own gun? Oh, yes,
    he had a double-barrel shotgun and a rifle both. Was it mostly Italian men who were going out hunting, or was it everybody?
    Oh, any nationality. Matter of fact, he said the German people, they're better hunter than the rest of them. The Swedes
    were good hunters, too. And when they get close to a river, they had a lot of fishermen. He said that there was a time
    when some of the people, particularly the Swedes, they would provide the cook with fish. My dad cooked a lot of fish,
    he says, when you get close to a river. Did your father do any cooking up in Virginia City?
- speaker: Respondent
  text: No. All the time that he was in Virginia City he was a miner. When your father was in Virginia City, was he writing
    letters and sending them back to Italy? Not very much. As far as the correspondence, I never heard of him receiving a
    letter or writing a letter, sending a letter to anyone. What led your father to leave Virginia City? Well, it was kind
    of a struggle for him to make ends meet when he was only getting a dollar a day on the railroad. He had saved a little
    money, but hardly to make ends meet, you might say. And he thought that he struck it rich when he was able to get a job
    at Virginia City at $4 a day and a good place to live, so on and so forth. He was there either 4 or 5 years; I'm not too
    sure of the exact date. It was 1870s or something; I'm not sure.... He made a little money while he was working at the
    mine, and he decided to go back in the old country. That's when he got married, and that's when I came. Did he tell you
    how he got back to the old country? Did he cross the United States by rail? He crossed the United States by rail. The
    only difference is, he says, that when he came to the United States it took him 6 months by water, and when he went back,
    it took him 7 days to cross the ocean. He says that from New York to France, and then from France to Italy by railroad,
    it took him 7 days to cross the water. How much money did he bring back with him? Did he tell you? He never did tell me;
    I never knew. But I did know that he had a belt...they had a sort of double string affair, and he had a $20 gold piece
    in his belt. And he had a belt that was like the low tunnel with $20 and the upper tunnel with $20, and he had this belt
    full. He carried it all around his waist all the time he traveled, and it was full of $20 gold pieces. How many there
    was, I don'tremember now. I did count them some time ago, but I don't remember. He was from Comuneglia di Varese Figure.
    And the house that he built in 1888, where I was born, is still there to this day. The Ginocchio family is still in that
    to this day.
- speaker: Respondent
  text: He had 2 sons. I'm the one that came here and remained here, but the second son came to Sacramento, and later returned
    to Italy. My dad had a grocery store, and the second son stayed with him all through his life, and then he took over.
    The second son has children of his own now. And same house is still there today, and they still carry it on the same as
    my dad did in his early days. Learning the Blacksmith Trade in Italy and Reno, 1893-1912 My mother's maiden name was Maria
    Rossi. And she married my dad after he landed back in Italy..a couple of years later and start to build himself a home.
    He built a home out of stone, a 2-story house, and it's still up today, which his grandchildren has it. And he had a grocery
    store, from which he supplied the town with food and whatever the necessity was at the time, and they still have it to
    this day. Now, what sort of a family did your mother come from? Well, she came from a regular family that lived in the
    town, which, you might say, was a mong the better class. The Rossi family, they had a village all of their own. The whole
    village was made up of Rossi people. I'm not saying that they were politicians, but they were sort of...oh, sort of dictators.
    They were seeing who's coming, who's going, whether a stranger was accepted or whether he was rejected. The Rossi people,
    I don'tknow where their wealth came from, outside of having... each one of the family, they had their own home, and they
    had from one to 5 acres of land of their own. And some of them, they were cultivating trees and flowers, and others had
    grain and corn and stuff of that sort. But it was quite a large family, and it was quite a village, and the whole family
    was Rossi people. What did your mother's father do for a living? They had a piece of land. They were producing corn and
    hay and wheat - farming like. They had 5 acres of land. How old was your mother when she married your father? I think
    she must have been - I'm only making a guess - 25,1 would say. And your father was older?
- speaker: Respondent
  text: My father was 20 years older. Was your mother educated? Well, in those days they had a grammar school, and it was
    compulsory by law that each child was supposed to have a grammar school education. It was compelled by the law that each
    child was supposed to go to school. There was a time in the early days that some of those children were sent up in the
    hills to herd a bunch of animals - cows - and they go up in the morning and come home at night, without an education.
    But a certain time, a certain age...I'm not familiar with which year it might have been, but there was a king that was
    in charge of everything in Italy, and he put out a law that every girl or boy, at the age of 6, supposed to go to school
    until he's 16. It was compulsory. And for someone who sends a boy or girl up in the hills to herd a bunch of animals and
    didn'treceive an education, the head of the family were punished. And they also were taxed for the land that they had,
    that were raising so many ton of hay or potatoes, whatever they had to raise - they had to pay tax to support the government.
    My dad and mother were both educated through that kind of a law to have an education. You were born on 29 June, 1893,
    is that correct? Yes, yes. How long had your mother and father been married? How many years before you were born? Oh,
    I think it was more than 5 years when I was born. So your father had spent quite a bit of time back in Italy before they
    got married? He came back to Italy probably around 1875, at the latest, didn't he? That's right. And he and your mother
    got married in the late 1880s, would you say? Well, from what I've heard from their conversation, they were married a
    few years when I was born. So your father had had time to build a business, then? Yes. Was your father's father a grocer?
    My [paternal] grandfather was an animal doctor, veterinarian. In that particular time there was a lot of farming, and
    he was able to make a living by taking care of the animals, whether it was horses, cows or anything.
- speaker: Respondent
  text: Of course, I left when I was 17; I didn't know too much about the conditions, but from putting 2 and 2 together, I
    think Grandfather was a pretty well-liked man all through the town by being able to take care of the animal. Sometimes
    it looked like they were breaking their legs; and he was able to take a horse with a broken leg and put it back together,
    and in the course of time it'd get to be so it could run like all the rest of the horses. I'm curious as to what your
    parents had in mind for you. All parents have expectations for their children. Can you recall what they expected you to
    become? I think I mentioned early...when my dad came to San Francisco with this fellow John Ginocchio, and John Ginocchio
    found a job the next day because he was a blacksmith, my dad made up his mind at the time that if he'll ever have a son,
    that he'd make him a blacksmith, which turned out to be me! [laughter] Learning the Blacksmith Trade in Italy and Reno,
    1893-1912 When did you begin your blacksmith training? When I was going to school, I had a half a day in the grammar school,
    and half a day work in the shop. From 8:00 to 12:00 it was in the school, and from 12:00 to 1:00 we had an hour off, and
    from 1:00 to 4:001 was working in the shop as a blacksmith helper. How young were you when you started? I had it 4 years.
    I left when I was 17, and you take 4 years off of 17...it was about 12. Twelve, 13 years old when you began the apprenticeship?
    Yes, yes. Did you have any desire to be anything else? No. After I came here, I saw a lot of these fellows that immigrate...they
    come to Nevada and they had to take what they get because they had no trade. I said to myself, "I guess I was lucky to
    have a trade to start with." I had that advantage over many other fellows. In the early days - I was still going to school
    - my dad said to me one day, "You'll have to make up your mind after you graduate from grammar school what you're going
    to do next. You'll either have to use your head, or you have to use your muscle." And I didn't know hardly what he meant
    by use my muscle, and he says, "Well, if you go to school, you can become a doctor; you can become a lawyer, and you can
    become different things by study.
- speaker: Respondent
  text: You can become a professor. Or else you'll have to use your muscle. You'll have to learn a trade." He says, "You can
    become a carpenter; you can become a cement man; you can become a blacksmith, and you can become something else." But
    with the experience that he had in the past years, he kind of suggested the idea to save it to blacksmith. So, that's
    what I turned out to be. But in the early days, any family back in the old country, after you leave grammar school, you
    had to make up your mind what you're going to do. Half of the time you had to learn a trade of some kind. And I had that
    experience in the latest years - say, 1960,1965. Time was kind of tough here in Reno. One Saturday night, ready to close
    up the shop, a man come to me. He had about probably 754 on his hand, and he had a little girl about 5 or 6 years old
    and a wife; the wife wasn'twith him. He showed to me the 754. He said, "This is all there is between me, this little girl
    and my wife and starvation." And he says, "I come to you for help." I look at him in the eye, and I says, "Who sent you
    to see me?" "Oh," he says, "they tell me that you're the boss of this place; that's why I'm here." And I said, "Suppose
    that I help you, how long do you expect me to help you?" I says, "I have a family of my own to take care of." And I says,
    "What makes you think that I had to help you? I might be able to supply your dinner for you, and I send you to the Salvation
    Army to see that you get lodging, and they might give you breakfast, but," I says, "sooner or later they tell you to get
    out on your way." I says, "If you had an education in the early days like I had, that I had to learn a trade of some kind,
    today you wouldn't be here to ask me with 754 on your hand that you want me to help you." I says, "If you were a carpenter,
    if you were a cement man, you should be able to go out where they're building a house and find a job. As it is, you have
    no trade, but you do have a family to take care of, and you couldn't take care of yourself." It came to me, what my dad
    told me - that I had to use either my muscle or my head, one of the 2.
- speaker: Respondent
  text: Something has to be coming out of you. And it'd be better today, right now, some of these kids that falling off with
    school, that go out on their own...they're going to get rich, and they got many different ideas, but eventually, they
    end up try to raise a family without any money. It would be better if so mebody told them, when they were going to school,
    they'll either learn to be somebody or learn a trade of some kind. What sorts of things did you learn as a blacksmith's
    apprentice, and how did you go about doing it? Back in the old country, they educated young people - men as well as women
    - to learn a trade of some kind. For the women it referred more or less to the hotel and office work and something of
    that sort. For the men, roughly speaking, you talk about like the blacksmithing, carpenter, cement men, and anything that
    has to do with hard labor. That goes up until the end of the grammar school. Then, when you get into high school, you
    had to make up your mind, more or less, which line of endeavor that you choose besides learning the regular education
    that they serve. And in my case, my dad kind of got into my mind that I should be a blacksmith. Of course, he was speaking
    from the past experience that he had with the cousin of his that landed a job the second day in San Francisco. And then
    my dad didn'thave any trade; he didn'thave any job! [chuckles] But anyway, it was impressed on my mind that since he kind
    of thought that I should be a blacksmith, that I would go for it. And I started from there. However, after I was in learning
    from the shop work, the man that was teaching passed away on account of his age (he was 76 years of age), and it left
    me out on a limb; we didn't have an in structor. And that, with the idea of not having to serve or register for military
    service, I came to the conclusion that I would come to this country and get away from the chance I would have to go in
    the army for 4 or 5 years. What did you plan to do when you got to this country?
- speaker: Respondent
  text: Did you in tend to become a blacksmith? Oh, yes, I did. I had some relatives that had a blacksmith shop in Reno, and
    I was promised a job before I gothere through a letter, through mails. How old were you when you left Italy? Seventeen
    years old. And you left in 1910, then? Is that correct? Nineteen ten, yes. My birthday was on the twenty-ninth of June,
    and I left in May and arrived here on the fifth of June. What were the names of the relatives who were... ? John Ginocchio.
    He was my fathers sfirst cousin; he was second cousin to me. Is he the same John Ginocchio who came here with your father?
    Well, this was the son. And the father, John Ginocchio, had he remained in San Francisco? Well, he passed away. Of course,
    he was in San Francisco when he passed away. What was the name of the blacksmith shop that he had in San Francisco? Did
    he own one? Learning the Blacksmith Trade in Italy and Reno, 1893-1912 Well, the father was working for the...in the latest
    years, it turned out to be the Union Iron Works, but before then it was just a blacksmith shop in San Francisco. And he
    passed away about what year? I have no idea. So his son, John Ginocchio, then came to Reno? Yes. Did he ever tell you
    approximately what year he came to Reno? I wasn'tconcerned, particularly, and I don'tthink he ever mentioned it. Did he
    ever mention whether he worked for somebody else after he came here, or did he start his own shop when he got to Reno?
    No, he worked for somebody else when he was in San Francisco, and he also worked for a shop when he came to Reno. It was
    some Italian people that was connected with the shop. Their name was Vietti. [The shop was called the Vietti and Bottini
    Blacksmith Shop, and its address in Reno City Directories is variously given as 225, 237 or 245 Chestnut Street in the
    period 1912-1917. Chestnut Street has since been renamed Arlington. - ed.] Eventually, John Ginocchio bought half interest
    and finally became the whole owner. He changed the name to Reno Blacksmith Shop.
- speaker: Respondent
  text: When you came here to Reno in 1910, did you live with John Ginocchio? No, I didn'tlive with him. There was 2 hotels,
    and one of them was named the Europa Hotel, and I stayed in this Europa Hotel. At that time they were serving meal 3 times
    a day, and the lodging place was on the top floor. There was a great big large room, and they had regular cots like you
    do in the army. You sleep one right alongside of the next, and so on and so forth. And when I made arrangement to stay
    there and they asked me how much money I was getting, I told them I was getting $20 a month. He said, "Well, that's just
    the a mount of money we get from these people that stay here. But," he says, "since you don't have any more than that,
    I'll make $19 for you. you can have $1 to buy yourself a glass of beer once in a while," he said to me! [laughter] One
    dollar to a muse myself for 30 days! Were there other Italian people staying at the Europa Hotel? Oh, yes, there was a
    lot of them. There was a lot of them, particularly the lumberjacks, you know. In the fall of the year the lumberjacks
    coming into town, and they would stay in there until the spring when the lumber business open up. They would spend the
    winter. You say that was over on Lake Street? Yes. The hotel has been torn down now, but it was in there right alongside
    of the Toscano Hotel, which is still in there today. Did John Ginocchio pay your passage over, or did you pay your own
    way to come to this country? My dad paid my own way to come here. I didn'tborrow any money from anyone; just my dad financed
    me the trip to come here. Can you recall what the area around the Vietti and Bottini shop was like? Very often, in other
    communities where a blacksmith shop was, there would be bars and other areas where people could pass the time while their
    work was being done. The difference between the normal condition...like a man that run a grocery store, he would try to
    be in the center of the town or have it in a nice location where the people was attracted to.
- speaker: Respondent
  text: The blacksmith shop, you go to the outskirts of the city and try to land a place where the land is not so expensive.
    If you had to rent it from somebody, or if you had to buy it, you didn'twant to buy it in the heart of the city because
    the price was sky high. But if you go outside of the city limit, the cost of the land is not half as much. And in our
    case we never had to go out as long in the early days. We did afterward, but in the early days we stayed put in Chestnut
    Street at 234. And that was it; there was no spending any time to look for a different location. Can you describe the
    neighborhood for me around that Chestnut Street shop? There was working people that they had a job either with the grocery
    store, with some cement plant or lumber plant, or so metimes even out in farming. They were living in the city, and they
    would have their own home, but they would go to work for a farmer outside of the city. In the summertime and outside of
    winter, a lot of people from the city would go out and work in a ranch because they were spending their time and getting
    a little money for it and keeping themselves busy. When you talk outside of the main street, like Virginia and Second
    streets - like from Fourth Street up to the university they used to call "up in the sagebrush." When you talk about the
    university, you talk about the house up in the sagebrush. That was way out of Reno, you might say. The university was,
    in the first place, placed in Elko. But then the politicians, they decided to bring it into Reno. Even after it was set
    in Reno, they still called it "up on the hill, up in the brush." When you talked about "up in the brush," that meant the
    University of Nevada. What sort of things did your cousin have you doing in the shop? Those days, the principal thing
    was repair wagon, buggy and 2-wheel carts. My job was to prepare the wheels to set the tire. These wheels, by running,
    they naturally get loose; they get out of shape, and the tire had to be reset, and the spokes had to be wedged so that
    they were tight instead of being wobbly.
- speaker: Respondent
  text: 'And my job was to get the wheel ready to set the tire. Then, after the tire was set, there was bolts to be put in
    between the steel and the wood to keep the steel band from getting loose or fall out of the wheel. My job was to assemble
    the tire, and if by any chance they had to put in any new spokes or fellow bands, my job was to paint the new wood so
    that they matched more or less with the original color, and get the wheel ready back on the buggy or wagon, whatever it
    was. So you weren''tworking very much with iron, originally, then? Well, then as a helper, no. But there''s sort of a
    divide place in there: as long as you are a helper you got to stay on the outside of the anvil, and when you become what
    you might call a full-fledged mechanic, then you go on the right side of the anvil, and you tell the helper what to do.
    In my case I served about 2 1/2 years as a helper when I land here, and Learning the Blacksmith Trade in Italy and Reno,
    1893-1912 then I was able to run the place...take care of the forge work and do the iron work just like any other mechanic
    attached to the line of endeavor; I had no trouble to pick up and carry on the work as it should be done. I turned out
    to be a fairly good mechanic. I''m not trying to brag about myself, but [chuckles] I was well liked by the people that
    I was working for. The Vietti family was quite large. However, out of 4 or 5 children in the family, there was only one
    to carry out the old man''s line of endeavor, and in the latest years he went to work for the city of Reno as a fireman.
    He was a fireman for a number of years, until he retire. The rest of the family all passed away quite early in life. Was
    the Vietti family from Genoa? No, they were from north Italy - the Piedmont district, they call it. Good people. Kindhearted,
    and they were the kind of people that just as soon invite you to have dinner with them, even though you''re not, you might
    say, a close friend. I speak very highly of the people many times; even while we were working they would ask me to...about
    4:00 in the afternoon to go to their home and have a snack and a glass of wine and chat probably 15 minutes.'
- speaker: Respondent
  text: And when you go back in the shop and work, you feel more encouraged; you feel like you got somebody that really care
    for you. I speak very highly of the Vietti family. They were very, very kind people, and the young men and the young girls
    werevery respectable people. Can you recall approximately how many men were working in the shop when you first came? Well,
    there was 2 of the Vietti family; there was John Ginocchio, and there was me and.... There was more than 4 or 5 of us.
    In summertime, when they were the busiest, they might hire some stranger that come along and looking for work. They might
    hire them for 2 or 3 months or whatever they stay. But normally, they have the steady men, and I was one of the steady
    men that they kept all year round. Were the steady men all Italians? Yes. Yes, you've told me a little bit about what
    your job was when you first came. Can you now tell me the sorts of things that the blacksmith shop in general was doing?
    Besides repairing wheels and so on and so forth, sometimes they was also shoeing horses. And I had to pull the old shoe
    from the horse's foot, and kind of clean up the foot and get it ready so that the man that was making the new shoe, he
    would apply it to the foot and then fit it and so on, so forth. In other words, I was doing the dirty work, and when the
    regular man that did the shoeing was fitting the shoe and put it on, I was doing the finishing - kind of dressing up the
    hoof. Sometimes we'd have to give a quart of black paint if it was kind of a respectable man that was better than average;
    in order to please him, you'd give the foot a shot of black paint, [laughs] Like shine a man's shoes! What was the principal
    source of business? Repairing wagons, trucks and lumber trucks and so on, so forth. There was nothing else but truck vehicles.
    There was no automobiles in those days, not a single one. Not a single one in 1910. As a matter of fact, the first automobile
    that we saw in Reno in 1910 was someone connected with Jim Jeffries that had to do with the Fourth of July fight.
- speaker: Respondent
  text: '[Jack Johnson vs. Jim Jeffries for the world heavyweight championship. - ed.] There was some people came from California
    that they have an automobile, kind of an outstanding sport car, but there wasn''tvery many automobiles in Reno in 1910.
    As a matter of fact, there was only 7 automobiles. On Labor Day, the miners from Virginia City used to come into Reno
    and put on a parade. And at one time in 1910 on Labor Day parade, they had 7 automobiles. There was the mayor, 3 doctors
    and 3 lawyers in Reno that had a car. All the rest of the common people and the farmers, they had 2-wheel carts and a
    horse. They had wagons - 2 horses and a wagon - there was many of those. And the grocery store, those days, they were
    delivering groceries; they would make an early call to different families - their customers - pick up an order for what
    they want, and by 11:00 or 11:30 the wagon go back to the store with the order. They were making up the order as they
    received it, and in the afternoon, by 1:00 or 2:00, they were delivering groceries to all of the customers that they pick
    up and load early in the morning. Today it is a different story entirely. But those days, if they were a stable customer,
    they only pay the bill once a month. The grocery man would supply them with grocery, with whatever they call for, and
    within 30 days, if they''re good people, they''d pay the bill. If it were a bad actor, well, you get to carry them, and
    if by any chance they move out of town, they didn''tknow where to go to find them. So that was lost, [chuckles] Yes. Well,
    I''m trying still to get a little bit better understanding of who the principal customers were for the blacksmith shop.
    You''ve told me that you had a lot of business from the lumber people or the wood-cutting people. Yes, yes. There were
    Italian lumber people - lumberjacks, they called them. In the spring of the year they used to come to the shop. We would
    fabricate a hatchet and sledgehammer. We were making a hammer that on one side was like a sledge, and the other side was
    like a wedge, you know?'
- speaker: Respondent
  text: And we would supply them with $100 worth of to ols with the idea that they pay us after they get to work the first
    month or 2 up in the lumber camp. And whenever they come into town, they pay us for the tools that we built for them.
    They were Italian people, and they were honest. When they're coming into town, they go to the bank and they cash their
    check, and the first thing they would do, they'd come to the shop and pay us for the tools that we built for them. And
    we would take care of them just the same as a farmer that we sharpened a plowshare for. Now, this would have been in the
    period from 1910 to 1920, right around in there ? Yes. Well, as a matter of fact, they were doing it before I came here,
    as far as that goes - that kind of a habit was going on. I don't know when it started, but I'm only speaking from 1910
    when I land in Reno until about 1920. And we were doing with lumberjacks the same as we did with the farmer. The only
    difference was that the lumberjack, when they're coming into town, they're coming in and pay you; the farmer only come
    to you once a year, and he pay you for what you did. If we set 4 wheels on a wagon or 2-wheel carts, or whatever it was,
    sometimes it was argued whether we strapped the tires on 2 wheels or 4 wheels. And sometimes those was clever enough to
    try to talk you into the idea that you only fixed 2 wheels instead of 4. They were kind of shrewd in their own way. We
    Learning the Blacksmith Trade in Italy and Reno, 1893-1912 were writing down when the job was done and who did the work
    and how many hours we put in - so on and so forth. But those guys, they thought they were smart enough to say that we
    only fix 2 wheels instead of 4. Sometimes when we were shoeing horses, they'd tell us that we only shoed 2 horses instead
    of 4 or 5 or whatever it was. And sometimes, in order to settle you had to take a loss, even though we were not legally
    supposed to take it. But either they'd part in enemy terms or give up to them to compromise.
- speaker: Respondent
  text: And that was some of those farmers' idea that... to talk you out of something. They thought they made again, which
    they did, but there wasn't much to gain by! [chuckling] The major place where they were cutting the timber was in Verdi.
    That town of Verdi was maybe 3 or 4 times larger than it is today. They had a sawmill up there; they used to call it the
    Verdi Lumber Company. They had quite a lot of people working in the sawmill, as well as cutting timber, as well as with
    the logging. They had heavy trucks to carry the logs. In some cases, when it was close to the river, they naturally would
    send down the logs through the water, but in some cases they had to haul it in trucks. Verdi Lumber had 3 or 4 large trucks
    that they were going up in the hills, and the logs.... And we were repairing the vehicles, and in some cases we'd take
    care of the axle; we'd take care of any part of the machinery that was required to carry the timber. Were they your most
    important customer? Yes. Well, they were the larger people... their work was going into hundreds of dollars, where in
    the other one was only $4 or $5 or maybe $25. Theirs would run into anywhere from $400 or $500 a month to so metime $1,000
    or $1,500 a month. And it was heavy work. Some of those wheels were taller than I was. I had a heck of a time to rustle
    around with those big wheels, and I didn'tlike the job because it was too heavy for me. [chuckling] You didn'tthink your
    father had made a mistake when he got you into blacksmithing, did you? Well, I didn't...I never cussed him for that! [laughter]
    What were some other important customers? Can you remember the names of other companies who would have you work on their
    equipment? Well, the next steady customer was the livery stable. There were 5 at one time in Reno, and they had anywhere
    from 5 to 15, sometimes 20 horses; and they had buggy and wagon and 2-wheel carts. And at anytime that we sort of were
    running out of work or getting low, well, we would go to one of those livery stables and see if their vehicles there were
    in good shape - whether they were planning on resetting the tires.
- speaker: Respondent
  text: And in around 1912 or T3 and so on, so forth, they came out with....the buggy had rubber tires. And the livery stable,
    they all had 4 or 5 buggies with the rubber tires, and we were taking care of the buggy with the rubber tires. It's like
    today take care of a Cadillac! [chuckles] And next most important customers were the farmers surrounding Reno, or anywhere
    from Reno to Fallon, even Winnemucca; sometimes they were bringing vehicles to be repaired. Besides repairing their vehicles,
    we repaired their plows; we would repair rakes; we would repair anything that had to do with the baling of hay. And iron
    work that was necessary to be done, we were doing for the farmers, with the understanding they only pay their bill once
    a year. And in some case, if they're honest, they pay their bill without an argument, but some of them, they would try
    to Jew you down. If we set 4 tires, they say they only said 2, and then we had an argument, whether we were going to get
    paid for the 4 wheels or for the 2 wheels, and stuff of that sort. So you learn who you deal with, and whenever you see
    a lemon come up to your door, you tell them either that you're so busy that they have to wait 30 days before we can work
    on their vehicle, or turn them down completely; that every time we do a job it is an argument and we don'thave to take
    it. We became a little bit in dependent, too. There was a time that we had to stand up for our own rights. As I've told
    you before, I'm very much interested in the various ethnic groups that comprised the population of northern Nevada at
    that time. If you did a lot of work for farmers, perhaps you can tell me something about the different kinds of things
    that the different farmers were doing. There must have been some Italian farmers who brought their.... Yes, oh, yes. Can
    you name some of the families who came in and tell me what kind of farming they were doing? In one family that they're
    still...one of the grandchildren is an architect. Casazza. That family is still today in Reno, and his grandparents, they
    were good customers.
- speaker: Respondent
  text: Those were the kind of people that did not argue about work. They paid their bills... honest and sincere. And the
    grandfather of this Mapes that's today in Reno, he was a customer of ours. He was paying his bills very promptly; that
    is, he was paying once a year, but there was no argument. There was a time that we soon discovered which was the best
    customer and the poorest. Did you do any work for the Capurro family? Yes, we did work for Capurro. The only thing I remember,
    the Capurros had a wagon; they were delivering vegetables in the summer. They were delivering cabbage and lettuce and
    beans and anything according to the weather. They werevery nice people, and they werevery genteel with their family. They
    go to your home, and they would do business in a nice business way. The Capurro family was a large customer of ours. The
    Oppio family as well. The old man Oppio, he had a large family, and some of the boys used to come in with the father when
    they're coming into the shop. And the old man was delivering goods to the restaurants and hotels like the Capurros did.
    The Oppio family were a nice family, too. We becamevery friendly with the children. As a matter of fact, one of the Oppio
    boys and myself...we got into the fights together without paying a dime! [laughter] Which Oppio boy was that? Charles.
    That was the 1910 Fourth of July Johnson-Jeffries fight. Did you have a connection with the Italian- Swiss farmers of
    Sierra Valley? Were they bringing their business to Vietti and Bottini? Well, yes. Most of those farmers were coming into
    Reno once a month. They had a team of horses, and we had trees in front of the shop, and they would tie their team to
    the tree and go downtown, perhaps to go to the court or maybe go to see a doctor or go places. In Learning the Blacksmith
    Trade in Italy and Reno, 1893-1912 that particular block where we were located, there was a bunch of trees, and if they
    didn't come to our shop, which in most of the cases they did, they would tie their teams along in that same block and
    go downtown.
- speaker: Respondent
  text: Of course, at that time, Chestnut from Virginia Street, it was only 2 blocks; there was Sierra and West. And we were
    practically in the heart of the town then. And were those families extended credit? Yes, we give them credit, and they
    were good. And I'll tell you something else. Those people that lived outside of Reno in different parts of the country,
    even in northern California, they would make cheese. You know, they were making an extremely good cheese - whether it
    was this hard cheese or whether it was soft. And in many cases, they were bringing in cheese, particularly to the grocery
    store. The ones that we were doing business with, we would much rather take the cheese for pay instead of the cash. And
    they were giving us cheese sometimes that we can carry on the family for the whole year. These were Swiss-Italians. Were
    you able to understand one another? Oh, yes, yes. They were talking Italian, yes. And they were good people. There was
    no bargaining or arguing about the cost. They pay you whatever you ask for; they lay it on the line. There was one family
    by the name Ramelli; he had 7 sons. And one of them - I don'tknow how he got mixed up - but he was a mong the movie actors
    in Los Angeles. They educated him, and he had the appearance of someone that they liked to see in a show, and he turned
    out to be a movie actor. Caesar Ramelli. He and I became quite friendly. I'm curious as to whether the Italian farmers
    were doing the same kind of farming as German, French, Irish farmers and what have you. If they would have a ranch, yes.
    But I never seen a German to go out to peddle any vegetable; I never have seen one of those. They were more business people
    that had somebody work for them. They were more, you might say, leaders. They were not delivering anything themselves.
    They were running the business; they were running the show. Now, there was a hotel up in Virginia City that used to send
    their helpers down to our shop to get a certain thing repaired - even sometimes something in a kitchen that has to do
    with the cooking, so on, so forth.
- speaker: Respondent
  text: But they sent down their servant. The people that own the place, they come down probably on Sunday or so metimes just
    for a visit, but they were not the kind of fellows that they would deliver the goods themselves. They'd have plenty of
    help, like they did up in Minden and Carson City and in Gardnerville - all that surrounding country. But the Italian farmers
    were growing vegetables and delivering them? They were growing them and deliver themselves. The Oppio family...like the
    father of the people that are here now, their old man was delivering the goods. He was raising the lettuce, and then he
    would deliver it to the family himself. Were the German or the Irish or the French farmers growing vegetables for sale
    at all? Oh, yes, yes. They all...whatever the farmer were able to produce, they had their land working. They didn'thesitate
    to get in and raise whatever they were able to produce. So everybody was growing vegetables? Yes. Did you find that there
    was any difference in the farm implements that were brought to you for repair? In other words, were the Italian farmers
    using different kinds of implements from the Germans or the French or what have you? No, I wouldn't say that there was
    any difference. There wasn'tvery many pieces of equipment. There was either a plow or a rake of some kind and what machinery
    they used to bale hay. Now, when you talk about baling hay, there was a family - Swede people - that he had his own gang
    of his own nationality. They would come along at the beginning when they start to cut the first crop of hay. He was a
    man by the name of Pete Olsen; he had one leg. And he was coming in with a great big, long chain sometime; he had a heck
    of a time to drag it out from the wagon to the shop with one leg and a cane. He was coming in, and if by any chance there
    was a fire that nobody was using, he walked in and he put that chain in the fire and didn't ask questions to anybody -
    he would start to fix his own chain! [laughter] And when his job was about finished, he said, "You charge me for what
    ever...
- speaker: Respondent
  text: if you'd done the workyourself. But," he says, "I'm in a hurry. I've got a gang of men out there waiting, and until
    I get these chains back, they're holding up the works." This Pete, he was kind of a loud speaker, and he was speaking
    broken English like I did! [laughing] He would go out there, and he'd watch. We had 5 different fires in the place, you
    know, and he'd take one of these forges, and he'd go out there, and he'd fix it himself. And he knew how to fix it; he
    was a good mechanic. He would weld, and he could do a lot of things just as good as any mechanic. But he wasn'twasting
    any time. He'd drag those big chains, you know; those links that were one inch thick - those great big heavy links. He'd
    go out there, and he'd fix his own chains, and by the time he was ready to leave, he would pay right on the spot. He did
    his own work, and he pay you for it. Because he used the fire, he naturally used everything that was available. But we
    kind of laugh when we see him coming, because we knew that he was not going to waste any time, talk to so mebody or see
    who's going to do his job. If there was a fire and nobody used it, he'd just jump out there and do his own fixing. It
    seemed as though the Chinese people were the first people that were engaged in the laundry business in Reno. The first
    one that I knew of was located where the El Cortez Hotel is now. They had long pipes, and they were saying in the town
    that they were smoking opium - whatever it was! [laughs] But for some reason, they would keep to themselves. There was
    some of us kids at night that...I don'tknow why we had to do it, but if we go by the laundry, we pick up rocks and throw
    it in the window and break the glasses. But nothing happened, so we didn't keep that up very long. However, one night
    there was a policeman that saw some of the boys throwing rocks, and they got arrested and taken to jail, of course. I
    think they let them out shortly afterward. However, that put the end with throwing rocks at the Chinee laundries, [chuckles]
    Did you have your laundry done at that Chinese laundry ?
- speaker: Respondent
  text: Learning the Blacksmith Trade in Italy and Reno, 1893-1912 Oh, yes, we did. However, we had customers that used to
    come along, and they were taking our laundry and doing it in their own home. We had a family, the Vogliotti family, that
    had a farm by the race track, and we would do their work as far as repairing wagons and plows and stuff of that sort.
    And the wife would come along on Saturday afternoon and pick up our laundry and deliver it to us on Monday morning. The
    husband, in the latest years, became part owner of the Colombo Hotel. It looked like it was a common affair for the Chinee
    people to be in the laundry business. They were doing laundry even for the V & T Railroad when they were operating the
    train. They were taking in their laundry to the Chinee people. And they operated many of those laundries in Virginia City
    as well as in Carson City. From the story about the rock-throwing incident, I gather that the Chinese were not well respected
    here in Reno at that time. Well, there wasn'tanybody that actually had anything against the Chinee, but for some reason
    it look like you can do a heck of a lot of damage, and you don't get punished for it, so...like throwing rocks in the
    window, there was no good need to do anything of the sort. However, we did until some of the boys got arrested, and that
    stopped the throwing of rocks. Those days, you can pick up rocks along the streets; they were not paved like they are
    today, you understand. There was a family that were German people; they had a cement plant. And we used to do work for
    them, too...repair machinery or building up something that they want, like building up a wheel cart to use in a factory.
    And they werevery, very fine people. Their name was Knie. In other words, Ginocchio in Italian, Mr. Knie in German - it
    meant the same thing. [In English, the words mean knee. - ed.] But his name was Mr. Knie. He was a very fine man - tall
    fellow, and he had a nice appearance. He had an appearance like a major or some official in the army, like a colonel.
- speaker: Respondent
  text: He was a very fine man, and sometimes he would give me a tip of 25<t or 50<t. You know, in the early days, for the
    help to get any tips, it wasn't a very common affair. You had to do something outstanding to be recognized as deserving
    the tip! [laughs] Mr. Knie always gave me a tip. Sometimes I would sharpen a half dozen picks for them, and the fellow,
    whoever's charged with the collecting them, he always gave me a tip just for the sake of taking care of his picks. Were
    there any other German customers that you can remember? Oh, yes. Now, this fellow, Ritter, was another fellow that we
    would do some work for his brewery - he was connected with the Reno Brewery. [Henry Ritter was manager of the Sierra Brewery
    in 1911. By 1916 (perhaps before) he was treasurer of the Reno Brewery. - ed.] And he would come along and give us the
    job and pay the bill, and sometime whoever did the work, he'd go out there and give them a tip. Other than the Ritters
    and the Knies, what other Germans can you think of who did business with the shop before World War I? Well, there was
    a lot of them, but many of them, I didn'tknow their name when they first come to us. I don'tremember. Did you get any
    Basque customers? Yes, we had some Basque customers, and we had some Frenchmen. And, when you talk about sheepherders
    and so on and so forth, we had Paul Laxalt's father; he was one of my customers. There was a time in the spring of the
    year that he would bring a donkey to be shoed, and he also would have a mule; and the young Laxalt, he had a horse. But
    he was the cream of the family, you might say. He used to ride a horse, but the rest of them... the old man, he had a
    donkey. And hed pay his bill right when the job was finished; you got your money right off then. He was a very fine gentleman,
    and so was his family. His family used to come along with the old man to the shop. And as I said, this Laxalt that turn
    out to be a politician, why, he turn out to be the governor of the state of Nevada. He was outstanding.
- speaker: Respondent
  text: You can see that he was Number One in the family; he was the kingpin, you want to call it! [laughter] And he was a
    very fine man; we liked him. And there was other sheepherder that used to come along, French people. There was a fellow
    by name Pladero. He put up a hotel building on Fourth Street and Washington; it's still standing today - 8 or 9-story
    building. And he was a very fine gentleman. We did a lot of work for him when the building was going up. We supplied him
    with some railing, and we supplied him with steel for the building. Were there any other Basque families who were bringing
    their work to you in the period prior to World War I? There was a Basque man; he used to come in here from time to time.
    We did so mevery small jobs, like repairing a wagon. Like when they were planning on going out in the field somewhere,
    they were getting either the 2-wheel cart or 4-wheel wagon with the tires set and everything ready to go to take a trip
    and go places. And those Bascos as well as the French, they would pay you on the job. When the job was finished, you get
    your money right now. And those were the kind of a customer that we were glad to take care of them, because there was
    nothing payable down on the book to carry on their charge. And there was some Italians that were doing the same thing.
    There was many of those people that they would go out in the wintertime in the snow with the traps to catch wild animals.
    We many times would fix traps made out of steel that the animal.... Coyotes, as well as anything else, they go out there
    to eat whatever they set in there, and the first thing you know they get caught in the trap. And the people would go the
    next day to see what the result is. They catch those animals either one leg or maybe the 2 front legs or so metimes the
    neck into the trap. And they were selling the skin and using the meat to cook with. In 1910 at the Vietti and B ottini
    Blacksmith Shop we were doing considerable work for the Virginia City mines. You know, those days they were shipping whiskey
    in 55 gallon oak barrels.
- speaker: Respondent
  text: 'The miners would take this barrel and saw it in the middle and then it would have 2 halves. They were filling up
    those half barrels with mining drill bits, and they would ship them to us in Reno to be sharpened. They were coming in
    on the V & T Railroad. We had one day to sharpen all these drill bits; the next day they go back to Virginia City. We
    had a batch coming in and a batch going out, day in and day out all through the week, except Sunday. The big mines, they
    had their own shop up there; they had their own mechanics to do the sharpening, but the small mines didn''thave the location
    or the building to do their own work. They only had a place, a lot, where they were doing the digging and the mining.
    The tools - as far as the shovel, the picks and the drill bits - they all send them into Reno, and we were getting our
    share. As a Learning the Blacksmith Trade in Italy and Reno, 1893-1912 matter of fact, we were the only shop for many
    years that was able to keep the mine provided with the drill bits: sharp on Monday morning when they go on the job, and
    day in and day out through the week. In 1910, when I first got to Reno, I was going to a private school at night to learn
    English. I was paying 254 an hour. There were 2 sisters: one of the sisters was attending the school; she was a schoolteacher.
    And the other one, she was a pretty well-educated girl. Whether she had any university education, I don''tthink she did.
    But I was paying one of those sisters 25c an hour. And the main thing, I had to learn to speak the language - to understand
    what potato, apple mean; the difference between the 2 of them, so on and so forth. And I kept that up for about 2 or 3
    years, outside of the summer when we were working pretty hard and when the night come I was ready to lay down and go to
    sleep instead of go to school. But during the winter, when the night was long, I attended this private school. It was
    in the house of the sisters, whose name was Ferretti - Bina and Matilda Ferretti.'
- speaker: Respondent
  text: Matilda was a regular schoolteacher. She was teaching school in one of the schools up in Reno. And her sister was
    very handy; she was a bookkeeper for one of the stores. She was also my teacher at night. [Matilda and Mary Ferretti lived
    at 142 Vine. Matilda taught at the McKinley Park School, and Mary was the bookkeeper for the Semenza and Company General
    Store. - ed.] They had a lot of patience; they tried to educate me to say a word in the proper way and so on, so forth.
    Eater, they came out with the laws or regulation in Reno that anyone could go to school from Monday until Friday night
    and every night for 2 hours, from 7:00 to 9:00, at the Reno High School. That was a building that was up on Nevada Street,
    and that was one of the first high schools in Reno. We were going to night school, and there was a class of us about 20
    or 25. Toward the end of their school, it came out in the newspaper that all of us that received an education to become
    citizens, we would have to go to fight the war because the United States was going to get into a war. That's the time
    when I went to the county clerk, and I told him that I have 10 years' experience working as a mechanic, and that I'd rather
    be in some other branch beside to the infantry. And this man pat me on the shoulder; he says, "Andy, we need mechanics,
    and we need them the worst way to operate the railroad in France." So I signed up to the engineers and became a soldier.
    First I was going to a private school. I was paying out of my pocket. There was a lot of foreigners in Reno - from the
    Chinamen to Japanese, Italians and Swedes and Germans and French people, all nationalities. It seemed there was a lot
    of them in Reno that they were not citizens. Some of these politicians, they were looking for the vote; they decide to
    kind of talk to us and address a bunch here and a bunch there at street corners or some other places. And from time to
    time they got the idea that we would be glad to go to school if we had a place to go to school after working hours.
- speaker: Respondent
  text: We couldn't go during the days; we had to go to work to live! [laughs] And, sure enough, they arranged to secure a
    schoolteacher, as well as the necessary books and so on, so forth, and they open up a night school in the old Reno High
    School building from 7:00 to 9:00 every night of the week except Sunday. I was one of the students. There was about a
    couple of hundred of us, and it was divided in different sections - 20 or 25 in a bunch here and so on, so forth. And
    they had all of the teachers required to carry on the school. That went along until the beginning of the First World War,
    when they start to draft men. I always wonder if that war idea had any connection with the school in the early days; that,
    I never did know. But they thought that they better make us citizens, or probably we were sent back to where we come from....I
    don'tknow. However, we did have a school; I was there from 1913 up to 1917. With all of the diverse nationalities here
    in Reno that you described to me, it must have been difficult to teach them English together. It was. It was very difficult.
    Some, they were grasping, and some, they were backwards. And will say this much for the Chinee people - there was a half
    a dozen of them - they were bright; they were pretty near head of the class, [chuckling] Did they divide up the people
    who were taking the course by ethnic background? Well, as they went along they would try to arrange the class from time
    to time, yes. They would try to put the ones that would grasp the thing in a hurry in a class by themselves, and the ones
    that were slower were set back in another class and so on. I was right in the middle. No, what I'm getting at is did they
    separate the Swedes from the Chinese, from the Italians? No, no, those were all mixed. One time I would have an Indian
    descent on my side, and the next time I'd have a German guy. And we'd try to talk between ourselves the best we knowhow!
    [laughs] Were the instructors bilingual? Could the instructors speak both English and Italian, or English and Chinese?
- speaker: Respondent
  text: Oh, if they did, they didn'tmention it. That was strictly English. That is, I don't think there was anyone that they
    could talk a different language. They might at home, but in school it was just English - nothing else but. Can you recall
    the method that they used for teaching? Well, right now I don'tthink I'd have it. There was a time that we had to do writing,
    and they were giving us like a sheet of paper, and we would answer questions, so on, so forth. We did that a lot of time.
    Then again, we would do a lot of reading, like reading in a newspaper. Somebody would bring in a newspaper, and then you
    would read this section; somebody else would read another one, and see which one was capable of reading the English without
    making too many mistakes [chuckling], which were plenty. But within the school ourselves, we got along very nicely. We
    were all eager to learn - all of us. We knew it was for our own benefit. Was it evenly divided between men and women?
    There was no women. No women at all; it was all men. Do you have any idea why? Did anybody ever ask? Well, we thought
    that since there was a bunch of fellows that were working at night, we didn'texpect a young lady to go away from home
    at dark and to go to night school - I don'tknow! [laughs] But we didn't have any girls or ladies of any kind; it was all
    men. Learning the Blacksmith Trade in Italy and Reno, 1893-1912 Do you know if there was a school in the daytime for the
    women? Oh, yes, there was. In the daytime it was like it is today; the daytime school was just women and men. Oh, yes,
    it was high school. What I'm getting at is, during the daytime were there classes to teach immigrant women how to speak
    English? No, I don'tthink there was. No, that was regular high school like it is today. About what percentage of the students
    were Italians? Oh, I would say probably 10 percent. Ten out of every 100 were Italian. The next one was the German and
    the Swedes, and we didn'thave so many French, and we didn'thave so many Chinee.
- speaker: Respondent
  text: We had quite a few Japanese. And I would say the Japanese were probably 15 percent; as far as the class was concerned,
    there was more of them than there was other nationality. What were the Japanese people doing in this community? Well,
    they were just like anybody else; they would get a job in any place where they see fit. But most of them, they liked to
    be working in the hotels. They were working as chambermaids and dishwashers and different jobs that was available, The
    lumber company, they had team of horses, and they would take care of the animals. Shortly after you arrived in this country,
    you went to see the Jack Johnson-Jim Jeffries fight. How did that come to pass? Were you a fight fan already in Italy
    before you came to this country? Well, no. As far as the Jeffries-Johnson fight was concerned, I associated with other
    young Italian fellows that were in the neighborhood. I really didn'tknow what I was getting into when they told me we
    were going to see the fight. I didn'tknow anything about prize fighters. A bunch of them asked me to go along with them.
    One was Charlie Oppio, and he was one of my right sidekicks. But none of us had the price to get in. The general admission
    was $5, and we didn'thave any money, but we were figuring if there was some way we could arrange it to sneak in or try
    to get in to see the fight. This place where they had the fight, there was a fence all the way around; it was anywhere
    from 5 to 6 foot high. And there was no chance...there was no door open anywhere to get in. But it so happened that we
    walked right alongside of the grandstand, and someone saw us kids coming, and he put the hands down. He take one by one
    of us, and there was 5 of us, and we all got into that with the help of this one man that put the hands down and yanked
    us in! [laughing] And we crawled in so that, as the fight was going on, we were up there where the $35 seats were, but
    we were underneath the seats, not on top of them! [laughs] Looking out through people's legs?
- speaker: Respondent
  text: 'Looking through. The fight was supposed to last in the neighborhood of 42 rounds, but they only got as far as the
    fifteenth round, and saw that the white man was going to lose the fight. They finally decided to open the door, and they
    let everybody that was out there, outside, in free of charge. Of course, we were already in; we were already up there
    where the high price seats were! [laughs] And we saw the fight in that way. But, you know, the thing that impressed me
    the most at the time was when you walked out of there it was like going home from a funeral. There wasn''tvery much said
    from anyone. Those that lost their money, naturally they felt sorry for themselves. We didn''tlose anything, but you see
    the other guy kind of look down, and you wonder what in the world was in his mind that he''s so sad looking. But they
    lost money, and the thing, too: in the early days there was big feeling between the white people and the nigger. The white
    people had no love for the nigger, and I don''tthink the nigger had any love for the white people, either. And I learned
    shortly afterward, that Jack Johnson, the nigger that won the fight, as soon as the fight was over he sneaked out of town.
    He took off. He didn''teven stop for dinner. How did the Italians feel about the outcome of the fight? Well, they were
    not so worried about it, because most of those Italians, they didn''t gamble any money. They felt like myself - they were
    anxious to see the fight, but as far as buying any grandstand ticket, none of us bought a ticket to speak of, besides
    maybe a few. Of course, they were new to this country. Did you recall whether they were concerned about whether Johnson
    won or not? Oh, they all like to see the white man win the battle. Regardless of nationality, they were all anxious to
    see that the white man would win. And they all had pledged money - those that did the gambling - on the white man, and
    it was a sad situation when they saw that he was going to lose. Were there any black people in the audience that you can
    recall?'
- speaker: Respondent
  text: In the early day there was very few niggers in Reno. I remember in 1910, there was only one nigger. He and another
    man were having a team of horses from the livery stable go to the depot. And this one nigger, he would yell, "Golden Hotel,"
    and he opened up has mouth; and some of us kids kind of look inside of his mouth, because they were nigger on the outside
    and red on inside of the mouth! [laughs] And he would open up his mouth and say, "Golden Hotel," and we were looking into
    his mouth! He was the only one living in Reno? He was the only one at that time. Can you remember his name? No, I never
    did know his name. Did more black people come into Reno before the First World War? Shortly after the fight, the niggers
    start to come in. And even long before the First World War, there was a lot of niggers in Reno. They were porters. Of
    course, they were coming in through the train, you know. They were cooks and waiters in the train for the Southern Pacific.
    We would see the people particularly on Sunday morning; we would walk down when the train arrived, and just for the fun
    of it - you go down to the depot to see people coming out of the train and those that goes in the train. But we also see
    those niggers in the train that were working as cooks and waiters and so on, so forth; there was a lot of niggers then.
    And they start coming in, and they've been coming in ever since, as far as I know. What part of town did they live in
    before the First World War? Learning the Blacksmith Trade in Italy and Reno, 1893-1912 Well, they were scattered. More
    or less they were toward where the race track was, in that neighborhood. That was likened to the lower class of people;
    that's where the nigger would first settle. But after they got in and they were fairly well financially fixed, they would
    mix with the high class. They didn't hesitate to spread out and be placed anywhere around the university. And on the west
    end of town there was a place that they used to call sort of the nigger rich place up in the...
- speaker: Respondent
  text: from the courthouse up in the west end on top of the hill. I forgot the name of the streets. California Avenue is
    one of them, and many streets right in that neighborhood, there was niggers practically in every block. Can you recall
    anything about the Indian families living around Reno at that time? Oh, yes, there were a lot of them. There was a regular
    place where the MGM building is now. There was a whole territory, Indian reservation. [During the early part of the Twentieth
    Century many Indians lived on land to the east of metropolitan Reno. It was not until 1917 that the Reno-Sparks Indian
    Colony (reservation) was established on 20 acres of federal property. - ed.] When the MGM people came to Reno, we didn'tthink
    that they was going to land in that Indian reservation. But they got down there, and I presume that they dish out plenty
    of money. Those Indians, with the help of the city officials, were moved from Reno to Pyramid Lake. And those Indians
    had to get out after they sold the land. I guess they got their share of money. But actually, where the MGM is now, in
    that surrounding 2 or 3 square miles - it was right practically in the heart of the town of Reno - there was an Indian
    reservation. And the women were carrying their baby on their back; they had sort of a strap on their shoulder, and they
    had this baby they were carrying. The women were carrying the baby. The men would just go along with the women, but the
    woman, she was the underdog or the horse, and he was the chief. I think they were Washoe. But it was mixed; there was
    different races even a mong themselves. Did the men work in town? Most of the men worked for themselves. In the fall of
    the year, when the pine nuts ripen, they were going up in the hills to gather them. And a lot of those people that were
    living off of Pyramid Lake were fishing. They had a right to fish without buying a license, and they used to come on in
    sometimes - even in the shop where I was working - coming in and want to sell me a fish.
- speaker: Respondent
  text: Sometimes they were 2 foot long or 18 inches or something of that sort. They were living off of the hunting, and they
    were living off the fishing, and they were living off the pine nuts. And they were selling all of these things to the
    white people? Yes, they were. What were the Indian women doing? Can you recall if they worked in town? No, they were raising
    a family; they were doing the housework, but they didn't go to work for the white people; they stayed by themselves. Not
    that I know there was any Indian woman working for the white people. In some parts of this state, many of the Indian women
    would work in white houses as housekeepers. Did you hear of anything like that happening in Reno? We heard about it, but
    I never saw or heard of anyone in Reno in those days that had the Indian, never. I heard where they had niggers...and
    white women would make chamber ladies and take care of the hotel. But I never heard of an Indian woman work for the white
    people until later. Maude Pete, a Paiute, worked for us from 1934 to 1956 in our home. I'd like you to take a few minutes
    now and tell me about some of the businesses that were in the downtown area - particularly the Italian businesses. Oh,
    yes. Well, there were 2 hotels in Lake Street - the Europa Hotel and the Toscano Hotel. There was a lot of people, particularly
    on Saturday night and Sunday night, who would go to these restaurants. They also had not only the Italian and the French
    dinner, but they had the Basco. Across the street from the Toscano Hotel there was a Basco restaurant. It had along table,
    and every 4 persons, they give them one quart bottle of wine to divide between the 4. And in the early days, you pay your
    $20 a month to stay in the hotel. And get all the food you wanted to eat? All of the food you wanted to eat 3 times a
    day - breakfast, lunch and dinner. Lunch was just the same as the dinner. They were giving the soup and giving meat and
    they were giving steaks and spaghetti and different things they had to serve.
- speaker: Respondent
  text: Each day they were giving a different kind of a food. One day, on Thursday, the average place was serving corned beef
    and cabbage for lunch, and a big glass of beer and a baked potato. The Moana place...there was some Italians that were
    running a restaurant on their own. The place itself was conducted by Swedes. They were operating a streetcar from Reno
    to their place of business. I can'tthink of their name right now; I used to know them pretty well. Saturday and Sunday
    they would have a baseball game out there on their place. See, they were having a place with a fence around so that the
    kids wouldn't get in there and play baseball. They would get so they were playing ball with the big league. And that's
    kept up from the early days. The Swedish people had the land, and they had a streetcar line, and they had a building,
    but the restaurant was run by some of the Italians. They were just renting like one room, you might say, and did their
    cooking and fed the people. That took place in a different location from the town of Reno; it was out South Virginia road.
    Then when that airport came into Reno, there was an Italian fellow that was running a restaurant at the airport. And the
    restaurants - the Italian and the French, as well - they were pretty much spread all over town in different directions.
    Now, talk about the Germans, there was a place on Commercial Row they used to call Becker's Saloon. They used to serve
    lunch in there - 154 lunch, which included a glass of beer and a nice lunch. I had many lunches in there in the early
    days myself. The businesses you've been describing to me so far have been primarily inns or hotels or restaurants. Yes.
    Can you recall if any Italian people owned, let's Say, a hardware store of a grocery store or anything like That downtown?
    No, they were not the owners, but there was a lot of Italians who work in a grocery store. We had one grocery store that
    was Learning the Blacksmith Trade in Italy and Reno, 1893-1912 owned by Italians, the Rovetti family.
- speaker: Respondent
  text: Pat McCarran, who was one of the prominent lawyers we had in this state, bought so darn much groceries from this Italian,
    but he wasn'tpaying the bill [Patrick A McCarran graduated from the University of Nevada in 1901. Following his election
