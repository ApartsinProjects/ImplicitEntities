- speaker: Respondent
  text: Me working, and she got to see the horses run the race! [laughing] Did you like the horses yourself? Learning the
    Blacksmith Trade in Italy and Reno, 1893-1912 I did like the racing part. On Saturday afternoon, or so metimes on Sunday,
    I used to go to horse races with her. Are there any other leisure time activities that you can recall from before the
    First World War? No, outside of the sport part about fishing and hunting and horse races.... Reno used to have an Italian
    newspaper, the Bolletino del Nevada . Do you recall the newspaper? Did you read it before the First World War? Yes, yes.
    The newspaper was sponsored by a fellow by the name of John Granata. I think it was first coming out once a week on Saturday,
    and then he got so that he got an extra helper, and he was able to make it so that the paper was going out twice a week,
    on Tuesday and Saturday morning. Well, he was copying most of that stuff from different newspapers, and he would add it
    together and finally make up so that it can be an Italian newspaper. But whether he didn't try too hard, whether he didn'thave
