    Seven barbers, yes. Were the other barbers Sicilian also? Well, I didn'tknow. Outside of the owner, I didn'tknow the name
    of the barbers. Was there any hostility between the northern Italians and the Sicilians? Not particularly. But if there
    was a funeral, if it was one for a north Italian, practically all of the north Italians would turn out to the funeral.
    But if it was a southern Italian, half of the time half of the people wouldn'tturn out, unless they were friendly, which
    it'd have to be some way tie...family tie. When you worked for the Vietti and Bottini Blacksmith Shop, how many other
    blacksmith shops were there in town as your competitors? There was 5 of them.
- speaker: Respondent
  text: There was one by the name of Bony that were French people; they were talking French. And there was another place that
    they called Corbett. He had 5 or 6 men, about the same size as we were. Plus there was Leach on Church Lane and Casey
    on Chestnut Street. Corbett was Irish, and he was a nice man, too. He was a good Joe, even though we were in competition
    with one another. He was a great big husky fellow, and if he find you at the bar in the same place in the saloon, he'd
    ask you to have a glass of beer. Then there was 2 or 3 places where they were shoeing horses - nothing else but shoeing
    horses. We were not too concerned about the horse business, but Corbett was a fine fellow; we used to like him very much.
    And the Bonys, sometimes they'd come to us; they look for certain things, you know. Like in the early day they had a Studebaker
    wagon, and when an axle was wearing out, they had a new timber...timber axle, they used to call it - a new sleeve that
    you replace. You take the old one out, and you put the new one in; you have like a new axle. You don'thave to buy the
    whole new cross member; you only bought just this sleeve that goes with it when the wheel was turning. And those French
    people, they used to come and buy it from us just because they had a set of wheels that they didn'thave what it takes
    to repair. We were buying, those days, the parts for the wagons - particularly the Studebaker wagon - from a house in
    Stockton. Higginbotham Brothers, it was, and they're still in Stockton to this day What kind of work were the Frenchmen,
    the Bonys, doing? Well, they were fixing wagons, most of it. They would take care of these lumber company trucks. The
    same sort of thing you were doing, then? Yes, about the same thing that we were doing. But for different companies? Oh,
    yes, it was for different companies. There were different companies came from California that were going up into the woods
    to cut timber. And we in Reno were the nearest place to them to get some work done whenever they either break down or
    if they want some new parts, particularly like in the line of to ols for chopping trees or...different stuff that they
    needed - wedges, steel wedges.
- speaker: Respondent
  text: And we had that stuff made. What about the Corbett shop? What sort of work was it doing? He was in the same thing.
    Corbett was doing the same thing as we did. Also Leaches; also Caseys. So the 5 of you were all in competition for the
    wagons that were operated by the lumber companies? We were in competition, but we were good friends with all of them.
    We would exchange stuff with one another. I'm curious as to whether your customers were divided up in any way. As an example,
    did your shop get most of the Italian business and Corbett get most of the Irish, or did you just tend to...? Well, it
    was to a certain extent that way, but it was not so very strict. There were some Americans that would come to us just
    because they were Italian, but they came to us. And so did the Irish people. And I know that some of the Italians go to
    Corbett and the Bony place, too. You didn't go on working for Vietti and Bottini more than a couple of years, and you
    left. A couple of years, yes. Tell me why you decided to leave. Well, when I first land in there, like I was telling you
    earlier, I had a cousin that was the owner. But I had to work in there like at starvation wages; I would get $20 a month.
    But in the wintertime, when there was heavy snow and there was hardly any work coming here from any direction, my relative
    suggested that I go shovel snow for the Southern Pacific up on top of the hill; that I could make myself a few dollars.
    Outside of that there was nothing to do. Well, I says, "Last spring, when you decided to pay me $20 a month, you didn'ttell
    me that in the wintertime I was to shovel snow up on the hill." I didn'thave any clothes to put on; I didn't have any
    winter clothes to try to keep warm, even if I did go up there. So I decided that was the beginning of the finishing, and
    I was heading for Sparks, which was a railroad shop area at the time. There was a lot of people working in there; I don'tknow,
    500 or 600 people worked in the Sparks railroad equipment repair shops.
- speaker: Respondent
  text: With the Armstrong Manufacturing Company, 1912-1917 When I was on my way down to Sparks I stopped an front of the
    Armstrong Manufacturing Company shop, and I saw 6 or 7 men inside. It seemed as though everybody was busy working; they
    were fairly rushed at whatever they were doing. The man in charge of it was George Armstrong himself, and he seemed to
    know me. He made me a sign to go and see him, and I did. And he asked me if I wanted to go to work for him. was tickled
    pink to find the opportunity to say yes; I didn'twaste any time! That was about 11:30 in the morning, and he tell me to
    be there by 1:00.1 was there ready to go to work at about 1:00, and I worked for him from around 1912 until 1917. I was
    working for him when I joined the army. He had a blacksmith shop also; is that correct? You didn'tmention him earlier
    when you were talking about competitors. But he was one of the blacksmiths, just the same as Bony, the same as Corbett,
    yes. Was his shop doing the same sort of work? Yes. Did he ever tell you how he got to know about you? Did you have a
    reputation already? After we got to talking with one another, I remembered seeing him in our shop; he was looking for
    some kind of horseshoes at that particular time, as we got to talking with one another. I didn'tknow him to speak of,
    but he did know me. And I think he must have saw me working, because I was active; I wasn't lazy, by any means, [chuckling]
    How much did they offer you? I was getting $3 a day. Imagine, from $20 a month to get $3 a day! [laughs] That's when I
    bought an automobile shortly afterward! Can you tell me where his shop was located? Yes. You know where the depot of the
    Western Pacific is today? Well, his shop was across the street. After you began working at the Armstrong shop, did you
    continue to live at the Europa Hotel? Well, no. At that time there was a place across the street from Armstrong shop that
    they used to call the Richelieu Hotel. I moved from where I was downtown to the Richelieu Hotel.
- speaker: Respondent
  text: It was a better place; they had steam heat in there, where there was no heat at the other place down at the Europa
    Hotel...it was just a great big room like being in the army. They had different cots in there, and you had your suitcase
    under the bed. Out there in the Richelieu Hotel it was just live like a white man - you had steam heat and hot water,
    [laughter] Did Armstrong have any other Italians working for him? Hot in that particular shop. I was the only Italian.
    Speaking about the experience I had with him, he had a building in Alturas, California. In 1914 or '15 - I don'tremember
    which of those 2 years - he had it rented out, and they had a laundry, and the place caught fire and it burned up. He
    had some insurance, but he had to go up there and he wanted to build up the place again. He put me in charge of the shop
    in Reno. To tell you the truth, I was a greenhorn, to speak of, and I thought I had more than my handful to try to take
    care of 6 other men. They were all born and raised here in the States, and to have to take orders from me, I thought that
    that's a kind of a pretty hard task. I didn'tknow whether they were going to put up with me or not. But I told him, "You've
    got a bunch of men out there; they have much more experience than I have. Why put me in charge?" He says, "Andy, I can'ttrust
    them." He says, "The dollars, I'm afraid they go down in their pockets instead of mine." And he says, "I can trust you."
    Well, I thought that was all right. But anyway, he said that every 2 or 3 months he'd be down in Reno to see how things
    were going. Under those conditions I a greed that I would run the shop for him. And to make the long story short, sometimes
    I had to use my paycheck to see that everything else was paid, so that when he come along he would see on the books that
    I was making progress instead of going behind! [laughs] Sometimes I would use my whole week's paycheck to take care of
    the rest of the bill and do away with mine, as long as I was able to live.
- speaker: Respondent
  text: But eventually I got so that I gained the faith of the men that I was working with, and they all were pretty good
    workers; they were sincere about it. And there was no cutthroat opposition; they were willing to give me a day's work.
    I was not looking for any special favors. I wanted what was right and fair and square, and we got along very nicely. Before
    leaving for Alturas, George Armstrong took me down to the Washoe County Bank and introduced me to the manager. And he
    said to the manager, "This man's going to run my shop for the next 6 months, and he'll be coming in here and making bank
    deposits and then taking care of the business the same as I would." I was the youngest and the greenest one in the plant,
    and I felt as though I had quite a load on my shoulders at my age. I had 6 other men to take care of and provide their
    paychecks and try to keep them busy while they're working, and I felt as though it was more than I could do. Along with
    the line of work, this man Armstrong was a member of the Chamber of Commerce Board; and he told me that I should go attend
    the meeting, represent him, and anything that come along. At that particular time it looked like we were trying With the
    Armstrong Manufacturing Company, 1912-1917 to bring the Lincoln Highway through - it was supposed to be the main road
    between California and Colorado and Utah and so on, so forth. [In the period 1914-1916 communities and private interests
    were attempting to raise funds for the construction of a trans-continental road, the Lincoln Highway Reno did not succeed
    in becoming a destination on the road, which eventually was constructed along the route followed by the present U.S. 50.
    After World War I, the Victory Highway, U.S. 40, was constructed through Reno with federal funds. - ed.] We did considerable
    work, like putting up signs at different locations sponsoring this Lincoln Highway. However, during this Chamber of Commerce
    meeting, the main squeeze in there was the banker of the First National Bank.
- speaker: Respondent
  text: There were the different hardware store owners. Jack Horgan, a typical Irishman, was president of the Commercial Hardware
    Company. He was a very nice man to talk to, and I was kind of glad to see him be in the Chamber for the reason that he
    and I were sort of foreigners to the United States - he had his accent, and I had mine! [laughs] After Armstrong came
    back to the plant, well, naturally the whole responsibility as far as the Chamber of Commerce Board was concerned was
    turned over back to him. But I was the youngest member at the time. I don'tthink I was more than 18 or 19 years of age.
    Like I said, for my age I felt I had quite a responsibility to take care of the works in the shop and also to be a board
    member of the Chamber of Commerce of Reno. What was the Chamber's contribution going to be in bringing the Lincoln Highway
    into Reno? Well, it looked like Reno was a headquarters for different lines of endeavor. Even in the early days when it
    was first discovered, it was a central place, like north and south and east and west. The Chamber was just sponsoring
    the idea of the Lincoln Highway. It was just like a political affair, you might say, that they would try to get every
    business firm or even farmers to go with the idea to bring the main road to Reno. Eventually on the same location, they
    put up this road that we have today, like Number 80 and 395 coming from the north. And they actually sponsored the road.
    The people in the city and farmers, they werevery much enthused that we should have a main highway to go from state to
    state. Were they trying to get taxes raised in order to support it or to sell a bond issue, or what was the idea? No,
    they were try to raise taxes, but they didn't get the OK. Now, when the First World War came along, then they got to the
    stage to tax anybody as far as to put up any money to build a highway. Eventually, I think the state took over, and the
    different states got their heads together when they eventually put a highway from Sacramento to Utah.
- speaker: Respondent
  text: When the telephone company first come to Reno, in their line of endeavor they had to have a lot of to ols that we
    at Armstrong were pretty near taking care of. Like they had steel bars, 8 foot long, that had to be sharpened on both
    ends. And the picks that they would do a lot of digging trenches or setting poles with, and the shovels. They had a shovel
    with a 15or 20-foot handle. And they had to be taken care of; whenever they get worn out, they had to be either resharpened
    or add another piece of steel. We were doing a lot of work for the Bell Telephone Company at the time... not only from
    the beginning but up until the latest years, when they finally decided to buy machinery that they bought from the factory
    with different line of powers and diggers and so on, so forth. They did away with the hand tools that they used to use,
    but for many, many years, from the beginning, when they first laid out the telephone.... The first telephone was for the
    city of Reno - the mayor and his different offices with the city people - and then the main stores had a telephone. We
    had a telephone at the Armstrong Manufacturing Company, and our telephone was Number 15. I'm also told that you knew the
    fellow who had the first airplane here in Reno, and that the blacksmith shop might have worked on it. Yes. It was a man
    by the name of Blanche. The first airstrip that was in Reno was where the golf course is now on the south end of Arlington
    Street. Blanche had an airplane, and he was doing considerable flying. From time to time he had to have the spring repaired.
    When he landed, for some reason the back of the plane was hitting the ground, and he was breaking the spring. That's when
    we got acquainted with the Blanche airplane field. He actually had in mind to open up an airport where the golf course
    is now, but at the time it was just a bare piece of land. And it so happened that he was flying around Reno, and he dropped
    just above the cemetery and he got killed. I get the impression, from other conversations that we have had, that the Armstrong
    Manufacturing Company was involved in things that some of the other shops weren't involved in.
- speaker: Respondent
  text: Yes. And he also had some connection with the Nevada Transfer Company. Nevada Transfer had around 10 or 12 delivery
    trucks. They were picking up material from the depot, when the train was unloaded, and they were taking it to a warehouse;
    and from warehouse they would deliver it to different places, like a laundry or cement plant or so on, so forth. Nevada
    Transfer was the only company in Reno in those days that were delivering goods. Whether it was heavy or light material,
    they had van for carrying it. If a family wanted to move from San Francisco to Reno, they would go to San Francisco and
    pick up their whole houseful of goods and bring at into Reno, and vice-versa. And particularly from Reno to Virginia City.
    Virginia City was quite a large city. And Reno was only just across town; it had barely developed. At that time the Nevada,
    California and Oregon Railroad was a narrow gauge. There was a train every morning, and it was coming in every night -
    one was going up, and the other was coming down. But they felt as though they would probably pick up some more business
    if they had a bus-like rail vehicle to run in between the trains. At that time there was the Haines automobile. The NC
    & O supplied the Armstrong shop with both of these Haineses, and we cut the frame in the middle and extended it so that
    it would carry 20 passengers, plus the operator and the conductor. This rail bus came along, and they were having almost
    a full load when they were going out. They would go as far as Lakeview, Oregon, and come back the next day. The sad situation
    about the thing was that every time that it was taking a trip, when they come back they had to have the brakes relined.
    At that particular time the automobile had 2 rear wheels with the brakes. And with this rail bus full of people they had
    quite a load going downhill; the brakeman had nothing else to do but put on the brakes! [laughter] When he got to Reno,
    he had no more brakes to put on. They were just sliding along. It became too costly for them to try to put the brakes
    on all of the wheels.
- speaker: Respondent
  text: When I came back from With the Armstrong Manufacturing Company, 1912-1917 the army, the 2 buses were no longer on
    the track. You said you lengthened the frame. Did you have to lengthen the driveshaft as well? We had to lengthen everything
    - the frame, the driveshaft and the brake rods, and the steering apparatus had to be lengthened out. And this fellow,
    Armstrong, was a capable man; he had reliable mechanics that were able to do the work. As far as the mechanical part,
    it was well done and well taken care of. But as I said, there wasn'tenough brakes to stop the vehicle. Today, there's
    very little travel between Oregon and Reno. What was going on back then that would make it economically feasible to run
    a train every day? Well, it seemed as though that the rail bus was sort of attractive. Many different ones that I know
    of, they were going just for the fun of it. They were just taking a ride. They'd go as far as Takeview, Oregon, and stay
    there overnight, then come back the following day - they thought that it was quite a treat. You know, in the early days,
    the automobile was something that every man couldn'tafford to have, and being able to buy the ticket - which I think the
    price was not out of line at all - it was very attractive to business people, particularly. Take like people that were
    buying animals or hogs and horses and different things, they were going north because they had a supply of meat and such
    things as cows and sheep and so on to the north. Being that the railroad had a narrow gauge, the space between the wheels
    was very narrow. We had to reduce the length of the axle, the length of the housing, and we had to arrange it so that
    we had railroad wheels instead of rubber tires. Did you ever ride it? No, I never got to go because I was too busy in
    the shop. But I was anxious to take the trip. I never have to this day, as a matter of fact! [laughs] Lawton Hot Springs
    was a place 6 miles west of Reno where you could go swimming, take a hot bath. There was also the same kind of a hot spring
    at Moana.
- speaker: Respondent
  text: When Johnson- Jeffries fight came to Reno, I think Johnson was located at the Moana hot spring, and Jeffries was at
    the Lawton spring. Both places had hot water springs that anyone could go and take a steam bath in if they wanted to.
    The Lawton place is still in there today; it's sort of a nightclub. I don'tknow it it's open now or not, but it was a
    nightclub like many others that you could go up there and dance as long as you wanted to and have a nice dinner. The hot
    spring's still there at the present time under a different name. I don't know who owns it at the present time, but in
    the last 20 years, different people were coming in particularly from California, take over the place, remodel, put in
    some new ideas. The last time that they did some remodeling, they had a spring of water shooting up in the air 20 or 25
    feet. It was very attractive for the railroad; when they go by there, they'd sort of slow down the train to see the hot
    spring shooting water up in the air. And I don't know if they're open right now or not, but the spring's still there,
    nevertheless. The Armstrong-company would do a lot of work with building. We were doing work with different places in
    the mines, particularly in Virginia City, and down in Fallon and the Getchell mine. There was a man by the name of George
    Wingfield; his mine was in Tonopah. But he had prospects around Sparks. Some of those Sparks holes are still in here today.
    What sort of work were you doing for the mines? If they had a place where they had a shaft going down, we were fixing
    the elevator; we would make the elevator bucket, where 4 or 5 miners go into the elevator and shut the door, and you go
    down to the bottom of the hole. We would also sharpen drill bits and sharpen picks and sharpen different kinds of to ols
    that they were using to dig or break stone, like with a hammer. We were doing a lot of work for mines. Half of our job
    consisted of mining; the other half consisted of this Nevada Transfer trucks and wagons that they had around town.
- speaker: Respondent
  text: Repairing those? Yes. And we had plenty of work all year round. I learned in every place...even sometimes when you
    hire a helper that he's a stranger to you, and you put him to work, sometimes you see him do a job different than what
    you do yourself, and you learn from him the better way or quicker way of doing it. When I was with Vietti and Bottini
    I learned to temper. I learned to temper tools like cold chisels and different tools that had to be tempered. Besides
    sharpening them, you got to know how to temper. You've got to understand the heat of the metal; you've got to understand
    the grade of the steel that you deal with. And particularly with these Italians, they were buying steel from Sweden to
    make tools for these miners and leaf springs for wagons. It was an extremely high grade of metal, extremely high grade.
    And you had to be darn careful when you tempered that Swede steel, and give it a different temper than the domestic steel,
    because it you did give the same temper as the domestic steel, it would break, the first hit that you give it with the
    hammer. So these Italians, they were good people to understand the tempering, and I learned from them. But mostly I had
    learned my trade in the old country. When you went to the Armstrong shop before the First World War, what were you learning
    there? At that particular time, that's when automobiles were first coming in. Armstrong had 4 men to do nothing else but
    automobile repair. That's when I learned the tempering and making of the automobile and making of the automobile springs.
    The miners from Virginia City used to come to Reno and put on a parade on Labor Day. At that particular time there was
    only 7 automobiles. There was 3 doctors and 3 lawyers and the mayor of the town. Can you recall anybody ever coming in
    with a design for any kind of equipment and asking the Armstrong shop to manufacture it for them? There were 2 brothers
    from Minden- Gardnerville, German people. [John Dangberg and H. F. Dangberg, Jr.] One had a bank, and the other one was
    taking care of their stock or the farming.
- speaker: Respondent
  text: They got to the point in 1912 or 1913 where they decided to sell some of their potatoes., .send some of their potatoes
    to San Francisco. The 2 brothers went to Carson City, and they talked to the railroad man up there and asked about sending
    a carload of potatoes to San Francisco. This man in charge of the railroad station said that he didn'tknow; he would talk
    it over with the company, and to give him a week's time that they give them an answer. So they a greed to it. A week later,
    they go up there to see what the score was. And the railroad man was somewhat embarrassed. He says, "You know, With the
    Armstrong Manufacturing Company, 1912-1917 my company told me to tell you that they're hauling ore, not garbage." Whenever
    those people heard that their potatoes were garbage, they didn'tlike the sound of that music at all! [laughs] They says,
    "All right." They walk out of there, and they call it quit. They came to Reno, and they came to my shop. They wanted to
    know if I can build a truck body. But before they came to my shop, they went to the automobile-truck dealer, whose name
    was Wainwright. He only had one truck for sale, and it was the kind of a truck that they called a Mack truck; it had a
    bulldog on the radiator. They bought this one truck, and they paid for another one, which was supposed to have gotten
    in a week later. And they came to me with some sketches that they want to build a truck bed on this particular truck,
    8 foot wide and 16 foot long - flatbed. I was not able to give them a price for the reason I never built one before. I
    told them that I would charge them labor and material, whatever it takes, accordingly, and we a greed on that, that they
    went into on that price. A week later come along, they got the truck and it was ready to go. They couldn't find anybody
    to drive the truck to Minden, because nobody knew how to drive one! [laughter] They had to go back to the man that sold
    them the truck, and he had to get one of his mechanics to take the truck to Minden or Gardnerville, and then they had
    to teach somebody how to drive it by going around blocks in Gardnerville...
- speaker: Respondent
  text: Minden. They said they get to the place when it's time to stop, and the man said, "Oh, whoa!" He was hollering like
    if he was trying to stop a team of horses! [laughter] Eventually, I built the second truck, and they came and got that.
    And they did get the potatoes to San Francisco. However, they had a hard time to get there. The first day that they started
    out from Minden, they got to Verdi. The next day they stopped to Truckee, and the following day they went up on top of
    the summit, and they got to the stage when one wheel was down in the gutter, and the other wheel was on top of a rock.
    And the truck, with all of the potatoes they had on the bed, they slid off of the truck; they lost a load. They had to
    reload the truck. Finally they made it down to Carcinus (near Benicia), and there they had another stop for the reason
    that the people who operated the Carcinus barge didn'twant this truckload of potatoes on the barge for fear that it would
    tip the barge and lose the truck and all. So they had quite a discussion; they wasted a whole day debating; finally, they
    decided to load up the truck and the potatoes and got them to San Francisco. But it took them a whole solid week to get
    there. If there was a building going up, contractors used to come along to the Armstrong shop with the blueprints. Sometimes
    they had a railing, or they had an I beam, or they had reinforcing steel they wanted. And I used to be the one that had
    to go with the general contractor and size up the situation on the blueprints. Sometimes we had to go on the job, which
    was right in the city of Reno, and see where their steel was going to go and see what we're going to use - what kind of
    metal, and how long, and so on, so forth. In most cases, we go according to the drawing, and sometimes the general contractor
    would have an idea that would simplify the case; it would save him and it would save me working by a change to a certain
    extent from the blueprints. We would do that, hike the design of an ornamental railing - go like from the first floor
    to the second floor.
- speaker: Respondent
  text: We had books from the old country that'd show railings that was made wrong in some places - even in Berlin, even in
    Germany. And I would show the general contractor these books, and sometime he would pick out a certain drawing from the
    book - deviate from what the blueprints had called for. That took place in Reno and Carson City and down in Fallon sometimes,
    but mostly at the University of Nevada. We did many jobs at the University of Nevada that run away from the blueprints
    completely; we made our own design according to approval of the general contractor. The first job I was involved in up
    there was the Morrill Hall. It was a building we would repair - we made some steel doors down in the basement; we made
    fire escapes, and we made steel up in the rafters and in the roof to keep the main frame together. We made a lot of bolts
    and steel plates and rods and so on and so forth to assemble the roof of the Morrill Hall before the First World War;
    it must have been 1915 or 1916. The next building that we worked on was, I think, Lincoln Hall. (When the First World
    War broke out, we were stationed up there. My room was Number 13.) We did some work up there, particularly with the cement
    men and the stone masons. The stone masons had to tie one stone with the next, jointly, to stay put. They tell me at the
    time that if you put up 2 stones together, in the course of years between the heat of the summer and the cold of the winter,
    the 2 stones will become a part. The water and frost gets in there and it'd spread the 2 stones. But they would drill
    a hole in one block and another one in the other one and put a steel cross and tie the 2 of them together, and they stay
    put for as long as the stone lasts. And that took place on that building up there, particularly, to hold the stone together.
    Also, they had to have rods and bolts to kind of tie these timbers together, and then with a turnbuckle pull them to the
    right position to stay put. This day, a lot of the architects do away with the system that they had 30 or 40 or 50 years
    ago.
- speaker: Respondent
  text: They do things different today. In most cases they lay a flat roof, and in those days there was no such thing as a
    flat roof. Are there any other buildings at that time that you worked on that are on the university campus? Not at the
    university that I remember. We did a lot of work at the university later, but in the early days, outside of the 2 buildings
    that I remember, I don'tknow of any others. What was your impression of the campus at that time? Well, it was like a school
    place, like Mary S. Doten Elementary School. Sometimes they had a building and they had probably one acre of land, you
    know - sort of a yard like the children to play with. In my early days, I had no idea that it would turn out to be the
    university it is today, by no means. I hadn't the least impression that it so meday was going to be a big place that's
    going to be 15 or 20 or 50 buildings. I thought I'd never see the day that it would be developed to the stage that it
    is today. Never. Do you recall ever having seen any of the students or faculty in town? I used to know some of the students
    that were there. There was a Frenchman. He turned out to be a prize fighter; that's why I happened to know him. His name
    was George Malone. George Malone was a man about your height, probably a little heavier. [Interviewer is 6 feet, one inch
    in height; weighs 155 pounds.] He was a fighter up there. And if his team didn't go, just to suit himself, he wouldn'tmind
    to With the Armstrong Manufacturing Company, 1912-1917 go out there any time, and hed face the man face to face. If there
    turned out to be any fight [laughter], George Malone would win the fight. He was a fighter. And he turned out to be a...I
    think he had a job in Washington, D.C., in the early days. That's the George Malone you're thinking of? He was United
    States senator from Nevada, 1947-1959. [Malone was a 1917 graduate of the University of Nevada. - ed.] That's right, that's
    right You saw him get into fights? We werevery good friends. Sometime he would teach me how to use my fist!
- speaker: Respondent
  text: '[laughter] Where did you meet him? Well, I don''tknow. He had to come to the shop one wintertime - maybe 1914 - and
    he wanted some kind of iron made to tie the ski to his shoes. At that time I was working for George Armstrong. This fellow
    Malone sort of drew a print of his own. He had some skid iron that he wanted tied to his shoes, but he didn''thave the
    metal to do the tying with. And he had quite a time to explain to us, including me, how we''re going to tie that metal
    to his shoes and stay put, and not to be too complicated. Then, when he''d get out of the ski place, he wanted so that
    he can use his shoes without the ski on it. And we had quite a time. We made 2 or 3 different sets, but in the beginning,
    they didn''twork satisfactory to him or to us. And we a greed that if we can''t make it work, we''re not going to charge
    him for it. I think that''s the thing that kind of...he became fond of us - that if we didn''t do a job satisfactorily,
    he didn''thave to pay! [laughter] However, we made sort of a set screw with a kind of a thumb screw there, we called it,
    and you can tie those things to his shoes and they stay put. And whenever he wants to take them off, he unloosens the
    screw, and the thing would come on out. And he had a spike to go in the back of the heel, so that was kind of a safety
    pin. First of all you drill a hole in the heel in the back at about half or three-quarters of an inch into the heel, and
    you tie the thing in there. Then you tie toward the front with the screws. We made it so it turned out to be a good job.
    Now, this was while Malone was a student at the university? That''s right. You said that he got into fights occasionally.
    Can you recall what the fights were about? It was kind of a sport affair; I don''t know - maybe it was a part of his study,
    too. But there was a time like on Saturday night that they would put on a fight, and he would be the kingpin of the fight.
    They had 2 or 3 preliminary affairs, like those greenhorns, you know? But the last fight would be he and someone.'
- speaker: Respondent
  text: And boy, he'd go around 16 or 17 rounds like nobody's business. And then he finally laid out the guy on the floor,
    [laughs] And he was quite of a hero. We liked him for that because he was a good fighter. Was he known to get into fights
    outside of the ring? Well, that was a time there was some doing at the Riverside Hotel, and sometime it would end up into
    a fight in the end for some reason - either jealousy with the girls or whatever the score was; in many a case I never
    knew the reason for it. When George Malone got into it, they were scared to death that somebody was going to get beat
    up, and George was a man that could do it. [chuckles] Can you remember any other students or faculty from the university
    from that time? Well, there were different ones. Matter of fact, it was some of those students that I was producing a
    job for them. They working in the shop, and whatever money that I would pay them, they would use it to pay their way to
    the university. I had 2 fellows from California. They was on their second year, and that was the time when George Malone
    was going to fight. These 2 boys, they got in some of these bootlegging joints downtown, and they got drunk and they did
    get into a fight, and they beat up some young people that were not of age. They come near to go to jail. But in order
    to save their skin they jump the university; they went home back in California somewhere. One of the men, I owed him a
    week's salary, and he never did come back to pick up his check. Can you recall what sort of feeling there was about the
    university on the part of the townspeople before the First World War? Did they respect the university - the students and
    the faculty? Yes. Today, anyone that has the price to send the young man to university, they don'tthink nothing of it.
    But those days, whenever a fellow was able to go to university, it was somebody from an upper class family - somebody
    that... there was money. Like Getchell. There was a Getchell mine somewhere; I think he had 2 or 3 boys and 2 or 3 girls
    - they all attend the university.
- speaker: Respondent
  text: There was plenty of money coming out of the ground. And to us, we didn'tthink it was nothing new, as far as the Getchells,
    because he was a miner and he had the gold mine. But the way the thing turned out in the latest years, the people that
    was able to attend the university - like the son of a doctor or the son of a lawyer or the son of a wealthy person...
    that there was money without scratching for the last nickel. Today it seems as though that anybody able to make 2 ends
    meet can attend the university and they think nothing of it. What I was really angling at was not the difference in what
    it cost to go, but whether or not the work that was being done up there was respected. Oh, yes, it was respected. It was
    considered to be the top notch. When a fellow would graduate from the university and he was a doctor and he was a lawyer,
    it was considered to be the last minute...up-to-date mechanic, you might say, in their line of endeavor. Did you make
    any trips to San Francisco before the First World War? Nineteen fifteen was my first trip to San Francisco. That was the
    first world fair they had down there, the Panama-Pacific Exposition. In a place where they had different things to show,
    they were showing the Panama Canal - where the water was taken out in ponds from this ocean, and segregate the different
    ponds, so on, so forth, until the boat got from the particular ocean here to the western one, you know. Anyway, that was
    my first trip to San Francisco. I saw this and different things that they had to show. And at that particular time, they
    also showed the Ford automobile company, where they were selling Model T Fords. And that was the day that you could buy
    a Ford automobile for $100. With the Armstrong Manufacturing Company, 1912-1917 Did you think about buying one? I was
    thinking about buying one, and I wish I could have bought it, but I did not know how to get it back to Reno. I couldn't
    go to the hotel and tell them to keep my automobile. Those days, the automobiles were far and few between!
- speaker: Respondent
  text: They were assembling those cars very fast, and they were showing where they were taking the frame and they were taking
    the axle and they were taking the different parts and this...the motor, and set it into the frame. And first thing you
    know, you find it out there on 2 tracks that would spin the wheels and then it goes out on its own power. It was very
    interesting for a man that was mechanically inclined like I was to see the parts be put together and put the gasoline
    in the gas tank, and first thing you know you see the thing run out on its own power. Did you get any ideas from that
    about how to run the blacksmith shop? Well, not exactly, but I was very, very much taken up. If it was anything that was
    interesting to me, I didn'tmiss it! [chuckles] Had you gone to San Francisco by train? Yes, I went down by train. Did
    you stay in North Beach? No, I stayed in Eddy Street. There was a hotel on Eddy Street - I forgot the name now, but I
    wasn't on the North Beach then. Did you do any business while you were there? I know you were still quite young, but eventually
    we'll be talking about your later connections with some San Francisco businesses. I'm wondering if you developed any of
    those while you were there. Not in 1915.1 was still a young kid. Did you ever go to the Italian section of Stockton? Well,
    I visited Stockton probably every 5 or 6 years, but I'd just pass through there. In most cases I would go by way of Stockton
    to go to San Francisco. Did you have any family or friends there? I had some friends, yes. I had some relatives, as far
    as that goes. My first cousin, John Ghiggieri, was a fruit grower. In Concord, my cousin, Andrew Moresco, became a well-known
    wine maker. Jack and Louis Ginocchio were also fruit growers. But I would just stop and say hello and probably spend a
    couple of hours with them. As far as living there, I never did. George Armstrong was a great Odd Fellow. As a matter of
    fact, through his years of experience he became quite active and received a great honor that they confer a mong the fraternity.
- speaker: Respondent
  text: George Armstrong, kind of in duced me to join the Odd Fellows. I didn't know anything about it. However, I think in
    his frame of mind he thought it might be a good thing for him to kind of keep me under his wing for the reason that after
    working hours, we, like all the rest of the boys, were going out downtown. And if some decided to do some damage, well,
    I was one of them - not because I wanted to, but I was just trying to keep up with the society, [laughs] I became an Odd
    Fellows and came to take an in terest on the work they were doing. And then in 1915,1 visited the San Francisco Odd Fellows
    Lodge while I was there to see the Panama-Pacific Exposition. They were very friendly a very interesting people to deal
    with, to talk with. Some of those fellows even invited me to go to their home, although I didn't go. I had an arrangement
    made to stay in a hotel for a whole solid week, and I didn't go to anybody's home. However, I became very much interested,
    the way they treated me, that they make me feel like at home. As we went along, in the beginning of the first war, it
    seems that I was the only boy in Reno Lodge Number 14 that was made a soldier and had to go to war and fight the war.
    The women of the lodge in particular - the Rebekah, they call it, Number 7 - they made me a gift. They gave me a sweater;
    they made me gloves and.... Anything they can give to a young recruit to go in the army, I surely was presented with all
    of those gifts. The Odd Fellows were showing their good intentions. I felt as though I was like a member of the family.
    And at the same time in the mind of the man I was working for, I think it was keeping me off of the streets! [laughter]
    That was a good thing for him and for me, both. Did you try to get any of your friends of relatives to join the Odd Fellows?
    Yes, and in the years gone by I had many friends that joined the Odd Fellows on account of me kind of recommending them.
    Some stayed put, and some dropped out for not paying their dues, and some of them moved out of town.
- speaker: Respondent
  text: But I did my share toward trying to repay them for the good that they did for me. And I think they were pretty well
    rewarded. Were there many other Italian Americans who belonged to the Odd Fellows at that time ? Oh, yes, there was Uncle
    John Gotelli, the Semenzas, the Depaolis, Maggolo and Trozi...quite a few of them. And it's a good organization as a whole
    for working men. The dues was a dollar a month, and the initiation was $25, and from time to time they would have a banquet
    that was charged by the lodge that you didn'thave to pay a dime for. So, actually, you get your money rewarded as far
    as the banquet is concerned - free of charge. And, like at Christmastime or different times of the year, they would celebrate
    by giving dances or something to entertain the young fellows like myself. We had dances with the Rebekahs. The organization
    was not expensive, and it was very kindly, and you become acquainted with some of the people that you're doing business
    with in the daytime. But you feel different when you meet at night in a social affair. Can you remember anything notable
    that the Odd Fellows did in terms of civic responsibility here in Reno prior to the First World War? Well, they put up
    different buildings. They put up a building on the corner of Commercial Row and Sierra Street that was called the Reno
    Mercantile store. That was quite a large store in the early days. They financed the building. They bought the land; they
    put up the building; then it was rented out. They had 2 or 3 buildings. Right offhand I don'treally know just exactly
    where they were located. I did know that when the reporter came along and he in terviewed in the lodge, that they had
    so much revenue from different buildings. And matter of fact, they had revenue from the cemetery. They got an Odd Fellows
    cemetery up in Reno that's been in existence for many, many years. Any member of the order is entitled to be buried in
    a place in the Odd Fellows cemetery. And right joined to Odd Fellows there is also the Masonic fraternity that had a cemetery
    jointly.
- speaker: Respondent
  text: With the Armstrong Manufacturing Company, 1912-1917 Did your family have any tradition of membership in Masonry? I
    have been a Mason and a Shriner for over 60 years, but my family..being back in the old country in Italy, the whole nation
    was a Catholic affair, and there was not a connection with anybody else. There was no chance to join any other organization
    outside of the Catholic church. Well, there were some that were underground organizations in Europe. In the early days,
    in the city, yes, but not out in the country where the community is dictated by the priests. There was no possible chance
    to sneak out from under. [At least one member of the Ginocchio family believes that Andrew Ginocchio's father and grandfather
    were members of Masonic organizations in Italy. - ed.] I didn'tjoin any of the churches - not even the Catholic church,
    even though I was born as one. [chuckles] But I tell you what, in my early days in the line of work that I followed, any
    church - whether it was the Catholic church or the Episcopalian or some other church - that had need for some iron work
    in the church, like railing or hand rail or doorsteps or something to that effect...like the Saint Mary Hospital.... There
    was a lady by the name of Sister Serafina. And every time they put up a school building, she used to come by the shop,
    and wed build across for her and give it to her as a donation, and she set it on top of this particular school as a member
    of the Catholic church. And there was a man that was my partner and my cousin, that he was quite anxious to do something
    for Sister Serafina. For some reason he was very fond of this sister, and the 2 of them would chat sometimes for many
    minutes. And eventually when she leave, why, he a greed to do something for her - for Saint Mary's Hospital or some other
    churches or some other school. I think it was around 1916 that Jack Dempsey first come to Reno. On Saturday night we used
    to go around town, but Becker's Saloon on Commercial Row seemed to be the most lively place that anyone would like to
    go in and have a glass of beer.
- speaker: Respondent
  text: And this man, Dempsey, come along, and he go to the end of the bar, and then with his hand he hit on the end of the
    bar, and all of the glasses on the bar raised about 3 inches! [laughter] And he says, The man in charge of the bar was
    a fellow by the name of Harry Heidtmann. He said to him, "Now, look, if you want a drink, I'll give you what you want,
    but don'tcome around here to start any fights now." [laughs] Dempsey says, "I'll take a shot of Old Crow and a beer for
    chase. This man, Dempsey, was quite a famous man. However, he wasn't a champion yet at the time, but he was working his
    way up. I guess in his own frame of mind he was planning eventually to become a champion, and he did. But I was sorry
    for him an many different ways; later, he had so darn many leeches follow him that they would try to make a living out
    of what Dempsey was able to produce. When we see Dempsey walk along the street, in most case he was heading for Tony's
    [El Patio] Ballroom. When we saw Dempsey coming, we know that sooner or later he'll stop in at the blacksmith shop to
    see what we're doing. One of the men would take hold of a piece of steel 2 inches square, and he would put it in the fire,
    and it'd take a good, long heat. And when Dempsey come along, he had the sledgehammer ready for him to strike. It was
    a 22-pound sledgehammer, quite heavy. And when he pounded on this metal, it would spread in all directions. He was a powerful
    man; I would say he had more strength than 2 men put together. In Europe with the United States Army, 1917-1919 Shortly
    before America entered the First World War, I went down to the county courthouse to ask Elwood Beemer, the county clerk,
    for advice on which branch of the armed forces to join. I figured I would be drafted anyway, and I wanted to get in some
    branch that would be in keeping with my knowledge of blacksmithing and ironworking. Mr. Beemer suggested the Army Engineers.
    I applied and was accepted about one week before the United States entered the war.
- speaker: Respondent
  text: When I went in [the army] the Rebekahs gave me a shaving outfit. Anything that a man would want to go on a trip, why,
    they surely gave it to me - free of charge - being that I was the only one in the whole Odd Fellows organization that
    had joined the army. And they were doing all that they possibly knew how to make it pleasant for me. Your first stop was
    right up the hill here at the university, wasn't it? At the University of Nevada. I was assigned Number 13 room in Lincoln
    Hall. The one month that we stay there we had 6 hours of training, starting at 6:00 in the morning. We would drill for
    a couple of hours; then wed go out for breakfast. And we had one hour off from 8:00 to 9:00, and from 9:00 to 12:00 was
    more drilling. In the afternoon after lunch, about 1:00, we were supposed to be.... The railroad company had the Sparks
    shop in full force in those days. And they had in the neighborhood of 1,500 or 1,600 mechanics working down there. Different
    groups of us were assigned to certain departments. And in my case, I was assigned to the blacksmith department where they
    were doing welding - electric welding, forge welding, all kinds of welding - and there was a boilermaker shop, and there
    was a carpenter shop, and there was different units, different places, to work at the shop. We had to work from 1:00 until
    4:00, and at 4:00 we would go back to the university and we would march from 4:00 to 5:00. Well, there was buses that
    didn'ttake more than 15 or 20 minutes from Sparks to go to the university, but shortly after 23 get out of the bus, we
    were lining up for one more hour drilling between 5:00 and 6:00. Then at 6:00 we would have dinner, and after dinner we
    would have time off till bedtime at 9:00. There was 250 men, and most of us was volunteers. But at that particular time,
    they started the draft, and there was many of them that city officials felt as though they should be in the army, so they
    start to draft them. And those that didn'tvolunteer, they finally got in with us by being drafted.
- speaker: Respondent
  text: We were allowed to pick our choice as far as the line of work that we want to do. In my case, since I volunteered
    to be in the mechanical division, I was assigned to the engineers. I was told that they needed mechanics in France to
    operate the railroad, and I became one of them. Were the other people who were with you here all from Nevada? They were
    all from Nevada, every one of them. I was a member of the American Legion after the war was over, and they told me that
    out of 250 there was only 79 that came back to Reno. Some of those boys were lost across the sea; some would die from
    the flu. In that particular ship that I was assigned to, there was 23 men that in the morning, they didn't wake up for
    breakfast; they were dead from the flu. Twenty-three of them! And all the rest of the ship that wasn'twith us, they all
    had a loss of anywhere from 25 to 50. Was that on the way over or on the way back? On the way over. Of course, there was
    a horrible flu epidemic right after the war, as well, in the United States. Well, yes. It was like one of those nurses
    was telling us after we got across in France - that instead of calling it Spanish flu, they should call it German flu.
    She said that half of those servicemen that had died, died from the flu. [laughs] But since we had no grudge against the
    Spaniards, they would call it the Spanish flu. And I think she might have had a point in that case! [laughs] After leaving
    Reno, did you go to train anywhere else in the United States before being shipped to Europe? Oh, yes. After the first
    month at the university, we were divided into 2 groups. Those that had a university education and papers to show for it,
    they were sent to California to become officers in the different training camps. Those that were just common laborers,
    mechanics and different lines of endeavor (like in my case), we were sent from Reno to Fort Benjamin Harrison, Indianapolis,
    Indiana. And we discovered after we got there that it was a great big institution; there was something like 5,000 or 6,000
    soldiers out there training day in and day out.
- speaker: Respondent
  text: If by any chance we had a stormy night, you can almost bet that you'd be called out on parade...about 10:00 or 11:00
    at night. You had to go up on top of a hill, have a sham battle, and you get soaking wet. After 2:00 or 3:00 in the morning
    you get back in the camp, then you go to bed, and 6:00 wake up again and start another day of training - day in and day
    out. And that lasted for about 2 months. From that point they started to distribute us to different locations. Many of
    us found ourselves at Camp Upton, New York, where we had dental inspection. In my case I had a bad tooth that had a cavity.
    The man in charge of the works was a second lieutenant. He took the second look, and he says, "I better go and consult
    with the major and see what we're going to do about your teeth." So the man went out, and In Europe with the United States
    Army, 1917-1919 the major come along with him and look at my mouth, and the lieutenant says, "Should we put in gold or
    silver?" And the major said, "Silver, nothing." He said, "This man will be shot to pieces 6 months from now Put nickel
    in. Silver is too good." And that's what they put in to fill the tooth! Well, it was very interesting to start with, but
    I took it for whatever it was worth and [laughs] let it go at that. We stayed in Camp Upton 2 weeks, and we found ourselves
    on a ship ready to cross the water. One Saturday afternoon - I think it was 18 June 1918 - we sailed out in view of the
    Brooklyn Bridge, with its elegant suspension system, and then along in front of the Statue of Liberty, where we all saluted.
    The officer in command of the ship came along, and he tell us that, "For some of you fellows this may be the first time
    that you see the Statue of Liberty; and for some of you, it may be the last time, too," he says, "so take a damn good
    look, fellows!" [laughs] And we did. However, at 5:30 that same night we were attacked by the German submarines just off
    New York Harbor. Once you got overseas, you were, I believe, involved in operating the French railroad; is that correct?
- speaker: Respondent
  text: Yes, yes. I was a fireman. You were on a steam engine, as a fireman? Yes. And, well, my first experience...you know,
    in the west we had the oil burner, and whenever you fire up a locomotive all you had to do is light the fire, and the
    oil would create all the fire you'd need. However, when I found myself across the water, they were firing engines with
    what they called briquettes. It was sort of a coal, shaped 3 inches square; it didn'texactly have sharp corners, but these
    briquettes, there was lumps of them, and they had to be put in the firebox with a shovel. But I didn'tknow how to do it.
    I would pile up a bunch of briquettes in the middle of the firebox like you're piling up a bunch of sand. However, when
    the engineer come along, he opened the firebox and he see that I had all of those briquettes piled up in the middle. He
    start to cuss, Only thing I could figure out at the time, that he was thinking, "He was so dumb or he can't understand.
    American soldier no good." [laughs] That was me! However, he took a great big long iron poker, and he start to distribute
    those briquettes in the different corners of the firebox. Eventually I learned that you had to make a fire just like if
    you make a cut in blanket - to have it equally divided, equally thick, all the way through the firebox in the corners,
    as well as in the middle. I soon learned how to do it, and now he didn'thave to tell me the second time. But at that time,
    I didn'thave any complaint to make because I had to take it. He was showing me on the meter that we're supposed to have
    65 pounds of pressure, but I don'tthink we had more than 5 or 6 pounds. There was no pressure to speak of. The 75 flues
    were leaking water, the fire was dying, and it was time to parti; he was going to show me his watch, [laughs] and we didn't
    have any steam. It was sort of a critical point. However, we managed to fire the thing up with the engineer's help. We
    raised steam the quickest way possible, and we finally took off. Our destination was to pick up this train at the middle
    section and take it to the front; and that was ammunition, food - anything that the front line deserved.
- speaker: Respondent
  text: 'Our line of endeavor was to deliver the goods as safe as you can, if you don''t get blown up before you get there.
    Did you have the opportunity to do any blacksmithing while you were in the military? After the war was over and they reclassified
    all of us guys, then I was assigned to work in the shop as a mechanic. We didn''tlike the idea too well for the reason
    that we felt as though the war was over. We did our best, and why send me to do another job which I wasn''tparticularly
    interested in at the time? However, I didn''thave 2 years out there; I only had one year, and I was classified to work
    in the shop, which I did. We got along very well to start with, but after 6 months in the shop, the French people would
    get discharged from their service; and I presume many of them had a job with the railroad, and it looked like they had
    the impression that since the American was loaning money and managed different things through the French government, they
    came up with the idea that the Americans were going to take over the railroad. And they were fed up with us. They tell
    us, " Soldat Americaine , the war is over; go home." Well, we wanted to go home all right enough, but you can''tleave
    till you''re released. We had to stay out there practically the whole of 1919 to produce our share of the work. We had
    to take down to the seaport the wounded. They called it the brassworks - the officers with all of their medals and so
    on, so forth - the Red Cross, and there were those in the hospital. And finally we got back in the States, but that was
    in the fall of the year 1919. While you were in Europe, did you learn anything that you might be able to put to use in
    your trade back here in the United States? Well, actually that was railroad service; there was no particular spot that
    I didn''tknow something about the work. However, one point that I thought I should have mentioned: while the war was going
    on, we had cannon that were sitting on flatcars tied down with a cable and taken to the front.'
- speaker: Respondent
  text: They would stay on the front about one week, and in a week's time the same cannon would come back to the railroad
    headquarters. The cannon was blowing up; it was split in the middle. And every time one of those cannon blew up, the man
    that was doing the firing was getting killed. We killed many of our own soldiers from our own cannon. It seemed as though
    whoever was making those cannon, they was kind of poorly assembled, and there seemed to be from the general appearance
    that they were made in 2 halves. The heat and explosion of the powder would cause the 2 halves to separate, and they were
    sent back to the headquarters of the railroad. I mentioned at the time with one of the sergeants that was in charge of
    the work that I can put a band on those cannon - one in front and one in the back - and shrink it on tight, that I would
    save those cannon from being thrown away. After quite a bit of discussion, maybe a month or so later, 2 of those cannon
    were brought to the shop, and I put the bands on. But shortly after then, we were sent dispatches to go back to the States.
    Whatever happened, I don'tknow. That was the end! [chuckles] You were associating with a lot of foreigners, who, I would
    imagine, had different techniques of smithing than you were accustomed to. Yes. Did you pick up any tips on how to do
    things that you hadn'tseen in the United States? In some way they would be more of a help; and on the other hand, sometimes
    they were drawbacks, you might say. Some of those mechanics in the old country, they would do In Europe with the United
    States Army, 1917-1919 things in 50 years behind time. When you talk about making a forge welding, they would take a different
    process; they were slow doing it. And then they would put on a certain type of compound - Borax and so on, so forth. We
    in the States, wed just do it in one heat. You take a welding heat and you put the 2 pieces together, and you hit it with
    a sledgehammer, and it's supposed to be done. In their case, if they didn'ttake the second heat to stick the 2 parts together,
    they were not going anywhere; they put it back in the fire, and they were taking along heat and a slow heat, and eventually
    you pound it out to the shape that you want to bring to.
- speaker: Respondent
  text: However, their line of work was doing it twice as long as what we were doing in the States. And matter of fact, I
    think I was teaching some of those fellows, those Europeans that we had, to do it a quick way, my way, than the way that
    I learned from them - the way they were doing it. They were doing it sincerely, and they were doing good, and they had
    the old system, and they were doing point by point without missing one. But in our case we would just sometimes skip that,
    and put the 2 and 2 together and call it a job - finish, and that's it. The point that I was interested to learn at the
    time - as I had in my early days - I was quite anxious to know how they tempered an anvil. Different ones had a different
    idea, and some of the people that I talked with seemed as though they would tell me in detail, and I took it for whatever
    it was worth. Then another fellow I would talk to, he'd tell me his idea, and it might have been entirely different than
    the one I learned before. However, after we were out there - and we liked to go different places to see the country -
    we went along to a place where they were actually melting metal and making railroad rail and rail for bridges and so forth.
    And I learned from one particular place...it was 2 Swedes that had charge of that particular section of the work - when
    the metal actually comes out of the furnace - and they put it in place where they form it from soft, liquid stuff to become
    metal, become rail. In that place they were making I beams - they're supposed to be for bridges - and they would put on
    the camber. This particular camber was done by.... After they got through rolling the particular beam at a certain degree
    of heat, they would take it off with a crane and set it out in the field. They would set it standing up, and the bottom
    part'd be laying on the ground, and it stayed there for 24 hours. It seemed as though the dampness of the ground or the
    moisture would shrink the bottom quarter of the I beam. Well, at that particular point, I had learned how to put camber
    on a beam, although I had no connection myself, but I saw the way they were doing.
- speaker: Respondent
  text: '[This particular technique proved useful in construction of the Golden Gate Bridge. See page 181. - ed.] Did you
    go to a number of blacksmith shops while you were in the army? Well, we went to different places and so on, so forth.
    While we were in Paris sometimes we would sneak out in places just for the purpose to see what was going on. Sometime
    they didn''t let us in the shop at all, especially when we were dressed up in American uniform; they felt as though we
    were more of a drawback than could be a helper, which they were right, [laughter] But some places, they let us in to see
    what they were doing. And there were some interesting places. One thing about it, I notice from those European people,
    they''re not in a hurry to produce anything quickly. They take their time. If today a lone wasn''tenough, tomorrow''s
    another day; they''d carry on the same project. In this country we do different: it seems as though when you start a job,
    you want to get it done as soon as possible so that there can be some profit on the end of the works. But in their case,
    it seemed as though the money part is a secondary affair, while the craft is the number one item, [chuckles] Did you ever
    take a leave to Italy while you were in the service? Yes. While I was in the service I was trying my best to get to take
    a trip to see my folks. At that particular time I was only in the States from 1910 to 1918. And I went to the sergeant
    and told him that I''d like to get a pass to go to Genoa, Italy. It seemed as though weeks and days went by, but I was
    getting no answer. Finally, one day, the sergeant said to me, "I''ll tell you how you can get there, but you''ve got to
    take it on your own." He says, "You can get a pass to go to Paris, which is easy to get. Nine or 10 days is the limit.
    When you get to Paris, instead of getting off of the train, why, keep on going until you get to Italy." And I did. That
    following week I got a pass to go to Paris. I got myself ready to go into Paris, but instead of getting off the train,
    I stayed on the train, and we traveled the whole next day to the south of France.'
- speaker: Respondent
  text: There was a place where there was a tunnel from France into Italy. And when you get out of the tunnel, the first city
    that you run into, they call it Udine. It was quite a large city. They had military police and they had guards, and since
    it was shortly after the war, it seems that it was all a military affair. As I got to the depot, I was trying to buy myself
    a ticket to go to Genoa, which is a short distance from Udine. The lady that was selling ticket asked me what I had to
    show for myself, that I had a right to go to Genoa. I had a pass to go to Paris, but after I showed her, she knew more
    about the paper than I did! [laughs] She tell me those papers are no good! She didn't want to sell me the ticket, and
    the train was ready to leave, so I got a hold of my grip, and I just run down. There was sort of a narrow point, and the
    fellows start to stop me. I said, "To hell with you!" And I kept on going and hang onto the train, and I finally got inside.
    Boy, that train was jammed - everybody sitting down and standing up. The conductor come along; he called for tickets.
    Of course, when he got to me, he sized me up, and I sized him, too! [laughter] He asked me for the ticket. And I told
    him, I show him that pass to go to Paris; he took a look, but he gave it back to me; he says, "It's no good." He says,
    "I'll put you off of the train." And I says, "If you do, you'll come down with me." I had made up my mind that I was just
    going to grab him, and if I had to go down, why, he'd come with me, surer than heck! [laughs] And he took the second look
    when I told him that if he put me off the train that he come down with me. He decide to charge me 20 francs. I gave him
    the 20 francs; then he put a ticket in my cap, and I went along. So I had no trouble from that time on. However, when
    I got to Genoa, I went home, and I only had time to spend 5 days with my family. I had to have the rest of the time with
    a day to spare to get back to where I was located in France without having any trouble.
- speaker: Respondent
  text: I didn'twant to be a deserter. Of course, the company was telling me they were ready to cross to get back to the States.
    Had things changed very much with your family? No. While I was there, I enjoyed the visit and so on, so forth. At that
    particular time, In Europe with the United States Army, 1917-1919 when I first joined the service, I had made an allotment
    to my mother to get a share of my paycheck. When I was asking her if she got it, she tell me that since I had another
    brother - Louie, an ally in the Italian army - that they were taking the money from me and they were sending it to the
    other son that was in the hospital that was wounded in north Italy while the war was going on. She said they were thankful
    to get the money; however, they take it from one hand and give it to the other, [laughs] Try to help the one that was
    in the hospital. After 5 days, I got back to the railroad company. However, a friend of mine that went to school with
    me in the early days (he was also a first cousin) was quite familiar with conditions, and he asked me how in the world
    I managed to get home. He said in Italy they're not allowed to go from one state to the next. Essentially, he was honest
    with me. I told him what I did, and he says, "You took a chance to go to jail," he says. "If they arrest you, it's 5 years
    in jail for you. How are you going to get back?" I said, "I'm going to get back the same way I came here." I said, "I'll
    try my best." So he thought he'd do me a favor. He was an officer; he was a captain in the medical department. He bought
    me a ticket, and that ticket was good from north Genoa to go to Paris - on his own expense. And I sat along that time
    a mong military police and all the other guards that they had at different places; essentially they saw the ticket I had
    in my cap - there was not a word said to me from anybody. He was an officer in the Italian army? Italian army, yes. The
    man was my first cousin and the family were neighbors for many years. His name was Ceresola.
- speaker: Respondent
  text: Both he and his wife were medical doctors. And I say he did me a favor...it's a bigger favor to me now than it was
    at that time. At the time I didn'tthink it was...just a personal favor, but I didn'tthink so much of it. But now when
    I look back, it actually was a favor, because if I'd've got caught - which very likely I might've got caught - a jail
    term was for me. [chuckling] One night, toward the end of the war, instead of delivering food, ammunition, et cetera to
    the war zone, we were assigned to a special train in another rail line, entirely different than the ones we were used
    to. We had 7 cars. We were told we would meet, at 12:00 midnight, German officials. They were to come into our own train.
    A group of us plotted to kill these Germans. We had been told, and chants had been sung, "Bring home Kaiser Wilhelm's
    head!" We in tended to do just that. It was mentioned to the captain. He called us immediately, saying that if we wanted
    to see the Statue of Liberty again, to do nothing! He said we would be shot on the spot and that we would be no heroes.
    The 2 trains met, nose to nose. The Germans, heavily armed, got into our train. The bodyguards were over 6 feet, 6 inches,
    surrounding all officers. French guards were holding the second line, and the American guards were the third line of defense.
    They entered the box car and we later, peacefully, went on to Versailles, arriving at daylight. _5 In the end of 1919,
    around November, I returned to the United States. I had applied for United States citizenship in 1916. It took 2 years.
    Two years later I was in France, of course. Upon my return to this country following the war, my final papers were issued.
    I became a citizen of the United States in 1919. After I got back to Reno, the place where I was working, it was sort
    of running down. George Armstrong had sold out, and there was 2 fellows - one was a German. And since the Germans didn'thave
    too much of a good standing in Reno at the time, they had nothing to offer me as far as getting a job.
- speaker: Respondent
  text: I sort of had a traveling fever from the time I spent with the railroad, and from Reno I went to San Francisco, where
    I worked for Union Iron Works for a week. Then I went to Stockton. I stayed in Stockton maybe 2 weeks, and worked for
    that fellow by the name of Bigelow, who fabricated tractors. And I was working with the fellow - he was much older than
    I was - and he said in the afternoon he had a headache, and he put the hands around across his forehead. And I kind of
    sympathized with him; I says, "Well, as far as my health is concerned," I says, "so far I never had a headache." And he
    looked at me kind of surprised; he said, "Hell, you haven't got anything in your head to ache!" [laughter] And I think
    he was right! You had worked for one week at Union Iron when you got out of the army. Why only one week? You know, while
    I was in the service I was connected with the railroad, and you catch a sort of a traveling fever. You can'tstay in one
    place too long - you want to go, you want to see, you want to.... And for me to be tied down there in San Francisco, working
    at the forge.... He was a good man, and he was giving me a decent job. I had no complaint to make as far as the job being
    too hard or too dirty or not that I could handle. I could handle it very nicely, and when I look back today, I say, But
    in those days, I thought I better go back to Reno. I had a lot of ties, a lot of connections. Up in Reno I know everybody;
    I thought I did. And for me to be down there, tied up at the forge, and then I didn'tknow where to go after I get out
    of work. I thought I was in the wrong place. And you went from there to Stockton and spent some time there? From there
    I went to Oakland. But I just did a lot of running around in Oakland; I didn'tstay, and I went to Stockton. And I worked
    briefly in Stockton for this Bigelow. And then hack to Reno? Well, then I went to Sacramento. It was one Saturday noon,
    and I was actually heading for Reno; and in Sacramento on the main streets, I passed fellows that by sizing up in their
    faces, I thought I'd known.
- speaker: Respondent
  text: I thought that their faces looked very familiar. And as I passed by, one of those fellows, he looked back and he says,
    "Is your name Andy?" And I says, "Yes." And you know, it happened that those 2 boys and me was in the same company in
    the army across the water. In the same company! But, when you see 2 men dressed up in uniform, you know them as so ldiers,
    and then you see them dressed up in civilian clothes...outside of the look in their face, I couldn'tfigure out who they
    were. But when this man asked me if my name was Andy and I say, "Yes," then we became known to each other that we were
    in the same company. Well, anyway, those days was during the Prohibition. And one of those fellows, he said to me, "Would
    you like to have a glass of beer?" And I says, "Yes!" [laughs] He says, "I'll take you to a place that's just one block
    from the police department. But I know the words," he says, "and I'll get you in on my word." So, we go out there, and
    we walk 4 or 5 blocks to get to this place. He had to whisper his word through a hole in the wall in there. Whatever he
    did say, I didn'tknow, but the man opened the door, and I got in with these 2 fellows. We were hardly in there 5 minutes
    that we all ordered a glass of beer, and a man come from behind me, and he said, Let me have it." So he take my glass
    of beer. And I said, "Well, if you need any work done that I do," I said, "take it." But he was a Prohi. [Federal revenue
    a gent - a prohibition enforcer.] He had a bottle with a funnel, and instead of drinking the beer, he put it into this
    funnel - that was evidence that they were selling beer. Well, that wasn't all. There was a couple other fellows with him.
    They were ornery people, and first thing you know they start to throw rocks in a mirror. They broke up all that saloon.
    And the man that was behind the bar, he must have had some whiskey; whatever he had, he threw it down in the sink and
    he tried to do away with it. But they arrested him, and they tried to arrest us, too.
- speaker: Respondent
  text: 'And myself and these 2 fellows, we had to talk like a Dutch uncle to let us out free, because we were just discharged
    from the army. I don''t think it was a month we were discharged, and we didn''twant to find ourselves in jail in Sacramento!
    [laughs] Well, we got out, and it was along time since I had another glass of beer, [laughter] One of my 2 army buddies
    said to me, since I was heading back to Reno, "You stay another day." He says, "I''ll take you to work for a place that
    they''re doing nice work, and a man that''s a good friend of mine." And he says, "I''m sure that he give you a job." So
    he took me to this company, S. S. Allbright, where they were building school buses, and he in troduced me to the man in
    charge. After we got to talk to him a little bit, he asked me how much money I ask for. "Well," I says, "I''m not familiar
    with the wages, but whatever you pay the other fellows...I don''texpect you to pay me any more, any less than the other
    fellows. He tried to find out how much I want, and I says, "I''ll tell you what I''ll do: I''ll work for you for a week,
    and it I like it, I stay; and I don''tlike it, I go. And if you don''tthink I''m worth the wages that the other fellows
    get, well, you don''thave to pay me any more, any less." I was hired and I worked 5 years for S. S. Alibright. It was
    a very nice job, and that was a job that actually was interesting. At that particular time the streetcars and the buses,
    it looked to me from what I was told and what I saw with my own eyes that there had to be an engineer to operate the vehicle
    and a conductor. The conductor had to open and close the door every time one wants to get in and one wants to get out.
    The man I was working for, he asked me if I can figure out some way that the man that operated the bus could open and
    close his door without having to have the conductor be right there in this job, which takes 2 men to do instead one. And
    I came to the conclusion - by making different sketches and different drawings on my own - that you could plant the bracket
    on the dashboard in front of the driver''s seat.'
- speaker: Respondent
  text: I had a lever made with a sort of a half circle... you take this lever, and you shove it one way; you open the door,
    and then you shove it back and you pass the center - it locks itself. You didn'thave to have a key or anything of the
    sort to lock it. After you pass the center point, shortly, it stop right there and it stay closed on its own. This man
    that I worked for got a patent on it, and for 10 years he derived royalty, which I never got a penny for it! [laughs]
    I didn'tknow that he even had the thing patented, but from that time on every bus that we were making, I was the man that
    had to make the ironworks and so on, so forth to open and close the door - which becamevery simple. But in the latest
    years they came along with the hydraulic system, so when the hydraulic took place, the mechanical part was dismissed.
    While employed at S. S. Allbright I attended a Rebekah Lodge affair in Sacramento, and on that particular night they were
    giving dances. There was a girl there who also worked at S. S. Allbright. Her name was Viola Chilton Barnes. I thought
    she looked kind of nice, but I didn'tknow her from Adam. I managed to get close to the point where I had a chance to ask
    for a dance, and we did have a dance. And I thought I'd like to be able to arrange it so that I can meet her again; however,
    I didn't know whether I was trying to be too brave for my own experience! [chuckles] When the dance came to an end, I
    told her that I hope that we meet some more. She says, "Oh, they give dances quite often. There may be another dance maybe
    a month from now," she said. And I says, "I'll be there!" And sure enough, I was there, and then she was there, too. [laughs]
    And it took us about a couple of years' time, but however we begin to get to the point...we finally got married. My wife's
    parents, at one time, were wellto-do people in Durham, England - English people who, however, I never got to know. She
    never did know too much about her ancestors. Her father was a master car builder with the Southern Pacific in Sacramento.
- speaker: Respondent
  text: He stayed in there until he retired. Well, when he retired, he felt as though he was going to take life easy, that
    he was going to enjoy and see the world. But his life from the time that he retired until he passed away, it only lasted
    2 years. The first stop that he made was Eugene, Oregon. He had some people that he knew up there, and he visited with
    them for 2 or 3 weeks. He took sick, and he came back to Reno, and he stayed with us for 2 or 3 months. Then they decided
    to go to Oakland. He had a daughter that was marrying in Oakland. He stayed at her place 2 or 3 months, and there he took
    sick and he passed away. In 1921 or 1922 I became a stockholder in the Bank of Italy. That particular bank, in those days
    was like a mushroom growing off of a desert, you might say. It was surprising even to the American people that all at
    once a great big bank got up in San Francisco out of nowhere, you might say. This fellow Giannini [Amadeo Giannini, the
    founder of the bank] was doing good as long as he stayed within the state of California. But somewhere or other he got
    mixed up with those eastern banks in New York City. Whatever did take place, I never did know, but I think they took him
    for a ride; they broke him up in business. But as long as he was just the Bank of Italy in San Francisco, he had all of
    the Italian and included all of the European people - the German people and the French people and the Swedes - they all
    had an in terest in that Bank of Italy. If they had $1,000 to deposit, they would give it to the Bank of Italy. [By 1930
    the Bank of Italy had 280 branches nationwide. In that year it was renamed the Bank of America. - ed.] But as I said,
    in the latest years, when he got mixed up in New York City, I think they had it in for him. I don'tknow what the score
    was, but they just broke him up in business. I had shares that I had bought for $25 a share, and the last share that I
    bought from the Bank of Italy was $365 for one share. When I was getting my dividend every 6 months, instead of me cashing
    it in and using the dividend, I would add another $25 or $30 and buy another share; or if I had enough money I'd buy 2
    or 3 shares and so on, so forth, until I had 113 shares.
- speaker: Respondent
  text: At that time, every traveling salesman or doctors or anybody that had more brains that I had...and I would talk about
    the Bank of Italy stock. Everybody predicted that by Christmastime that stock would be worth $1,000 a share. And I had
    113 shares, and I said to myself, "$113,000!" I was about 32 or 33 years of age - I says, "I'll be rich." In the meantime,
    the wife was a member of some ladies' club, and then she was attending this ladies' club. And one day, while we were having
    lunch in the house, she said to me, "You know, if I were you, I'd take that stock that you have in the Bank of Italy and
    cash it." And I looked at her with kind of a surprised face; I says, "You're crazier than hell. Everybody talk about the
    stock being worth $1,000 a share at Christmas." I think it was September or October [chuckles] , and I says, "Why sell
    it now? It starts to pay good dividends," I says, "and everybody goes for it. I'm not going to dispose of it." Well, it
    seemed as though she didn'twant to tell me, but she got wind from somebody that sooner or later that bank is going to
    go haywire. And she knew. But it didn't penetrate through my head, and I didn't believe her. Finally, sure enough, we
    didn't get to Christmastime. I think it was November or so metime; the kids in the streets were yelling their heads off,
    "The Bank of Italy's stock crash!" [laughs] I was sound a sleep, and she waked me up and says, "Go get the newspapers."
    She says, "There's something about the Bank of Italy." Well, I get up and go out there, turning on the porch light, and
    one of those kids come to me. Sure enough [chuckles] , I bought this newspaper, and "the Bank of Italy stock crashed"
    - great big black letters, you know? I didn'thardly have the newspaper, and she wanted to know what was in the newspaper!
    [laughing] She says, "What did I tell you? You knew all about it. Now, there you are!" She said, "Chances are they will
    not be worth the paper they're written on." And sure enough, it was maybe a month later around Christmas that the Bank
    of Italy stock was at $7 a share, but nobody wanted to buy it...and I had paid $365 for one share.
- speaker: Respondent
  text: How did you become a stockholder to begin with ? What attracted you to the Bank of Italy? I had a fellow work with
    me that he got the dividend, you know, and he showed to me this check. He says, "It's the first money that I made that
    I didn'thave to work for." And I said, "How did you do it?" Well, he says he bought Bank of Italy stock. At that time
    they didn'thave their place in Sacramento; they had it in Stockton. So one Saturday afternoon, we went down to Stockton,
    and we bought some of that stock. That's when I paid $25 a share. From there on we kept on buying. That's when I got married;
    that's when I bought Bank of Italy stock. After we were married, I felt as though since my wife had experience as a bookkeeper,
    that I would go in business for myself instead of be working for somebody. And on Saturday afternoons - at the time we
    were working through Saturday noon; we had the afternoon off - we were going different places in the Sacramento vicinity.
    I ended up in the town of Lincoln, that had a clay factory; they were working 1,500 or 1,600 people. There was a garage
    there that had a Chevrolet agency, and I bought half interest in the garage with the agency. Also, at that particular
    time, I was kind of fond of Buick automobiles. With the agency of the Chevrolet I took on the Buick agency out of San
    Francisco. And in a year's time I thought I was doing very well. I was able to sell quite a few Buick cars. My wife had
    high school and 4 years at Northwestern University. She was studying law; she knew bookkeeping; she was very capable.
    In writing up those Buick contracts, I think that she knew exactly what to do. It was made in the proper form and in a
    nice way that there was no dispute or no argument. 1 would imagine that it cost you a considerable sum of money to buy
    a half interest in that Buick dealership. No, it wasn't too much as far as the dollars and cents were concerned. I had
    an uncle at the time that had a ranch in Sparks. I had $2,000 on my own; then I borrowed $5,000 from him, and I was able
    to pay him back in 2 years' time.
- speaker: Respondent
  text: What year did you buy the dealership in? That was 1925 when I bought the place. Can you tell me what made your agency
    successful? Well, it so happened, I think, that sometime you talk about God provide for you.... I think it was some kind
    of hands above my head so as to guide me through. It turned out so that in that particular time in Lincoln, on the south
    side of the city, there was a lot of fruit growers. They had a good crop, and they were getting good money for their crop.
    On the north and west side of the city there was more of a stock grower, and they had good stock, and they had good fortune
    to raise plenty of calves and sheep and whatever they were raising, and they had a good market; they were getting good
    money In place of them buying Fords or Chevrolets, I was able to sell my Buicks. Families that had nothing else but Chevrolet,
    as they got a little more prosperous, they bought the Buick. So that's why [chuckles] for the territory that I had, it
    was sort of surprising to the San Francisco dealer that I was able to sell as many cars as I did. For some reason the
    San Francisco a gent must have got in touch with the factory at Flint, Michigan, and told the factory people that for
    the territory that I had to sell automobiles, I did as good as San Francisco did in their territory or as Los Angeles
    did in theirs. It was kind of in teresting to the factory that I was able to sell that many cars in the lot that I was
    allowed to sell. They told me that I can have a free trip to the Buick factory for one solid week, tell them my experience
    of selling Buick automobiles - which I did with the wife at the time, and we had this young daughter, Andrea, and she
    was one year old at the time. We went to Flint, Michigan, and I saw how they were making Buick automobiles from the first
    day, when they start, until the end of the week you see the same automobile go out on the factory rails - complete, ready
    for sale. It was very interesting, and it was very educational. There was a great big room, where they were making nothing
    else but AC spark plugs.
- speaker: Respondent
  text: There was nothing but women, and each one had their own line of endeavor; it was just a clockwork. At a certain time
    they take and hold a certain thing and go so far and pass it over to the next, until it got to the place that it was cooked
    and baked and taken the procedure that they had to take. They were packing the spark plugs 6 in a box, and that was the
    way the spark plug was made. But the making of the hood and the making of the crankshaft...it was surprising to see a
    hunk of steel about 3 inches in diameter - and at that time they were making 6-cylinder automobiles, and I think the length
    was something like 36 inches - and in 2 heats they would make a crankshaft. When at a certain degree of heat, they put
    it on the dies; and they were making different shapes for different cranks and so on, so forth. And the second heat, they
    were putting the bearing places and so on. They would twist the crank shaft in one heat, and when the crankshaft got cold,
    it had to go into another machine shop where they were giving it the final treatment, and from there to the lathe, where
    they do the final finishing, so on, so forth. The camshaft and the valves and different parts that there was to making
    the motor, and the way they were pouring and casting, and the way the cylinder blocks were made - actually, when you talk
    about learning things in a hurry, that one week at Flint, Michigan, I learned more than I did many years before and after
    in my line of experience. Were you ever able to apply those principles to the work that you did here? Well, to a certain
    extent. I never tried to make a crankshaft of an automobile.... I don'tmean that. I mean the whole idea of specialization
    in labor, assembly line techniques. Even to see how hot the metal got at certain degree of heat...and not to get to the
    point of doing any welding, but to get to the point to where you can bend the metal with out doing any damage. Sometimes
    you can bend metal, and it gets too cool, and before it gets finished, if you don'tlook out, you're going to crack the
    job that you started to make.
- speaker: Respondent
  text: Instead of making it, you are ruining one, because when you get to a certain degree of heat, the metal gets brittle,
    and the parts would fall a part it you keep on pounding on it. So you've got to learn....and that particular week, I learned
    many different lines of endeavor, that they would heat the metal to a certain degree of heat. By seeing how the other
    fellow was doing it, it kind of gave me an IQ of how to do it in the years to come, regardless of what the shape or how
    big the job was. After I took the trip back to Flint, Michigan, we didn'tcome back to Reno; we went back to the old country,
    then. We spent 2 or 3 months over there and visited different cities, taking a hold of different location. Before then
    I was a member of the Rotary Club in the town of Lincoln, and I had ways to mingle. The man that I talked to in Flint,
    Michigan, I told him I was going to take a trip back in Europe, and he wanted me to go in Paris to see what they do with
    their used cars, and to go in Italy and do the same thing out there and see the principal cities where they had Buick
    agencies, what they were doing with the used cars. Well, to me I thought that's a simple thing to do. I didn'tthink I
    would have any trouble to find out. I made attendance in Rome; I made attendance in Genoa; I made attendance in Venice,
    and I made attendance in different cities and different places where they had Buick automobiles, and I made myself familiar
    with them. But, you know, those people back there, they were anxious to buy used cars. There was families that actually
    didn'thave enough money to buy a new one, but were willing to buy a used car. They were mechanic enough to know how to
    take care of the machines. They were able to put the machine in good running order, and sometimes they would give a coat
    of paint so the machine look like new. the dealers were tickled pink to have a second-handed car to sell, and the buyer
    was tickled pink to buy it. In Paris it was the same way. They had some of the early Buicks made in the early days thathere
    in the States they would call a pile of junk.
- speaker: Respondent
  text: Back there they had that rubber bulb that they were pressing on to toot like a horn, you know? They were pressing
    this rubber bulb - poo, poo. [laughs] And some of those were making taxis; they were taking people from place to places.
    So when I got back to the States, I wrote to the General Motors official, and I told him that those people in Europe would
    be glad to get those used cars so they can sell them to people that couldn'tafford to buy a new one. And one of the fellows,
    when I got in there, he told me that he knew that, but he thought he'd like to confirm - to see that my statement was
    the same as what they had learned before. But they already knew it. When I got back to the States, the condition of the
    country was considerable worse than it was when I left. In the place where I had prospect for selling the Buick automobile,
    I couldn'teven sell a secondhand Ford. The condition of the country - the farmers as well as everything else in general
    - it was sort of in downhill condition. This was 1930. What happened to your agency, then? At that time there was a fellow
    that wanted to buy an in terest, and I was going to sell to him, which I didn't get enough money to start with. And after
    he bought my in terest, then I came back to Reno. In the shop that I was originally with in 1910, 1911, one of the partners
    passed away, and this second cousin of mine that was in the shop at the time came down to Lincoln; he wanted me to get
    back to Reno. He didn't know what the condition of the automobile game was, but I was glad to get back to Reno, because
    there was no money to be made selling automobiles. So I've been in Reno ever since 1931. Reno and the Reno Blacksmith
    Shop, 1930-1941 At that particular time, a cousin of mine, John Ginocchio, that was in the Reno Blacksmith Shop in Reno
    lost his father-in law, which was a key man in his shop. He came to me and he told me that if I wanted to buy the widow's
    interest, he would help me to get it fairly reasonable; that he would like to have me come back to Reno.
- speaker: Respondent
  text: Under those conditions I just took up the proposition that he made to me, and I gave up the Buick agency. That is,
    I sold to a fellow, but I didn't get very much money for it. I decided to come back to Reno, and I've been here ever since.
    What was the name of the widow and her husband from whom you bought the share? The man's name was John Bottini. Great,
    big husky fellow. And he died quite young; I think he was 56 years of age when he passed away. His wife and he only had
    one daughter, and she was Mary. And I did buy the interest for a reasonable a mount. I don'tremember exactly, but I think
    it was in the neighborhood of $7,000 for the half interest, which was a good bargain. I think it was worth probably double
    that a mount. When you returned to Reno in 1930, did you find that the old neighborhood around the blacksmith shop had
    changed? Well, it had to a certain extent. The places where buildings were sometimes would be an empty lot in the middle
    of the block. It would turn out that they had these miniature golf courses sometimes, which we never heard of any before,
    but after the First World War there was a lot of miniature golf courses all over the city - not only Reno, but in California
    and many other places. It turned out to be so that a lot of people would travel more then. It seems as though the First
    World War put the traveling fever in many different ones, including me. I didn't know where I wanted to go, and I didn'tknow
    for any particular reason, but I just had the notion to go from one place to the next, just to be going places. I had
    that while I was in the railroad service in France. We want to go to see the next town, which practically there's no difference
    from the one you left, but just the idea to see the different lines of endeavor of different people. When you left Reno
    in 1918, the area around the blacksmith shop - as I take it from what you were telling me before - was more or less an
    Italian neighborhood. Is that correct? Yes, it was. Did it remain an Italian neighborhood into the 1930s, after your return?
- speaker: Respondent
  text: No, they changed a lot. Tell me how it changed. Well, like I say, many different lots, you know, maybe belonging to
    some Italian or maybe other people, they put up this miniature golf course. And it seem as though miniature golf courses
    were taking up all of the spaces in the city - and then not only in Nevada and Reno, but all over the West
- speaker: Respondent
  text: I am satisfied to say from Chicago to the Mexican border. Were there still a lot of Italian families living in the
    neighborhood? Well, not as much as there used to. In the first place, in the early days, the country in the past was open
    to anyone. If they didn't like to stay where they were born and raised, they go places. But in the latest years, they
    put restrictions on immigration. In 1930 I would say there wasn'thalf of the people that used to come from 1910 to 1930.
    And from 1930 to this time, it got worse. It was only probably the Chinese people that more or less they had freedom to
    come, and the Japanese, and probably the Mexican. But the European people, they were more or less shut down...the immigration
    got to be something of the past and something that there was a restriction. And there were not so many foreign people
    coming into the States like there used to be before 1910. [Regarding the decline in the number of immigrants into the
    United States in the 1920s and 1930s, Mr. Ginocchio is quite correct. However, his impression that Europeans were hardest
    hit by restrictive immigration laws is without foundation. To the contrary, the National Origins Act of 1924, which made
    permanent the temporary quota law of 1921, discriminated principally against non- Europeans. A ceiling of 150,000 immigrants
    per year was imposed. Quotas for each nationality group were limited to 2 percent of the total members of that nationality
    listed as residing in the United States by the 1890 census; however, Western Hemisphere a liens were exempt from the quotas.
    One provision of the act, prohibiting the immigration of a liens in eligible for citizenship, effectively terminated Japanese
    immigration. In 1922 the Supreme Court, in Ozawa v. United States, had ruled that Japanese were in eligible for naturalization.
    - ed. ] Did the old Europa boardinghouse still stand when you came back in 1930? Yes, but in the short time I was there
    between '30 or '35, the different roads and the streets more or less got bigger, and they had to have more space.
- speaker: Respondent
  text: The Europa Hotel was sort of an old, ancient hotel. It was along way from being up to date, and rather than spend
    considerable money to rejuvenate the place they tore the building down. However, next door to the Europa, that was what
    they called the Toscano Hotel, which is still up Reno and the Reno Blacksmith Shop, 1930-1941 today. They did spend considerable
    money, which we supplied the steel for it - they made nightclubs out of it. Now, in the early days, there was no such
    a thing as a nightclub. There was gambling joints, but as far as calling it a nightclub where you could take your wife
    or friends and spend the evening, dinner, dancing - before 1910 there was no such a thing. And the people, for some reason,
    they go in different stages; whatever took place in 1930, they're not doing the same thing today. What about the Armstrong
    Manufacturing Company? Was that still in operation? He had sold the place to 2 German people, and on account of the States
    having war with the German people, they just naturally died of their own starvation, you might say. They had no more business
    when I got back from the army. They didn'thave enough work to keep themselves busy - there was 2 of them. When I came
    back to Reno in 1930, we bought a home on the corner of Arlington and Reno Avenue - which I still have. My daughter, Andrea,
    grew up there and she went to school at Mount Rose School. As the years went by, in the same school where she started
    out as a student, she turned out to be a teacher, teaching in the same room in the same class. When she was growing up,
    I know my own intention was to make her an architect. I thought that I would use her very well in my line of business.
    But...well, the wife, as well as the daughter, they felt as though the architect was a man's job; that I was looking for
    something pretty much out of the line of a woman to be taking up architecture. However, it wasn't so many years later,
    different students that I happen to know, they did take up architecture in Reno, and they kept on going even to this day.
- speaker: Respondent
  text: However, in her case, she turn out to be a schoolteacher; she decided to be a teacher. And one of her first jobs was
    to teach school in the same place where she was as a pupil at 6 years of age! [laughs] And, of course, now she runs your
    business. Well, after she got married - that's when she became Mrs. Pelter - they went to Seattle, Washington. She taught
    high school for 6 years in Seattle; then they moved down to San Jose, California, and she taught school down there until
    they decided to come back to Reno. That's when she start to work for me in the shop... 1972. Beyond the old neighborhood,
    life in Reno must have changed a lot in the 13 years that you were away. It did change a lot. Can you describe for me
    some of the changes that had occurred in Reno, and the differences that you noticed when you came back in 1930? Well,
    the town of Reno, although it's still a gambling town to this day, that wasn't exactly the main line of endeavor. The
    main line of endeavor, when I came back in 1930, it was the divorcee people. And [because of Prohibition] there was a
    lot of people that were manufacturing beer and whiskey; every man in the state, you might say, they were fabricating [chuckles]
    beer and whiskey. And under those conditions, I thought it was a whole lot different than the time when I left. The time
    I left Reno the country was open, so there was no such a thing as a place where they fabricate all sort of booze. And
    the lawyers, they were quite big promoters. They preferred to have the country dry for the reason that every time someone
    get knocked over by the Prohi, they had to go to a lawyer to fight the battle, and the lawyer would get whatever cash
    that they had available to get them out of jail. The town was actually different from when I left in 1918. However, as
    I went along, even the divorcee business declined. To this day a fellow can get divorced, but they're not one of the latest
    lines of endeavor, as far as business is concerned. At the time of your return to Reno, did the Reno Blacksmith Shop have
    any moonshiners for customers?
- speaker: Respondent
  text: Did you make anything for these distilleries, help them out in any way? Like I say, it seemed as though that the lawyers
    as well as many...particularly the farmers, if the condition of the crop wasn't too good, they make up by fabricate some
    moonshine and sell it at a fairly decent price, [laughs] and somehow they got along very well without getting caught in
    a trap. And some people, sometime they were turned in by someone, probably the neighbor, that had jealousy that he was
    making money and they were not. They would squeal on...tell the Prohi that so-and-so at a certain place, a certain address,
    if you keep an eye on it, you'll catch him. That's what the Prohis were looking for - to have a lead of where to go to
    - and sure enough, they would land the men. Right offhand, the person that get caught, he had to have a lawyer. If he
    got in jail, why, he had to have a lawyer to get him out, and then he had to face a lawsuit that they had to fight because
    it was violating the laws and why he was doing it. And the lawyers, they were more in favor of the dry country than to
    have it open. At that time, the divorcee business was quite famous in Reno, and they were coming in from all over the
    United States. First, it was 6 months; then it got to be 60 days to stay here in order to get a divorce. However, as the
    country got wet so that they didn'thave to fabricate booze any longer, and the divorcee in some way lost... the lawyer
    kind of lost their line of endeavor. We don'thave half as many divorcees coming in to Reno now for divorces as they did
    even 10 years ago. The question I had asked you was whether or not the Reno Blacksmith Shop was ever involved in any way
    with making things for the stills. Well, we were making beer vats. When the steel salesman come along from San Francisco
    looking for an order, we had it right there, black and white. We bought a bunch of sheets of plates, say, a quarter of
    an inch thick, 4 foot wide and 8 foot long. And that would make the bottom and the 2 sides, and the fourth sheet you cut
    it in the middle to make the 2 heads.
- speaker: Respondent
  text: So, without having one pound of wasted metal we would make these vats 4 by 4 by 8 foot long and sell it to these people.
    Sometimes we had to work at night in order to supply the goods to these different farmers, that they want to make beer,
    but they didn't know what to make it in, and that's what we were making the vat for. We made some good money, and it was
    very pleasing to everybody concerned, until they got to a stage one time that the police department telephoned into our
    shop, and they told us that they got some tanks to sell if we want to buy the metal. And I got a hold of my partner; I
    said, "You go out there in a certain place by the courthouse," and there was the police department next door, and "see
    what they got to sell and see if we want to buy it." And it got to the point where they were having these vats for sale;
    it seemed as though whenever they shipped the steel out of San Francisco, they put the name of Reno Reno and the Reno
    Blacksmith Shop, 1930-1941 Blacksmith Shop on the sheets, on the plates, and when he went out there to see about those
    vats, the name of the blacksmith shop was still written all over the tanks! [laughter] When he found out that his name
    was on the tanks, he didn'twaste any time; he came right back. And I asked him, what did he do that he got back so soon;
    he told me what the score was, that our name was out there on those tanks! [laughter] He didn't bid on the job; he didn't
    even show up to do any bidding. They had a whole lot of those tanks, that when they discovered they were manufacturing
    beer, naturally they got caught, and they had the tank for evidence. However, we never got into trouble as far as making
    the tanks; we got paid for it, and that was it. Was it primarily German farmers who were making beer? The German, actually
    they were the ones that were making the beer, and the Italian, they were the ones that were making the whiskey. But they
    got mixed, so there was no time at all that the Italian would make the whiskey and the beer, and so did the German - they
    had a still.
- speaker: Respondent
  text: And all of the nationality - there was no particular difference. I don'tknow about the Chinee people, but the rest,
    they would fabricate something. Every mine in the country, they were fabricating booze, and the mine was in operation,
    [laughs] Did the Italians here in Nevada ever try to make wine? Well, not so much as far as the wine is concerned because
    they had to buy the grapes from California. In the early days before the First World War, there was many Italian farmers
    in particular that would buy one or 2, maybe 5 ton of grapes, and they had their way of making wine just for the family
    or the relatives. But the price of the grape was going up, and then the First World War came along, and it seemed as though
    they got into a different line of endeavor, and as far as making wine, that was out - until it got to where the country
    went dry; then they were making whiskey instead. well, of course, you have to have something to make whiskey out of What
    were they making it from? Oh, they were making it from any kind of a fruit, particularly peaches. You know, they were
    buying peaches from California. And any place that any farmer were able to raise a different kind of a fruit, they were
    able to distill it and make a whiskey out of it. The first crop, they were making wine, and then they were making the
    second crop wine, and whatever that was left out of the fruit they would distill it and make whiskey out of it. What about
    the beer? Can you recall what they were making beer from? Were they bringing hops in from California? Well, it seemed
    as though that each one, they were able to make their own beer without ask for any help of any sort. I don'treally know
    what they were making the beer out of, but that there was plenty of it made. During Prohibition, where was the place to
    go to get a drink here in Reno? Well, different bars that were regular saloons in the early days, they had a place. Tike,
    in the basement they would have like one room that would have a wood panel, and then sheet steel attached to the panel
    so that they don'tbreak it up with an axe.
- speaker: Respondent
  text: We help in many different bars, but in the main street of Reno - Virginia street - there was night places that you
    had to have a password, you might say, but you get in and you get all of the whiskey and drink that you want...wine and
    so on, so forth. You had to pay the price, but there was no trouble getting it. Did you have a favorite place to go to?
    Oh, we would go any place that were giving business to us for making. We thought that wed return the compliment by making
    different rounds. We would go from one place to another on Saturday night and visit the different clubs, just to show
    that we dared to spend our money with them. And there was a time when we had more than our share of the drinks, too. [laughter]
    Was there one bar that was favored by the Italian people over any others? Not in particular, no. Each one had their own
    favorite place they would go. This particular bar that I say, like the Becker's Bar, that was.. .they had a place underground.
    And they had, you might say, the largest visitor of any. And they were operating not exactly wide open, but pretty liberal.
    Two doors down from our shop on the north side, like on the corner of Commercial Row and now Arlington Street, there was
    a dance hall; they used to call it Tony Pecetti's El Patio Ballroom. That was a place in the 1930s for the lively young
    men and women of Reno. They used to go in there, and Saturday night they'd have a dance until about 1:00 or 2:00 in the
    morning, and everybody having a grand time. The admission, in most case, was $1, but there was a time that he would let
    people in free of charge, too. He was pretty generous with his customers. Many sports go in there. They were having a
    grand time, and after the dance was over, naturally they would go probably for a few drinks and go home. In most cases
    the good class of people would go home. The rest, they like to gamble, and they would stay up all night, because some
    of those nightclubs were open 24 hours a day and night. Tony's El Patio Ballroom was sort of a club for everybody in town
    in the Thirties.
- speaker: Respondent
  text: He had quite a large dance hall. Sometimes he had dances even twice a week, but on Saturday night, that was quite
    sure that anybody who wants to go to a dance, you only had to pay a dollar and you'd get in and stay as long as the dance
    last. I think the dance end at about midnight or a little after. And Tony was a very pleasant man with anybody that was
    ready to put on a party or that was willing to share for any kind of a doing. He was a jolly sort of a man, very pleasant.
    There was 2 people from Los Angeles come to Reno in the 1930s connected with Twentieth Century Fox. They were trying to
    put on some kind of a show, some kind of a sporting affair with Tony. We had a Spaniard at work in the shop that sometimes
    he would sing and hammer at the same time; and this man from Twentieth Century stopped in front of the door, and he listened
    to that man singing, and he thought it was interesting. I was standing by the door and see him, too. He asked me if he
    can go out there and talk to the fellow. I said, "Yes, you can go a head." So he had quite a chat with the man; he left
    his card. Well, the Spaniard's name was Jose. And they heard him sing and then tapping on the anvil at the same time.
    They made arrangements to write him a letter and to get farther in touch with the 2 of them. Eventually he turned out
    to be a singer for this Twentieth Reno and the Reno Blacksmith Shop, 1930-1941 Century Fox, and he was a famous singer,
    and he came to Reno at the Majestic Theater. It was understood that he would go to this Majestic Theater and sing a particular
    song, and when he get to certain place (he had a helper that was working with him in the shop) this helper was supposed
    to throw a rock in the window, and he did [laughs] with the understanding that Jose was so powerful in his singing that
    the vibration knocked the glass out. However, one night it turned out to be that the singer didn'thear the window crack.
    When he got pretty near through with the singing, somebody did throw a rock in the window, but it was too late!
- speaker: Respondent
  text: '[laughter] Can you remember his last name? No, right offhand I don''tremember his last name. He was a comical sort
    of a guy. [According to a Reno Evening Gazette article dated 19 May 1936, there was a man named Dick Jose who used to
    sing while he worked in the W. J. Luke blacksmith shop in Reno. Jose later left Reno to become a famous concert singer
    throughout the West. - ed.] Did Tony have a fight ring? I understand that he might have had a boxing ring, as well. Is
    that true? Yes, he had. There was a time that, beside the dances, he would give people room to carry on whatever they
    have. They did have boxing, yes. They would gather around people just the same as they would do at the dance hall, only
    it was a different line of endeavor, [chuckles] Was that in the 1930s and 1940s that he had that? Oh, that carried on
    from 1930 until 1960. At one time in the early 1930s - there was a man came to Reno they used to call "Baby Face" Nelson
    [George Nelson]. He was one of those gangsters from Chicago, and he came to Reno, and he was kind of a gambler. He would
    go to a place where they were gambling heavy money, and he would be out there with the rest of the gang and gamble money
    away like nobody''s business. He was driving a Packard car, and it happened to be the Saturday afternoon - we were getting
    ready to close the place - and he brought this car to us. There was the main leaf of one of the front springs broke. He
    wants a new one put in there, and he wants it in that evening. We told him that it was quite late, if he couldn''t wait
    until Monday. He said, no, he has to have it tonight. So we got hold of a couple of fellows in the shop and asked them
    to stay to work after 5:00, because 5:00 it would be quitting time, and get that spring made and take care of it that
    particular night. After he got the spring and everything was ready, when he paid the bill, gave the man that did work
    a tip of $9! For this man that was working for me at the time and got a $9 tip, he didn''t know whether it was a mistake
    - he thought probably it paid for the spring, or how did he get the $9!'
- speaker: Respondent
  text: '[laughs] But we didn''tknow who the man was until a few days later, that he was the man that came to Reno and got
    rid of this fellow, Roy Frisch, that was a banker. [Frisch disappeared in 1934 before he could testify in a court case
    involving organized crime. It was rumored that Baby Face Nelson had killed him and sunk the body in Lake Tahoe. - ed.]
    Casino gambling, in general, was made possible by an act of the legislature in 1931, and gambling then began to grow fairly
    rapidly here in Reno. I believe that there was one Italian who was involved in it, a fellow by the name of Petricciani.
    Perhaps you can tell me what you can remember about Mr. Petricciani''s involvement in gambling and so forth. Well, Petricciani
    was a man that I had to give him a lot of credit for his accomplishment. He worked first for the...I don''tknow; I think
    it was on the corner of Commercial Row and Center Street. [John Petricciani was a partner with Joseph Elcano in the Louvre
    Bar, 204 North Center Street, in the years before the Volstead Act. In the late 1920s he purchased the Palace building
    at the corner of Commercial Row and Center Street, turning it into a casino following the legalization of gambling in
    Nevada in 1931. - ed.] In the early day that was the place where the streetcars would stop. That was like a headquarters
    for the streetcar - right at his front door. I think he had 2 daughters and a boy...maybe he had 2 boys - I''m not too
    familiar about his family affair. [John''s son, Silvio, later managed the Palace Club. - ed.] But Petricciani, he got
    to the stage when he was working on this Palace Club, that in the course of years he became the sole owner. And it was
    quite a lot...I would say a million dollars involved in there. He had competition in his line of endeavor; however, he
    kept on going steady, step by step. Petricciani was hiring a lot of people, practically more so the Italian descent than
    others, including...if there was any line of endeavor which I would be connected with - like if a door doesn''tswing proper
    to close and so on, so forth - he would send word up to my shop to send somebody down there to fix that door.'
- speaker: Respondent
  text: He would send word to do different kinds of jobs to repair to the building. And if any time they did remodeling, I
    always got the job. In some cases I got the job without even asking for a bid. He took my word. He knew that he could
    trust me, and I was doing my best to give him a square deal, which I did. But he was always seeking out Italians to do
    the jobs for him? Well, yes, I would say he preferred...we had first priority, you might say - the Italian people - with
    him. However, he was giving other people bids sometime to do their line of endeavor. We didn'thave, say, 100 percent,
    but in my case I says, "I had 99 percent." I became very fond of his way of doing business, and he was paying his bill
    promptly. Sometimes you do business with people that it takes forever and a day to get squared away financially. In this
    case, in 30 days' time you'd get your check, and that was it, and he'd paid you in full up to date. I had a lot of respect
    for the man. Did you know him before he became prominent in gambling? Well, I did know him. He was in Reno before I came
    here; I don'tknow how many years before I come here. But I start to do business with him in 1912 or 1914, even before
    the First World War. After I drifted away, he was one of my first customers when I got back into Reno to take a job on
    the remodeling, whatever he was doing, with this hotel building that he had. When you knew him before the First World
    War, what was he doing? I don'tknow what his position was, but he was an ordinary worker in the hotel. Like maybe a bartender
    or so mebody that had a little authority, but not to a great capacity, as far as dollars and cents. I don'tthink he had
    an in terest in the place when he first started to work for the hotel. How did he ever accumulate enough money to become
    a...? Reno and the Reno Blacksmith Shop, 1930-1941 Well, he was a shrewd gambler. He knew when to quit. You know, sometimes
    you make a winning or you think you've got maybe $1,000 a head, but if you don'tknow when it's time to stop, you keep
    on dishing it out until you finally lose the whole thousand and then maybe more, if you got it to spend.
- speaker: Respondent
  text: But Petricciani knew how to play the game. Sometimes he would tell his best friends, when they were sitting at the
    gambling tables...he called them to go out there in his office, then tell them to get out of the club. He was dealing
    with people that they...sooner or later they're going to take the friends to the cleaners, so he advised them to get out.
    Now, you know, you have to be a pretty good friend to a fellow when you advise him to try to keep his money, that he's
    going to be taken. What part of Italy was he from? He was from Piedmont; he was from the north. [John Petricciani was
    from Livorgno. - ed.] Was there ever any suggestion that he might have had Mafia connections? No, no. I didn'tknow about
    the Mafia until the latest years. But I don'tthink he ever had any connection at that extent, I would swear to it. Of
    course, the general public - those of us who are not Italian - very often make the mistake of believing that the Mafia
    is Italian, when in reality it's Sicilian. Well, that's right. It really originated in Sicilia. But since the fellows
    there are Italian, sometime they would try to accuse them of being a member of it. But to be a member of the Mafia, in
    the first place they attack the people with a lot of money to start with. And in second place, after they got them under
    their wing, my gosh, your life is not yours; it's theirs. They shoot you, kill you, whenever they see fit. Can you recall
    any other Italians who were successful in the gambling industry at the beginning here in Reno? Well, there was a fellow
    by name of Curti; he had Colombo Hotel for a number of years before the Prohibition, during the Prohibition, then after.
    [Philip Curti was Antonio Cerfoglio's partner in the Colombo Bar at 231 Lake Street. - ed.] And he was a well-to-do man,
    too. He was only giving jobs to those that he thought were fairly good customers of his, and we'd done some work in a
    small way. He always paid his bill, and he was pretty well liked, particularly in politics.
- speaker: Respondent
  text: The politicians, they'd go to him for handouts, you know - dish out $1,000 to promote somebody's way to get elected.
    He was more of a politician than Petricciani. Petricciani wasn't a politician at all. He would try to be in good terms
    with all of them, and he didn't have any particular.. .you didn'tknow whether he was a Republican or Democrat. In the
    early days there was a bar owner that was also from the Piedmont. He had only one son that he turned out to be a doctor.
    There's a building named for him up at the university, and the name of him is Dr. Louie Lombardi. His dad had a saloon
    in Reno in the early days for many years. [Sam Lombardi owned the Star Barrel House at 236 North Center Street prior to
    World War I. The establishment dealt fine wines, cigars and liquors, and had an attached cafe. - ed.] By 1931, I would
    imagine that things had changed considerably for the blacksmithing industry. Horses are on the way out; automobiles are
    coming in.... Yes. Can you describe for me any of the changes that might have occurred in the type of work that was being
    done at the Reno Blacksmith Shop? Well, the change came in a slow way. See, what you were doing, you keep on doing as
    you go along - only it diminish. It didn't come along with the same kind of a speed, like the repair of the wagon. People,
    instead of having a wagon repaired, they were buying an automobile. And we, instead of shrinking the tires on the wagon
    wheels, the wagon wheel disappeared, and the automobile was taking its place. However, we had to shift from repairing
    the wagon to building truck bodies. Particularly when the Model T Ford come along, there was a time that we would take
    an old Ford and extend the frame maybe 5 or 6 foot, put a body on the back of the Ford, and they were still using the
    passenger car that was a Ford at one time - they were making a delivery truck. And we were the ones able to make the changes.
    But there goes to show right there that we did away with the wagon works, but we got into the automobile works to building
    bodies.
- speaker: Respondent
  text: 'To a certain extent that lasted a number of years. Did that automobile work that you were doing require that you
    learn any new skills? To a certain extent, yes. To start with, you had to know what kind of a load that it was carrying,
    that you build a vehicle that is not going to have any trouble when they''re out on the highway with a load - to sag down
    and the wheels rubbing onto the body, and you couldn''tnavigate any longer. That''s one thing that you had to learn, that
    regardless if they completely overload the truck, the wheels must still be able to turn without interfering with the operation
    of the vehicle. That''s the thing that come along with line of endeavor as you go from year to year. And it turned out
    all right: as far as hurting our business, I don''tthink it hurt any. The difference was that instead of work on wagon,
    it was working on automobiles, trucks and so on, so forth. How did you learn these new things? Did you learn them through
    trial and error, or was it possible to study them some way? We learned by experience. We learned by going day in and day
    out, and it was no trouble to keep up. We were able to keep up with the changing of the condition of the country. Shortly
    after you took over as half partner of the Reno Blacksmith Shop, the country was plunged into a depression. In fact, the
    Depression had already begun by the time you arrived here. Apparently, there was already a slackening in business due
    to the fact that some of the traditional things that were done by the blacksmithingfirm were no longer in demand, such
    as shrinking tires and things like that. Yes. Coupled with that decline in business, I wonder if you suffered any consequences
    from the collapse of the stock market and then the failure of banks at the beginning of the Depression? At that particular
    time in 1932, we were reading in the newspaper that some of the banks in the East were closing their doors for financial
    difficulty and so on, so forth. But there was a voice around Reno that as far as the banks of Nevada, the silver state,
    they had Reno and the Reno Blacksmith Shop, 1930-1941 no trouble, and there was no danger of losing any money through
    the bank.'
- speaker: Respondent
  text: Those days we were working from Monday through Saturday night, 6 days a week, and we made bank deposits on Saturday
    afternoon. Normally, I would be the one to gather up whatever cash we had on hand and deposit in the bank. And one Monday
    morning, why, the newspaper came along and said that the banks of Nevada declare a moratorium; that they're going to be
    closed for 9 days. Under those condition we felt as though that may be all right, that after 9 days they'd be open again.
    However, on the tenth of the month we used to send a check to the houses in San Francisco where we buy metal, and we also
    bought hardwood lumber and different lines of hardware. With the check I enclosed a note that for the time being, the
    bank was closed, but that in 9 days' time they'd be open again and that the money's there for us to make the check good.
    However, to make the long story short, the bank never did open up. We had to make good on the check that we had mailed
    down, and in the course of 6 months' time we were able to get back into normal business. But that one was really the first
    setback financially that we didn'thave any money to pay even a man that was working in the shop. How many men did you
    have working in the shop then? We had 7 men work in the shop and a girl as a bookkeeper. And there was one man that had
    a wife and 6 children. He come to me one day during the following week; he banged his fist on the table, and had a piece
    of paper that was in there raised about 6 inches, and he said, "This coming Saturday you're going to pay me, and you're
    going to pay me in cash!" He says, "That last damn check you gave me last week, nobody wants it, and I have a wife and
    6 children, and I'm not going to let them starve to death for lack of money." He says, Well, I says, "All right, Mack."
    And my partner and I, we looked each other in the face and said, "Where in the heck are we going to get the money to pay
    that man in cash?" It so happened that this partner of mine knew a cook by the name of Parmigiani, who was working down
    in Lake Street for the Toscano Hotel.
- speaker: Respondent
  text: He says, "You know, I'm going to see that cook that work for the Toscano Hotel. He doesn't put his money in the bank.
    He puts it in a box under his bed." And he says, "I'm going to try to get a thousand dollars out of him." And he asked
    me if I know where I can get a thousand dollars as far as my part is concerned. Well, we were doing considerable work
    for a man by name of George Sauer, who owned and lived at the Del Monte Guest Ranch on South Virginia Street. He was sort
    of a contractor or an overseer for the county highways in Washoe County. We did some work for him to a certain extent,
    but whatever I was asking him for was a whole lot more than what he owed as far as the county owe us. However, I ask him
    that I needed a thousand dollars to pay my mechanics. Sauer was smoking one of those pipes that had a sort of a gooseneck
    affair, and it looked to me that it took him forever and day to load up his pipe and get it going. But he finally gets
    up, and he goes out of the room; then he come back, and he had a canvas bag, and it was full of $20 gold pieces and $10
    and $5 and silver. And he dump that bag on the middle of the table, and he said, "There it is." He says, "Pick out what
    you want, and we'll count it up and see how much it is." So I pick out a thousand dollars, and there was plenty left over.
    I told him to give me a piece of paper, that I would give him a note or receipt. And he says, "You don'teven have to do
    that. Whenever you've got the money, pay me back." And I did. But it took me all of 6 months, if not longer, to make up
    that thousand dollars. However, when I had that money in my pocket and come back into Reno, I felt I was sitting on top
    of the world - that I was all well fixed financially! [laughs] What did you do with the money, then? Did you put it in
    a bank, or did you keep it out? No, we kept it. We didn'ttrust the banker for quite some time after. We would keep our
    own money; we didn't put it in the bank. But later on we had to put it in there in order to have a check, like to send
    to San Francisco - a firm that we were buying material.
- speaker: Respondent
  text: You could go to the post office and send a money order, but we went back to the bank; we start to do business the
    same as we did before. Of course, it was not uncommon at that time for people to keep their money out of the banks and
    to make safes to keep it in. Did you make safes? We did make safes, even for residential people that were building a home.
    In the basement or so meplace in the concrete wall or cement wall, we would make a strongbox, we call it. Sometimes it
    might have been 18 inches square or maybe 24 inches square, with a door. Sometimes you had to have the key and you had
    to have a screwdriver to open the door. So if by any chance somebody found the key, you might make a turn, but the door
    would not open until you turn a certain screw so that the key could turn. And we had the different devices like you do
    in an ordinary safe today that you got to know the combination; otherwise, even though you might have the key in your
    hand, you cannot open it. We made many of those in Reno, and even in the latest years. In the early days, Nevada Transfer
    was the only people in Reno that delivered from the Southern Pacific depot your baggage or trunks and so on in different
    parts of the city. People had to have a license to operate the horse and the cart to deliver this stuff. However, Nevada
    Transfer also had a warehouse where they were getting the stuff from different ones to keep it in there as a safekeeping.
    And in one of those there was a safe, which I still have, that was brought down from Virginia City. I think the man was
    Redman, that kept it in there in that Nevada Transfer warehouse for a number of years until he pass away. After he pass
    away, the Nevada Transfer didn't get any more money for the keeping of it, and there is a law that after 5 years you have
    a right to dispose of the goods, sell it for the storage. They do the same thing today. This safe came to Virginia City
    from the Crocker bank in San Francisco. The safe later came from Virginia City to the Nevada Transfer warehouse, and then
    after 5 years they disposed of it.
- speaker: Respondent
  text: One of the men that was driving this truck asked me if I want a safe for my business. And I said, "Well, if it doesn'tcost
    too much, I'll buy it." I had to pay whatever the cost was for the 5-year period that the man that passed away didn't
    pay for the storage, and I got the safe, which I thought was a good buy. About 5 or 6 years ago, I thought I was going
    to sell it for $100.1 had the sale made; I had the hundred dollars, and after I told my daughter she made me go back,
    give this fellow these hundred dollars, and she still has the safe [laughter] today. Well, in the 1930s and 1940s there
    were some very wealthy people who moved into this area, including the Fleischmanns and George Reno and the Reno Blacksmith
    Shop, 1930-1941 Whittell and some others. Did you build safes for any of them? Yes, we built a safe for Whittell up at
    Lake Tahoe. He was a very peculiar man to a certain extent. During the First World War, as I understand, he was a colonel
    in the army. And he was a well-to-do man; he had money. However, he was peculiar in a certain way. He...well, like he
    had a lion. He was handling a lion just like he would a dog. And one time they were in San Francisco, in one of the main
    hotels, and some of the women looked at what he had, and it turned out to be a lion. They start to scream. The lion start
    to roar! And he had a heck of a time to keep that lion from running away from his hands, understand. Well, now, an ordinary
    person, you're not going to buy a lion and then go walk into a hotel in San Francisco. You should know before you start
    that there's a chance you'll get into trouble. But he did, for some unknown reason. Whittell also had an elephant. They
    made a barracks out of lumber, and he had this elephant stay in this particular barrack. And it seemed as though that
    at one time - and it was in the middle of the summer - this elephant went into a rampage, and he run out with the barrack
    and all on his back, and he took off. And when these people that were looking after feeding the animals...well, there
    was no more elephant - it was gone, and the house was gone, [chuckling] One of the contractors that was working up there
    was named Larson - Larson Construction Company.
- speaker: Respondent
  text: He sent one of his men to my house at 4:00 or 5:00 in the morning. I get up and see what it was all about. "Well,"
    he says, "Whittell's elephant run away with the house." He says, "You've got to come up and try to take measurements so
    we can build a steel house for the elephant." "Well," I says, "all right." So I didn'twaste any time - get myself ready
    to go to the lake, and found out that the elephant was gone, and nobody know where it was. I measured to put up a steel
    house for the elephant. It took us 30 days or better, and in the meantime they did find the elephant. They put up another
    shack and tried to keep the elephant in there, but at that time the elephant was under guard, so that somebody had to
    stay up at night and not allow the animal to run away, and if it did, why, to see where the animal was going. It looked
    like they had lost the elephant for 2 or 3 nights, that nobody know where the elephant was. But it didn't run very fast,
    and so he wasn't too far away. Well, now, this fellow Whittell, I made a sate for him, too - put it in his basement. His
    was something like 30 inches square. He had a lot of valuable paper, and he even had the swords and stuff that he gathered
    up from the First World War and was keeping as so uvenirs - like the German helmets with the spike on top, you know? Well,
    he had some of those. One time he took me down in his basement, and he had all sorts of so uvenirs, not only for the Germans.
    He had married a French girl after the war was over, and she was a good cook. She would fix very fine meals at times.
    The smell of the meal itself, it made you hungry [laughs] , including me! And I did a lot of work for him at different
    times. There was a time when Whittell would take off; he would go to Los Angeles - take probably a week or longer, and
    he would go east somewhere. I don'tknow where he came from, from the East, but there was a time he was gone the whole
    month. However, he had somebody to look after the construction that he was doing.
- speaker: Respondent
  text: The general contractor, Larson, was telling me what to do, so on, so forth. We worked up there 3 or 4 summers, in
    the middle of the summer; from the spring of the year till the fall of the year, we would have somebody work for George
    Whittell, putting up buildings. He was putting up gardens, like, or arches. He would have a different sort of a...like
    a show house. He had a place up there that was very attractive. It cost him a lot of money. He spent a lot of money. But
    after he passed away, I didn't do any more work for them. I never got any more calls, so that stopped as far as my line
    of endeavor with him. But we worked, oh, 4 or 5 years during the summer. We built it in 1936, and did all the remodeling
    including in 1985 for Dryfuss. Did Captain Whittell come down into Reno very often? Oh, I guess he was into Reno quite
    often - him and his wife, and sometimes they had some kind of a foreign dog with them. They always had an animal for some
    reason. He would stay at the Riverside Hotel, and in the latest years he was staying at the Mapes. He was in Reno quite
    often. Do you remember Max Fleischmann? We worked for them, too. We put up buildings at different places sometimes. But
    that was just you start one job and you finish it; when the job is finished, that's the end of it for maybe 2 or 3 years.
    Then you get another call. Fleischmann did some work at the university that we did ourselves. And they were good people;
    they were respectable people; they were nice people to do business with. Did you know him personally ? Can you recall
    anything about him? Not with Fleischmann, no. There would be so mebody coming out of San Francisco, and they would be
    representing the company. We had a name, I think...one time we had by name Fred Waldren, and he was a very nice person.
    However, he would just represent Fleischmann. I know that the Reno Iron Works has been involved in construction for along
    time. Was that something that they were doing before you bought half an in terest? The contractors in the city of Reno,
    they were the one, you might say, put us in the area of structural steel business.
- speaker: Respondent
  text: They would come along, and they would say, "We want one ton of angle to be set above the door." Whenever you put up
    a brick building, you had to have above a window, as well as above the door, a steel bar that carried the load of the
    bricks. And not only the lintel for the door, but they also want a beam probably for spanning the roof or large entrance
    and so on, so forth. So different contractors come to me and say they want a beam 12 inches deep and 25 foot long. And
    I didn'twaste any time; sometime if we didn'thave it on hand, I would telephone to San Francisco, and I would have it
    in Reno in 24 hours. That got to go from slow way to fairly good speed forward, you might say. And we got to the stage
    the contractor would come along with the blueprint, and he'd say, "You give me a price for this beam and for the lintel
    and for the reinforcing steel in the basement and so on, so forth," so we had to have a man able to read the blueprints
    and see what's required for the basement, what's required for the first floor and so on, so forth. We actually got into
    their line of endeavor really without looking for it. We didn'thave no idea that the time come that we had to have an
    architect or we had to have an estimator, and we had a girl to print the bid so that Reno and the Reno Blacksmith Shop,
    1930-1941 whenever they receive a bid, they'd see black and white, the cost of it. Before then, we would sometimes take
    a job - maybe $4,000 or $5,000 - shake hand, and then that's the contract. Today it's entirely different than what it
    was at that time. What was the first building that you were involved in erecting? The first building that we put up in
    Reno was the Mizpah Hotel. And what year was that? That was 1931. We stayed in there 6 months or so. And we put up different
    buildings at the University of Nevada. We put up buildings at Carson City for the state itself. We put up a building in
    Virginia City. Oh, we put up buildings in different places. We put up a building in Lovelock and Winnemucca, Elko, Lake
    Tahoe.
- speaker: Respondent
  text: We put up different nightclubs up at the lake. Did the construction work that you were doing - the structural steel
    work - require any expansion of the facilities? Well, we had to have more room, yes; we had to have more room in Reno.
    However, from 1934 to 1960, we were associated with Judson Pacific. It was the largest steel house in the West. They were
    doing steel building all over the state of California. And being associated with them, whenever I had a set blueprints
    that they had to have a bid up there within a week or 10 days, I would waste no time and get that set of blueprints to
    Judson Pacific and tell them that a certain day this coming week, I had to have an answer. They were able to give me a
    quotation, and I would add the cost of the erection, and I was in position to supply a bid. They fabricated the steel
    and delivered it on the job, and what I had to do was go on the job with a set of plans and do the erection to assemble
    the steel. My wife and I read blueprints ourselves and estimated all Reno Iron work without assistance from about 1934
    until my wife's death in 1956. I continued estimating until about 1972, and I still estimate small jobs. Meantime, at
    that particular time they were building the San Francisco and Oakland Bay bridge; they were also building the Golden Gate
    bridge. They were using all of the mechanics in the West Coast - from San Francisco to Los Angeles; they were planning
    on supplying the steel for the bridge, for both of those bridges. And they felt as though they should be able to build
    the bridge in the West Coast rather than sell it to somebody in Chicago or Pennsylvania; that was usually the case when
    there was a fairly good-sized job. Instead, we would supply the money in the West Coast, but the steel was fabricated
    on the East Coast. We becamevery close to each other, and we got to the stage at one time that they had a meeting once
    or so metimes twice a month with all these architects and engineers. At one particular time one night they were discussing
    putting the camber on the steel beam, on the steel girders.
- speaker: Respondent
  text: It so happened that it was sort of a puzzle to all of those engineers at the time. Since after the world war, in France,
    we visited a place where they were fabricating steel, and I saw how to put on the camber. I told them in San Francisco
    that I know how to put the camber on the beam. That was a surprise, and they all look at me sort of with a surprised face.
    They didn'tknow whether I was dreaming or was trying to tell the people if I actually knew about it. After I explained
    and so on, I receive quite an honor. It seemed as though I was one of the youngest men a mong those engineers, and that
    I was the only one that know how to put the camber on the girder. And I became sort of an outstanding steel man. [chuckles]
    How did you come to be a part of that group? Well, that's when we were associated with Judson Pacific. Well, start back
    at the beginning with Judson Pacific, then. Tell me how you developed that association with them. Well, the Judson people
    would come to Reno themselves. They had their own representative. There was a time that they had to have a little help
    as far as the mechanical affair. They were coming into the shop and asking us before we start that whatever the cost would
    be to send a bill to Judson Pacific company for the repair of their certain tools. But it wasn'ttill later that we became
    associated with them, as I said. We started in 1930 until 1960. At that particular time, it seemed as though there was
    different foreign people coming in to fabricate steel, and Judson Pacific saw fit to move their plant from San Francisco
    to Mexico. That's when we cut out the connection, that I couldn't go to Mexico to get a steel price, [chuckling] I had
    to have it close to home. And from that time on, we started to build our own steel. Judson Pacific became Murphy (now
    in Emeryville). As far as the structural steel was concerned, at that time Reno was developing a fairly steady growth.
    They were putting up buildings not so often, but fairly high buildings, including, in the latest years, the 18-story tall
    First Interstate Bank building on First and Virginia Street, which at that time was one of the biggest buildings in Reno.
- speaker: Respondent
  text: Since then, they've put up the Harrah building, for which we supplied the steel from the basement to the top. We've
    been supplying structural steel for different buildings around town ever since. And around Fake Tahoe, the many different
    places like the nightclubs at the lake that had to have structure steel and sign works to put up on top of the building
    - and all of that line of endeavor being run on from year to year up until the present time. During the 1930s, when you
    began to get involved in the construction business, did you have any competitors here in Reno in the business of fabricating
    structural steel? No, as far as the manufacturing steel in Reno, there was none. But I had a fellow by the name of MacCauley,
    who had sort of a shop divided in 2 halves. [Thomas W. MacCauley had an ironworks at 712 East Fourth Avenue. - ed.] In
    one side he was selling steel, and the other side he was selling different types of glass work - windows, stuff of that
    that sort. He was a good talker, though. He had a pretty good line. When you go to a meeting, he would put up a big front
    [chuckles]; you'd think he owned the whole city of Reno! [laughter] But all in all, he was not bad competition at all.
    When did the name of the Reno Blacksmith Shop change to Reno Iron Works? Well, it changed in 1931, as a matter of fact,
    when we were putting up the Mizpah Hotel. Some of our men decided to put up the name of the firm, Of course, we had a
    sign made up and put in the building that the Reno Blacksmith Shop was supplying the steel. Well, different contractors,
    as well as different people, said, "What the heck does Reno Blacksmith know about putting up steelin the building?" It
    became sort of a Reno and the Reno Blacksmith Shop, 1930-1941 debate and question, and I didn'twaste any time to call
    it the Reno Iron Works instead of Reno Blacksmith after the time we were putting up the Mizpah Hotel. And it turned out
    to be the Reno Iron Works ever since, to this day. Reno Iron put up a number of buildings here in Reno, including the
    Scott Motor Garage, I believe, on Virginia Street; Heitman Chevrolet; the Ross building.
- speaker: Respondent
  text: Yes. And when you were back with the Armstrong company, you were involved with repairing Lincoln Hall, I believe,
    on the campus, as well. That's right. Yes. Among the great variety of buildings that you have erected here in Reno and
    Washoe County, which one was the most challenging for you and why ? Well, the most challenging, you might say, was what
    they call the Harrah hotel now. We supplied all of the steel in that particular building. From thevery beginning, we dealt
    with the one contractor, and before we got to the first floor this contractor quit for the reason that when they were
    digging the foundation, a great big surge of water developed in the foundation of the building that pretty near flooded
    the town of Reno. (The same thing took place a year or 2 before when the Bell Telephone Company put up a building on First
    and Center Street. Another surge of water came along, and it was extremely big.) This general contractor, he go to this
    company that had the building to put up, and he want some more money because he had to do considerable work to seal the
    water that was coming up. It seemed as though the people didn't see fit...as long that he signed the contract, that he
    should ask for any more money. They told him that it was his own hard luck if they run into water. At that time it was
    3 stories below the level of the ground and is still today, plus it was 6 stories above. We supply all of the steel at
    that particular time. However, we had our steel practically fabricated when this first contractor give up the job. He
    had a bonding company to bond by the contract, but we couldn't go to the bonding company to make us pay because the bonding
    company disqualified themselves as a company, as a bonding man. We were stuck with the steel on our hands. A company from
    San Francisco - I couldn'trecall their name right offhand - come to me, and they says, "We're willing to take the steel
    off your hands as long that you got it all fabricated for the job, but we want you to discount the cost of the steel 10
    percent," which that was all they allow for the erection of the steel.
- speaker: Respondent
  text: And I could tell at the time that it was going to be a hard picking for me to have to take a 10 percent discount to
    dispose of the steel to the new contractor, which I had nothing to do with in the first place. But in order to get out
    from under, I took the chance of giving the steel for 10 percent discount, which we put up the building and we got paid
    for when the job was finished, but we didn't make a dime on the building. We didn'tlose our shirt either, but we didn'tmake
    a dime on it. That Harrah's steel became the Towers in the Prune Yard on Highway 17 in San Jose. That was the most challenging
    job we had in my experience. Well, that's certainly challenging in a financial sense. I wonder if any other buildings
    might have been more challenging in a technical sense, that required more skill and knowledge in putting them up. Well,
    we put different buildings up in Carson City for the state. But we never had a bit of trouble as far as getting our pay
    for them. We put up this Ormsby House hotel that we see today. We supply all of the steel for the Ormsby House. And as
    far as him pay us, we had no trouble whatsoever to get our money. It was quite a job, and it lasted a considerable time.
    There was a time that we probably had to wait 60 days instead of 30, but we got paid for it. We never lost a dime as far
    as the Ormsby House is concerned. I understand that the Reno Iron Works put up the jail in Gardnerville in the mid-1930s.
    Yes. Can you tell me something about how you got that contract and what the jail was for? Well, the main reason to put
    up the jail at that particular time...in those days, the Indians were not supposed to drink; they were not allowed to
    buy whiskey or to be in to xicated. However, during the Prohibition a lot of these home-brewed places were operated. The
    Indian was easily able to buy all the booze that they wanted to get, and there was a lot of drunken fellows. Particularly
    up around Minden-Gardnerville, they thought that they got to put a foot down and try to get these Indians to so ber up
    and try to make them work...make something out of them like they used to do.
- speaker: Respondent
  text: 'Under those conditions, they came onto the idea to put up a jail. Well, at that time there was a set of plans, and
    we got a set of plans - that''s the time that I was still in contact with the Judson Pacific. I go down to San Francisco
    and arrive at a price, and then I had to do the erection. At the time I remember that those bars in that jail were supposed
    to be extremely hard metal, so they don''ttake a hacksaw and cut it by hand. It was so hard that you couldn''t cut it.
    We put up the jail, and the first day that we start to assemble the steel, there was a time that we had to pound on the
    metal. The judge upstairs, where he was holding court, send word to stop the noise, that it in terfere with his court
    procedure. We did stop for 15 or 20 minutes or maybe half an hour, and then I sent a man up to see the judge...how long
    we had to sit down, because we were holding up the works. We couldn''tcarry on with our job if he was carrying on with
    his. [chuckling] He sent word back that he didn''twant any more noise for the balance of the day. Well, we called a day
    off; then we went home. Meantime I tried to arrange it so that we had an agreement to do like I did some years before:
    that he was operating one day and I was shut down, and I operated the next day and he would shut down. And so we finally
    got to the stage that we were able to finish the job, but instead of getting it out in about 2 weeks'' time, it took something
    like the whole month. Whenever I was held up, my men, some of them quit the job and just walk out. I had to take a greenhorn
    and try to send him down there to help out to assemble the steel, which turned out to be a drawback. After the completion
    of the steel work, they start to gather up these Indians and put them in jail. And after they had the jail so chock-full
    of men and women, they had to do something about the living condition! They had to go to the toilet, and one thing and
    another! [laughing] So they decide to let some of those people go. In the meantime, while somebody was in the toilet,
    the other fellow just run out of jail!'
- speaker: Respondent
  text: The next day they fish around from Carson City down to....I Reno and the Reno Blacksmith Shop, 1930-1941 don'tknow
    how far down they had to go to gather up the Indians that they had in jail that they run away by open the doors. It turned
    out to be sort of a joke. Can you recall about what year it was that you built the jail? Well, I'd say it might have been
    1935 or 1936. At the time, the country decided to open up the liquor so that the Indian could buy liquor. The only jail
    that I'm familiar with down there that was used for that sort of thing was in Gardnerville, not in Minden. Of course,
    the 2 towns are adjacent.... I think you're right. I think it was in Gardnerville. It's a rather small building. It's
