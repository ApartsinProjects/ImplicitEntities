    built by the Kaiser company over in the Bay area. Were the men you were training from Nevada, or did they bring them in
    from elsewhere? Sometimes they were strangers, but not so much. They were coming in from Utah; they were coming in from
    around the state, from California. I had quite a few that were coming in from the north part of California, anywhere from
    Sacramento up. But most of them, I would say better than 75 percent, were Nevada boys. I kind of had the idea that the
    government know that we're going to get into a war; that it would take some time before things be ironed out or the war
    be over, and they would try to educate these young men to be welders. Under those conditions we did the best we could
    to play ball with them. Were there any noticeable changes in the way life was lived in Reno during the Second World War.
    While the second war was going on, there was a lot of traffic, and there was a lot of automobiles on the roads, going
    and coming, either from California, east or west and so on. We were kept busy through a different line of endeavor, and
    so was the whole town. The whole city of Reno was busy, particularly the stores. They all had plenty to do and plenty
    of people to work for. The hotels were plenty busy. We had a lot of different soldiers, different officials coming in
    through the town, particularly going to California. The town was busy in a different line or way than during peacetime.
    There was considerable difference, yes. During the war, highway and rail traffic through Nevada grew. With our crane we
    salvaged derailed railroad equipment and wrecked trucks. We did repair a lot of trucks. Sometimes they would have a collision;
    sometimes they just get to the point that they had to break down, and we had the space anywhere from Elko to California
    to pick up these rigs and take care of them and fix them up so get back on their wheels to travel.
- speaker: Respondent
  text: I hope you'll be able to tell me a few things about the social impact on Reno of the presence of Stead Air Force Base.
    There were quite a number of GIs stationed at Stead. It didn't double the population of Reno, but it certainly in creased
    it drastically. It did in crease considerable. Well, the first thing that came along...at the beginning of Prohibition
    those that was operating a bar or saloon, they were not a bit happy to be told that they got to do away with the liquor.
    And during the war the government did away with the red light district in Reno, in which those men, they would spend the
    evening [laughs] to visit the girls...and that had to be cut out, too, you know! I think it was more state government;
    I don'tthink the federal had much to say about that. But the women, they werevery much opposed. The local women at the
    time - since they had the vote...they vote that proposition down cold right from the beginning, [chuckles] That was when
    the camp first started out. I would say it might have been 1941 or 1942 or something of that sort. So what were the young
    men doing for entertainment when they came to town, then? Well, the YMCA was one of the main places that they were going
    to. Any of the members that belong to a different organization...they were attending the lodge more so than they did before.
    The YMCA and the Salvation Army, too, would provide entertainment. They were going up in the camp - instead of the young
    men to come downtown to Reno, they would try to keep them in the camp by providing entertainment up there. And they had
    good entertainment. They had singers and people that actually came out of Hollywood, I guess. The boys were well taken
    care of, and they were well provided, as far as anything in the line of food. But it was like soda pop and drinks that
    has no alcohol in it. To compare my first experiences in World War I and when I saw that World War II, these people today,
    they got better entertainment than we did when we were in the service.
- speaker: Respondent
  text: There were a lot of clubs like the Riverside Hotel and different places that had shows every night. Some of the places,
    they were willing to give up either one or 2 nights of the week to give it to the boys at the Salvation Army or different
    ones that they had charge to provide the entertainment up there. There were different houses in the town of Reno; they
    were willing to sacrifice one or 2 nights of the week to provide entertainment for the people at the Stead. We thought
    that the business people werevery congenial, very willing to cooperate. In some cases I think a lot of families thought
    that they would like to help the war effort. They were sending their daughters to USO [United Service Organizations] occasions
    at Stead. We had in mind at the time that we try to gather up the women to take more action with the Red Cross or with
    the war effort. Some of the youths were anxious to go to the Civil Air Patrol (CAP), including my own daughter. She was
    flying at the Sky Ranch on Pyramid Road. At that particular time, every time the telephone would ring in my shop, I was
    going to the telephone with the thought in mind that 9 times out of 10 it might have been my daughter that got killed.
    And that was not a very good feeling, I'll tell you. I felt pretty much out of place. She was too young to start with.
    On the other hand, they didn'trealize the danger. They didn'trealize what it meant to take a plane up in the air, to take
    a solo flight and be able to pilot that thing out and be able to come back in the field. That was quite a chore. [CAP
    was a very popular and successful high school flying program for Reno youth.] 7 he period right after the Second World
    War was a period of high demand for a lot of in dustries. What happened with Reno and the Reno Iron Works after the war
    ended? Did you find that your business in creased? No, we were able to carry on, I would say, practically normal. There
    was no ups and downs to speak of any kind. We had to bid on jobs, and if some firm in San Francisco or the West Coast
    were hungry for the steel, naturally they would get the business, and I was the loser.
- speaker: Respondent
  text: But it didn'thappen too Reno Iron Works and Community Expansion, 1941-1986 very often. We were able to hold our own
    between the local customers that I had, and the industry. They were getting off of the military line of endeavor, but
    they were getting back into the civilian, and I was able to keep on working. I never had any trouble as far as laying
    anybody off on account of a lack of work, or have to hire any more helpers in order to supply the men. I kept on going,
    week by week and month by month, without any trouble. Throughout the United States a great number of war surplus trucks
    went onto the market after the Second World War, and the trucking industry in general enjoyed a big boost. One of the
    consequences of in terstate, transcontinental trucking was that righthere in Reno a group of people decided that they
    would try to make Reno a more prosperous community by building warehouses and by having a warehousing law passed that
    would permit the storage of material here free of charge - by that, I mean without any tax on in ventory. Mr. Frank Bender
    was involved in that, as were several other prominent Renoites. Do you have any recollection of that or any of the figures
    who were involved in it? Was Reno Iron Works involved in building the warehouses? Tell me as much as you can remember
    about that. Well, yes. The first warehouse that was builthere in Reno was a sheet steel building. And then before then,
    we had to figure out the structural steel to so much a ton. But when you talk about sheet steel, my goodness, you can
    go up the whole building in not very much more than 4 or 5 tons. And this Bender that you mentioned just now, I was the
    first one to put up 2 buildings for him. He was also a banker, and he was a very prominent businessman, and he was well
    liked by everybody. He only had one son; that's the one that is in there now. The son at the time was in college or something;
    I don'tknow where, but he was in college. However, this fellow Bender becamevery fond of me, and I becamevery fond of
    him.
- speaker: Respondent
  text: After I put up the first 2 building - I would say maybe 10 years later - I put up 2 more buildings for him. Today
    I think he has half a dozen buildings in different places in town. One building is on Evans Avenue between Fourth and
    Fifth. And I think he had others; I'm not sure where the places are. However, these were warehouses for government stuff
    that the Bender people had. Talking about trucks, from time to time they have sales. They were trying, in the Second World
    War, after, to see that the exservicemen would receive a break to buy these used cars as war surplus at a decent price.
    However, these automobile dealers in Reno, they got wise to what was going on at the warehouse; they immediately try to
    jump over the common soldier's steps and tried to buy the truck himself, so that the automobile dealer would sell the
    truck to the ex-serviceman instead of the warehouse direct. That took place in Reno. I know of many different ones, including
    some of the men that I had work for me, that they would try to buy a truck. They thought the price was unreasonable, but
    they discovered that the end of the story, when you get to pay for it, they had to deal with an automobile dealer, because
    the dealer had to buy a license, and he had to maintain a business. And under those conditions, the man had to deal with
    an automobile representative. The same thing took place even after the war was over. They had a machine shop up there
    at Stead - there was a sheet metal shop, and there was a machine shop, and there was a carpenter shop. And they had a
    different type of machinery that after they closed they would try to sell it to the higher bidder. At that particular
    time I had in mind of a lathe, and I had in mind of a drill press, and I had in mind of an electric hammer. I had them
    all picked out what I was going to bid on; however, some big firm out of Los Angeles came up, and the day of the auction
    they bought everything that was under the roof. And our fellows from Reno that went up there and tried to sharpen our
    pencil, to bid on this, bid on that - we didn'thave the Chinamans chance of it on anything.
- speaker: Respondent
  text: The guy from Los Angeles bought everything, building and all. I guess they got it for a reasonable price, but we never
    did know what the cost was. After the Second World War a debate began that's continuing today; it's been going on for
    the last 35 or 40 years. It had to do with how the city of Reno was to develop and how the entire state was to develop.
    You were a member of the Rotary, and you were also a member of the Chamber of Commerce. Do you recall anything about proposed
    methods whereby Reno would plan its own growth, if in deed they did plan it? After the Second World War there was a continuing
    discussion going on about whether or not Reno should continue to develop in the direction of a gambling and divorce and
    marriage based economy or whether it should try to diversify. Mr. Bender, of course, believed that the best route to take
    was this so-called freeport idea with warehousing. There were people who were in opposition to that. Can you recall any
    of the debates that were going on within the Rotary or within the city government or anything at the time, and tell me
    something about it? Well, I never was active or took sides politically. I felt as though that if you run a business, you
    got to be on terms with different ones that are in politics. At one time we had a fellow by name Harry Heidtman that was
    a big shot in Reno. We talk about George Wingfield, that if he run for governor, he'd've got elected; why, so would Harry
    Heidtman. As businessmen, we tried to get along with different ones. Harry Heidtman was my landlord for some time - I
    would say from 1930 to 1950, probably. And he had pamphlets, advertising sheets, and he come into my shop, and he wanted
    to put it in the front window. As much as I had to get along with the fellow, I said, "Nothing doing." I says, "If you're
    in politics, you have to do it the best you can, but don't use my shop to in fluence somebody to vote for you. He might
    be one of my best customers, and I don'twant you to try to change his mind or drift him away.
- speaker: Respondent
  text: I would shut the gate on him, too, as much as that I had to try to get along with him." He listened to me. He took
    all of these signs that he was going to put in the window; he took them right with him, and he went 2 or 3 buildings farther
    down toward the El Cortez Hotel, and he put them in another building. So, it was not too far away from my shop that he
    did put up the advertising sign. That fellow was a politician. For many years he had the Buick agency for the whole state
    of Nevada. He had a subdealer in Elko, and he had one in Winnemucca, and he had one in Fallon - in every large city -
    and he even had one in Truckee. And that man was well liked by the people as well as the factory where they were selling
    automobiles. He was well liked by everybody. He was also the owner of this Becker's Bar in the latest years, when Jack
    Dempsey was going in. Because of the GI Bill there were a great number of men who began attending universities right after
    the Second World War. The student population at the University of Nevada grew enormously, as it did in practically every
    other Reno Iron Works and Community Expansion, 1941-1986 land grant university throughout the United States. I suspect
    that might have had some impact on the growth of Reno and what was going on here. Can you remember anything about that?
    Well, I don'tthink I have an answer to that question. I really don'trecollect that there was anything took place on account
    of having more or less students at the university One thing that they might have learned in the Second World War is that
    it pays to have an education. It pays very, very deeply. There was a lot of people that after they got out of the army,
    they tried to start school again. They had learned from past experience that it was worthwhile to have something in the
    upstairs storage room, [chuckles] Yes. I understand that you helped a lot of students over the years. Can you tell me
    about when you began doing that and what sort of help you were able to provide?
- speaker: Respondent
  text: Well, a lot of these men that were attending university didn'thave the financial means to carry on. After the first
    World War I was able, I was willing, and I was anxious to give those boys a chance, if there's an opportunity for them
    to at least earn enough money so they can pay their way through. I was only too glad and willing to do it. Sometimes I
    had 3 or 4 young men working in there all year round. Even the vacation time they were earning money so that the following
    year they can re-enter again at the university. I kept that up, up until the present time. Even today we have 5 boys attending
    the University of Nevada on Reno Iron Works scholarships. I have a granddaughter attending the University of Nevada; she
    works in here. I think I've seen her out there this morning. I always sponsored somebody up there, that they didn'thave
    money enough in their own pockets and they were working in the shop. I was glad to do it, and some of them appreciate
    it. [Mr. Ginocchio is said to have supported more than 30 Reno businessmen in securing B.A.'s. Currently Reno Iron Works
    offers scholarships paying 50 percent of all expenses for employees' family members who attend UNR. - ed.] How do you
    go about recruiting these students? How do they get in touch with you? They come to me; I didn'thave to recruit them.
    They just come to me, There was someone from the university, including the president, that he was a good friend of mine
    - the president by name Clark. [Walter E. Clark was president of the University of Nevada from 1918 to 1938. - ed.] This
    fellow was sort of a very jolly fellow, and he was also a member of the Rotary. We might've had lunch at the table and
    discussed the different condition. He would ask me questions; I would ask him questions. And he was one of the men that
    suggested to try to help those young men that were willing to learn, if they had the financial backing, to go to school.
    Through his recommendation I did my very best at the time to help him, and I've been doing it ever since.
- speaker: Respondent
  text: Have you been friends with any of the other presidents of the University of Nevada? There was one president by the
    name of Love. [Dr. Malcolm A. Love was president of the University of Nevada from 1950 to 1952. - ed.] He was a very nice
    man, a very pleasant man. He was also a member of the Rotary Club. For some reason or other, the poor fellow, as much
    that he was trying to please everybody, there must have been some...somewhere along the line there were politics that
    he wasn'tprobably fairly sure of, and I don'tthink he served more than one year that he got himself out. I felt sorry
    for him, because I think he was really too good for the job, actually, [chuckling] He was a kind man, and he was willing
    to listen to anybody. But like I say, I think it was a political affair that he didn'tlast more than one year. His successor
    as president of the university was a man by the name ofMinard Stout. Doyou have any recollection of him? No, but I know
    that he was a better politician than Love. He was a better mixer. He got fired.... Well, they all do! [laughter] Even
    today, when I meet the president of the university, I say, "I wonder how long you're going to last." [laughs] I think
    it's more political than it is anything else, because the men, from what I see, actually try to please, and they try to
    play ball with the boys, and they give and then take in many different ways, and the girls, too. But unless they're able
    to manage to get along with one, perhaps that he might have more to say than another, that's a point that still exists
    today - from Clark's time up to the present day. I know you helped a lot of students go to the university. Did you help
    many people from Italy to come to this country? One that I sponsored was my nephew. He's down in Palo Alto now. He has
    a responsible place. He's connected with something that they do with electronics. I don'tknow much about their line of
    endeavor. However, since I was his uncle and I financed his way over here, as soon as he got on his feet he paid me back,
    dollar for dollar.
- speaker: Respondent
  text: And I also financed 2 fellows that were born and raised in the same town where I was raised, from a good family. They
    didn'thave the financial means, and I sent on money to come all the way to here without any trouble. You know, today we
    talk about the Statue of Liberty. In the early days, a lot of people tried to raise enough money to get as far as New
    York. But when they get up in New York City, through the immigration people, they had a lot of foreigners that they didn'tknow
    what to do with; they didn'thave anyone to go any farther, and it was really a puzzle. The foreigner didn'thave the language
    to talk for himself to get a job, because they talk a different language and so on. And in my case, when I sent for these
    relatives or friends of mine, I not only give enough money for the ticket, but I also give them [a good deal more money]
    to spare. That applied to me as well. When I landed in New York City, there was many people that had to go through Ellis
    Island because they had no way to go any farther. But in my own case I remember that I had this money [chuckles] tucked
    away in my pocket; I had $20 gold pieces; I had $10 gold pieces; and I had $5 gold pieces, [chuckles] And when I show
    to those immigration officers that money that I had, they thought if I had these, that I had a trip paid to Reno, Nevada,
    [laughter] I had that much gold in my pocket, plus some silver, that they didn'tsend me to that island with the rest of
    the guys, [laughs] They opened the gate and let us go freely without any trouble - none whatsoever. I don'tremember sponsoring
    any more people. Those were recommended from my friends and members of the family...people in the same town where I was
    born. There might be more, but regardless of who they Reno Iron Works and Community Expansion, 1941-1986 were or how many
    there were, they pay me back dollar for dollar. I never lost a dime as far as financing their way outhere from any body
    [Mr. Ginocchio has also sponsored several skilled wrought iron forgers from other countries.
- speaker: Respondent
  text: '- ed.] How many of them stayed here in Reno? Oh, I think they all stayed in Reno. Of course, this nephew of mine
    was down in San Francisco, and then he went up to where he is now with this business in Palo Alto. But the family stayed
    here in Reno, and then in the latest years went in business. At one time - it was 1955,1 think, when Reno almost got flooded
    out.... Tony Pecetti and I had been neighbors; there was an alley between his building and my shop. And he saw me come
    along, that it was stormy; and then he came down in the shop and said, I told him that I''m going to try to save a bridge
    down on Lake Street, that the water may haul it away. I asked him to come along with me as a helper, and he did. We went
    down, and, sure enough, the water was bringing in trees and different plants and boards and shrubbery, so that it formed
    sort of a dam right in front of the bridge. There was a time that I could tell from the sound of it that this bridge was
    rocking on its foundation. We were dragging these trees off from the front and dumping them off on the back of the bridge
    to keep from having a dam. We carried that out from 1:00 in the afternoon till about 3:30 or maybe 4:00 in the afternoon.
    And then the water kind of receded, and we left and went home. After we got to the shop, we were talking about what we''
    re going to do with our labor that we did to try to save the bridge. He said, as far he''s concerned, he''s not going
    to ask for anything. And I thought that if that''s the way he feel about him self, I would do likewise. This man that
    come to me to try to save the bridge was a fellow by the name of [John] Chism; he was a city councilman. He said to me
    in the beginning that he had no authority or he wouldn''thave any money to pay me for the job, but if I wanted to do him
    a favor, to go down and try to save the bridge. And under those conditions, Tony and myself both decided not to turn in
    a bill and skip it. So we saved the bridge. There was on every large strike by the United Steelworkers that affected the
    steel industry throughout the United States in 1959.'
- speaker: Respondent
  text: It made it very difficult for the automobile industry to even manufacture cars. Can you remember what happened with
    Reno Iron Works during the strike in 1959? Everyone would read in the newspaper different things that was taking place,
    but as far as me having any trouble with the Iron Works, the men that I had work were pretty satisfied with what I was
    paying, and I never had a bit of trouble. Well, I'm not actually thinking of any kind of labor trouble; I'm wondering
    whether or not you were able to stockpile enough steel so that you could continue to work during that very lengthy....
    I can'trecall the number of days, but I believe it was well over 100 days that the steel industry didn'tmanufacture steel.
    Yes. Well, it's a funny thing. It looks to me that the business people at that particular time saw what was coming. When
    the things went on strike, 2 or 3 days later the steel was coming in from Germany; it was coming in from France, coming
    in from Belgium, and warehouse steel - any of the foreign countries, including the Japanese. There was steel shipped and
    loaded in every port, from New York to Mexico. And it was surprising to me at the time; I said to myself, "Well, funny
    that we have a strike that is almost all over the United States." It wasn't a case of one or 2 places, but the whole United
    States was on strike. However, there was no trouble getting any steel, because, as I said, it was coming in the ships
    from any part of the world that they had steel to sell over here. After the Second World War, Reno Iron Works grew. It
    was not like a mushroom that grow overnight, [chuckles] It took years and years of speculation and watching my step in
    business, and this is a point where education comes in. If I'd have had 5 or 6 years of university education, today I
    would be a millionaire. But I was at the stage that, when a job would come to me - like a set of blueprints or so on,
    so forth - that I felt was too big for my capacity to figure things out and make up a bid, I didn'thave anybody with me
    until I got married that would help me to develop anything.
- speaker: Respondent
  text: They were good workmen; they meant well enough; they would do almost anything you tell them to do, but as far as to
    initiate something, to develop something for the best of the business, I never had that until I got married, and that
    was a bookkeeper in the office who knew how to write up a contract and finance and so on, so forth of that kind. * * *
    * * As far as the growth of Reno and my growth, it was just step by step. I tried to save a dollar in every way that I
    could see that a dollar was to be saved, to be made. And I would give a lot of credit to Judson Pacific in San Francisco.
    They gave me a good shake, I would say, in the line of business to try to secure different jobs that were going on in
    Reno, that I would never have had otherwise. From 1930 to 1956, when my partner John Ginocchio died, we experienced a
    good relationship and steady growth. John's one-half interest was inherited by his so nin-law for one dollar! His son-in-law,
    Earl Avansino, had been working for us, learning the business, for a few years before John's death. Earl and I decided
    to move the business to 290 Keystone Avenue in 1960. We had a fairly good relationship; however, when Earl decided to
    bring his young son, John, into the business, the age differences were too great. That factor caused me to feel I was
    outnumbered, and circumstances caused me to feel that I wanted some of my own family involved, too. At that time, we employed
    Don Jewett, the husband of Peggy Jewett, Bill Pelter's sister. Don had graduated from the University of Nevada in Civil
    Engineering. I felt he was a very good choice, because since Don held a California license, we were able to expand our
    market to that state and others. In 1967 Don joined our firm as chief estimator, and his wife, Peg, became our head bookkeeper.
    In 1971 - with the help of my daughter, Andrea, and Bill, her husband - we were successful in buying the one-half interest
    owned by the Avansinos. On 27 April 1971, we became 100 percent owners of Reno Iron.
- speaker: Respondent
  text: At that time, I continued as president, Don Jewett became vice president, Andrea became chairman of the board, Peggy
    Jewett was secretary-treasurer, and Bill Pelter a director. That same board continues today, 15 years later. In 1972,
    Andrea was made chief executive officer, and she has run the company on a day-to-day basis from December of that year.
    Peg is our office manager; Don Jewett is semi-retired but he still participates in board activities; Bill Pelter, though
    he is an active Reno Iron Works and Community Expansion, 1941-1986 Reno physician, continues his involvement in Reno Iron.
    I am still at my forge 5 days a week. Monday, I take off to go to Rotary and spend the rest of the day in my office. In
    1983, we made the decision to move the plant to a larger location, away from the traffic on Keystone and Fourth Street.
    We bought 10 acres and 3 buildings located at 600 Spice Islands Drive, Sparks, Nevada, in the heart of the Sparks Industrial
    Park. We have 92,000 square feet under root. At that time, we continued our direction toward computerization. Two years
    before, in 1981, we had purchased a robot, a machine that punches beams. It is fully computerized and has allowed us to
    fabricate structural steel at a far faster rate than we could before. In our new plant, we have many welding and burning
    machines that are computerized. We have a railroad track right in our building, and we own the spur. Our marketplace,
    today, is all of the 11 western states, but our main concentration is the Bay Area. We have become specialists in seismic
    structures - that is, reinforcing structural steel in configurations that make a building safer in an earthquake. These
    designs meet the California codes, and that is the type of buildings we go after. The last building we did in Nevada was
    the Citicorps Bank in Las Vegas; that was about 2 years ago. Most of our buildings are in San Francisco, or near San Francisco.
    We ship our steel in our own trucks, if it is not sent by rail. Our cranes are located in California to erect our buildings.
- speaker: Respondent
  text: 'This last Friday, I signed over 200 paychecks, and that is about what our weekly payroll averages. I have watched
    my business go from repairs of wagons pulled by horses, to fabricating a small component Bill Lear needed for his Lear
    Jets. I have watched it grow from the days before welding, when we bolted scrolls together, to teaching welders during
    World War II in techniques we abandoned years ago. Today we have track-welders that are computerized and automatic. Most
    of all, I have had the privilege to be part of a dream my father had for me to be a blacksmith. And I have watched my
    dream, for my daughter to run my business, to come true. What I wrote in our brochure holds true today: Reno Iron''s success,
    in an extremely competitive field, reflects careful management by so undly experienced, capable and conscientious personnel.
    That is what private enterprise is all about; we believe it is the backbone of our nation. In my ninety-third year, to
    have been able to live in Nevada, to have been able to work a mong Nevadans for 76 years, to have been able to rear and
    educate my family in our community, and now to tell my story...my gratitude to God and to Nevada, my home, has no bounds.
    Photographs See next page. This remarkable expression of the blacksmiths craft was created by Andrew Ginocchio when he
    was 17 years old. Forged with the simplest tools from a single rod of mild steel, this rose served as his master craftsmans
    test. (Rich Johnston photo) Photographs The in teriorof the Armstrong Manufacturing Co. shop, ca. 1915. R to 1: Andrew
    Ginocchio, his helper Ed Schoen and Ed Casinella. (Others unidentified.) Andrews two-cylinder Metz faces the camera. During
    World War I, Andrew Ginocchio served with the U.S. Army Corps of Engineers. In 1918 he was the fireman for this locomotive
    hauling troops and supplies to the front. Andrew Ginocchio was first employed at the Vietti and Bottini Blacksmith Shop
    in 1910. This later became the Reno Blacksmith Shop, and then Reno Iron Works.'
