- speaker: Respondent
  text: I went 4 years in highschool.
- speaker: Interviewer
  text: How many years did you go in grammar school? What did you want to be?
- speaker: Respondent
  text: I didn'thave a definite idea what I wanted to be.
- speaker: Interviewer
  text: Did you like school? Yes, I did. I was an average student. What subject did you like best? For sports I was in boating.
    Later I played baseball and kendo
- speaker: Interviewer
  text: 'Did you have any other hobby? books : I didn''thave anything special except reading and writing Japanese'
- speaker: Respondent
  text: poems. In 1933 my poem was seltted in the New Year poetry party and I was granted an audience with the Emperor. Since
    my wife died I have been busy, so I have not been writing poems.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: ': I was born in 1890. Q: How old are you now? : I am 87 years old now. I am going to make a speech at the centenial
    banquet of Christianity. I became a Christian when I came to America, so I have been a Christian for 70 years.'
- speaker: Interviewer
  text: Did you come here when you were 17 years old?
- speaker: Respondent
  text: ': I am surprised your father let you come : Yes. I was 18 in Japanese way of counting, but 17 in Western way.'
- speaker: Respondent
  text: My cousin who was 20 years old said, "Let*s go to America together" so I came here. I was planning on going back to
    Japan, but I got
- speaker: Respondent
  text: married and had children, so I could not go back to Japan. My sister took a husband and inherited the did you think
- speaker: Interviewer
  text: ofa country,America was when wanted to go and see it. It was from my to America. I had a dream. Did you hear much
    about America?
- speaker: Respondent
  text: 'curiosity that I came : I read about America in books and magazines. In those days there was a magazine called "Jitsugyo
    No Nihon" (Industifral'
- speaker: Respondent
  text: Japan) which was published monthly. It wrote good things andy and hardly any bad thing about America.
- speaker: Respondent
  text: It said San Francisco does not like Japanese, but Seattle is all right. One pastor said that San Francisco was punished
    by
- speaker: Respondent
  text: the earthquake because it oppressed Japanese. That is why 1 decided not to go to San Francisco, and came to Seattle
    by ship.
- speaker: Interviewer
  text: Did your father let you come here without any argument?
- speaker: Respondent
  text: '2 At first: he told meinot. to go, Hutjas*ltold him that: i. was coming back he let me go.'
- speaker: Interviewer
  text: Where did the ship set sail from?
- speaker: Respondent
  text: ': From Yokohama. It took 16 days to sail from Yokohama to Seattle.'
- speaker: Interviewer
  text: Do you remember about your voyage?
- speaker: Respondent
  text: ': I did not get seasick, but my cousin got-seasick and didn''t eat much. It didn''tbother me, but it was long 16
    days.'
- speaker: Interviewer
  text: Were the passengers all men in those days?
- speaker: Respondent
  text: ': Of course. For many years after I came here there were just men. As I joined the church, I went to the street corner
    with old church members and invited young men to church. I did that'
- speaker: Interviewer
  text: ': Wereritthere any women on board the ship? : No, women were not coming here in those days. What do you remember
    about your voyage?'
- speaker: Respondent
  text: I don'tremember much, but when we crossed the dateline the ship's crew entertained us by singing and dancing.
- speaker: Interviewer
  text: ': Was it a Japanese ship? : Do you remember the name of the ship? : It was Shinano Maru. : What year did you come
    here?'
- speaker: Respondent
  text: ': Then it was the year after the great earthquake in San Francisco, : Yes, it was. That is why everybody came to
    Seattle instead of'
- speaker: Respondent
  text: San Francisco. Even now people in Los Angeles say that they arrived in Seattle and then went there. San Francisco
    had bad reputation as Japanese children born in America were not allowed to go to public schools. That is why people say
    San Francisco was destroyed by the great earthquake.
- speaker: Interviewer
  text: How did you feel when the ship entered the harbor of Seattle?
- speaker: Respondent
  text: ': It arrived here at night time, and the harbor was beautifu} with lights. In those days there were not many electric
    lights'
- speaker: Respondent
  text: in Japan, so I thought America was beautiful. There were no cars on in those days, and people were riding carriages.
- speaker: Interviewer
  text: How was the city of Seattle?
- speaker: Respondent
  text: toot nag amy slopes, and streets were not too good. I remember them washing sands off of Jackson Street to level the
    street
- speaker: Respondent
  text: 'before they paved it. : How did you feel when you had the first contact with the white : I thought the white people
    werevery kind. I met wth the white'
- speaker: Respondent
  text: people because I joined the church. I had to learn English, so I worked as a schoolboy. The ladies at the church tayent
    us English very kindly. Sometimes they gave us coffee or tea and cookies. I never thought about such a thing in Japan.
    That is why many people came to church. They did not come to church because of the religion, but because they taught us
    English and treated us with kindness. As they were so kind we decided to attend the Sunday worship service.
- speaker: Interviewer
  text: 'Did you become a schoolboy as soon as you came here. Did you receive inspections when you arrived here? Q: What did
    they check?'
- speaker: Interviewer
  text: At first they gave us a physical examination. Then they asked us how much money we had, where we were going and what
    we were going to do. At that time Japanese pastors were interpreters,
- speaker: Respondent
  text: so they introduced me to the church.
- speaker: Interviewer
  text: Didn't you get any unpleasant feeling at the Immigration office? What did you do the first day? I stayed at a hotel
    named Taiho-Kan. The following
- speaker: Interviewer
  text: Was it a Japanese church? Yes, it was. It is the Japanese Presbyterian Church which I belong to now. It had just started
    then. At that time it was not an in dependent church. It was a branch of the Seattle
- speaker: Respondent
  text: First Presbyterian Church.
- speaker: Interviewer
  text: How did you find out about the church?
- speaker: Respondent
  text: Rev. Fukumatsu Okazaki who was the founder of the Bapist Church was the interpreter at the Immigration Office. He
    asked me where IT was going, so I told him that I had not decided yet. When I talked about Rev. Shimanuki in Japan, he
    told me that Rev. Shimanuki ia a Presbyterian, so go to the Presbyterian church here
- speaker: Respondent
  text: and Rev. Inouye will take care of me. That is why I went there. In those days Seattle was still a bad town, worse
    than the Chinatown here. It had gambling place, prostitute house and Japanese racketeers, but by Christian influence it
    was changed completely. That is why I have been a Christian leader for 40 years. There are Buddhist, Shinto, Konko-Kyo,
    Seicho-No-Ie and many other religious organizations here. Everybody know me as a Christian, but everyone in the Japanese
    community cooperates with me, so it is not difficult to get along. In some places they fight each other.
- speaker: Interviewer
  text: Did you become a sahoolboy in a Shite family?
- speaker: Respondent
  text: ': Yes, I did. The family was very kind to me. On Sunday the master used to go out with a book. I was wondering why
    he went out with a book on Sunday which was his day off. I found out later that it was the Bible.'
- speaker: Respondent
  text: 'Q: Was he a teacher? : He was the principal of a grade school. His name was Mr. Stanton. When I went to school I
    was told that Mr. Stanton was an elder of the church. A few of my schoolmates decided to attend a worship service. I think
    God prepared me a way.'
- speaker: Interviewer
  text: Was there a Japanese church within that church? No, there was a room for Japanese worship service.
- speaker: Interviewer
  text: 'Did it have any relationship with the First Presbyterian Church? : No, it didn''t. It was a branch of the First Presbyterian
    Church. : That is why the elder knew about it, didn''t he? : Yes, he did. Who found the schoolboy''s job for you?'
- speaker: Respondent
  text: The Japanese Presbyterian Church did. In those days there were just young people, so the church took care of them
    more than teaching the gospel. About 4 boys shared a smejl room. The church took care of finding places to live and jobs.
    The jobs were posted on the board in the church. Japanese boys had reputation as hard workers, so jobs were not hard to
    find.
- speaker: Respondent
  text: ': How long did you work as a schoolboy in that family? Yes, because the Mrs. was a nice lady. In Japan they da not
    treat the poeple outside same as the member of the family. After working here for two years I found out that people'
- speaker: Respondent
  text: treat us equally. I understood it after I became a Christian. They had a son, little younger than I, but they treated
    me the same as they treated him. When she bought apples, she gave me apples just as she gave his son apples. It is not
    like that in
- speaker: Respondent
  text: Japan because of the family system. I gradually understood the good points of Christians. Since then I joined the
    street-corner gospel mission every Sunday. Seattle is a cold place but I didn'tmiss it. We occupied the best corner as
    20 to 30 young men gathered. In those days all the churches had morning and evening services. In the morning they held
    worhip services, and in the evening they held the gospel meetings. We stood on the street corner from 6 o'clock in the
    evening.
- speaker: Interviewer
  text: Did you hold the meeting on the street?
- speaker: Respondent
  text: We held it on the street corner where many young men passed by. If the speaker was good, they would stop and listen,
    but ara POOL speaker talked they went away. That is why the chairman left the good speaker till the end. In those days
    there was the Church Federation, so other churches joined us.
- speaker: Interviewer
  text: What did you do in the street meeting?
- speaker: Respondent
  text: 'A: We gave testimonies.'
- speaker: Interviewer
  text: Didn't you have any music? There was a man who played an accordion, so they came to listen to him. They were all bachelors.
    There were no girls nor wives then. They came later. Sometimes there were hecklers, but we
- speaker: Respondent
  text: paid no attention to them. I think it was good that we held the meeting on the street corners for 5 years.
- speaker: Interviewer
  text: Did you do that for 5 years? About how many people came to church by it? Quite a few people came. as our church was
    closest to downtown.
- speaker: Respondent
  text: the In those days there were no cars, so we walked with them to church. After about 5 people gave testimonies did
    you take the people
- speaker: Respondent
  text: Yes, we did, when it was time. Quite a few people were baptized. At one time a Japanese had a fight with a Black man
    and killed him with a knife. He was tried amd was sentenced to die. Japan nese people tried to help him, and asked the
    minister of the First Presbyterian Church, Dr. Mathews, who asked for retrial saying that the death sentence was too severe.
    The retrial was held, and the judge sentenced him to 10 years. As Dr. Mathews was an in fluential man he asked the judge
    to change the sentence to one to 20 years. Later Dr. Mathews and Rev. Inouye went to the
- speaker: Respondent
  text: prison in Wala Wala and brought him back. This man, Arata Usaburo made testimony on the street corner, so many people
    gathered to hear him talk. That happened 65 years ago.
- speaker: Interviewer
  text: Do you remember any other story like that? There is another story. A man who was working as a dayworker
- speaker: Respondent
  text: in California gambled and lost money, so he stole his mistress's jewelry and pawned it to get money. She hired a detective,
    who
- speaker: Respondent
  text: the Japanese man who worked in her house was suspicious. She became angry with him saying that the worker was a
- speaker: Respondent
  text: good man and would not do such a thing. She fired the detective. This man could not stay there. He spent all the money,
    so he
- speaker: Respondent
  text: 'quit the job and came to Seattle. He was going toward the railroad track to and nym and kill himself, when he heard
    the music: by accordion'
- speaker: Respondent
  text: + . es came to our meeting. Someone was making a testimony man should not kill himself. He came to our church
- speaker: Respondent
  text: that he stole the jewelry, but the misses was so good that he could not stay there. He asked Rev. Inouye what to
- speaker: Respondent
  text: do. Rev. Inouye told him that he should give himse}f up to the young then, so I argued with the pastor saying
- speaker: Respondent
  text: that he didn'thave to go to the police if he confessed his crime. The pastor said that the man should not hide his
    crime.
- speaker: Respondent
  text: The man gave himself up to the police in Seattle, and was sent to California, where he was put in a jail. The man
    was-spiritually tormented, but he became well after he went to jail. This is another story "that came from tthe roadside
    mission.
- speaker: Interviewer
  text: Do you think you might have been dragged into gambling and
- speaker: Respondent
  text: 'other bad things if you were not connected with the church? a : Yes, because it was dangerous for, young man to be
    a lone without his familly. When I stood at the street corner I used to say, "There is a place north of the Rocky where
    the water divides. One which comes this way flows into the Pacific Ocean, but if it goes the other way it:flowa into the
    Mississippi. You are only in your twenties, so it does not hurt to come to the church. Just come and see." Many people
    joined the bhurches.in Seattle. Not only the churches but the whole society became good. I have put up a sign that I am
    a Christian. There is an election every year in the Nikkeijin Kai. I have served 6 years before the war and 29 years after
    the war, total of 35 years. There are 500 members in the Nikkeijin Kai. Among them are members of Tenrikyo, Seicho-No-Iye
    and Buddhists a mong them. Christians not only propagate its teaching but serve in the community. Members of the Tenrikyo
    church cut the lawn in front'
- speaker: Respondent
  text: of the Nikkeijin Kai office every month. When did you start the Nikkeijin Kai? In 1935. I served 6 years since then
    till the war broke out. After coming back from the camp I organized a relief association and sent goods to Japan for 7
    years. It was after we came back from the camp and we dadn*thave much money but we sent
- speaker: Respondent
  text: $20,000 to RAA.R.A. We asked women's associations of churches +ocollect old clothes, and sent 330 tons of clothes
    to Japan. After that I reorganized the Nikkeijin Kai.
- speaker: Interviewer
  text: What does R.A.R.A. material mean?
- speaker: Respondent
  text: Japan was in bad shape after the war. People did not have food to eat nor clothes to wear, so we collected old clothes
    and sent them to Japan. The U.S. government did not allow Nikkeijin Kai to send materials directly to Japan. We had to
    take them to the organization called RARA which in turn sent them to Japan. Some Japanese in -Séattle. complained that
    it looked like Americans sent the goods to Japan. I said, "Even if one person could wear a sweater, it does not matter
    if Japanese in Seattle sent
- speaker: Respondent
  text: it or not." In the meantime I received a letter of appreciation "See. You complained, but they knew who sent them."
    So they were.
- speaker: Interviewer
  text: What is R.A.R.A. abbreviation of? I don'tremember what it was, but they distributed goods especially to or phange
    and to poor people. American Friend Service Committee collected the material. We took the things we collected
- speaker: Respondent
  text: to them, and they sent them to Japan.
- speaker: Interviewer
  text: What did you do after you worked as a schoolboy? My father was a merchant in Japan, and he sent me some merchan- Gise
    for me to sell here. In 1909 there was the Alaska Yukon Exposition in Seattle, so I opened a store in it. The business
- speaker: Respondent
  text: was pretty good, and they sold good. Then Christmas came, so lI sold goods in downtown, and they sold good. I leased
    a store and
- speaker: Respondent
  text: sold such merchandise as Japanese flower vase and boxes. The business was good only in December, but I had no business
    the rest of the time. In 2 years I was in debt. I was a Christian then, so I decided to work and pay back the debt. I
    became a Waiter at a restaurant.
- speaker: Interviewer
  text: Was it a white restaurant?
- speaker: Respondent
  text: No, it was a Japanese restaurant. I worked and paid back all the debts. Then the restaurant business became slack,
    amd my boss Mr. Osawa could not pay my wages for 3 years. Finally he told me that he could not pay me, so he would give
    me the res= taurant. As I was young I a greed to take over the restaurant,
- speaker: Respondent
  text: and managed it till the war broke out in 1941. During that time I never missed the church, I attended the worship
    service and
- speaker: Respondent
  text: prayer meetings. I did not make much money, but I was elected as a leader of the Japanese community and served for
    6 years.
- speaker: Interviewer
  text: ': Did you do well in restaurant business? : It went well at first. I had 4 sons, and I managed to bring them'
- speaker: Respondent
  text: ': Did you send them to colleges? The oldest son did not go to college because of the war. The second and the third
    son went to collegerbut they didn''t gra- Guate because of illness.'
- speaker: Interviewer
  text: How was it during the Depression? We had the hardest time then. My restaurant was for laborers,
- speaker: Respondent
  text: so it didn't go bankrupt. I just didn'tmake much moeny. In California restaurants can sell liquor, but in Washington
    we could not sell liquor. After World War I we could sell liguor in restaurants, but as I was a Christian I did not se]lliquor.
    People told me that I would make money if I sold liquor, but
- speaker: Respondent
  text: I did not sell liquor as it would have bothered my conscience if I did. We did not sell liquor in my Occidental Cafe.
    I am still glad I didn't.
- speaker: Interviewer
  text: Was it a Japanese restaurant or a Western style restaurant?
- speaker: Respondent
  text: ': It was a Western style restaurant. It was called the Occidental : I had worked only as a waiter, and I did not
    know how to cook.'
- speaker: Respondent
  text: You do not succeed in restaurant business unless you know how to cook. I was given the restaurant for my wages. I
    was the chief waiter and cashier, so I left the kitchen to the cook. That is why I did not succeed in restaurant business,
    but I managed to make a living.
- speaker: Interviewer
  text: Did you work as a waiter and hired the cook?
- speaker: Respondent
  text: As ¥s, I hired the chief cook, fry cook, and dish washers.
- speaker: Interviewer
  text: 'What kind of difficulties did you have in operating a restaurant? : About how many people did you hire? : Six to
    ten people depending on how busy I was. : Were they all Japanese?'
- speaker: Respondent
  text: Sometimes I had Filipinos as dishwashers, but waiters and cooks were all Japanese. I did not dream about managing
    a restaurant,
- speaker: Respondent
  text: 'but I had to, because the boss could not pay me. : Was Seattle hit hard by the Depression? : After World War I Hoover
    Town was born. It was like a ghetto. People put up tents or built huts and lived in them.'
- speaker: Interviewer
  text: You did not have much hardships, didn't you?
- speaker: Respondent
  text: ': In 1924 I was elected as the of 42 restaurants. : Did that include the white restaurants? : No, just Japanese.
    There were 42 Japanese restaurants in Seattle.'
- speaker: Respondent
  text: Since then I started working for the community. In 1925 I was elected the president of the Japanese Association, and
    since then I was reelected year after year.
- speaker: Interviewer
  text: Was there Japanese Association before then?
- speaker: Respondent
  text: ': Yes, it was organized in 1900. It was like the City Hall of the'
- speaker: Interviewer
  text: What kind of work did it perform?
- speaker: Respondent
  text: It did all kinds of work. There was the Commercial Department which took care of business, Also there were Educational
    Dept. Social Welfare Dept. and Cultural Dept. I think they call it the Nichi-Bei Kai here. In Tacoma, Portland and Seattle
    it is called the Nikkeijin Kai. It used to be called the Nihonjin Kai, but as the Niseis and Sanseis are not Japanese,
    we call theme
- speaker: Interviewer
  text: 'Nikkeijin (Japanese American). When did you take a wife? o fob married (in 1915. : Were you 26 years old?'
- speaker: Respondent
  text: ': I was 24 years old. How did you find your wife? : She was the pastor''s second daughter. We used to go to nightschool
    together. My father-in-law a greed to our marriage.'
- speaker: Interviewer
  text: 'Did you decide to marry by yourselves? : She was born in Japan, so she was Issei. In those days most'
- speaker: Respondent
  text: men went back to Japan to take wives, but I got married here in the same church. Later there was the picture marriage.
- speaker: Interviewer
  text: Not many people were married around 1913, weren'tthey? Yes, only once in a while. How many years difference were there
    between you and your wife?
- speaker: Respondent
  text: ': I think there were 4 years difference.'
- speaker: Interviewer
  text: In those days there were not many women, weren'tthere?
- speaker: Respondent
  text: ': No, there weren''t. Since around 1915 the number of women in creased. Only a few people gambled, but most people
    worked and saved money. Then they went back to Japan to take wives rthem. They bought small hotels or restaurants.'
- speaker: Interviewer
  text: Except for a few gamblers, most people were good. Were there troubles because there were not many women? Yes, there
    were once in a while, but nothing in the church.
- speaker: Respondent
  text: There were fighting and killings a mong gamblers. The Federation of Churches in Seattle crusaded against gambling.
    The Nikkeijin Kai made pamphlets, "Go Po-Sunday School" amd distributed in the community. It worked as the Nikkeijin Kai
    sponsored it instead of the church. The number of Sunday School children in creased
- speaker: Respondent
  text: in Seattle by it. I have been a Christian leader fora Long time. I am waiting for somebody to take my place.
- speaker: Interviewer
  text: 'The relationship between the white people and Japanese was'': good in Seattle, wasn''t it. |'
- speaker: Respondent
  text: A; It was very good. Mr. William Denning who was a 4 time mayor of Seattle was the elder of the University Prebyterian
    Church. His successor Gordon Clinton who became mayor twice was the Sunday School teacher of the Methodist Church. The
    leaders were Christian and pro-Americans. I have been the vice-presidebt af the Japan Society for 7 years. The American
    society... treat Japanese kindly.
- speaker: Interviewer
  text: 'Why is it that the relationship is so good compared to California? A: Mr. Denning who served as the mayor of Seattle
    4 times, and Mr. Denning, the two-time mayor praise Japanese as law-a biding race. There are hardly any criminals a mong
    Japanese. However, 60. to: 70 years ago Japanese were bad. There were Chinese gambling houses side by side just like in
    Las Vegas, but they were all cleaned up. It was by the influence of the Christian mayors who treated'
- speaker: Respondent
  text: Japanese well. That is why I am working.
- speaker: Interviewer
  text: Let's talk about the time of the war? How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: A; I thought Japan did not have a chance. I was the president of the Japanese Association then. There were spies from
    Japan, majors and colonels. They said to me, "We have to attack America." I said to them, "But America is strong." "No,
    America is not
- speaker: Respondent
  text: strong," they replied. I said, "In olden days we fought with swords, spears and bows and arrows, but this is the age
    of
- speaker: Respondent
  text: airplanes. Japan does not have oil in the first place.) "we have plenty of ofl stored," they said. "Where?" I asked.
    "In Tokuyama in Yamaguchi Peefecture,"" they replied. I said, "Go to Southern California or Texas and see the oil gushing
    out. We cannot fight with a country which has oil wells." "You do not have to tell me that," he said,"We will defeat America
    while our oil lasts, so don'tworry". "That is what you think," I said, "They have oil and also they are in teiligent.
    What do you do if you run out of oil. You will lose the war, don't you?" "That is why we want to win the war in its early
    stage" they replied. They made a sudden attack on Pearl Harbor, but as
- speaker: Interviewer
  text: America had potential energy Japan lost when the war prolonged. ve What were you doing at the time of Pearl Harbor
    attack?
- speaker: Respondent
  text: ': IT was holding a committee meeting. I said that such a thing happened because of that fool Tojo who did not know
    America. Tojo had never seen America. Japanese Navy officers knew about the world, but Army officers did not know a nytiing.
    It was a mistake that such men became ministers.'
- speaker: Respondent
  text: That evening I was arrested and was taken to the jail in Seattle. Prom there I was taken to Montana and then to Roseberg
    near Mexico, and then to Santa Fe. The session of the First Presbyterian Church in Seattle sent a letter to the Justice
- speaker: Respondent
  text: Department asking them why they arrested me. The reply came from the Justice Department, so they sent me a copy of
    the
- speaker: Respondent
  text: letter. According to the letter I did not do anything wrong, but I was the most active leader of the Japanese community
    in the Northwest. Also I was potentially dangerous, so they wanted to detain-mé-for a while. Because of the better 1 was
    released earlier than other people. I was paroled in 2 years. When I sent to Santa Fe, some people complained that I,
    who was the president of the Japanese Association should not be paroled before others. I told them that when I got out
    I would try hard to get others released. I was released at
- speaker: Interviewer
  text: 'Were you there 2 years? A: Yes, full 24 months. Since around that time the Justice Dept. began to think that Japanese
    did-:not.spy or did anything wrong, so after 2 or 3 moths they started to release Japanese one after a mother. I was lucky.
    After I was freed, I went to Minidoka, Idaho where my family was. What happened to your wife and children?'
- speaker: Respondent
  text: They were at Minidoka, Idaho. One of our sons, George volunteered for the Army and went to Italy. He lost his left
    leg and still wears an artificial leg. He works at Company in Houston, Texas now. He is in a good position, and
- speaker: Respondent
  text: he also receives money from the government. Last year he sent me an plane ticket, so I visited him at Christman time.
- speaker: Interviewer
  text: 'Where did you go from the jail? A: I went to Montana. Half year later I was sent to Roseberg'
- speaker: Respondent
  text: near Mexican boarder.
- speaker: Interviewer
  text: How was the life in the internment camp? |
- speaker: Respondent
  text: It was pretty good, but when we went to Roseberg near Mexican boarder, they did not treat us well there. The food
    was not good, and we were told to go out and grow our food. They did not give us any extra pairs of shoes or pants. We
    had only one pair of shoes and pants. Fortunately, Il had a copy of Geneva treaty on the treatment of war prisoners. As
    1 was elected the governor of the camp, I took the copy of Geneva treaty to the commander and asked him to study it. He
    became angry and told me that he did not have to do so.
- speaker: Respondent
  text: When I came back and held a meeting the people got angry and decided to go on a strike. Then late Mr. Yaezuru Sugimatsu
    who used to be the director of Japanese school in Los Angeles, Mr. Sotaro Kawabe from Alaska and myself were put ina jail
    within the internment camp. Mr. Chusaburo Ito who was a director of the Buddghist church told me to cancel the strike
    because I might be killed if we did such a thing. I told him that l would think it over that night. I was scared that
    night, bused
- speaker: Respondent
  text: prayed all night and decided to go on strike even if I get killed for 1,000 in mates. When the commander reported
    the strike to the State Department, an officer from the State Department and the Spanish consul general came to the camp
    and held a hearing for 2 days. They told us that the camp was treating us according to the Geneva Treaty, and posted copies
    of the treaty on the commander's office and the governor's office. A week later the commander was changed. The new commander
    told me that the former commander was a good man, but he did not know anything about the regulations. He was an old man
    who was stationed in Filippines for along time. The new commander was a lawyer. He was a major in the World War I, but
    he was promoted to colonel and was sent to the internment camp in Roseburg. He told me tthat there won't be any more trouble.
- speaker: Respondent
  text: I was lucky, for at one time I thought I was going to get killed. I wonder why I was elected governor of 1,000 in
    mates.
- speaker: Respondent
