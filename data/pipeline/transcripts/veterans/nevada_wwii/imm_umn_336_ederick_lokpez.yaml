  text: 'UMN Immigrant Stories Collection [''Lokpez, Ederick''] [''United States''] He is an entrepaneur and community advocate.
    He was born in Boston, MA while his father was in graduate school in the United States. Ederick was raised in Venezuela
    and left in his 20''s because in stability there. He moved to Chicago and finally settled in Minnesota in his late 20''s.
    He is the co-founder of Ra Ederick Lokpez Transcript Greetings. My name is Ederick Lokpez. I''ve been in Minnesota since
    2003. I arrived form Venezuela. I Ieft Venezuela because of political in stability, economic lack of possibilities, and
    because I was concerned for my personal safety. During that period when I was working I was in a party at a friends house
    where- and I will never forget this- there were 17 people there, and there were 12 handguns over the table, which one
    of them was mine. I''m looking around, and I''m like, ok, I''m in my mid twenties, I''m educated, I have bullet proof
    windows in my car, I carry a handgun, is this the future that I want? I don''tknow if I''ll get killed when I leave my
    house, being hijacked or kidnapped is a regular thing, so I don''twant that. Oh, and by the way, I was born in Boston.
    I''m an American citizen. Do I really need to do this? Caracas, where I come from, is a 6. 5-7 million people city, so
    and then I went to Chicago, I lived in the Loop area, very big, very metropolitan. I expanded my job search to Minneapolis,
    and I eventually got a job in a Minneapolis marketing agency. I came for one year. And it''s been quite a ride, it''s
    been a very long year, it''s been almost 13 years, and I woke up one day with a wife, two kids ,and a mortgage, and I
    guess I''m never leaving because my wife is from here. And this is a great place to live. It''s a great community, very
    educated place, very safe, excellent place to raise a family. And actually I love it, it is my adopted land. I''ve been
    here a quarter of my life. This is an in credible place. I''ve always been very fortunate in my life, and I always thought
    about giving back. So through this part of helping the corporations reach minorities, I saw the ailments: disparities
    in education, disparities in health care, not understanding how to navigate the systems. As an immigrant myself, I understand
    how difficult the US systems are. I decided, let''s help the community. So, today I founded a company called Raices Media,
    which means Roots Media, and we have three different business areas. One business area is publications. We have two magazines
    called Hispanic Tiempo Magazine and Vida y Deportes (Life and Sports) and these two magazines provide resources to the
    community. The other part of the business is called Diversity into Action, which is really the cornerstone of our business.
    Diversity into Action is a multicultural outreach organization. We do career fairs and job expos and resource events where
    we help minorities get jobs. We help minorities connect with employers, and we help minorities start their own businesses
    by connecting them with the right associations and giving them the right training and giving them the right tools. The
    third part is still the multicultural outreach for organization scalled Hispanic Connect, where we do marketing programs
    from companies to minority segments. Life has changed a lot from 12 years ago when I came… Turning to the future, is to
    continue to grow my business, continue to help others see their dreams, raise my kids well, get them through school, make
    them good people, and keep on enjoying life, life is great. Thank you for watching the video, and if you''re a foreigner
    like me and you have a story to tell, share it. It''s part of our legacy all of our education to know where we come from.
    Thank you. Ederick Lokpez, Translation Saludos, mi nombre es Ederick Lokpez, he estado en Minnesota desde el 2003, yo
    vine de Venezuela. Deje Venezuela debido a la in stabilidad política, la falta de oportunidades económicas yporque estaba
    preocupado por mi seguridad. Durante ese periodo, en donde estaba trabajando, fui a una fiesta a casa de un amigo, ynunca
    olvidare esto, había 17 personas en la fiesta, y había 12 a rmas de fuego so bre una mesa, y una de ellas era la mía…
    Mientras miro a mi a lrededor, y me digo, muy bien, estoy en la mitad de mis veintes, estoy educado, tengo ventanas blindadas
    en mi auto ycargo con un arma ¿Es este el futuro que quiero? Yo no se si me van a matar al salir de mi casa, robar osecuestrar.
    El secuestro es algo común y yo no quiero eso, ah y por cierto, yo naci en Boston, soy un ciudadano americano, de verdad
    necesito hacer esto? Caracas de donde vengo, es una ciudad de 6.5 millones de personas, de ahí fui a Chicago, viví en
    el Loop Area, muy grande ymetropolita. Expandí mi búsqueda de trabajo hacia Minneapolis, yeventualmente conseguí un trabajo
    en una a gencia de marketing and Minneapolis, vine por un año. Ha sido un largo viaje, ha sido un año muy largo, han pasado
    casi trece años. Un dia desperté con una esposa, dos niños y una hipoteca !ycreo que nunca me voy a ir porque mi esposa
    es de aquí! Este es un gran lugar para vivir. Es una gran comunidad, es un lugar muy educado, muy seguro, lugar excelente
    para formar una familia, de hecho, me encanta, es mi tierra a doptiva , he estado aquí un cuarto de mi vida, es un lugar
    increíble. Yo he sido muy a fortunado en mi vida ysiempre he pensado en dar. Asi que mientras a yudaba a la compañía a
    llegar alas minorías, vi las dolencias. Disparidades en educación, disparidades en salud, el hecho de no entender como
    navegar el sistema, como in migrante, yo se lo difícil que son los sistemas delos Estados Unidos. Decidi a yudar a la
    comunidad. Asi que, funde una compañía llamada Raices Media, en donde tenemos tres diferentes negocios. Uno de ellos es
    el área de publicaciones, en donde tenemos dos revistas, una llamada Tiempo Magazine y Vida y Deportes estas dos revistas
    proporcionan recursos a la comunidad. La otra parte del negocio se llama Diversidad en Accion, que es en realidad la base
    de nuestro negocio, el resto es la organización para el a lcance multicultural. Hacemos ferias de empleo, exposiciones
    laborales, ycreamos eventos donde a yudamos alas minorías a encontrar empleos, a yudamos alas minorías a conectar con
    empleadores, a yudamos alas minorías a comenzar sus propios negocios, conectándolos con las a so ciaciones correctas,
    dándoles el entrenamiento y las herramientas a decuadas. El propósito es todavía el a lcance multicultural de las minorías
    para una organización llamada Conecte Hispano, en donde hacemos programas de marketing de compañías para segmentos minoritarios.
    La vida a cambiado mucho desde hace 12 años cuando llegue… Mirando hacia el futuro, quiero seguir creciendo mi negocio,
    continuar viendo a otros realizar sus sueños, formar amis hijos, que terminen su escuela, hacerlos personas de bien, yseguir
    disfrutando de la vida, la vida es grandiosa. Gracias por ver el video. Y si usted es un extranjero como yo ytiene una
    historia que compartir, compartirla. Es parte de nuestro legado y es parte del proceso educativo para toda la gente saber
    de dónde venimos. Gracias.'
