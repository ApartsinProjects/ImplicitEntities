turns:
- speaker: Respondent
  text: I barely passed with a seventy-six! Next came the physical. I knew my right eye was 20/20, but my left eye was 20/30.
    My friend Vic Hall copied the charts for me, and I asked the sergeant if I could take my exam the next day. I stayed up
    all night memorizing the 20/20 line - forwards and backwards, four different sequences - and I passed it. Once I got to
    ground school, I began having a hell of a time, and I was falling behind. I didn't want to get washed out; I wanted to
    get washed back. I had a little athlete's foot from wearing a pair previously-worn GI shoes that had been issued to me,
    so I stood on that one foot all night long trying to aggravate the infection. They put me in the hospital, and that's
    just exactly what I wanted. When my class moved out, I joined the next class and was a head instead of behind.
- speaker: Respondent
  text: At the conclusion of Pre-Flight, I was assigned to bombardier training, but I wanted to be a pilot. We had been warned
    not to ask the major for any changes in assignment, or we'd risk being washed out, but I said, "I'm going to see the major."
    One of the major's office girls gave me a tip - didn't know me from a sack of peanuts - "When you talk to the major, tell
    him that you make model airplanes, because he's a model airplane nut." Well, I had a nephew who made models out of balsa
    wood, and I knew airplanes, all the models. When I saw the major, I said, "I hate to tell you this, Major, but I think
    you might have made a mistake in my classification." I said, "I have over a thousand hours of stick time," which wasn't
    true - I'd only been up in the air once. "I'd like to be a pilot. I've made model airplanes all my life. I have them hanging
    all over my bedroom at home." And I start mentioning the models. I even had the scales, you know, twenty-to-one, thirty-to-one.
    He became engrossed, and he grabbed my folder, crossed out "bombardier" and stamped "pilot" on it. He said, "And don't
    you let me down!" What the hell - you've got to be a con artist sometimes if you're going to get ahead. Right? I conned
    myself right into helping win World War II.
- speaker: Respondent
  text: Now we hit primary training. They had a curfew, but I studied under a blanket with a flashlight while the other guys
    were sleeping, every night. These other guys could already fly - before the war started they had been enrolled in the
    Civilian Pilot Training program, and now they were all soloing in two or three hours. (If you didn't solo in ten hours,
    you were washed out.) I was the only guy who hadn't flown an airplane. I was assigned to a civilian instructor pilot by
    the name of Layman, who was a tough instructor. We're flying Steerman biplanes with two cockpits; he's in the front. We
    wore World War I helmets where they talk to you through a tube; but if you made a mistake, he didn't speak through the
    tube - he'd reach over from the front cockpit, pull your helmet off your ears and yell, "God damn you! I said five hundred
    feet, not five hundred and twenty!" Or he'd just bang the stick between your knees.
- speaker: Respondent
  text: One day Layman said, "I don't know what keeps you going, but you seem to be improving." I didn't know I was improving
    until then. When anybody else soloed, he'd go in the ready room, have a cup of coffee. When I soloed, he's sitting on
    a parachute next to the airstrip, wondering if I'm going to make it. [laughter] Afterwards he said, "When you get to basic
    training, a lot of these guys will wash out. You're going to be a better pilot, because you worked harder." I'll be damned
    if he wasn't right. About a third of them washed out at basic.
- speaker: Respondent
  text: Advanced training was in Stockton, California, where we received our wings and were commissioned as second lieutenants.
    From there, I was stationed at Mather Field in Sacramento, and I came home quite often. Now we were studying B-25s. The
    training got easier. There was less pressure to hide in the middle of the night studying, and more flying time. We were
    studying the hydraulic systems, electrical systems, fuel systems, and so forth, and I knew I was equal with these guys.
    I trained on A-20s in Oklahoma City, and then they sent me back to Greenville, South Carolina, to fly B-25s. From there
    we flew in a C-47 all the way to New Guinea. The training was over, and we knew we were headed for combat.
- speaker: Respondent
  text: In New Guinea we were in Nadzab, which was thirty miles inland from Lae. We had no fresh food; we had only canned
    food, biscuits, and coffee. A major explained, "There's an Australian down at Lae who unloads our Liberty ships, but he
    steals all the good stuff. Nothing we can do about it." I told my navigator, "Let's go down and meet the guy." His name
    was Mitchell. Instead of fighting the guy, I joined him by saying, "Anything we can do for you?"
- speaker: Respondent
  text: '"Can you get me some trench knives?" he asked. We were issued trench knives, but everybody threw them away. They
    weren''t even sharp. He invited us in, and we had lunch - our beer, our food, our cheese! He lived like a king in this
    compound with all our food, but I never said a word. After lunch he said, "I can get a barge load of fruit from Salamaua
    for one panel of parachute silk."'
- speaker: Respondent
  text: When we got back, I said to the quartermaster, "I've got a quart of Australian beer if you have any parachute silk."
    "How good does it have to be?" he asked. "We just surveyed two tons of parachutes." (Surveying means get rid of it.) Well,
    he had enough parachute silk there to buy out all of New Guinea! We only gave Mitchell two panels of silk and some trench
    knives, and he said in return, "What can I do for you?" I wanted one of those little 9mm Australian Stanley Owens submachine
    guns, because they had issued us .45 automatics that we couldn't hit a barn with. He said, "You got it." (At Nadzab we
    made wooden boxes in which we shipped home restricted items such as this.)
- speaker: Respondent
  text: One day a bunch of us went down to Australia to ferry back B-25s. There were none available, but they did have an
    A-20, which I took. My engineer said, "Let's try to fly this thing four hundred miles an hour." It had never been done
    before. You're supposed to have oxygen from ten thousand feet, but I went up to ceiling, 16,500 feet, and I ducked the
    nose, and we're heading for the ocean. He's reading the airspeed, "Three hundred. It's 325. That's the ocean coming up
    - 390, 393." Talk about should have been killed! "Four hundred!" he yelled. I just put my feet on the rudder pedals and
    pulled as hard as I could on the wheel and just barely missed the ocean. But when I did that, I ruptured the hydraulic
    system, and the bomb bay came open.
- speaker: Respondent
  text: We arrive over headquarters at Nadzab, and I'm the big shot, because the other B-25 pilots had had to return from
    Australia in a cargo plane. So I buzz my outfit three or four times, twenty feet off the ground. I look down and see my
    buddies all jumping for slit trenches. "What in the hell's the matter with those guys?" I forgot all about the bomb bay
    doors being open.
- speaker: Respondent
  text: When I landed the airplane, here's a MP with a striped jeep waiting. I said, "Get your fanny off this taxi strip so
    I can check this airplane in; then you can take me anywhere you want." Which he did. The day before the Japs had strafed
    and bombed our outfit with a captured A-20 like the one I was flying.
- speaker: Respondent
  text: 'The colonel was too busy to give me hell, so the major chewed me out: "You''re grounded for two weeks, and we''re
    taking your flying pay away." Two days later everybody gets assigned to the fat-cat, medium altitude outfit, and I''m
    grounded. When the two weeks were up, he assigned me to the 17th Squadron. No one wanted to be assigned to the 17th. They
    called it the "suicide squadron," because they were strafing and bombing at low altitude. But after this incident that''s
    where I ended up, and the rest of my crew were pissed off at me, the copilot especially, because he hadn''t been on the
    Australian A-20 adventure. Well, it turned out to be the best thing that ever happened, because most of the other guys
    in the medium altitude outfits later got shot down.'
- speaker: Respondent
  text: So we headed out for the 17th Squadron, 71st Group, in a brand new B-25, D-model. That's when we started flying combat
    missions. Sixty-seven of them. In addition to Mindoro, I flew over Luzon and Formosa and many other places. The primary
    targets were alcohol plants, munitions plants, and air fields. A mission was supposed to be nine airplanes - three flights
    of three. But most times we were more dispersed, because the fewer you have, the better off you are, especially if you
    fly wing-tip to wing-tip at low altitude, as close to the target as possible. We were supposed to have fighters for cover;
    but when we would get a good, hot mission, and the fighter pilots knew they were going to be attacked, and we were to
    meet them in a certain place over the ocean, half the time they didn't find us.
- speaker: Respondent
  text: '"Direct theater orders" meant directly from MacArthur to the 17th Squadron. Normally they go through command, which
    is wing to group to squadron. One day a direct theater order came, which meant get in the airplane in five minutes, then
    it''s loaded and we take off. They gave us a grid map. We were on Mindoro, and the Japanese were moving from Clark Field
    north on Luzon. They wanted us to wipe out all rolling stock, which meant trains, trucks, wagons, cars - everything in
    a grid; targets of opportunity. On the bottom of the order it said, "DO NOT STRAFE THE VILLAGES, (signed) General Douglas
    A. MacArthur."'
- speaker: Respondent
  text: We formed up over Bataan with four airplanes, and we were to rendezvous there at a designated time after we were through.
    When the attack starts I'm going pretty good. This mission was one of two which, combined, earned me the Distinguished
    Flying Cross. I knocked out a lot of trains and trucks, and in my last run I cleaned out the area and all the roads and
    highways. But the Japanese are not stupid; they're not moving too much in the daytime. They would camouflage and sit there
    in the villages with guns, and when I fly over this one village, I get the hell shot out of my plane. I lost the right
    engine and the plexiglas canopy was shot out.
- speaker: Respondent
  text: My radio gunner, Harry Hall, called up, "Gas all over the place!" I said, "Harry, you're not smoking, are you?" [laughter]
    He said, "I was." Gunfire had ripped off the end of the bomb bay tank, and fuel spurted out on him and put his cigarette
    out. (If the gasoline had gushed out a few feet from him, not extinguishing his cigarette, the fumes would have ignited
    and blown us up.) Harry was knocked off his stool, but nobody in the plane was hit. We headed for Bataan, didn't see anybody
    there to rendezvous with, and turned for home.
- speaker: Respondent
  text: They called them bullet-proof tanks. Bullet proof, my foot! They were all leaking, and I was running out of gas. After
    we landed, I had the crew chief drain the tanks to find out how much gas was left. We had six gallons, enough to taxi
    from here to the parking lot. Talk about luck, and thank the good Lord!
- speaker: Respondent
  text: The three planes that hadn't shown up at the rendezvous point had been shot down. You don't pay any attention to that,
    because the next time you're going to get shot down. So what the hell - it's just something I can't explain unless you've
    been in combat. You don't sit there and say, "Oh God, Ken was a hell of a guy. We're going to miss old Ken." Well, so,
    he got shot down ....
- speaker: Respondent
  text: When I got back to my tent after de-briefing my copilot grabbed me by the shirt and his eyes were bugging out. "God
    damn you," he said. "You keep bringing us back! When are we going to get shot down?" I said, "Get your hands off of me.
    Christ, I might accommodate you next time we fly." We were supposed to report people like him to the flight surgeon, but
    I didn't, and I'm glad I didn't. My copilot was very capable, but he brooded a lot. He'd sit on a cot in his tent after
    a mission, thinking. That's the worst thing you can do.
- speaker: Respondent
  text: After we got shot up, my crew chief came and said, "Why don't you come back to the flight line and look at that airplane?"
    I said, "I had enough of that airplane. Junk it." But he insisted I go back and sit in the cockpit. We had picked up maybe
    a hundred-and-some-odd holes. We took out the parachute that the pilot sits on, and discovered that the one-and-a-half
    inch armor plate under it had been bent like a horseshoe by a 20mm round that had hit right under my butt. My crew chief
    also found a spent .25 caliber, metal-piercing bullet in the aluminum frame, right above my head where the plexiglas was
    shot out. If it hadn't been a spent bullet, it would have knocked my head off. My crew chief dug it out and put it on
    a chain, and I've worn it around my neck ever since. Once in a while I won't wear it for a few weeks, but when things
    are tough, I take a look at it and think, "Things aren't too tough."
- speaker: Respondent
  text: After that mission I told my group commander, "You tell MacArthur that I'm not sending any more airplanes on these
    missions unless we can drop leaflets and then strafe the villages, because it's absolute suicide. And if he insists, you
    can tell MacArthur to go to hell." "Captain, would you like to tell him to go to hell?" [laughter] Two days later General
    MacArthur ordered us to drop the leaflets, which warned the Filipinos to evacuate their villages because we were going
    to strafe them.
- speaker: Respondent
  text: On Mindoro, a brand new crew came. I had never met any of them, and we're supposed to go on a long sea-sweep mission.
    We have nine airplanes. I'm leading a flight, not the squadron, and I call the navigator over. "I want you to do your
    own navigating," I say, "because if we get separated, I want you to know where in the hell we are, right?" (Navigators
    had the habit of letting the lead ship navigator do all the navigating.) So we make the sea sweep; but the weather's kind
    of lousy and it gets dark and we get socked in, and now we're all alone. I turn around and say, "Give me a heading. Where
    are we going to break out from the Philippines?" And without hesitation, he says, "Manila Bay."
- speaker: Respondent
  text: 'Well, for Christ''s sake! The Japs have Manila Bay. They have Corregidor, they have Cavite, they have Manila, and
    that''s suicide! As a pilot, you get this sixth sense of where you are. I''m on instruments, and I call him over: "Give
    me your maps." When the navigator gets lost, don''t let him wander around; he''ll get you all screwed up. I gave the controls
    to the copilot while I looked at the maps, and when I looked back at the instruments, he''s got us in a spin and doesn''t
    even know it. So I take us out of the spin, and now I have to fly the airplane and find out where we are if I can, at
    night, on instruments. We had a radio altimeter that would indicate if you were over land or water, and those things almost
    never worked. This one happened to work. Talk about the good Lord being on your side!'
- speaker: Respondent
  text: I told my radio man to turn on his liaison set and see if he could get a fix on us from Mindoro. When I didn't hear
