turns:
- speaker: Respondent
  text: CURRIS:Good morning. It is May 4th. I'm in the Tri-Cities of Harlan County Kentucky. I am here to speak with Miss
    Ruthie Wilson. And before we get started,
- speaker: Respondent
  text: I just would like to say that--Ruthie, thank you for agreeing to be interviewed. WILSON:You're welcome.
- speaker: Respondent
  text: CURRIS:We grew up in a time in Harlan County--you were from Lynch. I was from Benham. But we grew up at time--in a
    very different type of community. And I had
- speaker: Respondent
  text: asked you to a gree to be interviewed because I am trying to record the history of coal miners and their families,
    and I am particularly interested in recording
- speaker: Respondent
  text: women because we were the backbone for so many things that happened in our communities. And as you and I have talked,
    if we don'ttell our stories now,
- speaker: Respondent
  text: they will be forgotten. I want to begin with--I'll begin with questions about you and your family. And again, for
    the concept of this interview, we'll just
- speaker: Respondent
  text: make a flowing conversation as if we were in your living room, just sitting there talking. One thing I want to be
    certain and do is to notice
- speaker: Respondent
  text: that--(laughs)--this interview is being assisted significantly by the University of Kentucky Louie B. Nunn Center
    for Oral History. They have generously loaned
- speaker: Respondent
  text: the recording equipment today, and it will be where your interview will be stored. And I will have asked you to sign
    a document that this will be a gift to the University of
- speaker: Respondent
  text: Kentucky Nunn Center for Oral History for their unrestricted use. You might be quoted, published, broadcasted through
    all media, and you may include any
- speaker: Respondent
  text: in formation that you want to have. So, that being said, Ruthie, what is your WILSON:Ruthie May Wilson.
- speaker: Interviewer
  text: CURRIS:And you were born? WILSON:I was born in Lynch, Kentucky. The hospital was known at that time--the
- speaker: Interviewer
  text: Notre Dame Hospital. Now it's called Meridzo Center or--either Solomon's Porch. CURRIS:What year were you born?
- speaker: Respondent
  text: WILSON:In Lyn--I was born in 1949. CURRIS:The, do you--who WILSON:My parents was Katie Quarles. My father--we were
    raised by--my mom was
- speaker: Respondent
  text: 'with us, but we were raised by our grandparents more or less. My mom stayed with us. Robert Lee Quarles, Gertrude
    Quarles, Gertrude Quarles. [Editor''s note:'
- speaker: Interviewer
  text: Robert Lee and Gertrude Quarles were Ruth Wilson's grandparents] CURRIS:Did--was your father a coal miner?
- speaker: Respondent
  text: WILSON:My father, as we called him "Daddy," he was a retired coal miner. And we lived--we resided in a camp called
    Number Three.
- speaker: Interviewer
  text: CURRIS:And this was in Lynch? WILSON:Lynch, Kentucky. CURRIS:For the purposes of this interview, what we have is a
    situation where we
- speaker: Respondent
  text: 'are interviewing a woman from Lynch. There were three towns: Cumberland, Benham, CURRIS:Cumberland was the trade
    area.'
- speaker: Respondent
  text: CURRIS:Benham was the International Harvester Mine, and Lynch was the U.S. Steel Mine. CURRIS:Both U.S. Steel and--and
    International Harvester were, in fact, having
- speaker: Respondent
  text: coal--what we called in those days coal camps. And there were, I would think, great similarities between the two towns
    because they literally ran into each
- speaker: Respondent
  text: other. Was that your impression at the time? WILSON:That was my impression. CURRIS:Okay. Now, Ruthie, do you prefer
    to be African American or Black? What's
- speaker: Interviewer
  text: your preference for this interview? CURRIS:So that--one of the differences in terms of Lynch and Benham was that we
- speaker: Interviewer
  text: each had our own school systems. Is that your memory? WILSON:That's my memory. CURRIS:What was it like in Lynch? What
    did you have in Lynch?
- speaker: Interviewer
  text: WILSON:With our school system? WILSON:Okay, I went to--it was called West Main. But back, I guess, in my mom's
- speaker: Respondent
  text: and them's days it was called Lynch Colored School. But as I went there it was West Main. And it was--consisted of
    from the first to the twelfth grade. And I'm
- speaker: Respondent
  text: thinking it might have been '64, '65, whenever they integrated. And I attended West Main from the first to the ninth.
    But as we had to move--because when you
- speaker: Respondent
  text: retire from the mines, you know--they were company houses, and we had to relocate to Cumberland. So, my mom let my
    sis--sister Cheryl (??) stay at Lynch.
- speaker: Respondent
  text: She used the residence of my aunt, and she was even the first Black queen. And my brother played football. So, they
    stayed with my Aunt Ruth and Uncle Snow
- speaker: Respondent
  text: so that they could still finish their schooling at Lynch. But the other three of us had to go to Cumberland.
- speaker: Respondent
  text: CURRIS:Well, this is a fascinating story. So, when a--when you have this division between the two schools--and we're
    talking about the fact that your
- speaker: Interviewer
  text: sister and your brother are staying in Lynch at a time of in tegration-- CURRIS:--so, what did they call the Lynch
    school at that time?
- speaker: Respondent
  text: WILSON:The--you're talking about the Black school or the-- WILSON:--they still considered us as--it was still West
    Main. But then,
- speaker: Respondent
  text: Lynch--it was Lynch Independent. CURRIS:Lynch Independent. So, your sister was the queen, football queen.
- speaker: Respondent
  text: WILSON:She was first Black queen. CURRIS:In the integrated school-- WILSON:--in an integrated school--
- speaker: Interviewer
  text: CURRIS:--in the early years of in tegration. CURRIS:Do you find that amazing? WILSON:I find it amazing.
- speaker: Interviewer
  text: were your thoughts at the time? WILSON:Oh, at the time, we were so overjoyed and so happy and, you know--but at
- speaker: Respondent
  text: one particular time, I think they did not even want to have a parade. But different ones in the community, ones and--you
    know, the guys, different ones
- speaker: Respondent
  text: said, "If they don'thave the parade, we're not going to play." So, they did have the parade and, you know--and that
    same particular year, I think it was
- speaker: Respondent
  text: like UMWA [United Mine Workers of America] chose her as a candidate or queen for, you know--for the UMWA, you know.
    Other than that, I--I don't--I don't
- speaker: Respondent
  text: recall too much prejudice or, you know, if it was, we wasn'taware because, like I say, we went to different schools.
- speaker: Interviewer
  text: CURRIS:Well, that's a fascinating story. What did your brother go a head and do after sch--high school?
- speaker: Respondent
  text: WILSON:He enlisted in--it was--it wasn't the Navy. It was--he was--went to the Army. He went to the Army.
- speaker: Respondent
  text: WILSON:--then after that and everything, we went into the coal mines-- WILSON:He went into the coal mines at Lynch
    and--as well as my husband. They
- speaker: Respondent
  text: went to Lynch in--I think--they were called thirty--let's see thirty-one is the portal--thirty-five at--in Gap Branch,
    at Gap Branch.
- speaker: Respondent
  text: CURRIS:Because they named different areas of the mine different numbers. Is WILSON:Different numbers, right.
- speaker: Respondent
  text: CURRIS:And so, they were at Portal Thirty-five. WILSON:They was at thirt--yeah, they just called it thirty-five mines.
- speaker: Respondent
  text: CURRIS:So, it's thirty-five. CURRIS:You know, when we're talking about growing up in a coal camp and talking
- speaker: Interviewer
  text: about not--if, if there was problems, you CURRIS:Tell us about your childhood growing up. What was it like? Where
    did you
- speaker: Interviewer
  text: live? Who did you play with? WILSON:Okay. I lived in--like I say, it was called Camp Number Three, number
- speaker: Respondent
  text: three. I still remember our address 457 Kearn Street, K-E-A-R-N is Kearn Street. And everybody was like--it was so
    close, you know. As a matter of fact, we never
- speaker: Respondent
  text: left from over our camp unless it was to go to school, go to church, or maybe one a month some--they would take us
    to Cumberland, get shoes or something to
- speaker: Respondent
  text: that effect. But as living over there, we was just--it was like freedom, but we wasn't out at night. You know, everybody
    knew the sound of the parents' voice.
- speaker: Respondent
  text: And when it was time to come in, all they had to do was just whisper--whistle or say your name and you all--you know,
    but we played together in that community
- speaker: Respondent
  text: even with the whites--white children. We were all just like close-knit, you know. CURRIS:You know, my memory is that
    during the day, in your neighborhood,
- speaker: Respondent
  text: whether it was a street or two or three streets, whatever it was, everybody played together, and you ate at whoever's
    house you happened to have been at at
- speaker: Interviewer
  text: WILSON:Right, right. CURRIS:But when you came nighttime-- WILSON:--you was home-- CURRIS:--you were home. Is that
    your memory?
- speaker: Interviewer
  text: WILSON:That's my memory. That's my memory. CURRIS:What were Sundays like? WILSON:Our Sundays was like you know--well,
    first of all, we'll get back to
- speaker: Respondent
  text: like--we didn'thave the--like the bathrooms. We had what you called the outhouses. And they were kept clean. I know
    my grandmother--she was--she--she
- speaker: Respondent
  text: really was, I, I'll say, a fanatic on cleanliness. And some of the traits--I guess me, and my sisters took up that
    trait
- speaker: Respondent
  text: --I think it's called the linoleum rugs--she was so--she would do the lye soap to disinfect the bathrooms. And the
    leftover linoleum--she would even put it on
- speaker: Respondent
  text: the floors in our out toilets. Okay, as we got older, my grandfather--because the toilets--the outdoor toilets connected.
    The neighbors' side was there, and
- speaker: Respondent
  text: ours was like there. And my grandfather said--he had the leftover plywood, different things. He made us a little stall
    where we would have to use it
- speaker: Respondent
  text: because he didn'twant us outside. He said that's how boys and girls like, you know. So, we would have to take the
    waste and then take it during the day. But
- speaker: Respondent
  text: he did that and made the stall. We had the--a sink. You know, no commodes, nothing like that. But we had what you
    called the number two tubs.
- speaker: Interviewer
  text: CURRIS:What were the number two tubs? WILSON:That was what you bathed in. It was--they were sort of like--we washed
- speaker: Respondent
  text: up, took care of the hygienes every day. But Saturday, we had to get the, you know--and the, they had another
- speaker: Respondent
  text: little bucket called the foot tub, and that's how we were rinsed off, you know. CURRIS:I remember the big--not cast
    iron--metal--
- speaker: Respondent
  text: WILSON:--it was silver. They were like the big silver tubs. Yeah, that's right-- WILSON:You're right.
- speaker: Interviewer
  text: CURRIS:And that--that's what you bathed in. WILSON:By the warm morning heater. CURRIS:The--what were your Sundays
    like?
- speaker: Respondent
  text: WILSON:Our Sundays--like I said, we had to attend, you know, Sunday School, church. And even in the evenings, we would
    stay busy because they would have
- speaker: Respondent
  text: WILSON:--that's Baptist Training Unions, you know. And even as we got older, if we did not go to church, Sunday school,
    you know, we couldn't go--we had a
- speaker: Respondent
  text: little place called the pool room. And that's where kids would gather and, you know, dance and, you know, eat and
    socialize. But if we did not attend,
- speaker: Respondent
  text: we could not go. You know, we couldn'teven fake sickness and then think we could go, you know-- CURRIS:--in Benham,
    they had the youth center that I think is the equivalent of
- speaker: Interviewer
  text: CURRIS:And that's where the kids went. And the parents were the ones who served as the chaperones. Was that the same
    way?
- speaker: Respondent
  text: CURRIS:The parents were not going to permit any kind of foolishness-- CURRIS:--is my memory for sure.
- speaker: Respondent
  text: WILSON:My memories--and even if they didn'tchaperone, the people that ran it during my time--it was called--Miss Gussie
    and her husband. And Miss Gussie was
- speaker: Respondent
  text: your parent away from home. Miss Gussie will tell on you if you go out that door or you didn'tcome back because I've
    been told on many times. (both laugh)
- speaker: Interviewer
  text: CURRIS:Well, Ruthie, what were you doing? (laughs) WILSON:I was like--my husband that's deceased now--you know, my
    brother drove
- speaker: Respondent
  text: us to the pool room, and it closed at twelve. CURRIS:Where was it located? WILSON:It was located in Lynch right--not
    too far behind the, you know--the
- speaker: Respondent
  text: West Main School. But it's toward down--as a matter of fact, it was a barbershop at the bottom. And the guys and stuff
    played pool and did pool or whatever.
- speaker: Respondent
  text: That's why they called it the pool, uh, the pool room. But we was not allowed down in the basement part where the
    men gathered, you know.
- speaker: Respondent
  text: WILSON:And Miss Gussie--she had--you know, she sold hot dogs, the little orangeades, and the chips and, you know,
    we couldn't get it every day. Some
- speaker: Respondent
  text: could, but we couldn't on our in come my mom, as a parent's, in come. But we could go maybe on the first of the month,
    and it was a treat because we could get it,
- speaker: Respondent
  text: CURRIS:You know, talking about Miss Gussie would tell on you--at the Benham youth center, we had Miss Robinette. And
    if we
- speaker: Respondent
  text: called over to the police station, which of course was just across the street in downtown Benham. Let me tell you,
    they were there, and nobody was getting out of
- speaker: Respondent
  text: line for very long. And if you did, you were not permitted to come back. CURRIS:A very different world--
- speaker: Respondent
  text: CURRIS:--from what we see today. I would imagine you never thought about talking back to your parents.
- speaker: Interviewer
  text: CURRIS:What would they have done? CURRIS:--all but killed you-- WILSON:--all but killed you. And guess what? We still
    a live. But now, if you
- speaker: Respondent
  text: touch a child, it's child abuse. But I--I guess I'm from--I'm from the old school. And even when they stopped the
    discipline in school--when
- speaker: Respondent
  text: they stopped the discipline in school-- WILSON:--I didn't let that stop me. I would go to the school--I always taught
- speaker: Respondent
  text: my children, "If you have the problem with the teacher, whatever, any adult, bring it to me, and I'll take care of
    it." And a lot of parents it's like--want
- speaker: Respondent
  text: to jump the teachers, do this. But me as a parent--everybody know their child and what they might do and what they
    might not. But I disciplined mine. I have
- speaker: Respondent
  text: gone in the school, got my grandson--I raised five of my grandchildren. And he didn'thave a belt on this particular
    time. I think he was either in
- speaker: Respondent
  text: kindergarten or first grade. And he got in trouble, him and another little boy, on the bus. But he said that little
    boy threw a spitball or hit him with a
- speaker: Respondent
  text: spitball, and he threw it back. And I said, "First all, it's nasty." So, I took him in the bathroom. I asked one of
    the teachers, "Please." They said, "You can't do
- speaker: Interviewer
  text: that." I said, "That's mine," and I took him in. Had the belt, wore him out. CURRIS:He didn't do that again?
- speaker: Respondent
  text: WILSON:Huh? No, no, no. I've had him again in his school. But I would go, and I'd hit him in the principal's office,
    slap him or chastise him right there. As
- speaker: Interviewer
  text: one time Mr. Dick--do you remember Mr. Dick? CURRIS:Oh, absolutely. WILSON:And there he said, "All I can do--you don'tchill
    out or sit down I'm
- speaker: Respondent
  text: going to call 848-5585 or 848-5555." Those were my telephone numbers. So, I go over. And he--you know, he said, "Mama,
    you embarrassed me." That's my
- speaker: Respondent
  text: grandchild, but he called me "Mama." And I said, "What do you mean?" He said, "You come over there right in front
    of all the kids and you"--I said, "Don't you
- speaker: Interviewer
  text: think I was embarrassed for them to call me?" I said, "So, check it up." wonderful, wonderful woman and mother.
- speaker: Respondent
  text: WILSON:I--you know, I didn't say they didn't go a stray. Some of them did. But they say, "Train a child in the way
    they should go. When they get old, they
- speaker: Respondent
  text: won'tdepart." That don'tmean they don'tmake mistakes. But with your training and then with God's word, they know the
    way back.
- speaker: Respondent
  text: CURRIS:You know, this brings up the whole issue of where you went to school then for your--when you moved to Cumberland.
    So, you then moved to Cumberland
- speaker: Interviewer
  text: for high school. Is that correct? WILSON:I went from the tenth grade to the twelfth at Cumberland High School.
- speaker: Interviewer
  text: CURRIS:What did you do after high school? WILSON:After high school, I got married probably--maybe a week--a few weeks
- speaker: Interviewer
  text: after. I got married June 17, 1967. CURRIS:And your husband? WILSON:My husband [Nathaniel Ray Wilson, Sr.]--he had
    moved away to Marion,
- speaker: Respondent
  text: Indiana. And that's where we got married, at Marion, Indiana. As a matter of fact, the way we ended back home--we
    came to visit. So, he decided he'll put in an
- speaker: Respondent
  text: application at U.S. Steel. WILSON:In Lynch. So, no so oner than we got home--maybe hadn'tbeen back long--and they
    called for him for an in terview. We had just bought some new
- speaker: Respondent
  text: furniture, of course on credit. And we moved in this little house. I had my daughter, and then I had my baby son,
    I think. I called him Little Ray. And we
- speaker: Respondent
  text: came back to do the interview and whatever, and they hired him. So, we go back to Marion, Indiana. Didn'tpack everything,
    not even a whole lot of clothes.
- speaker: Respondent
  text: Called the company that we bought the furniture called Carrico Furniture and told them to come back and get their
    furniture. And we came to Cumberland,
- speaker: Respondent
  text: stayed with my mom until this house became available, the house that I'm telling you about. It was through
- speaker: Respondent
  text: the credit union at one point, and then, it was Pauline and Bob Hern. His name was Robert, but we called him Bob.
- speaker: Respondent
  text: WILSON:And Pauline Hern. They were the purchasers--the home, and we bought it CURRIS:So, this is that same home when
    you first came back. And describe what a
- speaker: Interviewer
  text: coal camp house looked like in those days. This would have been in 1969? WILSON:Maybe '69 or '70. CURRIS:So, describe
    a coal camp house.
- speaker: Respondent
  text: WILSON:Okay, when I moved in-- CURRIS:--and this was in Benham or Lynch-- WILSON:And my lot--the property's still
    mine--is on the end. But we only had
- speaker: Respondent
  text: like the--two bedroom and the kitchen and living room, you know, probably wasn't no size, but you know. But when I
    purchased it, it was not--how's
- speaker: Interviewer
  text: the word for it? It was not raggedy or worn down or you know. We had to do some improvement. And we lived comfortable
    because it's what we had.
- speaker: Respondent
  text: CURRIS:When--I want to make a distinction here between the time of living in your own home that had been a company
    home but that you bought and when you're
- speaker: Respondent
  text: growing up. You may not--you may have been too young to know this. But when you were living in Lynch in the company
    owned house that U.S. Steel had built, just
- speaker: Respondent
  text: like International Harvester had built the homes in Benham, do you know what--whether there was any kind of rent that
    had to be paid, water,
- speaker: Interviewer
  text: electricity? Do you know whether any of that-- WILSON:--not that I know. I think it was all through the company--
- speaker: Interviewer
  text: CURRIS:--so then, when you have your own home-- what did you have to pay for? WILSON:I had to pay for the utilities
    and the water.
- speaker: Respondent
  text: CURRIS:So, that--that was a big difference, I think, in both Benham and Lynch. WILSON:Yes, and Lynch.
- speaker: Respondent
  text: CURRIS:When they sold-- WILSON:--yes, it was a different-- CURRIS:--the--I want to skip back for a moment to--we were
    talking earlier
- speaker: Respondent
  text: about the clothes that we wore growing up-- WILSON:--right, right. CURRIS:Tell me about the clothes that you would
    wear.
- speaker: Respondent
  text: WILSON:The clothes that we would wear--like I said, we would go to the Lynch store, the country store. And it's--they
    were the quality, you know. As I said
- speaker: Respondent
  text: back then, we wore the best, and we learned how to take care what we had. It wasn'tlike we going every week, every
    other week, every month, you know. But
- speaker: Respondent
  text: what we got was quality clothes, and they last, and they last, you know. CURRIS:I can remember the--sitting in the
    Big Store. In Benham, we called the company store the Big Store.
- speaker: Respondent
  text: WILSON:The Big Store--we called the Lynch--the one that I--it was called the CURRIS:And I can remember all the little
    dresses coming in, and they were so
- speaker: Respondent
  text: CURRIS:And the--I can remember talking to people who lived in Lynch about the quality of food that was brought in,
    to the meat market in Lynch. And as it
- speaker: Respondent
  text: turned out, it was the same in Benham-- CURRIS:--that they stocked with really fine food. CURRIS:And the same was
    true with the clothing and the apparel.
- speaker: Respondent
  text: WILSON:No preservatives. CURRIS:That--I had not thought about that. WILSON:No preservatives. CURRIS:It was all there.
    Now, when
- speaker: Interviewer
  text: --when your parents were buying--was there a member of your household then that was actually hired by U.S. Steel?
- speaker: Interviewer
  text: WILSON:A member of mine? CURRIS:At the time you were growing up. WILSON:My--oh, yes. My grandfather, like I said,
    he was--
- speaker: Respondent
  text: CURRIS:--okay, so he was an employee-- WILSON:--he was an employee of U.S. Steel. CURRIS:So then, when you bought
    your items from the Lynch store, the company
- speaker: Interviewer
  text: store, how were they paid? WILSON:From what we could--uh, we didn'tever know, as children, how it was
- speaker: Respondent
  text: paid until we grew up and got older. But it was called scrip. And then, a lot--they didn't get--I never seen them
    bring home checks, check stubs,
- speaker: Respondent
  text: whatever. I think it was taken out--their checks from--you know, taken out of their checks--what they call--from the
    scrip. They let--what's what song? I
- speaker: Interviewer
  text: forget--my soul to the company store. You know? CURRIS:So--so, that those items would all be deducted.
- speaker: Respondent
  text: CURRIS:And then, your grandfather would get the remaining a mount. CURRIS:And that would be the, the pay.
- speaker: Respondent
  text: CURRIS:See, it was very--it was the same type of system at-- CURRIS:--International Harvester in Benham.
- speaker: Respondent
  text: CURRIS:But I know I had little feed sack dresses too. But there was such a difference between having a feed sack dress
    and having a storebought.
- speaker: Respondent
  text: WILSON:And having a storebought. CURRIS:And that's what we called it was storebought. CURRIS:And then, my grandmother
    was a very fine seamstress. She really was very
- speaker: Respondent
  text: good. So, in high school, she would make clothes for me. And that was where I learned that if you have two suits that
    match, you can cross everything and
- speaker: Respondent
  text: have--end up with four different outfits. CURRIS:I learned at the knee of my grandmother. CURRIS:And it goes back
    to
- speaker: Respondent
  text: what we were able to do at those times in the mountains for sure. CURRIS:Well, once you came back--and your husband
    then is working at Benham.
- speaker: Interviewer
  text: WILSON:No, my husband worked at Lynch. CURRIS:Oh I'm sorry. At Lynch. Now, when did you start working?
- speaker: Respondent
  text: WILSON:I think it was like February--it was close to like maybe Valentine's of 1976. As a matter of fact--And I don'tknow
    if you remember. It was a store
- speaker: Interviewer
  text: called S-Mart (??)-- CURRIS:--where was that-- WILSON:--in Cumberland. WILSON:In Cumberland right there where--I think
    they called Cash Express or
- speaker: Respondent
  text: where--it was down the hill. It was called Maloney's at one time. Okay. Then it became S-Mart. And I was working at
    S-Mart.
- speaker: Interviewer
  text: CURRIS:What was your job? WILSON:My job is--first I start out like just being a cashier. Then I became a
- speaker: Interviewer
  text: supervisor of housewares and domestic. CURRIS:And so, you would have been about how old at this time?
- speaker: Interviewer
  text: WILSON:Oh, let's see. It was in the early twenties, early twenties. CURRIS:Early twenties? CURRIS:Now, had your mother
    worked outside the home?
- speaker: Respondent
  text: WILSON:No, except my mother is--like I said, go to what we called the "hunky stand" and maybe do some jobs. I don'tknow
    if it's cleaning or whatever.
- speaker: Respondent
  text: CURRIS:And what was the hunky stand? WILSON:It was like a boarding house or, you know-- CURRIS:But did she have any
    options really to work outside the home in her day?
- speaker: Respondent
  text: CURRIS:Would the white women have had any options to work out the home that she WILSON:I'm not sure if I can answer
    that because I, I don'tknow if she--she
- speaker: Respondent
  text: could have probably had an option because I do know some of the Black parents and things that worked, you know, even
    at the--like the hospitals or whatever,
- speaker: Respondent
  text: you know. She was more or less like a stay home mom. CURRIS:My memory is in those--in the forties, and fifties that
    the
- speaker: Respondent
  text: women--unless you were a nurse, a teacher, uh, occasionally a secretary or a cashier, and cleaning--those were your
    only options.
- speaker: Interviewer
  text: CURRIS:Is that your memory? WILSON:That's my memory. CURRIS:When did you think that started to change? Because you
    are now working
- speaker: Respondent
  text: in the twen--in your twenties in Cumberland. CURRIS:So, you had a position and a job that your mother probably could
    not
- speaker: Respondent
  text: WILSON:Could not have had. CURRIS:And that would have been as much a matter of timing for women working--
- speaker: Respondent
  text: CURRIS:--as for any cultural reason. Would you think? CURRIS:Because one of the critical reasons that I wanted to
    in terview you personally is because you, at a young
- speaker: Respondent
  text: age, marked a transition for women and I think also for Black women-- CURRIS:--in terms of what it is that you proceeded
    to do with your life. And
- speaker: Respondent
  text: again, these are the stories that we don'tknow about. CURRIS:So, you started out as a cashier and became a supervisor.
    What happened
- speaker: Interviewer
  text: next in terms of your employment and work life? WILSON:Okay. Even before that, I was called to go into the mines at
    Lynch. But
- speaker: Respondent
  text: my husband had this thing, "No, you're not going underground. You're not working." And they called them back then
    "muckles" or--but that was the work
- speaker: Interviewer
  text: clothes. And he said, "Only muckles going to be in this house going be mine." CURRIS:How do you spell that?
- speaker: Respondent
  text: WILSON:I can'tremember now. But it was--it was the work clothes. WILSON:You know, but it's called muckles or whatever,
    you know.
- speaker: Respondent
  text: 'CURRIS:I think it was M-U-L-K-A. [Editor''s note: Curris noted that after the interview Wilson corrected the spelling
    to "muckles".]'
- speaker: Respondent
  text: But so, the lady--I was at S-Mart working, and I had a phone call. And the manager, Dingus or--either Mack Elder,
    said I had a phone call. And it was from
- speaker: Respondent
  text: WILSON:And she--yes, your mother. She called me. She told me, "We need you to come up for an in terview." And she
    said, "We have interviewed quite a few, but
- speaker: Respondent
  text: we need you to come up." And I said--at this, I said, "Miss Pauline," I said, "My husband's not going to let me go
    underground." She said, "Just come on up.
- speaker: Respondent
  text: It's something different," you know. So, I go up. And she said, "Hold on just a minute," you know, asking questions,
    blah, blah, blah, this and that. And she
- speaker: Respondent
  text: said, "How would you feel like going to the warehouse to work?" I said, "Explain the warehouse." It was called the
    warehouse, but it was the supply house.
- speaker: Respondent
  text: It's where the--all the supplies was kept for what they needed to operate the mine and the machinery and equipment.
    So, I said, "I don'tknow. I have to see
- speaker: Respondent
  text: what Fuzz"--Fuzz Estep, Charles Estep was the manager of the warehouse at the time. When I go in, I say, "Oh my God.
    This is all Greek like to me," you know.
- speaker: Respondent
  text: So, he said, "Just--you'll learn it. You'll learn it," you know. CURRIS:Now, Fuzz--Charles Estep--we're talking about
    working at Benham for
- speaker: Respondent
  text: International Harvester at this time. WILSON:At the--Int--Harvest--before--and then it changed over to Benham Coal.
- speaker: Interviewer
  text: CURRIS:Okay. So, what did you think after you were--talking to Fuzz? WILSON:In--after Fuzz and me talked--and they
    were real pleasant, real nice to
- speaker: Interviewer
  text: me. And then, I think it was like Don -----------(??) the boss, they said they've never had a woman in the warehouse,
    and it was all men that worked
- speaker: Respondent
  text: in the warehouse, past, present, whatever. So, I said, "I'm going to try it. I'm going to try it." But I went in there
    with the determination to learn, to do it.
- speaker: Respondent
  text: I didn'twant them to do the work for me. I wanted to. But they were so kind and so generous because I'm a workaholic.
    I can't be still. And, I would--my shift
- speaker: Respondent
  text: was second shift, and that's the shift that I wanted because my husband worked third. That way, I didn'thave to worry
    about the children or--
- speaker: Interviewer
  text: CURRIS:--what time is second shift-- WILSON:--at that particular time, it was three o'clock. CURRIS:In the morning?
- speaker: Respondent
  text: WILSON:Three o'clock in the evening. CURRIS:Okay. And so, you would work until when? WILSON:Until eleven. As--and
    the one that came in to relieve me--I'm sure you
- speaker: Respondent
  text: might know him--Woodrow France. But we called him "Bud," Bud France. CURRIS:Yes, Bud France. WILSON:And I was determined.
    You know, I learned. And as a matter of fact,
- speaker: Respondent
  text: I would go in sometimes early, and I would hear them saying, "We got a wheel unit down. We got a scoop down. We got
    a miner down." So, in the meantime, you
- speaker: Respondent
  text: know, while they--before they was changing shifts, I would go a head and take my time and look for the proper parts
    or whatever. And when they would come--we had
- speaker: Respondent
  text: a supply, supplu driver, and we called him R.J. Scott. That was his name. He's deceased now. And I would have the
    stuff on the counter. You know, that's what
- speaker: Respondent
  text: you called--they kept a little down time. The quicker you get the supplies, the quicker they can get the equipment
    going. And, you know, now after I would do
- speaker: Respondent
  text: this and I would even sit and, you know, I would even stock and, you know. CURRIS:Well now, while you're in this position
    in the warehouse, the supply
- speaker: Respondent
  text: house, who were you--who worked with you? WILSON:The mornings--like I said, before Charles went down--I think when
    Pauline retired or whatever or whatever
- speaker: Respondent
  text: happened, Fuzz went to human resources. It was a guy named--was his name Ed Cornette or--he was a Cornette. But Fuzz
    took on that position.
- speaker: Respondent
  text: WILSON:Curtis Cornette. That's it. Curtis Cornette. But like I said, I was on salary. I was on salary.
- speaker: Interviewer
  text: CURRIS:Well now, were your coworkers Black and white? WILSON:Uh, the only--I was the only Black in the warehouse,
    the only Black.
- speaker: Interviewer
  text: CURRIS:Did you have any uncomfortable feelings at any time? WILSON:No, no, not--except for one time, and that's after
    Fuzz left. But Tim
- speaker: Respondent
  text: Bowman became my boss. And I think they had what they called staff meeting. And that's when the boss and supervisors
    would go into staff meetings with
- speaker: Respondent
  text: Junior--I'm sure you might know him, Junior Williams, Jerry Williams's brother or Roberta Pratt, but she was Roberta
    Williams--their father. And they would
- speaker: Respondent
  text: have staff meeting or whatever. And they was saying that, you know, "We have so much down--down time on day
- speaker: Respondent
  text: shift," whatever. They said, "Maybe we need to put Ruth on days or whatever." And I, you know--I--I--"Oh, I don'twant
    no days," you know. And so, Tim--that
- speaker: Respondent
  text: was my boss at the time--it seemed like he was trying to treat me different. But I don'tknow if he was thinking they
    was was going to put me, you know, in
- speaker: Respondent
  text: charge or whatever. So, I--I said, "I can'tunderstand what's going on with Tim," because he always relied on me, you
    know, to do this. So, he knew he could
- speaker: Respondent
  text: count on me. But I think that was when the bosses was telling me, "They're thinking about putting you on days." So,
    I think Tim's mind, he thought that
- speaker: Respondent
  text: they was going to give his position or whatever to me. So, I sit down--and I said, "Tim," I said, "I heard about--they
    had a staff meeting and all this."
- speaker: Respondent
  text: I said, "Honey, I do not want that position." He said, "You wouldn'ttake that position if they offered?" I said, "No,
    I've got children. I got children that
- speaker: Respondent
  text: I'm raising." I said, "I like my shift what I'm on because I get in at eleven. My husband would have to leave and
    go to work. And, you know, this is my shift,
- speaker: Respondent
  text: you know." And after I said that Tim and I became best buds, you know. CURRIS:You know, you and I, in conversation,
    talked about what became your nickname--
- speaker: Respondent
  text: CURRIS:--"Brown Sugar." CURRIS:Tell us about the story about how that happened. WILSON:Okay. How that happened--they
    had what you called a mine phone. And, and
- speaker: Respondent
  text: at first, they would plug it up because--and I could hear them say, "Ruth got the mine phone plugged in." You know,
    they didn'twant me to hear any foul
- speaker: Respondent
  text: languages and all that. So, they said, "Hey guys"-- CURRIS:--they were protective-- WILSON:--yep. "Hey guys, Ruth
    got the mine line plugged in." See now,
- speaker: Respondent
  text: I could hear them talking or whatever. Got the mine line--the only reason I started--because they could call me on
    the phone. But they had an accident at
- speaker: Respondent
  text: one time. And his name was Ben Sweet. And they had the accident. And I said--thought, "Oh my God. If I had that phone,
    I could have maybe speeded up
- speaker: Respondent
  text: the time for the rescue or whatever." So, they start plugging the phones. And they would just say, "Hey, how about
    your warehouse? How about you, Ruth?" and
- speaker: Respondent
  text: tell me what they might need or whatever and you know. Then this one particular time, the guy--his name was Stanley
    Jackson. He worked at--we call 4D mine. That
- speaker: Respondent
  text: was right behind the warehouse and going up on a hill. CURRIS:And this was at Benham? WILSON:Benham Coal. And I'm
    thinking, "Now why is he--he's never, you
- speaker: Respondent
  text: know"--always, "How about you, Ruth?" or, you know, "How about you, warehouse?" So, I'm getting real of fended, you
    know. So, I was talking to Don Disney, Ruben
- speaker: Interviewer
  text: Davidson--we called him "Squeeze"--and Dale Ice (??) and them. They said, "What's wrong, Ruth?" And I was just telling
- speaker: Respondent
  text: them, "Well, it's Stanley Jackson." So, they were Stanley's boss because this is all like maintenance crew.
- speaker: Interviewer
  text: CURRIS:And what had he called you? WILSON:He said, "How about you, Brown Sugar?" And I'm thinking why--where is
- speaker: Interviewer
  text: this coming from? And so, I think when they talked to me, whatever--and then, Stanley called the warehouse, and he
    said, "Ruth, I am so sorry you got
- speaker: Respondent
  text: of fended." He said, "But I didn'tmean anything." He said, "It's a Black guy that was kept--bringing Decatur plates,
    roof bolts, pins, whatever. And he
- speaker: Respondent
  text: wanted to know who was the pretty Black Brown Sugar. Who was the pretty Brown Sugar in the warehouse?" You know? So,
    then I--oh my goodness. Then I got all
- speaker: Interviewer
  text: into myself, you know? (both laugh) I got all into myself, you know. CURRIS:So, this was a Black guy from--
- speaker: Respondent
  text: WILSON:--Alabama--was bringing in some supplies-- CURRIS:--so, he was delivering supplies. WILSON:And they would have
    to bring
- speaker: Respondent
  text: the ticket to me to sign that they were delivered. And he just--he wanted--when he come by and I told him where to
    take them and I said, "When you get through,
- speaker: Respondent
  text: bring the ticket back, you know. Stanley and them will let me know everything was dropped off," and I signed off on
    the ticket, you know. But then, that's
- speaker: Respondent
  text: when they called back and said, "How about you, Brown Sugar," and the guy wanted to know, "Who's the pretty Brown
    Sugar in the warehouse," you know. So, when he
- speaker: Respondent
  text: came back, he said, "Hi, ma'am." And I just told him like--I said, "I'm married, you know. I'm married."
- speaker: Interviewer
  text: CURRIS:So, what did you do with the name after that? WILSON:After that--after it became--you know, I just went to
    Carl Hatfield. He
- speaker: Respondent
  text: had a shop where he made plates and whatever. I had a Pinto. I bought the plate, purchased it to have him put on there
    "Brown Sugar." (Curris laughs) So, that
- speaker: Respondent
  text: name was carried along time, long--still some of them still now--like Don Tippett, different ones that's still a live--they
    call me Brown Sugar, you know.
- speaker: Respondent
  text: CURRIS:So, what could have been a very terrible circumstance-- WILSON:--it was not meant that way. So, sometimes we
    take things the wrong way.
- speaker: Respondent
  text: It was a compliment. But I took it as being something negative-- CURRIS:Well, and, not only that. If you were talking
    about a white man versus a
- speaker: Respondent
  text: Black man in those days-- WILSON:--right, right-- CURRIS:--that would have been the expectation. WILSON:Right, right.
- speaker: Respondent
  text: CURRIS:So, I'm so glad that that turned out-- CURRIS:--so really--so really--(laughs)--well. So then, what happened--what
    did
- speaker: Interviewer
  text: you do from the supply house, from the warehouse? What happened next? WILSON:You mean other jobs after they shut down?
    We moved to a place called,
- speaker: Respondent
  text: uh, D7. It's right--it's in Cumberland, but it still was ran by--after Arch's purchase--called D7. CURRIS:So, we're
    talking about after International Harvester has sold to Arch Minerals?
- speaker: Respondent
  text: CURRIS:And at that time is when you're moving to D7 in terms of-- WILSON:--yeah, but it was still owned by Arch. But
    they set up a mine because
- speaker: Respondent
  text: they had opened the mines down there, D7. So, I went there to--it was a trailer--like--to run the warehouse there.
    And even after that Arch--we were so
- speaker: Respondent
  text: happy Arch had bought us. We thought we was going to be on top of everything. But no so oner--not too long after they
    bought it, they closed it. So--
- speaker: Respondent
  text: CURRIS:--so, this is very interesting. You start work in 1976 as a cashier, and they promoted you to supervisor.
- speaker: Respondent
  text: WILSON:At--yes, at S-Mart. CURRIS:At S-Mart. Then you are called to come for an in terview at International Harvester.
- speaker: Respondent
  text: WILSON:Then later become Benham Coal, yes. CURRIS:And became Benham Coal. And you started in the warehouse. But then
    you
- speaker: Interviewer
  text: end up in charge of a warehouse. CURRIS:How did that happen? the--I had this warehouse. Like they said, they had to
    set up a warehouse there
- speaker: Respondent
  text: so the guys wouldn'thave to come all the way to Benham from Cumberland to get the supplies. So, they kept enough supplies
    there. You know, and even if I
- speaker: Respondent
  text: needed something, all they had to do--I'd call up to the warehouse in Benham, and they would have a driver bring the
    parts down, you know. And after that
- speaker: Respondent
  text: job--it wasn'tlong--they just shut it down. And so, I was just saying to them, Tim and them--I said, "You know what?"
    I said, "I'm going to go on home. I'll
- speaker: Respondent
  text: just go a head and"--he said, "No, no. They want you to stay on, you know, a few more months because they know we've
    got to get this stuff from Cumberland, get
- speaker: Respondent
  text: it back to the warehouse in Benham." And they said, "We know that you're going to be--you know, do it well and get
    it done back, you know, to right place." So--
- speaker: Interviewer
  text: CURRIS:--tell me something. Here you are in charge. What was your title? What did they call you? Director, or--
- speaker: Respondent
  text: WILSON:--no, they--they would just call me, you know, main clerk or-- CURRIS:--main clerk-- CURRIS:Now, how many other
    women, be it white or Black, were in that same type
- speaker: Respondent
  text: WILSON:--being warehouse clerk or-- WILSON:None I know--oh, none that I know of at Benham except I was called after
- speaker: Respondent
  text: they shut it down. I was called to work at Arch Minerals in Cumberland, and the mine was 37 Mine. As a matter of fact,
    my boss had went on to 37. He--and I
- speaker: Respondent
  text: don'tremember if you remember Judy Henry--Judy Kaiser Henry--Judy Henry. She was married to David Henry, you know.
    Okay. She worked there in the warehouse.
- speaker: Respondent
  text: She was a woman that worked there. I was a woman, and I think it was another woman, Serino--Jeanette Serino (??).
    They worked in the warehouse. So, I, you
- speaker: Respondent
  text: know, had to learn their routines, learn this. So, they were setting up another mine. You had to go past Clover Lick,
    you know,
- speaker: Respondent
  text: past the 37 Mine. And they were setting up a mine called Highsplint, Highsplint Number Two. So, they had a trailer,
    and everything brought in, and they had
- speaker: Respondent
  text: hired me to do the Highsplint. CURRIS:This is fascinating because at this time, of your girlfriends, how many
- speaker: Respondent
  text: were working outside the home? And what kind of jobs did they have? Because you, you have a job of importance in what
    you're doing and you're in--basically managing.
- speaker: Respondent
  text: CURRIS:So, I--what I'm trying to determine is how many women in the seventies--and we're talking about mid to late
    seventies and early eighties.
- speaker: Respondent
  text: CURRIS:How many women, be they Black or white, had jobs outside the home? WILSON:I know my sister [Cheryl]--she went
    underground. She went underground to
- speaker: Respondent
  text: coal mine. One of my best friends--she went underground--excuse me--for Lynch. And it was so many more. One of--another
    best friend, Drena Thomas, she went
- speaker: Respondent
  text: underground. It was a few Black women and white women that I knew. We had white women that went underground at Benham.
- speaker: Interviewer
  text: CURRIS:Who were they? Do you remember? WILSON:Beverly Webbs [Webb]. She was married to the--she's a Webbs [Webb] now.
- speaker: Respondent
  text: What was her--Beverly, Beverly Cox. Her husband's name was Gene Cox. She was married to Gene. She went underground.
    And Mavis Hernandez--these are names now.
- speaker: Respondent
  text: But some of the others I can'tcall them by--names by now. But we did have a--one Black girl that start working over
    there when I was working.
- speaker: Respondent
  text: Her name was Linda Fielder. But Fielder was her maiden name. And she started working in the--we called the lab. And
    the lab was when there--when Doug
- speaker: Respondent
  text: Trammel, when all them--they were teachers, but they came to work in the lab. And the lab was the part when they would
    sample the coals or whatever. And then,
- speaker: Respondent
  text: they sent it to the prep plant, you know. But it was quite a few that started later on, you know, working.
- speaker: Interviewer
  text: CURRIS:What--what were the thoughts of the women working underground, and did they differ if they worked at Lynch
    as opposed to working at Benham?
- speaker: Interviewer
  text: WILSON:Did they differ? What you mean by that? CURRIS:I mean, their working conditions, their pay. But what--first
    of all, let
- speaker: Interviewer
  text: me just ask, what did the women who became miners underground--what kind of stories did they tell you? What--what
    were their experiences?
- speaker: Respondent
  text: WILSON:You know, a lot of them didn'treally talk because, like I said, when they would go in and stuff--but I do know
    they would
- speaker: Respondent
  text: have to--I don'tthink the pay was--I think the pay was the same. And that was because, you know, it was based on--and
    I--I'm pretty sure of the--how a lot of
- speaker: Respondent
  text: them--even knowing this--when they was--tried to get them go UNWM--whatever--Progressive Mine Worker.
- speaker: Respondent
  text: WILSON:That's what it was called in Benham. And they would--tried to get Progressive Mine Workers to go with UMWA.
    They wouldn't, you know. But they
- speaker: Respondent
  text: would continue that pay like the UMWA was getting to keep their men, you know. CURRIS:Well, were--were the women miners--were
    they paid at the same rate as
- speaker: Respondent
  text: WILSON:As far as I know. As far as I know. I never heard them complain. As a matter of fact, even one of my positions--when
    it came time to pay, they would
- speaker: Respondent
  text: send the checks to the warehouse. And we would pay them. I would pay like the--like the second shift crew or whatever,
    you
- speaker: Respondent
  text: know. But far as I know--like I say, I was never--I was always salary. But I do--I never heard them complain.
- speaker: Respondent
  text: CURRIS:So, the presumption is that women and men were paid the same. WILSON:Paid the same far as--yes.
- speaker: Respondent
  text: CURRIS:And Black and white were paid the same. WILSON:As far as I know. I never heard them, you know--and I knew a
    lot of the
- speaker: Respondent
  text: guys that had been there for--like Archie Williams. He's deceased. These were Black guys. And we called him Baby Ray,
    William Cooke. But they never said they
- speaker: Respondent
  text: 'had any, you know--the first Black foreman there was Wolford Griffey. [Editor''s note: In 1945 Wolford Griffey became
    the first Black foreman in the coal camps.'
- speaker: Respondent
  text: 'Wolford and Jackie: A tale of two African-American Pioneers by S. Ramsey, Kentucky Coal Council; and W. Tompkins]'
- speaker: Interviewer
  text: CURRIS:And this was Benham or Lynch? WILSON:Benham. Benham, you know. But I never heard them say that they were
- speaker: Respondent
  text: CURRIS:So, we're talking about, again, the late seventies, probably up through CURRIS:Is that--be-- WILSON:--that's
    it. That's--yes. But no--as far as the other one that they
- speaker: Respondent
  text: worked there way before I got there--I don'tknow. You know, I can'tspeak on that-- CURRIS:--in the interviews that
    I've had, the presumption has been all along
- speaker: Respondent
  text: that everyone was paid equally. WILSON:That's--as far as I know. CURRIS:And opportunities were equal.
- speaker: Respondent
  text: WILSON:They were equal. CURRIS:Which makes Benham and Lynch very unique in the time of history-- CURRIS:--of what
    was happening, I think, with the rest of the world, rest of
- speaker: Interviewer
  text: America for certain. When--when you were working then for Arch, when they closed, what was the next thing that you
    did?
- speaker: Respondent
  text: WILSON:Oh, after they closed, I took on this--let's see. Like I say, I didn't have to. I just couldn't be still because
    the kids were getting up, and then,
- speaker: Respondent
  text: they were--you know, if I would have to stay late or something and then, I didn'twant to leave them unsupervised--they
    were teenagers.
- speaker: Respondent
  text: (Curris laughs) So, I decided, "Well, I'll go home." But after they got up or whatever--wait a minute. I'm going too-a
    head of myself. Even before Benham
- speaker: Respondent
  text: closed and everything, they had another little layoff. And Fuzz asked me again--he said--Mountain Supply it was called.
    They had a Mountain Construction.
- speaker: Respondent
  text: And he said, "They got a job, Ruth. You want it?" I said, "What's it do?" He said, "Flagging." You know, they was
    pulling off the cliff, you know, as you go
- speaker: Respondent
  text: around--we called it by Clutts. And they had the-- WILSON:--yes, they had to work there. And so, I said, "Yeah, I'll
    try it." You
- speaker: Respondent
  text: know, I said, "Money, money, money," you know. (laughs) And so, I did that for a while. And this girl--her name was
    Barbara Thomas. She was already a nurse. She
- speaker: Respondent
  text: decided, "I'm going to--you know, I'm going to take that job on"--she flagged on one end. I flagged on another one.
    And as that became--and it started getting
- speaker: Respondent
  text: real cold. It was close to like November, almost Thanksgiving. And I called the boss. I--I--I said, "I can'ttake this."
    I said, "I'm getting cold." I said, "I'll
- speaker: Respondent
  text: give you all time to put up a light so they can detour to Clutts" And I said, "I'm going to stay on until, you know,
    they get this all situated." I said, "I'm
- speaker: Respondent
  text: going home," you know. But, I-- CURRIS:--you know, as I listen to you, Ruthie, there is a theme that runs
- speaker: Respondent
  text: through what you're saying. And that is that you're dependable-- CURRIS:--that you're smart, and that you are working
    far and above what is
- speaker: Respondent
  text: WILSON:--I'm glad you say that because I've been told that. My last job--I was hired--I happened to be in the store
    just joking around, Food City. And -----------(??)
- speaker: Respondent
  text: CURRIS:This was in Cumberland. WILSON:This is in Cumberland, righthere, and it's still in Cumberland. And
- speaker: Interviewer
  text: they asked me--said--no, I was just kidding around with them. And I said, "You all--would y'all hire me?" They said,
- speaker: Respondent
  text: '"You want a job?" I said, "Yeah, if you''ll hire me." I was just kidding. So, they said, "I''ll tell you what, go
    up in the office and put in an application,"'
- speaker: Respondent
  text: you know. I put in the application. So, I go back to the store the next day, and they said, "Do you have time to come
    up and do a drug test?" And I said, "Drug
- speaker: Respondent
  text: test?" You know, I said, "I don't do drugs." They said, "We just--you know, the company rules. You do a drug test."
    So, I had to go up there and do this drug
- speaker: Respondent
  text: test. I'm just still not, you know--and they said, "Well, we'll let you know something shortly," you know. I think
    it must have been the next day or so. They
- speaker: Respondent
  text: must have rushed it. And--and they hired me. And they hired me, and I told them--I said, "Listen, I don't--I want
- speaker: Respondent
  text: day shift." I said, "Now, if that's going to be a problem"--they said, "No." They said, "We'll hire you as the morning
    opener." And I did the morning open
- speaker: Respondent
  text: for quite a few years. And-- CURRIS:--well, that's a lot of responsibility-- WILSON:--yeah the--the opener--but see,
    I was always on time. I believe in--I
- speaker: Respondent
  text: don'twait until time to clock in. I go earlier, you know. I go earlier. And then, I couldn'tjust stand there. I can't
    be still, you know. I like--and I
- speaker: Respondent
  text: would just start--dusting, cleaning around, you know. And even some of the other cashiers--"Why are you doing that?"
