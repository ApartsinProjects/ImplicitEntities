- speaker: Interviewer
  text: '[00:31:18] HARVEY: Do you have any work stories during that period of ''89 to 2009? Any work stories you recall?'
- speaker: Respondent
  text: '[00:31:25] HELENA: Right away, I recall pulling some pranks on people. It''s not even work related, just pulling
    pranks on people at work and just laughing. I don''tknow if I should even say that. I had a fake leg and a hand one time.
    I had them in my bag, and I kept thinking ''I''m going to have an opportunity to do something with this.'''
- speaker: Respondent
  text: One night, I was thinking about my bag. I saw the fake leg and the fake hand in there. We were doing yard work, and
    it was over for the evening. We were waiting for the boss to come back to tell us we could go home. I put that arm and
    leg between some containers. There's a hole in the container in the bottom where a forklift can pick it up, so I put the
    leg and I put the hand. The moonlight was coming through the containers right there. I had a younger guy I was working
    with. I go, "Hey John, you know, I was out in Baker 300 and I saw something out there." Well, prior to this, there were
    some policemen over by the train tracks, and they were doing something. We were - 'Undercover cops?' He was on the other
    wall, and we were both looking. Helicopter. "What's going on over there?' That planted the seed [that] something was up.
    I had him go out to Baker 300. "I saw something between the containers there." I remember I let the boss in on it. We
    go between those containers, and I go, "It's something, like, right there!" You've never heard a man scream as bad as
