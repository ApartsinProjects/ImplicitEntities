    dark at Matson! Scary a little bit! I couldn'tfind anybody. Finally, I found somebody, and they just go, "They left an
    hour and half ago." I go, "No, I know. I'm looking for everybody." So, just to be mean.
- speaker: Interviewer
  text: '[00:29:13] HARVEY: Did you feel that mellowed out at all? [00:29:16] HELENA: Yes. [00:29:17] HARVEY: How long did
