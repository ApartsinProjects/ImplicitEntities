- speaker: Respondent
  text: '[00:00:00] HARVEY SCHWARTZ: This is Harvey Schwartz. We''re in Vancouver. It''s September 16, 2014. We''re with Helena
    Jones today as part of the Pacific Coast Pensioners Oral History Project. Helena, can you tell me when you were born and
    where you were born?'
- speaker: Respondent
  text: '[00:00:21] HELENA JONES: I was born in Long Beach, California in 1960, Saint Mary''s hospital. [00:00:26] HARVEY:
    Tell me a little bit about your experience growing up in Long Beach.'
- speaker: Respondent
  text: 'Ilwu pacific coast pensioners association oral history project | helena jones of local 13, local 63 [00:00:32] HELENA:
    My parents moved to Wilmington in 1942, and I''ve lived my entire life in Wilmington, which is the heart of the harbor,
    the port town. I still live there today. Grew up in the sixties. I was a sixties kid. I was the baby of six.'
- speaker: Respondent
  text: '[00:00:50] HARVEY: What do you mean, you were a sixties kid? [00:00:52] HELENA: I grew up in the sixties, you know.
    Born in 1960. My short childhood was in the sixties. Great time.'
- speaker: Interviewer
  text: '[00:01:02] HARVEY: I''m familiar - that your sister had physical challenges. Can you outline your experiences around
    that a little bit?'
- speaker: Respondent
  text: '[00:01:09] HELENA: When I was born, my seven-year-old sister got juvenile rheumatoid arthritis. She suffered for
    53 years with that disease, and she passed away last year. I know we spoke before. Having a sister with disabilities made
    me the person I am today: responsible, taking care of so mebody, the 24-hour job.'
- speaker: Interviewer
  text: '[00:01:36] HARVEY: Want to describe it a little bit about what you did to help her? I think that does fill out -'
- speaker: Respondent
  text: '[00:01:40] HELENA: Everything from feeding her, to bathing her, lifting her, dressing her, pushing her around in
    the wheelchair. Everything. The arthritis was so bad, it got to the point where she couldn''teven lift her arms.'
- speaker: Respondent
  text: '[00:02:00] HARVEY: Why do you say that made you the person you are? [00:02:05] HELENA: [Me] being the baby and the
    last of the kids at home, she needed so much help with everything. She was the first child in America to have total hip
    replacement, so she was able to walk again. She just needed constant care. My mom was so tired that I was the next one
    there to help her. I know that through her illness I became a really responsible person. I even drove her places when
    I didn''teven have my license. To Cal State Dominguez [California State University, Dominguez Hills] . She got her master''s
    degree from there. So I would drive her because my mom was like, "Go a head and just take the car. Go a head and take
    her." She had a little electric cart, and it had a big motor, a big battery. I would get that out of the car, and the
    battery, and get her to university. She might have been crippled, but she was everything but crippled.'
- speaker: Respondent
  text: '[00:03:15] HARVEY: You had several brothers as I recall. [00:03:20] HELENA: I had three brothers, and two sisters.
    [00:03:24] HARVEY: What did your dad do for work?'
- speaker: Respondent
  text: '[00:03:25] HELENA: He was a structural steel ironworker, and he was the owner of A-1 Erection in Wilmington, California.
    My brothers and my father did take part in the building of the Vincent Thomas Bridge and the Gerald Desmond [Bridge] .
    That list can go on and on.'
- speaker: Interviewer
  text: '[00:03:46] HARVEY: Where''d you go to high school? [00:03:48] HELENA: Mary Star of the Sea, a Catholic high school
    in San Pedro, California.'
- speaker: Respondent
  text: '[00:03:52] HARVEY: What''d you do after high school? Ilwu pacific coast pensioners association oral history project
    | helena jones of local 13, local 63'
- speaker: Respondent
  text: '[00:03:54] HELENA: I joined my first union, the Retail Clerks Union, Union 770 in Harbor City. I joined at 18 years
    old, which was kind of a big deal because, you know, you could work part-time for the grocery store, but to be a journeyman.
    . . It was kind of a big deal to be able to get that status, to get into the union. I did that for a couple of years while
    I went to college.'
- speaker: Respondent
  text: '[00:04:23] HARVEY: Where did you go to college? [00:04:24] HELENA: Harbor College in Wilmington. Then my brothers
    came to me. They were taking women into the predominantly male -'
- speaker: Interviewer
  text: '[00:04:36] HARVEY: Before we get to that, let me ask you. Were you drawn to a union job to begin with, and why? As
    a retail clerk?'
- speaker: Respondent
  text: '[00:04:48] HELENA: It''s a better paying job, and it''s organized labor. There''s benefits, and just to seek a higher
    level job than just working a part-time fast food place. When I was in college, I thought about being an accountant. I
    went and spoke with a professor there, trying to figure out what area I was going to go into. I was already working for
    the grocery store. He asked how much I made. He said, "You know, you make as much as I make, almost." Which was really
    sad. He goes, "If you don''tknow what you''re going to do, stick with that."'
- speaker: Interviewer
  text: 'Then I was later addressed with joining another union. [00:05:40] HARVEY: Were there discussions of unions when you
    were growing up?'
- speaker: Respondent
  text: '[00:05:42] HELENA: Oh, yes. My father was a union - my whole house came from a very strong union family. My father''s
    company, he didn''thave to be union worker but he was a union company. He hired union ironworkers.'
- speaker: Respondent
  text: '[00:05:57] HARVEY: He was an ironworker himself. [00:05:58] HELENA: Yes. [00:05:59] HARVEY: So he started out as
    -'
- speaker: Respondent
  text: '[00:06:01] HELENA: He started out - he came to California from Nebraska in 1938, and he went into the oil fields.
    He did come onto the docks for a short period of time. But as an oil driller, he made a little bit more money, so he did
    that instead.'
- speaker: Respondent
  text: '[00:06:20] HARVEY: Ok, let''s go back to where you made the transition to the ironworkers. So what happened with
    your brother? Did something happen with your brother?'
- speaker: Respondent
  text: '[00:06:30] HELENA: In 1981, I remember he came to my bedroom and knocked on the door. I was a single mother of a
    little girl. He said, "Hey, they have to take women. The Supreme Court passed that women have to be taken into the males''
    workplace. Don''ttell anybody I told you, but, if we''re going to take women, it might as well be you." I said, "How much
    are they paying an hour?" Because I grew up with ironworker benefits. He goes, "Almost ten bucks an hour." I go, ""Where
    do I go?"'
- speaker: Respondent
  text: '[00:07:05] HARVEY: What were you making as a retail clerk? Ilwu pacific coast pensioners association oral history
    project | helena jones of local 13, local 63'
- speaker: Respondent
  text: '[00:07:08] HELENA: I think six dollars an hour. And so this was almost ten. Of course, I had to go to an apprentice
    program for three years'' college at Cerritos College two nights a week, plus work full time. But it took a little while
    for the union to place me because they didn''tknow where to put a girl. I was the first female ironworker of all the southern
    California-Nevada area. They didn''tknow where to put me, so it took a little while.'
- speaker: Respondent
  text: They put me at Champlin Oil Refinery there in Wilmington. It's now in Vallejo [, California] . I worked there for
    one solid year. With about 5,000 men on the job, they wouldn'teven let me on the job; they put me in a boneyard for three
    months by myself. I mastered the torch, and I made shims all day. All day long, just made shims. The little steward, which
    was a World War II vet, he would come and have lunch with me every day and tell me all kinds of great stories.
- speaker: Respondent
  text: Finally, at the end of three months, my general foreman came out. He told me to get in the truck, and I got a little
    scared. Just like, 'where are we going?' He took me out a little ways and pulled a bridge belt out, a Klein bridge belt
    [tool belt] that he had ordered brand new, small size. He gave me that bridge belt, and he goes, "I know where to put
    you today. I'm going to put you in a gang." He drove me to the top gang, which is the raising gang. I got out of that
    car, and I'm going over to the big boys, the ones that raise the iron. The elite group. They wouldn'teven look at me.
    I'm like, "Hi guys!" [waving]
- speaker: Respondent
  text: One thing I really remember is, the foreman goes, "You ever been on the E ride at Disneyland?" [reference to an exciting
    theme park ride] "Sure." He had me get in the basket that the ironworkers had made of iron. I was in there with a big
    ironworker, and he goes, "I want you to help him." He shot me up in a crane, right into the top of the building. He had
    a giant impact gun. Now, how am I going to help this 6 foot 5 [inches] guy? So I'm just holding the impact gun.
- speaker: Respondent
  text: That was my first experience, and I was in the raising gang, which was the perfect place because there was no chit
    chat going on. It was all business. If I would have been in another gang, there would be too much time on the hand with
    being one of the only girls on the job. It was kind of in teresting where they put me.
- speaker: Respondent
  text: '[00:09:55] HARVEY: It is in teresting. A lot of women I''ve talked to who were construction workers hit difficulties
    at some point with the guys. Some guy would say things that were in appropriate and so forth. Did you have any of that?'
- speaker: Respondent
  text: '[00:10:15] HELENA: I would go into the outhouse, and there would be a different drawing every day of things that
    I was doing with everybody on the job. Eventually it got so bad that they gave me my own outhouse with a padlock. So I
    could have a ''clean'' outhouse without all these drawings. Plus - one time I took a marker out. And you could tell. "So,
    she was with me," or whatever.'
- speaker: Respondent
  text: '[00:10:50] HARVEY: Your name was on there? [00:10:52] HELENA: Yes! Yes, all kinds of terrible things. These detailed
    drawings of women''s parts and things. I remember I put on there, "Oh, you wish," or something. "That''s not what I saw,"
    or whatever. You had to take it; you were in their world.'
- speaker: Respondent
  text: I got to say, the ironworkers, most of the time, they respected me. Probably because of my father having his
- speaker: Respondent
  text: company. My father was retired when I got in. My father didn'teven talk to me for six months when I was doing this
    job. He was so upset! That his daughter was going to work down there. Later on my mom told me,
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | helena jones of local 13, local 63 the reason why
    he was so upset is he thought that somebody was going to rape me or something like that. I was like, 'what?!' He was so
    worried.
- speaker: Respondent
  text: But we became the best of the best because I ended up welding with my father. He had a big yard down by Local 13 in
    Wilmington. We would go down there and make things together. It was just grand. It was really cool.
- speaker: Respondent
  text: '[00:12:04] HARVEY: How long did you do that? [00:12:06] HELENA: Three years, and right when I turned out of the journeymen,
    I actually got top of the class. I was the top of my class in the ironworkers program. Being the only woman, you have
    to strive to be the best. I remember I could climb iron - which, I think about that now. We had a test climbing that I-beam,
    just with your feet and hands. Flipping my leg up on top of there. I remember the teachers just looking. The guy who was
    doing it with me couldn''t do it. They go, "Oh, that''s really good. She''s up there and you''re not."'
- speaker: Respondent
  text: So I turned out three years later. I got my journeyman's book. Then I put my application in. They were taking applications
    in 1984; they were going to take a big group, 350 people at the waterfront. Out of almost 30,000 applicants, I was the
    number one girl, scored. Back then it was on a scoring, college. Almost everything they required, I had because I had
    those three years of college. Safety, rigging, just everything they were asking for. I was told that later, that I was
    the number one girl picked. What an honor that was.
- speaker: Interviewer
  text: '[00:13:21] HARVEY: Yes, really. Why did you decide to switch from the ironworkers into the longshore?'
- speaker: Respondent
  text: '[00:13:30] HELENA: Growing up in Wilmington around these docks, I got a K-card in 1978, right out of high school.
    You can call it a K-card or a B-number; it was B 6377. I would get all the extra clerking. I''d call up in the morning
    to a phone number, "Is there any work today?" They''d say, ""Yeah, go down to so-and-so, so-and-so."'
- speaker: Respondent
  text: I remember going down to my first day. I'm sitting on the guy's forklift - an outside driver, a Teamster, not even
    a longshoreman. I'm just sitting right with him. I don'tknow any better. I'm 18 years old. He's driving around all day,
    with me on his little forklift. I learned later, you don't do that. You're the clerk; you go over here. So I'm over here
    on this guy's forklift, right next to him, all day long. He's probably loving life. I didn'tknow any better.
- speaker: Interviewer
  text: 'That was the start of down there, and I always wanted to be down there. [00:14:34] HARVEY: How come?'
- speaker: Respondent
  text: '[00:14:36] HELENA: It was right by the house, and you can work inside and outside, and it''s such a beautiful job.
    If you work out of the hall, you can work when you want to work. So with my little girl, if she was sick, and I was a
    single mom, you can just call up and go, "Replace me today." Or just not go. I can be a mom and also make a living at
    the same time. I don''tthink there''s another job that you can do that.'
- speaker: Respondent
  text: '[00:15:13] HARVEY: How did you learn that much about the longshore union before? Even when you''re young, 18, and
    also later on. How does the culture get transmitted?'
- speaker: Respondent
  text: '[00:15:27] HELENA: I had a family friend that knew I was out of high school. He was dispatching at the time. He called
    up, "What are you doing? Get your shoes on. Get dressed. Get down to" - there was a dock in'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | helena jones of local 13, local 63 Wilmington. I
    said, "To do what?" "You're going to go to work. I know you're out of school, and I need someone to take this job." That's
    what started it. Then when I get down there, it was checking - I was into numbers and all those things. I just loved that.
    So then I put my application in.
- speaker: Respondent
  text: Actually, the Golden suit [Golden v. Pacific Maritime Association, 1982 decree that women must hold 20% of longshore
    and 25% of clerk jobs] came out, and they sent me the court papers. It said for myself to go down and come to the hearing.
    I went down and showed Local 63's president at the time the papers because I didn't understand them. He's all, "Just ignore
    that. That doesn'tpertain to you." You know if I would have went that day, that I would have been in, right then? Just
    sad.
- speaker: Respondent
  text: Meanwhile, I became an ironworker. I would try to work on the waterfront, when I got a chance in between iron working
    and going to school.
- speaker: Respondent
  text: '[00:16:43] HARVEY: You really wanted on the waterfront because of reasons you outlined. [00:16:45] HELENA: I had
    to keep that card up because, if you didn''tkeep that card up, I think you had to work once every six months. I''d go
    down and get a day to keep that card. One day it''s going to open back up. I could''ve gotten in with the Golden Suit.
    [bang fist on knee]'
- speaker: Respondent
  text: But it wasn'tmeant to be! But I'm glad I was an ironworker because that was really...I look back now. Built the Thomas
    Bradley International Terminal, Terminal 3. I worked for Owens and Illinois Glass Factory. They make bottles and stuff.
    We renovated it. Really cool.
- speaker: Respondent
  text: '[00:17:22] HARVEY: Tell me about your experience early on. Is it 84 that you...? [00:17:28] HELENA: ''78. I was one
    of the first female pioneers on the waterfront. I wasn''t in, but ''78 I never saw another woman down there. There probably
    was [other women] , but I never saw one.'
- speaker: Respondent
  text: '[00:17:40] HARVEY: But then you got - [00:17:40] HELENA: I didn''tstart until February of 1985. Got notified in the
    end of ''84.'
- speaker: Respondent
  text: '[00:17:51] HARVEY: So you started in 1985. [00:17:54] HARVEY: You expect to go into the clerks? [00:17:56] HELENA:
    Yes, it''s kind of along story. I had to go to Local 13 first.'
- speaker: Respondent
  text: '[00:18:00] HARVEY: What happened? How come you went to 13 initially? [00:18:05] HELENA: I got a letter in the mail
    saying that "You''re a class B clerk upon completion of your physical." So I went to a meeting, and there was 15 of us.
    They said, "You have to quit your other local. Can''t belong to two locals." I took a withdraw from the ironworkers. It
    was a big deal for me to take a withdraw from'
- speaker: Respondent
  text: that union. I just got journeyman status. So I did. Then about a week later, we met up. We were supposed to get registered.
    In the group of 15, somebody brought up that it was nepotism for these first 15 women that scored the highest. I don'treally
    know anybody
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | helena jones of local 13, local 63 on the waterfront;
    I have no family on the waterfront. So they were scared that some nepotism suit was going to come because somebody wrote
    a list and said so-and-so's this, so-and-so's the PMA's mother, and girlfriend, and all this. I was listed as the Stamper
    family's neighbor. I was three houses down from them. That doesn't help me get a job! [shakes head]
- speaker: Respondent
  text: So, what they did was, the [? cose?] said "We have to hire groups of 50, so you guys just hang on. We'll get 35 more
    girls, and we'll hire you 50." Meanwhile, they have a lottery. They put my name into a hat and drew me out. The first
    50 girls got clerking. Well, they picked me so mewhere between the other hundred people, and I got longshoring.
- speaker: Respondent
  text: I went through the grievance machinery. I went to the PMA [Pacific Maritime Association] . I said "I would have never
    quit my ironworker job if I wouldn'thave got clerking." As an ironworker, my back was already bad, plus from all the lifting
    of my sister for all those years. It bothered me. They said, "Well, you got a job. You got a job." I get longshoring -
    not that longshoring is bad! But I would have never given up my ironworker job. They never answered me in the grievance,
    but I just kept doing exactly what they told me to do.
- speaker: Respondent
  text: I hate to say it because it so unds really bad, but we had a lawyer represent us. Out of the 15, eight of them got
    clerking, and it left the seven. So we're the "Fabulous Seven."
- speaker: Respondent
  text: '[00:20:31] HARVEY: Was Chris one of them? [00:20:32] HELENA: Yes, she was. I remember on the first day they told
    us we weren''tgoing to have that job, I went out in the parking lot, and I looked at her. She was getting into her brown
    convertible Rabbit [car] . I looked at her, and I go, "Hey!" [holds hands palms up] Like, ""What the hell?" And so, we
    became friends.'
- speaker: Respondent
  text: We exchanged numbers. I said, "We need to do something. They're not answering us." We contacted them; we weren'tsuing
    for any money, just breach of contract. We wanted our jobs back.
- speaker: Respondent
  text: We dropped the lawsuit for one year because our lawyer's secretary wrote a letter, and it was misspelled. We were
    so embarrassed. We dropped it for about a year. Picked it backup, and Bob Remar, the lawyer for the ILWU, he in terviewed
    me. He asked me about what was happening down there. I was harassed so bad. I was one of the first females to have a baby
    in Local 13. And the harassment while I was pregnant. . . As I explained somethings to him, I guess after my deposition
    he called and said, "You better hire these girls right now." I got a phone call the next day that said "come on down and
    register as a clerk.'
- speaker: Respondent
  text: '[00:21:59] HARVEY: As a clerk? [00:22:00] HARVEY: So how long were you a longshore worker? [00:22:03] HELENA: Three
    years. I got in in 1989. So, almost four years. [00:22:13] HARVEY: What''s it like doing longshore work?'
- speaker: Respondent
  text: '[00:22:19] HELENA: It was very similar to ironwork. Ironwork was a little more physical. I remember we went out on
    the job, and I had a lashing job. I went to the wrong window, or they gave me the wrong ticket. I was going to drive a
    paper lift that day, and he gave me lashing. I was telling this other girl, "Just follow me, sister. I''1l show you how
    to drive that machine." She had never worked on the waterfront. And he gave me the'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | helena jones of local 13, local 63 wrong ticket.
    "Oh, I've got the wrong ticket." He yelled out, "Hey, b - , you wanted to be a longshoreman. So take the job." Embarrassed
    me in front of everybody. So I took the job.
- speaker: Respondent
  text: So I go out to the job. Now I've got my work boots and my gloves, and my overalls are worn in from being an ironworker.
    That same guy that yelled out was working with me. Had to work right next to me. So I showed him. I could do those turnbuckles
    faster than he could. At the end of the break he goes, "Where are you from?" I go, "I'm a journeyman ironworker, pal."
    He goes, "I'm wanna apologize to you." "Yes, you shouldn'tjudge a book by its cover."
- speaker: Respondent
  text: '[00:23:40] HARVEY: That''s a good, good story. [00:23:42] HELENA: That was a good one, man. So when I became a supercargo
    chief supervisor, he''s a boss. I remember just looking at him over the years, like ''mm-hmm.'''
- speaker: Interviewer
  text: '[00:23:54] HARVEY: That''s really something. Any other stories like that? During that three-year period?'
- speaker: Respondent
  text: '[00:24:00] HELENA: I think what really is important is something - when I was pregnant, I asked for a red tag, it
    was called, to do signaling or checking, so I wasn''tphysically being pregnant down there. Still able to work. Because
    I was one of the seven, they really were not nice. When I asked for this red number, they would give me a dock job. Instead
    of giving me clerking or signaling, they would give me throwing bags of grain or bananas. When I''d go out there, the
    boss would fire me. Because you''re not going to be on my job and maybe get your shirt caught in a conveyer or lose your
    baby or something. So then I was dead for the day. They did it time and time and time again to me. Then you''re dead;
    you can''t get another job.'
- speaker: Respondent
  text: So I went to the LRC, Labor Relations [Committee] . I met with them and I explained. The president of PMA at the time,
    Charlie Young said, "You know what? We just don'thave rules for pregnant women. We have just never had this before. You're
    absolutely right." I said, "But I can't be throwing grain, so it has to be strictly signaling or clerking." "No problem."
- speaker: Respondent
  text: I come back the next month for the meeting, and Charlie Young had went to a funeral. A good friend of his had got
    killed on the waterfront. There was another man - I don'twant to mention any names - he went against me, and he was from
    Local 13. He went against the ruling of that. So you know what I said? I remember standing up and the PMA and the companies
    were there, at the LRC. I said, "I'm not gonna be on this red tag. If I lose this baby, I'm gonna own each one of you."
    And I walked out.
- speaker: Respondent
  text: When I got home, I was so upset. My husband said, "You don'tneed this. Just go on maternity leave." That was the end
    of that. I guess eventually it did get passed. But that was that. That's probably my major...
- speaker: Respondent
  text: Of course there was other things. I feel good about that now because that all got passed. But, what had happened to
    me, that wasn'tcool.
- speaker: Respondent
  text: '[00:26:39] HARVEY: If you''re on maternity leave, what was your in come situation? [00:26:43] HELENA: Oh yes, way
    less. But I was fortunate to be married at the time, and my husband was an ironworker. We werevery blessed.'
- speaker: Respondent
  text: '[00:26:52] HARVEY: So you could get by. Ilwu pacific coast pensioners association oral history project | helena jones
    of local 13, local 63'
- speaker: Respondent
  text: '[00:26:53] HELENA: Plus, we had kids back to back, so I was kind of stuck at home for a while. A couple years, I
    didn''tmake my hours. I got cancer, too, so I had a little time off for that.'
- speaker: Respondent
  text: '[00:27:10] HARVEY: Was that covered adequately under the ILWU health program? [00:27:12] HELENA: Oh yes. Very blessed.
    [00:27:20] HARVEY: You became a clerk in 1989. How long did you clerk?'
- speaker: Respondent
  text: '[00:27:29] HELENA: I retired in 2009 from an in jury. Outside of work. I crushed my wrist. I couldn''teven open it;
    I do have it open now, but I crushed my wrist. I retired early.'
- speaker: Interviewer
  text: '[00:27:47] HARVEY: ''89 to ''99 to 2009, is that 20 years? Do I have that right? [00:27:54] HELENA: 20 years, yes.'
- speaker: Interviewer
  text: '[00:27:55] HARVEY: So you were a clerk for 20 years. [00:27:57] HARVEY: What was all that like? What was it like
    in [Local] 63?'
- speaker: Respondent
  text: '[00:28:02] HELENA: I came over there, and we were the famous seven. They wouldn''teven tell us how to do anything.
    Go out to a job, and not even explain what''s going on. Just throw the clipboard and say, "Figure it out." You didn''tknow
    where anything was going. You''re supposed to be lined out. ''The containers are going here today, or the chassis are
    here.'' Uh-uh. Just throw the clipboard. Figure it out.'
- speaker: Respondent
  text: I remember one night I was at Matson [Matson, Inc.] in the yard. Just so mean. Don't get me wrong. I love the union.
    It's all good. I was new, and plus I was one of the seven. I remember one night yardwork took a break. I came back and
