  text: 'UMN Immigrant Stories Collection [''United States''] Ayan Omar was born in Somalia in 1993. Her family left Somalia
    2005 and went to Kenya. They came to the United States in 2007. Ayan is a student at Century College. Ayan Omar Transcription
    "Bacadeley hooyo: My mom''s grocery store" Hello, everybody. Today I am going to tell you the story about my mom''s grocery
    store. My name is Ayan Omar. I was born in Mogadishu, Somalia on January 1, 1993. I lived with my parents. I have four
    sisters and three brothers, and they are older than me. The war in my country started five years before I was born, so
    life was difficult for everyone. There was no government, no public school, but there was private school but my family
    could not afford [it]. So, I did not have the opportunity to go to school. My dad had [to] drive to work to earn money
    to pay for rent and food and he was working very hard. My mom had a grocery store and she worked there. When I was nine
    years old, I had the responsibility to open the grocery store early in the morning. I opened at 7AM and I stayed until
    9AM. Then, when my mother come to [the] store, I went [to] Islamic school and I come back at noon. After that I eat food
    and went back to grocery store and I helped me mother give people what they want. Then I did my homework there and we
    always closed the grocery store at 9PM. After that, we went home. This taught me about being responsibility. Both my mom''s
    store and my dad''s truck taught me something important in my life. If it wasn''t for my mom''s store, I wouldn''tknow
    how to work with different people. Now I like helping others. My mother is the person I associate with this time, and
    I learned so much from it. My mom''s grocery store helping me [be] responsible at such a young age. I had to open a store
    and go to my Islamic school at the same time. Even today, this is important to me because it has taught me a valuable
    lesson in life: when I go to a store and see young people helping older [people], I remember the old times.'
