  text: UMN Immigrant Stories Collection ['United States'] Nang was born in Burma. She lived in Nu Poe Refugee Camp in Thailand
    for seven years before she and her family were resettled to the United States in 2013. She lives in St. Paul, Minnesota
    with her husband and two daughters, who are students. She studies English at the Ronald M. Hubbs Center for Lifelong Learning
    in St. Paul, Minnesota. Nang Kham Leng Transcription My name is Nang. I am from Burma. We had to leave the country because
    my husband has a problem with the government. The government was unfair to the population. Government officials took care
    of themselves, but not the population, so we had to leave the country. I lived in refugee camp in Thailand called Nu Poe.
    We had to live in that camp for seven years. When I was in that camp, we had many troubles with my family. We don'thave
    enough food, couldn't go anywhere, and we couldn'tlive. I miss my parents, brothers, and sisters. After I have been in
    that camp about five years, my dad passed away. So, I never saw him again. I always remember my dad and I feel sad about
    that. I have been in Minnesota for one year and eight months. When I was in refugee camp, I had friends in the U.S. who
    called my family and advised us to come to Minnesota. Right now, I'm not in good health. I have to go to the clinic two
    or three times a month. So, I can't go work. In our family, only my husband works. Sometimes we do not have enough to
    pay for rent and my medication. When that happens, I am very sad and worried. I have two daughters. They are students.
    I am worried about their education, too, because we don'thave enough to send them to college. When I go to see my family
    doctor, I am always sad and cry because I want to be healthy. Since, I have been in the U.S., I always worry about my
    family and my health. Besides my worries, I still come to school every day to improve my English skills.
