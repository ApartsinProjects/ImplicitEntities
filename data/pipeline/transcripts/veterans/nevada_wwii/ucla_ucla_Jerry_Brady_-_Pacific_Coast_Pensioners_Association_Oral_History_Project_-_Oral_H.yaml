collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Interviewer
  text: Jerry could you tell me your name, your date of birth, where you were born, when you were born, and what local?
- speaker: Respondent
  text: My name is Jerry Brady. I was born in Grass Valley, California, April 7, 1934. I was in Local 63 for 35 years and
    I total of about 44 years working on the waterfront. And I'm right now with the pensioners group in southern California
    and on the executive board of that group.
- speaker: Interviewer
  text: Tell me a little bit, if you would, about your early life, your youth, your early experiences before you got into
    ILWU.
- speaker: Respondent
  text: Just before getting on the ILWU I worked for Shell Chemical for ten years. I was very active in the OCAW union, which
    was - our little plant was 100 percent and very active. Matter of fact, I clashed quite a bit with the company and I was
    the secretary of the group for several years and, on that committee. It kind of - pretty soon I just gave up the ghost
    and went down the waterfront to work.
- speaker: Interviewer
  text: How did you get from Grass Valley to that company?
- speaker: Respondent
  text: I got from there well, I went in the army in '54, got out in '55 and went to Oregon and worked with my brother Ken,
    he drove Cat [Caterpillar machinery] and I set [logging] chokers behind him. I worked up there out of Glendale, Oregon
    for a year, and then that closed down. When the woods closed down in Oregon, it closes down. And so, I had two brothers
    in southern California. Matter of fact they were just both going into the longshore union, one in the clerks union - one
    in 63, one in Local 13. And I came down here and they helped me - matter of fact, one got me in the job at Shell, helped
    me get the job at Shell and then ten years later the other one helped me get into the clerks union and I went into the
    clerks union in 1968.
- speaker: Interviewer
  text: How did he help you get in?
- speaker: Respondent
  text: He helped me with a test, very extensively with the test. And he helped me as far as different people to meet. Mostly,
    it was to get on the list for the test, and exactly how he did that I don't know.
- speaker: Interviewer
  text: Were your brothers union guys too?
- speaker: Respondent
  text: Yeah, both of them. You bet. My brother Raymond was in the union clerk in 63. And my brother Chuck was in Local 13.
- speaker: Interviewer
  text: How about your parents? Were they union activists?
- speaker: Respondent
  text: No, my father was a gold miner. He mined gold for 55 years in northern California. And then he was, at 67, he took
    a job with a county and worked in the county road for another almost 20 years.
- speaker: Interviewer
  text: Okay, so you're down in southern Cal and you get in 1968. Did you know much about the ILWU before that?
- speaker: Respondent
  text: No. Yes, well, actually my brother Chuck worked in Stockton [California] for three years after he got out of high
    school in '49. And he talked a lot about working on ships and Harry Bridges and different things. So I did know a little
    bit about it.
- speaker: Interviewer
  text: How did you view it?
- speaker: Respondent
  text: Oh, I thought it would be a pretty nifty place to work myself. I never thought too much about it until I moved to
    southern California.
- speaker: Interviewer
  text: Tell me about your first day on the job, particularly as a clerk. You come in as a clerk--actually you didn't do longshore
    as such.
- speaker: Respondent
  text: No. Actually I did longshore when I first got to southern California for the first six months out of the employment
    office and then my brother got me the white card, which it gave me permission to get the extra jobs for the clerks hall.
    And my first day in the job in the clerk's hall was -
- speaker: Interviewer
  text: Why don't you tell us your first day on the waterfront as working as a longshoreman?
