source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Well I was spent almost my entire childhood in Catskill, New York. I was born there and really didn't leave there
    until after I was out of college. We did have one little interlude where we went across country to live in the state of
    Washington; but, that was very brief, about half a year. We came back my mom couldn't stand the weather; but, my whole
    time was growing up in Catskill, New York, elementary school, high school, middle school, all that stuff. College I went
    away to Oswego and graduated from there with a mathematics degree in education. My initial stint after I graduated from
    college I taught high school for two years as long as I was teaching I really didn't have to worry about going into the
    service or anything like that. It was when I was trying to switch jobs that the military kind of caught up with me.
- speaker: Interviewer
  text: Uh, o.k., what did your parents do in New York?
- speaker: Respondent
  text: Uh, my dad, my folks were divorced when I was very young. My dad initially he was in the Army Reserves, he had served
    during World War Two. He was a Navy gunner on the back of a P.B.Y served in the Pacific and when he was finished with
    the war. The war was over in the Pacific, he transferred into the Army reserve as a Warren officer, he was a warren 4,
    and he spent 30 years from that point on; and one of his detachments was located right there in Catskill, New York. So,
    I can remember as a kid going up to visit him in the big armory, is what it was called. They had munitions there and they
    did all their training and also but we used to go visit up there. I guess it's like a big aircraft hanger it was huge
    it had a domed roofing, I can remember that as a little kid. But shortly after my folks divorced, he moved away and spent
    the rest of his time in Buffalo, New York. We did go to visit there, that's where he did his reserve work. And so when
    my folks remarried, my step-dad was not in the military. He never could be because of his eyesight. And it was just kind
    of a routine growing up, little kid. You know was probably one of the military things I did as a kid, I was in boy scouts.
    It was really big. Spent a lot of time there, made eagle scout and that's a summation of my childhood, it's real brief.
- speaker: Interviewer
  text: Did you have siblings?
- speaker: Respondent
  text: Yes, I did. I had an older brother and sister, I was the youngest of three kids. My brother was in the service also.
    He went in the early 60's, air force enlisted guy. He went through training at Mississippi and became like a code breaker.
    He served overseas, Europe, Africa. We were friends with Libya, at that time and I know he was stationed there for a little
    while. I didn't know too much about it. Now he, when he came out of the service, I was just going into college and he
    was making his own way. My sister, she went through college too, and married and had a couple of kids. We used to visit
    them when I was in college.
- speaker: Interviewer
  text: So, did you know you were going to be part of the military, having your father and your brother follow in their footsteps?
- speaker: Respondent
  text: Not really, no, that was not in my future. Ever since I was in middle school, seventh grade I wanted to be a math
    teacher and so that is what I had just prepared myself for. Now every dime I earned I put in the bank and savings. Cause
    my folks couldn't afford to put me through school. So, I paid my way through college and met my dream and became a teacher
    and my first teaching assignment was in Auburn, New York.
- speaker: Respondent
  text: And I taught there for two years. And at the end of two years I was looking for another location and so I was interviewing
    several other schools. But, my own school in Auburn, had sent my draft board a notice and said he's no longer employed.
    And so, that meant my status changed back to one A. And so I very soon after that got a letter, from the draft board saying,
    come, come see us. And, while I was in Auburn I said well I really don't want to go into the Army. So, I went down and
    saw my Air Force recruiter thinking I was going to become an enlisted person. When I walked in his door and he started
    talking to me and he let me know about a program with the Air Force to become an officer. He says you have to take a test
    and we'll see if you can qualify. But he says with your college degree and your background in mathematics, he said it's
    very likely you be able to be accepted in the officer program. And so, I did take the test and I did very well on it,
    and he was a little bit surprised at how well I did on it. But, you know a person coming out of college is not like a
    kid coming out of high school. And, that is mostly what the recruiters were dealing with, was those young kids.
- speaker: Respondent
  text: So they accepted me and I was going to be in the navigation program and went through all the physicals and stuff and
    I got my first airplane ride to go down to San Antonio from Syracuse, that was kind of a thrill.
- speaker: Interviewer
  text: Was that when they, when you enlisted?
- speaker: Respondent
  text: Yeah, when I enlisted they took me down there they flew me down there and I can remember arriving it was late at night
    and there was a bus that came, picked us up and took us to the Air Force base. Lackland. And, you know it was all very
    strange. It was a real different kind of life, you, even though I am a very disciplined person, it's still kind of scary
    the first time you do that. And, we got there and they drove us out to the base and put us in some temporary quarters
    and the next day we all got organized and into our flights and then we got our hair cut really really short. No hair left.
- speaker: Interviewer
  text: And put you into your, your different units, is that what you were saying?
- speaker: Respondent
  text: Yeah, we got put into flights that's what they were called, there were about twenty to twenty-five of us and we were
    in like a dormitory, there was a first floor and second floor and there was two other sides to the dormitory and next
    day was all the routine stuff, you get all your equipment, your shots you know.
- speaker: Interviewer
  text: Your physical, you said?
- speaker: Respondent
  text: Well, the physical was way before that. They have a physical just to get you into the service, that you have to pass
    to make sure you're qualified. But, you go through more physicals there, they take very good care of you. And so that
    was three months of training going through Air Force officer training and you come out of that a second lieutenant and
    from there they shipped us off to our different areas and mine was navigation so we went to the Mayther Air Force Base.
- speaker: Respondent
  text: And navigator training was about eleven months and we all got our rankings and stuff out of navigator training and
    I wanted to go into electronic warfare. They only had seven slots, to get in there.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: I got slot number seven.
- speaker: Interviewer
  text: Wow. So, that was pretty specialized training even within that.
- speaker: Respondent
  text: Yes. There were two specialized schools there one for the bombardier training and almost every one of those guys went
    into the B-52's, and then us we had quite a different variety of assignments, there was the F-111's, which had a back
    seater it was just like becoming a fighter pilot except you were the E.W.O. in the back, electronic warfare officer. And
    several other aircraft, I remember one guy got a reconnaissance slot in the R-B-57, that was a high altitude reconnaissance
    plane. That was kind of special. But, there was two of us that went into the Electronic warfare slot, my friend Randy
    Jones, and I we got the slots. And, so from there we joined up with some other people, that I really didn't know and we
    all went from, I forgot what I was saying...
- speaker: Interviewer
  text: Oh, to a different area?
- speaker: Respondent
  text: Yeah, like you guys were taken to, get further trained in electronic warfare?
- speaker: Interviewer
  text: Yeah, after getting out of electronic warfare school and by this time I had been in the service well over a year,
    year and a half and still not in any operational assignment. But, from there we had to go through some more training,
    some survival schools in Washington and down in south Florida, Homestead. And then we went to Shaw Air Force Base, which
    was going to be our training for the electronic warfare plane EB-66. And, there's really two models of that plane, but
    neither of them existed at the airbase because, all of the planes were overseas, flying, they were all operational.
- speaker: Respondent
  text: So, all our training consisted of was simulator training. Learning the different aircraft systems for both of the
    airplanes. One was reconnaissance plane, there were four members that sat in that plane up front and you would monitor
    different wavelengths of the radio spectrum. And then the second Airplane was the E model which was the jamming platform.
    You'd go out and all the ones we were monitoring we would make sure we were covering the signals, interrupting them, interfering
    with communications and with the radar systems.
- speaker: Interviewer
  text: So, did you get to stay with the guy that you met?
- speaker: Respondent
  text: Oh yeah, whoa. Randy and I, we both went to Korat, we were very good friends. And, I had another friend that was over
    there with us, too. He was in a class ahead of us, and matter of fact it was my other friend Yavon Clements, he and I
    went to Ton Son Nhut together. But, once we got to Korat, we got our first actual plane ride the combat aircraft.
- speaker: Respondent
  text: Oh, and before that we got what they call the dollar ride, they took you up in a KC-135 and we got to them refueling
    all the different airplanes and things like that. That was just to kind of keep us current, you know it was not really
    current cause we were not really flying or doing any duties but they put us up there to help us maintain our combat pay
    more than anything. But, once that was over we started doing the training in the reconnaissance version. Then the reason
    for that was you didn't really have any responsibilities to the crew. You know you'd start out in position one which was
    monitoring communications basically, and you worked your way through the different positions, until you got to position
    four, and then you were crew leader. And, so once you made crew leader you were the one that would receive the operation
    briefing. And, then you would brief all your crew members on what you were going to do and where you were going to fly.
- speaker: Interviewer
  text: O.k., and you said this was in Korat, Thailand.
- speaker: Respondent
  text: Yes, this was in Korat. And, you spent a good portion of the time doing that and once you became the crew chief, you
    know the crew guy, briefing everybody else, then you graduated to the other aircraft. Which was the jamming platform,
    because now there was only three people on that, the pilot, the navigator and yourself. And, now your responsibilities
    went way, way up because you're monitoring all the radar bands and your jamming, you're putting your jammers on the different
    signals. And, you're also got duties, like a co-pilot, you're monitoring what's going on out the window, you're the eyes
    on the right side of the plane. Looking for San missiles and Triple A, and things like that when you start flying into
    the combat areas.
- speaker: Interviewer
  text: Oh, wow, and how long before you went into the combat areas, after training?
- speaker: Respondent
  text: Oh, well, you, the C-model, the one that was monitoring all the signals, we would kind of fly over Laos, fly up and
    down the border. Without actually going into Vietnam where all the signals were, but, the later missions we flew into
    Northern Laos, where there was a lot of Triple A and stuff like that there were no San Missiles, it wasn't until we actually
    got into North Vietnam, where the missiles were.
- speaker: Interviewer
  text: How long did you get to train in Korat?
- speaker: Respondent
  text: Well, it was pretty brief, you know it's a, your first training mission is your first real combat mission.
- speaker: Respondent
  text: Yeah, but it all wrapped up into one because again, you know we'd gone through all the ground training in Shaw Air
    Force Base and then when we got there your first mission, that was it.
- speaker: Respondent
  text: You're going, you're ready to go you know. They can't train you any more.
- speaker: Respondent
  text: But, you're under the tutelage of the other three crew members in the back of the plane.
- speaker: Interviewer
  text: That had already been there for a while.
- speaker: Respondent
  text: Yeah, they'd all been there, they were all experienced men.
- speaker: Interviewer
  text: No women at that time flying those positions, so uh.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Was there any action that you saw, where you were at or was it when you went on your trips to Vietnam?
- speaker: Respondent
  text: No, in December everything was ramping up you know, and they were getting ready for the Linebacker Two and we started
    flying what we called the late night shift, the nine to six shift. Is what we were doing, backing up all of the B-52's
    and the other planes that were coming in from Guam and we actually flew into North Vietnam. I can remember seeing the
    missiles in the night sky and see the exhaust plumes come up and actually saw a couple airplanes get shot down, see them
    explode in the sky. Very fearsome to be sure see your crew mates and things like that you know had gotten killed.
- speaker: Interviewer
  text: Did you guys all leave together? Was it...
- speaker: Respondent
  text: Well, I didn't know the guys per se, but some of the guys that were in my E.W.O. Class in Mayther, they went directly
    into B-52's. So we know that was some of the people, people that we were close to were getting shot down. You know it
    was very frightening. It was, I can remember it was one of the longest fifteen minutes periods that I ever spent though.
    We'd go in there fifteen minutes on station and come out and the next wave would come in and you'd go in another fifteen
    minutes. Cause, you didn't stay in harm's way any longer than you had to. But, we were providing all the jamming support,
    besides what the B-52's were providing, they had their own on board systems.
- speaker: Respondent
  text: But, they were the ones that were taking the risks, but we were there.
- speaker: Interviewer
  text: Because they were lower?
- speaker: Respondent
  text: Well, they had a certain flight path that they would come in on and the Vietnamese figured it out. Even though they
    couldn't see them they were timed and they'd get that third bomber wave and shoot them down.
- speaker: Interviewer
  text: O.k., and that was the only time you experienced any real...
- speaker: Respondent
  text: Any real danger. And, that was only a few days that I did that only three or four days. At the beginning of the Linebacker
    we did that and then I got notice and my friend Devon, that I mentioned earlier, both he and I were notified that they
    needed people at 7th Air Force, to help with the planning. And, so the very next day I mean I, we had just come in from
    a flight at six in the morning and by eight o'clock in the morning they said to pack your bags you were leaving, you were
    going to Vietnam, and um...
