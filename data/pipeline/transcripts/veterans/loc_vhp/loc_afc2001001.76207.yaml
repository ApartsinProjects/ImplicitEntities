collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted, or did you enlist?
- speaker: Respondent
  text: I enlisted.
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: Springfield, Ohio.
- speaker: Interviewer
  text: You're from Springfield?
- speaker: Interviewer
  text: Why did you join?
- speaker: Respondent
  text: Actually, it was in the pretty much in the height of the Vietnam War; and I had choices of either being drafted or
    enlisting. I already knew how to shoot a gun. So I figured I'd enlist and learn something a little more than, you know,
    so I enlisted in the United States Air Force.
- speaker: Interviewer
  text: So the branch was the U.S. Air Force.
- speaker: Interviewer
  text: What did it feel like, boot camp, do you remember those first few days?
- speaker: Respondent
  text: You know, it was, of course -- we were, I'm sure all of us were a little apprehensive 'cause it was brand new. And
    we'd all heard, you know, horror stories and stuff. But it really -- it really wasn't bad. Anybody who's played football
    or done any sports and they had summer practices and different things like that, it wasn't -- it really wasn't bad. But,
    you know, the fear of the unknown is probably the biggest fear that we -- we all had.
- speaker: Interviewer
  text: Okay. You said you already knew how to shoot. Were you a hunter?
- speaker: Respondent
  text: Not necessarily. I did do some hunting and stuff; and I say that probably half in jest, more in earnest, you know,
    or half in jest, half in earnest that, I really did -- I, you know, I knew how to shoot a gun. I figured if I were a draftee,
    I would probably be a foot soldier and you know.
- speaker: Interviewer
  text: What kind of gun did you have in Vietnam?
- speaker: Respondent
  text: You know, actually I was in the Air Force, so...
- speaker: Respondent
  text: We really weren't gun toters. We had to learn how to shoot the M16, but --
- speaker: Interviewer
  text: Did you win any medals?
- speaker: Respondent
  text: Just the marksmanship.
- speaker: Interviewer
  text: Marksmanship.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Okay. Do you remember your instructors? Were they hard on you?
- speaker: Respondent
  text: You know, we might have thought they were at the time; but when I look back at it, I don't think they were -- they
    were hard. I think they were really trying to prepare us for the next four years of our life, so...
- speaker: Interviewer
  text: Absolutely. Do you remember exactly where you went in Vietnam?
- speaker: Interviewer
  text: The name of the place?
- speaker: Respondent
  text: You know, I wasn't -- I wasn't in Vietnam. Again, I was in the Air Force; so my bases were in Ching Chuan Kang, Taiwan,
    and Utapao, Thailand; and I was what they called "direct support of the war." One of my jobs was I would fly on airplanes
    that we couldn't simulate their problems on the ground, then we would fly on them to find out what they were doing. So
    when we would come back, we could fix them when we got on the ground. So my Vietnam experience was flying over Vietnam,
    so...
- speaker: Respondent
  text: They still give you the hazardous duty pay and -- and all that stuff for that; so I'm -- I'm still a Vietnam vet.
- speaker: Interviewer
  text: What's a memorable event?
- speaker: Respondent
  text: Oh, I'd have to think about that one. Maybe we'll come back to that one, so...
- speaker: Interviewer
  text: Can you tell me how you got medals or citations?
- speaker: Respondent
  text: Good Conduct. At that time, probably, anybody who had served honorably for at least three years got a Good Conduct.
    We were, our unit was in the Field Maintenance Squadron, which is heavy equipment on big planes, aircraft, B-52s and KC-135s.
    We did -- a couple of times we did really exemplary in the field overseas; so we got Presidential Unit Citation twice.
    I am trying to think of, of course, everybody who was in during that time who was a Vietnam vet got the Vietnam Service
    and Vietnam Campaign Medal, so...
- speaker: Interviewer
  text: Okay. How did you stay in touch with your family, or were you able to stay in touch with your family?
- speaker: Respondent
  text: Of course, a lot of letter writing. I had a twin brother who was in during the same time period that I was in. And
    he was in Vietnam as a Marine, and I was in Thailand and Taiwan was in the Air Force; and we used to write back and forth
    all the time. And one of the things I think that was kind of a funny memory -- he was really in the thick of things a
    lot; he was pretty far up north -- and he would write me letters and tell me, you know, they'd been two weeks in the mud;
    and it rained every day; and, you know, and then pinned down and just really some pretty tough times. And I would -- of
    course everybody thinks the Air Force is -- or a lot people think the Air Force is kind of a country club; and I would
    write him back and say, yeah, man, it really sounds bad. I hate to hear that, but we didn't have it easy over here either.
    We had an electrical storm and lost all the power in our barracks; and the refrigerators wouldn't work, so our beer was
    cold -- was warm, you know; and we lost our air conditioning; and there's a crack in the swimming pool; so they had to
    empty the pool; and on top of all that, our houseboy quit, you know. So, you know, just to kind of lift his spirits a
    little bit there.
- speaker: Interviewer
  text: Exactly. So you were keeping your morale up and his morale up too.
- speaker: Respondent
  text: Probably more for his, I mean, you know, he was in a tougher place than I was for sure.
- speaker: Interviewer
  text: Do you have any photographs? Did you bring any back?
- speaker: Respondent
  text: I did. I have a lot of photographs at home, but I didn't bring anything with me today.
- speaker: Interviewer
  text: Okay. Okay. Were there any casualties in your unit?
- speaker: Respondent
  text: Not -- not with the Air Force.
- speaker: Interviewer
  text: Not with the Air Force.
- speaker: Respondent
  text: I mean, not that I know of.
- speaker: Respondent
  text: The whole time we were over there, we may have lost one B-52; and it wasn't due to enemy fire or anything like that;
    so, pretty much, the planes that we worked on were flying too high for them to shoot down things.
- speaker: Interviewer
  text: Yeah. So you didn't see combat?
- speaker: Respondent
  text: Just watched them drop bombs on Vietnam was the only combat that we saw. I saw a fight in the chow hall one time.
- speaker: Respondent
  text: I saw a fight in the chow hall one time.
- speaker: Interviewer
  text: So you weren't ever captive?
- speaker: Interviewer
  text: That's good. Did you know anyone that was?
- speaker: Respondent
  text: No. I -- I -- not in Vietnam, no.
- speaker: Interviewer
  text: Did you serve in another?
- speaker: Respondent
  text: No, no, no, no.
- speaker: Respondent
  text: No. Just Vietnam was enough.
- speaker: Interviewer
  text: Okay. What was the food like?
- speaker: Respondent
  text: Again, I was in the Air Force. Our food was great, you know, it really was. We had -- we had really good food.
- speaker: Interviewer
  text: Good for you.
- speaker: Respondent
  text: The other branches of the service, when they would come around, they would want to come to our chow halls because
    our food was good, you know. Marines ate K rations and C rations and stuff; and they just, you know, they weren't real
    good; but our food was great. We had hot meals, you know. We didn't have to go through any of that kind of stuff. We had
    hot meals all the time.
- speaker: Interviewer
  text: Was there anything you did for good luck?
- speaker: Respondent
  text: Oh, you know, I think -- I don't know about good luck. But I think that being away from home and stuff, I think maybe
    you look for spiritual guidance and stuff a little bit more than you would normally when you are home and stuff. So that's
    not a "luck" thing; that's something I think that maybe you're brought up with, so...
- speaker: Interviewer
  text: So you went in with faith and kept that faith while you were there. That helped you get through it?
- speaker: Respondent
  text: I'm sure -- I'm sure it did. You know, when things that maybe we thought were a little hard times and stuff like that,
    sure, you pray for that.
- speaker: Interviewer
  text: What did your parents think about both of their sons being in the service?
- speaker: Respondent
  text: You know, now, that's a real interesting thing. Again, since I have a twin brother, I went in, in 1968 and got out
    in 1972. My father died in '68 while I was in Thailand, so they brought me home -- my brother -- because my father died.
    My brother went in, in 1969. He should have never had to go. And had he went in the service, he should have never had
    to go into Vietnam into the war time because he would be the sole surviving son at that point; and since I was in a war
    atmosphere, he should have never had to have been in there. Probably knowing that, he still would have went in anyway.
    I think that, at that point, even though that was during the time when war was not a real popular thing, we both felt
    that, you know, it was our duty to go in the service. So he went anyway, even though he didn't have to.
- speaker: Interviewer
  text: He didn't have to but he went.
- speaker: Respondent
  text: Probably had he even mentioned a protest of it, he probably wouldn't have had to go; but he didn't say a word about
    it.
- speaker: Interviewer
  text: Shows good character on his part. You said you have some photographs. Who are the people in the photographs?
- speaker: Respondent
  text: Just -- just friends and -- and people I met. I was very lucky in the places I went. I was able to go off base; and
    it wasn't like we were going to be harmed; and so I got to meet the native people in Thailand and Taiwan and got to go
    around with, you know, to real Thai restaurants in real Thailand, which was still Thai restaurants and just get to know
    the culture of the people. So I've got a lot of pictures of those -- a lot of friends, buddies when I was in the service,
    you know, that I worked with, got pictures of them, a lot of pictures of the scenery that a lot of people don't get to
    see, you know.
- speaker: Interviewer
  text: What organizations do you belong to? I see Post 1031, VFW.
- speaker: Respondent
  text: This is VFW. VFW is the Veterans of Foreign Wars. You had to have served in a foreign war to belong. So I am a passed
    commander; my brother's a passed commander, 11 years after I was commander, as a matter of fact. I tell him about that
    all of the time. We are also both Cooties, which is the honor degree of the VFW. That started back in POW times back in
    World War II where the Cooties motto is "closer than a brother." The similarity all Cooties had was that they all had
    lice, and that's why they named them Cooties. Cooties are called lice, and they all had lice; and so, therefore, that
    became the honor degree. And our organization is called the Cooties, much like the Masons, I think, have Shriners and
    the K of P have doagies (ph.), we have Cooties, so...
- speaker: Interviewer
  text: So you keep in touch with the people you were in the service with?
- speaker: Respondent
  text: Yeah, to a degree. And that's another thing. The Air Force doesn't have reunions as much as --
- speaker: Interviewer
  text: The Marines?
- speaker: Respondent
  text: Yeah. The Marines. As a matter of fact, I have gone to some of my brother's reunions. And they really are -- I mean
    they were -- they're just a group. Marines always stay, you know, stay together; and they always have reunions and stuff;
    but we don't do it.
- speaker: Interviewer
  text: Okay. So you are happy you went? You are satisfied with your service?
- speaker: Respondent
  text: Sure, sure.
- speaker: Interviewer
  text: We thank you for that.
- speaker: Respondent
  text: Sure. Thank you. I tell my brother all the time -- and I'm sure he's saying this in his interview as well. I tell
    him -- and -- as well as the other Marines -- I said, you know, the only thing in my life I ever really wanted that I
    was never able to attain is I wanted to be in the Marines; and they found out my IQ was a little too high; so they wouldn't
    take me. And I tease him about that because, you know, the Marines are the first in, you know, and a lot of times the
    last out. So it's a lot of fun to tease; and they all take that as a joke because they are also a group of individuals
    who believe that everybody who served is -- that they are all the same, so...
- speaker: Interviewer
  text: What did you do when you came home, what sort of career did you go into?
- speaker: Respondent
  text: Well, you know, my first job, my first real job, I was a -- I started driving a beer truck, which was kind of neat;
    and I worked my way up. And I became a general sales manager of a beer distributorship in Springfield. And it got to be
    a little bit too much like New Year's Eve every night, so I decided I should go to a different career on that. So I started
    working for -- at that point it was called the welfare department, became the human service department; and now it's called
    the job and family services department -- and became a director with children's services, adult protective services, and
    all the giveaway programs, and finished my career up in Carroll County in northeast Ohio as director.
- speaker: Interviewer
  text: Did you use the GI Bill?
- speaker: Interviewer
  text: Did you use the GI Bill for any education?
- speaker: Respondent
  text: I did, I did. And I went to a great university called Clark State in Springfield, Ohio. I didn't graduate. I have
    -- I've got probably a lot of years, probably two and a half years but not enough to really put it together toward any
    type of degree; but I learned an awful lot. And I really believe that. I say this not because you guys are from Clark
    State, but it was a great institution at that point. It was pretty young at that point. But that's my college education.
    It was enough to get me a really good job with human services too, so...
- speaker: Interviewer
  text: Did your military experience effect how you feel about war?
- speaker: Respondent
  text: No. I think probably then I -- I -- I felt that it was something that we were in; and I should be a part of it because
    of, you know, everything this country does for all of us. And now I still think it's probably a necessary evil. A lot
    of people don't believe we should be where we are today in the Middle East, and, you know, there is a lot of talk about
    weapons of mass destruction. Whether they were there or not, I mean, we were really upset with the Germans and the genocide
    that they did with the Jewish people; and Saddam Hussein did the same type of thing with his people. I think that we probably
    need to be there. I am not sure it's a war that we can -- that we can win because people have been fighting since way
    before Jesus; and they are probably going to be fighting way after we are all gone from this Earth.
- speaker: Interviewer
  text: Did you keep any kind of a diary, a personal diary? Did you write about your experiences?
- speaker: Respondent
  text: No. Other than letters I wrote home that maybe I was able to get when I came back, but no.
- speaker: Interviewer
  text: You kept the letters?
- speaker: Respondent
  text: No. If someone gave them to me, you know.
- speaker: Interviewer
  text: Okay. Did it effect your life in a good way or a bad way?
- speaker: Respondent
  text: I think it was an honorable thing to do. I think that -- it's my opinion that everybody -- men, women, and children
    should all have to go in the service for at least two years. I just, I think it helped me grow up a lot. It was a good
    -- it was a good experience, a great experience for me, I think. And I spent four years, and I do not regret a day of
    it.
- speaker: Interviewer
  text: Are you a family man?
