collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted or were you enlisted?
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: You were? Where were you living when you were drafted?
- speaker: Interviewer
  text: Where exactly in Vietnam did you go?
- speaker: Respondent
  text: I was in Saigon, My Tho, Can Tho, Cambodia, Laos -- mainly the area of operations was south of Saigon.
- speaker: Interviewer
  text: Do you remember arriving and what was it like in Vietnam?
- speaker: Respondent
  text: I remember arriving in the plane as it come down and -- I don't think it was fear. I think there was a lot of apprehension
    about what was going on because you'd never been shot at. You didn't know what to expect.
- speaker: Interviewer
  text: So the war had already started when you got there.
- speaker: Interviewer
  text: What was your main job assignment?
- speaker: Respondent
  text: I was a platoon leader, a company commander and a recon company commander.
- speaker: Interviewer
  text: Did you ever see much combat.
- speaker: Respondent
  text: I was in combat the whole time I was there.
- speaker: Interviewer
  text: Do you remember any things about the combat that just stuck out to you?
- speaker: Respondent
  text: Nothing pleasant.
- speaker: Interviewer
  text: Were you a POW?
- speaker: Respondent
  text: No, I was not.
- speaker: Interviewer
  text: Were you awarded any medals or citations and how did you get them?
- speaker: Respondent
  text: Yes, I was. I was -- was awarded several medals. I've been awarded the Silver Star, the soldier's medal, a couple
    Bronze Stars, a couple Purple Hearts for being shot. I went to a ranger school, jump school, before I went to Vietnam,
    so --
- speaker: Interviewer
  text: What rank were you when you went into Vietnam?
- speaker: Respondent
  text: When I first went to Vietnam I was second lieutenant.
- speaker: Interviewer
  text: What did you do to get the Silver Star? How do you get the Silver Star?
- speaker: Respondent
  text: I considered doing my duty. Somebody wrote it up. We were attacked. I flanked the attacking bunker and killed the
    people that had our company pinned down.
- speaker: Interviewer
  text: Did you stay in touch with your family very much?
- speaker: Interviewer
  text: Did you always have the supplies and utilities needed?
- speaker: Respondent
  text: No. When we went out on recon, we were pretty much on our own.
- speaker: Interviewer
  text: What did you have?
- speaker: Respondent
  text: We had ammunition. I did not carry MREs or food rations or C-rations or anything with me. They just weighted you down.
    We ate what the Vietnamese ate and drank their water. The main thing we were interested in is making sure we didn't run
    out of ammunition.
- speaker: Interviewer
  text: Do you remember any particular humorous events that happened?
- speaker: Respondent
  text: I had one that stands out in my mind that I would never forget. Our base camp was being mortared one night.
- speaker: Respondent
  text: And the enemy was walking the mortars in down the road going through the base camp. And one of the other company commanders
    had come out of the field and had just a tad too much to drink. And he was running down that road and the mortars were
    going off, and he got to the cottage that we were taking shelter in and he couldn't find the door. He was running in circles
    around the cottage while the mortars were still being walked in. One of us had to go outside and get him. And I swear
    it was the funniest thing I'll never let him forget.
- speaker: Interviewer
  text: Did you ever play any pranks on people while you were in Vietnam?
- speaker: Respondent
  text: No, sir. That was not a place to joke.
- speaker: Interviewer
  text: Do you recall the day your service ended?
- speaker: Respondent
  text: I came back from Vietnam in the spring of 1970.
- speaker: Interviewer
  text: What did you do in the days and weeks after the war?
- speaker: Respondent
  text: I was a VIP officer at Fort Benning on the general staff working for the commanding general at Fort Benning.
- speaker: Interviewer
  text: Did you go back to school?
- speaker: Interviewer
  text: What did you think of the officers or soldiers that were in your company?
- speaker: Respondent
  text: I thought we had some truly outstanding individuals.
- speaker: Interviewer
  text: What did you go on to do as a career after the war?
- speaker: Respondent
  text: Tried to forget about it. No. Mainly I tried to forget about it. It's not something that I know anybody wants to talk
    about. Got involved in heat and air condition, married into a family that did that, and that's pretty much what I've been
    doing ever since.
- speaker: Interviewer
  text: Did your military experience influence your thinking about war or about the military in general?
- speaker: Respondent
  text: Yes, it did. I honestly feel like the soldiers that we had at that time were more motivated, more dedicated than what
    they are now. Then again, you always have to remember that wars are designed for young people because you have to have
    a feeling of total -- like nothing can hurt you. If you don't feel that way, then you don't have any business trying to
    fight a war.
- speaker: Interviewer
  text: Did you ever join any VFW programs?
- speaker: Respondent
  text: Yes, I have.
- speaker: Interviewer
  text: In that veterans organization what kinds of activities does your post or association have or had?
- speaker: Respondent
  text: I don't attend a lot of the activities. I am a member of the DAV and the VFW both. I find out that most of their activities
    center around drinking at the location, and that's not something I'm interested in.
- speaker: Interviewer
  text: Did your service and experience affect your life in any way?
- speaker: Respondent
  text: Yes, it did. And it -- it's been a long time. It was a lot of memories that were very hard to suppress over the years
    that finally reached a head, I guess you would say, and everything has finally been resolved now -- what? This is '93.
    I've been back since '70, and I just now have resolved all of the consequences from suffering from Agent Orange and all
    the diseases it has given me. I am a real bad diabetic based on Agent Orange exposure. And there's several other diseases
    that Agent Orange has caused, cardiovascular disease, every one of them that affects my health, my life, every day. But
    if I had to do it all over again, I would go serve my country and be proud that I was there.
- speaker: Interviewer
  text: Is there anything you'd like to add that we have not covered in this interview?
- speaker: Respondent
  text: No, but I feel like the Army is a very good experience for young people in learning discipline and motivation. There
    is always the consequences that you will go to war. I would hope that our young people don't have to go to another serious
    war again, but -- I feel like the interview was very well put together and organized. Brian handled the questions in a
    most professional manner.
- speaker: Interviewer
  text: You got one more question. When you were drafted, did you get to pick the branch you went into?
- speaker: Respondent
  text: No, sir, I did not. When I was drafted, that's a story in itself. They told me that I was noncombat qualified based
    on my vision. I was slated to go to ordnance OCS in Aberdeen in Maryland. And when I went out to California for AIT, they
    gave the orders to come back to Fort Benning to go to OCS. And I told them, I said, "There has to be a mistake because
    I know Fort Benning is infantry." And they told me, they said, "Well, they'll straighten it out when they get there."
    And it never was straightened out. I had a medic ask me if I could see with my glasses on, and when I said yes, he stamped
    it combat qualified and said I was good to go.
- speaker: Interviewer
  text: What does OCS stand for?
- speaker: Respondent
  text: Officer candidate school, probably one of the hardest schools I've ever been to in my life.
- speaker: Interviewer
  text: What did you do at the school?
- speaker: Respondent
  text: They teach you military tactics, leadership abilities, and basically they try to break you as hard as they can to
    make you crack under pressure. And if they can do that, they know that based -- you know, in the future, when you're an
    officer and have to make a decision, you probably will not be able to make the right decision. So the whole program is
    designed to make you quit.
