turns:
- speaker: Interviewer
  text: Where were you living in 1941?
- speaker: Respondent
  text: Okay, 1941. It's a pretty hard story to tell, because I was moving so fast back and forth. Anything I say isn't going
    to bother me, so I'll go ahead and say it. When I was one-and-a-half years old, my mother took off with my dad's best
    drinking buddy. And he gave me to an aunt in Pittsburg. The other three boys--brothers that I had--he sent to a home in
    New York, Port Jervis, New York, to be exact. That's where the--New York, New Jersey, and Pennsylvania join. And there
    was a glass factory there, which my dad was a glass worker, and he worked at the glass factory and put us in a--then they
    were called orphanages, but he paid our way, and it was--it was Catholic nuns, Sisters of Charity to be exact. The brothers
    were there until I was six years old. When I was six, my dad took me away from my aunt and sent me along with the brothers,
    because he wanted to keep us all together. So I was there until I was about 16. At 16 I--we went out, and my dad set up
    housekeeping for us, and that was in '38, and he died in '40. Our mother came back. Then I started my odyssey between
    Port Jervis, New York, and Pittsburg, Pennsylvania, back and forth. When I went into the service, I actually went in from
    New York. I was working on the Union Railroad repairing boxcars and coal cars, and at the time Jeeps were being made up
    in--well, they were being assembled in Buffalo and a couple other places, and we had to make the two-by-four planks that
    they--that they set the drive trains, transmissions on. So I was doing that when I went in. Before I went in on the Sunday--well,
    December 7th, I was--I was working in the--supposedly working in the yard, but it was a Sunday, and the yard didn't work
    on Sunday. However, I had started out as a night watchman. They started everybody out as a night watchman for their first
    job. And it was more of a psychological deal. They didn't beat drums, wave flags, or anything like that. They put you
    on as a night watchman, and you learned that you were there for a reason. So they had called me back on that Sunday at--that
    Sunday afternoon. They said, well, I had to go back as a night watchman for a day or two, and that's the only reason--the
    only way I learned--or it sunk in that the Japanese had attacked Pearl Harbor. I know before then we--I don't know if
    you've talked to other people that--we had an inkling that FDR wasn't playing pool the right way. We thought that he knew
    more than what he was letting the people on, and I had always had the feeling that we were conned into that war. It was
    going to happen anyhow, but we were kind of conned into it. As I said, we didn't have to be urged on because they did
    everything psychologically. I can remember even when I went into the service--
- speaker: Interviewer
  text: When did you go into the service?
- speaker: Respondent
  text: I went into the service in October--no, it was November of '42. I talked my boss into letting me loose, and I--what
    I did I got on the--I had a pass on the railroad at the time. I went down to--I had to go to New York City. That was the
    closest recruiting office. It was in Grand Central Station. If you've ever been there, there's a great big concourse where
    all the people from the Long Island Railroad come running down the steps. Well, underneath the steps was a recruiting
    office. I went in, and I told them that I was going to enlist, which meant that I could pick my service. I could pick,
    supposedly, anything that I wanted. The guy said, "Fine." I started through the line. He said, "Well, what do you want?"
    I said, "Well, my brother is in the field artillery. I want the field artillery." I got to the end of the line, and some
    guy with a big stamp--he had a bunch of rubber stamps in front of him, bang, US Army Air Force, unassigned. I said I didn't
    want the air force. He said, "Oh, yeah," he said, "today is air force day." He said, "You'll like it. Don't worry about
    it." Well, as it turned out, yes, the air force then was a very elite part of the army. I mean, it--we didn't pull guard
    duty; we didn't pull KP. The only time we did pull guard duty was when we were the corporal of the guard or something
    like that. I went in--was it--yeah, it was November. I got sent to Camp Upton, which Irving Berlin wrote, Oh, How I Hate
    to Get Up In the Morning, and they--I mean, this was a world away, but they played that every morning, but I went from
    there--I was there for about two weeks, and then they decided to send me to Pittsburg, California. They sent me alone
    out to Pittsburg, California. I walked into the base out there, threw my papers on the desk, and the guy says, "What are
    you doing here?" and I says, "They sent me out here for basic training, I guess," and he said, "No; no. You belong back
    in Atlantic City." I go back to Atlantic City. I got to Atlantic City, and we did our basic training in Atlantic City
    where were stayed at the--well, they took out all the good furniture at the Claridge Hotel, and they put us in the hotel,
    because the army air force then had taken over the boardwalk, and we did our marching on the boardwalk. We did our calisthenics
    at the old double A or whatever it was baseball field, and, of course, as we'd marched, we'd sing, and some of the songs
    were a little bit risquè.
- speaker: Respondent
  text: Yeah, and these little old ladies were sitting there on the boardwalk with _____+, but from there they sent me to
    Chicago, and they put me in the Hotel Sherman, another nice hotel, but they had taken all of the stuff out. I was there
    for about a week, and they decided that they had too many guys in this radio class that they were starting, so they sent
    me to Sioux Falls, South Dakota. Now, this is getting December. It's cold, and I went through radio school at Sioux Falls,
    and they took the top 10 percent of the class, and they didn't tell us what it was. They just said the top 10 percent
    of the class is going to be sent to Madison, Wisconsin. "What is it?" "Oh, it's advanced radio." "Okay." So we went to
    Madison. We were there for, oh, a couple weeks, and they said, "Well, the class will start next week in Boca Raton, Florida."
    So they sent me to Boca Raton. I get to Boca Raton, and they had us housed at the old P.K. Wrigley Club, which is now,
    I think, the golf club, and they had us housed there, and we did our calisthenics and everything else out in the Everglades,
    and we had survival courses in the Everglades. You name it. It was weird. And I finished my--I finished a class there,
    and they said, "Well, we don't have an airplane for you, or we don't have an outfit to put you in." "Why?" Well, they
    wouldn't tell us. Later we found out that they were installing radar in B-29s, and the set they had was an old AN, which
    is army, navy, APQ13, which was a 360-degree antenna radar, and for some reason it just wasn't--wasn't working in a 29.
    They were trying it over in the China Burma, and it wasn't accurate or--it needed--so they finally figured out that pressurized--everything
    in that airplane was pressurized except one compartment, which was behind the radar room. It was a sealed door, and the
    next room--the next opening was where the crew got on board, and there was an APU, which is an Auxiliary Power Unit, which
    was along track actually. It was a gasoline driven engine that supplied your power for the aircraft making you independent
    of ground power. That was unpressurized, but the radar unit being in the radar room was pressurized. The antenna for it
    was right below my seat, and that was a fiberglass dome which was pressurized, and eventually that turned out that worked
    pretty good. So we--I was in Lincoln, Nebraska, doing training on B-17s, actually, which didn't have radar. Then they
    sent me to Biloxi, Mississippi, which had PBYs, which had a sweep radar, which is forward, and what they used to do was
    they'd throw sleds in the water, and then they'd aim on them. I got that done there, and then they decided to be on a
    combat crew I had to be an aerial gunner, so they sent me to Tyndall Field, Florida. So I graduated from there, and the
    strange thing about that was my brother had gone--John, he had gone to Tyndall Field, and he was in Clark Gable's class
    before me, and he said Gable--the only story I heard from him about Gable was that Gable sat in the back of the room reading
    a book, and one of your big exams in aerial gunnery was they blindfold you, had the gun completely laid apart on a table,
    all parts separated, and then they would take the shear pin and stick it in their pocket, and you had to put the gun back
    together, and, of course, you couldn't find the shear. Anyhow, Gable sat back there, and he says he finished--he finished
    his assembly, turned around, and here's Gable reading a book. Clark had to be a gunner because he was an aerial photographer
    during the war, and I guess anybody that flew in combat had to know how to handle a gun.
- speaker: Interviewer
  text: Tell us a little bit--so we get it on tape--about the secrecy and their radar training.
- speaker: Respondent
  text: Oh, yeah, the radar training. Down in Boca Raton we used to go to class every morning, and you went through a barbed
    gate, and you stayed in class. When the class was over, when you walked out, they searched your pockets. They went through
    the whole bit. They never told you why. They just searched your pockets. You were not supposed to take anything into town,
    because they did let us go to Delray Beach, which was the biggest town close to Boca, and we used to go to the bars in
    Boca Raton at night, and we'd be sitting there, and a civilian would come over and start talking to you, and pretty soon,
    "Oh, you are from Boca Raton." "Yeah." "Oh, yeah, we know all about that place out there," and then we would egg them
    on a little, and pretty soon the guy would start telling us stuff about radar that we didn't know. We were not called
    radar operators. We were called Mickey. Where Mickey came from, I don't know, but even in combat when the skipper would
    call back and he would say Mickey, I knew he was asking for me, so I would answer. But these people in Delray Beach and
    in Miami--we used to go down to Miami a lot to Kitty Kelley's. That used to be a nice bar or nightclub, and we--they would
    tell us all about how a radar set operates and this and that, and, of course, some of them had come out of MIT. They were
    college grads there. I guess they started working on radar probably in '38, '37, '38, back then, and these guys knew--they
    knew more than our civilian instructors did. Why we had civilian instructors, I don't know. I mean, most of them were
    civilian. The guys that were on permanent party, which was--permanent party was a guy that was--he usually was from that
    town, he enlisted, and he was an instructor or teacher, and they kept him there close to home, and he would actually go
    home at night if he wanted to, and he stayed at that base the whole time he was teaching class after class. Well, the
    trouble with the radar was--the radar classes were they didn't really teach enough classes to cover what they were getting
    into. So what happened with me was that I--I flew extra missions because of the shortage of radar operators, and I finished
    up before my crew did, and I was home when they were still running missions. My--we got our airplane. It was at Kearney,
    Nebraska. It was in November, cold. The procedure on the B-29 was before you started it up, you had to pull your prop
    through, ten--ten blades each engine, and on a cold morning when it's about eight or ten below, that's pretty hard to
    do, but that's the way we started them up. We--
- speaker: Interviewer
  text: Explain what is "pull your prop through."
- speaker: Respondent
  text: You pulled it through--you pull it blade by blade through to get the fuel up into the--
- speaker: Interviewer
  text: All right. Okay.
- speaker: Respondent
  text: Yeah, and we went from--Kearney is where we picked up-- where Boeing delivered the airplane. When we got the airplane--this
    was the Z Square 30, The Constant Nymph. When we got it, it had a 175 play hours on it. Johnny Reeves, the skipper, didn't
    know what the flight hours were, but he just said the log book showed 175 hours. We flew it to Walker Field, Hays, Kansas.
    Hays is right-there's Hays, and then the airfield, and then Russell where Dole is from. Well, we always went to Hays.
    That was the bigger of the two towns, but we sat right between them. We did our training there, and most of the training
    there was--we didn't know where we were going. We knew that we had an airplane that was capable of going 3200 miles or
    a little more, and we didn't know if we were going to Europe, Asia, wherever, but they used to fly missions--simulated
    missions from Hays, Kansas, Walker Field, to Cuba or to New York City or to Montreal, and these were all roundtrip. I
    mean, no landing in New York or Cuba. Once in a while we'd--Hays was dry at that time. It wasn't prohibition, but it was
    dry. So we used to fly booze missions to Chicago, Minneapolis. There's an old--it's an old military custom. I guess it
    came from the days of the grog, the navy grog. That the sailors were given a grog a day or whatever it was. This kind
    of stayed--stayed on as tradition in the air force, and once a month, officers were given a fifth. Each officer got a
    fifth of whatever you wanted, and Bob Ray, the guy I hung around with mostly, and he's an officer. I wasn't supposed to
    be hanging around with officers, but this was a crew. We could have cared less what other people thought. In fact, I have
    a story on that. We were down at San Antonio, Texas, on what they call a RON, Remain Overnight, and we were horsing around.
    Of course, I'm wearing the sergeant stripes at the time, and he's wearing--I think he had flight officer bars at the time,
    and I pushed him or he pushed me. We went up against a building or windows right outside the White Rose Hotel in San Antonio,
    and this guy from Fort Hood, a colonel, a bird colonel, came over, and he started to read me up and down, and he was going
    to have me court marshaled and this and that and this and that, and the skipper walks over. We called him J.B. His name
    is John Reeves. J.B. walks over and asked what was going on. Of course, he knew because we were all together, and the
    guy told him--he says, "He's assaulting an officer," and the skipper just told him to go pound salt, go back to Fort Hood,
    do whatever he wanted to, this was a crew, and this crew was its own army, and from that time on we knew that we were
    11 guys that were--it was our own army, but we did operate under the rules and regulations, and you had to be that way
    in any combat crew o
