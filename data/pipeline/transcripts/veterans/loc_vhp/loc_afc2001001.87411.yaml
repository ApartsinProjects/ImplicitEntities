turns:
- speaker: Respondent
  text: Actually, I enlisted in -- when I was in high school in 1944 as a junior but I -- I was formally enlisted and they
    called me on my 18th birthday which was '45.
- speaker: Respondent
  text: Yeah. Active duty.
- speaker: Interviewer
  text: Okay. Yes, sir. We're going to go --
- speaker: Respondent
  text: And when they called me, I had a pilot's license.
- speaker: Interviewer
  text: We're going to go -- I want to hear about how you got that, eventually. But so -- so as the first question, can you
    just state your name and your address for the record?
- speaker: Respondent
  text: Okay. It's Donald Adolph Adam. 4917 Ravenswood Drive, Apartment 800, San Antonio, Texas.
- speaker: Interviewer
  text: That's -- I think that's good.
- speaker: Respondent
  text: You want the formal address number? You need -- you need that?
- speaker: Interviewer
  text: What is that there, the --
- speaker: Respondent
  text: 4917 Ravenswood Drive.
- speaker: Respondent
  text: That's this building. Apartment 800.
- speaker: Interviewer
  text: All right. Zip code 782 --
- speaker: Respondent
  text: 78227. Yeah.
- speaker: Interviewer
  text: -- 78227. Got it.
- speaker: Respondent
  text: Okay. You got that?
- speaker: Interviewer
  text: Yes, sir. Okay. So -- so start from the beginning. Where were you born, sir?
- speaker: Respondent
  text: I was born in a town of Waukesha, Wisconsin. It's an Indian name.
- speaker: Interviewer
  text: And tell us a little bit about that. Who were your parents? What did they do? What were their names?
- speaker: Respondent
  text: I came from a beer-making family. My -- my mother was Frieda Hois, daughter of Adolph Hois, who was a brewmaster.
    And my father was Albert Adam, one of six sons of Anton Adam's family in New Ulm, Minnesota. And the brewmaster was moving
    across the country and he moved to -- from Wyoming to New Ulm, Minnesota because it was a famous German-settled town by
    one of my forefathers in the time of the civil war. And he came to that brewery. And he, of course, being a super German
    brewmaster, he had his own formula. And then he was invited to the brewmaster's annual convention which takes place in
    Milwaukee, Wisconsin and he went there and he liked what he saw. So he took my father with him, because my father had
    married his daughter. And then he liked what he saw and he told him to -- "You call her and bring her down here." And
    she was pregnant with me and she came down and they got a house and moved in. And he ran the brewery there until he retired,
    and did a superior job. My father worked there for him and we, as children, worked there also as children because in --
    it's a German custom that you do five years of apprenticeship. So the grandfather and the father were going to groom us
    to become future brewmasters. So as we were growing up we did things other than mowing lawns and shoveling sidewalks.
    We did petty jobs in the brewery.
- speaker: Interviewer
  text: What -- what kind of work do you do as a brewmaster apprentice?
- speaker: Respondent
  text: As a -- well, as a brewmaster you actually brew the beer in a copper kettle.
- speaker: Respondent
  text: But the title of the -- of the man, he now physically no longer puts the ingredients in as he's cooking it in the
    copper kettle, he oversees it to make sure that the -- because the brewery was -- the -- the kettle was 250 barrels so
    he makes sure that it's -- it's proper because all of these materials don't want to be wasted. So we -- my brother and
    I literally grew up in the brewery doing odd jobs because they were grooming us to become future brewmasters. And to become
    a brewmaster, that's one of the last old German occupations that's honored here in the United States that you have to
    have a five-year apprenticeship before you take your exam to become a brewmaster. All German jobs you have to do a five-year
    apprenticeship before you're -- you get the title of being a chief in your job.
- speaker: Interviewer
  text: What was the name of the beer?
- speaker: Respondent
  text: The name of the beer was Fox Head.
- speaker: Interviewer
  text: Is that -- is that still around or --
- speaker: Respondent
  text: No, it closed down. It was Fox Head.
- speaker: Respondent
  text: And then my grandfather added another name to it called the Fox Head 400. And it was a very good beer, a very popular
    beer. And it improved the size of the brewery and the shipments and, of course, the salaries went up because he was successful
    with it. And my brother was groomed to take over and I was groomed to -- to take over also. But then I had an airplane
    ride and the brewery flew out the window. And I -- I begged my mother to sign a paper that I could take flying lessons
    because my father was a rugged old German who did not have a -- a high school education and he had only one answer for
    us and it was always no. And if I asked him if I could take flying lessons it was an automatic no.
- speaker: Interviewer
  text: Well, what --
- speaker: Respondent
  text: So I -- I hounded her until she became almost crazy and she signed it so I could take lessons below the age of 18.
    But she said, "Be sure that nothing happens to you because if it does you know what he's going to do to me for letting
    you fly." So I was very careful. And I did get a pilot's license.
- speaker: Respondent
  text: And when I went into the service and I was called, because I volunteered when I was in high school in my junior year
    and they accepted me, was during World War II. And there was a big demand for pilots in 1944 because we had a big pilot
    shortage because the Germans were beating us up over there in the air. So they were coming to the schools and the colleges
    encouraging people to become pilots. And I joined that group and I got a ride and I -- I learned to fly and I paid for
    it with all of the money that I made doing after school jobs without my father knowing it. And I got the -- when I came
    into the service I already had a pilot's license.
- speaker: Interviewer
  text: Well, let me take you through each of those and kind of unpack each of those a little bit.
- speaker: Interviewer
  text: So at what age -- it was below 18. What age did -- what got you interested in flying and what age was that? What sparked
    your interest?
- speaker: Respondent
  text: I was a junior in high school. And because there was this demand for pilots, the Army had sent to our home town --
    there was a Carroll College, it's now a university -- they came to Carroll College to recruit people for flying duty in
    the Army Air Corps. And they were looking, of course especially at athletes who were very healthy. So when they came there
    to induce them even more than just talking about it, they made an arrangement with the local county airport, which had
    training Piper Cubs, that they would have that Piper Cub training company use their instructor pilots to give certain
    high school students a ride in the back seat that had never had a ride in an airplane before.
- speaker: Respondent
  text: I wasn't eligible, I was a junior, but I went along with my brother. And he said, "You can't come because you're a
    junior." I went anyway. Persistence. So then I was behind him and it was his turn. They took him and they put him in the
    back seat and they gave him a ride. And when they gave him a ride he made a -- because he was very athletic, he made a
    fast turn and my brother threw up. And, of course, it smelled up the airplane. So when he landed he had to clean that
    up. And then after he cleaned it up then he said, "Okay, it's now your turn to fly." And so I went in and I sat in the
    back seat and he took off. And he said, "Is there anything special that you want?" I said, "Yes. Would you fly over our
    city?" It was a town of 20,000 feet [as spoken]. In the center of town, five roads came together in the center of the
    town and, of course, it was nicknamed five points. I said, "Would you fly over five points at a couple hundred feet and
    dip the wing 90 degrees so I can look down like the movies and see it likes it's a picture taken from an airplane of the
    center of the city?" So he did that. And I didn't get sick and I looked and I liked it, and I liked the ride. And he gave
    it a couple of whips and it didn't affect me physically. And I was hooked. So then it wasn't a question of yes or no,
    but how soon. And I started to fly. And when I was called to service at 18, after -- I had volunteered before and they
    accepted me, but they waited until I finished school and had my 18th birthday. And when they called me in to service,
    I was already in possession of a pilot's license.
- speaker: Interviewer
  text: What kind of plane did you train on for your pilot's license?
- speaker: Respondent
  text: I took the test in a Piper J3, that test. But then when I got a commercial test I took the test in a larger airplane
    in Milwaukee because for a commercial license, you know, that goes on to include passenger carrying.
- speaker: Respondent
  text: And it was a large -- it was a Stinson. It was a Stinson airplane. And I had to go to Milwaukee because we didn't
    have a Stinson at our airplane [as spoken]. And he gave me a test ride in a Stinson and an instrument approach, and I
    passed that.
- speaker: Respondent
  text: And I loved to fly and -- very anxious. And then, of course, I -- I had -- was still on the list to be called. And
    the requisites were you had to have at least two years of college. So I was on their list. And at two years of college
    they called me to come in and I came in. And then again, I was different from most everybody else. There was a notice
    on my coming in that there were to be no motorcycles because the pilots in the class ahead of me, one graduated -- the
    class graduated at Randolph and a certain number went out to Phoenix to fly the first jets, the F80. And on the way out
    there, two of the pilots were riding a motorcycle from here to El Paso and it was at night and they hit a cow and they
    were killed. So the Air Force said -- Army Air Corps said, "There will be no more riding of motorcycles during pilot training."
- speaker: Respondent
  text: Because they spend all that money on you, you learn how to do telegraphs, teletype --
- speaker: Respondent
  text: -- and six months of weather and all of that costly instruction, including flights in AT6s. They don't want you to
    go out and bust your rear end on a motorcycle.
- speaker: Respondent
  text: So I was not supposed to ride a motorcycle. However, when they called me, I rode my motorcycle from Milwaukee, Wisconsin
    to Waco, Texas in two days. And --
- speaker: Respondent
  text: -- I made it -- I made it okay. But because that voltage regulator was going like this [indicating] all the time,
    between someplace in Missouri and the Texas border, my light for the electric voltage regulator came on which meant that
    the voltage regulator was going like this [indicating] for -- for two days, two long days. And it burned out but, fortunately,
    I was at that first city at the Texas border and when I -- but I was running on the battery to charge the -- the spark
    plugs. So there, fortunately, was a Harley Davidson repair shop. And I pulled in there and within a few minutes he put
    in a new voltage regulator and for five bucks I was on my way. And I rode the motorcycle down to Waco, Texas, and that
    was a very long ride. And I rode it safely. And because I wasn't supposed to ride one, I went to a garage in town, I spent
    a night in a hotel and I parked it. I said, "Can I park it here for $5 a month?" Said, "Yes." So I wasn't supposed to
    ride it. If -- if I rode it, I would have been kicked out but they -- they didn't catch me. But I was very careful with
    it. I didn't ride it around so people could see me, recognize me and report me. If they reported me I would have been
    out of training. But I made it.
- speaker: Interviewer
  text: So -- so tell us a little bit about -- I think people would be curious about the training that the Army Air Corps
    had for the --
- speaker: Interviewer
  text: -- you know, the first generation of pilots. So they called you up. And you came --
- speaker: Interviewer
  text: -- to Randolph? Is -- is that where --
- speaker: Respondent
  text: No, I went to Waco.
- speaker: Interviewer
  text: Waco. So the --
- speaker: Respondent
  text: Yes. I went to Waco.
- speaker: Respondent
  text: They were training at Randolph and Waco, and they were training at another base in Oklahoma for multi-engine pilots.
- speaker: Interviewer
  text: How -- how did they train you? What -- what -- what planes and --
- speaker: Respondent
  text: On the AT6.
- speaker: Interviewer
  text: -- what was the process? Okay.
- speaker: Interviewer
  text: And was there like a -- was there the equivalent of a boot camp process or basic military training?
- speaker: Respondent
  text: That -- that -- that A1 Skyraider is an AT6. That's -- that's a similar airplane.
- speaker: Interviewer
  text: And how -- how did they do the training? Is it -- how long does it take?
- speaker: Respondent
  text: That training took --
- speaker: Interviewer
  text: Take us through that process.
- speaker: Respondent
  text: -- that training took -- good question. That training took eight months and then your advanced training took four
    months, because in advanced training -- and again, that was a sham. I was in the sham class of the history. The worst
    class to graduate in the history of U.S. aviation history. We had the most fatalities, the most incidents, the most accidents,
    the most dropouts. It was one of those things. But it was the fault of the training corps command. They insisted when
    they got together, the bosses, on discipline. Discipline. And they went overboard with the discipline. Because in this
    eight months at Waco we were not allowed the first months to look out the window. That was to let lights in. You could
    not talk on the telephone. You could not talk in the shower. You could not read a newspaper. When you ate, you had to
    eat square meals. And what they were trying to do was get the guys out of there that didn't want to go through that discipline.
- speaker: Respondent
  text: Because -- and the dropout rate was very, very heavy. And you had to have at least a -- well, you had to have four
    years of a college education or two. I had two, but then I had previous service. But that was the worst class in aviation
    history with the most fatalities, the most accidents, the most incidents. And I graduated in the top percentile of the
    class.
- speaker: Interviewer
  text: So did any of that bother you at all? Was that --
- speaker: Interviewer
  text: Did you handle the discipline well?
- speaker: Respondent
  text: No. Because I wanted so it bad that nothing was going to deter me. And guys were killed in front of me and while I
    was in the air and I didn't have any serious incidents, but I was blessed. My civilian training was a help because --
    but, of course, these AT6s were more complex and they were heavier. But then again, we had such a high accident -- accident
    rate, this came back to haunt us, too, and that was also a mistake. And that's good for history. Because I took my advanced
    training at Las Vegas and it was in the P51. And they knew
