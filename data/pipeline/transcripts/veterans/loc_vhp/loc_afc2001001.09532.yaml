collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Which branch of Service did you serve?
- speaker: Respondent
  text: Marine Corps.
- speaker: Interviewer
  text: What was your highest rank?
- speaker: Interviewer
  text: And where did you primarily serve?
- speaker: Respondent
  text: The South Pacific.
- speaker: Interviewer
  text: You served during World War II and we just wanted to know, were you drafted or did you enlist?
- speaker: Respondent
  text: I was drafted into the Service, but I enlisted in the Marine Corps.
- speaker: Interviewer
  text: Okay. And how did you choose to join the Marine Corps instead of any of the other branches of Service?
- speaker: Respondent
  text: Well, that was a rather peculiar situation. It seems as though the other branches of the Service had more in line
    and the Marine Corps had fewer in line to sign up. And that was the sole instigation there, that we were restless frame
    of mind, that was drafted at the same time, so we chose the Marine Corps.
- speaker: Interviewer
  text: Where were you living before you joined the Marines?
- speaker: Respondent
  text: Sewanee, Tennessee.
- speaker: Interviewer
  text: And what were you doing, were you going to school or working? What were you doing?
- speaker: Respondent
  text: Going to school. Prep school. St. Andrews.
- speaker: Interviewer
  text: Do you remember your first days in the Service and kind of what you did, how it felt when you settled in?
- speaker: Respondent
  text: It was uncomfortable, to say the least. Everything was brand-new, but they didn't have to think what to do. You were
    told to do everything. You started out with that.
- speaker: Interviewer
  text: Okay. Um, what kind of boot camp or training experiences do you -- did you go through at the beginning of your service
    and how long were they?
- speaker: Respondent
  text: Eight weeks of training, basic training. I remember my drill instructor, DI, Platoon 380, Corporal Eisenberg, had
    wanted picturesque type of Marines with a swagger stick and all of the personality to go with it. And he made a permanent
    impression on me, and I might say a good impression, although at the time I didn't think so highly of him. Later I began
    to respect him.
- speaker: Interviewer
  text: Okay. Where was the first area that you served after boot camp or training or whatever?
- speaker: Respondent
  text: After basic training at San Diego, our outfit was formed in Camp Pendleton, Oceanside, California. 4th Division was
    reinforced, meaning that it was comprised of other units in the beginning. And green boots like myself were the last to
    join the outfit. We did have some seasoned personnel and that was...
- speaker: Interviewer
  text: Okay. When did you first start to see combat and where you were?
- speaker: Respondent
  text: First combat, that was from Camp Pendleton, after extensive training there, as a division, we boarded ship there in
    San Francisco and shipped to Roi-Namur in the Kwajalein group of islands in the South Pacific. We stopped by Pearl Harbor
    just long enough for I guess the brass to compare notes. None of the enlisted personnel got off board ship there. We could
    then see evidences of the attack. And that was way before our time.
- speaker: Interviewer
  text: What battles did you serve in?
- speaker: Respondent
  text: That Roi-Namur in the Kwajalein, and Saipan, Tinian, and Iwo Jima.
- speaker: Interviewer
  text: Were you awarded any medals or particular honors? And how did you get those?
- speaker: Respondent
  text: Well, first of all, were the Battle Stars that were awarded for the invasions, and we did get a Battle Star for the
    Saipan-Tinian invasion, which Presidential Unit Citation awarded, and things went off pretty well to Hoven. Expert rifleman
    and basic training, Purple Heart from Tinian. And that's -- that's the sum of it.
- speaker: Interviewer
  text: Can you tell me how you got the Purple Heart?
- speaker: Respondent
  text: Well, it was -- I can't tell you what morning, but it was a morning we had been entrenched or dug in, foxholed overnight.
    And the best I can remember, it was bordering an airstrip. We had come to a halt at that point at night and just getting
    up, getting ready to get underway, and I was struck by a piece of shrapnel from a mortar. I was evacuated and treated.
    And then I had to walk back to the outfit. So you can tell I wasn't too critically injured. Because, anyway, that was
    that.
- speaker: Interviewer
  text: So how many days was that?
- speaker: Respondent
  text: How many days --
- speaker: Interviewer
  text: How many days did you stay in the hospital?
- speaker: Respondent
  text: Oh, I didn't stay -- I went back to the aid station. I was evacuated to an aid station in a Jeep that was rigged up,
    stretchers and so forth. When I got back there, they -- the doctor looked at me and -- bound up and put on my way before
    he had -- he had more to take care of in that scratch, so to speak.
- speaker: Interviewer
  text: What were some of your memorable experiences of being in the Service? Did you ever get to tour the islands in the
    South Pacific while you were on leave?
- speaker: Respondent
  text: Oh, did I ever -- any -- well, Hawaii, I got a chance to go over one occasion. We were stationed on Maui. It's about
    60 miles from Hawaii, the big island. And while there, an officer came to me one morning, he said are there any of you'd
    like to go over to Honolulu and -- for R and R at the Royal Hawaiian Hotel. Well, there were about 21 of us that agreed
    to go. And he had appointed me as billeting NCO. And I didn't even know what the term meant, but I found the fellows'
    quarters on the LCI, landing craft infantry, and we made our way over there and set up. Of course, they had bunk beds
    in the Royal Hawaiian at that time, and -- but we had access to all the beach equipment. And it was a change, to say the
    least. But the only time -- the other time I was over there was to a gunnery school for antiaircraft. It was a naval school,
    but that wasn't for pleasure. That's the only -- now, I did have a chance on Maui, when we had what we call liberty, a
    few hours off, and go up to Wailuku, a little town, and -- or I'd go to the beach, even by myself at times, which is not
    a good idea, to swim. But I like the sun and I like the water, and many times I sought that refuge in between the -- a
    lot of things.
- speaker: Interviewer
  text: How did you keep in contact with your family back home? Did you write?
- speaker: Respondent
  text: Wrote. When I had the chance. Of course, address, their word to me, was the fleet post office. They didn't know where
    I was and I couldn't divulge that. And very little chance to write, in fact, but we had what we call email -- V-Mail,
    excuse me. We didn't have email in those days, and I still don't have, but V-Mail. And if anyone's familiar with that,
    all it is, is paper with -- in the form of an envelope and you fold it up. And, of course, you didn't require postage
    and that sort of thing.
- speaker: Interviewer
  text: Did you keep any journals or anything?
- speaker: Respondent
  text: No, I didn't.
- speaker: Respondent
  text: No, no journals.
- speaker: Interviewer
  text: Let's see. Did you have any kind of a good luck charm or anything like that, that you always carried with you?
- speaker: Respondent
  text: Not that I can recall. I had my dog tags. Even though I was in the Marine Corps, they called them dog tags.
- speaker: Interviewer
  text: Where all did you travel in the islands in the South Pacific?
- speaker: Respondent
  text: Where did I travel? Well, like I say, in the Kwajalein and Saipan, Tinian, and Iwo Jima. And what little time I was
    at Maui and what time I was at Honolulu. And that seemed to be the -- it.
- speaker: Interviewer
  text: What about the men that served with you, the friends that you still are in contact with today, can you tell me a little
    bit about any -- any of them?
- speaker: Respondent
  text: There aren't many left. We were very fortunate that there were those of us that did survive. There -- there's one
    fellow here in Chattanooga with whom I went through boot -- basic training. It was in a different company than mine, but
    I got to see him after each engagement. I always looked for him. We'd look for each other, to see if we were still kicking,
    you see. And then we had another friend that was over in another outfit and we'd all -- then we'd join and look for him.
    But as far as daily basis of knowing, this fellow's not in too good a health now and -- that's here in Chattanooga. The
    other fellow lives in Texas, and not enjoying too good a health, either. I very frequently -- maybe annually, I didn't
    this year, get to see the one that lives here in Chattanooga, at one of the Marine Corps or servicemen, veterans get-to
    gethers. That is Leon Lewis.
- speaker: Interviewer
  text: Okay. How many men were in your division or your battalion?
- speaker: Respondent
  text: Well, let's see. The 4th Division was about 17,000, to start with.
- speaker: Interviewer
  text: And when the war ended, how many were --
- speaker: Respondent
  text: I couldn't tell you. I have a bunch of disclosures.
- speaker: Respondent
  text: There weren't as many, put it that way. Because we -- as it is obvious, after each engagement, they had replacements
    to go out and train them and so forth before the next one. But we lost some and we gained some. But we lost more than
    we gained there for a long time, unfortunately.
- speaker: Interviewer
  text: Okay. Now, I want to ask you some questions about life after, after your service. Do you remember what day your service
    ended? Just any details from the day you got to go home.
- speaker: Respondent
  text: All I remember is from Maui we got aboard the Atlantic Craft Carrier II and we spilled out the 4th Division on the
    flat deck. There were enough to do that, of us. And the aerial photograph denotes that. All right. We got back to Camp
    Lejeune is where I was discharged, October the 31st, 1943. I don't remember what day, but I recall that it was October.
    Okay. I remember riding and the bus was crowded that I rode in. That day and time, the engine was in the back. I can still
    -- I had to ride right up over the engine and it got pretty hot. I had to lie down -- but I didn't -- it wasn't distasteful.
    I didn't really realize it that much because of the joy of going home.
- speaker: Interviewer
  text: What did you do after you got home from the war? Did you go back to school? Did you start working immediately?
- speaker: Respondent
  text: I entered the University of the South and was in attendance there when I met my future wife. Because it wasn't co-ed
    at the time, but summer school it was, for day students. And...
- speaker: Interviewer
  text: Okay. Was your education supported by the GI Bill?
- speaker: Interviewer
  text: Okay. We already talked about your close friendships. And are you still in touch with the men that you served with?
- speaker: Respondent
  text: Yes. Occasionally, yes.
- speaker: Interviewer
  text: Can you tell us about your reunions?
- speaker: Respondent
  text: Reunions. Well, of course, that's always a joyful occasion in many respects and a sad one in others, because there's
    always those that don't show up for one that had been noticed in the past, but it's always refreshing to know that we're
    still together in bearing the burdens of life, that we still appreciate, or I do, the fact that we expended ourselves
    so that we could do these things.
- speaker: Interviewer
  text: Did you guys have any kind of entertainment when you were over there?
- speaker: Respondent
  text: Well, I don't know about over there. Now, we'll get over here first. In California, liberty there, I chose to stay
    instead of we had a brief time for a furlough -- or not a furlough, but liberty, before we shipped over. But rather than
    they made it so -- paint such a picture of not getting back on time, the penalties, that I chose to stay over there. And
    while staying in California at Camp Pendleton, my friend and I, Otto, would go to Hollywood Canteen. And there we got
    to see at that time celebrities in the movie profession, you know, like Micky Rooney and Maria Montez, and all the fellows
    that played in the old cowboy movies and all that. I got about two steps of dancing with Maria Montez before somebody
    cut in. Anyway, I learned there that Micky Rooney was quite a drummer. He could play the drums. I didn't even know that
    before then. Not that that made any difference. Entertainment, we were jumping from the Hollywood Canteen, we were in
    Maui, and there was one of the orchestra leaders there, I can't recall -- it wasn't Tommy Dorsey. Anyway, I can't recall
    which one it was, but there was -- but we didn't have a whole lot of entertainment as such. So all the more reason I should
    have remembered who that was. But that's about it. Let's see. Well, they would have movies, project movies and so forth.
    And I'll never forget the blare of the Old Black Magic is what you'd hear in basic training. When you weren't busy on
    the run, that was always on the intercom or the loudspeaker. That was what, 19 -- that kind of stayed -- I'm trying to
    date the music, but that was the tune that played predominantly at that time. Okay.
- speaker: Interviewer
  text: What was the food like there? Did you eat --
- speaker: Interviewer
  text: -- anything weird?
- speaker: Respondent
  text: Oh, you mean like in -- at Maui and camp? Okay. I happened to have a fellow in the tent with me that served the officers
    mess, or the officers food, so it was a mess all right, I guess. Anyway, they got a little bit different diet than the
    enlisted personnel in those days. No -- something about he brought an avocado pear, where nobody cared anything about
    an avocado pear, and I delighted in those things, you know, and such as that. Another occasion, thing that impressed me
    about the food was that the Evaporated PET Milk. We didn't have fresh milk, of course. And nobody seemed to have a taste
    for it. I drank that stuff from the can. I liked it. It was no chore. I mean, it agreed with me. I had no problem foodwise,
    except when it was scarce, but on the islands there's times when I don't recall eating for good lengths of time. When
    we did it was either C- or K-rations, something like that. Water was the main problem. Believe it or not, I didn't know
    at that time, they were advanced enough to manufacture freshwater from sea water, but aboard ship they could create this
    miracle. And it provided us with water, although it was hot as could be. Just imagine how it would be with the sun shining
    on your canteen all day long and -- oh, well. But we faired well in that respect because our personnel, to keep us --
    kept us supplied. We were very diligent and without it we wouldn't have existed. We weren't too much mindful of it maybe
    at the time, but we count those things now. Everybody had a part, whether it was clerical or whatnot, played a crucial
    part. Even those back here making parts for engines and gear and so forth.
- speaker: Interviewer
  text: Were there any humorous events? Did you all play pranks on each other or do anything funny like that?
- speaker: Respondent
  text: I never was much on practical jokes and so forth. Unfortunately, I didn't have that much humor about me. I'm trying
    to think. Not really. There must have been, but I can't recall.
- speaker: Interviewer
  text: Did you join a veterans organization of any type?
