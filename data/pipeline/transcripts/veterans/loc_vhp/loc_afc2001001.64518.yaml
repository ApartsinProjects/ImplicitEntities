collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Do you remember where you were on Pearl Harbor Day?
- speaker: Respondent
  text: Yes, very much so. I was in North Zulch. I was working in Houston, but I had gone to North Zulch for the weekend.
    My brother and I were going back to Houston. We did not know of the Pearl Harbor until we got back to Conroe about 4:00
    o'clock on Sunday afternoon. And the filling station attendant told us that Pearl Harbor had been attacked, and our first
    question was, "Where is Pearl Harbor?"
- speaker: Interviewer
  text: What did you think when you found out?
- speaker: Respondent
  text: We thought all hell had broken loose.
- speaker: Interviewer
  text: What did your parents think or what comments did they make, if any?
- speaker: Respondent
  text: Talked to my parents that night from Houston. And they were really upset because two of my brothers were eight and
    nine years older than I was and they were in draft age. And I had just completed four years of ROTC training in Texas
    A and M. Graduated the previous spring. And I had completed all of my ROTC training, but I hadn't received my commission
    because I wasn't 21 years old at the time.
- speaker: Interviewer
  text: How old were you on Pearl Harbor Day?
- speaker: Respondent
  text: Twenty years old.
- speaker: Interviewer
  text: What kind of work were you doing?
- speaker: Respondent
  text: I was working in Port City Stockyards in Houston, Texas.
- speaker: Interviewer
  text: Doing what?
- speaker: Respondent
  text: Chasing cattle and selling cattle.
- speaker: Interviewer
  text: Did you enjoy that?
- speaker: Respondent
  text: Yes, very much so.
- speaker: Interviewer
  text: What was your life goal at that point?
- speaker: Interviewer
  text: Did you join immediately or how soon after Pearl Harbor did you join?
- speaker: Respondent
  text: I was -- I got my commission the next spring and sat at home until I got orders to report to Fort Riley, Kansas.
- speaker: Interviewer
  text: You enlisted?
- speaker: Respondent
  text: No. I was -- I got orders to report. I had my commission at that time.
- speaker: Interviewer
  text: You were drafted?
- speaker: Respondent
  text: No. They sent me my orders. The draft board at Madison County marked me off as far as drafting was concerned because
    I had my commission.
- speaker: Interviewer
  text: All right. How did you get to Kansas?
- speaker: Respondent
  text: On the Rock Island Railroad.
- speaker: Interviewer
  text: How long were you there?
- speaker: Respondent
  text: About six months.
- speaker: Interviewer
  text: What was the base name there in Kansas?
- speaker: Respondent
  text: Fort Riley, Kansas.
- speaker: Interviewer
  text: Where did you go from there?
- speaker: Respondent
  text: Went to Fort Bliss in El Paso, Texas.
- speaker: Interviewer
  text: What was your M.O.S., your field of interest in the Army?
- speaker: Respondent
  text: I was second lieutenant in, in a combat unit, Troop G of the 7th Calvary Regiment.
- speaker: Interviewer
  text: And did you have any special training?
- speaker: Respondent
  text: Yes. It was all special training, ROTC training.
- speaker: Interviewer
  text: In the Army did you have any special training other than combat readiness?
- speaker: Interviewer
  text: Where did you go from Fort Bliss?
- speaker: Respondent
  text: Went to Camp Stoneman, California on the way to Australia.
- speaker: Interviewer
  text: Okay. How long were you at Camp Stoneman?
- speaker: Respondent
  text: About three weeks.
- speaker: Interviewer
  text: And did you go to Australia on a troopship, a destroyer or what?
- speaker: Respondent
  text: Went over there on a troopship, 6,000 of us, on the USS Monterey. That was a Matson liner.
- speaker: Interviewer
  text: And how was the trip over?
- speaker: Respondent
  text: Well, we made it over there in record time. It took us about eight days, I think it was, to get to Brisbane, Australia.
    We saw one ship on the way over there, but they didn't see us. The only thing we -- the only way we could tell it was
    another ship, we saw their smoke. And we went the opposite direction from them. We didn't know whether it was a friendly
    ship or a war ship or what it was.
- speaker: Interviewer
  text: Had you ever been on a ship before?
- speaker: Respondent
  text: Not before that.
- speaker: Interviewer
  text: Did any of the men get seasick?
- speaker: Respondent
  text: Lots of them did.
- speaker: Interviewer
  text: Were the officers quartered separate from the enlisted men?
- speaker: Interviewer
  text: How was the food?
- speaker: Respondent
  text: Very good. We had very good food because they were still operating in peacetime. They had all the crew, peacetime
    crew, on there. And we ate in the main dining room, all the officers did. The troops ate in crews quarters.
- speaker: Interviewer
  text: And the troops had good food, also?
- speaker: Interviewer
  text: And you arrived in Brisbane?
- speaker: Interviewer
  text: Of what month and year?
- speaker: Respondent
  text: In July of 1942.
- speaker: Interviewer
  text: And did you have hot water on the ship coming over?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: And what about the sleeping quarters? Two men to a room or what?
- speaker: Respondent
  text: It was two officers to the room. The men had troops quarters. They had six bunks from the floor to the ceiling.
- speaker: Respondent
  text: And they were about two feet apart, between the, the -- they were hanging cots, actually, is what they were.
- speaker: Interviewer
  text: Right. I got their descriptions. You are the first officer I have had that went over on a ship and I was more interested
    in your quarters. I had a lot of enlisted men. A lot of the officers flew over.
- speaker: Respondent
  text: Well, we didn't have that chance. We went over with the troops.
- speaker: Interviewer
  text: That flying was not great. They had to lean back against the fuselage.
- speaker: Interviewer
  text: It was very uncomfortable. What did you do once you got to Brisbane?
- speaker: Respondent
  text: We did all the training there and we trained for about three weeks. Then we went on maneuvers out in the, what the
    Australians call the Outback Country. And that was on big ranches, what they called stations.
- speaker: Interviewer
  text: What did they ranch mostly?
- speaker: Respondent
  text: Cattle and sheep.
- speaker: Interviewer
  text: Right. Did you see any interesting sights during that three-week training?
- speaker: Respondent
  text: Absolutely. Brisbane was a very picturesque city. And they had four, I think it was four city parks and they were
    all just topnotch parks. They had all the native animals of New Zealand -- Australia in there, kangaroo and wallabies.
    And they had a big bird sanctuary there, birds that I had never seen or heard of, but they were interesting.
- speaker: Interviewer
  text: How did the Australians receive you?
- speaker: Respondent
  text: They were very nice. Australians were more like Texans than anyplace that I had ever been in the world.
- speaker: Interviewer
  text: Did you encounter any New Zealanders or did you go to New Zealand later?
- speaker: Respondent
  text: We encountered quite a few New Zealanders. They were training there in Australia. But there were very few Australian
    men of draft age, because most of the middle-aged men and boys had gone to Great Britain or to North Africa to fight the
    Nazis back in those days. And about the only men that were left in Australia were young boys or old men.
- speaker: Interviewer
  text: That's interesting. Where did you go after the three weeks?
- speaker: Respondent
  text: We stayed there in Brisbane. And we stayed in Brisbane for about six months.
- speaker: Respondent
  text: And at the end of that six weeks, I had applied for a two-weeks vacation in Sydney. I wanted to go to Sydney. I had
    heard so much about it. And the day that I was supposed to leave on that vacation was the day we loaded on a ship to go
    to New Guinea.
- speaker: Interviewer
  text: Okay. You said six weeks this time and before you said six months. Was it six weeks or six months?
- speaker: Respondent
  text: I was in Brisbane about six months.
- speaker: Interviewer
  text: Thank you. And how long -- what kind of ship to New Guinea?
- speaker: Respondent
  text: It was a Liberty Ship.
- speaker: Interviewer
  text: How many men, do you think?
- speaker: Respondent
  text: The ship that I was on was about two hundred men.
- speaker: Interviewer
  text: And was it a troopship or a destroyer or --
- speaker: Respondent
  text: It was a troopship.
- speaker: Interviewer
  text: And did it have an escort or anything?
- speaker: Respondent
  text: We were in a convoy. We went to Townsville, Australia from Brisbane on that ship and had to wait there over Christmas
    for a convoy to arrive from the U.S. And they had four destroyers that escorted us from Townsville to Oro Bay, New Guinea.
- speaker: Respondent
  text: That's on the north coast of New Guinea.
- speaker: Interviewer
  text: How long did that take?
- speaker: Respondent
  text: Took about a week.
- speaker: Interviewer
  text: Okay. How about docking in New Guinea? Was that a problem?
- speaker: Respondent
  text: No. They -- we had to unload off that ship onto the lighters to get to shore.
- speaker: Interviewer
  text: What was --
- speaker: Respondent
  text: Because there was no, no docks at Oro Bay, New Guinea.
- speaker: Interviewer
  text: Where were your quarters? Where were you quartered in New Guinea? How far inland or --
- speaker: Respondent
  text: Right on the coastline.
- speaker: Interviewer
  text: How many men to a tent?
- speaker: Respondent
  text: Two officers to the tent. Four men, enlisted men, to the tent.
- speaker: Interviewer
  text: Did you encounter many people who contracted malaria?
- speaker: Respondent
  text: We practically all had malaria. We were taking Atabrine. But I had a serious case of malaria. I turned just as yellow
    as anything you can imagine. And I had to take Atabrine all the time I was overseas.
- speaker: Interviewer
  text: That's the report I am getting from all the veterans who were there.
- speaker: Respondent
  text: Oh, yeah. I had --
- speaker: Interviewer
  text: Was there a --
- speaker: Respondent
  text: I had a serious attack after I got out of the Army when I got back from overseas and went back in the Army for a month
    because I was in the hospital in Temple, Texas.
- speaker: Interviewer
  text: Did you encounter any of the New Guinea natives?
- speaker: Respondent
  text: Oh, yes. Lots of them.
- speaker: Interviewer
  text: Was their dress different?
- speaker: Respondent
  text: Very much so.
- speaker: Interviewer
  text: Native dress? What was it like?
- speaker: Respondent
  text: Very scanty.
- speaker: Interviewer
  text: Men and women?
- speaker: Respondent
  text: Men and women.
- speaker: Interviewer
  text: Did they do any bartering or trading with you all?
- speaker: Respondent
  text: They would trade any time any way. Any time you wanted coconuts or wanted to eat a coconut, well, you would give them
    a cigarette and they would climb the nearest coconut tree and cut the coconuts down out of the tree for you.
- speaker: Interviewer
  text: Would they break it open for you?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: That's the hard part.
- speaker: Respondent
  text: That was the hard part.
- speaker: Interviewer
  text: I know. Was there a hospital in New Guinea and in Oro Bay?
- speaker: Interviewer
  text: A good hospital?
- speaker: Respondent
  text: A good hospital. It was a general hospital. The Army, U.S. Army Hospital.
- speaker: Interviewer
  text: Staffed by American nurses?
- speaker: Interviewer
  text: I took one of their interviews, a neighbor. She was -- she contracted -- she was a nurse. She contracted malaria,
    also.
- speaker: Respondent
  text: I bet she did.
- speaker: Respondent
  text: I had a -- I had malaria all the time I was overseas. And any time I quit taking Atabrine, man, about ten days to
    two weeks after I quit taking it, I would get sicker than a horse.
- speaker: Interviewer
  text: Yeah. I understand it was mostly in New Guinea. The rest of the Solomon Islands there wasn't that much of a malaria
    scare.
- speaker: Respondent
  text: Well, that was, that was malaria. We had it. After we contracted it one time, you know, we had to keep taking Atabrine.
- speaker: Respondent
  text: Boy, it would knock the starch out of you. In fact, one of my best friends, a captain, died of malaria in the Philippines.
    And that was his struggle. Atabrine didn't act on his particular case.
- speaker: Interviewer
  text: Did you ever go out in the jungle?
- speaker: Respondent
  text: Lots of times.
- speaker: Interviewer
  text: Did you see any animals?
- speaker: Respondent
  text: Lots of them.
- speaker: Interviewer
  text: What type animals?
- speaker: Respondent
  text: Well, all kinds of birds that you find along the equator. And we got to the Philippines and we saw a lot of monkeys.
    In fact, the monkeys were a big help to us. We got over there, and in one, one particular area, this flock of monkeys
    -- I guess you call them flocks -- at night they would be around our camp and they would chatter all night long. As long
    as they were chattering, that was fine.
- speaker: Respondent
  text: I mean, you slept like a log.
- speaker: Respondent
  text: If they ever got quiet, you better get your rifle and cock it.
- speaker: Respondent
  text: Because Japs were very close.
- speaker: Interviewer
  text: Did you have sentries posted?
- speaker: Respondent
  text: Absolutely, every night.
- speaker: Interviewer
  text: How many were your group?
- speaker: Respondent
  text: Well, we would usually have at least half a dozen men stay awake all night.
- speaker: Interviewer
  text: What was your training during that time? What were you getting ready for?
- speaker: Respondent
  text: For landings.
- speaker: Interviewer
  text: Okay. What was your next landing?
- speaker: Respondent
  text: Well, we landed Oro Bay. That was a, I would say, a peaceful landing. Because we were taking over from the 31st Infantry
    Division.
- speaker: Interviewer
  text: No, I mean after New Guinea.
- speaker: Respondent
  text: Admiralty Islands.
- speaker: Interviewer
  text: That's part of the Solomon chain?
- speaker: Respondent
  text: It's south, south of the Solomon chain.
- speaker: Interviewer
  text: Were Japs inhabiting Admiralty Island?
- speaker: Interviewer
  text: Were Japs in Admiralty Island?
- speaker: Respondent
  text: There was a reported 6,000 Japanese Imperial Marines in the Admiralty Islands. And we had one division land there,
    the 5th Calvary Division landed there, and they nearly got wiped off the map. And we were at Oro Bay, and they put us
    on destroyers one afternoon and we got to Oro Bay the next morning about 10:00 o'clock. That was about 350 miles from
    Oro Bay.
- speaker: Interviewer
  text: You got to where? You said you got to Oro Bay. You got to where?
- speaker: Respondent
  text: We got to the Admiralty Islands.
- speaker: Interviewer
  text: Okay. Were you like reinforcements?
- speaker: Respondent
  text: Yes. We had to go in and help the 5th Calvary Regiment because they were getting smeared.
- speaker: Interviewer
  text: Were they the first in or were the Marines the first in?
- speaker: Respondent
  text: No. Fifth Calvary was the first in.
- speaker: Interviewer
  text: Okay. And then did you go in?
- speaker: Respondent
  text: We went in. And we completed that Admiralty Islands Campaign in about six weeks.
- speaker: Interviewer
  text: Had the 5th Calvary already dug some fox holes for you all?
- speaker: Interviewer
  text: And a lot of your men -- what do you call those boats you go in on, PT boats or land --
- speaker: Respondent
  text: Infantry landing craft --
- speaker: Interviewer
  text: And tell me about that day when you actually went up and landed on the beach.
- speaker: Respondent
  text: Well, we landed there on those PT -- I mean, on those landing crafts from the destroyers. And we -- they were Australian
    destroyers, because that was the quickest way we could get there. The 5th Calvary was about to get shoved off in the water
    and they were in bad shape. And we had to go in and reinforce the 5th Calvary.
- speaker: Interviewer
  text: And your particular job was -- you were in charge of how many men?
- speaker: Respondent
  text: About two hundred in the troops.
- speaker: Interviewer
  text: And your rank at that time?
- speaker: Interviewer
  text: And did you push the Japs back, the Jap Marines?
