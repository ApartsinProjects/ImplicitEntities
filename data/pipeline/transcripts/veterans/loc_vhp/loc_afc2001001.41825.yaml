collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: During what war did you serve?
- speaker: Respondent
  text: Okay. Actually during the war, the one that I served in primarily was the Vietnam War, in 1971, '72, probably 1972.
- speaker: Interviewer
  text: When did you enlist?
- speaker: Respondent
  text: Originally 19th of January 1954 in the Navy.
- speaker: Interviewer
  text: Were you drafted or did you enlist voluntarily?
- speaker: Respondent
  text: No. I enlisted. I was 17 years old.
- speaker: Interviewer
  text: In which branch did you serve?
- speaker: Respondent
  text: Well, I started in the Navy in 1954, at the age of 17. I got out of the Navy on June 6, 1957.
- speaker: Interviewer
  text: Where were you located during your service?
- speaker: Respondent
  text: Well, at that time I went to Navy basic training at San Diego, then to Alameda Naval Air Station, and from there up
    to Tacoma, Washington, where I put a brand new mine sweeper ship into commission on October 16, 1955. Then from there
    back down to Long Beach, California, which was my home court here in the United States. From there I went to Sasebo Naval
    Base in Japan, which was my home court overseas. While there I went all over Southeast Asia. I served—sailed up and down
    the Marietas Islands, on to the Marshall Islands, and then came back to the States in May of 1957. I got out of the Navy
    on June 7, 1957. Then I built airplanes for Boeing airplane company in Seattle for a year, came back down to Willamina
    and worked in the old brick plant for several months, and then I went into the Air Force on February 25, 1959. When I
    went into the Air Force, I went to jet engine school and became a jet engine mechanic, technician, later superintendent.
    I went to Chanute Air Force Base in Rantoul, Illinois. From there I went to Forbes Air Force Base in Topeka, Kansas, which
    was a strategic air command base, and I spent nearly five years in the strategic air command there. That's where I was
    during the Cuban Missile Crisis in 1962. During that crisis my outfit lost three airplanes and eleven men. We were flying
    an airplane every hour, one of our RB-47s, a B-47 bomber equipped for reconnaissance with super cameras. They could fly
    over at 40,000 feet and tell whether you had mowed your lawn that day or not. We flew one of those every hour over Cuba,
    24 hours a day. We lost three airplanes; they crashed and burned on takeoff with full fuel loads. Two of those airplanes
    had four men on board, one had three men. It was a fast way to lose a lot of friends. In 1963 I went to Incirlik Air Base
    in Turkey for six months. I was there when President Kennedy was killed. We had special RB-47s with over a hundred million
    dollars worth of electronic countermeasures gear. Whenever one of those airplanes flew, they claimed it could knock out
    televisions for a hundred miles around. Turkey was just across the Dardanelles from Russia. Our birds would fly anytime
    there was action around the border. They were gone for eight hours before they came back. When they came back, that was
    top priority. We had 15 minutes to get the airplane started and airborne from the time the word hit the base. If we didn't
    do it, heads rolled from the commander on down. It was quite interesting.
- speaker: Interviewer
  text: What were some of your duties in the services?
- speaker: Respondent
  text: In the Navy I was an electrician. After I got out of the Navy and built airplanes for Boeing, I was a riveter. I went
    into the Air Force as a jet engine technician. I remained in the jet engine field throughout my Air Force career and retired
    as a Master Sergeant on May 31, 1976.
- speaker: Interviewer
  text: What are some of your personal memories from this time?
- speaker: Respondent
  text: Well, it was a long time ago. I had a lot of great times, wonderful times. A lot of them I wouldn't care to go over.
    During the Cuban crisis, most units had their airplanes fueled and armed, ready to go, but they were sitting there waiting
    for the word to bomb or whatever. My own organization was reconnaissance, flying a B-47 reconnaissance bomber over Cuba
    every hour. We were literally flying the wings off those old airplanes. We were supposed to be on 12-hour shifts, but
    any job you were on, even if it was just five or ten minutes before shift change, you stayed on until you finished it,
    even if it took 20 hours. I had several of those days. For three months we didn't get a day off, and several days were
    at least 20 hours long before getting any sleep. It was busy. The Cuban crisis lasted about six weeks, but it took another
    six weeks or more to get caught up. Vietnam was different. I went there in 1971, '72. It was hot and you perspired a lot.
    We did lots of walking. In two months I lost about 30 to 35 pounds, which was good because I needed to. The country had
    a lot of orchids and smelled beautiful, but you perspired so much that areas like your armpits and other rubbed areas
    got raw. Cornstarch was the best thing against chafing, better than any other powder. I can't think of anything else right
    now.
- speaker: Interviewer
  text: Were you able to correspond with your family and friends while in service?
- speaker: Respondent
  text: Oh yes, absolutely. I don't know if you know what MARS is. It's military something radio, like ham operators. If I
    wanted to speak to them, I would go to one of the MARS shacks. Nearly every day they'd try to get the air up, but sometimes
    atmospheric conditions kept you from it. When the MARS shack got the air up, you could talk on two-way radio from there
    to the States to a ham operator. Calling by landline might cost twenty dollars a minute or more, which was prohibitive.
    Through MARS you could make a three-minute call if the air was up, and then they would make a phone patch to your home
    phone. It wouldn't cost you anything for that. So you could get a three-minute call to your family for about a dollar
    a minute, which we could afford. I did that several times. The only disadvantage was you had to say what you wanted, then
    say 'over' so they could talk back. Once they finished, they'd say 'over' and key the mic back so you could talk one way
    at a time. I talked to my wife that way from Vietnam, Thailand, Taiwan, and other places around the world. It was a blessing.
- speaker: Interviewer
  text: When were you able to come home from service and what was that like?
- speaker: Respondent
  text: Whenever my tour of duty was up, if I was over there for 18 months or whatever, that meant the time had come. In 1974,
    I took a leave about halfway through and came home. I left my family near Offutt Air Force Base and came home because
    they were there for a while in June and July, then I went back to Thailand again. I hitchhiked on jet airplanes back and
    forth, so it didn't cost me anything.
- speaker: Interviewer
  text: What would you tell today's youth about war and serving the country?
- speaker: Respondent
  text: Nobody wants war, but a lot of times it's absolutely necessary to protect our way of life. War is terrible, no doubt
    about it. But we can't allow terrorists to kill Americans or anybody else. For that purpose, I feel absolutely that we
    cannot allow this to happen. We must stamp out terrorism, although they don't want to obey it. I'd go back in a minute
    if they did. It's against my grain and way of life. I don't think terrorists should be allowed to randomly kill Americans
    or anybody else. We cannot allow it. If we must go to war to prevent it or put a stop to it, we must do it.
