collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: My name's JC Alston and I was 18 in Pearl Harbor, December 7th, 1941.
- speaker: Interviewer
  text: Could you introduce yourself again and just let us know what ship you served on, and what your role was on that ship?
- speaker: Respondent
  text: JC Alston, served on the USS California. I was in the deck section. We took care of the big guns. I was the number
    two turret with the guys in the second division.
- speaker: Interviewer
  text: What year did you enlist in the Navy and what year were you discharged?
- speaker: Respondent
  text: I went in in 1941 in August, and I was discharged 1945 in October.
- speaker: Interviewer
  text: What rank were you when you were discharged?
- speaker: Respondent
  text: Second Class Petty Officer.
- speaker: Interviewer
  text: Tell me about enlisting in the Navy. What prompted you to sign up?
- speaker: Respondent
  text: Well, I thought it was like, see, they had already started the 36th Division at [UNINTEL]. And I thought about going
    out there, and I said, 'No, I don't know about that walking. I better ride.' But you know what I said after Pearl Harbor
    was happening? I said, 'I may have got in the wrong thing.' [laughs]
- speaker: Interviewer
  text: What do you mean by that, walking versus riding?
- speaker: Interviewer
  text: What—who walked and who got to ride?
- speaker: Respondent
  text: Well, the Army walks, we ride on the ship.
- speaker: Interviewer
  text: So you figured the Navy might be a better life?
- speaker: Respondent
  text: Yeah. They paid a little more.
- speaker: Interviewer
  text: Tell me about going out to that recruiting station that day. Tell me that story, if you could.
- speaker: Respondent
  text: Well, we went up there and went in and asked about signing up to join the Navy.
- speaker: Interviewer
  text: How did you get there?
- speaker: Respondent
  text: Hitchhiking.
- speaker: Interviewer
  text: And you were in high school at the time, right?
- speaker: Respondent
  text: No, I'd just got out.
- speaker: Interviewer
  text: Okay, so you graduated high school or you dropped out of high school?
- speaker: Respondent
  text: I dropped out.
- speaker: Interviewer
  text: Maybe if you could tell me, 'Hey, I dropped out of high school, wanted to join the Navy. So me and a couple of buddies
    hitchhiked over to the recruiting station.'
- speaker: Respondent
  text: Me and two of my buddies hitchhiked to the recruiting station to join the Navy.
- speaker: Interviewer
  text: What was going on in the world at that time?
- speaker: Respondent
  text: Well, there was a lot of unemployment. It was pretty hard times. I worked for a little while, delivering for a drug
    store. Back then, they delivered to the house, prescriptions, medicines itself. But they didn't pay much. [laughs]
- speaker: Interviewer
  text: So you were joining up more to have a job?
- speaker: Interviewer
  text: Tell me a bit about that. Why was it important to have a job at that time?
- speaker: Respondent
  text: Well, you had to make a living.
- speaker: Interviewer
  text: The Depression was still going on?
- speaker: Respondent
  text: Yeah. Yeah, we were farmers out [UNINTEL], 1934. We didn't even make good tumbleweeds. That's the year that the [UNINTEL]
    killed a lot of cattles, because they couldn't go back and feed them. They took their young heifers and took them up north,
    so they could use them for restocking their [UNINTEL], when the things got better. But they killed all the others. And
    they either buried [UNINTEL] them.
- speaker: Interviewer
  text: I hear people talk about the dust bowl. What's the dust bowl, for those of us who don't know about that?
- speaker: Respondent
  text: Well, the dust bowl was mostly up in Oklahoma. I don't know too much about the dust bowl. Of course, we had a lot
    of wind and sand here, well, out in west Texas. When them sand [UNINTEL] start rolling, if we're walking to and from school,
    we live three and a half miles from school, we stayed between the fences. You get out there and you get turned around,
    you get lost.
- speaker: Interviewer
  text: Was it exciting to be joining the Navy? What was going through your head as an 18 year old?
- speaker: Respondent
  text: Well, I'd always kinda looked at the Navy as, if I was going to go in service, I believe that's where I'd go. You
    know? And then, when the time comes, I did go.
- speaker: Interviewer
  text: What did you think you would like about it? What was attractive to you about the Navy when you were a young man?
- speaker: Respondent
  text: Oh, why don't you know? The sailors had a girl in every port. Didn't you ever hear that? [laughs] But the—
- speaker: Interviewer
  text: So you're about to continue?
- speaker: Respondent
  text: But that's not true. [laughs]
- speaker: Interviewer
  text: It's not? You didn't have a girl in every port?
- speaker: Interviewer
  text: So you're in the Navy. When do you hear that you're going to be headed to Hawaii?
- speaker: Respondent
  text: Well, I'd never been to Hawaii, and I'd really never heard of it until I made that trip. That was my first voyage
    at sea, going to Pearl for the long range [UNINTEL].
- speaker: Interviewer
  text: Had you heard people talking about Hawaii, what kind of place it was? Was there anything in your head about what to
    expect there?
- speaker: Respondent
  text: No, I had no idea. All I know, it was just all out in the middle of the ocean.
- speaker: Interviewer
  text: What happened when you arrived there? What was it like?
- speaker: Respondent
  text: It was kinda nice. The people were friendly. Of course, they had so much military—Army, Navy and Air Force and stuff—running
    over one another. We were going ashore.
- speaker: Interviewer
  text: It must've looked pretty different than what you're used to in Texas, huh?
- speaker: Interviewer
  text: How was it different?
- speaker: Respondent
  text: '[UNINTEL], it rained nearly every day. On [UNINTEL], that''s where they had all the water to drink and everything.
    It averaged 105 inches a year, the rain.'
- speaker: Interviewer
  text: What was the Hawaiian culture like? That was a bit different, too, right?
- speaker: Interviewer
  text: Tell me how it was different.
- speaker: Respondent
  text: Well, the food was different. And there were not many people to go out with, because too many service people. But
    you'd go to the Y, there wasn't much. It was kinda cheap to stay in, to see the old [ONKAWANA?], and the—
- speaker: Interviewer
  text: So we were talking about Hawaii. What did guys do for fun on Hawaii?
- speaker: Respondent
  text: Some of them played ball. Some boxed, swim, picture show, that's about it.
- speaker: Interviewer
  text: What did you like to do for fun? Did you like to go to the beach or the pictures or what?
- speaker: Interviewer
  text: What about Waikiki Beach? Did you ever go there?
- speaker: Interviewer
  text: Tell me about being on Waikiki Beach.
- speaker: Respondent
  text: Well, it was a nice beach. And there'd be a few girls out there sun tanning. The old hotel there that's Waikiki—
- speaker: Interviewer
  text: The Royal Hawaiian?
- speaker: Respondent
  text: The Royal Hawaiian.
- speaker: Interviewer
  text: Tell me about the Royal Hawaiian. What was that like?
- speaker: Respondent
  text: Well, the guy who owned it had flamingos. They got some kind of disease. He had to get rid of them. He painted everything
    pink, all the linen was pink, everything pink in the hotel. So if you saw the pink, you knew where it came from without
    asking.
- speaker: Interviewer
  text: Why did he paint it pink again?
- speaker: Respondent
  text: Well, he had to get rid of his flamingos. You know, they're pink. He had some and they got a disease and he had to
    get rid of them. Now I don't know if that's a true story. That's what was always told.
- speaker: Interviewer
  text: Did you enjoy Hawaii when you were based there?
- speaker: Respondent
  text: Well, yeah, I enjoyed it. I didn't go tan much. But I didn't have a chance. Some had duty, and others were [UNINTEL].
- speaker: Interviewer
  text: What was work like on the ship? What did you have to do during the day?
- speaker: Respondent
  text: Well, during the day, we cleaned up. We swept. [UNINTEL] office. The speaker [UNINTEL]. We cleaned and swept down
    four decks, doing it from the quarter deck, [UNINTEL]. And that's what we did. We had some kind of wood, I think it was
    cypress or something. The deck, the wooden deck, before the war. They took that off after the war started, the wooden
    deck. And we called [UNINTEL] the holy stone, and that's to keep it, rub it down with quartz sand with a half a brick.
    Make sure that it didn't have any splinters in it, where somebody barefooted might get a splinter. Not only that, but
    it kept the deck kinda white.
- speaker: Interviewer
  text: Was there any sense of danger about the place?
- speaker: Respondent
  text: Well, we figured we'd take it ourselves, you know? And battle. At that time, the war wasn't going on over in the Pacific.
    So, we didn't have to worry about it, just like when we'd come in on Thursday, the last time, they'd tie up to the [UNINTEL]
    and the ones that were eligible to go ashore could go. The duty section had to stay aboard and do the work, keep things
    going there.
- speaker: Interviewer
  text: Did you hear at all about what was happening in Europe in the war?
- speaker: Respondent
  text: Well, yeah.
- speaker: Interviewer
  text: What kind of things did you hear?
- speaker: Respondent
  text: Germany taking over those countries over there. You get that on the radio—Poland and all those little countries they
    were taking over.
- speaker: Interviewer
  text: What did you think when you heard about that, about what Germany was doing?
- speaker: Respondent
  text: I didn't think too much about it myself. I didn't know if we'd ever be in a war or not. So I didn't worry about it.
    It didn't bother me.
- speaker: Interviewer
  text: What about you—did you ever hear about what Japan was doing?
- speaker: Respondent
  text: Well, [UNINTEL] strap-on they could get that we had, so they could run their equipment into the machinery, all metal.
- speaker: Interviewer
  text: What kind of things did you hear about Japan?
- speaker: Respondent
  text: I didn't hear much about Japan. They didn't say much.
- speaker: Interviewer
  text: Was a fight with Japan something that you thought about?
- speaker: Respondent
  text: You mean after the attack at Pearl Harbor?
- speaker: Interviewer
  text: No, before.
- speaker: Respondent
  text: Before. Well, they had the liberty to come within so close to where [UNINTEL] or Pearl Harbor, you know? It was international
    waters. But I've never seen [UNINTEL] ship until December the 7th.
- speaker: Interviewer
  text: Did you think at all in the back of your head that you might have to fight Japan?
- speaker: Respondent
  text: Well, yeah, that was because we had people on the ship that'd be in the Asiatic fleet up close to Japan.
- speaker: Interviewer
  text: And what did they tell you? Why did you think there might be a fight with Japan?
- speaker: Respondent
  text: Well, they said Japan was getting too big for their britches. They wanted to expand, but I didn't think anything about
    it.
- speaker: Interviewer
  text: What would that mean for the United States?
- speaker: Respondent
  text: Well, it meant that we were going to have to fight the Japanese once they cut off our oil to Japan. That's when they
    got busy. Before then, we were letting them have some oil and letting it—the war machines or and cut that off. And the
    guy in Washington, two of them, Japanese, it was on Sunday and they were supposed to tell it before they struck at Pearl
    Harbor, but they didn't. The guy wasn't there that they needed to talk to. And they struck before they could declare war
    on us.
- speaker: Interviewer
  text: What were they supposed to tell and who were they supposed to tell it to?
- speaker: Respondent
  text: The State Department, I guess.
- speaker: Interviewer
  text: Did Japan worry you at all as an enemy? Did you think it would be tough to fight them?
- speaker: Respondent
  text: I had no idea how tough it would be, because I didn't know anything about the Japanese. I know they were taking over
    the Port of China, but that's about all I knew about the Japanese at that time.
- speaker: Interviewer
  text: Was it something that worried you or kept you up at night?
- speaker: Respondent
  text: No, no. It didn't keep me up at night. No.
- speaker: Interviewer
  text: Tell me about December the 6. What kind of day was that? What day of the week was that, first of all?
- speaker: Respondent
  text: It was on Saturday—Sunday was the 7th.
- speaker: Interviewer
  text: What day was—
- speaker: Respondent
  text: The 6th was Saturday. We were in the [UNINTEL] section.
- speaker: Interviewer
  text: Could you just re-state that again for me?
- speaker: Respondent
  text: December the 6th was on Saturday. I was on the [UNINTEL] section. I had to stay aboard and do duties and watch. In
    the afternoon, four to eight, I was on watch. I watched the carrier [UNINTEL] pull out about sundown. They were taking
    some planes somewhere, but I had no idea where. The next morning, I had the four to eight watch, where the old [UNINTEL]
    that make long patrols usually leave at seven o'clock in the morning, but the water was so slick that the pontoons drew
    enough suction that you couldn't get off the water. They set up a PT boat out there, and they made a few runs through
    the water, and he got off about eight a.m., twenty minutes to eight, when he got off. I was fixing to get relieved to
    go eat breakfast when it all started. They hit the ships behind us first. I heard the [UNINTEL] blow up, but I didn't
    know what it was at the time because it made some noise. They had armor piercing, and they went down through the turret
    down in the magazines, where all that powder was. And it blew up. The Tennessee was lucky. They had [UNINTEL].
