collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I was in the Vietnam conflict, I served two tours.
- speaker: Interviewer
  text: What branch did you serve in?
- speaker: Respondent
  text: I was in the U.S. Navy and I was part of the Sea Bee's.
- speaker: Interviewer
  text: What was your rank?
- speaker: Respondent
  text: My final rank was in EAS3 which stands for Engineering Aid Surveyor.
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: I enlisted, I volunteered and I was only 17 at the time. I went into the Kitty Cruiser and before your eighteenth
    birthday it counts as 4 years instead of 3.
- speaker: Interviewer
  text: Why did you join?
- speaker: Respondent
  text: The main reason that I joined was that I wasn't quite ready for college yet.
- speaker: Interviewer
  text: Why did you pick the service branch that you joined?
- speaker: Respondent
  text: I did some land surveying with my father when I was going through high school, and I kind of enjoyed it. So when I
    looked around for a branch of service that would give me some technical expertise, I found out that the Sea Bee's had
    a program that I pretty much wanted and that's why I ended up in the Engineering Aid Surveyor. In fact, when I signed
    the papers to go into boot camp, that was part of my designation.
- speaker: Interviewer
  text: Do you recall your first days in service and what did you like about it?
- speaker: Respondent
  text: I remember the first night we were having a party at a friends house and they actually tied me to a chair and they
    said you're not going to go and I go well I have to, and they finally let me go. They kept saying over and over that it
    was a big mistake. Well the first day they you get there and get into boot camp by the time the lights go out, you're
    a little bit anxious and the guys were messing around probably nobody got to sleep before midnight. At 2:30 the next morning
    the alarm went off and at that time I knew that I had made a big mistake.
- speaker: Interviewer
  text: Which war did you serve in?
- speaker: Respondent
  text: I served in the Vietnam War, in two tours.
- speaker: Interviewer
  text: Where did you exactly go?
- speaker: Respondent
  text: On my first tour I went to Da Nang, and the second was up north in Quangtre.
- speaker: Interviewer
  text: Do you remember arriving and what it was like?
- speaker: Respondent
  text: Both times very much so even though they fill your blood up with thinner so you don't feel the heat, the heat was
    just overwhelming when you came off the plane. It would take your breath away.
- speaker: Interviewer
  text: What was your job?
- speaker: Respondent
  text: I ended up going to an A school which that is 18 weeks of Surveying and Drafting--- that's nine of each and what we
    did is we built a lot of different items and we did the layout, as surveyors, we all did the layout. By the time I was
    in Viet Nam, I was already mainly a Party Chief and what we did is we layed out airports, bridges, piers, a P.O.W. camp,
    and a dog kennel. You name it, we built it.
- speaker: Interviewer
  text: Did you see any combat?
- speaker: Respondent
  text: Yes, but very limited as far as my actual fighting.
- speaker: Interviewer
  text: Were there many casualties in your unit?
- speaker: Respondent
  text: None that I am aware of. We had a lot of fire over our camp because of the air base we built right next door, so the
    VC would fly their rockets and mortars right over our camp and they would fall short sometimes. They wanted to mess up
    the airport but they didn't want to hurt us because they knew we were building for their future. In fact, they hit one
    time, some shells went into the camp which was vacant at the time, and they apologized on the Noah Hanna's radio show.
- speaker: Interviewer
  text: Do you have a most memorable experience?
- speaker: Respondent
  text: Probably the most memorable and the closest I came to death was we had a rotation in our bunkers and it was my turn.
    We had two Sea Bees in the perimeter bunkers and one marine and the marine was getting close to going out in the field,
    and he was getting a little nervous about it and we could tell he was nervous. A Southern boy from Alabama whose name
    was Joe and the rest of us kidded him a little about, and we didn't think much about it but I think he actually went whacko.
    What he did was, it was just towards evening and Joe and I were each laying on our own cots and one of us had to get up
    real quick because two of us guys were suppose to be on guard all the time and I had already kind of fallen a sleep and
    Joe was still a wake and the next thing I heard was "Brrr Brrr" and I rolled out of my cot and by the time I looked up,
    Joe was already out of his cot because he was a wake and he had already tackled the marine. At this time I had enough
    gumption about me that I went a head and grabbed the rifle away from the marine and Joe went a head and hit him several
    times and knocked him out and held him at bay while I went a head and called the, whatever you call the head guy, for
    the guards and they came over and took him away and we never saw him again. It was our understanding that he, of course,
    got discharged---a dishonorable discharge.
- speaker: Interviewer
  text: Did you feel pressure or stress?
- speaker: Respondent
  text: Yes, I would think I did. The main thing was just the long hours working plus the sirens going off all the time---they
    would go off about 90 percent of the nights that we were there and so that meant we had to hurry up and get out of our
    bunkers and this didn't set Erik Alldrin too well because we were working getting up at 6:00 a.m. and getting off at 6:00
    p.m. six and one half days a week. On Sundays we had a big break---they let us off at noontime. When you are doing this
    for 9 V2 months, it gets a little taxing on you. And also, when the sirens would go off, it would break up your sleep
    and you would have to spend an hour or two in the bunker waiting for the rockets and mortars to die down---this was at
    the QuangTre tour. It was kind of interesting one time when the sirens went off, someone had their tape recorder on because
    he wanted to record it and you could hear the first mortar that went off and exploded and there was only 35 seconds for
    the whole tent to grab our guns and run into the bunker---we were very quick.
- speaker: Interviewer
  text: What did you do when you were on leave?
- speaker: Respondent
  text: I did like most people---I visited family and friends.
- speaker: Interviewer
  text: Did you travel while in the service?
- speaker: Respondent
  text: I got to see a few places. Of course, I went to Boot Camp in San Diego. I went over to Rhode Island and then I went
    to Guantonome Bay, Cuba, and then to Viet Nam, and before that I went to Port Wheneme, then to Camp Pendleton, and then
    back to Viet Nam, and then finally I was discharged in San Francisco.
- speaker: Interviewer
  text: What did you think of your fellow soldiers?
- speaker: Respondent
  text: We had great camaraderie---they were a great bunch of guys.
- speaker: Interviewer
  text: Do you recall the day that your service ended?
- speaker: Respondent
  text: Yes. The reason it was memorable was because my very good friend was going into the service on the day that I was
    getting out.
- speaker: Interviewer
  text: Did you work or go back to school?
- speaker: Respondent
  text: Both. I took 9 to 12 units at Junior College but I had joined the Union already and I was working as a surveyor on
    a dam project.
- speaker: Interviewer
  text: Was your education supported by the G.I. Bill?
- speaker: Respondent
  text: Yes, but it was very limited. When I was going to college, it was prior to the government giving large benefits that
    they are giving now. I was only getting $125 a month for school and it was pretty hard to make it through school on $125
    a month. Fortunately I had made quite a bit of money from surveying to get me through the last two years of college.
- speaker: Interviewer
  text: Did you make any close friends while in the service?
- speaker: Respondent
  text: I made one friend in particular---Mr. Ed Carter. After the service, we got together several times. Even after we both
    got married, our families got together, and we continue to see each other at reunions.
- speaker: Interviewer
  text: What career did you choose after service?
- speaker: Respondent
  text: After I got out of the service, as I mentioned, I went into surveying with the Union and then also grade checking.
    After college I went into Engineering, and I also was a business owner. I was also in real estate for a while. I did construction
    engineering and I'm doing engineering for the County right now.
- speaker: Interviewer
  text: Do you attend any reunions?
- speaker: Respondent
  text: Oh, yes! I really look forward to them. We have such a great time. We have had three so far. The last one I even got
    the wife to come. In fact, all the wives are coming now and we're all becoming friends. People will actually stop by the
    house when they are in the area.
- speaker: Interviewer
  text: How did your service experience affect your life?
- speaker: Respondent
  text: One thing it was a little disheartening after my second tour of Viet Nam to see those protesters as we were disembarking
    from the plane. It didn't hurt me that bad and I got over it, but it did bother me for a while but some of the vets were
    really bothered by it. Something that still bothers me though is I am easily startled at night if I hear a loud noise
    and my legs are like running and this is forty years later. As far as the beneficial aspects of the service, it did give
    me skills and tools after that 18-week training as an engineering aide for surveying and drafting, and I still use those
    skills today and it helped me to get interested in engineering. Because of the training in the military, I was able to
    get a job with the Union upon my getting out of the service. It was a very high paying job actually. I have always been
    able to put food on the table. The service also gives you values. I had already had a fairly good work ethic but the service
    enhanced that work ethic. It helped me to become a better person.
