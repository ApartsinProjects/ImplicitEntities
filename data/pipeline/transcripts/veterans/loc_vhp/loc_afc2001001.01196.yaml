collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Why did you choose the Air Force Reserves?
- speaker: Respondent
  text: Number one, I felt the Air Force was -- of the four military branches, I liked the Air Force the best. I have a mechanical
    background, and I knew that working on aircraft was -- well, aircraft are certainly very high-quality, high-precision
    mechanical devices, and I enjoyed that type of technology and mechanical work and just felt that that was the best --
    best fit with my mechanical skills.
- speaker: Interviewer
  text: And where were you living at the time?
- speaker: Respondent
  text: Indianapolis.
- speaker: Interviewer
  text: Indianapolis?
- speaker: Interviewer
  text: Do you recall your first days in the service? Did you go through, like, a boot camp --
- speaker: Respondent
  text: Oh, absolutely.
- speaker: Interviewer
  text: -- situation? Yeah?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: And this is in Columbus?
- speaker: Respondent
  text: No. No. We -- I enlisted the 1st of December, then did not go to basic training until sometime in January of '65.
- speaker: Respondent
  text: Basic training was down at -- all Air Force basic training, certainly for an enlisted personnel, was at Lackland Air
    Force Base in San Antonio, Texas. So I spent six weeks at basic training in Lackland, and that was not particularly fun.
- speaker: Interviewer
  text: Wasn't it? Was it pretty challenging?
- speaker: Respondent
  text: Oh, yeah. Oh, yeah.
- speaker: Interviewer
  text: Mentally and physically?
- speaker: Respondent
  text: Absolutely. Absolutely.
- speaker: Interviewer
  text: Do you remember any of your instructors?
- speaker: Respondent
  text: Yes. Oh, yeah.
- speaker: Respondent
  text: Yeah. I remember -- I remember both of them. I don't recall their names. One of 'em was Sergeant Peace. And I don't
    recall the other fellow's name. But, yes, I remember the --
- speaker: Respondent
  text: -- instructors.
- speaker: Respondent
  text: And the unit that I was in, we -- they were all Air Force reservists --
- speaker: Respondent
  text: -- down at Lackland. So all of us were in the same boat --
- speaker: Respondent
  text: -- so to speak.
- speaker: Interviewer
  text: Um-hum. How did you personally get through the experience? It was just kind of grin and bear it or --
- speaker: Respondent
  text: Yeah. Yeah. Yeah, exactly. I had -- had learned or heard from others beforehand, said "Just" -- you know, said, "Don't
    volunteer for anything. Just keep your mouth shut. Do what -- do what you're" --
- speaker: Respondent
  text: -- "supposed to do. And don't make a big stir." And I made it through in good shape.
- speaker: Interviewer
  text: So the Vietnam War was going on?
- speaker: Interviewer
  text: After basic training, where did you go from there?
- speaker: Respondent
  text: My next step was off to tech school. When I enlisted in the Air Force Reserve I had an option of two -- two slots
    that were open at the Air Force base. One of them was reciprocating engine aircraft mechanic, and that's what I wanted.
    I wanted to work on the aircraft. So I went to tech school at Shepherd Air Force Base, Wichita Falls, Texas, and that
    was about a -- oh, I don't know -- 13-, 14-week tech school to learn about becoming a -- a mechanic on reciprocating or
    piston engine aircraft.
- speaker: Respondent
  text: And I came home in June of '65 after completion of tech school.
- speaker: Interviewer
  text: Back to Indianapolis?
- speaker: Respondent
  text: Back -- back home.
- speaker: Interviewer
  text: So you had some time off, so to speak?
- speaker: Respondent
  text: Um-hum. And then went back to work and then back to school.
- speaker: Interviewer
  text: So you had further training, then, after that?
- speaker: Respondent
  text: No. I went back to Purdue Extension ________ --
- speaker: Interviewer
  text: Oh, you did?
- speaker: Respondent
  text: Um-hum. Yeah.
- speaker: Respondent
  text: I was attending Purdue Extension.
- speaker: Interviewer
  text: Okay. So, you went back to Purdue. Then at what point did they call you up again?
- speaker: Respondent
  text: Well, once I got in the Air Force Reserve I -- I thought "Well, I've got it made. I avoided the draft and probably
    will have avoided going to Vietnam." And I thought "Well, this" -- you know, "Perhaps I've got it made." And then in --
    on April 11th of 1968 the announcement came over the radio, all the news media all across the country that the -- the
    Secretary of Defense was activating about 24,500 reservists and -- and -- Guard people all across the country. And the
    unit that I was attached to down at Bakalar Air Force Base, the 930th Tactical Airlift Group, was one of those units that
    was announced for the activation. And we had -- we had a 30-day period to get our personal effects in order. And then
    we reported for active duty down at Bakalar Air Force Base on Monday, May 13, 1968. And there were -- all total, there
    were about three hundred and -- roughly 350 reservists that reported for active duty at that point in time. We did not
    know why we were called nor did we know what our mission would be at that point in time. As it turned out, we were the
    only Air Force Reserve unit --
- speaker: Interviewer
  text: That was called up?
- speaker: Respondent
  text: -- flying C-119 aircraft that was activated.
- speaker: Respondent
  text: And the Air Force had a very special mission in mind for us, but we didn't know it at the time.
- speaker: Interviewer
  text: You didn't know it at the time. Okay.
- speaker: Interviewer
  text: So what happened next?
- speaker: Respondent
  text: Well, we were at -- we reported on May 13th. Shortly after going through all of the in-processing and so forth and
    immunizations and that sort of thing, shortly after that we learned that the unit was going to be transferred over to
    Lockbourne Air Force Base over at Columbus, Ohio, and that's on the south -- south side of Columbus. It's now Rickenbacker
    Air National Guard Base, I believe. But, the unit was being transferred over there to pick up our -- our new mission.
    So I think by June 15th of '68 we had all packed up our equipment and 18 aircraft and we all transferred over to Lockbourne
    Air Force Base. And once we got over to Lockbourne we started to learn much more about what our mission was going to be.
    The name was changed -- when we were activated we were the 71st Tactical Airlift Squadron, and then shortly after we arrived
    over at Lockbourne Air Force Base the unit was redesignated 71st Air Commando Squadron. That lasted for three weeks. And
    then on July the 8th, I believe, the entire Air Force Air Commando Command was renamed from Air Commando to Special Operations.
    So our unit then became 71st Special Operations Squadron, and it remained so until our unit returned home in 1969. While
    we were at Lockbourne, we then learned substantial more details of our mission, and the mission was that the C-119 conventional
    cargo type aircraft were being replaced and upgraded -- or, converted, I should say, to gun shifts. The C-119 gun shift
    program was to replace the AC-47 gun shifts that were currently being used at Vietnam, being used very successfully. But
    the C-47 gun shifts had a lot of restrictions and drawbacks, and the Air Force was looking for a better gun shift platform
    to use for that type of weapon, and the C-119 was selected as a -- as an interim aircraft or a newer gun shift. So during
    the summer of 1968 we -- the entire unit -- that includes flight crews and aircraft maintenance personnel -- all went
    through training and familiarization to become --
- speaker: Interviewer
  text: With that aircraft?
- speaker: Respondent
  text: With the gun shifts. As we started receiving the converted cargo aircraft as gun shifts, then we began training on
    the -- on the new gun shifts. Not only flight crews, but also ground maintenance people. So, we spent the entire summer
    of '68 transitioning from the normal cargo aircraft over to the gun shifts. And flight crews spent a considerable amount
    of time learning the -- learning the new shifts, especially the weapon systems on the -- on the aircraft. Also during
    those summer months we started receiving more personnel from the regular Air Force ranks to augment the reservists to
    complete -- we had 18 gun shifts, and ultimately before we shipped out for Vietnam we ended up with 24 flight crews. So
    we always had --
- speaker: Respondent
  text: -- some reserve -- some ________ --
- speaker: Interviewer
  text: So you still had the 18 --
- speaker: Respondent
  text: Still had the 18 --
- speaker: Respondent
  text: -- aircraft.
- speaker: Interviewer
  text: And then at what point did you ship out for Vietnam?
- speaker: Respondent
  text: Well, originally when our unit was activated the initial departure date was in August of '68, but once the gun --
    once the unit started receiving the converted gun shifts, they found out pretty quickly that the aircraft were overweight
    by a substantial amount, and the extra weight caused a lot of delays, and the concern was single-engine performance on
    takeoff. In the event that an aircraft would lose an engine on takeoff, the concern was whether or not, because of the
    weight of the aircraft, it would -- it would have enough power to continue to take off and then return safely. So they
    -- the air -- the departure date was delayed for, oh, approximately five months while the aircraft went through a weight
    reduction program ________ --
- speaker: Interviewer
  text: My guess is your job was very busy during these months, try -- getting to know the plane and all the mechanics that
    go along with that.
- speaker: Respondent
  text: 'Well, my specific job was -- at that point, when -- in the Air Force Reserve, I was a crew chief. And the crew chief
    was responsible for the overall or general maintenance of the aircraft. We did pre-flight inspections, which meant --
    before a flight we would do a pre-flight inspection, which included a walk-around visual inspection, and many times we
    would go through engine run-ups and check all the systems on the engines: The hydraulic and prompts and so forth. So,
    as a crew chief, I was responsible for the -- for the overall condition of the aircraft. Now, there were a lot of -- with
    the new weapon system and gun shifts, there were -- there were a lot of other very highly -- at that point in time highly
    specialized high-tech systems on the aircraft which the -- which the crew chiefs did not have that much familiarization.
    There were other specialists that took care of all those specialized systems.'
- speaker: Respondent
  text: So basically the crew chief was to -- when the aircraft returned from a flight and if it had discrepancies during
    the flight, why, the crew chief's responsibility was to -- was to see that the discrepancies were cleared in whatever
    manner --
- speaker: Respondent
  text: -- was necessary and then prepare it for its next flight, whenever that was scheduled. Well, that was -- it was fun.
    It was enjoyable. Sometimes it was pretty -- pretty hairy. It was fun.
- speaker: Interviewer
  text: Tell me when you shipped out to Vietnam.
- speaker: Respondent
  text: The unit finally received the orders from the Assistant Secretary of Defense I think on November 27th of '68, finally
    got the official notification for departure. And the first two gun shifts departed Lockbourne Air Force Base on 5 December
    of '68, and from that -- there were 18 shifts, so they were scattered out over a period of time. And then during, oh,
    mid and latter December the remainder of the flight crews and ground support personnel departed for Vietnam via three
    C-141 Starlifter aircraft.
- speaker: Interviewer
  text: Were you in that group? No?
- speaker: Respondent
  text: No. I was -- the crew chiefs were selected to go on the -- participate in the ferry mission. Somebody had to ferry
    the aircraft over -- from the United States over to Vietnam, and that -- the operations officer and the squadron commander
    selected who those ferry crews would be. The flight crews. Those pilots and crews that had the most skill and expertise
    were selected to actually fly the aircraft over. And crew chiefs were also selected to go along --
- speaker: Respondent
  text: -- to assist in in-route maintenance.
- speaker: Respondent
  text: So I was -- I -- being the crew chief, I was one that got to participate in the ferry mission over to Vietnam.
- speaker: Respondent
  text: And our particular crew left Lockbourne Air Force Base on 5 January of '69. And it took us, I think, 17 -- 17 days
    to finally arrive at Nha Trang, Vietnam.
- speaker: Interviewer
  text: I'm sorry, how many days?
- speaker: Interviewer
  text: Seventeen days?
- speaker: Respondent
  text: Now, our crew took 17 days. I think the shortest was 14 days and the longest was 51 days. One of the crews, one of
    the ferry crews had -- the aircraft that they had was, shall we say, a lemon, and it experienced a tremendous amount of
    mechanical problems, and they had -- they had two engine changes in route, and that -- that one took 51 days.
- speaker: Interviewer
  text: To finally get there?
- speaker: Interviewer
  text: Well, tell me a few of your most memorable experiences in Vietnam. You were actually in Vietnam for how long, then?
- speaker: Respondent
  text: For about -- oh, roughly five-and-a-half months.
- speaker: Respondent
  text: See, the purpose of the 71st Special Operations Squadron and specifically the reservists that were activated -- our
    mission was to expedite this new AC-119 gun shift program into the Vietnam conflict. Because of the expertise and the
    training that the reservists had, that's why we were activated. And our purpose was to expedite the program into the Vietnam
    conflict. And once we got over into Vietnam, then more regular Air Force -- excuse me -- personnel joined our unit. And
    then we gradually transitioned -- or, trained the regular Air Force personnel to take over the opera -- the maintenance
    and the operation and the flying of the --
- speaker: Respondent
  text: -- aircraft. Then our unit, we returned back to the United States --
- speaker: Respondent
  text: -- in June of '69. We came -- went over as a unit, we came back as a unit.
- speaker: Respondent
  text: So, our job was done. So -- in fact, we returned back to Bakalar Air Force Base on June 6, 1969, which coincidentally
    happened to be the 25th anniversary of D Day.
- speaker: Interviewer
  text: Oh, really? Did you see much of Vietnam or were you pretty much on the Air Force base there?
- speaker: Respondent
  text: No. I stayed -- I was at two locations. Our unit's headquarters was at Nha Trang. In fact, that was the headquarters
    of the 14th Special Operations Wing, which our unit was attached to. And then after the aircraft started arriving in Vietnam
    in -- basically in January of '69, as more aircraft arrived in country, then two FOLs, they were called -- Forward Operation
    Locations -- were established, one at Farang, Vietnam and the other at Tan Son Nhut Air Base, which was at Saigon. And
    I was one of the -- quite a few guys that was assigned to Farang. So when -- I think 15th of February of '69 myself and
    quite a few other guys were transferred down to Farang, Vietnam. And I spent the rest of the t
