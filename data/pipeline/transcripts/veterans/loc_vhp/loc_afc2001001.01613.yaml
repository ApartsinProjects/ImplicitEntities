source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: My mom cried. It was rather interesting. I went for a pre-induction physical the prior September. I really didn't
    think I was going. I hurt my legs playing football, and I had had a car fall on me. I didn't expect that. I remember when
    I left Louisville, they said we'll see you in a month or so. But then they canceled the draft, started the lottery. And
    I believe my number was 91. At some point, my younger brother called the Draft Board and wanted to know when that number
    would come up. They told him April. Okay. So I actually always thought that if I went in the service I'd probably go into
    the Air Force, feeling I could get something more applicable to civilian life, as far as training. And somewhere around
    March 15th, the draft notice showed up. And I have a tendency to just kind of wipe things and just make the best of the
    situation. And so I can't say I was upset. But as far as that time I was a bit ambivalent. I spent most of my time in
    high school playing sports so I didn't see the 6 o'clock news very often. And in this locality, at least openly, there
    wasn't a lot of discussion at school. The only thing I remembered, a couple times you heard of someone older that had
    got hurt, or how sad it was that a certain teacher had to go back to school for teaching or be subjected to the draft.
    That was it.
- speaker: Interviewer
  text: Had there been casualties in this area during that time?
- speaker: Respondent
  text: Yes. But not a lot. Not a lot that was openly shared, either.
- speaker: Respondent
  text: There were people that, subsequent years, like a year or two ahead of me or even my grade. It was only like the last
    ten years that I know they were in Vietnam. There might be a little notice in the paper about somebody being in the service.
    It didn't seem to be an open subject. There was just a few, probably less than a handful of people, that I personally
    knew after they came back and talked to --
- speaker: Interviewer
  text: I'd like to get into that a little bit later.
- speaker: Respondent
  text: Sure. No problem.
- speaker: Interviewer
  text: So tell me, Ed, where do you go for induction?
- speaker: Respondent
  text: Louisville, Kentucky.
- speaker: Interviewer
  text: Then from Louisville, where did you go?
- speaker: Interviewer
  text: Did you have a boot training there? Was it basic training at Fort Knox?
- speaker: Respondent
  text: I took basic training at Fort Knox. Then I was scheduled to go to Fort Bliss, Texas, for missile school. During training,
    we experienced a lot of rain and the skin came off one of my feet, got infected. They couldn't transfer me from one post
    to another until that post profile was expired.
- speaker: Interviewer
  text: Can I ask you, what was it like among the men that you were with? Was it pretty much certain in the back of your mind,
    where you were going to be headed?
- speaker: Respondent
  text: I don't think anybody admitted that to themselves. I really don't. You had the handful of people that, when they joined,
    volunteered to go to Vietnam. To the best of my knowledge, most those guys actually were prior service people. I remember
    one guy had been in the Air Force. He had gotten out. He was from Newburg, Indiana. He joined the Army and expressed desire
    to go to Vietnam. So they sent him to Germany. I always thought that was funny. Also I thought my induction date was the
    1st of April, April Fool's Day. I always thought there was something about that. I didn't expect them to keep me then.
    In fact, there was an Air Force doctor that examined my knees and he asked me, Why are you here? I said the Government,
    I guess. He said, You couldn't get in the Air Force? He mentioned probably wouldn't be a problem with the Army at that
    time period. I just stayed, not that I had a large option. But basic -- I mean they keep you so busy, you don't really
    do a lot of thinking, I don't think. We had a mixture of National Guard people doing their basic training, plus.
- speaker: Interviewer
  text: How rigorous was basic training, considering your knees?
- speaker: Respondent
  text: Not that bad. Because I've always played sports. I've always been in good shape. There were certain -- I remember
    spot thrusts were difficult. I had trouble. But we, somehow in my mind, lucked out. We didn't hardly do near as much the
    physical training, repetitively as maybe some other groups. Why, I don't know. But it wasn't as bad as I had assumed it
    might be. I mean it was tough. Don't get me wrong. But it wasn't anything -- My father, who was a World War II vet and
    landed at Omaha Beach on D-Day, wanted me not to go. Particularly, in VIT, when I got my orders for Vietnam, he wanted
    me to go back to Dock Sys (phonetic), to get out of it.
- speaker: Interviewer
  text: He got to know firsthand recollections, I suppose?
- speaker: Respondent
  text: I suppose. He had shrapnel in him and stuff. Probably through most of my life, my father and I weren't -- there were
    like six boys and a girl in the family. I wasn't the closest one to him. But through my service that all changed. And
    even though I'm the third oldest after them, he, obviously in his mind, I took the lead position in the family. And when
    he died, I'm the one he left the note to, where things were, and all that stuff. Unfortunately, I never got an opportunity
    to really talk to him a lot. Because he didn't talk a lot either. But at that time -- I was 29 when he died -- I didn't
    talk either.
- speaker: Interviewer
  text: Did he ever talk much about his military experience?
- speaker: Respondent
  text: Not a lot. If you were studying geography or history, he would tell you he was in Luxembourg. He might point out somewhere
    in Germany where he was. I knew more from my mom than I knew from him. In later years, after I got married, I got the
    Time Life books on World War II. He would come over and read them and he might point a picture out and say, I was in that
    unit. That's my insignia on that helmet, or something like that. I only really found out that he participated in D-Day
    because we had a school teacher, who also participated in D-Day. Usually in May, we would have an assembly. He would get
    up and talk about his experiences. Let's just say it's made very evident to me -- and I like this schoolteacher. I know
    I did, okay -- but this schoolteacher was on the seventeenth wave and dad was on the third wave. He kind of felt that
    it was pretty poor down on the pecking order to be getting up in front of students. I don't think the teacher really glorified
    himself in that manner. But, still, there was still a sort of tension I think for dad.
- speaker: Interviewer
  text: After basic, Ed, you went to Texas?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: I'm sorry. Pardon me.
- speaker: Respondent
  text: They pulled my orders. I ended up staying in Fort Knox and went to reconnaissance scout training.
- speaker: Interviewer
  text: Where was that?
- speaker: Respondent
  text: At Fort Knox.
- speaker: Interviewer
  text: At Fort Knox also?
- speaker: Respondent
  text: And that was tough.
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: Well, as a reconnaissance scout, it's pretty encompassing. Obviously, you've got to do a lot of map reading and learn
    how to use training pictures, et cetera, a lot of camouflage, anything from explosives, you know, how to go capture somebody
    and bring them back or how to go eliminate somebody, in both silent methods and more conventional way. Ways of movement
    without being detected. Calling in, and adjusting artillery parts. It's pretty wide ranging. And I know that in the general
    populace, there's probably a lot of misconceptions about what could be called Recon. You think the guy is going out and
    getting these fights, successfully. In a recon mission, they don't even know you were there. So they really hit the training
    on that pretty hard. And, you know, it may be anything from going in and blowing up a big structure, or other structures,
    to actually eliminating someone or bringing them back. Basically, you were to gather intelligence, bring them back, or
    send them back.
- speaker: Interviewer
  text: Did you have any option of maybe what to do?
- speaker: Respondent
  text: 'No. Basically, you took the standard battery of tests. From those tests, that''s how I was going to end up going
    -- well, I did have the option if I wanted to go to OCS. But then they wanted me to sign up for more time, too. But, other
    than that, I would have went to probably a better situation. But then the profile cut that out. And I ended up -- you
    know, it was more physically rigorous. Like our final test was a ten-mile run, where you stopped at stations along the
    way and adjusted artillery here, did first aid here, something else here. Part of your grade was the total time it took
    you. And of course, part of the other thing is you''re not sitting there all calm, cool and collective, to answer these.
    You''re breathing heavy, you''ve been running, you know you''re on a time limit. So, you know, it was pretty interesting.
    I''ll just go ahead and throw this out: We were told about halfway through the training cycle that it was very unlikely
    we would be going to Vietnam. Because the last ten training cycles had all went to Vietnam. And, of course, we went to
    Vietnam.'
- speaker: Interviewer
  text: I would think at that time it would have been pretty much -- well, I wouldn't say a certainty, but your chances would
    have been pretty high that you would have been going?
- speaker: Respondent
  text: You never really know. Because you know, the connotation they were giving us was -- and things had began to wind down
    as far as starting to bring the troops back. I'm not sure exactly when that occurred. They just felt, apparently, that
    as many as went, that the need was slowing down, I guess. But, then again, I went over with that MOS. And within a week
    I had a new MOS anyway.
- speaker: Interviewer
  text: So where did you go from Knox? I'm sorry. From that training, where did you go before shipping to Vietnam?
- speaker: Interviewer
  text: You went straight from there?
- speaker: Respondent
  text: Yeah. Came home. Went back for two weeks what they call Vietnam training.
- speaker: Interviewer
  text: You had a little break at home?
- speaker: Interviewer
  text: You knew where your headed?
- speaker: Respondent
  text: Yeah. That's when dad really wanted me to go get some doctors. My viewpoint at the time, I've been to a lot of counseling,
    okay. So I understand that the male ego is kind of -- thing about us, we want to know how we match up. So there's that
    one part wondering, you wonder what it's like; and, you know, I remember specific thinking, If you can guarantee me that
    I'm going to come home alive and in one piece, it might be interesting. I also felt that I wasn't any better than anyone
    else. I should, basically, just take my luck in the draw and see what I can do with it. And I served training with these
    guys and stuff. Having been involved in sports, you're kind of competitive, you know. You want to test yourself a little
    bit. You want to be careful, before you go with that maybe. And, of course, there are no guarantees, but...
- speaker: Interviewer
  text: When you finally left home, were there any final words of advice?
- speaker: Respondent
  text: I'm going to say two things. Not that I can remember. And I think in that manner, I just kind of put things off, I
    kind of take the emotions out. So I don't remember a lot. But as far as really pulling a side and having a sit-down talk,
    no.
- speaker: Interviewer
  text: Where did you leave the States from?
- speaker: Respondent
  text: Oakland, California.
- speaker: Interviewer
  text: I take it you flew out to Oakland?
- speaker: Respondent
  text: Yeah. My first experience to O'Harrah Airport. Luckily, my mother's second cousin was on the same flight out of Evansville.
    He was going to Greenbay, Wisconsin, for business. He got me through the airport. He knew the airport. Like I had like
    fifty minutes, but it wasn't in the same concourse. And we barely made it. It may be a big deal for --
- speaker: Interviewer
  text: Did you fly to Vietnam?
- speaker: Interviewer
  text: What was your first recollection when you started seeing land?
- speaker: Respondent
  text: Well, you wonder if you're going to get shot at.
- speaker: Interviewer
  text: I've had one Vietnam veteran told me that when he landed they were shot at.
- speaker: Respondent
  text: I'm sure it happened. And then the closer you get, you're not seeing the United States. You're not seeing the buildings
    you expect. You're not seeing the type of anything.
- speaker: Interviewer
  text: What did you see, Ed? Describe that.
- speaker: Respondent
  text: Well, nothing very tall. You know, buildings that in a lot of ways -- O'Harrah -- would have been called sheds or
    huts or lean-tos. That was Bien Hoa airbase, kind of scrubby, dirty, hot, of course. The hot hits you, the smells. But
    one thing I've always reflected back on is how quickly we adjust. I think there's part of human beings are a lot more
    animalistic that we like to pretend. Because you can adjust quick. You get there. After a while, you don't even notice
    most of the smells that offend you when you first get there. There's particular days, occurrences. All of a sudden, what
    kind of offended your eyes when you first landed becomes pretty nice. You even take a little pride, because your bunker
    is a little bit nicer than that guy's down there, you know. You just really get down to a lot more basic existence pretty
    quick, probably more than we realize we're capable of.
- speaker: Interviewer
  text: So from the time that you arrived, then how quickly were you sent out to a unit?
- speaker: Respondent
  text: Okay. From Bien Hoa, we were bused. I got to say it's in our famous buses with the bar mesh on the windows with no
    weapons to Long Binh. You know, I hadn't heard all the stories about why the mesh was on, grenades and stuff. But we were
    going out to the countryside. And, actually, it really wasn't the countryside, from what I came to learn later. But, you
    know, it was still fairly populace, and whatever.
- speaker: Interviewer
  text: You were uneasy?
- speaker: Respondent
  text: 'But you go -- we went to Long Binh. I think I was maybe there maybe two, two-and-a-half days. My first introduction
    to the tropical afternoon rainstorms. It comes and goes, without the sun ever going down. You might be caught in-between
    buildings. From the time you get to the next building it stops. So you think it''s okay. You go out again. And at that
    time I thought that was a monsoon. But I learned that was wrong also. But then they sent me up to, of course, bused back
    to Bien Hoa, end up to Nha Trang, that first headquarters compound there. The story there is: First night there, they
    put me on guard. I''m on top what I became later to know as the Club. I''ve got this weapon I''ve not seen before. I''ve
    only got three rounds. And I was mad, you know, angry. Because, look, here I am in Vietnam. I know there''s a war going
    on. And I don''t know what you guys know. Bu'
