collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Where were you born and raised?
- speaker: Respondent
  text: I was born in a little town called Thatcher, Utah. Box Elder County.
- speaker: Interviewer
  text: You’re going to have to spell that one for me.
- speaker: Respondent
  text: T-H-A-T-C-H-E-R.
- speaker: Interviewer
  text: Tell me about your family. You said that you had a deferment from the draft?
- speaker: Respondent
  text: Yes, all of my friends were joining. If you enlisted, you could choose the branch of your service and patriotism at
    that time reached a level in America that has never been reached before and probably won’t ever again. I was proud to
    be an American and still am. I consider myself a patriot. Of course, I was anxious to go. My classmates were joining the
    Air Force and the Marines and the Navy. When my draft number started coming up, the draft board approached me. They called
    me in and they said, 'We’d like to give you a six-month deferment to get your crops in.'
- speaker: Interviewer
  text: Because your parents had passed away?
- speaker: Respondent
  text: Yes, both of my parents were dead and my older brother was already in the service. That didn’t please me because I
    was excited about getting into the service, but it didn’t leave me any choice. The problem with that is, at the end of
    the six-month deferment, I was automatically drafted.
- speaker: Interviewer
  text: Into the Army then, right?
- speaker: Respondent
  text: Into the Army.
- speaker: Interviewer
  text: You really wanted to go into the Air Corps, I think?
- speaker: Respondent
  text: Oh, yeah. Yeah, I’d been flying and was a pilot then and I’m still a pilot.
- speaker: Interviewer
  text: You were a pilot and they didn’t take you in the Air Corps but because of the deferment.
- speaker: Interviewer
  text: Okay. You went into the military at Bear River, Utah.
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Do you remember a date on that or approximately?
- speaker: Respondent
  text: The dates are—my discharge papers, I think, have that on.
- speaker: Interviewer
  text: 'Date of Induction: July 7, 1943?'
- speaker: Interviewer
  text: You told me that you knew the Borgstrom brothers?
- speaker: Respondent
  text: Yeah, right.
- speaker: Interviewer
  text: Rolon and Rulon, two twins?
- speaker: Respondent
  text: Oh, yes, Rulon and Rolon, right.
- speaker: Interviewer
  text: The story of the five brothers was the inspiration for Saving Private Ryan, the movie?
- speaker: Respondent
  text: Yes, Spielberg interviewed the Borgstrom family and they had a better story, but the brothers—two of them were killed
    in Europe and two of them in the South Pacific—and they couldn’t put it together as well, but they honored the parents.
    There’s a Veterans Memorial in Tremonton in Utah that honors the Borgstrom brothers, the four that were killed out of
    the five brothers who served in the military during WWII.
- speaker: Interviewer
  text: Did they not draft the fifth brother or was he drafted a while back?
- speaker: Respondent
  text: The fifth brother was already in service. They had to get a presidential order from President Roosevelt to get him
    out of the action. I grew up with the Borgstrom brothers hunting and fishing and Boy Scouts and all of that, you know.
    They, being my neighbors, to see four of them lost out of one family, it was really a tragic thing.
- speaker: Interviewer
  text: You had testing at Wichita Falls with one of them, right? Testing over at Wichita Falls?
- speaker: Interviewer
  text: That’s okay. Wichita Falls testing that you had? I don’t think I spelled it right.
- speaker: Respondent
  text: Oh well, that’s a story in itself. I still wanted to fly when I got in down there training for my infantry basic and
    I found out where they would still take pilots and still train pilots. So, I applied for that. When I told the Borgstrom
    brothers, they said, 'We’re going with you.' So, we went up to Wichita Falls for our original battery of tests. Rulon
    flunked out there, washed out, they called in those days. So he went back to his infantry outfit. Rolon passed the first
    battery. Then, we went to take the second battery and he flunked out and they said, 'Well, you can either join your brother
    back in the infantry or you can be a gunner. Go to gunnery school.' He said, 'I’d like that.' Later, he was wounded on
    a bombing raid and lived until he got back to England. Rulon was killed in combat in the outfit that I trained with. The
    other two brothers were killed in the South Pacific.
- speaker: Interviewer
  text: You had training at San Antonio, right?
- speaker: Respondent
  text: 'Yes, it was Air Cadets, the big air fields: Brooks, Kelly, and Randolph Fields were all down there. I loved San Antonio.'
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: The River Walk there, you know, and the Alamo and all that stuff.
- speaker: Interviewer
  text: What kind of training did you get there then?
- speaker: Respondent
  text: Just more extended training to be a pilot, but we were called into a theater. We didn’t know why at the time, but
    we were called into a base theater and they read a letter from General Hap Arnold of the Air Corps and he said, 'We appreciate
    your effort, gentlemen, but you’ve had infantry basic and you’re urgently needed overseas.'
- speaker: Interviewer
  text: So here I am flying one day and the next day, I’m back in the trenches. So I finished training with the 8th Armored
    Division, 58th Armored Infantry Battalion.
- speaker: Respondent
  text: That was in Camp Polk, Louisiana.
- speaker: Interviewer
  text: Oh, Camp Polk. Okay. Yeah. Did you go through Army Specialized Training Program? The Army—did you go through that?
- speaker: Respondent
  text: No, just the regular armored infantry learning all the weapons.
- speaker: Interviewer
  text: Weapons like? I had in formation in here. I’ve got these too.
- speaker: Respondent
  text: 'We had all the basic: the M-1 Rifle, .30 caliber water-cooled machine gun, .30 caliber air-cooled machine gun, the
    .50 caliber machine gun which I was an expert on plus the 60 mm mortar.'
- speaker: Interviewer
  text: Oh, the .50 caliber?
- speaker: Respondent
  text: When we spearheaded with General Patton, my job was on the back of a tank just destroying everything in the path.
    Dozens of tanks and armored infantry. It’s the most awesome display of power. You just can’t imagine it. The .50 caliber—I
    don’t know how much detail you want, but the .50 caliber machine gun ammo comes in a big box and the first round—
- speaker: Interviewer
  text: Pretty big, isn’t it?
- speaker: Respondent
  text: Yeah and the first round out has a red tip on for a tracer so that you can aim it. The next one out is a black tip
    for armor piercing. The next tip out is a blue one for white phosphorus. General Patton says, 'Look'—we used to honor
    the people and their churches, but he says, 'They put their spies up in there.' So, he said, 'You destroy everything.'
    I wore out some of those .50 caliber machine guns. With these different kinds of rounds going out there, you could pierce
    almost anything and then you could also set it on fire with white phosphorus.
- speaker: Interviewer
  text: Okay. We’ll get more into that, too. How did you travel overseas then once you got done with your training? Did you
    go by ship overseas?
- speaker: Respondent
  text: Yes. We were in a fifty-five ship convoy into South Hampton. Soon as our equipment got there, then we went across
    the Channel and we joined General Patton in the Battle of the Bulge.
- speaker: Interviewer
  text: Right away that was your first assignment?
- speaker: Respondent
  text: Yeah. Very, very miserable winter. The coldest one in thirty years.
- speaker: Interviewer
  text: What position did you have?
- speaker: Respondent
  text: We all had classifications, but we used whatever weapon was necessary for that kind of a battle. So I specialized
    in the .50 caliber machine gun, the M-1 rifle, and the 60 mm mortar.
- speaker: Interviewer
  text: And you were on a tank not in a Half-track?
- speaker: Respondent
  text: When we traveled from place to place, we traveled in a Half-track, but when we did a spearhead, my assignment was
    on the back of a tank firing that .50 caliber.
- speaker: Interviewer
  text: What kind of tank?
- speaker: Respondent
  text: It was a Sherman tank.
- speaker: Interviewer
  text: I knew it, my Dad, they were building them. He didn’t quite make it into the war, but he was a guy who was building
    one of the tanks. It’s really interesting. Do you want a drink of water or anything?
- speaker: Respondent
  text: Yeah, I have cancer and my eyes are sensitive. The cancer medicine makes me sensitive to light.
- speaker: Interviewer
  text: I’ll shut these.
- speaker: Respondent
  text: I can put these on.
- speaker: Interviewer
  text: There we go. I think it’s kind of bright in here, too. That’s better. This is a bright area. I have blue eyes and
    mine—
- speaker: Respondent
  text: You’re sensitive, too, huh?
- speaker: Interviewer
  text: Did you want a drink of water?
- speaker: Respondent
  text: I have quite a hard time speaking at the schools because I want to tell the kids a little bit about America in the
    1900s. The airplane’s a new invention. No freeways and half-buggies and half-cars. Then bring them up to the patriotic
    period in the ’40s. I talk to them about, 'Hey, kids, this drop out stuff doesn’t go.' Then, I talk to them about being
    members of strong families. Strong families make a strong nation. Give them a shot of patriotism.
- speaker: Interviewer
  text: Absolutely, they need that now.
- speaker: Respondent
  text: I think I mailed you one, a little card with one paragraph from the Battle of the Bulge. I hand the students out one
    of those and then I usually—
- speaker: Respondent
  text: After the Battle of the Bulge, we went up and finished liberating Belgium and Holland.
- speaker: Interviewer
  text: Tell me more about the Battle of the Bulge. Where did you go? Where did you start?
- speaker: Respondent
  text: We were on the south end of the Battle of the Bulge, but we very seldom knew exactly where we were. We knew the enemy
    was there because we could see them. We were that close to them.
- speaker: Interviewer
  text: You were up against German Panzers?
- speaker: Respondent
  text: No, Panzers. We were in the Ardennes Forest. There was no big equipment, just the enemy soldiers over there.
- speaker: Interviewer
  text: I heard it was extremely cold.
- speaker: Respondent
  text: Oh, it was terribly cold and I did get my feet frozen, but they took hundreds and hundreds of soldiers out of their
    foxholes dead. They froze. If they got any of their extremities frozen, the war was over for them.
- speaker: Interviewer
  text: What happened to you then? You went into like a hospital for a little bit?
- speaker: Respondent
  text: I didn’t ever go to a hospital, no. I just endured the pain of frozen feet. I think growing up as a farm boy in Utah
    where it gets cold; I was used to cold winters. Anyplace I could find some hay or some straw, I would dig my foxhole extra
    big and then I would burrow into it. That was my secret for staying alive. Of course, the rest of the guys just dig a
    foxhole and get into it and shiver until they die.
- speaker: Interviewer
  text: There was rain, I think, too and it was muddy?
- speaker: Respondent
  text: No, it was snow on the ground. It had snowed almost every night.
- speaker: Interviewer
  text: That was like December through January, wasn’t it?
- speaker: Interviewer
  text: What were some of the towns? Do you remember the towns that you went through?
- speaker: Respondent
  text: We didn’t go through any towns during the battle. They just called it the Ardennes.
- speaker: Interviewer
  text: You stayed there the whole time?
- speaker: Respondent
  text: Yes. The Battle of the Bulge was a route for the U.S. troops to begin with because Patton, not Patton, General von
    Rundstedt, had gathered up so much army and so much manpower that the U.S. troops were just not prepared for an onslaught
    like that. Where we were an armored outfit, we could outrun them and that’s what we did. They just couldn’t catch us,
    but there was one infantry outfit that they captured in the Battle of the Bulge and they hardly had a chance to fire a
    shot because they swooped in and had them surrounded. I know I talked to guys from that outfit and they didn’t have a
    chance to fire a shot. They were taken prisoners of war. I want to tell you a little talk that General Patton gave to
    us. He says, 'Men, your job here is to either kill or capture the enemy. The sooner you get it done, the sooner you can
    go home.' That was it. I thought, 'Boy, that really covers it.'
- speaker: Respondent
  text: After we beat General von Rundstedt in the Battle of the Bulge, we went north through Belgium and up into Holland.
    While we were in Holland, we were about eight miles from Maastricht, Holland which is a provincial capital of one of the
    provinces.
- speaker: Interviewer
  text: Do you know the spelling on that?
- speaker: Respondent
  text: Close. M-A-A-S-T-R-I-C-T, I think, Maastricht. We were about eight miles from there, but the reason we went there
    is that the Germans had a stronghold near a town called Roermond. R-O-E-R, Roermond, Holland. When the time was right,
    we prepared ourselves for combat. Our instructions were to follow the banks of the Roer River to a certain spot, come
    out, and then go engage the enemy where our intelligence said they were a stronghold. It just happened to be my day on
    point that day.
- speaker: Interviewer
  text: What is on point?
- speaker: Respondent
  text: You’re the first guy out. We took turns. Like sometimes, I was in the third wave rather than the first, but this day
    I was on point. We left the banks of the Roer River and started off across this field. There were woods on the other side
    of it. I looked back and my whole platoon was out and had cleared the river. Just about that time, I heard the roar of
    a machine gun. I looked down and there was dirt kicking up around my feet. So I gave the alarm and we retreated back to
    the banks, but they fired at me, dirt kicking up around me all the way back. When we got back to the banks of the Roer,
    we took up positions along there and were firing at the enemy across the way.
