collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: When were you born, Jose?
- speaker: Respondent
  text: I was born in June 17th, 1919. That's when I came here.
- speaker: Interviewer
  text: Where were you born? You said --
- speaker: Respondent
  text: I was born in El Paso.
- speaker: Interviewer
  text: How did you come to Northwest Indiana from El Paso?
- speaker: Respondent
  text: I came over here looking for work.
- speaker: Interviewer
  text: And that would have been about what time?
- speaker: Interviewer
  text: A lot of people were looking for work around the country.
- speaker: Respondent
  text: Well, it was right after The Depression.
- speaker: Interviewer
  text: I see. And what branch of service were you in?
- speaker: Interviewer
  text: You went into the Army?
- speaker: Interviewer
  text: Army infantry. You were living here in Northwest Indiana?
- speaker: Interviewer
  text: And where did you go when you enlisted or were you drafted?
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: You were drafted. And when was that? Do you recall?
- speaker: Respondent
  text: I was drafted in -- let me -- I got it. I got my discharge.
- speaker: Interviewer
  text: No problem.
- speaker: Respondent
  text: I know I should know, but, you know, a lot of times whenever you . . . It's in my discharge.
- speaker: Interviewer
  text: Uh-huh, sure. All those in formation.
- speaker: Respondent
  text: Yeah, I'm trying to get -- April -- on April the 12th, 1941.
- speaker: Interviewer
  text: April 12th of '41. All right. And you would have been about how old at that time?
- speaker: Interviewer
  text: Okay. And you were an Army infantry. What division --
- speaker: Respondent
  text: I was in the 38th division.
- speaker: Respondent
  text: 152nd infantry. K company, they were 152nd infantry.
- speaker: Interviewer
  text: K company. And you -- where did you go from here? You went to --
- speaker: Respondent
  text: Fort Benjamin Harrison.
- speaker: Interviewer
  text: So you went to Indianapolis and that's probably where you were sworn in and everything.
- speaker: Interviewer
  text: Your training, was that down there?
- speaker: Respondent
  text: In Camp Shelby, Mississippi.
- speaker: Interviewer
  text: So they took you from there to Mississippi?
- speaker: Respondent
  text: Camp Shelby. They sent us to -- they sent us with Indiana National Guard.
- speaker: Interviewer
  text: Okay. And you were -- you went directly into infantry.
- speaker: Respondent
  text: Into the infantry, right. I was never -- I was in same company every day that I was in the service.
- speaker: Interviewer
  text: The whole time. What was it like in Mississippi?
- speaker: Respondent
  text: Oh, it was -- the training, it was good because it was real hot, you know.
- speaker: Respondent
  text: And we trained in the swamps and then we went on maneuvers, you know, to different places.
- speaker: Respondent
  text: Went to Louisiana and Texas.
- speaker: Respondent
  text: And then we went -- oh, we went to Florida too. We went for amphibious training in Florida, Tallahassee.
- speaker: Respondent
  text: And then -- I told you Louisiana and Texas too.
- speaker: Interviewer
  text: Yes. So you -- and how long were you then in training in Mississippi before you went --
- speaker: Respondent
  text: -- overseas?
- speaker: Respondent
  text: We were there for a long time. We were -- we didn't leave -- we were in Mississippi training and then on maneuvers
    and all that. And then we left on -- well, you know what? I have a diary from --
- speaker: Respondent
  text: -- my, my captain.
- speaker: Interviewer
  text: Oh, all right.
- speaker: Respondent
  text: He used this. See, his name is -- oh -- Vince Kimberland (ph). He's talking about when we left. I don't know when
    he got there to our outfit, you know, but we were there till Christmas Day of 1943.
- speaker: Interviewer
  text: And in Christmas of '43 --
- speaker: Respondent
  text: -- we went overseas.
- speaker: Interviewer
  text: -- you flew -- you went overseas?
- speaker: Respondent
  text: Yeah. We went through New Orleans and went through the Canal Zone and then we went -- on a boat, you know, to Hawaii.
- speaker: Interviewer
  text: Oh, okay. So you went -- you went to Japan rather than the other way around?
- speaker: Respondent
  text: We went to Hawaii. We didn't go to -- we didn't get that far.
- speaker: Respondent
  text: We went to Hawaii and then we went to New Guinea.
- speaker: Respondent
  text: And from New Guinea, went to the Philippines.
- speaker: Respondent
  text: And that's where we stayed.
- speaker: Interviewer
  text: And you were in the Philippines?
- speaker: Respondent
  text: That's where we fought, yeah.
- speaker: Interviewer
  text: And what was -- the trip over was on a troop ship?
- speaker: Respondent
  text: A troop ship, yeah.
- speaker: Interviewer
  text: Were you with a group of ships or was it just a --
- speaker: Respondent
  text: From Hawaii over there -- from New Orleans to Hawaii, we didn't have -- very little, you know, boats, you know, to
    --
- speaker: Respondent
  text: I guess, they could call them fast. At that time there wasn't anything going over there.
- speaker: Interviewer
  text: Right. Okay.
- speaker: Respondent
  text: But then from Hawaii to New Guinea, we had escort, you know.
- speaker: Interviewer
  text: You left at Christmas Day and that was of '42, right?
- speaker: Respondent
  text: Can't believe __________________.
- speaker: Interviewer
  text: To Hawaii, to -- and to the Philippines?
- speaker: Interviewer
  text: All right. And when you got to the Philippines, where did you land? Manila?
- speaker: Respondent
  text: We ended up in -- yeah, in Manila. We ended up in Fort -- what the hell was the name of that?
- speaker: Interviewer
  text: Clark or --
- speaker: Respondent
  text: No, we weren't in Clark -- that was . . .
- speaker: Respondent
  text: Subic Bay was in Philippines.
- speaker: Respondent
  text: Yeah, no this -- in Hawaii we went to . . .
- speaker: Interviewer
  text: Hickam? Could it have been Hickam?
- speaker: Respondent
  text: No, no, that was --
- speaker: Interviewer
  text: That was Air Force.
- speaker: Respondent
  text: We went to the -- let's see. It's here. I'll get to it. You know, this guy wanted medals, you know. And that's why
    he --
- speaker: Interviewer
  text: Oh, he kept a pretty good diary.
- speaker: Respondent
  text: I don't know how he could keep a diary but he lies a lot.
- speaker: Interviewer
  text: (Laughing.)
- speaker: Respondent
  text: You know, pats himself on the back. He wasn't -- you know, he claimed several things that I did, he took --
- speaker: Respondent
  text: He wrote them, but, you know, well, he's a dead man, he can't . . . Let's see. We left -- New Orleans was the port
    of embarkation. On December the 30th, 1943, we left.
- speaker: Respondent
  text: And then -- it's all here. See, I could tell you everything. Oh, that's the trip from -- from New Orleans to Panama,
    I guess, is -- (mumbling) and I'll tell you the truth. Even has the hour we left.
- speaker: Interviewer
  text: You left at 9 --
- speaker: Respondent
  text: Oh, that's when we got to -- to where the Panama Canal was. Took 11 hours, he said.
- speaker: Interviewer
  text: To go through the canal?
- speaker: Respondent
  text: No, no. To get from New Orleans to Panama. We spent a while -- I gave you the wrong information there. We went --
    oh, that's where we left from, New Orleans, you know.
- speaker: Respondent
  text: We were alongside the docks and began to unload. But that was when we got to -- that's when we got to New Orleans.
    I must have messed it up. There was a band playing "Indiana" -- that was New Orleans. We got to New Orleans.
- speaker: Respondent
  text: Now, just give me a little time, and then I can start and we can go right through.
- speaker: Interviewer
  text: No problem. Take your time.
- speaker: Respondent
  text: We were all wondering what kind of a ship we would be sailing on, you know.
- speaker: Respondent
  text: That was on -- try to give you a date, the right date -- the 30th of December. That's when we loaded the boat.
- speaker: Respondent
  text: And then -- oh, he said he was wondering what kind of a ship we were going to go on, you know, so . . .
- speaker: Respondent
  text: Oh, the trip that we left on was the SS Manta Ray, was a former medicine liner.
- speaker: Respondent
  text: He's talking about who he shared his room with, you know.
- speaker: Interviewer
  text: Okay. And you were on that same ship all the way to Hawaii?
- speaker: Respondent
  text: Right, to Hawaii, yeah. Took us -- I'm not sure if it -- 17 days, I think.
- speaker: Respondent
  text: And he said the food on the ship was the best he had ever eaten.
- speaker: Interviewer
  text: Now, this was your captain?
- speaker: Respondent
  text: He was just another officer but he was with battalion, see?
- speaker: Interviewer
  text: Okay. I see.
- speaker: Respondent
  text: He was with the -- that's why he's talking -- and then he talks about the guy that he roomed with, you know.
- speaker: Respondent
  text: '"On January the 1st, 1944, New Year''s Day, we sailed down the Mississippi River and out of the Gulf of Mexico, still
    not knowing our final destination." We didn''t know where we were going to.'
- speaker: Respondent
  text: '"We had woolen uniforms and we found out that they were too hot, so we didn''t know where we were going." And he
    said that''s when we found out that we were going to -- since we were going -- "they gave us a San Francisco post office,
    we found out that we were going to the Pacific."'
- speaker: Respondent
  text: '"Some of the men thought we were going to Hawaii, and some Australia. Some said New Guinea or New Caledonia." It
    just -- we were going to Hawaii; we went to Hawaii. He talks about the trip, you know, how the flying fish followed the
    boat.'
- speaker: Respondent
  text: Were you in the service too?
- speaker: Respondent
  text: What were you in?
- speaker: Interviewer
  text: I was in the Air Force.
- speaker: Respondent
  text: Okay. See, we started -- let's see. Doesn't have the dates every time, you know. He's just talking about the whole
    trip as a whole. We were on the boat from New Orleans and we were going to Hawaii.
- speaker: Interviewer
  text: How long were you -- did you stay in Hawaii? Do you recall?
- speaker: Respondent
  text: Oh, yeah. We stayed a long time because we were doing guard duty.
- speaker: Respondent
  text: And we -- every month we'd transfer all the way around -- all around like -- we were on the main island, you know,
    the island of Maui.
- speaker: Respondent
  text: So every month we changed all around. Our division was security for the whole island.
- speaker: Interviewer
  text: Okay. I see.
- speaker: Respondent
  text: See, the division was three -- three different regiments.
- speaker: Respondent
  text: Used to be four and then they triangularized them and they left three -- they sent 149 infantry to the canal before,
    way before.
- speaker: Respondent
  text: And then there was three, and we did all the security.
- speaker: Interviewer
  text: Okay. I see. So you were on Hawaii for a long time.
- speaker: Interviewer
  text: Then pretty soon you boarded your ship and took off for the Philippines.
- speaker: Respondent
  text: Yeah. Now, here it says, you know, in January the 6th we could see the island of Hawaii.
- speaker: Respondent
  text: So that explains how we got --
- speaker: Interviewer
  text: It took you, like you said, 17 days to get there.
- speaker: Respondent
  text: Here it says we could see the Aloha Tower and all that.
- speaker: Respondent
  text: And then it tells you -- it tells us where we got, you know. From there we went to Hickam Field -- oh, no, we passed
    through Hickam Hill.
- speaker: Respondent
  text: And Pearl Harbor. And it was big, you know. It was --
- speaker: Respondent
  text: We reached the -- we are now sector of the island and that's where we -- oh, we relieved the 20th Infantry of the
    6th Division there.
- speaker: Respondent
  text: And we started training. We were -- he's talking about how we went swimming and all that.
- speaker: Respondent
  text: He said -- oh, he went on a transport to -- on June the 17th (mumbling). He's talking now about when we left.
- speaker: Interviewer
  text: Would have been about June sometime, probably?
- speaker: Respondent
  text: Let's see. Not all the time.
- speaker: Respondent
  text: Well, we got there -- I told you what day did we get there?
- speaker: Interviewer
  text: January 16th, I think it was.
- speaker: Respondent
  text: Okay. On June the 27th we left Hawaii.
- speaker: Interviewer
  text: Okay. So you were there about six months?
- speaker: Interviewer
  text: And then you left for the Philippines.
- speaker: Respondent
  text: Maybe longer. Yeah, we went to -- we left for New Guinea.
- speaker: Interviewer
  text: Okay. Right.
- speaker: Respondent
  text: And we were on an Army transport then. We were on the -- he hasn't got the name of it. Just -- he said he went to
    load the -- he was in charge of loading the transport, you know. And again we left on the 10th -- no, no. We left the
    1st of July and crossed the equator on the 6th, and by the 10th we reached the Island of Funafuti.
- speaker: Interviewer
  text: And that would have been July of forty . . .
- speaker: Respondent
  text: Yeah. I remember that because that's when we were in New Guinea.
- speaker: Respondent
  text: And then we went -- we were -- then we start patrolling, you know.
- speaker: Interviewer
  text: All right. What was the status of the island at the time? Was it under occupation? Did the Japanese have --
- speaker: Respondent
  text: No, we had already -- they had already --
- speaker: Interviewer
  text: They had already taken --
- speaker: Respondent
  text: -- they took off.
- speaker: Interviewer
  text: Okay, all right.
- speaker: Respondent
  text: There was very little action there.
- speaker: Respondent
  text: And when we got there, we patrolled a lot, you know. Went on patrols. And that's what we were doing.
- speaker: Interviewer
  text: Okay. And do you -- about how long were you at -- were you on New Guinea?
- speaker: Respondent
  text: New Guinea, let's see. That's what I'm trying to find it. All this talking here about Hawaii. We sailed again on the
    11th. See this. Then let me get it right. It was on July the 1st -- we sailed for New Guinea on July the 1st.
- speaker: Respondent
  text: We crossed the equator on the 6th, and by the 10th we reached the Island of Funafuti, like I told you.
- speaker: Interviewer
  text: Right. Okay.
- speaker: Interviewer
  text: And you were there for --
- speaker: Respondent
  text: Well, we just crossed it.
- speaker: Respondent
  text: We went by it, so. We didn't land anymore till we got -- we passed New Hebrides.
- speaker: Interviewer
  text: Okay, yeah. New Hebrides, sure.
- speaker: Respondent
  text: Yeah. And then we got to -- finally Oro -- at New Guinea we reached Oro Bay.
- speaker: Respondent
  text: From Oro Bay, we -- on July the 17th we got to Oro Bay. We unloaded the troops but he said it took him three days
    to get the supplies off. Then we -- "It was here that we began to shape up into a fighting unit, bringing up the fighting
    strength" -- oh, we started getting reserves, you know, new men.
- speaker: Interviewer
  text: Okay, getting --
- speaker: Respondent
  text: Because we were down, you know, we didn't have a pool.
- speaker: Interviewer
  text: Okay, so you started to get replacements -- or not replacements, but new troops were coming in, right?
- speaker: Respondent
  text: Yeah, right. On the 1st of December we were in a boat, the cargo ship, Austin Daly (ph) to sail for the Island of
    Leyte.
- speaker: Interviewer
  text: Okay. So you headed for Leyte.
- speaker: Respondent
  text: Philippines.
- speaker: Interviewer
  text: So that would have been December of '43?
