collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Where and when were you born?
- speaker: Respondent
  text: I was born on the 8th of February 1921 in San Antonio Texas, Bexar County.
- speaker: Interviewer
  text: What about your family occupation and number of siblings you had?
- speaker: Respondent
  text: There was five of us in our family, 3 boys and 2 girls.
- speaker: Interviewer
  text: What were you doing before you entered the service?
- speaker: Respondent
  text: I was a student at the University of Texas.
- speaker: Interviewer
  text: Do you have any family members who served in the military?
- speaker: Respondent
  text: Yes, my two brothers, one was in the army and the other one was in the air force.
- speaker: Interviewer
  text: How did you enter the military? Were you drafted or enlisted?
- speaker: Respondent
  text: I was enlisted. I was given an option either I enlisted or they would draft me, so I enlisted.
- speaker: Interviewer
  text: What branch did you choose?
- speaker: Respondent
  text: I chose the US Navy.
- speaker: Interviewer
  text: How was your training like, early days of your training?
- speaker: Respondent
  text: It was hot soup, it was real good, no problem.
- speaker: Interviewer
  text: Any specialized training you were given?
- speaker: Respondent
  text: No, they gave me 2 weeks training in electronics radio material school in Chicago. The 1st week I sat in class and
    the 2nd week I helped the lab instructor and that was the training I got.
- speaker: Interviewer
  text: How did you adapt to military life since you joined before college? How was the regiment, food, and social life?
- speaker: Respondent
  text: It was no problem, everything was okay with me, no problem at all, I became custom.
- speaker: Interviewer
  text: You adapted the social life just fine?
- speaker: Respondent
  text: Everything, what about getting up early in the morning and the whole military training?
- speaker: Interviewer
  text: No problem. I had a paper route in the morning when I was attending the University of Texas.
- speaker: Respondent
  text: Okay great. And then I washed dishes at night at Black Hack [laughs].
- speaker: Interviewer
  text: Where did you serve as a veteran, location during your wartime?
- speaker: Respondent
  text: I served in the US Naval Amphibs. I was on board ship LSD, that's landing ship tank number 820. I was in Marianas
    and I was there for a week just in cleaning up operations. Then from there we went to the landing in Agushi harbor in
    Okinawa.
- speaker: Interviewer
  text: Any more details about that trip? Any special things you remember?
- speaker: Respondent
  text: When I had to leave, we were checked out on the 30th of March in the afternoon. We were told we were not supposed
    to fire or do any combat in cemeteries because they were considered things there were very gobbly.
- speaker: Respondent
  text: The next day I had a BC 1000, which was a radio broadcast transmitter and receiver, called a transceiver, on my back
    and I had a .45. I went down the rope ladder on the side of the ship into a small Higgins boat. On the Higgins boat we
    made the invasion in Agushi harbor in Okinawa. There I was suddenly and accidentally put in as a radio operator for the
    pro-tune in 2nd Marine Division and I acted as sergeant for the rest of the day. I was told to come back to the ship and
    we continued operations there. The 3rd day I had to get down again to the area and I went with the Marines all the way
    to Naha, the capital of Okinawa. That was the extent of my ground duty.
- speaker: Respondent
  text: 'I went back on board ship. On September 16, 1945, they celebrated the victory of the war in Europe. Some fool decided
    to celebrate on board my ship and they opened fire with the 40 mm guns. I was underneath, we were conditioned easy, and
    my eardrums were busted. After that, we did some mop-up operations from Agushi all the way to Naha and then into Aishima.
    In Aishima I was approximately 200 yards from a group that was a Brigadier General and his group, Ernie Pile the reporter
    was with him. There were some Japanese in the area and I guess they didn''t know we were in the clean-up, so one of them
    shot into this group and killed Ernie Pile. We erected a monument for him. Then we went on to clean up the rest of Aishima
    island. Later about that time they had the ceremony on the Missouri for the Japanese surrender. They had dropped the A
    bomb in Hiroshima and so they gave up. We had B-29 bombers all over the area and some of them were carrying Japanese to
    the ceremony, which was on the USS Missouri. After that we went on board ship again and were underway to Kyushu, southern
    Japan. We were supposed to beat the invasion forces near three little towns from Agushi harbor: Takaso, Fujiwi, and Kanoya.
    We were caught off guard so we couldn''t go out at sea to ride out the storm, the hurricane, so we stayed close to shore.
    That''s when I lost my ship. We were broached on this harbor compared to Takashuhi and Kanoya. We were there for about
    2 weeks and I was given the opportunity to get discharged. I had enough points already and being married with 3 kids,
    I had priorities. They asked if I wanted to be discharged and I answered yes. They gave me 2 boxes of K-rations and I
    had 65 cents in my pocket. I walked off the ship and walked to Kadena Air Force Base. There was only 1 plane there, a
    C-46, so I asked for a ride or flight out of there. They took me to Buckner Bay. At Buckner I was there to get an LCVP.
    The plane ride I took took me to Aishima from Takasumi Kanoya. At Aishima I was able to get an LCVP, one of the assault
    boats, and that took me to Buckner Bay. General Buckner was killed in the same area as Ernie Pile. With my 2 K-rations
    and my C-bags I got off the boat and walked across. It''s only about 2 and a half or 3 miles across the islands from Buckner
    Bay and Agushi harbor. I walked with my C-bag and my bag. I had been walking about maybe 10 or 15 minutes and I heard
    a roll of a deuce and a half, those are the big trucks the army had at those times. So I stopped and cheered up. This
    great big truck was heading towards me. The road had been graveled, it was just done, the CB did a beautiful job. So this
    deuce and a half came towards me and I thought I was surely going to get a ride into Agushi harbor. The truck stopped.
    At the time the only jobs for black troops were either Stuarts in the kitchen. We had black guys on my ship doing that
    and other jobs they had in the army was driving trucks and especially gasoline trucks. So this deuce and a half stopped
    and one of the black guys got on the running board and asked me, ''Mate, you need a ride?'' and I said yes I do. So I
    loaded the seat bag and by the time they took off [laughs].'
- speaker: Interviewer
  text: So they left you alone over there and took off?
- speaker: Interviewer
  text: What was the reason for them to take off?
- speaker: Respondent
  text: The blacks were hurt because they couldn't fight with us.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: So they used them to drive trucks and Stuarts in the kitchens in the navy. They were not equal with the rest of us,
    so because of that they were angry. I didn't blame them.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: They were very angry and they wanted to get even and they didn't care if you were black, green, or black whatever,
    so they did that to take it out on me. But of course I had nothing against them.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: So I said well hell, they are hurt and besides the only weapon I had was my bowie knife. I gave them that and that
    was all, so what could I do? So I walked the rest of the town with my C-bag. When I got to Agushi I was put in charge
    of a 10 men tent, where there were 12 men of us in there that was caught right next to the other one. All I had to do
    was call roll in the morning and assign them to different things to keep moving. Especially I assigned one to make coffee
    for us every day because that was the best thing in the world. Every morning I used to call roll and that would wake me
    up. There were 3 names right on the top of the roster. There were three guys that really woke me up.
- speaker: Interviewer
  text: No, no, no, no, no. These are guys who came here, came to the area, it was a naval.
- speaker: Respondent
  text: Okay, so there are other Americans you are talking about?
- speaker: Interviewer
  text: 'Yes, yes, but I can''t remember. I had to call the roll every morning and Pakalardo, listen to this, this is what
    I had to say every morning: Pakalardo, Vashloben, and Slagenhoob. If that don''t cut your tongue then I don''t know what
    would [laughs]. Pakalardo, Vashloben, and Slagenhoob. Those were the first three guys I called and the rest were normal
    Smith and Jones and things like that. But there we had another typhoon and we had 120 knots wind. The sand and the wind
    would pick up the sand and hit you and you felt like it was burning your face. We held that thing down, the tent, we held
    that thing. I assigned four guys every day to take care for four hours, four guys for four hours. We had the tent down
    for 3 days and the 3rd night, maybe it was in the morning at 3 o''clock, the tent was blown away. So we didn''t have a
    shelter anymore. I heard one guy holler at me and I used to be called Sparks, that was my insignia for me. Sparks, what
    do we do now? I said each man find whatever you can for shelter. I ran to a little chapel I knew where it was because
    I had been there before. I went to the chapel and there was this little short guy and he pushed me.'
- speaker: Respondent
  text: Japanese guy?
- speaker: Interviewer
  text: So I didn't like it and said, 'Fatty, you leave me alone.' I went in. I was looking for the MG on the altar, you know.
- speaker: Interviewer
  text: So I said heck, I'll get that and I'll sleep on the MG. I had my feet coat and my white hat. When we got down to the
    front row, I took my hat off, put it down and my feet coat. This guy came over, the fat guy, and he takes off his raincoat
    and there are 2 eagles on each shoulder. I said, 'Well, you have to eat crow, eat crow.' I said, 'Colonel, my name is
    John Alvarado, I am with the Naval Amphibs. I am sorry I pushed you.' He said, 'It's okay son, no problem.' I said, 'I
    got in, didn't I?' [laughs] 'Yes, you did.' So we talked the rest of the morning. I guess I met him about 5:30, 6 o'clock
    in the morning and we talked for a while. He asked what I do in civilian life. I told him I work at the field at Kelly
    Air Force Base. He said he might be going there before long. He said if he gets over there, I should look him up and if
    I don't find him, he'll look me up. I said no, I'll find you. That was the end of that. I got on the USS Merits and I
    came back home.
- speaker: Interviewer
  text: Before you came back home, during the way did you witness any casualties?
- speaker: Respondent
  text: Did you witness any casualties, any destruction or any casualties on the way?
- speaker: Interviewer
  text: Yes, there were lots of them.
- speaker: Respondent
  text: You did witness some? Okay.
- speaker: Interviewer
  text: What about how did you stay in touch with friends and family back at home when you were over there?
- speaker: Respondent
  text: I didn't. My wife was the only one that wrote to me every day.
- speaker: Interviewer
  text: And you got the letters and all that?
- speaker: Respondent
  text: Yes, and I used to put them up by dates so I could follow the story.
- speaker: Interviewer
  text: And you got a chance to write her back and everything?
- speaker: Respondent
  text: Every day, every day.
- speaker: Interviewer
  text: How was your return home? You came back to San Antonio, Texas, you were living there at the time?
- speaker: Respondent
  text: Yes, I can't believe I had 65 cents into Terminal Island in California in San Francisco. There I drew pay because
    I never drew pay when I was in the navy.
- speaker: Interviewer
  text: Okay, you never?
- speaker: Respondent
  text: No, I used to cut hair. I smoked pipe, so I bought pipe tobacco with that and of course shaving lotion and things
    of that nature as I didn't have any extra money.
- speaker: Interviewer
  text: Right, because you were there.
- speaker: Respondent
  text: So I didn't draw any payroll.
- speaker: Interviewer
  text: So the payroll was sent home?
- speaker: Respondent
  text: No, the navy kept it and of course I could draw later.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: Which I did and with that money I paid for my house.
- speaker: Interviewer
  text: Okay, okay.
- speaker: Respondent
  text: So I hit Terminal Island and there I drew some money and they issued me some railroad tickets and they sent me all
    the way to Camp Walters in Texas City and that's where I got discharged. They gave me a great big sum of 100 dollars,
    something like that [laughs].
- speaker: Interviewer
  text: When you came back home, how did you get home? Did your family come to pick you up at the airport?
- speaker: Respondent
  text: I took the train back from Texas City to San Antonio and in San Antonio I got a taxi that brought me home. I think
    it was a Sunday morning when I got home. Nobody came to pick me up anyway. I didn't want my wife to go as she had the
    kids.
- speaker: Interviewer
  text: How did you get readjusted to civilian life after the war?
- speaker: Respondent
  text: It wasn't easy. There were so many things we had to do. The folks were having trouble with food, they couldn't get
    food. They had stamps, they couldn't get meat. We had stamps or they did and I used to have anything I wanted anytime.
    I gave my wife permission to sell my car because she couldn't get gas, she couldn't get tires. When I got back I didn't
    have anything. I had to get rides to go to work because I didn't have a car.
- speaker: Interviewer
  text: But you did withdraw your pay when you came back, right?
- speaker: Respondent
  text: Withdraw my pay from the military?
- speaker: Respondent
  text: Yes, that's what paid for my house.
- speaker: Interviewer
  text: Did you join any organizations for the veterans, did you attend any after you...
