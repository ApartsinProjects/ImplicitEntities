turns:
- speaker: Interviewer
  text: You mentioned that you were born in Ellenville, New York. Now did your parents live there or --
- speaker: Respondent
  text: Yes. They were originally born in Dominican Republic.
- speaker: Interviewer
  text: Okay. And then they moved to Ellenville because?
- speaker: Respondent
  text: For work. My dad got work up there and then he went back to Dominican Republic, married my mom and then brought her
    back.
- speaker: Interviewer
  text: Okay. What did your dad do?
- speaker: Respondent
  text: He was like a master electrician and he worked at like vocational schools and prisons, in the prison system.
- speaker: Respondent
  text: So like when prisoners were about to be released, he would teach them a trade --
- speaker: Respondent
  text: -- so they could get work and a job when they got out.
- speaker: Interviewer
  text: Yeah. So they could get reassociated in the system?
- speaker: Respondent
  text: Yeah, that's right.
- speaker: Interviewer
  text: Did your mom work?
- speaker: Respondent
  text: She did a little bit of work with like Shaklee vitamins. She -- we set up an office in our house and so she sold Shaklee
    vitamins through there.
- speaker: Respondent
  text: She still pretty much does that more on a part-time basis now.
- speaker: Interviewer
  text: Okay. Now did any family members serve in the military? Any brothers, sisters?
- speaker: Respondent
  text: No. My only other was my grandfather served in the Dominican Army.
- speaker: Respondent
  text: Other than that, there was --
- speaker: Interviewer
  text: He served in the Army there?
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Okay. Let me see. What were you doing before you entered the service?
- speaker: Respondent
  text: I went straight out of high school. I graduated June of 1987. I was in the Navy July of '87.
- speaker: Interviewer
  text: Okay. Where did you attend -- my bad. Just kidding. Boot camp?
- speaker: Respondent
  text: Well, yeah. I went to boot camp in Orlando.
- speaker: Respondent
  text: Yeah. Then I did air cruise school in Pensacola, Florida.
- speaker: Respondent
  text: And then I went to like my job training in Memphis, Tennessee, and then finalized it in Jacksonville, and then I went
    to my regular squadron from there.
- speaker: Interviewer
  text: Did you have something, Jacob?
- speaker: Interviewer
  text: Did you have any specialized training?
- speaker: Respondent
  text: Yeah. My primary job when I first joined was we were hunting submarines out of a P3. In the late '80s the Soviets
    were sending a lot of the subs into the Med, so we were trained to detect them. So a lot of the training that I received
    was more -- was like underwater sound acoustics and like oceanography and stuff like that. So yeah, I was trained in that.
- speaker: Interviewer
  text: Was there any particular reason you chose the Navy in place of any of the other?
- speaker: Respondent
  text: I wanted to get into aviation, so I pretty much narrowed it down to two. And then I just thought the Navy had more
    of a wider range of things that I could probably get into. And so -- you know, so I chose -- I chose the Navy over anything
    else. It just had a lot more that I could probably -- that would fit my kind of -- of what I wanted.
- speaker: Interviewer
  text: Okay. And why did you want to go into aviation?
- speaker: Respondent
  text: Just been -- had the love for aviation ever since I was a child. And so the Navy afforded me the opportunity of flying
    but without being commissioned.
- speaker: Respondent
  text: So normally pilots and like REOs, what they do is they have to go to college first and then go into the military.
- speaker: Respondent
  text: And so the Navy allowed me to go straight out of high school, go through some training, air cruise school and be like
    an acoustic operator on a plane. So I was still trained but not as a pilot. But that afforded me the opportunity to do
    that, and then the Air Force didn't.
- speaker: Respondent
  text: So I pretty much leaned towards the Navy.
- speaker: Interviewer
  text: So the Air Force had required a college diploma or something?
- speaker: Respondent
  text: Well, they wanted more pilots at the time. And so in order to do that I would have to go to college or, you know,
    go to Embry-Riddle or some form of aviation school and then go into the military.
- speaker: Interviewer
  text: Yeah. So you attended boot camp in Orlando, you said?
- speaker: Interviewer
  text: And then you went to Pensacola?
- speaker: Respondent
  text: Yeah, Pensacola, Florida.
- speaker: Interviewer
  text: Okay. Let me see. Specialized training. You mentioned that before. What was boot camp like?
- speaker: Respondent
  text: The first couple weeks it was more just -- you know, just seeing, you know, what the military life was all about.
    They tried to kind of like really instill discipline and attention to detail and stuff like that. And they -- you know,
    a lot of people got intimidated and scared. And I just pretty much just paid attention and did what I was supposed to
    do. And so I achieved a rank of starboard watch petty officer in boot camp, which they have pretty much three main ranks,
    and then it's the recruit chief petty officer who's in charge of the whole squadron.
- speaker: Respondent
  text: And then the left side is the port watch and the right side is the starboard watch and we were like his right-hand
    man. So I had three section leaders under me, and then they had more people under them. And so, you know, I achieved that
    in boot camp. And so then I kind of got more acclimated to leading, you know, and having everybody come together as a
    unit. But it was mainly just having everybody work as one sole like unit and so just helping each other out and so...
- speaker: Interviewer
  text: What do you think -- what do you think made you suitable for that duty? Like why do you think you were made that?
- speaker: Respondent
  text: I don't -- I think it's mostly personality and how you -- there's some people that didn't really take well to being
    disciplined and being, you know -- they really get in your face. They really yell at you quite a bit. And if you just
    don't take it personal, you just listen. If you do what you're supposed to do, all that is minimal. And so it's when you
    mess up, when you don't listen, when you -- you know, you don't pay attention to even the slightest detail --
- speaker: Respondent
  text: -- then that's when you got disciplined. And so I was just very meticulous, even as a child, putting things away in
    a certain order and stuff. That really helped me when I got into the military because I was very organized. And so I didn't
    really, you know, get disciplined as much. So it just suited me, I think. But I think it really takes someone with a certain
    personality to really -- because there's just some people that, you know, couldn't take it.
- speaker: Interviewer
  text: Now here's a question for before all this happened.
- speaker: Interviewer
  text: Why did you join the service at all? I mean, not the Navy specifically, but what made you?
- speaker: Respondent
  text: Yeah. Well, my older sister and I are only 11 months apart. And so I always wanted to go to University of Miami, which
    is a private college, but my sister went to Vassar, which is also a private college. And so having her go as a freshman
    and then me go when she's a sophomore to two private schools, my parents just couldn't really afford that.
- speaker: Respondent
  text: So then my initial intent was to sign up for four years, let my sister do her private school, and then I can do my
    private school.
- speaker: Respondent
  text: But then the war started and then they extended me a year, so then I did five years. And then my younger sister went
    to private school.
- speaker: Respondent
  text: So it was a -- but that was the initial intent, was to kind of get the GI Bill, get helped out and to do stuff like
    that.
- speaker: Interviewer
  text: Okay. Yeah. So financial then.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Okay. Did you end up attending college after your service?
- speaker: Respondent
  text: Yeah, I sure did. I did two years at University of Miami. I went there to play baseball, I got hurt, and then I transferred
    to Florida State and that's where I graduated.
- speaker: Interviewer
  text: Okay. What did you major in?
- speaker: Respondent
  text: Multinational business operations. I got a minor in Spanish. And then I was only a couple of classes of graduating
    with a MIS, management information systems, but I never finished. I never finished that section.
- speaker: Interviewer
  text: Okay. Do you have something, Jacob?
- speaker: Interviewer
  text: What was like everyday life like when you're not doing missions and stuff or -- in like -- on base?
- speaker: Respondent
  text: In the Navy what you -- I was assigned to logs and records, which is more of an office job; that what you do is you
    record all the flight paperwork that comes in. There was a lot of pilots that wanted all their records put down and what
    their qualifications were, because a lot of them would go fly for like United or, you know, Delta or something like that.
    So then a lot of them would call me and say, hey, you know, we want to see who in the next six months is getting out and
    has this, you know, instrument qualification and all that stuff. Because the airlines, they love military pilots because
    they have minimal training to do. So that's what I did when I didn't fly. But I pretty much flew almost every day. So
    when I didn't fly, then I went and did the logs and records job. And then we also had like training that we had to do
    in order to make rank, in order to do our jobs. So when we weren't flying we were doing like classwork stuff to try to
    qualify for our wings and certain things, so...
- speaker: Interviewer
  text: So there wasn't a lot of free time or...
- speaker: Respondent
  text: Not really, and not during the week. That's why you probably, you know, hear stories of military guys just going bananas
    on weekends because we had to work so hard during the week that the weekend was just a release. You know, we would just
    go out and, you know, party. You know, party really hard. And it was because we worked so hard, you know, during the week
    that, you know, you just needed some time off just to maintain your sanity.
- speaker: Interviewer
  text: So when you would go off base, what would you do? You said you'd go and party, just...
- speaker: Respondent
  text: Yeah. There's -- you kind find friends that are -- you're doing a lot of similar stuff. So you obviously naturally
    become like a unit.
- speaker: Respondent
  text: So you use always -- you know, I hung out with the same like seven or eight guys, and we would like -- in Pensacola,
    for instance, they had this thing called the boardwalk where we would go down and they had a bunch of restaurants and
    bars and arcades. And so we would just go and we'd go to bowling alleys, movie theaters.
- speaker: Respondent
  text: You know, just go out and do stuff, go to the malls.
- speaker: Interviewer
  text: To keep yourself sane, you said, you know?
- speaker: Respondent
  text: Yeah. I mean, just to do something else outside of the military. Because, I mean, it was so strict.
- speaker: Interviewer
  text: Regimented and all that?
- speaker: Respondent
  text: Yeah, and you kind of needed some time to do something else.
- speaker: Interviewer
  text: So the trip from -- did you go straight from Pensacola to Sicily?
- speaker: Respondent
  text: No, no. Pensacola, I went to -- the base is called Millington. It was in Millington, Tennessee, which is right outside
    of Memphis. And that's when we pretty much -- like the job that I was doing, the acoustic operator on a P3, that's when
    we specialized in that equipment. So the equipment that we saw on the plane, all the screens and all the -- we started
    working on how to operate those. And so the air cruise school was pretty much more on the plane itself, you know. So we
    did devices and stuff on the plane, and then we went to -- it's called buttonology and stuff like that. So that's what
    we did there. And then after Tennessee then I went to Jacksonville to kind of put it together, and then Jacksonville was
    more where you did more the secret stuff.
- speaker: Respondent
  text: And so a lot of the -- we had a lot of classified stuff that we had to do and go through. And so then that's when
    we actually started flying on the plane.
- speaker: Respondent
  text: And then you had to do -- I believe back then it was like 40 or 45 hours on the plane before you got graduated and
    went into your regular squadron. So Sicily was more like a deployment after I was put into my permanent squadron, which
    they were based out of Brunswick, Maine.
- speaker: Interviewer
  text: Okay. So -- and then what was the trip over to Sicily like?
- speaker: Respondent
  text: Pretty much we were pre-opped before we went out on what we needed to do. A lot of the crews had to prequalify for
    like torpedo exercises and all that stuff, just in case we needed it in war. Your crew, when you got assigned a crew,
    had to be qualified to do all kinds of stuff like that. So in Brunswick we pretty much trained for that. In Sicily we
    -- it depended on, you know, what the ops boss needed, what the President was asking and just following up on what they
    wanted us to do. So in the late '80s we pretty much followed a lot of the submarines that were coming into the Med and
    just making sure they weren't doing anything, staying outside the limits of our allies and, you know, just kind of keeping
    an eye on them, playing so-called war games with them.
- speaker: Interviewer
  text: Kind of like surveillance, for the most part? Like reconnaissance?
- speaker: Respondent
  text: For the most part, yeah. Reconnaissance, surveillance, that's correct.
- speaker: Interviewer
  text: Now you mentioned that in Jacksonville you conducted like classified trainings?
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Is any of that declassified or can -- is there anything --
- speaker: Respondent
  text: Not really sure. Well, what it was like was more specifics, like ranges of certain missiles.
- speaker: Respondent
  text: You know, stuff like that we can't really talk about.
- speaker: Interviewer
  text: So like technical things.
- speaker: Respondent
  text: Yeah. And we studied a lot on Soviet submarines because they were the majority of what we worked with. And then we
    also had to classify and detect American subs. And like their ranges, their depth stuff and their weaponology, all of
    that is classified.
- speaker: Interviewer
  text: So you could identify certain submarines?
- speaker: Respondent
  text: Yeah, by certain signatures and stuff.
- speaker: Interviewer
  text: Okay. And then you mentioned that you also worked out of Saudi Arabia. Now did you make the trip from Sicily direct
    to Saudi Arabia?
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: Okay. Now what was that like and how did you get over there?
- speaker: Respondent
  text: Through the P-3 Orion. The range on that plane was massive. We did missions that were up to 12, 13 hours.
- speaker: Respondent
  text: And so, yeah, the range on those were phenomenal.
- speaker: Respondent
  text: So we just flew on our squadron planes.
- speaker: Interviewer
  text: And where did you land in Saudi Arabia?
- speaker: Interviewer
  text: Jeddah. Okay. That's in -- that's northern Saudi Arabia?
- speaker: Respondent
  text: I believe so.
- speaker: Interviewer
  text: Kind of northern?
- speaker: Interviewer
  text: Yeah. And then was that a main base of operations for --
- speaker: Respondent
  text: Well, they had a compound base that a lot of forces were in, but for us they put us up in Marriott Hotels. We weren't
    allowed to wear our military uniforms. They allowed us to grow our hair. I grew facial hair. And over there it was so
    hot, you know, I was pretty tan. And so with a goatee and a tan and a little bit longer hair they thought I was Arab.
    And so when we were pretty much out of, you know, the hotel they gave us rental cars and then we drove to the base and
    did our missions.
- speaker: Respondent
  text: And we flew every other day.
- speaker: Interviewer
  text: So you weren't staying on base then?
- speaker: Respondent
  text: No, no, not certain sections of our squadron of the aviation part. We stayed outside.
- speaker: Interviewer
  text: Now were there ever any security concerns with all these pilots not staying on base?
- speaker: Respondent
  text: There were. There was some concerns where they -- they kind of briefed you before you head out there. In Saudi Arabia
    they don't allow women to drive. They don't allow women to be in front seats, even. And there was one incident where we
    were going downtown to go see some of the shops. And just out of, you know, courtesy and stuff we had a structural mechanic
    that was a female. So we said, oh, you can sit on the front seat and then we'll just sit in the back. Well, we don't even
    get a mile, two miles down the road before we got pulled over.
