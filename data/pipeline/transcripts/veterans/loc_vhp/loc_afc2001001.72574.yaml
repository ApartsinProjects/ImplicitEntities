turns:
- speaker: Interviewer
  text: 'I enlisted primarily because of Pearl Harbor. I remember Pearl Harbor day. It was a bright, sunny day in Portland.
    I was coming down the steps of the old Montevilla Methodist Church. It''s no longer there, a different building, same
    place. One of the young fellows that I knew was sitting in his family car listening to the radio and he said, "Pearl Harbor''s
    just been bombed." That''s the first I knew of it. Then, that, of course was in December of ''41. In April of ''42, I
    enlisted in a program known as V-6 that the Navy had for people who were in college. It was a pre-officers program. The
    Navy let me stay another year in college which I spent at Oregon State. At the time I enlisted, I was at Multnomah Junior
    College. That''s not Multnomah School of the Bible. It was a junior college. It was operated in the YMCA building downtown.
    So, then I went to Oregon State the next year. Multnomah had an industrial division in addition to their scholastic division.
    They were separate campuses. Anyway, I was taking courses in the regular junior college part, but I took welding in the
    industrial part to get ready to work in the shipyards during that summer before I went down to Oregon State. So, I worked
    for Kaiser Shipyards as a welder. I recall you had to be-you had to pass 3 tests. Of course, the flat one is relatively
    easy. The next one is vertical and the most difficult is overhead. I didn''t pass the 2 last ones until I was working
    down there. So, I had to get up at 4:30 or so in the morning and go down and take classes before the shifts started. Anyway,
    I got to doing those things and worked the summer there for $2.50 an hour which was a princely sum at the time. I saved
    $1,056 which put me through Oregon State the next year. Then, the Navy called me up to active duty July 1, 1943. I went
    back to Boston Receiving station there in Boston. In the fall, the Navy sent me to Purdue University in Indiana with these
    other midshipmen. We lived in a fraternity house and attended there. I took some courses which I thought would be helpful
    like military German and navigation and spherical trig and that kind of stuff. Then, after a term there, was it the same
    year? Yes, the same year, they sent me to Navy Officers School at Wellsley which is a girl''s school. The girl''s school,
    Wellsley, well of course it had quite a campus, but the Navy midshipmen were housed in a quad-there''s a quadrangle and
    the girls had two quarters of the quadrangle. The boys had the other parts of it. We were there for several months and
    then commissioned out of there as supply officers, supply or ''disbursing. They assigned two of us, his name was Al Benson
    and myself, to a fleet of LCILs Landing Craft, Infantry (large). We could choose. One of us take supply and one of us
    take ''disbursing. I took ''disbursing. He took supply. We went from there down to Solomons, Maryland and spent the summer
    there. It was hotter than all get out and humid. Being used to the Northwest climate, it was quite a bit different. We
    taught, what they called stores officers. They were commissioned officers, but they weren''t commissioned in the supply
    corps. They took a course for a few months and then they would go onto a small ship that had no supply or ''disbursing
    officer and act in that capacity. Then, let''s see, when we got--from there we were assigned to Corpus Christi. No, to-can''t
    think of the name of it now-rGalveston anyway a town that''s on the causeway off of the mainland to a Navy base there
    to gather up our flotilla. We were supposed to be 36 LCILs. Benson lived in Chicago. He said-we had what they called "proceed
    time"-if the order said "proceed" to such-and-such place, it didn''t have to say you have so long to do it, but it was
    built into the rules. Four days, you had plus travel-time. So, we went up to Chicago. Having been in the cooker all summer
    and then there where it was cold, when we came back down, I got pneumonia. So, there wasn''t any Navy hospital. So, they
    put me in an Army hospital there. Well, that took me out of the running with Benson as a team. So, I had to oh wait what
    would happen later on. Anyway, several months and surgeries later, by then, Benson was out by that time in the South Pacific.
    I was assigned to duty at Receiving Station, San Diego which primarily paying "casuals", which we called them "casuals".
    They were fellows that had been at sea- some of them for a year or more-hadn''t been paid. So, we were paying them before
    they went home on leave or were discharged. We also paid at a Marine base which was 20 or 30 miles from there. That''s
    essentially what I did the rest of the time that I was in the service. I never got to sea after that. Well, I was assigned-after
    I got over that pneumonia-l was sent down to Panama to, I guess, on the way to San Diego. Then, in San Diego is where
    this surgery that I said took place. Anyway, I spent-other than being in Panama for a little while--I was in the continental
    U.S. So, I didn''t see any fighting. It was just the record keeping and pay and that kind of stuff. Eventually in August
    ''45 Correction: ''46, I was discharged, retired actually. I had in mind that I wanted to take law. I inquired at Willamette
    and there was accepted. In September ''49 Correction: ''46, I enrolled there. I''d had 3 years of undergraduate work.
    Law School was 3 years. I finished out the year for the undergraduate work in the summer school. So, when I graduated
    in ''49, I got 2 degrees, a law degree and B.A.'
- speaker: Interviewer
  text: No, I went on a ship. In fact, I was on the LCIL.
- speaker: Interviewer
  text: Landing Ship, Large. The head of our fleet group of 36, the officer that was head of that had the rank of commodore
    which you don't very often see these days. He was a Veteran of the Naval Academy, although, he had retired to civilian
    life and came back during the war. He was a nice fellow to be with, wasn't all that spit and polish stuff of the Navy.
    I remember on the way down to Panama, we were on this LCIL which has a low deck. The whole thing is low. Anyway, it was
    good weather and we weren't in any hurry, I guess. He said, "Everybody who wants to can go swimming." They stopped the
    ship and we went swimming. He posted a couple of guys on shark watch. They didn't see any sharks that I know of, but anyway,
    that was a precaution. Then, we ended up in Panama. For some reason, I took the train from the east. I can't remember
    now what the east port of Panama is. Panama City is at the west end. I took this ancient train which was, I think 50 years
    old at that time or more. So, I didn't pass through the canal, on the ship. I spent a little bit of time there in Panama.
- speaker: Interviewer
  text: Actually, I traveled by myself. They took me from Panama up to San Diego on a cruiser. The doctor said, "You can go
    up on deck, but you have to wear a life preserver"--because of the medication I was taking. I preferred not to do that
    because I'd stand out. So, I stayed below deck most of the time. Then, when we got to San Diego, I was on land the rest
    of the time.
- speaker: Interviewer
  text: While I was in the service?
- speaker: Interviewer
  text: I don't know as I had any most memorable that I can think of.
- speaker: Interviewer
  text: No, I had been home for a month and a half or so waiting to be retired. I just--so it wasn't that. Of course, it was
    a memorable day when we got our commissions. I remember the officer who gave us the instructions-some of the instructions-had
    a ceremony or something. He said, "You're now an officer and a gentleman by act of Congress and officers neither smoke
    nor eat on the street." I remember that part of. That's kind of a mundane thing, but it sticks in my memory.
- speaker: Interviewer
  text: Well, my sister was in the Navy. She was not an officer. She was in the WAVES. I'd write to her. My brother wasn't
    about to get in the service because his eyes wouldn't let him qualify. I used to write to him. My folks were both living
    at that time. I would call them occasionally and, of course, write. I remember when I was commissioned they gave us, I
    don't know, a week's leave or something like that. I came home for that and flew home. Previously, I'd gotten across country
    on a train. As I recall, it took 24 hours to fly home with all the stops. We weren't in the air all that time, it was
    because we were going and coming from airport on the way, see. So, flying then was quite a bit different than it is now.
    I remember one poor fellow, I say "poor fellow". He was in our class and when he went home, must've been that--anyway
    he must've gotten leave or something. Anyway, he went home. He lived in Indiana. He wore an officer's uniform when he
    was home and he didn't pass. So, that was tough for him. I stayed in contact with him. In fact, I still write to him.
    He was very successful in civilian life as a farmer, an orchardist. He just wasn't cut out for that type of thing paymaster
    work. Al Benson, the fellow I was originally suppose to be with, I still keep in contact with him. He was president of
    a bank and very, very successful in civilian life when he got out. I remember he was such a worker. There again, you know,
    we were essentially civilians. We hadn't been trained in this spit and polish type thing. When they were getting ready
    to take that--we called it the flag ship because the commodore was on it. It wasn't any bigger than the rest of them.
    Benson stripped down to his shorts and was helping the men load supplies. You wouldn't find that in the regular Navy,
    but he was one of those go-getters and he didn't stand on rank and that stuff. He was a wonderful fellow, big Swede. You
    remember things like that because they were different than the ordinary.
- speaker: Interviewer
  text: At that time, I remember one in particular--Christmas, I guess it was--I was at this Officer's Training School at
    Wellsley. Some of the people there were inviting midshipmen to their home for Christmas. This lady who was a widow and
    she had 2 daughters and a disabled son and they invited me for Christmas dinner, I believe it was. Anyway, they lived
    in that Boston area. That's how I spent that one. I don't particularly remember the others.
- speaker: Interviewer
  text: Yes. Yes. By writing. I guess, George, the fellow who didn't make it, didn't get commissioned. I kept in close contact
    with him over the years. He stopped and visited me, Juanita and I, a few years ago. He lost his wife in an auto accident
    and he was inaudible at the time he came. He has since remarried. He's been a very successful agriculturalist. In fact,
    he had graduated from Purdue in the Agricultural part of it. That's where I met George. When we were both in the officer's
    program. It wasn't an officer's school, but it was "pre", there. He was right at home because he had been going to Purdue,
    there. His family had rather extensive apple orchards. Later, he developed peach and nectarine orchards in Mississippi
    and still has the apple ones. He was very knowledgeable and successful in that field. The fact that he didn't make the
    commission was no reflection on his mental ability or anything like that. It was just a question that that wasn't his
    bag. Some people are that way, you know.
- speaker: Interviewer
  text: Well, of course, I didn't make a career out of it although I was in it 37 months. It's tough to come back to civilian
    life after being in the military because it's kind of like being a kid at home with the parent making all the decisions
    for you. The Navy makes the decisions or the Army or whatever you're in. The decisions come from up above. You don't have
    to even think what you're going to wear on a certain day. We're going to wear such-and-such uniform. And you do it. It
    tends to make you somewhat dependent, I suppose, and somewhat fearful of returning to civilian life because you're taking
    on responsibility for your own life. You're making your own decisions. It's a different ballgame all together. It isn't
    this post traumatic syndrome stuff. I mean, it's just the problem of moving from the military protected, I don't know
    how to call it other than that--the protected life--into the one where you're out on your own. It's kind of stressful
    at first. Some people find it more stressful than others. I'm not saying that's why some people stay in the military is
    to have somebody looking after them, but it's one of those problems you have to face when you go back in to civilian life
    after having been in especially for very long.
- speaker: Interviewer
  text: Well, I had--like everybody else who was a Vet who was honorably discharged--you had the G.I. Bill which was a marvelous
    thing. Just a marvelous thing.
- speaker: Interviewer
  text: Well, the service paid the tuition and they paid you, if you were single which I was at the time, $75 a month which
    sounds like a pittance now, but it was something you could to live on at the time. You had to buy your own books. It paid
    the major part of those things and allowed a lot of people to go to college who couldn't otherwise have gone. I think
    that one thing did more for the country than any government program I ever heard of because it was dealing with young
    fellows--in audible--young people who were anxious to better themselves. Many of them didn't have the financial means
    to do it. Of course, tuitions were a lot less then than they are now. They are horrendous, now. I know, compared to when
    our kids went to college, they're very high now. But, you were dealing with motivated young people who knew that education
    would benefit them and they were willing to live in relatively--not relatively--but actually very modest circumstances
    until they could get that accomplished. Of course, a lot of them were trained in other than the law, but I happened to
    be in that field. That's how I got my education ot
