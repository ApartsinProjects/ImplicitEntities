collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: What are the names of your parents and what were their occupations?
- speaker: Respondent
  text: My mother, Maria Teresa Altamirano, she was a housewife. My father, Miguel Angel Altamirano, as well -- that would
    make me senior -- and he was an electrician by trade.
- speaker: Interviewer
  text: And do you have any brothers and sisters?
- speaker: Respondent
  text: I do. I have two brothers and two sisters. And in chronological order of birth, a sister, Maria Teresa; a brother,
    Jorge Alberto; and another sister, Angelica; and, finally, the last sibling, Javier Altamirano.
- speaker: Interviewer
  text: Did any of them serve in the military as well?
- speaker: Interviewer
  text: Were you the first in your family to serve in the military?
- speaker: Interviewer
  text: What branch of the military did you serve in?
- speaker: Respondent
  text: I joined the Marine Corps.
- speaker: Interviewer
  text: What were you doing before you joined the Marine Corps?
- speaker: Respondent
  text: I was in high school.
- speaker: Interviewer
  text: Oh, okay. So straight out of high school you joined the Marine Corps?
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: And what high school did you attend?
- speaker: Respondent
  text: Hanna High School.
- speaker: Interviewer
  text: Hanna High School. What year did you graduate?
- speaker: Interviewer
  text: '''76. Congratulations, man, for staying in Brownsville and being a big part of the community.'
- speaker: Interviewer
  text: So did you enlist or were you drafted?
- speaker: Respondent
  text: I did enlist. I voluntarily enlisted.
- speaker: Interviewer
  text: What was the process there of you enlisting? What motivated you to join?
- speaker: Respondent
  text: I think that the motivation was a visit from military recruiters to our high school and I was just impressed by that.
    And I wanted friends of mine to see if they were interested in joining me and looking into it. I couldn't find anybody
    to join me and even entertaining the thought. So I did go on my own and, for some reason, I was only drawn to the Marine
    Corps, and, eventually, I was shipped out. I did qualify as far as the aptitude test, the physical screening and so forth,
    and that's how I did that.
- speaker: Interviewer
  text: Now, give me an idea of how it was back in -- what year did you graduate?
- speaker: Interviewer
  text: In '76. Give me an idea of, I guess, the atmosphere as far as people's -- what would you say, I guess, attitude towards
    the military and --
- speaker: Respondent
  text: Thank you. Yes. The attitude in general was that of discontent and/or displeasure with the whole thought of the very,
    very recent Vietnam conflict. So there was a general dissatisfaction with the government's intervention so far away in
    Asia and there was, I think, a resentment and an overwhelming bitter taste in the mouths of the population, of the citizens
    in general to have anything to do with the military. So I think that they -- it was a time when it was hard for recruiters
    to do their job and to maintain the quotas that they had to get because of the unpopular conflict that had just occurred.
    And, of course, you had your people who disregarded all the politics and the casualties and the injured veterans and people
    who were just wanting to genuinely serve. But I think it was not the best of times for the military to reach out to people
    to consider joining.
- speaker: Interviewer
  text: Do you remember the name of your recruiter?
- speaker: Interviewer
  text: What was it?
- speaker: Respondent
  text: Staff Sergeant Watson, Anglo, tall, poster board marine. And back in 1976 in South Texas and Brownsville, as you can
    imagine, there is not much diversity. For the most part, we're all Latinos. And if anything stands out in my military
    service, it is my indoctrination to the diversity that our country is. Our country is one of diversity in general. And
    I did bring a little bit of visual aids to illustrate the fact that South Texas and the Lower Rio Grande Valley has a
    minimal influence by diversity. It has for the longest time, it continues to have it today, and projections are that in
    another 30 or 40 years, this is one of those parts of the country that will continue to be the least affected by diversity
    in the country, which is really strange. Which is to say that if one is raised here in Brownsville or the McAllen area
    per se, we will have a minimal contact with other ethnicities, more so than the general population.
- speaker: Interviewer
  text: And what are these visual aids that you have?
- speaker: Respondent
  text: Thank you. Not long ago -- not long ago Starbucks published something about race. I think it was in reaction to the
    Ferguson racial problems and so forth. In 1960, as you can see, perhaps the East Coast, more than any other part of the
    country, had a more dense diversity or a more intense diversity of different populations.
- speaker: Interviewer
  text: Let me -- if you could give me a chance here so that I can put somethings on the record.
- speaker: Interviewer
  text: Just for the record, what we're looking at there is a poster board, probably about 3 feet by 4 feet. Would that be
    right?
- speaker: Respondent
  text: That is correct.
- speaker: Interviewer
  text: 'And it''s been pasted -- there is photos of Mr. Altamirano taped onto this poster board and there is also -- he''s
    showing me a USA Today Diversity Index, "What is the chance that the next person I meet will be different from me?" Sources
    from the NHGIS, University of Minnesota, and it has the -- from 1960, 2010 and 2016 a graph highlighting the scale of
    0 to 100 the chance that two random people are different by race ethnicity, from 0 to 15, 16 to 30, 31 to 45, 46 and 55
    and 56 to 100 in varying colors, as well as "Your race relations reality check. Where do you stand? Use these conversation
    starters with your family and friends," and there is ten different questions, as well as three starter questions: "How
    have your racial views evolved from those of your parents? Did you have a childhood friend of a different race that you''ve
    lost touch with? Why? What is America''s greatest race challenge?" Okay. And there is photos as well.'
- speaker: Respondent
  text: Correct. And this was really -- basically was started out by the CEO of Starbucks months ago, this past year of 2015,
    because he wanted to have -- he wanted to initiate, have a catalyst as a beginning to check for people's general ideas
    or perspectives on race relations. It's one thing to learn about different races and different cultures in the classroom
    or through books, but I think that when you actually meet people and you have to work with them side by side or be part
    of a team with them, it really -- that is a different type of introduction to the diversity. And I remember that from
    being recruited by an Anglo recruiter, to getting on a bus in San Antonio and flying out to San Diego for my boot camp
    experience, just working along people from different backgrounds, socioeconomic and ethnic backgrounds, and it was very
    different.
- speaker: Interviewer
  text: Let me ask you about that and we'll talk about that a little bit more. What were your parents' attitude about you
    joining?
- speaker: Respondent
  text: Very negative. They, of course, did not want -- they didn't want me to join. And I didn't get their approval at the
    end. I went against their wishes.
- speaker: Interviewer
  text: And your brothers and sisters?
- speaker: Respondent
  text: They thought that it was extreme, radical and not a good idea. So I really didn't have much moral support from anybody,
    but that's okay. I was -- I was determined.
- speaker: Interviewer
  text: You were determined. And where is it that you met up to catch your bus, train -- or your bus to San Diego? Like where
    did you congregate? Did you meet in San Antonio? Did you --
- speaker: Respondent
  text: No. Actually, a trip to San Antonio is the first step because in San Antonio is where the Armed Forces Entrance Exam
    Station is. It's called AFEES, as an acronym. At the AFEES building people get screened for eligibility. And so basically
    the first step is an intent to join the military and you're grouped with a bunch of other would-be candidates that are
    going to get screened. So then there is a bus ride to San Antonio to find out if you are eligible mentally and physically.
    And after that, if you are good to go, then you are given a plane ticket for a flight from Harlingen airport to San Diego,
    where the first three months of your military enlistment will take place, the boot camp, the basic training.
- speaker: Interviewer
  text: And do you recall your basic training?
- speaker: Respondent
  text: Oh, absolutely.
- speaker: Interviewer
  text: How was that?
- speaker: Respondent
  text: That was intense. That was crazy. It was very physically demanding and it was a transformation. If I may, I'd like
    to just show you very quickly that there are a few pictures that I brought that represent the training, the basic training.
    This photograph that I saw for the first time yesterday, because it was taken directly from a boot camp indoctrination
    book, with some photographs from our specific training and others that are just colored illustration of what the general
    recruit goes through. So it welcomes the incoming would-be Marines, or Marines, when they are received by the drill instructor
    at San Diego. This is an aerial photograph of the San Diego Recruit Training Depot, and it's a beautiful area but you
    don't get to see this beautiful scenery. You arrive probably late at night and we are housed in any one of these buildings.
- speaker: Interviewer
  text: The barracks?
- speaker: Respondent
  text: The barracks, where we are -- we'll undergo some of our training, which is to include basic classroom training, marching,
    familiarization with weapons. But then there are areas right outside of this area for training out in the hills, for training
    at the rifle range. And so basically these are the people that I lived with for no less than three months. And in alphabetical
    order, I would be the first person here. But these are just a couple -- a few pictures that give you an idea as to what
    you are going to -- what you're going to endure the first three months.
- speaker: Interviewer
  text: Do you remember the company that you were in?
- speaker: Respondent
  text: Yes, I remember the platoon number. I remember the friends. Each one of these people I remember. And, of course, you
    bond with only a few more than others. But this is a -- this is, more than anything, a complete, if I can say, brain washing
    or a stripping down and tearing down of you as an individual and then a building back up in the government style.
- speaker: Interviewer
  text: Let me ask you, what was your platoon number?
- speaker: Interviewer
  text: Okay. And that process of being stripped down and built back up, was that something that was hard for you to, I guess,
    undergo?
- speaker: Respondent
  text: It was. It was because it really shakes you down to your core and it questions your beliefs and it really -- you come
    to terms with where you are and what you have to do to get through it. Because very quickly you understand that if you
    do not keep up with any of the phases in training, it's only going to delay your stay there or you're going to be removed
    and/or dropped from the program and the military as a whole. And by that time, you're too far in to get out and you realize
    that it's almost impossible to get out. So it's extremely challenging but I think that it serves its purpose. And the
    ultimate purpose of basic training, I would say in any of the Armed Forces branches, is to be a devoted rifleman, a devoted
    soldier, a person that under duress and/or conflict will respond to orders appropriately. And I can see the method in
    the madness. You don't want any hesitations or any reservations and/or any insubordination. You have to have people that
    are going to follow orders.
- speaker: Interviewer
  text: So, ultimately, if you could sum it up, what would you say your experience was at basic training, official, fruitful,
    exciting, horrendous? I mean, you tell me.
- speaker: Respondent
  text: Yes. No, no, those adjectives are correct. It was all of those things and more. It was bittersweet, it was extremely
    physically and mentally demanding, it -- at the end, it had tremendous rewards. You are now part of a group that contributes,
    that has contributed in the past and continues to this day to contribute largely to the nation's defense. But if I could
    sum it up in a word, it's -- it did give me discipline, mental and physical discipline, which I carry on in part to this
    day, I believe.
- speaker: Interviewer
  text: And you have pictures here of everybody that was, I guess, in your platoon?
- speaker: Interviewer
  text: Did they help you through your basic training?
- speaker: Respondent
  text: Yes. Ironically, it's difficult for -- if you look at this picture of my platoon, you'll notice that there are different
    colors and -- but, for the most part, it is Anglo and then there are several people of color, black Marines, not too many
    Hispanics, and those of -- those -- a couple of the Hispanics that joined with me in this platoon were not from my area.
    As a matter of fact, nobody was from Texas, from the state of Texas. So, ironically, I just reached out to the nearest
    Hispanic. I remember one in particular, a gentleman by the name of Del Rio, and he and Carbajal -- and I say the last
    name because that's all you hear in boot camp.
- speaker: Interviewer
  text: Right, yeah.
- speaker: Respondent
  text: I did have a couple of people that I could relate to. And it's very helpful because, you know, you really need the
    moral support and the -- and just the companionship of at least one or two people through this ordeal.
- speaker: Interviewer
  text: When you finish your boot camp, what is your rank at that point?
- speaker: Respondent
  text: At that point, unbeknownst to me, some people could come out of boot camp with E2. Most of us are E1, which translates
    to private. Private first class is an E2 rank because it goes -- and E stands for enlisted. E1 is private. E2 is private
    first class. E3 is lance corporal and so forth. But some people were guaranteed a private first class because possibly
    they had some college training, others because the military occupation that they entered was -- that they accepted or
    requested was in high demand and they were qualified for it. In my case, I had no guarantees of either a rank or a particular
    job description upon completion of boot camp, and that was the case for the majority of us. I guess we really didn't do
    our homework because we might have, if we had known and qualified, got a chance to pick a little bit as to where our duty
    station would be or what our military occupation would eventually be. Because, basically, the way it works is the first
    three months everybody undergoes the same
