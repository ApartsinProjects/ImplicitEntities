source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Charlie, thanks for being part of the Veteran's History Project. Appreciate you doing this. So, you were a native
    of Gibson County, Fort Branch area?
- speaker: Respondent
  text: That's correct. I sure was.
- speaker: Interviewer
  text: What did your family do, Charlie?
- speaker: Respondent
  text: Father was a coal miner and mother was just a housewife.
- speaker: Interviewer
  text: Now, this area in those days was heavy in coal mining, wasn't it?
- speaker: Respondent
  text: Oh, yeah. Dad worked 55 years in coal mining at King Station, being the last one which was four and a half miles north
    of here, Elderfeld, Francisco, several different mines in Pike County which were just very small.
- speaker: Interviewer
  text: Were those underground mines or surface?
- speaker: Respondent
  text: Most all of them were underground.
- speaker: Respondent
  text: Deep vein. Some of the earlier ones was -- the small ones was in Pike County and they was not much, you know, as far
    as deep vein but the last one they worked in for 35 years. Teens was probably 200, 300 feet and --
- speaker: Interviewer
  text: So, when you were growing up you went to school in this area?
- speaker: Respondent
  text: Went to Fort Branch grade school -- Marlette grade school -- and graduated from Fort Branch high school.
- speaker: Interviewer
  text: What year did you graduate?
- speaker: Interviewer
  text: That is about the time that things were really starting to heat up in Korea.
- speaker: Interviewer
  text: And really, this community, like many others, you were still coming off the World War II era, too and certainly patriotic
    fervor was still quite high at that time, wasn't it?
- speaker: Respondent
  text: Absolutely, it was part of life.
- speaker: Interviewer
  text: What was it like for you, Charlie, growing up during World War II years? What do you remember most about those years?
- speaker: Respondent
  text: Just the difficulty on some of the rationing things and we still got by. Of course I had a brother and several other
    family members that was in service. It was a lot of time of prayer and thinking about what they was going through at that
    time.
- speaker: Interviewer
  text: What do you remember? You mentioned the rationing, give me some examples of that.
- speaker: Respondent
  text: I don't remember specifically what, but I remember the sugar. We had whatever the allotment was. I remember the gasoline
    that -- the A, B, and C cards that you had in your windshield and course you remember a lot of the workers in Edmondsfield
    was actually working on war products. They always had a Class C so they could get more gasoline and we who had A was just
    a certain -- I don't remember the gallons per week, but it was a small quantity of gas per week that we were allotted
    there. We had sugar stamps. I remember stamps for the sugar and perfusing of it.
- speaker: Interviewer
  text: Well, Charlie, were you drafted or did you enlist?
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: I suppose lots of guys your age were getting draft notices. Were you expecting it?
- speaker: Respondent
  text: Uh, yeah. I knew it was coming even to the point of what day it was coming.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: I considered enlistment and that option and just decided to wait. But at that particular time I think there was about
    60 fellows that went to Indianapolis for induction center from Gibson County and Pike County.
- speaker: Interviewer
  text: And they all received a letter probably starting out, "greetings."
- speaker: Respondent
  text: '"Greetings, to whom it may concern. Your friends and neighbors have selected you." Yep.'
- speaker: Interviewer
  text: So, you went probably by bus?
- speaker: Respondent
  text: We went by bus. Local guys from here and then picked up, I don't remember how many, but a smaller group in Pike county
    in Petersburg and then went onto Indianapolis to the induction center.
- speaker: Interviewer
  text: What was at the induction center then? Did they do a physical?
- speaker: Respondent
  text: I can't remember all the things that we did. Yes, we did have a physical but I can't remember much about it other
    than I know that we were at Indianapolis for several days before we actually -- guys were going to different places and
    my situation going into the Marine Corps, there was just a small group of us that they kept building on a daily basis
    and so I was actually in Indianapolis at the induction center for probably six or seven days before we actually loaded
    two troupe cars that was on a mail train headed for California.
- speaker: Interviewer
  text: Did they tell you where you were going to go?
- speaker: Respondent
  text: Yeah, yeah, we knew where we was gonna go. San Diego.
- speaker: Interviewer
  text: Charlie, how was it decided that you were going to be a Marine? How did that come about?
- speaker: Respondent
  text: Okay, my name being A. D. A. was the first one in the entire group of in ductees at that particular time so it was
    selected by number. Number one, which I was, A. D. A. was first so I was in the Marine Corps they went two, three, four,
    five, six, you guys are in the army. Number seven, you're in the Marine Corps and that carried on that way through the
    whole --
- speaker: Interviewer
  text: Well, I have to ask, you were probably certainly a ware that the Marines was a pretty tough organization.
- speaker: Respondent
  text: I was a ware of that and had a little bit of apprehension to start with and I even had an uncle that said don't go
    into the Marine Corps.
- speaker: Interviewer
  text: So, what was your reaction to that?
- speaker: Respondent
  text: Well, I just gonna take whatever comes and so when I selected to go into the Marine Corps, why, it was __+ situation.
    I was just gonna endure it.
- speaker: Interviewer
  text: So, you hopped on that train with the other guys and headed west.
- speaker: Respondent
  text: Right. And we stopped at every little town between Indianapolis and California and picked up mail and left mail. Took
    five-plus days to get out there.
- speaker: Interviewer
  text: Did you sleep on the train as well?
- speaker: Respondent
  text: Slept on a coach train. It wasn't a sleeper, it was a coach so you just slept sitting up or if you could lean up against
    something, you slept that way.
- speaker: Interviewer
  text: Were you able to get off the train?
- speaker: Respondent
  text: There were some points where it took an extended time to get mail and baggage on and yeah, you could get off and move
    around and some places it might even be twenty minutes or better to get off and walk around and maybe run across over
    to the drugstore and get a drink or whatever, but there were many stops and some of them were more lengthy than others.
- speaker: Interviewer
  text: So, you finally arrived at San Diego; is that correct?
- speaker: Respondent
  text: That is correct. San Diego at the train station.
- speaker: Interviewer
  text: How did San Diego look to a 21-year-old from Fort Branch?
- speaker: Respondent
  text: That had never been out of Gibson county. I think as a kid I went to Biloxi, Mississippi but other than that, well,
    Indianapolis was about it.
- speaker: Interviewer
  text: You saw a lot of country on that trip.
- speaker: Respondent
  text: Yeah, we did. We saw a lot of country and at that time there had been some real difficult drought and out in the west.
    I remember some of the ground just simply cracking open and big cracks in the ground that where the drought had just caused
    the ground to crack. But arriving in San Diego, we were all taken in a bus and taken to Marine Corps recruit depot which
    is right inside the city limits of San Diego and right close to the international airport. Also, it was by a blockade
    building aircraft plant so we had a lot of noise from the planes taking off and landing.
- speaker: Interviewer
  text: When you got to the base you were probably met by a drill instructor, I would assume.
- speaker: Respondent
  text: That had a good voice, yes.
- speaker: Interviewer
  text: So, how good was that voice?
- speaker: Respondent
  text: It was quite strong.
- speaker: Interviewer
  text: Did you arrive in the daylight hours or was this evening?
- speaker: Respondent
  text: Yes, we did arrive at daylight and when we got off the bus we were immediately known as knuckle heads.
- speaker: Interviewer
  text: But you were bid a hearty welcome.
- speaker: Respondent
  text: That's right. A very hearty welcome but we started right into boot camp.
- speaker: Interviewer
  text: Charlie, when you think back to boot training what kind of things popped into your mind?
- speaker: Respondent
  text: Food. You never left anything on your plate whether you liked it or not, you ate it. The platoon you were in, you
    stood until everybody got back from lunch. You were never allowed to sit down or anything like that. 11 weeks with no
    candy or no sweets other than what went through the mess hall, which was not much sweet and --
- speaker: Interviewer
  text: I would assume your hair was a little shorter.
- speaker: Respondent
  text: Yes. They asked us how we wanted our hair, how we wanted it cut, and it was cut just as close as it could be cut with
    trimmers. That was okay and, really, it was good because of the training and all that we went through and all that you
    had messed up hair and you didn't have to worry about washing it or anything.
- speaker: Interviewer
  text: What do you remember about some of the guys in your platoon?
- speaker: Respondent
  text: A lot of nice guys.
- speaker: Interviewer
  text: Were there many from Indiana?
- speaker: Respondent
  text: I only got with one fellow from Indiana. He was from Petersburg and then he went to another platoon and hardly even
    had any contact with him at all, so really in my area, in the group that I was with, I didn't know a person.
- speaker: Interviewer
  text: But they were probably from all over the country.
- speaker: Respondent
  text: All over the country, yeah, and most of them, with exception of maybe one or two out of a whole platoon, was in the
    same situation that I was in. Maybe a couple of them had re-enlisted. One I remember in particular had been in the Army
    and then had joined the Marines and come back and he was going to recruit training just like we did, but all but a couple
    cases were just come in just like I did. Best thing I remember about every one of them was drafted. There may have been
    a few that went at the same time but I think most of them, well, I know most of them were draftees.
- speaker: Interviewer
  text: Charlie, how rigorous was it physically for you?
- speaker: Respondent
  text: Very. It was tough on a lot of fellows because they were not in the physical condition that some of the rest of us
    was in. I played basketball and baseball continuously. Summer, winter, high school, college, and I was in somewhat good
    physical condition, I thought, but at least it was better than some of the fellows. Some of the fellows really had tough
    times with some of the training.
- speaker: Interviewer
  text: What do you remember, maybe one of the harder things from your training period?
- speaker: Respondent
  text: Probably duck walk on full length of the parade ground. That wasn't much fun but it did get the legs in shape. A lot
    of running, a lot of running back and forth to different things. From one class to another class, you always ran and didn't
    do any walking at all. If you were walking, it was in strictly a march.
- speaker: Interviewer
  text: And did you surprise yourself how good of shape you got in?
- speaker: Respondent
  text: Absolutely. When I left Fort Branch, I was 185 pounds and 34 inches around the waist. 11 weeks later, I weighed 185
    and was 30 inches around the waist.
- speaker: Respondent
  text: So, it was quite a body change physically and that was what made men somewhat in good shape. But some of the other
    fellows weren't quite as fortunate as I was, they had some more difficulty.
- speaker: Interviewer
  text: Charlie, was it -- what was the status of the Korean conflict at that time?
- speaker: Respondent
  text: It was right in its very heavy.
- speaker: Interviewer
  text: That's what I thought.
- speaker: Respondent
  text: In fact, from our graduation, which was 11 weeks after -- I can't remember the exact date, but it was in October.
    Most of the fellows that I was with went straight to Camp Pendleton and went through extensive training and then went
    straight to Korea.
- speaker: Interviewer
  text: So, you almost would have had to have assumed that you would be going as well.
- speaker: Respondent
  text: Oh, absolutely. I knew I'd be heading for Korea.
- speaker: Interviewer
  text: How did you feel about that?
- speaker: Respondent
  text: It was pretty scary. It made you think a lot because we knew, at least the word we had, was that at least one out
    of three of the Marines that was going was not coming back. So, at that particular time in August of '51, it was hot and
    most of the fellows that I graduated basic training with did do that. They went for extensive training at Camp Pendleton,
    went to that and then headed for Korea.
- speaker: Interviewer
  text: So, when you graduated from boot camp, what was your next assignment and how did you find out about it?
- speaker: Respondent
  text: Okay. I was -- (?got my or ders?), of course, I had a two weeks -- 14-day leave and come home from that, then I reported
    back at Oceanside and we went to the in ducting area center where each new Marine came in and was taken somewhere from
    the outfit he was assigned to and picked up and I waited seven days, I think, before anybody claimed me. My speck number
    was 4011.
- speaker: Interviewer
  text: What's that mean?
- speaker: Respondent
  text: Okay. That was, and I'm not sure how it's defined, but at that time it took me two, what was called MRI, which was
    machine records installation, and it was seven days before they found out what that speck number -- where it was supposed
    to go. And from the induction center there at Pendleton, I went to what was called Marine barracks, which was 24 area,
    which was the commanding general's area. The commanding general, all of his staff and just a few other things. Headquarters
    company and our machine records and solution was the only things in that particular area. Finally, after seven or eight
    days I got to those quarters and that was my permanent quarters till the day I left.
- speaker: Interviewer
  text: Were you surprised?
- speaker: Respondent
  text: Yeah, very, and as I understood it later, the only thing that qualified me for that and put me in that speck number
    with that classification was that at Evansville College, now the University of Evansville, of course, I had several business
    classes and a lot of those were hand calculators and adding machines and that sort of thing and those classes, and from
    those classes is what determined that I would be given that 4011 speck number and which actually ultimately put me in
    machine records.
- speaker: Interviewer
  text: In 1951 a lot of males would not have had those skills.
- speaker: Respondent
  text: Yeah. I'm sure that -- you know a lot of guys been on the farm or they'd been working some place or doing those things
    but I had gone to college and played basketball and baseball for the one year before I went in.
- speaker: Interviewer
  text: How did that come up that you had had college? Did they have some aptitude tests?
- speaker: Respondent
  text: Yeah, we had all kinds of tests. Series of tests on different things and, of course, some of it was that sort of thing
    which I would suspect that I did better than some based on that. But there was a whole battery of things, which I'm sure
    was to determine what your best capabilities would be in service. Mine was, apparently, was that I would best suited for
    that type of thing which, at that particular time, as I understood later and got into the machine records installation,
    it was very hard to find people that could
