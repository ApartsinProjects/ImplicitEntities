collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: And which branch of service did you serve?
- speaker: Interviewer
  text: And what was your highest rank?
- speaker: Interviewer
  text: And where did you primarily serve?
- speaker: Respondent
  text: In Vietnam.
- speaker: Interviewer
  text: Maybe as we get started, tell me where you were born, a little bit about your family and your brothers or sisters.
- speaker: Respondent
  text: Yes. I was born in Soddy-Daisy, Tennessee. And I was number six out of eight children.
- speaker: Interviewer
  text: So six out of -- how many brothers, how many sisters?
- speaker: Respondent
  text: There was five boys and three girls.
- speaker: Interviewer
  text: Now, were you the only one that joined the service later in life, or did some others --
- speaker: Respondent
  text: No. My oldest brother was in the Army.
- speaker: Interviewer
  text: Okay. So did you attend Soddy-Daisy Schools or --
- speaker: Respondent
  text: Yes. I went -- I graduated from Soddy-Daisy High School in 1962.
- speaker: Interviewer
  text: Okay. And what did you do after high school?
- speaker: Respondent
  text: I went to work at Walters State Life Insurance Company in Chattanooga.
- speaker: Interviewer
  text: Were you selling insurance, or --
- speaker: Respondent
  text: No. I -- I was a printer.
- speaker: Interviewer
  text: Okay. And somewhere along in here, you got introduced to the military; was that by your choice, or did you get a special
    invitation?
- speaker: Respondent
  text: No. I got a special invitation. Drafted in January of 1968.
- speaker: Interviewer
  text: You were sharing with us a few minutes ago that there had been a couple other events in your life in there that were
    pretty significant.
- speaker: Respondent
  text: Yes. I got married in -- in -- let's see, I got --
- speaker: Interviewer
  text: You got married. That's a good place. Stop there. We won't pick dates.
- speaker: Interviewer
  text: July, I believe it was.
- speaker: Respondent
  text: July of '67. And got drafted in in January of '68.
- speaker: Interviewer
  text: So not only did you have a situation where you had your own family, but with this draft notice, how did that impact
    the family, both your wife as well as your parents and siblings?
- speaker: Respondent
  text: Well, I had two young brothers that was still in high school. And, of course, my wife wasn't working, so it was just
    -- just me and her, you know? We was out to ourselves, so it kind of -- kind of was a surprise that I had to leave after
    such a short notice.
- speaker: Interviewer
  text: How much of a -- a notice did you have there, do you recall, before you had to report?
- speaker: Respondent
  text: Well, I -- I'd already been and took my physical, so I was just -- I knew it was eventually coming, so -- I just didn't
    know exactly when.
- speaker: Interviewer
  text: So how did that change your life? You had been working so many years now and -- and with the new spouse, this wife
    that wasn't working at the time; what kind of arrangements did you have to make in quite a hurry?
- speaker: Respondent
  text: Well, she -- she had to move back home with her mother and father, so -- when I went off to basic training, so --
    it was different for her. She was really wanting to be out on her own.
- speaker: Interviewer
  text: And being out there six months already, it had to be tough to go back.
- speaker: Interviewer
  text: Where did you end up having to report for basic training?
- speaker: Respondent
  text: Fort Campbell in Kentucky.
- speaker: Interviewer
  text: And how much time would you spend there?
- speaker: Respondent
  text: Let's see. I was there eight weeks. Eight weeks of basic.
- speaker: Interviewer
  text: Just eight weeks of basic?
- speaker: Interviewer
  text: Little different than the working world you were used to here in --
- speaker: Interviewer
  text: -- Chattanooga?
- speaker: Respondent
  text: Quite a bit different.
- speaker: Interviewer
  text: In which way?
- speaker: Respondent
  text: Well, I wasn't used to people standing over me telling me what to do every -- every time you turned around.
- speaker: Interviewer
  text: How was the physical demands on you?
- speaker: Respondent
  text: Well, it -- it was -- it was pretty physical. It was tiring. You had -- of course, I was in pretty good shape. But
    that exercise and stuff like that didn't bother me. It was -- it was just the people hollering at me all the time.
- speaker: Interviewer
  text: Were you able to communicate with your wife fairly frequently, or was that still pretty tough during basic?
- speaker: Respondent
  text: We wrote -- she would come up there a couple weekends, and came to my graduation. And we got a weekend -- they gave
    me a weekend pass, so that was good.
- speaker: Interviewer
  text: Okay. How was the food?
- speaker: Respondent
  text: Well, it wasn't really that -- that bad, but it took some getting used to.
- speaker: Interviewer
  text: So you're there for eight weeks. You said you got a little bit of a pass on the weekends. How about after graduation,
    did you get your orders right away or --
- speaker: Respondent
  text: Well, no. They sent me to Fort Polk, Louisiana for advanced infantry training.
- speaker: Interviewer
  text: How did you take that?
- speaker: Respondent
  text: Well, I really hadn't been that far away from home before, so it was -- it was something that -- that was more different.
- speaker: Interviewer
  text: Going in for advanced infantry training, and with the world -- what was going on in the world, in particular Vietnam,
    was that a concern to you, or had it really crossed your mind?
- speaker: Respondent
  text: Well, they told us, usually, when you went there, that -- that you probably would end up in Vietnam because that's
    what they mainly train for there.
- speaker: Interviewer
  text: How did you take that?
- speaker: Respondent
  text: Well, I never -- I hadn't hardly ever been out of Tennessee, let alone out of the United States, so I really didn't
    -- didn't care that much for war either, but -- but I still -- still glad -- still glad I could serve my country.
- speaker: Interviewer
  text: Did you even know where Vietnam was?
- speaker: Respondent
  text: Well, yes, I did. I looked it up on the map. And I heard of Southeast Asia before and some of the countries in there.
    But specifically Vietnam, I -- you know, I didn't -- didn't know that much.
- speaker: Interviewer
  text: How much time did you spend in advanced infantry training?
- speaker: Respondent
  text: There was eight weeks there, also.
- speaker: Interviewer
  text: Another eight weeks. Did it lighten up on you any, or was it just as intense?
- speaker: Respondent
  text: No. Really, it was more intense, I would say. We had to take stuff more seriously there. We knew that -- all the drill
    instructors told us where we was going most likely.
- speaker: Interviewer
  text: How was communication with family while you were down in Louisiana?
- speaker: Respondent
  text: Well, it was a little bit harder. She couldn't come up and see me on the weekends. I didn't see her the whole eight
    weeks. Of course we could call.
- speaker: Interviewer
  text: Did you have a graduation from there as well?
- speaker: Interviewer
  text: Did she make it down for that, or no?
- speaker: Respondent
  text: No. She wasn't able to, no.
- speaker: Interviewer
  text: Any leave time after you finished your advanced infantry training, or --
- speaker: Respondent
  text: Yes. I was -- I got a 30-day leave from Fort Polk.
- speaker: Interviewer
  text: And they just gave you a blanket 30-day leave, or --
- speaker: Respondent
  text: Right. I already had orders sending me to Fort Lewis, Washington to ship out to Vietnam.
- speaker: Interviewer
  text: On the west coast?
- speaker: Interviewer
  text: So you had 30 days to come home?
- speaker: Interviewer
  text: Don't -- don't worry. Did you have to go and stay with her parents -- did you stay at her -- their -- her parents'
    home or --
- speaker: Interviewer
  text: -- go back to your place?
- speaker: Respondent
  text: Yes. We stayed at her parents'.
- speaker: Interviewer
  text: So you had 30 days together?
- speaker: Interviewer
  text: How was that 30 days?
- speaker: Respondent
  text: It was pretty great. I kind of -- kind of hated to leave because, you know, just being married, and also my -- my
    mother and father wasn't -- wasn't well. You know, my mother was sick. She was in a wheelchair and I kind of was afraid
    I never would see her again. Of course I did.
- speaker: Interviewer
  text: 'So your 30 days were coming to a close. Was there any sense of fear in this, or was it more: This is what my country
    wants me to do?'
- speaker: Respondent
  text: Well, I've -- I really -- I really didn't fear going, you know, but I just had an uncertainty. I didn't -- didn't
    really know what to -- what was going to happen.
- speaker: Interviewer
  text: So you report up to Washington?
- speaker: Respondent
  text: Right. Yes.
- speaker: Interviewer
  text: How long would you spend there in Washington before you were shipped over?
- speaker: Respondent
  text: Three days.
- speaker: Interviewer
  text: Just three days?
- speaker: Interviewer
  text: More training there, or any kind of adjustments, or just waiting --
- speaker: Respondent
  text: No. Just -- just waiting to be shipped out.
- speaker: Interviewer
  text: And how did you go to Vietnam, by flight or by ship?
- speaker: Respondent
  text: By flight. We flew. Actually, it was a commercial airplane. It was a TWA, if I remember right.
- speaker: Interviewer
  text: So you take the big old TWA over the Pacific. Any stops along the way? Any things stick out?
- speaker: Respondent
  text: Yes. We stopped in Japan, but they wouldn't let us off the plane, we had to stay on. They refueled.
- speaker: Interviewer
  text: And then into?
- speaker: Respondent
  text: Cam Ranh Bay.
- speaker: Interviewer
  text: Cam Ranh Bay.
- speaker: Interviewer
  text: Is that where you depart and start getting assigned to areas or --
- speaker: Respondent
  text: Right. Our -- our whole company from -- from Fort Polk, we didn't go over as a -- as a company, we went in as replacements.
    So we were scattered to different outfits; some went to The Big Red One and some went to the 25th, which I went to.
- speaker: Interviewer
  text: So you're off to the 25th. How long did you stay in that area in the -- in the reserve unit before you actually made
    it to the 25th?
- speaker: Respondent
  text: It was about a week. We had orientation, in-country orientation. And it was about a week, I'd say.
- speaker: Interviewer
  text: You were off to the 25th. Was it a group of you going, or just yourself?
- speaker: Respondent
  text: Just me. Just -- I went -- well, there was a couple more that went to different companies than I went to.
- speaker: Interviewer
  text: Um-hmm. Pick you up by Jeep or chopper or --
- speaker: Respondent
  text: We went on a truck convoy.
- speaker: Interviewer
  text: Truck convoy?
- speaker: Interviewer
  text: When you get out to the 25th, how did the -- how did the guys that were already there take this new guy?
- speaker: Respondent
  text: Well, everybody hollered, Short.
- speaker: Interviewer
  text: Now, explain short for some of these people.
- speaker: Respondent
  text: They -- they were getting out before I was. They were getting ready to go home or whatever.
- speaker: Interviewer
  text: Short was the amount of time you had left in country?
- speaker: Respondent
  text: Right. Yeah.
- speaker: Interviewer
  text: And if you came the day after I did, then I was shorter than you?
- speaker: Interviewer
  text: Okay. What would your -- your work be with the 25th?
- speaker: Respondent
  text: I was a rifleman. Light weapons infantry.
- speaker: Interviewer
  text: Okay. And what kind of places would you make it to in your missions and things?
- speaker: Interviewer
  text: Do you even remember your first mission?
- speaker: Respondent
  text: Well, I -- I remember the -- the second night there. I was at the 25th, we come in under a mortar attack, so it was
    -- that was my first taste of the enemy. So -- of course, I couldn't return fire or anything, but them mortars was coming
    in, we had to get down into the bunkers.
- speaker: Interviewer
  text: Had you dug your own spot yet, or were you relying on some others?
- speaker: Respondent
  text: No. No. They -- the 25th's headquarters there was at Cu Chi, and it was -- it was a pretty secure area. Of course,
    there was always mortar attacks and rockets and stuff.
- speaker: Interviewer
  text: So the second night, that didn't give you long to figure you weren't in Soddy-Daisy anymore.
- speaker: Respondent
  text: That's right. Yeah.
- speaker: Interviewer
  text: Anything else stick out about that night?
- speaker: Respondent
  text: Well, I know it -- it was real hot. I hadn't been used to it being so hot. And the water, I think the first -- first
    drink of water I took, it came back up.
- speaker: Interviewer
  text: So new life in deed.
- speaker: Respondent
  text: Yes. Completely different.
- speaker: Interviewer
  text: How long would it be before you headed out of headquarters into a field unit?
- speaker: Respondent
  text: Well, we took some in-country training. They assigned us our weapons and stuff, and -- and I guess it was a week or
    two before we -- before I -- before I joined my company. I was in the B Company then.
- speaker: Interviewer
  text: And what would you be doing with B Company?
- speaker: Respondent
  text: I was -- was a rifleman.
- speaker: Interviewer
  text: Which meant what?
- speaker: Respondent
  text: Most people called us grunts. You know, we'd just -- we'd go out on patrols and -- and night ambushes and stuff like
    that.
- speaker: Interviewer
  text: Do you remember your first mission with them? Or anything early on?
- speaker: Respondent
  text: The first night ambush I was on, it was -- it was really scary. You know, I never -- never -- I'd been out on night
    maneuvers before, but not -- not for real, not the real thing. So it was kind of scary.
- speaker: Interviewer
  text: What kind of things stick out during that kind of an event?
- speaker: Respondent
  text: You're real tense, you know. You're waiting, you know. Waiting for something to move or whatever, you know. And just
    -- just really scary to me. Or it was.
- speaker: Interviewer
  text: Did you know where they were, or was it truly just a -- excuse the pun here -- shot in the dark?
- speaker: Respondent
  text: Well, no. Unless they come into your kill zone, you know, you didn't -- you didn't really know where they were. That's
    the only thing about being over there, you never knew when, where or how, you know?
- speaker: Interviewer
  text: Okay. What other things stick out with you in those early days with the B Company and some of those other maneuvers
    that you might have done?
- speaker: Respondent
  text: Well, we had -- they -- they kept you really busy, you know? Like, when we would come in off ambush we'd have other
    chores to do in the fire support base and -- like that. And we -- we did -- some of our missions was, we'd -- they'd fly
    us out on choppers, you know, and -- the intelligence told them it was VC in some area, they would lug -- they would fly
    us out. They'd call it an "eagle flight." And that was different, too.
- speaker: Interviewer
  text: Was that the first time you were on a chopper?
- speaker: Respondent
  text: Right. Yes.
- speaker: Interviewer
  text: How many people would go out on a group like that?
- speaker: Respondent
  text: Well, there's usually seven -- seven or eight choppers. And there's five or six, maybe seven to a chopper.
- speaker: Interviewer
  text: Now, would they hit the land to let you out or --
- speaker: Respondent
  text: Right. Yeah. They -- they would come in and unload. The first time I ever hit what they called a "hot LZ," I thought
    it was the end of the world. The door gunners was opened up and shooting, and they were shooting back. It was in a rice
    paddy. I hit flat on my face when I jumped out of the chopper, trying to make it over to the dock where we could return
    fire. They -- they pulled back then, so --
- speaker: Interviewer
  text: So a lot of firing going on?
- speaker: Respondent
  text: Yeah. Really scary.
- speaker: Interviewer
  text: Pretty loud?
