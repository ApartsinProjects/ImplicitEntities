turns:
- speaker: Interviewer
  text: So when I say, "Where were you born," you say, "I was born" --
- speaker: Respondent
  text: At Pearl Harbor Day, I was in school.
- speaker: Interviewer
  text: Okay. All right. So here we go. So first of all, you're going to tell me your full name. Were you born in Felton?
- speaker: Respondent
  text: No. I was born in Bridgeville, Delaware.
- speaker: Interviewer
  text: Nice. I had my first beer in Bridgeville, Delaware.
- speaker: Respondent
  text: That was -- I come from those scrapple boys down there. I'm one of the Adamses.
- speaker: Interviewer
  text: Oh. I think I had -- I had my first beer at my first fireman's parade down there. I think.
- speaker: Respondent
  text: That's very --
- speaker: Interviewer
  text: Many years ago. Many years ago. Probably in the early '60s.
- speaker: Interviewer
  text: Oh, yeah. You're going to tell me your name, where you were born.
- speaker: Interviewer
  text: And then what year you were born, what your mom and dad -- you know, growing up. So --
- speaker: Respondent
  text: Okay. All right.
- speaker: Respondent
  text: You going to ask me questions or --
- speaker: Interviewer
  text: No. You're going to just tell me.
- speaker: Respondent
  text: Oh, my name -- my name is Richard Adams. I was born in Bridgeville, Delaware, on September the 7th, 1924. My father
    was a bus driver and a salesman, and my mother taught school. And I was the second son. My older brother, who was two
    years my senior, was killed in service on June the 2nd, 1944, in Italy. We were the only two children because my father
    died when I was a year old. And my mother and my brother went to live with her mother and father. And in 1925, we moved
    from Bridgeville to Canterbury, a little town of Canterbury. And we stayed there three years with my grandmother's cousin,
    and then my mother bought the little farm that is down on the Canterbury Milford Road known as -- I think it's Route 33
    or 35. And I was raised there on the farm and entered the -- got my draft notice when -- oh, Pearl Harbor Day came, and
    I was 17 years old, and I had no fear of being drafted into the Army because the wars never lasted, you know, two or three
    or four years. And at the time, they were drafting them, the draft age was 21. So I didn't think that I would ever be
    called into service because that was four years, and the war wasn't going to last that long. Well, the next year, I turned
    18, and they -- in September -- and they dropped the draft age two or three months before that from 21 to 18. And they
    struck me right in the face. And on that day I turned 18, I got my notice for draft. And I got a six months' deferment
    because I was on the farm. And then they needed more replacements, so I had to go -- got my notice, and I went into the
    service October the 8th, 1943, and reported to Camp Dix, New Jersey. I had to spend a few days there, and then I was sent
    to Camp Croft in Spartanburg, South Carolina, for my basic training. After 17 weeks of infantry basic, which ended in
    February, I was sent home for 10 days' delay en route to report to Fort Meade over near Baltimore, Maryland. There --
    and after being there a day or so, I was informed that I was on the next group of replacements that would be going overseas.
    And one evening about 2:00 in the morning, I guess it was, they got us up, and we took very -- under cover in the darkness
    of the night, we moved to Newport News, Virginia. And then in the bright daylight at 2:00 or 3:00 in the afternoon, they
    unloaded all and took us down to the harbor, unloaded all these German prisoners and loaded us onto the boat, and we went
    overseas. I landed in Casablanca, North Africa. And then they took -- they put us on a train and took us across to the
    North Africa to Algiers, where I was at the seaport, boarded a boat, and next I landed in Naples, Italy. From Naples,
    Italy, I took another boat up to -- all this happened in a period of about a month. I'm taking a long time to tell it,
    but it was a short period of time. And I landed in -- you know, on Anzio, which is probably known, if you ever read any
    of the Amer -- World War II histories, one of the bloodiest areas that they were. And landed -- it lasted from January
    until March the -- May the 21st or 23rd, something like that. And we had the kickoff, and we took Rome, and it fell on
    June the 4th.
- speaker: Interviewer
  text: Hold up. Now, you went -- you went from Naples to Anzio?
- speaker: Interviewer
  text: So you were in. I mean, you were fighting. You were --
- speaker: Respondent
  text: I didn't fight till I got on Anzio.
- speaker: Interviewer
  text: Okay. Now, when you were in -- did you get assigned now to a permanent unit or you were a replacement?
- speaker: Respondent
  text: I didn't get assigned till I went to Anzio.
- speaker: Respondent
  text: I went to a repo-depo in Anzio, and there, I was -- there was so many of us, and some went to the 3rd, the 36th and
    the 45th Infantry Division. I was in the 45th.
- speaker: Respondent
  text: On Anzio. Yes.
- speaker: Interviewer
  text: Then you just started battling?
- speaker: Respondent
  text: As soon as I landed, within a day -- I landed there in early April. And within two days, I guess, I was on the front
    lines after landing on Anzio. I moved awful fast because they'd give me a truck -- put us all on a truck, and the truck
    took us to another area. And if we called your name out and you're to go to the 45th, get on that truck. And if you're
    on the 36th, get on that truck. And on the 3rd, stay on this truck. So we all went on different -- three different trucks.
    And my 45th truck took off with me. And they said, "All right. You've got" -- I knew then that I was assigned to C company
    of the 157th Regiment of the 45th Division. So they just kept breaking you down, till finally I got to the aid station
    of the First Battalion. And then I caught the ration truck that night because they brought up your water and your rations
    at nighttime on Jeeps. I just caught a Jeep and went up that night. And they said, "Here's your replacement." And old
    Cap -- old Sergeant Millis Paul was there. And he said, "Okay, fellah. Come with me." And took me right up on the front
    of the front lines. And I slept that night up there. I had my rifle with me. The next day, well, I started bang, bang,
    banging away. And we just -- and we were in a stable position in April. All during April, it was a stable position pretty
    much. You just stayed in the hole all day and got out at night and got your rations, went to the bathroom and did all
    your little movements around that you wanted to at night. The Germans were over there, 150 to 200 yards away. We were
    all dug in in nice positions. And all night long, the artillery came in on you. And all day long, you had small arms fire.
    So you were -- every day was a day for you to remember. Then after you got the -- then we synchronized our watches, and
    we knew the next day that we were going to kick off and go, part of this stable position that we were in. So we just got
    up the next morning. They woke us up sometime. We all woke -- well, you had guard duty all night. So you was on -- an
    hour on and an hour -- and you slept an hour. And the buddy that was in the hole with you, he was on guard duty. So it
    was a heck of a way to live, to try to get some sleep an hour on. By the time you got to sleep, he was shaking you, telling
    you the hour was up. So then we just all climbed out of those holes and started firing from the hip with our rifles and
    mach -- carrying machine guns. And we just walked right across no man's land. And the Germans got up. Most of the -- most
    of them surrendered, and we just took off and just kept right on going. And we were about 7 or 8 miles from Rome, and
    we just kept going that day. And every so often, we would fight pretty hard during the day and -- Well, one day, the second
    day after the kickoff, I saw three tanks get knocked out. They hit three tanks, and the guys tried to get out of the tanks,
    and some of them were on fire when they were coming out. And it was a horrible sight to see that. It was -- but for a
    -- you know, an 18-year-old kid, he wanted to -- he was like a turtle. He wanted to see what was going on. And it wasn't
    long before the sergeant come around and put his foot on my head and said, "Soldier, if you want to live, better keep
    that head down." So I done pretty more then -- kept my head down. I used my head a little bit wiser in performing as --
    trying to be as a good soldier. After, they told us that the pope declared Rome as an open city, which means, "No fighting,
    please." So the Germans withdrew on the other side, and we withdrew. And we went over for some R and R, like we got a
    shower -- first time I'd had a shower in a little over a month -- and some clean underwear and a new set of ODs. Shirt.
    Got some clean clothes. And I felt good. So then we had about two weeks off, pitching horseshoes, playing badminton, stuff
    like that. A little rest there in June. And then we went down to Salerno, which was south of Naples in Italy, for amphibious
    training and to make the invasion of southern France. So in August -- it was like 15th or 17th; I don't exactly remember
    the date -- we made the invasion. I was on the second wave. The front wave was -- was the little boats that they took
    us on in on. They went. The assault boats. The first wave hit the beach first, and then three minutes later, I hit the
    beach. And then we went through a seawall. Got through that. There were only a few Germans there. Then we marched up --
    now, I didn't get -- I didn't get wounded. Of all that period, four -- three or four months I spent on Anzio, the metal
    flew around me, but nothing hit me. I was -- I landed in the middle of August, and on September the 25th, in the morning,
    about 10:00 one morning, I was laying -- got behind this tree, and a shell hit the tree, and the tree blew all apart.
    All I got was shrapnel in my hand. I got six or seven pieces of shrapnel in my hand. So the sergeant said, "You'd better
    go back," because it was bleeding a little bit. I would say profusely. It was bleeding in a couple -- one spot here, and
    one spot here was pretty bloody. He said you -- the first -- the medic said -- looked at it. And they said, "Well, there's
    a couple pieces in here ought to be taken out." And he said, "I really don't know how to do that." So they put me on --
    I walked back and caught a Jeep, and it took me back to the aid station. And there, they took a couple pieces of shrapnel
    out of my hand. And they sifted sulfa powder in it. And they wrapped me up and said, "Well, your trigger finger can still
    work. Hit the -- get the ration truck. You can go back up tonight." So the night of September the 25th, I went back up.
    We fought continuously every day. And one time in October, I got two days off to go back and get a shower and some clean
    clothes. You didn't -- this wasn't like any other branch of the service. You didn't know when you was going to get a new
    change of underwear or anything.
- speaker: Interviewer
  text: Let me just stop you. Give me your typical day that time. Give me your typical day. I mean, you'd be up --
- speaker: Respondent
  text: You'd get up --
- speaker: Interviewer
  text: -- the hour, the hour, the hour?
- speaker: Respondent
  text: Yeah. Well, you'd start getting up about 6:00 in the morning, but as I say, you were awake almost all the time because
    you was on guard duty. But I'd get up by 6:00, and they had brought me my rations from the night before. And I'd just
    pull out the "B" box, which -- like a Cracker Jack box. And it had "B" on it. That was breakfast. So I'd cut it open.
    And I had two canteens on the back, so I'd just pour some water in there. And in my rations was my instant coffee, and
    I'd make that. Your box was a waxed box, so you set fire to your box after you got everything out of it. There was some
    crackers in there, and there was some maltose, dextrose, maltose tablets, which were like energy tablets. And they tasted
    awful, but you were hungry, so you ate them. But the -- I had the breakfast. And you opened your can of that -- whatever
    it might be, of either eggs or powdered eggs or whatever it might be. And you opened the can, and you could hang it on
    your -- with that key that you wind it, you could hang it right on your canteen cup, and you could hold your cup right
    over that little, that burning box, and it would heat your coffee up. And you did this -- you didn't know whether -- a
    lot of times -- one or two times, I had to run with this because they wanted to move out. So I had to leave my box burning,
    and my coffee was, you know, medium warm or something like this. But usually you'd get your breakfast. You'd have that
    before they'd -- they'd move out 7 or 7:30 in the morning. You started fighting at 7:30 or something like that in the
    morning. They'd move you out. And you moved in a column. You didn't -- you didn't walk side by side. You walked so many
    people behind each other and over this -- to your left and to your right was a column, and you wound through. The officers
    had got their briefing the night before, and they knew which way for you to go and which way you're supposed to -- where
    you were supposed to line up.
- speaker: Interviewer
  text: Where did you sleep?
- speaker: Respondent
  text: In foxholes, dug a hole every night. At least you'd dig a trench that was wide enough for you and deep enough that
    you were level. In case tanks or anything come through, you would be safe from a tank. They always taught you that. So
    you just laid right there. Sometimes you'd dig -- two of you'd dig together, and one guy would sleep. The other guy would
    climb out of the hole and be on guard duty. So -- And each one of you carried a blanket on your back, and each one of
    you carried half of a tent. So you two -- put the two together, and it made a tent, what they call a tent half. So you'd
    get up in the morning, and then you'd fight and fight and fight. And then you'd -- whenever they stopped, whenever stopped
    sometime, that you thought -- around 12 or 1:00, you would get out your lunch -- your lunchbox and open it up. Warm it
    up and eat it. Drink some water. Drink some -- sometimes they had different -- like Kool-Aid or something in there for
    the lunch. And you eat that on the run. And one day, a chicken got in the way, and we cooked the chicken. And we had to
    move out before it got too well done, but it was better than no chicken, so we all messed on that. Your helmet made a
    good pot. So you just took your steel helmet off, filled it with water and throw the chicken in there. And we had -- one
    day, we had some chicken. But you did that until it started getting 5, 6:00 at night, started getting dark. And you'd
