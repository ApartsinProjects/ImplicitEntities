turns:
- speaker: Respondent
  text: Yes (laughing) because I had sea experience before the Navy, a lot of it. On and off for nine years, I worked summer
    times going to school and this, and that, and the other.
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: Let's see, I joined the Navy in Beaumont, Texas. A ship was in and I just went over there, and I volunteered in, and
    they sent me to San Diego, California.
- speaker: Interviewer
  text: Do you recall your first days in the service?
- speaker: Respondent
  text: No, there's a mental block. No, I guess I do. Very well. As a matter of fact, yeah.
- speaker: Interviewer
  text: Do you want to talk a little about that?
- speaker: Respondent
  text: Uh huh, yes I was a recruit CPO. Uh, and I had 117 men. And I had to get them up in the morning and get them to drill
    and get them to lunch and get them all that away, see. And we didn't lose anybody, lucky. There was a few that we'd have
    liked to have lost. But we didn't lose anyone, there or out of the 117 there are 11 of us left.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: They all got sub chasers out in uh, Pacific, we sent them out there and the Russians, well, of course, Communists
    were using magnetic mines and they were diesel. Sonic Mines.
- speaker: Interviewer
  text: Out of you, out of that group, there's that small of a number left?
- speaker: Respondent
  text: There were six ships, and they got every single one of them... sank every one of them.
- speaker: Interviewer
  text: You know what's weird about that, uh, this is my own ignorance, and I'm a history teacher. You know we talk about
    World War II and all that, and with Korea we don't even. I didn't think we, you know what I'm saying? I mean I don't even
    think we have that... I don't have a frame of reference. That's really hard to imagine.
- speaker: Respondent
  text: They were out there in force, usually trying to sink what we were able to get over there or get them through, and
    we'd get over and then they would let mines that most of those ships, got damaged or sunk from magnetic mines. After so
    many months in the water, they'd come up and float on the surface. And you'd think, oh we're going to have an easy trip
    and somebody's says. "There's something ahead of us there, oh, haha all you could see was the top of the mines. Would
    you please be kind enough to_______. Get out of here."
- speaker: Interviewer
  text: What's the procedure where you see I mean...
- speaker: Respondent
  text: Well, we'd shoot at them until we hit them. Blow them up because they were derelict in the shipping lanes.
- speaker: Interviewer
  text: Right, and you couldn't I mean you don't try to grab them and defuse them.
- speaker: Respondent
  text: Oh God no! No, oh no!
- speaker: Interviewer
  text: You just try to stay as far away and try to hit them and....
- speaker: Respondent
  text: That's right, cause for it to happen if you didn't know whether it was magnetic or sonic or what have you. If it was
    a sonic mine it went toward the engine room. If it was magnetic it went towards the bow.
- speaker: Interviewer
  text: And you shot at with your...?
- speaker: Respondent
  text: A three, five inch.
- speaker: Respondent
  text: Had some eight-inch on that Cruiser Salem. Nine eight inch guns.
- speaker: Interviewer
  text: And if you saw them you could usually blow them, I mean that wasn't...?
- speaker: Interviewer
  text: As long as you saw there you could blow them up? I mean was that?
- speaker: Respondent
  text: Oh God yeah! That's part of the, that was part of the job. And uh, course the, rest of it, a lot of it, was convoy
    duty. Uh, ships that would run, the faster ships went ahead. We stayed with the slower ships because they couldn't get
    away from anything, you know, and in the war there was a lot going on.
- speaker: Interviewer
  text: So you what were the names of the like the guys were all gone? Were those major ships? I mean they had to be big ships
    right?
- speaker: Respondent
  text: God, a lot of them were command vessels, a lot of them were tankers, some of them were, uh, the wooden, the wooden
    minesweepers. Oh, God.
- speaker: Interviewer
  text: Do you remember the names of any of the ships?
- speaker: Respondent
  text: Ok, there was a Mt. Olymus, the Taconic, the Pocano, the Cruiser Salem, the Monrovia, the, um, did I say Adirondack?
    Adirondack. Um, there are one or two more that I was on. They were all sea command vessels.
- speaker: Interviewer
  text: Right. Fascinating. Do you remember boot camp?
- speaker: Respondent
  text: Yeah, but there's something wrong with my, yeah went through 16 weeks of boot camp.
- speaker: Interviewer
  text: What was it like?
- speaker: Interviewer
  text: What'd ya do?
- speaker: Respondent
  text: Well, we marched all day long. Then stand watches most of the night. If you got four hours a night you were in good
    shape. And, you got up at 4:45 in the morning. And you passed inspection everyday. And then you learned all there was
    to learn about, you know, gunnery and drill and you had to learn about all the semaphores, and you had to learn about
    all the code flags and everything else that they put you through. And then you took what was known as the Basic Battery
    Test. That took 10 days. Um, and it went pretty good. You even could remember your name when it was all over. They questioned
    you on everything. Yeah. And then it came to, on a grab. Some places you would put, you know, and all of us___and then
    you'd say, Oh look he's up here, and my friend Jack Esetta who got killed anyway, and he'd say, "What are they going to
    do?" I said, "There's a red line under your name and a red line under my name, and there's a red, under William A. Obannon
    Jr." And there was three or four more in there. Oh God, were we that bad? Were we really that bad? They called everybody
    out for disposition, except us guys. I thought, "We're through, we're really through." They said, "Oh no. You're going,
    you're going to Naval Air in Florida." Did you ever fly an airplane upside down?
- speaker: Respondent
  text: You mean to tell me...
- speaker: Interviewer
  text: I flew in an airplane
- speaker: Respondent
  text: Oh yea, which kind?
- speaker: Interviewer
  text: Cessna 132...
- speaker: Respondent
  text: Oh, well, hell, yeah.
- speaker: Interviewer
  text: Can't fly those upside down too easily.
- speaker: Respondent
  text: I started on a, on a bi-wing steer man, you know what a steer man looks like?
- speaker: Respondent
  text: Then I went to A.T.6 and then to the twin-engine school. The jets just had started coming out. It's scary too...that
    they crashed often. Three crashed in one week. Over shot the landing field, too fast. You'd see them in there fighting
    to try and shut her down. Some of them tried to get off. The____tried to catch them, go in upside down. There was pine
    woods all around the place. That's when I started burying fellas, down there. I buried 68 men last year, here in town,
    and around this area. Tax. Scowel. You know what Scowel means? Scandinavian. Swedish. Scowel means your very best of everything.
    Frankly, you speak any foreign language?
- speaker: Interviewer
  text: Umm, a little German.
- speaker: Respondent
  text: Sprechen Sie Deutch._____, Sehr guten, sie hab, Sehr gut!
- speaker: Interviewer
  text: Yeah, not that much. (Ha ha)
- speaker: Respondent
  text: Potet Parlare Italiano, parle-vous Francias?
- speaker: Interviewer
  text: No. Spanish, espanol.
- speaker: Respondent
  text: You see, my dad was right. He said, "Harry, I want you to get college education." He didn't say a word about the money
    to go, but you can work in the summer and get your money ahead of time and go when you_____, alright. He said, "Then I
    want you to go around the world and get a college education." You know what? He was right. And now that's why you speak
    more than one language.
- speaker: Interviewer
  text: Sort of in our case. (Ha, Ha) In my case for that matter.
- speaker: Respondent
  text: So get in the taxicab, "Wie gehts man. Kommen sie auf." Hello, where do you want to go, Buongiorno signore, now.
- speaker: Interviewer
  text: So the German and Spanish
- speaker: Respondent
  text: Comprende espanol? (seh coo)?
- speaker: Interviewer
  text: Not really, enough to understand in Spanish, and some of it.
- speaker: Respondent
  text: Oh, you need to go to Texas. Because everything south of Houston, Texas is Spanish speaking. But they speak a "Mextex."
    See, and that's what happens. You know, you learn Castillian, or you might learn Mexican. They'll have some words in there
    that are Chinese. And then they'll have some words (Narrator laughing), but of course that's where they came from, China,
    most of the Mexicans. You didn't know that? That's another lesson I learned.
- speaker: Interviewer
  text: Michael. (Laughing) Just take Michael. Michael your fired, says Mr. LaRue. (Ha-ha)
- speaker: Respondent
  text: He's doing fine, he's doing fine.
- speaker: Interviewer
  text: We'll get back to the script. Where'd you go after boot camp? You said something about officer candidate school.
- speaker: Respondent
  text: Well I went to Naval Air first.
- speaker: Respondent
  text: Yeah, down in Florida. I got within uh nine hours of graduation when they found out about this eye. Night flying is
    terrible, you're flying with a wing-light and its just about, it's uh, I think it's candle that hasn't blown out somewhere,
    and you're flying and you can't get too close to it, well of course you'll crash, which upsets you. Anyhow, uh, we went
    through night flying and in the morning I was just blurry, my depth perception, I bounced all over that field, and I got
    in there, walked into the ray room, he said " Harry, what in the hell is wrong with you?" I said, " I don't know." I thought
    I was right on, and I was too high, you know? Don't cut the power at 70 feet off the ground. Anyways, second night, come
    in, bounced again. I walked right over to the man and said, "I want to get my eyes tested right now." I had what is known
    as a weak eye muscle. And when you get real tired, that muscle has a tendency to relax and slightly cross. Just enough
    to ruin your depth perception, which you might miss the carrier deck.
- speaker: Interviewer
  text: Now you were flying at that point.
- speaker: Respondent
  text: Yes. I had 119 hours. Didn't crash. But couldn't land it. So then they turned around and said, "Well, where do you
    want to go?" They said you had all your test scores in, you see. So where do you want to go? I said, "Well, I'm here for
    four years, I mean you know, ok." So he said, "Alright. You report to, you report to OCS school in Newport, Rhode Island."
    They were asking me to go. "I want three volunteers, you, you, and you." That's how they're asking you to do it. So that's
    the way it was. I went up there and they got into the class and they had guys from all over. They're pretty sharp, and
    I said, "Well." I had no choice after that. You had a whole curriculum lined out. Firefighting School, that was a lovely
    thing. They filled a room full of diesel fuel and set it on fire, and we were inside.
- speaker: Interviewer
  text: That's got to be, this is something else we learned from our navy, in the navy that's, fire is a big deal right?
- speaker: Respondent
  text: Oh, fog and fire. The worst there is.
- speaker: Interviewer
  text: That's, everybody I think so far has talked about some kind of fire training.
- speaker: Respondent
  text: Oh, yeah. If your ship caught fire, you had about 15 minutes to get it out. If not it would start spreading and then,
    by golly, you would get the lifeboats ready. Get them over the side, yes sir. Abandon ship. Because with the ammunition
    and all the stuff that they had on there, if it was getting hot and if any of that stuff cooked off, there you go. Yeah.
- speaker: Interviewer
  text: That's a navy, that's a real navy thing. Fire, is always something that comes up?
- speaker: Respondent
  text: Well, it was the same way in the Merchant Service. Texaco was a real fine, the ships were immaculate. They were beautiful,
    and they were fast. The only thing wrong with them, the ship I was on carried 119,000 barrels of aviation gasoline. The
    recycled gas was a tiny bit heavier. Then, of course, he went to the diesel, the furnace fuel, jet plane fuel. Then you
    went to the uh, then of course you would have to clean tanks between each one of those. Been there and done that. Nine
    main tanks and 18 ween tanks that you had to go down and clean it all off and, the dead rats and everything were down
    at the bottom. You would pick them up and put them in the bucket. - (I) Eww. (V) Get them out (laughing)______. They usually
    ended up doing that just before lunch, no, but anyways, yeah, you were working, you're one of the crew.
- speaker: Interviewer
  text: Were we... at the time you were at this, were we in Korea at the, was the Korean conflict going on at that time?
- speaker: Respondent
  text: 50/50, it went on for 17 years.
- speaker: Interviewer
  text: That's what I mean because there's a big band.
- speaker: Respondent
  text: Big band in there, oh yeah. We had a lot of fellas out there.
- speaker: Interviewer
  text: And the war with the Navy at that time, because again in Korea you don't, you don't talk about.
- speaker: Respondent
  text: They were making the transition. Well, of course, radar was getting better all the time. Sonar was pretty good, which
    they got from the Germans. And, um, I, my division, whatever my ship was on, had to do with negotiation for making all
    rights, uhm, shall we say, uh, amphibious landings, and we were the command vessels for an amphibious force. That's all
    I'm going to tell you.
- speaker: Interviewer
  text: O.K. where did you go after O.C.S?
- speaker: Respondent
  text: Norfolk, Virginia
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: Norfolk, Virginia
- speaker: Interviewer
  text: Just went to Virginia? Can't say? What was your job assignment?
- speaker: Respondent
  text: Norfolk, Virginia.
- speaker: Interviewer
  text: (laughing) You said you were an Admiral's aide, right?
- speaker: Interviewer
  text: For an admirals' aide?
- speaker: Interviewer
  text: You had to stay on the command vessels and such?
- speaker: Respondent
  text: Norfolk, Virginia
- speaker: Respondent
  text: So, you see. What we did out there I can't tell you anything about. I was part of that fleet, part of that existence,
    but as far as anyone else knew, we were supernumery. Do you know what supernumery means? Extra people. But he was a board,
    too. We didn't want them to know. We had a, I guess I can say, we had a 52 inch search light. Matter of fact we had two
    of them, up on a platform, up on the main mast, and inside of them it had no one______, they had cameras. And we would
    go past the shore line, and do all the photography. Now you've never seen ASA at, 1500mm lens. Like this and that long.
- speaker: Interviewer
  text: How does it capture? I mean...
- speaker: Respondent
  text: We could get, we could read a newspaper at seven miles.
- speaker: Interviewer
  text: But I mean did you just take roll, like was it a roll? How does it?
- speaker: Respondent
  text: Yes, a slow roll.
- speaker: Interviewer
  text: I mean just a slow roll?
- speaker: Respondent
  text: A drum of film, a drum of film, and a camera shutter was working, and as we moved...
- speaker: Interviewer
  text: Do they say that? Is that? Does that?
- speaker: Respondent
  text: Nobody, you see what we were doing, was pairing all kinds of information if we needed it.
- speaker: Interviewer
  text: Right. It's interesting about that. Didn't even think about that. That's interesting back to script. (Another person)
    Did you see any combat?
- speaker: Respondent
  text: We were part of that fleet, and uh, they would have, half the ships, be liable to be out there, or in, luckily we
    were in the part of the, that only every once in a while, they'd blow one up in the Suez Canal. She's still sitting out
    there. They had 7,000 sacks of cement aboard it and it blew it up and sank it. And it all turned to cement.
- speaker: Interviewer
  text: When you were on board, was the biggest threat then from the mines? I mean was that uh...
- speaker: Respondent
  text: We ran into a lot of mines. They were everywhere. On the shallow seas beyond Florida, behind the Keys in Florida.
