turns:
- speaker: Interviewer
  text: Tell me why did you decide to enlist in the Army Air Corps?
- speaker: Respondent
  text: Mainly, because Uncle Sam's finger was pointing at me every place I went. I was already a pilot, and had a private
    pilot's license and I wanted to be in the Service. I wanted to be a Fighter Pilot.
- speaker: Interviewer
  text: Do you remember your boot camp training experience?
- speaker: Interviewer
  text: Can you tell me about it?
- speaker: Respondent
  text: Well, at boot camp at Santa Ana Air Base was a huge base of bringing Cadets into training and it was not only Flyers,
    but those that would be Bombardiers, Navigators and so forth. I went in, I went in by myself to the gate on the date of...
    that I was suppose to report for duty. And the Cadet group in Santa Ana Air Base was 240 peop...men, Cadets. There had
    been a Troop Train come in from Texas with 240 Texans on it and they, one guy got sick and they took it, took him off
    and put him in the hospital, and they said, 'You're lucky, you're going to be with the 239 Texans.' Most of the Texans
    and most of us, this was the end of the Depression and Texans particularly and still a revery proud of their State. And
    very, very vocal about it, and they think the rest of us are inferior. And maybe they're right. And so they rode me mercilessly
    for maybe six weeks and I had the first bunk in the up, in the upper floor in one of the barracks and so one night about
    20 minutes before lights out I lost control, which I shouldn'thave done, but I did, and I got up and I said, 'okay, you
    S.O.B.'s, one at a time.' Down and about the eighth bunk was a guy by the name of Johnnie Godbolt. And Johnnie was very
    quiet, didn't say much, you, he, I'd been told he was an All- Z American end from Texas A and M. Johnnie stood about six-one
    and probably weighed in close to 210. And he slowly uncorked from his bunk and started up the a isle, and I thought, oh
    boy, you've made a major, major mistake. The War may end for you. He came up and spun around next to me and put his hand
    out and he said, 'No, two at a time.' And nobody moved. And Johnnie said, 'Good-night,' and walked back to his bunk and
    laid down. About two weeks, two weeks that the, that the harassment quit, but they didn't say anything. And about two
    weeks later a bunch of them cornered me again, seven or eight, and said, 'can we talk to you.' And I said, 'Certainly,'
    and I looked around for Johnnie but he wasn'tthere. And they said, we, they had had a vote and the 239 voted that I become
    a Texan. And they presented me with a Texas citizenship and life changed, totally. Very quickly. That was my greatest
    experience. And I flew with Texans then a lot during the War. And I admire them very much that they probably are the greatest
    Fighters overall that you ever see. So, that was, that was a tremendous experience. Boot Camp was, was kind of tough then
    at times you, as one Christm...we didn't, we weren'tallowed out at Christmas 'cause we were still in kind of like a confinement
    type thing, but the Army did put on a pretty good day for us, entertainment and food and so forth. The other thing that
    you learn at boot camp, you do get healthy, very healthy, but the other thing that you learn is that every Sunday at four
    in the afternoon they would have a parade, and you would review, be reviewed in front of a General or something, and big
    bands would play and you becamevery proud that you were there. And that was boot camp. We were in boot camp for, gee,
    about 12 weeks and lots of, lots of shots and typical, you know, exercise and marching and learning to take orders and
    all those things that you do in boot camp.
- speaker: Interviewer
  text: Where did you go after Boot Camp.
- speaker: Respondent
  text: I went directly from boot camp to Ryan Field, which is new, outside of, of Tucson, Arizona, about 15 miles.
- speaker: Interviewer
  text: What did you do at Ryan Field?
- speaker: Respondent
  text: Ryan Field was a primary training base, Primary Aircraft. Flew the Ryan single-engine airplane and we had lots of
    ground study and, and flying study. Two interesting things that happened to me in that were interesting at Ryan Field.
    We were, one of the things was that we had to run around the airfield, three or four times a week, and then this would
    be in the after...usually in the afternoon. And this is in the high desert and this was in June of, of the summertime
    of 1942. And Johnnie Godbolt dropped dead on one of the runs around the field. And that was the first disaster of the
    war for me, type thing, because we'd become friends and he was quite a guy. Within two days of that, and it was accidental,
    I was made Commander, Cadet Commander of the A Squadron. And I tried to refuse it for a while because I didn'tthink the
    Texans would go, would listen to me. And it turned out that it was just the opposite. They led the force for me. So, Ryan
    Field was, was great in many ways, because I went to the University of Arizona, which was in Tucson, and that's where
    I had flown force so I knew flying in that kind of condition was pretty normal for me and a lot of friends there. So,
    it was, it was a great base, it's still there.
- speaker: Interviewer
  text: How long were you at Ryan Field?
- speaker: Respondent
  text: Each one of the training bases before you were a Commissioned Officer was, was nine weeks. So, in nine weeks I was
    moved to Marana, which is Basic Training. And it's a bigger aircraft and it, more advanced, more maneuverable, higher
    altitudes you can fly with it. And it was pretty close to Tucson, which is in a different direction. And it was in the
    heart of the cotton district in Arizona, believe it or not, is a very large producer of cotton. But it's all irrigated
    and so, we were at Marana Air Base when the temperatures were running 110 and 115 per day. And that's tough by itself,
    even if the air is dry, but when you got a lot of irrigation going on, it's just as miserable as you, you couldn'ttouch
    the airplane. You got to get it up to 10,000 feet before you could close the canopy on it. And, it, Marana had another
    very, very unique situation for us. In 1937, this we were taught while we were at Marana, 1937, Madame Chang Kai- shek
    was able to get a guy by the name of Claire Chenault to come over and take over the Nationalist China's Air Force, which
    was not much of an Air Force, and the Japanese were just, just killing them. And he tried to get, he had been in the United
    States Army Air Force and had retired as a Major. He tried to get pilots from the United States, but the United States
    would not allow American pilots to go. They couldn'tstop them from going, but they took their citizenship away if they
    went, because we were not at war with Japan at this point. Finally by '41 they, they, the United States, shortly before
    they rescinded their, their, that and they gave Chenault a hundred P-40's without engines, and told them that, the American
    pilots could then go to China and to, then fly with the Chinese. General Electric was able to get the engines for them
    and so, as you know, that proudly became, undoubtedly became our most famous Air Fighting Squadron, the 'Flying Tigers'
    of Chenault. While at Marana by this time in '42 when we're, we're changing training, we can now train Chinese pilots
    in the United States, we are at war and building up our facilities to the ability to do that. So, we, Marana was half
    Chinese and half Americans. The only problem, major problem with that was that the Chinese didn'tspeak English. So, when
    you were flying, the tower was both in Chinese and, and American, in English. So, we learned a great deal about how to
    protect ourselves in the air, because we didn'tknow that, they also went onto Luke Field, again, then. Really, really,
    really well educated, well-mannered, nice competitive people. That was a very, very unique experience to go through that
    kind of training with them. From Marana, if you complete...completed that, everybody that was going to be flying went
    through Basics, Primary and Basic. And then if you were going to go into bombers, you went to a specific field where they
    had multi- engine aircraft to do your advanced training. If you were going to go into fighters, single-engine fighters,
    you went to Luke Field, Phoenix, Arizona. And if you flew the P-38 there was a special base with the twin-engine, fighter-type
    aircraft for them. So, everybody wants to be a fighter pilot. It was interesting to me, particularly because I don'tknow
    what it is, 'hot-shot Charlie' or the scarf around the neck or whatever it is and the, the girls do like you better and
    you're treated differently. But, so everybody wanted to be a fighter. People have asked me why, why was I able to be a
    fighter and it, it's interesting. Because years ago I found that if I said, 'Well, it's because we were better qualified,'
    I was in real trouble with, with this, and I didn'tlike that at all. And so I said that the reason that I got to be a
    fighter is that they knew I couldn'thandle the crew, qualified to handle the number of other people in the airplane, and
    so I had to fly by myself. And that went over very big, the bomber, guys felt good about that and so forth. And still
    do. And it's probably right, but from Marana I went on to, to Luke Field and when, when that was assigned we were really,
    really proud because we knew that, we knew that we would be i~ into single-engine fighters and that's where we wanted
    to go, unless we washed-out at Luke Field.
- speaker: Interviewer
  text: What type of aircraft did you train in at Luke Field?
- speaker: Respondent
  text: We trained in the AT-6 and the P-40. The P-40 was our airplane that we had the most, most of. And that's the first
    airplane that you were the only, the only person in the airplane. The AT-6 still had a back seat for a, for instructor,
    and, but it was, you could do almost every maneuver in the...the AT-6 took, probably was the airplane that we made the
    most of in the World War II, because the Navy used them as fighter aircraft, and with a little modification. So, it was
    a huge production airplane but, and you could do in strument flying in that and with the hood up, and so forth.
- speaker: Interviewer
  text: How long were you assigned to that duty, that training duty?
- speaker: Respondent
  text: Nine, nine weeks at, nine weeks at Luke Field until I was commissioned. And I'll bet nine weeks, two weeks was at
    Ajo where, where you were doing your gunnery training in the airplane, that is. We gunnery trained in everything you can
    think of. We had skeet fields that we shot at, we had for rifles, we had for pistols, moving targets, all of the stuff
    that you would want to learn to how to shoot a fighter from the fighter aircraft. Since I was a hunter from the time I
    was eight and hunted pheasant and this was, that was pretty easy because you learn, it's the same, same idea as the concept
    of leading. I think Luke Field, other than the P-40, in that is in experience that I, when I was seven years old my father
    had taken myself, and my mother, and my two older brothers to Casa Grande, Arizona for her health for a year. And we landed,
    we'd been there about two weeks when a very famous lady made an emergency or some type of a landing on the road about
    300, three, 300 yards maybe from our house. Amelia Earhart was on the first cross-country flight of a woman solo pilot
    at that time. In the process of, of that landing and taxing, she tore her wings which were in those days were still cloth
    and she probably had an airplane of 35 horsepower, 40 horsepower, maybe, the most. We're talking 1928 at this point, Carl.
    And so my mother gave her a slip and she cut up and made patches and sewed them on to the airplane. The next day the airplane
    was I moved to another dirt road where she could take off and review. She completed her solo flight, but before she left
    she went around and thanked the few people that were there for being there, but she came up and gave me a big hug. And
    I stood there and watched that lady take-off, seven years old. I still remember it vividly. And that was my in troduction
    to be a fighter pilot. Really. So when it came time to fly the P-40, I couldn'twait to get into the airplane and, and
    with all of the preparation for this and you got in it in the morning, it in, it had maybe an eight o'clock take-off time,
    first, first time, and that engine sticks out about eight feet. And it, it hypnotized me, almost. I mean I roared down
    the runway and just stood there looking at it. All of this power that I moved up from a six-hundred horsepower engine
    to almost a fourteen-hundred horsepower. And, and I just kept going straight, straight, straight out just staring at that.
    That was the transition into fighter type aircraft that, that you had that tremendous power. And when, when I took off
    with that P-40 I thought of Amelia Earhart and she had taken off in an airplane that had maybe 40 horsepower, 50 maximum
    in those days was flying cross-country. And I am taking off solo in a fourteen, twelve, twelve to fourteen hundred horsepower
    engine. And it's only 15 years later, or less than 15 years later. That was, that was, that was the big part. Then obviously
    the graduation ceremony. The, I did have a wonderful experience. When, at the end of your training they, they have, they
    had select pilots that went out and tested you. And this was about an hour, an hour and a half, depending on what it was
    and that was in the AT-6. And, and after the hour and a half this test pilot, all he had done is given me in structions
    in what to do, and land on one wheel and land on the tail, wheel, and we were to do rolls and all of this stuff. When
    we got back and got out of the airplane the rest of the group that we're going to be tested was standing there and the,
    and the guy said to me, 'I just had an airplane ride.' And I'm walking a foot of the ground and we got orders that day
    that we would be going to Tallahassee, Florida. And that meant that we would be fly..., probably be flying in the European
    Theater. A
