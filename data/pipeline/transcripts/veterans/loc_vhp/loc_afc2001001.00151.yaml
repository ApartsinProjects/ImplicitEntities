turns:
- speaker: Interviewer
  text: So where did you... Where'd you train?
- speaker: Respondent
  text: I trained—I went Willoughby Induction Center and then we were shipped to Camp Perry. From there we were shipped to
    Fort Leonard Wood, Missouri, and took our training there, and we took about 13 weeks of basic training, and then I went
    to heavy equipment school for about six weeks and was ready to ship out, and I got sick before we shipped out and got
    tonsillitis, and I was in the hospital, and my outfit, the original outfit, I heard them was in the hospital, and they
    went to Seattle, Washington, over to the Pacific. And last I heard from them, I got a postcard from Washington and then
    I was held back in Fort Leonard Wood and finally shipped to Camp Beall. They were just starting the 37th Engineers up
    there, and so I got into the 37th Engineers, and we trained there. I had all my training so I came home on a furlough.
    All the way from California back here. Then I went back to California and we weren't there very long before we packed
    up everything and we shipped to Florida. It took us about 11 days by train, and all our equipment and everything, and
    went to Fort Pierce, Florida for amphibious training and we trained there. We got in there about June. I think. Last of
    May, or first part of June, of '43. Wow, was it hot there. And then we got that training in and then we went on up to
    Virginia, outside of Norfolk, and we took some more training. We went out on a ship for a week or so, and then came back
    and went up to Camp Pickett. Then from Camp Pickett, we took some different type training there, and I got a three day
    pass and made it home and back there, and then when we got back, we were shipped to Camp Miles Standish in Massachusetts
    and we went to Boston, and sailed out of Boston, and we met other ships going across. Came from all ports and you could
    look to the right of you or to the left of you, in front, behind, and that's all you saw was ships. And if we went across
    the ocean every so often we had to zig zag for a course, and that took us, I believe, 11 days and 11 nights to go across
    the ocean on those ships. They weren't the best in the world, and as we got over towards England, the ships dispersed
    and they went to different ports. We went to Swansea, Wales and took some training there, and then we took a—we got on
    an LST and went around England, and came up on a beach that was practicing for the invasion. Right now I can't remember
    the name of it. I'd have to look it up in a book, but I saw Eisenhower there on the beach there. I was carrying a case
    of dynamite over my shoulder. I didn't have to worry about saluting him, at that time.
- speaker: Interviewer
  text: You didn't talk to him at all, though. Did you?
- speaker: Respondent
  text: No, he was riding in a staff car and—while we was there making invasion, one of the ships came around there and it
    was sunk, and there was about 300 soldiers killed, and I never knew it until a few years ago. They kept it so still. They
    didn't want anybody to know about it. That the Germans, that they done that. And then we had that training like—we went
    back to Swansea for a short period of time and then we went to the staging area in England. Laymouth and Fort Balloth.
    It's a little inlet-like and—they had so many ships loaded up to make the invasion you could practically walk from one
    ship to another to cross that bay, and at night a German plane came in and shook the land there, and an order come down.
    No cigarettes. No lights. No nothing. All they had to do was see one light and he would have had a lot of us there because
    the ships were so close together and, certainly, before we loaded up on the ships there, we was in a house that we had
    there, all probably maybe three or four days, and we could hear our planes going over to bomb Germany, and as they went
    over, a German plane came in under them and he was dropping bombs. He dropped 18 bombs in a row, and one was near a hospital,
    and blowed all the windows out, and if he had one more bomb, he would have got us and I had to laugh. All the guys, they
    run outside and they jumped into ditches and everything, and didn't have clothes on or nothing. It looked so comical I
    got to laughing and then I could hear the bullets flying around there and I said, "This ain't no place for me." Back in
    I went. And so, then as we got loaded up, we took off the fifth and was out in there, and then it got so rough they called
    us back. We came back for invasion, and back into the harbor. Then the order came the sixth for us, or shortly that night
    to go across the channel, and the channel, I went across on an LCT, with my crane and my dozer on there. I was a dozer
    operator. And a jeep and a few other things. I couldn't get too many things on. And our outfits were split up because,
    like they found out when they invaded Africa and those places, if they had all engineers on one boat and it got hit, or
    all infantry men, or signal corps men, they lost X amount of men that was trained for that job, so there's only two on
    this boat that I went across on. A Lieutenant and myself, and when we got out in the channel it got pretty rough, and
    I had to chain my dozer down because it was sliding down the deck. I was afraid it'd punch a hole in the side and we'd
    sink before we got there, and so many of the men on the boats were sick. Were seasick because that channel was very rough.
    It was a storm, really, when we was going over, and as we approached the coastline in the morning, Navy was shelling the
    coast, and it was just like a fog on the coast so much, and if we come in on the left, our Rangers are trying to get up
    the cliff there with pillboxes to step on the cliff, and we was coming right into the pillboxes, and we was supposed to
    have been on the second wave, and I don't know what time we got in there and dropped the ramp, and the jeep that came
    off, the guy got wounded, and then the fire was so heavy that the ship's Captain backed us off and we went back out into
    the channel, and the jeep Captain, or the guy driving the jeep, they sent him back to the States, and he had a sister
    that lived in Ashtabula. He wrote his sister and told his sister about me, and she got a hold of my parents and told them
    where I was at. They hadn't heard from me for so long and they didn't know that—then they knew that I was in the invasion
    in the French coast.
- speaker: Interviewer
  text: What was your hometown during the war?
- speaker: Interviewer
  text: What was your hometown then?
- speaker: Respondent
  text: Right here. Ashtabula. That's where his sister lived in Ashtabula, and then she called my folks on the telephone and
    told them that.
- speaker: Interviewer
  text: The Paynesville area?
- speaker: Respondent
  text: Yeah. I've lived here all my life. 79 years here in Concorde.
- speaker: Interviewer
  text: What beach are we talking about?
- speaker: Interviewer
  text: Omaha. That's what I thought.
- speaker: Respondent
  text: Bloody Omaha.
- speaker: Respondent
  text: And we backed off, and then we started in again, and we got stuck on a sand bar and was kind of like that, and an
    88 come in under and explode it, and they pushed our boat aside just like that, and just as done that, three 88 shells
    come right in where we was at and that pushed us back out, and then we tried to get in again, and the Captain of the ship,
    he dropped a ramp and I looked down there, and there was a .50 caliber sticking out of the water from a half track, and
    I told my officer, "We can't get the dozer in until ground it out." So he said, "I'll take care of it." So he went up
    to see the Captain and he says, "You gotta get him in there." To this day, I'm convinced that he pulled a gun on that
    ship's Captain to get him in there because what they were doing, a lot of Navy guys were dropping them off in the water,
    and some of the quick movers going down and drowning out, and the men were drowning out. Getting drowned with the heavy
    packs on because it was too far out and some of the operators had flak vests on. I had a flak vest on, and I told the
    officer I'd take that off right here and I'd swim ashore with—we'll lose our equipment. He said, "We'll get her in." And
    so, when we finally did get in there and—kind of gruesome to see all the dead soldiers laying on that beach. You had to
    zig zag around like this to keep from running over them. One of my other buddies, that drove a dozer, he came in. I guess
    he got in a little ahead of me, and he heard a shell coming in, and they jumped off, and the shell came underneath his
    dozer and blowed the bottom out, and he was—had a trailer behind him with TNT in there. The only thing was left was a
    short piece of the tongue left. Dove, Lynton Dove, had another dozer in our Company C, and he made a pass up through there.
    Some way or another he got through the mine field, and filled in an antitank dish, and got up over the hill so that the
    traffic could get going, and he received a DSC for that. And then—
- speaker: Interviewer
  text: Was that your job with the bulldozer?
- speaker: Interviewer
  text: You had to clear a path?
- speaker: Respondent
  text: Yeah, um-hum. And then we kind of, took us a few days to try to get organized again and get back together, and then
    our job was working on the beach for quite a while. We made roads in that area, and we built loading docks for the ducks
    that come in, and on one side of the dock, and the trucks would be on the other side, and somewhere men from Company C,
    truck drivers, well they'd be driving that Red Ball highway over there and whereas we was down on the beach. And while
    we was down there, I helped clean the mine field with my dozer, and one day as I was walking down there, to get on my
    dozer, something grabbed—just seemed like somebody grabbed me by the shoulder and stopped me. And when I stopped and I
    moved my foot aside, there's a mine about an inch and a half from being stepped on, and now God was watching over us.
    I tell you, it's—you can't imagine it until you have something like that happen. It's a—just like somebody reached up,
    and took a hold of you, and made you stop. Just like I'm looking out at that tree, not thinking nothing about it. Walking
    through there, you know. Just that quick I stopped. You know, it was, and for many instances, like just a few seconds
    that I shifted gears or something, and a sniper shot at me one time, and I shifted a little quicker one time and a bullet
    went behind me, and lot of different instances went on like that. Just, moving just a little bit one way or another. A
    lot of our—we lost I forget how many men, but quite a few of us got through it. It's a wonder any of us made it. Within
    a 24 hour period there was around 5,000 men killed right there on the beach, and that's not counting the wounded. I don't
    know how many wounded. To this day there's probably a lot of them in the hospitals that have never come out from there,
    and before we went over, in England, we went through a rigid test, like a psychiatry test and stuff. To see what the breaking
    point was for you, and then they held some of our men back. I wasn't smart enough. I could have --
- speaker: Respondent
  text: Then they shipped them over a couple weeks later. Then we—after we got done there, after they got the port open, then
    we moved on up in, well we went up into, all the way through France, and up into Belgium, and up into Holland, and when
    we pulled up into Holland—when we was going up into Belgium, it was getting colder weather and ________ + ________, and
    everybody sleeping in the pup tents and everything, and there's a guy came from this village. He said, "I'd like a couple
    guys to come and sleep in my house where it's warm tonight." So my closest buddy, Scotty West, we went down there, and
    we went up like in a loft up in like, it would be like an attic over here. And they had a feather bed. I tell you it was
    about ______ +______. Boy we sunk down in that, and while we was there, they washed all our clothes and cleaned them up
    and had 'em laying out on a chair the next morning. They were still thankful that they'd been liberated and they was free,
    'cause I don't know exactly how many years they were under German dom—you know, under their control, and they couldn't
    do enough for the GI's going through there, and that happened through all of the towns that we went through. People would
    come out, and wave at you, and bring out the wine and stuff. Let's see.
- speaker: Interviewer
  text: Backtracking a second to D-Day, how did you clear a mine field with the bulldozer?
- speaker: Respondent
  text: I dropped my blade. They were—like this mine field was like antipersonnel mines, the foot mines, and the bouncing
    Betsy's. The bouncing Betsy, you step on it, and then it comes up about waist high, and explodes, and it has pieces of
    all kinds of metals in there, and it just scatters just like that. Well, my dozer weighed 17 tons so that wasn't hurting
    it too much, and the teller mines, they were about this big round, and they kind of shaped up, and they had a cap like
    that, and they were for vehicles, and tanks, and heavy equipment.
- speaker: Interviewer
  text: So you just plowed right through 'em with a bulldozer?
- speaker: Respondent
  text: Yeah. We'd pile them up down on the end. A lot of them would go off underneath and you wouldn't even hardly hear 'em.
    We watched. When we did make the invasion, them pillboxes was so thick. The concrete was about 13 feet thick in those
    pillboxes, and they'd build into a bank and them shells would hit 'em, and it just take a little chip of concrete out
    of 'em. You more or less had to go in there and throw something in. And they just had a little place where the gun's sticking
    out, and all the guns on the beaches, they had cross fire like at the 88's is back further, and the whole beach was covered.
    And then, like you had the mortar shells, and they was the same way, and machine guns, and then the rifle men all along,
    and they had trenches and stuff in behind there, the pillboxes, and they was well dug in. They said it was, be impossible
    for any human to get across that beach. And before we got into the beach, I can't think of the name of what they were,
    but they're steel things like that, and they had mines on top of them, just below the water level, so when the boats came
    in like that, they'd hit it and blow the bottom out, and the Ranger's job was to do that. To get rid of them, but they
    didn't have time to clear all the mines there, and all of this one company of Rangers, so I heard. I can't verify it,
    but there's only about two men left out of 100. That was a very dangerous job. And then off to the side, like we went
    in and it'd be on our left side, was a kind of a big cliff, and they went up over that cliff, the Rangers, to get rid
    of the pillboxes and the machine gun left up there. A
