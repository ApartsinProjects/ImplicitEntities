turns:
- speaker: Interviewer
  text: Springfield, Ohio.
- speaker: Interviewer
  text: Wasn't like I had a lot of choice. You know, I mean, the only choices you had back then were go or take off and go
    somewhere else.
- speaker: Interviewer
  text: Actually, I was drafted into that service; and -- but, I think, I probably had an opportunity to either go in the
    Army or go in the Marine Corps; and, you know, I knew where I was going to go. So I felt that I probably had the best
    training in the Marine Corps.
- speaker: Interviewer
  text: Absolutely.
- speaker: Interviewer
  text: "Oh, yeah. You know, you're a kid. You're away from home. You -- you got people screaming at you all the time. I've\
    \ -- I've got several cute stories, but they don't -- I don't know if they're important or not. Yeah, I'll tell you. Day\
    \ one. Day one we get to -- we couldn't fly into San Diego because it was fogged in. This was back in 1969. So they flew\
    \ us to Los Angeles; and we got into Los Angeles probably, oh, I don't know, 1:30 in the morning. And here's this guy,\
    \ in these starched utility trousers, wearing one of those Smoky-the-Bear hats and just a white T-shirt, and he's screaming.\
    \ I mean, you know, in Dayton, Ohio, when we left, you know, at 1:30 in the morning, there's nothing. It's a ghost town;\
    \ but yeah, there's still a lot of people running around. So we -- he's screaming and kicking everybody in the butt and\
    \ putting them on this bus, and four or five of them got on. First thing they did was light up a cigarette because it\x92\
    s, you know, acceptable; and he's going down there slapping cigarettes out of everybody's mouth, and that was not very\
    \ pleasant. So we had to sit at attention from Los Angeles all the way to San Diego, and that's welcome. We got there,\
    \ let's just say, about 3:30 in the morning; and we had to stand on these yellow footprints all night long. And next morning\
    \ our drill instructor picks us up, and he takes us and gets our hair cut, and gets us uniforms, and throws stuff into\
    \ our gunny sacks or duffel bags as fast as you can. And you're carrying your mattress and everything you own for the\
    \ next, you know, 12 weeks. And we get down there to our -- we lived in these Quonset huts, like these steel buildings.\
    \ And our drill instructor showed us one time how we were going to lay out our racks, make our racks up. I can still do\
    \ it exactly the way he showed us 40-some years later. He showed us how to lay out our footlocker. I probably could never\
    \ do that. After we got done there, in our little Quonset huts, there was a great big Quonset hut in the middle of all\
    \ these little Quonset huts; and that was the head or the bathroom, and there were sinks lined up back-to-back with mirrors\
    \ down the middle and urinals on this wall and toilets on this wall. And this drill instructor takes us in there, and\
    \ he said, Girls -- I'll clean this up a little bit -- this is the basin. You stand here. You shave here. You brush your\
    \ grimy little teeth here. It'll be cleaned every day. Well, I knew that was coming somewhere. Then he takes us over to\
    \ the urinals. Girls, this is the pisser. You stand here. You piss here. It'll be cleaned every day. Got it. Heard him\
    \ the first time. With that, he takes us all the way around these mirrors and basins and over to where the toilets are.\
    \ This is where it gets a little -- Girls, this is the shitter. You sit here. You shit here. It'll be cleaned every day.\
    \ And with that, he reaches his hand down in the water and come up with a big handful of water. [Slurping.] It will be\
    \ cleaned every day. Well, I'm thinking, I already made a mistake. I don't need to be here. That was Day one, probably\
    \ before 11 o'clock in the morning. So that's one of the early impressions of the Marine Corps."
- speaker: Interviewer
  text: It's horrible. You know, it was good. I'm telling you what. And I will say this until I die -- my son joined the Marine
    Corps. I tried to talk him out of it. I said, Get somewhere where you can learn something. He went to Iraq two times.
    And he said, No, Dad. I've decided I want to be a Marine. So he goes in the Marine Corps. The Marine Corps is an absolute
    unique fraternity, and the Marine Corps is a unique fraternity basically because of the Marine Corps basic training. You
    -- you quit being a little boy, and you become a man when you get done with Marine Corps basic training. And that -- I
    don't think you'll ever find a Marine in the world who will tell you anything different. And when they say, Once a Marine,
    Always a Marine, that's absolutely the truth. Back in those days, they could beat you up; and they didn't waste their
    time with anybody. They -- everybody got their butts kicked at least once; and I mean pounded in the face with fists and
    everything, that they're not allowed to do anymore. It was -- it was allowed back then. I mean, it wasn't allowed; but
    it still got done, and everybody in the platoon got it at least once. The bad guys got it more than once.
- speaker: Interviewer
  text: Oh, yeah. Yeah. I can remember names. Sloan, Fischer, Brett were the -- were our three. Sloan was a staff sergeant.
    He was our platoon commander, and the other two were just drill instructors. One was a sergeant, E-5, and got his E-6
    before we left. The other was already an E-6.
- speaker: Interviewer
  text: You just did. You persevered, you know. I mean, you don't -- what are you going -- you're not going to quit. You know,
    you just -- you do it.
- speaker: Interviewer
  text: Well, you know, we were all over. You really didn't go anywhere. We were -- our regimental rear was a place called
    An Hoa, that's A-N-H-O-A; but we didn't spend any time there, but that's where our regimental rear was. Our battalion
    rear was a place called Hill 65, and you didn't spend any time there. We were out in the bushes, you know, mostly all
    the time. And you really didn't want to go back to those places because when you went back to those places, you were almost
    treated like second-class citizens. They -- they didn't like the infantry or grunts so much. They -- there didn't seem
    like they did. You got the junk jobs of, you know, stringing wire and standing lines at night. Well, it was nice because
    you had beds -- kind of beds. You had cots back there that you could sleep on. You weren't sleeping on the ground. And
    they had a chow hall, in most cases, where you could get some hot chow or at least a baloney sandwich; and you weren't
    eating C-Rations. But it still was almost better just to stay out in the bush. You know, you could be -- they didn't --
    it wasn't quite as regimented.
- speaker: Interviewer
  text: In Vietnam?
- speaker: Interviewer
  text: Yeah. We flew in on commercial airlines. Surprised me. I'm thinking, you know, because you don't know. You know, you
    -- you -- you stop and think, we're from Dayton, Ohio; Springfield, Ohio. We're hayseeds. We don't realize we're going
    into a country that has not changed for 2,000 years. They're still farming with water buffalos and sticks and growing
    rice and living in grass houses, and you can't believe that. You know, you're used to buildings like this. Even back in
    the '60s, that people still lived that way, was really a shock factor. So we flew in on commercial airlines. They weren't
    going to give me a rifle. You know, we've trained for six months now, knowing that we're coming over here, know what we're
    going to face -- or at least having them tell us what we're going to face -- and then you're landing in Da Nang; and you
    still don't have a rifle. It's pouring down rain. You know, that was -- that was pretty worrisome. For me, anyway, you
    know. I'm thinking -- you know, because I'm thinking they are just going to try to kill you right off the bat; but it
    didn't turn out that way. It was a pretty -- pretty secure area back in those days. Rockets and things you'd get, but
    we didn't take any small-arms fire.
- speaker: Interviewer
  text: I was a rifleman. A grunt, they called it. Infantry.
- speaker: Interviewer
  text: Oh, yeah. Yeah.
- speaker: Interviewer
  text: Tons of 'em. Our unit was -- when I finally got out with our company, when they could do the ranks slowdown -- where
    they could get me out -- the company was out in the bush somewhere, we were -- I think a TO-strength company was 250-some
    men; and I think our company was, at that time down to, you know -- I don't know, 100 or less, for sure. So that was scary.
    It's still pouring down rain. You know, what am I doing here? You know, you just -- you sleep at night, and mosquitoes
    are buzzing around your ears to try and stay out of the rain, and you wake up in a puddle of water that deep. (Indicating.)
    It's -- you know -- again, you adapt. You get used to it. After a while, that's just part of the way things are. I mean,
    I don't imagine it's any better in the desert where it's -- it's screaming hot all day long and then cold at night. So
    -- and World War II was terrible with the snow. And, you know, yeah, it's just -- you -- like any other young guy, you
    just adapt. Everybody else is going through the same things you are.
- speaker: Interviewer
  text: No roofs. No. No, we didn't have roofs. We had ponchos. Sometimes we'd -- if we were set in a somewhat secure position
    or at least a nice perimeter that we were guarding, then we would -- if it was pouring down rain, we'd snap ponchos together
    and make kind of a make-shift tent; but it didn't really keep much of the water out. It was still kind of wet, but it
    was better than nothing.
- speaker: Interviewer
  text: I mean, no. I mean, I don't know what -- you know, just seemed like everyday you were just badgered all together.
    And if things were going good, and you didn't hit the, as we called it, hit the shit that night, those things were memorable.
    I mean, you know, you saw people get killed. You know, you -- honestly, thank God it wasn't you. It was them. You know,
    you didn't -- didn't make a lot of strong alliances, I don't think. You maybe had a couple of buddies, and that was it.
    You weren't real close to everybody. Most of the memorable experiences I had turned out -- I mean, they were great experiences.
    I got malaria. Went to an Army hospital that had four movies every night and had USO show every three days. I mean, that
    was a memorable experience. And you were safe. And, of course, you know, when you get to go home, that's the most memorable
    experience of it all.
- speaker: Interviewer
  text: After your tour's up. I did get to meet my wife. I was married at the time, so I got to meet her in Hawaii for a week
    on R & R. That was a great experience.
- speaker: Interviewer
  text: Well, I wasn't a prisoner of war so I didn't have any experiences in captivity.
- speaker: Interviewer
  text: Well, just the standard. The Vietnam Service, the Vietnam Campaign, the National Defense Service ribbon, the Combat
    Action ribbon. There were probably a couple more. I don't remember now. But nothing, you know, nothing like the Bronze
    Star or anything.
- speaker: Interviewer
  text: Letters back then. Once in a great while, you could make a Ham Radio telephone call where you would be on the radio
    with a Ham Radio operator. So you would transmit your voice to him and then say over, and he would transmit what you said
    then on to your family or whoever you were talking to on the other end. Short time span. Didn't have a lot of time to
    talk, and just -- but made mostly by letter. We used to send some cassette tapes back and forth once in a while.
- speaker: Interviewer
  text: Every time you got the chance to write a letter -- you could start a letter one day and maybe not finish it for two
    weeks. But you know, of course, mail call didn't come, like -- it wasn't like the mail service runs every day. Just wherever
    they'd come. Sometimes every week. Sometimes every other week. Sometimes once a month. You never -- never knew when it
    was going to come.
- speaker: Interviewer
  text: We ate a lot of C-Rations. C-Rations or canned. Beef and potatoes. Beans and weenies and spaghetti. Ham and eggs.
    It was not very good, but again you grew to like them --
- speaker: Interviewer
  text: -- after a while.
- speaker: Interviewer
  text: No, you got two -- two meals a day.
- speaker: Interviewer
  text: I think for the most part. You kind of learned to take care of yourself. You know, you always carried more ammunition
    than you ever would need. You -- so we got low on chow a few times that they couldn't get it out to us because of whatever.
    But, yeah, for the most part, I think we were supplied pretty well.
- speaker: Interviewer
  text: Well, yeah. Of course, you know. People trying to kill 'ya. A lot of stress there.
- speaker: Interviewer
  text: You know, my dad in World War II, had a Bible his mother sent to him. It had a brass shield on the front of it. He
    carried it in his pocket. My mother gave me that when I went to Vietnam, and I gave it to my son when he went to Iraq.
    So I guess that was a good luck charm. So, you know?
- speaker: Interviewer
  text: Not so you'd notice, no. We didn't ever see a USO show. Or like I said earlier, when I went to that Army hospital,
    I got to see movies. No entertainment. I mean, we were in the bush most of the time.
- speaker: Interviewer
  text: Well, I went to Hawaii and met my wife; and you do what every husband and wife do. You know, you just -- and that
    was fun. That was great. Great time. First time we were in Hawaii. Spent a lot of money. Ate good food. You know, that
    type of stuff.
- speaker: Interviewer
  text: Vietnam and home.
