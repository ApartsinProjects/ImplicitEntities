collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: And your branch of service?
- speaker: Respondent
  text: I was in the United States Army infantry - 84th Infantry Division.
- speaker: Interviewer
  text: And you served?
- speaker: Respondent
  text: I served for three years in the European Theater of Operations.
- speaker: Interviewer
  text: And what was your most memorable wartime experience?
- speaker: Respondent
  text: My most memorable was the Battle of the Bulge, where we were pretty well isolated for a long time because of the weather
    conditions - we couldn't get any support. But going through that, and surviving past it, when we did get relieved - I
    think that was the most memorable.
- speaker: Interviewer
  text: And what other battles and other places did you fight?
- speaker: Respondent
  text: I was in the Central--our division was part of the Central European campaign, and also the Rhineland Campaign. What
    we did after we got to Normandy in September, why we went through France--Paris--up to Holland, and we established our
    rallying point there before we jumped off at the Siegfried Line into Germany. And we went from the western part--the western
    boundary of Germany--maybe about 20 or 30 miles into Germany during the Battle of the Rhineland. And then we were called
    to relieve--or to help--down in the Battle of the Bulge around Christmas time--somewhat of a vacation. [laughs] We got
    down to the Bulge and we took part in the operation down there until that was over in late January. Went back up to the
    Rhineland, where we made a push from pretty much the same area to Hanover and Geilenkirchen, places like that, and went
    all the way to the Elbe River outside of Berlin. We probably could have gotten into Berlin very easily, but we were held
    up there as history tells you, and let the Russians take the city of Berlin rather than the American troops. But I think
    we could have very easily had gone in and been there maybe a week before the Russians got there. But that too was a memorable
    event because we sat on the western shore of the Elbe River, and what we got was thousands of prisoners coming through
    there because they did not want to give up to the Russians - they would rather have given up to the Allies. And we were
    supported by the British troops, and we had a party there with the British, the Russians, and the 84th Infantry Division.
    And after that, why we had gone back, and during the occupation we did most of it in the southern part of Germany around
    Karlsruhe and Mannheim. We stayed in Heidelberg a while, and then we waited our trip to Marseilles so that we could go
    to the CBI because the war wasn't over in Japan at the time. And fortunately it did get to be over in mid-August, and
    we went over to Camp Lucky Strike, grabbed a boat. It took fourteen days in January over the Atlantic--having fun on a
    Puerto Rican banana boat which had no keel, it was a flat-bottom boat, and with these Atlantic storms that we had there
    and all, why the boat would go sideways, up-ways, and every which way but straight. And in fourteen days we came back
    to New York, and out of the fourteen days I was in the sack for about eleven of them. [laughter] A lot of our guys were
    like that - it was a small boat, but we got home.
- speaker: Interviewer
  text: And have you been to the Memorial yet?
- speaker: Respondent
  text: I've been to the Memorial - I came here about two weeks ago, yeah.
- speaker: Interviewer
  text: And what do you think of the Memorial?
- speaker: Respondent
  text: I'm very impressed with the Memorial. I think that one thing that was disappointing - there was not much that I could
    personally tie myself in to and relate to as far as my service is concerned. There is a place where they have the battles
    down on the ground, but I thought that rather than have the posts where they have the states--the 56 posts there for the
    different states and the territories of the United States--they probably could have done better by putting something up
    there that a GI, or sailor, or a Marine could see and say, "Hey, there's the Battle of Iwo Jima, I was there!" So that
    they could relate to, and if they have family or people with them, they would find a more personal touch to the event.
    But basically, the Memorial is very impressive, very well done, in good taste. When they first authorized it, I was afraid
    that they might disrupt the view of the Mall - I think a lot of people were concerned about that. And I thought at first,
    "Well, it's not too swift a thing." But the way it turned out, I think they did a marvelous job with it, and I think it's
    a credit to them.
- speaker: Interviewer
  text: And what do you think of the activities today?
- speaker: Respondent
  text: It's phenomenal, we stopped into the reunion tent here and I talked to about half a dozen people. I looked at the
    84th Infantry Division board, found the names of a few people that I knew, and I thought it was very impressive there,
    too.
- speaker: Interviewer
  text: Are you staying for the--
- speaker: Respondent
  text: We're going--walking down now--we're going to stay for the dedication, we have seats in Section 1. And then from there
    we'll take another walk around--take a look around--I'm here with my son, and pick up a few things that I can take home.
    My father had five sons in World War II, so I'm picking up a few souvenirs for those guys, too.
