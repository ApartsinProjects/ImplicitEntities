turns:
- speaker: Interviewer
  text: I was born in Buhl, Idaho.
- speaker: Interviewer
  text: Well, I went into the Navy program for to become a Naval aviator.
- speaker: Interviewer
  text: We are in Boise, Idaho. 1119 Houston Road.
- speaker: Interviewer
  text: Well, my parents moved from Tennessee out to Buhl, Idaho right soon after World War I and as hundreds of other people
    did because of the new reclamation and the new water-irrigated land and so forth. And my mother and father were the first
    of several of their family that moved to Buhl from Tennessee and but my brother, my younger brother and my older sister
    and I were all three born in Buhl. But my dad, in the meantime, he had originally worked for a farmer in the Buhl area,
    and he went to work for a retail lumber company, Home Lumber and Coal Company in Buhl. And they moved, I, we moved to
    Boise when I was three years old. My dad became the manager of the Home Lumber and Coal Company in Boise.
- speaker: Interviewer
  text: It would have been 1924 that we moved to Boise. And I grew up in Boise schools. And we lived several areas in Boise.
    But I graduated from Boise High School in 1939. And then that fall, I worked. And then at Christmastime, or whatever that
    would be, the winter term, I started at Boise Junior College, and I had a couple of years, well, I had one year at the
    old building which was near St. Luke's Hospital, and then I was there the first year that they were open on the old Boise
    airport. And then the war broke out during my sophomore year there at Boise Junior College and.
- speaker: Interviewer
  text: Well, I was with my two best buddies. We were going to a movie. It was on Sunday. I never will forget it. We went
    to the Pinney Theatre. And the girl at the box office we knew, and she told us that it had just come over the air, you
    know, that Pearl Harbor had been attacked. And, of course, we were all at that age and knew that it was going to involve
    our lives. And then I made application or I was in training in the Civilian Pilot Training program. We were flying off
    the campus of Boise Junior College. We would taxi down to the end of the near Broadway and take off right over the Student
    Union Building. And, anyway.
- speaker: Interviewer
  text: Yes. And I was.
- speaker: Interviewer
  text: Yeah. We went.
- speaker: Interviewer
  text: We went in buses from my grade school.
- speaker: Interviewer
  text: And I still have my medallion that they were, they gave out these, they were about the size of a half-dollar, but
    they were engraved with his name on them and so forth. And, of course, that was pretty exciting. We had also seen the
    parade downtown and but we were at the airport when he landed.
- speaker: Interviewer
  text: I did. And, yeah, I made, oh, I don't know, maybe 40 model airplanes. They had in those days, they made little kits
    of the wingspan was about six inches, but they were all balsa, and you carved the fuselage out of solid balsa and then
    put that in the wings, tails, and sections, and so forth. But it was and I had an avid interest in aviation and was out
    there with frequency. I didn't have the opportunity to ride in an airplane until I started my flight training in the Piper
    Cubs is what we trained in there at Boise on the campus. Val Berrichola from Napa was my instructor, and he.
- speaker: Interviewer
  text: No. It was after the.
- speaker: Interviewer
  text: The flight training would have been just after. It would have been in that spring of '42. And then I went into the
    I graduated from that primary program, and that fall, well, I entered, I was sworn into the Navy in Seattle that summer
    of '42. And then we were on campus at Boise State that fall, and we lived in the Student Union Building. And it was only
    very recently that someone from Boise Junior College had interviewed me because they had no record of that. But there
    were six of us that actually lived in the Student Union and flew during the day and had our ground school right there
    on at the Boise Junior College classrooms. And then we finished that program, and I left for the Navy in December of 1942.
- speaker: Interviewer
  text: Well, our first training was St. Mary's Pre-Flight. They had a program for three months. It was principally to get
    us into physical conditioning. And it was rigorous. I mean, we had two weeks of football, two weeks of basketball, two
    weeks of swimming, two weeks of this, two weeks of that, and three months of that athletic program before we ever were
    introduced to airplanes.
- speaker: Interviewer
  text: No. I was a boxer.
- speaker: Interviewer
  text: No. I had boxed at Boise Junior College and thought I was a boxer until we were matched with some of those kids right
    out of the ghettos at Mountain Home and also from Gowen Field. I mean, we had our hands full. But, in any case, the three
    months of training or athletic program at St. Mary's College, California, we went directly to flight training at Los Alamitos,
    which is near Long Beach, California, and we trained in the Yellow Perils and the Stearman open-cockpit trainers. And
    the first day I was there, I couldn't believe the number of airplanes that were coming back from their hour flight. You
    know, there just seemed like there were a million of them. But they all landed. And I was there for three months in that
    training program. And I think one of the fun highlights, seeing Bob Hope on television recently, I was one of two cadets
    that were, I don't know whether it were alphabetical order or what, but, anyway, this other cadet and I escorted him for
    about a good hour around the base before that evening show.
- speaker: Interviewer
  text: Oh, he was just incredible.
- speaker: Interviewer
  text: And, you know, I think the thing that there has been very little publicity about, he was a very clean liver. He was
    not a drinker. He had given people money to give up liquor, had given people money to give up cigarettes, and very little
    has ever been said about that because of his comedy was always clean. And we had some others. Well, like Kay Kyser, he
    was about as foul-mouthed as any entertainer we had, and you never hear anything about that. But, no, I was really that
    was a real fun highlight of my experience there. The other thing, though, that I really will never forget about Los Alamitos
    and the flight training was that, you know, our program was such that we didn't really get as much sleep as we would love
    to have, and that's where I learned to sleep standing up. I mean, we could actually, you would see 10 or 12 cadets leaning
    against a hangar door, sound asleep. I mean, they, you could learn, you could train yourself to do that. And then we would
    have in our.
- speaker: Interviewer
  text: In our classrooms, we still had training and recognition and so forth where they would flash a picture of, say, a
    P-38 on the screen just for that fast and then you had to write down what you saw. And there was a great number of guys,
    you know, there'd be maybe 60 of us in the room, but half of them would fall asleep, and it was and you would be marked
    off, you'd be marked down. And several guys had to take the course over, and it was mostly because they just didn't get
    a high grade, mostly because they had fallen off. And the lights would be off, and the projector would be on and flashing.
    But, anyway, that's something you never forget. And then in the training, I had an officer that I don't know his name
    was Adams, and I don't know. I apparently didn't say the right thing when he introduced himself to me and told me that
    Adams was a pretty important name around there, that he wanted to see to it that I lived up to it. Well, I'm sure that
    it was the expression on my face that caused him to think that I was a problem student. And, anyway, he gave me demerits
    just for the least thing, a spot of oil on my shoe, or, oh, if I didn't have my seam of my pants exactly right, well,
    I would get demerits. And I was always the one that was responsible for the marching while we were in that program. I
    would have these other cadets that had demerits. Why, they would march with, I was in charge because I was the best known,
    I guess. But, anyway, we had had a movie where there were these soldiers marching, this black group, and they would march
    and they would do steps to the side, then they'd do steps forward, and I, all of us had seen that movie, and that's what
    we were doing when this Officer Adams came around the corner. And I got 10 demerits and they got five each, and it caused
    me to be with a record number of demerits. And my group left, and I was held there at that for a full week. I could not
    leave until a full week after my group had already graduated and left. But then I had to go before a court-martial, a
    kind of a court-martial or whatever. Anyway, they had psychologists there and everything, you know. And then this one
    psychologist told me later that this Adams had told him that he didn't want to see me washed out, but he wanted to see
    me brought down a little bit. Well, it was and I never had another demerit in the rest of my training. But that's something
    you'd never forget. And I have saved that from both my sons and their children. But then the next, after finishing in
    the flight training there with the Yellow Perils, we went to a base at Beeville, Texas, which is right near Kingsville,
    which is near Corpus Christi. Well, we trained there in the what we called the Vultee Vibrators. That was our first training
    there. And then it may have been as long as the first 30 days. I don't know. But then we graduated to the AT-6s or.
- speaker: Interviewer
  text: The AT-6 had to be the best. Well, that open-cockpit Stearman is hard to beat. And it's, I think, as an acrobatic
    airplane, it was really the most fun of anything, I mean, as far as doing acrobatics, I mean, rolls and Immelmans and
    loops and so forth. The Stearman was really a well, and we had backing up to Boise Junior College, we that fall of 1942,
    we actually flew an airplane that was a part of web of Peril's training. It was the Ryan ST, an open-cockpit airplane.
    It was probably the greatest airplane for acrobatics, except it would cut out when you were on your back, and that always
    gave you heart failure. But I never had a never had that experience with a Yellow Peril. But in finishing the training
    at Corpus Christi in the AT-6s, we graduated and got our wings at Corpus Christi and then went to we had an opportunity
    at that time to either go fighter or torpedo or or bombers and if some of them even went lighter than air. But I chose
    fighters because I just wanted to be solo in an airplane. I didn't want crewmen. And I just, you know, and I've never
    understood the mentality of those that did want that, particularly those that went into torpedo bombers where they would
    have to come at a ship at slow speed to drop that torpedo. And I'd like the idea of having speed, and that was the reason
    I made the decision to go into fighters. Then we were three months in in Florida to after we were that had we had graduated,
    and we were in training as ensigns in this in this fighter training. And then that was putting us into I think I mentioned
    earlier that I left for the Navy in late December and started that. And it makes it very easy to remember, because I was
    in training the whole year of '43 and then got my wings in the fall of '43. And then we had our fighter training. We were
    into in by the time we finished our fighter training, it was the end of mid to late December. And where did we go from
    there? We went to Great Lakes or went to the Lake Michigan to make our carrier landings aboard a carrier, because they
    had had a problem with with German subs off the coast of Florida, so they moved everything to Lake Michigan. And we went
    out with our winter flight gear on and our winter helmets on and couldn't even crank our cockpits closed. We were in F4Fs.
    We had trained in Florida in F4Fs and then we were in F4Fs, the Grumman Wildcat, for our carrier landings. And we had
    to make those four landings out there in that frigid and we had a real concern about if you had to if you had an engine
    fail, you would you would be in an open cockpit, and you know if you had to land in the water that you're going to flip
    on your back, and, of course, that was a because we could not retract our wheels because it they everything was done with
    a with a crank, and in that temperatures, I mean, it was, you know, below freezing every day that we were there. And we
    had to do some training, you know. In in Florida, we had done some simulated carrier landings, but.
