collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Jesse, where and when were you born?
- speaker: Respondent
  text: Born in New Castle, Indiana.
- speaker: Interviewer
  text: What were your parents' occupations?
- speaker: Respondent
  text: My father, James, was an automobile mechanic. And my mother, Blanche, was a housewife.
- speaker: Interviewer
  text: How many brothers and sisters do you have?
- speaker: Respondent
  text: I have no brothers and sisters. I have a step-brother who was also in the military, but he is deceased now.
- speaker: Interviewer
  text: What were you doing before entering the service?
- speaker: Respondent
  text: I was working in service stations. I was always interested in automobiles and maintenance, so I worked in service
    stations.
- speaker: Interviewer
  text: Did any of your other family members serve in the military?
- speaker: Respondent
  text: No, nobody except me.
- speaker: Interviewer
  text: Let's talk about your early days of service. Were you drafted or did you enlist?
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: Tell me about your departure for training camp.
- speaker: Respondent
  text: We left New Castle, Indiana, February the 15th, 1943, at the bus station, South 14th and Race Street. And we went
    to Fort Benjamin Harrison, which was 50 miles away. It took a couple hours to get there. And the first day when we arrived,
    we spent most of the rest of the day with interviews and being issued equipment that we were going to need. Then the next
    day, the first day I was in the army really, I was on KP because my last name began with A, and they started on the alphabet.
    So I pulled KP detail the first day I was in the service. I still remember that day to this day. We were there at Fort
    Benjamin Harrison about a week, and then everybody got orders where they were going to go. All the friends that I went
    with into the service went different directions. I was the only one that went to Fort Eustis, Virginia. We arrived in
    Fort Eustis, and standing our first formation, the first sergeant there asked if anybody was from New Castle. I said,
    "Well, yes, I am." This fellow was named Jasper Haven. He was a plumber here in New Castle, and he was the first sergeant
    in my outfit.
- speaker: Interviewer
  text: Well, how did your early days of training go?
- speaker: Respondent
  text: They went real well. We did a lot of training, close-order drill and marching and obstacle courses and things like
    that. Then we were set up on 90-millimeter anti-aircraft guns at Fort Eustis, Virginia. We stayed there until May. After
    basic training was over, we were supposed to get a three-day pass. I told my folks here in New Castle that I would be
    off for three days at the end of basic training. This was back during the war, and my folks had a car. They installed
    a 35-gallon steel drum in the trunk and filled it full of gasoline to come to Virginia. They drove to Virginia. On the
    way down there, that order came out that there would be no passes. I went in to see the captain, the commanding officer,
    and told him. I said, "My folks are on the way down here." He said, "Okay. I'll give you an overnight pass, a 24-hour
    pass." So my folks got there and we went to Newport News, Virginia, and stayed the night there. Nine months later our
    first son was born, Jim.
- speaker: Interviewer
  text: Did you receive any specialized training?
- speaker: Respondent
  text: We just did on the 90-millimeter anti-aircraft guns. Those are the guns that shoot up four, five miles high. We took
    training on those. Then we were ordered to report to Camp Stewart, Georgia. When we got there, they told us we would no
    longer be on 90-millimeter guns, but we were being put on 40-millimeter Bofors anti-aircraft guns.
- speaker: Interviewer
  text: What was it like adapting to military life, the physical regime?
- speaker: Respondent
  text: The physical part wasn't too bad. We got used to doing a lot of marching with full equipment and having obstacle courses
    to perform on, and it wasn't too bad. We were all young. I was 19 years old, and most of the guys were in that age bracket.
    So we could do about anything we needed to do.
- speaker: Interviewer
  text: How about the food?
- speaker: Respondent
  text: I thought the food was all right. I have never been one to find too much fault with food.
- speaker: Interviewer
  text: Were the barracks good?
- speaker: Respondent
  text: The barracks were very good. They were wooden, of course, two-story barracks; probably 120 men in a barracks, 60 upstairs
    and 60 down.
- speaker: Interviewer
  text: The social life?
- speaker: Respondent
  text: While we were there, after training in the day was over and if you weren't on detail of some kind or had something
    that you had to do, you could go to the PX. Some of the guys drank and some of us didn't, and that's where we went and
    spent the evening.
- speaker: Interviewer
  text: Well, now let's talk about your wartime service. Where did you serve, Jesse?
- speaker: Respondent
  text: Served in the European Theater of Operations, called the ETO.
- speaker: Interviewer
  text: Can you give me the details of your trip abroad?
- speaker: Respondent
  text: We went from Camp Stewart, Georgia, to Camp Myles Standish, Massachusetts. This was in February, and very cold. We
    stayed there about three weeks. Then we received our orders to go to the POE, port of embarkation. While we were there,
    I got a message that my son was born, and they would not let me go home to see him at all before we left. We left about
    the 1st of March from Boston on the USS George Washington; big ship. That was an experience, being on that ship. As soon
    as it moved out of the harbor, I was seasick. We used to go down to the mess hall, and they had powdered eggs and greasy
    sausage and stuff. I couldn't eat anything but pickles and oranges and crackers, is about all I ate. A lot of the guys
    were seasick like that. But it didn't last too long, about a week, and we were over there.
- speaker: Interviewer
  text: What action did you witness?
- speaker: Respondent
  text: We were set up along Wales, disembarked in Wales and trained there. Then we were sent to England along one of the
    main roads from a little town called Puddletown, down through Weymouth, down to the sea coast. We were set up there to
    guard the highway for the convoys that were hauling material and everything down to the sea coast for the invasion. We
    had some planes that came over, strafing and one thing and another, but nothing personal, hand-to-hand, or anything like
    that. We set up there until the latter part of July. We received orders then to ship out, that we were going to go to
    France.
- speaker: Interviewer
  text: How about medals?
- speaker: Respondent
  text: I had the Good Conduct medal and the European Theater of Operation medal. I received a Purple Heart for a very minor
    wound.
- speaker: Interviewer
  text: What were your duties away from the front line?
- speaker: Respondent
  text: There weren't any lines like you would define a line anyplace. We were set up in gun sections all around the airports
    and roadways and cities and things. Our duty was just to be on the alert and to be ready, be on call at all times.
- speaker: Interviewer
  text: What emotions did you feel when you saw the destruction and the casualties of war?
- speaker: Respondent
  text: It was pretty bad. We had never been around anything like that before. It was total destruction, particularly in France
    when they were bombing day and night. It was very destructive and there were a lot of casualties.
- speaker: Interviewer
  text: Tell me about the friendships you formed there.
- speaker: Respondent
  text: The friendship was very vital to have and to form. I had, of course, 15 men in a gun section, and all those guys were
    very close friends. We corresponded pretty much after the war was over. I left my outfit on September 29th of 1944 due
    to that small wound and was sent back to a replacement depot. All in all, my time with my former outfit was over at that
    time. I didn't see anybody else like that at all that I knew.
- speaker: Interviewer
  text: Tell me about your injury.
- speaker: Respondent
  text: It wasn't anything to talk much about. It was just a small wound. I was sent back to a replacement depot, and they
    put me in a signal corps. I went in to get a physical and they found that I had a serious eye problem, and that connected
    to my small wound. I was sent back to the States. They called it ZI, zone of interior.
- speaker: Interviewer
  text: How was the camaraderie in the service?
- speaker: Respondent
  text: It was just vital. It's just a wonderful thing. You get to feel like most of the guys are just family. One little
    thing I might talk about, going back. After my small wound, I wound up in the 99th Hospital in Reims, France, and they
    sent back a lot of casualties there. I took my first airplane ride in a C9 going back there. That was kind of an experience.
    All the civilians there were French people. You could trade a pack of cigarettes for a quart of champagne any time you
    wanted if you drank, and a lot of the guys did that. Those folks had nothing along the line of chocolate or champagne
    or cigarettes or anything like that. It was kind of an experience to go through that also.
- speaker: Interviewer
  text: How did you stay in touch with family and friends back home?
- speaker: Respondent
  text: You could write all you wanted to. There was no limit to your writing. But then the CO would read your letters and
    he would censor them, just cut out parts. You could not say where you were or what you were doing or anything. You could
    just about tell your wife or your mother, whoever you were writing to, that you were in Europe, and that's about as far
    as it went. You could not call or correspond at all with anybody during that time.
- speaker: Interviewer
  text: How was the communication from home?
- speaker: Respondent
  text: It was very good. My wife and I were married in August and I left in February. She missed me as much as I missed her.
    She or my mother wrote to me about once a day, which was great.
- speaker: Interviewer
  text: What did you do for recreation or while you were off duty?
- speaker: Respondent
  text: You weren't off duty when you went over to France and around. We were on duty 24 hours a day. Once in a while you
    would set up around a little town. Maybe you could go in there and go to a bakery or a little grocery store or something
    like that. Or if you could find it and wanted to, you could get some calvados or something to drink. If you were looking
    for that, you could find it. You could trade cigarettes, which at that time cost us five cents a package, no tax or anything
    on it. You could trade a package of cigarettes for a quart of champagne or calvados, which is very strong stuff. But it
    wasn't much recreation to be had while we were in France and Belgium.
- speaker: Interviewer
  text: Where were you when the war ended?
- speaker: Respondent
  text: Before the war ended, I was sent back to Chicago about the 1st of February due to the eye condition and the other
    thing. I stayed in Chicago until May 14th, the date I was discharged. I got a weekend pass from Chicago every weekend
    all the time I was up there. I rode the train home from Chicago to New Castle. I could stay a couple days, then I went
    back to Chicago. I was in New Castle when the war ended. In fact, I had come home and had bought a small service station.
    I was in the service station business the day the war ended, which was really hard to understand how I could do all the
    different things there in that short length of time. But I was in New Castle when the war ended.
- speaker: Interviewer
  text: How did you return home?
- speaker: Respondent
  text: We came home on the USS Lejeune. It was a hospital ship. We disembarked in Boston and went by train to Chicago and
    stayed in Chicago until I was discharged.
- speaker: Interviewer
  text: What type of reception did you receive from your family?
- speaker: Respondent
  text: They were kind of glad to see me, I think. The first time I came home, it was just on a weekend pass. That's the day
    I saw my son the first time. He was a year old; it was on his birthday. It was just unbelievable that I was even there.
- speaker: Interviewer
  text: How about your community?
- speaker: Respondent
  text: The community accepted all veterans very well, I think. All these civil organizations or military organizations, VFW
    and Legion, welcomed us and assisted us in getting unemployment benefits. We could draw 52/20, 20 dollars a week for 52
    weeks if you needed it. They were instrumental in getting that there. I received a small compensation through the American
    Legion for a wartime wound.
- speaker: Interviewer
  text: How did your readjustment to civilian life go?
- speaker: Respondent
  text: I think I readjusted very well. I was not home very long until I leased a service station and went to work.
- speaker: Interviewer
  text: Have you had contact with your fellow veterans over the years?
- speaker: Respondent
  text: Yes. We've been meeting once a year for several years. Last year we were in Philadelphia, and this year we're going
    to Cleveland. There's only five or six veterans there, and their families. We could have a lot more, but most of the guys
    can't travel and can't drive. We're all in our 80s now, and it makes a big difference when you're driving 1,000, 1,200
    miles.
- speaker: Interviewer
  text: Do you belong to any veteran organizations?
- speaker: Respondent
  text: Yes. I belong to Veterans of Foreign Wars and some other organizations. But that's the only military organization
    I belong to.
- speaker: Interviewer
  text: How did the wartime experience affect your life?
- speaker: Respondent
  text: 'It kind of showed me what life was about and how lucky I was to be home and where I was, and to be in as good a shape
    as I was in. It didn''t really hurt me. I think it taught me one thing: to be on time, to accept responsibilities. And
    I think I''ve done that in my lifetime.'
- speaker: Interviewer
  text: What life lessons did you learn from your service?
- speaker: Respondent
  text: Just about what I said just now, about being on time and being responsible. You learn to appreciate life, I tell you.
