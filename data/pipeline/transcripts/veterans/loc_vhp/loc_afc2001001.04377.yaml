source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Well, thanks a lot for having me. It was a great lunch; I really enjoyed that, and I'm delighted to be here with a
    group of congenial bunch of people. You know, I find it interesting sometimes and hope you do, too, to know a little bit
    about the background of the people in the earlier days. I did grow up on a farm in Oklahoma. It was on a creek not too
    far from the Army artillery of Fort Sill and Shepherd Army Air Force at Wichita Falls. Our farm was a kind of a favorite
    spot for pilots to come down and mow the grass, buzz the planes and scare the horses, and they ran away with me more than
    once. But I knew when I watched them what I wanted to do. Now, I came from a family of nine children. I was the youngest.
    Six sisters, so I had a lot of bosses. Most families our size would live in a house with three or four bedrooms and two
    baths. We had three bedrooms and two paths; one went to the well, and one went to the outhouse. We didn't have electricity,
    and the only running water that we had was when my mother would hand me a pail and say, "Philip, run down to the well
    and get some water." Well, we weren't poor. We just didn't have any money. So when I graduated from high school in 1937,
    I wanted to get into the Air Corps, so bad I could taste it, so I went up to Fort Sill and cornered the second lieutenant
    up there, and I said ... I knew I needed two years of college, but I thought maybe he would have some words of wisdom
    for me. So I said, "How do I get in the Army Air Corps?" He looked at me for about three seconds and said, "Sonny, go
    get two years of college and come back, and maybe we'll talk to you." He might as well have said, "Go to the moon," because
    there was no way I could go to college. Well, being out of high school and living on a farm was kind of hard to make any
    money. The only kind of work I could get was what we call a day job. A day job is charged from sunrise and into sunset.
    On the bad days I would get 25 cents a day; on the good days, 50 cents. So I didn't have a lot of walking-around money.
    So when my younger brother found a job for me in Wyoming at 15 dollars a week, I jumped on that like a duck on a June
    bug. And you already know where I went up there. I did learn to fly there. I didn't get the two years of college, but
    I did get in the Army Air Corps. So when I joined the fighter group at Mitchel Field, we were right next to the Republic
    Aviation factory that built the P-47's. That's what we were equipped with. I arrived there on the 9th of September, and
    on the 14th I got in a P-47 and took off, and I was somewhat awed by the size of that machine. It was a monster, and I
    remember that day as well as I can remember yesterday. I remember getting it off the ground, pulling the wheels up and
    thinking, "I got this thing in the air. How am I ever going to get it back on the ground?" Well, it turned out it wasn't
    all that bad, you know, and I did that a good many times. Well, we trained on P-47's. We were supposed to go to England,
    and we were supposed to fight the German Air Force's 5490's and Messerschmitt 109's. In April of '43 we had the boat about
    half loaded with equipment that we were going to take to England. The commander got a call in the middle of the night,
    and the next morning at 8 o'clock, we were all on a train in Hempstead, New York, headed south to Bird Field. When we
    got down there, the chief of the Air Force, General Hap Arnold, was there to meet us, which was somewhat of a surprise,
    and I was somewhat amazed, you know, that he had come down there to meet us, and he said well -- and he said, "You people
    have been selected for an important mission, but it's secret. I can't tell you what it is, and I can't tell you where
    you're going. You'll find out where you're going when you get there, and you'll find out what you're going to do when
    you get there." Back at Mitchel Field, unloaded the boat, they stuck us in a compound at Camp Kilmer, put us on the Mauretania
    with a total of 11,000 troops. 52 days later and two boats later, we dropped anchor off the crotch of India. Now, they
    don't have a harbor there, so they couldn't go into the harbor. We had to drop anchor offshore. They took some barges
    out. We climbed down onto the barges. They towed the barges in close to shore where the water is about waist deep. We
    got off the barges and waded to shore. By that time I wasn't sure whether I was in the Navy, the Marines or the Army Air
    Corps. Well, after we got on shore, we found out that we were going to get P-40's and we were going up to the Assam Valley.
    We were going to protect the bases up there and the airplanes that were flying the supplies and equipment over the Hump
    into China. Well, I was on the first contingent that went up there. We landed at a little, tiny place called Popeye. It
    looked like a postage stamp when we flew over it, about the size of a good-size putting green. We managed to land there
    right next to a super tank, which was being readied for air transport ships to fly across the Hump into China. Now, to
    give you an idea of what that looks like, I've got a map here which I'm hoping some of you can see. Maybe all of you won't
    be able to. If you can see this kind of wiggly, dotted line here, that's Burma. It goes all the way down to Thailand.
    On this side is the Assam Valley. Over here is China, across these big, tall mountains up here. Here you see a bunch of
    purple dots there, those spaces that were in the Assam Valley, that's where these transport planes flew out of. In 1942,
    the Japanese had managed to not only run the British out of Burma, but General Stilwell as well, which you're well aware
    of, and they took over all of Burma. They owned it clear up to Shingbwiyang, which is the farthest north base, and they
    were able to operate pretty well with impunity out of there. Now, here is the Burma Road that started at Lashio, the brown
    line that goes up into China. The Japanese had managed to get all of the posts ... capture all of the posts from the Sea
    of Japan down to the South China Sea clear around the Peninsula up into the Bay of Bengal, and the Chinese had no way
    of getting any supplies except what had been coming over the Burma Road, had to go across the Hump up here, and you could
    see two brown dotted lines up here. That's the general route that the air transport planes flew out of the Assam Valley
    across these big mountains up here. They had to fly over 20,000 feet, some places 23,000 just to get over those. So they
    would take off at the Assam Valley bases loaded to the gills, climb, trying to get high enough to stagger over the top
    and were extremely vulnerable. The Japanese would fly Zeros out of the northern Burma bases up the Ayeyarwady and Salween
    River Valleys, where they would remain hidden, and there nobody could see them, you know, so they would snip up and shoot
    down these transports and go on home. So our job became to protect the bases here and also fly patrol over this area you
    see up here where I was, that was the really vulnerable spot up there, and that's where the aircraft people really sweated
    getting across. Just beyond that is a place that they called Hell's Gate, and once they got through Hell's Gate, they
    were in pretty good shape. They had to haul enough gas to take their supplies over there and enough gas to turn around
    and fly them back. So it wasn't an efficient operation, but it was the best they could do. Well, we did a lot of that
    in late 1943. From September on up to about October, we were principally on the defensive mode. We had replaced the 51st
    group that had been stationed in the valley before, but when we got there, they didn't have any planes left; the Japanese
    had destroyed most of them either in the air or on the ground, so they had quite a few pilots but no planes, so when we
    came in, they mixed in with us. Part of our pilots went with the 51st into China, part of their pilots stayed back in
    Burma. They started going home in November. In October we started doing fire sweeps down into northern Burma to try to
    discourage the Japs from coming up into the valley. We also went after the railroad bridges. You could see a black line
    right here, that's the Burma railroad that the Japanese used to bring supplies up into Kamang and into Myitkyina, which
    we took out in October, which prevented them from using this extension to get over to Myitkyina, so it kind of slowed
    them down a little bit. It also upset them a little bit. So in December they started retaliating. They came in with a
    force of bombers up to Port Hurst, I think it was the 10th of December 1943. Four of our pilots happened to be on patrol
    up here. They shot down one bomber and four fighters. We didn't lose any airplanes, although one of them got shot up pretty
    bad. Well, three days later, it was the 13th of December, I had just come back from one of these patrols, three and a
    half hours. I just began to relax when the red alert went off, and Japanese came in with 24 bombers and 40 fighters to
    the Assam Valley. I scrambled -- the rest of my flight wasn't able to get up to join me in time, so I was the only one
    that could intercept this force of Japanese before they hit the 10th Air Force headquarters, which I did. It was a bit
    of a scramble. Some people thought that I disturbed their attack plan enough to throw them off, but I really didn't. You
    know, it's kind of like a fly swatting an elephant. But we did have quite a little fracas going on there. I shot down
    one bomber and one fighter and probably two more before they shot up my plane so bad that I couldn't do much with it anymore,
    so I went on back home. In early '44, Stilwell's forces with two Chinese divisions and Merrill's Marauders started from
    Ledo Road to come down Hukawng Valley. They were on their way to Myitkyina. Our big job in addition to their defense became
    close air support for Stilwell's forces and Merrill's Marauders, and we flew all kinds of missions day after day, and
    sometimes two or three missions. The first planes we had only had one pylon, so we couldn't carry any extra bombs, but
    in January we got a new type of P-40 in, finally, that had three pylons on it, so we could carry three bombs or one belly
    tank and two bombs and with that about a thousand rounds of 50-caliber ammunition. We were able to do a lot of damage
    to the Japanese forces down through there. We followed the Merrill Marauders and Stilwell's forces all the way down, close
    air support. The troop carrier people flew in C-47's and dropped supplies to them because it was almost impossible for
    the Marauders or anybody else to haul heavy equipment through the jungle. So we were trying to do with bombs what they
    would normally do with Howitzers, if they could get them, and they had some, too, and they used them; but we did our best
    to help them. On the 17th of May 1944, Merrill's Marauders captured the airdrome at Myitkyina. The other 4,000 first trip
    with a big hole in the middle, 60 feet wide, 2,000 feet on each side of that hole, they started flying C-47's in there.
