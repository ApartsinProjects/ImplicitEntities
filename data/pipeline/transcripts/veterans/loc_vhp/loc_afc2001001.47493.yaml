source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: On [redacted]. San Bernardino, California.
- speaker: Interviewer
  text: I was in the Army Air Corps in World War II, the Eighth Air Force. And after -- I stayed in the service through the
    Vietnam and Korean War and served in the Fifteenth Air Force and the Eighth Air Force after World War II until, I retired
    in June of 1967.
- speaker: Interviewer
  text: I always felt that it was the greatest place in the world, but it all changed.
- speaker: Interviewer
  text: I have three -- I had three brothers. My older brother has passed on.
- speaker: Interviewer
  text: That's a good question. He left us when we were very young.
- speaker: Interviewer
  text: Believe it or not, she supported three growing boys working in a laundry.
- speaker: Interviewer
  text: When I was in the fifth grade we moved from San Bernardino to Pomona, California, and there -- I did my growing up
    there.
- speaker: Interviewer
  text: Yes, after we got there.
- speaker: Interviewer
  text: No. Occasionally, but it was the Depression, there weren't many jobs to be found.
- speaker: Interviewer
  text: Getting hungry.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Interviewer
  text: The only reason I stayed in school is because I loved to play baseball and football and that's why I was in school.
- speaker: Interviewer
  text: Yes, and then I went on to college.
- speaker: Interviewer
  text: I went to Pomona Junior College. Graduated from there and went to La Verne College and graduated from there.
- speaker: Interviewer
  text: Baseball and football.
- speaker: Interviewer
  text: No, I was a very poor student.
- speaker: Interviewer
  text: We were in Pomona. I can remember I was with friends and we were listening to the radio, I believe, and we heard that
    the Japanese had bombed Pearl Harbor. And I told my friends then I was going the next day to March Field and enlist, which
    I did.
- speaker: Interviewer
  text: Not that I know of. I knew there was some kind of negotiations going on between the Japanese and our government, but
    I don't -- I don't know the outcome or what really went on with it.
- speaker: Interviewer
  text: I was 20 -- 24.
- speaker: Interviewer
  text: No, I was still in college. It took me a long time to get through college.
- speaker: Interviewer
  text: Yes, my older brother was in the Navy. My younger brother also in the Air Corps.
- speaker: Interviewer
  text: She took it like a trouper. She was a great woman.
- speaker: Interviewer
  text: People who you didn't expect to be too patriotic turned very patriotic.
- speaker: Interviewer
  text: No, I knew nothing of that.
- speaker: Interviewer
  text: Just that he was a great aviator, which he was.
- speaker: Interviewer
  text: The junior college I went to had a program where they -- you could -- how do I put it -- they were training pilots.
    Put it that way. And you could get into that program, and a lot of my friends did and went on from there into the Air
    Corps. When I went in the Air Corps, I didn't want anything to do with the fighting on the ground in the mud and all that.
- speaker: Interviewer
  text: Not really.
- speaker: Interviewer
  text: March Air Force Base in Riverside, California.
- speaker: Interviewer
  text: Yes. Yes, to get into the cadet program you had to take a test and then they gave you the physical and then they interviewed
    you. After the interview, you found out whether you were accepted into the cadet program.
- speaker: Interviewer
  text: No, I had friends who were already commissioned and flying in the Air Corps. But when I went in there, I was by myself.
- speaker: Interviewer
  text: My younger brother went in the Air Corps must have been about two years after I did.
- speaker: Interviewer
  text: Okay. So you decided to join the Army Air Corps. And where did you do that?
- speaker: Respondent
  text: March Air Force Base in Riverside, California.
- speaker: Interviewer
  text: Were there a lot of young men there enlisting at the time?
- speaker: Respondent
  text: Yes. Yes, to get into the cadet program you had to take a test and then they gave you the physical and then they interviewed
    you. After the interview, you found out whether you were accepted into the cadet program.
- speaker: Interviewer
  text: And were you accepted right away?
- speaker: Interviewer
  text: Were any of your friends accepted with you?
- speaker: Respondent
  text: No, I had friends who were already commissioned and flying in the Air Corps. But when I went in there, I was by myself.
- speaker: Interviewer
  text: What about your brother? When did he enlist?
- speaker: Respondent
  text: My younger brother went in the Air Corps must have been about two years after I did.
- speaker: Interviewer
  text: So he didn't go in with you?
- speaker: Interviewer
  text: And so now you're accepted in the Army Air Corps and tell us about where you went from there. A whole new life.
- speaker: Respondent
  text: 'Okay. They scheduled me to go to primary applied training in Phoenix, Arizona -- this is just my memory -- seems
    like about a month after I was enlisted and signed. And in the meantime the Air Corps changed their policy and they opened
    up -- one of the bases was Santa Ana, California, where whole -- all the cadets had to go through there. So instead of
    going to primary they sent me to Santa Ana and I was there for, I don''t know, maybe three months. And then I went to
    primary, still at Phoenix. And like a lot of guys, I washed out of pilot training. And I asked what is the fastest way
    that I can get a commission? You could either volunteer to go into navigation training or bombardier training, and they
    said bombardier training is three or four months shorter. And I said: That''s for me. And so that''s what I did. And I
    went from there to New Mexico.'
- speaker: Interviewer
  text: So they sent you to New Mexico for the bombardier training?
- speaker: Respondent
  text: And I graduated from bombardiers training on the 30th of December, '42, it would be.
- speaker: Interviewer
  text: Had you heard about the Norden bombsight at that point?
- speaker: Respondent
  text: That's what -- I used it all the time I was training.
- speaker: Interviewer
  text: That's what you were training, really. What did you think about it?
- speaker: Respondent
  text: Yes. It was a super piece of machinery.
- speaker: Respondent
  text: If you learned how to use it, it was almost impossible to miss your target. Well, when I -- when I finished school,
    I don't know many bombs you dropped. But see I'm brand-new at this, never did it before in my life. Never saw a Norden
    bombsight except at the school. And my circular error was under 100 feet for all the bombs I dropped. So.
- speaker: Interviewer
  text: You remember it being a closely guarded secret piece of equipment?
- speaker: Respondent
  text: Oh, yes. Yes, even in school you had to personally check the sight out, take it to the airplane, and bring it back
    and check in back in. Nobody was to help you; it was you alone. You would sign for it and it was your baby until you brought
    it back.
- speaker: Interviewer
  text: Uh-huh. How long were you in New Mexico then for the training?
- speaker: Respondent
  text: It took about seven, maybe eight months. And then I graduated.
- speaker: Interviewer
  text: And where'd you go from there?
- speaker: Respondent
  text: I went from there to Tucson, Arizona, to Davis-Monthan Air Force Base.
- speaker: Interviewer
  text: Is that where you were assigned? Your group?
- speaker: Respondent
  text: They formed crews there and that's where I joined my B-24 crew.
- speaker: Respondent
  text: And then they sent -- after you were put on a crew, they formed training groups that went from Alamogordo, New Mexico,
    to another place in New Mexico. I can't think of the name of it. And then they declared your crew combat ready. And we
    were sent home supposedly -- well, it was for two-weeks leave and then we went back to Topeka, Kansas, picked up a B-24
    as a crew, flew it from there to England.
- speaker: Interviewer
  text: Were you with other B-24s?
- speaker: Interviewer
  text: By yourselves?
- speaker: Respondent
  text: Individually.
- speaker: Interviewer
  text: Were you ready to go into combat?
- speaker: Respondent
  text: Oh, yeah. Oh, yeah.
- speaker: Interviewer
  text: Time to go.
- speaker: Respondent
  text: That's why I joined.
- speaker: Interviewer
  text: What did you do the two weeks you were home?
- speaker: Respondent
  text: Oh, spent time with my mother.
- speaker: Interviewer
  text: She knew you were going into combat?
- speaker: Respondent
  text: Yes. And I got married.
- speaker: Interviewer
  text: Okay. Was this a lady that you had known for a while?
- speaker: Respondent
  text: Yes, I'd known her for ever since we were little kids, practically. Although we had never -- until just before I went
    in the cadets, we dated a few times. And then when I went home on leave, I -- we decided it was a good time to get married.
- speaker: Interviewer
  text: What was her name?
- speaker: Respondent
  text: Her name was Joella Woods. She was from Idaho originally. She grew up in Beulah.
- speaker: Interviewer
  text: Small world.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: So off you all went to England by yourself, a sole B-24 with a crew?
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Where did you land? Can you show us on the map where you actually came into England?
- speaker: Respondent
  text: I -- let's see.
- speaker: Interviewer
  text: You went by way of what, Greenland?
- speaker: Respondent
  text: Yes. Let's see if I can -- it doesn't show Greenland, does it? Let's see if I can find it. First we landed up here
    by Edinburgh. And there was base there where they took the new airplanes in and modified them. So we left our airplane
    there and rode on a train down the first night in England. The train went through London and I said I may never go back
    here again, so I'm going to stay here tonight. And I did. I should have stayed with my crew, but I didn't. I was a nonconformer,
    I guess. And then our base, let's see -- it was up here. They called this little place the Wash. Our base was close to
    it. I don't see the name of that town here. And then when we got there they said that our group wouldn't be -- our crew
    wouldn't be flying any missions out of England; that we were going to start low-level training.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: That was for the Ploiesti raids, is what that meant. We thought that's what it meant, but we weren't sure. But we
    flew low-level missions around England just above trees. And then they -- let's see, I think it was in May.
- speaker: Interviewer
  text: And this would be 2003 now -- I'm sorry, 1943?
- speaker: Interviewer
  text: 1943, okay.
- speaker: Respondent
  text: Yes, we went to North Africa and we flew some missions out of Benghazi up into -- in the desert there, Benghazi, flew
    up into Italy. And -- I think our crew flew four missions, the most notable was when we bombed Rome. Where is Rome? I
    don't see it.
- speaker: Interviewer
  text: What were you bombing in Rome?
- speaker: Respondent
  text: We bombed the marshalling yards. All the rails in Italy came through Rome, so we bombed the marshalling yards.
- speaker: Interviewer
  text: Would you go in with two or three other airplanes or with a fighter escort?
- speaker: Respondent
  text: I never saw a fighter escort, no. Our whole group flew. So we would be, say, 30 aircraft in formation. And --
- speaker: Interviewer
  text: What was it like using the Norden bombsight the first time in real combat? Out of the classroom; the real thing?
- speaker: Respondent
  text: See, that's what's funny about it. You always train and flying in formation and you didn't have to use the bombsight
    for what it's made for. You dropped -- when the leader dropped his bombs, you dropped yours. So he was doing the -- our
    crew was never a lead crew. So --
- speaker: Interviewer
  text: So you never really used what you learned?
- speaker: Interviewer
  text: Did you get a lot of flak? What did you have?
- speaker: Interviewer
  text: Did you have fighters attacking you or was it mostly flak?
- speaker: Respondent
  text: A lot of flak. And on one mission, I think our crew shot down the first jet aircraft in Europe. I think.
- speaker: Respondent
  text: I saw this fighter coming at us and no propeller and I thought that's a funny airplane. And our top gunner shot him
    down. I know he did. We saw him explode.
- speaker: Interviewer
  text: That would have been the Me262. That was the German --
- speaker: Respondent
  text: I don't know what it was.
- speaker: Interviewer
  text: Wow. So you were pretty shocked when you saw that?
- speaker: Respondent
  text: Oh, yes, I couldn't believe what I was seeing. An airplane with no propeller?
- speaker: Interviewer
  text: Did it appear to be going very fast?
- speaker: Respondent
  text: Oh, yes. A lot faster than you normally saw.
- speaker: Interviewer
  text: What was it like being in combat maybe the first time?
- speaker: Respondent
  text: I guess I'm funny, but it really didn't bother me. I was -- I always felt that nothing was ever going to happen to
    our crew, and I guess it kept me from worrying about it. A lot of guys went nuts worrying about getting shot down. But
    --
- speaker: Interviewer
  text: Tell us about when you were shot down. Tell us about what happened. You were going into Rumania; is that correct?
- speaker: Respondent
  text: Yes, yes. I should have brought that book for you -- to let you have it there -- that tells about the mission. In
    the first place, it was well planned.
