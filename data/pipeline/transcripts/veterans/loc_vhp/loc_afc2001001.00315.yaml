source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Well, actually I'm in the Air Force and I'm a Lieutenant Colonel.
- speaker: Interviewer
  text: Okay, you said you participated in the Gulf War, did you mean in the big _____ such as George Bush ____ Colin Powell.
- speaker: Respondent
  text: The _____, General Schwarzkopf. Big man, about six-five. His hands were so big, it's like, you know, I have big hands,
    it's like shaking a baseball mitt. Big old bear of a guy, real big guy.
- speaker: Interviewer
  text: Okay. How long were you in the military?
- speaker: Respondent
  text: I was in the military in 1979, I was on active duty for six and a half years and I've been in the International Guard
    at McIntyre since then. I still am, so 23 years almost.
- speaker: Interviewer
  text: Okay. When you deployed, did you have family members at home?
- speaker: Respondent
  text: Yes, my wife, we had only been married for six months.
- speaker: Interviewer
  text: Okay, what type of technology did you have?
- speaker: Respondent
  text: When I went to the desert? A lot more than any of the people previous to us like in World War II or the Vietnam War,
    whatever. A lot of it is as a result of President Reagan and the government's buildup of weapons, all types of technological
    advantages we had over whoever may be out there, the Russians, or in this case, the Iraqis, that we had wonderful communication
    capabilities. We could listen to the radio for the most part. Most of the day, you couldn't get some of our newscast except
    off of a Russian satellite and it was in a declining orbit so you would get it every once in a while, sometimes with a
    skipped off atmosphere. You didn't get it real good. We had from the standpoint of even in Vietnam when they went to spend
    the night, they spent the night in a tent, we dealt with the elements, hardly any bug screens, not many creature comforts.
    What we had was a thing called Harvest Falcon is the name for it. It's the type of a tent and a build out or a camp that
    the tent is built houses ten people and it had its own heat pump which the air conditioner/heater had vents running through
    the top closed off so you could, you know, accommodate yourself, what you needed. Had hot showers out in the middle of
    the desert 60 miles out in the middle of nowhere. So pretty nice, you know, from the standpoint of making it more comfortable.
    And of course, all of our weapon systems were very good as y'all know.
- speaker: Interviewer
  text: Okay. My dad was in the Gulf War, too. He said that some solders suffered from Gulf War Syndrome.
- speaker: Interviewer
  text: Did you have any symptoms of that?
- speaker: Respondent
  text: I haven't personally, I know some people who have. There's a lot of feelings that it may have been related to stress
    in some cases. In some cases it may have been possibly suspected chemicals or that type thing that might have been released
    or might even have been some of the medications that we took prior to going that may have created some adverse effects
    for certain people. But I haven't seen with our group and there was quite a few from McIntyre. McIntyre International
    Guard Base is outside of Columbia on the way to Sumter. That's the group that I went with. So most of the people are still
    there that went that haven't retired and none of them that I know of really suffered any problems with the Gulf War Syndrome.
- speaker: Interviewer
  text: Before we continue any longer, may I ask your name?
- speaker: Respondent
  text: My name? Glenn Addison, G-L-E-N-N, A-D-D-I-S-O-N.
- speaker: Interviewer
  text: Okay, were you in combat?
- speaker: Respondent
  text: Yes, yes, used to sit down at night and watch the scud missiles fly over on the way to Riyadh and you know, we were
    in the combat zone, yep.
- speaker: Interviewer
  text: So what was your responsibility?
- speaker: Respondent
  text: My position was the base services squadron commander and that responsibility required providing everything from all
    of the facilities that people used at the base, everything from the tents to the beds and whatever was needed, the mortuary
    area for people that were killed or whatever. The services that consist of a dining hall. We had 5000 people on the base
    that had to eat three to four times a day. All the contractors that go out and get the services for the camp had about
    a $2 million a month budget for food that we would have to spend, so everything related to what they call morale welfare
    recreation. Put phone tents in so people could call home. We had a Baskin-Robbins franchise, a Pizza Hut franchise, a
    barber shop, laundry, whatever it took to make the base run day-to-day from bringing the water in to the food in to, you
    know, managing all the people.
- speaker: Interviewer
  text: What friendships did you acquire?
- speaker: Respondent
  text: Friendships? Quite a few with the people that you're deployed with because it became as you watched any of the shows
    on TV, everybody gets to know each other real well and in a moment like that when you're in a combat situation or facing
    unknown, you tend to kind of get to know people pretty well, share a lot of things that are pretty close to you that you
    normally wouldn't do with a normal person. And that develops a pretty strong bond, either it would be the people in the
    tent with you who you work with day-to-day or who you saw, but in my case, I was fairly unusual because I also had to
    interface with the local population. Most people didn't go off the base, but I went off the base. I had to go work with
    the local Saudi Arabian Nationals, with the other, what they call Third World Nationals that worked over there that provide
    support services for us. And so I formed friendships with some of those who I still have today and as a matter of fact,
    was invited back to Saudi Arabia two years ago as a guest of one of the Saudi Arabian individuals that I met, spent three
    weeks back there visiting. So long-term relationships.
- speaker: Interviewer
  text: Okay, what was your most memorable moment?
- speaker: Respondent
  text: There were several. Probably the most memorable as far as clear in my mind was the day that the war started. I was
    listening to a radio and I heard the planes cranking up which was not unusual. We had to fly missions every night, took
    patrol around the base. But our base was the large air base in the theater. We had 250 aircraft and after the stealth
    bombers went in, our base was the one that went in the next day. The first thing in the morning when they were launching
    F-16s from McIntyre, I went out and watched and you could see 27, F-16s parked on the ramp, all cranked up ready to take
    off with their gold-tinted canopies and the sun rising, hitting those and gleaming off each one of them. And you could
    take it -- as they took off into the sky, it was still dark enough, you could still see their afterburners going and knowing
    that they were loaded with bombs and going to hit targets. It was pretty memorable.
- speaker: Interviewer
  text: What was your mission?
- speaker: Respondent
  text: Our mission in Saudi, obviously, was to overthrow Saddam Hussein or primarily to get him to take his troops out of
    Kuwait, which was accomplished. They ended up not overthrowing Saddam as you know and we may end up going back at some
    point, but the reasons for that were many. But it was done to save lives, not, certainly, any other reason and we accomplished
    the missions of having them move out of Kuwait, not threaten Saudi or the oil supply in the Middle East and that was the
    overall mission. My specific mission was to provide the base services requirements for all the 5000 that were stationed
    there to include the food, subsistence, housing, whatever may be needed by those individuals.
- speaker: Interviewer
  text: Well, there are a lot of books and stuff on war, but what was the real feeling that you felt? Was it a feeling of
    excitement or --
- speaker: Respondent
  text: I think you go over -- whenever you go, I think most people throughout wars that the U.S. is involved have always
    been prepared and preparation is the key in anything you do, whether it's sports or going to war, and the training and
    preparation that we had enabled us to go over, for the most part, without having too many concerns without being able
    to accomplish our mission or do our job. But you also always have concerns when you are going into harm's way, so there
    is a certain amount of excitement with that. Really, all it was was a heightened sense of awareness when everything that
    goes around -- on around you. But it was never a concern or a worry or that type thing for my safety, as much as people
    back here did, because they didn't know what was going on, but there were some concerns from time to time that you had
    to be careful and watch what you were doing and especially when you were off the base, downtown or whatever.
- speaker: Interviewer
  text: How did you relax, hang out, stuff like that?
- speaker: Respondent
  text: Well, you didn't have much of that because we were working very long days, especially with my responsibility, I had
    to work 14- to 16-hour days 7 days a week, so I didn't have many hours to relax. What little bit of relaxation I had may
    have been a -- relaxing while I commuted from the base to a place in Riyadh which was about maybe an hour away, or occasionally
    getting to go in my tryst to negotiate contracts or whatever may be off-base to have a dinner down in Riyadh or maybe
    a local Saudi's house, you know. There was maybe -- somebody provided services would be invited over. So it was occasionally
    you got to do that kind of thing. Now, in my capacity, I had quite a few contacts and one of the things that I did was
    to try to arrange, as I told you, I was responsible for the morale, welfare, and recreation for the whole base, so that's
    why we brought in some of the things like the Pizza Hut and those kind of things. We also had a little store that we set
    up like a little Seven-Eleven, I called the base exchange and you could get anything you wanted to there. But I really
    -- make sure we had a movie tent, we had videos that you could watch, so whatever time you did have, we tried to provide
    some creature comforts, but the most part, you were working.
- speaker: Interviewer
  text: Okay. We'll start --
- speaker: Respondent
  text: The story? Are y'all through with questions? You don't have anymore questions? Okay.
- speaker: Interviewer
  text: I'm sorry to interrupt.
- speaker: Interviewer
  text: Were you enlisted?
- speaker: Respondent
  text: No, I was an officer, I was a commissioned officer. I was a major during the Desert Storm War. I'm a lieutenant colonel
    now. All right, the background really for the -- for Desert Storm, y'all, I'm sure are aware of the problems that were
    over there. Saddam Hussein overran Kuwait, really tried to increase his territory and take back what he thought was Iraqi
    possession, which is not, and sovereignty is something that each country enjoys. He was trying to take away that sovereignty
    for the Kuwaiti nation. Probably, if they didn't have oil in that area, we wouldn't have given it as much attention as
    we did. But the fact is that has most of the world's oil supply in reserve and that's what makes us run day-to-day as
    a country, that's a big, what they call national interest to our country. So we -- that's why we are where we are now
    over there and why we keep a presence there and have since the War. What most people don't know is when we went in there,
    we went in in a situation where we were very vulnerable the first few months because we didn't have enough troops to prevent
    Saddam Hussein and the Iraqis from coming into Saudi if they had wanted to, but for some reason he chose not to do that
    until we had such a large force of people over there, over 500,000 people that we made a situation pretty untenable for
    him. He could not go any further. There was no way he could win. He was driven out of the Kuwaiti area and back to areas
    in his country where he is forbidden from operating, supposedly, below the 28th parallel, above the 33rd parallel, whatever.
    It will be -- if you can see, I don't know if you have the parallels on there, they probably do. Saudi Arabia is right
    here. And I don't know if they have bigger -- I see that -- is it bigger?
- speaker: Respondent
  text: Yeah, but it's blocked out. Well, actually a little bit of it that's blocked out. Okay. It's probably easier to show
    you on that one. This is Saudi Arabia here, okay? What we had to do when we left, I was the first officer activated in
    over 30 years out at McIntyre and I went Thanksgiving to the desert. I'm what you call a weekend warrior. I don't do this
    all the time. I work on the weekends whenever I'm needed and I had been to my family's, in-laws' place in Connecticut
    and got a phone call on the road to tell me to be ready to go in three days. So that's the kind of information that sometimes
    will arouse you pretty quickly. But I came back and I was ready to go and --
- speaker: Interviewer
  text: It rattles the ________?
- speaker: Respondent
  text: It does. So I came back and I ended up going to war within three to four days after I got called up. So I came back
    and went to the base, got everything prepared. I had to call all of my people because I was the commander, get them prepared.
    They had to pack all their stuff, tell their families goodbye and leave and not knowing where we were going, what we were
    doing. It took us 11 days to get to where we were going. We flew from McIntyre to Dover Air Force base in Delaware. And
    once we got to Delaware, they had a lot of problems with the planes and it took us three days to get out of there to Germany.
    And we flew to Germany, which is right over in here, and we got to Rhein-Main Air Base. When we left Columbia, it was
    about 65 degrees; we got to Dover, it was about 30 degrees; when we got to Rhein-Main, it was 5 degrees. And we had the
    old tents in Dover, and so we were pretty cold and everything was pretty miserable. We spent 45 days there and we finally
    ended up coming into Dhahran, Saudi Arabia, which is right on the Persian Gulf and it was 86 degrees, so we went from
    5 degrees to 86 degrees. A lot of people were getting sick with all this moving around. We spent another two days in Dhahran,
    went to Riyadh for four days and then finally into where we were. We were 60 miles south of Riyadh out in the middle of
    the desert. We got there, there were only four tents set up, maybe 50 people on the base and a runway and within a month,
    we had 5000 people, 800 ten-man tents, and a whole bunch of other facilities and we became what they call the showplace
    for the whole Gulf War arena because it was the first time they had taken the Guard, the International Guard and combined
    them with active duty. So they wanted to make it a showplace for people to practice what they call the total force concept.
    So even since Desert Storm, we only have about 40 percent of the military we had during Desert Storm because we could
    do things so much better with so much less. The weapon systems are more accurate, the people do a lot more as an individual
    it took a group to do. So even then we were still downsizing and they had a need to pull the guard in and that's why they
    were testing this. So we were kind of a test thing. There were only two combat units from the International Guard that
    went. One was from McIntyre and one was from New York, and both were F-16 units.
