source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Let's start at the beginning, let's hear family details.
- speaker: Respondent
  text: I was born in Pasadena California 1950. Actually born in a hospital in Hollywood. But raised in Pasadena and went
    to Catholic school. There's my little my picture right here. That's me.
- speaker: Interviewer
  text: Look at you. What school did you go to?
- speaker: Respondent
  text: Sacred Heart and then I went to a number of other schools, Washington and John Muir High School there in Pasadena.
- speaker: Interviewer
  text: Favorite subject?
- speaker: Respondent
  text: Favorite subject, music. Is there any question? There's my graduation picture.
- speaker: Interviewer
  text: What year did you graduate?
- speaker: Interviewer
  text: So the thing about growing up in a community in Pasadena was that we were a small enclave of Filipinos living in about
    a four-block area. Our family migrated to the U.S. and got all together to create community for themselves because there
    was no friendly relations. At that time it was just after the Japanese world. My father was called a Jap on a regular
    basis.
- speaker: Interviewer
  text: Now, was your father born here?
- speaker: Respondent
  text: He was born in the Philippines. He came here by himself when he was 14 and he joined the U.S. Army, a sergeant in
    the Army.
- speaker: Interviewer
  text: In the U.S. army?
- speaker: Respondent
  text: During the second World War.
- speaker: Interviewer
  text: What is your dad's name?
- speaker: Respondent
  text: My dad's name is Mario Gadio Abejon.
- speaker: Interviewer
  text: Do you have a picture of him?
- speaker: Respondent
  text: I don't have one with me, I'm sorry to say.
- speaker: Interviewer
  text: So he served during what war?
- speaker: Respondent
  text: In the Second World War. He was an MP. And the funniest sight is that my dad was about 5'7", 5'6", 5'7", a little
    guy by comparison to the people he served with. And he was in his full regalia and his hardhat and his blouse boots and
    marching along with, you know, a billy club and a gun. And he was half the size of the men he was working with. He looked
    after German prisoners that were brought to the south here in the U.S. during the war.
- speaker: Interviewer
  text: So he served here in the U.S.?
- speaker: Respondent
  text: He served here in the U.S. in the south. That's where he met my mom.
- speaker: Respondent
  text: In Mississippi, Louisiana area. And they had a prisoner of war camp, which I didn't know about, but they had a prisoner
    of war camp there. And my dad was one of the MPs that looked after these guys.
- speaker: Interviewer
  text: So he met your mom?
- speaker: Respondent
  text: He met my mom.
- speaker: Interviewer
  text: And what's your mom's name?
- speaker: Respondent
  text: Lillian Ardette Abejon, originally Rickels born and raised in Mississippi and she was like a black sheep for sure
    because they called my dad a Jap the whole time he was in the service down there. And she was like you know {hand gesture}
    and so she met and married my dad and moved to California with him. And we all were raised here in the southern California
    area.
- speaker: Interviewer
  text: Brothers and sisters?
- speaker: Respondent
  text: Brothers and sisters. Lots of them. You can see this is kind of a family picture when they were little. I have three
    older brothers.
- speaker: Interviewer
  text: Older. Hold it higher.
- speaker: Respondent
  text: Carliss, Arthur and Joseph Abejon.
- speaker: Respondent
  text: Two of the three served in the U.S, Air Force and Army.
- speaker: Interviewer
  text: During when?
- speaker: Respondent
  text: In the Vietnam conflict.
- speaker: Respondent
  text: And this is just all of nieces and nephews and so forth. Yeah, let me show you a picture of my three brothers. These
    are my three brothers. Carliss, the first one on the left. And Art, who was in the Army, and then my brother, Joe, who
    did not have to serve in the Armed Forces because he was the only male left. So he had a lot __ not to have served, which
    is kind of cool. But those are my three brothers. And we all lived together in Pasadena and grew up and went to college
    locally as did I, and there you go. That's it.
- speaker: Interviewer
  text: Okay. So you didn't move around a lot, you pretty much stayed in Pasadena?
- speaker: Respondent
  text: No, we grew up in the Pasadena area for the longest time. I moved to Oregon for a couple of moments, but I moved back
    within a year. Our family is very tight.
- speaker: Interviewer
  text: Okay. So it is now June 1970.
- speaker: Interviewer
  text: And what is going on?
- speaker: Respondent
  text: Wow, what's going on now I'm actually singing jazz, volunteering at the jazz station and singing jazz.
- speaker: Interviewer
  text: So it was KLOM then?
- speaker: Respondent
  text: 19 what year?
- speaker: Respondent
  text: 1970, so sorry. 1970 I just graduated from high school. I am being recruited by a pair of comedians who are very funny
    and very lesbian, which is very interesting part of the conversation there. Anti-war activists and they are volunteering
    to go entertain the troops. So it's a very interesting mix of emotions going on as I joined this group.
- speaker: Interviewer
  text: And they knew you as a musician, singer?
- speaker: Respondent
  text: They knew me as a musician and drummer. They picked me up at the Local 47 musician's union. At the time I was a member
    there.
- speaker: Respondent
  text: So I auditioned with them and my colleague and I decided to join this group that was going to Vietnam just for the
    experience of it because I just graduated from high school. So this is a picture of us getting ready to go at the airport.
    It's not a very good picture, but it's kind of fuzzy.
- speaker: Interviewer
  text: Had you been out of the country before then?
- speaker: Respondent
  text: I never traveled. I never been on an airplane. I had been to Mississippi. Never been on an airplane, never been out
    of the country and never been much of anywhere. I find myself getting on an airplane here at LAX on my way to Andrews
    Air Force base going to Vietnam.
- speaker: Interviewer
  text: So they find you, they recruited you as a drummer?
- speaker: Interviewer
  text: And there was all women. So what are the other pieces of the band?
- speaker: Respondent
  text: The other pieces of the band--let me find a picture real quick. There's a bass player. And her name right there. Susie
    Capetta who's the bass player.
- speaker: Respondent
  text: And let's see here. This is Carol White who is the guitar player and the bandleader. She's a good friend of mine that
    I knew.
- speaker: Respondent
  text: So she actually recruited me to go on and audition for this group. And I thought just another fine mess you got me
    into, but it turned out to be a great adventure.
- speaker: Interviewer
  text: So how many in the band?
- speaker: Respondent
  text: There's four all together in the band.
- speaker: Respondent
  text: Sorry. Three in the band and two comedians. So five in the group.
- speaker: Interviewer
  text: Oh, small group?
- speaker: Respondent
  text: Small group, right.
- speaker: Interviewer
  text: Okay, so they get you over to where?
- speaker: Respondent
  text: They just us from LAX to Andrews Air Force and then we caught a plane. Our first stop was Japan.
- speaker: Interviewer
  text: Where in Japan?
- speaker: Respondent
  text: Tokyo. So just one quick performance in Tokyo.
- speaker: Interviewer
  text: And that was for the troops?
- speaker: Respondent
  text: For the troops, right. It was actually with the U.S. location in Tokyo.
- speaker: Interviewer
  text: So the comedians and you guys in the band kind of did this under the guise of the U.S.O.?
- speaker: Respondent
  text: Right, it was a U.S.O. tour that they recruited us for. So we met with the U.S.O folks here, and then they cleared
    us to go with all of the shots.
- speaker: Interviewer
  text: And passports?
- speaker: Respondent
  text: And passports and security.
- speaker: Interviewer
  text: Was there any training?
- speaker: Respondent
  text: No training, just lots of immunizations, and lots of basic warnings to stay close. We had two passports. We stayed
    close to our escort. We had a captain escort with us the entire time we were gone.
- speaker: Interviewer
  text: Two passports?
- speaker: Respondent
  text: Two passports. They kept one and we carried one.
- speaker: Respondent
  text: So I think it was in case we got kidnapped or I don't even know.
- speaker: Interviewer
  text: Because I found about the red passports yesterday, which are the unofficial if you get caught we don't know you passports.
- speaker: Respondent
  text: No, we didn't have any of those. We had two official passports that were issued by the state department in order for
    us to be able to identify ourselves if we get separated or something.
- speaker: Interviewer
  text: So you get to Japan to Tokyo and you just quickly, just entertained the troops?
- speaker: Respondent
  text: Just random, one quick one on the plane and back to Guam and just stopped for a moment. We did Hawaii on the way,
    too. And we didn't get to perform there either. So we were basically just stopping at places that had locations to fuel
    up and get ourselves over to Vietnam. Our first location was in Vietnam. And then after that we went to Thailand.
- speaker: Interviewer
  text: Oh, okay. What did that feel like? I mean you probably entertained before this?
- speaker: Respondent
  text: Oh, yeah, it was really exciting and quite the adventure. I had two brothers in the service at the time. So I had
    one in the north of Udon in Thailand. And then I had a brother in Hoopon in Thailand. So they flew us into Vietnam and
    we did some touring there. But the emotions were more like excited adventure. I was too young to be scared, too naive
    to be scared about where I really was. I had no concept of a war zone.
- speaker: Interviewer
  text: How many people did you entertain, how many guys?
- speaker: Respondent
  text: Oh, my God, depending on where. For example, this is--I got some pictures here. Can I just start here?
- speaker: Respondent
  text: This is a picture of us landing on a carrier. This is the first shot.
- speaker: Respondent
  text: And here's another one. And these are the Navy welcoming us aboard.
- speaker: Interviewer
  text: Do you remember who these people are?
- speaker: Respondent
  text: No. They actually didn't give us their names. They were just our escorts. They were the greeters.
- speaker: Respondent
  text: And so as we landed, they welcomed us aboard. Ushered us off to the Bay of Tonkin where we were welcomed aboard, and
    we entertained in the hole. This was the Ranger, I believe, USS Ranger. And they gathered the crew in the flight bay below.
    It was the size of many, many football fields and an ocean of men standing there. We got a small stage built. And we get
    on stage. And I'm looking out and I'm thinking those people are all moving. The whole bay was swaying together because
    it was standing on a ship that was moving. I was like oh, my God. If you look out the bay door, you could see the horizon
    changing. It was very strange. But we did our show there. And we some anti-war jokes and they really got it and most of
    them were like it was pretty funny stuff.
- speaker: Respondent
  text: We did--I mean the punchline was, I mean make the world a little gayer to get cleared to lunch because we were addressing
    everybody.
- speaker: Interviewer
  text: During that time?
- speaker: Respondent
  text: We weren't allowed to really be overt about it, so we made it a joke. We just wanted to acknowledge everyone in the
    group, you know. We had young Latino men there that were 15 or 16 years old in the crowd. How do they get in the Army?
    How did they get in the Navy at that age they had to have lied or produced some sort of document that was false.
- speaker: Interviewer
  text: Unless their parents signed.
- speaker: Respondent
  text: Really, could they do that, so maybe that's how they got in.
- speaker: Interviewer
  text: Parents' permission.
- speaker: Interviewer
  text: Some of them--if they were in trouble in school, the choice is go to jail or go into the military.
- speaker: Respondent
  text: Service, I see. So, yeah, so many of them were just very, very young. And we just wanted to include everyone. We knew
    that they were some percentage of people out there who were probably gay and lesbian, you know, and bisexual, transgender,
    whatever, and no capacity to be who they are at all during that time period. As a matter of fact, they were hazed and
    harassed and name calling in the '70s. Yeah, beat up murdered, thrown overboard, disappeared, all of those things. So
    I think it's important that, you know, we spend some time looking at the whole spectrum of people that were aboard the
    vessels and in the Army. And because the two comedians were lesbians at the time, they were bent to make sure to acknowledge
    those folks however they could do it.
- speaker: Interviewer
  text: What kind of music did you play?
- speaker: Respondent
  text: We played a lot of original stuff. There was a lot of comedy going on, and some of the music was really __ and they
    would do stuff like, again, we want to represent for everybody. We would do stuff like Hava Nagila for the Jewish folks
    in the group. We would do Lazy Mary, get up, we need the sheets for the table, an Italian funny song. We tried to represent
    for everyone, to address and acknowledge everyone who was in the service over there because we knew how important it was
    for them.
- speaker: Respondent
  text: So it was a pretty funny deal. Yeah. And we also did a Hawaiian skit, and I mean skit. This is one of the comedians
    in the group that was doing a spoof-off of a Hawaiian dance.
- speaker: Interviewer
  text: What's the name?
- speaker: Respondent
  text: This is Patty Harrison.
- speaker: Interviewer
  text: Okay. Got it.
- speaker: Respondent
  text: And the other comedian is Robin Tyler. So these were just some shots from some of the shows where we were on stage.
    This was actually, I believe, at Ben Tre in Vietnam. And we did some short show there because what happened was we--this
    is another shot from there. About ten minutes after this shot was taken, we were ushered off stage because these guys
    were all sitting on bare boxes and kegs and booze bottles, and they were extremely high on not just booze, they were high
    on, you name it, Thai stick, heroin, you name it. And they were just very, very high. And I can't see why they wouldn't
    want to be given where they were. I mean the downside of the conversation is that as much as I enjoyed the trip and the
    entertainment, what I saw that crucially changed who I am is the impoverished way that people were living, the locals,
    the locals, the Vietnamese and the Thais were hand to mouth in many ways.
