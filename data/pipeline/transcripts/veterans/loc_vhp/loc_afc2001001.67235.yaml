collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Can you tell me where and when you were born?
- speaker: Respondent
  text: I was born in Painesville, Ohio, at the hospital there, and I was born [redacted].
- speaker: Interviewer
  text: And what did your parents do?
- speaker: Respondent
  text: My father was in the Navy during World War II. My mother had various little jobs. She used to sell yarn at a yarn
    shop that she owned, and she used to work in a grocery store during this time.
- speaker: Interviewer
  text: Okay. And how did you enter the service?
- speaker: Respondent
  text: When I think back, the first time I thought of war was back in the Korean War, and I was about 12 years old. I thought,
    when I'm 18, I'll be doing that too. But that ended, and along came Vietnam. I went to college for a year and a half after
    high school in 1961. I was a prime candidate for being drafted. I worked for a company that gave me a confidential security
    clearance to avoid the draft, but that only lasted six months. I was eventually drafted on November 3, 1964, in Painesville,
    Ohio. That was the first time I could vote, and I voted before going into the service.
- speaker: Interviewer
  text: Definitely. You know, go ahead and tell me what boot camp was like or what it was like when you received your letter.
- speaker: Respondent
  text: On November 3, we went to the courthouse with about 20 guys. It was cool, so we wore heavy coats, not knowing where
    we were going or how long we'd be there. We took the oath and got on a train to Fort Knox, Kentucky. I watched the scenery
    go by, things I'd never seen before. We arrived at Fort Knox about 11 in the morning and lined up in formation, which
    was supposed to be a straight line with equal distance apart.
- speaker: Respondent
  text: A sergeant walked by and noticed I had sunglasses on, which are not proper in any branch of the service. I told him
    I had a paper from my ophthalmologist stating my eyes are very sensitive to sunlight and I needed to wear them outside.
    He barked at me to address him as Sergeant E5, not sir. He said my paper wasn't an Army regulation and I wasn't going
    to wear the sunglasses. I said yes, sir, and he told me not to say 'yes, sir' but to call him Sergeant.
- speaker: Respondent
  text: He then asked for three volunteers for KP, kitchen duty. They called me 'Sunglasses' as a nickname. We ate at 6:30
    and stayed until 8:00. I had to pack my duffel bag perfectly, but we had no time because of KP. Lights went out, and I
    was assigned fire duty that night, staying awake to watch for fires. I dozed off once or twice but stayed up until 4:00
    a.m.
- speaker: Respondent
  text: The next morning we had formation to account for everyone. We did physical training, took written tests, and watched
    war movies. The movies were black and white and not very good. We were supposed to be at Fort Knox for eight weeks before
    going to advanced individual training (AIT). Christmas and Thanksgiving fell during that time, and they debated letting
    us go home for two weeks at Christmas, which they hated because you forget what you learned.
- speaker: Respondent
  text: I had a bad cold when I got home and went to my doctor who said I had a slight case of pneumonia. I got pneumonia
    because we were wet and cold all the time, marching and in contact with many people with colds. One night I told the officer
    of the night I was sick and needed to go to the hospital. He initially said no, but I insisted. They sent a Jeep to take
    me to the hospital, which was half a mile away. They confirmed pneumonia and gave me pills but no further treatment.
- speaker: Respondent
  text: When I tried to get back to the barracks, the Jeep driver had left. I was lost in the rain and cold but found my way
    back by heading toward the tallest light I could see. I got back around 2:30 a.m. with only a few hours of sleep, coughing
    and sick, but I managed to get through it.
- speaker: Respondent
  text: We were reassigned to AIT at Fort Hood, Texas. About 50 of us flew on an old noisy prop plane with webbing seats.
    We got a box lunch on the plane. We landed late at night in 85-degree weather, which was nice after 32 degrees. We stayed
    in a barracks overnight and had 15 minutes to get to breakfast the next morning.
- speaker: Respondent
  text: At breakfast, I was first in line and handed my tray to the server, but he told me to just tell him what I wanted.
    I could have anything on the menu and as much as I wanted but had to eat it. I ordered a three-egg cheese omelette, bacon,
    hash browns, sausage, gravy, coffee, and orange juice. I pigged out because in basic training, food was never enough.
- speaker: Respondent
  text: We were assigned to barracks with guys going into similar roles like infantryman, radio operator, or MP. Shortly after,
    they asked for volunteers. I volunteered and was selected with six others for a special nuclear weapon squadron. We had
    secret security clearances because of the nuclear weapon we were in charge of.
- speaker: Respondent
  text: Every morning after breakfast, we went to a secure building to handle two facsimile bombs matching the real ones in
    weight, size, and shape. We opened boxes carefully without knives or metal, with two people holding the box while the
    third slid the weapon out. Everything had to be exact, and mistakes meant starting over. We practiced eight hours a day
    for months and sometimes outside.
- speaker: Respondent
  text: A general inspected us and asked me about my job. I told him I was part of the Davy Crockett nuclear weapon section.
    He asked questions, but I told him no because he didn't have a need to know, even though he was an officer with a security
    clearance. I explained that having a clearance doesn't mean access to all classified information. He accepted that and
    moved on.
