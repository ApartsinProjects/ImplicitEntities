collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: I served in the Vietnam War and I was in the United States Army.
- speaker: Interviewer
  text: I was enlisted.
- speaker: Interviewer
  text: I wanted to enlist because I wanted to have a job or assignment in the military that was kind of my choice. I didn't
    want to be drafted and serve the needs of the service. I wanted to become an aviator and fly rather than walk.
- speaker: Interviewer
  text: I was in my twenties. I had just graduated with my associate's degree from Penn State. I knew the draft was looming,
    so I was in the process of enlisting.
- speaker: Interviewer
  text: Oh yes. I spent eleven months in South Vietnam at a place called Plantation, which was between Bien Hoa and Phu Loi
    near the 93rd Replacement Company. That's where any new servicemen that came into Vietnam in the southern part of Vietnam
    all went through the 93rd replacement and I was within a mile of that location.
- speaker: Interviewer
  text: While I was in Vietnam?
- speaker: Interviewer
  text: My unit was the 117th Aviation Company and our location was at Plantation and I stayed there the whole tour. Although
    I flew all over III Corps in Vietnam, our base of operations was out of Plantation.
- speaker: Interviewer
  text: I was a helicopter pilot. I flew UH1s in a Combat Support Unit, which means we did a little bit of everything. We
    did combat assaults, combat service support. We did resupplies, and in times of dire need, we even medevaced wounded people
    out in the field. We did a little bit of everything.
- speaker: Interviewer
  text: Oh yes, quite well. My aviation training I received at the first phase was at Fort Walters, Texas. I was there for
    about four months. They call that Primary One. And then once completing that phase I went onto Fort Rucker for the second
    phase of training, which was primarily instrument training and also flight tactics. Training you to fly a Huey and different
    types of missions that you would be expected to do as a Huey helicopter pilot out in the field. Landing in different types
    of LZs or landing zones, landing on slopes, confined areas, hauling troops, doing sling loads, and also flying in instrument
    conditions.
- speaker: Interviewer
  text: Good or bad?
- speaker: Interviewer
  text: I have a lot of both actually. Vietnam was very beautiful, the country. There were mountains, plantations, rivers,
    beach areas, islands. By virtue of the fact that we flew all over this area of operation called III Corps, we got to see
    a lot of the countryside. I even flew into Thailand on submissions for the Embassy. It was pretty interesting. I would
    have to say that probably one of the mountainous or hilliest areas that I flew in that was pretty was a place called Song
    Bay. There were French rubber plantations there and a mountain that had radio communications and intelligence sites on
    top, and we would go up there and land. They had a pad they called the Strawberry Pad because it had a big strawberry
    painted on it. The landscape in the river valley near Song Bay Mountain was just beautiful with the rubber and banana
    trees, and what not. There were people called Mountain-Yards. They lived off the land. They lived up in the mountains
    and were very self-sustaining as far as being able to get along and not having the war interfere too much with their way
    of life. They would make their own tools, do their own gathering of food, and weave cloth. They were pretty ingenious
    people.
- speaker: Interviewer
  text: To a certain degree, you know, most of the time we were out on missions. We'd fly out early in the morning. We would
    spend most of the day supporting either US forces or in many cases, at that point of the war. I was there from the early
    part of '71 February time frame to the February of 1972. So that was the latter part of the war and we supported a lot
    of Vietnamese units during that time period.
- speaker: Interviewer
  text: The first six months I was there, not that many. The second six months, there were a lot. There were two major offensives
    that went over into Cambodia. There were two major offensives in the northwestern portion of III Corps that started around
    An Loc and Loc Ninh. Then there was another offensive that occurred that went across the border near Tay Ninh into Cambodia.
    In fact, the one near Tay Ninh was actually started with one of our helicopters being shot down. Then we started discovering
    major North Vietnamese units that had infiltrated through Cambodia into the border areas in III Corps around Tay Ninh,
    Song Bay, An Loc, and Loc Ninh. We lost about ten guys in about a month.
- speaker: Interviewer
  text: Ah, there. We'd haul supplies in. We would move people around. One of my missions on some occasions was to fly a flare
    ship at night because I had an instrument ticket. I was one of the few pilots in the unit that had an instrument ticket.
    Because of having the extra qualifications, I kind of got drafted to go out and fly this flare ship, so if there were
    enemy contact at night. We really didn't have the technology that we have today with night vision goggles and what not,
    so people needed light at night in order to target or to try to see the enemy. We had a specially equipped Huey with a
    rack in it. We would drop flares out to illuminate the area. We would be located near Tay Ninh. We would fly out of Tay
    Ninh. That's where we could get gas, refuel, and resupply, and fly out to firebases north of there. One of them was Firebase
    Pace, that one made the news. They were under siege for like fifty days. We did a lot of resupply, flare missions, reconnaissance.
    We would go out with one Huey, two Cobras, and an OH-6, and we would go out in what they would call a Hunter Killer Team,
    so we got to do everything.
- speaker: Interviewer
  text: While we were, you were typically awarded Air Medals for flying so many hours of either combat or combat service support
    time. While I was there, I think I have a total of twenty-two Air Medals. Everyone at the completion of their tour typically
    would get a Bronze Star and Vietnam Campaign Ribbons, but that was nothing out of the ordinary.
- speaker: Interviewer
  text: Since we were at a semi permanent base, we had a mess hall, we had an officers' club. During the day, we would be
    out in the field flying around, but in the evening, we'd be in the safe compounds. We had a mess hall, pretty reasonable
    food, and a club where we could go and relax and sometimes there would be entertainment there. On some occasions, we would
    go to Bien Hoa or some of the more populated areas or even go into Saigon, and you could go to restaurants. I liked Oriental,
    Thai food. They had a place called the Mandarin House. That's where I learned how to use chopsticks rather proficiently
    because they had no knives and forks, so if you wanted to eat, you had to learn quickly to use chopsticks. We lived comfortably.
    We kind of got spoiled compared to people that were in the infantry or the artillery, that moved around a lot or were
    out in the field.
- speaker: Interviewer
  text: Yeah, typically.
- speaker: Interviewer
  text: Bob Hope was there on one occasion. I think he was over at Bien Hoa. We would have traveling troops that come around,
    not as notable entertainers as someone like Bob Hope. Every once in a while, someone would come through our officers club
    or be up at the Battalion Headquarters, and we would have the ability to go see that. Give us a little down time, a little
    time to relax.
- speaker: Interviewer
  text: A lot of lettering writing. We would send tapes back and forth. Also we had, I think it was MARS, but there was a
    place we could go to make phone calls. Usually call once a month, once every five or six weeks at the most. Usually once
    a month you could make a call. It's not like flipping a cell phone today, but mainly through letters. That was the primary
    way.
- speaker: Interviewer
  text: There, I was, my tour lasted a little over eleven months. I actually got a drop because in late '71, early '72, they
    were starting to downsize and deactivate units, so our unit became kind of the gathering point. Any unit that was standing
    down, people that had X number of months left to complete their tour, they would send them to our unit. The cadbury of
    pilots, mechanics, crew chiefs, and gunners kept increasing a little here, increasing a little there. What they ended
    up doing is once some of our people, and I was included in that, once we got to a certain point, they would give us a
    fifteen or thirty day drop from our tour, since we had an excess of people and their crafts. I was actually there for
    eleven months.
- speaker: Interviewer
  text: No, I stayed in the military for almost twenty-five years and nine months. I left Vietnam, came back to the States.
    I went to Fort Eustis, VA, where I was flying a large cargo transport helicopter, Sikorsky Sky Crane. I didn't fly a crane
    in Vietnam. I just flew Hueys over there.
- speaker: Interviewer
  text: Well, I had one engine failure when I was flying. We were at about five hundred feet and we were near a place called,
    we were over near Cu Chi and Bla Tri. We were flying along and the engine quit. We just, in a helicopter you can do something
    called an auto rotation, where there's like a freewheeling clutch that allows the rotor to keep turning. There's actually
    a technique, if you follow it correctly, you can just land the aircraft and cushion it on the ground. We didn't sustain
    any damage or any injuries or damage to the aircraft. We actually got out and formed a makeshift perimeter with our crew
    chief and our gunner. Then we had gotten off a mayday call and some nearby aircraft came in and flew some cover for us
    and then somebody from our unit actually came out, the maintenance officer, and they were able to do some work on the
    aircraft. The maintenance officer and another pilot actually recovered the aircraft and brought it back later that day.
    But we had another aircraft that picked us up, picked up our radios, our logbook, and our ammunition, and took us back
    to our base. And then one night, probably the closest I ever came to biting the dust. I was up at Tay Ninh at night. This
    was during one of the major offensives in Vietnam and over into Cambodia. We had gotten a call that there was a tank and
    a tank retriever, which is a big tracked vehicle that can actually pull out a tank if it gets stuck. They were both broken
    down and they needed a mechanic, and they needed tools and parts. We got tasked to go up there to try to take the mechanic
    in, and the toolbox, and the parts. We were flying up. It was very, I don't think there was any moon. It was very dark,
    as I remember. We could see their strobe lights from altitude. They have a special strobe light. It has a collar on it.
    You point it and you can't see the light out to the sides. It kind of directs the strobe. Because you wouldn't want somebody
    that was twenty-five, fifty, or one hundred yards away seeing your light. They'd know where to come and get you. But anyway,
    they could shine the strobe light up. We knew where they were. We came in over this road to land and the people didn't
    bother to tell us that they had put out trip flares and they had put out concertina wire. As we got lower over the road,
    we had this dust cloud come up and all of a sudden one of these trip flares went off. We ended up being in a white out
    at night inside this dust cloud. I was able to pull in power in the Huey and level the land and started climbing out and
    we came around. We talked to them on the radio. That's when they told, well we knew they had trip flares, because one
    went off. Then when they told us they had more trip flares, they had claymores, they had concertina wire out, and they
    couldn't tell us where it was. We said, "We're not landing." We went back to our base. But anyway, my crew chief was really
    very upset. I could tell just by the tone of his voice that something was wrong. We got back, we refueled, we went over
    to get some sleep, so I'd gotten him off to the side and talked to him. I said, you know, "Hey, what's up, what's going
    on?" He was sitting there, we were doing the go around and he saw the barrel of the tank go right by the side of the aircraft,
    right in front of his face. If we would have hit the barrel of the tank, why, I wouldn't be sitting here. That's one of
    those things that sometimes, what you don't know won't hurt you. He didn't say anything at the time, which was probably
    very good that he did not say anything, because we had enough to contend with just getting out of a dust cloud at night,
    after being whited out by trip flares was, that in itself, was a major stroke of luck. Because lots of times pilots will
    just get buried. You have no idea where up is, and down is. Guys will roll over and crash or whatever. Somebody was looking
    out for me that night. He was obviously very shaken by the fact that he had saw that barrel.
- speaker: Interviewer
  text: Yeah, I was the aircraft commander for that.
- speaker: Interviewer
  text: At the time, I was a CW2. I was a Chief Warrant Officer 2. Warrants are a funny breed in the army. It's a technical
    rank. It's kind of between enlisted and commissioned officers. But the army has a lot of pilots.
