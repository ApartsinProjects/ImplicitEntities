source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Ok, why did you join the service?
- speaker: Interviewer
  text: You were drafted?
- speaker: Interviewer
  text: Ok, where were you living at the time?
- speaker: Respondent
  text: 602 South Windbrig Avenue, Springfield, Ohio.
- speaker: Interviewer
  text: Do you recall your first days of service?
- speaker: Respondent
  text: Yes. Well, in the first place I had ROTC for two years at Wilberforce University. So when I went into the army they
    recognized the fact that I had previous military training. So I was chosen as one of the captains for training of tankers
    of the ARTC Armed Forces Basic Training Center at Fort Knox, Kentucky. And I stayed there almost four years, training
    men for the Tank Battalion, some 84th and some the 64th of the Tank Battalion.
- speaker: Interviewer
  text: What did it feel like? Like what was your boot camp training and stuff like that like?
- speaker: Respondent
  text: Well, it was just physical training, physical fitness, the use of small arms, the...first we had the Enfield rifle,
    and then the N-l, then the carbine, then from there we went into a tank, 37 mm tank. A battalion with the light tanks,
    not breathing, concentrating, orientation and the general arms for the soldiers, how to use them, and how to assemble
    and how to disassemble and what to do in case of a malfunction, how to find the malfunction part. Sometimes you're blindfolded,
    because you never know where you're going to be when the weapon malfunctions, and that may not be in the light So you
    have to feel and that's how we taught them how to get their weapons back into operation.
- speaker: Interviewer
  text: Do you remember any of you instructors?
- speaker: Respondent
  text: Uh, no I don't. But I guess__________________.
- speaker: Interviewer
  text: Where did you go when you were first drafted?
- speaker: Respondent
  text: Fort Knox, Kentucky, I went down about 8 o'clock in the morning to the draft board in Springfield, Ohio, and by 2
    o'clock late afternoon I was up in Columbus, Port Columbus, at 4 o'clock I was at Fort Knox, Kentucky. Yes, just like
    that.
- speaker: Interviewer
  text: What were your job assignments?
- speaker: Respondent
  text: After Basic Training?
- speaker: Respondent
  text: Well, I was assumed as a part of the, the academy for the Armed Forces Replacement Training Center to train tankers..
    my training of tankers, and well the use of weapons, tanks, jeeps, trucks, weapons carrier, and all the vehicles that
    the army used to transport and to use in combat with soldiers.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Interviewer
  text: Were there many casualties in your unit?
- speaker: Respondent
  text: No, not in the unit that I was. Because we were in the truck unit, and we transported troops, ammunition, food, clothing,
    supplies to the troops on the front lines.
- speaker: Interviewer
  text: What's your most memorable experience?
- speaker: Respondent
  text: Well, the most memorable experience was the Battle of the Bulge. We had taken a contingent of the English soldiers
    up to the Normandy, to relieve the Americans. And right there the Germans broke through the American lines. And this truck
    company, which was about 50 some trucks, were trapped by Germany. So one afternoon the company commander came down and
    said, "We go to lay down a barrage tomorrow morning at 4 o'clock, and as soon as that last gun is fired you get the hell
    out of here with those trucks." Because we were not combat soldiers. So they laid down this barrage and coming up out
    of Normandy you come up and make a right turn, and right at that turn, where you make a right turn the Germans had zeroed
    in on that crew. And the first truck went up and got backed up. So we pushed it out of the way, and the rest of the trucks
    just kept going. And they got the German machine gun; which that was the one that zeroed in on the crew. And we drove
    back to where we were, and we started buzzing and after we stopped buzzing they place a rifle in your slot right next
    to you. And there was a bullet, a bullet in my rifle the wooden part. Right in my side here. So when I got to the back
    to the company I said, "Well, it's time to celebrate because I'm still a live." So I grabbed a bottle of Schnapps, drank
    it, and I was out for about three or four days.
- speaker: Respondent
  text: Schnapps, that's German.
- speaker: Interviewer
  text: German Whiskey?
- speaker: Respondent
  text: German Whiskey, yeah.
- speaker: Interviewer
  text: Did you receive any metals or citations?
- speaker: Respondent
  text: Well, one of the medals the German the Battle of the Bulge, the UPT of the American Army. Also, is the campaign are
    the three I actually received.
- speaker: Interviewer
  text: How did you stay in touch with your family?
- speaker: Respondent
  text: I didn't, because there was no way to communicate, because you're always on the move and you couldn't communicate
    or have any correspondences with your family or anything, because you move from one place to another. You never knew where
    you would be the next day, or the next hour, and that's how it was. So when I was overseas, I was by an uncle when I went
    overseas. My mom died in 1924 and then I came out '25, my uncle was enrolled the same day. So that was a sight to me and
    I will never forget that.
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: Spam, Spam, Spam, and more Spam. But we had C-rations and D-rations, and as I said everything had Spam with it. So
    everything we ate had some Spam in it, but the D-rations were cheese, crackers, soup, that's just stuff that you drank,
    and that's all we had.
- speaker: Interviewer
  text: Did you have coffee or did you have hot chocolate?
- speaker: Respondent
  text: No, never had a lot of...Yeah, I like coffee. Coffee's good. I do like it.
- speaker: Interviewer
  text: Did you have plenty of supplies?
- speaker: Respondent
  text: Oh, yes because we haul supplies, gasoline, food, clothing, stuff ammunition and whenever we got a shipment of clothing
    or food or something like that, we would always have first choice. So that wasn't a problem.
- speaker: Interviewer
  text: Was there a lot of pressure or stress with what you did?
- speaker: Respondent
  text: Yes, oh yeah, because when we would go to transport supplies, you would depend upon the truck in front of you at night.
    And the only thing you could see was a little light just about that size, and then you follow that truck in front of you
    by the lights. Now, if you get off course from the lights, I mean, you're lost and that was consequential because the
    drivers would have to keep their attention centered on both lights. And somebody missed the light, and all the trucks
    behind them were lost because usually all the trucks behind the guy that went the wrong way, they were followin' right
    behind him and went the wrong way. And that was a scary experience because we were in a combat zone, and you didn't know
    where the Germans were. So we always instructed the guys to just keep those lights in their sight. And that was a difficult
    problem because at night if you miss the light in front you, you don't know where you're going.
- speaker: Interviewer
  text: Did you carry anything special for good luck?
- speaker: Respondent
  text: Just me! That's the best luck I had, was what I learned from the training sessions. How to take care of myself and
    how to take care of the weapons, and how to work a compass and maps that type of thing, read the compass and the maps
    was the best thing that I learned in the service, because when we landed on Cherbourg Beach, the company commander was
    the only one that had a compass. And instead of going east he started out northeast. And I saw a sign that said Saint
    L6 which was to the south. I said, "Man, you're going the wrong direction!" He said, "Nah, I'm the company commander,
    I know where I'm going." "Nah, you give me that compass." So I took the compass and reoriented the map and we went back
    to where we started out, and then started going east, and which was the way that we were going into Belgium. And we got
    there safe. Thank goodness I learned how to read that compass. Right in German land and guess who's goin' northeast?
- speaker: Interviewer
  text: What did you do for entertainment?
- speaker: Respondent
  text: Keep the guys from tearing up the town. That's a primary example, because the guys would go and they'd drink a few
    beers and they'd get rowdy. And they'd tear up the beer place, and after that, it's all over, you know, you got to pay
    for it. So when they would receive their check the next month, we'd take out ten Francs from each person and pay for the
    damage. That's primarily what my entertainment was. Keep the fellows from tearin' up the beer place.
- speaker: Interviewer
  text: What did you do when you went on leave?
- speaker: Respondent
  text: When I went where?
- speaker: Respondent
  text: What leave? The only leave you had was when you finished your days work. And going and going to sleep and wake up
    the next morning at five o'clock. And you didn't have any leave. You just continually...
- speaker: Interviewer
  text: So once you got overseas it was just one continuous effort, there were no breaks?
- speaker: Respondent
  text: No, no, no.
- speaker: Interviewer
  text: It was just a job everyday?
- speaker: Respondent
  text: Everyday there's a job. And one for about two weeks, we were stationed outside of Paris. And that was a great time,
    because I got to see the Louvre, the Garden of the Tuileries, Louis the XIV's castle, all of the historical places that
    I had been reading about. That was really wonderful. That was two weeks out of the six to eight months that I spent overseas
    that I enjoyed.
- speaker: Interviewer
  text: Where did you travel while you were in service?
- speaker: Respondent
  text: We went to the castle of Louis the XIV which is outside of Paris, Saint L6 the Fontainbleu, the Eiffel Tower, we had
    the opportunity to tour this. The Louvre, went to the Louvre and the walls were just like this. No paintings or anything
    on the walls. All the paintings were gone, but at least I got to see the Louvre, and the Cathedral of Notre Dame, which
    I visited after the war, and the other cathedral in the city. The bridges across the river in Paris, France, that's an
    experience. Our boats would go underneath them and you could see the bridges on top of you. That's really an experience,
    that's a something I've never been able to experience before.
- speaker: Interviewer
  text: Were there any humorous or unusual things that happened?
- speaker: Respondent
  text: Oh yes, after the war was over, in Germany, everybody was celebrating. And this one soldier had this carbine out,
    and I was layin' on a cot in a tent. And he was firin' that carbine... BOOM, BOOM, BOOM, BOOM, BOOM, bullets were ricocheting
    ZOOM, ZOOM, ZOOM. And I was lying there thinking, "I've gone through four years of this? And here this nut is gonna kill
    me celebrating?" So I woke up and I said, "Hey, what are you doing?" He said, "I'm celebrating the end of the war." And
    I said, "No, you're not gonna celebrate anymore, because you gonna dig a six-by-six." That's a big truck hole, "And you're
    gonna drive that truck in that hole, and then you're gonna drive it out again. Start diggin'." That was the closest I
    got to being a casualty in the war.
- speaker: Interviewer
  text: What did you think of the other officers or soldiers that you were with?
- speaker: Respondent
  text: They were real, real great. They looked after each other. I mean just like sisters and brothers. Just like brothers
    as I said, because if one person would get into a situation that he couldn't get out of, he always had some help. That
    was a great thing, because you were never alone, because somebody's always watching out for you.
- speaker: Interviewer
  text: Did you see or experience any discrimination in the service?
- speaker: Respondent
  text: Oh yes, because at the time I went in service a black person couldn't go into any place comfortably. While I was at
    Fort Knox we could not go into Louisville until we kind of broke it up, because the southern, who are the Kentucky, get
    dressed on Saturday and Friday night. Go on into town, leave us out there on our posts. So one time we said, "We gonna
    stop this." So what we did, we got dressed and gone down on the post on to Louisville. So we locked his door, locked him
    in there. And we'd go up by the door and he stayed there a whole weekend. So the next weekend they started giving us passes,
    because they couldn't keep us from that post there. And everybody going into town and we on the post and they____________.
    But it was all discrimination.
- speaker: Interviewer
  text: How about your, how about your training with replicas and no ammunition?
- speaker: Respondent
  text: The black soldiers did not get ammunition, no ammunition. You got to fire in the range and they say, "Ready...Aim...FIRE!"
    And you go "click, click, click, click". Not a sound. No ammunition. And it wasn't until about 1943, the year '43 or something
    like that they began to issue ammunition to the black soldiers at Fort Knox, Kentucky. And it was scary.
- speaker: Interviewer
  text: Did you keep any sort of personal diary while you were overseas?
- speaker: Respondent
  text: No, I didn't keep a personal diary, I lived my life. I didn't have time to write.
- speaker: Interviewer
  text: What are your recollections of the day your service ended?
- speaker: Respondent
  text: As I said, when I when the service ended October 25th, 1945, I came to Springfield, and they were burying my uncle
    as I walked in the door. That was a very sad experience, and the only thing I could do was just get out and walk, and
    think.
- speaker: Interviewer
  text: What did you do in the days and weeks after service ended?
- speaker: Respondent
  text: Sleep. I was just tired of everything I guess. I would get up in the morning and wash up and sleep all night. I did
    that for about a week.
- speaker: Interviewer
  text: Did you go back to work or to school, anything like that?
- speaker: Respondent
  text: Yes, after service I went to work at the U.S.A. Post Office, because I had taken an exam at Clark County before I
    went in. And I passed it. So when I came out of the Army I went down to get a job at the Post Office. And the Post Master
    at that time said, "You took the exam, you passed the exam and everything?" I said, "Yes I did, at Clark County." So he
    said, "Okay, you're gonna go with me." So he took me around to all the old guys who had worked at the Post Office for
    years. Mr. Keller, Kellerman, Green, Jackson, and they've been carrying mail here for the past fifteen years. And they
    were still carrying mail and they're gonna carry mail until they retire. And I said, "Well, what about clerk carriers?"
    There were no clerk-black clerk carriers, no carriers. I mean no clerks at the post office. And he said, "Well," he said,
