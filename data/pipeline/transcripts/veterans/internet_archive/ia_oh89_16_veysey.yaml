collection: internet_archive
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Mr. Veysey, I noticed that you were born in Eagle Rock in 1915. How did your family happen to be there?
- speaker: Respondent
  text: Only a few people of that era claim the distinction of being born in Eagle Rock, but it did happen. The circumstances
    were, roughly, that my father and mother relocated to southern California in 1910. Thereafter, they bought a piece of
    ground in Eagle Rock, which consisted of a hilltop, and they built a very nice home on that hilltop, overlooking the entire
    valley. I was born in that house.
- speaker: Interviewer
  text: Oh, you were actually born in the house. You didn't go to Glendale, to the hospital.
- speaker: Respondent
  text: No. Glendale was our closest supply point, but I was born in the house.
- speaker: Interviewer
  text: What was your father doing here?
- speaker: Respondent
  text: My father, in one sense, was retired. He had had a very successful general merchandise chain of stores in the Pacific
    northwest. Up in the timber country. That would be the towns of Aberdeen, Hoquiam, Montesano, Elma in the state of Washington,
    and maybe one or two other places where he and his brothers had done business as Veysey Brothers. They supplied everything
    that went to people who worked in the log
