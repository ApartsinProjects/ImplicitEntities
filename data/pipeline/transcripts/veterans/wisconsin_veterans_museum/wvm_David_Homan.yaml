collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: I suppose we should start from the top as they say and have you tell me a little bit about where you were born and
    raised and what you were doing prior to your entry into the Navy.
- speaker: Respondent
  text: Well, I was born and raised in Racine. I was pretty much a high school student. I got extremely bored with school
    so I quit high school and I had a job in a machine shop. And it was turning into a lifelong type job, and just before
    I was eighteen I thought, "Man, there's got to be something to this." The Navy had always been kind of a boyhood dream
    but when I got into my later teen years the war was just ended officially type thing, you know, in the news, and I started
    watching these guys that were in their forties that I worked with doing exactly the same thing that I was doing and I
    said, "I'm out of here. This is it. I'm going to go back to my boyhood dream and join the Navy and see what happens."
    So that's what I did.
- speaker: Interviewer
  text: I was going to ask you, what attracted you to the Navy? Perhaps we can expand upon this a little. It was a boyhood
    dream?
- speaker: Respondent
  text: Well, my grandfather on my mother's side was a Navy veteran in the First World War and he always had some fairly interesting
    stories that he would, you know, let me know when I was a little kid. And my father was a Navy veteran and one of our,
    well, a bunch of our neighbors were Navy veterans and I always just seemed fascinated by it. And of course growing up
    near Lake Michigan and the family always had boats, either my parents or my aunts and uncles, so I grew up on the water
    and it kind of all just fell together. But I mean I wanted to go in the Navy from the time I was probably five years old.
- speaker: Interviewer
  text: Your father was in World War II?
- speaker: Respondent
  text: No, he was a Korea vet.
- speaker: Interviewer
  text: Korean War. Was he actually in the conflict or was just in the Navy at the time?
- speaker: Respondent
  text: No, he was just in the Navy during it. He went in the Navy to stay out of Korea. Those were his words.
- speaker: Interviewer
  text: Now, as you also mentioned, the Vietnam War was winding down at this time. In many circles in American society there
    was kind of a distaste for things military. I'm interested in your -- in how that may or may not have impacted on your
    thinking in terms of joining the Navy itself.
- speaker: Respondent
  text: Well, when I got into my high school years, and even ninth grade, I had friends or friends with older brothers that
    were, you know, getting drafted or going in the Navy or the Air Force to stay out of Vietnam and a lot of these guys went
    over there. We saw the war on television every night with Walter Cronkite and Dan Rather and it was kind of just an everyday
    occurrence. It had no significant impact. I was impressed, you know, by a lot of what they did and the images you saw
    on television and stuff but I understood absolutely none of it. I guess I got kind of nervous because after some of the
    people that I knew came back they'd been changed by their experiences over there.
- speaker: Interviewer
  text: What did you notice?
- speaker: Respondent
  text: They were more within themselves, they weren't as outgoing or social as they used to be, a lot of them were big drinkers
    or big drug abusers. It almost seemed like they were in a way, now thinking about it in retrospect, running from something.
    Well, I didn't understand any of this back then. You know, I just thought, "Boy, he's weird," you know. "What happened?
    He got weird." And then people would say, "Well, he went to war." "Well, he's not at war no more, you know. He came back.
    It's over with, you know." So it was never really a real or personal type thing with me. It was an abstract. It was something
    that happened on television or to other people. Well, then as I got closer to being of draft age it started changing my
    opinion a little bit. And I guess I got kind of hesitant, you know, chasing girls and drinking beer and my job as a machinist
    and just a lot of things going on. I kind of put it out of my mind for a while. But then once I hit the rut, you know.
    School, I got absolutely nothing from high school. I still think one of the smartest moves I ever made in my life was
    quitting high school, believe it or not. I was in this rut and I was in the same rut that guys that I worked with who
    were in their forties were in and I thought, "Nope." So I went back to my boyhood dream and thought, "Well, the war's
    over, I don't have to worry about getting killed." So I went down and I joined the Navy with a couple of guys that I went
    to school with and after boot camp and A school the first place I went was Vietnam. Then it became very real.
- speaker: Interviewer
  text: I bet. I want to talk about boot camp first.
- speaker: Interviewer
  text: We'll get to that. Uhm, why don't you describe your entry into the military. I remember very clearly getting on the
    airplane and going down to Texas and getting yelled at and the whole business. I remember very clearly going into the
    service. Do you recall going to basic training?
- speaker: Interviewer
  text: What sort of training did you have?
- speaker: Respondent
  text: Well, I guess in my own way I expected, you know, the old fat chief standing, waiting for us to get off the bus, screaming
    and hollering and, you know, like you see in the war movies and all this kind of stuff. Didn't happen with us. Wasn't
    even close. We went to Milwaukee from Racine. We stayed at the Marc Plaza Hotel and the entire eighth floor was reserved
    for people who were going into various branches of the service. It was one big, wild party. There was a woman there who
    was going into the Army and she was pretty drunk and her whole goal at the time was to "screw everybody that goes in the
    service tomorrow" and there was actually a line of about thirty guys outside her hotel room and she was doing them as
    fast as they could move through the door. They got kicked out. We had a big liquor party up in our room. We got kicked
    out of the hotel. So we wandered the streets of Milwaukee until six o'clock in the morning which was when we had to go
    over to the AFEE Station which was like a block or two away from the Marc Plaza. So we went in and filled out forms and,
    you know, the doctors looked us over and I think probably the two most memorable things I remember about the AFEE Station
    were we went into this big, empty room and there was probably 300 guys and there was little footprints painted on the
    floor facing the wall. So the idea was you stand on the footprints, and you had a number, and a little shipping tag on
    your shirt, and you dropped your drawers, and you bent over for the doc to give you the "fantastic finger wave." Well,
    I was like the second guy done and when I turned around all I saw was a maze of male asses and I was kind of, "Oh, man,
    get me out of here," and I was disgusted by the whole thing and I think that's why I can still see it like it happened
    yesterday. I went in the Navy with a guy by the name of Ron Lipke and another guy by the name of Jerry Jensen. Ron still
    lives in Wisconsin. Jerry's out in Seattle; he's a policeman in Bremerton or Seattle area. Haven't seen either one of
    them in many years. And we were all going to go to Orlando, Florida on the buddy plan because we figured anyplace where
    they're going to lock women up for two or three months, and they're going to lock men up for two or three months, it's
    got to be a pretty wild time when they let you all out on that Friday night. So that's why we picked Orlando, Florida.
    Well, as we got through all this induction processing at the AFEE Station that afternoon we were called into a room and
    there was a Navy lieutenant there and he was, you know, typical young guy and he was conducting an interview of some sort
    and I think it had to do with classification or whatever; I don't remember. I was awestruck by all this, you know, this
    was the military, you know, this is big, this is like the monolith itself, you know. And he looked at me and said, "You're
    going to Great Lakes." And I said, "I'm not going to Great Lakes. I'm going to Orlando, Florida." And he said, "Well,
    we've got a hepatitis outbreak in Orlando, Florida so we can't send anybody else there so you're going to Great Lakes."
    And I said, "Well, what about San Diego?" "We have a meningitis outbreak in San Diego." I had never heard of either of
    the two of them before in my life and I said, "I'm not going to Great Lakes." and he looked me dead square in the eyes
    and he said, "Boy, you're going to Great Lakes or I'm going to call the FBI and tell them you're a deserter and you could
    be shot for refusing to go to Great Lakes." And I looked at that and I thought I don't believe this, you know, so I basically
    signed the paperwork and out the door I went. And later on that afternoon or evening we all got on a bus to go to Great
    Lakes. When we got on the bus we drove through Racine. We went through, down the very street I used to hang out on and
    there were all my buddies thinking we were flying down to Florida and they're all wined up on Main Street, downtown, parked
    with their cars and drinking beer and just hanging out and we drive by on this bus and it was like really rubbing salt
    in the wound, you know, and we had the jitters about what do I do next, you know, "Did I make a big mistake?" All this.
    Well, we went down to Waukegan which is only about a half hour drive from Racine, pulled in by the base, nobody was there,
    and it's probably nine o'clock at night I guess and we looked at the bus driver and said, "What do we do?" And he said,
    "Well, if you walk down to the building over there somebody will tell you where you've got to go and what you've got to
    do." So we walked into a building and there was an officer in there and she said, "Oh, go here and walk this way and somebody
    will pick you up." And here I'd been expecting, you know, this screaming and hollering, "Get off the bus you scum bag,"
    you know, this kind of stuff. Didn't happen. Well, we got to this building and there was a tunnel that went under the
    highway from the main side of the base to the RTC side of the base. That's where they finally starting getting military
    with us and they went though their contraband list. I couldn't believe all the dirty magazines and the dope people threw
    down on the ground when these guys started to take us in and form us up as a company and actually try to walk us as a
    unit from where we were.
- speaker: Interviewer
  text: Was this kind of like an amnesty thing? Get rid of it now, no questions asked.
- speaker: Respondent
  text: Yup. No questions asked, right here. Anything you get rid of we'll forget about it.
