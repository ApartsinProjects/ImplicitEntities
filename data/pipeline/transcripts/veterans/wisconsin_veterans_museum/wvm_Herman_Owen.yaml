collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Perhaps, Mr. Owen, you could tell me where you were born and raised. You were born and raised in Rice Lake?
- speaker: Respondent
  text: I was born in Colfax, Wisconsin.
- speaker: Interviewer
  text: Where's that?
- speaker: Respondent
  text: Fifty miles of south and west a little bit.
- speaker: Interviewer
  text: Perhaps you could describe your upbringing a little bit. Were you raised on a farm? In town?
- speaker: Respondent
  text: Well, I was born in Colfax December 26, 1916 and we moved to Rice Lake in 1924 and we lived in town from about November
    '24 until April of '25 and then we went out on a farm.
- speaker: Interviewer
  text: So, during the Depression you were living on a farm. Did the Depression strike your family particularly hard? Was
    it a difficult time for you?
- speaker: Respondent
  text: Well, we farmed from 1925 until 1936. That's the year I graduated from high school.
- speaker: Interviewer
  text: What did you do after you graduated?
- speaker: Respondent
  text: I drove truck and cut wood, a little of everything.
- speaker: Interviewer
  text: When did you join the National Guard?
- speaker: Respondent
  text: October 6, 1940 and we were inducted into federal service October 15, 1940.
- speaker: Interviewer
  text: That's when you first joined? You didn't join earlier and go to training once a month or something?
- speaker: Respondent
  text: Yah. You're right.
- speaker: Interviewer
  text: You went down to Camp Livingston then?
- speaker: Respondent
  text: We went to Camp Beauregard, Louisiana.
- speaker: Interviewer
  text: I assume that was the first time you had been down south?
- speaker: Interviewer
  text: Could you describe your trip down there and what it was like at Camp Beauregard?
- speaker: Respondent
  text: We got to Beauregard it was raining, pouring down and I helped one of the cooks, we fried some bacon and eggs for
    supper. By the time we got done, they had as much water in them as they did bacon and eggs, I guess. We had to set up
    our own tents.
- speaker: Interviewer
  text: This was before Pearl Harbor of course, and you were doing military training at the time. As I understand it, the
    war production hadn't really picked up yet. I wonder if you could comment on some of the equipment that you used during
    training. Did you have adequate equipment do you think or did you have like antique equipment?
- speaker: Respondent
  text: We had 30 caliber machine guns, the old _____ rifles and Warners of course.
- speaker: Interviewer
  text: If you compared that equipment to the things that you used while you were actually in combat, how would you rate that
    equipment?
- speaker: Respondent
  text: We was ill equipped for that too [combat]. I had a Browning automatic and I learned how to take that apart and put
    it back together up there in New Guinea. I shot at 1000 range I guess. I remember back in 1939 I was in Menominee visiting
    an uncle when Germany invaded Poland.
- speaker: Interviewer
  text: Do you recall your reaction at the time?
- speaker: Respondent
  text: I didn't really, you know, think too much of getting into war then. We had moved to Camp Livingston when the attack
    came on Pearl Harbor. When we went down to camp, we was supposed to stay there one year and then they changed it indefinitely,
    of course.
- speaker: Interviewer
  text: After Pearl Harbor did your training change at all? Were things taken more seriously? Or were you pretty much prepared
    for a wartime situation before Pearl Harbor?
- speaker: Respondent
  text: We had the news and trained but we never had too much jungle training.
- speaker: Interviewer
  text: I suppose there is no jungle in Louisiana. When you were down in Louisiana did you get off the post much and into
    the towns?
- speaker: Respondent
  text: Not too much. We did now and then but we'd only get $21 a month and that was raised to $30. We went into town a few
    times, but not too many.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: Have a few drinks with the boys and spent most of our time in camp.
- speaker: Interviewer
  text: When did you get your first orders to go overseas?
- speaker: Respondent
  text: Well, we left Camp Livingston and went to Fort Devins, Massachusetts, and we was there about five or six weeks and
    then we got orders to go to Fort Ord, California and that was in April of 1942. When we got to Fort Ord, I remember a
    sergeant says, "Infantry?" I says, "Yah." He says, "You won't be here a week." And we were only there about four or five
    days.
- speaker: Interviewer
  text: Then you were off to the South Pacific?
- speaker: Respondent
  text: Yah. We left from San Francisco on April 22, 1942 and we landed in Fort Adelaide on May 14, 1942.
- speaker: Interviewer
  text: That's a very long trip.
- speaker: Respondent
  text: Well, we went over on the U.S.S. Monterey, my group was anyways.
- speaker: Interviewer
  text: What was the ship like?
- speaker: Respondent
  text: It was a good size ship, we had a load of freight and I don't know how many troops. If we had run into a battleship
    we were sitting ducks.
- speaker: Interviewer
  text: Did people get seasick?
- speaker: Respondent
  text: No, I didn't but many of them did.
- speaker: Interviewer
  text: I bet. Lot of Wisconsin boys on that ship didn't get on the water too much.
- speaker: Respondent
  text: Most of us were either from Michigan or Wisconsin. I never did get seasick either way but we had a lot of them that
    did. They really got sick.
- speaker: Interviewer
  text: So then you landed in Australia?
- speaker: Respondent
  text: We landed in Adelaide, Australia.
- speaker: Interviewer
  text: What was Australia like when you got there?
- speaker: Respondent
  text: It was a nice country. The Australians were very friendly people. Of course, we went out to Camp Woodside and I only
    got into Adelaide a couple of times. Once was for a parade and once I and a couple other guys went in. Taxicabs were driven
    by charcoal burners at that time you know. We did get some judo practice there and stuff.
- speaker: Interviewer
  text: Was that part of your military training or was that something that you did on your own?
- speaker: Respondent
  text: That was part of our military training. We didn't get too much of that but instructed on what the jobs were like and
    had quite a little rain and wet weather while we were there.
- speaker: Interviewer
  text: This base where you trained in Australia, where exactly is that in Australia. Do you remember?
- speaker: Interviewer
  text: Is that in the northern part of Australia?
- speaker: Respondent
  text: It's about thirty miles from Adelaide.
- speaker: Interviewer
  text: Perhaps you could describe to me what it was like to go to New Guinea and the first combat experience of the 32nd
    Division.
- speaker: Respondent
  text: We went to Camp Table out of Brisbane and I was on the docks there and I thought the convoy must have got lost because
    there's nothing but woods and there I seen the signs D Company, M Company and so forth, so we actually, we just out in
    the middle of the woods - we built the camp after we got there, most of it. There was more training there every day and
    when we, while I was a truck driver all the time up until we got to New Guinea we didn't take our trucks of course, and
    they decided that they had to have a Browning automatic man for every other squad so I was given a Browning automatic.
    MacArthur came out and we got ready and we got out of there within about two days.
- speaker: Interviewer
  text: Did you see MacArthur yourself?
- speaker: Respondent
  text: And our outfit, we flew into Port Moresby. About seven miles out they had an airstrip there. As soon as we landed
    I was looking over them God forsaken jungles and I thought, "Let the Japs have em!" That night they bombed the Air Corps
    and we were just far enough away that we just got shook up a little bit, not any direct bombing right on us.
- speaker: Interviewer
  text: In Port Moresby. How long did you stay there before you went north?
- speaker: Respondent
  text: I don't just remember. Probably three or four days when we started moving out. We flew part of the way and marched
    part of the way. We had the coastal part of it, the 128. The 126 left; they went right over the old _________________
    it took them 42 days and they were really beat up when they got there. Some of the troops came up by ship and they got
    there after we did too. Our first contact with the se loser Japs they leveled an ______________ right down through the
    __________ ___. If they would have known that they only had one regiment in there they could have annihilated us but they
    didn't know that. Their intelligence was guessing at 1500-2500 troops and they were going to be in __________ in about
    three or four days. Of course our communications was bad, so they had these little _________ luggers they called them
    to bring up our supplies. They could get in fairly close to shore and we had to go, with the help of natives, and unload.
    I know one of them was loaded with hospital supplies and ammunition and the Japs bombed them so we were low on ammunition
    to begin with. We really went into action I would say in November when it really started getting rough then. Then I was
    hit November 20, 1942. From there I was transported back to Port Moresby and I was there three or four days.
- speaker: Interviewer
  text: Then what happened?
- speaker: Respondent
  text: They just had emergency treatment there and then I was shipped to the 13th station hospital at Townsville.
- speaker: Interviewer
  text: Back in Australia?
- speaker: Respondent
  text: Back in Australia.
- speaker: Interviewer
  text: Where you were hit? On the arm? Legs?
- speaker: Interviewer
  text: Where did you get injured?
- speaker: Respondent
  text: I got in my thigh. __________ bones on each side of my leg and shrapnel, pieces under my skin in my stomach.
- speaker: Interviewer
  text: In the jungle, I would imagine that you would have a problem with infections and those sorts of things. Did you get
    any infections?
- speaker: Respondent
  text: Well, I did run high fevers, but they never found out. They just called it fever __________ __________ and from the
    13th station hospital I was shipped to the 105th general hospital at __________ , Australia. It might have been an agricultural
    school or something before it was made into a makeshift hospital. There I had surgery and from there we went by hospital
    ship went down to 118th general hospital in Sidney, Australia and there we had the whole 5th floor of Prince Albert's
    Hospital.
- speaker: Interviewer
  text: Did you ever hook up with your unit again, or were you sent back to the States.
- speaker: Respondent
  text: No, I wasn't sent back again, at the 118th Hospital they decided to send me home for discharge. So I got into __________
    General Hospital on the 29th of May, 1943 and I was there about three or four days and was sent to the O'Reilly General
    Hospital at Springfield, Missouri and when I had all the maximum hospitalization they could do for me there, they discharged
    me on August 24, 1943.
- speaker: Interviewer
  text: I see. By this time were you able to walk again? How would you characterize your recovery up to that point? It sounds
    to me like you were in the hospital a long time. Your wounds must have been rather severe.
- speaker: Respondent
  text: Well, when I got home I weighed 115 pounds. I was using two canes to get around. When I got home I had to sign up
    for the draft because I went in before the draft. When I came down to the draft office you could hear a pin drop. So I
    said to the girl, "Why is everybody so quiet?" She said,
- speaker: Interviewer
  text: That was in Rice Lake?
- speaker: Respondent
  text: That was the draft office which was in Barron. But I was in Rice Lake.
- speaker: Interviewer
  text: I've got a couple more questions about New Guinea and then I want to get on to some post-war experiences of yours.
    The first thing I was wondering was did you see many of the New Guinea natives while you were there? Did you have much
    contact with them?
- speaker: Respondent
  text: Oh yah, litter bearers were natives. They carried me out. After they got me, while I had a medic from Indiana who
    first treated me and then a doctor of German descent and the natives carried us back until we got to one of these posts
    and we had to travel by night and I was with them until we got to a makeshift airstrip and I was flew from there into
    Port Moresby. The natives were a big help up there.
- speaker: Interviewer
  text: It's my assumption that they got along well with the Americans? Did they speak English by some chance?
- speaker: Interviewer
  text: Did they speak English?
- speaker: Respondent
  text: No. A few of them did, most of them talk a kind of pig Latin. They were very considerate. When they was carrying me
    they had to lay me down and one of them found some palm leaves that kept the sun off my face. They made very good litter
    carriers.
- speaker: Interviewer
  text: The second thing I wanted to ask you about New Guinea, what did you think and feel while you were actually in combat?
    I assume you would have been scared?
- speaker: Respondent
  text: Actually, when I got hit I just figured, well, you did everything kind of spontaneously I guess. I turned around to
    this sergeant and I said, "I'm going to try to make it to this next tree up here," and I got about half way up there and
    I got right in the middle of a mortar barrage and that's the last
