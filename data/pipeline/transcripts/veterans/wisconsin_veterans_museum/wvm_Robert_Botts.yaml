collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Why don't we start by having you tell me a little bit about where you were born and raised and what you were doing
    prior to the attack on Pearl Harbor. Or let me rephrase that. You went a little earlier, at the most. What were you doing
    prior to your entry into the military?
- speaker: Respondent
  text: Well, I was born and raised down in west-central Illinois, and my families were farmers down there, and after I graduated
    from high school, this is right after the depression, you couldn't even buy a job anywhere, and I went up to work for
    my uncle up in the Black Hills in Rapid City, South Dakota. And one evening, a Marine Corps recruiter come along and stayed
    there, and we chatted there, and I rode with him for three days back to Minneapolis, Minnesota, and they wouldn't let
    me in the Marine Corps then because I had tonsils, had to go home and get them taken out. They weren't just taking everybody
    then. And then in September of that year, why, I and a friend of mine went down to St. Louis, and out of nine people that
    were being interviewed, tested to join the Marine Corps, only three of us made it. They were even kicking them out for
    being color-blind at that time. That was in September 1940.
- speaker: Interviewer
  text: So your desire to join the Marine Corps, do you think it was more based on economics, or was it-- France had fallen
    by this time?
- speaker: Respondent
  text: It was more economics.
- speaker: Interviewer
  text: Had you considered the fact that a war may be coming?
- speaker: Respondent
  text: Never even thought about it. I joined the Marine Corps to go to China, but never did make it. [Laughs]
- speaker: Interviewer
  text: Now, so you discussed how selective they were. Why don't you just walk me through your induction process. You had
    to go for a physical somewhere and then take - -
- speaker: Respondent
  text: I went to St. Louis to the recruit depot down there and went through physicals, and then they sent us home and we
    had to go back in about 10 days, and the Marine Corps has always sent their people on Pullman cars, and one is a regular
    chair car train. Went through boot camp at San Diego, which is quite strenuous. You're issued two pair of shoes when you
    go in there, and they take very great pains in fitting their shoes, and in fact, you step up on a platform and you picked
    up a 50-pound weight in each hand and the doctor checked to see whether the shoes fit. But anyhow, I go to get my first
    pair of shoes half soled in two weeks, so you know how much we walk there. After boot camp, I was stationed at the Naval
    Air Station in San Diego, North Island. That's where all the carriers, Enterprise, Lexington, all those carriers come
    in. There was only a car detachment over there. And when they bombed Pearl Harbor, I was on guard duty at the Naval Air
    Station at the entrance to the harbor in the guard tower, and I thought the sergeant guard was just kidding, so I said,
    "Yeah, sarge, what you been drinking," and hung up, and he called me and said, "Oh, we're doubling the guards, they did
    bomb Pearl Harbor." And to back up just a little bit, I was on a consignment group of seven people to go to Pearl Harbor
    10 days before that happened. I and one of the other people were pulled off on the other roster for reasons I don't--well,
    we went to another unit. But three of those five people that went over there were killed in Pearl Harbor in that bombing.
    So after Pearl Harbor, then let's see, they pulled us out of the Naval Air Station. Then we went out to Camp Elliot and
    we started the Ninth Marine Regiment, which is a combat unit, infantry combat unit. We got that pretty well going, then
    they split the NCOs [noncommissioned officers], and I had made corporal by then, and they sent a bunch of us to the West
    Coast--to the East Coast and we started the 29th Marine Regiment.
- speaker: Interviewer
  text: Is it Paris Island or something?
- speaker: Respondent
  text: No, that wasn't Paris Island. That was out of New River, North Carolina. That was a brand-new base that they just
    had opened out there for training facilities. They're still using them, by the way. And there was a bunch of us in a tent,
    trying to horse around, and I come charging out of the tent and I hit a first lieutenant and knocked him right flat on
    his back in the sand out there in the compound. Helped him up, and he said, "Sarge, would you like to join the tanks?"
    And I said, "Well, there's no way I can get out of here, I just got into the unit, just assigned to the unit." He said,
    "I have a letter from the commanding general of this station that I can take any personnel from this station to start
    the new tank unit." So I got into tank, and that's what we went overseas with as 11th Defense Battalion and Tank.
- speaker: Interviewer
  text: I want to backtrack a little bit to your training. You were in very, very early, before Pearl Harbor.
- speaker: Interviewer
  text: And there are stories, in the Army, anyway, about soldiers training with broomsticks because there weren't enough
    rifles and trucks, a big sign saying "tank" on it. In terms of the equipment and all that sort of thing, what sort of
    equipment did you have when you went in, and was there an improvement in terms of the quality and the quantity of it as
    time went on?
- speaker: Respondent
  text: We were all issued quick equipment--I mean, equipment. We were issued World War II 1903 Springfield 30.06 rifles,
    and we was assigned the rifle and that's what we kept. That's what I went overseas with, with that same rifle we were
    issued. That's what we used on the range. We knew how to shoot, but everybody had plenty of equipment. And we had, well,
    the old .45 pistols that we carried, but that was before the days of the grand rifle, before the days of the carbine,
    the .30 caliber carbine, and so we had the old bolt action rifle. That's what we were shipped overseas with.
- speaker: Interviewer
  text: Now, you had apparently traveled somewhat, around the Midwest anyway, but basic training, the military experience,
    sort of brings people together from all different parts of the country, California or New York or whatever. Was that your
    experience when you got into the military? And if so, if you can perhaps describe some of the diversity of the United
    States as you experienced it through the military.
- speaker: Respondent
  text: As part of personnel?
- speaker: Respondent
  text: Okay. Well, everybody that trained in San Diego was usually from the Mississippi River west, in that general category.
    I don't know where the exact dividing line was. And we had people from all over the West, the Midwest and the Far West,
    and in fact, there's still about 20 of us in the company that get together about every other year for a reunion. They
    are from Florida, California, Texas, Oregon, North Dakota, South Dakota, Minnesota, Wisconsin, Illinois. I mean, you get
    a pretty good cross section of the country. And one of my best friends was from Michigan, and he got killed in Guam. So
    it's not a group that comes from a very specific area. Now, the Army is different because, like, these units are formed
    basically, a lot of them are formed from a guard unit like here in Wisconsin, and they'll probably be off in Wisconsin
    or maybe Illinois or blend over into Minnesota or Michigan a little bit.
- speaker: Interviewer
  text: So when did you ship overseas?
- speaker: Respondent
  text: We left the day after Thanksgiving in 1942.
- speaker: Interviewer
  text: And where did you go to? Why don't you describe the voyage.
- speaker: Respondent
  text: Well, we were loaded onto a Dutch freighter, and they took the top two cargo holds and made troop quarters out of
    them, and there was four bunks high in each one and very little ventilation. The toilets were set up and they were rigged
    on a beam out over the side of the ship and you just dump it in the ocean as you used it. And we had no escort. We were
    all alone. We landed in Noumea, New Caledonia, on Christmas Eve. So we was out to sea for about a month.
- speaker: Interviewer
  text: That's a long time to be on a ship.
- speaker: Interviewer
  text: How did you occupy yourself?
- speaker: Respondent
  text: Oh, played cards, and that's the first place I heard Bing Crosby's "White Christmas." As we crossed the equator, somebody
    up in the crow's nest had a box of Ivory Flakes and playing the record, just throwing out Ivory Flakes for snowflakes.
- speaker: Interviewer
  text: Any seasickness? This is one of the stories --
- speaker: Respondent
  text: Oh, yes, a lot of them did. It didn't really bother me that much. But when you leave the West Coast, you get those
    big swells out for quite a few miles, and I tell you, there's a lot of guys--and there's nothing worse than seasickness.
- speaker: Interviewer
  text: So what's at New Caledonia then? Why don't you sort of describe what you do to prepare for combat, and where did you
    finally--
- speaker: Respondent
  text: Well, there, we get into New Caledonia, and we were going to stay there, but then there was one of the troop transports,
    Army, hit one of the mines in the harbor out there. I guess the skipper refused to take on a pilot. And all those people
    were there, and so we stayed aboard ship there for a couple of weeks, and they had us, for doing nothing, at least help.
    We was running boats and loading all the rest of the ships and stuff in there. And so shortly after that, then in a couple
    of weeks, then we just loaded up, we went up the Guadalcanal then.
- speaker: Interviewer
  text: Now, the battle had been going on for some time.
- speaker: Respondent
  text: In Guadalcanal?
- speaker: Interviewer
  text: So when you got there, what was the situation?
- speaker: Respondent
  text: Well, we got in there and we got involved in the cleanup there, you know, knocking out little pockets of stuff that
    was left, and just kind of a search-and-destroy type of a thing.
- speaker: Interviewer
  text: So there were still Japanese units in the hills and the jungle -
- speaker: Interviewer
  text: --and you said -
- speaker: Respondent
  text: Then we were head of defense battalion, and they were initially set up for coastal defense, and then those units was
    made up of the 155 rifles, that's long-range heavy artillery, and 90 millimeter antiaircraft batteries and 40 millimeters,
    and there was one tank company and a company of infantry, and then they put us over on the Florida Islands over there,
    and we were over there for, oh, I expect six months or better just as outpost duty, and there we lived right in--I had
    my tank platoon, and we were down in Lady Village there for about two months.
- speaker: Interviewer
  text: So do you recall the first time someone shot at you in anger?
- speaker: Respondent
  text: Well, in a tank, you don't know. You can hear them hit, you can see the fire, you can sense the fire.
- speaker: Interviewer
  text: I'm just interested in your personal or emotional reaction to such a traumatic event.
- speaker: Respondent
  text: Well, I suppose it would be something like if you are in a high school football game, just before the whistle blew,
    why, everybody was dancing, going on, but when things started, why, everybody settled back and you just took on your training,
    your pre-trained activities.
- speaker: Interviewer
  text: Do you think the training has a lot to do with coping with the situation?
- speaker: Respondent
  text: You bet, it sure does.
- speaker: Interviewer
  text: Do you think it helped you--
- speaker: Respondent
  text: Oh, yes. Where were we?
- speaker: Interviewer
  text: We were talking about getting shot at.
- speaker: Respondent
  text: Oh, okay. But then after everything starts, well, you just go back to your old training facilities. A good example
    of whether good training helps or not, after this thing started, you started getting replacements in to replace battle
    casualties and stuff like this, and it seemed like the replacements always took the brunt of the casualties. There's no
    rhyme or reason, as far as I'm concerned, why this happens unless you develop an instinct that you know when to duck and
    when to dodge or when not to and when to. We were all in the same situations, but it seemed like always the new people
    become on, that's when they would hear a shell go over, they would jump, and there's no use--after you heard that one,
    said, "That's the one that won't bother you anymore because it's gone." It's the ones that you don't hear that does the
    damage.
- speaker: Interviewer
  text: Yes, you were essentially just sort of hopping through the islands.
- speaker: Interviewer
  text: I look at this list of campaigns you were involved in. Florida Island, New Gorge, Libby, Guam, Okinawa.
- speaker: Respondent
  text: Well, in the early stages of the war, when we first got over there, we had the only tanks in the Pacific, so we worked
    with all the Marine units, all the Army units in our area. So when somebody got in a bind, and we'd have to go break it
    up. So I don't know, almost three years I spent over there, I spent a better part of eight months aboard ship, just going
    back and forth between spots, and then we took our whole units.
- speaker: Interviewer
  text: What sort of tank did you have, by the way?
- speaker: Respondent
  text: Well, it was just like the one that you got up there in the museum.
- speaker: Interviewer
  text: It's a Stewart tank.
- speaker: Respondent
  text: That's when we went--we took overseas with us. After that, then they start issuing us the Shermans.
- speaker: Interviewer
  text: Maybe you can just describe what it's like to be in there and then perhaps compare the Stewart and the Sherman from
    the perspective of a crewman.
- speaker: Respondent
  text: Well, the crew in the small tanks, there was only four of us in it, and the armor wasn't all that great. We had a
    .30 caliber machine gun and 37 millimeter, a cannon. And in the Sherman, it was a much heavier tank. A small one weighed
    about 15 tons. And the Sherman weighed about 30 tons or better, and we had a lot more fire power. We had two machine guns
    mounted, and then we used 75 millimeters, and then we had also a flame thrower that was mounted in there. We could replace
    one, remove one machine gun and put the flame thrower down there for burning out caves and stuff, and it was--well, we
    had had good ventilation. It was awful noisy, machine guns was awful noisy. It's hard on hearing and stuff. And you can
    tell when you get hit. I've been sitting inside--we got hit 11 times one day in Okinawa, and they was knocking off patches
    of enamel about 6 inches in the diameter on the inside, but none of them come through the crew compartment, but they did
    come in the transmission.
- speaker: Interviewer
  text: That was hit with what?
- speaker: Respondent
  text: We was hit, 47 millimeter. It was a German 47 millimeter the Japanese had.
- speaker: Interviewer
  text: Now, in terms of the size of the group, I suppose the Sherman's got more people in it?
- speaker: Respondent
  text: They had five.
- speaker: Interviewer
  text: What about the Stewart?
- speaker: Respondent
  text: They only had four. They had a driver, an assistant driver, a tank commander, a gunner, loader. We had driver, assistant
    driver, tank commander, gunner, and loader.
- speaker: Interviewer
  text: It gets hot in there, I imagine.
- speaker: Respondent
  text: It can be. We had good ventilation, by the way. It wasn't all that bad as far as heat was concerned. We had a good
    ventilation just to remove the smoke and stuff from the gunfire.
- speaker: Interviewer
  text: So this list of campaigns here, you know, I get different perspectives from different veterans.
