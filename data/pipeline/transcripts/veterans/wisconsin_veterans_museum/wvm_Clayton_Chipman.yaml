collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: I'd like to start where you figured you'd probably have a military career.
- speaker: Respondent
  text: Well, the psyche during World War II was a lot different than it is today, or has been since. Everybody was patriotic
    and soon as you turned seventeen, most of the youngsters were trying to figure out, you know, how they could participate.
    So when I was seventeen, I started badgering my mother and father to allow me to join the Marines. And I wanted the Marines
    because a lot of the--ah, hype, or whatever they were feeding us, was about the Marines in the Pacific. So, finally, my
    dad said, "Let him go, he won't be satisfied until he goes." We went down to the recruiter's station--the four of us--we
    skipped school one afternoon--went down to the Marine Corps recruiting station and talked to the sergeants down there.
    One of our friends backed out, the sergeant was too rough. And the other one, I forget his name or what he did, but two
    of us joined. And Larry Bonestrasser was killed in Okinawa, and of course I got in on Iwo Jima. And that's the way it
    started.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: That was February of 1944. Early February of '44.
- speaker: Interviewer
  text: So you were pretty young when Pearl Harbor happened. Do you remember that?
- speaker: Respondent
  text: I remember it, but I'd have to figure out how old I was at the time, but we were listening, my brother and dad and
    family were listening to a football game on a Sunday afternoon when the news came through. So, but it was a lot of new
    experiences.
- speaker: Interviewer
  text: So in '44, when you went in, you were pretty aware of what was going on in the war? Newsreels and newspapers and everything,
    you were following it?
- speaker: Interviewer
  text: So there was no question that you would be going in some capacity probably.
- speaker: Respondent
  text: And it was a challenge. I usually step in to a challenge, unless I'm too concerned about it. As I get older I'm more
    concerned, but -
- speaker: Interviewer
  text: Was seventeen a typical age? Or was that early?
- speaker: Respondent
  text: Well, John O'Connor from Onalaska, a person we met going on the train to San Diego, joined at fifteen. I just heard
    from him and he sent me a copy of his records. And he really was fifteen, but most of the people were eighteen. There
    were a few of us that were seventeen. And there were some that were drafted. And that's an interesting story. You know
    in Milwaukee we went down to an old factory building where, that they had set up for a medical examination center, and
    at the end the ones that passed formed a line, and a Marine Sergeant said, "All of you who volunteered for the Marines,
    take three steps forward." So I don't know, I think seven or eight of us, and he said, "All right, if you volunteered
    for the Navy, step, take two steps forward." And a group of young fellas did. And then the Sergeant walked up and down
    the line, he said, "You, you and you, you're in the Marines, take a step forward." So there were some men drafted, but
    not many.
- speaker: Interviewer
  text: So what happened after you enlisted?
- speaker: Respondent
  text: Well we went to boot camp. And that was-- everything was so new and interesting. Every time we stopped on the train,
    in a little city, the Red Cross ladies were out with doughnuts and coffee, and of course we had never seen a mountain,
    or desert, or anything like that. We got to California and the train stopped and it was a long side of an orange grove,
    and I think about half the guys run off and picked the orange, 'cause they'd only seen apples on trees. And we arrived
    at night, and immediately the drill instructors that met us at the train station started to condition us. They were rough.
    And--now as I look back on the entire boot camp training, I can reflect on it and I can see how they, first of all, tried
    to eliminate anything that was related to being a civilian. And once they got you down to your base instincts, then they
    started to build you up. And, a lot of, some, some of the people, and I think at the time--I didn't really realize, but
    I, I remembered some of the stuff because as we got near the end of training, the ah, the DI, drill instructor, he would
    give us breaks, and he would tell us about how he was wounded on Tarawa and he'd show us his wound, and he'd tell us about
    his girlfriends and stuff like that you know. And he became more hum-, human. But, it was all trying to get you into a
    psychology to be a Marine. And there was a, actually as we came through boot camp, and jumping ahead of the story a little
    bit, some were warriors, I was a Marine. And I was concerned, I knew what to do and I did it. But, we had some people
    that were outstanding warriors. We had Bill Compton who was a full blooded Indian from the Dakotas, just enjoyed the battle.
    'Course, he was one of the first ones up and one of the first ones to get killed. The Sergeant in the 4th Marine Division
    that I had was Ray Smith. Just a, a total southern gentleman from Florida. And I knew during the battle that when I peeked
    out of a fox hole and I could see his helmet, I knew I was okay. He was, his head was up all the time, he was taking care
    of his men. You know, I hope that's something that you are interested in.
- speaker: Interviewer
  text: Oh, yeah, there's nothing we're not interested in! [both laugh] I was just thinking, when you said the guy that was
    on Tarawa, they knew what you were going into.
- speaker: Respondent
  text: Oh, yes. Oh yes, and they realized the tougher they were on us, the more chance we'd have of coming home in one piece,
    so. And boot camp was, I had played high school sports in the fall, football, basketball and track, and summer I played
    American Legion baseball, so physically boot camp wasn't challenging, it was more interesting. Trying to beat your time
    on ah, obstacle course, and I didn't care much for the gas chamber where you had to get used to having a gas mask on,
    and I don't know what kind of gas they used, but ah, I have to say, the food was very good and plentiful. And the first
    night, well, the first night, they did not feed us, we came in after the supper meal, chow. And they wouldn't let us go
    to sleep, they kept having us do something till maybe two in the morning or so, and then they let us lay down in the attic
    of one of the buildings. We got maybe two, three hours sleep. And then the next day was issuance of clothing and so forth
    and ah, after supper everybody went to bed. You know, by that time they had assigned us cots and--nine o'clock, well it
    was right after supper, was probably six-thirty or so, everybody went to the sack as they call it. Nine o'clock the DI
    came out and he called roll call, and everybody got out except one young man from Wisconsin. And he just wouldn't get
    out, so the DI, I think again, he was teaching lessons to everyone, he dumped a bucket of water on the youngster. So we
    learned in a hurry, when the DI said something, do it. And ah, I remember the--learning, I think they called it Judo then,
    karate. And unless you really threw your man down and made him bounce, you'd have to get on the bottom and they'd throw
    you down. Ah, for--young seventeen, eighteen year olds, it was no problem. Bayonet practice on sacks of sand. And by the
    way, the Japanese that we fought were trained with live people, and if you read anything about the rape of Nanking, or
    Manila, or the Chinese fight the Japanese had in China, they used their prisoners of war as targets for their bayonet
    practice, so the training is another whole story. How totally different it was.
- speaker: Interviewer
  text: How long was your basic training?
- speaker: Respondent
  text: It was eight weeks. And then there was a week on the rifle range. And I had never thrown a firecracker, I had never
    held a rifle, and it was a little interesting learning with 22's first and then graduating up to the M1's. And shooting
    a pistol, I never fired a pistol before. And the thing that was probably more apprehensive than the gas chamber, was taking
    compound C, which was a, a putty-type dynamite. Then you take a little match and you'd stick the head in the, the compound
    C, and then you had to light the other end and put it down and run. [laughs] That was fun too.
- speaker: Interviewer
  text: So you didn't like blowing stuff up? [both laugh]
- speaker: Respondent
  text: Not really. Didn't like loud noises either. Got used to 'em. 'Course graduation day, where you paraded, that was a
    little apprehensive, too, because everything we did was as a unit. If one made a mistake, the whole group paid for it.
    And not always, but many of the times, they tried to weld you into a group where you were responsible for the person on
    either side of you, and they drummed into you such things as that if you do have to retreat, or you do have to move, you
    never leave a wounded or a dead Marine behind. You take 'em with you. And that was kind of reassuring that, you know,
    if something happened you know your friends were going to take care of you. And another thing that I took out of boot
    camp, was that, you--looked at something and it was more apprehensive getting to it than doing it. For instance, jumping
    off a tower, oh I don't know how high it was, with your shoes and your helmet and all your clothes on and so forth, and
    then having to swim the length of the pool. Once you got up there, why, someone was behind you, you better jump, you know.
    And I kind of laugh and chuckle at some of this stuff, but I think it was deadly serious, you know. And then, as I say,
    a lot of times you were more afraid of getting your friends or your buddies in trouble than you were of yourself. And
    that's what they wanted, you know, so that you could, ah--and of course every, after the final drill inspection, everybody
    ran for the telephones to call home and say, "Mom, send me money so I can come home on ten days' leave." Of course that
    was another, nothing to do with the battle.
- speaker: Interviewer
  text: That was after you graduated from basic?
- speaker: Interviewer
  text: You had a ten day leave? You came back to Wisconsin?
- speaker: Respondent
  text: Yes, we, oh--you know it's two and a half days on a train, so you lost five right there. You were home about five,
    but it was nice to get home with your family and friends and so forth.
- speaker: Interviewer
  text: In your uniform.
- speaker: Respondent
  text: Yes. Of course it was bare, as far as after the war when you had all your ribbons and patches and so forth. But then
    we came back, and the train trips were interesting, too. When the Marines took us someplace on a train, we had, we call
    'em cattle cars, but they were sleeping cars. When we went home on leave, 'course we were just on regular coaches, and
    some of us stood up the majority of the way because there were women on there with young children and so forth, so--But
    on the way back, we came back to Oceanside, and then we were taken to Camp Pendleton, I think right across the highway
    from Oceanside. And we had to set up what they call Tent Camp One. And at the time, I thought it was, you know, really
    that we were setting up a camp from nothing--just a bare field and a valley. No showers, we bathed in a stream. And we
    had to dig our own heads, and we ate in the open, and then gradually it built up into a--where we had tents and we, they
    built a mess hall and so forth. But I think too that was purposefully done, because they did have barracks there. They
    just wanted you to know you can go into nothing and you can come out fairly comfortable. That was about three weeks at
    the most. And, they taught us how to use the different weapons. Besides a rifle and a bayonet we learned how to use machine
    guns, and I think those were, that was the main one in that particular area. Then we had night patrols in the Pendleton
    Mountains, and that was an experience too of, you know, the Japanese were notorious night fighters and they did most of
    their fighting at night. So, they were getting us used to moving and operating in a group at night. And they gave us leave
    to Los Angeles. I think I had one or two weekends in Los Angeles. We just went to see the Rose Bowl and bowled and sights,
    looked at different places.
- speaker: Interviewer
  text: What time of year was that?
- speaker: Respondent
  text: That had to be May. We went in boot camp in end of February, into March and April, and moved back in May. And in June,
    I forget, I think we started out as a 68th Replacement Draft, a group of people, group of Marines, and sent over to Pearl
    Harbor. And I think they changed numbers, I think it finally turned into the 4th Replacement Depot, or ah, Replacement.
    And we were put on the USS Ranger, which was the, according to what we understood, it was the first American carrier to
    see action against the Germans in the North Sea. And of course now, in '44, they were using it to, ah, shuttle corsairs
    over. It was a big thrill, we slept on the hanger deck underneath a corsair; the young guy that never saw an airplane
    outside of in the sky. We did a lot of exercising, you, always cleaning your weapon no matter what it was, that was once
    or twice a day. Played catch and started to learn how to read. I mean really read. I read as I had to in high school,
    you know, for the different courses, but it was a lot of time on you hands on the trip over, and we, they had a quite
    an extensive library.
- speaker: Interviewer
  text: Was that a convoy or just a single carrier?
- speaker: Respondent
  text: I think it was just, I'm not sure about that, but I think it was one carrier going from San Diego to Pearl Harbor.
    I ah -
- speaker: Interviewer
  text: This is just over to Pearl.
- speaker: Respondent
  text: This is just getting us overseas. Then they put us in a replacement depot, and we were there a week or two, and they
    told us to pack up and we were gonna go down to the Marianas, which they were fighting on Saipan from June 15th on. And
    they said we were gonna be replacements for Tinian, which was three miles away from Saipan. And the 4th Division was down
    there, and I think they had a week's rest right on Saipan before they hit Tinian. So we boarded that APA expecting to
    go down to be replacements, and when we woke up in the morning we were in a port on Maui. And the only thing I can figure
    out is, on Tinian when, it was easier than they thought it would be. We spent a, again a couple weeks till the veterans
    came back.
- speaker: Interviewer
  text: What's an APA?
- speaker: Respondent
  text: It's an attack personnel ship, I don't know the exact name, but they carried the troops. I can get, explain that,
    that part a little later on. But we just were kept busy doing some little things, keeping things clean and so forth until
    the veterans got back. And then it was interesting, seeing these fellas come back. Some of 'em were wounded, many of 'em
    were wounded, and a lot of interesting things. They talked about it, and they talked about people that were killed, and
    to this day I never knew the people, but I did hear 'em talk, being talked about, in the Marshalls which was a previous
    battle that they were in, and then the Marianas. And I remember those names of the guys that they talked about. I don't
    know why, but they just stuck. And, as I mentioned, Roy Smith before, we-- I was put into his squad, or into his platoon.
    And just the greatest guy you'd, you'd ever want to meet. The veterans to
