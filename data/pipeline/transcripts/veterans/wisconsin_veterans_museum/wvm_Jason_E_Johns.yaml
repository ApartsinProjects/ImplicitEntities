collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Shall we start with where and when you were born?
- speaker: Respondent
  text: Yes. May 27, 1976, born in Dubuque, Iowa. We lived a couple of different places around there, but I grew up in Louisburg,
    Wisconsin. And so I went to school in Hazel Green, Southwestern. And graduated from there.
- speaker: Interviewer
  text: And family, siblings?
- speaker: Respondent
  text: Yes. I'm the oldest of five. I've got three younger sisters, one younger brother, all still around. And my mom and
    dad are still back there. My brother is still back there, as well as one sister. So yeah.
- speaker: Interviewer
  text: And I noticed in your thing, you were hunting at an early age. Is that -
- speaker: Respondent
  text: Yes, yes. I definitely - as soon as I turned twelve, I went and got my hunter's education course, which, back then,
    was once a week for like six weeks, I think it was. Yeah, started squirrel hunting, rabbit hunting, deer hunting, so.
    And now, I don't squirrel and rabbit as much anymore, but definitely still deer, pheasant, duck, turkey, so yeah.
- speaker: Interviewer
  text: What was the education course? What did that involve you doing?
- speaker: Respondent
  text: Once a week, like I said, they had - basically they had volunteers. I think like a hundred guys from the area. You
    just, [clears throat] excuse me, learn firearm safety primarily. And then, at the end of the course, you went off shooting.
    So yeah.
- speaker: Interviewer
  text: What kind of firearms did you -
- speaker: Respondent
  text: Shotgun and rifle.
- speaker: Interviewer
  text: And school, high school?
- speaker: Respondent
  text: Yeah, yeah. High school, Southwestern High School in Hazel Green, Wisconsin, as I mentioned. I was the oldest of five,
    so I worked, as well. I worked at a supper club nearby my house in Louisburg, where I'd bus tables on the weekends. But
    I was also very active in sports. I played football, wrestling, track, and baseball, as well as was the lead in the musical
    my junior and senior year, which was the funny part about being the four-sport jock and then the singing part. But I was
    involved with band for the first couple of years, as well, because I'd been through junior high and everything else. But
    then with sports and work, [inaudible] too much. So yeah.
- speaker: Interviewer
  text: What was the - what were you as the lead for? What were you in?
- speaker: Respondent
  text: Little Shop of Horrors. That one, I was actually the, I guess you could call it one of the leads. It was Mr. Mushnik,
    which was the shop owner. And then in Damn Yankees, I was the devil character. So the opposite of, so the two leads. So
    yeah. [Laughter] Yeah, yeah. You wouldn't figure it, would you?
- speaker: Interviewer
  text: So did you have, I mean, ideas about post-high school? Did you know what you were going to do?
- speaker: Respondent
  text: Yeah. It's the story I kind of always tell everyone is I knew that I wanted to go into the military, but I also knew
    I wanted to be a lawyer, from a young age. Blame it on LA Law, I guess. I remember watching that religiously. So I went
    to a recruiter when I was a freshman, with my mom, and just to get an idea of what was available. And I told him exactly
    that. I said, "Well, I want to serve, but I want to go into law, too." He said, "Well, perfect." He said, "We offer scholarships
    if you sign up. We'll pay for undergrad. We'll pay for law school. And then we'll commission you, and give us six years
    active duty as a JAG officer." I said, "Perfect. That sounds like the best deal in the world." Well, between my freshman
    and senior year, when I was old enough to enlist, the TV show JAG came out on CBS, and I refuse to watch it to this day
    because what it did is, you know, it was very unrealistic. A lot of out in the field investigating, flying jets so on
    and so forth. So it made being a JAG officer pretty cool, sexy, if you will. So I went back to that same recruiter and
    he said, "We don't offer the scholarship anymore." And I asked why. And he said, "Well, we've had so many lawyers, who
    are already lawyers, sign up for the JAG Corps. So we don't have a need that we need to do the scholarship anymore." So
    I was like, "All right. What do I do now?" I knew I didn't want to go active duty for four years and then school for seven
    years, so I joined the Wisconsin Army National Guard out of Platteville, which was the closest to where I was. I started
    college in Platteville for two years before I transferred down to the University of Northern Iowa. But yeah. So that was
    kind of my - and back then, in Wisconsin, you had fifty percent tuition reimbursement for being in the guard, so it was
    one way to - - cause I was on my own and didn't want to pay for school, too. So I was kind of, yeah. So that's why it
    was one way to serve, but yet still be getting in at school. So.
- speaker: Interviewer
  text: And do you have family who were already in the military?
- speaker: Respondent
  text: My grandfather, who I didn't know that well, but he was a Chosin Reservoir survivor, with the 101st. And then my dad
    was, he never deployed to any combat. But he was 82nd Airborne, as well. So, and then a great uncle. Probably more influential,
    though, was, because my dad was like, "Yeah, I just did my four years. Whatever, right?" But my great uncle - I was very
    close with my grandfather, who was the only son. Had three sisters. And so he had to run the family farm in the forties.
    And so he wanted to serve. All of his friends and his cousins and everything. But we needed the food, too. But his cousin
    - so I guess you'd call him my third cousin, yeah - but Donald Lombardi was his name. And he lived across the street from
    us. And in fourth grade, I had to do an oral history interview, similar to this. [Laughter] And I chose him because he
    had served in World War II, with the army and was in the Battle of the Bulge. And so I was asking him all about that.
    And he kind of, his story ended quickly because he says, "Well, I was running through the timber, and we were under artillery
    attack. And next thing I know, I woke up in a French hospital with a nice young nurse." And he'd been hit by shrapnel.
    So he had a Purple Heart, which he showed me. Bronze star, which he showed me, of course. And then what he gave me - and
    I carried this thing around forever - was an old M44, the German machine gun. He had basically had around, but he'd taken
    the gunpowder out, right. So it was still the brass and the round. Yeah. I think that was probably the first time I really,
    you know. I always knew I liked history. In fact, I studied history in college. But that was kind of when it started going
    towards the military, so.
- speaker: Interviewer
  text: What did your family think of you signing - - going to sign up?
- speaker: Respondent
  text: You know, back then, because I'd signed up in Wisconsin as delayed entry training, so you could sign up while you're
    still in high school, and then you leave for basic when you're done, and then you can go to the local guard unit and drill
    with them. So I signed up in August of '94, which was the start of my senior year in high school. Back then, you know,
    we were still relatively peace time, and obviously pre-9/11. And my mom was thrilled, actually, because she was - - she
    knew I was going to be on my own with four younger siblings at home, with a difference of fifteen years between us, between
    me and the youngest. And so when she saw that they paid fifty percent tuition reimbursement, she knew that would help.
    So yeah. She was fine at the time. Later on, we'll come to that. But yeah.
- speaker: Interviewer
  text: So you finished high school, and then?
- speaker: Respondent
  text: Yeah. Finished high school, finished college. I was with the 229th all the way through college. And then, when I started
    law school in the fall of '98, up in Minneapolis, I tried to stay with the 229th, because I loved the unit, loved the
    guys. But it was getting too much to try and get home every month, because it's just under a five-hour drive back. Then
    it was four lanes, but still. It was getting a little hard to come back. So I transferred up to US Army Reserve Unit right
    there in Minneapolis at Fort Snelling. And my initial six by two - this was '94 to 2000 - so I finished up my initial
    six up there. And then, of course, you had your two years IRR. But then I graduated law school in May of '01, and moved
    out to Washington, DC, literally, what was it? August 17, 2001. And lived in Arlington. So, as you can imagine what happened
    on 9/11, I witnessed all that. I went - I hopped on my motorcycle, because I was working at a law firm. But obviously,
    they called us and said, "If you're not already here, stay home," kind of thing, because they were shutting down all of
    the bridges and everything, and the Metro. So I went up to the top of the hill, where the Air Force Memorial is now, and
    saw everything happen at the Pentagon. I went down to try and help, but of course I'm not in uniform. I was just IRR at
    the time. So without proper clearance, they wouldn't let anybody else on there. So then I went back up to the top of the
    hill and watched the rescue efforts for a bit. And then decided to bring it home, see what's going on. So chaos in DC
    at the time, of course. And then in Arlington, I got back home. And they were saying there might be another plane coming.
    I remember too, I should say, when I was going back home, I was living with two, another attorney in the house, and then
    a grad student at George Washington, who was from Britain. And she was still there. And hadn't gone into class yet. My
    other roommate was already at work. We were sitting there watching the TV, and one of the towers went down. And she was
    just freaking out, of course, you know. And so we just kind of sat there, and we're waiting to see what was going to happen.
    We just decided to start drinking, and yeah. So shortly after 9/11, obviously angered, I got back in on temporary duty
    status with the unit at Belvoir, Fort Belvoir, Virginia, to help with street duty out there, street security. It was an
    MP unit. I was in audible, but they could always use drivers and stuff. So I helped them out, and then, for the next year,
    worked in DC. But then I came back to Wisconsin to work on a political campaign for Governor McCallum at the time through
    the RNC. My plan wasn't to move back to Wisconsin at that time. It was just to come back, get some campaign experience,
    and then go back out and see about maybe working on the Hill. But I liked being back. It was good. I got offered a job
    in the capitol. So I started there in December of '02. And again, it was like, hey, I'll get some experience as a staffer,
    and then I'll go back out to Washington. I just loved Washington. And then, in February 6, 2003, my old unit, the 229th
    - I saw orders, came across all legislators desks when there's a unit mobilized in the state. And so I called the first
    sergeant, who was my platoon sergeant before, a couple of years before. I said, "What the heck's going on?" It was a Wednesday
    morning. He says, "Well, we're getting called up." So on and so forth. And he says, "Where are you at now?" I said, "Actually,
    I'm in Madison." He says, "Oh." He goes, "I could use another team leader. I've got a slot for you if you want to come
    back." And I says, "When do you need to know?" And he says, "We leave Friday." I'm like, "OK." So I was single then. Hadn't
    met my wife yet, no kids. But talked to my dad, talked to some friends, and just decided that I still had a lot of buddies
    still in the unit. I agreed to re-enlist. Called the first sergeant back. He sent me to a recruiter over on Wright Street,
    Brad Byrd. And that night, that Wednesday night, we were there for probably five hours, signing all the paperwork to re-enlist.
    I was at MEPS at five o'clock the next morning. I walked in and gave my name and social, and the lady's like, "Oh. Yeah.
    The adjutant general says we've got to get you right through." So went through MEPS again like a new recruit. Came back
    to Madison, packed up my apartment. My brother and my dad came, in audible me pack up my apartment. Went back to the capitol.
    My boss there had a little going away shindig in the afternoon. Then I went out with some friends, and Friday, I was at
    the armory. Yeah. Byrd said - I don't know if it's still the case - but he says I'm the quickest contact to contract ever
    in the State of Wisconsin National Guard. So yeah. So Friday at the armory. Saturday, we're at Fort McCoy. We were there.
    We were supposed to originally go over with the third armored division, but then Turkey changed their mind on letting
    ground troops come through. They only said, "You can use our airspace, not our -" Meanwhile, there was a ton of equipment
    and troops waiting off-coast. So we got delayed at McCoy. We were at McCoy from February 8 until the first part of May.
    But the thing was, we kept - they didn't know if we'd get the call tomorrow, right, that we'd got picked up by someone
    else and this and that. So we'd go home after the first month and a half. Yeah, basically, we got weekend passes. But
    you'd go home, and you didn't know if you'd be leaving that week. So it was, you said goodbye multiple times. And the
    joke got to be, "Yeah, see you next weekend," you know, not knowing for sure. Now of course, if you went back on Sunday
    nights, and on Tuesday they said, "We're leaving Wednesday," family could come up that night. But still, you just didn't
    know. So we got picked up by the fourth infantry division. Meanwhile, we'd been up there training, all equipment, getting
    equipment sent over, which was starting to get a little monotonous, though. Four months at Fort McCoy, or three months.
    But yeah, we got picked up by the fourth ID. We got into Kuwait on my golden birthday, actually, May 27. And acclimated
    there for two weeks. And then we drove up to Tikrit, which was - fourth ID was based. The generals and the higher brass
    took over the palace in Tikrit. And then there was an old Iraqi Air Force base about five miles outside of town that we
    moved into, because we were combat engineers, combat support, combat equipment. And so they basically wanted us to build
    that up. So they said, "Why don't you make that your base camp?" When we got in there, it had been bombed to hell and
    everything else. So we were clearing out rubble for a while. And the old burn pits, which we'll see what happens there.
    But yeah. So we were, just set up cots in these little makeshift shelters there. And gradually started to build it up.
    But then, we started getting tasked out with MPs and infantry and kind of different missions all over. So did my time
    there. And it would have been, things were relatively quiet the first couple of months. It was - - you had the mission
    accomplished, but it was in June
