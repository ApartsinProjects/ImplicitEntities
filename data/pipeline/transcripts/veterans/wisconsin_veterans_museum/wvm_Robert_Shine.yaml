source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: So can you tell me a little bit about how you ended up going into the Army?
- speaker: Respondent
  text: I was inducted into the Army. We went to, I think it was some place in Chicago where we processed through. And like
    I said, my basic training was in Fort Leonard Wood and then we shipped out from Midway Airport and we flew to Seattle,
    Washington, Fort Lewis, and we were there for maybe a day and we were able to go into a tavern and get a couple of beers
    before we left. And we left out of Puget Sound the next day. That's the first time I ever saw a flying fish there. And
    from there we processed over to Japan.
- speaker: Interviewer
  text: So before we get over there if I can just ask a couple of questions about the early service. So were you drafted or
    did you choose to go in?
- speaker: Respondent
  text: No, I was drafted.
- speaker: Interviewer
  text: And what were your feelings when you found out you were drafted?
- speaker: Respondent
  text: I was happy to go in. Not leaving my wife, but I wanted to serve my country, you know, like that.
- speaker: Interviewer
  text: And that was some time in 1953?
- speaker: Respondent
  text: In 1953, right.
- speaker: Interviewer
  text: Do you remember what month or about what time?
- speaker: Respondent
  text: No, I can't remember. It must have been in May, I think, somewhere in that area.
- speaker: Interviewer
  text: And how was basic training for you?
- speaker: Respondent
  text: Basic training was fine, you know, for me. Used to have to - it was really hot in St. Louis when we were down there
    and we used to have these big backpacks and you'd have to march for miles and everything else. One thing I'll always remember,
    on Friday nights we had to clean the barracks and we were on the top floor and when they mopped the floor there'd be water
    dripping down onto other beds and everything else. And we had to really make our bunks really good because when they came
    in they had to drop a quarter onto it and if it didn't bounce up you had to remake it. And your shoes had to be what they
    call spit shined and your rifles had to be cleaned. And we went on different marching hikes and a lot of drills. And we
    had different units there that came in to this certain area and we all had to stand at attention and each unit had to
    march and as we went by you have to salute the flag. There were a lot of units at that time over there. I can't remember
    anything else that I missed.
- speaker: Interviewer
  text: So that was basically basic.
- speaker: Respondent
  text: Yeah, it was basic.
- speaker: Interviewer
  text: Did you know that you were going to be deployed over to Korea?
- speaker: Respondent
  text: Yes, I knew that. And it wasn't very pleasant leaving my life behind, like anybody that was married. And like I said,
    we flew out of Midway and we went into Fort Lewis at Seattle, Washington. Then we left there, like I tell you, out of
    Puget Sound. And I can't remember how many days it took us to get over to Japan, but it was, I'd say, roughly ten, I'm
    not sure. But I remember coming in to Japan, they had opened the submarine nets. You know, like years ago they had the
    submarine nets that they had there so nobody could get into the harbor. They had one tug on one side pulling it open,
    one tug on the other side pulling it open so we were able to go in. And as soon as we got in they were taking all the
    garbage off of there and everything else and we were sent to a Japanese naval base just to be processed. And we could
    go downtown for maybe a day just to spend a little time down there. We rode in a taxicab and boy, that was the last time
    I ever ride in one of them because all they do is lay on the horn. If somebody got in their way they'd run him over. It
    was really something. Let's see, that's about all before we processed over.
- speaker: Interviewer
  text: How long were you in Japan?
- speaker: Respondent
  text: Not too long. I would say maybe two days or a day and a half maybe over there. I remember going over to Korea we got
    in a violent storm and we had to pull in behind an island. I'll always remember that. It was a very ambitious storm. And
    we had to stay there maybe a half a day or more, a day. Then we could process on.
- speaker: Interviewer
  text: Did you ever get seasick?
- speaker: Respondent
  text: No, never did. But it was really rough, boy. I mean people would really get seasick and the ship would go way down
    and up like that. It was really, really rough. And I did see a couple, not sharks but whales. I think they were whales
    that I did see out there. But it was a rough trip over there. But the night we came in - I can't remember. I think we
    ended up coming into Busan. I don't know if they have a port there or not, but anyway we got off some place before we
    got to Busan and we rode on a train that we had to lay in our sleeping bags and everything else. And we got into this
    port, it was dark, we didn't even know where we were and we ended up in, like I say, Chuncheon. And we went to the 73rd
    Engineers where we were supposed to go and it was really different being away. Really completely different of being home.
    You didn't have no stores or nothing, but we did have a houseboy. He'd come in there and clean up our bunks for us and
    do the floor. And then when I went over to the 38th parallel, if I can go that far ahead?
- speaker: Respondent
  text: The 38th parallel. We were right on the 38th parallel where North Korea and South Korea was like that. And we built
    a road to the Sea of Japan which I was involved in it one day, but then I was called to work in supply. Which I did and
    then the company clerk left and I guess I was the only one that could type so I went in there and did all the typing.
    We had to make out morning reports for everybody. Like this guy went here and that person was over here, so we knew if
    something happened who was where. And that's the reason you wore the dog-tags with your name on. And then we'd have -
    we would find - we would go out on patrols, just looking around, scouting around. We used to find rifles with "Russia"
    stamped on them and bombs that weren't detonated and we'd have to call the demolition derby, like I said. And they would
    come and explode them when we weren't there. Then we had the rifle ranges and the M1 would really kick. I remember when
    I first fired it I wasn't holding it right and it kicked back and I put a cut under my eye. But we used to have the bazooka.
    The bazooka was the easiest one to fire because there was no kick to it and we used to fire at old jeeps and old tanks
    and things like that. It was really nice. A lot of fun like that.
- speaker: Interviewer
  text: Tell me a little bit more about being in supply. What does that job entail?
- speaker: Respondent
  text: In supply you had to take care of all the rifles and you had to - everybody was allotted a certain amount of clothes
    and I would have to give a talk every Saturday and whoever was in charge of the department would have to give a talk.
    And that was one of the things that I always had to do was give a talk about clothing and what you were allowed. We would
    go every week to a place where we'd pick up all the supplies in a three quarter ton truck and then we'd come back and
    everybody was allotted so much. So whenever somebody needed something we were always there to supply them with that. Now,
    when I went to pick up supplies one time one of my friends, Dale Erston, that lives over here on F County Road, I didn't
    know until I got up there and I went by his company and I said, "That's where my friend Dale lives." And he came over.
    I went in there to see him and sure enough. I had an extra pair of shoes so I gave him the shoes. He needed a pair of
    shoes so I gave him that. And we used to have to - when we went up there we used to go in these big defiles, like I was
    telling you before, and with no guardrail you're right alongside these big mountains, big drop-offs and everything. It
    was really something else. The fighter planes used to fly in and out. You could see the pilot sitting right in the plane.
    They would practice and they'd go weaving in and out in the mountains there. It was really, really something to see. But
    it was very cold over there. Very cold and I hated when you got the yellow alerts. Like I said, you had to get up and
    no matter what you had on you had to jump in a foxhole and it was filled with water and it was really cold. My gosh. When
    I worked in supply I was called company clerk because I was the only one that could type really, and I wasn't really that
    great at it. You couldn't make any errors. You couldn't use any whiteout or nothing. I don't know how many times I had
    to start over. So I found out fastest - just take your time and do it right. But it was very cold. I always remember how
    cold it was over there. That's how I got my feet frosted. I almost lost all my toes. They start itching me and they start
    turning black and blue and I finally went to the doctor and he said, "If you didn't come much sooner you would have lost
    all your toes." I couldn't walk on them for I don't know how long.
- speaker: Interviewer
  text: So was he able to treat them then?
- speaker: Respondent
  text: Yeah, he did something. Put salve on them and so on and so forth, but today I still go with my feet to the VA in Green
    Bay up there, podiatry. And they're not too bad if I don't get them cold outside. But all in all they're not too bad.
- speaker: Interviewer
  text: I think that's one thing that people often say a lot about Korea, is that it was so cold and there wasn't -
- speaker: Respondent
  text: Oh, it was, yeah.
- speaker: Interviewer
  text: You didn't have the proper supplies. So as the supply person was there anything you could do or can you tell me more
    about that experience?
- speaker: Respondent
  text: Like I said, everybody was allowed so much clothing, but I go and pick up supplies all the time like food and also
    clothing, like shirts and pants and jackets and everything else. And they were allowed so much and when their clothing
    was worn or torn or something we'd always manage to supply them with that. And when I was in supply I was in charge of
    all the weapons too, so I also went to Inchon, to a place where we had to take all the weapons apart, every piece of the
    M1s, and be able to put them back in a certain amount of time. I don't know how many times we all had to do that before
    we really got the hang of it. Then we used to - after we had a few hours we'd walk downtown and we had our pens in our
    pocket, like this, and these little Korean guys, little kids, would come with a rope on one side or a [in audible] you
    couldn't see it and they'd flip it out and flip the pens out and run like heck. We caught onto them so we didn't carry
    any up there anymore. But when we went to Inchon too everything was bombed up. I remember this nice church, it was so
    bombed up, my gosh. But when I watched the golf the other day they were showing Inchon and it was built up and I told
    my wife that it didn't look like that when we were there. It was really, really something. And they told us never to drink
    the Japanese or the Korean beer because you could go blind. Have I told you that? Yeah, you could go blind. Well, we wouldn't
    do that anyway, but there might be somebody that would.
- speaker: Interviewer
  text: What would you be going blind from? Because it was poisoned?
- speaker: Respondent
  text: I don't know. It was something in the beer that I
