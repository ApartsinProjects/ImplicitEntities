source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Respondent
  text: Thank you for being your guest. Don't do this too often. On occasion, we do make, I have spoke to different groups.
    Retirement, people in retirement homes, at churches, four or five schools. And one of the last ones I did was last year,
    getting about this time, just before, just a few days before Christmas. A young recruiter came out from Green Bay and
    I had met him at different functions. And he said, "I am going up to Seymour," he said. "I am pushing for recruits." You
    know. And he said, "I'd like to have you go along." Well, I said, "What is the situation?" Well, I had a jump suit, an
    old parachute jump suit from World War II. He says, "You wear that." I says, "You sure?" "Yea. Wear your beret. And come
    on. You got a little other literature you want to bring along?" I had a couple books on airborne. The fiftieth anniversary
    of airborne. And a couple pictures I had confiscated from the Germans. One of them was on the Olympics in 1936, when Jess
    Owens took over, and Hitler couldn't understand it. And that was probably one of the better ones that we have ever had.
    This teacher was real. He teaches, he is the football coach. And he also teaches history. And it worked out real well.
    Just talked for about twenty minutes. And there was two different groups. There was one before dinner, about half an hour.
    And then, questions and answers. And it was surprising. These are senior high school students. And he broke down the class.
    There was about thirty-five in the first class. And in the afternoon, about the same number. So we had about seventy,
    seventy-five kids. And the interest that they took in this. Really good.
- speaker: Interviewer
  text: Well, that is good.
- speaker: Respondent
  text: 'And then they thanked us, the young recruiter and myself. And about a week after, I got a letter these kids wrote.
    And each one signed it, and just a paragraph or two, just short, thanking us for coming. And it was interesting. Especially
    their questions. For instance, or just for an example, you''d get a question like this: "If you had the same thing to
    do over again, would you, or wouldn''t you?" And of course, my answer was, "Under those conditions, yes. If I was a young
    man, I would do the same thing." And, "Do you have any qualms about this?" "Not really. War is war, and it is tough."
    They really had good answers. I mentioned, I did mention a few examples, in these prisoner of war camps, two or three
    incidents of different things that happened. And they were at the edge of their chairs. It was good.'
- speaker: Interviewer
  text: That's good. They say kids aren't interested in history any more.
- speaker: Respondent
  text: Yea. It really was surprising. But I just, I mean, I could, I'll just go through this. I made a copy of this. This
    is just short. I was drafted. We left Green Bay with a bus load of draftees and volunteers on the 4th of, that was on
    the 4th of December. And was inducted in at Fort Sheridan, Illinois. Of this group, we left by railroad and went to Camp
    Barclay, Texas. Camp Barclay was about two miles out of Abilene, and it was a medical center. It was a new medical center.
    And it was being expanded for infantry medical training. Completion of basic training, I remained there. Now, they didn't
    have too many men on cadre. Somebody doesn't understand what cadre is, those are, like, you understand. I am sure. Cadre.
    It would be guys that remain for training.
- speaker: Interviewer
  text: Called permanent party, I think.
- speaker: Respondent
  text: Yea. They make, you start at PFC and if you are good, you move up to corporal, buck sergeant, staff sergeant, and
    so on. So, out of this group, they only had a few and this thing was really mushrooming. It was really building up in
    a hurry. And the rest of the guys were all shipped out and I would say, this first group that I took my basic training
    with, about four-fifths of them were sent to Australia. And then the rest were sent to other camps for more extensive
    training.
- speaker: Interviewer
  text: If I may interrupt you.
- speaker: Interviewer
  text: I have got some questions about training. Your experience is particularly interesting. And that was before Pearl Harbor?
- speaker: Respondent
  text: This was, yea. About a week before Pearl Harbor.
- speaker: Interviewer
  text: And there is one of the continuing controversies in American history is America's preparedness for World War II. How
    prepared we were. And there are stories some guys will tell about training and that sort of thing. So, I was wondering,
    from your GI basic training perspective, your comments on preparedness. What sort of equipment did you have? What sort
    of training did you get? Your impressions of it, and did it help you later on, did you think?
- speaker: Respondent
  text: Well, I would say that the medical training was very good. Because usually, your company commander, now, a company
    usually, like a line outfit, now, during maneuvers and into combat, they run about twelve or fifteen thousand, where an
    airborne division runs about eighty-five to nine thousand. So they are a smaller unit. But I would say that the training
    was very good. And as far as like this being the Medical Corps, and like I say in most cases, the commander was a doctor.
    Was a doctor. Usually a first lieutenant or a captain. Would be your commander.
- speaker: Interviewer
  text: And you had enough supplies? And you had actual guns to shoot?
- speaker: Respondent
  text: Well, no, see, as Medical Corps, there was no guns. See. There was no weapons. You carried a Red Cross band on your
    arm, on your sleeve, that was it. So you had close order drill, and we had bivouacs, and maneuvers. And then of course,
    an awful lot, I would say that anyone that took the course, it ran, those training periods ran about eight weeks. And
    most of the people, the fellows that took those courses, I would say that they became excellent first aid men. To start
    them out in hospitals. That is where they usually filtered out, from there. Now, I stayed on as cadre for three or four
    training periods, eight week training periods. And it's noble duty. But there was something about it. I mean, what usually
    would happen to men after, they said, after three training periods, you should be qualified, you are an expert as far
    as first aid is concerned. But you will either wind up in a hospital, maybe a field hospital. That would be about as close
    to combat as you would get. Or, if possible, you would be a medic with a platoon. You have three platoons in a company,
    so you have three medics in each platoon, which we did in the 101st.
- speaker: Interviewer
  text: And you wanted the combat medic position?
- speaker: Respondent
  text: Well, I wasn't too interested in medicine. What I wanted to do was, well, as most young men, there is a war on, and
    the cause is just. Let's get into it and let's be a part of it. And get it over with and get home and go back to work.
    Very simple.
- speaker: Interviewer
  text: Now, while you were in Texas, Pearl Harbor happened.
- speaker: Interviewer
  text: I suppose, just for anecdotal purposes, if nothing else. Why don't you just tell me when you learned of it, and, being
    in the military, what was the reaction to it? How did things change after December 7?
- speaker: Respondent
  text: Well, see, we went in. I believe it was the 1st or 2nd, one of the, on some of these dates, I am a little hazy. 1st
    or 2nd, one of the first days of December. Because we were at Fort Sheridan about the best part of a week, maybe five,
    six days prior to Pearl Harbor. And, of course, every place you would go, you were getting your physicals, your examinations,
    and questioning, and gave you your clothes. You got all your clothes, and that. And we were at Fort Sheridan maybe three,
    four days, before we were moved out by railroad, to Camp Barclay, Texas, this new camp. But, I would say, they had the
    equipment, as far as your clothing and everything, real fine. And most of these areas, they had their ambulances in training.
    You know, we would go on maneuvers and that. The lots were always, the lots for the vehicles were always full up and all
    new equipment. And the same with the tents, being hospital tents. Our pup tents, and all our other equipment, was in very
    good shape. And when we trained at Camp Barclay, Texas, the 45th Division was in there when we came there. And then they
    were sent overseas. The old Thunderbird Division. And that outfit was primarily Mexican and Indian. And they came from
    out of Texas, Oklahoma, and New Mexico.
- speaker: Interviewer
  text: Yea. They were one of the National Guard--
- speaker: Respondent
  text: It was. It was a National Guard division. And that was what it was made up. Primarily, I would say, I didn't notice
    a white skinned fellow there. They were dark skinned. Mexican-Indian, primarily. And I talked to a fellow, this friend
    of mine who lives in Denmark, here, now, and he was an ex-prisoner of war. He was captured at Anzio. He served with the
    45th. And I said, "Did you have many Indians or Mexicans?" He says, "Most of those guys were eliminated. They were either
    killed or captured." He said, "Very few Indians."
- speaker: Interviewer
  text: Okay, so you finished your training at Camp Barclay. You stayed there for a couple of training times. Why don't you
    just walk me through getting into the paratroopers?
- speaker: Respondent
  text: I can take that right out of here. Parachute training was taken at Fort Benning, Georgia. This is fairly brief, cut
    down, but I, we can always elaborate here and there. January and February, 1943. Early March, twenty of us were, these
    guys, we took this training and this training was tough. Now, these guys, I'll tell you what happened. One morning, it
    happened to come up. This was at Camp Barclay, Texas. There was a notice on the bulletin board, "Airborne is looking for
    people." Now, this has to be, I think, during the second training period, so the 82nd Division, Airborne Division, was
    already over in North Africa. They were over there and through Sicily. And they were in there. And I would say, after
    I had taken basic training, that first group had gotten through. The 45th was in intensive training there, and they moved
    out. They went out of the States. But then the 90th Division, another infantry division, came in there and they were there
    when I left. I was there just about a year. Just about a year. But, anyway, getting on with this training, I would say
    that, like I say, on this bulletin board, there was this notice that the airborne was looking for people. And I said,
    "Geez, that is for me." And what they did, they sent them out from Fort Benning, Georgia, I believe it was a captain and
    probably a lieutenant. Probably a first sergeant and three or four enlisted men, sergeants or corporals. And the date
    was named. There was about a week after the notice appeared on the board. And we met at a, it was a large auditorium.
    At Camp Barclay. And I would say, these people came in from all over. They must have had these notices because there are
    numerous training camps in Texas. And they came up from Fort Hood, and you name it. Dozens of others. And a lot of these
    guys had been, and they were from all branches. And I would say fifty percent, in this auditorium there was at least two
    hundred and fifty people that were going for airborne. And it was patches for you, you name it. Infantry, artillery, air
    force, and so on, and so forth. And they explained the situation to you, and they ran films. They have you, they had a
    doctor, one doctor there, took tests. You had a written test. And they explained to you the situation was rough. It was
    going to be rough. Your chances of survival weren't the best, but you would be with men. That is the way they put it.
    You would be with men. And after they had done these tests, out of that two hundred and fifty, they took fifty. And what
    they were looking for that time, there was a little variation in size and weight, but the people that they took, the average
    man, their ideal was about a hundred and fifty-five, sixty pounds. And about five-eight. Maybe an inch or two either way.
    They didn't want anybody slobber fat. You had to be in good shape. And you might ask, like these kids at this high school,
    at Seymour. The question they asked, "Well, what kind of men were they? Where were they from and what did they do?" Well,
    most of these men, most of these men were born in about 1920, give or take five or seven years either way. So that was
    twenty. So most of these men were in their very early teens during the Depression, and a drought on top of that. '31,
    '32, '33, they were rough years. And you say, you ask the question, where did these men come from? These men, most of
    their ancestry and their parents came out of the coal mines of Virginia, the steel mills in Pennsylvania. They were farmers,
    they were ranchers. They were guys that worked in oil fields. They were lumber-jacks, tree-toppers. Most of them were
    out-door people. Most of them were out-door people.
- speaker: Interviewer
  text: But rough? Fairly rough?
- speaker: Respondent
  text: It was very rough. And then, on top of it, you had this drought. You remember John Steinbeck's book, Grapes of Wrath?
    Where all these Okies left Oklahoma and went looking for jobs in their old Model A's and T's? Into California, for jobs
    that never materialized. And it was tough. Those were the days when a buck was a buck. Job was hard to come by. You had
    your WPA and your CCC camps that Roosevelt got started up. You'd get your uniform and your food and a buck a day. So,
    and of course, we went into service and what did you get? Twenty-one dollars a month, was the wage. Twenty-one dollars
    a month. So, the majority of these guys, even these guys who had lived through hard times and the drought, were writing
    home for money. If the family could send five or ten dollars on occasion. Because it was rough going. But then we took
    this training at Camp Barclay, I mean, at Fort Benning, Georgia. And that was eight weeks. And it was rugged.
- speaker: Interviewer
  text: What did you do? I mean, I assume jumping out of airplanes was part of it.
- speaker: Respondent
  text: Yea. Well, the way they would start you out, primarily, it was rough. Now, where these training fields were was about
    a mile from where the guys were billeted. And they would take these through in classes of probably two hundred or so.
    And you would get up at six o'clock in the morning. And there would be a cadre out there. Six or eight guys. Now, these
    guys were there continuously. Now the reason they could take this is they were tough. And most of these guys were from
    the Deep South. That first cadre, there, where I took training at Fort Benning, Georgia. They were brown as berries. You
    know what I mean? They were out in the sun. And all crew cuts. And all they had, and they would always come out in clean
    uniforms. They had t-shirts on, white t-shirts. With a parachute patch on it. And they had the jump pants on, and the
    boots. And I never seen those
