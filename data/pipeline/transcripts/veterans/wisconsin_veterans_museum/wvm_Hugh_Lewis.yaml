collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Why don't we start off by having you tell me a little bit about where you were born and raised and what you were doing
    prior to World War II.
- speaker: Respondent
  text: I was born in Beloit, Wisconsin and we moved to Madison when I was 4 1/2 years old and I was raised in this area,
    went to school here.
- speaker: Interviewer
  text: What part of town?
- speaker: Respondent
  text: We lived on the east side. To begin with we lived on Yahara, Thornton Avenue which is on the Yahara River there and
    then we moved farther out on Upham Street when my growing years, you might say.
- speaker: Interviewer
  text: What did your father do for a living?
- speaker: Respondent
  text: He was with Madison, MG&E, and worked in the accounting department as a bill collector.
- speaker: Interviewer
  text: Did the Depression affect your family terribly much?
- speaker: Respondent
  text: It affected our family very much. It made it necessary for all of us to do our part as far as working and doing things
    around the house. It developed team work really.
- speaker: Interviewer
  text: So you finished high school, geeze, 1939 or so?
- speaker: Interviewer
  text: '''36. I was never good at math. That''s why I went into history I guess. So what did you do then after you graduated
    school? The Depression was on and all.'
- speaker: Respondent
  text: Well, I was very fortunate. We graduated with the February class and then I took part-time--I went to school in the
    morning and I got a job working in a filling station at night.
- speaker: Interviewer
  text: Uhm. You went to school at the UW here?
- speaker: Respondent
  text: Yes. I went to the university here. Got it started out but then due to a money emergency I had to drop out and I thought
    it was going to be just a temporary measure but things developed which, one of the jobs I got was ushering. And about
    the time that I was getting ready to go back to school I got promoted to doorman so I thought another semester I'll have
    more money.
- speaker: Interviewer
  text: This was the Parkway Theater?
- speaker: Respondent
  text: Parkway and Strand.
- speaker: Interviewer
  text: I'm not sure where those are or were.
- speaker: Respondent
  text: They were on Mifflin Street. As a matter of fact Parkway was just down, in this block just down the street of the
    old city hall. The Strand, I'm sure you've seen that. That was in the next block over. They were under the same management.
    Then when I was getting ready to go to school the next fall I got promoted to assistant manager which was a lot of fun
    really. You got into exploitation and publicity and work as well as managing. It, I found it quite interesting. At that
    time the Parkway Theater was staging plays which oh, Helen Hayes, Richard Evans, and all the biggies used to come here.
- speaker: Interviewer
  text: Did you get to meet any of them?
- speaker: Interviewer
  text: You have some autographs somewhere tucked away?
- speaker: Respondent
  text: As a matter of fact, Helen Hayes wanted me to join the theater guild. She liked my work as a writer. I tell you, I
    don't know whether, what I would have done if I accepted that it would have meant going to New York and that was a big
    jump for a little guy.
- speaker: Respondent
  text: At that time. Today they do it all the time.
- speaker: Interviewer
  text: So you got married somewhere down the line.
- speaker: Respondent
  text: Yeah, we got married in 1940. As a matter of fact, July 6 will soon be here.
- speaker: Interviewer
  text: Coming up pretty quickly. So, World War II breaks out in Europe in '39 and in 1940 the draft starts and the country
    starts inching its way towards war. Do you recall these days and remember what you were thinking because we discussed
    earlier you thought about going off to Canada.
- speaker: Respondent
  text: Yeah, there were four of us that were chums. Paul Hunter, Johnny Briggs, I can't remember the third party. He was
    killed during the war. I suppose that's one reason why I've got a block on his name. Johnny Briggs never made it overseas.
    He got discharged. He got shot down when he was flying or doing a target. That's one way to go. Of course, Paul Hunter
    made it overseas and stayed with the Royal Canadian Air Force and he made it through the war though. He has since passed
    on.
- speaker: Interviewer
  text: But you decided not to go.
- speaker: Respondent
  text: I decided not to go. My wife just, it was just a bit too much for her to take at the time.
- speaker: Interviewer
  text: What possessed you to explore such a thing in the first place? Was it an opposition to fascism or to do your part?
- speaker: Respondent
  text: No. One thing, we liked to fly. I had my first airplane ride when I was in third grade. I had a cousin, Ted Rundquist,
    who was in the Army Air Corps Reserve down in Illinois and he flew up here with a Douglas O2U. I don't know if you know
    anything about that or not. It's an old observation plane, big bi-plane. He gave me a ride in that and I was so small
    he strapped me in the observers seat in the back just around, I couldn't see out, I couldn't scout. The only thing I could
    see was up. He told me two places to hang onto. And we went around the field once. But that was my first trip and that
    hooked me. I've been partial to airplanes ever since.
- speaker: Interviewer
  text: So, in 1941, of course everyone knows the Japanese attacked Pearl Harbor. Do you recall the incident?
- speaker: Respondent
  text: Yes. That was a Sunday that we got the word on that. It was a very solemn day, really. It was a shocker for everybody;
    I don't care who they were, in this part of the country. I can remember one of the persons that I talked to that day,
    Bill Sachtjen, was a classmate and prominent judge here in Madison in his day.
- speaker: Interviewer
  text: And it wasn't long after that you got in the American Air Force then?
- speaker: Respondent
  text: It was in April of '42 that I enlisted in the Air Corps.
- speaker: Interviewer
  text: Could you just describe for me the process of signing up. Your thought process and why you decided to do that.
- speaker: Respondent
  text: Well, primarily my wife was the one that we discussed it with because she was the one that was going to be most involved.
    One thing, a member of our family has been in the military from the very beginning and one thing I want to do if I was
    going to get involved I might as well fly. So she finally concurred with that. When they advertised for cadets we went
    in and passed those examinations for getting in. I almost crossed paths with Ted Runquist at that time because they put
    us on a train to go to Santa Ana, California where he was commandant of cadets at the classification center there. That
    would have been very interesting. But they hauled us off the train down in Milwaukee and kept us overnight and then shipped
    us off to Nashville. So I had all my training in the southeast.
- speaker: Interviewer
  text: So, when you went in you didn't enlist like a regular enlisted man. You knew you were going into the officer corps?
- speaker: Respondent
  text: Yeah. Went in the cadet program. See, when I was and the university I also had ROTC which--
- speaker: Interviewer
  text: Oh, I see. That helped some. I was going to ask what sort of military indoctrination did you receive as an officer
    recruit? I assume it wasn't the haircut and screaming and yelling like the enlisted guys got.
- speaker: Respondent
  text: We had not a GI haircut but we had it close-cropped. We ate square meals. The discipline was very strict in basic.
    As an underclassmen, they had the class system. You had hazing but as I recall I can't see where any of it was out of
    line. Once in a while somebody would get a little overbearing but there was no--
- speaker: Interviewer
  text: No terrible physical abuse.
- speaker: Respondent
  text: Physical or mental duress. It was to develop the system to correlate what was required.
- speaker: Interviewer
  text: Now, this was at Nashville?
- speaker: Respondent
  text: No. At Nashville we just were given classification tests and physicals and there my eyes ran into trouble. I had a
    little far sighted and you had to meet a certain criteria in order to qualify for flight training. And I was put on a
    program, a German program--
- speaker: Interviewer
  text: A German program?
- speaker: Respondent
  text: A German program which exercises the muscles in the eyes. Like calisthenics.
- speaker: Interviewer
  text: Oh, you mean an exercise program kind of thing.
- speaker: Respondent
  text: Uh hum. Your eyes move like this as your eyes go through the program to strengthen the muscles which control your
    vision. I did well in that so that I finally qualified. And they shipped me out for pilot training at Maxwell Field in
    Alabama.
- speaker: Interviewer
  text: In Alabama. And that's where your basic training was.
- speaker: Interviewer
  text: And what sort of training did you do? A lot of marching, a lot of classroom, did you shoot guns at all?
- speaker: Respondent
  text: Oh, you marched to and from -- you got some shooting in the range but to me I don't recall to, I think it was rifles
    as I recall, and it was just one or two days of it. It wasn't very academic. As far as the program was concerned most
    of it was conditioning. And you had your classroom work which prepared you for flying.
- speaker: Interviewer
  text: This lasted how long? About six weeks or so?
- speaker: Respondent
  text: Let's see. I think it was three months.
- speaker: Interviewer
  text: And then you went to where?
- speaker: Respondent
  text: Then I went to Orangeburg, South Carolina for primary pilot training.
- speaker: Interviewer
  text: So now you get to get in the cockpit and start flying around?
- speaker: Respondent
  text: Yeah. It was fun. I enjoyed that all the way. It was a fun airplane to fly and had a good instructor.
- speaker: Interviewer
  text: This is what kind of plane again?
- speaker: Respondent
  text: It's German, PT-17, which was a bi-plane. Of course, the planes ran from exceptionally good to those that barely could
    get off the ground. And we had some pretty good experiences there too. We had, our squadron commander was a fellow by
    the name of Surgalia. He was about 6'2" even though he wasn't supposed to be more than 6'. But he had an airplane that
    was just a dream. We used to fly these various stages and I had been out for an hour or so and came in and my name was
    on the board for to do a 90 degree, no two 70 degree landings, dead-stick landings. I hadn't even tried them in practice
    yet and the operations officer told me I'd better go. And there was only one plane left on the line. That was Surgalia's.
    I took that, I hit three of them right in a row so the Lord had to be with me. They hand you different flags in the stages
    and if you get the checkered flag, you go home. And I think if you get the red flag, you're supposed to come back. Well,
    the last plane in the stage was supposed to stop and pick up the instructor that was handling it. And this was Surgalia.
    First he stopped me with a red flag and wanted to know what the hell I was doing in his airplane and I explained that
    and he said, "Well, you scratch even so much as the wing tip" he says "you're through." which is a nice thing for him
    to say. But anyway he gave me the checkered flag when I hit the third one and so I flew home 'cause the sun had already
    set and we weren't supposed to be out after dark. I got back okay. I was in bed at 10:30, had been a sleep for about a
    half hour, Surgelia came in and he raised the roof. He'd just gotten back to the field. 'Cause it wasn't easy to get transportation
    back in those days. I should say, we do these stages at auxiliary fields which are in the area and this was at Jennings
    Airport that this little instance took place. But we got along real good. He cleared me when I had 52 hours which left
    me with 8 hours of nothing to do but play.
- speaker: Interviewer
  text: I'm interested in who was in your pilot training with you. What kind of guys were they? Where'd they come from? What
    sort of backgrounds did they come from? Were they college guys like you?
- speaker: Respondent
  text: Most of them had college, some college. Some of them were college graduates. We even had, one chap was a pre-med.
    Now, he could have stayed out. We had professional musicians which made it very entertaining at times. A real good cross-section
    of people from all over. In the area that we worked, it was primary east of the Mississippi, people from that area, but
    north to south.
- speaker: Interviewer
  text: Were there many southern guys in there?
- speaker: Respondent
  text: Quite a few.
- speaker: Interviewer
  text: And there was no sort of re-fighting the Civil War, that kind of thing? Everyone got along?
- speaker: Respondent
  text: Oh, every day. But there wasn't a serious way. You know, my grandfather was a good example of that. He fought in the
    Civil War and he was wounded in the Battle of Bull Run. Eventually he was appointed the sergeant at arms at the house
    of representatives. Another chap was a Confederate who had also been wounded. The two of them became real good friends.
    There's no animosity--
- speaker: Interviewer
  text: A little ribbing but that's about it?
- speaker: Respondent
  text: Yeah. If you could rib in a good-natured way. I don't know of anybody that ever got rubbed the wrong way.
- speaker: Interviewer
  text: I see. So after South Carolina, first of all, how long did you stay in South Carolina?
- speaker: Respondent
  text: We were there three months.
- speaker: Interviewer
  text: And what happened after that?
- speaker: Respondent
  text: Then I went to Gunter Field for basic training.
- speaker: Interviewer
  text: Where is that?
- speaker: Respondent
  text: That's in Montgomery, Alabama.
- speaker: Interviewer
  text: And what happened there?
- speaker: Respondent
  text: Never got off the ground. I don't think, I washed out -- I think I was washed out. I think that was corroborated.
    We had some flight instructors who joined us when we were overseas and those boys I did rub. And so finally a fellow by
    the name of Smith was going to take me out and check me out. When we got through he said, "You can fly." Of course, I
    had been flying a C-47 almost unofficially sure for, every time we'd take off I'd be handling it because the pilots seemed
    to like a lot of rest. It's pretty dull for them to just be sitting there and just keeping the airplane going where to
    be told.
- speaker: Interviewer
  text: And so this is where you became a navigator then?
- speaker: Respondent
  text: No, I became a navigator, I got sent back to the camp, it was a concentration camp as we called it -- the classification
    center. Then there I was reassigned to navigation and went to Monroe, Louisiana for basic there.
- speaker: Interviewer
  text: And what sort of training did that incur? More classroom?
- speaker: Respondent
  text: That was basic just like pilot basic. It was pretty much a repetition of what we had in pilot training.
- speaker: Interviewer
  text: So nothing new for you in this?
- speaker: Respondent
  text: Just in a different vein I might say. We got through there, we went to advanced navigation which was, we were fortunate
    to be assigned to the PanAm School of Navigation which was at Miami University. There we had a couple of real good instructors.
- speaker: Interviewer
  text: And so after all your navigation training where were you ready to go overseas?
- speaker: Respondent
  text: We joined the troop carrier in the end of October.
- speaker: Respondent
  text: '[interruption]'
- speaker: Interviewer
  text: I wish I could shut that off but I can't.
- speaker: Interviewer
  text: No, I can't. I've tried.
- speaker: Respondent
  text: Do we keep on going then?
- speaker: Interviewer
  text: Oh, yeah. Absolutely. That's not me.
- speaker: Respondent
  text: Oh. We, through the fortunes of war I guess is a way to explain it even though we were expertise in celestial navigation
    we would up going to troop carrier because that's where the need was. The class went there. To begin with there was twelve
    airplanes, twelve navigators to each squadron. I guess there were fourteen navigators to the squadron. As it worked out
    the navigators were assigned to different flights. I was assigned to "A" flight. And recently I flew with a fellow named
    Be
