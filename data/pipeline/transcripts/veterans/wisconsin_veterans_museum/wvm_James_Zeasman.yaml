collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Let's start out at the beginning, I guess. Perhaps you could tell me a little bit about where you were born and where
    you were raised and a little bit about your upbringing and what you were doing prior to the attack on Pearl Harbor in
    1941.
- speaker: Respondent
  text: I was born December 8, 1926. I was born in Madison, St. Mary's Hospital and I grew up 2220 Keyes Avenue. My folks
    bought the place there in 1918 and mom was still living there when she died at 101, a year and a half ago. My sister owns
    the house now. Went to grade school at Dudgeon and high school at Madison West and graduated in '44.
- speaker: Interviewer
  text: What did your dad do for a living?
- speaker: Respondent
  text: My dad was a University of Wisconsin Ag Engineering professor. He graduated from the U. in 1914 and mom graduated
    in 1916, which is kind of unusual at that time. Dad's specialty was erosion control. They claim that he was the father
    of erosion control in the state, and I've always understood he was the only full professor in the University without a
    Master's Degree. He finagled that one and they hired him.
- speaker: Interviewer
  text: You can't scrub toilets at the University without a Master's Degree anymore!
- speaker: Respondent
  text: That's for sure.
- speaker: Interviewer
  text: So you were a high school student while World War II was raging. Perhaps you could tell me a little bit about what
    it was like to be in high school and having your 18th birthday coming up and what's the attitude, in your experience,
    among high schoolers at the time? Were the guys anxious to get into the service? Or fearful of it? Or how would you describe
    it?
- speaker: Respondent
  text: 'I was a sophomore at the time of Pearl Harbor. I don''t have a lot of memory of the European war starting other than
    the fact that I have always been a nut about building model airplanes and ships and stuff and so very interested in that
    part of it. Probably one reason for my attitude at that time, my dad was very anti-New Deal and very isolationist in his
    attitude. I don''t remember a lot of discussion at home about it but maybe that''s just ''cause I didn''t pay any attention
    to it. My folks, in hindsight, I perceive my folks didn''t get along real well, but I was the fourth of six kids, and
    by the time I came along, their truce lines had been signed. So, I wasn''t aware of argument or anything like that when
    I grew up although mother, essentially, raised myself and my younger sister. I had a younger brother that died quite young.
    At the time of Pearl Harbor, I was sitting at my desk in my room, whittling on a model airplane when I heard it come over.
    My reaction was typical of all my friends: "Those Japanese must be absolutely nuts. We''ll whip them in a week. They can''t
    see straight; they can''t make decent equipment," and all the rest of that. Now, it''s very obvious that that was a result
    of our extremely racist attitude towards Orientals. We even had that attitude because I can still, to this day, remember
    vividly pictures in Life and in newspapers of our war games in Georgia in 1941 in the Fall and the guys were training
    with broomsticks as machine guns and a big sign reading "tank" on the side of their jeep to simulate a tank. We had no
    equipment. So, we had that kind of an attitude. Of course, we didn''t know any better at that particular time. There is
    a real interesting thing though-- we had two girls and one boy of Japanese extraction in my graduating class of 301. We
    had thirty-five boys who actually were serving in uniform at the time of graduation. Those were the days of war diplomas.
    If you dropped out of school and entered the military, served honorably, you got a wartime diploma. You didn''t have to
    finish high school.'
- speaker: Interviewer
  text: How did the Japanese kids get along in school?
- speaker: Respondent
  text: To my knowledge, there was never any animosity whatsoever towards those kids.
- speaker: Interviewer
  text: Were these professors' kids or something?
- speaker: Respondent
  text: I don't know. I think at least one of them was a youngster that belonged to this Japanese family that had a truck
    farm out there by Nine Springs Sewer Plant. They were out there for years and years. I really don't know. They weren't
    in my circle of friends. Along with that, at that point my mother brought us kids up to be very, very non-prejudice. An
    incident when I was in grade school. Mom always told us we were Americans and that's all we ever knew and the school records
    wanted to know whether you're German or Japanese or English or whatever your heritage was. I wrote down American. The
    school called home and gave Mom all kinds of heat and she wanted to know why they wanted to know that. They said they
    would know better how to teach me. Mom said, "How do you teach a German as opposed to an English child?" From that point
    on they were satisfied with American. So, Mom was kind of a strong-willed person. I don't remember ever seeing an Afro-American
    in the City of Madison when I was growing up. Whether it was because I didn't know any better, whether there weren't any,
    I haven't the slightest idea. In fact, the first I saw them was when I was taking training in Texas, but I don't have
    any recollection of it. The first I remember seeing them was when I got to Korea. I don't know whether I was colorblind
    or what. I really don't know.
- speaker: Interviewer
  text: You were anxious to get into the service?
- speaker: Respondent
  text: You better believe it.
- speaker: Interviewer
  text: I grew up after the Vietnam War and the experience of that war was that young men were trying to stay out of the military.
    It's interesting to someone who grew up after that, World War II people who would like to get into the service. I'm interested
    in what made you want to go into the service so badly.
- speaker: Respondent
  text: You have to realize that World War II was essentially a popular war. Probably the only popular war in the history
    of this country, as a direct result of the Japanese attack on Pearl Harbor. That was the biggest mistake the Japanese
    ever made. They unified this country. Remember we'd been in the war for two and-a-half years when I graduated from high
    school and we had been living with it, having older brothers, friends, neighbors, and so on going into the service. However,
    I have two older brothers and a younger sister. My older sister is the only one besides I that served during the war.
    Older brother was 4F, my second brother was in University Engineering at the time the war started and he got a job with
    Boeing, and he was important to Boeing in the designing of the aircraft so Boeing kept him busy out there, although he
    kept wanting to get in because he did have flight training, but Boeing wouldn't let go of him. My older sister joined
    the WACS and served out in California for I don't know how long. A year maybe. I never worried about my future when I
    was in high school because I knew what it was. We were going to serve, period. So, the only thing remaining was do you
    wait till they draft you or do you enlist and have some choice as to what branch you're in? I wanted desperately to get
    into the Air Force. My eyesight was such that the only thing that would take me is I enlisted in the inactive enlisted
    reserve for an ASTRP program. Are you familiar with that?
- speaker: Respondent
  text: In fact, I left a ASTRP patch here. The patch
