collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: So, Carolyn, tell me a little bit about yourself.
- speaker: Respondent
  text: Um, I actually am from Madison. My dad was in the Air Force, so I was born in Japan when he was on active duty. And,
    um, we moved to Madison in, uh, in the late '60s, and we were stationed at Truax Field. We actually lived at Truax Field,
    where the MATC parking lot is now. We lived in a trailer there. And, um, so, I went to high school in Madison, elementary,
    grade school, all of that here in Madison. And then I decided I wanted to join the military. So I wanted to follow in
    my dad's footsteps. As a kid, I always said I wanted to go back to Japan. I wanted my first dorm to be there. And it happened.
    I joined the military. I was stationed at Misawa, Japan. And, um, my daughter was born. First baby of the new year, in
    1998.
- speaker: Interviewer
  text: So, where in Japan were you born, then?
- speaker: Respondent
  text: I was born in Tokyo, Johnson Air Base.
- speaker: Interviewer
  text: What year was that?
- speaker: Interviewer
  text: So, do you remember growing up in Japan at all?
- speaker: Respondent
  text: No. I was, um, one years old when we left, came back to the States.
- speaker: Interviewer
  text: All right. So, when you're back here, what was it like being here, with the army, er, with an Air Force dad?
- speaker: Respondent
  text: Um, I just remember all the trailers. Out at Truax Field, the big buildings, you know the SAGE building is still out
    there, um, I remember going to the doctor on Wright Street. Um, MATC wasn't there, East Towne wasn't built, West Towne
    wasn't built, it was mainly farm land all around here. Only place you could go shopping was downtown here, at Gimbel's
    and Manchester's, and, um, Rennebaum's, and so we used to come downtown with my mom and dad shopping all the time. Um,
    Madison's changed a lot since we moved here in the late '60s.
- speaker: Interviewer
  text: Um, so, your dad was in the Air Force. You followed and went Air Force yourself, too?
- speaker: Interviewer
  text: Did you enlist right out of high school?
- speaker: Respondent
  text: One year after high school I enlisted into the Air National Guard in 1980. Um, one of the first, um, black females
    to enlist with the 115th Fighter Wing. Um, and, uh, then in '85 I went active duty.
- speaker: Interviewer
  text: Were your parents surprised at all by your decision?
- speaker: Respondent
  text: My dad didn't want me to go, and neither did my mom, because I didn't have a college degree. Of course, when my dad
    was in the military, um, racial tensions were really high. So he did a lot of fighting for minorities when he was in the
    military. And he wanted all four of us girls to go to college, get our degree, and then if we wanted to enlist, enlist
    as an officer. I was not --I didn't want to go to school [laughs].
- speaker: Interviewer
  text: Twelve years is plenty [laughs].
- speaker: Respondent
  text: Weekly [laughs].
- speaker: Interviewer
  text: I hear you there. Uh, what about your mom?
- speaker: Respondent
  text: My mom, she followed my dad until we got there to Madison. And, um, all of a sudden, she decided she wanted to work,
    and she also didn't want to move anymore, because my sister, above me age range, started exhibiting um, anxiety, and,
    from all the moving, going to different schools and everything. So she wanted all of us to grow up somewhere without all
    the moving. So she wanted my dad to get out, and he did.
- speaker: Interviewer
  text: What about you, was she against you going into the military?
- speaker: Respondent
  text: Um, my mom has been so supportive in every single thing that any of us girls have done. Best mom in the world, she,
    you know, she never discouraged us from doing anything. She always encouraged us to do what we wanted to do. Learn from
    your mistakes. Yep. But the only thing that I'll say is, uh, um, two things, my mom wanted that when she would discipline
    us, she had this way of disciplining us that we would turn around and go, "oh, thank you for disciplining me, we love
    you so much"! [Laughs]. You know, she had that way, and then the other was that she always said, "be nice to anybody and
    everybody who is ever in your life," because you never know when they may end up in your life again. They could be that
    doctor over you on an emergency room table, where you're dying, they look down and go, "ooh, I remember her, she was really
    mean to me when I was in high school", you know? They might let you die. So my mom said, "always be nice to anybody and
    everybody".
- speaker: Interviewer
  text: Did you take that philosophy with you to the military?
- speaker: Respondent
  text: I did, and I take it with me now.
- speaker: Interviewer
  text: That's good. How about your sisters, what did they think of you?
- speaker: Respondent
  text: Um, I think my sisters, they just, they're, they all three went to college, and, but they knew I was different. And,
    they were worried about me, but they supported me.
- speaker: Interviewer
  text: Where, where are you in the order?
- speaker: Respondent
  text: I'm the third. Um, so there's two above me and one below me.
- speaker: Interviewer
  text: Did your extended family have any opinions about --
- speaker: Respondent
  text: Nothing at all. No. And, and, it, everybody was just very supportive of everything that all of us girls did.
- speaker: Interviewer
  text: So, when you decided to go in, what were you doing between high school and your decision to go in?
- speaker: Respondent
  text: Um, not a whole lot. Not a whole lot of good things, either. I was lost. I knew I wasn't a good student, um, and I
    knew I needed to do something, because my mom and dad that we needed either to work, or we needed an education. And, so,
    I wanted to get out of Madison, because, um, I wasn't doing well here, um, I was working four jobs at once. Um, my first
    boyfriend and I were getting back together, breaking up, getting back together, breaking up, so I wanted to move away
    from him, actually. And so I joined the active duty to get away from him. And I ended up marrying him. [Laughs].
- speaker: Interviewer
  text: Congratulations.
- speaker: Respondent
  text: Yeah, right [laughs]. We ended up divorcing, too.
- speaker: Interviewer
  text: '[Laughs] That''s not quite as funny.'
- speaker: Respondent
  text: But I have two beautiful children.
- speaker: Interviewer
  text: That's good. So, were you excited when you enlisted? How did you feel about it?
- speaker: Respondent
  text: Well, when I first enlisted into the Air Guard, I thought I was going active duty. When I got down to basic training
    and everything else, talking to everybody, all the girls down there, you know they were talking about how they're going
    to their next duty station and everything else, and I was told, "you're going back home". And I was like, Really? Because
    I guess I didn't understand the difference between the Guard and the active duty. I, I just didn't. Um, so I was excited,
    but yet I was very scared. Um, I went ahead and did the, um, the Guard thing because they wouldn't let you switch over
    to active duty. I came back, didn't do very well again because it wasn't full time, and, um, tried to go back to school,
    working many jobs again, and then in '85 decided to go active duty. So when I decided to go active duty, went down and
    saw the recruiter, in '85, '84 or '85, and I, I guess the numbers weren't that good then, because he ended up putting
    me back in as a raw recruit, as if I had never been in before. So I ended up going to basic training again, at Lackland
    Air Force Base, so I actually, um, wear the oak leaf cluster on my graduation ribbon, for basic training for Air Force,
    because I went through twice.
- speaker: Interviewer
  text: Where'd you go the first time?
- speaker: Respondent
  text: Lackland Air Force Base, Texas [laughs]. Same place.
- speaker: Interviewer
  text: So, where were you put the second time?
- speaker: Respondent
  text: Um, the second time, I went through basic training just as if I was a raw recruit again, and, um, then I was stationed
    in Misawa Japan. I went in as a, um, a cook. And, um, I got my first duty station, which was Japan. And it was in Misawa.
- speaker: Interviewer
  text: Were you happy about that?
- speaker: Respondent
  text: Oh, I was so happy about that. I really was.
- speaker: Interviewer
  text: Well that's good. Was boot camp better the first or second time?
- speaker: Respondent
  text: Oh, girl, please [laughs]. Well, the first time, you know, I went through and, um, I was recruited into drum-bugle.
    So, um, I was pulled out of my flight, and um, I was put in a, co-ed flight with, um, drum-bugle. So, we got to wear our
    blues the first time, we didn't do the, a lot of the things that they did, details and stuff like that. We went to football
    games and played, we did parades, um, so, basic training the first time for me, okay, it was easy, because I was in drum
    and bugle, playing the contrabass, um, and I sat first chair, so I was the first female that they had that played contrabass.
    Cause it's like a tuba, and so the guys hated me, because one, I was a girl, and two, I was black. And I beat all of them
    out in playing the tuba, er, the contrabass. So they did not like me.
- speaker: Interviewer
  text: Did you get any repercussions for that? For being female or black?
- speaker: Respondent
  text: Um, I think the only thing was that, uh, you know the ribbing, um, it just, it was, it wasn't that bad. Um, I would
    say more over because it was drum and bugle, and it was different for us. It, it was more fun. It was more fun and it
    was laid back. Yeah.
- speaker: Interviewer
  text: For those who don't know, can you explain drum and bugle?
- speaker: Respondent
  text: Um, drum-bugle would be the band, the Air Force band, but they called it drum and bugle. Um, instead of playing band
    instruments, we played drum corps instruments, so instead of the tuba, we had the, um, the contrabass. Instead of the
    flutes and stuff, we had the sousaphones and, it was all drum, drum corps, um, equipment instead. Yeah. So it was, we
    played for graduations, at all the graduations, um, we played anything that they needed music for, we were there.
- speaker: Interviewer
  text: All right. So then the second time through --
- speaker: Respondent
  text: That was hell [laughs]. And the reason was, is because when I got there, I really thought I'd only be there for two
    weeks. You know, because my recruiter told me two weeks, get your issue of new uniforms, your name in the computer, and
    then you'll be gone. I don't think so. I went in as a raw recruit, yes they gave me a chance to take the, um, test early,
    to see if I could graduate early. It was me and another female that was in the Army. We marched over, we took our exam,
    we both missed it by, like, one point. Yeah, so we ended up doing our six weeks at basic training all over again. And
    then when we got back, they made us dorm chief and assistant dorm chief. And if you could imagine, the two of us were
    in our mid- to late twenties, and everybody else was like, eighteen, nineteen. So there was a lot of fighting, a lot of
    stupid stuff going on. Girls sneaking out of the barracks to meet boys, and stuff like that. Somebody got caught, and
    so who do they call? The dorm chief and the assistant dorm chief, and they want to know why our flight was falling apart.
    You know? But it wasn't us, it was the other girls. You know? You can't control what the other girls are doing. And, so,
    um, that's what we told the first sergeant. We can't control what they're doing, but yet they try to tell you that you
    should be controlling what they're doing, because they should be listening to us. [Laughs].
- speaker: Interviewer
  text: So, when stuff like that would happen, did you do any disciplinary stuff, or was it the higher-ups that did that?
- speaker: Respondent
  text: It was the higher-ups that did it, you know, but at the same time, whoever is on top in basic training, they always
    want to pull you down, because they don't want you to think that you're any better than they are. And so they're always
    trying to get you in trouble for something. Because you're, you're the one in charge, right? It's, I think it's no different
    than when the teacher leaves the classrooms and leaves somebody in charge, and everybody wants to get that person in trouble,
    right?
- speaker: Interviewer
  text: Do you have any, like, stories?
- speaker: Respondent
  text: Um, basic training, not really. I, we went to church a lot, you know? That was a refuge for everybody, was to go to
    church. I mean, we met boys and stuff out at the Chaparral and did dancing and stuff like that, but, we didn't really
    have stories that we got into. Yeah.
- speaker: Interviewer
  text: No shenanigans or anything?
- speaker: Respondent
  text: No, we really, I, you know, and it's amazing that nothing like that happened when I was there.
- speaker: Interviewer
  text: Did you make any friends?
- speaker: Respondent
  text: I made, uh, one friend. I don't keep in contact with her anymore, but, um, I remember her name was Lynne LaPlant??
    And, um, she did come to Wisconsin and visit, um, and we took, uh, Blackhawk to Milwaukee and got coffee one day. When
    I was in the guard, that was fun. I'm back in the early '80s, um, every weekend we're going somewhere on orders. California,
    Hawaii, Florida, um, that was back when they would give us dummy orders because planes were flying somewhere, and if they
    had seats, they would let you fly along, and, so, yeah, we went to Hawaii, we played on the softball team, did a lot of
    traveling. So, the, the military has changed a lot, the Guard has changed a lot. Um, there's not as much money as there
    used to be, that you can do all that traveling, and nonsense that we used to do. The rules are a lot more strict.
- speaker: Interviewer
  text: Are you still in?
- speaker: Respondent
  text: No, I'm not. I got out in '97.
- speaker: Interviewer
  text: Right, so, your first duty station was in Japan, you said?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: So, tell me about Japan.
- speaker: Respondent
  text: Oh, I loved it because it was, all of the lights, everything there is so bright, even their dump trucks have lights
    on them at night, they're painted purple, and pink, and red, and green. Um, you drive on the other side of the road. Um,
    the food is so good. Um, we lived ten minutes away from the ocean, um, twenty minutes away from the mountains. I learned
    how to ski at Ape Mountain, um, my experience there, was, um, I was married at the time, so, a bunch of us went skiing
    to Ape Mountain. I had never skied before, and so I started out on the bunny hill. In Japan, people start their children
    out very young, um, in everything, it seems like. Cause the kids were, like, one years old, and they're skiing, you know?
    So here I am, I'm on the bunny hill, and finally I felt a little better, that I could go down, so I got on a bigger hill,
    and I tucked my poles underneath, and I screamed all the way down the hill, so if you can imagine, people jumping out
    of my way, kids jumping out of my way, and I'm screaming all the way down the hill. That's how I learned to ski in, in
    Japan, Ape, Ape Mountain. Yeah. So, we would go to the Pachinko parlors, um, the gambling. Um, at night, they had, during
    the summer, in spring and fall, they had the carts of, uh, people selling food, where you could go walking around downtown.
