collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Terry, tell me about your background and life circumstances before entering military service.
- speaker: Respondent
  text: Man, you're asking me to go way back. Born and raised on a farm, went to Melrose High School, was not a distinguished
    scholar in school. Actually, in my senior year I reached an agreement with our principal; I agreed to leave high school
    and he agreed to let me go early, with the stipulation that if I took the GED test and Basic or AIT, passed it, the high
    school would issue me a diploma. So my class graduated in May and I technically graduated in July of 1965.
- speaker: Interviewer
  text: Okay. When did you enter into military service?
- speaker: Respondent
  text: February 10th, 1965. I went from La Crosse to the Twin Cities, and from the Twin Cities went to Fort "Lost in the
    Woods," [laughs] Fort Leonard Wood, Missouri for basic training and AIT [Advanced Infantry Training], you know, February,
    March, April time-frame of 1965. And after AIT, then I went to Fort Benning for Jump School, and that was in July of 1965,
    at the peak of the heat in Georgia.
- speaker: Interviewer
  text: What were you doing at the time when you entered into the service?
- speaker: Respondent
  text: I was working part time as a store clerk at the old grocery store in Melrose, general store, and we had forty acres
    on our farm and my grandma and grandpa had a bigger farm.
- speaker: Interviewer
  text: Why did you enter the military service? Were you drafted or did you enlist and how did you feel about it?
- speaker: Respondent
  text: I enlisted in '65 when I got the early out of high school, because back then the military probably saved a lot of
    kids that were in trouble or were not good students or whatever. Then the Army gave me the second chance. Thank goodness
    for Uncle Sam.
- speaker: Interviewer
  text: What service unit did you enter into?
- speaker: Respondent
  text: After Basic and AIT, then I went to Jump School in July - that was three weeks - and then was immediately assigned
    to the 1st Cav Division. That had formerly been the 11th Air Assault, but they changed the name to the 1st Cav, which
    everybody knew was on its way to the Republic of Vietnam. And we left, it was like in August, from Savannah, Georgia,
    for Vietnam. The whole 1st Brigade, three thousand of us, were on the USS Geiger. We went from the East Coast and it took
    us thirty-two days and one hurricane to get to Vietnam, which included a twelve hour stop in Hawaii. Of course, I don't
    think I had ever been outside of Wisconsin, so for a farm kid it was a big world out there.
- speaker: Interviewer
  text: Okay, I just want to backtrack a little bit. Can you tell me about your induction interview and the physical before
    you got into basic training, and why you chose to go into the Army as opposed to any of the other services?
- speaker: Respondent
  text: That's a good question. I guess the only thing I knew I wanted for sure was to jump out of airplanes, Airborne, and
    the Army was the logical choice for that. So when I enlisted, the only thing I asked for was to go to Jump School, and
    so I can actually say Uncle Sam fulfilled every promise to me that he made when I volunteered to join the Army. I never
    even thought about any other branches of service, except jumping out of airplanes. It helps to be young and foolish.
- speaker: Interviewer
  text: Okay, can you tell me a little bit about your basic training? Where it was, and maybe just describe the camp a little
    bit.
- speaker: Respondent
  text: As in all Army camps, what you do is you have high-ranking officers looking around the country and the world for the
    worst spot in a particular state, and once they find that spot they put an Army base there. Fort Leonard Wood, Missouri
    was one of those spots. That's where I went to Basic there; I'm just glad I was a farm kid, just off the farm, so the
    physical stuff wasn't that overwhelming. Basic training is probably more mental, because they literally - I don't know
    if they acknowledge it, but what they wanted to do is break you down and build you back up mentally, you know, in the
    Army way. When you have been independent all your life and all of a sudden you're thrown into a platoon, a company, brigade
    or battalion, or whatever, you want, when somebody marches, you want them to all march together, so they train you as
    a unit.
- speaker: Interviewer
  text: And what were you trained for? You talked a little bit about being in Jump School. Exactly what training did that
    involve?
- speaker: Respondent
  text: 'In basic training? Well, all Army people, the basic training is that it is basic infantry training, so number one,
    no matter what you end up actually doing, whether you''re a cook or a clerk or whatever, you''re still, when push comes
    to shove, you are still a basic infantryman and can be, ah, your job can change quickly if you''re in combat, which whether
    it''s World War II or Vietnam, a lot of the cooks and bottle washers ended up being infantry if they were pushed into
    service. If your camp was attacked, as I am sure it was in World War II when they had the Battle of the Bulge, you don''t
    want to be sitting at your typewriter when the bad guys are coming through the fence. So that was the basic, learn how
    to do that fun stuff: throw grenades, shoot various of the small arms that infantryman have, whether it be a rifle, M79
    grenades; M79 is a grenade launcher. And then the physical training and, of course, then there was the classroom on first
    aid. If a person stopped breathing and is bleeding, what do you do first? First, you stop the bleeding, because a person
    can literally die quicker from bleeding to death than not breathing, which probably few people seventeen years old knew.
    Ah, how to do basic first aid in the field, very basic. You had your first aid kit; somebody gets shot, you just slap
    the bandage on it and stop the bleeding. They really stress, in Basic, individual skills and then working getting you
    to work as a team, whether it would be with your squad or your platoon or your company. So it''s all new. It''s a different
    world. No other job that I - no other job has the end result of you, on purpose, killing the bad guy. Policemen are trained
    to expect the worst, but their goal is to take them alive; that''s not the Army''s goal. If you are getting into war,
    your job is to inflict as many casualties as possible on the other guy, before they inflict them on you.'
- speaker: Interviewer
  text: While you were in basic training, do you remember any of your instructors, and did you make any close friends or buddies?
- speaker: Respondent
  text: 'Yeah, when I was in Basic there were quite a few, from, like Minnesota, Wisconsin, up in this area. Actually in Basic
    I had reached a compact with two other guys; the three of us, after Basic, AIT, we were going to go to Jump School. Of
    course, they chickened out, so I was the only one of the three that ended up going to Jump School. One''s name was Lettner;
    the other one, I can''t even remember his name any more. But after Basic and then AIT, I never did see them again. One
    of them doesn''t live that far away, but I never took the time to even look him up. You know, from remembering back, geez,
    that''s thirty-five years, forty years ago - a long time ago. When I enlisted I didn''t go in with anybody from Melrose
    or back home, so you just had to make new friends as you were going, and unless you happened to be going to Jump School,
    they would have went with me, but they didn''t, so then you go to AIT, which is Advanced Individual Training. Mine was
    in Field Communications: telephones, radios, all that good stuff. You meet people there, but again, none of them went
    to Jump School, either. So each phase, unless you happen to luck out with somebody that you''d met in Basic or AIT, usually
    you started all over again. So in one way it was good; the Army did force you to meet new people. Whether you wanted to
    or not, you had to get to know and acknowledge new friends, new buddies, every unit you went to.'
- speaker: Interviewer
  text: What did you do for recreation when you weren't in training?
- speaker: Respondent
  text: Oh, now you're really - what did we do? Go to movies. Of course in Basic and AIT at Fort Leonard Wood, you know they
    had the theaters, the EM Clubs. In Basic you were pretty much locked into your Basic training area. AIT, your advanced
    training, you had your free time, I mean that was pretty much eight hours a day, five or six days a week, so we had more
    free time, which allowed us to go - probably the biggest pastime was, if you didn't drink beer, you had to go to the movies.
    I mean we had no wheels, and I suppose you could have taken a bus to town, but back then most of the towns outside of
    Army posts were not real reputable places to go, and the Army post had the basics. They had the movie theaters, if you
    wanted to go to the EM Club, you know to buy your toothpaste and toothbrush and if you wanted to buy your beer, whatever.
    So you could survive on post. During Basic and AIT I really didn't go off post, I bet, probably more than twice in that
    whole sixteen or twenty weeks.
- speaker: Interviewer
  text: Do you have any good stories from basic training?
- speaker: Respondent
  text: Well, I guess every company always had the one person. Ours, the guy's name was, I think was Dolcie. Ah, he was just
    a - he could not walk and chew gum. It's funny he didn't kill himself. In Basic when you are on the firing range you stand
    in front of your shooting foxhole, a cement-lined hole in the ground where you're supposed to, you had to take three steps
    back, get down in the hole. He took three steps back and proceeded to fall into it. To this day it amazes me how he didn't
    hit his head or get killed or something like that. That's probably the - it's funny, but you had to feel sorry for the
    guy. I don't know how many times he was recycled. Other than that, it's such a learning experience and they keep you literally
    seven days a week; you really didn't have much free time, you know, at least for the initial eight weeks in basic training.
    So that was probably the highlight, the guy falling in the foxhole.
- speaker: Interviewer
  text: Can you tell me a little bit about your first assignment? How did you get there, and any stories or feelings?
- speaker: Respondent
  text: Ah, like unit assignment? Probably going to Jump School, and there were probably a couple of hundred of us in our
    class. Once we graduated, I bet ninety per cent of 'em went to the 1st Cav Division, 'cause the 1st Brigade was Airborne,
    and so just about everybody that graduated in that Jump, from our class anyway, was immediately assigned to the 1st Cav
    to fill out the 1st Brigade for assignment to Vietnam. I remember there was one guy that was so happy he was going to
    the Special Forces, and it's kind of ironic; when I came back from Nam the first time I was with the 6th Special Forces
    at Bragg. I ran into him. He was just on his way to Vietnam, so the shoe was on the other foot, so to speak. I mean, he
    was happy he wasn't going directly to Vietnam back then. I don't think we knew what it was - this was in 1965. Ninety-five
    per cent of us didn't have a clue where Vietnam was and most of us also didn't know it was gonna last
