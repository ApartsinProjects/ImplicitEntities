collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter military service?
- speaker: Respondent
  text: I was drafted on June 20th, 1944. There were twenty-one of us that went down to the draft board in the city of Chicago.
    I had planned to go in the Navy, but there was a very aggressive Marine sergeant that needed some volunteers for the U.
    S. Marine Corps. Instead of going to Great Lakes Training Center near my home, four of us went to San Diego boot camp
    in California.
- speaker: Interviewer
  text: What did your family at home think when you came back and said I'm going in the Marines and not the Navy?
- speaker: Respondent
  text: They were really surprised. I had been living with my uncle and aunt for several years. My mother was deceased. My
    father had remarried and moved to New York. Being surprised about this change, they knew I was more a soldier than sailor.
- speaker: Interviewer
  text: You were born in 1926, so you were only eighteen when you went into the Service?
- speaker: Respondent
  text: Eighteen years old in February of 1944.
- speaker: Interviewer
  text: Had you finished high school at that time?
- speaker: Respondent
  text: I was born in February, I hadn't finished high school. I was given a deferment until June. As soon I graduated, I
    was supposed to report to my draft board.
- speaker: Interviewer
  text: And where you attended or where you graduated from high school is relevant, also, isn't it? It is of interest to the
    story.
- speaker: Respondent
  text: It seems to be the time that I started my military career. My father had asked me if I would be willing to go away
    to military school. I was living with my uncle and aunt, and things were not going to well there so I thought it would
    be better if I accepted my father's offer. I enrolled at Northwestern Military and Naval Academy in the fall of 1942.
    This school was located in Lake Geneva, Wisconsin. It was a change of life as I learned the discipline of military life.
    The first year was the plebe year as it is in West Point. I was homesick at first, but eventually learned and accepted
    this change for two years. It was really worthwhile for a teenager. It was quite the thing getting up early in the morning,
    taking care of our rooms, and everything had to be clean, and spit and polish, and everything in that order. I had to
    do all of those extra activities for the upperclassmen. And every day we would march to mess with the bagpipes. It was
    something real different. But it was a real help. After a while, I enjoyed it. Now I go back to the school which is located
    in Delafield, Wisconsin. It now has been united with St. Johns Military. The school is now called St. Johns Northwestern
    Military Academy.
- speaker: Interviewer
  text: So when you, if this the term, graduated, or finished at military school, you probably expected to be called into
    the Service?
- speaker: Respondent
  text: Right! I really did expect that.
- speaker: Interviewer
  text: Would you have considered going into the Service if you weren't drafted, given your military-- given the military
    character of your high school?
- speaker: Respondent
  text: I really don't know. I certainly never thought about it. I enjoyed the discipline of the military. Many people when
    they do serve their time, they usually get out right away.
- speaker: Interviewer
  text: I wonder if it was easier for you to endure boot camp, and adjusting to military life after having all that previous
    training at a military high school?
- speaker: Respondent
  text: Yes, it was. I served my time and came home, and I was released from the Marine Corps so I could attend college. I
    joined the ROTC in college, and received a commission as a 2nd Lieutenant in U.S. Army Reserve and later I served in Korea.
- speaker: Interviewer
  text: So your boot camp for the Marines, was it Camp Pendleton?
- speaker: Respondent
  text: Camp Pendleton was the advanced training. San Diego where I went in the beginning was the boot camp.
- speaker: Interviewer
  text: And was that pretty tough?
- speaker: Respondent
  text: Well for a young kid, it was tough training. The sergeants kept us busy with forced marches with full packs and rifles.
    You needed good training that was needed if you were going into combat in the near future.
- speaker: Interviewer
  text: How did you feel about going into combat?
- speaker: Respondent
  text: We were all young kids, and we were excited and really didn't think of combat. We trained over on the islands before
    we found out that our destination was Okinawa. We did the best we could in our training for combat and adjusted accordingly.
- speaker: Interviewer
  text: You were drafted on the 21st of June, 1944, and then in April of 1945 you were sent to Okinawa. This was your first
    combat experience. Was that your first destination overseas?
- speaker: Respondent
  text: That was our first destination overseas. As soon as we finished our training at Camp Pendleton, California we joined
    the 1st Marine Division in the Solomon Islands. Later we learned that we were training for the invasion of the Japanese
    island of Okinawa.
- speaker: Interviewer
  text: Now, April 1, 1945 that was an important day for the invasion of Okinawa, wasn't it?
- speaker: Respondent
  text: It was said that it was a bigger invasion than the June 6th, 1944 invasion of Europe. We had many ships for this invasion.
    Many of the ships were hit by kamikaze planes, causing casualties in the U.S. Navy. After we went across the island in
    three days, we were sent down to the southern part of the island where most of the Japanese were holed up in the caves.
- speaker: Interviewer
  text: When you have a lot of Marines fighting alongside us Army divisions, is there any difference in how the units are
    going to be used?
- speaker: Respondent
  text: Well, it depends on the tactics of the different organization. The U.S. Army seemed to have more artillery before
    they sent the troops ahead, whereas the Marine Corps seemed to specialize in the fact that their infantry didn't need
    that much artillery preparation. At this time when I was involved in this, I was a demolition person. And many times we
    were trying to close up the caves with the demolition. We were trying to get the Japanese soldiers out before we closed
    up the cave.
- speaker: Interviewer
  text: War is a terrible event especially for the young soldiers. You are scared like everybody else. You see so many of
    your friends injured and killed, and you really don't know when it is your turn. You just keep praying.
- speaker: Respondent
  text: So you were in the First Marine Division?
- speaker: Interviewer
  text: Yes, that is correct.
- speaker: Respondent
  text: When you were in combat on Okinawa, did you get enough sleep?
- speaker: Interviewer
  text: You never get enough sleep when you are under the conditions of battles, and the weather and the terrain. There was
    a period when it rained for about 2 weeks, and it was a challenge to keep dry when you are living out of a foxhole. You
    did the best you could because many soldiers didn't keep their socks dry when they needed them. That was important because
    there was a lot of trench foot when you didn't take care of your feet.
- speaker: Interviewer
  text: Were there flame throwers used in Okinawa?
- speaker: Respondent
  text: The platoon I was in was called the Assault Platoon. In the Assault Platoon we had flamethrowers, bazookas and demolition
    personnel. The personnel then were assigned to the line companies when needed.
- speaker: Interviewer
  text: Did the Japanese fight bravely on Okinawa?
- speaker: Respondent
  text: The Japanese really did fight bravely. It was a tough job (the infantry) to dig them out of the caves so we could
    secure the island. There were about 30,000 Japanese troops on the island. They had years to build connecting caves in
    the hills on the south end of the island. We lost a great deal of our soldiers and marines defeating the Japanese on this
    island. Toward the end of the campaign when they realized that they were losing, many of the Japanese committed suicide
    by jumping off the hills into the sea. It was somewhat similar to Iwo Jima. The Japanese soldiers were told by their leaders
    that they had no reinforcements, and this was their "tomb."
- speaker: Interviewer
  text: Did the sustaining of so many casualties on Okinawa, did that affect the thinking about the invasion of Japan theory?
- speaker: Respondent
  text: After the victory in Okinawa, they knew that in order to defeat the Japanese they had to plan for the invasion of
    Japan. Our great president who had the opportunity to save lives by dropping the bombs on Japan saved many lives. This
    action saved both ours and Japanese lives. Thank you, Harry Truman!
- speaker: Interviewer
  text: Mr. Radnitzer, you received a medal for bravery in Okinawa, didn't you?
- speaker: Respondent
  text: You are correct. The U. S. Marine Corps awarded me a Silver Star for blowing up caves there that were holding up our
    units. As a young kid, you do a great deal of things that are very daring. I don't remember the details. There are so
    many soldiers there that do such brave acts and really don't get recognized. I was one of the fortunate ones.
- speaker: Interviewer
  text: At that time, you had the rank of private?
- speaker: Respondent
  text: I was a private for 14 months. It was tough during World War II to make P.F.C. in the U.S. Marine Corps.
- speaker: Interviewer
  text: Do you recall where you were stationed when the Japanese surrendered or say when the bomb was dropped in August, 1945?
- speaker: Respondent
  text: I was stationed in Okinawa when the Japanese surrendered, and when that occurred we knew that we had to stay in Okinawa
    a little longer because we didn't have enough points. In order to get more points they sent the 1st Division over to China
    to help protect Chiang Kai Shek from the Communists.
- speaker: Interviewer
  text: Did you have a big celebration when you heard the good news?
- speaker: Respondent
  text: Well, I think we did. We were very relieved that the war was over. No more shooting the enemy, and the enemy wasn't
    shooting at us.
- speaker: Interviewer
  text: Did you stay in touch with your family while overseas?
- speaker: Respondent
  text: I wrote a great deal of letters to my father and a girlfriend that I had. Many times I would get cookies from my girlfriend
    and also letters from my father and maybe even some types of food from my aunt and uncle.
- speaker: Interviewer
  text: Did you see any famous entertainers while you were overseas?
- speaker: Respondent
  text: Not many. It seemed like we were too busy fighting the war. Remember the infantry does all the dangerous acts against
    the enemy. Sometimes we didn't have time to go to the rear and see all that entertainment.
- speaker: Interviewer
  text: After Okinawa, you were sent to China?
- speaker: Respondent
  text: Yes, we were sent to China to fulfill our point category and there we were sent to Peking where Chiang Kai Shek had
    his headquarters. Our unit was located in the Austrian Embassy in that city. We collected all the weapons from the surrendering
    Japanese. We were there protecting Chiang Kai Shek until about May of 1946.
- speaker: Interviewer
  text: Did you find the Chinese people interesting and pleasant?
- speaker: Respondent
  text: Yes, many of the families would invite us out to their homes for meals. We were able to go out and shop in the stores
    when we were off duty. Later when I became acting Sergeant of the platoon but I never got promoted because they wanted
    to sign over for another four years in the U.S. Marine Corps.
- speaker: Interviewer
  text: They wanted you to extend your tour of duty?
- speaker: Respondent
  text: Yes, but they wanted me to stay in the U. S. Marines Corps, but I wanted to go back to school and get a degree.
- speaker: Interviewer
  text: It was a good thing that you didn't stay in the Marine Corps because several years later all the US Marine Corps reserves
    were called up for the Korean War, and they ended up in Northern Korea where we lost so many soldiers and Marines.
- speaker: Respondent
  text: So you graciously declined the promotion?
- speaker: Interviewer
  text: Yes, I thought it was more important that I return home and go back to school.
- speaker: Respondent
  text: Then you were sent home from China by ship so you that could get discharged from the service.
- speaker: Interviewer
  text: Yes, They finally sent me back to the Great Lakes Training Center after a long trip through the Pacific, to Hawaii,
    to California and there at the Great Lakes I got my discharge from the Marine Corps.
- speaker: Interviewer
  text: So was it difficult readjusting to civilian life?
- speaker: Respondent
  text: No, I had the experience of being away from home for two years when I was at military school so I think I adjusted
    very well after going through all that military service in the islands.
- speaker: Interviewer
  text: So you used the GI bill at that time?
- speaker: Respondent
  text: Yes, I did. It was a great opportunity to get a good start on my education.
- speaker: Interviewer
  text: And you chose to go to which school?
- speaker: Respondent
  text: I went down to the University of Miami for a year and got basic credits and then the last three years I went to Knox
    College in Galesburg, Illinois.
- speaker: Interviewer
  text: Did you major in history?
- speaker: Respondent
  text: I didn't major in history to begin with because I wasn't sure what I wanted to do. I finally decided that Finance
    was my field and I took many accounting courses while I was at the school.
- speaker: Interviewer
  text: When did you go to work?
- speaker: Respondent
  text: Well, before I was called back in the Army, I worked at the Harris Trust and Savings Bank in Chicago. When I came
    back from the Marine Corps, they took me back there, and I worked there for a while at this same bank.
- speaker: Interviewer
  text: How was it that you wound up back in another hot spot - in Korea?
- speaker: Respondent
  text: Well, I went to school at Knox College, and when I graduated from there in 1950 - I had enrolled in the ROTC program
    there, and I graduated with my degree and also as a 2nd Lieutenant in the U.S. Army. When I graduated from Knox with a
    BA degree, I was an officer in the U.S. Army Reserve. I worked for three months, and then after that when I was called
    up, I was sent to Fort Leonard Wood, Missouri, near St. Louis, for training.
- speaker: Interviewer
  text: So when you were called up, that was in the Army not the Marines?
- speaker: Respondent
  text: I was called up in the U.S. Army, and I was sent down to Fort Leonard Wood to train soldiers for their service in
    Korea.
- speaker: Interviewer
  text: You were training troops because of your own experience?
- speaker: Respondent
  text: Yes, the lieutenants were the instructors with capable sergeants and you trained these new recruits.
- speaker: Interviewer
  text: How did you get to Korea? By airplane?
- speaker: Respondent
  text: At that time all the troops were going to Japan first by boat. We received some training in Japan, and then we were
    assigned to our respective infantry divisions in Korea.
- speaker: Interviewer
  text: Did you come in at Pusan, Korea?
- speaker: Respondent
  text: Yes, I believe that was the port that was open then. Then we were sent up to the 38th Parallel by train. I joined
    Fox Company, 2nd Battalion, 31st Infantry of the 7th Infantry Division. It had just returned from northern Korea, and
    it was now taking replacements.
- speaker: Interviewer
  text: Was this near the Iron Triangle in Korea?
- speaker: Respondent
  text: Yes, and this was at the 38th parallel. We were there for a number of months, keeping the North Koreans and Chinese
    soldiers at bay. We were sitting on one of the many hills watching.
