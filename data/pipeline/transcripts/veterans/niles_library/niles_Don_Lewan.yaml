source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Lewan, how did you come, what were the circumstances of your entering service?
- speaker: Respondent
  text: On December 7, 1941, I wanted to join, but my father would not let me join. I was only seventeen years old. I was
    sure that my dad was going to let me in because in World War I his mother had pulled him out twice because he was underage.
    And he joined, he was standing in line to join a third time, and he was talking to a guy in front of him. And the guy
    said, "Well, why don't we join as brothers?" So he joined as brothers. The next time Grandma heard from him he was in
    France, and there wasn't a damn thing she could do about it. I thought sure that my dad would sign the papers for me right
    away, but I guess dad understood the horrors of war, and tried to delay it as long as he could. Finally, it took a year
    of sitting at the dinner table and doing a little bit of squabbling back and forth. Finally, my mother said, "Sign the
    papers; he's going to go anyhow." When I went at that time, the Navy only had six-year cruises. They didn't have four-year
    cruises or until the duration so I signed for six years. I went in on December, the 8th, 1942. I got out in December,
    1948.
- speaker: Interviewer
  text: Had you finished high school?
- speaker: Respondent
  text: No sir, I quit high school. In this situation with my dad, trying to get him to sign the papers, I had quit high school,
    and I took on any kind of job I could to make a buck. At home at night we went through the same routine until he finally
    said "okay, we'll sign the papers." At that time the Navy would not take a four year enlistment so I went for six and
    I'm not sorry I did. I made a lot of friends. We still get together. We have our reunions on a yearly basis from the WASP,
    stood up to a couple of weddings from the guys and the whole bit so I still say once a Navy man, always a Navy man. You're
    never going to get out of it. You're going to be in the Navy the rest of your life.
- speaker: Interviewer
  text: Those six years remain a special time in your life, then, no regrets about high school and leaving home on certain
    terms with your Dad.
- speaker: Respondent
  text: No, no, when I finally did get in, I know my dad was very proud of me. I know that. The only regret I have was that
    after the war I married my sweetheart, and I had to spend 14 months on Guam and at that time in '46 and '47 Guam was still
    in the throes of Japs running around, they still had a few hold-out Japanese guys, and they'd steal clothes off the clothesline,
    get in the chow line because they were starving. Stuff like that but that was only the regret I had, that I spent 14 months
    away from my bride. We are now married going on 60 years.
- speaker: Interviewer
  text: So where were you inducted then, at Fort Sheridan?
- speaker: Respondent
  text: No, I went in downtown and I don't know the name of the building. And, uh, I don't know if you want to put this in
    there, but the shades in the place that we were having our physical, the shades were maybe about a foot and half down
    below the top of the window and all of us guys were standing there in the nude, and the girls in the next building were
    standing at the windows looking down at us guys. [Laughter] My goodness! Then there was, oh God, I don't know how many
    guys in the hall that they swore us in. And they separated all of the regular Navy guys and the inductees, they sent them
    home, and the regular Navy guys, they gave us a broom and we swept the hall and then they put us on the North Shore and
    we went to Great Lakes Naval Training Center. That's where I spent sleeping in a hammock the first two weeks, lot of broken
    noses and broken arms, learning to sleep in a hammock. About two weeks later they gave us cots or bunk beds.
- speaker: Interviewer
  text: From there I was transferred over to Navy Pier for aviation machinist mate training, and I had the training there,
    then, they sent me for two or three weeks aboard the U.S.S. Wolverine on Lake Michigan for further training on flight
    deck procedures. From there I went to Boston, Mass. I can't think of the name of the building right now, and then I wasn't
    there maybe two days and they transferred me and about twenty other guys, down to the Fore River Shipyard where the ship
    was being constructed. And this was the famous ship, the ...
- speaker: Respondent
  text: This is the WASP. We were right there when she was being constructed. Our duties there were varied. I can't tell why
    they had us there, but they had us there; there were twenty of us guys.
- speaker: Interviewer
  text: Anybody you knew from home?
- speaker: Respondent
  text: No, no, Total strangers. You'd be surprised how quick you can make friends. [Chuckle] The ship was commissioned. We
    went down to Trinidad for a shake-down cruise. We came back from Trinidad, back to Boston, which was our home port. From
    there we went right through the canal, from the canal to Honolulu, Honolulu right out into it.
- speaker: Interviewer
  text: So you're on the WASP all this time and you're part of the first crew?
- speaker: Respondent
  text: Yes, they call us plank-owners. According to Navy tradition, you are entitled to one section of plank, you own one
    plank on that ship. And they give you a certificate; I've got the certificate. When they were going to scrap the ship
    in 1972, I called the local radio guy and told him my story, and he turned the thing over to Senator Percy at that time
    and Senator Percy turned it over to the powers-that-be. And one day in the mail I got my plank. It's only a small piece
    of it.
- speaker: Interviewer
  text: And is it wood?
- speaker: Respondent
  text: Yes, it is wood. The flight deck was wood.
- speaker: Interviewer
  text: Oh, the flight deck on an aircraft carrier was wood?
- speaker: Respondent
  text: Yes, now they're steel. When I received my plank, my family was all standing around, and I opened up the package and
    this beat-up old piece of wood from the deck. And I put it down on the floor and I stood on it and kind of wobbled a little
    bit and I said, "It's kind of nice being back on board again." [Chuckles] Basically that's it. From there it was the Canal
    Zone, San Diego, Pearl Harbor, we crossed the dateline and then from there on it was the Central Pacific.
- speaker: Interviewer
  text: So when did your officers tell you that you were entering the war zone?
- speaker: Respondent
  text: They don't tell you. No one had to tell you. You knew. All the routines changed. Everything became more serious with
    more details and training.
- speaker: Interviewer
  text: So while the Wasp is making its way across the Pacific after it come through the Canal Zone, was it carrying airplanes?
- speaker: Respondent
  text: No, Air Group 14 was waiting for us in San Diego. On the way out to Pearl we qualified our pilots and Airedales, that
    is, flight deck personnel, to handle landings and crashes and such.
- speaker: Interviewer
  text: So as an Aviation Machinist did you have to service every plane every day, or once a week or ...
- speaker: Respondent
  text: No, no when I first came aboard as an AMM, because of my work in the shipyards, I was assigned to the Forward Aviation
    Gas Pump Room. This was a very lonely battle station well below the waterline and on top of several thousand gallons of
    High Test Aviation Gas. It was too far from the action, topside. I finagled my way into the V2F division and became a
    plane captain. A plane captain is, some people talk about it like being a squire for a knight. You take care of your aircraft.
    You're assigned one aircraft, and you maintain that aircraft. You take care of that aircraft just like it was yours. You
    baby it. If she's hurt, you take care of her. Would the same pilot fly the same plane? No, no, you have different pilots
    flying different planes. The only time I had the same pilots was when I had one of the fighter photo planes. They put
    a camera under the seat of the plane, and then he would go in after the air strikes and take photographs, and he was not
    supposed to engage in any combat whatsoever, but I had a few of them that... fired the guns? Yeah. [Chuckle] All the aircraft
    had gun cameras, and a couple of times they'd come in and they'd say "Get the film out of the gun camera" so you knew
    what they were doing. I think I had three pilots. And then later I had the night fighters, but that only lasted a little
    while because they took one of the smaller carriers, and they made strictly night operation out of that.
- speaker: Interviewer
  text: Did the Wasp move with a group of other ships around it across the .. ?
- speaker: Respondent
  text: 'Constantly, constantly. They were a Battle Group, Task Force 38 and Task Force 58. It was the same group of ships.
    The only thing you traded off was the Admiral. We had Micher, Spruance and McCain. McCain, I thought was the #1 guy He
    was a salty little guy. In the early part of the war, we would go in at night. When I say going, it meant we were going
    to attack some island or cover for the invasion of some island. We covered many invasions and strikes against air fields.
    On that night you knew you were going in because the whole ship would shake going in at full speed. We would launch aircraft
    early that day then haul ass our out there to get away from landbased Japanese aircraft. As time wore on we had pretty
    much taken over air superiority. At the Marianas "Turkey Shoot" the Japs lost over 400 planes and some of their best pilots.
    This gave us the edge in the air that we never lost. This was covering the invasion of Saipan. Later we didn''t have to
    do that. We could stay there for a day or so, and towards the end we just stayed right there. At that time there was not
    too much fear of enemy aircraft attacking. That didn''t mean that they didn''t come out after us.'
- speaker: Interviewer
  text: So did you ever come under attack from land-based Japanese planes?
- speaker: Respondent
  text: Oh yes, constantly. Anytime that we were in, why we were under attack. One time I think it was October, 1944, for
    three days we were under constant attack. One day the light cruiser, Canberra, had taken a torpedo. She was maybe a thousand
    yards in front of us, and she took a torpedo. It slowed her down in the water and so we stayed around to take care of
    her. Was that an English or Australian ship? No, she was an American and we stayed there. Then the next night the Houston
    was in the same position that the Canberra was in - now I might have these mixed up as far as the names of the ships.
    Then the Houston took it, a torpedo, so we had to stay around. From what the pilots were telling us they were leaving
    an oil slick that you could see for 40 miles. We had a long tail behind us so the Japanese didn't have trouble finding
    us. The best speed these two could get up to was about 8 knots. Because they were part of our flotilla, we stayed with
    them under constant attack for three days. We stayed with the two cruisers to get them back to Ulithi. A month or so later
    we pulled into Ulithi, and the two cruisers were alongside the repair ship Ajax, and going into Ulithi you had one channel
    that every ship had to go into because it's just a big lagoon. When we got alongside the cruisers, the guys cheered like
    you wouldn't believe. [PAUSE] It was exhilarating to know we had that comradeship - where, hey guys, we stayed and we
    helped and we did what we could and we got you home and that was it. There were other times, another night attack, I remember,
    one night the New Jersey, the radar tracked this sucker, they tracked him all the way around then the New Jersey popped
    him with 8 rounds of 40mm and he blew up. It was late at night.
- speaker: Interviewer
  text: I don't know if you ever been at sea at night. If you go to the darkest place you can ever find, and that's what it's
    like at sea at night with no stars, no moon.
- speaker: Respondent
  text: It is black, and, we had cockpit covers that we had to put over the aircraft at night so that there was no reflection.
    We put that cover on it, and put our aircraft to bed at night and the next morning because it was still black outside
    when we went to get our aircraft. You went to where you thought your aircraft was, and you found out when it got a little
    lighter that you were working on someone else's aircraft because it was so dark.
- speaker: Interviewer
  text: You were a plane captain. What kind of a plane ...
- speaker: Respondent
  text: F6F Hellcat, in my mind it was the best fighter the U.S. Navy had. It was powered by a Pratt­ Whitney engine. The
    aircraft could do just about anything you asked. She could carry 500 lb. bombs, six five-inch-rockets, three under each
    wing and a 160 gallon auxiliary tank that sometimes had napalm, a gelatin mixture, as substitute for carrying gasoline.
    The napalm would burn upon hitting the ground. These aircraft could take punishment. Some would come in so full of holes
    we would salvage what we could and deep-six the rest. One of the nice things that they did do, they had these so-called
    Jeep carriers, and these little carriers carried nothing but replacement planes so if we lost an aircraft, we had another
    aircraft, of course the one that we got we had to do a lot of work on it to get it ship-shape again, and that's the way
    we operated.
- speaker: Interviewer
  text: Now Mr. Lewan you mentioned that the WASP took a hit?
- speaker: Respondent
  text: Several Japanese dive-bombers slipped under our radar. One hit the Franklin and unfortunately for her the bomb exploded
    on the flight deck or hangar deck while she was fueling aircraft. The bomb that hit us they say was 550 lb. armor-piercing
    bomb. It penetrated the flight deck, hangar deck and exploded between the 3rd and 4th decks. It gutted the whole interior
    of the ship, killing over 100 guys and I don't know how many wounded. The whole interior of the ship was completely destroyed.
    We had just secured from General Quarters - battle stations, in the morning. Some of the guys were going down to chow.
    I was reading a Coronet magazine; it was similar to a Reader's Digest. My aircraft was spotted on a hangar deck, I was
    sitting in the cockpit of my aircraft, and one of my buddies, another plane captain came by, and he waggled the control
    surfaces and says "You gonna go down to chow?" and I said "No, let me finish this and then I'm gonna go down." I never
    saw him again. When the bomb hit, I jumped out of my aircraft, and the hangar deck at that location was about 4 solid
    inches of steel. All the way around that hole there was a glow; it was red hot. I jumped out of my aircraft, and when
    I got down, naturally there were explosives and fires all over the place. I ran over to the forward catapult sponson and
