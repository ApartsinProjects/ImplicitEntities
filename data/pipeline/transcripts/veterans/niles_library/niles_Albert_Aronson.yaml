collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: AI, when did you enter the Service?
- speaker: Respondent
  text: April 13th, 1943.
- speaker: Interviewer
  text: And what were you doing before you joined?
- speaker: Respondent
  text: I was a college student at Wright Junior College.
- speaker: Interviewer
  text: So, were you drafted, or did you enlist?
- speaker: Respondent
  text: I was selected by my friends and neighbors, that's what it says on the drafting form. Another fellow and I, we were
    very friendly in high school, went into Service at the same time. I went into the Army. He went into the Navy since that—he's
    passed away several years back. Now, I was discharged in October 23 of '45 on the point system.
- speaker: Interviewer
  text: So, why did you choose the Army?
- speaker: Respondent
  text: Hell, I couldn't swim. I didn't want the Navy. And another thing is I was in the ROTC in high school for four years,
    and I did have a basic knowledge of the military.
- speaker: Interviewer
  text: Where did you attend high school, if I may ask?
- speaker: Respondent
  text: Roosevelt High School in Chicago.
- speaker: Interviewer
  text: Oh, a Rough Rider.
- speaker: Respondent
  text: Right. I even have a sweatshirt with that on.
- speaker: Interviewer
  text: Wow. Yeah, that's over there on, what is that, that's on Wilson, and is it—
- speaker: Interviewer
  text: Wilson and Kimball. It looks better now than when I went there. Oh, matter of fact, this Hy Ray, another Niles veteran,
    was the first graduate corps of his high school, Roosevelt.
- speaker: Respondent
  text: Wow, that will be interesting when I interview Mr. Ray.
- speaker: Interviewer
  text: He's about ninety-three now. Very nice fellow. You'll like him.
- speaker: Respondent
  text: Yeah. So, you were inducted in Chicago, then?
- speaker: Interviewer
  text: That is correct. I was given about a week leave to settle my affairs which weren't that extensive and then went into
    Camp Grant, an induction center in Rockford, Illinois, and then was shipped to a camp outside of Salt Lake City for basic
    training. Basic training was Air Corps basic training.
- speaker: Respondent
  text: Then I was placed in the Medical Corps, which I wanted, and went to surgical tech school at Fitzgerald Hospital in
    Denver. And that was a two and a half month course where I was taught anatomy and physiology, first aid, different injections
    like hypo etc., and clerical work. And then I worked a couple of weeks in the hospital.
- speaker: Respondent
  text: Next I was assigned to a B-17 bomb group that went over to England in October of '43, and I was with them, oh, God,
    how long? A good, oh, not quite a year, and then the war in Europe, which was on the continent, needed medical personnel.
    And I was volunteered by my commanding officer since I was the youngest, and had no responsibilities, so they shipped
    me out.
- speaker: Respondent
  text: I joined the 103rd medical battalion which was attached to the 28th division. The 28th division had just finished
    the victory march through Paris. With them, we went through France, and part of Luxemburg, and Belgium, and then we were
    classified in the quiet sector.
- speaker: Respondent
  text: Then, in December of '44, the SS troopers' armor unit led the way for the German Army. The armored group did not take
    prisoners. They wiped them out, that was including medics. The medical corps are noncombatant. Due to the Geneva Convention,
    there was an agreement with all the European countries that they were noncombatant, except Japan, which had withdrawn
    from the League of Nations.
- speaker: Respondent
  text: I was very fortunate to be assigned to the 103rd medical battalion. Because we were a clearing station for injured
    and wounded individuals, we served very little in the front lines. I had to take my hat off to the medics who were attached
    to the combat engineers. They took a tremendous beating.
- speaker: Respondent
  text: 'Now the worst—we classified wounds or injuries in three categories: abrasions, which breaks out of the skin, you
    know, like, oh, something similar maybe like that; puncture wounds where a bullet would pierce into—and then a laceration,
    which is normally done by shrapnel, which tears out an area. Those are the worst types of wounds to service.'
- speaker: Respondent
  text: You don't realize until you're in the middle of the Corps what happens to a human body when it's wounded or tears
    out areas, etc. Now, when the Bulge was halted and we started reclaiming area, what was heartbreaking was when we looked
    at the corpses. They were at different positions, and soon, but what the saddest part was, a corpse with minor injuries
    or wound up frozen to death. They were not serviced, and it hurt to see that. The dead were distorted, sitting up, lying
    down, many different positions. To some extent, you get immune to some of this, though, not a hundred percent. And I was—I
    think around—I was about nineteen or twenty, so it was sometimes hard to absorb, especially being sheltered, you know,
    in your early life.
- speaker: Respondent
  text: We had a good team of medical people. The doctors and the enlisted men functioned very well as a team. Now, when we
    were overworked, the people that we could not help, they had to wait. We tried to make them as comfortable as possible
    with morphine etc., and we would take the people that had a fighting chance, and then we would disperse them to hospitals
    for further service.
- speaker: Respondent
  text: It was a very, oh, quite an experience. I was overseas twenty-one months. And when I came back I was quite disillusioned
    with the people of the United States. Because many of them were making very good money, they were spending their money
    for amusements and etc., although there were some people that were suffering because of their dead, but being in Europe
    and seeing children going into your garbage can for food, and people living in the open, or in the basement, and things
    like that, and then you come home and you see complete reversal, it doesn't set too well for a twenty-year-old to see
    that.
- speaker: Respondent
  text: I was very fortunate to be discharged at the age of twenty. I did make a mistake by going to college too quick in
    January of '46. I should have stayed out, worked, and soon. I was not adjusted for college at that time. I do have a college
    degree. I wanted to be a doctor. I had the experience in the field, but as to sit down and study, etc., I didn't have
    the capabilities for that. I got a degree in commerce at Roosevelt University. At that time, it was Roosevelt College.
    It was small.
- speaker: Interviewer
  text: Was that on the GI bill?
- speaker: Respondent
  text: That is correct. That is one of the greatest things they came out with, because it produced many good personnel for
    government and for business, etc.
- speaker: Interviewer
  text: Do you have any questions, or—
- speaker: Respondent
  text: Oh, sure. Why did you choose the Medical Corps?
- speaker: Interviewer
  text: I wanted to be a doctor.
- speaker: Respondent
  text: You wanted to be a doctor.
- speaker: Interviewer
  text: I wanted to take after my uncle, who was a doctor, and he was a captain in the Air Force. I had the practical experience.
    There were only two times I got sick in the Army about—when I saw my first surgery in Colorado, and the second, when we
    opened up a burned-out tank to take out the dead soldiers. And as a burned-out tank, that sweet burning odor from human
    beings hit me in the face. And I got—I didn't throw up, but I got sick, and I had to get into the wind to wash it out
    of my face. That's really the only two times I felt pretty beat up.
- speaker: Interviewer
  text: Going into the Army, was that the first time you were ever away from home for a long period of time?
- speaker: Respondent
  text: That is correct.
- speaker: Interviewer
  text: But you adjusted pretty well at the age of eighteen to shift around the country and meeting all kinds of different
    people and types.
- speaker: Respondent
  text: You mature very quickly. You learn to survive on your own, but you do get clothing, food, and medical attention. No
    one played nursemaid to you. And if you didn't have money, you did without it. You couldn't come to your parents and borrow
    money like you had when you were younger.
- speaker: Interviewer
  text: So you drafted in April of—April 13?
- speaker: Respondent
  text: I was selected.
- speaker: Interviewer
  text: Selected on April 13, 1943.
- speaker: Interviewer
  text: And then you, after the training in America, you get to England in—toward the end of '43 or the beginning?
- speaker: Respondent
  text: October of '43.
- speaker: Interviewer
  text: Was that—did you get to England by flying or by ship?
- speaker: Respondent
  text: No. Oh, by the Queen Mary.
- speaker: Respondent
  text: Wow. Let me tell you about the Queen Mary. You had two meals a day. The evening meal was mutton, English mutton. And
    the breakfast was eggs, not fresh eggs, powdered eggs. You had to line up for the meals. It took you approximately a couple
    of hours to get to the food. And by that time, the odor of the food—you weren't hungry. Good thing they had a PX aboard!
    And you lived on candy and cookies. The Queen Mary, it left New York Harbor and cut down to, what was it again? B, it's
    an island that starts with B.
- speaker: Respondent
  text: Yes, cut down to Bermuda and then cut up to Scotland in one of their coves there. It took approximately five days.
    There was roughly about 15,000 troops aboard. And in the room that we had, our stateroom was actually to accommodate two
    people, there were sixteen of us. But what was good about it was we had a porthole to look through. We waved goodbye at
    the Queen Mary, not the Queen Mary, the Statue of Liberty, and we went on our trip. Now, the Queen traveled by itself,
    because of its speed, and it could outrun any submarine, except if the submarine came head on.
- speaker: Respondent
  text: It had Ack-Ack guns on it, and a six inch gun in the swimming pool. I'll tell you very honestly the Ack-Ack were lousy
    shots. They would shoot up balloons and couldn't hit them.
- speaker: Respondent
  text: And I would do better with my syringe and needle than they could do there. But the crew, the medical crew, was American.
    Matter of fact, I helped run through about three or four hundred people with shots. And their needles, oh, were horrible.
    Some had burrs. You hit the person, and you pull it out, and blood would come out with it. But we worked out very well
    there.
- speaker: Interviewer
  text: Did you have medical duties while you were on the ship?
- speaker: Respondent
  text: 'For shots and for—you’re going—I don''t think you would want to put this on the tape, what we called a short arm
    inspection (note: a physical examination for evidence of gonorrhea). We were called into duty inspecting the—our troops
    of our outfit and, though, that''s about all. I don''t know what the medical detachment on the boat did. It was good duty
    for them, but I don''t know.'
- speaker: Interviewer
  text: So when you landed in Scotland then?
- speaker: Interviewer
  text: You went by train or—
- speaker: Respondent
  text: We went by train down to the Midlands of England. And we were put on our base. If I remember, the first night there
    was an air raid warning, and we all went into air raid shelters. But it didn't amount to anything. Our outfit, I don't
    know how long it took to activate it.
- speaker: Respondent
  text: 'And to give you a little rundown on the servicing of the Air Corps, when the aircraft returned from a mission, if
    a red flare from one of the aircraft was shot, that meant they had wounded aboard. And they would land, and we would go
    to, with an ambulance, to the wounded area where the wounded were. We divided the wounded into three categories. If the
    man was severely wounded, he would go with the ambulance with a doctor and a medical man to the nearest hospital; the
    second, if he was not too seriously wounded, we would service him at our infirmary; the third one, the person was dead.
    We would take him to our morgue where he would be picked up. Now, our layout of the infirmary was set up as such: a morgue,
    two wards, an emergency room, a sick call area, and an administrative area. I was in the sick call area. We would handle
    the sick call or injuries, etc., in that area. I think it was in July, in July of ''44, where they needed people, medical
    people in the continent, and that''s where I got attached to the 103rd medical battalion which was part of the 28th division.'
- speaker: Respondent
  text: The 28th division was a National Guard outfit out of Pennsylvania. Their shape of their—it doesn't show on here on
    my photo, is a keystone patch.
- speaker: Interviewer
  text: Like the state, yeah.
- speaker: Respondent
  text: In ancient times, rather medieval times, they didn't have concrete, and they used to insert keystones into that area.
    The reason for that emblem for Pennsylvania, it was located in the middle of the original thirteen colonies, and the Continental
    Congress held their meetings there.
- speaker: Respondent
  text: And it was known as the 'Keystone state.' I don't think the division is still in service. I think they broke it down
    into a different setup. The medical, rather, the Army setup is so much different than when I was in.
- speaker: Interviewer
  text: When the German SS tank or whatever was spearheaded, that was the Bulge offensive, right?
- speaker: Respondent
  text: That is correct.
- speaker: Interviewer
  text: How close did they get to where your headquarters were or your camp?
- speaker: Respondent
  text: Really, I'll tell you something funny. When you're in a unit, you're in that specific area; you do not know where
    the other units are.
- speaker: Respondent
  text: Now, we had a 106th division. It had just come over from the states two weeks before. They were ill-equipped, didn't
    have any training, and that's where the Germans came through. In the first week of combat, they lost 7,500 men, which
    is about a regiment, because there is approximately 15,000 soldiers in a division, and there are three regiments there,
    plus attached units like our medical unit. And, so the armor went through, they couldn't take prisoners, to be honest,
    they were on a time schedule, and they just wiped them out, medic or not, they wiped you out. Let me put it this way,
    we returned the hospitality.
- speaker: Respondent
  text: It's the animal that comes out. Now, when the war was near the end, we went on occupational duty. Being a medic, we
    supervised a PW camp which was for German prisoners. They separated the SS from the regular German Army. The German prisoners
    dug into the ground for shelter, and they used whatever they could above it. We did not help them at all. My division
    was on guard duty, and they had no love for the SS. In the compound, you had an eight foot wire fence, and then approximately
    three feet from there, you had a, oh, about two and a half, three feet high fence. If you touched this fence, there, a
    guard would yell halt three times, and, if you didn't halt, you're dead. Practically every morning, we would find a couple
    dead prisoners, mostly SS.
- speaker: Respondent
  text: When you're in the Armed Forces, you turn into an animal.
- speaker: Respondent
  text: And, now, I have a buddy—he and I used to lecture in my daughter's class, he was with the Third Army. And he, being
    Jewish like I am, he could speak it. His outfit called for Jewish soldiers to go into a concentration camp. The Jewish
    concentration camp, matter of fact, an SS trooper was going to shoot him, but he let him have it first and wiped him out.
    He has souvenirs from this person. He went into the Service, oh, at seventeen with the okay of his parents, and on the
    second day of D-Day, he landed. And he was attached to the Third Army, and he was upon the Bulge when they relieved Bastogne.
- speaker: Respondent
  text: The Bulge was a real mess. It was crazy. It was heavy fog and very cold, misty, and you could get no air support because
    of the cloudiness. It was a strange thing. You would hear German in back of you and in front of you, or English, the same
    thing. They were as screwed up as we were.
- speaker: Respondent
  text: It was a total mess. They say the Bulge was the biggest loss of personnel that we ever suffered.
- speaker: Respondent
  text: The Germans suffered more. They claim that—I think it was our losses were about 80,000 wounded, killed, and captured.
    The Germans, they claim, was about 120,000. I was reading a report on it, no, I saw it on the History Channel that the
    German schedules were behind, because they were going through woods in flat areas. It's different, and they ran out of
    petrol and soon.
- speaker: Respondent
  text: We were getting reinforcements who were cooks, clerical help, and they didn't know which end of the rifle to use.
- speaker: Respondent
  text: We treated many cases of trench foot. They would bring them back into our area, and we would take the shoe off, and
    the foot would swell into a redness or a bluish appearance, and all you could do was wash them, and soon. Then, we would
    ship them back to a different area for servicing. There must have been a hell of a lot of amputations because when gangrene
    sets in, it's hard to control except through amputation. After a while, we didn't take the shoe off. We just shipped them
    right back, because it was superfluous to do it. And there was more important things to do. It was a shame, especially,
    many of these people that didn't know how to take care of it. Now, myself, I used to carry two pairs of socks in my helmet
    and try to change my socks every other day or stuff like that, then try and wash out the other ones, and then put them
    out to freeze. And then, eventually, you were able to wear them again.
- speaker: Respondent
  text: But being in the medical battalion was much easier than being up in front in the combat area.
- speaker: Respondent
  text: And it was quite gruesome, the wounded, etc., but, up in front, it was much worse, much worse.
- speaker: Respondent
  text: And one thing about the German army, when they brought in reinforcements, they would pull out the whole group and
    form a unit. American troops, you learn on-the-job training and the casualties were such a—were larger that way.
- speaker: Interviewer
  text: Did you—were you able to stay in touch with the people at home with mail or—
- speaker: Respondent
  text: Yeah, V-mail, where you wrote out and they made photostats and mailed—sent it back to the States. They were—I'm sorry,
    I should have brought one. They're about that big when they're reproduced, but the film is about that long. And I used
    to write as well as I could to keep up the morale at home.
- speaker: Interviewer
  text: That was V-mail?
- speaker: Respondent
  text: V-mail, right.
- speaker: Interviewer
  text: Yeah, yeah.
