collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Do you remember when you entered the service?
- speaker: Respondent
  text: I do. I graduated from high school, blew I wasn't going to college, my neighbor was a 1st lieutenant in the Army and
    came home on leave. And I said, "I would like to enlist but I want to make sure when I do enlist that I get some kind
    of training, so that when I get out of the service I will have some kind of skill." And he says, "Well let me take you
    down to the recruiting office, so we both went down there and I enlisted for three years. And I asked to be a cook. My
    MOS (Military Occupational Specialty) was 94B20.
- speaker: Interviewer
  text: You graduated from high school. Did you attend high school in the area?
- speaker: Respondent
  text: Yeah, Niles West.
- speaker: Interviewer
  text: Niles West.
- speaker: Respondent
  text: Graduated in 1965.
- speaker: Interviewer
  text: 1965. And, so your service dates are January the 28th 1965?
- speaker: Respondent
  text: No, November.
- speaker: Interviewer
  text: November, I see. I missed the 11th. Yeah, so did you have the expectation that you might be drafted at that time?
- speaker: Respondent
  text: You know, I wasn't really thinking about the draft, I was thinking more about what I'm going to do—
- speaker: Interviewer
  text: For the next few years, that makes sense.
- speaker: Interviewer
  text: One of the veterans I interviewed here during this time period, it wasn’t in Illinois. It might’ve been another state,
    but when he went down to enlist they told him there was no room in the three-year plan so he would have to go in the four-year
    plan.
- speaker: Respondent
  text: He might not have been in the Army.
- speaker: Interviewer
  text: Yeah, he was in the Navy. So that was the difference. So, then you enlisted for the—
- speaker: Respondent
  text: For the Army.
- speaker: Interviewer
  text: For the Army, for three years.
- speaker: Interviewer
  text: And then you, did you, so where was your basic training?
- speaker: Respondent
  text: From there, I did basic training at Fort Knox, Kentucky. And after graduating from basic training I got shipped to
    Fort Lee, Virginia. And it was the quartermaster school, and it was about a 12-week class, all about sanitation, cooking
    in the field, cooking in the mess hall, baking, sanitation, storage of food.
- speaker: Interviewer
  text: So, it sounds like you were really learning something.
- speaker: Interviewer
  text: So, did you take any courses in high school that were kind of in that direction?
- speaker: Respondent
  text: Yes, I did take Home Ec in high school.
- speaker: Interviewer
  text: Ah, so there it is.
- speaker: Respondent
  text: That's the one I enjoyed. They had me in mechanics and wood class, and I hated that.
- speaker: Interviewer
  text: Was that the first time you were away from home for any length of time?
- speaker: Respondent
  text: Yes, that was my first time in the real world.
- speaker: Interviewer
  text: And was it a little bit of an adjustment being in the—
- speaker: Respondent
  text: You know it was, but I managed it pretty well. I had my faith and I went to church every Sunday and—
- speaker: Interviewer
  text: You were able to continue to practice your faith?
- speaker: Respondent
  text: Yes, in fact I was even an altar boy. On the base.
- speaker: Interviewer
  text: And as an altar boy is there a particular, is that a Catholic church thing?
- speaker: Interviewer
  text: Yes. So, were you part of one of the parishes around here?
- speaker: Respondent
  text: No, it was at basic training and at Fort Lee Virginia, and on the army base they would have services on Sunday and
    I would assist the priest with Mass.
- speaker: Interviewer
  text: I was wondering if you were part of any parishes in this area that you were associated with.
- speaker: Respondent
  text: I, yes St. Peter's.
- speaker: Interviewer
  text: St. Peter's. So, when you—
- speaker: Respondent
  text: That's St. Peter's Catholic Church.
- speaker: Interviewer
  text: Yes, so basic training was in Fort Knox and then they ship you to Camp—
- speaker: Respondent
  text: Fort Lee, Virginia.
- speaker: Interviewer
  text: Fort Lee, Virginia for the three-month quartermaster school.
- speaker: Respondent
  text: Yes, it was twelve weeks.
- speaker: Interviewer
  text: Twelve weeks. So after, do you get better food then if you're the quartermaster?
- speaker: Respondent
  text: Oh, ho-ho, we got a lot of perks. A lot of perks.
- speaker: Interviewer
  text: Did you gain weight while you were in the Army?
- speaker: Interviewer
  text: Were there any, how about in basic training were there any memorable drill instructors?
- speaker: Interviewer
  text: Any types of people that you encountered that you just couldn’t get along with?
- speaker: Respondent
  text: No, not at all. We were all brothers in arms and we knew what was going on and we all got along fine.
- speaker: Interviewer
  text: So then from Virginia then, what's next?
- speaker: Respondent
  text: Well, that was the big order I got. Vietnam.
- speaker: Interviewer
  text: How did that go over?
- speaker: Respondent
  text: Well, they gave me a thirty-day leave, came home, got engaged to my high school sweetheart. She was going into her
    senior year and we've been married for 50 years now.
- speaker: Interviewer
  text: So, do you think the fact that you were going to Vietnam, was that a factor in the timing of your engagement?
- speaker: Respondent
  text: Probably. For sure.
- speaker: Interviewer
  text: For sure. And was that lady in Niles West with you?
- speaker: Respondent
  text: Yes, yes. Her name was Linda Friedman; she lived in Lincolnwood.
- speaker: Interviewer
  text: And how did your parents, were they worried about it at the time?
- speaker: Respondent
  text: I'm sure, you know, but they didn't really come out and say it. But they were concerned like any good parent would
    be.
- speaker: Interviewer
  text: Were you the only son?
- speaker: Respondent
  text: No, I had a younger brother, and he was graduating from Niles West also and then going to Northern Illinois when I
    was in Vietnam. Or in the service.
- speaker: Interviewer
  text: Was there a tradition of military service in your family?
- speaker: Respondent
  text: Yes, definitely. All my mom's brothers, my father, they all served.
- speaker: Interviewer
  text: So, you grew up with an appreciation and familiarity with American military accomplishments.
- speaker: Respondent
  text: Yes, in fact as a kid I always wanted to go to West Point, but I didn't have the... I was a slow learner. I had a
    learning disability.
- speaker: Interviewer
  text: Was that reading, left to right or?
- speaker: Respondent
  text: It was a little bit of everything.
- speaker: Interviewer
  text: Then the cooking was a great, practical, useful skill that benefits yourself and human beings in a real basic way.
- speaker: Respondent
  text: Yes, for sure, definitely.
- speaker: Interviewer
  text: So, you come back to Chicago then for a month—
- speaker: Respondent
  text: A thirty-day leave.
- speaker: Interviewer
  text: Thirty days.
- speaker: Respondent
  text: Get engaged.
- speaker: Interviewer
  text: So, your future wife saw you in your uniform?
- speaker: Respondent
  text: Oh yes. And then when the day came I flew, that was the first time I was ever on a— no was that the first time? My
    first time on a plane was from Fort Lee, Virginia, to home and then the second was all the way to California and we left
    on Continental Airlines out of San Francisco. Our first stop was in Hawaii, second stop was at Clark Air Force Base in
    the Philippines and the last stop was, of course, Tan Son Nhut in Saigon where we came in the country and processed in
    country.
- speaker: Interviewer
  text: Did you find it warm when you landed?
- speaker: Respondent
  text: It was. Very warm.
- speaker: Interviewer
  text: It must've taken a little while to adjust to the climate.
- speaker: Respondent
  text: It did, for sure. And then after processing through in Saigon, they put me on a C-130 plane and sent me to Cam Ranh
    Bay, which was our headquarters for the 71st Artillery.
- speaker: Interviewer
  text: And then Cam Ranh Bay, that must've been a pretty big installation because there would've been Navy there too?
- speaker: Respondent
  text: Yes, it was a big port. A very big port.
- speaker: Interviewer
  text: So, you're attached to artillery, but you aren't going to be firing any guns, were you?
- speaker: Respondent
  text: It wasn't the guns; it was a Hawk missile site. Ok? And we protected two ports. Cam Ranh Bay and Nha Trang from any
    air attacks. Ok? I was stationed at Nha Trang, at Camp McDermott in what we called Tent City. And then we would have to
    prepare food for the company that was on the ground that was off, ok? Because they would rotate up the hill to the missile
    site, and we would have to get food up to them also. So, we took food up by truck to the missile site, plus feed the ones
    down at the base camp.
- speaker: Interviewer
  text: Right, so you would feed the people down below and then also up—
- speaker: Respondent
  text: Right, and then we would feed the people at the missile site.
- speaker: Interviewer
  text: They must've been glad to see you coming.
- speaker: Respondent
  text: Oh, they were.
- speaker: Interviewer
  text: One veteran said the quartermasters are the most important people, they're the most important people.
- speaker: Respondent
  text: Quartermaster and the supply sergeant.
- speaker: Interviewer
  text: Yes, thank you. And was there plenty of food to work with?
- speaker: Respondent
  text: There was. We even had Vietnamese help that would do all of the hard kitchen cleanup. Pots and pans and all that,
    so the soldiers wouldn't have to do any of that like at basic training, you know?
- speaker: Interviewer
  text: There wasn't any KPs they called it.
- speaker: Respondent
  text: So, the folks that you're working with there, the military people, they're not eating the C-Rations or anything?
- speaker: Respondent
  text: No, so this is good stuff?
- speaker: Interviewer
  text: We had big Thanksgiving. We had turkeys, same thing with Christmas.
- speaker: Interviewer
  text: So, then these Hawk missile batteries, did they ever fire or were they just in case?
- speaker: Respondent
  text: They were set up, ready to fire, if they had to, because Cam Ranh Bay was a huge port—
- speaker: Interviewer
  text: I would imagine.
- speaker: Respondent
  text: Where a lot of the supplies came and Nha Trang was not as big of a port, but it was where the special forces were
    at the air base, so we wanted to protect the 5A Special Forces from any air attacks.
- speaker: Interviewer
  text: Did you have any trouble sleeping out in?
- speaker: Respondent
  text: We slept in a tent.
- speaker: Interviewer
  text: It wasn't too hot or?
- speaker: Respondent
  text: You know what? You get used to it. We had mosquito nets, ok? Because the mosquitos were bad. We were on a beachhead
    and the back of us was the China Sea, and in front of us was a perimeter with hills and jungle.
- speaker: Interviewer
  text: You never came down with malaria then or anything?
- speaker: Respondent
  text: No, but we took malaria pills and all that. We even had a PX on the base, we had an entertainment section on the base
    where you could watch movies, play slot machines, lose your paycheck.
- speaker: Interviewer
  text: Yes, in terms of gambling, was there smoking and drinking?
- speaker: Respondent
  text: Drinking, I wasn't a smoker. And of course, a little gambling.
- speaker: Interviewer
  text: So, you never smoked before you went in the Army?
- speaker: Respondent
  text: No, I was pretty involved in athletics at Niles West, football, basketball, baseball. So, I didn't really smoke.
- speaker: Interviewer
  text: But you wouldn't have minded a beer maybe?
- speaker: Interviewer
  text: So, there was beer?
- speaker: Interviewer
  text: Any particular kind of beer?
- speaker: Respondent
  text: You know I knew you might ask me that—
- speaker: Interviewer
  text: Oh dear, I'm a beer man myself.
- speaker: Respondent
  text: So am I. I don't drink pop at all. But I don't recall what kind of beer it was. Maybe it was, it was some kind of
    domestic beer.
- speaker: Interviewer
  text: So, it could've been—
- speaker: Respondent
  text: Meister Brau or I think I want to say Meister Brau.
- speaker: Interviewer
  text: So, when you arrive in Vietnam, what rank are you at that time?
- speaker: Respondent
  text: I was just an E-2.
- speaker: Interviewer
  text: So that's like a Private First Class?
- speaker: Respondent
  text: Yeah, a little above that. Well, Private First Class or Corporal or something like that.
- speaker: Interviewer
  text: So, you got a promotion to E-5?
- speaker: Interviewer
  text: How did that come about?
- speaker: Respondent
  text: Well I think it was Captain Smith who was in charge of our company saw the work I was doing every day and it kept
    the morale of the men up, and that he noticed. So, I managed to get E-5 fairly quickly. And the nice thing was that the
    Morton Grove Women's Club there were about six or seven Morton Grove boys in Vietnam when I was there and out of the six
    or seven they picked me to adopt, ok? And there's lots of articles about me in the local Morton Grove Champion newspaper.
- speaker: Respondent
  text: Yep. And I can bring them to you if you want to scan them.
- speaker: Interviewer
  text: Yeah, a couple of pages could work nice.
- speaker: Respondent
  text: So, they adopted me and my whole platoon and I was the guy everybody wanted to hang out with because I got all the
    goodies.
- speaker: Interviewer
  text: Goodies would've been cookies or?
- speaker: Respondent
  text: Cookies, soap, shampoo, toothpaste, toothbrush. You know they sent everything. They were so wonderful.
- speaker: Interviewer
  text: So, you said, was that quartermaster school you attended?
- speaker: Interviewer
  text: Quartermastering involves more than cooking, though right?
- speaker: Respondent
  text: Yes, but for me it was cooking. Quartermaster could've been supplies, you know, different things.
- speaker: Interviewer
  text: So, was it easy enough to stay in touch with your family when you were in?
- speaker: Respondent
  text: You know, I was very lucky with that also. Back then I could talk to my girlfriend or my parents through a ham radio
    operator. Somehow, the ham operator radios would help with us communicating back home. And you know, it was "Hi how are
    you doing, over."
- speaker: Respondent
  text: You know, it was the ham radio—
- speaker: Interviewer
  text: And there was no censorship or anybody?
- speaker: Interviewer
  text: I wonder if the authorities knew that or something?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: So, the ham radio person would've been some American soldier?
- speaker: Respondent
  text: Or some American person, yeah.
- speaker: Interviewer
  text: So, at this base you're feeding just Army people?
- speaker: Interviewer
  text: Because the Navy had their own crowd, didn't they?
- speaker: Interviewer
  text: I wonder how the Navy food was compared to the Army food.
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: So, did you get any R&R while you were there?
- speaker: Respondent
  text: I did. I got an R&R, and I decided to go to Hong Kong. And I went to Hong Kong in February and that was their New
    Year's, so that was kind of interesting. But the reason I picked Hong Kong was because I was getting married when I came
    back from Vietnam and I wanted to get a tuxedo custom-made. So, I got a tuxedo custom-made and had it shipped back home
    and then when I came home my wife had graduated from Niles West and two weeks later she got married and then we honeymooned
    across the country because I was stationed in Fort Lewis in Washington state for a year.
- speaker: Interviewer
  text: So, when you were at the Cam Ranh Bay there, you said you were good at lifting the morale. Did you feel any pressure
    or stress there?
- speaker: Respondent
  text: You know, I was only in Cam Ranh Bay for a few days, ok? And then they sent me to Nha Trang.
- speaker: Respondent
  text: Yeah, to Camp McDermott, to our other missile site. And that's where I stayed for the rest of the year.
- speaker: Interviewer
  text: And did you feel any stress or?
- speaker: Respondent
  text: Yeah, our base camp, ok, it was big. It was a big what they called Tent City, and that was on a beachhead, and our
    base camp did get hit a few times on the perimeter. Some sniper fire and things like that. But never, called a red alert
    or put up flares, or lit up the sky or—
- speaker: Interviewer
  text: Did you have to wear a helmet when you were taking the food up?
- speaker: Respondent
  text: Oh yeah, sure. Even a flak jacket.
- speaker: Respondent
  text: Yeah, a flak jacket.
- speaker: Interviewer
  text: And did you carry a gun even when you were doing that?
- speaker: Respondent
  text: I did not, no pistol no gun.
- speaker: Interviewer
  text: So, did any famous entertainers come anywhere near you?
- speaker: Respondent
  text: Yeah, that was a disappointing thing, I was hoping Bob Hope would come by, but we did have some pretty good entertainers.
    I can remember four ladies from the Philippines that did a great job singing and keeping us entertained.
- speaker: Interviewer
  text: The morale of the people you served with, did it need boosting or lifting up?
- speaker: Respondent
  text: You know there's always some of that going on, definitely. But overall, we had it pretty good.
- speaker: Interviewer
  text: Do you recall any particularly humorous or unusual events or something or something crazy?
- speaker: Respondent
  text: Not in Vietnam, no. In Fort Lewis, yes.
- speaker: Interviewer
  text: That's what's coming up next, huh?
- speaker: Respondent
  text: Yeah. So, you under the terms of your service you had to spend a year in Vietnam then?
- speaker: Interviewer
  text: That's correct.
- speaker: Interviewer
  text: So, then you, do you have a choice where you're being shipped to?
- speaker: Respondent
  text: No, not at all.
- speaker: Interviewer
  text: So, what was going on in, why did the Army want to put you in Fort Lewis?
- speaker: Respondent
  text: Well, they just needed another cook there. And so, when I came back from Vietnam, I was on leave 30 da
