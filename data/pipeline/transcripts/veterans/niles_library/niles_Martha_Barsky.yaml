collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Do you recall when you entered the military service?
- speaker: Respondent
  text: I enlisted on August 1st, 1944.
- speaker: Interviewer
  text: Do you recall where you were living at the time?
- speaker: Respondent
  text: In Chicago.
- speaker: Interviewer
  text: Had you graduated from high school at that time or--
- speaker: Respondent
  text: Yes. Foreman High School.
- speaker: Interviewer
  text: So, in August, before, say, in that summer of 1944 before you entered the Service, what were you doing? Were you working
    or--
- speaker: Respondent
  text: I worked at Mills Novelty Company where they made slot machines. And then when the war broke out, when we got active
    in the war, they switched over to making shells, five inch shells. And that's where I met Bob. I was a factory mail girl,
    which was one of my first jobs. And I used to walk around with pigtails and a jumpsuit. The fellows would tell Bob, "There's
    a nice girl for you." And he says, "That kid!" But we got acquainted. And he met me one time at the Merchandise Mart when
    they had a program especially for the Mills Novelty people. And I was with my mother, all dressed up. And when he saw
    me, he realized I wasn't such a kid and from then on, well, that was our life!
- speaker: Interviewer
  text: And that was--was that in 1944 or--
- speaker: Respondent
  text: Probably '43. When I met him.
- speaker: Interviewer
  text: So you met Bob in '43?
- speaker: Respondent
  text: I would say so.
- speaker: Interviewer
  text: So now, in the case of most of the people we interview are men, of course. And they either, you know, were drafted,
    or they went down and enlisted, or tried to join up, or whatever. But, in your case, you weren't required to go into the
    Service. But you did go into the Service. So how did you decide to enlist?
- speaker: Respondent
  text: I always wanted to be a nurse. And, at that time, you had to go to college for four years to be a nurse. And I didn't
    want to wait that long, because I became engaged to Bob, and I figured we'll be getting married as soon as we get together
    again. And so I decided to join the Navy, the Hospital Corps. And I did the nursing that I would have liked to do. And
    at that time, the nurses were kind of upset with the WAVES because they had to do the paperwork, and the WAVES did all
    the nursing. So I was like a nurse. I would give injections. And my first job when I got there was an autopsy.
- speaker: Respondent
  text: Which really was kind of, oh, how can I describe it? It was a lot for me to accept.
- speaker: Respondent
  text: Just a kid getting into the Service, and here they put me on to a hospital thing with the autopsy. So I had to go
    with the doctors and the nurses there, and they would take the organs out. I had to mark down the weights. You never knew
    this!
- speaker: Respondent
  text: So I had to mark down the weights of all the organs that were removed for testing. And that was quite an experience
    for me.
- speaker: Interviewer
  text: I can imagine.
- speaker: Respondent
  text: And the hospital was for all the dependents as well, so whether this man was a dependent, or a veteran or not, or
    what do you call them, I don't know.
- speaker: Respondent
  text: But then, my second job, that was the next day, I saw a baby born, which this was so much to take all at one time.
    But to go back. I had my boot camp at Bethesda, Maryland, at the Bethesda Hospital. And we had to, besides learning how
    to do all the hospital things, we had to identify silhouettes of ships, we had to learn how to march, and stand in line
    for chow, real Navy. And we had, I think it was six weeks, we had calisthenics. And in that six weeks, we had one leave
    off the base when I went to New York. And I don't recall how I got there, or who I went with, but I know we went to the
    Empire State Building, and then we went dancing to the Roosevelt Hotel.
- speaker: Respondent
  text: And I don't remember how we ate, or what we ate in between times, or how we got back to the hospital. I don't know
    why I don't remember those things, but it was sixty-five years or so.
- speaker: Interviewer
  text: Indeed. Indeed. Yes. Yes. So were you and Bob engaged, or planning to be engaged, when you entered the WAVES?
- speaker: Respondent
  text: Yes. We got engaged before he went in the Service.
- speaker: Interviewer
  text: Yes. And then were you able to exchange letters, or was that pretty difficult?
- speaker: Respondent
  text: We corresponded together, and I always sealed his letters with a kiss.
- speaker: Respondent
  text: With a kiss.
- speaker: Respondent
  text: A lipstick kiss.
- speaker: Respondent
  text: And I thought that he was going to come to California at one time where I was stationed at Oak Knoll Hospital.
- speaker: Interviewer
  text: So you went to the training in Bethesda and then you wound up being posted to California?
- speaker: Respondent
  text: And I thought he told me that they were going to be in California, and I thought we might get married at that time,
    but I don't know whether he never came or whatever reason. But, on the way, we were in a train from New York to California
    to my duty, and I never slept on the train. Because I think we got to Colorado at night, whatever it was, and I never
    saw a mountain.
- speaker: Respondent
  text: Well, I stayed awake the whole night looking at the magnificent scenery, and it was really something! And I don't
    remember whether we were picked up or what happened, or how I got to the hospital, to my base. It was Oak Knoll Naval
    Hospital in Oakland, California.
- speaker: Interviewer
  text: Oh, Oakland, Yes. And then how long were you stationed there?
- speaker: Respondent
  text: The whole time.
- speaker: Interviewer
  text: The whole time. And were you assigned to a particular unit like--
- speaker: Respondent
  text: I was there from September 20th, 1944, until I think it was, let's see, April something.
- speaker: Respondent
  text: Yes, until April '46, I was there the whole time.
- speaker: Interviewer
  text: Yes. So, was that the first time you were ever away from home?
- speaker: Interviewer
  text: So, that was interesting, and then probably meeting, seeing different parts of the country, and meeting people from
    all different parts of the United States, I would imagine--
- speaker: Respondent
  text: Yes, that's the first time.
- speaker: Respondent
  text: And I enjoyed the train ride, and I had a compartment all by myself. But the bed, there was a toilet in there and
    a washbasin, but you couldn't use it when the bunk was down. You had to get out of the compartment and put the bunk up
    and then use it, use the toilet, it was so small.
- speaker: Respondent
  text: And that was kind of hard to do, but I guess you get used to all those little inconveniences.
- speaker: Interviewer
  text: So, in the WAVES, did they have ranks of officers? Were you like an officer or a corps--they don't have privates in
    the WAVES, do they?
- speaker: Respondent
  text: We had to learn how to salute.
- speaker: Interviewer
  text: Yes. And then did you have like a title--like a particular--?
- speaker: Respondent
  text: I didn't have a title. I just, well, actually, my title was HA/2 when I enlisted, and I was just HA1 when I left.
- speaker: Interviewer
  text: And that HA, does that refer to hospital assistant or something, do you think?
- speaker: Respondent
  text: Yes. Hospital corpsman.
- speaker: Interviewer
  text: First class corpsman, okay.
- speaker: Respondent
  text: Then after my first couple of days with the baby birth and the--what did I say it was? The autopsies, the organ identification.
    They put me in the treatment center and there I would change the bandages for the boys that were in the hospital area.
    And there was one young man in particular, I can even remember his name was Oxentine, very odd name. But, anyway, he was
    a Marine and he was out wherever he was for so long that he never was able to take his shoes off, so when he came back
    to the hospital, his toes had grown together.
- speaker: Respondent
  text: So my job was to bathe his feet, and massage his feet, and get his toes separated, and get rid of all the dead skin.
    And he had a wound in his stomach that his whole insides were practically exposed. And he would smoke, and the smoke would
    come out of his stomach. And, of course, in those days, smoking was permitted anywhere. Everybody on the ward was smoking.
    And that's an experience that I will never forget. And he must have weighed about ninety pounds.
- speaker: Respondent
  text: And several months later, I met him on the base, and he had gained weight, and he looked like a million. And I was
    so happy to see that he recovered.
- speaker: Interviewer
  text: Wow, yes. Did his toes ever straighten out?
- speaker: Respondent
  text: Oh, yes. Yes, I took care of that.
- speaker: Interviewer
  text: He must have appreciated what you did for him, I suppose.
- speaker: Respondent
  text: Well, he never said anything.
- speaker: Respondent
  text: I mean, that was my job, you know. It was payment to see him recover. Very nice young man. And those are a couple
    of the experiences that I will never forget.
- speaker: Interviewer
  text: Sure. So, you must have been there for about a year at that hospital, would you say?
- speaker: Respondent
  text: A year and a half, at least. A year and nine months, I think.
- speaker: Interviewer
  text: Almost two years. So was, were the, did you have nice living conditions, an apartment or base?
- speaker: Respondent
  text: Yes. I was lucky enough to get a lower bunk. I didn't like climbing up on the top bunk. And we lived in a dormitory,
    and we could have visitors. In fact, I had several visitors. My cousin came to see me, who was in the Navy, and I don't
    know where he was stationed, I don't remember that. And then there was a friend of the family. He was an officer. And
    he took me to dinner one time. And a member of my grandfather's family came to visit me. I don't know how he even knew
    I was there. And so I had a few visitors in that time, and it was kind of nice.
- speaker: Interviewer
  text: Did you have to--who was your boss?
- speaker: Respondent
  text: A nurse by the name of Magnusson. And she was a very nice person, and we got along real well. And she didn't do anything
    special for me, but she was just very nice.
- speaker: Interviewer
  text: So, during like a normal day, did you have normal days, like you'd start at nine and go until five, or it was whatever
    was needed, or it depended, your hours?
- speaker: Respondent
  text: They were pretty normal days, except we had to have a watch, which I had to watch, where I don't know why. Maybe the
    person was dying. I don't remember. But I had to sit there for a couple hours in a room at night. And I remember dozing
    off. And the nurse on the ward came in, and I jumped up, and I said, "I wasn't sleeping!" Well, I really was, but you're
    not supposed to sleep on watch. But that's hard not to do, you know!
- speaker: Interviewer
  text: Yes. Did the Navy have any hospitals overseas where they might have sent WAVES?
- speaker: Respondent
  text: If I took a course to become a chief, I don't know, not a chief, but a higher rating, they would have sent me overseas.
    They asked me if I wanted to go to Pearl Harbor or wherever they were going to send me, and I didn't want to bother. I
    wanted to come home.
- speaker: Respondent
  text: So because I figured Bob will get off around the same time that I will and we will be getting married so--
- speaker: Respondent
  text: This June, it will be sixty-five years that we are married.
- speaker: Interviewer
  text: Congratulations! Yes. Wow.
- speaker: Respondent
  text: A lot of time.
- speaker: Interviewer
  text: Yes. I'm only married thirty years, so--
- speaker: Interviewer
  text: I've got a long way to go.
- speaker: Respondent
  text: Oh, you're just a kid.
- speaker: Interviewer
  text: Yes. Learning all the time, yes. But, anyway, so that helped to keep both of you going during those war years, because
    you had a future in mind. You planned on getting married.
- speaker: Respondent
  text: I did my nursing that I wanted to do. And it kind of came in handy in my life. And when I got out of the Navy, I went
    back to the Mills Novelty Company, and they put me in the records department so I didn't have to walk around in the factory
    with the mail anymore. But I didn't stay there that long because I got pregnant. And, well, that was the end of my career
    for a while.
- speaker: Interviewer
  text: Yes. Did you have any trouble getting housing when you got married after the war?
- speaker: Respondent
  text: Yes, we couldn't find a place to live.
- speaker: Respondent
  text: There were no apartments. There was nothing. So, my folks took us in and we lived with them for about a year. And
    then they bought a home in Elmwood Park, and we finished off a room in the attic where we lived for about another year
    and a half, and then we moved into Niles after, oh, two and a half or three years living with the folks. And we bought
    this little house. It was $11,200. It was a two bedroom and one bath. It had a utility room, a dining area, a nice living
    room. It was really a nice home. And we had the three children there. And then they started building in a farm right where
    the library is, and, in the next block, we bought a house that they were asking $21,000. And we gave them a half down
    payment on that. And, let's see, a couple years ago, that house was selling for over 400,000 dollars.
- speaker: Respondent
  text: And, of course, today, maybe 300,000, maybe less.
- speaker: Interviewer
  text: Yes, the market has dropped a bit.
- speaker: Interviewer
  text: Yes, did you meet any, after the war, did you stay in touch with any of the other lady WAVES that you met?
- speaker: Respondent
  text: No, I didn't. For some reason, everybody was just so busy in their own way. We never hung around together. They were
    all going every which direction.
- speaker: Interviewer
  text: So there aren't too many WAVE reunions, or anything like that, or--You know, the guys always have their reunions.
- speaker: Interviewer
  text: But the ladies, maybe it's not the same thing?
- speaker: Respondent
  text: Well, that's because they were so close on the ship.
- speaker: Respondent
  text: There's not much they could do, you know, but socialize. But the girls, you know, they--I don't know. It was a different
    situation.
- speaker: Respondent
  text: So, you may have mentioned this already, how do you think your wartime experiences affected your life?
- speaker: Respondent
  text: Well, when we lived in our little house, his parents lived a couple blocks down the street and they had a friend whose
    husband was dying of cancer, and my mother-in-law asked me if I would go over there and give him a shot because he was
    in severe pain. So I knew how to do that. I had to give shots when I was in the Service, take blood, do different things.
    So, I went over there, and I did give him the shot. And he was critically ill, but, in a couple of days, he passed away.
    And I always wondered if the shot that I gave him had anything to do with him dying, but I don't think so, because he
    was already very critical.
- speaker: Respondent
  text: So that was one experience. And then Bob went through cancer treatments for six months, and I think my experience
    in the Navy kind of helped pull him through.
- speaker: Respondent
  text: With nutrition and different things.
- speaker: Interviewer
  text: Yes, and then being a mom, right, and the three.
- speaker: Interviewer
  text: I'm sure, came in handy, when you're--
- speaker: Respondent
  text: I had three children.
- speaker: Respondent
  text: And my son had a brain tumor at 48 years old, and he passed away, and I really miss him because we used to play golf
    together, and he was a good friend.
- speaker: Respondent
  text: And my other daughter is in Washington state. And then I have another daughter in Hoffman Estates. But the daughter
    in Washington comes in about usually once a year chec
