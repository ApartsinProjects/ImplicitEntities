source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Mr. Levin, do you remember Pearl Harbor Day?
- speaker: Interviewer
  text: You were aware that there was perhaps a war in the offing?
- speaker: Respondent
  text: As aware as any teenager might be.
- speaker: Interviewer
  text: Yes. So do you recall when you entered the Service?
- speaker: Respondent
  text: Yes. I went to basic training in the Signal Corps and Camp Van Dom over in Mississippi.
- speaker: Interviewer
  text: Before entering the Service, had you just graduated from high school?
- speaker: Respondent
  text: Well, I had just graduated and went into Loyola Pre-med. The draft, just then they were starting to push on the offensive,
    so they started to draft heavily. Prior to that, I went to enlist in the Marines. But I had flat feet, and they wouldn't
    take me, so I ended up in the Army Infantry.
- speaker: Interviewer
  text: But the Army would take flat feet?
- speaker: Interviewer
  text: And why had you been interested in the Marines?
- speaker: Respondent
  text: They had pretty uniforms.
- speaker: Interviewer
  text: Pretty uniforms. Wow. So had you graduated in midyear?
- speaker: Respondent
  text: In February, 1943, and then they picked me up in September, 1943.
- speaker: Interviewer
  text: And they picked you up in September?
- speaker: Respondent
  text: Yes, and then, you mentioned, your basic training was down?
- speaker: Interviewer
  text: Camp Van Dom over in Mississippi.
- speaker: Interviewer
  text: Was your family upset or worried about you, or anybody else at home?
- speaker: Respondent
  text: They never manifested it in any way, like crying. I shook hands at the railroad station with my brother who was, oddly
    enough, it's ironic, I was expecting that anything could happen at any time, he was killed in a high school football game.
    And I shook hands with him at the train station, and that was the last time I saw him.
- speaker: Interviewer
  text: So you were the oldest son?
- speaker: Interviewer
  text: So was that your first time away from home?
- speaker: Respondent
  text: Pretty much.
- speaker: Interviewer
  text: That must have been an interesting experience being in another part of the country with folks from all over the place?
- speaker: Respondent
  text: Oh, it was an eye opener, and the esprit de corps with whomever you met, everyone had the same idea. Someone had done
    something wrong to our country and it had to be corrected.
- speaker: Interviewer
  text: So there was a great sense of patriotism.
- speaker: Respondent
  text: No doubt about it.
- speaker: Interviewer
  text: So you didn't find basic training too difficult or--?
- speaker: Respondent
  text: No. There was always a comrade doing something with you, crawling under barbed wire, machine gun fire over your head.
    Jumping in a hole and having a tank run over it, with another guy. He didn't panic and I didn't panic. And we talked about
    college. He had gone to college for a brief period. The tank rolled over us and, after they rolled over, we got out.
- speaker: Respondent
  text: All the basic stuff. But then that division, they started for a push, and they broke up that division. Half of them
    went to Germany and half went to the Pacific.
- speaker: Interviewer
  text: So was the 77th, this illustrious division that you wound up with, all of, the 77th was in the Pacific?
- speaker: Respondent
  text: All the 77th was in the Pacific.
- speaker: Interviewer
  text: Did you have any feelings about going to Europe versus going to the Pacific?
- speaker: Respondent
  text: Well, I was not keenly aware of politics, but I knew there was something going on that was horrific. And I didn't
    know much about the Pacific except what movies I saw with Robert Ryan and showing the Japs as very cruel people. So I'd
    think about it and say, "How the heck am I going to deal with that?" And, yes, there were fears and thoughts.
- speaker: Interviewer
  text: So, after your basic training, were you sent then to another spot?
- speaker: Respondent
  text: Camp Pickett, Virginia. Where they filled in all the replacements for the 77th Division, figured out who could go
    and who couldn't go.
- speaker: Interviewer
  text: So, at that time, you knew that you were going to be in the infantry?
- speaker: Respondent
  text: Yes, but one thing I must say, I was privileged to get into an anti-tank platoon, to which the line companies were
    attached, had heavier weapons such as an armor piercing, 50 caliber machine gun, a bazooka, satchel charges to throw under
    the treads of tanks, your rifles, your grenades, the ammunition, anti-personnel shells, and so forth and so on. And that
    put me at the call of the line companies. And they're the people that look for someone to kill, and someone would look
    to kill them. And if they ran into a tank or needed a heavy weapon, they would call up the anti-tank squad. And they'd
    come with the weapons that could help them. So that difference was a big difference. Fifty yards away from anything in
    the line company was a big buffer. So that was very good. I did face a number of issues and so forth, but that gave me,
    the buffer probably saved my life in a sense.
- speaker: Interviewer
  text: Did you have to receive specialized training to be in that sort of anti-tank platoon?
- speaker: Respondent
  text: Yes. That was in Hawaii.
- speaker: Respondent
  text: You catch your boat from the West Coast and out under the Golden Gate Bridge. Beautiful sight. I'd never seen anything
    like that. But with trepidation, because you're going into the wide Pacific and to war.
- speaker: Interviewer
  text: Did you still have a couple of buddies with you?
- speaker: Respondent
  text: Phil Hensley was my closest buddy, but there were a group of about six men that were close. And to this day, we've
    often got together. Now, nobody's left except one sergeant and myself.
- speaker: Interviewer
  text: So then from Hawaii then, you headed for, was it the Philippines, or Guam, or--
- speaker: Respondent
  text: We zigzagged to Hawaii, took us about two weeks. Put us in jungle training and then, from there, shipped us out to
    possibly land in Saipan. But then things got under control, so they swung us around to land with the Marines in Guam,
    and that was the first action. We participated in the retaking of Guam. We had a saying, "Here today, Guam tomorrow."
- speaker: Interviewer
  text: So at Guam, did the Marines go in first then and then the--
- speaker: Respondent
  text: No, we went in with the Marines. It was so bad that we had to circle until about three or four in the morning. So
    when we got there, there were dead guys all over the place, Japanese and Americans, and it kind of took the wind out of
    your sails when you saw that.
- speaker: Interviewer
  text: That was the first time you'd seen dead soldiers?
- speaker: Interviewer
  text: Would your anti-tank unit ever be called in to help the Marines?
- speaker: Respondent
  text: Often, if the Marines needed armor, like a tank, they had their own. They had their own landing crafts, their own
    medical signal, and artillery tank support. And if, for instance, an Army outfit needed a tank and they weren't using
    it, they could call them, and they'd work together. After you're on the ground, everyone's the same, trying to do what
    they have to do when it ought to be done, whether they like it or not. There's coordination between units that helped,
    and, if you run up against the pillbox, and you need a flamethrower, and you don't have any, you'd call and see if the
    Marines had anything available and so forth. We got along with them pretty well.
- speaker: Interviewer
  text: And then from Guam, you--
- speaker: Respondent
  text: Well, Guam wasn't finished. Guam, everything was new to me. We were on a hill in the morning and hadn't seen anybody.
    We dug in a Japanese trench. And it was so damn cold, I don't know whether I was shaking from fear that someone would
    jump into there, or from the cold. Woke up in the morning. Things seemed all right. And the guys were sitting around on
    the hill until one guy got hit with shrapnel that exploded in the groin. Then everybody learned you don't stand around
    waiting for something to happen.
- speaker: Respondent
  text: Then we started to go down a road and the whole column was stopped, because the machine gun was at the end of the
    column. And it fired some guy in the face, and they stopped the whole column. And the officer said, "Hey, there are some
    shacks over there. You three guys, go over and take a look." So, we approached it through a sugarcane field that had been
    flattened. And we came into some straw huts, like on stilts. There's like an icebox with meat hanging from a hook, a Japanese
    helmet like someone had just taken off out of there. Flies were on the damn thing. It's funny what you look at. So we
    started going in. And we went into a grass hut, for what reason I don't know, to check it out. And under a blanket in
    the hut, there was movement. So the three of us were standing there with the guns ready. And we looked at each other,
    and then someone lifted the blanket, they were under a blanket-like cover, and lifted a pistol, and then there was firing
    like mad. And we left that little hut, and the blood started pouring down between the slats of this bamboo-like floor.
    When I saw that, I started to get pretty nauseous. And that affected me. And we came back to the lieutenant, and he talked
    to us, and then the column moved on. But that was a real eye-opener, and something you're not used to, seeing blood going
    all over, people moving and yelling.
- speaker: Respondent
  text: And I was wondering what my part was in there. To this day, I was wondering if I shot into that mass of people or
    not. I hope I didn't. I hope the other two guys did.
- speaker: Interviewer
  text: Were those Japanese soldiers then, do you think, hiding in there?
- speaker: Respondent
  text: Yes. They had helmets all over the place. They had a record machine that played some American songs. It was such a
    weird setting that it stuck in my brain. Bright sunlight and bright red blood flowing out. And I turned pale, and soon
    it quelled, and it became just a memory bank.
- speaker: Respondent
  text: And it's up there always (pointing to brain). To this day.
- speaker: Respondent
  text: There's nothing heroic about it. It's just that we were there. And this is what you were supposed to do. And the column
    went on, and we sat down on the road because the column stopped again.
- speaker: Respondent
  text: And there was a dead Jap across the road about three or four yards. A pig is eating his dead toe. A frog is sitting
    on top of his eyeball. Flies all over. And I thought, well, it is a good time for me to open a can of egg yolk. I opened
    the damn can, and the flies decided they're going to sit on my spoon, and I had to shoo them away. And I ate my egg yolk,
    and I got the worst damn dysentery you ever had. Shit all over.
- speaker: Respondent
  text: Some toilet paper they gave us, like chocolate bars. I didn't smoke. I traded it for moldy chocolate bars. And so
    that is part of the life of an infantry. It's not always killing. It's often seeing dead stuff, and malaria, dengue fever,
    dysentery, the whole nine yards. You're a foreigner in that land. Run out of Atabrine tablets, run out of water, and no
    hot coffee at night. Nobody turns on the light. Nobody sings songs. No news in the middle of nowhere. And the rain was
    always there.
- speaker: Respondent
  text: Which reminds me, they put the gun, 37 millimeter anti-tank, on the horseshoe bend in the road. And in the middle
    of the horseshoe was a hill. We were on top of it. If anything came down that hill, we had an armor piercing .50 caliber
    up there. And I sat in a foxhole about six feet by two feet with a parapet on it. And it rained. It rained, I don't know
    how many days on Guam. It seemed like almost every day. And it was cold rain at night. I sat in the water up to my belly
    button. Another guy was behind me, the ugliest man I ever saw in my life. And we sat close together for body warmth. And
    I had to take a pee, but nobody gets out of the hole. It attracts movement, and you're gone. So I peed, and it felt good,
    because I felt the warm pee around my groin. The guy in back of me with his legs around me, he peed, too. And his warm
    pee felt good, too, on my back. That's infantry. Didn't see a tank, didn't fire a shot, but the living was abominable.
    And I just remember it. I didn't think much more about it, right, wrong, or what. It was what it was. And that was mostly
    a part of Guam.
- speaker: Respondent
  text: There were other anecdotes. We got lost. Everything is mud! A tripod, fifty-five pounds. A breech block, fifty-seven
    pounds. A barrel, fifty-five pounds. Three canisters, packed in rosin, steel balls for anti-personnel shots, anti-armor
    piercing shells, three of them in the back, a couple of hand grenades, your poncho, a day's supplies of Cracker Jack boxes,
    two canteens of water, your rifle, a couple of bandoliers. And we couldn't keep up with the line companies we were assigned
    to, so we got lost. We came across, a squad of Marines bedded down. They had their weapons. And they looked at us, and
    we looked at them. And we weren't going anywhere. We didn't know where to go. The guy, the Marines, said, "You want to
    get in with us?" We said, "Sure." So we set up a .50 caliber machine gun, set up the 37 mm anti-tank gun. The Marines
    were happy to have the fire power. They said, "They're coming across this rice or cane field from over there. And they're
    just going to come at us. And we're glad to have you here." They were just kids like us. And they were happy. And here
    comes a runner. He says, "Where the hell have you guys been?" "Well, we couldn't keep up with L Company." And he says,
    "The captain wants you up over here." So, the Marines sadly saw us pack our gear and move out. But we had a nice relationship,
    because, when push came to shove, everyone was doing the same thing.
- speaker: Respondent
  text: 'So, that was mostly Guam. I probably forgot to tell you a number of incidents. They''re all pictorially in the "Brief"
    here (referring to a section in the 77th Division history Ours To Hold It High: The History of the 77th Infantry Division
    in World War II) which begins "This is the story of a proud and efficient fighting team. It trained, it fought and it
