collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Schechter, when did you enter the Service?
- speaker: Respondent
  text: January of '51.
- speaker: Interviewer
  text: January of 1951, and at that time, you were living in?
- speaker: Interviewer
  text: May I ask where you went to high school?
- speaker: Respondent
  text: Tuley and Crane.
- speaker: Interviewer
  text: What were you doing before you entered the Service, do you recall?
- speaker: Respondent
  text: I worked at various jobs which I don't recollect right now. I was sort of fishing to find myself.
- speaker: Interviewer
  text: So you would have gone into the Service then when you were about--
- speaker: Respondent
  text: Twenty-one.
- speaker: Interviewer
  text: So, were you drafted, or did you--?
- speaker: Interviewer
  text: You were drafted, and you were drafted into what branch of service?
- speaker: Interviewer
  text: The Army. Were you happy-- Did it make any difference to you which branch of service that you went into?
- speaker: Interviewer
  text: And when you were younger, you would have been growing up, I suppose, during World War II? And now there was another
    war under way.
- speaker: Interviewer
  text: Did you have any thoughts about going to war, or having to serve in the military, or--
- speaker: Respondent
  text: Well, I, of course, considered myself a patriotic American. And I wanted to serve my country. However, I had so many
    other irons in the fire as a civilian, and, so, I wasn't exactly gung ho to leave my civilian pursuits.
- speaker: Interviewer
  text: So where were you inducted into the Army?
- speaker: Respondent
  text: I ended up, well, it's been, gosh, maybe about sixty years thereabouts, and I just remember being, taking basic in
    Fort Leonard Wood, Missouri.
- speaker: Interviewer
  text: How was basic training? Was that a shock on the system or pretty much what you expected?
- speaker: Respondent
  text: No. It was a kind of a snap. It was kind of a-- it was very easy. I think probably it was so easy, because at the
    time, as one general said, we needed quickly, warm bodies in Korea. We were very shorthanded over there, and the enemy
    was pushing us all around. So, they kind of, it seemed to me, they pushed us right through everything, and shipped us
    out as soon as they could.
- speaker: Interviewer
  text: Yes. Was that the first time you'd been away from home for any length of time?
- speaker: Interviewer
  text: No. And so you had done a bit of traveling around the country before then, so--
- speaker: Respondent
  text: I wasn't tied to my mother's apron strings.
- speaker: Interviewer
  text: Yes. So, boot camp was pretty much as you expected? And you didn't find it difficult adjusting to Army life or different
    types of people that you might not normally encounter?
- speaker: Respondent
  text: I thought it was a little bit of a waste of time. I didn't really learn much in basic.
- speaker: Interviewer
  text: So you wind up in the third division?
- speaker: Respondent
  text: The third division, the third medic battalion, Clearing Company.
- speaker: Interviewer
  text: And you were assigned to that unit after basic training? Was that right?
- speaker: Respondent
  text: No. I went over after basic. I didn't go over as a unit, but as a replacement as an individual to Inchon, Korea, where
    there was about 25,000 GIs. It was called a "repple depple" (replacement depot). And when other units needed replacements,
    they would call down to this repple depple in Inchon, Korea, for the amount of troops that they needed.
- speaker: Interviewer
  text: So, to get from the United States to Korea, that was by boat?
- speaker: Interviewer
  text: And that docked in Japan then or--
- speaker: Respondent
  text: Yes, I was in Japan, oh, maybe about five or six days, and next thing I knew, we were in Korea.
- speaker: Interviewer
  text: And then you landed at Inchon, or was that where the unit was stationed?
- speaker: Respondent
  text: I believe I landed at Inchon in that repple depple containing about 25-30,000 GIs.
- speaker: Interviewer
  text: So your, the duty or the purpose of the 3rd medical battalion and how you were deployed there--
- speaker: Respondent
  text: It was like, did you ever watch MASH on TV?
- speaker: Respondent
  text: Well, that's the kind of outfit I was in. We had a very small outfit. We had one doctor and we had a total of maybe
    thirty personnel in the whole unit.
- speaker: Respondent
  text: I interviewed one gentleman, and he was a dentist in Korea. And he used the same terms. He said if you saw that show
    MASH. He said that sort of was what it was like.
- speaker: Respondent
  text: We didn't have such colorful personnel. Actually, we were all about twenty, twenty-one, years old, and nobody really
    knew anything about the Army. Nobody knew where Korea was on the map, nor did they care. We were all draftees. And most
    of us were not happy to be where we ended up at.
- speaker: Interviewer
  text: And why was that?
- speaker: Respondent
  text: We were draftees.
- speaker: Interviewer
  text: Were you fearful? Were you afraid of the danger and--
- speaker: Respondent
  text: Well, I wasn't looking for a hot war. I know if you get hit by a bullet, you know, you're in trouble.
- speaker: Interviewer
  text: Where you were stationed in Korea now, was that a particular camp or--
- speaker: Respondent
  text: One day, they, when I was at Inchon, the repple depple, they called my name out with along about 250 others, loaded
    us on a dozen two and a half ton trucks, and we headed up to the front line. And when I heard artillery, the vehicles
    all pulled to the side of the road. An officer opened up a metal folding table and started to interview each of us as
    to what our qualifications were.
- speaker: Respondent
  text: And what we did in civilian life, and those that had no professions that the military needed went to the line on the
    left. Those who knew something, like me, I was a mechanic, went to the line on the right. Those on the left, I understand,
    then immediately ended up on the front line. And those on the right, electricians, mechanics, and others, we ended up
    in those kind of jobs. And that's how I became a motor sergeant and I ended up taking care of all the vehicles.
- speaker: Interviewer
  text: Was it good equipment that you were working with, or was it-- new machinery or left over from World War II or--
- speaker: Respondent
  text: No, the vehicles were all satisfactory. And when they needed parts why I would go to ordnance ammo where they had
    all kinds of equipment as far as the eye could see. And I would acquire, or some would say requisition, whatever parts
    I needed.
- speaker: Interviewer
  text: There is that new book out now, I think, by Halberstam on the Korean War. The Coldest Year. Was it hard? Was it--
    were conditions cold or--?
- speaker: Respondent
  text: Oh, yes, in wintertime, we had mid-twenties. We were usually in the mountains, so it was damp along with 25 below
    zero. And that cold dampness kind of got right into your bones.
- speaker: Interviewer
  text: You were still able to work, though, in the cold?
- speaker: Respondent
  text: Yes, fortunately, we were all young and healthy, and, so, we managed to do what we had to do.
- speaker: Interviewer
  text: Yes. You didn't lose any weight or--
- speaker: Interviewer
  text: Or gain any weight?
- speaker: Respondent
  text: No. Actually, we had decent food and, gosh, about every couple of weeks, you know, it's been sixty-five, sixty-five
    years ago, so some of the thoughts are a little bit hazy in my mind. But I remember a lot of helicopters coming from Japan
    with fresh vegetables. I remember helicopters coming in with crates of gloves and hats sewn by these women auxiliary organizations,
    veteran auxiliary organizations, and we had so much of these, knitted gloves, and scarves, and stuff which was not really
    usable. The military gear we had was more than sufficient. We had very warm clothes. We had really everything we need.
    And we had, I know a lot of people probably are going to have trouble getting used to this idea, but we had so much brought
    in by helicopters.
- speaker: Respondent
  text: We had to dig holes in the ground to bury the stuff. I used to say to my company commander, "Can't we give it to the
    native villagers?" and all that. He says no. It's against military regulations. So every time we saw a helicopter, we
    knew we had to start digging holes to bury all that stuff that was coming in. We got fresh ice-cream from Japan. We got
    fresh vegetables.
- speaker: Respondent
  text: And what's interesting, we had two South Korean soldiers - they were called "ROCs," attached to our outfit. And then
    there was a native village, maybe three or four miles away, they would hustle over there, rather than eat our food. Well,
    they asked why. They said American food is not good for them. And, so unlike World War II, or perhaps other parts of the
    world, we really longed for nothing.
- speaker: Interviewer
  text: You were well supported.
- speaker: Respondent
  text: We had everything.
- speaker: Interviewer
  text: You passed right over my favorite story. When he asked about the cold, why did you not tell the generator story?
- speaker: Respondent
  text: Oh. Well, we had-- I was a mechanic, and I was also in charge of keeping the Company wired up electrically. We had
    a generator, and I, of course, was the only one who understood those things.
- speaker: Respondent
  text: And sometimes it would-- the engine would stop working, the lights would go out, two in the morning, twenty-seven
    below zero, and I would have to get out there and work on the cold metal parts and get the generators going again. And,
    you know, I enjoyed it. I tell you why. I felt very, very useful. I felt very, very capable. And I was proud of myself,
    knowing that I was pretty much indispensable, and it gave me a feeling of worth.
- speaker: Respondent
  text: So the Army got that right. Anyway, they had the right man in the right place.
- speaker: Respondent
  text: I was a pretty bad soldier in basic training, but, in Korea, I had a job. Nobody bothered me, and I rose to the challenge.
    And I've had a lot of those experiences before I got into the Service.
- speaker: Interviewer
  text: Were there any other--were there any particular humorous or funny events that you recall, anything very unusual that
    stands out in your mind?
- speaker: Respondent
  text: Well, we had, many times, camp followers, as most armies usually have, and they were, I wouldn't say funny, but they
    were interesting.
- speaker: Interviewer
  text: So did they, all of a sudden, like these little shacks would spring up around the camp, and people would move in there
    and stay?
- speaker: Respondent
  text: Not really.
- speaker: Respondent
  text: Not really, because we had to move, it seems, every month or two, something like communist guerrillas were working
    behind the lines attacking Service outfits and so, for some reason, we had to move like every month or two to a new location.
    And I would have to organize the convoy, take down the tents, and go out to the new area and spread a couple of hundred
    gallons of gasoline out on the field, and burn all the weeds, and things like this. And I don't know about funny, but,
    one the, a couple of times, I almost killed myself. I spread about two hundred gallons of gasoline all over this field
    where we were going to set up the new camp. And then I hacked off about twenty-five feet, and I threw a match. Well, I
    didn't account for the fumes in the air. The whole horizon blew up in front of me, and blew me back about twenty-five
    feet. And I think I burnt some of the hair off my head. And that was not funny. That was really stupid.
- speaker: Respondent
  text: And then, another time, thinking I was a great swimmer, I took one of the, along with a few other truck drivers, we
    took our trucks down to a stream to wash them. And loving to swim, I decided to jump into this river. And my fellow truck
    driver said, "Sam, you better not. It's an awful strong current." But I was full of piss and vinegar, and loved water,
    and I jumped in to go for a swim. And, immediately, I knew I did the wrong thing. It felt like the Jolly Green Giant grabbed
    a hold of me and sucked me right out to the center. I tried to swim back to shore. I couldn't make one foot of headway.
    So I flattened out, and floated down with the current, about five miles down.
- speaker: Respondent
  text: You can't swim out of that kind of current. And then I'd seen a big flat rock, and I scooted up onto the rock. Now,
    I could have gotten in to shore, but I was afraid to do that, because, during the dry season, mines were planted under
    that river. And, so, I sat there considering my choices.
- speaker: Respondent
  text: And then a few of my buddies came with their trucks, and they backed off about a 150 feet, and threw me a line. They
    had these winches, you know, in the front of the trucks. And with the other end, I tied a bunch of logs that were by the
    edge of the river. And as they winched these logs a 150 feet towards the trucks, it gouged out the land. And so I walked
    into where it was gouged out and got back to the truck. And they said, "Well, that should teach you something!" And it
    did!
- speaker: Interviewer
  text: There was no disciplinary action taken or anything like that against you, or?
- speaker: Respondent
  text: No. Everybody was glad to see you back!
- speaker: Interviewer
  text: There was no discipline.
- speaker: Interviewer
  text: Do you know the name of the river? Was there-- was it--
- speaker: Respondent
  text: Oh, I don't know. We didn't know the names of rivers.
- speaker: Respondent
  text: One of our vets was talking about the Imjin River, but--
- speaker: Interviewer
  text: That doesn't ring any bells.
- speaker: Respondent
  text: That was a strong river!
- speaker: Interviewer
  text: Oh, yes, a strong current.
- speaker: Interviewer
  text: Was your unit ever fired upon?
- speaker: Respondent
  text: At Kowang we had a couple of artillery shells that landed perhaps a few hundred yards away.
- speaker: Interviewer
  text: Why, I don't know. And I don't know, we don't know where those shells came from. So after that, we were instructed
    to build foxholes, you call them. And then we put logs over the top. But they were very unsafe, because quite often they
    caved in.
- speaker: Interviewer
  text: So, I notice in here, and you've touched on some of these in the notes that you prepared for today's interview, which
    we appreciate, and I think you mentioned it on the phone, and I thought it was very interesting, was, during a dangerous
    period there, you had a special guest, or visitor.
- speaker: Respondent
  text: Oh, yes. At one time, we got some information that communist guerillas were lurking behind the lines, eliminating,
    attacking, Service outfits. And about that time, I see a jeep coming up our, into our company area, and I notice there
    was an old guy. And an old guy with a beard. I'm thinking, who is this? It turned out, he gets out of his jeep, he says,
    "I'm looking for Schechter." And I says, "That's me." He says, "I'm Rabbi so and so." And he had a jar of kosher dill
    pickles, kosher salami, pumpernickel bread, and, gosh, a shopping bag full of stuff. And, just as quickly, he turned around,
    and got in his jeep, and off he went, heading north, I guess, to look up other Jewish guys in other outfits. And I took
    this foodstuff into my tent, and my Southern buddies said, "What's that?" And I said, "It's Jew food." And they, being
    Southern boys who are apt to eat anything, dug right into it. And within fifteen minutes, everything was gone!
- speaker: Interviewer
  text: That's a great story! Yes, you meet all kinds of people in the Army, don't you?
- speaker: Respondent
  text: Surprisingly, I got along very well with the Southern boys, because they were, it seems, more wild and more game than
    the Yankee boys, as I was more game. More-- I walked into excitement and new things. Southern boys seemed to be like that,
    too.
- speaker: Respondent
  text: Yankee boys were a little more serious. And they pretty much wanted to get home.
