collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Rogala, do you recall when you entered the Service? When did you enter the Service?
- speaker: Respondent
  text: Yes, I recall, and I've got a picture. That was taken about a day after I went into the Service. That was when I was
    inducted. We went to this area in Michigan, and this was the group of people that I was with. My induction was the 19th
    of August, 1943.
- speaker: Interviewer
  text: So, you were just eighteen?
- speaker: Respondent
  text: Eighteen years old.
- speaker: Interviewer
  text: So you went to Crane Tech High School?
- speaker: Interviewer
  text: So you lived down in?
- speaker: Respondent
  text: I lived on Thomas Street.
- speaker: Interviewer
  text: Was that the North Austin area?
- speaker: Respondent
  text: Yes. North Austin.
- speaker: Interviewer
  text: So, all the guys, were they looking forward to going in the Army, or were they worried? They all probably wound up
    in the Service, did they?
- speaker: Respondent
  text: I tell you, I don't know what happened to them. But in 1943, that was a big time where everybody was being drafted.
    Everybody was unbelievably involved in the war. People were going into the Service or working for somebody, like working
    in the war projects.
- speaker: Interviewer
  text: So, Mr. Rogala, you were drafted?
- speaker: Respondent
  text: I had no choice. I just got out of school and was planning to go to college.
- speaker: Interviewer
  text: Were you interested in the Army instead of the Navy?
- speaker: Respondent
  text: Well, I wanted the Air Force.
- speaker: Interviewer
  text: You wanted the Air Force. Why was that?
- speaker: Respondent
  text: I went in as a cadet, and I was going to Jefferson Barracks in St. Louis. I went through six weeks of basic training.
    I was going to go into the aviation field to try to become a pilot. But they told me I couldn't do it because I didn't
    have the coordination.
- speaker: Interviewer
  text: You were explaining about the judgment or the assessment of the abilities to be coordinated in the air, and you were
    saying something about right hand versus left hand or?
- speaker: Respondent
  text: Yes. I could do a lot of things with my right hand, but with my left, that's all I do is hold something. I can't use
    wrenches with my left hand. But on a plane, you have to use two hands to handle all the instruments and guide the plane.
- speaker: Interviewer
  text: So, you complete this aviation cadet training, or you go through it, and then this issue comes up that while you are
    probably not going to be able to be a pilot because of the left hand, right hand.
- speaker: Respondent
  text: Right. But they still kept me in the Air Force, in the Army Air Force. They sent me to different bases, including
    Del Mar, Texas, and Gulfport, Mississippi. At Gulfport, we picked up our plane, a brand new B-17. From there, we flew
    to Maine, then Iceland, then the Aleutian Islands, Madagascar, Tunisia, and other places where I flew all my missions.
- speaker: Interviewer
  text: So all that flying around the world--
- speaker: Respondent
  text: Yes. Iceland was very interesting to go to. That became my home then. We lived in tents near Foggia, close to Naples.
    It was unbelievable how we lived there. You never knew from one day to another what you were going to be doing or where
    you were going. People you talked to one day might be missing the next because they were shot down or lost.
- speaker: Interviewer
  text: What time of the year was this?
- speaker: Respondent
  text: This was August 1944, probably.
- speaker: Interviewer
  text: And you flew fifty missions, is it?
- speaker: Respondent
  text: Fifty-one. Actually, it amounted to about thirty-six flights, but some missions were longer and counted as two. We
    flew into places like Yugoslavia, Poland, and Germany. There was no rule that if you flew so many missions you didn't
    have to fly anymore. I left after fifty missions. I was shot down, went to Bari, Italy, flew a few more missions, then
    went to France. They wanted me to go on bond rallies, but I didn't want to fly anymore.
- speaker: Interviewer
  text: Well, tell them when you were shot down. Describe what happened.
- speaker: Respondent
  text: I was shot down on November 16th, 1944, over Yugoslavia. The plane was hit and forced down. Tito's partisans came
    and surrounded the plane. They were very friendly. The plane was damaged, especially the tail where I was kneeling, but
    I made it without getting hurt. We couldn't make it to Italy and landed over there.
- speaker: Interviewer
  text: So you were shot at by German planes, or ground artillery, or?
- speaker: Respondent
  text: We were shot down by flak. Once you got close to any target, you were surrounded by flak from the ground and attacked
    by fighter planes. You had to fight back with your guns.
- speaker: Interviewer
  text: Do you remember when you fired the guns for the first time in the air?
- speaker: Respondent
  text: Oh, yes. That was memorable. At one time we were shot down so badly, but the Tuskegee Airmen, black pilots, protected
    us. If it wasn't for them, we would never have made it back to base.
- speaker: Interviewer
  text: When you were forced down by the flak in Yugoslavia, did all the crew make it out of that, or was anybody?
- speaker: Respondent
  text: We all went down. They took us to a town where we stayed a couple of days. The pilots were interrogated but treated
    nicely. After that, the crew separated. I got on a fishing boat alone and went to Bari, Italy. I was the only one from
    the crew on that boat. When I got there, there was fighting, so I hid in the hills until someone picked me up and drove
    me back to base.
- speaker: Interviewer
  text: The stress, even for a young person who is pretty resilient, the stress has got to get to you after a while.
