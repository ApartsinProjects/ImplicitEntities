collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Kolpas, when did you enter the Service?
- speaker: Respondent
  text: I entered the Service in March of 1943 at the age of eighteen. I left Crane Technical High School in Chicago and entered
    the Army without completing my last year of high school. I was a captain in the ROTC rifle team, the recipient of the
    William Randolph Hearst Trophy, and medal winner in the national rifle competitions. I might add that, upon returning
    home at Thanksgiving of 1945 from Europe, I went back to school on the GI Bill of Rights, completed high school in about
    six months, and went on to graduate Wright Jr. College and the Industrial Engineering College of Chicago.
- speaker: Interviewer
  text: Mr. Kolpas, was there—so you were living on the West Side then, were you?
- speaker: Respondent
  text: I was living on the Northwest Side in the Humboldt Park area.
- speaker: Interviewer
  text: So the Humboldt Park area was going to Crane then?
- speaker: Interviewer
  text: Was there any tradition of military service in the family? Was there reason why you chose to participate in ROTC in
    high school?
- speaker: Respondent
  text: No, the only reason that I participated in the ROTC was I did like the uniform, the rifles, guns, and shooting weaponry.
- speaker: Interviewer
  text: So when you—you weren't drafted? You enlisted, did you?
- speaker: Respondent
  text: I was going to be drafted; therefore I went ahead and joined up.
- speaker: Interviewer
  text: And you didn't mind being in the Army versus the Navy?
- speaker: Respondent
  text: Well, I don't like sailing on the high seas. I like swimming. I'm really not a Navy man, when I get aboard a ship,
    and it starts to sway, I get seasick. I feel better having my feet on the ground, or in the air flying.
- speaker: Respondent
  text: The choice was—the Army.
- speaker: Interviewer
  text: Mr. Kolpas, I notice in the biographical data form that you completed for us that you were born in Lithuania?
- speaker: Respondent
  text: That is correct. I came from Europe, Lithuania at the age of nine in 1933. And then with my several years of service
    during the war in Europe, I actually spent eleven years of time in Europe—more than most other troops in the European
    Theater of Operations.
- speaker: Interviewer
  text: So you came to this country at the age of nine? Did you know English then, already?
- speaker: Respondent
  text: No, that was a real—I'll tell you that's a real, real rough go, entering grammar school at the age of nine.
- speaker: Respondent
  text: You start out with first grade. You have to learn the English language. When my mother, and myself, and two brothers
    arrived here, we spoke about four or five languages. We spoke Lithuanian, Jewish, Russian and German. Learning English
    really made it a bit rough. You're off to a tough start.
- speaker: Interviewer
  text: That's amazing, isn't it? You come here at the age of nine—
- speaker: Interviewer
  text: And then nine years later, you've mastered English, and you're able to go to defend your new country.
- speaker: Interviewer
  text: It's remarkable.
- speaker: Respondent
  text: In fact, I'd just like to add a few more things. My father came here in 1929 from Lithuania to get himself established.
    Then my mother and the three of us followed in 1933. That was during the Depression period—a pretty rough go. But their
    timing was just perfect. I still have my passport which has the German swastika seal or stamp on it. The fate of the Jewish
    people at that time was nil, yes, nothing—they were being persecuted, wiped out. In fact, as I discussed with you a little
    bit earlier, I'm interested in researching some of these events. I went on to research and found out, most unbelievable
    in Chicago, how I ran across it, which we're not going to get into right now, but I found out that my uncle, my mother's
    brother, and his wife and two kids, were awoken early in the morning, they were taken out into the forest, and my aunt
    and the two kids awoken were just gunned down, put into a ditch or mass grave and covered with lime and earth. My uncle,
    his name was Herschel, a very fine man, they were in the flax business, manufactured twine, he was taken to Dachau. And
    I have letters from the Dachau Museum. First, they wouldn't admit that he was there. But then they did find the records
    and they sent them to me. He was used as a guinea pig by Dr. Mengele for medical purposes until he died. But when we got
    out of Lithuania, the timing was perfect.
- speaker: Respondent
  text: So you enlisted, and you chose the Army, and then you were inducted at—
- speaker: Interviewer
  text: I was inducted at Fort Sheridan in Illinois. I spent approximately a week there. And then we went to Camp Rucker,
    Alabama, for basic training as combat engineers. And after basic training, we proceeded on maneuvers in the fields of
    Tennessee.
- speaker: Respondent
  text: Now, when I told my parents I was an engineer in the Army, they thought I was really going to get a good education,
    but I can tell you one thing about the combat engineers! They're just a backup outfit for anyone who needs help, the infantry,
    tank corps, anybody that needs manpower, needs something built, needs something destroyed. That's what the combat engineers
    is all about. It's a lot of hard work with exposure to the enemy.
- speaker: Interviewer
  text: You're not necessarily building bridges or something, or—
- speaker: Respondent
  text: Oh, yes. We're building bridges over the rivers, pontoon built bridges. And we're building Bailey bridges. We're building
    trestle bridges. They go up and when they're done, like on the Baileys that are made out of steel, like an erector set,
    we take them down to use them over and over again. Others are just destroyed after they're put up.
- speaker: Respondent
  text: So, your family, they understood your reasons for wanting to enlist, to participate in the war?
- speaker: Interviewer
  text: No. They weren't really happy about me going into the Service for fear I'd never come back. I promised my mother when
    I left home and walked onto Rockwell Street and headed for the streetcar on Division 81 that I was returning, and I don't
    break promises.
- speaker: Respondent
  text: And you kept your promise.
- speaker: Interviewer
  text: I kept my promise.
- speaker: Respondent
  text: Yes. So that was probably your—was that the first time you were away from your American home for an extended period
    of time?
- speaker: Interviewer
  text: Yes. They were really sort of sad to get rid of me in a sense, at that time, we had our fourth new member of the family
    born just a few years prior. And it was a girl. They needed the room. I slept in the kitchen. I was the first one up for
    breakfast, the family coming in and out of the kitchen, you can't get much sleep there!
- speaker: Respondent
  text: So you—did you find boot camp hard, or basic training?
- speaker: Interviewer
  text: No. I had no trouble adjusting to boot camp training. I always tried to do my best in the Service. I learned one thing
    quickly which is, when asked for volunteers, don't volunteer for anything! They ask you if you want to take a tour. You
    get in a truck and your ride around in the truck, loading and unloading the truck with coal. There's going to be a lot
    of work. Just don't volunteer. If you have to do it, you do it.
- speaker: Interviewer
  text: Interesting!
- speaker: Respondent
  text: And then after we left Camp Rucker, Alabama, to do advanced training, we boarded a train and headed for Needles, California.
    And there it was, Camp Iron Mountain. We went there to specialize in desert training. The days were brutally hot, and
    the nights were quite cold. And there were rattlesnakes and tarantulas. There were all of those good things running around!
    We always had to keep our clothes on, shirts, and everything else, to keep from getting burnt by the sun.
- speaker: Interviewer
  text: So you were still in, you were already in the combat engineers?
- speaker: Respondent
  text: Yes. This was all combat engineers. All the time. So, you had your boot camp, or whatever, at Camp Rucker?
- speaker: Interviewer
  text: Camp Rucker, Alabama.
- speaker: Respondent
  text: And now you're out in California?
- speaker: Interviewer
  text: Now, we're out in Needles, California, the Desert Training Center.
- speaker: Interviewer
  text: Desert Training. Yes. I wonder why they were training you in the desert.
- speaker: Respondent
  text: Well the reason was—
- speaker: Interviewer
  text: North Africa?
- speaker: Respondent
  text: North Africa, you got the right answer, and we found that out after we boarded our ships in Boston.
- speaker: Interviewer
  text: So you departed from Boston?
- speaker: Respondent
  text: Boston, yes, and I'll tell you something funny about that departure. First of all, before boarding the ship, which
    was the (USAT), which was United States Army Transport, I thought that this ship was going to take us out to where we'd
    get on a real boat that would make it across the Atlantic. No way did I think that this thing that I was on was going
    to take us to Europe across the Atlantic! No, no, no, because when I came from Europe to the United States in 1933, we
    left from Hamburg, Germany, that was a ship! This thing was like a nothing! And it was loaded to the hilt with troops.
    But before they let me aboard, there was an officer taking roll, and he looked at my papers, and he said, "Oh, I see you
    were born in Lithuania." I said, "Yes." And he asked, "Are you a citizen?" I said, "I'm a citizen because my parents already
    received their citizenship, and I was a minor, due to that, it makes me a citizen automatically." He said, "Can you prove
    it?" "Yes." I said, "I'll tell you what. Why don't you send me back to Chicago?" "Get on board!" He said, "That's it,
    you, that's it! Get on aboard the ship!"
- speaker: Respondent
  text: Well, we got aboard that USS Explorer. It took us about ten days to arrive to Scotland, thank God!
- speaker: Interviewer
  text: Slow going.
- speaker: Respondent
  text: Well, it's not that it's slow going, Neil, they zig-zag all the way across the ocean.
- speaker: Interviewer
  text: Zig-zag to avoid the submarines.
- speaker: Respondent
  text: And then, in January, we had terrible weather. The waves were very large and high. And, unfortunately, we lost one
    man overboard, because as the ship was swaying from side to side, you couldn't hold on when you got to the rope, the rails.
    And he just went overboard, but he was dead at the time he hit the freezing water. And you couldn't stop to pick him up.
- speaker: Interviewer
  text: He would have died—
- speaker: Respondent
  text: He would have died from the impact. The temperature of the water would have killed him, and the ship's decks are pretty
    high.
- speaker: Interviewer
  text: Were you on a convoy more than one ship?
- speaker: Respondent
  text: We were. I was just getting to that. We were actually in a one hundred and forty ship convoy. We had everything from
    aircraft carriers with their airplanes' wings folded and tied to the decks aboard. Any kind of craft that you could think
    of, the thing is, you had to be very careful, because there are enemy submarines in those waters. And you can't throw
    anything overboard, or do anything that would give you away. And the course was always zig-zagging. But, about on the
    fifth day out, we noticed a big change. Part of the convoy turned to the right, and ours straight ahead. The one that
    I was in went to Scotland. The other one went to North Africa.
- speaker: Interviewer
  text: Did you come into Glasgow or some place?
- speaker: Respondent
  text: Yes. Actually, you're right. That's where it was, and there were some people to meet and greet us there from the USA,
    or whatever. They gave us meat pies. I thought they were real pies! First time I ever had a meat pie. I bit into one of
    those and I threw the rest of it away. I'll tell you, it wasn't my thing. I thought they were fruit pies by appearance!
    But, anyway, they took us over to England, and it was along the Channel, and we actually wound up in the area of Weymouth,
    England.
- speaker: Interviewer
  text: That was way in the south, right?
- speaker: Respondent
  text: Oh, yes. That was right on the water.
- speaker: Interviewer
  text: So, was that by train, or bus, or truck?
- speaker: Respondent
  text: We went by train.
- speaker: Interviewer
  text: By train again.
- speaker: Respondent
  text: By train again.
- speaker: Interviewer
  text: And that's where we started our training for the invasion of Nazi-occupied Europe.
- speaker: Interviewer
  text: So when you were with your fellow soldiers in the boat, did you have the sense of, hey, we're going over, and we're
    going in. I mean, did you know what was probably—no?
- speaker: Respondent
  text: There was no question about it. We were stacked up like sardines. There were canvas cots; they were on racks, stacked
    four or five on the sides of the boats or wherever you could sleep. We knew we were there for the purpose of getting started,
    and most important, of getting Hitler out of Germany.
- speaker: Interviewer
  text: Did you have any preference, North Africa, England, did it make any—
- speaker: Respondent
  text: I didn't care if it was North Africa or England, but I didn't care to go to the South Pacific. I felt that, coming
    from Europe, I know what the climate is like.
- speaker: Respondent
  text: And the people would be more humane. And it would be a place that I could understand some of that language, so it
    would be easier.
- speaker: Interviewer
  text: The Army never tried to make use of any of your language skills or—
- speaker: Respondent
  text: Oh, only on occasions where there were some German prisoners involved, but not as an interpreter, no, I was definitely
    selected and trained for demolition and rifle marksmanship, and teaching marksmanship in the Service.
- speaker: Interviewer
  text: The talent that you showed in high school with the rifling—
- speaker: Interviewer
  text: That carried through and was recognized, to a degree?
- speaker: Respondent
  text: It was definitely helpful and recognized by senior performance when you're on the target range. It helped me become
    a noncommissioned officer almost overnight. I think by the time I left Camp Rucker, Alabama, I was a sergeant and that
    was ninety days. God, if I had a good education and knew what I was doing, I could have been somebody else in the officer
    group. I came back home and that's basically what counts.
- speaker: Respondent
  text: So, that trip over, were you—ten days was a long time. This must have seemed like a long time?
- speaker: Interviewer
  text: It was a hell of a long time! A lot of seasickness, a lot of throwing up and you have throw up bags to use when necessary.
- speaker: Respondent
  text: And, incidentally, this was something that just came to my mind. And you're asking good questions. We're out to sea
    and an unusual incident occurred. They found out that there were a lot of oranges stored aboard ship in the brig down
    below. Some of the men took it upon themselves to get down and help themselves to cases of oranges. Then one of the officers
    aboard ship from the Navy started chasing them. And they dropped the crates and knocked him down the stairs into the brig.
    And the next thing we heard aboard ship, and this was the first time I bring this up in a long time, is "Hear this! Hear
    this! Attention! Hear this! Hear this! Everyone is restricted to the ship. No one is allowed to leave the ship." Where
    the hell are we going to go! There's nowhere to go, anyway! You're down to about 70 ships out there, zig-zagging. But
    we were reprimanded for that. It was a good try. It was an unusual thing that happened aboard ship.
- speaker: Interviewer
  text: Restricted to the ship, yes.
- speaker: Respondent
  text: Yes. Everybody's restricted to the ship.
- speaker: Interviewer
  text: So, in England, it's—you probably landing January or February?
- speaker: Respondent
  text: In January.
- speaker: Interviewer
  text: So, the weather must have been a little wet, or?
- speaker: Respondent
  text: Well, the weather there is never good, even in good times.
- speaker: Interviewer
  text: You adjusted to the food, or?
- speaker: Respondent
  text: Well, the food was still Army food. We weren't allowed to eat civilian food because of rationing.
- speaker: Respondent
  text: That was a real no-no! Quite restricted, some families, Bruce Robertson's group (my flame thrower) had a few friends
    with him, they met someone that owned a store that sold groceries, meats, and things like that. I know they were invited
    over to their homes when they got a leave. And they would have dinner, eat with them, and have dinner. I, myself, never
    really indulged in that. I didn't care for English cooking, but the Army food, "eat all you want! But eat it. Don't leave
    it on your plate!"
- speaker: Interviewer
  text: So, when you arrived down in Weymouth, then, do you go through more training, different type of training?
- speaker: Respondent
  text: Oh, yes. Once we got to Weymouth, that's where the real training begins. First, we were practicing with the use of
    live ammunition in everything that we did. And that started around March. Prior to that time, we would lay mines in the
    field for practice. They would be defused. We used blanks in the rifles during maneuvers. But from March of '44, everything
    was live ammunition. But then we had one terrible accident. And I happened to get involved in it. And that was the 29th
    Engineers had a mine-laying exercise. And the way mines are laid is you have a six by six truck basically loaded with
    tank mines which are about twelve inches in diameter and about two and a half inches or so in height or thickness. And
    there is a cover on them that is like a ring. And the fuse is in the center. And, if the ring is tipped by pressure, they'll
    explode.
- speaker: Respondent
  text: And there is a terrible blast. There are two people on the back of the truck, handing the mines out to the soldiers
    that are laying the mine a certain sequence pattern. The sad part about it, and I didn't like the part when I first saw
    it, anyway, but that was your procedure, the truck driver would do the opposite in picking them up. He would put the truck
    in reverse procedure, try and follow the same trail in reverse.
- speaker: Respondent
  text: They would pick the mines up, hand it to the men on the truck, and they would stack them up. Well, this time it didn't
    work, because one of the mines was rolled over by the truck's tires and that set off all of the mines on the truck. And
    I have to stop and think for a moment. This incident was in the local paper in England and the Stars and Stripes, and
    things like that. We lost twenty-nine men that were killed, and eight that were injured. And our assignment in Company
    B, was to pick up the pieces. I can honestly say to you that what we had were gunny sacks, broom handles with nails at
    the end. Just to pick up the pieces all through the fields. We had even parts of their shoes with the shoelaces still
    in them, blown up, hanging from the trees—a terr—
