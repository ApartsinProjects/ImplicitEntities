collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Rolf, can you tell me when you first entered the service?
- speaker: Respondent
  text: Right after I graduated from high school, I entered March, 1944.
- speaker: Interviewer
  text: Where were you living at that time?
- speaker: Respondent
  text: In Chicago.
- speaker: Interviewer
  text: What were you doing before - you mentioned you were in high school.
- speaker: Respondent
  text: Yes, I was in high school.
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: I enlisted.
- speaker: Interviewer
  text: What branch of service were you in?
- speaker: Respondent
  text: In the Army.
- speaker: Interviewer
  text: Why did you pick that branch of the service?
- speaker: Respondent
  text: I was eager and I wanted to fight - stupid, [chuckle].
- speaker: Interviewer
  text: Where were you inducted?
- speaker: Respondent
  text: In Fort Sheridan, Illinois.
- speaker: Interviewer
  text: Tell me a little bit about what your first days were like.
- speaker: Respondent
  text: Well, I was with about a few thousand other people that either were drafted or enlisted - much routine paperwork,
    physical exams and being indoctrinated.
- speaker: Interviewer
  text: Can you tell me a little bit about boot camp, your training experiences like, for example, being away from home, your
    drill instructors, your living conditions, any lifestyle adjustments that you had to make?
- speaker: Respondent
  text: OK, my boot camp was in Camp Blanding, Florida, and we took our Basic Training there, normally a 16-week basic infantry
    training. It was quite an adjustment. It was not too hard for me because I was used to it. I had a little bit of ROTC
    training in Chicago when I was in Lake View High School. Basic Training is mainly getting used to army life. The sergeant
    in charge is like a god. You do what he tells you and that's it. It was summer time. It was very hot. In Florida we lived
    with all kinds of strange creatures, alligators and so on. We had to contend with wild pigs that gave us a hard time because
    they would dig into our tents at night and when we were away from the tents, dig up all the food that we had and so on.
    Other than that, it was just heavy, physical training.
- speaker: Interviewer
  text: Where did you go after boot camp?
- speaker: Respondent
  text: After boot camp, we went for advanced military training in Camp Shelby, Mississippi, where they started a new infantry
    division. It was the 65th Infantry Division. I was in Camp Shelby until, I believe, October or November, 1944 and the
    whole Division went overseas. We joined General Patton's 3rd Army and at the time in France we relieved a division that
    was there already. I believe it was the 26th Infantry Division and we relieved them, man by man or squad by squad, and
    gave them a chance to go on rest.
- speaker: Interviewer
  text: And that was considered advanced training?
- speaker: Respondent
  text: That was advanced training. In Florida it was a basic training and this was advanced training.
- speaker: Interviewer
  text: Did you have any stateside assignments?
- speaker: Respondent
  text: At the time, no. I was in the 65th Infantry Division. My assignment was in a heavy weapons platoon, which had heavy
    machine guns and mortars so we had specialized training in that. But as soon as our division was ready and our commanders
    thought we were ready, we went overseas.
- speaker: Interviewer
  text: When did you depart for overseas duty?
- speaker: Respondent
  text: I believe it was in November of 1944.
- speaker: Interviewer
  text: And from where did you depart?
- speaker: Respondent
  text: We left from New York and landed in Le Havre, France.
- speaker: Interviewer
  text: How did you travel to France?
- speaker: Respondent
  text: By troop ship.
- speaker: Interviewer
  text: What was its mission?
- speaker: Respondent
  text: Fight the Germans.
- speaker: Interviewer
  text: Where was your unit first assigned?
- speaker: Respondent
  text: In France, I don't remember the name of the place.
- speaker: Interviewer
  text: What was your first job?
- speaker: Respondent
  text: As gunner in Company D, a heavy weapons company.
- speaker: Interviewer
  text: Do you recall what rank you were at that time?
- speaker: Respondent
  text: I believe I was a PFC, Private First Class.
- speaker: Interviewer
  text: What was your life like at that time, would you say?
- speaker: Respondent
  text: Trying to stay alive. We were in the infantry. There was a lot of fighting and the main mission was that when you
    hear enemy shells coming in, you knew how to duck and hit the ground and hope it doesn't kill you.
- speaker: Interviewer
  text: Where did you sleep?
- speaker: Respondent
  text: On the ground, wherever we could find a place to sleep. We didn't have tents so you just found a place to sleep in.
- speaker: Interviewer
  text: What did you have to eat?
- speaker: Respondent
  text: Filet mignon [chuckle] whatever we could find. It was during the war and we were advancing into France and then into
    Germany. I had an advantage since I spoke German. I was able to find some pretty good food and houses where we could sleep,
    actually. And we would eat anything we could find.
- speaker: Interviewer
  text: Were you able to stay in touch with your family?
- speaker: Respondent
  text: We were permitted to send postcards, I forgot the names of those postcards that they had. But we could not tell them
    where we were or what we were doing, but we could tell them, you know, "We were fine" so no email or telephones.
- speaker: Interviewer
  text: So everything was censored?
- speaker: Respondent
  text: Everything was censored.
- speaker: Interviewer
  text: Tell me a little bit about the pressure and the stress that you felt at that time.
- speaker: Respondent
  text: The main pressure was to stay alive and try and kill as many enemies as you could. That was my main job.
- speaker: Interviewer
  text: Did you have any USO shows? We've all seen, Bob Hope and famous entertainers?
- speaker: Respondent
  text: No we didn't have that. We did our own entertaining.
- speaker: Interviewer
  text: So no morale-boosting celebrities from Hollywood came?
- speaker: Respondent
  text: No, not when I was there.
- speaker: Interviewer
  text: What did you do when you were on leave? Did you travel? Were you able to come home?
- speaker: Respondent
  text: 'We didn''t have any leave until after the war. And then we had a choice. The Army gave us a choice: Italy, Switzerland,
    and Austria. I decided to go to Switzerland because every place in Europe was destroyed mostly. I didn''t want to see
    any more destruction than I had to. Switzerland was neutral so I decided to go to Switzerland for two weeks, I believe,
    and had a wonderful time.'
- speaker: Interviewer
  text: That was after the war?
- speaker: Respondent
  text: Yes, after the war. You don't have any leave during the war.
- speaker: Interviewer
  text: Do you recall any particularly humorous or unusual events in general? In general I'm thinking a happy memory as opposed
    to a dark memory.
- speaker: Respondent
  text: Well, one thing I remember was during the war. We were staying in a very nice house that belonged to the mayor of
    the little city we were in. During the night we went to sleep in a feather bed which was something that very unusual for
    us. We fell asleep and during the night our planes came over and started strafing us because they thought we were the
    enemy. We ran so fast because just about a few hundred feet from where we stayed was a big ammunition dump. I remember
    getting out of the house. Our own planes were strafing us and we jumped over the fence to get away from our own planes.
    I never moved so fast in my life!
- speaker: Interviewer
  text: Do you have any photographs or did you keep a diary or any other memorabilia from your days in the service?
- speaker: Respondent
  text: No, I have none, nothing. What I had was lost. I had some letters but I didn't keep any.
- speaker: Interviewer
  text: Do you recall when your unit was first in combat?
- speaker: Respondent
  text: Yes, I believe it was in December of 1944.
- speaker: Interviewer
  text: And where was that?
- speaker: Interviewer
  text: And what was your assignment at that time?
- speaker: Respondent
  text: I was a gunner in a heavy weapons company.
- speaker: Interviewer
  text: And your experience with that for your first combat?
- speaker: Respondent
  text: Trying to distinguish between enemy shells and our own shells. They have a special sound that the enemy shells make
    when they come at you. So when you hear them coming, hit the ground.
- speaker: Interviewer
  text: Anything that stands out in your memory from that first combat?
- speaker: Respondent
  text: Yes, I was scared because we did not know what to expect.
- speaker: Interviewer
  text: Do you remember what happened?
- speaker: Respondent
  text: No, I don't remember except, we were actually trained by the people that we relieved. They told us what to expect.
    They're the ones who told us the differences between enemy shells coming in and our own shells going out from our heavy
    artillery. There's a lot of noise but after a while you learn to distinguish the sounds.
- speaker: Interviewer
  text: Do you recall any casualties from your unit?
- speaker: Respondent
  text: Yes, we had casualties but we were relatively lucky. The whole division, I don't remember what the casualties were,
    probably a couple of thousand. I don't remember exactly.
- speaker: Interviewer
  text: So talking about your time after your service, describe what it was like the day your service ended.
- speaker: Respondent
  text: I remember when the war ended we were in Austria and the first time in my life I got so drunk that I actually got
    sick. That's what I remember about that day.
- speaker: Interviewer
  text: When and where were you discharged?
- speaker: Respondent
  text: I was in General Patton's 3rd Army. After the war, actually, I was not discharged. In Fort Sheridan, I joined the
    United States Army Reserves. That was in August, 1946, I believe, somewhere along there.
- speaker: Interviewer
  text: What did you do in the days and the weeks after that time?
- speaker: Respondent
  text: When I joined the reserve, I was told that since I was in the infantry during the war that I might want to join the
    military intelligence department which is what I did in the reserves. I went to school for military intelligence, once
    a week, and I also went to college under the G.I. Bill for four years, but every week we went for training.
- speaker: Interviewer
  text: So you went back to school then.
- speaker: Respondent
  text: I went back to school then and that was in Chicago.
- speaker: Interviewer
  text: And did you work at that time or concentrate on school?
- speaker: Respondent
  text: No, I always had part-time jobs when I was going to school.
- speaker: Interviewer
  text: And you mentioned that your education was supported by the G.I. Bill.
- speaker: Interviewer
  text: What did you go on to do as a career after the war?
- speaker: Respondent
  text: After the war since I graduated with a Bachelor of Science degree in Business Administration and majored in Accounting
    at Roosevelt University, I got my first job with a company called Teletype Corporation. I worked there for a few years.
    I didn't particularly like the job, but it was a job.
- speaker: Interviewer
  text: Did you eventually marry and have a family?
- speaker: Respondent
  text: Yes, I got married, had a daughter and then the Korean War started so then I was called back into active duty. But
    because of the training I had, I did not go back into the infantry. I went into what is now called the National Security
    Agency. At the time it was called Army Security Agency. I was sent to Massachusetts, that's where the headquarters were.
    Fort Devens, and to Washington, DC. Luckily I did not go overseas. I spent the Korean War in either Washington, DC area,
    or Baltimore, Maryland. The Korean War started just when I finished college. I graduated from college. But I was called
    back because I was in the Reserves and I could not go to my graduation exercises. They had to send me my diploma because
    I was called back into Active Duty and I went to Washington, D.C. and trained in the C-I-C, which was the Counter Intelligence
    Corps. My reserve training was in CIC, counter-intelligence, and when I went to Washington, D. C. I was transferred to
    the Army Security Agency, now known as the National Security Agency. I was stationed in Baltimore, Maryland and Washington
    D.C. but I was lucky I never went overseas. The funny part was that in those days the Army Security Agency's job was to
    intercept enemy communication, Morse Code and stuff like that. The job was very secretive. You had to have a top secret
    classification which I had but it was so top secret that nobody knew what the heck you were doing! I was in either in
    the Pentagon or one of the other big buildings, up on one of the top floors. I had an office there, but I had very little
    to do because no one could come in there without authorization so most of my time was spent reading books and taking it
    easy. That was my accomplishment during the Korean War!
- speaker: Interviewer
  text: Did you stay in contact with any of your wartime buddies after the service? Did you continue any of those relationships?
- speaker: Respondent
  text: No, we did not because we were just spread out all over the country. I wish I had.
- speaker: Interviewer
  text: Did you join any veterans organization?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: Well since you said that you did not join any veterans organizations then that would mean that you didn't attend any
    reunions or meetings?
- speaker: Interviewer
  text: Well, we're winding down. How would you say your service and experiences affected your life today?
- speaker: Respondent
  text: I felt very fortunate that I was able to join the Army and be of service. And the fact is that if it wasn't for the
    G.I. Bill I probably would never have finished college. I was very fortunate.
- speaker: Interviewer
  text: So you're a proud veteran.
- speaker: Respondent
  text: Yes. I never regretted the fact that I was able to serve. Basically, the reason I joined the Reserves was so that
    I would not have to go back into the infantry. That was why I went to school and CIC school, which is counter-intelligence
    school, and then got transferred to the National Security Agency or Army Security Agency. I was teaching German to American
    officers when I was there. During the war, of course, we didn't mention that. Right after the war I was interviewing German
    prisoners of war and certified that they were ok to be discharged or not. We had a big book at the time of all the war
    criminals and stuff like that. We had to make sure that they were not wanted for war crimes.
- speaker: Interviewer
  text: For crimes against humanity?
- speaker: Respondent
  text: Yes, for crimes against humanity.
- speaker: Interviewer
  text: Did your military experience influence your thinking about war or the military in general?
- speaker: Respondent
  text: Yes, you do what you are told in the military. You don't have much of a choice. I was lucky. I was not wounded and
    I did not really have any bad experiences.
- speaker: Interviewer
  text: Is there anything else that you would like to add and share with us today that we haven't covered already?
- speaker: Respondent
  text: Well, the one thing I am married to my present wife Elaine and I have a very nice family, a very nice step-daughter
    who is doing the interviewing right now! But, no, I have been very lucky and fortunate.
