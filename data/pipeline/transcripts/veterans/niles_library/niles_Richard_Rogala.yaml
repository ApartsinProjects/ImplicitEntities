collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the service?
- speaker: Respondent
  text: I was actually a Navy reservist, came in September, 1966 as a reservist and attended meetings down at Monroe Harbor
    in Chicago for a year then I received papers in September of 1967 to go to Treasure Isle, San Francisco, where I was in
    a transit warehouse for three weeks. And then, I received orders to report to the USS Pueblo on Friday, October 13th,
    1967.
- speaker: Interviewer
  text: Was it, now, if I may ask you, you were a Reservist, how or why did you decide to become a Reservist?
- speaker: Respondent
  text: Well, it was the build-up of the Vietnam War, and rather than get drafted, I said, 'Well, I'll serve my country in
    another way. I'll go in the Navy,' because I preferred the Navy.
- speaker: Interviewer
  text: Well, your dad, who went mentioned in introducing this interview, he was a World War II veteran?
- speaker: Interviewer
  text: And he served in the?
- speaker: Interviewer
  text: Air Force, but you didn't want to--
- speaker: Respondent
  text: The Air Force. I didn't really want anything to do with that. Nor the Army.
- speaker: Interviewer
  text: Right. So, you chose the Navy?
- speaker: Respondent
  text: I chose the Navy. In fact, I got my draft papers a couple days after I got sworn into the Navy Reserve, and then a
    day after, a cancellation of it. So, I knew I was going to get drafted, because the people then were either getting married
    or going to college, and then they didn't have to go in the Service. But I elected to do it.
- speaker: Interviewer
  text: Could you swim?
- speaker: Respondent
  text: When I was a little kid, we were at the lake all the time. So that's where the relation came. We used to go to lakes
    in Northern Illinois, or Southern Wisconsin, and I learned to swim at a young age. I wasn't afraid of the water.
- speaker: Respondent
  text: In fact, when we were going across the Pacific, I was in the Pacific Ocean once. But we didn't stay in long. But we
    did jump in.
- speaker: Interviewer
  text: Neat. Swimmers. It wasn't fear.
- speaker: Respondent
  text: Yeah. It didn't bother me.
- speaker: Interviewer
  text: What high school did you attend?
- speaker: Respondent
  text: I attended Holy Trinity High School in Chicago.
- speaker: Interviewer
  text: Is that down on Division or--
- speaker: Respondent
  text: Division, right off the expressway. It's still there after all these years. Most high schools in that area have gone
    away, but Holy Trinity is still there.
- speaker: Interviewer
  text: And you graduated from high school in?
- speaker: Interviewer
  text: '''65. So, did you have a draft number then, or was there Selective Service, were you given a number in the draft?'
- speaker: Respondent
  text: No draft number. We had the Selective Service then, and anyone turning 18 was called in for a physical. They were
    just taking anybody and everybody for Vietnam! It was the premier build-up of the Vietnam War when they had built troop
    levels up to 750 to 800,000, an unbelievable amount. The build-up peaked, right around the time it was time for me to
    serve.
- speaker: Interviewer
  text: Your parents, they thought it was a good idea for you to go into the Reserves, or it was-- everybody at home thought
    it was a good idea?
- speaker: Respondent
  text: Yes, considering what my options were.
- speaker: Respondent
  text: As a reservist, I was going to serve two years active duty.
- speaker: Respondent
  text: I knew I was going to go on active duty, but little did we know!
- speaker: Interviewer
  text: So you entered the Service then at Fort Sheridan, or it was a different process, or--
- speaker: Respondent
  text: Well, I went--
- speaker: Interviewer
  text: Or Great Lakes?
- speaker: Respondent
  text: Great Lakes was where I entered. I went to boot camp for two weeks. And then I was aboard a ship in Portage, Wisconsin,
    for two weeks of additional training. That was early in '67. And then I attended meetings in Chicago at Monroe Harbor,
    at the naval center for a year.
- speaker: Interviewer
  text: So was there-- did you have any difficulty making adjustments to military life? Or most of the guys were pretty nice?
- speaker: Respondent
  text: You're flexible at age 19. You kind of take it as it comes. I look back now at all of this that happened and it is
    like how did I get through it!
- speaker: Interviewer
  text: So were there any memorable instructors, or nasty trainers, or--
- speaker: Respondent
  text: During boot camp our Navy company scored real high, since our platoon leader had gone over the records of what was
    going to be on the test the night before. So, we all scored really high. This particular platoon leader would always score
    the highest, because of what he was doing. But that was something you just can't forget! We were doing this in the middle
    of the night cramming for the big test, so you pass.
- speaker: Interviewer
  text: And that was in Wisconsin?
- speaker: Respondent
  text: That was in Great Lakes, Illinois.
- speaker: Interviewer
  text: That was in Great Lakes.
- speaker: Respondent
  text: Right. Yeah.
- speaker: Interviewer
  text: So, then within the Navy, did they direct you to a position, or a pharmacy, or medic, or navigation, or electronics,
    or something?
- speaker: Respondent
  text: On aboard ship?
- speaker: Respondent
  text: We were an intelligence gathering ship. But I wasn't on there for that purpose. I was on there as part of the deck
    crew, which is ship maintenance, washing clothes, painting, serving food. I was very green.
- speaker: Interviewer
  text: So, when you come out of the Navy boot camp, or whatever the proper term is, you don't know yet what you are going
    to be in the Navy?
- speaker: Respondent
  text: Right. You have no idea. That's just basic training.
- speaker: Interviewer
  text: So when you finish Great Lakes, then you--
- speaker: Respondent
  text: Well, I was still working then at a National Supermarket and went to the meetings for a year.
- speaker: Interviewer
  text: And then when you go into-- when you are called into the Navy proper, active duty, where are you sent then?
- speaker: Respondent
  text: We went to Treasure Isles, San Francisco. That's an in-transit warehouse for people going into the military. They
    send you there until you get your orders. They basically process you to get you ready to send you somewhere.
- speaker: Interviewer
  text: And were you still with the same group of guys from Great Lakes?
- speaker: Respondent
  text: It was individuals from all over the country. In fact, I had a friend that was my same age that went. He and I signed
    up together, so he went there at the same time as me, but then he got orders to a different ship. But we did meet up in
    Japan once before this all happened, so--. Yeah.
- speaker: Interviewer
  text: So you were in San Francisco, and then you get assigned to--
- speaker: Interviewer
  text: To the Pueblo?
- speaker: Respondent
  text: Right. And it was ironic this happened, but it was on Friday, October the 13th, 1967.
- speaker: Interviewer
  text: Oh, right. Yeah.
- speaker: Respondent
  text: I am superstitious. I will be for the rest of my life. I was born on the 13th. I went aboard the ship on Friday, the
    13th. On the 13th day we got captured. I received a Purple Heart Medal when I got back. The notice came on the 13th. And
    my name, Richard Rogala, has 13 letters. So, I'm very superstitious about the number 13.
- speaker: Interviewer
  text: Yeah. Yeah. Wow.
- speaker: Respondent
  text: So, I've got all these thirteens behind me, and twenty years ago I met my wife to be, Regina. And her birthday is
    the same day as mine, August 13th. And so it just goes on and on. It was like what's going to happen next! But in the
    last several years, I've adopted a thought process that something good's going to happen someday, and it's going to happen
    on the 13th!
- speaker: Interviewer
  text: So, the Pueblo sailed out of San Francisco?
- speaker: Respondent
  text: I reported to the USS Pueblo in San Diego.
- speaker: Interviewer
  text: In San Diego.
- speaker: Respondent
  text: That's where it was at the time I boarded. It was commissioned in Bremerton, Washington.
- speaker: Interviewer
  text: So it was a new ship?
- speaker: Respondent
  text: No, it was an old-- it was built in Kewaunee, Wisconsin. And it was a cargo ship during World War II. They took it
    out of service, and then they refurbished it, and put it back into service. They jammed eighty-three people on a two hundred-foot
    ship. The racks where we slept, were one on top of another. And I was the fourth one up toward the ceiling. And I had
    about one foot between the bed and the ceiling. So, I had to sleep flat. And then there was a pipe coming across on the
    end of the rack, so I had to kind of sleep to the side. But that was the sleeping quarters I had to go through when I
    was on the ship. It was pretty unique.
- speaker: Interviewer
  text: When you were in basic training, did you have to learn to sleep in a bunk?
- speaker: Respondent
  text: Yes. So, I got some experience with going up a ladder. Then it prepared me for a much higher bunk on ship.
- speaker: Interviewer
  text: It was a good thing you weren't-- you didn't suffer from claustrophobia!
- speaker: Respondent
  text: It was such tight quarters. It was unbelievable how we got so many people aboard there.
- speaker: Interviewer
  text: And why did there have to be so many people onboard the ship?
- speaker: Respondent
  text: Well, there were-- half of them were the intelligence people and half of them were maintenance people, but the-- half
    were communications technicians, and they were the ones that did the work collecting the intelligence information. So
    that's why I think there would have been so many. We also had two oceanographers aboard the ship that were not in the
    military, that were oceanographers. And they collected water samples, and that was kind of a cover for the ship of what
    its main purpose was.
- speaker: Interviewer
  text: So when you left, when you got your assignment to the Pueblo, you just figured, well, this was just another-- you
    didn't have any views one way or another?
- speaker: Respondent
  text: I knew I was heading to Japan with a stop in Hawaii. And I have fond memories of Hawaii, because many us turned legal
    age there. There it was twenty, not twenty-one, so we had some really great liberty. We stopped there for four days, and
    we had some wonderful days there in that quarter of the crew was about the same age as me, we were just kids-- twenty
    years old. In fact, while I was in North Korea during 1968, I spent my twenty-first birthday there.
- speaker: Interviewer
  text: So to Japan.
- speaker: Interviewer
  text: And you get shore leave in Japan or you get to go in--
- speaker: Respondent
  text: We arrived in Japan, like early December, and we stayed there 'til early January. We spent the holidays in Japan.
    We headed out on our mission January 5th of 1968 with a stop in Sasebo. It was 13 days later on January 23, 1968 that
    the trouble started.
- speaker: Interviewer
  text: When you left Japan, did you know that you were going to be going into international waters?
- speaker: Respondent
  text: I knew nothing. The communications technicians knew a fair amount, but I knew nothing. I had no idea where we were
    going.
- speaker: Interviewer
  text: And was that the case for most of the crew, or half of the crew, or--
- speaker: Respondent
  text: At least half of the crew or more.
- speaker: Interviewer
  text: Yeah. So, on ship--
- speaker: Respondent
  text: When this all started happening, it was like what the heck's going on. What is this all about? Little bits and pieces
    started coming out.
- speaker: Interviewer
  text: So, on the-- your rank in the Navy was SK3. What does that denote?
- speaker: Respondent
  text: That ranking I didn't really get until after I was out. I was actually a seaman apprentice when this all happened.
    The lowest rank you could possibly be.
- speaker: Interviewer
  text: So, your typical day on ship would have been getting up at a certain time or--
- speaker: Respondent
  text: Getting up at a certain time, standing watch when we were out to sea, I had two four hour watches which would be a
    typical day out at sea. When in port it was keeping the ship in tip-top condition.
- speaker: Interviewer
  text: Are you looking through binoculars or?
- speaker: Respondent
  text: Yes, but it was pitch black. You couldn't see. Going out there when it was pitch black was just unbelievable. Your
    eyes wouldn't adjust. It was like walking in the dark, and you couldn't see, so you had your eyes covered, because we'd
    have to walk out to the area where we would be doing the watch in the front of the ship.
- speaker: Interviewer
  text: Did you have to report any funny sounds at night or anything?
- speaker: Respondent
  text: Anything we saw, we reported to the one that was steering the ship. There was communications if we saw anything at
    all. I wasn't on watch when this all started to happen on the 23rd.
- speaker: Interviewer
  text: So what is this thing that is going to happen? What happens-- what was that day like?
- speaker: Respondent
  text: Well, at first, it was a joke. We didn't know what was going on. We didn't think anybody was serious. There were torpedo
    boats that were taking pictures of us, and eyeing us.
- speaker: Interviewer
  text: These were North Korean?
- speaker: Respondent
  text: Then there were planes overhead, like three planes, and six torpedo boats. And they surrounded us, and we started
    heading out to sea, and then they started firing upon us.
- speaker: Interviewer
  text: Where were you when that happened?
- speaker: Respondent
  text: I was at general quarters and everybody was on the floor. I was at the front part of the ship laying on the floor,
    on the ground, and every time you heard a bullet go off, it was like, oh! You know, your heart kind of stopped for a second
    or two, because you didn't know where it was going. But one of the crew members got killed during that ordeal. Wayne Hodges
    got killed, and twelve got injured.
- speaker: Interviewer
  text: By bullets?
- speaker: Respondent
  text: Right. Wayne Hodges got killed. He was throwing classified material over the side of the ship.
- speaker: Interviewer
  text: Was it papers, or electronics, or--
- speaker: Respondent
  text: Papers, sledgehammers on the electronics, and stuff like that. So it's come out that, in the last few years, that
    Russia had something to do with this whole thing, because you wondered what the hell a place like North Korea would be
    taking us, and it's come out in years where some guy by the name of Walker was doing a study. And the study had something
    to do with-- they wanted some of our intelligence gathering information.
- speaker: Interviewer
  text: So the waters where they approached the ship and started firing, those were the waters between Japan and Korea?
- speaker: Respondent
  text: Well, we were off the coast of North Korea.
- speaker: Interviewer
  text: Off the coast on the?
- speaker: Respondent
  text: We were off the coast, like fifteen miles, that's what our records show. Well, they claimed we were nine miles out
    from some island. International water was twelve miles. So, if you're thirteen miles out, and you're taking information
    from the country, picking up signals, etc, it's legal. If you're ten miles, it's not legal. All countries have international
    water of twelve miles.
- speaker: Interviewer
  text: So that's where the argument came in, why they took us.
- speaker: Respondent
  text: But even on the day that the torpedo boats came, you still didn't know that you were intelligence gathering, did you?
- speaker: Respondent
  text: No? I didn't know that until when we were taken. That day, we started finding stuff out. It was like, what are we
    doing here! I didn't know where we were at. It was kind of like sssh-sssh, you know.
- speaker: Interviewer
  text: So you-- the ship tries to evade them, right, go out to open sea?
- speaker: Interviewer
  text: And they cut them off, or something, or?
- speaker: Respondent
  text: They started firing.
- speaker: Interviewer
  text: So, was the Pueblo armed with guns, or anything, or--
- speaker: Respondent
  text: Two 50 caliber machine guns that were not even mounted, that we practiced on once.
- speaker: Respondent
  text: They were frozen.
- speaker: Respondent
  text: They were frozen. I mean, this was January. It was cold outside. There was no way that we were going to use them.
    I practiced on them once, though they weren't even mounted upon the ship.
- speaker: Interviewer
  text: So, it wasn't going to happen. So, we were totally unprepared for the task at hand.
- speaker: Respondent
  text: And, basically, other ships in the past that had gone to China and Russia, off their coasts, and did the same things,
    they never were fired upon. They were escorted out further to sea, or told to move on, or something, but never, nothing
    like this. There was no history to say anything like this would happen. We had another ship like the Pueblo that did this
    kind of mission, the USS Banner to other places. And nothing ever happened. So, it was supposed to be a non-risk mission.
    Not a whole lot was supposed to happen.
- speaker: Interviewer
  text: So, the torpedo boats kind of had the ship corralled or something?
- speaker: Respondent
  text: Yeah, surrounded, yeah.
- speaker: Interviewer
  text: And then did they start talking to you, or sending--
- speaker: Respondent
  text: They first-- They started talking to us, but we had no idea what they were jabbering. We tried to get the heck out
    of there, and when we tried, they started firing. And then they started getting closer and closer to us, so we just kept
    trying to run for a while. And, after a while, after all the injuries and everything, we decided just to stop and let
    them board us, because there were all those injuries already, and one guy was killed already. Well, we knew he wouldn't
    live very long. So, we let them board us, and they took over the ship, pulled us into Wonsan Harbor. And they took us
    off the ship, and gangplanked down to the ground. They put us on a bus, and then we went to the train station. We boarded
    a train for an overnight trip.
- speaker: Respondent
  text: Blindfolded, off the ship.
- speaker: Respondent
  text: We were blindfolded, and we were in downtown Pyongyang at night. They had us have our hands up in the air. It is one
    of the famous pictures of all of us holding our hands up in downtown Pyongyang in the dark.
- speaker: Respondent
  text: You almost fell off the gangplank.
- speaker: Respondent
  text: Yes, walking off the ship. There was a little gangplank. I thought I was falling. Somebody caught me since I was blindfolded.
    I didn't know what I was doing. But it was scary. Then they took us to some place, and they said, 'If you follow our laws
    and obey our rules, everything will be okay.' Well, I misunderstood them. I thought they said, 'Since you didn't follow
    our laws, you're going to be done away with.' So, it was kind of a scary thing. But then we were put on a train. And some
    guards were stuffing bread into our mouths. We didn't know if we could eat it or what. Most of us were spitting it out,
    because we didn't know what the heck they were giving to us. So, then, they took us to some military complex. And we got
    there by blindfold, so we didn't know where we were exactly at. But we stayed there for about three months. And they moved
    us to another complex.
- speaker: Interviewer
  text: During those three months, were all the days similar to one another, or did they talk to you, or try to tell you what
    a great country--
- speaker: Respondent
  text: Oh, yes. We underwent modern brainwashing. We had literature to read. We had books to read. They talked to us about
    their country, how nice it would be to live there. And one of the unique things that they showed us, pictures of Americans
    that defected to North Korea. And I thought it was BS until about within the last year, I found out it wasn't, because
    CNN aired this documentary where this one guy that's been living there for forty-five years. He went across the line from
    North Korea across the DMZ to the South during
