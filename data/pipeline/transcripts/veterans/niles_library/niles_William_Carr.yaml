collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Carr do you recall when you entered the service?
- speaker: Respondent
  text: Yes, March 1969.
- speaker: Interviewer
  text: And where were you living at that time?
- speaker: Respondent
  text: Okay, I was living with my parents, we were living in the suburb of Lyons, Illinois.
- speaker: Interviewer
  text: And what were you doing at the time you entered, before you entered the service? How was your life at that time?
- speaker: Respondent
  text: I was just a civilian, I worked in Cicero. There was a printing- it was actually called a bindery, we didn't actually
    print anything. We did the final work. One of my brothers eventually became a foreman, and after I graduated high school
    in 1966 he got me a job there. And then I was drafted in March 1969 and that's when I went in the service.
- speaker: Interviewer
  text: So, what high school did you attend?
- speaker: Respondent
  text: Okay, I went Morton West High School. I lived in Lyons, but I went to school in Berwyn, Illinois and I graduated in
    1966.
- speaker: Interviewer
  text: Did you expect to be drafted at that time?
- speaker: Respondent
  text: Yes, most of my friends and guys that I went to school with, either they had been enlisted or joined the service.
    I have a brother who is a year and a half older and he enlisted in the Army in 1966. And he was in for three years. So,
    he got out just when I went in, so he had been in for three years. When you, at that time, when you were drafted, if you
    were drafted you were on active duty for two years, or you're supposed to be in for two years in reserves and then two
    years in active reserves. But at that time when I got out, I actually got out, I was really only in for just a little
    over a year and a half. That's when the war was winding down. They were pulling back the troops, they were cutting back
    the services, so if you came back from Vietnam and you had less than six months of service, you could apply for an early
    discharge and I was going to go back to school. I was planning to go back to school, so I got an early discharge. So,
    I was only in, -
- speaker: Interviewer
  text: So, the enlistment option that your brother exercised, that didn’t interest, you didn’t consider that?
- speaker: Respondent
  text: No, he was three years. He told me, he said he regretted that he didn't wait, that he could have volunteered for the
    draft or got drafted because he had to stay the full three years. So, when I was in I was actually in only about half
    the time he was in.
- speaker: Interviewer
  text: You didn’t have to make a decision of what service branch you were in or anything, you just waited until you got drafted?
- speaker: Respondent
  text: When you're drafted, well usually the Army was drafting, sometimes what happens is if someone was ready to go and
    was drafted into the Army, you could volunteer to go into the Marine Corps for two years, but most guys didn't want to,
    they figured it was a rougher outfit to go into and so-
- speaker: Interviewer
  text: And then the fact that you, that your parents already had a son in the service, that didn’t make any difference?
- speaker: Respondent
  text: No, well you know, they were kind of concerned because the war was still on but yes, I had an older brother that had
    been in after World War II he was in occupation in Germany, so we had, and plus my father he was an immigrant; he was
    never in the service. But two of my uncles had been in World War II so we had, there was a tradition of having military
    service.
- speaker: Interviewer
  text: So, what were your first days like in the Army?
- speaker: Respondent
  text: Well it was a lot of confusion. Yes you were, they just tested you and they said you were going to do basic training.
    I remember the first few days, they seemed like all we did, we took a lot of tests. You know, they want to see, they wanted
    to test your background, your educational level and then they determined what your job would be, what you would do in
    the service.
- speaker: Interviewer
  text: So, did you, were you inducted downtown then?
- speaker: Respondent
  text: Right, in Chicago, and then we were flown down to Fort Leonard Wood in Missouri and that's where I did basic training.
- speaker: Interviewer
  text: So that was six weeks of basic training?
- speaker: Respondent
  text: No, I think it was eight weeks.
- speaker: Interviewer
  text: Eight weeks. And then did you have advanced infantry training?
- speaker: Respondent
  text: No, what happened after, just when I finished up the basic training, they announced where your next training would
    be. And there was like myself and maybe four other guys and we were sent down to Fort Sam Houston down in Texas and I
    was trained as a medic. And then after I did my training as a medic at Fort Sam Houston. I got a leave and I came back
    home, and I had, they had given me orders to go to Vietnam. So, I flew to, well you go to Oakland, California. You wait
    there for a few days and then we were flown overseas to Vietnam.
- speaker: Interviewer
  text: Did the Army have a reason for assigning you to the Medic Corp?
- speaker: Respondent
  text: They just told me, I didn't have any background or experience in it, they just, I got orders and there was like several
    of us and I think there were four other guys and they said you're going down to, we didn't get a leave, they just said
    you were going on a plane, you were going down to Fort Sam Houston outside San Antonio and you start medical training.
    You know when they set it up and we then we went to training for ten weeks.
- speaker: Interviewer
  text: Well how did you feel about being assigned to medics?
- speaker: Respondent
  text: Well I didn't really have any medical background and it was, the only thing in my own opinion, and it's only my opinion,
    was that we ended up in Vietnam and I thought they kinda rushed us through the training. And I thought there were things
    they told you that during the training we realized that when you go over there that's when you talk to somebody that's
    been over there. There are some men, you know like I said I just got the basic training as a medic, but there are more
    advanced training you can get, but what you have to do is that you then have to enlist for a longer time. And I think
    there was a place, I think in Colorado, I can't remember the fort, but if you go there for like advanced training and
    it's almost year, then you have to enlist for another two years. So, there were some, some of the medics were, like I
    said, they had very good training, or if you've ever interviewed anybody who was a special forces medic, they get very
    good training. Very intense, it's very difficult.
- speaker: Interviewer
  text: So, you weren’t afraid of the sight of blood or anything?
- speaker: Respondent
  text: No, well they show you films and all that, you just kinda, I remember one time we saw a film and they were amputating
    a guy's leg and it was kinda bloody and people started looking away and the guy showing the film said, "Well you better
    get used to that because that's what you're going to see."
- speaker: Interviewer
  text: Was that your first time being away from home for a lengthy period of time?
- speaker: Respondent
  text: Yes, well it was, I mean I had gone on trips with my family but yes.
- speaker: Interviewer
  text: And then you're meeting different people from different parts of the country?
- speaker: Respondent
  text: Right, right.
- speaker: Interviewer
  text: Was it a little bit of an adjustment or were you-?
- speaker: Respondent
  text: Well it's kind of interesting, you meet people from, you know when you're in the service you meet people from all
    over. And I grew up in a working class, white area and then you meet people like blacks, Hispanics, people from different
    religions. I had gone to a Catholic elementary school. I went to a public high school, you know like I say you meet people
    from different backgrounds. When you're in the service you meet people from from all over.
- speaker: Interviewer
  text: Were the living conditions particularly interesting or stressful?
- speaker: Respondent
  text: Yes, in Texas I'll tell you right now, I went down there I was in Texas I think it was June, July and August. I came
    home towards the end of August at the end of my leave. It was very hot down there, I can't believe, in Texas during the
    day when we were in training it would be like one hundred degrees and at night it would be like, in the barracks we were
    in, we had our own barracks, and we would have the radio on at nine o'clock at night, and it would be, it was still ninety
    degrees outside. And we didn't use any blankets, we slept in our underwear and we would maybe have a sheet on. It was
    very, we had to be very, they were very careful if anyone passed out in the heat. We didn't really do any a lot of physical
    exercise or anything. It was very, when people say it gets hot in Texas, I believe it, it gets really hot down there in
    the summer.
- speaker: Interviewer
  text: But if, if you had been assigned to just the infantry or the automotive repair division, you would've accepted that
    assignment?
- speaker: Respondent
  text: Well when you're in the service you go where they tell you to go.
- speaker: Interviewer
  text: And that's where they told you to go, the medics.
- speaker: Respondent
  text: They said you're a medic, so that's what I became.
- speaker: Interviewer
  text: And were there any memorable drill instructors or captains?
- speaker: Respondent
  text: Well when I was in basic training there were some of the, by that time it was 1969, some of the drill instructors
    had been in Vietnam, so they would kind of talk about what was going on over there and so, it was kind of interesting
    to find out what they said about the war. But I'll just give you one example, this one guy, his name was Sergeant Walters,
    he's what they call the chief drill instructor, he made a point of always saying, well I served two tours in Vietnam and
    I was over there for two years and one time he had, he was talking about something and he said, he used the word beaucoup,
    and he said, "That's Vietnamese it means a lot." Well I didn't want to correct him, it's French, actually that's French.
    And because the French had control of Vietnam for a long time, when I went over there they still used some expressions
    from the French, but I wasn't about to correct him and say no that's not Vietnamese, it's a French word.
- speaker: Interviewer
  text: Yes. So, March, it looks like March 24th is when I went in. 1969. And then when do you leave for Vietnam then?
- speaker: Respondent
  text: Okay I left in September. I think I landed on September 10th, 1969.
- speaker: Interviewer
  text: So about six months after that?
- speaker: Interviewer
  text: So, after that did you go to San Francisco, Hawaii or?
- speaker: Respondent
  text: No, I think when we went, if I recall, ok we took off, because it's a long flight, it's almost twenty hours going
    there, it's a little less coming back. When we left I think we went up to Alaska, I think we landed in Okinawa and then
    we went into Vietnam. So, they land the plane, I guess they refuel or they change the crew or something. But it was a
    regular civilian aircraft, there were stewardesses on it, it wasn't a military plane when I went over.
- speaker: Interviewer
  text: Do you remember the name of the airline?
- speaker: Respondent
  text: No, I don't remember. It was like a regular airline and there was like stewardesses on there you know.
- speaker: Respondent
  text: And like some guys that went over there, like when I talk to the veterans, some of the ones that went with the first
    units they sent over, they were sent over on ship and all their equipment and that. But see, by the time they had been,
    they had been established for a while, so when you went there and came home, you went on regular airlines.
- speaker: Interviewer
  text: And then did you land somewhere near Saigon? Tan Son Nhut?
- speaker: Respondent
  text: I think we landed, if I remember, we landed in Long Binh and then they had what they call a replacement depot. You
    go, and you stay there for just a few days and then they tell you where you're going to be assigned.
- speaker: Interviewer
  text: So, when you get off the plane in South Vietnam, what's your first sensation?
- speaker: Respondent
  text: Well, the first thing I remember was kind of warm. Kind of warm, it was a tropical climate you know, it was September,
    but it was still pretty warm there. The thing I always remember we were waiting in like the airport you know, and I went
    into what they call a washroom or latrine and there were signs by the taps, by the faucets and they said this water is
    non-potable. So, when I came back I sat next to this friend of mine and I said what does that mean? There was a sign and
    all these faucets on the latrine that said non-potable. And then all the sudden there was a guy, and he had been in Vietnam,
    a soldier that had been over there, and he said, "I'll tell you what that means, that means that you can't drink it. Don't
    drink the water, it has to be treated. You're taking a risk if you drink that water. You have to be very careful if you
    drink the water over here." So, that's one of the first things I remember. And another thing I remember, when they put
    us on these buses to take us to these barracks, like I said it was very hot, kind of humid and we were on the buses and
    they had screens on the buses and one of the guys was trying to open one of the screens, the soldier was trying to open
    the window, he was pushing on the screen and the bus driver, that guy was in service he said, "Don't do that, don't move
    that screen. You know why those screens are on there? So, in case somebody tries to throw in a grenade on the bus." So,
    when I heard that I was like oh, you know? You're going to have to be careful over there. And when you go over by buildings,
    they have sandbags and have a guard in the front, so you know you're in a combat area, a combat zone.
- speaker: Interviewer
  text: So, you're in the replacement depot at this time?
- speaker: Interviewer
  text: And then did you know what division, brigade or division you were going to?
- speaker: Respondent
  text: Yes, they come by and tell you, you know. As a matter of fact, when I went over, because it was a big group of medics,
    what they did was, my name was Carr, so they started at the bottom of the country, I guess A to D we got sent there and
    if you were E-H or something you got sent higher up. I was down in the delta area in the south of the country and I was
    sent to what they call the ninth division and I was in the third brigade of the ninth division. So, they had a truck that
    takes you out to the base you report to. There's actually a doctor that's in charge there, and then they just tell you
    you're going to be assigned. It was an infantry outfit, company for about four and a half months.
- speaker: Interviewer
  text: So that company, they’re at a regular base?
- speaker: Interviewer
  text: Sorry, so you’re sleeping in a barracks at night then?
- speaker: Respondent
  text: Yes, well sometimes you were out in the field, when we had a base and there was a barracks that we stayed in, but
    then we would go out in the field or we would go on patrols and you would stay overnight. The thing is, like I said it's
    the delta and it's very wet down there and of course it was humid. It rained a lot, so they would rotate us in. So most
    of the time we would stay out there maybe four days and then they would have us go back in and then clean up, air out.
    And one of the big problems over there, was because I was a medic, a lot of the guys got skin disease. Ringworm was a
    big problem, and it was hard, we didn't have like, - the showers we had, we had showers, but we didn't have indoor plumbing,
    we didn't have hot water. So, it was kind of hard to keep real clean in that. So, it was kind of rough being out with
    the infantry, because those guys were out there for the whole year.
