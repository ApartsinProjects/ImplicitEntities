collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Can you recall when you entered the service?
- speaker: Respondent
  text: I enlisted December 31, 1950.
- speaker: Interviewer
  text: And where were you living at that time?
- speaker: Respondent
  text: In Chicago, you want the address?
- speaker: Interviewer
  text: The North side, probably?
- speaker: Respondent
  text: The Northwest side. Roughly Laramie and Fullerton.
- speaker: Interviewer
  text: You were born in—
- speaker: Respondent
  text: Chicago, in 1931.
- speaker: Interviewer
  text: In 1931. So, at the age of your enlistment you would've been 19 or?
- speaker: Interviewer
  text: What had you been doing at that time, from high school to?
- speaker: Respondent
  text: I was in college at DePaul University on a swim scholarship. And how it all began goes back to June of '50 when the
    Korean War started. My buddy and I, who happened to be a tenant in my dad's building, and we both decided we should do
    something in the military, but we didn't want to be in the Army. So, we both decided the Coast Guard would be for us.
    We had both worked for the Chicago Park District for the Rainbow Fleet, which was a training school to teach people how
    to sail. We had each spent a summer there running the crash boat. So, we went to the Coast Guard recruiter who was in
    the old Post Office building at the time, and the chief there must've been 50 years old, had probably spent most of his
    life in the Coast Guard, interviewed us extensively and then apologized that he couldn't take us in because they had a
    waiting list of 17 months. So, we went back to school, swam at school and played water polo at the park. The water polo
    coach at the park was a former Marine pilot. He was going to school mornings and working afternoon and evenings at the
    park. And he suggested to me sometime in December to look into the Marines Squadron at the Glenview Naval Air Station.
    So New Year's Eve day I went out there, used his name and enlisted. Went back to school and 8 days later, the 8th or 9th
    of January, I opened the letter from the Marine Corps that said I was on extended active duty. So, at that point I knew
    that I couldn't finish that semester at school, so I quit school and went to work at a local factory, the name will come
    to me, but their product was baking pans. And I was an order picker, putting stuff on a skid and having it shipped out.
    March 1st was the first day of boot camp.
- speaker: Respondent
  text: And dad, if I can interject, wasn't part of the reason because you actually enlisted in the reserves, correct? With
    the thought, not the promise, with the thought and an implicit promise that you probably would be able to finish your
    semester.
- speaker: Interviewer
  text: But they activated you 8 days later.
- speaker: Respondent
  text: 'Yes, well, the first day of boot camp was very interesting. They ran a special boot camp at Glenview Naval Air Station.
    There were approximately 60 of us in boot camp. Two platoons of 30 each. They brought in some regular Marine drill instructors
    who put us through the usual paces and one of the things that came to mind right away, I was able to obey orders because
    I had been in Catholic schools. I had nuns, brothers, priests tell you what to do, and you did it. Some of the people
    were very put off with being told what to do. So, the boot camp lasted about 6 weeks, and then we were kept at Glenview
    doing sort of busy work and then the name of the squadron changed from VMF to VMA because somehow the government decided
    that they wanted attack planes rather than fighter planes. So, at this point, my Military Occupation Specialty was Rifleman,
    0300. We were shipped out to the West coast and to El Toro. My first impression of El Toro is over the gateway was a photo
    reconnaissance plane and a sort of a history of the plane saying it cost 2 million dollars. So, my first duty at El Toro
    was mess duty for a month. And the commissary officer in charge of feeding the troops happened to be from a family that
    ran a chain of cafeterias in St. Louis, so he knew what he was doing. And he bragged a lot about being able to feed the
    men at something like under a dollar a day, something like 98 cents a day when the average was a $1.25. After mess duty
    I was asked if I had any skills and the sergeant in charge of the motor pool asked if I could drive a truck. I said yes,
    so he gave me a dump truck, and said go out to the stables with your dump truck and about four loads a day of manure were
    put in my dump truck, and I would take it over to a field and put it in front of a manure spreader. After I cleaned up
    all the manure, he asked me if I would like to drive a semi. So, I said, "I''ll give it a try." So, this was an open-air
    bus sort of an affair where everybody stood up and I was driving a tractor. I was driving it around the base and then
    returning it to the motor pool, I took a turn too sharp and put the wheels of the trailer in the drainage ditch. So, he
    said, "You''re out!" At that point I returned to the barracks and a friend of mine from the barracks who was new to me,
    was a carpenter and he said, "I''ll make you a carpenter''s helper." I thought this was a great idea. So, he took me to
    the carpenter''s shop and I did some menial things, like cut boards, nail a few things together, and finally he said,
    "We have to pack up some things to go overseas." So, in the shed, or in a different shed, was a piece of equipment that
    I inquired "What is this equipment?" and somebody said, "It''s a still. If there''s nothing to drink over there, we''re
    going to make our own." But at about the same time, I went to the base tavern if you want to call it, and there was a
    girl from DePaul University there who saw me and said, "How would you like to be transferred to the base squadron and
    be on the swim team?" and I said "This is not—we''re going overseas!" and she said, "I''ll arrange it." So, the next morning
    at muster I was called in to our commanding officer who said, "What are you trying to pull off?" I said, "It''s not my
    idea sir, I was pushed into this situation." So, he said "The athletic director of the base outranks me, so he''s got
    you until we go overseas," which happened to be about two and a half weeks. But the funny thing about the swim team I
    was temporarily assigned to the base squadron but stayed in our own barracks, and my job was to mop an area in the barracks
    every morning, be at the swim pool at 10:30 until noon doing some physical exercise and swimming and then come back at
    2:30 until about 4:00 o''clock doing some physical exercise and swimming. We were in two swim meets that I can recall,
    one was at our pool and the other one was the Navy Base at Treasure Island. So, we were told we''re going overseas, you''re
    off the base squadron, you''re now back in our squadron, and I was still a rifleman, there was no way I was anything but.
    So, they at this point we were merged, there were three squadrons, ours, one from Grosse Ile Michigan, and one from Nebraska.
    And they made one squadron out of us and a lot of people were transferred to carriers and so forth. But I was told at
    that time that there was an opening in flight safety equipment. So, the sergeant in charge of flight safety equipment
    was a fellow by the name of Jim Bolton, he was a master sergeant. And he interviewed me and said, "You''ll do fine." So
    now we transferred from El Toro by train to San Diego. At San Diego we were billeted alphabetically. And there were three
    Smiths together, the other two Smiths were from Texas. One made fun of Texas and the other was a typical Texan who thought
    Texas was the greatest thing in the world. The one who made fun of Texas had been a straw boss at the rodeo and one of
    his riders had joined the Marine Corps. He gave a party for him, got drunk and wound up in the Marine Corps. So, he was
    a hell raiser from the beginning. In his first enlistment he went to radio school and became a radio repairman, so he
    was our radio repairman in the squadron. And before we were to ship out, the tavern outside the base was called Humphrey''s.
    And a lot of us would go there to drink just to get off the base. So, the owner of Humphrey''s wanted us to have a mascot,
    so he gave us his dog, a Doberman by the name of Humphrey. And as we were ready to board the ship we saw that the ship
    had a mascot, a boxer. So, we got aboard the ship and when we got underway, Humphrey got sick but that''s later. Our first
    meal on the ship was rabbit. And our next day''s meal, breakfast was oatmeal and beans. Again, I was put on mess duty
    but this time I was billeted with ship''s company, so I had a mattress, sheets, locker and fresh water showers, so I was
    in great shape. And the chief in charge of the mess hall was a black fellow, black chief by the name of Wade. A very,
    great guy to work for, he knew what he was doing and treated everybody fairly. So, this fellow that was in the bunk above
    me was regular Navy for many years and the first thing he asks me was, "Do you want a drink?" And I said, "I don''t want
    any of that torpedo juice that blinds people!" He says "No, this is good Canadian whisky that I bring aboard in Listerine
    bottles." So, he gave me a drink in a paper cup, but that was the only drink that I had out of his bottle. But going back
    to Chief Wade, he said "There are a lot of jobs in this mess hall that require some skill, some no skill, some are good,
    some are bad, you''re going to be rotated around and do everything." So, halfway across we were on the USS Sitkoh Bay,
    a transport carrier, planes did not fly off of this, they were just moved around on it. Humphrey died, he was on IVs in
    the sick bay about 9 or 10 days. So, we had a burial at sea, which was very impressive. Draped in a flag with the guns
    and we had a chaplain, he was a Protestant chaplain, and he said a few prayers and Humphrey was dropped, wrapped in chains
    so he sunk to the bottom. When we got about a day out of Osaka, Chief Wade said "Find yourself a buddy who likes the same
    kind of pie that you do, and then I''ll bake a pie that you can split. Pumpkin, apple, cherry, blueberry, whatever." So,
    I found a guy who liked cherry pie, so we ordered a cherry pie and the next thing he announced is that you''re going to
    have a meal in the officer''s ward room and you''re going to have your pte. So, we land in Osaka, Japan and we had liberty,
    but there was portside, starboard side, I don''t know which side I was on, but I was on the second liberty, the second
    day. When I was ready to go off the ship, one of the drill instructors from the past at Glenview gave me a receipt for
    some shirts that he had cleaned and pressed at a Japanese cleaners. He said, "Would you pick these up for me? They''re
    paid for." So, I went off and I was carrying these shirts around, went to a few taverns and had a few beers and then I
    was getting close to curfew and I had to get back to the ship by midnight. So, I went to, I saw a rickshaw and I said,
    "How much will it take, what will you charge me to get back to the shipyard?" and he said something like 10 dollars American.
    I thought this is terribly expensive and I''m not sure that I want to pay that much, but I got in the rickshaw, he took
    me to the gate, and I jumped out of the rickshaw and ran in, leaving the shirts in the rickshaw. So somehow or another,
    he explained to the guard that he had to get to the ship and get these shirts to somebody and get his money. So, the next
    morning, Sgt Grizlack grabbed me out of my bunk and said, "What the hell did you do last night?" So, I explained it to
    him and he says, "Well you''re on a report, you''ve got to report to the duty officer and explain your situation." He
    says you might be court martialed. So, I reported to the duty officer and he started to laugh and said, "Get the hell
    out of here." But Grizlack had paid the rickshaw driver, so I owed Grizlack. So now I''m, there at this point our planes
    are transferred inland to an airbase, an Air Force airbase called Itami. And our planes are gone over by our mechanics
    and the manufacturer of the plane which is Douglass, so for a week our mechanics are learning from the manufacturers''
    mechanics on how to handle these planes. And we were just given busy work, just do something. So, about a week later we
    get a call, we''re notified at muster, "Be on the flight line at 2100 hours with your seabag packed." So, we show up and
    were transported to Korea to a base called K3 which is not yet finished. The Seabees are working on it. And the Seabees
    I learn, have all the respect in the world for these guys. They know what they''re doing, and they do a good job. So,
    we get to Korea about 2 in the morning, the commander of the base welcomes us aboard and says, "The mess hall is open,
    steak and eggs for breakfast." So, I''m in line with a steak on my tray and my eggs are floating in about four inches
    of grease and the fellow behind me says to the cook, "Are those eggs fresh?" So, this is October ''51 and the cook starts
    laughing and says, "I''ve been in the Corps since ''39 and these eggs have been here before me." So that was my introduction.
    So, after that we didn''t have Quonset huts. The Seabees were in the process of building Quonset huts for us so we had
    tents, and they broke us into groups of four of all the same rank and they took us to these spots where your tent was
    with the four guys and one of the Seabees would assist us erecting the tent and putting the furniture and the bunks in
    it and so forth. So, the next day I reported to what was tentatively called the Parachute Loft, but it wasn''t a loft
    because we didn''t have a loft that was necessary to dry parachutes, they had to be dried once a month, so they had to
    go to Japan once a month to be dried and repacked. So, the sergeant in charge of what we called the Loft, took us on a
    tour: we went to sick bay; we went to the quartermaster; we went to the motor pool, and he elaborated on what we could
    do for them, and what they could do for us. So, it was trading. And I was given a jeep with a trailer that had five or
    six master cylinders of oxygen and my job was when the planes came back, to check the oxygen level and bring it up to
    the required level, which just required a wrench and turning a knob and in addition to that a lot of the planes had a
    problem when they were starting, the fuel leaks would ignite, and there would be sort of a flash fire, so there was a
    fire bottle that was activated from the pilot''s seat to put the fire out in the engine, and if the fire bottle had been
    used, I had to replace it. So, my job was quite easy. Wait until the planes came in, bring the oxygen up to the level,
    and then the Jeep.'
