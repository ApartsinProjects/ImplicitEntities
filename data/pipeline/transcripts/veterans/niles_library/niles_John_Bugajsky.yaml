source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the Armed Forces?
- speaker: Respondent
  text: I entered the Armed Forces in 1955, September of '55.
- speaker: Interviewer
  text: Were you living in Chicago at that time?
- speaker: Respondent
  text: Yes. I lived in Chicago. And I took my first eight weeks of basic training at Fort Riley, Kansas, and my second eight
    weeks of training in Fort Ord, California.
- speaker: Interviewer
  text: Did--before you went into the Service, were you--had you already completed high school, or--
- speaker: Respondent
  text: Yes. I completed my four years of high school and graduated.
- speaker: Interviewer
  text: What high school did you attend, may I ask?
- speaker: Respondent
  text: I went to Washburn Tech, or Washburn Trade, it was called at that time.
- speaker: Interviewer
  text: So, you were born in 1934?
- speaker: Interviewer
  text: So you would have been in your teens during World War II?
- speaker: Respondent
  text: Exactly. Yes. And in the early part of the Korean Conflict, I was still in high school. So, I really, didn't get to
    get in to the full swing of it, the battle. The battle was ended in '53.
- speaker: Interviewer
  text: So you entered, see if I've got the dates right here? So, you entered the Service when you were nineteen? Was it nineteen?
- speaker: Respondent
  text: Yeah. Somewhere around nineteen or twenty, yes.
- speaker: Interviewer
  text: And was that was because you wanted to contribute to the national defense?
- speaker: Respondent
  text: Right. Of course, I also knew I had an obligation of two years. I had to go. And I went and enlisted for two years.
    First, I enlisted for three years, and when I got down to the induction center, they said, "Well, you want to go out as
    soon as possible." I said, "Yeah. Let's get the ball rolling." Because, for some reason, the draft board was getting things
    all screwed up. I tried to push my name up, so I could get my obligation done, and they kept on goofing it up. So, I just
    went down and enlisted.
- speaker: Interviewer
  text: And was there a particular reason why you chose the Army as opposed to any other branch of service?
- speaker: Respondent
  text: I was always an Army man.
- speaker: Interviewer
  text: An Army man. Were there relatives in your family that were Army men?
- speaker: Respondent
  text: Oh, yeah. I had an uncle serve in the Pacific in the Army. Yes, I was strictly an Army guy.
- speaker: Interviewer
  text: So you mentioned the basic training in those two camps you went to. How did you find basic training, horrible, it--
- speaker: Respondent
  text: Well, I found it-- Interesting? What was it like? Yes, interesting. It is a good thing you were young when you went
    through it! That's all I could say. Because it was physically demanding. But I got through it with no problem.
- speaker: Interviewer
  text: Was it--had you done a lot of traveling in the United States before you went in the Army?
- speaker: Respondent
  text: Really, no, I had not. No, if it wasn't for the Army, I wouldn't have moved away from where I grew up.
- speaker: Interviewer
  text: Yeah. It must have been interesting being in different states.
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: And meeting all kinds of different people, I suppose?
- speaker: Respondent
  text: Oh, yes, most of the guys didn't have problems. Some guys that couldn't adjust to being away from home had never been
    away from home. And a couple of them had somehow got out on a mental discharge. But I'd say ninety-nine and a half percent
    of people adjust to the new life.
- speaker: Interviewer
  text: So when you were in boot camp were you thinking that you might be sent overseas?
- speaker: Respondent
  text: I really didn't know. It was just one of those things. It was like, probably, was like four hundred guys in our company
    and out of four hundred, I think only something like thirty-five were pulled out for Korea. I don't know what, how, the
    Army just took the first thirty-five off the roster or how they did it.
- speaker: Interviewer
  text: Alphabetical or--
- speaker: Respondent
  text: No one ever knows what the Army was thinking. I mean, I had no training in the military as far as like military police,
    so when I arrived there, that's where they put me, in a regimental police outfit!
- speaker: Interviewer
  text: Was that in Korea?
- speaker: Respondent
  text: That was in Korea. When I arrived in Korea, yeah.
- speaker: Interviewer
  text: So, and that was with the 24th?
- speaker: Respondent
  text: 24th Division and 21st Regiment.
- speaker: Interviewer
  text: And so you didn't--there was no indication in your training or anything that you would wind up as an MP?
- speaker: Interviewer
  text: So, if you are an MP, does that mean that you've got to be sort of tough where you have to enforce rules?
- speaker: Respondent
  text: Oh, you have to enforce the rules. You have to, like our daily job was we would have a gate guard, and you would have
    to have the password and all this stuff to get in. And then that was like at night there, or, no, I shouldn't say like
    at night. What I mean to say is that we'd have different duties. Like during the day, we would have checkpoints that we
    go out to. And we would check civilian personnel that are in the DMZ zone. And they had to have proper identification.
    We always had an interpreter with us. And that was our daily job where we would have roving patrols and--
- speaker: Respondent
  text: Just keep your eye out for certain things.
- speaker: Interviewer
  text: So you did your six weeks in Fort-- Eight weeks in Ft. Riley, Kansas In the beginning, and eight weeks, two eight-week
    training periods.
- speaker: Interviewer
  text: And then, just after that, then you went overseas. Did you get to come home after that or anything?
- speaker: Respondent
  text: After that, our first eight weeks, we were given, I think, a week's leave, and then I had my orders to go to Fort
    Ord, California. So, I think it was somewhere around Christmas. So, I had the Christmas and the New Year's off at home.
    And then I left for Fort Ord, California.
- speaker: Interviewer
  text: Did your family notice any big changes in you for having been in the Army, or were you--
- speaker: Respondent
  text: Well, I'll tell you, the biggest change they'd seen on me was physical, because I was such a skinny guy, and I was
    always on the go, I was like a hundred and twenty pounds, right, and after my first eight weeks I gained twenty-some pounds!
- speaker: Respondent
  text: And I was like ... they didn't recognize me when I'd come home. I mean, usually, it works in reverse.
- speaker: Respondent
  text: Because I was always on the go, and then when I went in the Service, and everything was routine, and everything was,
    you do this, and you do this, the same every day, you do this, and you do this, and you do that. And you would eat regularly.
    And then I think it was what we used to call candy, and pie, and ice cream, we used to call it "pogie bait." And all that
    stuff, that's what put the weight on. It wasn't the Army food. It was the food we ate after! So, I gained some weight
    and--
- speaker: Interviewer
  text: It didn't do you any harm. I mean--
- speaker: Respondent
  text: It didn't do me one bit of harm, no!
- speaker: Interviewer
  text: So you get the--you learn that you're being-you're one of the thirty or so from this famous 24th Infantry Division?
- speaker: Interviewer
  text: 21st Regiment now. Why is the 24th Infantry Division famous?
- speaker: Respondent
  text: They're famous for--they have the motto that they're the Victory Division. They're the first to fight. Now, they were--the
    outfit originated in Hawaii. It never was in the United States. And when the bombing in Pearl Harbor started, they were
    the first ones actually to fight. And in the Korean Conflict, they were the closest, I guess, division in the area. So,
    they were, again, the first ones to land in Korea. And during the Conflict, on June 25th, 1950, so again they were the
    first outfit to fight. So, that's--they took one heck of a beating out there and lost a lot of guys, being the first to
    fight, and not having the proper ... not everything is up to snuff when you first land in an area where all the hostility
    is. And so they got their butt kicked pretty bad out there. But they were still there when I got there.
- speaker: Interviewer
  text: So you get the news you're shipping to Korea?
- speaker: Interviewer
  text: And you--Was it by boat, or by plane, or--?
- speaker: Respondent
  text: Yeah, I got my orders in Fort Ord, California. And I was shipped to Seattle, and then from Seattle, Washington, they
    shipped us--we went out to Adak, Alaska. And we stopped there for a day. And from there, we went to Japan.
- speaker: Interviewer
  text: And this is by boat?
- speaker: Respondent
  text: By boat. Mmm hmm, and--
- speaker: Interviewer
  text: So, there were lots of other troops besides the thirty--?
- speaker: Respondent
  text: Oh, yes. Although it was loaded--they had probably had three or four thousand, if not more troops.
- speaker: Interviewer
  text: Was it a Navy boat or a transport?
- speaker: Respondent
  text: Yeah, it was, in fact, it was, I don't know if I had a--on the pictures that you took with the medals--
- speaker: Respondent
  text: That boat, it's called the USS Freeman. That's the one I went across on.
- speaker: Interviewer
  text: The USS Freeman, yeah.
- speaker: Respondent
  text: It's a Navy ship.
- speaker: Interviewer
  text: It lands in Japan?
- speaker: Interviewer
  text: Got to Japan.
- speaker: Respondent
  text: We got to Japan in what's-I'm trying to think of the harbor. It wasn't Tokyo. It was--
- speaker: Respondent
  text: Yokohama, yes. And we stayed there a couple of days, and they shipped us from there to Inchon.
- speaker: Interviewer
  text: And from Inchon, I was assigned my regular job, which was with the 24th Division in the 21st Infantry Regiment headquarters--
    and headquarters, which means that's the regimental headquarters of the Division. There were like three regiments in the
    24th. There's three regiments in the 24th Division. That was the 34th Regiment, the 19th Regiment, and the 21st Regiment.
    And the 19th and the 34th Regiment would rotate off the line, off the 38th parallel.
- speaker: Respondent
  text: So when one regiment went in and they stayed--I don't remember if it was for six months, six month crack, and then
    they would pull back. And the 34th would go up on the line. And they would rotate back and forth every six months. And
    the 21st regiment which I was in--we were called the backup regiment. In case there was a breakthrough on those two regiments,
    we would be the third supporting regiment. So, I believe it was somewhere, anywhere from three to five miles off the 38th
    parallel.
- speaker: Interviewer
  text: So when you were in--this is probably not going to sound very informed, when you're at the second camp, in Camp Fort
    Ord, training, you don't know yet what division or regiment you're going to.
- speaker: Interviewer
  text: Then you were assigned-- to Korea, and you?
- speaker: Respondent
  text: Right. All I was told in Fort Ord, California, after my eight weeks of basic there, my second eight weeks of training,
    I was considered to be light weapons, that I'd be shipped to Korea. I'd be shipped from Fort Lewis, Washington, to Korea.
- speaker: Interviewer
  text: And did you think that was a good assignment or that's just the way it is, or?
- speaker: Respondent
  text: I really didn't have any thoughts about it. It didn't bother me.
- speaker: Interviewer
  text: And so then you're going to be assigned to military police?
- speaker: Interviewer
  text: How did you feel about that?
- speaker: Respondent
  text: That didn't bother me either. I figured I always liked spit and polish, and that's what that outfit is. Military police
    is very spit and polish. I mean, you had to be sharp. You had to be .. .it's sort of an elite outfit. I look at it that
    way, and to this day, I'm still the same way. My wife is always telling me, "John, it's time you back up!" Because I'm
    still spit and polish today. I'm on the VFW color guard. And we're a spit and polish outfit.
- speaker: Interviewer
  text: So you're assigned to the regimental headquarters as military police?
- speaker: Interviewer
  text: And then do you have to move up then with the regiment when it--you're on backup, or did you have to move?
- speaker: Respondent
  text: We are backup, but we have our maneuvers that we went through and, this is what we have to do. See, for instance,
    our job during a maneuver, that's like a military strike operation, our job would be to guard the CPs, the Central--
- speaker: Interviewer
  text: Command Post. Oh, I see.
- speaker: Respondent
  text: And that's what we would do. I mean, that's where all the big brass are in there, making all the decisions, what they're
    going to do.
- speaker: Interviewer
  text: So you would be making--
- speaker: Respondent
  text: That's our job.
- speaker: Interviewer
  text: So you'd be-- Security.
- speaker: Respondent
  text: You'd be using more than just a pistol then, or--
- speaker: Interviewer
  text: Oh, yes. Right. Right.
- speaker: Respondent
  text: Rifles or-- Rifles or 50 millimeter machine guns, or 45s. We had, like I say, I was trained in light weapons, so I
    could fire mortars, and 75 recoilless, 105 recoilless (rifles). Those used to be on the jeeps, big round one, that type
    of thing. So, and then there are regular infantrymen that just fire the MI, but light weapons are usually assigned mortars
    and 8.1 mortar and all this kind of stuff. It's a little more fire power than just a rifleman.
- speaker: Interviewer
  text: So you were up near the DMZ for, the demilitarized zone, for how long, then?
- speaker: Respondent
  text: For my whole tour, I was up there--it was--I don't know what it was, a year and something, a year and nine months,
    or a year whatever, one year, nine months, nineteen days.
- speaker: Interviewer
  text: You were on the DMZ?
- speaker: Interviewer
  text: And was it--was there a lot of--you were there two years after the, two, three years, after the cease-fire. Was there
    still a lot of tension and danger, or a sense of danger?
- speaker: Respondent
  text: I would say maybe not as much danger as in '50 when it started, but the dangers of, I mean, routinely, you would hear
    people getting blown up by minefields. And a lot of times, we would be on what we'd call a roving patrol where two guys
    just drive around on a jeep, and we would see papasan out in the field, and you'd see a big pile of dust go up in the
    air. And you'd know he'd just ran over a mine.
- speaker: Interviewer
  text: And papasan means?
- speaker: Respondent
  text: Papas an meaning an old farmer, a Korean farmer.
- speaker: Respondent
  text: We'd call him a papasan.
- speaker: Interviewer
  text: And he'd be the guy that would get blown up?
- speaker: Respondent
  text: He'd be plowing his field, and he'd hit a minefield. Or sometimes we'd have fatalities where, where we have certain
    times of the year, they'd have these heavy rains. And these minefields would wash off onto the road. And you would go
    down that road, and if you'd hit that mine, you, there you'd go.
- speaker: Interviewer
  text: Did your regiment, your unit, did you lose any guys while you were there, or--
- speaker: Respondent
  text: I lost a handful of men. We have what they call, every six months you were eligible to go on R & R. It's called "rest
    and recuperation" leave. And what they would do is take you down to Kimpo Air Base and they'd fly you over to Tokyo on
    a C-124, a big Globemaster thing. It held a lot of troops. And one of them went down while I was there. An
