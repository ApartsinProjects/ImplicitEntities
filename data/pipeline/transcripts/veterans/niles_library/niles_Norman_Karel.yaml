collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Chicago.
- speaker: Interviewer
  text: When did you enter the Service?
- speaker: Respondent
  text: I entered the Service, I believe, it was April the 5th, 1943.
- speaker: Interviewer
  text: And what were you doing? Where were you living when you--
- speaker: Respondent
  text: I was living at 6231 Stewart Avenue in Chicago, Illinois, at the time.
- speaker: Interviewer
  text: Were you living with your parents, or--
- speaker: Respondent
  text: I was living with my parents.
- speaker: Interviewer
  text: And what you were doing before you were drafted?
- speaker: Respondent
  text: I was studying to be a linotype operator at that time. And I was working for Mercury Typesetting at the time. I had
    finished high school and I went to linotype school to learn linotype. And I was working at Mercury Typesetting as an apprentice
    at the time.
- speaker: Interviewer
  text: So, you must have been fairly young, about 20 or 21?
- speaker: Respondent
  text: No, I was about, a little over 18, 19.
- speaker: Interviewer
  text: Oh, my goodness. 18. So young.
- speaker: Respondent
  text: It was very young.
- speaker: Interviewer
  text: So, did you choose the Army when you were drafted, or were you just drafted?
- speaker: Respondent
  text: No, I was drafted, and I chose to go into the Army.
- speaker: Respondent
  text: Why? I figured that my father was in the Army, and I figured, in World War I, so I figured I'll go into the Army,
    also.
- speaker: Interviewer
  text: To be like him?
- speaker: Respondent
  text: To be like him.
- speaker: Interviewer
  text: Where were you inducted? Do you remember?
- speaker: Respondent
  text: I was inducted at Camp Grant, Illinois.
- speaker: Interviewer
  text: Okay. And what was it like, your first days?
- speaker: Respondent
  text: It was amazing. So many other young men. We were all wondering what this was all about, where were we going. It was
    very unusual.
- speaker: Interviewer
  text: Did you meet people you think you wouldn't have otherwise met?
- speaker: Respondent
  text: I met people that ordinarily I would not have met. From all over.
- speaker: Interviewer
  text: From all over the country, all over the state?
- speaker: Respondent
  text: All over the country.
- speaker: Respondent
  text: And it was an experience.
- speaker: Interviewer
  text: So, do you remember anything in particular about starting out?
- speaker: Respondent
  text: Well, I remember we spent a few days at Camp Grant, and they were interviewing us. And then we went on a train, and
    we went to Camp Wheeler, Georgia, where we took our basic training. And I was at Camp Wheeler, Georgia, for thirteen weeks
    as an infantry replacement trainee.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: In other words, we were replacements for the casualties. We had thirteen weeks of basic training. I got a ten day
    furlough, went back home, and then we were shipped overseas. So, I had a little over three months in the States, and then
    I went overseas.
- speaker: Interviewer
  text: And then they sent you away. So, do you remember, was it--Had you ever been away from home for a long time before?
- speaker: Respondent
  text: No. No. No.
- speaker: Interviewer
  text: So, was that strange for you?
- speaker: Respondent
  text: It was an adventure, it was an adventure.
- speaker: Interviewer
  text: Yeah. Were there--They put in, I have in my list, where--did you have drill instructors?
- speaker: Respondent
  text: Oh, yes. We had drill instructors, and we learned how to shoot a rifle, and read maps, and, you know, hike long hikes,
    and field training. And it was an adventure.
- speaker: Interviewer
  text: So, did you have any use for your experience as a linotype operator, did you--
- speaker: Respondent
  text: No, no, no. They didn't have anything for linotype operators to do in the Service. They needed us for, you know, replacements
    for casualty replacements.
- speaker: Interviewer
  text: Where did you sleep, do you remember?
- speaker: Respondent
  text: In the barracks while we were in training.
- speaker: Interviewer
  text: Yeah, while you were in training?
- speaker: Respondent
  text: Yeah, we had barracks at Camp Wheeler, Georgia.
- speaker: Interviewer
  text: Did you--was it a lot of other--
- speaker: Respondent
  text: Oh, yeah people really close?
- speaker: Interviewer
  text: Oh, yeah, we were close.
- speaker: Interviewer
  text: Okay, where did you go after that? You went overseas?
- speaker: Respondent
  text: After that, I got the ten day furlough.
- speaker: Respondent
  text: And I came back, and they shipped us right overseas.
- speaker: Interviewer
  text: So, where did you leave from?
- speaker: Respondent
  text: We left from San Francisco. And our first stop was New Caledonia.
- speaker: Respondent
  text: That was where they tried to find out where you were going to go from there. You were what Army, you know, what division
    you would be sent to? And I was sent to the 31st Division. It was an Ohio National Guard Division. And we were sent to
    Guadalcanal. This was after the fighting was over at Guadalcanal, and we were to replace the casualties there. Now the
    31st Division that I was sent to was pretty well beat up from the Battle of Guadalcanal, and they sent us up in the hills
    to give us further training. And we were in Guadalcanal for I would say six, seven, weeks. And from there we invaded Bougainville
    in the Solomon Islands. That was my first experience in combat, on Bougainville.
- speaker: Interviewer
  text: What was that like?
- speaker: Respondent
  text: It was scary. It was scary. And we invaded Bougainville, and, like I say, it was dramatic. It was dramatic. You see
    all the casualties, the bombings. And we were under fire, and we were in Bougainville for thirteen months fighting the
    Japanese. And that's where I got my bronze star medal, fighting on Hill 700. Our platoon was going up on Hill 700, trying
    to recapture the hill. We were crawling up the hill under enemy fire. We lost about four or five of my buddies going up
    that hill. I'll never forget it. I'll never forget it. Our whole platoon received a bronze star medal for that battle.
    And, as I say, I lost some good friends of mine. And, believe me, I was scared to death going up that hill!
- speaker: Interviewer
  text: I'm sure. I'm sure. You said four or five of your friends. Were they people you had--
- speaker: Respondent
  text: Right trained with?
- speaker: Interviewer
  text: Trained with, from basic training.
- speaker: Respondent
  text: Wow. And something you'll never forget. I'll never forget that.
- speaker: Interviewer
  text: Yeah. You know you can enter them into the Library of Congress' Veterans Memorial? They have a website that you can.
- speaker: Respondent
  text: Oh, really?
- speaker: Interviewer
  text: Yeah, you can put in people's names. They put you in when you are interviewed.
- speaker: Respondent
  text: Isn't that something?
- speaker: Interviewer
  text: Yeah. It's a huge database.
- speaker: Respondent
  text: That's really something.
- speaker: Interviewer
  text: Did you feel--Did you feel lucky that you had not died, or did you feel--
- speaker: Respondent
  text: I was lucky. I felt lucky. I felt lucky that I was able to get out of there alive.
- speaker: Respondent
  text: But it hurt to see your buddies, you know, and, as I say, as Tom Brokaw wrote in his book, ours was the greatest generation,
    it really was.
- speaker: Respondent
  text: And as I say, I'm short of stature, I'm only five feet three, but, believe me, I felt tall when I served my country.
    I stood tall.
- speaker: Interviewer
  text: So did you-so, you were in--you did some more training in Guadalcanal?
- speaker: Interviewer
  text: And then you were in--
- speaker: Respondent
  text: And then we invaded Bougainville.
- speaker: Interviewer
  text: Then you invaded Bougainville.
- speaker: Interviewer
  text: And then, how, you said, that was thirteen months.
- speaker: Respondent
  text: We were on Bougainville thirteen months.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: Fighting the Japanese.
- speaker: Interviewer
  text: Did you have times when you were on the front lines and times when you were not?
- speaker: Respondent
  text: Oh, yeah, we had many times in rest areas. Our main fighting on Bougainville was capturing Hill 700. That was our
    biggest engagement.
- speaker: Interviewer
  text: How long did it take?
- speaker: Respondent
  text: It took a couple of days until we recaptured that hill.
- speaker: Respondent
  text: Other outfits, you know, went up too, and they recaptured it, and then they lost it again in the Japanese counterattack.
    But in our last battle, we did capture Hill 700. And it's something I'll never forget. I'll never forget.
- speaker: Interviewer
  text: Do you remember what it--do you dream about it, or you think about it a lot?
- speaker: Respondent
  text: At times, I do.
- speaker: Interviewer
  text: Do you remember what it smelled like or what it sounded like? Can you describe it?
- speaker: Respondent
  text: The artillery shells, the stench of dead bodies, is something you never can forget. And when I think about what is
    going on in Iraq, it hurts the hell out of me to see our soldiers getting killed like that. But when you've been through
    it, you realize what it is. Pardon me, I can't help it.
- speaker: Interviewer
  text: That's okay. I'm a crier, myself.
- speaker: Respondent
  text: I get a little emotional. But it's an experience I'll never forget, and I'll remember as long as I live.
- speaker: Interviewer
  text: Which is a pretty good long time so far.
- speaker: Respondent
  text: Right. And now the people at the Library of Congress will know too.
- speaker: Interviewer
  text: I'm sure they know about it. I'm sure they have.
- speaker: Respondent
  text: There's a lot of stories. Anyway, after thirteen months on Bougainville, our next objective was the Philippine Islands.
    And we invaded Luzon in the Philippines. That was the main island. We landed on Lingayen Gulf. We had no opposition when
    we reached the beach. We were expecting, you know, a lot of opposition, but there was no opposition when we hit the beach.
    And we didn't hit into any opposition until we got near Manila. There's where our outfit caught hell, around Manila. We
    lost our first lieutenant of our platoon in the Battle of Manila. And I was lucky, too. I escaped unharmed. But we had,
    you know, other casualties in our, you know, company. And after the Battle of Manila was over, we were sent to a rest
    area in a suburb of Manila. And we were there for, I'd say, four or five weeks, just resting. And from there, they sent
    us to Baguio. That's the summer capital of the Philippines. It's in the mountains. And we fought the Japanese in Baguio.
    And we went back to our rest area, and that's where I came down with malaria.
- speaker: Interviewer
  text: Didn't they give you--didn't they give you Quinine?
- speaker: Respondent
  text: Oh, yeah. We were taking--it was called Atabrine at the time. And we were taking it every day, but you still came
    down with--I guess it did help prevent it, you know, from being more serious. But that's where I came down with malaria.
    And, actually, it happened on August the 6th, the day they dropped the A-bomb, that I came down with malaria.
- speaker: Interviewer
  text: My goodness.
- speaker: Respondent
  text: When they dropped the A-bomb on Hiroshima.
- speaker: Interviewer
  text: So, were you sick for a long time?
- speaker: Respondent
  text: I was in the hospital for several weeks. And then we came back to our outfit and then we were, you know, going to
    be sent back home after--it must have been about 28, 29, months overseas.
- speaker: Respondent
  text: And then we were sent home to be discharged.
- speaker: Interviewer
  text: Were you excited?
- speaker: Respondent
  text: Oh, I was thrilled to death. I was thrilled to death. I was thrilled to death.
- speaker: Respondent
  text: And, during the time I was in service, everything was censored. And you couldn't say where you were or where you were
    going. But I wanted my folks and my future wife to know where I was, so what I did, I remembered, in Chicago, there was
    a superintendent, Dr. Johnson, but, before him, the superintendent of schools was named Dr. Bogan. I sent a letter to
    my sweet--I said, Ann, find out who was the superintendent of schools before Dr. Johnson. His name was Dr. Bogan, so she
    knew right away I was on Bougainville. And then when we were going to the Philippines, it was also censored. You couldn't
    say where you were going. So, I had a cousin of mine, his name was Philip, so I wrote, find out-I'm going to see Molly's
    husband, his name was Philip, I'm going to see Molly's husband in a short time. His name was Philip, so they knew where
    I was going--in the Philippines. So, we had our ways of getting around the censors. It was wrong, but we wanted to know
    where.
- speaker: Interviewer
  text: Did you write a lot of letters back and forth?
- speaker: Respondent
  text: Everything was V-mail.
- speaker: Respondent
  text: Everything was V-mail, and that's how we would, you know, write our letters and--
- speaker: Interviewer
  text: Did it take a long time for letters to get to and from home?
- speaker: Respondent
  text: It did. It took several weeks to get letters back and forth. And then I--we would get packages from home every now
    and then.
- speaker: Interviewer
  text: So, what did you like to get best?
- speaker: Respondent
  text: Salami, things like that, you know, that weren't perishable.
- speaker: Respondent
  text: And we would share them with all our buddies. And when they got packages, we would share everything. You know, we
    were close, we were close. You know, we were together for like 28, 29, months, and we were close. And we would share everything.
- speaker: Interviewer
  text: So, what were you eating and where were you living when you were on the islands?
- speaker: Respondent
  text: We ate a lot of C-rations, K-rations. And, once in a while, we were getting hot meals. But the thing that I missed
    most was ice cream. I'm an ice cream lover, and we couldn't get ice cream. Once in a great while, we would get some. But,
    when I was in the hospital and I had malaria, they were coming with ice cream. I was so thrilled! It was worth getting
    malaria. It was worth getting malaria just for the ice cream! But, like I say, it was an experience that you'll never
    forget it. You'll never forget it.
- speaker: Interviewer
  text: Now, when you were, now, you took a ship between islands?
- speaker: Interviewer
  text: And, when you were on the islands, how did you travel around, did you march or did you--
- speaker: Respondent
  text: We marched. We were on jeeps, you know, going through, you know, other places on the island.
- speaker: Interviewer
  text: And was it--had you ever been any place that wasn't the United States before?
- speaker: Interviewer
  text: So, did you--was it interesting to see the different--
- speaker: Respondent
  text: Absolutely. It was completely different. And when we went to the Philippines, you know, after the fighting was over
    in Manila, I met, you know, quite a few people that I became friendly with.
- speaker: Interviewer
  text: So, what was that like? Do you remember any of them?
- speaker: Interviewer
  text: Tell me about them.
- speaker: Respondent
  text: Well, when I went overseas, I wasn't married at the time. And I met a young lady there, and she was a mestiza. In
    other words, she was part Spanish and part Filipino. And she was a student at the University of the Philippines before
    the Japanese invaded the island. And we became very friendly. And when I came back home, we corresponded for quite a while.
- speaker: Respondent
  text: I remember her name, Salud. We called her Sally. The Philippine was Salud, but we called her Sally.
- speaker: Interviewer
  text: How interesting.
- speaker: Respondent
  text: And, like I say, we corresponded for quite a while. And then, well, then, I got married when I--about six months after
    I was discharged, I got married.
- speaker: Respondent
  text: And I was married for thirty-six years. And then my wife developed cancer, and I lost her. But I found a wonderful
    person a year later, and I've been married now to my second wife for twenty-one years.
- speaker: Interviewer
  text: Oh, my goodness. That's two very long relationships.
- speaker: Respondent
  text: Two long, two long, relationships.
- speaker: Interviewer
  text: So how did you--let's see, how did you pass the time when you weren't fighting? What did you do?
- speaker: Respondent
  text: We played cards mostly. We played cards on the islands.
- speaker: Interviewer
  text: Did you get good at it?
- speaker: Respondent
  text: I got lucky sometimes. Sometimes, I lost everything. But what was there to do? There wasn't anything else to do. And
    we played, you know, baseball, things like volleyball, you know, when we were in the rest areas, when we weren't in combat,
    because there was a lot of times on the islands when you were just--you weren't in combat. You were just sitting in your
    rest area, you know, doing things, playing cards, then we played baseball, volleyball, you know, anything just to keep
    active.
- speaker: Interviewer
  text: Did you ever run into anybody that you had known at home?
- speaker: Respondent
  text: No, I never did.
- speaker: Respondent
  text: I never ran into anyone that I knew. See, because, when I was inducted, I was sent to Camp Wheeler, and there were
    people from all over the country, you know, from the South, from the West. And then we were sent overseas.
