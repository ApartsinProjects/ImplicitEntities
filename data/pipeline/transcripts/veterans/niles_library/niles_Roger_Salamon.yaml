collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: I am going to ask you how you learned of the Veterans History Project.
- speaker: Respondent
  text: Through a cousin.
- speaker: Interviewer
  text: And did you participate in the Project?
- speaker: Respondent
  text: Yes, he had done it probably a year before he even told me about it. And he asked me just casually had I been on the
    Honor Flight. I said, "Yes I had," and he said to me, "Well I suppose you have been in the interview business that's going
    into the Smithsonian." I said, "I don't know a thing about it." So he said, "OK, I'll give you a number when I get home
    and you call them."
- speaker: Interviewer
  text: Well, we're very happy that you did.
- speaker: Respondent
  text: I'm glad to be here.
- speaker: Interviewer
  text: May I call you, Roger?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: Roger, do you recall when you entered the service?
- speaker: Respondent
  text: March 19, 1945.
- speaker: Interviewer
  text: And where were you living at that time?
- speaker: Respondent
  text: I was living at the University of Michigan.
- speaker: Interviewer
  text: So you were a student in Ann Arbor?
- speaker: Interviewer
  text: What was your major?
- speaker: Respondent
  text: I was a Pre-Med.
- speaker: Interviewer
  text: Had you attended high school in Chicago?
- speaker: Respondent
  text: Yes, I went to Lake View High School at Ashland and Irving. What happened was when I graduated in June, my father
    wanted me to get as much college as I could. They were having three semesters at that time, three quarters - instead of
    two, there were three so I went in the summer portion and I finished almost my first year before they pulled me out.
- speaker: Interviewer
  text: So you were then drafted?
- speaker: Respondent
  text: Yes, my home at that time was in Detroit, the reason being that my father was working for a company and they transferred
    him to Detroit so I naturally had to change my record. So as soon I graduated from high school, he moved me out of there
    to Detroit with my mother, of course.
- speaker: Interviewer
  text: So, you found yourself joining the United States Army?
- speaker: Interviewer
  text: Did you have an opportunity to choose a branch of service?
- speaker: Respondent
  text: Yes, but it didn't mean anything at that time. It was perfunctory. They would say, "And which branch would you like
    to be in?" And you'd give them an answer and they'd say, "Fine, you're in the Army."
- speaker: Interviewer
  text: Typical, the way the Army works.
- speaker: Respondent
  text: So you were inducted in Detroit?
- speaker: Interviewer
  text: In Detroit, yes. But I ended up coming to Ft. Sheridan anyway so I ended up coming home.
- speaker: Interviewer
  text: So you still had a family home in Chicago?
- speaker: Respondent
  text: No, but I had family.
- speaker: Interviewer
  text: When you were studying at the University of Michigan, did you feel like looking over your shoulder because you were
    going to get drafted?
- speaker: Respondent
  text: Oh sure, we were all waiting for the other shoe to drop. That was the normal thing in those days. A lot of the guys
    were pulling out. They gave up. We all felt the same way. I mean what's the point. We wanted to go in. You can only imagine
    how we all felt. If you weren't in service, you wanted to be. That was the way it was. Pearl Harbor and Bataan all those
    things that were occurring at that point. I mean we felt like slackers, walking around in civvies. Why aren't we in anyway?
    I suppose I could have enlisted. But I never really thought about it.
- speaker: Interviewer
  text: So did you find the Basic Training, a big change from being in college?
- speaker: Respondent
  text: Oh sure, being in the Army is a big change. Your whole life is different. It is the way it works.
- speaker: Interviewer
  text: So you are sent to Fort Sheridan and then you go to a Camp?
- speaker: Respondent
  text: We did our Basic Training; I was sent to Camp Robinson in Little Rock. It was a camp so that indicates it is not permanent,
    otherwise, as you know, it would have to be a Fort. But that was what they call an IRTC, Infantry Replacement Training
    Center. I stayed there after my Basic because I could read and write. So there were nine of us who were kept out. We thought
    we were in trouble. They don't tell you anything. The unit shipped out, and the nine of us are sitting there. And for
    two weeks we sat there. And then they finally came told us that we were going to be part of the cadre as it's referred
    to or a training Sergeant as they call them now. It was a good break. I mean I was in a place where I wasn't going to
    get killed - although I wanted to go with the group. I felt like a pariah.
- speaker: Interviewer
  text: So you were chosen to participate in this training group ...
- speaker: Respondent
  text: As a trainer.
- speaker: Interviewer
  text: Did you get a promotion as a result of that?
- speaker: Respondent
  text: I ended up a Corporal but I should have had Sergeant stripes. The war was, takes time, and I didn't want to fill up
    the table.
- speaker: Interviewer
  text: So you got your Corporal stripes in Arkansas?
- speaker: Respondent
  text: Yes. As I say I should have had Sergeant; it was supposed to be coming down any day but Harry dropped the bomb and
    then it wasn't there anymore. So I didn't need it at that point. I did have other plans, though at the time. I got very
    friendly, I worked with a couple of officers who were happy with the fact that I could read and write so that I did a
    lot of things for them that they didn't have to do for themselves. Of course, that was my job. So one of them said, "I
    can arrange it for you to get an interview to go to OCS (Officer Candidate School). Would you like that?" I said, "Yes,
    I would." "Then you will stay in a while?" I said, "Yeah, sure." Then I realized that I hadn't called home and I told
    my mother what I wanted to do. And that was the end of that conversation [chuckle]. But looking back at it now, it might
    not have been a bad idea.
- speaker: Interviewer
  text: Would you have been able to be an Officer and be a Doctor also?
- speaker: Respondent
  text: No, as it was, by the time I got through with four years of college and two years of the Army I've had it. I just
    got my degree.
- speaker: Interviewer
  text: So you were training young people?
- speaker: Respondent
  text: There were old people too, guys like 35.
- speaker: Interviewer
  text: Were they hard to train; everybody's different.
- speaker: Respondent
  text: Well, it was hard for me. I was talking to people ten years older or maybe more.
- speaker: Interviewer
  text: Did you train in anything particular or in all aspects?
- speaker: Respondent
  text: We had a training schedule every week. It was posted. It was a regular like they do in school.
- speaker: Interviewer
  text: Did you enjoy one section of training as opposed to others?
- speaker: Respondent
  text: No, no it was hard work, very hard work.
- speaker: Interviewer
  text: If I could digress for a moment. I was interviewing one veteran and I was inquiring where he went to high school because
    for somebody like myself in the far distant peanut gallery trying to appreciate it I thought that the veterans must have
    had a good high school education.
- speaker: Respondent
  text: Not necessarily.
- speaker: Interviewer
  text: Yes, that's what he said, He said that the reason those guys were good, he was a training sergeant, "We trained those
    guys." He took great pride in that. Mr. Horstman.
- speaker: Respondent
  text: Well, there were people you got in there and the only way they could know their left from their right was when you
    put a rock in their hand. And I'm not kidding. It was the first item in my life that I ever ran into people who couldn't
    read. It was a revelation as far as I was concerned. I didn't know anybody who didn't know how to read. I thought everybody
    in the world knew how to read. But it's not so.
- speaker: Interviewer
  text: The fact a person couldn't read or write didn't mean they couldn't be a good soldier?
- speaker: Respondent
  text: No. It just means they can't read a training manual and they wouldn't be in position to do anything in the way of
    that if they were going to give a course.
- speaker: Interviewer
  text: Would there have been a large percentage who couldn't read and write?
- speaker: Respondent
  text: I can't give you percentages, but I ran into a lot of guys. I suppose there was a small percentage but we had them
    in the Army, and don't forget the infantry got everybody. You didn't have to be special to go in the infantry.
- speaker: Interviewer
  text: So do you think the reason you were singled out for this was because of an IQ test?
- speaker: Respondent
  text: No, the fact that I joined into a lot of things, did things during my Basic Training and I reacted to things that
    a lot of the fellows who didn't have the same background, couldn't react to. When you watch a group, there's always one
    or two that just by accident are outstanding, not outstanding but different, better and also there's always one in every
    group that absolutely doesn't have a clue as to what's going on.
- speaker: Interviewer
  text: So your time in the service then, most of it was at Camp Robinson in the Training Center?
- speaker: Respondent
  text: Most of it, until the war was over.
- speaker: Interviewer
  text: Was there a big city near there that you...
- speaker: Respondent
  text: Yes, Little Rock, not a big city but a city, nice.
- speaker: Interviewer
  text: So if you got a break or pass from Camp?
- speaker: Respondent
  text: Oh, yes. There were buses. Furloughs, I went home. But on weekends, if I was off, or even at night sometimes, but
    during the week, most of the time, I stayed in the camp.
- speaker: Interviewer
  text: So when you say your unit division was IRTC, that was Infantry Replacement Training Center at Camp...?
- speaker: Respondent
  text: Camp Robinson.
- speaker: Interviewer
  text: Because the other camps might also have the same cadre?
- speaker: Respondent
  text: Yes, exactly the same.
- speaker: Interviewer
  text: You said that you would have made Sergeant, but it was because the war ended.
- speaker: Respondent
  text: Yes, I was slated for it. I had already sent in the papers. But then what happened was VE Day and everything stopped
    in the camp I mean it was like somebody pulled the curtain down and you couldn't do anything. There was nothing to do.
    We weren't training any more for Europe. So we had a new program that to be developed so rather than develop a program
    for fighting in the Japanese home islands they decided to gather up all the trainers the whole camp, all of us, and the
    ancillary people who were still around - we were "going over." They figure we're trained. We can do the job better. We
    were part of the half a million they were going to send over, OK. And we were sitting in the stands, and this was after
    a couple of weeks, of sitting around, not doing anything, and we had an area where, it was like an amphitheater, crude,
    but an amphitheater. It was early morning. This full colonel, "bird" colonel, walked up and said, "Men, listen up! Look
    to your left. Look to your right. One in three of you isn't coming back." That's just what he said. That's the way it
    was. It was interesting. That was the thought. So we were going to prepare for our push. They had to do it. We were running
    out of men. By 1946 they were running out of men. They were taking men, as I was telling someone this morning, men, like
    1-C with family. They were taking guys like that. So it is not a bottomless pit if you don't have any more people.
- speaker: Interviewer
  text: So they were going to use us. That was the sensible way to go. They weren't going to spend another 17 weeks spending
    a bunch of people who were still green after they were trained so it made sense.
- speaker: Respondent
  text: So if the war in the Pacific hadn't ended you would have headed...
- speaker: Interviewer
  text: Oh, we were on the way.
- speaker: Respondent
  text: For Operation Coronet?
- speaker: Interviewer
  text: Yes, we were on the way.
- speaker: Respondent
  text: You would have been in combat.
- speaker: Interviewer
  text: Oh, yes - no more training, that's it.
- speaker: Respondent
  text: So VE Day is in early May, 1945 and the bomb is dropped early in August, 1945 so I imagine there was great relief
    then.
- speaker: Respondent
  text: To say the least! You know it's a funny thing. Young people, at least in my experience, don't look at death the way
    that older people look at death. There's a different approach. Now I am 90 years-old. We're losing 600 veterans a day
    so I am resigned to the fact that it's going to be my turn, but not when you're 19 - a whole different ballgame.
- speaker: Interviewer
  text: So as a trainer, teacher, instructor, down there in Camp Robinson was there any aspect of it you disliked.
- speaker: Respondent
  text: Oh, a lot of it. But you know you put up with it because is part of the program. It was for me; what could I do. I
    was fortunate. I had a good job and I got along with all of the officers. And I was an NCO myself so I had no problems.
- speaker: Interviewer
  text: That wasn't that the first time you were away from home?
- speaker: Respondent
  text: No, I was away from home at college.
- speaker: Interviewer
  text: And it wasn't the first time you met lots of different people from different parts of the country.
- speaker: Respondent
  text: No, that was the first time, with people from all over.
- speaker: Interviewer
  text: Oh, exposure to those people who couldn't read and write.
- speaker: Respondent
  text: There were people from all over.
- speaker: Interviewer
  text: Was it easy to stay in touch with your family.
- speaker: Respondent
  text: Sure, letters. Telephones weren't too popular. It was hard to get to a phone. I got a couple of furloughs during the
    course of my service so I could get home.
- speaker: Interviewer
  text: And was that all the way to Detroit or Chicago or it depended on...
- speaker: Respondent
  text: Depending where somebody was. Mostly it was Detroit, my mother had gotten hired when we moved. She was sharp. She
    was hired. She worked the main Ration Board in Downtown Detroit so she had a good job during the war, too. By good job
    I mean, not money-wise, but she was able to lend a hand.
- speaker: Interviewer
  text: Did you say there nine of you who came or were kept back for the training cadre?
- speaker: Respondent
  text: Yes, I think there were nine.
- speaker: Interviewer
  text: Anybody who had joined up from Michigan?
- speaker: Respondent
  text: Yes, one of my buddies - a good deal of a fluke. He was kept too.
- speaker: Interviewer
  text: So you had a friend there ...
- speaker: Respondent
  text: Yes, we could lean on each other. It isn't that you need anything special. It's just comforting. The unknown is always
    a little harder to cope with.
- speaker: Interviewer
  text: So any of the men that you trained, did they go to Europe?
- speaker: Respondent
  text: I'm not sure. I couldn't answer that. I don't know. I have to assume, now at one point, let me go back to during my
    training, they were talking about sending us to the Battle of the Bulge. But then they couldn't find enough ways to get
    us there so we never made it. It looked like we were going to go. But that was in about the 14th week. Normal Basic Training
    was 17 weeks. If there was a problem and they needed men sooner, they could it lop off at 14 weeks. Nothing less than
    that. They couldn't send anybody out with less than that.
- speaker: Interviewer
  text: You couldn't be trained?
- speaker: Respondent
  text: 'I mean there were things you just had to learn: bayonet tactics, handling different weapons. In the infantry you
    have mortars, machine guns, rifles, carbines... you got handguns. There''s a lot there.'
- speaker: Interviewer
  text: I noticed on the Biographical Data Form that you also demonstrated the use of the "snooper scope."
- speaker: Respondent
  text: Yes, that's what they called it. It was actually the infrared, now. They have glasses for that. It was a canister
    they mounted on top of a carbine. And I wore a battery pack. And it worked the same way that your night vision goggles
    work, but now it is through goggles, instead of this big heavy thing. So I went all over the camp and showed how they
    would sneak around in areas they were watching and then I would say, "Oh, he's over there; oh he's moving." Nobody got
    a chance to use it, but they could see that it worked.
- speaker: Interviewer
  text: I wonder who manufactured it?
- speaker: Interviewer
  text: You were also awarded an Expert Infantryman Badge.
- speaker: Respondent
  text: Yes, that was an additional thing, you had to go through, after I became a cadre man. I was talking to the Captain
    one day. He said to me, in fact, I am wearing in that picture it's on my chest there (pointing to medal in picture), that
    is similar to the combat one only except without the wreath and it pays five bucks a month. We had to go through a course.
    I mean physically go through a course. It was a bugger, quite a ... He wanted all the non-coms to go through it, but only
    three of us made it. That rifle would have been an M-1. It wasn't anything to do with shooting, it was crawling up and
    over, you have seen guys going up ladders made of ropes with a 30 pound pack over walls.
- speaker: Interviewer
  text: You've always been fairly fit.
- speaker: Respondent
  text: I was fairly athletic; I enjoyed that. And I wanted that badge. I didn't have any medals but I had a badge.
- speaker: Interviewer
  text: So when you qualified for the badge you were...
- speaker: Respondent
  text: I was a cadre man by that time.
