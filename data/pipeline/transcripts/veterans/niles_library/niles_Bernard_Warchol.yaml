collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Warchol, do you recall when you entered the service? Would that have been November of 1943?
- speaker: Respondent
  text: Yes that's correct. Unfortunately, during the Christmas holidays we were traveling to California but the car with
    the food supply was detained and wasn't attached to the train and we had to settle for a sandwich and an orange or an
    apple - that was our Christmas dinner! Unfortunately!
- speaker: Interviewer
  text: That was the troop train and you were heading to California, Camp Roberts, for basic training in the field artillery.
    Were you living in Chicago at that time? Do you know which neighborhood?
- speaker: Respondent
  text: Yes, 2327 Iowa Street - that's off of Western and Chicago Avenue. Those are the principal streets.
- speaker: Interviewer
  text: Were you in high school at that time?
- speaker: Respondent
  text: No, I had already graduated and was working on a government project and was deferred on two occasions for six months
    each. But that meant I worked seven days a week and for a young man that was getting to be a little rough. I decided to
    forget the deferment and then I was drafted.
- speaker: Interviewer
  text: What high school did you attend?
- speaker: Respondent
  text: Crane Technical High School.
- speaker: Interviewer
  text: And that line of work for the government was that in manufacturing?
- speaker: Respondent
  text: Yes, it was. As a matter of fact, I had an outstanding record at work only because I started to work at Milwaukee
    Profilers. They were producing six units per day. I produced six units per hour. And they called everybody down from the
    office and they watched me perform. And of course, the chips were flying all over. You had a unit that was an actual piece
    and then you had a forging and then you cut the forging to the shape of the piece. And this was a cocking lever for a
    naval gun. So then they had four of those machines there, brand new. Of course at that time there wasn't very much to
    pick from as far as workers because you had the butchers and bakers that went to these jobs because they were required
    to or otherwise they'd be drafted even though they had families. I was in charge and I was instructing them in how to
    accomplish this. It was a simple matter of increasing the follower by about 25 thousandths so that you could apply more
    pressure and that as you applied more pressure it eliminated the vibration reflection on the piece - chatter marks - a
    surface flaw left by a wheel that is out of tune in grinding.
- speaker: Interviewer
  text: When you were at Crane did you take job courses?
- speaker: Respondent
  text: 'Yes I did. At that time they offered shop courses: operating a lathe, a mill, a milling machine and I went to work
    for Triplex. The man who was the foreman at that time was like Stonewall Jackson and he was a rugged individual. He said,
    "You said you had the experience. There''s the machine; there are the parts. Run ''em!" But he says, "If you bust up those
    cutters, you''re out!" But I had a little problem but not much of a problem actually. I did the puzzles. And this is just
    a matter of taking a piece. You know what it looks like. You have the shape in the rough and in the finish. You put it
    in the fixture and you lock it. But then turning the machine on, of course, you''ve got the usual red and green button
    but that just started the cutters rolling. But then in order to move the machine, the bed into the cutters there was another
    lever to push. And when I picked up the lever, up and across, the machine table moved rapidly toward the cutters and it
    looked like disaster. But I stopped. Then I did it again. Stopped. Did it again. And then when I came close to the part,
    it went into a slow feed. And, of course, after I made the first piece, then I was king.'
- speaker: Interviewer
  text: So this was a good job and you wound up in a supervisory capacity and it became a seven day a week job and you thought...
- speaker: Respondent
  text: It got to be a little rough. Not that they were demanding, but I got stuck with all the special jobs. There were jobs
    that were so precise that the machine couldn't make the part to the proper dimension. You had to bring it up to a point
    and then move it by hand, feed it. It was a matter of thousandths, and there were 38 slots on it and it was a torpedo
    shaft - that's what they called it; its function was probably something else - because of the number of slots that were
    cut into piece. But if any one piece was made oversize, the piece was rejected. The fellows they had at that time lacked
    control. They'd get in there and try and it ended up that I worked 32 hours to turn out the work they needed on that part.
    And I'd go and eat. I had pancakes repeatedly. Every six hours I'd go over there and eat pancakes.
- speaker: Interviewer
  text: So you figured you'd rather take your chances in the army on the battlefield?
- speaker: Respondent
  text: Yes, well after a while, not that it was monotonous, because it was exciting. But it was uncomfortable. The guy across
    the street with two kids, he got drafted and here I am, a young man who wasn't going in the service.
- speaker: Interviewer
  text: You could feel that?
- speaker: Respondent
  text: Oh, yeah. And it was a little insulting because my mother went to the butcher shop and the comments made there.
- speaker: Interviewer
  text: How did your family feel about you going?
- speaker: Respondent
  text: They were all for it. It was necessary. "You feel it is necessary; you go ahead."
- speaker: Interviewer
  text: You wound up in the Army. Would that have been your choice of branch of service?
- speaker: Respondent
  text: No I preferred to go in the Navy because there I would be able to use my skills on machinery, most likely. In the
    Army I thought that I would get a rifle and that would be it - march away in the Army.
- speaker: Interviewer
  text: So you wind up on the train then?
- speaker: Respondent
  text: Yes, that was after we took tests. When we took the tests to get into the service, I was fortunate enough to realize
    that if it is going to be any kind of a test, I have to make it look good. I went and bought a pamphlet for 25 cents and
    I read it. It had all kinds of short cuts for math and this is what helped me get a better IQ score. I was just one of
    the lucky ones, one of 500. We ended up in a group of 500 and that was the group that went over to California to the Field
    Artillery Basic Training instead of Army basic training.
- speaker: Interviewer
  text: So the army had already decided that you and these other 499 men were going into Artillery before you even went to
    Basic Training?
- speaker: Respondent
  text: That's right, that was our Basic Training.
- speaker: Interviewer
  text: Was that first time you had ever been away from home?
- speaker: Interviewer
  text: And those 499 other people were they from all different parts of the country?
- speaker: Respondent
  text: Yes, they were and there were quite a few lawyers, surprisingly.
- speaker: Interviewer
  text: Lawyers? That must have been quite an education!
- speaker: Respondent
  text: Yes, older men, in their late twenties, thirties? It was interesting. It wasn't a young, rowdy group like you would
    normally expect in the service with teenagers.
- speaker: Interviewer
  text: So you're out in California then at Christmastime, 1944.
- speaker: Respondent
  text: Well I was on the train going to California.
- speaker: Interviewer
  text: Yes, then Basic Training out there with the Field Artillery. Was that for a couple of months?
- speaker: Respondent
  text: Yes, I think 17 weeks for Army. I don't recall what it was for Artillery. But alongside of us they had the trainees
    for officers. But the difference between them and us - they had to "double-time" to lunch, stand at attention and double-time
    back. Everything was double-time. You had to run. And we got away just leisurely walking.
- speaker: Interviewer
  text: So the fact that you had to help make guns for the Navy, that still helped with understanding Field Artillery and
    the mechanics?
- speaker: Respondent
  text: Not necessarily. No.
- speaker: Interviewer
  text: Do you get a chance to come home before you head overseas then?
- speaker: Respondent
  text: Before that I went to Ft Sill, Oklahoma, for wire communication school. It started off with Morse Code, telephone,
    wire communications. Morse Code the first week was a snap, easy, the dots and the dashes, no problem. But in the second
    week, the speed of it, I couldn't distinguish between the dash and the dot. So then I moved, I wasn't the only one but
    about half of us were knocked off. We went to radio communication, wire communications, semaphore. We had two weeks of
    coding and decoding. We had a coding device and you entered substitute letters for whatever you needed. It gave you a
    substitute letter and then you sent the message. Wire communications, it was everything including climbing poles at night
    and signing your name on top. Then coming down, the poles were badly chewed up from the climbers. You dug in with your
    climber and tore into the wood and then if you hugged the pole, the pole would scratch the hell out of your chest. You
    were miserable. The object was to lean back away from the pole and then move the belt up and then adjust yourself, again,
    and up and keep going until you get to the top.
- speaker: Interviewer
  text: There is probably a knack to it.
- speaker: Respondent
  text: You got to be brave because the idea of coming in close didn't work.
- speaker: Interviewer
  text: So even though you were in Field Artillery, you still had to take this communications, stringing lines in the field.
- speaker: Respondent
  text: Oh yes, not only that but the forward observer when he spots a target, he calls back and gives fire directions so
    that you can - the first round to spot it and then you relocate it - that spot where the target was, that way you can
    destroy the enemy's tanks.
- speaker: Interviewer
  text: When you're up the pole, you're stringing the wire. You're not doing the actual observing.
- speaker: Respondent
  text: No, but you could find yourself in that kind of a situation where height would give you an advantage.
- speaker: Interviewer
  text: So were there any particularly funny or crazy situations during Basic Training at Camp Roberts?
- speaker: Respondent
  text: Just the idea of going up the tree with a flashlight and sign your name and come back down at night!
- speaker: Interviewer
  text: What did you think of the army food, pretty good?
- speaker: Respondent
  text: Not bad at all. As a matter of fact, I had an unusual situation only because - we had a second floor and the cadre
    which are the personnel that stay there, they are the instructors, they could be a Corporal; it could be a PFC. And we
    had a jerk standing on the stairs and he was pushing you along. He wanted us to run down the stairs. He grabbed me and
    he pulled my arm and I clumsily rolled down the stairs. Then I came back and I socked him.
- speaker: Interviewer
  text: You don't do that to the cadre. That's a big mortal sin. You just don't do that.
- speaker: Respondent
  text: So I got on record and I had to go to the kitchen almost through my whole basic training as a dish-washer. But the
    sergeant in the kitchen, he felt sorry for me and he got to be my best buddy. I'd come into the kitchen at 4 o'clock in
    the morning and he'd say, "What'll you have, eggs? ham? chicken? Whatever you want I'll make it for you." So I would eat
    like a king. And then after that, I got "promoted" out of the kitchen from dish-washing to serving in the cafeteria, putting
    the ketchups, sugar, milk, and ice cream. I passed it out so when I passed it out, you know, all the buddies would nudge,
    they wanted more milk or they want this or they want that so I got to be a well-known and popular guy.
- speaker: Interviewer
  text: Did a lot the other soldiers have trouble with that same guy, that jerk?
- speaker: Respondent
  text: Yes, he was just pushing everybody. You could hurt a person pretty bad. You're on a second floor. There was a flight
    of stairs and then there was a landing and then another flight of stairs. Well, I got down to the first landing and then
    I went back up and I socked him.
- speaker: Interviewer
  text: I wonder why he did it?
- speaker: Respondent
  text: I don't know. Well, I don't want to say he was doing his job because you could do your job just as well and say "C'mon
    guys hurry up." instead of pulling. You could catch a person off-balance and on stairs. I didn't like it.
- speaker: Interviewer
  text: Unless he was trying to recruit people for dishwashing!
- speaker: Respondent
  text: Yes, that's what it looked like.
- speaker: Interviewer
  text: Were you able to check in with your family while you were at Ft. Sill, Oklahoma?
- speaker: Interviewer
  text: At this time you knew you going to be part of the Artillery and then the unit gets its orders to head overseas?
- speaker: Respondent
  text: 'Not yet. I went to this communication school and when I got back, I ran into a problem I got back early. They said:
    "You''re not due yet. You''re not going to do anything today. It''s noon. You can go to a town. There''s a dance at ..."
    I know there was a big, red brick building. There was a dance over there like a USD dance. So they said "Go!" Course I''m
    going but I''m going with a quart of whiskey.'
- speaker: Interviewer
  text: How did you come by that?
- speaker: Respondent
  text: I brought it from California, knowing that where I'm going is a dry county. And when I got to the dance over there,
    you know, everybody is my buddy, drinking with me, drinking my booze. Everybody's friendly. Well, one thing led to another
    and the MPs come along and I was out after curfew, resisting arrest. It was a dry county and I had booze. You know, "whose
    is it?" "Well, it's mine!" So I ended up in a stockade and in the morning they took me back to the Battery Commander,
    and the Battery Commander says "What do you want? Battery Commander's punishment or the military court? They sentence
    you according to the written rules. Of course, I knew with the officer that I would get it knocked off easy. I ended up
    getting up at 4 o'clock in the morning and picking up cigarette butts in the area. But I was busted in terms of rank.
    I didn't get the Sergeant's rating. Usually after ten weeks of school, you wound up getting a sergeant's rating - Tech
    Sergeant's, whatever the company needed. But it ended up I was Private First Class. No, just Private. I think I had a
    step to go to get into PFC. And, of course, I am pulling all kinds of duty. I was pulling guard duty. I'm the only one
    with a carbine that has ammunition and we're on the train going to New York, going overseas. But here again, I'm going
    as private, but that hindered my record because once you got overseas everyone got some kind of rating, but I didn't qualify
    - bad kid.
- speaker: Interviewer
  text: Yes, interesting file.
- speaker: Respondent
  text: So everyone was excited to get the news that "Hey, we're going over."
- speaker: Interviewer
  text: So that was toward the end of 1944?
