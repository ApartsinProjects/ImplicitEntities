collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Chuck, what did you do before you joined the service or how did that come about?
- speaker: Respondent
  text: Well, I was a student. I was born in Kenosha, Wisconsin, went to St George parochial school there and to the public
    high school, Kenosha High School. I graduated in June of 1943. And, of course, at that time, the war had already been
    in progress for approximately 2 years. And very many of my friends and relatives and neighbors were already in the service
    because nearly everyone once as soon as they finished high school went into one of the branches.
- speaker: Interviewer
  text: Was your brother also in the Navy so that helped to make up your mind?
- speaker: Respondent
  text: Yes, he was training to be a naval flier down in Florida, and when I was subsequently stationed down there I saw him
    quite often and then strangely enough when I went out to the Pacific, my brother was there right near to where we were
    for most of the Okinawa campaign.
- speaker: Interviewer
  text: Where did you go for training then?
- speaker: Respondent
  text: OK, I went to the Great Lakes Naval Station which is about 25 miles from Kenosha, where I was living, my hometown.
    While there I was put in the hospital corps school. The Great Lakes Naval Hospital is right there. That's where I received
    my basic training to be a Navy medic.
- speaker: Interviewer
  text: That's where the Navy placed you in the Medical Corps. Was that based on a particular aptitude test or your grades
    in high school biology?
- speaker: Respondent
  text: Yes, they gave everybody tests of all types, and then they decided where you might fit in well. I ended up in the
    hospital corps. Following the training at the Great Lakes Naval Base, I was sent to Florida for 9 months to the amphibious
    training base at Ft. Pierce, Florida. As I recall there were about 15,000 sailors training there for all types of landing
    activities, amphibious training. They had a hospital. Everybody lived in tents on the home base - the whole base was a
    tent base, few if any permanent buildings there - it was an island just off across the river from Fort Pierce, Florida.
- speaker: Interviewer
  text: It must have been a new and different experience for a recent high school graduate from the Midwest to be so far away
    and training with people from all around the country and all types of people.
- speaker: Respondent
  text: One of the reasons I chose the Navy was that I was crazy about traveling and I figured this would be an opportunity
    to travel. My dad was in the Army in World War I in France, and he said if you go into service, I recommend the Navy -
    you always have a roof over your head and have your food that would be nice so that's a couple of the reasons that I ended
    up in the Navy, I guess. And they took me in the Navy.
- speaker: Interviewer
  text: So after the training in Florida were you assigned to a ship?
- speaker: Respondent
  text: We were down in Florida for approximately 9 months, then in November of 1944, I was sent to Massachusetts - Boston,
    and became a crew member on the USS Sims.
- speaker: Interviewer
  text: So how long after you had been inducted before you set out for sea on the Sims?
- speaker: Respondent
  text: It wasn't very long. This was the middle of winter. This was November, about November 20 when I went aboard the Sims.
    We did some training cruises out in the Atlantic in mid-winter. That was pretty hairy - what with the cold and the waves.
    That was my first experience at sea. It didn't bother me at all. Then we went down to Norfolk, and we did some training
    of other APD crews. Because a large part of our crew was already seasoned sailors, because of these trips in the Atlantic
    prior to this on the DE, they knew how to handle the DE. The ship was essentially the same except we could carry troops
    and different armaments. Then we were down around the Norfolk area for a bit. Then we shoved off; we loaded up, and we
    also had gunnery practice out in the Atlantic. Then we took aboard 100 or 150 Marines and headed for Panama. We had a
    very nice cruise, beautiful weather down through the Caribbean to Panama. The first landing in Panama was at Colon at
    the east end of canal. That was a really wild liberty night. They left me on board. (laughter) I never got ashore in Panama.
    Anyway the cruise through the canal was wonderful, beautiful and historic of course.
- speaker: Interviewer
  text: At this time you have a formal office or duty or responsibility on the ship?
- speaker: Respondent
  text: Oh yes, right off the bat, of course, I was busy most of the day although I did get a little time to do some studying
    down through the Caribbean since we had our passengers plus our crew. There were about 350 people. By the way, there were
    3 of us in the Medical Department. There was a Doctor Kellum, a Lieutenant, and a Chief Pharmacist's mate by the name
    of Mobley from Alabama. We were three people. And then I was a Hospital Corpsman, First Class.
- speaker: Interviewer
  text: In addition to serving as a hospital corpsman in this three-person medical department, did you also have duties that
    might involve gunfire?
- speaker: Respondent
  text: No, we were spared from other duties because there was plenty to do in sick bay. Three times a day we'd have sick
    call. That might last for hours, again at noon and in the evening. Then there were minor operations and injuries. We didn't
    stand duty like all other crew members had certain duties although we had the sick-bay duty. But there was some time in
    between when we played cards. We played a lot of pinochle. Big part of the crew, of course, was into poker. They played
    poker games down in the bottom of the ship, down in the bilges.
- speaker: Interviewer
  text: You have an excellent memory and a command of the details. I would suspect that's been aided to a degree by the fact
    that you kept a journal or diary during the war. I'd be curious to know when you decided to keep the diary.
- speaker: Respondent
  text: Actually, I kept a diary from the time I went into the service so I have another year when I was in Florida that I
    never typed up, or I never have taken out or never read, in fact, in 60 years. Someday I think I might put that on paper
    too.
- speaker: Interviewer
  text: Were you involved in high school in the student newspaper and yearbook?
- speaker: Respondent
  text: To some extent, not too much.
- speaker: Interviewer
  text: Was it a family practice to keep a diary?
- speaker: Respondent
  text: No, I had kept a diary for quite a few years when I was in high school at home so it was just natural for me since
    I went away into the service to keep a record from the day I joined the Navy until the day I got out.
- speaker: Interviewer
  text: In your diary you mention some of the medical conditions that your team had to address with various medications and
    procedures. You got quite a medical education.
- speaker: Respondent
  text: Oh, no question about it. For about two and half years or better that's about all I did was, handle sick calls and
    take care of injuries. We had our share of seasickness. There were crewman who were seasick all the time. If they were
    really bad, they were transferred off the ship. We got into some really rough weather. In fact when we were off Okinawa,
    there were three typhoons. We'd take the whole anchorage, the ships, and head out to sea to try and run ahead of the storms.
    We got into some really, really bad weather. We were fortunate that we had the experience of the prior year. In 1944 we
    lost 3 destroyers in the South China Sea with all hands - about 500 sailors lost their lives in the typhoon because they
    sailed right into it. At that time they didn't have the warning. A year later it had improved somewhat with weather planes
    and things like that.
- speaker: Interviewer
  text: You had to treat ...
- speaker: Respondent
  text: I never was seasick. I'd be down below decks in the heat and working and I'd get it right up to my throat. And then
    I'd just go up on deck on the fantail and look out, steady myself, and look out at the horizon. And sometimes we'd be
    down in the trough and we could look up at 30 feet up at the waves. Next time you could look out at horizon and you couldn't
    see any water at all. But you'd get your equilibrium that way. The only thing we had was scopolamine for anti-seasickness
    that I recall dispensing but I never used it myself. For the most part I was able to combat mal de mer (chuckle).
- speaker: Interviewer
  text: There were cases of dengue fever, laryngitis and somebody had a circumcision?
- speaker: Respondent
  text: Yeah, our doctor liked to operate. So he'd think of minor operations that he could perform to keep him in practice
    for when he got out of the service. And of course there was suturing from accidents, etc. We had some sailors who came
    down with pretty bad illnesses, all the way up to pneumonia, but fortunately we had shots for various tropical diseases,
    and we weren't ashore that much. Aside from a few liberties, we might be weeks before we would get ashore.
- speaker: Interviewer
  text: You arrived in the front lines, as it were, at Okinawa.
- speaker: Respondent
  text: Yes, I was telling you about our cruise. We went down through the Caribbean and through the canal, then we went up
    to San Diego while there I got a short leave we were only there only 3 days as I recall. I had relatives in L.A. so I
    took the train to visit my relatives. We weighed anchor, tied up at the time, for Hawaii, and, as I said, my brother was
    at that time ... they had an excess of Navy fliers so they put him as a deck officer on a ship, an LST. I didn't know
    this but when I got to Hawaii, he was there. I had a good buddy of mine, a high school friend, named Robert Kollman who
    was stationed in Hawaii all during the war or during the part that he was in. He knew I was coming out there because we
    corresponded. He went to meet us, and he ran into my brother, and so my brother Pete and I and Robert Coleman we were
    all were together in Hawaii so, of course, when we had liberty, we had a good time in Honolulu and Waikiki and we didn't
    stray much from that because we had our regular duties, but we had a good share of liberty. While there we took a training
    cruise up to Maui, up along the cliffs of Molakai, gunnery practice, there was one of the ships - they towed these sleeves
    behind these ships and then we practiced gunnery practice. I think we were in Hawaii for about a week, and then we shoved
    off for the Philippines.
- speaker: Interviewer
  text: When we reached Eniwetok (Marshall Islands) which had been probably 6 months before taken from the Japs and that was
    a bad battle for that little coral atoll. What happened then?
- speaker: Respondent
  text: We saw the shredded palm trees from the ship and shortly after that our captain told us to be more alert, no more
    horseplay anymore because we were in the war zone now. We got to Samar Island in the eastern Philippines, and Leyte Gulf,
    the latter, about the last week of March of 1945 and then about the end of March about March 27th we had a couple of nice
    liberties ashore in the native villages and that was very interesting. It was extremely hot, over 100 degrees every day.
    We didn't really mind. Then we took on provisions and more ammo and food and everything which was a constant thing of
    course.
- speaker: Interviewer
  text: Then later about March 28th something like that we headed for Okinawa with a huge convoy of troop ships, freighters
    and all kinds of ... AKAs, APAs - all the different designations. What was the invasion like?
- speaker: Respondent
  text: Then on April 1 which was Easter Sunday, they also designated it "Love-Day," that was the invasion of Okinawa. It
    was uncontested which was a surprise, I think, to everyone. The small boats, I remember, that morning we had a big breakfast,
    and all that for the days ahead, of steak and eggs. That was one fortunate thing on board ship that we had pretty good
    food and good cooks. I never suffered from want of food and I think for the most part, the crew some of the crew thought
    at times we were short of food and that, but I don't think so. I remember that morning it was still and a lot of smoke
    that was about it because we were out away from the shore; all the activity was going on further in. The Army landed there
    uncontested and the Marines. The Army went south toward where 100,000 Japs were dug in along the Naha Shuri, Naha Yonabaru
    was the line called there Shuri Castle. It was a rugged area with thousands of caves. Then they started slugging it out
    for the next months in a terrible, last battle. The Marines just swept up to the north up to Motobu peninsula. There was
    a big island, Ie Shima, which was heavily fortified. That was a key point, I think, for Jap communications because it
    was north of the island when the Kamikazes came down. They'd have contact with their ships and all. We were only at Okinawa
    for a few days.
