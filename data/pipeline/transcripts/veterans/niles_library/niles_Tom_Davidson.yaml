collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So the first thing I usually ask people is what happened when they started out. Were you drafted or did you enlist?
- speaker: Respondent
  text: I enlisted in November because I was going to get drafted in December. So I didn't want to go in the Army. Yeah. So
    I could get in the Navy for two years. So I got in the Navy for two years.
- speaker: Interviewer
  text: So what were you doing before that?
- speaker: Respondent
  text: I was a printer before that. I worked for Hall Printing in the city. And I enlisted, went in the Navy, and, when I
    came back, I went back there to work. That's good when I got out.
- speaker: Interviewer
  text: So how old were you when you--
- speaker: Respondent
  text: Nineteen. When you enlisted. Very young. At nineteen when I enlisted. They were drafted at about eighteen years, six
    months, and, like I said, I knew I was going to go in December. I knew I was going to get drafted in December so I got
    in in November.
- speaker: Interviewer
  text: So had you finished high school?
- speaker: Respondent
  text: Yeah. Finished high school in '64.
- speaker: Interviewer
  text: And then you were working as a printer.
- speaker: Interviewer
  text: So what-- do you remember what happened when you started out in the Service? Do you remember if you had training,
    what happened?
- speaker: Respondent
  text: Well, I enlisted in Glenview. And, from Glenview, they took me up to Great Lakes. And they did boot camp up in Great
    Lakes for, I think, it was about eight weeks. And then, right from boot camp, I got sent to the Roosevelt in Mayport,
    Florida. It was an aircraft carrier. And I spent the whole two years, well, the whole rest of my time, on that ship. The
    whole time I was in. We were the first East Coast carrier to go to Vietnam. We sailed all the way around South Africa
    and back up. It took us about, I think, thirty, thirty-two, days to get over there. And we got there sometime, I think,
    we left-- we left around the end of June in '65. And we stopped in Cuba for some more training before we went and we got
    over there, I think, about the end of July of '65. And we left to come back, or, no, not '65, '66, I'm sorry, and we left
    to come back about early January of '67. And we came back the same way. We came back the same way, sailed all the way
    around the tip of South Africa, crossed the equator four times-- two times on the way over, two times on the way back.
    We stopped in Brazil on the way over, and we stopped in Cape Town, South Africa, on the way back.
- speaker: Interviewer
  text: Was that interesting?
- speaker: Respondent
  text: Well, Cape Town, South Africa. We were supposed to get liberty there. And I don't know if you, you probably wouldn't
    remember, but there used to be a senator from Illinois named Chuck Percy. And he started raising all kinds of hell about
    South Africa being segregated and, so, we didn't get to leave the ship the whole time we were there. We were there for
    about three or four days. And we never got to leave the ship the whole time we were there, and most of the guys on the
    ship were pretty upset with him, even the black guys, because it was segregated, like I said, but the black people, they
    had buses there at the pier. They were going to take them to the black section of the neighborhood, or the town, and we
    were going to stay in the white section of the city. And the city had been prepared for us stopping, because we were the
    first American warship that had stopped there in years. And the local citizens had spent a lot of money out of their own
    pockets to have parties for us, and all that, and they wouldn't let us off the ship. So there was, they allowed all the
    people from the town on the ship to visit if they wanted to. We had a lot of visitors. Some guys snuck off and, you know,
    they snuck off, and they came back on with the visitors the next day. Some got caught, some of them didn't. The guys that
    didn't had a good time. Even the guys that did, had a good time, you know. But, then, we came back to the States after
    that. And then we were in and out of home port for a while. And then we went to the Med. And that's when I got out, when
    we were in the Med. I got out, and I came home.
- speaker: Interviewer
  text: So when you were trained, what were you trained to do?
- speaker: Respondent
  text: Well, when I was in, my job was I ran supply for V2 Division, which was the catapults and arresting gear. That's what
    shoots the planes and catches them. And at times I worked on the flight deck on the LSO platform, not always, but sometimes.
    And when I did that, I would stand there with the binoculars and I'd have to spot the planes as they were coming around
    to land and tell the LSO officer that the pilots had their tail hooks down, their flaps down, and their wheels down. And,
    then, I was-- they trained us extensively in fire fighting on the flight deck.
- speaker: Interviewer
  text: Was that something to worry about a lot?
- speaker: Respondent
  text: Oh, fire is your biggest enemy when you are at sea. Because you got to put it out yourself. They always instilled
    in, all the Navy guys, they instilled in you that fire is your biggest enemy.
- speaker: Interviewer
  text: So, did you ever have a fire you had to put out?
- speaker: Respondent
  text: No, we had a fire, but it was in a different section of the ship, so I didn't have to put it out. We were there when
    the Oriskany caught fire, and they-- we lost seven or eight guys, I think, in our fire, and then the Oriskany caught on
    fire when we were there. And they lost quite a few people. And shortly after I got back, the Forrestall blew up. They
    almost lost that ship. They lost a lot of guys on that ship-- Government's fault, too. They were using old World War II
    ordnance that they shouldn't have been using. And it was just a chain reaction thing. A lot of guys got killed. They almost
    lost the ship. They had-- well, I wasn't on it, but I know the fire started on the flight deck. John McCain was on there.
    He got out of the plane-- matter of fact, his plane, I think, was the plane that was hit first. And he got out just in
    time before his plane blew up. And, then, all these planes were loaded up on the flight deck with these five hundred pound
    bombs and they-- the flames-- they just started cooking them off. And these things started exploding. And they had a Repair
    8 crew there that was highly trained to fight fires on the flight deck. Well, those guys, I think almost all of them were
    killed in about the first two minutes when the planes started blowing up. And, then, the secondary firefighters, which
    is what I would have been had I been on that ship, most of them were killed when the planes started blowing up. And they
    almost lost that ship, but, like I said, I wasn't on that one, so... I had a couple of friends that were, but they got
    out. They got out ok.
- speaker: Interviewer
  text: So that happened after you got back. Had you been-- Were you still paying a lot of attention after you got back?
- speaker: Interviewer
  text: So did you get to know people that you still keep in touch with?
- speaker: Respondent
  text: Well, the one fellow that just walked in, he just now walked in, he and I went to high school together, and we were
    in the same ship in the Navy.
- speaker: Interviewer
  text: What school did you go to?
- speaker: Respondent
  text: Maine East. And we were on the same ship in the Navy. We went all through 'Nam together. And there was another fellow
    that I lost touch with for many, many years. And about three years ago, I found him on the Internet. And we also went
    to high school together. We went to boot camp together. He was in a different company, but we went to boot camp together,
    and we were on the same ship. We were on the same ship all through the whole time, we were together the whole time, and
    I still keep very much in contact with him.
- speaker: Interviewer
  text: Was that unusual to know other people before?
- speaker: Respondent
  text: Yeah. You know, as far as I was concerned, yeah, you know. There were a couple other people that I had met on my ship.
    There was another guy that I haven't seen in years, every once in a while I hear of him. We grew up together. He was right
    from this area and he went in about a year before I did. And we were on the same ship together and I'd see him occasionally.
    I mean, we were friends, but we weren't real, real good friends, but we were friends. And I'd see him occasionally. And
    he lives out of town now. Once in a while here, I know, every once in a while, I see his real good friend and he tells
    me how he's doing. And there was another kid I ran into, another guy I ran into, that he was from-- he graduated from
    Maine East about a year or two before I did. But I knew his younger brother, and that was about it. I mean, you don't,
    you know, you don't run across the guys that you know. A lot of times you might see guys you know-- they used to have
    like a buddy system, you could enlist under the buddy system. That meant that you went to boot camp together with your
    buddies, but, usually after that, you all got busted up and went different ways. But, yeah, it's kind of unusual that
    you'd run into guys.
- speaker: Interviewer
  text: So what was it like living on the ship? Do you remember anything?
- speaker: Respondent
  text: Well. Oh, sure. It was, you know, it wasn't a bad life. It took a little bit getting used to. After you got used to
    it, it wasn't too bad, you know. You slept in racks. They called them racks. You'd have like six foot ceilings, and the
    racks were three high, so you'd have three people. And you had just little lockers that you had all your clothes in. But
    it wasn't really-- you know, we ate good. We had a lot easier-- we had not near as bad as the guys that were on the ground
    over there getting shot at all the time and, you know, not having half the time a decent meal, and all that. You know,
    I always had a decent meal. We worked hard at times. But we always had a decent meal, so.... You know, I'm glad I was
    in the Navy rather than, you know, the Army or the Marines.
- speaker: Interviewer
  text: So did you have-- When you were going, when you were traveling, did you have different duties than when you were--
    or were you always traveling?
- speaker: Respondent
  text: Well, when you were in port, naturally, you weren't, you know, you didn't fly planes, of course. And then they used
    to pull maintenance, you know, they'd do all the maintenance on the catapults and the rest and give what they had to do,
    so, you know, and, then, I was pretty busy with the supply stuff because they'd need parts, and I'd have to give them
    the parts. And when you were out at sea, you know, you had, when they were flying, unless they needed a part, I mean,
    you did different things, but not really all that much, you know, it was pretty much get the parts for them, make sure
    they're ordered, get what they'd need. They'd tell you. And, then, like I said, I would get bored sometimes, so they'd
    let me up on the LSO platform and work, you know, work there.
- speaker: Interviewer
  text: So what did you do in your free time then?
- speaker: Respondent
  text: When you're in a flight deck crew, you don't have any free time.
- speaker: Interviewer
  text: What were you doing all the time?
- speaker: Respondent
  text: When we were in Vietnam, we would fly twelve hours a day, pull maintenance, they'd pull maintenance about six hours
    a day. And then you'd get about six hours a day to sleep. Every other day-- we had two catapults -- one day, one crew
    had to sleep right on their station and the other guys got to go to their racks the other day. And, then, you switched,
    because there was a plane hook up at all times. So you didn't have a whole lot of free time. It wasn't like you see in
    the movies where-- some guys did. They got to go to the movies every day because they had a movie on the ship and all
    that, but the flight deck crews didn't get to do that. You just worked all the time.
- speaker: Respondent
  text: Well, you worked most of the time. You worked pretty hard, you know. The flight deck crews didn't get a chance. I
    mean, if you speak with this other fellow that came in, Earl, he was a plane captain, and he'll probably tell you the
    same thing. You didn't have, when you were out to sea, you didn't have a whole lot of free time. You had some, but you
    didn't have a whole lot of free time. And then if you did, you know, you'd go visit your buddies and all that, you know,
    and... you'd go around to different spots in your division and visit your buddies, and all that, you know, so....
- speaker: Interviewer
  text: So, did you travel or did you stay in one place mostly? Did you travel any place in particular on the ship or did
    you--
- speaker: Respondent
  text: Well, oh, yeah, I'd go all over the ship.
- speaker: Interviewer
  text: Was the ship moving anywhere important? Did you go anywhere around?
- speaker: Respondent
  text: Oh, sure. I got on the ship on January of 1966 and I got off in end of October of '67. And in that amount of time,
    I was in Cuba twice. I was in the Virgin Islands. I was in Brazil. I was in Japan. I was in Hong Kong. I was in the Philippines.
    I was in South Africa. I was in Spain. I was in Italy. I was in Sicily. And that's about all. [Laughter.] That's not enough.
    And that was, you know. And Puerto Rico. I was in Puerto Rico, twice, I think. So.... No, we traveled. We didn't sit still.
    We traveled. And, you know, it was fun. You got to see a lot of places, you know.
- speaker: Interviewer
  text: Did you feel any-- obviously you enlisted because you didn't want be drafted into the Army.
- speaker: Interviewer
  text: Did you have any feelings about the military or war before you went in?
- speaker: Interviewer
  text: And did you change your mind at all?
- speaker: Respondent
  text: I didn't change my mind much, but, you know, I was no hero, you know. You had to go. Everybody. You know, at that
    time it was different than it is now. You had to go. I knew I had to go and I was in, you know, I wanted to get the best
    deal I possibly could. I got-- had they told me that I had to stay in the Navy for four years, I wouldn't have went. I
    would have went to the Army. I would have waited to get drafted to do only the two years and take my chances. But, like
    I said, I got lucky. I was able to get in the Navy for two years. So, I took it. And, am I sorry I did? No, because if
    I didn't do that, I would have had to go-- I had to go anyway. So, I'm not really sorry I did it. I would never have thought
    of staying in, or maybe I would have thought, but not for very long, you know, I didn't want to stay in. But, you know,
    you just did what you had to do, you know. And most of the guys that are my age, we're getting older now, but they'll
    tell you the same thing, you know. They went because they knew they had a certain amount of time they had to put in. So,
    you went and you got it over with. Get on with your life, that's what I did. That was my reasoning. Do it. Get it done
    with. Get on with my life.
- speaker: Interviewer
  text: So, were you ever afraid?
- speaker: Respondent
  text: No. Nothing to be afraid of or do you just not get afraid? I mean I might have gotten-- I shouldn't say I was never
    afraid. I was never in fear of my life. I mean, if you weren't a little bit afraid on a flight deck you're probably lying
    because there's a lot of bad things that can happen up there, you know. But as far as being afraid for my life, or an
    enemy coming after me, never. They didn't attack carriers, you know. It's very dangerous working on a flight deck of an
    aircraft carrier, but they didn't attack carriers when you were in Vietnam. It just didn't happen, and you knew it didn't
    happen. That way, you were pretty sure you were safe. So was I ever afraid about my life? No. Never. You know, what can
    I say. Some of my friends that I talked to, you know, they had it pretty rough. My best friend died from Agent Orange
    about seven-- eight years ago.
- speaker: Interviewer
  text: I'm so sorry.
- speaker: Respondent
  text: And he was a Niles cop. And he passed away about eight years ago. He was in the Marines and he died from Agent Orange.
    And my cousin passed away from Agent Orange. He was in the Air Force. And, you know, so yeah, I miss those two guys.
- speaker: Interviewer
  text: Did you talk when you got home? Did you talk about it to other guys or?
- speaker: Interviewer
  text: So when did you start talking about it?
- speaker: Respondent
  text: Well, I'll talk to a certain extent, but then I stop. I don't, you know. I know this is an old cliche, but unless
    you were really there it doesn't make much of a sense to talk to you too much about it because you'll never understand.
    It's something -- It's something, I mean, these World War II fellows, I mean, you can talk to them and they understand.
    And, I mean, other veterans. I mean, I'm not, you know, other veterans understand. But to sit there, and sit down, and
    talk to my mother and father about anything like that, you know, no. I never talked, you know, I went in there. I'm back.
    I'm glad I'm home. I'll see you later, Mom. I'm going out for a beer... you know.
- speaker: Interviewer
  text: So did you-- when you were in the Service, did you communicate with your family? Did you send letters?
- speaker: Respondent
  text: Yeah. Oh, yeah. Yeah, I did.
- speaker: Interviewer
  text: Did you get them on a regular basis?
- speaker: Respondent
  text: Oh, yeah. Yeah. I got mail regularly. You know, from my mom and dad. My sister, occasionally. She would write me.
    My older brother, his wife would write me. My older brother never writes anybody. But his wife would write me. My aunts
    and uncles. You know, I would get letters. I got, you know, letters quite regular. I used to get the Tribune, I think
    it was, every day. They sent me the Tribune.
- speaker: Interviewer
  text: How long did it take for the mail to get there?
- speaker: Respondent
  text: It varied. Sometimes, you'd get it very quick. Sometimes, we didn't get mail for thirty days. Like when we went-[from]
    when we left, until we got to the Philippines. When we first got to Vietnam, we didn't get any mail for about three weeks
    because there was no way to get it for us. But then we got a whole bundle. And the same coming back. We didn't get mail
    for about three weeks. But while we were there, we would get mail every day or two. Every two days or so, we'd get mail.
    They'd fly it down there, and we had a regular post office on there. So, you know, you could buy money orders and everything,
    just like a regular post office. We had a regular post office and we got mail regularly. I mean, sometimes, it would
