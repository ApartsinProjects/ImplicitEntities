collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Bill, when did you enter the service?
- speaker: Respondent
  text: July 20, 1944.
- speaker: Interviewer
  text: And where were you living at that time?
- speaker: Respondent
  text: I was living in an unincorporated area outside of Franklin Park where I went to school.
- speaker: Interviewer
  text: So were you in high school at that time?
- speaker: Interviewer
  text: You probably graduated somewhere in there, did you?
- speaker: Respondent
  text: 'I graduated on June 8, 1944. When I graduated I was holding three things in my hand: one was my high school diploma,
    the second one was a certificate for 4 years of perfect attendance - no absence or tardy in high school, and the third
    thing was a letter from my draft board, asking me to report to duty.'
- speaker: Interviewer
  text: So you were drafted. Were you drafted into a branch of service? Or did you choose a branch of service?
- speaker: Respondent
  text: Well, they asked us which branch of service you wanted to go into. I had already a brother who was in the Army, and
    I didn't know how to swim so I didn't think the Navy was the perfect one for me so I said "Army." They took a big stamp.
    It was about 3 inches high and 5 or 6 inches wide and stamped right on my application "Army" so they could not miss it,
    no mistakes.
- speaker: Interviewer
  text: Where were you inducted?
- speaker: Respondent
  text: In Fort Sheridan, Illinois.
- speaker: Interviewer
  text: What were your first days like, adjusting to the Army?
- speaker: Respondent
  text: It really was the first time I was away from home. I was like everybody else; everybody else was in the same situation.
    We were happy to get brand new clothes, to have free meals, and they gave us a battery of tests so life seemed to be pretty
    good.
- speaker: Interviewer
  text: Was that before boot camp?
- speaker: Respondent
  text: Oh yes. [Chuckle]
- speaker: Interviewer
  text: What was boot camp and training like, and where was it?
- speaker: Respondent
  text: Well, I took a lot of tests; one of the things I took was a typewriter typing test. I passed the test 40 words a minute.
    They looked at this, and they said "Oh, this man can type, and he's good at machines so let's send him down to Florida,
    learn how to operate a machine gun." I never fired a machine gun in my life or any kind of a rifle, but I went.
- speaker: Interviewer
  text: Were the instructors pretty good down there in Florida?
- speaker: Respondent
  text: They all knew what they were doing. Many of them were veterans who had been in combat before, and they came back and
    were passing on their skills.
- speaker: Interviewer
  text: That training camp in Florida was called?
- speaker: Respondent
  text: Camp Blanding, Florida.
- speaker: Interviewer
  text: Did you have to make some adjustments to living there?
- speaker: Respondent
  text: Well, it was always nice and warm. I missed the black dirt. Everything they had down there was sand, sand, sand, and
    we were out in the no man's land.
- speaker: Interviewer
  text: Was that the first time in your life that you were away for an extended period of time from home?
- speaker: Respondent
  text: Yes, it was. I never was away from home before.
- speaker: Interviewer
  text: How was the food?
- speaker: Respondent
  text: Well, they gave us plenty of it, and I thought that was great.
- speaker: Interviewer
  text: After boot camp, did you receive some advanced training then on the machines, the machine guns?
- speaker: Respondent
  text: No, the training program was for seventeen weeks which included training first on rifles, then on machine guns and
    then on mortars. We also had additional training on just about every kind of weapon you could think of - pistols which
    I eventually carried, bazookas to knock out a tank.
- speaker: Interviewer
  text: What was the most difficult piece of equipment to learn how to operate? Or were they all challenging?
- speaker: Respondent
  text: Well, they all were challenging. We had to know how to take these things apart in the dark. What we did was, took,
    for example, a machine gun and put it on a blanket and rolled the blanket over the machine gun so we couldn't see it so
    we could feel in there, had to take it all apart, layout the parts. Somebody would come and take a look at it, one of
    the instructors. He'd say "okay, then put the blanket over it" and say "now put it back together again" so we would have
    to, without seeing it, just by feel, would have to put the machine gun back in order and if you put it back in working
    condition, you passed the test.
- speaker: Interviewer
  text: Did most people pass the test?
- speaker: Respondent
  text: After lots of practice, yes.
- speaker: Interviewer
  text: After Camp Blanding, did have any other assignments in the States before you went overseas?
- speaker: Respondent
  text: No, from Camp Blanding, I went for a 10-day furlough at home. I had orders from there to go to Camp Miles Standish
    near Boston, Massachusetts. And then from Boston we got on a ship, named the Santa Rosa. It was a small cruise ship converted
    to a troop ship. About the 1st of January, 1945, we went to Le Havre, France. We went there as replacements, and they
    put us on a train about 10 o'clock at night. The next morning we were in Belgium.
- speaker: Interviewer
  text: And your "new family" so to speak in Europe was a particular company, or division or army?
- speaker: Respondent
  text: Well, my closest family was the 75th Infantry Division, the 289th Regiment, the First Battalion which consisted of
    A, B and C Companies which were rifle companies and D Company which was the heavy weapons company, consisting of machine
    guns, mortars, bazookas.
- speaker: Interviewer
  text: So that you put in D Company?
- speaker: Respondent
  text: I was in D Company.
- speaker: Interviewer
  text: At this time your rank was private?
- speaker: Respondent
  text: I was a private.
- speaker: Interviewer
  text: When you found yourself in Belgium, was the 75th/289th directed somewhere?
- speaker: Respondent
  text: I met this division in Belgium in the woods. And I can remember our first meal together. The cooks had a big garbage
    can, full of boiling water. They threw in some cans of food, and we had our dinner by picking out the one that you wanted.
    The one you kept really was the first one because you didn't want to go back and get into the hot water. [Chuckle] You
    opened the can up, took out a spoon and ate it right out of the can.
- speaker: Interviewer
  text: At that time were you sleeping in tents outdoor?
- speaker: Respondent
  text: No, we'd sleep outside and this was about the middle of January, and about a week later they decided to send us back
    to Colmar, France which was near the German, Swiss, French border so we got on a freight train. It took us two days to
    go down to that area. There we got organized. My first real battle was right down there, going into combat. I can remember
    going down this dirt road, a muddy road shall we say, and mortar shells were going around us. The mortar shells kept following
    us all the way up the line, but fortunately they did not have us lined-up. They were off about 150 feet, maybe 200 feet,
    following us up the road. These shells kept going off and pieces of shrapnel were flying around us. We got up to this;
    it's not a town, a little group of houses. We went up to these houses, and they told me to crouch down here, and they
    were going to set up the machine gun in the back. 1st and 2nd gunner went around the back. On the second floor on the
    porch, they set the machine gun up, just then the German army sent in one of their artillery shells, an 88 mm shell came
    in there and hit the back of that house. I remember this glass exploding and shimmering all over this place, I thought
    it was the end of the world. Soon one of the other men in our squad came running back to us and said, I don't remember
    their names, the 1st gunner and the 2nd gunner were wounded so my first real job then was to help them into another building.
    We took them down into the basement. The Medic came over and treated them. One was hit in the foot with a piece of shrapnel.
    We had to cut his boot off so they could look at it, and the other man was hit in the side with a piece of shrapnel, and
    he was in pain. Medic came over and gave him some morphine. That was my first real taste of combat. I didn't get to shoot
    any guns, but I had plenty of chances to duck. For this I was promoted to Private First Class and awarded the Combat Infantryman
    Badge.
- speaker: Interviewer
  text: That was down in the region where Switzerland, France and Germany all come together?
- speaker: Respondent
  text: Yes, near Colmar. The next morning they told me, it was about 7 o'clock in the morning, they said "Ok Shipp it's your
    turn to stand guard." They moved the gun over into a chicken coop. They brought me in there and said "here's a machine
    gun and out there is the enemy." If you looked out there through a little window, you could see nothing for quite a ways.
    The machine gun was right in front of the chicken door. It would go up and down so you could raise it up and down. It
    was closed. They said when you're ready to fire the gun, just open the door and start firing. Fortunately, nothing happened.
    I was on there for about 4 hours or so. The only other person in the room there was an observer from our mortar squad.
    If he saw any activities, why he was to call the mortars through a wire telephone, give them directions.
- speaker: Interviewer
  text: After the Colmar encounter, your unit was sent back north?
- speaker: Respondent
  text: Yes, but we still stayed down there until the battle was over. We went into many towns. I remember one time we were
    going - the US Army makes an attack in a spread-out formation. They don't line up single file and go in - spread-out formation.
    We were going into this town; I don't recall the name of the town. Off to our left were the riflemen, and there was this
    big explosion. Everybody stopped. You could see that one of the riflemen had stepped on a landmine. Well, the medic went
    up and was treating him. We continued on, going toward the town. Unfortunately, another rifleman ahead of them stepped
    on a mine, and he went down. The medic who was administering to the first one who was injured saw that he couldn't do
    anything else so he went up to assist the second one who was up further and while the medic was going up there, he stepped
    on a mine. And we could see 1-2-3, soldiers laying there, not moving. We continued on to this town. Everybody went into
    a single file, and went step-by-step, following in the previous person's footstep. And you could tell how it was because
    it was sort of muddy. And you'd step in these muddy spots and don't dare step off of this, just follow the footsteps,
    and fortunately we went through up to the town and from there we spread out and went on. We learned several months later
    that the minesweepers came through there, and they found something like 790 mines buried in that field out there. I saw
    3 of them go off, and fortunately everybody else was able to get through.
- speaker: Interviewer
  text: And those poor men, they died?
- speaker: Respondent
  text: I would assume so but we don't know; we just kept on going and that was it. I would think that the act of that medic
    who went to rescue, went to administer to one, found that he couldn't do anything, went to the aid of the other rifleman
    who stepped on a mine probably was the most courageous thing I've ever seen because he too ended his life. And we went
    through these different towns up there. We'd come across barriers in towns and roadblocks. We couldn't get through there.
    We'd walk through the house and find a hole in the wall and go through the hole in the wall and go around the barrier
    and keep on going.
- speaker: Interviewer
  text: Were you meeting with a lot of resistance, or was it like rearguard action?
- speaker: Respondent
  text: They were trying to keep ahead of us. They would be sending in artillery and some rifle fire, mostly artillery. But
    we had the upper hand.
- speaker: Interviewer
  text: You felt that the Germans were being thrown back; they were yielding ground.
- speaker: Respondent
  text: They were on French territory, and they wanted to get back to their own territory in Germany. We just got to the edge
    of Germany, and they sent us back up to another spot in Holland.
- speaker: Interviewer
  text: So after the Colmar battle in that region and moving forward, was your unit then directed somewhere else?
- speaker: Respondent
  text: Yes, we were. By the way, I want to mention that while we were down there in Colmar, we were not with the United States
    Army, we were attached to the French army, and the French had the tanks there, and we were the infantry. They decided
    to send us up to Holland to join the British Army so we went up to Holland and joined the British Army.
- speaker: Interviewer
  text: Were you impressed by the French Army and the British Army?
- speaker: Respondent
  text: Well, we didn't have too much to do with the French Army. I knew that they were a little reckless. They would get
    out of their tanks behind a building and build a bonfire and cook their dinners and that only attracted artillery fire.
    More shells would be coming in. We didn't like that. They would hop in their tanks. They felt safe. Here we are in a chicken
    coop. You're lucky if you are in a building.
- speaker: Interviewer
  text: When we went up to Holland, we met these English soldiers. They were a machine-gun squad and they had been there since
    October, October to the middle of February. They had nice little wooden huts built, small, but they were serviceable,
    kept the rain off of us. They dug trenches between where the guns were to be set up. And we were overlooking a river.
    And our task was to keep the German Army on the other side of the river. Now they had been there for months and months.
    One thing I learned by talking with them was that if the Americans would talk fast and throw in a little slang, they could
    not understand what we were saying even though they talked English! So while we were there on this border, the Americans
    weren't sitting on their hands. Every night the Americans would send patrols across the river. We would know about it,
    and they would ask us to shoot machine-gun fire across to keep the enemy from looking around so the Americans could get
    a chance to get down there and look around. Their hope was to pick up a prisoner. They could interrogate the prisoner
    and find out what was going on?
- speaker: Respondent
  text: Yes, I don't know if they ever got a prisoner, but that was their job. Then about a week after we first got to this
    position we crossed the river.
- speaker: Interviewer
  text: This would have been in Holland. Then things get more interesting or more dramatic or a big battle ...
- speaker: Respondent
  text: Everyday was a battle - many, many battles during the day and sometimes at night.
- speaker: Interviewer
  text: How did you react to that stress of having to be constantly alert and on guard?
- speaker: Respondent
  text: It kept you awake. We had no trouble sleeping because we would switch on guards. We had so few men that, instead of
    being on two and off four, we'd split the night up and spend four hours at a crack until 2 o'clock in the morning or so
    whenever it was and then the other group would come on and take the guard until daybreak. You would go back and that would
    be your time to sleep, and you had confidence in your buddies keeping the enemy.
