source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the Service?
- speaker: Respondent
  text: I entered in two phases. I enlisted in 1942 and entered into a teaching project in which I taught some basic electronics.
    Because I had been a ham radio operator since I was thirteen years old, I was qualified to do this. And I was hired by
    Civil Service on a short-term basis in what was called the Electronic Reserve. That was in the spring of 1942.
- speaker: Interviewer
  text: So, you would have been about 25 years of age?
- speaker: Respondent
  text: I guess so.
- speaker: Interviewer
  text: Yes. So were you living in Chicago at that time?
- speaker: Respondent
  text: Yes. I was a married man, recently married, living in Chicago. And I had completed some college classes before going
    to work. And the employment situation then was such that I was considered a desirable employee because of my background
    in electronics. I worked in what were then called radio factories.
- speaker: Interviewer
  text: What high school did you graduate from in Chicago?
- speaker: Respondent
  text: Crane Technical High School.
- speaker: Respondent
  text: My last reunion was about five years ago. And we've suspended them. We had reunions for years and years. I graduated
    in 1935.
- speaker: Interviewer
  text: So your neighborhood, was that on the West Side or—
- speaker: Respondent
  text: Yes, the West Side. My home neighborhood is the Lawndale district which has now been retitled, I guess, North Lawndale.
- speaker: Interviewer
  text: So that would have been like Madison and—
- speaker: Respondent
  text: Well, closer to Douglas Blvd.
- speaker: Interviewer
  text: Douglas Park and—
- speaker: Respondent
  text: Yes. Right near Douglas Park.
- speaker: Interviewer
  text: So you wound up in the Air Force, the Army Air Force?
- speaker: Respondent
  text: Yes. Yes, it was the Signal Corps, which was, in this case, attached to the United States Army Air Force.
- speaker: Interviewer
  text: So when you began your—
- speaker: Respondent
  text: Active duty.
- speaker: Interviewer
  text: Yes. I'm just trying to connect the dots here in my mind. In '42, you were in the civilian Civil Service?
- speaker: Respondent
  text: Yes. I was teaching a class in what today would be called basic electronics.
- speaker: Interviewer
  text: And those students were servicemen in all branches of the Service, or—
- speaker: Respondent
  text: No. They were enlisted in the Electronics Reserve which enabled them to not go into the Army immediately in order
    to undergo training such as mine and further training in Philadelphia at Philco and RCA Signal Corps schools.
- speaker: Interviewer
  text: So you were teaching in Chicago?
- speaker: Respondent
  text: In Chicago, I taught. In Philadelphia, I was a student. And I completed that in the early part of 1943 and was called
    to active duty.
- speaker: Interviewer
  text: By the—by the—
- speaker: Respondent
  text: By the Army.
- speaker: Interviewer
  text: By the Army. So you, it wasn't, for you, it was never a question of I would rather have been in the Navy versus the
    Army?
- speaker: Respondent
  text: No. I made that choice by going in the Enlisted Reserves, which meant I could be categorized for the Signal Corps.
- speaker: Interviewer
  text: And you chose that because of your background in electronics?
- speaker: Respondent
  text: Yes. Ham radio.
- speaker: Interviewer
  text: Ham radio. Did you—did you do well in high school in science courses or—
- speaker: Respondent
  text: Yes, I did. I did. I was in college for one year in a pre-engineering course, but it just wasn't in the cards for
    me to continue with schooling. I had to get a job.
- speaker: Interviewer
  text: Yes. What college was that? Was it—
- speaker: Respondent
  text: Medill Junior College. It had previously been Medill High School and it was in the vicinity of 13th and Ashland. Different
    Chicago than today.
- speaker: Interviewer
  text: So you teach for a while in Chicago. Then they move you to Philadelphia, and you were teaching, oh, you were taking
    courses in Philadelphia?
- speaker: Respondent
  text: Taking courses in more advanced equipment, which was classified as secret equipment. It was the predecessor of radar.
- speaker: Interviewer
  text: That must have been kind of interesting for you.
- speaker: Respondent
  text: Oh, it was.
- speaker: Interviewer
  text: The cutting edge, so to speak, this new development.
- speaker: Respondent
  text: Much newer.
- speaker: Interviewer
  text: Yes. So it was in Philadelphia, is it in Philadelphia then that you were called up to active duty then, or—
- speaker: Respondent
  text: When I left Philadelphia, I came back to Chicago for the express purpose of going into active duty. Not necessarily
    my choice. It was the government's, the Army's plan.
- speaker: Interviewer
  text: So was that the first time you had ever been out of Chicago? Was it when you went to Philadelphia or—
- speaker: Respondent
  text: I don't think so. No. I don't think so. I had been born in New York and had family there. And I guess I had been east
    on a few occasions.
- speaker: Interviewer
  text: So your horizons were probably a little broader than many of the vets?
- speaker: Respondent
  text: Yes. A lot of the guys were neighborhood kids.
- speaker: Respondent
  text: And had never gone out of town at all.
- speaker: Respondent
  text: And you adjusted pretty well to the routine?
- speaker: Respondent
  text: Had no trouble at all.
- speaker: Interviewer
  text: Not trouble at all?
- speaker: Respondent
  text: Not trouble. I was married already by the time I went to Philadelphia.
- speaker: Respondent
  text: So my wife came with me.
- speaker: Interviewer
  text: Oh, so that was less of a hardship then, with your wife with you.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: But then when you were called up to active—then she had to return to Chicago?
- speaker: Respondent
  text: We both returned to Chicago and I took off and went to various places for active training which—
- speaker: Respondent
  text: I will be reading into the record.
- speaker: Interviewer
  text: Yes. I think this is, maybe this is, the time in the interview where we should turn it over fully to you, and if you
    wanted to read your statement here, I think it would—
- speaker: Respondent
  text: It titled this account "NAME, RANK, and SERIAL NUMBER" for the most appropriate reasons. My name is Ralph B. Friedman.
    F-r-i-e-d-m-a-n. I was a tech sergeant in the U.S. Army. And my serial number was 16071394. I was in the 5th Air Force
    in the South West Pacific. And we were the 7th Service Group and the 1098th Signal Company.
- speaker: Respondent
  text: Like most of over ten million veterans who served in World War II, we not only did what we were trained to do, but,
    as soldiers, we did what we were told to do. This will be an account of my outfit's service in 1943, 1944, and 1945 under
    General Douglas MacArthur.
- speaker: Respondent
  text: Our men received their basic training at camps located all over the United States. Many of us were singled out for
    specific aptitudes and sent to Signal Corps schools before being assigned to our unit at Camp Custer in Battle Creek,
    Michigan. We soon shipped to Westfield, Massachusetts, which was near Springfield, for five months of field training.
    Electronic specialists served parts of that time at Bradley Field, Connecticut, and other East Coast airbases, installing
    radio and radar in P-47 planes bound for the South West Pacific.
- speaker: Respondent
  text: In October 1943, we were activated for overseas duty. And on November 1st, we left San Francisco on a former Dutch
    luxury cruise ship, the New Amsterdam, landing on November 15th at the Pacific Ocean port of Wellington, New Zealand.
    We disembarked in wool, olive drab uniforms in that New Zealand warm weather with gas masks, rifles, and other combat
    equipment. We were marched across the peninsula and the city, to a port on the Tasman Sea on the western side where we
    boarded the same ship and pulled up anchor for Australia. In retrospect, it appears that this was our general's way of
    saying "the Yanks are coming."
- speaker: Respondent
  text: At that time, Australia was being attacked by Jap planes from Guadalcanal in the Solomon Islands just east of Papua
    New Guinea. On November 19th, we landed in Sydney, Australia, and moved north by train to Brisbane's Camp Doomben. Our
    radio/radar section was assigned to the airbase to remove the radio and radar equipment we had installed just months before,
    because the Australians used different frequencies.
- speaker: Respondent
  text: We then installed the appropriate IFF, which is Identification Friend or Foe, throughout the remainder of 1943. This
    was important because these P-47s were escorting our bombers striking Guadalcanal.
- speaker: Respondent
  text: In early February 1944, we were moved by plane to Port Moresby, Papua Australian New Guinea, and then flown northwest
    to Saidor to install U.S. aircraft control equipment at the newly captured airstrip. We got our "baptism by fire" by air
    raids every night the moon was out.
- speaker: Respondent
  text: In early May 1944, we boarded an LST, Landing Ship Tank, for what proved to be an uneventful landing at Hollandia,
    Dutch New Guinea, which was considered secure enough to become the South West Pacific headquarters for General MacArthur.
- speaker: Respondent
  text: Once more on May 31st, 1944, we were loaded on an LST, this time as part of an invasion force headed for a Jap stronghold
    on Biak, Dutch New Guinea, part of the Schouten Islands. This was only 900 miles from the Philippines where General MacArthur
    had earlier pledged "I shall return."
- speaker: Respondent
  text: When we arrived on June 6, 1944, that was D-Day in France, we found that the U.S. Infantry was fiercely opposed on
    the beachhead by Japan's tanks. And then from hillside caves above the beach, the Japs had installed long guns on rails,
    zeroed in on the road to the airfield. After firing, the long guns pulled back into the caves like turtles pulling back
    into their shells. The road to the airport was impassable, blocked with wrecked U.S. jeeps and trucks. Our LSTs circled
    offshore, waiting for the infantry to secure a beachhead.
- speaker: Respondent
  text: Our troops on the LSTs were ultimately put down in the surf to unload drums of aviation gas, bombs, and ammo. Although
    we were supposed to carry out technical missions like stringing up telephone lines, setting up air traffic control for
    fighter planes supporting infantry, setting up a Coded Message Center for Air Force Command, repairing and installing
    radio and radar in planes at the airstrip, however, for now, we were just support troops.
- speaker: Respondent
  text: Eventually, our LST, jammed in between others, sprawled on the beach like alligators with gaping jaws, their drop-ramps
    disgorging vehicles, troops, and endless crates of equipment.
- speaker: Respondent
  text: Our first sergeant had a few men drive our trucks ashore, stringing them out along the base of the hills to establish
    a company perimeter, leaving space around the mess sergeant's truck for feeding the troops. The rest of the men unloaded
    until it got dark, when truck lights were banned to avoid giving the Jap bombers an easy target.
- speaker: Respondent
  text: As usual, the first sergeant had things well in hand. He was Regular Army in his early thirties with cold blue eyes
    and a square jaw that didn't invite debate. His carefully clipped speech, however, spoke less of the mud of Infantry or
    the manure of Cavalry than of a headquarters orderly room. As a consequence, some of our "country boys" made snide remarks
    about his sexual orientation, out of his presence. But it was hard to imagine a homosexual Regular Army first sergeant.
- speaker: Respondent
  text: Exhausted that night, men slept in, on, or under the trucks with guards posted along the perimeter. When the Jap bombers
    came over, we ran for an abandoned Jap bomb shelter made of rice bags, dislodging gigantic rats feeding on the rice spilled
    on the ground.
- speaker: Respondent
  text: With the road to the airfield blocked, on the second day, the first sergeant gave assignments to some men on-corns.
    As a staff sergeant at that time, I was given an eight-man squad to go out to the Infantry front lines to relieve some
    men who had had no sleep for a few nights. We were assigned four foxholes, two men to a position as perimeter guards.
- speaker: Respondent
  text: An Infantry corporal showed us how to rig trip wires with tin cans as alarms across paths in from the jungle.
- speaker: Respondent
  text: We were told, when it got dark, we were not to speak, smoke, or get out of the foxholes, even urinate. Above all,
    we were to fire at anything that moved on the paths. When it got dark, with only a part of a moon, it was hard to make
    out anything. Well past midnight on my shift, the tin cans jingled. I could barely make out a dark form wriggling along
    the path to our foxhole. Realizing that the flash from the muzzle of my gun would disclose our position and earn us a
    well tossed grenade in response, I waited for exactly the right moment to fire. Suddenly, I saw the prone figure rise,
    and my finger made the decision for me. I heard a yelp of pain and then nothing. My foxhole partner didn't move or speak,
    but after some time he poked me and mentioned that he would take over. It was a very long night, and I didn't sleep. But
    when the dawn came, so did the corporal. He wanted to see what had happened. After searching the area, he decided that
    the Japs had sent a scout dog down the path to probe the perimeter. Since they always retrieved their dead and wounded,
    we would never know. He patted me on the shoulder indulgently and said, "You did good, Sergeant." When the rested men
    returned to the forward position, then we were free to return to our own company.
- speaker: Respondent
  text: 'It was still early in the day and we were surprised to find the company gathered in an area near the beach where
    large coral rocks formed a natural seating area for the men. Note: the following incident which occurred on the beachhead
    on the previous night when my squad was away on Infantry assistance consists of third-party testimony when we were not
    present. Therefore, the names have been changed in the interest of fairness. HOWEVER, THIS INCIDENT DID OCCUR AS REPORTED
    IN OUR PRESENCE.'
- speaker: Respondent
  text: The previous night brought Jap bombers on a northern run while most of the company was asleep. "Old Man Staley" was
    awakened and got up for piss-call. Moving away from where the others were sleeping to the nearest palm tree at the foot
    of the hill just inside the company perimeter, he was startled by loose stones tumbling down the slope. So he froze behind
    the palm. Though it was a dark night, he could recognize First Sergeant Maihoff (but not his companion) emerging from
    the vegetation. That morning, when he told the story to his buddies, it spread through the company and was picked up by
    Tech Sergeant Kelley who rounded up other non-corns. They decided that the commanding officer should hear about it "for
    the good of the outfit." However, the c.o. would just happen by and learn details without taking part.
- speaker: Respondent
  text: When the meeting assembled, I noticed that the first sergeant was not present. Kelley stood up and said, "There are
    times when everybody has to pull together. This is not a time at time for personal feelings or desires. You may have heard
    rumors about the first sergeant in the past. This is different. Breaching our perimeter at night under combat conditions
    endangered the Company. The person who did that should not be in charge. Since we don't get to vote in this man's army,
    all we can do is bring out the facts."
- speaker: Respondent
  text: Kelley then asked "Old Man Staley" to tell what he saw. Staley stuck strictly to the facts and offered no conclusions.
    Others, however, eagerly told of past incidents involving the first sergeant in allegations of homosexuality. Not one
    word was said in his defense or, for that matter, about the alleged companion. As if on cue, a tropical rainstorm blew
    in from the ocean and the meeting broke up, since there was really nothing more to say.
- speaker: Respondent
  text: When the storm ended, the men returned to unloading LSTs. That afternoon, when they got back, they were told the first
    sergeant was on sick leave and that Master Sergeant McCoy was acting first sergeant.
- speaker: Respondent
  text: The next day our P-47s, power dive-bombed the mouths of the hillside caves with aviation gas and burnt the enemy out,
    destroying the long guns. The road to the airfield was now open, and it was time for Signal Corps work.
- speaker: Respondent
  text: Weeks later, McCoy was named First Sergeant. Also, since his Master Sergeant stripes were now open, Tech Sergeant
    Kelley became a Master Sergeant. Ernie Maihoff was being discharged for the good of the Service.
- speaker: Respondent
  text: In July 1944, an airstrip on nearby Owi Island was activated by the Fifth Air Force. And our service group was told
    to provide a radio and radar facility. I headed a six-man detachment with a mobile repair van and were remained there
    through November of 1944.
- speaker: Respondent
  text: We received a commendation for our work and I became a Tech Sergeant.
- speaker: Respondent
  text: On January 17, 1945, we were loaded on a Liberty ship for the invasion of Luzon, Philippine Islands. We landed on
    Subic Bay on February 10th and followed the invasion force as support groups through the mountains to Clark Field and
    Manila.
- speaker: Respondent
  text: Our occupation was peaceful and we got five day passes into Manila. The war was closing in on Japan, and we were shipped
    by LST to Okinawa where the Japs were now reduced to suicide bombings. We were stationed at Naha Airfield on a hillside
    seven miles from Ie Shima, in time to watch the Japanese peace envoys land. We were also in time for the typhoon season
    and endured two, BUT THE WAR WAS OVER.
- speaker: Respondent
  text: On November 20th, as occupation troops, we were shipped to Japan. In Fukuoka, a few of our low-point men helped to
    restore a telephone exchange. But, largely, we huddled around oil drum heating bombed-out factories, waiting for the ride
    home. On the way home, we saw Hiroshima. On December 10th, we boarded a troop ship, U.S.S. General William Weigal, in
    Yokohama, arriving in Tacoma, Washington on December 20th, 1945.
