turns:
- speaker: Interviewer
  text: So, I don't know if you want to start out with how you entered the military or if you wanted to talk about what you
    think about it?
- speaker: Respondent
  text: Well, in these--in this little brief that I am going to give you, I've written, I was going through Wharton School
    of Accounting and Finance. And, of course, I lost my job. And I came from a big family. I'm number ten in a family of
    eleven. And since I had no recourse but to join the Service, I did that. I know my family didn't want me to, but I did.
    I enlisted at Philadelphia in September. I can't remember the date, but it's in the writing that I'm going to give you.
    It says the 26th, 1940.
- speaker: Interviewer
  text: Right. Right.
- speaker: Respondent
  text: And they sent me to Fort Jackson, South Carolina, right outside of Columbia, South Carolina. And, in those days, we
    lived in tents. They didn't have any barracks in the area, nothing like that. Everything was tents. And I was surprised
    that in the winter months, we had buckets of water in front of the tents for washing, and shaving, and things like that
    and, in the winter months, there was ice in the buckets. So, it was colder than I thought. But, anyway, it was interesting.
    I went through the regular three months activity and training, you know, firing range and then different battlefield operations,
    things of that nature, and then I was assigned to the Service company because I had, when I was in high school I felt
    I may never get a college education, so I took a business course, so I could go to business school. In other words, I
    could write shorthand, type, and things of that nature. So, anyway, they thought I would be good in a Service company.
    So I did a lot of typing and learning about ammunition and things of that nature. Well, they gave me a sergeant's, I was
    only in a month and a half, and I got sergeant's stripes, but
- speaker: Respondent
  text: I wouldn't get sergeant's pay because I wasn't in long enough. I had to be in six months for someone--
- speaker: Respondent
  text: There's--someone is at the door. Hang on. We were at, anyway--so, I had to work, you know, before I got my sergeant's
    pay. And I had a company commander. His name was--it's in the book, and it's in this story, and I can't think of it. I'm
    sorry.
- speaker: Interviewer
  text: That's okay.
- speaker: Respondent
  text: But, anyway, he was a West Point man, very military, he reminded me of General Patton. He was a very good leader.
    The men liked him, which you don't find too often in the military. And, anyway, he took me under his charge, through him
    I really got ahead in the Service. I never expected to, but, anyway, the captain told me to go to First Army Headquarters
    because of my ability. And I went there and came back. And he asked me if I got the position. I said, no, I didn't. So,
    he asked me what I told them, and he made a remark that lives with me to this day. And I've done it. He said, "Don't be
    afraid to tell some lies as long as you can support them with your ability."
- speaker: Respondent
  text: And I never forgot that. And I have done that. Well, anyway--
- speaker: Interviewer
  text: Were you concerned when you joined the Service because the war was going on already in Europe, you know, because we
    weren't in the war, but the war was going on?
- speaker: Respondent
  text: I figured if I got in, I might be able to establish myself fairly well.
- speaker: Respondent
  text: And I didn't even think of war, even though I knew what was going on in Europe. But, anyway, he became, let's say,
    he sponsored me a lot. Well, anyway, I came back and began to work again. And we went on maneuvers in the Carolinas, North
    Carolina, South Carolina, Georgia. And there's some funny things that I think it's best that you read the stuff that I
    give you.
- speaker: Respondent
  text: Because we were pulled out of, 1940, we were pulled out of maneuvers. Now, the Japanese people were negotiating with
    the United States at this time we were pulled out of maneuvers. And any man who was thirty-five years and older was removed
    from our unit. And we got the new recruits from New York and New Jersey. Younger-- Younger men.
- speaker: Interviewer
  text: Were they all--were all the people in your unit from the Northeast or--
- speaker: Respondent
  text: There was some from Tennessee, Kentucky, New Jersey, New York, Pennsylvania. And one Southerner, I think he was from
    Kentucky, we would be standing in line to do something, he would fall asleep leaning against a tree. I never saw anything
    like this in my life! Or some of them would get a shot and they'd faint getting a shot, you know. Some, you know, everybody
    isn't strong, you know, but, anyway--
- speaker: Interviewer
  text: Or awake enough, I guess.
- speaker: Interviewer
  text: We received orders. And it's in the story that I'll give you, and there was a code word, "plum," which we discovered
    later on was Philippine Islands. Now, I was going to the Philippine Islands before Pearl Harbor. Now, we crossed the continent
    in a train, a troop train, went through the Rocky Mountains. We stopped there awhile playing with snowballs and things
    like that. Then we got to the city of San Francisco. There, we started to get ready to go abroad. In other words, we were
    loading the ship with our equipment, guns, trucks, and whatever we were going to take. And we were going on a Matson liner
    which was a, had a beautiful American flag on it, and, you know, it wasn't a troop ship. It was a tourist ship. And, then,
    December the i\the troops were already on the ship. And I was told to stay behind and check, make sure that nothing was
    left behind, that it was clean, things of that nature. So, as we were--I was checking everything, one of my friends ran
    up to me. He says, "Al, Pearl Harbor's being bombed!" And I said, "Oh, one of Orson Welles's shows." I remember his show
    on radio that, you know,
- speaker: Respondent
  text: Yeah, "The War of the Worlds" that the Martians were attacking New Jersey and, so, I, you know, I laughed it off.
    He says, "No, really!" I said, "Okay, I'll come down." And we had a portable radio in another section of the barracks.
    So, I went down there, and I could hear the bombs, and everything else, and the announcer saying the United States is
    under attack by the Japanese Navy. And then I got word from the ship that we were--men were coming back to the barracks
    with just their regular stuff. The ship was going to stay and be painted battleship gray, whatever they did. So, we were
    there a week. And we boarded the ship and, of course, on the ship were some 37 caliber guns, and fifty machine guns mounted
    on the decks, and things, of course, like that for our defense. And, of course, I often wonder with 37 mm what would do
    - probably couldn't sink anything!
- speaker: Respondent
  text: And, so, we set sail. I can't remember the date but, anyway, it was a week, a week and a half, after Pearl Harbor.
    And we were accompanied by six destroyers. We arrived at the Hawaiian Islands. And we docked in the Honolulu Harbor, Oahu,
    they had the towers and things like that. All the troops left the ship. I had to stay on to check things that were being
    sent to other barracks and all, Schofield Barracks, wherever we were going to be put. So, I didn't see anything yet. And
    it was very tense, because we were there just a few days before Christmas, a week before Christmas, and--
- speaker: Interviewer
  text: You must have crossed fairly quickly.
- speaker: Respondent
  text: Oh, yeah. I think it was just about four or five days we crossed. And, so then I, after all the loading was done,
    I got orders to go to Schofield Barracks. And I got there. We had a jeep so, as we were traveling, we could see there
    were no homes bombed or any downtown bombings in the Hawaiian Islands in Honolulu. Everything was military. So, as we
    were approaching Hickham Field and Pearl Harbor, you could see the horrible destruction of the hangers, and the planes,
    and the ships. We saw the Arizona sunk, and some other ships were laying on their sides. And it was just a horrible experience.
    And then we got into Schofield Barracks and, of course, my company wasn't there yet. They were in another area of the
    island of Oahu. We were on the island of Oahu. That's where Honolulu is. And, so, we hadn't eaten, so we were scrounging
    around looking to see if there was a kitchen open. We found one, and the cook was there. He was waiting for some people,
    for some of his unit to come in. And we didn't have anything to eat, so he made us grilled cheese sandwiches on the hot
    plate of the stove. It was good. And that was our meal. And then, soon, the troops arrived with all their equipment. Honolulu
    was not lit up after that. It was very dark. The barracks were open, because it was so warm, and there were just screens,
    so you had to be in total darkness. The lights were not put on in the night at all.
- speaker: Respondent
  text: And it was near Christmas time, so I thought I'd play a joke on some of my friends in the unit. I found an old, some
    old stockings back in a junkyard and hung them on the end of their cots, so when they woke up in the morning they saw
    them. But, anyway, our Christmas dinner consisted of, it looked like spam, and rice. It looked like spam! And rice, and
    that's about all, and, of course, bread.
- speaker: Interviewer
  text: Oh, very festive.
- speaker: Respondent
  text: Yeah. And, of course, the next thing we found out that the barracks were infested with bedbugs!
- speaker: Respondent
  text: What a mess! So, we stripped all the mosquito netting over--your bunk in the corners of the mosquito netting were
    just infested with bedbugs. So, we got all that stuff, soaked it in gasoline, and everything else. And we, everything,
    the beds, were all out in the open, and sprayed, and so forth, so that we could have a comfortable sleep. It's a mess
    how they got. You know, they multiply very rapidly. Very rapidly. Horrible! Well, anyway, that was one incident. And the
    other, we didn't hear from anybody for almost three months, and some of the supplies were coming in, food and stuff like
    that, but one funny incident was happening that I witnessed, and I thought it was pretty clever how these things happened,
    they were bringing beer and some other stuff, and food, and they were putting it in warehouses that were camouflaged and
    hidden in the mountains, so some of these drivers would take a case of beer out and hide it. Well, someone who worked
    in a barracks building or in a shack somewhere saw them putting it there, so they stole it. And, so, the truck driver
    coming back would never find this beer.
- speaker: Respondent
  text: But, anyway, we began to do training after that--what they called it, was really combat training. We would take hikes
    into the mountains of Hawaii. And the volcanic mixture of that island just tears your shoes to nothing! You're walking
    in the mountains on narrow trails, and you have to stick to the trails because down below are hundreds of feet of drops,
    you know. And, often, the clouds would come over and we're walking in clouds because, you know, they're not that high,
    but, you know, the clouds are low. And we would witness some of that stuff.
- speaker: Interviewer
  text: Was it very different? Did you--you were from Pennsylvania? Was it interesting to be someplace just so--
- speaker: Respondent
  text: Oh, yeah. It was different, totally different. The weather was different. It would rain. You'd walk in the rain. It
    didn't matter because, in fifteen or twenty minutes, the sun would be out again. It rains that way in Hawaii so, you know,
    it didn't matter. And, in those days, of course, the pineapple fields were full of the plants. And you could see how they
    picked them. Of course, today they're mechanized. And they also raised a lot of sugar cane. And when they harvested that,
    they would have a track and a small, little engine pulling the cars loaded with the sugar cane to a certain area that
    they would then deliver to the factory. You know, but they never wasted anything because some of the, even from the pineapple
    they would make something, rabbit food and things like that. And so while we were there, I visited, you know, the pineapple
    producing people, pineapple juice and so forth, which was interesting.
- speaker: Respondent
  text: And being--I would like to volunteer for things, so this, my captain, this captain, my commander, asked if I would
    go and be an Army observer on a destroyer. And, so, I agreed, and I went to Pearl Harbor and boarded a destroyer that
    was going out with a lot of recruits that were going for gunnery practice. So we went out, I would say, maybe ten miles
    out into the ocean and then they would bring a silhouette of a ship in the distance, and the recruits then would be firing
    the guns and so forth.
- speaker: Interviewer
  text: Now, were those Navy recruits that were firing or you're--
- speaker: Interviewer
  text: Was there a reason there was Navy, I was--
- speaker: Respondent
  text: Right, you were in the Army.
- speaker: Interviewer
  text: I was an Army observer.
- speaker: Respondent
  text: Yeah, so you were an Army observer on a boat.
- speaker: Respondent
  text: Yeah. On a military boat. It was a good experience. But, I'll tell you, I don't think I could be a good sailor. As
    soon as I went downstairs to eat, uh-uh, no! My stomach said no! So, I came back up and I talked to the captain. I told
    him my problem. I said, "I can't sleep downstairs." He said, "Well, you could sleep on deck. They have a little room.
    It's like a repair shop." He said, "You could stay in there." And I did. And, so, the sailors would bring me the coffee
    and the sandwiches I ate at one time, and bring me to eat--but it was interesting to see the Navy recruits maneuver and
    practice.
- speaker: Interviewer
  text: So what was your, as an Army observer, what was your role? Did you have to report about them?
- speaker: Respondent
  text: Oh, yeah. I told the captain who sent me out there about it, and so forth. They just, I imagine the Navy wanted some
    observers so they could see, you know, how they maneuver because, you know, we maneuver on the ground. Well, they maneuver
    in the sea, too. So, it was a good experience for me.
- speaker: Respondent
  text: But while I was there, we did some other things, too. We hitched a ride on a bomber out of Hickham Field. They were
    going on just a dry run, and I sat in the bubble in the front where just you're like suspended in space.
- speaker: Respondent
  text: You know, the gunner--
- speaker: Respondent
  text: The front gunner had a bubble in front, and there was a bubble in back, so my other friend, one of the other ones
    and I, selected a front one. It was really weird, because you are like suspended in space! And then we, that was one experience
    we had that was over with.
- speaker: Respondent
  text: But we--then we moved from the Schofield Barracks to the National Guard section of the Hawaiian Islands. And it was
    in a little mountain area. The mountains looked very funny. We called it--we nicknamed it. It looked like a pregnant woman.
    And, so, while we were there, these friends that I had from--my companions, my soldier companions, were from New York,
    New Jersey, and some of them were butchers, some of them were from the dead end kid areas. You know, it was a mixture.
    And they were pretty clever kids. So what they did, they went to the--they found where the supply depot was that supplies
    you with ammunition, and food, and so forth. Because we were a Service company, so we had to supply the food, and clothing,
    and all, to the other members of our regiment. So, they stole a portable shack, and we had--they stole it.
- speaker: Respondent
  text: The army steals. I stole, we stole a lot. Anyway, they stole the shack, and they put it up in the mountains, and we
    had our own club there. And you've heard about M*A*S*H, well, this was very similar to M*A*S*H. And, of course, the Italian
    guys, they would know the meat cuts and so forth. And one of them could make spaghetti, so we would have good spaghetti
    dinners and things like that. And they would get the beer and the GI cans, you know, the cans--the GI cans were filled
    with beer. And we just sunned ourselves when we were not working. And we enjoyed ourselves. And then we would--
- speaker: Interviewer
  text: So sort of a supper club resort hut then?
- speaker: Interviewer
  text: Sort of a supper club kind of resort?
- speaker: Respondent
  text: Oh, yeah, yeah, yeah. And, of course, then, motorcycles came in for us. And we were--everybody was trying to ride
    a motorcycle. That was the first time I rode a motorcycle, but I didn't stay on long! You have to be--you have to balance
    it very well. I wasn't a very good balancer. But we would often go to Honolulu. The Moana Hotel, is it, where they broadcast
    "The Banyan Tree Court"? The banyan tree is the kind of tree that will release from its branches to root itself. So we
    were in that court and heard some good music that they were broadcasting to the United States. We went to a lot of Honolulu
    hula-hula dances, but the first affair that we had, about three months after we were there, they told us there was going
    to be a big party, a big show in the triangle in Schofield Barracks. So we came from our area, in the mountainous area
    from where we were at, into the Schofield Barracks. And it was pretty crowded. And it turned out t
