turns:
- speaker: Interviewer
  text: Now, you have a list. Do you want to tell us about it?
- speaker: Respondent
  text: It is just a list of--
- speaker: Interviewer
  text: Swearing-in?
- speaker: Respondent
  text: Swearing-in ceremony, Camp Wallace, Texas, where I was trained.
- speaker: Interviewer
  text: Oh. So, tell me about it.
- speaker: Respondent
  text: I've got all these different things. I don't know if that's too much.
- speaker: Interviewer
  text: No. Not at all. Well, when you went into the Army, you were drafted into the Army?
- speaker: Respondent
  text: I was drafted in '43, January 6th, and the draft board was just a few blocks up from our house on Kedzie Avenue from--not
    too far from Wicker Park. We used to go over to Wicker Park. And I told the doctor, "Who do I have to go to, to make this?"
    I tried to join the Navy, and they rejected me. They said I had a murmur of the heart. And he examined me, and he says,
    "No, your heart's perfect. They'll take you." I said, "They'll take me any which way they want, I guess." So, I went home,
    and the next day, I went downtown to get sworn in at the building. And then, we had a day or two off, and then, we went
    downtown again. We had some--they had to take us to the train station, and then the train station took us to Camp Walton
    in Fort Sheridan, Illinois.
- speaker: Respondent
  text: And it was January, so it was six below zero. We were standing out in line in our long johns and overcoats going to
    chow line. And I figured, that's not quite right! But we're hungry enough. We'll put up with it! So after that, yeah,
    oh--some young kid took it upon himself to be acting sergeant because he wanted to be sergeant. I said, "Okay." And I
    was breaking down in hives for a year or two, dollar size hives all over me. It was a nervous condition. They couldn't
    find I was allergic to anything, so it was a nervous condition. And he says, "Don't worry, kid. You'll go home." But it
    turned out that he was the one who went home, and they kept me!
- speaker: Respondent
  text: So--and from then, we went on, oh, they put us on a truck, took us to the train station, and headed for Texas.
- speaker: Respondent
  text: And on our way to Texas, we stopped in North Platte, Nebraska. We all got in line and marched through the town. And
    people there, they were applauding, you know, like, you know, we're the big heroes. And they took us to a big hotel for
    our lunch. And from then, it only took another two days to get to Texas, a desolate spot where nothing grew, and it smelled
    of seashells, real sweet smelling. I guess they filled in the swamp and built a camp right on top of that. But it was
    very interesting.
- speaker: Respondent
  text: They were training me for telephone lineman, climbing up fifty foot poles, you know. And there was a couple of guys
    that were in the business already at home. They were going up and going down. I was--by the time they did that, I was
    still halfway up, getting there!
- speaker: Respondent
  text: So, then, the, well, anyway, then came the time that they were going to ship us out. And I was called in from the
    field for an interview with an officer who--they tried to see if I was fit to go in rangefinder. It was a unit, they could
    pick up a plane and see the range. And they could give it to you, antiaircraft. Well, anyway, nothing came of that.
- speaker: Respondent
  text: We got on a ship, oh, got on a train, went to Chicago for a few hours. We stopped and have--a sergeant assigned a
    couple of guys to watch me. He said, "This guy is from Chicago, so you better watch him. He might want to slip and go
    home." See, and, but, anyway, I loved train riding, so it was perfect.
- speaker: Respondent
  text: And so we ended up going to New York, a place called Camp Shanks, a brand new camp. The ground was a real bright brown.
    It was almost like the ground in Colorado, where my wife is from, and we visit there quite often.
- speaker: Respondent
  text: And we had a lieutenant that was in charge of us. He was in the infantry, but he says, "Don't get excited. I'm in
    the infantry. It doesn't mean you guys are going to be."
- speaker: Respondent
  text: We're, you know, so, but they promised us a three day leave in New York. By the end of the week, the end of the week
    came around, we took off, not for New York, but for the ship docks. And so we were at the dock, three or four hundred
    guys with the same amount of nurses, all waiting to get on this little ship.
- speaker: Respondent
  text: And the name of the ship was Uruguay.
- speaker: Interviewer
  text: Yeah. You gave me a picture.
- speaker: Respondent
  text: Yeah, that ship had a pretty good life. It started in Uruguay as a luxury, a little luxury liner, with maybe about
    three hundred people first class, and about one hundred to two hundred second class. And then it went--shipped to Spain
    for the Spanish-American War. There, it caught fire, and they salvaged it, and sent it back to Uruguay. And it caught
    fire again, and sunk, and they raised it, and there was, in '43, they raised it, and they were going to send it out for
    scrap. Well, that's, see, so we rode on the scrap ship. It was, you know, but it was the smallest ship, but the fastest.
    It could outbeat anything, the submarines, anybody.
- speaker: Respondent
  text: But, because of the slowest ship - we were in a three ship convoy. And, well, we could see the other ships, that the
    bow was going underwater and coming up. I said, "That's what we were doing." You know, we were bobbing like corks.
- speaker: Respondent
  text: And, oh, we had one incident where I slept--it took us thirty-one days from New York to Australia.
- speaker: Interviewer
  text: Oh, my goodness!
- speaker: Respondent
  text: I only slept one day. The rest was always along the railing, like that, a blanket on the bottom. And, when it rained,
    we all ran in for--to get out of the rain. And when it stopped, we all ran back to make sure we got our spot again. It
    was fun. We used to watch the flying fishes zoom from, you know, wave to wave. And, of course, we were spotting to look
    to see if we could see a submarine, or a torpedo, or something like that. We were always visualizing something. And we
    had good meals on it. The Navy fed us good!
- speaker: Interviewer
  text: Yeah? What do you remember eating?
- speaker: Respondent
  text: It was mostly pork and beans. Oh, one time, some of the guys got sick. We had scrambled eggs and green peas, and when
    they saw that, they wanted to barf. And that was terrific. They go down the hole and stand up table. And I got to my side,
    and one guy passed a porthole about that time. Some water comes shooting through like a water gun and knocked the tray
    out of his hand.
- speaker: Respondent
  text: So, there was a little excitement here and there. I pulled guard duty that one night next to a fifty caliber which
    I never fired. And it was so dark, I couldn't see it, and I couldn't see the ship, or nothing. So I says, "We're just
    here for nothing, but it's our turn to pull guard duty."
- speaker: Respondent
  text: So when we landed in Bora Bora, for a couple of days, I think we had trouble. One of the ships had trouble. So, they
    had some welding to be done, and we saw a column of smoke not too far from us. There was damage that was inflicted by
    the Japanese, or something. They got in the game, and put a strike on us, and burned up a few accessories, I guess.
- speaker: Respondent
  text: So, we went on, and hit, went to New Zealand. There was one going there, and we dropped off some troops, and continued
    to Australia. And that's where we had our home for about three months or so, four months, and they put us in the middle
    of a racetrack called Camp Ascot Casualty Replacement Depot. But I never registered "casualty replacement." It was just
    a replacement, you know. We were too dumb, too excited with all the things going on.
- speaker: Respondent
  text: 'And, finally, oh, I met a fellow there, with his chow. I worked with him in Wieboldt''s Store. And my first job,
    I got in the stockroom, and he worked up there. And I told my bosses, "I''m not satisfied with this job." There happened
    to be a vacancy in the camera department on the first floor just for one man. And for me, that''s great, because I was
    nuts about photography. And I forget the word, black tie, white shirt. And I was there - well, that was near the end of
    the year of ''41 when December 7th broke out, and some of the boys I met in New Guinea had been in peacetime for one year.
    They were allowed to go one year, and they were ready to come out when Pearl Harbor broke out. So, they got stuck, so
    they spent maybe four or five years where I only spent three years. And from, well, we''d been in it for there on--that''s
    when we, I tried to get in the Navy a number of times. One time: "So, you''ve got a curvature of the back." So, I was
    in school, and that''s from riding a bike. You ride on one foot, and your back is twisted. So, I took calisthenics, and
    got that corrected. Well, then, they say, "You''re too young." I was seventeen. And I said, "Okay." I wanted to get into
    the Navy Reserve, out in Glenview.'
- speaker: Interviewer
  text: So, that was in 1939, 1940?
- speaker: Respondent
  text: And, oh, when I went to Glenview to get into the Reserve there, they said, "Yeah, we can use a couple of guys. My
    boys and I, we pedal out to Dundee, what is it, about twenty-five miles from us. We could use a guy to drive a miniature
    gas truck." You know, to gas up the planes. I didn't know how to drive. What the heck! And then we decided to try to sign
    up for the Navy there.
- speaker: Respondent
  text: And he'd take out the information. Then he says, "How old are you?" I says, "Seventeen." He said, "You got to be eighteen,"
    he says. Okay, missed it again. But after work there, that would be a long job to pedal your bike, so we figured, okay,
    we'd be making maybe three dollars a week, twenty-five would go for the room and board.
- speaker: Respondent
  text: And you have whatever left, or whatever, so we gave that up and decided to stay in school. I was on the track team
    for a while, and there was one fellow, that his grades were bad, mine were good, as dumb as I was. But he says, "Come
    on, John, let's go and join the Navy." I'd love to, but I don't want to quit my third year, you know, end of second going
    on third, and he said, "I'll go." Okay, he went, and during the year, we found out his ship was one of the first ships
    destroyed. It was sunk in the Atlantic when we were convoying ships, you know, cargo ships to England, and stuff, and--
- speaker: Respondent
  text: So, if I had gone with him, who knows, I could have been lucky enough to be with him. I wouldn't be here.
- speaker: Interviewer
  text: You wouldn't be here!
- speaker: Respondent
  text: Yeah, so it's, well, after we got to Australia, Australia was real--have you ever been to Australia? Nice people and,
    of course, I had to impress those girls, of course, but nice people. The towns looked like here, each way we were in the
    States, except if you looked at their trains narrow gauge, real small. And then they had aborigines living in different
    houses, you know. They'd be out in the country. Coming off the ship, you know, and, so, we finally got shipped.
- speaker: Respondent
  text: We were going to New Guinea. We landed on Goodenough Island, nicest island you'd ever want. No mosquitoes around.
    We had mosquito netting, you know, on our bunks. And, oh, so, alright, before, as we were coming to it, the captain didn't
    know where we were supposed to go. "Well, here, pick this island. Let's park it here." So, we unloaded, I figured maybe
    we had about, well, maybe one hundred fifty guys that came out and just stood in a bunch. Our captain from each end of
    the island came in. They split us in half. This bunch went with one boat. A Battery went with this guy, and B Battery
    went with the other. So, we ended up, and found out that they were a searchlight, sound locator searchlight battalion,
    and they also had a radar, which was an old radar, but it was new to them. So, they gave us a Cook's tour. They gave us
    a chance to pick what we wanted to get into. And I said, "Hey, I'll try the radar. That sounds good." So, it was good.
    You were able to tell where the planes were way before anyone else, you know. That was--
- speaker: Respondent
  text: And, so, we went. Headquarters was just a few blocks from the airstrip, and so we went up to maybe a mile up the hill,
    and they didn't have any place for us to sleep. So, we had our--not the hammock, later on we got that.
- speaker: Interviewer
  text: Like a cot.
- speaker: Respondent
  text: Yeah, the cots, you know. They set us upright next to this--it's a power plant that powers the radar, a four cylinder,
    no muffler, so you could hear it.
- speaker: Respondent
  text: You could hear the--so, we're sleeping, you know, these guys, they've got a lot of brains. They're trying to get us
    deaf, so we don't hear nothing!
- speaker: Respondent
  text: But as we slept, when the engine was starting to get out of gas, when it ran out of gas, we all woke up. So, we got
    reversed. The noise didn't bother us, but the quiet did. So, anyway, we finally got a chance to build a platform and put
    up our tent. And we acquired a white cat, we called her Alice, our mascot. She had seven kittens. And there were seven
    different units, so we gave each a cat. So, that accounts for our nine lives that we had in there, and--but we were situated,
    we could look right down at the airstrip which was just a few blocks away, you know. If it was a mile, it didn't seem
    like it was a mile. We could see the planes taking off and landing.
- speaker: Respondent
  text: And at one time, one plane had a, I think, a torpedo on it, but it wasn't secured. And as it took off, it fell off.
    And it, you know, went sky high, so--
- speaker: Respondent
  text: That, you know, that was our excitement. Or the other would be where we'd go down in our truck to go to eat, and we
    passed the end of a runway, and just as we passed it, some plane came through, and you could hear it, like a pop, and
    it would go pop, pop, pop, and it was strafing the field. And if we would have been there, it would have got us. Well,
    it turned out to be a Japanese plane, see, a Zero.
- speaker: Respondent
  text: So, and in turn, we had one of the P-40 pilots, they did the same thing. They took off and went to the Japanese farther
    up, landed, waved to the patrol guys, and shot them up, and then went home.
- speaker: Respondent
  text: So we stayed. Okay, then, we figured, okay, we're going to make the move to the big island of New Guinea. We went
    to Sadur. The Navy, the day before, shelled the stuffings out of it, and the palm trees were hanging all over. And about
    that time they gave us jungle equipment, jungle boots that you could strap up almost halfway up to your knee, and different
    clothing, and stuff.
- speaker: Respondent
  text: So a hammock. The best time you ever want to sleep is in a hammock, if it is set up, if you don't fall over and break
    your neck.
- speaker: Respondent
  text: The guys, they'd fall over, and go right through, and break their nets. And I ended up getting, I salvaged one hammock
    that split the top, it was a rubberized [?], and I made an extension on mine, so I could have it low, I could have it
    high, and still the wind would take it, and it would be like a sailboat, like a sail.
- speaker: Respondent
  text: So, anyway, we got into Sadur, and the captain, he was a nice guy. He was from New York, but I was from Chicago. I
    was Italian. And I guess maybe he didn't like Italians. Or, maybe, well, there was the time when we got into Manila. We
    had a volleyball game. They set up a ball, and I whacked one right off his bald head. Boom, you know! And I think maybe
    he didn't like me for that reason.
- speaker: Interviewer
  text: Maybe. Maybe.
- speaker: Respondent
  text: 'Maybe. Well, that''s why I never made sergeant. See, I just stayed corporal, which was a good place, because: They
    don''t tell me anything. I don''t tell them nothing.'
- speaker: Respondent
  text: The jungle was something to think about. All these big trees with big roots that were sticking up around. They were
    like sails in a way.
- speaker: Respondent
  text: And I met a lot of natives. The women were ugly. Some of them, I guess, worked like crazy for the big shot men. See,
    they wore headdresses.
- speaker: Respondent
  text: And, oh, I was, we pulled into headquarters, and after a while, they said, "Oh, we're going to have to move you someplace
    else. Now, we've got enough here." So, we folded up our equipment, went down into headquarters, and this was Christmas
    of '43. I was going to pull guard duty about five in the morning, and, just as I was going to pull guard duty, there was
    a ninety millimeter outfit that came, antiaircraft. They had what they called a regular which shoots three rounds, boom,
    boom, boom, you know. And they knew that planes were coming, so we had dug a slit trench the year before, and some of
    the at our headquarters were saying, "I can hear the bomb bay's doors opening!" We could hear the motor roaring. And he
    says, "I hear them!" So, anyway, we all dive into the slit trench--I got my face in the corner, and when the bomb exploded,
    I guess it was the type where it exploded, it could have been fifty feet or so above the ground. And it would throw antipersonnel,
    one foot long antipersonnel bombs, maybe an inch or so and thick, and they would sound like rockets. And every time they
    hit the ground, they exploded. And the dirt would hit our faces, you know. They were circling around us for an hour, and
    they couldn't quite spot us. And then, finally, when they, so when they were through, we found out that they hit us maybe
    ten feet away from our equipment, from our slit trench. Because of the clouds.
- speaker: Respondent
  text: And, usually, most guys are souvenir hunters, you know. "Let's see if we can find some fins of these things," you
    know. Here's a big hole like that they made. I said, "Oh, here's a hole. I can feel a fin." My buddy, I think he probably
    saved my life. He says, "DeCecco, get your sticky fingers off there!" He said, "That's a live one!" So, we put a little
    sticker like a flag and told the demolition squads, y
