collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the Service?
- speaker: Respondent
  text: I was inducted July 7th, 1941. It was five months before D-Day, or rather Pearl Harbor.
- speaker: Interviewer
  text: Were you drafted, or no?
- speaker: Respondent
  text: I was drafted.
- speaker: Respondent
  text: Yes. I had that letter from our president that said "Greetings" And that was it.
- speaker: Interviewer
  text: So you actually were drafted before Pearl Harbor?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Were you in school at that time?
- speaker: Respondent
  text: No. I was working at a drug company in the city of Chicago. And I thought when I was drafted that they would send
    me to the medics. When my shipping orders came through, they were going to send me to Fort Riley, Kansas, which, at that
    time, was a second cavalry, a horse outfit. And I'm looking at it, born and raised in Chicago, what do I know about a
    horse? So I went down to the recruiting officer to get a discharge and a three year enlistment with the Air Force.
- speaker: Interviewer
  text: You were able to do that at that time?
- speaker: Respondent
  text: At that time, I could do it, yes.
- speaker: Interviewer
  text: So how did everybody in the family feel about your being in--were they worried?
- speaker: Respondent
  text: When I told my dad I enlisted, he went right through the ceiling, you know, screaming that I'd be out in a year's
    time.
- speaker: Interviewer
  text: I said, "Pa, there will be a war before my year is over." You knew that?
- speaker: Respondent
  text: I just felt it. I just felt that we would be pulled into it. And six months later--
- speaker: Interviewer
  text: Where did you go to high school, if I may ask?
- speaker: Respondent
  text: I went to Crane Tech.
- speaker: Interviewer
  text: So you were on the West Side then?
- speaker: Respondent
  text: Yes. I was on the West Side.
- speaker: Interviewer
  text: Lawndale, or?
- speaker: Respondent
  text: In that area.
- speaker: Respondent
  text: I am one of those that, like my weight fell through the cracks, I never completed grammar school or, rather, never
    graduated from grammar school. At the time, I was going to attend grammar school, which was a six-grade school. In the
    sixth grade, I went to Herzl for junior high school. I was in ninth grade when they closed the junior high school, so
    I went right on to Crane, and I graduated there in 1936.
- speaker: Interviewer
  text: So, I enlisted in the Air Force. And what--any reason why you chose the Air Force, say, perhaps and not the Navy?
- speaker: Respondent
  text: Yes, well, I was already in Service, and they discharged me from the cavalry so I could go into the Air Force.
- speaker: Interviewer
  text: You were still in the Army, by going from the cavalry to the Air Corps, Yes.
- speaker: Respondent
  text: Yes. I just thought that the Air Corps was a better branch.
- speaker: Interviewer
  text: So were you living at home at that time then?
- speaker: Interviewer
  text: From Fort Sheridan, they sent me to Jefferson Barracks, Saint Louis, for basic training. How did you find basic training?
- speaker: Respondent
  text: It was a farce. The Air Force had just taken over the base, and every week there was another row of tents going up,
    and all we did was march from the tent area to the mess hall and back, three times a day, and that was basic for six weeks.
- speaker: Interviewer
  text: I suppose basic training changed when the war came in earnest?
- speaker: Respondent
  text: I believe it did.
- speaker: Respondent
  text: As far as I was concerned, I had never handled a weapon, never drilled, or went on these twenty-five mile hikes, or
    anything like that.
- speaker: Interviewer
  text: But you must have been in pretty good shape at the time, though?
- speaker: Respondent
  text: Yes. Oh, yes, I was in good physical shape.
- speaker: Respondent
  text: From there from Jefferson Barracks, we went to Chinook Field for airplane mechanics.
- speaker: Interviewer
  text: That's here in Illinois, isn't it?
- speaker: Respondent
  text: Yes. Right near Champaign. We, let's see, we completed our schooling in January, February of '42, and, from there,
    I was sent to Greenville, Mississippi, which was a basic training base for cadets. There, I became an instructor at the
    school in, let's see, it might have been August of '42. My wife came down, and we got married. And next year I was transferred.
- speaker: Interviewer
  text: So, if it weren't for the war, you might have gotten married later?
- speaker: Interviewer
  text: Actually, if I had never volunteered for gunnery school, I probably would have spent the entire time in service down
    in Mississippi.
- speaker: Respondent
  text: Instructing?
- speaker: Interviewer
  text: Yes, or, later I was transferred to Greenwood, Mississippi. I became, on this one squadron, the mechanic on the cable
    controls of the planes, which were B-13As.
- speaker: Respondent
  text: B-13s. So why did you volunteer for gunnery school?
- speaker: Interviewer
  text: It sounded good! They made it look so enticing. You got wings. You got the extra pay.
- speaker: Respondent
  text: You got the additional stripes.
- speaker: Interviewer
  text: Was that a decision that you discussed with your family or your wife?
- speaker: Respondent
  text: Just my wife.
- speaker: Interviewer
  text: And what did she think?
- speaker: Respondent
  text: She didn't know any differently. It sounded good to her, too. So I volunteered for it, took another physical, and
    passed it in Greenwood, Mississippi. Beginning of June, I was sent to Fort Myers, Florida, for gunnery school. We were
    there for six weeks. When we completed our schooling, and, then, let's see, we were put on a troop train and sent out
    to our next phase of our training. We were sent to Salt Lake City, Utah. There, we were either sent to B-24, B-17 training.
- speaker: Interviewer
  text: So, at this time, you're a--you have a stripe. What was your?
- speaker: Respondent
  text: I was still a buck sergeant.
- speaker: Interviewer
  text: A sergeant.
- speaker: Respondent
  text: And I never got that stripe.
- speaker: Interviewer
  text: And then was your wife, did she travel around the country with you at certain times?
- speaker: Respondent
  text: Most of the places, yes.
- speaker: Interviewer
  text: Did they have like an enlisted men's family quarters, or something, or--?
- speaker: Respondent
  text: No. We lived on base when she was there, whatever camp I was at.
- speaker: Interviewer
  text: So you had to find lodgings for her? and pay for it out of your Army pay.
- speaker: Respondent
  text: Yes. That's right.
- speaker: Interviewer
  text: At Fort Myers, Florida, let's see, Yes, we finished our schooling there. And from there, we went to Salt Lake City,
    Boise, Idaho, where we were put on crews. That's where I wound up with my crew that we have in my album. We were sent
    to Casper, Wyoming, for phase training. We were part of what they called the Cecil Isbell Group.
- speaker: Respondent
  text: He was a colonel. He was a big football player with the Army.
- speaker: Interviewer
  text: While we were at Wyoming, my wife came out there. We were together during our training. When we completed our training,
    she went home. Our crew was sent to Topeka, Kansas, where we were supposed to pick up our own plane to fly overseas. But
    being part of the crazy setup in the Army, they only had 17s on that base. So they split our crew up where half went on
    one plane and half on the other, and the Army transport command flew us overseas.
- speaker: Respondent
  text: So you go overseas, I think you mentioned you arrive in England around November of '43?
- speaker: Respondent
  text: And you had enlisted in June or July of '41.
- speaker: Respondent
  text: So that's two years later, then?
- speaker: Respondent
  text: So you'd seen a good bit of the country by then?
- speaker: Respondent
  text: And probably met a lot of different people than you'd, perhaps, had met before?
- speaker: Interviewer
  text: Yes, from all over.
- speaker: Respondent
  text: From Topeka, Kansas, we flew to Syracuse, New York, Presque Isle, Maine, and then up to Gander Lake, Newfoundland.
    And then we jumped overseas, flew over, landed in Prestwick, Scotland. We got there, I don't know the exact date, it was
    just before Thanksgiving of '43.
- speaker: Interviewer
  text: And then how did you all feel about going overseas, getting into the action?
- speaker: Respondent
  text: We didn't know. We had absolutely no idea of what we were getting into. And it was all so new, being in a foreign
    country all of a sudden. And foreign money, and things were so different.
- speaker: Interviewer
  text: From Scotland, they sent us to a base called Tring, "T -r -i -n -g," maybe an hour's train ride north of London. And
    then we were replacement crews. As different bases needed more crews, we were sent to different bases. Our crew was sent
    to the 448th Bomb Group. And we replaced a crew that was shot down. And we went into operation, let's see, first mission
    right there.
- speaker: Respondent
  text: 'Yes, it''s great to have this album. We can just check out, Mission # 1, February the 5th, 1944.'
- speaker: Interviewer
  text: That's was our-- Tour of France. You write here, "I was very nervous on my first mission."
- speaker: Respondent
  text: Yes. We were scared. We got an idea of some of the things that we were getting into, and we started to realize what
    was going on.
- speaker: Interviewer
  text: And on that very first mission, you were attacked by a Focke-Wulf 190?
- speaker: Respondent
  text: Yes. It hit the plane in the wing position with us. It was the Mary Michelle. We later flew that plane on a mission.
    And that was the week that I, just when that plane came back from being rebuilt, we flew it on its first mission. And
    it never flew combat again for the simple reason it was burning too much gas, so they just took that plane out of service.
- speaker: Interviewer
  text: So when you came back from that first mission, that must have been a, oh, man, what do we get into now!
- speaker: Respondent
  text: Right. But being trained, this was what we were going to do, and that's what we were going to do, and we did it!
- speaker: Interviewer
  text: So you were part of the 8th Air Force?
- speaker: Respondent
  text: Yes. The 184th Bomb Group was part of the 8th Air Force.
- speaker: Interviewer
  text: And the 8th Air Force is famous for all this strategic bombing over German assets in Europe?
- speaker: Respondent
  text: Yes, you can see from my album that we hit a lot of bases in Germany. Airfields, good lot of parts factories, wherever
    they sent us, that's where we went.
- speaker: Interviewer
  text: So did you have any casualties in your unit, in your crew?
- speaker: Respondent
  text: No we were the "most luckiest crew" on the field. We were the only crew that started and finished as a full crew without
    anybody getting a Purple Heart.
- speaker: Interviewer
  text: And why was that, do you think, it really was just luck?
- speaker: Respondent
  text: God had his hand on our shoulder, because there wasn't a mission that we went on there, we came back with holes all
    over the plane from antiaircraft attacks.
- speaker: Interviewer
  text: So, even though you were a talented crew, and skilled, it still was beyond, circumstances were beyond the ability
    to be controlled.
- speaker: Interviewer
  text: There were a few missions that I can recall, I don't remember the exact sequence, but the one mission, they had a,
    our plane, we were flying out our wing position, they had us boxed in with the antiaircraft, and, suddenly, the other
    wing gunner screamed out, "Hey, look!" And there, one shot on--each ship was shot down which--we had our commanding officer
    in it.
- speaker: Respondent
  text: Did they all die then?
- speaker: Interviewer
  text: No, if I recall, we counted four or five chutes, and the others went with the plane.
- speaker: Respondent
  text: So that meant they lost three men then or--
- speaker: Interviewer
  text: No. They lost five.
- speaker: Respondent
  text: Five. Ten people in the crew, I see.
- speaker: Respondent
  text: Now, when you were on these missions, you had a harness that you'd attach the parachute to?
- speaker: Respondent
  text: And on the harness, there was something?
- speaker: Interviewer
  text: On the harness, you had two little packs. One pack was, we called it an escape kit. It carried a map of Germany and
    France, German money, and French money, in case you bailed out and were fortunate enough not to get captured. The other
    packet was with morphine and other medication in case you got wounded and used it until you got back to the base. One
    other mission we went on, the only time we went on three-ship formations, we went after what we called the ski sites or
    the launching pads of the V-2 rockets.
- speaker: Interviewer
  text: Our bomb run started out in the Atlantic Ocean. We were going to be in France five minutes and then out. And on that
    bomb run, our lead ship was shot down, and we never dropped our bombs. We just kept going and went back to the base with
    the bombs. We weren't going to make a 360 and go back.
- speaker: Respondent
  text: Did you ever have to serve as the lead ship?
- speaker: Interviewer
  text: No. We were never a lead ship. We were always either a wing or the diamond position.
- speaker: Respondent
  text: And we always carried the aerial cameras, so we were always taking the pictures of bombs away, bomb strikes, and then
    whatever we saw on the way in or out that we felt would be interesting to the intelligence, we would take pictures of
    it.
- speaker: Interviewer
  text: So was there a crew member in charge with taking photographs or did the film just run automatically?
- speaker: Respondent
  text: No, it was usually our ball turret gunner that--he would lean out of the back door, hatch door, he would take pictures
    of whatever seemed appropriate.
- speaker: Interviewer
  text: He would hold the camera?
- speaker: Respondent
  text: Yes, just hold the camera out there, and take pictures. I would have to hold him so he wouldn't fall out. And, other
    times, when he was in the ball, I would take pictures out of the waist window.
- speaker: Interviewer
  text: So you were a waist gunner?
- speaker: Respondent
  text: Most of the time.
- speaker: Interviewer
  text: Most of the time, and, also, a tail gunner?
- speaker: Interviewer
  text: And were those like, help me out, what millimeter were those?
- speaker: Respondent
  text: Oh, all the guns were 50 millimeters.
- speaker: Interviewer
  text: 50 millimeters.
- speaker: Respondent
  text: Like two barrels or--
- speaker: Interviewer
  text: No, waist guns were single guns. The tail or the turret guns were twins. Twin 50s. Either the top or ball turret,
    or the nose or tail turret.
- speaker: Respondent
  text: Did it affect your hearing at all, firing the guns?
- speaker: Interviewer
  text: I think so. That's why I've got hearing aids. And I did freeze my cheeks and ears in the cold weather, you know. The
    cuts from the oxygen mask just froze in my cheeks. That's where they came up with that wind chill factor. When they opened
    up the bomb bay, you got that wind going right past.
- speaker: Interviewer
  text: I think we were warmer while we were flying in that extreme cold than we were on the ground because of the clothing
    that we wore!
- speaker: Respondent
  text: So you were--you'd fly a mission, say, today, and you'd have like a day off?
- speaker: Respondent
  text: And then the next day?
- speaker: Respondent
  text: And were you able to--
- speaker: Interviewer
  text: It wasn't for many.
- speaker: Respondent
  text: And were you able to relax, or not really?
- speaker: Interviewer
  text: A certain amount, yes.
- speaker: Respondent
  text: A certain amount.
- speaker: Interviewer
  text: Yes. Most of the time, we'd come back from a mission and just fall into bed and go to sleep.
- speaker: Interviewer
  text: You know, and there was--that part was an idiosyncrasy that somehow it just involved, in mornings, when they woke
    us up for a mission, we'd just get out of bed and get dressed and leave. We'd never make our bed. Our reasoning was if
    we'd made the bed, we'd never come back to it. So, every mission, we never made our bed.
- speaker: Respondent
  text: So you flew the thirty missions, then, from February through maybe the end of May, the beginning of June?
- speaker: Respondent
  text: Just prior, in a way, to D-Day, yes.
- speaker: Interviewer
  text: Four days before D-Day.
- speaker: Respondent
  text: But you had no idea that D-Day was in the offing, no?
- speaker: Interviewer
  text: We had no idea until the night before that there was D-Day coming up. And it was something! We were ready to go. We
    were considered as qualified observers, but they wouldn't let us. They said, "No, you've made your missions. Stay on the
    ground."
- speaker: Respondent
  text: So that was the rule that if you make your thirty missions,
- speaker: Interviewer
  text: Yes you'd completed your required service?
- speaker: Respondent
  text: Your time in combat.
- speaker: Respondent
  text: Actually, when I started, we only were supposed to make twenty-five, but on our eighteenth mission, they, General
    Doolittle, convinced the Surgeon General to increase to an additional five missions.
