turns:
- speaker: Interviewer
  text: The address or something like that?
- speaker: Respondent
  text: Oh, yeah. 7914. No, 7914 North Milwaukee Avenue.
- speaker: Interviewer
  text: Oh, there you are. So now we know where you are. So, you were drafted into the Seabees in the Second World War.
- speaker: Interviewer
  text: Did you get to choose anything or were you drafted in--
- speaker: Respondent
  text: Well, I asked for the Navy, and, as it turns out, I had about three deferments from Teletype Corporation where I worked—and
    for forty-six years total, after all. But they, because I was in the machine shop, running milling department milling
    machines and gear cutters and profile machines and all that, I had been working for this government company that had made
    communications for the military. And that's what Teletype was all about in the early days. And I was, you know, eligible
    for the draft and, because of my job, I had three deferments. And then I got drafted. I went down and asked for the Navy
    and wound up in the Navy Seabees. At the time, I wasn't aware of what the Seabees was exactly. But it was the Navy which,
    as it turns out, I was—I thought I was—they asked, "What is your occupation"—I was a machinist, and I thought I would
    be a machinist in the Navy.
- speaker: Respondent
  text: Well, I wound up in the Seabees in the 18th Special Battalion. And that was a battalion that was geared for loading
    the ships. And we went to Williamsburg, Virginia, in a Seabee camp down there. And then I went, after two months of training
    down there, I went to Providence, Rhode Island. And there, we got hands-on instructions on how to load the ship with running
    winches and cables from one ship to another and being able to take care of—at that time, we were just using canned goods,
    cigarettes, and stuff like that for practice. As it turns out, when we got overseas, well, at that point, we had like
    six weeks of advanced training in Providence, Rhode Island. We went back to Virginia in Norfolk, Virginia, and got aboard
    the USS Knox—for it was like 12,000 guys were on the ship, and we went through the Panama Canal. We zigzagged all through
    the waters going down in that area because they had heard there were German submarines in the area on the Atlantic side.
- speaker: Respondent
  text: So, we went through the Panama Canal, and when you go through the Panama Canal, you get a special pilot that is trained
    by the Panama Canal organization staff. In other words, he is part of the staff, so he's supposed to know what the width
    our boat is—our ship is—this ship, it's not a boat, it's a ship, going through this canal. So what does he do, he, unbeknownst
    to him, apparently, we had a couple of guys fixing the lifeboat on the davits, and these are little arched supports that
    allow the boat to go over the side. Well, there were three or four guys in the boat. And they were actually fixing the
    boat. Only he got too close, and he wrecked the lifeboat. And these guys were jumping into the Panama Canal to save their
    lives, for the pilot didn't realize how close he was to the structures along the canal. So these guys are in the drink,
    you know, and this guy was crunching and crunching and looking at this thing. And this boat is getting all tangled up,
    you know, and, to make a long story short, we stayed overnight there, because we couldn't go any farther into the Pacific
    without having full life preservers and the lifeboats. So, we stayed overnight and we got off the ship for an hour just
    to get off this boat. Of course, on the way, everybody was getting sick, you know. I think I must have just had oranges,
    you know, for the seven days that I was there.
- speaker: Respondent
  text: So, I wound up getting to Hawaii. We saw a few whales out there and stuff like that. I got to Diamond Head. It was
    on my grandfather's birthday, April 23rd. Shakespeare's birthday, too.
- speaker: Respondent
  text: Yeah. As it turns out, it was memorable from that standpoint, but then I found not too long after that, that he had
    passed away, you know.
- speaker: Respondent
  text: But, so, as it turned out, we stayed there and had more training, waiting for some kind of a ship. We didn't know
    what we were—because we were actually on the USS Knox as a transport. So we get over to Hawaii and then we occupy what
    was previously nurses' quarters. They were in Quonset huts, and they gave it to us.
- speaker: Interviewer
  text: What did they do with the nurses?
- speaker: Respondent
  text: They moved them out somewhere, I don't know. But as it turns out, we had six hundred guys in our outfit. And they
    gave us their quarters.
- speaker: Respondent
  text: Now in Hawaii, the thing about a Navy guy is that he wears whites. And the thing that we were allowed to do because
    we were there for like five weeks, I can't remember exactly, but we were allowed to go to Honolulu on liberty. Well, that's
    great, you know, but how do you get there? So, we wind up having to get a ride from the jeep or some other guys going
    there. And we have, in Hawaii, they have all this soil is lava, red lava, so, when we came back from there, we had to
    spend like two days of soaking our whites in the Clorox barrel because they were all red from this dust and all this stuff
    in the car flying down, you know, and getting—
- speaker: Respondent
  text: So, we wind up getting into Honolulu. I went to Waikiki Beach. I went to swim in there. And it was terrible because
    the coral rips your feet apart, you know, and stuff like that. But they did have some nice stuff. It was, next to Waikiki
    Beach, at the time, was the Beachcombers. Well, that's where they had dancing at night with the girls, not the guys, but
    they had girls. And, I think, you paid fifty cents, or something like that, for tickets, or something like that.
- speaker: Interviewer
  text: A terrible price!
- speaker: Respondent
  text: Yeah, it was tough at that time, fifty cents was—you can't even buy a Coke for that now!
- speaker: Respondent
  text: So, we stayed there for a while, went into Honolulu, and it had all these shops for souvenirs and stuff like that
    and then you could take a picture of yourself with a Hawaiian girl, you know, and stuff like that, so.
- speaker: Interviewer
  text: Did you take a picture?
- speaker: Respondent
  text: I think so. I couldn't find it. I don't know what happened to that thing, you know.
- speaker: Interviewer
  text: Give me just a second. Let me pause this one first. Sorry to interrupt—so you have no picture of yourself with a girl.
- speaker: Respondent
  text: No, I just have a picture of myself somewhere.
- speaker: Respondent
  text: Well, that's not bad. Of me and my whites, you know, and my white hat and white suit, you know.
- speaker: Respondent
  text: But—so, we wound up going from there. Our ship was—we were told our ship was out there in Enewetak. That's where they
    had some practices for the atomic bomb, you know. But we didn't go ashore. We were just out there. And we were on a merchant
    ship. And that was our transportation. Merchant ships were our transportation. Getting to our Ritz Carlton was the barge.
    And I have a picture out there, in fact, of this barge. Come to think of it, everybody laughs at it! So do I! Six hundred
    guys on this thing and, fortunately, I was sleeping on the motor deck which is, you know, level with the sea. Guys were
    below us, and then we had another group on top of us, and then we had the officers above that. And when we had a storm
    we had a nice roly-poly barge, you know. And this hotel was really rolling! At sometimes, we thought we were going to
    go over. In fact, all our gear would fall on the next guy, you know. And, well, we got aboard this thing, and it was APL-14.
    That was the Navy name for this thing. They didn't give it a name per se, but they had APL's. They had up to 17 or 19,
    and we had number APL-14, so.
- speaker: Interviewer
  text: What did the APL stand for?
- speaker: Respondent
  text: I think it was something about personnel living or something, you know. It was—but so we wound up going aboard this
    ship, this hotel, and then we went out to Ulithi. It was the largest harbor in the world, a natural harbor, that we wound
    up supplying all these fleets with ammunition.
- speaker: Respondent
  text: We actually moved a hundred ton a night of ammunition. And we worked twelve on and twelve off. And in those twelve
    hours, you had to do your washing, sleep, have any liberty, write letters, and stuff of that nature. That was your twelve.
    And what they would do, they'd come along in a Higgins boat. Now, a Higgins boat was like the first wooden landing—a beach
    landing craft. The front door would flop down, and then they would be on shore, so you had to start out with them. And
    then they came along, and they had an LCM—that's a landing craft mechanism—where tanks were put in there. And they had
    a steel body, and a coxswain, and, as it turns out, they would drive us to the New Jersey. Any ammunition ship, and we
    would load sixteen inch shells, and the powder, and the eight inch shells, and the powder, five inch shells, for anti-aircraft
    guns. And that was our whole thing. We were preparing for Halsey to attack Japan.
- speaker: Respondent
  text: So, we were there from, oh, I'm not quite sure how many days or weeks we were. Then, all of a sudden, I woke one day,
    and here one of the oil tankers that was in the harbor was set ablaze. And the Japanese had come in with six mini subs,
    one-man subs, and they were supposed to have a air attack at the same time. But they got this tanker and blew it up. And
    I could see it out the portal. I could still see it as I stood there. This thing was blazing like heck because these oil
    tankers were the supply of all our Navy ships for fuel. And they went after that, and they were supposed to have this
    attack. But, somehow, the Air Force that, the Japanese Air Force either was intercepted or didn't get in there. But what
    happened, these Japanese subs were so small that they would come in under our battleships, under our cruisers, and they
    would sneak in. And when they opened the nets for our guys, they would be right there. And you see this in the movies.
    It's fact. Six of them came in. I think there was another—one of them was found after this. We were on three days of what
    they call general quarters. And for those three days, our destroyers were sending off depth charges all over. So, the
    guys that were on the bottom—the six, I don't know, we had like two hundred guys down there sleeping. All you get was
    boom boom, like boom boom, of these depth charges! I couldn't sleep, you know, three days of this. So, as it turns out,
    we finally found the end result was that they got—one was beached on the coral, and they got the other five. They sunk
    them, you know, but I don't know if they had got prisoners, nothing like that.
- speaker: Respondent
  text: Another incident at this particular, Ulithi, I was watching a movie one night. So, I was looking out from the movie.
    You won't believe this. I was looking at the movie from the backside. The place was loaded up front. That's why. I'm in
    a little corridor watching this movie. I don't know what the heck it was. It's been so long ago, sixty years or so. But
    as it turns out, I look out, and I see all these airplanes. And they're our airplanes practicing landing on one of our
    aircraft carriers just maybe a mile away. So, I'm watching these guys, you know, and they're coming in one by one. They're
    landing on this thing, you know. There comes another guy and there's another guy. They had about twelve guys coming down
    landing at the aircraft at night, now. This was sundown, is there. And I could see these guys just when they came in.
    They were practicing and then, all of a sudden, I see one guy go on beyond. And here he hit—there was a Japanese plane,
    and he came in and hit the chow hall. And he thought, because it had a tower, that it was a battleship. And he went to
    the chow hall and killed a dozen guys, you know, and himself as well, you know. But he crashed into this building which
    he thought was a battleship. And he knocked off some of our guys and he killed himself at the same time.
- speaker: Respondent
  text: But it—as it turns out, we would load depth charges, for, they were this big in diameter, that would go aboard a plane.
    And they were for Tokyo Harbor and stuff like that. We'd have, oh, fifty caliber machine gun bullets in metal cases. And
    if they were too old, we had to dump them overboard in the ocean. That's because they wouldn't allow those shells that
    came from World War I, say, or were stocked too long that they wouldn't fire—or jam the guy's gun. So we had to dump,
    oh, barges full of that. I mean, barges that—they were, you know, like eight foot high of these metal casings from fifty
    caliber machine gun bullets. And we had to do that, as we were told to do, because they wouldn't take a chance on any
    of this stuff. So, we were in Ulithi for a while. And then we went out to the Philippines, what they call Samar. If you
    look on the map of the Philippines, there will be Samar—Samar. So, they were doing the same thing. It's—all our job was—is
    to move this hundred ton of ammunition or whatever was needed for these guys up front.
- speaker: Interviewer
  text: Did you move it by hand or did you move it—
- speaker: Respondent
  text: Well, my job, whether you want to visualize this, but do you know what a winch operator is?
- speaker: Interviewer
  text: Probably not.
- speaker: Respondent
  text: Well, here's two ships. We're out there at sea bouncing around like any storm or anything that—normal waves could
    go. So, we had one cable from this ship that comes over here and one cable from this ship that comes over here. Now, he's
    got the control of this one and say I got the control of this one and what between us we've got, say, a sixteen inch shell
    or two five hundred pound bombs. And we take it off of this ship and put it over on this ship. And that's what the winch
    operator—
- speaker: Interviewer
  text: In the middle of the sea!
- speaker: Respondent
  text: At sea. And this we did twelve hours on and twelve hours off.
- speaker: Interviewer
  text: Must be very nerve-wracking.
- speaker: Respondent
  text: Oh, I went through—I was a signalman. I was in the hold, and I became a hold boss. And then I was a signalman, and
    then I was a winch operator, so—once they'd feel you had the confidence that they could trust with you, say, a whole skid
    of bombs or detonators or whatever from one ship to the other, then they put you in that job. And I loved that job. It
    was so—you had to coordinate yourself. You had to have coordination with this other guy because you didn't know what he
    was going to do or what the water was going to do to the ship. But they're pretty stable because they're big, you know.
    They could be—Oh, I don't know. Let's say fifty ton or something like that—something really heavy. And they're stable,
    but the water still—we had storms. As an example, we'd be out there in the Pacific. And we'd be bone dry. All of a sudden,
    here comes a hurricane—comes through us and knocks us all around. And we're soaking wet, and five minutes, we're dry.
    And back to work.
- speaker: Respondent
  text: The thing that was very dangerous, we would take Higgins boats that were damaged in the first part of the war and
    send them back to be repaired until they got all these steel ones. And they were landing craft, LCM's. They were just
    fantastic. That was our taxicab. Having a taxicab of an LCM for a whole year on the ocean! I hate the ocean. I don't go
    on cruises.
- speaker: Interviewer
  text: Did you hate the ocean before you started? Did you know?
- speaker: Respondent
  text: A little bit. But I never hated it any more than when I came out. Because I just, although I got over being seasick
    and all that jazz, and I could be on a whaleboat that was—that would pick us up sometimes and we'd have water up to here,
    mind you, we'd have, you know, it was fit for twenty guys.
- speaker: Interviewer
  text: Up to your waist.
- speaker: Respondent
  text: We'd have thirty-six guys in it, you know.
- speaker: Respondent
  text: Because the storm's coming, they'd want to get you back to your ship. So they would load up this little whaleboat,
    you know. And my wristwatch was all salted, you know. I lost it because I got salt on it because I'm trying to hang on
    to this—but the most, then let's see. So, I was in Samar. We were doing the same thing.
- speaker: Respondent
  text: And then we were—I don't know if this is—if I should even print this, kind of off the record on this one, we're, well,
    I should go back. I was—when I was in Providence, Rhode Island, I was a sparring partner for this Indian fellow. And what
    the heck was his name? Wolf was his name. Husky. Full-blooded Indian. So, I'm his sparring partner. And as a fool, I'll
    put it mildly, in Rhode Island, they had a smoker. Well, he's supposed to fight somebody else. So, the other guy doesn't
    show up. So, who do you think was in the ring with this guy? Me! So, I didn't last too long because it was for real, you
    know! As a sparring partner, you just play around. So—but we were pretty good friends and, while we were in Hawaii, I
    should go back and pick this up, we used to play Ping-pong, you know, because we were waiting for our ship, you know,
    and had a lot of time. And this guy, Wolf, went into Honolulu and got tattooed. He had a battleship tattooed to his chest.
- speaker: Respondent
  text: And I can still see this guy moping around outside in agony. "Oh, my chest! My chest!" He had a broad chest. He could
    put a battleship on it. This kid was pretty broad. And he was an Indian—full-blooded Indian. Wolf, I can't remember his
    first name, George or something like that. But, anyway, this guy was in agony! And then they had—they had another guy
    that went there. He had Alice put on his. Alice. And he had a big snake.
- speaker: Interviewer
  text: Oh, like the name Alice.
- speaker: Respondent
  text: Alice. He had Alice. So what happened
- speaker: Interviewer
  text: With a snake.
- speaker: Respondent
  text: With a—Yeah, he had a dagger, and a snake, and then he had Alice across there, you know. Poor Alice! Alice was his
    wife back home. So out on the ocean—and he gets a Dear John. He tried for a whole year to get that bugger off of his arm!
    He didn't want any part of that thing, you know.
