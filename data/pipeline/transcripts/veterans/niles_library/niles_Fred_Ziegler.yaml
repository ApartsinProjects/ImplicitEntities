collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Fred, when did you enter the service?
- speaker: Respondent
  text: September 28, 1950.
- speaker: Interviewer
  text: And at that time you were living in Chicago?
- speaker: Interviewer
  text: Do you recall what you were doing at the time?
- speaker: Respondent
  text: I was working as an auto mechanic.
- speaker: Interviewer
  text: So at that time you would have been almost 22 years of age?
- speaker: Respondent
  text: Correct. I had just gotten engaged two months earlier so it was a surprise when I got the draft notice. It certainly
    wasn't wanted at the time.
- speaker: Interviewer
  text: And the fact that you were engaged didn't cut any ice?
- speaker: Respondent
  text: Not a thing.
- speaker: Interviewer
  text: And if I may ask where you had gone to high school in Chicago?
- speaker: Interviewer
  text: The Lane Tech Indians?
- speaker: Interviewer
  text: A terrific school. You were drafted so you didn't have a choice of service.
- speaker: Interviewer
  text: You were drafted into the US Army.
- speaker: Interviewer
  text: Do you recall where you were inducted?
- speaker: Respondent
  text: Somewhere along Clark Street is where the place was and I am going to say Barry Avenue. There was a 2nd story office
    up there where they wanted us to come into.
- speaker: Interviewer
  text: That would have been North Clark then around Belmont Avenue, maybe a block south?
- speaker: Respondent
  text: Yes, just about.
- speaker: Interviewer
  text: Do you recall what your first days in the Army were like? Was it a big change?
- speaker: Respondent
  text: Not much of anything. We went down there. And we had not gotten to the point where they had an outfit aligned for
    us. So we waited a week; we waited the second week, third week and finally they got a group together. And those guys were
    sent to Colorado. My name being Ziegler I was at the end of the line so I just waited until they got their quota of men
    and they went and I just stayed behind. Two of us stayed behind.
- speaker: Interviewer
  text: You say you were staying behind. You were staying behind at Fort Knox in Kentucky?
- speaker: Interviewer
  text: So you went down there by train?
- speaker: Interviewer
  text: And did you complete your basic training down there?
- speaker: Respondent
  text: Correct. And another outfit was Camp McCoy, Wisconsin. I missed that one too. So apparently they had enough men there
    to start another company for basic training. And then we stayed at Fort Knox for the basic training and later we stayed
    there for the secondary training of, which specialized, which tank was training. I became a tanker.
- speaker: Interviewer
  text: When you say tank, you mean a motorized vehicle?
- speaker: Interviewer
  text: You don't mean a vehicle carrying oil?
- speaker: Interviewer
  text: So the basic training is 6-8 weeks?
- speaker: Interviewer
  text: And then you had the specialized training in the tank, and that also took place at Fort Knox?
- speaker: Respondent
  text: Right, that also was about 8 weeks.
- speaker: Interviewer
  text: That must have been a big base.
- speaker: Respondent
  text: It had been closed after World War II, and they were reopening places because of the war in Korea. They needed soldiers
    and training. We bunked there and everything was old from World War II, you know. We had to be outfitted there with whatever
    we could get at the time.
- speaker: Interviewer
  text: I suppose the equipment was gradually upgraded.
- speaker: Respondent
  text: We went into the winter of 1950 which was pretty cold and we didn't have any field jackets yet. They had to get some
    from somewhere and ship them to Fort Knox so we could have something that was warm.
- speaker: Interviewer
  text: Wow. Was that your first time away from home?
- speaker: Respondent
  text: No, I had been up to Wisconsin several times. I like fishing.
- speaker: Interviewer
  text: Were there any memorable drill instructors?
- speaker: Respondent
  text: Yes! The Platoon Leader we had was actually 17 years old. He joined the army underage and he was a very brusque young
    man, and none of the guys wanted to take it from him because all of us were in our twenties already, but he was good and
    he knew what he was doing.
- speaker: Interviewer
  text: You didn't mind the food?
- speaker: Interviewer
  text: Or the regimen?
- speaker: Interviewer
  text: You were realistic about it.
- speaker: Interviewer
  text: So after basic training you went to another...?
- speaker: Respondent
  text: No, I stayed there again. They never had another assignment again so they assigned to us to the motor pool to drive
    buses. So what we were doing was driving officers to the tank range for their training and then we would pick them up
    and bring them back. And then for another period of time I volunteered to be a KP, primarily, because there was nothing
    to do and you get bored. That lasted about a week or so. Then after that I volunteered for the Post Office. You had to
    forward mail. Everybody was being forwarded all the time. You had a lot mail that had to be sent to the guys that had
    left the camp.
- speaker: Interviewer
  text: When did you depart for Korea then?
- speaker: Respondent
  text: That was somewhere in May of 1951. After we got through this training, we finally got our assignment which was the
    Far East Command. And we got a 30-day leave at that point. We were to go home and leave from Chicago aboard the El Capitan
    to California. That was about the middle of May.
- speaker: Interviewer
  text: So some of the guys in the unit that you went through basic training with, did they go with you?
- speaker: Respondent
  text: Just one, he came to my house in Chicago because we had to leave from Chicago. We went out there together, the two
    of us.
- speaker: Interviewer
  text: In civilian life you had been an automotive mechanic.
- speaker: Interviewer
  text: And so the Army made a good choice?
- speaker: Respondent
  text: Well, we didn't know that at the time. When you go over overseas, you're blank. And once you get to Yokohama, by that
    time they start processing papers, putting everything in order, I don't know what they do. And then from Yokohama we went
    to the Yellow Sea which is on the west side of Korea.
- speaker: Interviewer
  text: Did you make that journey by ship?
- speaker: Interviewer
  text: Did you get sick?
- speaker: Respondent
  text: In the north Pacific we did, yes that was fairly rough weather. The one thing that is difficult is going to the bathroom
    when the ship is going UP and DOWN.
- speaker: Interviewer
  text: Was there anyone going stir-crazy on the ship?
- speaker: Respondent
  text: No, not particularly. It's just boring.
- speaker: Interviewer
  text: Did you play cards or?
- speaker: Interviewer
  text: Then you land in Korea.
- speaker: Respondent
  text: Yes, June 10, Inchon, that was the beachhead several months before. After the Chinese came down and pushed us all
    the way back down to Pusan. Then they had to come back up again. And that's when, I don't know which outfit when, but
    at Inchon they went in and cut across and cut them off more or less and then we started to go back north again.
- speaker: Interviewer
  text: I think that was reckoned to be a brilliant strategic move, on MacArthur's part?
- speaker: Respondent
  text: Very much so the invasion.
- speaker: Interviewer
  text: So you came in at Inchon after the invasion.
- speaker: Interviewer
  text: At this time do you know if you are going to be in a combat role?
- speaker: Respondent
  text: No, we still don't know. We went on a train. We started to go north. We don't know where we are at. You're there and
    you're gone. And at the terminal wherever we ended up at we got on a truck and on the truck we took another trip to wherever
    we were going to engage with our outfit. Once I got there they apparently knew that I had been a mechanic and they assigned
    me to the tank company - the 6th Tank Company, Tank Battalion, is what it was. At that point they dropped me off there
    and the rest of the fellows they probably went on up to Infantry, I stayed with the outfit there and that was it. I was
    there and I stayed there for another seven months.
- speaker: Interviewer
  text: Your one buddy who came up with you to Chicago and went out with you, was he with you at this time too?
- speaker: Respondent
  text: No, he split off somewhere else, never saw him anymore.
- speaker: Interviewer
  text: When did you get promoted to Corporal?
- speaker: Respondent
  text: I got Private First Class there and then I got Corporal in about a month or so. The thing happening was we are replacing
    the original soldiers that were there. As the newcomers came in we would replace one-two, one-two and these were the guys
    who had rank. And as we came we got rank as far as that goes too. I'd say within a period of a month or so we replaced
    all the soldiers that were there to begin with that started the war in Korea. They came from Texas where the 6th Tank
    originated. And the Division was actually out of Hawaii. And just recently there was an article that the 24th was abolished;
    it was broken up- there's no more 24th Division.
- speaker: Respondent
  text: We did what we were supposed to do. We got quite a few commendations from Headquarters because most of the tanks we
    got we got them in and we got them out. We did a lot of work. That was usually down to an area where they send the material
    up from, the base you know. In South Korea when we were still there, if a tank went bad, they would put it on a low-boy
    and they would drive it down to ordnance. And once we got up to North Korea it was all mountains. You couldn't do anything
    with the tanks. It was just too dangerous to go through the mountain passes to get out of there. So we left the tanks
    there and when we needed parts we would strip the tank and use those parts to repair the tank.
- speaker: Interviewer
  text: So at this time you are actually up in what is now North Korea, but the terrain is not as conducive to the use of
    tanks.
- speaker: Respondent
  text: Right, we went to Uijeongbu to begin with and then from there we went to Hwachon Reservoir where the second battle
    was taking place and the third one was Kumwha Valley. That's where we ended up and that was in December of 1951. And that
    was a real cold winter - 25 below zero. We were frozen - period. In that process we stayed there until they had started
    the process of trying to make the 38th Parallel, the separation line, as the negotiating was going on at that time between
    us and the North Koreans and China to try and make that decision.
- speaker: Interviewer
  text: Those tanks were the Sherman T-somethings?
- speaker: Respondent
  text: They had Sherman Tanks, there were two of them, but they were used as tank-retrievers. We had gotten the new ones,
    the M-46s, they were wonderful, really wonderful machines. The thing I always enjoyed was, I didn't do any fighting or
    anything like that, but what they used to do was, they used to have a gyroscope on the gun. In other words, as you went
    up and down on things the gyroscope would keep the gun level to where you were going to fire it at. It could really move
    out, of course, there were not that many places where they could do that. But there was one thing that had happened. This
    was told to me from the guy before when the outfit was down in Pusan perimeter, that was earlier in 1950, they kept the
    tanks on train cars because they had to be moved back and forth, you know, and they were firing off the tank cars at the
    enemy.
- speaker: Respondent
  text: And as they got through with the Inchon Invasion, they could move off and they moved them north, facing the North
    Koreans and the Chinese.
- speaker: Interviewer
  text: If you were working on automobiles, then it wasn't difficult to transfer to working on tanks?
- speaker: Respondent
  text: 'It is a little different. It is called "bull work." Everything was heavy. Everything was heavy. To pull a tank engine
    out of that, which was what we had to do, we had to separate it. If a transmission was bad, we had to put in a new transmission
    because we couldn''t send the tank down to ordnance. They sent the transmission up there and we used to separate them
    from back. That was way beyond what our nomenclature was supposed to be. Ours was supposed to be: start them, clean the
    battery terminals, things like that. My particular job was adjusting the junction boxes inside the tank floor. It was
    a little Joe, a small 10 horsepower engine, plus the other one, I think it was a 1300 horsepower, it was a 12 cylinder
    engine but they had to have a generating system that was strong enough to start these big engines and I had to adjust
    the relays so they would always produce at least 16 volts of power for the batteries to receive them.'
- speaker: Interviewer
  text: Did the cold weather affect the junctioning of the machinery?
- speaker: Respondent
  text: Oh yes, one of the pictures there is in a tent. There is snow on the ground. They put the tent up so we could work
    inside rather than be outside.
- speaker: Interviewer
  text: The maintenance tent?
- speaker: Respondent
  text: During the summer there was nothing. You did everything outside. When I got there in June, and in July and August,
    we worked on the tanks outside in the sun. It was hot, hot metal; it seemed to absorb the sunlight, difficult.
- speaker: Interviewer
  text: Did you get any R and R or rest periods in Japan?
- speaker: Respondent
  text: Oh yes, in October, we were rotating, one or two guys at the time. We got 4 days R and R, they flew into Tokyo, and
    I stayed at the D'Anrici hotel, really classy. It had just been redone for all the soldiers to be there. And it is right
    next to the Imperial Palace. So when I had the time, I walked out and walked around a little bit. I stood outside the
    Imperial Palace just to look inside because you are not allowed to go inside.
- speaker: Interviewer
  text: You liked Tokyo?
- speaker: Respondent
  text: Well, I didn't do much. What you did was you did a little drinking, you know, and you talked to the guys. There was
    a stadium right next to it. And they were playing football. The Japanese were playing football. So this other friend of
    mine from our outfit, Willoughby, he and I were the ones who went this time so we sat in the stands. The problem was that
    we were drinking a little bit.
- speaker: Respondent
  text: Yes, and of course, we had a little too much so we left.
- speaker: Interviewer
  text: So how were the rations or food in Korea, was it good?
- speaker: Respondent
  text: It was good, good food.
- speaker: Interviewer
  text: Was that Korean or American?
- speaker: Respondent
  text: American food all the way, always three meals a day, once in a while, if you were away, and they didn't have anything,
    every vehicle had a ration pack in it, so you could break open a couple of cans and you'd always have something to eat.
- speaker: Interviewer
  text: Were there any USO Shows or visiting entertainers?
- speaker: Respondent
  text: There was one close by at one point. Not everybody could leave so we had to find out who is the one who is going to
    leave, have raffles, but I'm sure Bob Hope was in one of them.
- speaker: Interviewer
  text: You mentioned the football in Japan, do you recall any other particularly humorous, unusual event?
- speaker: Respondent
  text: That was probably a highlight of being in the service, being somewhere else.
- speaker: Interviewer
  text: You left Korea before the Armistice was signed?
- speaker: Respondent
  text: Oh, yes, we left Korea about January 10, 1952. And then we went to Japan. I stayed in Japan until about May or June.
    And then I was sent home because my time was running out. We only had to stay in 21 months. My girlfriend was getting
    out particulars together to get married at the Church, all the stuff.
- speaker: Interviewer
  text: Those four months you were in Japan was that in Tokyo also?
- speaker: Respondent
  text: No, that was about 10 miles from Camp Fujiyama, it was north Camp Fujiyama, about 10 miles from Mount Fujiyama. We
    could see that every day. But they had north camp and a south.
