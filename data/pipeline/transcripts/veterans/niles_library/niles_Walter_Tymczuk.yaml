collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Where did you learn about the Veterans History Project?
- speaker: Respondent
  text: Through Jan Schakowsky, Representative Schakowsky, and also at the Memorial dedication of the World War II Memorial
    on May 29th and through the Niles Library.
- speaker: Respondent
  text: I was at... December 2, 1942, we assembled downtown Chicago, the Armory, I believe, and we were examined, and then
    we were shipped to Camp Grant. And we had to change clothes, ship our clothes back home, and we had to take an IQ test.
    And then we were assigned to our units, which was Camp Claiborne, Louisiana. And had basic training there, and then we
    had maneuvers there too, in the swamps of Louisiana. And then after the maneuvers, we were shipped to Texas, Camp Fort
    Howze. And then from there I got shipped across the sea.
- speaker: Interviewer
  text: To the East coast?
- speaker: Respondent
  text: To the East coast, then we got boarded there on December 6, and we sailed at the... we got about the 15th or 16th
    to England, and then on train we went out to the Southern part of England, out in the open field with pitched tents for
    two, three days, and then on the 19th we loaded onto ship, and we landed on the 20th on the beach. And it was a severe
    thunderstorm, awful rough waters and we'd walk two steps up and slide three down.
- speaker: Interviewer
  text: Upthe cliff?
- speaker: Respondent
  text: Off the cliff, and while we were all so exhausted, it got bad, as could get trucks to us, took us to the other part
    of France. And then we waited there three days, for Patton to get or... to bring his tanks to get organized, and then
    we pushed off, we attacked, on the third day I think it was... we had another severe thunderstorm, but we had to stay
    on a muddy road. You couldn't walk off there because the area was mined heavily. And for some reason at the time we started
    going across, the Germans started shelling us, so heavily so every time a shell come you hit the dirt, the road, dirt,
    and like puddles of water and mud. It took us about a couple of hours to get through that, and then finally we pushed
    them Germans back, and then we waited. Next day we pushed off again, and got the Germans on the run, and then Patton came
    in with his tanks. And we marched and mopped up after him. Then it was sometime between there and... what town was it
    I said, Paris?
- speaker: Respondent
  text: I can't think of the name of it. Anyway, we went down the coast, and we swung around to Paris, and we sat outside
    of Paris because the French wanted to take their own town, because they were afraid we would destroy it. Then when they
    secured it we turned around and started going toward Belgium and Luxembourg. And we were going along alright when all
    of a sudden the Germans got setup and they started shelling us. And when you're up there that long and hear the shells
    you can tell almost how close or how far away they're gonna hit, if they sound like they're going far you don't hit the
    ground or anything, you just keep going. But if it's close you hit the ground. Well, this time was pretty close, and the
    shells were coming in. There was a shell come in, it hit a reconnaissance plane that blew up in the sky. And then next
    thing I knew one was coming in closer to me, so I hit the ground, and it hit the top of the tree. It exploded and the
    shrapnel hit me in the back. Knocked the wind out of me, and how long I was unconscious out of the wind I don't know.
    And...
- speaker: Interviewer
  text: Tell about the backpack. The backpack was shot off.
- speaker: Respondent
  text: That was early, that was...
- speaker: Interviewer
  text: Well, you missed that.
- speaker: Respondent
  text: Well, anyway. Like I said, I had three close calls. The pack was shot off of me, and I had the shrapnel hit me in
    the back, injury.
- speaker: Interviewer
  text: It shot through your...
- speaker: Respondent
  text: And the shot, the bullets made a pattern around my face. And we reached Belgium (not into Belgium, but to Belgium,)
    Patton ran out of ammo and gas, so the supply couldn't keep up with him so they pulled us out and went to help the Americans
    in Italy. And we fought with them up to the Rhine River, and then the Battle of the Bulge broke out, and they pulled us
    out to go help at the Battle of the Bulge, where I got cut out of, out of, mentally ill, and I came home. They sent me
    to the first aid station, and from there they sent me to France, and they examined me, and they said, "Well, don't worry
    about it. Go to your room, we'll get your records, we'll let you know in three to four days," they said "Don't worry about
    it, you're on your way home, so on as you get a ship."
- speaker: Interviewer
  text: Six months on the front lines. And another time you had a shell that shot your ammo belt and your pants belt. That's
    the time you got hit in the back, that was later.
- speaker: Respondent
  text: That's the time I got hit with shrapnel... that's what saved me - there was my cartridge belt and my regular belt,
    otherwise I would have come out of here.
- speaker: Interviewer
  text: Other people saved by the Bible, you're saved by the belt.
- speaker: Respondent
  text: The Bible belt.
- speaker: Respondent
  text: So I came home and that was, that's it.
- speaker: Interviewer
  text: You were in a hospital in Tennessee for a while, a mental hospital.
- speaker: Respondent
  text: They sent us closest to home, so they shipped us to Battle Creek, Michigan.
- speaker: Interviewer
  text: At Custer, at Fort Custer Hospital.
- speaker: Respondent
  text: Yeah. And I got my discharge from there and I came home.
- speaker: Interviewer
  text: So, before you, before... You were drafted. Before you were drafted, what were you doing? Where did you live and what
    did you do?
- speaker: Respondent
  text: I lived in Chicago. I worked for Industrial Land Company. I was a spot welder. We used to make the disk lamps and
    stove lamps.
- speaker: Interviewer
  text: He would have been...
- speaker: Respondent
  text: I would have got out of it.
- speaker: Interviewer
  text: Exempt, because two months after he was called in, they got a government contract. And he would have been exempt from
    going into...
- speaker: Respondent
  text: Because I was a foreman, and we were making these cat-eyes for tanks and jeeps, for night driving, so... there when
    I got out of service, and the company that I worked for, they moved from Chicago to Indiana, and I just thought, I felt
    I didn't want to move to Indiana.
- speaker: Interviewer
  text: So then what did you do after the war?
- speaker: Respondent
  text: Well, I bounced around all over, trying to get a job.
- speaker: Interviewer
  text: Swept floors.
- speaker: Respondent
  text: Because you had a disability, they wouldn't hire you. You couldn't operate a machine, you couldn't do nothing. Maybe
    a stock clerk, or a broom swiper, so I worked for, I got a job at...
- speaker: Interviewer
  text: Due to his mental...
- speaker: Respondent
  text: Dryden Rubber Company, I was a stock boy and a cleanup boy, you know. Bring the supplies, and take the finished work
    away, clean up the place. Then I got into it with my supervisor...
- speaker: Interviewer
  text: Alright, that's alright [laughter].
- speaker: Interviewer
  text: After Dryden Rubber, what did you do?
- speaker: Respondent
  text: I worked for Hynes, you know, and Montgomery Wards.
- speaker: Interviewer
  text: After we met.
- speaker: Interviewer
  text: You did everything.
- speaker: Interviewer
  text: I got jobs for him.
- speaker: Respondent
  text: So anyway, my superintendent was mad, got a whiff of it that head superintendent was coming to me, asking for supplies,
    whether we had them or not. Well, he came to me, and I said "yes, we have them," he says we should take them and bring
    them upstairs right away. I said "okay," and my boss, that boss came down and he fired me right on the spot there. And
    uh, before I could get home, they called me up, and "Would I come back to work?" I said, "No thank you," I said, "the
    guy's been there for forty or thirty years, he knows all the head foremen in every department," I said, "I wouldn't get
    along." So anyway, I found out he got fired, about two months later.
- speaker: Interviewer
  text: My goodness. Alright, so we're taking you all the way back then, we're going to go back right to the very beginning,
    when you, when you... you said you were inducted. You told me already. What was it like those first days you were in the
    Army?
- speaker: Respondent
  text: Well, it was, let's put it like... it was something new, you didn't know what to expect, or what you were going to
    get into. It really was a mystery.
- speaker: Interviewer
  text: Did they ask you what your jobs were prior to put you in a certain detail of any kind?
- speaker: Interviewer
  text: Because he was in the CCCs, when he was sixteen to seventeen in Wisconsin, and I thought, and they planted half of
    those evergreens in Wisconsin. So, I thought maybe they asked you what you were in on.
- speaker: Interviewer
  text: Because he did farming before that and he didn't, you weren't a truck driver or so forth, like.
- speaker: Respondent
  text: I don't know how I got the job, but I got the job on the farm. My mother and father made arrangements, somehow found
    out they needed a helper to work on a farm. So, I went, got the job, worked one week, got three dollars a week.
- speaker: Interviewer
  text: From 5 in the morning,
- speaker: Respondent
  text: From 5 in the morning, to 9:30 at night, seven days a week. And I got beat out of my job, a tramp came by and was
    willing to work for a dollar and a half! He worked two weeks, and he quit. The farmer came back, wanted me to come back
    to work, I said "No thank you." Meantime I went and joined the Civil Service Conservation Corps. There I got twenty-one
    dollars a month, I worked 5 days, 6 hours a day, I got clothing, I got fed.
- speaker: Interviewer
  text: Sounds like a better deal to me. So they didn't care when you went, when they drafted you?
- speaker: Respondent
  text: Then when the war broke out, they closed up the camps, so I got a job at Dryden, a tablet company, making belts,
- speaker: Interviewer
  text: Which is why they saved you.
- speaker: Respondent
  text: and I got eight cents an hour. I brought home $10.50. And I worked, I was a slave labor. I got the job, the boss came,
    he says, "You're doing a good job." I work a week, and he says "I want more work,"
- speaker: Interviewer
  text: Piece work.
- speaker: Respondent
  text: '"Okay." I did. He says, "Very good." And three weeks later he comes back, "I want more." But I couldn''t do it. But
    there was a line half a block long, waiting for my job. They didn''t care. They got everything they could out of me.'
- speaker: Interviewer
  text: You said that when you were drafted that they gave you an IQ test. Did they give it to you, like they did in, did
    they give it to you in a big room, or did they give it to you, were you alone or what?
- speaker: Respondent
  text: I can't recall that, but everybody, I think we were all in the one room.
- speaker: Interviewer
  text: Probably one room.
- speaker: Respondent
  text: We were all in one room, it was a written test, you know.
- speaker: Interviewer
  text: So you went overseas in 1944?
- speaker: Interviewer
  text: So you were training for a year, year and a half?
- speaker: Respondent
  text: Yeah. I got eighteen months in the states, eighteen months overseas.
- speaker: Interviewer
  text: So was that normal, was that usually what people did?
- speaker: Interviewer
  text: Well, they had basic training, usually at one camp, and then sent you to another camp, for advanced basic training.
    That's what...
- speaker: Interviewer
  text: So what did you learn?
- speaker: Interviewer
  text: What did you learn?
- speaker: Respondent
  text: How to travel by night, by compass, if you didn't locate your food, was waiting for you, if you didn't find your area,
    you didn't eat that day.
- speaker: Interviewer
  text: And you said you won a, how to shoot...
- speaker: Interviewer
  text: How to shoot a rifle, and the equipment wasn't the best, even overseas it wasn't the best,
- speaker: Respondent
  text: No, that was about right.
- speaker: Interviewer
  text: Was it better [overseas]?
- speaker: Interviewer
  text: Did you make friends there, or did you not get to know people?
- speaker: Interviewer
  text: Did you make friends?
- speaker: Respondent
  text: No, all the friends from, they were gone. My buddy there, from basic training. When he went to Italy, I went to Europe.
    We corresponded, and he got killed... because, my letter came back, that he was deceased, so...
- speaker: Interviewer
  text: So did you, so you didn't travel overseas, did you have any of the people that you had done your basic training with
    that were still with you?
- speaker: Interviewer
  text: They kept splitting up.
- speaker: Respondent
  text: Well now, what happened was, once, like I said they started breaking our company up right after maneuvers. They took
    a whole bunch out of each company. Then overseas, then, that's when we went to Texas they did the same thing. There were
    only about 25% of us left.
- speaker: Interviewer
  text: My goodness. Was there a reason for that?
- speaker: Respondent
  text: Well, yeah, to sup-to fill in for the guys that got wounded and killed, that's how I imagine.
- speaker: Interviewer
  text: And the buddies you went over with, they were killed in the invasion, weren't they? You told me that.
- speaker: Respondent
  text: I guess so, I don't know.
- speaker: Interviewer
  text: He has no idea where he landed [at Normandy]. So many of the men know that they were at Omaha, Utah, Gold, whatever
    beach it was. He said it was pitch black and they had no idea where he landed. Because his friend brought back some of
    the sand from Omaha and gave him a vial of that sand. And he said, "I don't know where I landed." It was near St. Lo.
- speaker: Respondent
  text: All I know is it was a steep cliff... It was near, yes, because I remember going through St. Lo, that's why I know
    it was on that side.
- speaker: Interviewer
  text: All here members is that horrible cliff, and it was muddy.
- speaker: Respondent
  text: It was raining, you'd take two steps and slide down, and start again.
- speaker: Interviewer
  text: And the Germans were... were they still shooting from up there?
- speaker: Respondent
  text: Oh yes, those, you could hear bullets. The town was still smoldering, St. Lo was still on fire, then we seen soldiers
    bodies floating down the, along the shore, there was blood in the water, it was red. So. So. So now that's in mind, you
    know. You just can't overlook it.
- speaker: Interviewer
  text: I wouldn't let him see Saving Private Ryan because I knew what it would do to him. But that he'd, that first twenty
    five minutes.
- speaker: Respondent
  text: Anyway what happened then, they got trucks, they shipped us from this side of the peninsula to this side [West to
    East]. Then we were stationed here, and a commander, they told us to dig in, because we'll stay here a couple of days
    and then we'll move out. On the second day a colonel came up, gave us a briefing, and says "You guys don't expect to come
    home." He says. "If you go out there and you get killed, before you kill a German, well your, you wasn't trained properly."
    And he says if you killed five or more, and you got killed, you were well-trained, you were a hero. He says, "Don't expect
    to come home." And we stretched out and he says "Dig your trench holes here, and have your lunch because we might be shuffling
    off in the evening." Moving out. How are you going to eat? There's a trailer there. It's full of blood and body parts.
    Tss. Maggots crawling all over the thing. And you're sitting there and you're supposed to eat?
- speaker: Interviewer
  text: What were they trying to get you to eat? What was there to eat?
- speaker: Respondent
  text: We were lining up to get ready for the attack.
- speaker: Interviewer
  text: Did you have a mess thing, or did you have your own food in a container?
- speaker: Respondent
  text: No, we had mess baskets. Knife, fork, spoon, cup.
- speaker: Interviewer
  text: Kits. Mess kits.
- speaker: Respondent
  text: And, urn, K-Rations. So we didn't ever have to use the mess kits. Because they were shot off and holes in it anyway.
    Bullet shit my back. They hit the back and my pack stood up. And they... they shot it off. My raincoat was like, I could
    sift spaghetti.
- speaker: Interviewer
  text: Will you tell the recording about your being in that barn in France when you lost your hearing? And they have no record
    of it.
- speaker: Respondent
  text: Well that, I don't know how that happened. Because we stopped at a place for the night and then I woke up next morning,
    I couldn't hear.
- speaker: Interviewer
  text: From the, artillery.
- speaker: Respondent
  text: I don't know what it was from!
- speaker: Interviewer
  text: You woke up in a barn.
- speaker: Respondent
  text: Yeah, and I went to the first aid station, and I couldn't hear, so they took me to the field hospital. They kept me
    there a week. I finally got my hearing back.
- speaker: Interviewer
  text: Did they do anything, or did it just come back gradually?
- speaker: Interviewer
  text: What did they do?
- speaker: Respondent
  text: I don't know. Examined me, they dug around in there.
- speaker: Interviewer
  text: And he couldn't get help for that, when he got home, because they had no record of it.
- speaker: Respondent
  text: And I had to have proof in records.
- speaker: Interviewer
  text: They didn't notice you could hear before the war? You think that they would know.
- speaker: Respondent
  text: Anyway, then finally I got my hearing back and I went back up to the front lines.
- speaker: Interviewer
  text: I would like you to say, and you don't like to talk about it, about that Polish man.
- speaker: Respondent
  text: No, I don't want to go into that. No.
- speaker: Interviewer
  text: Will you let me say?
- speaker: Interviewer
  text: You're allowed to say you don't want to share something. It's alright. So, what was it like going from being a civilian
    to being a soldier?
- speaker: Respondent
  text: Well, we were, trouble was, nobody was here. All the friends that were, they were all overseas or they were... so
    you were, nobody's here.
- speaker: Interviewer
  text: Kind of lonesome.
- speaker: Respondent
  text: Kind of lonesome. My brothers were all still in the service.
- speaker: Interviewer
  text: Did they all go before you?
- speaker: Respondent
  text: No, I went first.
- speaker: Interviewer
  text: No, that's why I was surprised they didn't send him back because he was the oldest boy, and all four went in.
- speaker: Interviewer
  text: Were they all drafted?
- speaker: Respondent
  text: No, the three of us were, but the fourth one joined the Navy.
- speaker: Interviewer
  text: Joined the Navy. He was in the Bay of Tokyo I believe. They were waiting to invade Japan.
- speaker: Interviewer
  text: One brother was in the Navy, where were the others, do you know?
- speaker: Respondent
  text: The other one was with the 69th Infantry, I was with the 79th, and my other brother was with the 83rd, or the 82nd
    paratrooper.
- speaker: Interviewer
  text: Paratrooper. Casimir was a paratrooper medic in the Alps. And Joe, Joseph was in Europe, and I believe from a picture
    that we saw of him that he was one of those who shook hands with the Russians at the Elbe River. I believe, I believe
    so. Our friend in California, it was her brother Joseph, Joe, who was the originator of the shaking hands with the Russians.
    And he is now buried in Torgau, Germany.
- speaker: Interviewer
  text: So you and all your brothers came back.
- speaker: Respondent
  text: Oh yeah. Yes.
