collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So Jack what were you doing before you joined the service?
- speaker: Respondent
  text: Ok, as it just so happened I just finished high school, but I did not receive a diploma because of all things I flunked
    one course - it was called stenography, which I did basically so I could be near the girls. I tell like it is so I was
    missing those credits and, as a consequence, from there - well actually, in addition, I was a year behind in school because
    of a longer story which we won't go into so I was drafted, I was conscripted, although my first thought I took the Army
    Air Corps written exam and I passed it - which was an absolute shock to me, I didn't think I would do it. And when I went
    for my physical, I failed for one basic reason is that I couldn't line up the two boxes - the depth perception was not
    what they hoped for. And plus the fact, what I didn't know at the time, that there was a tremendous need for cannon fodder,
    bodies.
- speaker: Interviewer
  text: Wow, so was this in Chicago?
- speaker: Respondent
  text: This was in Chicago at their office on Van Buren. I got a notification to serve. I was eighteen, nineteen years old
    and I took the streetcar, gratis. They gave me a ticket to take the nickel streetcar or whatever, and I went there and
    I went to Camp Grant in Illinois and from there I went on a troop train to Camp Walters, Texas.
- speaker: Interviewer
  text: May I ask what you high school you attended?
- speaker: Respondent
  text: Marshall and Manley.
- speaker: Interviewer
  text: Oh, Marshall, the Commandos
- speaker: Respondent
  text: Well, I wasn't a sports person. I was not in command. I was basically there because of music, I love music.
- speaker: Interviewer
  text: This long train ride down to Texas, was that your first big trip outside Chicago?
- speaker: Respondent
  text: Yes. The only other trip I think was on a bus to Milwaukee.
- speaker: Interviewer
  text: So your "education" was beginning, and your first choice of service was the Air Corps.
- speaker: Respondent
  text: Not the Air Corps but the Army. And you were drafted for that?
- speaker: Interviewer
  text: 'No, I think in high school you took the Air Corps exam. I passed it, and as a consequence when I went for my physical,
    you had to make an instant choice: Army, Navy, Marines because of that particular little foible I wasn''t accepted by
    the Air Corps so I had to make a choice of the three, and my choice was the Army.'
- speaker: Interviewer
  text: You choose the Army instead of the Navy ...
- speaker: Respondent
  text: I didn't know how to swim. I was the only person that was ever pulled out of the pool at Marshall High School or Manly,
    I don't know which or the other. But I turned my body during the swimming test - I couldn't open my eyes, and I didn't
    realize that I was in twelve feet of water, and I stood up!
- speaker: Interviewer
  text: So you're on the train to Camp Walters Texas, which is an IRTC - an infantry replacement training center, so I completed
    my basic training there. Was that difficult?
- speaker: Respondent
  text: 'Yes, extremely. Number one, I wasn''t particularly athletic, never was athletic. If they bracketed the word "klutz"
    I would be at both ends of the bracket so I was a most unlikely person. In fact, I think in basic training there were
    two instances where they said to me: "I give you about five seconds in combat."'
- speaker: Interviewer
  text: But they still wanted you.
- speaker: Respondent
  text: I said was cannon fodder. This is what you had to do.
- speaker: Interviewer
  text: So is that about three months, the basic training ...
- speaker: Respondent
  text: Three months. Then through some sort of clerical error I got shipped to Fort Benning, Georgia, and went to the parachute
    school.
- speaker: Interviewer
  text: Wow. That's as bad as jumping in the pool!
- speaker: Respondent
  text: Wow is right. Anyway, I wasn't supposed to be there. As long as I was there, I did most of the training. It was terribly
    physical; I mean it was physical torture. This was training that people don't realize how difficult it was. You never
    walked. You always ran. These things were terrible. I don't remember what the exact specifics were; part of it, I think,
    I found out much later in life. Number one, I was a confirmed coward - I wasn't too happy about the situation. But as
    subsequent medical records would have determined by other people is that I had had a heart murmur. Now the reason I wasn't
    good at sports is because at eight they didn't allow me to take gym so I had a heart murmur. So I don't know if that was
    the reason, but I was probably prepared to go through with it.
- speaker: Interviewer
  text: So I guess I whatever the reason they put me on the train and they sent me to Camp Howze, which was a home division
    - it was the 103rd Division Home at the time. They had just moved from Camp Claiborne, Louisiana to Camp Howze, Texas,
    which geographically is outside a city called Gainesville. Next to that was a little town called Mineral Wells which had
    crazy water crystals. Our terminology for it was "Venereal Wells." And the next little town was Weatherford, Texas, and
    this where Mary Martin originated from. And they had still had wooden sidewalks. Next big towns were Dallas and Fort Worth
    and Denton, Texas, which was the ladies', women's school for teachers in Denton. So "Big D" was Dallas and "Little D"
    was Denton and they had, they had the most beautiful - I liked the girls. They didn't like me but I liked them, beautiful
    girls. They came of no consequence, but that's how we started getting different sorts of training to go to whatever state
    of action.
- speaker: Interviewer
  text: So you were redirected from parachute school to this home division?
- speaker: Respondent
  text: Yes, which is by luck or whatever, my brother had just gotten out of. He was 2 ½ years older than I was, and he had
    taken his training in Camp Claiborne, Louisiana, and I got into the 103rd 3 weeks after he got out and got into the Air
    Corps - a strange twist of fate so I didn't see him until after the war was over. Naturally, we both survived and still
    are surviving today.
- speaker: Interviewer
  text: You come out of, of course, you're from Chicago, a great melting pot, there's all kinds of different people in Chicago
    particularly in the great institution of the public high school, but I would imagine that being in the army you meet even
    more interesting types from different parts of the country.
- speaker: Respondent
  text: I met people who were very, very difficult to deal with. I had nothing but disgust and disdain for some of them and
    absolute, undying love for others.
- speaker: Interviewer
  text: And you couldn't predict who that was likely to be?
- speaker: Respondent
  text: Well the only, well I will tell you in my experience, at first, at many points of my life, I was subject to a lot
    of anti-Semitism. It was just a demographic type of thing, and the fact that I wasn't too agile as a soldier. That held
    me up for ridicule, but as a consequence, I was hardened by it, and I was very tenacious. I mean the more they heaped
    on me, the more I took it, the more I would fight back. I could remember at Camp Walters days. Somebody was riding me
    - couple of people were really riding me because of the religious circumstance. I remember I was cleaning a machine-gun
    one day, and I just, didn't say a word, just picked up a metal part, I remember the name of the part - nothing else about
    the machine-gun, but I remember it was called a trunnion block. I picked that piece of metal up, and I threw it and I
    hit him, and I put him in the hospital.
- speaker: Interviewer
  text: So naturally I came up for a summary court-martial, but nothing came of it, because they realized that they weren't
    going any place because, number one, I had a valid complaint, and, number two, they still needed a body. Did that guy
    ever rejoin the unit?
- speaker: Respondent
  text: Oh yeah, I didn't hurt him badly. I had no really evil intent just enough to "say you're not going to get on my fanny
    any more" - which he never did. You can be a coward as long as you want, and they'll pick on you. But if you're provoked
    enough, you're going to fight back.
- speaker: Interviewer
  text: So you went in, I think, your data form here indicates that you enlisted on the 14th of July, 1943.
- speaker: Respondent
  text: I didn't enlist. I was conscripted. Nobody in their right mind would enlist - no way!
- speaker: Interviewer
  text: So now that we're back in Texas in the home division.
- speaker: Respondent
  text: And they had no idea of how they wanted us trained. First, we trained as regular infantry, and my position within
    the platoon, I was in a heavy weapons platoon which meant that we were in 30 caliber heavy machine guns, 81 mm mortars
    and assorted small arms for - M1 rifles, 30 caliber carbines, pistols, and we had to qualify in all these weapons as best
    we could. And then I was sort of a "smart-ass" I didn't want to drag a base plate and I didn't want to drag a bi-pod,
    'cause these are heavy so I figured well, I'm going to be the communications part of this little outfit which meant I
    was the wire man. Well, that was a wonderful thing - all I had to do was carry a little roll of wire with two sound-powered
    telephones and if we were going on the attack, I'd be with the rifle squad. I'd be in the nucleus. It would be me, the
    BAR man - the Browning Automatic Rifle, that's your firepower. We'd have the point man, the scouts on either side and
    the rear echelon man, and whoever happened to be in that particular make-up. You had the 60 mm mortar and the 30 caliber
    light machine guns and it was a mix. The thing I wish they would have done today and still do in many areas is that we
    were all trained in the infantry that whatever the situation was - let's say if I was first machine gunner that day and
    if I was killed, the one that was second machine gunner automatically took the place or the third machine gunner or the
    ammo-bearer. We were all like machine parts. We were replaceable. We could go from one job to the other job, and there
    was no question about it. This is what we had to do. This is what our task was. Today, you only do this. You tell them.
    "Well, you gotta turn the right faucet on." "Well, I don't know about the right faucets; I only work on left faucets."
- speaker: Interviewer
  text: Specialization to the point where it impairs the unit's efficiency?
- speaker: Respondent
  text: Right. Then we trained at the 103rd. For a while, I don't think they really knew ... we were, like in the reserve.
    They had to have some people here, and we were waiting our turn for whatever problems or the higher-ups decided on. So
    meanwhile we started training, then we started training to be amphibious troops so we went in the landing craft, and again
    I drew the short end of the straw because when the front opened up. I was the guy on the right or the left that had to
    run and lay down on the barbed wire.
- speaker: Interviewer
  text: How do you practice for that?
- speaker: Respondent
  text: You don't! (Laughter) It's called, "You're going to die!" But this is what we trained for. When the front of the boat
    opened up, we're in shallow water. Now the enemy would be dug in and would have carloads of barbed wire at the shore line
    so I would have to be with somebody on either right of left, it was interchangeable, run the fifteen or twenty-five feet
    and when I lay down on the wire, everybody could pass through the center. I would hold it down. That's called "odd jobs."
- speaker: Interviewer
  text: Did you wear gloves?
- speaker: Respondent
  text: Yes, we had wire-cutters. We had basically our body. If you would lay down on it, we had combat fatigues and jackets,
    and at that time the barbed wire really was, it like somebody you see on tv where they lay on a bed of nails. And once
    you lay down on that, you can survive - like being in training, plus like being in a foxhole and being run over by a tank
    and fording a river by bridge or else a rope.
- speaker: Interviewer
  text: So at the end of these various types of training in Texas, you could operate a phone, you could operate a machine
    gun, a Browning Automatic Rifle, a pistol, a mortar, any weapon that was available, we knew how to operate. We could function
    with it. So did you ever feel like "OK, It's time to go. We gotta get over there. We're all set. We're trained.
- speaker: Respondent
  text: No. No. No.
- speaker: Interviewer
  text: Did you get any furloughs or leaves to come home at any time?
- speaker: Respondent
  text: A couple of times I came home for a short period of time.
- speaker: Interviewer
  text: Anybody at home say "It's looking good over there. It's looking bad over there. We're worried about you"?
- speaker: Respondent
  text: My parents and the rest of the family were concerned. But I didn't want them to be concerned because they were older.
    I was the youngest of my family. I would never tell them what I did. And my Dad would say, "What do you do?" They were
    from the old country. They really didn't understand that well. They were totally uneducated, and we had some personal
    tragedies in the family that further advanced it to where my mother basically was a recluse because I guess my sister
    had died when she was six of poisoning. She ate an apple or whatever it was. They didn't recognize how serious it was.
    I really don't know the details because they never discussed it. As a consequence, they had a lot of things to deal with
    besides being raised during the Depression where food was hard to come by, and employment was even harder. It was difficult.
    You had two or three families living together.
- speaker: Interviewer
  text: Did you send money home like some of the soldiers?
- speaker: Respondent
  text: No, there was no money to send home. Our salary was $50 a month, and you'd go to the PX. Well, I didn't smoke at the
    time. You'd go to the movies. I'd try to save and send some money home.
- speaker: Interviewer
  text: So when does the 103rd - that's your home unit, when did they decide ... sorry to be so dense. When you say "home
    unit," home division what does that ... ?
- speaker: Respondent
  text: That's the entire division, the 103rd Division. It's called the home division. You have in a division three regiments
    - it's not definite. But in our division we had 3 regiments - the 409th, the 410th and the 411th, and within those, adjunct
    to those units, you had your supplies part, your artillery part, your supporting units. Each regiment was made out of
    battalions. And in the battalion strength there were four companies - A, B, C were rifle companies, D was heavy weapons.
    Then you had the succession of the alphabet. It would go again and, there were heavy weapons so you had the type of structure.
    You had, I guess, three battalions to a regiment. I don't remember.
- speaker: Interviewer
  text: So does "home division" mean that's the part of the army that's back in the states?
- speaker: Respondent
  text: This is like the 103rd Division. That was my "home division" - like the 42nd Infantry Division. Usually, a division
    is about 15,000 men. Like they teach you at school, "This is your home division."
