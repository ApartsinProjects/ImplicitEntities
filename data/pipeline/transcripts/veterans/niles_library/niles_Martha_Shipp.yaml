source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: What branch of service did you serve in?
- speaker: Respondent
  text: The United States Cadet Nurse Corps.
- speaker: Interviewer
  text: And I'm guessing, like so many of our veterans, you were probably a recent high school graduate at the time of the
    war, or how did you come to be...?
- speaker: Respondent
  text: I was. I worked for three years after graduation from high school before I went into the Corps.
- speaker: Interviewer
  text: And was that in a medical field?
- speaker: Respondent
  text: No. It was an electrical service.
- speaker: Interviewer
  text: In other words, it was the Detroit Edison Company?
- speaker: Interviewer
  text: And then how did you wind up going from the Detroit Edison Company to the Harper Hospital, it says here?
- speaker: Respondent
  text: Well, I heard about the Corps, and so I was sitting there in the office, and I thought maybe I could do better. So,
    when I heard about it, I investigated it and decided to go.
- speaker: Interviewer
  text: And this involved young women from any particular background or field joining this Corps?
- speaker: Interviewer
  text: To develop more nursing personnel or?
- speaker: Respondent
  text: Yes. We were to become registered nurses at the end of our three years.
- speaker: Interviewer
  text: So you had to undertake three years training then?
- speaker: Interviewer
  text: And I suppose while you're undergoing training, you're also working in a hospital too?
- speaker: Respondent
  text: Definitely. We had—our classes were part of the day and, the rest of the day, to make up an eight-hour day, we worked
    in the hospital with the patients.
- speaker: Interviewer
  text: And that was there at Harper Hospital in Detroit?
- speaker: Interviewer
  text: And were any of those patients veterans or?
- speaker: Interviewer
  text: Was there a national shortage of nurses at the time of the war or because of the war, do you think?
- speaker: Respondent
  text: Yes, a lot of the registered nurses had gone into the service and, more or less, the students kept the hospital going.
- speaker: Interviewer
  text: You asked about did we work with veterans. The last six months, I worked in the Veterans Hospital in Maywood.
- speaker: Interviewer
  text: Here in Maywood, Illinois?
- speaker: Interviewer
  text: So you were transferred then from Harper Hospital in Detroit to Maywood, Illinois, or?
- speaker: Respondent
  text: It wasn't really a transfer. We had a choice of what kind of nursing we wanted to go into in the last six months,
    and that was one of our choices.
- speaker: Interviewer
  text: And you chose?
- speaker: Respondent
  text: The veterans.
- speaker: Interviewer
  text: The veterans.
- speaker: Interviewer
  text: And, so, did you find the training difficult at the Harper Hospital or was it?
- speaker: Respondent
  text: Well, no, I don't think so. It might have been a little hard to get back to the books after being away three years,
    but other than that, no.
- speaker: Interviewer
  text: Had you enjoyed biology or science in high school?
- speaker: Respondent
  text: Yes, I took biology in high school.
- speaker: Interviewer
  text: So that probably helped a little bit, I'm guessing.
- speaker: Respondent
  text: Probably. Yes.
- speaker: Interviewer
  text: So you arrive in Hines then, would that have been in—
- speaker: Respondent
  text: 1947. It would have been the last six months of our training. We were at Hines Veterans Hospital until September,
    1947.
- speaker: Interviewer
  text: You might have been helping or ministering to war veterans who had served overseas.
- speaker: Respondent
  text: Yes, they were all veterans at that hospital.
- speaker: Interviewer
  text: From the European or Pacific theaters both or?
- speaker: Respondent
  text: Yes, I think they were World War II veterans, and some were World War I veterans.
- speaker: Interviewer
  text: Oh, of course.
- speaker: Interviewer
  text: Any particular ones that you remember that had great stories that were?
- speaker: Respondent
  text: Well, the one young man that I really remember, he was unique because he was a paraplegic. And, I don't know, he had
    been there for some time. And he always was in bed. He never sat up. He couldn't anymore. He was rather stiffened. His
    muscles didn't work anymore. But one thing he did, was he painted, and he learned to hold the brush in his teeth.
- speaker: Respondent
  text: And they would set up a stand over top of him, and he would communicate his pictures through painting. He also could
    talk. I think his accident was that he jumped into a pool, and I guess he hit his head at the bottom of the pool.
- speaker: Interviewer
  text: Was that while he was in the service?
- speaker: Respondent
  text: I think so.
- speaker: Interviewer
  text: Of course, Hines Hospital is still an important service center these days for veterans. I mean it's—
- speaker: Respondent
  text: It's lots smaller, though.
- speaker: Interviewer
  text: Is it smaller now?
- speaker: Respondent
  text: Yes. Because Loyola is out there now. And they have taken over a lot of those buildings.
- speaker: Interviewer
  text: Continuing on with our interview now, and I may not have mentioned, but Martha's husband Bill is also present at our
    table here, and Bill has suggested that we ask his wife Martha about a chemistry course so—
- speaker: Respondent
  text: Well, I didn't take chemistry in high school. And that was one of the things I had to have to get into nursing was
    chemistry. So, I went back to the high school, and I talked to the chemistry teacher. And he happened to be the same one
    that was there when I was in school, but he gave me private chemistry lessons after I finished work. I would go to the
    school and we would do experiments. He sometimes had them set up already, so it wouldn't take so long to get going.
- speaker: Interviewer
  text: And, so, I spent a few months with him taking chemistry.
- speaker: Respondent
  text: That made for a long day.
- speaker: Interviewer
  text: Well, it was before dinner.
- speaker: Respondent
  text: Before dinner.
- speaker: Interviewer
  text: And you didn't blow up anything in his house—so dium or?
- speaker: Respondent
  text: No, I went to the high school and had the chemistry lesson. And the lab was there. I had my lessons there in the high
    school.
- speaker: Interviewer
  text: So did you enjoy being back in high school? Did you feel funny?
- speaker: Respondent
  text: I don't know. I was the only one there, so it didn't make any difference.
- speaker: Interviewer
  text: And was that in Michigan that high school was?
- speaker: Respondent
  text: Yes, where I went to school. Yes.
- speaker: Interviewer
  text: Detroit area or?
- speaker: Respondent
  text: No, I grew up in Mount Clemens, which was 20 miles north of Detroit.
- speaker: Interviewer
  text: Now the—you were kind enough and Bill was kind, also, to retrieve them for us—these pictures of yourself in uniform.
    So, were these the uniforms that you wore all the time that you were on duty?
- speaker: Respondent
  text: Oh, no. We wore regular school uniforms on duty. We, sometimes, not too often, we would wear these uniforms when we
    went out.
- speaker: Interviewer
  text: So how—the United States Cadet Nurse Corps that was then founded after the war began like '41 or '42 or?
- speaker: Respondent
  text: I would presume so, but I'm not sure. (1943)
- speaker: Interviewer
  text: And I wonder, did it continue after the War or was it pretty much a World War II phenomenon?
- speaker: Respondent
  text: It was. No, it didn't continue after those who were already signed up finished their course, and then I don't think
    there was any more after that.
- speaker: Interviewer
  text: So, did you stay in the field of nursing as an RN then after your time at Hines Hospital?
- speaker: Interviewer
  text: And you felt your training that you received was first class?
- speaker: Respondent
  text: It was very good.
- speaker: Interviewer
  text: Very good. What were some of the other students like in the class at the—in Detroit Harper Hospital, were they all...?
- speaker: Respondent
  text: We were a mixture of recent high school graduates and some of us who had graduated previously.
- speaker: Interviewer
  text: Were you all Midwesterners or?
- speaker: Respondent
  text: No, we had a Canadian girl in our class. We had a girl from, I remember, from Texas.
- speaker: Interviewer
  text: So were there other training centers in the United States, other campuses, as it were, for this?
- speaker: Respondent
  text: Oh, yes, the bigger hospitals in Detroit all had them. Many hospitals had one.
- speaker: Respondent
  text: Yes. A friend of mine trained at Ford Hospital—Henry Ford Hospital in Detroit.
- speaker: Interviewer
  text: So the bigger hospitals in Detroit had them. So, could you have gone into the—could you have specialized in service
    to veterans and stayed in the Detroit area? Or did you have to go to Hines in Maywood for that placement?
- speaker: Respondent
  text: We had to go—there were different sections of the United States, cities that had veterans. There was one in Detroit,
    and I know there was one in Indianapolis. We had no choice which one we were going to, whichever one they sent us to,
    and there were probably others around the United States.
- speaker: Interviewer
  text: When they say United States Cadet Nurse Corps, it sounds, sort of, it sounds like a branch of service. Did they have
    ranks? Did they have corporals, corporals and privates?
- speaker: Respondent
  text: No, nothing like that.
- speaker: Interviewer
  text: And they don't pin wings on you or something when you graduate?
- speaker: Respondent
  text: No, we didn't get that. We only got our school pin, which was on the picture here, and we got our school diploma.
- speaker: Interviewer
  text: Did you—and that didn't say anything about being in the United States Cadet Nurse Corps?
- speaker: Interviewer
  text: Did you stay in touch with any of the other nurses that you went through training with?
- speaker: Respondent
  text: Oh, yes. I have some dear friends, close friends, and then there was, we used to have a reunion. I can't remember
    what year we had the first one. But after that first one, we had them every five years. We would get together, and we
    are still getting together.
- speaker: Interviewer
  text: Was it 2000 or 2001 we had the last one?
- speaker: Respondent
  text: I don't remember for sure.
- speaker: Interviewer
  text: I think it was 2001 because, I remember, we talked it over, and we decided since the group was getting smaller and
    smaller that maybe we should have them more often and then, they decided, we would have them every two years. But I don't
    know what happened because we didn't have it in the two years.
- speaker: Interviewer
  text: Was it in the Chicago area then, there unions, or?
- speaker: Respondent
  text: Yes, there unions were in Detroit.
- speaker: Interviewer
  text: In Detroit.
- speaker: Interviewer
  text: And those started like in 1950.
- speaker: Respondent
  text: I don't remember the first one.
- speaker: Interviewer
  text: That's wonderful I think that's—
- speaker: Respondent
  text: Yes. But some of us are getting disabled and can't come anymore that far, because the ladies live all over the United
    States now. And so, and the last time, I don't know how many we had. We didn't have too many the last time. Fifteen. Fifteen
    or twenty, something like that.
- speaker: Interviewer
  text: So you, like the soldiers, you had a great sense of camaraderie, too, then.
- speaker: Interviewer
  text: You were going through this different experience at a formative time in your lives.
- speaker: Interviewer
  text: So your wartime career, it was responsible for your having that career then after the war. Now, of course, it probably
    wouldn't be necessary, but the GI bill wouldn't have applied in your situation, would it, or would it have?
- speaker: Respondent
  text: No, that wouldn't at all.
- speaker: Interviewer
  text: Not at all.
- speaker: Respondent
  text: We were signed up for the duration of the war, or, if the war was still going on, we would have to stay in essential
    nursing, but as soon as the war was over, our commitment was over.
- speaker: Interviewer
  text: So, none of your, it was part of the terms of your signing up, as it were, that you didn't go overseas.
- speaker: Respondent
  text: No, we didn't have to.
- speaker: Interviewer
  text: Did any of your friends wind up going overseas in...?
- speaker: Respondent
  text: Not that I know of, but, see, the war was over before we graduated.
- speaker: Interviewer
  text: Yes, that's right. Because you graduated in?
- speaker: Interviewer
  text: And the training at the hospital, was there tuition? Did you have to pay fees for that or was...?
- speaker: Respondent
  text: The government supplied it. The government supplied it because they needed you. They supplied our uniforms. They paid
    the hospital for room and board and training. And they gave us a small stipend.
- speaker: Interviewer
  text: Now some of the gentlemen that we've interviewed, they say that, this time in their lives, it was, you know, it was
    difficult, but it probably was among the best times in their lives, that they experienced so much, and they had a lot
    of fun, and all kinds of different experiences. But it was, never forgetting about the danger of it, but it was, but they
    wouldn't trade the experience for anything. Did you—would you say your years, your training years, were kind of a special
    time in your life?
- speaker: Respondent
  text: Yes. We had fun. It was fun times too.
- speaker: Interviewer
  text: Could have fun in Detroit and?
- speaker: Interviewer
  text: So, you stayed then in Illinois, then? You didn't go back to Michigan after your required service or whatever at Hines,
    then?
- speaker: Respondent
  text: No. From Hines, I went back, and I was at Harper Hospital for nine months or so, and then I took a position in Colorado.
- speaker: Interviewer
  text: Nothing to do with veterans' war effort.
- speaker: Respondent
  text: No. But again in the nursing.
- speaker: Interviewer
  text: Yes in the nursing field. So you had to undergo training for three years?
- speaker: Interviewer
  text: And then your commitment was until the war was over.
- speaker: Respondent
  text: Until the war was over, but the government would take care of our training until we finished. They paid our way until
    we got through.
- speaker: Respondent
  text: Let's see, when was the war over? In June?
- speaker: Respondent
  text: August of 1945.
- speaker: Interviewer
  text: August of 1945.
- speaker: Respondent
  text: See, we didn't graduate until September of 1947.
- speaker: Interviewer
  text: So, did you remember where you were when you heard that the war was over in Europe or that the war was over in the
    Pacific or that they had dropped the bomb?
- speaker: Respondent
  text: Yes. I was in 3 center in the hospital, and some people had the radios on, and that's how we found out. We were working.
- speaker: Interviewer
  text: And was there a lot of yippee or yahoo or?
- speaker: Respondent
  text: Oh, yes. People were excited.
- speaker: Interviewer
  text: And, so, do you think that, I'm just wondering, that the contributions that the women made at home on the homefront
    during the War, I have a sense that maybe they're not fully known or appreciated as perhaps as they should be, I don't
    know.
- speaker: Respondent
  text: Yes. I had sisters who worked in the automobile factories making parts for different vehicles.
- speaker: Interviewer
  text: For the Army or?
- speaker: Respondent
  text: Yes, Army, Navy, whatever they needed.
- speaker: Interviewer
  text: Did they continue after the war was over—that went?
- speaker: Respondent
  text: You mean my sisters?
- speaker: Interviewer
  text: Yes. Yes, the ladies who were filling in on the assembly line, or what, if that's what it was.
- speaker: Respondent
  text: Yes. I don't know how long my sisters were there. Probably until their husbands came home because a lot of them were
    married at the time before, except Marie, one of my sisters, she wasn't married at that time.
- speaker: Interviewer
  text: It's interesting, in the case of interviewing the gentlemen, that some of them come, most of them come, from families
    with other siblings, and all their brothers were in the Army or the Services. And, then in your case, your sisters, they
    were also helping out in the Services, one of them. On the assembly line or wherever.
- speaker: Respondent
  text: Yes, they all went to work in wartime factories.
- speaker: Interviewer
  text: Wartime factories. So, one of them was in the automobile or the vehicle production in?
- speaker: Respondent
  text: I think they all worked in the automobile factory because they worked in the same place.
- speaker: Interviewer
  text: And that all would have been in, I suppose, in the Detroit area which was a hub?
- speaker: Respondent
  text: On the outside of Detroit.
- speaker: Interviewer
  text: On the outside of Detroit.
- speaker: Interviewer
  text: So how do you—those were different times, I imagine, I mean, that—
- speaker: Interviewer
  text: The War Generation.
- speaker: Respondent
  text: Definitely.
- speaker: Interviewer
  text: Yes. How do you think—
- speaker: Respondent
  text: There were no men around.
- speaker: Interviewer
  text: '[Laughter] Was that a good thing or a bad thing?'
- speaker: Respondent
  text: I don't know. I wasn't expecting that one! So, do you remember the last day that you worked as a Cadet Nurse, that
    would have been back in back in Detroit then or?
- speaker: Respondent
  text: Yes. I suppose it was, the same, it would have been September the 12th, 1947.
- speaker: Interviewer
  text: And then how long—
- speaker: Respondent
  text: I went to the director's office, and she handed me my diploma and my pin. And I was free. I was out of school.
- speaker: Interviewer
  text: You must have had a sense of accomplishment. I mean, you had earned an RN and graduated.
- speaker: Respondent
  text: Definitely.
- speaker: Interviewer
  text: Yes, yes, and from there, you, how long was it before—did you mention you went to Colorado then?
- speaker: Respondent
  text: Yes. I worked in a hospital at Pueblo, Colorado.
- speaker: Interviewer
  text: And how long before you went to Colorado from Michigan there?
- speaker: Respondent
  text: About nine months.
- speaker: Interviewer
  text: Nine months.
- speaker: Interviewer
  text: So, was it easy to get a, to find a, nursing job at that time?
- speaker: Interviewer
  text: Or was it a case where everybody was—RNs were coming back from overseas or?
- speaker: Respondent
  text: There were ads in the paper for nurses. Seems like we still need—seems like there always is a need for good nurses,
    I don't know.
- speaker: Respondent
  text: Yes. There still is.
- speaker: Interviewer
  text: I think so. Onetime, though, wasn't it a few years back that they had too many? Wasn't it not too long ago that they
    had too many nurses and now they're crying for them again?
- speaker: Interviewer
  text: So you didn't meet your husband, Bill, that didn't have anything to do with—you didn't meet him in—it wasn't a war-related
    meeting, or was it?
- speaker: Respondent
  text: Well, a little, yes. My roommate, she introduced me to him. She met her husband when we were at Hines Veterans Hospital.
    He was a buddy of her husband. And, so, when they got married, we stood up for their wedding.
- speaker: Interviewer
  text: Oh! I wonder if Bill knew then, huh, or shortly thereafter.
- speaker: Respondent
  text: I don't know. I was on my way out to Colorado.
- speaker: Interviewer
  text: Colorado, yes, so that wedding was in Michigan then or?
- speaker: Respondent
  text: Yes, in Michigan two weeks after that wedding, I went to Colorado.
- speaker: Interviewer
  text: And did you find a lot of your conversations were about the war then when you were dating?
- speaker: Respondent
  text: I don't think so. I don't know that we talked too much about that, no.
- speaker: Interviewer
  text: Very good. I think we're moving a little bit toward the end of the interview. Is there anything that—
- speaker: Respondent
  text: I haven't asked that I should have asked, or is there something that I don't...
- speaker: Respondent
  text: I don't think so.
- speaker: Interviewer
  text: Ask about her specialty.
- speaker: Respondent
  text: Of course. I'm sorry. So, what was your specialty, Martha?
- speaker: Respondent
  text: Oh. I was an operating room nurse.
- speaker: Respondent
  text: I enjoyed that very much. And when I, after I left Detroit, I went to smaller hospitals. And being in smaller hospitals,
    we got to do different things.
