source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Mr. Morris, how did you come to be in the U.S. Army?
- speaker: Respondent
  text: Well, my--people that were born in the same year I was, if you were in my era, when you became eighteen years old,
    you went and registered for the draft, knowing that somewhere around the age of twenty, you would be drafted. That's how
    I got in the Army. I got drafted.
- speaker: Interviewer
  text: So you were drafted?
- speaker: Interviewer
  text: Did some of your friends make a decision to enlist or--
- speaker: Respondent
  text: Oh, yeah. I knew guys in the Coast Guard, in the Air Force, in the Marines, and the Navy, and they all thought they
    could get out of combat by doing that. They had to serve more time than being drafted but that's what--
- speaker: Interviewer
  text: And did that strategy work for them?
- speaker: Respondent
  text: Oh, yeah, sure. Sure. Most of the guys, with the exception of the Marine Corps, most of the guys that I knew, if they
    did enlist, served, if they did serve in Korea, they weren't on the front lines, or that sort of thing.
- speaker: Interviewer
  text: Had people in your family served in the military?
- speaker: Respondent
  text: Well, my father was a Reserve-- my father was an Army lifer. He went in the Army at the beginning of World War II
    and stayed in twenty-twenty-five years. I've forgotten. But he went in as an officer.
- speaker: Interviewer
  text: Did the Army ever beckon to you as a career?
- speaker: Respondent
  text: No. No. Not at all. Not at all. I just wanted to serve my two--I realized it was an obligation-- and I wanted to get
    out. I had no desire to make it a career.
- speaker: Interviewer
  text: So if you enlist, joined up voluntarily, then your required duty time is certain years active, certain years reserve?
- speaker: Respondent
  text: Well, you've got to meet your obligation either way you cut it. The longer you serve on active duty, the shorter your
    reserve time is. If you serve, I guess I served two years active duty and six years reserve time. Now, if I would have,
    say, enlisted for three years, I guess my reserve time would have been cut down by a year, or maybe two. I really don't
    recall that much about it anymore.
- speaker: Interviewer
  text: So you were drafted, then, at the age of twenty-two?
- speaker: Interviewer
  text: Twenty. Pardon me. Twenty. Did that disrupt your life or--?
- speaker: Respondent
  text: No, not at all. I guess I prepared for it. I just knew it was going to happen and, unless there was something I didn't
    know about physically, that I would be going in, and that's what happened.
- speaker: Interviewer
  text: So was your generation, I guess you were in eighth grade or high school during the World War II years?
- speaker: Interviewer
  text: At the outbreak of Korea, were you all--was there a feeling of patriotism or
- speaker: Respondent
  text: Oh, sure. Oh, sure. Much more than probably the guys in Vietnam. Yeah, I would say so. You just expected that to happen
    and it was a way of life, you know.
- speaker: Interviewer
  text: So, there were no surprises in the family when you did that?
- speaker: Respondent
  text: No. No. Not at all. Not at all.
- speaker: Interviewer
  text: So where did you--where were you inducted?
- speaker: Respondent
  text: Fort Sheridan, Illinois. We went down there, and we spent a week there being processed, and then we were sent out
    to different locations across the country.
- speaker: Interviewer
  text: So your basic training was?
- speaker: Respondent
  text: I went to California Fort Ord, or No, Fort Lewis, Washington, or, I'm sorry, Camp Roberts, California.
- speaker: Interviewer
  text: Camp Roberts.
- speaker: Respondent
  text: Yeah, they closed it right after the Korean War was over.
- speaker: Interviewer
  text: And was that a pleasant experience, basic training?
- speaker: Respondent
  text: No. Yeah, it was all right. I mean, if you look back on it, it was, you know, it was what it was, but, you know, it
    wasn't anything that I'd want to do over again or I'd recommend, you know, to people who want to go out and have fun.
    It was what it was.
- speaker: Interviewer
  text: And I'm sure it wasn't any more pleasant anyplace else. It was warm.
- speaker: Respondent
  text: Yeah. Were there--did you meet interesting people in basic training?
- speaker: Respondent
  text: I think you meet interesting people all through the military. I met people that I'd never thought I'd ever even talk
    to, you know, and that I'd never have a chance to meet any other time. And it was really, it was, that part of it was
    very interesting. I really enjoyed it. And I've never kept in touch with anybody, particularly. I thought I would, but
    I didn't.
- speaker: Interviewer
  text: So, did some of the people you went through basic training with, including yourself, were you thinking about you might
    have to go to Korea or--
- speaker: Respondent
  text: Oh, yeah. There was no doubt. In fact, out of my outfit, my basic training class, for want of a better word, three
    guys went to Europe, two guys went to Alaska, five guys stayed in the States, and everybody else went to Korea.
- speaker: Interviewer
  text: And how many would that have been, roughly, that went to Korea, then, out of that?
- speaker: Respondent
  text: Oh, probably two hundred and twenty.
- speaker: Interviewer
  text: Yeah, the rest of them. The only reason I stayed was because they lost my orders. I was supposed to go to Korea. I
    was--that was what I was trained for. And when it came time to ship everybody out, there were five of us that sat back,
    and they didn't have any orders for us. And they didn't know why. And it turned out that they lost my orders, and I was
    one of five guys, and so they kept me on as a holdover trainee in California. And I went through two training cycles as
    a--
- speaker: Interviewer
  text: Two basic training cycles?
- speaker: Respondent
  text: Right, as a cadre man, which was like a drill instructor in the Marine Corps. And we would go out there and train
    troops. So that's what I did for a year after I got out.
- speaker: Interviewer
  text: Did you enjoy training troops?
- speaker: Respondent
  text: Oh, sure. It was fun. We'd get up in the morning, and take them out, and then sit under a tree and wait for the instructors
    to be done with them, and then take them back, and then we'd be done for the day.
- speaker: Respondent
  text: And the only reason I found out that this wasn't the best thing that'd ever happened to me because I wanted to go
    home. I'd been in the Army for a year, and everybody else was going home on leave around me, and it was my turn, and I
    asked for a leave, and they said, "We can't give it to you, because you're not assigned to anybody. You're a holdover."
    "And what does that mean?" And they said, "Well, you're never assigned to anybody. You can't be promoted. You can't get
    a furlough. You can't do anything. You're just here." And so I, "Well that's silly! I mean, how do I change that?" I mean,
    you know, obviously, I wanted to make more money, which means promotion, and not that I want to make a career out of it,
    but every time you get promoted, you make more money. Not a lot, because they don't pay a lot. But, anyway, so they finally
    put me in as a permanent party. By this time, the Korean War was over, and they were closing the camps. So they assigned
    me to a security guard outfit that was attached to the MPs. And we did that until the camp closed. And then they sent
    us all to Fort Lewis, Washington. And then I got my furlough and I got promoted all in the same breath. So, when I got
    to my new station I was a PFC, which was a big deal, because they just--the rank had been frozen all this time, and they
    unfroze the ranks of people who could get promoted. Anyway, I was due for sergeant the day I got out of the Army. And
    they asked me if I wanted to make sergeant. And I said, "Well, sure." And they said, "Okay, you are going to have to reenlist."
    I said, "No, I don't want to do it that bad." So, I just took my
- speaker: Interviewer
  text: So, you were in this sort of limbo?
- speaker: Interviewer
  text: Official, Official ease.
- speaker: Interviewer
  text: And they decided to make use of you while you were in this limbo.
- speaker: Respondent
  text: Right. They didn't want me to serve and do nothing. God forbid!
- speaker: Interviewer
  text: So they used you as a sort of a like a trainer.
- speaker: Respondent
  text: Yeah. Yeah. They had an extra pair of hands that they wouldn't have had otherwise. And so they took advantage of it.
    And it worked out good for me, except for getting promoted. That's all I really cared about.
- speaker: Interviewer
  text: You don't think they just decided you might be good at this training and they just decided to keep you on in some
    sort of--
- speaker: Respondent
  text: Well, they knew the bubble was going to burst eventually anyway, because the war was almost over, and, you know, when
    it was ended, they just knew it would be a matter of time before this camp got closed, and then they had to do something
    with all these extra people. In fact, they had a lot of guys who wanted a career, soldiers that ended up getting tossed
    out of the Army. They just, because they didn't have anything else to do with them, it was peacetime, and they so they
    just--
- speaker: Interviewer
  text: So, some of the young men that you worked with, that you trained,
- speaker: Respondent
  text: Mmmhmm they went to Korea, is that right?
- speaker: Interviewer
  text: Oh, the Korean War was over. They probably went, but there was no, you know, it was just a matter of them being occupation
    troops, more or less, you know. They were there. They are still there.
- speaker: Interviewer
  text: So was--Were you all pleased that the war ended then or were some people thinking, "Oh, I really wanted to get over
    there," or--
- speaker: Respondent
  text: Oh, I didn't know of anybody that really wanted to go.
- speaker: Respondent
  text: Nobody really, you know, they, unlike the guys in 'Nam that says, "Hell, no, we won't go," it never occurred to us
    to do that.
- speaker: Respondent
  text: We just--We knew if we did that, we'd probably end up in prison, and so we didn't.
- speaker: Interviewer
  text: So, did you gain weight, lose weight, while you were in the Army?
- speaker: Respondent
  text: When I was in the Army, I just got out of high school about two years before, or a year before. I weighed 150 pounds,
    six foot tall. I was six foot tall, since I was about fourteen, which I was a skinny little rundown kid. I went --I had
    fourteen, or sixteen, weeks of basic training. When I got done with basic training, I went up to 185 pounds, and I didn't
    have an ounce of fat on me. I don't say it was bulk, but I was in the best shape I've ever been in my life. And I stayed
    that way until I got out of the Army. But I was in the infantry, so they worked us all the time. And it wasn't like hard
    work, but we kept, you know, regimented, you know. We had a certain time we had to go to bed. We had a well-balanced diet.
    I ate good as a civilian, but, you know, when you eat good, it means you're filling your belly. There, they give you a
    well-balanced diet, that kind of stuff, so, yeah, it did me a lot of good.
- speaker: Interviewer
  text: Your parents still recognized you, though, when you came home on your eventual furlough?
- speaker: Interviewer
  text: Yeah. The Army must have thought you were a good authority figure, maybe, or something, do you think?
- speaker: Respondent
  text: Well, I don't know. You know, they, if they would have had the machines they've got today where they have, you know,
    they can look up your personnel record now in five seconds, they probably would have, because my father was an Army officer,
    and he was in military intelligence. It probably would have helped me a lot. But in those days they didn't know, they
    had no way, I mean, they knew it, but it would, to look it up on a computer, they didn't have that kind of knowledge.
- speaker: Interviewer
  text: Do you ever find yourself at odd moment thinking about somebody back there in those times and chuckling about what
    a character they were?
- speaker: Respondent
  text: Sure, all the time. Yeah, I remember a guy when I was at Fort Lewis, a guy, we called him Gizmo.
- speaker: Respondent
  text: Yeah. And I don't remember his name anymore, but everybody called him Gizmo. He was a black guy from the south side
    of Chicago. And he was probably a gangbanger, and we just didn't know it at the time, a nice guy, but he always talked
    real tough. And he sounded like he had a whisky voice. He had this real heavy--and he was always getting in trouble because
    he was always flouting authority. Well, it turned out he wasn't drafted. He enlisted in the Army. And when we found out
    about it, we really gave his life living hell, because, you know, he enlisted and he was acting the way he was. He was
    like, you know, guys that were complaining because they got drafted. I always wondered what happened to him. But he got
    tossed out of the Army, not a bad discharge, but he was one of those guys that after the war was over, they didn't want
    him anymore. They needed him when they got him. They, you know, in the war, the Army was open to anybody. But after the
    war was over, they got rid of a lot of people.
- speaker: Respondent
  text: My father was one of them. He was in and out of the Army all the time. And he was an officer and his, when he died,
    his chaplain was a guy who had been in the Army Reserve. And they let him go because they didn't need chaplains anymore.
    And he wanted to make a career of it, and he was planning on doing it for the rest of his life, and then getting a small
- speaker: Interviewer
  text: Pension or something?
- speaker: Respondent
  text: Yes. When he got out, well, he would been, he would have gotten a big pension, because he was a colonel, but he would
    have taken that, and then gone and gotten himself a little parish someplace, and gone from there, yeah.
- speaker: Interviewer
  text: Yeah. What high school did you attend, may I ask?
- speaker: Interviewer
  text: Sullivan Tigers, right?
- speaker: Respondent
  text: Sullivan Tigers.
- speaker: Interviewer
  text: Yes, very good. How do you know that?
- speaker: Respondent
  text: I've met a lot of Chicagoans over the years working in libraries.
- speaker: Interviewer
  text: So, most of the time, so far, you're in California?
- speaker: Interviewer
  text: And then you're Private First Class, and you come back from your furlough, and then you go to Fort Lewis, Washington.
- speaker: Respondent
  text: And that's an exit point, a departure point, Fort Lewis, or
- speaker: Respondent
  text: Well, Fort Lewis was a--I don't remember the initial words. I hate to hesitate to use them, "T.O. and E." outfit -(possibly
    Table of Organization and Equipment), but they were regular Army.
- speaker: Respondent
  text: And that's like you still go through cadre. You go through like you're doing basic training all over again, except
    you're no longer training. You're doing it like the real thing, maneuvers. We took maneuvers up in Alaska. We went over
    to different places in the country like Tacoma. I can't think of the name of the town right now. It's in Washington State
    when they made the movie To Hell and Back with Audie Murphy. We did that movie. They used us as extras, you know. We played
    German soldiers and--
- speaker: Interviewer
  text: Boy, that's fascinating! They had American soldiers portraying Germans!
- speaker: Respondent
  text: Yeah, the war was over with, and they needed guys, you know. They got--the studio, I guess, paid them to do that,
    so our outfit was selected to do that, and--
- speaker: Interviewer
  text: Have you ever seen the film?
- speaker: Respondent
  text: Yeah. Oh, yeah. It turned out that our outfit--they had another outfit that was going out there and doing this anyway.
    And we didn't go. So what they did do, they had a Division parade right at the beginning of the movie and at the end of
    the movie. And we, normally on payday, we would get paid, and we'd get a weekend pass. Because Audie Murphy was in town
    doing this movie, they had a Division parade, and they wanted to film it for the movie, and they did. It took about two
    hours to film it the way they wanted it. And, so, yeah, I remember it very well.
- speaker: Interviewer
  text: So Audie Murphy, of course, was a
- speaker: Respondent
  text: The most decorated hero of World War II.
- speaker: Interviewer
  text: He was--was he from Texas or something?
- speaker: Respondent
  text: Yeah. He was a little farm boy from Texas. And he was a good looking little kid. And that's what he looked like, a
    little boy. He was a real boyish looking guy, a little guy, but, you know, he was a war hero. So, he ended up making cowboy
    pictures.
- speaker: Interviewer
  text: Yeah, so he fought against the Germans, then, is that right?
- speaker: Respondent
  text: Oh, yeah, he sure did. They were like living hell.
