turns:
- speaker: Interviewer
  text: So, I start by saying, you know what, where were you born?
- speaker: Respondent
  text: Ypsilanti, Michigan.
- speaker: Interviewer
  text: And what year?
- speaker: Respondent
  text: February 17th, 1924.
- speaker: Interviewer
  text: Did you have fun on the Ark? Was that when you were a child - was the Ark?
- speaker: Respondent
  text: '[Laughter] Well, should I start at the beginning of where I got interested in the Navy?'
- speaker: Respondent
  text: Ok. I graduated from high school in 1942. The war was going on, so we knew we'd have to be - they'd be taking us sooner
    or later - and I was planning on going to college. I took an exam for a scholarship to the University of Illinois. Among
    the eight young men taking it, I got first place. And I got a scholarship to the College of Agriculture. I was living
    - this was when we were living down - my parents were living in Piatt County, and my dad had to drive all over the county
    to get signatures for me to take the exam. I took the exam, and then I got the scholarship, and I enrolled at the University
    of Illinois. I took the physical exam and passed it, and so I had to be in the ROTC. Well, after a week in the Army ROTC,
    I didn't want any of that! [Laughter] And, World War II. So when they had the Navy around getting people to sign up, I
    signed in December, yeah, in December of '42, I signed up to join the Navy. And, so, June 1st, 1943, they called me up,
    and I had to go to Purdue University. You had to have two years of college education to be able to go to midshipman school,
    so I went to Purdue. I took the year. The only thing that was hard about it was I had to take two semesters of physics.
    The math wasn't bad, and I majored in biological science and physical science. But I didn't like to take - I knew I had
    to take chemistry just for my major - but I didn't know I had to take physics for the Navy. What good that was! And, then,
    in the second semester, I had to take engineering drawing, and the poor professor at the end of the semester said, "You
    have flunked this course worse than any student I ever had!" [Laughter] What we had to do now - draw not only the front
    of this, but the back of this, without turning it around or anything, but it didn't mean anything. You had to take the
    course, but it didn't mean anything, but he was disappointed. So, I made it through the year. One reason was that was
    in math, the professor was grading on the curve. I got Bs and Cs in college algebra, in geometry, in trigonometry - stuff
    I've never heard of before, because he graded on the curve. And so almost everybody passed, but those that were really
    bad in math, they didn't pass. And I thought I was going to be one of them. But I wasn't. I made it. Then, in algebra,
    we had two guys from Tennessee that they couldn't understand what x times z, or whatever it was, I don't know now, so
    the professor told them, "Ok, I've got a field that's this long, this wide, how do I find how many acres I have in it?"
    They said, "Well, you just multiply..." He says, "Ok, this is x times y. That's the basis of algebra." Well, now, he taught
    them! But it wasn't that hard for me, I know, because I'd had high school algebra. And then, when we got out of - finished
    the year there - orders to go to Notre Dame to midshipman school.
- speaker: Interviewer
  text: How come they sent you to Purdue in particular?
- speaker: Respondent
  text: Because the Navy had a school there. They picked Purdue to take the people that entered the Marines and the Navy that
    had one year - a minimum of one year of college. Then, they took those in there from the Midwest. They took a whole bunch
    of the football team, of all things, from Illinois, and that year Illinois lost and Purdue won. [Laughter] We couldn't
    see why they didn't do this in Illinois. [Laughter] And we got through and went up to - I took the electric train from
    home. It was a quarter of a mile from us, so I could easily take it to Danville. The first thing I did when I got off
    the train was - they said, "You cannot walk the streets if you're going in the Army or Navy" because Danville was out
    of - you just - the streets weren't open to military personnel because of some - they'd been in trouble or something.
    I don't know. They said, "Get to the hotel and stay there overnight." I said, "Ok." I didn't know Danville anyway. So,
    the next morning, I caught the train to Chicago. This was, yeah, Chicago, and stayed overnight with my brother - my oldest
    brother that was living in Chicago. And then I took the train to South Bend. And, boy, we got the button then! Fall in!
    RRRRRR! and took us to Notre Dame and the section that they had for midshipman school. And that took July, August, September,
    October. The last week in October, we graduated, and it was tough. It was tough. And all my relatives were saying, "Oh,
    he'll make it, oh he's [smart gesture]" etcetera, except for one cousin who was married to a guy that was in the Navy.
    And she said to my mother, "Aunt Bridge, don't listen to them. He is going to have - he may make it - but he's going to
    have a hard time because their schools are not easy." And I did have. And I thought I was going to get kicked out because
    after I'd - you sit in class, and you look straight ahead, and I knew my roommate was going to flunk out. He was very
    poor. But you sat alphabetically, so he was sitting right next to me, and when I got a page done, I just slid it over
    and straight ahead. If he got any of it, more power to him! But I don't know whether he did, because I couldn't look.
    If you were caught looking this way - Boom, out! - if you were caught looking that way, up at the teacher, and down at
    your paper - that was only during an exam. And I don't know how he made it. But he flunked out. But, then, they called
    me in the next day. "Who was the teacher there?" I didn't know why they were doing it, and I didn't know his name. And
    so they said, "Ok, here's a lineup. Pick him out." Maybe he had seen me pushing the papers around. I don't know. But I
    couldn't pick him out. "Alright, go back to your room." And I was expecting to get called up, and say, I was on my way
    to Great Lakes!
- speaker: Respondent
  text: '[Laughter] But the next day, they found the teacher that was in my classroom. I went into the office, and the teacher
    said, "Yes, that''s the one," and he recognized me. And so I went through. Why they did it, I have no idea. [Laughter]'
- speaker: Interviewer
  text: How strange!
- speaker: Respondent
  text: Yeah. Whether they did it with other people, just for testing them; whether they had a whole bunch of people they
    wanted to test, and see how they would react, I don't know. Hmmm. And when we got enrolled in the beginning of the classes,
    the officer that was teaching navigation, he said, "One thing I'm going to remind you of at the very beginning, when you
    get through midshipman school, if you make it, you will have one gold stripe on your uniform." He said, "You will be a
    dumb greenhorn. And you'll get aboard ship, and you won't know a damn thing about what you're doing. Depend on your crew.
    Make sure you get along with your crew and especially the men that are second class, third class, and chief petty officer."
    And I made a point of that because I didn't know the first thing about a ship.
- speaker: Interviewer
  text: And we had a very good first class radioman. We'd been out to sea for a while. We'd been through the Panama Canal.
    We were on our way to the Pacific, and he came in one day at my stateroom, and knocked, and came in, and said, "Mr. Hawker,
    I have to go up on the crow's nest. The radio antenna isn't working, and I have to go up and fix it." I said, "Well, go
    up." He said, "But I'm afraid to." I said, "Ok, go up, and get all your tools ready, and I'll be up there in a few minutes."
    And I sat there and - what the hell - [Laughter] - Well, I guess I'll have to be a strong person. I went up there, and
    I said, "Ok, you've got your bag of tools. You start up and I will be right behind you. Do not look down. Do not look
    up. Look straight out at the horizon." And he went up, and I went up after him, and he got in the crow's nest and started
    working. I had to - there was only room for one person - so I had to hang on to the railing of the ladder and hang there
    for a while. And pretty soon, he was done, and he said, "I'm done." And he didn't act scared at all. And I said, "Ok,
    I will go down first. Don't look down. Don't look up. Look straight out." And we got down, and I was as calm as could
    be, and he was, oh, chipper and everything. And I thought, boy, did he pull a leg on me and - But he didn't. I found out
    he was scared until I came up and went up with him. And then everything just left - the fear left - but as I was going
    down the ladder to my stateroom, I was lalalala - I was shaking like that.
- speaker: Interviewer
  text: So when did you, you went through midshipman school and then when did you end up on a ship?
- speaker: Respondent
  text: Well, we got through midshipman school. We went to Norfolk and Camp Bradford. And, there, we took training in the
    field that we were going to be in. I was in communication so I had to take - we were there - we got there around the first.
    We had two weeks of leave. So it was in November. And we had until after Christmas, and then we studied whatever field
    you were in. I was in communications.
- speaker: Interviewer
  text: Then, we went up to Boston where our ship was being built, shortly after Christmas, in January. And they can keep
    Boston in the winter time! I had to go out and buy a pair of overshoes that came up almost to my knees. So much snow!
    More than any than in the Midwest. And I was put in charge of the troops that stayed in Boston. And the rest of them went
    out - the ones that were needed on the ship - before it was commissioned - went out there. And I was responsible for them,
    so when I checked their bunks and all, and saw that they were all present, I had nothing to do for the rest of the day,
    unless they'd call me and say put an order in for this and this. And I had to take care of ordering things and see when
    they came in. So, I made it to Henry Wadsworth Longfellow's home and all. I had about a half day that there was... the
    men were in class. I had done the paperwork that I was supposed to do and taken care of any orders. So, I was free to
    go explore the city and then in, let's see, that was January, February, March, April, about. We were commissioned. Everybody
    went out to the ship, and we had the ceremony, and we were commissioned. And we took off for Chesapeake Bay where we were
    going to do our shakedown.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: Well, you take and you put the ship through all its maneuvers that you can think of to see if everything is ok. And
    it was.
- speaker: Interviewer
  text: That was about a week, five days or so. Then, we went into Norfolk and tied up to the pier and supplied our ship,
    our food, and this and all that that we had. Then, we went up to New York. We were going to load up. But we didn't...
    I didn't know, and most of the officers did not know, what we were going to be loaded up with. I was on an LST, a landing
    ship tank, and the whole body of the ship was just a big tank. We loaded up with beer! [Laughter] Taking it to Hawaii,
    to Honolulu, to the Navy base. And when we got out to, then when we loaded up, we went down to Cuba. Guantanamo. Gitmo.
    And we could not go off of the base. Couldn't see any of Cuba. Then we were there for a day or two days, yeah. And everybody
    got sick on the ship going down there because, somehow, some formaldehyde got broken in sickbay and got spread all through
    the ventilating system. And everybody that had never been to sea got seasick. And some of them and I was, oh gods, I was
    sick. I could eat crackers and pickles. That was the only thing I could eat. I'd heave everything up over the side. Except
    for the crackers and the pickles.
- speaker: Respondent
  text: Except for the crackers and the pickles.
- speaker: Interviewer
  text: Sounds like you were a pregnant lady.
- speaker: Respondent
  text: I know. [Laughter] But there was a lot of people that couldn't eat anything. They were sick!
- speaker: Interviewer
  text: Was there something, did you eat in a, like a, mess hall or did you eat together?
- speaker: Respondent
  text: No, we were in the officer's mess.
- speaker: Interviewer
  text: Oh, that's right. I'm sorry.
- speaker: Respondent
  text: Oh, gosh, no. Oh my. So did you get, what was there to eat?
- speaker: Respondent
  text: And almost everybody was sick except the skipper and the exec. They'd had duty before we did, and they were not sick.
    But every one of the green ensigns was sick. Some worse than others. I was really bad. And two or three days, and then
    we hit the Gulf Stream. And it was as calm as could be. So, we were cured. And then we spent a day or two at Gitmo. Then
    we went through the Panama Canal. And when we got through it, we, for some reason, we stayed in the town or whatever it
    was, the base on the west side for a while. For two days, I guess, or three days, and I wasn't able to go ashore. Well,
    the ones that went ashore were officers that were a little older than I was and had had military police duty. They were
    patrolling the houses of prostitution. [Laughter] So they weren't having a good time either. And some of the guys got,
    I don't know what they ate, they were sick. They came back and they were drunk. And it was a mess. But the skipper and
    the exec expected this, so it didn't bother them too much.
- speaker: Interviewer
  text: And then next day we hauled out for Pearl Harbor and we were, well, it took a while for us to cross. And there was
    quite a few Catholics. The exec was Catholic, and I was Catholic, and there was quite a few of the enlisted men were Catholic.
    And, so, we hadn't been to Mass for a month or two. And, so, he went ashore and arranged for a chaplain to come up. And
    then he told me, "You get a crew and set up an altar on the tank deck when they get the beer taken off." [Laughter] Well,
    they told us when they saw all the beer, they said, "You weren't supposed to get out here with all this. Take about a
    hundred cases and make it disappear." [Laughter]
- speaker: Interviewer
  text: So the captain put them in a storage room. And I was helping. I got this Italian guy aboard ship. He and I were buddies.
    And I got him to help me. And he said, "Hey, Mr. Hawker, where are the rest of the damn dagos?" And I said, "Wait a minute.
    You're not supposed to use that term." He said, "You can't. I'm a dago. I can use it. Where are those damn, lazy, dumb
    dagos?" I said, "Well, they didn't come down." "Well, you'd better go and get them!" And so I went up and got a couple
    of them. But that's the first time I learned that you could not use the slang except for your own nationality. Now I could
    call somebody a limey because I was half English and a shanty Irish because my mother was Irish. But I could not call
    a Polack, a nigger, or a dago, any of that. I never knew that. I thought it was - we were raised that none of those terms
    you could use. None.
- speaker: Interviewer
  text: Were there a lot of people from different ethnic backgrounds on the ship with you? Did you meet people from other
    places in the country?
- speaker: Respondent
  text: Well, the exec was Irish. The captain was English. I was English-Irish. There was some Italians. There were blacks.
    There were Filipinos. And then there were just white people, that I don't know what they were. I could tell an Italian.
    There weren't any Polish. There weren't any Lithuanians. Most of them were from the east coast, so whatever that was.
- speaker: Interviewer
  text: Was it different for you? Did you meet people that you hadn't known before, did you meet--?
- speaker: Respondent
  text: Oh, I was a country boy, and almost all of them were city slickers, but we got along fine. I got along better with
    the enlisted men than the officers because they were, I thought, a little bit of this [gesture]. There was one that he
    stood in front of the mirror and primped his hair and all. He was from Los Angeles and hoity-toity. And there was another
    one from Texas. And he had beautiful blond hair and he would primp it and all. And he had a Texas flag and he hung it
    in his room. And somebody, who did it, nobody ever knew, I did not know, they took it from his stateroom, and hung it
    over a toilet in the bath. [Laughter] He was, oh, he was highly insulted. Well, he was such a - oh, he thought Texas was
    absolutely wonderful and was a perfect place, and he put too much emphasis on that. And somebody, just one of the officers
    - but it wasn't me, because he was my roommate, and I didn't dare. [Laughter] But I didn't even think of it, but who did
    it, I don't know.
- speaker: Interviewer
  text: Did you just have one roommate? Or did you, how many?
- speaker: Respondent
  text: No, we just had two. Each stateroom could handle four, but there wasn't any need of it, because they had enough staterooms
    for two. There was one from northern New York State. There was one from San Francisco. There was, let's see, one, two,
    there was
