collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So Mrs. Horstman when did you enter the service of the United States?
- speaker: Respondent
  text: I was in Physical Therapy school when the war started and it seemed like the thing to do. There were 32 in my class
    at school. I had chosen the school of physical therapy, probably because I am frankly afraid of needles which stopped
    me from becoming a doctor so I chose physical therapy.
- speaker: Interviewer
  text: In your class of 32 were there half men and half women?
- speaker: Respondent
  text: No, my school was very selective. Probably in this day and age they could be sued for discrimination. But they only
    took a limited amount of men because they assumed the men who entered our field would immediately go into private practice
    instead of working in hospitals. I think there was one man out of 32.
- speaker: Interviewer
  text: So this was after high school, then?
- speaker: Respondent
  text: No, I attended and graduated from the University of Michigan. From there I went to Mayo in Rochester, Minnesota.
- speaker: Interviewer
  text: This medical training school that you attended for physical therapy,
- speaker: Respondent
  text: The University of Michigan did not yet have a physical therapy curriculum so I had to look elsewhere. I looked at
    the University of Wisconsin but that was in a big city and I did not want that so I chose Mayo Clinic in Rochester, Minnesota.
    I completed my training at the Mayo Clinic taking the Physical Therapy curriculum under the Medical School.
- speaker: Interviewer
  text: So you were originally from Minnesota?
- speaker: Respondent
  text: My family moved to Illinois when I was six so I had lived in the Chicago area since I was six, then I went to Ann
    Arbor for my B.S. intending to go on into some medical field. My father wanted me to be a dentist. But I didn't like dentistry.
    I didn't like x-ray because there were no hands on with people, so I chose physical therapy. There were limited schools
    at that time for physical therapy. I graduated from Ann Arbor and then I went into physical therapy.
- speaker: Interviewer
  text: And most of the ladies in that class went into the service?
- speaker: Respondent
  text: The entire class went in all but two people and they couldn't go into the service because they were Dominican nuns
    so the whole class went in. The sole male in my class could go into physical therapy in the service. He could go in but
    he would not be commissioned so he would have gone in probably as a sergeant or something.
- speaker: Interviewer
  text: At that time that was the Army Medical Corps?
- speaker: Respondent
  text: Right, but we were under the auspices of the Nursing Corps.
- speaker: Interviewer
  text: And you achieved the rank of 1st Lieutenant?
- speaker: Respondent
  text: Correct, we all went in as 2nd Lieutenants, and then with additional training and time in the service, we could be
    promoted.
- speaker: Interviewer
  text: Did you have additional training in the Nursing Corps, beyond that at Mayo?
- speaker: Respondent
  text: Yes, they sent us to Houston, to Brooke General Hospital, in Texas where we received additional training, mainly amputee
    and burn training.
- speaker: Interviewer
  text: Did you find that you learned a lot there or that you already knew it?
- speaker: Respondent
  text: Yes, I was appalled because of the number of amputations and burn patients. We received specialized training in burns
    which came in handy later when I was in the South Pacific.
- speaker: Interviewer
  text: So you had three months at Brooke General Hospital in San Antonio, and then you were sent to?
- speaker: Respondent
  text: We were sent to a General Hospital in Longview, Texas, for six months. And from Longview we went to Ft. Lewis, Seattle.
    There we had to remain on base until noon with added training. After 12 o'clock we were not apparently going to be shipped
    out. We could go into town and do whatever we wanted until 8 AM the next day.
- speaker: Respondent
  text: I spent literally every afternoon at the base bowling alley. I liked bowling. The day that I shipped out I bowled
    very well. I've never done as well. I bowled 243.
- speaker: Respondent
  text: We didn't know where we were going. We were from all over the country. We thought we were going to a cold climate
    because they were issuing us this cold weather gear and teaching us how to hold a rifle, use a rifle and gas masks.
- speaker: Interviewer
  text: And did you know that you were going to ship out that day?
- speaker: Respondent
  text: No I didn't know until I was told the following morning.
- speaker: Interviewer
  text: Did you find life in the nursing corps different? Was it a big change for you?
- speaker: Respondent
  text: It was a significant change. It was very regimented. I was not used to being told that I had to go to breakfast between
    so and so hours and the same thing for other meals. And the food was appalling. Horrible, basically when I was overseas
    not in the United States.
- speaker: Interviewer
  text: And the therapists all got along well with one another or were there different types of people it took a while to
    get used to?
- speaker: Respondent
  text: Yes, we got along.
- speaker: Interviewer
  text: And that training was because you might have to fire the rifle?
- speaker: Respondent
  text: Yes, and they taught us how to crawl. I thought "what is this crawling for?" - just crawling like through a tunnel.
    This was at Ft. Lewis before we shipped out.
- speaker: Interviewer
  text: So if you are a good bowler, are you a good shot. Does it follow?
- speaker: Respondent
  text: I don't think so. And I am near-sighted. I had actually wanted to go in the Navy, and I took the Navy test. This is
    before I enlisted in the Army. And the Navy rejected me because my vision was poor. I said, "What's that got to do with
    Physical Therapy?" I really wanted the Navy because I looked better in blue. When they rejected me, I accepted the Army.
    Two weeks after I took my oath of office in the Army, the Navy waiver came through but it was too late so I spent all
    my time in the Army Medical Corps.
- speaker: Interviewer
  text: So when you and your fellow therapists nurses were thinking that you were going to a cold climate, could that have
    been Europe? Not the Pacific?
- speaker: Respondent
  text: I thought we were going to Europe.
- speaker: Interviewer
  text: And then when you heard you were going to the Pacific...
- speaker: Respondent
  text: I finally found out when we landed in Hawaii. No, I had no idea. They didn't tell us at Ft. Lewis. They gave us an
    envelope which we couldn't open. It was to be given to our commanding officer. I was on a train for a very short time
    and then on a ship. For at least four days I was as sick as a dog. My roommates moved me to the lower bunk because I was
    vomiting so consistently. It was a miserable, miserable, miserable trip. I ended up in Hawaii and was sent to a clinic
    in "Mosquito Gulch," located in Oahu. It was filled with Italian prisoners of war.
- speaker: Interviewer
  text: Italian prisoners-of-war in Hawaii?
- speaker: Respondent
  text: In Hawaii, yes, most of them had had malaria so I guess they came from Africa. I don't know since I didn't speak Italian,
    communication was tough. They were poor patients because they saw no reason to get well - no motivation. I was there six
    weeks and then told I had to report to Hickam Air Base. There was one other therapist there and the rest were five or
    six nurses. I don't know how many hours we were in the air, but we landed on Johnson Island about one or two in the morning.
    The field was brightly lit, and all the soldiers were out there. I couldn't figure out.
- speaker: Respondent
  text: When we got off the plane, we actually landed to have something to eat. I said to someone in the mess hall, "What
    are all the GIs doing there?" "They want to see American women. They hadn't seen American women in months and months."
    We were only there long enough to eat and I guess for the plane to change pilots.
- speaker: Respondent
  text: Next we landed on Guam. I was there for one day, and then they flew me to Saipan, which was not very far from Guam.
    I was at Saipan the rest of the war. As the war wound down, I volunteered for Japan, but they wouldn't let me go because
    I was the only physical therapist on the island.
- speaker: Respondent
  text: When I first got to Saipan, I was at the 22nd Station Hospital. They had minor wounds, fractures, sprains, things
    of that sort. The major wounds went to the General Hospital on the island. I believe there were two General Hospitals,
    one Army, one Navy. I was at the station hospital for months before being transferred to the 5th Convalescent which was
    the rehabilitation hospital.
- speaker: Respondent
  text: Then the war was winding down and headed for Japan. At the 5th Convalescent Hospital the morale was terrible at the
    Station Hospital among the American GIs because a rumor went through the Army. They knew something was coming. What was
    coming turned out to be Iwo Jima and so obviously the American GI did not want to get well because if he got well he was
    going on to further action. So it was very difficult to be a physical therapist, to try and motivate them to walk or strengthen
    their arm or legs because they absolutely did not want to get well. So it was a relief to be transferred to the 42nd General
    Hospital where it was acute care, major fractures, things of that nature that we treated. If they were seriously wounded,
    like Hal (Mr. Horstman was in Germany, head and back injuries) they would be flown out or taken out by water, back to
    the United States. Morale was better and attached to that hospital was a prison ward where I had Japanese prisoners of
    war. They were fantastic patients. They absolutely refused to believe that the war was over plus they were Imperial Marines.
    I don't remember the height. They had to be almost six feet to be in the Imperial Marines which was very tall for the
    Japanese.
- speaker: Respondent
  text: We were given a book which I still have, a primer on how to converse with the Japanese and I still remember the word
    for pain "EV-A" I could never, I won't say never but I could say rarely did a Japanese prisoner of war say "EV-A." Their
    tolerance for pain was very high. Those days in physical therapy we would force or stretch to get movement. Today we do
    it differently. They would never say "EV-A." I'd have to read the body language to see if I was hurting them. There would
    be the sweat, the redness, the flushing, the grimness of the mouth, but they would never admit to pain. They were fantastic
    patients. I am sure today people would be appalled if I said my best patients in the war were Japanese prisoners of war,
    honestly, it's true. But then on the other hand you recognize that the American GI did not have the motivation to get
    well; he'd go right out into battle. It was different motivation on the two parts.
- speaker: Interviewer
  text: So you were in Saipan then - when the bombs were dropped?
- speaker: Interviewer
  text: So that must have been good news that the war was coming to an end.
- speaker: Respondent
  text: Yes, the bomb was loaded on an island we could see in the distance - Tinian, seven nautical miles away. It was good
    news. To this day I remember the smell of burning flesh. The planes coming in would have injured or would crash on landing.
    We'd get these terrible burn patients, but not for long, because then they'd airlift them back to the states.
- speaker: Respondent
  text: When I came out of the service, after a hospital stay, I went to work at a new hospital opening in Park Ridge, Illinois
    private practice and then began teaching weekends for the Illinois Department of Public Health what we call restorative
    nursing. I would teach nurses rehab techniques. We were at a restaurant in Des Plaines when a plane crash-landed. It had
    just taken off from O'Hare and crash-landed. We immediately ran out into the street, Oakton Street, which is not that
    far from O'Hare. I immediately flashed right back to Saipan with the smell of burning flesh. It was terrible.
- speaker: Interviewer
  text: What year might that crash have been?
- speaker: Respondent
  text: I believe in the 70's. It was a major air crash. I think it was an American Airlines that crashed shortly after take-off.
    They all perished.
- speaker: Interviewer
  text: And the food in Saipan wasn't very good.
- speaker: Respondent
  text: Horrible. Horrible. I blossomed up from a 110 to 140 because I lived on the chocolate milk, avocados and pineapples.
    My mother was shipping me food. And to this day I cannot eat lamb because all we had was mutton, mutton, mutton.
- speaker: Interviewer
  text: Yes, strong tasting.
- speaker: Respondent
  text: Terrible, terrible food.
- speaker: Interviewer
  text: Were there ever any USO shows or visiting entertainers on Saipan?
- speaker: Respondent
  text: We had some, nothing major that I can think of, no major entertainers, no, not really. Our biggest form of entertainment
    was Officers' Clubs where they would have noncommissioned GI bands.
- speaker: Interviewer
  text: So were you allowed to fraternize with other male officers?
- speaker: Respondent
  text: Male officers, but not the non-commissioned GIs. I could not go out on the island without two GIs, both carrying weapons,
    as if the Japanese were going to capture me. Forget it. Our compound, of Quonset huts was ringed by a fence of probably
    8 feet to keep the Japanese out. At that time there were just eight other nurses, and one Red Cross and myself, females
    in that compound. But the Japanese were not interested in breaking into our Quonset huts; they were interested in breaking
    into the kitchen for food because they were starving in caves on the island.
- speaker: Respondent
  text: It was very restricted on the island. As I said, I couldn't go anywhere without two men escorting me.
- speaker: Interviewer
  text: You mentioned that your mother sent you packages of food from home. So was it relatively easy to stay in touch with
    people back home with mail?
- speaker: Respondent
  text: Right, it was very easy except I sent tons of pictures that my mother never received because they were apparently
    confiscated.
- speaker: Interviewer
  text: Because of censoring?
- speaker: Respondent
  text: Probably the pictures of Japanese two-toed shoes and helmets we'd see on the beach, of the barges, landing craft that
    was still cluttering the beaches. I liked beaches so I would try and get to the beaches. But they were restricted to officers
    only. I was dating an enlisted man at the time so I would have take my bars off and put them on his shirt so he could
    get in to the officers' beach.
- speaker: Respondent
  text: He was one of the men from the band playing at the Officers' Club and we'd sneak into these beaches which in hindsight
    was not smart because they were still littered with landmines. I lost a physical therapist friend because she was careless
    on a beach and was killed.
- speaker: Respondent
  text: I enjoyed my time in Saipan because I prefer warm weather and could practice my physical therapy and bowling, using
    coconuts as bowling bowls.
- speaker: Interviewer
  text: But there was still this regimented, restricted kind of existence. So how many hours did you have a day or did it
    depend on the number of cases?
- speaker: Respondent
  text: No, they had regular hours. I would think, I don't know for sure, but I know we started at 8 and then we worked until
    late afternoon.
- speaker: Interviewer
  text: Were they able to show any films or movies?
- speaker: Respondent
  text: No, not in my area, no. We had literally no entertainment except the Officers' Club that I mentioned. But I was just
    a little over 21 so I was not into drinking yet.
