collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Could you back up a little bit? And you were mentioning the superintendents' meeting and what had happened regarding
    the site of Flight 93.
- speaker: Respondent
  text: During the superintendents' conference at (in audible), Pennsylvania, there was a small group of National Park Service
    staff, led by Regional Director, Marie Rust, who visited the Flight 93 site in Shanksville. My understanding is they met
    with the owner of the property and his son. And both of those folks expressed an interest in the Park Service being a
    part of, or, in some way memorializing that site.
- speaker: Respondent
  text: The site is still very raw. My understanding is it's still closed to the public because there's active debris still
    in the area. Although the majority of it has been removed from the ground, there's still items there, in the trees. And
    I believe they had a windstorm there the day before the visit. And there was still debris that was coming down out of
    the trees even then.
- speaker: Interviewer
  text: Good point. I'll have to - we'll keep that in mind.
- speaker: Respondent
  text: My other point was about what will happen at the World Trade Center, because I think that there have been remarks
    that I've seen in the media that the Mayor and the person who owns that site speaking to how those sites will be rebuilt
    and that there will be buildings there. And I'm interested in - interested to see how that particular philosophy reconciles
    itself with the American need to memorialize the places where it happened.
- speaker: Interviewer
  text: Important point. I'd like to get back into that, actually, as we go on in the interview, if I could.
- speaker: Interviewer
  text: I think that that's ultimately going to be an important - what we're going to have to look at and -
- speaker: Respondent
  text: I think it's a huge point.
- speaker: Interviewer
  text: Yeah. Yeah. And we've got to be ready for it. If I could just back up a little bit, what - on the day that this occurred,
    on the 11th of September, could we start at the very beginning -
- speaker: Interviewer
  text: '- when you were immediately aware of what had happened?'
- speaker: Interviewer
  text: And, basically, what happened next and what came down?
- speaker: Interviewer
  text: Just start right there.
- speaker: Respondent
  text: Okay. Let me give you the where, first, because that probably is interesting in and of itself.
- speaker: Respondent
  text: I was in a meeting about three miles south of the park with the local Tourism Council. So, there was a pretty good
    cross-section of the community that I was with at that time. And it was in a facility that is very rustic. And it was
    basically a retreat or conference kind of facility called Camp Folkwood [best guess]. And the whole purpose of being there
    was we were having a retreat to discuss just general tourism issues for this camp.
- speaker: Respondent
  text: As that meeting started, they made the announcement that the World Trade Center had been hit by a plane. And the interesting
    assumption in the room was that it was a small plane. So, we - at that point, they set up a TV for us to watch what was
    going on. So, we were - I don't recall whether - we saw the second plane that went in. We saw the damage from the first
    plane and then we saw the second plane go in on TV. And we were watching something called, I think it was News International.
    It was a cable channel.
- speaker: Respondent
  text: And as the first - after the second plane went in, it was obvious that I think that was the shift between it being
    a plane crash, a plane gone awry, and some kind of terrorism event.
- speaker: Respondent
  text: And so, I was on the phone at that point with the Chief Ranger there at the park. And basically, I said had he heard
    that two planes had hit. We were simultaneously holding an Emergency Medical Services meeting here in the park with all
    the coordinators from all the parks in the region. And he was - he was attending that. And so, we were talking back and
    forth on the phone. And so, I asked him if he had heard it. And I said, "Let's just make sure our people are kind of tuned
    up and watch, you know, just be on a little higher alert status, but get more people on the screen at that point."
- speaker: Respondent
  text: So, we did that. It was shortly after that - we watched, I guess, the south tower, the side that came down first.
    We watched that. And then the next thing that we heard was that there had been a plane crash at Camp David. And, at that
    point in time, the room kind of turned to me like, you know, what's going on.
- speaker: Respondent
  text: So, I went - in the particular place I was in, my cell phone - there was no cell phone coverage. So, I couldn't get
    on my cell phone. I went to get a hard line. As I picked up the phone, the entire trunk system for this area went down.
    And there was a - there's a message display on the phone that tells you the status of the phone. And it was not just that
    the line was busy, that there was too much traffic; the trunk went down, which is like the main line that all the other
    lines feed into.
- speaker: Respondent
  text: So, at that point in time, I went out, got in the car, got on the radio, and said, "Have you heard anything?," talking
    to the Chief Ranger. And he said no. And I said, "Well, I think it's probably time that we meet up because we're going
    to get the media onslaught, whether this is true or not."
- speaker: Respondent
  text: So, he started - he was - he basically came out of the - he told the other EMS coordinators what had happened. And
    they basically [returned to their ambulances]. And then he started moving towards the visitor's center. I agreed to meet
    him there because that was sort of the closest point for us to get together.
- speaker: Respondent
  text: I went back into the tourism meeting. And those people were visibly shaken at that point in time. It had turned from
    an event that was some place away to something that was happening literally around that corner, from where they were.
    And then so they were very upset. They wanted to know what information I had. And I told them I did not have anything,
    but I felt like that they were all safe where they were and that - but I had to go into a meeting.
- speaker: Respondent
  text: And it was kind of awkward for me because, at that time, I was the interim president of the Tourism Council. So, it
    was supposed to be the sort of changing-of-the-guard meeting between the old president and the new president. It was a
    planning meeting to sort of set up for the next year. And the real irony is it had been postponed from the summer. It's
    normally a June meeting for us. And we had had such a busy year that we couldn't get to get people together on dates.
    So, we decided to bring it as a fall meeting. We basically struck out twice for the same meeting, you know. It just wasn't
    to be in that particular year.
- speaker: Respondent
  text: So, anyway, we left the meeting. And I didn't realize it at the time, but it was such an impact on me [and everybody
    else] at that point in time. And I came down to the visitor's center. And as I'm driving down, the Administrative Officer
    came up on the phone and said, "We're being deluged with calls here. What do you want us to tell them?"
- speaker: Respondent
  text: You know, and I said - literally, every line we had was lit and rolling over at that point. And I said, "Just tell
    them that it's an unconfirmed report at this point in time. We don't have anything."
- speaker: Respondent
  text: So, I got to the visitor's center and -
- speaker: Interviewer
  text: This is regarding Camp David?
- speaker: Interviewer
  text: Okay. Go ahead.
- speaker: Respondent
  text: So, I got to the visitor's center. And the chief ranger and I hit the door at just about the same time. And he said
    Secret Service had requested a closure, you know, and sort of an expanded security [presence], which is what we do when
    - we had done it occasionally before September 11th. And now it's fairly regular for us, something that's happened probably
    three out of four weekends, probably two out of four weeks in the month.
- speaker: Interviewer
  text: Since then, you mean?
- speaker: Respondent
  text: But, during that time, it was - it was only when we had a visit and we had, you know, a head of state aboard that
    we would - an additional head of state beyond the President that we would do something like that.
- speaker: Respondent
  text: And so, we - the other thing that happened kind of - the other person who was standing in our visitor's center, oddly
    enough, at that point in time, was the - there was a ranger from the State Park side. And we work fairly closely with
    the State Park System here just because the state park was actually part of [original] park back in the '50s. And just
    being across the road, you know, we're neighbors and we work like neighbors, clearly. So, he was in the visitor's center
    and he said - the park manager on the other side sent him over and said, "You tell us what you need."
- speaker: Respondent
  text: So, at that point in time, we were trying to close the road. And we were scrambling for barricades - we keep a standard
    barricade package down there. But we were scrambling to get that up. And we were short on people because we were trying
    to get people out on patrol. So, basically, the State Park actually put their cruiser in the road, you know, to hold it
    while we got the barricades set up -
- speaker: Respondent
  text: '- and begin to deal with that. So, we feel good with the way that we work with the State anyway, but that was just
    an example of where the boundary lines kind of started to blur for us, I guess.'
- speaker: Interviewer
  text: Mmhmm. Go ahead.
- speaker: Respondent
  text: And then I guess the next thing that happened was that we got that closure in place. And we were doing - well, we
    had to close essentially both ends of the park - both central roads So we got that closure in place and then that basically
    sealed up the center part of the park.
- speaker: Respondent
  text: And, at that point in time, I moved back down here.
- speaker: Interviewer
  text: This was - I'm sorry - this is back down here from the corner there where you had called for the barricades?
- speaker: Respondent
  text: Yes, from the visitor's center to headquarters.
- speaker: Interviewer
  text: Oh, the visitor's center. Okay. Go ahead. I'm sorry.
- speaker: Respondent
  text: So, we - I moved down here. And a couple of things kind of happened pretty close to simultaneous.
- speaker: Respondent
  text: I walked through the door and the person who was working the front desk said, "Your wife called, and your sister called,
    and your parents called. And they want to know if you're okay." And so that was sort of what was happening across the
    park at that point in time, lots of phone calls from families. I mean people as far away as California were calling to
    check on people that they knew here.
- speaker: Respondent
  text: The hard part during that is to - I guess the next thing that kind of happened was, I got a phone call out to my wife
    and I said, "Call the family and tell them I'm okay." And then the next - the next call was from Secret Service. And they
    just wanted to confirm that they had not heard of a plane crash. And their quote to me was, "But we're not talking to
    the media."
- speaker: Respondent
  text: And I guess my feeling at that point in time was that I needed to do that to try to begin to dispel that rumor that
    was out there.
- speaker: Interviewer
  text: Oh, okay. At that point, the Secret Service called and confirmed that there had been no strike on Camp David.
- speaker: Respondent
  text: Mmhmm. Mmhmm.
- speaker: Respondent
  text: Well, they were not calling for that purpose. They were calling to coordinate the closures and the security.
- speaker: Respondent
  text: But that was the first item, the first issue, that we needed to deal with was, you know, had that happened, had it
    not happened. Because had it happened, I've got a whole other set of priorities I've got to deal with. If it doesn't happen,
    I've got a whole set of different ones, you know.
- speaker: Respondent
  text: So, we - they said, "We're not talking to the media." I said, "Well, I think I'm going to." So, at that point in time,
    basically the park staff were to handle - the administrative staff had become sort of the front line in dealing with the
    media. And they were just passing the unconfirmed report story. And then we went from that to "there has been a plane
    crash in Catoctin Mountain Park." And because of that, I think that the interest was ratcheting up - again - I think that
    there was sort of the feeling that maybe the government's not telling us everything. And so, we tried to filter as many
    of those calls as we could. But that - I think I did, like, I don't really remember - that day is kind of a blur.
- speaker: Interviewer
  text: That's okay. That's great.
- speaker: Respondent
  text: I did probably two or three television standups, a couple of radio stations, two local newspapers. All that kind of
    evolved from about 11:00 to about - for the rest of the afternoon. And the idea was just to get the message out that there
    had been no plane crash and that some - a senior official was saying it; it wasn't a public information officer or somebody
    way down in the organization who would get rolled over at that point or at some later point in time.
- speaker: Interviewer
  text: So, you basically did this so - got this out that there was no plane - that there had been no plane crash at the park.
- speaker: Interviewer
  text: Did this reach Camp David, I mean Camp David as well, or just the park?
- speaker: Respondent
  text: Well, the reason that we said it that way is that, technically, anything about Camp David is supposed to come from
    the White House Military Office.
- speaker: Respondent
  text: Oh, excuse me, the White House Press Office.
- speaker: Respondent
  text: And so, I wanted to not spea
