collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Respondent
  text: I don't remember what time it was, but we report to work at 8:30, and we have about an hour before we actually open
    Arlington House to the public. So, those of us who were working that day, most of us were here in the office doing things
    to get ready for the day, and somebody said they had the radio on, and the first announcements had come over the radio
    that a plane had hit the World Trade Center. I believe after the second plane hit, we went into an individual’s office
    who had a small television, and we turned the television on, and we were watching the coverage of the events in New York.
    I was there, Colleen Curry, Linda Kacmarcik, and maybe someone else. We were in Malcolm Willoughby's office watching this
    on television.
- speaker: Respondent
  text: At one point the phone rang, and the telephone call was for me, and it was our coworker, Keena Graham, who was at
    home. She might have actually called in and told us about the attack initially. Maybe that's the person who had told us
    what was going on. While I was speaking on the phone to Keena, we heard almost what sounded like maybe a minor car collision,
    and the building shook a little bit. So, I told her to hold on, and I needed to go see what had happened. And we looked
    around the building to see if, perhaps, a car had hit outside, or if something had fallen over, and we didn't see anything.
    And just a few moments later, the news started to come across that the Pentagon had been hit.
- speaker: Respondent
  text: So, at that point we went outside, and we looked, and of course we could see the smoke, and we could hear all the
    sirens, and we watched, essentially, the fire at the Pentagon for a while. At the time, the senior-most person on our
    staff was not here; he was in a meeting up at our headquarters away from the actual site, so shortly after the plane hit
    the Pentagon, I called up to headquarters to find out what we should do. I think by this time the house had opened to
    the public, and while I was in the midst of talking to people at headquarters about what to do, we lost phone communication.
- speaker: Respondent
  text: So, we closed the house, and evacuated all the visitors. I believe Keith Drews and other people were at the house,
    and actually took care of closing down the house, and we were told to go home. We left individually at various times.
    I stayed around for perhaps another hour or so, to assist with any last-minute things we needed to do to close the site,
    and I think I might have left around, perhaps, 11:00 o'clock or 11:30.
- speaker: Respondent
  text: Getting out of the city was a real challenge, because there was so much traffic, and they had closed down so many
    of the roads, so leaving, it took quite a while. I live about five miles from the site, and it took, I think, over an
    hour to get home, because the roads were so congested. I had actually tried a couple of times to get off of Route 50 to
    find another way to get home, and everything, essentially, had been closed down. They were pretty much funneling everybody
    onto one or two major arteries, and not letting anybody go either direction on any of the secondary roads.
- speaker: Respondent
  text: I went home that afternoon for a little while, and I decided later in the afternoon to go over to what used to be
    Arlington Hospital - it's been renamed - where they were taking some of the Pentagon victims, because I was a volunteer
    at the hospital, and I decided maybe they could use some extra help that day. So, I went over, and at the time I arrived,
    there were actually family members of Pentagon victims arriving, and asking about their family members. I volunteer, actually,
    on the Oncology Ward, and I went up and said perhaps I could help and free up somebody else to assist with the Pentagon
    victims.
- speaker: Respondent
  text: And it was very bizarre. Everything at the hospital was actually very calm, and they said thank you, but really, we're
    pretty well covered. And of course, later in the day and the days to follow, we would find out that there had been very
    few survivors - victims - to take to hospitals from the Pentagon. If I remember correctly, I believe the site was closed
    the next day, and I didn't come to work, and when we did return to work, and resumed regular operations here, that is
    to have the house open to the public, we instituted some new security measures; we really went on high alert, and had
    lots of extra people out roving the grounds, keeping an eye on things, making sure we were very tight about not having
    any unsecured areas open. We kept the museum and our exhibit closed for a number of days; since we can't man those areas,
    we didn't want to have those open.
- speaker: Respondent
  text: And relatively quickly, the way Arlington House functions, we actually returned to normal fairly soon. One of the
    few things that affected us, I suppose, was we were accustomed to either arriving at work or leaving from work through
    Fort Meyer, which of course, that was immediately closed down to the public, so we were no longer allowed to access our
    work site through Fort Meyer, and for quite a few days the roads that run essentially in the immediate vicinity of the
    Pentagon were closed, as well. So, it was quite limited how we could come and go from work for a number of days.
- speaker: Interviewer
  text: Mmhmm. How did you come in?
- speaker: Respondent
  text: How did I come in that day?
- speaker: Interviewer
  text: I mean, if you couldn't use Fort Meyer, did you come up through [in audible]?
- speaker: Respondent
  text: Oh, to come into work, we would have to get onto the George Washington Parkway, and enter work through the main cemetery
    entrance, and then for a few days, to exit. Obviously, you couldn't drive by the Pentagon, so for a number of days - in
    fact, I think that went on for several - at least a couple of weeks - so that meant leaving either by Route 50, or actually
    going practically into Alexandria.
- speaker: Respondent
  text: In terms of how things at - as far as how our site operates - there haven't been a lot of long-lasting impacts from
    September 11th. As I said, we developed some new security measures that we kept in place for a while, and we try and operate
    by those when possible, but we really usually don't have enough staffing to have quite as much extra security in terms
    of having our personnel out roving the grounds, as much as we would like.
- speaker: Respondent
  text: The only real incident we've had since September 11th is a number of weeks - I believe it was quite some time after
    the attacks - there was a gentleman on site, and he may have been of Middle Eastern descent. I wasn't really highly involved
    with the incident, but apparently, he made comments to someone to the effect that the Pentagon wasn't going to be there
    much longer, or something along those lines, and so instantly - almost, it seemed like - there was a large presence -
    when this was reported in. There was a large presence of Park Police, and other law enforcement officials here, and that's
    really the only incident I can think of in terms of a threat, or anything perhaps somewhat related to September 11th,
    that's happened here since the attacks.
- speaker: Respondent
  text: In the days immediately afterward, of course, our visitation was quite low. In fact, access to the cemetery for the
    public was essentially - the cemetery was closed, I think, to the public on September 11th, and I think on September 12th,
    as well. And many people who come to the cemetery now, of course, ask, "Where is the Pentagon?" and "Were you working
    on that day, and did you see it?" and things of that nature.
- speaker: Respondent
  text: To my knowledge, nobody on our staff saw the plane hit the Pentagon, but we believe that the instant that we experienced
    here, thinking that there had been a minor collision outside, or perhaps a car had hit our building, and the impact that
    actually shook our office building, as far as I know, that was the plane hitting the Pentagon.
- speaker: Respondent
  text: Two of us were standing out front shortly after we heard that the Pentagon had been hit, and if I remember correctly,
    the plane was all white, or all silver - it didn't look like an ordinary commercial plane - and two of us observed this
    plane fly essentially directly over our office building, which was very unusual. That's not a traditional flight pattern
    for National Airport. And we looked at each other, and essentially said, "What was that?"
- speaker: Interviewer
  text: When did this happen? Just before the crash or how? When did this occur?
- speaker: Respondent
  text: I think this had happened just a very short time after we received word that a plane had hit the Pentagon, because
    at that point, pretty much, everybody went outside and started, of course, to look over toward the Pentagon, and it was
    a short time after we had heard that two of us were standing right out in front of our office here, and noticed this strange
    - this unusual plane fly directly over the house, and we commented what was that? It didn't look like a commercial plane,
    and it was not in a traditional flight path. It may have been a military plane, but unfortunately, I really don't remember,
    other than seeming to recall that it was white or silver or not a traditional, commercial flight.
- speaker: Interviewer
  text: About what time did that occur? If you could give me an approximation of when that was?
- speaker: Respondent
  text: I would guess this would be, perhaps, between 10:00 and 10:30.
- speaker: Interviewer
  text: Mmhmm. Okay. You were mentioning a couple of things here of interest. All right. Now, let's see if I could backtrack
    here what was going on. You had gotten there early in the morning, before 8:00 o'clock, and you all were at your offices.
    And you, Linda, Colleen, were in the office, and then the first announcement was the World Trade Center got hit, and then
    you heard the announcement that another plane had hit the World Trade Center, so by that time you were in that office
    watching the TV together.
- speaker: Respondent
  text: Right. Now that I think back, I'm almost certain that Keena Graham, who was an employee here, but happened to be off
    that day, was at home watching the news, and she is the person who actually alerted us as to what was going on. We weren't
    listening to the radio, we didn't have the television on, and I believe she called in and told us about the attacks on
    the World Trade Center, and I believe by that time the second plane had already hit. So, at that point we went into Malcolm
    Willoughby's office and turned on the small television that he had and watched coverage of what was happening in New York
    for quite a while.
- speaker: Respondent
  text: And eventually, Colleen, our curator who was doing an inventory that day, she left, and it was after Colleen had left
    that we later learned that a plane had gone into the Pentagon, and I went over to tell Colleen and a colleague, Mary Troy,
    who was here helping with the inventory, to tell them that the Pentagon had been hit. And that's when, really, there started
    to sort of be more of a feel of chaos here at the site, particularly because, as I said, the senior-most person was not
    here, and so at that point, we really needed to start making decisions about what did we need to do, and trying to evacuate
    visitors and staff safely and quickly.
- speaker: Interviewer
  text: Mmhmm. All right. Did you evacuate staff? What did you do to evacuate staff and that kind of thing?
- speaker: Respondent
  text: When I was - when I called up to our headquarters to discuss what we should do, after I learned that the Pentagon
    had been hit, I was very worried, because I actually reached one of the secretaries, and obviously that was not going
    to be the person who was going to make the decision, and I was very concerned about the safety of visitors on the site,
    and I wanted to, essentially, close the house immediately. She was checking with our Deputy Superintendent as to whether
    we should close the house or not, and just about the time that - she couldn't find the Deputy Superintendent right at
    that moment - I was, I think, on the verge of saying I'm going to close the house, and it - I think she had just said
    - they were shouting back and forth at headquarters - and I think she had just said, "Close it," when we lost our phone
    communications here.
- speaker: Respondent
  text: So, at that point, we got word over to the house to close the house to evacuate visitors, and then staff, essentially,
    were told to leave immediately. As I said, people left individually, sort of of their own accord when they decided to
    go. I stayed around a little later, as did Frank Cucurullo, and I believe perhaps Keith Drews might have stayed later
    to take care of the last minute things of closing down the house, because we didn't know, of course, exactly when we would
    be returning to work, so we had to secure our buildings and things like that.
- speaker: Respondent
  text: I remember being one of the last people to leave. A number of other people had left earlier, and I do remember after
    the Pentagon had been hit. One of our employees, Joy Kinard, had gone over to look, and she came running across the lawn,
    and looked very nervous and upset, and she called someone on the telephone, and said, "Oh, my God. I've got to get out
    of here. I've got to get out of here." She may have been one of the first people to leave.
- speaker: Interviewer
  text: Mmhmm. Did the public leave pretty quickly, the people that have been looking through the house, and around the house?
    I mean, did they hang around?
- speaker: Respondent
  text: I would assume that people left very quickly. I stayed on this side of the site, where the office areas are to tell
    staff here, and to tell people that we were to leave - to close our buildings and leave the site, and the Rangers who
    were working in the house when it opened at 9:30, took care of closing the house. I think Keith Drews was over there,
    and perhaps Joy Kinard, and I'm not sure who else. They actually took care of closing the house, and evacuating visitors,
