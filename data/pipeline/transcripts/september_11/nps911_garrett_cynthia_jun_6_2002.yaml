collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Cynthia, would you please just recount what you recall about what happened on September 11 beginning with your first
    awareness that something was going on?
- speaker: Respondent
  text: Sure. Yeah, and here we are however many months later - eight months later and I can still recall it very clearly.
    It was a beautiful day, beautiful blue sky and I came in - I was set to meet with the new mayor of Jersey City, Mayor
    Cunningham at 10 o'clock and give him a tour of the South side of Ellis Island. And so, I came in probably about 8:30
    - probably between 8 and 8:30 just so I could get myself settled, do some things to come in.
- speaker: Respondent
  text: I also knew that, that day was the first day that the superintendent would be back in town. She'd been on - as you
    know she was on SES training program and had been out of the park for several months and this was her first day back.
    She was going to be back for several weeks and so I was anticipating making sure everything was in place for that.
- speaker: Respondent
  text: And at about a little after 8:30 the - on the radio - the park radio channel - I started hearing, you know, there's
    been a plane crash and started hearing some radio traffic. And I called Lieutenant Pappas and I said, "Chris let's go
    out there and check it out and talk about what's happened. Can you meet me out there?"
- speaker: Respondent
  text: At that point all we knew was what people were hearing on the radio. And it said a plane crash. And we went out to
    the sea wall behind the wall of honor to look at that incredible view that we have of Manhattan and you could see huge
    flames pouring out of - of the trade center and a gaping hole. And when I was - you know, when I thought a plane crash,
    what came to my mind was those scenic over flights or some news helicopter, someone who had done something crazy or risky
    had gotten too close. And it didn't quite process in my mind because there was a gaping hole and flames leaping out of
    there.
- speaker: Respondent
  text: So, the lieutenant and I watched it for a little bit. I asked him if we had any intelligence that this was anything
    related to terrorism. I had been to a terrorist training seminar in May - that the park police had brought in an anti-terrorism
    expert.
- speaker: Respondent
  text: And so, my level - and of course working in this park, my level of awareness of terrorism was certainly higher than
    perhaps most people. But again, I still - you didn't compute that, that was really a possibility. And he said, no, we
    have no intelligence whatsoever at this point.
- speaker: Respondent
  text: And so, we decided everybody just needed to be on high alert. But that for right now basically there was a tragedy
    clearly that we were dealing with, but right now it didn't directly affect us and perhaps we could even help because we
    were some place besides right down there.
- speaker: Respondent
  text: So, I went back inside, and most people were staying outside watching it, but again I was getting ready for Diane
    to come back and getting ready for Mayor Cunningham. Went back inside and just a little bit later the thing that I remember
    the most is Linda Devaux running to get me and saying, Cynthia, it's not an accident we're under attack. Another plane
    has just, you know, flown into the building. I mean, she was just running and it's like, we are under attack. It is clear.
    Hearing the second plane - while I think there's a piece of my brain that didn't want to process it, there was also, as
    probably with your brain you had to process it. And of course, the immediate reaction was evacuate Liberty Island. Get
    those people off of Liberty Island because of course we've always known that the Statue of Liberty is a target - is a
    high risk - was always at risk for a terrorist attack. And frankly, you know, I thought she was next. And she could have
    been next.
- speaker: Respondent
  text: So, we started the evacuation of people from, from Liberty Island at the same time the staff - and actually we directed
    the staff boat that was on its way from MIO - bringing people from MIO - to go to Liberty Island and get those people
    - that was the most important thing.
- speaker: Interviewer
  text: Yeah, I was on the staff boat, so I experienced that.
- speaker: Respondent
  text: Oh, yeah. Get those people off Liberty Island. That was the most important thing was it was, you know, just get everybody
    off there. And let's re-group and try to understand what was going on. At the same time, because we didn't - I mean, we
    didn't know - under attack, what does that mean? That could mean more planes. It could mean bombs coming from other places.
    And as it turns out it meant different things to different people. That, that reaction - and we evacuated the building
    at Ellis as well. We tried to keep everybody calm, but at that point we were functioning with so little information that
    - we were just trying to regroup people, make sure they were all out of the building and try to sort out what - what to
    do next.
- speaker: Respondent
  text: When the boat came back with the people evacuated from Liberty Island the next question is, what do you do with those
    people? And in conferring with the lieutenant and Frank we said, well, get them back if they want to go back to Manhattan.
    Go home, obviously the park is closed. That made me nervous frankly, but I don't know that we really thought, well, what
    are we going to do with them here? Then they're all stuck here.
- speaker: Respondent
  text: As it turns out, sending them back to Manhattan and relatively soon after you got to Manhattan all hell broke loose
    there. And thank God no one was injured as a result. But that wasn't really something that we'd thought through that clearly.
- speaker: Respondent
  text: And so that's - that's sort of the immediate of it. Part of what I was trying to do was try to keep people calm and
    try to soothe people. And I didn't feel that I could protect any one from anything. I know in my discussions with Frank
    Mills, one of his reactions was he was going to protect the site. Well, from my skills I was going to help people deal
    with things and, you know, there was somebody who had been on Liberty Island who was crying. And I went and I talked with
    her and just sort of - I mean, there's not much you can say, but I patted her on the back, and I couldn't say it was okay,
    I didn't know it was okay. And that was what my concentration was.
- speaker: Interviewer
  text: How did you experience the development of the triage operation?
- speaker: Respondent
  text: The triage - I guess from my perspective it was sort of an obvious - and it was something that everybody who was there
    could get into. Again, I don't have EMS training at all, so I wasn't going to be part of it. But it was giving people
    something to do where they could help. And I think that was part of what we were all feeling is, okay, we're safe now
    what can we do. And I think we were hopeful that we would get to help a lot of victims. And again, we were hesitant about
    having too many people in the building. We were still just staying outside.
- speaker: Respondent
  text: And there were two aspects of that. One, everybody wanted to help. And so initially everybody started to put on gloves
    and said, okay, I'm going to play EMT. And it's like, well, wait a minute you can't - you might make things worse, plus
    you put yourself at a risk. So those people who have emergency medical training, you know, go in to one area. And there
    were some people who I hadn't realized had emergency medical training.
- speaker: Respondent
  text: And the other people, we'll find something else for you to do. There's going to be lots to do, but let's make sure
    that we keep people doing what they have the training to do.
- speaker: Respondent
  text: All of the professionals that were coming over from Jersey City I guess, again, what I felt like I could do was just
    keep things smooth - as smooth as I could so that they could set up their operations.
- speaker: Respondent
  text: I know the grounds crew were really, really helpful. Mabel and the rest of the grounds crew were really helpful in
    moving the carts and helping them bring the supplies on board. And I can remember seeing Mabel going back and forth, and
    back and forth. And she had a certain - she had a look on her face that concerned me. And I went over and talked to her
    and at one point I said, "thanks for, you know, doing so much and are you okay?" And then in talking with her and she
    was talking about how she had been on Liberty Island and heard the plane and saw it come so close as of course it did.
    And she kept saying, "I will never forget that sound. I will never stop hearing that sound as long as I live." And periodically
    I would go to her during the whole day, but she kept helping people. And finally, I said, "have you eaten something? Have
    you - you know, maybe it's time for you to slow down and things are under control."
- speaker: Respondent
  text: There was somewhere in there - I think it was before we started bringing people over where we allowed people back
    in the building to call - to make phone calls because - and of course I had my cell phone, but you got no signal whatsoever.
    I wanted to call my husband and tell him, you know, I hadn't gone in to town today, not that I had planned to, but, you
    know, given where we were you never know that you might not run up to Manhattan to Federal Hall or something, and that
    I was okay. And I did get through to him.
- speaker: Respondent
  text: I wanted to call my parents. I didn't get through to them, but he finally did. And that's what everybody wanted -
    to touch base and say, we're okay. We're here and we're okay. And so, we allowed people in for short periods of time.
    I also had to call the regional office and say, "we're okay but we're closed."
- speaker: Respondent
  text: And it almost sounded like - seemed like an absurd thing. Of course, we didn't realize at that point that anything
    else was happening in the rest of the country. We hadn't heard about the Pentagon at that point. And we had no radio on.
    Of course, we were outside. We had - eventually we had a TV on in Diane's office that we got barely any coverage from
    just because the antenna or something. I mean, we just didn't get a good signal.
- speaker: Respondent
  text: But we watched, and we waited for people to come. And there were initially - there were some seriously injured people
    who came, I think on a police boat, and they were taken away. And I guess I was trying not to be in the way for the emergency
    medical treatment.
- speaker: Respondent
  text: And we truly did expect lots and lots and lots of people. I mean, I think we really expected to be like a triage the
    way you think about a triage in a war situation. And of course, we got - I don't know, about 350 people and lots of them
    were covered with dust.
- speaker: Respondent
  text: And people had, you know, we made them sign in. We tried not to be too bureaucratic, but we didn't want just people
    roaming around. We then took them in groups to the bathroom. Then there was one group that - one older man that came in
    and the ranger or whoever, there was no one around to take him to the bathroom and I said, come in with me I'll take you.
    Don't worry there’s nothing - you know, you're here and, you know, we'll help you here. There was also - and if you haven't
    interviewed her, Catherine from the Family History Center.
- speaker: Interviewer
  text: We haven't, but I've been advised that it would be a good idea.
- speaker: Respondent
  text: Yeah, she - I mean she was - there are some people who really stick out in my mind for their emotional reaction. And
    partly as I said because I was trying to help people. And there are some people who stick out in my mind more for how
    they were helping, and she just went right into - you know, she was worried about the people who worked for her. And there
    was one woman in particular that we hadn't seen, but we figured she had just like, left like with Dottie. Some of the
    people got in their cars and they got the heck out of Dodge as soon as they could. And of course, once you left the park,
    you weren't coming back in because they shut everything down very, very solid.
- speaker: Respondent
  text: But Catherine was very good with people and you know she would periodically come by and we would talk, and she'd tell
    me about the people. She figured out how to make a diaper for some woman who had a child - a baby - with her. And she
    had worked in - she had lived in Kenya and of course, you know, I'd lived in Tanzania and so we sort of joked, well, all
    of our third world country skills are coming in handy now because we don't know what we're going to have to deal with.
    And then the people stopped coming.
- speaker: Interviewer
  text: I believe that was the experience of a lot of emergency treatment centers that are in throughout the city. That they
    expected large numbers of injured people and it turned out -
- speaker: Respondent
  text: And you wanted.
- speaker: Interviewer
  text: '- people were either dead or they were not terribly injured.'
- speaker: Respondent
  text: Right. Yeah, you couldn't help the people who really needed help - the people in the trade center you couldn't help.
- speaker: Respondent
  text: And the other people weren't really - I mean, it was - They were dusty, and they were scared, and they were dazed,
    but, yeah, I think that was scary to realize.
- speaker: Respondent
  text: And then - and I guess we're not going in any kind of sequence, but the sort of surreal day. I guess that's one of
    the ways that I continue to describe it. Each part of the day became more and more surreal.
- speaker: Respondent
