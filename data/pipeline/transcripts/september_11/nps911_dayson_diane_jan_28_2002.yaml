collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware of what had happened, what did you do?
- speaker: Respondent
  text: Once I entered the park and realized what was going on, I had no time to be horrified or upset. I immediately had
    to go into a role that showed true leadership and management style. That was a challenge that was brought upon me. My
    law enforcement background from my past with the National Park Service came into being immediately.
- speaker: Respondent
  text: My biggest concern was for the employees because the sites were not open yet to the public but getting the employees
    safely off the island so that they could get home to their families. That was key and the biggest challenge because we
    do everything by boat, and we couldn't go into Lower Manhattan.
- speaker: Respondent
  text: Prior to me getting there, one staff boat had already gone into Lower Manhattan and the buildings had fallen by this
    time. That set of staff experienced getting the dust and ash and being swooped onto the Staten Island Ferry and taken
    to unfamiliar areas trying to get home.
- speaker: Respondent
  text: When I arrived, another group of employees were very upset and concerned about relatives in Lower Manhattan and wanted
    to get home quickly to feel safe and comforted.
- speaker: Respondent
  text: I immediately talked with the boat captains to determine where in New York City we could drop people off so they could
    feel safe and get transportation home. We were successful in taking people to Upper Manhattan and other boroughs so they
    could get home safely.
- speaker: Respondent
  text: Those of us remaining on the island weren't quite sure what was going to happen next. The park police received a call
    that we were going to be a triage center and that they were bringing people over immediately. I identified staff who were
    first responders and EMTs.
- speaker: Respondent
  text: We contacted the New Jersey EMS team based in Jersey City and the local hospital, and began setting up a triage center.
    We got all necessary first-aid equipment and had staff strategically located and ready once the first boat arrived.
- speaker: Respondent
  text: Most people were walking wounded, not badly injured, disoriented, covered in dust. Some had fuel from the plane on
    them and had to be hosed down. Some needed T-shirts and water, so we prepared lunches. We took names and addresses to
    contact next of kin to let them know their family was safe and at Ellis Island, and that they would be escorted to the
    hospital for check-ups before going home.
- speaker: Respondent
  text: The immediate urgency was making sure staff got off the island safely and taking care of the wounded who arrived at
    Ellis Island.
- speaker: Interviewer
  text: Looking back, you mentioned the site was not yet open. Was this correct?
- speaker: Respondent
  text: Yes, the site had not opened for the public yet. Staff was doing preopening work, getting ready for the first boat
    to arrive. The first boat was scheduled to leave Battery Park at 9:30. The incident occurred between 8:45 and 9:00. Usually,
    staff is here getting ready, changing into uniform, opening sites, checking video and audio machines, and waiting for
    the first boat of passengers.
- speaker: Interviewer
  text: When you mention getting some of the video and audio machines ready, what does that involve?
- speaker: Respondent
  text: It involves turning them on and checking to make sure they are working for our tours.
- speaker: Interviewer
  text: For the tours?
- speaker: Respondent
  text: Yes, for the tours and interpretive talks. We have three theaters here showing videos. The audio includes headphones
    for visitors who walk around and listen to the history of the site. It's about a two-hour headset program.
- speaker: Respondent
  text: It's a basic setup routine we do daily to prepare for visitors.
- speaker: Interviewer
  text: You mentioned that part of the problem involved staff and part involved serving the public. Is that correct?
- speaker: Respondent
  text: Yes. Prior to me arriving, staff had begun sending people home, not realizing the severity of what had happened in
    Lower Manhattan. One boat had already gone there before I got to work. I had difficulty getting into the park because
    access was restricted through Liberty State Park. It took me 30 to 40 minutes to find a police officer and show my ID
    to get into Ellis Island.
- speaker: Interviewer
  text: How did you manage to get in? That was not easy.
- speaker: Respondent
  text: It was very difficult. By the time I arrived, the first boat had gone over, the second plane had hit, and the buildings
    were about to fall. As the first boat was going into New York, the first tower fell. That boat of staff was exposed and
    experienced the hysteria in Lower Manhattan.
- speaker: Interviewer
  text: What did you see regarding this first boatload of staff?
- speaker: Respondent
  text: The people covered with dust and fuel were not staff but those coming here for the triage center from Lower Manhattan.
    They were brought here on Coast Guard cutters for treatment and then taken to Liberty State Park to wait for transport
    to local hospitals.
- speaker: Interviewer
  text: What happened to the first group of staff who were exposed?
- speaker: Respondent
  text: Some were taken to Staten Island, placed on Staten Island Ferries and sent there even if they lived in other parts
    of New York. The priority was to get people out of Lower Manhattan quickly. The subway was shut down, so they couldn't
    use it. Police directed people onto the ferry without discussion. Some staff were concerned about this.
- speaker: Respondent
  text: Those sent to Staten Island could go to our sister park at Gateway National Recreation Area at Fort Wadsworth. Staff
    who lived there could go home and figure out how to get home during this time. Despite the devastation, there were opportunities
    for assistance.
- speaker: Interviewer
  text: They got help from friends and neighbors there?
- speaker: Interviewer
  text: There was another group you mentioned?
- speaker: Respondent
  text: Yes. Another group of staff remained on the island who were very upset. Some wanted to stay and help after hearing
    people were coming from the World Trade Center. Others were trying to figure out how to get home to loved ones.
- speaker: Respondent
  text: Those without first-responder or EMT experience were sent home because I wanted as few people on the island as possible.
    We weren't sure if the Statue of Liberty would be the next target. Once we got as many staff off as possible, I realized
    the Statue of Liberty could be a target.
- speaker: Respondent
  text: My priority was staff safety, setting up the triage center, and minimizing people on the island. Those who stayed
    were there to support the incoming people. We didn't know how many would come to assist with the triage center.
- speaker: Interviewer
  text: Once you got everybody off the island, those who stayed were EMTs and?
- speaker: Respondent
  text: We had EMT support and first responders. Some staff lived in New Jersey and couldn't leave because bridges and roads
    were closed. They made sandwiches, handed out water, took names and contact info for next of kin, helped people feel comfortable,
    made baby diapers from T-shirts, provided T-shirts, made makeshift baby bottles, and helped those without shoes.
- speaker: Respondent
  text: They took care of basic needs like bathroom access, food, water, and comfort. It was a sunny and warm day, so we helped
    people get out of the sun and feel comfortable until Jersey officials could transport them to hospitals.
- speaker: Respondent
  text: We divided responsibilities among those who remained. Jersey City EMTs came to assist, providing relief and professionalism
    in medical care. We had a medical team including our staff and Jersey City EMTs, a team to comfort people and ease fears,
    and a team to provide basic needs.
- speaker: Respondent
  text: Communication was difficult because we had very little power. Telephones, computers, and televisions weren't working
    well. The U.S. Port Police had radios and could communicate with the New York Police Department, which helped us find
    out what was happening in New York.
