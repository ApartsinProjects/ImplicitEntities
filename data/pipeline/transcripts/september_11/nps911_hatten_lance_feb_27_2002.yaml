collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware of what was going on, what all happened?
- speaker: Respondent
  text: Actually, at the time I was giving a presentation on September 11 at the Old Post Office Tower to the Federal Women's
    Program. And so, I was presenting information to the group when I received word initially that there had been an incident
    in New York. Of course, the details, this was between 9:00 and 10:00 o'clock. The details were unavailable. It was just
    indicated to me by a U.S. Park Police person who was present at the meeting, that there had been an incident in New York.
- speaker: Respondent
  text: And what happened from there was I was talking to the group, and then I got another call shortly thereafter, I can't
    remember from whom it was, but that we were here beginning preparations, emergency operations sorts of preparations. But
    at that point, it was actually unclear, the scale or scope of what was taking place. And myself, I called back to this
    building which is Survey Lodge, and I asked for someone to transport me from the Old Post Office Tower to this location,
    or Survey Lodge, so we could begin to inform both the visitors and the employees, and kind of decide what actions needed
    to be taken, and what actions that we would take.
- speaker: Respondent
  text: James Berger one of our maintenance people, he came to pick up Rosanna Wilson and I, and again, this was sometime
    between 9:30 and 10:00. By that point, I'm not sure when exactly the Pentagon incident happened, but at this point already
    in DC there was so much congestion. That was the first thing I noticed when Mr. James Berger tried to take us, transport
    us from the Old Post Office Tower to Survey Lodge. We got to 15th Street near Constitution and it was just, there was
    a gridlock.
- speaker: Respondent
  text: And I was, you know, realizing, again, that it was not localized yet, but that something was terribly wrong, and I
    wanted to get here quickly so I could begin to provide information to our staff. I - I decided - I talked to Rosanna Wilson
    and I said I'm going to - I'm going to run over there, because we were on 15th Street and Constitution, it's really not
    that far. But it seemed like traffic was so thick, it would have taken us longer to negotiate the traffic than myself
    and Rosanna running over.
- speaker: Respondent
  text: So, we kind of got the vehicle and we started to make our way over to Survey Lodge very quickly, and actually there
    was a U.S. Park Police person who kind of picked us up. They recognized me in uniform, picked both, firstly me, and then
    went and got Rosanna, and then they brought us to Survey Lodge. By this point though, what we became aware of is that
    evacuations were taking place, and within the mall area, of all the sites - and these were being managed by U.S. Park
    Police and Park Rangers. And it was shortly thereafter, and it could have been a secondary explosion, I heard a large
    sound.
- speaker: Respondent
  text: And it was somewhere, again, it could have, I don't think it was a primary explosion, it could have been a second
    one. I was out here, I was inside my office and I heard a sound, and when I arrived here, there were several employees
    already assembled here in Survey Lodge and they were watching the television. And we were just trying to get an account
    of where everyone was located, accounting for where everyone was located. And also, we were effecting communications with
    our headquarters, which is 900 Ohio Drive, to, we were getting direction from them, and also information about what was
    going on, so there was a constant communication.
- speaker: Respondent
  text: What's more, realizing that, you know, this was, realizing the scale and proportions - By this time I'm aware of what's
    going on at the Pentagon because you can along with hearing the secondary explosions, you can see it on the news.
- speaker: Respondent
  text: And you know we, a lot of us are kind of reassuring each other that you know, things are going to be all right. We're
    again getting to account for everyone, which that was effected pretty quickly. And where, what happens then? We, we, we,
    we leave one phone line open so the employees can begin to contact their families and loved ones, just to let them know
    that they're all right. I thought that that would be very important. Again, it was, I was getting calls from my family.
    I got a call from my, from my brother, for example. He caught me on my personal cell phone. He called me just to say,
    you know, how are you doing? I said I'm fine.
- speaker: Respondent
  text: And you know things here - everybody here was pretty calm. In fact, that was one of the things that impressed me,
    our, the staff was very collected throughout the course of the event. And everybody was just really collected.
- speaker: Respondent
  text: And, although there was perhaps worry on the face of people, there was no panic.
- speaker: Respondent
  text: But you know, I only can speculate now but you know, we're watching television and you see what happens and you could
    hear people saying - well - one of the buildings, one of the towers collapsed. And there is smoke on the other side of,
    of the Potomac.
- speaker: Respondent
  text: And you know, we're in a situation here where. we're watching television and there are so many conflicting reports
    about - I can remember hearing about how many planes were still in the air, and how many planes could be accounted for.
    And again, no one really at that very early stage - we were talking about between now, a little bit between 10 and 12
    - no one really had a firm grasp of what had started or when it was going to end.
- speaker: Respondent
  text: So, we had gotten a quick accounting for the staff. That happened within the first half an hour to 45 minutes. We
    knew where all of our people were, and most had - were - assembled here, and most people were assembled here, and again,
    making those contacts with family members and, kind of watching television, and - Whereas others were - Because most of
    the sites had been, the U.S. Park Police had effected closure in most of the sites. And now we're talking about, you know,
    between ten and again, ten and 12.
- speaker: Respondent
  text: But again, there was a lot of uncertainty. You just didn't know.
- speaker: Respondent
  text: You could see this thing happening on television. I think that was a dimension that was just surreal. And by - I can't
    remember what time. - we decided to - it was decided that all of the employees would be released.
- speaker: Interviewer
  text: This was about what time?
- speaker: Respondent
  text: I'm really unsure. I'm unsure of what time. We had one person…
- speaker: Interviewer
  text: That's okay.
- speaker: Respondent
  text: I'm unsure of what time, but it was very orderly, though. As far as the way - everything was very orderly, and particularly
    amongst the employees, everything was calm. Once - we have a sheet and I have to put my hands on it, which says when people
    left and all that. Because again, we were making sure we can account for everyone because again, with the uncertainty,
    who knew what tomorrow would hold.
- speaker: Respondent
  text: And we wanted to make sure that we had records, and we were making sure that all of our records were accurate so in
    case we had to call someone after hours - just those operational things that you need to do.
- speaker: Respondent
  text: Another interesting thing is that it was payroll day. It's the day that we have to send all of our payroll out so
    our employees can get paid. So, we were also making sure that that happened too, you know? I was really concerned that
    - okay - this is a crisis. I don't know what tomorrow is going to hold but the last thing people are going to need - their
    paychecks. I mean, they always need their paychecks. But people are going to…
- speaker: Respondent
  text: So, we made sure that that was taken care of. And again, we had people here in our - And so, it gave them something
    to do too.
- speaker: Respondent
  text: You know, I guess without, there was a lot of nervous energy. So, people were really coming together. We made sure
    that we had an accounting for all of our medical supplies in case we had to provide any support.
- speaker: Respondent
  text: I tell you one thing that I remember. There was a gentleman, I believe he was from Dallas. He was traveling - I believe
    he was from Dallas - but he was from out of town; he was just passing through. He was a fire fighter, and he gave me his
    card and his hotel number. He said, "look, if anything comes up let me know, and give me a call in case you need any help."
- speaker: Respondent
  text: But again, we were very fortunate that we didn't, you know, although things were in Virginia, here we didn't have
    any visitor injuries.
- speaker: Respondent
  text: Or employee injuries.
- speaker: Interviewer
  text: Well, you were mentioning you were assembling most of the folks here. This was between about 10:00 and 12:00 noon.
- speaker: Interviewer
  text: The park police had already closed the sites.
- speaker: Respondent
  text: Yes. They were, they were pretty much managing, you know, directing the visitors, what have you. And again, outside,
    again, it was, you have a lot of, you know, we're watching a television set.
- speaker: Respondent
  text: We know what's going on. And you have a lot of visitors who - they're in DC and it's - you can see the smoke but not,
    maybe not necessarily knowing what's happened in New York or what's happened at the Pentagon. And again, information was
    still sketchy.
- speaker: Respondent
  text: I know the Rangers were in an awkward position there. I can remember one ranger contacting us and saying - because
    at this time also we have to realize between 10:00 to 12:00 especially, maybe up until 2:00, traffic is terrible outside.
- speaker: Interviewer
  text: I was going to ask about that.
- speaker: Respondent
  text: Traffic is terrible. And a ranger contacted us, and they were - Visitors were asking where do we go, what road do
    we take? And, you know, it's important for rangers - we feel responsible to have answers, but we didn't have any answers.
- speaker: Respondent
  text: I mean, we just didn't know where, we didn't - No one knew the scale or scope, so you didn't really know where to
    direct, to direct people.
- speaker: Respondent
  text: And again, traffic is so bad throughout the city, it was just tough to say okay, this is where you go.
- speaker: Respondent
  text: You know, the best thing to do if you had shelter and a safe place is to remain there. And so again, most of our people
    were assembled right in this building and we were just kind of watching TV and having regular updates until everyone was
    released, and people were also staying informed again, by virtue of watching the television, but there were just so many
    conflicting reports.
- speaker: Respondent
  text: I can remember there was one report saying you needed an identification card - this was a news report - to even get
    in Washington, DC at one point. Now who knows? Because there were so many crazy stories coming out. There was a story
    that there had been an attack on the mall.
- speaker: Respondent
  text: That's right, we were like whoa, we're fine, and there was no evidence of that. But there was, again, a lot of conflicting
    information.
- speaker: Interviewer
  text: Yeah, I'll bet that that was confusing, those kinds of rumors. So, one of the things you were trying to do was just
    to get information to your visitors and to your staff, right?
- speaker: Interviewer
  text: What did you do about this when you couldn't, when you were mentioning that you couldn't get information even on what
    roads to take to the tourists and stuff?
- speaker: Respondent
  text: Because I was here, and most of our rangers were here -
- speaker: Respondent
  text: We have very few at this point. Again, what has happened is that mostly the park police have taken over.
- speaker: Respondent
  text: Because that is pretty much their function. And again, we didn't have any sound information, so we really didn't have
    anything to say concretely.
- speaker: Respondent
  text: Because again, now we know it started here and it stopped there. Well, then no one knew that.
- speaker: Respondent
  text: So, we didn't have, we didn't know what to do. And it was - again - the best thing we can do is try to keep our staff
    here informed.
- speaker: Respondent
  text: But things were changing so rapidly again, for the early part of it - the media - the information we were getting
    from the news media was that, you know, they were trying to ground all the planes and there were some that were unaccounted
    for. And of course, there was concern about - again - planes in and around Dulles and National, but again, no specifics.
- speaker: Respondent
  text: Then when the crash was reported in Pennsylvania. Again, at this point no one knew whether or not it was related.
- speaker: Respondent
  text: I mean, right now it seems like yes, hindsight, but no one knew.
- speaker: Interviewer
  text: That's true, no one…
- speaker: Respondent
  text: No one knew. It was a plane crash. You know, this was a part of the information.
- speaker: Respondent
  text: We get. - As I get the information, I get the crash is, the plane running into the one tour, then of course the plane
    running into the other tour. Then I hear the secondary explosion at the Pentagon, I believe they're secondary, I didn't
    really know.
- speaker: Respondent
  text: We see it on the news that there has been an incident at the Pentagon, and then shortly thereafter you hear about
    the crash in Pennsylvania. But you know, from where we're positioned, particularly with the crash in Pennsylvania we're
    unsure if it's all related.
- speaker: Respondent
  text: We don't know. We don't know.
- speaker: Respondent
  text: And we're just trying to make sure that people here are safe, and people here have a way to communicate with their
    families.
- speaker: Respondent
  text: That was for me, between the communication with the families and everyone here being safe, and everyone here being
    informed, now that was my concern. And everybody - again - the staff was just so calm, and it made it easier to manage
    and direct, as you can imagine.
