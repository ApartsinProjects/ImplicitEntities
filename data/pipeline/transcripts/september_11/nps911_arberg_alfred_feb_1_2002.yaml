collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Well, Al, my first question - I'm going to start off with - from the moment you were first aware that something had
    happened, what went on?
- speaker: Respondent
  text: Well, I was downstairs doing an oil change on one of my generators. When I come upstairs and my deckhand, Larry, he
    said, "Al, a plane hit one of the buildings." And from where we were sitting at the Marine Inspection Office, all we could
    see was smoke over the top of these big buildings.
- speaker: Respondent
  text: So, I guess it was about a little after nine. I was getting underway to come to Ellis Island, and I pulled out of
    MIO and I happened to notice that it was the north tower of the World Trade Center. So, I'm heading up a little north
    towards Castle Clinton, and from the corner of my eye I happen to see this other plane come over the Statue of Liberty
    and he's flying really low. And I wasn't aware that we were under attack.
- speaker: Respondent
  text: 'I''m just saying, "Why is this guy coming this way and he''s so low?" And I''m thinking to myself, you know, this
    is strange. What, is he going to go take pictures or something? This is my idea. Well, you know, and then I see him bank
    the plane. I''m saying to myself: "What? Is he going to go in between the buildings?" And bam, I saw him go right into
    the second tower. With that, I don''t know what I can say about it. I was in awe, you know. Everybody was dumbstruck.
    We didn''t know what was going on, you know. And we figured we were under attack because of that.'
- speaker: Respondent
  text: 'So, I''m going back out to Ellis Island and I get a call from the lieutenant, and he goes: "Al, go over to Statue
    of Liberty. We''re going to evacuate the islands." So, I went over to the island. I took the people on the boat that was
    with me. They were going to get off. Some of them were going to get off at Ellis, but they was told to stay on the boat
    and go home. I picked up people at Liberty, went over to Ellis, picked up what we could get on the boat there, and I took
    them back to New York.'
- speaker: Respondent
  text: Came back to Ellis, and with that they were going to start setting up triage, I think it was, over here at Ellis,
    and I had some more people to bring back over to New York. And it was about, I guess, maybe about a dozen people I was
    going to bring back. And Jim Watkins was up here in the wheelhouse with me, and he's the budget analyst here at Ellis
    Island, and we're heading back into Manhattan. I get about three-quarters of the way in when the second tower collapsed,
    and we seen all the smoke coming down. It was rolling, like rolling right down Manhattan through the streets and everything
    else.
- speaker: Respondent
  text: And I says, "you know, I can't drop anybody off in Manhattan with the smoke." I turned around and brought everybody
    back to Ellis Island.
- speaker: Respondent
  text: And then my boss, Pete O'Dougherty, he's the chief of maintenance, he said, "well, Al, we'll put Liberty IV back into
    its berth over here at Ellis and we'll pick up Liberty II." And we were going to because it's wide open in the front and
    just in case they had to put gurneys on the boat. So, we jumped on Liberty II, and Pete and Gene, one of the EMTs, and
    Ray Hammond, one of the Rangers, they get on the boat and we proceeded to go into Manhattan.
- speaker: Respondent
  text: By the time we got there, there was every boat in the world at the Battery up by Battery Park City. They were picking
    people up and taking them wherever they were taking them. So, we saw a police boat and we said to him well, where would
    you need us. And he said, well, just stand by because you can't get in there right now. And we stood by for about a half-hour,
    and then there were so many boats there they didn't need us, so we came back to Ellis Island.
- speaker: Respondent
  text: And then, let's see. Wow, we stayed here for a few hours. And then later on in the evening, my boss and Frank Mills,
    the deputy superintendent, get on a boat and we had a bunch of people that I had to go and drop them off under the Brooklyn
    Bridge.
- speaker: Interviewer
  text: I'm sorry. Who were these again?
- speaker: Respondent
  text: Mike Kartanowicz and Frank Mills, he's the deputy superintendent.
- speaker: Respondent
  text: Mike is my boss. He's a supervisory captain. In fact, he was involved with this too because he got commandeered from
    the fire department with Liberty III, and he was bringing people back and forth with all the firemen - back and forth
    to - up to the North Shore Marina. That's where the financial center is. So, he was bringing firemen back and forth all
    day long for about three or four hours.
- speaker: Respondent
  text: Anyway, we went back and then he got on a boat, and he says, Al, I want to drop them off over at the Brooklyn Bridge.
    Then I want you to go up the North River. We'll drop them off by the Circle Line, 42nd Street. And as we're coming back,
    he says, "well, Al, what do you want to do? Do you want to try to go home?" I guess it was about 7 o'clock at night, I
    guess, and I says, "yeah, I'll try," but everything was so blacked out.
- speaker: Respondent
  text: I got back to New York. I got to my car, and all the debris from the financial center and everything was all over
    the car and everything. So, I wiped it off the glass and proceeded to go down Water Street to go to the Brooklyn Bridge.
    I go down there and - well, there was a lieutenant with the NYPD there with stanchions up. Nobody was allowed on the Brooklyn
    Bridge. And I told him who I was, and he opened up the stanchions and he let me go across the Brooklyn Bridge. I was the
    only car on the Brooklyn Bridge, and it felt really eerie.
- speaker: Respondent
  text: But I did happen to see people staggering, straggling, walking across the bridge right on the pavement of the bridge.
    And that's all I can say on the issue. That's all I can - that's all I have. I was off the next couple of days because
    I couldn't get into New York. Everything going westbound - I live in Long Island - going west was closed. They didn't
    want anybody coming into the city.
- speaker: Respondent
  text: When I finally did get to come to the city, we used to keep the boat in New York and now we keep it at Ellis. I had
    to take the Verrazano Bridge and the Bayonne Bridge just to get to work. So, I had to drive all the way around and pay
    a lot of tolls.
- speaker: Interviewer
  text: No kidding. What, about 13 bucks, if I'm not mistaken?
- speaker: Respondent
  text: And that was five days a week I was on it, you know.
- speaker: Respondent
  text: And we went - every day I came here you could smell it, you know. If the wind was right, you could - the smell was
    real bad. And that's about it.
- speaker: Interviewer
  text: Well, what happened in the days after that? If I can go through -
- speaker: Respondent
  text: Well, the last couple of days, well, we had just our staff coming to work and everybody just coming to work. That
    was all they were doing. There was nobody - there was no customers or any people here for interp or anybody to watch.
    But everything was pretty much secure over here, you know. We had plenty of water to drink. The Coast Guard had water
    at New York. Everybody had water, you know. So that was good.
- speaker: Respondent
  text: But like I said, the smell every time I come in, you know. We had the security over at Ellis Island where they would
    go through your car. And they had the bomb-sniffing dogs - would go around the car and the other guys would go under with
    a mirror just to make sure nobody would put anything - any bombs or anything else - in your car because you're coming
    out to -
- speaker: Interviewer
  text: What about the boats? Are they more secure here?
- speaker: Respondent
  text: The boat stayed here at Ellis. We - this boat used to stay in Manhattan all the time. Now they have it over here at
    Ellis. And when I go - when I work the day shift, I drive around. But at night shift, I come in through New York. And
    then after my last run at night, the park police boat picks me and my deck hand up and he takes us over to Manhattan so
    we can go home.
- speaker: Interviewer
  text: Okay. A couple of questions to back up. Remember I have no background with the park or anything like that.
- speaker: Interviewer
  text: What kind of boats have we got here? How many? What kind of boats are they? What are their names? That sort of thing.
- speaker: Respondent
  text: Well, we have the Liberty II, Liberty III, and Liberty IV. Liberty II is mainly for garbage hauling, because it's
    all wide open, the deck. It's an old - there's one little 671 engine in it. And they haul garbage from Liberty Island,
    Ellis Island to over here in the back here by the fuel dock. They have dumpsters and they have pick-up here and they have
    an incinerator here also.
- speaker: Respondent
  text: Liberty III is like a backup to this boat, Liberty IV. And sometimes they use Liberty III for garbage too, and not
    too much. But like I said, it's a backup for this boat.
- speaker: Respondent
  text: And then this is Liberty IV. It's 64 feet, 84 tons, and she's got 1400 horsepower. And this is mainly for bringing
    the staff over to both islands and VIPs and what have you. In fact, we had the President on the boat in July. And so,
    this is the main boat. And we're looking to get another one if they'll give us one.
- speaker: Interviewer
  text: So, I mean, does this one - does it run at full capacity?
- speaker: Interviewer
  text: I mean, when this thing runs, is everybody on it?
- speaker: Respondent
  text: Well, it holds 80 people. Liberty III hauls 49. Liberty II, like I said, we only haul garbage, and that's strictly
    garbage, Liberty II.
- speaker: Interviewer
  text: Strictly garbage.
- speaker: Respondent
  text: Yeah, strictly garbage.
- speaker: Interviewer
  text: Strictly garbage.
- speaker: Respondent
  text: That's about it.
- speaker: Interviewer
  text: Okay. When we're looking back on this whole thing -
- speaker: Interviewer
  text: '- because actually there was quite a bit going on here.'
- speaker: Interviewer
  text: You were changing the oil on the generator at - and you mentioned where, but I didn't -
- speaker: Respondent
  text: Well, it's at 8 o'clock - like from 8 o'clock I'm back here, like 10 after 8 from my 7:30 run. And sometimes I go
    for a walk. I'll go down towards the Trade Center, up Broadway, and come down because I don't get too much to walk, you
    know. That's the only exercise I get to do. That day I decided to do an oil change instead.
- speaker: Interviewer
  text: Instead of the walk?
- speaker: Respondent
  text: Because I was a little bit later than usual and I would have never made it back in time. I probably would have never
    made it back if I would have went on the walk, because I walk right alongside there, you know. Anyway -
- speaker: Interviewer
  text: And where was this? Which port was this at?
- speaker: Respondent
  text: I'm at MIO. That's called the Marine Inspection Office.
- speaker: Interviewer
  text: Okay. And where is that located?
- speaker: Respondent
  text: That's in Manhattan.
- speaker: Interviewer
  text: Okay. So that's in Manhattan.
- speaker: Respondent
  text: Next to the Staten Island Ferry Terminal.
- speaker: Interviewer
  text: Got it. Okay.
- speaker: Respondent
  text: Yeah. I just decided, let me do an oil change.
- speaker: Respondent
  text: I had no idea what was going on when I came up. Larry, my deck hand, he said, "Al, a plane hit a building;" and I
    come up. All I seen was the smoke, because I had two big buildings in front of me and I can't see the Trade Center from
    here, from that particular point. And all I see is the smoke. So, I don't even know it was the Trade Center until I backed
    out and started up heading towards the north and I'm coming over to Ellis and I just said wow. It was the north tower.
    And I was like flabbergasted.
- speaker: Respondent
  text: And from, like I said, I was inching my way up a little bit further north to see what was going on, and from the corner
    of my eye I happened to see that other plane. And there was this other guy, I think we had some people on the island that
    said the plane went right over the statue also. I don't know if you spoke to anybody, but -
- speaker: Respondent
  text: '- I happened to see it from the corner of my eye because I''m driving like this and I''m looking out this window.
    I''m looking over here at the Trade Center. I''m looking - I''m doing one of these - saying - what the heck is - where
    the heck is he going, you know?'
- speaker: Respondent
  text: It was like it was eerie. I didn't know where he was - I didn't know what was going on, because we didn't know that
    we were under attack.
- speaker: Respondent
  text: We thought it was just a plane that made a wrong turn, you know, or something happened. That's all we knew until the
    second one hit. Then we, you know -
- speaker: Interviewer
  text: So, you were bringing Liberty IV in here?
- speaker: Interviewer
  text: And you got in, and you got over to Ellis - Was it Liberty or Ellis Island first?
- speaker: Respondent
  text: We were supposed to go to Ellis first, but they told us not to go to Ellis. They wanted to evacuate Liberty Island
    and then come to Ellis to get the rest of the people.
- speaker: Interviewer
  text: Okay. It's MIO to Liberty -
- speaker: Respondent
  text: Right, to Ellis.
- speaker: Interviewer
  text: '- to Ellis.'
- speaker: Respondent
  text: Usually it's the other way around because we go to MIO, Ellis, Liberty, and then back to Ellis. But since we were
    evacuating, they wanted to get everybody off the islands as fast as possible, and that's what we did. We took Liberty
    and then Ellis, and then I dropped everybody off at Manhattan and then scooted back here.
- speaker: Interviewer
  text: Okay. So, you came back, then dropped them off back at MIO?
- speaker: Interviewer
  text: And then came back over here?
- speaker: Interviewer
  text: All right. Were you bringing any - I gathered you were saying that it was - and I've got to look at my list here -
    that there were other people. It was Mike, I think, that was bringing the -
- speaker: Respondent
  text: He had Liberty III out.
- speaker: Respondent
  text: And he got - he was bringing people out - back into Manhattan also, and when he got to the Brooklyn Navy Yard, I believe,
