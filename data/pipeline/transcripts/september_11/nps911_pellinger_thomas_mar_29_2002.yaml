collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment that there was something going on, what happened?
- speaker: Respondent
  text: Well, at that time I was in my office and it was brought to my attention from the media network television that a
    plane had crashed into the World Trade Center, up in New York, so I monitored that for a short duration, and - myself
    and my assistant commander - and we noticed that a second plane hit. So immediately we determined that it was most probably
    a terrorist attack. So, I headed downtown to headquarters to begin command operations in the event of strikes in Washington.
- speaker: Respondent
  text: Okay, so I was heading from a Navy Yard in Southeast Washington towards headquarters in Southwest Washington on the
    freeway, and I heard one of my motorcycle units go over the radio that a plane had struck the Pentagon, and he was responding
    in - shortly - in close range. So, I looked towards the Pentagon and I saw the smoke and thirty seconds later, traffic
    began to stop almost at a standstill on the freeway. So, I had to work my way down to headquarters, knowing that, as a
    command official, I really couldn't go to the scene. I had to put various command things in place for the Park Police
    in the downtown Washington area. Okay?
- speaker: Interviewer
  text: Keep going.
- speaker: Respondent
  text: So, I proceeded and made it to headquarters and at that time, I was the acting Operations Division commander for the
    United States Park Police and the incident commander for all the Park Police units in Washington DC. So, I immediately
    established a command post at headquarters and deployed various units around the White House, all our monuments, and memorials
    in Washington - the main ones - meaning the Lincoln, the Jefferson, and the Washington monument and began evacuation procedures.
- speaker: Respondent
  text: I also deployed command officials in the Secret Service command post and the Metropolitan Police command post, and
    we proceeded to evacuate downtown Washington, because it appeared to be getting into a panic situation. And we heard that
    there was another plane coming, not knowing where it was going to go.
- speaker: Respondent
  text: We also deployed our helicopters. They were in route already to the Pentagon. They were already getting involved in
    Medivac. They were the first Medivac helicopter on the scene, and they were medivacking some burn victims at the Pentagon.
- speaker: Respondent
  text: And I deployed a second aircraft and they were being utilized as an air command post to all the aircraft in the area
    and to give periodic traffic reports.
- speaker: Respondent
  text: In conjunction with my motorcycle unit, we put the PM rush hour traffic pattern into effect. Now this is 9:30 in the
    morning now.
- speaker: Respondent
  text: So, in other words, every day we usually have one-way traffic on the Rock Creek Parkway in town and one way, you know,
    out of town in the evening. So, we put the evening PM rush hour traffic in effect to evacuate vehicles more effectively
    from the downtown area because things were beginning to get gridlock and people were panicking and traffic over the bridges
    was everywhere and backed up and meanwhile the second plane was unknown and we heard that it was coming in.
- speaker: Respondent
  text: We were all so heavily involved in evacuating high level officials from the White House - members of the Cabinet,
    the Secretary of Interior and her staff, the Director of the National Park Service - out of the Washington area to key
    locations. And we also commenced a plan with the Secret Service to evacuate key cabinet officials. And also, we were involved
    in several escorts for the President, the Vice President, and the Secretary of State at that time.
- speaker: Respondent
  text: And once I had things in place, we insured that the closures of the monuments and memorials and around the White House
    was secure. I beefed it up with as much manpower as I could. We were running on numerous - throughout the day and into
    the evening - on numerous suspicious packages, bomb threats - with our K9 units and working with the other agencies, checking
    out suspicious packages, anything suspicious - because of the terrorist incidents - that came to light to our communications
    sections, and we had to check it out, and that kept us very busy for several hours.
- speaker: Respondent
  text: And also, once we heard earlier that that fourth plane crashed in Pennsylvania, and kind of allayed our fears that
    there was another incoming at that point.
- speaker: Interviewer
  text: Okay, so you were mentioning a panic regarding the evacuation of people here in DC just the public and traffic and
    things like that. What was going on there?
- speaker: Respondent
  text: People were running to cars. They didn't know what was going on. They were driving a little bit erratically, trying
    to get out of the city. At various locations, traffic was gridlocked. People seemed to be running rather than walking.
- speaker: Respondent
  text: All the buildings were being evacuated. What they heard and what they saw - they didn't know the full story. They
    didn't know if there were more planes coming or if there was going to be an attack on the Capitol, the White House, or
    other Federal buildings, the Monuments.
- speaker: Respondent
  text: We were just doing the best we can, closing our areas, and just insuring a safer evacuation as best we could. We do
    have limited resources and personnel shortages, and we were fully strapped. I also deployed a mobile command vehicle in
    the Mall, in addition to our permanent command station up at the Chief's conference room, which is where I was for a good
    part of the day, in and out. But mainly there because of the numerous decisions I had to make and notifications and phone
    calls that I was receiving.
- speaker: Respondent
  text: We were in constant contact via telephone with the Department of Interior Watch Center and various other command centers,
    informing them of the latest happenings in Washington.
- speaker: Interviewer
  text: What other kind of centers were there? You were mentioning this "Watch Center," a Department of Interior Watch Center?
    Did I understand that right?
- speaker: Respondent
  text: Correct. That's a Department of Interior law enforcement notification center that was manned up at that time twenty-fours,
    and there was also another command communications center that was set up for the Park Service out at Shenandoah, that
    our command folks, communications and PIO people in our command center had to periodically update and communicate with
    about the latest happenings.
- speaker: Interviewer
  text: So, you were communicating to the command center in Shenandoah?
- speaker: Interviewer
  text: Were they communicating with you on anything?
- speaker: Respondent
  text: They would just be calling us for updates because nothing was happening out in their location, so we were basically
    giving them updates and that's the way the system is. You know, that's a notification center also to other areas of the
    National Park Service in the event of there were strikes in the National Park Service areas. And the Watch Center in Interior,
    they deal with all the dams and other things owned by the Department of Interior that were becoming concerns of importance,
    whether a terrorist will strike there.
- speaker: Interviewer
  text: I don't know too much about it - when did this Shenandoah Command Center appear? I mean when was it put together?
    All of these different centers, have they been getting some build up over time or what?
- speaker: Respondent
  text: Well, once things started to settle down and folks started to realize what was happening, that's when these command
    centers began to be formulated that day. And I guess by the afternoon they were put into effect.
- speaker: Interviewer
  text: Okay, so you mentioned that people were evacuating. You were escorting the President, the Secretary of State, the
    Vice President, Secretary of Interior, in various places; when was this occurring? Was this all in the morning? I mean
    you mentioned that you put the PM rush hour traffic pattern in at what - nine in the morning to get people out of there?
    And I know we were aware of what was going on by eleven and were on our way out. Just sort of approximately when were
    all of these things occurring?
- speaker: Respondent
  text: These things were occurring - these escorts and evacuations - were occurring all through the day, as information was
    received by various officials. We just continuously got requests to escort or drive folks - people, officials - to various
    locations. Police people driving high-level officials due to the nature and the danger of the situation, thinking that
    due to the volume of traffic it was difficult to get out of town. So, a police vehicle with emergency equipment - it helped
    facilitate getting out of Washington DC a little quicker.
- speaker: Interviewer
  text: Yeah, so as the day went on, just to continue, what happened for the rest of this day?
- speaker: Respondent
  text: It was just sort of non-stop. Running on suspicious packages, evacuating, finding out more information as to what's
    going on, getting updates of what's happening in New York and what's happening in the Pentagon. We assisted the FBI at
    the crime scene over there. We deployed more officers to the Pentagon for traffic control, perimeter pedestrian control,
    to assist the FBI and the Pentagon and Arlington County police. I was constantly working with the Secret Service, reevaluating
    the security personnel and manpower arrangements around the White House.
- speaker: Respondent
  text: There's different levels of security that we put into effect depending on threat levels and constantly reevaluating
    that - what roads to close, things like that. Whether an area should be closed for vehicles and pedestrians or just vehicles
    - evaluating all that.
- speaker: Respondent
  text: It was just a myriad of issues happening very fast and making quick decisions on what to do, and I guess by late morning,
    early afternoon, most of the areas that we wanted to evacuate and close were put into effect. And then we had issues of
    fencing areas to make sure that they were closed and lighting coming up for the night, to help better visibility for the
    officers on site.
- speaker: Respondent
  text: So, we worked all that out with the National Park Service Maintenance Division and Central in the National Capital
    Region.
- speaker: Respondent
  text: Then I was overall responsible for the deployment of manpower. One of the things that happened was I recalled all
    people that were off duty, and we also had to consider the nighttime coverage, so people were working very long hours.
    So, we had to work all that out with night and daytime coverage for the next several days. So, we did that. And we did
    not want to lessen our security levels at all. We wanted to maintain that continuous coverage of a good show of police
    officers around all our monuments and memorials and that's what we did.
- speaker: Respondent
  text: I deployed our aircraft also around the White House. Around the White House and the Capitol is all limited and restricted
    air space. So, in conjunction with the Secret Service, we dedicated an aircraft to fly security zone checks continuously
    around the White House area and the Capitol area for further possible terrorism incidents. And that continued on for several
    days.
- speaker: Interviewer
  text: Could you go on a little bit about what were some of the things that were occurring over the next several days?
- speaker: Respondent
  text: Well, over the next several days, of course, the heightened alert was still there, so we had to maintain our vigilance
    around everything we were doing. Around the Lincoln, the Jefferson, and the Washington Monument, and the White House,
    - both sides - Lafayette Park side and the Ellipse. And in order to do everything that I needed to do, we had to put officers
    on twelve-hour shifts and all our regular, normal routine coverages, and all our outlying districts in Washington - extra
    personnel were brought downtown to supplement the detail, and in order to do that they had to work twelve-hour shifts
    to make their coverages on a twenty-four-hour basis.
- speaker: Interviewer
  text: So outlying districts were pulled in to help here?
- speaker: Interviewer
  text: And they still had to cover where they were supposed to be originally too.
- speaker: Respondent
  text: Absolutely. So, in order to do that, we put them on twelve-hour shifts. We continued our command officials in a twenty-four-hour
    basis in the Metropolitan Police Command Center and the Secret Service Command Center, to better facilitate communications.
    I know there's a lot of command posts and there's redundancies in it, but it's built in to make sure that nothing is missed.
    And we did that along with - we maintained our Chief's command post for the next several days, a good week or so, for
    notification and so forth.
- speaker: Respondent
  text: We continued our aircraft vigilance support and we maintained support to the Pentagon with traffic and perimeter control
    of pedestrians and traffic control. And we also manned up the Arlington County and the Pentagon Command Center. And working
    in conjunction with the FBI, our detectives were active in working cases.
- speaker: Interviewer
  text: That is interesting. And these cases were things such as the suspicious packages or what?
- speaker: Respondent
  text: Cases of suspicious packages, suspicious vehicles, suspicious persons; you know, any bits of information that were
    received or observed, were checked out by our offices. If things looked more suspicious, persons were taken into custody
    and turned over the FBI for their investigation. And once again, we have bomb K9s, dogs, and the other agencies do also.
    And we were running on a lot of suspicious things for the next several days.
