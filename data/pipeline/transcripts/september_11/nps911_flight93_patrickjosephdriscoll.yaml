- speaker: Respondent
  text: When Patrick Joseph Driscoll reached the summit on a challenging hiking trail, he described it as a spiritual experience.
    On September 11, he and his long-time friend, William Cashman, were traveling to hike in Yosemite National Park. The Manalapan,
    New Jersey resident was the son of Irish immigrants, grew up in Manhattan, and served four years a board a U.S. Navy destroyer
    during the Korean War. He earned an engineering degree from New York University and a master's degree in computer science
    from Rutgers University. Joe, as most people called him, retired as the Executive Director of Software Development for
    Bell Communications and then devoted himself to his church and his community. He and his wife were married for 42 years
    and had four children.
