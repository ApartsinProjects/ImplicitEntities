collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Probably the best place to start is for you to tell me how you first learned about the attack and what your immediate
    response was.
- speaker: Respondent
  text: I had had about an hour-long meeting with our local park police captain, Jimmy Moore, in my office. And we kind of
    made the decision that okay, that's long enough for any meeting and he had left to go over to his office. And within a
    matter of seconds, he was back in my office. I remember joking with him saying, "Jimmy, I love you man, but I've got to
    get some work done." He said, "Boss, you need to come over." I said, "Jimmy, come on." You know sometimes we have little
    tricks and little things that we do in our office, kind of camaraderie. And he said, "No, seriously. You need to come
    over and look at this."
- speaker: Respondent
  text: Whenever I got over to the little conference room that they had, the television was on. And I was looking at the first
    tower that had been hit, the smoke that was billowing up. And a group had gathered there, a number of agents, the Park
    Police captain, myself, and a couple other folks from nearby and we were just kind of, a little bewildered. You know,
    what was this? What happened? Gee, that's quite a beautiful day for a plane to just go off course, you know, and hit a
    tower. And then a few minutes after that a second plane had hit the towers and we realized this was something that was,
    obviously, terrorism oriented.
- speaker: Respondent
  text: And it was interesting to just kind of go back just a little bit. I just had been hired as the new regional chief
    ranger. The position had been vacant for about seven years. And all of my group, the folks that are in Boston, and the
    folks that are in Philadelphia had just had a retreat the last week in August up in Roosevelt -Vanderbilt. And we talked
    about all of the things that we needed to do, what we were doing right, what we needed to pay more attention to. And we
    made the decision there that we really needed to have a person focused on terrorism, physical security, and personnel
    security. Just in that we decided that was the major void just given the realities of the world and the way things were.
    And the next week I moved into my house and the following week was 9/11. So, we had just made the organizational decision
    that one of the park police captains up in Boston would actually serve as the counter terrorism physical security section
    for the region.
- speaker: Respondent
  text: So, after we went through with our initial shock of this whole thing, we started to just ask questions. Me, being
    new to the region, I was quickly asking some of the others, okay, what is the normal protocol for this sort of thing?
    What is the emergency operations plan? Jimmy Moore had been new also. He had only been in the office about a month longer
    than I. So, we just kind of started just brainstorming about what kind of things needed to be done. We actually established
    a quick little incident command team there using the staff that had, you know, that will teach people to come into the
    office and watch the television. We ended up with folks from interpretations and operations, and then our little group
    there, the law enforcement group. And we set up an incident command post there.
- speaker: Interviewer
  text: So, what sort of issues were you discussing? What sort of needs were you highlighting at that point?
- speaker: Respondent
  text: Well, one, we knew in New York, we have an awful lot of park units in the immediate area, so we were trying to get
    an idea of what kind of, how close is that to park units? What kind of issues should we be thinking of, be aware of? How
    do we go about contacting folks? At the time Marie Rust had been out of state at a, I think it was a general superintendents'
    conference, something that she was down in the southeast somewhere. And Dale Ditmanson, who is the associate regional
    director for operations, was off. So, we were just kind of starting by the seat of our pants, to where we should go and
    what we should do.
- speaker: Respondent
  text: And so, we started, I called Washington and talked to the chief ranger down here, just to get a feel for, if he has
    any thoughts, if there were any indications of what else might be going on. I continued to watch the television. We just
    started formulating a strategy of okay, if there is a decision made to close parks and we'll start doing it in such a
    manner. We ended up spending a little bit of time just trying to figure out a grand plan. About that time, Dale Ditmanson
    came in from being off at his home. And he talked a little bit more of a long term strategy, but not sure exactly how
    this is going to relate, but maybe we ought to think about activating our Northeast Regional Risk Management Team and
    put them on standby or just go ahead and alert them that we would like for them to come in and help manage the incident.
- speaker: Respondent
  text: Shortly thereafter, we started hearing indications of other things that were going on, like the Pentagon, the Flight
    93 aftermath. So, we started hearing from the Park Service that then there was going to be a shutdown, and so we helped
    with notifications of the shutdown. I sent out an email message to all of the chief rangers, just to heighten their awareness
    that this has happened, to be thinking about what steps they should take to help facilitate an evacuation of the parks,
    and also to secure the parks, and what types of thing that they should be looking at, thinking of. And that this isn't,
    obviously, operation normal.
- speaker: Respondent
  text: So, we ended up being involved in making phone calls and helping out with different things. We asked all of the parks
    to report their available resources, thinking that maybe we'd start getting calls to actually send rangers and or equipment
    to different places to help out with the incident. And it's hard to imagine, but by that time the day was just pretty
    much shot. We made a decision that myself and Jimmy Moore would stay over in the command post that night and just be available,
    not knowing whether we would have more terrorist incidents and whether it would involve national parks and all.
- speaker: Respondent
  text: The other folks left. We started getting a fair amount of press. We set up an information officer, one of our interpreters,
    our managers, had volunteered to help out with public affairs. So, we were fielding some calls. There were different things
    that were coming in about, are the park service areas going to be used as mortuaries. We started hearing information about
    the Federal Hall and the ranger that was there that was pulling people in off of the streets and giving them first aid.
    We got a hold of the Park Police and we asked the Park Police if they would be able to send some people over to help that
    one lone protection ranger that works there at Federal Hall and that we knew had hundreds of people there. Some needed
    first aid. There was an issue of caring for that group. It's just literally right around the corner from Ground Zero.
    So, the Park Police said, yes, they would send some folks over. We heard some reports about some damage to Federal Hall.
- speaker: Respondent
  text: And so, we overnighted. There wasn't an awful lot that happened, just a lot of general information. And then in the
    wee hours in the morning, a call came from Shenandoah saying the decision had been made to reopen the parks. So, we then
    facilitated notification of all of the parks through a phone tree with superintendents of the different sites.
- speaker: Interviewer
  text: Before we go to the next day, I'd like to ask a couple of questions. Were you also seeking information about NPS personnel
    in that first afternoon?
- speaker: Respondent
  text: We had asked. There were general messages about accounting for your people and what not.
- speaker: Interviewer
  text: As well as what's the status of your resources, or was that part of it at all?
- speaker: Respondent
  text: Yes, we weren't too terribly concerned about other than Manhattan Sites was the only facility in our region that was
    kind of right there and impacted by it. We did make them contact if there was anybody that was missing that type of thing.
    And folks were reporting back that everybody was accounted for. And so, we weren't terribly concerned. It was just the
    Manhattan Site that was right there. There were other sites that are around the Federal Hall, but we knew the ranger was
    okay, and we had communications and were hearing from them, but then there was nothing reported. We weren't overly concerned
    with any personnel.
- speaker: Interviewer
  text: And also, you mentioned that one of the first things you did in that early period - that you contacted Dennis Burnett.
    My question is, with phone lines down in the Washington area, how were you communicating with - how much of a challenge
    was that? I guess some incoming calls were getting through.
- speaker: Respondent
  text: There was initially no problem. Obviously, then when I really started evacuating everyone, but this was still all
    of the New York stuff was playing out. I don't think the Pentagon had really played out yet. It was just kind of immediate,
    did you see that yet? Yes. Okay, I need to send out a message to the parks, you know, the heads-up kind of thing.
- speaker: Interviewer
  text: What kind of guidance were you receiving from Dale Ditmanson or from WASO other than, we need information about the
    status of park units?
- speaker: Respondent
  text: Nothing more than that there was going to be a general closedown, so really nothing much from Washington. Really,
    I think things were starting to crank up here and all of the full-bore activity related to events here. Dale was just
    more of a, okay, let's think about this. Let's get some professionals to come in and help. We're going to have to bridge
    things in the interim, serve as the communications wing for the northeast. And there was interacting with Shenandoah during
    the night, touching base on a few things. They had received a few calls of suspicious nature that we found interesting
    and we passed that information on to the FBI. Interestingly enough, relating to folks that were seen in south Florida,
    that weeks later the investigation ended up centered into the folks down in south Florida.
- speaker: Interviewer
  text: I heard that.
- speaker: Respondent
  text: So, the info was just passed on to the FBI and we just let them handle that. And just a few general touch base calls
    going into the wee hours of the morning.
- speaker: Interviewer
  text: How would you assess communication? It sounds like you are saying they were pretty effective. You were able to get
    the information you needed and convey it. Is that accurate?
- speaker: Respondent
  text: Some of the phone systems up in the New York area were out. And with that, I think a few of the email systems had
    failed. So, I wouldn't say that it was perfect by any means. And to rely on phones or rely on email is not really the
    best. I mean obviously it would be better if we just had an ability to push a switch and talk to people on the radio throughout
    about what was going on.
- speaker: Interviewer
  text: Did you have the GETS card, the Government Emergency Telecommunications System? Were you keyed into that?
- speaker: Interviewer
  text: Also, you talked a little bit about the initial planning. Does the region have a continuity operations plan? Is that
    something you pulled out and looked at?
- speaker: Respondent
  text: We looked at that for both the support office and for the region. But most of that kind of relates to something happening
    to the regional office. And since this really didn't affect a closure of the regional office other than the administrative
    closure, people being sent home, it really didn't have a whole lot of bearing on this event as it was transpiring. We
    called in an IT specialist to help set up a command center with this all Risk Management Team that were coming in, the
    Type 2 Team. We thought it would be best for them to really have adequate facilities where you could spread out and work.
    So, we converted one of the training rooms there in the Philadelphia support office into a command post. And one of the
    IT specialists came in and worked most of the night getting in all of the computers and telephones and all of that stuff
    set up, so whenever the team came in they were just ready to go right into their space and start working.
- speaker: Interviewer
  text: I read somewhere that you were the incident commander until the team arrived. Is that accurate?
- speaker: Respondent
  text: Yes, that's what we had determined.
- speaker: Interviewer
  text: I'm just sort of looking for the basics here as to how the team was mobilized. Is that something that you sent a message
    to Shenandoah or how does that happen?
- speaker: Respondent
  text: Yes. Actually, we had had a discussion with Dale as soon as he arrived. We had called Rick Brown, who is the incident
    commander for that team. And we talked to him about what was going on, what our thoughts were. Should we, shouldn't we.
    Is this overkill? We didn't know how it was going to play out. And then we just ultimately decided that let's go ahead
    with this team.
- speaker: Respondent
  text: He had a short team. I don't believe he had a - I want to say he was short an admin person, and maybe a - yes, but
    we didn't have the full complement, a full Type 2 Team. So yes, then we asked Shenandoah to actually affect the callout
    of the group. Several team members were actually from the Shenandoah. Paul Pfenninger and Chester Mikus.
- speaker: Respondent
  text: And I had worked with them during my time at Shenandoah, so it was good to know who was coming in and I had known
    Rick.
