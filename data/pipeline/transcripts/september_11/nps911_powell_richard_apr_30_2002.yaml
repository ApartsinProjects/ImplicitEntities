collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: We're here to talk about the Park Service response to the September 11th attacks. Maybe just to start if you would
    talk about how you first learned about the attack.
- speaker: Respondent
  text: Let me preface that Risk Management includes employee safety and health, and public safety, as well as worker's comp,
    so I cross a number of lines, and I did subsequent to 9/11.
- speaker: Respondent
  text: Prior to 9/11, National Park Service was in the process of moving to the G Street office, which is three blocks north
    of here. A third of the Park Service, and that was administration primarily, budget and human resources, had moved up
    there. At the same time, there was the protests that were being anticipated - International Monetary Fund/World Bank protests.
    There were also protests that were anticipated as a kind of an offshoot of that, an opportunity to protest against Gale
    Norton and her stand about ANWAR, the Fish and Wildlife's turf up in Alaska. So, there were a lot of violent protests,
    seriously violent protests.
- speaker: Respondent
  text: The intelligence we had was that it was going to be a very dangerous time for our employees, so security was very
    high, and there was all kinds of preparation being made by the Department for that, which really positioned them for just
    implementing these security measures immediately after 9/11.
- speaker: Respondent
  text: Well, when our folks moved up to G Street, we were looking at the security of the G Street office in the context of
    those protests because the main headquarters of the World Bank is directly across the street from where we were going
    to move into. And they were also located the floor above us. So, there was very poor security, no checking in or going
    through any kind of security measures at the bottom floor. There is a garage - a commercial garage downstairs, no security
    at all down there. Anybody can go in and park and drive in.
- speaker: Respondent
  text: So, I was very concerned about it, and I expressed that concern, and other people were concerned as well. So, we moved
    them back to the Main Interior Building the prior week. Not a lot of happy campers about that. We didn't even have a place
    for them, and there was just no furniture or anything for them.
- speaker: Interviewer
  text: You moved them back into Main Interior the week before the September 11th attack.
- speaker: Respondent
  text: And then they moved back up there the Saturday, which would be September 8, 9, and 10, moved back up there. On September
    11, I walked to the G Street office because we were next. Operations was next, and we were going to move into the floor
    above where they had moved into, and I was checking out how they were doing, because the stress was very high with those
    employees. But on the way up there, I heard somebody's radio blaring something about a plane crashing, and I didn't know
    exactly where it was.
- speaker: Respondent
  text: Then I got up to the floor that everybody was moving into, and somebody asked me had you heard about not only one,
    but two planes that had crashed in the World Trade Center, and that was a shock. Of course, everybody was talking about
    it, and there was a radio that somebody had. So, we were trying to learn a little bit more about that, and I went up to
    the floor above us, and that's where the workers were still working, and it was just a skeleton of walls and things like
    that. There was nobody else except myself and the workers, and I was looking at my space up there, and I heard the workers
    shouting, and a lot of profanity.
- speaker: Respondent
  text: At that point I didn't know what they were talking about, but it kept going on. So, I looked around the corner and
    they were all looking out south, and it was the Pentagon burning. It was the huge bellows of smoke were coming off of
    the Pentagon, and we see - couldn't see real clearly the Pentagon itself, but you could see -
- speaker: Interviewer
  text: You could see the smoke from there.
- speaker: Respondent
  text: '- the smoke. And then somebody else came up saying, "We''ve got to evacuate." So, we all - everybody just got out
    of the building, and I went back to Main Interior, and I had a hard time getting into the building, because they just
    shut that place up tight. But anyway, I got back into Main Interior, talked my way in to get my keys.'
- speaker: Respondent
  text: I had taken the bus that morning, and I didn't have a car. But my lady friend, her friend I caught in the hallway
    and asked how she was getting home, because she was staying with my lady friend during the week when she commutes down
    from Front Royal.
- speaker: Respondent
  text: So, we loaded the car with four of us, just to get out of the city, and it was just virtually a standstill. It was
    just amazing how gridlocked it was. Come to find out, the city had not coordinated at all with the counties and the Highway
    Department, and the outbound lanes were still closed for in coming traffic. So, there were people along the side of the
    road hitchhiking, or just walking, people streaming across the bridge - the Roosevelt Bridge - just to get away.
- speaker: Respondent
  text: We didn't know what was going on. We had the radio on, and we, of course, heard more about it. There were rumors that
    there was an attack on the Lincoln Memorial, just rumors flying all over the place; rumors about other planes in the air,
    one heading down from the north. So we finally made it back to my friend's house in Arlington, and decided we better go
    to the store because we didn't know what was going to be happening, and it was just like everybody was completely confused
    about it, and the news reports were very confusing. So, I did, I went to the store and bought some additional provisions.
- speaker: Respondent
  text: That kind of ended the day, other than just being glued to the TV. The following day, I told my employees to stay
    home.
- speaker: Interviewer
  text: Before you go to the next day, I just have a quick question. When you mentioned that the people at G Street were brought
    back to Main Interior and then put back at G Street, how was that decision made? Had some additional security measures
    been added in between?
- speaker: Respondent
  text: Yes. They had agreed - the building manager had very reluctantly agreed to add some additional security measures.
    You couldn't get through into the elevators without going through, just like we have at Main Interior, a guard and metal
    detector, things like that, and also coming up from the garage.
- speaker: Interviewer
  text: I was just going to ask, but no evacuation plan or anything had been put in place yet, I would imagine, for the people
    in that building.
- speaker: Respondent
  text: No. That was a big concern about that, is that there be an evacuation plan immediately, which they did. They put an
    evacuation plan together real rapidly, and so people felt like well, I'm a little bit more comfortable about moving back.
    And so, we finally convinced everybody that - I was sitting in on these meetings and the building manager subsequently
    - the owners of the building, I think, subsequently fired the building manager because of his - how difficult he was to
    address security issues.
- speaker: Respondent
  text: So those devices were not in place, but there was a promise, they were on order. So, we moved them back.
- speaker: Interviewer
  text: I'll let you go on, then, with the next day.
- speaker: Respondent
  text: We weren't sure if we were going to come back to work or not. I told my employees not to come back. I did come back,
    and there were a lot of meetings, of course, about what next, and the following day, on the 12th,
- speaker: Respondent
  text: we had an announcement. People were going up and down the halls telling everybody to go immediately to the basement,
    and that was under the direction of Steve Griles, the Deputy Secretary.
- speaker: Respondent
  text: So, we got downstairs, and we were told that there was a plane coming out of Canada that they weren't sure about,
    so to stay in the basement. And it was during that time - I think that was - well, there was a lot of meetings of the
    directors of each of the bureaus that were around, and the senior executives were meeting to try to determine what to
    do next. And the Park Service kind of stepped up to the plate there because we had been used to dealing with emergency
    situations, and so several of the - Rick Gale being one of them - was down there. He kind of worked with Fran Mainella,
    our director, and kind of got things to where it was a little bit more orderly downstairs, where bureaus would segregate
    into their own areas so that they could all account for each other and what was going on.
- speaker: Interviewer
  text: When you say downstairs, do you mean -
- speaker: Interviewer
  text: Okay, so that morning bureaus were actually separating their employees down there?
- speaker: Respondent
  text: Yes. They were trying to. I mean, it was a big hodgepodge. But they attempted to have each of the bureaus kind of
    meet in a particular area. It wasn't terribly successful, but at least they attempted to do that, and realized in the
    future that that's one of the things they would have to take care of, is to make sure that when there is an evacuation
    that occurs, the bureaus need to know where to go. And, of course, since that time a very detailed evacuation plan is
    in effect here in Main Interior, and we have done that. We met and had a big evacuation practice and everything, so it
    seemed to work pretty well.
- speaker: Interviewer
  text: And as I understand it, there was no, for want of a better word, intercom system. I mean, someone had to go get Director
    Mainella a bull horn.
- speaker: Respondent
  text: Megaphone, yes, and she used it and Steve Griles used it also. They were trying to shout, but the room is so big that
    the voice wasn't carrying very well. So, they got a megaphone. And they realized how poor the communication system is
    because there's no way of communicating building-wide, and that's one of the things that still, to this day, they haven't
    gotten in place. But they have a plan now, because there was no way of communicating to our employees as to what to do,
    so people had to go up and down and shout, "You've got to get downstairs."
- speaker: Interviewer
  text: But just to clarify a bit, at that point in time, the Park Service didn't have a plan for its employees, an evacuation
    plan from this building?
- speaker: Respondent
  text: Not really. There was an evacuation plan for the building, and it wasn't practiced very often. In fact, I don't even
    recall it being practiced. There had been evacuations because of a bomb threat or a fire or something like that, and everybody
    was assembled out each door, and that's about it, which was awkward because the fire trucks couldn't get in.
- speaker: Interviewer
  text: It's a little bit different than in an emergency like this.
- speaker: Respondent
  text: Yes, because there were so many people involved, and of course, everybody else in other buildings were outside, too.
- speaker: Interviewer
  text: Were you involved at all in the continuity of operations plan, and the implementation of that plan?
- speaker: Respondent
  text: I was not. Here is where it became frustrating for me in the days following 9/11 because they brought an incident
    team in, an overhead team, to try to cope with the situation, and they were situated right down the hall here, the 7400
    corridor. But that became - it was very cramped, and they finally situated them across the street in South Interior.
- speaker: Respondent
  text: Nobody knew really - it was - [in] the days following 9/11, there was a lot of security measures, immediate. I mean,
    there were guns all over the place. Everybody that remotely was in law enforcement and security, especially down the hall
    in the Department, were wearing guns, and they were focused on security. But there was very little focus per se on employee
    safety. And that's where it became very frustrating for me, because I was trying to find how I could fit into this, and
    it was difficult to get into the groups.
- speaker: Respondent
  text: I mean, I would insert myself and start working - I did work with the overhead team.
- speaker: Interviewer
  text: When you say the overhead team, you mean the all-risk Type 1 incident team?
- speaker: Respondent
  text: Exactly. And I was working with them as far as dealing with issues relating to employee safety. But they weren't focused
    on employee safety, they were focused on security of buildings, what the National Park Service is going to be doing as
    far as securing our icons - the Washington Monument, Mount Rushmore, dams, and things like that - and rightfully so. But
    I was not asked at all to participate, either at the Director's level or the directorate until anthrax. And when anthrax
    occurred, well, when the anthrax attack occurred, they suddenly started to realize that security folks
- speaker: Respondent
  text: didn't know anything about employee safety and health and started looking for answers. And that's where I more seriously
    entered the picture.
- speaker: Respondent
  text: I was working, Dick Ring and the Director had asked me to sit in on the meetings, their senior staff meetings, and
    start on their behalf coordinating with the Department on an approach to how to deal with the anthrax situation.
- speaker: Respondent
  text: I had not worked at that level in the Department. I worked with the Department all the time, but not at the Deputy
    Assistant Secretary level. They didn't know who I was, and I was trying to insert myself into that situation. And I had
    a meeting with the Deputy Assistant Secretary, and they started to - well, what we decided to do in the National Park
    Service, because the Department wasn't meeting with its employees, and our employees wanted to have some answers, because
    anthrax was very scary, and because the mail was coming into our building. It had gone through the Brentwood Postal Service
    facility, and they were very afraid.
- speaker: Respondent
  text: I tried to get into, and I did meet with the Department, and especially the folks in the National Business Center
    (NBC) downstairs to try to figure out what they were doing about the mail, and they were, of course, scrambling around
    for answers for themselves. They were purchasing respirators that were probably not even effective, but they were
