collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe the best place to start is just for you to tell me how you first became aware of the terrorist attacks on the
    World Trade Center.
- speaker: Respondent
  text: Well, on that morning, that Tuesday morning of September 11, I was here in my office and I was reviewing some of the
    intelligence reports for the upcoming World Bank/International Monetary Fund demonstration that was to take place here
    in Washington, D.C. on September 29. And that morning, I was going over to the crowd control training that we were providing
    to our officers.
- speaker: Respondent
  text: This is something that we always do. It's a refresher course. It ensures that the officers understand all of the commands,
    they have been taught these things prior, and that the sergeants understand the formations that we're going to be using
    for crowd control. In addition to foot patrol officers, the horse mounted officers work with them. And it's a very interesting
    training exercise to observe, because "how you train is how you play," as we say in the Park Police. And this particular
    demonstration was supposed to be very violent. But as a result of September 11, as you probably recall, the demonstration
    was canceled. And ironically, starting on the 19th, the IMF demonstration will be coming back to Washington, D.C. and
    we're now gearing up again for that.
- speaker: Interviewer
  text: Where was the training being held?
- speaker: Respondent
  text: It was being held over in Anacostia Park in southeast Washington. Are you familiar with that area over there?
- speaker: Interviewer
  text: Over by the aviation hangar?
- speaker: Respondent
  text: By the aviation unit there, we have large fields and we bring in the officers and the horses and put it all together,
    basically. But that was my plans for the morning when one of the officers who's assigned to the planning unit came in
    and said, "A plane just hit the World Trade Center." And they had the TV on down in the office. I left this office and
    went into the planning office and watching it on the television, and that's when the second plane hit.
- speaker: Respondent
  text: I knew a plane many years ago had hit the Statue of Liberty. I'd seen that in the news and figured, well, maybe another
    plane somehow got off course and struck the World Trade Center. But when that second plane hit, we all knew that this
    was a terrorist attack.
- speaker: Respondent
  text: And that's when we put everything into gear, all of our training, and plans for what we do in a crisis situation.
    We initiated what we call the chief's command post, and that's where we activate all of the telephones in the command
    post. We have a dedicated staff assigned in there. We have about eight televisions that we turn on and we're watching
    all of the major news stations. And we also have capabilities where our helicopter has a Downlink, which means they can
    fly over a demonstration or crime scene or whatever and directly transmit that photograph, not photograph but live pictures,
    right into the command post. So, all of that was initiated within just a matter of minutes.
- speaker: Interviewer
  text: That command post, is that here in this building?
- speaker: Respondent
  text: It's here in headquarters.
- speaker: Interviewer
  text: What were some of the other things in the first 15-30 minutes? What were some of the other things you were thinking
    about?
- speaker: Respondent
  text: Well, at the planning stage, itself?
- speaker: Interviewer
  text: It's probably a little early for that maybe.
- speaker: Respondent
  text: An alert was given to all of the units that there had been this attack in New York. We made some phone calls to New
    York. We were in touch with the New York field office. At that time, they were actually en route to Ground Zero. The officers
    from the New York field office responded to Ground Zero, itself, and were assisting immediately.
- speaker: Respondent
  text: Several hundreds of people had escaped the debris from the two towers. You remember seeing all of the clouds of debris
    and the smoke. They went into a national park area called Federal Hall. And they were just trying to get away from the
    smoke and breathe some fresh air. And we had 200 to 300 people, I think, in Federal Hall. Those people were then kept
    in that building for their safety. At the same time, several of our marine units were involved in transporting people
    from Manhattan over to Ellis Island to get them out of there. Several things were just were going on that pertained to
    security once everybody knew that this was a terrorist attack.
- speaker: Respondent
  text: When the third plane hit here at the Pentagon, we really knew that we were a targeted area, too. Our command post
    was operational, just about operational, when that plane hit the Pentagon. Our helicopter unit was up and, on the scene,
    almost immediately, was involved in MEDEVACS [medical evacuations], and we had motorcycle officers that responded over.
    We didn't dispatch them. They just automatically went when they saw the huge explosion that went off. There again, nobody
    really knew what other shoe was going to fall at that time.
- speaker: Interviewer
  text: When you had those very early communications with the field office in New York. Was there anything that they were
    telling you that they needed from the Park Police headquarters here, or from the Park Service in general? Or were they
    just telling you how they were responding?
- speaker: Respondent
  text: They didn't request any assistance from us, and we couldn't have gotten anything to them anyway. They pretty well
    knew that. We both understood that our areas were targeted areas at that point. They closed down the Statue of Liberty.
    They closed down Ellis Island, evacuated everybody out of those areas. And the Statue of Liberty has long been an icon
    and one that we thought would be a targeted area for terrorists. And to this very day, we still believe that.
- speaker: Interviewer
  text: When you went into the command post, I guess that's where you met with other Park Police leadership, I mean what -
- speaker: Respondent
  text: Two things.
- speaker: Respondent
  text: I was going to say, you had all three deputies were in the command post plus the staff that mans the command post.
    Mr. Carlstrom came over. And he is the regional director for the National Capital Region. And basically, when he walked
    over, he was surprised. He saw that we had everything already operational and he said, "You've got it." So, it made us
    all feel good when he said you've got it.
- speaker: Respondent
  text: But at that point, we were then beginning to give direction to our operational officers and commanders to evacuate
    the memorials and the monuments, because those could be targeted areas, too. So, with those people being evacuated out
    and moved, at the same the Federal Government was basically evacuating their facilities and getting people out of the
    government buildings, which was a monster traffic problem for us.
- speaker: Respondent
  text: What we normally do for AM traffic, we expedite traffic in the mornings and expedite traffic out, what we call traffic
    changes on Memorial Bridge. Rock Creek Parkway is a fine example. I'm not sure which way you come into work, but do you
    ever come in Rock Creek Parkway in the morning?
- speaker: Respondent
  text: Well, it's usually two lanes north and two lanes south. But in the morning, we make it four lanes south, and in the
    evening it's four lanes going back north. So, we decided to assist the city's evacuation of the federal employees and
    all of the employees from even private industry, if they were released, by initiating the PM rush hour traffic plan.
- speaker: Interviewer
  text: Was there an existing plan for that?
- speaker: Respondent
  text: It's logic to us. It just makes sense to us to do that. I mean if you have to evacuate the city, you have to get the
    cars out.
- speaker: Interviewer
  text: Would you talk a little bit about continuity of operations and maybe discuss it to the extent that you can? I realize
    that some of that is beyond the level of this interview, but is there anything you can tell me about implementing the
    continuity of operations plan?
- speaker: Respondent
  text: Well, you know that we were involved with the evacuation of the Secretary of the Interior and her staff. Initially,
    she had requested that our helicopter do that, but we're tied in with the evacuation of Cabinet members. That's one of
    the longstanding responsibilities of the United States Park Police and our helicopter unit and the officers that secure
    the landing zones for these helicopters. We did provide motorcycles and an escort vehicle to get the Secretary and her
    staff out of D.C. That also included some members of the President's Cabinet.
- speaker: Respondent
  text: There is a plan that's called Octagon, and that is where military helicopters are brought in. We secure the landing
    zones, and the entire Cabinet is loaded into these helicopters and they go off to a secure location. For whatever reason,
    those helicopters never arrived. And we were involved in motorcading those people out, also. The overall security plan
    for the White House was also implemented. And that's a standing order, an understanding that's between the U.S. Park Police,
    the D.C. Metropolitan Police, and the U.S. Secret Service. So those plans were implemented also.
- speaker: Respondent
  text: It has never gone to full scaled evacuation in my 33 years here with the U.S. Park Police. I guess the closest we
    ever had was probably back in 1970, when we had some major demonstrations here in Washington, D.C.
- speaker: Respondent
  text: You know it's like any good organized plan. There's always something that fails. And in this case, there was one minor
    failure, but we were able to respond and make the evacuation. It wouldn't be as quick as by helicopter, but we did implement
    that.
- speaker: Interviewer
  text: I'm certainly not asking you to discuss details. I am interested just in your overall perception of how effectively
    it was implemented, and it sounds like you're saying for the most part you were satisfied with it.
- speaker: Respondent
  text: Pleased. Yes, pretty well pleased with the, very pleased with the actions of the officers and the supervisors. They
    did what we expected them to do. They did what they're trained to do. In those types of situations, officers are individuals.
    They're on patrol as individuals, and they make traffic stops, and they're making arrests, but they also understand how
    to back up each other and work together. That's part of the training I was telling you that we were preparing for IMF.
    It takes a team effort. And this was truly a good team effort.
- speaker: Respondent
  text: But all that involves cooperation between the local police. I'm talking about Arlington, Alexandria, Fairfax County,
    all of the fire departments, all of the police departments, federal entities, such as the FBI and the Secret Service,
    all working with the U.S. Park Police and I was very well pleased. They brought up their command post. Metropolitan Police
    had a command post. The Secret Service had a command post. The Mayor's office had a command post. We ended up sending
    representatives from our agency to each one of those command posts.
- speaker: Interviewer
  text: Would you assess both the advantages and disadvantages to having so many command posts? Can you talk about both the
    pluses and minuses?
- speaker: Respondent
  text: The plus side is the exchange of information. And by having a force representative there from the Park Police and
    let's say something comes into the FBI command post, a possible threat, we'll get it to our troops a lot quicker. And
    vice versa, if we come across something, then that information is shared with the FBI or the Secret Service.
- speaker: Respondent
  text: Probably the downside is that when something like this occurs, there is a lot of information coming in. You don't
    know the source. You don't know how good the information is. Somebody receives a phone call that they're going to blow
    up the Lincoln Memorial. Where did this call come from? Is this a prank call? Things like that. And there were a lot of
    bomb threats that day that followed suspicious packages. Somebody left their briefcase and ran off. The next thing you
    know we're thinking it could be an explosive device. So, then we have to secure the area. Then we have to bring in the
    bomb dogs and just go through that whole routine. I mean for our own safety. There again, you fall back on your training.
- speaker: Respondent
  text: There is a move right now. Metropolitan [Police Department] was very big. They got a lot of money as a result of 9/11
    to further expand their command center. Some of this money came about prior to 9/11 because of the International Monetary
    Fund and World Bank demonstrations where all of the involved agencies can have representatives there. And keep in mind
    the Metropolitan Police, they're the lead agency in the city. They have 3,000 police officers. A bulk of demonstrations
    occur on U.S. Park Police property because it's federal land that is open land. And that's where large demonstrations
    can take place. So, we have a very good cooperative relationship with the Metropolitan Police.
- speaker: Respondent
  text: I think that when you look at all of these different command centers, you're probably not going to see them coming
    together in one because I don't believe the FBI would want to be part of the Secret Service, and the Secret Service doesn't
    want to be part of the FBI. And the Metropolitan Police don't want to be part of the Park Police. Probably the only way
    you'd ever see a joint command center work is if there is a real true disaster and FEMA came in and it became a FEMA command
    post, where all of your support services, your fire, police, and rescue were all working with FEMA.
