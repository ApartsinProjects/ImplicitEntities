collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: But she loved people?
- speaker: Respondent
  text: Oh, yes. Always did. Had, had a lot of friends. It was so bad that she had to pay the phone bill [laughs]. She'd be
    on the phone for sixty minutes, ninety minutes, staying in touch with friends. And she did this continuously. Also, she,
    she forever wrote cards to friends. Always ready to give advice. And, what else shall I tell about that, that gorgeous
    woman? She was a very, very proud American. Was very proud of her airline, of her uniform, or her Chevys, until I changed
    her into different cars. But, she was a typical, hot dog-Chevy-American woman, never really changed that. As a matter
    of fact, she was so proud of her automobiles, we, we always set together for debriefings on Friday night. Friday nights
    at the same, I called it a diner, she called it a restaurant, but it's big. It's a landmark in Bordentown, New Jersey.
    It's called "Mastoris." And we, every Friday night we'd go there and sit there for about three hours, eat and then have
    a drink. And then, debrief each other - her flights, her experience on the flights and myself at work. I, I worked pretty
    long hours and that was, that was actually my, my real relaxation to, to talk to her about the week, and then her week.
    And that we did until, until the end.
