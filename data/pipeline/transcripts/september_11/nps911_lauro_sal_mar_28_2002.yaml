collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Your official title this point in time is?
- speaker: Respondent
  text: Currently I'm the commander of our planning and development unit.
- speaker: Interviewer
  text: But at the time of the September 11th attack?
- speaker: Respondent
  text: I was assistant commander of our Special Forces Branch, acting as the commander of the Special Forces Branch.
- speaker: Interviewer
  text: Then maybe just to start if you would tell me how you first became aware of the terrorist attacks on the World Trade
    Center and what your first actions were.
- speaker: Respondent
  text: Okay. I was in my office in Building 136 in the Washington Navy Yard, where we have temporary offices. Actually, I
    was working on plans for the upcoming World Bank/International Monetary Fund demonstrations which were to occur the end
    of September. We'd been working on that for several months. We expected major problems with these groups. Some of these
    demonstrations have turned violent in other countries and we were planning for violence here. As I was working on some
    of our plans one of my, one of the officers who works for me came in and said, "Just heard over the radio that there'd
    been an explosion in one of the towers of the World Trade Center near the top." So, we went into another office where
    there's a television and a group of officials ended up congregating in there looking at, I don't remember if it was CNN
    or one of the local channels had the shot of one tower burning. And they were coming up with all sorts of theories as
    to what it was. And I remember we were sitting there trying to, discussing probably coming down here to headquarters to
    coordinate. If it did turn out to be terrorism, we need to get down here and coordinate our response, because obviously
    DC is a target just as New York is. And while we were discussing that is when we saw the second plane hit the second tower,
    which was, I mean everybody has seen it now, but at the time it was just a shocking thing to see. And that's when we knew
    it hadn't been accidental, the first one. That we were under some sort of attack. We immediately - Major Pellinger, who
    was my immediate boss at that time, but who was acting as the commander of the Operations Division, he called here and
    spoke to Deputy Chief [Edward] Winkel, who was acting as the Chief of Police since we, our chief had retired, and we hadn't
    replaced him yet. And Deputy Chief Winkel asked us all to come down here to headquarters exit to meet in the conference
    room to determine what steps we were going to take to secure the monuments and memorials.
- speaker: Respondent
  text: I was driving from the Navy Yard across the Southeast Freeway towards the headquarters right here and speaking on
    the phone to my mom back in New York, because I have a nephew who works on Wall Street. And I called to - I wasn't sure
    where exactly he worked. I was pretty certain he didn't work in either of the Twin Towers, but I called to see if she
    knew for sure, if she had spoken to him. And as we're speaking and I'm coming across the freeway, I saw an explosion in
    front of me. I knew it was in the vicinity of the Pentagon. I didn't actually see the Pentagon, but I could see the flames
    and smoke coming up. I said, "Mom, I have to go. I think there's an explosion near the Pentagon. It might have been another
    plane." I came off of the exit and as I was driving down here you could see across the river, flames and smoke going up.
    And then we got a report from a couple of our officers who were right near there that it had been a plane that had crashed
    in.
- speaker: Respondent
  text: We responded in here. The chiefs, Deputy Chief Winkel, Deputy Chief Holmes, and Deputy Chief Schamp, myself, Major
    Pellinger, several captains, Captain Walters, Captain Berberich, I believe, all met in there, started discussing what
    we were going to do. We immediately realized that we had to secure the area around the White House, since all of jurisdiction
    around the White House is our property and our responsibility. We needed to secure the monuments and memorials, make sure
    that all of the people were evacuated to safety. And Major Pellinger set up in the command post and he was running the
    operation from there. I went out onto the street and I took command of our operations out on the street.
- speaker: Interviewer
  text: Where on the street?
- speaker: Respondent
  text: Just out on, making sure everything was done. I was physically out there. What we did was we called, we have a mobile
    command post and I had that brought out to 12th Street and Jefferson Drive on the Mall. The Mall Metro? We set that up
    there and that was our, basically our mobile command where we had officers reporting to. I responded up to the White House
    area. And our officers, Metropolitan Police, and Secret Service had the entire area around the White House secured. Several
    blocks they had closed off to vehicles and pedestrians. Went up to the Washington Monument and we had Captain Berberich,
    who's the commander of Central District, who was there with one of his lieutenants and a number of officers and they had
    the area around the Washington Monument secured. They were making sure no vehicles came up the service roadway and they
    were keeping pedestrians outside of the ring of Jersey barricades that are up there. Lieutenant [Pete] Markland I believe
    was at the Lincoln Memorial. I'm sorry, Lieutenant Markland was at the Ellipse. He was securing the Ellipse. Captain Walters
    I believe went up to the Lincoln Memorial and coordinated the closure up there. And we had personnel at the Jefferson
    Memorial. I'm not sure exactly who was up there, but we had, we knew that all of the areas were secure, and everything
    was closed.
- speaker: Respondent
  text: And that's about the time when we heard that the government was shutting down and they were evacuating all of the
    government offices, which meant that all of the non-government offices were going to be evacuated also. We had massive
    crowds down there. Someone suggested that we close the Mall, which we did not do. I recommended against that because basically
    it was being used as a shortcut by people getting back and forth to Metro, trying to get across one of the bridges, trying
    to get to their vehicles, wherever they were going. So, we left the Mall itself open. The Mall became pretty crowded,
    people just wandering around kind of like shocked, what's going on and all.
- speaker: Respondent
  text: One of the problems we had was we had a lot of officers respond in. And communications, we use the Nextels a lot and
    our radios a lot. Because of the number of transmissions, we were having problems with people getting on the radio. The
    Nextels, for a while the system completely went down. It just was overloaded and shut down. So, we had officers responding
    in, and a lot of them just responded to locations where they thought they would be needed. So, it took us a while to get
    a handle. We knew we had everything covered, but we weren't, for a while we weren't sure who was at which location. We
    knew what officials were there. It just took a while for everything to shake out and for the officials there to keep track
    of who they had.
- speaker: Respondent
  text: We were getting constant reports, you know, a bomb at the State Department. Another plane heading inbound from Pennsylvania.
    A truck coming across one of the bridges. A suspicious package on the Memorial Bridge. It was just constant for probably
    2 or 3 hours. Fortunately, all of these reports turned out to be false reports and just kind of hysteria. But we had to
    try to keep our officers focused on making sure they were doing what they had to do to protect their areas.
- speaker: Respondent
  text: Lieutenant [George] Wallace, who's in charge of our motorcycle unit, and who was one of the first officers at the
    Pentagon, he came up to me and we discussed, we had a massive traffic jam trying to get out of the city. And we have in
    the morning and in the evening during rush hour we change some of the roadways, mainly Rock Creek Parkway. In the morning,
    it's all lanes inbound, in the evening, it's all lanes outbound. And he recommended that we do that. I believe it was
    about shortly after 11:00, maybe even before that, when we decided that we would put the P.M rush hour traffic pattern
    into effect.
- speaker: Interviewer
  text: Were there any particular challenges in doing that?
- speaker: Respondent
  text: Well, the concern was people aren't used to that. They know in the morning, between 4:00 and 6:00 at night, they can't
    come southbound on Rock Creek Parkway, because it's all northbound. The problem is if we do it at 11:00, there's a chance
    somebody is going to get on. We have barricades that block them, but we were concerned that somebody is going to drive
    around.
- speaker: Respondent
  text: So some of the main areas, like Rock Creek Parkway and Beach Drive, the exit from Teddy Roosevelt, not Teddy Roosevelt,
    yes, TR Bridge where it comes on to it, we made sure those barricades were there and we kept officers there for a while
    just until the traffic really started flowing, to make sure nobody came around the barricades. We didn't need to have
    a head on collision in the middle of all of this.
- speaker: Respondent
  text: At one point there was a suspicious package on Memorial Bridge and until we were able to determine that it was nothing
    dangerous, we shut Memorial Bridge. So that compounded the problem. Now one of the major arteries out of the city is blocked.
- speaker: Respondent
  text: So, we were trying to do that. We've got this P.M. rush hour traffic into effect and started getting traffic out of
    D.C. One of the lessons we learned is there wasn't a lot of coordination between, we work really closely with Metropolitan
    Police and some of the other jurisdictions. But everybody was kind of focused on their own problems and there wasn't a
    lot of coordination between agencies immediately. Later on, it got better.
- speaker: Respondent
  text: But one of the issues was we can feed all of this traffic out, but at some point, it's going to hit a roadblock, which
    it did. Going up Beach Drive to Rock Creek Park, the traffic signal at Beach Drive and Park Road was on its normal cycle.
    It's not on the P.M. rush hour cycle. So that traffic backed up there. When it got out into Maryland, those lights aren't
    set. So there have been a lot of meetings. The Council of Governments has had meetings with the transportation people
    from all of the jurisdictions to come up with a plan so that we not only can get them out of the city, but we can get
    them beyond that and out to the outer suburbs. So that was one of the lessons that we learned.
- speaker: Interviewer
  text: So, the metropolitan evacuation plan that the District has been working on, the Park Police have been involved in
    that?
- speaker: Respondent
  text: Yes, we're involved in that.
- speaker: Respondent
  text: Yes, we're involved in that and the Council of Governments' plans. What I did in my role, I supervised the motorcycle
    unit. I was involved with the lieutenant who's in charge of that unit. So shortly after the 11th, I asked he and his personnel
    to come up with one plan which could then, we knew we were going to be asked this, a plan to evacuate large numbers of
    people on our roadways. What roads would we make one way outbound? What roads could we shut completely? And that's being
    used, and it's being tied in with the entire Council of Governments' plan for the whole area.
- speaker: Respondent
  text: And the other plan that I had them work up was the plan if we, sort of like the Capital where they don't allow any
    trucks down there, if we decided for whatever reason because of the threat level or something, we didn't want any trucks
    down around the monuments or the memorials or on the Mall, where would be the best places to shut it down and post officers
    to make sure? So, we had that plan in place, too. If we needed to, we can quickly decide where to assign officers.
- speaker: Respondent
  text: One of the challenges we faced that day, not only were we worried about the monuments and memorials downtown, but
    because of the Pentagon, we have an MOU with Arlington Cemetery. We provide assistance in Arlington Cemetery. We handle
    law enforcement in there under this memorandum of understanding. And Arlington County and Arlington Cemetery requested
    our assistance in this cemetery to prevent people from going from there into the Pentagon area. And also, on the roadways
    leading up to the Pentagon, some of which are ours. We had to shut some roadways so traffic couldn't go, like on route
    110 and some of the other roadways.
- speaker: Respondent
  text: At one point that afternoon, I'm not sure exactly when, they found, at about 3:30 that afternoon they found a piece
    of the airplane in Arlington Cemetery. So, we had to send officers out there to secure it as evidence. Eventually, the
    FBI came and took custody of it. So, we had that going on at the same time.
- speaker: Respondent
  text: We were also heavily involved with evacuating the Secretary of Interior. She has a security detail which is made up
    of Park Police sergeants. And they evacuated her out to a secondary site, through a continuity of operations.
- speaker: Interviewer
  text: How smoothly did that work?
- speaker: Respondent
  text: That went pretty smoothly because they just took her out of town. There is a plan, the Federal Government has a plan
    to, which I won't go into great detail because some of it is classified, to get Cabinet officials out of D.C. It goes
    back to the '60's and '70's when we were worried about the Soviet Union attacking us with nuclear weapons. And it's a
    plan to quickly evacuate all of these Cabinet members out of D.C. And we play an integral part, because we have to secure
    the area and make sure they get out of there. We practice that probably every couple of weeks. We get a practice call
