collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Can you describe your role and what happened at the Statue of Liberty on September 11?
- speaker: Respondent
  text: I was the chief of interpretation at the Statue of Liberty. When the attacks happened, we quickly set up a triage
    area to assist any injured visitors and staff. We coordinated with EMS and other emergency personnel to provide care and
    manage the situation.
- speaker: Interviewer
  text: What were some of the challenges you faced during the evacuation and triage process?
- speaker: Respondent
  text: One of the biggest challenges was communication. We had to coordinate with New Jersey troopers and EMS teams, but
    the systems were overwhelmed. Also, managing the walking wounded and ensuring everyone was accounted for was difficult
    under the circumstances.
- speaker: Interviewer
  text: How did the heightened security affect your operations at the park?
- speaker: Respondent
  text: Security was significantly increased. We had to close certain areas, restrict access, and work closely with the Park
    Police and other agencies to maintain safety. It was a new level of vigilance for all of us.
- speaker: Interviewer
  text: Were there any specific incidents that stood out during that time?
- speaker: Respondent
  text: Yes, there was a speedboat scare near the harbor which caused additional concern. We had to quickly assess the threat
    and coordinate with security forces to ensure the safety of everyone on the island.
- speaker: Interviewer
  text: How did the staff and visitors react during the crisis?
- speaker: Respondent
  text: There was a mix of fear and confusion, but also a lot of cooperation. Staff worked hard to keep visitors calm and
    informed. Many visitors were understandably shaken but followed instructions well.
- speaker: Interviewer
  text: What lessons were learned from the emergency response at the Statue of Liberty?
- speaker: Respondent
  text: We learned the importance of having clear communication channels and pre-established protocols for emergencies. The
    need for coordination between different agencies was also highlighted, as was the value of training staff for crisis situations.
