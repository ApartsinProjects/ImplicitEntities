- speaker: Respondent
  text: On September 11, 2001, Jeremy Logan Glick reluctantly left his Hewitt, New Jersey home on business as a sales manager
    for a Web management company. He relished every moment he had at home with his wife and their three-month-old baby. One
    of six siblings raised in Oradell, New Jersey, Glick graduated from the University of Rochester and married his high school
    sweetheart. When confronted with the hijack situation on Flight 93, Glick phoned his wife. She recalls him calmly describing
    the terrorists and their threats. Glick, a former national collegiate judo champion and black belt, told his wife that
    the passengers and crew were making plans to rush the terrorists. As their call ended, Glick told his wife he loved her
    and needed her to be happy.
