collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Danelle, the first question I have is from the moment you were aware that something had happened, what went on?
- speaker: Respondent
  text: Well, I had just come off a few days' vacation and was back at my job as a park ranger in the interpretation division
    at Ellis Island. I was walking down the hall getting ready to help set the building up for the arrival of the first visitors
    that day. And another staff member came into the hall and said she'd heard a report that one of the World Trade Center
    towers was on fire. We did not know why at that point.
- speaker: Respondent
  text: And I went up to the big windows in the Historic Great Hall at Ellis Island. I and a couple other employees were there,
    seeing the smoke billowing out of one of the towers and thinking at that point how horrible it was. And I think I said
    a little prayer for the people in the tower at that point. But we thought at that stage that it wouldn't directly affect
    us on Ellis Island. So, I figured I should probably get back to work and I started straightening benches in the Great
    Hall.
- speaker: Respondent
  text: And I'm not sure exactly how I wound up back at the windows, but I did with those same two employees. And we're very
    used, at Ellis, to hearing the sounds of aircraft around the harbor, sightseeing helicopters, and commercial aircraft
    and so on. But we heard the sound of an aircraft that was just way too loud and felt like it was way too low over our
    building, and it seemed to kind of make the building vibrate a little bit.
- speaker: Respondent
  text: And then this big silver plane came into view that had flown almost over our heads, almost over the building at Ellis,
    the main building. And I wondered, you know, what is this plane doing flying in an unusual pattern, coming from the south
    and heading toward the World Trade Center? Is it going to fight the fire? Is it going to drop water on it? You know, what
    is it doing? And it just kept on flying.
- speaker: Respondent
  text: And I have this kind of still shot in my mind of that silver plane just before it went into the tower. And then it
    just disappeared. It was swallowed by the tower, leaving a hole. And we're about a mile and a half away from the World
    Trade Center with a clear view across the harbor. And it was very surreal to see this happen at that distance. And there
    was a second or two or three for us to all kind of process what we'd seen.
- speaker: Respondent
  text: And then things started to click into place that this was not an accident. We heard some radio transmissions over
    the park radio that made us realize there were two planes that had hit the two towers. And our immediate thought was,
    was there going to be a third.
- speaker: Respondent
  text: We're all aware from minor incidents in the past that the Statue of Liberty is a potential target for terrorists or
    other malcontents. And so, our immediate concern then was to evacuate most of the staff from Liberty Island especially,
    and also from Ellis Island. Luckily for us there were no visitors in the park as yet. It apparently was not very lucky
    for those visitors who were on the first boat in Battery Park about to leave Lower Manhattan when all of this started
    occurring. But we only had to worry about the staff.
- speaker: Respondent
  text: And I at Ellis - we were called to our closing posts. Meaning several of us went to the top floor of the building
    to then sweep the building to make sure all the people who were on the island were accounted for. So, we were walking
    the sweep throughout the whole building. And eventually, they had us gather at the canopy in front of the main building,
    and from that point you cannot see Manhattan directly. You're looking out toward the statue.
- speaker: Respondent
  text: As all this was going on, we kept hearing the radio reports and things like one of the park police officers who was
    in the pedestal of the statue seeing another plane approaching and not knowing if it was friend or foe and being ordered
    to get out of the statue as fast as he could, and eventually everyone realizing it was a U.S. military plane. So, there
    was kind of a tinge of panic in the air, I think.
- speaker: Respondent
  text: And apparently there was the 9 o'clock staff boat that was taking NPS and concession employees from Battery Park to
    Ellis and then to the statue was en route during all of this and eventually then got sent back. So, this was another thing
    we were hearing. The employees who'd left the tip of Manhattan on that boat never actually set foot on Liberty Island.
    They just went back and then had to get home through Manhattan as all of this was going on.
- speaker: Respondent
  text: There was a little confusion on Ellis about, where we should be, you know, should we get our belongings or not to
    be ready to evacuate ourselves? Eventually they had us all gather in front of the canopy. I remember a second staff boat
    run. It was that same boat but making another run to evacuate more personnel off of Liberty Island so that only protection
    personnel would've stayed at Liberty Island at that point.
- speaker: Respondent
  text: I remember some of my colleagues getting off - having come from Liberty Island, other people in the interpretation
    division getting off at Ellis Island. You know, one of them who lives on Liberty Island had brought her dog along evacuating.
- speaker: Respondent
  text: And then that boat went on. It picked up some of the employees who live in New York and work at Ellis and was taking
    them back to Manhattan. And there were, I don't know, 30 or so - I'm not sure the number - NPS and concession and foundation
    employees gathered in front of Ellis. A few of them were out at the end of the dock where they could see Manhattan and
    some of them started to scream. And those of us who were at the canopy kind of ran over to the end of the dock to see
    what they were screaming about, and it was that the first tower had fallen.
- speaker: Respondent
  text: Nobody I think expected the towers to start to fall at that point, so it came as quite a shock. I did not see the
    tower itself fall. By the time I got there it was already gone. But there was this huge brown cloud of billowing smoke
    and debris just spreading out over all of Lower Manhattan and up into the air, and the bizarre picture of just one of
    those towers standing there when of course this had been a major part of our skyline, you know, for the five years I've
    worked there.
- speaker: Respondent
  text: And then there was our staff boat that had almost gotten back to Lower Manhattan when the tower fell. And there was
    a horrible minute or so that seemed like forever when we didn't know if that staff boat was safe or not. It just kind
    of got enveloped by the cloud. And then eventually the captain came on the radio and said, we can't land. We're coming
    back. And so there wound up being some of my colleagues who would have tried to go home through New York who wound up
    stranded at Ellis Island for much of the day because it was not judged safe to try to let them off in Manhattan.
- speaker: Respondent
  text: One of the park police - the senior sergeants - took charge at the canopy and I guess of park operations as a whole,
    until some of the higher-ups got on scene. And I'm very grateful to him for staying calm and getting us organized, and
    you know, telling who to go where and who to do something useful. Some of the people who had EMT training started collecting
    - sending people to collect medical supplies for the triage that would eventually happen on the island, on Ellis. And
    some of them went back to Liberty to collect medical supplies from Liberty as well.
- speaker: Respondent
  text: And other employees were still very dazed and frazzled, and a few of them were really distraught. I guess I was in
    the dazed and frazzled category myself. I was told at one point for example to look for a certain medical supply and,
    you know, put those kinds of things together, but I couldn't find them. And I was just kind of in a daze looking back
    and forth not quite having my act together.
- speaker: Respondent
  text: I remember a couple of my colleagues really crying and screaming and concerned about friends or relatives who were
    either on the staff boat before it came back or who were working in Lower Manhattan. And you know, they were sure that
    they had been killed, which thankfully turned out not to be the case. But it was pretty confused initially and then started
    to organize itself out.
- speaker: Respondent
  text: I have training as a first responder, to deal with sort of basic first-aid kinds of things. But because of a quirk
    of having had my certification expire, I was told that I was not officially certified, so I should not consider myself
    in the category of people who should stay and try to deal with whatever triage was going to come, which I at the time
    felt very relieved about because I really didn't want to deal with this horrible situation. You know, I just wanted to
    get home and get away myself, although I later would have kind of feelings of guilt about, you know, whether I could have
    stayed to do more. But it turned out there wasn't too much I could've done because we - unfortunately there weren't that
    many people to triage.
- speaker: Respondent
  text: I understand there were a few hundred evacuees that came through Ellis Island and some of them needed medical treatment,
    but you know, all the ambulance personnel and everyone who were ready to receive casualties basically didn't have very
    much to do.
- speaker: Respondent
  text: At some point in all of this I had been - those of us who were parked on Ellis Island, which included me, were told
    to get our cars out of the regular parking lot so that the ambulances and such could come over. And so, at around 10:30
    - I guess all of this started for me at around 9 a.m., and then at around 10:30 they told those of us who were not either
    in protection or who were, you know, currently certified medical personnel to go home. Those of us who live in New Jersey
    who could get - start to get home.
- speaker: Respondent
  text: They told us to leave, and my car at that point was in the parking lot by the baggage and dormitory building which
    is facing Manhattan. So, I had spent much of this time not looking at Manhattan because the main building was between
    me and it.
- speaker: Respondent
  text: But then I went out to my car and, you know, once again was dealing with this image of only one of the towers there.
    And as I was loading stuff in my trunk about to leave, I heard somebody, you know, yell that the second tower was starting
    to go. And I looked up and, you know, there it was starting to crumble. And I particularly remember the big antenna on
    top, you know, going off at an angle and then starting to come down.
- speaker: Respondent
  text: I guess I have three big images from this day that are sort of like snapshots in my mind. And one was the plane about
    to hit the second tower. And the other was the big, huge billowing cloud coming out when the first tower fell. And then
    that image of the second tower with the antenna starting to fall as the building just went straight down.
- speaker: Respondent
  text: So, there was all of this carnage across the harbor from me but still at a distance and very surreal. And another
    thing throughout the day that I kept focusing on I guess was the sound. Because we were at that distance, there was a
    second or two delay before we heard anything. And that made it even more surreal, because when I saw the plane crash at
    first and then when I saw the second tower fall it was in silence.
- speaker: Respondent
  text: And then there was a second or two before you heard the sound that came with it. So that added to this - the disconnection
    and the difficulty of dealing with it. But eventually I did leave the island then.
- speaker: Interviewer
  text: About what time?
- speaker: Respondent
  text: It was somewhere around 10:30, a little after 10:30. And at that point, my trip home was like every science fiction
    movie's version of a mass urban evacuation from some catastrophe. They had closed all the highways and so I and a whole
    lot of other people were trying to drive home through New Jersey on local streets. And it was basically one big parking
    lot.
- speaker: Respondent
  text: I live about 28 miles away northwest of the park in New Jersey. And normally it would've taken like half an hour for
    me to drive home at that time of day. But it took me three hours, and most of that was spent in bumper-to-bumper traffic,
    driving through local streets in Jersey City and Newark that were often in neighborhoods that I would normally have avoided.
- speaker: Respondent
  text: You know, and just these streams of people, their cars inching along. Lots of police directing people. Lots of pedestrians,
    you know, just hanging out in their neighborhoods. It was all orderly and polite. Everybody was following the instructions
    of police. And you know, normally if you drive in this area, you know, everybody gets aggravated and everybody tries to
    cut into each other - in front of each other and honk at each other and so forth. And there was really none of that. I
    think everybody was very subdued and following instructions and listening to the radio and polite to each other.
- speaker: Respondent
  text: And eventually I stopped off after most of those three hours and stopped at a shopping mall and tried to call my brother
    to leave a message for him that I was okay. Left a message on his answering machine. Had a bite to eat, because by that
    time -
- speaker: Interviewer
  text: I'm sorry. I forgot. Did you manage to call him or did you -
