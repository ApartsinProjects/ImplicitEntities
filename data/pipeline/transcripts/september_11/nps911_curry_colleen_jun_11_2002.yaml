collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware that something had happened, what went on?
- speaker: Respondent
  text: I think disbelief. I was conducting inventory over in my office with Mary Troy from Clara Barton, and we just heard
    this loud bang and weren't quite sure what it was. And Karen actually came over and told us what had happened.
- speaker: Respondent
  text: And then I remember walking across here and hearing another, I think a, one of the tanks in the plane had exploded
    at that point and some car alarms started to go off, and I just remember this kind of detached feeling like it couldn't
    possibly be happening here.
- speaker: Respondent
  text: And we actually ended up watching in our Facility Manager's office. He has a small TV, and we had on the news from
    New York and were watching that, and it was just, just unbelievable.
- speaker: Interviewer
  text: Mmhmm. So, you were just conducting inventory you said with Mary -
- speaker: Respondent
  text: With Troy, from Clara Barton.
- speaker: Interviewer
  text: Uh-huh. And the, the plane hit the, the Pentagon, you heard a, a loud boom -
- speaker: Interviewer
  text: '- and the tanks exploded?'
- speaker: Respondent
  text: I think it was a tank or something afterwards, because when the plane hit, from where I was in my office, it sounded
    almost just like somebody had slammed a door. And then when after Karen came over and told us, and I think we tried to
    call out a few times, my sister-in-law actually works down by the World Trade Center, so I tried to get a line out and,
    of course, we couldn't. And then, as I was walking back over this way to see what else was happening, that's when another
    explosion occurred, and I'm assuming it was maybe one of the fuel tanks on the plane. I'm not quite sure, but it set off
    a number of car alarms, and it was just an odd experience.
- speaker: Interviewer
  text: Wow. Set off car alarms?
- speaker: Respondent
  text: Mmhmm. There were car alarms that started going off.
- speaker: Interviewer
  text: Okay. What then happened?
- speaker: Respondent
  text: Basically, we were trying to figure out how bad it was both in New York and here. We were pretty much glued to the
    small TV in Malcolm's office. And I think at one point we sauntered over to the house to see what was going on. I think
    the visitors had been evacuated at that point, but we stood there. So, there were about five of us I think standing over
    there, and within a few minutes, I'm not quite sure of the time frame but a car with the FBI came up and they pretty much,
    it, it was like they were taking over the site as kind of an operating ground. They didn't stay long, so we're not sure
    if, I think that's when they didn't know where that last plane was going and they thought oh, here's this big house on
    the hill, we might not, might not be a good idea to stand here. So, they weren't there that long.
- speaker: Interviewer
  text: Did they, did you notice anything that they said, or did you talk with them or were they just there looking around?
- speaker: Respondent
  text: They just were looking around, yeah.
- speaker: Interviewer
  text: How did you know it was an FBI car?
- speaker: Respondent
  text: They had the jackets on.
- speaker: Respondent
  text: Said FBI on the back.
- speaker: Interviewer
  text: Wow. What then?
- speaker: Respondent
  text: Basically, we were told to go home. The Supervisory Park Ranger, Frank Cucurullo, there were, I think he and our Facility
    Manager and, and another person, Keith Drews, stayed on site, but we were basically told to go home. We tried to go out
    the, Fort Meyer Gate and, of course, that was completely shut down. So, we tried to make our way out onto the, the parkway.
- speaker: Respondent
  text: And I had actually had an, a volunteer coming in that day. She actually made it in here. She was, she's transcribing
    journals for Markie Williams and actually showed up a little before ten and, of course, it had happened at that point
    and I told her we're sorry (laughter), we can't do it today.
- speaker: Respondent
  text: And I also had an appointment at the Lee-Fendall House in Old Town to look at some objects that they have on loan
    from us, and I called them, the director there to tell her that we weren't coming. And, and they didn't even know - they
    hadn't heard anything about either New York or what had happened to the Pentagon, so she was pretty shocked when I told
    her.
- speaker: Interviewer
  text: Wow. So, this you, this is the Lee what House?
- speaker: Respondent
  text: The Lee-Fendall House.
- speaker: Interviewer
  text: There's several Lee Houses.
- speaker: Interviewer
  text: Okay. I appreciate your patience with me. I, I am now getting into a world that I knew little about [laughter]. Okay,
    so you had been going to the Lee-Fendall House and you called the director there to tell, and they hadn't even heard what
    happened.
- speaker: Respondent
  text: They, they didn't even know about New York City or even the Pentagon.
- speaker: Respondent
  text: So, she, first, she sounded shocked when I told her I wasn't coming. I said, well, I have to cancel, we, we can't
    come today, we're, we're shutting down and, and she was just kind of - well, why? - and so, when I told her, she, she
    hadn't heard anything.
- speaker: Interviewer
  text: Wow. What did she say then?
- speaker: Respondent
  text: She couldn't believe it, and she says, "well, I have to go make some phone calls" [laughter].
- speaker: Interviewer
  text: I'll bet. So, in other words, at this point, and this is very early, quite early on, about what time did you figure
    that you heard the [crosstalk]?
- speaker: Respondent
  text: Oh, gosh. Before, probably around ten, I guess? A little before ten?
- speaker: Respondent
  text: I know that's when the volunteer was supposed to show up, and it was just around that time.
- speaker: Interviewer
  text: Ah, yes. And you had said that that one volunteer who's doing the transcribing had shown up as well.
- speaker: Interviewer
  text: Okay, and so you were trying to figure out, and you were, and the TV in Malcolm's office, and -
- speaker: Interviewer
  text: Malcolm is?
- speaker: Respondent
  text: He's our Facility Manager. His last name's Willoughby.
- speaker: Interviewer
  text: Okay. And the visitors by that time had already been evacuated you say?
- speaker: Respondent
  text: I think so. I'm not sure, 'cause I was over on this side. So, I'm not quite sure when they were told to leave. By
    the time I made it over to the House soon after ten, it was pretty empty of visitors.
- speaker: Interviewer
  text: Okay. So, when you're saying this side, this is the -
- speaker: Respondent
  text: This is kind of the administrative side over here, and my office is in the last building, down here on the right.
- speaker: Respondent
  text: So, we really don't have much interaction with the visitors here.
- speaker: Interviewer
  text: I see. Okay, right. Okay. So, you then went out of the office for, and which is when you saw the FBI. Right? Out on
    the grounds?
- speaker: Respondent
  text: Well, once I walked over to the House, yeah. They had -
- speaker: Interviewer
  text: '[Crosstalk].'
- speaker: Respondent
  text: They had driven up in front of the House.
- speaker: Interviewer
  text: Okay. And then they checked the area around, talked to some people and took off.
- speaker: Interviewer
  text: All right. And then, you were told to go home.
- speaker: Interviewer
  text: How did that happen, did somebody come and call you, or - ?
- speaker: Respondent
  text: Basically, our Supervisory Park Ranger, Frank Cucurullo, told us. And I don't even know, I don't think we were able
    to contact Headquarters. Do you, I don't even remember. I don't think we had any contact with Headquarters, 'cause our
    phone lines were down -
- speaker: Respondent
  text: '- and our radios weren''t working. So, he basically made the decision, you know, sending people home.'
- speaker: Interviewer
  text: Mmhmm. Okay. So, you then called the people at, Lee-Fendall House to say, not today.
- speaker: Respondent
  text: Mmhmm [laughter].
- speaker: Interviewer
  text: Okay. Then, then what happened? You made those calls. Then what happened?
- speaker: Respondent
  text: Well, after I did that, and then I went over to the House, so it was, being over at the House was kind of the last
    thing I did before we were told to leave.
- speaker: Respondent
  text: And I think I came back over here, um. They were basically trying to figure out who was still here, if, who had left,
    that kind of thing. So, it was kind of, a little chaotic over here. But, but basically, I think by about ten thirty or
    a little before ten-thirty I had left -
- speaker: Respondent
  text: '- or was making my way out anyway.'
- speaker: Interviewer
  text: Okay. And you left to go -
- speaker: Respondent
  text: Home to Woodbridge which was interesting. Took me about two and-a-half hours.
- speaker: Interviewer
  text: Tell me about that. What happened?
- speaker: Respondent
  text: It was, it was not good. I got to the traffic circle down here by Memorial Bridge and just followed the signs to 395,
    not really thinking. And they had already blocked off the roads right there, the, that part of the ramp to 395 goes right
    by the Pentagon that was hit and, so they basically had us all driving over the median doing U-turns. And I just remember
    finally getting onto another ramp onto the parkway and just sitting there for quite some time. And it was just a parking
    lot. And then basically, it was surreal because by the time we got near the, the airport, or even before then, there were
    just people walking. Wandering - a lot of people from the Pentagon who had to just, you know, leave their cars. People,
    when, when we got near the airport, people walking with suitcases just wandering.
- speaker: Interviewer
  text: People with suitcases, in other words, people, what, what [crosstalk]?
- speaker: Respondent
  text: From the airport. Obviously, they had either landed right before it happened and were kind of stranded or, it was
    just very surreal. They were just wandering all over the parkway or sitting on the side of the road.
- speaker: Interviewer
  text: Hmm. Then what?
- speaker: Respondent
  text: Basically, it was sitting in, in, in just a line of cars, slowly making my way through Alexandria to cut over by Mount
    Vernon. It was just a parking lot all the way down Route One.
- speaker: Respondent
  text: And I kept frantically trying to call my cell phone, 'cause I was more worried about my sister-in-law who works down
    by the World Trade Center.
- speaker: Respondent
  text: '''Cause I wasn''t sure, she works for the Bank of New York. I wasn''t sure, did she go into work that day and whatever,
    and couldn''t get through of course. And then I think finally, by the time I got down to Mount Vernon, I was able to get
    through and found out that no, she wasn''t down there so.'
- speaker: Interviewer
  text: She wasn't down, did she work at the Trade Center?
- speaker: Respondent
  text: She worked right next door to the Trade Center. Yeah, her office is -
- speaker: Interviewer
  text: '[crosstalk] happened to have gone [crosstalk]?'
- speaker: Respondent
  text: She was assigned to a, a bank job in a different part of the state that day. Thankfully [laughter].
- speaker: Interviewer
  text: Yeah, no kidding. That sounds a little unnerving. You had to, in other words, you were thinking about this while you
    were driving.
- speaker: Respondent
  text: Yeah, yeah. Try, I, I was more worried about her and, 'cause I was listening to NPR and, of course, they were, you
    know, relaying everything that was happening in New York. They had news reporters down there, and all I could think about
    was oh, my gosh, she's trapped down there. And I also have a friend of mine who has a contracting office at the Pentagon,
    so I was worried about her 'cause I knew she was working in parts of the Pentagon. 'Cause where it was hit was, parts
    of it were still under, kind of being restored, so I knew she -
- speaker: Respondent
  text: '- wasn''t down there. And luckily, finally when I got home, I got in touch with her and she hadn''t, she had been
    offsite at a meeting when that happened.'
- speaker: Interviewer
  text: Goodness. So, you finally got home.
- speaker: Interviewer
  text: And you were on the cell phone on the way back trying to get [crosstalk] -
- speaker: Respondent
  text: Trying to get, people.
- speaker: Interviewer
  text: '- see what''s going on.'
- speaker: Interviewer
  text: Well, once you made it home, what happened then?
- speaker: Respondent
  text: Basically, I had the news on nonstop. And, I couldn't sit. I just felt like I had to do something, and it was surreal
    'cause a lot of people had come home and very, it was very quiet. But I just felt like I, I ended up painting a bedroom
    or something just because I couldn't, I had the TV on to hear what was happening but just felt like I couldn't sit there
    and -
- speaker: Interviewer
  text: With the TV on you mean?
- speaker: Respondent
  text: Yeah, just listening to every - what was going on and -
- speaker: Interviewer
  text: Uh-huh. So, this was what? About, was mid-afternoon or something?
- speaker: Interviewer
  text: Keep going.
- speaker: Respondent
  text: That, that was it. Finally, I think around two or three I was able to get a fr - a hold of my friend. He works at
    the Pentagon. So, I was, that, she was the other one I was concerned about. But basically, it was just between the TV
    and also, I had the radio on listening to all of the, the different fund-raising things that were all of a sudden being
    put into action. You know, different restaurants saying that they would donate all the money that day or car washes everywhere,
    and it was just, it was amazing. And one other thing. I know that people commented afterwards at how kind I think everybody
    who was driving was, and it was really true.
- speaker: Respondent
  text: That whole - you know - as long as it took me to get home that day people were very - I think everybody was in shock.
    But you, you didn't hear of people getting, you know, honking their horns or, or you know, road rage or anything like
    that. It was very, very orderly, as much as it could be.
- speaker: Interviewer
  text: Mmhmm. Okay. So, by mid-afternoon about three o'clock, you were able to find out that your friend in the Pentagon
    was okay -
- speaker: Interviewer
  text: '- and hadn''t been anywhere near what happened.'
- speaker: Interviewer
  text: Um, then what went on?
- speaker: Respondent
  text: Um, I just kept that up all day, just pretty much listening to the radio watching the TV and then trying to keep busy
    doing odds and ends in my house. Trying to keep my mind off of it.
