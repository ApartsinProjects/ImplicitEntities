collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Just to start right in with September 11th, when did you first learn of the attacks on the World Trade Center?
- speaker: Respondent
  text: I received a telephone call telling me that the north tower of the Trade Center had been struck by a plane. That call
    came from my son, who was on an express bus heading into Manhattan where he works. Like I guess everyone else, we just
    assumed it was an accident. And I grabbed Lieutenant Dave Buckley and Sergeant Frank and we drove up to the overlook at
    Fort Wadsworth. It has a clear view of lower Manhattan.
- speaker: Respondent
  text: And a few minutes after that, we saw the second plane coming across the harbor. And at that point, I knew what was
    happening, but we kind of hoped it was just a plane that had been diverted because of the first incident. You know it
    was a very helpless feeling because you knew what was happening and there was nothing you could do to stop it. And then
    we watched the plane strike the south tower.
- speaker: Respondent
  text: And then from that point on, we were kind of busy just, I contacted the Statue commander and told him to evacuate.
    Luckily, visitors had not arrived yet for the day. And I ordered Fort Wadsworth shut down. And then I jumped in the car
    and went to Ellis Island.
- speaker: Interviewer
  text: How many officers do you have on Ellis Island? What does the organization there look like?
- speaker: Respondent
  text: At the time, working that day there were about 8-9 people total for the two islands, Ellis and Liberty.
- speaker: Interviewer
  text: Okay. So, after you saw that second plane hit, it sounds like you concluded that it was something other than pilot
    error. What were some of the things going on in your mind that had to be done?
- speaker: Respondent
  text: Well, initially, my thoughts were to prevent any further attacks, if possible. There was a report of a third plane
    coming in. And that report also went through New York City. They were advised of the same thing.
- speaker: Respondent
  text: Luckily, it turned out not to be true. I felt that if we were able, we evacuated the Statue of Liberty. And we kind
    of put a cordon of boats around it. I pulled all of my people off of the Statue, after the residents were evacuated, because
    I knew if a plane came there was nothing we could do about it anyway. But if something came by water, we had a chance
    to defend the place.
- speaker: Interviewer
  text: Was there an existing plan for evacuating the Statue of Liberty?
- speaker: Respondent
  text: Well, not really, but we've done it before. But like I said, luckily it happened early enough that no visitors had
    gone to the island yet. So, it was just a matter of getting staff off.
- speaker: Respondent
  text: And once that was accomplished, then we set up Ellis Island as a triage center. Throughout the day, I would say, about
    400 either evacuees or injured were taken to Ellis Island and treated and - I forget the exact number that was transported
    to local hospitals, but it wasn't as many as anybody thought because there weren't that many survivors.
- speaker: Interviewer
  text: Did it occur to you very early on that Ellis Island could be used in that way? I mean were you thinking about this
    at the same time you were thinking about the need to evacuate the Statue of Liberty? Thinking about well, how can, that
    we can make use of Ellis Island?
- speaker: Respondent
  text: Well, we've done it before. The Secret Service has used Ellis Island as a possible evacuation point when there are
    big events having to do with the United Nations and stuff. And its proximity to Lower Manhattan and the fact that it has
    a bridge that you can drive over makes it a viable site.
- speaker: Interviewer
  text: Did you augment your force?
- speaker: Respondent
  text: Right. We were augmented by officers that work out of the Brooklyn or Jamaica Bay unit. Most of them came by boat.
    We had one sergeant, who was fishing with a couple of friends in New Jersey, and he had his friends take him by boat to
    our marine unit location in Rockaway, New York. And he took command of one of our vessels that came up. That's the kind
    of response we got from people. And we also received a call from Federal Hall asking for assistance. So, we were able
    to get a sergeant and a couple of officers from Brooklyn to Federal Hall.
- speaker: Interviewer
  text: I believe I read somewhere that this event and that assistance, particularly to Federal Hall, was the first time that
    the U.S. Park Police had been in or supported the Manhattan Sites. Is that correct?
- speaker: Respondent
  text: Well, we're there now, and it appears to be permanently. But we've gone there on occasion at the request of the superintendent
    of the Manhattan sites for different things, some special events. A couple of investigations where we've - but it's only
    been for a day or two at a time, and it's, although there was one other time during Desert Storm, we had people at Federal
    Hall 24-hours a day. And that was the last time that we've been there on a regular basis.
- speaker: Interviewer
  text: How does the coordination occur between the Park Police and the superintendents, or the Park Police and the Park Rangers?
- speaker: Respondent
  text: Well, we know the superintendent of Manhattan sites because he worked in Gateway for years, so that makes things a
    little bit easier. But the coordination on that date and subsequent dates was smooth. I mean people just had it in their
    mind that they weren't going to let any obstacles get in the way of what had to be done. And I saw that from everybody
    I dealt with, Park Police, National Park Service. It was a real nice thing to see where something needed to be done and
    it just got done. Usual stuff that goes on, you know, minor impediments were just overcome.
- speaker: Interviewer
  text: What challenges did you face that first day and in the days after, I guess, as well, in terms of communication systems?
    I would imagine that landlines were down. Were you relying heavily on radios or NEXTEL systems?
- speaker: Respondent
  text: Well, one of the problems we had and we're solving it as of today, the Park Police at Statue and Ellis are on a different
    radio system than the rest of the New York contingent. Today is the first day we're all on the same system. And it was
    something that we had planned to do, but it always got pushed aside because of whatever, money, or politics, or whatever.
    So that was an impediment. It was almost impossible to get a signal on your cell phone because everybody was on their
    cell phone. We do have phones that have a direct connect feature, kind of work like a radio. Without those, we would have
    been in serious trouble, so we were able to communicate; at least the commanders were able to communicate effectively,
    using that.
- speaker: Interviewer
  text: So, is that how you worked around that radio problem, by using those phones?
- speaker: Respondent
  text: Yes, for the most part, for the most part. And a lot of places lost landline systems. Fort Wadsworth had no phones
    for a couple of weeks. But we worked around it using the cell phones and whatever else was available.
- speaker: Interviewer
  text: And who were you communicating with? With the Park Police headquarters at Floyd Bennett Field? Were you communicating
    from here directly to the chief's command post in Washington? How did that all work?
- speaker: Respondent
  text: Well, what happened, my boss, Major Wilkins, responded directly from here to the New York City command post at One
    Police Plaza, so I was able to speak to him directly using that NEXTEL phone. I also communicated with my counterpart,
    the captain in Brooklyn, as he was sending reinforcements up to us, and the lieutenants that were working. I really didn't
    have any contact with D.C. because we had our hands full dealing with our own things.
- speaker: Respondent
  text: And one of the big problems was with rumors because the rumors that were going across Ellis Island were that not only
    had New York been attacked, but that the Pentagon, which was true. We heard Lincoln Memorial, the Capital Building, the
    State Department, the Supreme Court, a building in Chicago, and a plane crash outside of Pittsburgh. And, luckily, just
    the Pentagon and the one outside of Pittsburgh were true. I mean those were the rumors that were flying around the island
    and we couldn't confirm them.
- speaker: Interviewer
  text: How did you get good intelligence information? Did that come from Major Wilkins, what he would hear in the command
    center, the NYPD center that you just described?
- speaker: Respondent
  text: Yes, and a lot of it came from a TV that was on in the superintendent's office. Myself, a Lieutenant Pappas, who's
    the commander of the Statue Station, along with Superintendent Diane Dayson and her assistant, Cynthia Garrett, we were
    within two feet of each other I think the entire day, trying to work out different things. Like I said, a lot of the information
    we got came from CNN.
- speaker: Interviewer
  text: You mentioned that you quickly got in your car and went to Ellis Island and you set up shop there. I mean is that
    where, you used that site as your command center?
- speaker: Respondent
  text: I mean, like I said I ordered Fort Wadsworth closed because there were facilities here that could have been targets.
    The Coast Guard has a large facility here. The Army has a Reserve center here. Defense Logistics Agency has a facility
    here, plus the Verrazano Narrows Bridge I think would be high on any target list. And at Floyd Bennett Field, over in
    the Jamaica Bay unit, the New York City Police Department has their headquarters for their emergency services units. So
    that's a possible target.
- speaker: Respondent
  text: However, I think the Statue kind of stands alone. And that's the way we kind of played our hand. If anything was going
    to happen, it would happen at the Statue.
- speaker: Interviewer
  text: Well, tell me some more about some of the other missions, going back to that first day. You mentioned briefly the
    marine units. Can you tell me a little bit more about that?
- speaker: Respondent
  text: Well, we have one boat that's assigned to the Statue, but it's not always in use. It's kind of, the officers that
    man it were on kind of collateral duty boat operators. But we have a marine unit that's usually assigned to Gateway. And
    we put, I believe it was five boats we were able to put into service pretty quickly. And they not only transported reinforcements
    up to Ellis Island, but they were used to form a perimeter around Liberty and to evacuate, assist in the evacuation. And
    one of the groups that they evacuated was the Secret Service New York Field Office. One of their members was a Park Policemen
    at one time. When their offices were destroyed in the Trade Center, he made a phone call, because his people needed to
    get moved to New Jersey and we were able to connect and get them out of the city.
- speaker: Interviewer
  text: Tell me a little bit more just about the evacuation process and how efficiently that worked? I'm looking for some
    sort of assessment. Did it work out smoothly?
- speaker: Respondent
  text: The evacuation of Manhattan?
- speaker: Interviewer
  text: Well, both, actually both. But right now, I was just thinking of the evacuation of staff from the Statue.
- speaker: Respondent
  text: Well, that was pretty simple due to the fact like I said there were no visitors. So, the small number of people that
    live on the island and the staff that was there, that was pretty orderly. And then we eventually, with the superintendent's
    concurrence, we moved all non-essential employees from Ellis Island. They were put on a staff boat. I think they were
    taken to Brooklyn and dropped off. But I'm not positive where they ended up.
- speaker: Interviewer
  text: Okay. Now the other much more dramatic evacuation story. I mean that was clearly something that you and your staff
    had never done before. Just tell me the process of how that worked and what some of the challenges were?
- speaker: Respondent
  text: Well, it seemed like boats kind of appeared from out of the blue. And I couldn't remember the list of types of boats,
    and agencies, and companies that they belonged to that pulled into the dock at Ellis Island with evacuees. But then I
    also heard that at one point some boats would not come to Ellis Island because it's a non-union site. This was after the
    fact, and they took them instead to other places in New Jersey. Whether that was true or not, I haven't attempted to confirm.
    It just seems to me at a time like that that would be something that you would ignore, but I don't know. The people that
    came overlooked like, I mean they were covered with ash, the same pictures that you see on TV. Some were pretty beat up.
    Others were just shaken up. And what we did is we set up a database with all of the information of the people that were
    brought over.
- speaker: Interviewer
  text: Actually, that sounds like a very daunting task, to get that information and key it in, from people who had just been
    through a trauma?
- speaker: Respondent
  text: Well, I think part of the triage process is just getting information out, personal information, name, address, telephone
    number of someone we can contact. And then from those lists we compiled this database, which we eventually turned over
    to New York City Police because some of their people that were injured were evacuated, as were some fire fighters. And
    that was done for the simple fact that information was tough to come by, so we figured if we had this database and let's
    print it out and let people know where their friends and relatives were. It would make things easier and it kind of worked
    pretty well.
