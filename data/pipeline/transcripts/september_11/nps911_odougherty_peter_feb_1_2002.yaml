collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Okay. My first question is this, from the moment you were aware that something happened, what went on?
- speaker: Respondent
  text: From the first moment when I heard that a plane had crashed into the first tower and we - nobody was really aware
    and I wasn't aware of exactly what was happening - what I did was I grabbed the camera, my personal camera, and went outside
    to the Ellis Island fuel dock to take a look. Because my first thought was this is something that never happened and shouldn't
    have happened but let me take some pictures of it.
- speaker: Respondent
  text: So, I went out there. I went out there with my secretary and we stood on the Ellis Island fuel dock. And the first
    building, it was burning. There was a hole on the inside of the building that you could see on our side. We had a great
    view. There was about, oh, I guess about 20, 30 people there with us. And we were all standing there and watching. And
    then I guess about five minutes, ten minutes later - actually, I don't even know the time span - I took some pictures
    and I took my camera and I was putting my camera down and then I heard another plane coming. Okay?
- speaker: Respondent
  text: And we were standing there watching and the plane flew right over our heads. And I looked down and I tried getting
    my camera on and then as I looked up, I saw the plane impact the second building. At that point, I knew instantly that
    this was an attack, that this was an intentional act that was occurring - okay - and basically got very angry over the
    whole situation. And then turned around to my secretary and she was upset. I looked at my grounds foreman and she was
    on her knees, praying. It was a very emotional instant at that point.
- speaker: Respondent
  text: We all stood there for - I took, then I got my camera going and I took a lot of pictures from that point on of what
    was going on with the building burning and debris falling. Then we started mobilizing and started mobilizing my division.
    I'm the chief of maintenance.
- speaker: Respondent
  text: So, we got all the people - got all the staff together. We brought them to the front of the island to try to organize
    and see what we needed to get done. We went to the front of the island, had everybody empty Ellis Island into by the flagpole.
    We were standing at the front of the island. I was standing with Doug Porter.
- speaker: Interviewer
  text: Oh, was this by the flagpole?
- speaker: Respondent
  text: Yeah. We were standing by the flagpole. The first - the first point was the fuel dock and the next point was in the
    front of the island by the flagpole.
- speaker: Respondent
  text: So, we were standing by the flagpole and basically everyone was standing in the sun at that point. And I went over,
    and I told the superintendent that we should get everybody out of the sun. So, we moved everybody back off the tip of
    the island, back around where the ferries land. And again, I was standing there. I was standing there with Doug Porter.
    He's the engineer from Denver Service Center. And we were standing there talking about the situation. I was taking pictures
    and at that time the first building dropped. Okay. And it looked - when the building dropped - it looked like it was being
    - it dropped from the bottom. Okay. And it looked like the building just collapsed right out from the bottom.
- speaker: Respondent
  text: Again, people's reactions, people crying and screaming. That point was also - it was never expected. Nobody ever expected
    the building to fall. I don't know if it was before that or right after that there was a speedboat that came at the island.
    It was a 40 -foot or a 45-foot speedboat that came right at the back of the island towards my staff boat. Full speed.
    Looked like it was attacking us. At that point also there was probably 200 people, 150 people standing on the seawall
    at that point. Everybody screamed and started running down the front of the island. So that was a terrifying moment too
    for everybody, because we thought we were under attack also.
- speaker: Respondent
  text: Yes. That was before the building fell. I remember now. The staff boat was loading. We were bringing staff off the
    island and bringing them over to the city. Okay. Right. Then the staff boat - the staff boat departed and went to the
    city after that occurred.
- speaker: Interviewer
  text: The staff boat was already bringing people over from, say, Manhattan?
- speaker: Respondent
  text: No. The staff boat was bringing people - staff from Ellis Island and trying to get them off this island and trying
    to get them back to their homes, to the city. Okay. And that was before the first building fell. Then the staff boat was
    on its way over there and that's when the first building dropped. I don't know if the boat unloaded at that time and dropped
    those passengers off before the first building dropped.
- speaker: Respondent
  text: So, then we started setting up. We started organizing a little bit. Seeing what the park could do as far as assisting
    any of the victims, because everybody knew at that point there was going to be a lot of death in the city. Then we started
    to get calls from the city.
- speaker: Respondent
  text: And I don't know the timeframe on how soon this started happening, of when boats started arriving with victims and
    how many victims arrived.
- speaker: Respondent
  text: They brought - we set up a triage in the front of the island. Okay. Some of my staff was assisting with that. My staff
    brought chairs down. We brought - set up tables. The concession - I'll tell you, everybody that worked on this island,
    they were all heroes that day. Everybody was working great. They really were. It was a team effort from everybody. And
    that's one thing I failed to take pictures of is how the island was set up and how everybody was organized.
- speaker: Respondent
  text: We set up port-a-pots, you know. We set up a morgue in the back of the island by the fuel dock within one of my structures
    back there. The fire department was here. What was funny was when I was in the back of the fuel dock, and I don't - again,
    the time it just seems like it was flying by. Everything was happening so fast. I remember talking to some rescue people,
    EMT people. They were from - so it must have been hours that went by. They were from Connecticut or Massachusetts. And
    they were - they had a - I guess there was about 50 or 60 of these people that were on the back of the island, that came
    in from off the island that came to assist, assist with -
- speaker: Interviewer
  text: Came off the island from -
- speaker: Respondent
  text: They came from outside the park.
- speaker: Respondent
  text: That actually came in to assist with the morgue and triage. Then some NYPD boats started bringing some victims over.
    They landed on the Ellis Island slip. They were taken off. I remember seeing one guy had - it looked like a piece of steel
    went through his shoulder, came out his elbow. Firemen, there were some firemen that they were carrying off and bringing
    onto the island. This was just in glancing as we were trying to set up some equipment and items.
- speaker: Respondent
  text: But everybody, I tell you, everybody was working. I remember Don Fiorino. He was carrying water, helping people get
    water. A lot of people that were coming on the island when they were very disorientated. They still were - everybody was
    in disbelief of what occurred. Basically, people were - the staff was just trying to get the people to where they had
    to go. Making phone calls. I remember one gentleman that came over from the city had a suit and tie on, and you know,
    he just kept wanting to know when he could go back to his office in the city. So, you know, there was just no reality
    with anybody of the magnitude of the incident.
- speaker: Respondent
  text: So that we set up - basically, I myself - we stayed here. I stayed through the night. Nobody could get home that lived
    on Staten Island. I couldn't get home. I was here with my deputy chief of maintenance through the night. I guess it was
    about midnight we went to Manhattan sites. We got a call that there was a flood in Manhattan sites. So, we went over to
    the city and checked that out. We went on top of the building actually. The cooling tower was overflowing. We took care
    of that problem. We shut down the gas and utilities in the Federal Hall, took care of that.
- speaker: Respondent
  text: What else? Oh, yeah. During - right after the incident when they were bringing the people over, when they were bringing
    victims over during the daytime, they were using small vessels to bring them on. So, what I did was I spoke to the superintendent
    and we put our 65-foot work vessel online and went over to the city with that. I went over with two EMTs and a captain
    and a deck hand.
- speaker: Interviewer
  text: Work vessels?
- speaker: Respondent
  text: It was my - it's a work vessel. It's a Park Service vessel. It's a 65-foot work boat called Liberty II.
- speaker: Respondent
  text: And we went over there but there were so many boats in the area. There was just so many people that were already assisting
    and working. I made the decision to just come back and do what we can do and continue doing what we were doing over here.
- speaker: Respondent
  text: Okay. Basically, that's it.
- speaker: Interviewer
  text: Well, let me backtrack. It's very interesting. Let me backtrack for a moment. When you had first heard the sound and
    you grabbed your camera, went out to see what was going on - and you weren't quite - I think like a lot of people - weren't
    quite figuring out what had actually happened.
- speaker: Respondent
  text: Right. Nobody knew in the beginning. At least I didn't personally know.
- speaker: Respondent
  text: And I know my secretary didn't know what had happened originally. We had thought that a small plane had crashed into
    the tower accidentally.
- speaker: Respondent
  text: Okay. And that's what was announced over the park radio that a plane had crashed into the tower. Nobody had a clue
    that it was an intentional act. Nobody did.
- speaker: Respondent
  text: So, when the second plane crashed, you know, I personally knew instantly that it was an intentional act.
- speaker: Interviewer
  text: And when you were out there, you were out there with your staff and then just a little bit before the second plane
    hit there were about 20, maybe 30 people out there. This was not by the flagpole, but by the -
- speaker: Respondent
  text: The fuel dock.
- speaker: Interviewer
  text: '- the fuel dock. I just want to make sure of that.'
- speaker: Respondent
  text: Right. And that's on the backside of the island, which has probably the best view of the Trade Center.
- speaker: Interviewer
  text: Yeah. And then once the second one hit, it was sort of like you knew what had happened - people were screaming and
    praying. It dawned on people, I guess.
- speaker: Respondent
  text: Right. Yeah. Everybody - I believe everybody at that point knew that it was an intentional act.
- speaker: Respondent
  text: Okay. I remember - it's funny, I remember my grounds foreman telling me that she had told my supervisory captain that
    it was an intentional act. And he didn't - actually when the second plane hit, he was walking away - with his back to
    the tower saying, no, you're full of baloney. And that's when the second plane flew over his head too.
- speaker: Interviewer
  text: So, at that point you all decided just to start mobilizing the division, particularly the maintenance people.
- speaker: Respondent
  text: Right. Right.
- speaker: Interviewer
  text: And then you moved to the front of the island by the flagpole to start organizing.
- speaker: Respondent
  text: Correct. The superintendent called everybody. Everybody moved to the front of the island.
- speaker: Interviewer
  text: Yeah. Then you made the decision to get everybody out of the sun, so you moved over. I think you meant - I didn't
    get what you said.
- speaker: Respondent
  text: Yeah. We moved to the ferry slip to the south side of the island, which is basically in front of the canopy. So, the
    whole park staff, concessionaires, contractors, everybody was in the front side of the island.
- speaker: Interviewer
  text: Got it. Okay. And this had been - actually about the time then at this point as everybody was moving over there -
    the first building dropped?
- speaker: Respondent
  text: Well, actually at that point, that's when the speedboat came in.
- speaker: Respondent
  text: Okay. And then after the speedboat, then the building dropped. And you're right, after the speedboat, the staff boat
    went to the city to drop off the staff and then that's when the first building dropped.
- speaker: Interviewer
  text: Right. And I know, yeah, and did that staff boat come back or did it make its trip?
- speaker: Respondent
  text: Actually, it dropped the people off and then came back, but you know, it was probably a mistake that we did drop all
    those people off because - but who would have ever thought that the building was going to drop?
- speaker: Respondent
  text: Nobody thought that the building was going to drop.
- speaker: Respondent
  text: You know, that was another shock. It was like watching a movie through the whole thing. It really was.
- speaker: Respondent
  text: You know? I mean, when the second building dropped, the building - it looked like it twisted - every piece of glass
    in the structure became a piece of cellophane. And you figure it's a 117-story structure, it was like the whole structure
    just twisted and then it just dropped. It wasn't like - I'm sure you've seen shows where they implode the building one
    floor at a time, and it falls on top of each other.
