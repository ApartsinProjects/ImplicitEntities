collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Joy, the first question I've got is, from the moment you were aware that something had gone on, what happened?
- speaker: Respondent
  text: Well, it was just so much of an odd day. I was sitting at my desk and Karen was on the phone. I distinctly remember
    Karen, right over here, our historian. We were actually just getting notified that the Twin Towers had gone down. And
    the first thought in my mind was wow, those terrorists want to do something. I'm surprised they haven't come to Washington.
    So, I was just praying, saying you know, I hope everything is well with the Trade Center and everything gets handled that
    should get handled and what do we know. We heard this huge sound and the building actually just shook. There was this
    vibration that just went through the whole building and I looked out the window and there were a whole bunch of people
    crowding around in the direction of the Pentagon. So, I ran outside and ran up to where the people were and all I saw
    was this huge smoke, because our location is right next to the Pentagon anyway. So, we felt the impact. Although we're
    not right next to the Pentagon, we did feel that impact.
- speaker: Respondent
  text: I just couldn't believe my eyes. I thought I was dreaming. I just had an out of body experience. And I actually just
    said oh, my God, what am I going to? What's happening? And I just thought that I probably wouldn't be living too much
    longer soon. I mean, I was extremely frightened. And every day when you're working with the public, you have to uphold
    an image of being a strong person for the public, so they won't get upset and very, just rambunctious, but I just really
    couldn't hold my composure at that time. I was wondering, you know, what was going to happen next, and I think - that
    was where my fright came - were they going to come and hit Arlington House? What was going to happen?
- speaker: Respondent
  text: So, after I went to the bathroom to kind of gain my composure. My supervisor called us all together and Karen had
    told us that Turkey Run said we could leave after we get the whole park evacuated. So, we did that. It took about an hour
    and a half and after that we left, but I couldn't go home because I live in Washington and all the bridges were shut down.
    So, I had to stay in Rosslyn for about four hours, just sitting in my car, listening to the radio, just glued to the radio;
    just wondering what was the safest place for me to go to that I knew of. And I think that was the scariest day in my life.
    I just didn't know what to do.
- speaker: Respondent
  text: I didn't have my mother there to protect me. I didn't have my father there to protect me, you know. It was very strange.
    And that's kind of what my whole day and experience consisted of. I think with the whole thing happening as it did, without
    any structure of how to handle a park in that type of environment, I think we handled things very well.
- speaker: Interviewer
  text: If I can just backtrack for a moment?
- speaker: Interviewer
  text: Okay, the first thing that you mentioned was that you had heard about the Twin Towers.
- speaker: Respondent
  text: Yes, we did hear about. Well, I think Karen received the phone call and they told her about the Twin Towers, and shortly
    after her phone call, one of our people on staff had a radio and we were listening to that. Then I went back to my desk
    to check my email, and suddenly this huge sound out of nowhere just impacted the whole site, you know, with the vibration.
- speaker: Interviewer
  text: What was that noise. I mean, you said there was a whole vibration that would shake the whole building. Was there a
    loud boom or anything like that or just?
- speaker: Respondent
  text: There was a very loud boom. The whole building shook. And ever since, that - I had never really totally paid much
    attention to the twenty-one-gun salutes that they give here because when they had dignitaries to give funerals lots here
    at the Cemetery, they give twenty-one-gun salutes or they'll shoot cannons off - and that's what I thought it probably
    was, but the building has never shaken like that when they give those cannons and twenty-one-gun salutes. So that's what
    made me pay more attention to it. And now every time I hear those twenty-one-gun salutes or the cannons blowing here,
    I think about September 11, because it was just the sound like triggers instantly in my mind of that whole experience,
    although it's not as much of an impact because the whole building shook. I distinctly remember that happening.
- speaker: Interviewer
  text: You also mentioned that you went out, you heard this vibration, you looked out the window and those people were looking
    toward the Pentagon. So, you ran out to see what was going on and you saw the smoke.
- speaker: Interviewer
  text: And at that point you reported it was sort of out of body experience, you know - what am I going to do? What's going
    on here.
- speaker: Respondent
  text: Yes. I just didn't know what to think. I just thought this was not happening. Why is there so much smoke over there?
    Why are people dead? Why is this happening? What are they going to do next? You know, it was just like, you know - before
    I got to work and while I was here - I was thinking about paying bills, I was thinking about getting my car fixed, I was
    thinking about so many things going on in my life at that time and it's like when that happened, I just stopped thinking
    about everything and I just couldn't think about my life and things going on or in it anymore. I just had to think about
    that. And it's like I totally came out of my zone, my personal zone, and just couldn't think about my life. I just didn't
    know what to do. And at a point in my mind, I said, I mean, being frank, I didn't want to be here, and I didn't want to
    go over to Arlington House to get the people out. I wanted to go home. I really wanted to leave. I just did not want to
    be here. I was that frightened. I didn't want the visitors to see me upset. I was that upset, and I just didn't know if
    I could really hold my own. I just didn't want to be here. Because of that, not because I don't like my job, not because
    I was having a bad day. Because I just didn't want to see them - see an image that we try to hold every day to be a comfort
    to the visitors, if they're sick, if they're falling. We don't cry. We try to deal with what's going on. There are constantly
    people coming and we try to hold things together, and this was a time when you had to try to hold things together. And
    this was the first time that I couldn't, and it just freaked me out. I just felt that way.
- speaker: Interviewer
  text: What happened after that time, you knew you had to be strong and keep that image up for the public, and it was really
    a tough thing to do, from what you're saying, right?
- speaker: Interviewer
  text: And you went to the bathroom to try to just get your composure, right?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: And what happened to get the people evacuated? What was that like?
- speaker: Respondent
  text: Well, so many were asking questions. What happened? What's going on, you know. And then some people had the nerve
    to say can they come through the house. And I'm like, "What!? Can you believe that we might be dying in an hour and you
    want to come see the Robert E. Lee Home?" I mean that's what was going through my mind. I couldn't say that, but I just
    said no, we're closing because we have to evacuate the Cemetery and that's what we've been told to do at this time. So,
    there were just so many questions and this was the first time I really didn't have the answers.
- speaker: Respondent
  text: Because normally someone notifies us at least of a tidbit of information for us to give visitors, but man, it just
    really made me feel uncomfortable to move those people out, knowing that I knew less than they knew. But it went well.
    We were able to get the people out. Those people that were coming from the Tomb of the Unknown, we just told them to continue
    to walk around the House, down to the exit. And we closed up the House and kind of just roved around the grounds, just
    kind of directing people off the premises and that's kind of what happened until we didn't see any more people. We walked
    around the perimeters of this area, just to try to see that everyone was gone that we thought was touring the Cemetery.
- speaker: Interviewer
  text: You didn't get down to the Cemetery as well? Just the Arlington House grounds?
- speaker: Respondent
  text: Just the Arlington House property, yes; and kind of a portion down near the Tomb of the Unknown, a bit.
- speaker: Interviewer
  text: So, you did do a little bit of the Cemetery.
- speaker: Respondent
  text: We did do a little bit of the Cemetery, yes. We were helping clear the Cemetery, yes… Yes, we were. And then some
    of the people -
- speaker: Interviewer
  text: Did they have some employees trying to clear it too?
- speaker: Respondent
  text: They had people out there and so did Tourmobile. They had some people also because I distinctly remember one of the
    tour guys from Tourmobile had a broken foot that day. And I was like, my God, I would not want to be you right now - having
    to get home on public transportation; when I was exiting myself there were so many people walking in the streets and walking
    on the Parkway. I had never seen anything like this. That freaked me out, too. There were just people walking on the Parkway.
    I said, "what is going on?" And then we find out that they just had this massive evacuation at the Pentagon, you know.
    So, you have people in uniforms, people were just walking, office people, just trying to get away, you know. Women don't
    even have their purses, you know, just walking away in the same frightening, just look on their face, that I had on mine
    was on theirs and I just couldn't believe that we were that frightened. And I didn't even know these people, but I could
    just see the expression on their faces, and it channeled that energy to other people; and it was just like everyone was
    scared. And that's a scary feeling. To know that you can look at somebody else before, just like me having so many other
    things on your mind, personal things in your life, and then to just be so scared to have all that change with a minute.
    You know, you're worrying about if your uncle is okay or if your sister is okay.
- speaker: Respondent
  text: My mother lives in North Carolina and she was trying to call me, wondering if I was okay. You know, you just can't
    help but wonder about your loved ones and just forget about everything. I don't know, it was just a day that I will never
    forget. My parents constantly talk about the day they'll never forget. Kennedy and Martin Luther King's assassination.
    This was like that for me.
- speaker: Interviewer
  text: Yes. So, you walked about the perimeter to make sure that there was nobody wandering around.
- speaker: Interviewer
  text: You got over to the Tomb of the Unknown Soldier there and some people asked you questions such as what was going on
    here and just didn't know what was going on themselves and you basically felt like you really didn't have any answers.
- speaker: Respondent
  text: None at all.
- speaker: Interviewer
  text: So, your basic thing was just to tell them we've been told to evacuate -
- speaker: Respondent
  text: The Cemetery
- speaker: Interviewer
  text: '- the area. Just get people out of there.'
- speaker: Interviewer
  text: Did anybody put up a fuss about it?
- speaker: Respondent
  text: No, they didn't, surprisingly.
- speaker: Interviewer
  text: So about what time is this all occurring?
- speaker: Respondent
  text: This? We found out about the Pentagon, I believe it was between nine thirty, maybe; between that nine o'clock hour
    and ten o'clock hour. We didn't really evacuate until after we got notification that we could leave and then we had to
    evacuate before we could actually leave.
- speaker: Respondent
  text: So, I think we were evacuating for about an hour and a half. So, I think we may have come back in here maybe about
    the eleven o'clock hour. I'm not really sure if it was eleven-thirty or twelve, but it was in that time frame. We were
    out there for a little while and then we had to check everything. We had to check that the Museum was secure. We had to
    check and make sure the Slave Quarters were secure and the House. And Frank, our supervisor, had us looking even for different
    things that we may not have seen before, like boxes and stuff like that. So, it was a tedious procedure that we had to
    do that day.
- speaker: Respondent
  text: And keep in mind that everyone wanted to go, so they were like look, let's just get this over with. So, everyone worked
    together.
- speaker: Interviewer
  text: Okay, so you got people out of here, oh, about what time do you think?
- speaker: Respondent
  text: We should have been all done maybe about eleven-thirty.
- speaker: Interviewer
  text: What happened then?
- speaker: Respondent
  text: What happened then?
- speaker: Interviewer
  text: You said you had to wait in your car for a whole long time. What? It was four hours I think you were saying?
- speaker: Respondent
  text: Yes. I left the Cemetery and I went to Rosslyn, because they wouldn't let you go across Memorial Bridge, and that's
    normally my route home is the Memorial Bridge - and then I take the Southeast-Southwest Freeway because I live in Southeast
    Washington. So, they didn't let us go across the bridge. So, since I couldn't go across the bridge, I was going to try
    to take another shortcut on the Parkway but couldn't do that because there were so many people walking the Parkway. So,
    I went into Rosslyn and I was listening to the radio. And since I didn't get lunch, I said well, let me at least eat something.
    So, I went to Safeway and got a sandwich and sat in my car and listened to the radio.
- speaker: Respondent
  text: And I stayed there for about four hours. So, I don't think I really tried to see were any other shortcuts open until
    maybe about four o'clock, four or five.
- speaker: Respondent
  text: Then luckily, I went into Rosslyn, rode around, got back on the Parkway, and then I was able to go through the DC
    area and get across the Fourteenth Street bridge, because that was open, and then I went home that way. No, I went Ninth
    Street - Ninth Street area. I had to go through downtown.
