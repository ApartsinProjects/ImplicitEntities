collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: It's January 23rd and I'm here with Paul Pfenninger at the headquarters of Shenandoah National Park. And maybe just
    to start if you would just tell me a little about what your position is here at the park.
- speaker: Respondent
  text: 'I''m the Interpretive Programs Manager, so my position primarily controls the interpretive program aspects of the
    park: guided walks, talks, campfire programs.'
- speaker: Interviewer
  text: That's interesting. We might be able to talk about how you might interpret this particular event as we go along. You
    also had another role as a member of the Type 2 Incident team, and it would be very helpful to me if you would just explain
    a little bit about what the team is and how it's made up. And then we'll talk about September 11th specifically, but just
    some background, please.
- speaker: Respondent
  text: Basically, what it is my function on the team is the Public Information officer. It is a team that has been assembled
    by the National Park Service, the Northeast Region, and now the Eastern Coast. They combined a couple of regions and made
    these all risk management teams.
- speaker: Interviewer
  text: When did that occur?
- speaker: Respondent
  text: That occurred, I believe, about a year and a half ago. So, we have been moving in that direction so that you wouldn't
    just have a Northeast team and a Southeast team, Midwest and so forth. It combines others - I think three or four teams
    on the East Coast, three or four teams on the West Coast, and a couple of teams in the middle of the country. The premise
    is all based on the Incident Command System, in that when a significant incident happens or a significant incident is
    about to happen - for instance, a presidential visit or something of that nature that would affect a park's function -
    the management team would come in and be able to over that incident and allow the park to get back to normalcy and get
    back to regular operations and still serve the visitor while management team handles the specific incident.
- speaker: Interviewer
  text: How many Type 2 teams were involved with the September 11th response?
- speaker: Respondent
  text: In this region here, there probably was - again and I don't know positively how many - there probably were at least
    two Type 2 teams that were in operation plus a Type 1 team. Type 1 teams handle the more national, definitely presidential
    visits and those things are handled by a Type 1 team. Sometimes you get sucked into an incident and you might be a Type
    2 but you're the best thing they've got. It depends on the level of connections that you need, for instance Type 1 people
    probably have direct access to the Directors office and so forth, where we deal primarily with the regional offices and
    so forth. An incident team has an incident commander who is given charge of the incident and is able to make decisions
    with the superintendent's blessing, usually supported by a financial section chief, operations section chief, planning
    section chief, I forget one, a safety officer - I think that's it. So, with the team assembled we work as a team, we practice
    as a team, we have to go through training, through FLETC - Federal Law Enforcement Training Center. They put us through
    a two-week training down there - actually, I take it back. It was a one-week training course, 40-hour training course.
- speaker: Interviewer
  text: Are positions one deep? Two deep?
- speaker: Respondent
  text: Usually about three deep and then you rotate in and out and you're on call - shouldn't say on-call. You're in the
    slot and if an incident occurs while you're -
- speaker: Interviewer
  text: Would a Type 2 team in the East be made up of people who live within that -
- speaker: Respondent
  text: Yes. Normally people that are stationed within that region or on the East Coast. I don't know how you would define
    that. I guess East Coast regions would be the best.
- speaker: Interviewer
  text: Can you identify people in those particular slots for your team? Starting with the commander maybe?
- speaker: Respondent
  text: Sure. Rick Brown is the incident commander, Carl Merchant is the planning section chief, Chester Mikus is one of the
    section chiefs - he might be support - and then there was a new member, we actually had two new members on this particular
    incident. I'm trying to remember his name but can't but he's the Operations section chief and he sat next to me the entire
    two weeks and I can't remember his name. And then we had Ben Morgan from the Everglades. He was our safety officer and
    he just happened to be in New York City during the incident and so he contacted us knowing that we needed a safety officer
    that was on site and he was actually down in the Manhattan area. Will Reynolds is the operations section chief - I knew
    it would come to me. Our financial section chief was handled by somebody in the regional office and I don't remember his
    name.
- speaker: Interviewer
  text: When were you first contacted and how were you contacted?
- speaker: Respondent
  text: On September 11th or do you mean in general on September 11th? We had had a situation here where we lost power in
    the morning and none of our computers worked. And we were basically told to go home if we had computer access at home,
    to go home and work on the computers at home. And I had projects I needed to do. And on my way home I turned on the radio
    and heard what was going on and my first instinct was to call back to the communications center and tell them if they
    need anybody, if they need any help, I'm available, whatever we need to do. They called me back about 12 o'clock and told
    me that they were activating our team and that we were going to Philadelphia and we were on our way about 4:30, 5 o'clock
    that night, Chester Mikus and I. Chester works here at this park also, so him and I drove to Philadelphia that day.
- speaker: Interviewer
  text: So, the word comes not from the incident team commander but from the communications center.
- speaker: Respondent
  text: Usually what they do is they have a resource order that they put in and somebody up higher, probably the regional
    director, said "We need an incident team in here to manage it." The superintendent, the regional director, the Director,
    is ultimately who gives us our task. "This is what I want you to accomplish here, this is our memorandum of agreement
    that this is what you're here for, to manage this incident here" - we're usually presented with objectives of what we
    hope to accomplish.
- speaker: Interviewer
  text: Do you need something in writing - I think for the Type I team it was a "delegation of authority" - you need one for
    Type 2?
- speaker: Respondent
  text: Basically, what that does is take the authority and hands it off to the management team and tell them "You're now
    in charge".
- speaker: Interviewer
  text: But that would most likely be signed by a regional director -
- speaker: Respondent
  text: Or the superintendent. And in the case of 9/11 I think it was not even the regional director, it was Dale Ditmanson
    who was the - I don't know if he was the acting regional director at the time, I know he's an associate regional director
    but Marie Rust, who's the regional director, was in Florida and could not get back.
- speaker: Interviewer
  text: So, what guidance were you given initially? Were they able to tell you some things here before you left?
- speaker: Respondent
  text: Not much. They just told us when to report to duty and lined out our travel and basically said "You're due to be up
    in the regional office at 8 o'clock in the morning and they'll assemble the team, Rick Brown will be there." Chester and
    I got there pretty late on that night of the 11th, we probably didn't get into our hotel until 11:30 or so. And then we
    reported to duty first thing at 8 o'clock in the morning.
- speaker: Interviewer
  text: And what were some of the missions you ended up pursuing? Tasks might be a better word.
- speaker: Respondent
  text: I'd have to look at my notes but primarily what we were tasked with doing when we got there was to gather some information
    about special events that were scheduled to be in different national parks. Also, to pull together what resources we had
    in some parks to help find out what sites had been affected. Seeing that they were in our region, those Manhattan sites
    - again, they didn't have telephone, or any kind of communication system set up most of the phone services were haywire
    in the New York area - so we had to establish connections.
- speaker: Interviewer
  text: And how did you do that?
- speaker: Respondent
  text: Primarily, we relied on cell phones and as people got their cell phones in and got the message out, we also worked
    with cc mail and inter-office mail. Our job was to contact each national park in the region and find out had anything
    occurred in their park, what was their security like, did they need additional security, what were the risks - sort of
    do a risk assessment, especially places like the Liberty Bell versus Shenandoah, which would be a higher risk target.
    At the time it was unsure what situation we were in, how many terrorist attacks there would going to be, and so our job
    was to pull that information together and to feed it to the Type 1 team who was going to feed it direction to the Director.
- speaker: Interviewer
  text: And how did that link occur?
- speaker: Respondent
  text: That link occurred through just cell phones and through regular cc mail messages.
- speaker: Interviewer
  text: But did it occur, for example from incident team commander to commander or did you communicate with your counterpart
    on the Type 1 team?
- speaker: Respondent
  text: Little bit of both, and again that was one of our objectives, that we were to make sure that this information got
    to the Type 1 teams and so they could put it all together in a bigger picture of what was happening in the nation. And
    I believe it was primarily between the two incident commanders who would discuss things, but occasionally the information
    officer from the Type 1 team calling me and saying "Look, I need this information, can you feed that back to me?" We would
    do a daily report called a Situation Report and that included "Here's the number of resources we know that are available,
    here are the - "
- speaker: Interviewer
  text: When you say resources do you mean equipment, what have you?
- speaker: Respondent
  text: Resources would mean equipment, people, any kind of special equipment or any kind of special training. For instance,
    if there was anybody who was trained in dog searches, we'd be able to access that and make sure somebody knew that order
    was right there and the whole idea was that there was one voice. So, if somebody needed something, then they would tell
    us, we'd find it for them and send it to them.
- speaker: Interviewer
  text: So how did that relate to the function that the coordination center was playing here? Because they were doing that
    - were you just doing that on a smaller scale?
- speaker: Respondent
  text: It's interesting. The unit here was primarily a national unit - they had been converted to a national unit - and so
    we were doing it on a smaller scale for our region, so we became the voice for the Northeast Region and Southeast Region
    at the same time. We were primarily focused on the Northeast Region and our job was to gather that information and send
    it to this communication center which had direct link to the Type 1 team. So, in a sense we were doing the same job they
    were doing only they were gathering information from the whole country.
- speaker: Interviewer
  text: Did you have the authority at that regional level to actually transfer the resources or just to collect the information
    and assess needs?
- speaker: Respondent
  text: I think we had the authority to transfer help within our region. In fact, I know because our safety officer went to
    the Manhattan site, ordered up some things, we helped some of the Manhattan sites get back up online. For instance, Federal
    Hall, which was probably the closest site to the Twin Towers, it needed cleaning, it needed security, it needed a bunch
    of different things that had to be ordered up and we ordered those resources.
- speaker: Interviewer
  text: You mentioned Southeast Region, but your area must have included National Capital Region too -
- speaker: Respondent
  text: No. National Capital Region had their own team to function, I believe. And each one of these regions was reporting
    directly to the Type 1 team. Although we certainly swapped resources in and out. I know that, for instance, that when
    they had a problem with security - their law enforcement, the U.S. Park Police, needed help - and you have to remember
    we're all drawing from different national parks and there really are no regional boundaries when it comes to resources.
    When you need a person, you put it out on the order form, and they look at their list of people that are qualified to
    do that and they just start making phone calls. The biggest problem we ran into was everybody was drawing from the parks
    closest to the sites because there's no air travel, no train - the regional director was stuck in Florida so she couldn't
    even get up here. So, there were some real transportation problems that were being cured by drawing from local sources.
    And we got down to the bottom of the barrel pretty quick and so then we were trying to get resources in from other places,
    but they come online soon after that and now they were starting to order resources up. It was hard to get resources in.
- speaker: Interviewer
  text: Did you encounter some reluctance on the part of parks to release resources?
- speaker: Respondent
  text: Some. In some areas yes, in some areas no. I think it had a lot to do with risk factors. For example, Independence
    was pretty helpful but they were a pretty big risk factor and they were actually ordering resources, so it didn't make
    sense to give us rangers to send someplace else when they actually needed people to guard the Liberty Bell. Other parks
    that weren't very close to anything perceived as very high risk seemed to
