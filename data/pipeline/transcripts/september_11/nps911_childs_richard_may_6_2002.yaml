collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware of what was going on, what happened on September 11th?
- speaker: Respondent
  text: 'On September the 11th I was on my day off, and I happened to be in Williamsburg, Virginia. And my wife and I were
    doing some shopping, and recreating in that area. And needless to say, we were stunned when we got the news, and we made
    it back to our unit that we were staying in down there rather rapidly so we could catch the television reporting of what
    was going on. Needless to say, we were both stunned and devastated by the news. However, as the reports came in of what
    actually had occurred, that it was three airlines that had been hijacked and crashed into public buildings in a terrorism
    effort, in retroflection to the modus operandi that the terrorists used, I was not at all surprised, having, like most
    Americans, been witness to lax security at most of the nation''s airports in recent years. Needless to say, we stayed
    glued to the news, ongoing news of that for the remainder of the day, and returned the next day back home, and back to
    work thereafter. Being a supervisor in the law enforcement function, needless to say the first questions that came to
    mind when I got back to work were: how would this affect the protection function, not only in this park especially, but
    throughout the National Park Service? And of course we found out early on the necessity of protecting those potentially
    high risk, or parks at high risk for terrorism - terroristic targeting - in the future. And so it was a matter of just
    several weeks before we started sending park rangers, law enforcement rangers, out to various parks all over the country
    for security efforts that are, of course, ongoing even today.'
- speaker: Interviewer
  text: Just to back up here just a little bit. You said you and your wife were in Williamsburg?
- speaker: Interviewer
  text: Just on a day off?
- speaker: Respondent
  text: Days off, yeah.
- speaker: Interviewer
  text: And you returned to your unit. Now where was the unit at that point?
- speaker: Respondent
  text: Here at Shenandoah National Park, South District. South District of Shenandoah National Park. I'm the District Ranger.
    The district is about 81,000 acres of the park.
- speaker: Interviewer
  text: Okay. Now as a supervisor, okay, one of the things you mentioned that you were trying to figure out was how did the
    situation affect the protection function.
- speaker: Interviewer
  text: What are some of the things you did, and some of the things you had to do?
- speaker: Respondent
  text: Well the - wait for the truck to go by.
- speaker: Respondent
  text: Well, obviously, the planning effort was important because early on it became obvious that people from the South District,
    and also the Northern District of the park would be detailed to Homeland Security assignments throughout the country.
    So the planning effort was not only for them to be mobilized, and sent to the various parks, receiving parks, but also
    figuring out how to get the work done while they were gone, through changes of work schedules, people being asked to work
    overtime, that type of thing. As far as security issues back here at this park, they seem to be rather minimal, so there
    was not an overly enhanced effort towards beefing up security at this park. Only at those parks, like Independence and
    Boston, and some of the Western parks that needed assistance from the other parks in the system.
- speaker: Interviewer
  text: Which were some of the parks in which people got detailed?
- speaker: Respondent
  text: 'Early on, it seemed that the only parks that we had people going to were the two Eastern, large Eastern, parks that
    were deemed as targeted areas: Independence National Historical Park in Philadelphia, and Boston National Historical Park
    in Boston. We did have a couple of short assignments for people at the Interior Building in Washington, D.C. But most
    of the assignments in the first few months of the Homeland Security detail were in Boston and Independence. In recent
    months, however, other areas have requested assistance, at least from this park. I''m sure that other people from other
    areas have already been detailed to these areas. But Shasta National Recreation Area out in California, Hoover Dam near
    Lake Meade National Recreation Area. I think that pretty much takes care of the areas that people have gone to from this
    park. Of course, there are other areas as well.'
- speaker: Interviewer
  text: Did you notice anything - okay, this was in the first several days of what happened. It was mostly just coordinating
    some of the people, and making sure that they were getting to these high risk, or -
- speaker: Respondent
  text: Parks at risk.
- speaker: Interviewer
  text: Yes, parks at risk.
- speaker: Respondent
  text: Let's just stop.
- speaker: Interviewer
  text: A lot of the folks say people had been detailed later on then to Shasta, and to Hoover Dam.
- speaker: Interviewer
  text: Okay. Then going back, you said that the planning effort was important because of the other places people had to be
    detailed, and how work was going to get done around here?
- speaker: Respondent
  text: Correct, yeah. We couldn't just let patrol coverage, and project work, and targeted - we have here in Shenandoah what
    we call a work plan. And these are the priority tasks that we need to get done in any one given season. For example, right
    now we are in the spring/summer season, and we have a work plan of all the different functions that we want to get accomplished
    during this period. So we feel that those are important enough that even if we have, say, two people on Homeland Security
    assignments that we need to make sure that that work gets done, if at all possible. Now I already mentioned that there
    is some funding available to get work done by other people while they're gone, either on overtime, or schedule changes,
    or whatever. However, there are some traditional functions that just cannot be done as a result of this, and coverage
    has had to be shrunk, as far as hours, response zones, this type thing. Some types of visitor assistance is either not
    timely, or cannot be accomplished at all, just because of less people being around, being able to get this traditional
    work that any ranger program would do in most parks.
- speaker: Interviewer
  text: So the, for example, when you mentioned some of the traditional functions that coverage for these has shrunk a little
    bit, what would some examples of that be?
- speaker: Respondent
  text: Coverage that, for example, during certain times of the day, we would not patrol as large an area. We may not be able
    to respond to a visitor assistance of a disabled vehicle. We might not be able to respond to certain things like a dog
    that may have appeared on the Skyline Drive away from its home. While some of these things are not emergent, we have furnished
    those type of services in the past. And with the reduced manpower we just are not able to provide those services as much
    as we have in previous seasons.
- speaker: Interviewer
  text: No matter what, in other words.
- speaker: Respondent
  text: What 's that?
- speaker: Interviewer
  text: I mean, even though they're not emergency type situations, you just can't supply -
- speaker: Interviewer
  text: You used to be able to supply them as you could, but you can't do them now.
- speaker: Respondent
  text: Yeah, we're reduced in our response to those type of public service type things.
- speaker: Interviewer
  text: Okay. Now some of these people that have been moving, say, back and forth, say, between Boston and Independence are
    still going there? Do they still tend to go there?
- speaker: Respondent
  text: Yeah. Yeah, we've had some people that have gone on more than one detail, and some people have only gone on one, and
    some people haven't gone yet. So it's kind of a total cycling of who goes when based on schedules, and personal needs,
    that kind of thing.
- speaker: Interviewer
  text: Okay. Just based on schedules. Not on job, or anything like that?
- speaker: Respondent
  text: Well, anyone that has a law enforcement commission is certainly available to go. Sometimes personal needs have to
    be taken into consideration; things like child care, and minor physical problems, that kind of thing.
- speaker: Interviewer
  text: But as far as coverage is concerned, are there areas where you have seen changes as a result of the lighter coverage?
    For example, when I've been talking to people in the national [in audible] their forces more in to - their patrolmen more
    in to guard sort of like a hardened perimeter around [in audible].
- speaker: Respondent
  text: Oh, exactly.
- speaker: Interviewer
  text: And they can't go out and make their presence felt as much in the area around the parks.
- speaker: Respondent
  text: In the periphery. That's exactly right, yes.
- speaker: Interviewer
  text: Could you give me an example of what that's like here? I mean, there it was drug busts and, you know, keeping things
    away from the. What kinds of things go on out here that have been attenuated?
- speaker: Respondent
  text: Well, I wouldn't say that anything has been ignored. It's just, as I had referred to before, the area of regular response
    has been more around the developed areas. For example, we have two lodges where there's visitors every night that tend
    to provide more emergency response frequencies, Skyland and Big Meadows. Therefore, our rangers have been scheduled and
    directed to provide fairly rapid response to those areas. Whereas the extreme outlying areas, both north, the extreme
    northern part, and the extreme southern part of the parks have not been patrolled as frequently. And therefore, because
    of less emergency response necessary to those areas, rangers are further from the extreme southern and northern end of
    the park.
- speaker: Interviewer
  text: So the result's been what? It takes them longer to respond to things out there?
- speaker: Respondent
  text: Oh certainly.
- speaker: Interviewer
  text: Or they do as many things as they can?
- speaker: Respondent
  text: Both, mmhmm. Exactly.
- speaker: Interviewer
  text: Okay. Another question that comes into line as - okay. I've sort of scrambled here between things that have, and I'm
    sensing this, at least, that have occurred later on through time. If we back up a little bit to the days immediately following
    what had happened, were there specific changes that were placed, you know, as far as mobilizing your people were concerned?
    Specific things that you had to do in the park? Certain things that you had to do to get people out? A little more detail
    on those things maybe?
- speaker: Respondent
  text: Well, getting people out to their assignments, the Homeland Security assignments was really no major problem, because
    our mode of getting people out, and all the planning for that was done by the Eastern Interagency Communications Center,
    which is based here in this park. And they do an outstanding job of mobilization. And once we found out who was heading
    out at what date, then the changes that we had to do within the scheduling, and the response zones, that kind of thing
    was done fairly quickly. It was not a major problem. Sometimes maybe a couple of days of planning, schedule-wise, and
    that kind of thing. But usually it could be accomplished in 24 hours or less, to get the changes in personnel and areas
    of responsibility taken care of.
- speaker: Interviewer
  text: So the Eastern Interagency Communication was - that's located here.
- speaker: Respondent
  text: It's in this park, right. They take care of the mobilization and assignments of everybody in this broad region here.
    Where they're going, and what their assignment is, and dates, and that kind of thing.
- speaker: Interviewer
  text: Okay. As far as just the effect on individuals, I gather people are working longer shifts now, I would imagine. Or
    are they working longer shifts?
- speaker: Respondent
  text: Well, the people - yeah, the people that are gone definitely work much longer shifts. I would say the average shift
    for somebody assigned to a homeland security assignment in Boston, Independence, or out West is a minimum of 12 hours
    per day, 7 days a week. And I think in some cases they went up to about 14 hours a day. So really once one left on a Homeland
    Security assignment, they had little time to do anything, other than eat, sleep, and work. Those were 21 day assignments
    with a travel day at each end, or at least a travel day. So in essence, you're looking at probably them being gone from
    the park a good 23, 24 days. Which, of course, obviously is a long time. You're talking about the effect. Which is certainly
    a long time not only to be away from home, but needless to say when they got back they were obviously very tired. I won't
    use the word "exhausted," but you'd probably have to interview one of the participants in one of these assignments to
    find out whether they were exhausted or not. I'm sure they came back very ready to get a good night's sleep, and catch
    up on their rest.
- speaker: Interviewer
  text: Well, I was talking to people who were working out at Manassas. You know, that's definitely the impression I got from
    them.
- speaker: Respondent
  text: Yeah. Well, it's just like being out on a, you know, a big fire, a big project fire out West. By the time you get
    back, you're ready for two or three days of nothing but trying to get some rest, and get back in - you know, of course
    you're going to have jetlag, and all of this kind of thing.
- speaker: Respondent
  text: But the people here, during this period, we're dedicating less overtime to filling in behind them now, the people
    that are gone. But in the early to late fall into kind of the midwinter, we did have a lot of people that were working
    long hours on overtime. Nothing like, of course, the people on the Homeland Security assignments themselves. But there
    was a certain fatigue factor there. Where people may have lost one or more of their days off having to come into work,
    that kind of thing.
