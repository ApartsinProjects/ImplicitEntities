collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe to start if you would just explain a little bit about your position here.
- speaker: Respondent
  text: We have the communications center, and then we have the coordination center, and the coordination center is a center
    that mobilizes all resources in the Northeast Region.
- speaker: Interviewer
  text: And we're in the coordination center right now.
- speaker: Respondent
  text: And the communications center is mainly for Shenandoah National Park, and for emergency notifications for other agencies
    such as FEMA, higher levels of DOI officials, of crisis situations, and mobilizations that are about to take place. And
    then the coordination center takes over and does the mobilizations and the demobilizations. And what we were involved
    in to start with, DOI had provided us with a satellite dish and TV, and we were the first ones to see it on the TV before
    we ever got any calls about it. And as it turned out, people in D.C. were not able to call. And they couldn't get out
    because all the satellite systems in that area had all been shut down.
- speaker: Interviewer
  text: Were you in the communications center?
- speaker: Respondent
  text: Yes. I was over there. And we ended up needing to call in so many more dispatchers that we set this operation up here.
    And one of the first things that I dealt with was determining the safety of the DOI officials that I worked with, and
    notifying all of our representatives that are in FEMA where to go, and determining the status of all of our units first
    of all in the Northeast region, and assessing the safety of the employees, if they could be accounted for, and then feeding
    this information to the DOI officials who then decided which, or if teams - incident command teams - where they would
    be needed, and where I should send them, and then I would mobilize these teams and send them to the appropriate places.
- speaker: Respondent
  text: Then once the teams got in place, we had a team in Philadelphia, and then we had the team in D.C. But those were our
    basic NPS teams that we had that were generating orders to us. Aside from those two teams that were like Philadelphia
    was handling sending like the New York parks, and locating employees to assure that they were safe, and sending in resources
    that were needed for especially the downtown monuments and those areas. And so, we were getting orders for those. We were
    getting orders for FEMA in New Jersey, and FEMA in New York, and there was another Type-1 Team that Boise, NIFC, had sent
    into D.C. that we were supplying resources to. And then we had our own team in D.C., the Skippy Brooks' team.
- speaker: Respondent
  text: In Boise, Idaho, there is a National Interagency Fire Center.
- speaker: Interviewer
  text: You covered a lot of ground, and I'd like to just go back over it a little bit, over some of those early activities
    in just a little bit more detail. At what point was the coordination center here actually established? Was this - or was
    the trailer brought in, and if you could give me a little background on that.
- speaker: Respondent
  text: We operated in the did you see the communications center over there?
- speaker: Respondent
  text: Have you been by there?
- speaker: Respondent
  text: You should just go around. It's a little house that they call a Mission 66 house. Do you know what they are? Well,
    there's one of those. And at one time I had - and the rooms are about this size, maybe a little bigger, and I had as many
    as 12 people working in each one until this was set up.
- speaker: Interviewer
  text: So even back before that, I mean, you must have called in a lot of additional staff very quickly. How did you do that?
- speaker: Respondent
  text: I called in rangers and anybody I could find, and I placed orders through the fire system. I'd go out occasionally
    to help other agencies and incidents as coordinator, and I called in my markers, and all the people I had helped. And
    I had a lady that I had helped in Florida gather together a team for me.
- speaker: Interviewer
  text: So, you brought people in from outside the -
- speaker: Respondent
  text: Yes, from all over. And from other agencies. And she was able to create a team for me to bring them in as supervisors
    of different functions. And then I was able to gather as many local resources as I could to do some of the clerical duties,
    and the copying, and that kind of thing.
- speaker: Interviewer
  text: How difficult - I'm recalling that planes were grounded.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: How difficult was it to bring in -
- speaker: Respondent
  text: '- really slowed it down. Forty-eight hours, the first 48 hours were really tough.'
- speaker: Interviewer
  text: So, you must have seen early on that the mission was -
- speaker: Respondent
  text: Oh, I immediately made those calls. That was the very first thing I did. The first thing I did was make contact with
    all of the officials that I work with in DOI to try to locate them and determine their safety, and where they were going
    to go. Because many of them could not work in their offices anymore.
- speaker: Interviewer
  text: I'm sure that you can't give names, but is there anything you can tell me about where - I have a hard time phrasing
    this - if not where or at what level, how do you coordinate with DOI?
- speaker: Respondent
  text: Mainly in the Department of Interior building, people in that building at various levels of DOI, on up to the director.
- speaker: Interviewer
  text: And your link is direct, right?
- speaker: Respondent
  text: Right, and their link is direct to the director and the secretary.
- speaker: Interviewer
  text: I understand we might be getting into a sensitive area.
- speaker: Interviewer
  text: Where we left off, you were sort of talking about some of those very first phone calls.
- speaker: Respondent
  text: Right, locating the people, trying to establish communications, and what I found was that they couldn't call out.
    We could call in to some, like Dennis Burnett, and no cell phones were working. So, once they made the decision to move
    a great many people, some of them they moved out, and most of them they moved down from the top floors of DOI into other
    offices.
- speaker: Respondent
  text: What I did at that point, mostly all - I mean, they couldn't call me, so we had to call them every 15 minutes. But
    what I decided to do at that point was call in a satellite truck, a mobile satellite, and brought it here, and Verizon
    and Sprint, I was able to get them to coordinate for the first time ever. They have never, ever, ever coordinated. Because
    each had to provide something to make it work here. So, they brought in what they call a COW, cellular on wheels, and
    set it up here, and brought me about 150 cell phones that we were able to issue to Skippy Brooks' team that was going
    down. They would stop here and pick up a cell phone, and then go down. And with that satellite system, it restored service
    to most sections of the people that we were talking to, and they were able to once again use their cell phones. So, as
    they went about from this office or wherever that they were having to relocate to, even though the phone system didn't
    work, we were once again able to work on cell phones.
- speaker: Interviewer
  text: Because they were linked to that specific satellite.
- speaker: Respondent
  text: Right. And that made a huge difference.
- speaker: Interviewer
  text: And we're talking the first few hours?
- speaker: Respondent
  text: First eight hours.
- speaker: Interviewer
  text: That's quite a feat to get a satellite dish in here so quickly.
- speaker: Interviewer
  text: Did you have some sort of plan that you were following? It sounds like you were really improvising.
- speaker: Interviewer
  text: And drawing on your experience with other emergency responses.
- speaker: Respondent
  text: Yes. And once we got that in place, it helped smooth things out a great deal. It really did.
- speaker: Interviewer
  text: Now, you mentioned the teams, both the Type-1 Team and the Type-2 Team for Northeast region. Did the activation of
    the teams come from here?
- speaker: Interviewer
  text: The calls to all the listings.
- speaker: Interviewer
  text: And what guidance were you given, or how was that determined?
- speaker: Respondent
  text: Rick Gale says, "Mobilize this team."
- speaker: Interviewer
  text: And what was involved in doing that, and what were some of the challenges involved with that?
- speaker: Respondent
  text: Well, once again, they all had to drive, so that's what took a lot of time. But we know who are on these teams, and
    that wasn't such a big problem. It just took time for them to get in place.
- speaker: Interviewer
  text: Well, I know about the Type-1 Team in Washington, and the Type-2 Team in the Northeast, but you mentioned that there
    was another team.
- speaker: Respondent
  text: Well, we had other incidents like FEMA itself was in New York generating orders, and FEMA was in New Jersey generating
    orders. So, we were also filling orders for other incidents. It wasn't just these two teams. We fill orders for everywhere
    in the Northeast region.
- speaker: Interviewer
  text: I guess I had not realized that we provided support to FEMA.
- speaker: Respondent
  text: And five of the "icon" parks were in this region that we were directly supporting - Boston, and Independence, and
    Sandy Hook.
- speaker: Interviewer
  text: It's the sort of side note, but I've always wondered about that term "icon" park, how that determination is made.
- speaker: Respondent
  text: I think they just decided that with this incident. It became a noun.
- speaker: Interviewer
  text: That's right. Okay, is there anything more that you can tell me at least about the kinds of support we provided to
    FEMA? I mean in a general sense.
- speaker: Respondent
  text: They placed orders for not so much Park Service. We were just ordering through the system the resources that they
    needed. That was mainly EICC doing that, not actually the Park Service.
- speaker: Interviewer
  text: So, I guess, just to make sure I understand, it sounds like the communications center was really performing the role
    of an Interior Department communications -
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: That I didn't understand.
- speaker: Respondent
  text: After that, the first, say, 24 hours of determining safety and setting up communications and passing on information
    about the different critical sites, we set up a national intelligence function here where we had every unit in the Park
    Service call us, or fax us, however they could communicate - it was different in different areas, because many of the
    CC mail type addresses were down, and they had various ways of contacting us, and they would all call in and give us an
    update of their closures or their special events that were going to happen that might have a lot of people concentrated
    in a particular area.
- speaker: Interviewer
  text: And then the Center generated a status report?
- speaker: Respondent
  text: A report, yes.
- speaker: Interviewer
  text: Based on that? And how did - the individual park units reported that status information here, and then how was that
    - obviously, the report was done, but then how was that disseminated?
- speaker: Respondent
  text: We were acting at that point, once the intelligence section got into place, we were acting like an arm of the Type-1
    Team. So, we would compile the report and fax it to the Type-1 Team and they would take it to the director's office meeting
    and provide the briefing at that time.
- speaker: Interviewer
  text: Did the process work the other way as well? That request would come from the headquarters to you saying we need this
    kind of information, and you would go out to the -
- speaker: Respondent
  text: Yes, and it changed it.
- speaker: Interviewer
  text: And how well did that whole process work?
- speaker: Respondent
  text: Once we got everybody online a - ? to when they called in, the time zones was the biggest thing. Meeting a deadline
    with all these time zones. And once we have had a routine set up to where we would work each time zone, we could have
    them call in at a particular time, then it was organized pretty well and we were able to do it pretty efficiently. And
    that went on for quite some time.
- speaker: Interviewer
  text: You mentioned something about the size of the rooms, and that you had 12 people in a room, and I think you were leading
    up to explain to me how and when the trailer was brought in. How large did your staff grow?
- speaker: Respondent
  text: We had an intelligence function and then we had the coordination function, and each function had probably six, seven
    intelligence, and I had probably 10 in coordination. So, it was about 20 altogether, because I had supervisors there.
- speaker: Interviewer
  text: And those were both separate from the communications function?
- speaker: Respondent
  text: Right. Right. So, we had three different large functions going on there.
- speaker: Interviewer
  text: And so finally, at some point did you say well, these two functions have become so large, let's find another facility
    for them?
- speaker: Respondent
  text: Yes. And the Type-1 Team approved getting this in and then I was the one that brought it all in and set it all up.
- speaker: Interviewer
  text: Was this with a few days, or the first week or -
- speaker: Respondent
  text: Yes, well, we had a problem with the power. The power company couldn't come until about 48 hours had passed. That
    became a problem. But other than the power company, we could have been set up within two days. But it took about a week
    then, waiting on the power. And, of course, you can't move in until you get power.
- speaker: Interviewer
  text: Maybe some of what you have already said is part of the answer to this question, but the Interior Department's Continuity
    of Operations Plan, how does, or does the Center - your function here fit into that plan at all? Does it make a difference
    to you if the plan has been activated, or is there anything you can tell me about how -
- speaker: Respondent
  text: We're a part of that plan, and we would immediately -
- speaker: Interviewer
  text: When the plan is activated, then your portion of it -
- speaker: Respondent
  text: Right. We would do whatever was asked of us at the time. We are NPS Communications here, and whatever is needed, certainly
    from Washington, we would provide.
