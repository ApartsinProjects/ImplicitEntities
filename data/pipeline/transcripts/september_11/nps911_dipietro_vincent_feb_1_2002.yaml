collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Vincent, my first question is from the moment you were aware that something had happened, what went on?
- speaker: Respondent
  text: I was actually in the process, or I had just completed, putting together some children's coat racks for our education
    room. And in walking down our hallway in the kitchen and laundry building, headed towards our office, there's an alleyway.
    And the doors were open because it was such a nice day. And coincidentally, that's when I heard an explosion, but not
    thinking that anything had exploded, thinking more that a large weight had been dropped and then you hear the distant
    wave of that sound.
- speaker: Respondent
  text: We went outside anyway and looked in the courtyard, and lo and behold the smoke was rising from the first tower. And
    in seeing that, it wasn't too long after that, that other people started coming out and looking towards the north side
    of the island in view of the skyline, and hearing now report bulletins coming in from radios that a plane had struck the
    World Trade Center. And a number of us, two or three in the beginning, were outside and we were looking at it. And you
    could see the flames come out the window and heavy, thick, black smoke rising and flowing towards the east.
- speaker: Respondent
  text: And it was - there was an eerie quiet because we didn't know the extent of what had happened. The second strike hadn't
    occurred yet. And you know, it's just, I guess, the contrast of that beautiful blue, deep blue sky and this heavy, thick,
    black, acrid smoke coming out of a building that we look at every day - was just something that was a little surprising.
    But again, we didn't - we weren't even thinking of the extent of what this was all going to result in.
- speaker: Respondent
  text: So, we looked at it and we felt a little helpless being on the island. And the eerie thing about it was that before
    the second plane hit tower two, it seemed like time was going very, very slow. There was nothing going on that we could
    hear or see, unlike the '93 bombing. When that occurred, we heard the wave and then you could hear all the sirens from
    New York on the island. And this time we didn't hear that. And we were waiting as if something should happen. In other
    words, where - like a sprinkler system to kick in or the smoke to start to lessen or turn lighter as if it's being fought
    and battled. And none of that was happening. And there weren't any planes in the sky or news helicopters yet in the sky.
    And for that 15, 20 minutes, until the second explosion, it was as if we - nothing was going on from our standpoint because
    we were viewing it from a distance, not knowing in reality what Lower Manhattan was facing in that time.
- speaker: Respondent
  text: Well, then from a distance since it was so quiet, the single plane that was flying in the sky, relatively very low
    altitude - I even had mentioned to a fellow co-worker who was taking pictures of the explosion in that - oh, here we go.
    Help's on the way. And some of us had thought that it may have been a firefighter tanker used to fight forest fires that
    may have been sent out to put out the - help put out the fire at the building. And we watched it go over the statue. And
    it flew right over Ellis Island.
- speaker: Respondent
  text: And as low as it was, I looked up and noticed it had the monogram of an airline, of a commercial airline, of United.
    And knowing that this doesn't seem right, but again not ever thinking that that plane was going to slam into the second
    building. And we just watched it sail in on an angle as if it wanted to cut the building in half. And then it just disappeared.
    The explosion occurred and all the flames that happened after that. And it is as if that building just swallowed up that
    airplane.
- speaker: Respondent
  text: It seemed from our angle that it did go in from one side and come out the other - or whether that was the result of
    the actual detonation of all the fuel. But we all stood there and just couldn't believe it. It was as if someone had just,
    you know, hit you over the head with a 2 by 4 and you're just shaking your head and thinking what just happened? Did we
    all see the same thing?
- speaker: Respondent
  text: You know, and everyone was saying whatever expletive was on their mind at the time. And then realizing that this was
    a much - an event of much higher magnitude in that, you know, it was no longer an accident but something deliberate. And
    I think after the second plane hit, we realized something of a much larger scale is going on and could we be a part of
    this. Not in terms of rescue at that point - we didn't think about that initially - but are there other things that are
    about to unfold that will change my life somehow?
- speaker: Interviewer
  text: Part of a much larger event?
- speaker: Respondent
  text: Right. Since we - most people who work here - and I've been here over ten years, you know - we know the seriousness
    of the site and how much political magnification or magnitude it has in the world scheme of things, and on a national
    note as well. So, we always knew in the back of our mind that the statue could always be a potential target, but we were
    never thinking, you know, was this the day it was going to become reality?
- speaker: Interviewer
  text: So, what went on from there?
- speaker: Respondent
  text: Well, after the second plane hit, more people - more co-workers were out at the fuel dock, which on Ellis Island probably
    gives the best vantage point. And at this time, it should've been the time where our park was just about getting ready
    to open, and yet we had no visitors and I guess boats were turned away and ships sailed back to wherever they were coming
    from.
- speaker: Respondent
  text: And then there were reports that we heard secondhand that there are other things definitely going on, possibly more
    planes that were hijacked, that their ultimate targets were not readily known. And that's when we knew - where we started
    getting more directions as to what should be the next steps. And that was, you know, let's be prepared and start to collect
    our resources and - one, in case we're called to deal with the medical aspect or the ramifications of the actual explosions,
    and two, let's be prepared for anything else that might come about. And that's when other divisions did what they - park
    police and law enforcement took out the heavy artillery and a game plan was formed because this was something that caught
    everybody off guard.
- speaker: Interviewer
  text: Okay. A couple of questions first. You mentioned that you had gotten some information on the radio. Was this a Park
    Service radio or just the media?
- speaker: Respondent
  text: We had heard from other people who were then in offices, secretaries, administrative assistants, who then had started
    to hear the accounts and that there was more information being given to the public, whether true or not no one really
    knew. We heard at one instance that there were - could have been as many as 8 to 10 planes that were hijacked at the same
    time. Targets definitely in Washington. We hadn't heard the Pentagon struck or the other one. I think those came later.
    But it was just a haphazard collection of information that really started to raise the level of caution on everybody's
    part that, you know, we started getting everyone out of the buildings. We evacuated the main building and all the offices
    and started to wait to evacuate anybody who was not considered essential.
- speaker: Interviewer
  text: So, you mentioned a game plan?
- speaker: Interviewer
  text: Okay. What did that -
- speaker: Respondent
  text: Well, one was the accountability of all the staff to make sure that no one would remain in the building. Get them
    outside on the lawn in the front of the building. Start to call our Marine vessels to get people off the island and back
    to a safe point, whether they could get back to Battery Park was unknown. But the idea of getting out of a building was
    paramount.
- speaker: Respondent
  text: And for myself, being a newly trained EMT, this was a wakeup call because it's not a way you want to start that sort
    of career with that magnitude of, you know, oh my God, what could we expect. And we started amassing all our medical gear
    and bringing everything out onto the front lawn to start a triage center on the island.
- speaker: Interviewer
  text: So, the first thing was to get the staff and everybody out of the buildings?
- speaker: Interviewer
  text: Get the people over to the - I think this was actually by the flagpole?
- speaker: Interviewer
  text: And then call the vessels in to make plans to get all nonessential staff off the island?
- speaker: Interviewer
  text: And then start the triage?
- speaker: Respondent
  text: When that would occur, we were then preparing to - it took some time to get the word out to the local authorities
    in New York that we would actually be a repository for victims and/or those who just need to be rescued off of the southern
    tip of Manhattan, since there were so - thousands of people there in that downtown area. You know, you're on the southern
    tip of New York. Where do you go if the Staten Island Ferry is off and the subway systems don't run? You know, there has
    to be some way of mass exodus of getting people away to a safe haven. And once they found out that we would become a repository
    for all those people, then we were just in waiting, not knowing what to expect and the conditions of those folks being
    brought over.
- speaker: Interviewer
  text: Was there some prearranged idea that you all would be a repository for these folks or for anything like this happening
    in a disaster? Had there been some kind of disaster plan that this was all part of?
- speaker: Respondent
  text: Not that I'm aware of. I think we would always figure out that being on an island that we would be the area that would
    need to have people evacuated off the island because we're isolated, and we're surrounded by water. And here it was the
    other way, turned around, where those - even though Manhattan is an island, we consider it the mainland. You're on solid
    ground. You're not on this little small multi-acre island, and here we are taking people off of this larger area and bringing
    them onto, you know, Ellis Island. And it's just very - it seemed very, very strange, although at the time it made perfect
    sense to do so.
- speaker: Respondent
  text: Jersey City Medical Department came over and the medical director for the center then basically set up - acknowledged
    that a triage should be set up here on the island. And then all the medical reinforcements started coming. We had about
    30 to 40 ambulances parked on the island and along line of ambulances out through Liberty State Park just waiting - waiting
    their turn to do whatever they'd have to do.
- speaker: Respondent
  text: We had a number of other things occur within a relatively short amount of time. Again, we don't know if - we didn't
    know if that event was finally over or there was more still yet to come. I mean, it was - the few minutes that had passed
    so much had happened. And then we started hearing more air traffic, seeing more air traffic, jets, military jets flying
    in the air. And not knowing, because these jets are fairly loud, not knowing - you know, every time you heard something
    in the air you just looked up and wondered if that was coming for you.
- speaker: Respondent
  text: And then there were two other events here at Ellis Island, which occurred at the same time, which kind of fit together.
    They weren't related, but because of the timeliness of what had occurred it had seemed like this was a part of a bigger
    thing and we had - we might have been affected by it.
- speaker: Respondent
  text: We had a speedboat with three individuals, and this speedboat was going pretty fast headed right for the island. And
    we were wondering if that was going to be like a suicide bomber because they didn't stop and they didn't heed the warnings
    of park police initially or they went right through our sign, which says no docking permitted. And they were just coming
    right at an angle, right for the seawall in front where all our staff was waiting to board our boat to evacuate the island.
    And everybody began to run and scream and head towards the other end of the island.
- speaker: Respondent
  text: There were also reports of a boat passing underneath our bridge, which connects the island to Jersey City. And they
    had stopped underneath the pylons of the bridge, which is very unusual. And that had to be investigated because we didn't
    know if anyone had placed any device or anything there to detonate the bridge and really keep us isolated.
- speaker: Respondent
  text: So, there were a lot of things going on. Although people tried to keep order, many, many of the staff people were
    very upset and there was a - to say that some people were hysterical would be mild.
- speaker: Interviewer
  text: Okay. And this was mainly park staff?
- speaker: Interviewer
  text: Okay. Just for me to understand things right, at this point you were not bringing in people from outside?
- speaker: Interviewer
  text: This was mostly just evacuating park staff?
- speaker: Interviewer
  text: And this was just about shortly after the second building had been hit?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: All right. So, you were aware that as you were - okay, you're mentioning here that as an EMT you knew that you were
    going to play - this was going to be your time to play a part.
- speaker: Interviewer
  text: And you were definitely aware at this point, after the buildings were hit, that you all were going to play a part.
