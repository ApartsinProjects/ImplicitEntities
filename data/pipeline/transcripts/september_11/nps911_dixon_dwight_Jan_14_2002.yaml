collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware of what had happened, what went on? What started? What happened all?
- speaker: Respondent
  text: All right. I had my patrol vehicle in the shop that morning, getting the oil changed, and the owner of the shop had
    a TV going in his office, and came out and told me that a plane - only one at that time - had hit the World Trade Center,
    not knowing if it was an accident or what else - at that time didn't expect anything else, as far as a terrorist act.
    A short time later he came back out and said a second one had hit the other World Trade Tower.
- speaker: Respondent
  text: At that point, I sort of knew in the back of my mind that that couldn't be an accident. When I left the shop - they
    completed the servicing of my vehicle - and went to the local Ranger station there in Hancock, Maryland. I was to meet
    another Ranger there that morning for another assignment, and ran into him, and briefed him on what had happened, and
    we went there to the Ranger station, and made a call to our Communications Center to what other information they'd had.
    Our Communication Center handles all the communications for the entire region, including those parts in and around the
    DC area.
- speaker: Interviewer
  text: This Communications Center is where?
- speaker: Respondent
  text: It's here in the park, but it's a regional communications center, the National Capitol Region Communication Center
    is the official - they had the news going, and were receiving calls about other things going on, including a report that
    there had been a bombing or something on the Mall area, which turned out to be false, and by that time the other - another
    plane had struck the Pentagon. They had a report at that time, as well, that another plane was missing and feared down,
    but they didn't know the location. It turned out that to be the plane in Pennsylvania.
- speaker: Respondent
  text: At that point, I got the other Ranger and we started to the Communications Center, ourselves, so that we could get
    all the information directly. En route to the Communications Center here at Ferry Hill from Hancock, I got a radio call
    that the Regional Chief Ranger wanted all available law enforcement personnel to come immediately to the DC area, so through
    radio traffic, I had the Communications Center start contacting all of my on-duty and off-site Rangers, and have them
    either respond directly to DC, the staging area there, or to meet up here at Ferry Hill, which those that needed to were
    just carpooled out.
- speaker: Respondent
  text: We were probably here at the Communications Center for maybe 15 or 20 minutes, getting some supplies and gear together,
    and then we went to directly to DC, the staging area there, which was at the Parkway there. I forget the name of it.
- speaker: Interviewer
  text: Is this the Shenandoah one, or - ?
- speaker: Respondent
  text: No. It's the Parkway going into D.C.
- speaker: Interviewer
  text: Oh, okay. George Washington?
- speaker: Respondent
  text: George Washington. Yes. Their headquarters is where the staging area was. We met the Regional Chief Ranger there,
    and he was going to give our assignments, put us into teams, and actually have us go out and accept - help the Park Police
    or whoever else wanted - whatever agencies might need us in the DC area. I headed up one of the teams. The first five
    Rangers that got on the scene there went with me as Team One. We were dispatched from there to the Clara Barton Parkway,
    and there at the Clara Barton Parkway, the daycare center from the Pentagon - they had evacuated all the daycare center,
    the children and the staff out to the Clara Barton Parkway. They were actually in the grass, adjacent to the Parkway there.
- speaker: Respondent
  text: With rollaway beds and strollers and blankets and, basically, they just got them out of the building and then they
    took them to that area.
- speaker: Interviewer
  text: When you say that they were in the grass, was this grass by the Parkway? I mean, where - kind of like where were they?
- speaker: Respondent
  text: It's right next to the Parkway. They were on - that would be the westbound lane, that side of the road, between that
    and the Potomac River. There were probably about 50 to 60, altogether - staff and children from infants up to toddlers
    in age that were all, I guess, children of the staff from the Pentagon. I'm going to let it ring.
- speaker: Respondent
  text: It will catch in a minute. But the - our purpose for that was to go secure and make sure that the children and the
    staff there were secure and had whatever supplies that they needed. Interesting enough, the first thing that they were
    asking for when we arrived were diapers, because the infants, I guess, needed the diapers, and they hadn't been able to
    get any when they left the building. Someone was able to get some diapers and bring those over.
- speaker: Respondent
  text: We set up a perimeter around the children and the staff; blocked off one lane of the westbound traffic to get the
    - well, the traffic was light at that time. There wasn't much leaving that route, at least out of DC. So, we blocked off
    that lane to make it a little safer with the children being there, along the - in the grass along the side of the Parkway.
- speaker: Respondent
  text: We got information. I believe it was from the Air Force. There was a Captain there from the Air Force that was kind
    of overseeing this part of the moving of the children, and he had - I believe it was him that had acquired the use of
    a DOT facility, if we could get the children there, that they would be a lot safer in this building, rather than out there
    in the grass along the Parkway, but the problem was getting them to that location. DOT is next to the Naval Annex Building.
    It's a short distance from the Pentagon, but on the other side of the Pentagon.
- speaker: Respondent
  text: About the time we were trying to figure out how to get the folks moved up there, a bus came along - a tour bus - empty,
    leaving DC. So, we basically just stopped the tour bus, and commandeered it, and asked if he would be willing to help,
    and he would. He offered his assistance. We loaded all the children and blankets and everything we had there - staff -
    all on to the bus, and escorted it up to the DOT building, next to the Naval Annex. There we moved the children and staff
    and the beds - the rollaway cribs they had - into that building; someone was able to order up some food for them - for
    the staff. I guess they hadn't had lunch or anything.
- speaker: Respondent
  text: The children - I believe they got some food for them, some formula for the infants, and that sort of thing. We set
    up security around that building, and basically waited for the parents to come and pick their children up, and not knowing
    who these parents were, of course, we checked ID and had staff members confirm that these were, indeed, their children
    that they were picking up. And we assisted with some traffic there in front of DOT. It was also a staging point for the
    State Police, and some of the FBI, so we assisted with some of the traffic control in that location. A lot of emergency
    vehicles were using that route to get down to the Pentagon.
- speaker: Respondent
  text: The bus route over to DOT from Clara Barton, unfortunately, took us right in front of the Pentagon. The staff from
    the daycare, of course, evacuated out of the back of the Pentagon, and had not seen the front where the plane had hit
    the building, so unfortunately, they had to see that, and a few of them, of course, were emotional about seeing that -
    that scene.
- speaker: Respondent
  text: Pretty much by 5:30 or so, all the children had been picked up by a parent. The only remaining were a couple of staff
    members, and the Air Force Captain and his wife, who was also in the Air Force. They only lived a short ways from there,
    and of course, they couldn't get their vehicles, because that area was blocked off - as part down there at the Pentagon,
    and so we transported the Air Force Captain and his wife to their home. The other staff members - there was a motel across
    the street, and they went to that location to call to have someone come pick them up, as they were unable to get to their
    vehicles, as well.
- speaker: Respondent
  text: A second team - Park Service team - had gotten together after we had departed the staging area, and they went to the
    Mall. I'm not sure what their duties then were. Once we had completed that, and all the children were picked up, we called
    back to the staging area to see what our next assignment was, and pretty much they had gotten everything secured, and
    the Park Police had secured the Mall area along with Park Team Two, and we departed DC, and we came back home.
- speaker: Interviewer
  text: When you had - you had basically gone - well, first question. I guess I've asked you about the Shenandoah - I guess
    they have a Communications Center out there?
- speaker: Interviewer
  text: Was that of any relevance to you all?
- speaker: Respondent
  text: No. No. All of our communications went through our National Capitol Region Communications Center.
- speaker: Interviewer
  text: Yes. And that was out here?
- speaker: Respondent
  text: Yes. That was actually physically here on the site of it.
- speaker: Interviewer
  text: Well, okay. About what time did you get down to the daycare - to where the new daycare center had been set up?
- speaker: Respondent
  text: It was probably - I'm going to say around 11:00 or 11:30. It may have been just in that area - 11:00 to 12:00.
- speaker: Interviewer
  text: And you're saying traffic was light?
- speaker: Respondent
  text: Yes. On that Parkway. Of course, they weren't allowing anything, but emergency vehicles inbound, and pretty much everyone
    else, I guess, had been evacuated or were using other routes to get out of DC. Traffic between Ferry Hill, here at this
    office and DC - all the way in to DC was very light. Coming out, of course, it was backed up - all lanes, bumper-to-bumper.
- speaker: Interviewer
  text: And this was by the time you came out in the evening?
- speaker: Respondent
  text: No. This was in the morning, inbound.
- speaker: Interviewer
  text: Oh, okay. The usual commuter traffic in other words?
- speaker: Respondent
  text: Well, there was nobody going in - into the town because of the emergency, but everybody else leaving DC - getting
    out of DC - that the outbound lanes were packed; the inbound lanes were very light.
- speaker: Interviewer
  text: What effect did that have on what was going on for you all?
- speaker: Interviewer
  text: The outbound traffic?
- speaker: Respondent
  text: The outbound traffic didn't have any effect on us, but the inbound, being light, allowed us to get down there quickly.
- speaker: Interviewer
  text: You got down there quickly? And it didn't provide - it didn't cause too much problem with where the little ones were?
- speaker: Respondent
  text: No, no. Like I say, the inbound lanes were shut down, except for emergency traffic, on the Clara Barton Parkway. And
    the outbound lanes had been either cleared already - pretty much everybody had already gotten out of town that were going
    to leave, or they were taking other routes, because it was fairly light. It was steady, but light. It wasn't your usual
    traffic.
- speaker: Interviewer
  text: Yes. Another question comes up. When you say that you secured the area while the - where the kids and the staff were
    - what did that entail? For those of us who have no knowledge of that.
- speaker: Respondent
  text: Well, I had six people on my team, and we spread out, and basically had a secure perimeter around the children. Of
    course, these were all well-armed Law Enforcement officers. I had a couple of them - were being sure that traffic was
    safe and getting by them there on the Parkway.
- speaker: Respondent
  text: I had a couple of others that were stopping folks that were bicycling or walking along the trail, there, adjacent
    to the Parkway, between the Parkway, and the Potomac River, asking them to get off their bikes and walk through the area,
    because of the children, and being sure that no one came into the area armed that was not a local officer, or known to
    us. And just generally being sure of the safety of the staff and the children.
- speaker: Interviewer
  text: Okay. And did anybody come into this that was armed?
- speaker: Respondent
  text: Yes. There was some - a couple of officers, and I forget the department they were with - and that might have been
    [inaudible]. I can't recall whether they were Secret Service Officers. They had their credentials, and were badged, and
    I believe they're actually the ones that went - and was able to get some diapers and other provisions for the children.
- speaker: Respondent
  text: But they were in plain clothes. They properly identified themselves. They were - well, they were of great assistance
    to us.
- speaker: Interviewer
  text: What else - you mentioned that they got diapers. What else did they do?
- speaker: Respondent
  text: Well, some blankets for the children to lay on. I believe they also brought some water down.
- speaker: Interviewer
  text: But basically, up there at Clara Barton, there wasn't any food or anything like that at that point?
- speaker: Respondent
  text: Nothing. They were just moved out of the building for safety, real quick and hastily, and stationed there in the grass
    between the park and the Potomac River.
- speaker: Interviewer
  text: How were the kids taking it? I mean, how were they -
- speaker: Respondent
  text: Well, I don't believe at their age they realized what was going on. I think it was probably more like a field trip
    for them - you know, we're going - the idea of going down to the river, and they have a picnic without - [laughter] but
    I don't think they knew exactly what was happening.
- speaker: Interviewer
  text: Mmhmm. And the staff? How would they operate under this?
- speaker: Respondent
  text: They were extremely professional in doing their job. Again, they went out the back, so they weren't really completely
    aware of what had happened. They knew a plane had hit, but they weren't aware of the damage that it had done, and had
    not seen it.
