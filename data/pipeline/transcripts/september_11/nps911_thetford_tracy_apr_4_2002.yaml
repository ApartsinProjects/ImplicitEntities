collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Well Tracy, my first question is going to be from the moment that that you knew something had happened, what went
    on?
- speaker: Respondent
  text: Well, I was sitting in our headquarters office building in the receptionist's office. Speaking with her. And a fellow
    employee by the name of Deb Truax who works in our personnel office, came downstairs and asked if she had a TV in her
    office. And my first reaction was to laugh because I thought she was joking. And then she had mentioned she received a
    phone call from her husband saying that a plane had been - had crashed into one of the towers of the World Trade Center
    in New York. And so, I got up and, and came over, or drove over to the offices over here, and our communications center
    right across from my office has a telephone, so it was tuned in, it's always tuned in to CNN. So, I came over, and started
    watching the news, and saw the second plane crash into the second tower of the World Trade Center on CNN. And there were
    several people in there, most of the - the communications center employees, then Connie Rudd our assistant superintendent
    came over, and she was watching a lot of the news casts. Employees were coming in and out - patrol folks, and other people.
    They would come in, watch some of the news cast… catch up on what was happening, and then go out and later I found out
    that they were going home, or not going home, but calling home. To talk to their families. So that's what I did too. I,
    I left and came over and called my family and alerted them to what was going on, because they - they didn't know at the
    time. And I came, and just went back and watched the rest of the events that happened.
- speaker: Respondent
  text: The next thing that happened while I was over there, Connie Rudd received a phone call, not from Marie Rust, but the
    acting regional director on that day, and she received word that parks in the northeast region were to shut down. So,
    what she did, I remember, is she pulled management staff, law enforcement employees and supervisors - Robbie Brockwell
    our concessions manager… or liaison, because if the decision was to shut down the park, did that mean we would have to
    evacuate people who were staying in our lodges? We needed to make a decision if we needed to evacuate visitors who were
    camping in our campground. So, she, she pulled me in, because I supervise the operations of the entrances and campgrounds.
    And I remember actually going back over to the com center and catching up on what was happening and watching the first
    tower fall. And it was amazing. It was just - I'm sure you've heard this a lot - surreal?
- speaker: Interviewer
  text: No, I haven't, no, I haven't
- speaker: Respondent
  text: So, so we were all just completely transfixed onto, on the TV, watching the reactions of people in New York City.
    A lot of coworkers had cousins working in the World Trade Center, so they were very worried about them, and calling home.
    And then as the second tower fell, you could hear just like complete gasps. And I remember looking over at Connie Rudd
    and she was saying oh my God, second tower fell. Oh my god. And it was just the strangest thing to watch. You know, on
    TV. It's like events as they're actually happening, immediately. And then, you're standing there, you know - how many
    hours are we away from New York City, six hours away from New York City - and watching like all this, this complete motion
    going on and, and you have absolutely nothing - You can't do anything about it. You can't, you can't go out there and
    help them immediately. You can't, you just, you can just stand there and watch while it was going on and become pretty
    shocked at it. And then, then that's when we got into motion as far as what we were going to be doing.
- speaker: Respondent
  text: I called - On a personal note, one of my best friends was actually flying into Dulles that morning. She was sitting
    down at her seat in an airplane in Las Vegas Airport, because she and her husband live in Capital Reef, Utah. And as the
    first plane hit the first tower, she was just sitting down in her seat in the airplane. And then they evacuated the airplane.
    They came out into the airport, and they didn't actually tell her, or tell the passengers what was happening. And so,
    she called and left a message at my home, and then I called her husband and she was on the phone at the same time, so
    she knew where to call me. And so, I was the one who told her what was going on and what happened. And it was so weird,
    because this was her first vacation from, you know, having a child two years ago. She was so excited. And she was going
    to fly into Dulles. And she said well, maybe I can fly into another airport. [Laughter]. And my immediate reaction was
    like no, go home, you know, don't, you're not going anywhere. Go home. You know, go to your family. And, but when I got
    home later on that afternoon, I got her, her voice mail message on my machine. And it was so weird because she was calling
    and saying well, we just got de-boarded from the plane. They said that there was an accident in New York City, or a plane
    flew into a building in New York City, so I'm going to see if I can get an alternate airport. And then you can hear this
    lady talking behind her on the telephone, and telling her exactly, because she had just gotten the news of what happened…
    in New York City. And, telling my friend what happened while she's still on the phone, and hearing her reaction recorded
    on my answering machine. That was pretty wild.
- speaker: Respondent
  text: Yeah. And so, I explained to her what happened with the, the World Trade Towers, and that the airplane had flown into
    the Pentagon. And, and it just really freaked me out because she was going to be flying straight into Dulles and I was
    going to -
- speaker: Respondent
  text: '- be picking her up in a couple of hours after all of this just happened. And that was wild.'
- speaker: Interviewer
  text: Yeah. So, this was just during your friend, you had called, or your friend had called in just about the time that
    you were all sort of waiting to see what was going to happen.
- speaker: Respondent
  text: Exactly. Probably, just, my, my friend had called in just as we were, it was probably just as the first tower fell.
    And I can't remember exactly when Connie Rudd got the call from the Acting Regional Director to shut down parks. But to
    get back to the administrative part of that, Connie had called all the management staff that were available and on duty
    at the time to see how Shenandoah was going to react to - not only Washington, DC and New York City but to the regional
    director saying we should shut down the parks. Mostly, if I remember correctly, and I may not, I think it was mostly for
    safety and security of government offices, since the plane had gone into the Pentagon. My interpretation of why we were
    closing is it was nobody knew what was going on next, or you know, what planes were going where, what other possible terrorist
    attacks might happen, where. So, my - my feeling when I heard Connie walk out from the office when she got the call was
    that wow, you know, is this a potential danger for anybody and everybody, or is it here in the northeast region, since
    we're the parks and the government closest to DC and New York City? So, I don't know. So, we went over and met here at
    the Ranger Activities Office where you were just speaking with Ginny Russeau and sat down and decided to make an action
    plan. I wasn't involved in the very beginnings of that conversation. I was calling my staff out in the field, the, our
    employees that work in the entrance stations and campgrounds. I think what had happened was we as a park had decided to
    follow the spirit of that directive, but not to actually close down and evacuate our lodges and our campgrounds in response,
    but to, as Ginny was telling you earlier, but to leave Shenandoah open as a sanctuary, for a place for people to go to.
    And I called all my employees, since in government-ese they're not considered essential. You know, they don't need to
    be on duty to protect life, property, etc. We decided if they needed or wanted to go home, or, confer
- speaker: Respondent
  text: with family or to be with their family, then they had every opportunity to leave. They could shut down a station,
    and just leave. So, I called all of my folks out in the field, and all of them decided to stay and, and work at the stations,
    greet the - the visitors that were coming in, and just be out there. Because they felt that if they went home, they would
    just be sitting in front of a TV as opposed to being out and at work and being productive, and somewhat distracted from
    the events that were going on. After I made the phone calls, I went back into where all the management staff was meeting.
    And I remember Connie sitting at the table. She had both of her arms up on the table, and her fingers intertwined. And
    she was just sitting there, and she goes you know, - How did she say it? - She, she was saying I'm trying to figure out
    why this day is so important. Why on this day would, would these events happen? And it's the eleventh day of the ninth
    month, 911. And, and that was pretty wild, you know? Just to put that together. So, as I said the management team went
    into their incident action plan and decisions on what they were going to do. I do remember them saying that we will support
    Washington, DC in any way we can in this national emergency. And Ginny will, and Greg Styles - will fill you in on most
    of that. But yeah, we just decided to stay open as a sanctuary and a place of refuge. And actually, later on in the day
    I, I called down to our employees that are working in the entrance stations, to find out if there has been an influx of
    people into the park who were saying that it was overwhelming, and they needed to get away or away from the TV. And there
    were groups of people who actually were leaving Washington DC and just drove out of the city. And they came to Shenandoah
    and decided to come into the park and, and just either drive or walk. And they were telling our folks at the entrance
    stations that yeah, they, they just needed to get away. And um…
- speaker: Interviewer
  text: This was happening already the first, the very first day?
- speaker: Respondent
  text: The very first day. There was, it wasn't a huge influx. But there were, there were people coming in. And then that
    weekend we, we had a lot of people coming in just - you know - they wanted to get away from the TV mostly, is what we
    heard. Just because they were seeing the events over, and over, and over and over again. But yeah, our campgrounds were
    pretty busy that weekend. So that was neat to see, actually. And I liked - I was very happy about the fact that we did
    not shut down and we did not evacuate our campgrounds and our lodges. And I know that that decision was a very tough decision
    and they had to get more information, I'm sure, as far as, the safety and security of our visitors and our employees.
    But I'm glad we didn't immediately knee jerk and close down everything. Because I like the fact that we were open. - and
    available for folks - and ourselves. I didn't want to go home.
- speaker: Interviewer
  text: Backing up for a minute - on some of the things you mentioned. First of all, you had been at the office, and - let's
    see if I can track - understood what you're saying.
- speaker: Respondent
  text: I know. I think I jumped around a lot.
- speaker: Interviewer
  text: No, that's all right, that's all right. You had been at the receptionist's office and, when you had heard that the
    first plane had hit. And basically, Connie Rudd had come over to tell you that something had happened.
- speaker: Respondent
  text: No. It was, it was Deb Truax from the Personnel office - had come downstairs and had, had asked Sandra Rushing, who
    is our information receptionist for our headquarters, asked if Sandra had a TV in her office.
- speaker: Respondent
  text: Because Deb's husband had called her and said that a plane had flown into a building in New York City.
- speaker: Interviewer
  text: Oh, that's what …
- speaker: Respondent
  text: Yeah. And then I had left that office and come over to our communications center, and then Connie Rudd had come over
    later.
- speaker: Interviewer
  text: That's right. Because the report was that Connie Rudd had received a call from the regional director -
- speaker: Respondent
  text: Right, well, she was in the -
- speaker: Interviewer
  text: '- to shut down the northeast region parks.'
- speaker: Respondent
  text: Right. Well, she was in the communications center. And I don't know how long after she came over there, or what time
    she got over there.
- speaker: Interviewer
  text: So, you got a chance to call before anything happened? You were all there just sort of transfixed, I think you were
    saying for, for a minute. And then the second tower now was hit, and it was falling. And at that point people began feeling
    like what can we do?
- speaker: Respondent
  text: You were saying you were overcome with emotions, but you couldn't, you couldn't act. There was nothing you could do
    but just stand and watch. That's how I felt.
- speaker: Interviewer
  text: And then you sort of got, as you were just about to get into motion, your friend called in from Las Vegas. This was,
    was sort of this, this really weird situation.
- speaker: Respondent
  text: Yeah. Well, I called her husband.
