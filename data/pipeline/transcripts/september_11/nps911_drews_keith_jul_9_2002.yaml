collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Respondent
  text: Well, the first thing I knew of anything happening was when Jan Sucholdowski, the maintenance worker who works in
    the garden mostly, came in and mentioned that an aircraft had crashed into the World Trade Center. I think some people
    started looking at Malcolm's television in his office. And I was working on the computer and was checking on the Internet
    and called up CNN.com, and saw something about it, the picture of the plane crash. And then couldn't make any other links
    beyond that. And then went to ABC News, I think it was, and also wasn't able to get on there, because it was all tied
    up.
- speaker: Respondent
  text: And not too long after that, heard this large boom, as though something had fallen down upstairs up in the attic.
    So, I kind of went to investigate. Karen was at the back door. Maybe some people went upstairs to look. And it just kind
    of rattled the windows. So, went to the back door, didn't see anything in that direction. Went to the front door and looked
    out there and saw this kind of white cloud kind of drifting up to the north of us, kind of coming up the gully. Wasn't
    sure just what it was, if it was a cloud or just what.
- speaker: Respondent
  text: So, I figured I'd go for a little walk, check it out, have a look around. So, I grabbed my hat and walked over to
    the house. And the white cloud got pretty darker. I realized something was wrong. And when I got to the edge of the hill
    over near the - where you could look out, you could see the smoke rising from the Pentagon, and some of the flames. And
    that's pretty much when I knew that something had crashed into the Pentagon.
- speaker: Respondent
  text: And we didn't really see, after that. I think I went into the house to - they hadn't opened the house just yet, because
    people were there. I think Mark Jones and Linda Kacmarcik were there opening the house. And the house was closed at that
    point. Went over to it and went through the house and didn't see anything wrong in that. And the decision was made to
    keep the house closed. And Frank Cucurullo was over there as well.
- speaker: Respondent
  text: And let's see. I think it was decided that the house would not open - Oh, and I was up, first saw the thing, I didn't
    just walk along the edge for a while. And there were some visitors coming along and were kind of shocked by what had been
    seen.
- speaker: Respondent
  text: And some of them had heard about the World Trade Center. And others didn't know quite what was going on. And well,
    when I first saw the Pentagon fire, I said a prayer for those who were in the building and on the plane.
- speaker: Interviewer
  text: So, you are saying that, basically, that Jan Sucholdowski was, the first indication you had that something was wrong
    was that Jan Sucholdowski had said that the World Trade Center was hit?
- speaker: Interviewer
  text: And you were all in the - at an office at this point?
- speaker: Respondent
  text: Yes, in this office.
- speaker: Interviewer
  text: In this office here?
- speaker: Interviewer
  text: And so, what you did was, you were watching Malcolm's television?
- speaker: Respondent
  text: I didn't quite go in and watch the television. I went over to the computer to check the Internet, to see what news
    was out on that. But of course, it was all jammed up with people trying to check it, too.
- speaker: Interviewer
  text: Right. So, the Internet was pretty much jammed, but you were at least able to catch CNN?
- speaker: Respondent
  text: Yeah. We saw like some picture. Like, "here is the story, the World Trade Center was hit by an aircraft." And I think
    they had a picture of the plane crashed under it or something like that.
- speaker: Respondent
  text: And then trying to click on the story. It just wasn't going anywhere. I tried switching to another one, and wasn't
    getting anywhere with that, too.
- speaker: Respondent
  text: It was so jammed up.
- speaker: Interviewer
  text: Okay. And so, at that point, you heard this large boom?
- speaker: Interviewer
  text: Okay. Rattled the windows?
- speaker: Respondent
  text: Rattled the windows. Felt like something really heavy had fallen over upstairs in the attic. Didn't know what it was.
    I wanted to try to figure out what had happened.
- speaker: Interviewer
  text: So, you went outside?
- speaker: Respondent
  text: Went outside. Kind of looked out the back door first and didn't see anything out there. Then went out the front door
    and saw the cloud of, kind of a white cloud kind of low to the ground.
- speaker: Interviewer
  text: That's interesting. Yes, that's the first detail I've heard on it, that there was a sort of white cloud. So, you must
    have caught it pretty early?
- speaker: Respondent
  text: Pretty early, I'd say, before it had a chance to turn black. I'm not sure why it was white, but that's what it was.
- speaker: Interviewer
  text: Yeah, that's interesting. And then you looked around and the cloud was getting darker, and you could see the smoke
    rising.
- speaker: Respondent
  text: Yeah, so as I walked, as I got over to the hillside, to the edge of the hill over near the house, I was able to look
    down and see where the Pentagon is. I could see the smoke rising and turning black. And you could see the flames, and
    you could see flames in the windows of the building. Although, yeah, some of those flames probably - I've seen at a later
    time. But it's mostly just a lot of black smoke rising up.
- speaker: Interviewer
  text: Okay. So, you went to the house, so at that point, you went over to the house?
- speaker: Interviewer
  text: And you are saying that Mark and a couple of others were there and just came down?
- speaker: Respondent
  text: Well, Mark and Linda were in the house. And there may have been someone else, but I don't recall who that would have
    been. I decided at that point not to open the house. I asked Mark about it later, and he, apparently - Linda had said
    to him, like they got the Pentagon too, or something to that effect.
- speaker: Interviewer
  text: And so, the judgment call really was, don't open the house?
- speaker: Interviewer
  text: Okay. So, it never really opened?
- speaker: Respondent
  text: It did not open that day, as far as I know. By the time I got over to the house, it was - the doors were all closed
    up. I had to go in the other wing door, which was locked. Just to see what was going on, and kind of went through it.
    And shortly afterwards, there was another boom, but apparently that was a sonic boom of a jet fighter in the air. Because
    it sounded like something had fallen over in that house. But as far as we know, that was just a sonic boom from one of
    the jet fighter jets.
- speaker: Interviewer
  text: So, I gather this thing that rattled the windows, and everything around here was very much like what a sonic boom
    would sound like?
- speaker: Respondent
  text: Probably so. But I think certainly louder than a sonic boom might have been. Because the other one wasn't quite as
    loud, but it certainly got our attention.
- speaker: Interviewer
  text: I'll bet. Okay. So, visitors, some of the visitors were there?
- speaker: Respondent
  text: Well, there was some visitors coming up to the house like they normally would, and walking along the gravel walk,
    but along the side of the hill in the flower garden, coming over to the house, which was one way they could come up to
    it. And probably some were stopping to look over at the Pentagon, because they obviously could see the smoke and flames
    and all.
- speaker: Interviewer
  text: And some knew what was going on, and some didn't?
- speaker: Respondent
  text: I think some had heard some news about the plane crash in the World Trade Center.
- speaker: Interviewer
  text: What were they doing? I mean, what were they saying? What were they talking about?
- speaker: Respondent
  text: I don't have a real clear memory of what they were mentioning. They were just kind of looking at it, probably stunned.
    And [pause] -
- speaker: Interviewer
  text: Mmhmm. I could believe that. Okay, so at this point, what then happened?
- speaker: Respondent
  text: Well, I think after the decision was made to close the house - I think it wasn't too long after that they decided
    to start sending people home. Obviously, the word went out that the cemetery was going to close. So, at that point they
    told people that they should go home. So, most of the staff did leave. And Frank asked me to stay. Malcolm stayed, too.
    Frank asked me because of my law enforcement background. He needed people to - he wanted some folks to stay until the
    security guards came in the afternoon.
- speaker: Respondent
  text: I was also surprised before that happened, I think, when they pulled back from the Pentagon, when they had heard that
    another plane was on its way, possibly. And so, there were FBI agents up on top of the hill looking around watching in
    case another plane came, you know, just the spotters. So, they were out in front of the house on the hill above the Kennedy
    gravesite watching for that.
- speaker: Interviewer
  text: Spotters? What are - these FBI people were spotters?
- speaker: Respondent
  text: Yeah. They were just - they were - I guess - apparently - they might have been down at the Pentagon, and they were
    told to - I think they had pretty much pulled everybody out of the building, or away from the building, just in case another
    plane might be going to crash into it. So, I think some of the FBI agents were ordered up to Arlington, because it's kind
    of the high point in the area, so they could watch for any planes coming near.
- speaker: Interviewer
  text: This is kind of, I mean, is this pretty much a standard procedure, like from a law enforcement background?
- speaker: Respondent
  text: I'm not sure. I would think, it's just probably a good idea now, you have an idea a plane is coming. Although at that
    point I'm not sure you could really do anything about it other than say, well, here comes the plane, and there it goes.
    It's going into the Capitol, or into the Pentagon, or the White House. But I guess they just wanted to get people out
    of, away from the Pentagon in case that was going to be a target a second time.
- speaker: Interviewer
  text: So, what happened when the FBI agents were up on the hill? What happened then?
- speaker: Respondent
  text: Well, I don't think anything happened, because obviously, another plane did not come. So, they just stayed a while,
    probably another maybe fifteen, twenty minutes, or thereabouts, and just kind of watched for a while. And then we apparently
    got an all clear. Maybe that, maybe the plane that crashed in Pennsylvania, they figured that might have been the other
    one that was on its way. And when they learned that that one went down, that - there probably wasn't any thing [best guess]
    - Maybe at that point all the other planes in the country were on the ground or heading to the ground. So, the threat,
    the immediate threat was over, as far as another plane crashed somewhere in Washington.
- speaker: Interviewer
  text: What then happened?
- speaker: Respondent
  text: Well, a lot of people went home. Linda and Mark asked if they wanted to leave their car with me, because they knew
    I would be staying a little longer, so I'd have some way of getting home. But I turned it down. I figured there would
    be some way to get home. Some way, I didn't know how it was going to be at that point. But I figured I'd probably be here
    until mid -afternoon, or thereabouts. So, I didn't really see any reason to take their car from them when they needed
    to go.
- speaker: Interviewer
  text: Right. Okay, so they offered, so you remained here. What went on while you were remaining here?
- speaker: Respondent
  text: Well, the cemetery slowly emptied out of visitors. I think park police probably came through a few times. Malcolm
    had a portable radio, a transistor radio that we were listening to the news with. And at some point, there was a news
    report about a plane crashed in Maryland, possibly up near Camp David. And got kind of concerned about that, because Catoctin
    Mountain Park is right there. And I know someone who works there. So, I was kind of wondering what was going on up there.
    But that report turned out to be false. And I was just kind of watching the area, making sure no one came in to the, around
    the house grounds.
- speaker: Interviewer
  text: Did anybody come in?
- speaker: Respondent
  text: Oh, some people were walking around. I remember a couple of Army people came by. I think one maybe from - had come
    back from the State Department building. There was talk of possibly bombs going off there. It was false reports and such.
- speaker: Interviewer
  text: These were the people walking by were talking about that?
- speaker: Respondent
  text: Yeah. And one fellow came up on top of the hill. I don't remember if he was coming, had been at the State Department
    - or just where - but he came up, was on the hill just looking around for a while. I think he might have been stationed
    over at Fort Meyer. He was just walking back, because it was just hard to get around at all, with all the traffic leaving
    town.
- speaker: Interviewer
  text: Mmhmm. Okay. Then what?
- speaker: Respondent
  text: Well, after all the staff had left, Frank, Malcolm, and I just kind of hung around, and watched, and sat on benches,
    and listened to the radio. Then came back and had lunch for a while. Watched Malcolm's TV for a little bit. Watched, heard
    about the collapse of the buildings. And I guess that was something that I heard a lot out near the house, that one of
    the towers had collapsed. It just seemed unbelievable. And then not too long after, you heard the other one had collapsed,
    too. And I figured the death toll must be really high for all the people that could possibly be in that building and have
    it collapse. I'm just amazed, what's so amazing, as the days and weeks went by, the death toll kept dropping, because
    they found that so many more people had gotten out of the buildings.
- speaker: Interviewer
  text: Hmm. So, you were around the area, pretty much watching the TV when you weren't patrolling the area with no visitors
    or anything. And the few visitors, or the visitors that did come through, were mostly people in uniform?
- speaker: Respondent
  text: Well, probably some, yeah. After the cemetery closed, and most of the cemetery visitor
