collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: My first question, Gene, is from the moment you were aware of something happening, what happened? What were you doing
    and what happened?
- speaker: Respondent
  text: I was in the Ellis protection office filling out paperwork. I just came back from a fire. I was on a wildland fire
    team out in Utah. And I was filling out the paperwork when I heard over the park radio in the background that some kind
    of explosion - and grabbed my camera and ran out to the fuel dock on the north end of the island, the parking lot area,
    and in fact saw smoke coming out of the trade tower. And this was before the park opened to the public. The first passenger
    boats did not unload yet, so this was just staff on the island, and contractors.
- speaker: Respondent
  text: And we just - I just assumed - and others around me assumed that there was some kind of smoke condition or fire or
    maybe a helicopter, but we didn't really see any debris or I didn't see any debris at the time, just smoke coming out
    of the building. And you know, there are many helicopter tours in the area, so we thought maybe - I thought maybe that
    was a possibility.
- speaker: Respondent
  text: And a few minutes later we heard a very loud, low roar of a plane and I looked over to the right and I saw across
    towards Governor's Island - just saw this plane coming in very low. And I just focused the camera on it. Just before impact
    I got that picture, I showed you, just before impact. And at that point one of my colleagues screamed out that we're being
    attacked, and it was pretty unbelievable.
- speaker: Respondent
  text: Added to that, the sound took a couple of seconds to travel. So, we saw this event take place and we saw a big ball
    of fire and the plane was just absorbed into the building. And it appeared that it just went right through because the
    flame just came out the other end. So, I thought it just passed through and continued traveling and possibly landed somewhere
    down by city hall area. But then a couple seconds later you just heard this tremendous explosion and we just stood there
    in disbelief for a few minutes.
- speaker: Respondent
  text: And they called for evacuation of the building, closing procedures. So, we all kind of gathered at the flagpole area
    and the park police with assistance of some of the staff began doing closing procedures. And at the time I still stuck
    around by the fuel dock to take some additional photographs. But then I thought of the statue, and if this was indeed
    some kind of terrorist event, I wanted to see what, if anything, happened to the statue. So, I ran to the east end of
    the island, and fortunately she was still standing there. And we all gathered by the flagpole area while they were trying
    to determine what to do next.
- speaker: Respondent
  text: And as it unfolded - that it indeed was a terrorist event - they got word of a plane going down in the Pentagon and
    airports were shut down nationwide. All air space was restricted. Being that I was one of the EMTs that day - that was
    not my primary function, I'm an interpreter here - but myself and the other EMT decided to begin to gather medical supplies
    as it was apparent that there would be many people in need of treatment. And Ellis Island was identified as a triage area
    to the New Jersey command center in Jersey City. So, we started to gather medical supplies from the EMS room and brought
    them out to the front near the dock area where we thought they would be unloading patients.
- speaker: Respondent
  text: And I went over with one of the EMT - with one of the first responders and the EMT - we went to get additional medical
    supplies from Liberty Island, which was pretty unsettling. You know, we're all nervous about something happening at the
    statue. So, we got to the island, ran in, got some supplies, and as we were - as I was loading up a stretcher with supplies,
    the EMS room was right next to the communications center, and the person at the - in the communications center just started
    screaming, holy shit. And that's when the first tower collapsed. So, we ran in and watched it on video. And then just
    past the monitor we were just looking out the window and just saw it happening.
- speaker: Respondent
  text: Then we got some of the supplies, headed back over to Ellis Island, and continued to set up a triage area. And you
    know, I'm still trying to work out the time frame. It just happened all so quickly and at the same time everything was
    just in slow motion. And the first boat with patients arrived and they had some firefighters with some crushing injuries
    and smoke inhalation. And then there were people who were covered in soot and debris with some minor lacerations. And
    several boatloads came mostly with walking wounded, people who just needed to get out of the area. And it became apparent
    that there weren't too many patients, or they weren't bringing them to us.
- speaker: Respondent
  text: So, at one point the Jersey City Medical Center came with a mobile command center. So, they set up a - they took over
    incident command from that point on. And dozens of EMTs started to arrive and paramedics and even emergency room physicians
    were called onto the scene, onto the Ellis Island.
- speaker: Respondent
  text: And I heard one of the law enforcement rangers say he is going in to the city on Liberty III, which is one of our
    workboats, and I requested to go along because if you're going there you might need - somebody might need medical attention.
    So, I grabbed some gear and got permission from the lieutenant to head over there. And we started to make our way over
    towards Lower Manhattan and we decided to go - the boat captain decided to dock near the World Trade Center area - I think
    it was referred to as the North Cove Marina - because that's where all the emergency boats were with the lights and sirens.
    And as we got near, it was apparent that we were unable to dock because there was just no room to dock there. All the
    police boats and fireboats were there.
- speaker: Respondent
  text: So, we headed back to our main docking area which was the Marine Inspection Office at the south end of the Battery.
    And as we approached, I looked at the dock and there was one person standing there at the dock. And it was one of my colleagues,
    Charlie Deleo who was a volunteer, but he worked for the park for over 30 years, and they call him the Keeper of the Flame.
    He took care of the statue's torch, changing the lights. And Charlie was there covered in soot and debris, and I had a
    mask on, so I didn't really - wasn't able to communicate with him. But I gave him a bottle of water I had taken along,
    and kind of embraced. And he was just standing there. He told me later that he just wanted to stand there and watch the
    statue. And he just stood there for - I don't know how long he was there.
- speaker: Respondent
  text: But once we got off the boat and we started heading into Battery Park area to see if there was anything, we could
    do to assist people. By that time, I made contact with some people from some ambulance companies and basically, they said
    that there's no - there were no patients. They were just - they've all been - all the patients were taken out already
    and they're just trying to get people out of Lower Manhattan. And we realized that there was really nothing else for us
    to do there, so we made our way back to Ellis Island.
- speaker: Respondent
  text: And once we got back, the EMT - the EMS coordinator notified me that they were no longer planning on bringing any
    patients because there weren't any.
- speaker: Respondent
  text: They were planning on bringing deceased and they were planning - and they basically were setting Ellis Island up to
    be a temporary morgue facility, which I thought was a bad idea because there was no refrigeration on the island. But they
    cleared out one of the maintenance sheds in the back, which held heavy equipment and large trucks and whatnot, and basically
    were going to store bodies and body parts and whatnot. But fortunately, nothing ever arrived. They never came for whatever
    reason. They decided to, I guess, bring them to Liberty State Park directly, or I'm not sure what happened but they never
    came.
- speaker: Respondent
  text: At that point we just basically stood around and it was very frustrating because we had probably well over a hundred
    trained medical personnel on the island and really nothing else - nothing for us to do but wait. But they were bringing
    lots of other people who were walking wounded, who just were in Lower Manhattan. They were bringing them over just to
    get out of Lower Manhattan. And so, the rest of the staff were helping out with taking names, making sure that people
    got some food, a change of clothes - because everybody was covered in this debris and soot.
- speaker: Respondent
  text: And this went on for several hours into - you know - into the evening. And at that time, they basically let the rest
    of the staff go. Well, before the whole triage thing, they basically released the staff to go home. And whoever wanted
    to stay could stay and help. So many people left. And that was it for the day - for that day, you know. I left. I don't
    even know what time it was. It was about 6 o'clock.
- speaker: Respondent
  text: I mean, there was - you know, there were phone calls. I was trying to reach my wife on my cell phone. And I managed
    to get my father up in the Catskills, and he didn't even know what was going on and I told him just to turn the TV on.
    It was hard to get anybody on the cell phone because the antenna - one of the main repeaters was on the trade towers.
    But there was one spot I found on the island that I guess it lined up with a repeater somewhere in New Jersey, so if I
    stood in that area I could talk on the phone.
- speaker: Respondent
  text: So, my wife was very concerned of course - told me to get home immediately, and I told her that I'd get home as soon
    as I could. And she told me, whatever you do don't go into the city, because she knew what kind of person I was. And I
    promised her I wouldn't and kind of got the frying pan over the head when I got home, and I told her that I did go into
    the city. And I promised her that night that I wouldn't go in again. And four days later I got another frying pan over
    the head because I went in to Ground Zero a few days after that to try to help with the rescue. But as far as that first
    day, that was it for September 11 as far as the park.
- speaker: Interviewer
  text: A couple of things just if I can back up for a moment.
- speaker: Interviewer
  text: If I got right what happened is that you were sitting in the Ellis Island protection office doing paperwork -
- speaker: Interviewer
  text: '- because of your fire fighting over in Utah. So, you''d already been away for what, a couple of weeks there?'
- speaker: Respondent
  text: I was away for 16 days in Utah and we were at - I was on a security detail. And I was at the base camp and somebody
    came over to me and they said do you know what happened to the statue? Did you see the paper? So, I, you know, didn't
    know what happened. A few weeks prior, a daredevil landed a torch - landed his parachute on the torch of the statue and
    got tangled up on the statue's torch -
- speaker: Respondent
  text: '- a few weeks earlier. So, it was kind of odd.'
- speaker: Interviewer
  text: So, there'd already been some pranks going on beforehand.
- speaker: Respondent
  text: Yeah. And he had tried that one time earlier. I believe it was in the spring or the summer, he tried the landing and
    wasn't able to.
- speaker: Respondent
  text: And actually, when I was coming back from Utah on the airplane I was in, you know, my fire gear and I had a Leatherman,
    you know, one of those pocket knives, and a lady on the plane complained to the stewardess that somebody had a knife.
    So, she came over - the stewardess came over to me and asked if I had a knife on my belt. And I showed her what it was,
    and she was like, oh, that's just a Leatherman. And it's just kind of ironic that now you can't even bring a toothpick
    or any little pins or anything onto planes. And that was just a few days prior to the 11th.
- speaker: Interviewer
  text: Well then, what had happened there was that you heard the explosion and you were showing me some of the pictures.
- speaker: Interviewer
  text: Will you look at those just for a moment again?
- speaker: Interviewer
  text: Because you had said that you had heard this loud - you were already looking at the - oh, let's say we've got this
    first picture here where you've got the smoke just coming out of the first tower.
- speaker: Interviewer
  text: And you weren't even sure at that point what had really happened, right?
- speaker: Interviewer
  text: Okay. Because it could've been a daredevil gone wrong. Weren't really sure it was a terrorist act or anything like
    that.
- speaker: Interviewer
  text: Okay. And you were focusing the camera. Then you heard this roar of a plane coming over while you were still standing
    there.
- speaker: Respondent
  text: Yeah, uh-huh.
- speaker: Interviewer
  text: And then did that - when you caught on the second picture here with the plane?
- speaker: Respondent
  text: Yeah, yeah. I followed it. I actually followed it with the camera for about two or three seconds. And almost as if
    it was, you know, if it stopped just in time for me to take that photograph. I just snapped. I could've snapped it when
    I saw it earlier, but I wanted to see if it was heading in that direction. And sure enough, I just got the shot off just
    before impact, maybe a second.
- speaker: Interviewer
  text: Just before impact.
- speaker: Interviewer
  text: And then you've got a third one here of the fireball coming out both before and after.
- speaker: Respondent
  text: Yeah. Uh-huh.
- speaker: Interviewer
  text: Okay. And you can see the debris coming out here on the one side and debris actually coming out on the other side.
- speaker: Interviewer
  text: What did you think at that point?
- speaker: Respondent
  text: It was almost like
