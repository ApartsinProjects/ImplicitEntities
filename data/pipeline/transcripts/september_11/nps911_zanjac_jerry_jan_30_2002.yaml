collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Jerry, the first question I'm going to ask you is, from the moment you were aware that something had happened, what
    went on?
- speaker: Respondent
  text: Well, it's interesting, you know, when you say what happened because the initial thing - the initial thing that I
    saw was - actually the first thing is that we heard a boom. Now just a little background what we're doing. I'm in the
    building and utilities division. And we were working at Liberty Island and we were in the process of excavating a sewer
    pipe that we were going to replace. So, our crew was out there at approximately 7:30 on a typically normal day. And, you
    know, we were excavating this pipe and - and we're standing kind of on the promenade between the administration building
    and the restaurant building. Basically, our backs are turned to the World Trade Center. And we hear an uncharacteristic
    deep, not so much loud, but a deep, resonating boom.
- speaker: Respondent
  text: And we have heard, you know, quote-unquote, explosions or similar kinds of sounds in the past because somewhere in
    Jersey or somewhere, you know, industrial or commercial or something is going on then you'll hear something, you know.
    But this was kind of a little different, you know. And we kind of looked at each other and just basically said, gee, that's
    - that's different, you know, and not automatically but slowly we kind of were curious and we started looking around and
    then we looked toward the World Trade Center which is very prominent, you know, on the horizon. You know, the vista from
    Liberty Island looking towards Lower Manhattan is very spectacular, very attractive. Most - it's a good picture-taking
    spot, you know, so we have this beautiful panoramic view of Lower Manhattan. The World Trade Center is very prominent.
- speaker: Interviewer
  text: I've taken pictures from there. Yeah, I know what you mean.
- speaker: Respondent
  text: Yeah. And you can't help but look in that direction. You can't help but kind of always see the World Trade Center,
    you know, dominate the skyline there. But what we see is a plume of black smoke coming basically out of the western side
    of the World Trade Center building, which is tower one, kind of as we're looking at the left most tower. And we know this
    is something, you know, something serious, something extraordinary because, you know, something in that amount of smoke
    was substantial so we see something. And -
- speaker: Respondent
  text: Now we're basically craftsmen, tradesmen, you know, blue-collar types and when we look at that, or when we looked
    at it the immediate reaction was, you know, gee, something exploded, you know, something went off in the World Trade Center.
- speaker: Respondent
  text: And we started speculating and we said, wow, what could that be? You know, a substantial amount of smoke immediately.
    And right away we're thinking that there's some kind of mechanical problem or catastrophe, you know, an explosion, maybe
    something in air conditioning or something. And we couldn't figure it out, you know. So, we were standing there speculating
    this and kind of proceeding and we figured, well, you know, it's an explosion, I mean, things happen in big cities and
    all and -
- speaker: Respondent
  text: It wasn't normal, but it wasn't abnormal. So, we knew something was up. And, you know, we weren't going to run and
    - you know. But we see that the smoke is pluming and everything. Myself, personally, the first thing that I thought to
    do was to go into our dispatch office because we had installed surveillance cameras around the perimeter and different
    parts of the statue and the area. And I knew that there was a camera or several cameras that had zoom lens that were able
    to zoom in on that. So, I said, hey, you know, maybe we can go in and get the dispatcher to focus one of the cameras just
    out of curiosity, you know. And so, I go inside and the person at the dispatch at the time was a policewoman. In fact,
    it was the spouse of one of my colleagues at the time and she was on the telephone. So, when I walked in, I was going
    to ask her, her name was Brunilda Fonseca and I was going to ask Bruni to focus the camera on the World Trade Center and
    then we can kind of get a little better view.
- speaker: Respondent
  text: But she was heavily into this telephone conversation and - she didn't really kind of brush me off, but she kind of
    didn't really hear me, and I didn't want to interrupt her or anything, but I did overhear her talking to somebody and
    the word airplane came out. And then I said, oh, wow, yeah, that could be a possibility - so airplane.
- speaker: Respondent
  text: So, you know, my mind flashes back to different kinds of scenarios and one of the more famous ones was the military
    plane that flew into the Empire State Building back in I think the '50s it was. I can't remember exactly the date, but
    it was one of the few times that an airplane actually flew into one of the skyscrapers here in New York or anywhere in
    the country. And I said, well, you know, planes, yeah this could be one of those one in a thousand or one in a million
    or whatever. Then I, you know, started thinking a little more extravagantly or exotically and I said, well, you know,
    maybe somebody flew the plane in or something like that. But who knew? You know, no hard information.
- speaker: Respondent
  text: And then I kind of did - now she got into some serious tunnel-vision type of thing. You know, she just mentally kind
    of really didn't focus on what I was saying.
- speaker: Respondent
  text: I just said, listen, you know, maybe you could put one of the zoom cameras on it, you know. And I walked out and coincidentally
    where the interpretation rangers have their office, it's a little mezzanine in our administration building there, and
    I overhear a local TV channel. You know, and after a while you get to know people's voices and you kind of know it's one
    of the - there's actually Channel Seven, ABC, Eyewitness News. So, I kind of overhear this announcer's voice and I walk
    up to the mezzanine and one of the park rangers was sitting there and there it is. You know, already there's the news
    helicopter or something in the sky. And, you know, with the wonders of technology you have this bird's-eye view. There
    it is this gaping hole.
- speaker: Respondent
  text: And the announcer's talking about an airplane and such and speculation and this and that. I can't remember exactly,
    but it was kind of the stuff, you know, how the response was, and police are on their way and fire department. And I think
    they were interviewing actually some eyewitnesses and they had the voiceovers of, you know, the conversation, you know,
    the news reporter and an eyewitness explaining that he saw an airplane fly into the building.
- speaker: Respondent
  text: Couldn't make out the plane, you know, but I kind of counted the floors and I noticed that this thing is encompassing
    like about eight or nine floors of the building. And I said, wow, you know, fairly big plane. So, I'm thinking, gee, you
    know, anything from an accident to deliberate to who knows what, you know.
- speaker: Respondent
  text: So, the fellows outside, I mean, basically didn't know. So then - and chronologically, you know, from the time we
    were out there and we heard the explosion to the time I left and walked into the administration building which is only
    like 30 or 40 yards, and that was about 5 minutes. Then spending a minute or two there. And then I might have spent about
    five minutes or so watching television. So, this is already about 10, 15 minutes after the fact. And I go back outside,
    and I walk over and look at a major plume of smoke, you know.
- speaker: Respondent
  text: And then I go over and those boys I heard that there was an airplane that flew into the building. And, you know, typical
    reaction, you know, banter and everything. You know, wow, what kind of airplane and this and that. And so, we're standing
    there kind of speculating and the police officer Bruni, I think, she had come out and somebody had substituted her at
    the dispatch.
- speaker: Respondent
  text: But she went into the restaurant and about that time she had come out with a few coffees. Apparently, she went in
    and bought us around of coffees. Her husband was working with us, Hector, and myself and two other guys from our department.
    You know, so there was about four or five of us out there. So, as she came out with a tray of coffees, and there's a little
    parapet wall and she had put it down there.
- speaker: Respondent
  text: And we're standing there and then all of a sudden from I guess the opposite end of Manhattan which is kind of Staten
    Island, New Jersey, looking kind of south or so, and there's a canopy that's over the dock and all of a sudden, we hear
    this roar. And it's an obvious roar of an airplane, you know, jet engines, very familiar. And anybody who's been near
    an airport or going to an airport, you know how substantially loud or indifferent the roar of a jet engine sounds when
    you're at an airport or when you see planes taking off or landing and very close.
- speaker: Respondent
  text: It's a deafening, you know, very, very ground shaking kind of roar. And just out of nowhere we start hearing this
    roar and it just got louder and louder and louder. And then all of a sudden, we turn around towards the direction of the
    sound, which is looking right opposite Manhattan. And then coming from over the canopy, just appearing out of nowhere
    there's an airplane on a very steep bank, very low. It's one of the things you noticed - or I noticed that it was very
    loud and very low, you know. And usually low for any of the normal flight patterns or such because planes are always flying
    over the sky, you know.
- speaker: Respondent
  text: We have Newark Airport very close to us and, you know, the approaches to La Guardia and the approaches to JFK sometimes
    and, you know, it's normal every day, but planes are never, never, ever that low.
- speaker: Respondent
  text: So, we see this thing screaming on a bank flying right over our heads, right over the canopy. Close enough where you
    feel like you can touch it, you know. I saw the under-bottom of it and all and it's just streaking very quickly. It just
    flies right over our heads, you know. And we see this thing and we look, and we turn around and all of us kind of follow
    this plane and, like I said we have this panoramic view of Lower Manhattan, and this plane flies over and it's on a bank.
    And it's flying away from us, so the illusion is that it's just going slow-motion.
- speaker: Respondent
  text: Because you really can't tell speed when something's coming directly at you or directly away from you. So, it's kind
    of flying directly away and it's very slow and just angling and, you know, the Doppler effect and everything just -
- speaker: Respondent
  text: So, we're watching it and I don't know how far we are from the Statue of Liberty to the tip of Manhattan, but it's
    a couple of miles. So, it takes several seconds, or I don't know - so like slow-motion this plane is just flying away
    and it's just going towards Manhattan. And you just can't - can't tell exactly if it's going straight at something.
- speaker: Respondent
  text: So, my initial reaction that this was a military plane that was doing a flyby. You know, it's the only thing that
    I can logically think at the time, you know. I couldn't really make out whether it was commercial plane. And it was just
    too fast and everything's happening so quickly, you know.
- speaker: Respondent
  text: And so, I see this plane and it's going. The next thing you know it's flying on an angle. First it was bright silver
    and all. Now it's a dull gray and everything, just flying. And you could see that it's flying kind of in the vicinity
    of the World Trade Center so I'm saying, well, you know, if it's going to fly by it's going to fly by.
- speaker: Respondent
  text: And the next thing you know, as it's coming closer, I mean, we hear some reaction so I don't know if it's myself or
    my colleagues or somebody saying, you know, what's that plane doing and is that another one? I said, I think it's a flyby
    and I said, well, damn what if that's another one? And the next thing you know, as it's going closer and closer, we're
    starting to realize that, hey, this might be another plane. And then a fraction of a second or so before it impacts, we
    see this plane really way too close and then all of a sudden, pow. It just goes, and it impacts, and because of the distance,
    because of that delay in sound traveling, you don't hear a thing. We just see the airplane disappear.
- speaker: Respondent
  text: And my reaction was that it was like something like a dart or something being thrown at a porous object and the building
    basically absorbed this airplane. The airplane just disappears. And it was on an angle and it leaves this diagonal imprint,
    you know, of the size of the plane. And we really didn't see any of the debris flying. And from the impact, the back end
    of the building, or from the impact which would be the north side and the east side, later on we saw that that's the area
    where things had blown out.
- speaker: Respondent
  text: But it was this very surreal, bizarre image of this airplane just disappearing into this building, into the World
    Trade Center, not just this building.
- speaker: Respondent
  text: And then the split second that occurred is the realization that - that, you know, this was another airplane, you know.
    And like anything, something that happens out of the ordinary, it's the sense of disbelief. The disbelief that, you know,
    am I actually seeing this? I mean, you are, but it's like can this be? It's, can this be? Can this be happening? You know,
    this was extraordinarily malevolent, something bad. But you don't get - you know, until later you start really start thinking
    about it, you know. But this is bad.
- speaker: Respondent
  text: It wasn't gut wrenching yet, because you don't want to panic, you know.
