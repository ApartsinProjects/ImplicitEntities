collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: To start, if you would just explain what your position is here. Give me a general idea of what your responsibilities
    are, and how the Park Police up here is organized.
- speaker: Respondent
  text: Okay, I'm in charge of the New York Field Office - I'm the commander of the New York Field Office. And the New York
    Field Office of the Park Police provides law enforcement services at Gateway National Recreation Area units, Jamaica Bay,
    and Staten Island. They also provide law enforcement at the Statue of Liberty and Ellis Island. We work with the superintendents
    of those units, but we have our own line of authority back to Washington, D.C. I report directly to the deputy chief of
    the field offices division for the Park Police. At the Statue of Liberty, we have been providing law enforcement services
    there since about 1995, I believe, was when we transitioned from law enforcement rangers. There are still three law enforcement
    rangers that work at the Statue of Liberty that have been integrated into our operations there.
- speaker: Interviewer
  text: How and when did you first become aware of the attacks on the World Trade Center?
- speaker: Respondent
  text: On that Tuesday morning - I live in Fort Wadsworth on Staten Island, and we were scheduled for a housing inspection,
    so I was still home. I was dressed and ready to go to work but I was waiting for the housing inspections which we were
    scheduled to begin at nine o'clock that morning. And my wife and I were watching the morning news shows when about quarter
    of nine they broke in with reports that a plane had struck one of the World Trade Center buildings and showed a clip of
    it with smoke pouring out of the building. And at first, they didn't know the nature of what had happened, just that a
    plane had struck the building. I grabbed a pair of binoculars and my wife and I went up to the overlook, which is right
    at the end of the street where we live and has a view of downtown Manhattan.
- speaker: Respondent
  text: And this particular day it was a clear bright sunny day because we had rain showers the night before so it was just
    crystal clear, a beautiful blue sky, and we could see the smoke and fire pouring out of the one building. And I had my
    police radio with me, I also had a New York City police radio, so I was monitoring some of their radio traffic, but there
    really wasn't anything significant being said other than routine words and messages. While we were standing there watching,
    Captain Lauro, who is my district commander whose office is on Staten Island, and Lieutenant Buckley, who's the station
    commander for the Staten Island office and also the SWAT team commander, came up to the overlook when they had heard the
    news. And they were standing there, and we were watching, looking out over the city.
- speaker: Respondent
  text: And at some point, I looked over to the left and I could see a United Airlines plane, appeared to be fairly low but
    it really didn't strike me at the time because that's where Newark Airport is located. And I just assumed it was a flight
    coming out of Newark, taking off, and making a turn to head up north and either go up the East River or up the Hudson
    and head north, so it really didn't strike me as being out of the ordinary. But as the plane continued, we noticed it
    wasn't climbing very quickly and again that didn't strike me particularly at the time. But then we could see that it made
    a turn and headed straight into the other tower and then we watched it strike the tower and once we saw it strike the
    tower, then absolutely we knew something really was going on that was not an accident and immediately started taking different
    measures. Captain Lauro was contacting the Statue of Liberty and we were making arrangements to call people in back to
    work and it was a delay of a couple minutes when we finally heard the explosion, because of the distance, and actually
    heard the explosion of the plane hitting the building.
- speaker: Respondent
  text: So, at that point we immediately went to work doing what needed to be done. I went back to my house briefly for a
    minute and the Park Service crew was there and wanted to start the housing inspection. I said "Absolutely not. We've got
    something going on here and we just can't do it today." So, Captain Lauro and Lieutenant Buckley eventually headed out
    to Ellis Island. And I went back to the office first, took some measures there, started working with the Coast Guard in
    setting up security because their offices were located at Fort Wadsworth, that's the headquarters for the Coast Guard
    in New York harbor.
- speaker: Interviewer
  text: You mean security for Fort Wadsworth?
- speaker: Respondent
  text: Shutting down Fort Wadsworth. We immediately closed the back gate, that's our first security measure so that you only
    have access, coming in and out of one gate, and put officers on the gate. Normally during the day there's no one on the
    gate. We have a guard that's on the gate overnight but during the day the gate's open. We immediately put a police officer
    on the gate and started instituting security measures. We assigned one of the lieutenants, Lieutenant Waite, to be a liaison
    with the park and with the Coast Guard because Lieutenant Buckley, who normally would do that, would have to go out to
    Ellis Island as commander of the SWAT team. And at the same time, over in Brooklyn -
- speaker: Interviewer
  text: I'm sorry, what park do you mean that he was liaison with?
- speaker: Respondent
  text: With the superintendent at Staten Island unit, which is located at Fort Wadsworth. He would work with them because
    any of the security requests the Coast Guard had would have to be coordinated with the superintendent. We can't just arbitrarily
    start doing things without working with the superintendent, so his job was to work with the superintendent and the Coast
    Guard security liaison to institute whatever security measures were going to be taken. At some point I called Washington,
    D.C. to advise them of what we were doing, and we were getting reports over the radio, eventually, that things were happening
    in D.C. and again the timeline there is. I don't have a good recollection of what was happening in what particular order.
    Eventually, I went over to the Coast Guard command post. Actually, one of the first things I did - I went down to the
    gas station and gassed up my car because I didn't have a full tank. I didn't know what was going to be happening and I
    wanted to have a full tank to get around. Then I ended up at the Coast Guard command post and checking in there to see
    what they were doing and to see what was going on. While I was in there, they were conducting a briefing for their personnel,
    their command staff, and that was when the first Tower collapsed. By then it was probably around 10 o'clock in the morning.
- speaker: Respondent
  text: I left there, went back up to the overlook. You could see all the smoke and dust, it completely obliterated lower
    Manhattan. At some point, when the second tower collapsed, I decided that things were on track with my operation at that
    point and I headed into the city to go to the NYPD command post at One Police Plaza.
- speaker: Interviewer
  text: Did you have some sort of existing plan that would lead you to do that? How did you decide to do that?
- speaker: Respondent
  text: Well, normally, on a major event we have command posts established and will routinely send people to them. Because
    of the magnitude of what was going on here, everyone was pretty much busy doing stuff and I felt that I could still carry
    out my responsibilities yet start the liaison with the city police by going to their command post. The other command post
    would have been the Office of Emergency Management command post which was in Number 7 World Trade Center and that was
    right next to where the buildings were. So that was not a possibility. I ended up driving into the city. As I left Fort
    Wadsworth and I went to get on the Verrazano Bridge and they had all the traffic stopped on the Verrazano Bridge and the
    only traffic going across the bridge were fire trucks, off-duty firemen, and off-duty cops coming into work. So, I got
    across the bridge and was heading towards the city -
- speaker: Interviewer
  text: Were you in your police vehicle?
- speaker: Respondent
  text: I was in my police car. There's a section of elevated roadway called the Prospect Expressway. It goes through Brooklyn
    and it's just south of Manhattan. And as I was driving down the - I was seeing ash just fall out of the sky almost like
    gray snowflakes, just hitting the windshield and dispersing and it just struck me as very surreal. As I got down the -
    there are two ways that you can go at that point. You can either take the Brooklyn Battery Tunnel which takes you right
    into lower Manhattan or you can go up to the Brooklyn Bridge which takes you and dumps you out pretty much right at One
    Police Plaza. Most of the traffic was going into Brooklyn Battery Tunnel, but because that went right into where the Towers
    had collapsed, I felt there was no point in me going that way because I would have just gotten in the way. So, I went
    up, took the Brooklyn Bridge in, and pulled into One Police Plaza and went into the building.
- speaker: Respondent
  text: At that point they had the elevators shut off - I guess they had some power outages - and somebody else who I met
    up with in the building, we walked up the eight flights to the command post and settled in. When I walked into the room,
    it really was pretty chaotic with what was going on, with obviously a tremendous loss of life, both civilian and members
    of the Police Department and Fire Department. No one really had any numbers at that point. It was obvious to everyone
    that many people had died.
- speaker: Interviewer
  text: You, in effect, represented the Park Service there. Were there other federal agencies -
- speaker: Respondent
  text: Not initially. Primarily it was state and local agencies, mainly NYPD because it's such a large organization, each
    borough, each specialized unit has its own representative there. EMS from the Fire Department was represented and there
    were some other people that eventually showed up there from New Jersey Office of Emergency Management eventually showed
    up there. But it was primarily police - transit police, housing, just the different people from NYPD.
- speaker: Interviewer
  text: Did you have a command post, maybe you didn't call it that, for your own field office?
- speaker: Respondent
  text: No, because we continued operating under our normal structure, where we have a dispatcher, Captain Zweig was in Brooklyn
    and he was operating there. He was in charge, so he was really taking the requests and calls that came into Brooklyn.
    At some point I guess we got a request from Federal Hall to send people down to Federal Hall and he took care of that
    request. I was trying to make calls to D.C. and eventually at some point I called Philadelphia. I spoke to Dale Ditmanson
    who is the assistant regional director for operations, to let him know what we were doing. People were asking if they
    needed any assistance from the Park Service and at that point, the resources of the city were such that they could provide
    whatever they needed. They were getting donations from commercial construction companies to get the equipment, but they
    were setting up different staging areas and one staging area was Floyd Bennett Field, which is in Gateway National Recreation
    Area. So, we were working with them. NYPD Special Operations is located there so they wanted additional security there
    so they placed some of their officers at the front gate and we placed some of our officers there since it was Park Service
    jurisdiction just to make sure we could help control the access in.
- speaker: Interviewer
  text: How useful or valuable do you think it was that you were physically present in that operations center, your liaison
    role? What effect did that have on communications?
- speaker: Respondent
  text: Well, I think it was important to have someone there because it was really the only direct point of communications
    with the city. The normal channels that we would use to communicate with the city by phone to their dispatch or to their
    borough commands really were not effective because they were overloaded. So, it was important to have someone there. It
    didn't necessarily have to be me - but at that point I felt that my two captains could handle their roles and that I could
    function just as well there as anywhere else and fill that liaison role. I felt that at that point, it was significant
    or important to have someone with decision making authority right there to make decisions right on the spot if any need
    to be made. And as it was there weren't many to be made. Still it was important to have that liaison with them. And it
    still was very difficult to hope to operate there because there was just so much chaos, just so much going on, they were
    completely overwhelmed by what had happened. And then eventually, later in the day, they started losing phone service.
    The main phone switch for Lower Manhattan was right next to the tower and got damaged when the tower collapsed and apparently,
    they started getting flooding in the basement and starting losing phone service. When one of the towers collapsed, we
    lost all phone service at Ft. Wadsworth because the AT&T switch was located in the basement of one of the Towers. So,
    we lost all our phone service at Ft. Wadsworth and the Coast Guard lost their phone service, so it really hampered the
    operations in that respect, but using our cell phones and land lines as much as possible. But there were a lot of technical
    problems.
