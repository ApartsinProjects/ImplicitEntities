collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Respondent
  text: I heard that there were a lot of people running outside, that there was some sort of incident at one of the towers
    at the World Trade Center. But you know, just being optimistic and I think being a native New Yorker I just said, well,
    whatever it is they'll put it out, it'll be fine, and it won't be anything to worry about. So, I just went to someone's
    office to ask a question about a contract or something and didn't even bother going out for a while.
- speaker: Respondent
  text: But then there was a steady stream of people going outside to see what was going on and I said, well, maybe I'll go
    take a look. And I went outside still carrying some documents related to contracts, and I went outside and just saw flames
    coming out of one of the towers. The first tower had been hit. And I kept looking at it and there were a lot of people
    outside there. We were out at the fuel dock on Ellis Island. And even looking at that I just thought, well, they'll put
    it out. I know in the past - way back I remember hearing that the and seeing pictures of a plane hitting the Empire State
    Building. I thought, well, they'll put it out. Everything will be fine. But of course, the flames - we were just drawn
    by it and just stayed there watching and watching.
- speaker: Respondent
  text: And I don't think many - I've even seen this in the news a lot, but a small plane came by while we were watching that.
    A small plane came very close to the tower and kind of just was observing what came by. Never saw this in any of the newspapers
    or on TV, but a small plane came by, kind of looked at it, and then went away. As it was approaching, someone said, watch,
    it's going to go right into the building. And that never happened. It went away.
- speaker: Respondent
  text: But again, we were watching after that for about 8 minutes, 10 minutes, and the second plane flew over Ellis Island.
    And it was so low and made so much noise - and this I'll never forget, the feeling of that plane coming over us and just
    being so low, so fast and making so much noise and flying towards the second tower. But again, you know, just being optimistic
    it was going towards that tower, but my mind would not believe that it was going to go hit the tower. And even as it approached
    that tower, I didn't believe that it was going to go into the tower, hit it. I thought it was just going to observe like
    the smaller plane that I'd seen a little bit earlier. But even when it went into the tower - and it just went in like
    cutting through water. It was just absorbed by that - by the building. It just cut right into it.
- speaker: Respondent
  text: Before any flames, it just went right in, which was amazing. And the thing that amazed me so much was that my mind
    wouldn't even accept that. It was sort of like a defense mechanism not to accept that as reality, which was unbelievable.
- speaker: Respondent
  text: The plane went in and I thought I was watching a film. I just couldn't believe it as reality. It went in, the explosion,
    the flames. Again, it was all a film that I was watching. It wasn't really reality. And for me, it just wasn't something
    that I accepted immediately that it actually happened. It actually had a delayed reaction that this all happened.
- speaker: Respondent
  text: And here on Ellis Island, after watching it and the day progressing, after that we all had moved to the flagpole area
    on Ellis Island thinking that would be an area where we could all - the whole park staff would be out of the buildings
    in case anything happened on Ellis Island. We were out by the flagpole area just comforting each other. I know I was comforting
    some of the staff, talking to them, just trying to keep calm and still in absolute, utter unbelief of what was going on.
- speaker: Respondent
  text: There's actually - one of the things that actually struck me at this moment, being out there at the flagpole just
    watching the flames and then go on and all the smoke, was that every single seagull that's on the island that are usually
    flying all around the buildings, flying around the patio area looking for food, every single bird was on the ground. Just
    their reaction to it was so - they knew something wrong, terribly wrong was going on. Every gull was just huddled down
    into itself, its head pulled back into its body, not moving, not being stirred up and flying. They were all just totally
    still - is one of the things that stuck.
- speaker: Interviewer
  text: Tucked into their wings.
- speaker: Respondent
  text: Yeah. Just seeing their reaction. And again, I think what was happening, this was all becoming real by seeing all
    these things that we had never seen or wasn't expecting. I mean, just going back to the original what I was going to do
    that day. I'm the horticulturist here and just dealing with some of the plant issues, some of the lawns, just I remember
    that morning before this all happened that that was my focus. And then just being turned totally around where that became
    so insignificant was another striking impression. That was just totally, totally insignificant because of what was going
    on.
- speaker: Respondent
  text: Okay. And I think one of the things as we're adjusting of what happened that day was that everything that was important
    to me, you know, again the plants on the islands and managing the grounds, all just collapsed. It was no longer important.
    I think a lot of people felt this, that what they actually do here was no longer important.
- speaker: Respondent
  text: Everything now was important as far as being safe and security. So that was a devastating, devastating feeling that
    everything that I represent, everything that I can provide here is no longer important.
- speaker: Respondent
  text: Like I said, it took a few days really for it to sink in of what happened, you know. I had personally had a delayed
    reaction to it. And I think a lot of that and actually a good thing I stayed - I remember they asked if people wanted
    to stay on Ellis Island and help set up a triage center. And I said yes, I'll stay. And I remember being here until about
    six that night and never even knowing how I would ever even get home.
- speaker: Respondent
  text: But it was really, I think, good because I was not even thinking about what I was thinking or feeling because I was
    so wrapped up in trying to help set up the triage center. And then as people came over - they just swooped up people from
    Battery Park and were bringing them here and bringing people that were injured and all full of dust and just helping.
    I was giving out water practically all afternoon and just comforting people that were coming over. And what was good is
    my focus was on other people and other things other than myself, and I think this was part of the delayed reaction that
    I had. I was just focused on other people, other things -
- speaker: Respondent
  text: '- and not what I was thinking and feeling.'
- speaker: Interviewer
  text: Could you go into a little more detail on a couple of things, if I can just backtrack for a moment?
- speaker: Interviewer
  text: One of the things you had mentioned was that as of - at the crash, one of the first things you did, thanks to the
    fact that you had this delayed reaction to the complete shock I guess of what was going on, you sort of directed yourself
    outward and looked after other people. Right?
- speaker: Interviewer
  text: One of the things you were doing right around the flagpole was comforting people. Could you tell me a little more
    about what was involved in comforting people? What did you say? What did you do?
- speaker: Respondent
  text: A lot of the - I shouldn't say a lot, maybe it was only about two or three people that were just, you know, crying
    uncontrollably, concerned about their children that may have been nearby or even not nearby. People were just reacting
    of a concern about their children, and just saying that it'll be okay. It'll be okay. It'll be fine.
- speaker: Respondent
  text: I remember just taking one of the interpreters, you know, in my arm and holding her, and just holding her as she was
    crying uncontrollably, and just crying. And the words that came to me were that it's okay. The captain is on the ship.
    And the words just came and that's what I was feeling, that in spite of all this everything is okay. I'm not sure that
    was precisely what I was feeling or going to feel later when it hit me with what was going on, but that was what I was
    saying.
- speaker: Interviewer
  text: The captain is on the ship?
- speaker: Respondent
  text: I mean that God is in control and the day - and things are progressing under the control of a greater entity.
- speaker: Interviewer
  text: Sure. Another question that comes up as I'm looking at this, you said that you went from the flagpole to setting up
    a triage center. Am I right on that?
- speaker: Interviewer
  text: What happened - and you said at the triage center the main things you did was getting water to people and further
    comforting them, I gather.
- speaker: Respondent
  text: Right, but before people actually came, we were hauling out - we were coming into the building pulling out, you know,
    stretchers and materials and bandages and things like that and setting them up on the front lawn. Again, we were thinking
    lots of people were going to be coming and that this was going to be going on all night. I remember saying, I need to
    go down in the basement and shut the irrigation system off in case - you know - so the irrigation system doesn't come
    on tonight.
- speaker: Respondent
  text: So, I ran in the building and - and again, you know, just being terrified that, well, you know, while I'm in there
    thinking that, you know, a plane could attack and hit the building. And every time we heard any kind of loud noise everybody
    just, you know, looked up and was afraid that something was going to happen because we were getting all kinds of reports
    that other places were being hit. We heard things like in Philadelphia a building was hit. And it was all kind of jumbled
    in formation. Of course, only the one that was accurate that in Washington the Pentagon, but we were getting reports that
    a lot of things were going on.
- speaker: Interviewer
  text: For example, just what were some of the rumors?
- speaker: Respondent
  text: I remember them saying Philadelphia.
- speaker: Respondent
  text: And I guess that got - was just jumbled in formation about the plane that was in Pennsylvania. They said the White
    House, that there was an incident at the White House. The Pentagon. I think that was it.
- speaker: Interviewer
  text: And so you were getting - so while you working all the - you were sort of working under the apprehension that all
    these - of all these rumors that every other place was getting hit that looked important, yours would be hit too?
- speaker: Respondent
  text: We were - you know, certainly we thought the statue would be hit and we thought Ellis Island would be hit too. So,
    there was this sense of fear and a kind of - any kind of threat we were kind of scared. And this was really shown in the
    fact that at one point while we were all at the flagpole area watching the towers and then at one point the first tower
    coming down, which was interesting, which is not anything like it was on TV. But some - a few people - were in a small
    boat and they were coming toward Ellis Island, and there was a small motorboat. And I don't know who they were, but they
    were coming towards Ellis Island real fast.
- speaker: Respondent
  text: And everybody saw that, and we thought - I don't think anybody even said it, but we all thought the same thing - they
    were coming with bombs and they were going to attack us. And we all just started running. Everybody just started running
    away from the corner of the flagpole towards the western end of the island, until somehow the Coast Guard intercepted
    them and stopped them or whatever. But that's just how jittery we were. We were just on edge and -
- speaker: Interviewer
  text: I hadn't heard a thing about this.
- speaker: Respondent
  text: Oh, no? Yeah, everybody just ran. Everybody just ran.
- speaker: Respondent
  text: But about the tower collapsing, the first tower, which was kind of strange, but on TV you saw everything just come
    down to the ground. From what we observed things were shooting up into the air, which is again something that I'll never
    forget. And that when I see it on TV or in video, everything came down to the ground, but things were shooting up into
    the air as the building collapsed, which is again one of the things just, you know, engraved in my mind.
- speaker: Interviewer
  text: Well, what went on then as you shut down the irrigation system and you - because out of concern that, well, that would
    turn on and wouldn't help matters any.
- speaker: Respondent
  text: Well, I thought it would go on at night and there would be, you know, people out on stretchers and all that. And you
    know, I didn't want to be sprinkling everybody.
- speaker: Respondent
  text: So, I remember running in, telling one of the park police that I was going to go into the building and shut down the
    irrigation system. And he said, yeah, shut it down. We don't need any of that happening. So, I ran in and remember running
    down into the basement, no one around, and of course this is all strange because no one is around in the building, and
    then coming right out.
- speaker: Respondent
  text: But at another point too, after we set up the triage center and again waiting for people, there was a report that
    we were going to make a morgue on the island. And the area that was identified was the metal garage all the way at the
    fuel dock on Ellis Island. And I remember being involved too in helping clear that out of material, emptying it out. I
    remember some of the people came from, I don't know where, but the rescue people or whatever needing tarps because again
    they were thinking, well, about 200 bodies are going to come in two hours and we were cleaning this th
