collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: The first question I'd like to ask, and is a very general open-ended one, from the moment you became aware of what
    had happened, what happened? What were the events that unfolded immediately after you became aware of what was going on?
    Where were you? What were you doing? What happened?
- speaker: Respondent
  text: Well, on the morning of September 11th, I was on duty here at the park. Early that morning - I can't give you a specific
    time, but probably around 8:30 or 9:00 o'clock, somewhere in that vicinity - I was sitting at my desk working on the computer
    when I got a phone call - I actually got a page from my wife. It gave me a little bit of a cause for concern because she
    was on a detail. She had left the day before to go on a detail for a month in the regional office in Lakewood - not in
    the regional office. And so, it was unusual, knowing that she would be paging me that early in the morning with the time
    difference. It was just - very out of the ordinary for her.
- speaker: Respondent
  text: So, I called her back, and she informed me that there had just been a plane crash at the World Trade Center; she was
    watching the news, and I immediately turned the radio on, and of course that was all that was on every channel, and at
    that point they were simply talking about it on the news, and it was just - the plane had crashed into the World Trade
    Center. And I was listening to that, and while I was doing that one of the radio frequencies that we scan while we're
    on duty - is the Park Police Communications Center in DC, and as I was listening to the radio - the news broadcast, as
    well as doing work on the computer - and listening to the various radio frequencies that we listen to, I heard a park
    police officer call the Communications Center and report a low-flying plane that had just appeared to be out of the ordinary,
    flying very low over the Arlington Cemetery in the area of the Pentagon.
- speaker: Respondent
  text: And as I continued to listen, the next thing I heard was that there appeared to have been some sort of explosion or
    crash with a lot of smoke coming from the Pentagon. This, again, coming from an officer who was witnessing this, and I
    heard the supervisor - park police supervisor - come on the radio, and inform all the officers not to leave the jurisdiction,
    to remain within their jurisdiction. About that time one of my coworkers, who's also a Law Enforcement Ranger, who lives
    in this house right across from the Ranger Station, came over - he was off duty; actually, I believe he was on his off
    day - came over and asked me if I was aware of what was going on.
- speaker: Respondent
  text: And I said, well, I'm aware that there has been a plane that crashed into the World Trade Center, and I just heard
    something about potentially a plane crash into the Pentagon. And he said, "yes, I'm watching it on TV. Why don't you come
    over?" So, I did. And we were watching the video tapes of what was going on, trying to comprehend what was going on, and
    then as we were watching that, they broke in and said that there had been another plane crash at the Pentagon.
- speaker: Respondent
  text: Again, I can't give you the timeframe, but very quickly - within probably 15 to 30 minutes or so, my Chief Ranger
    contacted me and informed me that they were sending Rangers downtown to DC in response to the Pentagon attack for security
    purposes, and that I was to go - prepare to go downtown - so I began doing that. Subsequently, I, along with the Ranger
    who was off duty, we both responded together to the headquarters, George Washington Memorial Parkway, Turkey Run, which
    had been designated a staging area for what was being called two squads of Law Enforcement Rangers from outlying parks.
    There we met with a number of Rangers. One group, or one squad, had already been deployed. We were told they were assisting
    with evacuating kids from the day care center at the Pentagon, and transporting them to a safe area, and remaining with
    them until the parents could pick them up.
- speaker: Respondent
  text: Our group was deployed to the National Mall, and I was designated as the squad leader for this group of Rangers. We
    met downtown with the park police captain, who was overseeing the operations down there on the Mall; met with him at the
    mobile command post, right by the Smithsonian, and we were given our assignments, which was basically to patrol the National
    Mall Corridor, and as well as we deployed, I believe, two Rangers from our squad to the Jefferson Memorial to work with
    park police officers over there. I pretty much, because of some radio communications problems that we were having, spent
    the majority of my time at the command post with the park police, and basically served as the liaison between the park
    police and my squad, and intermittently, went out and checked on folks that I was working with, and informed them of what
    was going on, and then we kind of rotated folks from different posts around the Mall. And that is pretty much it. We were
    down there from - until probably 10:00 o'clock that night, when we were demobed [demobilized], and we were prepared to
    stay longer, or to come back the following day, and that request for our assistance was not made the following day, so
    that was the extent of my involvement, and the squad's involvement in working downtown. My understanding was that the
    first squad that had been working with the day care folks ended up being demobed sometime late that afternoon; certainly,
    a number of hours before we were demobed. And that was pretty much it.
- speaker: Respondent
  text: It was rather uneventful, to be quite honest with you in terms of any enforcement contacts, or any enforcement actions
    that I, or anyone on our squad could.
- speaker: Respondent
  text: In terms of personal observations, I can tell you that it was a very - for lack of better definition - very surreal
    atmosphere or environment to be downtown on the National Mall on what was a very nice day; very nice weather - warm. We
    would have expected DC and the Mall to be absolutely crowded with tourists and visitors, and to be down on the Mall, and
    see virtually no civilians, or very few - only a handful, and virtually no civilian vehicles, and it was almost unnervingly
    quiet. The only movement that you saw and folks that you saw were law enforcement officers, emergency service workers,
    and occasionally you would see a fire engine, or an EMS vehicle go by, but basically, the entire downtown area, and certainly
    the Mall area had been - all you saw were law enforcement vehicles and law enforcement officers; absolutely quiet. We
    contacted a few visitors that were just kind of wandering around, and a few local residents - you know, employees from
    downtown that were wandering around, but probably not even a couple of dozen over the course of the time that we were
    down there. A very odd sensation, again, to be in that environment, not knowing what to expect, you know, and we asked
    - the folks that were under my supervision were asking me - what can we expect, and there was no answer. We didn't know.
- speaker: Respondent
  text: And we were told that we were operating under a state of emergency, that all air space had been - control of air space
    over DC had been - assumed by the military. And we didn't know what to expect, and I think many of us were sitting there
    wondering what to do if we saw a 757 headed towards the White House or the Capitol Building. We felt very defenseless,
    so it was somewhat - again, of a very odd situation to be down there in that environment, and seeing military aircraft
    flying overhead, and I don't know what else I can add to that, other than it was - I think, one of the most emotional
    moments for me was later that evening after I was demobed, and was driving home, and I live in North Arlington, and I
    drove - my path of travel took me near the Pentagon, and still seeing the flames and quite a bit of smoke, and all the
    light from the emergency workers there was a very sobering experience, to say the least.
- speaker: Respondent
  text: And that was, I think, the fact that I was actually seeing that in real time, and in real life, as opposed to hearing
    about it on the television or the radio, really put it in perspective for me, and I got home that evening, and of course,
    my wife, as I mentioned was out of town, and I got home and I really didn't know what to do with myself, because there
    had been this adrenalin - you know, that we'd been working all day, and then you're sent home, and you go home, and you're
    watching this - the first - the natural course of action is to turn the television on, and see what's going on, and it
    was just - you felt very helpless, particularly, because I live probably as the crow flies less than a mile and a half
    from the Pentagon.
- speaker: Respondent
  text: And knowing that that activity was taking place so close, and you're just sitting there, and you want to do something,
    and it made me feel somewhat helpless.
- speaker: Respondent
  text: So, that - and that pretty much sums up what I did, and what my involvement was.
- speaker: Interviewer
  text: Can we back up a little bit?
- speaker: Interviewer
  text: You were mentioning that you had been deployed - you and your squad had been deployed downtown to DC, and on to the
    Capitol Mall. And you said that your primary position there was to be a liaison between the squads that were in the field,
    and the central park police command, which you have mentioned was located at -
- speaker: Respondent
  text: Well, they had a mobile command post set up down on the National Mall, and I can't tell you exactly where it was,
    but - because I'm not that familiar with the streets down there, but the mobile command post was set up right on the Mall,
    and because - we were having a bit of a communication problem, because even the Rangers - all the Rangers that were assigned
    down there, they were all from different parks, and we didn't have the capability of - at least I didn't have the capability
    - of communicating with the other members of my squad by radio. So, I made the decision - and this was agreed upon with
    Captain Walters, who was overseeing the operations, right there on site, that I would remain at or near the command post,
    so that as they needed to relay an assignment to us, or should information come across that we needed to be aware of,
    that I would then get that information to my squad. So, I tried to stay as close as I could to the command post, and any
    close communications with him - with the park police.
- speaker: Interviewer
  text: I'm curious. You said you didn't have radio contact. How did you get the information out to the squad?
- speaker: Respondent
  text: Basically, I just went out and contacted them personally.
- speaker: Interviewer
  text: Just walked out there - or drove or walked out there and got to them?
- speaker: Respondent
  text: Exactly. Yes. But it was a small - I mean, we were patrolling a small enough area that that really wasn't a problem,
    with the exception of - over at the Jefferson Memorial a guy had to make a short drive, but you know, to be very truthful,
    our assignments didn't change within the entire timeframe that we were down there, so there was really not much of a need,
    openly to communicate to each other, other than I did go out and contact folks on somewhat of a regular basis, just to
    make sure that everybody was doing okay, and see if anybody needed anything in terms of food, water, breaks, or whatever.
    So. But for the most part, we were - I think we had four vehicles down there, and I want to say there were eight Rangers,
    so everybody pretty much had access to a vehicle, and we were all fairly mobile, with the exception of the guys that were
    over at the Jefferson; everybody else were doing mobile patrols around the National Mall area. So, if I went out and stood
    in one spot for more than 10 minutes, eventually, I would have contacted all the folks in the squad that were on the Mall,
    because they would eventually drive past me.
- speaker: Interviewer
  text: Mmhmm. All right. Well, you were mentioning also that you were providing communication; what kinds of questions did
    you get from the people from the squad, and what kinds of information were you relaying to them, if we can get into that
    detail?
- speaker: Respondent
  text: Well, I was briefed by Captain Walters, who's the Commander for the Central District of the park police. We have a
    very good - and I'll say a close working relationship, because coincidentally, he and I used - prior to his being reassigned
    to DC here in the last year - he and I had worked for about three years together out in Seattle - at that time he was
    the law enforcement specialist for the Seattle office, and I was the Chief Ranger at Lake Roosevelt National Recreation
    Area, so we worked very closely together for about three years. During that time, we established a very close social -
    I want to say a working and personal relationship. So, Dan and I know each other quite well, so we were very comfortable
    working together.
- speaker: Respondent
  text: When we first got there with the squad, he was in the process of briefing - having a roll call with all the park police
    officers that were under his command, because they were in the middle of their briefing and the roll call, we waited until
    they finished, and then Captain Walters met with me, and basically, passed on to me that - as I mentioned previously -
    that basically we are operating under a state of emergency; air space has been assumed by the military; don't know a whole
    lot more than that. Our role was to provide some fixed post security, which we did over at the Jefferson, as well as mobile
    or roving security around the Mall area, and that was pretty much it. That's all we could work on at that time, and for
    that reason, met - it was one of the reasons that I remain close to the command post, should anything change - that I
