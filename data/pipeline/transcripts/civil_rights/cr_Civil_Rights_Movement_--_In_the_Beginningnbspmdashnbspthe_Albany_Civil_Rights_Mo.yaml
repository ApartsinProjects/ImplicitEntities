collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: The Albany Civil Rights Movement, much like many other Civil Rights Movements in this country, started not as a spark
    ignited by a planned revolution initiating from a long-standing organization, like NAACP or Urban League, but rather initiated
    by a group of college students including many from Albany State College.
- speaker: Respondent
  text: There were many college students not just from Albany State College, but also including volunteer students from many
    colleges from many parts of the United States.
- speaker: Respondent
  text: 'The message to Albany, Georgia and many other cities, towns and its institutions was quite obvious: we are sick and
    tired of this system of segregation and discrimination and we are not going to take it any more.'
- speaker: Respondent
  text: It did not take long for the message to travel throughout the country and beyond as the demonstrating crowds of students
    and eventually adults grew rapidly and attracted the attention of thousands of all ages, races, cultures and the rich
    and the poor.
- speaker: Respondent
  text: Elected officials of the city of Albany were requested to select a group from its ranks that would meet with a comparable
    group from the demonstrators, now numbering in the thousands, and seek an amicable solution to the many issues that were
    keeping us apart.
- speaker: Respondent
  text: A committee from the Council met yet did not include any representatives from the demonstrators.
- speaker: Respondent
  text: I attended the following City Council Meeting where I had presented the resolution that merely asked in the beginning
    let us name representatives from the city and a similar group from the demonstrators to meet and seek some agreements.
- speaker: Respondent
  text: 'The City Council next met in private behind closed doors and the Mayor reported the response to representatives from
    the demonstrators: the answer was we found no common grounds from which we could reach agreement.'
- speaker: Respondent
  text: Thus ended the invitation to the Albany City Council from the many students and Albany local residents that were active
    participants in the demonstrations.
- speaker: Respondent
  text: We only had voluntary legal representation by the only three lawyers that would take a civil rights case, especially
    when there was only very limited ability to pay.
- speaker: Respondent
  text: The Civil Rights Movement should forever remember Attorneys C.B. King, Don Hollowell and William Gray. They took the
    Civil Rights cases when no other lawyers would do it, the small exception may be if enough money was available, none was
    for such cases.
- speaker: Respondent
  text: What followed was a continuation of demonstrations that included sit-ins, marches, mass rallies, boycotts.
- speaker: Respondent
  text: The mass meetings continued to grow filling many churches every night.
- speaker: Respondent
  text: This series of demonstrations did not receive any positive response but continued arrest, intimidation, threats and
    a few bombings of homes and businesses and even many churches.
- speaker: Respondent
  text: In response to the absence of any positive response from the Albany city officials, the movement continued to grow
    until there were many of the demonstrators in jail and attention was drawn to Albany from all over the country.
- speaker: Respondent
  text: The high point in the demonstrations was when several thousands were arrested and sent to many of the surrounding
    jails as the capacity of jails in Albany and in the county far exceeded the capacity of the city to provide any of the
    basic necessities.
- speaker: Respondent
  text: It was at this point that the Albany Civil Rights leaders were called on to provide some relief for those in prison,
    including the wives of the leaders of the Movement.
- speaker: Respondent
  text: And it was at that time that the leaders of the Movement were called on to do something to at least stabilize the
    movement activities or to find a solution that could provide some relief.
- speaker: Respondent
  text: As the President of the Albany Civil Rights Movement, it became my duty to produce a workable solution, at least to
    improve conditions in and out of the many jails where the Albany Movement demonstrators were housed.
- speaker: Respondent
  text: As President to the Movement, it was thought imperative that I provide some relief.
- speaker: Respondent
  text: It was at that point when my wife, Norma and I, followed by Slater King, the Vice President, and I called on my friends,
    Martin Luther King and Ralph Abernathy, both of whom had been directly involved in Civil Rights activity with success.
- speaker: Respondent
  text: Diane Nash and a group from Tennessee chartered a bus to join the demonstrations in Georgia, Alabama, and other southern
    cities.
- speaker: Respondent
  text: Diane was advised not to take the group to the areas where the demonstrations were taking place and many were injured
    by the police.
- speaker: Respondent
  text: Her response was, we are all fully aware of the dangers that we may face but we are also prepared for it.
- speaker: Respondent
  text: In fact she said that all on this bus have already signed their last will and trust as they prepared for the worst.
- speaker: Respondent
  text: In the midst of this occurred a signal march through the heart of Albany, a section referred to as the Harlem of Albany.
- speaker: Respondent
  text: Norma, my wife, and I led the march.
- speaker: Respondent
  text: The local, county and state police had been called in by Albany Police Chief, Laurie Pritchett to quell this demonstration
    that was destroying the city of Albany.
- speaker: Respondent
  text: In its effort to stop the march, a young soldier of the state National Guard stepped in front of the marchers led
    by SNCC, Student Nonviolent Coordinating Committee.
- speaker: Respondent
  text: Charles Jones, Bernice Johnson, Diane Nash in advanced pregnancy and many others were arrested for the second time.
- speaker: Respondent
  text: The three of us, Dr. King, Rev. Abernathy, and I were jailed together in an earlier demonstration.
- speaker: Respondent
  text: Many calls to the Albany jail urged the police to release Martin Luther King from jail as he was scheduled to be a
    guest on Meet The Press the next morning.
- speaker: Respondent
  text: Dr. King refused to leave the jail as he had committed to stay in jail until an agreement could be made and that all
    of the demonstrators would be released without posting a bond.
- speaker: Respondent
  text: Martin then said it is too important to us to get our message out to the world how Blacks and other minorities are
    being treated in America.
- speaker: Respondent
  text: We cannot pass up this opportunity to send the message.
- speaker: Respondent
  text: He then placed three straws in his closed fist and asked each of us to draw one.
- speaker: Respondent
  text: He stated that the one that drew the short straw was to leave jail and go to New York to appear on Meet The Press.
- speaker: Respondent
  text: I was the one chosen by this exercise.
- speaker: Respondent
  text: Thus, I was promptly let out of jail and sent by airplane to New York where I was met by Attorney Clarence Jones who
    then promptly started the preparation for me to meet the panel on Meet The Press, some of whom were well known segregationists
    if not racists.
- speaker: Respondent
  text: Thus, another chapter in the history of the Civil Rights Movement went into the record book, the book of how racism
    was, now is, and threatened to exist for future generations.
- speaker: Respondent
  text: The good news is there is yet hope, we only need opportunity for all to be able to participate in the hoped-for democracy.
