collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: That was the first time, and at that time we sat down and planned a voter registration drive for Mississippi. We were
    to start in Clovell, Mississippi, to start that drive on the Delta; however, we couldn't. We didn't have any equipment,
    so we went down to McComb at the invitation of O. C. Bryant, who was local head of the NAACP there. And we began setting
    up a voter registration drive in McComb, Mississippi. What did we do?
- speaker: Respondent
  text: I returned in the summer of 1961.
- speaker: Respondent
  text: Well, for two weeks, I did nothing but drive around the town, talking to the business leaders, the ministers, the
    people in the town, asking them if they would support ten students who would come in to work on a voter registration drive.
    We got money from them to support students for the month of August, and to pay for their room and board and some of their
    transportation while they were there. The project began August first, and lasted, as it turned out, till December, not
    just through the month of August.
- speaker: Respondent
  text: We began in McComb, canvassing for about a two week period. This means that we went around house-to-house, door-to-door,
    in the hot sun, every day. Because the most important thing at the beginning is to convince the local townspeople that
    we meant business. That is, that we were serious, that we were not only young, but we were people who were responsible.
    What do you tell somebody when you go to their door? Well, first of all you tell them who you are, what you are trying
    to do, that you're working on voter registration. And the form that you try and get them to fill out. Now, the technique
    that we found best useable, I think, is to simply present the form to them and say, 'Have you ever tried to fill out this
    form, would you like to sit down now and try and fill it out?' And psychologically, as they're in the process of filling
    out a voter registration form, one of the questions asks them to do something right at the registrar's office, so that
    psychologically they have to complete a gap, to try and imagine themselves as being at the registrar's office. As you
    know in Mississippi currently, you have to fill out a form which has about 21 questions on it, and aside from routine
    questions, there is on it a place where you write and then interpret a section of the Constitution of Mississippi, and
    finally a section where you write and describe the duties and obligations of a citizen in Mississippi.
- speaker: Respondent
  text: We did this for about two weeks, and finally began to get results. That is, people began to go down to Magnolia, Mississippi,
    which is the County Seat of Pike County, and attempt to register.
- speaker: Respondent
  text: Amite and Walthall County, which are the two adjacent counties to Pike County, came over asking us if we wouldn't
    accompany them and conduct schools in their counties, so that they could go down and try and register also. This point
    should be made quite clear because people have been very critical of going into such tough counties so early in the game.
    The position is simply this, that when they came over, and were very anxious to try and register, and we couldn't very
    well turn them down. Just from the political point of view, they had greater needs in those counties than in Pike County
    where we were working, and secondly from the psychological point of view, the whole problem of Mississippi is pervaded
    with fear, the problem is you can't be in the position of turning down the tough areas, because the people there might
    think that simply lose confidence in you. So we accepted this, we worked out a plan. First, three of the students, John
    Hardy and two other students who had just come off the freedom rides, went into Walthall County to begin work. That was
    about the middle of August. At about the same time, I accompanied three people down to Liberty, in Amite County, beginning
    our first registration attempt there. One was a very old man, and then two ladies, middle aged. We left early morning
    of August 15, it was a Tuesday, we arrived at the courthouse about 10 o'clock. The registrar came out. I waited by the
    side, waiting for either the farmer or one of the two ladies to say something to the registrar. He asked them, what did
    they want, what were they here for, in a very rough tone of voice. They didn't say anything, they were literally paralyzed
    with fear. So after a while I spoke up and said they would like to come to register to vote. So he asked, well, who are
    you, what do you have to do with them, are you here to register? I told him who I was, and that we were conducting a school
    in McComb, and that those people had attended the school and they wanted an opportunity to register.
- speaker: Respondent
  text: Well, he said they'll have to wait, because there was some level, there was a young white lady there with her husband,
    and she was sitting down, completing her registration form. When she finished, then our people started to register, one
    at a time.
- speaker: Respondent
  text: People began moving in and out of the registration office. In the meantime a procession of people, sheriff, a couple
    of his deputies, people from the office next door, people from the tax office, people who do the driver's license, looking
    in, staring, coming back out, muttering.
- speaker: Respondent
  text: A Highway Patrolman finally came in and sat down in the office. And we started that sort of uneasy tension, all morning.
    The first person who filled out the form took a long time to do it, and it was noon time before he finished. When we came
    back, I was not permitted to stay in the office, but had to leave and sit on the front porch, which I did. We finally
    finished the whole process about 4:30, all of the three people had a chance to register, which was at least to fill out
    the form, which was a victory. Because they had been down several times before, and had not had a chance even to fill
    out the forms.
- speaker: Respondent
  text: On the way home we were followed by the highway patrolman who had been there the day before, Officer Carlisle. He
    tailed us for 10 miles, very close, about 20-25 feet behind us, all the way back towards McComb. At one point he pulled
    off the road, and he passed us and rolled round and came back, and we pulled up as he was passing us in the opposite direction,
    and he turned around and followed us again. So finally he blew us down, and I got out of the car, asked him what the trouble
    was, because the people in the car by that time were very, very frightened. He asked me who I was, and what my business
    was, and told me that I was interfering in what he was doing.
- speaker: Respondent
  text: I asked him what the problem was, and what we were being stopped for. He told me to get back in the car. As I did
    so, I jotted his name down. He then opened the car door and pushed me, and said, 'Get in the car, nigger,' and slammed
    the door after me. He then told us to follow him in the car, and he took us over to McComb, where I was told that I was
    placed under arrest. They called up the town prosecuting attorney, he came down, told he and we highway patrolman then
    sat down and opened up the law books and looked through to find out a charge. And the first charge, we were interfering
    with an officer in the process of arresting somebody. Then they found out that the only person arrested was myself, charged
    with interfering with an officer in the discharge of his duties. The county attorney asked me if I was ready for the trial,
    I said could I make a phone call. He said yes.
- speaker: Respondent
  text: I picked up the phone and called Washington, D.C., the Justice Department, because I'd been in communication with
    some members of the Justice Department, particularly John, explaining those sections of the Civil Rights Acts of 1957
    and 1960 which guaranteed protection to people who are trying to register and to anyone who is aiding others in trying
    to register. And they also indicated that if we had any trouble, we were to call Washington or the nearest civil office
    of the FBI. So I called them, collect. The people in the office were rather astonished.
- speaker: Respondent
  text: I said I simply wanted to find out exactly what had happened, in their presence, and told him that I thought we were
    being intimidated simply because the people were trying to go down and register.
- speaker: Respondent
  text: Well, well, the trial right after that, I was found guilty of interfering with an officer. And the judge and county
    prosecuting attorney went out in consultation and came back, and I was given a suspended sentence - 90 day suspended sentence,
    and fined five dollars for costs of court. So I refused to pay the five dollar cost of court, and argued that I shouldn't
    have been given anything at all, we should have been let free, since I was obviously not guilty.
- speaker: Respondent
  text: I was taken to jail then, this was my first introduction to Mississippi jails. I spent a couple of days in jail, and
    was finally led out when the bond money came through via the NAACP.
- speaker: Respondent
  text: Well, that was our first introduction to Amite County. Immediately after that, we rode out to Steptoe's house, who
    was the local president of the NAACP in the southern part of the county, and made plans to set up a school at his house.
    Which we did, and for the last two weeks of August, we proceeded to teach people farmers down in the southern part of
    Amite County, at the little church there, coming two, three, sometimes five or ten at a time. We were severely handicapped
    because we didn't have transportation, and the farms there were so far apart, so we had to wait on the people at the church.
- speaker: Respondent
  text: While we were out there, the next day another team went down to Liberty to register. And they didn't have any difficulties
    at all. In fact, the boys that went down with them were able to get in the registrar's office, and the people were able
    to complete their registration without difficulty. Out to us at Steptoe's, and we were somewhat encouraged by this.
- speaker: Respondent
  text: After that, we planned to see another registration attempt on the 29th of August, which was again a Tuesday. We thought
    we would have much trouble, although there'd been rumors floating around down at Steptoe's that there might be trouble,
    and people had made another registration attempt down at Liberty.
- speaker: Respondent
  text: This was August 22.
- speaker: Respondent
  text: This was the day, then, that Curtis Dawson and Preacher Martin and I were to sort to try and register. The day Curtis
    Dawson came, drove down by Steptoe's, picked me up, and we went into Liberty, we were to meet Martin at the courthouse
    lawn.
- speaker: Respondent
  text: Instead, I was rather severely beaten. And instead we had to walk through the town, and on our way back we were accosted
    by Billy Jack and some other boys.
- speaker: Respondent
  text: I remember very well that I didn't want to go immediately back into town, because my shirt had blood on it and I figured
    that if we went back in, we'd probably be fighting even. So instead we went back out to Steptoe's, where we washed down
    before we came back into McComb.
- speaker: Respondent
  text: So that very same day, there'd had the first sit-in in McComb. So that when we got back, everybody was excited, and
    a mass meeting was planned that very night. And Otowells and Curtis had sat in at the Woolworth lunch counter in McComb,
    and the town was in a big uproar.
- speaker: Respondent
  text: We had a mass meeting that night, made plans for two other activities - one, the kids made plans to continue their
    sit-in activities, and two, we made plans to go back down to Liberty and try and register some more. We thought that was
    extremely important, that we go back to Liberty immediately, so that people in that county would not feel that we had
    been frightened off by the beating, and before they could get a chance there to rally their forces. Accordingly, on Thursday,
    August 31, we made registration attempts both in Liberty and in McComb.
- speaker: Respondent
  text: In Liberty, the mother registration attempt coupled with an attempt by us to find the person who had done the beatings
    and have his trial. It turned out that we did find him, and that we did have his trial. They had a six-man justice of
    the peace jury, but the courthouse in a twinkling was packed, that is, the trial was scheduled that day, and within two
    hours, all white farmers came from all parts of the county, wearing their guns, sitting in the courthouse.
- speaker: Respondent
  text: We were not to sit in the courthouse except while we testified, otherwise we were in a back room. After the testimony
    was over, the sheriff came back and told us that he didn't think it was safe for us to remain there while the jury gave
    its decision, and accordingly escorted us to the county line. We read in the papers the next day that Billy Jack had been
    acquitted. In the meantime, in McComb, more sit-ins had taken place.
- speaker: Respondent
  text: I will advise.
- speaker: Respondent
  text: Her Travis had sat in this time. She was a young girl, just sixteen years old, and had been very active with us in
    the voter registration in McComb. And I mean that she, with all of us, had walked the streets every day, from two to five,
    or from twelve to five, as it were, in the hot sun.
- speaker: Respondent
  text: The local Negroes there in McComb, and the feeling of apathy, or the fear, and the inability to move, the absolute
    immobility in the face of going down and facing the registrar in Magnolia.
- speaker: Respondent
  text: Her response was to take some kind of action on her own, so she joined the sit-in group. This infuriated the committee,
    both the white and the Negro community. The Negroes were infuriated that she was so young, and should be down there in
    that jail, and the white community was infuriated that we would send a young girl down like that. Actually, we hadn't
    known her age. I wasn't informed at the time, and though I did know her age.
