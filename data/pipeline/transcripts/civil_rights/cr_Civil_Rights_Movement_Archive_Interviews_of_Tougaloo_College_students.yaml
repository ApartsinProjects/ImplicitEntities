collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Let's say - a question like this. What are your expectations of a person who would be - quote - a Negro leader now?
    Anybody.
- speaker: Respondent
  text: Well, for my part I think that - in terms of aims or goals or purposes of a Negro leader, I think that it should be
    a projection - that his projection should be not only thinking in terms of a Negroes themselves, but in terms of the entire
    community in which Negroes and whites live. And I think that the Negro leader should think in terms of the rights of Negroes
    and the rights of other people in the community. Because you can't just take a - the situation as it is and push something
    on the other people, just because of the situation that the Negro is in. And I think that, in terms of being a leader,
    the Negro should think not only in terms of the Negro but in terms of the whole community complex.
- speaker: Interviewer
  text: Are you referring to relations in the community at some future date, some picture of society to come, that these are
    the responsibilities for the Negro leader to have in mind? Yes? Is that what you're thinking about?
- speaker: Respondent
  text: Well, I agree with Mr. Norman, but I'd also like to add, I would expect a Negro leader to be logical and cool-headed
    rather than a type leader, because I don't like leaders who like to play on the emotions of the people who their leaders,
    but to lead them to peaceful demonstrations and not by means of violence, because I think that's the only way we're going
    to ever get anywhere, and that's through nonviolence.
- speaker: Interviewer
  text: You know, you'll find people who are going to disagree with you.
- speaker: Respondent
  text: I know, but that's the way I feel.
- speaker: Interviewer
  text: Miss Davis, what do you have to say?
- speaker: Respondent
  text: I agree with what Mr. Norman has said and also with what Miss Poole has said, and especially what Miss Poole has said.
    The nonviolent movement has brought us thus far good, I think and not only this - it has been in such a way that people
    can respect us. Anybody can stand up and fight for things - I mean physically - but it takes a person who has strong emotions
    to really withdraw from this, and I think his is what the leadership is taking into consideration also.
- speaker: Interviewer
  text: Don't wait to be asked. If you want to say something, just say it, you see. You know, if you've got a question - we
    don't all have to speak on the topic, or - just be as natural as possible - just assume we are having a conversation.
- speaker: Respondent
  text: Well, I was going to say that this is more or less a human rights movement, more than a Negro movement. I feel that
    the leaders - Negro or white leaders of our country today, in the Negro movement or in the Citizens Council movement -
    that is, the white movement - should take into consideration the heritage of our country and the belief in a form of democracy
    that we have to have, whereby we learn to love each other as brothers, rather than a hatred that has been created here
    in the South.
- speaker: Respondent
  text: I don't think it's so much the hatred - I think it's mostly the whites - some of the whites have managed to accept
    the fact that this is going to happen anyway, no matter what we do. They have got to accept this. And I don't know whether
    this hatred is embedded within us, this idea, or not, but this is something that's going to happen and they just hate
    to face it. But no matter how they try to prevent it, it's going to come. And they hate to see it come because some of
    their rights - I think they feel will be but this is something that has to be accepted.
- speaker: Interviewer
  text: You mentioned some of their rights might be taken away. What sort of rights do you think would be taken away?
- speaker: Respondent
  text: I've talked with some of the people that are - let's say more or less conservatives, and they feel that if the Negro
    - some of them feel this way - if the Negro receives some of his civil rights that - like there will be offices - some
    of their positions will be withheld or something of this nature. Then I am thinking in terms of we are all Mississippians,
    and that we all have the same rights, and these are to be expressed by the vote and this sort of thing. We are taking
    into consideration that I'm a head, and if I leave something for my
- speaker: Interviewer
  text: 'Let me read you a quotation from Dr. Kenneth Clark, you know the Negro professor of psychology at CCNY - The City
    College of New York. He has been talking about the Black Muslims, and now he is talking about Martin Luther King, comparing
    them. This is the quotation: On the surface, King''s philosophy appears to reflect health and stability, while the Black
    Muslims appear to reflect pathology and instability. A deeper analysis, however, might reveal that there is an unrealistic
    if not pathological basis in King''s doctrine. The natural reaction to injustice is bitterness and resentment. The forms
    which such bitterness take need not be overt but the corrosion of the human spirit seems inevitable. It would seem, therefore,
    that any demand the victims of oppression be required to love those who oppress them, places an additional and probably
    intolerable psychological burden upon these victims. He''s surely no follower of King. Does that make any sense to you?
    Clearly not. You have said the contrary, that you are the victim. But how would you answer that? He''s saying, to paraphrase
    it, that the attempt - it''s a natural response - the natural man''s response to injury is to resent it. He may not be
    able to strike back out of fear or some other situation, but it is natural. If you ask him to forgive, it is unnatural
    and this places a destructive burden on him that will lead to psychological complications and confusions.'
- speaker: Respondent
  text: Well, I can see where the statement is true because I read John Dollard's Caste and Class on a Southern Town, and
    I really think this answers too the Negroes who have an accommodation attitude when whites mistreat them, and I have felt
    the same way quite a few times when I have gone down to demonstrate or just walking through a situation where a color
    barrier was, and I was rejected and have gone out. But I go along with Gandhi and his philosophy where nonviolence is
    the best technique, because I feel that that's the only way that we can ever really achieve integration through peace
    and harmony, is through brotherly love, and if you fight violence by, you know - fight violence with violence you're never
    going to accomplish this.
- speaker: Interviewer
  text: Well, do you think this is making you mentally sick?
- speaker: Respondent
  text: It possibly is. Maybe I'm taking my aggressions out on members of - well, John Dollard says that Negroes take out
    their own aggression on other Negroes.
- speaker: Interviewer
  text: The Saturday night fight.
- speaker: Respondent
  text: Right. But I don't do this. Maybe I take it out on myself - I don't know. But I really agree with King and his nonviolence
    techniques, because I want to achieve integration through nonviolence in order to get brotherly love.
- speaker: Interviewer
  text: If the nonviolence attitude would bring about some psychological confusion or frustrations, would you be willing to
    make such a sacrifice that the generation after you would live in a society much better than the one that you lived in?
- speaker: Respondent
  text: Well, I don't think that it's possible for them to live in a better society than I'm living in now if we achieve integration
    through violence because there's always going to be chaos and strife between the races if we don't win it over now, as
    we're doing, with brotherly love.
- speaker: Interviewer
  text: What I meant to say was - through nonviolence. If you make a sacrifice - a nonviolent sacrifice - and you did accomplish
    something, and a generation after you would live better than you live, would you be willing to make the sacrifice?
- speaker: Respondent
  text: Of nonviolence?
- speaker: Interviewer
  text: With nonviolence.
- speaker: Respondent
  text: Yes - yes, indeed.
- speaker: Interviewer
  text: Even with the physical injury and the psychological frustrations?
- speaker: Respondent
  text: I really would.
- speaker: Respondent
  text: Because I think that the whole purpose of nonviolence, to make a sacrifice.
- speaker: Respondent
  text: The sacrifice has to be made. The way I feel about the violent technique - O.K., maybe the nonviolence has a psychological
    effect upon a person, but I feel that if we start fighting back, it would lead into - there would be more violence - there
    is less violence than we have now, but when you have only one side fighting - now, if both are going to fight, more likely
    they are going to start picking up weapons and there would be more deaths. And we're trying to eliminate this by the nonviolence
    technique. I feel that's what King is trying to do in his nonviolent actions, and if we have to - if the only way we can
    achieve our quality is through guns, so to speak - well, just say guns as weapons of violence - I feel that it's not worth
    it. But our generation will - we'll never be able to put the guns down.
- speaker: Interviewer
  text: As Dr. Abernathy said to this question - not to me but to a small group some weeks ago - he said, "Besides, the white
    folks have more guns."
- speaker: Respondent
  text: Right. They will turn them on the Negroes in America. You know, if we pick up guns and start fighting we'll be wiped
    out unless they're the weak.
- speaker: Respondent
  text: We are 10% of the population, which makes it twenty million.
- speaker: Respondent
  text: Twenty million - I thought it was ten million. And then you have to take into account the small kids and older people,
    so -
- speaker: Respondent
  text: I think what - is it Dr. Clark?
- speaker: Interviewer
  text: Kenneth Clark - yes - Dr. Kenneth Clark.
- speaker: Respondent
  text: I think what he's trying to say is that - well, it's a natural behavior of man to fight back against a physical injury,
    and not fighting back will - with some inhibitions of an aggressive - you might say emotion - a rage inside a man - and
    holding us back would cause any frustrations. If that what he is trying to say?
- speaker: Interviewer
  text: It seems so to me. There was a study made over the recent years - several years - by a psychologist, a psychiatrist
    at Howard - I think with outside collaboration - studying the effects - the psychological effects on the young people
    who have been in the sit-ins - the nonviolent sit-ins scattered over the South, you see. Apparently they found that you
    had actually - the development of quality of personal integration in the sense of personal character integration - strength
    of character, self-control, self-confidence - rather than sickness.
- speaker: Respondent
  text: Take for example the demonstration I was in. I was beaten on the floor - and it didn't bother me - no - not psychologically
    - I was not frustration or anything like that. I was completely normal afterwards. I was completely normal, and - well,
    for my part it has given me some personal strength I think, to - well - withstand things - emotional - things that I would
    get emotionally upset ordinarily seem to have helped out some.
- speaker: Interviewer
  text: There are people - if you have a religious and theological grounding for this - this is purely a personal feeling
    - it has nothing to do with Christ's teachings - this is irrelevant to Christ's teachings for you to turn the other cheek,
    forgiving those who smite -
- speaker: Respondent
  text: I guess - I think that for me there's a tie-in between the two.
- speaker: Interviewer
  text: There are people of course who are completely nonbelievers, who still follow nonviolence. And not as a tactic, but
    because of the psychological good - it's another position, of course.
- speaker: Respondent
  text: And I think it's also physically good, because I've been in situations where a mob could have formed and I wouldn't
    have fought back. I would have been completely nonviolent because if I had resisted I would have been killed, and I'd
    rather live and get beaten up than get killed.
- speaker: Interviewer
  text: Where was this?
- speaker: Respondent
  text: This year and last spring.
- speaker: Interviewer
  text: Where was this?
- speaker: Respondent
  text: Well, all the way from Mississippi to Tampa, Florida.
- speaker: Interviewer
  text: On the Ride?
- speaker: Respondent
  text: Right. I went to every bus station, and a couple of white people made nasty remarks and they started flaunting behind
    me and standing there, staring me down. But I was in a situation once where one boy was beaten up with me, but I wasn't
    hit because the white man came over and told me that if I don't want some of the same thing I'd better get out, and that
    was the first time I had ever been in a situation like this. I wasn't even in the movement, and this is what brought me
    to the movement, - this situation.
- speaker: Interviewer
  text: That episode brought you to the movement?
- speaker: Respondent
  text: Right. I saw this boy fall on the floor in nonviolence, and it touched me somehow, and from then on I was very active
    in the movement.
- speaker: Respondent
  text: I might bring up another point, Mr. Warren.
- speaker: Respondent
  text: Quite a few people in the movement came to the movement through this type of action. You find that, when you see your
    friend or someone that you know beaten, like the - or even someone just because he's the same color that you are, he is
    beaten because of the human right that he has inherited through his birth, to - a human right to do - and you see him
    beaten there and you can't do anything, and you feel that you're a coward or you're helpless in a situation, and then
    too, even - for instance, the death of many people - when they killed Medgar Evers and [William] Moore and the kids in
    Birmingham - things like this - each time the police would bring out a dog to fight you - fight someone - this was shown
    on television - people heard of these things - people saw these things - this brings more and more people into this movement.
    This brings more and more people willing to accept
