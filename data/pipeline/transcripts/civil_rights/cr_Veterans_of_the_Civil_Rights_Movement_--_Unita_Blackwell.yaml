source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: So help me to understand the life that Mississippians had.
- speaker: Respondent
  text: Well, Mississippi, you know, people want to know why we are still here and why do we stay here? But Mississippi is
    home. It's a place where I was born reared on the land. The land is important to us. It was, it was the mean - of the
    hard work, but it, it made us angry. It made us happy. It made us all these things, you know, but we was connected with
    the land. Because we as black people, in the state of Mississippi, especially in the Mississippi Delta, worked the land,
    We didn't own the land but, but we worked the land and so everything was tied around this land. And I feel that that's
    the reason why I love Mississippi. It's ours.
- speaker: Interviewer
  text: All right, so you lived in this land and you grew up here, but you lived under a pretty oppressive ruling body. I
    mean, describe the first time that you saw or you recog - you saw freedom more as you called them freedom riders.
- speaker: Respondent
  text: As a local Mississippian, in 1964, because we had heard about it in 1963, that they were supposed to have these freedom
    riders - that's what we called it - coming, to Mississippi. And nobody thought they would ever show up, you know. Everybody
    talked about it. Maybe they would come to Jackson or some place like that. But my personal experience was that I, I didn't
    think they would ever show up in Meyersville, Mississippi, a little small town in the Mississippi Delta. It wasn't even
    a town at that time you know, we calls it, you know Meyersville.
- speaker: Interviewer
  text: And then they showed up?
- speaker: Respondent
  text: Yeah, they came. And it was two guys, two black fellows and they went down to Henry's house. Henry was a man that
    it was rumored that he was involved in the civil right movement, that he was a person that was in the NAACP, and at that
    time you, you know, it was very bad to be in the NAACP because you could get killed for being in anything, far as that
    concerned. But they came through here walking to this town and they was walking down the road and, I knew they were different,
    because they was walking fast. And we didn't walk fast at that time and they just says - waved at, you know, and says,
    hello. You know, we didn't say that either. We always says, how y'all feeling? And so we knew that that had to be some
    of them. And that evening we saw the highway patrols and police coming off the highway looking around and stuff like that
    so we had an idea that this must be some of these freedom riders.
- speaker: Interviewer
  text: Okay, so they're here. Once they got here, what made you then get involved with them?
- speaker: Respondent
  text: Well, they came to our church.
- speaker: Interviewer
  text: When you say they, tell me who they are.
- speaker: Respondent
  text: The freedom riders which Bob and Robert says that they were coming over to the church. And they came to Sunday school
    that morning, and they were pointing the finger at me and saying that just like that lady talking back there in the Sunday
    school class that God help those who help themselves, and you can help yourself by trying to register to vote. And so
    he got up and talk, but that's the first time in my life that I ever come in contact with anybody that tells me that I
    had the right to register to vote. And that was my beginning of getting involved in - so they said we going to have another
    meeting, and they had that on Thursday. Bob and Robert came up and, so they said that, let's find out who want to go to
    the courthouse and try to register to vote. And I stood up to say I would be one of the people. And there was eight of
    us that said that we would go and try to register to vote. And I was asked would I join the SNCC, which was Student Nonviolent
    Coordinating Committee and I said yes. And they said, well what you - what do I have to do? And they said, just try to
    encourage people to go and try to register, go over to the courthouse. And that was my start of going around here to my
    neighbors and friends and asking them, you know, would they come and go to the courthouse and try to register to vote.
- speaker: Interviewer
  text: Now for black Mississippians at that time, that was a pretty dangerous thing to do. What did it mean for you to go
    down to vote, or to try to register to vote at that time?
- speaker: Respondent
  text: Well, it wasn't easy to try to get people to come out to go and try to register to vote because the first time that
    we went, we had a circle around the courthouse of pickup trucks and rifles and white people getting ready to stop us from
    going into the courthouse. And we stayed in the courthouse, you know, all day long trying to get registered to vote. And
    only four people got in that whole day. That kind of a thing, and it started a whole process here in this area and in
    the whole Delta.
- speaker: Interviewer
  text: What kind of process?
- speaker: Respondent
  text: And that process was that people were being put off the plantations, people were threatened with their jobs, folks
    was put in jail. I got arrested several times. Sometimes I got arrested every day, because the harassment started, you
    know, just because we wanted people to try to register to vote.
- speaker: Interviewer
  text: Would it, what did the vote, why was it so - what did the vote mean?
- speaker: Respondent
  text: Well I - the white people knew what it meant. The black folks didn't know that much what it meant. I was only told
    when I started off that if I registered to vote that I would have food to eat and a better house to stay in, 'cause the
    one I was staying in was so raggedy you could see anywhere and look outdoors. That I would have, my child would have a
    better education. And at that particular point, our children only went to school two to three months out of the year.
    That was what we were told, it was the basic needs of the people. And for the whites, they understood it even larger than
    that in terms of political power, and we hadn't even heard that word, political power, because it wasn't even taught in
    the black schools. We didn't know it was such thing as a Board of Supervisors and what they did, and School Board members,
    and what they did and even the Mayor. I mean my mother has never thought in terms that, that I would, you know, ever be
    anything. So nobody's, you know, never thought about any of those things.
- speaker: Respondent
  text: Well, you want me to start now? I feel that the courage of black people in Mississippi, and maybe Mississippians in
    general, but I can talk about what happened to black people and the courage to go and try to register to vote. It was,
    what I always said, was nothing from nothing leaves nothing. We didn't have nothing. And if we tried to get something
    and didn't get it, you know, we hadn't lost nothing. And the courage come out of trying to take a chance to get a better
    life for ourselves and for our children. And we didn't have anything.
- speaker: Interviewer
  text: Okay, so what we're going to do is begin to talk again about courage, and you were telling me about nothing from nothing,
    and what that, what that means in terms of then taking action, so talking about people in Mississippi, okay?
- speaker: Respondent
  text: People in Mississippi, especially black people, when we talked about courage and where do we get our courage from
    in the beginning of the movement, we - I would always say that nothing from nothing leaves nothing. And we didn't have
    nothing. And I guess our courage came out of - because we didn't have nothing, that we couldn't lose nothing. But we wanted
    something for ourselves and for our children. And so we took a chance with our lives because I said, we was already, you
    know walking around dead, because we didn't have a life. We just was existing. And they bought it, I mean, you know, when
    we would get out and talk about this, say, that's right. I mean, really and it came up out of that. It came up out of
    the necessities of life that we were missing. And so the courage came from that. Another thing a lot of people that we
    talked to - 'cause I was teaching Sunday school at the time, when the guy came in talking about what we were going to
    do around voter registration, and God helps those who help themselves, and that's one of the things we kept talking about
    in organizing people to go out to try to register to vote. It was all organized around the basic things that we understood,
    like the people in Mississippi Delta knows a lot about God and church what the Bible say, and we saw it as our strength.
    And we didn't have nothing, you know, and so that's the way we went at it, nothing from nothing leaves nothing. And ever
    what we do, we going to be better off.
- speaker: Interviewer
  text: Now, speaking about that courage and the idea of what you could lose, because you could lose your life, how did, what
    ha - how did people respond to someone like Medgar Evers, his death at that time? What did that say to black Mississippians
    at that time?
- speaker: Respondent
  text: We were always knowing that death was always around. That's the strangest thing I suppose for a lot of people to understand
    about us, that we always knew that death was always near, that it was always something.
- speaker: Interviewer
  text: So what we were talking about, we were talking about that people here in Mississippi, they understood that necessarily...
- speaker: Respondent
  text: Now people outside of the state doesn't really understand like what happened to Medgar Evers, you know, it saddened
    all of us, and - but we know death is always around. With the struggle that, that we were in, that it was always the chance
    that your life was the ultimate price, And that had happened to us all the time. I mean people were going to jail, people
    were being beat, people were being killed, and some of them were just being killed. We know about - I know about people
    that's been killed, and they wasn't doing voter registration work. They just was black, and said something wrong to a
    white person - or lift up their head and tried to be a person. And they tried to make them put their hat on their head
    and, you know, and take it off and all this kind of stuff, and beat them to death. So we, we live in that and it was something
    that I guess every time one died, we reinforced it by making sure that we gonna make it.
- speaker: Interviewer
  text: Now, just stop for a second, what I want to do is I want to do - okay, what I'd like you - tell me what you think
    the Freedom Summer did for the people of Mississippi.
- speaker: Respondent
  text: Well, I think for us, for me, and for people that in a whole, the free -
- speaker: Interviewer
  text: Okay, tell me what the Freedom Summer did for black people in Mississippi.
- speaker: Respondent
  text: The freedom summer for black people in Mississippi was a beginning of this era or century of trying to free ourselves
    from being oppressed in the situation that we were in, in the state of Mississippi. It was a very necessary beginning
    in especially for those of us who was involved saw it as an ongoing situation, but -
- speaker: Interviewer
  text: How was it a vehicle to fight oppression?
- speaker: Respondent
  text: Because people feel that they wasn't just helpless anymore, that they had come together and we had black and white
    that had come from the North and from the West and from, even some cities in the South. These students came and we wasn't
    a closed society anymore. They came to talk about that we had a right to register to vote, we had a right to stand up
    for our rights and these kinds of things, and that's a whole new era for us. I mean hadn't anybody said that to us in,
    in that open way like what happened in 1964. That was the freedom summer.
- speaker: Interviewer
  text: Okay, now during that summer blacks - I mean whites - lived in the homes of black families. Freedom volunteers came
    and lived in the homes of black Mississipians. What did that experience do? What did people learn? What did black Mississipians
    learn from those staying with them, and what do you think that those staying with the black Mississipians might have learned.
    What was the experience?
- speaker: Respondent
  text: You know, one of the things that was interesting for a lot of the whites that came, they felt that they had to, you
    know, not clean up and clean themselves up. And that that was the way that it was, you know. They learned that black people
    were poor, but also that they liked to clean up, clean up their houses, clean up whatever they had. They learned too,
    black people learned the interaction of whites, would eat with them, you know, and I remember cooking some pinto beans,
    and that's all we had, and everybody just got around the pot, you know. And that was an experience, you know, just to
    see white people, you know, coming around the pot and getting a bowl and putting some stuff in, and then sitting around
    talking, and sitting on the floor, sitting anywhere, 'cause you know, wasn't any great dining room tables and stuff that
    we had been used to working in the white people houses, and go in there and find them all sitting, you know, and everybody
    sitting and they'd ring a bell or something and tap and you'd come in and bring the stuff and put it around. But this,
    you was sitting in the floor and they was talking and you know, we was sitting there laughing and I guess they became
    very real and very human, we each to one another. It was an experience that I guess will, you know, centuries and centuries,
    that will last a lifetime.
- speaker: Interviewer
  text: Okay, tell me about Fannie Lou Hamer.
- speaker: Respondent
  text: You know, Fannie Lou Hamer when, and you, when I think of Fannie Lou Hamer, I think of her sitting in her house in
    Ruleville. She loved to cook and we had a lot of different dishes and like greens and beans and stuff like that, you know.
    And she cooked big pots of stuff and I think of her as full of laughter. She was very full of humor about her situation.
    I would be, I was, you know, be very, I would be so mad because something would be done happened that night or that day
    or whatever, and that we would end up laughing about it. But she, she could see humor in anything, you know, and that's
    the way I think about her. You know, she would, somebody would take us or take us to jail and she would say, did you see
    his eyes, you know, and say, his eyes were just gleaming you know. And say, his lip was just quivering you know. And says,
    honey, he was so mad he was about to have a stroke, and I was so tick off, hoping that he would, you know, and we, you
    know, it's that kind of feeling that you have about Ms. Hamer. She gets you out of your anger, and into looking at the
    ange
