source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: The key person in setting that up, in terms of setting up the operation, was old man Owens. He was an older man. He
    carried a cane. I don't know if he has one weak eyelid, so in his glasses he wore glasses- and one glass had a hook on
    it, an attachment which kept the eyelid up. So he had kind of fish-eye that looked out at you. And he was the treasurer
    for the NAACP, and independent financially; he didn't have to work, and his money was based in Illinois. He had lived
    his productive life in Illinois. And his sister--he was originally from McComb, and he lived with his sister and her husband,
    there in McComb. And every so often, he went back to check on his business, or whatever he had; I'm not sure what his
    economic base was, but he had the complete trust of the community about money matters. Well, he called himself, and we
    called him behind the scenes. He was treasurer, and he at times spoke out when it was needed, when the community needed.
    He did not, for example, have any misgivings about the demonstrations, and he stayed with us through all that. He was
    a loyal supporter and shored up the community on the question of what was going to be necessary to do anything about the
    situation.
- speaker: Respondent
  text: So Owens would drive out every morning in the taxi. He'd take a taxi out and pick me up, when there. And he did the
    actual leg-work with me, of going around and setting up the project. And what we did was, we went to every single black
    person of any kind of substance in the community, and talked to them about the project. I described it--voting, and what
    we were doing, and talked to them about SNCC. And he would hit them for a contribution, five or ten dollars, and he would
    hold the money. I mean the people trusted him, so that if he said he was going to hold the money, and keep an accounting
    of it, and make sure it was going to be spent for what we said we were going to spend it of SNCC for; which was workers--myself,
    and a couple of people that were going to be sent in. We raised the money in McComb, and Owens was the key person. I mean,
    trusted him with the money. I mean it was absolutely safe; you couldn't have gotten a project like that off the ground,
    raising the money, if you didn't have someone in the community that people could trust.
- speaker: Interviewer
  text: So that was one of the things that you learned?
- speaker: Respondent
  text: You learned about organizing. The importance, the quality of the local person and finding someone that enjoys the
    community trust, particularly around fundraising, is everything the project can get off the ground.
- speaker: Interviewer
  text: You were telling me a little bit about how you first came to the Atlanta office and met Ella, and what led up to that,
    and what was your first reaction?
- speaker: Respondent
  text: Yes, please.
- speaker: Interviewer
  text: You want me to redo that thing?
- speaker: Respondent
  text: I guess, first I think what I said, what I was talking about yesterday, was a period which was very meaningful in
    my life, when I was in public school, and we were living in the Harlem River houses, in Harlem. Between projects, was
    what we called them, between 151st and 153rd street, between 7th Ave and McCoombs Dam. And I was going to P.S. 90, which
    was on 148th street, and 147th street, between 7th and 8th Ave. And it was a public school from grade through the 6th
    grade. And, somewhere along in there, I'm not sure which grade, they opened up an outlet for a cooperative group which
    was distributing milk in New York City, or at least in Harlem. And my family--my mother, and my oldest brother Greg, and
    myself--took over the distribution of milk in the projects, and we opened up a little entryway into one of the little
    basements there, and we would sell milk in the mornings, before the children went to school. And we averaged about two
    cases a day on school days, and a few more than that on Saturdays. And selling it, we made a penny on a quart, and there
    were about twenty quarts in a case, and the milk then was running from eighteen to twenty cents a quart, so we were able
    to buy our two quarts of milk per day from that sale of the milk, if we got there on time and opened up early enough;
    otherwise the kids would have gone off to school and we wouldn't sell as much. So we did that for I think a number of
    years as I remember, and it later made a very deep impression as I learned more about the whole process of setting up
    businesses and the problems of black people in getting started in the economy in this country.
- speaker: Respondent
  text: And then in 1960 when I went down to the SCLC office to work, and Miss Baker was there as the executive director,
    and we got to talking and she was asking me questions as she does, about your background, and what you've been doing and
    so forth. And so in the process of talking, it came out about I had asked her some questions, and she mentioned the....
    working with the cooperative in Harlem in the 40's and I guess early 50's, but this would've been in the 40's. And I mentioned
    about our doing the projects delivery outlet of the milk, and so it turned out, she was on the other end of that operation;
    she was actually part of the organizing force that was putting that operation together. So, that was a big reconnection;
    it was very helpful and meaningful to find somebody like that, who was involved in the civil rights movement, that I'd
    been attracted to, who had also touched on my early life in a way that was very meaningful.
- speaker: Interviewer
  text: Yesterday, we talked a little bit about what led you to come down to Atlanta in 1960. Could you go over that?
- speaker: Respondent
  text: Go over that? Well, what really set it off were the sit-ins. I mean, I was teaching at Horace Mann, and I was reading
    the accounts daily in the New York Times. And they began to put pictures of the students as they were sitting in, and
    the pictures attracted me because I could feel myself in the faces of the people that they had there on the front pages.
    I could feel how they felt, just by looking at those pictures.
- speaker: Respondent
  text: And so I decided to go down during my spring break to visit my uncle, Bill Moses, who was teaching at Hampton Institute,
    Hampton, Virginia. And he had been there since I guess '39-40 like that, teaching in architecture, trying to build an
    architectural department there. And so I did, and the students were in the process of demonstrating in Newport News. Hampton
    itself didn't have any targets really worth shooting at. So there was a Woolworth over there in Newport News, and we went
    over, and sat in and picketed. I think I walked on the picket line, while some of the other students were sitting in.
- speaker: Respondent
  text: And after that there was a rally around that same time that Wyatt Tee Walker came down from Petersburg, Virginia,
    to address people in Newport News. And my uncle and I went over to take a look at that, and my uncle at that time had
    assumed the leadership of the NAACP chapter there at Hampton. Wyatt talked at length about King, and about the movement
    that was developing, and about leadership. One thing that struck me then, he was, as early as that, talking about the
    need for everyone to coalesce behind a leader, a national leader, the implication being that everyone should unite behind
    Dr. King's leadership. And I remember I went up to him afterwards, and just mentioned to him, didn't he think that there
    was a need for a lot of leaders, I mean that we needed leadership all over, as opposed to the need for everyone to follow
    behind one leader.
- speaker: Respondent
  text: Anyway, what was concrete about that meeting was that he mentioned that they were giving a rally in New York, in support
    of King, and that they were trying to help King to fight some kind of legal action that Birmingham was taking against
    him. So when I went back to New York, I found out about the rally, and the organizing process for it, and I found out
    that there was a meeting at one of the Harlem churches, and went to that, and Bayard Rustin was chairing the meeting and
    at the end of the meeting, they passed around slips for volunteers to sign up to work, to help in the process of organizing
    the rally. So I did, and I went after school then, that would have been sometime in April I guess, and worked down at
    that office until the rally, which I believe was sometime in May, and just did the regular volunteer work; you know, stuffing
    envelopes, putting up posters, and handing out flyers.
- speaker: Interviewer
  text: Just to back-track a little bit. When you talked with Wyatt Walker, what would have led you to question that notion
    of coalescing behind a single leader? What about your ideas at that point would have led you to question that notion?
- speaker: Respondent
  text: Well, I guess it just struck me strange, that there should be such an emphasis on everyone trying or that people should
    put their energy into coalescing behind a single figure. It seemed to me, was the movement going on, and across the South
    were spreading, getting activated, and moving, and why put an emphasis then, on one person, and coalescing behind that
    person? So it was just more of a common sense idea, rather than a philosophical notion.
- speaker: Interviewer
  text: What do you think are the causes of that?
- speaker: Respondent
  text: I hadn't worked out any notions of leadership, except that I guess I had a feeling for what people later termed grassroots
    leadership, that is, that there should be leadership all over. You can't--and I don't know that necessarily Wyatt was
    saying that there shouldn't be, but it seemed to me, that he didn't say that there should be. Because it was the emphasis
    in what he was saying that struck me as wrong--that is, the emphasis, which I later came to learn was part of a pattern,
    even in this country, of the ways in which organizations are shaped and formed. And it has a lot to do with the media,
    and the need for projection, and it's something that led to the downfall of SNCC also, this emphasis that came into SNCC
    on having a projection which led to ...
- speaker: Respondent
  text: Well, in SNCC's case it was funds, partly. I mean, this is getting off the track, but back around the time they had
    the Waveland conference, Forman approached me about the problems of fundraising. They had fundraising apparatus which
    was going ...
