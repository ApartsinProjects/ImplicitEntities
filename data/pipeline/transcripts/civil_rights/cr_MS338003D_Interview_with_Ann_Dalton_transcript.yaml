turns:
- speaker: Interviewer
  text: Ann, by way of introduction, how many dogs do you have?
- speaker: Respondent
  text: Eight. Gosh, we may not want to put that down.
- speaker: Interviewer
  text: What part of North Asheville did you grow up in?
- speaker: Respondent
  text: It was the lake section, actually, they called it Beaver Lake or, you know, the part of Beaver Lake that was-- You
    know, there's two sides. So coming down Merrimon, going north, we were on the side that was on the right. The left side
    is where my father, when they first moved to Asheville, they moved into that side, when his mom and dad came here for
    his father's health.
- speaker: Interviewer
  text: And where did they live?
- speaker: Respondent
  text: I was trying to remember if it was Farrwood. They built one of the first houses on that street. I can't remember exactly.
    That was the street, if you go up over the dam and, I guess you would make a right and just keep on after you go over
    the dam. Just keep going to the right and it's that first street that goes up through there, and that's the house that
    they built when they moved here from Alabama, to be their summer home. And they moved here in 1926 and Daddy was 16. And
    his father was in bad health, and back then Asheville was the place to go if you had any health issues, especially respiratory
    issues. So they built that house so that in the summertime, when it was so hot in Alabama, they could come here. Well,
    they knew that Daddy's father was in bad health. He was 15 years older than Daddy's mother. And he had also smoked. He
    was in just bad health. His lungs and all of that. So they sent Daddy away to Europe, to be with his brother, Joseph,
    who was an opera singer over there. And his sister-in-law, Daddy's sister-in-law, was a concert pianist. So they performed
    all over Europe. So they knew that my grandfather was going to die, Daddy's mother did, so they sent him over there to
    be with Joseph. And sure enough, he got the news on a train somewhere in Europe that his father had passed and he needed
    to get back to the states. And Daddy was about 18, I think, when his father passed away. And then they moved over near
    Grove Park Inn. That would be my grandmother. She moved over there and Daddy and Mama were married in 1934, and they moved
    in with her in about 1936 when my first sister was born.
- speaker: Interviewer
  text: Do you know what street that was?
- speaker: Respondent
  text: The house that's over there was built by the same man that built one there at Beaver Lake. They're identical houses
    and it's right there as you--it's of those first streets there. Actually, there's a big church there. The Unitarian Church.
- speaker: Interviewer
  text: On Macon? Is that where you turn up?
- speaker: Respondent
  text: Yes, I think that's where it is. Macon. I think it's Macon.
- speaker: Interviewer
  text: The church on the left of it is St. Mary's?
- speaker: Respondent
  text: Right. That's it. Well, St. Mary's is where my aunt was a big member of that, because that was my father's sister.
    So, of course, he and his sister both lived here and stayed here.
- speaker: Interviewer
  text: What was the sister's name?
- speaker: Interviewer
  text: And the last name, Wilkins?
- speaker: Respondent
  text: Daddy's was Wilkins, but when she married she was a Talmadge. And she lived on Kimberly after that in a great big
    house up on the hill there. And Burl Ives used to come and entertain at Christmastime. Because he knew my--Joseph, and
    I guess the family was all into music. And I was probably about three or four, I guess, and I remember Burl Ives sitting
    at the piano and he was singing and playing and I was sitting on the floor right at his feet, you know, and he was singing
    Christmas songs. But Mama and Daddy moved in with my grandmother, because Daddy was her favorite child, I think.
- speaker: Interviewer
  text: And what was their name?
- speaker: Respondent
  text: Their name was--well, Daddy's name was Wilkins, and that was his father's name, was Wilkins also. Was he William Wilkins,
    also? Gosh, I can't remember my own grandfather's name. I think so. But Daddy's name was William Wilkins. And I believe
    he was named after his father. Isn't that right. I can't remember. But anyway, Mama had moved here from Ohio in 1916.
    Of course, Daddy had moved here in '26 and they eventually met. But they married in '34 and in '36 they had my sister
    and moved in with my grandmother over there on Macon. I guess it was Macon, a big house there. And she had servants. And
    so Mama was sort of a caretaker of my grandmother and drove her where she wanted to go, because she was pretty much up
    in society. So the maids or whoever was there would take care of my first sister, then my second sister was born in '38.
    So they lived there with my grandmother until about 1941 when my grandmother said she wanted to go back to Alabama and
    live in the winters. In the summer she would come up here and live with them. And she gave them money, some money, to
    buy that piece of property in Beaver Lake [Kingwood and built that house, there on the corner of Kingwood Place and Wembley.
    And she said, "I just want a place to come in the summer, so I'll give you so much money and you can build me a section
    of the house," which they did, a nice big bedroom and a big bathroom that was separate from them. It was a two-story house.
    And so she would come back in the summer. She died in December of '49, so I never met her, because I was born in March
    of '50. But she knew my sisters and then my aunt, Daddy's sister, had two children, also. And so she came to see the grandchildren,
    you know, that's why she wanted to come back to Asheville, I'm sure. Because I don't--I don't really think that my parents
    went back to Alabama when she would go in the winter, at all. I think they pretty much stayed here. My mother didn't even
    go to the funeral because she was pregnant with me, about to have me, in December, and didn't want to do the road trip,
    so she didn't go back with Daddy to the funeral for my grandmother. But her portrait is in the Capitol Building in Alabama
    now. It hangs there because she was the first woman legislator from the State of Alabama?
- speaker: Interviewer
  text: Your grandmother was.
- speaker: Respondent
  text: My grandmother. And her name was Hattie Hibernia Hooker before she was married.
- speaker: Interviewer
  text: Oh, my gosh. Your grandmother was a Hooker.
- speaker: Respondent
  text: Exactly. Before she was married, she carried a pearl-handled pistol and rode a horse and taught school. A one-room
    schoolhouse, all the grades. From the very earliest up until I guess they finished school. And that was what she did before
    she met my grandfather who ran the candy factory in Selma. And that's--I'm not sure how they met. I don't know that much
    about that, but that's the way that all got started. And then with his health and them moving here and then Daddy and
    Mama-- And then they built that house over there and in about 1941, '42, right during the war, when the war was getting
    started, and prices were up there. You couldn't get copper, you couldn't get a lot of stuff, but my grandmother, I guess,
    had given them enough money and that's why they bought two lots. So the lot next door was where we moved in '58 and built
    another house, after my sisters went to college and moved away, got married. But I grew up in that first house for eight
    years. And my sisters being 12 and 14 years older, they were mostly, to me, not so much sisters as babysitters and people
    who told me what to do. My brother was born 19 months before I was, so he knew my grandmother. He did meet her.
- speaker: Interviewer
  text: So there were four children in your family.
- speaker: Respondent
  text: There were four children all together. She had one miscarriage before she had my first sister and then--or maybe between
    the two sisters. I can't remember that exactly. This is my mother. And then she had the baby born full term, forcep delivery,
    that the doctor killed with the forceps. And that was their best friend, Dr. Burton. They went everywhere together. Daddy
    hunted with him, and it was just an accident. Then they knocked women out, they ethered them, you know, and then you woke
    up and you had a baby. And my mother woke up and didn't have a baby and Daddy had already had it cremated. So she never
    saw the baby. It was a beautiful girl. And had that not happened my brother and I wouldn't be here. She would have had
    three girls and that would have been it. But that age difference there, that's why my sisters and I are so much age difference.
    And she having the boy, and I guess she figured she'd have another boy, and she had me instead. So she was--Daddy was
    40 when I was born. Mama was about 28, so later-in-life children. But we wouldn't have been here if that had not happened.
    But what I think is that, from what they told me, they buried her ashes outside of the house. The baby, the house I grew
    up in, her ashes were buried outside the kitchen window there, or outside the window of the house, so that every time
    Mama looked out, she saw that. But she blamed my father very much for not ever letting her see the baby. You know, she
    didn't have that closure. So he just made that decision to have her cremated. I guess Mama was knocked out and they just
    said, "What do you want to do", and that was the decision he made. But that may have led to her alcoholism. That's what
    she said. But Daddy and Mama both drank a lot, you know. They were big partyers. And that's what she always said, was
    because Daddy had done that, she became an alcoholic. You have to blame it on something. But I--you know, that's the way
    it ended up. But everybody else in North Asheville, like we talked about, the neighbors all seemed to be very similar
    to the way my parents were.
- speaker: Interviewer
  text: You can elaborate on it. You and I talked about it, but we didn't get it on tape at the time. Anything you want to
    say about it. Don't feel like you have to speak about that.
- speaker: Respondent
  text: But it was an open childhood. Everybody, you know, all the children were sort of turned out in the morning and, unless
    we were in school, we were all climbing trees and riding bikes and hiking all over Reynolds Mountain. We used to go up
    there all the time. Even when my little nephews came to town. Because my sister was so much older, she had two children
    who were only-- Well, one was eight years younger than I was and the other was six years younger than I was. So I was
    more of a sibling than I was an aunt to them. But my sister had to move back here after her divorce. She moved back to
    Asheville for a brief while. And during that time, when she worked, then I would take care of her children. I was, you
    know, maybe nine. So we would walk up Reynolds Mountain. I was totally in charge of these little children. So we would
    walk up Reynolds Mountain together and spend the day, and I'd make their lunch. Because Mama wasn't really the kind of
    person that wanted to take care of children. Because like I said, she had help. The whole time that I was growing up we
    had a live-in maid. And then after we had the incident which the maid that was caught with the male friend in the basement
    and they let go, then we had a day maid. But we did have a live-in maid for probably the first, I would say the first
    six years of my life, maybe.
- speaker: Interviewer
  text: Do you remember her name?
- speaker: Respondent
  text: I don't remember her name. I really don't. I think Lillian is the first one and then we had another one named Camilla
    after that. They moved with us. Camilla I remember more in the house in '58. That was 47 Kingwood Place. But 53 was where
    we had the live-in.
- speaker: Interviewer
  text: So she was just daily, Camilla was?
- speaker: Respondent
  text: Yeah, and Camilla was more like three days a week and Lillian, at the other house, was five days a week. We did have
    a five-day-week maid but she didn't cook. She left, Daddy would drop her home, you know, that's when we would take her
    back down to Valley Street or around in there, where the black folks lived down there, every day. She'd ride the bus to
    us, usually, but I'm not sure why we took her home unless it had something to do with safety. Maybe Daddy didn't want
    to have her try to walk down and catch the bus later in the afternoon. Maybe it was just part of the agreement, I don't
    know. But it was mostly room and board for the live-in. That was mostly her salary, not much else. And she had a little
    bit of time off on Sunday, and that was pretty much all. She was pretty much a babysitter or a cook. You know, she washed,
    she ironed. Everything was ironed back then, sheets, everything. And, you know, I just thought everybody had maids, because
    most of the people in our neighborhood did back then. And when you'd go in a house, you know, their maids would be there
    doing whatever they did, you know, working.
- speaker: Interviewer
  text: Do you remember her last name at all?
- speaker: Respondent
  text: No, but I probably wasn't trained to be independent, certainly, because I didn't, other than just taking care of my
    own self, I didn't really have much else to do. My mother did sew some, but she kind of gave that up when I came along.
    She sewed much more for my sisters, and she would make, I don't know if you knew the Halls or not, Nora Hall. Her father
    was a lawyer. They lived in the big house that's now a bed and breakfast that's there where Reynolds Mountain and all
    that's been developed. It's a great big old brick home that's a big bed and breakfast. And Nora and her family lived there
    and they had a swimming pool in front. And she was one of my friends growing up. And she was my age but a bigger girl.
    So her stuff would come to me and I'd be able to wear it two years after she did, but Mama wouldn't fix it and make it
    fit. She had nice clothes. But Mama did like to sew when she wasn't drinking. When she was drinking, of course, she didn't--she
    probably didn't get into that. And I think that may be why she--because it was more and more. But my sister does tell
    me, her memory, she drank a lot when they were small, too, even though, she said, it was about the baby. Ruth said, "No.
    I don't think so. I think she was an alcoholic". Because of the partying, probably, that they did. Because Mama and Daddy
    did do a lot of that, partying with their friends and stuff. Then the bridge games that I told you about, where all the
    women would come to the house and they had highballs and cigarettes. If there were children in the house, they got to
    partake of the alcohol, too, or the dog or whatever happened to be. I guess the ladies were, by the afternoon, they were
    all happy and all. They drove. You know, back then.
- speaker: Interviewer
  text: Not a many cars on the road.
- speaker: Respondent
  text: No. And my mother had close calls several times.
- speaker: Interviewer
  text: You mentioned walking around and going all over Reynolds Mountain. Where was the Reynolds mansion?
- speaker: Respondent
  text: Oh, the Reynolds Mountain mansion was up on top of the hill. You would go up the driveway, it was just a gravel driveway,
    and that's the way we would go up. And Daddy
