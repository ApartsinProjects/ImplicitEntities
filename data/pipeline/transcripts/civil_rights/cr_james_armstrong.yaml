collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: We were living in the Southtown Housing Authority. I met Dr. King during that same year. He had a talk with all the
    black men. Black men take charge of your home. I was living in the projects over there, and my wife was spending from
    five to six and sometimes seven hundred dollars a year for Christmas. I've got three boys and a girl. She had to have
    a, I've got it in the scrapbook back there now. She had to buy them a Roy Rogers suit for the boys. A Dale Evans suit
    for the girl. Every year we were spending that kind of money for Christmas and bicycles. When Dr. King got through talking
    about black man take charge of your home, then I started thinking. I said now I'm spending five, six or seven hundred
    dollars every Christmas. I'm here living in the projects. [chuckles] It just came to me just like that. All of a sudden
    and I found out. I said now my wife is not asking my kids what they want from Santa Claus. She's buying what she wants
    them to have. There's a difference in there. So I started asking my children, "What do you want from Santa Claus this
    year?" "Daddy, all I want is a pair of skates," and everybody followed suit. The boys, my daughter, I bought them all,
    I gave them all five dollars each to get some skates. The skates cost three dollars and twenty-nine cents. So I spent
    twenty dollars for Christmas, four children with five dollars each because I asked them. See my wife never asked them.
    She just goes and buy what she wanted and buy a whole lot of stuff. So and that tells me something then. It told me, I
    said now in one year and a half time, I started house hunting. That guy was telling me that the houses you see up in good
    areas for sale, nothing lived up here but white folks. No blacks lived up here. Only blacks in this area - he was out
    there cutting grass for some white folk or raking leaves. So I said, well, I'll go to College Hill. College Hill is tied
    in with Smithfield, but this is the white folk at Center Street down there. That's the dividing line. Any time a black
    moves on this side of Center Street, that's two blocks down, his house gets bombed. So I said, I thought I'd come up here.
    So when I moved up here a white folk living there; a white folk was living there; white folks living over there. Everything.
    So they said, "Why do you want to live around the white folks?" I said I'm living in my house and they live in theirs.
    Now back to when I found this house and the lady that sold it to me, she said she'd take twelve thousand five hundred.
    I talked with a black, what do you call sell the houses, salesmanship. Salesman. A real estate man. He was my real estate
    so they take five hundred dollars down. That's the way I bought it. I said, now I'm going to me a home. Now I'm leaving
    these projects. My children didn't want to come up here. My wife didn't want to come up here. You won't go. I said, well,
    you stay here. I'm going over there. So I came on up then and everybody else was leaving, and later on the man next door,
    his wife was friendly with us until we applied to integrate the schools at the next year. That school where, you saw that
    school. You did come that way didn't you? Right around the corner.
- speaker: Interviewer
  text: I saw Parker.
- speaker: Respondent
  text: Parker's down here. But the Graymont is around the corner.
- speaker: Interviewer
  text: No, I didn't see that.
- speaker: Respondent
  text: So we went to school, applied to integrate the school because Reverend Shuttlesworth had already tested the '54 decision
    at Phillips High School. That's down on the other side of city hall. He got beaten real bad. So we have a mass meeting
    going, and he called for volunteers. Everything we do is for volunteers do it. They asked us, even integrating lunch counters,
    whatever it was. He volunteered or he asked for volunteers. Then they teach us how to be non-violent. All these things
    happened during the struggle. So I moved up here, and when I filed to integrate the schools, me and seven other families,
    seven families filed. We all filed together. But their job put pressure on them, fired every one of them. So that left
    me by myself. My job was my own job because I ran my own shop. So the man when I filed, the man next door asked if he
    could find somebody to buy his house. I told him I wasn't selling houses. I said, now I don't know anybody that wants
    to buy it because I don't sell houses here. I said you need to talk with the real estate folks for that. So he quit speaking
    to me. He either would come out, go to work after I leave home or he'd get out and go to work before I came out. But his
    wife, she always would speak and talk. But after he's gone, she stopped coming to the fence and talking there. So all
    these things happen, but I'm still here. Then black folks started to move in over there on the corner. The preacher of
    the church bought this house here next door as a parsonage for the pastor. That's how that got started. You know anything,
    black folks were moving all these rest of these houses. It was a rough year for a lot of us, but we stuck together and
    watched out for each other. That's what we had to do. Because some folks who lived in that house, the man was light but
    the wife was dark. They looked like white folks themselves. Even the grandchildren look just like the grandmama and granddad.
    We got us, went to court, oh I guess, for six years. Of course I filed a case with my daughter and my oldest son. But
    through the long process in the court they ended up going into high school. This is an elementary school down here. That's
    when I put my two younger boys on the case at the elementary school. That was in '56, no, '57 through the six year process
    that's to '63. Yeah. So that's when the court ordered us to go to school, my two younger boys. We got and went to school
    on the 9th day of September, '63. But we got down to the school that morning. We left here. My top lawyer stayed here
    at the house, had breakfast with my wife and the other lawyers walked down there with us. We got down to the school. The
    governor had the doors blocked. That's the 9th day of September. The governor had the doors blocked, and we had to turn
    around and come back and get another court order and get the state troopers out of the door, got in the school the next
    day, September the 10th. Well, September the 10th then all the white folks got mad in Birmingham because schools were
    integrated. Governor was saying, of course I blame him for that because he said before integration comes in this city,
    this state, blood will run in the streets. That's what the governor said. So blood did because five days later, September
    15th all that march and heckling these white folks were doing down into the school, "Two, four, six, eight we ain't going
    to integrate." That's the way it was hollering and carrying on. They had to rope off the school and keep those there were
    about two or three hundred down there carried signs, and my two little black boys, one nine and one eleven, and that went
    on for a long time. Eventually on the 5th day of, five days after we got in school that's when they bombed that church
    that killed the four girls because everybody was mad because the school was integrated. The first year down there my boys
    were treated pretty rough because they would hit them behind the head at the water fountain. They'd go and drink the water.
    Another big boy, white boy would hit you behind the head. That kind of bruised the lips or teeth or wherever, it's bleeding.
    That's what they would tell me when I go to pick them up. That happened for a year. I didn't allow them to fight. When
    they are out on recess, the old boys out there were playing ball. My boys played ball. They'd turn the bat loose at them
    if they were standing near close. I had to teach them how to stand behind the white children until their time to come
    up to the bat. They learned to get along for some reason because one year after my boys were down there, Dwight--that's
    that picture you see up there; picture over there by the clock; they made him the captain of the ball team his second
    year they were down there. The girls write to the boys "be my valentine." Things just changed within one year because
    I didn't allow them to fight. When we finished down there, of course I'm skipping a lot of things, when we finished down
    there, my oldest son was going to Parker. He went to Boston, Massachusetts on a French program from Parker High School,
    and he met a white family out in Lincoln, Massachusetts. That's about eight or ten miles on the other side of Boston,
    but he met them in Boston. He got in a conversation, and he told them those are his brothers in Birmingham integrating
    the schools. So that family got in touch with me and asked me would I let those boys come to Boston and live with them
    because we stood up in Alabama. Something told me to let them go. So when they went to Boston, they went to high school.
    When they finished high school, lived with that family, they went to college. Dwight finished Tufts University lived with
    that family. Floyd finished Boston College, lived with that family. So it's one of the dearest things I've seen in my
    life people being so nice to my children and came out of this storm down here, and folks threatened down here and folks
    up there helping us. It was a beautiful sight. I never shall forget it. I went up there. I visited, looking and they treated
    my boys just like they were part of their own family. Never will forget that. I used to drive to Boston, me and my wife.
    We'd go and stay over night. They didn't let, we didn't have to go in a hotel or anything. We stayed in their home with
    my children there. My boys were being taught from us of how to take care of their rooms and how to keep their bathrooms
    clean when you use it, leave it for the other person. Those children learned that from my children. My children learned
    some things from their children because white folks read a lot. They'd be eight or ten there in the house and seemed like
    nobody's there. Everybody's sitting in a corner somewhere or downstairs in the basement with a book. So that started my
    children reading. We learned from each other. That was beautiful.
- speaker: Interviewer
  text: Why do you think that they wanted to do that?
- speaker: Respondent
  text: Why would I think who wanted?
- speaker: Interviewer
  text: Why do you think the Roche family wanted to help your sons?
- speaker: Respondent
  text: Well, I guess I don't know. They're some kind of a people. Everybody, all white folks aren't low-down and ornery.
    Some folks love this country. They like the things they see in people as human, not as color. That's the way it appeared
    to me because the man who is head of the house he was a principal of an elementary school in Lincoln, Massachusetts. See
    Lincoln is a suburb outside of Boston, just eight or ten miles difference just like here and Pritchard and Ensley. They
    were just nice folks. I guess they believed in practicing what they preached, Christianity. I think they say they were
    -- what do they call it? -- that they were Quakers. They just do things. They don't see colors. They open the doors and
    open their hearts. Eventually one of their, two of their kids came down here spending a couple of nights with me. I took
    them down south to Mobile and let them see the south before they went back to Boston. We were just that close. I don't
    know. I never will forget it when my boys finished, before they finished school when they got into college, when they
    came home for Christmas, their Christmas gift was around trip ticket on Eastern Airlines to come to Birmingham for Christmas
    and go back to Boston. They did that until they finished college. When they finished college, then they started marrying
    and the whole family came to each wedding. All that happened, it was just like a family. We have lunch together wherever
    we were, motels, just a family white and blacks sitting together. Just like family. So we lost them about three or four
    years ago. Both of them past away within a year and a half or two years a part, man and wife. So nobody is up there now
    but the children, and I think my boys still hear from them because I ask them all the time do you hear from the Roche
    children. I can't think of the names right now. But he'll send them a card, and they'll send a Christmas card and things
    like that. It was a great meeting and joyful getting along. So that's what erased me thinking that white folks were mean
    and low down. All white folks are not. No, I can't see them all mean and low down. I'll tell anybody that. I've seen so
    much nicer than them that I don't even get mad [at] George Wallace or Bull Connor anymore. You've heard about them, didn't
    you?
- speaker: Respondent
  text: I don't get mad with them anymore. I said they just didn't know any better. I said because I praise them now when
    they were giving us hell then because if they weren't what like they were, maybe we wouldn't have anything today. People
    like that just make you get up and do something. I said tell them all the time, Wallace made a man out of a lot of us
    black men, standing up like men. Bull Connor made Christians out of the rest of us. Yes sir.
- speaker: Interviewer
  text: Is that because -
- speaker: Respondent
  text: I say I still love Birmingham. They caused a lot of hell to love it but I love it. Martin always say you've got to
    love the hell out of folks. I'll never forget that word. Beat them with kindness.
- speaker: Interviewer
  text: That's how Bull Connor made a Christian out of people by -
- speaker: Interviewer
  text: Using so much violence.
- speaker: Respondent
  text: Prayed and yes sir, because when Bull got sick and he was over there in the clinic trying to rehab, rehabilitation
    center and somebody recognized him and said, "Hey, Mr. Connor." He don't respond to speak. He says pray for me please.
    Pray for me. Same Bull, he wants your prayers. He'll never get it.
