collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Was this thirteen-month-old baby picture taken in Norfolk?
- speaker: Respondent
  text: Sure. I was in Norfolk till about seven or eight years old.
- speaker: Interviewer
  text: You were born in Norfolk.
- speaker: Respondent
  text: Yes. My parents were both from North Carolina, however, from Warren County, two different sections. And they met in
    school in an "academy" that had been established by a black New Englander who carried out the old New England tradition.
- speaker: Interviewer
  text: Was that academy a missionary or church school?
- speaker: Respondent
  text: I think it was church-related in the sense that maybe the northern or New England Baptists may have set it up, or
    he may have come from that. I really don't know, but it was not church-related in the sense of some other schools that
    I know that were started in my day by local church groups, conventions and associations and the like.
- speaker: Interviewer
  text: Do you remember about what year it was that your mother and father met at that academy?
- speaker: Respondent
  text: I can check it for you, but I don't know now. My mother died at the age of eighty-six, and my father was seventy-two.
    And I frankly am not too positive about the date of my mother's death. My father died, I think, in the year 1939. My mother
    lived longer.
- speaker: Interviewer
  text: What kind of family did your father come from? What did his parents do?
- speaker: Respondent
  text: Both of his parents were ex-slaves, and both of my mother's parents were ex-slaves. However, his father must have
    had a great deal of Indian in him. I have no specific indications as to what blood line as far as Indian input came from.
    Both of his parents were light. At least his mother was very light. And his father I did not know; he died before I was
    knowledgeable. But I knew Grandma Margaret, his mother. And both of my mother's parents were born on the same plantation,
    part of which is still owned by part of our family. After Emancipation, I suppose, my mother's father, who was a minister,
    seemingly arranged for or maneuvered to secure a great portion of that land. And it was broken up into plots of forty
    and fifty acres, and his relatives were settled on it. I suppose the first fifty dollars I made I sent back to help pay
    taxes on that land, because my mother was the only member of her family that sort of kept holding on to it. So that's
    where I spent my summers as a youngster. We were, as I said, born in Norfolk, and the family didn't move to North Carolina
    until I was about seven or eight.
- speaker: Interviewer
  text: What was your mother's family name?
- speaker: Respondent
  text: Ross. Grandfather was Mitchell R. Ross; the "R" stands for what I don't know. He was a tall, lean, black man. He prided
    himself on his being black. My grandmother used to say she was named after two queens. They called her "Bet," but I guess
    her name must have been... I know Josephine was one of them, and I guess the other one was Elizabeth. I don't know, but
    it was "Bet" as far as our record shows. I don't know what was recorded, if anything, in Warren County, North Carolina.
- speaker: Interviewer
  text: And what about your father's family name?
- speaker: Respondent
  text: That was Baker. His father was named Teema. Now how to spell it, don't ask me, because Grandfather Teema had passed
    when I came along. I think there are some records I can find. I have a cracked ankle. I had a sort of an eerie kind of
    an accident in 1974. I was going through Philadelphia to see a relative, a first cousin who was ill. And he had much more
    information about that side of our family than I did, because he was older. But I fell between two cars at the Pennsylvania
    Station, and so I didn't make the trip. And by the time I got through with the crutches, he had gone.
- speaker: Interviewer
  text: And how about your grandmother's name?
- speaker: Interviewer
  text: Did your mother and father both have a lot of brothers and sisters?
- speaker: Respondent
  text: 'I think my mother''s mother had 12 or 13 children. I knew a number of them as my aunts and uncles. My father''s family
    must have been at least eight, because by name I can count up to say six or seven. My father apparently was the firstborn
    boy. There was a daughter, Aunt Eliza, who was older than he, and who ended up by having eight sons and one daughter.
    Those I know. But his family didn''t live as long as the.... Numerically I didn''t know as many of his sisters and brothers
    as I did of my mother''s, I guess for two reasons: one, the usual pattern of women taking the children to their home.
    We went to the country for the summer, and so we went to Mama''s family home. And I think also some of his sisters and
    brothers passed earlier.'
- speaker: Interviewer
  text: When did they start leaving Warren County? Did most of them stay in that county for a while?
- speaker: Respondent
  text: My mother's family and my father's family, all the older people died in the county. And my mother's father was a minister,
    and on part of what is now still "our land," he is buried, and my grandmother. Several of the departed sons and daughters,
    my mother and my father and my brother are all buried there. And that's where I became "a church member" at the age of
    nine in good old Baptist tradition. In my father's family, I knew my Aunt Eliza and her nine children much more than I
    did some other members of the family. I think this is basically because Aunt Eliza had a big farm with plenty of grapes
    and apples and pears and things, and at the stage at which I came along she had grown sons who were living away from home.
    They were living in Philadelphia. My father's oldest brother settled in Philadelphia. And incidentally, Rosetta Gardner
    knew him because she grew up there. And he was very prominent in a given church there, and I think it's Cherry Street
    Baptist Church. I don't know. But the persons who lived in North Carolina from my father's side were the aunt who had
    the large family, Aunt Eliza, and Aunt Mary, who didn't live too long after I became of some size. And some of his other
    sisters. There was one other sister that I knew who lived in North Carolina.
- speaker: Interviewer
  text: Did they mostly stay on the land and farm, or did they have other kinds of jobs?
- speaker: Respondent
  text: I guess up to a given point they were all on the land and farmed. And as the boys grew to manhood, which was the pattern
    which obtained even during the period that I became grown, the boys would stay as a rule until they were 21 without even
    questioning, almost. And then they would go out on their own. My father and mother met in school, this little institute
    in Warrenton. And he went to Norfolk to make his "fortune," and my mother stayed in her home environs and taught school.
    And then they married.
- speaker: Interviewer
  text: What kind of school did she teach in?
- speaker: Respondent
  text: It was, I guess, whatever there was of a combination of a public and a community school, because in all probability
    the parents, who were themselves recently out of slavery, were a party to the establishment of the school. My mother's
    father, being a minister, had several churches, and he gave the land for the school. And of course, the community, I'm
    sure, lent its labor to doing whatever was necessary to see that there was a schoolhouse.
- speaker: Interviewer
  text: Was your father the first one to leave home?
- speaker: Respondent
  text: I doubt it. He probably may have been among the first. There was a brother older than he, as I recall.
- speaker: Interviewer
  text: And did he go to Norfolk because that was the closest big city?
- speaker: Respondent
  text: How could you guess? The usual pattern.
- speaker: Interviewer
  text: I went to Nashville.
- speaker: Respondent
  text: And the closest big city where you could find some kind of work. It was about a hundred miles from home. And he went,
    and a sister came to live with my mother and father after they were married. And some of my mother's family had already
    gone. She had two brothers who were in Norfolk. One died long before I knew him, and the other had a dairy farm out in
    what was called Pampistella. Most people wouldn't know where that is at all, but it was the outskirts and Uncle Peter
    had this dairy farm when I was a child.
- speaker: Interviewer
  text: What kind of job did your father get when he went to Norfolk?
- speaker: Respondent
  text: I don't know what he got first, but at the point at which I knew him he was a waiter running from Norfolk to Washington
    on a steamer. That was the mode of transportation between Norfolk and Washington even up until... I guess I'd finished
    college, almost, before they built the bridge so you could drive from... Norfolk is as nearly surrounded by water as New
    York. And the Chesapeake Bay, I think there are five waters that come together somewhere between Norfolk and Washington,
    because I would hear the stories. This was a passenger ship, you see, and this was the mode of transportation from Virginia
    - from that Cape Charles-Norfolk-Portsmouth area - to Washington, D.C. There was no way to drive; there was no railroad.
    During my day, however, a branch of the Pennsylvania Railroad ran into the Cape Charles area. But you still had to get
    on a boat to go from there to the mainland of Norfolk.
- speaker: Interviewer
  text: Do you have any idea how long your father had been there before your mother came up and joined him? Did he come back
    to Warrenton and they married there and then went back to Norfolk?
- speaker: Respondent
  text: Actually, the gentleman comes to the lady's home. I really don't know what their ages were at the time of marriage,
    but he had gone to Norfolk and had "become settled and acclimated," and he came back to continue his wooing of her. And
    there's a very interesting part of the story, especially when you know my mother's temperament. It is said that he came
    to pay court and had ridden on horseback from the county seat, which was Warrenton, to this little section called Flums
    across the river. And it was the winter season, and when he arrived he had been frozen in the stirrups and had to knock
    his heels loose from the stirrups.
- speaker: Interviewer
  text: Was your mother impressed by that?
- speaker: Respondent
  text: My mother was a very... To let her tell the story, she wasn't about to be wooed to the extent of swooning, by no means.
    But she came down the steps - they had a two-story house by that time - and saw him bleeding. They said that she fainted;
    I'm not sure.
- speaker: Interviewer
  text: Do you remember about what year it was that they went to Norfolk?
- speaker: Respondent
  text: No, I couldn't recall that, but I bet I can clarify later. But that doesn't come to my mind, because I don't think
    at any point that they talked too much about the exact year. But I have a lot of papers around, a lot of records here
    and at home.
- speaker: Interviewer
  text: Were you the firstborn child?
- speaker: Respondent
  text: Oh, no. I understand my mother gave birth to eight children, but there were only four that lived to the point of my
    knowledge. Whether they were born and lived a while or whether they were stillborn or just how many were in that state,
    I don't know. But there were four of us that I know of. There were three of us that lived to maturity, and there was one
    between me and my baby sister who died in infancy, I recall. This was the first death I knew of in the family. I remembered
    it in particular because my father was the only one who went to wherever the interment was taking place. And it was a
    carriage, and I was very eager to be in the carriage, but they didn't permit me to go.
- speaker: Interviewer
  text: Do you know how old you were at the time?
- speaker: Respondent
  text: I probably was about three.
- speaker: Respondent
  text: I was small at six. I didn't grow very fast. Whatever height I have came a little late.
- speaker: Interviewer
  text: Was the oldest child a boy or a girl?
- speaker: Respondent
  text: The oldest child that lived to maturity was a boy. My brother was two years older than I. He was born on the twenty-third
    of December, and I was born on the thirteenth of December two years later.
- speaker: Interviewer
  text: What was the year of your birth?
- speaker: Respondent
  text: I was born in 1903. I'm seventy-three years old. And my brother was born December 23, 1901.
- speaker: Interviewer
  text: What's his name?
- speaker: Respondent
  text: His name was B. Curtis Baker. He used a "B"; it was Blake Curtis. My father was named Blake Baker.
- speaker: Interviewer
  text: What was your mother's given name?
- speaker: Respondent
  text: Georgiana Ross Baker. And if you would hear her say it... "My name is Georgiana Ross Baker." She was a very precise-spoken
    person.
- speaker: Interviewer
  text: Where did the Curtis...
- speaker: Respondent
  text: Maybe the Curtis Publishing Company. I don't know. I have a hunch it had to do with the Curtis Publishing Company.
    I think they had the earlier magazine distributors. And of course my mother was a great reader, and also she may have
    been selling it. I don't know. But other than that, I don't know. I didn't bother to find out why he was named Curtis;
    that was his name.
- speaker: Interviewer
  text: And the third child, then, is the one that died very young. The child after you, the little girl.
- speaker: Respondent
  text: No, the girl after me lived to maturity. It was the boy after me; that was Prince. My mother's family had several
    Princes in the family, and she was naming her baby after one of her first cousins, her mother's sister's son who was older
    than my mother. And so that was perhaps the reason, and as far as I know he was just Prince. And he died. I don't know
    whether he was even sitting up then; I don't know how old he was when he died. The next child was me, and after I came,
    if there were others I don't know of any. She may have had a miscarriage; I don't know. But the sister who survived and
    whom I know was about four years or more younger than I, and her name was Margaret, named after my father's mother. In
    fact, she was named Margaret, and then my brother thought she was so precious, he called her "Margaret Precious Odessa."
    Don't take all that, because if you do Maggie might decide to rise up from her tomb. We called her "Maggie."
- speaker: Interviewer
  text: What was your life like here in Norfolk? Were you sort of middle class? Did your father make a good salary?
- speaker: Respondent
  text: Everything is relative, you know. At that stage, a black man who was a barber or a waiter in a given kind of setting
    was perhaps more middle class than anything else. That meant you had all the things that people bought. We got the old
    Singer sewing machine that was bought away back then. When I came along knowledgeably, we lived in a six-room, two-story
    house. And we had a dining roo
