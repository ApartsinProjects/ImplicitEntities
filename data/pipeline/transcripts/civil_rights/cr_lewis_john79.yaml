collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: So, where are you from and how did you get involved in the civil rights movement?
- speaker: Respondent
  text: I grew up in rural Alabama about fifty miles south of Montgomery and the third child in a family of ten. The little
    place where I grew up is so small it's very difficult to locate it on the map, on the Alabama map. Martin Luther King
    Jr. used to refer to this place as being Four Corners, Alabama. It's near a little place called Troy. My father was a
    share cropper and later, I was four years old in 1944, he had saved something like three hundred dollars and with those
    three hundred dollars we moved from the plantation and he bought an hundred and ten acres of land where my family was
    able to raise cotton, corn, peanuts, chickens. So it's part of my growing up permanently in rural Alabama.
- speaker: Interviewer
  text: How did you get involved in civil rights activity?
- speaker: Respondent
  text: Well, as a young child growing up in rural Alabama, I saw the system of segregation and racial discrimination. We
    had to attend school in a one room church from the first through the sixth grade and we had the books that were handed
    down from white students by the county -
- speaker: Interviewer
  text: Okay, I guess, we're, we're talking about how you get - got involved in civil rights and you were saying you started
    out in - growing up. You talked about how - what happened to you when you were growing up.
- speaker: Respondent
  text: Well, as I was growing up in, in rural Alabama, I saw all around me the system of segregation and racial discrimination.
    The visible signs in the little town of Troy, the population of about seven thousand, we saw the sign that said colored
    only. White only. Colored waiting. Water fountain. In a little 5&10 store was a civil fountain, a clean fountain for white
    people to come and drink water, but in another corner of the store there was a little spigot, a rusty spigot said, colored
    drinking. And I became resentful of the signs and all the visible evidence of segregation and racial discrimination. My
    father and my uncles and my grandfather and great grandfathers on my mother's side and my father's side, all of my relatives,
    have I listened to their discussions about what had happened to them. And so, I grew up in that environment where I had
    to face and live with the system everyday and I don't think I had much of a choice, but to, but to resent it. And I grew
    up with a feeling that I had to find a way to oppose this system of segregation, racial discrimination. And my responsibility
    on the farm was to raise the chicken. We had a lot of chickens. And I grew up with this idea, somehow, I don't know where
    it came from, I wanted to, to be a minister and, somehow, I transferred my desire to be a minister and my responsibility
    of raising the chicken, somehow, it got together. And I literally started preaching to the chickens. They became members
    of this sort of invisible church or maybe you want to call it a real church. And I tried out some ideas on the, on the
    chicken. Later I tested same ideas on my younger brothers or sisters and first cousins. And I remember my first act of,
    maybe, a nonviolent protest was when my parent would kill the chicken and I would refuse to eat the chicken and it went
    for two or three days refusing to speak to my mother, father, because they killed a chicken. I thought that it was so
    wrong. And the one thing I did as a young child, when I was about five or six years old, I wanted to save the soul of
    a chicken and baptize this particular chicken and the chicken drown and in the process of trying to save this chicken,
    you know, I lost the chicken. But as, I guess, my sort of childhood way of dealing with protest and getting involved in
    later the civil rights movement. I was fifteen years old in the 10th grade in 1955 when I first heard of the Montgomery
    bus boycott. Now Montgomery is only fifty miles from where I grew up. And I heard about Martin Luther King because he
    came on a local radio station from Montgomery and he was preaching sermons like most black Baptist ministers, but I heard
    of this man and the sermons, eloquent. But one sermon he had was very special one Sunday morning at eleven o'clock on
    this radio station. It was something called Paul's message to the church at Corinth. But he took this sermon around and
    made it something like, Paul letter or Paul's message to the Christians of America. And he kept preaching about - he was
    not concerned about the streets of heaven and the pearly gates and the streets paved with milk and honey. He was more
    concerned about the streets of Montgomery and the way that black people and poor people were being treated in Montgomery.
    And this was before December 1955 when the Montgomery bus boycott occurred. And I think, listen to Martin Luther King
    Jr., and listen to my grandmother and grandfather about some of the things that had happened to them became messages,
    became the necessary ingredients to encourage me to identify with whatever movement or organization or cause that would
    rock the, the whole system of segregation and racial discrimination. We were bussed to school after I left the sixth grade.
    We rode in old broken down buses that white children had used. We didn't have any new buses. And the roads, even the roads
    in the black community, where black people owned land, were unpaved. They were left literally, deliberately, unpaved.
    Even skip places on - in the road. And during the winter months we would run in ditches on the way to school, because
    of the rain. The red mud and the clay in that part of Alabama. And during evenings, returning from school, we would be
    late returning home because the bus would break down, we'd get stuck in the mud, and that type of thing. So all of these
    things came together and by the time I went away to college in 1957 and I was away from home and the Montgomery bus boycott
    had occurred in Montgomery, where we had witnessed and I saw it on television, I read about it in the newspaper - we didn't
    even have a subscription as a matter of fact, cause we were too poor, I guess, to the local daily newspaper, something
    called the Montgomery Advertiser. But my grandfather had a subscription to that paper and each day after he read the paper
    we would get the paper and we kept up with what was happening in Montgomery. And we listened to the radio and, and what
    happened in Montgomery to watch fifty thousand black people walk the streets for over a year rather than ride segregated
    buses became a source of inspiration. It, it created a sense of hope, a sense of optimism. And by going to school in Nashville,
    Tennessee many, many miles away from my parents and from rural Alabama I was - I felt freer to find a way to, to get involved.
    And one of the first thing I did, I became a member of the youth chapter of the NACP in Nashville. As a matter of fact,
    I tried to organize a campus chapter on the campus of the American Baptist Theological Seminary, where I was a student.
    We didn't succeed in that effort because this little school was gently supported by the Southern Baptist Convention which
    was, for the most part during that period, was all white and the National Baptist Convention. And the president of the
    school said we couldn't organize a chapter there, but I continued to be involved in the, in the local chapter.
- speaker: Interviewer
  text: How did, how did, how did you get involved in the, in the sit-ins in Nashville?
- speaker: Interviewer
  text: And how did, how did those sit-ins start in Nashville?
- speaker: Respondent
  text: In - during the school year of '59/'60 - well, even before then there was a group of students in Nashville who had
    attended a, a summer workshop -
- speaker: Interviewer
  text: Ok. So, so what you're saying is that you were prepared for the sit - for, the sit-ins?
- speaker: Respondent
  text: 'Yes. I think we were prepared in, in Nashville. No, Nashville, at the time, was considered a sort of the citadel
    of education in the, in the South with all of the colleges and all of the universities there and many, many churches.
    Sort of progressive and liberal. There was a very active social action committee at one of the local black Baptist churches.
    And at the same time, the pastor of this church, the Reverend Kelly Miller Smith, was the local president of the Nashville
    Christian Leadership Council, an arm of the Southern Christian Leadership Conference - had an effort going. So every Tuesday
    night for an entire semester in 1959 we had what we call, nonviolent workshop, direct action workshop, where we discussed
    and debated the theory the philosophy of Gandhi. The teaching of Gandhi. The whole question of civil disobedience. The
    whole history of the struggle in India and the attempt on the part of Gandhi to bring about some resolution of the problems
    in, in South Africa. But the point came, rather I guess, halfway through the workshop in late November and early December
    of ''59, to have a few test sit-in. So we organized a delegation of, of young people, primarily student: white students,
    black student, international students from, primarily, from Africa and from some of the Latin American country. We went
    down to two of the large department stores and occupied the lunch counter seats, went into restaurants, occupied seats
    at tables and we were told that we could not be served, because there were blacks in the group. This established a case
    that the City of Nashville was segregated. That they refused to serve black people. We continued the, the workshop, but
    when we returned during the early part of 1960 we did receive a call from a young minister by the name of Douglas Moore,
    this was after the Greensboro sit-ins of February 1st, 1960, saying, what can the students in Nashville do to support
    the students of North Carolina? And, I guess, that''s was the message. That was the question that we needed and we were
    ready. We had - ready to be involved, to organize mass sit-ins or sit-down demonstration in Nashville. So in a matter
    of two or three days we organized, during the month of February, what we call "T" days and Saturday, a sit-in. On most
    of the college campuses in, in Nashville Tuesdays and Thursdays were light days for classes and Saturday, for the most
    part, was a free day. We had on that first day over five hundred student together in front of Fisk University chapel,
    to be transported downtown to the First Baptist Church, to be organized into small groups to go down to sit-in at the
    lunch counters. We went in -'
- speaker: Respondent
  text: We went into the local stores for the most part. The 5&10, Woolworth, Kreske's, McClellans', these stores were known
    all across the South, and, for the most part, all across the country. We took our seats in a very orderly, peaceful fashion.
    The students were dressed like they were on the way to, to church or going to a big social affair. But they had their
    books and we stayed there at the lunch counter studying and preparing our homework, because we were denied service. The
    manager ordered that the lunch counters be closed, that the restaurants be closed, and we'd just sit there and we continued
    to sit all day long. The first day, nothing, in term of violence or any disorder, nothing happened. This continued for
    a few more days and it continued day in and day out. And, finally, on one Saturday when we had about an hundred students
    prepare to go down, it was a very beautiful day in Nashville, very beautiful day, we got a call from a local white minister
    who had been a real supporter of the movement. He said that if we go down on this particular day he understand that the
    police would stand to the side and let a group of white hoodlums and thugs come in and beat people up and then we would
    be arrested. And we should make a decision of whether we wanted to go or not and some people tried to discourage us from
    going on that particular Saturday. We made a decision to go and we all went to the same store. It was Woolworth in downtown
    Nashville, in the heart of the downtown area, and occupied every seat at the lunch counter, every seat in the restaurant,
    and it did happen. A group of young white men came in and they start pulling and, and beating, primarily, the young women.
    Putting lighted cigarettes down their backs, in their hair and really beating people and, in a short time, police officials
    came in and placed all of us under arrest and not a single member of the white group. The people that were opposing our
    sit-in down at the lunch counter were arrested. We all left out of that store singing "We Shall Overcome." This was the
    first arrest in the, in the Nashville sit-in. It was the first mass arrest, I think, anyplace in the South. I believe
    it was February the 27th, 1960. And -
- speaker: Interviewer
  text: Was that the first time you were arrested?
- speaker: Respondent
  text: Was the first time that I was arrested, and growing up in the rural South it was not the thing to do, not to go to
    jail. It was a, it was, it would bring shame and disgrace on the family. But for me, I tell you, it was like being involved
    in a holy crusade. It was, became a badge of, of honor.
- speaker: Respondent
  text: I felt good about it. And I think it was in keeping with what we had been taught, in the workshops, so I felt very
    good in, in a sense of righteous indignation about being arrested, but at the same time the commitment and dedication
    on the part of the students.
