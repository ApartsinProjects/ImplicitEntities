collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Well, first off Quinton, just to this is a general question that I ask everybody, tell me a little bit about where
    you were born, where you grew up and, just as general synopsis of the early years.
- speaker: Respondent
  text: The early years. I was born in Greenville, North Carolina and I spent the first eighteen years there. I was born in
    a family of four children. I am the youngest of four. My parents were laborers. My mother was a domestic, my father was
    a laborer, we lived in town, at that time, Greenville was about 21,000 people.
- speaker: Interviewer
  text: What did your father do, did he work in a textile mill?
- speaker: Respondent
  text: My father did various jobs, he worked in a furniture store, he sometimes worked in the fields, he worked in the tobacco
    factory, so that there was never one job, there was just a series.
- speaker: Respondent
  text: A variety of jobs, he even learned to repair televisions while he was working for the furniture store, but he was
    never really compensated for that, so.
- speaker: Interviewer
  text: So, you had two brothers and a sister?
- speaker: Respondent
  text: I had two brothers and a sister. I have my sister. My oldest brother and my sister are still alive, I lost a brother
    a year and a half ago to cancer and so both of my parents are deceased, most of my immediate family are deceased except
    basically it is just me, my brother and sister, my nieces and nephews that are still here.
- speaker: Interviewer
  text: When, as you were growing up in Greenville, when did you start realizing that you were different and potentially a
    gay, a gay man?
- speaker: Respondent
  text: Well, I guess realizing that I was different was very early. I don't know about putting a name on it.
- speaker: Respondent
  text: Probably very early realizing that I was very different, but different for various reasons, it didn't have anything
    to do with sexual differences as much as what my interests were. I was more interested in walks, sitting by the river,
    reading not interested in what most of the males were doing, during my period, which was more hanging out at the pool
    hall, that kind of thing, that was not my interest, and so that made me stand out, and I guess I realized that well, probably
    very young, I probably realized it when I was very young and I wanted to I was in a dance recital and I wanted to dance,
    and my father was not going to hear of that, so those kind of things just kind of made it stand out for me.
- speaker: Interviewer
  text: I see, I see.
- speaker: Respondent
  text: But, you know, in terms of I don't really know any difference in terms of sexual kinds of things because in that period,
    there were all kinds of sexual fooling around with young people, boys with each other, so it
- speaker: Interviewer
  text: It was just common in everyone's growing-up experience.
- speaker: Respondent
  text: Yeah, some people did, some people didn't, it was sort of a common thing, but no one made it, it wasn't, "This makes
    you one." One way or the other. Probably the point at which I realized that there was a difference in terms of sexual
    perspectives might have been high school.
- speaker: Respondent
  text: And that was probably because one of the people that was very openly gay and flamboyant in high school, and was always
    ridiculed by the principal and I was always befriending him, so [Laughter]
- speaker: Interviewer
  text: I see, were you scared to be associated with the flamboyant one?
- speaker: Respondent
  text: No. No, I was not afraid to be associated with him. I mean, I had gone through enough of being called various names,
    "sissy" and other things that that didn't bother me. Obviously, it bothered me, it made me uncomfortable, but it didn't
    keep me from associating with I never really liked to see anyone put down or hurt or ostracized and so the more that they
    would sort of taunt Lester, the more that I would try to be there to say, "You know, there are people who are not friendly,
    or who don't"
- speaker: Interviewer
  text: You extended a friendly hand to Lester.
- speaker: Respondent
  text: Oh, Lester, you know, Lester was quite capable of [Laughter]
- speaker: Interviewer
  text: Doing that on his own
- speaker: Respondent
  text: Of defending himself. [Laughter] But he was always, he was in need of someone to talk to, or someone to hang out with,
    and I would do that, yeah.
- speaker: Interviewer
  text: This, the school that you grew up in was segregated I take it?
- speaker: Respondent
  text: Oh yes, I grew up in segregated North Carolina. This was C.M. Eppes High School, it was the all-black high school
    there. It was sometime long after that You have to remember that my next birthday, I will be sixty years old, so I am
    not [Laughter]
- speaker: Interviewer
  text: Right, well, you hold it very well.
- speaker: Respondent
  text: Well, I am, and so that, I grew up in a segregated environment, I grew up in a community, you did not think about
    it so much. The time that you thought about segregation was when you were interacting or were in an environment where
    whites were around. Otherwise, you did not think about it. I mean, it was the normal course. Obviously, I thought about
    it as I got older in high school, but during that period, is how I grew up.
- speaker: Interviewer
  text: Right, right. Did you grow up with the white community very much?
- speaker: Respondent
  text: Only because I worked in high school, I was [pause] In order to prevent going into the tobacco fields and prime tobacco
    in the summer, I had a year round job. I didn't sell, I shined shoes in downtown Greenville at a local shoe repair shop.
- speaker: Respondent
  text: So, I did that every day after school, and then I did it all day. So, I entered, so most of my customers, most of
    the people that came in were, who actually got shoeshines were white. There would be a few, but not many, African Americans
    that would get a shoe shine. So, that kind of interaction and the other interaction would be in terms of buying clothes
    or things of that nature, but there was no other interaction with whites.
- speaker: Interviewer
  text: I don't blame you, I would do anything that I could not to go out in the tobacco fields. [Laughter] Anything at all.
- speaker: Respondent
  text: Well, I started out there, I started, there was trucking tobacco, and this is one of those incidences where you get
    to know that you are different, because I wasn't very good. Because I was first of all, afraid of horses, and so one can't
    truck tobacco particularly in that period if one is afraid of horses because one has to get behind them to hook the wagon
    up. And so, I was not, I was never very good at doing those things that my father thought I needed to do as a male. [Laughter]
- speaker: Interviewer
  text: To be a man.
- speaker: Respondent
  text: To be a man.
- speaker: Interviewer
  text: Was your father always kind of pushing you into the manly roles in general, or was there just a
- speaker: Respondent
  text: I think that my father knew that I was different, wanted desperately to somehow not, to correct this, to make me not
    different, so that he gave me a hard time often about being different. Sometimes he would raise questions with me like,
    "Why do you have to be so different?" And it wasn't like anything other than I talked differently than most of the people
    around me. The way that I did things was different, and so he would, I tended to talk more to adults than I did to people
    my own age, I think my father was just genuinely worried that I was setting myself up for a miserable existence and so
    he was trying to protect me.
- speaker: Respondent
  text: It did not make our relationship work very well, but [Laughter]
- speaker: Interviewer
  text: But you knew that he had good intentions.
- speaker: Respondent
  text: Yes, I was born [pause] I am the youngest of the four. Probably, without being conceited, probably came out with a
    slight degree more intelligence, so for a number of years, I was very smart, quick to learn, very curious, very independent,
    not willing to be told, "Do it because I say so." And leave it at that.
- speaker: Interviewer
  text: Oh, that sounds very familiar. [Laughter]
- speaker: Respondent
  text: Always having my side of the story and my father was a very traditional man that said, "I say it, you do it, you don't
    question me, as long as you live under my roof, you do as I say" And so he had difficulty with me just because of the
    personality. Also because I was the only kid that worked all of the time and had my own money, and then we had fights
    about money, because of course at that period, more so than now, if he wanted to, he could go and have my employer pay
    him and not pay me, so [Laughter]
- speaker: Interviewer
  text: That could be a big sticking point.
- speaker: Respondent
  text: Yes, but he didn't do that, but he made it was understood that I was to give him half of my earnings, however small
    they might have been. And that was kind of difficult when you are making thirty dollars a week or something like that,
    you have got to give fifteen to your dad. [Laughter]
- speaker: Interviewer
  text: Yeah, it was not easy. So, was Lester the first openly, well, I wouldn't say gay person, I was going to say openly
    gay person that you ever remember interacting with?
- speaker: Respondent
  text: No, because there was a teacher that was commonly known that he was, "Funny" there were people in the community. I
    don't think the lines were as clear and as sharp as they are now. I mean, everyone says how homophobic the African American
    community is. I think that the African American community appears more homophobic since desegregation than prior to desegregation.
- speaker: Interviewer
  text: Yeah, I remember reading this.
- speaker: Respondent
  text: I don't recall the kind of things that people do now, when I was growing up. I mean, the, this particular teacher
    was also the choir director at the church. He was kind of swishy, but he was never really ostracized. He may have been
    talked about being, "funny" but no one really cast him out. They took advantage of his abilities to teach and his abilities
    to conduct a choir. So that, you know and Lester the only reason that Lester was pointed out was because he was so flamboyant
    and he was flaunting. It was more of his feminism than it was the fact that he was in fact gay. I think that was the fact
    of it. So, it is hard for me to think back to, "Well, when do you first interact?" Because I interacted with people who
    were gay, who may have been gay, or who I later discovered were gay all of the time in terms of that community, but there
    was not, we were not segregated in our community as a little clique of people.
- speaker: Interviewer
  text: Right, there was not the gay people in the black community.
- speaker: Respondent
  text: That's right, it wasn't the gay people that were in the black community.
- speaker: Interviewer
  text: They were just there
- speaker: Respondent
  text: They were there
- speaker: Interviewer
  text: They were there and people did not massively care.
- speaker: Respondent
  text: People knew, people did not make a big deal about it, but somebody may have talked about it behind somebody's back.
    Oh, they would taunt, other kids taunted, you know, the way kids do
- speaker: Respondent
  text: but it wasn't it wasn't a political or social issue that created an element in our community or culture that was either
    outcast by the rest of the community, you know. "Oh, you can't deal with them because they are gay. Oh, you can't talk
    to this person, or you shouldn't be involved." I didn't experience any of that.
- speaker: Interviewer
  text: Do you think that, could you say after desegregation, this may have made more, do you think that religious right played
    a role, and the movement of the religious right played a role in that "ostracization" of gays within the African American
    community, or the representation of homophobia within the African American community, or the representation of homophobia
    within the African American community?
- speaker: Respondent
  text: I am sure that that probably happened and that had something to do with it. I think that what, and it is very hard
    to think about this. I think that as deep segregation took place and there was more interaction between African Americans
    and whites, I have noticed that African Americans have taken on more of the cultural standards that whites had. Being
    anti-homosexual, I think, was stronger in the white community than it was in our community and we have gotten
- speaker: Interviewer
  text: More mainstream
- speaker: Respondent
  text: More mainstream, and because of television and a whole number of things, all of those kinds of things have come to
    play, and I think that the African Americans are expressing. I still don't, maybe I am naive, I still don't think that
    African Americans are as anti-gay as people think they are. I think that there is more of a tendency to for instance,
    I we interact with some older African American members of communities that I worked in. And many of them, I think, most
    of these people know I am gay, it is not something that they want to talk about, it is not something but I am a dearest
    friend. There is nothing that they wouldn't do for me. So, the question is, you know, given where they are coming from,
    given their level of understanding, to what advantage is it to me to force this issue on them. They know I live with Ron.
    They know where we live, they know the house, they come here and do things, they know we do almost without each other,
    so what, who are we fooling? [Laughter]
- speaker: Interviewer
  text: Right, exactly, exactly. It is an unspoken thing.
- speaker: Respondent
  text: It is an unspoken, sort of, it is about me, it is about us as people as people rather than about us as sexual beings.
- speaker: Interviewer
  text: I have seen that generally, I think that that may be a southern standard too, because as long as you don't talk about
    it, it is all right. Now, if people become gay activists in the sense of continually fighting for gay rights, and you
    are talking about it. One of the biggest things, I think for people in the South, is not that people are asking for those
    rights as much as they are actually talking about this thing that is best left unspoken, which most sexual things are
    in southern societies.
- speaker: Respondent
  text: Right, most sexual things. Anything that is different is left unspoken in the South. [Laughter]
- speaker: Interviewer
  text: People don't talk about it.
- speaker: Respondent
  text: You know, I mean, I think that it is evident in terms of what is going on with the Latino/Hispanic population, and
    that is the southerners have a lot of difficulty dealing with difference, regardless of where that difference is, we would
    rather you pretend that there is no difference there than
