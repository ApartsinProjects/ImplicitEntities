collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: OK, WHAT BROUGHT YOU TO MISSISSIPPI IN '63 AND WHY, WHY DID YOU FEEL IT WAS IMPORTANT TO BE INVOLVED IN THAT WHOLE
    EXPERIENCE OF GOING INTO MISSISSIPPI AS OPPOSED TO ALBANY AND SOME OF THE OTHER PLACES THE MOVEMENT -
- speaker: Respondent
  text: I went to Mississippi in '63 to work on a literacy project. We were trying to develop a self-instructional method
    for adult illiterates to learn to read. Bob had gotten a grant, Bob Moses had gotten a grant for the project. There were
    six of us on it, I was the only white, I was the first white woman to come into Mississippi as a part of the SNCC group.
    I was sort of privileged I guess, I guess I felt privileged to be asked to do that, and I wanted to do it. And I'd been
    working in the SNCC office in Atlanta I wanted to be in the field, I wanted to be out where it was happening. And I wanted
    to work with Bob. I wanted to work, we were close and I wanted to work with him.
- speaker: Interviewer
  text: DESCRIBE BOB MOSES AS, AS A LEADER, AND YOUR IMPRESSIONS OF HIM AT THAT TIME.
- speaker: Respondent
  text: As a leader, well he had this, he had a capacity to -
- speaker: Interviewer
  text: I'M SORRY TO STOP YOU, JUST INCORPORATE THE WORD BOB MOSES.
- speaker: Respondent
  text: 'Oh I see: we don''t get your question.'
- speaker: Respondent
  text: OK. Bob Moses at the time had a capacity to help people come up with what they really felt and really wanted. He wasn't
    a leader in the sense of getting out front, he was a leader in the sense of empowering people, he had a capacity to empower
    people. He saw beyond the material, I would say, he saw beyond, he was the big, he was a visionary, he saw in big strokes.
    So in his presence one could be that person, or if one thought one was that person [laughs], then there was a kindred
    soul there. So he was very comforting, it was very comforting to work with him. It was as though you were in the same
    psychic space with someone. And he could help all kinds of people feel that way. It had nothing to do with class, it had
    to do with an interior self that he knew about himself and could therefore relate to in other people.
- speaker: Interviewer
  text: CAN YOU GIVE ME A KIND OF A SIMPLE EXPLANATION FOR SOMEONE WHO'S NEVER HEARD OF A FREEDOM VOTER, WHAT THE WHOLE STRATEGY
    WAS FOR GOING INTO MISSISSIPPI AT, IN '63 AND WHAT THE FREEDOM VOTE WAS SUPPOSED TO DO. WHAT WAS -
- speaker: Respondent
  text: Well, because there were, because blacks were excluded from institutions, which is what segregation was, we were creating
    parallel institutions, that's what that was all about, so that a freedom vote, when blacks can vote, we were running parallel
    votes. The freedom schools were a similar strategy which we developed later. There was a lot of discussion of parallel
    institutions at the time for people who were excluded from regular, institutional functionings in the culture.
- speaker: Interviewer
  text: WERE YOU FEARFUL ABOUT THE WHOLE THING ABOUT GOING INTO MISSISSIPPI AS A WHITE WOMAN OF WHAT MIGHT HAPPEN?
- speaker: Respondent
  text: Well, you know when I look back I can't believe the things [laughs] I did. I was very seldom afraid and I tried lately
    to, I've been doing some writing lately and I've been trying to figure out why and I think it's because I was so naïve
    that I, I still, it was somehow as though because what we were doing was right there was some protection in it. It was
    sort of a children's crusade in a way, we were very young, and there was, it was as though there was this armor of righteousness
    that we were all clothed in or sheathed in, and amazing, you know when I look back on it. But I was very seldom really
    physically fearful.
- speaker: Interviewer
  text: BUT YOU, WHAT ABOUT ALL THE BLACK DEATHS AND THE VIOLENCE THAT YOU HAD HEARD ABOUT AND HAD, HAD HIT, AFFECTED THE
    SNCC PEOPLE?
- speaker: Respondent
  text: Well the time, just, you know, if something specifically came up it was very frightening, you know, there was an instance
    when I had a reporter with me that I had taken up to Greenwood and people were running into the back of the car trying
    to run us off the road, you know that was very scary to have your car rammed into from behind. And sometimes driving back
    and forth, we lived in Tougaloo, I lived in Tougaloo, outside Jackson, so, you know, sometimes driving back and forth
    we'd be followed. That was scary when we were followed. But other than the times when it was specifically happening I
    wasn't really very fearful. I felt protected somehow. I just felt safe. We had one funny, actually it wasn't funny looking
    back it was funny. When we, we had this house at Tougaloo which was sort of like an R & R center, cause we had a, we were
    one of the few, we had a couch and we had chairs and a kitchen, it was a real house and so there were a lot of people
    sleeping I guess that was during the summer of '64 and there were just people crashed all over the place. And there were
    these shots outside the house and I thought, well they've found us, this is it. And we were all crawling around, none
    of us were dressed, we were all in night clothes or crawling around on the floor trying to stay below window level. And
    I kept, I was, I remember whispering to people, [whispers] "Try to get out the back, try to get out the back because they're
    gonna try, they'll come in and set the house on fire." And I was in a state of real terror and I was sure that this was,
    we were all going to die crawling around on the floor. And then it turned out it was some folks who'd come back from town
    a little looped and were just shooting off some guns, you know it was some of our own folks out in the yard doing this.
    And I can remember we were all, we were all sitting around on the floor just looking at each other kind of in this state
    of shock and it was very funny, you know we were laughing, and, hysteria you know, it was slightly hysterical, it was
    hysterical but it was very funny and, it's, so, that was fearful. But other than those kinds of things it wasn't, in between
    it was OK.
- speaker: Interviewer
  text: DO YOU REMEMBER ANYTHING SPECIFIC THAT MIGHT ILLUSTRATE HOW A, HOW A WHITE PERSON IN MISSISSIPPI MIGHT RESPOND TO
    PARTICULARLY A WHITE ORGANIZER? REMEMBER THERE WAS TREMENDOUS HATRED AGAINST, ON THE PART OF MOST WHITE MISSISSIPPIANS
    TOWARDS CIVIL RIGHTS PEOPLE FOR COMING INTO THEIR STATE AND THEY SAW IT AS AN INVASION. DO YOU REMEMBER ANY, DO YOU HAVE
    ANY, ANY INTERACTION WITH ANY LOCAL WHITE MISSISSIPPIANS THAT YOU REMEMBER THAT THEY WERE, THEY MAYBE DIDN'T UNDERSTAND
    OUR JUST WERE AGHAST AT YOU AS ANOTHER WHITE PERSON WERE INVOLVED?
- speaker: Respondent
  text: Well I didn't do much street organizing I was in the offices, you know I was in the central office directing stuff
    by then. But I got picked up once by the cops in Jackson who couldn't, it was like they couldn't figure out what it, they
    couldn't figure me out. I mean I didn't look like a radical, you know, I looked real proper and I was like, obviously
    was a nice girl it was like, what, you know, does your daddy know you're here? What was, I didn't run into any direct
    not in Mississippi, I had previous experiences in southwest Georgia and other places with direct violence from whites
    but not in Mississippi.
- speaker: Interviewer
  text: LET'S SEE IN JUST A, IN, IN A FEW COUPLE OF SENTENCES WHAT DO YOU THINK WAS THE WHOLE PURPOSE OF FREEDOM SUMMER -
    WHAT, WHAT WERE YOU TRYING TO DO AS A MOVEMENT WITH FREEDOM SUMMER -
- speaker: Respondent
  text: What was the purpose of Freedom Summer? Well, let's see. What it was was it was segregated, which meant that -
- speaker: Interviewer
  text: WAIT, WHAT WAS SEGREGATED?
- speaker: Respondent
  text: The whole scene was segregated, which meant that they had two cultures, and so blacks couldn't go anywhere, do anything
    in the white community, so people kind of generally know that but the implications of that were a, a really rigid caste
    system that was based on violence and oppression. So to keep that intact it couldn't be talked about, because if it started
    getting talked about publicly, it was gonna start to break open, and what we wanted to do was break it open. So it was
    kind of a blitzkrieg, I mean the way I think of it is we had been previous to that weaving, we'd been weaving, trying
    to weave, a network or a community of people who could work to change the system. But it was so slow, and so many people
    were getting picked off one by one by one, of local leaders were getting murdered or people were being evicted and the
    white power structure was so strong that it really seemed like we needed an enormous amount of outside support to punch
    a hole in the whole system of segregation. So that's what it was about, it was getting the outside support, basically,
    I mean there was a lot else to it but, I think that was, and also, the whole movement was very much working with what
    was available, and we had available a whole lot of northern college students who were willing to come do something, we
    didn't have much money, you know I mean I can remember a lot of nights we didn't have gas to get home, I slept in offices
    an awful lot of times because we didn't have money to get gas to get home. We were eating off the generosity of local
    res- black restaurateurs, who was feeding, you know, I mean the resources were very, very slim and there was this huge
    pool of resources, is what it was, and we needed all the help we could get, so if they would help, fine, use them, you
    know, use whatever we could get, so it's like that.
- speaker: Interviewer
  text: OK, WELL, BOB MOSES NOW -
- speaker: Interviewer
  text: OK, SO GIVE ME AN IDEA - SORT OF THE UNDERLYING THEME, OF, OF BRINGING WHITES INTO THE COMMUNITY.
- speaker: Respondent
  text: Then another aspect of Freedom Summer was that we wanted to try to create, on a human level, actual human interactions
    between blacks and whites, which was impossible with the social structures it was in the state, just to break it open
    on a personal level in local communities.
- speaker: Interviewer
  text: DO YOU REMEMBER SOME OF THE VOLUNTEERS TALKING ABOUT THEIR REACTIONS TO BEING IN A BLACK COMMUNITY AND, YOU KNOW PROBABLY
    FOR THE FIRST TIME.
- speaker: Respondent
  text: Not in Mississippi, we'd done some, we'd done this on a smaller scale in southwest Georgia the year before, and I
    was, at that time I had a lot of, I was really in touch with the new people who'd come down, whites from the North but
    in Mississippi I was more in touch with our staff. I was doing a lot of coordinating of the staff and was less in touch
    with the volunteers.
- speaker: Interviewer
  text: IN ALBANY WHAT WAS THE, WHAT WERE SOME OF THE REACTIONS YOU DID GET THOUGH FROM THE, CAUSE THEY WERE THE SAME TYPE
    OF KIDS BASICALLY, RIGHT? I MEAN THEY WERE COLLEGE KIDS -
- speaker: Respondent
  text: Well, it was, you know, a lot of culture shock, just culture shock. It was and people were impacted by this sort of
    disorganized style of the black community, by the poverty, by the heat, a lot of talk about the heat. I think they were
    impacted by the different, I don't think they expected the various kinds of emotional receptions they received, people
    expected a warmer reception, there was, there was a lot of hostility in the black community toward whites that came out,
    toward volunteers. There was a lot more warmth than they expected too, I think the extremes of the kinds of receptions
    they received impacted people, fear.
- speaker: Interviewer
  text: WHAT ABOUT THE FEAR? HOW DID PEOPLE DEAL WITH THE FEAR OF LIVING DAY TO DAY UNDER TREMENDOUS PRESSURE KNOWING MOVEMENT
    LEADERS HAD BEEN SHOT ONCE?
- speaker: Respondent
  text: Well we got a lot of R & R folks as they say at the house at Tougaloo, you know, folks would come in a party, and
    just, you know party down a little bit or just hang out or, people were very tired, there was a lot of fatigue. Sometimes
    they'd just come in and sleep. Tougaloo was this little sort of safe area because it was an all-black community so we
    saw a lot of folks coming in just wanting to fall out for a few days and eat. The diet change was a big item, you know
    people wanted to eat stuff they were more familiar with, we couldn't always supply that, we were living a lot on what
    we call "commodities" which were surplus food.
- speaker: Interviewer
  text: OK. WHAT DO YOU THINK THAT THE SUMMER VOLUNTEERS GOT OUT, ACTUALLY LEARNED, FROM, FROM THE, THE SUMMER OF WORKING
    IN THE BLACK COMMUNITY AND DOING VOTER REGISTRATION, FREEDOM SCHOOLS, DO YOU THINK AS A GROUP YOU CAN SAY ANYTHING ABOUT
    WHAT THEY GOT OUT OF THAT SUMMER?
- speaker: Interviewer
  text: I MEAN, NO? OK. WHAT, WHAT ABOUT THE OTHER WAY AROUND THOUGH WHAT THE LOCALS GOT OUT OF FREEDOM SUMMER AND THAT WHOLE
    IMPACT OF HAVING THAT MANY PEOPLE COME INTO THEIR STATE AND SHOWING ACTIVELY THAT THEY WANTED TO CHANGE THE WAY MISSISSIPPI
    WAS, WHAT WORKED ON A DAY-TO-DAY BASIS?
- speaker: Respondent
  text: I don't know see it's hard for me, it's so personal it's hard for me to, it's sort of guessing at what volunteers
    -
- speaker: Interviewer
  text: WHAT DO, WELL WHAT DO YOU PERSONALLY, I MEAN YOU WERE IN THE MOVEMENT AT THAT TIME, AND THAT'S SOMETHING THAT YOU
    HAD HELPED BRING ABOUT THIS WHOLE, YOU KNOW, GETTING PEOPLE DOWN THERE AND SEEING, RUNNING THE PROGRAMS AND SO FORTH,
    WHAT DID YOU PERSONALLY THINK WAS THE, WHAT DID YOU THINK HAD CHANGED BY THE END OF THE SUMMER?
- speaker: Respondent
  text: What did I think had changed by the end of the summer?
- speaker: Interviewer
  text: YEAH, IN MISSISSIPPI I MEAN WAS THERE ANY, ANYTHING YOU CAN LOOK AT AND SAY EITHER THE WAY PEOPLE THOUGHT OR IN CONCRETE
    CHANGES. DO YOU UNDERSTAND WHAT I'M GETTING AT OR -
- speaker: Respondent
  text: By the end of the summer, you mean as a result of this influx of white kids coming in? Like the impact of numbers
    of white kids on the scene. The pi- What I was close to the SNCC staff. I could talk about that in terms of the SNCC staff,
