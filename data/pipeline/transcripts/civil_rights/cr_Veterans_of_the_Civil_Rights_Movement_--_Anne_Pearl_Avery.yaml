collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Um, let me start this morning just to have you talk a little bit about, um, where you were born and where you came
    up, a little bit about your family.
- speaker: Respondent
  text: Um, well, um, what, um - I was born in Birmingham, Alabama. Um, and, um, my mother and father are Will and Hattie
    Townsend. I was the first baby, and my father was fifty-four years old when I was born. I was the first baby. [Laughs]
    But, um, anyway, um, we were, um - I, I'd say we were, we were po' - I'm poor now, but we were po' then. [Laughs] But,
    um, anyway, as time went on, uh, uh, in, in Birmingham, I had, um, this situation where my, my aunt by the name of Hattie,
    Aunt Hattie up in, uh, Pittsburgh, Pennsylvania, had a, um - uh, she and her husband didn't have any children. The husband
    deceased, and, um, she wanted somebody to come stay with her. And my mother had four of us, so my mother decided to share
    me with her for a few years.
- speaker: Interviewer
  text: And that was your great-aunt, actually?
- speaker: Respondent
  text: That was my great-aunt. That's, that was my, my mother's aunt, which would've been my great-aunt. And during that
    time I was in Pittsburgh, I went to Gladstone Elementary, lived in Hazelwood, um, [pause] lived on Sylvan - I think it
    was Sylvan Road - or Sylvan Avenue. It was Sylvan Avenue. I'm trying to, to - But, anyway, during that time Emmett Till
    was murdered. And, I guess, you can say for a child - I was only about nine or ten years old when he was murdered. But
    the adults were in, uh, you know, talking about it in the community and talking about it at, uh, at, at my, uh, at my
    home there, 'cause my Aunt Hattie had, had boarders. And, um, they were talking about it, and the way they were talking
    about it, they were just talking about a child. Only thing I could understand, get out of it, was a child had been murdered,
    um, a Negro child. And I - that's - I think that's what kind of piqued by interest, uh, although I didn't understand lynching
    or anything. But I did understand that a child was murdered, and I was a child. And I was curious about this, uh, the
    child being murdered, and I looked for a newspaper around the house. Usually a newspaper would be there, because she had
    the boarders and stuff; they'd bring newspaper, but I'd head for the comics. And, uh, there was no newspaper that day,
    so I decided to, um, go down to the, uh, little neighborhood grocery store where they had a, had a news, uh, rack there,
    newspaper rack, and I wanted to, um, take a look at the paper. And I was fumbling with the paper, and the, the uh, uh,
    um, store attendant told me that I couldn't, um, handle the paper unless I paid for it. But, fortunately, by me being
    the only child member in the family, period - cousins, and I had some, uh, cousins there, but they were adults - they
    spoiled me. They made sure I had pocket money to go to the movie. They made sure I had money to buy cookies and candy,
    uh, bubblegum, whatever I wanted to do, you know, for - so, the, I paid for the paper. Uh, and when I see it now, [laughs]
    uh, in a humorous type of way, I say, "Well, I sacrificed a nickel." [Laughs]
- speaker: Respondent
  text: 'And I can''t remember which paper it was, whether it was the Pittsburgh - the regular paper, everyday paper, there
    would have - I''m not sure whether it was the Pittsburgh Courier, uh, Pittsburgh Gazette or something like that. It could
    have been. I''m not sure, you know. But anyway, I tried to read this paper to try to understand the death of, uh, Emmett
    Till. But I still couldn''t understand it, really, because I''m trying to understand it from a nine- or ten-year-old point
    of view. The only thing I understood that it was a child murdered, and it was, um, a black child murdered. Um, later on,
    I''m back in Birmingham, and a man was murdered by the name of Mack Parker, Poplarville, Mississippi. But I''m fourteen
    years old now, and what happened is they had arrested him, uh, basically the same type of thing that Emmett Till was,
    uh, murdered for, making insulting remarks to a white female or something like that. And they arrested him, kept him in
    jail for a couple of weeks, and there were threats to take him out of jail. And I was keeping up with that, too. And then,
    all of a sudden, they went in and took him out of jail and killed him. And, um, right after that, there are a lot of other
    things begin to happen: the bus boycott in Montgomery; um, Autherine Lucy trying to enter the, enter the University of
    Ole Miss; Reverend [Fred] Shuttlesworth right there in Birmingham, um, along with, uh, Reverend [Charles] Billups and
    Reverend [C. Herbert] Oliver and Reverend Pfeiffer, uh, these are the ministers that I remember, um, that, um, were trying
    to desegregate the schools there in Birmingham. Matter of fact, specifically, I think he was trying to desegregate Phillips
    High, which my children graduated, both of my boys graduated from.'
- speaker: Respondent
  text: But anyway, these things went on, and then after that came the sit-ins and the Freedom Rides. And I was really excited
    at that point, uh, but I'm sixteen years old now, so I understand this from a different level. And on the news, I was
    hearing about young people being involved and young people, uh, wanting change. And I was young, and I wanted to get involved.
    So, um, what I did is I said I wanted to go with 'em. I wanted to get involved; wanted to go with 'em. And I didn't know
    whether they were going to come to Birmingham or what.
- speaker: Interviewer
  text: You're speaking of the Freedom Riders?
- speaker: Respondent
  text: I'm speaking of the Freedom Riders. And when they got to, um - when they got, they, they - in Atlanta, I think, and
    they said they were coming to Birmingham, then I purchased a ticket from Birmingham to Montgomery. And not long after
    I purchased the ticket, and, I remember the bus arrived, the, about the bus arriving in, uh, uh, Anniston, Alabama, and
    was blown up in Anniston.
- speaker: Respondent
  text: And then they came on to Birmingham. But, you know, is that, during that time, they had two bus stations. They had
    Trailways, and they had Greyhound. And Trailways, uh, was one that I was not that familiar with. I was more familiar with
    the Greyhound bus station. And I found out later on why I was, uh - I thought about later on why I was in, eh, really,
    uh, more attracted to the Greyhound bus station. My grandfather, my daddy's father, uh, uh, when he got older, he couldn't
    go anywhere by hisself 'cause he'd get lost - well, some of us had to be with him. He was always going to the Greyhound
    bus station. [Laughs] But, anyway, uh, this is where I, you know, I kinda, uh, wanted to be, so I went and got my ticket
    and everything. So, when they got to Birmingham, and, uh, I went down to the Greyhound bus station, along with a young
    lady at that time that lived in the projects when I was a little girl. Her name was, um, um -
- speaker: Interviewer
  text: Candace Grimes?
- speaker: Respondent
  text: Candace! Candace. Now, Candace, uh, told me that her uncle was, uh, Reverend [Ralph] Abernathy. But I didn't know
    this, you know, who Reverend Abernathy was. It really wasn't that important as, you know [laughs] - to me, Abernathy,
    okay [laughs]. But we had decided to go down to the Greyhound bus station and take a look. But, uh, what happened is,
    it was roped off. Then, uh, I wanted to go - I went down there, I think, the next night after and I talked - I met a guy
    by the name of Wilson Brown. And Wilson, I think, was some kind of a, part of a welcoming committee or, or something there
    in Birmingham for the Freedom Riders when they got in. And I told him I wanted to go. And Wilson said, "Okay," said, "But,"
    uh, he started talking to me about nonviolence, and I didn't understand nonviolence. But when I bought the ticket, I had
    bought me a knife to go with the ticket, 'cause I'm going to protect myself on the bus. And, um, Wilson told me I couldn't
    go 'cause I didn't understand the concept of nonviolence. And I asked him what did nonviolence mean. He said, "This is
    when someone hits you, you can't hit 'em back." I said, "I don't think I want to do that." So, I got a refund for my ticket.
    And later on, I was seeing Wilson every, every night or every other night, coming into the, the, uh, A.G. Gaston [Motel
    and] Lounge, which was a special spot for, uh, my, uh, my friends and myself, my other girlfriends and myself. And, um,
    one night Wilson asked me, not long after that, did I want to go to a Student Nonviolent Coordinating Committee meeting
    in Atlanta? Well, the thought was, I said, "Well, I've never been to Atlanta before, [laughs] and now I'm going to get
    a chance to go free," and plus I wanted to learn more about what was going on in the Civil Rights Movement.
- speaker: Respondent
  text: And I told him yes, I left my knife at home [laughs], and everything is history after that!
- speaker: Interviewer
  text: That was your first big move towards direct involvement with SNCC?
- speaker: Respondent
  text: Yeah, that was the first, first big movement towards getting involved in the Move - in, in the Civil Rights Movement.
- speaker: Interviewer
  text: Yeah. Can - ?
- speaker: Respondent
  text: I came to the meeting -
- speaker: Interviewer
  text: Can we pause just there for a minute before we tell the Atlanta story? I want to ask a couple of things.
- speaker: Respondent
  text: When, when Mack Parker -
- speaker: Interviewer
  text: Excuse me. Excuse me one sec.
- speaker: Interviewer
  text: Ask the question again.
- speaker: Interviewer
  text: Okay, let me ask the question again. John was, was - um, I have a note, um, from the research that I did in preparing
    for this session that in the late '50s you had become, um, quite interested and considered joining and perhaps, um, did
    become a member of the Nation of Islam.
- speaker: Respondent
  text: Well, what happened is, um, I made my first, uh, contact with people in the Nation of Islam when Mack Parker was in
    jail before he was murdered. And they were the only - they had the Muhammad Speaks [Nation of Islam's newspaper], and
    this was the only paper that had, that had something meaningful about this man every day in the paper, even up till the
    time he was murdered and even after he was murdered. And this is what attracted me to them, because this was something
    visible that I had saw, saw going on - well, I saw something going on, I should say. And I started going to some of the
    meetings. And, uh, the thing about this was that, um, they weren't visible enough for me, you know. Maybe it just wasn't
    enough activity, uh, which, um, I'm not saying that what they were doing wasn't important. But it just - it just wasn't
    enough activity going on around it for me. Uh, I, I guess I wanted more action, and I saw more direct action with, uh
    -
- speaker: Respondent
  text: The, the civil - the, the sit-ins and, and the Freedom Rides, although I know CORE was a part, more a part of, uh,
    some of the, uh, fr - the Freedom Rides, itself and -
- speaker: Interviewer
  text: Sure. Sure.
- speaker: Respondent
  text: But the, the, the thing about, about this is they, they just - so, so, I went with what, what was more, more active,
    visibly active, than, uh -
- speaker: Interviewer
  text: Birmingham AL
- speaker: Interviewer
  text: Yeah. Can I ask you on the, on the - just before you were about to head for that SNCC meeting in Atlanta, what was
    your life like in Birmingham? What - can you describe the community, the, the things that, um, were taking up your time,
    the - what you were witnessing in the community?
- speaker: Respondent
  text: Well, I was riding the back of the bus. And I don't know, maybe - maybe this thing of living in Pittsburgh, uh, and
    living under different conditions might have made, made the difference, because, uh, when I went to Pittsburgh, and we
    got to, um, Cincinnati, I think, and my aunt told me I could sit anywhere I wanted to sit. But I still - it still didn't
    dawn on me, because you have to remember I'm only nine or ten years old, and sitting anywhere I wanted to sit, it really
    didn't - although in Birmingham, when I got on the bus, I saw the sign saying, "Colored," but it still wasn't, you know,
    didn't, wasn't as meaningful. But then, once I got to Pittsburgh and associating with other children is really where I
    learned a lot of stuff, because they were saying, "Don't say 'yes sir' and 'no sir.' It's 'yes' and 'no.'" And they were
    telling me about how to - I'd go to the store and ask for a "drink," a orange "drink." And they'd say, "Don't ask for
    a 'drink.' You ask for a 'pop.'" And I just found out just about four weeks ago [laughing] why they called it a "pop,"
    you know, what, what, what started them to calling these things a "pop." But anyway, [laughs] I, uh, I changed a lot there,
    and I guess the coming back to Birmingham and then going back to riding the back of the bus - and I went to an integrated
    school, now, in Pittsburgh, and it was different. It wasn't perfect, but it was different. And, um, this - I guess this
    is what, what motivated me to probably, uh, get involved.
- speaker: Interviewer
  text: Tell me about the, tell me the trip to Atlanta.
- speaker: Respondent
  text: Well, the, the, the trip to Atlanta, when I got to Atlanta, um, and I met people, uh, met people there, um, that eventually,
    um, I became friends with and affected my whole life, and especially in terms of the idea of meeting some decent white
    people, 'cause I had never met any decent white people to know them until I got to that meeting. I met,
