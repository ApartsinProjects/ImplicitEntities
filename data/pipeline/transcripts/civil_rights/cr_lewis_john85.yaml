collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: OK, what I would like to do John Lewis, when you, I'd like to ask you, when was the first time you felt like you were
    part of a movement rather than just an individual, but part of something a little bit larger?
- speaker: Respondent
  text: During the early part of 1960 I felt that I was involved in, in a real movement in a real crusade to bring about change.
    I had been involved in a series of nonviolent workshops in the city of Nashville, back in the fall and winter of 1959,
    but it was not until we start sitting in at lunch counters, at restaurants on a regular basis in downtown Nashville and
    I guess it was the latter part of February when I was arrested and went to jail for the first time. I knew then that I
    was involved in more than just a protest action but it was a movement, it was a crusade to bring about changes in American
    society.
- speaker: Interviewer
  text: All right I'd like to move forward now just a couple of years from 1960 to '63. There was a day in Selma called "Freedom
    Day" and I'd like to ask you what brought that about and what was the significance of it?
- speaker: Respondent
  text: Freedom Day in Selma, Alabama on October 8th, 1963, I believe was a turning point in the civil rights movement. We
    had witnessed at the March on Washington earlier, the Student Nonviolent Coordinating Committee call for "one man, one
    vote." We went to Selma to test that idea. We had witnessed the bombing of a church in Birmingham, a, a few weeks earlier
    where four little girls were killed, and we had made a commitment, we felt we had an obligation, and really a mandate
    to go to Selma where only about 2.1 percent of the black people of voting age were registered to vote. And on this particular
    day, hundreds of blacks lined up and stood at the county courthouse for most of the day and at the end of the day only
    about 5 people had made it in to take the so-called literacy tests. I can never forget that day. We met hostile law enforcement
    officials, Sheriff Clark and others stood there and later, some of us were arrested. But mostly elderly black men and
    women stood there all day in line and as several people from the outside observed, James Baldwin, Professor Howard Zinn,
    a historian, and others, but it was, it was the turning point for the right to vote.
- speaker: Interviewer
  text: Let's go forward a couple more years then to January 18th, 1965 and I believe you encountered Jim Clark again that
    day.
- speaker: Respondent
  text: On January the 18th, 1965 it was my, responsibility to lead a orderly, peacefully, march to the Dallas County courthouse
    in the heart of Selma, Alabama, for a group of people wanting to register to vote. And Sheriff Clark met us there, he
    said to me, "John Lewis, you're an outside agitator, and an agitator is the lowest form of humanity." And I said "Sheriff,
    I may be an agitator, but I'm not an outsider. I grew up only 90 miles from here. These people invited us to come and
    we're going to stay here until they are registered to vote." At that time he began to push and shove some of us and we
    were arrested and jailed.
- speaker: Interviewer
  text: OK now you were chairman of SNCC I believe at that time, but you were also very close to the SCLC. Talk a little bit
    about your dual role between SNCC and SCLC.
- speaker: Respondent
  text: As early as 1962, Martin Luther King, Jr. had invited me to become a board member of the Southern Christian Leadership
    Conference. As a liaison person between SCLC and the student, the young people in the student movement, particularly in
    SNCC. I was part of the Nashville Student Movement and the Nashville Student Movement was a part of the Student Nonviolent
    Coordinating Committee. So I served a dual role, I served on the board of the Southern Christian Leadership Conference
    and at the same time I was part of the executive committee of the decision making committee of the Student Nonviolent
    Coordinating Committee. And I kept a, I thought, a, a healthy, dialogue, or contact between SCLC and my colleagues within
    the Student Nonviolent Coordinating Committee. I thought it was important, because we saw the Movement as being one movement.
    SCLC with Dr. King and those of us within the Student Nonviolent Coordinating Committee and the other organization made
    up the Movement. We had our differences from time to time, we had our conflicts from time to time. But it was one movement.
- speaker: Interviewer
  text: Well, not everybody shared that feeling that it was all one movement and there were tensions between the organizations.
    That must have placed you in an awkward situation from time to time.
- speaker: Respondent
  text: From time to time, I, I did feel like I was pulled in different directions. I saw Martin Luther King, Jr. really,
    from the time that I was fifteen years old in the tenth grade in, in 1955 growing up in rural, Alabama, I saw him as a
    hero, as a symbol, as a leader, and early, long before the Student Nonviolent Coordinating Committee, two years before
    the sit in, I had developed a, a friendship with Dr. King going back into 1958. And he was like a, a big brother, a good
    friend. And I never openly or publicly disagreed with him. We did discuss and debate different things from time to time
    but in a sense he was my friend, he was my symbol, my leader, my hero and at the same time some of my colleagues and friends
    in the Student Nonviolent Coordinating Committee has different feelings about the action or the position of Dr. King.
- speaker: Interviewer
  text: We'll probably come back and talk about that again a little bit more, I would like to kind of go forward to the decision
    that SNCC made not to take part in that campaign or that march from Selma to Montgomery. There was this period of meetings
    about that I believe.
- speaker: Respondent
  text: Well, the Student Nonviolent Coordinating Committee had been involved in Selma long before 1965. I believe SNCC first
    went into Selma in 1962. Selma is part of a, as many of us came to know, a symbol of resistance. It's in the heart of
    the black belt. People live there with a great deal of fear - had a mean vicious sheriff in the person of, of Sheriff
    Clark. And people had worked very hard to organize people. We had had sit-ins at restaurants and lunch counters. People
    had organized efforts to, to register to vote. And early part of 1965 after the Selma campaign got under way, the campaign
    spread out in other parts of the black belt of Alabama. Jimmie Lee Jackson, a young black man was shot and killed for
    participating in a peaceful, nonviolent protest in a bedroom county, Perry county in the town of Marion, Alabama, only
    about thirty or thirty-five miles from Selma. And he was shot as he was leading this demonstration and he later died in
    a local hospital in Selma. And we made the decision, at least some people in SCLC and others made the decision that we
    should have a march. That there should be some type of protest from Selma to Montgomery. The first idea was that we should
    take the body of Jimmie Lee Jackson, to Montgomery and later it was decided that we should have a peaceful, nonviolent
    march, from Selma to Montgomery fifty miles away. On a Saturday night, March 6, SNCC Executive Committee, the decision
    makers in SNCC along with myself met in an all night meeting in Atlanta at a local restaurant in the basement of this
    restaurant debating whether we should participate in, in the march. And it was the decision of the Coordinating Committee,
    the decision makers that made up the Executive Committee of the Coordinating Committee that we shouldn't, participate
    in this march. Some people felt that a lot of people would get hurt. Some people started saying the SCLC would go there
    and have this march and they would leave town, and the people would be left, holding the bag. I took the position that
    the young people and people not so young that we had been working with, the elderly black men and women in the heart of
    the black belt, that we have been working with for many years now, for more than three years, wanted to march and we should
    be there with them. And the decision was made that if I wanted to go I could go as an individual but not as a representative
    of the Student Nonviolent Coordinating Committee. So I made the decision with three other members of that committee to
    leave Atlanta, early Sunday morning and we drove to Selma and slept on the floor of the, the Freedom House in Selma and
    got up later that morning and met with Andrew Young, Hosea Williams of SCLC and James Bevel of SCLC. At the Brown Chapel
    AME church and decided to participate. I felt I had an obligation, I had - gone to jail in Selma on several occasions
    -
- speaker: Interviewer
  text: OK, I'd like to move forward just a little bit more on that Sunday until you are actually out there on the march you've
    made a statement which will probably be on film or we, we have another option. But we have gotten you up to Pettus Bridge.
    I would like you to describe from the moment when you arrived at Pettus Bridge and started to cross, what, what you saw,
    what you felt.
- speaker: Respondent
  text: When we arrived at the apex of the Edmund Pettus Bridge, we saw a, a sea of blue, Alabama state troopers. About six
    hundred of us walking in twos. It was a very peaceful, orderly protest. And the moment we got in I guess, hearing distance
    or shouting distance of the state troopers, we heard one state trooper identify himself as Major John Cloud, and he said,
    "I'm Major John Cloud, this is an unlawful march, it will not be allowed to continue. I'll give you three minutes to disperse
    and go back to your church." And I would say in about a minute and, and a half he said, "Troopers, advance." And we saw
    the state troopers, members of Sheriff Clark, pars - posse on horseback from the Sheriff Department with bull whips coming
    toward us and they began to - trample us with bull whips and beat us down.
- speaker: Interviewer
  text: OK, pick it up with where they were advancing on you.
- speaker: Respondent
  text: The troopers came toward us with clubs - The troopers came toward us with billy clubs, tear gas, bull whips trampling
    us with, with horses. I felt like it was the last demonstration, it was the last - protest on my part, like I was going
    to take my last breath from the, from the tear gas. I saw people rolling, heard people screaming and hollering, we couldn't
    go forward, if we tried to go forward we would gone into the heat of battle, we couldn't go to the side, to the left or
    to the right, we would have been going over into the Alabama river, so we were beaten back down the streets of Selma,
    back downtown to the Brown Chapel, AME church. I don't know to this day, how I made it back to the church. I do remember
    being in the church and, and making a statement to the crowd that assembled there and I said something to the effect that
    I don't understand how President Johnson can send troops to Vietnam and can send troops to the Congo or to San Domingo
    and cannot send troops to Selma, Alabama to protect black people who want the right to register to vote, to participate
    in the democratic process.
- speaker: Interviewer
  text: Now you were also injured that day you were beaten. Do you remember being hit?
- speaker: Respondent
  text: I was hit by a club and later after going back to the church I was transported to the Good Samaritan Hospital in downtown
    Selma. I had a concussion and I stayed in a hospital there for three days.
- speaker: Interviewer
  text: OK I'd like to ask you still a little bit more about Pettus Bridge. On every demonstration there was always music,
    there was always prayer. But the thing that's outstanding about Pettus Bridge is that everyone stood there absolutely
    silently. Why was that time so different?
- speaker: Respondent
  text: Well, we, we felt and we, we sort of passed the word that it would be a, a silent protest. When the major gave the
    order that we turn back and go to the church, that it was an unlawful march, I communicated with Hosea Williams that we
    just stand here and we stood in a very orderly, very peaceful fashion. It was the best way to bear witness to what we
    felt so strongly about.
- speaker: Interviewer
  text: OK, would you like to just pick up where you were there?
- speaker: Respondent
  text: This was a orderly, peaceful nonviolent protest. After Major Cloud gave the order, that the march should go back to
    the church, that it was an unlawful march, we felt the strongest way, the most effective way, to bear witness to the truth
    was to stand there in a prayerful silent manner and we stood until we were beaten, tear gassed and, and knocked down.
- speaker: Interviewer
  text: What was going through your mind as you stood there during that time when Major Cloud is calling the minutes off,
    what went through your mind?
