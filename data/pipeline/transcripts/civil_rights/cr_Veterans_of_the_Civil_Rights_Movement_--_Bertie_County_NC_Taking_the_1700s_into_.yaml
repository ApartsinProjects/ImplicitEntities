collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: When did you first become involved in the Civil Rights Movement in Bertie County?
- speaker: Respondent
  text: When we began our North Carolina Black Belt campaign, I was Field Organizer for the Southern Conference Educational
    Fund. We started in Halifax County, which was west of Bertie. It was trench warfare, pure and simple. The county was tightly
    organized against any social change with groups like the Klan, Birch Society, and North Carolina Defenders of States Rights.
    We held grassroots meetings in Black and Indian communities, boycotts, and demonstrations, which led to a massive voter
    registration drive. Despite violence and economic reprisals, we won a sweeping voter rights victory in Federal Court in
    Raleigh, registering thousands of Blacks and many Indians for the first time since Reconstruction.
- speaker: Interviewer
  text: How did your work in Halifax County influence your efforts in Bertie County?
- speaker: Respondent
  text: The victories in Halifax spread news into other Black Belt counties, fitting well into our longer-term multi-county
    organization goal. I found myself speaking multiple times a night in churches across different counties. While sowing
    the seeds of activist organization in those areas, I concentrated our primary efforts on a county-by-county basis. Things
    moved fast and productively.
- speaker: Interviewer
  text: Can you tell me about the Civil Rights and Anti-Poverty Conference held in Bertie County?
- speaker: Respondent
  text: We organized a large-scale conference at the Indian Woods Baptist Church in early March 1965, in a rural setting in
    Bertie, which we had not yet officially entered. The conference was well publicized across northeast and east North Carolina.
    I lined up a fine array of speakers and workshop leaders, including my old friend Clyde Appleton for the freedom music
    dimension and Ms. Ella Baker as the keynote speaker. Although we arrived early and only the clergyman's car was there,
    a vast number of people arrived en masse just a little late. The conference drew 1,043 people from 14 counties and lasted
    from about 10:30 am deep into the night. It was hailed as a major success in the region and state.
- speaker: Interviewer
  text: What happened after the conference in Bertie County?
- speaker: Respondent
  text: At the conclusion, a key local leader, Rev. W.M. Steele, approached me and said emphatically, 'We want you here in
    Bertie. And as fast as you can come.' Steele had once been a rural school teacher but was fired for teaching students
    the intricacies of math and showing them how their sharecropper families were cheated by plantation owners. The next day,
    I met with Steele and others to begin organizing. We also met with the religious Elder of the county, who headed the Ministerial
    Alliance. The meeting was tribal in ethos; the Elder asked me personal and organizing questions, then warmly welcomed
    me with a handshake and prayer.
- speaker: Interviewer
  text: What were some of the challenges you faced organizing in Bertie County?
- speaker: Respondent
  text: The Bertie Klan, though not as strong as in Halifax, tried to mount an offensive but settled for cross-burnings. We
    had the initiative. A major issue was the County Board of Commissioners' refusal to approve Federal food commodities and
    the new Federal Food Stamp Program. Planters wanted neither to keep sharecroppers dependent, while urban merchants wanted
    food stamps for commercial reasons. We organized close to six hundred sharecroppers, Black and some Tuscaroras, and marched
    to the courthouse on the day the commissioners met, preceded by a written demand for commodities and stamps.
- speaker: Interviewer
  text: How did the county officials respond to your demands?
- speaker: Respondent
  text: The high sheriff and deputies watched us as we marched. An old white commissioner came out and asked if I was present.
    I raised my hand, and he invited me and local leaders inside. We negotiated for about an hour and a half, and the Board
    of Commissioners approved the entrance of both Federal food commodities and the Food Stamp Program. That was a good day.
- speaker: Interviewer
  text: What other outcomes resulted from your organizing efforts in Bertie County?
- speaker: Respondent
  text: There were many productive adventures. After Bertie, we moved into Northampton County and others. All of it worked
    out very well indeed.
