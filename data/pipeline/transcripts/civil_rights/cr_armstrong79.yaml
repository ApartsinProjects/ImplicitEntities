collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: When did you first get involved in the civil rights movement in Birmingham?
- speaker: Respondent
  text: I got involved back in the '50s. '56 and, you know, beginning in '56.
- speaker: Interviewer
  text: When did you first become involved in the civil rights movement in Birmingham?
- speaker: Respondent
  text: Back in '56, back when Shuttlesworth had first organized the Alabama Christian Movement for Human Rights. We met every
    Monday night from then on, on up through the '60s and to the civil rights bill and on and on through the integration of
    the schools and bus station and lunch counters and marches and different demonstrations.
- speaker: Interviewer
  text: You were saying that a lot of the kids who were involved in some of the demonstrations in the '60s have moved away
    from Birmingham. Could you tell me that they've moved away and then tell me why you think they've moved away?
- speaker: Respondent
  text: Well, a lot of them move away because they were - some of the kids was in the marches and the demonstrations, their
    name was, was on the list as, as - you call Communists, I imagine. That's what word they used. And they couldn't find
    job, because my kid was involved in that. And they never could get jobs because of their name being on wall and people
    knew who they were, because they was in marches. So they move away for - to find better jobs or jobs period.
- speaker: Interviewer
  text: So when and why did you get involved in the civil rights movement in Birmingham?
- speaker: Respondent
  text: In '56 and why? I've always concerned about the South and, and what was going on. I never was pleased with the things
    that happened round here. So I had a chance to do something about it, so I got involved. And glad I did.
- speaker: Interviewer
  text: What was Birmingham like in '56?
- speaker: Respondent
  text: It was, it's, it was prejudiced and segregation and kind of backwards and, well, in some places still is, but back
    in '56 it was worse though. And there was signs where a black couldn't go and, and there were signs all the way - wherever
    you went there were signs in your face. Or what color you were, like you didn't know what color you were. So these are
    things that we fought hard to destroy.
- speaker: Interviewer
  text: You mentioned something about what you said is the price - keep the same frame. You mentioned that, that you considered
    a lot of the suffering and things that you had to go through to have been the "price" for the things that you wanted.
- speaker: Respondent
  text: Yes. There was a lot of suffering and, and a lot of peoples, if you're speaking about a lot of peoples, they got,
    lost their jobs. And well, in my shape, I happen to be self-employed. It was, it was kinda rough with me because I've
    had confrontations with the Barber Commissioners and thing like that, but through it all that that I was able to survive
    because I was self-employed and my people supported me. That's helped me to stand which I am grateful to them who stood
    beside me while I was doing the struggling. They kept things going for me.
- speaker: Interviewer
  text: I was just wondering, could you, for people who don't know what a mass meeting is like, can you talk about what it
    was like to be in a mass meeting with all those people and the kind of spirit that was involved?
- speaker: Respondent
  text: Well, there was lot a movement some who can arouse people as to, you know, to keep their hopes and high and, and,
    keep themselves going. And, and they had a lot of information, knew how to protect yourself, and what we had to do because
    we were oppressed people and we knew that. So - we knew all our problems. So we just stayed together and sing and march
    and were jailed and spent our money and, and, and just - from, form each Monday night there was a mass meeting to carry
    on and the poor folks would walk around the table and put their dollars and dimes or whatever they had. So that these
    are the things that help us got to where we at today.
- speaker: Interviewer
  text: And what did you do when you found police? I mean did you see police in there?
- speaker: Respondent
  text: Yes, there were polices always at the mass meeting and taking notes. Even some of the mass meeting you had Fire Department
    come and try to intimidate you. Like somebody called them, you had a fire. I remember saying, that was nice we had the
    Fire Department come by without calling. Trying to disperse people, but peoples follow leadership, which we had a good
    leader, Fred Shuttlesworth.
- speaker: Interviewer
  text: Were you in the church the day that the fire department just sprayed the church and the church - the Sixteenth Street
    Baptist Church was all flooded in the basement?
- speaker: Respondent
  text: I wasn't in there, but I was there. The -
- speaker: Interviewer
  text: Could you tell us about that a little bit?
- speaker: Respondent
  text: Well, I was, you know, you were outside in a crowd, you couldn't really see, but all I knew they were pouring water
    in the - cause, I think, the hose knocked Fred Shuttlesworth down at that particular time.
- speaker: Interviewer
  text: Is there anything else you can think of that might be helpful for us?
- speaker: Respondent
  text: Well, maybe - I don't know. It's just like I say, you can't think it's so much that happened and time, twenty years
    makes a difference, you know. And, and this, I said - if you ask me questions, something can come forward you know and
    because something you hope to forget, because it was pretty rough. Because we, we used to have to follow each other home
    at night. Because of police on your trail, give you tickets, accuse of speeding, accuse of running the stop sign and all
    that kind of, so -
- speaker: Interviewer
  text: How did you feel as a parent? I mean, knowing that your kids were out there in the demonstrations, how did you feel?
- speaker: Respondent
  text: Well, I knew that the benefit will be mostly with them. So I felt good. And I was glad they were able to want to do
