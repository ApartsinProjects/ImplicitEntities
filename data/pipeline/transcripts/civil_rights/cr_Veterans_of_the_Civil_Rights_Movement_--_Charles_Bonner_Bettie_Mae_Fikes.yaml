turns:
- speaker: Interviewer
  text: How did you become involved in the Movement?
- speaker: Respondent
  text: I grew up in Selma, Alabama and also on a compound, just about 20 miles southwest of Selma, a little town called Orrville.
    Orrville is a total rural community, and just southwest of Orrville is a little settlement called Crumptonia. That's where
    I really grew up, on the cotton farm way down in the woods. Since around age seven I became aware of the extreme injustice
    towards Black people in the South, and I thought in the entire world. I couldn't understand why all the Black people were
    put down and all white people put them down. I couldn't understand why we were living in a weather-beaten house, and the
    man from whom we picked the cotton was living in a big, white mansion. I couldn't understand why the white kids had better
    school buses, they had better books than we did. And I couldn't understand why we were segregated, why we went to a little
    one-room school with a potbelly stove in back of my church, the Athens Baptist Church. Whereas the white kids went to
    a brick building, a brick school with a beautiful lawn, a manicured lawn. This discrepancy confused me. I couldn't understand
    why God would treat us this way, if indeed we are all God's children, as I had been told in my Sunday school classes in
    the Baptist church. I was told that the parents should not make any differentiations between children, and parents should
    treat all children equally, yet God was treating Black people much like they were an inferior group of people, and I couldn't
    understand this. Consequently I developed quite an anger with God, and with Jesus, like I didn't understand why Jesus
    was white. So these kinds of burning questions always lingered with me. Then one day in February of 1963, when I was 16
    years old, my good friend Cleophas Hobbs and I were walking, pushing my mother's green '54 Ford. I had custody of it,
    it had broken down and we were pushing it on Church Street heading southward towards Small Street, where I lived. This
    is in Selma, Alabama. It was a Sunday. And this young man walked up dressed in a yellow button down shirt, and a tie and
    a jacket, and he just started to push the car along with us. And simultaneously while we're pushing the car, he said he
    was Reverend Bernard LaFayette, he was from a seminary up in Tennessee. He had just moved to Selma, and he was from an
    organization called the Student Nonviolent Coordinating Committee, (SNCC) pronounced "snick." We pushed the car into the
    driveway, and then sat on the porch in my big, yellow house, which is right on the main thoroughfare and we talked with
    Bernard about SNCC and what SNCC was about. He explained that he was there to organize the students basically to register
    adults to vote, to teach them the literacy test. And that eventually we would engage in what he referred to as "direct
    action," we would demonstrate, we would go into the lunch counters that were segregated, we would go to libraries, we
    would to go to movie theaters, and we would go to demonstrate and sit in and undoubtedly be arrested and beaten. And that
    he was going to teach us nonviolence, teach us how to protect ourselves through this ordeal. And so we said, "Great, that's
    great, we're ready to do this." We were totally primed to take some action, against what my friend Cleo and I both saw
    as tremendous unfairness in the world. So that's what we did. We then started meeting at the Tabernacle Baptist Church.
    Bernard suggested that we go back to our high school and tell kids that he was in town. And organize the students. So
    my dear friend Bettie Fikes was one of the first people we told, and another friend of ours, Evelyn, and another friend
    Terry Shaw. And they immediately got on board with what Cleo and I were talking about, and went to the Tabernacle Baptist
    Church and met Bernard. And Bernard taught us various freedom songs such as "Ain't Going to Let Nobody Turn Me Around,"
    "Oh Freedom," and other songs that he had written, "Dogs, Dogs, Dogs", he and James Bevel had written. Bettie then became
    one of the major leaders in the songs, because she was always the star singer in our high school. So then we just went
    on to keep organizing the students in Selma, and we kept practicing principles of nonviolence, and we began to canvass
    the neighborhood, talking to Black folks about registration and teaching them how to fill out the literacy forms. So that's
    essentially how I got involved in the Movement.
- speaker: Interviewer
  text: Was Colia Lidell LaFayette with Bernard when you first met him?
- speaker: Respondent
  text: Yes, she was working with him.
- speaker: Respondent
  text: My name is Bettie Mae Fikes, and I am from Selma, Alabama and I got involved in the Movement there. As a high school
    student at R.B. Hudson high. I didn't have a clue what was going on around me in the adult world. I could only deal with
    what I was seeing from my own eyes, and I knew, I could tell there was something wrong, I just didn't know what. My mother,
    being a gospel singer, we traveled a lot, and traveling you get a chance to see different areas. It seemed like in each
    state the people lived differently, which I didn't understand. I still did not know that there was an issue between Black
    and white in Selma, because the white community, as far as I was concerned, were friendly to us, my godfather was a white
    man. So I really felt that there was no injustice until we moved to Detroit. My mother died in Detroit. And here am I,
    going to School in Detroit with white kids, sitting in the classroom with white kids. And that was not normal in Selma.
    After her death, I came back to Selma, but I left Selma after the funeral and came to California, and went to school in
    California. At 116th Street School in L.A. I'll never forget Mr. Foster, my music teacher, who just took me under his
    wings. But anyway I ended back up in Selma after clashes with the family, mother and father's side of the family fighting
    over me. And when I got back to Selma, I didn't go right into the arms of civil rights struggle, but I knew something
    was going on, I just didn't know what. And when my uncle and all of them would get together and talk about surrounding
    areas and things that were happening with the Blacks, and that kind of scared me, because they were also talking about
    war. So I was just looking for another war or something to break out. I believe they were talking about 1925, and the
    soup lines, and things like that. Around in the early sixties, I just needed an a venue to get out of the house to keep
    from going to church so much. This fellow here, Mr. Bonner, and my other dear friend Cle, was telling us about SNCC. And
    they got all of their friends that they knew involved. I was one of the friends they got involved. When it hit, it was
    like something that, you went to bed, like tonight, and you woke up the next day with a new world order. All of a sudden
    these people are coming to town and they're talking about voters' rights. I didn't even know that was happening, that
    our parents didn't have the right to vote. There were a few Black people that were registered, mostly in Selma. Lowndes
    County and all these surrounding counties were unregistered. So these are the things that brought me into the Movement.
- speaker: Interviewer
  text: Were you at that first meeting at Tabernacle Baptist Church when Sheriff Clark surrounded it?
- speaker: Respondent
  text: Yes, that was one of the very first mass meetings we had, the first mass meeting that Bernard and Colia organized,
    and it was primarily a tribute to Mr. Boynton, who had just passed. Sam Boynton, as you well know, was a stalwart leader
    in the Selma Civil Rights Movement before the Selma Civil Rights Movement was labeled a "Civil Rights Movement." Before
    SNCC came into Selma there was the Dallas County Voters League, a rights organization that was steered by Mr. and Mrs.
    Boynton and Mr. Doyle and Louise Foster and some other leaders in the Selma community. And they had been working on trying
    to get the right to vote in Selma, from what I understand, from back in the thirties and forties. So Bernard had come
    to Selma and met with them in December of '62, and explained to the local leaders that he was going to come back to organize
    in Selma. SNCC had just been developed and they were dispatching field secretaries out throughout the South at this time.
    Ella Baker had urged these young college students to form their own organization in response to Dr. King's call for students
    to organize and to become a youth organization of SCLC. And apparently Ms. Ella Baker thought that the young people, rather
    than becoming a part of SCLC as its youth organization, should just form a whole separate organization, and they formed
    SNCC. They elected James Foreman as the Executive Secretary. And then James Foreman began to dispatch field secretaries,
    as they were referred to, such as Bernard throughout the South. So Bernard organized his first meeting in honor of Mr.
    Boynton, who had passed away. And Sheriff Jim Clark surrounded the church, but the most dramatic thing that happened was
    a group of white men drove up in a truck, and each one was armed with an axe handle. They were actually table legs, they
    worked at the table factory there in Selma, and they had each come out with these round table legs. And they were going
    to attack us as we left the church. And they got out to attack us, and just as they were getting out of the truck, another
    white man drove up, and told them to get back in the truck and leave. I learned recently in Selma that that white man
    was one of the teachers at the white high school, the then white high school known as Parish High School. The first meeting
    was very tense, it was at night, we had never had a mass meeting before. We didn't know what a mass meeting was. There
    was a lot of singing, a lot of praise to Mr. Boynton, a lot of discussion of the need to organize, to challenge the segregation
    laws, the apartheid laws, but most importantly, the need to register people to vote. And it was energizing, and it motivated
    everyone, particularly the students, to get involved in the Movement and to really try to get Black people registered
    to vote. We weren't focusing at this time on integrating lunch counters per se, we were still meeting in the basement
    of Tabernacle, and we were still taking lessons in nonviolence. How to duck, how to dodge, how to lay on the ground and
    go limp. How to cover your head up if you were being beaten. And how not to strike back, which is the biggest lesson of
    all because, Cleo and I, we were quite violent as kids, we fought like every other kid did, and we all had little groups,
    and the concept of being nonviolent and not hitting back when somebody hit you was a very difficult and most foreign concept
    to us. But Bernard, who was not that much older than we were at the time, he was 22, we were 16, he really impressed upon
    us the power of nonviolence by using examples of Dr. King and Gandhi and Jesus and showing us how those people had been
    victorious and they were a beacon in history, whereas the people who went out and engaged in violence were not. And so
    that is a compelling reason. And also the fact that if we had been violent, we were going to be wiped out. So that was
    the most compelling reason to be nonviolent.
- speaker: Interviewer
  text: Did you talk at all about also the Nashville Movement and what they had done in Nashville?
- speaker: Respondent
  text: Yes, exactly. He talked about Nashville, and how SNCC had evolved out of the Nashville Movement. That he and John,
    Congressman John Lewis, and other students such as Diane Nash and the Mayor of D.C, Marion Berry, how they all had been
    students, some of whom had been seminary students, but others were just students there at the university, and how they
    had organized their demonstrations, and then ultimately created SNCC. And that some students had gone and worked with
    SCLC, and others had completely dedicated themselves to SNCC.
- speaker: Respondent
  text: The next really eventful thing that happened in the Movement in the early phases in Selma was September 16th, 1963.
    This is some six months after Bernard first came in. That was the day following the September 15th bombing of four girls
    and the two boys in the 16th Avenue Baptist Church in Birmingham. Colia had gone to Birmingham just prior to the bombing
    because the kids were being hosed down, and beaten, and Bull Connor was turning the dogs loose on the kids, and so Colia
    went up to Birmingham to assist the SNCC workers with that calamity that was going on up there, and Bernard stayed back.
    But Bernard had received a message that Colia had been hosed and he was extremely concerned because she was pregnant.
    So Bernard had also left Selma before September 16th and had gone up to Birmingham to assist Colia, his wife. Meanwhile
    the bombing happened and it was all in the news, and Cleo and Terry and I got together, decided we should respond to this,
    we should take some action in response to this bombing. And we talked to students, we all got together at the Tabernacle
    Church, and we decided we should have a demonstration. We called the SNCC office, the SNCC office at that time was located
    at 8 1/2 Raymond Street in Atlanta, and we tried to get Julian Bond, we tried to get someone to come down, some adult,
    to help us carry out what was going to be our first demonstration, we had never had a demonstration. We couldn't get anybody
    to come down, so we did it anyway. And that's the occasion when Willie C. Robinson went in to Carter's Drug Store along
