collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Where were you from before you came to Mississippi?
- speaker: Respondent
  text: I was from Harlem, New York and I was born and raised there.
- speaker: Interviewer
  text: Where did you go to school?
- speaker: Respondent
  text: I went to New York City school system and then to Hamilton College which is a small college upstate New York and then
    did some graduate work at Harvard.
- speaker: Interviewer
  text: Did you complete your master's or PhD or what?
- speaker: Respondent
  text: I completed a masters in philosophy.
- speaker: Interviewer
  text: When did you first come to Mississippi?
- speaker: Respondent
  text: The first time was in the summer of 1960. I was working on a tour for SNCC and I went through parts of Alabama and
    Mississippi, Louisiana, to get students to come to a conference. That was to be the first fall conference in the fall
    of 1960 and they would—
- speaker: Interviewer
  text: Was that in Raleigh?
- speaker: Respondent
  text: Atlanta. The Raleigh conference was the spring of '60 and then they planned at that conference to have another one
    in the fall and I went and got names of people to come to the conference.
- speaker: Interviewer
  text: When did you decide to work full-time in Mississippi?
- speaker: Respondent
  text: Well, when I was in Mississippi that summer, I talked to a person named Amzy Moore, who was with the NAACP in Cleveland,
    Mississippi, about possibilities of a voter registration project in the delta. He was very interested in that. He wasn't
    really interested in the sit-ins and integration of lunch counters and so forth. So we mapped out the areas where a voter
    registration drive could take place and an idea for a program which I sent back to the SNCC office in Atlanta. And I decided
    later on that summer that I would come back and work on it.
- speaker: Interviewer
  text: On voter registration?
- speaker: Respondent
  text: Right. So I came back the following year, July of 1961, back to Cleveland to start to work on this program and it
    turned out that it was easier to start in McComb so I went down there and that's when we started what people consider
    the first phase of SNCC voter registration project in Mississippi.
- speaker: Interviewer
  text: Could you trace your activities or the events of 1961-2-3 that lead up to the official MFDP? Is that too broad a question?
    I'm not exactly sure how to scale it. I don't know very much about it.
- speaker: Respondent
  text: There are some, I think, key stages that you can trace that will help you. One was simply an initial stage of an exploration
    of whether or not you could make sense of, say, a person like myself coming and living in a community and conducting a
    voter registration campaign, and whether it was possible to get people from the area to work. My feeling, after the initial,
    now say, program in McComb which lasted about four months, was that that was worthwhile, that you could do that. You could
    get local people to work with you and finally that you could get young people to leave school and work. So out of that
    first campaign we did get Curtis Hayes and Hollis Watkins as field secretaries, who had just graduated from high school
    and instead of going on to college right away decided to work for a year. And they went into Hattiesburg to start a similar
    campaign. So that the idea of developing a group, a force of young people from Mississippi, who would spread out into
    different areas of the state and begin to work on the voter registration really took roots out of that first program in
    McComb.
- speaker: Respondent
  text: So even though that program hadn't actually registered anyone, you got about thirty-six people to go down which was
    in itself a huge breakthrough because in the last ten years you hadn't gotten twenty people who had attempted to register.
- speaker: Respondent
  text: So the next year was really—you can look in one sense upon the development from '61 through until say '63 fall of
    '63 as a process in which you were working at that level. That was you were consciously trying to build a group of young
    people in Mississippi who would work and view themselves as having the right to work on this kind of problem. That it
    would become something that was legitimate for young people to do and that, in fact, it was a kind of work for young people
    and the most pressing work to be done, more important, say, than going through school in four years. And for some, more
    important than continuing school, like Guyot, for instance, had finished Tougaloo and was planning to go to law school,
    but I think altered those plans with the idea that it was more important to work than to go on to law school.
- speaker: Respondent
  text: So that a certain tone, rationale, spirit, I think, began to develop in those years among some of the young people.
    And that, at the end of two years you had about twenty-five or thirty young Negroes between the age of 18 and 26 who were
    from Mississippi, who viewed themselves as some kind of unit, who identified with SNCC in terms of organization of national
    identification and who identified with each other in terms of, sort of working in Mississippi context, of being from Mississippi
    and more or less thinking that their job and even their life's work would be to work to make some sense out of living
    in Mississippi.
- speaker: Respondent
  text: It was on that base that all the other work rose, the organization of COFO, the organization of the Freedom Democratic
    Party, the coming in of the Mississippi Summer Project, and the running of political campaigns. I think the real one,
    I'd say, in terms of a thesis, to find out what, writing a history of MFDP or any of those organizations that one thing
    that would be important to do would be to get the list of those people starting with Curtis Hayes and Hollis Watkins,
    Louis Peacock, Sam Block, Lawrence Guyot, James Jones, McLaren, and others who were part of that initial group and who
    are still working, who are now, either—they're in school, some of them, some of them are running some of the organizations
    in Mississippi. And really, their history, which is, I think the kernel of a lot of the history of these organizations,
    more so than say volunteers or people who came in from the outside.
- speaker: Respondent
  text: 'Now watching that grow—what your first, was the development of a relationship between some of those people and some
    people in rural areas in different parts of the state: The Steptoes and others, Weathersby and other people in the county,
    Mrs. Hamer, MacDonalds and some other people in Sunflower County, some of the people in and around Forrest County and
    around Hattiesburg.'
- speaker: Respondent
  text: The initial base—you see I think you tended to have two prongs. That is, as a base in the young people, a small group
    of them conceiving themselves as workers, full-time, and developing a certain kind of mobility, moving out, usually, from
    the area where they lived to some other town and then some of them moving from area to area. And then the people that
    they initially worked with being by and large not from the city such as they were in Mississippi, but from rural areas
    and then by and large not from the plantations initially, but from the small independent farmer who had their own little
    plots of land.
- speaker: Respondent
  text: The other thing which entered early. In fact, the next program that I personally worked on after the McComb program
    was a program, a political program where Reverend Smith, who was from Jackson, ran for Congress on the Democratic primary
    ticket. He announced in January of 1962. So it was about 6 months after I first came. The election wasn't until that June
    but we used the whole winter and spring to campaign and to do voter registration. At that time, of course, there was no
    chance of winning. There was no chance of polling any votes; no one was registered. But there was a chance of raising
    the issue of voter registration of more organization—they set up campaign committees—getting on TV with the equal time
    provision and so speaking to white people as well as Negroes, and of operating over a Congressional district. So in essence
    what happened was we pulled out of McComb and operated in a wide political unit which included McComb as a subdivision
    of the Third Congressional district and continued with the voter registration program that we had begun in McComb.
- speaker: Respondent
  text: I think that, for me, that experience led to a feeling that in the whole area of politics there was room which wasn't
    available in an area, say, just of voter registration. Because, for one thing, you could get on TV. For another, local
    person felt he had a right to run so you had the whole platform for projection of a local person as opposed, say, to the
    organizers for civil rights organization and that kind of thing. And in response to that projection, other local people
    who knew him would feel like they could come out to support him, whereas they would maybe be reluctant to support SNCC
    as a civil rights organization. So that you had a whole new dimension for organizing around the direct involvement in
    politics, even though there wasn't a chance of winning.
- speaker: Respondent
  text: So that was where, I think that first idea came of the direct political involvement and, of course, out of that the
    whole question about political party was raised out of that campaign. I mean certainly in my own mind I began to think
    through what was a political party, how does a political party get formed, what is the structure, what's the base, all
    those questions which had never really been real questions for me before. Then Smith, after the campaign was over, went
    on to try and develop democratic clubs in the different counties where he'd gotten a hue for the campaign but they later
    faded. There was no real manpower to work on them. So that didn't take hold at that time.
- speaker: Respondent
  text: I guess the other thing which was important out of that was that you began to lay a base for a cooperation of different
    civil rights organizations in a program. Because around such a campaign there was a basis for the people who were in working
    with SCLC and the people who were in working with SNCC and with CORE (not overtly NAACP because at that time they were
    taking the position that they couldn't participate directly in politics) to work together on a given program, as opposed
    to the kind of thing you get where a given organization has its program.
- speaker: Respondent
  text: At the same time, in response to Reverend Smith's campaign, you had programs in the delta Mississippi—they ran Jill
    candidates, too. First Reverend Tremel and then he suffered a heart attack during the campaign and died and then Reverend
    Lindsay took his place.
- speaker: Interviewer
  text: This person?
- speaker: Respondent
  text: Merrill Lindsay. I've forgotten Tremel's first name.
- speaker: Interviewer
  text: Reverend, where is he?
- speaker: Respondent
  text: Reverend Lindsay's in, out of West Point, Mississippi now.
- speaker: Respondent
  text: James Bevel, who was with SCLC at that time, worked with and supported Rev. Lindsay's campaign in the delta. Some
    of the others of us were working in the southwest part of Mississippi.
- speaker: Respondent
  text: The next development, the next stages in the summer of '62, in the meantime the program was the voter registration
    program which consolidated around and through what we call COFO began. Now COFO had its start in the summer of '61 when
    a whole slew of organizations got together to seek a meeting with Barnett under the leadership of Rev. Smith, Medgar Evers,
    Aaron Henry. They set up what they call the Council of Federated Organizations to present a united front to Barnett.
- speaker: Respondent
  text: No. SNCC wasn't, didn't even have a base in Mississippi at that time, in the summer of '61. I was in McComb. I didn't
    even know about COFO or about the meeting with Barnett.
- speaker: Interviewer
  text: There was no office then, even have a base?
- speaker: Respondent
  text: Not only not an office, no program, no people who knew or worked or identified with SNCC or anything. Not because
    we... SNCC program started in McComb in July of '61, and this group had formed in the spring when the freedom rides came
    in.
- speaker: Respondent
  text: In the winter some of us, we had a series of meetings with Aaron Henry, Medgar, and other people, Dave Dennis of CORE,
    around the concept of a unified voter registration program in the state or a program where the different organizations
    would be complementing, not warring, or anything like that. The feeling was that COFO was as an organizational form, was
    a form through which such a program could be channeled.
- speaker: Respondent
  text: In part there was another focus of pressure from what was the Voter Education Project then, which funded money to
    put into voter registration and the question was how should that money be channeled in Mississippi and so forth. There
    finally was some agreement to channel it through COFO, as an organizational structure, with myself as field director of
    the voting program, with Dave Dennis as an assistant from CORE, and with Aaron Henry as the president of COFO.
- speaker: Respondent
  text: There was, of course, that at that time then COFO essentially then had a staff, and what happened was the group of
    young Mississippi people that I referred to before became the staff for COFO's voter registration program. Essentially
    then, that staff then identified with each other and SNCC and there were a few that identified with Dave Dennis and CORE,
    but the bulk of the staff from the beginning were these young people who were primarily identified with SNCC. They all
    made up the staff of COFO's voter registration program.
- speaker: Interviewer
  text: How many were there?
- speaker: Respondent
  text: At that time there were about thirteen.
- speaker: Interviewer
  text: All local people?
- speaker: Respondent
  text: There was myself, just me, I guess. Dave Dennis was from Louisiana. Otherwise the rest of the staff was from Mississippi.
- speaker: Interviewer
  text: Any high school people?
- speaker: Respondent
  text: They had finished high school, Curtis Hayes and Hollis Watkins from McComb and McDowell was from McComb. We had Guyot
    who had finished college; McLaren and James Jones was from Jackson and had finished high school; Willie Peacock and Sam
    Block. Sam was from Cleveland and Willie was from Charleston. Sam finished high school and Willie was in college at the
    time. He had finished high school, he was from Jackson. We had some others.
- speaker: Respondent
  text: Well, that summer worked about 10 areas of the state under this COFO program. Most of them located in the delta, then
    a project in Jackson, Mississippi, and Hattiesburg. That work continued really, well, there was an initial project which
    started that summer, went for a few months just through us, as the summer program. Then after the summer there was another
    meeting and a decision to continue our program through the year with some differences in the administration of funds and
    things like that, and some of the projects were cut out. Those programs continued through the fall of '62 and on into
    the summer of '63.
- speaker: Respondent
  text: It was in that period that you began to get a different form.
