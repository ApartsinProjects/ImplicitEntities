collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: 1963 was the centennial of the Emancipation Proclamation and started the year Governor Wallace pledged Alabama to
    segregation forever. As you prepared for Birmingham, did those thoughts kind of enter your mind, those other events?
- speaker: Respondent
  text: Well, it does, but I guess by '63 we were pretty confident that we had developed a science that would allow us to,
    to eradicate segregation in that it was incongruent, you know, with the basic tenet of our Constitution. So, as I hear
    that statement, the statement that Wallace made that segregation is forever, we had tested the science of nonviolence
    in other cities and we knew that it was comparable - incompetent to deal with their problem.
- speaker: Interviewer
  text: What made Birmingham a city to focus on?
- speaker: Respondent
  text: Well, it had a reputation equal to the Mississippi - Birmingham had a reputation equal to the Mississippi Delta in
    terms of its brutalization of people. It was known for its - Bull Connor, its police department, its violation and bombing,
    and denigrating black people and it was very resistant city. Klan, a lot of Klan activity. A lot of suppression. And so,
    that made it special because the greater the resistance in the application of the science of nonviolence, the clearer
    the issues become for the onlooker.
- speaker: Interviewer
  text: So, are you saying that in order for nonviolence to work, it has to be met with violence?
- speaker: Respondent
  text: No, I said that it, it crystallizes when it's like contrasts. You have a better means of showing and revealing and
    bringing out the contradiction when there is an adamant attitude in people about superimposing their attitudes upon other
    people. So that you get a better contrast when you have people who are very adamant about that.
- speaker: Interviewer
  text: You've talked about the oppression of a city like Birmingham, Bull Connor's reputation and things like that. I want
    to move forward to the point where you decided to involve children. I mean, if it was such an oppressive environment,
    wasn't that kind of risky to involve children?
- speaker: Respondent
  text: Well, in terms of the nature of the situation because of the intense suppression and the conditioning of the adults,
    it was necessary to use children because children had not been indoctrinated into that kind of violence and suppression.
    So they could come on the situation with a fresh approach. But it wasn't particularly dangerous from our point of view
    of using children. At that particular point children were in Vietnam. Guys seventeen was in Vietnam and our thinking was
    that if a young person could go to Vietnam and engage in a war, then the person certainly the same age and younger could
    engage in a nonviolent war that didn't violate the constitution of the people, property, and that when you use that method
    the chances of getting injured is very little anyway.
- speaker: Interviewer
  text: OK, you mentioned children of seventeen being in Vietnam. You were actually dealing with children who were much younger
    than that though.
- speaker: Respondent
  text: Yeah, we were dealing with children, six, and those who took the position that they were - wanted to involve themselves
    - that they themselves understood the nature of love and its power, and wanted to demonstrate that love and its power,
    then we permitted them to become involved.
- speaker: Interviewer
  text: Let me back up just a little bit. You talked about the indoctrination of adults. What was the adult thinking, because
    I know that you had many of the black leaders involved with the demonstrations, but what did the population in general
    feel?
- speaker: Respondent
  text: Well, they felt that segregation would probably be - in '63 in Birmingham most adults felt that segregation was permanent.
    That it was just that way. That was a permanent system. It would probably be that way that. The power of the city, the
    power of the state, the power of the Congress, the Marines, the Army, the Air Force, they see all that as alignments of
    power, and they saw it as an impossible situation. And so, most of the adults felt that nothing like that could change
    probably, except if Russia or China invaded and destroyed America, or something like that, but people didn't think that
    there was a force or a power within the country strong enough to offset something as entrenched and as reinforced as segregation.
- speaker: Interviewer
  text: The adults must have had a great deal of fear.
- speaker: Respondent
  text: Yeah, well you'd had people's homes and churches bombed. People had been lynched and killed and there was no process
    by which you could gain redress to your grievances because - We just ran out - The - when in Alabama in '63 the fear was
    entrenched because the people had come out of a social system wherein they had no way to redress any of their grievances.
    Lynchings, bombings, so that there was a tendency not to do anything that would aggravate or cause state violence to be
    upon the people. So, they had a conditioning, and so you had to get people who had not experienced all of that and who
    had confidence in themselves and in the - in our system of law. And the young people were susceptible to that principle
    that the attitudes and opinions of white people did not constitute law. That was simply tradition and custom and that
    we had to live according to the New Testament and the Constitution and if we did, then we would forge in law rather than
    having to live by the attitudes and opinions of the people, of the dominant people at that point.
- speaker: Interviewer
  text: OK, but if the people, if the adults were so fearful, it seems to me that you became a pied piper in a way of taking
    these children away. I can't believe that the parents were supportive of their children getting involved with you.
- speaker: Respondent
  text: Well, they was - we had workshops and we had mass meetings.
- speaker: Interviewer
  text: OK, tell me about the adult response to your use of the children.
- speaker: Respondent
  text: Well it was good. A lot of adults would come out. One of the things we were interested in was getting the American
    black community involved. And in a city like Birmingham, you can't hardly go to a church, say in Chicago, where there
    is not a member in that church that is not related to Birmingham. So if you put several thousand children from Birmingham,
    say in jail, you sort of affected the religious community in Cleveland, Philadelphia, Chicago, Cincinnati, so you wanted
    to get the black community involved in it. We wanted to get the black community in Birmingham involved and the way you
    get the people involved is get their children involved. A lot of people were afraid to come to mass meetings in terms
    of the - the Alabama Bureau of Investigation would be around taking pictures and harassing people. So when the children
    became involved, they became involved, which meant they started coming to workshops and mass meetings. And our position
    was, rather than, kind of, get your children out of the movement, join the movement with your children. That the reason
    we had was faced with segregation because they themselves hadn't assessed the responsibility of breaking the attitudes
    and the patterns of misbehavior, say from their parents, and if the students didn't break those patterns then they would
    live a life of degeneracy in that kind of state. So, it was like the parents pretty much agreed that, and most parents
    even when it's dangerous and risky, they have a deep sense of appreciation and respect for young people when they're doing
    what's right. I mean, all of them knew it was potentially dangerous, but they knew it was honorable, and they knew it
    was noble and they knew it was right. So they didn't fight against it. And then you had myself, and Fred Shuttlesworth,
    Abernathy, and Martin King preaching, and it's very difficult to go against the logic and the reasoning of a preacher
    who is really in the - about the business of preaching and all.
- speaker: Interviewer
  text: All right, let's just go on. Tell me, tell me a story about what it was like when you started to train all those children.
    You had thousands of children that you were trying to train. There must have been some funny incidents.
- speaker: Respondent
  text: Well, what happened - I had come out of the Nashville movement and the Mississippi movements where we had basically
    used young people all the time. And, well, at first King didn't want me to use young people because I had eighty charges
    of contributing to the delinquency of a minor - minors - against me in Jackson, Mississippi for sending young people on
    the Freedom Ride. Well, that was about five to ten, twelve people would go on demonstrations each day and my position
    was well, you can't get the dialogues you need with a few people. Besides, most adults have bills to pay, house notes,
    rents, car notes, utility bills, but the young people wherein they can think at the same level are not, at this point,
    hooked with all those responsibilities. So, a boy from high school, he get the same effect in terms of being in jail in
    terms of putting the pressure on the city as his father and yet he is not, there is no economic threat on the family because
    the father is still on the job. So the strategy was, OK, let's use thousands of people who won't create an economic crisis
    because they're off the job, so the high school students was like our choice. And we brought that to them in terms of
    you're adults, but you're still sort of living on your mamas and your daddies, so it is your responsibility in that you
    don't have to pay the bills, to take the responsibility, to confront the segregation question. And what we did, we went
    around and started organizing say like, the queens of the high schools, the basketball stars, the football stars, so you
    get the influence and power leaders involved. And then, they in turn got all the other students involved. Because it was
    only about, like I said, 15 adult people a day demonstrating was willing to go to jail because the black community did
    not have that kind of cohesion in terms of a camaraderie. People knew each other, but only in terms of on their way to
    jobs, on their way to church, but the students they have sort of community they'd been in for say, ten, eleven, twelve
    years since they were in elementary school, so they had bonded well. So if one went to jail, that was a direct effect
    upon another when because they was classmates. Wherein parents, people live in the community do not have that kind of
    closeness. So the strategy for using the students was to get the whole involvement. To help them overcome the crippling
    fears of dogs, and jails, and to help them start thinking through problems on their feet, to think through a living problem
    causes you to think. Wherein if you're just reading books and referring, but once you get involved, you have to think.
- speaker: Interviewer
  text: OK. Now you're telling me a lot of the philosophy, but what - what happened when you brought these kids together.
    Did you have - I know there's a story in here somewhere. What happened when you finally said, OK, I need some good volunteers
    here.
- speaker: Respondent
  text: Well, first thing we did, we got to - there's a film, "The Nashville City and Story." I don't know whether you've
    seen it or not. It was NBC White Paper. We would show that film in all of the schools, and one of the things that I was
    - I guess the difference that - that we approached was that you are responsible for segregation, you and your parents
    because you have not stood up. In other words, our position was that according to the Bible and the Constitution, no one
    has the power to oppress you if you don't cooperate. So then if you say you are oppressed, then you are also acknowledging
    that you are in league with the oppressor. Now it's your responsibility to break league with the oppressor. If you don't
    second his motion on what's wrong, his motion on what's wrong will die, and you make a motion in terms of what's right,
    and second your motion, and that motion will become alive. So it was like, as long as you go along with segregation, you
    second Bull Connor's motion. So don't second his motion. Put your own motion on the floor. The fact that schools and business
    shouldn't go on as usual as long as you're involved in being oppressed.
- speaker: Interviewer
  text: Tell me about the kids. How did they respond?
- speaker: Respondent
  text: They responded beautifully. Well, your first response is like the young women. I guess, from about thirteen to eighteen.
    They're probably more responsive in terms of courage, confidence and the ability to follow reasoning and logic. So nonviolence
    to them, it's logical that you should love people, you shouldn't violate people, you shouldn't violate property. There's
    a way to solve all problems without violating. It's uncomfortable. It's inconvenient. It's immediate threat upon you,
    however, if you maintain your position, the threat goes away. So that kind of logic fits very well with young people who
    are not engaged in a -
- speaker: Interviewer
  text: OK, so young girls thirteen to eighteen, they were pretty good. Who was the next group to respond?
- speaker: Respondent
  text: Then the elementary students. They can comprehend that. And of course, I guess the last guys to get involved - most
    of them was finally got involved - is the high school guys, or the last days because the brunt of the violence in the
    South was directed towards the young males. So that the females had not experienced that kind of negative violence even
    the white males as readily as they, the young black males did. So they didn't have the kind of immediate fear say of white
    policemen, as the young men did. So their involvement was more spontaneous and up front than say, the guys -
- speaker: Interviewer
  text: I don't want to philosophize about this too much. I want something visual, that if you can describe how the kids responded
    or behaved. Can you do that?
- speaker: Respondent
  text: Now, say in a nonviolent movement - I think King makes a statement that it's not like punching a bunch of buttons
    and you get automatic response - people with all their frailties make up the matrix of a movement. So if you have a philosophy,
    you have in any movement all the divergent attitudes and emotions, and people bring all their problems with them. And
    so you don't in a, say a movement dynamic have the absolute discipline which you have. You have the spirit of discipline
    -
- speaker: Interviewer
  text: OK, OK, but you're giving me philosophy again. I want to know what the kids did. Did they run down the street? Did
    they run around the cops? Did they do something like that?
- speaker: Respondent
  text: Yeah, well, see all of that was like, all of that was part of within the tactical scope of
