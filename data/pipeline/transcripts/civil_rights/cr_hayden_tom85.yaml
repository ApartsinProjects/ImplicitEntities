collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: OK. Who was Tom Hayden in '61? The student at Michigan. Tell me about him, tell me the things he was concerned about.
- speaker: Respondent
  text: Well I was one of the students in the last great age of apathy on the campuses in the late 1950s and I was an idealist
    with nowhere to go, with no outlet that I knew of. I therefore was a student editor. I was - I wanted to be a journalist.
    I wanted to cover issues and world affairs. And several things happened that, I guess, made me put down my pencil and,
    and become an activist. One was the - simply the, the arrival of John F. Kennedy and his presidency. I became involved
    in the first group to advocate the Peace Corps in Ann Arbor and candidate John Kennedy listened. He legitimized the idea
    that youth had a role to play in history which is very important. But, I think, far more fundamental in shaping my attitudes
    was the emergence of students, primarily, of course, black students in the South who were marching, getting beaten, getting
    arrested for what they believed. And I believed in civil rights but it was not the issue that attracted me, it was the
    commitment, it was the sense of taking their lives in their hands that made me wonder what I was doing being neutral and,
    and made me look more deeply into what I ought to be doing. And, and become an activist.
- speaker: Interviewer
  text: OK, talking about the, the Southern students and that, that movement, can you begin to talk about how, being more
    specific in terms of what kinds of changes began to start taking place in terms of Northern students, what kind - what
    did it represent to them, that movement in the South?
- speaker: Respondent
  text: Well, the movement in the South represented the first great student action in decades and the first assault on the
    pillars of segregation in, in a hundred years by, by mass action. And it was very stirring and, and it mobilized a lot
    of conscience in the North. Most of the students in the North were restless under their apathy and they wanted to do something
    and here was an opportunity. Some started helping in the boycott by picketing Woolworth's or Kresge's in the North and
    that had an effect. Some became more involved in their own backyards in tutorial for kids in the, in the slums in northern
    cities. Some became involved in fundraising, send the money to SNCC or to SCLC in the South. And gradually some started
    to make the commitment to go south. I was one of those. I wanted to be there in the front lines.
- speaker: Interviewer
  text: Was there at, through that example, say, the students in the South, was there something that that kind of said to
    students in the North yeah this is something that is a part of me too. There was - was there some sort of affinity, something
    that connected there? Talk about that.
- speaker: Respondent
  text: There was a closeness between the students all over the country though obviously the leadership was being taken by
    black students in the South. I, I think it was not simply a race issue, it was a generational issue, that it was our time
    to do something that past solutions had failed that the old institutional remedies, like going to the courts, were exhausted
    and that it was time to go into the streets. And that no one would do it unless young people did it. And that had a very
    strong appeal across racial lines to students all over the country I think.
- speaker: Interviewer
  text: OK. Talking about John Kennedy at this time and, and you were talking about the Peace Corps and, and how you represented
    a sense of optimism. Can you talk a little bit more about that in terms of students in general and what he represented
    to, say, the student movement at that time?
- speaker: Respondent
  text: Well, I, I think at the time John Kennedy was, was thought of as a generational symbol because he too spoke of the
    need for a changing of the guard. And, in terms of the image, there was a great difference between a young, aggressive,
    activist, presidential candidate as against President Eisenhower who had seemed to be older to be representative of the
    silence and the apathy in the country. At least that was the image. And so Kennedy, by his very presence in the race in
    the election campaign, tended to mobilize and excite young people. And he did so mevery specific things. He met with students
    from Ann Arbor and endorsed the proposal for a Peace Corps, which these days might, might not seem like much, but then
    it was, it was saying that students could play a mature, serious role in the world, and that was extremely important.
    And he did so despite the fact that we didn'thave the eighteenyear-old vote. Secondly, when Dr. King was in jail he placed
    a phone call to Mrs. King. That too seems minor in the historical landscape, but it made all the difference in terms of
    the, the black vote and the liberal vote in the country from north to south, and was seen at the time as a, as a, as a
    major sign of commitment, and probably won John Kennedy the election. I don'tknow what -
- speaker: Respondent
  text: '- what else we wanna - let me say one other thing about it. The -'
- speaker: Interviewer
  text: Let's go on.
- speaker: Respondent
  text: I don'twant to say that President Kennedy took the lead. That's not the way it seemed at the time and that wouldn't
    be accurate. Many of us in the civil rights movement felt that we had to push the administration that their response in
    the South to brutality and beatings was to ken or was too slow, that at times they wanted to recommend that the movement
    stop. I remember when the Assistant Attorney General of the United States told me that he thought that I should leave
    Mississippi and persuade others to leave Mississippi. I know that as Attorney General, Robert Kennedy hoped that the Freedom
    Rides wouldn'thappen. That's, that's the perspective, but if you look back through time and not just how it appeared in
    the perspective of 1960 to '63, if you look back through time given how conservative this country was and how unimportant
    the black vote or the youth vote had been to past administrations, the Kennedy's really were advancing a cause and legitimizing
    a cause far more fundamentally than we who were on the front lines thought at the time.
- speaker: Interviewer
  text: Now you - at, at that time, you, you felt that this could all be changed within the system. Was that - talk about
    the students at that time and that feeling that this, this was a system that could change, that could bend, that could
    do the kinds of things that you wanted, that you felt had to be done in the country, and how that began to change somewhat
    if it changed at all.
- speaker: Respondent
  text: Well, to what extent it could be changed through the system was a, I think, a course of ongoing debate within the
    movement and between generations of civil rights activists, between those who favored nonviolent civil disobedience, those
    who favored voter registration, those who favored alliances with the national Democratic Party. It was never finally settled.
    I think you'd have to be a genius to tell what was the most important method used, because in the end, it seemed to take
    something of everything. But I think at the time there was a greater wellspring of hope and belief that if you acted,
    this system, with its commitment to democracy, would respond. Then there was, say, five years later, when many of us felt
    that the system had failed the test and we turned to more radical paths or we felt more disillusioned or we felt that
    hope had been killed with the, the death of King and the Kennedys. There was a certain springtime of idealism and great
    hope in the early 1960s.
- speaker: Interviewer
  text: OK, let's cut for a second.
- speaker: Interviewer
  text: Are you ready?
- speaker: Respondent
  text: The first time that I went south into the heart of segregation was in response to a call by sharecroppers who had
    been denied the right to vote and had, had set up a tent city. They were living in tents, Fayetteville, Tennessee, I believe
    it was, it was in the winter of '60-'61 and a group of students in Ann Arbor, responding to their call, put together a
    lot of food and supplies, clothing, and we took several vehicles and, and went down. I went as the editor of the Michigan
    Daily, the Ann Arbor student newspaper. And we spent several days there. And the, the first thing I remember was the idealism
    and the commitment of the sharecroppers, the people who were putting everything on the line, and secondly, the blind in
    sensitivity of the, of the city's fathers, if that's what you wanted to call them. I remember the first time we were confronted
    by the sheriff, who wanted us off the, off the land, it was at night, and this had never happened to me before. I took
    a look at him and his equipment and my legs caved in. It, it, it, it - the fear had never hit me like that, and I just
    couldn'timagine what it would be like to spend fifty years or seventy-five years under that kind of fear of the law. Later
    that night we went down - we were downtown trying to find the telephone -
- speaker: Respondent
  text: '- to file a story over the phones with the Michigan newspaper. And a crowd with bats and clubs found us and descended
    on us and, and we, we got in our cars and left that town, I don''tmind saying at about twice the speed limit with this
    little mob chasing us. So that was my introduction to the South.'
- speaker: Interviewer
  text: OK let's finish that story, coming downtown.
- speaker: Respondent
  text: So immediately afterwards, I went downtown looking for a telephone to file a story back to Ann Arbor, over the phone,
    you know, to meet the deadline and, and while I was trying to do that with my - a couple of friends, we got surrounded
    by a group of really mean looking people with bats and clubs and cars and it looked like I wouldn't be able to file that
    story, you know, right on the spot. So we decided to jump in our cars and I believe we left that town at about double
    or triple the speed limit and filed the story a little later about a hundred miles down the road.
- speaker: Interviewer
  text: You were how - what, nineteen at the time?
- speaker: Respondent
  text: I was probably twenty.
- speaker: Interviewer
  text: Twenty years old. What - why, why did you go down there? What made, what made Tom Hayden feel like he was a part of
    this thing? What - you're from Michigan, this is far from home, your home, your needs, I mean, what - why, why down there?
    Why did you go?
- speaker: Respondent
  text: Well Mi- why did I go? Michigan was a fairly liberal state, politically. And I had been brought up and gone to the
    university and edited the newspaper and had liberal ideals. This was the first time that those ideals were put to the
    test. Would I give to ken support to this cause where others were taking big risks or would I take risks myself? It became
    a test of commitment. And in those days it was relatively simple, if you wanted to do something you could send food, you
    could raise money, you could boycott Woolworth's or you could go south. And if you went south, you could live on virtually
    nothing, and you could register people to vote, and periodically you could go to demonstrations where you would get beaten
    up and go to jail and so it, it was before you. If you didn't do it, it was difficult on your conscience. And, and so
    I, I chose to finally move to Atlanta for, at least a couple of years, and try to be some kind of communications link
    between what was going on among students in the South, communicate that back to students up north.
- speaker: Interviewer
  text: OK. I want to jump ahead a little bit and, and get into Mississippi and I'd like you - you were in Mississippi as
    an observer. You observed what was going on and writing back. Describe for me what you, what you saw in Mississippi, what
    you thought Mississippi represented in terms of the movement at that time, what you saw.
- speaker: Respondent
  text: Well, the, the places that I, I thought were the most foreboding, and that America knew the least about were the rural
    areas. Southern Georgia, I spent a lot of time, and southern Mississippi. And these were the heartland of segregation,
    this was the, this was the black belt, this is where the arm of the United States government didn'tseem to reach, and
    to take responsibility for going into these areas to knock on doors, to set up an office, to call yourself a civil rights
    worker was tantamount to signing a suicide note. There was just no protection. And I found the people that went into those
    areas to be exceptionally brave to, to be certainly the moral equivalent of, of, of veterans in any of our wars. And if
    it was not for them what we called the iceberg of the Deep South would never have been broken open; the country never
    would have seen anything. I went to Mississippi once in 1961 with another white student, Paul Potter, and we followed
    Bob Moses into Jackson and rented cars and followed him down to McComb, a drive of several hours. We had been up all night,
    and we checked into a motel and Bob went on to their, to their office headquarters and we met later. And I'll tell you
    how we met to give you an example of how tough it was. We met in the middle of the night by driving into the black community
    with the lights off, into the gas station parking lot and then lying down on, on the floor of the car waiting for another
    car to come and pick us up to take us to a meeting which was in a home where there were just a couple of dim lights on
    and blankets pulled up over all the windows of the house so the house looked dark. This was merely to have a discussion
    of what we were going to see the following day. There was gonna be a march of sixteen and seventeen year old high school
    students one mile, asking for some students who had been expelled from school for civil rights work to be returned to
    school. That was in the United States in Mississippi in 1961.
