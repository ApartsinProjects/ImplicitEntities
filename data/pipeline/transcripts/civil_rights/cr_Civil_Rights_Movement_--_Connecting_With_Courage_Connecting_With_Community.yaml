collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: My strongest connections are with "ordinary" people, people who rise to the challenges of the occasion, who find strength
    in action. The civil rights movement gave me the opportunity to feel what it was like for people to risk comfort in the
    moment for something in the future, for something that they believed in, for their families, their community and for themselves.
- speaker: Respondent
  text: I didn't intentionally go to Mississippi to join the Civil Rights Movement. A college friend of mine, John Mudd, had
    written a grant for recent Harvard graduates to take over the summer school classes at Tougaloo College, a traditional
    black college outside of Jackson, Mississippi, and had invited me to join the team. A group of about twelve of us taught
    various summer classes so that Tougaloo faculty could work on their advanced degrees in the north during the summer.
- speaker: Respondent
  text: Early in the first summer term, two civil rights workers from the Jackson office came to Tougaloo to ask me to put
    together an economic survey that could be administered by "Freedom Summer" volunteers. Freedom Summer was a joint project
    of several civil rights groups that brought hundreds of college students to Mississippi to work with black civil rights
    workers on voter registration, establishing community centers, operating "freedom schools" for young people, and working
    with local communities on economic and political issues.
- speaker: Respondent
  text: I began working on the survey, and when I hadn't had time to complete it before the Freedom Summer orientation in
    Oxford, Ohio, I boarded the bus for orientation to continue the work. The reality of the dangers in challenging segregation
    became clear to us at orientation, when three civil rights workers went missing in the field.
- speaker: Respondent
  text: As a quasi staff person (neither a Freedom Summer volunteer, nor staff), I had been asked to staff the evening WATS
    (Wide Area Telephone Service) phone line that connected summer orientation staff to the Jackson, Mississippi office. On
    one of those nights, I was sitting next to Rita Schwerner, the wife of Mickey Schwerner, when the word came from the Jackson
    office that Rita's husband, Mickey, a CORE staff person, along with Andrew Goodman, a summer volunteer, and James Cheney,
    a local black activist, had gone missing after being called out to investigate a black church burning in rural Madison
    County.
- speaker: Respondent
  text: In the camera of my mind, I can still see Rita's pale face, listening to the report from the field. The next morning,
    Bob Moses, the brilliant architect of Freedom Summer, spoke to staff and volunteers. In his soft-spoken voice, Bob told
    us that the three boys were almost certainly lured to their death (later confirmed) and that all of us needed to carefully
    evaluate whether to return home or to continue to Mississippi. No one left. That knowledge and decision became our bond.
- speaker: Respondent
  text: It was a transformative moment for me, as I believe it was for so many others, who until that time hadn't really comprehended
    the depth and dark reality of what we were facing. Movements have their own energy, an electrifying spirit, particularly
    if you happen to be at that age where everything feels like it's possible.
- speaker: Respondent
  text: I knew that I was exactly where I was supposed to be, working alongside others who believed in the righteousness of
    the cause - co-workers and local activists, all ready to place themselves in danger in the pursuit of radical change to
    the brutal and unconscionable legacy of slavery.
- speaker: Respondent
  text: Upon our return to Jackson, I completed the first summer session at Tougaloo and then headed north to earn enough
    money to return to Mississippi in the fall. When I came back in September, I was added to staff, at the going rate of
    $22 a month.
- speaker: Respondent
  text: My first posting was the upcoming Madison County election for the local U.S. Agriculture Stabilization and Conservation
    Service (ASCS), the agency that determined cotton allotments. In each county, local farmers elected board members whose
    job was to decide the number of acres of cotton that each farmer would be allowed to grow, which in turn, would determine
    the potential income for the farmer's crop.
- speaker: Respondent
  text: In 1965, there were no black farmers on Mississippi's ASCS boards. Elections were controlled by white people, which
    translated into black farmers being allotted small acreage and correspondingly, reduced potential income. While white
    citizens made it nearly impossible for black citizens to register and vote in state and federal elections, the sole requirement
    to vote in ASCS elections was to raise cotton.
- speaker: Respondent
  text: According to ASCS rules, every cotton farmer was entitled to enter the designated polling place on election day, mark
    his choices for board members and either sign his name or place X's on the ballot (many black farmers didn't know how
    to read and write). For the very first time in their lives, black farmers in Canton, Mississippi showed up at a hostile
    polling place to cast their votes for ASCS board members, fully aware that they would face economic repercussions, and
    worse.
- speaker: Respondent
  text: Watching them, hats in hand, step up to the counter of the ASCS polling place (the local A&W Root Beer stand) to cast
    their ballots, surrounded by powerful and angry white men, helped me understand that courage had nothing to do with a
    person's level of education. Courage was the willingness to act on your principles in the struggle for change. And yes,
    there was a cost.
- speaker: Respondent
  text: The white structure that controlled the economic and social reality was not about to allow challenges to "their way
    of life". The residents of the black communities, who welcomed us and worked side by side with us, were subject to major
    economic retaliation and constant physical danger. Economic sanctions and physical attacks were common. People were beaten,
    jailed and killed; thirty black churches were bombed during the summer of 1964.
- speaker: Respondent
  text: We were civil rights soldiers, working with people who were willing to give up everything for their dignity, their
    rights, and their children's futures. It was a powerful message and a powerful bond. There were times during the year
    when my co-workers and I were in danger of being killed, but danger wasn't a deterrent to the continued struggle.
- speaker: Respondent
  text: 'What I learned in the movement was the power of acting from one''s core values. These were the lessons that sustained
    me in the rest of my life: the recognition of the unfairness of systems built on privilege, power and wealth and belief
    in the goodness, strength and power of ordinary people to address societal wrongs.'
- speaker: Respondent
  text: The culmination of my experiences in Mississippi was helping to bring a local farming co-op to fruition in Batesville,
    Mississippi. I was a Northerner who came south with no real understanding of the differences between the cultures of the
    north and those of the south. The black people of Mississippi didn't question why I was there; they welcomed me.
- speaker: Respondent
  text: My colleagues and I boarded in their farmhouses. Our hosts fed us, supported us, protected us and worked alongside
    us. These were individuals whose relationships to white people were defined by segregation and economic subjugation. Their
    work lives were limited. Their schools were segregated and underfunded.
- speaker: Respondent
  text: 'The actions of the Batesville farmers was their statement, defined by their immediate concerns and emboldened by
    the climate of protest: they were no longer willing to accept the unfair business practices of the local middleman who
    marketed their okra crops, a symbol of the multiple ways they had suffered, and still suffered from institutional discrimination.'
- speaker: Respondent
  text: When I arrived in Batesville, my co-workers had already laid the groundwork for the co-op. I joined the effort, going
    from farmhouse to farmhouse, talking to farmers and their wives about what a co-op could mean for them. Having spent time
    in a collective in Israel between high school and college, I had great confidence in co-ops. Still, it was a leap of faith
    for all of us.
- speaker: Respondent
  text: I was 22 years old and knew nothing about farming, but I did know something about the political climate in DC. Through
    contacts with the co-op division of the U.S. Department of Agriculture in DC that I had made during the preceding January
    visit, I was able to leverage federal funding for a marketing co-op.
- speaker: Respondent
  text: Working together, the community and civil rights activists put together a successful plan to fund and organize a farm
    cooperative that operated successfully for fifteen years. It was another lesson in the depth of native intelligence and
    the power of community.
- speaker: Respondent
  text: The lessons of Batesville weren't only political. I was privileged to witness the deeply held spiritual beliefs of
    the black community, a bedrock force in the struggle for racial justice. I could feel the devotion in their songs and
    in their prayers.
- speaker: Respondent
  text: Sunday church services were held outdoors; congregants dressed in their "Sunday best." One of the okra farmers, a
    lay Reverend, led the congregation in a very, very, very long service, punctuated with heartfelt prayer and song, and
    nourished by home-cooked food. Being in the midst of the congregation was a window into the strength of community.
- speaker: Respondent
  text: Decades later, my experiences in Mississippi helped me relate to the struggles that rural people face when they leave
    their homes to find a better life in the cities, but in the move, lose their powerful and sustaining connections to community.
- speaker: Respondent
  text: It gave me insights into the difficulties for African American families who migrated to the cities, and along the
    way, lost their community support; where parents were faced with negotiating new rules for their children, children who
    often felt their parents didn't know as much as they did about the world their children lived in.
- speaker: Respondent
  text: 'The social breakdown between generations became something that I would address in my future work: how can we work
    effectively with immigrant communities and with people migrating from rural areas into cities; how can we support families
    during that transition.'
- speaker: Respondent
  text: 'My work since Mississippi has been rooted in the issues of community, and in particular, in ways to structure and
    connect to people transitioning from one culture to another: from rural to urban, for first generation community college
    students aspiring to a better life for themselves and their families and other marginalized populations who lack the skills,
    the connections, the resources, and/or the community support to achieve their potential.'
- speaker: Respondent
  text: My most recent professional focus has been working on community college remedial education reform to prevent students
    who test below college level math and English from giving up while struggling to retake and pass the same math and English
    classes they hated and failed in high school.
- speaker: Respondent
  text: Passing remedial math and English is the academic pre-requisite for students whose goal is enrolling in those college
    classes that will lead to careers and economic self-sufficiency. Traditional remedial education is too long a road for
    many students, and too often, students became discouraged and drop out.
- speaker: Respondent
  text: I'm one of a growing number of community college practitioners across the country who have joined together in the
    last ten to twenty years to focus on remedial math and English reform. For me, it's a direct legacy of my experiences
    in the south.
- speaker: Respondent
  text: I believe in the power of action and the courage of ordinary people and I believe in the power of collegiality in
    the work that we do to sustain social action. I view my work in community college as social action, a way to impact lives
    by helping students identify and address the barriers that stand between them and their goals and successfully negotiate
    the college system.
- speaker: Respondent
  text: It's the type of work that can't be done alone. It requires a community of support. The institutional barriers that
    face you are extremely difficult to negotiate without the support of your colleagues, people with the same belief and
    commitment to the work that you do.
- speaker: Respondent
  text: The most meaningful work that I've done in my life has been in conjunction with like-minded colleagues. It's the connectedness
    that the movement modeled for me and that I sought in the rest of my life.
- speaker: Respondent
  text: 'As I moved into my professional life, the people that sustained my life, the community of support, of people working
    together, has been a crucial part of the work. A critical lesson that I took from the south was this: find the people
    who share your values, work with them, problem solve with them, support them personally, ask for their support.'
- speaker: Respondent
  text: In actuality, you really don't even have to ask for their support. When you work with people with common goals, support
    is a natural part of the relationships.
- speaker: Respondent
  text: I left Mississippi because I was a white woman during a time that the movement was focusing on black leadership and
    black membership. In the spring of 1965, it was clear to me that many of the black leaders of the Civil Rights Movement
    felt that going forward, the movement core needed to be "just us".
- speaker: Respondent
  text: Working at Tougaloo, on the ASCS election and on the Batesville okra co-op was an extraordinary privilege. I loved
    and was inspired by the people and the work, but as a white woman in the black struggle, the message was clear to me.
    It was time for me to go.
- speaker: Respondent
  text: After I had left, the intrepid John Mudd, who had put together the Harvard/Tougaloo Project, continued the work with
    the fledgling co-op, which continued to function successfully for fifteen years. Within a year after I left, whites were
    expelled from SNCC (The Student Nonviolent Coordinating Committee), the major force in the Mississippi movement.
- speaker: Respondent
  text: I could feel it coming and left before I was asked to leave. It was too painful.
- speaker: Respondent
  text: In May of 1965, I went to New York City to investigate possible markets for the Batesville co-op's okra, where I met
    my husband. We were both connected to a group of people who had been active in the southern civil rights movement. My
    husband was a southerner, a musician and folk singer who had performed in coffee shops in
