turns:
- speaker: Interviewer
  text: Can you talk about Malcolm X at Howard in 1962? What effect did his speech have on you?
- speaker: Respondent
  text: 'Oh, that takes me back quite a bit, you know. We had quite some problems with Howard University, with the administration
    of students. They had stifled a lot of intellectual activity which could help to liberate the minds of the students and
    create the type of activities that we needed as student activists, and we thought then of putting together a project called
    Project Awareness, and we wrote the Project Awareness proposal. Michael Thelwell at that time was with the school newspaper
    - I think it was called the Hilltop - and he was also part of our group, and we wrote up a big, intellectually sounding,
    flowing project to bring people to debate with ideas, to bring stimulus to the university, and the administration was
    so happy they agreed to it because, you know, they said, Finally, they''re going to leave all this problems of activism
    and come and do some real intellectual and academic work, so they signed it, and Thelwell sent out a press release to,
    I think, The Washington Post and other newspapers and also some news releases to the universities - George Washington
    University, Georgetown University, American University - and they got some comments, and they all said, you know, Wow,
    Howard is doing this, so The Washington Post even ran a big story on Howard: the administration, how liberal they were
    -'
- speaker: Interviewer
  text: How did you respond -
- speaker: Respondent
  text: 'I''ll continue. We - the administration had then been praised by The Washington Post after approving the project.
    Our first debate was Malcolm X versus Bayard Rustin. Of course, it was important. Once the administration saw Malcolm
    X, I mean, they didn''t know what to do. They didn''t want him there, but they had just been praised for being liberal,
    so they were already finished - there was nothing they could do - and Bayard Rustin was brought. The debate was important
    for us in NAG, the Nonviolent Action Group, at that time, around SNCC, because there were great divisions, and Bayard
    Rustin and Malcolm X posed these divisions, the approaches towards the solution. Of course, Bayard Rustin''s approach
    was one of total commitment to nonviolence as a philosophy with the aim of integrating into the American capitalist system
    - almost - well, questioning the capitalist system but not to a profound degree. Malcolm, of course, was the total opposite:
    not seeing nonviolence as a philosophy; almost denouncing it as a tactic, if you will; calling for violent clash of arms
    against the American capitalist system; and not for integration into it but separation from it while seeking its destruction,
    either through our hands or the hands of Allah, as he himself would say it, so the Malcolm X debate and the Bayard Rustin
    debate had a profound effect upon the Nonviolent Action Group and, consequently, SNCC because of the role that the Nonviolent
    Action Group played and, of course, consequently the country because of the role that SNCC played in the country.'
- speaker: Interviewer
  text: How did it affect you personally?
- speaker: Respondent
  text: Well, it was -
- speaker: Interviewer
  text: If you could go back here and just -
- speaker: Interviewer
  text: How were you personally affected?
- speaker: Respondent
  text: 'Well, in the first place, we had the struggles there about nationalism versus non-nationalism or straight integration,
    the question of determination: all the problems of the values of the societies were being raised at that time, and this
    debate helped to clarify for all of us all of those issue and drive a clear line between those of us who really became
    clear nationalists as opposed to non-nationalists, and from this nationalism here, if you will look in the Student Nonviolent
    Coordinating Committee, you would see that the Nonviolent Action Group from DC brought it in in full flavor. It was from
    this point that it can be dated where nationalism took its firm root and became dominant inside of the Nonviolent Action
    Group. It was from Malcolm''s debate.'
- speaker: Interviewer
  text: And how did you personally feel?
- speaker: Interviewer
  text: I mean, what was the effect on you?
- speaker: Respondent
  text: Well, I worked with Project Awareness, and I remember very well saying to them that I'm going to do all the work that
    needs to be done before Malcolm X gets here. I will sweep floors, I will lick envelopes, but the night that Malcolm X
    comes here, I am doing no work. I am sitting in the audience. As a matter of fact, I had reserved seats in front, you
    know, and the place was packed. At first, they thought they couldn't even get in, but since I was working with Project,
    I reserved it. I sat in front through the whole debate. I did all the work for the committee, but during the debate, I
    was in front. As a matter of fact, the Nation of Islam, in their newspaper, Muhammad Speaks, carried my photo - nobody
    knew who I was at that time - you know, as students who are enthusiastic at Malcolm's report. Malcolm finished them, and
    for me, after that, anytime they said anything, I just used to send them straight to Malcolm. He gave us all the intellectual
    arguments and opened up the way for us to show clearly an intellectual basis for a nationalism and an ability to smash
    all ideas that were in contradiction to it. Malcolm opened up the way, and more importantly, he opened up the way for
    nonviolence as a legitimate weapon in a struggle for human rights.
- speaker: Interviewer
  text: At what point did his philosophy begin to really take hold in SNCC?
- speaker: Respondent
  text: His philosophy probably really took hold in SNCC - probably, you will see its beginning by Selma, Alabama, where Silas
    Norman, who was a project director, along with Brother Harris, the photographer, began to, as a max - , fact, what it
    was was that from New York -
- speaker: Interviewer
  text: Actually, cut this.
- speaker: Interviewer
  text: OK, so, when did it begin to take hold? When did Malcolm's ideas begin to take hold?
- speaker: Respondent
  text: Well, I, well, after his debate against -
- speaker: Interviewer
  text: Please mention Malcolm's name.
- speaker: Respondent
  text: Mm-hmm. After Malcolm's debate with Bayards Rustin, where he thoroughly crushed all of Bayard Rustin's ideas -
- speaker: Interviewer
  text: Begin with Malcolm's ideas began to take hold -
- speaker: Respondent
  text: OK. After the 1962, the debate at Howard University with the Nonviolent Action Group, Malcolm's ideas began to take
    firm root inside of SNCC through NAG - only in just one way of course - through other contacts. Probably its most systematic
    introduction into SNCC would come in Selma, Alabama, where Doug and Tina Harris, who were on SNCC's staff in Selma, Alabama,
    at that time, through their contacts in New York would have, every week, Malcolm's speech from the Audubon taped and sent
    down to the Selma SNCC office, where copies would be had and would be passed around within the SNCC staff people. So,
    working outside of Selma in Lowndes County, Bob Mants and myself were to ensure that every week we would get that tape,
    and we would play Malcolm X throughout the week inside of Lowndes County. Of course, you know, it was here that he was
    invited by Silas Norman, who was then our project director before I went to Alabama, this would be January of 1965, just
    before the Selma march. He was invited by SNCC to come in, so - but I think he also has a profound effect upon SNCC because
    John Harris and, John Harris goes with him and -
- speaker: Interviewer
  text: Could you, though, talk about why SNCC invites him to Selma?
- speaker: Respondent
  text: Well, that's what I was about, because I had to go back because it was '64. That's why I had to go back to -
- speaker: Interviewer
  text: Right, it's but specific to '65. Why does SNCC invite Malcolm to Selma?
- speaker: Respondent
  text: Well, they invited him, number one, because SNCC took a trip to Africa in 1964 - invited by President Sékou Touré,
    incidentally, of Guinea, and from Guinea, the SNCC delegation continued. Malcolm X had also taken a trip to Africa and
    had preceded SNCC on this trip, and through some coincidence, it seemed that the SNCC people followed in Malcolm's footsteps
    in the same countries, and I remember John Lewis, when giving the report, having to say that - he said, You don't know
    the effect that Malcolm X has. Every country we went into where Malcolm X spoke, we were asked in, our position in relationship
    to Malcolm's position. So, many people in SNCC who didn't even know who Malcolm was began to sit up and take notice, so
    here in SNCC, it became - first for it, right, Malcolm X is having effect where you don't even think he's having an effect,
    so people began to look closer. Of course, the closer they looked to Malcolm X, the quicker they got hooked on Malcolm
    X, so by 1965, Selma, Alabama, was prepared to invite SNCC into Selma to speak. No one in SNCC could oppose it. As a matter
    of fact, everyone was happy. Of course, the Mississippi Project since 1964 had made contact with Malcolm X - with Mrs.
    Hamer - and we had sent our youth wing out from the Delta where I was congressional director to have a meeting with Malcolm
    X, so the meetings and Malcolm X were continuing, but its real profound impact was probably the 1962 debate with Bayard
    Rustin. I go back to this point because Bayard Rustin had an effect also upon SNCC people.
- speaker: Interviewer
  text: OK, so, OK, cut. Sorry. That's not something -
- speaker: Interviewer
  text: OK, why does SNCC feel that it's important to go into Lowndes County?
- speaker: Respondent
  text: 'You know, SNCC''s decision to go into Lowndes County comes in the fall of 1964, after the Democratic Convention in
    Atlantic City, where the majority of SNCC people prior to this had voted a decision, a political decision that SNCC would
    create a Mississippi Freedom Democratic Party, and this Mississippi Freedom Democratic Party would challenge the legitimate
    Democratic Party of Mississippi; would defeat them because of the blatant illegal and unjust stance which the regular
    Democratic Party took, at that time headed by Eastland, the racist; and they would march in the Democratic Party. There
    was a minority position that this was not correct: The Democratic Party could not be depended upon. It had no, there was
    no basis, in fact, on which to depend on it, neither moral nor any other position, but the SNCC majority position was
    this should be done. Of course, in 1964, when the Democratic Party responded in the manner in which it responded, and
    SNCC would not accept that response, the majority of SNCC people -'
- speaker: Interviewer
  text: If you could say, when they refused to recognize -
- speaker: Respondent
  text: 'When the Democratic Party refused to seat the Mississippi Freedom Democratic Party, and in fact seated the racist
    Democratic Party with the compromise, which it called a compromise, which was unacceptable to SNCC. The majority of people
    in SNCC had no alternative for SNCC''s political strategy. Those who had, in the beginning, opposed the decision to work
    with the challenge for the Democratic Party but worked with it anyway because they were disciplined to the organization,
    though outvoted, were the only ones with a pliable alternative, a viable alternative, at that time. They presented an
    alternative of organizing the African community outside of the Democratic Party: independent political party. Alabama
    was selected, and Lowndes County as a county which we had not done much work in.'
- speaker: Interviewer
  text: As you go into Lowndes County, what are you organizing, and what are you organizing against?
- speaker: Respondent
  text: As we said, now, after the failure of the Democratic Party to respond properly to the Mississippi Freedom Democratic
    Party, it was clear for some of us in SNCC that no longer could we talk of any way of connection with the Democratic Party.
    Not only can we not talk of direction, but we must go into direct organizing in opposition to the Democratic Party. Since
    Mississippi had the Mississippi Freedom Democratic Party, those of us in SNCC who were supporting this policy thought
    of Alabama. Alabama represented for us a, a great climate. George Wallace was then the head of the Alabama Democratic
    Party. The Alabama Democratic Party was racist. Its symbol at that time had a white rooster - a white cock, a chicken
    - male chicken, rooster, and it had the words of White supremacy. That was the official emblem of the Democratic Party
    of Alabama, so here it would be easy for us to tell our people, Hey, look this party is not for us. We need our own party.
