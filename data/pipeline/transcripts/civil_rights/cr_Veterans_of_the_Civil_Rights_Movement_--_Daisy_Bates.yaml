collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: The first thing I wanted to ask you was if you could just say - I don't know if you can pull it all together in your
    mind, but if you could just say - what were the factors that prepared you to step forward in a role of leadership at the
    time of the Little Rock crisis? What do you think in your background prepared you to play a leadership role in that crisis?
- speaker: Respondent
  text: Well, I think I've been angry all my life about what has happened to my people. Finding that out, and nobody did anything
    about it. I think it started back then.
- speaker: Interviewer
  text: In your book you entitled that chapter 'Rebirth.'
- speaker: Interviewer
  text: And the heritage from your father was a rebirth of your attitudes, wasn't it?
- speaker: Respondent
  text: It was, because before that time I don't remember ever - after my childhood friend and I broke up - I don't think
    I ever spoke to a white person. There was a white sheriff who used to come and visit my father. I liked him. Well, if
    he'd come by he'd say, 'Is your Daddy here?' I'd just turn and say, 'Daddy, that man is out there.' I couldn't even speak
    to any of them, because I couldn't.
- speaker: Interviewer
  text: '''Cause you were so ...'
- speaker: Respondent
  text: I was so tight inside. There was so much hate. And I think it started then without my knowing it. It prepared me,
    it gave me the strength to carry this out.
- speaker: Interviewer
  text: But when your father lay dying, he encouraged you to channel all that anger into ...
- speaker: Respondent
  text: Into something creative. I did that for some time. I think I'm still doing it now in a very small way. And I will
    always remember what he told me. But really I don't think anything prepared me more than my anger.
- speaker: Interviewer
  text: So you had grown up in southern Arkansas in Huttig?
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: And had stayed there all through your teen years until you met Mr. Bates.
- speaker: Interviewer
  text: And then as soon as you married, the two of you came to Little Rock and started the State Press.
- speaker: Interviewer
  text: And then you went back to school, Shorter Business College.
- speaker: Interviewer
  text: Had you graduated from high school in Huttig?
- speaker: Interviewer
  text: And then took some business courses and took some flying lessons ...
- speaker: Interviewer
  text: '... at Philander-Smith. Did you ever take any other courses? Did you ever go to Philander-Smith?'
- speaker: Respondent
  text: No, I never did go to Philander-Smith, other than take the flying course. While I was in New York, when preparing
    to write the book, I took an uncredited course from NYU in creative writing.
- speaker: Interviewer
  text: Now you had some research assistance, didn't you, in writing the book?
- speaker: Respondent
  text: Yes, right, right.
- speaker: Interviewer
  text: Because when I was going through your papers this summer, I would find notes from somebody up in there that wrote
    to you, and I could tell they got so fascinated doing the research that they really ...
- speaker: Respondent
  text: Mm-hm, the notes are there.
- speaker: Interviewer
  text: '... enjoyed the work, yes.'
- speaker: Respondent
  text: We all enjoyed it.
- speaker: Interviewer
  text: Okay, so you came to Little Rock. You married Mr. Bates and started the State Press. And almost immediately, then
    - is this right? - you got involved with the NAACP?
- speaker: Respondent
  text: Well, yes, 'cause immediately I joined the local branch and got involved.
- speaker: Interviewer
  text: Now had your father...
- speaker: Respondent
  text: Yes, 'cause he was a member for years back. And it was a time when it was not popular to be a member of the ...
- speaker: Respondent
  text: And my Daddy, nobody really knew but the family that he was a member. And then he paid our dues; he paid my dues and
    my mother's dues.
- speaker: Interviewer
  text: Oh, he did.
- speaker: Respondent
  text: Uh-huh. So he would tell me... Well, I asked him one day, 'Why do you join this organization?' And he told me the
    meaning why and what they hoped to do, their dreams; then all my dreams were tied with this organization. Then he would
    give me their literature to read, when he'd go to New York and bring it back.
- speaker: Interviewer
  text: Okay, so you had a background, then, of involvement in the NAACP.
- speaker: Interviewer
  text: And it was just natural for you to join when you came to Little Rock. And you became very active.
- speaker: Respondent
  text: Yes, well, I was very active in the local branch. And then I was elected to the State Conference. I never was President
    of the local branch, but I belonged to the local branch.
- speaker: Respondent
  text: And then I was elected President of the state organization.
- speaker: Interviewer
  text: Right. When you were very young.
- speaker: Interviewer
  text: I was just so impressed to realize that during all this time you were my age. [Laughter]
- speaker: Interviewer
  text: You were about thirty-four or thirty-five.
- speaker: Respondent
  text: Yes, something like that.
- speaker: Interviewer
  text: And that's great. You set a high standard for the rest of us to follow. Were you in any other organizations at this
    time?
- speaker: Respondent
  text: Oh, yes. The National Council of Negro Women, the YWCA and the Urban League and other organizations.
- speaker: Interviewer
  text: Were you active in all these organizations?
- speaker: Respondent
  text: All active. See, I was a newspaper person, and I went to all of these meetings I belonged to. What's that white group's
    name? It may come to me, the name. [Laughter] Well, I can't think of the other one.
- speaker: Interviewer
  text: But you were a member.
- speaker: Respondent
  text: I was a member. It's coming to me. It's something like the Moral Re-Armament; not that, though. Bahais.
- speaker: Interviewer
  text: Something before that, yeah.
- speaker: Respondent
  text: Yeah. This is an old, old organization. What's the name of that darned thing? These people, they don't have a church
    as such. Oh my, it's not coming back to me. Mr. Holmes; I can remember everything but the name of the organization. [Laughter]
- speaker: Respondent
  text: Dr. Holmes is head of it.
- speaker: Interviewer
  text: The Ministerial Alliance?
- speaker: Interviewer
  text: Something before that.
- speaker: Respondent
  text: Yeah. It'll come back to me.
- speaker: Interviewer
  text: Did you ever go over to the Highlander Folk School at Monteagle, Tennessee?
- speaker: Respondent
  text: No, I never did.
- speaker: Interviewer
  text: I just wondered. There were so many people who were involved in the civil rights movement who went there, and I just
    wondered if maybe you had ever done that. Well, did you receive any kind of special training by the national NAACP?
- speaker: Respondent
  text: 'No, no special training, because they sent us all of their literature: Constitutions, and I read that, and their
    guidelines that they went by. But they gave no special training to us.'
- speaker: Interviewer
  text: Was there very much direction, close association with the state branch and the national branch? Did they oversee your
    activities pretty closely, or was it a fairly loose ...
- speaker: Respondent
  text: It's a fairly loose organization.
- speaker: Respondent
  text: Just a moment. What's the name of Mr. Holmes's organization?
- speaker: Respondent
  text: Bahai's. [Laughter]
- speaker: Interviewer
  text: Okay. Hello, Mr. Bates.
- speaker: Respondent
  text: They're still here.
- speaker: Interviewer
  text: They're still here?
- speaker: Respondent
  text: Yeah. And old man Holmes called me. I believe they have a church here. They have a big, beautiful ...
- speaker: Interviewer
  text: That's an Indian faith, isn't it?
- speaker: Respondent
  text: I don't know where that thing came from. [Laughter]
- speaker: Respondent
  text: But the Bahai's. That was it.
- speaker: Interviewer
  text: That was one of the things that you were involved in.
- speaker: Respondent
  text: Yes, and they told me 'I was speaking. Her name is Mrs. Sunshine.'
- speaker: Respondent
  text: And she was beautiful; I mean she had a beautiful personality. And that night that they were meeting at the YWCA,
    and I was the only person in the audience; she spoke to me a whole hour.
- speaker: Interviewer
  text: Oh, you're kidding.
- speaker: Respondent
  text: And it was fascinating. So she told me, she said, 'You have a beautiful soul.' [Laughter]
- speaker: Respondent
  text: I didn't think anybody knew that. [Laughter]
- speaker: Interviewer
  text: '[Laughter] Well, it was good to hear, wasn''t it?'
- speaker: Interviewer
  text: Good to think somebody thought so. Okay, what kinds of issues was the state branch of the NAACP involved in before
    the Little Rock crisis? What kinds of things were you active in trying to change?
- speaker: Respondent
  text: The whole darned system.
- speaker: Interviewer
  text: It seems like there was so much that needed to be done; how did you know ...
- speaker: Respondent
  text: Oh, everything needed change then. See, the Negroes were segregated all over.
- speaker: Interviewer
  text: Completely.
- speaker: Respondent
  text: And even the kids. Some of the downtown stores had a black fountain and a white fountain. I had no children. But I
    worked with the children, because I had the paper. And the mothers that would be going to town, and they were walking
    to town, they would stop at the State Press to use the bathroom, because there was no place downtown that they could use
    the bathroom. What do you do when a child wants to go to the bathroom? See, you never faced... You never had to face that.
- speaker: Interviewer
  text: No, mnm-mm.
- speaker: Respondent
  text: Well, you know, this was just... I got angry.
- speaker: Respondent
  text: About this kind of thing.
- speaker: Interviewer
  text: Well, how did you decide what to concentrate your energies on?
- speaker: Respondent
  text: We concentrated, I think, on everything. This was across the board. Wherever we could, we hit it. It was no special
    thing, but everything, the whole system.
- speaker: Interviewer
  text: But then when the Brown decision was handed down, all of your energies began to be focused, really, on education.
- speaker: Respondent
  text: Yeah. See, after the Brown decision, then the kids who were Negro... They sent around forms to the schools. Mr. Blossom
    and the teachers passed the ballot. And they found that they had too many kids. And meanwhile, Mr. Blossom sent these
    papers out to the schools, the last day of school, to get a determination of how many children planned to go to Central
    that following year, the following September.
- speaker: Interviewer
  text: This was in 1956?
- speaker: Respondent
  text: This was in 1957.
- speaker: Interviewer
  text: In the spring of '57.
- speaker: Respondent
  text: In the spring. So the first day they got a hundred applications back.
- speaker: Interviewer
  text: From black students, mm-hm.
- speaker: Respondent
  text: Well, a hundred students the first day, and then another hundred the following week. Then they called those students
    in and told them they would have to come in and bring their parents and talk to him. So some of the parents went, but
    that meant that the husband had to get off from work, lose a whole day, to go to the school. He didn't see why that was
    necessary. I didn't see why it was necessary. So nevertheless, a lot of the parents went with their children to the schools
    and they talked to the Superintendent. Meanwhile they started coming back. That was the whole idea, that they eliminate
    as many as they possibly could. I have pictures of some of the kids I had. So finally it got down to nine. And the kids,
    after they'd go to the Superintendent's Office, they would come back and tell me what was going on, what he said. So it
    got down to nine, and I got the names of kids that he had not interviewed, and I talked to them before. When they went
    down there, they knew what to say and what not to say. They were going to go to that school; they weren't going to let
    anything change them. So about nine came out. He was going to admit one of the nine.
- speaker: Interviewer
  text: Oh, my word.
- speaker: Respondent
  text: And she was as light as you are.
- speaker: Respondent
  text: That was Carlotta Walls. And so if Carlotta got in, nobody would know if she was white or black.
- speaker: Respondent
  text: And so one of the girls lived very close to Central. She was dark. Well, she was a pretty little dark girl. She was
    'too pretty.'
- speaker: Interviewer
  text: Too pretty?!
- speaker: Respondent
  text: She was 'too pretty' to be admitted. I mean, he couldn't find anything in her background. She had excellent grades;
    she'd never had a fight in school. Her teachers all gave her an excellent record. So therefore, the only thing that he
    could give, reason, was that she was 'too pretty.'
- speaker: Interviewer
  text: Is that what he said?
- speaker: Respondent
  text: They'd actually told her that, and that the boys would be looking at her, and that they would be attracted.
- speaker: Interviewer
  text: Oh, no. Now this was in the summer before school started.
- speaker: Respondent
  text: Before school started.
- speaker: Interviewer
  text: Well, how did they finally settle on the nine?
- speaker: Respondent
  text: They didn't settle on the nine; the nine settled themselves. After they got down that far, and we had a whole bunch
    of women go over to school to talk. After the reporters were there, and there was so much to do, and I told the other
    kids, I said, 'Let's go back over there to school.' I said, 'So go on back there and let me work with these.' But they
    didn't want the nine. Harry Ashmore told me, he said (we had talked over the thing), he said, 'Daisy, you keep fighting
    for the nine. If you get one or two in
