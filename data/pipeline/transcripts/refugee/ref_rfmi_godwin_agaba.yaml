collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: So the first question is, if you could tell me a little bit about where you're from.
- speaker: Respondent
  text: I'm from Uganda.
- speaker: Interviewer
  text: When did you come from Uganda? Was it a direct journey from Uganda to the US or what was that journey like for you?
- speaker: Respondent
  text: No. The journey was not direct; it was full of pumps and loopholes. I'm from Uganda, but I was working in Rwanda.
    Then I fled Rwanda and Uganda, then went to Kenya. Then I started my process in Kenya, then from Kenya to USA.
- speaker: Interviewer
  text: Do you remember roughly the dates for this journey?
- speaker: Respondent
  text: Yes. I left Rwanda on 2nd of February 2010. Then went to Uganda for two days. After few days, I crossed to Kenya.
    Then I stayed in Kenya until 5th of June 2013. That's when I came to USA; I arrived in USA 6th of June.
- speaker: Interviewer
  text: Okay, did you arrive here... Like can you tell me a little bit about...and again, if there's any question you don't
    want to answer, that's entirely fine, just let me know. But I'm curious to know, what was your life like in Uganda before
    you before you moved?
- speaker: Respondent
  text: In Uganda or in Rwanda?
- speaker: Interviewer
  text: Both in Uganda, then Rwanda. Curious to know.
- speaker: Respondent
  text: Ah! Life was not bad. I was working. I was a journalist.
- speaker: Interviewer
  text: Hmm, very cool.
- speaker: Respondent
  text: In news. So I was having a... not a bad life, per se. But the general issue of violation of human rights, corruption
    scandals - of which I was following up with daily, which was my work - was making the whole atmosphere look bad, but personally,
    my life was been well.
- speaker: Interviewer
  text: And were you still a journalist in Rwanda as well?
- speaker: Respondent
  text: Yes, I was a journalist in Rwanda for 10 years.
- speaker: Interviewer
  text: Wow. How old were you when you moved to Rwanda?
- speaker: Respondent
  text: Come again.
- speaker: Interviewer
  text: How old were you when you moved to Rwanda?
- speaker: Respondent
  text: I was 26 years old.
- speaker: Interviewer
  text: Okay. Okay. And you moved...were you covering the same kinds of stories in Rwanda, as you covered in Uganda?
- speaker: Respondent
  text: In Uganda, I was just a student; I never reported in Uganda.
- speaker: Respondent
  text: 'Yeah. So actually, when I was in Rwanda, I teamed up with my friends. Then we started a regional website, which was
    covering five countries: that''s Rwanda, Kenya, Uganda and Tanzania and some Sudan stories and DRC, which is the Democratic
    Republic of Congo. Until I left Rwanda, we were still running that website. And we keep running it after actually for
    one year when I went into exile.'
- speaker: Interviewer
  text: Is your journalism in the US now? You said you're studying journalism at university or international journalism? What
    kinds of things do you cover now? And is it very similar to what you're reporting on back home? Or in Rwanda?
- speaker: Respondent
  text: 'No, I''m getting old. When I was younger, I was...I really love journalism. Journalism is my passion; I love news;
    I love to know the world; I love to report; I love to write. But as I''m getting older, I want to focus on... yes, reporting
    is part of me...I can''t give up reporting; but I''m focusing on writing documentaries; making big stories following up
    for...journalism is a big industry and we can do a lot of advocacy through journalism. And journalism is also changing
    shape with the times of technology, the social media. I think the traditional reporting is going away. It''s fading away.
    Where people were using to wait for newspapers to break the stories, now citizen journalism is taking over: someone with
    his cellphone is enough to report the story [GODWIN LAUGHS]. The world is more interested in citizen journalism these
    days; twitter is enough to give people news; people share... So my target is documentaries, well-polished investigative
    stories with true reporting, our real reporting, which takes time and which is dying actually because even reporters in
    the newsroom don''t have time now; They are doing what we call chair journalism. They just sit and make phone calls here
    and there; tweet someone - that''s a comment - and someone confirms the story that is it. That is what we are reading.
    That is what we are getting in automated mainstream. So I still love our old style of journalism, where a reporter goes
    extra mile deep and deep and gets a story; dig and dig and dig and gets a story. That''s the journalism I believe in;
    that''s the journalism I am working on. Because I entered journalism when I was not a graduate; because of passion of
    my stories - I am a sports lover - I started reporting stories of sports. So when I went in one of the media houses -
    I was still in high school - the editor said "No, but we can... you can start reporting on other things." So when I started
    seeing my bio in newspapers, it made me feel proud; it made me feel great. So I started looking stories here and there
    - all corners - so I became aggressive like that with news. So, but that was dead. I feel like I will start my own media
    house.'
- speaker: Respondent
  text: I'm working on a project called Refugee World, whereby I want to give refugees voices because these people have voices
    but apart from the mainstream reporting their stories, they have nowhere, they have no platform where they can air out
    their voices, their grievances, their problems, what they face. These people have ideas; they can also contribute on the
    problems back home; how they can be solved but they don't have that platform. So I'm working on that, almost in final
    stages because due to Coronavirus I've been in the registration process, in working with some legal team. IRS paper work...you
    know the paper work of USA, it's another work. We need to follow a lot of steps for what you want, but I'm working on
    it. I'm calling it Refugee World, whereby - these people need their voice. They need to tell the world their stories.
    Their stories need to be heard.
- speaker: Respondent
  text: People here just know that they are refugees, but these are human beings. Someone who choose to leave...to leave his
    native land to come here with a family or without a family.
- speaker: Respondent
  text: Things they passed through. A child who was born in a refugee camp, finding himself in USA...there are some basics
    of life he or she missed. We need those stories. We need to tell those stories.
- speaker: Interviewer
  text: Yeah, that's a fantastic project. I'm very excited to seeing it come out and if it's sometime in the pipeline.
- speaker: Respondent
  text: Yeah, so to achieve that, I said, you know, "I have to go back and study everything I have to study." I always like
    Americans' style of writing, so when I reached here, I said "No, let me acquire other skills. It's four years; four years
    will not take me..." We see it but four years is not a long time. So I will try my best. Four, five years, I will be done
    with this one. I will be making it working and then God-willing I will come up with this project and it will be fulfilled.
    So entirely I'm seeing journalism when you come to date on daily news, I always put in some opinion pieces here and there.
    I write some opinion on different topics back home, some papers, regional papers. When you go to my Facebook page, there
    are my opinion pages I put on. So I still write; I still put [GODWIN CHUCKLES] when I'm on the way in the field and I
    met a story, I say "This is a story" in a journalistic angle, I put it on my wall and people followed it up. I tweet it
    and with the journalist in me can't die [GODWIN CHUCKLES]; it's always a live and active. So even back in the day, it
    was very hard to report a story other than traditional media houses radio, TV and newspaper. That's changing.
- speaker: Respondent
  text: That's changing. Today, one tweet can be enough to inform the world what is going on.
- speaker: Interviewer
  text: Yeah. Yeah. That's super cool. Thanks for sharing. That's uhm.. well we'll see if this works out, but at Princeton,
    I'm trying to get a minor in journalism, my major is politics. But I'm trying my best to get a minor in the journalism
    school at Princeton. And it was something I started very late because I didn't realize that it was interesting until like,
    the end of my sophomore year. But the way you speak about journalism is very inspiring. I think it's a very nice way to
    think about an industry that seems a little in trouble in the United States, a little bit in trouble all over the world,
    honestly. But that's super cool. What's the most recent thing you've written about?
- speaker: Respondent
  text: I've written about racism, the ongoing racism issue in USA. It was . . . let me think about it . . . it was when.
    Okay! This week actually, yesterday, I wrote about masks in daily news but the big story I wrote about - it was not a
    story - it was an opinion. It was [PAUSE] Yesterday, my argument was about equality. I was trying to argue that equality
    should... it needs to start at the lowest levels. We are focusing on police, we are focusing on... but even in our homes,
    we should start with equality then this whole issue of racism should start in our homes, it should start in churches,
    it should start at schools. That was my last opinion piece in Dayton daily news.
- speaker: Respondent
  text: That was two weeks ago. Now, this Sunday, yesterday, I wrote a letter to the editor about masks. I was arguing we
    should wear masks since scientific...it's uh..we need it. There's no way... we shouldn't be against the masks cause it
    makes scientific sense, whereby scientists tell us that masks can prevent us from this virus. So we shouldn't be arguing
    with them [GODWIN LAUGHS]. We should be following exactly what they're telling us. It was just a simple letter for [UNDECIPHERABLE].
- speaker: Interviewer
  text: Yeah, I mean, I would love to be able to read some of this. I'm sure.
- speaker: Respondent
  text: I will share them. I will share them with [UNDECIPHERABLE] after the interview.
- speaker: Interviewer
  text: Thank you, thank you. Wonderful. So one thing I'm curious about asking is, so this project is sure it wants to sort
    of understand a little bit better if there is a role that religion plays in refugee resettlement, and in people's journeys
    to the US. So there are a couple of questions on this topic, the first one - and again if any of us who don't want to
    answer you don't have to this is a very open ended conversation. But I'm curious do you identify with any particular religion?
- speaker: Respondent
  text: Yes, I'm a Christian. My name is Godwin [GODWIN LAUGHS].
- speaker: Respondent
  text: I'm born in a religious family. My family is very active in religion. We are Anglicans. The Anglican Church is very
    strong in some countries in Africa. Two traditional religions, the Catholic and Anglican, competing one another in African
    communities, plus Muslims, and Islam and Adventists. Those are the traditional ones. Okay, there are others but I talk
    about the big ones. So I was born an Anglican member - born, baptized and confirmed actually - in an Anglican Church,
    and I pray. I have a church. I know I'm giving - I am a believer in Christ. So I'm a Christian, a complete Christian,
    who prays, who goes to church on Sunday, not every Sunday, but [GODWIN LAUGHS] but during Sunday, and who follows and
    practices all the Anglican church rituals. Now, religion plays - back to answer your question - I think religion plays
    a vital role in resettling refugees in USA. I will not much emphasize on the role they play when these refugees are still
    in refugee camps and some on the way coming. But the refugees, when they're coming here, they are coming from different
    places. The process is long. It's not an easy process, which takes years actually. And all those years, the waiting process
    , the waiting time. From one place, from one stage to another stage, they need assistance. Some churches, some religious
    organizations chip in and give help here and there... medical, food, clothing. But now let me focus on the main roles.
    When a refugee family, a refugee person is allowed in USA, there is what we call international...what they call IMO. IMO
    is International Migration Organization. It handles the travel part of refugees when they are being settled, so the travel
    part of refugees coming to the USA is entirely handled by IMO, which means International Migration Organization. So, this
    IMO arranges the air tickets, arranges the travel dates, arranges the planes, the plane that will be taking from different
    parts of the world to come to the USA, different airports bringing these
