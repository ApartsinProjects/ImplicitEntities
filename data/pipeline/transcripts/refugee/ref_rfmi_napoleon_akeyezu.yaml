collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Could you tell me about where you are from?
- speaker: Respondent
  text: As you said, my name is Napoleon Akeyezu, and I am originally from Rwanda.
- speaker: Interviewer
  text: Right originally from Rwanda, so can you tell me about what led you to leave Rwanda and your experiences coming to
    the US?
- speaker: Respondent
  text: The first time I left my country was during the war. It was 1994, my country was in conflict. I had to leave my country,
    and come back to my country for two years, and then I had to leave again. National security wasn't granted, so I had to
    leave the country again. It was 1998. Yes, as you know, in 1994, there was war going on in my country, and genocide happened,
    and in that time I had to leave my country. Went to the Congo, spent two years there, and after that I came back to my
    country, and genocide was stopped but security conditions were not really good for me and I had to leave the country again.
    I went through a couple of countries, Uganda, Kenya, Mozambique, South Africa, Germany, before I came to the United States.
- speaker: Interviewer
  text: And during this time, can you talk about the role that religion played in your life? And maybe start with your religious
    identity and how religion has influenced your life in Rwanda, and then during your journey away from Rwanda.
- speaker: Respondent
  text: I was born and raised Catholic, went to Catholic school until grade twelve, so I am a strong Catholic believer. And
    as you know, well we Catholics we always have rosaries especially in difficult moments, all the time my mom had given
    me a rosary, which I carried in my pocket every time, and every time the situation was really bad, I just took my rosary
    and started praying for my brothers, my sisters, my parents, my friends, everybody. It didn't happen as I wished, because
    I lost so many friends, I lost most of my direct family. But I survived. Yes, religion is not the time only even now,
    religion always plays a big part in my life. So any time any decision I want to take, big or small, I say God is great.
    My God is going to lead me in all I do, he's going to tell me what decision to make, so religion plays a big big big role
    in my life.
- speaker: Interviewer
  text: Thank you Napoleon. I wonder if you can think of a particular instance when you were challenged after leaving Rwanda,
    and you were in so many different countries and you went through so many different transitions, and if there's a particular
    instance when you remember, as you described, pulling out your rosary and praying, and if you can talk about what led
    you to that moment and the circumstances and how it made you feel to pray?
- speaker: Respondent
  text: There was a particular time that I cannot forget in my life. It was one morning, we spent the night hiding in the
    bushes, and the next morning we were attacked, our small group started slaughtering and at that time I said to my God,
    I don't want to see this again, I don't want to see people killing each other. God, please help me, and I don't want to
    be in this situation again, and I can tell you, yes that the war continues, yes atrocities continued, but I personally
    didn't face atrocities like those again, like seeing people with guns and killing each other in front of me. So that's
    why I say, whenever I pray, God answers. Absolutely. Absolutely. Since that day, I heard about many atrocities, even seeing
    people kill each other in front of me, since that day, I have never been in that situation again.
- speaker: Interviewer
  text: And you've told me before what your name means, but perhaps could you describe why your parents chose your name for
    you?
- speaker: Respondent
  text: I was a very, very tiny baby when I was born. My current dad -- you know, in Rwandan culture, many kids don't carry
    their parent's name, their dad's name. Kids are named according to the circumstances in which they are born. So since
    I was a little baby, a tiny baby, my mom and dad said this is Akeyezu. It means Ake is a possessive determinant, Yezu
    in Rwanda means Jesus. So Akeyezu simply means a baby, or someone, who belongs to Jesus. I cannot forget my name, because
    it's close to Jesus! So there's no way you can forget my name, so Akeyezu means someone belonging to Jesus.
- speaker: Interviewer
  text: That's a beautiful story. I wonder if you can talk a little more about your family's religious identity. You discussed
    growing up in a Catholic family in Rwanda, I wonder what the religious landscape was for you when you were growing up,
    and the role that religion played in your family's life and in your culture, the culture of your community.
- speaker: Respondent
  text: Yeah, Rwanda is 80-85% Christian, and in 1994 I would say, I may be mistaken, 60% of those 80% were Catholic. So I
    grew up in a Catholic society, and as I said I attended Catholic schools, but my younger brother attended a Baptist church
    school. So growing up, my mom, and by the way my dad went to the seminary, he was about to be a priest, maybe he changed
    his mind, but he went to the seminary, so I was raised by Catholics. Everything, attending church every Sunday, at school
    attending church on Wednesdays, my high school, in my high schools studies we would have prayer every morning, wake up
    6:30 in the morning, go to the chapel before we got to breakfast, so it was an every day life that before you start a
    day you need to put yourself in Jesus's hands. Good health, in a good spirit.
- speaker: Interviewer
  text: And then you passed through so many different countries, and they have very different religious histories and religious
    identities than Rwanda, you mentioned Mozambique, South Africa, Germany. I wonder how you held your faith in those moments,
    and if there were any challenges or moments of opportunity when you were in a culture that was dominant in a different
    religion than your own or around people that identified differently than you did.
- speaker: Respondent
  text: To be honest, there's a part of my life when I didn't have a big opportunity to attend churches or join worship. If
    you are traveling from Rwanda to South Africa it's around 3,000 miles, so I didn't have a plane ticket, part of my trip
    was made by foot, and the other part of the trip was by buses. So sometimes you just struggle, you survive, so except
    my rosary, I didn't have time to think about joining a community, so it was just surviving, surviving, until I got to
    South Africa. I would join a Christian community in Pineland. I was living in Cape Town, so there was a neighborhood called
    Pineland, where my friend Mary took me to her church, and I used to pray with that group until I left South Africa. So
    for me, being in a church, in God's house, it's the same way that it's a Catholic church or a church if it's called God's
    church, I mean God's house, and we worship together, the name of the religion doesn't count for me. What matters is getting
    together and praying, that's what matters for me. So many, many, many things are similar whether your country is Baptist
    or Presbyterian. So the vibe is the same, except maybe some interpretation, but I didn't feel discriminated as a Catholic,
    no. So I just went there and prayed with others. It was for me just praying God, and give thanks to God, because I was
    able to survive, while many of my family members -- I lost my mom, I lost my siblings, and it was a very difficult time
    for me, but on the other hand I say, my Lord, you served me, probably I would have time to tell my family's story. So
    for me it was about worshipping, it was about giving thanks to God, no matter what church I attend.
- speaker: Interviewer
  text: Thank you Napoleon. At the end, you said something about it helped you to tell your family's story? Or it helped you
    to pave the path where you could share the family history, even those that you lost during the war. What do you mean by
    that?
- speaker: Respondent
  text: It's very difficult, when you lose a close member of your family, and you don't know even where their bodies are,
    you can't bury them, you keep telling yourself maybe, at a certain point at a certain time, I'm going to see them again.
    And year after year, you don't see them, people come and say we're sorry to tell you that, but your mom, your sister,
    your brother, were killed. So you live with that, it keeps hurting you, you can't mourn them, because you didn't know.
    So whenever you have time to talk about it, it's a kind of therapy, and you tell yourself oh okay, I still remember you,
    I haven't forgotten about you, so I'm telling your story so that it keeps hurting you your whole life. Until now, when
    I'm really missing my mom, when you wake up it's a nightmare, my mom is not there, I'm gonna see my brothers. That's why
    I told you, whenever I have time to talk about it, it's a kind of therapy for me.
- speaker: Interviewer
  text: Well thank you for speaking with me about it now, Napoleon.
- speaker: Respondent
  text: It's a pleasure for me to talk about it.
- speaker: Interviewer
  text: Thank you, it's certainly a pleasure for me to hear. So you went from South Africa to Germany, and then from Germany
    to the US, is that right?
- speaker: Interviewer
  text: Okay. And what led you to leave South Africa to go to Germany, and then to leave Germany to go to the US?
- speaker: Respondent
  text: There's two points. In South Africa, I could live normally, but when there is no structures, when there are no steps,
    there's a law that says refugees should have documents, should have travel documents and everything, but at that time,
    it wasn't really organized in South Africa. They could accept you, the state knew we lived there, but we didn't have a
    vote permit or anything that showed that you are a refugee and you live here. It took me up to two years to get a document
    that shows that I was a refugee in South Africa. I heard when I left, after I left, things were much better organized,
    but at the time I said I cannot continue to live in this situation, I need to go in a country where I will be able to
    continue, and finish my studies, and not living in a situation where no one knows I'm here, the state doesn't -- how am
    I going to continue my studies, if I don't have documents? So, that's what I thought to myself. I need to be able to travel
    to Europe. That was my goal, go to Europe, try to get refugee status, and if possible continue and finish my studies.
- speaker: Interviewer
  text: And during this process, were you still sort of practicing your faith? Were you able to either go to religious institutions
    or churches, were you part of a religious community, was it mostly individual practice?
- speaker: Respondent
  text: Sorry, you mean in South Africa?
- speaker: Interviewer
  text: Right, and Germany.
- speaker: Respondent
  text: Oh yes, oh yes, in Germany, things were much better because in Germany I was able to join a Catholic community there.
    I had two kids in Germany, they were baptized there, so in Germany things were much better, I had a community. I lived
    in a small city called, it's 20 miles east of Frankfurt, and then I moved to another city when I had my son. It's a city
    called and I had the opportunity to join beautiful community, and I recently, I think I lost the birth certificate for
    my son, and I go to the church in Germany, and I say can you please send me the certificate for my son. And they said
    yeah no problem, and they sent it, and I was so happy. And that was seven years after we left? So it was a beautiful community,
    and they took care of us, that was their spirituality, and we were very happy to be among them.
- speaker: Interviewer
  text: I'm glad that you found that community in Germany. What do you mean by "they took care of you?" In what ways were
    they supportive of you and your family?
- speaker: Respondent
  text: When you arrive somewhere, of course people will be curious and asking you where are you from? And when I say I am
    from Rwanda, there was a priest who was from Nigeria, "oh yeah, I'm sorry, I heard about what happened in Rwanda," and
    many other parishioners came to me and said We heard you're from Rwanda, how did you survive? Some questions like those.
    And we had some kids who wanted to know where is Rwanda, and we have to give them an explanation, and we go to the cork
    map and we say Oh see, it's a tiny country and it's in Africa, and you feel welcome, people are interested to know your
    story, your family's story. They, people, were willing to do something to help you, in prayers and whatever you want us
    to help in, we were happy to join in and have support. Feel that we are welcomed, feel that there are people who do care
    about you, and we have people who feel really sorry about what happened to you, and it's very very important in one's
    life. Especially when you're starting a new life, in a new land.
- speaker: Interviewer
  text: Yes I agree, I'm glad that you were met with curiosity and compassion. So, from Germany you get refugee status and
    then you come to the US, right?
- speaker: Interviewer
  text: Okay. And I wonder, if this helps, if you can close your eyes, if you can just imagine what you were doing or what
    your first thoughts were when you got off the airplane for the first time in the US. Who you were with, what the weather
    was like, what you were wearing, how you felt, how you might have been surprised. I'm curious what your first experience
    and encounter with the US was like.
- speaker: Respondent
  text: I usually talk about it with my student, I used to teach French in the University of Louisville. And some student
    asked the same question, what was the first experience when you arrived in the United States. And I said, okay first thing
    is it was my favorite season of the year. It was April 10, the beginning of the spring. And I say for me, reaching the
    US was my dream becoming reality. Because I always learned about the United States. When I was in middle school, they
    said the United Nations headquarters are in New York, and New York is in the United States of America. In America Freedom
    comes. And I said, I want to
