collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me your name and where you're from?
- speaker: Respondent
  text: Da Poe. My name is Da Poe. I'm from Burma and Thailand.
- speaker: Interviewer
  text: Can you tell me a little bit about the place you're from?
- speaker: Respondent
  text: Came from Thailand. Came from Burma.
- speaker: Respondent
  text: First, when she first came from Burma, it was hard. The Burmese were attacking the place where she was living. When
    they were farming, the Burmese came and burned all of it. Then, they didn't have food so they came to America. The Americans
    offered for them to come and then they came.
- speaker: Interviewer
  text: What did you do in Burma before you came?
- speaker: Respondent
  text: Farming, making money, and helping out.
- speaker: Interviewer
  text: So you were in Burma, and then you went to Thailand?
- speaker: Respondent
  text: The place where she was living, the rules and laws were hard to live within so they moved to Thailand.
- speaker: Interviewer
  text: Tell me about the journey from Burma to Thailand.
- speaker: Respondent
  text: There was a lot of war.
- speaker: Interviewer
  text: Did you walk there? Or how did you get to Thailand?
- speaker: Respondent
  text: All on foot.
- speaker: Interviewer
  text: What was it like living in the refugee camp in Thailand?
- speaker: Respondent
  text: There wasn't any in Thailand. She came to a refugee camp in America.
- speaker: Interviewer
  text: So she came directly?
- speaker: Interviewer
  text: Okay. What was something that surprised you about America?
- speaker: Respondent
  text: Everything is new. Back then, there wasn't really anything. You see a lot more new things like cars and different
    places. Planes and stuff.
- speaker: Respondent
  text: She is saying, Thank God, for everything that has happened.
- speaker: Interviewer
  text: What did you like the most about coming here?
- speaker: Respondent
  text: She liked everything about it, because back then, in the place where she came from, everything was really small, like
    the buildings and stuff, and then she came to America and she looked at everything, and it was big. The different celebrations
    and stuff; holidays. And where she came from, there was none of that.
- speaker: Respondent
  text: When she came here, her whole family had to work and get money to survive and it was really easy for them, because
    it was really fun.
- speaker: Interviewer
  text: How many years have you been in the states?
- speaker: Interviewer
  text: 10 years? Wow.
- speaker: Respondent
  text: Came here in 2009.
- speaker: Interviewer
  text: Do you miss, or what do you miss about your home country?
- speaker: Respondent
  text: Her family, sisters and brother.
- speaker: Interviewer
  text: Is a lot of your family still in Burma?
- speaker: Respondent
  text: 5. One brother and four sisters.
- speaker: Interviewer
  text: Do you stay in contact with them?
- speaker: Interviewer
  text: How do you do that? By phone or do you get to see them?
- speaker: Interviewer
  text: Have you ever been back?
- speaker: Respondent
  text: Yes, two times.
- speaker: Interviewer
  text: What was that like?
- speaker: Respondent
  text: She didn't like it, it was not the same as America.
- speaker: Interviewer
  text: It is not the same as here?
- speaker: Interviewer
  text: How was it different?
- speaker: Respondent
  text: There is a very big difference. It is different because there is a lot of grass here and trees, and there isn't very
    much there. The roads are very different, dust comes up when you drive. The restrooms weren't good. It is kind of getting
    better, she said.
- speaker: Interviewer
  text: What would you want people to know about refugees?
- speaker: Respondent
  text: She doesn't know how to explain it.
- speaker: Interviewer
  text: Give like small bits and parts.
- speaker: Respondent
  text: She said, when she came to America, they gave her an education to go to school. Back then, she didn't have that education.
- speaker: Interviewer
  text: So you're very grateful?
- speaker: Interviewer
  text: What was it like raising a family here in the States?
- speaker: Respondent
  text: It is a very good place. The conditions and the laws, she really likes.
- speaker: Interviewer
  text: Did you have all your kids when you were here or did you have your kids and then bring them with you?
- speaker: Respondent
  text: All of them were in Thailand.
- speaker: Interviewer
  text: Was it nice to raise your family here?
- speaker: Respondent
  text: Yes. If they're respectful.
- speaker: Interviewer
  text: Do you have anything that you want to share about your experience and your country and any last thoughts?
- speaker: Respondent
  text: The experience she had is very welcoming. In America, you can do mostly everything freely. Back then, there were no
    restrictions. If you wanted to drive, you can drive. She learned to drive here. In Thailand, she didn't get to drive.
- speaker: Respondent
  text: God bless you.
- speaker: Respondent
  text: She basically said, she is blessed to have everything.
- speaker: Interviewer
  text: Any last thoughts?
- speaker: Respondent
  text: She said, thanks America for allowing her to come here and have a new life.
