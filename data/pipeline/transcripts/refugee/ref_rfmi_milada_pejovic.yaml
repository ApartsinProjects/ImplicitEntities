collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience with religion growing up in Yugoslavia?
- speaker: Respondent
  text: I was raised a theist in a communist country, so religion was not openly encouraged, but my parents celebrated Christian
    holidays, and I enjoyed those traditions.
- speaker: Interviewer
  text: How did the war affect your perception of religion?
- speaker: Respondent
  text: Seeing religious leaders leading people into war pushed me further from religion. During the war, I noticed that nonreligious
    people began attending places of worship, and Muslim women started covering their heads, which I had not seen before.
    Religious identities became clearer as people gravitated towards their own groups to feel safer.
- speaker: Interviewer
  text: What was your experience with religious freedom after resettling in the United States?
- speaker: Respondent
  text: Witnessing religious freedom in America was eye-opening. I think it would have been better if Yugoslavic politicians
    had not discouraged religion. Here, people can choose and practice their religion freely, which I believe is a human right.
- speaker: Interviewer
  text: How has your faith journey evolved since moving to the U.S.?
- speaker: Respondent
  text: I started reading the Bible to participate with others, especially with members of World Relief who would pray and
    make the impossible seem possible. The Biblical stories felt closer to me after my experiences, showing how humanity still
    commits the same atrocities.
- speaker: Interviewer
  text: Can you describe your work with refugees and how it relates to faith?
- speaker: Respondent
  text: As a case manager, I worked with many people who had lost loved ones in the war. I witnessed how animosity between
    refugees dissolved as they faced common struggles. I also had a Muslim colleague at UNICEF, and we would ask each other
    to pray despite our different faiths.
- speaker: Interviewer
  text: What differences have you noticed between faith-based and secular resettlement agencies?
- speaker: Respondent
  text: Faith-based agencies like World Relief connect people through religion, which can be comforting. Refugees often focus
    on their physical needs first, but spiritual needs become important later. Secular agencies may not provide that same
    connection.
- speaker: Interviewer
  text: How do you view diversity and interfaith relationships now?
- speaker: Respondent
  text: Growing up, I saw interreligious and interracial marriages and believed diversity enriched a country, though it seemed
    like a disadvantage at times. I gave my children freedom to decide their beliefs. My son married an Indian woman, and
    they observe Hindu events, while we also celebrate American holidays like Thanksgiving.
- speaker: Interviewer
  text: How do you balance maintaining your cultural traditions with adapting to life in America?
- speaker: Respondent
  text: Because of my children and grandchildren, America feels more like home, but I want to retain ties to my old country
    by passing on traditional recipes and customs. Freedom here reassures us that we can keep our identity even in a new country.
