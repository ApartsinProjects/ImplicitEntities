collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood and where you were born?
- speaker: Respondent
  text: I was born in Mogadishu, Somalia, but I was raised mostly in Ethiopia because of our refugee status. We moved around
    a lot across provinces and countries.
- speaker: Interviewer
  text: What was it like moving so much as a child?
- speaker: Respondent
  text: It was difficult. Being a refugee meant instability. I never really had a permanent home growing up, which was challenging
    emotionally and physically.
- speaker: Interviewer
  text: How did your family situation affect you during this time?
- speaker: Respondent
  text: My mother passed away the year before this interview, but I couldn't return for political reasons, so I could only
    be by her side virtually. That was very hard for me.
- speaker: Interviewer
  text: When did you come to the United States?
- speaker: Respondent
  text: I came as a child, but it was a mixture of emotions. I felt different from other Americans, especially since my cousins
    had blond hair and blue eyes, and I looked different.
- speaker: Interviewer
  text: Did you have family support here?
- speaker: Respondent
  text: My uncles in the US served as a support family, but largely I was on my own. I had to support myself as a teenager
    living alone.
- speaker: Interviewer
  text: How was your education experience here?
- speaker: Respondent
  text: I initially didn't want to pursue higher education, but eventually I became a chiropractor. I excelled in other subjects,
    but I felt behind in English since it was my second language.
- speaker: Interviewer
  text: What about your religious background?
- speaker: Respondent
  text: My parents were Muslim and taught me about the religion, but I didn't feel a connection to prayer and faith. I even
    attended Bible study in high school and went to church with my American aunt, but I didn't feel connected to that religion
    either.
- speaker: Interviewer
  text: What are your thoughts on religion now?
- speaker: Respondent
  text: I believe religion is a good thing and helps some people do good, but I can uphold values without it. I also wonder
    whether other beings in the universe believe in human religions, and I think we should not judge people based on religion.
- speaker: Interviewer
  text: How did you experience the pandemic?
- speaker: Respondent
  text: There was a lot of ambiguity and skepticism about health regulations like vaccination, social distancing, and masking.
    It was a confusing time for many.
