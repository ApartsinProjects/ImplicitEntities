collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your life in Burma before you left?
- speaker: Respondent
  text: 'There was no democracy in Myanmar. My parents decided to go to a refugee camp in Thailand called Tham Hin. I was
    10 years old when we went to the camp. It was very crowded, and we lived there for only one year. I did go to school there.
    There were six people in my family: one sister, three brothers including me, and my mother and father.'
- speaker: Interviewer
  text: What was it like when you first arrived in the United States?
- speaker: Respondent
  text: I thought the US was fun when I first got here. It was very different from where I came from—different nature and
    different school. I had fun hanging out with different people. My parents came to the US to give us a better education.
- speaker: Interviewer
  text: How was the immigration process for your family?
- speaker: Respondent
  text: We came to the US in a group but got separated into different states. We have extended family in Utah, but only my
    dad visited them once.
- speaker: Interviewer
  text: How has your faith influenced your journey?
- speaker: Respondent
  text: I am Christian, and my faith helped me along the journey. We prayed for a better life.
- speaker: Interviewer
  text: What was school like for you here, especially with other Karen people?
- speaker: Respondent
  text: The Karen people at my school spoke Karen to each other. We had separate ESL classes together. The Karen people helped
    each other out, and American teachers helped me too.
- speaker: Interviewer
  text: How do you feel about your home and identity now?
- speaker: Respondent
  text: Karen people have hard lives. Some don't like to be in the US and want to go back. I want to go back. I miss home.
    I used to live on a rice farm. My family had our own land.
- speaker: Interviewer
  text: What about your extended family?
- speaker: Respondent
  text: My dad's family is in the US—in Utah and Philadelphia. My mom's family is still back in her country. They can't come
    here because they don't have passports, and we can't visit them because we need money to do so.
- speaker: Interviewer
  text: Can you tell me about the war and how it affected your family?
- speaker: Respondent
  text: We left because of the fighting and killing during the civil war. My grandpa died in the war. I don't remember much
    because I was young. The older people are still affected by their memories of the war.
- speaker: Interviewer
  text: How did you escape to the refugee camp?
- speaker: Respondent
  text: We had to escape through a different path so we wouldn't be caught. My parents were already in the refugee camp, so
    my mother's sister's husband took care of me and my brother during the journey. He dropped us off before going back to
    his own family. I had to climb the mountain and follow. We walked without water and carried everything ourselves—food
    and supplies.
- speaker: Interviewer
  text: What is your role in your family now?
- speaker: Respondent
  text: I am the oldest sibling. I don't know if I like being a big brother. Right now, I want to go apply to jobs.
