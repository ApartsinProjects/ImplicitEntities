collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: When did you move to the United States?
- speaker: Respondent
  text: 2009. August 12th.
- speaker: Interviewer
  text: Can you tell me more about Sudan and what it was like?
- speaker: Respondent
  text: In Sudan the government took everything from my mother. They took the lifestyle, the food, they burned down the houses
    they were living in, and then killed the males. And the people that were burning our houses down, they threw some kids
    in and they died in the fire also. They took all of our livestock, which was about 70 cows, and they killed my father
    the same day as they burned down our house and took our stuff. And then we moved to Chad, so another country, where we
    didn't have anything with us. Barely any clothes. No place to live. We just lived under the tree, right? And we used to
    sleep under the shade that was provided by the tree. That was pretty much our home. In that area, a lot of wind happens,
    and the dust would get all over our clothes, but we couldn't do anything about it because we didn't have any other clothes
    to change into so we just wore those. The government sent out Arabs from the capitol and then they used planes and guns
    to kill us. Basically the government didn't like the Masalit tribe, basically the Darfur area. He didn't like that. He
    only liked the Arabs. He only did everything for the Arabs. And he told them to kill us, basically he gave them weapons
    to destroy us and they completely like, I guess cleaned, genocide, yeah. So in our area in Darfur, we don't have a lot
    of colleges there -- or any -- so when you graduate from high school you go to the city, like the capitol city to learn
    and graduate college. But once you get there, and the government knows you're from Darfur, they kill you. All of those
    students were killed and it happened for a long period of time, not just over a year or two. When they know you're from
    Darfur, they let you get your education sometimes and after you get it they kill you. The war was between 18 years...
    For seven years, from 2001 to I think 2007. Ok she says it started way before 2001, but during those 7 years, the government
    killed people, it didn't matter if they were old, young, a baby, a guy, it didn't matter to him, they just came and killed
    them, and if the people came back to rebuild the same thing just happened for like 7 years. And when we came to Chad,
    the United Nations, they saw what we were going through. And then they helped us and they gave us tents to live in and
    some food to eat. We stayed there for 5 years, and when the UN went and told some people, like the old people and the
    people who were sick, they can go to different countries, that's when our names went also because my mother had six girls
    and one boy and it was very difficult for her to take care of us because we were all very very young at that time. When
    the UN told the people that they could move to a different country, the people there had never traveled and left their
    home area before so they were like, so they were unaware of the good things that can happen after, but instead they were
    afraid and they didn't move, they didn't decide to go. Only a few people left. And because of that they can't come anymore
    because the UN doesn't do that anymore. And the Chadi government didn't want people to leave that area also. So the Chadi
    government didn't like that and they were going to run into conflict with the UN so the UN stopped bringing people to
    different countries, the people who were suffering in the refugee camps. And now, the people are still there but they
    are not receiving any food or anything. They're just living. Right now there's barely any work, and then they have to
    travel very far. And even if they find work it's not a lot of money and that's very difficult for them to buy food for
    their kids and for themselves. Only some of the people who took some of their livestock with them that was not taken from
    them, they sold those livestock to get money so they could get food for their family. That's how they're living. It's
    very depressing there right now. Also for work for teenagers, the teenage boys, they travel to this gold mining area.
    It's between Niger, Libya, and Chad. It's like desert area. And when they go there, the government of Libya does not like
    that so they bombed the place and stuff, and then they died there. Even to this day, the people are being killed right
    now. You have another question?
- speaker: Interviewer
  text: Yeah. Wow. Do you still keep in touch with people from there? Are there any close family friends still back there?
- speaker: Respondent
  text: She does keep in contact with her family members that she left behind in the camps, and her mom's also on the border
    of Sudan right now so she calls them a couple times a month to see how they are doing.
- speaker: Interviewer
  text: Is it hard to be here without the rest of your family?
- speaker: Respondent
  text: She says yes, it's hard.
- speaker: Interviewer
  text: What was it like when you first came here?
- speaker: Respondent
  text: She says it was very very difficult in the beginning when she came here because she didn't speak the language, she
    didn't know the place, and we didn't speak the language either so it was very difficult. She said now it's better because
    she can speak a little bit of English, she goes to work, she can drive a car, she can pay rent and stuff. She said it's
    better than before. She left her dad and her cousins and her brothers in the camp. Her mom and her sister are in Sudan
    right now.
- speaker: Interviewer
  text: So who are you here with? Who came here with you?
- speaker: Respondent
  text: Only my kids and me. Some come from Sudan, my cousin also, and they live with us, well they live very close to us.
- speaker: Interviewer
  text: Did you have any help when you first came?
- speaker: Interviewer
  text: Who helped you and how did they help you?
- speaker: Respondent
  text: One guy was dressed like Sudanese, his name is Hassan. And one guy is [INDECIPHERABLE]... there were three guys, they
    all came from Sudan. They had been here for a while and they translated for my mother because she can speak Arabic, and
    that's how it was a little better because they knew the place. They've been here for a really long time. She said they
    helped us for a year, and then after that they still helped us until we got to know the place. And then we have a car
    now and we can go places. The day my father died, they took everything from the three villages that were close by. The
    horses, the cows, the sheep, any animals we had, even the camels they took them. They killed my father, they killed four
    other people, and then the people who were in the villages, they were in danger also, so they ran to the river and they
    hid somewhere there until the night came. And that's when they went to bring out the dead so they could bury them. And
    one of them was my father. Usually on Wednesday, it's a store day so everyone brings food there and then they buy and
    stuff like that. On that day people were traveling and it was prayer time, around 1 o'clock, and they went to pray and
    it was about 50 people praying, I think it was more than 50 people. And then the plane came and dropped the bomb and all
    of those people died. They were about to pray and then they died. Like, people coming to the church, want a place to pray.
    These people all come together and want to pray, the airplanes come and drop the bomb, all these men, no woman.
- speaker: Interviewer
  text: Oh, because was it just the men praying?
- speaker: Respondent
  text: Yeah. Another day, they came and burned down seven villages, they destroyed everything and they killed some people
    who were praying at the mosque. And another day they came and killed her two uncles and their sons and also another 9
    people they killed on the same day. And they took 180 cows from my uncle, and from one of those people they killed they
    took 300 cows. And for the rest of them she doesn't know how many things the government took from them.
- speaker: Interviewer
  text: Was there always war for as long as you can remember?
- speaker: Respondent
  text: She said she has known the war since she had my older sister who is 26 years old right now. At that time it was happening
    in the North and it didn't reach us during that time, so not long after that it came to us. And even then, they killed
    two people, three people every single day until the big war happened. For the future, she wants her country to get better
    so she can go home. She feels more freedom there than here. She wants to go home.
- speaker: Interviewer
  text: Why do you say you feel more freedom there than here?
- speaker: Respondent
  text: She said when she lived in Sudan, she didn't have to work every single day like here. And if you're late, she didn't
    have to worry about any of that. She had livestock, and every year she sold like five animals and that was enough money
    to live for the whole year. But here you have to go to work every single day, and if you're late they can fire you. She
    said that's not freedom, she doesn't like that she said. In the country, it was easy to do everything. To make the food,
    to buy it and everything. All she had to buy was sugar, salt, and clothes, and she went to the market every Wednesday
    to buy meat if she wanted to. And that was all fresh and organic. But here, it's not like that, you have to buy everything.
    The fruits were very fresh, and you could go get it every day from the trees. It's not like here where you have to buy
    it and then put it in the fridge for a long time. She said here it's different because everything has to do with paperwork.
    And she wasn't used to that where she's from. She says that's difficult. She said since me and my sisters and brothers,
    we learned English, that's when we helped her. Sometimes she doesn't know what she's doing and we read it and help her
    with paperwork.
- speaker: Interviewer
  text: What do you hope for your children?
- speaker: Respondent
  text: She wants us to go to high school and college. After graduating college she wants us to go back and then be part of
    the government and then help with the problems within our country.
- speaker: Interviewer
  text: One last question, what do you want people to know about refugees?
- speaker: Respondent
  text: She wants the public to know that those people are very poor, and they want education but they can't get it because
    of war. And she wants those people to come here so they can get an education to go back to their country to help solve
    their own problems. And she said after graduation they can stay here, or if they want to go back and help they can. Even
    with my children, they don't have to go back and help out their country if they don't want to. They have choice to stay
    here and help themselves if they want to.
- speaker: Interviewer
  text: Just something I'm curious about, but can you tell me a little more about your people, your culture, and religion.
- speaker: Respondent
  text: 'We all follow the Qur''anic teaching, the whole country almost is Muslim. South Sudan, they separated. South Sudan
    don''t count no more. The country was between Christians and Muslims, but they had a big war and the Christians are in
    the South and the Muslims are in the North where we were. When Omar al-Bashir became the president, 32 years ago, that''s
    when the war between the South and the North happened. He convinced the people in the North to kill the Christians even
    though they were living fine before he became president. All the people married each other, it didn''t matter to them,
    they were just living happy until he became president. He was like, I don''t want Christians in my country, go kill them,
    and then that''s what the people did. Then after that, the country divided into two: South Sudan and North Sudan. We''re
    from North Sudan. We celebrate two holidays a year. Each holiday is for seven days and on those days you give gifts, the
    little kids go out to eat with their friends. Nobody goes to work for seven days. You have family and friends over. The
    first day of Eid you go pray, and the second, third, fourth, fifth, seventh you have family over, you go to your family''s
    houses. It''s just all a celebration for straight seven days, parties and everything. And then the guests are treated
    like kings in the house pretty much.'
- speaker: Interviewer
  text: Do you guys still celebrate that here?
- speaker: Respondent
  text: Yeah we still celebrate Eid, but not for very long. Not for seven days here because there are not a lot of Muslims
    here so it's not as fun as it was in my country because everyone is Muslim there, so it's fun there, it's festive any
    everything. But here it's just, oh it's Eid, what are we going to do other than just go to prayer? Go to our cousin's
    house. That's it. So we just celebrate for a day or two. And here it doesn't feel like a holiday so sometimes we even
    go to work on Eid. The two holidays, one of them we celebrate after fasting for 30 days, and the second holiday happens
    two months after the first holiday happens.
- speaker: Interviewer
  text: That's cool. Sounds like a lot of fun.
- speaker: Respondent
  text: Where do you come from?
- speaker: Interviewer
  text: Oh, I, my family's from Taiwan. Yeah, so near China.
- speaker: Respondent
  text: It's an island right?
- speaker: Respondent
  text: In the map, your country is above ours. Yeah, we're like here and you guys are like right here.
- speaker: Interviewer
  text: Is it very hot in Sudan?
- speaker: Respondent
  text: Oh yeah. I saw snow.
- speaker: Interviewer
  text: You saw snow for the first time here?
- speaker: Respondent
  text: Yeah. In 2009. Oh my goodness. The most we get over there is hail rain, that's it.
- speaker: Interviewer
  text: So you can actually fry an egg outside?
- speaker: Interviewer
  text: Wait so how do you all live with such heat? Do you stay indoors a lot?
- speaker: Respondent
  text: No we get used to it. It's just like snow you get used to it just like oh okay its snow again.
- speaker: Interviewer
  text: Is there anything else you would like to share?
- speaker: Respondent
  text: No she says she doesn't have anything else.
