collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: So to get started, Basla, can you tell me about where you're from?
- speaker: Respondent
  text: I'm from Iraq. Baghdad.
- speaker: Interviewer
  text: Okay. Can you tell me more about when you were born and your first home?
- speaker: Respondent
  text: My first home was in Baghdad, Iraq. I was born on December 23, 1968.
- speaker: Interviewer
  text: And do you have any sensory memories or evocative moments that you recall from your childhood in Iraq?
- speaker: Respondent
  text: Yes, she said her simple life was very simple. Mother, father. She used to play outside with friends. It was a very
    simple life.
- speaker: Interviewer
  text: And Basla, how would you describe your religious or spiritual background?
- speaker: Respondent
  text: She's not conservative.
- speaker: Interviewer
  text: Okay. But her religion specifically, can you talk a little bit more about that?
- speaker: Respondent
  text: For Basla when she was in Iraq, practicing religion was not difficult-- it was easy. Because she said in the neighborhood
    where she grew up, all people were the same religion.
- speaker: Interviewer
  text: Okay, I see. I will be asking more questions about your religion, Basla, in a few moments. Keep in mind. But to kind
    of move on, I was wondering-- you were talking about your childhood before. Was there anything that prepared you for your
    resettlement process moving from Iraq to America?
- speaker: Respondent
  text: For Basla it was not easy to move and to come to America. But she had medical reasons that forced her to move to America.
- speaker: Interviewer
  text: Did you say medical reasons?
- speaker: Interviewer
  text: Oh, okay. Can you speak more about these medical reasons if you can?
- speaker: Respondent
  text: So she has Leukemia and in Iraq she went over all places and they told her the only place you can recover is to go
    to America, and that's why she decided to move to America.
- speaker: Interviewer
  text: So your story, Basla, is quite different from a lot of other people, because from what I know many people move from
    the Middle East to America because of external pressures like war or something else. So how did your health reasons--
    how did that shape your resettlement process?
- speaker: Respondent
  text: For Basla she faced a lot of challenges when she moved to America, like a different culture, different people, different
    even work. Different field of work. And language. When she moved she didn't speak the language.
- speaker: Interviewer
  text: Basla, how were you able to adapt to all of these challenges-- you said that the culture in America in general was
    very different from what you experienced in Iraq. How did you learn-- what resources did you use to adapt?
- speaker: Respondent
  text: So number one for Basla, she has brothers here in the states, and the second reason made her stronger, she has three
    children that came with her so she wanted to be responsible and strong.
- speaker: Interviewer
  text: I see. And just to slow down, I was wondering if you could talk more about how you felt when you first found out that
    you had to come to America. Leaving Iraq must have been a very hard thing to do because that's where you were born, that's
    where you grew up. Where were you when you found out that you had to move and how did you process that? What were the
    things that you really wanted to do before you left for America?
- speaker: Respondent
  text: When she moved to the states it was a visit. A visit just for 3 months to do the check ups and her treatment. But
    when she moved to the United States everything changed in her country and stopped her from going back. So the plans changed.
- speaker: Interviewer
  text: So I guess just to ask a follow up question-- you didn't know that you'd be staying in America for the long term.
    Is that correct, am I understanding that?
- speaker: Interviewer
  text: Wow. Once you found out that you couldn't go back, how did you feel and how did you tell that to your children?
- speaker: Respondent
  text: About the kids, about her children-- they preferred to stay here in America because there are more opportunities for
    them, number one. Number two, they don't have memories in Iraq like their memories here now in America. So for these reasons
    she feels okay about her kids.
- speaker: Interviewer
  text: I'm curious to know more about how you maintain their Iraqi identity. I think it's hard to do so when you're in a
    different country. So, do you have any rituals or traditions that you have carried over from your childhood in Iraq and
    then now raising your children-- whether that's through food, through stories that you tell them about your family and
    your life at home in Iraq?
- speaker: Respondent
  text: So for Basla, talking more with her kids about the cultures in general. She talks with them about the two cultures.
    But in particular, the youngest child when he came to the United States, he was 5 years old, so he doesn't know anything
    about Iraqi culture or anything, so he grew up here. So he's the only one she has difficulty dealing with. That one, he's
    5 years old. But also she said that even when she talks to them, even she understands the different culture, and as a
    mom she also tries to be open. For example, she said with relationships at school, if he comes and says mom I have a girlfriend
    she will be open to this, but she will also tell him "there are rules." We also have rules-- like we don't have [INDECIPHERABLE].
    We have not to pass this [INDECIPHERABLE].
- speaker: Interviewer
  text: I see. Ok. And I guess I would like to ask a little bit more about your life in Iraq, Basla, if that's okay. I just
    wanted to understand what shaped you to be the person you are today. Before you came on, Basla, Kinda said that you are
    a very strong woman, and I can tell just from the way that you tell your stories and the way you hold yourself. How did
    you become such a strong woman, if that makes sense? Do you have any stories, anecdotes of when you were a child or a
    teenager in Iraq dealing with hard struggles that shaped you to be the person you are today?
- speaker: Respondent
  text: So when she was young, Basla, she received support. Her mom used to tell her always, "You are strong, you are very
    like-- just strong," you know? She kept telling her "Strong, strong," she said "it made it stick in my mind." And also,
    her dad was in the military, also she said probably from her dad. And at school she participated in many activities at
    school and she was also a leader. So she said maybe these are the reasons that help her become a strong woman.
- speaker: Interviewer
  text: Okay I see. And I want to ask a bit more about religion. How did religion tie a role into making you a stronger person--
    if it did at all. It didn't have to, but if it did, do you have any stories about yourself as a child? I know you were
    really young, but do you remember aspects of your religious routine that kind of made you more conscious of being Muslim
    when you hadn't been before (or of being different)?
- speaker: Respondent
  text: When she was in Iraq, Basla, she was practicing religion-- she's not conservative-- she practiced religion like anyone.
    But when she moved to America, she started to practice her religion more, and the reason why was because she has three
    children. It was as if she felt more responsible to teach them their religion. So she started practicing more than before.
- speaker: Interviewer
  text: I see. So how did that change your religious routine? Because some people-- they go to the mosque every week, sometimes
    you pray more at home. What did having a stronger relationship with your religion mean to you and how did that change
    your routine?
- speaker: Respondent
  text: So for Basla, she wants to be a real model for her children. She said "I keep reading the book, Quran, every day,
    and especially when they are present." I want them to see their mom practicing her religion, number one. Number 2, prayers.
    For example, she doesn't enforce them, but she's trying to be a real model. She practices her prayers at home, when she's
    in the car and the radio is playing music and the prayer starts calling she turns off the radio. That means the prayer
    is now. So they respect that and they know that now. For Ramadan, she teaches them that they have to fast for 30 days.
    She's very strict about this area. And Eid. In Eid, we usually go to mosque. So she said I'm not strict making them pray,
    just with fasting, reading Quran, and for Eid, I like for them to join me when I go to prayer.
- speaker: Interviewer
  text: So, you said that your relationship with your religion became stronger after you came to the United States because
    you want to be a role model for your children. Was it more so to be a better role model and to have some cultural continuity
    because it seems like your religion was a big part of your life in Iraq. Does that question make sense? Was it a mixture
    of being a model and also maintaining your culture, or was it more so just being a model?
- speaker: Respondent
  text: Sorry, can you say that again? The question?
- speaker: Interviewer
  text: Yeah, yeah, yeah. I'm just interested to know how much of a factor was cultural continuity in having a stronger connection
    to your faith after moving to the United States.
- speaker: Respondent
  text: How it became stronger? How she became stronger, to have faith?
- speaker: Interviewer
  text: Yeah. Like what were the reasons behind practicing more religion after moving to the United States. It seems like
    a lot of it was to be a better role model for her children, but was it also because she wanted to maintain a connection?
- speaker: Respondent
  text: Ok, got you. Was it completely just to-- Do you know what I mean?
- speaker: Interviewer
  text: Yeah yeah yeah. Got you. Got you. So this is a very deep question.
- speaker: Respondent
  text: So she said that when she was in Iraq-- in Iraq it's much easier for kids to grow up and understand about their religion
    because of the culture. Because education is everywhere. Everywhere they go they tell them about religion. But when it
    comes to America, it's different. The responsibility is number one for the family. The parents. Because of her case, I
    think Basla, she did it by herself. Her husband still, he lives in Turkey. So she's the one responsible. She's the father.
    She's the mother. This is number one. So she felt more responsible. Number two, she felt the need for God because of her
    medical problems. She became closer to God and it helped her a lot. Number three, her friends. Her friends around her
    also encouraged her to keep in touch with God. Number four, she said she feels good when she goes back to God. Just, she
    feels good.
- speaker: Interviewer
  text: Okay, that makes a lot of sense. Basla, you talked about your friends encouraging you to maintain your relationship,
    and even strengthen it-- how did that impact your experience as a refugee? I guess, your story is a bit different because
    you came to the United States for medical reasons, but how did your stronger relationship with God impact your resettlement
    process in the United States?
- speaker: Respondent
  text: So every time she used to pray to God she felt that he sends her [INDECIPHERABLE] good people, and later they become
    friends. Sometimes he sends her messages, for example medicaid or assistance from here... assistance from there. So also
    when she was in Iraq, she prayed to God and he helped her to come to the US. So she feels like every time she prays she
    sees that goal, the answer.
- speaker: Interviewer
  text: So with everything you've been through, Basla, what does your faith mean to you today-- just reflecting on your relationship
    to God and Iraq, and then how that relationship really flourished and strengthened in the United States today as you're
    sitting in your chair. What does God mean to you-- what is that belief?
- speaker: Respondent
  text: So she believes that God is like a father. He listens to her and he is responsible. Like, she's not feeling well today
    and she knows that she trusts him that he will help her to feel better tomorrow. And everything happens for a reason--
    she believes in that.
- speaker: Interviewer
  text: Okay. And just to talk a little bit more about your relationship to God. You were speaking about how when you feel
    good or bad you kind of speak to God and try to maintain that feeling, or change it for tomorrow. Are there moments where
    you feel God's presence the most? Is it when you go to a mosque, or in private worship where you feel really close to
    your faith in God?
- speaker: Respondent
  text: You are asking about her when she feels close to God?
- speaker: Interviewer
  text: Yeah. The specific moments where she feels the most close to God. Is it when she is physically in a mosque, or is
    it very, very internal. It depends on her internal mood and feeling that makes her feel close to God?
- speaker: Respondent
  text: So for Basla, she keeps close to God when she's by herself. By herself. So because she feels closer, and nobody is
    watching her. So she can cry, she can talk to him, she can express herself the ways she wants without people seeing.
- speaker: Respondent
  text: So she says I feel strong when I go to the mosque and I see people. I feel like I belong to the community. I'm not
    the only person in this community.
- speaker: Interviewer
  text: 'Yeah I really want to ask more about community-- for her and for her children. But before we go there, I was wondering:
    are there any particular Muslim prayers that are especially resonant for you during private worship? You say you feel
    the best when you''re alone-- you feel the most connected to God when you''re alone. Are there any prayers in specific
    that make you feel even closer?'
- speaker: Respondent
  text: I think because in Islam we have only one prayer-- I will ask her the question, I don't know if she can answer.
- speaker: Respondent
  text: So yeah, for the prayers we have five prayers in a day. And for Basla she feels closer to God when she prays at dawn.
    The first one. This is when you wake up before the sunrise.
- speaker: Interviewer
  text: Basla, can you explain more about why it is at dawn-- why you feel the most close.
- speaker: Respondent
  text: I think she told me that.
- speaker: Respondent
  text: She said because in general people are asleep and quiet. Everything is quiet and people are asleep so she feels closer
    to God. She feels more like-- there's a word in English-- I'm trying to remember. She feels closer to God. Reverence.
    And reverence.
- speaker: Interviewer
  text: Okay, I understand. And to talk more about community. Earlier, Basla, you said that in Iraq as a child it's very natural
    for you to learn about your religion in a lot of places, like in school, maybe in your family. For your children today
    in America I would assume that it's not as natural-- like you don't learn about your religion in school (in America--
    it depends, of course) but I was wondering how having a community of your faith-- how did that shape the upbringing of
    your children-- especially your third child. Your son, who has never been in Iraq. How did that community help him understand
    his identity more?
- speaker: Interviewer
  text: She's asking about the community helping him to understand his religion or his identity?
- speaker: Interviewer
  text: I guess that is-- it's complicated, right? Because your religion can be a part of your identity. Or it might not be.
    And she can only speak so much for herself and for her son, but I guess identity in general and religion separately.
