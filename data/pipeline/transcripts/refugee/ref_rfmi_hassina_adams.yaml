collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Respondent
  text: Thank you. My name is Hassina Adams. I'm originally from Uganda. But I was raised in Syracuse, not in but Syracuse,
    in Johannesburg, South Africa. And my family was resettled to Syracuse in 2015. I moved here with my four siblings, both
    my parents unfortunately passed away. My dad first, he died in 1999. He worked for the Ugandan government, but was accused
    of treason. And shortly thereafter, was executed. My mom fled Uganda and ended up finding asylum in South Africa, where
    she then raised me and my siblings. During the thirteen years that we were in South Africa, about five or six years, was
    spent applying for resettlement to different countries. My mom had hoped to resettle in Canada, but ended up getting an
    interview with USCIS. And from there she started the process of resettlement through UNHCR. But unfortunately, just when
    she was about to receive confirmation from USCIS immigration, she passed away from tuberculosis. So my siblings, and I
    ended up sort of continuing the application. And we ended up getting selected and had an interview with a DHS officer.
    And not long after that, we were accepted for resettlement and ended up coming to Syracuse.
- speaker: Interviewer
  text: Sorry about that. I can imagine how hard it was to grow up without both of your parents. Can you tell me a little
    bit more about that?
- speaker: Respondent
  text: Yeah. So I think not having like my dad around sort of didn't hit me as hard as it did when my mom passed away because
    I didn't know him - he died when I was two years old. So I have like this abstract idea of what my dad looked like - what
    he was, what he did - but because I didn't meet him, I don't have that emotional connection to him. But with my mom -
    she was there throughout, you know, my childhood. So when she fell sick, it was sort of very hard to come to terms with,
    because now like, you see someone you love, slowly dying, and you don't have like, any control over it. So coming to terms
    with her death was really hard. And it also hit me even more, because it was like the beginning of the school year. So
    literally, the first day of school, when we're supposed to go to school, we had like a knock at the door. And it was like
    family friends coming to let us know that she had passed away. So sort of, you know, starting the school year off on a
    bad note was hard enough, and then coming to terms with that she had died and you don't have a parent anymore. Now you
    have to sort of parent yourself, and then also look after, like, my siblings and stuff. So that was really, really hard.
    And it happened when I was in eleventh grade. So I was sort of, I don't know, hitting like my adolescent years, you know,
    like, at the prime of my adolescent years, but at the same time, I'm still a kid; sixteen, fifteen, somewhere there. So
    I was really young. So it was..yeah, it was a really new reality that I had to come to terms with because I had no control
    over it. But it nonetheless, was very painful. It was really hard.
- speaker: Interviewer
  text: And your siblings, they were younger than you?
- speaker: Respondent
  text: Well, I had an older sister...well, I have [UNDECIPHERABLE] I have an older sister. And then it's my brother and my
    youngest sister. But I think for them, it was easy to like, sort of process the emotions because they're very like, I
    don't know, expressive. Whereas with me, I'm very withdrawn and reserved. So even when we visited the morgue and we saw
    her body, they were all crying and I was just sitting there, standing there. I don't know; I didn't know how to process
    anything. I was...it hit me, but not as hard as I thought it would like, a few months after she had passed away because
    in the beginning, you're sort of in denial. And then as time went on, and you know, you come home from school, and you
    don't have your mom around anymore, that like reality sort of sinks in. And, yeah, I wasn't ready to. Because I mean,
    she had been sick for a long time, but I always hoped that she would get better. So that hope that she'll make it, and
    then her not making it, like, you know, clashed with what I was seeing. So, yeah, no, it was it was really, really hard
    and taking care of my siblings, because my sister then had to work to sort of take care of us. So I was the mom of the
    house now. Having to explain to my youngest sister when my mom wasn't around anymore was also hard because she was around
    nine or ten years old when it happened. So that was also like a hard conversation to have and then going to school. And
    because, like I went to like a private school, and we were like a tight knit community, so now having to like face my
    friends and my teachers, and they would have to like tiptoe around me when they were talking to me, you know what I mean?
    Like that, that was sort of like an environment that I didn't like being in, because then I was always looked at, like
    sympathy. Like, oh, you know, her mom, just died type of thing. And it just brought unneeded attention. I felt like at
    the time, because again, like, I'm reserved, I'm very introverted, I like to keep to myself. And then here is this, you
    know, big news, like, "Oh, like, my mom passed away." And now everyone, sort of like, "Oh, you know, let's go easy on
    her" or whatever it is. I just, it was just like an amalgamation of a lot of things happening all at once. And I didn't
    know how to, like, navigate this, this new life. But I also know that, you know, my mom, if anything would have wanted
    like us to be happy to, you know, to remember her in a positive note, and not like the sick years of her life. And I think
    her hope of giving us a better future propelled us to want a better future for ourselves too; to not let her death be
    in vain. And to also like, you know, make her dream come true. She wanted to like resettle, it was always her dream, like,
    I want to give my kids a good life. So I want them to be in a good environment that'll sort of nurture that. So the fact
    that she died and didn't experience what we are now experiencing, makes it even more like, sad to say, this was her dream,
    sort of, and now we're living it for her, which isn't, is not a bad thing. But it would have been nice to sort of have
    her around, share these moments with her. So yeah. And like our mom was very, she was very, very religious. So I think
    we took a lot of the faith that we have, was the foundation that we have now was built, you know, through her through
    her example. She always always prayed like, on time, she was always helping out at the masjid. She was always in contact
    with the community, someone died, she was always there for them. So when she died, like a lot of people, even many that
    we didn't know had been touched by her came and, you know, they cried. I remember this one, like really close friend of
    hers, who had two twins that had like, immigrated to Canada, when she had heard that, like, my mom passed away, she didn't
    believe it because the news hadn't gotten to her until a month later. So when she came, she like got into the house and
    she sat down and just started crying. Because it was hard for her too. So I know that you know, if anything, like her
    good example, helped a lot of people. So it helps me to know that where we are now is where she would have wanted us to
    be. So do you have like any other..
- speaker: Interviewer
  text: That's... thank you for sharing that. It's really important. It's this kind of combination of motivation that you
    feel inspiration as well, but in the same time knowing that if your mom is around that she would be happy, but she's not
    around. So how you as a young person? How you navigate that? Do you ever think about that? Do you think that you overcame
    the trauma that you had or that loss that happened before you resettled?
- speaker: Respondent
  text: No, I don't think people learn to deal with the trauma, but you don't overcome it, especially with grief too. You
    learn to live with it; you sort of learn to accept the reality of things. And you also learn to sort of deal with, like,
    the emotions that accompany the grief and the trauma, because I know like, every now and then, I'll feel sad, like if
    I see someone with the mom, like, you know, that's, that's something I'll never experience sort of. So I'm learning to
    come to terms with it; I'm learning to live with it. You learn to live with it; you learn that it's a part of who you
    are, a part of your identity. But you also don't let it sort of consume you. Because I know like, a few months after my
    mom passed away, I didn't think I'd be sad at all. Not because I didn't want to express myself in that way. Like, I didn't
    want to be vulnerable, right? I didn't want to cry like most people cry. I thought, like, "Oh, I'm going to honor her
    legacy and her memory by doing the things that she would have wanted me to do." So I felt secure in my understanding of
    how to deal with grief. But a few months later, like when you're living that reality, it's sort of hits you like it's
    not, you know, as much as you want to cherish the legacy of this person, you've got to mourn the fact that physically
    they no longer with you, right? So you learn to live with that fact. So every now and then, like, of course, I'll cry.
    But I also know like, if I let myself become too vulnerable, I'll sort of plunge into grief and depression. And I don't
    personally... I don't think I'd be able to survive it. So I focus more on like, the positive things that my mom, you know,
    taught us and left behind, and everything that she has instilled in me, that makes me who I am today. And not so much
    in the fact that she's gone. And I'll never, like see her again, sort of thing. So yeah, it's hard, like dealing with
    trauma. But I do think that, to some degree, like the trauma, or at least the grief of not having been around, has taught
    me to be very... to cherish the things that I have around me; to be, you know, cognizant of the fact that, yeah, I'm not
    going to be around forever, my siblings are not going to be around forever. Like, I need, if I love something, I should
    do it, you know, wholeheartedly with full conviction, full faith, put in all the effort that I need to put in, because
    tomorrow we might be gone, which is what happened with my mom, like one day, she's there, next moment, she's not. So I
    have learned to deal with how fleeting certain things can be.
- speaker: Interviewer
  text: So now, I'd like to go back to resettlement. So even thinking about that without variances is hard. And I'm sure you
    didn't do it on your own. So can you share more about that, how that happened after you spoke with officers? How that
    process was?
- speaker: Respondent
  text: 'Yeah. So after our mom had passed away, she had worked with a counselor in South Africa, through like, a program
    called CSVR - Center for Violence, Trauma and something along those lines. She had formed a really good relationship with
    one of the counselors there and when the counselor heard that our mom had passed away, she reached out to UNHCR. And she
    told them about it. She said, "I understand that, like the case had been opened by you know, her, but is there any way
    we could allow it to continue and instead of like starting from scratch?" because my mom had gone through the whole process
    of getting interviewed, getting like intake completed traveling to and from the city where the headquarters of like the
    UN was because we lived in Johannesburg, but UNHCR was in Pretoria, and it was like an hour and a half travel to and from,
    right? So it was really, really hard to sort of start that process from scratch; so when she put in that word, and she
    reached out to the Commissioner of that program, so they came to visit us, and they were really heartbroken by, you know,
    my mom''s death and everything, because she...I don''t know why, though, cause I mean, a lot of people go through this
    process. There''s no...you know, thousands of people that got processed. And not many get visited by the Commissioner
    of like the UNHCR. So that was surprising to us. But I guess that''s also God''s way of sort of opening doors that, you
    know, was shut before, I guess. So yeah, when we were visited by the commissioner, she told us that we could continue
    like, the process. But we would have to do it as minors, so they would have to change the case. And it would be processed
    without our mom in it. So we went through like, second half of the process where we got interviewed by like US immigration,
    and the men that we met the one of the DHS officers was really, really nice. We thought it''d be intimidating sort of
    sitting, you know, with this person from America, because our like conceptualization of America was just like, "Oh my
    God, this, this land where, you know, all these successful things happen for people." So we''re afraid like coming from
    like a small...I mean Johannesburg is a big city, but we''re like, you know, we''re kids. So yeah, it was intimidating.
    But he was so nice. He made us feel welcoming. He like brought... he had his assistant bring us juice to make us feel
    comfortable. He was like, "Briefly talk to me as if you were talking to someone you know" type of thing. And he asked
    us like a series of questions: why we want to immigrate to the US?; what it would mean for us; what we would do if we
    came. Yeah, and we answered, we answered it to the best of our abilities. I know that, you know, it''s been a, it was
    a while, but I know we had talked about how like, you know, we don''t have, we won''t have like a lot of the opportunities
    we would like to have, if we stayed in South Africa, especially being refugees with the social network, like the social
    services system isn''t in place to help people from other countries. So we wouldn''t have the same opportunities, we would
    have there if we were to come here. And we talked about how we would work hard, you know, go to school, further education,
    get a good job, and be functioning members of society, and give back to. So I don''t know if anything that we said had
    resonated with him, but it sort of did, I guess, because we ended up getting like a call back from them like a few weeks
    later, letting us know that we had been approved and that we''re going into the next step of the application. We would
    have like the medical screening done, and then from the IOM would like, help us collect our packets and, and we would
    come so yeah, it was a long process like it was my mom started in, like 2001. And, you know,'
