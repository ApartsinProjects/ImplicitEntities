collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Respondent
  text: We'll start with my index card from the International Tracing Center. And since my father readily didn't tell me this
    story, I had to recreate it from documents at the International Tracing Service that are accessible at the U.S. Holocaust
    Museum here. Then there's the Center for Migration Studies, where there are other records, more on this side of the Atlantic.
    But when I looked at this, it was just like a mystery here - what are these numbers? ZM? What is this number? And my name,
    and it's spelled in Polish, and I'm stateless - Ukraine, that's where I figured out my date - the day I was born, in '47,
    and then I figured this out - it was the street that I was born in. The number. And there's the camp number. So, there's
    all this rich metadata here that being an employee from the Library of Congress you appreciate these access points. And
    then, it tells the next camp I went to, and then there's these codes that I don't know - remarks that they kept - and
    then, from this first one, which was UNRRA, United Nations Relief and Rehabilitation Agency, which was primarily geared
    to have people repatriated back to their countries. That's how these camps were organized, then it transitions to IRO,
    International Relief Organizations, so you see that on the card. This time they spelled my name the way I spell it, and
    then, now I'm not stateless, I'm Ukrainian now, because they're not gonna punish the family and send us back, and then
    Bad Aibling, and then it has "children's center." So that was the official name, but actually, what they preferred to
    call it was "children's village." It was an orphanage, but they didn't want to call it "orphanage," but "children's village."
    The military said, "Children's village? This is a barracks from the Nazi air force, with camouflage around here. There's
    no way that it's a children's village." And, the first camp that I was in was actually a village. It was Cornberg. It
    was based on the English garden concept. And here's a picture of the camp that I was born in. You could see that there
    was hills, and there's streets that are curved -
- speaker: Interviewer
  text: It looks like a village.
- speaker: Respondent
  text: Yeah, it's a little village, and this is the UNRRA -
- speaker: Interviewer
  text: So this was in Hungary?
- speaker: Respondent
  text: This was in Germany. And so, this was actually what I would call a village. Something that - euphemisms sometimes
    happen, depending on what you want to hide, or what you want to accentuate.
- speaker: Respondent
  text: So you see that the index card - then, you see it traced all the way to my sponsor, and then the street that I went
    to, in Philadelphia, I didn't even know. You see here that there's CM - again. It's code. CM, and a number. What I'd learned
    was - like here, you see this stamp here? It's CM, and there's a number, and then I figured with that F, it meant family!
    So this is how - this number was on my sister's, and my father's, index card so that's how they kept the family together.
    You know, that's the problem right now, with the refugee system. Where they're at when they're separated. And then this
    is my unique ID number. There's all this history that people do not know, and even, involvement in the Nazi system, was
    not only German industry. It was IBM. They had these punch cards that they track labor. If they needed somebody in the
    trains - there was Ford and the others. I'm not gonna name these. But the mess that we're in with these disasters and
    people who become refugees - and I'll show you the application for being a refugee. Right here. The questions were, "What
    is your nationality?" Here, Ukrainian - , stateless. Then they ask, "Why don't you want to go back to your native country?"
    And then, this is my mother, she wrote, "Because there are communists there." And then, there's another question of, "For
    what reason do you want to - why don't you want to go?" And then this document says that they're being persecuted because
    of race, religion and political viewpoint. Instead of saying yes or no, like my father put, she puts crosses [laughs]
    on the answers, so you could tell that she's more religious than he is. And then it says, "How are you persecuted?" "By
    the Nazis." And she says, "They didn't allow me to go to church." So this is part of the records from the International
    Tracing Service. So now that I had all the bureaucracy out of the way, now we're going to get to personal documents.
- speaker: Respondent
  text: The story really starts in Philadelphia, where I eventually became an orphan in an orphanage there, in Philadelphia.
    And there was - camps, in Germany, and there were volunteers on both sides of the Atlantic, trying to help these refugees.
    And early - right after the war, there was an orphanage in Philadelphia called Saint Basil's, where I eventually went
    to, and the children collected money for school supplies for the orphans, and they gave it to the Bishop there. The Bishop
    was so moved that he signed a check for five thousand dollars and sent it to a Vatican official, I guess he was probably
    here in Washington, D.C. And he also sent a letter to the chaplain of the third army in Germany. It was in the USL - and
    then he mentioned Ukrainian families who did not want to be repatriated. Also, there were lots of priests that were leaving
    communist countries. And I just wanna tell you about projects that I think are relevant even today. Take for instance,
    a shoebox project. Schoolchildren on this side of the United States collected toys and school supplies - and I'll just
    list one shoebox, and what it had. It said, "There were balls, dolls, marbles, tops, games and cards, nice smelling soap,
    washcloth, toothpaste, toothbrushes and sewing kits. Fancy bracelets and necklaces, candy and chewing gum, pencils, tablets,
    pocket-sized books, rulers, crayons, paintboxes." These are all things that children and refugees need, and even in Ukraine
    today, there are internally displaced refugees. And they asked the people in Arlington to help with school supplies. I
    went to a local school and told them - it was not the first time asking.
- speaker: Respondent
  text: So I want to show a little bit about life before my parents were forcibly moved to Germany. My father was in the Polish
    army, so there's a picture of him - and there's his dog tags. As a prisoner. So, he was in Lager 4, and then there's his
    number. These numbers to track people are pervasive. He's right in the middle, there. And while he was a prisoner of war
    - now, I'm not sure if this is true, but I - one time, I took him to outside of Philadelphia, to a veteran, and it was
    Christmas time. He sang at a Christmas tree. He has a powerful voice that impressed this veteran. And then he mentioned
    that he was a prisoner of war, and he celebrated Christmas in the Julian calendar, and in the camp, he sang the Christmas
    songs. And then the Nazis came with rifles pointed at his head, but he kept on singing. And he said - he thought to himself
    - he says, "If I can't sing, life is not worth living." So then somebody said, "You know, he's not rebelling - it's just
    his Christmas." And then the Germans brought the beer, and the wurst to him. They appreciated the singing. And even in
    the camp that I was in, Cornberg, here are utensils we used. And Americans made my father work for this - it was a half
    a credit - it wasn't very much to get this spoon. I didn't realize this until I researched. I said, "I wonder what this
    is."
- speaker: Interviewer
  text: How do you have these?
- speaker: Respondent
  text: Well, my father, he just gave them to me - he didn't say what it was-
- speaker: Interviewer
  text: He kept them.
- speaker: Respondent
  text: Yeah. He kept them, so. He had these chocolate boxes - like, this Whitman sampler, that had these pictures -
- speaker: Respondent
  text: Yeah! And we had to earn - there was certain points for certain things, for extras. You received your basics - there
    were essentially care packages that they had that were good for - about every fourteen days, everyone would get another
    care package. Being that this was not a typical refugee camp, my parents lived in a home with running water, a wood-burning
    stove, and a garden in the back where they could throw things - I think they earned it more because they were connected
    with Buchenwald survivors. Americans liberated Buchenwald. There were Ukrainian political prisoners there, and some of
    them were musicians and opera singers. I think maybe my father, with his talent for music, somehow got in touch with them
    and they also learned that the Soviets were gonna take over the town that was liberated. A lot of people do not know that
    after Buchenwald was liberated, the Soviets used Buchenwald as a concentration camp. So even though they were liberated,
    there were other political prisoners put in there - but then, that's not the story, that's a deviation - but these people
    in concentration camp, particularly the Ukrainians, they were multilingual. So they knew - sometimes they were asked to
    translate for the camp people. Sometimes they had access to documents about the prisoners and their nationality, or other
    things, so they even were involved in a spy network so that they knew what was coming, if the Soviets were to have that
    territory. So they organized some people and moved out to what was to become the U.S. zone. So the first camp that my
    parents were in was in Hollendorf, and there were Poles, and Russians, and all kinds of nationalities but the Ukrainians
    didn't get along with the Poles nor the Russians. And I think they were really closest to the Jews, because they were
    stateless. People think of the Jews and the Ukrainians as being these enemies, but when I started looking at it, they
    had more in common with each other than differences. So when they were there, the Soviets would come in Jeeps and have
    people repatriated back to what they called Rodina, Soviet home. But the Ukrainians knew what life was under the communists.
    They didn't want to have anything to with it. And being that these people from Buchenwald were very politically organized,
    they would have the women and the children go into the church and barricade themselves. The young people would go and
    overturn the jeeps of the intelligence community from the Soviet, create a diversion. The Americans were so impressed
    with how they were organized, and also their singing - I don't know what was more, maybe it was a combination of both
    - they said, "Well, it's getting cold, and you're gonna need to be in a warmer place, and have your supplies," so that's
    how we moved thanks to the Third Army, U.S. Third Army, to this model city of Herman Goering's, for mine workers. It was
    a copper mine, very strategic and important. So they gave the residents forty eight hours to vacate, and they could only
    take their eating utensils [laughs]. At Cornberg, they had everything anyone would need, they had the firewood already
    chopped down, ready, and so the Ukrainians moved, and they were pretty much given self government. They said, "Well, you
    want to go to a democratic country, you better start practicing it, and elect your council and your leader," and the additional
    thing that the camp didn't have was a stage for performing. So, the American troops gave them lumber and said, "Here,
    build it. You're gonna need a storehouse. We have a lot of supplies nearby, but you're gonna have to store it." They did
    build that.
- speaker: Respondent
  text: Of course, that time, they were just thinking that they could go back to Ukraine and we would be liberated and a lot
    of people did not know that Ukraine was fighting the Soviets in guerrilla warfare until about 1954, until Stalin died,
    so there was some hope, but it didn't pan out. From that camp, my family had to move because the residents said we're
    only supposed to be there six months, and it's been three years. They moved us to Leipheim, which was more of a typical
    - it was another - before I finish with Cornberg, because the thread is Jewish and Ukrainian relationships. Another camp
    that was nearby was Eshwege. It was totally Jewish. There were synagogues started. There were Zionists there. They were
    doing agricultural work to prepare them to go to Palestine. And so it was similar in the Ukrainian camp. They knew how
    to grow things. The first institution that they put in - and now I'll get into the topic of the church - was, in addition
    to the warehouse and the stage, they built churches and schools, because they wanted to educate the younger generation
    and schools and churches were important. The churches were Catholic and Orthodox and Baptist, and they got along together,
    and they even worshiped in the same church that they built. Through music and performing - they were able to perform in
    the red cross gatherings and thanksgiving. At a lot of these gatherings, they would throw chocolate and cigarettes at
    the stage. They'd barter for a bell, so the religions were in the same facility. Of course, there were minor differences
    - the Catholics would go first, because they were the majority, and then Orthodox would go later, but then they would
    turn their icons around because they had different symbolism . So there was this accommodation going on. I don't know
    that much about what was happening in the Jewish - it was probably similar. It was more - UNRRA was repatriation, nationalism,
    all these things, but then, in the second camp, it was a transition - it became internationally "refugee organization"
    - so you could see that in this camp, which was called Camp Leipheim, which was also an Air Force base . They were the
    first to go to Leipheim, so they had their schools and synagogues and classes, but in Leipheim they started - in addition
    to teaching Hebrew, which was a modern language rather than Yiddish and the others - they did also have English lessons.
    They were trying to get skills that would be helpful. There was a Jewish organization called ORT - Organization for Rehabilitation
    and Training. So there were these skills in addition to sewing, like my father. There were electronics and modern technologies.
    When the Ukrainians came - when the Jews left the camp to go to Palestine. A lot of them that were there were on the ship
    that launched the nation at Exodus. There's a film about that. Then, a lot of people don't know that there's a film called
    Mike and Stefani, about the Ukrainians in this camp, and it gives you a real feel for the life. That's where I became
    an orphan. My mother just couldn't take care of her children due to postpartum depression. I would make demands on her.
