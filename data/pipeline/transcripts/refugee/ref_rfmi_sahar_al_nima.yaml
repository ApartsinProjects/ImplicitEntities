collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood in Baghdad?
- speaker: Respondent
  text: I grew up in Baghdad during a very difficult time. I always knew something was wrong, even as a child. The aftermath
    of the Gulf War made life very hard for us.
- speaker: Interviewer
  text: What was it like when your family moved to Syria?
- speaker: Respondent
  text: We moved to Syria after the invasion in 2003. I remember Syria fondly. It was the place where I experienced more of
    a real childhood. There were no sounds of war, and we had basic necessities. I adapted there quickly and became more religious
    because of the conservative middle-class community we interacted with.
- speaker: Interviewer
  text: How did your move to Kuwait compare?
- speaker: Respondent
  text: Kuwait was a much harder move for me. I was older, and the environment was very different. Kuwait is segregated, very
    rich, and conservative. I felt trapped there.
- speaker: Interviewer
  text: Did your parents discuss moving again after Kuwait?
- speaker: Respondent
  text: Yes, in high school, I remember wanting more. My parents talked about moving to the US, and this was the first move
    I actively wanted.
- speaker: Interviewer
  text: Can you tell me about your religious background growing up?
- speaker: Respondent
  text: I grew up Muslim. My father was Christian from a non-religious family, and my mother was Muslim and a bit more religious.
    In Syria, our family interacted with a conservative middle-class community, which led me more towards religion. But I
    never believed blindly; my mother encouraged me to think for myself.
- speaker: Interviewer
  text: How did your religious education affect you?
- speaker: Respondent
  text: Schools were separated by gender, and the conservative religious education affected my sense of self. When I was twelve,
    I was sexually assaulted, and I started wearing the hijab as a result. I felt it was my fault for freely wearing my hair.
- speaker: Interviewer
  text: When did your feelings about religion start to change?
- speaker: Respondent
  text: My falling out with religion started in Kuwait. I had consistent access to the Internet, which expanded my worldview.
    I was a big reader, and my understanding of English meant I didn't need to wait for translations. I even pushed back against
    my teacher in religious class.
- speaker: Interviewer
  text: How did your family respond to your questioning?
- speaker: Respondent
  text: My mother encouraged me to push back and develop a fluid relationship with religion. When I came to the US, the first
    thing I did was take off my hijab because I didn't want people to have preconceived notions of me.
- speaker: Interviewer
  text: How do you experience your identity in the US?
- speaker: Respondent
  text: Islam is racialized here. Religion isn't important to me in terms of faith, but it is important for the community
    it gives me. I grew up Muslim culturally, and being Arab is tied to being Muslim for me. I don't do all the small religious
    acts.
- speaker: Interviewer
  text: What was your experience with education in the US?
- speaker: Respondent
  text: I loved college and did very well academically. I was excited by the educational atmosphere, but I grew to realize
    that my image of the US was not the real US. The start of Black Lives Matter made me aware of many issues. At first, I
    tried to avoid looking at the problems, but after the 2016 election, I tried to help in any way I could, mostly working
    with the Muslim and Arab community.
- speaker: Interviewer
  text: How has being in the US affected your sense of identity?
- speaker: Respondent
  text: Being in the US made me want to identify even more as Muslim. My identity is an act of defiance, and I want to embrace
    it openly.
- speaker: Interviewer
  text: What does home mean to you now?
- speaker: Respondent
  text: I don't think of home as a specific place. Mostly, it's my family, but I also describe home as a feeling where I can
    be all of myself and all of my identities at once. I could maybe call Colorado home, but not the whole US.
- speaker: Interviewer
  text: Do you have any final thoughts on faith?
- speaker: Respondent
  text: I don't benefit from completely denying religion. Even if you don't have a lot of faith, it's still better to have
    it in your life for a sense of community.
