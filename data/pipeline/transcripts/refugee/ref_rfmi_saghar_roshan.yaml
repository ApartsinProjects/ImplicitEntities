collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experiences facing persecution in Iran as a Baha'i?
- speaker: Respondent
  text: I am a fifth generation Iranian Baha'i. Before the Islamic Revolution, we had some measure of religious freedom, but
    after the revolution, the regime began persecuting us and restricting our rights. It was very difficult, especially in
    school. I remember when I was eight years old, I faced discrimination just because of my faith.
- speaker: Interviewer
  text: How did this persecution affect your education?
- speaker: Respondent
  text: My last two years of high school were very difficult. Baha'is were not allowed to pursue higher education, which was
    heartbreaking because I was a top student in engineering. I became involved with the Baha'i Institute of Higher Education,
    an underground university. It didn't have many resources, and I had to travel 7-8 hours to the capital city to attend
    classes.
- speaker: Interviewer
  text: What challenges did you face after finishing your studies?
- speaker: Respondent
  text: Even after finishing my studies at BIHE, it was hard to find work because my education wasn't recognized by employers.
    On top of that, my father was jailed when I was 21 or 22. He was a well-known businessman, and the authorities took his
    businesses and arrested him after searching our house for Baha'i materials.
- speaker: Interviewer
  text: How did your family cope during that time?
- speaker: Respondent
  text: I was the eldest sibling, and my mother was sick, so I had to take care of the household. We were regularly interrogated
    about my father and accused of spying for Israel. They even told us he had been killed. Thankfully, he was released after
    local residents protested his detainment.
- speaker: Interviewer
  text: What made you decide to leave Iran?
- speaker: Respondent
  text: I realized I had no future in Iran. I didn't have a job and had to rely on my father's financial support. I was volunteering
    for the Baha'i university but wasn't paid. Government agents had been following me for years. Since Iran had no UN office,
    I had to travel to Turkey. I lost all my money and possessions on the way and struggled to survive there.
- speaker: Interviewer
  text: Did your family support your decision to leave?
- speaker: Respondent
  text: At first, my father didn't want me to leave and didn't support me financially. But after I was robbed on the way to
    Turkey, he began to support me again. I went alone because my father wasn't allowed to leave Iran, and my younger brother
    couldn't get a passport since he hadn't served in the military.
- speaker: Interviewer
  text: How was your experience in Turkey?
- speaker: Respondent
  text: It was very hard. I was there for six months, trying to make a living with very little money. Eventually, I moved
    to San Antonio in the United States.
- speaker: Interviewer
  text: What was it like adjusting to the Baha'i community in San Antonio?
- speaker: Respondent
  text: There is a sizeable Baha'i population, but not many Iranians. I had difficulty adjusting because I felt my community
    in Iran took the religion more seriously. I was also frustrated with how some Iranian Baha'is here didn't teach others
    more. It took time to adjust because everyone comes from different backgrounds, but I'm happy living here now.
- speaker: Interviewer
  text: How did your faith help you during these transitions?
- speaker: Respondent
  text: Religion was very important to me, especially when unexpected difficulties arose. When I left Turkey, I wore my necklace
    with the Baha'i symbol to the airport. The man who picked me up recognized it and was Baha'i too. It was a relief to find
    community in my new city.
- speaker: Interviewer
  text: Can you tell me about your work with Catholic Charities?
- speaker: Respondent
  text: Catholic Charities sponsored me to come to the U.S. in 2004. Since 2009, I've worked with them, and since 2016, I've
    been the program director for the reception employees. I want to serve humanity through my career because I understand
    what the people I help have been through.
- speaker: Interviewer
  text: What do you want people to understand about refugees?
- speaker: Respondent
  text: Refugees don't want to leave their home countries. They only do so when they see no future there or are forced out.
    It's a very difficult decision and journey.
