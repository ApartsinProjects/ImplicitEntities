collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood memories growing up in Cuba?
- speaker: Respondent
  text: I remember playing in the street with other children late into the night. It was a tight-knit community where everyone
    knew each other.
- speaker: Interviewer
  text: How did your family experience the Cuban Revolution?
- speaker: Respondent
  text: My grandfather was a teenager at the time. He told me a story about finding a journal written by someone fighting
    with Fidel Castro. There was a lot of fear during that time.
- speaker: Interviewer
  text: What was it like for your parents adjusting to life in the United States?
- speaker: Respondent
  text: It was much harder for them. My mother used to cry every day because she wanted to live in Cuba. Language acquisition
    was also very difficult for both of them.
- speaker: Interviewer
  text: How do you view the political leanings of older Cuban immigrants in the U.S.?
- speaker: Respondent
  text: Often, older Cuban immigrants are Republican because they fear Democrats are communists and will turn the U.S. into
    Cuba like they remember from their childhood. I am more liberal, but I find American liberals are extremely misinformed
    about communism and its effects in Cuba.
- speaker: Interviewer
  text: What do you think was the only positive effect of communism in Cuba?
- speaker: Respondent
  text: The high literacy rates. The health care system was dysfunctional but free.
- speaker: Interviewer
  text: Can you describe the poverty you witnessed as a child in Cuba?
- speaker: Respondent
  text: There was extreme poverty, and the government played a role in increasing the suffering of the people.
- speaker: Interviewer
  text: What was your experience adjusting to school in America at age 10?
- speaker: Respondent
  text: It was hard because I didn't know the language. I felt alienated being placed in ESOL classes and not in the gifted
    classes. But once I learned the language, the social transition became very easy.
- speaker: Interviewer
  text: How did your classmates react when they found out you were Cuban?
- speaker: Respondent
  text: They were surprised because I was black. Most Cuban immigrants in Florida were white at first because only wealthy
    Cubans could manage to leave the country.
- speaker: Interviewer
  text: Can you talk about your racial identity as a mixed person in America?
- speaker: Respondent
  text: My mother was mixed and my father was white, but in America, I was only perceived as Black. Cubans see race more on
    a spectrum, whereas Americans judge by how people look and put them into distinct categories.
- speaker: Interviewer
  text: How did your mother handle racial identity differences between Cuba and America?
- speaker: Respondent
  text: She had a harder time understanding and accepting that in America, she was always perceived as black and should not
    call herself 'mulato' as she did in Cuba.
- speaker: Interviewer
  text: What role does colorism play in Cuban culture?
- speaker: Respondent
  text: There was colorism where people felt proud if they were light-skinned or white-passing and felt darker skin was not
    as beautiful. This is an effect of colonialism.
- speaker: Interviewer
  text: How does language reflect racial identities in Cuba compared to America?
- speaker: Respondent
  text: In Spanish, there are many different words for racial identities, whereas in America, it is mostly just black, white,
    and to a lesser extent, mixed.
- speaker: Interviewer
  text: Have you discussed the Black Lives Matter movement with your parents?
- speaker: Respondent
  text: Yes, I tried to convince them that the rioting was for a good reason. My father agreed that the justice system in
    America is corrupt and unjust to black people.
- speaker: Interviewer
  text: What was your religious upbringing like?
- speaker: Respondent
  text: I was baptized Catholic but my family and I were not religious. I went to church masses with friends for the social
    aspect and enjoyed them, but after reading Richard Dawkins, I realized I was an atheist. I remember debating with a friend
    in sixth grade about why God wasn't real.
- speaker: Interviewer
  text: What interests you about Afro-Cuban religions?
- speaker: Respondent
  text: I'm interested in how they assimilated surface aspects of Catholicism, like the saints, but for worshipping their
    own gods. I take an intersectional approach to studying these religions and the effect of colonialism, since Spanish colonizers
    were Catholic.
- speaker: Interviewer
  text: How does your atheism affect your study of religion?
- speaker: Respondent
  text: It helps me study religion objectively. I find that Americans do not always view all religions as equal.
- speaker: Interviewer
  text: Can you describe the influence of Catholicism in Cuban culture?
- speaker: Respondent
  text: Catholicism has a strong influence but also represents a power dynamic. I'm fascinated with Afro-Cuban religions because
    I see them as part of my heritage. I am confused that Americans find the animal sacrifices of Afro-Cuban religions bad.
- speaker: Interviewer
  text: How did the Cuban immigrant community in Florida affect your adjustment to the U.S.?
- speaker: Respondent
  text: The strong community of Cuban immigrants made my adjustment easier.
- speaker: Interviewer
  text: How has your interest in your heritage changed as you've gotten older?
- speaker: Respondent
  text: I want to know more about my heritage. I do online research into plantations and Afro-Cuban culture in Cuba so I can
    pass it on to my future children.
- speaker: Interviewer
  text: What differences did you notice when you visited Cuba recently?
- speaker: Respondent
  text: I noticed the differences between the two countries more sharply.
- speaker: Interviewer
  text: Has your family been able to visit Cuba often?
- speaker: Respondent
  text: My mother has visited several times because her mother was sick and then passed away. My father has not visited due
    to circumstances.
- speaker: Interviewer
  text: Did the pandemic affect your plans to visit Cuba?
- speaker: Respondent
  text: Yes, Covid prevented another visit that my parents and I would have made.
- speaker: Interviewer
  text: How important is language in passing on your heritage?
- speaker: Respondent
  text: Language is very important. I feel sad that many Cuban immigrants in Florida do not pass on the language because they
    want their children to have an easier time assimilating.
- speaker: Interviewer
  text: Do younger generations of Cuban immigrants identify with Cuban culture?
- speaker: Respondent
  text: Many children and grandchildren of older Cuban immigrants don't identify with Cuban culture anymore; they really are
    American.
- speaker: Interviewer
  text: Can you tell me about your uncle's experience immigrating to the U.S.?
- speaker: Respondent
  text: He immigrated in the 80s and knew no one in America. My experience was easier because he helped me.
