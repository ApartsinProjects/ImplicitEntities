collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience immigrating to the U.S. from Afghanistan?
- speaker: Respondent
  text: In March 2020, I was granted a Special Immigrant Visa because of my work with the US Army in Afghanistan. I then flew
    from Kabul to Kentucky with my wife and three young daughters.
- speaker: Interviewer
  text: What was your initial impression of America compared to other countries you have lived in?
- speaker: Respondent
  text: To my delight, unlike Japan where I had lived for two years while pursuing a master's degree, America proved more
    diverse.
- speaker: Interviewer
  text: How did the COVID-19 pandemic affect your plans after arriving in the United States?
- speaker: Respondent
  text: The pandemic posed an obstacle in many of the plans I had hoped to execute once in the United States, such as enrolling
    my daughters in schools that I believed would better prepare them than the ones in Afghanistan.
- speaker: Interviewer
  text: What are your goals regarding your daughters' education?
- speaker: Respondent
  text: My most important goal upon arriving in the United States was to find good schools for my three young daughters.
- speaker: Interviewer
  text: Can you tell me about your wife's background and her plans?
- speaker: Respondent
  text: My wife holds diplomas in midwifing and engineering construction. She plans to pursue even higher education.
- speaker: Interviewer
  text: How were you and your family resettled in the U.S.?
- speaker: Respondent
  text: We were resettled by the Kentucky Refugee Ministry. After refugees are resettled in the US, they are offered financial
    assistance for six months. I was able to support my family through this establishment, but now I have to find a job.
- speaker: Interviewer
  text: How would you describe the lifestyle and social norms in Afghanistan compared to America?
- speaker: Respondent
  text: The lifestyle and social norms in Afghanistan are very distinct from those of America.
- speaker: Interviewer
  text: How has the pandemic affected your social life and community connections here?
- speaker: Respondent
  text: Since we moved to the US shortly before the pandemic intensified, we have been isolated from our neighbors. I feel
    that I have not yet found a community.
- speaker: Interviewer
  text: Can you describe the role of family in Afghan culture?
- speaker: Respondent
  text: In Afghanistan, one's family is especially central to one's life. For example, I lived not only with my nuclear family
    but also my extended family in a single house; furthermore, communities are organized around family, then tribe, and then
    ethnic group.
- speaker: Interviewer
  text: What role does religion play in Afghan communities?
- speaker: Respondent
  text: Religion plays a central role in the formation of communities in Afghanistan. For example, Sunni Muslims tend to live
    separately from Shia Muslims.
- speaker: Interviewer
  text: What is your personal view on religion and spirituality?
- speaker: Respondent
  text: I don't seem to believe in organization around religion. I believe that religion is more of a personal, spiritual
    tool that can be essential for perseverance for people who know it well.
- speaker: Interviewer
  text: How has your faith helped you during the pandemic and your adjustment to the U.S.?
- speaker: Respondent
  text: The COVID-19 pandemic made acclimation into the US difficult for my family and me, but it was my faith in God (Allah)
    that kept me hopeful.
- speaker: Interviewer
  text: What do you mean by having a 'cognition of religion'?
- speaker: Respondent
  text: It is important for one to have a cognition of religion, which I summarize as the attempt to understand different
    facets of religion and its impact on one's life.
- speaker: Interviewer
  text: Why do you follow Islam?
- speaker: Respondent
  text: I follow Islam because I grew up in an almost entirely Muslim nation.
- speaker: Interviewer
  text: What are the dangers of having an incorrect understanding of religion?
- speaker: Respondent
  text: Having the incorrect cognition of a religion can lead to extremism and sometimes even death.
- speaker: Interviewer
  text: Can you share your experience with faith while studying in Japan?
- speaker: Respondent
  text: While studying in Japan, I was often asked to speak on the actions of ISIS as I was the only Muslim in my class.
- speaker: Interviewer
  text: How does the cognition of religion differ between Middle Eastern countries and Western countries like Japan?
- speaker: Respondent
  text: In Middle Eastern countries, religion is the first priority and that often endangers economies and stability, which
    is a consequential difference from Western countries.
- speaker: Interviewer
  text: How did your parents influence your view on education?
- speaker: Respondent
  text: As a child, my parents who are both illiterate instilled in me the value of education.
- speaker: Interviewer
  text: How did your studies in Japan affect your worldview?
- speaker: Respondent
  text: My cognition of the world greatly broadened after my studies at a diverse school in Japan.
- speaker: Interviewer
  text: Have you ever doubted your faith?
- speaker: Respondent
  text: I once doubted my faith when I realized that for forty-four years, Afghanis had been praying for the conflict to end
    and yet it just endured.
- speaker: Interviewer
  text: How do you revive your faith when you feel doubtful?
- speaker: Respondent
  text: When feeling doubtful about my faith, I recall what I have achieved thus far in my life. It allows me to believe that
    I can overcome all the present difficulties with the help of God because it was also He who previously blessed me.
