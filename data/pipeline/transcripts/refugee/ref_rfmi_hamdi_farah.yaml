turns:
- speaker: Respondent
  text: Okay. My name is Hamdi Farah. Today is August 7, I apologize. So I am Somali; my nationality is Somali. And I was
    born in Kenya. My mother had migrated from Somalia when the civil war happened. So I don't know anything from my nationality
    country. I just know through the stories and experiences that my mother and my father had both shared with me. I was in
    Kenya until I was twelve years old, and I was resettled in the United States with my whole family. What I remember about
    Kenya is I used to live with my grandma. So I think back then we were nine kids. So I used to live with my grandma, and
    my aunt and my uncle. And I was basically like the spoiled kid in the house. And I used to get away with a lot of things.
    For example, I wasn't a fan of going to school; they did have schools in the camp. But I didn't like going to school.
    And my grandma had never pushed me to go to school and learn and all that stuff. So when I came to the United States with
    my family that had to change, I had to attend school.
- speaker: Interviewer
  text: Okay, so do you mind sharing a little more about camp itself?
- speaker: Respondent
  text: Camp? Okay, so like, when I was a kid in the camp, I didn't really think much about it. Like, to me, that was the
    only world that I knew. I didn't have TV to see the other side of the world. I didn't have other girls to look up to that
    were in school, or that were motivated about working and making living for themselves. Like, I was just a kid who wakes
    up. We did have food. I never slept hungry. But like, it didn't have opportunities. And we were dependent on what my father
    makes and brings, and what my uncle makes and brings for our family. It was like, we didn't have streets and stuff. We
    had like sand. I don't know what they call like the street floor over here outside. Yeah, we didn't have pavements, we
    had sand. We didn't have floors, we had houses just built on the floor. I mean, like, we didn't have stairs and stuff.
    To me, like at that time, that was the best life I could have. I had friends, I had my grandma, I had my uncle, I had
    my whole family around me. I was raised with so much love. So I didn't really think that I was missing much about the
    world. I was living my best life. And I just thought that you know, it was just me. And you know, I have everything I
    could ever ask for. And the camp that I lived in, I lived in like where there was a lot of Somali people there. And there
    wasn't other kinds of other people from other countries. So I was seeing white people. I would see different people for
    example, white. And it used to fascinate me but I did not see a lot of the Kenyans cause they lived in the cities and
    stuff. I didn't see other people from other countries. I never saw Asian people. I didn't see any Arab Muslims, like I
    just thought like, you know, at that time, I felt like we were the only Muslim existing people. I mean, it's kind of weird,
    but yeah, that's just what I saw. And that's just what I believed in. I wasn't attending school as well, like I would,
    my grandma would force me to go to school and I would pretend for like two days and then I would stop attending. So yeah,
    that was, that's what I remember.
- speaker: Interviewer
  text: So I just want to understand something better. You said you felt it was best life without TV and video games?
- speaker: Respondent
  text: '[INTERVIEWER CHUCKLES] Yeah, like, without TV without games. Like there wasn''t nothing to waste my time at and like
    people be like, "Oh,'
- speaker: Interviewer
  text: Did you know that it exists?
- speaker: Respondent
  text: No, I didn't...I mean I did. But like I did know that there was such a thing as TV because we had, they, in the camp,
    they had like a movie theater. It wasn't like compared to America, the ones that we have now. But there was such a thing
    as a movie theater. But as a young girl you're not allowed to attend especially as a girl as a Muslim. You're not allowed
    to attend movie theaters, because it's usually like a bunch of boys watching soccer games or like watching movies that
    are translated into Somali so like, I would get a peep of it, but like, it wasn't anything that I was asking for, like,
    it was like, I need to watch this, I need to watch that. It was nothing like that.
- speaker: Interviewer
  text: Okay, so it wasn't allowed by family?
- speaker: Respondent
  text: It wasn't allowed by family; it was taboo. Like you won't see girls around the movie theater.
- speaker: Respondent
  text: Because like, it's just like, you know, there's a bunch of guys there. It just looked at, I don't know how to say
    like, it was kind of embarrassment. Yeah. So like, we weren't, like I wasn't allowed to be around that area at all. And
    I had uncles, so they're like, make you...they're like, "You can't be there." And I wasn't actually interested in it.
    Maybe it's because I wasn't exposed to it either. So and, like, I get people that come to me, and it's like, "Oh, my God,
    you lived in a camp" and it must have been this and that, and it's like, not really, because to me, like, at that time,
    that was what I was exposed to. So it was the best for me, like I had a good childhood. Maybe if I go back, and I have
    to live there. I think it would be completely different.
- speaker: Interviewer
  text: Now, when you experience life in America
- speaker: Respondent
  text: Yeah, now that I experience life in America or like, now that I've seen the other side of the world, it would be completely
    different.
- speaker: Interviewer
  text: So you mentioned nine kids, right?
- speaker: Respondent
  text: Yeah, we were nine kids. Now we're eleven kids. But back when I lived in Kenya, and I was the third oldest, but I
    was raised with my grandma. And my mother, I remember in like 2006, she started the process of applying to come to America
    and stuff. And I used to live with my grandma. But my dad was like, my mother wanted to leave me with there cause she
    took me when I was like, really young. And she said, I'll raise her, I'll take care of her. And my mom wanted me to live
    with my grandma. But my dad was like, "I don't want to leave any child behind. I want all my children to have the same
    opportunities, since she's already hard headed and not going to school [BOTH GIGGLE]. I think she'll give her grandma
    a really hard time. So I think it's best that we take her with us." So that's how I was able to come to America, but there
    was also slight chances that I could have stayed with my grandma and stayed back in the camp.
- speaker: Interviewer
  text: Okay. So do you remember how that process was of applying and then
- speaker: Respondent
  text: Little bit. Okay. So I remember it that, I just remember that my mom would be like, "Oh, we have an interview; we
    gotta go to sleep early" and stuff like that. And we would wake up in the morning, we would take a bus. It was a couple
    of minutes away. Like it wasn't an hour, it was like a 45 minute like a 15 minute away. And it would be like so much questions
    for my mom. Like they'll take her to a room. They didn't really ask me much, maybe because I was young. But yeah, that's
    about that's what I remember. And my mom used to like cook food at night and prepare food, because it will be like a whole
    day thing. Like literally the whole day - God - like we will leave early in the morning and come back like around sunset.
    So yeah, that's
- speaker: Interviewer
  text: Okay and anyone have that same opportunity to apply in camp or it was selective, somehow, or was it any limitations
    who can apply?
- speaker: Respondent
  text: I think it was anyone. Anyone could apply to the camp. So I remember we, there was this family that I used to live
    next to, and they had this they were applying with us and we used to go to the same interviews and everything. And at
    the end we were chosen to come and they were not and they still live in the camp. So yeah, that's pretty sad. But I think
    it's anyone that's not a citizen of Kenya could apply.
- speaker: Interviewer
  text: Okay. And what is approximate time do people stay in camp?
- speaker: Respondent
  text: Okay, so my mother came to the camp in like 1991, 1992. She came here when she was like, a really young person, like
    she was like 13 years old, and then she lived there until 2009 until we were able to come to America. There were friends
    that came with her. And there were people that she ran away with from Somalia that came to the camp with her and they
    still live there till this day. Yeah. So it's like you don't have nowhere to go to. You just kind of stuck there.
- speaker: Interviewer
  text: So it's ten, fifteen years, twenty years problem.
- speaker: Respondent
  text: Probably. And it's probably going to continue because Somalia I don't think it's looking any good for them to go back
    at this time. So yeah, there were people that were like tired of the camp and they said we can't live this so we'll just
    go back to the Civil War.
- speaker: Interviewer
  text: So a little bit more about the settlement itself and you get approved. How the process coming here look like?
- speaker: Respondent
  text: 'So when I got approved to come, I remember the day that my mom told me: I was really excited; I was like jumping
    around. I was like, I''m gonna go to America. And I''m like, not washing dishes because I heard that we had like, robots
    to help us wash the dishes [INTERVIEWER LAUGHS] and sound like I no longer have to wash the dishes.'
- speaker: Interviewer
  text: So this is, this was based on the Hollywood movies, or?
- speaker: Respondent
  text: No, it was based on what people said around me.
- speaker: Respondent
  text: So like, people would be like, you know, they don't have grass; they don't have sand. It's like, all levels of stairs
    and buildings. Like, the food, like the robot would come and serve you like it was just all these crazy. And then it's
    like, if you leave alone, like if we were walking around, like you might get kidnapped, and like, get your livers out
    in stop. Like, it was like, it was both like good news and bad news. So I was really excited to like, come to America,
    but then I was also sad to like leave my grandma and my aunt and everyone else behind.
- speaker: Interviewer
  text: So what happened when you came?
- speaker: Respondent
  text: Okay, so we had to leave the camp to go to Nairobi. And that was like an eight hours of drive. And I remember in the
    process of leaving the camp to Nairobi, I was vomiting, because I have nausea. I get nauseated when I'm in a car for a
    long time. And that was really hard for me. And then we had to stay in, like, when we got to Nairobi, we had to stay in
    like on this, like this building like this one place, we had to stay there ten days before we were able to come to America.
    So I remember they used to, like serve us food. I didn't really have to wash dishes there because like, there were people
    that serve us food and we just have to like turn our dishes and stuff. And then after like, actually the ten days, we
    were able to like, leave there and go, I don't remember much about I just remember like, in the process of leaving that
    building, going to the airport. I just remembered seeing like bunch of different people and just looking up and down and
    say what is this? Like people like just different people that look different. Yeah.
- speaker: Interviewer
  text: And then when you came, you came to JFK?
- speaker: Respondent
  text: Yeah, I did come to JFK. I came when we arrived in like, we arrived in New York City. And I remember my, it was all
    of us, and we were tired. And we arrived in New York City Airport, and we were all tired. And we couldn't just stay awake
    any longer. So like, we all like kind of slept on the floor. And this lady came to us. She was super nice. Um, she came
    to my dad and she was like, "Is this like your family?" He was like, "Yes, it's my first time in the country." We had
    like, other people that were coming to America as well with us like from the camp. So like they were able to like make
    conversation with this woman and she gave my dad $40 and was like, "Oh my god, like you have a really big family like
    nine kids. Like I hope this... I don't have much, but I hope this does something for you." Yeah, my dad tells that story
    all the time.
- speaker: Interviewer
  text: Oh, that's, that's amazing.
- speaker: Interviewer
  text: Yeah, many people like that are willing to help. Really welcome you.
- speaker: Respondent
  text: Yeah, like especially on the first day, we didn't know much about it. And then when we got settled in Buffalo, and
    then we got when we were settled in Buffalo literally our caseworker she was on a vacation. So there was someone else
    that had to come pick us up from the airport, and then bring us to our house. And I don't remember much like we were all
    tired. So the first night like we all kind of like went to sleep. And then the second day, the guy came to us that came
    to pick us up from the airport and he was just like basically telling my parents about all these other rules and how to
    turn on the stove and what not to do and what to do. And it was just like exhausting because like we were like exhausted
    from the airplane and everything so yeah. I remember we were in the house for like two days and we didn't get out; it
    was in March and we would all we would do is just look through the window and like see the snow and stuff and like just
    look through the outset and just see like people crossing the street walking on the street just minding their business.
    That was fascinating to us but also like I remember it being scary for my mom and her just crying saying, "Oh I don't
    know if this is something you know, we should have done. I don't know if we should have came to all the way here. I don't
    see any Somali people. I don't see Muslim people. What is this? Who are these people? Anything could happen to us." She
    was just panicking. So like us watching her go through that was kind of scary for us children.
- speaker: Interviewer
  text: Okay, so was that first time for you to see snow? How long you stay in Buffalo? What happened then?
- speaker: Respondent
  text: Okay, so we stayed in Buffalo for two years. It was my first time seeing snow. There was definitely no robots to help
    us wash dishes. We had to do it our own.
- speaker: Interviewer
  text: Okay. Was that disappointing?
- speaker: Respondent
  text: Yeah, that was a big disappointment. I was like [UNDECIPHERABLE] "Where's the robots?" I remember,
