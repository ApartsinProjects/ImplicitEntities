collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a story about your life during the pandemic.
- speaker: Respondent
  text: 'Well, the pandemic it was really kind of watching this rolling disaster happening. Because I spent so many years
    as a journalist, I was really reading widely about it. And it seemed as if every organization and institution I was involved
    with was watching very closely because it was having a big impact on things. At the time, the thing that sort of is most
    sort of salient for me, is a Netflix series called selfmade. Starring Octavia Spencer that was based on my nonfiction
    book about madam CJ Walker On Her Own Ground: The Life And Times Of Madam CJ Walker was about to debut on March 20. And
    leading up to that, for the essentially six to eight weeks leading up to that we had many events planned, we had press
    and media days. And so we were canceling those one by one, as the pandemic was spreading from the west coast to the Midwest
    to the East Coast, and we were, people were making decisions about whether it was safe for large groups of people to come
    together. So we ended up having two events in New York in February. And we scheduled a press day big, wonderful media
    day with Octavia Spencer and the other stars of the of the series on March 12. In a hotel in New York, and that I was
    supposed to go to the to see A Soldier''s Story, that evening with Blair Underwood, who was one of the stars of the net,
    the Netflix series, and he was starring in a soldier''s play on Broadway, I was supposed to go to the play that evening.
    And March 12 is the day that Broadway shut down. So I really felt the impact. But we had just managed to get our press
    day in with all of the reporters coming to do the interview. So that was great. The next day, I took the salah train back
    from New York, to Washington, DC. And the train was almost empty. There was no one else in the car where I was sitting.
    And then hour by hour, it just became clear that America was shutting down.'
- speaker: Interviewer
  text: What was it like being on a train and having it be so empty that early on?
- speaker: Respondent
  text: It was eerie, I had never seen a train so empty. And at that point, we, you know, people weren't really wearing masks.
    There was this sort of, you know, there was one school of thought that said, that mask really won't do very much. And
    it was obviously long before any vaccines. But that was was like met, people didn't really know that it was airborne that
    was not widely known. So sometimes people would, you know, I'd been on planes over those four to six weeks before then.
    And some people had unmasked, but then other people were kind of looking at them like Oh, really, do you need that? And
    I remember having a conversation with the red cap that morning, and he said, You know, I think it's in the air and I I
    looked at him and I thought oh, I don't know I'm not really hearing that it's in the air but he actually was right if
    I have to see that man. Again. I will say I was wrong. But that was really the conventional wisdom at that point that
    you know, that was people were watching you know, Making sure they weren't touching doorknobs. Because it was more people
    seem to think at that point, it was more like flu transmission or cold germs transmission, but not too much an aerosol
    transmission. So it was very eerie to be to be on the train that day with nobody. It's like back, I took a picture of
    it and posted it on my Instagram, and Facebook pages because I'd never seen it so empty. And you know, I it makes me think
    that I happen to have been in New York when 911 happened, and at that point, I was working with ABC News. And I spent
    two days of every week in New York, I would go back and forth. And I was in New York when 911 happened. And I remember
    being on the train the day after sort of getting one of the last tickets, and the train being completely full because
    people were trying to get back home. Today, that was a huge contrast to major disasters.
- speaker: Interviewer
  text: What did you do when you got home to Washington DC?
- speaker: Respondent
  text: I think I missed, you know, I'm not remembering the details. But I probably did what I normally do, which is arrive
    at the train station, and take the metro from Union Station in DC to my house in Upper Northwest Washington. And at that
    point, it was still kind of surreal. You know, you didn't have it made for me, there wasn't a sense of, I'm really vulnerable
    as long as I stay away from other people. But I had noticed at the press day, for instance, Octavia Spencer, people were,
    you know, people want to hug you or shake your hand. And she was doing kind of the Black Panther Wakanda salute like just
    not touching people. And at that point, I was still I wasn't shaking hands, because we're thinking that it's just like
    a cold or flu. But I was sort of linking elbows that then later, you know, evolved into just an elbow bump, not even a
    fist bump. But at that point, it was still we were still navigating, and not really sure what was going on, but just that
    you probably need it not to be in large crowds.
- speaker: Interviewer
  text: Do you remember when you first heard about COVID-19?
- speaker: Respondent
  text: You know, I think I must have heard about it in January. And I think, you know, I'm not gonna this may not be exactly
    right. But I sort of what the memory that's coming back to me is that I at that point, I was a trustee at Columbia University.
    And we were having a, you know, one of our periodic conference calls. And one of the board one of the trustee board members
    lived in Seattle. And at that point, I think this is right. I think Seattle has had, you know, a dozen or so cases. And
    she was saying, You know what, it's you know, COVID is here, but at that point, it was it was isolated. Like I grew up
    in Indianapolis, I remember there was, you know, the Indianapolis had 12 case. So you could count, you could see a few
    cities ad cases. There was the incident in Boston where people had been at a conference. And some people in Boston, maybe
    they had come to Indianapolis, but you could see, you know, there were a few isolated cities. And so I was hearing about
    that. But it still was kind of, you know, anecdotal and incidental. There also was a trustee who is originally from China,
    who was big, who was talking about what China was doing and as, you know, as a university with a large medical school
    and with people who are epidemiologists and people who are doing things with infectious diseases, that was it was a conversation
    about, well, what does this mean but it was still so isolated and anecdotal that we're just thinking well, maybe it's
    going to be contained. Maybe people can still, you know, avoid where you know, the places that seem to have the largest
    breakouts but that might memory is that probably in January, I began to hear about it because I was on a Columbia University
    trustees call with a person another trustee who lived in Seattle.
- speaker: Interviewer
  text: To the extent that you're comfortable sharing, would you say something about your experiences with health and healthcare
    infrastructure pre pandemic?
- speaker: Respondent
  text: So yeah, so I am I am really you know, fortunate that I am able to afford good health care and that I have that I
    have health insurance so you know, at this point I'm on meds I have Medicare because I'm over 65 and then and supplemental
    so I, I don't I've not had any personal you know, obstacles in terms of healthcare I have, you know, I have good The positions,
    but I obviously am aware of other people having those challenges.
- speaker: Interviewer
  text: Pre pandemic, what was your day to day looking like?
- speaker: Respondent
  text: So I work at home, I have worked at home since 2006. So that part for me, was not different. I wasn't I wasn't going
    to an office and had to stop going to an office. So I was already working at home already doing a lot from home. But I
    also was traveling a fair a mount. And you know, that obviously came to a halt. And I was also going to, you know, public
    events. I mean, that was, you know, at least I don't, you know, I don't know the frequency, but let's just say once a
    week, or at least once every other weekend in Washington, DC, there are lots of receptions. And so I was, you know, on
    boards, and going to meetings in person and going to receptions in person. So that was that, you know, and traveling.
    So my life was, you know, even though I was working at home, my life was one that had some, a lot of social interaction
    with other people in person, my book club, a group of 11 women, we have been meeting every month since 2009. So we were
    meeting but we began to have our meetings on Zoom.
- speaker: Interviewer
  text: What was it like transitioning those meetings on to zoom?
- speaker: Respondent
  text: It was challenging, because everybody is not as technically savvy. There was a lot there was a lot of, I can't make
    this work, your unmute are all of those things. And, you know, and it is a group of women where, you know, between, you
    know, 60 and 80. So different people have different levels of comfort with, with technology. And I think, you know, before
    then people like Skype, they might some of them might Skype with their grandchildren, for instance, or maybe FaceTime.
    But zoom was this kinks were still being worked out. So there was that was a transition with, you know, with the more
    is sort of more professional groups, where we had had conference calls. Before that were audio
