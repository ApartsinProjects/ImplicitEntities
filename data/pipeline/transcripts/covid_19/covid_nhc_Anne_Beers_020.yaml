turns:
- speaker: Interviewer
  text: So, Anne tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: I'm a labor and delivery nurse at Jefferson Healthcare. I've been doing this well, family birth center nurse- we do
    labor delivery and postpartum newborn. And we're a little hospital and so when there's not people in our department, we
    kind of go work in other areas of the hospital. So, acute care and emergency room, which kind of went wherever we're needed.
- speaker: Interviewer
  text: Wow, I didn't know that. I thought you were strictly a birth center. That's very interesting. How long have you been
    working at Jefferson Healthcare?
- speaker: Respondent
  text: I've been working at Jefferson Healthcare for 16 years.
- speaker: Interviewer
  text: Okay. Wow, that is quite long time.
- speaker: Interviewer
  text: And then I guess, I guess we'll just jump into what does a typical workday look like for you?
- speaker: Respondent
  text: Oh, man, it just depends on the day. There's a lot of variety in what our workdays look like because we have 10 to
    15 babies born a month here. So, we can go quite a few days without having women in labor or, you know, post-partum, newborn
    people in our unit. So, it's really kind of day by day, you know. But basically, we show up to work and we either have
    patients in our department and we know what we're doing or we just are reporting to the House supervisors and finding
    out our assignments for the day. And it's- can be kind of anything from we're going to have a full patient load on ECU
    [Emergency Care Unit] to we're going to be supporting the nurses in the ICU [Intensive Care Unit] or sitting with people
    in the E.R. [Emergency Room] or in AC [Acute Care]. We do a lot of 1-to-1 stuff. So, there's a huge amount of variety
    in what we do in a day here.
- speaker: Interviewer
  text: Yeah. Oh, my goodness. Wow. And then I'm curious if COVID has changed what your day-to-day looks like and which departments
    you're going into?
- speaker: Respondent
  text: Oh yeah. Well, yeah, it did actually change a lot of our work. So, because we're a little hospital with not a lot
    of births, it's always been kind of a bit of a challenge to find, like how to make us be useful, right, when we're not
    having labor patients or whatever. So, up until COVID came, we were doing like postpartum and newborn visits in the family
    birth center. So, things that would normally be done in a clinic anywhere else we were doing in the family birth center,
    just to keep the family center nurses kind of busy. And that's our kind of specialty is postpartum newborn and lactation
    consulting. And then we were also doing a lot of scheduled nonstress testing, antenatal testing that in other facilities
    would be done in the clinic. We were doing those in the family birth center. When COVID came all of that left our department.
    And so, we were really just doing OB [obstetrics] triage and labor delivery, postpartum newborn. So, like probably half
    our workload left us as in trying to figure out a way to keep us busy. We were- we all were expected to cross train back
    to ACU [Acute Care Unit] take a full patient load in preparation for a COVID surge. We all needed to be able to take care
    of COVID patients. And for a lot of the labor and delivery nurses, that was a big challenge. I have done a lot of acute
    care and it's, you know, I had to kind of do a little bit of retraining to get back to it. But it wasn't as, yeah, it
    was kind of maybe like an early adapter on that one. It wasn't that big of a push for me, but there's women that have
    worked at Jefferson Healthcare, that have never done anything but labor, labor and delivery. So, I don't know how frank
    I can be about this, but they are not used to working with adult male penises. Like that's never been in their wheelhouse.
    So, it was a really big, big, big change for a lot of O.B. nurses and. You know, in a year-and-a-half, I'm not actually
    sure that all of the nurses ever got fully cross-trained to ACU and that was kind of had to do with scheduling. And just
    at some point, I think the organizations just kind of ran out of steam for trying to cross off people. But but I would
    say over half of us cross-trained back to ACU and could take a full patient load out there.
- speaker: Interviewer
  text: Wow. I cannot imagine working with like a very specific population and then all of a sudden the pandemic hits and
    your whole workspace is completely changed.
- speaker: Respondent
  text: Yeah, it was-It was kind of a trip and in the early part, you know, so a lot of people were being like, Okay, now
    you're going to go to work with, you know, you've done labor delivery all your life and they are going to go work with
    sick people, but you're also going to take care of like very sick people that are maybe, you know, thinking that we are
    going to have a big load of these COVID patients and kind of, you know, this massive preparation for the worst case scenarios,
    which never happened, but the early preparations were really challenging. And so, a lot of our older labor and delivery
    nurses, I think we had a handful that were in their sixties that were past retirement age or coming up on it, either took
    the FMLAs [Family Medical Leave Act] or just retired because they didn't want to cross-train to ICU and they did not want
    to feel safe doing that kind of nursing in a pandemic. So, we lost a significant number of nurses in our department. All
    families are just retiring.
- speaker: Interviewer
  text: Has that affected you today?
- speaker: Respondent
  text: I mean, yeah, that's kind of a complicated question, but yeah, I mean, we're still we're down and we lost a lot of
    nursing wisdom from that. And these were like women like, you know, 40 years or whatever, of OB experienced that are leaving
    and some- some are coming back. They're some of them are coming back from FMLA right now. And a few others, when their
    FMLAs ran out, just decided they were going to retire. They couldn't come back with the current work model, which has
    now changed again. But that doesn't have to do with COVID. So, yeah, I mean, it's really change. Our department, we've
    lost a lot of nursing wisdom. So I, guess I'm like the nursing wisdom now, which terrifies me because I don't feel as
    wise as the women that left. I get that. I'm not a 40 year wise nurse. I'm just like a rookie wise nurse, you know? Yeah,
    it's been a big year for our department. We've lost a lot of a lot of skill and a lot of passion for the work. So yeah.
- speaker: Interviewer
  text: Yeah, that sounds like a lot.
- speaker: Interviewer
  text: Did your relationships with your coworkers change as a result of COVID?
- speaker: Respondent
  text: Oh I think we all got really a lot closer and more supportive. In the first while it was so- there was- it was just
    an emotional roller coaster ride. And I think we were all kind of scared and kind of nervous and kind of excited about,
    you know, like, Oh, we're going to be part of something big and, you know. That there's just like a lot of energy and
    we would all kind of intermittently maybe like have a little bit of a meltdown about something. And then just like the
    support of different kind of like sisterhood, although a lot of nurses are men too, there was just a lot more probably
    emotional support for each other than. We just became really aware of it, how on any given day somebody might be melting
    down and there would be, you know, people kind of supporting them and listening, like, what are you scared of? What's
    going on? Like, you know, what can we do to help? And I think that's always existed in nursing because we're kind of just
    caring people. But we can also be really big assholes too. But I just like the level of compassion among coworkers, and
    I felt like it made us closer.
- speaker: Interviewer
  text: And then can you tell us about the things that have frightened or unsettled you at work during the pandemic?
- speaker: Respondent
  text: I think it was just a lot of the unknown in the beginning. And I remember having like just a huge amount of fear around,
    like if it's so bad and we don't have the things that we need to keep people comfortable. Like, I didn't want to watch
    people suffer, you know, and not make it because they, we didn't have the things that we needed for treatment. There was
    so much fear about not having, you know, not having the- the oxygen-enough oxygen and whatever we needed to be able to
    intubate everybody, just not having enough for everybody. You know, we were expecting this big surge and there was a lot
    of fear around that. And then, of course, like we didn't have masks and there was just a lot of just chaos and mayhem
    around that. Like every time we came to work, it was a different set of rules. And if you did the wrong thing, you were
    kind of being yelled at. But the rules were changing like so fast around masking, not masking. And then feeling like,
    you know, we were all kind of going to be really vulnerable and didn't have what we needed to be safe and to keep our
    family safe was definitely scary.
- speaker: Interviewer
  text: Yeah, definitely. Yeah. Yeah.
- speaker: Respondent
  text: I think I kind of forgot what the original question was. I don't know if I went on a little bit of a rant.
- speaker: Interviewer
  text: Okay. I was just asking about anything that frightened or unsettled you at work, and I think you did a really good
    job of answering that. But you brought up something really interesting. You know, you brought up like your professional
    and personal life and how you tried to balance that a little bit.
- speaker: Interviewer
  text: I was wondering if you could talk a little bit more about that?
- speaker: Respondent
  text: Oh, Jesus. I mean, if I were in the pandemic, there was all of this. You know, I. I had this really strong sense of,
    like, okay, like it is really, really scary, but it was really this defining moment for me where I'm like, no, I am a
    nurse. I am a caregiver. I do want to I want to help. This is what I want to do. I want to be part of this. Like, I don't
    want to try to go on an FMLA. I want to jump in and do this thing. And kind of balancing that with by what was going on
    at home, my husband was just incredibly fearful that I was going to kill him by, you know, by going to work and that I
    was going to bring this home and that he was going to die because he's a little bit older than me. And then there's also
    some of- he had a son that was living in another building on our property, and then he had this really big angst about
    it. So, everybody I was going to work and kind of dealing with just the chaos of work and COVID and all the kind of daily
    changes and anxiety that was happening at work and then coming home to this environment of like, everybody's treating
    me like I've got the plague and trying to kind of balance that and keep people comfortable. And then also kind of constantly
    trying to check in because and I think this is true of a lot of nurses because we are caregivers, but you are the ones
    checking in with the older neighbors, like, do you need me to get groceries? Or checking in with the mother in laws or
    my parents like trying to make sure that everybody had what they needed. Extra worried about my kids. Were they going
    to lose their jobs? I was gonna need to try to help support them. And it was really it was a lot. And I just felt a lot
    of like anger about this thing, about like, I'm going to kill people. I'm like, Actually, no, I think I'm going to help
    the people. And I think I'm really qualified to know how to wash my. I keep people safe at home. Like I'm the one that
    cleans the house I can- I know I'm the best hand washer in the house, so it was just a really, really challenging time.
    And I remember at some point we have a kind of a scary cabin on our property and the thought was, I'll just go, you know,
    I'll go live out there and decrease everybody's stress. Like if I'm in a separate building that, you know, nobody will
    kill anybody. But it's like, okay, like, I'll do that. But you all are going to make your own meals and scrub your own
    toilets, right? Like this doesn't come- you're gonna lose a few perks if I'm living in a different building. And then
    the reality of that kind of settled in and I was allowed to stay in the main home. It was just like the reality- it was
    so much going on in so many different levels between like work and personal life. And I had a my mother in law passed
    away early on and was actually thought to maybe be a COVID patient. And it wasn't it turned out not to be. But when she
    died, she had been intubated and extubated and my husband had been and I had been in the room with her. And it was a little
    bit suspicious that she had COVID. And that's when COVID testing was taking like three weeks. So, then there was like
    some quarantining around that because we maybe had been exposed like it was pretty much like emotionally between, like,
    family stuff and work stuff.
- speaker: Interviewer
  text: Yeah, sure. Wow. Yeah. It was a very challenging balance.
- speaker: Interviewer
  text: Yeah. Wow. Oh, my goodness.
- speaker: Respondent
  text: Oh, I know, like, at some point, I- it was like work was kind of nuts. Like at first it was like, okay, everybody,
    you know, get ready to like be here full time and do all this stuff. And then when we didn't have patients and all the
    surgeries were shutting down, it was like. We were being asked to take a lot of low census because there wasn't the numbers
    in the hospital. We were so slow in the hospital; people stopped giving birth in the hospital. Everybody started trying
    to have like home births and that kind of stuff. The numbers were way down and they were asking us to take low census.
    And then it was like, Well, hey, wait, you know, New York needs nurses, like, desperately, you know, like, why don't you
    just let us go to
