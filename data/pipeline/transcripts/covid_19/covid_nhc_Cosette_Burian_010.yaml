collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you state your name and your job title?
- speaker: Respondent
  text: My name and job title is Cosette Burian, and I'm a physician assistant at Duke Neuromuscular Outpatient Clinics.
- speaker: Interviewer
  text: Tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: Absolutely, and so, what I do and a little bit about myself and what I do professionally, it's actually changed during
    the pandemic. So, typically I see patients with neuropathies and degenerative neuromuscular conditions that come in. We
    have our patients that are long-term and we'll see them day-to-day to assess them and treat them for their neuromuscular
    conditions. During the pandemic, I had some additional roles, both within Duke and personally. Not only was I an outpatient
    and I'm still, I'm on maternity leave, an outpatient PA, but I also was a PA working on the COVID-19 vaccine trials within
    Duke and on the clinical side of that. In addition, I'm a mom and a new mom, and this is my second time being a mom. I
    just had a baby in February of 2021 and I'm a wife to a businessman who works in entertainment. And so, I have some different
    roles and additionally, a sister to a nurse in the ICU and at a large academic medical center in Boston. So, I have several
    roles that were deeply affected by COVID-19 and kind of saw through the course at least until where we are now during
    the pandemic.
- speaker: Interviewer
  text: What brings you to this project, specifically? Like, why did you volunteer to be interviewed?
- speaker: Respondent
  text: I volunteered to be interviewed for this project because I received an inquiry through the Duke system, and I love
    working for large academic medical centers throughout my career and contributing to education and research. I did feel
    that all of those roles that I had were deeply affected and kind of unique in their own ways for me to experience all
    of them during the pandemic. So, I felt that I had information that I could share that might be historically important
    for somebody looking at the pandemic someday.
- speaker: Interviewer
  text: Could you walk me through a typical day for you at work in the last few weeks?
- speaker: Respondent
  text: Absolutely. So, in the last few weeks, I've been on maternity leave, so I haven't been at work, would you like me
    to describe previous sort of what my job roles were during the pandemic?
- speaker: Interviewer
  text: Yes, it's a great point. So yes, what would a typical day, workweek look like for you during the pandemic?
- speaker: Respondent
  text: Okay. So, during the pandemic, with my neuromuscular job, that would be one role that I had. And in doing that, we
    were all very scared during the pandemic. We were not dealing with quote-unquote sick people in the neuromuscular clinic.
    Everybody was screened and is still screened to ask if they have any COVID-19 related symptoms. Everybody comes in with
    at least an equivalent to a surgical face mask or a cloth face mask to at least do some sort of filtering if they happen
    to be asymptomatic and carrying the virus. And so, day-to-day in the neuromuscular clinic, it should have been maybe lesser
    affected by COVID-19 than other clinics. However, especially with young children that were breastfeeding through this
    pandemic and that kind of touch everywhere and get everything in their mouth, myself and other health care workers in
    equivalent roles at different facilities took a good number of precautions, even in a non-COVID related unit where every
    morning we would not only double mask in our car, so we'd have a N95 mask and over it, we'd have a surgical mask. And
    a lot of this was at our own protection. We'd also wear a mask the entire time or a sorry, rather a face shield the entire
    time during the clinic. And we would get all of that on prior to getting inside the clinic and not touch it throughout
    the day. So, not eating or drinking so that we're not reaching under those devices and touching them with, you know, different,
    you know, your hands that could have the virus on them. And then once we would get back to our cars, we would take off
    those items and then once back into actually this garage where I am now, we would take off the clothes that we had on
    during clinic, bag them and then put them straight into the hot wash so we wouldn't walk in from clinic with our shoes
    or anything that had been inside the clinic. And then we would get straight into the shower after clinic to try to wash
    anything off. So, day-to-day, the personal protective equipment is what I experienced the most change with in my outpatient
    job, as well as some precautions, which a lot of them were not advised necessarily by the CDC, but were out of the caution
    that we felt like we must take for our families. At the start of the pandemic, there were providers in my equivalent role
    at my center and other centers who if we were working with COVID-19, you know, known COVID-19 patients and not just potential
    people carrying COVID-19, they actually lived in hotels or they lived in RVs or places outside of their home because they
    didn't want to bring the virus home to their families. And that was back in March and April and maybe even May of 2020.
    But after it went on for a while, I think most people stopped taking that precaution because they needed to see their
    family and some people even had their children stay at their parents' houses. Then there was just a lot of fear and a
    lot of caution, and then there wasn't a lot known about the virus. So, at first, you would be told that it only spread
    through the air, so you only need a face mask. And later you would be told that you know a face shield would be a better
    precaution as well to try to prevent the variants from touching the mucous membranes in your eyes through the air. So,
    there were a lot of things that you would read the studies and you would see one thing that the virus can stay on some
    surfaces for 72 hours and potentially still be viable. And then you would see what the CDC was asking us to do for PPE,
    and it would be just a surgical mask at first and then later to include an N95 and later to include double masking. But
    none of those were things that they talked about at first, even though the studies suggested that that might be a good
    idea as a precaution. So, it was a very confusing time at the start of the pandemic and a very scared, fearful time for
    us, especially as parents or people that were exposed to people I would imagine that were more vulnerable. So, that was
    how my outpatient job was affected at the start of the pandemic, and it took a lot of time in commuting, basically because
    you had to leave time to don and doff all of the different PPE to shower up. And so, when my - I work part-time in an
    outpatient setting at this time with my children - so, when I would hand off to my husband where I would take over the
    children, it was getting later and later that I could do that because I had to take these precautions to prevent bringing
    the virus in the house. So, our job roles were affected by that because he had to start his workday later and it did include
    a decent amount of stress. And especially when I got pregnant, there was again a lot of unknowns during the pandemic trying
    to make sure as a person who was pregnant, that you are taking the proper precautions to make sure that you are as vulnerable,
    quote-unquote vulnerable person, not exposing your fetus or yourself to undue risk. Now, in the other role that I played
    at Duke when I was working as a PA in the clinical research for the vaccine trials. We also were working with people who
    were screened and known to be healthy. But of course, and anybody could be an asymptomatic carrier and in that setting,
    I just took the same cautions. I did have sick visits in case some of the subjects happened to contract COVID-19 after
    getting one or two doses of the vaccine or had similar visits as a pregnant person, I did not conduct those visits and
    that was conducted in a separate unit of the building behind plexiglass in rooms that were heavily sanitized afterwards.
    And so, there were a lot of precautions taken that way as well. So, that is the way that some of my job roles looked during
    COVID-19 and later were affected more thoroughly. So, the reason I took the vaccine trial job, which now is over as those
    clinical trials are done being conducted and there are more counting numbers at this point is because my husband, who
    works in the entertainment, actually got furloughed in September of 2020. So, he was without pay and we had to be able
    to support our family still. So, with my outpatient neurology job, I just added on hours at the clinical trials. I was
    working about 60 hours a week until those concluded, doing training and working for them from September until the end
    of December. And so, that's how some of my roles were looked and were shaped during COVID-19.
- speaker: Interviewer
  text: Thank you for sharing. What an immense amount of uncertainty you've had to go through in the past year.
- speaker: Respondent
  text: Yes, it was an immense amount of uncertainty in the past year.
- speaker: Interviewer
  text: Wow, thank you for sharing. Yeah, wow. I think it's easy now to for all of the pandemic to sort of blur together.
    I think I feel like you're making me reflect a lot on how I've probably, sort of blurred out certain parts of the pandemic
    for all of it to just seem kind of like a smooth thing, but those early days really were full of so much confusion and
    just with the conflicting guidelines all the time. So, yeah.
- speaker: Respondent
  text: Yes and with the conflicting guidelines, it often seemed to me that, you know, you would read the studies and like
    I said, they would suggest that one sort of PPE would be best, but from a governmental perspective and from an institutional
    perspective, the CDC could only recommend the PPE that was available to the country without causing just chaos and panic.
    And so, what it seemed to me was that they were recommending whatever could be a good public health measure based upon
    the supplies that were available and that wasn't always what the PPE should have been. But it was what was available to
    the amount of people that needed it to try to keep our health care force working. And I think institutionally, I think
    Duke did a wonderful job during the pandemic and they faced the same challenges that they didn't have and don't have an
    unlimited supply of N95. So, whereas it might be ideal for everybody to have that, they have to recycle them. And at first,
    they did not have them for most people's use, unless you were working with a known COVID-19 patient, which is what my
    sister faced at another academic institution in the Northeast in a city that was heavily hit in Boston that for the first
    couple weeks, she was actually on, she is on a COVID unit. She's an ICU nurse and they didn't have the N95s to use unless
    not only were the patients symptomatic, but that they tested positive for COVID-19, and those tests could take days to
    resolve, especially early in the pandemic many, many days. And so, they were working with just a surgical mask with these
    patients that had COVID-19 for days and days until more equipment was obtained. And that was seen not only at her institution,
    but at every institution that I know of across the country. And later they'd be wearing PAPR and different face shields
    and things, and the N95. But when those weren't available that wasn't the recommended wear unless your patient definitely
    was aerosolizing the COVID-19. So, definitely somethings that changed throughout the nation as we were trying to handle
    the pandemic as best we could.
- speaker: Interviewer
  text: Absolutely. I mean, so much to unpack there, so I'm really glad that you're part of this project because I feel like
    you really have so many perspectives to share that are really valuable.
- speaker: Interviewer
  text: Oh, of course. So, to contrast, what was a typical day at work like for you before COVID?
- speaker: Respondent
  text: Thank you for the question, so before COVID-19, it just was a lot simpler. I guess I didn't ever really think about
    bringing home illnesses as long as I was doing the proper hand-washing, which I always did. We always got our flu shots
    in my family. Other than that, I didn't really think about if I had gotten a cold in the past. I wasn't the person to
    be particularly nervous about it and would just kind of continue on with daily life. I was not taking all of the PPE precautions
    that we have to take now during COVID. They weren't recommended. The only thing we would do is wash your hands with hand
    sanitizer before and after clinic and, of course, before and after eating and all that sort of thing. I didn't have to
    handoff so much later to my husband. I would get home very promptly at the end of my shift, and I didn't shower after
    work. Some people do, I guess generally, but I'm not one of those very cautious people. And so, our handoff was easier.
    As parents, I wasn't as worried about my children touching different surfaces. And as far as day-to-day life, otherwise,
    you know, I didn't have to take on extra hours at a job. My husband was fully employed and at full pay because even after
