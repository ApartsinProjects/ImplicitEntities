collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, to start off, how about you tell me a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: I am Rick Bucheit. I'm the administrator at the Discovery Care Center Support here in Montana, which is a long term
    care facility that provides assisted living and skilled nursing services. I've been a nurse for over 42 years. I worked
    in high school as an aide in long term care - that's what got me interested in nursing. And then, once I became a nurse,
    I wanted to do all the adrenaline stuff, so, I spent 34 years, I guess, doing ICU, CCU, OR, ran operating rooms and emergency
    departments, and then gravitated back to a long term care. I've been at the current facility for 14 years.
- speaker: Interviewer
  text: So, thinking about your - before COVID-19 started, what was a typical day like for you at your facility?
- speaker: Respondent
  text: Doing rounds, just kind of walking around - visual rounds, checking in rooms to see if things looked to be in order
    for residents. Greeting residents and talking to anybody that had any particular issue that I was made aware of. Usually
    we go up to the nursing carts and ask the nurses, Who was their number one priority? Who were they most worried about
    today? And then work from there, asking who their second priority was and try to focus on why they were most concerned
    about paying attention to those people for the day. And then, you know, a lot of administrative support of my department
    managers, who would come and maybe have concerns or work on initiatives around quality improvement and just the general
    operation of the facility during the day.
- speaker: Interviewer
  text: And thinking - when was the first time, after COVID started, that you started to notice any changes in what your usual
    day to day was like?
- speaker: Respondent
  text: It was probably March of 2020 or thereabouts, and it wasn't big changes at that point. It really wasn't clinical changes.
    It was more the process of looking at the QSO documents that CMS was issuing and the CDC recommendations to, you know,
    see what was coming and how we were to comply with any kind of safeguards and recommendations that they put in place to
    keep our population safe. Every day, I would review the news reports online and read about what was going on with the
    current COVID, you know, eruption and try to get an idea of when it might be headed our way. So, I guess, that was it
    - general safeguards, recommendations.
- speaker: Interviewer
  text: Yeah. When did you feel that you started to notice COVID was starting to hit Reveille County and Hamilton more? And
    what did that look like?
- speaker: Respondent
  text: Well, I think around April or May, because there were some restrictions in place as to visitors and so forth, you
    know, there had been some significant outbreaks in long term care facilities - more on the East Coast where, you know,
    things started. And that drove recommendations that we needed to not allow visitors in our building or to be very careful
    about who came in and so forth. And we started to move into all the staff masking and so forth, even though it really
    wasn't in Reveille County at that point. It was the national recommendations and who was to say when it was going to hit
    Reveille County. And so, we didn't want to realize it was here when half of my population was affected by it. So, again,
    it kind of came gradually for us. It wasn't a high population density area, where all of a sudden, you know, hundreds
    of people are coming down with COVID and now what do we do? So, it came along gradually, I guess.
- speaker: Interviewer
  text: Yeah. You mentioned changes in kind of visitation allowances and masking. What other sorts of differences and policies
    or procedures or day-to-day did that affect?
- speaker: Respondent
  text: Well, we realized there was going to be a crunch and competition for medical equipment. So, we started to try to build
    a supply of gloves, masks, gowns, all the PPE stuff that we were going to need. And it wasn't long - we actually had been
    able to build a little bit of a supply - we didn't go crazy, but we trickled in more than we normally would use. And then,
    it wasn't too long before all of the suppliers were limiting what they would send. They would only send you based on your
    previous purchase history. So, it was probably good that we ended up stockpiling a lot of stuff a little ahead of the
    game. We did the same thing with our food storage. We purchased an additional freezer, because we were getting warnings
    from the food vendors that some of the products we were going to get may not be available and we needed to be prepared
    for shortages. And so, we added a large industrial freezer, so that we could, once again, if there were items available,
    that we could take advantage of that and make sure we had what we needed to take care of people.
- speaker: Interviewer
  text: With all of that changing going on - the stockpiling, the news coming at you differently every day, what did you feel
    or what did you notice was the reaction among your team and your staff and even residents as everything was developing?
- speaker: Respondent
  text: In the early stages of it, it just seemed to be like the HIV issues in the early eighties or, you know, a particularly
    bad influenza season. People seemed to have the mindset that, Well, here we go again. I think everybody had a sense that
    it was more severe, but it wasn't like most of us that have worked in health care for a long time hadn't seen other things
    happen that made you worry, you know, and try to figure out where we're going from there. Residents were, I think, mostly
    impacted by the limitation to visit. I didn't hear a whole lot from residents about, Oh, what's this going to bring? And
    worries about the impact of the COVID virus as much as, Why can't my family come as freely as they used to? But yet, they
    were understanding when you explained that, Hey, we're trying to keep this whole population of vulnerable elderly safe.
- speaker: Interviewer
  text: Have you noticed now that changes that have happened over the past year and a half - has that continued or impacted
    the way you interact with residents or kind of affected them emotionally?
- speaker: Respondent
  text: It definitely affected them emotionally. We probably had residents who were certainly in the very late stages of life
    or late stages of dementia who passed sooner than they may have if family support had been available throughout that process.
- speaker: Respondent
  text: I'd say as far as the way I relate to residents, it's still pretty much the same. I try to explain what's going on.
    If anything, we may have learned how to explain it a little more clearly and put it in terms people understand. But I
    think the thing that was the biggest impact for me was that issue of - people who had had a dedicated family member coming
    to the facility to see them day after day, and suddenly that person's not there. That seemed to be a huge impact on our
    residents.
- speaker: Interviewer
  text: Yeah, I worked and I did one year in a nursing home as a CNA in undergrad. And I could see, you know, consistently
    there was always a couple of family members who would be there every day or every other day.
- speaker: Respondent
  text: And I don't know if you'll get to this in other questions, but it was very frustrating, because when the recommendations
    first came out, they were pretty clear about the fact that we should not allow visitation with one caveat, and that was
    for end of life situations. And so, that's what we attempted to comply with. If we felt like someone was approaching end
    of life, then we, you know, tried to make sure that there was visitation available. Several months into the full impact
    of COVID, so probably June, July, somewhere in that range, I can't remember if it was CMS or CDC issued a list of frequently
    asked questions. And the questions were related to things like, How restrictive should visitation be? And when one of
    the frequently asked questions sheet came out, it contained information that clarified that a lot further. And they specifically
    said in there, if someone has had the benefit of support of a family member on a daily basis, that's a criteria for allowing
    that person to still come in and visit. Well, by that point, we're months down the road of not having people who had been
    faithfully there for a family member every day of the week, every meal, not having them in the building. And then we get
    a frequently asked questions document that now says, Oh yeah, the way we understand it, you probably should have been
    able to do that. I think it would have been far less impact on some of those people who were in later stages of dementia
    who couldn't put together why a family member was just no longer there. I mean, we tried to support the best we could.
    I've got a lot of very caring staff that will sit with residents if they're feeling like they really need someone to spend
    some time with them. But it's just not the same as a family or a spouse or whatever. And so, that was a huge impact. And
    I remember we - all the management team were very upset when this thing comes out late in the process and says, Oh, you
    probably could have been offering a lot more to your people than you did. Oops.
- speaker: Interviewer
  text: Sounds frustrating to have that put in place and then -
- speaker: Respondent
  text: That and the fact that all of the documents that were issued - probably there's not less than ten hot links in every
    document that was issued. And those hot links were sometimes repetitive. But I think if you printed out any of those recommendation
    memos, the contents of every hot link that you could go click on - probably each one of those recommendations memos ended
    up being 150 pages of information and sometimes very repetitive, sometimes contradictory. And so, that also made it frustrating
    when we finally started downloading all the links into a spreadsheet and trying to describe, Okay, if you're looking for
    visitation of family members, this is probably the document you're going to find it in, because it took so long to try
    to go read chapter and verse and find out exactly what the recommendation was for a special circumstance. Another one
    that comes to mind is staff. And when staff were either going to be off on vacation, traveling outside of the area, you
    know, at what point does that become a quarantine issue and so forth? And sometimes it was a very hard process to try
    to dig through recommendations and find the little niche that was applicable to this circumstance that you'd never encountered
    before. When you read through them and thought, Okay, I got this. So, I don't know if that makes sense, but it was it
    was really hard to try to weed out what the current recommendations were and find the little niches that applied to this
    particular circumstance.
- speaker: Interviewer
  text: It sounds like you got like a lot of different sources of information or a lot of things to sift through to find.
- speaker: Respondent
  text: Yeah, I mean, most of it was CDC and CMS. But lots of different documents issued. The CMS has the QSO documents. And
    so, they're 20 - if they come out in 2020 and then a dash and then a number of the document that's out, and sometimes
    there's a suffix, which is NH for nursing home or AC for acute care or H for hospice. So, the first thing that was a little
    confusing is that there were these recommendations and you had to learn which ones were applicable to your specialty.
    But I think we were up to 41 or 42 of those throughout 2020, and then several of them had revisions and some of them have
    had revisions in 2021 as well, as they have eased some of the restrictions a little bit and made it a little more comfortable
    for people to come out and spend time with family members. So, it was a lot of information. It was probably compounded
    by the fact that every vendor on earth - vendors I'd never even heard of are sending me emails saying - with a title that
    says something about COVID precautions. And so, for a couple of months, you're looking at things going, Is this something
    that I have to pay attention to? Only to find that a lot of these vendors were just trying to be helpful, but finding
    someone's document, attaching it to their email and saying, We've got information for you. And so, you know, I was probably
    just deleting 50 or 60 emails a day offhand from all kinds of vendors that just had either no applicability or were just
    rehashing CMS and CDC recommendations. So, you know, it filled everybody's inbox with a bunch of white noise that we then
    had to try to weed out to get to the stuff that was really pertinent and really important to deal with.
- speaker: Interviewer
  text: Did you ever find yourself taking cues - looking for ways to handle stuff from other community resources or the hospital
    or other places in Montana, other facilities to kind of find - ?
- speaker: Respondent
  text: Yeah, definitely other facilities. We've got a professional organization in Montana, the Montana Health Care Association,
    that is pretty much focused around skilled nursing and assisted living. And so, when I'd see anything come from them or
    our quality improvement organization,
