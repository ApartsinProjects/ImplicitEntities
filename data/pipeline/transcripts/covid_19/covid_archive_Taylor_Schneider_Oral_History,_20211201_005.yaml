turns:
- speaker: Interviewer
  text: And what things do you do typically on a day to day basis?
- speaker: Respondent
  text: So, I work full time I work in sales and marketing. And so, during the day I am at my job, or I'm, you know, running
    errands, going to the store, things like that.
- speaker: Interviewer
  text: And then, where do you live? And what's it like to live there?
- speaker: Respondent
  text: I live in Chippewa Falls, and like living in Chippewa Falls. I like the Eau Claire area a lot. So yeah, it's a great
    area.
- speaker: Interviewer
  text: And when you first learned about COVID-19, you know, what were your first thoughts about it when you first found out
    that it was going around?
- speaker: Respondent
  text: Initially, I wasn't too concerned about it at the time, I think I was 21, 22 and so people weren't making a very big
    deal about it especially for our age demographic. But then I can actually remember the specific day that everything shut
    down, and I was supposed to go to a Wild hockey game, and everything closed down. And it was like a switch flicked, and
    everything was closed so. Definitely, I think went from like zero to 100. Really quick.
- speaker: Interviewer
  text: And how have your thoughts changed since that day about, you know, the seriousness of COVID-19?
- speaker: Respondent
  text: It's definitely gone up and down. I think like the seriousness of it. I think initially, we were all really freaked
    out from it, and really kind of scared of what was going to happen and not sure what the info what look what the right
    info was, or, you know, what the best thing to do was. And so, I think, as we've learned more about the virus, and as
    things have progressed, the vaccine is nowhere. I've definitely, I guess, not been as worried about it and have become
    vaccinated myself. And so, it's become less of an issue with my, my day to day life.
- speaker: Interviewer
  text: And you said that you were employed, doing marketing. And so, can you describe what, you know, the process was like
    to get the job, especially during, you know, the whole pandemic. during that timeframe?
- speaker: Respondent
  text: Yeah. So actually, when everything shut down, I was graduating from UW Eau Claire, I had, had an internship, my whole
    senior year, was going to be offered a position at that company. And then once COVID hit, they actually rescinded the
    offer, they had to end my internship. And so, things got really real, real quickly for me, and no one was hiring, I moved
    back home with my parents. It was it was quite a tumultuous time for me in my life. And, you know, thinking that everything
    is planned out, you have a set path that you're going to go on, and that it totally flipped on its head. I always lived
    by the motto though, that everything happens for a reason. And so, then I ended up in August getting a job in marketing
    and sales. And then throughout that time, you know, the precautions were still in place. So, we were wearing masks. If
    you felt sick at all, you weren't coming to work. So, and then now at my new job. Masks aren't required. It's just it's
    more so back to normal. I mean, even today, though, I was meeting with clients and was wearing masks. So, it just kind
    of depends on, on day to day basis on, on what people are comfortable with and kind of meeting them at their at their
    needs.
- speaker: Interviewer
  text: And, you know, trying to find you know, this job and I'm sure you're probably looking for other jobs as well. In your
    field, you know, how, how was that difficult during COVID? Or how's it like not difficult if it wasn't?
- speaker: Respondent
  text: Oh, it was it was very difficult. No one was hiring especially. I graduated in May. And it was I probably July or
    so I finally started even being able to interview places and everything was, was virtual, of course. But yeah, definitely
    very difficult. People were being laid off who's hiring, you know. And I was fortunate enough that I could live with my
    parents, and they were okay to take on the expenses. My dad's a teacher. And so, he obviously was still being paid. But
    yeah, so it was, it was not an easy time. It did get better, though, especially over this past year, it seemed like there
    were not enough people to fill the jobs doesn't necessarily mean that it was a good job market, right. Like it was not
    necessarily roles that I wanted to do. And were in my field that I was applying for. But way, way better than the previous
    year.
- speaker: Interviewer
  text: And how has the COVID-19 You know, break when it first started? How did it affect how you communicated with friends
    and family? And then how has it changed since then?
- speaker: Respondent
  text: Yeah, it completely changed how I communicate with people I at UW-Eau Claire. I was in a sorority, I lived in a sorority
    house, there were 10 of us that live together. So, I was used to living with nine other women, being surrounded by people
    constantly like that was just my day to day life. I was going to class, I had my internship, I was in my sorority just
    constantly surrounded by people. And then to switch from that to only my like, immediate nuclear family was very difficult
    for me. And I was not at all prepared for that. And what that even like, meant, I guess, and it was a hard time to is
    my senior year of college my last semester, there really was no closure to anything, I got to still text my friends, you
    don't FaceTime them see them somewhat, but I don't even see them, I guess but, but get to communicate with them. But it
    was just kind of like a whole chapter of life had closed and ended without really me getting a vote in it or getting to
    be a part of it. So that was really difficult. Since then, um, kind of how it how it's, as people have gotten more comfortable
    and things like that I've definitely gotten in contact with more people. Even like the holidays are a great example last
    year still for the holidays. We weren't getting together and did like a virtual zoom thing for the holidays to see my
    accident family. And now this year, people are getting together. People are just overall more, more comfortable with Corona
    and, and being together and having that like, yeah, that personal interaction.
- speaker: Interviewer
  text: Now, do you feel that the vaccine has made you feel safer? Or how do you think you feel about going out into like
    public, you know, pack places, being vaccinated?
- speaker: Respondent
  text: I definitely feel I don't know if safer is the word. I feel like it was a good decision for myself personally, just
    with my mom has a lot of health issues. And so, I definitely feel better being around her. But it didn't necessarily super
    impact me going out and things like that, especially because you can still get COVID And so I still think it's important,
    like if you have people who are like immune compromised things like that, that you shouldn't be sick and being around
    them. But yeah, so it's definitely it has I guess it hasn't super impacted my decisions of what I was doing previously
    to be in vaccine to now being vaccinated.
- speaker: Interviewer
  text: Have you or any of your family members gotten COVID-19?
- speaker: Respondent
  text: I have not which I do not know how I haven't gotten it. Um, and my family members have not either my boyfriend has
    and that was how I'm surprised I didn't get it. Um, but yeah, boyfriend and his family but none of my immediate family
    no has gotten it.
- speaker: Interviewer
  text: And um what were your you know, what was your reaction when you learned that your boyfriend first got Coronavirus?
- speaker: Respondent
  text: Um, I was more so worried about we had just been at my parent's house and like I mentioned previously, my mom has
    a lot of health issues. So that's where my mind went initially in making sure that they were okay this was at the point
    to that the vaccine had not come out yet. So, no one was vaccinated or anything like that. So yeah, definitely He was
    worried about that. We also had a wedding we were supposed to attend and about a month. And so, and then my main concern
    became, I was working at the time, and I was not getting any symptoms. I had three negative tests, and I had to quarantine
    for even longer than he did, because I never gotten me the symptoms. So that was, yeah, a big concern of mine was the
    impact on my work. Luckily, I got to work remote, because they didn't want you know, obviously, they don't want you to
    come in at that time. Um, but yeah, so those Yeah, those were definitely my main concerns.
- speaker: Interviewer
  text: Then, um, you mentioned you're in quarantine. You know, what types of things did you and your boyfriend do during
    quarantine, that may have been different than, you know, not being in quarantine?
- speaker: Respondent
  text: Yeah, we did the taste test challenge, because he had lost all of his sense of like, he couldn't taste anything. You
    couldn't smell anything. So, I put like a bunch of different drinks in a box. And then he had to try and guess what the
    different drinks were, so I guess to like, things like that. I mean, we were getting food delivered. We're not going out.
    You know, I mean, I've never been quarantined up until that point. So wasn't Yeah, it was, uh, it was it was gotten really
    boring, I guess, to just sitting at home. But luckily, I was I was working at least to, to kind of have some distraction.
    But I do not sit still very well. So that was an interesting time.
- speaker: Interviewer
  text: Then, in what ways do you think that COVID-19 is affected, affecting people's mental or physical health?
- speaker: Respondent
  text: I think it affects people in a lot of different ways. Like I mentioned before, my mom with her health problems, that
    definitely isolated her a lot, too. And then my, my younger brother was really concerned about it, too. And so, they still
    even now are pretty isolated compared to other people. And they are very concerned. I mean, rightfully so it's their decision.
    But, yeah, it's definitely impacted people and I think, having to stay at home, or like I mentioned to with, with college
    and things suddenly, for me, that was a really hard time for me mentally, just having to switch all the sudden to this
    completely different way of living and operating and going outside with a mask on and just all these changes. And really,
    the uncertainty of it all, too, was more so what messed with me then than the actual what was happening? It was just what's
    going to happen was always what I was worried about. So yeah, I think it definitely has affected a lot of people.
- speaker: Interviewer
  text: Now, do you think you'll still have like a graduation party type deal? Or do you think it's kind of too late now?
- speaker: Respondent
  text: I think at this point, it's gotten a little bit too late. It's been, what, a year and a half since I've graduated.
    So, I think I think we might have missed that train slightly now. But yeah, I mean, my parent, my family still celebrated
    me and, and, you know, acknowledged the achievement. But yeah, I think I think that ship sailed.
- speaker: Interviewer
  text: Um, so you mentioned you got a vaccine? Do your family members also have the vaccine?
- speaker: Respondent
  text: Yep. So, my parents both are vaccinated. And my boyfriend's vaccinated, a lot of my extended family is also vaccinated.
- speaker: Interviewer
  text: And then, have you or anyone, you know, had questions or concerns about the vaccine?
- speaker: Respondent
  text: I think definitely, people had a lot of just uncertainties about it. And I think the hard thing, especially in today's
    age, is there's so much information being thrown at you. And it's really hard to decipher what's the truth and what's
    not. And just with so many social media, the news just, there's so much and there's so much readily available for you
    to look up. It's and there's really no fat chat, like, how do you know what's true? How do you not know, you know, so
    I definitely think there was a lot of uncertainty around it. And I just thought end of the day, people need to do what's,
    what's best for them what they think what they're comfortable with, if you're comfortable with not getting the vaccine,
    great if you're comfortable with the vaccine. Great. Yeah. And that's, that's kind of where I sit on it.
- speaker: Interviewer
  text: And what vaccine did you get and what was your experience, like, getting it? And then did you have any side effects
    from the vaccine?
- speaker: Respondent
  text: Yeah, I got the Pfizer vaccine. And honestly, getting it was a very, like, streamlined process. They got me in I think
    I was in and out in less than, like, 10 minutes. I know you're supposed to sit there but um, I the first shot did not
    even have any sort of Reaction if anything I had a headache, but I went to the dentist previously. So, I think that that
    was like attributed to the dentist and not the actual shot. Yeah, I had no I had no reaction to that. And then the second
    shot I got two weeks later. And again Yeah, yeah, no really reaction to that.
- speaker: Interviewer
  text: Now did you have to travel a ways to get the vaccine or?
- speaker: Respondent
  text: no, no, I got it. My family's originally from Durand as my parents still are. So, I got it done there, which is about
    half an hour, 45 minutes away from, from Eau Claire, so definitely not too far.
- speaker: Interviewer
  text: Then you mentioned the news and social media, you know, playing impact on what people think about, you know, the vaccine
    and Coronavirus, and what have been your primary sources of news during the pandemic.
- speaker: Respondent
  text: Definitely social media an
