collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, for starters, a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: Okay, so I'm a registered dietitian. I graduated from the University of Washington in 1980. I practiced for a few
    years in Seattle, worked at Fred Hutchinson Cancer Research Center and Northwest Kidney Center. And then we moved to eastern
    Washington and it was kind of like having an amputation. I had a really good job and then I became more of an at-home
    mom and I started getting back into my profession; little piece by little piece. I worked one day every two weeks and
    then once a week and then kind of gradually increased. Working at a bunch of different places all at once was like a patchwork
    quilt. And then finally, about 15 years ago, I started working full time just at Columbia Valley Community Health. And
    so, I work two days in the Wenatchee clinic as a clinical dietitian, I work one day in the Chelan clinic as a dietitian
    clinically. And then one day I work for WIC. So, that's what I do.
- speaker: Interviewer
  text: Great. Thanks for sharing. So, maybe if we could start by you telling me a little bit about what your day-to-day looked
    like, maybe before the pandemic?
- speaker: Respondent
  text: 'Okay, so on the clinic day, I would come in at 7:30 and look through my clients for the day or do it the day before
    I''d be prepared. And my initial appointment with the client would be for one hour and I''d get to know what their nutritional
    goals were, why they were seeing me, you know, what they hope to have happen in their life because of changes in their
    diet. And then we would sit down a lot of options of changes that they might want to make, and they would come back at-
    it was client-centered motivational interviewing- and they would go back and pick two or three things that they work on
    for the next four-to-six weeks. Then we come back together, find out what worked, find out what didn''t work and build
    from there. And usually, when I was seeing them in house, I would send them home with some handouts that we would go over.
    And I have a lot of Spanish-speaking clients, so a lot of the things they use frequently are bilingual, colorful, kind
    of geared towards people who might not be as proficient at reading. And then if I have clients who want to really dig
    deeper and want more information, I usually print off handouts for those people from the Academy of Nutrition and Dietetics.
    They''re not very visually appealing, but they''re the current kind of state-of-the-art information on cholesterol or
    IBS or whatever it is I''m working on. So, I see I worked nine-hour days. I have a half an hour lunch. My follow up clients
    were for half an hour and I have no shows. I think maybe more than maybe doctors would because I''m not asking a person
    to get a test or take a pill; I''m asking them to change their habits. So, you know, sometimes there''s last minute jitters
    and they''ll be some no shows for a new appointment, they''ll just decide they''re not ready for thinking about this,
    or if it''s a follow up and they haven''t, maybe, been as well as they''d hoped to. Sometimes people will back out. I
    encourage them to come because usually they''ve done a lot better than they think they have. And even if they only did
    well for a week and a half, that was good practice. And now they have that skill set beginning to be developed and they
    can continue to work on it and refine it in the future. So, sometimes I will do phone calls to remind people about their
    appointments: develop new writing materials or education materials. I also have interns twice a year- dietetic interns
    that I work with. I think that''s pretty much it.'
- speaker: Interviewer
  text: Okay. Thanks- thanks for sharing, that sounds like a busy schedule. But I heard of a lot of people who go to you who
    have really benefited so.
- speaker: Respondent
  text: Oh good that's nice to hear.
- speaker: Interviewer
  text: Yeah. So, I- I guess the next question would be how has that changed? How has your day-to-day changed since the pandemic-
    since COVID-19 started?
- speaker: Respondent
  text: Okay, Oh my gosh, so, I am more techy than some people in my generation, really because of WIC. WIC was online before
    the clinic was online, so I learned a lot about my computer skills through WIC, and then we got Athena, which is actually
    the second of the electric charting techniques that I learned. So, I had some basic computer skills, but I had never done
    Zoom. I'd never done a telehealth appointments. I- I rarely, I mean, I can talk to people in Spanish over the phone, but
    it's not nearly as effective as face-to-face where I can gesture and point to my handouts and all that type of thing.
    So, it was a big change when I- November 19th, I think was the last day I worked in the clinic and started doing everything
    remotely. I got a laptop from the clinic, set it all up and, and I also got one from the state. So, the state was a different
    program for the WIC. And the first and most glaring obstacle is I was really dependent on my handouts. You know, I kind
    of shown to clients that- well like- I guess let's just see. So, they're very visual and it's easy for people to follow
    along. This is probably one of the ones that I use the most often. So, you know, this is what I had to do. At first, I
    had to hold it up and try to talk about it and peek around the corners with people. And then I got- I started developing
    a file where I could email clients, these same handouts. If possible, I'd email then a head of time and so they would
    have a chance to look them over beforehand or maybe even print them out and we could go them in person. But that took
    a long time for me to develop that, and I did have a few things. I went to the office and brought to my home so that I
    could pretty much do this. If I wanted to mail something, then I'd have to go into the clinic and do that, you know, print
    it off and snail mail it to people. And so it was not as ideal, but we did the same process. We go over the handouts,
    we look at how they were eating. We make a list of ideas for improvements and they pick a couple of things. So,- and when
    I would email them, I would also email them what their goals were, what they what two or three things they chose that
    they could reflect back on that. So- yeah, I think that was the biggest change, just learning to make that adjustment.
    I could never, ever have done it without our I.T. department. CVCH has a really great I.T. department, and so they were
    able to help me. I had some problems with my internet at home at first before I figured out that I had two different kinds,
    I had a fast and a slow so, once I got on the fast, it was better. Not all of my clients had good internet, though, so
    that was probably one of the biggest handicaps. They couldn't hear me or we get dropped or they- especially my Spanish-speaking
    clients, they got up to snuff. The reason they got up to snuff a lot of them is because the kids were giving up for school,
    so they were set up after a few months into it. They had much better access and much better understanding of how to do
    a Zoom visit. I think my clients and my clients, the parents too, like me, learned a lot about Zoom that we never would
    have learned before. And I think for a lot of my low-income, especially bilingual clients, what a nice thing for them
    to begin. You know, we had to be forced into it, but they learn this new skill set, and I'm sure their confidence in a
    lot of other things has improved because of that. But that was the bit of a problem. It got better as we went along. And
    some people, because they didn't really trust their internet, wanted to do the phone instead of the Zoom meetings. And
    that was really hard in Spanish because you just can't. Yeah, there's so much body language that goes along with trying
    to communicate, even if it's in the same language, it's really hard in a different language. The nice thing about Athena
    is- not sure how many months into it we were then able to, to do telehealth where the Athena had a picture, and then with
    that there was something called Propio, so we could have an interpreter. And oftentimes I would go ahead and speak my
    Spanish anyway because I have I'm pretty fluent in foods and blood sugar and breast-feeding. Don't ask me directions I
    would be not very helpful, but so a lot of times I would speak in Spanish and the interpreter would be there to answer
    any questions as somebody didn't understand me. Or more often than not, I might not understand their questions or their
    stories because they have a lot bigger vocabulary than I do, so they can use words that I'm not real clear. I often know
    kind of the context of what they're saying, but not perfectly confident about all the intention. So, that answer your
    question? I forgot to repeat the question, I'm not doing good on that, sorry.
- speaker: Interviewer
  text: No, you're doing great -
- speaker: Respondent
  text: -on my own answers.
- speaker: Interviewer
  text: Thank you that- that was really helpful. I do have a follow-up question. You mentioned that before the pandemic, you
    were you had, like, some no-shows and then you also mentioned that with, with this transaction, you were able to email
    out handouts and their goals. Do you think that like how has patient care changed as far as like adherence to like your
    their goals and then also like coming to visit and everything like that?
- speaker: Respondent
  text: So, in terms of coming to visits, I actually think there were fewer no-shows when it was telehealth because I could
    find them usually. You know, they might, you know, you might not come into the clinic, but when we call them, they answer
    the phone. It's like, okay, you don't so you don't want to do it with the video; do you want to do the appointment on
    the telephone then? Especially, if it was a follow-up, it was very useful. I think it was just as productive. And for
    a lot of my moms with kids, like I've had a couple of clients who are being worked up for bariatric surgery and they might
    have three kids who come in twice a month is a really a difficulty. So, for those people was really nice to be able to
    do it on the phone or on telehealth. And I usually ask them to come in every second or third visit so we could see what
    was going on with their weight. In terms of their outcomes, that's a really good question. I think- I thought at the time
    that people were opening their attachments a lot more to see the handouts than I think in reality they were. I think some
    of my clients didn't really understand the attachment thing and how to do that. If it was a younger client, no problem.
    But they did read the goal was usually. In terms- I don't know. It's really hard for me to say how people actually did
    with habit changes. I think, you know, you can talk to any provider and find out there's so many people to gain so much
    weight because of the stress, the change in their social structure of their life; decreased activity because they're not
    getting out of the house, they can't go to the gym. So, it would be really hard to kind of untangle all of that and to
    say, was it telehealth or was it COVID? I don't know. Some people did just fine amazingly well. And kids in general did
    really poorly. Really, really poorly. Lots of kids gained 20, 30, 40 pounds and these are kids under the age of twelve
    that, you know, that's just drastic. You- you look at their graphs and it's just a straight shot up. It's, it makes you
    want to cry. You know, you realize how they're being set up for really a lot of health problems and how hard it is to
    undo that kind of weight gain. You can't just get back on track and get back to where you were with your BMI at 90, when
    it's now like 200% if you're eight-years-old. Does that answer your question?
- speaker: Interviewer
  text: Yeah, thank you. I can see where that would be a difficult balance between COVID interacting with the telehealth and
    everything. So, thank you for sharing that. I'd like to ask if you have any stories or moments you shared with patients
    that have been meaningful during the pandemic?
- speaker: Respondent
  text: Boy oh boy, I'm not very good about just bringing these up just at the drop of a hat. I can't think of any specific
    stories. I do think I got- there were lots of clients that appreciated having an appointment. I think they felt really,
    really isolated and it was nice to touch base with somebody who cared about their health and wanted to listen to how they
    were doing and what goals they wanted to set, and what changes they could make in the current situation. But I'm sorry,
    I can't think of any really specific things.
- speaker: Interviewer
  text: That's okay. I appreciate- I can see how, yeah, the isolation would make such a difference and then having at least
    the interaction with someone can make a big difference so thanks for sharing.
- speaker: Respondent
  text: For me, you know, I'm kind of an introvert, so I don't have well, I did have a lot more going on socially, but I saw
    my patients during the day and I really didn't feel isolated. I mean, I'm a homebody and I kind of enjoyed. For me as
    a professional, it was I didn't really feel very isolated at all. I live in a small community anyway, so didn't changed
    things much.
- speaker: Interviewer
  text: I see, that makes sense, could you talk a little bit about safety measures and resources that you you mentioned that
    you got a lot of support from I.T.. When you were trying to do your transition to virtual visit. So, if you could talk
    a little bit more about that.
- speaker: Respondent
  text: So, you're looking- you're looking at safety measures like HIPAA? Is that what you're thinking of?
- speaker: Interviewer
  text: I'm thinking like safety measures specifically for you the fact that you were doing a lot of things on like virtually
    that kept you safe? Right or wrong?
- speaker: Respondent
  text: Oh, okay. You m
