collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Dodie, can you tell us a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: Yeah, I am Care Team Support at Jefferson Healthcare. I work with four doctors and deal with their paperwork and the
    medications, prior authorizations, all kinds of things, you know. Oh, my gosh. People come up and say we need to change
    Dr. Hong's morning schedule because she's delivering a baby. That also happens with Dr. Carlson. And so, that's the first
    and foremost thing we do is, you know, change the schedules and try to make the patients happy with where we reschedule
    them. And I like my work. Sometimes it gets a little mundane, but my favorite part is going in and checking patients out
    because I- that's what I do also. And I do that a lot with Dr. Hong and Dr. Carlson. They always want their patients checked
    out. And when I'm in the room and sometimes I can see what they're there for, I will gently tell them, like, if it's mood,
    I will gently tell them, Yeah, the gravity of this earth can be pretty tough. And you are so not alone in feeling, like,
    depressed about it; we all do. And so, you know, don't feel alone and that. And they always say, thank you so much. They
    always are appreciative of that. Some people I don't say it to at all because I know them and I just it- they don't need
    my opinion and I know that. So, but there's quite a bit to Care Team Support, you know, answering a -what is called a
    batphone which is doctors or pharmacies only calling and sometimes that phone rings a lot and sometimes it means a ten-minute
    chore of finding the doctor they need to speak to, which is sometimes on the other side of the hallway. And sometimes
    the nurse- it's just crazy, sometimes trying to find someone to take that call. But I, usually, I do- I usually do, because
    I've been doing that for so many years. I know to say, Hey, someone needs to take this so who is going to raise their
    hand and say, Me. And so, we do that. There's quite a lot we do that we can even think of what we do because it's the
    stuff that when you're so busy, you say to yourself, Oh my gosh, I haven't been able to get a darn thing done this morning
    because I've been doing all this other stuff and you've got your inbox in the computer, which is telling you all the things
    you need to do for all these patients. Most of it's simple stuff, paperwork, which is mostly jury duty notices and get
    things faxed out and just a lot of different, you know, paperwork. And some days you can't get to the paperwork or the
    computer inbox. You're so busy doing everything else. And so, I guess that's the answer to that.
- speaker: Interviewer
  text: Yeah, it sounds like you do a lot-.
- speaker: Interviewer
  text: -Everything. A lot of hats you are wearing.
- speaker: Respondent
  text: Yeah, we really- yeah, we do.
- speaker: Interviewer
  text: Yeah, how long have you been doing that for?
- speaker: Respondent
  text: Well, I worked- before I was pot support, which has now been since like 2014 I think, I was in just the regular office
    setting, because this is before Coleman, I was in the-which switched the whole company around. But before Coleman, I was
    at the phones and the paperwork, just like the paperwork I still have now. But we had several girls working on it and
    we all answered our own phones to Jefferson Healthcare. We did not have a phone center like we do now. And so, we all
    just answered the phone. Even at the front desk, you'd answer the phone and somebody would walk up to you and you got
    to go like this and. So yeah, we just did a lot of the same thing you do now, only with phones and checking patients in.
    And what was the question again?
- speaker: Interviewer
  text: How long have you been working there?
- speaker: Respondent
  text: 15 years. I started July 10th, 2006, and I've done a lot of things there. I was a referral coordinator for three years
    and I was very good at it. I was very good at doing it. As soon as it came in, I wanted to get it out of the way, do it,
    do it, get it out of the way. Which means either they don't need prior authorization from the insurance company, so I
    could just write it out, gather the notes, fax it off, document it. This was before Epic we had it Allscripts; so much
    more easier. We didn't have to answer a lot of what I feel is unnecessary questions. It's just because we were able to
    type out where they want to go and it was as simple as that. They're going to such and such. It's Swedish and here's their
    phone and their fax. And we're faxing out the face sheet, the imaging, the notes all to doctor so-and-so for the referral.
    And so, then we send it. And once that's done, I can't remember if we close it out or kept it in until we know that they
    had that appointment. I don't remember if we closed it but we used to- I, personally, compared to the person I was working
    with, who once she trained me, stopped working because I was doing it all and I was on training for a year and it's like,
    okay, I know how to do this. Can you help out a little? So, that was kind of weird. That's the only time I've ever been
    a little angry working there, but that has stopped. That doesn't happen anymore. And it turns out the person has changed-
    and by the way, this is just beautiful. Look at that. Look at that.- So anyway, then when we switched to the new computer
    system, I believe it was in 2013, we went to Epic, and Epic was originally made to work for a hospital. They were not
    designed to work in a small- in a medical group, so the registration was outrageously ridiculous and it took a very long
    time to learn it. You couldn't just sit with someone one day and teach them. It was- It was- it would take you a lot of
    different weird places; wow. And if you were a workers comp person, I would basically, you know, Shawn, you want to help
    me out with this because you didn't- it didn't happen that often. And it was very complicated. And Shawn would just help
    me and I would- she'd say, okay, now click on that, click on that. But I don't do the front desk anymore for about five,
    six years now. Yeah. And I love it. I really do. I don't get sick when I go to work the way I used to when I worked the
    front desk. I used to get really nauseous coming to work because they put too much on the front desk. I still think they
    kind of do, other than they don't have to answer the phone. I still think they're overloaded because they're checking
    patients in and there's some things they shouldn't have to worry about, but they still do.
- speaker: Respondent
  text: Which kind of I think is weird. But medical hospitals all over are always struggling to get people to work because
    people leave because it's too hard. So, they get other people in and people are always in training. Right now we have
    a few people where I don't even know their names, but I will learn them. I've learned a couple, but it's like, Where did
    everybody go? Where did everybody go? So, I don't know because it doesn't seem like- I think that once we got settled
    into the Coleman thing and got our own rhythm down, I think it was great from my perspective as a care team support. I
    had Cassandra behind me doing referrals, emergency even for only. She had this very calm and insightful attitude about
    life and work and she literally changed me from being nervous and angry about what's happening to my whole personality
    about the way I approached my job changed. And it's never gone back. I have the occasional day where I will cuss under
    my breath, but it's more of a laugh after I say it because it's like, blah, blah, blah. And then I continue to do my thing
    because it's just usually on a really busy day that that happens. And I jokingly say, God, I hope nobody heard that under
    my breath. But I guess that's all I have to say about that.
- speaker: Interviewer
  text: Yeah, well, what I took from that was, you know, your coworkers-
- speaker: Respondent
  text: Mean a lot.
- speaker: Interviewer
  text: -Really make a difference in your work environment.
- speaker: Respondent
  text: They're everything.
- speaker: Interviewer
  text: I'm curious if that's changed with COVID and the social distancing and regulations.
- speaker: Respondent
  text: Not at work, except for all the stuff we have to wear. No, we still get along great. So, the answer to that is no
    for me anyway. Wearing the mask, I noticed I went to safe, not Safeway, I went to QFC last night, forgot my mask in the
    car and I went, shoot. And I walked in and I didn't realize until I was already in the store, but I noticed a bunch of
    people weren't wearing a mask for the very first time. And so, I just didn't go back to my car to get my mask. And at
    the end, I asked the cashier, I said, What's with people not wearing masks? And he wasn't even wearing a mask, the cashier.
    And they said, No, as long as you've had your COVID vaccines, you're free to go into a supermarket, our supermarket anyway,
    I don't know the rules of the rest without your masks. That was a beautiful most- it just warmed my heart to know that
    this is-there is an end to the game here. Yeah. And we are- we're also able to go into a room and check out patients if
    they've been vaccinated and I've been vaccinated. We can both take off our masks unless that makes them uncomfortable,
    and we'll keep them on whatever makes them comfortable, because we don't want, you know, we don't want that jerk say,
    no, no, no, we wouldn't do that. So, yeah, I just think things are starting to look up when it- because we got people
    on the other side politically thinking this is socialism and they're going to make you wear them forever. And I never
    believed in that. I said, No, I don't know who you've been listening to. It's like, Well, actually I do know who you've
    been listening to, Idiot, but yeah, so I knew it would come to an end. And even at work, at some point I won't have to
    wear that mask and I see it in the foreseeable future so.
- speaker: Interviewer
  text: Wouldn't that be nice not to have to wear a mask at work?
- speaker: Respondent
  text: It will be. I mean, I had to see my mother in 2018, you know, I can't remember the month, but it was the middle of
    the year, it was summer and she went to the hospital because she had pneumonia and they were- and she got admitted into
    the ICU. And I went in there and they made me wear a mask because at the time I had a coughing fit and me and Gloria,
    at work, wondering did we have COVID back then and didn't know it because we had a cough that lasts six weeks; a bad,
    bad cough. But I put my mask on to see my mother. I put it over my nose. The nurse told me, No, you have to wear it like
    this. And so, she showed me how to wear it. I couldn't survive 10 minutes. I couldn't survive 10 minutes in the mask.
    I wasn't used to it. I felt like I was suffocated. I'd been wearing a little small paperclip at the chin of my mask to
    give a little extra air, and nobody's told me to take it off, even supervisors. So that's great. But it's sad because
    I wish I had had the strength of the mask now because I hadn't hung out with her for hours. Because now I'm used to the
    mask. So it was just a matter of getting used to them. And it doesn't mean you like them, but you did it because it was
    important at the time. You know, people have grandparents or parents that are sick and those are the ones I was thinking
    about. Is the elderly. Yeah. They were most prevalent on my mind.
- speaker: Interviewer
  text: Yeah. I'm sorry to hear about your-your mom.
- speaker: Respondent
  text: It happens.
- speaker: Respondent
  text: You know, that's life.
- speaker: Respondent
  text: Yeah. But, you know, it's really, really hard. And I've been in counseling. I haven't seen a counselor probably two
    months now. The last time it was, kind of, odd because it was very obviously she was a Republican. It was just she's really
    nice and funny but the situation was odd. She made me watch a video, didn't make me, but I was curious. It's like, what
    are you talking about? Showed me a video of Biden with about ten little kids on stage and his patting him on the shoulder,
    whispering in their ear and then she's saying, this is pedophilia. And I said, you know, people can read his lips. And
    so, this- if this were really what you're saying it is, he would be in a- indicted. He would be in trouble because there's
    lip readers and his lips were very easy to read from the position. So, there was nothing wrong going on that day. He wasn't
    being a pedophile. And if he is, he wasn't acting like it that day. Because, you know, you never know in this world. But
    I- we laughed and whatever. I left the interview. I drove home and I giggled, giggled my patootie off because I felt like
    I was right in the middle of a Woody Allen movie. Ironic as all get out, I said, I just saw my counselor and that's what
    happened. And this is hilarious. It was just- it was just hilarious. It was life; how things are just- can be so off the
    wall. And I just took it as ironic and funny and- okay, okay. Next time I see her I'll just - we won't go into politics
    unless we go into my politics. You're my counselor. You don't talk about your crap. You're here to listen to me. And so,
    that's the way I would kind of set it up, because she's nice enough and she would let me do that. But truth is, I wouldn't
    talk about politics. I never brought it up. You know, that's not true. Donald Trump was bothering me, so I stopped watching
    news. He had this smug smile, and I hope that's on film.
- speaker: Respondent
  text: He had this really smug smile about taking- He doesn't smile like a norm
