collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you tell me a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: Okay. A little bit about myself - I am a registered nurse and I work at Duke University Hospital. I am a part of the
    ambulatory hospital-based clinic division and I work at Duke Outpatient Clinic, which is located on Roxboro Road in Durham.
- speaker: Interviewer
  text: What brings you here? Why did you volunteer to be interviewed today?
- speaker: Respondent
  text: Oh, the reason that I wanted to be interviewed was because I know that I'm a part of a historical time in our lives.
    I think that when the future looks back on us as history, they'll want to know what we did, how we did it and even when
    we were in the middle of the pandemic, I was also doing a lot of research on how did they do this with polio? How did
    they do this with TB? How did they? And so, I, too, looked at my past to understand how we could currently handle the
    situation better. So, yes.
- speaker: Interviewer
  text: Can you walk me through a typical day for you at work in the last few weeks?
- speaker: Respondent
  text: 'In the last few weeks, I''ll say that a typical day is many meetings. But I was in a lot of meetings before, but
    I used to go to the hospital to attend them. And so, now Zoom has become my friend. And so, I start off my morning reviewing
    emails at six, seven o''clock in the morning, and then I immediately go into probably my first Zoom meeting at 8:50 a.m.,
    which are huddles. And they''re little short, brief. You know: What''s happening right now? What''s happening today? What''s
    happening with my staff? And letting my next tier of leadership know my staffing and any events that may occur and they
    give updates. So, every day we are updated on the latest because health care is changing constantly. And so, these daily
    huddles, Monday through Friday, were valuable. It kept us informed. We kept our leadership informed. And so, huddles,
    huddles, huddles. Now, just as I''m attending huddles to receive information, I''m also doing huddles with my team constantly
    to give them updates. I''ve increased a number of emails that I send each day. I''m forwarding more emails relating to
    sharing information about where we are right now at this moment in time. The other thing is out there just seeing how
    our patients are navigating the health care system and we pretty much, I say, I tell my staff like on a dime, we turned
    around how we started taking care of patients. We went from 90 to 100 in clinic office visits to hardly any and now we''re
    ramping back up and we''re around somewhere like 50 or 60 visits. Well, we''re still doing telephone visits, and that''s
    something we weren''t doing before at all. And our patients love it that once you try something new, the feedback that
    you get on it is immediately, you know, Well, I don''t know how to do video, but the telephone was a lot better and it
    was nice because I didn''t want to leave the house. So, our patients were able to also, we implemented something new and
    they immediately gave us feedback. So, we just communicating change. Communicating updates was an important part during
    this pandemic and everybody being open to listen to change and also being able to be creative and delivering change. So
    yes, but still my day starts early and I''m usually here pretty late, and that''s only so that I can get caught up on
    all the emails that have been sent. Like I said, I''ve increased the number of emails that I send out. I also have there''s
    an increase in the amount of emails that I receive. And so, you want to thank everybody that sent you an email and respond
    to their email. So, yes.'
- speaker: Interviewer
  text: Oh, thank you. I definitely understand - I'm only a medical student, so I can only imagine that death by email is
    much more a reality for you.
- speaker: Interviewer
  text: Yeah, it can be exhausting.
- speaker: Interviewer
  text: So, I guess if you can think back and I know you kind of got a little bit of this, but a little bit more specifically,
    what was a typical day at work like for you before the COVID-19 pandemic hit?
- speaker: Respondent
  text: So, with the increase in the number of patients that were being seen, I was out there in my clinic more often. I was
    doing intake on our patients that came in for our office visits. And with the census going down, I ended up having to
    be more in my office to get the latest and the greatest information, but my staff handled all of the patient care that
    we deliver in the clinic. No questions about it. I have an excellent team that I work with. So, before it was the same
    meetings, emails, handling projects, implementing something new. Health care is always changing and it changed for this
    clinic, for the ambulatory division and for the hospital employees constantly. So, yeah.
- speaker: Interviewer
  text: That's, yeah, it sounds like you've led a very busy life, but that's been very productive, and I'm sure your staff
    has been really happy to have someone like you in leadership with them, you know, working with them. Actually, I was hoping
    to touch on that a little bit. Can you talk to me a little bit about how your staff and your team dynamics have had to
    kind of adapt to the challenge that the COVID-19 pandemic presented?
- speaker: Respondent
  text: 'We, my staff and I, tell - I speak to about my staff all the time as being great. I am very fortunate to have the
    team that I have working with me. There are 15 clinical support staff that, well really 14, I''m number 15, but that work
    with me, RN, LPN and medical assistants, and they have come together to solve a lot of how we''re going to handle this,
    how we''re going to do it. They, too, had to turn on a dime with our census going from 90 to 100 down to 10 or 15 and
    trying to figure out now how can we still connect with our patients? And so, we went to a system where we used to do intake
    prior to the physician, and now we do what are called pre-calls. So, we''re calling the patient still getting some of
    that initial information about the telephone visit or the video visit that''s about to happen and to get the patient prepped
    and ready for the physician. But I can say they were creative in how they communicate it to each other. We developed some,
    like I said, huddles became a big part of us coming together and their comments and their feedback and their input into
    what we''re doing, how we''re doing it. Do we have enough PPE? Where we keeping it? Because things kept changing and it
    helped me as a leader, as a nurse manager to hear them make their comments because it also gave me an action item to:
    I need to take care of this. I need to take care of this. So, it was really, really helpful. I have a good team that communicates
    well and lets me know. So, I felt really good. I felt good during this pandemic that the people that I report to, the
    leadership, and the staff that I work with, the physicians that I work with, they were all trying their best to still
    provide quality care to our patients. And it was awesome. It really was.'
- speaker: Interviewer
  text: So, thank you, that's really great. I mean, it is really inspiring to hear that. You know, you talked a lot or you
    had mention that, you know, you really had to change your relationship with patients as a result of the pandemic. Can
    you tell me a little bit more about that? Like any stories you've had that kind of crystallized how your relationships
    with established and new patients have changed due to the pandemic?
- speaker: Respondent
  text: So, Duke University Hospital opened up in the very beginning, back in February, March, April, the COVID tent where
    we were testing. And so, one of the ways that I felt to be involved in this pandemic, this crisis was to volunteer, to
    go out there and work the tent. And I saw from babies being tested to the elderly, everybody and the car lines were long,
    but everyone was patient. They understood that we were doing our best to provide the best care. So, I volunteered and
    worked over at the COVID tent that Duke had. The next thing was the Karsh Center, which is where the Pfizer COVID vaccine
    was being administered. And I went out there in the early beginnings of it. And it was awesome because the generation
    that we were serving were thankful, grateful, appreciative they - I got a lot of compliments. It was a feel good, it was
    a different way of embracing me being able to taking care of our community, and they were grateful. They were there early,
    the first ones were there extremely early and some of them were wheelchairs, multiple assistive devices. But it was a
    good feel good about how we were still able to give great care to our community. And then so I worked over Karsh and then
    the Duke Primary Care at the Durham Medical Center did a Moderna clinic on Saturdays, and I had an opportunity to volunteer
    there. The big emphasis for that clinic was to deal with those that are disenfranchised problems with transportation.
    People that already come to this location for their health care we were trying to get them in because they have a lot
    of barriers to health care. And so again, it was a very rewarding opportunity because I saw a lot of over 65, African
    Americans or I should say, Brown people that came in to get the Moderna vaccine and they too were so grateful, thankful,
    appreciative of us doing it that there were moments in time during the day I was just walking around saying thank you
    for coming because them getting the vaccine meant more because they are now going to impact someone else that may be hesitating
    to get the vaccine, which is something our community is facing right now. There are a lot of people that are hesitating
    to get the vaccine. So, I will say I thank them for coming in and getting it. But it was so nice to see all those Brown
    patients getting that Moderna vaccine made me feel good. I can also say that for my family, I, when I look at my kids
    were eager and, Mom, when am I going to get it? And my father's generation of the 80-90-year olds in my family, they were
    eager to stand in line, make the appointment and get their vaccine, and they were proud to tell their brother or sister,
    who was 85. I got my vaccine. You get yours. I got shot number one, you know, so it was it was a good feel good to work
    in all three of those areas during this pandemic. Yeah.
- speaker: Interviewer
  text: Just to kind of follow up on that. Have you received a vaccine?
- speaker: Respondent
  text: Oh, yes. Very early on. Not with the first push of health care workers because I knew that there would be a lot of
    people that needed it because I'm primarily most of my time in my office. I wanted all of our real front-line to get it
    first. But I did just as soon as I saw that number of how many employees had been vaccinated, then I got mine. Truly,
    I did. But yeah, yeah, I've gotten both shots. I got the Pfizer and my daughter got the Moderna. So, we're - and probably
    my son will get the Johnson & Johnson. So, we'll be able to see all of the after effects of the vaccines in my family.
- speaker: Interviewer
  text: Yeah, yeah. You seem really excited about it. Can you talk to me a little bit about the excitement, like why you were
    so willing to get the vaccine?
- speaker: Respondent
  text: Do I understand why people are hesitant? The answer is yes. Do I understand our history with health care enough to
    understand their rootedness in not getting the vaccine? The answer is yes, and all I can say is at some point that person
    that individual has to find the reason to get the vaccine for themselves because it's their responsibility, it's their
    decision, and they'll have to live with the decision that they make. I am over 60, African American. I am obese. I have
    two, possibly three, significant health care conditions and I was watching the number of people dying. Hospitalizations
    but personally, those that were dying, that number as it was increasing, it wasn't a fear. I didn't have fear, but it
    was, I got to get this vaccine. I don't want to die and probably if I did, I may end up in the hospital because of my
    preexistings. So, that was another reason for my eagerness and I trust experts. I think that that weight and responsibility
    that they have to make the right decisions for those that they're serving was important. So, I believe them. So, yeah,
    I was looking forward to it. Got both mine and proud. I got my - where is it? Duke handed out these little - I love it.
    Yes.
- speaker: Interviewer
  text: I'm definitely very excited about my charm, too, and I really appreciate you sharing. You know, I think there was
    a lot of uncertainty, especially in the Black and Brown communities, about whether or not to get it. And I think it's
    important to acknowledge the reasons why, you know. So, I mean, we talked a little bit, you know, it wasn't really like
    fear for you, but I wonder, you know, were there other kinds of fears or things that unsettled you at work during the
    pandemic? What were some things that maybe gave you some anxiety over, you know, between the pandemic hitting America,
    really and the development of the vaccine and getting that?
- speaker: Respondent
  text: Did I have fear? I'm going to say no, because fear has you thinking probably not the right way and fear has you acting
    in a way that you shouldn't act. So, one of the things that I used to tell my staff is, Today, this is what we're doing
    because tomorrow it may be different, but we're going to go with the flow as the system and as Duke, as the nation figures
    out another way to do it. We're going to follow suit and we're going to do it. But fear, no. When they were talking about
    the PPE in the very beginning and there was not a supply, I was able to see just how much Duke had stored. And I ended
    up telling my staff, Please, no, o
