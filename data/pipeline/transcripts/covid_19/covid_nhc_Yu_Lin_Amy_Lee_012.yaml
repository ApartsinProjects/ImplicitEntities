collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, Dr. Lee, if you could introduce yourself a little bit and tell me what you do professionally?
- speaker: Respondent
  text: Yeah. So, my name is Yu-Lin Amy Lee. I work in primary care in internal medicine and pediatrics. I had done a MEDP
    residency and then I also did a fellowship in hospice and palliative care. So, I do a mix of that in the outpatient setting,
    as well.
- speaker: Interviewer
  text: Great. Thank you so much for being here. Can you tell me what brings you here? Why did you volunteer to be interviewed?
- speaker: Respondent
  text: Yeah, I think normally I actually - if you asked me five years ago, I probably would have said no very quickly. I
    don't actually enjoy talking or speaking, but I think over the last few years and then really over, most notably the last
    year, it has been a long and difficult season from a health care standpoint, politically, racially. I think it's a roller
    coaster of emotions, and I think there are important stories. And also, as an Asian-American, I sometimes feel a little
    bit trivialized or invisible, and I do think it's important, especially now, to kind of to be bold and to speak up a little
    bit. And I hope that, you know, other people will do that as well because I have seen lots of mentors who have spoken
    up and, you know, the little ripple waves that they make, I think, are very important. And I think it's also like my job
    and my role to do that.
- speaker: Interviewer
  text: Thank you for sharing. I feel like you touched on a lot of really important topics, and I kind of want to almost take
    it back a little bit. So, could you tell me a little bit about what - you'd mentioned it's been a really difficult season.
    Can you tell me about, like why that is or maybe how it was before and how it is now? Like, do a little bit of a comparison.
- speaker: Respondent
  text: Yeah. So, I think even prior to the pandemic, right, there were a lot of already issues going on and notably health
    care disparities. We've had, you know, there are very clear health care disparities, the Black and Brown population and
    their care and their outcomes. And, I think with COVID, these disparities have actually- that they're far more apparent
    and that we have not really dealt with this. And now that it's kind of at the forefront I think it's, you know, it's important
    to acknowledge and to work on this. And, I also think that, you know, I - from a health care standpoint - I have been
    incredibly lucky to work with an awesome group of doctors, nurses and other clinicians, PTOT [Physical Therapy and Occupation
    Therapy], our social workers. And we've really had to pivot over the last year. It was kind of almost, it almost felt
    overnight, the 180 changes, right? How do we, with COVID, how do we screen people? How do we reach out to people, people
    who don't have internet, you know? There are a lot of things that we had to deal with, and I'm extremely proud and they
    inspire me. You know, all of the time, and I, not only also from a health care standpoint, but just if you just turn on
    the news, right? We continue to have racism, whether you know, we're talking about police brutality. You know, it's really,
    really hard. And then, you know, over the last few weeks and months and really over the year, the attacks on Asian-Americans.
    And you know, I have been called the coronavirus. People have said, you know, did you eat bats and you know, other things?
    And are you going to give me coronavirus? And it's really hard as also a frontline worker and then to be also hit with
    these things. And so, I know that's kind of a little bit messy, but it's just all these things just kind of hitting you
    from all sides. So, it's been a long year.
- speaker: Interviewer
  text: I'm terribly sorry to hear about personal attacks of racism and then also, you know, the collective grief for the
    communities that have been disproportionately affected. I think there's something to be said for the fact that everyone's
    coming to like a racial reckoning in America at this time, and it really took a pandemic to do it or other pandemics that
    were happening. So, thank you for sharing. Can you tell me a little bit? So, it sounds like you've had a lot of changes
    in relationships with people right in the last year with from your care team to your patients to everyone, really? Can
    you talk a little bit about how your relationships with both established patients and new patients especially have changed
    during the pandemic?
- speaker: Respondent
  text: Yeah. So, I'll kind of bring this back. So, I did my training in Taiwan at medical school and we often ask about,
    you know, faith backgrounds. And, you know, I think we do a little bit better of kind of the whole social background.
    And so, for a little while, I don't feel like I did a good as good of a job as I did. And so, over the past year, I actually
    became more cognizant of really asking some of these questions, especially for the Black and Brown population. And as
    simple as like, you know, how are you doing? How are you? How are you feeling, you know, with all that's going on and
    you know, we I don't pretend to know what it feels like, you know, to walk as a Black American on the streets and to be
    targeted. I don't know what that feels like. Maybe an in sort of a different sense in as far as you know, with the Asian-Americans
    being attacked. But, I think simply just acknowledging that it's been hard, it's hurt a lot of people and showing that
    you can be an ally, not just their doctor, but really to be an ally. That has actually touched a lot of people. And what's
    really awesome is that, you know, with the Black Lives movement, a lot of us actually went to some of the rallies and
    we at clinic, we'll talk about it. And, you know, we have some pins to kind of demonstrate our allyship, but to say it
    out loud verbally, I think is very meaningful for patients, for families and for myself. And it's been very powerful.
    And, you know, a year later now, people are asking me, you know, how are you doing? We remember when you asked us how
    we were doing. And so, I again, I think, you know, words are powerful. They have a lot of impact. They have consequences.
    They can have good and bad consequences. But it was just really awesome to kind of see this full circle where you care
    for your patients and then you touch them somehow and they want to make sure you're okay, too. And that, I mean, I don't
    know how to explain that feeling, but it's really nice when the patients are just like, Are you okay? Have you been doing
    okay? You know, what can we do for you?
- speaker: Interviewer
  text: Yeah. I almost feel like the therapeutic relationship can go a little bit both ways, right?
- speaker: Interviewer
  text: Yeah. Do you have any particular stories or moments that you would be willing to share about some of those more powerful
    moments without violating HIPAA [Health Insurance Portability and Accountability Act]?
- speaker: Respondent
  text: Yeah, so, I saw a family. So, it was mom and her kids, a few boys, and I had actually met them for other reasons because
    he was having a lot of belly pain and things like that, and we got to the root of it. And then they came back for their
    annual visit, so, mom and her boys. They were struggling, too, you know, they're teenagers and they're trying to find
    their voice. They're trying to figure out, you know, how do I know, you know, mom is obviously worried about them as Black
    young teenagers. You know, she's worried about their safety, their mental health concerns, and they're in school and trying
    to, you know, to deal with this themselves, as well. And so, we actually just talked about how they were feeling and how,
    you know, some of the kids made them feel at school, whether it's bullying or putting them down or making racist remarks.
    Or, you know, when they turn on the T.V., and they see, you know, police, you know, and things like that. And so, just
    giving them a very safe space to talk about it where they didn't feel judged and where they could talk very openly and
    not worry about this. And I think it surprised me and it surprised them because I, a lot of times when we see patients,
    we think about their constipation, they're diarrhea, they're, you know, are they smoking, or not? But we don't talk about
    some of these other things. And it surprises people. And so, you know, mom was just so, so thankful afterwards and wrote
    a really nice, nice note afterwards saying that, you know, she was just really happy that she could come to this clinic
    knowing that we actually cared for them, not medically, but kind of more from a social standpoint. And I think it makes
    our patient relationship stronger. And you know, again, it's a two-way street. Yeah.
- speaker: Interviewer
  text: Yeah, thank you for sharing. That's such a touching story, especially to hear during some of these trying times as
    they continue on. To kind of turn a little bit. So, I know you had previously mentioned to you that there you know, there's
    this crisis among the Asian-American population and Asian population that lives in America in general right now. Can you
    tell me, you know, as you're comfortable, about somethings that are maybe like frightened you or unsettled you as a provider
    or just as a person during the pandemic?
- speaker: Respondent
  text: Yeah, yeah. I think first off, Asians, Asian-Americans, we have had this issue with kind of collective silence, and
    I'm talking about silence when other people are getting hurt and then silence about ourselves. And so, it's been really
    good to see people speaking out. And again, that's for the reason that I wanted to do this, as well. I wanted to give
    a voice to the Asian-American population because, you know, when I was thinking about all the things that I'm seeing in
    the news, I keep thinking I'm Asian-American. But when will people stop seeing me as a forever foreigner? When, you know,
    why do people say, why is your English so good? Why do you speak good English or, you know, just, you know, small things
    like that. And so just seeing the escalating rhetoric against Asians, again, it's been dehumanizing, trivializing and
    then seeing leaders kind of stoke this fear of xenophobia has been really hard because when I see these elderly Asian
    men and women being attacked, the first thing I think about is actually almost always my mom, my dad, right? They came
    here. They were immigrants. They came with very little aside from kind of their clothes on their backs and a little bit
    of money, and they were kind of pursuing the Asian dream so that my brother and I could live better lives. And they, you
    know, I remember even as a child, kids would make fun of us about our slanting eyes or when I brought my bento boxes for
    lunch to school, it would be, you know, noodles or rice and, you know, Asians or Taiwanese food. And people would laugh
    at me. They would say it smelled, it looked funny, it looked gross. And I was so embarrassed at the time that I went home
    and told my parents, Don't ever make me that again. Just put me this bland PJ and a juice box. I just want to fit in.
    I remember I just want assimilate. I don't want to feel different. And when we had roll call attendance in school, you
    know, how when they would call your name and every time they would call Yu-Lin Amy Lee, but the name would be butchered
    and kids would just laugh and laugh and laugh. And so, I made my mom go to my school and asked them to just x out my Taiwanese
    name, just take it out because I didn't want to hear it again and I didn't want to be laughed at. And so, I remember a
    lot of these things of just trying to fit in, and again, assimilate. And, it has taken me years, probably my whole life,
    really to kind of learn, to accept and love myself. On my white coat, actually, I wear my full name. It says, Yu-Lin Amy
    Lee. I'm very proud of it. I bring my Asian food to lunch, I drink bubble tea. I introduce people to this. I feel very
    proud of where I've come from, but it has taken a really, really long time and I, you know, when I try to speak to my
    parents about this, they don't talk about it a lot because they also are like, you know, you know, it kind of happened
    to us, but we remember the good people, the people who helped us. And, you know, we just kind of, you know, put our heads
    down and just try to make do. And so, it's, you know, we don't really talk about this with our parents, but now with the
    newer generation and the kids and, you know, even younger than us, I am so impressed seeing high school students and middle
    school students and college students really advocating. So, I do have a lot of you know, in the midst of this kind of
    pain, anger and frustration, I see a lot of hope, actually. And so, yes.
- speaker: Interviewer
  text: Thank you. I think it's a really hard thing to talk about, and I really appreciate your wanting and being so open
    to discussing that sort of thing. I shouldn't just call it that sort of thing, you know, anti-Asian violence and racism.
    It's been, as you said, a long year. So, to kind of follow-up on that a little bit. A lot of people I've chat with, I've
    chatted with have had opinions about the level of support they've gotten from their work environment, the hospital, their
    communities. I wonder if you could speak to whether or not you felt supported in this time and if you have specific examples,
    you could point to of that.
- speaker: Respondent
  text: Yeah, I would say that I, you know, I love the clinic that I work and the people here. They've been really awesome.
    But sometimes it's still, you know, when we talk about big picture things. And even with the coronavirus, people don't
    realize that. So first off, the Asian-American community is not a monolith. When we say Asian-Americans, it's almost that
    model minority stereotype that we talk about, which is a really actually not a good trope, and it really doesn't serve
    any use because what it does is it pits people against each other. So, it's saying that Asians are doing really well,
