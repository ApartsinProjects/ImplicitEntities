collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: Well, my name is Jennifer Bush. I'm the director of patient care services at Marcus Daily Hospital in Hamilton, Montana.
    Marcus Daily is a critical access hospital, so, that means that we're limited to 25 bed capacity for our patients. We're
    usually limited on resources and we're primarily set as a rural hospital. So, that kind of paints a picture of the hospital
    that I work for. I've been here for 15 years. I did some management before I came here, worked my way through - I mostly
    did pediatrics, worked my way through the emergency department into some leadership roles and have, you know, in the last
    few years found myself in this director position. I have a husband and three children and live in just a really small
    town down the road. So, that's mostly a little bit about me.
- speaker: Interviewer
  text: Okay. So, before COVID-19 started, what was a typical day at work like for you?
- speaker: Respondent
  text: Before COVID-19, we actually were in the process of moving into what we called phase two planning for growth of the
    hospital. So, most of my days were spent in meetings, project planning - I actually was in the process - we'd done all
    of the floor plans for a brand new cancer center for our community. Most of our patients currently - right now, they are
    sent to Missoula, which is about 45 miles away for their oncology treatment. So, we only offer oncology services one day
    a week. So, it was something that we knew we needed in the community. We had done quite a bit of planning and I actually
    was in the process of picking out colors and furniture for this infusion center that was going to break ground in the
    spring of 2020. So, most of my days were honestly spent in meetings, project planning. I do try to spend a lot of time
    with my staff as well. So, I do a lot of rounding between departments. I oversee the managers for the E.R., the ICU, Med-Surge,
    pretty much every inpatient side of our hospital. So, a lot of time spent rounding. But we really - the big focus at that
    point in time was our new growth and where we were at and then this infusion center that we were super excited to build
    for our community.
- speaker: Interviewer
  text: Yeah. It sounds like you had a lot of different projects to manage and work on. And so, then, how about a typical
    day - what did that tend to look like kind of as COVID started and going into the height of the pandemic here?
- speaker: Respondent
  text: We watched a lot of what was happening out in the world, in the community, and knew that we were isolated in some
    sense because we were a smaller community and we knew that the wave of COVID was going to hit us later than a lot of other
    places. So, there was some basic planning that had started, you know, where are we at with PPE? You know, we were watching
    what was happening in New York and the other countries and just going, Okay, we don't want to be that hospital that has
    our nurses wearing garbage bags. We want to make sure we have enough PPE for what we're going to see. What is the worst
    case scenario? We did some tabletop drills with the community, with public health and some of the providers. What does
    it look like if we were to see COVID here, at what point are we overwhelmed? How many ventilators - you know, just taking
    an inventory of what we had was super important at that point in time. And that was early - probably January, February-ish
    of 2020. But again, still almost protected, in a way - that we were still moving forward, we were still planning our cancer
    center and we were still planning these projects that we had been working on, bringing in new providers. So, it was there,
    but it wasn't in our faces like it was in other places. And interestingly enough, you know, we - I had been through the
    Ebola scare with staff and we done all the training. We really - I didn't see the sense of alarm in my providers with
    Ebola as I did with COVID. And I think that was the point that I was - we were really trying to express how this was going
    to impact us and how serious this was, when compared to other things. We had had Ebola, you know, I mean, Rocky Mountain
    Labs, we've trained with them for years, they've been doing it. We felt very confident that we were prepared and that
    we probably wouldn't see any Ebola in Hamilton, Montana. We knew we were going to see COVID in Hamilton, Montana, we just
    didn't know when. And we didn't know what the impact was going to be on the hospital. So, it was really - there was a
    lot of almost fear of the unknown and what we were going to do with it, because we didn't have, you know, big policies
    and procedures in place. We didn't have a lot of PPE. We knew we needed to plan. But we - it just was a big unknown. How
    do you get prepared for something you really don't know, Is this going to take out my entire community or is it going
    to be one case? And so, you do all this prep and you start to order more things and you think, Okay, if I screw this up
    and it's only one case, we've got all this extra stuff and we were prepared and but if you don't, then you're not prepared
    and you just, you couldn't win no matter what. You knew going in that whatever happened, you weren't going to be able
    to - you were in a no-win situation. So, it just caused a lot of uncertainty and fear.
- speaker: Interviewer
  text: Yeah, it sounds like you're involved pretty closely with planning and resource gathering and allocation.
- speaker: Respondent
  text: Yeah, so, when we started looking at needing to stand up our hospital incident command, we of course delegated roles.
    And so, mine ended up being - I was chief of operations. So, I was really - I worked really tightly with logistics. I
    worked tightly with the incident command team manager, just in planning and trying to figure out what did we need. Early
    spring, we hadn't stood up our HiX team. That didn't come until - and I just I actually just wrote a paper about this
    - until March 17th, when we had our first presentation of a patient who had traveled outside of the United States, presented
    with fever, cough, shortness of breath, very suspicious of COVID at two in the morning through the emergency department.
    And we had to stand up our team and really, really focus everything - all the focus then became COVID at that point in
    time.
- speaker: Interviewer
  text: So, it sounds like one of the words you mentioned and emotions to describe it was kind of a sense of fear and uncertainty?
    And I'm curious if you would kind of talk more about that, I guess, emotional landscape you felt here and noticed in other
    people in the staff with that uncertainty?
- speaker: Respondent
  text: From the providers themselves, the fear of, Are we going to have enough personal protective equipment to take care
    of our patients? Are we going to be overrun? We don't have enough ventilators. We don't have an ethics committee that
    says if we were to run out of ventilators, how are we going to decide which patient lives or dies? Who makes that decision
    when you don't have that procedure in place? Who does that fall back on? And the fear of, Am I going to be the one that
    has to make that decision? And trying to be as proactive as possible, but not cause alarm with everybody that was working.
    Really, really just unsure of what was coming. And we knew, watching the other cities, that it could be devastating to
    a community. We have 25 beds in this hospital and what is our maximum capacity? And what am I going to have to do as a
    nurse, as a provider to take care of 40 patients potentially? If I had to put a patient in every bed or stretcher in every
    nook and cranny in this hospital, I can go up to 39 and we could do 39 patients if we had to. How many of those are going
    to be ICU patients? You know, we don't have intensivists. So, the fear for the providers is, What if I have to manage
    ten ICU patients or seven vented patients, because no one's going to accept them? How can we transfer COVID patients when
    other hospitals don't have that capacity as well? We put nursing staff through some very quick training. We pulled ICU
    people who had nurse practitioners, PAs who had ICU experience and we pulled them and we did a quick orientation training
    to - here's our unit in preparation. And I think that you want to be as prepared as possible, but also when you pull people
    out of their comfort zone and you ask them, you know, to do, Hey, I know it's been, you know, ten, fifteen years since
    you were an ICU nurse and you're a nurse practitioner now, but we may need you to do this. Or you may be the ICU nurse
    that is overseeing med-surge nurses taking care of ICU patients. And respiratory therapy is going to have to come in and
    they're going to have to manage seven vents possibly, and be here 24/7, but still manage other patients. So, it pushes
    people outside their comfort zone and all of us, you know, stepping in and doing - I have been away from the bedside myself
    for the last three years. And so, it was, Okay, yeah, I have this skill set for me as an ER nurse to take care of our
    patients. Can I take vented patients down there? Yeah, absolutely. But I need to, you know, get back in there. And it
    puts you outside of that comfort zone. And it's you're - very uncertain of your skill set at that point in time. There's
    fear of, you know, What if I let that patient die? Because that's not what we're here for. There's fear of losing coworkers,
    you know? I mean, I think early in the game, we had one older E.R. physician, and, you know, we have some younger nurses
    who really were like, Oh, this is no big deal. I'm not worried. And he was very worried. And we kind of joked around with
    him at first about like, Well, if anyone's going to go, it's going to be you. Because you're the oldest and you have,
    you know, all these potential risk factors versus the rest of us. Kind of lightly joking around about it. But then, as
    it as we started seeing cases here and started seeing people get admitted, that fear became real of losing coworkers.
    We had a terrible experience with one of our E.R. nurses who was immunocompromised and older, and she had an exposure,
    and she was sick - and not hospitalized sick, but there was that constant worry of like, Oh, my God, what if she is the
    one that we lose? So, you have that fear of not only the patients, but your coworkers as well. And early on when it didn't
    seem as serious - and all of us, our sense of humor in the ER is a little twisted anyway, you know, we kind of joke around
    about stuff that we shouldn't. But at first it was, you know, Oh, well, you know, you're the one that's going to go, it
    won't be us, don't worry about it. And then, when it actually became very real for us in our facility, it was kind of
    scary. And I was like, Oh, my gosh, we feel awful for, you know, teasing each other. And now we're seeing it, it's in
    our faces. So, a lot of just uncertainty of, you know, what were we going to see? What were we going to have to do? And
    then losing patients and losing coworkers was huge. And I hadn't faced that sense of getting outside of your comfort zone
    very often in my career as a nurse. I mean, I've been to - every once in a while, you know, I get pulled into a C-section
    or I get pulled into delivery, and that is not my thing. Delivering babies, not happening, but I will do it. It's outside
    of my comfort zone. And honestly, the most serious threat that I had in my nursing career had gone back to September 11,
    because I was getting ready for clinicals that day and we were supposed to have a skills lab and we showed up - after
    the towers, we still had to go to class. We were mandated to go to class and we were basically told that we may turn you
    out and you may be nurses. It depends on how this whole thing turns out. And we were two years from being nurses and it
    was kind of scary to have that realization that, if this continues and this is a big problem for the United States, and
    we're going to have a shortage of nurses and people to health care workers, we're going to turn you out and you're going
    to learn. And so, it hadn't been since then that I had felt this, all of a sudden, we're going to change your role and
    we may push you to that really uncomfortable zone where, you know, maybe as an ER nurse you're taking care of five ventilated
    patients and that's not what you do, you know.
- speaker: Interviewer
  text: Was there ever a point here where you felt like - or where you noticed they kind of started to approach that space?
    People crossing over a lot from their usual responsibilities, they're starting to feel that sense that your space is being
    overwhelmed?
- speaker: Respondent
  text: Yeah. Probably through, you know, we had intermittent cases throughout the summer. Our peak actually came late fall,
    early winter, where we had our - I think we had 12 COVID patients in the hospital. And that's nearly half our census,
    you know, we had shut down surgeries. So, we'd been utilizing the surgery nurses to help out in any capacity that, you
    know, we wanted to keep them employed. They weren't getting paid. We had to shut all that down. So, the whole entire department
    - that's your biggest revenue maker, you know, I mean, that's a huge department to just shut down services. So, we were
    utilizing nurses from that capacity in other roles as health supervisors, so that we could free up the house supervisors
    to be a second nurse in ICU, because we had filled up our ICU with five patients. And it - you could see it on people's
    faces - they've been dealing with COVID all summer intermittently, in small amounts. The rules were always changing, you'd
    come to work one day and then the recommendations would be different the next. So, the level of frustration was really
    high for staff.
