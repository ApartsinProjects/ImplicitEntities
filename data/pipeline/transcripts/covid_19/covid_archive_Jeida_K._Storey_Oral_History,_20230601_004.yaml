- speaker: Interviewer
  text: Thank you for going into COVID-19. Tell me, tell me a story about a memory that's left an impression for you about
    the pandemic?
- speaker: Respondent
  text: Oh, such a dark time. Such a dark time. I was going on three months pregnant when the world shut down. And we started
    hearing about this virus. And at that time, no one had answers. We didn't know what was going on what would happen. And
    at the time, my family and I were just settling into Dallas, Texas, we had just closed on the home about a week before
    we started hearing about what was going on in Wuhan. And we were like we're at the beginning of our lives. It's our first
    home, you know, we have a toddler, and I'm pregnant with our second baby. And you know so much hope. And so for this to
    happen, it was the beginning of uncertain times. What helped what held me and pardon me if I get a little emotional. But
    what has held me is it was through the fear and the uncertainty of what was happening in the world that my ancestral connections
    really begin to take root. And I started to talk to my elders because for one, I didn't know how long they will be here.
    I didn't know if what would happen if I would even see my grandparents again, specifically my grandmother's. Thankfully,
    they're still here with us. But I just started to have conversations with them. I will call them as frequently as I could
    tell me about what it was like when you were a child tell me about another time because I just needed to kind of get away
    from the hard feelings. The hard reality that COVID-19 brought into our world. So I asked them to tell me about different
    times. And in doing that, I learned so much about our family. And I also learned about survival. And I thought how fitting
    it was that I was at that time pregnant with my youngest, my daughter and I was talking to my grandmother and she was
    talking about her mother who was also a pandemic baby. She was born during the flu pandemic or epidemic. Was it 1918,
    1919, 1920, around that time. And I was like, Oh, it was just like that small moments, just recognizing that whole, we
