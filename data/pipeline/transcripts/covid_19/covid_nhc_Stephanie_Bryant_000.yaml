collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Could you let me know your name and job title?
- speaker: Respondent
  text: So, my name is Steph Bryant and I'm a registered dietician.
- speaker: Interviewer
  text: Can you tell me a little bit more about what you do professionally?
- speaker: Respondent
  text: As a dietitian, I work in a pediatric weight management clinic and it's housed within Duke pediatrics. We live at
    Roxboro Pediatrics and I work with kids and families to help kids just stay healthy, manage their weight and continue
    to grow and be active and eat well.
- speaker: Interviewer
  text: Why did you want to be interviewed today?
- speaker: Respondent
  text: I was hoping to participate in this oral history project just because I feel like it's important to have everyone's
    perspective of how we've all been experiencing the pandemic. Not to - I feel like the most important perspective is definitely
    from the perspective of the front-line health care workers. I feel like I'm in kind of a limbo area. Dietitians aren't
    technically essential health care workers, but the nature of my work does bring me back into the clinic and now we're
    back to four days a week. And so, I felt like this perspective was just would be kind of an interesting one to have a
    part of this project.
- speaker: Interviewer
  text: As a dietitian in your professional role, can you tell me kind of what your day has looked like in terms of your work
    and possibly personal life in the past few weeks?
- speaker: Respondent
  text: In the past few weeks, my work has actually started to change a little bit. I was working mostly telehealth at the
    beginning of the pandemic, and as folks have started to get vaccinated, I've actually spent more time in clinic and I'm
    almost back full time. I worked about six months without a vaccine, but still working in-person with families, just not
    40 hours a week. Most recently, the work has been challenging, because just with what we do in terms of addressing health
    and nutrition concerns for families, a lot of what we do has less to do with nutrition habits right now and a lot more
    to do with addressing food insecurity for our families given the pandemic. So, that's been, I would say, that takes up
    more time than it has historically for us, but it's always been on our radar.
- speaker: Interviewer
  text: You said you worked for about six months without receiving the vaccine. Could you tell me how that experience was
    for you?
- speaker: Respondent
  text: Sure. We adapted to the pandemic by working from home and doing 100 percent telehealth from March until July. Then
    in July, we all came back at about 50 percent. From July until early January, I was in clinic with a mask and a shield
    and I was in a room with families trying to be six feet away from each other. The thing about working with kids is that
    they're not all really great about keeping their masks on, which is perfectly understandable. It was pretty stressful,
    especially since the families we work with are a lot of frontline workers and essential workers. They were at higher risk,
    which put us at higher risk. There was a baseline level of stress that was always there going into the clinic and a kind
    of a relief when you got to step back outside into fresh air.
- speaker: Interviewer
  text: Did you feel like that stress kind of affected your life in any way, either inside or outside of work?
- speaker: Respondent
  text: Yes, the stress of working in clinic with families that are at higher risk of getting COVID and having complications,
    too, just by nature of the families I work with. A lot of the kids and parents have chronic diseases and nutrition related
    diseases, making the whole situation a little more high risk for them and for us too. It did impact my personal life.
    I take the pandemic very seriously, and I don't spend time with friends without masks on. It limited my ability to bubble
    with friends. I have lots of friends and family members who were able to have a closed circuit bubble with each other
    and confirm no exposures, but I wasn't able to do that. I haven't really been within six feet of anyone other than my
    husband.
- speaker: Interviewer
  text: You said you have a husband. Do you have any kids as well or do you live with anyone else?
- speaker: Respondent
  text: No kids. We do have a housemate. We rent out the extra bedroom in our house to a student. He's a student at UNC and
    my coworker's son. When he wasn't able to live on campus or find a safe living situation, we let him live with us so he
    could be closer to the university in case they opened up. So, he is a fellow housemate and we also live with two cats
    that I hear can get COVID, but we're not worried about.
- speaker: Interviewer
  text: It sounds like, unsurprisingly in the last year and especially during telehealth times, your work schedule changed
    pretty dramatically. Could you tell me briefly about what your work looked like before the pandemic?
- speaker: Respondent
  text: Before the pandemic, I had a very different work schedule. I've always worked kind of the conventional 40 hours a
    week, but clinic hours are from 8 a.m. to 5 p.m. You may or may not see patients during the lunchtime hour. The two dietitians
    in our clinic work the maximum schedule that you can. We have a morning and an afternoon clinic, and the maximum you can
    work is nine clinics a week and then there's one set aside for admin time to catch up on charts and work on side projects.
    So, before the pandemic, I went in five days a week and had patients all throughout that time and then had one afternoon
    a week with a little more flexibility.
- speaker: Interviewer
  text: Do you work mostly in an outpatient setting, just to be clear?
- speaker: Interviewer
  text: Is there one clinic in particular that you normally work at?
- speaker: Respondent
  text: Yes, I'm based in just one clinic. It's the Roxboro Road Pediatrics Clinic on Roxboro Road in Durham. There's a primary
    care clinic downstairs in the building. Most of the children get referred to our clinic and most referrals come from the
    downstairs primary care. We also get referrals from other parts of Duke, from outside of Duke, all around the state. I
    also take general nutrition referrals outside of weight management, like sports nutrition, poor weight gain, food allergies,
    and things like that.
- speaker: Interviewer
  text: In that clinic, have you felt like there have been any resources that the clinic or clinic management has tried to
    do to make you feel supported? Can you give some examples of how you felt supported or not?
- speaker: Respondent
  text: Supported specifically during the pandemic?
- speaker: Interviewer
  text: Yes, specifically.
- speaker: Respondent
  text: In telehealth or more broadly?
- speaker: Interviewer
  text: Not necessarily just professionally, like in life and professionally.
- speaker: Respondent
  text: I do feel very supported by the clinic I work in. We're housed within the pediatric clinic within the Duke Healthy
    Lifestyles clinic, our own little family. At the very beginning of the pandemic, there was a lot of information shared
    about how the pandemic was being managed. Communication lines were pretty open and information was communicated quickly.
    There have been some miscommunications because we're in constant flux and adapting to telehealth. There wasn't an infrastructure
    for telehealth at the beginning, so the first few weeks and months were confusing with many road bumps. It's gotten better
    and we've hit a groove now. I continue to feel very supported, especially by my immediate clinic, the Healthy Lifestyles
    clinic, where everyone is supportive and vested in each other's well-being. Support is often offered by folks who leave
    the clinic. I also had a unique experience because about a year before the pandemic, I started a wellness committee in
    the Roxboro Road clinic. At the beginning, a lot was thrown at me because it was suddenly my role to help address staff
    wellness. I don't know how good a job I did because there were so many emails flooding inboxes in March through June.
    Everything was virtual, so I didn't really know how to reach out and support the clinic without overwhelming people. I
    tried to share resources and information. Since July, I send a weekly email that I try to keep funny with memes, links
    for meditation, mindfulness, healthy recipes, exercise stuff, and a thankfulness section. I don't know how many people
    read it, but it's our way. So, I'm kind of from both sides. I feel supported by my clinic, but it's also been my role
    to help the clinic feel supported.
- speaker: Interviewer
  text: I would love to hear more about if you have any examples of ways you've found as the person responsible for wellness,
    how you felt when you were tossed into this role and stories about ways you found to keep people well or help in that
    effort other than the email.
- speaker: Respondent
  text: As the wellness committee coordinator, at the beginning I felt a little hypocritical because many primary care frontline
    folks never got to work from home. You can't take a kid's blood pressure through a computer screen. Many staff, doctors,
    and faculty were still going in almost every day and facing the public in a very uncertain and scary time. Here I was,
    working from home and trying to boost morale in a situation I wasn't fully part of by the nature of my job. I spent a
    lot of time asking folks what they needed and messaging people directly in the clinic to ask what would help them and
    what they wanted from an email. I also passed forward university resources in smaller, digestible pieces. Once I started
    going back into clinic, I felt more camaraderie with those working in person. I rely heavily on an amazing group of people
    I work with; I don't do this work alone. We continue to have monthly meetings, now better attended since folks can join
    online, crowdsourcing from the team to offer what the clinic needs. This week, we'll send out a poll to the clinic with
    ideas to see which are most interesting to provide relatable resources. One fun thing we did was a wellness bingo card
    for folks to participate in, focusing on wellness and self-care with different activities. If folks got a bingo, they
    could submit their card for a raffle.
