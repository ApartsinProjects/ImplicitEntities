collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Would you tell me a story about your life during the pandemic?
- speaker: Respondent
  text: Oh, man, that was a scary moment for us. When it first happened. I was actually in Vegas at a special event trade
    show. And I had been there for the week. And it was winding up and very excited about all of the new products that I've
    found. The new services that we were going to introduce into our business, couldn't wait to get back to our clients. And
    all of a sudden, we started hearing little things bits and pieces about something nobody knew what it was what was going
    on, or either they weren't communicating it. I don't know which one was the truth. But things started shutting down in
    Vegas, and I received a phone call from my husband saying the NBA, they are shutting down the NBA. And so whatever is
    going on is pretty serious. And you probably need to try to make your way back home. And so I did after the show, because
    again, I wasn't clear on what was going on. And I had four events booked for when I returned for that weekend. And once
    I reached St. Louis, I started getting text messages from my clients. And it was, I'll never forget, I'll never forget
    it. They were saying that they were not hosting the events because St. Louis was shutting down and they did not want anyone
    to have any events over at that time. It was maybe I think 100 people, and then it dropped down to 50 people and then
    20 people. And it was a scary, scary moment because we were completely booked for 2020 back in 2019. Not completely but
    we were booked for the whole year. And so once I got home and we started my husband I we started watching the news, fear
    just gripped my heart seriously, because I know that without the revenue, I could not pay one bill without you know, the
    business. And so I my husband looked at me and said, What are you gonna do? I said, I have no idea what I'm gonna do.
    And I just remember staying glued to CNN, and CNBC. I don't even know, CNBC. And then every time an official would come
    on the news and they would start talking about the pandemic and the death and it was just a lot but the saving grace was
    because I was watching the news. And they, the government just really stepped in to really support and help our businesses,
    our small businesses, were really all businesses, I applied for any and everything available. And I would say received
    90% of everything or 99% of everything that came my way that I heard about on the news, or locally, people would call
    me and say, hey, you know, apply for, we have this grant money, or we have this loan, that's 1% 0% 3%. And so that was
    our saving grace. And also my husband, he, he is a day trader. So he began to help me take the investments that I had
    already had and to and he started teaching me and showing me how to invest what I already had in hand and grow it. And
    that's what I ended up doing for the year 2020 is investing and, and it really helped us believe it or not, in 2021 because
    there weren't as many lifelines for small businesses or any business during the month of May, during the year of 2021.
    That was probably the harder month, year 2021. And then the beginning of 2022. So that is what we went through and being
    afraid to go out. And because we're in the special event industry, we actually had to pivot our business was strictly
    decorating. And during the pandemic, we actually started renting, my kids stepped up because I was not going to go out.
    But my kids went out which are their adults. And they said that they weren't afraid to go out. And we just started renting
    our pipe and drape and tables and chairs and podiums. Because there was a there were a lot of press conferences, there
    were a lot of there were a lot of stations, food, food, state food banks, stations, and so people needed tents, they needed
    tables and needed chairs, they needed podiums to have press conferences, and backdrops, they wanted to look very presidential,
    you know, and that's what we do. So my, my two adult children, they stepped up and they started getting out there and
    renting out all of our products. And then the other thing that started happening is, after there was like a little bit
    of a handle on everything. People started having events, they weren't letting go of their birthdays, they weren't letting
    go, if they were engaged, wanting to be married, they still kind of wanted to have family gatherings, but just smaller
    family gatherings. So we're a business that have been known to do conventions, large events, you know, 5,000 10,000 4,000
    2,000. So of course, all of that was shut down. The hotels were shut down. The convention centers were shut down, because
    we do travel nationally to do national conventions. And so all of that was shut down. So we actually had to pivot from
    doing the larger events to do my very personal private events, which means rentals. So that's what happened in 2020.
- speaker: Interviewer
  text: Do you remember when you first heard about COVID-19?
- speaker: Respondent
  text: I do. It was I think it was March 13, 2020. Because I was in Vegas. And that's when, Well, actually it happened before
    I went to Vegas, but our shutdown for our city was March 13, 2020.
- speaker: Interviewer
  text: What was it like traveling back from Vegas while all of this was sort of just starting?
- speaker: Respondent
  text: I was paranoid. Because people started coughing. And, you know, even today, when you cough, everybody looks into like,
    Oh, did you cover your mouth? Are you spreading germs? Are you spreading COVID. So it was a little frightening. I just
    remember, you know, wanting to get back home. But I still didn't understand what was going on. We didn't know about the
    deaths at that mall at that time. We just knew that the NBA was shutting down. And that's all that I knew. So, and I didn't
    even know that my city had shut down because I was not in communications with anyone until I actually landed. So it, it
    was, you know, I just I was afraid because things were happening, Vegas had started to shut down, they were shutting down
    the shows they were shutting down some of the hotels while I was there. So just the uncertainty brought a little panic.
- speaker: Interviewer
  text: To the extent that you're comfortable sharing, would you tell me something about your experiences with health and
    the health care system before the pandemic?
- speaker: Respondent
  text: Before, well, let's see. I don't have any comments on it either negative or positively.
- speaker: Interviewer
  text: Pre pandemic, what was your day to day looking like?
- speaker: Respondent
  text: Oh, very busy. Like now, just every day, hustle bustle. Every every single day. So what I do what I love, so they
    say that if you love what you do, you'll never work a day in your life. And I believe that statement to be true. So just
    not afraid to go out not afraid to travel, working hard, providing, you know, for my team. And so that's what we did.
- speaker: Interviewer
  text: How's that busyness felt in terms of work life balance.
- speaker: Respondent
  text: My business has always been my life. So it does not bother me at all. Like I said, I love what I do. So because I
    love what I do it, it really, it's not work. To me, it's art. If you're an artist, and you love to draw, and you could
    draw every single day, they're there. It's you know, it's it's my passion. So so it's it's good. Now, if you were to interview
    my husband, on the other hand, and he may tell a totally different story, because I do work a lot. But you're not interviewing
    him.
- speaker: Interviewer
  text: What's marriage meant to you during this period?
- speaker: Respondent
  text: Oh, to have a partner that was in, you know, retired from law enforcement meant the world. He's very protective and
    very knowledgeable and very informed. And because he's retired, he gets to listen to the news almost 24 hours a day. And
    he makes sure that our family is protected and informed. So it's been great to have a partner like that.
- speaker: Interviewer
  text: How did your day to day change when locked down happened?
- speaker: Respondent
  text: Oh my God, I got so much rest, it was unbelievable. I think I slept for three months. It was amazing. It was amazing.
    So it was beautiful. The only thing that I did not like was being separated from my adult children and grandkids. I didn't
    like that part. You know, we had to see each other through glass doors, glass windows. And I love to cook and entertain
    my my family so I was not able to to do that during that time. So that part was difficult. But when you work the way I
    work, and you get a chance to rest, and you don't have to be anywhere, no demands on you coming from anywhere. That part
    was really nice to experience.
- speaker: Interviewer
  text: Do you remember, one of the first times you got to see your adult children or your grandchildren again, without it
    having to be through a pane of glass.
- speaker: Respondent
  text: Yeah, I, my daughter, and I, all I'm close with all of my kids. But my daughter lived right downtown, my youngest.
    And so we just decided we lived right around the corner from one, one another. And we just decided that we were going
    to take a chance, wear our masks as recommended, and see one another. And so I remember letting her in the house. And
    she sat on one side of the couch, and I sit on the other side of the couch. And just to have her in my presence was pretty
    awesome. And you don't realize how fortunate we are to have each other and in, in our lives. Until you can't touch that
    person can't you know? Embrace them. So that was that was pretty special to see her. And so and we kind of did it often.
    After that. We we stayed because she was off work, I was off work. There was no more busyness. And so we were able to
    just really connect and enjoy each other.
- speaker: Interviewer
  text: Has your relationship to touch changed?
- speaker: Respondent
  text: In what way?
- speaker: Interviewer
  text: You had mentioned, being able to sit with but not yet being able to touch. I'm wondering about whether or not you
    have have just changed the way that you touch people or change the way you think about whether or not you're going to
    touch someone.
- speaker: Respondent
  text: Oh, I'm a hugger. So I always embrace so No, it hasn't changed. It's just now we do it, we still are very conscious
    of the pandemic because it is not gone away. But at the same time. It's something that I just have to take a chance on
