collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you tell me a little bit more about what you do professionally?
- speaker: Respondent
  text: Yeah, so my role is one hundred percent dedicated to taking care of the occupational health of all of Duke employees.
    And so, any time that somebody's health could impact their work or their ability to work, or if their work is in fact
    affecting their health, it goes both ways. That's where we become involved to assist the employees in those cases. Some
    of the most common ways are when there are work-related injuries or illness, when there are not fit for duty evaluations
    or for any reason, the employee may or may not be safe to be at work. We also do FMLA reviews, ADA reasonable accommodation
    that we do the medical reviews on those. And even pre-COVID, we would do contact tracing if there was then a patient with
    a communicable illness and we thought that there could have been an exposure to any of our employees, like tuberculosis
    or meningitis. Now, the majority of my time is devoted to COVID efforts as it relates to surveillance, testing and supporting
    those employees who may become, who may either be exposed or may become positive.
- speaker: Interviewer
  text: I see, wow. Well, that sounds like you will have a very interesting perspective for us. Thank you. I was wondering
    why you wanted to volunteer to do this interview?
- speaker: Respondent
  text: Yeah, I mean, I think that our view of our front line is probably different than most of the other folks that you're
    talking to in that I'm not actively seeing COVID patients, but we were some of the first people involved. We started getting
    involved in December of last year in - sorry, in 2019, when it first became known to us that this is something that we
    might have to experience. The other part of that is that Duke has a sister school, DKU, Duke Kunshan University, in China
    that partners with Wuhan University. And so, we have a lot of students and faculty who may go back and forth. And so,
    we were uniquely positioned to be very involved in trying to get knowledge about this novel thing called coronavirus way
    back before it was even discussed that it could be coming to America.
- speaker: Interviewer
  text: Well, that is a very interesting perspective, thank you. I really appreciate you joining us and sharing that. I would
    love to hear a little bit more about when you first heard about this and became aware of this and that early timeline.
    I think it sounds like you had this closer to the front of your mind a lot earlier than a lot of other folks.
- speaker: Respondent
  text: Yeah. So, my supervisor was involved in it really from day one. And then I became involved in the beginning of January,
    when we were all crowded in a very packed large auditorium to listen to one of our infectious disease colleagues tell
    us what they knew about this very new virus. And so, that was that's really how it started. And then throughout January
    and February, we continued to be updated and looking at that, it was all about travel then. It was all about the travel
    restrictions. And I also, as part of my regular role pre-COVID, did travel evaluations and travel medical evaluations.
    And so, working with some of our employees who were either coming or going and trying to give them the best, most up-to-date
    medical advice on what they should do and then into February, working with some of the quarantine, some of the travel
    restrictions. And then that first week of March is when things really picked up for us. In general, occupational medicine
    is a banker's hours type of specialty, usually. And that first week in March, we went from working 40-50 hours a week
    to working 100 hours a week and really trying to stay on top of everything that was changing every minute, not just working
    with everybody who was frantic with every single change multiple times a day that the CDC would make as far as travel
    restrictions. You can come from Japan now. You can't come from Japan now. I mean, it was changing multiple times a day
    and really assisting our scared employees, giving them the most up-to-date information and then back in those early days
    when they would come and quarantine, making sure that they had access to even some basic things. So, we had people coming
    here who didn't yet have an apartment set up or were coming from a different country and were immediately shuffled into
    quarantine, didn't have groceries, may or may not be fully fluent in English, or have the technological abilities to order
    groceries on their app. Now those are things that most of us know how to do very easily, but a year ago, that wasn't the
    case. And so, getting people a thermometer or bleach wipes was really part of our role as a team then. And at that time,
    it was myself and one other physician and two nurses doing the answering hundreds of phone calls and emails a day, trying
    to research what the CDC was saying minute-by-minute, trying to come up with protocols for our travelers, but also trying
    to look forward to what's going to happen when we get that first patient. And what is the PPE? That was a term that people
    didn't know - what PPE meant. Now everybody knows, but it is part of our responsibility to help determine what PPE is
    appropriate and that people have access for that, trying to get people fit tested for their N95 masks. And then a large
    part of what I did was field the incredibly high number of concerns from pregnant women about, What does this mean for
    me? I'm a nurse. I'm a pharmacist. What does this mean for me and can I work? And that was - people were very distressed,
    had an incredibly high amount of anxiety, and there was not a lot of data to go off of. The data that we had was very
    reassuring. And what we knew was that our PPE was effective and that we were very fortunate to be at Duke, where we had
    access to all of the necessary PPE. And that became very close, but that was never a problem. And so, but tensions were
    very high and so trying to reassure people that things could be safe when there was very limited knowledge was very difficult.
    Emotionally and logistically difficult.
- speaker: Interviewer
  text: Yeah, I would certainly imagine. I would, first of all [in audible]. So, that's a very interesting perspective. I
    was wondering how it felt to try to give those reassurances during a time when information really wasn't certain and was
    hard to find and rapidly evolving.
- speaker: Respondent
  text: Sure. Giving those - trying to give those reassurances was - it was a challenge, but that's part of my role, even
    pre-COVID, is to provide reassurance and for all physicians, even when delivering difficult news, part of our role is
    to be comforting to the patients or, in my case, to the employees. For me, I was uniquely positioned in that I was eight
    months pregnant myself, and so I had some anxieties and some - I was able to share with some people that we were in the
    same boat and that I felt comfortable with the PPE that we had and with the guidance and guidelines that we had at the
    time for myself, as well. So, I was not just - it wasn't academic for me - it was very personal and I was able to share
    those things and my personal perspective with people. And I think that that uniquely positioned me to be able to have
    a deeper conversation with them.
- speaker: Interviewer
  text: From these many, many conversations that you have, that you had with people, are there any stories that stuck out
    that you could tell me about where someone either raised a concern that they felt like, that you felt like you couldn't
    really assuage or that they had an especially powerful story or circumstance?
- speaker: Respondent
  text: Sure, I think - I think that there are a lot of stories and I think it's going to be hard to give a specific story
    without breaking confidences, but what I can say is that - let me think about what I can say, actually. So, I think that
    one of the challenges that we would continually get were managers trying to figure out their planning and making sure
    that they had enough staff to do the necessary things that they needed to do to keep a unit open, to care for all of the
    patients, COVID patients, non-COVID patients and having some guidance as to whether they could expect this employee to
    be out for a day, a week, a month. And in the beginning, it was very difficult to give them that guidance that they really
    needed because the guidance was changing on a daily basis. So, somebody returning from one country could be that day just
    fine to come back to work. And later on, that day, they would need to quarantine for 14 days. And so, that was incredibly
    challenging, not just for the individual employees, but the managers and the coworkers who were trying to keep the hospital
    running and keep the clinics running and continue vital services for the entire Durham population.
- speaker: Interviewer
  text: Yeah. Yeah, that does sound like it would be an especially challenging circumstance. When you were going through this
    all, as you said you were eight months pregnant when you were trying to reassure these people, did you ever feel afraid
    while you were pregnant? Were there times where you felt like you were really uncertain and worried about yourself or
    your child?
- speaker: Respondent
  text: Sure. I think that in the beginning of the pandemic, back in January, when we were thinking about what even is this
    virus, is it going to come here, when we knew nothing, when we had no case reports. I was nervous being pregnant at the
    time and I was able to heavily research the case reports that were coming out and luckily, before it reached us or before
    we know that it reached us, before we were aware that it reached us, I was able to read all of the available literature
    on COVID-19 and pregnancy. That's probably the only time in my life that I will be able to say that I reviewed all available
    literature on a topic thoroughly, and it was, I was able to be reassured. I was also able to speak - I have the advantage
    of being able to speak with colleagues and experts in obstetrics fields and in maternal fetal medicine fields, who felt
    equally reassured by the literature and by the PPE that we had available. It was a challenge when I would first start
    talking to somebody who was already distressed. I had several people - I had many people yell at me and I had several
    people tell me I didn't care about pregnant people, which was interesting because I myself was pregnant, and so I think
    that the important thing in when you're handling situations like that is to reflect and realize that it's not, it wasn't
    about me at that time, it was about the person on the other end of the phone who is scared and really recognize that and
    try to assist them with what they need. And also, for me, I like facts and numbers and statistics, and that calms me and
    reassures me. But not everybody likes that. And so, sometimes it is just listening to somebody and just being more of
    a friend than the person with all of the statistics on the other end and being able to talk through it and try to reassure
    everybody. The things that were most difficult for me were those conversations where I wasn't able to reassure people
    and they were still distressed at the end and that weighed very heavily on me and was very difficult for me to not be
    able to provide that reassurance when I could tell how scared that mom was on the phone.
- speaker: Interviewer
  text: Well, yeah, that is very powerful. I promise that not all of the questions that I ask will be about you being pregnant
    during the pandemic, but I will ask one more.
- speaker: Interviewer
  text: I do think it's a really kind of unique perspective and an interesting one. I know that right now with vaccination
    efforts, there hasn't been quite as much evidence of vaccine efficacy in pregnant women or safety. And I was wondering
    if you could comment on that at all? This may not have affected you personally quite as much, because from the timeline,
    it sounds like you weren't pregnant anymore by the time vaccine rollouts really started. But if you could comment on that
    at all?
- speaker: Respondent
  text: Yeah, I think that it's unfortunate that pregnant women were not included in the initial studies and trials and breastfeeding
    women, as well. I would be an advocate for including those groups in future trials. I think it's really important to do
    that from a safety perspective and from a population health perspective. And so, it was difficult to reassure people initially
    before we had a lot of the data. But I think now that there were people who became pregnant during the trials and, to
    my knowledge, have not had any negative effects, and the vaccine has now been given to millions of people and not in significant
    numbers of women who are pregnant and breastfeeding. And so, so far, that initial data looks very reassuring for breastfeeding
    women, particularly. There - I can't think of a physiologic reason why it would be unsafe to get any of the available
    vaccines in the United States right now. I myself got one. And so, for pregnant women, it also is hard. It's a stretch
    to think about it having a negative effect on pregnant women. But I understand that when you're talking about your own
    child, your own baby, it is hard sometimes to be okay with the level of uncertainty, which is why I think it's so critical
    that we include pregnant women in trials.
- speaker: Interviewer
  text: Great. Thank you. Yeah. I was wondering if you could walk me through what your day has looked like at work in the
    last few weeks. I know it's probably quite different from what it looked like in the beginning of the pandemic.
- speaker: Respondent
  text: Sure. In the last few weeks, my days have been different. I've been able to actually take a breath and dip my toe
    back into some of the other things that I enjoy that make my job rich and that give me fulfillment and purpose that are
    not COVID. I've gotten a lot of fulfillment and purpose in helping people with the COVID response, but I really miss seeing
    patients in clinic and I've been able to start doing that at a small amount. Every day we start off in the morning with
