source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, just to begin, Dr. Bedlack, can you tell me a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: Yeah, I'll start by telling you a little bit about myself. So, I grew up in a small town in central Connecticut, and
    I really believe I was born to be a neurologist because some of my earliest memories include things like rolling my little
    brother down a hill in our backyard and watching him kind of get up and stagger to one side and wondering what that was
    and rolling myself down the hill and experiencing that spinning sensation that I would later understand to be vertigo.
    And of course, you know, each time I would make some sort of strange observation like this, I would have to go ask my
    mom. And I didn't have any medical people in my family. So, she would say, Put it on the list, I'll drop you off at the
    library on Saturday like I do every week, and you can try to figure it out. And it just continued really, all through
    my life as I got older, I couldn't help but, you know, notice that somebody walked differently or had a tremor. And, you
    know, just wondered, what was that? What was causing that to happen? And I just gravitated more and more toward books
    and eventually classes and college and then graduate school to try to understand all this. And as I came along, I wondered,
    you know, do I want to work with people or do I want to do bench research? And so, I decided to do an MD-PhD program and
    get a little bit of both. Try to see, you know, what do I really like doing? And I found out, you know, during that time
    that I was a people person. I really like to be around people. That just gave me a lot of energy and enthusiasm and inspiration.
    And I had a hard time just being in a lab by myself, sometimes for many days, not interacting with any other human, just
    cells in a dish. That was tough for me. So, by the time I finished that MD-PhD program, I knew I wanted to work with people.
    I knew I wanted to be a neurologist. And I wanted to somehow build a new program for people with some rare disease that
    would give them some options. And we’d research into that, some sort of research. I wasn’t exactly sure what at the time.
    And so, as I traveled around the country looking at different places to do my internship and residency, I was looking
    for a person who was doing what I thought I wanted to do someday. And when I came to Duke for my interview, I met up with
    a guy named James McNamara. And he was not only incredibly enthusiastic and fun, but his life was the way I would imagine
    my life might be someday. He was working in the clinic part-time, rounding in the hospital, and in his case, he was focused
    on epilepsy. And he was trying to treat patients with really difficult refractory epilepsies. And then he would go back
    to his lab and he would study the molecular mechanisms of epilepsy and try to figure out how to develop new treatments
    that he could bring into the clinic. And so, he’s really the main reason I wound up at Duke. And so, as I came here, I
    was excited by everything through my internship and residency, but it was sort of midway through my residency when I saw
    my first patient with ALS, a myotrophic lateral sclerosis. And to me, that was the most dramatic history that I’d ever
    taken. And it was the most incredible collection of findings on a neurological exam that I’d ever seen, you know, widespread
    atrophy, fasciculations, weakness, hyporeflexia, all in one person. And I remember being so excited to talk to my attending
    about this case and then so disappointed, really almost horrified when my attending came into the room and said, You know,
    this is what we call it, we don’t know why it happens, and there’s really not much we can do about it. You just have to
    go home and get your affairs in order. And as I drove home that day, I knew this would be the disease that I would focus
    on at Duke. And so, flash-forward 21 years since I became an attending, with a lot of luck, a lot of hard work, a lot
    of creativity been able to build a very unusual program here. It’s one of the largest, most comprehensive multidisciplinary
    programs for people with ALS. And so, now when a person with ALS comes to see us, they spend most of the day with us every
    few months and they’re gone over from head-to-toe by a team of 17 different clinicians. Each person on the team goes in
    and makes measurements of one particular body part to try to identify, What is it that ALS is trying to take away from
    this person? And what options can we offer to compensate? And so, now when a person leaves, they go away with a long list
    of options, things they can do about the disease to live a more normal life, a better life, a longer life. And I’ve been
    able to build research into my clinic. I quickly learned that I was nowhere near as smart as James McNamara. I wasn’t
    going to be able to build a great clinical program and maintain a lab and funding and things like that. So, I kind of
    retooled and learned about clinical research. I took classes at the Duke Clinical Research Institute and was able to get
    a master’s in clinical research science. And so, now I do clinical research with my patients, lots of different kinds
    of biomarker studies, genetic studies and mostly clinical trials. So, that’s kind of how my career has evolved.
- speaker: Interviewer
  text: It's wonderful to hear, and I love hearing the back story, too, hadn’t known that. So, my first question for you more
    formally is what brings you here? Why did you volunteer to be interviewed for this project?
- speaker: Respondent
  text: So, I don’t think that my life has ever changed so dramatically, so quickly, as it did in 2020. You know, when 2020
    started out, I felt like I had a really good system for evaluating new people with ALS. You know, I knew how to see them
    in person and take a history and do a really detailed neurological exam and figure out if that’s what they had and you
    know how to have the conversation with them face-to-face. I felt like I had a pretty good understanding of how to follow
    people with this disease, with this sort of comprehensive multidisciplinary team where people would come in-person and
    get all these measurements. I felt like I had a pretty good understanding of how to do research. You know, the ways that
    we would bring people back on a regular basis and the kinds of things that we would measure. And I felt like I understood
    myself like I felt like I understood what motivated me, what gave me energy and allowed me to stay enthusiastic and hopeful.
    And a lot of that was traveling. I was doing a ton of traveling, you know, mostly I was traveling around the world to
    speak to groups of patients about the exciting things that we were doing. But I would also go and hear from other colleagues
    all over the world about what they were doing and be able to incorporate that into the hopeful message that I gave patients.
    And on those trips, you know, I realized how much I enjoyed sampling different cultures, different kinds of foods, you
    know, different entertainment. And I really love shopping. So, I don’t know if you’ve heard this about me, but fashion
    has always been a thing for me. And more than just sort of a vanity, it’s been a tool like I learned at an early age that
    if I put on something really wild and crazy, it was sort of like a suit of armor. It helped me to maintain my positive
    energy and my optimism throughout the day, no matter what I ran into. And it just became so important to be able to do
    that as I got into ALS. You know, people come to me and they’re scared, and understandably so. And, you know, when I built
    the clinic, I think it made it even scarier because now they’re getting this comprehensive head-to-toe assessment, they’re
    really going to learn about all the things that ALS is taking away and well, it’s nice to offer options. Some of them
    are tough. You know, options like a ventilator or feeding tube or a wheelchair are very scary things to hear about. And
    so, I’ve got to be able to be energetic and optimistic, and I also find that it breaks the ice for patients, you know,
    if they come in and the first thing we get to do is laugh about my outfit, we’re off to a great start. And all of a sudden,
    you know, starting in March of 2020, a lot of that was taken away from me. You know, all of a sudden, I couldn’t see new
    patients in-person and even my returns, you know, I had to quickly figure out a way to do that differently and research
    basically came to a halt. You know, the things that gave me the energy and enthusiasm came to a halt. There wasn’t any
    more travel. There wasn’t any more, you know, sampling different cultures. There wasn’t any more shopping and all these
    unusual stores and picking out all these wild clothes. And so, I mean, I just sort of sit back and take a deep breath
    and figure out now what?
- speaker: Interviewer
  text: Yeah, I think you bring up a lot of really important points about how the pandemic has really altered life, you know,
    and you touched on this a little bit, you know, about your relationships with the patients. Can you talk me through a
    little bit more how your relationships with both established and new patients have changed due to the pandemic or how
    protocols have really changed how you’ve interacted with them?
- speaker: Respondent
  text: Yeah. So, thankfully, where we are now, you know, March 5th of 2021, things are getting a little bit closer to where
    they were when the pandemic started. But, you know, at its sort of nadir, I couldn’t see new patients at all, and we already
    had a big backlog of people that wanted to come to our program. And, you know, not being able to see a person with ALS
    is a real issue because a lot of the options that we have work better earlier in the course of the disease. So, the last
    thing that we wanted to do is make people wait even longer to come in to see us, you know, until we could get permission
    to see them face-to-face again. And so, one of the tools that I found out about that I’ve used a lot in the pandemic is
    a group called Summus Global, S-U-M-M-U-S. This is actually a company that was started by some Duke graduates, and they
    recognized that there’s a real hunger all over the world for patients and families to connect with experts in rare diseases.
    And, well, this does not establish a doctor-patient relationship, it does not allow me to recommend a specific treatment
    to a patient or send it into their pharmacy, it does allow me to go through a person’s records and say, you know, if I
    saw a person with this story and these tests and these documented exams, these are the additional tests I would do. And
    you know, these are some of the treatments that I would consider, and I can go through some of the treatments in terms
    of the benefits and burdens that I’ve seen in my patients. And these are some of the research options that I would think
    about for that person. And I can even tell them what I know about, you know, some of the better clinics and the better
    research options in their part of the world. So, it was kind of amazing because with Summus I was able to really minimize
    the damage that shut down created for new patients, and in fact, I was probably even able to expand my reach to further
    places in the globe, you know, very difficult for people from faraway places like, you know, South America to come all
    the way to Duke to see me. But I was able to connect with them through this Summus Global, you know, video conference
    platform that they set up. And, you know, for return patients, we had more options. So, since we already had a doctor-patient
    relationship, we were allowed to do telemedicine and we had started telemedicine even before the pandemic, but it was
    kind of a trickle. And so, we did a few visits a week. And the reason why it was just a trickle was not because it wasn’t
    useful. We knew it was useful. You know, incredible how many needs people with ALS develop over time and how it takes
    somebody with some expertise in the disease to be able to ask the right questions to understand what those needs are and
    to know what the options are and how to get them for a person. You know, even the best primary care doctor may not know
    to ask a person about pathological laughing and crying, which is pseudobulbar affect, which happens to 50% of people with
    ALS, which we have an FDA approved medication that works quite well for called Nuedexta. So, that’s just one example,
    but we were pleased to see that all of a sudden two of the big barriers to widening telemedicine were taken down early
    in the pandemic. One was the payers. The biggest reason why I can only do telemedicine as a trickle was because I had
    a grant from a patient advocacy group that allowed me to pay for it. There was no billable telemedicine code that I know
    of for doing the kind of telemedicine I wanted to do, where I’m in my office and the patients in their home, telemedicine
    in the home I call it. All of a sudden, by the end of March, we had billing codes. And so, now we could do a lot more
    telemedicine. We were allowed to. And the technology became better. Like the technology that we were using prior to the
    pandemic was a little glitchy and difficult for many patients to use.
- speaker: Respondent
  text: And, you know, pretty quickly, everybody sort of embraced Zoom as the way to do these telemedicine visits. And, you
    know, we were able to use that, and most patients could easily figure out how to use that on whatever device they had.
    So, we quickly converted a lot of what we were doing from the clinic to telemedicine in the home, and we learned how to
    measure different aspects of the disease. So, you know, for a time, we couldn’t do pulmonary function testing, but we
    could do things like counting out loud on one breath, you know, Take a deep breath and let me see how high you can count
    loudly on one breath. And that’s a surrogate for your forced vital capacity. And so, you know, at its nadir, we really
