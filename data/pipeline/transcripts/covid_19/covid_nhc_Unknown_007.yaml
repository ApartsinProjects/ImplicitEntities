collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you tell me a little bit about why you volunteered to be interviewed?
- speaker: Respondent
  text: Yeah, absolutely. I think it is - so it's twofold. Sorry, I forgot to repeat your question.
- speaker: Respondent
  text: All right, so you - the question was to give a little bit of the my decision that drove me to participate in this
    interview and I think the main reason - there's two reasons - for one, I am a researcher myself, and I see the value in
    especially conducting qualitative research and collecting stories that, in my opinion, just adds a whole other layer of
    understanding and life to science. And the other part is given that we are in a, like you said, an unprecedented time
    where most of us have never experienced any of this, you know, unless you lived through the flu pandemic of 1918, which
    most of us haven't or at least don't remember it because they were babies. It's - I think it's really important to have
    a project like this that adds stories from the health care workers to give more of a, more of a perspective of what is
    going on behind the scenes necessarily and to bring that information to the general public, I think is critical to just
    raise more awareness and better understanding of how this impacts not only patients but also everyone who's working on
    the front lines. And to me, it seems like a good way to just create a little more compassion of everyone involved in this,
    right? And just adding a different perspective that can be shared with the world.
- speaker: Interviewer
  text: That makes complete sense. Thank you. Can you take me through a typical day for you before the pandemic hit? And contrast
    that with what a typical day for you is like now?
- speaker: Respondent
  text: Sure. So, my - comparing a typical day before the pandemic versus now - before the pandemic, I actually was not practicing
    as a health care worker before the pandemic. So, I started practicing in the hospital in August last year, so right after
    we kind of went through the first wave and started, things started to calm down a little bit. So, I don't have a whole,
    you know, a whole lot of comparison of the routine as a health care worker before the pandemic, at least in the US. I
    practice as a health care worker in Europe for a few years before the pandemic. But it's, you know, that's hard to compare,
    I guess. So, I'm not going to. But the typical day now - would you like me to talk about the typical day in the hospital
    or else the research component, how that changed?
- speaker: Interviewer
  text: Tell me both. We'd be interested in both. Yeah.
- speaker: Respondent
  text: Okay, great. So, from the research perspective, I can that I can compare before and after. And certainly, the focus
    of our research has shifted, right? It has shifted not only in terms of topics to be more cognizant of the impact of COVID,
    I do a lot of qualitative research, a lot more on low resource settings, underserved populations, that kind of stuff so
    COVID here obviously is a huge factor that now we're integrating in almost everything that we're looking at. And it had
    changed drastically our way, our way of conducting research, right, everything now has to be remote, which is a challenge,
    but at the same time seems to be a great opportunity to connect to people into settings that we didn't really tap into
    before to that extent. Now that being said, I work in a global health research team, so we've already been set up pretty
    well to work remote and to connect with team members across the world, which made that transition to now, fairly easy,
    I would say. That being said, what we try to pay a lot more attention to was a healthy work ethic and a healthy life balance
    and just being a lot more, just being a lot more mindful of everyone's challenges and trying to just be a little more,
    you know, a little more patient with each other and encouraging soft deadlines rather than hard deadlines and just being
    a little more understanding and compassionate. Especially, given we've all gotten a lot more, we've all gotten a lot busier,
    right, throughout this year, which was it definitely was a contrast to see to a lot of other people and a lot of friends
    in our circles that have lost their jobs, for example, or laid off or yeah, really having to suffer through lockdown without
    necessarily having those things to do in. The hospital that regular work now, I would say, well, it's the same pretty
    much ever since I started. So, you walk in and you have to do your health screen. I personally, I make sure to just eat
    my breakfast and stuff before and be ready for the day and I refuse to, I usually don't take my mask off once I start
    my shift until I leave the hospital again. And it's you know, you wear one mask, double mask, whatever it is, whatever
    you want to do. And then once you're in your gear, you don't really take it off. The interaction with your colleagues
    definitely have shifted and have become a little more relaxed again now that we're all vaccinated, you know, because you're
    still documenting in closed spaces, you're still very close. You can't maintain six feet distance. Obviously, in the hospitals
    also not only among your patients, but also with your colleagues. So, I think that has shifted and generally people seem
    to be a little more - we've gotten used to the new way of working I would say. Yeah.
- speaker: Interviewer
  text: What was it like starting during the pandemic? Was the onboarding process maybe different than you expected or had
    the kinks been ironed out since it was already August by the time it started?
- speaker: Respondent
  text: Yeah. So, it was interesting because I first when I first started, my health insurance hadn't gone through with, you
    know, just HR and getting all that set up. And that definitely was something that made me nervous. You know, under normal
    circumstances, you probably wouldn't be too cautious about this when you say, Okay, there might be two weeks when I start
    onboarding when I don't have access to health care, necessarily. During a pandemic, your - it changes your perception
    on, you know, having access to that. But luckily, that all got ironed out quickly and the onboarding they made sure that
    I wouldn't be seeing patients, necessarily until that all got figured out. I will say that in August, like I said, that
    was kind of the dip in cases and things started relaxing a little bit, we still had the shortage of PPE, though. We still
    had, you know, everyone was still trying to figure out, How much PPE do you really need if someone isn't actively admitted
    for COVID? So, in August, we didn't we weren't required to wear goggles, for example, or like a face shield or something,
    it was just a face mask. So, that kind of changed over time, right? Now, we have to wear eye protection. Our documentation
    system has changed a little bit. We're now having to indicate on each of our notes what PPE we were wearing. If the patient's
    wearing masks while we were in. If visitors were present, if they were wearing masks. Just so that we can keep track if
    a patient turns positive during their hospital stay, that we have something for us to keep track and say, Okay, well,
    are you good or you're not good, right? Do we need to isolate that kind of stuff? So, those things definitely have changed
    over time and I think it's just an ongoing process. You know, coming up with the - so, I first started seeing COVID patients,
    probably in November until then, they kept me off to make sure that the onboarding really was going through and in during
    that time, you know, having those PAPR machines, those hoods and the belts, we had trouble finding those necessarily on
    the ICU, right, because every nurse had to wear them and then if the PTs come in, we can take those away from them. So,
    it took a while for us to have enough in our own department so that we can already come down with our own without having
    to take them away. So, like those things that just was a wearing process for everyone to go through.
- speaker: Interviewer
  text: So, some of the people that I interview, they have varying opinions as to how supported they felt by Duke through
    this whole process. As someone who came on in the middle of this whole thing going on, how do you feel Duke has risen
    to the challenge of supporting its workers through this whole pandemic?
- speaker: Respondent
  text: So, the question is about how supportive Duke is during the pandemic for their health care workers and as someone
    who kind of started to engage in the middle of the pandemic, especially as a health care worker, I will say I might be
    in a different situation again there as well because I do physical therapy. It's kind of like a supplement to my postdoc.
    So, I've experienced that I've fallen through the cracks a little bit because I'm not a full-time PT staff at and I'm
    a researcher at the So, as a research staff, you're not necessarily, you know, on the high priority list for like the
    mental well-being and like all those things, right? And then if you're a supplement for the health care workers, you kind
    of fall through the cracks there sometimes, too. I think it took a while for Duke to rise up to the challenge and realized
    how challenging and taxing it was. You know, and little things of realizing you can't have any necessarily like team building
    activities anymore or creating a workspace that seems more welcoming, right? It was hard for me to think to really connect
    to my colleagues because you try to limit any, you know, contact necessarily. So, I think that definitely was something
    that was missing. Duke did - they added those three extra days of paid time off to use for health care workers until the
    end of February, which I think was a really nice gesture, and they were encouraging to use it really as like a mental
    health break. So, I think that's something that was important. I came on too late in the year, so I can't really talk
    about if there were any bonuses given out or any raises. I didn't, I didn't get any of that because I think, like I said,
    it was too late in the year on the onboarding process for any of this. Duke is now doing different mental health workshops
    and all those things. They started sending out a whole bunch of surveys a few months ago asking about the mental wellbeing
    of their staff members. And I think that was a big wake up call for them realizing how many people were actually burned
    out.
- speaker: Interviewer
  text: Have you taken advantage of any of these programs that Duke has started setting up in terms of wellness or anything
    like that?
- speaker: Respondent
  text: Questions about using any of the services that Duke offered and I have, other than taking the three days off to actually
    just, you know, go away for a long weekend, I have not taken any of those services. No.
- speaker: Interviewer
  text: Okay, thank you. How generally do you feel like you've been able to manage the stress of being a health care worker
    in this pandemic? Like how qualitatively, you know, good or bad? And then also, are there any techniques that have been
    useful for you on that you've developed over the course of these months?
- speaker: Respondent
  text: So, the question is about how I've been able to kind of cope with the stress and the burden of being a health care
    worker during that time and what strategies I started to use. I will say it was - the biggest strategy for me to cope
    with this definitely was time, you know, getting used to that situation and getting used to finding a balance of what
    can I safely do? And what do I really need to do, right? So, in the beginning when I started working in the hospital I
    was terrified of putting risk on anyone in my social environment, right? I was very, very concerned that they might not
    feel safe around me because I've been, you know, they've been in lockdown, they've all worked from home, they don't see
    anyone. And then I come in and say, Hey, you know, now I work in a hospital. I see - I'm just exposed to a lot of different
    strangers throughout the day that I can't actually stay away from and keep my distance, and it's an enclosed room, right?
    It's not outside and all those things. So, what I started doing, I pretty much just warned everyone that I would even
    just go on a walk with outside or something and say, like, Hey, you know, I've like, this is what I've started doing.
    It's up to you if you feel comfortable still continuing to meet up or not, right? And even like I said, if it just is
    for walking, always masked anyway, but like that made me even more isolated. So, starting to work as a health care worker
    definitely added, added on my isolation.
- speaker: Respondent
  text: And over time, I think it was - you get to a point where you start realizing, how can you navigate that a little better,
    right? That you don't have to go on to the full extreme of saying, I'm not seeing anyone unless I actually go into the
    hospital, work and that's it, because that really drained me. And that's - it was hard to keep that up, especially because
    my family still lives in Europe, so I wasn't able to see anyone that I'm close, you know, family-wise close with for 15
    months now. And so, that just took on a whole other level of feeling isolated and lonely. And I had to find a way to overcome
    that and find the connection with my friends here without putting them at risk. Another thing that helped me to strategize
    or kind of cope with this was taking more time for myself and just being very diligent about my own mental well-being.
    You know, starting just being stricter on my own like meditation practice that I do every morning, looking for different
    ways to engage in, you know, all sorts of like yoga practices. When I work from home and do my research, I start my day
    by meditating and then I take a walk outside rain or shine. I'll just have to do that. And then at the end of the day,
    I do the same thing. I'll go on a walk and then kind of, you know, have that because if I don't, I might not leave my
    bedroom
