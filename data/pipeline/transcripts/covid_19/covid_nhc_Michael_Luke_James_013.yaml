source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Dr. James, would you mind repeating your name and job title for me?
- speaker: Respondent
  text: My name is Michael Luke James. I go by Luke because my dad is named Michael, also. I am an associate professor in
    anesthesiology and neurology at Duke, and I practice mostly in the neuro intensive care unit at Duke University Hospital.
- speaker: Interviewer
  text: So, to get started, your interdisciplinary training in neuro anesthesiology, you mentioned is relatively unique. Could
    you just briefly walk me through a typical day for you at work in the last week or two?
- speaker: Respondent
  text: Yeah, so a typical day of work in the last week or two, I've actually been nonclinical the last two weeks, so most
    of it's been writing papers and emails and clinical research protocols. But a typical clinical day in the ICU is very,
    very different than - it typically - so if we started on a Monday, we'll take over the responsibilities at 7:00 a.m. and
    typically get what we call sign out, which is basically a brief run through of the patients and their critical problems
    from the fellow who is on overnight, who's a trainee, an advanced trainee. And then we will go in and start clinical rounds
    at around 8:00 a.m. and see every patient, examine every patient, make decisions on every patient that typically takes
    until about noon. We round on 16 patients and then we do whatever work is necessary for that day for that group of patients
    and their critical problems. We typically do sign out rounds in the evening again as the fellow, the overnight fellow,
    comes on at 7:00 p.m. and leaves at 7:00 a.m. So, somewhere around when they, as they're coming on and go to sleep and
    then start over again the next day, and that goes on from Monday and through Sunday night.
- speaker: Interviewer
  text: You mentioned a couple of responsibilities there. Are these responsibilities kind of similar to how they were pre-COVID
    or have there been any changes relating to COVID that have impacted you more recently, like within the last couple of
    weeks?
- speaker: Respondent
  text: So, these clinical changes and clinical responsibilities related to COVID? It's interesting that you ask it again
    in sort of the recent last couple of weeks because in the recent last month, I mean, it's been a dramatic shift in the
    burden of this COVID disease that we're seeing in the hospital. And even before that, the neuro ICU where I work, which
    is largely in stroke patients and brain trauma patients and neurological injuries, we haven't seen COVID patients since
    we moved to a new building back at the end of last year, 2020. So, but then the overall burden of COVID in the health
    system has dramatically declined in the last six weeks. That said, you know, in the as we started the pandemic here in
    the US and as lockdown occurred, I mean, there is a dramatic change in what I was doing on a day-to-day basis when we
    were seeing COVID patients in the neuro ICU.
- speaker: Interviewer
  text: You mentioned that during the heart of COVID, there were some dramatic changes in your daily life and your daily responsibilities.
    Could you tell me some more about those?
- speaker: Respondent
  text: Yeah. So, the changes that occurred because of COVID for my own personal clinical responsibilities weren't if you
    look at the actual change of what you physically did on a clinical week, it wasn't dramatically different than what you'd
    done before, except that there were a lot more patients that required isolation, like real isolation and negative pressure
    rooms and that sort of thing, which does add a layer, an enormous layer of complexity to their care, right? And so, if
    you're used to having maybe one patient in the ICU with that level of isolation and now you have eight, that is very different
    like the actual logistical difference. I think the major difference was stress, frankly and a lot of the stress of the
    unknown of the disease. I mean, back in March and April, right, we had no idea what we were, maybe we should have because
    Wuhan had a lot of experience with this, you know, three or four months before. And we did know somethings but there are
    a lot of things we didn't know. And I think that and then of course, the institution was continually changing their advisements
    about how to handle things and that sort of stuff so there was change, stress and all that kind of stuff. But the actual
    delivery of care? Yeah, I mean, other than the scale of the number of isolated patients wasn't that different.
- speaker: Interviewer
  text: You mentioned that patients were in isolation a lot more during the heart of COVID. Did that impact your relationships
    with patients at all kind of the way that patients were experiencing that care?
- speaker: Respondent
  text: So, I'm really glad you asked that question. So, the patient care aspect changes related to COVID were dramatic for
    patients with COVID-19 and specifically for family members with patients with COVID-19 and then spillover into patients'
    families for anything in the hospital. And that was largely due to their lack of visitation. Early on, there were no visitors
    or allowed. So, that was, that's a huge change from our intensive care unit that normally allowed 24-hour visitation.
    People would sleep in the rooms with the patients and that sort of thing and to no one being allowed to see them. And
    obviously, these patients can be really, really sick. So, they couldn't communicate with their family members or their
    family members couldn't communicate with them. And I think that was a real challenge that held over through several months
    until we started at least getting the visitation by one family member during a patient's stay. The communications with
    critical - I mean, you can imagine communication with family members in an intensive care setting are challenging at best,
    right? I mean, things are changing. People are really, really sick. They weren't really, really sick even two days ago
    sometimes. And so, conversations are difficult or can be. And then in the setting where they can't actually physically
    see their family member, I mean, it just adds an early on - again, after a while, we got into the ability to use technology
    and remote things like Zoom and Jabber and all this kind of stuff, right, where at least then they could see and we could
    talk to them from the room and whatnot. But early on, there was none of that. So, the patients went into a black box and
    the families had no idea other than what you tried to convey, you know, by talking to them. And that's just not a great
    means of communication in the setting that they're totally unfamiliar with, trying to explain somebody what an ICU room
    looks that's never been in one. They just don't know. And so, you can't adequately do that by talking to them unfortunately.
    And so, that was the biggest, that was the biggest single change in my mind from pre-COVID into the heart into the meat
    of the COVID response.
- speaker: Interviewer
  text: To follow up on that just for a minute, you mentioned that there were these dramatic changes, particularly the lack
    of visitation. Do you have any stories of moments you shared with patients that maybe highlight some of those changes?
- speaker: Respondent
  text: I think. So, if I understand you correctly, you're asking about patient stories in relationship to the lack of our
    ability or their family's ability to visit them in the ICU?
- speaker: Respondent
  text: Yeah. And so, I mean, I think - I mean, these have been shared quite a lot but I think the people dying alone is just,
    it's just heart wrenching and will always be. Just nobody should have to, and I think that was awful and there's not one
    patient that - obviously there are dozens at Duke - that had to experience that, unfortunately and worse, right? I mean
    once a person's dead, they're dead, but I mean, their families have to live with that forever, and I think that's just
    tragic. I think, you know, some of the non-COVID stories are related to some of the younger folks I saw that had like
    traumatic brain injuries and those folks that's tragic in and of itself, right? You know, you have, I mean I have kids
    and I can imagine my kids getting in a car accident and having to go to the hospital and seeing them in some coma or what
    have you. And trying to talk to those families over the phone is really, really difficult and I have memories of just
    a couple of few families that were in that circumstance, just trying, just trying to be sympathetic to. Well, some took
    it better than others, let's say, and for good reason. I can understand there's a lot of anger and fear from family members.
    And so, some expressed that a little more overtly than others and trying to get them to understand that this wasn't really
    the situation we were in and it was not really totally of our making, and we were all doing the best we can for the patients
    that we have. And that was a big part of what we were trying to communicate earlier beyond the medical circumstance for
    a particular patient, but like you know we didn't - personally, we would love for them to be able to come in and see their
    family member. But, you know, obviously it just wasn't possible. I think one that really stands out that we were finally
    able to get the patient's mother and it was a pediatric, he was - she - was a pediatric patient, had an extremely complicated
    course, and she'd been in the hospital for a while and then we got into the pandemic and then visitation was clamped down
    and not limited, whereas before the mom and dad have been able to come in and see her, you know, whenever they wanted
    - basically live with her. And then they couldn't. And so, I do remember working all the hoops and hurdles and pulling
    as many levers as we could to finally get mom to be able to come in and spend time with her on a daily basis. But it took
    a while because again, there's a lot of unknowns that we just - we know the safest thing to do is just to clamp everything
    down, and getting it released is a lot harder.
- speaker: Interviewer
  text: You mentioned earlier this concept of unknowns as being a pretty big stressor mentally kind of as your role as a clinician.
    Can you tell me a little bit more about those stressors and what you were thinking of? It's hard to say what was unknown,
    but kind of what was going through your head back at that time?
- speaker: Respondent
  text: So, to speak to the unknowns, especially as we started, I think actually a lot of them are known now, right? Like
    a lot of the things we didn't know then we actually do know now, which it's a whole separate issue of why we're still
    doing some of the things we are. So, you know, to everyone's credit, at least there's conversations and there's de-escalation
    and various things at this point. So, that's good. But the earliest problem, I remember, was a lack of access to testing
    and well, even before that, actually there was a lack of understanding from the on-the-ground clinicians of what the overall
    institutional response was going to be and whether anybody was actually putting it together, a plan. So, once that was
    the first week or so, like, Holy crap, where you know, when is this going to hit us and what are we going to do about
    it? Do we have any sort of plan? And then it became obvious there was in fact a plan and known and people have been talking
    about this since probably late December, early January at the institutional level. And so, that was good. And then it
    became a, We got a lot of people with flu symptoms or coughs and sniffles and/or really, you know, in my setting in the
    critical care area, like this guy's got terrible pneumonia, how do I know he doesn't have COVID? And we couldn't test
    him because there wasn't, there were very strict guidance on who could be tested and who the test would may be made available
    for and if you weren't, if you didn't fit those criteria, you could not get tested in the first days. And that was a real
    problem because they were clearly - well, I shouldn't say that - in my mind, there were some high probability people that
    had COVID that I saw that we couldn't make the diagnosis on because we couldn't get a test. And that wasn't the institution's
    fault, per se, it was a lack of testing nationally and they were really rationing that resource and that was a problem.
    And so, there was a huge unknown about who had it and didn't. And then, you know, then there was a whole issue with rationing
    PPE, personal protective equipment. Specifically, N95s, but really everything because I mean, at that time, we were trying
    to gown and, you know, whatever. A bunch of things that I think in retrospect were fairly unnecessary. An N95 and goggles
    were probably all that was really required. But we didn't have those things and we didn't really know about goggles, yet.
    And so, there was a lot of hesitation on the part of clinicians and nursing and, you know, providers, et cetera, to, you
    know, how do they protect themselves in the setting where they think somebody is a high probability of having COVID but
    can't get tested and because they don't meet certain, very rigid criteria? So, I don't want to get COVID. So, you know,
    what do I do? And so, that was a fairly big stressor that was related to unknowns where the diagnosis was there, whether
    we'd have PPE, you know, for the time that we needed it. And I think you've got to remember too, we saw what happened
    in Italy, right? And that was a catastrophe. I mean, it just was tragic. And we saw people in the health care environments
    getting sick because of their inadequate PPE and just having their health care system overrun. So, we'd seen what happened
