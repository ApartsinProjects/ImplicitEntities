collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Would you tell me a bit about your day to day and what that was looking like in a pre-pandemic world?
- speaker: Respondent
  text: Sure, In the pre-pandemic world, I would commute to and from work daily, during the week it is... oof, probably on
    a good day, I spend about an hour and a half in transit. I take public transit, and the public transit in this city is
    not grand. They put in light rail, which was supposed to solve all of that, and in fact, did a really bad job with it,
    so... When I got to work, I would open my computer as one does and hit the ground running. I work for the federal government,
    Department of Health. And I work in a directorate that, at that time, was working in regulatory review reform. Shortly
    into the pandemic, that changed, and they did a reorg, so we're now doing vaccines, which made things very, very busy
    during the pandemic. I'm an EA for a director in the federal government. He is now actually, before the pandemic, it was
    a she. She was very busy. And I really liked working with her. She was a good boss. But you know, it's really hard for
    me to explain what an EA does. Like I handle calendars, I answer questions, I answer a million questions every day about
    government processes and rules and regulations, and this is internally. This isn't externally with the public. This is
    just telling people who work for the government what they need to do to get what they want or to get something done. That's
    about it. Usually, by the time I got home, I was so tired, I kind of collapsed on the couch and either watched TV or read.
    I was a voracious reader pre-pandemic. It's one of the things I lost. Talk to friends. Go to 12-step meetings once or
    twice a week. And other than that, I live a very quiet life. Live then and still do.
- speaker: Interviewer
  text: Would you tell me a little bit about your experiences with health and healthcare infrastructure before the
- speaker: Respondent
  text: Let's see... pre-pandemic... The health care system in- in Canada is what people like to refer to as socialized, which
    means it's paid for through our taxes rather than directly. And this means that it's available to everyone, roughly equally.
    I mean, if you have enough money, you can sidestep that and go private clinics and stuff, but I have never had that kind
    of money, never will. And so I mean, I had a family doctor off and on. There's a family doctor shortage right now in my
    province, but I think across Canada, it's not very lucrative. And it's a very expensive education. I had a psychiatrist;
    that changed during the pandemic. I saw him roughly three times- three, four times a year just to evaluate if my meds
    were working. I missed that adjective. I'm mentally ill. [laughs] Um... nothing much else. I mean I don't actually- despite
    all of the sort of medical stuff that I deal with, most of it is largely under control, either with medication or therapy,
    and so I don't go to doctors very often. I have had two hip replacements, that's almost 15 years back. And in the later
    era of the pandemic, finally got my right knee replaced. Left knee is in waiting.
- speaker: Interviewer
  text: Do you remember when you first heard about the pandemic?
- speaker: Respondent
  text: I do. I think we started hearing about it at Health Canada in the winter, so it's 2019, 2020. Some of the people I
    work with are MDS. Some of them are reviewers at that time- at that time, were reviewers who were working and evaluating
    clinical trials and whether they were safe and reasonable to go forward. So there was some talk about it. We weren't calling
    it a pandemic yet. We were just calling it the virus. One of the doctors that I worked with was quite dismissive. He's
    not really anything. But my director, who is not a medical professional, was watching, I guess, the political stuff more
    carefully and seeing that something was up. So by, I would say late February, she was already talking about the possibility
    that we might get sent home and not be allowed to come back and forth to the office. She at that time, didn't think it
    would be very long. But she was definitely preparing to deal with that and help her employees get through it. So I don't
    watch a lot of news. It's one of the things I do to protect my mental health. So I wasn't getting it that way. I was getting
    it more through just sort of random chat at work.
- speaker: Interviewer
  text: Tell me a story about your life during the pandemic. What was your day to day looking like then?
- speaker: Respondent
  text: I think in the early days after we got sent home, I was in this euphoric state of getting to sleep longer and not
    have to commute. I was getting roughly three hours a day extra. It just- it felt amazing. I got interested in cooking,
    many of us did in the early days. Work was odd because I- how to put this? People in my area- so basically, administration
    had never been allowed to telework, and they would, No, you couldn't possibly do your job, unless you're here to run around
    and get things for people. So there was some adjustment there. But mostly, it was infrastructure that was the issue because
    the government was not prepared to have all of us working from home. So they did funny things like, you know, you can
    only log into the network or in through the VPN during certain hours of the day, and they prioritize what our levels of
    responsibility were and who could do what when. Because I worked for a director, I could go in pretty much all day. But
    that was not the situation with everyone. Um, other than the- the not commuting, and initially, my life didn't change
    a whole lot. I do- I don't drive. So I have a friend I've been grocery shopping with for years. She comes to pick me up
    and we go off to the stores, and she brings me home. So I don't have to do that on the bus. And so that didn't change
    much. We weren't wearing masks yet. My eldest progeny, at some point fairly early on, started to get very, very worried
    and sent me some homemade masks, which were absolutely frickin' gorgeous. So I was styling for a while in those. But otherwise,
    I was not paying a lot of attention to the pandemic other than what I was hearing from work. And what I was hearing from
    work was that it was far more serious than anyone had initially thought and that it would- it would be a little bit more
    than two weeks that we were working from home. [coughs] Sorry. So I started to get comfortable with that. And I am an
    introvert, so not going out into the world is not a hardship for me. I have friends who did not find it so. But I'm quite
    comfy in my little cooking.
- speaker: Interviewer
  text: You had mentioned a little earlier that your job role kind of switched a little bit with the pandemic, can you talk
    a little bit about what that was like?
- speaker: Respondent
  text: The way we did things changed. Because we- they couldn't send me like running into meetings to chase signatures, which
    is one of the funny little things that my job entailed. It- what it meant was I had to like text people... [laughs] to
    annoy them and say, "I've sent you a PDF to sign." Initially, we were all doing the same things, but we had to find different
    ways to do them. And then we had to find ways that were acceptable to the government, like what kind of a signature is
    acceptable if we're not talking about a wet signature that is then scanned and turned into a PDF? Why can't I just do
    it on a PDF? Anyway... [laughs] Government has lots of rules, and it's around accountability. So it makes sense. And it's
    my job to police some of those rules, so I shouldn't be flippant about it. But the job changed in that I was not in constant
    personal contact with the people I was working with. The team at that point was about 50 people. And early in the pandemic,
    I still had another admin working with me with that group. She left on sick leave, and she's not back yet. So I don't
    know if she's ever coming back. But I've been on my own since- since then. So one of the things that happened was my workload
    went up because I was now doing two jobs. I tended to work more overtime, which is easy to slide into if one is working
    from home. It's just like, I don't have to rush to commute home so I can just keep working on this thing. One of my jobs
    that changed pretty radically is I work with tracking ministerial correspondence that comes in. And that increased exponentially.
    And I remember that from H1N1. It just went insane. Like people are worried, people are angry, people are scared, people
    want to know, and there's so much that we can't tell them because it's not happened yet. So it's a lot of again, chasing
    very, very busy subject matter experts to say, "We have this question. Can you help me answer it?" And then running it
    up the chain of command for approvals, it coming back down. "No, no, no. You can't say that. It's not real." It's like,
    you know, it's too real, and that's why we can't say it. That's- that's a common complaint for any of us who... [audio
    muffles] it gets up to the political level, and they're like, "Woo, we can't promise anything." Okay. So things go back
    and forth, back and forth and back and forth. And when you're already talking about it in increased volume, it is mind
    boggling. I was talking to somebody at work today and said- referred to ministerial correspondence as the albatross around
    my neck because we cannot keep up. And at this point, I'm not sure if that's going to change. I bumped in- I was in the
    office yesterday and bumped into one of our subject matter experts. And she was saying that she finds it really disheartening
    because there is so much distrust of the government and of science at this point that she doesn't even know how to answer
    some of the- some of the things that come in because they're basically just spouting stuff they've heard on YouTube. And
    like, how do you discount that? How do you argue them out of that if they're not willing to look at... you know, science?
    [laughs] So- so, I mean, my- my work in some ways, went up with the pandemic, but my time seemed freer when I wasn't at
    work. Maybe that's the easiest way to put that.
- speaker: Interviewer
  text: Can you tell me about any new hobbies that you kind of picked up during the pandemic?
- speaker: Respondent
  text: Well, um, yeah, sort of- I mean, I mentioned cooking, I'm not a good cook. I'm like, I've never been a cook. I don't
    really care that much about food. I like food raw, if at all possible, because it's just easy. So I explored that for
    a bit. But the other thing that happened during the pandemic was that I was scooting back and forth between Ottawa and
    Calgary, which is one of our western provinces, and because my eldest and their partner had gone to Calgary to live with
    my sister by choice. And the conversation had basically been, "Aruna has got more space, we're going to her place." [laughs]
    So they went there and then Kit wanted me there because they were worried like, I'm old. Kit doesn't see me as particularly
    healthy. And I- and I keep on saying, you know, the health problems I have are not the kind of health problems that are
    likely to kill me in a hurry. But- but I adore my- my sister around, so she was quite willing to put me up, too, so I
    went there, and then I had to come back. There was some discussion with my boss at the time about whether I could work
    remote from Alberta or not, and it's just like, same internet. [laughs] Different time zone. But it's only two hours.
    So I mean, I worked what are my regular hours, which are 7:30 to 3:30, but in Ottawa, while I was in Calgary, it looked
    like I was working 9:30 to 5:30. Not a huge difference still within core. But my sister, Aruna, is a professor and has
    her own house. There are like- there are a lot of things that are different. I rent, she owns. She decorates, I didn't.
    She has an absolutely freaking gorgeous house. And it seemed when I would come home, I would like, "Might be nice to have
    a rug on my floor." [laughs] So- so I started doing weird things like that. Just buying stuff, decorating. And I had so
    much more money because I wasn't frittering it away at coffee shops and restaurants and movie theaters. The other thing
    I did with my money was I just gave a lot more of it away during the pandemic because I knew that other people were not
    in the privileged position I was. Like, my job was not threatened. I was able to work from home. I didn't have to deal
    with constantly commuting and worrying about getting sick. Yeah, so cooking and actually feathering my nest when I was
    home, were things that I did. Another change was though, that I stopped being able to read. I've been a reader my whole
    life, voracious. And I just couldn't concentrate. It was- it was like my brain was done, it was full. And I would start
    something and think, "Oh, this is great." And then I'd get three or four pages in, and my brain would wander off somewhere.
    And I still haven't gone back to reading. I did do most of my reading, actually, pre-pandemic on t
