collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about what you do professionally.
- speaker: Respondent
  text: Sure. I have been the administrator, CEO of Marias Healthcare for just over 18 years. We started off as a private
    practice and evolved into a community health center in that timeframe, in addition to adding all the different service
    lines to deliver a full access to care, patient centered, comprehensive type model. As for myself personally, I'm a farm
    and ranch girl. I love to drive tractors, ride horses, and I disappear to the countryside as well as the Rocky Mountain
    front.
- speaker: Interviewer
  text: What was a typical day of work like for you before the COVID-19 pandemic?
- speaker: Respondent
  text: Managing schedules, adjusting staffing, encouraging patients to deal with treatment opportunities. And, you know,
    just preventive medicine, regular acute care, keeping our sites open—pretty kind of normal, you know? It was a different
    type of medicine than it is today.
- speaker: Interviewer
  text: Diving more into your role, in what ways did your roles of CEO change during the pandemic?
- speaker: Respondent
  text: So, I'm a hands-on. I'm a very operational administrator, and so I'll answer the phone and reception. I will room
    a patient. I love being with the providers, nurses, staff, patients. It gives me a real sense of what the center needs
    also, where the struggles or the bottlenecks of the organization are. When COVID hit and all the federal state regulations,
    I was inundated in Zoom meetings and that role changed because I was needing to get information as fast as I could and
    then disseminate it out through the whole system to make sure everybody could follow the constantly changing rules and
    regs and policies and procedures and how are we protecting this or protecting that? So, I became a lot more hands off
    to say in the sense of operations. The other thing is, and then you had to engage in a regional incident command. And
    so, working with all the different leaders in the area, Indian Health, county hospitals, regional hospitals, county officials,
    public health sector, everybody has different roles and different functions. And so, all of us coming together and finding
    a way to go through it together and then sharing of our resources. And so, I have extra gowns or I have extra masks, but
    I don't have this. And working to figure out the logistics, to move stuff through the region and tap on our local assets,
    I guess to say our resources.
- speaker: Interviewer
  text: How was—what did it feel like to step away from being more hands on for you personally?
- speaker: Respondent
  text: For me, it's very hard not to be in the mix of things you hear, you see, you feel all day long when you are delivering
    care, whether it's a doctor, a nurse, a receptionist or an administrator. You watch your patients go through and you get
    a better understanding so that when I make policy or change workflows, I get it on how I'm impacting each of the pieces
    when I set the rule. You know, it's not fun to get to set the rule, but you're trying to make the best decision to go
    forward and or compromise the least amount of people.
- speaker: Interviewer
  text: Diving a little bit more into like relationships and how those changed. Did your relationship with your coworkers
    or other providers in the clinic or the hospital change at all as a result of COVID?
- speaker: Respondent
  text: 'A little bit. In our area, we took the position as a health center board physicians that this is what we signed up
    to do. Our staff embraced it, you know, they wanted to be here for their community. They didn''t run and hide in fear
    of COVID. It was a very exciting and empowering feeling to get from your staff. So, we had our doors wide open. We''ll
    figure out how to get to you. You come to us, we''ll take care of you. We want to make sure you''re safe, you understand
    what''s going on, and you can manage at home on your own. But don''t just stay home and struggle. Let us make sure it''s
    okay for you to stay home: medication refill, telehealth, you know, we adjusted all. Let''s us come to you. We did home
    visits, things like that. The pieces we faced with the hospital, they went very closed-door concept. They basically almost
    went shut down, you know, because they were so fear of COVID getting in and then their very sick patients trying to keep
    them from getting the other population or the workforce sick. So, the two health systems took a very different approach
    to dealing with COVID, and the hospital wanted to speak on our behalf quite often and teaching them that if we don''t
    manage the population, the natural flow of the car wrecks and the heart attacks and keep that stuff under control as a
    primary care sector, we are going to compound and create crises for our hospital. If we were to—I mean, I remember the
    day when hospital management came down and they said, why aren''t you closed your doors? I said, that''s the worst thing
    I can do for my community. And we did have heart attacks and babies and everything, but life was still happening. And
    I really feel like we saved pressure off the hospital by being open. And then the regional hospitals, they were inundated
    with all the small hospitals needing to send. And so, it got to a point where we negotiated with the regional hospital.
    You give us your less sick to keep in Shelby and we''ll send you our really sick. So, then we were sharing patients that
    direction, trying to keep workforce and beds open for the region.'
- speaker: Interviewer
  text: I think it would be helpful to maybe step back a little bit and describe how Shelby played a part in the COVID pandemic.
    At least in Montana, it sounded like, from what I understand, this was like where it kind of all started.
- speaker: Respondent
  text: The hotspot, yes.
- speaker: Interviewer
  text: Yeah. And maybe taking us through what that looked like here and then having some questions about how the clinic and
    the hospital— it sounds like those two things are very different.
- speaker: Respondent
  text: Yes, different.
- speaker: Interviewer
  text: I would like to understand how those things operate differently.
- speaker: Respondent
  text: So, the clinic is a nonprofit completely separate from the hospital. We rent our space from the hospital. Currently,
    it's important for us to facilitate our patients as one for care coordination and risk management and all those things.
    Our patients love that their doctor is in clinic, goes to the hospital with them, rounds on them, discharges them and
    sees them back in clinic. So, we love that model. But my biggest fear during COVID was losing physicians. We have such
    limited resource of doctors in these rural frontier areas that one goes down. How do I cover an E.R.? How do I cover in-patient
    with a group of three? And every hospital had that demand, right? Workforce was one of our biggest areas of need. Nurses,
    quarantines, isolations, exposures were impacting us constantly. And so, Shelby—Dr. G. and I started monitoring COVID
    from the day Seattle and Oregon and Washington started saying, Whoa, we see it and monitoring it as it was coming across
    the nation. We were connected with Seattle, UW, as well as a couple of hospitals. My daughter works in Seattle and Dr.
    G's brother and sister, brother-in-law and sister work in Seattle also. So, we were fortunate enough to receive information
    on what those hospitals were doing to kind of cue us in. And we had set rules. Okay, when it hits Montana, we're going
    to do this. And you can see our incident command chart there and what we were deploying and how fast we were deploying
    things and protocols and changes. Okay, when it hits Billings, what are we going to do? Okay, when it gets up towards
    Great Falls? Well, it kind of leapfrogged on us and went from Billings to Shelby, and so it got ahead of our protocol.
    But we already knew what we were going to do once it hit the town of Shelby or our community or our patients that we were
    serving. It creeped into our Heritage Center, kind of it's big exposure in Montana and the hardest part was we didn't
    have enough PPE. And to this day, one of my campaigns is expiration dates on gowns and masks and gauze is what compromised
    our situation. None of us can keep enough on the shelf to deal with a pandemic because we get cited by our accrediting
    bodies if we have our dates on the shelves. But if we could have had out dates available, which eventually, of course,
    regulation allowed us to use them, we probably all would have had a better stock or better supply. We went to our community
    and community members sewed masks. They sewed gowns for us. And I drove to Augusta, Montana, little tiny town, and picked
    up boxes of gowns. And some were shipped to New York. They were sewing for New York also. And then we shared with the
    hospital, the Heritage Center and our clinic, our nurses, actually, they were vinyl us so we could wash and reuse. The
    Heritage Center is a retirement assisted living facility that our grandmas, our friends, I mean, they come to the clinic
    and get care all the time. So, the staff are very connected to them. They have a workforce of an on site administrator,
    a day nurse, an aide, and dietary. You know, apartments of 32 apartments. Some are single occupancy somewhere, husbands
    and wives. So, it was a pretty big population for that group of 3 to 4 to take on. And what got us was one that doesn't
    doctor with us had doctored outside the system and fallen and came to the E.R. The protocols weren't in place and they
    admitted and hadn't tested for COVID. She was positive COVID. So, we had a hospital exposure right out of the gate along
    with a physician exposures, and we hadn't set up the negative pressure areas. We had one negative pressure room, but it
    wiped out the hospital workforce for the quarantine window. But then we also had a huge exposure at the Heritage Center
    because they do family style dining, you know, they intermix on social activities together. So, then locked things up
    pretty tight. And then you're wondering how much community exposure she had gone to church. We were very fortunate. For
    the most part it was contained there. But then testing and National Guard came in to help man, you know, just everything
    from doing dishes to cooking meals to keep that resident population going. And then the depression, you watch those elderly
    patients go through in their families. It was just heart wrenching. You know, it was like one of the hardest first conversations
    is to sit down with every family and talk about the DNRs and make sure we knew exactly what to do for every resident over
    there. And I have a family member over there, you know, and at that point in time, it wasn't the lack of seeing them.
    It was preparing for what are we going to do if they get COVID as a family, as physicians? Then the next hard decision
    was if we if the outbreak isn't contained after we isolated them all to their rooms and we're going to let them live there
    and contain it there and not bring them here for care to try and keep. And that's a hard thing because, of course, our
    loved ones, the first thing they want is run them to the hospital when they're dying, right? When we're in crisis, you
    run to the hospital. In this case, there wasn't anything I can do. So, the concept of allowing them to die at their home
    and maybe in mass fatality was a lot for the staff to comprehend, as well as the families. And, you know, when I set up
    mobile coroner morgue services, it was just—I hope I don't have to use it, but I have it. I mean, if I have 32 bodies,
    our funeral home can only handle 4 to 6, you know, where are they—where are we going to put the bodies? And so, things
    that you never thought you'd ever have to think about became very real, very fast. Kind of had a lull shortly behind that.
    And then a couple of really cool things. The community—our behavioral health department came out and you see the little
    yellow signs hanging in windows in different places. So, they took a theory from Maine, Montana or Maine, sorry, and brought
    it to Montana, where on a day in the spring like, oh gosh, I can't remember. Anyway, they ran around and they paint the
    town with small town, big hearts and just yellow, and nobody knew who did it. They did it in the curtain of the night.
    And when everybody opened up on Main Street Monday morning and saw all these yellow signs with hearts on it, and these
    words about "small town, big hearts", it really gave joy to the community and brought them together. And the behavioral
    health staff thought it was great. You know, they giggled because nobody knew it was them. And it took multiple, multiple
    weeks before it ever came out. But lot of good positive chatter on Main Street. Then Toole County Strong Campaign came
    behind it to band the community together to battle through together. We didn't get a lot of the anti-campaign of whatever
    you know anti this is a hoax or I don't wear a mask or all those kinds of things till way later on, months and months
    later, that initial fear of our loved ones passing—the community really came together. The clinic made the decisions immediately.
    I had already had the game plan in place where we moved—it was fascinating because I don't know if I'd do it again, but
    at the time, I moved all my obstetrics high risk staff and well care to our dental office and just turned them into a
    medical clinic because they went to emergency care only and use their exam rooms over there. We have oxygen, we have suction.
    We had water. The only thing we didn't have is hard doors, you know. So, they had curtains. The community loved it. I
    mean, it was safe. That was the safe place. It was no less safe than here, there. But in perception, patients felt safe
    there. And we took our fetal monitoring system over there.
