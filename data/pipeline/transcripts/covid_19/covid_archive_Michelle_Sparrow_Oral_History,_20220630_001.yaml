turns:
- speaker: Respondent
  text: I am a person on disability living in Ottawa, I am identifying as an artist. I, my disability is is is not physical.
    I am I have issues which of course, everyone had issues going into the pandemic, but everyone's issues got put into high
    gear. So that's, that's been fun. No, that's really not been fun. I apologize. And that was sarcasm. I, I live with my
    partner of 14 years, I met him. And two days later, we moved in together. We've been inseparable ever since. And we live
    with our three cats. I think that's it.
- speaker: Interviewer
  text: Tell me a story about your life during the pandemic.
- speaker: Respondent
  text: Well, the pandemic hit, right as my partner was going through a mental breakdown. In 2011, his father passed away
    tragically, and due to illness, but because of the way he'd passed away, my partner actually had to clean up his brain
    matter. And anyways, he had never dealt with it with a psychiatrist. So right before the pandemic, we had lost our house.
    And he had been unable to continue working. And money was very low. Unfortunately, fortunately, unfortunately, we had
    found a place to squat. And that's when friends found us and you think that that's a good thing. But oh, my goodness,
    when pandemic's going down, and everyone's life is in crisis, the people aren't, they don't have their heads on straight.
    And all these people found us who we couldn't get rid of. So first, our old roommate moved back in with us. And he used
    to be okay, but he also used to have medication for schizophrenia. So he was quite a chaotic element. And his mental health
    was going down. And he wanted, he wanted weed all the time, from this dude, who I knew ever since he was four. But he
    had always been my sister stalker, though she'd never explained that to me. And so he turned his attention to me. And
    during the pandemic, he insisted that he needed a place to move in, because of his father being 70 and high risk. And
    I said, Well, I feel for you, but I'm at high risk, too. I have lots of breathing problems. Any given winter cold could
    kill me, COVID definitely will, and I told him, No. And a week later, he moved in anyways, I didn't realize that he was
    already a sex offender. And suddenly, there was no escape. And he is also a drug dealer. And that's where all of our money
    kept getting funneled to without me wanting. It got really dark as things closed down, like there wasn't much food in
    the grocery stores that we could go do. And we kept trying to get to the food bank, but it's so far in Orleans. And the
    predator who had moved into our house, stalking our every movement and he thought it was shameful to go to the food bank
    so he wouldn't let us. We ended up eating out of the Giant Tiger dumpster for a while. It was a month at least things
    were just it was, pandemic made everyone go really, really crazy. And it was terrifying. Yeah. I'm losing my train of
    thought maybe you have a question. I'm sorry.
- speaker: Interviewer
  text: You have nothing to apologize for. Do you remember when you first heard about the pandemic?
- speaker: Respondent
  text: Yeah, it was our other crazy friend who we first thought was like, he's really unhinged. And surprisingly enough whole
    pandemic long. He was the only one who kept his job. Amazingly, but our friend Johnny comes in the door. The world's going
    to hell in a handbasket. We're just like, okay, Johnny, I yeah, whatever. And then, no, he was, he was totally right.
    And I didn't have a phone until 2020. I had just avoided technology. We didn't have the internet until that roommate moved
    back in with us and insisted on internet. So I didn't have this view to the outside world understanding of what was going
    on so much. So if it weren't for these fly by people coming in and giving us the rundown, it would have been just what
    we saw out the window, which was pretty much Orleans ground to almost zombie like halt. You know, like the streets were
    empty. And then it was just joggers, because that was the only thing anyone could do. Lots and lots of joggers. But yeah,
    it was. I didn't have like, I said a phone till late in 2020. When actually it was because I was living with so many scary
    people that my sister set me up with her old phone and my friend set me up with some service. And finally, I was able
    to get like little reports on COVID and stuff. But no, it was, I guess, January 2020, when we first started hearing about
    it. And yeah, it's all third hand information, second hand information at first.
- speaker: Interviewer
  text: To the extent that you're comfortable sharing, would you say something about your relationship with health and healthcare
    infrastructure prior to the pandemic.
- speaker: Respondent
  text: Before the pandemic, I had been seeing a psychiatrist regularly. It's really hard to find a psychiatrist you like,
    and I was so lucky to have been looking at dealing with psychiatrists ever since I was 11. So to find one that I stuck
    with, since I was 22, I think for like, we had been together for over a decade. And although every once in a while I'd
    be too agoraphobic to leave the house and I wouldn't see her for a couple of months, over 10 years or more, you know,
    of course, good relationship, and then suddenly COVID. And I couldn't get hold of her. I couldn't see her when I finally
    did get a hold of her. At first I was told that she had just dropped out of the business like Sorry, you don't have psychiatrists
    anymore. We don't know where she went, Oh, but Yoshi, my partner he tracked her down and then he found her she had changed
    hospitals. But although I've been in contact with her again, since COVID hit the ability to get psychiatric care or any
    sort of counseling, especially for the crazy crap I was going through in my personal life, but with the people in my home.
    I still haven't been able to process any of that. And I'm really hoping that mental health gets more accessible soon.
    It seems that it's all gone online, which I'm only semi comfortable with since I'm new to phones and technology. That's
    what I have to say about that.
- speaker: Interviewer
  text: What kind of art do you do?
- speaker: Respondent
  text: I had done a lot of pencil art portraiture ink. My father was a cartoonist. So I was trained in that thing. But since
    my vision has been failing and my arthritis has been worsening, and also with the pandemic, we had to move and anyway
    my art style has had to evolve and change from strictly pen and paper to more fashion and collage, and elements that aren't
    so very precise, I don't know if you're familiar with Frida Kahlo's work. But as her health declined as she was actually
    reaching my age, you'll see her later paintings are so much more it's like the style is less perfected than at the beginning,
    because of how well how our bodies deteriorate. And I feel that my own style has become shaky in this way. But art is
    something that you are, not something that you do. And I'm discovering that I thought I'd lost my art. And I realized
    all these things I was doing were still art. And it's more so finding the art in the everyday.
- speaker: Interviewer
  text: I'd love to hear more about your journey with housing. And like how that compares to a pre pandemic world for you.
- speaker: Respondent
  text: Well, rent in Ottawa had been going up for a long time. But during the pandemic, there was a major rent crisis where,
    whereas bachelor's used to be anywhere between, let's say, 500 650, suddenly, we had to find a new place our house, our
    squat, really let's say, well, just full of black mold. And there was septic water. And I kept getting like horrible infections,
    internal bleeding. So we desperately need to find new house. And oh, my goodness, rent prices live are like 1250 for bachelor
    plus utilities, it was on my 1169 from the government, just not feasible. And with my partner being unable to work, we
    were both living off my one disability check. So I was amazingly grateful when, in the end, after two months of being
    homeless, not on the streets homeless, but we had to split up our cats we were crashing at in laws. Anyways, we finally
    found a two bedroom in Little Italy, which is, you know, close to the heartbeat of the city. We found two bedroom for
    1100. All inclusive. And I'm like, Oh my God, that's great place to start in public and private. Fabulous. Good. So, yeah,
    we got it. And we visit the food bank, which is nowhere near as nice as the food bank in Orleans. But you know, literally,
    beggars can't be choosers. And we've been there like a year and a half now and life is wonderfully simple and a lot less
    complicated. Or still, you know, it's pandemic still as things little bear and all the shelves and stuff. But oh, so much
    better than the squat we were in.
- speaker: Interviewer
  text: When you were, when you're experiencing the infections and bleeding from the black mold, were you able to receive
    health care outside of the house? How did you how did you cope with that?
- speaker: Respondent
  text: I had to make a few trips to the hospital. It was recurring. And the hospital trips were very difficult to get to
    and really weird because the pandemic your all alone and very rushed attitude. I got better treatment than Yoshi did.
    We miss the entire summer of 2020 because he broke out in hives for three or four months. And when they broke out in the
    morning, I [inaudible] it like if it weren't for the fact that he fell asleep in that spot and woke up with all the same
    tattoos. I didn't recognize him man his ear was like it looked like cauliflower from boxing and his face was just a mess
    his whole body. We tried going to the hospital or we tried sending him to the hospital because I can't go in with them.
    And they wouldn't even give him an allergy pill. They just dismissed him as though you were a junkie or something. And
    he had to go back and they still dismissed him in the end he never really got help for it. Some friends purchased him
    some allergy medication and it did pretty much nothing he. Yeah, it was like, it was biblical. It was so like, the book
    of Job, you know, like, All he needed was broken pottery to scrape at his boils, you know, like it was bad. No, it was
    really hard to get any sort of medical attention for like, for anything. No infrastructure was so damaged. It just really
    wasn't set up for it.
- speaker: Interviewer
  text: Do you know if he faced much discrimination in health care before that?
- speaker: Respondent
  text: Um, yeah. Yeah. Back in. 17, or 16? I'm not sure. I think it's 2016. I got shingles. I didn't know I had shingles.
    I was visiting my child and my brother Sebastian, when I got a pinpoint headache. I actually have scarring from this.
    It erased my freckle on the end of my nose. I'm so sad. But I hate this horrible pain. And when, like, the headache didn't
    go away. It was growing and my skin was bubbling off my face. I went to the hospital. And I was there all day, waiting.
    Unfortunately, I think unfortunately, because I'm I, when I'm nervous. I'm quiet as a school mouse. But you know, he came
    to meet me after his shift at work. But he had been drinking. And so even though we'd only been there for like half hour
    to an hour of my wait. When the doctor finally got to me, they gave me a sobriety test and sent me home. And I said my
    face doesn't normally look like this. My face is all swollen. They're like looks fine now.
