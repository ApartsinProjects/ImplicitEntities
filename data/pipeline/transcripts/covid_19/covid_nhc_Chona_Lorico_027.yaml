collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you tell me a little bit about yourself and what you do professionally?
- speaker: Respondent
  text: Okay. So, about myself - my name is Chona, I'm a dietician, and I do mostly clinical and also public health through
    WIC clinic. And I have been a dietitian for maybe 30 - 29, 28 years. And I have two children and I'm now a grandmother
    - just recently during COVID and 2020.
- speaker: Interviewer
  text: Congratulations. Can you tell me what was a typical day at work like for you before COVID-19, and how has that changed?
- speaker: Respondent
  text: A typical day before COVID-19 is - my schedule is full. I come in early, prep everything, read my - you know, do the
    pre-charting for my patients. And there are days where I do have - not just patients at the clinical setting, but also
    I do see high risk clients at the WIC setting. So, all day long, from 9:00 until probably the end of 4:30, I will be mostly
    seeing patients or clients one after the other between every 30 to 45 minutes. I would have a little bit of a 30 minutes
    prior to that to just - like I said, pre-chart or look at - preview my clients in the WIC. And then, I have another about
    30 minutes to an hour later to finish charting. So, not much of any socialization with staff, mostly really patient services.
    And then, COVID happened - pretty much almost the same, except that I'm not seeing clients or patients in person. The
    difference is that I would have probably - I had more appointments, because they were expecting me to do more, because
    it's all telephone calls. And - but the routine is the same, except that I just don't see any patients at all. What's
    challenging about it is, because I - you don't see the patients, it's harder to really know the response to your conversation
    and to the visit. And there's more use of different language services, because there were less staff available in the
    clinic. So, a lot more language services usage.
- speaker: Interviewer
  text: So, can you tell me maybe a little bit more about the unique challenges that you faced with having to use the language
    services and having to talk over the phone versus being in person and how that maybe impacted the services you were able
    to provide?
- speaker: Respondent
  text: Okay. So, the challenges that I had faced during COVID time - because I'm doing more telephone services. Number one
    is that it's harder for certain counseling appointments to be done by phone. For example, I do breastfeeding consults,
    so, it's harder because I don't have virtual pharma, just because I don't have the capability or, you know, the privilege
    of doing the virtual, I'm doing mostly telephone. So, it's harder to really explain things that would have been easier
    if there was a visual or you were there, you know, trying to show or demonstrate to patients about breastfeeding. So,
    that was one of the biggest issues is it's harder for me to do that - to solve some challenges or issues that patients
    have. Secondly, it's harder with the population that I am serving. I serve a lot of non-English speaking patients and
    clients. And so, when they were in my office, I have visuals of the food, the models, the handouts that I can give them.
    Whereas when I was doing telephone, it's really hard, because we're trying to - I'm trying to depend on the interpreter
    to really vividly explain what I'm trying to convey to the patients, because I don't have any more visual tools to give.
    So, and then the use of language services is also a challenge, because - it's always a challenge even with face to face,
    because you don't - you really want to make sure that you are conveying the right message, the right instructions. And
    it's harder when everyone has to be doing that through telephones. So, when they were in here face-to-face, I can also
    see the expression of the patients and the expression of the interpreter to see whether, Okay, are they understanding
    each other? Whereas with telephone, you don't see both of them. So, that's harder. And because there's so much need and
    demand for interpreters, I have to wait longer to get an interpreter. And so, that pushes everything back with my schedule.
    It becomes more challenging, because I have to adjust my time for each of the patients to allow me to be able to complete
    all the patients scheduled for that day, which is another big, big challenge for me. And I'm trying to think of other
    challenges. Oh - the handouts too, because it's - some patients really do want certain handouts, so that would take more
    time for me to process, make the proper handout that they need, take time for me to go - with less staff in the office
    because of, you know, layoffs and furloughs. So, I would have to create my own - you know, copy my own things, and put
    it ready for the mailing. It takes a lot of time out of my time that's already pretty hectic. The schedule is already
    pretty hectic. And probably those are the most challenging parts that I have experienced during COVID time with telephone
    appointments.
- speaker: Interviewer
  text: And did you see - well, it just sounds like there were a lot more hoops to get over during this time. Did you see
    any effect with your patients as far as them being able to communicate with you and meet different requirements during
    this time? Did you see any change in interaction with patients because of the changes with COVID?
- speaker: Respondent
  text: So, now I have to separate the clinical patients and the public health patients. With the WIC patients, it's harder,
    because in WIC there's so many - there is what you call certification periods. There are some required visits. And so,
    a lot of those visits had been waived, where we don't need to see the patients, but a lot of the patients like it. I mean,
    you know, they don't have to go to the office. I think most of them really liked the time that we were doing telephone.
    But it's harder for us, especially with me - I'm so concerned about following up, Where are they now? So, because I'm
    doing a lot of high risk patients, patients that are having problems with their weight, with their weight gain or patients
    that are overweight or their children - especially the children. Or the infants if they're breastfeeding, if they're really
    gaining enough weight. And a lot of moms don't have a new weighing scale. So, it's really hard - my challenge there is
    the result. I mean, is there really quality - are we really doing a quality service to where there is a better outcome
    or - I'm afraid, when the time comes, how far away we are from really meeting the good outcomes that we would have made
    if we were doing face-to-face and really actually being able to weigh and measure the patients or even just visually assess
    them. So, those are the challenges with the WIC. And also with the WIC is - because the challenges is also that a lot
    of patients, they do not understand instructions over the phone. That you are now letting them know about the process
    of - how to go on using their benefits, because if they are new - and we have a lot of new patients during - or new clients
    during the COVID time, because more people are needing that extra support, food support. And so, to have to do all the
    instructions about how to use their checks, how to go to the store - I feel like a lot of them are getting lost. And even
    if they're on the WIC, some of them have not been able to effectively use their benefits, because they are kind of confused
    on a lot of things in the process and which is really hard to explain over the phone. Now, the clinical part of it is
    a little easier, because I could always schedule more follow ups. And so, I usually - what I do is if I feel - if I gauge
    like, I don't know if that patient really understood the whole instruction, the whole visit, then I would just schedule
    them for another follow up. And hopefully that would have a different kind of interpreter. So, I can see more like, Oh,
    maybe they don't really understand. Well there wasn't an effective interpreter during that visit. And the only I would
    say comfort or assurance that I have that things work is when I see their lab results after. Afterwards I feel like, Oh,
    okay, they did understand, because it did kind of show in their lab results or in their next physical visit with any of
    their providers. And also, if - what I've been doing is - at the end of my sessions, I always ask them to let me know
    what, you know, maybe a couple - three things or four things that they understood during the whole visit. But this takes
    longer visits. So, that's the thing - if it's a longer visits, that's the only way I could assure myself that there is
    - that the message went across or that the whole issue has been addressed for the patients. I hope I answered your question.
- speaker: Interviewer
  text: No, you did. That was a really great response. So, I'm wondering how - I guess, how was the working environment like
    as far as between you and coworkers? I know you mentioned there are layoffs and things like that, so I wonder if you could
    tell me a little bit more about the working environment?
- speaker: Respondent
  text: So, I can only speak for my department - for where I'm working. So, during the first few months, when the shutdown
    first happened, there was a furlough. So, a lot of us had been cut a day, a week. So, that was harder, because - not only
    for my staff, but even for me, because then there is more - you know, we had to really stretch my schedule to make sure
    that we meet the demands of the appointments. We did adjust as far as the WIC is concerned. We did adjust to where we
    had some staff that are not - they are very careful, because they have some medical issues. So, they were able to work
    at home. So, that helps with the WIC part of it, because the state was so supportive on all the WIC programs. So, they're
    able to do WIC at home. But our office had been a ghost town, so it was very few people. Instead of having three to four
    people on one day, there's only about two of us at one time - or maybe another time, three. And of course, because I became
    so busy with the schedule, I have less interaction with my own clerk, you know, my own staff, because they're busy, I'm
    busy. But the sweet thing about it is the community. The community was so supportive of us working. So, they have been
    really supplying us with our meals. And it was really, really nice. And then, you know - so, that's a good thing. They're
    acknowledging the fact that we're working. So, that was the first thing - the community really acknowledging us being
    essential workers. Of course, we can also talk and interact with a lot of our staff, because we're putting distances even
    among ourselves. We're still masking and distancing, and everybody was careful, especially the first few months, even
    if we know each other. We were so careful of getting close to each other. So, that was the environment. It's quiet, but
    busy. People are more caring of each other, you know, even if we don't talk a lot. When we are able to talk during lunches
    with distancing, we're able to really share each other's feelings towards the whole pandemic. And the fact that we're
    all - you know, the financial part that's been affected by the furlough and things like that. So, we became even more
    open to each other's feelings.
- speaker: Interviewer
  text: So, I know there's definitely been a lot of things happening in the world, especially during that time. So, I wonder,
    just with everything that's going on with your work and just with life in general, how you have felt throughout the pandemic
    personally?
- speaker: Respondent
  text: Okay. So, before that pandemic, I was - the pandemic really made a big impact in my life - not just work, but personal
    life. Because in the beginning, I became a grandma, but I only saw my granddaughter for maybe up to the middle of February.
    And after that, that was it. I couldn't visit her. And towards the end of the year, I may have been able to visit their
    place. But we cannot - we had to distance, so that we're outside the house or inside out. We do a lot of Zooming and FaceTiming.
    That's what we do. So, I learned to appreciate this gadget, because it's really helpful. So, that's good. During the pandemic,
    I think - it affects not just my being a grandmother, being a mother, too, because I don't see my two children very often.
    So, we do a lot of calls and I'm a person that I always see my daughter almost every day. But then, it became every two
    weeks and just for a grocery shopping and a little bit walking. So, that's it. And then, it really affected a lot of my
    health, because I became less active. More sitting, because I'm just doing telemarketing. So, yeah. So, there's a lot
    of - you know, I've developed a lot of aches in the body, because, you know, you stop going to the gym. Gyms were closed
    and schedules were so long, so not even being able to walk. So, less active. And then, with other people, of course it
    was really hard because I couldn't see also my other family - not just my immediate family, but the rest of the family.
    And you're always, constantly worrying, because I have a lot of brothers and sisters that have medical issues. So, the
    good thing about it is we get closer. I mean, we're very close, but even more closer, because everybody's talking to everybody
    almost every day, because a lot of them have, you know, different medical issues and just making sure - . But then, there's
    also a lot of death in my family during the COVID time. So, that was the hardest part - dealing with the emotional parts
    of losing some family. Maybe not even immediate family to COVID and then some - just losing them on cancer during the
    COVID time. So, in spite of the fact that it was COVID, I probably traveled to California two or three times for a funeral
    during the whole COVID time. So, it was also emotional. There's a lot of emotional things to it. But on the spiritual
    aspect, it was harder also because you don't - everything
