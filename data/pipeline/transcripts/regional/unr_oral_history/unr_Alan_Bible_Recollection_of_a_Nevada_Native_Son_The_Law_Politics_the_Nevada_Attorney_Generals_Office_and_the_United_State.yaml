collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: I hold are with very distinguished Nevadans, and we hold 'em - twenty-five or -four of us hold these claims. One of
    'em is Furio Dondero, who is a very, very colorful Nevada-born individual, getting elderly now, still alive now, but we've
    always been associated in mining together. He has a quarter of interest in these five mining claims located over in the
    Ruby Hills of Eureka County. The other partners are retired General Dale Smith, whose father was "Long Tom" Smith, a very
    wonderful individual with whom I was associated when he was state engineer of the state; and the fourth partner is Hugh
    Shamberger, who also was the state engineer of the state for many years.
- speaker: Respondent
  text: The claims we've held, as the four individuals, have always been very helpful to us because they're patented claims,
    and we pay a small amount of taxes on them each year as you do on patented claims in Nevada. And it makes a legitimate
    income tax deduction; so that's been the benefit of our mining claims in Nevada. We've never made any money on them; we
    sold part of the claims. They were first the thirteen - we had thirteen claims, and we called 'em the "Lucky Thirteen."
    And we sold eight of them to a large mining company, which went in and explored and attempted to develop them (I think
    it was some Canadian company, but ultimately private) in Eureka and the Ruby Hill mining district. And of course the great
    problem there was the water and the high cost of pumping the water, and they were never able to do it, so the mining company
    just had to abandon their project.
- speaker: Respondent
  text: It's rich, I think - so I'm told - in lead zinc particularly and carrying some silver, but the economics have never
    been worked out; it might some time in the future. We certainly hope so because Eureka has had the fine mining past and
    probably will have another one some time in the future.
- speaker: Respondent
  text: So, following my father's inclination toward mining and taking a risk, I've always held some mining claims. I've held
    'em all my life, and I still have five now. I keep telling anybody who keeps talking about mines if they'd like to buy
    a one-fourth interest in a mining claim, I can arrange it very reasonably.
- speaker: Respondent
  text: I don't seem to have either the wealth or the wisdom to continue to hold 'em too much longer. I think I'll just give
    them to my sons, and they can handle them and say they own mining claims. But the beautiful part about it is they're patented,
    and everyone knows there's nothing you can do with a patented mining claim. It's the best title you can get.
- speaker: Respondent
  text: And many of them go to sale every year at tax sales by various counties, and there's no way that one can acquire or
    buy a patented mining claim without condemning it or acquiring it through some type of a court order. So they're - the
    titles are good, so I had an interest in the mining claims on which I can guarantee the title without fear. And this is
    always valuable in a state where titles do get mixed up in the mining history of our state, and a book could be written
    about it, and a story could be told about it.
- speaker: Respondent
  text: So, my father - I want to just pursue my father's history just a little bit further - he was a merchant and had a
    grocery store in Lovelock, located, as I've indicated earlier, in what is now the Turrillas building in Lovelock. And
    he ran that for quite a number of years. In the meantime, he thought that he could diversify and have a ranch as well,
    so he bought a ranch in the upper Lovelock Valley, and he later gave up his grocery store and went to farming again. I
    guess basically that was his niche in life was to be a farmer or a miner, and - but he had to have a grocery store to
    probably finance both enterprises.
- speaker: Respondent
  text: But he had this ranch in the upper valley in the Lairview district. Some of our neighbors at that time were the Biddleman's,
    as I remember, and the Sebbases, and there're still Sebbases in that area. And I don't know whether there's still Biddlemans
    or not. There were Loorzes, who lived right next to the Fairview school.
- speaker: Respondent
  text: I started out in the lower grades in the Lovelock school, and after my dad's purchase of the ranch in the upper Fairview
    district, I went to the Fairview district probably for the third or fourth or fifth grades. I know I rode a horse about
    a mile to get to the school from where our ranch was. It was, as I remember it, a two-room, eight-grade school with the
    first four grades in one room and the next four grades in another room. I think we had two teachers at that time. And
    so I went to that school until we moved to Fallon, Nevada in about nineteen hundred and eighteen, as I remember.
- speaker: Respondent
  text: The events that caused our moving to Fallon are rather dramatic. We had gone to the motion picture show in Lovelock
    on this particular evening. I can't even remember the time of year, but it was a good movie, and we enjoyed - . My brother
    was with us at that time. So there were the four of us returning in - and my father had an automobile, and we were returning
    in an automobile, and we noticed the northern skies were beautifully lit up. It was a great display, and this was the
    time of the year when the aurora borealis could be seen as far south as Nevada; and we thought it was the aurora borealis.
    The closer we came to our home, which was about six miles out in the Fairview district - I think it would be about six
    miles from the center of Lovelock and from where the show house was - it dawned on us that the aurora borealis was our
    home! So it was a great spectacle to watch. Obviously there was no fire company up in that neck of the woods, and the
    closer we got, the more distressed we all became.
- speaker: Respondent
  text: And I was just a young lad. I guess I was - let's see, T8 - I was about nine years old, and I can still remember very
    vividly. And my mother, of course, was very distracted; my father was getting more so as we got closer to the fire, but
    when we got there, there was nothing there. It had been burned to the ground, and we had the neighbors around us. They
    had tried to carry some buckets of water from irrigation ditches to halt the spread of the fire, which is all they could
    do, but it burned to the ground.
- speaker: Respondent
  text: And I can remember one thing very clearly now and have retained a vivid impression of it all my life - I was eight
    or nine years old, something like that, at that time. And I guess one does remember those things much better than we remember
    things that happened eight or nine days ago. So after the fire completely was extinguished and put out, I can recall how
    fine the neighbors were. They brought us dishes and set us up in a new housekeeping setup, and it was the spirit of the
    times. And there wasn't anybody that didn't give us something to try to set us up. We had the clothes on our back, and
    that was it.
- speaker: Respondent
  text: The particular distressing thing was that my mother, who was, as I've indicated earlier, was the historian in the
    family, lost all of her letters and valuables and the things of that kind. And she did lose some very fine diamonds that
    had been given to her by her father over the years, and we sifted the coals. We had the impression then - and I have it
    now, though I don't know whether I'm right or wrong in it - that diamonds wouldn't burn and they'd withstand any type
    of heat. But in any event we sifted coals for days - I can still remember that. My mother was heartbroken of course.
- speaker: Respondent
  text: And that was the main thing that led to our going to Fallon, Nevada. An offer came up from some early farmers in -
    first the Fernley district and in the Fallon district who ran what they call Peoples Brothers, which was a grocery store.
    And my father, having been a groceryman, seized the opportunity of buying a store there. That was the real reason for
    our moving to Fallon, Nevada, which we did in 1918 or 1919. I entered the fifth grade there and finished the grammar school
    in Fallon and on into the high school and from there up to the University of Nevada.
- speaker: Respondent
  text: On my mother's side of the family, her name was Welch, Isabel Welch. She was born in Unionville, Nevada. And she lived
    to be seventy-seven years old. Her father, as best I've been able to trace it, was born in Brechin, Scotland, and he was
    a - I was given to understand, at least I thought I was given to understand by my mother that he was a professor at the
    University of Edinburgh, Scotland. She was of Scotch-Irish ancestry.
- speaker: Respondent
  text: And my wife and I visited Edinburgh several years ago. I made it a point to try to trace that down, but didn't have
    much luck in ever finding a Welch - his name was Robert, Robert Welch - who was a professor at the University of Edinburgh.
    And so whether - where I got this impression is beyond me because it was my definite impression.
- speaker: Respondent
  text: My mother was born in Unionville, and later moved to Lovelock where her father, Robert, had a small ranch just outside
    of Lovelock. And she graduated from the school system of Lovelock. She came into the university of Nevada, and finished
    two years at the University of Nevada. She then became a schoolteacher and was a schoolteacher when my father married
    her in nineteen hundred and nine.
- speaker: Respondent
  text: And she was one of a family of about six or seven. She was the only girl, and as the only girl, she was the historian
    of the family. And with the fire - that's why I mention the fire - it wiped out that history. So, much of this is just
    really put together from my memory.
- speaker: Respondent
  text: She had a good accounting of it, but she's passed on; and by the time I got interested in this genealogy and history,
    she had left this world and was obviously no longer available to me to give me that information. My father preceded her
    in death - oh, some four or five years earlier. And so my two main sources were gone, and very few other people are available
    to me now to piece it together. So that is just kind of a thumbnail sketch of my mother and father, not adequate to do
    them justice, which they deserve.
- speaker: Respondent
  text: The name Bible is, number one, a rather intriguing name; and I've had many questions asked about my derivation, where
    the name comes from and my ancestry. The name Bible is basically a German name. It is derived, as I understand it, from
    German and originally was Biebel, which in German means book or the book. And it's easy to see how that later turned out
    to be called Bible.
- speaker: Respondent
  text: When my father's people came into this country, they were first Biebel, and then later on it became Bible, as it has
    remained over the years and as it is now. I've often said, and this is something within my own memory and my own knowledge,
    is that when I was in high school in Fallon, Nevada, I was known as "New Testament," and then later on when I came to
    the University of Nevada and was going here as a student, I was named "Old Testament." And I've often said in many of
    my political talks and visits with people throughout the state of Nevada, that since those days of being called Bible
    and "New Testament" and "Old Testament," I have been called practically everything else. [Laughs] It's always been good
    for a bit of a laugh in whatever type of an audience I'm talking in front of, and of course the name is frequently commented
    on.
- speaker: Respondent
  text: I've asked genealogists to study it, and they've done this both through the Library of Congress and through the archives
    and through the various more records that are available, attempting to piece it together and put my background in some
    type of logical perspective. My best letter that I think I have ever developed as a result of this study, is illustrated
    in a letter that I wrote to my aunt on May 25, 1966, which is fairly contemporary (still some eleven years ago). And this
    was written to Ethel Welch, who was married to my uncle Will Welch who would be my mother's brother. She was a lifetime
    resident of Winnemucca, Nevada; she in turn was born in Unionville the same as my own mother was.
- speaker: Respondent
  text: 'And this, as far as my genealogy is concerned, is what the letter said: Also, as I told you, I''ve almost completely
    explored my father''s history and genealogy. I next want to do the same thing with my mother''s. Mother, of course, lost
    all of the family history and heirlooms when her home burned in the upper Lovelock Valley, but she would from time to
    time tell me certain parts of the family history. I foolishly neglected to reduce it to writing, and my memory is very
    hazy on some phases of her family history. I knew, of course, that her father was Robert Welch. He was born in Brechin,
    Scotland. My best source of information in so far as the Welch history is concerned is my second cousin, Annie Welch,
    who lives at 1227 North Eighth Street in Estherville, Iowa. She is supplying me with much useful information. I was under
    the impression that my mother''s father, Robert, had been a professor at the University of Edinburgh, but Cousin Annie
    tells me she has never heard of this. My grandfather, Robert Welch, was born on October 14, 1842, and as you know he died
    in Lovelock on October 15, 1912. He was married to Agnes Mcllrey (and that''s M-c or M-a-c - I''m not clear as to which
    - Ilrey - Mcllrey M-c-I-l-r-e-y). Agnes was born on October 26, 1858, and died on March 16, 1889. There were, I believe,
    six children from this marriage. The oldest was your husband Will, although I do not have his birthdate; the next oldest
    was my mother Isabel, who was born in Unionville, Nevada, on the seventh of March, 1883. Next was Robert Welch, who was
    born on August 16, 1886, and then John Welch, who was born in June of 1889. Following John was Murray Welch born in October,
    1891. I believe the youngest was Andrew who was born in May of 1893.'
- speaker: Respondent
  text: My grandfather, Robert Welch, had two brothers. One was James Welch, who lived in Ireland, and the other was Alexander
    Welch, who was in the nursery and seed business in Coldstream, Scotland. I believe in addition to these two brothers he
    had several sisters. One was Jane Welch, who married George Murray, the manager of the British museum. Another sister
    married a Wadsworth, and I believe at one time he was the editor and the owner of the London Gazette. I'm sending you
    herewith a recent letter which my second cousin Annie Welch wrote me and which has considerable genealogical information
    of interest. I'm indebted to you for telling me about Agnes Mcllrey, and that her people came from Auckland, New Zealand,
    and that she was born while enroute between New Zealand and Australia. I remember now that my mother told me of correspondence
    with some cousins in Auckland, New Zealand, but I have neither the name nor the addresses. I've questioned whether they
    were children of my grandmother's brothers or sisters.
- speaker: Respondent
  text: For your further information, Uncle Will passed away in Winnemucca although I do not recall the exact date. My mother
    died in Reno, Nevada, on April 22, 1959. Robert Welch passed away on November 9, 1952. He was in Company B-1 in World
    War I. John passed away in July of 1914. Murray passed away in March of 1907, and Andrew died January 24, 1965. This accurately
    reflects the history of my mother's brothers, and I've researched this very thoroughly, and they all
