collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: What was the original purpose of the Basque Studies program established in 1967?
- speaker: Respondent
  text: The program was established to study the Basques, who were historically the foremost sheep tenders in the American
    West, as a key human element in the Great Basin ecosystem.
- speaker: Interviewer
  text: How did the Basque Studies program evolve over time?
- speaker: Respondent
  text: It grew from a modest, narrowly focused undertaking to become today's Center for Basque Studies, considered by many
    to be the leading research and educational institute of its kind outside the European Basque homeland.
- speaker: Interviewer
  text: Can you tell me about the offspring of the Center for Basque Studies?
- speaker: Respondent
  text: They include the vast Basque Studies Library, the Basque Book Series of the University of Nevada Press, and the University
    Studies Abroad Consortium, which is one of the largest programs of its kind in the world with a presence in twenty-five
    countries.
- speaker: Interviewer
  text: What challenges did the Center for Basque Studies face on its road to success?
- speaker: Respondent
  text: The road was not uniformly smooth. The history includes multi-faceted issues and personalities that are often missing
    from official institutional histories.
- speaker: Interviewer
  text: How did the Basque community in Nevada contribute to the establishment of the Basque Studies program?
- speaker: Respondent
  text: The Basque community, including families like the Laxalts, the Echeverrias, and the Ascuagas, helped shape Nevada's
    identity and history. The institutionalization of the Basque presence in Reno opened a new chapter in the relationship
    between Basques and other Nevadans.
- speaker: Interviewer
  text: Who was the first coordinator of the Basque Studies Program?
- speaker: Respondent
  text: William A. Douglass, a social anthropologist from Reno, was hired in June of 1967 to be the first coordinator of the
    Basque Studies Program.
- speaker: Interviewer
  text: What role did Robert Laxalt play in the development of Basque Studies?
- speaker: Respondent
  text: Robert Laxalt was instrumental in raising awareness about Basque culture through organizing the Sparks festival and
    founding the University of Nevada Press, which soon had a Basque Book Series. He was an influential early advocate for
    the Basque Studies Program.
- speaker: Interviewer
  text: How did the political situation in Spain affect Basque culture and the Basque Studies Program?
- speaker: Respondent
  text: Under Franco's regime, Basque culture was brutally repressed and the language was forbidden. Basque emigrant diaspora
    communities financially supported the Basque government-in-exile and maintained the culture, language, and artistic expressions
    banned in Spain. This context influenced the Basque Studies Program in Reno.
- speaker: Interviewer
  text: Who were some of the key figures involved in the Basque Studies Program besides Douglass and Laxalt?
- speaker: Respondent
  text: Basque bibliographer Jon Bilbao joined the program in 1968. Other important figures included Basque political exiles
    like Bilbao and scholar Eloy Placer, as well as academics like Joseba Zulaika, the program's second director.
- speaker: Interviewer
  text: What was the significance of the Basque Studies Program's early contributors?
- speaker: Respondent
  text: Many early contributors were former Basque Army officers who fought against Franco's rebel army. For example, Jon
    Bilbao was made a Knight of the Order of the Belgian Crown for his services during World War II, and Eloy Placer was buried
    with military honors draped with the Basque flag, showing their stature and commitment.
- speaker: Interviewer
  text: What milestones did the Basque Studies Program celebrate in 2007?
- speaker: Respondent
  text: 2007 marked the fortieth anniversary of Basque Studies at the University of Nevada, the fiftieth anniversary of the
    first edition of Sweet Promised Land, and the twenty-fifth anniversary of the University Studies Abroad Consortium.
- speaker: Interviewer
  text: What is the University Studies Abroad Consortium (USAC) and its connection to Basque Studies?
- speaker: Respondent
  text: USAC is a consortium of thirty-three U.S. universities and one of the largest programs of its kind in the country,
    with a presence in twenty-five countries. Its origins trace back to the first summer study abroad programs organized by
    Basque Studies during the 1970s.
- speaker: Interviewer
  text: How has Basque Studies changed over the years at the University of Nevada?
- speaker: Respondent
  text: It has transformed from a tiny operation in a closet to a supernova. It has grown alongside the university, reflecting
    changes on campus and in Nevada society overall.
- speaker: Interviewer
  text: Who were some of the key staff members involved in Basque Studies over the years?
- speaker: Respondent
  text: Linda White worked at Basque Studies for twenty-five years and was assistant coordinator for a decade. Jill Berner
    managed daily operations for much of the last three decades. Kate Camino has been the office manager for the last nine
    years.
