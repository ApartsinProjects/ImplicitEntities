source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Today we're going to cover a little bit of your family background and your childhood. Could you tell us where you
    were born - the city, the county, the state?
- speaker: Respondent
  text: I was born in East Cleveland, Cuyahoga County, Ohio, on October 28, 1920.
- speaker: Interviewer
  text: And you do have a middle name. What does the W stand for?
- speaker: Respondent
  text: The W stands for Washington. Thereby hangs a tale. My father was born on George Washington's birthday. I was named
    for him.
- speaker: Interviewer
  text: Did you know any of your grandparents, personally?
- speaker: Respondent
  text: Only my grandmother on my mother's side, and I can't really say that I knew her, because she died when I was, perhaps,
    five or six years old. I only have a memory of an old lady sitting in a chair.
- speaker: Interviewer
  text: Did you remember any of the names of your grandparents?
- speaker: Respondent
  text: Yes. My paternal grandfather was John Daykin. My paternal grandmother was Ann Daykin. My maternal grandfather was
    Thomas Kelly. My maternal grandmother's name I do not recall.
- speaker: Interviewer
  text: You said you were named after your father, Frank Washington Daykin - how did he come to locate in Ohio?
- speaker: Respondent
  text: His grandfather came there from England, part of a group of four families. They sold up everything they had in England.
    They made the passage. They bought little farms, that is, land they could clear for little farms, in what was then the
    Western Reserve of Connecticut, Sharon Township, Ohio. This was in 1833.
- speaker: Interviewer
  text: And your father was a doctor?
- speaker: Respondent
  text: Yes, he was a Doctor of Medicine.
- speaker: Interviewer
  text: Was he, at the time, a country physician, or did he practice in a town setting?
- speaker: Respondent
  text: He practiced in the City of Cleveland, but he was a general practitioner all his life. However, his greatest, what
    shall I say - skill, perhaps - lay in the field of internal medicine, curing by the use of drugs and medications without
    surgery. He was an expert surgeon, but he declined to do it. The Cleveland Clinic, of which you may have heard, used to
    refer their inoperable cases to him. They would ask him to call in at the clinic when they had one.
- speaker: Interviewer
  text: Did his practice have any kind of an impact on your family life? Was he frequently called out at night, for example?
- speaker: Respondent
  text: The answer to that one is no, for at the time he married my mother, which was 1919, the year before I was born, he
    moved away from his office out to East Cleveland and thereafter would take no night calls. There was a little sign on
    the office door, "If the bell does not answer, call Dr. Sunkel or Dr. Battles." And the numbers were given.
- speaker: Interviewer
  text: That was a great idea.
- speaker: Respondent
  text: That was that!
- speaker: Interviewer
  text: Was there ever a time that you thought you might want to follow your father's footsteps and practice medicine?
- speaker: Respondent
  text: No, I never really contemplated that. For one thing, I did not think, and still do not think, that I had the intellect
    to do what he did, and I didn't want to be second-class.
- speaker: Interviewer
  text: Was your dad involved in any political activities or any community activities that you remember?
- speaker: Respondent
  text: Politically, he was a friend of Senator Mark Hannah's, and he took part in the campaign of 1900, when William McKinley
    ran for president, Theodore Roosevelt for vice president. He carried Roosevelt's coat, as the expression had it, in northeastern
    Ohio, meaning, he stood there and could whisper to the candidate, "That's Commissioner So-and-So from Summit County coming
    up." And the candidate could be delightfully cordial.
- speaker: Interviewer
  text: Did any of your father's stories stir up any interest in you in politics?
- speaker: Respondent
  text: No. He didn't, of course, ever pursue politics, and I had no calling toward it.
- speaker: Interviewer
  text: What was your mother's full name, and where was she born?
- speaker: Respondent
  text: Her name was Maria Kelly Daykin. She was born in Cleveland in 1879.
- speaker: Interviewer
  text: And she was a teacher?
- speaker: Respondent
  text: She was a schoolteacher, yes. She taught Latin and algebra at East High School in Cleveland.
