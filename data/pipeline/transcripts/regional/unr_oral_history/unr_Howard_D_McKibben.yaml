collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: I want to begin by asking you quite simply when you were born.
- speaker: Respondent
  text: I was born on April 1, 1940 in Virginia, Illinois, which is a small rural community in south central Illinois. I was
    an April Fool's child.
- speaker: Interviewer
  text: What was Virginia, Illinois, like?
- speaker: Respondent
  text: I lived there about two years of my life, so I really don't have any recollection. I have since gone back to visit,
    and it's a very small town of less than a thousand people. It is surrounded by farmland.
- speaker: Respondent
  text: In 1941, my sister and I were taken to live at The Baby Fold, which was an orphanage in Normal, Illinois. I was so
    young I really can't remember much about that period. The Baby Fold is still in Normal. This last year, I gave a talk
    at their Founder's Day banquet. It was really quite an emotional experience because the whole process of adoption has
    had a very significant impact on my life.
- speaker: Respondent
  text: I was about two years old at the time that my sister and I were taken to the Baby Fold. My sister's name is Marian,
    and she and I were not separated. We had two other half-sisters, Peggy and Hazel, and we did not see them again for many,
    many years after that. I was at the Baby Fold along with my sister for approximately six or seven months in 1942.
- speaker: Respondent
  text: In October of 1942, James Dewey McKibben and Bernice Brown McKibben, who were living in Clinton, Illinois, which was
    not far from Normal in central Illinois, came to the Baby Fold. They wished to adopt a child. They were told that there
    were two children for adoption, a brother and a sister, and the Baby Fold didn't want to separate them.
- speaker: Interviewer
  text: No, this is very interesting.
- speaker: Respondent
  text: James and Bernice McKibben were in their mid to late forties and they were concerned about adopting more than one
    child. As they have told us, they went home and thought about it. Fortunately for us they decided, "Well, we can raise
    two children," and they returned to the Baby Fold and told them they wished to adopt us. That was in October 1942. In
    November of 1942, we were placed in their home in Clinton, Illinois. The adoption was finalized in McLean County Court
    in 1943.
- speaker: Respondent
  text: My father was a superintendent of the school district in Clinton, and my mother was an English and Latin teacher.
    She wasn't teaching at the time because she stayed home to take care of my sister and me. I would have been two at the
    time. We lived in Clinton until 1948, when I finished the second grade. We then moved to Oneida, Illinois, which is north
    of Peoria about fifty miles. It's in the northwestern part of Illinois. That's where I lived then until I graduated from
    high school in 1958.
