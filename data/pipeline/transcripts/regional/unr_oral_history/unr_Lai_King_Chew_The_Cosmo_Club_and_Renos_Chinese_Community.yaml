collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and family background?
- speaker: Respondent
  text: I grew up in Seattle. My father emigrated from China to Port Townsend, Washington in 1860. He worked on the railroad
    in Nevada before moving back to Washington where he became a successful merchant and respected arbitrator in the Chinese
    community. He hired a matchmaker to find him a wife in China and brought her to the U.S. in 1890 under false pretenses
    with a bought birth certificate. Together they had nine children.
- speaker: Interviewer
  text: What was your education like?
- speaker: Respondent
  text: I was educated at St. Theresa's College in Winona, Minnesota, the College of William and Mary, and New York University,
    where I received a Bachelor of Fine Arts in 1935.
- speaker: Interviewer
  text: Can you tell me about your family life and marriages?
- speaker: Respondent
  text: I lived in Vancouver, British Columbia with my first husband, Thomas Chang, and we had two children. After divorcing,
    I settled in Seattle and later married Charlie Chew. We moved to Reno in 1956 and opened a casino for blacks and Indians,
    who at that time were not allowed to gamble in the clubs in Reno.
- speaker: Interviewer
  text: What happened after your husband passed away?
- speaker: Respondent
  text: Charlie Chew died suddenly in 1961, and I quickly learned the gambling business and ran the club myself until 1966.
- speaker: Interviewer
  text: What was the Cosmo Club like?
- speaker: Respondent
  text: The Cosmo Club on Commercial Row was a very colorful place. It was known for the wild popularity of keno, a game introduced
    by the Chinese to the American gambling scene. The club was in downtown Reno, which had a dark and dangerous side, and
    it attracted many interesting characters.
- speaker: Interviewer
  text: Did you experience discrimination in Nevada?
- speaker: Respondent
  text: Yes, I found prejudice and discrimination for the first time in my life. People of my race were not served in some
    Reno restaurants, nor could they rent nice apartments.
- speaker: Interviewer
  text: Can you tell me about the Joss House Society and the Chinese community in Reno?
- speaker: Respondent
  text: The Joss House Society was important in the Chinese community. They took care of their own by settling disputes, providing
    for the unfortunate, and arranging burials. I often interpreted for Chinese people in legal and medical matters in Reno.
    The community maintained close ties to their homeland and loved ones in China.
- speaker: Interviewer
  text: How did the Civil Rights Act of 1964 affect your business?
- speaker: Respondent
  text: The Civil Rights Act made discrimination in clubs and restaurants illegal. As blacks began moving uptown to gamble,
    business at the Cosmo Club declined, and I closed the club in 1966.
- speaker: Interviewer
  text: What did you do after closing the Cosmo Club?
- speaker: Respondent
  text: After closing the Cosmo Club, I worked with my friend Tom Wong, helping him run the Sagebrush Club in Fallon. The
    clientele there was very different—mostly cowboys, local business people, ranchers, farmers, and young airmen from Fallon
    Naval Air Station.
- speaker: Interviewer
  text: Can you share your experiences traveling to China?
- speaker: Respondent
  text: 'I traveled to China several times: first as a little girl, then after high school graduation, and several trips between
    1979 and 1992. Life in China had changed severely due to takeovers by the Japanese and then the communists. I saw changes
    in my ancestors'' village and the hardships endured by relatives.'
