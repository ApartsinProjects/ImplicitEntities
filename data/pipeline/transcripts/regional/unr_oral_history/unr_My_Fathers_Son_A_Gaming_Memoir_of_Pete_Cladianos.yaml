source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about how your family got started in the casino gaming business?
- speaker: Respondent
  text: My father, Pete Cladianos Sr., was a Greek immigrant and a grocer in Reno. Shortly after the Casino Gaming Act was
    passed in 1931, he opened a 'cigar store' that offered gambling and started a slot machine route. Over the next thirty
    years, with the help of my brother and me, he built a diversified business empire including bars, motels, hotels, rental
    properties, and even a mercantile business. Most of these enterprises had slot machines prominently placed to generate
    steady revenue.
- speaker: Interviewer
  text: What role did you take on in the family business?
- speaker: Respondent
  text: By the mid-1960s, I took on responsibility for the day-to-day operations of the family enterprises. My father had
    long dreamed of opening a hotel-casino with unrestricted gaming, and with the expansion and licensing of our Sands Motor
    Inn just west of Reno's downtown core, that dream was accomplished. Under my leadership, the Sands became one of the larger
    and more successful operations in Reno and among the first gaming businesses in the nation to go public.
- speaker: Interviewer
  text: How would you describe your management style at the Sands?
- speaker: Respondent
  text: I ran the Sands the way I wanted to run it. That meant odd working hours and an open-ended job description. I would
    come to work between 11 a.m. and noon and leave at 2 or 3 a.m. the next morning, taking only a couple of hours each evening
    to play handball. I spent most of my time on the casino floor, visible to my employees. I made virtually every decision
    myself, and at busy times you could even spot me checking in guests or dealing cards to a big winner.
- speaker: Interviewer
  text: What was your approach to business and employees?
- speaker: Respondent
  text: To me, business is business. I expect people to honor their agreements, whether they have made a good deal or a bad
    one. I gave no quarter and negotiated until I had all there was to get. I measured my personal success by the success
    of my company. My employees, especially the lower level ones, liked me for my common approach and humble manner. I spoke
    to all and knew most of their names, and they felt their welfare was important to me. I held no double standard and abided
    by the same rules I imposed on my employees.
- speaker: Interviewer
  text: Can you share an example of your frugality in business?
- speaker: Respondent
  text: When the Empress tower opened with the company's first health club, I furnished it with a two-year-old Sears exercise
    bike from my home. It did not dawn on me that something good enough for me would not be good enough for our guests, but
    I knew bringing the bike from home would save the company money. Also, once my sister saw a porter placing a hose into
    the trunk of his car and thought he was stealing a company hose. It turned out he was bringing his own hose from home
    to water the hotel flowerbeds because I would not spend money for a replacement hose. While most saw the humor, it showed
    I was cost conscious and expected my employees to share my standards.
- speaker: Interviewer
  text: How did you manage the company's finances?
- speaker: Respondent
  text: I understood the 'time value' of money very well. When I arrived at the Sands, I kept two baskets behind my desk full
    of checks written but not sent to vendors. I would hold checks until the vendor was about to stop doing business with
    us, then send out one or two, and the process would start over. I resisted setting a formal procedure for paying vendors
    for several years until managing checks personally became too much. This ability to manage costs and control cash was
    key to our great margins and success.
- speaker: Interviewer
  text: What impact do you think you made on Reno?
- speaker: Respondent
  text: I made a difference in Reno. I made things happen, often with the help and advice of trusted friends and family. I
    was my own man, true to what I believed regardless of opposition. I overcame the infamous 'red line' that confined unrestricted
    gaming and helped redefine the gaming industry in the region.
