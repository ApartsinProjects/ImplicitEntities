collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: On my paternal side of the family, the family name was Peters. Peters is not a Portuguese name, but they were Portuguese
    in descent. Apparently, the family name was changed, and I didn't learn that until many years later.
- speaker: Respondent
  text: I do not know to this day what it was, and I haven't really had enough interest to follow up and find out. I don't
    know where my grandfather was born precisely - it could've been the Azores, or it could've been Portugal - but as a young
    man, he came to this country from the Azores and settled in Oakland. He was ultimately killed in an accident while working
    for the railroad. I was quite young at that time, so I remember very little about him, outside of his shocking white hair.
    I do not remember my paternal grandmother at all. I don't know whether she came from the same part of the world as he,
    or whether he met her in Oakland.
- speaker: Respondent
  text: My maternal grandparents were both Irish. My grandfather's name was Heffron. They came from Missouri, settled in California
    around what we now know as the Petaluma area, and did some farming. Ultimately they left some land to a school which I
    don't believe operates any longer, but the land is now part of the public domain. I don't think they were well-to-do then.
    Even if you gave a couple of acres of land for a public cause, you didn't have to be wealthy to do so. In the 1940s and
    1950s you could still buy land in the Sacramento area, the Bay Area, and throughout California for $10, $20 an acre. So
    their donation was not one given through wealth. Outside of wanting to provide a public service, I don't understand why
    they gave the land.
- speaker: Respondent
  text: 'Both my parents were born in Oakland, I think... my father in 1898: I''m not sure how my mother''s family got from
    the Petaluma area over to Oakland. The details about my family are very sketchy, because I''m from a broken home. My mother
    was quite young when she married - she was 18. My father, I would guess, was six or seven years older at the time, but
    I''m not sure. My mother and father were divorced when I was three years old, so when I was a young child I didn''t have
    that sense of family that a lot of people have.'
- speaker: Respondent
  text: A lot of pieces have been put together in my head - some comes from talking to an aunt or other people in the past.
    But the facts are not as coherent or flowing as I would like them to be.
- speaker: Respondent
  text: During the Depression era, my father was a laundry truck driver. I suppose that was nothing to sneeze at in those
    days, because there were many people who had no employment at all. My mother was a homemaker. I was the second born. After
    I was born, my sister, Norma, was born in 1925. She still lives in San Francisco. We're very close, being the only siblings
    remaining in the family. My parents had a son who was born before me, who died of pneumonia at nine months of age. From
    what I've been able to put together from my mother's sisters, my mother never adapted to the loss and apparently began
    to drink very heavily at that time. That is what ultimately brought about the divorce in the family. She never did recover,
    either, and she died very young in the county hospital in Alameda from the results of alcoholism.
- speaker: Respondent
  text: Surprisingly, I've been told that people don't remember what happened to them when they were that young, but perhaps
    because things were rather traumatic, I do remember. I remember the divorce, and I remember that because my mother was
    drinking heavily, my father moved my sister and me all the way back to Buffalo, New York, for a period of time. I assume
    that either he did not want her to see us, or he was afraid she would come and take us, because he had been given custody
    of us in the divorce suit.
- speaker: Respondent
  text: I don't remember who we stayed with in Buffalo, but it's strange because I can still picture the house. I assume that
    it was perhaps a distant relative or someone on my father's side, but I really do not know. I can remember the house very
    well, because I'd never been in snow. It was so cold! [laughs]
- speaker: Respondent
  text: I'll never forget that we slept in a loft with other children, and I contracted scarlet fever. This was in the days
    prior to antibiotics, which makes it a very simple matter now. But it really could be a very fatal disease back at that
    time. As a matter of fact, I apparently had a very bad case of it, and one of the results of scarlet fever in those days
    was the loss of hair. Some people lost all their hair, which they never regained, and I was left with a number of scars
    on my head where the hair just fell out.
- speaker: Respondent
  text: Following that, somehow we came back to the Bay Area, and my sister and I were placed in an orphanage. I don't remember
    the name, but it was in Oakland. I think we must have been there about a year and a half, because I had not started school
    yet. I don't know why my father didn't take us back, but he was a single man at that time... who knows? He probably had
    no way of caring for us. I guess in due time he made arrangements with a brother and sister-in-law of his in Oakland to
    take my sister and me in. We were there about a year and a half. I think that I was four-and-a-half years old and I did
    start school while we were with this aunt and uncle. They didn't have any other children.
- speaker: Respondent
  text: I had appendicitis during that time, [laughs] I remember that I was on my way home from school and apparently it hit
    very sharply and almost burst, and I stopped on the sidewalk. In those days, neighbors knew everyone, so they saw me.
    They went for my aunt and they took me to the hospital, and out came the appendix.
- speaker: Respondent
  text: I really loved the time with my aunt and uncle. It was the first sense of family that I had ever really had. It's
    the first Christmas that I remember clearly, because I spent it in the hospital, [laughs] It was beautiful.. I remember
    laughing about it because things were so silly. I guess I had a sense of adventure even then. There was a young girl about
    my age in the bed next to me who had been badly burned in an accident, and her legs were up to keep from touching, I guess.
    She dared me to get up and run to the end of the room. I suppose I couldn't resist a challenge even then, so I did it,
    and it was just great fun. [laughs] On Christmas Eve, all the nurses went through the halls. All the lights were turned
    out and they carried candles and they sang all through the halls. We had our own tree in the room and it was my first
    memorable Christmas. I was six then.
- speaker: Respondent
  text: I was with my uncle and aunt from when I was four-and-a-half until I was seven. My Uncle Jack started me reading even
    before I had started school, and kept after me until I actually read him the Sunday morning comic strips. I had a good
    start in school, and it was good because I missed a lot of it at an earlier time. I always liked school - loved it from
    day one.
- speaker: Respondent
  text: At seven years of age all of us at home - my sister, aunt, uncle and I - had all been expecting my father to marry
    a woman that we knew he'd seen for quite a period of time. All of a sudden, he surprised everyone and up and married a
    woman that no one had ever heard of. So there was another whole family thing there, [laughs] It came as a shock to everyone.
    I can't recall my thought processes at the time, but I would assume that because we all liked the other woman so well,
    that our future stepmother had this sort of unfavorable ranking in my opinion right from the beginning. At any rate, they
    were married when I was seven years of age. She had her own home in Oakland; she was divorced and Italian, but she was
    not active in the Catholic church. So then we went back and lived with my father and his new wife.
- speaker: Respondent
  text: In rationalizing this as time passed and I got older, I think that I'd reached the conclusion that at that time my
    father just wanted a home for us. Maybe he felt this woman owning her own home would provide a home for us, and perhaps
    this other woman in his life could not offer this. But it was disastrous from the beginning. She had two sons who were
    considerably older than us. The youngest was about four years my senior, and the older was probably ten years my senior.
- speaker: Respondent
  text: At that point in time, my father drifted somewhat away from the church, in spite of my having been baptized a Catholic.
    Perhaps this was because there was the divorce and things, I don't know. He became very active in the Masonic Order. He
    was still driving the laundry truck then. But it seemed like countless hours committed to the Masonic Order.
- speaker: Respondent
  text: Our father spent very little time at home, and we were left with a stepmother who had become progressively more vicious.
    Norma and I both put up with being called stupid. My stepmother also used to beat us. The washers of those days were in
    the basement, and they had the hand-wringers on them. You lifted clothes out by hand and put them through these wringers.
    The water was real hot, so there was a very hard oak stick with about a two-inch circumference that was used to lift out
    the clothing. That stick seemed to be her favorite weapon.
- speaker: Respondent
  text: It sounds so strange, because this kind of thing was not discussed back then. But now, because there is so much abuse
    going on out there, people are talking about it, and I feel free to talk about it. We were abused physically, but mainly
    emotionally, which had different effects on my sister and myself. Norma took years and years... she never really got over
    it until maybe ten years ago, which is a very long period of time. She had what they used to call a nervous breakdown.
    She went through all of that and really had a very difficult time. These things affected her differently than they affected
    me. They made me stubborn and hard-headed... they really did. They toughened me.
- speaker: Respondent
  text: We didn't dare tell my father about our stepmother abusing us, because we figured that would make things worse. I
    had always been so crazy about my father, but during this period of time he couldn't see the things that were happening,
    and if he did, he didn't seem to care enough to do anything about it. You couldn't miss some of the knots and lumps and
    things that appeared on us, but we didn't dare say anything. I had friends in school, but I never told anyone about anything
    because I was ashamed. You just don't discuss these things and you go to extremes to hide bruises... it's so weird.
- speaker: Respondent
  text: As far as my aunt and uncle were concerned, when my father married this woman, all ties with both my maternal and
    paternal families were cut. I don't know the reason why - I don't know whether my father cut it off or whether his wife
    made it obvious that they were unwelcome. I know that as time went on, it was very obvious that they were entirely unwelcome.
    So all connections with aunts and uncles on both sides of the family - cousins, grandparents, everyone - were just severed.
    No one really knew what was going on. In later years I talked with my grandmother and an aunt that had tried to come to
    the house and visit. They said that every time they called or tried to see us, we were never told. We just felt we'd been
    deserted, and then found out later that that wasn't true. We were also told that they had brought Christmas gifts, which
    we never saw, so we don't know what happened to them.
- speaker: Respondent
  text: I became more and more attached to school because it was almost an escape for me at that point in time. I'd always
    loved athletics, and fortunately had a very natural flair for it, too. I wanted very much to take part in a lot of these
    activities at school, but we absolutely could not. Our stepmother wouldn't let us, and that showed just how petty things
    can be. There were always field trips in school, and students would go to the local dairies and bakeries, and that sort
    of thing. Whenever one of those field trips was due, we had to get a note from our parents approving them, and I never
    got one approved. She refused it, and my father never even knew about it. I don't know why she wouldn't let us go. We
    were also not entitled to have any friends to the home.. I never had a friend in the house. We were never allowed to go
    to a party and never allowed to stay for after-school activities. It was just awful.
- speaker: Respondent
  text: I don't know if my father and his wife got along, because I hardly remember him ever being at home - he was just gone
    all the time. My sister and I were very, very close, because we only had each other. People talk about the old, mean stepmother.
    I mean she was an absolute bitch! She really was. But we were instructed to call her Mother. We were told that that was
    what she was to be called.
- speaker: Respondent
  text: Our clothes were hand-me-downs, which was not unusual for any family, because this was during the Depression. I know
    my husband has said how he was embarrassed to wear hand-me-down clothing, but I didn't know anything else... what difference
    did it make? It was something to wear, [laughs]
- speaker: Respondent
  text: Once in junior high school some of the girls in the class were having a party - I think it was a birthday party -
    and I really wanted to go. I hadn't been allowed to do that sort of thing. I asked if I could go, and the answer was no,
    but fate intervened. Right next door to where we lived, a sister of my stepmother lived. I got along with her very well
    - they raised chow dogs. As often happened, I would go over to this woman's house and sit with their dogs if they were
    going away, because the dogs required special feedings. It worked out because I had to go take care of the dogs on the
    same night the party was being held.
- speaker: Respondent
  text: Well, I sneaked out and off I went to the party, [laughs] My sister was with me and she went, too. During the party
    there was a spelling contest, which I won, and I got a quarter. It was a lot of money when you never had an allowance...
    it was a ton of money.
- speaker: Respondent
  text: When we went to go home, we rounded a corner about two blocks from the house and we could see flashing lights. They
    had discovered, obviously, that we were missing and had called the police. My sister decided to go on and go home, and
    I told her to do what she wanted, but I decided this was a good time for me to leave, [laughs] Norma went straight up
    that street. I went around the block in the back, over a fence and down in the basement, and got a jacket and a change
    of clothes, and off I went.
- speaker: Respondent
  text: I went no place in particular. Here I had this quarter in my pocket, and I was absolutely rich, [laughs] It was about
    9:00 at night by then. I took a dime, I think, and went to a movie. I walked about two miles to town to a movie and stayed
    until the theater closed. Then I left and I didn't know what I was going to do. My father had a brother that lived sort
    of halfway between where we lived and where downtown was. (He wasn't the same uncle we had lived with.) I started to go
    to their place, but I knew if I went there they would call my father, and I would have to go home. So I changed my mind
    when I just about got there and I just wandered around the neighborhood for some place to lie down. I found a place in
    someone's backyard on one of those swings that go back and forth. I just crawled on the swing and went to sleep.
