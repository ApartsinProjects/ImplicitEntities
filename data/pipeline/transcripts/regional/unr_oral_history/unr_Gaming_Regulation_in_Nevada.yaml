collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about the early days of gaming regulation in Nevada?
- speaker: Respondent
  text: Nevada enjoyed legal gambling from 1869 to 1910, when an anti-gambling law passed by the 1909 legislature took effect.
    The state played no role in regulating its legal casinos or combatting illegal casinos, leaving everything to the cities
    and counties. By 1919, Governor Emmet Boyle, a committed Progressive and thus a believer in expanded government regulation
    and in moral reform, deemed the anti-gambling law a failure and suggested a rigid enforceable law designed to prohibit
    gambling in all forms, but to no avail.
- speaker: Interviewer
  text: What was the situation like in Nevada during the 1920s regarding gambling and other vices?
- speaker: Respondent
  text: During the 1920s, Nevada turned increasingly to catering to tourists in pursuit of what others considered vice and
    immorality. In 1927, the legislature cut the residency requirement for divorce in half to three months, appalling opponents
    of easy divorce but appealing to those seeking to end their marriages. The activities available to those seeking divorce
    included gambling in Reno casinos whose investors included George Wingfield, the state's political and economic boss.
    Many throughout the state also flouted Prohibition. Those disembarking from the Union Pacific depot in downtown Las Vegas
    had a short walk to Block 16 and its gambling, prostitution, and illegal alcohol.
- speaker: Interviewer
  text: What significant changes occurred in 1931 regarding gambling laws in Nevada?
- speaker: Respondent
  text: In 1931, Nevada went much further. The 1931 legislative session, meeting as construction began on Hoover Dam, turned
    out to be the most important in Nevada's history. On March 19, two laws passed and signed by Governor Fred Balzar would
    have a profound impact on the state's future. Legislators voted to cut the residency requirement for divorce from three
    months to six weeks, effective May 1, and legalized gambling immediately. The assemblyman who introduced the gambling
    bill, Humboldt County rancher Phil Tobin, claimed a desire to increase state revenues and legalize what had been going
    on anyway.
- speaker: Interviewer
  text: Were there any other motivations behind legalizing gambling at that time?
- speaker: Respondent
  text: Yes, Nevada had other motivations. Businessmen hoped that those who came to Nevada for a divorce would find their
    six weeks so pleasant that they would choose to live in the state and become taxpayers and investors. Gambling would be
    another way to attract those visitors. The state's leading businessman, Wingfield, would reap benefits from legal gambling
    at his banks and hotels, and such a law fit neatly with his libertarian inclinations.
- speaker: Interviewer
  text: How did the state initially regulate the new gambling industry after legalization?
- speaker: Respondent
  text: Those inclinations affected how the state regulated its new industry - it chose not to do so. The legislature left
    licensing decisions up to cities and counties. In turn, the local government sent one-quarter of the fees they received
    to the state. Each county would set up a five-member board that would include its three county commissioners, the sheriff,
    and the district attorney.
- speaker: Interviewer
  text: What were some of the early concerns about organized crime in relation to gambling?
- speaker: Respondent
  text: The signs proved to be ominous. Addressing concerns about organized crime, Reno's sheriff said, 'Al Capone is welcome
    in Reno as long as he behaves himself.' Making this comment worrisome, at least in hindsight, Reno had a long history
    of illegal casinos, Capone's friend Frank Detra's Pair-O-Dice debuted on Highway 91 outside Las Vegas in 1930, Detra allegedly
    put in money to support legal gambling that may have come from Capone himself, and Capone rarely behaved himself.
- speaker: Interviewer
  text: How did the public and national media react to the legalization of gambling in Nevada?
- speaker: Respondent
  text: 'The Las Vegas Evening Review-Journal said, ''People should not get overly excited over the effects of the new gambling
    bill - conditions will be little different than they are at the present time, except that some things will be done openly
    that have previously been done in secret.'' If Nevadans seemed unexcited over legal gambling, the national reaction provided
    a stark contrast: the Chicago Tribune spoke for many with the headline, ''CANCEL NEVADA''S STATEHOOD!'''
- speaker: Interviewer
  text: What happened in 1945 regarding gaming regulation and taxation in Nevada?
- speaker: Respondent
  text: As gambling expanded in Reno, Las Vegas, and other Nevada cities, and in particular as organized crime interests began
    to flex their muscles, the state saw an opportunity for additional revenue and a need to step in. In 1945, the legislature
    approved bills to have the Nevada Tax Commission investigate and decide upon all gaming license applicants, and to tax
    gross revenues from gaming at one percent. Unhappy with the bill but realizing it enjoyed broad support, Governor E.P.
    Carville let it become law.
