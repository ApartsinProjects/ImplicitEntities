collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: I was the third of three children, all boys. And my father worked for some commercial retail outlet, with which I'm
    not too familiar. And during the flu epidemic of 1918, he passed away. I think at that time I was five or six years old.
    My mother, through my great-aunt, was asked to bring the family out to Ocean Park, California, where my aunt owned some
    property, of which one was the Belclair Apartments on Oceanfront. And my mother managed this apartment. There was about
    twenty-some units. It was a resort complex right on the ocean, and people would spend their summers there, and vacations,
    and it was quite an exciting thing for a child to come from St. Louis, Missouri to the beaches of Ocean Park, which were
    quite wide, and the sand was absolutely white at that time.
- speaker: Respondent
  text: And on leaving St. Louis, one of my earliest memories was coming across from St. Louis to Los Angeles in a train.
    I believe it took like four days and three nights, something of that nature, and it was quite an experience for a young
    boy. And consequently, we arrived in Los Angeles, and we were met and brought into Ocean Park.
- speaker: Respondent
  text: And as we got acquainted there, we lived on the beach, in our bathing suits, mostly, year around, and finally got
    so we were in the water, in and out, all day long, and we had many experiences where we would have three or four bathing
    suits. And just to be as kids would be, smart, well, we'd have to run in the house and dry off and change to a clean bathing
    suit. Along with our many friends, that would track in the sand, which my mother was constantly cleaning up, along with
    the twenty-two units.
- speaker: Respondent
  text: And other times, we would maybe just lie and get in the wet sand. And we would body surf. We also would make our own
    surfboards, which was quite exciting for kids at that time. And throughout the year, we'd play softball, and football,
    and we'd high jump off the cement into the sand, and pole vault, and things of that nature.
- speaker: Respondent
  text: One of our great experiences was on Saturday, we would go down to the Ocean Park Plunge, which was an inside pool.
    I think we'd go in the bathers' entrance for ten cents. We'd go in early in the morning, say, eight o'clock in the morning;
    we'd be there 'til six p.m., and just diving, and swimming, and also diving for pennies and nickels or quarters if possible.
- speaker: Respondent
  text: Various times we'd go out to the Ocean Park pier, underneath the rafters, below the pier. We had a rope with a Gunny
    sack filled with sand, and we'd use that as a swing. And we'd jump off the rafters, and swing it out into the water, and
    then take a dive. It was quite a thing for the kids.
- speaker: Respondent
  text: Amongst my experiences while down in Ocean Park, I remember very distinctly going up to the Pacific Palisades with
    my mother and my brothers and some friends on New Year's Day, and I was attired in a bathing suit and a beanie-type cap.
    And some gentleman from England - from London, England, I believe it was - had to take my picture. And naturally, I didn't
    know why, but he asked my mother if he could take my picture, the reason being that he had to send it back to his friends
    in England to show them how people were attired on January the first in California.
- speaker: Respondent
  text: Another experience I had while playing in the sand after school one winter's day - a friend of mine and I were playing,
    throwing a football, and on looking out into the ocean, we saw something which was bobbing out there. We didn't know what
    it was. But on further examination, we thought it looked like a body. So this fellow and I decided we were curious enough
    to go out and see what it was. And we went out, swam out, maybe two, three hundred yards, and here was a fully clothed
    man who had been apparently hit over the head, and he had been dead for some three or four days. And so, naturally, we
    towed him in to the sand, and very cautiously, we grabbed one side, and we were kinda scared to death. And we were paddling
    along. We brought him in. Naturally, the authorities were notified. That was quite an experience for me!
- speaker: Respondent
  text: On my schooling in Ocean Park, I went to Washington Grammar School. From there, I went to John Adams Junior High School,
    eventually going to Santa Monica High School. And if I may return to my St. Louis situation, I remember I didn't like
    school too much in St. Louis. I was a little reticent at going to school. However, I went every day, but very reluctantly.
- speaker: Respondent
  text: However, with my schooling in California, I quickly met a lot of people, and I enjoyed it very much. In Santa Monica
    High School, I played a little football, and some baseball, and attempted to be a pole vaulter in the sophomore class,
    which was a sad experience because I'm not a pole vaulter. But from thence, I played a lot of basketball, I played through
    the junior high school and high school, and our teams won the Bay area conferences a couple of years. We went on to the
    semifinals of the Southern California championships, where we were beaten by another school I don't remember right now.
- speaker: Respondent
  text: While being raised on the oceanfront, there, I did try to augment our income by selling papers, which my brothers
    did, also. We used to sell afternoon papers on the streets, and at times, we used to sell papers in the morning up at
    the railroad tracks, and we'd catch the commuters, and sell them their morning papers. And on the way by, we might stop
    by a little bakery and pick up some fresh doughnuts, which was quite a thing at that time.
- speaker: Respondent
  text: One of my experiences on the newspaper route was, I had a very small route, and as far as papers go, I only had fifty-two
    papers, but I had to ride my bicycle like five miles before I started my route. These fifty-two papers were out by Westwood,
    California, which is highly and densely populated at this time. However, at that time, they were strung out, and I would
    have to go a quarter of a mile or so to each house.
- speaker: Respondent
  text: And one experience I had there in the winter rains, which is inevitable in southern California. Around the first of
    the year, one of my subscribers insisted that I try to transport her daughter across by the two-foot ravine of water.
    I tried to explain to this lady that it is tough enough riding a bicycle through two foot of water with a few papers on
    the back, and she insisted that I could do it. And maybe I'm a negative thinker, but I certainly thought I could not.
    However, she had talked me into having the girl get on the back of my bicycle so we could transport her over to her mother.
    And naturally, I got as much speed up as I could before I hit the water, the old pedals start dragging a little bit, and
    eventually got about in the middle, and we could go no further, and we tipped over. And the reason I'm mentioning this
    is that the lady was so adamant afterwards that I'd got her daughter all wet, she chewed me out pretty good. But that's
    just an experience in growing up, I guess.
- speaker: Respondent
  text: I remember when we were children there on the beach. There was many a setting for movie pictures. They used that for
    location. I remember The Sheik of Araby was one of them. I think it was Rudolph Valentino. And they had the tents set
    up there, and it was quite exciting to watch. They had a different type of - they had no flash cameras at that time, or
    any lighting. They would use kinda like a lead foil boards. They used those for reflectors to reflect the sun. I remember
    that Charlie Chase used to do a lot of comedy things down there at that time.
- speaker: Respondent
  text: And also, when we were growing older, we used to work in umbrella stands there in the summertime. We'd work for a
    concessionaire, and we'd rent these beach umbrellas, and the beach chairs, and backrests, and that, for people that would
    come down and spend the day, and we'd have to charge them x-amount of the day, or by the hour, or by the week, and some
    of 'em would rent them by the month. And then, when the day would pass, we'd have to collect all these back, and we'd
    have to run them down, and carry like fourteen of these big umbrellas on your shoulders, which was kind of an exercise
    in itself.
- speaker: Respondent
  text: But consequently, I'd be as black as a bear. I would wear kind of like a - oh, linen - white linen pants, but I'd
    have the bathing suit top, and I'd be black as a bear on the top, and when I went swimming later, why, my legs would be
    white, which kinda showed that you were doing something of that nature.
- speaker: Respondent
  text: While in California, newspaper headlines I can remember - Oh, I think the Giants were playing in the 1921 Series,
    which were always headlines. I remember as a child, in grammar school, that the Graf Zeppelin, or the Hindenburg whatever
    it was, went over Ocean Park, and the whole school was let out to view it going over.
- speaker: Respondent
  text: Another one of my recollections is the round-the-world fliers - I guess that was '25; I'm not sure. Either they took
    off and landed - at least, they landed - at the old Clover Field airport, which is now the Douglas Company, Douglas airplane
    company. It was quite an experience, and they let all the kids out of school to go see that.
- speaker: Respondent
  text: And, of course, the streets at that time were all asphalt, had eucalyptus trees along. And Wilshire Boulevard, which
    is - the property is, I guess, as great as any property anywhere, was about a forty-foot wide asphalt street at that time,
    and it was lined with eucalyptus trees on each side. Occasionally, while in grammar school, we would go out near Clover
    Field with our teachers, and pick the wildflowers, which were way out in the fields. Right now, it's highly, densely populated.
- speaker: Respondent
  text: During 1932, the Olympics were held in Los Angeles. The Coliseum was built and dedicated. That was quite an event.
    With a couple of friends of mine, we went and saw the free Olympics, and the qualifying, which was quite exciting. We
    got on a trolley car and went in from Ocean Park into the Los Angeles area, and then after leaving the Coliseum, we went
    down to where we had gotten off the trolley car, and got on another trolley car, and were headed home, we thought. However,
    there was many trolley cars there, and we didn't read the destination of this trolley car. So we went on a tour of the
    Los Angeles area, and we were a little late getting home, eventually making it, however.
- speaker: Respondent
  text: I went to Santa Monica High School. One of my history professors, or teachers, was a Miss Ruth Judd, who was quite
    a gal. She was a big, heavy-set woman, very learned, and she was blunt and to the point. She mentioned that every twenty
    years or so, we have to have a war to cut down the population.
- speaker: Respondent
  text: The reason I'm bringing up Ruth Judd is the fact that I believe it was her cousin or some relative of hers. I graduated
    in Santa Monica January thirty-first. I had Miss Judd as a teacher, I guess, in 1930. And it was shortly after that that
    some relative of hers, Winnie Ruth Judd, decapitated two women and put them in a trunk, and they were later found. It
    was the famed Winnie Ruth Judd murder case. I guess since that time, just recently, the past few months, Winnie Ruth Judd
    has been released to society as - I guess she's a caretaker for some couple that have custody of her.
- speaker: Respondent
  text: So that was '31, and now it's '71, so she - I believe she did escape at one time. I'm not sure. I think she did, and
    she was apprehended. I think she'd worked for these people that she is now in custody with.
- speaker: Respondent
  text: I graduated from Santa Monica High School in January, 1931, the winter class. I was vice president of the class, and
    eventually went to Santa Monica Junior College, which was quite a new school at that time, it is now the City College,
    and much larger, and in a different location.
- speaker: Respondent
  text: I went there just one year, taking a business course, and eventually, I went to work for Mr. William Harrah in Venice,
    California, in a game which was known as the Circle Game.
- speaker: Respondent
  text: The Circle Game had thirty-three stools. Well, naturally, that was Depression times, and things were a little tough.
    And a friend of mine had been working for Mr. Harrah in the Circle Game in Venice, California. And there was an opportunity
    for me to go down and be interviewed to work for a part-time job on weekends and holidays or a relief situation, for which
    I was accepted. That was my first meeting of Bill Harrah. And I went to work in this game on a part-time basis. Eventually
    it developed into a permanent thing.
- speaker: Respondent
  text: The Circle Game was an unusual game. First of all, it was legalized in California. I think it was under the supervision
    of the Los Angeles supervisors. And it was a licensed game. We had thirty-three seats. The Circle Game, as the name implies,
    was in a circle. It was around counter, with thirty-three stools around it. And in the middle, there was a kind of a roll-down
    hopper that had a dashboard, indicating every card in the deck, the fifty-two cards.
- speaker: Respondent
  text: And the object of the game was, you would have a layout like a Bingo board. There would be a heart row, a spade row,
    a diamond row, and a club row. And they would have a red series, which - all the red series were the same. They had a
    blue series, which was different than the red series, but all the same colored series were identical. They had a maverick
    series, which was the yellow series, and it was kind of a jumbled up situation.
- speaker: Respondent
  text: The object of this game was, you would buy cards from the dealers, and you either want the red or the blue or the
    maverick, or you could have all three. You could buy from, I think it was two to five cards. And these cards you received,
    they would be known as your "hole" card. You would mark a black marker over these on the series boards, and the object
    would be to get four in a row, and it would have to include one or more of your hole cards. It was possible to get a pat
    hand, which happened occasionally.
- speaker: Respondent
  text: And the hopper in the center of this circle would revolve. After having the cards shuffled by a girl in a booth, the
    dealers would - there would be two men dealers, and they would work from one side of the booth where the girls shuffled.
    One would work one side, and one would work the other, and sell cards to these people. After they received their cards
    and put black markers on the hole cards, then they would - wherever the hopper had stopped in the previous game, the next
    person would be the initial person to start the game. We had a marble; it would roll down this hopper, and there would
    be the fifty-two slots for the cards, and they were jumbled - I mean, they were not in sequence. And there would be a
    nail on each side of each slot, with a rubber covering. And a marble you would roll down for your card that would give
    you a case, or else help you win the game. However, it was quite a delicate situation. It was a skill game, and that's
    the reason it was legal. It was not a gambling game.
- speaker: Respondent
  text: The marble would go down, it would hit one of those pegs, and sometimes you would shoot it right through as expertly
    as you could. And other times, it would bounce from one or over, and if you were to hit somebody's hole card, and there
    were thirty-three people there.
