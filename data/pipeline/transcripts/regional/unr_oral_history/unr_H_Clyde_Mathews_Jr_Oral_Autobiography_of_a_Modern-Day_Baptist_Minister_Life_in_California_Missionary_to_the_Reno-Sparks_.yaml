turns:
- speaker: Respondent
  text: Hospital. My parents have always joked about it because Eddie Cantor was in there at the same time for his first ulcer
    operation. My parents tell me that my birth was unusual in the fact that my mother was extremely heavy in weight and the
    doctors told my parents that they weren't sure that the child could be saved. During the time of birth the doctor came
    out into the waiting room and told my father that he would either have to save my mother or me, and that he was a Roman
    Catholic doctor and preferred to save the child; and my father said that he was a Baptist preacher and he preferred that
    he save both of us, so he was to go back in and do his best, and my father would stay outside and pray.
- speaker: Respondent
  text: Two or three hours later the doctor came out and said that he had saved both of us, and that during the time of birth
    something happened that he couldn't explain; but that it was made possible. However, both of us required thirty days in
    the hospital before discharge. At that time my parents were living in Sawtelle, California. My father was the pastor of
    the First Baptist Church of Sawtelle.
- speaker: Respondent
  text: For a little background on my father, he was born in Stotts City, Missouri, November 19, 1893, the son of a Welsh
    zinc miner. My grandmother's parents were immigrants to this country from Scotland. On my father's side there was English,
    Scotch, and Welsh background. Mathews spelled with one "t" is a Welsh name. My father grew up in a farming and mining
    town in southwest Missouri, and went to grammar school and high school in Stotts City. At that time the high school was
    not an accredited high school, so later on, when he went to college, he had to go for five years to make up an extra year
    for having gone to a non-accredited high school.
- speaker: Respondent
  text: He became known as the "boy preacher" of southwest Missouri. He used to travel around on a mule, holding camp meetings,
    and would have as many as three thousand people attend outdoor revivals. One man heard him and became interested in my
    father and got him a scholarship to William Jewell College in Liberty, Missouri, where he went to school for four and
    one-half years and was the houseboy for the president of the school. His roommate was a Japanese who was studying for
    the ministry from Tokyo, Japan.
- speaker: Respondent
  text: When the war broke out, the first World War, my father tried to enlist, and they wouldn't take him because he was
    a preministerial student; but he became the chaplain of the home guard in Liberty, Missouri. It was during this time that
    he courted and married my mother, Elsie - at that time her name was Elsie Stone. My mother's parents were from New Baltimore,
    Virginia. My grandmother and grandfather on her side had separated when my mother was two years old, and my grandmother
    moved to Missouri and later remarried, and all together she had nine children.
- speaker: Respondent
  text: It was during 1917 that my father moved to Scotts Bluff, Nebraska, as a missionary for the then Northern Baptist Home
    Mission Society. He had not quite completed college, but it was because of the tensions of the war years that he felt
    compelled to go into the active ministry at that time. They lived in Scotts Bluff for one year, and they used to tell
    me that the coyotes would steal the garbage off the back porch, so it was a very rugged and bleak, desolate area of the
    country.
- speaker: Respondent
  text: My father also was a kind of nurse during the great flu epidemic of 1917 in that city and was one of the few people
    who never contracted the flu.
- speaker: Respondent
  text: In August of 1918 he came to Berkeley, California, to enter the Berkeley Baptist Divinity School. It was while he
    was at this school that he became the pastor of the First Baptist Church of Santa Clara, California. He was pastor there
    until 1922, and he graduated from the Berkeley Baptist Divinity School. He and my mother then moved to Sawtelle in 1923,
    and I was born in 1924.
- speaker: Respondent
  text: My first memory of life is probably when I was four years old. I can remember one night having a terrible attack of
    some kind. I woke up and couldn't breathe and took the teddy bear that was in my crib and threw it across the room and
    hit my father in the face and woke him up. They called the doctor, and the doctor got there and gave me a shot of adrenalin,
    and by that time they said I was turning blue. But, as you can see, I survived. It was later diagnosed as asthma. I have
    a faint recollection of back before that, of visiting my aunts and uncles who were farmers in Missouri. And later on in
    life I found that I contacted a lung illness called histoplasmosis, which is peculiar to southern Missouri and is caught
    in a chicken house, and I presume in my uncle's chicken house. Probably this attack was the first indication of allergies
    that sprang from this disease.
- speaker: Respondent
  text: My father left as pastor of the Sawtelle Church to another church in Los Angeles area, the Central Avenue Baptist
    Church on Alvarado Street. While he was there, he was given the job of putting four other small Baptist churches together
    into one, and the merged church was called the Roger Williams Baptist Church. It was located on West Adams near Vermont
    Street, and it was under his leadership that a new building was built. This was depression time, and my father obtained
    enough money from the Home Mission Society of the Baptist Church to build a church. In so doing, they were able to hire
    many of the church members who were out of work, not only to build a church building, but to provide a kind of poverty
    program for the members of the church.
- speaker: Respondent
  text: I attended the Normandy Avenue elementary school, which is near the great Coliseum in Los Angeles for the first six
    grades of school. I can remember that I did well in everything but spelling, and that continues. I also played the drums
    in the band and led the music for all of the assemblies that we used to have in that school.
- speaker: Respondent
  text: Generally speaking, I was rather healthy and rather happy. I used to enjoy very much attending church and being with
    my father and mother. I was an only child at this time. The doctors had told my parents that they couldn't have any more
    children. I remember the special birthday parties that we used to have at the Clifton Cafeteria in downtown Los Angeles.
    I used to enjoy going to the Paramount Theater for the stage show and going shopping with my mother in Bullock's and the
    May Company. My father used to always comment on what an excellent memory I had because we used to take trips in the car
    and I'd go to sleep in the back seat, and any place that I woke up in southern California, I immediately knew where we
    were because I would remember the places from the times we had been there before.
- speaker: Respondent
  text: My father used to always get a one-month vacation in the summertime, and we used to travel, primarily back to Missouri
    to visit with my mother's relatives and my father's relatives. I can remember traveling from Los Angeles to Missouri in
    an old 1929 Chevrolet when none of the roads on Highway 66 were paved. The worst road of all on that trip was always around
    Gallup, New Mexico, and as late as 1939 that part of the road was still the worst part of the road on Highway 66.
- speaker: Respondent
  text: I used to attend summer camps with my father and mother, and all kinds of religious conventions. I can even remember
    that when I was in the sixth grade I heard E. Stanley Jones for the first time - the great Methodist missionary to India
    - and I was quite surprised that a lot of people didn't like him because they said he was a modernist. But even then,
    I thought he was a very wise man. One fact that I remember about myself in relationship to my father at this time was
    that I was constantly asking questions about theology. What do the Baptists believe? What do Methodists believe? What
    do Catholics believe? What do Christian Scientists believe? And we used to have hour upon hour about it.
- speaker: Respondent
  text: My father was a great story teller, and he used to tell many, many stories about his life as a young man in southern
    Missouri, especially about his old dog Dan, and about his brother, who was the most accurate rock thrower in southern
    Missouri and one of the great baseball players of that area. In fact, he was offered a contract with the St. Louis Cardinals
    one time, but his wife wouldn't let him take it because she wanted him to be a farmer, which he has been all his life.
- speaker: Respondent
  text: Southern California provided a lot of cultural advantages. I used to go to the Saturday noon symphonies down in the
    Philharmonic Auditorium put on by the Los Angeles Symphony, which I enjoyed immensely. And I remember many times going
    to the sunrise services at the Hollywood Bowl. I remember one time my father was asked to lead a sunrise service for a
    group of movie stars, which they went to on horseback, thirty miles. We had a sunrise service, and I got to go along.
    I got a new pair of boots and some new riding pants, and we went thirty miles on horseback - fifteen miles up to the place
    where they had it, and fifteen miles back. This was before the regular Easter service, at our church and I can remember
    that my father was complaining after the Easter service that he could hardly stand up to preach on that Sunday because
    he hurt so bad from riding horseback. And I could hardly sit down in the audience because I was in the same shape. But
    it was a great time and I enjoyed that very much.
- speaker: Respondent
  text: In that church my father had, we used to have concerts put on by WPA symphonies, and we even had at one time a group
    of Greeks who knew how to do the Greek Orthodox Mass, with Gregorian chants. They were a special WPA project, and they
    came and put up their paraphernalia in our Baptist church, and put on a complete religious service in the Greek Orthodox
    fashion. I can still remember that with much enjoyment.
- speaker: Respondent
  text: I was the first person ever baptized in the Roger Williams Baptist Church. It was on an Easter Sunday morning, and
    the church was not even finished. Everybody stood up on the bare floor, with no carpets and no pews, and the baptistery
    wasn't even complete, but we did it anyway.
- speaker: Respondent
  text: My mother was a very warm, friendly, person. She had never been to college, but she had a good high school education
    and was a very strong person. I was very attached to her. She used to suffer greatly when my father would be caught in
    church politics, which is not unknown, and she was very sensitive to the criticism of people of my father. Of course,
    I used to pick some of that up and became very partial to my father's side in any of those discussions. I think one of
    the tragic things of all of church life is the kinds of things that can happen within a church that make it almost unbearable
    for a minister. I have seen that happen to my father, and used to question, with great questions of great longing, why
    it was that people who were supposed to be Christians could act so mean to someone that they loved.
- speaker: Respondent
  text: We also used to, in some summers, go to the national parks in California. I can remember going to Sequoia National
    Park and Yosemite in an old 1929 Jewett and having to stop every mile on the way going up the hill to put more water in
    the radiator because it was boiling. But I can still look back at the time that we drove that 1929 Jewett through the
    Big Tree in Yosemite that you can drive a car through. I've done it many times since in much more modern cars. I can remember
    we had a Model T, and old Jewett, and an old Chevy - my father had a friend at the Felix Chevrolet Company in Los Angeles
    who used to always get him the best used Chevrolets that would come in a couple of years old - and we had a '29, and a
    '31 Chevrolet. We had that last car when we moved to Fresno.
- speaker: Respondent
  text: In 1936 we moved to Fresno, California. My father became the pastor of the First Baptist Church of Fresno - a very
    large church - fifteen hundred members - with a notable increase in salary. I should mention that, during the depression
    times in southern California, there were many days when we did not have any food to eat. At one time the church was $750
    behind in my father's salary, which was only $200 a month. And some wealthy people in the church kept us going by leaving
    boxes of groceries on our back doorstep. We were always very concerned whether or not we should even take it, but we were
    so hungry at times that we did. Finally my dad went to them and told them that he just wished they wouldn't, and we made
    out some other way, but I don't know how that was done. But in going to Fresno - this was in '36 - times were getting
    a little better. The salary was much better.
- speaker: Respondent
  text: I should give you an impression that I had in the election of President Roosevelt back in 1932. My father was an ardent
    Republican, and he thought that maybe the worst thing that ever happened to the country was when President Roosevelt was
    elected. And it wasn't so much his politics as the fact that it brought beer back into being. I grew up in life with a
    great distaste for people who smoked and who drank beer, and I now smoke, but I still can't stand the taste of beer so
    - [he laughs] - I wonder how far back that goes.
- speaker: Respondent
  text: Life in Fresno was much different than it was in southern California. At the beginning, in 1936, it was much more
    fun; the church was bigger, the people were warm and friendly. Fresno was a smaller town and you got to know people better.
    I went to the Alexander Hamilton Junior High School in Fresno. I always got very good grades in school, except in English,
    and that was always related to spelling. I always used to take band instead of study hall, and I always had extra units
    that way. I played the drums in the band and I used to be the assistant conductor for the school orchestra. On graduation
    day I conducted a Strauss waltz for a graduation ceremony ("Tales of Vienna Woods").
- speaker: Respondent
  text: While in Fresno, at the age of fourteen, I had a terrible time with hay fever and asthma and used to wake up at night
    with inability to breathe, so my father took me to the doctor. The doctor said he couldn't do anything for us but there
    was a specialist in Oakland who could. So we went to Oakland, and I had the full battery of skin tests and finally found
    that I was allergic to chicken, milk, eggs, butter, and wheat, and about everything else I could think of that any boy
    would like. I couldn't eat ham, orange juice, many things I had been eating. The doctor put me on a diet for two years
    and eliminated all of this that I had been eating. And in those two years I never had one attack of asthma. When I first
    went there, they took X-rays of my lungs, and he thought I had some kind of tumors of the lungs; and he sent them back
    to the Mayo Clinic because he had never seen anything like them. The Mayo Clinic sent them back and said, no, that they
    were calcium deposits from kind of a lung disease and that they didn't know what it was at that time. But, in treating
    my asthma, I had no trouble; I was very active in school. I used to play on the baseball team and was very active in church
    work, very active with the young people. And after two years, I was gradually allowed to go back on skim-
