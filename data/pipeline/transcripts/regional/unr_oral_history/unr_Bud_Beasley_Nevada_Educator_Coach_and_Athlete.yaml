collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: When and where were you born?
- speaker: Respondent
  text: I was born in Melrose, New Mexico, December 8, 1910.
- speaker: Interviewer
  text: Are you currently married?
- speaker: Respondent
  text: Yes, I am. My wife Nellie Beasley and I, we've been married forty years or more.
- speaker: Interviewer
  text: Do you have any children?
- speaker: Respondent
  text: No children of our own, but we have taken into our home and raised seventeen foster children.
- speaker: Interviewer
  text: So over a period of years, you didn't have them all at once?
- speaker: Respondent
  text: No, thank God! [laughter] No, from time to time. Some of them for a short time, and some of them quite a while.
- speaker: Interviewer
  text: So you must have a lot of foster grandchildren?
- speaker: Respondent
  text: 'That we have, [laughter] And they are scattered all over: Washington, Modesto, Sacramento, scattered all over the
    country. We still have pretty close contact with about twelve of them, and we get together for Christmas dinners and Thanksgiving
    and that sort of thing.'
- speaker: Interviewer
  text: Well, that's really nice. You say you were born in New Mexico. When did you come to Nevada?
- speaker: Respondent
  text: Well, to tell you the truth, I left New Mexico when I was about two years old and went to Texas, and I was in Texas
    up until about age eight, and around eight or ten, I came from Texas to California and went to grammar school and high
    school in Santa Cruz.
- speaker: Interviewer
  text: So when did you come to Nevada then?
- speaker: Respondent
  text: After I got out of high school. In high school I played football, basketball, baseball, and one of my coaches was
    the famous Rabbit Bradshaw that became the All American at Nevada. Rabbit Bradshaw was my coach in high school, and he
    kept talking, "Nevada, Nevada." So in 1930 I came to the University of Nevada on a football scholarship and played football
    at the university from 1930 to 1934. I was a halfback and a quarterback on the football team at the University of Nevada.
- speaker: Interviewer
  text: Did your parents come with you then, or did they stay?
- speaker: Respondent
  text: No, I was on my own, totally on my own.
- speaker: Interviewer
  text: You mentioned to me that you'd met Pappy Smith of Harolds Club at Santa Cruz at some time. Was that before you went
    to the University of Nevada?
- speaker: Respondent
  text: Yes, I was still in high school, and I was working on the boardwalk at Santa Cruz, and Pappy Smith had a concession
    on the boardwalk there, and I had a soft drink concession and spieled for some of the other events on the boardwalk. Once
    in a while we worked state fairs and carnivals, and I got to know Pappy Smith long before he was coming to Reno, [laughter]
- speaker: Interviewer
  text: So the carnivals had a route that they went to, and you'd see him at different places?
- speaker: Interviewer
  text: You mentioned the sports that you played in college, mainly football. Did you play baseball and basketball?
- speaker: Respondent
  text: I played freshman basketball at the University of Nevada, and our football coach at that time was Philbrook out of
    Notre Dame, and Philbrook was also the freshman basketball coach. So I played freshman basketball for Philbrook. Doc Martie
    was the varsity coach, of course - the very colorful Dr. Martie - and one of the players that I played against as a freshman
    was Jake Lawlor. Then, at the university at that time they had no organized baseball, but they had a very strong and fast
    inter-fraternity league, and we played there on the university campus on a very, very poor field, dirt field, under very
    poor conditions, [laughter] It was located somewhat where the economics buildings are located now. Then, during the time
    that I was going to the University of Nevada, I was also playing baseball for Jack Threlkel, who had a very fast semi-pro
    team.
- speaker: Interviewer
  text: So this would be in early 1930?
- speaker: Respondent
  text: That's right - early 1930s, 1933, 1934, particularly.
- speaker: Interviewer
  text: So you mentioned the inter-fraternity teams. If you weren't in a fraternity you couldn't play baseball, then? Or did
    they have some independents?
- speaker: Respondent
  text: Well, you played inter-fraternity ball, and then you played summer ball with Jack Threlkel and Lovelock and Fallon
    and teams like that. Well, we had a very fast Sagebrush League, then.
- speaker: Interviewer
  text: Wait a minute. In that fraternity baseball, about how many teams would there be? Would every fraternity have a team?
- speaker: Respondent
  text: Just about. Yes. There were about eight teams in there, and it was a good, fast fraternity league. Quite a few of
    the fellows in it played summer baseball when school was out.
- speaker: Interviewer
  text: Who organized the team, then? Did each fraternity have their own manager? Did you manage one?
- speaker: Respondent
  text: Right, each fraternity had their own manager, and it was sort of like an inter-scholastic league, but all fraternities
    were involved in it, and Jake Lawlor and Tommy Hill and Oscar Freitag and the Peccoles. They played in that league.
- speaker: Interviewer
  text: Oh, they were all at the university at the same time?
- speaker: Respondent
  text: Yes, all at the university at that time.
- speaker: Interviewer
  text: So how about basketball? Were there any basketball teams there, then?
- speaker: Respondent
  text: Basketball was very popular on campus. The coach was Doc Martie, and he was a good one. He produced some of the finest
    college teams, for a small school. He was playing St. Mary's and Santa Clara and San Jose, Fresno, San Francisco. And
