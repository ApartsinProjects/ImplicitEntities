collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: Well, starting with when I had already arrived in 1907, June 28, 1907, the family was living in Clearwater, California,
    in a little red house down in the salt grass country where my grandparents on both sides had come out to settle. Without
    going back into my grandparent's background, why, my mother's folks came from the South and had the typical viewpoint
    about things (of a southerner) and had, along with her parents and others, the attitude of the South toward a lot of things,
    including the slave problem and everything else. And I might say at this point that she certainly didn't have any bias
    against the Negro race. She knew that they were mostly uneducated, at the time she knew anything about 'em and her folks
    knew anything about 'em. You have to relate it to the situation of the background. She felt that the North had been very
    disruptive in the way they handled this whole situation and that the South was much kinder to the Negro, really; and had
    been much more sympathetic toward the Negro than developed out of what came later. But, of course, they did not - at that
    time - treat them as equals. All right. So that was where she came from. Mother's maiden name was Elizabeth Lewis, and
    she had brothers John, Andrew and George.
- speaker: Respondent
  text: Well, on my father's side, his father was a Scotchman and had a broad brogue that you could hardly understand, and
    he played the fiddle. And later on he offered to give me the old fiddle that he had bought when he was a young fella.
    And I ultimately wound up learning to play just enough so that he gave me the fiddle. And I've had a lot of fun with that
    fiddle. I've still got it. I don't play it very much, unless I get down to the old Pioche house, and we have a party going
    on and play the player piano, and then I can play the fiddle a little bit along with the piano to drown me out. Pump the
    piano, and play the fiddle, and have everybody singing. So the fiddle that he gave me has been a real good thing to have,
    and I've had a lot of fun with it.
- speaker: Respondent
  text: Well, coming back to my mother. She was a strict Presbyterian and believed very strongly in her religion, and did
    what she could to get us kids to grow up and became baptized into the church and so forth, and did what she could to get
    us to attend. And I wasn't very good at attending, and if I could get out of it, because of a trip into the mountains
    with my dog and my friends, or something like that, she was pretty liberal and would let me do that. But if you didn't
    have a good reason, why, you had to go to church when I was a young, little kid. And as we grew up, she started out before
    we could read, reading to us - a lot. At bedtime, we'd practically all go to sleep while she was reading to us. She never
    did take on a job for hire at anytime. She spent her whole lifetime, while the family was growing up, tending to the family
    and doing what she could to train us. She had gone to normal school and learned to be a teacher, which I suppose didn't
    involve any more than today you'd get going to high school, I suppose, because that's the way they did then; and they
    didn't really turn out too bad a teacher. She was a good teacher - for us. For instance, it's no credit to me, but it's
    a credit to her, that although I went through school and never did have enough English grammar to be able to conjugate
    a sentence (and I hardly know what it means to this day), still I got very good grades in English all the way through,
    because it's just the way - you know, like you can teach the parrot I guess, to talk. Right?
- speaker: Respondent
  text: On the other hand, I might throw in a little comment here; that in high school, I was trying to get through two years
    of Spanish. It took me three and a half years to get through two years of Spanish because there was too much of it that
    was taught on the basis of English grammar. And if they'd taught me like the parrot, I'm sure I wouldn't have had any
    trouble [laughs]. Fortunately, my violin, and my music, and natural ear for music and everything got me by so I got recommended
    credits that substituted for the poor credits in Spanish [laughs].
- speaker: Respondent
  text: Another thing I might say about my mother, and I think this is very important because it's followed me throughout
    my lifetime, and I see it more myself now than I did earlier. That is this; she didn't want to hear things that were bad.
    She preferred to ignore what was bad, unless you can do something about it. If you couldn't do anything about it, you
    just don't want to think about it. And I relate this now to a lot of the things I see on the television (sometimes I like
    to call it the "idiot box") where they emphasize so much of what's bad, or a disaster, and all the rest of this stuff
    that's going on in the world, and I think that maybe a lot of people have already had things to say about that, but it
