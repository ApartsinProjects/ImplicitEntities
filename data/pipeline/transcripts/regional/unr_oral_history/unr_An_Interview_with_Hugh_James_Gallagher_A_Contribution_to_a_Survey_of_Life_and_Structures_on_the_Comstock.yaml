collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Where were you born and when?
- speaker: Respondent
  text: 'I was born on 17 July 1920 here in Virginia City on A Street affectionately known as Ophir Heights by those of us
    who grew up in that area: the Kendalls and the Cobbs and the Collettis and so forth. We used to refer to it in jest as
    Ophir Heights.'
- speaker: Interviewer
  text: Why did you call it Ophir Heights?
- speaker: Respondent
  text: Well, it's on the Ophir mine property up on the hill, and when we grew up heights were areas where those people of
    means used to live, so we used to joke about that and call the area Ophir Heights.
- speaker: Interviewer
  text: Was there mining or is there a pit back there?
- speaker: Respondent
  text: No. The last shaft of the Ophir mine was located about 3 blocks down the hill. But there were glory holes and open-pit
    mines and small shafts just behind my house. For instance there's the Andes shaft and [other shafts] all over this area.
    And you live with those things.
- speaker: Interviewer
  text: What are the full names of your parents?
- speaker: Respondent
  text: 'My mother''s name was Mary, and her maiden name was Haffey. My father''s name was Hugh Gallagher. Mary Haffey was
    born and raised in Plumas County [California] area in Gibsonville; last time I was there about 20 years ago there was
    one house in Gibsonville. It''s located about 8 miles from LaPort, about 25 miles from Johnsville, 35 miles from Quincy.
    It was a great mining area at one time, and her family was in the mining business there, working in the mines, and of
    course, they always looked at the Comstock. I''m sure they made trips over here, and that''s probably how she got acquainted
    with my father.


    My father was born in Gold Hill. His father, Neil Gallagher, came from Ireland by way of Pennsylvania. He evidently left
    [Ireland] during the potato famine and worked in coal mines in Pennsylvania. But then the great magnetic pull, I guess
    - the Comstock - even reached to the East into Pennsylvania. He came to make his fortune on the Comstock - Gold Hill -
    and began raising his family.


    He as a very young man - 29 years of age - was killed in the Yellow Jacket mine in a shaft accident; he was a shaft man.
    They were always sinking the shaft; there were 4-compartment shafts in the mines. One compartment was always sinking,
    and they were sinking down below the 3000-foot level, and they were just ready to come up for dinner - they always came
    to the surface for dinner - and a cage was going up in another compartment with some steel on it - drills and so forth
    to be sharpened up on the surface. Evidently one of them - and this was an accident that was common in mines - got loose,
    hit the timber alongside the shaft, tipped all of that steel over and the small car that was on it. Tipped it down onto
    those men down below. There were 8 men working down there; 5 of them were killed outright, including my grandfather. One
    died the next day. Six out of those 8 men - one of the horrible accidents. That happened in 1880.


    My grandfather was 29 years of age. He had 2 children at the time, one about 6 and one about 9 years of age.


    Three weeks after that tragic accident my father was born, July 10, 1880. So my father and my grandmother of course had
    to find some means of livelihood. There was no social security at that time, no industrial insurance. They didn''t even
    have life insurance. So just those little bits of remuneration that they would get from a very generous miners'' union
    and the miners who worked with them was gone in a very short period of time. She started a boardinghouse and raised her
    family. My father got to the age where he could go to work in the mines; they would accept then in there as young men
    12, 14 years of age. [He] finished the eighth grade, and then he went to work in the mines to [help] support my mother
    and the other 2 children.'
- speaker: Interviewer
  text: Where was your grandmother's boardinghouse?
- speaker: Respondent
  text: In Gold Hill there's a monument, the Liberty Engine Company Volunteer Fire Department monument. It's just below there.
    The building is long gone, but that's where it was located, right on the main drag, above the business district of Gold
    Hill, which had banks and stock brokerages and things like that. That was a tremendous busy part of the Comstock in the
    1880s.
- speaker: Interviewer
  text: What year did your grandfather come to this country?
- speaker: Respondent
  text: 'I''m not sure. I had talked to my father on occasions about this, but my father passed away in 1948, and so a lot
    of the things that he told me have escaped me. But if he was 29 years of age when he lost his life, and he had been in
    Pennsylvania in the mines for a while, he must have been very young, probably a teenager when he came to the United States
    from the Great Emerald Isle, [laughter]


    Neil Gallagher was about 9 years of age at the time my dad was born, and he had a sister, Elizabeth, about 6. When they
    reached the age where they could take care of themselves, they went to San Francisco, and my aunt had a job. I don''t
    particularly remember what she did, but my uncle, Neil Gallagher, was a policeman; [he] retired as a police officer in
    San Francisco.'
- speaker: Interviewer
  text: Then what did your father do?
- speaker: Respondent
  text: My father worked around the mines; pretty near all hi
