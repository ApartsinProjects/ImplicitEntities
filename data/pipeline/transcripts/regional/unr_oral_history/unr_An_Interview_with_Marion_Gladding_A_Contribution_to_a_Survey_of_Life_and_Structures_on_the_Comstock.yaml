turns:
- speaker: Respondent
  text: 'My full name is Marion Andrea Andreasen Gladding. I was born on Washington Street in Virginia City, Nevada - Storey
    County - 6 April 1910. Washington Street is one of the side streets that leads from C Street down toward the hospital.
    The doctor who delivered me was Fred Hodgins. My father''s name was Frederik Andreasen; my mother''s name was Alice Berry
    - they had no middle name. I had 3 brothers: Frederik Alvin Andreasen, Clinton Bendt Andreasen and Earl Nels Andreasen.'
- speaker: Interviewer
  text: Who was the first member of your mother's family to move to the Comstock?
- speaker: Respondent
  text: My grandfather, Thomas James Berry, came to this area from England in 1873. He was following his stepfather who had
    left England and had taken the records of his birth with him. My grandfather wanted to get them back because of an inheritance,
    but he never caught up with him, so he could never claim his inheritance. Grandfather came to Virginia City right at the
    height of its boom days. He was impressed not only with the boom and all the activity, but with the country and its beauty.
    At that time he became familiar with Six Mile Canyon and the Flowery district, and he had it in his mind to make his permanent
    home here. He went back to England and married my grandmother, Sarah Jane Bentham, in a small town named Hulme in Lancaster
    County, England. They had 3 little girls, the younger one of the 3 was born in 1880, and soon after that they returned
    to Virginia City, Nevada. They settled in Seven Mile Canyon, which is in the Flowery district.
- speaker: Interviewer
  text: Where is that located?
- speaker: Respondent
  text: It's east of Virginia City. There are 2 canyons, Seven Mile Canyon and Six Mile Canyon, which together comprise the
    whole of the Flowery district. The mouth of Six Mile Canyon is not even half a mile from Virginia City, and Seven Mile
    Canyon runs into Six Mile Canyon.
- speaker: Interviewer
  text: What did your grandfather do after he came back and settled with your grandmother in the Flowery district?
- speaker: Respondent
  text: 'They lived in Seven Mile Canyon, and he worked in the mines in Virginia City. The first winter was very difficult
    for him. It was a bad winter, and he had to walk from his home in Seven Mile Canyon to his place of work. He used to tell
    us about the coyotes tracking him up Seven Mile Canyon: when he stopped, they stopped; when he moved, they moved.'
- speaker: Interviewer
  text: He was getting a little nervous?
- speaker: Respondent
  text: I'm sure he was. [laughter] Well, they didn't live in Seven Mile Canyon very long. He built a home in Six Mile Canyon.
    It was a large house because his family was increasing all the time.
- speaker: Interviewer
  text: Then your grandfather was a miner when he came back to Virginia City?
- speaker: Respondent
  text: That is what he did when he came to Virginia City; before that, in England, he was a carpenter. He became very well
    known here. They called him "Strawberry" because he had red hair. He was very talented and could sing and dance and was
    in demand at parties and entertainments. He had a very good time, I'm sure.
- speaker: Interviewer
  text: Were there many houses in Six Mile Canyon when your grandparents settled there?
- speaker: Respondent
  text: Yes, and not only houses but other structures as well.
- speaker: Interviewer
  text: Could you tell me of some of these structures?
- speaker: Respondent
  text: At the head of Six Mile Canyon is the Storey County Hospital, and a little further down was Schnitzer's brewery, a
    beautiful old building, which was in very good condition until 1983 when it burned down. The Schnitzer family made their
    own beer, and the brewery was a very popular place with the miners coming off of shift and with other people around Virginia
    City. Then, further down the canyon, there was another small saloon run by a petite little lady named Fanny O'Mare. Now,
    Fanny was supposed to be French; she spoke French fluently and cooked French meals, but apparently she was also Irish
    because she spoke with an Irish accent - it was a nice combination. I remember Fanny O'Mare.
- speaker: Interviewer
  text: Did she serve French meals in her saloon?
- speaker: Respondent
  text: Only to her friends. Her way of cooking was different from my grandparents', but they were among some of her guests.
    My grandfather especially liked the way she cooked leg of lamb, so he bought a leg of lamb, and she fixed it for him with
    slits and inserted garlic in the lamb. When he brought it home my grandmother threw it out; she thought it was bad! [laughter]
    Further down the canyon there was another saloon operated by a family by the name of Carney. It was in a small building,
    and there was a spring right at the saloon. In fact, there was a spring at Fanny O'Mare's, too. That was one reason they
