collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Tell me where you were born and raised.
- speaker: Respondent
  text: I was born in Italy on April 27, 1910.
- speaker: Interviewer
  text: And how did you come to be in Italy?
- speaker: Respondent
  text: Well, my mother and father were married in a place called Delzell, Illinois, and his folks lived in an area not far
    from a place called Rocca Corneta, which is about fifty miles from Bologna. They were very wealthy people. They owned
    practically all the countryside. It was on the Reno River in Italy, and I'm trying to figure out what the name of that
    little town is.
- speaker: Interviewer
  text: Well, it might come back to you, then. But they owned a lot of land in that area?
- speaker: Respondent
  text: Oh, much land. Much land. There were six boys and two girls in the family, and none of them ever worked. I don't know
    which ones were the last to die, because I was never close to the family. My dad left my mother. I was born shortly after
    they went to Italy and visited with his folks. And then he got a cockamamie excuse that he had to come back, that he was
    called into the service, and she never saw him again. He left her there, and we were there until I was five before we
    could make arrangements to get back. When we got back to Illinois in this same town, Delzell, she divorced my father.
- speaker: Interviewer
  text: So, if you were there until you were five, Italian must be your native language, then?
- speaker: Respondent
  text: 'I spoke Italian fluently. When my mother married my stepfather in Salt Lake City, Utah, we were continually moving
    from one mining camp to another, and most of the miners were foreigners: Italian, Mexican, Serbian, Swedes, Cousin Jacks,
    Englishmen - every nationality. I naturally went to school and associated with all these foreign kids, and we visited
    from home to home. Most of these kids didn''t want to speak their parents'' tongue, for some reason. Never bothered me.
    I used to like to talk with their parents, and in their language. And I got so I knew practically every one of these foreign
    languages. Today, I can still remember a few words in various languages, but not too well.'
- speaker: Respondent
  text: There were Italians. In fact, my folks - after my mother married my stepfather who was also Italian - spoke Italian
    in the home amongst themselves. I got so I could speak Italian as well as they could. After I began working in the mines,
    everywhere I went, there were Italians as well as Swedes and all the other nationalities. I spoke Italian with these Italians,
    and they were so impressed with the fact that I could speak Italian that they helped me all they could. I mean, getting
    fluent in Italian, again, was nothing. I got to the point where I not only spoke Italian - the fluent Italian language
    - but I knew every dialect of the Italians in Italy, and there's a lot of them. People in those days, from a town ten
    miles or so away from where they lived - they all spoke Italian, but a different dialect. Some of the people in this one
    particular town had never been as far as the other town, and when they left, they came to America or to Australia or to
    South America, wherever they were going.
- speaker: Respondent
  text: I got to where I enjoyed speaking Italian. I knew every dialect.
- speaker: Interviewer
  text: You learned it from the other miners?
- speaker: Respondent
  text: From the other miners. From the Tuscans, the Bergamasks, the Venitians, every dialect I knew. And they so enjoyed
    me speaking their dialect with them. They really thought this was something; they'd laugh and laugh. And I learned every
    song. I could sing it, I could read it, I could write it, I knew every dirty joke, [laughter] I thoroughly enjoyed speaking,
    not only Italian, but the other languages that I learned, particularly when I was in Bingham, Utah, during World War I
    and going to school there. Most of the foreigners there were Serbians and Austrians, and I got pretty good at those languages,
    but I can't remember any of that anymore. As I say, I can speak a few words in one or another.
- speaker: Respondent
  text: In 1920, my stepfather, who was a mechanic and a miner, got a contract to drill an irrigation tunnel from a place
    known as Sanpete County. A man there, a rancher named Chris Larson, had thousands of acres of land but no water - I mean,
    not enough water to irrigate them. He somehow obtained water rights on the other side of the mountain and almost to the
    top of the mountain where... Oh, I couldn't think now. The vertical distance from one valley to the side that came down
    into this valley. But the tunnel length was... I couldn't remember that exactly, either, but it was about a mile. He got
    a contract to drill a tunnel through there to pick up the water on one side and bring it into the other side.
- speaker: Respondent
  text: I think it took him better than a year to do that.
- speaker: Respondent
  text: By then he had made so many friends, and he was quite a mechanic on anything. Automobiles were coming along about
    then, and he was interested in working on automobiles. He got a job as a mechanic in the Hupmobile garage. That is not
    the name of the garage, but they had the Hupmobile agency.
- speaker: Interviewer
  text: Did they sell Hupmobiles, too?
- speaker: Respondent
  text: Yes, they did. That and Model-T Fords. I grew up with the people there in Ephraim. We were the only gentiles in town.
    The rest were all Mormons, solid Mormons. I associated with those kids, whose families were either Swede or Danes or Norwegians.
    There, again, in visiting in their homes, the old folks spoke their language. The kids didn't want to. I would speak with
    their parents and enjoyed it, and I learned those languages. But in this town of Ephraim, there was very little work.
    The only work was ranching, and I got into it. The kids there, when they were big enough to sit on a plow or drive a team
    of horses, they worked. Seeing a seven or eight or nine-year-old boy out driving a team plowing was nothing. The horses
    knew what to do, and all the boy had to do was sit on the plow, and the horses took care of the rest. But everyone had
    to work.
- speaker: Interviewer
  text: And where did your mom and stepdad get married?
- speaker: Respondent
  text: They married in Salt Lake City.
- speaker: Interviewer
  text: But they met in a mining town?
- speaker: Respondent
  text: They met at the mining camp of Ophir, Utah.
- speaker: Interviewer
  text: How old were you when you started working on the ranches?
- speaker: Respondent
  text: I was about ten. When I was eleven, I decided to leave home, and I got a job as a camp tender at a sheep camp.
- speaker: Respondent
  text: I forgot to tell my mother that I was leaving, and I left and went up to this sheep camp. I had quite an experience.
    If you read my book, I described that. I was going up there with a string of seven pack horses. One old mare had a colt,
    and he was scurrying around and bothering her. We were going up a steep side hill at an elevation of about ten thousand
    feet, and he pushed his mother off balance, and she rolled down the mountain. Well, the horses were tied nose to tail,
    and I had a whole mess of horses scrambling around trying to get up, and all the rock salt and groceries I had on those
    horses was scattered around the mountain. I was eleven years old. I was riding a very, very cool, calm horse, and he saved
    the day. I gathered what I could and packed up. I found this sheep camp where I was going to, and I don't know how, but
    I managed it. I was there that time, I think, eleven days, and I got a spot of dysentery, and I had to go home. And that's
    the first time my mother knew where I'd been.
- speaker: Respondent
  text: I did some awful things to my mother when I was a kid.
- speaker: Interviewer
  text: You were adventuring, yes?
- speaker: Respondent
  text: Yes. Anyway, I worked every summer on ranches. I herded sheep. When I was thirteen, I had an entire band of sheep,
    and I lambed it all alone while living in the camp wagon. I was the help. The boss's son was supposed to stay there and
    do the work, but he was busy chasing girls. He found out I could do the work, and I practically lambed a thousand head
    of sheep. I had sheep in the camp wagon, under the bed, in the bed, in the oven, anything to keep them from freezing to
    death - for the lambs that the mother died. They were called "beeter" lambs. I don't know what that ever meant. I never
    tried to figure that out. But I did that, and I followed threshing machines. I pitched hay. I did everything in connection
