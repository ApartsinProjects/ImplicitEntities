collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: There are a number of topics that I want to discuss with you today, we're going to be talking about Laverone, about
    how Indians got along with non-Indians here in Gardnerville, about various legends - a lot of things like that. But before
    we get started on that, I need to get a little biographical information from you.
- speaker: Respondent
  text: I was born right here in Douglas County in or about Minden, somewhere around 1920; it was October 23.
- speaker: Interviewer
  text: Do you know about where your home was located at that time? If you had to place it in relation to today's buildings,
    where would it be?
- speaker: Respondent
  text: It would be down east of Minden, east of the railroad track. There used to be a railroad there at one time. East of
    there in the willows, that's where most of the Indians used to live. I mean that's the way they lived. They lived wherever
    they worked, where old people worked.
- speaker: Interviewer
  text: Did your father work back there?
- speaker: Respondent
  text: Yes, he worked for Heise Land and Livestock Company.
- speaker: Interviewer
  text: And that was their land out there that you were born on?
- speaker: Respondent
  text: No, my mother stayed there, and he'd go back and forth. He had a Model T Ford, and he'd go back and forth from there
    to there. That's the way he came to work every day. That's about all I know about him.
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: Tom Sallee.
- speaker: Interviewer
  text: Did he have an Indian name, Washo name?
- speaker: Respondent
  text: His real name, I come to think of it now, was Jack Nye. That's what his name was when he went to school in Stewart
    when it first opened up in the 1800s.
- speaker: Interviewer
  text: But he changed his name to Tom Sallee?
- speaker: Respondent
  text: Yes, some reason; I don't know why, because he never explained it to me.
- speaker: Interviewer
  text: Yes. Did he have a Washo name?
- speaker: Respondent
  text: Not that I know of.
- speaker: Respondent
  text: It means that...like, if you leave a kid, then he wants to go with you, then he cries; that's what it means.
- speaker: Interviewer
  text: Your mother's name - can you tell me what that was?
- speaker: Respondent
  text: Well, I don't know her by her name, but Buena Johnson.
- speaker: Interviewer
  text: You don't know her by her Washo name?
- speaker: Respondent
  text: Yes, that's the same thing.
- speaker: Interviewer
  text: Does that have a meaning to it?
- speaker: Respondent
  text: No, it's just a name.
