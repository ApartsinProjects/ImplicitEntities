source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: Marietta Hungerford Dana was my grandmother. Her mother, Margaret Kennedy, married Charles Dana - and the ancestry
    goes right back to Richard Dana, the author. My grandfather who married her was Henry Kingsley, and his brother was Ezra
    Kingsley. They were born in Pennsylvania and then went to Hammond, New York. They fell in love with the two Dana sisters.
    They formed, with others of upper New York State, a wagon train that joined another wagon train in Independence, Missouri.
    Mother's mother had one other daughter, Armanda, who was born before my mother. She died of cholera on the North Platte
    River and was buried there. The Indians did not attack the wagon trains that they came in, although they had rumors they
    were coming. Mother did not mention anything about their food except they were very well-equipped with everything. They
    came, the Motts and themselves. Vira Thatcher was a descendant of the Mott family. They are Nevada people, too.
- speaker: Respondent
  text: Then they came to Nevada. My mother said that the Kingsley's wagon train and the Motts' were the biggest to cross
    in 1852. They were the best because they were better equipped with cattle, horses and everything. So they came to Salt
    Lake City. My grandmother danced with Brigham Young; they had quite a gala time in Salt Lake City that winter. Then they
    came on to Placerville.
- speaker: Respondent
  text: My mother, Llora Evelyn Kingsley, was born on one side of Placerville, Coon Hollow; and her sister, Isadora Kingsley
    was born at Buckeye Plat on the other side. Even with the ownership and the responsibility of having a tavern, they also
    panned gold, naturally.
- speaker: Respondent
  text: The living at Placerville wasn't too difficult. Mother told me they had a nice tavern and the social life was very
    nice, too; of the gentleman-and-lady type. They were not snobs, but they were exclusive. They just didn't go with everybody;
    that was it.
- speaker: Respondent
  text: There were plenty of forms of recreation. There was a lot of needlework, knitting and crocheting, and embroidery.
    They loved to go out huckleberry picking and hiking, too; they liked that. And the ladies would get together to have social
    affairs. They had sewing circles, too. I have other names and records that I've kept of their social life. They made trips
    everywhere, too; Diamond Springs, Shingle Springs, Markleeville, and back to Placerville all by stage. They rode horseback.
- speaker: Respondent
  text: Then they moved on to Markleeville, and stayed there for some time. My mother's chum there was former Mayor (of Reno)
    Stewart's mother, Mary Duffy Stewart. Life in Markleeville was very typical of Placerville. It was crowded. They always
    waited for the stage to come in to bring the mail and take them on trips.
- speaker: Respondent
  text: Well, then from Markleeville they went on to Genoa, Nevada, where another daughter was born. That was Adele Kingsley
    (later taking the name Waters from her step-father) who later became a very famous actress with David Belasco, with McKey
    Ranken, and with Nat Goodwin. She made her debut with Fannie Davenport, which is interesting. I have all the accounts
    of her successes in San Francisco and in Virginia City, and all through the East where she went with the stock company.
- speaker: Respondent
  text: Then from Genoa they went to Gold Hill, still with a hotel and still panning for gold. They had many dances at the
    International Hotel and wore gorgeous clothes. They sent East for their beautiful things. Then they came on to Carson
    City and bought the old White House which was a hotel. It had formerly been a Pony Express stop.
- speaker: Respondent
  text: My grandmother, Marietta Hungerford Kingsley, divorced her husband and married Dr. John W. Waters, who came to Carson
    from Baltimore, Maryland. He became a messenger boy in the Mint in Washington, D. C. Then Colonel Abe Curry wanted some
    messenger boys for the opening of the Mint in Carson City, so they sent from Washington five young men. I believe one
    was Johnny Ince of the Ince Movie Picture (I mean later), and my father. There were five of them altogether.
- speaker: Respondent
  text: Coming to Nevada in 1869, my father took the ship from Baltimore to Panama. Of course there was no canal, so he came
    across the Isthmus by train and took another ship on the West Coast and came up. I don't know how many days and months
    it took to get to San Francisco. Then from San Francisco he took a train to Sacramento; and then from Sacramento, the
    stage coach to Carson City. He went to the White House to live.
- speaker: Respondent
  text: So the romance started when my mother was very young.
- speaker: Respondent
  text: Mother was in Misses Clapp and Babcock exclusive school for girls and so was her sister, Isadora. The other sister
    went to San Francisco to study dramatics. My grandmother, my mother's mother, didn't approve of her getting married so
    young.
- speaker: Respondent
  text: Father was quite young, too. Mother used to go to the Virginia and Truckee Railroad - right close to the Mint - and
    put pins on the track and make scissors. The pins would be flattened by the train's wheels, and they called the flattened
    pins scissors. When it was time for the Mint to close, Father would escort her home. So, they were married.
- speaker: Respondent
  text: Another of the young men who lived at the White House was Richard Edward Kelly. He was from England, and on his mother's
    side was a close relative of Queen Victoria. The name Kelly, of course, in his father's. He fell in love with my mother's
    sister, Isadora, and they were married. Where the Schultz's lived was their home in Carson City. That is now where Mrs.
    Raycraft and her sister, Mrs. Montrose, live. They were the Schultz girls. That was my aunt's home. So the romances from
    the White House included both of the sisters.
- speaker: Respondent
  text: The Kelly's had two children; Edward who died at the age of three, and Pansy who was considered the most beautiful
    girl in San Francisco society of that time.
- speaker: Respondent
  text: I think Paris Ellis and George Mills came to the White House, too. So did A. M. Ardery who was with the Virginia and
    Truckee Railroad. His wife was a Ferris, and that's the family of the man who invented the Ferris Wheel. Then Father went
    from messenger to chief clerk and then to be superintendent, appointed by Benjamin Harrison. I have that appointment and
    certificate. Then after he left the Mint, he went into mining with Jim Butler, Frank Golden, George Wingfield and Cal
    Brougher out in Tonopah and Goldfield. He was also in the insurance business and in real estate in Carson. He was with
    Mr. Morris Cohn, the attorney, I recall quite clearly, as a friend and in the settlement in Smith Valley.
- speaker: Respondent
  text: He had a commission to bring German settlers, but the date I have now forgotten. And then he was State Bank Examiner.
    He was well informed about Goldfield when Bernard Baruch was up there, and William Randolph Hearst. George Wingfield and
    my father and Jim Butler and Cal Brougher struck it rich in Tonopah. Of course, all was prosperity then.
- speaker: Respondent
  text: My mother and father had six children. The oldest was Theodore Robert Hofer, Jr. He went to Rensselaer Polytechnic
    in Troy, New York, but that was too far away to suit my mother and father. So they brought him back so he would be closer.
    He entered Stanford where President Hoover waited on his table. His best friends were Will and Wallace Irwin, the journalists,
    and Fred Marriott, whose father was editor of the Call, one of the papers in San Francisco. So they would come up, these
    boys, every summer to our cottage at Fake Tahoe and of course they would come down to Carson, too.
- speaker: Respondent
  text: At Senator Stewart's home, he was raising his granddaughter. She fell in love with my brother and he with her. So
    he would not go back to Stanford. I don't know just how many years he had, just one more to finish I think. But they wanted
    to get married, so he taught school.
- speaker: Respondent
  text: Senator Stewart's granddaughter, Bessie, (her grandmother was Mrs. Foote) was born in Bodie. Her mother was divorced
