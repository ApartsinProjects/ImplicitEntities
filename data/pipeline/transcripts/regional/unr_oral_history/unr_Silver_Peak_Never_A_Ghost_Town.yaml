collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: What was it about Silver Peak that lured miners and their families and never entirely released its hold on them?
- speaker: Respondent
  text: Known for its minerals - gold, silver, and lithium - Mineral Ridge District mines have proven among Nevada's most
    productive. By the time World War II arrived and the October 1942 War Production Board Order L-208 suspended nearly all
    mining of precious metals, Mineral Ridge was one of Nevada's top thirteen producers, yielding more than $10 million in
    riches. It ranked along with Virginia City, Eureka, Aurora, Goldfield, and Tonopah. One of the oldest, continuously active
    districts in the state, Mineral Ridge mines produced more gold and silver than some of Nevada's legendary ghost towns,
    yet Silver Peak never gained the fame that settled upon the other rip-roaring mining camps. Why? And why did Silver Peak
    survive when other mining camps did not?
- speaker: Interviewer
  text: What clues begin to appear as you drive into Silver Peak that help explain its survival?
- speaker: Respondent
  text: Clues to these questions begin appearing as you drive into town past the unexpected, black cinder cone jutting out
    at the base of the foothills, a startling leftover from an infant volcano. A cool lake turns out to be nothing more than
    a beckoning desert mirage, the shimmering welcome of hot summer sun on the salt flats of the Clayton Valley playa. Here
    and there, the trained eye can spot old tailings from early stamp mills fanning out near the edge of the playa. The nature
    of the gold and silver, the location, and the innovations necessary to extract them from the ore determined part of the
    story. Unlike California's placer mines or the Comstock Lode at Virginia City, Silver Peak's ore was different. It challenged
    early-day miners to stretch their ingenuity and learn the latest in technology, drawing them from hardrock surface mines
    to deep underground mines then back again to open pits on the surface. The design of mills changed from traditional stamp
    mills to experiments with the new cyanide and later the heap-leach processes. Today, chemical "mining" of lithium has
    been added to Silver Peak's resources.
- speaker: Interviewer
  text: What do residents say about living in Silver Peak?
- speaker: Respondent
  text: But landscape alone cannot tell Silver Peak's story. Right at the edge of town residents advertise their devotion
    to "The Peak." A sign on one modular home announces, "A Virtual Paradise." To newcomers, that may seem a satirical comment
    on the dry desert climate or a take-off on computerese. But to those autonomous souls who live and work there, the sign
    is just plain common sense. Talk to the town's inhabitants at the Dew Drop Inn (the only cafe/bar/quick-stop-grocery-store
    open in the summer of 1996), and each will tell you a different version about what makes Silver Peak special.
