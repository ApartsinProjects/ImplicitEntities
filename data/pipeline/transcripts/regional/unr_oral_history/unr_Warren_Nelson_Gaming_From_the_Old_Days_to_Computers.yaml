collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: Lawrence Nelson; he was a chef of Danish extraction. He had been raised in Oregon. My grandfather came over from Denmark
    and joined the Northern army in the Civil War. At that time the name was Nelsen, s-e-n, but my grandfather's poor English
    and the lack of understanding of the sergeant that enlisted him put it down s-o-n, so since then it's been N-e-l-s-o-n.
- speaker: Respondent
  text: My mother's name was Bertha Meisenbach. Her parents were born in Luxemberger. She came out to Montana from St. Louis
    as a young girl and married my father. I had a lot of relatives around Montana, on my mother's side all German and Luxemberger
    extraction. I spent quite a bit of time with them up to the time I was five years old. At that time my mother became ill
    and died delivering a child; the child died too. Since then I have had no brothers or sisters.
- speaker: Respondent
  text: After my mother's death, my father was a cook, a chef, in a restaurant there and couldn't take care of me. I have
    people who I call aunt and uncle but who were actually my second cousins that took me down to a little town called Hysham,
    in southern Montana. Hysham was the county seat of the smallest county in Montana called Treasure County. It would be
    hard to believe that this was a real wild county in those days, there were cowboys who came to town on Saturday night
    with their pistols on their hip, and there was a shooting most every week.
- speaker: Respondent
  text: We lived on a one hundred-sixty acre ranch outside of the town, about forty miles out. The roads were very, very poor
    and we couldn't drive the car across the creeks so we lived on the other side of the creek. We lived in a log cabin with
    no floor, a dirt floor, two rooms and a little lean-to on the outside where the kids slept. I had six cousins, four girls
    and two boys; I was the youngest. Being the youngest I was pretty well spoiled by the older ones. But, it was a good life
    for about four years.
- speaker: Respondent
  text: I went to school in Hysham up until the third grade, I believe, then went to the little town of Eden, Montana, with
    my relatives and went to school in a little county school. Six people in the school, five girls and one boy. Needless
    to say, I was the only boy. Being the youngest of the six children I probably took quite a bit advantage of the girls
    and of the teacher by bringing mice to school and trying to scare the girls all the time. This came back on me a couple
    of years later when my father remarried.
- speaker: Respondent
  text: My father married a young girl that was nineteen years old, just eleven years older than I. She was a very useful
    person and I moved to town to live with them. She had a great deal to do with my life. She had had a tough life herself.
    She was born in Oklahoma; her maiden name was Loutherback. She had a child by a former marriage. My step-sister is still
    alive; I don't see her very often. She was very strict with me, but still very fair. She was a great help to me. I was
    nine years old when I moved in with them, but I still went every summer and stayed with the people at the ranch. I had
    great experiences as a young person on the ranch - helping put the hay and getting the cows. I became very fond of that
    kind of life.
- speaker: Respondent
  text: I finished grade school in 1926 I believe. I think that was the year that Charles Russell died. I remember that very
    vividly because he was a great friend of my father's. One of the great things of my life is that I always tell everybody
    that I knew personally Charlie Russell. Charlie was a great man. He brought the first fresh pineapple I had ever seen
    from Hawaii and gave it to me. Brought it back on a ship because in those days there were no planes going back and forth.
    It was quite a treat and something very different.
- speaker: Respondent
  text: I can remember very vividly my father and Charlie Russell sitting in front of a still in the basement of our home
    making whiskey. I suppose it was pretty good bourbon, without the flavoring, because they used to sit there and drink
    this hot whiskey as it came out of the still and tell stories about the old days. Charlie Russell would bring a couple
    of illegal beaver hides all hooped up on a willow and be fletching the meat off them while they were drinking. It was
    a great experience that I'll never forget.
- speaker: Respondent
  text: I suppose I was about twelve years old when I started in junior high, not a very good student, but got by all the
    time, full of mischief. One of the toughest things in my life was to go from a little country school and start in working
    with boys who I had never played with or been around. So you can imagine that I had a lot of trouble. I'd get punched
    in the nose every time I'd turn around; I had many a black eye and many a broken nose before I found out you can't tease
    boys like you do girls.
- speaker: Respondent
  text: Going through junior high and into high school I suppose I grew up very fast. As a freshman in high school I got to
    be, I suppose, a little wild. Drinking dandelion wine and chokecherry wine if we could steal it or buy it. I became quite
    a problem for my parents. My father became very unhappy with me. I had an argument with him when I was a sophomore in
    high school about drinking and not going to school; I was going to get a job and go out on my own. I got a job at three
    dollars a day as an electrician's helper; I worked for two days and my step-mother came and got me. She prevailed upon
    me to go to school over in Helena, Montana.
- speaker: Respondent
  text: The school that I attended was Carroll College; at that time it was called Mount St. Charles. Mount St. Charles was
    a high school and a college both. I think there were eighty-nine people in the college and about forty high school students.
    We had a football team, and I had a chance to do things that I'd never done before. I started to learn to like athletics
    and got real hung up trying to be a good basketball player. Although I was tall, I was very light. I weighed about one
    hundred thirty-five pounds and I was very awkward. I had never had any kind of experience at all in any kind of athletics.
- speaker: Respondent
  text: As a sophomore in high school I tried to play basketball, but I'd fall down about every time I'd try to run down the
    floor. I met a man by the name of Sid Smith who was a senior in college but who was also coaching the high school team.
    He said, "Kid you're going to break your neck." He then threw me a basketball and said, "I don't want you to do anything
    but dribble this ball." He would keep me three hours a night just dribbling that basketball around the floor. Dribbling
    that basketball gave me a sense of balance. I'm certain it had a great effect on me because I did it for at least three
    weeks or a month. It really changed my life. I learned how to turn and move. I never became a good athlete, but an adequate
    one. It was something I liked and there was nothing else to do at a Catholic college anyway; we never got out at night.
    It was a twenty-four hour thing; we either went to church or to school or played basketball and football. We also had
    a handball court, and I became pretty proficient at that.
- speaker: Respondent
  text: I had the usual experiences you would have in high school. In my senior year I played basketball; we had a pretty
    good team and did very well. It was a lot of fun, and I made a lot of friends. We did some traveling to the smaller towns
    and finally wound up coming in third in the zone basketball tournament in Butte, Montana.
- speaker: Respondent
  text: The next year I came back to Carroll College in 1930. It was sort of the start of the Depression; it really hadn't
    hit yet, but I guess people could see it coming on. On the day of registration there was a new man who had come out from
    Notre Dame University to coach the football team. He looked at me and said, "Hello son, how are you? You're Warren Nelson
    aren't you?" I said, "Yes Sir." He said, "How would you like to play football for me?" I told him I didn't think I was
    big enough. He said, "If you've got guts enough you're big enough. I think you're big enough; why don't you come on out?
    I'd like to make an end out of you."
- speaker: Respondent
  text: His name was Bill Jones. He had been one of the linemen for the "Four Horsemen;" he was one of the "Seven Mules."
    He was just a fantastic guy; he gave me confidence that I had never had before. He's still my friend. At this time he
    is the chief judge of the courts in Washington, D.C. He's the counterpart of Judge Sirica; he's now the head judge in
    the District of Columbia. I still see him all the time; he still talks about football and talks it very well.
- speaker: Respondent
  text: We had a reunion in 1971 of that football team. It was forty years since the team had been unbeaten, untied and unscored
    upon. I was a third-string end and saw very little action, but everybody treated me just like I had been the star so it
    was a great experience. My wife and I went; I think there were twenty-nine out of the thirty-nine members of that team
    at the reunion. The coach was there and all the priests who had a lot to do with me as I grew up.
- speaker: Respondent
  text: A priest by the name of Father McCormack and the principal of the school, Father Riley, were very good to me. They
    taught me a lot. In the middle of my freshman year in college I decided to become a Catholic, not at their urging, but
    at their suggestion.
- speaker: Respondent
  text: Sid Smith, the coach of the high school basketball team, was my sponsor into the Catholic religion. He was a big,
    tough, strong, mean guy as far as athletics was concerned, but a very gentle man underneath. He had a great influence
    on my life. I became very fond of him, and he certainly never gave me any of the best of it; he would make me do things
    that he wouldn't make other people do. I can recall playing football and being an end trying to block halfbacks; when
    I tried to block a two hundred pound halfback I broke a thumb. It pained me terribly and naturally when I tried to block
    anybody I couldn't hold them off with that broken thumb, so they were pushing me all over the field. The backfield coach
    for the team called to Sid Smith and told him to get me out of there and send him a tough end. Sid came over and asked
    me what was wrong. I said I didn't know. He asked if I was hitting those guys and I said I was trying.
- speaker: Respondent
  text: He then said, "See if you can hit me." He got down in position and tried to block me. We got into a hassle, just hitting
    each other around the football field. He was hitting me, and I was hitting him, but fortunately me being young and he
    was a coach and not in the same condition I was in, it wasn't about ten minutes he was panting and I'd sort of had the
    best of him. He told me to go get a shower; I did and went back to my room.
- speaker: Respondent
  text: I was soaking my thumb because it was all swollen up when he came in and asked what happened. I said I'd broken my
    thumb, and he asked when I had broken it. I said on the first play that day. He asked, "Why didn't you tell me?" I said,
    "You didn't ask me." We became very fast friends and later on he became a very religious person and still is in Montana
    and still my very dear friend.
- speaker: Respondent
  text: I went to school that year and part of the next year. The freshman came in, and they dropped the football team, had
    an appointment to West Point. I was very bent on going to West Point, but my background in mathematics was very, very
    bad, so it just didn't look like I could make it. I had the appointment to West Point, wanted to go and was going to go,
    and I was taking the courses to do it. I went to a class taught by a priest who is now the bishop of the Spokane (Washington)
    Diocese, by the name of Bishop Topel. He asked me if I had taken advanced algebra in high school, and I said no; he then
    asked me what I was doing in this class, which was algebra.
- speaker: Respondent
  text: I replied, "Damned if I know." That just about ended my aspirations to go to West Point because I just didn't have
    the mathematical or educational background.
- speaker: Respondent
  text: When I left school, probably in November, I went back to a job I had had every summer for four summers, as a bellhop.
    I started that bellhop job when I was about fourteen and worked every summer. It was a very good job; I made a lot of
    money. It was in a hotel that my father had been the chef of; the operator was a good friend of my father's and was very
    good to me. I learned an awful lot because in those days, the late 1920s and 1930, bootlegging was rampant. The hotels
    had a lot going on in them, not crime, but a lot of drinking and so on and so forth. I was at that time bootlegging -
    selling whiskey; everybody did it, it seemed the thing to do. I made a lot of money and spent it to go to school every
    year, so I guess it wasn't all wasted.
- speaker: Respondent
  text: I learned a lot on that job. In January or February of that year (1930), a job that had been good for a hundred dollars
    a day went down when the Depression really hit. You couldn't make a nickel a day, and my wages were fourteen dollars a
    month from the hotel; there were no tips, the rooms were empty, it was like a morgue.
- speaker: Respondent
  text: A friend of my father's got a man to come over from Butte and open a Keno game. A Keno game at that time was called
    "Chinese Lottery." It was a game that was well received in Butte, Montana; and they had four or five games there. These
    games were the first to operate in Montana, naturally they weren't legal. They would open and close at the whim of the
    officials that were running the state - county attorney, the judges, the sheriff. Like any other thing it was pretty much
    of a mess.
- speaker: Respondent
  text: When I heard that they were going to open the Keno game I went to my dad's partner - my dad was kind of the guy that
    got it open, the partner was the guy that owned the place - his name was Cal Lewis. I went and asked him for a job; he
    said, "Well sure." He put me to work for five dollars a day. The first night I worked my father came in and asked what
    I was doing there. I told him I worked there, and he told me to get out, he didn't want me in there. His partner came
    over and told him, "Leave the kid alone. I told him to go to work and he's going to work." I was eighteen and a half or
    nineteen then, so I stayed there.
- speaker: Respondent
  text: It was a very interesting game; it had a lot of mathematics. The mathematics that I didn't have in college or high
    school, I started getting interested in.
- speaker: Respondent
  text: I took a trip over to Helena to talk to a priest there by the name of Father Rooney. He was the assistant president
    and had the reputation of being one of the world's best mathematicians. In fact, they rated him fifth behind Einstein
    at that time in the United States or in the world I suppose. He was a very bright man. I told him about the game and how
    it was and what it was. He looked at it and said he understood it and that I could "do this if you do this" and showed
    me the formulas of what to do. I said, "Well OK Father, would you do that for me?" He told me to do it for myself.
- speaker: Respondent
  text: This was before calculators and even before adding machines that amounted to anything. So, I took a roll of butcher
    paper and put it on the floor and started working out those formulas. Some nights I would go from one end of the room
    to the other on my belly moving backwards, figuring out those formulas. It was a great experience, and I think it h
