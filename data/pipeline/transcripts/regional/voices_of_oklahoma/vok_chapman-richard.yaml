collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: What is your first remembrance living out there?
- speaker: Respondent
  text: My first remembrance? I think it was the... Coyotes. He had... Everybody had a building out there that they kept their
    hams and so forth hung at smokehouse. They called them smokehouses. And it had windows and doors on it. But one night,
    the coyotes jumped through the window and were trying to cart off hams and so forth. And the dogs, of course, Warren Popp,
    he always had a 12-gauge shotgun by the back door. And when he chased out there, well, that was all she wrote for those
    coyotes. He got two of them, and two of them got away.
- speaker: Interviewer
  text: So you remember that as probably, don't know how old you would have been, four years old or something?
- speaker: Respondent
  text: I was about five years old at that time, yeah.
- speaker: Interviewer
  text: What did you do as a five-year-old for entertainment out there?
- speaker: Respondent
  text: Well, built my sister. I had to bring my sister in. She was five years older. Mother was cleaning house, cooking,
    and taking care of everything. And Lois just basically was my surrogate mother. We would go out and play. She dressed
    me up like a girl, put lipstick on me and rouge and dresses and high-heeled shoes. I was her live doll. And just loved
    her to death because we went out and built playhouses and went to the river and walked down the river, which was about
    a half a mile away, and just did everything that kids do. Mom was satisfied that Lois could take care of me, and she felt
    safe with it.
- speaker: Interviewer
  text: So you have fond memories as a young boy out there.
- speaker: Respondent
  text: Yes. Very, very much so.
- speaker: Interviewer
  text: Were there trees, lots of trees in the property?
- speaker: Respondent
  text: Yes. In fact, the driveway was about, I'm going to say, yards long, and Pop had planted trees on either side of that,
    and it was a beautiful drive. And then they planted fruit trees, apple trees, peach trees, and so on and so forth. Always
    had a big garden along the north fence, asparagus, and that would come back every year. We had a lot of fresh fruit. Fruit
    and vegetables.
- speaker: Interviewer
  text: Is that land still in your family?
- speaker: Respondent
  text: No. We had the, Grandpa went, when he quit farming, he went to preaching in the Methodist church, and then he had
    to sell the farm for taxes and so forth. And we were homeless. We moved seven times in a year and a half in places where
    we didn't have to pay rent. And you can imagine some of those places, what they looked, one of them, well, the first place
    was a reconditioned boxcar down by the river. The boxcar made into three rooms, and seven of us were living in that boxcar.
- speaker: Interviewer
  text: Well, that's hard to imagine, but we all know what the size of a boxcar is. How long did you live in that?
- speaker: Respondent
  text: Well, I'm going to say probably a year. And we, like say, we moved six or seven times in the two-year span before
    we went to Pond Creek.
- speaker: Interviewer
  text: All right. So your grandfather felt called to preach.
- speaker: Interviewer
  text: And that's why he couldn't maintain the payments on the ground.
- speaker: Interviewer
  text: And if he'd continued to farm, he could have.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: So that was a pretty major decision for him to make.
- speaker: Respondent
  text: It sure was.
- speaker: Interviewer
  text: And wonder how that worked with your mother, but she had to be in on this calling as well.
- speaker: Respondent
  text: Yes. Well, it was a sad, sad day because this originally was our home and my mother's home. But he got into financial
    difficulty and couldn't do anything else.
- speaker: Interviewer
  text: Was it because of it? Becoming a minister?
- speaker: Respondent
  text: Well, ministers were paid chickens and bread and potatoes and very little cash, if any. Yeah.
- speaker: Interviewer
  text: So do you remember the day you left that house?
- speaker: Respondent
  text: Well, don't remember too much about that because I was really, really young then.
- speaker: Interviewer
  text: But you do remember all those moves.
- speaker: Respondent
  text: I do remember where we moved across the river into the boxcar.
- speaker: Interviewer
  text: So what church is he preaching with?
- speaker: Respondent
  text: Methodist Church. Yeah. He's a Methodist.
- speaker: Interviewer
  text: Do you remember him preaching or is that too young for you?
- speaker: Respondent
  text: I remember one time I heard him preach. I only heard him one time. The rest of the time he was in Old Dalhart, Texas
    and he was in western Oklahoma and southern Oklahoma, northern Oklahoma. I think he had probably down through his career
    probably seven different churches.
- speaker: Interviewer
  text: Right. So then your dad and mother all followed him?
- speaker: Respondent
  text: Well, no. They were just my grandmother and he, we stayed on the farm and then when he sold it, we started moving
    around as nomads to places where we didn't have to.
- speaker: Interviewer
  text: That had to be tough on the family.
- speaker: Interviewer
  text: Well, when do you start going to school?
- speaker: Respondent
  text: Well, started there when we moved across the river to what we called Bates Place because that's who owned the place.
    And there was the Riverdale School there and that was my first school in the first grade. And didn't finish the year there.
