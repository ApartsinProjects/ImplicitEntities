collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Would you state your full name, please?
- speaker: Respondent
  text: Yes, Bob L. Blackburn Junior. I am a junior. My dad was a senior, but go by Bob Blackburn, or around the history circles,
    Doctor Bob.
- speaker: Interviewer
  text: Your birth date and your present age.
- speaker: Respondent
  text: I was born September 10th, 1951, in Oklahoma City. Now am 71, soon to be 72.
- speaker: Interviewer
  text: And where are we recording this interview?
- speaker: Respondent
  text: We're recording this at the Oklahoma History Center in Oklahoma City. This is the headquarters flagship of the Oklahoma
    Historical Society.
- speaker: Interviewer
  text: And you may not like this, but want to say this is the house that Bob built, and we'll talk more about that later,
    of course. And before we proceed, should say that I contacted you about years ago when I started this project of oral
    history. And have quoted you hundreds of times because when I told you what I'm doing, you said, "You're doing our work
    for us." And with that it gave me freedom. I wasn't a trained historian, but knew that voices and stories needed to be
    recorded. And so thank you for the inspiration you gave me when I started. It's hard to believe years ago.
- speaker: Respondent
  text: Well, and you have far exceeded my expectations. You know, everyone wants to do a project, everyone wants to write
    a book, do something. Very few people actually accomplish their dreams. You did. And the quality, I've watched so many
    of your episodes, and those memories are now part of the collections with a capital T, the collections that historians
    can use in the future to understand the times that you and I have lived through.
- speaker: Interviewer
  text: Yeah. Where were you born?
- speaker: Respondent
  text: I was born here in Oklahoma City. My family's though are from Claremore, my dad's family, long Claremore residents.
    My dad born there in 1920. Mom, Western Oklahoma with Arkansas roots, from Chickasha, Ninekah area. But Dad was a highway
    patrolman, Mom was a teacher, and we were in Oklahoma City at the time I was born.
- speaker: Interviewer
  text: Your mother's name, maiden name and all.
- speaker: Respondent
  text: Mom was Ida May Turley. She was born in Ninekah, 1929. Granddad had come out to pick a cotton crop with a brother-in-law
    on acres near Norge, Oklahoma, and it was the only good year for cotton in the 1920s. He came out with all he had. At
    that time he had kids, one an infant, so who could pick. Granddad sold a little bit of land in Arkansas, bought a Model
    T25 pickup, took days to get here from Howard County, Arkansas, just across the border from Broken Bow. Took days to get
    here, and then he would spend all of his time... they'd load the cotton in the pickup, he'd go to the gin, wait to get
    it ginned. By the time he got back they'd have another load, and he spent days. And have an exhibit here in the History
    Center about that cotton picking experience. And always say am an Oklahoman because of cotton, and then Mom was born years
    later.
- speaker: Interviewer
  text: Wow. Oh, that was your grandfather you were talking about?
- speaker: Respondent
  text: That was my grandfather, right.
- speaker: Interviewer
  text: Right. And your mother, her personality and all, what kind of a person was she?
- speaker: Respondent
  text: Well, Mom was the youngest of 8. By the time she was born, her oldest sister, my Aunt Agnes, Aggie Steelman of Duncan,
    Oklahoma, was out of the home already, so she was the baby. And she was a talented baby. She could sing. She was a pretty
    little girl, a beautiful woman, and she made a career in television with the beauty and the communication skills. But
    she was a singer from the earliest days, and so she always had the spotlight on her as a child growing up even in poor,
    small rural Oklahoma. But she had that very outgoing personality. She had a little bit of a wild streak in her. She liked
    men and dating and married my dad, who was a dashing highway patrolman, years or years older than her. But Mom had that
    energy, and call them strong women. I've always been an admirer of strong women. I've advocated collecting stories of
    strong women and putting women in powers of authority. Generally, most things go better when women are in charge, I've
    noticed. And so learned that from my mother, who had strong personality at a time when women had that glass ceiling very
    low. With her talent and energy and ambition and ability, she was able to crack through that glass ceiling at a time when
    women were supposed to be teachers, secretaries, or housewives. That was about it in the 1940s and 1950s. And she said,
    no, divorce, raising two kids, she created a career by being her own producer of a television show and was on air from
    1958 to 1975. Did over 3000 live broadcasts representing this community, and she made $50 a week from the show, but she
    made her money by selling commercial time, by doing commercials. Was a child actor on the stage eating Kitty Clover potato
    chips. And then she would go to a beauty contest and be a judge and make a little bit of money. She would go to an opening
    of the world's largest truck stop in 1959 and be the celebrity on site, making enough money to raise us kids. We moved
    in with an aunt into a little house with two women, one widowed, one divorced, and kids. Best time of my childhood.
- speaker: Interviewer
  text: Wasn't the television show Romper Room? She was hostess of that?
- speaker: Respondent
  text: That was the first. She was teaching at the time, did an open audition. And with her personality, at that time there
    was no syndication through the airwaves, no satellites at the time, and it was expensive to send out film. The creator
    of Romper Room wanted a local hostess, educator. It was preschool, and Mom did this open invitation, went to Baltimore
    for one week training, came back, and KOCO started producing the Romper Room show with Miss Ida as that teacher. And it
    was a one-camera shoot in a little grocery store in what's now Britton, Oklahoma, because they could do 49% of their production
    outside of Enid. And she would, looking at the camera teaching the kids, she'd say, OK, now these kids are drinking Borden
    chocolate milk. Mom, you need to go buy Borden's milk. And so selling that every time. And she learned to be an entrepreneur
    through communication, much as you have done through radio through the years. She learned the medium of television and
    understood that was connecting talent and art and creativity with consumers, and that there was room for business in there.
    People would pay for airtime to sell their products. She said, well, this Borden milk is good for kids. I like to sell
    it. And that was her attitude, kind of the way do history. History is good for people. Let's get out and sell it. You
    need to give me money. You need to give me your votes because I want to deliver this service to the people. And that's
    the way Mom approached the television industry.
- speaker: Interviewer
  text: We could say this is KOCO TV here in Oklahoma City, so she was obviously very charismatic would be the word we put
    on her, obviously. And then in the magazine type formats for many, many years she did that as well beyond the Romper Room.
- speaker: Respondent
  text: She did. She was out of work for a year. They moved Romper Room back to Enid because of FCC rules. She did not want
    to move to Enid. She was trying to keep her marriage alive at the time. Dad was a highway patrolman on Route 66, so we
    had to stay in Edmond. So for years she became a promotion person for Dennis Donuts. A local guy named Dennis started
    opening donut shops, and all of us baby boomers, of course, love donuts. Still do to this day when indulge. But she promoted
    that. They bought her a '59 Chevy convertible that was black with a red boot, and she'd go from school to school getting
    kids to go donate. Was the actual elephant in front of the stores with one hand at the trunk doing this and one hand greeting
    the kids. But then she got back on television, largely because of leadership. John, Admiral John Kirkpatrick, businessman,
    oilman, philanthropist here in Oklahoma City whose reputation is legendary, wanted a show that promoted his city. KOCO
    stands for K, was the call letter for every station west of the Mississippi by that time, but it was Oklahoma City, Oklahoma,
    KOCO. He wanted a show that promoted his community, would give free airtime to Lyric Theater, to Barton Theaters, to people
    putting together a fundraiser. Well, her show, a magazine format, allowed people to come onto the air to sell their services.
    Jody Miller, who passed away this last year, famous country and western music star. The first Grammy given to a woman
    was Jody Miller from Blanchard, Oklahoma. Her first appearance in front of an audience was on the Ida B show. That started
    her career. There were other people like that who used that as an opportunity. Steve Ripley, a common friend that you
    and I have known and admired so much, Steve played on the Ida B show when he was in a garage band here in Oklahoma City
    in the 1960s. Well, that was promoting Oklahoma City, and Mom had a talent for reaching out to someone and pulling their
    story out of them, like you do with radio. In this series she could engage people, and she was just witty enough to keep
    it lively and to keep it moving, and stayed on that air for the 3000 shows.
- speaker: Interviewer
  text: You were like 7, 8, years old when you were helping your mother, weren't you? You were introduced and on stage at
    a very early age.
- speaker: Respondent
  text: And hated it. Did not want to be in the spotlight. Had, my dad was the youngest of 8, the brightest, the big athlete,
    and so had superstars as parents who liked the spotlight, the center of attention. I was very willing to kind of stand
    to the sideline and watch these two amazing people. So when she wanted me on television, she had to just drag me into
    the shows to eat the potato chips or whatever it might be. But I was learning about communication skills, and that was
    her skill set that served her so well. And our family, of course, she knew how to sell, she knew how to engage people,
    and that salesmanship really came, that I've used in history, selling history through my books, through the exhibits,
    through fundraising. I think a lot of that came from my mom Ida B.
- speaker: Interviewer
  text: She started an advertising agency, didn't she?
- speaker: Respondent
  text: She did. She married for a fourth time, eventually five times, and the last one lasted more than all the others together.
    Great guy, Bird Dog Rogers, a Cherokee Indian. But she got widowed, and with, I think it was number if you count my dad
    twice. And he died, and she wanted, she was not ready to retire to the lake in Puerto Vallarta where they had a place,
    so she started an ad agency, and it was the first woman-owned advertising agency in the state. And she had a small staff.
    Her problem was she was a better communicator than a business person. She gave a lot of free time and comps to people.
    She said, well, I've got a good cause. Would you help us with the Children's Center? She wrote a jingle for the Children's
    Center. This is a place here in Oklahoma City that if you talk about Christianity, just embrace the Christian ethic, we've
    got
