collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Montie, would you state your full name, please?
- speaker: Respondent
  text: Montie R. Box.
- speaker: Interviewer
  text: I've got to ask you what R stands for.
- speaker: Respondent
  text: R is Roland. I was named after my two granddaddies.
- speaker: Interviewer
  text: Okay. All right. Your date of birth?
- speaker: Interviewer
  text: July 31, 1930. You've just celebrated a birthday.
- speaker: Interviewer
  text: And how old are you today?
- speaker: Interviewer
  text: Why do you think you were able to live to be 92 years old?
- speaker: Respondent
  text: I've had a sweet wife over here, Betty, yeah. And we've had a good marriage.
- speaker: Respondent
  text: And we have a great, wonderful family. Big family. Children, grandchildren, great-grandchildren now.
- speaker: Respondent
  text: And Sand Springs has been good to us, and we love it.
- speaker: Interviewer
  text: So, Betty, you're joining us. Thank you for doing that.
- speaker: Respondent
  text: You're quite welcome.
- speaker: Interviewer
  text: Nice to have you here. And so your role is to kind of keep us on the straight and narrow, and then interject along
    the way some things that you may remember that maybe Montie doesn't and don't know about.
- speaker: Respondent
  text: Okay. I will do that.
- speaker: Interviewer
  text: So you do that, and how many years you've been married?
- speaker: Respondent
  text: We've been years. Be this coming January. 41.
- speaker: Interviewer
  text: That's great. So you've seen a lot of things in his life and your entire... congratulations on that family you talked
    about.
- speaker: Interviewer
  text: So, Montie, tell us, where are we recording this interview?
- speaker: Respondent
  text: Sand Springs, Oklahoma, in my building or our building. Sand Springs, Oklahoma.
- speaker: Interviewer
  text: And it's Montie Box Real Estate.
- speaker: Interviewer
  text: Building that we're in right here on Broadway.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Comanche, Oklahoma.
- speaker: Interviewer
  text: And so since you were born 1930, I'm going to bring up the Dust Bowl of the 30s, 1934, 36, 39, 40, and then that brings
    you up to 8, 9 years old. Did you have any feelings of Dust Bowl or even the Great Depression, because they were also
    your first early, uh, of your life?
- speaker: Respondent
  text: Yes. I had some. My dad managed the largest diversified farms in the Southwest. But he came to work for the Sand Springs
    Home for $25 a month. And we had a little house west of Sand Springs. And he finally became manager of that farm, which
    was the largest, said, diversified farms in the Southwest. He had a lot to do with my life.
- speaker: Interviewer
  text: But the actual Dust Bowl, you probably didn't experience the dust blowing.
- speaker: Respondent
  text: No, not. No, didn't.
- speaker: Interviewer
  text: And because you were farming at all, maybe the Depression didn't affect him any?
- speaker: Respondent
  text: Well, the Depression when you were, we were all alike. We were all poor at that time. Tulsa, Sand Springs. But Sand
    Springs has been a very caring community. Charlie Page, which is the founder, we had the orphanage and we've got the widow's
    colony. We have very caring people in our community. Still are. We have the Salvation Army, which I've been part of for
    years.
- speaker: Respondent
  text: Tulsa Boys Home, which is a caring of young men. We're just a caring community in Sand Springs.
- speaker: Interviewer
  text: Yeah. Your mother's name, her maiden name and where she grew up.
- speaker: Respondent
  text: Yes. Her name was Montie Modena Box. Her name was Smith. Had an uncle who was dean of men at OU. Good man.
- speaker: Interviewer
  text: So your mother's name was Montie Modena.
- speaker: Interviewer
  text: And then your mother named you Montie.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: So she was Montie and you were Montie.
- speaker: Respondent
  text: And my granddad was a Montie.
- speaker: Interviewer
  text: All right. So then wasn't this confusing? When everybody was calling for Montie? Is it me, my mom or whatever? That's
    kind of unusual.
- speaker: Respondent
  text: Well, grew up until I was in high school. I was Sonny.
- speaker: Interviewer
  text: All right. All right. All right. Yeah. I've never heard of anybody who's named after their mother.
- speaker: Interviewer
  text: But that worked out fine. What kind of personality was she? What kind of person?
- speaker: Respondent
  text: Well, my mother was a fiery redhead and she was a darn good woman, boy. She even taught me how to dance. Said, "Son,
    now if you hold a woman by the middle of her back, you can lead her any place you want her to go."
- speaker: Interviewer
  text: Yeah. Yes. Sweetheart, redhead, wonderful. Did you have brothers and sisters?
- speaker: Respondent
  text: I have a sister, Judy. Judy Walton. And she's been a sweetheart. She's now lost her husband, Clark. Clark, a couple
    of years ago and we miss him.
- speaker: Interviewer
  text: Yeah. But how old is she?
- speaker: Respondent
  text: Years younger than I am.
- speaker: Interviewer
  text: All right. So she's like some, 80.
- speaker: Respondent
  text: Yes. Much, much younger, right?
- speaker: Interviewer
  text: So then give me your father's name.
- speaker: Respondent
  text: James William Box.
- speaker: Interviewer
  text: And where did he grow up? Where did he—
- speaker: Respondent
  text: He grew up in Comanche, Oklahoma.
- speaker: Respondent
  text: Went to Oklahoma State.
- speaker: Interviewer
  text: What was his personality like? What was he like?
- speaker: Respondent
  text: My dad was always the gentle type. My mother was the fiery redhead.
- speaker: Interviewer
  text: Okay. But you learned a lot from your father.
- speaker: Respondent
  text: Oh, yeah. He was a mentor or not. He was very firm. And when he said, And we'd go to the garage and he was nice until
    he hit me a couple of licks and then he'd get mad. And remember the day he said, "Bodina," that was my mama, "that boy's
    had his last whipping. Let's go walk." And that's what we do.
- speaker: Interviewer
  text: Yeah. Instead of having a whipping.
- speaker: Respondent
  text: Yeah. He was quite a gentle man.
- speaker: Interviewer
  text: And then, so tell us again what he did. He was in a farm—
- speaker: Respondent
  text: He was the manager of the Sand Springs Home Farms.
- speaker: Interviewer
  text: Okay. What is that, Sand Springs Home Farm?
- speaker: Respondent
  text: Well, they were the largest diversified farms in the state. They were in the southwest at one time. You name it, we
    had it. We had hogs, chickens, sheep, and milk and shorthorn cattle, Holstein cattle, Jersey cattle, had it all. There's
    lots of different farms over Sand Springs, five of them in fact.
- speaker: Interviewer
  text: Okay. Did someone own them all or was it a, who owned all those farms?
- speaker: Respondent
  text: The home was—the home orphanage which Charles Page founded.
- speaker: Interviewer
  text: Okay. But the farm, you said the farm itself, was that owned by—
- speaker: Respondent
  text: The Sand Springs Home.
- speaker: Interviewer
  text: By Charles Page?
- speaker: Interviewer
  text: And he, had he bought up all this land and farm?
- speaker: Respondent
  text: Yes. He had. But he made his money in oil. But Sand Springs, you know, we used to have a trolley car from Sand Springs
    to Tulsa. Every minutes, it ran. Sand Springs has been a very, thanks to Charles Page, a very caring community. We have
    the orphanage and we have the widow's colony which is ladies who have their home in Sand Springs.
- speaker: Interviewer
  text: Right. What brought Charles Page to this area? Do we know?
- speaker: Respondent
  text: I, he was before my time.
- speaker: Respondent
  text: But yes, he came over here and founded Sand Springs.
- speaker: Interviewer
  text: Yeah. Yeah. And then, and he found, yes, he founded the Sand Springs and we always hear about the Charles Page Boulevard
    and most people today have no idea who, what an influence Charles Page was on this entire area.
- speaker: Interviewer
  text: Your education, what was the first school you attended?
- speaker: Respondent
  text: Tanglewood. Tanglewood was a two-room country school where we did, you know, had two teachers and, you know, probably
    students, all of them all. And learned probably as much there as did through my university years.
- speaker: Interviewer
  text: Tanglewood, is that in, was that a town or Tanglewood?
- speaker: Respondent
  text: No, it was just the name of a school.
- speaker: Interviewer
  text: But it was where?
- speaker: Respondent
  text: It was five miles west of Sand Springs.
- speaker: Respondent
  text: And the best teacher ever had, Bonnie Dunn, she taught me. She taught me more about life and living and being a good
    man. But she was also my school bus driver, which was her car. And what a wonderful woman.
- speaker: Interviewer
  text: Yeah. So how many years, how many grades?
- speaker: Respondent
  text: Eighth grade.
- speaker: Interviewer
  text: You went there through the eighth grade?
- speaker: Respondent
  text: Through the eighth grade.
- speaker: Interviewer
  text: In a two-room schoolhouse?
- speaker: Respondent
  text: Two-room schoolhouse, yes. There was two teachers. One through the fourth and fourth through the eighth grade. Yes.
- speaker: Interviewer
  text: Wow. So then from there, you went to what school?
- speaker: Respondent
  text: Sand Springs High School. It was called Charles Page, but at that time it was Sand Springs High School.
- speaker: Interviewer
  text: And did you participate in sports?
- speaker: Respondent
  text: Oh, well, tried. But all the WW2 boys came back. And the little guys that weighed pounds could hardly make out the
    team when some of those boys were married and had children and coming back to high school.
- speaker: Interviewer
  text: Yeah. You're talking about the veterans that came back from World War at that time. But didn't you do some wrestling?
- speaker: Respondent
  text: Yes. I was, well, helped start the wrestling program here. Wrestled a little in college in Philadelphia. Until met
    a couple of guys that knew how to wrestle. But yes, changed a lot of young men's lives through our wrestling program.
- speaker: Interviewer
  text: That's great. So then in high school, did you enjoy your time there?
- speaker: Respondent
  text: Oh, yes. I was president of the senior class. And had a lot of fun.
- speaker: Respondent
  text: You were in the band?
- speaker: Respondent
  text: Oh, yeah, the band, the high school band.
- speaker: Interviewer
  text: And what did you play in the high school band?
- speaker: Respondent
  text: Clarinet and alto sax.
- speaker: Interviewer
  text: Yeah. Well, you showed leadership early on then, didn't you, being president of your senior class?
- speaker: Respondent
  text: Well, loved school. I would deliver the milk every morning into the orphanage and the widow's colony five miles and
    five miles back. And at that time, hitchhiked and made eight o'clock band practice.
- speaker: Respondent
  text: But during the war years. You put up your thumb and anybody go by, no. Because everybody had gas rationing and warring.
    You know, you picked up that person and knew it was going to be okay.
- speaker: Interviewer
  text: Yeah. So we had Pearl Harbor.
- speaker: Interviewer
  text: December 7th, 1941. And then you would have been years old about that time.
- speaker: Interviewer
  text: Do you remember that day?
- speaker: Interviewer
  text: Tell me about it.
- speaker: Respondent
  text: Well, had woke up from having pneumonia and my grandmother was sitting beside me and she was crying. And said, And
    she said, "Well, the Japanese just bombed Pearl Harbor and we'll go to war and both of my boys will be there." And sure
    enough, they were. Both of them. Jody was with Patton in Germany. Paul was laying pipelines to the tanks in Italy. Her
    two boys.
- speaker: Interviewer
  text: So those were your uncles, actually.
- speaker: Respondent
  text: Those were my uncles. Yes.
- speaker: Respondent
  text: I was always upset because wasn't quite old enough. The day turned 17, went over and joined the Naval Reserve. And
    stayed in the Naval Reserve until got in college and they were paying $10 a month and could get an advanced ROTC for 30.
    So got an advanced ROTC.
- speaker: Interviewer
  text: All right. President Roosevelt.
- speaker: Respondent
  text: Yes. Quite a man.
- speaker: Interviewer
  text: And was president then, of course.
- speaker: Interviewer
  text: You remember the day he died?
- speaker: Respondent
  text: Oh, yes. Tell me about that. Well, first time saw my mom and dad cry. The only other time was when Will Rogers went
    down in an airplane crash. The two times saw my mom and dad cry.
- speaker: Interviewer
  text: Yeah. And it brings you to crying right now, as a matter of fact.
- speaker: Respondent
  text: Yes. I'm sorry.
- speaker: Interviewer
  text: Do not feel sorry. That's okay to cry. We laugh and we cry both. So no problem at all. So that shows you how big these
    two people were, President Roosevelt and Will Rogers.
- speaker: Interviewer
  text: Do you remember listening to either Will Rogers or President Roosevelt on the radio?
- speaker: Respondent
  text: Oh, yes. Yes. Especially Roosevelt. Roosevelt was a very strong voice.
- speaker: Interviewer
  text: What year did you graduate from high school?
- speaker: Interviewer
  text: All right. Then you went on to?
- speaker: Respondent
  text: To Oklahoma State, which was Oklahoma A&M at the time.
- speaker: Interviewer
  text: Right. And then you were there for four years, suppose.
- speaker: Respondent
  text: Four years. Got a degree in agriculture economics.
- speaker: Interviewer
  text: Okay. So I'm sure you were pretty active at OSU.
- speaker: Respondent
  text: Oh, yes. Yes.
- speaker: Interviewer
  text: What activity? What were you in?
- speaker: Respondent
  text: Oh, well. I was. The main thing, worked as a kitchen boy at the Capadelta house. I was able to get my meals for free.
    Looked after those girls like I was their big brother.
- speaker: Interviewer
  text: Yeah. How about T. Boone Pickens? Was he around at that time?
- speaker: Respondent
  text: Oh, T. Boone, yeah. He was a wonderful guy. T. Boone, remember the day he came into our fraternity. And he had been
    down in Texas. And he left there after a couple of days and didn't like it. And remember the day he became a Sigma Alpha,
    Epsilon, Sig-Alf. And remember the day he came in there. Yes. He and I became very good friends. He was the same class
    as myself. And remember when he didn't have a pot.
- speaker: Interviewer
  text: All right. But T. Boone was, you were very industrious because you were a worker. T. Boone Pickens, I've interviewed
    him, too. And he's on our website. I mean, he had all these newspaper routes. And so both of you were workers from the
    very beginning.
- speaker: Respondent
  text: Oh, yes. Yes. Well, yeah, he was a good man. T. Boone and I, we were fraternity brothers.
- speaker: Interviewer
  text: Yeah. How about the sports and the coaches of football or basketball at OSU when you were there? Who do you remember?
- speaker: Respondent
  text: Well, Mr. Iva. Yeah. He was the main one. And he was a, he didn't mince words when he was coaching. I can see him
    grab a towel off a player and nearly give him neck burn. "Get in there, boy. Get in there. Let's get it on."
- speaker: Respondent
  text: Myron Roderick, who was our wrestling coach, became a very good friend because came back and coached some wrestling
    here.
- speaker: Respondent
  text: And started our wrestling program at St. Frank's.
- speaker: Interviewer
  text: Yeah. Social involvement at OSU, that was back in the big band era.
- speaker: Respondent
  text: Oh, yeah. Big ba
