collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Kansas City, Missouri.
- speaker: Interviewer
  text: Let's talk about your parents - your mother's name and where she came from.
- speaker: Respondent
  text: My mother's maiden name was Anne Lee Trotter. My mother was born in Miami Station, Missouri. Her parents lived in
    Missouri at the time I was born. My grandfather was an insurance salesman, worked at Saint Luke's Hospital in Kansas City,
    which is where I was born. We lived with them while my dad was overseas during World War II.
- speaker: Interviewer
  text: And then your father's name?
- speaker: Respondent
  text: George Weymouth Bailey.
- speaker: Interviewer
  text: And what did he do for a living?
- speaker: Respondent
  text: He was a family dentist.
- speaker: Interviewer
  text: And did he grow up in Missouri or where did he come from?
- speaker: Respondent
  text: Sheridan, Wyoming, and he and his siblings all went to school at William Jewell College in Liberty, Missouri, which
    is a suburb of Kansas City, as did several of my mother's relatives - my grandfather, my uncle that was named after, and
    others that brought them together, and that's how they met.
- speaker: Interviewer
  text: Your mother's personality, what was she like?
- speaker: Respondent
  text: Well, Mother was sort of the organizer and was a school teacher, had taught - she actually did more substitute teaching
    as I was growing up. My brother's years younger, so we were separated by almost a generation. So when she had the two
    of us at home, she would substitute teach rather than teach full time. And then we lived in Wyoming because as soon as
    they got back from the war, we moved to Kemmerer, Wyoming.
- speaker: Interviewer
  text: And your father, his personality, what was he like?
- speaker: Respondent
  text: Well, he was somebody that was going to do his job every day. He went to the office, had a very fixed routine. He
    went to the office, saw the first patient at 8, took minutes for lunch, left at o'clock, and then answered the phone in
    the evenings and on weekends when somebody had a toothache or broken a tooth or done things like that. But he did that
    days a week, took weeks vacation, and did that for years.
- speaker: Interviewer
  text: You must have drawn something from that kind of personality or structured business life.
- speaker: Respondent
  text: Well, the thing drew from it is that he did things that I don't think are particularly common today. He started doing
    some of his own lab work because he didn't want to charge the patients what the labs were charging him to do the work.
    So if he could do it, he started taking Thursday afternoons to do the lab work. We have a friend that's a contemporary
    of my brother's that jokes that his dad would go in when he had a toothache and see my dad, and my dad - to pull a tooth
    was $5, to fill a tooth was $5, and if you wanted Novocain, it was $10. And he said his dad always turned down the Novocain.
- speaker: Interviewer
  text: Right, right. So that was mostly in - what town did he - ?
- speaker: Respondent
  text: Well, he started his practice in Kemmerer, Wyoming. When he came back from the service - he did an expense-paid tour
    of the Mediterranean with General Patton from North Africa to Sicily to Italy - and then when he came out of the army,
    Kemmerer, Wyoming was advertising for a dentist, which is pretty typical of small-town Wyoming for medical and dental
    services. And so he was the only dentist for miles in any direction, and that probably encompassed maybe 3,000 people,
    but it still was a dental practice he had. And then we moved to Missouri because my mother's mother developed crippling
    rheumatoid arthritis, and she and her two brothers decided my dad was the one that had the easiest time moving. And so
    we moved, and we went from - he was the only dentist for a 60-mile radius - to being the fifth dentist in a town of 3,000,
    many of whom were related to my mother, all of whom thought they ought to get free dental service.
- speaker: Interviewer
  text: Right. Your brother's name, what's his name?
- speaker: Respondent
  text: George William Bailey, but he goes by Bill.
- speaker: Interviewer
  text: What was his profession?
- speaker: Respondent
  text: He ended up doing something fairly similar to me. He started out of college at Conoco in the credit department, which
    was based in Kansas City. He also went to William Jewell, as did his wife, and then he joined the pipeline in Conoco,
    which is where he started, and then later moved and spent the bulk of his career as an energy trader, primarily crude
    oil.
- speaker: Interviewer
  text: Did you ever think growing up you wanted to be a dentist?
- speaker: Respondent
  text: No, because people called you at night and called you on the weekends. And you knew that they put off coming in because
    they needed to get the hay in, or they had a sick calf, or they had some problem with their daily life that said you ought
    to work your services when they needed it. And of course, ultimately, I ended up spending far more time in what I did
    than Dad ever did in his profession.
- speaker: Interviewer
  text: Yeah, yes, right, but your dad must have had lots of patience about him to live that kind of life and be on call on
    the weekend and want to help people.
- speaker: Respondent
  text: Well, again, it's a small town, and that's one of the things I love about small towns - you know everybody, but you're
    willing to do what's necessary to take care of your neighbors, your friends. I think, as you know, I spent a lot of time
    involved in the United Way, and remember one of the heads of the National United Way expressed that there was a point
    in time when your support group was your family, your neighbors, and your church. And that's a small town, and it still
    is. I mean, we live the majority of the year now in a town of 1,600 in Wyoming, and see that there in a way that you don't
    see it in a larger community.
- speaker: Interviewer
  text: The first school you attended, where was that?
- speaker: Respondent
  text: Kemmerer, Wyoming.
- speaker: Interviewer
  text: Okay. And so that was elementary. Then tell us about junior high, high school, and all. Where were they?
- speaker: Respondent
  text: We had moved back to Missouri by the time I went to junior high and high school, and so I went to school in Carrollton,
    Missouri, which is a farming community about miles east of Kansas City on the Missouri River bluff.
- speaker: Interviewer
  text: In high school you were active in sports or social clubs or anything?
- speaker: Respondent
  text: I was principally active in sports because I played football, basketball. In Missouri, they did not have spring football
    as they do in Oklahoma and Texas. And so the football coach typically was the track coach, and he made the football players
    come out and participate in track. And then I played baseball in the summer, but worked every summer as well, so my extracurricular
    activities for the most part were sports-related.
- speaker: Interviewer
  text: Did you have any thoughts in high school what you wanted to call your career?
- speaker: Respondent
  text: Things I found easy and the things that I enjoyed on the academic side of it were math and science. My mother and
    the mother of a friend of mine petitioned the high school to add an additional math class because at the time, the presumption
    was that freshmen would not be qualified to take algebra as a freshmen. And they needed - Jim wanted to go into science
    and math, and I wanted to go into science and math-related. And so that worked out well for us. Jim ended up being president
    of the University of Michigan as a nuclear physicist, and ended up having regular gainful employment at the Williams Companies.
- speaker: Interviewer
  text: Your brother ended up as president -
- speaker: Respondent
  text: No, this other -
- speaker: Interviewer
  text: I'm sorry -
- speaker: Respondent
  text: Other contemporary of mine who - we got to take algebra. We were the first freshmen in that school system to ever
    get to take algebra.
- speaker: Interviewer
  text: But that was partly because of your mother, wasn't it?
- speaker: Respondent
  text: Yes, and his, and they insisted that we have that opportunity.
- speaker: Interviewer
  text: That's great to have parents like that, huh?
- speaker: Respondent
  text: Well, it is. And the interesting thing about Mother was she was kind of the social organizer for the family. And yet,
    my dad, I don't think, saw how influential he was in the community and in the family. My mother died - well, both parents
    died precipitously. My mother had a blood clot and aneurysm and died instantly.
- speaker: Respondent
  text: She was 62. And then my dad practiced dentistry for a number of years after that and then retired, and then he was
    killed as he was coming to visit us and missed the turn and took a sweeping turn at Shangri-La in the marina, and there
    was no fencing at the time, and the car went into the marina, and the lake was high, it was dark and raining, and he drowned.
- speaker: Interviewer
  text: Wow. What year? How old would he have been?
- speaker: Respondent
  text: Well, Dad was 75, and so that's been 25 years ago. The point I was making is when Mother died, I think my dad was
    completely astounded by the number of people that came to her funeral that didn't know her but had been his patients over
    their life, and their family had been his patients, and that really moved him.
- speaker: Interviewer
  text: So it would be back in the '90s when your father had that accident?
- speaker: Respondent
  text: Probably late '80s.
- speaker: Interviewer
  text: Where were you when you got the news of that accident?
- speaker: Respondent
  text: Well, we at that point had a home at Shangri-La and had moved from one side, from the estate side, to the chateau
    side. And had told Dad that, "Now when you come down, rather than making the turn to the left, you turn right. There's
    a gatehouse, come on in that way." Well, he'd missed that turn. And they had a big parking lot and an entertainment facility
    in those days by the marina. And he pulls out into the marina and realizes what he's done - I can visualize exactly how
    he did it - and then he made a big sweeping turn to come back the other way, and the car went in. Unfortunately, one of
    the night security people saw the tail lights go up, and they called the lake patrol, and they brought divers and they
    got the car out. And then we got a call, because we were worried at that point because we hadn't heard from him, and he
    was coming in. And our youngest daughter was still at home; the other three children were in school. And we got a call
    from the hospital in Grove, "Are you related to Doctor George Bailey?" And we said, "Yes, that's my father." He said,
    "Well, he's been in an accident. He's here at the hospital. You need to come over." So came over, and they had a pastor
    there, and they were very gracious and couldn't have been nicer. The people that had pulled the car out were there. But
    that was, again, very unexpected, but I could see Dad doing it. And unfortunately, he had just splurged and bought a new
    car that had electric door locks, and those shorted out, and electric windows. So he had taken his seat belt off, turned
    sideways, and tried to push the doors open, but the water pressure had prevented that.
- speaker: Interviewer
  text: What a story. Wow, what a shock to your whole family to handle all that. Think about that even to this day.
- speaker: Respondent
  text: Well, in neither case - Mother died far too young, and then Dad died in a horribly unfortunate accident. And I talked
    to the general manager of the club, and they subsequently put fencing up around it. I said, "We're not somebody that sues
    people..."
