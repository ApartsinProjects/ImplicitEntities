collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Explain your connection to Margery.
- speaker: Respondent
  text: Margery is someone I’ve admired my whole life. She was a very good friend of my aunt, Jean Davisson. I grew up with
    Margery’s cousin’s children, Allen’s Mayo’s children. Marsha Mayo was my age and Cathy Mayo Moore was a couple of grades
    behind me. Cathy and I went around the world together for four months in the 1970s with a group in college. Margery’s
    husband, Don Feagin, I admired, as I did of course Jim Bird who played tennis with my father every Wednesday for 40 years.
    The Feagins and the Davissons and the Kistlers and the Moodys and the Breens were such an elegant group of people that
    I always looked up to. Margery, can you think of anyone else I’m leaving out? You, of course have so many different groups
    of friends…
- speaker: Respondent
  text: You knew everyone at that time, many of whom have died. You knew the Grices and the Masons and the Peters and the
    Siegers, the Phillips and the McClintocks, the Malloys, I can go on and on, but they’re names and that’s enough.
- speaker: Interviewer
  text: Margery would you tell us your birth date and your present age?
- speaker: Respondent
  text: I born and died in Tulsa. I was born September 28th, 1916. My present age is 93.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born at 14th and Cheyenne at my family’s home. My father built that home for his bride. He wanted to show her
    a lot farther out at 19th and Norfolk, and she said, “You’re not going to put me out in the country.” The house is still
    there and a law firm has purchased it.
- speaker: Interviewer
  text: How long did you live in that home?
- speaker: Respondent
  text: I lived in it until I was married in 1939.
- speaker: Interviewer
  text: What are your memories of that house?
- speaker: Respondent
  text: Oh they were wonderful, just growing up and having a delightful time. I wasn’t far from my school.
- speaker: Interviewer
  text: Your mother’s name?
- speaker: Respondent
  text: My mother’s maiden name was Lillian Van Blarcom. She was born in Fond du Lac, Wisconsin. She graduated from Milwaukee
    Donner. She came here as a supervisor of music, which I find very amusing because, a supervisor of music I can’t believe
    there were more than two schools, but be that as it may, she came and she wanted to find a music stand. She was living
    at this time in The Proper Boarding House. She went into the Mayo Furniture Store, which was on 5th and Boulder. The man
    in there saw mother and went over to her and my father also saw her and he said, “I’ll take care of her,” which he did
    for the rest of her life. She got the music stand and lots more. (Chuckle)
- speaker: Interviewer
  text: Tell us about Mayo Furniture.
- speaker: Respondent
  text: The Mayo Furniture Store was on the corner of 5th and Boulder next door to The Mayo Hotel. That was in the Petroleum
    Building. The Mayo Building is on 5th and Main, so the three buildings were all along 5th Street.
- speaker: Interviewer
  text: Who started and operated the furniture store?
- speaker: Respondent
  text: My father and his brother started everything, the building, the hotel, the furniture store—they were all real estate
    enterprises that they operated together.
- speaker: Interviewer
  text: What was your mother like?
- speaker: Respondent
  text: Mother was 10 years younger than daddy and viciously someone would usually say, “Is your daughter with you?” And he
    would say, “You get some glasses, you know better than that!” But she was a lovely person.
- speaker: Interviewer
  text: Your father’s name?
- speaker: Respondent
  text: His name was John Daniel Mayo and he was born in a small town called Clifton Hill, Missouri. He borrowed $300 from
    his grandmother and came here from Missouri to meet his brother Cass Mayo who was coming up from Dallas. Cass had left
    Clifton hill and gone to Dallas to work for a furniture company I think. At that time my Uncle Cass had heard that there
    was quite a bit of activity in Tulsa. Daddy knew that he didn’t want to stay in Clifton Hill, so he elected to meet him
    here in Tulsa to see what two young men could find to do. Needing funds, his grandmother offered to give him $300. When
    they got here the first thing daddy wanted to do was to get that $300 back to his grandmother, which he did rather quickly.
    At that time the furniture store was located in a one-story building at 2nd and Main Street. I think he slept on the mattresses
    that they were going to sell for a while until he had his own place. (Chuckle) Also, this is hard for me to believe, but
    I think he said on a Saturday they could go down near the tracks and for 50 cents they could get a shower. The shower
    usually was a bucket poured over their heads.
- speaker: Interviewer
  text: So this would be approximately what year?
- speaker: Respondent
  text: Daddy came in 1903, four years before statehood. This would have been around 1903 or 1904. They knew that Tulsa was
    going to develop and grow and thought they could use a furniture store. They knew nothing about the oil business and remained
    that way throughout their life. They were exposed to it in conversation of course, but were not actively involved in it.
    Any time they said they made any kind of an investment in it, they didn’t find it successful, so they thought they should
    stay with what they did understand.
- speaker: Interviewer
  text: Where did they get the money to start the furniture store?
- speaker: Respondent
  text: I am sure it was on loan—borrowed money, a little at a time. I remember Otis McClintock said, “I still have the first
    sofa that we bought from you.” Daddy said, “And I bet it’s still damn good!” (Laugh)
- speaker: Interviewer
  text: Did John and Cass have furniture experience before they came here?
- speaker: Respondent
  text: No, not really.
- speaker: Interviewer
  text: They just jumped right into it?
- speaker: Respondent
  text: They just jumped right into it. This is another thing I learned. At that time, furniture stores usually always carried
    caskets. So they had a couple of caskets I guess, I don’t think they stayed in the casket business long and when my mother
    found out she said, “If I had ever known that I never would have married you!” (Chuckle) At any rate that was just a short
    phase and the city did grow. There were mud streets and they put slats down so you could cross over from one corner to
    another in the limited area that Tulsa was at that time.
- speaker: Respondent
  text: My father sold linoleum at this particular sale and it was made in Broken Arrow, which meant it had to be delivered.
    So on the weekend there was a horse and buggy that took the linoleum and my father and another man is Broken Arrow. This
    was before my mother and father were married. It turned out that the man was not able to pay for it, but he said, “Can
    I give you a little piece of property?” He thought that would equate with the price of the sale. My father agreed and
    accepted that. Later my mother said, “Why do you get these ugly farms? I don’t know.” Well, I think now that area is known
    as 71st and Yale.
- speaker: Interviewer
  text: How long did they hold onto that land?
- speaker: Respondent
  text: It was in the process of being sold when my father died in 1972.
- speaker: Respondent
  text: There were some Mayo farms too that were located along the Broken Arrow Expressway where Met Life and the Ford glass
    plant are now. All of that land out there was quite a big chunk.
- speaker: Respondent
  text: I remember the silos were beautiful.
- speaker: Respondent
  text: They are still there. They liked the idea of the silos with the name of their insurance company. I did go out for
    the opening and it was very attractive.
- speaker: Respondent
  text: The McClintocks had a place out there too.
- speaker: Respondent
  text: Yes, right behind it.
- speaker: Respondent
  text: With an eternal flame.
- speaker: Respondent
  text: That’s true.
- speaker: Interviewer
  text: Tell us who the McClintocks were.
- speaker: Respondent
  text: Otis McClintock was president of First National Bank and worked technically for Waite Phillips. He built a beautiful
    house on the Northwest corner of 41st and Lewis that John Duncan Forsyth designed. Gladys and Otis McClintock were very
    good friends with the Philips and the Mayos. They were very, very nice people. I remember Otis but I don’t remember Gladys.
    Of course I knew Mac very well and Grant.
- speaker: Respondent
  text: Mac was a contemporary of mine. We dated I guess you would say. We received invitations at that time, and at Christmas
    time we would be coming home from being away at school and the name of the person that would pick you up would be there
    on it. One time it was with Jack Malloy and we were going to go to Tulsa Country Club. This was while we were in college.
    I got into the car and Jack said, “What in the world do you have on?” And I said, “The perfume that your mother had you
    give me for Christmas.” (Chuckle) In the Malloy family, the father was a very avid Democrat who was a wonderful judge
    and a wonderful lawyer.
- speaker: Interviewer
  text: What was his first name?
- speaker: Respondent
  text: Pat Malloy, Senior. He had a heart attack when he was in Arkansas on some business trip and died all too young because
    he had a brilliant career ahead of him and was having it. They lived at 19th & Owasso. Mrs. Malloy, I feel, never came
    out of mourning. I thought she was a very elegant woman. She had these boys that were as rough-and-tumble as they could
    be. They were attractive as far as I was concerned. They were most attractive.
- speaker: Respondent
  text: Yes, and fun! Pat Malloy couldn’t talk without swearing. That was just a part of his nature. You got to where you
    didn’t hear it because he wasn’t himself without it. You would jump if anyone else dared to speak as he did.
- speaker: Interviewer
  text: Let’s go back to your education starting in elementary school.
- speaker: Respondent
  text: I started at Conway Broun, which was a private school on the north side of Tulsa, over near the Tulsa Country Club.
    I went to kindergarten through the third grade there. It was the first time I was ever in a play. I loved theater and
    in first grade we were doing Sleeping Beauty and this boy I liked was the Prince and I was sleeping beauty. Well, the
    Princess is supposed to awaken with the touch of the prince, you know. But I was so enamored with the touch that I didn’t
    come to, so he kicked me. So the first grade teacher said, “That will be the end of the play.” (Laughter) and so I didn’t
    get any more drama for quite a while. After that I went to Riverview. Then in the 6th grade I started at Holland Hall
    and graduated from Holland Hall.
- speaker: Interviewer
  text: Where was it located when you went to school there?
- speaker: Respondent
  text: When I when the area was located on Boulder between 18th and 21st.
- speaker: Respondent
  text: The building still stands.
- speaker: Interviewer
  text: I am fascinated with your elementary school Conway Broun.
- speaker: Respondent
  text: Aunt Jeanne went there too.
- speaker: Interviewer
  text: Aunt Jeanne was your Aunt Peter, what was her full name?
- speaker: Respondent
  text: Jeanne Walter Davisson. She was married to Dan Davisson. Margery, share with John your story about going to Holland
    Hall with the chauffeur and where the streets stopped and you walked.
- speaker: Respondent
  text: Not all streets were paved at that time, nor did I want to go with a chauffeur. I wanted to go on my own. I did not
    want to be seen at school arriving with a chauffeur. So I asked them to let me out before I got to school so I could walk
    the rest of the way. It isn’t as if that chauffeur lasted forever but anyway, during the period I was very sensitive about
    this and I didn’t like it one little bit.
- speaker: Interviewer
  text: So You would have been in about what grade?
- speaker: Respondent
  text: It was maybe the 7th grade.
- speaker: Interviewer
  text: Did anybody else show up with a chauffeur?
- speaker: Respondent
  text: They might have, but I was only worried about myself.
- speaker: Respondent
  text: Probably Elliot Phillips.
- speaker: Respondent
  text: Yes, there would have been others.
- speaker: Interviewer
  text: You went on to college from Holland Hall?
- speaker: Respondent
  text: Yes, I went to Connecticut College for women, which is no longer for women. Now it’s just called Connecticut College.
    It’s in New London, Connecticut. There were three of us from Tulsa that went to Connecticut College and the president
    said, “Our representation from Oklahoma has increased 300%.”
- speaker: Interviewer
  text: Who were the other two?
- speaker: Respondent
  text: Mary Lou Adams and Dorothy Blodgett. The Adams family owned part of Adams & Leonard.
- speaker: Respondent
  text: Adams & Leonard was a real estate company that no longer exists and that family is no longer here.
- speaker: Interviewer
  text: Any association with the Adams Hotel?
- speaker: Respondent
  text: Tell us how you got to Connecticut College for Women.
- speaker: Respondent
  text: I knew I wanted to go to a small girls college. Connecticut College for Women came across the desk so to speak, and
    it appealed to me. I thoroughly enjoyed it. But after two years there, I had worked out all of my prerequisites and I
    found out I was interested in taking some drama and I was interested in going someplace that had more than Connecticut
    College did at that time. From L.E. Phillips, part of the Phillips family in Bartlesville I heard about the Erskine School
    in Boston. It just suited me to a T. So I transferred my junior year and went to Erskine School in Boston and loved it.
    It was absolutely marvelous. There were certain prerequisites there. You had to go to the Opera and the symphony and visit
    historical sites and do all of the wonderfully culturally interesting things that were certainly available to us. I can
    remember that one time we went to this play and it was going to be the tryout of Porgy and Bess and it was definitely
    a success. It was at that theater that the first time that anyone black had come into the theater.
- speaker: Interviewer
  text: What year was this?
- speaker: Respondent
  text: This would have been 1936. It was the first time that anybody black was in a play. Boston, being as reserved as it
    was, it was wondered how this would be accepted, but there was great applause and it became a success right then and there.
    But I had no idea that it was the first time, nor did it have any meaning to me. I didn’t have any sensitivity to it at
    all of what I was supposedly taking part in or witnessing you might say. I never thought about it. That only became reflective
    publicly later on.
- speaker: Interviewer
  text: But the black person was such a success on stage
