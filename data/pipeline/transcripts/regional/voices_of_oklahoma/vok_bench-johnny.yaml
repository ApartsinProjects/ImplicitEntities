collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born, Johnny?
- speaker: Respondent
  text: I was born at St. Anthony’s in Oklahoma City.
- speaker: Interviewer
  text: Upon birth, I believe, you had two older brothers?
- speaker: Respondent
  text: Two older brothers, Teddy and William. They were five and six years older than I was. I have a sister, Marilyn, that’s
    nineteen months younger than I am.
- speaker: Interviewer
  text: Your mother’s name?
- speaker: Respondent
  text: Everybody called her Katie. She was Kathleen Bessie Chaney. Grandfather was Lon Chaney, not the Lon Chaney, and Verta
    was my grandmother. Clay and Pearl Bench were on my father’s side. And they both lived in Oklahoma City until they passed.
- speaker: Interviewer
  text: Your mother’s background was Oklahoma and Oklahoma City?
- speaker: Respondent
  text: Oh yes, yeah. She grew up there, she went to Capitol Hill and she and Dad met. He was from Blanchard, served two hitches
    in the war. Met Mom, they got married, he got out of the service, I guess, in ‘41 or ‘42. And after I was born we moved
    to Lindsay and then to Erin Springs. When I was three years old we moved to Binger, Oklahoma. While in Binger, Dad had
    been working for his uncle in the propane business and Dad started the propane business in out in Coweta County.
- speaker: Interviewer
  text: Your mother’s personality, how would you describe her?
- speaker: Respondent
  text: Perfect. In every way. Loving, great cook, did everything that I guess you sort of envision as a mother raising the
    four of us and supporting us. Always cheering, always there to fix up a scraped knee or just to give a hug when you need.
    And absolutely, I don’t know how anyone could be more fortunate than I am.
- speaker: Interviewer
  text: Then your father, your father’s full name?
- speaker: Respondent
  text: He was Theodore William Bench. He served, like I said, two hitches in the war, ran the gas company and he would get
    up around four thirty in the morning and go out before it got too hot. Delivered propane for the irrigation wells and
    all the houses around the area. He loved to fish, started a baseball team when I was six years old. We rode around in
    the back of a pickup truck in our little jeans and T-shirts. We played baseball in the backyard and his dream was to be
    a major league catcher. But serving eight years in the war took that dream out of perspective.
- speaker: Interviewer
  text: So in describing his personality then, how would you do that?
- speaker: Respondent
  text: You know, he was a hard working, very hard working man, who also loved to fish. I mean, he just loved to fish. Loved
    to play dominoes when he had a spare moment and was in town. A good disciplinarian, just to the point of, you know, keeping
    the kids in line. And a great supporter, great supporter, hoping that one day one of his sons would be a major league
    catcher. Teddy was left-handed so that didn’t work. And William was a catcher, but had he been on second base, well, then,
    things might have been different. But I was a catcher, although I hardly caught—I pitched most of the time. Dad was basically
    saying, “Keep your eye on the ball and throw past your ear,” and that was the extent of it. And he let us play. Our daily
    routine was when we had a break we played Homerun Derby and a game called Tin Can that we played in the backyard with
    the neighbors. Even on the work-up games that we played they let me play when I was four but my outs didn’t count. So
    I started hitting and playing and competing against them at their level, whether it be just football in the backyard or
    out in the playground. I was given the chance to play and then when it was basketball season we played basketball. And
    when it was work season it was work season. I delivered all the papers, I painted gas tanks for Dad, I mowed lawns. When
    it came time we pulled cotton and worked on the peanut fields combining, loading. And then when I was fifteen I started
    driving the gas trucks for Dad. We ran all the gas to some of his customers. It was just hard working, it was just great,
    but we always had time to do some sport or fish with him or do anything we really wanted to.
- speaker: Interviewer
  text: Is it true that in your DNA you are one-eighth Native American?
- speaker: Respondent
  text: I guess I’m a sixteenth but, unfortunately, we didn’t get on the rolls. My grandfather Clay Bench, his mother was
    a full-blood Choctaw, supposedly. But my grandfather was fostered out, I guess they were a family of nine and they were
    fostered out. They never really got on the rolls. But I’ve always been proud of my Indian heritage.
- speaker: Interviewer
  text: Where is Binger in Oklahoma?
- speaker: Respondent
  text: It’s about two and a half miles beyond Resume Speed. It’s straight west of Norman, southwest of Oklahoma City about
    fifty-five, sixty miles.
- speaker: Interviewer
  text: As you were in elementary grade you were obviously playing baseball even then?
- speaker: Respondent
  text: Yes. We played. The game of Tin Can was our, you know, it was an old Milnot can, they had the church key to poke up
    the top of it. Just make the holes and then you’ve got a bat that was splashed in half at the end so you had a flat surface.
    And you’d throw the can and if you hit it past a certain area and it’s a base hit and a double. And if you hit it farther
    it tripled and a grand slam if you hit it into the shed. After you hit it a few times you could throw a curve ball, screw
    ball, sliders, and by the end of the game it was just one solid, round mass of tin or metal. You know, we basically played
    with our bare hands, which made it fun and gave us a chance to really start learning to hit breaking balls and change
    of speed. And it sort of molded me to become what I was as a hitter.
- speaker: Interviewer
  text: Um-hmm. You mentioned hands, from an early age you had unusually large hands and feet?
- speaker: Respondent
  text: Well, DNA will do that. My dad was only five nine but his hands, when we would measure, my hands at the end were just
    barely past his. My brothers and sisters never really had that, but I was blessed with it. Everybody talked about it,
    me holding seven baseballs in one hand, holding it straight out. And so it became sort of a conversation piece.
- speaker: Interviewer
  text: And that became a nickname for you?
- speaker: Respondent
  text: I became The Hands, I became The Little General because when I came up to the Reds they said they wanted a leader.
    So I sort of said, “Okay.” And it was just in my DNA to do things right. I think that was the way I was brought to be,
    to do it the way it’s supposed to be done, be on time, do what you’re supposed to be doing. So I had those nicknames,
    and the Binger Banger, everybody sort of had a headline.
- speaker: Interviewer
  text: Even in the second grade I think you knew what you wanted to be because the second grade teacher asked you what you
    wanted to be?
- speaker: Respondent
  text: Oh yeah, Mrs. Ralsher, everybody had their deal. When I said, “I want to be a major league baseball player,” they
    laughed. Nobody really ever even thought about that. Eighth grade, Mrs. Tate asked everybody what they wanted to be and
    I again said, “Major league baseball player.” And they laughed again. I had gotten in school a year early. My mom thought
    a December birth, well, she thought it was January 1st for enrollment. When they sent me home with a note pinned to my
    shirt saying I was too young to be in first grade, of course, I cried. But she went to see the school and they found out
    I was in the top 10 percent of the class and they said, “Well, he’s all right to go.” So I got in school a year early.
    So in eighth grade I was only 5’2 with these hands and big, big feet and big head, and so everybody laughed again, because
    really the only people scouting me at that time was Barnum and Bailey, the way I looked. But I grew nine inches in the
    next two years so I was a junior. Mr. Rhodes asked the class and when I said it they didn’t laugh so much this time because
    I was starting to really do well at baseball.
- speaker: Interviewer
  text: Your dad, obviously, was very supportive, I mean, he started this Little League team.
- speaker: Respondent
  text: And we would lose. It was just the beginning of baseball for a lot of the kids and we would lose. Dad would always
    say, “That’s okay, we’ll get ‘em tomorrow. Let’s go have a cheeseburger.” Then at the end of the year, with all our playing
    and practice and Tin Can and everything else, we played a team that was undefeated and we beat them. They were over there
    crying and I looked at my dad and I said, “What’s wrong with them?” And he said, “They haven’t learned to lose yet, Son.
    Let’s go get a cheeseburger.”
- speaker: Respondent
  text: And so I learned to lose, I learned to win, and I played to win and that was the way baseball was to me. When I got
    to be nine years old I was advanced to play with the eleven- and twelve-year-olds. Then when I was twelve I played with
    the thirteen- and fourteen-year-olds. Then when I was fourteen I played American Legion baseball with the seventeen- to
    eighteen-year-olds, really.
- speaker: Interviewer
  text: And with those boys you were batting a pretty good average, 355 your first year, 400 the second year.
- speaker: Respondent
  text: I have no idea.
- speaker: Interviewer
  text: Well, that’s a fact.
- speaker: Respondent
  text: Yeah, they had three catchers. I had to play at Anadarko, which is the county seat of Coweta County. They had three
    catchers so I didn’t get to catch much. I did catch one game. After one catcher quit the second catcher broke his collar
    bone, the third catcher had three passed balls in an inning, they put me in and I hit a homerun in that game that beat
    Bobby Murcer’s American Legion team. And then the other catcher came back— well, at fourteen years old you get seventeen-
    and eighteen-year-olds. Then I played a lot of first base, a lot of third base, until all the catchers graduated and I
    wound of pitching, playing first base. Then I got to catch my last year in 1965.
- speaker: Interviewer
  text: And as a pitcher, you were throwing the ball at 85 miles per hour, a sharp-breaking curve ball, good control, and
    your pitching record was 84 wins and 3 losses.
- speaker: Respondent
  text: I tell everybody 75. I never really added it up but I tell everybody, “I didn’t lose my first game until I was sixteen,
    and that was in extra innings in a nine-inning game with a passed ball. And, unfortunately, it was in the Regional Finals.
    We wanted to win the state championship, but unfortunately, it didn’t happen that year.
- speaker: Interviewer
  text: As strong a pitcher you were your father could have promoted that but he felt being a catcher would be the best for
    you.
- speaker: Respondent
  text: Well, everybody knew I was a catcher, I was just thought of as a catcher. One state tournament I pitched the finals
    of the invitational, finals of the county, the finals of the district, the finals of the bi-district, finals of the regional,
    finals of the state. We won the state championship, but that year I hit 633 so I think they may have wanted to fall back
    on pitching. When I pitched I even took infield as a catcher so the scouts could see me.
- speaker: Interviewer
  text: To make your throwing arm stronger, I believe, your dad moved second base twice the normal distance from home plate?
- speaker: Respondent
  text: No, but he would stand about 200 feet behind and we would play catch and he would want me to throw it on a line. Like
    anything, the arm is a muscle and you develop it. I was born with the hands, I’ve had lots of strength from working in
    the fields. My second year, I mean, I never tried it until my second year in pro ball but I can stand at home plate and
    throw it over the left field walls.
- speaker: Interviewer
  text: Oh wow. Did others try to challenge you on that?
- speaker: Respondent
  text: Oh yeah, everybody wanted to see how far they could throw. When you’re blessed with the DNA, as you say, you just
    feel capable of doing almost anything. And I never thought it was such a big deal, I mean, a lot of the scalps did. The
    Cubs really wanted me and Billy Caps, the scout for the Chicago Cubs loved me. He brought his head of scouting down to
    watch me and I’d just come off a class trip, a senior trip, and I hadn’t played in like ten or twelve days. And I went
    1 for 4. They said, “Please stay over, we’ve got a game tomorrow night.” He said, “Naw, I got to go check these other
    guys.” So the next night I went 4 for 4 with two homeruns and two doubles. Billy, he wanted to draft me in the first round.
    But they thought, “No, nobody will know him.” I mean, it’s the first draft they ever had in 1965.
- speaker: Respondent
  text: They said, “No, we don’t have to waste a draft pick on him.” When a lot of the scouts and some of the directors were
    at some kind of a baseball meeting they were just chatting and having a few cocktails and they started talking, “Hey,
    what about this guy? What about this guy?” And they said, “What do you think about this kid, Bench?” And Jim McLaughlin,
    who was the Minor League director, said, “Oh we’re not that high on him,” and walked out of the room. And people said,
    “Who the hell is Bench?” So they sent Tony Robello in from Texas, and Bob Thurman in from Kansas. They saw me play two
    games, I think I got two hits. But they loved the way I threw. That’s how I became a Cincinnati Red, drafted in the second
