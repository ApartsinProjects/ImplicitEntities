collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: What are you doing these days?
- speaker: Respondent
  text: Well, still go to the office every day, John, but don't have much to do any more. So play bridge and walk and have
    different organizations, book clubs, et cetera. But, mainly, go to the office and manage my affairs.
- speaker: Interviewer
  text: Which is remarkable at your age.
- speaker: Respondent
  text: Well, most of my friends are gone and so don't have much else to do.
- speaker: Interviewer
  text: But you must be grateful. What are the issues of being your age?
- speaker: Respondent
  text: Well, nothing works the way it used to and most of the things don't work very well. So, spend quite a bit of time
    trying to maintain myself.
- speaker: Interviewer
  text: Do you do any-- You said you walk? Do you walk for exercise?
- speaker: Respondent
  text: And walk for exercise and have a routine that go through occasionally-- get massages and yoga and that sort of thing.
- speaker: Interviewer
  text: Keep yourself-- and you do yoga.
- speaker: Interviewer
  text: That's good. Is that meaningful for you?
- speaker: Respondent
  text: Well, it seems to keep my joints working okay.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Durant, Oklahoma.
- speaker: Interviewer
  text: And looked up people; nobody is as famous as you from Durant, of course, but Reba McIntyre, famous actress and singer.
- speaker: Respondent
  text: Yes. That's right.
- speaker: Interviewer
  text: 'And Dennis Rodman: NBA basketball player.'
- speaker: Respondent
  text: Oh, that's right.
- speaker: Interviewer
  text: A very colorful person…
- speaker: Interviewer
  text: …came from Durant. This was the beginning of the Great Depression that you were born and for the next years, nine
    years--
- speaker: Respondent
  text: Lived through most of the whole thing.
- speaker: Interviewer
  text: And what are your remembrances of that?
- speaker: Respondent
  text: Well, remember that people would come around asking for food. My mother would feed them. And nobody had any money,
    including my family. We were never hungry but there was never any extra money around.
- speaker: Interviewer
  text: Were you on a farm?
- speaker: Respondent
  text: No, was in the city of Durant, and my father worked for a bank there. He was a young man that was the treasurer of
    the bank.
- speaker: Interviewer
  text: And Dust Bowl probably didn't affect you any?
- speaker: Respondent
  text: Well, being in Eastern Oklahoma, we were not in the dust parts-- the dust would come by from there occasionally. But,
    mainly, we missed that.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: Bertha Stewart was her maiden name.
- speaker: Interviewer
  text: And where did she live and grow up?
- speaker: Respondent
  text: She was born in a little town-- actually on a farm-- near Idabel, Oklahoma. So she lived on a subsistence farm.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: Well, that means that they made everything and grew everything that they used, except for sugar and flour; and other
    than that, they made it all.
- speaker: Interviewer
  text: Alright. And what was her personality like?
- speaker: Respondent
  text: Oh, my mother was a delightful person and very sophisticated for someone that came from her background. She was the
    most important influence in my life.
- speaker: Interviewer
  text: Really? What do you think you drew from her?
- speaker: Respondent
  text: Well, she was kind and she was responsible and she liked to have fun; and like to do all-- like all those things.
- speaker: Interviewer
  text: Right. So then your father's name?
- speaker: Respondent
  text: His name was John Aubrey Brock. He was a senior.
- speaker: Interviewer
  text: And he? Where was he from and grew up?
- speaker: Respondent
  text: He was born in Idabel, Oklahoma. And they… Actually, their family just came from Arkansas-- Delight. My mother went
    to high school and they met in high school in Idabel.
- speaker: Interviewer
  text: So then your father, his personality?
- speaker: Respondent
  text: He was a very gregarious guy and people loved him. My mother said he never ate lunch alone. He was that kind of guy.
- speaker: Interviewer
  text: And then you said earlier, he was a banker.
- speaker: Respondent
  text: That was when he was very young. He actually went into the insurance business and we moved from Durant-- where he
    had started in the insurance business after quitting the bank-- to Oklahoma City where he was a general agent for the
    Equitable Life of Iowa.
- speaker: Interviewer
  text: I'm trying to trace-- you became a businessman yourself-- inspired most by your father perhaps?
- speaker: Respondent
  text: Well, he always wanted me to go to one of the Eastern business schools. But he died when I was years old; and there
    wasn't any option of doing that. And I was lucky to go to the University of Oklahoma.
- speaker: Interviewer
  text: You had brothers and sisters?
- speaker: Respondent
  text: I was the oldest of four. My brother, Stewart, was next and then Suzanne and Nancy in that order-- Nancy is my youngest
    sibling.
- speaker: Interviewer
  text: Are they still living?
- speaker: Respondent
  text: They're all still living.
- speaker: Interviewer
  text: Good. So, are they near you in age?
- speaker: Respondent
  text: No; I'm years older than Nancy, and 5.5 years older than Stewart, and 7.5 years older than Suzanne.
- speaker: Interviewer
  text: Okay. So my math says they're well into their seventies and eighties then.
- speaker: Respondent
  text: Oh, yes. That's right.
- speaker: Interviewer
  text: Tell us about the first house that you lived in.
- speaker: Respondent
  text: Well, it was a little stucco place on East 13th Street in Durant. The railroad ran right back through our backyard.
    We were kind of at the edge of town. Left there when I was five years old, so don't remember a lot about it.
- speaker: Interviewer
  text: Okay. But did you have electricity and plumbing?
- speaker: Respondent
  text: Oh, yes. Yes, we did. And water. And, yes, that's right.
- speaker: Interviewer
  text: Okay. So you left there when you were five years old.
- speaker: Interviewer
  text: And then you hadn't begun your education yet?
- speaker: Interviewer
  text: And so then where did you move?
- speaker: Respondent
  text: Moved to Oklahoma City and was-- from the time got there-- was too old to be in kindergarten. So started first grade
    in Oklahoma City.
- speaker: Interviewer
  text: And why was the move made?
- speaker: Respondent
  text: When my father got a new job and he became the Equitable Life of Iowa general agent for the state of Oklahoma.
- speaker: Interviewer
  text: So your father was successful. You were living, at least, at the middle or upper income level.
- speaker: Respondent
  text: Well, we were. Like say, we never were hungry. We had plenty; we had enough money. We had more money than most of
    the people at the time.
- speaker: Interviewer
  text: You remember the first cars you can remember in the family?
- speaker: Respondent
  text: I think it was a 1937 Chevrolet when we got to Oklahoma City.
- speaker: Interviewer
  text: Do you remember? Did you drive Chevys all the time or jump to…?
- speaker: Respondent
  text: Well, the first new car we ever owned was a Nash, after World War II. It came out with a wooden bumper. They didn't
    have enough metal to make the bumpers right after World War II.
- speaker: Interviewer
  text: Never heard that before. When was the first car you owned?
- speaker: Respondent
  text: My first car was a 1949 Ford four-door sedan. And got it when I was in college. When I was a senior in college.
- speaker: Interviewer
  text: So, then, your first grade in what school?
- speaker: Respondent
  text: Eugene Field.
- speaker: Interviewer
  text: All right. So grade school through…?
- speaker: Respondent
  text: The first grade and then we moved to a new house a little further out and went to Hawthorn Elementary School and there
    was a Brock in the Hawthorn Elementary School for years after that.
- speaker: Interviewer
  text: Oh, okay. So then was that junior high school and high school?
- speaker: Respondent
  text: Went to Taft Junior high school and Classen high school?
- speaker: Interviewer
  text: All right. So, Classen high school. What was your experience there? Did you get involved in it?
- speaker: Respondent
  text: It was a great high school and we loved it. It had all kinds of exceptional courses. Story was that if you took a
    course, it'd take years to get out. It was very much like Tulsa Central High School, probably.
- speaker: Interviewer
  text: Were you excelling in any particular subject or activities?
- speaker: Respondent
  text: Well, always like history. The science courses-- took my first geology course there.
- speaker: Interviewer
  text: And you didn't know that was going to lead you to something else, for sure.
- speaker: Respondent
  text: That's right. For sure.
- speaker: Interviewer
  text: Interesting why you took a geology course. Why did you?
- speaker: Respondent
  text: Well, was just interested in the earth.
- speaker: Interviewer
  text: Okay. Alright. Good enough. And so what year did you graduate?
- speaker: Respondent
  text: In the spring of 1948.
- speaker: Interviewer
  text: So we bypassed 1941 here. You would have been years old December 7th, 1941. You may have some memories of that day.
- speaker: Respondent
  text: I do. We were living on West 13th Street in Oklahoma City at the time, and the streets were not paved at that time.
    Subsequently, they paved them while we lived there. Remember that newsboys and cars would come up and down the streets
    yelling, And that's the first and only "Extra" I've ever witnessed. But that was on December 7th. And that afternoon is
    when they came by.
- speaker: Interviewer
  text: Did that have any effect on members of your family? Uncles or anybody?
- speaker: Respondent
  text: My uncle went into the army. And some of my parents' friends went into the army. And my father had four children,
    and he was old enough that he didn't get called.
- speaker: Interviewer
  text: So other than that day, then, the war went on and probably, as a young child, it was not an issue.
- speaker: Respondent
  text: Well, we lost our paper boy; he was killed during the war.
- speaker: Interviewer
  text: Oh, yeah. So, obviously, that had an impact. So you graduate in 1948 from Classen. And so then where do you go to
    school?
- speaker: Respondent
  text: University of Oklahoma.
- speaker: Interviewer
  text: And why there?
- speaker: Respondent
  text: Everyone else was going there. Could afford it.
- speaker: Respondent
  text: So, joined the Delta Fraternity. My tuition then was $88 a semester, which is just a fraction of what it costs now.
    It was a fine school, and enjoyed it, and had a good experience there.
- speaker: Interviewer
  text: Okay. So that would have been 1949 or so.
- speaker: Respondent
  text: Well, the fall of '48 is when we started.
- speaker: Interviewer
  text: Okay. Sports is always interesting. At that time, what was going on?
- speaker: Respondent
  text: I was there when the football history started for OU. Bud Wilkinson became the coach when I was a sophomore and went
    there for five football seasons and never saw him lose a game.
- speaker: Interviewer
  text: How about that?
- speaker: Respondent
  text: He lost some away but none at home.
- speaker: Interviewer
  text: How exciting that was.
- speaker: Respondent
  text: That was; we loved it.
- speaker: Interviewer
  text: And he was quite a man, wasn't he.
- speaker: Interviewer
  text: His son has told his story here on VoicesOfOklahoma.com
- speaker: Respondent
  text: Oh, has he? He's a man that everyone admired and respected.
- speaker: Interviewer
  text: They sure did. And he became a commentator on ABC, as a matter of fact, beyond that. Yeah, that was fun for you. But
    then you probably had to go into the classroom too. So, then, what was study?
- speaker: Respondent
  text: Well, majored in business my freshman year and found that the economics class was very boring, so switched to engineering
    after the first semester. And graduated in geological engineering.
- speaker: Interviewer
  text: In what year?
- speaker: Respondent
  text: January of '53.
- speaker: Interviewer
  text: Are you able to go on and get into the business? I think something else was going on in the world.
- speaker: Respondent
  text: Well, there was. Started to work for Shell Oil Company when got out and with the understanding that I'd gotten a commission
    in Army ROTC, and then was called up within a month of my graduation, and got ready to go to Korea.
- speaker: Interviewer
  text: Korean War was from 1950 to '53. So you were being called up near the end of that war.
- speaker: Respondent
  text: That's right. Got to Korea at the end of '54, just after the armistice. Didn't have to kill anyone. No one killed
    me. And thought that was a good trade off.
- speaker: Interviewer
  text: Right. That's when North Korea invaded South Korea, of course. And always remember the talk about the 38th parallel…
- speaker: Interviewer
  text: …dividing the two countries and the whole nation knew that was the line and we were well aware of it in Korea.
- speaker: Respondent
  text: That's right. When-- at the end of the war, we were a little bit north of the 38th parallel. That's where my position
    was. We were on Heartbreak Ridge. They established the demilitarized zone. Our part of it was north of 38th parallel.
    Not much.
- speaker: Interviewer
  text: What company were you attached to? What type was it?
- speaker: Respondent
  text: I was in the 13th Field Artillery Battalion, 24th division.
- speaker: Interviewer
  text: So what did you actually do?
- speaker: Respondent
  text: I was a … had several jobs. When got there, was a company executive officer. And became the battalion reconnaissance
    survey officer, the "S2", which is the intelligence officer. And later became the fire direction officer.
- speaker: Interviewer
  text: They noticed early on you had leadership abilities, and obviously they put you to work. That Heartbreak Ridge that
    was like a month-long battle.
- speaker: Respondent
  text: It was. Our sector was Heartbreak Ridge on the left Sandbag Castle in the center and on the right, The Punch Bowl.
    But Heartbreak Ridge is the most famous part. So always tell people that's where I was.
- speaker: Interviewer
  text: Right, and read about it here because the Koreans were using a ridge of hills there as an observation point.
- speaker: Respondent
  text: Yes. And it was very mountainous and there was about a mile between our front line and their front line. And we were
    on a mountain, and they were facing us with another mountain. There's a valley in between.
- speaker: Interviewer
  text: But, then, you were able to drive them out of there.
- speaker: Respondent
  text: Well, that's the way the war ended. That's the way they established the demilitarized zone. Heartbreak Ridge ran perpendicular
    to the lines.
- speaker: Interviewer
  text: Okay. Alright. Did you have any friends who died in the war?
- speaker: Respondent
  text: No, had a lot of friends that served but none that died in the war. Had fraternity brothers that died in the Cold
    War in the service of the country.
- speaker: Interviewer
  text: After the war, something major happens. You must have met somebody, because…
- speaker: Respondent
  text: Well, had met my wife before, at the University of Oklahoma;
