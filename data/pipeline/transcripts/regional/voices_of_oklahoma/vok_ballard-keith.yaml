collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Keith, would you state your full name, please?
- speaker: Respondent
  text: Keith Edward Ballard.
- speaker: Interviewer
  text: And your date of birth?
- speaker: Respondent
  text: July 23, 1949.
- speaker: Interviewer
  text: And your present age?
- speaker: Interviewer
  text: As we are recording this, I'm in our office here at VoicesofOklahoma.com and where are you as we record this by phone?
- speaker: Respondent
  text: I am sitting at my desk at home. I'm pretty much confined now to working from home. I'm actually sitting at a desk
    that I built whenever I was 15 years old.
- speaker: Respondent
  text: It is a direct result of one of my all-time favorite teachers, an industrial arts teacher at Kiowa High School where
    I graduated along with my…31 of us graduated together. Most of us started kindergarten together. So anyway, I had an industrial
    arts teacher…I really had no ability in that area…but I had an industrial arts teacher that had a great impact on me and
    on decisions that I made later in life.
- speaker: Respondent
  text: And it was because of him that I built this desk that I am sitting at right now when I was 15 years old. Truly I do
    not have the ability to do that.
- speaker: Respondent
  text: But thanks to Mr. McKinley, I did it.
- speaker: Interviewer
  text: Yes, and that's an amazing…and it has stood up all these years despite the fact you felt you weren't good at carpentry
    (laughs).
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: But right now your home is in what town? Where is your home?
- speaker: Respondent
  text: I moved to Claremore when I left Oologah and I became superintendent here. We leased a house for a year and then we
    built this house, and all of my kids were living here when they graduated from Claremore High School.
- speaker: Interviewer
  text: You have faced many challenges in your life, in your career, but you are facing a challenge today that would be, I
    would imagine, the biggest. And we're going to talk about it a little bit now and we'll get into your story and then we'll
    conclude with a bit about it as well. What was the first sign that you knew something just wasn't right?
- speaker: Respondent
  text: Well, we had gone to Sweden to visit our youngest son and his three kids. That was in February, and they had just
    had a baby in mid-January. We went to Sweden to see the new baby. My son is principal of the International English School
    in Orebro, Sweden. He is a very outdoors type and along with his two older kids, we went on the most arduous hike. We
    had an absolutely great time. I was coming off a time when I had walked 180 consecutive days of 10,000 steps or more.
    I was in great shape. We had a great time in Sweden and we returned in late February. Then I just began to notice around
    the first of March that I was beginning to feel just off a little bit. I was feeling kind of light headed and my gait
    was off. I was walking a tremendous amount in walking my dog, which I absolutely loved to do. I just began to notice around
    the first of March that things weren't quite right. And, of course, with the COVID scare going on, the first thing that
    my doctor did, and I see Dr. Beasley at OU…and the first thing that I did was they had me go get a COVID test. It proved
    to be negative. But it just kept getting worse from there. I began to see a number of doctors. Dr. Beasley, for whom I
    have the utmost respect and personal like for, was very concerned. At one point, they actually diagnosed me with pneumonia
    and they treated that, but things just did not get better. In late summer…I'm very busy and very active in my yard…I take
    great pride with all of my flowers and actually I over-plant, I over-do, but it is something that I really enjoy, as well
    as my tomato plants. I had two or three falls, really nasty falls, outside working. So I continued to see…at one time,
    I was involved with five different doctors and they were trying to figure out what was going on. Then ultimately they
    said OK…I had had some tests done with a neurologist who was also affiliated with OU. They couldn't turn anything up so
    they said OK, we're sending you to Mayo Clinic. My first thought was "yeah, right, nobody gets into Mayo". It is very
    difficult, but I will say that my doctors with assistance from my wife of 49 years…they wrote a really nice letter just
    about what I had done in Tulsa. And I don't know that that really influenced anything but it was a really nice letter
    and, the next thing that I know, I am scheduled to go to the Mayo Clinic in September. My wife and I actually drove up
    to Lake Superior and walked all around and hiked all around, although I was unstable and off balance. Just being careful,
    I was able to do all of that. Then it really began to go downhill. I saw doctors at Mayo in September and October and
    then the final diagnosis came in December.
- speaker: Interviewer
  text: And that diagnosis is?
- speaker: Interviewer
  text: Also known as Lou Gehrig's disease.
- speaker: Respondent
  text: Yes. And there could be some other complicating factors. Just last week, I started seeing a doctor and he is an ALS
    specialist in Oklahoma City. He suspects some brain degeneration that also is impacting this. But today, I am very weak
    and I require a walker to get around. So you're right, John, it is the biggest challenge of my life for me personally,
    and there is a reason that I say that. I met yesterday with a physical therapist that I have been seeing for a couple
    of months now and he is working on a wheelchair - a very elaborate wheelchair that meets a lot of needs. You can tell
    that my voice is off. I always prided myself on being a really good public speaker. In fact, speech was one of my majors
    in undergraduate - speech and psychology, I had a double major. Little did I know that I would be superintendent in Tulsa
    one day, Tulsa Public Schools, but I think that undergraduate work in speech and psychology probably helped that.
- speaker: Interviewer
  text: Well I admire you taking on this assignment here of oral history but I want you to know that your speech is very clear
    and those who are listening to this can understand you. There is not a problem there. So thank you…
- speaker: Interviewer
  text: So let's begin here and talk about your parents. Your mother's name and her maiden name, where she was born and where
    she grew up?
- speaker: Respondent
  text: My mother grew up…and I'm really glad that you're wanting to talk about my parents because I had an amazing family.
    I really did. I absolutely adored my parents and they were absolutely great parents. My mother grew up on a farm with
    eight siblings. There were actually nine siblings - one died shortly after he was born. But she grew up on a farm near
    Hazelton, Kansas. I grew up in Kiowa, Kansas, and it was only 6 miles from Hazelton to Kiowa. My parents moved there to
    put my sister and I in Kiowa schools. I started kindergarten there. But my mother, specifically back to her, she was a
    terrific mother. She was very active as a child riding horses. My grandfather had a very active farm. He tilled the ground
    and they had a huge cattle operation and several horses. I grew up on that farm as well. But my mother and my father married
    very young, while they were still in high school at the age of 17. They had two kids by the time they were 19 and a third
    at 21. We were a very close-knit family. The church was important to my family. I swear that I was in church before I
    was a week old and it was just standard procedure that we were in church every Sunday. My parents were warm and loving.
    Although my father never really had the…you asked about my mother but if it's OK, I'm going to move into my father.
- speaker: Interviewer
  text: OK, Keith, let me just ask you…your mother's name first, what was her name?
- speaker: Respondent
  text: Norma Jean Gates…Norma Jean Gates Ballard.
- speaker: Interviewer
  text: And then your father's name?
- speaker: Respondent
  text: William Edward Ballard.
- speaker: Interviewer
  text: Yes, and now talk about your father.
- speaker: Respondent
  text: OK, My dad was an extraordinarily bright guy. He really was. They were married young and they had these kids and they
    totally dedicated their lives to their kids. They were great parents. My father did whatever work he could get in Kiowa.
    To say that we grew up poor would be accurate - we did. As far as having things, we did grow up poor, but we grew up rich.
    It was a very strong, loving family; very supportive. My dad actually worked just whatever he could find. They were determined
    not to leave Kiowa and it was a great place to grow up. For a good period of time, my father was the janitor at the school
    where I went. My father had an enormous IQ and I'm not exaggerating that. He was absolutely a brilliant guy. He really
    found his place in the church and was a leader in the church. And I'm curious about this - he was such a person of well
    read, high IQ, and he swept the floors at the schools in Kiowa, Kansas in order to ensure that his kids would have a bright
    future. John, I swear that I really believe that my parents began talking about college when we were in the crib. That's
    all I ever heard - not all I ever heard. There was a huge emphasis on you will go to college, and we all did. But there
    are other things that I want to say about my family but I'm going to stop there and let you ask the questions.
- speaker: Interviewer
  text: I'm curious…the church you attended, what denomination was it?
- speaker: Interviewer
  text: OK. And can you name your brothers…did you have brothers and sisters, your siblings?
- speaker: Respondent
  text: Yes. I had an older sister - a little over a year older than me - Connie Jean Ballard. I had a younger brother. We
    were so close. We played sports together. We were very active in sports. We were all three really good sibs. I don't want
    to sound braggadocios but that was the expectation from my parents. My brother and I were extremely close and, sadly,
    he got cancer and died at the age of 20. It was a monumental moment in my life. I was so upset. I was so emotional. I
    can't begin to stress how close-knit my family was. My older sister was kind of the commander of the corps and she was
    a fabulous older sister. My brother was a very good athlete. He went to college on a football scholarship but he could
    have gone on a basketball scholarship. He was a very good student as well. He got cancer and died at the age of 20. Now
    I'm going to go ahead and say this, John - on his deathbed, two days before he died…I was teaching in Coweta at the time
    and we had gone home for the weekend. We knew that he was likely going to die soon. So he called me into his bedroom.
    This is very impactful. While I have not the sharpest memory with this ALS, I can still remember it like it was yesterday.
    He called me in and said that he wanted to talk to his brother and he is lying there on his deathbed. He told me that
    he really appreciated the fact that all of us siblings were so close, so protective of each other, very loving to each
    other, and he said, "I'm not going to be able to go on, you have to accept that I'm going to go to heaven very soon, and
    while I don't want you to live your life for me, I want you to do really well in your life. What is too bad is I believe
    that you and I would have always been connected in some way". Actually he was one semester short of graduating from college
    and what he had decided that he was going to do, he was going to teach and he was going to coach, but he was going to
    live in Kiowa and on the side, he was going to keep the agriculture part going. That's what his will was. It had a huge
    impact on me. It was motivating for me for the rest of my life to do well because I was not only representing myself but
    I was representing my precious brother. My sister and I remained extremely close. My brother's name was William Joseph
    Ballard but he went by Joe…Joe Ballard. My sister and I remained extremely close over the years. My sister started out
    as a home ec teacher. She was a wonderful cook and she really enjoyed that. She ended up being a librarian and she moved
    to Topeka, Kansas. We remained extremely close until she died of cancer a few years ago. Right before I took over at Tulsa
    Public, my sister died. Both of my parents…my father died fairly young. My mother lived into her 80s; I actually moved
    my mother into assisted living here in Claremore where I live and so she got to be a part of our lives at the end. I get…well,
    I'll sum all this up by saying I was absolutely blessed with a splendid home life. Did we have money? No, we did not.
    But we had opportunities. I went to work on the farm when I was really very, very young. My brother and I ran a hay crop
    and we never wanted. We never wanted because there were ample opportunities. I had uncles who were involved in agriculture.
    I had grandfathers who were involved in agriculture. I grew up hauling hay. I grew up herding cattle. I grew up driving
    a tractor - I didn't even know how old I was when they put me on the tractor. But I had a blessed upbringing. No we didn't
    have money but we had everything else. We had the church, and I believe that it laid the foundation for my future success.
    My father always talked about all of his kids going to college; two graduated, a third was one semester short. I'm glad
    that you lived with my family, John, because it had a huge impact on my life.
- speaker: Interviewer
  text: You went to school in Kiowa. When you were in high school…high school in Kiowa?
- speaker: Interviewer
  text: And were you a stand-out student there? Were you involved in lots of activities?
- speaker: Respondent
  text: I was a good student. I was very involved in athletics. I was a three-sport letterman. We had an undefeated high school
    football team. We had an excellent basketball team. We did well. I ran the half mile in track and I actually qualified
    for the state track meet. To do that, you had to win at regional or place in the top three. I actually won at regionals.
    I also was a very good student; I really was. But there were only 31 people i
