collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Respondent
  text: Then eventually, Carson Attractions, because it was involved in selling tickets for events that it promoted became
    also a ticketing agency where it offered its services to traveling entertainment groups and sporting events, where we
    could take the event itself and not only project it to the public and sell tickets, but we could assist the sponsor or
    the act itself in planning advertising and promotion in the community, since we were here and they were just sort of passing
    through.
- speaker: Respondent
  text: You end up with the different phases of the entertainment business, of course, being the entertainment itself, but
    the promotion and presenting it to the public so that you can sell tickets. Or maybe you don't even sell tickets, maybe
    you just want a good response from the public to attend.
- speaker: Respondent
  text: While he was at Kendall College, he was approached by the manager of John McCormack, who was a famous, famous opera
    singer. John McCormack was going out on tour for the first time in the United States. They knew of my grandfather's involvement
    with the university and Kendall College and they thought, We'll find someone on the local scene to help present this attraction.
- speaker: Respondent
  text: In those days, the attractions that went out were something that today we don't really know that well. But they were
    the opera singers. They were the choruses, they were more of the fine arts type, they were the rock stars of that era.
    So they approached my grandfather, and I can remember the story my grandmother used to tell, and if you look these people
    up on the internet you can find big stories about them. I did because I wasn't that familiar with them.
- speaker: Respondent
  text: But my grandfather told John McCormack, "Well, we don't know anything about presenting or promoting an attraction."
- speaker: Respondent
  text: And they said, "Don't worry, we will show you, we'll show you how this is done."
- speaker: Respondent
  text: So they did. For the first time they got involved in 1916, in presenting this particular show and selling it. I think
    the tickets probably, some of them were less than a dollar to go see him.
- speaker: Respondent
  text: And in those days, for tickets they used to hand-stamp the individual pieces of cardboard. Then they would write in
    the price of the ticket and then sell these tickets.
- speaker: Respondent
  text: Over the years, my grandparents, from that point on, they put their toe in the water and they were involved throughout
    the community and for many, many years in presenting Enrico Caruso, Galli-Curci, many other opera singers and choruses
    that would go out on tour for the United States.
- speaker: Respondent
  text: Once they had known that the Carsons in Tulsa, Oklahoma, would be the local contact, they worked an arrangement with
    them, a financial arrangement, I'm sure, I don't know what those terms were, to present these attractions.
- speaker: Respondent
  text: That's really how Carson Attractions started and the events were held at Convention Hall at 105 West Brady, which
    later became Tulsa Municipal Theater, and later became, when the Mayo family bought it, Brady Theater, called the Old
    Lady of Brady. But it was originally called Convention Hall.
- speaker: Respondent
  text: And I spent many days in the '40s there as a young tyke, while my parents, later on, were involved in this business.
- speaker: Respondent
  text: So he came into the business with my grandmother, Beatrice, Mrs. Robert Boyce Carson, in 1941. At that particular
    time, the only business that they had was presenting shows. And also in the '40s, you had World War II. Immediately after
    World War II there was an influx of a different type of entertainment. You had comedians, Gene Autry was on tour and had
    his horse, Champion, on the stage.
- speaker: Respondent
  text: I was born in 1942, and since they really didn't have a babysitter, or maybe my parents couldn't afford it, I spent
    a lot of my nights down at Convention Hall while Gene Autry was on the stage or Blackstone the Magician was on the stage.
- speaker: Respondent
  text: One time, Blackstone had a pair of comedians that were part of his act, I think the opening act, and they would invite
    young kids up on the stage and they knew where I was sitting. I knew I was going to go up and I was so excited. And they
    sat three or four of us down on in a chair. It was kind of a spoof on the kids because they reached in their hat or their
    bag and pulled out a rabbit and gave it to the little boy next to me.
- speaker: Respondent
  text: For me, they reached in the bag and handed me a box of candy. But, unbeknownst to me, they hit the box of candy underneath,
    candy flew all over the stage, and I started crying. So when the show was over, they came to the office where my father
    was settling up with Blackstone and they presented me with a white rabbit, which I still remember, it pottied all over
    the table. All over the forms that they'd filled out to report the sales for the evening.
- speaker: Respondent
  text: And then in Oklahoma, of course, the Broadway show Oklahoma, was big.
- speaker: Respondent
  text: And my parents presented the premiere of Oklahoma here in Tulsa. Amazing, for over a one week stand. I went to every
    performance and I sat up right next to the stage at Convention Hall, or Brady Theater, as we know it today. Right next
    to the stage, because those seats usually weren't sold.
- speaker: Respondent
  text: Before the week was over, I was singing, standing on my feet, let's see, I was probably five or six years old, but
    I knew every song and was being very flamboyant with my arms as they were singing the songs for Oklahoma.
- speaker: Respondent
  text: And finally, the manager came and he knew that I was up there, but he said to my dad, "It's so funny, the cast back
    stage wants to know who is this young tyke sitting on the front row next to the stage, singing the songs right along with
    us?" And they explained who I was.
- speaker: Respondent
  text: My father went to him and said, "Mr. Ives, we can reschedule this if you need to go home."
- speaker: Respondent
  text: He said, "No, I need to do this." So he did one of the best concerts, they said, on the stage that Burl Ives ever
    did.
- speaker: Respondent
  text: There were all sorts of acts that they used to have, as I said, Gene Autry went out on tour and would sing his songs.
    The big finale was to have Champion, his horse, come out on stage.
- speaker: Respondent
  text: I remember there was a show in the '60s, called Damn Yankees, Broadway show, and my father was negotiating on presenting
    it here in Tulsa. And as I said, Western Union was the way they communicated in those days. So he called Western Union,
    which he did all the time to present offers, instead of a fax or telephone, that's how they did it. He offered X number
    of dollars for Damn Yankees. This would be his bid.
- speaker: Respondent
  text: They called back and they said, "Mr. Carson, we cannot send this with this word in here." He said, "Well, that's the
    name of a show."
- speaker: Respondent
  text: And they said, "I'm sorry, that's against our rules of Western Union." So he just had to put the word "Yankees" in
    the telegram.
- speaker: Respondent
  text: But it was so easy for me because I grew up in the business. I used to sit on the living room floor in the '50s, folding
    brochures that were to go out in a mailing.
- speaker: Respondent
  text: My father started Broadway Theater League here in 1958, which was the first series of Broadway shows that were ever
    here in Tulsa. I can remember handing window cards or posters around to stores, promoting shows. So I kind of grew up,
    and I would hear the lingo that was involved with show business.
- speaker: Respondent
  text: So when he passed away and I'd just graduated from the University of Arkansas, I came into the business to assist
    my mother, the way that my father did with his mother back in 1941.
- speaker: Respondent
  text: What had happened about a year before my father passed away, the Tulsa Convention Center called the Tulsa Assembly
    Center in those days, was just being completed. They came to my father and said, "You know, we need a box office because
    of all these attractions. And a lot of times in cities we have city people to do it. And then we have to train them and
    get them to know what's involved in selling tickets. Because sometimes you may have several events, ten thousand seats
    for each event. You may have over a hundred thousand individual tickets for sale at any one time." And he said, "Would
    you be interested in taking over the box office?"
- speaker: Respondent
  text: So that is how Carson Attractions got involved with the city of Tulsa and the Tulsa Assembly Center, going in to that
    building. At the same time, there were many shows we were presenting, but we offered services to traveling shows. Dick
    Clark had a slew of rock and rollers that he would put on. Sonny and Cher, the Tulsa Ice Oilers had their office right
    next to our box office. So it was very easy to handle their tickets also. Leroy McGuirk in wrestling was next to the Oilers
    in the lobby of the Assembly Center.
- speaker: Respondent
  text: We became involved in, and the extension of not just handling tickets for your own shows, but offering a service of
    selling tickets for traveling events, and also offering them the service of being able to assist them with radio advertising,
    television advertising, drawing up the newspaper ads.
- speaker: Respondent
  text: I can remember drawing up newspaper ads with my pencil back in the mid '60s even, and scheduling that. The business
    kind of changed at that point.
- speaker: Respondent
  text: At that time, I can remember many events. I think the Royal Marine Tattoo, which was a Scottish bagpipe extravaganza
    was the first show that I was ever involved in in the Convention Center.
- speaker: Respondent
  text: In fact, one of the most interesting events that we had, it was a record-breaker in Tulsa, was Carol Channing in Hello,
    Dolly! in 1966. Tulsa Municipal Theater used to be Convention Hall and now is Brady Theater, and it was so dilapidated,
    it was built in 1915. Well, you can imagine after fifty years it wasn't up to code and the Artists Union had blackballed
    Municipal Theater many times. We had already put tickets on sale and had posters around, Carol Channing was coming to
    town. The newspapers and radio, everyone had been, "Oh, a big show coming!"
- speaker: Respondent
  text: They sent an advance crew in, after the tickets were on sale, to look at the theater. And they called back to New
    York, and they said, "Stop this sale. We cannot come in to this theater. You would not believe the treacherous steps that
    there are. The dressing rooms aren't up to par." I mean, it was an old, old theater in 1966.
- speaker: Respondent
  text: Anyway, I was devastated. I mean, the adrenaline flows when you've about half sold out the show at that point, and
    someone says we can't come in.
- speaker: Respondent
  text: They went to David Merrick, who was the producer of Hello, Dolly! and told him, "Mr.
- speaker: Respondent
  text: And he said, almost quote, "I'll be damned if we can't. We just got through playing Vietnam with a red curtain only.
    We can play Tulsa, Oklahoma, and we will!"
- speaker: Respondent
  text: So we had Hello, Dolly! We broke the record for any theatrical performance in Tulsa, Oklahoma, at that time. It was
    a tremendous success and I maintained a relationship with Carol and her husband, or husband then, Charles Lowe, over the
    years, because of that particular occurrence.
- speaker: Respondent
  text: But we had other occasions too. One time, we had the Harlem Globetrotters in the Convention Center. KRMG had sponsored
    it. We had sold out one performance at 7:30 p.m., it was a Sunday, and it sold out immediately, which we promoted ourselves,
    the Globetrotters. But this was such an early sellout that we decided to put another one on sale. So we put a 2:30 ticket
    sale on for the Harlem Globetrotters. Both of them sold out. It was unbelievable. We were just a record-setter again,
    one of the good moments. You have a lot of bad moments too.
- speaker: Respondent
  text: But we got a call, they were in Amarillo with fog and the bus may not be able to make it. That was the morning when
    they were supposed to be there at 2:30.
- speaker: Respondent
  text: Well, they did show up. They started the game about forty-five minutes late. We explained to the audience what was
    going on. But that was another adrenaline rush rig
