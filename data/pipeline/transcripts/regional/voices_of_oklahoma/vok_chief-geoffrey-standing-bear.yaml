collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Alright. We have to talk to you about your last name, “Standing Bear.” How does that come about?
- speaker: Respondent
  text: 'Mhmm. Well, my great-grandfather was Luther Standing Bear and he was Chief up at Rosebud with the Lakota Nation.
    My grandfather was born in Porcupine on the Pine Ridge Reservation and he, during the 1920s — my grandfather, Eugene —
    went to Haskell Indian School in Kansas and became good friends with my Osage family and came down here. And it turns
    out that my great-grandfather and great-grandmother of the Osage went to Carlisle Indian School in Pennsylvania as did
    my great-grandfather Luther when they were all children. So they all knew each other from those days, plus the Osage and
    Lakota languages are related languages. We’re southern — the anthropologists would say ‘Siouan’ — which would include
    the Omaha, Ponca, Caw, and Quapa with the Osage. And in those days, I was told, in the 1920s, the Lakotas and the Osage
    could understand each other much better. So my grandpa told me, “I came down here during the 1920s a poor Souix boy and
    I ran into your Osage family,” which was my family, “... and they had a lot of money because of the oil.” And he married
    into the family and my father, George, was half Lakota and half Osage. And “Standing Bear'''' came with that — and get
    this: So, one day in high school, I asked my grandpa, “Why does Dad have it ‘Standingbear’ — one word — you have it one
    word, but your father has it two words?” He said, “Well, when I came to Pawhuska, I got an allowance from all of this
    oil money — your grandma. I went to the First National Bank in Pawhuska and I gave ‘em my name: ‘Standing Bear’ — two
    words. And the banker said ‘You can’t do that. It has to be one word.’ And so I changed it.” And I said, “Grandpa, are
    you telling me that you changed our last name because of a banker in Pawhuska, Oklahoma?” And he goes “Yes.” And I said
    “Well, that’s it. I’m going to go back to two words.” So on my high school diploma and then on it’s two words. (Chuckling)'
- speaker: Interviewer
  text: That’s probably what he had to do to get a loan, though, right?
- speaker: Respondent
  text: Well, he hadn’t needed a loan. Back in those days, the statistics show that ever Osage man, woman, and child was receiving
    the equivalent of $400,000 per year tax free. There was no loans going on and there was no financial education going on.
    There was none of that financial literacy that they talk about now, which we are now implementing through here. Can you
    imagine if we knew how to open bank accounts for ourselves instead of through the guardian system? Or if we knew how to
    get more than 1/8ths or 3/16ths royalties? If we did what a lot of companies do with a lot of countries, joint ventures,
    51-49? But, instead, Continental Oil Company — now Conoco, no “L” now — ConocoPhillips, Phillips Petroleum, Getty Oil
    — all these large companies started right here.
- speaker: Interviewer
  text: The $400,000 — where was that coming from?
- speaker: Respondent
  text: 'Oil and gas royalties. But that’s what I was saying: Can you imagine? That’s based on 1/8ths to 3/16ths. And the
    royalty, which went to what we call a headright. And a headright was born out of federal legislation in 1906. We bought
    this reservation with our money from Kansas — our sale of our lands. And we bought this reservation, 1.5 million acres
    almost, from the Cherokee. And so when we bought it, it was subject — decades later — to what they call “the allotment
    process” where the lands of the native tribes were divided into individual parcels. And the Osage were no exception except
    for the minerals. And James Bigheart, our Chief, and the counsel negotiated a special and unique situation where we maintained
    ownership of the minerals communally of the minerals, oil, gas, coal — not coal; well, coal if you could ever find any
    — gravel. We used to do that. When he did that they said, “Well, how are we going to distribute money from that mineral
    estate?” And so every one of the 2,229 Osages received what’s called a “headright,” which is the right to receive income
    from this mineral estate which was managed by the Bureau of Indian Affairs — a federal agency, which it is to this very
    day. Nowadays, because of the history of the Osage, some of that in the “Killer of the Flower Moon,” a movie. The book
    is very well-researched and documented by David Grann. You will see why, today, of the 25,000 Osage people, only 5,100
    have an interest in a headright. Some have two. Most have a very small fraction of that 5,100. But the other 20,000 have
    none. Zero. And, John, let me tell you what was really crazy: Until 2006 — 100 years after the 1906 Allotment — our right
    to vote and hold office in our own government was determined by home much property, that being the headright, that you
    owned. So if you were 21 or older and had 3 headrights, you got 3 votes. If you had none, you got none. So 80% of the
    Osage people were disenfranchised because our political rights were melded with our property rights. And, of course, the
    property rights were under terrible stress. You could imagine how it translates politically and vice-versa.'
- speaker: Interviewer
  text: Who determined that the voting was to be determined by how many headrights?
- speaker: Respondent
  text: The Bureau of Indian Affairs, through federal regulation, using the 1906 Allotment Act as a legal basis.
- speaker: Interviewer
  text: You are now in your third term, right?
- speaker: Interviewer
  text: As the Osage Nation Principal Chief. You were reelected last year, last June, 2022. Can you continue to serve?
- speaker: Respondent
  text: Under our system, we can run for 5 consecutive terms. I do not plan to run again. I’ve ran this third term to complete
    or initiate some projects which we need to keep pushing on. And that’d be primarily our primary — it’s called a primary
    residential treatment program, facility and program, address the issues of alcoholism, diabetes, stress, anxiety. That
    is an area we are going to challenge head on. That takes the dedicated people we have. We’re going to get more; we’re
    recruiting. We’ve got to grab hold of this issue and it’s several generations of work ahead as it has been several generations
    of trauma to get this far. So we have a higher level of those activities that most of society — which is all suffering
    — but I can tell you studies by health experts, presented in this very room to me, showed 8 years go that the life expectancy
    of an Osage here — living here — in Pawhuska, our tribal capitol, the life expectancy here is 10 years less than a similar-situated
    Osage in Tulsa. 60 miles away, because of stress, obesity — the whole list from the studies show your life expectancy
    is cut just living here. And, so, not only are we going to do this primary residential treatment facility, we’ll have
    a transitional facility related to it — adolescents, women, men. And then our big project we’re heading into … unfortunately,
    interest rates are getting higher every month. We’ve got to go ahead and move past this clinic that we have into a much
    larger facility and we’ve cleared out land and purchased land here in Pawhuska for that. That is really what we're looking
    at. So that’s why I ran for a third term and also to make sure that what we call our “Food Sovereignty Initiatives” are
    sustained. We have done some remarkable work on being able to feed ourselves after enduring the pandemic. In March of
    2020, the food supply chain broke down completely here. So we have a 19,000 sq ft. butcher house. We have 2000 head of
    cattle. We have 250 bison. We’ve purchased 43,000 acres from Ted Turner; all of that was our casino moneys. And then it
    was boosted at just the right time by the CARES Act funds — federal moneys — and then the ARPA. So working with my legislature,
    we thought, “Okay, we’ll move the casino monies, the federal monies, food sovereignty, we’ve got to feed ourselves. We
    have beef…” We had cattle we couldn’t use because we were not USDA-certified at the time; we are now. We have state and
    federal inspectors in our plant. We then moved with that same combination of funding to have greenhouses. We have 44,000
    sq. ft. of greenhouses. And we have food processing — was it 9,000 sq ft? Aquaponics. And then what they’re doing — “they”
    being the Osages and other employees that are working with us — they’ve worked the internet to where, step by step, you
    can get online and order your food from both harvest land and our greenhouses and from our butcher house, have a delivery
    point, pick it up; they’re doing great work the younger people. I’m so impressed. And I’ve got to thank, right now, Oklahoma
    State University, University of Arkansas, University of Missouri, Kansas State, Kansas, and my favorite federal agency
    now, the USDA. They — those guys are great. Now, the Bureau of Indian Affairs, that’s a whole other story.
- speaker: Interviewer
  text: Pawhuska. This is where they had the million-dollar elm?
- speaker: Respondent
  text: Right next door. It’s gone, but there’s a plaque sandstone built right there, right next door here.
- speaker: Interviewer
  text: You should tell ‘em why that was such an important tree.
- speaker: Respondent
  text: Well, that’s where the auctions were held for our oil and gas. And many a famous oil tycoon was there bidding for
    leases and paying a bonus to the federal government for the benefit of the Osage headright owners. And that continued
    throughout the 20s and into the 30s. That was a center of activity.
- speaker: Interviewer
  text: Frank Phillips was one of ‘em, wasn’t he?
- speaker: Respondent
  text: Oh, yes. Mr. Marlin was another one.
- speaker: Interviewer
  text: E.W. Marlin?
- speaker: Respondent
  text: Yeah. My great-grandfather Fred Lookout was Principal Chief for much of that time. And my grandmother, Mary Lookout
    Standing Bear, was his translator. So she lived with us and my family, so I got to hear a lot of her views from Mr. Marlin
    — by Mr. Marlin — the things he thought and said. But primarily Mr. Phillips. Mr. Phillips spent a lot of time here, I
    understand. He just spent a lot of time with the Osage one-on-one.
- speaker: Interviewer
  text: So did that become the basis, then, of Phillips Petroleum?
- speaker: Respondent
  text: Yes. Oh, yes.
- speaker: Interviewer
  text: … What he purchased here at this million-dollar tree?
- speaker: Respondent
  text: Yes. And many other oil companies.
- speaker: Interviewer
  text: Okay. Do you think that he really learned to appreciate the Osage and he liked them? He wasn’t just doing it because
    he was buying? Or maybe it’s not an important question.
- speaker: Respondent
  text: Was he a friend to the Osage?
- speaker: Respondent
  text: I understand that he was a friend. And this is second-hand, but, of course, it was business.
- speaker: Interviewer
  text: You’re the great-grandson of the Osage Principal Chief Fred Lookout.
- speaker: Interviewer
  text: And your wife’s name is Julie. Chief Lookout’s wife —
- speaker: Interviewer
  text: Was Julia. And was the great-granddaughter of Chief Pawhuska for whom the Osage County seat was named.
- speaker: Respondent
  text: Well, that’s the way I understand it.
- speaker: Interviewer
  text: Right, well, that’s where I get it — off the internet.
- speaker: Respondent
  text: (Laughing) I didn’t write that, so…
- speaker: Interviewer
  text: So it may not be true.
- speaker: Respondent
  text: Well, who know? Well, except, I guess, you could genetically test all of us. I understand people are learning all
    kinds of things on the internet about who’s related to who. But I take the face value of what they told me.
- speaker: Interviewer
  text: Right. But your wife’s name is Julie.
- speaker: Interviewer
  text: And how many children do you have?
- speaker: Interviewer
  text: And you have grandchildren?
- speaker: Respondent
  text: Yes. 8 of them.
- speaker: Interviewer
  text: I found it interesting about Chief Fred Lookout. Interesting person. You could probably tell us the story for only
    … He was 10-years-old when he joined his family and tribe on the 150-mile walk to the new Osage mission?
- speaker: Respondent
  text: That’s a family story, I was told. He walked with certain young boys about his age. One of them later became assistant
    chief to him — Franklin Shaw. We’ve heard about that. Also I heard from those same sources — my great uncles and aunts
    and my grandparents — that last buffalo hunt we had right before we came here was not very successful. That was a big
    event back in the day I was told.
- speaker: Interviewer
  text: So Principal Chief Lookout. He was Principal Chief 1913 - 14, re-elected 1916 - 18, and then from 1924 - 1949. So
    the thing that got my attention here was he was looking out for the oil leases of the Osage. And then, since I have read
    the book Killers of the Flower Moon by David Grann and that begins in 1921 and onto the 20s and all that. So would your
    great-grandfather have been around for what became known “The Reign of Terror?”
- speaker: Respondent
  text: Oh, not only my great-grandfather but my grandparents and uncles and aunts.
- speaker: Interviewer
  text: Your grandparents. What are their names again?
- speaker: Respondent
  text: Well, Eugene. He’s Standing Bear; he’s Lakota. And my grandmother Mary Lookout Standing Bear.
- speaker: Interviewer
  text: Let’s follow up on Killers of the Flower Moon as long as we have introduced it.
- speaker: Respondent
  text: Great book.
- speaker: Respondent
  text: And you know why it’s a great book? Because David Grann did his interviews with such respect f
