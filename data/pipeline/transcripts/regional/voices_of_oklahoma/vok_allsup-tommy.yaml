collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Tommy, did you have many sessions with Leon Russell?
- speaker: Respondent
  text: Yes I did. He came out to California in 1961 when I was working with Liberty Records. He came out there to see me
    and we got acquainted. I got him a job and Dave a job playing at Relief Band, which is a club there in north Hollywood.
    We played around there for about three years before we moved down to Texas in 1965. I had just done an interview for a
    guy from Houston. He had something to do with Oklahoma. He was doing a big bio on Leon Russell. He sent me a contract.
    He went out to the union and he had really done his homework. He pulled out a contract. He was asking who this guy was
    and who that guy was. We did lots and lots of session-work in ’61 and ’62 and ’63. I played with him until 1964 up through
    Gary Lewis when he got started singing. Leon arranged his first album.
- speaker: Interviewer
  text: You said you were born on a farm near Owasso. Let’s talk about your mother and her maiden name and where she grew
    up.
- speaker: Respondent
  text: Her name was Blakemore. She grew up down around Tahlequah. Her mother was an orphaned baby who grew up and married
    a guy named Bill Blakemore. He was my mother’s father. He was part Cherokee, but mostly German and English.
- speaker: Interviewer
  text: Tell us about your father.
- speaker: Respondent
  text: His name was Thomas Jerry Allsup. He was born in Marion County, Illinois. The Allsups came over the U.S. in about
    1735. I got the date on that from Tex Ritter, who did some homework one time over in England searching out the family
    history of his name. He said the Von Ritters and the Allsups came over at the same time. He told me this in the early
    1960s out in California. He said the Allsups dropped off in Tennessee and the Von Ritters came on to east Texas. Later
    on they dropped the “Von” off of it and when he was born his last name was just Ritter, not Von Ritter. He intrigued me.
    He told me, “I did some research on the name Allsup. Back in the old days they would hold up a glass and they would say,
    ‘Let’s all sup.’ That’s how the name was derived.” Of course I had a bunch of sisters that didn’t go along with that around
    the Tulsa area—but we had a lot of fun with it.
- speaker: Interviewer
  text: Can you trace the Cherokee on your mother’s side to your great grandmother?
- speaker: Respondent
  text: Yes, I’ve got all of that stuff written down. There are some names I can’t even pronounce that go way back. My mother’s
    grandmother and Bill Cody’s mother were sisters. We found that out. Cody was spelled Coody back in the old days and then
    they dropped an “o” out of it later on.
- speaker: Interviewer
  text: You’re talking about Buffalo Bill Cody?
- speaker: Respondent
  text: Yes. My mother would have been a first cousin to Buffalo Bill Cody. My mother was born in 1893 in Tahlequah. Bill
    Cody was born in the 1850s I believe. His parents came out of the Cherokee Tribe.
- speaker: Interviewer
  text: Is it true that your great grandmother actually walked the Cherokee Trail of Tears?
- speaker: Respondent
  text: Yes. My mother’s grandmother died on the Trail of Tears.
- speaker: Interviewer
  text: She never made it to Indian Territory?
- speaker: Respondent
  text: No, she never made it to Indian Territory. Her baby made it, that’s why she grew up in the orphanage in Tahlequah.
    The Cherokees had an orphanage set up at that time just for that purpose.
- speaker: Interviewer
  text: You had brothers and sisters, tell us how many.
- speaker: Respondent
  text: I had a bunch of them. There were 13 kids in my family, six boys and seven girls.
- speaker: Interviewer
  text: What did your father do for a living?
- speaker: Respondent
  text: He was a dry land farmer all of his life. He raised me through the Depression. I was born in 1931 and that’s when
    all of the dust was blowing. It was a big family. They all weren’t home at one time, but I remember when six of us caught
    the school bus. The year I started school, there were four boys and two girls all riding the school bus at the same time.
    We didn’t have any money, but back then I don’t think anybody had any money. Everybody was broke, so you didn’t know you
    were poor. Until you would call your dog to feed him and he wouldn’t come (laughter) then you knew you were poor. There
    wasn’t dog food back in those days.
- speaker: Interviewer
  text: We should mention to listeners that your wife Nicole is in the room here with us. Then your family settled west of
    Claremore?
- speaker: Respondent
  text: It was two miles west of Owasso. We had the corner section of the land. It was 80 acres of Indian land. My mother
    had a couple of sisters and a brother that also had land in that same section. It was about two or three years after they
    got married. They got married in 1910. It seemed like the land came along in 1913 or 1914. They moved off of my uncle’s
    land to the 80 acres that my mother received. That’s where we all grew up.
- speaker: Interviewer
  text: What does Owasso mean? It’s an Osage word isn’t it?
- speaker: Respondent
  text: End of the line.
- speaker: Interviewer
  text: Supposedly it was the end of the Santa Fe Railway?
- speaker: Respondent
  text: It could have been, yes.
- speaker: Interviewer
  text: That’s how Owasso came about.
- speaker: Interviewer
  text: Do you have any recollections of music in your family?
- speaker: Respondent
  text: When I was really little I remember my dad and my brother Bill sitting around and playing. There would always be somebody
    coming by to play the fiddle. Of course, my dad went to bed when the chickens went to roost. They would come by the house
    at 7 or 8pm, which wouldn’t be late in the wintertime. A lot of times he would get up and get dressed and go in there
    and play for an hour or two. Then they would go on. I remember that all the way back until I was three or four years old.
- speaker: Interviewer
  text: Do you remember when an instrument became of interest to you?
- speaker: Respondent
  text: Yes, we had a fiddle that only had one string on it. It was the A string. I got to where I could play a song on that
    one string. I got my brother to Ken to play rhythm for me. That’s when I started getting to like music was on that fiddle.
    When the boys all went away when the war broke out, I started playing for square dances with my dad, so I started learning
    chords on the guitar.
- speaker: Interviewer
  text: How old do you think you would have been when you picked up that one-string fiddle?
- speaker: Respondent
  text: I was about 6 or 7 years old, 5 maybe.
- speaker: Interviewer
  text: It just came naturally to you didn’t it?
- speaker: Respondent
  text: It seemed like it did, yeah. I know it beat working in the farm. Later on, when I started playing for square dances,
    they would pass the hat around and you would pick up $5. Sometimes you would get lucky and you could make $12 or $15.
    Back in those days you could work all day and make 50 cents to $1 working in the hot sun. It didn’t make sense to me.
    I thought the guitar feels better in my hand than a pitchfork or a shovel, or a hoe, you know. (Laughter) I thought I
    had better start practicing and that’s what I did. I have been playing more than 60 years. I have never done anything
    else. I had a job one time when I went to California. I had to transfer into a musicians union. You couldn’t just go out
    there and start to work. They had a waiting period of like 6 months or 9 months, I forget. I went down to apply for my
    union card and then I went to work for General Motors. The first couple of nights I got blisters on the bottoms of my
    feet from pulling cars off of the assembly line and pushing the car bodies over to another line that went upstairs and
    then would drop them down on the chassis. The first week went by and I just thought I really don’t like this. It was worse
    than farm work. So I went out looking and I met Jack Tucker who was from Ada, Oklahoma. He had a band. He had a brother
    named Herb Tucker who also had a band. Jack was pretty popular around southern California in the early 1950s. He took
    me down to the union and he told them, “I am going to hire Tommy to play guitar. He can sing and he can sing harmony.
    If they couldn’t get a guy out of the Local 47 (union) then he had the right to use me. Until another guy comes along
    that’s better (than me), then he could bump me off the job. But nobody came along to bump me, so I finally got my Local
    47 Union card.
- speaker: Interviewer
  text: Let’s come back to the first school you attended. Was it a one-room schoolhouse?
- speaker: Respondent
  text: No, Owasso had a pretty good size school. The one through the 6th grade was in one building and 7th through the 12
    grade was in another building. The grade school was two stories. They had six buses that ran at that time. It seemed like
    there were a lot of kids for back then, but right now it’s a huge school out there.
- speaker: Interviewer
  text: How about your first house? How big of a house was that?
- speaker: Respondent
  text: The house we grew up in had one bedroom, a living room, a kitchen and a back porch.
- speaker: Interviewer
  text: How many did that accommodate at one time?
- speaker: Respondent
  text: Well, there were 4 boys and 3 girls at home.
- speaker: Interviewer
  text: So where did everybody sleep?
- speaker: Respondent
  text: There were two beds in one bedroom and the boys would sleep in one bed and the girls would sleep on the other. We
    would put two at one end and two on the other. That’s the way I grew up was sleeping like that.
- speaker: Interviewer
  text: You never thought anything different—you thought everybody did that?
- speaker: Respondent
  text: Yes. That’s how everybody did it I guess unless they had more than one bedroom. (Laughter)
- speaker: Interviewer
  text: In the birth order, you were next to the youngest?
- speaker: Respondent
  text: I was the youngest boy. I have one sister who was born after me.
- speaker: Interviewer
  text: Did you play in school? Did the teachers know you were musical?
- speaker: Respondent
  text: Sure. I would sing in all of the musicals.
- speaker: Interviewer
  text: So you could vocalize as well as play instruments?
- speaker: Respondent
  text: I thought I could.
- speaker: Interviewer
  text: Do you remember the first dance you might have played for?
- speaker: Respondent
  text: Yes. The first one I really got paid for was at Doc Glass, who was the head doctor at St. John Hospital at that time.
    Every year he would have a big Christmas party. He had a 27-room house out east of Owasso, which was a mansion back in
    those days. He had a beautiful downstairs library with marble floors and hardwood floors. That’s where they would have
    the square dance. They would invite all of the nurses and the doctors that worked there at the hospital to their big Christmas
    party. That was the first one that I played for. It was a square dance. They had a guy that called it and my dad and I
    would play. They passed the hat around and it paid good money, man. We got paid $12 or $13 each. I’ve sowed corn for a
    penny a row out there. (Chuckle) This was in 1941 or 1942. I was about 10 years old then.
- speaker: Interviewer
  text: So that was tall cotton as we say?
- speaker: Interviewer
  text: Your father bought a house in Claremore?
- speaker: Respondent
  text: Yes, we bought a house in Claremore in 1942. I finished up the sixth grade and went to high school there in Claremore.
    When I got to be a junior in high school I started playing with the Oklahoma Swingbillies every Saturday night at the
    American Legion. That went well for a year or so and then I thought I should get my own band. I formed my own band and
    bought an old bus from Leon McAuliffe.
- speaker: Interviewer
  text: How old were you when you were thinking this?
- speaker: Respondent
  text: I was 18. Once we got the bus we would play dances and we would play in Collinsville and Ramona and Vinita and Chelsea
    and Pryor and places like that on the weekends.
- speaker: Interviewer
  text: Since you were living in Claremore, was the Will Rogers Memorial built?
- speaker: Respondent
  text: It was there. I don’t remember exactly what year it was built. Guy, do you recall? It must have been in the late 1930s?
- speaker: Respondent
  text: I remember you took me out there one time when they took that guitar of his that he had gotten from CF Martin. It
    was handmade in 1897. It had been in that case since 1936. He let Larry Gatlin and I play it.
- speaker: Interviewer
  text: This was a guitar that Will Rogers had?
- speaker: Respondent
  text: Yes. Not many people knew that he could play the guitar a little.
- speaker: Interviewer
  text: I’ve never heard that.
- speaker: Respondent
  text: Do you know how much that guitar would be worth today and what one of these collectors would pay for it…a few million
    dollars probably.
- speaker: Interviewer
  text: Where is it now?
- speaker: Respondent
  text: It’s in the Memorial in Claremore.
- speaker: Interviewer
  text: Did your family attend church when you were in Claremore?
- speaker: Respondent
  text: Yes, they belonged to the Baptist Church.
- speaker: Interviewer
  text: Did you play in the church?
- speaker: Respondent
  text: Yes. I had some friends that played in a band at another church and I would go there and play.
- speaker: Interviewer
  text: So it gave you an opportunity to develop your skill. Speaking of Will Rogers, does your family have any actual remembrances
    of actually seeing Will Rogers?
- speaker: Respondent
  text: Yes, they settled out west of Claremore. My dad was born in 1880. He was 12 years old when they settled out west of
    Claremore in about 1892. It was out on the Verdigris River up on a bluff out there
