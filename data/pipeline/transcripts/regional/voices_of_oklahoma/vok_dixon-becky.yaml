collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Becky, would you state your full name, please?
- speaker: Respondent
  text: Rebecca Elizabeth Lynn Dixon.
- speaker: Interviewer
  text: Your birth date?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Coffeyville, Kansas, which is right across the border from Oklahoma, because I was raised my entire
    childhood in Oklahoma, but Coffeyville was the closest town with a hospital.
- speaker: Interviewer
  text: Where in Oklahoma were you raised?
- speaker: Respondent
  text: Nowata County, so South Coffeyville, Oklahoma. We were just miles—our ranch was miles from the Kansas border, and
    I was raised on a ranch in Northeastern Oklahoma, a large family ranch. It's now been in the family for over years. I
    went to school, in grade school, in Coffeyville, Kansas, because that was the closest Catholic school, and that was where
    we went to Mass, and then later changed to Linnepah High School, which was in Oklahoma. So sort of had two states growing
    up, because many of the things that we did as a family—and it was a bigger town, was Coffeyville, Kansas, but our address
    was Oklahoma.
- speaker: Interviewer
  text: So growing up on a ranch, you did ranch work, suppose? They put you to work?
- speaker: Respondent
  text: Oh, yes. I was the oldest of five children. We had many hired hands that worked for us, because it was a large ranch,
    but also my dad made sure that every morning we were out the door, usually helping him with ranch work, as opposed to
    helping my mom, who had to feed all of these ranch hands and children. But most of the time I was outdoors helping my
    dad.
- speaker: Interviewer
  text: Did you take your horses and riding horses?
- speaker: Respondent
  text: Oh, yes. Yes, yes, because there was—there was ranch work to be done every single day. You know, cattle didn't know
    when Saturday or Sunday came along, so there were no days off. But yes, grew up—don't know if you've ever watched Reed
    Drummond's Pioneer Woman cooking show, and you see her children out helping their dad every day with ranch work, but that
    was much like my life.
- speaker: Interviewer
  text: Do you think that you—as you grew up, you drew from some of that experience living on a ranch?
- speaker: Respondent
  text: I think hard work definitely came from my roots on the ranch. I mean, we worked hard every day. My dad, don't recall
    him, especially when he was younger, ever sitting down except to eat one of his meals. He was a very hard worker, and
    on the ranch we worked hard every day. We, you know, oftentimes can remember, oftentimes galloping through the pasture
    at a.m. and watching the sun come up, because during the summer, especially, we liked to do the ranch work early because
    it would get so hot. And then many times, you know, we watched the sun go down as we put our horses up that evening.
- speaker: Interviewer
  text: When they saw you on Wide World of Sports, they had no idea you were a rancher's daughter.
- speaker: Respondent
  text: They didn't know I was a cowgirl.
- speaker: Interviewer
  text: A cowgirl, right. Your mother's name?
- speaker: Respondent
  text: Betty Ruth Lowry was her maiden name.
- speaker: Interviewer
  text: So where did she come from and grow up?
- speaker: Respondent
  text: 'She spent her entire life on the ranch. The ranch was her family''s ranch. There were four brothers who came with
    their father from Tennessee and established the ranch in Oklahoma. And out of those four brothers, there were only two
    children born: my mom and her sister. So they inherited the majority of the ranch. And when my mom married my dad, he
    was the 19-year-old farm boy from Kansas. He grew up in Kansas, but he had to learn ranch work very quickly.'
- speaker: Interviewer
  text: Your mother's personality, what was she like?
- speaker: Respondent
  text: She was a saint. She was a saint, and that was her personality. She was not a critical person. You know, she had five
    children, but she raised us by her example, and she was just a wonderful person. She also was a very hard worker. She
    was entirely responsible for feeding everyone on the ranch, and she never knew how many people were going to show up for
    breakfast, lunch, or dinner on the ranch. She was a wonderful seamstress. She sewed many of our clothes and curtains on
    the ranch, bedspreads. I mean, she could make anything. She was the Martha Stewart of ranching in Northeastern Oklahoma.
- speaker: Interviewer
  text: Did you pick up on any of those skills?
- speaker: Respondent
  text: Definitely not the sewing. And no, didn't really. I think I'm a pretty good cook today, but learned it more after
    I left the ranch. Didn't learn it from my mother. Like I said, I was too busy out on the ranch helping my dad.
- speaker: Interviewer
  text: And your dad's name?
- speaker: Respondent
  text: Harry Charles Lynn.
- speaker: Interviewer
  text: And then he grew up in Kansas?
- speaker: Respondent
  text: He grew up not too far from Coffeyville, Kansas on a small farm near Liberty, Kansas. And he went to high school in
    Coffeyville, Kansas. Coffeyville was the larger town of those small Kansas and Oklahoma towns at that time.
- speaker: Interviewer
  text: How would you describe his personality?
- speaker: Respondent
  text: He was a very hard worker, strict disciplinarian in that, you know, he wanted each of us to do the right thing, and
    he made sure that we knew what he thought was the right thing. I learned so many things from him. He was a character.
    He had many ranch hands come and go on the ranch over the years, and they all said to the person, it was the hardest job
    they ever had, but it was also the best job they ever had.
- speaker: Interviewer
  text: They learned a lot, didn't they?
- speaker: Respondent
  text: They learned a lot. And he made sure everyone who was around him learned a lot, and he had plenty to say and plenty
    to teach. And to this day, I can still open a gate with the best of them.
- speaker: Interviewer
  text: And that takes a skill.
- speaker: Respondent
  text: Well, if you do it by his book, it takes a certain skill. He had a specific way. He wanted everything done, and that
    was how he wanted definitely his children to do it.
- speaker: Interviewer
  text: Well, he probably impacted many, many lives beyond his imagination.
- speaker: Respondent
  text: Oh, he did. My parents were killed together in a car accident in 2005, and over people came to their funeral. We had
    the funeral together at our Catholic Church in Coffeyville, and many of those who came were his former ranch hands. And
    that's how I knew how they all, years later, felt about him.
- speaker: Interviewer
  text: How about the accident? How did that happen?
- speaker: Respondent
  text: My parents were coming home from Coffeyville to the ranch. It's about a 10-mile drive. Somebody was driving miles
    an hour on a country road and hit them, and they were both killed instantly. It was 2005. What a shock. I really don't
    have the words to describe how shocking it was and the grief that followed for our family. Because, you know, it's like
    a candle being snuffed out, and all of a sudden they were just both gone.
- speaker: Interviewer
  text: Wow. Who stepped up on the ranch then to take over?
- speaker: Respondent
  text: My oldest brother. I'm the oldest, and then I have my next brother is Charlie, and he runs the ranch. He's worked
    on the ranch every day of his life, except when he went to college at Oklahoma State. But we still, you know, love to
    go to the ranch. It's like my, my husband says, it's like my drug when I go there because it always makes me feel wonderful,
    and I'm filled with so many memories. I went there a couple of weeks ago. And there's no place more beautiful.
- speaker: Interviewer
  text: Yeah. It's great that it's still in the family, and do you look at the future? Are your brothers, do they have children?
    Are there youngsters that will probably continue on?
- speaker: Respondent
  text: We don't really know. My brother has two daughters. I don't think either one of them are interested. We don't really
    have a next generation that's really interested in ranching. I'm hoping some will develop along the way, but right now,
    I'm not sure what the future of the ranch holds, but know it will always have the most special place in my heart.
- speaker: Interviewer
  text: Well, you and your brother still have a lot of living to do, so. You can enjoy it all.
- speaker: Respondent
  text: Yes, and he's, like I said, he still works there every day.
- speaker: Interviewer
  text: Okay, your education. Where did you go to grade school?
- speaker: Respondent
  text: The Catholic school in Coffeyville, Kansas, Holy Name school. I went there up until sixth grade and then switched
    to Lenape High School, which was in Oklahoma, Nowata County, and the reason I switched is because Coffeyville, a Holy
    Name school, did not go into middle school and high school. I think at first they went up to eighth grade, and then there
    was a shortage of nuns, and so they—know the school is still there, but I'm not sure what grade they go to now, but switched
    over for middle school at Lenape High School.
- speaker: Interviewer
  text: Okay, and your faith in the family must, in your religion, in Catholicism, must have been really strong in the family
    since they made sure you were attending a Catholic school.
- speaker: Respondent
  text: Yes, my mother drove, like I said, Coffeyville was, oh, to miles from our ranch house, and, you know, by the time
    she got to the school, it was probably, let's say, miles, so she drove miles a day just to get us back and forth to the
    Catholic school. My father was the Catholic, my mom converted, but yes, it was very important to them that we went to
    the Catholic school, and then my younger siblings did not go to the Catholic school. My oldest brother did. Then, by the
    time they started to come along, the middle siblings, my mom had to make a decision. Did she leave to take some of us
    to the Catholic school in Coffeyville, or she had to get the others to the school in Lenapa? So at that point, we all
    switched to the Lenape schools.
- speaker: Interviewer
  text: In high school, what was that experience like for you? Were you active in many activities?
- speaker: Respondent
  text: I was. It was a small school. There were students, around students, in my graduating class. I played basketball. There
    weren't a lot of other activities for us. There weren't clubs, so to speak. There was 4-H and FHA. FHA was Future Homemakers.
    I was not really involved that much with any of those.
- speaker: Interviewer
  text: Was sports becoming of interest to you? You said you played basketball. Was that a part of your life, big part, small
    part?
- speaker: Respondent
  text: Not as much as sports that have evolved around ranch life. You know, for instance, rodeos or competing in horse shows,
    things like that. I was more interested in those, although did become interested in basketball. My mom had played basketball,
    so that was kind of a sport. That was really the only sport available at the time for young women at that school, because
    like I said, it was a very small school.
- speaker: Interviewer
  text: What year did you graduate?
- speaker: Interviewer
  text: So then what do you do?
- speaker: Respondent
  text: University of Tulsa.
- speaker: Interviewer
  text: Was that a no-brainer? Did you shop?
- speaker: Respondent
  text: Well, never wanted to leave the ranch, first of all. But of course, knew needed to and wanted to go to college. So
    chose the college that was closest to the ranch, and that was the University of Tulsa. The other one considered was Oklahoma
    State University. My mother had gone to Oklahoma State. So considered that, but had a strong history in Tulsa because
    my grandmother had three or four siblings that lived down here. So we came to Tulsa often. I was very familiar with Tulsa,
    and liked Tulsa, and it was close to the ranch. I could go home on the weekends if wanted to.
- speaker: Interviewer
  text: Let's name your grandmother. What was her name?
- speaker: Respondent
  text: Her name was Lila White Lowry.
- speaker: Interviewer
  text: All right, so at TU, what will your degree be in when you graduate?
- speaker: Respondent
  text: Education and a minor in journalism.
- speaker: Interviewer
  text: Okay, and why?
- speaker: Respondent
  text: Education because could see myself maybe becoming a teacher someday, but didn't have a... wasn't completely sold on
    that idea. Journalism, because it was something that I... can't say that was really interested in pursuing a career in
    journalism, but liked reading. Liked writing. Liked the skills that it took to minor in a journalism degree.
- speaker: Interviewer
  text: So there's nothing tracking in your mind right now about what could possibly have been your future. So that's not
    even in your well house at this point.
- speaker: Respondent
  text: No, not at all. Like I said, really thought would probably end up on a ranch someday, whether it was staying at my
    own ranch and living there. I was just so happy growing up on the ranch and being with my family. Our closest neighbors
    were my grandmother and cousins, and they were three miles away, and we were all on the same ranch. So that was my, you
    know, pretty much my entire life, and I was very happy there. So didn't really... didn't grow up dreaming of a career.
    And if when you think about it in 1969, young women didn't really track that way, at least the young women in my life.
    Do you know what I'm saying? But when got to the University of Tulsa, did become more interested in pursuing a career,
    and did do my... did my student teaching at a school here in Tulsa, and liked that. It was in sixth grade. Then—I was
    a teacher for a year in first grade, and—but then became pregnant, and then was married and became pregnant with my daughter,
    and thought, "I'm not really sure that can do justice to children all day and then come home and do justice to my own
    child." And that's when started to think about a career in journalism.
- speaker: Interviewer
  text: Okay, I've got to come back.
- speaker: Respondent
  text: Okay. I know this can be confusing.
- speaker: Interviewer
  text: To cowboy boots.
- speaker: Interviewer
  text: You were... you must have worn and owned a bunch of cowboy boots.
- speaker: Interviewer
  text: Do you own any today?
- speaker: Interviewer
  text: Do you wear them anywhere?
- speaker: Respondent
  text: I wear them sometimes. I wear them sometimes. If go to the ranch, I'll wear them. If go to Pawhuska, went there recently.
