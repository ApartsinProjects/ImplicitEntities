collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Let's talk about your mother, your mother's name, maiden name, where she was born and what kind of personality she
    had?
- speaker: Respondent
  text: She was born -- her name was Margaret Alice Wilson. She was born in the Sand Hills of western Oklahoma. She was living
    in a half dugout situation that they built to survive on the great plains and, and she was born about shortly after the
    20th century was done.
- speaker: Interviewer
  text: And what kind of personality? Was she outgoing or…?
- speaker: Respondent
  text: 'She was a very religious woman. If may digress to my father, his name was Dwight Henry Carter and he was born in
    Lane, Kansas. But later his family took -- migrated to western Kansas and his parents split up and his mother went back.
    She did not like the Great Plains. She''s moved back to Lane and he was reared there by his father and spent his early
    years getting a little bit of education. There was not many schools in Syracuse, Kansas and he was a wrangler, a cowboy:
    rode the planes, herded cattle, wore a six shooter and had a saddle rifle which recently fell into the hands of my great-grandson
    who wants himself to be a cowboy. He rides sheep. He''s seven years old. And he gets thrown off. And my father died on
    December 7th, 1949. And in the West Tulsa yards of the Frisco railroad when a big he … He had gotten hired after the dust
    bowl. Finding any job was a great blessing. And he was hired as a laborer and he painted box cars, and tank cars. And
    it was a cold day in December and he had built his fire under the pot of paint that he would spray paint, and it exploded,
    and he was fatally burned.'
- speaker: Interviewer
  text: When you were years old, one brother was at Oklahoma A&M on a rustling scholarship and the rest of the older children,
    there were seven in all … the brothers and sisters, eight, counting me. They had grown up and moved away so was sort of
    stuck there with the household in my senior year at Daniel Webster High School. It's interesting. At that time, also was
    president of the Tulsa Inner School Council, which was an effort by Rogers Central and Webster to make peace when we got
    tired of killing each other after a football game. Those were rowdy times in Oklahoma; and went to work then for a guy
    named Kyle Tinny who was some kind of a comedian/journalist and he had bought the West Tulsa Paper. Got my first newspaper
    job there -- $20 a week -- in the summer of 1950 after was graduated.
- speaker: Respondent
  text: Webster High.
- speaker: Interviewer
  text: Oh, so you wrote for a newspaper even before you went on to TU?
- speaker: Interviewer
  text: Were there things about your father that you wanted to emulate? You wanted to ride horses and round up cattle and
    all? Was that his life appealing to you?
- speaker: Respondent
  text: 'Coming out of the dust bowl out in Enid, and landing the job in Tulsa, he was able to buy a small acreage out in
    a little community of Red Fork. We had a couple or three acres, and we kept a cow, and a horse, pigs, and all kinds of
    farm animals. So was reared with lots of … we had a subsistence-type farm out there. We raised our own chickens, and our
    own eggs, and milk, and then there was somethings you purchased: coffee and sugar. But mostly it was pretty much like
    the pioneers who came into the tall grass prairie and moved out into the short grass prairie -- and the no-grass prairie.'
- speaker: Interviewer
  text: When were you showing writing instincts or writing ability? After high school you started writing, but there's got
    to be a beginning into this. Were you writing earlier in your life?
- speaker: Respondent
  text: I was writing for the Tulsa … The three schools also had a newspaper there and had various … contributed to it through
    the years that cannot recall whether that was my junior and senior year. But wrote for it for quite a few articles and
    they, you know, seeing your own words and publication, you sort of get to thinking maybe you're a newspaperman. Thought
    from then on, until was about years old -- years later -- figured that I'd earned my spurs and was truly a newspaperman.
- speaker: Interviewer
  text: But you went through Tulsa schools -- grade school and junior high here. And then Webster High School you graduated
    in what year?
- speaker: Respondent
  text: Then went to Tulsa University and where… Actually, at that time, don't know the situation these many years later.
    But at that time, it was basically a technology school. They expected the people on that side of the city to end up being
    laborers, you know, or people in the trades, building trades, manual labor type jobs. And they tried to teach you those
    things. Went to TU without any kind of math background or any foreign language. I've always been a big reader and read
    most of the books that were in the Red Fork library when was growing up, which thank for my education more than what they
    tried to cram into my skull when was a kid growing up. When got out to TU, had saved up $100 and the tuition was $200.
    So put down $100 and went with this woman who was an advisor, and she looked at me and said, "Joe Carter, you are not
    college material." Well, did get a degree in economics but had a break when went off to the army, came back and then decided
    that if wanted to be an economist, would need a PH D. And decided, instead, to get the journalism degree. So have degrees
    from the University of Tulsa, 1957 and '59.
- speaker: Interviewer
  text: Well, you must have done something right. You were elected to the Webster High School Hall of Fame. So there was something
    about your life and all that they honored.
- speaker: Respondent
  text: Jesus said, and that proves I'm not a prophet.
- speaker: Interviewer
  text: Let's go back to December 7th, 1941. You would have been around years old. Do you have any recollection of that day?
    You were quite young. The bombing of Pearl Harbor?
- speaker: Respondent
  text: 'That was a very traumatic time. They were talking about saboteurs that would go around and poison your water and
    kill you. And so you had to watch out for saboteurs. And spotted a big, old, metal round thing in the middle of the street.
    Figured that''s where they''d go. Well, it turned out that was a sewer. So was not much of -- very alert -- to the dangers
    of World War Two. But when was seven years old, one of my older brothers had a newspaper -- Tulsa World -- route, and
    he would pay me cents a week to get up in the morning and walk with him around on that route. And I''d run up and put
    the paper behind the screen and he would walk down the center of the street. So when we got through, we always had a newspaper
    to read. So started reading newspapers cover to cover. To this day, read three newspapers: the Norman Transcript, the
    Daily Oklahoman and the New York Times, which subscribe to the print edition.'
- speaker: Interviewer
  text: It's best to hold it in your hand, isn't it? The print edition of the newspaper?
- speaker: Respondent
  text: Feel the same way. I've got ink in my blood.
- speaker: Interviewer
  text: Yes. Yes, you do.
- speaker: Interviewer
  text: Was it then after TU that then you served on active duty?
- speaker: Respondent
  text: Yes. Was two years on active duty and got the GI Bill of Rights, which really financed it. Before that, when was working
    and when was going to TU, got sundry jobs. Tended bar -- beer bars. They only had beer. Tended bar down at two or three
    saloons. And also washed trucks at Baker Truck Rental and we rented trucks to MediGold. They'd come in, and was out there
    with a high pressure hose, washing those for a buck an hour to pay my tuition and try to read the books when got off work.
    My grade point average was not exceptional. Did not have time to read the books.
- speaker: Interviewer
  text: Did your parents instill in you education and hold that in front of you, or did that just come naturally to you, that
    you knew you needed to get a good education?
- speaker: Respondent
  text: My mother did not want me to go to the university. She wanted me to go into drawing and become a bookkeeper so could
    work inside. Wouldn't have to work out in the weather. She was not well educated. She had the equivalent of ninth grade
    and even taught back in the little school out in western Oklahoma where she had gone through through 6. She was very caught
    up in the Pentecostal Holiness Church and all of that -- all of those strange things they do to worship God. And after
    my father was killed -- and she was a woman in her late forties, and I'm sure she was very frustrated in having eight
    kids -- can imagine what her main interest was for recreation. But she got finally ordained in the Pentecostal Holiness
    Church. I am a Methodist who stays at home religiously. Kind of like to look to Jesus if need some spiritual guidance;
    I'll look to Will Rogers if want some good sense in politics and in civic affairs.
- speaker: Interviewer
  text: Well, you got some -- you've got two good leaders there for you.
- speaker: Respondent
  text: Those are my leaders.
- speaker: Interviewer
  text: That's, that's --
- speaker: Respondent
  text: And listen to my wife carefully.
- speaker: Interviewer
  text: And we should say that your wife is Michelle, and she's sitting here at the table with us, and listening to this.
- speaker: Respondent
  text: She is very distinguished herself, following me as director of the Will Rogers Memorial Commission, she had been Vice
    President of Fidelity Bank. Director of Public Relations for the Oklahoma Heritage Association and has quite a vitae in
    advertising and public affairs.
- speaker: Interviewer
  text: When did you two meet? How did you meet?
- speaker: Respondent
  text: There was a guy from Tulsa named Harold Stuart set that up, and he owned a little TV station here, but he was president
    of the Oklahoma Heritage Association. And happened, at that time, to be Vice president of Cameron University in Lawton.
    And he came down there to, you know, to find out what happened outside of the Tulsa city limits. And hosted the deal;
    and he decided should be on the board of directors and be on her committee. And that's how we met. And that was a third
    of a century ago. And it gave my life a lot of direction. She is a very, very good addition to my life.
- speaker: Interviewer
  text: That's great. That's great. And she's sitting here to hear it all, too. So Harold Stuart did a lot of wonderful things,
    but maybe that was the biggest thing he did.
- speaker: Respondent
  text: 'We went to his wedding when he got married at age down in Florida. And you remember his wedding? There was Francis
    Langford, the songstress, and we heard her sing "I''m In the Mood for Love." And there they were: two year olds. It was
    wonderful. Loved Harold Stuart. Kind of bumped shoulders with him a lot in Washington and out here in Oklahoma.'
- speaker: Interviewer
  text: Quickly about Harold Stuart -- to be around him. Was he charismatic? Outgoing? Or what was he like?
- speaker: Respondent
  text: I'll tell you that in my judgment, he was just absolutely the model of integrity, you know. He was wealthy; he had
    married the heiress to an oil company; and he was on a lot of board of directors as they merged. And can't even remember.
    But know that Harold Stuart was a very civic-minded man and honorable beyond words.
- speaker: Interviewer
  text: 'Then he was in Norway and he adopted two children: John Stuart and his sister.'
- speaker: Interviewer
  text: I've interviewed John Stuart for Voices of Oklahoma, as a matter of fact, and he talks glowingly about his father.
- speaker: Respondent
  text: He should; he was very fortunate to be adopted by the Stuarts. He and his sisters landed a jackpot because her life
    would have been very dismal, think, in Sweden.
- speaker: Respondent
  text: Norway, yes. I've been to both countries and still get them mixed up. (Chuckling)
- speaker: Interviewer
  text: Well, I'm Norwegian and don't get them mixed up. (Chuckling)
- speaker: Respondent
  text: Oh! (Chuckling)
- speaker: Interviewer
  text: Yeah. No, you're, you're exactly right. What they -- if they weren't adopted.
- speaker: Interviewer
  text: A little bit about your service in Korea. What did you do?
- speaker: Respondent
  text: No, never went to Korea. Ended up shipping people to Korea for North Port Louis, preparing people to go overseas.
    And these were secret movements because they were wanting to sink the troop ships. We had a very -- it was a very sensitive
    thing, but we had to assemble enough troops to fill up a troop ship and send them to Tacoma in the middle of the night
    and board them a troop carrier and get out on the ocean. That's what did most of the time, and in training.
- speaker: Interviewer
  text: And the reserves, after that.
- speaker: Respondent
  text: Was required to serve two years of active duty, then got the full $110 a month which paid for my education then. And
    then had to serve eight on the inactive duty -- subject to call up -- and never was called up.
- speaker: Interviewer
  text: Got to go back to when you were talking about Webster, you said that area of town people thought those people living
    in the Webster area would do … what should say?
- speaker: Respondent
  text: They were going to be industrial.
- speaker: Interviewer
  text: So at that time, people actually felt that those kids in that area of town … would need a trade school, basically?
- speaker: Respondent
  text: Basically, it was established as a … It's a beautiful campus, you know, it looks like a small college and …
