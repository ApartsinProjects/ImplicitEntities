collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Drew, would you state your full name, please?
- speaker: Respondent
  text: William Andrew Edmondson.
- speaker: Interviewer
  text: And your birth date?
- speaker: Respondent
  text: October 12, 1946.
- speaker: Interviewer
  text: And your present age?
- speaker: Interviewer
  text: I'm interested in names. How do we end up calling you Drew? I suppose from Andrew, but it could have been Andy too.
- speaker: Respondent
  text: I thought you were checking to see if I was oriented times three. I'm not sure why it wasn't Bill. Could have been,
    when my mom and dad got married in the Navy. Mom was a wave and Dad was in the Navy. They were in San Diego, and they
    were real close to Andrew Wilcoxson. Andrew Wilcoxson from Muskogee was a classmate of my dad's and was best man at that
    wedding. But they didn't call me Andrew, they called me Drew. They named me Andrew, but they called me Drew. They lived
    on our street, 14th Street in Muskogee. They were Presbyterians where we went to church. We grew up with them. The first
    two born into my family were James, Jim, and Andrew Drew, and Andy's first two kids were Drew and Jim.
- speaker: Interviewer
  text: That's too confusing for me.
- speaker: Respondent
  text: It confused most people.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Washington, DC, Sibley Memorial Hospital, while my dad was in law school. I was always quick to point
    that out. I was not born into a congressman's family. He was a struggling veteran going to law school at Georgetown. As
    soon as he graduated, we all moved back to Muskogee.
- speaker: Interviewer
  text: We'll talk about him, but let's talk about your mother. Your mother's name, maiden name, where she grew up.
- speaker: Respondent
  text: Her name was June Maureen Pilley, P-I-L-L-E-Y. She was born in Nebraska, but when she joined the waves, she was in
    Kansas City, was an actress, and stage actress in Kansas City. So she gave up show business to defend the country.
- speaker: Interviewer
  text: That was honorable.
- speaker: Respondent
  text: And joined the waves.
- speaker: Interviewer
  text: Okay. Her personality, how would you describe her?
- speaker: Respondent
  text: She was pretty outgoing. She was very active in the little theater in Muskogee because of her own background and civic
    clubs in Muskogee. She campaigned with Dad, but it was not her favorite thing to do. So when Dad quit running for things,
    I think she breathed a sigh of relief that she didn't have to do that anymore. Been to a lot of bean dinners.
- speaker: Interviewer
  text: Sure. Any qualities you think you may have drawn from her?
- speaker: Respondent
  text: I guess politics is another form of acting. And did a lot of little theater work in Muskogee because of her. And it
    was interesting because, you know, she had a high school degree but never went to college. And, you know, Baycomb College
    was right there and Northeastern opened a branch in Muskogee, and we encouraged her on occasion to go take some courses.
    She took an art course from Dick West at Baycomb, but that's about as far as that went. But she was the most well-read
    person that I knew.
- speaker: Interviewer
  text: Probably taught you to become a reader. I suspect you're a reader.
- speaker: Respondent
  text: Yes, she did—and very strong on Shakespeare. We learned a lot about Shakespeare's plays just at home. There was a
    Shakespeare Club in Muskogee. And she was in it.
- speaker: Interviewer
  text: Look at the education you were getting at home already, not necessarily from school.
- speaker: Respondent
  text: We were very fortunate that next to our dinner table was a set of Encyclopedia Britannica and a set of World Book,
    and always dictionaries. We didn't wonder about a question. We'd look it up.
- speaker: Interviewer
  text: And she'd probably tell you to do that, 'Look it up.'
- speaker: Respondent
  text: Right, and would say, 'How can you look it up if you can't spell it?'
- speaker: Interviewer
  text: Right. Then your father's name?
- speaker: Respondent
  text: Originally Edmond Augustus Edmondson Junior. He changed it legally to Ed.
- speaker: Interviewer
  text: What a name that is, huh? Edmond Augustus Edmondson.
- speaker: Respondent
  text: Yes, Junior. His father was Edmond Augustus. And trace that back at least as far as the 1860s, Andrew Jackson Edmondson
    had two sons, Edmond Augustus and James Howard in the 1860s.
- speaker: Interviewer
  text: Wow, yeah. But then his father, your grandfather, was he a Muskogee County commissioner?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: So that shows how this service to country and state goes way back in your family.
- speaker: Respondent
  text: And before and after being county commissioner, he was one of those people that politicians needed to go see, you
    know. And they're all over the state, people that if you're running for office, they'd say, 'Go see so-and-so.' He was,
    guess you could call him a ward healer. He was very interested in politics. He got an invitation to, think it was for
    Harry Truman coming to Oklahoma City, that was addressed to E.A. Edmondson. At that time, E.A., my grandfather, had already
    passed, but Dad was E.A. also, and he took that invitation and went to the meeting. He found out later that he was supposed
    to bring $1,000, but he didn't know that at the time.
- speaker: Interviewer
  text: But then he has a brother by the name of J. Howard Edmondson.
- speaker: Interviewer
  text: Your uncle.
- speaker: Respondent
  text: That's correct, younger brother.
- speaker: Interviewer
  text: J. stood for James.
- speaker: Respondent
  text: James Howard.
- speaker: Interviewer
  text: Right. And then we can talk about him, but he was Oklahoma governor and U.S. senator.
- speaker: Respondent
  text: Elected in the Prairie Fire campaign of 1958, the big red E.
- speaker: Interviewer
  text: All right, but then your father, he worked as a journalist.
- speaker: Respondent
  text: He really liked journalism. When he was first out of Congress, it would have been 1972, he wrote a column, 'An Oklahoman
    Looks at Washington,' sent it around, and then he asked if any of the newspapers that he'd been sending it to would like
    to pick it up. And don't think he had very many takers on it when they had to pay money for the column. They enjoyed printing
    it when he was sending it for free. But he admired journalists.
- speaker: Interviewer
  text: And he worked for the Muskogee paper, The Muskogee Phoenix, guess?
- speaker: Respondent
  text: That would be maybe before my time.
- speaker: Interviewer
  text: And United Press International, as a matter of fact, but we should also say that he was a correspondent for several
    Oklahoma newspapers when he was in Washington from 1946 to 1947.
- speaker: Respondent
  text: That was when he was in law school. He was in the Navy and he was also in the FBI all during that time period.
- speaker: Interviewer
  text: Special agent, yes, and became a lieutenant in the U.S. Navy serving in the Pacific, was also in the U.S. Naval Reserve,
    1946 to 1970. What a background your father had.
- speaker: Respondent
  text: And he kind of led us all into the Navy. My brother Jim and also served and we were both Navy.
- speaker: Interviewer
  text: Because of your father.
- speaker: Respondent
  text: Father and mother.
- speaker: Interviewer
  text: You were destined to be in both Navy and politics. I would imagine all they would talk about at the dinner table would
    be politics, or mostly?
- speaker: Respondent
  text: Politics was certainly open for discussion at the dinner table, but we had a wide range of subjects at the dinner
    table, including the proverbial question, 'What did you learn in school today?' And we talked about our schoolwork and
    things like that, and things that are happening in the world and things that are happening in the country, not so much
    the next race, how's it going, that kind of stuff. It was more the issues involved in politics than it was the mechanics
    of politics itself.
- speaker: Interviewer
  text: Quite the education you were getting there as well.
- speaker: Interviewer
  text: But like the story about your uncle, J. Howard Edmondson. Let's take just a minute to talk about prohibition and his
    role in prohibition, and maybe you can lead me on that. Talk about prohibition and what he did to actually do away with
    prohibition in our state.
- speaker: Respondent
  text: He tried to make it clear during the 1958 campaign - keep in mind I was at the time, so this is not a professional
    evaluation of the campaign, this is just what I observed. He tried to make it clear that what he advocated was allowing
    the people of the state of Oklahoma to vote on it. He tried to avoid being labeled as either a prohibitionist or someone
    in favor of repeal. He was in favor of repeal, but that isn't how he wanted to be characterized. He wanted to be characterized
    as 'the people have a right to vote on it.' That was a lesson he learned in 1950 in a state rep race in Muskogee, where
    he lost. Dad was county attorney and Howard was running for the legislature, and he got beat by a fellow named Bill Hayworth.
    The Sunday before the election, churches all over town were leafleted with flyers saying that Howard was for repeal of
    prohibition, and he thinks that cost him some votes. That is how J. Howard ended up in Tulsa. After that race, he moved
    to Tulsa and became an assistant county attorney and ultimately county attorney and governor. But he was cautious of that
    subject in the governor's race because he got bit by it in Muskogee in a state rep race. So he tried to make it clear
    he was for the people voting, but he engineered that vote by dispatching Joe Cannon, later a district judge in Oklahoma
    County, and at that time his head of the Department of Public Safety, to dry up every bootlegger and every private club
    speakeasy in Oklahoma. Joe worked the highway patrol in doing that, stopping people running whiskey into the state and
    closing down private clubs and things like that. The Will Rogers admonition was that Oklahoma would vote dry as long as
    the Baptists could stagger to the polls. Well, they voted to repeal when they could no longer get their whiskey illegally.
- speaker: Interviewer
  text: In the days of prohibition, as I understand, they were making it, and then of course the criminal type got into it
    and all that happened simply because we told people, 'You can't drink,' 'Thou shalt not drink,' and it backfired in their
    face.
- speaker: Respondent
  text: Certainly since biblical times, there are stories about drinking.
- speaker: Respondent
  text: Jesus's first miracle was at the direction of his mother, changing water to wine.
- speaker: Respondent
  text: It's a great Mother's Day story, by the way.
- speaker: Interviewer
  text: Yes. But J. Howard, your uncle, was the youngest governor in the history of the state at years old. Amazing, and he
    still holds that record.
- speaker: Respondent
  text: I thought David Boren might have gotten close to him, but I'm not challenging that. I think that's probably true.
- speaker: Interviewer
  text: Right. Then ultimately, we should talk about how he became Senator J. Howard. How did he become senator?
- speaker: Respondent
  text: Howard was down at the Orange Bowl watching Oklahoma play when Robert S. Kerr died New Year's Day, it would have been
    1963. George Nigh was still in Oklahoma, so he was governor. It's kind of a curious legal point - the lieutenant governor,
    when the governor's out of state, is not acting governor; he is governor. The Constitution says the powers of the office
    devolve upon the lieutenant governor. So Howard called George and said, 'George, you're not gonna do anything exciting
    while I'm gone, are you?' But he was getting a lot of input from powerful legislators on who he could name. But George
    stayed loyal to Howard and held off, and they discussed it. Again, these are hearing conversations around the house -
    that George had offered the senatorship to Bob Kerr's widow on the assumption that she probably would not run again, and
    he offered it to Bob Junior on the condition that he not run again, and that was unacceptable to the Kerrs. So then he
