collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born at Wesley Hospital in Oklahoma City, which later became Presbyterian Hospital.
- speaker: Interviewer
  text: Your mother’s maiden name and where she was born?
- speaker: Respondent
  text: Her name was Francis Glasgow and she was from Gainesville, Texas.
- speaker: Interviewer
  text: How did she come to Oklahoma?
- speaker: Respondent
  text: My father was born in Paris, Texas. Both my mom and my dad’s fathers went bankrupt during the Depression in 1929.
    They didn’t know each other, but they both moved to Oklahoma City to try to regroup I suppose. That’s where they met.
    So she grew up in Gainesville and moved to OKC and she and my father met in OKC and eventually married.
- speaker: Interviewer
  text: Your father’s name?
- speaker: Respondent
  text: Jack Emmett Barry. They called him Jack or John.
- speaker: Interviewer
  text: What did your father do? What was his profession?
- speaker: Respondent
  text: My father was a self-man man. He put himself through night school in Oklahoma City. He went to work as a general flunkie
    at a savings & loan. In those days they called them billing and loans. When he died at age 66 he was chairman of the board.
    He was a self-made man and just a terrific person with people. He was a people person. Dad was very, very successful because
    of his own doing.
- speaker: Interviewer
  text: That was his main profession though, the savings & loan business?
- speaker: Interviewer
  text: What about his education?
- speaker: Respondent
  text: He went to TCU when he lived in Texas, but his folks couldn’t afford that anymore, so he went to night school in Oklahoma
    City.
- speaker: Interviewer
  text: Did you have grandparents in OKC?
- speaker: Respondent
  text: Yes. My grandfather on my mother’s side died before I was born. My grandmother and grandfather on my father’s side
    I knew for many, many years. I was close to them.
- speaker: Interviewer
  text: What was the first house you remember here in the OKC area?
- speaker: Respondent
  text: On Northwest 20th Street in OKC near Classen High School.
- speaker: Interviewer
  text: So you would have gone to kindergarten near there?
- speaker: Respondent
  text: I went to kindergarten at Gatewood. Then my folks bought a home in OKC, which in those days was on the outskirts of
    town. Now it’s one of the main areas, near Taft Stadium. I went to Cleveland Grade School in OKC, Taft Junior High School
    and Classen High School.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: I had one brother named Jack. He is still alive and he is 84. We aren’t estranged by any means, but we are totally
    different. We are as different as night and day. He has no interest whatsoever in sports. (Chuckle) He worked in insurance
    for many years. I love him dearly, but we just don’t have much in common.
- speaker: Interviewer
  text: So there’s a four-year difference in age?
- speaker: Respondent
  text: Yes. He was in WWII. When you have a four-year difference, that’s really a big difference. It meant that I was never
    really in the same school with him.
- speaker: Interviewer
  text: I am six years older than my brother so I understand. So as a youngster, were you interested in sports from the get-go?
- speaker: Respondent
  text: Baseball was my big love and I still do love baseball. It’s the greatest sport ever invented without question because
    it has every athletic ability—you need to jump, throw, catch, run, slide—it has every aspect. Baseball is a great sport.
    It’s not as popular in the modern day as football and basketball perhaps, but baseball was always my love. Primarily,
    I was interested in baseball because—if you are interested in details—my dad’s mother’s great-uncle owned half of the
    Oklahoma City Indians minor league baseball team. Therefore, I got free tickets when I was a kid to go to the OKC Indians
    games. I got to pitch batting practice. I thought I was really a stud. I was about 15 years old pitching batting practice
    to these minor league baseball players, which were just bigger than life to me. That’s how I grew up was going to just
    every baseball game I could go to.
- speaker: Interviewer
  text: You must have been a star among your friends too?
- speaker: Respondent
  text: Oh yes. They thought I was just a stud. I signed an autograph one time and someone thought I was a member of the team.
    (Chuckle) That word got out and it was embarrassing that I was signing autographs.
- speaker: Interviewer
  text: Where did they play in those days?
- speaker: Respondent
  text: There was a ballpark at 4th and Pennsylvania in OKC. It was called Holland Field and then it became Texas League Park—that’s
    where the Oklahoma City Indians played.
- speaker: Interviewer
  text: They were the farm club of the Cleveland Indians?
- speaker: Interviewer
  text: Do you recall seeing watching players that turned out to be major league stars at that time?
- speaker: Respondent
  text: Yes, Al Rosen and Paul Easterling. Many of these names people probably don’t remember or have even heard of. This
    was before integration, so I really don’t know any of the black players who were great for Cleveland until after I was
    much older.
- speaker: Interviewer
  text: I had an Al Rosen baseball card.
- speaker: Respondent
  text: Did you? Al Rosen was a big stud. There were a bunch of others. I was out there every night because I got in for free
    and it was really fun to watch them.
- speaker: Interviewer
  text: Wasn’t Rogers Hornsby a manager of that club?
- speaker: Respondent
  text: Yes, very briefly. He was unsuccessful as a manager.
- speaker: Respondent
  text: Oh very much so. It was like Superman being manager of a bunch of clods. Rogers couldn’t put up with the minor league
    capabilities, or lack thereof, so he was not a good manager.
- speaker: Interviewer
  text: You would have been about 10 years old, so did you see him as a manager.
- speaker: Respondent
  text: Yes, every night. I was literally there every night. There was no air conditioning in those days and I had free tickets
    and I went with my grandparents.
- speaker: Interviewer
  text: Obviously baseball was your big interest, but you had a music interest too didn’t you?
- speaker: Respondent
  text: Right. My father was a musician. He played ragtime piano by ear. When I was very young, about 10, 11, 12, dad wanted
    to see if I had any rhythm. You are either born with it or not. You either have it or you don’t, but you can’t learn it.
    You can learn it, but you’re not good at it. So one Christmas, my dad got me a track drum set with the tom-toms and the
    cymbals. He sat down at the piano and started playing ragtime. I did have rhythm, which I do, so he and I teamed up and
    played for a lot of civic clubs during World War II. We would go out to Tinker AFB where they were building airplanes
    and play for the workers while they were building planes. We would play for high school assemblies and stuff like that.
    The when I got older, I joined the Musicians Union in OKC and played drums with dance bands. I did that for years and
    put my kids through college with money I made playing drums. I was a dumber and a drummer. I was a dumber in school and
    a drummer as a musician. My two children, I have two boys—Frank who is my elder son, is a musician as well as a schoolteacher.
    He plays drums and has two groups he plays in. My son Bobby is on Channel 4 in OKC and does a great job. I often say that
    Frank got the music and Bobby got the blab of my genes. (Chuckle)
- speaker: Interviewer
  text: (Laughter) It’s nice that you shared it like that between the both of them. On December 7, 1941, you were 10 years
    old. Do you have any recollections of that day?
- speaker: Interviewer
  text: Tell us about that.
- speaker: Respondent
  text: Well, Roy Jones was my next-door neighbor. At age 10, boys were playing guns or cowboys and Indians in those days.
    Roy and I were playing out in the yard on Sunday afternoon, December 7, 1941. Roy had to use the restroom, so he went
    inside. He came outside and he said, “There’s an airplane flying and it might be Japanese bombing us!” Of course, I didn’t
    know what he was talking about. It scared me to death. I went inside and I remember my dad sitting in front of that huge
    Philco radio, of course that was before TV. He was really worried I could tell trying to figure out what was going on
    and so forth. So I have a definite recollection of the Pearl Harbor attack.
- speaker: Interviewer
  text: The ensuing days or months or years, do you recall men going off to war?
- speaker: Respondent
  text: Oh yes—absolutely. We had scrap metal drives at the Cleveland Grade School. I can remember Mrs. Smith my homeroom
    teacher in grade school—her husband was drafted, as were all of the men in those days. The librarian, she was a German
    lady—she was ashamed of her native country of Germany and the part they were playing. I just have memories like that.
    Of course you just thought the war would never end. It went on and on and on.
- speaker: Interviewer
  text: In ended in 1945, do you remember when it ended?
- speaker: Respondent
  text: Yes, I was home sick in bed. I had a lot of sickness when I was young for some reason. I remember being in bed ill
    and the war ended and hearing all of the Broadway and New York celebrations on the radio.
- speaker: Interviewer
  text: In 1938, you had an accident.
- speaker: Respondent
  text: I was 7 years old, right.
- speaker: Interviewer
  text: Tell us about it.
- speaker: Respondent
  text: In those days, the 1930s, you had pop-stands. You could build a little wooden pop-stand and put it in your front yard.
    You could go down to the Coca-Cola Bottling Company and get fruit drinks, either strawberry or grape or whatever, plus
    Coke and so forth. You would buy them and bring them out to your pop-stand and sell them to the neighborhood kids for
    a nickel apiece. So I am 7 years old and I love strawberry pop. Mother had gone somewhere and my dad was of course working.
    I had a nickel and my brother had this pop-stand. I paid my brother the nickel I had because I wanted a strawberry pop.
    Well, I wanted another one. (Chuckle.) My brother wouldn’t give me one. He told me I had to have money or he as not going
    to give me another one. That’s how older brothers are. With my mother being gone I called my father at work. I said, “Dad
    I want a strawberry pop and I don’t have any money.” He said, “Where’s your mother?” I said, “She’s gone.” He said, “Son,
    don’t call me at work. You’ve already had one strawberry pop.” I said, “Can I borrow a nickel from the next-door neighbor?”
    He said, “No, son. You don’t need to do that. Don’t do that.” Well, I went to the next-door neighbor and I said, “My dad
    said I could borrow a nickel from you.” (Chuckle) The neighbor thought it was real cute. They were great friends. He gave
    me a nickel and I got my strawberry pop. When my dad came home the neighbor, jokingly knocked on my dad’s door and said,
    “You owe me a nickel. Your son took a nickel off me.” So dad called me in and he said, “Son, I told you not to borrow
    a nickel.” I said, “I didn’t.” He said, “Don’t stand there and lie to me. I know you did. He told me you did.” I said,
    “No, I didn’t.” So this went on and he said, “Son, you go upstairs and you are not having any dinner until you are man
    enough to come down and admit to me that you lied to me because I know you did.” I said, “No, I didn’t.” So I went upstairs
    and I was crying. My grandmother lived with us at the time. It was summer. Again, there was no AC in those days. Mother
    had eaten dinner and had gone outside and was painting the swing. I was crying and leaning against the screen and it came
    open. I fell two stories headfirst onto a concrete porch. I actually at this moment, even at age 80, I can close my eyes
    and remember lying across my mother’s and grandmother’s lap in the backseat of the car and my dad driving like a bat out
    of hell to Wesley Hospital. The treatment, and this has a big significance in my life, I’m not being dramatic, it really
    does—but I had all of my head wrapped. I was bleeding through every orifice—eyes, mouth, nose and ears. They were worried
    about all kinds of things—gangrene setting in, blood clots, brain damage, which there probably was (laughter). They were
    worried about just everything you can imagine. There was no treatment. The doctor told my mother and father, “I want him
    with his head on the pillow for eight weeks. Don’t lift his head off the pillow for eight weeks.” Well, can you imagine
    a 7-year old boy in those days with no TV? What do you do? You listen to the radio. That’s all you could do. I couldn’t
    even get up to go to the bathroom. I listened to all of the play-by-play guys, Bill Stern and all of those great guys
    from way back then. I just became enamored with radio. At the end of 8 weeks, I got up and fell flat on my face because
    my legs had atrophied. They didn’t know that in those days. I was a sickly person because of all of this. I had terrible
    leg aches growing up. That’s why it has great significance because that’s the genesis of my interest in radio. I never
    lost it. I would invent little baseball games. I had this game and I would announce it and the windows were open and I
    would be yelling the plays and all of the neighbors thought I was nuts. They would say to my mom and dad, “Can’t you close
    the windows so we don’t have to listen to that?” After a game each day I would make a little newspaper of how my game
    came out and I would put it on my dad’s Hi-boy, He thought it was cute for awhile but then he thought, this kid’s got
    a problem. (Laughter) So that’s the long answer, but my head injury in 1938 led to my career in broadcasting.
- speaker: Interviewer
  text: You were really creative at that age to entertain yourself that way.
- speaker: Respondent
  text: Well, I had to. There I was lying in bed.
- speaker: Interviewer
  text: Were you able to put these two together? Here you are in 1938 at 7 years old and then you go to baseball games. Did
    you think early on that you would be a play-by-play announcer?
- speaker: Respondent
  text: I don’t think that I actually thought that, but it was in the back of my mind obviously. I would make a little card
    on all of the major league players. What I was doing was trying to imitate those announcers I heard on the radio.
- speaker: Interviewer
  text: Who was the voice of the Oklahoma City Indians back then?
- speaker: Respondent
  text: Curt Gowdy of course came in later, but he’d broadcast the Oklahoma City Indians.
- speaker: Interviewer
  text: Was he there for many years?
- speaker: Respondent
  text: Yes. He’s from Edmond, Oklahoma. In fact, his sister still lives there.
- speaker: Interviewer
  text: So you were enamored by these announcers’ voices?
- speaker: Respondent
  text: Yes, I would try to mimic what they were doing obviously
