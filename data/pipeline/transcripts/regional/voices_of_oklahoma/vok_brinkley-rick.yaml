collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Rick, would you state your full name, please?
- speaker: Respondent
  text: Sure. Legal name is Ricky Lawrence Brinkley, but go by Rick Brinkley.
- speaker: Interviewer
  text: Named after somebody?
- speaker: Respondent
  text: Well, you know, as most families do, my middle name is Lawrence and asked one day why I was named Lawrence and was
    told it was my grandfather's middle name; and asked my grandfather about it and he goes, So that's where we are.
- speaker: Interviewer
  text: And your birth date?
- speaker: Respondent
  text: July 25th, 1961.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: Oklahoma City, Oklahoma.
- speaker: Interviewer
  text: 'Let''s talk about your mother: her maiden name, where she was born, what kind of person she was.'
- speaker: Respondent
  text: 'Sure. My mom is years old, still going strong. Her maiden name was Fifer: F-I-F-E-R. She was from Collinsville, Oklahoma
    and graduated from there. My dad is from Monticello, Arkansas. He has passed away; his name was Donald Daniel Brinkley.
    His father and his uncle were raised in an orphanage, so we don''t know much about any of that side of the family. My
    father''s father ended up dying in a bus accident when my dad was eight and my dad dropped out of school and started picking
    cotton. My favorite part of that is that he was driving a taxi cab at 13, worked his way up, never graduated high school,
    and ended up becoming that cars were his thing - became the general manager of a car dealership here in Tulsa for decades.
    And just was a good man who''d overcome a lot and did great things.'
- speaker: Interviewer
  text: That was your father?
- speaker: Respondent
  text: That was my father.
- speaker: Interviewer
  text: And, so obviously, he had an outgoing personality and that type of thing?
- speaker: Respondent
  text: Yes, he was one of those people that everyone loved. I mean, I'm still… Some people, who are well known, some who
    are people I've never met before in my life, will stop me and say, "You know, your dad did this for me, and you don't
    know this, but your dad is what, you know, kept me going." One of the stories is from someone who's very well known in
    this community, but won't say his name pulled me aside one day and he goes, and his father was a doctor, and he said,
    "I needed to borrow a car; my car was in the shop, and your dad's like, 'Here, I'll give you a car to drive.'" And he
    said - the car got stolen and he goes, my dad, maybe go in there and tell him that had lost this car, a brand new car
    that he would just let me borrow. And he goes, "Your dad just looked at me and he goes, 'Things happen.'" And he said,
    "I'll just never forget that. As long as live, that was just waiting to be yelled at and screamed at," and you know, and
    he goes, "I was, like, in high school and he - your dad - just bent over backward to make me feel OK." And that's who
    my dad was.
- speaker: Interviewer
  text: Your mother's personality? And what did she do?
- speaker: Respondent
  text: 'My mom was a stay-at-home mom until all three of us graduated and then she went into the real estate business. She''s
    one of those people that the… Again you will, people like my siblings - I''ve got two younger sisters - and we will say
    the same thing that we will be out and people will walk over and go, "Oh, met your mom and she''s the sweetest woman I''ve
    ever met in my life." Now, our response is, "I don''t know who you met. That was not my mom." But we say that laughingly.
    She is that way. She really is. But she has always had a pretty good sense of humor. And so we have dealt with that. kind
    of tell everyone that she had three rules when we were growing up, which was that when you were four years old, you had
    to be in the living room every Saturday morning to learn how to dance. So we had the little, you know, 45-78, you know,
    record players and she would play these 45s from when she was in high school. And knew how to two-step by the time was
    five years old. So we learned all those dances. When you were six, you were responsible for dinner one night a week. And
    that meant that on Saturdays, the three of us kids would gather at the table and she would just dump a pile of cookbooks
    on the dining room table, and we would have to go through and figure out what we were gonna fix - but you could not fix
    anything out of a box. Everything had to be from scratch. did Tuesday nights and then we would have to calculate: if you
    needed a quarter cup of flour, and she needed three quarters of a cup of flour, how much flour do we have to have? We
    go to the grocery store. So got to fourth grade and Mrs Deering was - all the kids were so confused on fractions. And
    was like, "Mrs. Deering, just bring in some measuring cups. It will make so much more sense to everybody." And so she
    would be in the kitchen with us on our night and taught us how to cook. And so all three of us kids have that ability
    to cook. And the third thing was that when you were 14, you got a checking account and you had to balance your checkbook
    every month. And my mother said that if anything ever happened to her, we knew how to dance, we knew how to feed ourselves,
    and we knew how to take care of finances. And those are the only three things you need to know to be able to survive.'
- speaker: Interviewer
  text: That's marvelous. That's great.
- speaker: Respondent
  text: Yeah, so we learned a lot of great lessons through the years.
- speaker: Interviewer
  text: So, are you a cook today?
- speaker: Respondent
  text: Absolutely. And it's really funny. I've passed it on to my grandson. You know, like all grandparent relationships.
    He would spend time - I'm "Pee-Paw" and he's "Pie." That's his nickname. still call him that but his real name is Christian.
    And he and would make cheesecakes. He loved cheesecake. So, we tailgated the Oklahoma State Games. He's living in Houston.
    He and his wife came up and they turned in their request for what cheesecakes they wanted. And so made their cheesecakes
    for the tailgate, but they're heavily involved in their church. And said to him one day, He goes, "Well, I'm in charge
    of cooking everything for everybody else." And there was this part of me that goes, you know, so… He and were at a store
    over the weekend. We met in Dallas. Several of us met in Dallas and we went into a store and he was holding up spices
    and he goes, "Now this is my go-to spice for rubs on what I'm working on when I'm smoking." So there's that thing of knowing
    that the generational ability to cook has been passed on.
- speaker: Interviewer
  text: That is wonderful. Your education - grade school - where was that?
- speaker: Respondent
  text: 'We did not have kindergarten when was a kid. So did grades through in Collinsville - graduated from there. always
    joke: was the first person on either side of my family to go to college. was the first college drop-out on either side
    of my family. got an internship during my junior year of college at Channel Six here in Tulsa. And that turned into a
    job; and left there. was there for a couple of years. ended up in Baltimore working for a TV station there, then ended
    up in New York City as one of the producers of the Sally Jesse Raphael show in New York City. came back to go to seminary
    - your normal job transition. In the meantime, had to finish a bachelor''s degree. So was not exactly the most academic
    student in the world. So took my transcript, and at that time, it was called UCAT - University Center at Tulsa - where
    it was OU OSU, Langston and NSU out of Talequah. And just went around and said, "What''s the fastest degree can get? don''t
    care what it''s in." Langston University gave me a degree and credits for what I''d already accomplished in Liberal Education,
    which is a degree in absolutely nothing, but went to college. And that got me into Oral Roberts University''s School of
    Theology. ended up with a master''s degree there and ended up as pastor of a church in Collinsville for years.'
- speaker: Interviewer
  text: Alright. Why go to school of theology? What led to that?
- speaker: Respondent
  text: Well, had been involved in this. When moved back from New York, started going to this church in Collinsville and had
    always worked with kids. When was in Baltimore, worked with kids; and they talked to me about doing youth work and would
    fill in for the minister when he was out of town preaching. And it kind of just became this unseen calling, and people
    kind of were like, And then ended up, when that senior pastor retired, became the minister.
- speaker: Interviewer
  text: Yeah. And the Oklahoma State University School of Education?
- speaker: Respondent
  text: Well, what happened was is that in between of all of that, after had finished the master's degree, had really started
    to look at doing a doctorate in higher education administration. And had started the doctorate and ended up getting a
    different job. And it was just like, "I can't do that right now. can't do the schooling right now because got to finish
    this job." And, like many of us who have done these things, then never went back and finished.
- speaker: Interviewer
  text: 'Before we move on - and think our listeners would like to pick up as to when your gambling addiction began. And,
    so, let me ask you that first: When did it start?'
- speaker: Respondent
  text: You know, had gambled. was part of an organization that would have two meetings a year. One was in Atlantic City,
    one was in Las Vegas. And, at that point, it was just gambling like you would do if - because there would be a group of
    us and we would all go to the blackjack table and we'd play blackjack and then somebody'd go, and we'd get up and we'd
    walk away. And, so, had gambled. It was not an addiction, but had gambled at that point. The funny part of all this is
    that, to this day, have still never had a drink of alcohol in my life. have never smoked; have never smoked any weed.
    My grandmother smoked cigarettes and took a puff off of one of hers when was about five and that was the end of that.
    But never used the drug, never even smoked marijuana - led this pretty chaste life. My friends would always just laugh.
    But what happened was is that one day somebody had called and said, "Do you wanna go? We're gonna all go out gambling
    tonight. Do you wanna go?" And was like, "I don't think so. It's just not my thing." And so they say, And went, and it
    was a pretty instant addiction thing for me because when got there, went back to the back part of the casino where there
    were some slot machines with some friends, and we were just sitting there laughing, and suddenly everything outside of
    that building disappeared. Nobody wanted anything from me. It was me and this machine; and it escalated very rapidly.
- speaker: Interviewer
  text: How old are you?
- speaker: Respondent
  text: At this time? am guessing am - and this is really just a guess - I'm guessing I'm somewhere in my early forties maybe?
- speaker: Interviewer
  text: So then at what part of your career did you start that? Does that put you at the Better Business Bureau or does it
    - where does it put you?
- speaker: Respondent
  text: 'It was. was at the Better Business Bureau, but there was also a lot of other things that had happened. I''m kind
    of … I''m condensing the timeline a little bit. There''s also people wanting me to run for office - those kinds of things.
    And so just lived in this world where was - and, again, it''s gonna sound very counterintuitive - but was, you know, still
    doing some church work - you know, people needing help, people talking, people are always calling, wanting stuff - and
    always tell everybody: mean, was going miles an hour constantly but it was just that first time that got into that casino
    where it was just a feeling of… You''re riding that high and low of winning, and losing, and all that kind of stuff, and
    it was just like nothing else mattered - vanished. I mean, everything else just vanished.'
- speaker: Interviewer
  text: So was that when you were at the community church?
- speaker: Respondent
  text: No, it was it was definitely - was at the Better Business Bureau.
- speaker: Interviewer
  text: Pastor of the Collinsville Community Church for years. And… kind of talk to us about the needs of that church in that
    community and how you work to… mean, being a pastor is more than preaching from the pulpit, it's doing everything else.
- speaker: Respondent
  text: 'Absolutely. You know, my son said it best. My son said that, "My dad has been there for everything in everyone''s
    family except for the conception of the children. And if they had invited him to do that, he probably would have been
    there." What happens is that this particular church was something that just connected to me, because it was a church that
    was started during the depression. There''s a group of women who quilted; they all went to different churches, but none
    of them could afford to keep a minister. And so these women were talking. They say, "Wouldn''t it be really nice if everybody
    in town could go to the same church and we could all have a minister?" And so they talked to their husbands about it.
    They talked to different people about it. And then in December of 1930 the community church opened up which was for anyone
    in the community, regardless of denomination. Part of the bylaws said: "No creed but Christ, no law but love." And so,
    as a minister there, it was, it was kind of the best of everything. I mean, we had everything from Assembly of God to
    former Catholics. I mean, there was everyone was there. So if your tradit'
