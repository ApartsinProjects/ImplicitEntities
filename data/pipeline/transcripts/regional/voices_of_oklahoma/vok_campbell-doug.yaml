collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Respondent
  text: I, fortunately, was able to get to know my grandparents on my mother's side, which was nice.
- speaker: Respondent
  text: My father got a transfer and it was to Tulsa, so here we came.
- speaker: Respondent
  text: I enjoyed going to the Tulsa Train Station to pick up my grandmother when she'd take the train in from Houston to
    visit us a couple of times a year. And I used to love that art deco building. I still do, go to ten concerts there today.
- speaker: Respondent
  text: So I had an interest in architecture from a very young age.
- speaker: Respondent
  text: And what was interesting is my mother also was a teacher in the school and taught fifth grade. I had to behave myself
    because guess who got reported very quickly because all the teachers knew my mother?
- speaker: Respondent
  text: Also, Clark Field, whose basket collections are one of the top in the country and it's located at Philbrook. He used
    to give talks in the basement and I was always just fascinated to listen to him talk.
- speaker: Respondent
  text: And then they would take me out to Gilcrease also. I remember asking numerous times, "Who's that man sitting on the
    porch over at the house that's over on the grounds there?"
- speaker: Respondent
  text: And they said, "That's Mr. Gilcrease." So he would watch his guests enter the museum.
- speaker: Respondent
  text: They did allow us to go see certain television programs at neighbor's houses. Every Wednesday night we went to see
    I Love Lucy at the next door neighbor's house.
- speaker: Respondent
  text: They eventually, in the late 50s bought a TV, and we succumbed to the wilds of modern culture.
- speaker: Respondent
  text: The most interesting thing I remember from junior high school was Mrs. Gordy, who was our math teacher. And she told
    us that someday we would have a laptop computer that we would use. At the time, computers were the size of buildings,
    I mean, they were enormous, and the thought of someday having a computer that we could hold was beyond belief. But she
    saw the future and knew that that would happen.
- speaker: Respondent
  text: Then I also started taking piano lessons when I was very young.
- speaker: Respondent
  text: Before I got my driver's license I would take money that I'd earned and get a bus ticket and go to downtown Tulsa.
    So I was fourteen, fifteen years old. On Saturday afternoons I'd find churches that were unlocked, like Trinity Episcopal
    or Boston Avenue or First Methodist that had these huge, wonderful pipe organs.
- speaker: Respondent
  text: I would go in and check and see if the organ was unlocked and sometimes they were and sometimes they weren't. First
    of all, the architecture always fascinated me, I was just overwhelmed by the beauty of our churches in downtown Tulsa.
    But what was really fun was to sit down at those magnificent organs with four or five ranks and the pedals and so forth
    and take what I'd learned in my organ training and blast away.
- speaker: Respondent
  text: A piece of music or whatever. I was just the opposite, I had to have everything precisely written out and so forth.
- speaker: Respondent
  text: Anyway, I played for this wedding and let me say this, the groom never spoke to me again. Ah, it was a disaster, so
    I gave up my music career at that point.
- speaker: Respondent
  text: And I said, "Okay." So, anyway, then we hit it off immediately.
- speaker: Respondent
  text: I had some wonderful professors at OSU. Christine Salmon is a doctor of architecture.
- speaker: Respondent
  text: They were from Pennsylvania, and her husband had been brought to OSU as the head of the School of Architecture, so
    couldn't teach in the same department that he was the head of, so she was an interior designer and she was absolutely
    wonderful. She would take us on field trips to New York and introduce us to incredible worlds and incredible people and
    teach us incredible philosophies.
- speaker: Respondent
  text: So she had an architectural bent in her teaching and it was something that I responded to very, very greatly. One
    of the things that Dr. Salmon taught us was, "Less is more," which is a very, very, very famous quote from the mid-century
    architect Mi Sandoro.
- speaker: Respondent
  text: It means sometimes when you have less of something it becomes more important than if you have a lot of clutter surrounding
    either a piece of architecture or, in my case, an interior. That if you make a statement with fewer pieces it's more than
    if you have a bunch of clutter. All of a sudden you don't see anything, you don't focus on anything.
- speaker: Respondent
  text: Outstanding rug. You know, as a foundation for the room. And then the furniture would be subservient to those stronger
    architectural pieces or focal points.
- speaker: Respondent
  text: Southern Living, Traditional Home, certainly Oklahoma Magazine, and Tulsa Home and Garden, and so forth, when that
    existed. Yeah.
- speaker: Respondent
  text: Might have got a call from New York and said, "I saw this in Southern Living and I'd like to hire you."
- speaker: Respondent
  text: For instance, I'd see things that were Italian or Spanish all over Europe. And then you would see other countries
    as well represented in France because they were very much a collector mentality there.
- speaker: Respondent
  text: We'd bring pieces in and mix them with simple, clean lines to do a nice, warm mix.
- speaker: Respondent
  text: Wanted the house to be rewired, re-plumbed, we took every piece of plaster off the walls to insulate the walls because
    it wasn't insulated when it was built initially.
- speaker: Respondent
  text: The windows were all replaced with new windows that looked exactly like the old ones but they were thermally protected.
    When the couple bought the house it had storm windows on it, which was very detrimental to the appearance of the house.
    It had also been painted and the floors had been refinished so many times that we actually had to replace some of the
    floors. We matched exactly what was there but the floors had to be replaced. Moldings were in such bad condition that
    we duplicated what was there and replaced it.
- speaker: Respondent
  text: So basically, it started certainly from the two by sixes and it was a brand new house. Also they had children and
    they wanted to open up some of the rooms and make it flow a little bit more for modern living because, obviously, when
    the Skellys lived there it was lots of servants and very much a different style of living than we have today. So it was
    opened up.
- speaker: Respondent
  text: There was a small dining room on the front of the house that was original, but it would maybe seat eight people for
    dinner. That wasn't nearly enough because they did a lot of entertaining. So they did eventually expand at the back of
    the house and put a big room, which obviously became a perfect room for the "family room," for this young couple and their
    children.
- speaker: Respondent
  text: Gave the house to the University of Tulsa. They owned it for a couple of years and then decided they didn't have any
    use for it so they sold it.
- speaker: Respondent
  text: It had several different owners over the years. And then when this couple that renovated it got into a situation where
    they needed to sell it they sold it to the University of Tulsa. So TU now owns it again. I think the vision was for entertaining
    and for perhaps a presidential residence eventually.
- speaker: Respondent
  text: We had to make some handicap accessible situations and how do you do that in an historic residence? So anyways, it
    was an interesting project.
- speaker: Respondent
  text: I was involved in the McBirney Mansion when it converted from a private residence to a law office. That was an interesting
    process, of course, now it's evolved back to a private residence, but at that time it was a law office.
- speaker: Respondent
  text: The family over the years had dissipated all over the country and so eventually they thought the best use of it would
    be to convert it to a hotel operation.
- speaker: Respondent
  text: Anyway, I got to work on that for many years and that was a lot of fun. We did a lot of wonderful projects up in Bradford.
- speaker: Respondent
  text: And then finally they said, "You know, you're here all the time, why don't we just put you on as event planner?" So
    she became the event planner at Philbrook.
- speaker: Respondent
  text: But anyway, been involved in lots of projects out there over the years.
- speaker: Respondent
  text: Someone who is professionally trained and approaches interior design from a professional manner. So I'm very much
    a big believer in that.
- speaker: Respondent
  text: Another thing I enjoyed was working on Southern Hills Country Club clubhouse for almost twenty years, doing various
    projects over the years. And that was always enjoyable and fun.
- speaker: Respondent
  text: But I went and talked to my father about it and he said, "You know, Doug, I never understood why the church said it
    was a choice. Why would anyone choose to be a minority?"
- speaker: Respondent
  text: And I said, "Thank you, Dad. It was a huge, huge gift.
- speaker: Respondent
  text: Much because I'm not living in integrity. You know, I was living a life that wasn't who I was. That's when I made
    the decision it was time to explore that side of my existence.
- speaker: Respondent
  text: So I thought, "I'll just go out to San Francisco and meet him and we'll talk, talk, talk." So anyway, he had given
    me a lot of readings to do, a lot of, again, living on the subject of integrity. I went out and met David and learned
    a lot from him.
- speaker: Respondent
  text: Myrna knew why I'd gone out to San Francisco when I came home, which I remember she came out to the car and says,
    "Is it over?"
- speaker: Respondent
  text: So, you know, it is what it is and I'm so extremely grateful, extremely grateful for the life I've been given.
- speaker: Respondent
  text: And I said, "You've met who?" She said, "The one for you." And I said, "Okay. Whatever."
- speaker: Respondent
  text: So the next time I was in Santa Fe she had a dinner party and John was invited. All of a sudden, the rest of the guests
    disappeared and just left he and I talking on the sofa. We hit it off immediately.
- speaker: Respondent
  text: I came back to Tulsa for rehab and then the following July of 2009, he moved to Tulsa.
- speaker: Respondent
  text: And then in November of 2010, he noticed that he was getting weaker. You know, he'd go out running with neighbors
    and he all of a sudden got to the point that he couldn't run any longer. And he thought, because of his training and so
    forth, that it was a spine issue. So it got progressively worse.
- speaker: Respondent
  text: And then finally, had an appointment with a neurosurgeon and meeting with a neurologist and was diagnosed with ALS
    in August of 2011.
- speaker: Respondent
  text: Took himself out of the lineup May 2 of 1939, because of symptoms of ALS. And he retired at thirty-six and was the
    cause of his death two years later.
- speaker: Respondent
  text: Then there's also what is called the bulbar onset, which affects your lungs and your breathing as a result and also
    your swallowing and your functions from the neck down. So it affects many, many, many different ways.
- speaker: Respondent
  text: But the nurses talked him into, "You need this for medications and you don't want to die of dehydration so you need
    a way to get fluids into your body and medications to ease pains or for other issues."
- speaker: Respondent
  text: He agreed to that but I know that always psychologically bothered him that he could no longer eat.
- speaker: Respondent
  text: One of them one day said to me, "He'll be gone within a few weeks." He said, "His internal organs are shutting down."
    And of course, that's what they're trained to know. I wouldn't have had a clue but they said, "He'll be gone in two weeks,"
    and sure enough, within a week he didn't wake up one morning.
- speaker: Respondent
  text: He said, "Well, I'd like for you to go see a neurosurgeon."
- speaker: Respondent
  text: So I saw him and I was having fasciculations too, which were muscle twitches all over the body, which is one of the
    symptoms of ALS. I knew something was up and I could tell that's what they were thinking, but they didn't want to diagnose
    me because I'd also had peripheral neuropathy in my feet for about ten years, at that point. And they said it was kind
    of unusual to have both conditions.
- speaker: Respondent
  text: So I called January 1 after they got back from their Christmas break. And they said, "Well, the first appointment
    he has available is April the 7th."
- speaker: Respondent
  text: I went, "Uh, I have to wait, you know, that long to even get into see him."
- speaker: Respondent
  text: There's an MDA/ALS clinic in Oklahoma City, Dr. Beson. And I went over and saw him. He said, "Your case is really
    complicated and I'm glad you've got an appointment with Dr. Pestronk because it's complicated."
- speaker: Respondent
  text: He had been John's ALS doctor so we knew each other already. And it just was very, very exacerbating to have to wait
    that long to go to St. Louis. We did go then on to that and it was a seven-and-a-half-hour appointment and it was test
    after test after test. They took twenty-four vials of blood, I mean, it was
