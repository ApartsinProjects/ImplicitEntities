collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Before we get into that story, I just want to hold up a newspaper this morning. On this date, July 27th in the Tulsa
    World, it says, "PSO Announces $1.3 Billion Wind Energy Investment. And the decision from PSO can give customers up to
    40 percent of their power from wind by late 2020, if the project receives regulatory approval." But not only that newspaper
    deals with energy, the front page of the USA Today, 7/27/17, "Nuclear Plant Closure Send Towns into Crisis." So those
    headlines will make sense to our listeners, and I'll repeat them at the end as we move along. You know, we hear the story
    about Carrie Dickerson, the little housewife who came off a farm to do this. But let's talk about her education background.
    What did she have?
- speaker: Respondent
  text: She was a housewife who had graduated from OSU with a degree in education. She started out to be a teacher, but then
    went back to get a master's degree when she was teaching at Tiawah, which is a town south of Claremore where I went to
    the fourth grade. She was doing the research for her master's degree. In the winter, there was very little fresh vegetables
    they could eat except stuff that was canned and cooked to death. A lot of the students there had boils on the backs of
    their necks, very painful boils that caused scars, till Mother talked to all the parents and asked for them to agree to
    help with her experiment, which was to give the kids A and D vitamin pills on a daily basis and to talk to them about
    their diet when they went to the school cafeteria, which was even harder. But over the course of a couple of months, all
    of those boils went away and the kids had nice clear skin, with no pain.
- speaker: Respondent
  text: That was the basis of her master's thesis, seen in the library at OSU. There is also a Carrie Dickerson collection
    in the library at OSU with a lot of the mementos from this whole Black Fox fight.
- speaker: Interviewer
  text: She taught Home Economics in the Inola High School.
- speaker: Respondent
  text: Yes, she taught Home Economics once she had her master's degree. And she taught several places around the county,
    including Talala and Chelsea. In Chelsea she got into a fight with the principal, because she believed boys should be
    taught Home Economics just as much as girls should. So she let the boys into her classes and they really responded very
    positively, they loved it. And they were in Shop and they were building a little cottage as part of their Shop experience.
    And she taught them what was important about constructing a house and what was important about designing a house. But
    the principal felt that the boys should not learn anything about housekeeping or how to run a household. So she very nearly
    got fired over it but she stood up to them and made a big fuss. And while she didn't carry the day she did gain a lot
    of friends that way.
- speaker: Interviewer
  text: So as we move into this story she's fully capable of standing up for what she believes in.
- speaker: Respondent
  text: Not only that, let me go back to when she was in the school at OSU. We still had segregated schools everywhere in
    Oklahoma at that point. And there was one teacher that she took a class from that a black girl had signed up for. And
    when she came in to sit down in the classroom the teacher told her she could not sit in the classroom. When the girl protested,
    she told her she could sit outside the door and listen to the lectures. Mother got up at that point, picked up her chair,
    and went outside the door, and she said, "If she can't listen to the lectures in the classrooms then I won't either."
    The teacher eventually gave in.
- speaker: Interviewer
  text: That's a great story to hear.
- speaker: Respondent
  text: My aunt, Mother's twin sister, was so proud of that. Mother was proud of it herself. But my Aunt Clara, who was her
    twin, her redheaded twin, I should mention, liked to tell that story.
- speaker: Interviewer
  text: 'The date was May 8, 1973. There was a newspaper with the headline: $450 Million N Plant Planned for Inola. And as
    I understand, somebody had placed it on her desk or in her chair.'
- speaker: Respondent
  text: Yes. At that point, she was the head nurse at the nursing home that my father and she built. She went in the office
    that morning and there it was. She never found out who put it there, but probably it was just somebody who would bring
    the mail.
- speaker: Interviewer
  text: PSO had bought nearly two thousand acres through a third party and then they were to convince Inola residents of the
    wonders of nuclear power. PSO invited the community to a get-together and a progress report. That's when they started
    talking -
- speaker: Respondent
  text: So you realize this was at the time when Eisenhower was touting Atoms for Peace. This was not too long after World
    War II, which ended with the Nagasaki and Hiroshima bombings. A lot of the research and construction for those bombs went
    on in a place called Oak Ridge in Tennessee. Mother had read stories about frogs with five legs and, you know, other deformities
    and other deformities in other species as well. So she thought to herself, "If that's going to happen to my grandchildren
    and my children, it's going to be a disaster. So that's part of what started her off. But she decided to go down and see
    the site. There was an open gate, so she went onto the site in Inola and saw how beautiful it was and how terrible it
