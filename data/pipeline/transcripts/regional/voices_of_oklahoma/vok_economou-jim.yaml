collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Respondent
  text: He was legally blind, but that was as far as it went. They allowed him to come into the country.
- speaker: Respondent
  text: He got a job at a meat packing firm. He was supposed to get the cuts and put them in boxes. OSHA was not involved
    yet. This was way back. They were not very careful about how they cut the meat. One day he was looking at all the meats
    coming down the runway there and he saw a hand. He said he got out of there; I don't know even if he was able to collect
    his money, but he said this is it.
- speaker: Respondent
  text: He also got another job; I think this one was Schlitz.
- speaker: Respondent
  text: Instead of W-I-E, as it should have been, they were spelling it W-E-I. So in the end, I was not very happy, I guess.
- speaker: Respondent
  text: Or something. It was too close. They wouldn't give us permission to copyright it. At some point, we were able to take
    the word coney islander. I think we had to pay these other people something. They said, OK, go ahead, as long as it didn't
    bother us. We were able to get a copyright on coney islander, but we always kept the word coney island, for the downtown
    store. Coney Island Hot Weiners, misspelled.
- speaker: Respondent
  text: Well set. The only thing is, once I decided to change it slightly, which is a big mistake, on my part. People were
    used to less salt, than what they were used to, in the old days. In the old days, you could eat a lot of salt, and apparently,
    it didn't bother you.
- speaker: Respondent
  text: Anyway, I changed to less salt, and one day I decided, let's go ahead and I'll try the original recipe, with the full
    amount of salt. At that point, I'd never heard such hollering from my customers. Fortunately, my customers are such that
    they'll holler. They won't say, "Something's changed. I'm not coming back." They don't do that. They hollered, "Is this
    going to change?"
- speaker: Respondent
  text: They immediately wanted to go to either Oklahoma City, or to Tulsa. He left there, tried to find a place here in Tulsa,
    and established himself. He found a bank, found the money, found a place that he could open up. That was 311 South Boulder,
    and was able to negotiate an opening for January of '26.
- speaker: Respondent
  text: England, there was The Islanders or something, I forgot what they were … We thought this would probably clench it.
    Of course we had some problems after that, but we were able to get the copyright.
- speaker: Respondent
  text: I couldn't understand why he would want to go home and rest when there was such a wonderful way of living just working,
    and taking care of people, and making sandwiches, and so on so forth. I couldn't understand that, but anyway, we'd leave.
    We'd walk, go back home, then later on we'd come back and work till about 11 or 12 o'clock at night, on Saturdays it was
    1.
- speaker: Respondent
  text: Whatever he was making…They weren't making that much, but he was getting, and the others were giving food to people.
    It's amazing that you mention that, because people coming into the store, years later, and saying, "You did this for us.
    You fed us then." They would say, "I'd like to pay you." That was great.
- speaker: Respondent
  text: But he would know where to go get them. For instance, our wieners were made by Swift, under the viaduct in downtown
    Tulsa. They had a special meat operation there. You talk about fantastic wieners. This person was just…He would have made
    any German sausage maker proud. They would go there, and they would walk the two or three blocks, bring back the wieners,
    and…On bread or whatever the company was at that particular time would deliver so many dozens per day.
- speaker: Respondent
  text: The other stuff, they could usually get that from grocery stores or whatever. Spend as little money as possible, and
    get as much product as needed for that day. In other words, we're talking day to day, instead of I'm getting enough here
    to last me a week, like we do now, or last me a month.
- speaker: Respondent
  text: Something. Every day this person would bring in fifty pounds of ice. They would deliver it right to the house with
    a horse drawn carriage. Bring it in. Put it in that tub, and then have a fan blowing from the other side off of the ice,
    hitting me and my mother to make sure that we were cooled off for the day.
- speaker: Respondent
  text: Off the desks. The windows were open. They had to be open. You're talking about temperatures of a hundred. No air
    conditioning, plus we were at the schools. Whenever I'd go downtown or something, I'd have to wear a bandana across my
    face like the old time criminals, in order to keep the dust away.
- speaker: Respondent
  text: It was real hot, and you'd sweat black sweat from the dust. Not very nice years.
- speaker: Respondent
  text: To me, the words, Pearl Harbor, didn't mean anything. I said, "Where in the world is that? What does that have to
    do with us?" Had they said Hawaii, I would've understood immediately, but it was during that day, later on, that I was
    in the know, but not before that.
- speaker: Respondent
  text: Why should they come downtown when they can be in the mall, protected from the elements and have virtually the same
    buying opportunities as they would have downtown? They wouldn't have to walk and they wouldn't have to pay and park and
    so forth.
- speaker: Respondent
  text: Money. Two of us put in our time and expertise. We were able to open up additional six or seven stores more.
- speaker: Respondent
  text: Go one penny? That's a 20% rise, which is very true, unfortunately. One cent is still one cent. That was the only
    real problem we had, that one penny. The next time, we went to 7 cents; virtually nobody said anything.
- speaker: Respondent
  text: He could have done a trick, which other people were doing, but he didn't want to even think about it. Once you were
    an established store, you had to go through them even for a penny or 2 pennies or whatever it was that you wanted to raise
    the price of the Coneys. He could have sold the store to someone and then re-buy the store a week later and establish
    new prices. The OPA didn't care. They would say okay, you started with a new store. A lot of people did that. A lot of
    people did that.
- speaker: Respondent
  text: Hundred and five, hundred and ten, any movement of air seems to help, no matter how hot it is.
- speaker: Respondent
  text: We had a number of people…Mrs. Bush came to the store once.
- speaker: Respondent
  text: Consequently, whatever he had, it was okay for him.
- speaker: Respondent
  text: In fact, one of them still works. We had a beer special for half price if you buy two Coneys or something. If you
    bought three Coneys, you would get a large drink free. That has continued. In fact, people expect it. One time we stopped
    it. If you were to look at a graph how fast a line can fall, it was drastic and we decided to re-introduce the special
    which has worked very well for us and we're very happy with it, and people are very happy with it also.
- speaker: Respondent
  text: Mayor came to the birthday party and gave us a proclamation. We have that right over the cash register, so we're very
    proud of that.
- speaker: Respondent
  text: We have been looking out for the people, and they've been looking out for us. So, it's a good combination.
- speaker: Respondent
  text: Nutmegs, so on and so forth - those are out. I don't know why.
- speaker: Respondent
  text: Other companies were doing it. In other words, we'd have an agreement that they can't reveal what amounts they're
    using, very strong agreements. This particular one is out of San Antonio, Texas. They do everything for us, the mixing
    and everything else. Plus, they're using all the correct spices, the sweet spices also included in that.
- speaker: Respondent
  text: The Universities. We had at that time three doctorates for music. We had an exceptional group of people there, and
    we still meet on occasions.
- speaker: Respondent
  text: I was pretty lucky to get in, because at that particular moment there were 10 violas, which is a massive amount of
    violas, and 2 of us coming in. I didn't have any music. He had just finished playing Bach's second one for viola, and
    I said, "Can I use your music?" I did the same thing. Apparently, somebody had said to them, "Listen. We're losing two
    or three people in about another month. We better keep them." They kept us.
- speaker: Respondent
  text: Concerts were free. I'm going to use the word "sold out." Sold out concerts everywhere, except one concert. There
    was only sixteen people there. What happened was, the Russians came into Hungary. That day, nobody showed up except sixteen.
    There was a little bit of discussion. "Should we play the concert? Should we not play the concert?
- speaker: Respondent
  text: There's only sixteen people out there? What should we do?" It finally came down to somebody saying, "For the sake
    of the sixteen, let's play the concert," and we played.
