collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So people of high stature, including yourself, were born in Wewoka. Your mother's name?
- speaker: Respondent
  text: Graduated from the University of Missouri at a very young age. Was, I think, captain of the football team.
- speaker: Respondent
  text: He left a wife, my grandmother, and five little girls when he died. My mother was eleven and the oldest. She then
    became part caregiver for her little sisters.
- speaker: Respondent
  text: He was truly a gentleman of the first order. And very fun-loving. I loved him very much.
- speaker: Respondent
  text: He sent my father and his brother to OU and to Harvard and to Harvard Law School. My father then went to Columbia
    University Business School. So - I come from a family of students who took reading and learning and education seriously.
- speaker: Respondent
  text: My brother, was really very, very interesting and very intelligent also. He listened to the opera, even when he was
    a little boy.
- speaker: Respondent
  text: Worked in the store. The store sold everything and stayed open until midnight, I think, and my father and his brothers
    worked in the store as well as going to school.
- speaker: Respondent
  text: Do not remember but my mother does. Then we moved to Beggs, and then finally, to Claremore, when I was six.
- speaker: Respondent
  text: 'Because I''ve lived all my life, mostly, in Oklahoma, and it''s spanned the better part of a century. There have
    been lots of changes and challenges and it was an interesting place to grow up. It was special. Oklahoma was a young state
    and optimistic. The musical Oklahoma had premiered on Broadway in 1942, and we grew up being very proud of our state.
    We hummed all the tunes from Oklahoma: "Oh, What A Beautiful Morning," "The Surrey with the Fringe on Top," "We Know We
    Belong to the Land, and the Land We Belong to Is Grand." I remember thinking that Oklahoma must be a very special state
    and that everybody would envy us. That''s probably not so.'
- speaker: Respondent
  text: Anyway, there were a lot of things that have changed and we happening in Oklahoma in my childhood. First, there was
    the weather. We have lots of weather in Oklahoma.
- speaker: Respondent
  text: When I was eight years old, I watched the tornado, which wiped out Pryor, Oklahoma, in 1942. We watched it from our
    front yard. That was a terrible time; it killed fifty-two people, completely destroyed the downtown and much of the city.
- speaker: Respondent
  text: Flooding was ever present in Oklahoma. I remember going with my grandfather down Route 66 to see it inundated by water.
    The Arkansas River had overflowed several times.
- speaker: Respondent
  text: The Turner Turnpike was built in my lifetime. It opened in 1953, and it was the first of the turnpikes. Now we have
    ten of them in Oklahoma.
- speaker: Respondent
  text: Six trains a day going through that depot. Now it houses the Jazz Hall of Fame; no more passenger trains.
- speaker: Respondent
  text: The next thing I want to say is that air-conditioning came to Oklahoma and totally reformed our lives. Our first air
    conditioner was a box in our kitchen window, full of hay, as I remember, dripping with water and a fan blowing through
    it. And that cooled our kitchen.
- speaker: Respondent
  text: I said, when I was six. Our town was small. We had about six thousand people. We had two railroad stations, two banks,
    lots and lots of churches, and one library. Schools and churches were the center of town activities and social life in
    those days. Main Street was the center of town.
- speaker: Respondent
  text: I wanted to say something about working in my dad's store.
- speaker: Respondent
  text: I remember I learned, I think, to add and subtract by working on the cash register, which was a great privilege.
- speaker: Respondent
  text: Will Rogers was a very, very important component of our town; it was his hometown.
- speaker: Respondent
  text: He, of course, was our favorite son, our attraction. The Will Rogers Memorial was built on the hill in Claremore.
    On Will Rogers's birthday there was a great celebration, a parade, floats, and bands, and we marched up the hill. I was
    in the high school band and I remember marching in the Will Rogers parade.
- speaker: Respondent
  text: We had celebrities who came. Bob Hope came one year and entertained a crowd of many hundreds of people in the grounds
    of the Will Rogers Memorial.
- speaker: Respondent
  text: Claremore's proximity to Tulsa was a special treat for us. Our family would close the stores on Thursday at five o'clock
    and drive to Tulsa. Tulsa was a wonderful place to visit. They had glamorous department stores, wonderful theaters, really,
    movie palaces with red velvet curtains that opened on the screen before the movie started. Statuary around.
- speaker: Respondent
  text: Stars that sparkled in the ceilings, they were really palaces. Their names were the Ritz, the Rialto, the Majestic,
    and the Orpheum. Now isn't that grand?
- speaker: Respondent
  text: I had an aunt who lived in Tulsa and she took us to all of those events. So it was a very exciting place.
- speaker: Respondent
  text: I had a couple of uncles who were in the war. My father was not young enough to be drafted but we were very much aware
    of the war.
- speaker: Respondent
  text: We didn't have any swimming pools in Claremore. If there had been a swimming pool, there was one, you're not allowed
    to go in it. And very nervous about crowds. And, yes, several students in our school got polio and it was a terrifying
    disease.
- speaker: Respondent
  text: It was a two-year school for girls. It was sort of in transition from being a very protected place to trying to envision
    and train modern women. So we had curfew, on school nights it was nine o'clock. There was a big fence around the school
    and it was closed and doors were locked at nine. On weekends, you could stay out until eleven o'clock.
- speaker: Respondent
  text: We had strict rules. Women were not allowed to ride in automobiles unless their parents were visiting and driving.
    We were not allowed to go into bars. We had lots of activities. We had dances and clubs and things on the campus, and
    we were near Missouri University so there were things to do. But not as children are today in school.
- speaker: Respondent
  text: So I met girls from other parts of the country, from other religions than my own, from other experiences. Stephens
    was at about two thousand students in those days, so the entire school collected itself together for events, for convocations
    and picnics, and we knew one another. And it was very enriching and expansive for me.
- speaker: Respondent
  text: Our classes were very small, our teachers were very accessible. Often we had conferences with our teachers or discussion
    groups in the community rooms. An important experience in my life was our government teacher, who bemoaned the fact that
    his students in the 1950s were so docile and quiet. No one was out there agitating or marching. These were the Eisenhower
    years, these were the quiet times.
- speaker: Respondent
  text: He took us one time, members of our class, to an NAACP meeting in Columbia. This was the first time I ever had focused
    on or been aware of race relations. It was startling to me. I remember going back home and writing a letter to the only
    movie house in town. I wrote it on senior class letterhead, I was the president of the class at that time, and I told
    them I was very sorry I would be unable to attend their movie anymore as long as they segregated black citizens to the
    balcony. And I never went back to the movie.
- speaker: Respondent
  text: And I bought into that. It sounded perfectly reasonable to me. So I went to OU.
- speaker: Respondent
  text: So we moved to Dallas when he went to work for Peat, Marwick, and Mitchell, which was an accounting firm, while he
    studied for his CPA, certified public accountant's license. And he got it.
- speaker: Respondent
  text: Then we went to New Orleans where he went to work for the Treasury Department, the federal government.
- speaker: Respondent
  text: Then we came back to Tulsa after three years in 1961, I think, and he began to practice tax law.
- speaker: Respondent
  text: 'Children: twins and Jane. In fact, I say I have five grandchildren, all boys, except for the four girls.'
- speaker: Respondent
  text: I was sort of lonely in Dallas. Tulsa is a very special place, you can be a newcomer and become part of a fabric,
    it was open. Dallas and New Orleans were not so open, or at least to my mind. We were sort of isolated, and my dad came
    to visit us one day and he bought us a television. That was our first experience with it.
- speaker: Respondent
  text: Tulsa, however, was a very well organized town. They had a lot of auxiliaries, a lot of opportunities for volunteers
    to work. I was invited to join some of the young women's auxiliaries, the Tulsa Boys Home, the Cerebral Palsy Association,
    and such as those.
- speaker: Respondent
  text: Later then, I became involved in boards of the city, the Red Cross, and the United Way board.
- speaker: Respondent
  text: The state was Democratic when I was growing up and it's now Republican. There are no Democrats in state office; both
    legislatures and the governor are Republican.
- speaker: Respondent
  text: The night we were supposed to host the Empire Club at the Tulsa Club. I remember calling them and telling them we'd
    have to cancel, we could not have it.
- speaker: Respondent
  text: And I said, "Because the president has died." I knew it was very, very serious.
- speaker: Respondent
  text: Then, of course, I remember the other assassinations, Robert Kennedy, Martin Luther King. I was beginning to become
    aware of what was happening in the world and the world was changing. It was changing so we weren't going to have lives
    just like our mothers'.
- speaker: Respondent
  text: We had the Vietnam War, we had the Civil Rights movement.
- speaker: Respondent
  text: I joined the League of Women Voters. I was elected to the board and advised that I needed to have a portfolio. And
    it was suggested that I take the local government portfolio. So I said, "Sure, I don't know much about local government
    but I can learn."
- speaker: Respondent
  text: I interviewed the elected officials in the city and in the county and I went to meetings and I went to hearings and
    I read budgets and read reports and began to learn about city government.
- speaker: Respondent
  text: The other thing that was going on in those early days in Tulsa in the 1970s was Goals for Tulsa. Goals for Tulsa was
    a study of Tulsa. Tulsa began to look at itself. It knew it was changing, and a group of young men from the Chamber of
    Commerce, I believe, established a two-year study of the city. We had committees, we had focus groups, we had field trips.
    We were studying the economy of the city, we were studying the demographics of the city, the neighborhoods, and we discovered
    some things that were new, at least to me, and I suspect to others, we discovered that citizens in North Tulsa and in
    West Tulsa and in the rapidly growing East Tulsa felt neglected and left out, and indeed they were.
- speaker: Respondent
  text: City officials, in those days we had the commission form of government, the mayor and four commissioners, all live
    within a square mile of one another in near South Tulsa. The city was highly segregated in those days, both physically
    and culturally. Probably as a result of the Race Riot in 1921. Curiously, we didn't know much about the Race Riot in those
    days. The town was sort of silent about it. You had to dig to find out what had happened. Of course, later it was studied
    and many books and articles have been written on it. We're much more aware of it now.
- speaker: Respondent
  text: Well, they were not available. There were some records at the Red Cross, I think.
- speaker: Respondent
  text: The League of Women Voters launched a number of women of my age and many of my friends into public service, into government
    service.
- speaker: Respondent
  text: But I was beginning to be active in the Democratic party.
- speaker: Respondent
  text: The wake of new growth. Williams Company came and anchored downtown Tulsa, the north side of Tulsa, and that was very,
    very important because the city was beginning to deteriorate in that area.
- speaker: Respondent
  text: And then, of course, we had the theater. But the growth south was causing many, many problems. It was outgrowing city
    services. New neighborhoods would spring up without fire protection, without water, without sewers. Sometimes the streets
    could not keep up and it was very, very expensive.
- speaker: Respondent
  text: Then the neighborhoods in the inner city and in the near north and in the far north were sort of deteriorating and
    also calling on city funds. So it w
