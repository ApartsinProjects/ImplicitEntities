collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Tell us about your name Anoatubby. There must be some meaning to that.
- speaker: Respondent
  text: Yes it is a warrior name within the Chickasaw Nation and it means "walk and kill."
- speaker: Interviewer
  text: Do you know how far back it goes and where it originated?
- speaker: Respondent
  text: Well, it's difficult to say for sure but I do have an account where I had a relative that was with Davy Crockett,
    it was in his journal. They were working with Andrew Jackson and that we're talking in the 1700s and early 1800s.
- speaker: Interviewer
  text: Tell us where you were born.
- speaker: Respondent
  text: I was born in Dennison, Texas. Moved from Dennison, Texas, when I was just a baby, I guess you'd say, to Tishomingo,
    and that's where I was raised. My dad, a full-blood Chickasaw, and the rest of the family moved to Dennison, obviously
    proud of my birth. He was there to work. He worked for Kraft Foods in Dennison, Texas.
- speaker: Interviewer
  text: About Tishomingo, that was the original capital for the Chickasaws?
- speaker: Respondent
  text: That's a historic capital. The Chickasaws moved into Indian Territory in the late 1830s. Tishomingo was the central
    part of the territory where the Chickasaws lived.
- speaker: Interviewer
  text: Tishomingo takes its name from?
- speaker: Respondent
  text: It's from a war chief, Chief Tishomingo. He was the last war chief of the Chickasaws.
- speaker: Interviewer
  text: Then let's talk about your mother and where she was born and where she grew up.
- speaker: Respondent
  text: My mother was Opal Mitchell Anoatubby. She was born in Greenville, Texas, and moved to Tishomingo when she was but
    a young girl.
- speaker: Interviewer
  text: So then your father's name and where he grew up.
- speaker: Respondent
  text: My father's name was Joseph Morris Anoatubby, and he grew up around Tishomingo. He was actually born in Mill Creek,
    which is a small town, it's actually between Sulphur and Tishomingo.
- speaker: Interviewer
  text: Tell us what your father did for a living.
- speaker: Respondent
  text: He did mostly labor type jobs. He worked in manufacturing, he did farm work, at one time had his own farm. And was
    working for Kraft Foods when he passed away.
- speaker: Interviewer
  text: Your mother, she was the homemaker?
- speaker: Respondent
  text: Yes she was, and a fine homemaker she was.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: I'm one of six children. Two were girls and the rest were boys.
- speaker: Interviewer
  text: About your mother, what kind of person was she?
- speaker: Respondent
  text: Very strong lady. I mentioned that my dad passed away. He passed away when he was forty-two years old due to an industrial
    accident working for Kraft Foods. At the time we lived in Dennison, Texas. And the family moved from Dennison to Tishomingo.
    She never remarried and she raised all the kids. She worked very hard to do that. Of course, family is quite important,
    we all pull together. Not highly educated, I believe eighth grade was her highest grade that she achieved. But had a lot
    of common sense and did, I think, a very good job of raising the family.
- speaker: Interviewer
  text: So with six children how old was she for her last birth?
- speaker: Respondent
  text: Well, she was in her thirties. I believe she was thirty-two when I was born.
- speaker: Interviewer
  text: How did the family earn an income?
- speaker: Respondent
  text: Well, it was a combination - there was insurance from my dad's passing. And I have to say a lot of good things about
    Social Security because there was Survivor's Insurance. It was available through Social Security. She also worked. I remember
    as a young boy she would take ironing in and did ironing so she could still be close to home. And she did various jobs.
    She was a cook, a very good cook, by the way, so she worked in restaurants and she did take care of some folks, care-taking
    type thing during that time. She did whatever job that she could find. She worked in a factory, something that would pay
    the bills.
- speaker: Interviewer
  text: You draw much of your values that you have today from your father and mother, but particularly your mother?
- speaker: Respondent
  text: Particularly my mother because I was such a young child when my dad passed away.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: I wasn't quite three. I was two year and nine months, I think.
- speaker: Interviewer
  text: So you hardly remember him?
- speaker: Respondent
  text: I have no recollection at all. All I know is what my brothers and sisters and Mom and other people would tell me about
    him. But when my mother would, sometimes she'd say, "Your dad wouldn't want you to do that." And it meant a lot to me
    whenever she would say that.
- speaker: Respondent
  text: So I would straighten up.
- speaker: Interviewer
  text: Yes. But she was the obvious big impression in your life?
- speaker: Respondent
  text: She was, you know, it's amazing when I was young they teach you, not necessarily about sitting you down and saying,
    "Okay, you need to do things this way." You learn by example. And she did a wonderful job of providing an example. I graduated
    college with a degree in accounting. I knew how to keep books, basically, or had a budget way ahead of that. We had to
    budget as we grew up. And we all learned how to work. We worked, we began working at a very early age. Either at home
    or outside the home, to help bring in some badly needed resources.
- speaker: Interviewer
  text: So I'm seeing the picture of your mother sitting down with a budget, the children are sitting around and, "This is
    how much money we have and this is what we can spend." Would that happen?
- speaker: Respondent
  text: Well, it wouldn't be quite that formal. She may be at the kitchen table working with her finances and I would be at
    just a young child come up and see what she was doing. She taught me, basically, through example.
- speaker: Interviewer
  text: Your grandparents, let's go back to them. Talk about them for a moment.
- speaker: Respondent
  text: I was estranged, I guess you'd say, from the Chickasaw side of my family as a result of my dad's passing. So I mostly
    knew my grandparents on my mother's side. They were a traditional family. They had high values. My grandfather was a farmer.
- speaker: Interviewer
  text: And what was his name?
- speaker: Respondent
  text: His name was Erv, Erv Mitchell. He also was a carpenter. He would build houses and do work in homes. And at the same
    time he would do farming. I guess farming didn't pay a lot of money so he had to have another job. But I remember going
    to the farm when I was just a young boy. It was a great experience. My grandmother had a twin sister and her name was
    Bertha, my grandmother. Her sister was Bertie. They were very feisty sisters. They had a lot of stories. That's one of
    the things that I can remember when I was a young boy, hearing the stories that they would tell about when they were growing
    up. Of course, if you look at the time frame, we're talking about slightly before statehood. And then after statehood
    in the early twentieth century is when they were growing up. The stories just seemed so real to me when they would tell
    them.
- speaker: Interviewer
  text: You said that your father was the Chickasaw side.
- speaker: Interviewer
  text: But what about your mother? She was not Chickasaw?
- speaker: Respondent
  text: She was Irish and Scotch-Irish. I put that on a resume once and got her an interview because they wanted to see an
    Irish Indian. And I got the job, by the way.
- speaker: Interviewer
  text: Your mother and father obviously met then in Tishomingo, I suppose?
- speaker: Respondent
  text: They both lived in the small community just north and west of Tishomingo called Bullet Prairie. I don't know the origin
    of the name but it was a small farming community. That's where they met. My grandfather on my dad's side had a homestead
    there at Bullet Prairie, so my dad grew up there at Mill Creek and Bullet Prairie.
- speaker: Interviewer
  text: You trace your ancestry then on your father's side to the Trail of Tears?
- speaker: Respondent
  text: Yes. I can't tell you name right now but I had a relative that came on the Trail of Tears that was listed on a census.
    They had one name, didn't have two names. And then from there it came through the Anoatubby family.
- speaker: Interviewer
  text: Did you grandparents have stories that were handed down to you from the Trail of Tears?
- speaker: Respondent
  text: Actually I mentioned that I was estranged from my Chickasaw roots. Until I got a little older, so I didn't have the
    benefit of that.
- speaker: Interviewer
  text: Then you didn't grow up Chickasaw, per se. Blood you were, but not in tradition.
- speaker: Respondent
  text: Well, it would have been impossible to deny that I was Chickasaw and never tried to. And my grandfather on my mother's
    side, he would always acknowledge it. In fact, when I would come in the door to his home, if he was inside, he would say,
    "Chokma," which is the traditional Chickasaw greeting. He had a close relationship with the Chickasaws, so it wasn't like
    I was totally without anything. And when we'd be at the dinner table he would use Chickasaw words, which was very interesting
    coming from an Irishman. But he did because he'd been around Chickasaws for many years, he picked up part of the language
    and he would refer to things in my presence. So I picked up a few Chickasaw words being around him. But we didn't really
    talk about what things had been like in the Chickasaw side. But it was never forgotten, I mean, it was always there. While
    we didn't have the benefit of the Chickasaw family it was never denied from any of the family.
- speaker: Interviewer
  text: You were always reminded?
- speaker: Respondent
  text: I was reminded. In fact, I think it was intended to be that way.
- speaker: Interviewer
  text: When would you say that you picked up learning the traditions of the Chickasaws?
- speaker: Respondent
  text: My dad was a twin. His sister also lived at Bullet Prairie. On occasion we would visit her, my mom and myself and
    sometimes a few of my other brothers. So we got to know them really well. I mean, they were part of the families who would
    make visits. We didn't spend a lot of time with them but it was a period where we would learn more about the family and
    the Chickasaw roots. While again, I didn't spend a lot of time with my Chickasaw family I began to become very interested
    in it.
- speaker: Interviewer
  text: About what age do you think you were when this was happening to you?
- speaker: Respondent
  text: Oh probably twelve, thirteen. It was undeniable; everyone knew that I was Chickasaw. And people would call you Chief
    and things like that to acknowledge that. They didn't really realize what they were doing but still, to me I thought it
    was pretty cool, you know -
- speaker: Respondent
  text: …that they would call me that. And we lived next door, at one time, to a family that were full-blood. His dad was
    Choctaw, his mother was Chickasaw. And so I played with the other children. So you would become interested and try to
    find out more about it. I sort of had a yearning to know more, so anything I could find or learn and I would try to find
    out more.
- speaker: Interviewer
  text: I'm trying to imagine what the children would do. Would they play Chickasaw games like stick ball? Was that a game
    that was played, was that a traditional game?
- speaker: Respondent
  text: It was a traditional game, it wasn't something that I played when I was a young man. Things like going fishing and
    hunting. In Tishomingo there's a creek that runs just almost through the town, it's called Pennington Creek. My friends
    and I would spend a lot of time on Pennington Creek doing a lot of things that kids do. We would have folks join us that
    were of Chickasaw descent or Indian descent as well as non-Indian. I remember distinctly when I was a young boy when we
    lived next to this family. The father made some Chickasaw, I guess you'd call them toys. They were sound devices, you
    know, things that would make noise. I remember that so I picked up a little of that and understood that. He made me a
    bow, a very small bow at the time, but I really liked that. Anyway, it's kind of an incremental thing learning more about
    being Chickasaw. And of course, in the city of Tishomingo they began an annual event, they call it the Chickasaw Festival.
    It was a celebration. You could go into the park and you could see the different displays, arts and crafts, and things
    like that that would be in the park. And they had a dish, and still do, we still have this dish, it's calls Pashofa. And
    I was first introduced to Pashofa when I went to one of those events.
- speaker: Interviewer
  text: What was that made up of?
- speaker: Respondent
  text: It's a hominy, if you were to go to a grocery store you may or may not find it, but it's called Pearl Hominy. It's
    in the dry form. You cook it and you cook it with pork, that's Pashofa.
- speaker: Interviewer
  text: You weren't picking up on the language yet but you understood words in it. And the language is Muskogean?
- speaker: Respondent
  text: Well, yes, it's that particular group of languages.
- speaker: Interviewer
  text: And it's the Choctaw that shares that with you?
- speaker: Respondent
  text: Yes, it's the Choctaws. In fact, there's a legend about the Chickasaw and Choctaw. They call it the Migration Legend
    where there were two brothers, it was before they began to reside in the southeastern part of the current United States.
    And they were being led by a leaning pole. That leaning pole, they would put it in the ground at night. When they'd awaken
    in the morning it would be leaning in a particular direction and that's the way they'd go. And were part of one tribe.
    The brothers were Chickasaw and Choctaw. They reached the Mississippi River, went across the Mississippi River, on the
    other side the pole leaned, or at least Choctaw thought it leaned, and Chickasaw didn't believe that it was leaning. So
    the brothers then parted and formed the Chickasaw and Choctaw tribe.
- speaker: Interviewer
  text: So the brothers' names were Choctaw?
- speaker: Respondent
  text: Choctaw and Chickasaw.
- speaker: Interviewer
  text: So then they split?
- speaker: Respondent
  text: Yes, but the language is so close there's words that are identical in either one tribe or the other. And there are
    different ones. The tribes say that because we were basically one tribe that we have the same language and a lot of the
    same cultural activities.
