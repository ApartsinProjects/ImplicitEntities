collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: You were born in Carthage, Texas?
- speaker: Interviewer
  text: Do you know the name of the hospital you were born in there? Is it still there?
- speaker: Respondent
  text: No, there was no hospital. It actually was in a doctor's clinic, a couple of beds where women could birth babies,
    but there was no hospital. Dr. Hooker was the guy's name. I've heard my mother mention Dr. Hooker, that's all I really
    know about him.
- speaker: Interviewer
  text: Let's talk about your mother. Your mother's name and where she was from, where she grew up.
- speaker: Respondent
  text: My mother's name was unusual, it was Tula, T-u-l-a, Hightower. She was born in St. Augustine, Texas, which is probably
    sixty miles south of Carthage where I was born. But her family had moved when she was a child, up to Carthage, Texas.
    They were farmers, in fact, sharecroppers, back in the Great Depression days and she was the baby of a very large family.
- speaker: Interviewer
  text: Describe her for us.
- speaker: Respondent
  text: 'My mother was, of course, wonderful to me. She graduated high school, was married to my father shortly thereafter.
    Two years later, I was born. Eleven months later, the Japanese bombed Pearl Harbor and World War II was on. My father
    was not drafted into the war until 1943. I don''t remember that part, of course, but my father worked for a little natural
    gas company. We lived in a company house six miles outside of Carthage, Texas, at a big compressor station. But when my
    father was drafted the company made us move out of the house. And we had to go live with her parents, where they were
    sharecroppers, right on the edge of a large farm. They worked very, very hard to get half of what they produced. It was
    an old farmhouse with no electricity, no running water, no natural gas, not even propane, butane. Wood-burning stove,
    fireplace, horribly hot in the summer and bitterly cold in the wintertime, is what I remember as a child. My mother had
    never really been brought up in the church. Her family were good, honest, hardworking people, but not church people. My
    little sister had been born two years after I was, so she had two little ones when my dad was shipped off to Germany.
    I''ve heard her tell that story. She decided she really needed spiritual help and started taking us a nearby church. I
    remember her telling that after that first Sunday night when she was tucking me into bed, I said, "Aren''t we going to
    pray?" And she said, "What?" And I said, "Pray. They said this morning we should pray before we sleep." And she said,
    you know, in her own heart, I don''t know how to pray. Nobody had ever taught me how to pray. But I said in my deepest
    heart, "God, if you will help me say something fairly intelligent in front of this three-year-old, I will learn how to
    pray." So my mother became a wonderful Christian, very interested in her children. And, of course, my father, as soon
    as he was back from the war, she was a stay-at-home mom all the years I was growing up but became very involved in PTA,
    all things related to the church: United Methodist Women, back when it was called the Women''s Society of Christian Service.
    Went to those kinds of meetings. We were in church Sunday morning, Sunday night, Wednesday night prayer meeting. She really
    gave everything to her family. I had a little brother born later, so the three of us growing up, she had this great dream
    that her children would go to college. Both she and my dad had this dream and I remember early memories of her tucking
    me into bed at night, saying a prayer with me, but saying, "When you get to SMU." She had never seen SMU, she knew it
    was Methodist and it was big, and as far as she was concerned, that meant it was good, it''s big and Methodist, it''s
    got to be good. And I and my sister and brother are all SMU grads. And both of my sons are SMU grads now.'
- speaker: Interviewer
  text: Your brother and sister, their names?
- speaker: Respondent
  text: My sister's name is Jacqueline. She, after college, met and married a young Texas Aggie engineer named Manual Rodriguez.
    They've been married all these many years, have two sons who are also Aggie graduates now. My sister was a second grade
    school teacher all of her working years. My brother's name is Warren Thomas Biggs. He was just the right age to be drafted
    into the Vietnam War. Served with distinction in Vietnam. Came back and became a Dallas police officer. After eight years,
    decided he couldn't make a living as a policeman. He had gotten married by that time and he and his wife had two little
    boys. So he went back to SMU, took advanced studies in banking, went back to our hometown, and has been president of a
    bank in our hometown all these many years.
- speaker: Interviewer
  text: Your mother, didn't she write a news article for the Watchmen?
- speaker: Respondent
  text: She did, yes.
- speaker: Interviewer
  text: The Panola Watchmen?
- speaker: Respondent
  text: I didn't know you knew that. Yes, my mother was asked at one time to write a devotional for Church Women United there
    in Carthage. Someone said, "Oh, that is so good, that's so good. You think we could put that in the Panola Watchmen?"
    It was a little weekly paper. She said, "Well, okay, sure." So they ran her devotional in the paper and the next week,
    the little paper was flooded with calls, saying, "Why don't you have her write something else?" And she wrote a weekly
    column for twenty-five years. Yeah, she did. "First Things First," she called it.
- speaker: Interviewer
  text: And then she took up jogging late in life, actually.
- speaker: Respondent
  text: She did. After my brother, the youngest of the three, was out and on his own, she actually went to work at an insurance
    office there in town and became a physical fitness buff herself and was a jogger for many years. In her fifties, maybe
    early sixties, I guess, still was running in 5 kilometer races there in our hometown. When she got to the point she couldn't
    run anymore she rode a recumbent bike on into her seventies.
- speaker: Interviewer
  text: That's remarkable.
- speaker: Interviewer
  text: And then that's very remarkable from her lack of knowledge of the church -
- speaker: Respondent
  text: Um-hmm (affirmative).
- speaker: Interviewer
  text: '... to become a leader in the church.'
- speaker: Interviewer
  text: Is what she did. And you, as a young boy, obviously watching all this.
- speaker: Interviewer
  text: She had to have a tremendous influence on your life. Isn't there a story about when she would tuck you in at night
    -
- speaker: Respondent
  text: Um-hmm (affirmative).
- speaker: Interviewer
  text: '... and she would tell you were a special child?'
- speaker: Respondent
  text: Yes, at the same time that she would, you know, just mention college, and I was a small child, I had no idea what
    SMU was at that point. But she would also tell me, "There's something special about you. I just have this feeling that
    there's something very special about you. And one day God will help you figure out what that is." I didn't know until
    years later, she did the same thing to my sister. And when our little brother came along, she did the same thing to him.
    And again, it didn't mean we all had to be clergy. My sister taught school in the public schools down at the manned Space
    Center for almost thirty years. And my brother has been a bank president for more than thirty years.
- speaker: Interviewer
  text: It pointed out the importance of parents telling our children how important they are.
- speaker: Respondent
  text: Yes. And that there's a special place for you. I read in the National Education Association Journal years ago that
    a child who lives with praise will develop a sense of destiny. And I think I and my sister and brother developed a sense
    of destiny that we had been sent to this time and this place to do something significant.
- speaker: Interviewer
  text: Yeah. Then your father and his full name?
- speaker: Respondent
  text: My father's full name was Marvin Mouzon Biggs Sr. He was named for two Methodist bishops. My grandparents had heard
    two bishops preach in their lifetimes and one was old Bishop Enoch Marvin, one was a French American named Edwin Dubose
    Mouzon. They named my father the surnames of those two bishops. He was their only son. My father never felt called to
    be a minister but I did feel called when I was a senior in high school, you know, so the names came from two distinguished
    bishops of the Methodist church.
- speaker: Interviewer
  text: Did you grow up using Mouzon or Marvin?
- speaker: Respondent
  text: I did, Mouzon, yeah.
- speaker: Interviewer
  text: Was that difficult for you as a youngster, to get that name right?
- speaker: Respondent
  text: You know, not really. There was a cartoon character back there named Marvin and he was a nerdy little kid. I didn't
    want to be Marvin. Years later, I met a very distinguished lawyer in Houston, who was with the biggest law firm in town,
    a senior partner named Marvin Collie. And I decided, That's not a bad name at all. But Mouzon was the name I went by.
    And people say, "But what do they call you?" They call me Mouzon. You know, if your parents keep calling you Mouzon, other
    people tend to call you Mouzon as well.
- speaker: Interviewer
  text: Your father, what did he do for a living?
- speaker: Respondent
  text: My father did not finish high school. He had five sisters, he was the only son, as I had mentioned. The family had
    a little more than my mother's people but not much. They did own their own farm. My grandfather was older than my grandmother
    and was sort of sickly his last years. And my dad really felt in that Great Depression, the 1930s I'm talking about, that
    he had just had to drop out of school and keep the farm going to support his mother and five sisters. He got a job with
    this little natural gas company there in Carthage and worked for them forty-three years. He started what they used to
    call a roustabout, which meant a shovel. He was digging ditches, doing whatever they needed doing. But by hard work and
    loyalty to the company, he eventually was the superintendent of their East Texas operations there. It wasn't a huge paying
    job but it was a job with some responsibility. And my father became a loved person in the community, served on the hospital
    board. Once they had a hospital, he did a lot of significant things himself with the limited background that he had had
    growing up. He wanted very much for all of us to be college graduates. He and my mother both knew what education could
    do and, of course, it has done that for us. And I have two sons. My sister has two sons. My brother two sons. And all
    six of them college graduates, doing wonderfully well. They were pallbearers when my father died, pallbearers when my
    mother died.
- speaker: Interviewer
  text: As a young boy in the Carthage area -
- speaker: Respondent
  text: Um-hmm (affirmative).
- speaker: Interviewer
  text: '... oil fields -'
- speaker: Respondent
  text: Um-hmm (affirmative).
- speaker: Interviewer
  text: '... and all this, maybe you can talk about your first remembrances. You go back to three years old, I think you just
    said -'
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: '... when you asked your mother to pray.'
- speaker: Respondent
  text: Um-hmm (affirmative).
- speaker: Interviewer
  text: The first house you remember, the first school you attended, some of those thoughts.
- speaker: Respondent
  text: Yeah. As soon as the war was over and my father came home from the war, he was in the 86th Black Hawk Infantry Division,
    saw a lot of action in Germany that last fateful year of '44, '45. He was in Patton's 3rd Army that rushed toward Bastogne
    in that cold, cold winter of 1944. So my dad saw a lot of action there. Because he was later into the war than some, his
    unit was picked up immediately when the war was over in Europe and shipped to the Philippines to become a part of MacArthur's
    Army to get ready to invade Japan. When he came back, we moved back to the little company house. It was very modest; this
    was the oil company house. But it had free natural gas, right from the wells. It wasn't cool in the summer but it was
    wonderfully warm in the winter. I rode a school bus every day for twelve years. I never had a car when I was growing up.
    So I rode the school bus into Carthage, Texas. Went all twelve years there, as did my sister and brother afterward. I
    was a shy child, I really was. I didn't feel I had as much as other people did. The country kids didn't tend to have a
    much as the kids who lived in town. I remember the distinction of going to school and town kids wore blue jeans, the boys
    did, and I had striped overalls. So I was shy, but I was a good student. I worked really hard at being a straight-A student.
    In the seventh grade, my mother again, said to me one time, "I've read a book that I think could help you. Would you be
    willing to read my book and [in decipherable]?" Well, it turned out to be Norman Vincent Peale's The Power of Positive
    Thinking. And I read that book where Peale talks about accenting what you do best, concentrating on what you do best.
    I read Dale Carnegie's How to Win Friends and Influence People. How you think of something really wonderful just before
    you walk into a room, so you walk in with a smile on your face and your head held up high. All of those things began to
    help me. I worked even harder at being a good student. I ran for student council and was elected. My ninth grade year
    I was president of the Junior High Student Council. I went out for the football team in the seventh grade. They told me
    I was too little. I practiced every day. I never got in a game. Eighth grade year, same. I practiced every day, never
    got in a game. All I ever heard was, "You're too little, you're too little." Ninth grade year, the same. But in the spring
