collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Claire, would you state your full name, please?
- speaker: Respondent
  text: Claire V. Eagan.
- speaker: Interviewer
  text: The V is standing for what?
- speaker: Respondent
  text: It's a middle initial from my confirmation name because I do not have a middle name.
- speaker: Interviewer
  text: You don't have a middle name?
- speaker: Interviewer
  text: Not even Veronica?
- speaker: Respondent
  text: That is my confirmation name in the Catholic Church. So wanted a middle initial and use that.
- speaker: Interviewer
  text: Okay. And it's okay for you to do that. And we are recording this interview in the recording studios of VoicesofOklahoma.com.
    Your birth date?
- speaker: Respondent
  text: October 9, 1950.
- speaker: Interviewer
  text: Making your present age?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In the Bronx in New York City.
- speaker: Interviewer
  text: Your mother's name, maiden name, where she was from, that kind of thing.
- speaker: Respondent
  text: My mother's maiden name is Lynch and her father was Phillip Lynch. And when she was a young girl, she grew up in the
    Bronx, a wealthy girl because my grandfather at the time was the youngest man to have a seat on the New York Stock Exchange.
    But on her 12th birthday, October 29th, 1929, they lost everything.
- speaker: Interviewer
  text: So that date, of course, October 29th, 1929 was the start of The Great Depression.
- speaker: Respondent
  text: So she went from riches to rags, and she's a very important part of my life.
- speaker: Interviewer
  text: Did she talk a lot to you about that and how they went from here and then their living conditions?
- speaker: Respondent
  text: She never dwelled on it. She moved on. She had to leave the school she was in. She had to go to a different high school,
    which was free, and so she had a whole new set of friends from that high school, and she never skipped a beat. She was
    an extrovert, had friends everywhere, and she never dwelled on it.
- speaker: Interviewer
  text: Nor talked a lot to you about it. Because some people could say, "This was awful and it impacted my life for the rest
    of my life," and apparently it didn't.
- speaker: Interviewer
  text: So then asked what do you draw from her, and you probably just stated that.
- speaker: Respondent
  text: The other thing that is important is her love of education stemmed from the fact that they lost their money and she
    wasn't able to go to college. She had to work right out of high school. So think the fact that my parents drummed into
    us that we were going to college - it wasn't a question, it was a statement - and how important education is, that dictated
    what became of us.
- speaker: Interviewer
  text: Right. Because she didn't get to go on to college.
- speaker: Interviewer
  text: And then your father's name?
- speaker: Respondent
  text: Joseph Eagan. His father was from North Adams, Massachusetts. The Eagan spelled the way we spell it seemed to have
    clustered in North Adams, Massachusetts, and my father's father moved from there to New York City. And he was Irving Berlin's
    chauffeur.
- speaker: Interviewer
  text: Irving Berlin's chauffeur. And when you say the spelling - so spell your last name.
- speaker: Respondent
  text: It's E-A-G-A-N, which is not the typical Irish spelling. Most people spell the name E-G-A-N.
- speaker: Interviewer
  text: Okay. All right. His personality?
- speaker: Respondent
  text: My father? He was the quintessential quiet man. He was shy - of course spoke around the house - but in social settings
    he was very quiet. But when he spoke, he had important things to say, and people listened.
- speaker: Interviewer
  text: And what did he do?
- speaker: Respondent
  text: So he became - after World War II, he became the general manager of a tri-state roofing supply company in New York
    City. Once again, he couldn't go to college because of World War II. And when he came home and was already married to
    my mother, they wanted to start a family, so he also went into business without a college degree.
- speaker: Interviewer
  text: All right. But he succeeded and flourished.
- speaker: Respondent
  text: Eventually.
- speaker: Interviewer
  text: Was able to put you...
- speaker: Respondent
  text: He put all - yeah, he worked three jobs to put all three of us through college.
- speaker: Interviewer
  text: And so you had - tell me, siblings?
- speaker: Respondent
  text: So the oldest is my sister Anne Marie. She's four years older than I. My brother Phillip is two years older than I,
    so I'm the baby.
- speaker: Interviewer
  text: Okay. So you draw from him - from your father - what characteristic, do you think? Be real quiet?
- speaker: Respondent
  text: Think before you speak. But also, once again, just reading. His famous saying was, "An idle mind is the devil's workshop."
    So if he saw us just sitting around on a Saturday, he would find a book and give it to us.
- speaker: Interviewer
  text: Isn't that amazing?
- speaker: Interviewer
  text: Isn't that wonderful? What a gift that was.
- speaker: Respondent
  text: Yes. The gift of reading, which we all love to this day.
- speaker: Interviewer
  text: Oh yes, yes, yes, yes. Your education then - your grade school?
- speaker: Respondent
  text: So went to the local Catholic grade school in my parish.
- speaker: Respondent
  text: In the Bronx. In the Bronx, still there. And then went to high school at the Academy of Mount Saint Ursula, which
    is a girls' private high school in the Bronx that my mother attended before she had to drop out. And then went to college
    in Washington, D.C.
- speaker: Interviewer
  text: What year did you graduate from high school?
- speaker: Interviewer
  text: Beyond your academic life, did you have a social life? Did you join clubs? Did you...
- speaker: Respondent
  text: Well, we had no sports in Catholic girls' schools, so played intramural basketball. But we didn't have sports. We
    were in the Bronx. You made your own fun. Had girlfriends that we would, you know, walk, talk, listen to music. Read a
    lot. Was a nerd. Did my homework and studied a lot.
- speaker: Interviewer
  text: Paid off for you in the long run, though.
- speaker: Respondent
  text: In hindsight, it did.
- speaker: Interviewer
  text: Right, right, right. So life then, even as a grade schooler and so forth in the Bronx - that just seems so foreign
    to a lot of people. What's life like in the Bronx?
- speaker: Respondent
  text: The home life was interesting. We lived in a fourth-floor walk-up. We had no elevator, and my mother raised three
    babies, carrying them up the stairs along with the groceries. We had two bedrooms - my parents' bedroom, and the three
    of us were in one bedroom, which is not as large as this studio room. We had one bathroom with a bathtub and no shower.
    We didn't have a telephone for a long time because they initially had one when I was younger. My mother was on the phone
    with her girlfriends all the time and it was too expensive, so they disconnected it. We didn't have a car till I was about
    eight. Most people in New York at the time didn't drive. My mother never had a driver's license. We didn't get our driver's
    licenses until - I didn't get it until graduated from law school. So you walked a lot. But also, we lived by subway stations
    and could go down to Manhattan, go to the theater, shop, walk - just spend a lot of time down in Manhattan.
- speaker: Interviewer
  text: How about groceries? Did you have to go far to a grocery store?
- speaker: Respondent
  text: Bronx in those days - there were a lot of post-World War refugees who were there, so we had a lot of German and Jewish
    bakeries and delicatessens. And on every street there was like a pizza place, a butcher shop, a grocery store, a Chinese
    laundry. I mean, it was a little microcosm on every block. So we only had to walk a block to get to all of those grocery
    stores.
- speaker: Interviewer
  text: What years are we talking about here now?
- speaker: Respondent
  text: So we lived in the Bronx from - well, from when I was born. My parents moved out of the Bronx in 1972, my senior year
    in college.
- speaker: Interviewer
  text: All right. So in the '60s and so forth, were you interested in sports? I'm thinking about way back when - the Brooklyn
    Dodgers and the New York Yankees and all that.
- speaker: Respondent
  text: Of course. The Yankees games were on every Saturday. My brother's high school is across the street from Yankee Stadium.
    So went with my father to Yankees games, and occasionally - I remember the New York Giants were still playing at Yankee
    Stadium - I occasionally went to a football game. We didn't go that often, but it was on every Saturday on our black-and-white
    TV. We watched it.
- speaker: Interviewer
  text: Living across the street from the Yankee Stadium?
- speaker: Respondent
  text: My brother's high school.
- speaker: Interviewer
  text: High school. Wow. That must have been exciting for him.
- speaker: Interviewer
  text: After high school, then you go on to college, and that college was...
- speaker: Respondent
  text: Trinity College, now Trinity University, in Washington, D.C. Nancy Pelosi graduated from there. Kathleen Sebelius.
    Those are the people who come to mind whose names you might recognize. Think it's very important to my story that our
    parents told us we could go anywhere we wanted in the United States as long as it was Catholic, because they were devout
    Catholics. And with everything going on in the '60s, think they were afraid that if you went to a non-sectarian college,
    you would lose your faith. So wanted to go to an Ivy League school, but of course they weren't coed at the time. So there
    were the Seven Sister schools, and my sister, who was four years older than I, said, "I think the place for you is Mount
    Holyoke." And so that's where wanted to go. So one night we're in a restaurant at dinner, and my mother said, "Claire,
    where are you going to college?" I was still a junior. And I said, "Well, I'm going to Mount Holyoke if I get in." And
    my mother thought for a moment, and she said, "You can't fool me. That's not Catholic." And my sister stepped in and had
    a huge fight with my mother in the restaurant, saying I needed to go there - best school, etc. I stopped the fight, and
    said, "All right, just tell me what the closest thing is that is a Catholic women's college that I can attend that would
    give me the same quality of education," and my sister suggested Trinity.
- speaker: Interviewer
  text: And that's how that came about. But a great reputation.
- speaker: Respondent
  text: Got a great education there and met wonderful people who are still friends. Wasn't that happy my freshman year. Didn't
    do that well my freshman year because, like most people, the first year of college was a change. And didn't always go
    to class. Wasn't as studious as had been in high school. And so after my freshman year, just decided I need to take charge
    and change that. So did. In my sophomore year did really, really well. So just corrected myself.
- speaker: Interviewer
  text: Where is that - Trinity? Where is it?
- speaker: Respondent
  text: Right across the street - northeast Washington, D.C. - right across the street from Catholic University. Very close
    to Howard University.
- speaker: Interviewer
  text: Okay. All right. And then you graduated with what degree?
- speaker: Respondent
  text: A Bachelor of Arts, cum laude, with a sociology and French double major.
- speaker: Interviewer
  text: In what year?
- speaker: Interviewer
  text: So did you have a calling to - you're gonna go out into the world and you were gonna... what were you gonna do then?
- speaker: Respondent
  text: So, a very important part of my story is my junior year, which spent in Switzerland - my junior year of college -
    and it's related to why I'm in Tulsa. But knew from a young age that wanted to be a lawyer. Never focusing on the fact
    that wanted to be a litigator, but had no public speaking abilities, and was very shy and very nervous. Never focused
    on it. But always knew wanted to be a lawyer.
- speaker: Interviewer
  text: Okay, why? Why did you know that?
- speaker: Respondent
  text: Just think the art of persuasion was important to me, and finding something that would convince a judge that this
    was the right thing to do. And it just appealed to me. And never wavered in what wanted to do. Studied sociology because
    thought it would be a good segue into the law. It didn't matter what you studied undergraduate to do well in law school.
