collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So then in 1941, you are 21 years old. Do you remember December 7, 1941 and the bombing of Pearl Harbor?
- speaker: Interviewer
  text: Do you remember how you found out about it?
- speaker: Respondent
  text: Somebody told me.
- speaker: Interviewer
  text: Do you recall that when the United States went to war that there was rationing?
- speaker: Respondent
  text: Oh yes, I remember the rationing.
- speaker: Respondent
  text: Oh yes. There were all sorts of things we couldn’t get.
- speaker: Respondent
  text: Yes, she made root beer.
- speaker: Interviewer
  text: As the 1940s move along…
- speaker: Respondent
  text: Yes, at the Victor Hugo Inn.
- speaker: Interviewer
  text: Do you remember distinctly the first time you laid eyes on him?
- speaker: Respondent
  text: Yes. I do. It was at that dance. I was dancing with a friend of his and he came and cut in and that’s when I met him.
- speaker: Interviewer
  text: Were you taken with him right away?
- speaker: Respondent
  text: Yes. He was wonderful looking and very attractive, but I didn’t think much more of it than that. It was just a dance.
    Then he came to see me I guess.
- speaker: Respondent
  text: Yes! (Laughter)
- speaker: Interviewer
  text: You were married April 2, 1945 and you were 25.
- speaker: Interviewer
  text: Let’s state his full name right now.
- speaker: Respondent
  text: Dewey Follett Bartlett.
- speaker: Interviewer
  text: He was born March 28, 1919 in Marietta, Ohio
- speaker: Interviewer
  text: He was a year older than you so he would have been 26 and you would have been 25 when he asked you to marry him?
- speaker: Interviewer
  text: Had you dated a lot before then?
- speaker: Respondent
  text: Not a lot but some.
- speaker: Interviewer
  text: But when this guy comes along…
- speaker: Respondent
  text: Well, it was different. (Laughter) It was different definitely.
- speaker: Interviewer
  text: What was it about him that you liked?
- speaker: Respondent
  text: I don’t know. I liked his looks very much. I liked everything about him. I liked the way he talked and what he said.
- speaker: Interviewer
  text: He graduated from Princeton with a degree in geological engineering in 1942.
- speaker: Interviewer
  text: Then he served in the Marine Corps in 1942 and was trained by the Navy and he was a dive bomber pilot for the Marines?
- speaker: Interviewer
  text: Did he talk about any experiences in the war? Did he tell you some stories?
- speaker: Respondent
  text: He didn’t talk much about it.
- speaker: Respondent
  text: He did not talk about it very much at all to me, but there was a story where he was bombing a particular target. He
    missed the target and he realized he hit a railroad track so he felt pretty good about that.
- speaker: Interviewer
  text: You were married in 1945 when the war was about to wrap up? You were married on April 2, 1945 and the war was over
    with in June. He was still on duty for those months until the war was over?
- speaker: Respondent
  text: That was where we went to church near my grandmother’s house. So we went to church there and that’s why we were married
    there.
- speaker: Interviewer
  text: Do the swallows really return every year?
- speaker: Respondent
  text: Yes. They did. The swallows came back every year.
- speaker: Respondent
  text: (Laughter) yeah, they did! (Laughter)
- speaker: Interviewer
  text: After you were married, what happened then? The war was over and he was out of the service…
- speaker: Respondent
  text: They came to Tulsa. His brother David Bartlett was in the Navy and he and dad both came to Tulsa to take over their
    family company, Keener Oil Company that had been started by their father who was a banker in Marietta, Ohio. He was David
    A. Bartlett and then his sons were David and Dewey.
- speaker: Interviewer
  text: So David A. Bartlett was a banker in Ohio and he came to Oklahoma because of oil discoveries that were going on?
- speaker: Respondent
  text: He was given as I understand it, some oil leases in Titusville, Pennsylvania where the oil was first discovered as
    payment on a loan that couldn’t be paid. Then through that he eventually started drilling wells in Oklahoma. He died when
    my dad was four or five years old. His wife was still living, but there was sort of a trustee that continued with the
    oil company. My uncle and dad used to come to Oklahoma as roustabouts working on wells. After the war they came and sort
    of reclaimed Keener Oil Company.
- speaker: Interviewer
  text: How did the name Keener come about?
- speaker: Respondent
  text: It was named after a formation, not in Oklahoma, but I think it was back East somewhere maybe in Pennsylvania. I’m
    not sure.
- speaker: Interviewer
  text: So that is then how the family starts laying roots here in Oklahoma?
- speaker: Interviewer
  text: Dewey was involved in farming and ranching and the oil business, isn’t that true?
- speaker: Respondent
  text: I think ranching was more of a hobby wouldn’t you say mom?
- speaker: Respondent
  text: That was never a profitable business for him, but the oil business—he and his brother ran the Keener Oil Company really
    until dad became a senator and he thought it might be a conflict. So he sold his portion of the company to his brother.
- speaker: Interviewer
  text: They were like you aid earlier roustabouts and they were right there being tool pushers and everything?
- speaker: Respondent
  text: I think so in the summers because their father died when they were very young and I think their mother would send
    them back here and they would work the oil fields as I understand it.
- speaker: Interviewer
  text: Okay so that was in their growing years and teen years?
- speaker: Respondent
  text: Yes, teen and college summer years.
- speaker: Interviewer
  text: Okay so that’s how he got interested in the oil business was through his summertime jobs?
- speaker: Respondent
  text: Yes and then he majored in geological engineering and then his brother graduated with some sort of engineering degree
    from MIT.
- speaker: Interviewer
  text: So he began raising a family then as Dewey gets involved in the oil business. Your three children are born. tell us
    the years of their births.
- speaker: Respondent
  text: Dewey was born in 1946, Joan in 1948 and Mike in 1950.
- speaker: Interviewer
  text: In the 1950s do you have memories of shopping in downtown Tulsa and the Vandever’s department store and Clark’s Good
    Clothes?
- speaker: Respondent
  text: Yes and Froug’s and Brown-Duncan was a big one. They all seemed to be pretty much in one place.
- speaker: Respondent
  text: They were all downtown. Do you remember Sam Brenner where dad used to get his clothes?
- speaker: Respondent
  text: He is still around.
- speaker: Interviewer
  text: People used to dress up when they went shopping downtown.
- speaker: Respondent
  text: Oh yes. We wore hats and gloves sometimes.
- speaker: Interviewer
  text: Where did you first live in Tulsa in those days?
- speaker: Respondent
  text: They first lived in Tulsa near Peoria kind of close to where the old Dunwell Cleaners is, which is In The Raw Sushi
    now. It was a couple of blocks from there. Dad drilled a water well in the back yard and then he put in a chain link fence.
    Then when I was about two you moved to 30th Street and about Lewis. That’s where you lived until you moved into the governor’s
    house and then you bought a condominium at Sooner Plaza downtown.
- speaker: Respondent
  text: Thank you Joanie. (Laughter)
- speaker: Respondent
  text: I’m glad you are here.
- speaker: Interviewer
  text: As I understand it, somewhere in 1959 or 1960 Dewey contracted hepatitis?
- speaker: Respondent
  text: Yes he did he was terribly sick.
- speaker: Interviewer
  text: Do you have any idea how he got it?
- speaker: Respondent
  text: That’s right.
- speaker: Respondent
  text: He was very sick and in the hospital.
- speaker: Respondent
  text: And he was home for a long time and not working which was really unusual. He was kind of grumpy, too. Do you remember
    that part mom?
- speaker: Respondent
  text: I don’t remember that part. (Laughter)
- speaker: Interviewer
  text: How long did he battle it?
- speaker: Respondent
  text: I think about six months. He started going back to work part of the day because I remember he would talk about how
    he got tired and he would go to sleep on the couch in his office.
- speaker: Respondent
  text: Oh, that’s right. He did.
- speaker: Respondent
  text: But remember he started reading a lot. He read a lot of history and Oklahoma history and politics and then he took
    a Dale Carnegie speaking course with Eloise Worley and they had so much fun.
- speaker: Interviewer
  text: Who was she?
- speaker: Respondent
  text: She was friend and very funny and for some reason she and dad ended up in this class together. Sometimes they would
    say that you had 10 seconds and you had to pick a subject out of a hat and say it was “what’s your most embarrassing moment?”
    and then you would have to talk about that. Dad just loved it. One time he came home with a pin because he won the best
    speech o
