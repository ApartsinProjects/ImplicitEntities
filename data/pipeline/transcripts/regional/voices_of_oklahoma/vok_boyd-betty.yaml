collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: In which hospital were you born?
- speaker: Respondent
  text: None, I was born at home, therefore I didn’t really have a legitimate birth certificate. When I went to Iowa State
    University I had to get an affidavit, fortunately a lady who lived across the street from us where I was born, still lived
    there, so…
- speaker: Interviewer
  text: Do you remember the location?
- speaker: Respondent
  text: Oh yes, the house is still there, I certainly do. It was very close to Owen Park, which incidentally was the first
    public park in Tulsa, in Irving Place addition very close to the Washington Irving monument on north Santa Fe, which is
    the first street north of Osage County. So it was very close to the Tulsa Country Club and the Kennedy Golf Course was
    there also at that time.
- speaker: Interviewer
  text: So you lived there until…
- speaker: Respondent
  text: Well, I lived there until Bill and I−after we were married we lived there with my mother in that same house. In fact,
    I was married in that house as well as having been born there. Then after Bill got out of the service, we lived with mother
    and then suddenly he had polio as did our daughter Beverly, and we still lived with mother in this two-story home there
    on north Santa Fe until 1950 when he and I built a home over close to Gilcrease Hills, and we lived there until we moved
    to where I am now.
- speaker: Interviewer
  text: Okay. What elementary school did you go to?
- speaker: Respondent
  text: Pershing and so did my children.
- speaker: Interviewer
  text: And then where did you go for high school?
- speaker: Respondent
  text: Roosevelt Junior High, which is now an elementary school by the way. But I went to Roosevelt Junior High and Central
    High. Bill graduated from Central High and so did our children.
- speaker: Interviewer
  text: You met Bill at Central?
- speaker: Respondent
  text: No, he was two years ahead of me John and by some magic I went to high school very young and I didn’t know anybody
    at Central High School. Well, that’s backwards, I knew lots of people, but they didn’t know me, because I wasn’t interested
    in boys or clubs or anything of the sort. I was too young when I went to Central High. I graduated at 15. I met Bill when
    I was 16−we were on a bus coming from the University of Tulsa where we were both students, but he was two years ahead
    of me at Central.
- speaker: Interviewer
  text: At 15 you graduated?
- speaker: Interviewer
  text: What age were you when you started high school?
- speaker: Respondent
  text: I was 12 almost 13.
- speaker: Interviewer
  text: How did that come about?
- speaker: Respondent
  text: (Laughter) A pushy mother! No, not really. My birthday being in December, as I told you at the beginning here, I could
    start kindergarten when I was four, because I would be five before the first of the year. At that time, Tulsa had mid-year
    promotions and so we had a graduation class in January and one in June. Since I started school when I did, I was in the
    mid-year thing. Well, when I got to the fifth grade, Tulsa Public Schools decided to do away with that. So they gave us
    all a test if we were going to be January graduates and if we did well enough, they pushed us on up to the next grade
    instead of keeping us back where we were. I did well and so I went ahead in that particular instance.
- speaker: Interviewer
  text: You had to be a good student.
- speaker: Respondent
  text: Well, I think so. However, when I was in the first grade, my first grade teacher got up and she said, “We have eight
    girls in this class whose first names are Betty, that’s too much for me to handle. Half of you are going on to the next
    grade.” (Laughter) So, I did that twice. I got double promoted out of the first grade and the fifth grade quite by accident.
- speaker: Interviewer
  text: Wow. So then you went to Iowa State University?
- speaker: Respondent
  text: Yes, after I went to TU. Iowa State and Cornell in New York were the only two schools that offered what I wanted to
    major in. I wanted to major in the combination of home economics and technical journalism. I was hoping someday to edit
    Better Homes & Gardens. Instead I married Bill. But Mother said, “You can never go to Cornell, it’s too far away.” I was
    her only child, and I hadn’t had a Dad since I was about a year old, so, it was just mother and I. She said, “No, no.”
    And I don’t know why she said that, really, because she got her master’s degree from Columbia University in New York City,
    but it was too far for her little girl to go. She said, “If you’ll go to TU one year, we’ll talk about Iowa State.” I
    did, and we did, and I did, and so after I went to TU the first year there I met Bill, and we started dating rather steadily
    but then World War II came along that December and I was a freshman at TU. Bill enlisted in the United States Army Air
    Corps and I went to Iowa State.
- speaker: Interviewer
  text: Your mother had tremendous influence on you in education in a sense. In those years if she went on to get her master’s
    that had to be…
- speaker: Respondent
  text: Well, my mother and four of her six sisters all got advanced degrees and mother taught school here in Tulsa for about
    36 years. She could have taught this table to read.
- speaker: Interviewer
  text: What was her name?
- speaker: Respondent
  text: My mother’s name was Marie Carman. Carman was my maiden name. People still come up to me John, grown people with grandchildren
    in their arms and say, “Your mother had me in the first grade and she was the greatest teacher I ever had.” And if you
    don’t think that’s a perk for me (chuckle) it’s wonderful because mother and I obviously were extremely close. There was
    no doubt who was mother and who was daughter, but we were extremely close. It was my grandmother’s house where I was born
    and where I continued to live. I was raised with all women with my mother and my grandmother and an unmarried aunt, who
    incidentally probably was the home economics influence on me, because she was a dietician. She also had a master’s degree
    from Columbia.
- speaker: Respondent
  text: The Raytheon Corporation, when they invented the microwave, they called it the radar range− they called on my Aunt
    Margaret to come and tell them how to use the darn thing. (Laughter) They had it and they knew it would cook, but they
    didn’t know how long, how much moisture if any, how much spice if any, you know. My Aunt Margaret, I lived with her, so
    I grew up and I didn’t know there was anybody who wore long trousers in those days because I was raised in an all-gal
    atmosphere.
- speaker: Interviewer
  text: So your interest to major in home economics came from?
- speaker: Respondent
  text: Probably from Aunt Margaret because she was an extraordinary dietician and a home economist and a terrible cook herself
    by the way, but she could get other people to do it.
- speaker: Interviewer
  text: How about you? Would you define yourself as a good cook, do you enjoy that?
- speaker: Respondent
  text: Yes, I am a good cook. Well, I guess I am, I don’t do it anymore.
- speaker: Interviewer
  text: But you were, and then the side then, you call it technical journalism, but you wanted to edit magazines?
- speaker: Respondent
  text: I assumed I would work on obviously a woman’s magazine, because I didn’t know there were men around, except I met
    Bill. No, I really did want to get into the journalism field, but I wanted it to relate somehow to home economics on the
    food side, not the sewing side. Gee whiz, I’m lucky to thread a needle, that’s not me.
- speaker: Interviewer
  text: So then you graduated with a degree?
- speaker: Respondent
  text: No, well, I do have a degree, I fibbed it’s from TU. Bill joined the Air Corps as I mentioned. He flew B24s as a pilot
    and he flew 50 missions over Germany and came home and was discharged just before the Japanese surrendered. Actually,
    he was discharged from the air Corps, by then it was (called) the Air Force and he wanted to go back to TU. I said, “That’s
    fine but they don’t have what I want to take. I’ll have to find something else.” So, I just kind of bounced around. Then
    the next fall I discovered I was pregnant. This was nice. Bill and I had been married four years I guess at that time
    and it was time to start a family. Besides, I was over 20 by then at that time, so that was good, and I quit TU. Bill
    went on and Bill, after his polio did finish college. But his polio intervened and we couldn’t afford for both of us to
    be in university and besides that we had Beverly and I needed to play Momma.
- speaker: Interviewer
  text: How old were you when you were married?
- speaker: Respondent
  text: But Bill was not quite 21 and that was our biggest joke. You know, you knew Bill and we joked a lot together. When
    we were going to get married…we got married the day after he graduated and got his wings as a pilot. In Oklahoma at that
    time John, girls who were 18 didn’t have to have their parents’ consent to be married. Men had to be 21. Bill’s birthday
    was in October and we were getting married in August, and he was 20. So when I would get real ticked at him, when he would
    say something funny to me, or so he thought, and I would get a little bent out of shape, I would say, “Yes, but I didn’t
    have to go ask my Mommy if I could marry you, and you did.” (Laughter) So, we had lots of fun with that.
- speaker: Interviewer
  text: During the war then when Bill was a pilot, you then were involved yourself?
- speaker: Respondent
  text: I was. I worked at Douglas.
- speaker: Interviewer
  text: What did you do at Douglas?
- speaker: Respondent
  text: I was not Rosie the Riveter−I worked in the personnel office out at the bomber plant.
- speaker: Interviewer
  text: Okay, at Douglas’ bomber plant?
- speaker: Respondent
  text: Yes, they were building B-24s, which Bill was flying. They were also modifying A-20s. I worked there while he was
    overseas.
- speaker: Interviewer
  text: So did you consciously take that job because it was supportive of the war or it just happened to be a place to get
    a job?
- speaker: Respondent
  text: I can’t tell you, but I was very pleased to be part of the war effort. Of course, I felt like I was part of the war
    effort anyway. I had a husband flying missions in a B-24.
- speaker: Respondent
  text: And how he did that I’ll never know. In fact, my first airplane ride was in a B-24. He was stationed at Muroc, which
    is now Edwards Air Force Base. It was not (called that) at the time. It was called Muroc Army Air Base. We lived on base.
    I lived in the WAC quarters, the Women’s Army Corps, because we had no WACs out there. Since Bill was an officer, and
    I worked at the Provo Marshall’s office and we lived on base and I got to go up with Bill and his crew one day and we
    had a lot of fun running of the end of the runway because the shimmy damper went out on the plane. B-24s were not easy
    to fly and Bill was a little guy. When he was in the service he probably weighed 125 pounds soaking wet. And how he horsed
    that big plane, they were not easy to fly. B-24s did not have the equipment that the B-17 did to make them an easy machine
    to fly because they had a much longer range so they could fly greater missions. Bill was stationed in southern Italy and
    anyway we went up in a B-24 and that was my first airplane ride.
- speaker: Interviewer
  text: You must have known a lot about planes, you just called it a shimmy damper.
- speaker: Interviewer
  text: Most of us wouldn’t know what that is.
- speaker: Respondent
  text: Yes. Oh… (laughing).
- speaker: Interviewer
  text: So you knew parts of the airplanes?
- speaker: Interviewer
  text: There will be young people listening to this and you talk about polio, which is not a threat here today in the United
    States, but was. Bill contracted polio in what year?
- speaker: Respondent
  text: 1948. 1950 was the biggest year Tulsa had. St. John had a few (cases) and Hillcrest had the bulk of them and they
    were all teenagers or younger, except for Bill and this other radioman by the way from Shawnee. They were the only adults.
    But Tulsa had the greatest number of people who had multiple kinds of polio. There were three varieties of polio. So,
    when the shots came along, and incidentally Dr. Jonas Salk got to be a good personal friend, but when the shots came along
    Bill took the shots and so did Beverly, even though they had both had polio in 1948. She was a year old at that time.
    Bill was a student at TU. Of course he could not attend for about a year and a half because he was in the hospital and
    then he took therapy for quite a long time after that. But he had only one variety of polio. He almost had the two-kind
    variety. They parked an iron lung right outside his door in case he couldn’t breathe. But he didn’t really have a viable
    case of bulbar polio, which is the kind that makes it impossible to breathe. But he had paralytic polio and he was totally
    paralyzed except for his big toe, he could move one big toe, and that was absolutely all. That’s tough. And I love to
    talk to teens now because one of their big first questions is, “How did you get into television?” I tell them that because
    of my experience working with the March of Dimes on public speaking because my husband and daughter had polio. I get this
    blank funny look, like “Oh, what’s polio?” That makes me thrilled. I want that to happen with cancer. I want us to do
    away with that as does everybody else.
- speaker: Interviewer
  text: Is there any way that Bill wondered how he contracted polio?
- speaker: Respondent
  text: We know how he got it, now that they know how. You got it through your nose or mouth. This is the reason that so many
    of the children who had their tonsils removed in the summer came down with polio because polio entered either through
    your nasal passages or your mouth. If you had an injury, like getting a tooth pulled, or tonsils yanked out, or something.
    Bill was umpiring kids baseball. He was quite an umpire for many years even after the polio. He could still umpire behind
    the plate. He couldn’t run but he could bend down. But he had been drinking out of the “common cup” that everybody was.
    You know, we didn’t have bottled water then, so he was drinking out of the common cup, out of the common bucket that everybody
    else was and he had had some wisdom teeth taken out one day and he felt okay and he went on out to umpire. Apparently,
    that’s how he came down with it. I don’t know how Beverly got it except possibly from him, but her case was so light and
    she was just a year old. Her birthday is in July and they both had it in August. He went into the hospital on August 15th,
    1948. It was funny John−those were the days that your house was off limits to anybody. So, the Health Department put a
    sign on your house saying what was in the house.
