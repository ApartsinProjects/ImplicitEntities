collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Before we talk about your mother and father, let's talk about your great-grandfather, George Washington O'Neill. Tell
    us about him.
- speaker: Respondent
  text: Well, my name came from him. They came from southeastern Missouri to southeastern Oklahoma. It was a covered wagon
    trip. It took a couple of months, I think, and several people died on the covered wagon trip. He ended up in the very
    first legislature and helped write the Oklahoma Constitution. The family settled in Clarita, Oklahoma, and that's where
    my first kind of—my parents were. My father was from McAlester. My mother met my father when my aunt invited her to a
    state fair in McAlester, and that's where she was introduced to my father, who was manager of the Coca-Cola plant in McAlester.
- speaker: Interviewer
  text: All right, let's go to your mother. Your mother's name?
- speaker: Respondent
  text: Betty O'Neill.
- speaker: Interviewer
  text: And then she was born and grew up where?
- speaker: Respondent
  text: I'm not sure on—oh, I think she was probably born in Missouri. I'm not positive on that, John.
- speaker: Interviewer
  text: Okay, what was she like? Her personality?
- speaker: Respondent
  text: I was really proud of my mother. My father didn't let her get involved in the Coca-Cola plant. She took care of my
    brother and myself, and she worked on our house. We had a beautiful big yard, and she even laid the steps down to about
    three levels where we had a barbecue. It's where we had a lot of the Easter egg hunts when I was in grade school. She'd
    hide the golden egg, and we had a lot of fun at our house on Country Club Road. It was just real close to the country
    club in McAlester. When my father bought the house that we were in, it was about $100 a lot. We were the second house
    on Country Club Road. I think he could have bought every lot on the road for like $100. Easy to look back at what could've
    been done. But I was very proud of my mother. Again, I'm emphasizing that my father did not want my mother to be in the
    Coca-Cola plant. He wanted her to devote all of her time to my brother and myself. Later on, when my father got sick,
    she ran the Coca-Cola plant. It happened while I was at TU at the time. My father passed away, and I would go down after
    classes at TU to help my mother at the plant because I worked there from tricycle up. I did everything at the Coca-Cola
    plant—every duty. When we bottled Coke, we would switch jobs every few minutes from stacking cases, putting them on the
    truck, and inspecting bottles to make sure there wasn't any foreign matter in the Coke when they came out of the washer.
    So I went down to help my mother a lot, even after classes, because she really had not been involved at all and didn't
    know much about the Coke plant. But she did a fabulous job managing it. The Coca-Cola Company thought really highly of
    her. When my father passed away, they measured the success of a Coca-Cola plant by the 6.5-ounce bottles of Coke for every
    person in the county, including babies. When my father got sick, he was up to bottles of Coca-Cola per person per year.
    About four or five years later, Mother had increased the count up to—I don't have the exact number—but like bottles of
    Coke per year. The Coca-Cola Company was very happy. I think it was the most per capita of any of the Coca-Cola bottlers
    in Oklahoma. She did a good job. She got a call from Paul Austin, president of Coca-Cola, one day, and he said, "Betty,
    we want to send you to Washington, D.C., to talk to Carl Albert," because there was a bill stuck in committee for about
    six months. My mother said, "Mr. Austin, I really don't like to fly that much. I think I can do as much by calling Carl
    Albert. And if I can't, you can send the Coca-Cola jet to McAlester and fly me to Washington." That was on a Friday. The
    following Monday, she got a call from Paul Austin, and he said, "Betty, can't tell you how much the Coca-Cola Company
    appreciates what you did. The bill was killed this morning." It was a bill to tax every soft drink bottle cap sold. She
    got total credit. Mother said it just probably happened, but I think she was responsible for getting it killed.
- speaker: Interviewer
  text: But she didn't go to Washington?
- speaker: Respondent
  text: No, she just called Carl.
- speaker: Respondent
  text: And Carl was in London, in a meeting with the Queen. She talked to his secretary, who also was—both Carl Albert and
    his assistant were members of the McAlester Country Club. We saw Carl Albert down at the country club about every Sunday.
    She really got credit for that.
- speaker: Interviewer
  text: We need to name your father. Your father's name?
- speaker: Respondent
  text: My father was Lee Conner.
- speaker: Interviewer
  text: And then he grew up where?
- speaker: Respondent
  text: He was from Kentucky—Bardstown. He grew up in Bardstown. His home was right across the street from the Jim Beam home.
    I'm not sure how he ended up in Sherman, Oklahoma, working for the Coca-Cola plant there. Then he came from the Sherman
    plant to McAlester. The Coca-Cola plant in McAlester was started when it was Indian Country. My father did a good job
    until he got sick.
- speaker: Interviewer
  text: So did he own that?
- speaker: Respondent
  text: He had a partial interest. I don't know how much. At some point, my mother sold the interest in the Coca-Cola plant.
    I think it was probably around '82 or something like that.
- speaker: Interviewer
  text: Did you live on a farm?
- speaker: Respondent
  text: In the summers when I was 11, 12, and 13, I went to my uncle's ranch and farm in White Deer, Texas. Growing up, it's
    my favorite memories. I worked. My cousin would come in and wake me up at 6 o'clock, and I would walk around the house
    with my eyes closed as long as I could. His wife, Nancy, fixed a great breakfast, and I could even have steak. I drove
    a tractor—actually three different tractors—and a combine. We gathered hay. I just cherished the time spent in White Deer.
    We'd be in the fields plowing, and I'd come home with my face covered in dirt. But I loved it. We worked hours a day,
    but I really cherish that opportunity. My parents really taught me to work hard. I think a lot of kids today are missing
    out on that kind of upbringing, and that's why, in my opinion, a lot of kids just aren't getting that experience of having
    to work.
- speaker: Interviewer
  text: And then speaking about working at the distributorship—didn't you work pretty much at all different levels?
- speaker: Respondent
  text: I did, yeah.
- speaker: Interviewer
  text: From a child, 11 years old?
- speaker: Respondent
  text: I did. Again, kind of say maybe exaggerating a little bit, but not much. I started working in the Coke plant from
    tricycle up. I drove some of the trucks. I'd go to Tulsa to pick up a brand-new truck when they painted it and drive it
    back to McAlester. I was in sales—every part of the Coca-Cola business I was involved with. That's why I went back to
    McAlester to help my mother when she took over.
- speaker: Interviewer
  text: So when you were a child, how many Cokes did they allow you to drink?
- speaker: Respondent
  text: I could drink all I wanted to. I know some people say Cokes may be bad for you, but my mother lived to 92 and a half.
    She drank a lot of Cokes.
- speaker: Interviewer
  text: When did Diet Coke come about?
- speaker: Respondent
  text: Well, don't remember exactly. Seems like it might have been in high school when it came out. I had the first bottle
    of Sprite that we bottled when it came out. Then Fanta came out—I was there for several different product introductions.
- speaker: Interviewer
  text: Okay, your education—where did you go to grade school?
- speaker: Respondent
  text: Went to Washington Grade School in McAlester.
- speaker: Interviewer
  text: And then high school—junior high and high school?
- speaker: Respondent
  text: McAlester Junior High and McAlester High School.
- speaker: Interviewer
  text: And when did you graduate?
- speaker: Interviewer
  text: What do you remember about high school? Were you active?
- speaker: Respondent
  text: I was. I was in Key Club. I was president of the Key Club, which was part of the Kiwanis. I was on the golf team.
    I'd worked up to number one on the golf team for my senior year. And I hurt my back in the Coca-Cola plant. When I went
    down to help my mother, one day we were short of people, so I stacked 67-pound bottles of Coke. I took them off the conveyor
    and shifted, and ended up doing that for an hour—instead of the usual minutes. Then in the next day or two, I couldn't
    sit in class. So I went to McBride Bone and Joint, and they wanted to operate. I said, "I'm only gonna let you operate
    if you can get to play golf this year." And they said, "Oh yeah, you'll be able to do that." I haven't played golf since,
    John. I was in the band, and the band director—he knew I was playing golf on the golf team—he said, "George, you got to
    choose between the band and golf." And I said, "I'm choosing golf." So he got me out of the band.
- speaker: Interviewer
  text: So you graduate from high school in '59?
- speaker: Interviewer
  text: So then what do you do?
- speaker: Respondent
  text: My brother was very, very smart—much smarter than I was—and he was the first merit scholar in Oklahoma. He went to
    MIT the first year. General Electric offered to pay his tuition anywhere in the world he wanted to go, and he chose MIT.
    He was third in his class at MIT the first year, and then he decided to switch over to Harvard. He ended up graduating
    from Harvard. He was three years older than I was, and he told me, "George, the only school you should consider is the
    University of Tulsa." So that's why I ended up there. He said, "George, why don't you go to TU for the first year, and
    if you want to go to a bigger school and parties, you know, you can." Anyway, I fell in love with TU and Tulsa. So I ended
    up graduating there.
- speaker: Interviewer
  text: Okay. Your brother's name?
- speaker: Respondent
  text: Richard Conner.
- speaker: Interviewer
  text: Was he also adopted?
- speaker: Respondent
  text: He was from the same agency in Fort...
