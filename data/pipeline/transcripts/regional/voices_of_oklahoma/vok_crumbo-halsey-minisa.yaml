collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Minisa, would you state your full name please?
- speaker: Respondent
  text: My name is Minisa Crumbo Halsey.
- speaker: Interviewer
  text: Did you have a middle name, Minisa something Crumbo?
- speaker: Respondent
  text: I do, actually, it’s Yoland.
- speaker: Interviewer
  text: Were you named after somebody?
- speaker: Respondent
  text: No it’s a very interesting story behind that. Names are important. Names carry power, energy, connection. It’s a Lakota
    word meaning red water at sunset.
- speaker: Respondent
  text: Me-nee-sa, Me-nee-sa.
- speaker: Interviewer
  text: We say Mineesa, but if you really want to say it right it’s Mi-neesa.
- speaker: Respondent
  text: Um-hmm. The way the story goes is my father was a flute maker and a flute player. When he was traveling in the north
    country, nearest I can tell, it was around the Standing Rock Reservation. He went out one evening and he was playing his
    flute and one of the things that the flute functions as is a caller of beauty and a speaker of beauty. And a caller of
    love and a massive manifestation of that beauty. So I’m not sure if he really had that intention when he went out that
    night to play. But he called up, or I responded to his song, and I was born to him through my mother and he named me for
    that time.
- speaker: Interviewer
  text: Wow, that’s a great story. Okay, your date of birth please.
- speaker: Respondent
  text: September 2, 1942.
- speaker: Interviewer
  text: And that makes your present age?
- speaker: Respondent
  text: Well, is that seventy-two?
- speaker: Interviewer
  text: You’ve chosen to forget. So you’re seventy-two, right?
- speaker: Respondent
  text: I don’t know. Last year I went through a year thinking I was a year ahead. So, uh—
- speaker: Interviewer
  text: Apparently those things are not important to you.
- speaker: Interviewer
  text: That’s good.
- speaker: Respondent
  text: I lose track of time.
- speaker: Interviewer
  text: Where are we recording this interview?
- speaker: Respondent
  text: At the Jim Halsey office, 3225 South Norwood, Tulsa, Oklahoma.
- speaker: Interviewer
  text: Where were you born?
- speaker: Interviewer
  text: What hospital?
- speaker: Interviewer
  text: Did you have brothers or sisters?
- speaker: Respondent
  text: I have one brother—Woody Max. He’s younger, he was also born here in town.
- speaker: Respondent
  text: My mother made a trip to Mexico before my brother was born and before she met our father. And she was very, very much
    a fan of Mexican culture and Mexico. I believe, it’s my personal opinion, that Max came from the Emperor Maximilian, who
    had spent some time.
- speaker: Interviewer
  text: Your mother’s name and where she was born?
- speaker: Respondent
  text: Lillian Hoge, and she was in Pierce, Oklahoma.
- speaker: Interviewer
  text: And that’s where she grew up?
- speaker: Respondent
  text: Yes she did. It’s very near the original allotment. She grew up with two sisters and my grandmother and grandfather
    on a farm. Outside of Pierce.
- speaker: Interviewer
  text: What was her ancestry?
- speaker: Respondent
  text: Well, the Muskogee Creek blood comes through my grandmother, Harriet Hoge. Harriet Lavanche Hoge. My grandfather,
    William Brady Hoge, was Scots-Irish.
- speaker: Interviewer
  text: How do you remember your mother? And what kind of personality did she have?
- speaker: Respondent
  text: My mother was a teacher and she was my first teacher. Before I started to school with her in the first grade she brought
    me books home from every teacher’s meeting that she went to. She gave me a love of reading and a love of knowledge that
    stayed with me all of my life. And then she was my first teacher. She was very even-handed, she treated me just like any
    other student. And she was a wonderful teacher.
- speaker: Interviewer
  text: Was she artistic?
- speaker: Interviewer
  text: In what form?
- speaker: Respondent
  text: Well, she painted and drew flowers, she was a floral painter.
- speaker: Interviewer
  text: You saw her work as a child?
- speaker: Respondent
  text: No I did not. She did not begin painting and drawing until later years.
- speaker: Respondent
  text: Teaching took all of her time and energy.
- speaker: Interviewer
  text: She was a teacher of what grade?
- speaker: Interviewer
  text: And where was that?
- speaker: Respondent
  text: Taos Pueblo Day School in Taos, New Mexico.
- speaker: Interviewer
  text: Your father’s name?
- speaker: Respondent
  text: Woodrow Wilson Crumbo.
- speaker: Interviewer
  text: He was born when?
- speaker: Respondent
  text: He was born in 1912, in Lexington, Oklahoma.
- speaker: Interviewer
  text: So then it’s safe to say that he would have been named after Woodrow Wilson?
- speaker: Respondent
  text: President Woodrow Wilson. He was born on the original allotment that his mother, Mary Ann Herd, the Potawatomi, was
    allotted outside of Shawnee, Oklahoma, the agency.
- speaker: Interviewer
  text: It’s interesting, Woodrow Wilson was the 28th president, your father, Woody, was born in 1912, President Woodrow Wilson
    took office in 1913, but there was another set of parents, who named Woody Guthrie in 1912. He was born July 14th and
    he too was named after Woodrow Wilson and went by Woody. Here’s two families that had no idea they were doing the exact
    same thing.
- speaker: Interviewer
  text: When did your father die?
- speaker: Respondent
  text: April 4, 1989.
- speaker: Interviewer
  text: That would make him seventy-seven then—
- speaker: Interviewer
  text: At his death. And what is it that took him?
- speaker: Respondent
  text: Life. It was his time. Never sick a day in his life. Wasn’t anything happening to him, didn’t take, didn’t even take
    aspirin. He got up one morning to greet the sun and fell at the door.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: As he opened it up. Um-hmm.
- speaker: Respondent
  text: Good way to go.
- speaker: Interviewer
  text: Yeah, yeah it is. Let’s talk about your father then. What do you know about his early days? He was orphaned, wasn’t
    he? At an early age?
- speaker: Respondent
  text: He was the youngest child. The older siblings were fanned out. I’m not sure they really knew what was going on either.
    If you’re not there, there were no cell phones, maybe not even writing. You know, everyone hit the ground running trying
    to make a living. I don’t know what took my grandmother at an early age, I really don’t. It’s hard to say. You know, in
    the past it was often blood poisoning, they called it. A farm accident, a cut, would introduce an infection. I don’t ever
    hearing she suffered from any kind of ill health. The older children were already moving away or had moved away. So when
    the family went through that change our father went to stay with his older sister Phoebe Crag in Sand Springs, principally.
    And then he lived a lot as an orphan on the land, dependent largely on the goodwill of a lot of people, a lot of Creek
    families in Sapulpa before he was sent to Chilocco.
- speaker: Interviewer
  text: What tribe was he from?
- speaker: Respondent
  text: Potawatomi.
- speaker: Interviewer
  text: And so then what are you?
- speaker: Respondent
  text: Muskogee Creek from my mother and Potawatomi from my father. Scots-Irish and French. And German.
- speaker: Respondent
  text: Probably the larger bit German. Because my father was half actually, half German. His father was Alexander Crumbo
    and that name was originally spelled K-r-u-m-p-e, Krum-pol. I did not find that out until very late in life. We thought
    that he was French because they called him the little Frenchman. Because he immigrated from Amsterdam and took a couple
    of years there waiting for quotas to be filled. So he learned to speak French and probably Dutch. But when I was in Germany,
    in East Germany with Jim on a tour with the Oak Ridge Boys—they didn’t go to East Germany but we finished our trip there.
    I was talking to some people in the Ministry of Culture about my German blood and saying that I wish that I had been able
    to get around and research that a bit. And out of curiosity I said, “Is Crumbo a German name?” They didn’t know how we
    spelled it necessarily. And they said, “Oh yes.” I asked them, “How do you spell it?” “K-r-u-m-p-e, Krum-pol, which happened
    to be in West Germany. Halberstadt, Germany, is where they immigrated from. As stonemasons.
- speaker: Interviewer
  text: So how did it become Crumbo? C-r-u-m-b-o?
- speaker: Respondent
  text: Some immigration official in New Orleans—
- speaker: Respondent
  text: Didn’t pass through Ellis Island, they went through New Orleans.
- speaker: Interviewer
  text: And that’s what he thought he heard?
- speaker: Respondent
  text: That’s what he thought he heard, um-hmm.
- speaker: Interviewer
  text: That’s happened to a lot of families.
- speaker: Respondent
  text: Well, East Berlin thought they heard that, when they said Crumbo they heard Krumpe. So it was a reverse back, Crumbo,
    Krumpe.
- speaker: Interviewer
  text: You said your father, Woody, went to the school at Chilocco?
- speaker: Interviewer
  text: Was that an Indian school?
- speaker: Respondent
  text: Yes. It was, but it was a federal Indian school, which was an outgrowth, of course, of the Department of War. It was
    a function of assimilation and a genocidal function.
- speaker: Respondent
  text: In that when people are removed from their language and their community the culture begins to be affected. And that
    was not in a positive way. It was not intended to contribute to Indian community but to make a white man out of the Indian.
    And that is the definition of cultural genocide. A definition of it.
- speaker: Interviewer
  text: I guess at that point there weren’t any other schools for Indians to attend.
- speaker: Respondent
  text: There were a lot and they were all federal. Some were church, some were church, which was about the same thing, just
    a different language.
- speaker: Interviewer
  text: The thought back then, of course, was to, as you’ve already stated, make white men out of these people.
- speaker: Interviewer
  text: And they had no regard for their culture at all.
- speaker: Respondent
  text: They had regard, it was disregard.
- speaker: Interviewer
  text: So then he was there two, three, four years?
- speaker: Respondent
  text: I don’t think he was there that long. It was a rough experience.
- speaker: Interviewer
  text: Do you sense somewhere in here that he’s revealing his artistic side?
- speaker: Respondent
  text: Not yet. You want to hear about Chilocco?
- speaker: Respondent
  text: Well, we drove through there one time. My brother and I were sitting in the backseat and as we passed by different
    buildings he would say, “I broke rock for that building. I broke rock for that one. Broke rock for that one, broke rock
    for that one.” But you got to understand that my father was born as a child of mixed blood and he wasn’t a fluent first-language
    Potawatomi language speaker. So he did not speak Potawatomi a whole lot, but he had a lot of friends that did and there
    was commonly understood languages between the boys. And whenever they would talk Indian, as they said, it would be an
    infraction and they would be thrown on the rock pile for a while. And they broke rock. You go through Chilocco, those
    rocks that those buildings were made out of were broken and shaped by the Indian students that were there.
- speaker: Interviewer
  text: Where is Chilocco?
- speaker: Respondent
  text: It’s on the Kansas line. I’d have to get out a map to see exactly, you have to go there on purpose. It’s not too far
    off the road but it’s not on 35, it’s near there. Anyway, they didn’t receive enough food; they received government issue
    food that was very poor quality. Their breakfast cereals, for instance, had just about been consumed already by the weevils.
    And they would take a spoon first thing and they would skim off the weevils and eat what was left. And once in a while,
    he said, some of the guys would run out for a night, kill a cow and build a fire and eat all they could and then come
    back. They just didn’t get enough to eat. Corporal punishment was common. But they came through okay, and there’s a fine
    fellowship of people that came through Chilocco. It’s a hard story, it’s a hard segment of history that appears everywhere
    where you have shifting populations and shifting governments. Unfortunately, it’s a story of man’s inhumanity, a man with
    just particular names and dates and times tacked on to this and called Chilocco, Oklahoma Territory.
- speaker: Interviewer
  text: We don’t know how many years he was there?
- speaker: Respondent
  text: No we don’t.
- speaker: Interviewer
  text: How did you ever get out of there? Did you have to escape? Did you finally graduate? Or how did you leave that place?
- speaker: Respondent
  text: I don’t know.
- speaker: Respondent
  text: Maybe he just walked away one day.
- speaker: Interviewer
  text: Yeah. Did he feel that he received some formal education? Any education?
- speaker: Respondent
  text: I don’t think so, I don’t believe—he never said that he got anything out of that except—
- speaker: Interviewer
  text: Discipline.
- speaker: Respondent
  text: Discipline and a short haircut.
- speaker: Interviewer
  text: As I understand, he really received no schooling past the third grade, then not much at Chilocco but, I think, by
    the time he was nineteen he did get a scholarship from the American Indian Institute in Wichita, Kansas.
- speaker: Respondent
  text: Yes. Yes. I don’t know very much about that at all. I do know that it was an extension of the sketchy education that
    he had received up to that time. But he was ready and stepped off and received so much from it. It was then that we began
    to see some development of his artistic leanings.
- speaker: Interviewer
  text: But there was an art teacher in Anadarko, Susie Peters.
- speaker: Respondent
  text: Susie Peters was actually a dorm mother that took a lot of the boys under her wing and provided them with things like
    paper bags to draw on, paper and some materials.
- speaker: Interviewer
  text: Oh she was at the American Indian Institute in Wichita? That’s where she was a dorm mother.
- speaker: Respondent
  text: Um-hmm, um-hmm.
- speaker: Interviewer
  text: So she supplied him with the basics in the drawing and painting.
- speaker: Respondent
  text: Um-hmm, um-hmm.
- speaker: Interviewer
  text: So by sometime in Chilocco or whatever he was showing a bent for art. I’m betting he did.
- speaker: Respondent
  text: I’m betting that he did too.
- speaker: Interviewer
  text: He drew on the ground or he painted rocks or he did something. He had to ‘cause when they’re born with this it seems
    it just has to come out of them.
- speaker: Interviewer
  text: Then he graduated from there and, as I understand, he graduated valedictorian of his class in 1933. And then he goes
    on to attend Wichita University, taking classes in mural painting and that type of thing. And watercolor painting. While
    he didn’t early on have an education he was obviously very bright, very smart to enter and then to graduate like he did.
- speaker: Respondent
  text: Right, he was ready.
- speaker: Interviewer
  text: He also was a dancer.
- speaker: Respondent
  text: Probably what you’re referring to in large part was when he formed a group of men and women to do a WPA tour and they
    took the dance on to different sites.
- speaker: Interviewer
  text: Work progress.
- speaker: Interviewer
  text: Projects that Franklin Roosevelt had set up across the United States.
- speaker: Interviewer
  text: And so he’d go dance for the WPA and take workers.
- speaker: Respondent
  text: Correct. And take the group around. There was music, singing, the flute, drum, lots of different Pen Indian, you might
    say. Costumes, regalia of all kinds.
- speaker: Interviewer
  text: You just marvel at how much talent he had. He wins a national dance contest in 1935, later turns
