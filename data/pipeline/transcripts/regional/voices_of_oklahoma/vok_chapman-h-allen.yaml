collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Tell me first about yourself. When were you born?
- speaker: Respondent
  text: November 1, 1940.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in a house, not a hospital in Hanson, Oklahoma, which is a small rural community just outside of Sallisaw.
- speaker: Interviewer
  text: Did you grow up there in that community?
- speaker: Respondent
  text: I did not. I moved away at an early age, but still have many family members there. My father was in WWII. After the
    war we moved to northern California to a town by the name of Marysville, then to Wichita, Kansas, then to the Tulsa area.
    My father was an educator and came here as a principal for Catoosa Schools.
- speaker: Interviewer
  text: Do you have brothers and sisters?
- speaker: Respondent
  text: I’m an only child.
- speaker: Interviewer
  text: Where did you go to elementary school?
- speaker: Respondent
  text: I started in California through the second grade and then moved to Wichita and finished fifth grade there and then
    moved to the Tulsa area and from fifth grade on I went to Catoosa schools. I graduated from Catoosa High School and then
    I went on up to NEO A&M Junior College in Miami, Oklahoma. I had two years there and then went to the University of Colorado.
    I did some graduate studies at the University of Tulsa.
- speaker: Interviewer
  text: What was your degree in?
- speaker: Respondent
  text: I have a degree in education. Because my parents were both in education, I thought that’s what I would probably do
    and I liked it. In fact, I did practice teaching and I really liked that. But I had worked a summer for the Chapman Oil
    Company, Chapman Exploration as a part-time job while I was in school. They offered me a position to come back after graduation
    and put me through a training program. As I recall, the salary was $50/month more than I was offered in Boulder, Colorado
    where I really wanted to stay–I loved it up there. My father encouraged me to come back and try this Chapman organization.
    You know he said, “If you don’t like it, you can always go back to the mountains.”
- speaker: Interviewer
  text: How did you even get the internship?
- speaker: Respondent
  text: I got it through football. When I left NEO and was at Colorado University, I wanted a summer job in Tulsa. The gentleman
    that ran the Chapman business at that time, his name was George Carlson. George had been a football player and a boxer
    at the University of Colorado and he was still very involved in the athletic program. He was also a Rhodes Scholar and
    came back and taught at the law school before he came to Tulsa. The coach contacted Mr. Carlson and that’s how I got in
    with the Chapmans.
- speaker: Interviewer
  text: He just asked you if you wanted a job?
- speaker: Respondent
  text: That’s right.
- speaker: Interviewer
  text: Sports paid off for you in a big way, didn’t they?
- speaker: Respondent
  text: They paid off in a very big way. In fact, when I was recruited to Colorado Mr. Carlson was contacted by the Colorado
    coaching staff. Even before I got this job. I remember he took me to Sunday Brunch at Southern Hills one time and I had
    never heard of that place but I was very impressed with it. But he was trying to help get me to go to Colorado.
- speaker: Interviewer
  text: So then that is your first association with the Chapmans?
- speaker: Respondent
  text: That summer, when I was working for the Chapman organization. I was just a gopher. They had just finished a lodge
    in northern Colorado and needed some boats and vehicles and household furnishings and the like up there. One of my jobs
    was to drive a Jeep up there and pull a boat and load it with stuff and take it to that lodge. When I would get up there,
    I would usually stay an extra day. I made two or three trips that summer from Tulsa, which wasn’t a very pleasant job
    but I got to meet the Chapmans, H. A. and Mark Chapman. He loved to trout fish. While I was there he would ask me to accompany
    him on these trout fishing expeditions into the mountains. I really enjoyed that. I had always fished with my father.
    He and I became friends. I would take care of all the details, you know, making sure all of the equipment was there and
    periodically we would spend a night in the mountains and pitch a tent. That was my job to take care of all of that, but
    it was fun for me. I was 20 years old at the time, so I loved every minute of it and I was getting paid for it.
- speaker: Interviewer
  text: There had to also be something about your personality and his that worked–that matched.
- speaker: Respondent
  text: They did. We were very different people. I would say we had opposite personalities. He was very introverted and I
    am more extroverted. He didn’t talk much and I love to talk and have fun.
- speaker: Interviewer
  text: Sometimes people who are introverted don’t like to be around people who talk a lot, but he apparently enjoyed that.
- speaker: Respondent
  text: Well, something about me he seemed to enjoy.
- speaker: Respondent
  text: Because we became over the years very close friends and I consider myself one of his confidantes because we talked
    about things that never got outside of the room.
- speaker: Interviewer
  text: You are talking about Harry Allen Chapman.
- speaker: Interviewer
  text: And I want to get back to him.
- speaker: Interviewer
  text: But let’s jump back to his father.
- speaker: Respondent
  text: James A. Chapman.
- speaker: Interviewer
  text: Right. What kind of a person was James Chapman?
- speaker: Respondent
  text: Well, I didn’t know him well, but I did meet him on a few occasions. He was very quiet and very much a gentleman.
    He always had a suit except when he went to his ranch and usually a vest. He was very inconspicuous. If you were to see
    Jim Chapman walking down the street, or his son, you would never know that they were of vast wealth. The way that I met
    him the first time was in the first year that I was working for his son. His confidante and attorney was a front man named
    John Rogers. John Rogers was an attorney. In fact, I think he was instrumental in starting the University of Tulsa law
    school. He was the first Dean. But I get a call one afternoon as I’m in my office for H.A. Chapman from Mr. Rogers. Mr.
    Rogers also was a quiet man and very gentlemanly. He asked if I had time the next afternoon at 2:30pm, if I could come
    over to the James Chapman offices because Mr. Chapman wanted to visit with me. I told him that I would be happy to do
    that. So I hung up and immediately called my employer, James Chapman’s son, H.A. Chapman. I told him that I talked to
    Mr. Rogers whom he knew well and that Mr. Rogers wanted me to come over tomorrow at 2:30pm and see his father. I said,
    “Mr. Chapman, your dad and I have never met. He knows nothing about me. I can’t imagine what he wants to visit with me
    about because I have nothing to do with his business and you and he do not have any joint ventures.” Mr. Chapman smiled
    and he said, “Donne, if dad wants to see you tomorrow, he probably knows more about you than your mother knows.” (Laughter)
    Well, that frightened me just a little because, you know, I got to thinking about what have I done now? (Laughter) But,
    I went over to Mr. Chapman’s office and he came from behind his desk and we sat out in two chairs in front of the desk
    and we just visited in general. When I left I was very comfortable and I could see that he was just wondering where I
    came from, what my father and mother did, where they were educated, if I had brothers and sisters, just general information
    about me. He was interested in knowing who was going to be working with his son.
- speaker: Interviewer
  text: Was that as you were getting connected with H.A. Chapman?
- speaker: Respondent
  text: I had been there six or eight months.
- speaker: Interviewer
  text: He just wanted to know.
- speaker: Respondent
  text: He just wanted to know. But it was a very casual friendly, low-key meeting.
- speaker: Interviewer
  text: You were given his blessing.
- speaker: Respondent
  text: Apparently.
- speaker: Interviewer
  text: If he didn’t care for you, he might have told his son, “This is not the guy.”
- speaker: Respondent
  text: Yes, that’s correct.
- speaker: Interviewer
  text: So unbeknownst to you, you were passing a bigger test than you knew.
- speaker: Respondent
  text: That’s right. Basically that was because of my age.
- speaker: Interviewer
  text: How old would you have been?
- speaker: Respondent
  text: I would have been 22 or so. I was just out of college.
- speaker: Interviewer
  text: That was one meeting with Mr. Chapman. Did you meet him again?
- speaker: Respondent
  text: Yes. I was over at their office visiting with Mr. Rogers and would see him and just give him a cordial “Hello” and
    he would say, “How are you Donne?” and they were very at ease, simple meetings but they weren’t scheduled.
- speaker: Interviewer
  text: To H. Allen Chapman, the man that you worked for, the son of James Chapman, how is he named? His name is Happy Allen
    Chapman, but he went by H. Allen Chapman or H.A. Chapman?
- speaker: Respondent
  text: His close friends called him Allen. If we had a call at the office and someone was wanting to make an appointment
    with Harry Allen, we knew they didn’t know him. He took very few appointments.
- speaker: Interviewer
  text: He was born in 1919 in Colorado and he died in 1979.
- speaker: Respondent
  text: That’s correct.
- speaker: Interviewer
  text: He would have then been 60 years old.
- speaker: Respondent
  text: He was 59 when he died.
- speaker: Interviewer
  text: That’s an early age to die. What were the circumstances of his death?
- speaker: Respondent
  text: He had a circulatory problem and he had heart problems. His body just wore out. He lived a full life and his body
    wore out early.
- speaker: Interviewer
  text: So he had something to do with his own demise?
- speaker: Respondent
  text: I think so.
- speaker: Interviewer
  text: And you had to keep up with this man?
- speaker: Respondent
  text: Yes, I did. But at the time I went to work for him he was probably in his early 40s. He had slowed down a lot. His
    lifestyle was really rather simple at that time. He loved yachting. He had a yacht and he loved that. He spent a lot of
    time on that boat. He loved going to Europe. The last few years of his life he was based out of Monte Carlo in the summer.
    That made my life somewhat simple because I am back and forth a lot. He loved automobile racing as a young man. He would
    fly to different places in the world racing sports cars. He had a car in the 500 and he hit that circuit. It was called
    the Chapman Special. He really enjoyed that and I went to the race with him numerous times.
- speaker: Interviewer
  text: He lived most of his life here in Tulsa though, didn’t he?
- speaker: Interviewer
  text: Do you recall the schools that he went to?
- speaker: Respondent
  text: I don’t know where he attended elementary. I know he went to Cascia Hall. I don’t think he went to college.
- speaker: Interviewer
  text: He was a businessman?
- speaker: Interviewer
  text: He started the Chapman Exploration Company?
- speaker: Interviewer
  text: Which was an independent oil and gas company?
- speaker: Respondent
  text: That’s correct.
- speaker: Interviewer
  text: Talk to us about that. He had already started that by the time you came along.
- speaker: Respondent
  text: No, when I went to work for him the business was all in his name, just H.A. Chapman. We incorporated into Chapman
    Exploration from a liability standpoint because there are a lot of liabilities in oil and gas operations. This would have
    been in the mid to late 1960s. That company continued until we sold out in 1989. He passed away in 1979, but Mrs. Chapman
    wanted to continue the oil business and we kept Chapman Exploration as the operating entity.
- speaker: Interviewer
  text: Let’s come back to you again. Your job at first was as a gopher.
- speaker: Respondent
  text: That’s right.
- speaker: Interviewer
  text: And your degree was in education.
- speaker: Interviewer
  text: How do you get into the dollars and the dollar signs of this business? How does that happen?
- speaker: Respondent
  text: That was very difficult for me. I had never been around great wealth. Actually my first job with them they sent me
    to Great Bend, Kansas where we had three drilling rigs and an engineering and geological office for our production in
    Kansas. I left Colorado and came to Tulsa on August 1st and went to work full-time in 1963. The first place they sent
    me the following week was Great Bend, Kansas. I’m from Boulder and I had been up there a few years and it was nice and
    cool and beautiful. Great Bend, Kansas was flat and hot and windy and dirty. (Laughter) I really didn’t like my job very
    well.
- speaker: Interviewer
  text: What was your job then?
- speaker: Respondent
  text: Well, I was out on the rigs. I was working with the roustabouts on the production that we had. I was just trying to
    learn the business from the ground roots up.
- speaker: Interviewer
  text: So you knew there was a greater mission involved other than just pushing tools around at the moment, which seemed
    not very interesting. Is that true? Or could you see beyond what you were doing at that moment?
- speaker: Respondent
  text: At that point I couldn’t see beyond what I was doing. I was wondering what am I going to be doing five years from
    now? But after several months in the field, I was sent back to Tulsa and put in the accounting department. I may have
    disliked working in the accounting department more than I disliked working in the field because I just didn’t like sitting
    behind a desk and looking at figures all day long. But Mr. Chapman wanted me to be exposed to all aspects of the business.
- speaker: Interviewer
  text: Did he tell you that when you went to Kansas? That he wanted you to get involved in everything?
- speaker: Interviewer
  text: It was then when you were brought in to Tulsa and disliked your work in accounting that he probably said to you that
    he wanted you to be more exposed to the business?
- speaker: Respondent
  text: He did at that time.
- speaker: Interviewer
  text: So then you said, a-ha, now I am getting the picture?
- speaker: Respondent
  text: No, I really didn’t get it at that time. There were a lot of people involved in our business. I was one of the youngest
    ones and there were a lot of people ahead of me. But there were very few people that knew him like I did. I mean I had
    personal contact with him.
- speaker: Interviewer
  text: Because you had been fishing and hunting and all of those kind of things you had been building since you were 22 or
    23 years old.
- speaker: Respondent
  text: But I didn’t know that I was building.
- speaker: Respondent
  text: It just happened.
- speaker: Interviewer
  text: So he felt a special affinity to you when you came into the office. I like this guy and I want him around.
- speaker: Respondent
  text: Well, he spent time with me. He would come into my office. He would call me and ask me to come to his home and we
    would discuss certain things. He didn’t come to the office on a regular basis. You would go to him. I remember he told
    me one time when he was off in Europe and he wanted me to come over. He said, “I pay people to come to me so I don’t have
    to go to the office.” Well, when you are in your 20s, that’s great.
- speaker: Interviewer
  text: So you work in accounting, by that time, you knew you had caught the eye of H.A. Chapman. So no matter how difficult
    that was for you to sit behind that desk, you knew you had to stay there. Is that true?
