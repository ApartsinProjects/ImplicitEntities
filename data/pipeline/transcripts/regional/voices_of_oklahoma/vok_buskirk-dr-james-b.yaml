collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: What’s that, Chiwapa Bottom?
- speaker: Respondent
  text: C-h-i-w-a-p-a, that was a low area. My grandfather came down from Indiana. He bought land very cheaply back then,
    and cut the big timber off of it, and trimmed the limbs off of it, put it on a flatcar and shipped it back to Indiana
    to Taylor Pearson’s lumber company. And his brother-in-law got the lumber in Indiana. He stayed in Mississippi because
    he came to own so much land on Chiwapa Bottom. I was born, actually, on my grandfather’s place near Tupelo, Mississippi,
    closer to Shannon, Mississippi.
- speaker: Interviewer
  text: What was his name, your grandfather’s name?
- speaker: Respondent
  text: My grandfather’s name was Emerson Buskirk.
- speaker: Interviewer
  text: And then your grandmother’s name?
- speaker: Respondent
  text: Lydia Leatherman.
- speaker: Interviewer
  text: Your mother’s name, maiden name, and where she grew up.
- speaker: Respondent
  text: My mother’s name was Hermian Buskirk. She was Hermian Pope, the granddaughter of a country doctor. Her mother was
    a tomboy and liked to drive her father during emergency cases in the night, through the night, with three lanterns on
    the buggy so everybody knew they were coming. So, obviously, my grandmother wanted to call me to be a doctor, but I didn’t
    respond to that very well. She was a Crump. Dr. Crump was in Smithville, Mississippi. The Buskirks was a very big family.
    There were five boys and five girls. My dad was the middle of the five sons. They farmed and Daddy was born in 1903. Back
    then the guys quit school in the ninth grade in order to work on the farm. They were the labor force. And that complicated
    things later when my dad went in the ministry. He was called at eighteen years of age, standing over his mother’s grave.
    He delayed that. He believed in that Scripture said that Jesus gave apostles, prophets, evangelists, pastors, teachers
    for the equipping of the saints, the laity, for their ministry. He tried to do his ministry as a lay person. He was Superintendent
    of the Sunday school of the United Methodist Church. He taught a Sunday school class, he was on the board, he was a steward
    and had charge of six families to take care of them. He was Chair of the Board at one time. And then one day, he was standing
    looking at his field and a wonderful crop. It was a Saturday afternoon and my daddy could never be convinced that God
    didn’t speak to him audibly. Because Daddy thanked him for the crop. He said, “But why waste time?” “Waste time? Look
    at that crop, God,” he said. He said, “But you’re wasting time because there are men and women, boys and girls that need
    to hear about Jesus. And I want you to be that voice.” That bothered my dad so much he just stopped going to church. He
    didn’t go to church for three years. My mom said she thought he was losing his mind. But, fortunately, she stayed with
    him and one afternoon, Sunday afternoon, about six o’clock, the sun was going down, Grover Meadows, a man that Daddy played
    baseball with who now was a minister, drove up in our yard, and said, “Bob, I want you and the family to go to church
    with me.” And Daddy said, “I’m not going.” He said, “Well, I came over here to start the revival at Pleasant Grove and
    your pastor, Brother Sudam, has gone over to preach in my church tonight. And on the way over here I got you on my mind.
    I’d learned about you just stop going to church and I think I know what’s wrong with you. That happened to me once. My
    sermon tonight was given to me by God on the way over here. And it’s for you. No point in my going to church if you don’t
    go to church.” Well, Daddy argued with him until church time, and then we got in his car with him and went to church.
    Daddy parked his car and we walked in the church. I went in with Mother and Eunice and Dorothy, my younger and older sisters,
    and we went out with Brother Meadows right near the front. And Daddy sat on the back pew. And Brother Meadows preached
    that night on the call to preach. When the sermon ended and he gave the invitation, my dad came down the center aisle,
    crying aloud. I’d never heard my daddy cry. That was a very moving, almost frightening experience for me. He talked to
    Brother Meadows, and Brother Meadows said, “No, Bob, you tell them.” Daddy turned and said, “I’m called to preach.” And
    Mother said, “Aaah!” And I was standing by her and started crying. I thought that was something terrible. Incidentally,
    Mother did too. She had finished high school but knew that Dad had not. And Brother Meadows said, “Hermian, what do you
    think about that?” And she said, “Well, if God’s really called Bob, I’ll go with him and I’ll do the best that I can.”
    Dad went to see the Bishop and the Bishop said, “You can’t be a Methodist minister, you don’t have an education.” Daddy
    said, “Couldn’t I go to school in the town where I preach?” He said, “Well, that’d be weird.” He said, “No, I don’t think
    so.” So he came back home and called Brother Meadows and said, “The Bishop said I couldn’t preach.” Brother Meadows said,
    “You can preach in my church. I got a revival starting this week. You come on over.” Well, the news got out that Bob Buskirk
    was preaching. Daddy played baseball with the guys all through that county and the adjacent one. And the men poured out
    and filled the church. And over fifty men made commitments that week. Brother Meadows called the Bishop and told him about
    it. And about six months later he called Dad and said, “I have a minister who is hauling pulpwood to supplement his salary
    and a tree fell across his body and crushed his pelvis. I need you to fill in for the next nine months and then I’ll replace
    you when Annual Conference appointment time comes around.” We moved to Randolph, Mississippi, I was in the first grade
    then. Daddy preached for that nine months. The people went in arms to the county seat to tell the Bishop they’d better
    not move their preacher. We stayed there for two years and then moved to a place called Algoma. And I was in the third
    grade there. I was very impressed with our poverty. I remember that when I was in the fifth grade our custodian died at
    our little elementary school. And I went to the superintendent and asked him if I could be the custodian. There were just
    seven rooms and on Saturday I cleaned the Assembly Room. He called Mom and said, “Brad wants to be the custodian. You
    think he could do that?” Mom said, “Well, if he can’t, I’ll help him.” So I swept floors in the afternoon after school
    and built fires in old potbelly, iron stoves and poured a little kerosene in on the kindling and the coal that I’d put
    in there, so that it’d be ready to go the next morning. Washed the blackboards. That was my first job.
- speaker: Interviewer
  text: Hmm. Let me just pause for names here because you referred to Brad and you should point out that that’s the way you
    were known, as Brad.
- speaker: Interviewer
  text: When did you become Jim or James?
- speaker: Respondent
  text: I’m referring to myself as Brad because my middle name is Bradford. I was named after my mother’s father, so I grew
    up Brad. And then when I went to college, we had a very astute English literature teacher and she insisted on using our
    full names, James Bradford Buskirk. And she used to call me James, and I liked that. I would object and the students picked
    up on that and started calling me, “James,” and then, “Jimmy.” And when I met Nancy, my wife, I was being called Jimmy,
    so Jimmy stuck.
- speaker: Interviewer
  text: Um-hmm. How old were you when your father went down the aisle there and felt that he was called?
- speaker: Respondent
  text: I was between three and four years old. I was talking about that one time and my mom and dad said, “You can’t remember
    that.” And I said, “Yes, because you preached there at your church the next Sunday night and your sermon was on man’s
    duty to God.” They turned pale and said, “Well, I guess you do remember it.” This was a very dramatic time in our lives.
- speaker: Interviewer
  text: Um-hmm. So establish again, your father’s name was?
- speaker: Respondent
  text: Bob Buskirk.
- speaker: Interviewer
  text: And then your mother’s name?
- speaker: Respondent
  text: Was Hermian Pope.
- speaker: Interviewer
  text: Tell us about your mother’s personality.
- speaker: Respondent
  text: Mother was quiet, very humble, preciously sweet person. She said, “I’d rather have my feelings hurt than to hurt anybody’s
    feelings.” She was a real good partner for Dad because Dad was outspoken, he was aggressive, but the balance together
    made a good parsonage family.
- speaker: Interviewer
  text: Traits that you think you took from either one of them or both of them?
- speaker: Respondent
  text: I think I have some of Mother’s traits in my thought processes and in my private life. I have more of Dad’s characteristics.
    I denied that until I was in my doctoral program and in a clinical pastoral education course. I was forced to share my
    story. And the guy kept pushing me about Dad and I kind of lost it, and then apologized. He said, “Don’t apologize. If
    you’ve got an anger and some push, boy, you can be a preacher.”
- speaker: Interviewer
  text: Now let me point out here that sitting at our table is your wife. Her name is Nancy. Nancy, your full name?
- speaker: Respondent
  text: Nancy Merritt from Calhoun City, Mississippi.
- speaker: Interviewer
  text: And you’ve lived here in Oklahoma, how long now?
- speaker: Respondent
  text: Forty years.
- speaker: Interviewer
  text: And you haven’t lost your southern accent, have you?
- speaker: Respondent
  text: Yes, and I’ve tried for that.
- speaker: Interviewer
  text: Well, don’t, it’s great.
- speaker: Interviewer
  text: It’s great. In elementary school, junior high school, high school—
- speaker: Interviewer
  text: When did you realize that you enjoyed public speaking?
- speaker: Respondent
  text: I joined the Scouts when I was thirteen years of age. I was a little boy back then and some of us guys, I’m almost
    ashamed to tell you, we’d put our bicycles on the edge of the street and pour ketchup around them and lie down on the
    edge of the curb. Cars would come along and squeal the tires and the women would scream. They’d jump out of the car. And
    the assistant Scout master drove by, circled the block and came back. I was the dummy who was lying on the side. So when
    the others ran toward the schoolhouse that was surrounded with trees that gave us cover, he got pretty close to me, jumped
    out of his car, he was just out of the Air Force and he outran me. He said, “Buskirk, you might as well stop and talk
    to me. I know you. I know your preacher daddy and I think I’m going to have to tell him about what you were doing tonight
    unless you decide to be a Scout.” I said, “I’ve wanted to a Scout all my life.” So I became a Scout. And Jimmy Ellis didn’t
    like the mother-side of me. When I was timid he would encourage me. I spoke rapidly and once he told me, “We’re going
    to wait until you get through, just slow down, Brad.” And I did. The troop grew to over 105 people, others just in the
    process of joining, so they divided it. For some reason, they divided right on down the middle, the younger part and the
    older part. They asked Jimmy Ellis, my assistant Scout master, if he’d be the Scout master for the younger part. He came
    to me and said, “Brad, I told them I’d do it if you’ll be the senior patrol leader, the leader of the Scout troop.” I
    said, “I can’t do that. I kind of stutter and I’m timid.” He said, “Yes you can.” I decided I would. I did things then
    that I would later do in ministry. I had to plan the meetings. I had to speak without being embarrassed. I had to supervise
    the patrol leaders, who each had a fourth of the troop under them. I would go to civic clubs and speak and tell Scout
    stories and say, “Wouldn’t you like to contribute to something that’s doing that for boys?” So I learned how to speak
    and raise money. Everything I’ve ever done in ministry, I did initially in Scouting. And that amazes me now as I look
    back.
- speaker: Interviewer
  text: Yeah. Were you a timid child?
- speaker: Respondent
  text: I was timid until I was probably eleven or twelve.
- speaker: Respondent
  text: Then that started passing. And we moved a lot. It didn’t serve me well with the boys and the bullies in the classes.
    I took care of a few of them. And Daddy got me out of one of those scraps. The principal caught us before Daddy got away
    and he took us in and said, “I never had a father and his son fighting on campus. I don’t know what I’m going to do with
    you.” Well, three other boys, who really started the fight, they’d done something they shouldn’t have done to try to embarrass
    me. I explained what they had done and he paddled them. Back then they did that. Then he looked at me and said, “I don’t
    know what I’m going to do with a father and his son fighting on campus. When he asked me, “What are we going to do with
    a father and son fighting on campus?” I looked at Daddy and said, “He’s not big enough to whip us, is he?” I had an unusual
    childhood.
- speaker: Respondent
  text: You’d never suspect I was going to be a preacher.
- speaker: Interviewer
  text: December 7, 1941, the bombing of Pearl Harbor, that was on a Sunday.
- speaker: Respondent
  text: December 7, 1941, born in ’33, I was eight or nine years old.
- speaker: Interviewer
  text: How did you hear about it?
- speaker: Respondent
  text: I was converted as a child, nine years of age, and one of Daddy’s churches, it was Palestine [pronounced Palasteen]
    not Palestine. I loved to go to that church and I’d gone with my daddy to church that day. And we went to the Todd’s house.
