collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Respondent
  text: My grandfather, my dad's father, came to the United States in the late 1890s, and worked his way to Oklahoma, as a
    peddler, and might have been a good model for Ado Annie's boyfriend in the musical Oklahoma! He worked a year or so to
    save enough money to pay for the passage of his family to this country. Then when they came here, they had three children
    in this country, and my father was one of those.
- speaker: Respondent
  text: Department stores and found locations in these boom towns. Moved in to stock the goods and when the boom began to
    let up he moved on to another town. And Dad just went with him as a teenager and traveled around as his helper.
- speaker: Respondent
  text: I had a sister, she was born four years after I was. By then my dad had another grocery store, Modern Grocery on Main
    Street in Maud. Maud was still a sizeable town then, although the boom had started to taper off. And then he finally wound
    up with a large store there called Adwan's General Merchandise, and he had a grocery store, a department store, and a
    Frigidaire appliance franchise there. So he moved to Seminole later.
- speaker: Respondent
  text: My grandfather had a farm on the edge of town, spent a lot of time with him.
- speaker: Respondent
  text: Bills. When they couldn't, some of them came back and some of them actually years later looked him up to pay off a
    bill that they had run up there and just weren't able to pay.
- speaker: Respondent
  text: Also, in the oil fields a lot of oil operators operated what they call a "poor boy method." They didn't pay their
    help on time all the time, but they would go buy groceries. One time remembered a head of what became a very large and
    important drilling company coming in and paying the bill of half a dozen of his employees in there. He hadn't been able
    to pay them earlier.
- speaker: Respondent
  text: Interested, believe it or not, in politics and the important things in civics, in other words.
- speaker: Respondent
  text: So my dad was concerned about a fourteen-year-old boy who was going to be maybe drafted into the army, and he's wanting
    me to have a commission and be an officer at least if I was going to go in the army. I think that was part of his thinking.
    And then he wanted me to just see a little bit more of the world, I guess, then I was seeing there in Maud.
- speaker: Respondent
  text: Did like it. I did pretty well there and I was editor of the school newspaper, the Guidon. And one year was editor
    of the Vedette, the yearbook. Got a kind of start in journalism there.
- speaker: Respondent
  text: And then, in 1941, after Pearl Harbor, Mrs. Harris had everybody in the auditorium to hear President Roosevelt make
    the Day of Infamy speech. I remember that very vividly at the age of eleven.
- speaker: Respondent
  text: I remember when they invaded Poland, one of these old veterans said, "Well, they don't know what they're in for these
    Germans." He said, "When they run into that Polish cavalry this will all be over." That was a World War I idea.
- speaker: Respondent
  text: Anyway, yes I do remember talking to people about that and especially to some of these veterans of World War I.
- speaker: Respondent
  text: Problem would be to have a cavalry charge with our horses. We had about ninety of them, enough for a company, and
    we'd line up one company and they would charge across the landscape there. Very unrealistic, but someone made the point
    it worked because a lot of these fellows went from OMA into the army and a lot of them, by the way, were lost, but a lot
    of them did very well in the army.
- speaker: Respondent
  text: Right out of OU. I had gotten a job at the Seminole Producer, my hometown paper. I'd been working there as a student
    at OU and I knew the people there. In fact, one summer, it may have been the summer of '49, I don't know, I was at the
    ballgame. They had the Center State League in those days and I was at the ballpark. And the publisher of the Producer,
    Milt Philips called me over and said, "I see you around the office a lot and you're working with us. If you'll come by
    my desk tomorrow I'll put you on the payroll. You might as well work with us this summer."
- speaker: Respondent
  text: And so, I worked summers there and weekends as a student. And then when I got out of school I went to work immediately.
- speaker: Respondent
  text: We left New Orleans and went through the Panama Canal. We stopped briefly on the West Coast at San Francisco and then
    on to the west side of Japan, in Okido, that's a northernmost island, and trained there.
- speaker: Respondent
  text: One day, by this time it was 1951, General Ridgeway came down from Tokyo to inspect the 45th. He inspected it, we
    turned out on the airport runway there to greet him, quite a big deal. I remember it because the great man came to my
    platoon on this inspection and stopped and talked to one of my tank commanders, Sergeant Anderson, and he asked him, "How
    many tanks do you have in service in this company? And how many are on deadline and out of operation?"
- speaker: Respondent
  text: Anderson says, "Well, I don't know exactly, sir, but we keep as many as we can in service because we can't get parts.
    But if we have one that we need a part we take it from one of the other tanks that's out of service and keep as many as
    we can in service."
- speaker: Respondent
  text: Well, it happens that that's called cannibalism and it's a great sin in the army.
- speaker: Respondent
  text: Everybody does it, taking parts from one vehicle and putting it in another. So Ridgeway was very upset with this and
    chewed everybody out.
- speaker: Respondent
  text: We got there on New Year's Eve, 1951, and went into Inchon Harbor. Our first view of that was a little island called
    Wamido, which looked like a bald head with a few hairs sticking up on the back side. It had been covered with trees but
    they were completely taken off of there by artillery from the seaward side. And then a few stumps sticking up at the back.
    That was the first thing they took at Inchon. So this was our first look at it.
- speaker: Respondent
  text: We went into a line there near Cheorwon, which is remembered as the old town that was shot to pieces and the Americans
    lost it in the first stages of the war and General Dean, division commander, was captured there.
- speaker: Respondent
  text: Then my platoon rotated with other platoons in various places along the line and we went up along the Inchon River.
    South Korean troops were defending this and we supported them. These tanks were dug in and we had bunkers behind them
    to live in. It was more like World War I than anything anybody had seen in World War II. The line had been stable for
    a long time. Bunkers were built of logs and sandbags and dug in, the enemy the same.
- speaker: Respondent
  text: We sat there and looked at one another most of the time and if we saw something to shoot at we'd shoot at it, if we
    didn't, sometimes we'd just try to break up a bunker. The enemy had artillery, he had tanks, but he never brought them
    out in the daylight. We had air superiority. But he had deadly mortars, they could operate those in daylight because they
    could conceal them. And that was probably the worst thing. That and mines bothered us.
- speaker: Respondent
  text: Task Force Hobart was our first offensive operation where we went out of our own lines and into enemy territory. That
    was just a big reconnaissance in force, I never did know what the purpose of it was unless it was just to capture prisoners.
    Always a demand for prisoners. The Intelligence people wanted to be able to keep up with who is in front of us there and
    identify units. Order of battle, they call it. That was called Task Force Hobart, named for the hometown of Company C,
    which was headquartered in Hobart before it was mobilized.
- speaker: Respondent
  text: And that was my company. That was the first time we ever got out of our main line there and went forward into enemy
    territory. We didn't suffer any casualties in that, it was considered a success, and I wrote a piece about it for the
    45th Division News. And almost got court-martialed because since they asked me to write it I thought it was all right
    and that it was approved. But I found out afterward that I should have checked with my own commanding officer and my own
    battalion commander in the 45th Division before I published anything like that. And they were pretty upset about it, but
    nothing came of it.
- speaker: Respondent
  text: And of course, I didn't, but that was my one experience as a war correspondent. I came out of it all right. The colonel
    was very decent about it.
- speaker: Respondent
  text: So the South Korean infantry attacked this area out there and I was the commander of the tank support unit that went
    with them. I had my platoon and another platoon, ten tanks, and we went out there. This is high ground, mountains, really,
    that just crop up out of the plain there. And these infantrymen would try to struggle up there and get into these enemy
    trenches and bunkers and get control of the mountaintops.
- speaker: Respondent
  text: And we're down below, firing at targets on top that we can see without hitting our own men. That lasted all day and
    into the evening. And then late in the day we just got orders to pull back. It didn't have all the objectives but they
    just quit.
- speaker: Respondent
  text: Meanwhile, my tank, the track had come off of it. We were trying to turn around with mines on both sides of us and
    it just pulled it loose, so I had to be towed out of there. And I had to help put the track back on. We couldn't get it
    on where it would work, but we did get it on where we could tow the tank easily.
- speaker: Respondent
  text: The interesting thing was I'd been told a few days earlier that I was going to leave, that my time was up and I could
    go home. Rotate, they call it. Then they came back just a few hours later and the adjunct says, "I'm sorry, but you can't
    go back because it's operations on and you're the only one who's done the reconnaissance and the work on it and you're
    going to have to go out there."
- speaker: Respondent
  text: Told at the time that it was the biggest artillery barrage that had been fired up to that time. They had brought in
    trucks from other units in order to haul in ammunition. They set up service stations, including tire-changing places to
    serve these trucks to haul shells to these guns. They fired everything that you could think of at the Chinese for, oh
    I don't know, it seemed to me like for hours.
- speaker: Respondent
  text: I never really knew how all that came out, that was my memory of action in Korea.
- speaker: Respondent
  text: In the long run, we did stop them and South Korea became, as everybody knows, a model democracy and an industrial
    giant in many ways. And North Korea remained, and remains today, one of the most backward, dangerous places on earth,
    I guess.
- speaker: Respondent
  text: We had a rule, an ironclad part of doctrine and in those days it was, "Don't get in a land war with the continent
    of Asia." We'd already been in one out there in the Pacific with Japan, and to a certain extent in China.
- speaker: Respondent
  text: So we pulled back to the 38th Parallel. We already were on the 38th Parallel, more or less, and we decided just to
    stay there. And we opened up negotiations.
- speaker: Respondent
  text: And one time while I was there we even had a unilateral cease-fire. We just ceased fire and ceased all offensive operations
    along our front. That must have been April of '52, to see how the enemy would react. And maybe we could just work out,
    it had been done before, a de facto truce, no papers signed or anything. But that didn't work. After about ten or fifteen
    days we had to go back in business.
