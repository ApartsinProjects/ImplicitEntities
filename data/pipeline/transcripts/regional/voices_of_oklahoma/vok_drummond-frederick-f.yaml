collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: The Drummond Ranch, where is that located?
- speaker: Respondent
  text: There are lots of Drummonds. There’s a misconception. My grandfather was an Indian trader, came in from Scotland in
    the early ‘80s and was looking for a place to go. Went to Texas, lost what money he had. Working his way back east, got
    to St. Louis, ran into an Indian trader by the name of Charlie Skinner. Mr. Skinner said, “Well, come trade with me in
    the Osage.” He was probably eighteen or nineteen years of age. He didn’t know where the Osage was but he needed a job
    and somewhere to go. So he wound up here in Osage County. Probably one of the very early white men could have been the
    first three or four. So the Drummond Ranch is Frederick Drummond, that was his name. He had three boys and one daughter.
    And all the boys wound up all in the cattle business. My father was Fred Ginter Drummond. There was Roy Cecil Drummond,
    called R. C., another one called Jack Drummond, A. A., which were his initials, Alfred Alexander. The bedrock for the
    Drummond family was, of course, Grandfather Drummond. He married a young woman from Coffeeville, Kansas. She was a full-blood
    German and there he was a full-blood Scot. He traded her early in Pawhuska, and then went to Hominy, and with two other
    men founded what they called the Hominy Trading Company. And that was the super Walmart of Osage County at that time.
    They had everything from groceries to ladies and gents furnishing, shoe department, hardware department, furniture department,
    groceries, they had everything that you needed to be a farmer or a rancher at that time. So, of course, ranching kind
    of began. The history of the ranching business, though, was the trail drives from Texas with all the cattle after the
    Civil War were practically innumerable down there. The drivers would gather up cattle and drive them across Oklahoma to
    the railroad in Kansas. And then they would be shipped to the abitwars back east. And that’s where the early beef for
    the eastern part of the United States came from. Cattle drives came through Osage County and they leased the lands from
    the various members of the Osage tribe. The grass here in Osage County was the tall grass prairie, which starts here and
    goes up through the center of Kansas. Very nutritious and great for grazing. Now those cattle that came from Texas, they’d
    practically take all summer to get them up to the trains in Kansas. So they would graze the grasses en route across Oklahoma
    on their way to Kansas.
- speaker: Interviewer
  text: Was that a certain trail then?
- speaker: Respondent
  text: No there was no, the Chisholm Trail, of course, is a very famous trail but that was more west of there. And there
    was never any particular trail that was here in Osage County because they were just scattered from one end of the area
    to the other. And they came across the Cherokee’s land and the Choctaw’s. The Chisholm Trail and some of those trails,
    they were specific trails where you could almost still see the wagon marks in the ground from where they went. But here,
    they were just scattered over such a large area. They stayed quite a while here.
- speaker: Interviewer
  text: Were you too young to remember your grandfather?
- speaker: Respondent
  text: He died early so I do not remember him. No, he died at age forty-nine.
- speaker: Respondent
  text: A very young man. He had appendicitis and if you had appendicitis or something like that, you died. If they operated
    on you that was not a very good thing. That probably just made sure that you didn’t live.
- speaker: Interviewer
  text: So then your grandmother carried on for many years?
- speaker: Respondent
  text: My grandmother and, of course, those three boys were old enough that they were able to fill in and do things. The
    oldest boy, R. C. Drummond, was more the cowboy. My father, he was in the third business school class at Harvard. Went
    to Harvard to go to business school. After graduating from Oklahoma State when he was sixteen. And then when Grandfather
    Drummond died he came home to run the trading company. R. C. Drummond who was the oldest, became the cowboy. And then
    A. A., he got to the age, he became a rancher too. Now you could lease the land from the Osages and buy cattle in Texas
    and bring them up here. Had to be cattle traders, really, so to speak. And my father wound up doing more of that later
    on too. So there were three different Drummonds that were all involved in the ranching business and had various ranches
    here in Osage County.
- speaker: Interviewer
  text: Their own individual ranches?
- speaker: Respondent
  text: All individual ranches and all independent. One of the unfortunate things is that we all get painted with the same
    brush. And some of them do a better job than others. And some claim each other and some don’t. But the families get bigger
    and larger and it’s difficult to keep ranches together. So some of them have come and some of them have gone. But still
    there are several families that are still very involved in Osage County ranching.
- speaker: Interviewer
  text: Your father, Fred G., to graduate at sixteen?
- speaker: Respondent
  text: Yes, from Oklahoma State early on.
- speaker: Interviewer
  text: And that was a full—
- speaker: Respondent
  text: Well, yeah, because in those days there were no schools so it was kind of home-schooling. So he was more or less home-schooled
    in certain respects. And he had one teacher that probably taught all the grades in Hominy. So he passed all the tests
    to go to Oklahoma State when he was thirteen. Education was very, very important in the Drummond family. Quite often they
    would move to Stillwater or wherever it was to take their family. The R. C. Drummond family, they just moved down there.
    But my father went down and stayed at a boarding house. And then he wanted to get an advanced degree and there weren’t
    really that many universities that had advanced degrees. So he wound up going to Harvard.
- speaker: Interviewer
  text: At sixteen?
- speaker: Respondent
  text: At sixteen, um-hmm.
- speaker: Interviewer
  text: What year about would that have been?
- speaker: Interviewer
  text: How many years was he at Harvard?
- speaker: Respondent
  text: He didn’t complete his degree because Grandfather Drummond died. And so that’s when he came back. He was there probably
    about a year and a half. So he completed the first year and part of the second year. And then came back to take over the
    trading company. Which again, that was the Walmart of Osage County. That was a pretty big deal. And even if you needed
    to be buried they also had coffins that you could get. Ah, I always thought that was kind of funny, all the old trading
    companies that if they had a furniture store they were usually in the morticians as well.
- speaker: Respondent
  text: Probably the same thing happened in the Dakotas.
- speaker: Interviewer
  text: So your father then was really into retail to begin with?
- speaker: Interviewer
  text: And then gravitated—
- speaker: Respondent
  text: Then gravitated to the ranching business, yes. There seemed to be more profit in the ranching business than there
    was in the retail business.
- speaker: Interviewer
  text: Your father lived to be how old when he died?
- speaker: Respondent
  text: Oh he was fairly young when he died. He died at age sixty-three. After I graduated, got my advanced degree from Stanford,
    once upon a time. I got an MBA. And knew I did not want to be a rancher. So I wound up in the banking business in Kansas
    City. And then when he developed lung cancer and had six months to live, why it was my job to come back to become a rancher
    and take over the cattle ranches.
- speaker: Interviewer
  text: Your job, meaning the family expected you to do that?
- speaker: Respondent
  text: The family expected me to do that.
- speaker: Interviewer
  text: How did you feel about that?
- speaker: Respondent
  text: I felt it was the thing for me to do. That’s what you do what you do.
- speaker: Interviewer
  text: But you had grown up, obviously, the son of—
- speaker: Respondent
  text: A cattle rancher.
- speaker: Interviewer
  text: But very young you just did not want to be a rancher, did you?
- speaker: Respondent
  text: Well, I’ll tell you what, during World War II I rode si-jillion miles, I’ll never forget. It was hot, dusty, we’d
    gotten up at two o’clock that morning and ridden eleven miles to go where we were going to help rounding up cattle. And
    it was hotter than blue blazes. Finally got some water and a cheese sandwich at lunch. We’re coming back that evening
    at three o’clock and going down an old dusty road. My horse had its head between its legs. And I said, “Frederick, I’m
    never going to be a rancher.” Famous last words.
- speaker: Interviewer
  text: So you were how old?
- speaker: Respondent
  text: Probably fourteen at that time. But you’re a kid then. Whenever you got on a horse you got on a horse to work. There
    was never any fun and games, you were out there doing what you needed to do. Roundups and building fence and hauling hay,
    everything that you have to do as a rancher. To be a rancher you’ve got to be pretty physical. I thought, Hey, there’s
    got to be an easier way, working your bones off.
- speaker: Interviewer
  text: So then when the call came to you that the family really expected you to come back, all of this negative feeling that
    you had about ranching had to come washing over your brain.
- speaker: Respondent
  text: It did, it all—I got away. I thought, Well, you know, I need to come back. I had a friend in a bank up there at Kansas
    City. He’d run the cattle loan department, and that’s what I was doing at that time. I came back to be under him. And
    he said, “Frederick, better to run a peanut stand and be a peanut vendor and own your own stand than to work for somebody
    else.” So I came back to run the peanut stand.
- speaker: Interviewer
  text: But before that, you got your master’s degree in business administration at Stanford University. So you knew how to
    run that peanut stand.
- speaker: Respondent
  text: I had a good education, yes, I had a good idea on how to run a peanut stand.
- speaker: Interviewer
  text: But didn’t you go to Texas there in the ‘50s?
- speaker: Respondent
  text: No, I spent a couple of years in the military in the ‘50s. In Germany. After I came back from the military, that’s
    when I went to get my master’s from Stanford.
- speaker: Interviewer
  text: After your master’s at Stanford, then what?
- speaker: Respondent
  text: Then I went to Kansas City.
- speaker: Interviewer
  text: Then you came home to the Drummond Ranch. Talk about ranching back there in the ‘50s, the ‘60s, 70s, then we’ll compare
    that to the way that it is today.
- speaker: Respondent
  text: Everything has changed so much. As you know, we had three railroads in Osage County. And all the cattle back in the,
    up until the middle ‘50s were shipped by rail to Kansas City, St. Louis, St. Joe, that’s where the markets were. So the
    pastures were big and the cattle came in from Texas and by rail and they summered here. And that’s when everything was
    grass-fattened after World War II. During the war, of course, there were no corn-fed beef. And during the early ‘50s most
    of it was still grass-fed. There were these fat steers that were grazed on grass in Osage County and up through Central
    Kansas all the way up to Manhattan, Kansas. And then, of course, they went to Kansas City to the stockyards there. They’d
    have up to twenty or thirty thousand head on a Monday and a Tuesday that were in carload lots. Packers’ representatives
    would come through and pick out the fat cattle in these pens and then they’d drive them to the packing plants. Which were
    right adjacent to the yards there. So this is kind of the name of the game in the early ‘50s. And then the trucking industry
    came in, and that made it possible to move cattle where you didn’t have to do it on horseback. So a lot of the stockyards
    would open up in the various smaller towns. Tulsa had a stockyard, still do. The first one was at Sand Springs, but it’s
    now over there on the east side of town. Bristow, Pawnee, Coffeeville, every town practically of any substance has a stockyards.
    And, of course, the cattle were moved by trucks. So that revolutionized the cattle industry. The mobility of the trucking
    industry and the vehicles had made it revolutionary. Because back in those early days you would have to ride to wherever
    you were gathering roundups or doing that. Today you have your pickup truck and horse trailer, open up the gate, the horse
    jumps in, you can go twenty miles, the horse jumps out. You get on your horse, do the things that need to be done, and
    you don’t have to spend four hours riding back home in the heat and the dust. So a cowboy’s life is much different than
    it used to be. The things that really revolutionized the industry, again, were the trucks, the gooseneck horse trailers,
    and the fact that the feed used to be early on in hundred pound sacks. Then it went to where they had the overhead bins
    and you could put it into a feeder on the back of a pickup truck. So the cowboys did not have to wrestle hundred-pound
    sacks of feed all day long. And I’m not sure there’s anybody that could do that today, but back, you know, up through
    the early ‘60s, that’s where most of the feed would come in and we’d call it cake. Which was cottonseed cake, cottonseed
    pellets, high in protein that you’d pour out in the wintertime to feed the cattle. Then when we did have the pickup trucks
    with the feeders on the back so you didn’t have to lift those hundred-pound sacks. And you didn’t have to have feed pens
    that your brought out to in the middle of a storm or wet weather and feed the cattle. It revolutionized the cattle industry.
    So you could be an older guy and still be a cowboy. We have some cowboys that are second, third, or fourth generation
    cowboys. Interesting guys, wonderful guys. I love our cowboys. We have one cowboy that’s been with us forty-six years.
    We’ve got another one that’s been with us forty-two years. Another one has been with us at least fifteen or sixteen years.
    These guys are all very conscientious, neat people, and they consider themselves elitist. If you had to put them in an
    office or in a factory somewhere they’d wither up and die. But they like the outdoors, they love what they do, they like
