collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Respondent
  text: of Hernando, which was a little bit south, I would say maybe about twenty miles south of Nesbit. On the weekends he
    went down and opened his shop and he cut hair. And it was an interesting place to be.
- speaker: Respondent
  text: In addition to that, he was a blues singer who played guitar, quite well too.
- speaker: Respondent
  text: But my dad sang for parties. As a little girl I remember they had shows that came in.
- speaker: Respondent
  text: You know, the minstrel shows and all that. We weren't supposed to see them but we would sneak in under the tent and
    peek. So I think about my childhood, it was very, very colorful, to say the least. My dad played the guitar for a lot
    of different parties and things like that.
- speaker: Respondent
  text: Just like you take your family and go out on a picnic, it was a large gathering, more like a party, you know, celebration
    for the weekend. And these traveling minstrels or singers or dancers would come and set up their tent and that was part
    of the entertainment.
- speaker: Respondent
  text: The reason we were not as children supposed to see them, families kind of protected children from seeing things that
    they thought were not good, healthy things for them to see at that age. Music was one thing in church and they sort of
    steered us toward that, even though they were partying on the weekend they didn't want us there. And they had something
    else set aside for us, but we'd sneak away from whatever they had prepared for us and go and watch these shows. And they
    probably had some risqué stuff in there, you know -
- speaker: Respondent
  text: I remember her even playing with us as teenagers, on the floor and telling jokes and telling stories and things like
    that.
- speaker: Respondent
  text: My mother was a very pretty woman. I'm not responsible for their choices, but he had a way with ladies, I think.
- speaker: Respondent
  text: And after they were separated it was very interesting to me that they became lifelong friends. They died within a
    few months of each other and they had not been married since I was two years old. And when they died I was in my forties.
- speaker: Respondent
  text: There are three of us born to my father and my mother, my brother who is older than I, I am in the middle, and then
    I have a sister that is younger than I. We're the older three and each group of children after that my father remarried
    and my mother remarried.
- speaker: Respondent
  text: There is a group of children and each year each one of them had a child almost at the same time. So that's why we
    have so many siblings. But all of us are very close.
- speaker: Respondent
  text: I remember her and my uncle having this wooden house, it was part of a sharecropper's farm. I think they did fairly
    well. My uncle was a person who carved furniture. He could do very well with that, so most of everything in their home
    he had made. I've seen it since I've been an adult and I looked at the workmanship and it was fantastic.
- speaker: Respondent
  text: At home. You learned to spell your name and how to read and say your ABCs and how to count and all of that. You were
    taught that at home when you learned to speak or whatever.
- speaker: Respondent
  text: My first regular school was in Memphis and it was kindergarten. And I remember it was Miss Potts's kindergarten in
    South Memphis. I went in already knowing how to read and write and to spell my name and all of that, so I guess, I was
    doing fairly well at being taught, you know.
- speaker: Respondent
  text: And it's interesting because I found a recording, I wanted to add it into my presentation and talk about it a bit
    when I was giving a sermon-song. And I discovered that there was a track, a karaoke track, with Billie Jean, the country
    singer. She had made a track where she said she got it when she was a young girl singing that song. She's in, I guess,
    Nashville, Ozarks, or wherever and I'm in Nesbit, Mississippi. Can you imagine the cultures bringing those songs together
    -
- speaker: Respondent
  text: But I hated to speak and I enjoyed the singing, so maybe that's what it was. Because about that time they had the
    old radios, you know, that you could put the wire in the ground, they call it a grounding wire, or something like that.
    And certain hours during the day you could get certain radio stations. And my favorite station was the old Firestone Hour.
    There was a woman that her name was Marguerite Piazza. She would open the old Firestone Hours with, "If I could tell you
    of my devotion, if I could sing all my love so true." Now I may have some of the words not quite right, but as a young
    person I was not in school full time so I had to be very young.
- speaker: Respondent
  text: I loved that, I lived to go and listen to the old Firestone Hour, which the music was not alien to my culture but
    it wasn't the type of music that we sang because we did quartets and gospel, you know, coming out of the African American
    heritage. So to hear that type of music I was fascinated by that.
- speaker: Respondent
  text: As far as how the family reacted to it, they were supportive because they felt that was the way to help you be a good
    citizen, a good character, or whatever they were trying to build you to be a good person.
- speaker: Respondent
  text: I remember being about seven, or maybe somewhere between six and eight, I'll say.
- speaker: Respondent
  text: There was a young woman that came to our church. She sang and really touched my heart. It really made me want to sing
    forever. And I remember telling God, "I want to sing like that when I get to be grown." That's how I put it.
- speaker: Respondent
  text: That stayed with me for a long time and I didn't want to sing identical to her style of singing. What I wanted was
    that feeling that she was giving to me. I wanted to be able to give that to someone else. And that's been a sign to me
    all these years that God answers my prayer because he did give me a voice that people seem to want to hear.
- speaker: Respondent
  text: I'd always carried the music with me. I think maybe twelve, thirteen years old, I realized I wanted to be in medicine.
    My first goal was to be a doctor. And I realized that if I wanted six children, which was what my goal was, six children,
    and a husband, I couldn't be a doctor. And I'm thinking as an adult I'm looking at this reasoning from an almost teenage
    girl saying, "I can't be a doctor because that's going to take a lot of my time from my family. And if I'm going to have
    six children I'm going to need to be around. So I think I'll be a nurse."
- speaker: Respondent
  text: Consequently, I became a registered nurse, later on. And the music and the medicine have always come along together.
- speaker: Respondent
  text: I remember once I was singing my harmony incorrectly and she gave me one more chance to sing it correctly. And she
    was going to crack me on my knuckles. So I tried it again and I still got it wrong. The way I was getting it wrong was
    just so funny to me, so when she swatted me I started laughing and crying at the same time, 'cause it was just so funny.
    And
- speaker: Respondent
  text: I remember the song, the line was, "Shepherds abiding in the field." I was supposed to sing the harmony and I never
    could get the alto right. If you can imagine me singing alto all my life? I did until I was fully adult. I sang alto or
    second soprano, never that soprano line.
- speaker: Respondent
  text: But anyway, that was so much fun growing up with good teachers who wanted the best for you and they got it no matter
    what it cost you.
- speaker: Respondent
  text: And on the other hand, as an adult, I realized that there were some good people in all cultures. So we didn't get
    quite as much.
- speaker: Respondent
  text: I know some things happened, as a matter of fact, my uncle had to finally leave. Hernando, Mississippi, is where they,
    my aunt and uncle lived, just a little bit south of Nesbit. He had to finally leave because he had a verbal altercation
    with the man who owned the dairy farm where he worked and they threatened to kill him. So he had to leave and finally
    moved to Memphis. That was a latter thing.
- speaker: Respondent
  text: But in spite of all of that, I didn't really notice the severe racism in the sense of people overtly saying ugly things
    to you just because. I did know that we could not drink from certain fountains or we couldn't go to certain bathrooms.
    There were so many things that we couldn't do. You couldn't say certain things.
- speaker: Respondent
  text: I had an instance, I think probably nine or ten years old, and I had learned something from my teacher, which was
    if you're talking to someone that you say, "Yes, Miss So-and-So," or "No, Miss So-and-So," and don't say, "Yes'm," you
    don't say that "Yes'm," thing that you're saying. So I learned it and I wanted to go and practice it.
- speaker: Respondent
  text: So I was in Mississippi, and went into this little drugstore where we went all the time to get ice cream. I got an
    ice cream cone and I think the lady said something to me and I said, "Yes," and she immediately got my aunt and told her
    that I needed to be disciplined because I was sassing her because I did not say, "Yes, ma'am, Miss," whatever her name
    was.
- speaker: Respondent
  text: My aunt told me, she said, "You cannot do that. You get in trouble," you know. She even scolded me for not.
- speaker: Respondent
  text: She said, "I don't care what your teacher said, you cannot do this. You can get us all in trouble."
- speaker: Respondent
  text: So that was one incident as a child that I realized that something needed to change. "I just don't understand this.
    My teacher told me I could do this and this seems like the right thing to do."
- speaker: Respondent
  text: But as I grew there were small, little, minor incidents where I just thought it was ridiculous what we were having
    to do. We could not try on shoes. If we went to the store we had to get our feet measured with a string and bring back
    the shoes. If they fit, good luck, if they didn't, too bad, give them to your next one in the line. Or if you went to
    the dentist's office there was a small, little room where you had to go, or the doctor's office. And those things I remember
    as being just, I thought they were dumb. This just doesn't make sense at all.
- speaker: Respondent
  text: Or if you get on the bus you have to put your money in and then walk around in and go in the back door so you can
    be in the back and sit. Now that makes no sense at all, to me. And as a teenager, that's when many of the movements started.
    I was happy to see that and to be a part of that part of our country growing, 'cause that's the way I look at it now.
    We could not continue like that, you know, being, how do you say that? Degraded or treated in that manner.
- speaker: Respondent
  text: So it's amazing that someone was given the idea of how to fight this in a positive way as opposed to fighting in a
    negative sense. What I know as a more mature adult is that good people have to stick together and stand up for what's
    right. And I think a lot of what happened in the '60s is because good people stood up. Not because we want to listen to
    negative voices, because we need each other. Um, you have something that I need and that's my goal now. I want what you
    have that I need and I want to give you what I have.
- speaker: Respondent
  text: That way it makes us powerful. And we recognize who the real enemy is, then we know that we're not fighting each other.
- speaker: Respondent
  text: So when I went to ninth grade I went to the principal and said that I want to come to this school and I'll ride the
    bus. It was unheard of because everybody went to their neighborhood school. No one did that.
- speaker: Respondent
  text: His name was Mr. Hobson. He could not imagine anyone having that much school spirit.
- speaker: Respondent
  text: He said, "If you have that much school spirit then we're going to permit you to come over here. But if you come late
    one time, out you go."
- speaker: Respondent
  text: I don't know that I ever looked for a better day or anything of that nature until I was in high school about to graduate.
- speaker: Respondent
  text: But I knew that there was a movement that people, they were making plans where you were to resist, passively resist
    these things. So in high school I had several opportunities to do that.
- speaker: Respondent
  text: There were young men who were taken off one of my buses, because I wasn't the only one riding the bus to school. There
