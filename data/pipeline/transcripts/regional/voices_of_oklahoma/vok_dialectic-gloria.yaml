- speaker: Respondent
  text: And it was in 1970 and '71, that I was already feeling the results of arthritis. As that decade went by and I was
    living on the farm and getting up every day and pulling on my paint clothes, I was using my arms and my shoulders and
    everything in a way that I often went to bed aching. What was the clue that something was going on was I would go out
    in the morning after the kids got up and went to school, they were teenagers by this time, I would go out and feed the
    horses and I noticed that my foot hurt. I thought I had something in my shoe or I thought I had a callus. And then as
    the day would go by, I didn't feel it anymore.
- speaker: Respondent
  text: And then the next morning I'd be going out there and I'd say, "Ew, there that is again." I went to my doctor. At this
    time, my hands were beginning to swell. My symptoms were first in the bones of my feet, that's where it first manifested
    itself. And so at that time, what you did is you took aspirin.
- speaker: Respondent
  text: When I was finally over here in Tulsa, I went to the rheumatoid arthritis clinic, which was part of OU Health Sciences.
    I tried gold salts injections, that was one of the things they tried. They had no idea why this would do anything but
    some people got better.
- speaker: Respondent
  text: What finally saved me, which didn't come about until the 1990s, was a medicine that was built on science in that they
    realized this disease was caused by your own immune system running amok. So the idea is to take a medicine that cuts down
    on your own immune system, suppresses the production of white blood cells that led us into a whole new way of dealing
    with rheumatoid arthritis.
- speaker: Respondent
  text: But instead of taking the agent into a capsule and dissolving it - that is the job of a white blood cell - they burst
    loose and just suffuse the joint itself, so it eats away at the bone, it eats away at the cartilage in every joint. I've
    had surgery on my hands, on my fingers, on both feet, on my knee. Right now, I could qualify for knee replacements on
    both my knees, which are totally ruined, and my shoulders. But I'm too old, I don't want to do that. And so I'm not doing
    it.
- speaker: Respondent
  text: Well, I would be depressed, especially when it was so grievous when I was living in Arkansas. I tried the instructions
    in this book called There Is a Cure for Arthritis, which was really not any kind of jazzy new medicine, it was actually
    based on diet. I did juice fasts for a week, once a month. I also severely reduced eating anything made of flour or sugar.
    So I lost a lot of weight, and I got better.
