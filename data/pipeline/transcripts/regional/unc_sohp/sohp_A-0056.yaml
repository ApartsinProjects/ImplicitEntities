collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Well, during this period since 1948, what have been the major changes that you have seen in southern politics and
    in Florida politics?
- speaker: Respondent
  text: Well, along about that time, perhaps a bit before, the South was beginning to revert to the attitude of conservatism
    which had so long characterized the dominant attitude in the South. While we did have a populist movement back in the
    early part of the century, it never did take the whole South. It was a sporadic movement which died out pretty soon. But
    I recall that in '44, in my Senate race, I was a staunch supporter of Roosevelt and the New Deal, and my majority, although
    I won in the first primary, was considerably reduced over what it had previously been. I attributed that to the growing
    strength of the combination against labor, the growing conservative attitude, the growing departure from the principles
    and policies of Roosevelt, especially since Truman, whatever good qualities he had, he had many, as an executive, he wasn't
    the kind of a political leader who could bring a large volume of people along with him as Roosevelt could. So, with no
    dynamic, magnetic personality like Roosevelt to lead in the liberal cause, I noticed even as early as '44 that the trend
    was developing strongly toward conservatism. And by 1950, there were six . . . I'm speaking of the whole country now,
    there were six senior senators defeated. I was one of them. And the basic issue was national health insurance, civil rights,
    liberal attitudes favoring labor, minimum wage, and all that sort of thing. Adequate hospital and medical care for the
    people, those were things were basically the issues. And of course, the McCarthy stuff was simply the coloration of it.
    It was an excuse, it was simply a manifestation of that extreme right-wing conservative attitude that was beginning to
    grow stronger and stronger. And since that time, we have seen more Republicans elected. We have had a Republican governor
    who turned out to be a failure, but we had a Republican governor, we've got a Republican United States Senator now from
    Florida. Of course, as early as '28, Florida went for Hoover and Florida has been for the Republican ticket in most of
    the presidential elections since that time. Not all, I mean that it went for Roosevelt all through his time and I think
    maybe one time for Truman. But we've seen that growing sentiment of conservatism in the South while some other parts of
    the country that had been previously Republican, like some of the New England states, have been getting more Democratic.
    Looks like a lot of the South has been getting more and more Republican.
- speaker: Interviewer
  text: To what do you attribute that Republican development?
- speaker: Respondent
  text: Well, I don't know. It's kind of hard to figure out. It may be that there is a legacy of a sort of conservatism. Usually,
    in the past, the conservative cause has been aided by the prejudice of those who opposed any kind of civil rights activity.
    Any liberal who honestly was a liberal and thereby indicated some appreciation of humanitarianism and exhibited concern
    for the people, would find himself sooner or later taking a forward-looking, I think an American, position on civil rights.
    As soon as he did that, no matter what other virtues he had, he aroused an enormous amount of sometimes emotional opposition.
    For example, I supported civil rights in Florida. I was one of the few, if not the only, southern Senator who did. Men
    like Hill and Sparkman from Alabama who were here a long time together, they never did anything that favored civil rights.
    They always participated in filibusters, they always voted against every civil rights bill that came up. They survived
    as relatively liberal men because they took the locally approved position on civil rights. I didn't do that. So, I had
    the anti-civil rights people on my neck as well as the anti-labor people and the pro-doctor people and all those other
    people. And so, that's one of the things. And then I guess that another thing was that due to Roosevelt's leadership,
    and emphasis on the problems of the South, a lot of our problems have ameliorated. Not solved, ameliorated. The South
    wasn't in as bad shape as it was when Roosevelt came in, even for a while there after. So, maybe they didn't appreciate
    so much the need for a government that tried to provide for the welfare of all the people. I don't know how you account
    for the conservative attitude or philosophy. What is it that gives men a philosophy? I have never understood why the South,
    which needs help so much and has profited and prospered so much by the help that it got from the Roosevelt administrations
    and some subsequent administrations, how the South on anything other than civil rights, even assuming that they might
    be justified in some respects for taking a very conservative attitude on civil rights, how they could on purely economic
    issues, take a conservative attitude. And yet right over here on the floor of the House or the Senate, you'll find that
    a great many, sometimes a very large number, of the southern representatives who will vote no on a purely economic issue.
    And yet, the South, while it is growing, the level of income is rising, the industries are being added to and all that,
    I just can't understand why southern representatives so often align themselves against progress and improvement on purely
    economic lines.
- speaker: Interviewer
  text: Is that attitude changing with the newer freshmen members that are Democrats from the South?
- speaker: Respondent
  text: I don't know . . . maybe . . . well, I don't know. I haven't seen much change in the new members. Some of the new
    members . . . we have a new man from Florida, Gunter from Orlando, who is fairly liberal. He's a new first-timer. There
    should be an improvement in it on the part of the younger people, but I don't know. Maybe they think they can't survive
    if they take a liberal attitude. And I was the only conspicuous liberal among the southerners, the most, I think. And
    of course, they finally defeated me and tried to destroy me. One of the campaign finance people of Smathers, who defeated
    me in '50, told me that he personally received $700,000 from the Republicans in the North, that they sent down to Florida
    to use against me, because I was a friend of labor. He spent at least two million dollars altogether. So, maybe a lot
    of the younger men are fearful of coming out too strongly for the liberal point of view. Because today, it's generally
    assumed that you can't be too liberal to get elected in the South. It's generally accepted. But I don't know what the
    reason for it is, I wish that I knew, and I wish that there was something that I could do about it. Because my people
    have lived in the South every since the early days of the country and I love the South. It's my home. I was born and reared
    in Alabama. It's been a source of painful regret to me to see the conservative sentiment that there is in the South in
    the last two years, we had a man, Leroy Collins, who was a liberal governor of Florida, and yet, this man Gurney, whose
    record has been so tainted by associations of corruption, defeated him by 250,000 votes. In Florida, in the Senate race.
    It is generally considered that a man who is what they call an "extreme liberal" or really just a good Democrat, would
    have difficulty winning a statewide race for the Senate, although Gunter is probably going to have a fair chance in the
    Senate race that is going on down there now. He is rather liberal in his attitude.
- speaker: Interviewer
  text: How do you analyze the effect of the 1970 elections in Florida, the Chiles victory and Governor Askew's victory?
- speaker: Respondent
  text: Well, they were both good. Askew made a good impression against a man who took a negative position. He used to be
    a partner of mine. He took too much of a pussy-footing position and Askew hit upon, he was an honorable man and they wanted
    integrity, and he hit upon the idea of a corporate income tax, which he courageously presented and that and his own evident
    sincerity and integrity simply made it appear that he was a better man than the opposition. So, he finally won out, and
    then in the general election he was opposed by a Republican and there is still a great majority registered Democratic
    in Florida, and the Republicans are still not going to win the governorship soon, I think. I don't think that Thomas who
    is running against Askew can possibly win. To beat Askew. Chiles . . . Chiles did defeat Cramer, who is a very right-wing
    Republican. Because he was a conservative in legislation and while he started off here liberally, he swung back right
    away to a more conservative position, because he began to get repercussions from Florida, they tell me. But he attracted
    by the gimmick of walking a thousand miles, as he is supposed to have done, that gimmick sort of attracted attention and
    he hit upon that gimmick. And then, he's got a pleasant way about him, he's been in the state senate. He beat Farris Bryant,
    which was a good thing. He was a very conservative Democrat. He had been governor, but when he ran for the Senate, Chiles
    beat him badly. But that was a case where it looked like . . . obviously they're two better men, I thought, and it happened
    they were the more liberal men. While Askew is no flaming liberal in the sense of the word, he would be the first one
    to assert it, he did take a liberal position on school busing and on the corporate tax, which is something that somebody
    should have done long ago. But on a lot of other things, he's not too liberal. So, he's been able to give an image to
    the people of integrity and responsibility and honor and reasonably liberal, but not too liberal to excite too much bitter
    opposition. And his personal image has aided his political situation a great deal.
- speaker: Interviewer
  text: Did you grow up in north Alabama?
- speaker: Respondent
  text: No, I grew up in east-central Alabama, I was born in Chambers County on the eastern border of Alabama, not far down
    below West Point, Georgia. Up above Opelika, Alabama, about twenty-five or thirty miles. And then I grew up from ten years
    old on up until college age, in fact, later than that, at Camp Hill, a little town of 1800 population on the Central Pacific
    Georgia Railroad a hundred and seven miles below Birmingham and twenty-five above Opelika, about twenty miles north of
    Auburn College. That's where I grew up. My father was born in east Alabama, my mother in south Georgia. Her family moved
    to east Alabama a good many years before the Civil War.
- speaker: Interviewer
  text: Well, did your own liberal instincts come out of populist tradition in that area?
- speaker: Respondent
  text: Well, I just don't know why my philosophy developed. I think that it . . . I didn't have any near relatives in politics,
    except that my father ran for deputy sheriff one time, and chief of police, a farmer and a merchant, all of that, but
    he never did succeed very much in politics. I didn't have any other near relatives, except an uncle who was superintendent
    of public instruction in a south Alabama county. But I, from early days, had an aptitude toward politics. When I was in
    grammar school, I was president of the Heflin Literary Society and then later on, I was editor-in-chief of the Camp Hill
    Radiator, the little magazine that we put out. Then, I went to Dothan, Alabama, and taught school for a year when I was
    seventeen years old, that would have been in the early days of the war. And then I took an interest in BYPU and was president
    the following year and my first year in college, I was president of the Alabama BYPU. Then at college, the University
    of Alabama, I was a member of the executive committee from the freshman class, my first year. Later on, I represented
    the University on the debating team and at the Southern Oratorical Contest at Chapel Hill, North Carolina. I ran for president
    of the student body in my last year. My third year, I took the course in three years and one summer. And fortunately lost.
    And then I went to Harvard Law School and I was president of the Beale Law Club, one of the law clubs at the law school.
    Then, I went to the University of Arkansas and taught law for a year and then moved to Florida, to Perry, Florida, down
    below Tallahassee. And I hadn't been there quite three years when I was elected to the Florida legislature, the house
    of representatives. And then I was named to the state Democratic executive committee. Then I was defeated for reelection
    there in 1930 and moved to Tallahassee and in '34, I ran for the U.S. Senate against an incumbent senator, lost by 4,050
    votes. They stole it from me, but I didn't complain about it. Two years later, both senators died, in '36. I first announced
    against the one that I had previously opposed and when the other one died, I switched over, I made an effort for his seat,
    and no one ran against me in the primary or general election. So, I was nominated and elected when I had just become thirty-six
    years old, to the United States Senate. So, when I came here, I had taken a liberal position in my first campaign for
    the Senate in '34. My first plank in my platform was for federal aid to education. And my people were relatively poor
    people and I had a deep sympathy for the problems of the South, I knew something about those problems. I worked in a steel
    mill one summer at Ensley, Alabama, and I did some summer work on the farm and all that. But I still, in '38, participated
    in a filibuster here against an anti-lynching bill in the Senate. Because I thought that a senator from the South had
    to do that. But instead of talking about pot likker and reading the Bible and so-and-so as a filibuster, I talked about
    the economic conditions of the South.
