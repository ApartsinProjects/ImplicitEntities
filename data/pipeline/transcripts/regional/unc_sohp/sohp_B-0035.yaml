collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: 'Mr. Carter, could you tell me something about your life: where you were born and some biographical information, please?'
- speaker: Respondent
  text: I was born in Albemarle, North Carolina, Stanley County, January 20, 1921. My parents are Mr. and Mrs. W.R. Carter,
    both deceased. I have one brother younger than I am and one sister younger than I am, and both of them still live in Stanley
    County.
- speaker: Interviewer
  text: Did you go to school in Stanley County when you were a young fellow?
- speaker: Respondent
  text: I went to school practically in my own backyard, a little country school named Endy, E-n-d-y. I graduated from high
    school there in 1939; we had twelve people in the class, four boys and eight girls. I was the first boy from that school
    who ever went to college.
- speaker: Interviewer
  text: Did you go straight out of high school into the University of North Carolina?
- speaker: Respondent
  text: 'Yes. I''d never even been to Chapel Hill, and nobody in my family had ever been to college either. But I went to
    Chapel Hill in 1939. They took me up there and turned me loose. I had $112 when I went up to Chapel Hill; I''d made that
    money working in the cotton mill during the summer, and saved $112. And I''ll never forget that first day I was in Chapel
    Hill, because I walked in Roy Armstrong''s office. He was the head of the pre-college guidance committee at that time;
    he later, you know, became head of Morehead scholarships and all this. Anyhow, I went in and I said, "Mr. Armstrong, I''m
    Horace Carter from Stanley County. I''ve got $112.; do you think I can get through school up here on $112.?" And that
    was the greatest encouragement I''ve ever had in my life: he said, "Well, I know a lot of people who got through on less."'
- speaker: Interviewer
  text: At the time, were you interested in journalism from the beginning?
- speaker: Respondent
  text: Yes, although none of my people had ever been in the journalism business; they were just hard-working people. My Daddy
    was a machinist; my mother worked in a cotton mill. But from the time I was eighth and ninth grade in high school I was
    interested in the newspaper business. I had an English teacher who I think had a lot to do with this, and I had written
    sports for the little newspaper in our county, the while I was in school. This got me interested in it. And I knew that's
    what I was going to do when I went to Chapel Hill. You might also be interested that while I was there (well, he's dead
    now) Bob Madry, who was the director of the University News Bureau, was good enough to give me a job in the News Bureau
    when I was a freshman at Chapel Hill. I worked there the whole four years, and I've often said that I believe I learned
    as much from Bob Madry as I did going to school at Chapel Hill.
- speaker: Interviewer
  text: Well, did you start out as a journalism major? Did you have any other interests while you were there?
- speaker: Respondent
  text: Well, I had a lot of other interests, but I worked, like, eight hours a day, and so I thought I was very fortunate
    to be able to do anything other than that - although I did make the freshman baseball team at Chapel Hill. Jim Tatum was
    the coach. I didn't get to play; I was a sub and I was a catcher, and I was way down the list. There was about two or
    three ahead of me, all bigger than I was - I was a little fellow then, about 125-130 pounds. But I did make the squad
    and made all the trips; and as a freshman that's about the only thing I did take part in, other than working and going
    to school. But in the latter years of my time at Chapel Hill I got involved with a little bit of everything. I was editor
    of the. First I was sports editor and managing editor, but I was eventually editor - elected over Jimmy Wallace, who's
    a professor over at State College now, I believe. And I'm very proud to this day that I was tapped as a member of the
    Golden Fleece and the Order of the Grail - made them both.
- speaker: Interviewer
  text: Quite an honor.
- speaker: Respondent
  text: I was very proud of both of those.
- speaker: Interviewer
  text: Well, did you come to Tabor City immediately after college?
- speaker: Respondent
  text: Except for four years in the Navy. Right in the middle of my junior year at Chapel Hill the war broke out - that was
    December 7. But anyhow I went on there 'til the end of the term, and I went to Wilmington, North Carolina. Worked in the
    shipyard down there seven months, because I was a very draftable age, as you can imagine - like twenty-one or twenty-two
    years old, and not married. I worked down there seven months, and I decided that I'd rather be in the service than be
    building those ships down there. And I enlisted in the Navy in 1942, and I stayed there 'til 1946. I eventually, though,
    had some good breaks even in the Navy, because I was the Assistant Master-at-Arms at the hospital in Charleston, South
    Carolina. I had a recommendation from my commanding officer down there that they'd send me to midshipman's school. And
    I went back to Chapel Hill one term and to Notre Dame one term - and got a full year's college credit for those two terms,
    incidentally. I came out of there an Ensign, and I wound up in the war as an assistant navigator on the "U.S.S. Xenobia,"
    and that was an AKA (armed cargo assault). We worked in the north Atlantic the latter part of the war. I came in to Chapel
    Hill, though. I got out of the service, like, in January. I went back up there and took one political science course that
    I needed to graduate. Following that I came to Tabor City, because they were looking for somebody to start them a newspaper.
- speaker: Interviewer
  text: Was political science one of your favorite subjects?
- speaker: Respondent
  text: No. Well, I liked political science, but I was strictly a journalism major. I only took political science because
    it happened to be one of the things that I hadn't had much of, and I needed that to graduate. It was the final course
    I took to get my degree. I don't really think I got the degree 'til (I don't even really know), like, '49 or '47 or something,
    and Ed Lanier brought it to me. I didn't get around to going to any graduation exercises, and Ed finally brought me the
    degree. He said, "Well, you finally got it." So that's the way it was.
- speaker: Interviewer
  text: So you came to Tabor City in 1947? Is that right?
- speaker: Respondent
  text: 'Came there in ''46: July 26 of ''46 was the day we got the first issue of the out.'
- speaker: Interviewer
  text: And so you were hired, really, to start the paper, to get it going?
- speaker: Respondent
  text: 'Not hired, but they ran advertising in the daily papers in North Carolina. When I say "they," the Tabor City Merchants''
    Association advertised. They had two classified ads, as a matter of fact: one for somebody to come to Tabor City and be
    the executive secretary of the newly-formed Tabor City Merchants'' Association; and they had ads in the same paper advertising
    for somebody to come to Tabor City and start them a newspaper - in that they had no newspaper at the time. They had had
    the old, and years before that the, but both of them had gone broke and had closed down. There was no paper there then.
    So I applied for both of the jobs: I applied for the Chamber of Commerce job and to start them the paper. I came down
    here, was interviewed. S.P. Smith, who''s one of my good friends today, was the first president of the Merchants'' Association;
    I met with he and the members of the board. So they gave me the job as secretary of the Chamber of Commerce (or Merchants''
    Association), and from that a few months later I started the newspaper.'
- speaker: Interviewer
  text: 'That must have been quite a task: to start a newspaper from nothing.'
- speaker: Respondent
  text: Started it from nothing in the town and virtually no money, and a wife and a six weeks' old baby - so you know things
    weren't too good. I had gotten married to Lucille Miller from Richfield, North Carolina, whom I had known in my home county.
    I had married her a year or two before I got out of the service. And we came down here with an old '39 Pontiac with snow
    tires on it, and Chase said he could hear me coming a mile before we got to the city limits because the tires were making
    so much noise. And it was a chore. The only money we had was I had saved about four thousand dollars, and I had them in
    U.S. Bonds, while I was in the Navy. That's the only money we had, and we just didn't know that you couldn't come down
    here and start a newspaper with such a little amount of money.
- speaker: Interviewer
  text: Well, Mr. Carter, when did you first become aware, if you can remember, of the Ku Klux Klan in this part of the country
    as being an organized group?
- speaker: Respondent
  text: That time when I first started the paper I was running a little column every week on the front page known as "Carter's
    Column" - which I've run all these thirty-one years, but now run it inside. An individual I don't care to name came in
    one day and said, "You ought to get involved with this Ku Klux Klan activity that's going on around here." You have to
    realize that this is the period of segregation, but it was breaking down in the South about this time. And I said, "Well,
    I don't know anything about it." He said, "Well, they're having a meeting this Saturday night at such-and-such a place."
- speaker: Interviewer
  text: Do you remember where this particular meeting was?
- speaker: Respondent
  text: Not that first one, because I wasn't at that first meeting. I went to many, many meetings over the years, but that
    particular one, all I had time to say…. Because then I only had just a girl in the office that wrote some society and
    answered the telephone, and a one-eyed printer and myself did all the rest of it - I mean, we put out the paper as well
    as selling the advertising, the subscription list and writing all the news. So all I had time to do was write a few paragraphs
    in that column saying that we understood there was some effort to revive the Ku Klux Klan in Columbus and Horry County,
    but in our way of thinking this organization was obsolete and there was no need for it in a free society like we had at
    that time. This is long about '48 or '49; you've probably seen that column. But that was how I first got involved with
    it, with just that simple statement that we didn't need any such thing. Well, this aroused the people who had already,
    you know, bought the hoods and the sheets and had already signed up. And I found out just a few days later that there
    was a considerable quantity of them. The best estimates were that there were somewhere betwe
