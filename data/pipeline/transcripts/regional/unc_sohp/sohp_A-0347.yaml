source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Let me ask you a little bit about earlier on. You came out of the service, didn't you, in about '45?
- speaker: Interviewer
  text: Could you give me just a little bit of the background, your military background?
- speaker: Respondent
  text: Sure. I was commissioned in naval intelligence as an ensign in April, 1941. I was called to active duty in the intelligence
    office in Atlanta in September, 1941. I'd been trained for cable sensor work in New York, and shortly after the Japs hit
    Pearl Harbor on December 7, I was transferred to my mobilization assignment, which was 67 Broad Street, New York, which
    was central intelligence and cable.
- speaker: Interviewer
  text: How old were you at that time?
- speaker: Respondent
  text: I was born in '13, so I was 27 years old.
- speaker: Interviewer
  text: Twenty-seven years old. Out of college a few years? Out of law school?
- speaker: Respondent
  text: That's right. Had been practicing law, just started practicing law in Atlanta. Then I got fed up with cable sensor
    work in New York, and I requested combat duty. They sent me to the first midshipman's school at Northwestern University
    about the middle of '42. In that same class was Robert Taft, Jr. After I finished midshipman's school, they tried to teach
    us the fundamentals that you learn in the Naval Academy in four years in sixty or ninety days, I've forgotten. Then they
    assigned me to a ship that was under construction in California, the USS Tryon. It was a disguised hospital ship. The
    Japanese paid no attention to the Geneva Convention, so while it was a hospital ship, we were heavily armed for an auxiliary
    and could fight, or pretended to, and auxiliaries did. They really weren't equipped for much battle, but they did have
    guns and things of that nature. I served as a division officer on her, and then was transferred from that to New Zealand,
    where I became aide to Commodore Jolly, Flag Secretary down there, afterwards Transportation Officer in New Zealand. After
    I had been in the South Pacific for twenty-two and a half months, they sent me home for twenty days leave, as I recall,
    in a precommissioning detail at Rhode Island, New York. Afterwards, I was made Prospective Executive Officer on an attack
    transport, APA 97. When the ship was commissioned, we acted as auxiliary training ship a float for the Atlantic Fleet
    at Newport, Rhode Island, for about sixty days. We'd take details out for a week and run them through the routine that
    similar auxiliaries and attack transports experienced, and let them stand watches along side our men. I went to the South
    Pacific then and was engaged in the campaign for the Philippines, and I participated in landing the first cavalry division
    in Tokyo Bay, while McArthur was dictating the surrender ceremonies. Then after the war was over, I had far more points
    than I needed to be demobilized, so I came back and was placed on in active duty about November, '45. I served a total
    of 52 months. Went in as an ensign and came out as a lieutenant commander.
- speaker: Interviewer
  text: So you were back in Georgia then at the beginning of '46, and back in law practice and interested in politics?
- speaker: Respondent
  text: That's right. I had come back just shortly before my father engaged in his last campaign for governor in '46.
- speaker: Interviewer
  text: And do I have it right that up until about 1940, governors served two year terms and could succeed themselves, and
    that got changed?
- speaker: Respondent
  text: Ellis Arnall was the first four year governor.
- speaker: Interviewer
  text: First four-year governor and he could not succeed himself.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: Then the '46 campaign which turned into that kind of musical chairs.
- speaker: Respondent
  text: For governor, right.
- speaker: Interviewer
  text: The two governor thing.
- speaker: Respondent
  text: My father died, and the legislature elected me and I went through the courts. I won two out of three court decisions
    from the lower courts, and lost the state Supreme Court decision five to two. Then I vacated the office, and then I announced
    I'd carry it to the people and won the unexpired term of my Daddy in 1948.
- speaker: Interviewer
  text: Which means a two-year term, again, was in effect. That election was for two years.
- speaker: Respondent
  text: Right. The unexpired term of Eugene Talmadge, that's what I served.
- speaker: Interviewer
  text: Right. And that did not disqualify you to run for a four-year term.
- speaker: Respondent
  text: For reelection, right.
- speaker: Interviewer
  text: So in 1950 you ran for.
- speaker: Respondent
  text: I was elected for a full four-year term.
- speaker: Interviewer
  text: Then were you elected to the Senate in '54?
- speaker: Respondent
  text: Had a two year hiatus. I was elected to the Senate in '56.
- speaker: Interviewer
  text: In the '50 campaign, when you won the full term, as well as '48, some of the reading that I've done indicates to me
    that Governor Arnall might well have challenged you. Could he have legally challenged you in '48 for that, or would he
    have been ineligible to run?
- speaker: Respondent
  text: He would have been ineligible in '48. He would have been eligible in '50.
- speaker: Interviewer
  text: But he didn't make any go for it, did he?
- speaker: Respondent
  text: No, he did not. We had the acting governor, or rather M.E. Thompson was sitting as acting governor, and the Arnall
    group and the Rivers group supported Thompson.
- speaker: Interviewer
  text: Did it surprise you some that Arnall never really made a serious run again for governor?
- speaker: Respondent
  text: No, it would have been impossible for Arnall to challenge Thompson because he was acting as governor and he was a
    member of the Arnall faction. So it would have divided their forces irrevocably. Now, if Thompson had stood aside and
    let Arnall on, it would have been different.
- speaker: Interviewer
  text: Knowing what you know now about all that has happened since 1954 Brown decision and all the civil rights stuff and
    everything, do you think, if you had it to do over, you'd do anything any different than you did while you were governor?
    Particularly about your governor's time, I'm not thinking about the senator.
- speaker: Respondent
  text: I'm sure there would have been some particular things I would have done different. What are you referring to?
- speaker: Interviewer
  text: Well, I'm thinking, for example, about the white primary?
- speaker: Respondent
  text: No, I wouldn't have been elected if I'd done different.
- speaker: Interviewer
  text: You wouldn't have had a chance?
- speaker: Respondent
  text: Not a snowball's chance in hell.
- speaker: Interviewer
  text: Some people would have said the same thing about Arnall with respect to the poll tax, but he went ahead and took it
    on.
- speaker: Respondent
  text: No, that was not the issue of the white primary at all.
- speaker: Interviewer
  text: Didn't have the emotional impact?
- speaker: Respondent
  text: In fact, my father supported repealing the poll tax.
- speaker: Respondent
  text: Yes. In fact, the overwhelming majority of the people were probably in favor of repealing the poll tax, but at that
    time probably 10-15% of the white people were in favor of repealing the Democrat white primary.
- speaker: Interviewer
  text: So you had a solid 85% white mandate?
- speaker: Respondent
  text: Not that many votes because people don't vote directly on issues, but the sentiment of the people was about 85%.
- speaker: Interviewer
  text: That's pretty hard for a politician to ignore, isn't it, if he wants to stay in business?
- speaker: Respondent
  text: Well, if you want to challenge it, just don't run for public office. Resort to the courts.
- speaker: Interviewer
  text: During that time, a great many whites, and you yourself, used to say, "The problems that we have in this region, we
    can work out. And if the federal government will not interfere in this, we will work them out." How long do you think
    it might have taken for us to have come to grips with this?
- speaker: Respondent
  text: Actually by the time we passed the civil rights bill [1964 and 1965], any black that wanted to vote in Georgia was
    registered and did vote. As a matter of fact, during my father's race in 1946 probably 130,000 blacks voted in that primary.
    By the time I ran in '48, probably 200,000 blacks voted. We didn't pass the Civil Rights Act until the '60s. By that time,
    virtually any black that wanted to vote in Georgia was voting. Now, breaking down segregation would have taken a little
    longer. They were beginning to make some inroads in the cities, but not in the rural areas. It probably would have taken
    another 25 years on segregation.
- speaker: Interviewer
  text: Yeah. Would it have been a good route to go, do you think? I mean, you felt it pretty strongly then.
- speaker: Respondent
  text: Well, it would have prevented lots of turmoil and everything else that we did have. 'Course, the route that we should
    have gone, when they passed the Fourteenth Amendment, that really was the basis of all these so-called rights and still
    is. At that time, we ought not to have ever had segregated schools, segregation in the South. Once you adopt a pattern
    and a mold of conduct with all of the laws involved, including your Constitution, and it's been in being for over a 100
    years, people don't change their habits.
- speaker: Interviewer
  text: They really don't. I've done some reading, too, back in that period of time, and the laws really came into place between
    about 1877 and the turn of the century.
- speaker: Respondent
  text: Right. As a matter of fact, we didn't have the white primary law in Georgia, I don't think, until about 1917.
- speaker: Interviewer
  text: Yeah, it was after the turn of the century.
- speaker: Respondent
  text: Called Neil's Primary Act. They had done it, though, by resolution in the Democrat Party prior to that. But blacks
    voted in elections up until, I guess, the early 20th century.
- speaker: Interviewer
  text: Then you had 30 or 40 years where it was just.
- speaker: Respondent
  text: That's right. What made the people so mad and disgusted them so, see, the blacks had, unfortunately, a lower level
    of education than whites, and they would vote, say, 10,000 votes in Augusta, Georgia, and the results would be 9,995.
    Just like voting cattle or pine trees, and that's the reason they disfranchised the blacks. [Richard] Daley [of Chicago]
    in his heyday couldn't muster the votes that they did in those days, black vote. Manipulated, bought and sold, just like
    cattle. That probably had more to do with disfranchising them than their color, really.
- speaker: Interviewer
  text: Prior to the Brown decision, that was in '54, those cases were in the lower courts for about three years. And even
    before that, there were some higher education rulings.
- speaker: Respondent
  text: A ruling in Texas on the university system that antedated the voting issue.
- speaker: Interviewer
  text: And some of those went back quite some time. Looking back on that now, it seems to me that people surely must have
    seen this coming. And yet when I talk to people, regardless of their point of view on whether they think Brown was good
    or bad, they still say they were shocked when Brown came down.
- speaker: Respondent
  text: I tried to anticipate it to some degree with my and my building authority. When I took the governor's office in '48,
