source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: What is the state of Arkansas politics, right now?
- speaker: Respondent
  text: What is it? It's neither fish nor fowl. It's almost like it was in 1968 when we voted for Rockefeller, Wallace, and
    Fulbright. It is ferociously independent and very proud of its independence. It's very proud of its new independence.
    As a state and as a voting population. It's very proud. It's kind of like shackles have been taken off of it, us in the
    last decade. It's almost like we're voting for the first time.
- speaker: Respondent
  text: I would say it's basically moderate. It's possibly populistic. It's neither liberal nor conservative, but I would
    say moderate with a lot of populism. But no big transitions in the last three or four or five years.
- speaker: Interviewer
  text: Well, assuming you become governor, and I think that's a safe assumption, do you plan—
- speaker: Respondent
  text: Remember, our voters are very independent. They may decide they want a Republican governor.
- speaker: Interviewer
  text: We'll assume, for the sake of questioning . . . do you plan to take an active role as head of the Democratic Party?
- speaker: Respondent
  text: In the state of Arkansas?
- speaker: Respondent
  text: Well, of course, to be very factual, and this is being published in 1976 to be very honest with you, I've never known
    quite what the state Democratic Party was or is in this state. It's only in the last four or five years that we've even
    had an office or a filing cabinet. For years we never had even a telephone or a secretary. It was run by whoever the governor
    said is state Democratic secretary. And we just kept it, it was just there. I mean, when I say it was there, it was .
    . . every two years we held a state convention. We had no political party. We have developed, to a degree, a political
    party and a structure since Rockefeller. But it's not a political party per se as you would think of in any other state.
- speaker: Interviewer
  text: Was the Democratic Party essentially a Faubus party until 1966?
- speaker: Respondent
  text: Right. And the Republican Party came about because of an anti-Faubus sentiment.
- speaker: Interviewer
  text: Right. And our reading of the Republican Party was that it was a Rockefeller party. Been out for four years. It literally
    died when he died. It went because of lack of money and name and so on. The principal impact of it was the reform of the
    Democratic party in the sense that it started to elect moderate candidates or, maybe in a sense, that it started to elect
    anti-Faubus candidates. Is that a pretty fair reading of what's happened here?
- speaker: Respondent
  text: In other words, the Democratic Party finally emerged as a party during the Rockefeller years.
- speaker: Interviewer
  text: It was reformed or .
- speaker: Respondent
  text: It was not quite reformed because it was nothing to reform. It, I would say, was born during the Rockefeller years.
    And it's going to be very hard . . . just as the Republican Party has died, it's going to be very hard to keep the Democratic
    Party alive. Because to remain alive and viable you've got to have a good opponent. You've got to have something to be
    against. And right now we talk about the Republicans being a great menace or something like that, and really they're not
    a great menace. We might can run against Richard Nixon this fall or talk about how bad Watergate is, but that's the only
    real thing we have going for us. Now you can't talk about Rockefeller because he's dead now and he's gone and he's respected.
    As goes the way with most politicians, you die, you come off at a good perspective. We don't have an enemy to keep us
    alive and going. We don't have a battleground.
- speaker: Interviewer
  text: But the moderate wing of the Democratic Party, if you want to call it that, has been strengthened at least by two
    victories in 1970 and '74 over Faubus. Is that right?
- speaker: Respondent
  text: That's absolutely true.
- speaker: Interviewer
  text: Okay. So in a sense it is stronger, in the last four years, than it was in the period before that.
- speaker: Respondent
  text: Absolutely. As a party. With party machinery and with county conventions, elected delegates to the state convention
    and this sort of thing. Yes.
- speaker: Interviewer
  text: Would you like to see any change in the status of the Democratic Party? Would you like to see it become stronger as
    a political party?
- speaker: Respondent
  text: In Arkansas?
- speaker: Interviewer
  text: In Arkansas.
- speaker: Respondent
  text: Well, to be honest with you, I would like to see the Arkansas Democratic Party become more active on the national
    level, in national politics. It has been a separate, independent entity. Kind of divorced, basically, from the national
    party or any national problems or whatever. I think we could do a lot more about making our state party more nationally
    oriented. And the people say, "Well, the Democratic Party nationally is too liberal. And they've got the Humphreys and
    a few of those guys up there running the thing." The reason they have is the state parties have not activated themselves,
    you know, enough in the national party structure. I think we've moved to that degree in some way. We've moved that way
    to some extent, but I think we can do more.
- speaker: Interviewer
  text: You want to get more of a presidential party, or at least more in tune with the national Democratic presidential party.
- speaker: Respondent
  text: I want it to have more input in national Democratic politics as far as platform, as far as choosing a candidate for
    president, as far as making the real, concerted, concentrated effort to become an advocate for middle America and what
    you might call the New South and all like this, which would be, I think, a voice of neither conservatism or liberalism.
    A voice of moderation. Down the middle. That's where the votes are and that's where the people are and where the problems
    are. And I think the state Democratic Party, not only here but all across the South, will do this. I think we've got to
    if we're going to elect a Democratic president even in 1976. A lot of people say, "Oh man, we've got it made in '76,"
    but I don't know who we have it made with. We can't sell Ted Kennedy here at this stage. Oh, I better not . . . but it
    will be very hard to sell a Kennedy here in this state.
- speaker: Interviewer
  text: Do you think with your congressional background you can do more of this as governor than some of the other people
    have in the past?
- speaker: Respondent
  text: Well, I would say that I'm more comfortable in working in that environment than someone else who may not have been
    there. But as far as me having a great deal more input there because I was a congressman, other than just personal relationships
    with people that I know across the country or in Washington or whatever, I don't know. But I think, frankly, I think the
    people are . . . I think our people are going to look away from Washington for leadership. I think they'll look to guys
    like, well, now he's going to be a part of Washington . . . I think they'll look to guys like Bumpers for national leadership.
    I talked to Dale Bumpers for about an hour before he announced and I thought that what he should —he was just getting
    ready to go to a governors' conference. [Discussion of which governors' conference.] In March. I said, "You ought to go
    up there and ask for thirty minutes' time. Get NBC, ABC, CBS up there. Say 'my fellow governors, and ladies and gentlemen,
    I hereby announce my candidacy for president of the United States. And I'm not going to run from Washington or from the
    United States Senate or from a governor's office. I'm going to run from Charleston, Arkansas, over the Dairy Queen store,
    and I'm going to run it on $100 contributions and $10 contributions. I'm going on a lecture circuit to support my family
    for the next two years. And if this country's in the state where we have to go to the Senate or the Congress or governor's
    office to choose a man to lead this country, and we can't elect someone from grassroots America, then we're in bad shape.'"
    I think, knowing him, knowing his abilities to get on that tube and communicate, and knowing how totally hungry the Dan
    Rathers and Eric Sevareids and all those people in Washington are for something fresh, something new, and for a proven
    leader without scars, who had done a lot for the state, totally clean, articulate, and young. I think he could have been
    elected president of the United States. I think he could have gotten the nomination at the Democratic convention this
    way. I was the only one who seemed to feel like this but I wish . . . I thought he could have done it. I think America
    is ready for that type of candidate.
- speaker: Interviewer
  text: argued that in a piece that he wrote from Seattle.
- speaker: Respondent
  text: About Bumpers?
- speaker: Interviewer
  text: No, about the leadership will be coming not from Washington but from the state capitals. The increasing prestige and
    stature of state governors as compared to the last couple of years. Let me get back to the reform of the state Democratic
    Party.
- speaker: Interviewer
  text: Some of the people we've talked to have argued that they don't want it any stronger. They don't want it any more organized
    into something that has the aspects of a machine. What more could you do? You've only got one senator and one representative
    in the general assembly that are Republican.
- speaker: Interviewer
  text: That the Republican Party is so weak in this state that for the Democratic Party to become stronger would put it in
    a position of sort of strangling any sort of two-party system.
- speaker: Respondent
  text: Well, I think when they're talking about getting too strong they may be talking about too much executive control over
    it. Do you think?
- speaker: Interviewer
  text: Talking about another Faubus kind of machine.
- speaker: Respondent
  text: Yeah. Frankly, internally, for the state of Arkansas for state politics, I can't get overexhilarated about trying
    to make the state party . . . I want it good. I want they should hold clean elections. We should keep moving in the area
    of certain reforms and so forth. But so far as making it stronger, it's pretty strong right now. And I don't know how
    much more strength we should have or how much more organization we should have. It's so much more operational and functional
    and organized now than it was seven or eight years ago, it's unbelievable. Like I say, we have nothing to relate it to
    because we had nothing to begin with. I said we didn't have a file cabinet.
- speaker: Interviewer
  text: Did you get involved in elected politics in 1960 for the legislature? Was that the first time that you ran? Say from
    1960 on, what are the basic changes you've seen, political changes.
- speaker: Interviewer
  text: Well, whenever you got actively involved in politics. Our book covers the period from 1948 through 1974. I don't think
    you're old enough to go way back to 1948 . . .
- speaker: Respondent
  text: Let's see. I was running for class president probably along about that time. What changes? Well, the University of
    Arkansas board of trustees is a possible example. Today the board of trustees at the University of Arkansas is made up
    of extremely capable and intelligent men. And college boards all around the state would be. There's a great movement,
    in this area. I've seen great change here because in past years we would see on many many boards and commissions nothing
    more than a raw political reward for employment. To something like the University of Arkansas board of trustees or to
    a highway commission job, or whatever. But now there is, not only in practice but also by public demand . . . they demand
    a higher quality individual to serve in these capacities. I've seen a remarkable and drastic change in the state legislature
    itself in the past fourteen years, since the time I went there. It's frankly not the same place.
- speaker: Interviewer
  text: Is that the result of reapportionment?
- speaker: Respondent
  text: It's the result of time and it's the result of people . . . I think it's the result of people wanting to be a part
    of the system. For some reason or another it is attracting better people. Maybe because its affluence or something. Many
    young people now are getting to the stage where they can afford to accept a hundred dollars a month and go to the state
    legislature. Maybe it's because the people are demanding better representation. Reapportionment evidently certainly has
    something to do with this. There's just a higher standard in the state legislature. There's just a higher standard. I
    think people who, fourteen years ago, would introduce what we'd call a revenue bill . . . and when I'm talking about revenue
    bill, I'm talking about a bill that would bring some special interest to make them kill the bill or not bring it up or
    to bring it up or whatever. I think people who would do that now would be totally ostracized from the state legislature.
    Fourteen years ago it was kind of the accepted thing. Everybody kind of laughed about it and went on about their business.
    But now I think there would be a total ostracizing of that legislator.
- speaker: Interviewer
  text: Any other changes?
- speaker: Respondent
  text: Better staff for the legislative council. More strength in the joint budget committee and in the legislative council.
    They meet kind of constantly throughout the year where they used to meet right before the state legislature went into
    session. There's more money in the state and as a result, I think, they've upgraded the departments and have been able
    to attract better people into real positions of influence within the state government. We're going to have to address
    ourselves to that soon. In special session. Going to have to raise the salaries for some people. University of Arkansas
    today I think to their president pays $35,000. Maybe $35,700 or something. And I'm sure we're going to have to update
    that in order to get, to attract the right kind of president here. Football coach is paid $35,000. At one time he made
    more than the president. But now the president makes more than he does. Everybody makes more than the governor. That poor
    guy makes ten grand and that's kind of a bad situation.
- speaker: Interviewer
  text: How important do you view the need for a new constitution?
- speaker: Respondent
  text: I worked a lot for a new constitution in the early '60s. Travelled around the state and I think the one time referred
