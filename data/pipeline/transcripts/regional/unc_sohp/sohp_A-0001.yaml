collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Let me ask you first just a little bit about your own background and how you got involved politically.
- speaker: Respondent
  text: Well, I'm a late comer to the political scene. By training I'm a biologist all of my degrees, bachelor's through doctorate
    being in the area of biology. Entered into college administration about five or six years ago serving as academic dean
    at Miles College after serving as chairman of the natural science division. I came to the center here, Alabama Center
    for Higher Education, in '70 and sort of got into the political arena without any planning. I was approached by a group
    of young blacks that was interested in trying to run some people for offices here in the city in the city election. They
    were particularly interested in trying to support what they considered to be new faces. People with new ways of thinking.
    And so I was contacted one night while sitting here in my office working. Just received a phone call from a friend of
    mine and asked if I'd come to a meeting. And I was asked if I would agree to run for... frankly, I was asked to agree
    to run for mayor that year. I said no and then I was asked if I'd run for city council. So I did and I ran and that was
    in '71. That was really my first effort at any political office. I had qualified to run for the state board of education
    about two years prior to that time, only to learn after qualifying that the law does not allow an educator to run for
    the state board of education unless he has been out of education for at least five years. So I had to withdraw.
- speaker: Interviewer
  text: Did you have the support of the Progressive Democrats of Jefferson County?
- speaker: Respondent
  text: I was endorsed on the ballot of the Progressive Democrats when the ballot came out. I did not consult with the Progressive
    Democratic Council at the time that I entered the race. However, my feeling was that I thought I was in a position that
    I would get support from the Progressive Democratic Council. It turns out I was right. I could have been wrong, but I
    did not feel at the time that the Council could afford to not endorse me. But anyway, I was supported. I did get the endorsement.
- speaker: Interviewer
  text: You're how old now?
- speaker: Respondent
  text: I'm 39 years old.
- speaker: Interviewer
  text: Tell me a little about your experience on council? Did you have any prior political experience at all? Any party activities?
- speaker: Respondent
  text: No, I had none at all. I think I was becoming more and more aware of the need for blacks, particularly some of the
    younger blacks and some who have sort of reaped some of the benefits of older blacks in terms of getting education and
    some of the other benefits that blacks are enjoying as they move to the middle class. I think I was becoming increasingly
    sensitive to the need for us to become involved in the political situation and what the political situation means for
    blacks. And the hope that it holds for blacks in terms of achieving what I consider to be full equality and freedom for
    black people in this country. But I had never before participated in the political race. In fact I don't believe I had
    ever even worked in a political race for a candidate. I sort of kept an interest in it as a voter and that was about it.
- speaker: Interviewer
  text: What happened after you got in that council race? How did you campaign?
- speaker: Respondent
  text: Well, I was at somewhat of an advantage. I had just come from the position as academic dean at Mills College. And
    so I wasn't completely unknown here in the Birmingham area. Having served as academic dean at Mills College at which time,
    of course, Lucius Pitts was president of Mills College and was very active in this community and widely recognized as
    sort of a black leader in this community. I had worked with Lucius Pitts so I had gotten quite a bit of exposure to citizen
    groups in the community. So I wasn't unknown. I had taken the responsibility at the time the black citizens in Birmingham
    first approached the city government and power structure in this city to do something about police brutality in this city
    and all of this eventually resulted in the formation of the community action committee, the ONB, which you may have heard
    something about. Which is a biracial committee here that deals with problems here and I think it's made some significant
    strides in helping to alleviate some of the tensions, racial tensions and deal with some of the problems in this community.
    I, at that time, was asked by Dr. Pitts to serve as a person who drafted most of the documents that were sent to the group
    and so I got in on some of those meetings. So I was among what was called the twenty-one concerned black citizens who
    did go before the city government, representatives of the city government and people in the power structure here in this
    town to ask them to do something about some of the problems affecting black folks, which we felt that they could do something
    about. So what I'm saying is that I had had some exposure to some of the leaders here, limited exposure. I was known from
    my work as an educator particularly because I was connected with Miles College here in Birmingham. So I wasn't completely
    unknown. When I entered the race I got quite a bit of support. First of all, financial support. I got what I thought was
    good financial support, contributions, mainly from the white community. About $7-8,000 I raised in soliciting campaign
    funds. $6,000 of that came from people in the white community and they were mainly people who had had an interest in Mills
    College and who I had known at Mills College. I got some help from the local Democratic party in the runoff - I did -
    the county party - some financial help. And I got some assistance and some advice, particularly once I made it to the
    runoff, from veteran politicians, particularly David Vann, who is now on the Birmingham city council and who was also
    running for office at that time. Made certain suggestions. But in the general election, in a field of about nearly thirty
    candidates, I ran third in that field. That was in the general election. Behind two of the incumbents. I failed by about...
    somewhere less than 3,000 votes of winning without going into a runoff. I still feel that I would have won except about
    6,000 votes were obviously invalidated because you had, in our system... for the city council you must vote for five people
    or the machine doesn't register your vote. And it has been projected, based on comparisons made in the mayor's race and
    in the council race that possibly some 16,000 votes were invalidated. And the differences showed up mainly in predominantly
    black boxes. I, of course, got my strongest support in predominantly black boxes so I felt that I lost quite a few votes
    in that race.
- speaker: Interviewer
  text: Let me ask you one more thing about your background. Are you a native of Birmingham?
- speaker: Respondent
  text: Well, I consider myself to be, but I'm originally from Livingston, Alabama, which is down in the black belt area.
    My father and mother were sharecroppers down in Livingston, Alabama, which is about one hundred and some odd miles southwest
    of Birmingham. When I was four years old my dad and mom moved to Birmingham to work. My dad took a job in the steel mills
    here in Birmingham where he is, incidentally, still working. And so since four years of age I've been living in the Birmingham
    area. So I sort of consider myself a native of Birmingham because I grew up here. I went to elementary and high school
    and even through undergraduate school here in Birmingham. And the only time I ever left this city for any length of time
    has been when I've gone off to school to study and I've always come back here.
- speaker: Interviewer
  text: How do you assess Operation New Birmingham?
- speaker: Respondent
  text: Well, I think it has done some good things here. I alluded to that a moment ago when I was talking about the CAC committee.
    Operation New Birmingham, of course, is unquestionably a powerful organization here because it has the leading civic figures
    and businessmen and so forth in the community on Operation New Birmingham. So I think it has done some good things here.
    I think it has been... I think it has made a few awkward moves that it should not have made and it has put a sort of bitter
    taste in the mouths of some of the citizens, particularly in the minority community. I tend to think that if you try to
    weigh the pluses and the minuses, the negatives, that Operation New Birmingham certainly has done more good for the city
    than it has done harm. I think right now... a couple of things that people dislike. A number of people, particularly blacks,
    dislike about Operation New Birmingham. One was the role that Operation New Birmingham played in the last city election.
    Through the organization called... the acronym was BAG... I can't even remember what that stands for...
- speaker: Interviewer
  text: Birmingham Action Group.
- speaker: Respondent
  text: Yeah, Birmingham Action Group. And despite all the denials that have been made by officials of Operation New Birmingham
    about their role, I think it is pretty obvious to anybody who bothers to look into it that Operation New Birmingham did
    indeed play a role in re-electing the incumbents. Now that, in and of itself, was not so bad, but I think it was the tactics
    that were used. Which was in a very subtle sense an appeal back to, you know, the racist appeal, racist feelings or emotions.
    And people resent that about Operation New Birmingham and I think that resentment was reflected in the demand a citizen
    made recently that Operation New Birmingham be taken out of the community participation plan the city government had come
    up with, or the mayor's office had come up with. But I think that Operation New Birmingham has played an important role
    in helping this city to move along. Now, again, the problem with Operation New Birmingham is that I think it wants to
    define when, where and at what pace progress and change will be made in this community. And it has been composed, largely,
    of people of upper income. Some middle income people. But mainly people who are identified as being in the power structure.
    So it has not, in the past, been inclusive enough. I think it's taken some steps to try to correct that. Secondly, I think
    it's overly sensitive to criticism. Apparently so many people, in Operation New Birmingham, feel that they never do anything
    wrong. Whatever Operation New Birmingham supports, that's it. That is obviously not true.
- speaker: Interviewer
  text: How valid is the criticism that Operation New Birmingham is overly concerned with image as opposed to substance?
- speaker: Respondent
  text: I think number one priority is image. It has done some things of substance, but Operation New Birmingham had, first
    of all, to try to change the image of this city. And it has done that. And it has worked to do that. So I think that's
    a valid criticism. Now, I think if also you look at the progress we've made, you'll see that there are certainly some
    positive things—
- speaker: Interviewer
  text: What would be some of these positive things?
- speaker: Respondent
  text: Well, I feel that, to a large extent, we have opened our... first of all... communication. Operation New Birmingham
    honestly gets the credit, I think, for that. And Operation New Birmingham did take the lead, at the request of the black
    citizens, the black citizens group that was called twenty-one concerned citizens, to set up some mechanism whereby there
    could be some discussions held, problems. That in itself, for Birmingham, represented a significant change in posture.
    Secondly, Operation New Birmingham has worked to help getting blacks placed on boards, some of the boards. Nowhere I must
    say that I think Operation New Birmingham takes too much of the credit. In some of its literature it takes credit for
    just about every black that was appointed to a board. And being a member of the Birmingham city council, I know that that
    is not the case at all. We have a council that's sensitive to blacks being on boards because of the black political power
    here in this community. But Operation New Birmingham has certainly moved to support the efforts to get the black judge
    in the city of Birmingham and I don't question that it did swing some votes on the council that were necessary to get
    a black judge elected. Places like the personnel board, a three-member board that's very powerful in this city, controlling
    personnel policy for cities over 5,000 in this county. Operation New Birmingham got the first black appointed there and
    I think this was really as a direct result of Operation New Birmingham. Operation New Birmingham has gone out to try to
    involve the community, at least provide a channel through which members of the community, particularly in minority community,
    could at least present problems to city government or present problems to, say, Operation New Birmingham. For example,
    concern about food stamps, distribution of food stamps to the poor. Operation New Birmingham has certainly worked in that
    area. It is working some in the area of education. It has not done a lot there, but it is beginning to work there. It
    has worked some in the area of police-community relations and trying to get black police officers employed in... more
    particularly, recruiting them to take the examination to increase the number of blacks on the Birmingham police force.
    I think Operation New Birmingham has played an important role in that. So things of that sort, Operation New Birmingham
    certainly has helped within this city.
- speaker: Interviewer
  text: Can you explain to me what happened in so far as that last city election? Particularly... Well, let me tell you what
    I know. As I understand it... Two things, and I'm particularly interested in one. One, I understand that the Progressive
    Democrats did not endorse... endorsed a biracial slate even though there were some additional black candidates. And that
    this had an adverse effect in the black community toward them. Two, that subsequent to the election, one of the incumbent
