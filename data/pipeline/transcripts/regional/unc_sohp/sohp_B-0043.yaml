collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I'm interested in the general question of what motivated you to take the stand that you took at that time, whether
    it was a question of your academic freedom or a vindication of law and order or whether you felt there was specific injustice
    being done in the South in the separate school systems, or how exactly you thought about it if you thought about it at
    the time. In other words, when came out, you, I notice in your review of it, were critical of the decision in some ways,
    but you ended up defending the case ultimately.
- speaker: Respondent
  text: I never really thought of it in terms of taking a stand on anything. It all started because I was teaching the course
    in Constitutional Law. And I taught the course basically the way it was taught all over the country, the way I would have
    taught it anywhere else in the country, and that assumes that Supreme Court decisions are law and at some point, to some
    extent, ought to be complied with. And so I never really consciously took a stand on anything. I started out just teaching
    a normal Constitutional Law course. And the only thing that made that unusual or got me in hot water was that that normal
    approach toward constitutional law and the authority of the Supreme Court was contrary to the basic approach which these
    Citizens Council types took. And that was that the Supreme Court didn't have the authority, and that there wasn't any
    duty to comply. So I started out, really, in complete innocence, just doing what a constitutional law professor would
    have done anywhere in the country, and the only thing that made it unusual was the time and the place. They apparently
    wanted the Con Law course taught kind of like it would have been taught at a Citizens Council rally. And I wasn't about
    to do that. But I didn't start out to take a stand or be a hero or anything like that. I got in hot water initially because
    of the way I taught the course.
- speaker: Interviewer
  text: Were there other people teaching Con Law?
- speaker: Respondent
  text: No, at that time we had a very small faculty and a relatively small student body. And I was the only Constitutional
    Law teacher.
- speaker: Interviewer
  text: So in effect you were the only one in the State of Mississippi.
- speaker: Respondent
  text: That's right, because it was the only accredited law school in the State of Mississippi, and almost all of the people
    who become practicing lawyers and judges and influential politicians in Mississippi at that time went to the Ole Miss
    Law School. So I can see—I could begin to see even in the late fifties—why, from the point of view of my critics, I was
    what they called me, a "dangerous man," because the Ole Miss Law School was the throat through which the future lawyers
    and judges and leaders of the state went. And here was this guy Murphy up there who was teaching them things that were
    subversive of the Mississippi way of life. I can understand why they thought I was dangerous. But it didn't occur to me
    initially that I was taking a stand on anything, and I certainly didn't set out to be a hero or a martyr or anything.
    But it started out in the classroom, and then it did go beyond the classroom but still well within the academic area.
    I began to publish some book reviews. And then when I wrote this doctoral dissertation, which was a comparative analysis
    of the Articles of Confederation and the Constitution and which really was contrary to the whole concept of state sovereignty,
    I began to publish it as a series of articles in the law review. That engendered some opposition.
- speaker: Interviewer
  text: But that was equally accidental.
- speaker: Respondent
  text: Yes, I didn't set out to become a troublemaker in Mississippi. Nothing was ever farther from my mind. I later compared
    myself with the innocent bystander who gets bit by a mad dog. I had no earthly idea that it would end up the way it did
    when I began to pursue my teaching and my writing activities. It just happened that the way I taught and what I wrote
    turned out to be directly contrary to what many influential Mississippians believed, and so they decided they had to get
    rid of me. And I had to decide whether I was going to keep on writing and teaching the way that I thought I ought to,
    or whether I was going to knuckle under to these people, and at that point I did have to take a stand.
- speaker: Interviewer
  text: But you never took any joy in… Like in your review of Kilpatrick's book, you said that…
- speaker: Respondent
  text: That was another thing that caught the attention of the Citizens Council people, and after I published that review
    one of the Citizens Council leaders reviewed my review in a later issue of the same journal, and so that brought me to
    their attention. Then at another point I wrote a letter to the newspaper…
- speaker: Interviewer
  text: But that doesn't seem so routine; that doesn't seem like it's just in the line of duty. You seemed to take a little
    joy in digging at Kilpatrick in that.
- speaker: Respondent
  text: Kilpatrick's book revived the long-discredited doctrine of state interposition and nullification and put it forward
    in the 1950's as a valid, credible Constitutional position. And that book was very influential, because a lot of southern
    states actually passed interposition resolutions. Now that's utterly preposterous, and I thought somebody ought to say
    so. I can't remember now whether I told the people I'd like to review it, or whether they came and asked me to. It could
    have happened either way, but I don't remember now. That was a mischievous book that man wrote. It caused a lot of trouble.
- speaker: Interviewer
  text: But that was still within your bailiwick; it was constitutional law.
- speaker: Respondent
  text: Your classroom teaching and your publications in your area of competence are within the narrowest ambit of academic
    freedom. The very narrowest concept of academic freedom would embrace that. And everything I did was within that ambit,
    with the one possible exception of the letter I wrote to the newspaper in which I did defend the function and role of
    the Supreme Court in our constitutional system. I guess you could say there did come a point where I felt some obligation
    to try to counteract erroneous propaganda with what I conceived to be the truth of things. But I never did go up and down
    the state on a soapbox urging integration and talking about racial injustice. And I never got up at Bar Association meetings
    and made flag-waving speeches. I never was a civil rights activist in that sense. If I had been, I could have more readily
    comprehended the violence of these people's reaction to me. But nothing that I did was in that category. It was all either
    my classroom teaching or my legal publications or, in a couple of instances, letters to newspapers. And I very quickly
    got cured of that, writing letters to newspapers.
- speaker: Interviewer
  text: Can you think of any examples of constitutional law professors at southern universities that set the Citizens Council
    idea of what a constitutional law professor should be?
- speaker: Respondent
  text: Not a single one that I ever knew was any different, basically, in his approach to the course than I was.
- speaker: Interviewer
  text: Did they have trouble in Alabama or Louisiana? Were there other professors in positions similar to yours? What kind
    of reaction did they make in their states?
- speaker: Respondent
  text: I know that no other constitutional law professor at any other southern law school went through the four years of
    controversy that I did between 1958 and 1962. I had a counterpart, Jay Murphy, at Alabama, who was a constitutional law
    and labor law professor. And they had a resistance group in Alabama, as Mississippi did, but to my knowledge they never
    made any efforts to get Jay Murphy fired from the law faculty. And I don't think they ever tried to purge people from
    the University of Alabama the way they did from the University of Mississippi. And I think maybe the reason was not because
    the resistance group was any less strong in their views, but that the University of Alabama was in a better position than
    the University of Mississippi was with respect to being insulated from direct political interference. They did it in Mississippi
    because they thought they could do it successfully, because the University of Mississippi had no history or tradition
    of insulation from political interference and domination. And I think the University of Alabama was not in as precarious
    a position as Ole Miss was. It didn't happen in Texas; it didn't happen in Arkansas; it didn't happen in Louisiana; it
    didn't happen in Tennessee; it didn't happen in Georgia; it didn't happen, so far as I know, to anybody in North and South
    Carolina or Florida. Now this is not to say that those constitutional law professors may not have had their problems,
    their criticisms, from alumni and whatnot. But I think it is true that I was the only constitutional law professor in
    any southern law school who underwent a period of four-year controversy in which serious, sustained, prolonged efforts
    were made to get me fired or to force my resignation, and where it surfaced in the Alumni Association and the Legislature
    and the Board of Trustees of the University system. I know no other law professor went through that or anything comparable.
    In that respect Ole Miss and Murphy were unique. A hell of a way to achieve uniqueness.
- speaker: Interviewer
  text: Even though you say that you were just doing your job and it was within the realm of academic freedom, the school
    desegregation cases really are different. Did you have any feelings about them one way or another? If someone else had
    been teaching constitutional law in the South, Mr. Loewy or Mr. Strong or somebody had been in your position, I think
    it really would have been different because you were from Memphis, which is sixty miles away. You were a southerner; that
    was your home. And so did you think about the substance of the cases? You would have been forced to, I guess.
- speaker: Respondent
  text: Well, sure, and I wouldn't want you or anybody to think that I was a 100 percent defender of this opinion in Brown
    v. Board of Education. At that time and today, I am critical of the way the opinion was written and some of the premises
    upon which the opinion rested, and I think I voiced some of those criticisms in my review of the book about Brown. And
    I still criticize that opinion today when I teach Con Law, and I think most constitutional law professors (I'm not talking
    about the result of the case now; I'm talking about the opinion that Warren wrote) do not think highly of that opinion.
    Now so far as the result is concerned, segregation is out… I grew up in a segregated system, not just schools but streetcars
    and then buses when they came along, where the black people had to get on the front of a streetcar or bus and work their
    way all the way to the back to try to find a seat in the back of the bus or a streetcar. And where if they wanted to go
    to a movie theater, they had to go in a side door rather than the front door on the main street, and they had to go sit
    in the back rows way up in the balcony.
- speaker: Interviewer
  text: You're talking about in Memphis.
- speaker: Respondent
  text: Yes, I'm describing the segregated system that I grew up under and took for granted all the time I was growing up,
    without ever giving it a thought. And you'd go in the stores, and here was a water fountain with a sign "White Only" or
    a restroom, "White Only." And maybe there wouldn't be any water fountain or restroom for black people. And I grew up under
    that system, and I never gave it much of a thought until long after I became an adult. I guess I first began to think
    about it, maybe, when I was in the Navy during World War II, and then when I was in law school. And I guess it's fair
    to say that by the time I started teaching at Ole Miss, I had come to the conclusion in my own mind that segregation was
    wrong and that something ought to be done about it, and not just segregation but racial injustice across the board. My
    God, I was thirty years old before I really began to rethink all these things that I had grown up taking for granted.
    But I certainly was not an evangelist or a zealot or anything like that. But I suppose in honesty I would have to admit
    that I liked what the Supreme Court had done; I was glad they had done it. But I don't think I ever really said that to
    anybody in Mississippi or in class. And I don't think even today students could accuse me of being a propagandist in any
    of my classes. I think it's part of a professor's duty to try to fairly lay out different points of view, and I never
    did try to proselyte in class. But I guess it's inevitable that maybe the emphasis and the nuances and whatnot of the
    way you teach reflect your own personal views, so I will admit yes, by the time Brown came down I was an emancipated southern
    white man at that point in my own thinking.
- speaker: Interviewer
  text: Dr. Hall pointed out that two months after you left Ole Miss, James Meredith came, and that the same people…
- speaker: Respondent
  text: Just one month. We moved away in August of '62, and he got there either late August or early September.
- speaker: Interviewer
  text: And the same people that had been after your scalp didn't even have to leave their positions. They were all in position
    to go after him, and in a way it was the same battle all over again. I think they hesitated to bully you, the Governor;
    they bullied you in subtler ways because maybe they were a little more afraid of you than they were of him. But you really
    prepared the way for him to a certain extent. What Dr. Hall said was without whites in positions of responsibility in
    the late forties and fifties and early sixties, the black civil rights movement wouldn't have been possible. Would you
    agree with that? You held the door open for somebody like Meredith, for example.
- speaker: Respondent
  text: I never thought of putting it exactly that way because what happened to James Meredith so far transcended what happened
    to me that, although the basic underlying conflict is the same, the personal experience that he underwent was vastly different.
