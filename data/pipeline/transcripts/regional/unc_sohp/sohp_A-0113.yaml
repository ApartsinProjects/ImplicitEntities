turns:
- speaker: Interviewer
  text: How did you get active in the Republican Party?
- speaker: Respondent
  text: I was born Democrat. Family Democrat. I was not active in civic clubs, that sort of thing. Went to church. That's
    about all. Outside of making a buck. The state of the nation didn't look very good to me. I was receptive maybe to some
    activity. I voted Republican. My first vote was for Eisenhower in 1952. But I thought the real good guys were the southern
    Democrats. But then people come to me, my predecessor, he'd say you need to get active. I'd say, "Well, I'm not a community
    leader. Let's go and see a friend of Bank." And all these leaders. These guys running Red Cross drives and all. And I
    began to see maybe they were fakes. A little strong word, maybe. You know, I'd say this needs to be done. But I could
    see by and large that type of political leaders were pretty much followers. They go where the wind goes. At least on political
    and philosophical issues as a rule. And so I'd wind up taking on Republican chairman, county chairman, that sort of thing.
    And just devolved more into it.
- speaker: Interviewer
  text: What period was this?
- speaker: Respondent
  text: I did a little bit, very little bit, in the first Nixon campaign in '60. County chairman not long after that and got
    pretty active I'd say '63 in the governor's race and appreciably more so when became state finance chairman in '65 and
    then state chairman in '66.
- speaker: Interviewer
  text: You had been chairman for how long?
- speaker: Respondent
  text: I think ten years. A long time.
- speaker: Interviewer
  text: So you and he are really the only two chairmen of the Republican Party has had in Mississippi in the modern era? What
    was the Republican Party in those days, early '60s?
- speaker: Respondent
  text: Well, by the time I got up here it had devolved into something. started. He went through the competition . . . wasn't
    until '56 that you had the party recognized. Part of that time Perry Howard, black lawyer in Washington, voted the delegation.
    Then they seated . . . the '56 convention as I recall, understand it—before my time—both units, you know, with the understanding
    that the evolving group in the state, the viable party to be, would be recognized de facto and then be fully credited
    at the next convention.
- speaker: Interviewer
  text: What major changes occurred in that time until this time in the party?
- speaker: Respondent
  text: Well, you make all the mistakes you can make. Like, you know, in '64. The thinking . . . I wasn't part of it, but
    I don't feel I'd have any different position . . . was that it was all That the Republican candidate is the conservative
    party. —if you want to call it that. The effective control of the party by the conservatives, which I think is now in
    question. So . . . they had the absurd notion we don't want to run anybody on the ticket and we want to be sure to carry
    the state for Goldwater. One congressman ran and was elected. With the type vote we had we could have elected five. But
    . . . at the time I remember Reston was writing about filing deadline time that Rockefeller had a chance, about as much
    chance of losing the nomination as he did of going broke. That was the smart thing in the United States, see. So it was
    obvious that had the convention sewn up before the delegates left their front porch. It was evident. So, people didn't
    run, not knowing, well, how things were going. Alabama did. And they did very well on the strength of it. That was one
    thing we did wrong. Then there was the governor's race. Then, of course, going through the race and problems and all.
- speaker: Interviewer
  text: That was what year and who was the candidate?
- speaker: Respondent
  text: '''63. Rubel Phillips. I worked for him. I opposed his candidacy on the basis of his . . . I didn''t feel his philosophy
    was . . . I opposed it in the very small group that made the decision. I thought this guy was a Democrat and the last
    one in the field at the time. But he did well and he was a good candidate.'
- speaker: Interviewer
  text: Wasn't he sort of a former Truman Democrat?
- speaker: Respondent
  text: Yeah, and Rockefeller Republican or whatever. You know, I don't think . . . at the time I thought it would be a mistake.
    However, he did a good job.
- speaker: Interviewer
  text: Didn't he get about thirty-eight, thirty-nine percent of the vote?
- speaker: Respondent
  text: Right. Close to forty.
- speaker: Interviewer
  text: He got the same percentage that Gil Carmichael got. The state hasn't voted for a Democratic nominee for president
    since the '50s. Had enormous pluralities for Goldwater, for Nixon.
- speaker: Interviewer
  text: Yet it's apparent . . . you look at Phillips' race in '63. Thirty-eight percent of the vote. Carmichael the same thing.
    There's really no growth in the Republican vote statewide. At least it doesn't appear that way for statewide office. To
    what do you attribute that? Didn't you think back in '64 with that victory that it was the beginning of kind of a new
    era for Republicans?
- speaker: Respondent
  text: We did. The leadership the time did. I wasn't that active at that level. Came on the central committee in '64 at that
    convention. Anyway . . . eighty-seven percent . . . by the way, the vote like it was, it was no campaign run in the state.
    So in effect this was a very bad thing. Like inheriting free money or something. We looked like . . . we were a paper
    tiger. That vote was just there. They did nothing. We optioned . . . spent no money in the state, ran no campaign. You
    know, because it wasn't necessary. So we looked like we'd done something and we hadn't done anything. The next year nothing
    happened. We had no fundraising, no activities, no anything.
- speaker: Interviewer
  text: So '64 was strictly a personality contest.
- speaker: Respondent
  text: All the way.
- speaker: Interviewer
  text: Nothing really happened.
- speaker: Respondent
  text: That's right. See, first off, our statewide races are not in the same year, for one thing. So it really . . . if anything,
    it hurt us.
- speaker: Interviewer
  text: and he won it.
- speaker: Respondent
  text: That's right. He won. So there was nothing else going on . . .
- speaker: Interviewer
  text: So you think you made a mistake by not fielding . . .
- speaker: Respondent
  text: Absolutely, absolutely. I mean, I think names on the ballot would have probably won that race, with that type of vote
    and that type of feeling. So that was bad. We made . . . you know, this last go-around, we went through the motions in
    the presidential campaign, which we didn't even do in '64. Although it was almost as certain this time. Or it was as certain
    but the percentage was almost as high. But we wanted to try to get some advantage out of it, some advantage, a little
    of the action. But in '64 we just stood . . . I remember seeing it written up in some national magazine. How the organization
    in Mississippi . . . wasn't so. Wasn't there. In the second governor's race, which was a loser, Phillips did not want
    to run. We urged him to run. Very bad situation. John Bell had just been kicked out. John Bell Williams. Of his chairmanship
    of the state commerce commission. Because of having supported Goldwater. So that made him a hero to all Mississippians.
    He was conservative, Goldwater supporter and all. So, we didn't have much . . . still, he got about thirty, I guess.
- speaker: Interviewer
  text: Do the people in this state see national politics completely different than state politics?
- speaker: Respondent
  text: Yeah. That's the problem. That's the goal.
- speaker: Interviewer
  text: Well, does it also mean they don't see the parties as two distinctive units but rather as a personality thing?
- speaker: Respondent
  text: Well, it's always been . . . politics has always been personality. One party system. You have personality. I mean
    they can serve up the Bilbos, the Barnetts. They come in . . . a governor comes in, an unknown, and you leave highly unpopular.
    Anyway, that's what we're going against, you might say. So we're to the point . . . I don't take a poll of party identification
    . . . in the beginning it would probably have been ninety percent Democrat and eight percent independent and two or three
    Republican.
- speaker: Interviewer
  text: Republican Party in Mississippi see itself as basically kind of a philosophical thing. Ideological rather than—
- speaker: Respondent
  text: Right, right.
- speaker: Interviewer
  text: —haven't been able to do anything with it.
- speaker: Respondent
  text: Right. Once you've done that, you're here. You're the dominant party. I accept this philosophically. Changes in a
    republic or especially changes under your old system will come slow. If they don't come slow, they'll be volatile, like
    a banana republic. I accept this difficult problem with party identification, especially also in an era where parties
    and politics per se was down. Every Mississippian thinks he's independent, votes for the man, doesn't care much what party
    he's in. But there's an increasing number of people that will identify with the Republican Party. The polls show it. It
    looms higher in presidential elections or maybe in a strong election where we've got something going or in certain pockets
    of the state. This county, Jones County, the coast, and areas where . . . that is the goal and the opposition is the personality
    politics. We're trying to sell the two-party system concept. The idea of philosophically different parties to people.
- speaker: Interviewer
  text: Has it been tough to sell?
- speaker: Respondent
  text: Well, no tougher than I anticipated. Although sometimes I get more optimistic—say after the Goldwater race. But I
    mean in hindsight that was foolish optimism. And going to the race thing, that was the overwhelming, overshadowing issue
    of all. It's hard to perpetuate reasons through that climate. Now that's no longer there and I think some reason . . .
    our salesmanship should be more effective.
- speaker: Interviewer
  text: But do you see the state continuing to vote Republican at the presidential level and Democratic at the state level?
- speaker: Respondent
  text: Definitely Republican at the presidential level. And we hope—more than that, I believe—we'll make increasing gains
    in the state.
- speaker: Interviewer
  text: In 1968, of course, the state voted overwhelmingly for George Wallace. I think Nixon ran even behind Humphrey. Third.
- speaker: Respondent
  text: Got the lowest vote in the nation, yeah.
- speaker: Interviewer
  text: Does that suggest Mississippians tend to vote for the more racially conservative candidate?
- speaker: Respondent
  text: Well, at the time of that race the race issue still was red hot, probably hotter than it had been even before. Nixon
    was an unknown. He was the fellow that was vice president way back and had been a defeated candidate for governor. He
    was an unknown quantity. Our polls showed, prior to the '68 election—Muskie ran twenty with Wallace and Nixon up around
    thirty with Nixon a head. I believe he would have carried the state in a three-way race last time. I think the Wallace
    vote was independent, as a way station into the Republican Party, at least in the national picture.
- speaker: Interviewer
  text: What do you think will happen in '76 if Wallace actively campaigns for the national Democratic ticket, regardless
    of who is on it?
- speaker: Respondent
  text: I think would carry, without any work. I think we'll carry easily, let me put it that way.
- speaker: Interviewer
  text: You think the Republicans will carry.
- speaker: Respondent
  text: Yes. Any particular nominee I foresee coming out of the party or any nominee I foresee coming out of the Democratic
    Party.
- speaker: Interviewer
  text: Do you intend to field more candidates in '75 for the legislation and statewide office?
- speaker: Respondent
  text: The plan . . . leadership . . . is always to field more. You know, to get them. We haven't been as selective as we
    might be. We've had some good ones and we've had some bad ones. We've had some very good ones be beaten. We've a long
    way from the point where being a Republican is . . . I just hope we arrive at the point where it's equal.
- speaker: Interviewer
  text: Is that attitude changing, about Republicans? Somebody told us that ten years ago if you were a Republican—I forget
    what the term was—but that was about as low as you could get in terms of social status and prestige.
- speaker: Respondent
  text: Yeah, well, you have to go back a little farther than that. But that's right. There were so few they were oddities.
    But that part's right. But the beginning in the South of the Republican movement might have been—if it was anything, it
    was just the opposite. It was very peculiar being a country club crowd. It was the young guys. Someone wrote a book I
    thought covered it pretty well in one chapter about how it was kind of the thing to do. It was kind of a kick, you know,
    to get active in Republican politics. Because they'd never been involved in politics prior to that. Most of those people
    were young idealists or young businessmen. Across deep South, particularly Mississippi and Alabama.
- speaker: Interviewer
  text: Is it getting easier to recruit candidates?
- speaker: Interviewer
  text: How many candidates did the Republicans field for mayor last year?
- speaker: Respondent
  text: Gosh, I've got the exact figures down. We kept good records. It was a pretty good campaign. And we elected half of
    them. I think if we'd run twice as many we'd have elected half of those, too.
- speaker: Interviewer
  text: I'd like to check with you later and get those precise figures. Gil said around a hundred and elected half.
- speaker: Respondent
  text: I think we had in the range of two hundred total municipal officials, and elected about half.
- speaker: Interviewer
  text: Do you plan to challenge almost every legislative seat in '75?
- speaker: Respondent
  text: But we had some good people get wiped out in the last race. So in hindsight, we might have been better off starting
    at the bottom, so to speak.
- speaker: Interviewer
  text: How many legislators?
- speaker: Interviewer
  text: How many legislators were there at the peak? Republican.
- speaker: Respondent
  text: I've forgotten. Maybe like seven or eight.
- speaker: Interviewer
  text: To what do you attribute that? Four out of 162 or something. And yet you can get thirty-eight percent of the vote
    for a candidate for governor or for a candidate for the United States Senate.
- speaker: Respondent
  text: A candidate for the state looks at it, and say, "Why should I take the hard road when everybody else is running as
    a Democrat." So you have to have a zealot or whatnot to make that move. Or in an area where we've grown in strength, like
