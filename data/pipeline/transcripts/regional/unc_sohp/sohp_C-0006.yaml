source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I'd like to start and go all the way, way back and ask you a couple of questions about both your mother and your aunt.
    You said that both of them had gone to school; let's see, your mother went to Mary Baldwin and Atlanta Female College.
- speaker: Respondent
  text: You know I think maybe the Mary Baldwin has some connection with Atlanta Female. I'm not sure that those certificates
    are not from Mary Baldwin.
- speaker: Interviewer
  text: I see. Well, I was curious on why she went that far away to school. Do you have any idea?
- speaker: Respondent
  text: I really don't know why she selected that school, except they were looking for good schools and I think Mary Baldwin
    even back then had a reputation for being a good school. There were not as many schools, of course, back then for women
    as you had maybe up North.
- speaker: Interviewer
  text: Right. This is true. But, frequently women did go to just a seminary close at hand.
- speaker: Respondent
  text: Yes, they went to finishing schools more to take art and certain things. A good many went to St. Mary's. St. Mary's
    was an old school, well established. I told you I knew my great aunt was there at the end of the war . . .
- speaker: Interviewer
  text: Yes, you did.
- speaker: Respondent
  text: . . . so I know she was there before the end.
- speaker: Interviewer
  text: And then she went on to Queen's College, is that right?
- speaker: Respondent
  text: Now that's my great aunt. It's called Queen's now; it was not Queen's back then.
- speaker: Interviewer
  text: Did either your mother or your great aunt teach at all?
- speaker: Respondent
  text: They didn't teach, no. My mother was very literary and artistic and did painting and took lessons in painting and
    we have a number of her pieces of work; we have some paintings—oil paintings. I had a charcoal drawing. She did paintings
    on china that are very lovely. She did homes of different writers and poets. And then flowers and birds and other things;
    she would do the whole set of each one, very much like some I've seen at the Smithsonian in Washington, very much. So
    it evidently was the style at that time.
- speaker: Interviewer
  text: So in neither case were they going to school to . . . teach?
- speaker: Respondent
  text: Not to teach.
- speaker: Interviewer
  text: Not to be able to earn a living or anything, it was for the sake of education.
- speaker: Respondent
  text: For the sake of education. They did believe in education and no, neither of them taught ever.
- speaker: Interviewer
  text: OK, just curious. I asked you last time about people who'd been an important influence on you and you mentioned your
    great aunt as being someone who had influenced you.
- speaker: Respondent
  text: Yes. Aunt Georgie (Hicks) was lovely in both face and spirit and we loved each other dearly. She was brought up, of
    course, in the old school which believed in discipline much more than today. I notice quite a difference as I deal with
    young people. I have three grandsons and I meet their friends and see about the way discipline goes in that age and those
    three grandsons spread from nine to seventeen so I get enough examples to form some opinion. And I think that society
    has a difference in discipline. For instance, as a little child, one of the first things I recollect—we had a cook, we
    had a maid, we had a gardener, we had servants. But my sister and I were taught to do something. My parents believed that
    we ought to learn early that everybody had a certain obligation to the family. So I'd go out with my little basket and
    pick up chips of light-wood and splinters to start the fire the next morning. The fire would be made for us before we
    got out of bed. We had open fireplaces and it took a long time to warm the room at all, as you probably know if you lived
    in Maine. And later we replaced those fireplaces with stoves. But, nevertheless, you'd have a fire built just before you
    got up and it was very good to have something that made it burn quick, a hot fire. But I thought it was not necessary
    at all for me to have done it because we did have the other people who could do it, grown people who could have done it.
    But that was my job; that was my contribution to the family.
- speaker: Interviewer
  text: And this was when you were just . . .
- speaker: Respondent
  text: Very little, just as little, maybe four or five years old, maybe even three. But my parents believed in doing something
    for the family. And they believed in certain toughness, too. They constantly showed their love for us but they didn't
    believe in just cuddling you too much, coddling you, rather, too much. I remember that we had an open fire, we had the
    pitcher and washbowl, and it was awfully cold taking baths. But we—my sister and I—every morning were taught to bathe
    at least partially to toughen you so that you wouldn't catch cold when you'd go out. I don't think that it did much good,
    but in a way we learned we had to do certain things. And I don't think now, while everybody takes baths all the time,
    they're in a warm room, and plenty of hot water, and we didn't have a small pitcher. [laughter] I'm wondering if that
    is not partially the cause of some of the terrible things that are happening because people want to have something easy
    and want to have life easy and if that isn't leading to some of the bad things in the juvenile range—a lack of a sense
    of obligation.
- speaker: Interviewer
  text: We certainly have different expectations. I think, now, than people used to. Did your aunt do any church work or civic
    sorts of things?
- speaker: Respondent
  text: Did a great deal. Fayetteville was a town at that time of about 8,000 people and it was a historic town. La Fayette
    had visited there when he came back to America after the Revolution on his wonderful tour to meet the American people
    and they had a chance to thank him. In the center of the four streets was a market house on Main Street, Hay Street, Gillespie,
    and Green Streets, and they had this market house which blocked the streets, you had to go around it, you couldn't just
    go straight through. A lot of people—newcomers—came to Fayetteville and said the market house ought to be taken down because
    it was an obstruction to traffic but the older residents said no, this was very historic. It was called the Market House
    because it had meat shops inside. And originally, it was said that slaves had been sold there long before that. But there
    is some question as to that; that's disputed. But I think most of the older residents said that it got its name, the "Market
    House," not because of the marketing of slaves but because of the meat market. But anyway, they did say slaves were sold
    there, too. Well, with a heritage like that and La Fayette having been there when he was entertained in Fayetteville,
    the people wanted to maintain it and they needed money to do so. Having the meat markets in it had run it down and it
    looked dirty and run down inside, so the women in Fayetteville formed a civic club and my great aunt was president of
    it. So they raised money to fix up the market house and save it when the hue and cry came to pull it down. She was very
    active in both church and in civic work. I remember as a child, at that time I was about eight or nine years old, I would
    go around and sell tickets for the movies for the benefit of the Market House. We'd have a great time and many benefits
    for raising money for it. It is still there, by the way, and I think today nobody would think of taking it down but then
    it was a little different.
- speaker: Interviewer
  text: So she really set a model for you.
- speaker: Respondent
  text: Yes, I said that I was taught to take part, to do things, to try to help the community.
- speaker: Interviewer
  text: Yes, I think you've lived up to her . . .
- speaker: Respondent
  text: I don't know about that. [laughter] But at least I had the example.
- speaker: Interviewer
  text: Yes, I guess so.
- speaker: Respondent
  text: I don't remember my mother because I was just a year and a half old when she died, except what I've been told about
    her. But she was a very gracious, charming person and loved flowers and had beautiful flowers which still existed in my
    childhood. We had a green house and we had flowers, ferns and things, that were in there that would go through the winter,
    and beautiful hyacinths outdoors. Our yard had been landscaped so they had the English privet hedge borders, the little
    short hedge. She was noted for her flowers.
- speaker: Interviewer
  text: And that's all kept up after she had died.
- speaker: Respondent
  text: Yes, they still talked about the flowers. My aunt loves flowers, too, and so do I.
- speaker: Interviewer
  text: You also mentioned last time that you had started school. I think the first four or five years, first or five grades
    you went to a private school.
- speaker: Respondent
  text: Yes. My father and my aunt, too, were great believers in democracy. They thought that was the real gift of America
    and they also believed in a good foundation. So they sent my sister and me both to an excellent private school about two
    blocks from our home until we were ready to go into the fifth grade and that was quite an experience, too. It very much
    resembled the old fashioned one room schoolhouse.
- speaker: Interviewer
  text: Was this the private school you are talking about?
- speaker: Respondent
  text: Yes, this was a private school. There were two main teachers, sisters, Miss Alice and Carrie Mallett. One of them
    later married the ambassador to Cuba or the minister—I don't know what you call the one who goes to Cuba, a minister or
    ambassador. But he was Major Hale. She and her sister at that time had not married and they had this school in this large
    one story home to which along addition had been added. You'd go in a little entrance and there's one room there. Then
    you'd enter another room—great big room—and it had windows on two or three sides of the room and desks lined up by the
    windows. The center part was a stove and benches and you would go and recite in the center part so the others could listen
    if they wanted to and get what they said or they could study. There was also a smaller room for some of the older students.
    But something was always going on in the center part of the large, main classroom. It was quite an experience. They had
    spelling bees, too, with the different grades participating. One thing they stressed then, that I think was excellent—and
    I don't believe the schools are doing it today—was memorization of good literature, especially poetry. I find that those
    things that I memorized I still know and they are great source of comfort to me. Something comes up and you suddenly find
    out that you know poetry that answers exactly. I don't think they stress memory work today as much. The Malletts and their
    assistant, Miss Wetmore, were very good teachers and one of them was very strict. As I say, there was much more discipline
    then in school as well as at your home. I remember you'd get demerits if you disobeyed or if you made noise in the classroom
    because, of course, being in that room you had to behave or you couldn't learn at school.
- speaker: Interviewer
  text: How many students were there, do you know?
- speaker: Respondent
  text: I would say there were probably, I really don't know, it would be a guess, probably 50 to 75.
- speaker: Interviewer
  text: Really! That large?
- speaker: Respondent
  text: Yes. Grades went up. My sister was three years older than I and there were some there a little older than she. So
    they had a nursery, or rather pre-first grade for little children. It was a little better than nursery, a little bit higher.
    A kindergarten more apt which Miss Annie Wetmore taught. And then up until the teaching went beyond the fifth grade, but
    we transferred when we reached the fifth grade to go to the public school. As I said, my father especially wanted us to
    learn to get along with people generally. And so we did. We found out we had a very good foundation then and we enjoyed
    the public school. We had good teachers there, too. And of course the grades were larger, much larger, but nevertheless
    we liked it.
- speaker: Interviewer
  text: About how large was the public school? You said there were about 8,000 people in the town. Was the high school separate
    from the other grades in the public school?
- speaker: Respondent
  text: No, they were there all in one large building. We had assembly the first thing in the morning, which wouldn't be allowed
