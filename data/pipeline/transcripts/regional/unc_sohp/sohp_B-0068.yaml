source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: There was a Chamber committee at that time. I guess that was not the first. There was probably some antecedent history
    before that, Bill. That particular committee looked at other efforts in other places around the country. Durham was one,
    for example, which had had an abortive attempt at consolidation. Dr. Rankin, whom you may know over in the political science
    at Duke, was very heavily involved in that effort. I may be a little confused on chronology here, but it seems to me we
    looked at efforts in other places that, at that point, perhaps, had been unsuccessful but later became successful.
- speaker: Respondent
  text: Yeah. We've been in and out of this question at different points in the last ten or twelve years. As I remember, as
    we looked at it roughly around the '63 or '64 period, we gave some consideration to what the status of the effort was
    in both Jacksonville and Nashville as well as the results that had been somewhat disheartening up in Durham. I guess our
    conclusion there was, and you'll probably find this documented over in the Chamber files, was that consolidation was a
    worthwhile goal. That there were two ways of considering it. One was functional consolidation. Another was political consolidation.
    That the community seemed to have a good start on functional consolidation as it was. That probably the most important
    thing to consolidate politically or functionally was the school system which had already been consolidated here for some
    years. Some other things were on the verge of consolidation or were already consolidated, like the city-county tax office,
    for example. Some other functions that were subject to relatively easy merger. Therefore, there was really no tremendous
    impetus to attempt right at that time, '63 and '64 if that's when it was, I have no independent recollection of the years.
    Perhaps the better wisdom dictated the continuing efforts to functionally consolidate. One morning you'd wake up, and
    you'd be so close to it that to take the final steps would be relatively easy for everybody to accept. I guess that really
    is sort of the thesis of that particular study.
- speaker: Interviewer
  text: Then, I guess in about '67 or '68, the Chamber makes consolidation part of its program of work. Then, there's a Martin
    committee and the Griffith committee. Then, legislation and the Charter Commission. Why did it happen to come up at that
    time? Was there a particular stimulus that, or was it as you said, maybe you were sort of in the process of waking up
    and deciding that this was the logical . . .
- speaker: Respondent
  text: I don't know that there was any particular impetus to put it at that time rather than earlier or later except that
    that was just a time when the individuals who were particularly interested in the subject seemed to coalesce, I suppose
    you'd say, and say, "Well, let's get on with it. This is the thing we ought to do. Let's move forward with it." I think
    it was really more a result of specific persons who had specific ideas deciding that they'd like to have those ideas implemented.
    It's just the fact that those people seemed to come together and arrive at that conclusion at that time. I don't think
    there was any particular magic to having tried it at that time rather than some earlier or later time.
- speaker: Interviewer
  text: Who were some of those individuals? Mr. Lowe? Mr. Brookshire?
- speaker: Respondent
  text: Yeah. Lowe and Brookshire were, of course, very much involved. Stan Brookshire was the mayor at that time, and, I
    guess Charlie Lowe was chairman of the Board of County Commissioners at that time. He's been a chairman, been a commissioner,
    I was not sure whether he was chairman at that time. I guess he was. They were moving forces in it. One of the strongest
    personalities involved was sort of a quiet, behind-the-scenes personality was Charlie Crawford at the Chamber of Commerce.
    I'd say that he probably had more to do with the notion that it ought to be done and the result that this became a prime
    Chamber project, possibly, than anybody else. In other words, I think he had a great deal to do with the persuasion of
    people like Brookshire and Lowe and others.
- speaker: Interviewer
  text: I'm wondering, now . . . From what I've read, the Chamber was very important in establishing committees and getting
    the legislation passed and bringing the effort up. When, however, Brookshire and Lowe actually came to appointing members
    of the commission, it seems that, maybe . . . There are sort of two ways you can do this thing. You can get sort of a
    house committee, a small committee of businessmen. Or, you can go and get representatives from all segments of the community.
    They chose to get representatives from all segments of the community. I'm having a little bit of trouble understanding
    why that choice was made. It seems that maybe if they really wanted to get it passed, then, the more practical thing politically
    to do was to have the small committee.
- speaker: Respondent
  text: Well, I guess there are two ways to look at that. One is that, if you get broad representation, maybe you get a lot
    of ultimate support because almost any element in the community can say, "Well, Joe Smith is on the Charter Commission,
    and he would represent my views. If he thinks it's alright, it's probably alright. It's probably too complicated for me
    to understand anyhow." The other side of that same proposition, I guess, is that if you have broad representation like
    that you do get some input, that's unquestionably true, that you wouldn't get if you had a limited-in-number, establishment-oriented
    group to do it. Then, of course, in addition to the Charter Commission itself, there was that large group that was an
    advisory group that must have numbered what, you probably have the figure, fifty or sixty people. I was a member of that,
    incidentally, and attended a number of meetings and read into the late hours many nights the many drafts that came out
    with the assistance of the Institute of Government. I think the result was not so much, the unfortunate result, if you
    want to characterize it as that, was not so much the product of the way in which the commission was put together as the
    drastic amount of change which the commission ultimately injected into the issue. A small, establishment-oriented committee
    might have come up with not quite so many changes, changes that were not quite so drastic. They might well have come up
    with enough changes that the electorate might not have accepted it. I sort of look at the final results and try to analyze
    what happened and why it happened. I really think that the reason the issue went down to defeat at the polls was . . .
    Like most election issues, there's usually no very simple answer. You just can't make a simplistic analysis. I don't want
    to over-simplify it. I'm sure there are a number of votes that went for many, many different reasons against the proposed
    consolidation. I think the one thing that really scuttled the whole effort was that there were just so many changes. Changes
    that were so drastic, and, in many instances, so little understood, that the typical voter said, "Well, that's just more
    than I can swallow. I could take a nibble, but they're just about to drown me in the complexity of the thing. Upheaval
    of our entire governmental system. Going to the system of election of the legislative body for the combined city and county
    that's just too much of a change for me to take. I can't absorb it." A lot of blame has been placed, in the press particularly,
    to the effect that this was a vote against high taxes in the outlying districts. I'm sure, to a certain extent, that's
    true. I really think that's a subsidiary cause of what resulted. I think the overwhelming principal cause was that there
    were changes too many in number and too drastic in effect that the general electorate just would not accept. I think,
    for example, if we had . . . We had seven members of the City Council and five members of the County Commission. We had
    a mayor who didn't get a vote except in case of ties. I think if we had just combined those, if we had had a twelve-man,
    a large election . . . Basically speaking, that's no change at all. Only change you've made there is you have allowed
    people in the county to vote for the city councilmen. You haven't changed anything as far as the five seats formerly held
    by the county commissioners were involved. I think if we had gone to that type of legislative arrangement, this issue
    may well have passed. Particularly if there had been a satisfactory selling job on the special taxing districts that would
    have been set up under the charter. In other words, really what I'm trying to say is, Bill, I think if we had kept the
    issue simple and gone to the electorate and said, "Really, what we're doing is no great change except that we're trying
    to give you better government. More efficient government. Hopefully at somewhat less cost, although we can't guarantee
    tremendous savings." We never did try to guarantee tremendous savings. They weren't there in the first place. Just to
    say to them, "Instead of having to go down, if you live in the city as, of course, the bulk of the population of the county
    does anyhow, and having to mark two sets of ballots, one for the City Council and one for the County Commission and elect
    twelve people. Just elect all twelve on one ballot. In the process, this means we are going to combine the city and county
    police force. We are going to combine the animal shelters, and things like that. All that will do is make for more efficient,
    better operation." I think there's a good chance that the effort may have been successful.
- speaker: Interviewer
  text: How did it get so far? I mean . . . It seems possibly to have been sort of a lack of communications perhaps between
    some of those who were initially for it who probably may have supported exactly the type of suggestion that you have just
    made and the people who were working on the Charter Commission who roamed rather freely through the whole governmental
    structure. Were they working in a void? Did they not consider what the other people were telling them? Were the other
    people not saying anything?
- speaker: Respondent
  text: I guess that's an essay on how committees work. Sometimes it's not very satisfactory. I saw the process you're talking
    about. A lot of the things you say in your question really accurately suggest what the answer ought to be. You had committees
    of people who were very well-meaning. I think there was a genuine and sincere effort either by virtually everybody or
    precisely everybody who was involved on the Charter Commission and on the other groups that were involved in this. What
    happens is, when you get so many people involved . . . That is, not just the Charter Commission but this large advisory
    group that was involved, also. You get consultants involved with various aspects of a possible charter that they themselves
    are responsible for. I think you get to a position where you get a division of labor, and this committee is responsible
    for the finances, and this committee is responsible for the makeup of the legislative body, and this committee is responsible
    for whether you're going to have a strong mayor or weak mayor or strong city manager or what. The first thing you know,
    everybody made a tremendous project out of their little section of the pie.
- speaker: Interviewer
  text: And nobody is really sitting there with a broad view where the whole . . .
- speaker: Respondent
  text: I think there were people who saw it, but they were people who figured there was just not a whole lot they could do
    about it because they had assigned a guy, not a guy but a group of people part of the pie. That part of the pie just got
    bigger and bigger and bigger, and those people thought it was the most important thing in the charter. They'd build it
    up and build it up and build it up. It's sort of the way bureaucracy operates. The first thing you know, you've got people
    who are so tied in with what they themselves see as their function . . . Well, on a governmental level sometimes they
    add staff and they add projects and they ask for additional appropriations. As soon as they come in, you add staff and
    you add projects. The thing just has the inborn ability to pyramid. I think that's what happened here. We got over-complicated
    in the approach because we had so many people that we assigned jobs to. I don't know that there was particular lack of
    communication. I think there probably was pretty good communication. I don't think anybody really felt they had the ability
    to say, "Well, you fellows over there in Article Four, Section Three who are responsible for that . . . You've just gone
    haywire." I'm afraid that sort of the human result of all this was that the work of that particular segment was just sort
    of folded in with everything else. That not just added to it, it multiplied it, the complexity of the entire operation.
- speaker: Interviewer
  text: That does seem to be a very difficult sort of thing to control. It does look like it did get out of hand.
- speaker: Respondent
  text: Well, our basic mistake was in trying to come up with a perfect charter in conjunction with consolidation. If we had
    consolidated first and then tried to come up with as close to a perfect charter or an improved charter as we could.
