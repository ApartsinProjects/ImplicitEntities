collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I'm not sure exactly where's the best place to start, but let me start perhaps by talking about Columbia. I read your
    account of your early years in Columbia, and also the fascinating story you told about getting on the train or the bus
    up here, I forget which, and going to Columbia in 1946 when you heard about all the trouble there. That has been called
    a race riot.
- speaker: Respondent
  text: Sometimes it's called a race riot, and then sometimes a race disturbance. It wasn't exactly a riot.
- speaker: Interviewer
  text: It was an invasion, it looked to me like.
- speaker: Respondent
  text: Well, when you call it an invasion, then that was the state invading the town.
- speaker: Interviewer
  text: Exactly. And more specifically, invading the black neighborhood.
- speaker: Respondent
  text: Black neighborhood. It wasn't a riot—a race disturbance, but not a riot. I take a riot to mean somebody is rising
    up and trying to rebel against the status quo. Well, these Negroes were not rebelling. They were trying to protect.
- speaker: Interviewer
  text: They were defending themselves.
- speaker: Respondent
  text: Defending themselves. Here was a Negro, the one Negro who started the thing was a young soldier who had just come
    back from World War II. Is this thing on?
- speaker: Respondent
  text: He had just come back from World War II, and he came back to see his dear old mother. Well now, they came from a poor,
    downtrodden, black community. They hadn't had anything to amount to anything of this world's goods. The old lady was still
    kind of down and out, but here the young man came back. He had just put in maybe three or four years in the service, and
    he'd fought against the Japanese over there in Guadalcanal and Iwo Jima and all around over in that section of the world.
    And he had been sold, three years, a bill of goods that all of this was for American democracy, and for a finer way of
    life than the rest of the world was having. And the kind of stuff that Hitler and Tojo and Mussolini were dishing out
    wasn't a high life, but the American way was good. So he comes back and goes back to visit his mother. She had gone up
    to a little repair shop, maybe two weeks before he came, to get her little radio repaired. Now, are you interested in
    all that story?
- speaker: Interviewer
  text: Well, I read all that in here, so I've got that account.
- speaker: Respondent
  text: So you don't need to. . . .
- speaker: Interviewer
  text: No. I don't really.
- speaker: Respondent
  text: The main point is that when the man was abusing his mother, "Oh, woman, go somewhere, go hide. Get out of here."
- speaker: Interviewer
  text: Did he call her a "nigger?"
- speaker: Respondent
  text: Yeah, he called her all sorts, "Nigger woman, get the hell out of here." And this man was up there at the front of
    the store, and she was back there begging the man, "Oh, go ahead, mister, and fix my radio. It wouldn't cost much." But
    he was working on the point that the damn thing was so bashed up and beat out, and so cheap to begin with, that it would
    cost him more to fix it than to sell her a new one. He could sell her a new one for the price it'd take to fix it. So
    he said, "Go get you another one. That old thing isn't no good." But she couldn't understand that. She just thought maybe
    all you had to do was like put in a light bulb. It was ruined. So he got peeved with the old lady, and then started cursing
    her. So this young man was up there at the front of the store just beginning to boil. "Get out of here or I'll throw you
    out." And the woman started backing up towards the front door, and when she got up there where her son was, her son grabbed
    him and said, "Look man, do you know that's my mama?"
- speaker: Interviewer
  text: And they had at it, right?
- speaker: Respondent
  text: Now, when he manhandled the guy, he said to the rest of the Negroes in the front of the store, "Well, hell, that's
    what the government taught me, how to handle the Japanese. Man to man, hell, I was able to protect myself. So when I grabbed
    that man, I just threw him." That was an attack on the white establishment for a black man, at that time.
- speaker: Interviewer
  text: Threw him through a plate glass window?
- speaker: Respondent
  text: Yeah. "Oh, what the hell are these damn niggers up to?" And that is where, if there's any riot, that was all it was
    to it. They were going to put down the riot right there. That wasn't any riot. That was just one man's situation.
- speaker: Interviewer
  text: And the guy got out of town, didn't he?
- speaker: Respondent
  text: Yeah. When he looked around, all his boyhood days came back to life. He remembered, "My god, this is the place where
    they lynch Negroes for doing things like this.
- speaker: Interviewer
  text: I'm in trouble now, huh?
- speaker: Respondent
  text: Yeah. "What can I do?" So he ran one block down the street and made a turn, and when you turn in at that block, that
    is one block of Negro businesses, little Negro businesses, little joints. And so he went back down there, and of course,
    Negroes down there were shooting pool and cursing and swearing and gambling and fighting and fussing and cussing and carrying
    on, as usual, and he began to tell two or three of the people down there, the owners of some of those places, what had
    happened. They all got together and said, "Well, look man, we've got to get you out of town right now."
- speaker: Interviewer
  text: They did get him out. Did he come back?
- speaker: Respondent
  text: Hell, we don't know what became of the man.
- speaker: Interviewer
  text: You never saw him again?
- speaker: Respondent
  text: I don't know whether anybody ever heard of that guy any more. I think maybe he got to Nashville, Louisville, Cincinnati,
    and I don't think he stopped before he got to Detroit. Now, in order to show Negroes, you don't do that kind of stuff,
    then they—I won't say Ku Kluxers, but the Ku Klux element, began to organize. "Let's go get us one or two, and lynch them
    and that'll put them in their places. That'll bring fear to all in the place." So the Negroes armed themselves for two
    or three days. They publicly said they were going to lynch one or two.
- speaker: Interviewer
  text: Now at that point, the state ended up troopers in there, National Guards?
- speaker: Respondent
  text: No, the city police couldn't handle it, because the whites. . . . You know, I said you come down from the courthouse,
    come down one block. Now, I know all about this. I was raised in that town, and here's the courthouse right here. Come
    down Main Street one block, and there are four buildings there that my people own, on Main Street, one block from the
    courthouse. And they were such imposing places that there wasn't any Negro in town who ran a business big enough to rent
    the thing. We rented those places to white people, see. Now, you come down here, and we were facing Main Street, but if
    you come down this street, there is the one block of Negro businesses.
- speaker: Interviewer
  text: One block off of Main?
- speaker: Respondent
  text: Yeah. That's all it was to it. But those Negroes armed themselves.
- speaker: Interviewer
  text: What's the name of this street? Is that Franklin?
- speaker: Respondent
  text: No, no, Eighth Street. The courthouse is at Seventh Street. There's one Negro block on Eighth Street. My uncle's and
    father's places were here on Main Street just beyond Eighth Street, one block from the courthouse. Negroes from all over
    the county and adjoining counties, some Negroes who had come in, like this young soldier, had brought back souvenirs and
    guns that they'd taken from the Japanese. They had all kinds of weapons. I'm going through all of this to show you the
    difference between a riot. A riot is where you are making an attack on somebody else, but these people bottled themselves
    up in their little businesses. . . .
- speaker: Interviewer
  text: And just waited.
- speaker: Respondent
  text: And the white people were afraid to go down in there. So they marched down Main Street, and the next street over is,
    I think, called Woodland. The next street over here is called Woodland, Main and Woodland, and here is Eighth Street going
    across here. And that one block, whites would parade up and down here and up and down here, but nobody would go down in
    there. When the police started down in there, the Negroes said, "Look, we have shot out the street lights, so we can't
    see you. We can't see you. Now, don't any of you white folk come in here, because if you do, we going to shoot the hell
    out of you." And when the police started, Negroes did shoot on them. And when they shot on them, that was the attack on
    constituted authority.
- speaker: Interviewer
  text: Did that hurt anybody?
- speaker: Respondent
  text: I think so.
- speaker: Interviewer
  text: Your feeling was that several people got killed?
- speaker: Respondent
  text: Yeah, I think so. The white people wouldn't want to admit it. They wouldn't want to admit that the Negroes killed
    a single one.
- speaker: Interviewer
  text: But you felt pretty strongly that they did?
- speaker: Respondent
  text: I've got a feeling that some white folk got bumped off down there. They kept it quiet because they couldn't admit
    even that much of a defeat. But now, when you attack the police, the police may be wrong, the police may be using poor
    judgment, but they represent constituted authority. So then the police, the mayor, and so forth called in the governor,
    and the governor sent in the state troopers and so forth, and they're the ones that took over.
- speaker: Interviewer
  text: Is it your feeling, when you look back on what happened subsequently, that the governor and his representatives, all
    the way down to the National Guard and all, conducted themselves in a proper manner or not?
- speaker: Respondent
  text: Oh, I think the state authority used quite a bit of discretion. I don't know whether we can give them credit for using
    proper conduct.
- speaker: Interviewer
  text: Did they kill anybody?
- speaker: Respondent
  text: I don't think so.
- speaker: Interviewer
  text: Did they beat up on people?
- speaker: Respondent
  text: I don't think so. You see, those Negroes were so well armed, and they put it out. I know what they told me. In the
    book I mentioned that I got off the bus, and I had to go right straight through, from the bus station here across town
    here, right through the places that were. . . .
- speaker: Interviewer
  text: A war zone?
- speaker: Respondent
  text: Yeah. That were under material law. Every block they checked me, but when I got to the last block, leading out here
    to this section. This is where my father lived. My father and my uncle lived out here. They were old men about 85, maybe
    88. Now, they were living out there by themselves. Now, my jive, my ruse, if you please, coming across here, was that
    I had been in the service myself.
- speaker: Interviewer
  text: You passed for white going through there?
- speaker: Respondent
  text: Well, I let them assume. I didn't put them up to their foolishness, but. . . .
- speaker: Interviewer
  text: You didn't dissuade them from it.
- speaker: Respondent
  text: I took advantage of every break I had. First, I had just been discharged from the Navy. Second, it was winter time,
    and that little Navy pea coat, you remember those things?
- speaker: Interviewer
  text: Yeah, with the high collar.
- speaker: Respondent
  text: Yeah. And it fastened all the way up. I was still wearing it. It was very warm and comfortable. So I had my Navy,
    I had my civilian clothes on under, but I had that Navy coat on.
- speaker: Interviewer
  text: Did you have a hat on, do you remember?
- speaker: Respondent
  text: Yeah, I had my regular civilian hat. And every one of these places, "Hey, where you going? Where you going?" "I came
    down to visit my father over here. Just got out. Just got released about three weeks ago."
- speaker: Interviewer
  text: And where your father lived, that was the only black residence in that neighborhood, wasn't it?
- speaker: Respondent
  text: That's right. They said, "Well, where they live?" And when I told them out here on East Ninth Street, well, these
    out of town guards had been given a map, here was the Negro neighborhood over here, here's a Negro neighborhood over here,
    here is a corridor going all the way out here to the next town. Now, from this courthouse way on out there to the next
    town, for five miles out that way, we're the only the black on that side. So when I said I was going out to East Ninth
    Street, they didn't know any better. They just assumed only white people out there.
- speaker: Interviewer
  text: So you didn't tell them anything?
- speaker: Respondent
  text: No, it wasn't my business. So then I got through. But when I got to the last check
