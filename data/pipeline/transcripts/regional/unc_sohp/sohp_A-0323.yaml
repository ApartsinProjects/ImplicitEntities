collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I'd like to start by simply asking you to tell me a little bit about your family and about when you were born and
    growing up and how you eventually got into politics.
- speaker: Respondent
  text: I was born on January 3, 1921, and my father was in the Congress of the United States for two terms and was described
    as one of the leaders of Franklin Roosevelt's Young Turks, along with Jerry Voorhis, who was the man that Nixon defeated.
    I was in Voorhis's campaign in California when Nixon beat him. I knew people all over the United States, including Dr.
    Frank Graham, who was then president of the University of North Carolina and whom my father held in great affection and
    respect. After I came back from the Marine Corps, I ran for the Texas House of Representatives, was in it for six years
    during the McCarthy period, got out, had been state Democratic committeeman a time or two and I ran for the United States
    Senate when Lyndon Johnson became vice president. I came in fifth in a field of seventy-one candidates. Since then, I
    became a lawyer for the American Civil Liberties Union and American Friends Service Committee and independently represented
    war resisters of the Vietnam war for about five or six years. Now, I've gone back to representing people in divorces and
    being bored to death. [Laughter]
- speaker: Interviewer
  text: I guess that in a way, it doesn't make good sense to ask the son of Maury Maverick when he first got interested in
    politics. I imagine that came pretty early, didn't it?
- speaker: Respondent
  text: Well, I never knew anything else in my life but politics, because my first recollection of politics is when my father,
    then a very young man, was Al Smith's campaign manager. The Ku Klux Klan still had some impact, not much in San Antonio,
    because this is a Catholic town, but it took a little spine to run Al Smith's campaign. That's the first campaign that
    I remember in my life.
- speaker: Interviewer
  text: That convention was in Houston, wasn't it?
- speaker: Respondent
  text: Yes. That's right.
- speaker: Interviewer
  text: The one that Jesse Jones brought to Houston.
- speaker: Interviewer
  text: Some people said that Jesse Jones hoped to get the nomination for having brought it there.
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: So, your father managed Al Smith's campaign in Texas?
- speaker: Respondent
  text: In San Antonio.
- speaker: Interviewer
  text: In San Antonio. How old were you at that time?
- speaker: Respondent
  text: It seems to me that I must have been about seven years old.
- speaker: Interviewer
  text: But you were aware of what was happening?
- speaker: Respondent
  text: I was aware of that campaign and I was aware of politics in terms of war. My first recollection of my father when
    I was a very small child would be hearing him cry out from wounds suffered in the Argonne Forest and I used to go sit
    with him, he would get into a hot tub of water to ease the pain and I would sit with him and he would tell me that all
    war was wrong. He kept it up until Hitler began and after he had marched through about seven countries, he called me up
    and asked me, "Why in the hell aren't you in the Marine Corps or something?" All that twenty-five years of pacifism went
    down the drain, but that was another strong influence in my life.
- speaker: Interviewer
  text: Your father suffered from his war wounds most of his life, didn't he?
- speaker: Respondent
  text: Oh, yes. He was a semi-cripple all his life and he would almost stagger. He would throw his body left to right and
    people would sometimes say that he was drinking, and sometimes he was, but a lot of times, he just couldn't walk even
    when he was cold sober.
- speaker: Interviewer
  text: So then, when he went to Congress, were you involved in his campaigns at that time?
- speaker: Respondent
  text: Well, I knew about it. When I was a kid in Washington, you know, my heroes were people like Jerry Voorhis and Hugo
    Black. Hugo Black was a great favorite of the children of congressmen because Senator Black would always stop and pat
    us on the head and treat us with great dignity. He was a fine fellow and I remember when he got appointed to the Court
    and all the liberals were raising hell in New York City, my father went all over New York City talking to ACLU groups
    saying, "Give this guy a chance. I don't care if he belonged to the Klan or not, he is going to be all right. Give him
    a chance." I remember hearing about that and was quite excited about it when I was a child.
- speaker: Interviewer
  text: Where did you go to college?
- speaker: Respondent
  text: I went to the University of Texas and then after I got out of the Marine Corps, I went to school for a while at Loyola
    Law School on the West Coast and finished here at St. Mary's Law School in San Antonio.
- speaker: Interviewer
  text: You were in the Marines how long?
- speaker: Respondent
  text: Four and a half years.
- speaker: Interviewer
  text: From when to when?
- speaker: Respondent
  text: Well, from about 1942 to 1946.
- speaker: Interviewer
  text: When your dad called you up and said, "Why aren't you in the Marines?" did you go out and get in there? [Laughter]
- speaker: Respondent
  text: Well, also it was after Pearl Harbor and I was flunking all my courses and Dean Parlin, the Dean of Men at the University
    called me in and he said, "We've figured out a way for you to get a degree." I said, "How?" and he said, "Volunteer for
    the Marines." I said, "What are the Marines?" "Just go on and volunteer, and you'll find out, Maury." [Laughter] That's
    how I got my degree.
- speaker: Interviewer
  text: My father was in the Marines, too. So, you got out and your father was living in California at that time?
- speaker: Respondent
  text: Yeah, he had moved to California to practice law out there and that didn't turn out too well. I think that he got
    lonely and he wanted to come home. He said, "I live out here in Los Angeles and if I get drunk and fall down, my friends
    won't take me home. If I go back to San Antonio and get drunk, even my enemies will take me home. I'm going back home."
    So, we came back home.
- speaker: Interviewer
  text: But you say that you were involved in Jerry Voorhis's campaign out there.
- speaker: Respondent
  text: Yes, I was in Voorhis's campaign. I organized the Loyola Law Students for Jerry Voorhis and I remember Voorhis at
    the time. I still correspond with him. He's in a sort of a semi-rest home. His mind is very alert, but his body is frail.
    Anyway, Nixon began to make attacks on Jerry's patriotism. I remember sitting in his room with his wife and children and
    Jerry was just wringing his hands and he was just shocked that anyone would reflect on his loyalty to his country. So,
    he made the mistake of debating Nixon, who pulled every kind of lowdown, dirty, Red Scare kind of tactics on him. I think
    that Jerry was a tough guy, but he was tough in a sensitive sort of shy, civilized kind of way. He didn't know how to
    get into a hurly-burly debate and demagogue, like I think he should have done. We told him to, but he said, "No, people
    are going to think that I'm all right. I'm a good American and I don't have to prove my patriotism." But by God, he should
    have, I guess.
- speaker: Interviewer
  text: That was in what, '46 or '48?
- speaker: Respondent
  text: '''46, I think.'
- speaker: Interviewer
  text: I guess that shortly after that campaign, you came back to Texas?
- speaker: Respondent
  text: I came back to Texas and finished here at St. Mary's Law School and then ran for the House of Representatives.
- speaker: Interviewer
  text: That was when?
- speaker: Respondent
  text: It seems to me that it was 1950 to 1956, during the McCarthy period.
- speaker: Interviewer
  text: You said that you spent six years in the House?
- speaker: Respondent
  text: I spent six years in the Texas House of Representatives, got out and ran for the Senate when Lyndon Johnson became
    vice president. There were seventy-one candidates in the race. I was fifth in the field of seventy-one. I was endorsed
    by organized labor. That's the election in which John Tower became a senator.
- speaker: Interviewer
  text: When you ran for the legislature here, you were representing what, Bexar County?
- speaker: Respondent
  text: I was running at-large, Bexar County.
- speaker: Interviewer
  text: How many representatives were there from Bexar County at that time?
- speaker: Respondent
  text: I think there were four.
- speaker: Interviewer
  text: Were you the only liberal?
- speaker: Respondent
  text: I was the only liberal at the time. That was the worst period I ever went through. That was the days of the Red Scare
    and while during the Vietnam War, it was plenty tough—if you want to talk about that later on, we will—while it was plenty
    tough, it was nothing like the days of Joe McCarthy. Because in addition to all the terror of McCarthy on a national level,
    we had the bush league, new rich, ignoramus Texas style attitudes to contend with in addition to everything else. They
    had bills before the legislature such as to remove all books from libraries that were critical of American history, Texas
    history, religion, or were in any way agnostic, atheistic, or made fun of God or whatever, which, of course, would remove
    all good books from the library. It got so bad, for example, that the high school teachers' lobby of Texas, the Texas
    State Teachers Association, endorsed the bill and not one college professor in the whole state of Texas, I remember, spoke
    in opposition to that or any other Red legislation. There were only four of us who voted against outlawing the Communist
    party.
- speaker: Interviewer
  text: In the entire House of Representatives?
- speaker: Respondent
  text: Yes. I was one of them. I voted for it my first term. I also... there is a great story that Willie Morris tells in
    his book, North Toward Home, when Clarence Ayers, the great libertarian professor was censured, it came up fast... what
    they would do, the speaker would lay out these bills without having any committee consideration and they would say terrible
    things about someone and you wouldn't know whether they were true or not and you wouldn't know how to vote. I'm trying
    to rationalize my cowardice now. Well, anyway, I ran and hid in the men's room and they were looking for me and I pulled
    my feet up so they wouldn't see me underneath the bottom of the toilet and my father called me. He died not much long
    after that. He called me and said, "Why in the hell didn't you vote against that resolution censuring Clarence Ayers?"
    I said, "Well, Papa, I was hiding in the men's room." He said, "Well, you are just a goddamn shithouse liberal." And he
    hung up on me. [Laughter] That haunts me to this moment.
- speaker: Interviewer
  text: That was when, in '54?
- speaker: Respondent
  text: Something like that, '54.
- speaker: Interviewer
  text: Your father died in '54?
- speaker: Respondent
  text: Yeah, around then.
