source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: We're pleased indeed to have this opportunity to talk with you about your long career, and if it's agreeable with
    you, we propose to begin with your early life and your career before entering the House of Representatives early in 1939.
    Perhaps a second major segment of our discussions can be your career in the House of Representatives, leaving as the third
    major segment of our interview your distinguished Senate career. So let me suggest that we ask you to begin the interview
    by telling us something about your early life, perhaps particularly about the place in which you were born and reared
    and grew up and how the community, the county, the state, the region may have influenced your development in early life.
- speaker: Respondent
  text: Well, Dr. Grantham, it's a pleasure to see you and Mr. Gardner whom I can soon have the pleasure of addressing as
    "Dr." It has been a long while since I first viewed this earth, not very far from the hill country where we are now. It
    was, was and is, a rural community. I was not born in the community where I was reared. At age five, we moved some miles
    from Jackson County into Smith County; not very far, but some few miles. The community in which I was reared from age
    five until going away to college was called Possum Hollow—for want of a better name should I say! [Laughter] For want
    of a more proper and elevating title. It enjoyed a one-room school. I recall my first joy of accomplishment. There may
    have been others, but the first one I recall is the teacher had some nice things to say about me on a Friday afternoon
    ending the first week. I had learned my ABCs. [Laughter] So that touched a chord of pride, and joy of achievement. Later
    on in life, that same chord was touched from time to time. In this rural community, school and religion, and the physical
    surroundings—I mean by physical surroundings outdoors, animals, rabbits, coon hunting, fishing—were the key points of
    my life, other than, of course, my family. Almost all social life centered around church, church and Sunday school—centered
    around religion. The joys of Saturday and Sunday in the woods was magnificent. The boys would meet and we'd climb trees
    and chase each other through the treetops. That is, we'd climb a tree and swing almost like squirrels from one tree to
    another. But now and then there's some terrific falls. [Laughter] But never any broken bones. Well, this... this may have
    instilled some individuality, may have been the springboard from which each climb upward whetted one's ambition and appetite.
    There was but one way to go from Possum Hollow—that was up and out! [Laughter] or out! You couldn't get out except by
    going up, and once you got out, you were still pretty far down the pole, so everything was up and with each ascension
    of life's ladder, that same pride of achievement that was touched in the compliments of the teacher by learning my ABCs
    in five days stood me in good stead. At least, it was ethyl in my gasoline.
- speaker: Interviewer
  text: Well, it seems to me that what you've told us illustrates very well the fact that you have deep roots in this locality
    and that you identify yourself with this community in a broad sense, and that it's been very meaningful to you in your
    life. I wonder if you have thought or did think early in your life much about being a Tennessean, or being a southerner,
    or being an American.
- speaker: Respondent
  text: Well, yes, I thought of all those things. Both my grandfathers were identified with the Confederacy, and though neither
    had any particularly long or distinguished career the sentiment of the family of both my grandparents—the grandparents
    on both my... my maternal and paternal grandparents—was pro-southern. I inherited that sentiment. What I mean inherited,
    I got it honestly from my forebears passed along from my grandparents to my father and mother and thus to me. An American,
    yes, of course. I loved to read everything of an historical character, and though in the early days the books were quite
    limited, nevertheless whatever I could lay my hands on I read, especially before children were consumed with television.
    So I was intensely chauvinistic and patriotic in my feelings. I don't remember that Tennessee had such a position in my
    emotions as the South and America. It was just not quite as pointed in my family. There were never any doubts about Tennessee
    and our love of the state, but it just somehow didn't quite stand out as did the feeling of the family towards the South
    and towards the whole country.
- speaker: Interviewer
  text: You had, I take it, little difficulty in reconciling your regional and national loyalties.
- speaker: Respondent
  text: Uh... Well, yes, I think I did. I think I may have, at that time, I may have been southern first. [Laughter] I'm not
    sure. I'm not sure. I did draw a difference, somehow. Later on, I tended to blur those differences and merge those into
    one, but then I think I did have some different feelings.
- speaker: Interviewer
  text: I believe Cordell Hull was from this area. To what extent did his career influence you, your goals, your aspirations?
    I'd understood that Carthage produced a number of important politicians.
- speaker: Respondent
  text: Yes, you'd be, you'd be surprised perhaps, maybe you know, but from this little town of Carthage, as you said, a great
    many men of national prominence have come. If you go around a few streets in Carthage you see a mansion, a great antebellum
    home, where a congressman, a pre-Civil War congressman lived. In the basement of this house, there are rings in the wall
    where slaves were chained for the night. Later, Benton McMillin was a congressman from this district, who lived in Carthage.
    He became Democratic leader in the House of Representatives. He was later governor of the state and later served as ambassador
    to one, I guess two countries. Then of course Cordell Hull, as you've mentioned. And then I had a career thirty-two years
    from here in national office and some state positions prior to that. And, as a footnote to the future, my son Albert Gore
    Jr. is a candidate for Congress now.
- speaker: Interviewer
  text: When you were moving into politics, were you conscious of the tradition of Carthage and Smith County for producing
    these leaders? To what extent did you look to Cordell Hull's career and his success?
- speaker: Respondent
  text: Well, to begin with, my father admired Cordell Hull. Around the fireside at night, he would often speak of him. They
    had been boyhood, what they call "running the river." They had run the river together. That is, they'd go down with a
    raft of logs and then come back up the Cumberland to Carthage on steamboats. And they'd known each other as young men.
- speaker: Interviewer
  text: Let me interrupt, Senator. That is, they would go down to Nashville...?
- speaker: Interviewer
  text: . . . with a raft of logs?
- speaker: Respondent
  text: . . . a raft of logs. And then the chief mode of transportation back at that time was steamboat. Later on, of course,
    Cordell Hull was in Congress. My father was his supporter. Then Hull was defeated for Congress, as I recall, I believe
    it was 1920. This was a great disappointment to my father. I heard him speak of that. Then Hull was reelected to Congress.
    I remember during a recess of Congress he would come to Carthage and spend some time. He would get his mail. I was teaching
    school at the time, a rural school. I would, not infrequently, drive from the rural school which I taught at Pleasant
    Shades some twelve miles away, I'd drive to the county seat at the close of the day. By that time, Judge Hull, as everybody
    called him, would have finished his mail and his lunch, and now and then would be up under the trees in the courthouse,
    talking with the checker players and other people. I would sit nearby and listen to him, and I became greatly impressed.
    Now to answer your question as to whether or not this condition of public service had its influence on me. The answer
    is yes, as it has done for more than a hundred years on many other youngsters from here. At least, I knew it was doable.
    [Laughter] Others from here had done it, and through the years, Carthage as the home of a politician gained certain acceptability.
    Strange, Dr. Grantham, that such a thing would develop, but I can think of larger towns nearby and no one from those towns
    had ever politically done any good! [Laughter] But somebody from Carthage is almost always lucky. [Laughter]
- speaker: Interviewer
  text: You mentioned earlier, Senator, that your grandfathers on both sides were Confederate soldiers.
- speaker: Respondent
  text: Well, I'm not sure about the extent of their military service and just what it was. At least they were identified
    in some way with the Confederacy.
- speaker: Interviewer
  text: '... with a Confederate cause. And you mentioned your father''s admiration for Judge Hull. I wonder if you could elaborate
    a bit about family influences, other family influences, in your own development—your father, mother, other members of
    the family, who influenced you, contributed to your development.'
- speaker: Respondent
  text: Well, there are several lawyers in the Gore family, and I think this was part of my desire to become a lawyer. At
    least, I was very interested in it. I would go to the county courthouse when I had an opportunity and when a good murder
    trial was under—I shouldn't say "good" trial [Laughter]—a dramatic murder trial was underway or some other altercation
    in the community that elicited public interest. I would watch the lawyers and listen to their debate and just was thrilled
    by it and challenged by it. To this extent, yes. However, the family influenced me more, my own family influenced me more
    profoundly with, oh, for want of a better description, the moral codes. Perhaps part of it's folklore, perhaps some of
    it now is regarded as puritanical, but we had, and deeply held the mores and moral codes that are traditional with the
    fundamentalist religion of this area and Scotch-Irish independence. I believe that this was the most profound influence
    on me and on my life and on my outlook on moral and social values.
- speaker: Interviewer
  text: It seems to me to be illuminating as far as the development of character is concerned, but how would you explain what
    I believe is an aspect of your career and personality. That is, your independence, willingness to take a lonely position
    on occasion, to be your own man. Where did this trait come from?
- speaker: Respondent
  text: Well, it's a certain characteristic of my father and of my mother. I think, as I said earlier, it was stimulated by
    the isolated life I lived in an isolated community where every boy was pretty well on his own out in the woods and on
    the lonesome hills. We'd separate on top of a hill someplace, each one going his way home. A walk through the moonlight,
    the loneliness with the hooting of the owls, the scream of the hawks, yet one walked without fear and successfully. Maybe
    this is a very primitive thing, but it's a part of the installation of independence and self-reliance, but it's not peculiar
