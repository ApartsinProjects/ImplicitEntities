collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Would you tell me your full name and when and where you were born?
- speaker: Respondent
  text: My name is Jonathan Worth Daniels, and I was born April 26, 1902, at the corner of South and Blount Street in Raleigh,
    North Carolina, right across the street from Shaw University, and in the margin of a black, what you would now in your
    educated condition call a ghetto, but which was really a nigger-town.
- speaker: Interviewer
  text: You were born in your parents' home, then.
- speaker: Respondent
  text: Yes. My grandfather had built the house shortly after the Civil War. And a lot of the other whites in that area had
    moved up to more fashionable Blount Street. But we stayed in my grandfather's house in a deteriorating neighborhood, you'd
    call it, and we were very happy there. We had the best neighbors in the world, although every one of them was black.
- speaker: Interviewer
  text: This was Grandfather Bagley.
- speaker: Respondent
  text: Yes. He was the clerk of the state supreme court.
- speaker: Interviewer
  text: What were your parents like? How would you describe them?
- speaker: Respondent
  text: I would describe them as wonderfully gentle, receptive people. My mother and father came from rather diverse groups.
    My father's father was a ship carpenter in Little Washington, North Carolina. He didn't believe in slavery, and he went
    to Rhode Island to live and work, but he had fallen in love with my grandmother in North Carolina. So he came back in
    time to meet the Civil War. My grandmother came, I think, from a rather distinguished family, the Seabrooks, but her parents
    had been impoverished, and she'd been left as an orphan as a child and raised in very limited circumstances. He was, I
    think, a good ship's carpenter. He helped build the Merrimack, as I understand it. But I'll give you this as a little
    piece of background. When my father became Secretary of the Navy, Little Washington wanted to welcome back its distinguished
    son. And he went down to Goldsboro, where his mother was living with my Uncle Frank at the time, and he was surprised
    that she wasn't so enthusiastic. She said, "Joe, those people who are putting on this show wouldn't have had your father
    in their house." [Laughter] And my mother's family had been originally Quakers. My grandfather was Jonathan Worth, who
    was elected governor by the whites after the Civil War, because he had been a Quaker and against secession. And then he
    was removed from office by General Canby, who came as military commander of that district. And Governor Holden was put
    in in his place. He had five daughters, of whom my grandmother was one. She [my grandmother] was as far from being a Quaker
    as anybody I've ever seen. She was a very dominant old woman who, when I knew her, walked with a gold-headed cane. And
    she had two daughters, unmarried, who she attended on all occasions. She was a very great snob, I thought. In a book I
    wrote I said that, and at my father's request I changed it to "dame." But she had a very strange sense about herself.
    In a sort of mystic way she thought she was the mother of the reunited Republic, because her son, Worth Bagley, who was
    a great football player at Annapolis, had been the first officer to fall in the Spanish-American War. He's completely
    forgotten now, and it was not anything but just a hero of circumstance at the time. But there was this hoopla about the
    first blood had been shed by a Confederate officer's son. (My grandfather was a major in the Civil War in the Confederate
    Army.) So that was the background I came from, very good people but not one of the racehorse aristocrats among them. And
    I'm pretty proud of my ancestry. I had some blackguards among them. My grandfather's brother, who did marry a racehorse
    aristocrat's daughter, stole money out of the till in the Supreme Court office, went to Baltimore and drowned himself,
    and my grandfather spent a good many years paying back the money he'd stolen. But they were in general good, simple, a
    kind of southern people that are lost. In our books we have much about the great plantation people and much about the
    poor whites, but the great, solid middle class between them has been pretty much neglected, I guess because they are people
    without creating any sins and scandals, have very little romance to present. My grandfather owned slaves. He had a place
    named Sharon near Raleigh, which later became the black public school there.
- speaker: Interviewer
  text: This is Grandfather Bagley.
- speaker: Respondent
  text: No, my Great-Grandfather Worth. And De Roulhac Hamilton did two volumes of his letters. He must have been a pretty
    good old guy. He said at the beginning of the war, "I think the South is committing suicide, but I'm going to stay with
    my companions and go down with the ship." I suppose that was the reason that they picked him at the end of the war. He'd
    been treasurer during the war. Picked him because he hadn't been a hothead in secession, and they thought that would possibly
    placate the conquering Yankees, but he wasn't enough to do that.
- speaker: Interviewer
  text: What were your parents like individually? Were your mother and father quite a bit alike?
- speaker: Respondent
  text: Very much alike, and yet they were people of very definite personalities. For instance, my mother was a Presbyterian,
    my father was a Methodist. But neither one ever joined the other's church. And they would alternate on Sundays—he would
    go with her to the Presbyterian; she would go to the Methodist—but they stayed in their own church. My father didn't believe
    in baptizing little children. He waited until the youngest was about eight. Then they baptized them, and she took two
    and he took two. [Laughter] But they were lovely people. In connection with what you're writing, my father was one of
    the most gentle and determined people on fairness to blacks of anybody I ever knew. Our next-door neighbor was a man named
    Wesley Hoover, who I think my grandmother taught to read and write. He'd become fairly wealthy operating a saloon, which,
    of course, was much against my father's principles, but he respected Wesley Hoover. And he would give Wesley Hoover every
    courtesy in the world, except, of course, he could never call him "Mr. Hoover." There were these little fragile, almost
    unexplainable taboos that existed. But my mother operated at her back porch—now remember, back porch—what would be the
    equivalent of the WPA today, or the center of federal charity. And a black who came to her back door—and many did—got
    food and what he needed. But the separation was complete and yet very friendly, so realized that there had become an acceptance
    of the status quo between the blacks and the whites. And maybe that was a period of subserviency by the blacks and arrogance
    by the whites. But for a little period there, at least at my childhood—and many, many of my playmates were black—there
    wasn't any feeling of surface antagonism, at least, or hostility.
- speaker: Interviewer
  text: Did your father help in that little back porch operation?
- speaker: Respondent
  text: '[Laughter] He financed it very much, but of course he never served the food or anything of that sort. And shortly
    before I was born, my father had been the man chosen by the Democratic Party in North Carolina to go all over the South
    and devise the best, and hopefully the most constitutional, system to disenfranchise the illiterate blacks while not disenfranchising
    the illiterate whites. He went down to Louisiana. Have you seen his books?'
- speaker: Respondent
  text: He went down to Louisiana and a number of places and came back with the legislation which was adopted. A strange thing
    in that fight, though. Now this shows a little about my father. There were a lot of people in North Carolina who wanted
    to divide the tax rolls and give the blacks for education only the taxes that blacks had paid, and give the whites all
    the taxes the whites had paid. My father and Governor Aycock were very much opposed to that and defeated it. Now that
    friendship with Aycock is important in my father's story. I'm not sure if they went to school together, but Aycock was
    my Uncle Frank's law partner. And they were very close. And they were both tremendously interested in education and education
    for both races. Of course, by the money we're spending today, that seems ridiculous. But my father's News and Observer
    in those days of that white supremacy fight, read through the eyes of a 1975 or '6 white man today, seemed just horrendous.
    They were! Oddly, in that campaign, though, a lot of people thought Father's life was endangered by belligerent blacks.
    He worked, of course, late at night on a morning newspaper, and, unknown to him, this man Wesley Hoover had gone uptown
    every night and followed him home as an unseen bodyguard. There are so many paradoxes in race relations.
- speaker: Interviewer
  text: Would he encourage Wesley Hoover to register to vote if Wesley Hoover was literate?
- speaker: Respondent
  text: He wouldn't go out and encourage him, but he would defend his right to vote. There's a difference there. He was a
    very gentle man, and one thing about this contrast, you see. Very often in my life with my father we disagreed violently,
    but we never disagreed in blowup between father and son. He didn't approve of many things I said. Like that thing that
    happened in Florence we were speaking about, could never have occurred with us. And when he did go off in '33 and left
    me with the paper, I must say he left me practically untutored and undirected.
- speaker: Interviewer
  text: Is that just a sense of trust and loyalty that he had?
- speaker: Respondent
  text: I think so. He believed that I was sensible. Not only in race relations but in Prohibition we differed completely.
    And it's difficult for you and your generation to realize the sharpness of the quarrel over Prohibition. But he never
    gave me hell for not agreeing with him. But I didn't do this. When I took the paper which he had edited as a strong Prohibitionist,
    I didn't write any Prohibition editorials, but neither did I write any which lauded his position. We got along fine, and
    it never was—even at the end of our lives, when we were disagreeing greatly on the civil rights commissions—anything like
    a personal quarrel over our differences of opinion. He was a very gentle man, and he was also a very violent man, as you
    know, editorially. What a thing. He had two brothers. His oldest brother Frank, who [unclear], was judicial to the point
    of perfection. Also, he was a hypochondriac who took all sorts of patent medicines. And Aycock said, "Well, Frank, you
    may get after me about drinking, but there's more alcohol in those patent medicines you're taking than the stuff I drink."
