collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Let's go on and talk about your family just a little bit. Start with your father. Do you know where he . . .
- speaker: Respondent
  text: My father was a lawyer, Henry McDiarmid Robinson. He was a native of Cumberland County and had practiced law for a
    number of years. In fact, when he died he was dean of the Cumberland County Bar Association. My mother came from Duplin
    County, was Mary Hill Robinson. Both my father and my mother had been very well educated for those times. My father had
    gone to Bingham as a young man first and then to the University of Virginia. My mother was educated at Mary Baldwin, in
    Virginia, and then Atlantic Female Seminary, where she had different certificates. They both came from well established
    families in North Carolina. I was lucky. Now, what do you want me to tell? My mother died when I was a year and a half
    old and my great aunt, Miss Georgie Hicks (who was never married) came to live with us and help rear us.
- speaker: Interviewer
  text: Now was that on your mother's side?
- speaker: Respondent
  text: 'That was on my mother''s side. She was from Faison, North Carolina and was kin to the Faisons and the Hicks and Hills
    and a number of people down there. My great aunt Georgie Hicks was a remarkable person. She was well educated, too, for
    those times. She was at St. Mary''s when Sherman came through in 1865 and tells a rather interesting account. She got
    a message that the Northern soldiers had come up from Wilmington and they came through Faison and they stopped over there.
    And some of them had gone to her father''s home. There was no news between the people at that time: everybody was afraid
    that Raleigh was going to be burned and their houses being burned as Sherman came along. And her parents had asked that
    he, (the soldier)—when he went through Raleigh—try to get in touch with her and tell her that they were all right. So
    she got this message (at 16, I think she was, at St. Mary''s) that a Yankee soldier wanted to see her. She was scared
    to death and the lady principal was, but said, "I''ll go in there with you when you see him, so I''ll protect you all
    I can." So when they met, that was for the message. My great-aunt not only was educated at St. Mary''s, but she went to
    Charlotte later to what became Queens College. So we had the advantage of people who appreciated education. And my father
    was very forward looking. He believed that women had enough sense to do whatever they wanted to if they tried. So he encouraged
    us rather than discouraged you from trying to do things.'
- speaker: Interviewer
  text: That really made a difference.
- speaker: Respondent
  text: I went to a private school. Well, first, my sister was three years older and she was very smart. Much smarter than
    I. She had quite a bent for English. She was a good English scholar and when she graduated she was one of the A scholars—top
    scholars—at Greensboro Women's College. She graduated there in 1910.
- speaker: Interviewer
  text: What did she do after she graduated?
- speaker: Respondent
  text: She taught school one year, and substituted another year. And after that she got married. She graduated in music.
    She got a music degree. She really didn't work. I graduated in 1913 and stayed home the first year and took a business
    course which would have been more sensible to have taken before, because I could've taken down the lectures in shorthand.
    But then I went to two years, teaching. One year in Mt. Airy and installed the business school and taught history also.
    And then to Salisbury the next year where I taught history.
- speaker: Interviewer
  text: You were doing this in the public schools?
- speaker: Respondent
  text: This was in the public schools. Mr. Turlington was the superintendent in Mt. Airy. He was very nice. And Mr. Allen,
    in Salisbury. Mr. Allen had a fine reputation as an educator and I enjoyed both places very much. I decided though that
    teaching was not to be my permanent career, as I'd been brought up with lawyers. My father, as I said, was a lawyer and
    we'd always entertain lawyers a lot and knew them. Lawyers used to do a little differently from the way they do now. They
    didn't have automobiles and judges would go for six months to a place and stay. So you had opportunities to know the judges,
    and the lawyers, when they went to try cases, would perhaps spend an overnight. So I decided I'd try it. So I went to
    Columbia one summer to see if I liked Law enough to go into it as a profession.
- speaker: Interviewer
  text: This was after you'd been working in Washington during the war. Is that right?
- speaker: Respondent
  text: No, I went there one year before. Then war broke out, and so I went to Washington to help there. And then that summer,
    after the war, I went to Columbia University. I went to Columbia two summers. The war ended and I decided to go on with
    my law. I'd had a year in Washington, too. While during the war I took law at night at the Washington College of Law.
    They had arranged courses for the war workers so they could carry on their education during their war work.
- speaker: Interviewer
  text: Now, there and at Columbia, were there any other women taking law courses?
- speaker: Respondent
  text: Yes. And there was a woman who was in charge, who was one of the high ranking officers at the Washington College of
    Law.
- speaker: Interviewer
  text: Do you remember what her name was?
- speaker: Respondent
  text: No, I don't remember her name. And there was a woman in my class who must have been 60 at the time; she'd always wanted
    to take law and had never had the chance. And she was very smart too. At Columbia University I had the advantage of some
    excellent teachers. I remember Mr. Abott from London taught real property. And there, they didn't think anything about
    a woman because they were more interested in my taking it as a white woman because there were some blacks in the course.
    I remember they wanted us to debate on the Negro question, but we didn't. [laughter]
- speaker: Interviewer
  text: I would think that would have been an interesting debate at that time.
- speaker: Respondent
  text: But they were much more interested in the black and white [issue] than they were in the women's issue. But in 1913,
    the year I graduated . . . (my father had been at the University of Virginia with Woodrow Wilson, and Woodrow Wilson was
    inaugurated that year) my father decided that he'd take the whole family to Washington for the inauguration. So we all
    went. And the women's suffrage fight was getting pretty hot at that time, so I met and saw a lot of very interesting women
    who were making speeches for women's suffrage, standing out on the street and other places. And I think that gave me more
    of a desire to try to do a little more. So I think it was after that, maybe that next summer, that I went to Columbia
    to try it and see how I liked it.
- speaker: Interviewer
  text: Do you remember any specific one of the women's suffragists that you met?
- speaker: Respondent
  text: I was trying to think if I could remember them. One of them was Mary something. I think it was Mary Phillips, who
    later became the President of the National Business and Professional Women's Clubs. I think Mary Phillips is right. It's
    been a long time! [laughter]
- speaker: Interviewer
  text: It has. You've had quite a remarkable life.
- speaker: Respondent
  text: It was very interesting. Well, after the war ended I went to the University of North Carolina, after the University
    of Virginia turned me down. They wrote me they were "still ungracious enough not to take women."
- speaker: Interviewer
  text: That was their wording?
- speaker: Interviewer
  text: They admitted to being ungracious.
- speaker: Respondent
  text: They admitted it. And someone told me they did open the doors to women not too long after that. But Harvard of course
    had no women, and Yale, and I don't think Princeton. So then I wrote to the University of North Carolina and they couldn't
    have been nicer. They not only took me, but tried to adjust their schedule enough for me so that I could get in the courses
    I needed to graduate in one year there. And I found excellent teachers. I think they rate fairly well with Columbia, the
    way I judge it, and with Washington College of Law, where I'd had those courses. And so I was able to graduate that year
    in Chapel Hill, but stayed on to take the summer course to get ready for the Bar exam and then went direct from Chapel
    Hill to take the examination in August, I believe it was, that year.
- speaker: Interviewer
  text: Tell me a little bit about that year at Chapel Hill. You lived in a rooming house, I believe.
- speaker: Respondent
  text: 'Yes, I lived at Mrs. Daniel''s. Mrs. Daniel was a widow with one daughter and she had this rooming house where several
    of the women had rooms, and a lot of the people—the women and the boys—ate. And I was there and roomed with a girl from
    Dobson: Rachel Freeman. Elizabeth Taylor was there from Morganton. By the way I think Rachel Freeman was interested in
    math; I think she was going to be a math teacher. And Elizabeth Taylor was interested in dramatics, acting. And there
    was Annie Smith from Durham there. She became a doctor, a very good doctor located in Durham. And there was another woman—Annie
    Twitty I believe was her name—who was going to be a pharmacist. So there were women doing all kinds of things. And we
    found it very pleasant there. Coming in for meals there was George Denny. And his mother visited him. George Denny started
    the Town Hall in New York. He had these talks and everything on the air and made quite a reputation with them. They were
    very successful. We did have an opportunity to meet Tom Wolfe, he would come occasionally for a meal. And then we knew
    Paul Green. It was an interesting year. The war had ended and a lot of the old students had come back. I remember at the
    law school, it was rather funny, I''d look down and see these boys'' names on the outside of their shoes. They had fixed
    them evidently that way at camp so they wouldn''t lose their shoes! [laughter] And it was an interesting time.'
- speaker: Interviewer
  text: I'm sure your studies kept you very busy, but did you have other extracurricular activities you were involved with?
- speaker: Respondent
  text: Well the women kind of banded together. I remember at Halloween one time, the women put on a fair which was quite
    a success and it was fun. And we were fairly active in church. Parson Mose was there and I'm a Presbyterian, and of course
    he was. So we were very active there. Went to a lot of things. But as I said the women were pretty good workers; they
    did right well. You felt like you had to do as well as you can for the sake of the women.
- speaker: Interviewer
  text: You thought of yourself as being something of a pioneer, an example?
- speaker: Respondent
  text: Well, you realized that if you didn't do it maybe the next woman would have a harder time getting in. So you did feel
    a sense of responsibility.
- speaker: Interviewer
  text: But you've said that you really didn't have a "hard time" as a woman. That your fellow students and professors . .
    .
- speaker: Respondent
  text: They were real nice. The students would kid you a lot, that you were going to ruin the law school, with the women
    coming. But they were nice to you, they really were very considerate.
- speaker: Interviewer
  text: They weren't serious about it.
- speaker: Respondent
  text: No, I think you felt like they were doing it with their tongue in their cheek. When I took my license, I happened
    to be lucky enough that year to lead the class. Judge Walter Clarke wrote me a letter that I'd led the class.
- speaker: Interviewer
  text: I suspect it was more than luck.
- speaker: Respondent
  text: Well, Fred Borman
