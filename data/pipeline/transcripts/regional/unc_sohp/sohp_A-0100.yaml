source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Where do you see Mississippi politics?
- speaker: Respondent
  text: Mississippi politics right now are in a holding pattern. They have made tremendous procedural change, technique change
    since the middle '60s. The way you get elected and the way you are perceived by the electorate if you're going to get
    elected has changed completely since I came back here in '59.
- speaker: Interviewer
  text: From what to what?
- speaker: Respondent
  text: Well, what was the all-out massive resistance campaign, "nigger, nigger, nigger," which prevailed on up through '67
    and including even John Bell Williams racial moderation being a total virtue in the way you run for office. The nearest
    thing to the old kind of a campaign was a little bit of stuff that Trent Lott's stuck on Ben Style down in the fifth district.
    And that was so far removed from the sex stuff that it was kind of silly. Only two years ago. But I don't think anybody
    has any clear notion about where it's going to go from here for the next ten years or how . . . everybody's moderate and
    talk about progress and they talk about the need for working things out together. But I don't think anybody really knows
    what that means in political terms. What kind of changes are going to be the result of it.
- speaker: Interviewer
  text: Was that change in technique a surface thing or was it a basic change in attitudes?
- speaker: Respondent
  text: I think that what everybody always said is about correct. That you don't change anybody's hearts by changing the law.
    But, you sure as hell change the way they act. And naturally that gets around to where it changes the way a lot of them
    feel. I mean, how do you measure—I know how you measure it, but how do you get any good measurements on it? I'd just say,
    though, that the less you whip up certain kinds of emotions, the more they subside, if not vanish. And a lot of people
    clearly were freed by the last ten years to quit being closet moderates and start being, you know, letting the public
    know that they really were let alone, free to be a liberal if you wanted to be. So that what might appear to be instant
    conversion or fast changes may just be that with that blanket demand for conformity gone and the necessity for appealing
    to a different kind of vote now on the surface, it's free.
- speaker: Interviewer
  text: But suppose the boycotts were not extended. Suppose the anti-busing amendment passed in the Senate. Then what?
- speaker: Respondent
  text: I think you would not go through a conventional second redemption as it is sometimes regarded. Ain't possible. I think,
    one, that the black Mississippians aren't the same as the ex-slaves of a hundred years ago. And the second thing is that
    I think that the country as a whole, Mississippi not excepted, is a far different country from a hundred years ago. Old
    Jim Silver, when he wasn't writing up, used to say that what everybody forgets is that there was no intellectual underpinning
    to the notion that there might be—well, there was no intellectual underpinning a hundred years ago for the idea that equality
    really might by a physical and biological and anthropological fact. In fact, most of the social scientists and all of
    the social anthropologists and what have you took it as a given that you were dealing with an inferior. Well, now you've
    got this whole, you know, sweep of whether it's any more right or not doesn't matter. You've got a whole sweep of a century's
    worth of growing. Academic justification for the notion that equality is a fact. So you got a lot of people, I think,
    who are simply not going to find it as easy to forcibly hit the black on the head again and knock him back down. But,
    there is absolutely no question that if the nation—the nation's not going to move off the plateau it's on for a while,
    anyway. But if the nation allows certain pressure points in the South to be removed, certain kinds of pressure taken off,
    and the voting bill is one of them, I don't think it would take us a year to pass the first, or kind of series of voting
    restrictions, and that would begin to alter somewhat the way the poker game was played here. The only thing is that I
    think in this area, as in others, there are things that would not be as easy to destroy as it was in that very short time,
    1870s to the 1890s in the South the last time. That's not really very op . . . I'm not extraordinarily optimistic about
    it because I'm not sure how the nation as a whole is going to go on this thing. But no matter how it all goes, I don't
    think you'll see a reversion to what it was when I came back here in 1959 or anything approaching it. It struck me, when
    I talked over at the University of Alabama the other day—I don't remember whether I talked to you about that or not—I'm
    talking to these kids, for whom - everything was just seared in my mind in blood, you know. Rioting at Ole Miss in '62.
    But for them, that's history, that's something that happened to somebody else. These kids at Tuscaloosa right now, University
    of Alabama, sure as hell don't love their black brothers and all such as that. But on the other hand, it's just an issue
    that doesn't exist for them as to whether or not there ought to be blacks on the campus or whether or not blacks ought
    to vote or whether or not blacks ought to hold office or whether or not there ought to be a colored water fountain. They
    look at me like I'm something out of the Cro-Magnon era, you know, when I talk about some of that business. Just a decade
    ago. And these are the future, at least potential leaders, in almost any sphere of life. And they start out with a bunch
    of givens which, to me at any rate, it seemed so hard to establish.
- speaker: Interviewer
  text: How do you explain to everybody in the sixties who thought everything was going to go to hell if there was massive
    integration?
- speaker: Respondent
  text: I had a history teacher up at Princeton who once infuriated all of us by saying that what was remarkable about people
    who believed as passionately in laws as we alleged that we did in 1861 that it suddenly collapsed with no guerrilla action
    and no holding action anywhere. In a set piece of a battle. And that thereafter discovered how many of our people were
    perfectly willing to cooperate with the hated order in the Reconstruction period. He'd go along that line. Well, he was
    mainly having fun with us, but the point really is, I think, that one of the reasons who there was such absolute deep
    demand for conformity in some of these deep southern states was that the leadership knew damn well that once they let
    up on the pressure at all that, in fact, everybody wasn't in agreement. I mean that there were, in fact, great numbers
    of people just sitting there waiting for some way to get out from under this really oppressive system. Whites, I'm talking
    about. And once the feds made it possible for you to say, "Well, I have to obey the law," there were an awful lot of people
    who wanted to obey the law because they in fact believed in it. My god, the energy that went in to it. Justice better
    used for a lot of people now, not to have to sit there and worry about it all the time.
- speaker: Interviewer
  text: Clarke said at the beginning of the '60s that he thought massive integration was at least thirty years away, and he
    thought if it did come this would be the worst state in the union. Okay? Yet it turns out to be that there are fewer incidents
    and problems here than any place else. How do you explain that?
- speaker: Respondent
  text: Well, of course that's also a matter of some perspective. Through 1965 I wouldn't have said this was the place with
    the fewest incidents.
- speaker: Interviewer
  text: Talking about 1970.
- speaker: Respondent
  text: 'But from here on, with you mean that so-called unitary education, whatever that funny phrase meant? Yeah, I just
    think that one of the reasons clearly was that there had been damn near ten years in which the business and professional
    issue of this state, because of all the blood that flowed, you know, had to face up to what the consequences were going
    to be. If they were realists, and didn''t like the idea of change, they had to realize that three dead kids in a county
    in ''64 plus one Selma bridge incident in ''65 guaranteed two civil rights bills they wished to God they''d never seen.
    I mean, you know, just as a matter. . . for that type of guy. And for the other type of guy who just wanted to be free
    of what he couldn''t justify anyway, all that blood and all that murder and there was just—and all that arson and everything
    else in the ''60s, convinced them. And they were slow to come to it, but convinced the business and basic economic leadership
    in the state, that they, they simply could not afford to let happen not only what Clarke or anybody—you know, I predicted
    that it was going to be, before you''d have massive integration the schools would close. I was—1962, it was a flat statement
    I wrote in three different magazines: we''d never see the public school system stand up to it. But between ''62 and ''70,
    there were so many really scary things that happened that I just think a lot of people started to open their eyes. They
    were not going to allow it to happen again.'
- speaker: Interviewer
  text: We had a couple of state senators told us that the real psychological impact of Ole Miss, when Kennedy sent thirty
    thousand troops down, was the Mississippi natural crowd going to meet the federal army. That this had a tremendous impact.
    That when the court orders came down, it was clear, there would be a sense of futility. That was one part of it. Another
    part was the part you mentioned, the economic part. It was a combination. That you have one element that may respond more
    to the economic part; that you had another element that would have fought if it would have done any good, but it wouldn't
    do any good and they knew it wouldn't do any good.
- speaker: Respondent
  text: I've always been a believer in the salutary effect of hitting somebody over the head hard, I mean, to get—
- speaker: Interviewer
  text: We had a Klansman that told us pretty much the same thing.
- speaker: Respondent
  text: . An equally good effect was not being sure who his brother Klansman was. You know, about '65 and '66. Which was another
    example of federal presence. What it is to suddenly become, what, somewhere in the top ten of the FBI enclaves in the
    country for that period. That had its effect. Well, sure, I believe in that. Though, the immediate effect of Ole Miss
    was to make, in every way you could make it, the state more rigid. Right on through, you know, to '64. Elected a guy who
    said he was going to be more rigid. And destroyed what few little voices there were in the state in the election of '63
    who had been vaguely moderate. You know, who just pretended that they thought the law ought to run and ought to be obeyed.
    Including even this county, you know, which it had not happened in before. And in the meantime, you know, as I say, other
    things were sinking in. Scores and scores of churches burned in '64. The murders. And suddenly the whole focus came back
    down again on Mississippi. And you know, it wasn't until the winter, or let's say early '65, that the Mississippi Economic
    Council finally could get itself together to issue a statement saying, "You ought to obey the law, it's time for us to
    turn this thing around and obey the law." And that was after that whole series of burnings and murders. And that was when
    Kennedy was president. That was the first time that they, I think, just looked at each other in the boardroom and said,
    "You know, this is going to kill us. And we've got to quit it." And then the Voting Rights Act of '65, just suddenly,
    wham, added a hundred thousand votes over the next year and then more. Although '67 didn't exactly produce a model of
    new southern governors in John Bell Williams, it, with the absolute collapse of Ross Barnett, did prove something about,
    you know, what the attitude of the folks was going to be. But it shouldn't be forgotten that Ross and Jimmie Swan together
    got a hell of a lot of votes in '67. And John Bell Williams, clearly having been the spokesman for the Citizens Council
    since the day that they were born and an unrelenting segregationist, was not being perceived as a great moderate, either.
    He sort of posed as one in a lot of his tactics between a liberal William Winter and a buffoon who had brought us down
    to our knees, Ross Barnett. Which is why Coleman threw in with, because he was scared of Barnett.
- speaker: Interviewer
  text: Coleman supported Williams against Winter.
- speaker: Respondent
  text: Coleman said that is the whole name of the game, is that J. P. Coleman sent his agent, now attorney general, Judge
    Summer, over to the campaign for John Bell. And that is where Summer came from, is straight out of Coleman's camp. Al
    Summer was Coleman's right-hand man and his old boy that, you know, he used for everything. And the whole deal was that
    Summer would—well, it gets all involved in—. And the whole thing was that Coleman insisted that he was doing it to save
    the state from Ross, who he said was otherwise going to get elected.
- speaker: Interviewer
  text: And things just moved further and faster than Coleman perceived?
- speaker: Respondent
  text: I believe so. I believe J. P. was just sort of locked in a Mississippi that sort of gutted him when he was governor
    and some of his measures. Well, it's like all of us. I mean, his vision just wasn't as expansive as what was going to
    happen.
- speaker: Interviewer
  text: Could Winter have won with Coleman's support?
- speaker: Respondent
  text: I don't think that he could have. I don't think we'd moved that far under any circumstances.
- speaker: Interviewer
  text: Can you summarize very quickly James Eastland's background. Is there anything good written on him?
- speaker: Respondent
  text: No. I mean, what's his name just did a quick hatchet job on him which was erroneous to begin with in I mean, that
    was just—and other than that—
- speaker: Interviewer
  text: What is Eastland?
- speaker: Respondent
  text: Oh, basically immoral. A person whose major allegiance is to the economic class he comes from. A person whose lack
    of belief in his words is matched only, I think, by fundamental belief in what the reality of those words are. I me
