collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I was hoping that we could begin with you telling about your parents and when and where you were born.
- speaker: Respondent
  text: I was born in eastern Kentucky, Harlan County, which is a coal-mining area of the state. My father was in the coal-mining
    business, first as an accountant and later as a manager of a small, independent coal mine.
- speaker: Interviewer
  text: What was his name?
- speaker: Interviewer
  text: What was your mother's family back there?
- speaker: Respondent
  text: My mother's family were mainly farmers, although there were some exceptions, one notable one being a county official
    who was in politics during the period in which the unionization of the mines took place. He was, I'm afraid, recorded
    as not being very sympathetic to labor. The labor unions wrote a song about him.
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: His name was John Henry Blair and Blair is my mother's maiden name.
- speaker: Interviewer
  text: I was going to ask you what memories you had had of the Harlan County strikes when you were about ten.
- speaker: Respondent
  text: They are surprisingly vivid, I suppose because they were so dramatic. There was a lot of bloodshed, as you know. I
    remember the scene as being one of fear. Coal mining itself is physically, to me, still a frightening business. I attribute
    my current claustrophobia to the thought of being in a dark place such as a mine. So I remember it fairly well. It was
    a tough period for that area. Of course, it was a depressed period all over the country. There was a lot of true poverty
    in the area in which I grew up.
- speaker: Interviewer
  text: Did you feel as if your family was on one side or the other during the strikes?
- speaker: Respondent
  text: Oh, yes. We felt aligned with the labor struggle with the exception of Uncle John Henry. I think he was too, it's
    just that he was in a political situation that was somewhat different. My father, although he ultimately was in charge
    of a mine and had to bargain with the workers, was basically very sympathetic to the problems that very low paid, hard
    working miners were facing.
- speaker: Interviewer
  text: That song is "Which Side Are You On"?
- speaker: Interviewer
  text: When you were very small, your parents divorced. Do you remember what impact that had on you?
- speaker: Respondent
  text: I don't remember that very well because we stayed with my mother and my father was nearby. That did not seem to have
    much impact. It was unusual, in those days, for parents to get divorced and I suppose I felt in that sense somewhat set
    apart. But, as I say, I had access to my father so I didn't feel that I missed him in the usual sense.
- speaker: Interviewer
  text: What was your mother's name?
- speaker: Respondent
  text: Her name was Cenia Beair.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: I have an older sister and three brothers between her and me and then one brother younger than I.
- speaker: Interviewer
  text: Did you all live with your mother afterwards?
- speaker: Interviewer
  text: How did she make a living?
- speaker: Respondent
  text: We were supported by monthly payments from my father. She, however, had grown up in a farm family and she continued
    to farm.
- speaker: Interviewer
  text: So you lived on a farm?
- speaker: Respondent
  text: For the most part, yes.
- speaker: Interviewer
  text: Did she run the farm herself?
- speaker: Respondent
  text: She and my brothers, yes.
- speaker: Interviewer
  text: Were they considerably older than you?
- speaker: Respondent
  text: Well, they ranged. My sister, who was the head of the family, is about a decade older than I and then the three boys
    were in between us.
- speaker: Interviewer
  text: How big was the farm?
- speaker: Respondent
  text: Well, it varied. We never actually owned farms; we weren't in that sense farmers. But at one point we ran a dairy,
    a small dairy, and at other times we mainly grew foodstuffs for the family and the farm animals. But it was never anything
    extensive.
- speaker: Interviewer
  text: So you would move from farm to farm often?
- speaker: Respondent
  text: We had several moves, yes.
- speaker: Interviewer
  text: When you were twelve you went to a boarding school. Why was that?
- speaker: Respondent
  text: It was a matter of convenience. My mother lived far enough away from a high school to make it difficult for me to
    go by bus. The boarding school was one of the Presbyterian Church's mission schools which was actually near where my father
    was then working. I guess it was a matter of my own desire to be in a better school than the public schools were, in my
    view.
- speaker: Interviewer
  text: Did your older brothers and sister seek further education?
- speaker: Interviewer
  text: So you were unusual in your family?
- speaker: Interviewer
  text: How was your schooling paid for at the Presbyterian school?
- speaker: Respondent
  text: It didn't cost anything, as I recall. I don't know, my father may have paid some small sums. But I think it was largely
    paid for by the Presbyterian Church.
- speaker: Interviewer
  text: Now we read so much about divorced women having trouble supporting their family. Do you remember that being a problem
    in your family?
- speaker: Respondent
  text: Oh, yes, it was a problem. It is hard to separate the reasons for the low-income status of the people in that area.
    It was partly that there was widespread unemployment, that mining was so underpaid, that the whole economy was in very
    bad condition throughout the '30s. But, yes, there is no question that being in a family without a father in those days
    was an extreme problem.
- speaker: Interviewer
  text: What do you remember about your boarding school as an educational experience?
- speaker: Respondent
  text: Only good things educationally. The teachers were first-rate and they came from all over the South, and not Kentucky,
    by and large.
- speaker: Interviewer
  text: What was the name of the school?
- speaker: Respondent
  text: Stuart Robinson. It is no longer there but in its day was first-rate. They had a good little library. The standards
    of performance were high. I had always been a good student but that was the best chance I had to dig in. Good teachers,
    as I say, and it was a reassuring time for me, confirm a lot of interests that I had.
- speaker: Interviewer
  text: Was it difficult for you to be away from your family at that young age?
- speaker: Respondent
  text: No, because they were nearby.
- speaker: Interviewer
  text: How far away was the school?
- speaker: Respondent
  text: From my father's office it was a short walk. It was farther away from my mother, but I always got home for the holidays.
- speaker: Interviewer
  text: Was it the people at the school who encouraged you to go to Berea?
- speaker: Respondent
  text: Yes. They varied between wanting me to go to Berea or go to a Presbyterian school. Presbyterian colleges, Flora McDonald
    in North Carolina was one of the ones they recommended, but, of course, I couldn't afford that and they were very supportive
    in helping me get into Berea.
- speaker: Interviewer
  text: What do you remember about Berea in the '30s? What was the atmosphere like there?
- speaker: Respondent
  text: Of course by then it was late '30s, into the '40s, so the national scene was somewhat different from my early childhood.
    And again, only good things. I have absolutely no bad memories of Berea—not in the classroom, not with my peers. As you
    know, I'm a trustee of the college and have been for a long time, with a time out while I was in Washington. I try to
    help support them financially, help them raise money. Berea was a place where equality and equal opportunity was taken
    for granted, even in those days, long before it became so popular.
- speaker: Interviewer
  text: You mean between men and women?
- speaker: Respondent
  text: Between men and women and between races. It was a college formed after the Civil War for the purpose of educating
    black and white and it retained that legacy and that philosophy. It held notions of equal opportunity between races, between
    sexes, and also opportunities for youth from Appalachia who were by and large poor and who were isolated geographically
    from the mainstream.
- speaker: Interviewer
  text: Would you have been there at the same time as Harriet, the novelist?
- speaker: Respondent
  text: The name doesn't sound familiar.
- speaker: Interviewer
  text: What work did you do at Berea as your co-op work?
- speaker: Respondent
  text: All of us did all sorts of things. My freshman year I remember only washing dishes; then I worked for the college
    hospital as receptionist and typist; then I worked for the drama department where I did mainly costume shows; and my senior
    year I worked for the economics department helping to grade papers, sort of apprenticing myself to the top professors
    in that department.
- speaker: Interviewer
  text: Were they still doing farm work at the time that you were there?
- speaker: Respondent
  text: Oh, yes. The college still has a farm and a dairy. I didn't have anything to do with that but they give a major in
    agriculture and the students do in fact man the farm.
- speaker: Interviewer
  text: Was it at Berea that you developed the beginnings of your ambition?
- speaker: Respondent
  text: I don't know how one knows when aspirations arise. I suspect that I always wanted to do better myself intellectually
    and financially than the people around me. Actually, I grew up in somewhat better circumstances in my family than lots
    of others but nevertheless it didn't seem to me that that was the way things ought to be, not just at a personal level
    but more for all the people that I was close to. The whole community needed so many things done. So my interests in changing
    things sociologically, economically must have formed perhaps even before high school.
- speaker: Interviewer
  text: When you first made your decision to go to Stuart Robinson?
- speaker: Respondent
  text: Yes. Although I don't remember that as a period of social integration because it too was isolated and dwelt with learning
    the basics, a lot of drill, a lot of emphasis on grammar and Latin and tools which were, I guess, what high school was
    supposed to be.
- speaker: Interviewer
  text: Did you have particular teachers at Berea who urged you to go on to graduate school?
- speaker: Respondent
  text: At Berea, oh yes. The economics department was very eager for me to go ahead to graduate school. In fact, my coming
    to Duke was largely a result of my major professor who had his Ph.D. from Duke.
- speaker: Interviewer
  text: And his name was?
- speaker: Respondent
  text: Rector Hardin.
- speaker: Interviewer
  text: Rector was his first name.
- speaker: Respondent
  text: Yes. And he had done Ph.D. at Duke under some of the men that I had later studied under.
- speaker: Interviewer
  text: At Duke you worked with Joseph Spengler and Frank Deviyver. Were they your mentors to you?
- speaker: Respondent
  text: I think Frank Deviyver was a mentor in the best sense, although of course we didn't know that word then. He was extraordinarily
    kind and considerate and thoughtful about his students. I worked directly with him. I did my dissertation under him. I
    helped him revise one of his books. I think he would not have used that word, either, but I think he took a keen interest
    in all his students, perhaps a special one in me because I was around for a long time. Then of course when I rejoined
    the faculty he was also very helpful. With Dr. Spengler, our relationship did not develop until I came back and joined
    the faculty. I was just his student in graduate days. An inspiring man, he was a brilliant teacher, for whom I have profound
    respect but whom I never got to know really, until much later. After I had been on the faculty for quite some time, we
    did some writing together. Then he was extremely helpful but I never thought of him as a mentor so much as an inspirational
    figure.
- speaker: Interviewer
  text: When you came to Duke you were very young but you got opportunities to teach early on, and I think I've read that
    that was in part due to the wartime demands for teaching. Did you see the war as a time of often really expanded academic
    opportunities for women?
- speaker: Respondent
  text: Well, I didn't think of it in that way but one realization subsequently has stuck with me. Throughout the women's
    movement, of which I consider myself a part, amid complaints that we've all had against sex discrimination, it has occurred
    to me that had I been a male in the early '40s I would have been in the service. Being female I was allowed to continue
    my education and that is a very important thing to remember. I found it more difficult to get teaching jobs after I got
    out than a man would have had and I often reminded myself that in fact getting my Ph.D. may have been somewhat easier
    for me than for a man. So there were some tradeoffs as I viewed it. And it is true that I was allowed to teach sooner
    than usual because there were no men around.
