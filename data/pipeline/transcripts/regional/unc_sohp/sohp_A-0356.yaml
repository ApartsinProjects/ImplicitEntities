collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Everett Otis Andrews.
- speaker: Respondent
  text: Otis Whitfield, he was named for Whitfield, a Whitfield I guess of South Carolina history. He fought a duel, one of
    the Tillmans.
- speaker: Interviewer
  text: Yes, Pitchfork Ben. He was a bad member wasn't he? You all planted these trees? That's a live oak.
- speaker: Respondent
  text: They came up.
- speaker: Interviewer
  text: Oh, really? What is this one here?
- speaker: Respondent
  text: It's what you call a White Oak.
- speaker: Interviewer
  text: A White Oak?
- speaker: Interviewer
  text: It's got a wisteria vine in it and it's huge.
- speaker: Respondent
  text: My husband's people lived in Summerville, so when they sold that property, we decided we wanted to bring something
    to remind us, so we brought the wisteria from Summerville, South Carolina.
- speaker: Interviewer
  text: How old is this house?
- speaker: Respondent
  text: We don't know. Our deed goes back and I'll be glad to show that our deed goes back to when Sherman burnt the courthouse,
    and it says in there . . . I will show it to you. I can put my hands on it very quickly. Sherman burnt Columbia in '65.
    It was February 18, I believe, 1865. They came through here and then they went north, right by the property where I was
    reared.
- speaker: Interviewer
  text: So you grew up not far from here?
- speaker: Respondent
  text: I grew up out on [highway] 21 which is the road to Charlotte. The old road to Charlotte. Old 21 goes to Charlotte.
- speaker: Interviewer
  text: How far out from town?
- speaker: Respondent
  text: About five miles. That's where all the family lived except for my sister. We have a sister in Birmingham. I mean Michigan—Ann
    Arbor Michigan. Her husband [unclear]. He's retired now. They're still living in Ann Arbor.
- speaker: Interviewer
  text: You were a social worker?
- speaker: Respondent
  text: I was everything from a busy body to a hell-raiser. Yes, I would say I was a social worker when I started out. My
    parents were people that were always concerned about others, or the disadvantaged or under the pressure of being mistreated.
    They reared us that they and they also reared us to believe that no one was better than ourselves unless they behaved
    better than we did. So I never suffered from an inferiority complex. And in these days I would curse out anybody—trashy
    white folks and the press.
- speaker: Interviewer
  text: You just don't take any lip off anybody?
- speaker: Respondent
  text: No, I never have. I don't try to get anybody to get into anything, but if put in a corner I'll fight my way out.
- speaker: Interviewer
  text: Well, when somebody is courteous to you you are always courteous back to them.
- speaker: Interviewer
  text: I never knew you to ever be just mean to somebody . . .
- speaker: Respondent
  text: No, I wasn't reared that way.
- speaker: Interviewer
  text: No, you've got good manners.
- speaker: Respondent
  text: I had a policeman said he was a Klansman, call me one day. I said, come on up here as long as you stay on the sidewalk
    it's alright. I said if you get on my property somebody might that cat [laughs]. And then one called me once and he said
    he was a preacher. We talked the longest and finally he started cussing and I said you are a preacher and you cuss. He
    came down and he started talking all right again. Well, my folks were saying way back, don't get no further back than
    they knock you back. But the average person—people are all right you know, a lot of times they have to try, try you out
    and see what they can do. Trial and error, you know. But now after that old trashy kind of cracker crowd, you know, after
    a while they just, they're all right, some of best friends. They all come over, do things, bring this, do that. And I
    have good connections with the press and you know, people at the University. [laughs]
- speaker: Interviewer
  text: I want to show you something that you probably have seen before. That's a list of the people that attended the Southern
    Race Relations Conference in Durham in 1942. It starts on that page and it goes over, there's quite a few names on there.
    Your name is one of them.
- speaker: Respondent
  text: Yes, I was there.
- speaker: Interviewer
  text: You're the only person that I've been able to identify, so far, who was at that meeting who's still living. If you
    see anybody else on there that you know is still living I wish you'd point them out to me.
- speaker: Respondent
  text: I know that Jordan Hancock is gone, Charles Johnson is gone.
- speaker: Interviewer
  text: Charles Johnson, he was a great man, wasn't he?
- speaker: Respondent
  text: Yes, he was. I knew most of the others.
- speaker: Interviewer
  text: Gordon Foster gone?
- speaker: Interviewer
  text: Luther Foster, I mean.
- speaker: Respondent
  text: H. B. Butler is gone, he was really sweet. And Adams. I don't know about old J. A. Bacote. Is he still living?
- speaker: Interviewer
  text: I don't know. Okay, let me turn this over because that's repeated over there and you can see the whole name. You think
    he might be?
- speaker: Respondent
  text: I never thought he was gone. Is this the same copy?
- speaker: Interviewer
  text: Yes, ma'am.
- speaker: Respondent
  text: Benedict College, call out there—they will know.
- speaker: Interviewer
  text: Yes, ma'am, you said he is.
- speaker: Respondent
  text: No, he's gone. Bacote is gone.
- speaker: Interviewer
  text: You changed your mind about him, then?
- speaker: Respondent
  text: I'm almost sure he's gone. You can call Benedict.
- speaker: Interviewer
  text: Or even look in the phone book, maybe.
- speaker: Respondent
  text: or knew anything about it was
- speaker: Respondent
  text: She came from Virginia. Both and Stuart are gone.
- speaker: Interviewer
  text: No, this was in Durham.
- speaker: Respondent
  text: I didn't know James Jackson is still living.
- speaker: Interviewer
  text: James Jackson? where is he?
- speaker: Respondent
  text: He's up in Hampton, Virginia. He and his wife are living. He worked in the Southern Negro Youth Congress.
- speaker: Interviewer
  text: Where did they identify him there as being . . .
- speaker: Respondent
  text: Southern Negro Youth Congress. He and Esther are still living.
- speaker: Interviewer
  text: In Hampton?
- speaker: Respondent
  text: No, they are not in Hampton. He was head of the youth congress in Birmingham. We had that trouble down there. Who
    was that old governor that went down there?
- speaker: Interviewer
  text: I forget his name.
- speaker: Respondent
  text: We had so much with the old police chief.
- speaker: Interviewer
  text: Yes, with Bull Connor.
- speaker: Respondent
  text: He was a bull, too.
- speaker: Interviewer
  text: He was. But you say James Jackson . . .
- speaker: Respondent
  text: He and his wife were both outstanding civil rights workers.
- speaker: Interviewer
  text: And you say where I might find them.
- speaker: Respondent
  text: It will come to me in a little bit. I'm ninety years old but my brain ain't what it used to be.
- speaker: Interviewer
  text: When's your birthday?
- speaker: Respondent
  text: December 5, 1899. Rufus Clement, is he still living?
- speaker: Interviewer
  text: Rufus Clement, no ma'am, he's gone.
- speaker: Respondent
  text: Esther and Jack, they are real nice, they are fine young people.
- speaker: Interviewer
  text: You called him Jack?
- speaker: Respondent
  text: We called him that in the work field.
- speaker: Interviewer
  text: And his wife's name is Esther?
- speaker: Respondent
  text: There's a lot of things . . . I know a person did it
- speaker: Interviewer
  text: Did you finish that page?
- speaker: Respondent
  text: Yeah, I finished it.
- speaker: Interviewer
  text: Look on the next page. There's a few more names over there.
- speaker: Respondent
  text: Lee's gone, gone. I knew, I think all the are dead. I can't see Jay King. I work with all degrees and classes of people
    in education. A lot of times you know, you have to talk their talk together to know what you're talking about. I don't
    see anybody on here that I know is living.
- speaker: Interviewer
  text: So you probably are the only one? Unless the Jacksons'.
- speaker: Respondent
  text: Yes, I know the Jacksons' are still living. very fine young people, young to me.
- speaker: Interviewer
  text: Where do you think they are?
- speaker: Respondent
  text: I know where they are. It will come to me.
- speaker: Interviewer
  text: What state?
- speaker: Respondent
  text: They are in Virginia. Almost sure it's Virginia. My brain's about worn out, child.
- speaker: Interviewer
  text: No, I don't see any sign of that. Let me see if I can get you to focus on something for me. You went to Durham. Do
    you remember where that meeting took place in Durham?
- speaker: Respondent
  text: As I remember it was at the college there.
- speaker: Interviewer
  text: At the North Carolina Central.
- speaker: Respondent
  text: Yes, [James] Sheppard . . .
- speaker: Interviewer
  text: Sheppard? Is he on this list?
- speaker: Respondent
  text: Let's see, it's alphabetical order. I saw it a while ago. I have a house in the back that has a lot of my old stuff.
    I want to get some of it out. What are you really writing on?
- speaker: Interviewer
  text: I'm writing about that period of time in the 30's and 40's when these meetings were taking place. It was at the college?
- speaker: Respondent
  text: Who was I talking about?
- speaker: Respondent
  text: Yeah, I remember him well.
- speaker: Interviewer
  text: It wasn't at the insurance company or the bank was it?
- speaker: Respondent
  text: I don't know why I thought it was at the college . . . It could have been. I believe you are right, I believe it was
    at the North Carolina Mutual Insurance Co. But now, I'll tell you who knows where, a fellow named Clemmons. Did you ever
    run into Clemmons? He's retired now but he's still in Durham.
- speaker: Respondent
  text: His name will come to me, but he's originally from Charleston. I talked to him the other day. I was somewhere where
    they asked me to speak up in North Carolina the other day. He came to the meeting that day, I was surprised and he looked
    really well. He was connected to North Carolina Mutual. If you are ever on that side of Durham it would be good to talk
    to him. What am I looking for now, Sheppard?
- speaker: Respondent
  text: Why isn't any of this in alphabetical order? When I pick up something like this I put it in alphabetical order.
- speaker: Interviewer
  text: Do you remember that Gordon Hancock and P.B. Young were kind of the leaders of that?
- speaker: Respondent
  text: Yes, I knew them both.
- speaker: Interviewer
  text: Is that the way you remember it that they were pretty much in charge?
- speaker: Respondent
  text: Yes, but Gordon Hancock was the initiator.
- speaker: Interviewer
  text: He was the one?
- speaker: Respondent
  text: Yes. I'm going in a minute and get that envelope. When you write my name put the "p" out on it. It's Simkins.
- speaker: Interviewer
  text: Okay, good. I meant to ask you that.
- speaker: Respondent
  text: My husband's daddy was an old slaveowner over there, and his daddy was the slaveowner's son. He took me.
- speaker: Interviewer
  text: Do I have the rest of it spelled right, Modjeska?
- speaker: Respondent
  text: Yes. I had to carry that along time. When I was born there was a Polish woman who was well known at that time, actress,
    and her name was Helena, her first name was Helena. My mother's baby sister thought it was a beautiful name and she loaded
    me up with that and I've been toting it all these years.
- speaker: Interviewer
  text: Her name was Helena Modjeska?
- speaker: Respondent
  text: Helena Modjeska, she was a Polish actress. You can look that up in the biographical sketch somewhere, but that was
    her surname. Here's James Sheppard, President of North Carolina College, Durham.
- speaker: Interviewer
  text: And he's gone though?
- speaker: Respondent
  text: Yes, I'm almost sure he is.
- speaker: Interviewer
  text: Do you remember anything much about that meeting? About what went on there?
- speaker: Respondent
  text: No, I really don't know. What year was that?
- speaker: Interviewer
  text: It was in October of '42.
- speaker: Respondent
  text: Well, at that time, I know it would have concerned getting the ballot.
- speaker: Interviewer
  text: Yes, that was one of the issues. Another issue that was real hot was whether or not this group of people ought to
    come four square against segregation. All the Jim Crow laws. One side was arguing to do that and the other side was arguing
    no, if we do that we're going to kill off all the hope we ever would have of having any kind of white support and we've
    got to have white support in order to ever pull this thing off. So what we better say is that we're against segregation
    but we recognize that for the time being we've got to live within the boundaries of it.
- speaker: Respondent
  text: I don't remember that and I wouldn't have been a part of it if I had.
- speaker: Interviewer
  text: You would have been on the side saying you got to come down against it.
- speaker: Respondent
  text: Yes. I guess that's the reason I wasn't part of the decision making.
- speaker: Interviewer
  text: The decision was made not to. Charles Johnson wrote the statement and it's very carefully worded to say that this
    group is unalterably opposed to segregation but they at this time are not choosing to demand that all the segregation
    laws be taken off the books. Save that until later.
- speaker: Respondent
  text: That was somewhat the spirit of the time. I guess maybe I've always been bull-headed—I just ran right straight into
    the power structure all the time. I don't say whites I say power structure because I dealt a
