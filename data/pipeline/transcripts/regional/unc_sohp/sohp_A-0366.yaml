source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: Properties that my great-grandfather owned . . . he was what they called a hard-shelled Baptist preacher. The old
    home sits over yonder on the corner of Fayette County, now Fulton County, and Coweta County.
- speaker: Interviewer
  text: And it's still there, the house?
- speaker: Respondent
  text: The old house has been patched up and all that and the road runs right close to it now because at one time the old
    Campbell County which was merged with Fulton County, the three counties converged there and part of the house was in each
    county. Somewhere and I don't know exactly when they moved the county line about 300 feet South so now the old house sits
    in a place. There's a burial ground up there where they use rocks or cedar trees for the markers. There are a few people
    left in there. There was a little old fence around it. I've been over there.
- speaker: Interviewer
  text: Are some of your people buried there?
- speaker: Respondent
  text: Yes, some of them. There was a family, my grandmother's mother was named Head. There's some Heads way back in here
    now. I don't know them. My father was named Waymond Head Duke.
- speaker: Interviewer
  text: This is your growing up place.
- speaker: Respondent
  text: This was part of the property. Now, after the Civil War a family of black people named Shropshire, pretty smart people,
    came into this part. I don't know exactly where they came from, I understand it might have been down around what is now
    Henry County, back in there. These black people, one or two of them were bright, articulate enough to be able to . . .
    They bought two or three hundred acres right in here. This is part of it. The Shropshire people, some of their names appear
    in the deed records here. Old man Shropshire, I think it was Otis Shropshire, died and he left two or three children.
    I know when I acquired this land afterwards I had to get a quit claim deed from Mrs. Gray who was a Shropshire, she was
    a very old woman, to state that her father after his wife died never remarried. When checking the title they wanted to
    know if he remarried because somebody would have been entitled to part of it when they administered the estate because
    he died in testate. So, I didn't need but one affidavit even though there were three or four of them. She said he was
    a very old man and she and her husband lived in his household until he died. He never remarried. That satisfied it. I
    put it on record over at Fayette County and it helped a lot of other people. The people across the road and up there.
    There were four pieces of it and I got a fourth of it. I came into possession of this property in this manner. A fellow
    named Frank Jones and his wife Lizzie Arnold Jones—Frank was a very mean, illiterate, warped minded man—Lizzie Arnold
    came from the Arnold black people that lived over on another place, their own land. Lizzie was a smart woman. He bought
    this from one of the Shropshire. They sold it to him and he paid the first note on a time basis. He had lived here about
    three or four years without paying any of the yearly notes or interest. He killed a man. They claimed that he and the
    fellow were making liquor down here and the old part of the still where they buried it was down there on my land. I found
    it down there. But, he killed him. He was a white man and at that time it was kind of like the plea of Englisbry in England,
    except in reverse order. They put Frank Jones in jail. There was a lot of prejudice here but the man that he killed was
    a bootlegger. A lot of grumbling, a lot of things going on.
- speaker: Interviewer
  text: This would have been about when?
- speaker: Respondent
  text: Twenty-eight or twenty-nine years ago, before I got on the bench, of course. Lizzie came over there with her uncle
    whose name was Wright Knox. I had a big farm over in Fulton County and I had about 200 plus acres with a lake. It was
    a cattle farm which I later sold. She came over I remember on Sunday morning driving an old pick-up truck. She and Wright
    got out and she said, Frank needed somebody to represent him and he over there in Fayette County in jail. So I knew immediately
    Fayette County didn't have many blacks in it and those that they did didn't have much say so in anything. It would be
    a tough case to fool with even if he was justified in the murder. Being a black man a jury would say you ought to have
    some time. I told her that. I said, "I don't see from what you tell me, Frank's in jail over there, they'll indict him
    for murder and I don't believe that he will be able to get freed." I said, "it will have to be a monumental case of self-defense."
    From what she told me it was not altogether justified. I'm not too sure it wasn't a cold-bloodied murder even today. I
    said, "what have ya'll got to pay me?" I knew it was like putting your arm in a gristmill. You get into some of those
    cases, you can be caught with something there and fight your way out. She said, "well, we don't anything much. They are
    running the foreclosures on that property that we own and it is to be sold next Tuesday." I said, how much do ya'll owe
    on it?" She said, "we paid a very small amount down and Frank never paid but one note. We're about three years behind."
    I said, "you'll have your advertising costs and the law fee that's built into the note." I said, "if you don't need to
    do anything with it and all, we'll just let it go. Let me check into it. I got Monday and I'll see what I can do and see
    if I can contact the owner." Her name was Shropshire too. I said, "I'll see whether it is of any value at all and try
    to do something about it. If it's worthy I'll stop the foreclosure. I'll talk to the other side and make them an offer
    and see if I can bring you out of it with something left for me for attorney fee." She said that would be fine. I did
    check into it and it happened that a lawyer—he became a municipal judge in the General Ordinance Court—he was a pretty
    nice fellow. A black lawyer and he represented this lady. I called her and she said to refer it to him. I referred to
    him and I said, "listen, what do ya'll want for this place? Will you discount it any? Will you cut out some of that cost
    and the interest? He said, "let me call you back." He did and he said, "yes, we will cut off about three hundred dollars
    on the interest and we'll absorb the advertising cost if you want to buy it." I said, "well, I'm representing this man
    and I'll talk to his wife and to him and see what they'll do. I hope I can explain it to them. Sometimes they don't understand."
    So I told them and I gave the fellow a check for the total amount owed and took the deeds from Frank and his wife. I've
    still got them over there. Just before the sale went off he accused me. In fact, the landowners around here were over
    there waiting for him to put it up in front of the courthouse door to buy it. They stood around and when they came out
    to make the public sales they didn't put that up. They went in and wanted to know what was up. They were told that the
    notes had been paid off and these people dismissed the foreclosure and they sold it to somebody. Well, they checked the
    records to see and I put it on record. They went to a lawyer and wanted to know what they could do because I had prevented
    a public sale. The lawyer said that I paid the note off which satisfied it and they couldn't sell something that they
    had already sold. That just stopped the sale and there's not anything that can be done about it. Just because they run
    an ad in the paper doesn't mean that they got to sell it if somebody satisfies the debt prior to the sale and that's what
    happened. That's the way I got the land. Later, one of them, it was a big landowner, called me and wanted to know what
    I'd take for it. He knew, he had found out about what I had in it. He exaggerated, I didn't have quite as much out of
    pocket cash in the land as he thought. He just took the surface angle. I told him, I said well . . . I had a big farm
    over yonder about three hundred acres back over there. I said, "I'm not trying to sell it, I'll just hold it there." They
    had a house here, a wooden house, and I said I wouldn't think of taking less than so much for it. He said, "that's too
    much." I said, "well, if it's too much, I'm not mad about it but I want to keep it." The fences were down at the old house,
    not this one. It's where it stood. So, that's the way I came back into possession of it and I think I've had it about
    thirty years. I later sold my other farm and some gamblers were in here one night and burned up the house. It wasn't anything
    to it. I fenced it and I had a few cattle here up till two years ago. I still have a horse or two out there.
- speaker: Interviewer
  text: So that's how you came to end up back here so close . . . Were you actually born close to around here?
- speaker: Respondent
  text: I was born over here over at Palmetto which is about four or five miles from here.
- speaker: Interviewer
  text: You went to Oglethorpe?
- speaker: Respondent
  text: I graduated there with second honors.
- speaker: Interviewer
  text: Then you went to the Atlanta law school.
- speaker: Respondent
  text: I went to Emory Law School and got a Juris Doctorate Degree.
- speaker: Interviewer
  text: But, did you go earlier to . . .
- speaker: Respondent
  text: I did. I passed the Georgia Bar before I finished law school and resigned the job as auditor with the telephone company
    and started practicing law. Young people have a lot of nerve. I didn't care about the other kind of life. I took the bar
    examination thinking there would be so many people flunking it that I'd take it first to know what it was like.
- speaker: Interviewer
  text: You passed it.
- speaker: Respondent
  text: I passed it and then I went to work as the Assistant District Attorney. It was called Solicitor General then.
- speaker: Interviewer
  text: In Fulton County?
- speaker: Respondent
  text: In Fulton County, John Boykin, I was the youngest man in the office. I practiced about a year and a half and went
    through the campaign when Roosevelt tried to defeat Walter Judge for the Senate and Lawrence Camp . . .
- speaker: Interviewer
  text: That was in '38 wasn't it?
- speaker: Respondent
  text: Yes, Lawrence Camp was my good friend. I used to caddy for him on the golf course.
- speaker: Interviewer
  text: Lawrence Camp was the one who ran against George?
- speaker: Respondent
  text: That's the one Roosevelt picked to run. Talmadge ran too and Talmadge almost got elected and it's very likely that
    Talmadge was really elected. It was very close and there were a few counties, and there were a lot of questions about
    it.
- speaker: Interviewer
  text: That was a three way primary race?
- speaker: Respondent
  text: That's right and that's what Talmadge wanted. You voted under the old unit system. Counties had a unit system which
    was undemocratic and Fulton County with about a half million people had six votes and Fayette at that time had about twelve
    thousand and two. And Statesville, Georgia, down on the line, had two and they didn't have but about 1,500 people in that
    whole county.
- speaker: Interviewer
  text: If Talmadge had gotten elected then he would have gone to the US Senate instead of ever being governor. He probably
    never would have been governor, would he?
- speaker: Respondent
  text: Wouldn't have been, no, but he ran. You see, that was at the time they talked about John
