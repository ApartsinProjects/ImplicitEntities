collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Do you see in the future in Alabama coalitions developing between blacks and working class, blue collar whites?
- speaker: Respondent
  text: Yeah, I definitely see that and I think that there is some effort in that direction already.
- speaker: Interviewer
  text: Will this congressional race be a test of that?
- speaker: Respondent
  text: I doubt it. I doubt whether the Buchanan-Miglionico race will be a test of it. What Buchanan has going for him is
    the support of the Baptist ministry in the district. And that is a very powerful force to be reckoned with. The labor
    support which I presume Miss Nina will get will of course be drawing from the very same sources as the Baptist minister
    will be drawing from.
- speaker: Interviewer
  text: Is he a Baptist minister's son?
- speaker: Respondent
  text: No, he is a Baptist minister.
- speaker: Interviewer
  text: I did not realize that.
- speaker: Respondent
  text: And the son of a Baptist minister.
- speaker: Interviewer
  text: Was he a Baptist minister when he ran for Congress?
- speaker: Respondent
  text: Yes he was. In '64 when he ran he was a Baptist minister.
