turns:
- speaker: Respondent
  text: And that's in part the wisdom of the strategy that Hammerschmidt and the others in the primary tried to run against
    me. It's just that I work hard and didn't insult too many people, so they couldn't do it. But the people, the voters,
    haven't felt comfortable with Fulbright in years. They haven't really wanted him but they had too much integrity to throw
    him out for nothing. Or to substitute nothing, you know. But that's the answer to that race.
- speaker: Interviewer
  text: But do they really believe that anybody can change things?
- speaker: Respondent
  text: Yeah, I think a lot of them do, yeah. Look at the . . . we had a hell of a lot bigger vote here than they have . .
    . in percentages.
- speaker: Interviewer
  text: Summarize the Fulbright problems again. The tape was off.
- speaker: Respondent
  text: I think that, well, in the first place, the people just did not feel comfortable with, didn't feel close to him, they
    didn't feel that he cared about them. And a lot of people who thought he was all right voted against him, I think, because
    like they felt he had lost touch with Arkansas and all the things you hear. It's all right because he's had a full-time
    staff here in this state for the last six years. For the first time, I think, since he's been senator. And devoted more
    time. But you see it's just a feeling they have about him. His manner and his age and all that. When you put this next
    to this already high anti-incumbent feeling and a virulent feeling against the seniority system. It's almost impossible
    to expect, in this district anyway.
- speaker: Interviewer
  text: They understand?
- speaker: Respondent
  text: No, they do not understand. But they don't like it. And if somebody asked you . . . if you were a politician . . .
    I'll give you an example of how bad it is. To come out in favor of the seniority system, whatever that is, would be almost
    as damaging as coming out for amnesty in this district. In terms of how many votes it costs. People wouldn't get as mad
    at you over it, but it politically dumb. It's an amazing thing. John McClellan couldn't get elected in this district anyway.
    No way this year. Against a good opponent.
- speaker: Interviewer
  text: Is that going to hurt Wilbur Mills?
- speaker: Respondent
  text: The intensity and vigor of it.
- speaker: Interviewer
  text: Different districts.
- speaker: Respondent
  text: Probably will not because of the electorate there is a little different. They perceive the issues there a little differently.
    It's mostly Little Rock and the alternative is not as strong. But anyway, let's see. Those two major things he had against
    him at first. And it was interesting to me that they did all the publicity in the Fulbright canvas completely backwards
    in order. Because at the end you had a very effective ad with about ten different people in ten different walks of life
    in Arkansas. Just folks off the street explaining why they were for Fulbright. After all this stuff Fulbright's done standing
    up to Nixon on all these issues. Well, it's just the reverse. They should have run all that for three months ahead of
    time trying to break into this resistance that the average Arkansan felt towards him. Because if they don't feel comfortable
    with you, they won't vote for you. Now the reason for Hammerschmidt's great strength is they feel comfortable with him.
    Because he writes them all letters. Sends these questionnaires. Answers their own letters, promptly. Calls a lot of people
    on the phone. Comes home a lot. And so people don't even perceive him as a congressman. He's that fellow who handles their
    problems up there. They don't even think about his record. Don't even know his record exists. But running against him,
    you see, is a tricky deal because if I were to go out tomorrow and call a press conference and lay bare what I think is
    his pretty bad record for all the people here, in that just a sort of definite way, it would hurt me. Or it wouldn't help
    any. Because even though I've just won a very impressive runoff victory, the numbers weren't that great. Just proves that
    I've got an organization that controls voters. At least in part that's what you can attribute it to if you want to. And
    the people of this district have got to feel just as comfortable with me as they do with him. And then these other ties,
    the anti-incumbency and the anti-congressional feeling, anti-Nixon feeling, which is underneath on that, will begin to
    take over and begin to help me in this campaign. Nixon I'd say is still fairly strong in Fort Smith which is, in conventional
    terms, supposed to be one of the most conservative towns in America. One of the three places that John Mitchell wanted
    his trial moved to. Fort Smith and Tupelo and Shreveport, Louisiana. And it's been voting Republican in presidential elections
    at least since '52 and perhaps before.
- speaker: Interviewer
  text: Do you think they're comfortable with you?
- speaker: Respondent
  text: Well, I don't know. I carried the thing. I got 59% of the vote in the runoff. And nobody believed I could do that.
    And as I say, I don't who they were. I'll have to look. I haven't seen the box-by-box breakdown. It could be that there
    were just no votes in the Republican boxes, the upper-middle-class boxes and I got all my votes from labor. But I believe
    that the thing will run consistent throughout the town. In other words, they voted for Bumpers overwhelmingly, not just
    against Fulbright but, too.
- speaker: Interviewer
  text: Do you find it strange that they felt comfortable with you? A university professor? You went to Yale, right?
- speaker: Interviewer
  text: Rhodes Scholar and McGovern worker. Was this perceived? Do they know that or is this stuff they don't even know?
- speaker: Respondent
  text: Yeah, I would say they knew about the . . . well, one of my opponents ran a big, started running against me early
    in the primary. And he had these ads which appeared once as a quarter-page ad and a couple weeks later as a third of a
    page ad. It said candidate profile and it had Gene Rainwater and Bill Clinton on it. He was the one that subsequently
    got in the runoff. And it had his age and mine. His political experiences, you know, his offices, legislative offices.
    None by my name. Present legislative duties and his committees. And it had none by mine. It had his military record and
    none by mine. You know, like that. And it had his political and civic affairs and job experience. And he had deleted what
    he wanted to. He'd taken it from my biographical sheet. Said that I'd served eight months as a law professor and had worked
    for five months at a time in two different periods at another college. And implied that those were the only jobs I've
    ever had. And then at the end it had political and civic and religious affiliations, something like that. And the thing
    he'd left on mine . . . he'd left off all these Arkansas campaigns I'd worked on and, you know, people I'd been involved
    with. It said Texas, the chairman of McGovern campaign, or coordinator or whatever he put down, Texas coordinator of the
    McGovern campaign. And so he ran it in the newspaper and people read it, you know. But I . . . just for example, I got
    a call from a seventy-year-old man the next day, who's the secretary of the county committee down at Van Buren, which
    is the fifth biggest county in my district. Crawford County just above Fort Smith. He said, "Hell, son, I think we might
    take him out of there without a runoff since he started running that ad." He said, "If I were you, I'd call a press conference
    and tell them you're sorry he couldn't be the youngest law professor in the history of the university." I mean, it's funny,
    you know. And people tell me it's a peculiar district in a funny year. And that McGovern thing, he was right there. It
    beats anything I ever saw. And I had any number of people tell me that they thought that was a political ad for me because
    they're sick of, you know, experience. It's a peculiar thing and it's a mystery to me. Now the McGovern thing has hurt
    me some, don't misunderstand me. I was down in Clark County which is, that's the fifth biggest county and Crawford is
    the sixth biggest county. Down the way there on the way back to Little Rock. And it's an enormous county geographically.
    Roscoe's the main city but north of there just no telling how many square miles of just rural area. And I went up to one
    of these communities to church at the end of the primary. I carried the city of Roscoe and got my brains beat out in the
    county. Just got obliterated in the county. And I went to this country store to see a guy who was in large part responsible
    for it. Just standing there talking to him and that's what he wanted to know about. He was rabid about this McGovern thing.
    The idea that I had been for McGovern, you see. So I took about ten minutes and told him all about it. And I told the
    truth. I'd worked in the Senate in '66 and seen all those guys. Most of those senators I've been very disillusioned with.
    Watching their responses to the Vietnam War, whether they were for it or against it. I think they were by and large playing
    it to their own advantage. Scared just to do one thing or the other. And I thought McGovern had been one of the few decent
    people. One of the least egotistical men I'd met. All which I thought was true. I just told him about, as long as I've
    known McGovern, see. I told him the same things I told McGovern about what I didn't like about him. And he said, "Okay."
    I mean, if I could talk to enough people about it maybe they just wouldn't care. You can't be defensive about it. You
    don't apologize for it. He said, "Okay." I carried 80% of the guy's boxes in the runoff. Just beat anything I ever saw.
    So, you know, it's a thing that can be dealt with. Now if Hammerschmidt does it, it he starts to jump on me about it.
    In the first place, nobody cares about my age, I'm convinced. Or very few do. They wouldn't vote for me anyway, the people
    that would use my age as a reason for voting against me. And if he starts to use all these things that he's obviously
    going to use. I think he's going to try to play labor and age—
- speaker: Interviewer
  text: He's already done that with the press.
- speaker: Respondent
  text: Yes. I've gotten a very positive response to that. See, Bumpers has created a climate with his campaign in which you
    . . . if the incumbent starts dumping on the challenger it hurts him. I mean, Fulbright played his thing all wrong, in
    a way. Fulbright dumped on Bumpers. And people now, it's ironic, because of my close personal friendship with Fulbright
    that I would be riding in the same tide that Bumpers is. To some degree. A lot of people see me in that position. And
    when John Paul says things like that, after I've laid bare to the whole district on television several times exactly how
    much money I've had from labor in that primary and in the runoff. What percentage of the total it was. What percentage
    I will ever take from them. And made them perfectly aware of the fact that they'll always know how much money. It's just
    not going to be an issue. I turned down $4,200 from them in the runoff. So I'll take some more for the general election
    now because I think it's a different election and I think it's a legitimate thing to do. But it is an issue, man, in this
    area because they don't want . . . they want an independent congressman. They don't want anybody that belongs to anybody.
    And Pryor really two years ago. One thing is he didn't play it right. You know, he spent $400,000 on his race for senator.
    And he took $75,000 of labor money. And I never once heard him say, "You think 18% of my total contributions is enough
    to buy me?" He didn't play it right.
- speaker: Interviewer
  text: Of course, it was also out-of-state money.
- speaker: Respondent
  text: Yeah. But a lot of money is. They're dumb about that. They ought to swap that around. Hammerschmidt just got $3,000
    from the AMA because of the way they do it. You know, their bank account's in Arkansas. And labor's real dumb about that.
- speaker: Interviewer
  text: You mean it's $3,000 from AMPAC, their political action committee? What they do, they have a political action committee
    in each state. And it's funnelled through their local committee.
- speaker: Respondent
  text: Yeah. The secretary of the medical society sent a letter to every doctor in the district trying to convince them I
    was for socialized medicine, whatever that is. And that I was anti-physician because of the hassle I got into with some
    doctors in. That cost me a few hundred votes, too.
- speaker: Interviewer
  text: When did you get started in politics?
- speaker: Respondent
  text: Well, there's been a sort of residual political involvement in my family since I was a kid. As I said, my family,
    direct family was never involved in it. But my two uncles were always involved in local politics and in state politics
    to some extent. From the time I was a boy, my Uncle Roy was a state representative in the early '50s for a term. And worked
    for the state for many years. My grandfather was a state parole officer for many years and before that had another state
    job. My Uncle Raymond was active in the local politics in Hot Springs, Arkansas, right after World War II, when they came
    back and cleaned out the old Leo McLaughlin machine. Was a very interesting thing. He used to hide all the old mafioso
    back when Leo was the most powerful man in the state. Mayor of Hot Springs. But they cleared him out after World War II
    under the leadership of, among other people, a young man named Sid McMath who subsequently became governor and who was
    the person who brought Faubus into state politics. At least in part he was responsible for that. But anyway, so there
    was this interest in it, but it was peripheral because my father never took an interest in it. And then when I was in
    school I got interested in politics and was just consumed with it from about the time I was fourteen years old. And in
    1966 when Faubus went out as governor, there were a number of people running for reelection and running for the position.
    And I just got involved in one of them's campaign. I wa
