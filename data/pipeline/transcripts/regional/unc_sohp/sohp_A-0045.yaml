source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: In Florida politics, what are the changes that have occurred in the last twenty-five years?
- speaker: Respondent
  text: Well, you have already touched on what probably are the two biggest changes, and that is the advent of the two-party
    system and reapportionment. Reapportionment, probably, was more traumatic than even the advent of the two-party system.
    I came to the legislature sixteen years ago and we had, oh, as I can recall, I think that we had maybe about five Republicans
    in the house and no Republicans, I think, in the senate. They might have had one. And then when I got elected to the senate,
    there was one Republican who is now Congressman Bill Young. And with the advent of reapportionment reapportionment helped
    bring about the two-party system, because most of the growth in the Republican Party has taken place in the urban areas.
    So that after the court ordered reapportionment, there was a fairly substantial increase in the Republicans presence in
    the senate. There was one there, and then a second one was elected. Well, there were only two Republicans out of thirty-eight
    senators when we first went into real reapportionment, which was in 1965. And then we went from twelve to twenty, something
    like that. That was at the high point, I think that we have maybe fifteen or sixteen now. But reapportionment played a
    part in it. But prior to reapportionment, we had rather rigid lines within both houses that separated essentially the
    rural legislators from the urban legislators. And the whole issue was reapportionment. And of course, behind reapportionment
    was the tax distribution and particularly, the gas tax distribution and allocation. Race track allocation, so that there
    were some very, very sensitive issues that did not get resolved until such time as we reapportioned. And so, a lot of
    the tax questions were sort of the cohesiveness that held together the question of reapportionment. Besides, just held
    the question of not reapportioning. And of course, a lot of it was just personalities involved as well. We then, when
    we reapportioned, and I helped lead the fight for reapportionment in both houses. And coming from an area that stood to
    lose by it, it was somewhat of a misunderstood issue in my own constituency, but one that I felt very strongly about.
    Because I could see tremendous problems in the urban areas where the state government was simply not being responsive.
    And I think that it was fundamental just in representation. And it developed a tremendous amount of new leadership. Younger,
    more aggressive, well-educated, well-motivated men and women. And it gave, really, the legislature a real shot in the
    arm by developing a lot of this new leadership. Which essentially could not have been developed, by the way, prior to
    reapportionment. And then because reapportionment broke hope in this question of urban areas, then you were able to get
    more Republicans in and I think that it has had a healthy effect, overall, on state politics. Because I think, really,
    that a two-party system has been the difference in this country. And I think that it distinguishes us from so many other
    countries in the world where your political party system is so proliferated that they have to put together a really weak
    coalition in order to have a working majority. Which creates indecisiveness and instability, which certainly isn't desirable
    in a world where you really need some type of strong leadership. And I think that the fact we have a two-party system
    down in Florida has helped sharpen, I think, the Democratic Party as well. Because the Democratic Party for years simply
    wouldn't organize, because there was no need to organize. So that both of these, I think, have been the real major change
    in the last twenty-five years in Florida. And of course, both of them have come about really, in the last ten years. And
    I think that they have been good for Florida and then when we came along with a more aggressive, able type of legislator,
    meaning no disrespect to those that preceded us, and with the determination on the part of the legislature, of which I
    was a part of at that time, of really staffing properly the legislative branch. Because for too many years, the legislature
    had to depend upon lobbyists, either from the commercial sector or the executive branch, to know what the facts were.
    And with the advent of the reapportionment, we then started staffing the legislative branch much better. And so, we have
    now adopted a new constitution. We have reorganized the executive branch, we have restructured our entire judicial system
    and I believe that while we still have additional reorganization in the executive branch, I think that overall, Florida
    government has come a long way in the last ten years.
- speaker: Interviewer
  text: One of the reasons, apparently, for all those changes was this group of legislators that came in in the sixties. Like
    the speaker of the house, Mallory Horne, we see . . .
- speaker: Respondent
  text: Dick Pettigrew, probably.
- speaker: Interviewer
  text: Pettigrew, Don Reed and so on. They are all leaving the legislature. Now, thinking ahead over the next five or six
    years, is that going to have any impact on the legislature and its product?
- speaker: Respondent
  text: It may well have. It may well have a very appreciable effect on it, because so many of the changes or "reforms," as
    they are sometimes labeled, came about as a result of people willing to rock the boat. And at that time, frankly, we needed
    boat-rockers, because there were changes that really needed to be made. For too long, you have had too much influence
    exerted by just a very few in Florida. And it was people like some of the people that you've mentioned. I would say particularly
    Dick Pettigrew, I think that he was a very, very strong leader. I think that Ralph Turlington, whom I appointed as Commissioner
    of Education, was also a very strong leader. Some of the people who made this possible will now be leaving and you will
    be getting some leadership that may be more content with finding ways to more effectively administer the programs that
    we have than a willingness to look at new programs. I personally believe that we need to do both. We've had a tremendous
    new programs in Florida and a substantial amount of change since I've been governor, but I indicated over and over when
    I was running that I didn't intend to be a caretaker. That I was running in order to have a program and I presented that
    program to the people, particularly in the area of tax reform, and we passed most of it our first year and we carried
    it to the people. But I don't think that you are going to have the lapse into the absolute status quo. I think that some
    are predicting that.
- speaker: Interviewer
  text: I didn't mean that you were going to go back to the era of the "Pork Choppers," but you had more changes occurring
    in about eight or ten years than just about any state we can find in the South.
- speaker: Respondent
  text: That's right. And to a large extent, I really do think that we need to catch our breath and to review where we are
    and how well some of the things that we put on the books are working. And so to that extent, I think that it's valid,
    but I also feel like that there are still some other things that must be done, not necessarily of a new nature, but a
    more effective way of doing some of the things that we've now put on the books. For instance, disclosure. I think that
    the very fact that we put a law on the books for financial disclosure, you know, is really significant. It may not be
    all that a lot of people would like for it to be, and it certainly is far more than a lot of other people would like,
    but when you see who is covered by it, it is substantial. And for the first time, we are going to be requiring that. Well,
    it isn't as much as I wanted, and so that will be something that we will continue to work in. Now, it may well be that
    if we had some of the ones that you mentioned before, our chances of success might be projected to be greater than they
    may be now as we look at the leadership for the next two years, but the leadership for the second two years certainly
    hasn't been decided. And you may come up with again, some more active leadership. I have the feeling that Don Tucker,
    who is scheduled to be the speaker of the house in the next two years, of course, that decision will ultimately come after
    the election, and the final analysis. There's some question of whether he will or he won't, but assuming for the minute
    that he will be, I think he's going to be a great deal more active than people now assume that he will be. Senator Barron
    may not have that same tendency. But bear in mind that it was Senator Barron who really helped put the revised judicial
    article through the legislature. And I'm telling you, believe me, that was a boat-rocking job. So, I think that they will
    find that to the extent that Senator Barron becomes convinced of a particular program, I believe they are going to find
    him willing to fight hard for that as well. So, I think some of the feeling now that we may not that we are going to slow
    down, some of it may be valid. We may need to do it, but I don't think that we are going to slow down to the extent that
    some have projected in a few articles written lately. For instance, if some of the people now that are talking about running
    for the senate run for the senate and get elected, you may find that a lot of the shift in terms of capable leadership,
    will shift from the house to the senate, which sometimes happens. And you may find the senate a little different from
    what some people are possibly anticipating now. And if I have the privilege of serving for another four years, while I
    intend to constantly review what we have done, I don't intend to be a caretaker for another four years either. We may
    not have as many programs because, frankly, we just won't need to do as much as we did before. You know, when you change
    basically the tax structure of the state, and when you revise the court system, and we had tremendous you know, it defied
    our best efforts for twenty-five years and when you put the environmental laws on the books that we did and really substantially
    changed our allocation of educational funding, you really begin to see that some of our most pressing problems are on
    their way now. We had no community correctional centers when I became governor, we now have thirty-three, ten more in
    this budget and two in conversion to prisons. We still have problems, but we have appropriated more money since I have
    been governor. I have never compared the statistics, but I daresay that you could compile all that we had done for several
    years back and it would not come close to it. And that was a fairly unpopular thing when I first started talking about
    it, but I think that people are realizing now that the place to find crime, one of the best places, is within the penal
    system. We still have some changes that I think must be made within parole and probation. I think that environmentally,
    we still need to get a better handle on our environmental organization to simplify permitting and also to maximize the
    utilization of manpower. Fiscally, when I became governor, we had a bad problem. We had a projected two hundred million
    dollar deficit and we have had surpluses three out of four years. Now, admittedly, we have had an overheated economy nationally
    and inflation and when you have as much of your base on sales tax, you obviously are going to get more money, but the
    way that we handled it was important, because we have in effect banked, in one way or another, over a hundred million
    dollars each year as an average over these four years. By putting a hundred and five million in a working capital reserve
    fund, two hundred and fourteen million we have advanced to interstate construction on advanced construction units with
    the federal government, which will come back at the end of the decade in the early eighties. A hundred million dollars
    to front money for a revolving fund for a sewage abatement facilities, so fiscally, we have made a lot of changes. I don't
    think the need for change will be nearly as great in many areas that we have broken into. Such as housing, where the first
    time that I suggested it, it met with less than overwhelming reaction by the legislature, and it is now becoming abundantly
    clear that a state does have an appropriate role. It must move cautiously so as not to overextend itself, because the
    state has no business getting into any type of subsidy. Only the federal government can do that. But a lot of what we
    were going into, workman's compensation benefits, we had one of the lowest in the nation, and it is up substantially and
    we've put it on a formula basis. Unemployment was the same way, we don't have it on a formula basis. But the need for
    change, I don't think, will be as great as it was four years ago. Although, with the growth facing Florida, management
    of its growth is really going to almost transcend anything else. So, we've got our work cut out for us substantially,
    but it may be more in the implementation in the right way of what we have on the books right now, with the environmental
    and water use management act, and to put together its water resources districts all over the state. So, the greater challenge
    may not be so much in terms of legislation, but making work what is on the books. And see if we have any deficiencies,
    for instance in ethics and disclosure, that should be strengthened and not be hesitant to do it.
- speaker: Interviewer
  text: How do you approach the growth problem in Florida? I mean, do you view it as a problem?
- speaker: Respondent
  text: Oh yes, I don't think that there is any question that when you grow a thousand a day, you may label it as an opportunity,
    as a challenge, but regardless of the semantics, the fact is that it is something that you have to try to come to grips
    with. And it's not an easy thing, obviously, because of the mobility assured by the United States Constitution. And I
    think that you see in Oregon an attempt that tried to limit it and it resulted in it growing substantially more. Of course,
    you don't know if it wouldn't have grown otherwise or whether it called it to everybody's attention and they had more
    growth than they would otherwise have had, but I see, essentially, trying to assure a better quality of development in
