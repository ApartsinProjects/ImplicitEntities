collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: As far as your record, you were president of the Chamber, I guess, maybe in '58 or '59?
- speaker: Respondent
  text: I was president of the Chamber in 1960.
- speaker: Interviewer
  text: 1960. Then ran for mayor in 1961 and then won four terms. You've been active in Dimensions for Charlotte Mecklenburg
    since then?
- speaker: Respondent
  text: Yes. Well, not since then. The Dimensions for Charlotte Mecklenburg was started about two and a half, well, a little
    over two years ago, and I served the first two years as chairman and still hold corporate office. Dimensions was incorporated
    as a nonprofit organization and serving as president of the corporation, as I facetiously said to somebody, meant only
    that I had to see that we lived within our budget. Cliff Cameron, chairman of the board of First Union Corporation, is
    presently our chairman.
- speaker: Interviewer
  text: That's an interesting connection. He was chairman of the campaign committee for the consolidation.
- speaker: Respondent
  text: Consolidation, that's right. A very civic-minded, very able man. Too bad that effort failed because he took that as
    something of a personal failure, I think. He shouldn't have.
- speaker: Interviewer
  text: He had been involved in some of the planning before. Hadn't he been on one of the committees before?
- speaker: Respondent
  text: Yes. I believe he was on the Chamber committee that proposed the consolidation.
- speaker: Interviewer
  text: One question I have is why the attempt came up at that time. I seem to recall that it had been an idea that had sort
    of been around in the background and there had been a Chamber committee in maybe '63 or '64 which had done some studying
    on it. Then, all of a sudden there in '68-'69, sort of snowballs all of a sudden.
- speaker: Respondent
  text: That's right. I believe that it was in '68, possibly '69, that the Chamber program of work for the year had that as
    one of the projected programs. You could check that with the record, of course.
- speaker: Interviewer
  text: Was there a particular crisis? Seems that, perhaps, the water-sewer between the city-county might have had something
    to do with it?
- speaker: Respondent
  text: No, really I don't think there was any such crisis. I'll add that if there had been it might have provided a better
    background for a successful effort.
- speaker: Interviewer
  text: You think that one problem in getting the consolidation was that you didn't have some particular problem that you
    could point to and say,
- speaker: Respondent
  text: I would say that the absence of any crisis, any real problem, or any great dissatisfaction on the part of the citizens
    toward local government… The absence of those things was largely responsible, or at least partially responsible for the
    failure of it. The second important factor that contributed to failure, in my opinion, was the fact that the Charter Commission,
    while they worked assiduously, worked hard, came up with a program that was just over-programed. It was too much too much
    of a change, too much modernization, too different from what we had in the way of local government for people to buy.
    It was not a plain merger. It was a reorganization.
- speaker: Interviewer
  text: It went very extensively into just about every area, as I recall.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: That's one thing I'm wondering about. It seems that one interpretation might be that the Chamber started the idea
    but, once the Charter Commission actually got functioning, they went a good deal beyond, perhaps, what the Chamber would
    have liked to have seen.
- speaker: Respondent
  text: They went beyond the simple means of consolidation to develop a reorganized, modernized version of local government
    that was just too different from what we had.
- speaker: Interviewer
  text: How did that happen? Were they, in some way, operating in sort of a void and were seeking, you might say, the perfect
    solution, the ideal solution?
- speaker: Respondent
  text: To a considerable degree, yes. I think they were very idealistic in their projections of the proposed new government.
    I think, perhaps, the broad representation we had on the Charter Commission gave a very active voice to a lot of people
    who had never had an opportunity to have a voice in decision-making. They just simply went, in my opinion, a little overboard
    in suggesting or proposing a broad form of representation. I believe we were to have, what, fifteen or sixteen members
    of the commission or council, governing council as against a seven-man City Council and a five-man County Commission.
    A lot of people thought we didn't need a governing body of that size. And, too, there was objection in a lot of quarters
    to the districting plan.
- speaker: Interviewer
  text: Now, as I recall, you were involved in appointing members to the Charter Commission.
- speaker: Respondent
  text: That's right. Charlie Lowe, who was at that time chairman of the County Board of Commissioners, and I made the appointments,
    and we selected the chairman for the Charter Commission.
- speaker: Interviewer
  text: I wonder, why was it that you chose to go to this broadly representative commission? I mean, it seems like on other
    occasions in time of seeking a program or to come up with a solution, the approach has been a smaller, maybe a businessman
    or whatever primarily.
- speaker: Respondent
  text: Well, it was simply an effort in democratic procedure to give various segments of the community a voice in the preparation
    of the charter. It didn't work too well. I would say that. I would also add that, and you may or may not want to use this,
    that pure democracy seldom seems to work, not efficiently at least.
- speaker: Interviewer
  text: That, in a way, is why I was asking that. It seems that the group who wanted consolidation might have realized, before
    appointing such a broad commission, that by appointing such a broad commission you might open the door to getting beyond
    what they wanted into a sort of unworkable…
- speaker: Respondent
  text: Well, I guess we just weren't wise enough or smart enough to see that. Didn't anticipate that. Back to the point I
    just made or the opinion that I expressed that pure democracy doesn't work, I'll illustrate that. During the hearings
    for the proposed goals for Charlotte Mecklenburg last May a year ago in one of the meetings which I attended, one man
    got up and proposed that one of the goals provide for a referendum on city and county budgets. That before adopting a
    city budget, for example, the City Council would hold a city-wide referendum to approve the proposed budget. That particular
    individual also wanted, after the adoption of such a budget, all expenditures of over $100, I believe he said, to be approved
    by referendum. Well, can you imagine…
- speaker: Interviewer
  text: You'd have a hard time.
- speaker: Respondent
  text: The administration of city affairs would get stalled on the first referendum. But, that would be pure democracy if
    everybody had a right to say how the city money was to be spent under given budgets.
- speaker: Interviewer
  text: Something of an unworkable situation.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Who were the strong… Were there individuals on the commission who were, you might say, stronger than others, more
    likely to get their views incorporated or to lead the others around to their way…
- speaker: Respondent
  text: I never attended any of their meetings. Well, I did, too. I testified before the Charter Commission once or twice.
    I don't believe I can answer that question specifically. I'm under the impression that when they were debating any given
    matter relating to the reorganized government, after discussions, they would take a vote, and a majority out of that commission
    carried. It was a simple majority.
- speaker: Interviewer
  text: You reckon anybody had special interests or axes to grind? In other words, were some of the sort of social implications
    involved in the number of districts and some of the guarantee of fair…
- speaker: Respondent
  text: Definitely. I think that did have an important part. For example, I'm sure that our black citizens were much concerned
    with the districting to be sure that the weight of their total votes wouldn't be wasted. That some of the districts would
    be set up so that representatives from those districts most certainly would be black.
- speaker: Interviewer
  text: As I recall, the proposed charter pretty much guaranteed there would be three districts or representatives on the
    council from…
- speaker: Respondent
  text: The black neighborhoods.
- speaker: Interviewer
  text: You think that that's part of the reason that the district representation became such a controversy during the…
- speaker: Respondent
  text: Yes. I think that was primarily the reason. Then, of course, there was always the argument against district representation
    that we might be getting back to the old ward system, you know. Where people, representatives elected from given districts
    would swap out on a lot of issues. "You vote for me on this. I'll vote for you on that."
- speaker: Interviewer
  text: That sort of argument… I wonder if there's the possibility that some of these slogans like "going back to the ward
    system" or complaining so much about gerrymandered districts or things along this line were sort of code words in a way
    involved with the school busing situation to sort of keep the agitation about black representation or black influence
    or whatever alive in the community and take advantage, perhaps, of the emotions…
- speaker: Respondent
  text: I'm certain that played a part. Yes. The blacks at that time, and you can understand why because of the progress that
    had been made in providing blacks with equal rights and opportunities as citizens which is nothing but what we should
    have done… It was legal. It was moral to grant them those petitions in those regards. They began feeling they had gained
    a lot of ground, and they just wanted to make some more ground with this matter of representation in local government.
- speaker: Interviewer
  text: I'm wondering… Were there arguments which perhaps the people who were supporting consolidation could have made? It
    seems that, perhaps, in a way, the campaign for the charter was sort of what you might call an educational, civic campaign.
    In other words, not really a hard-hitting, political, very practical campaign. Were there arguments that maybe could have
    been used to counter this in a better way?
- speaker: Respondent
  text: I don't know. Of course, looking backwards, it's probably easier to tell what we should have done than it was at that
    time to tell what we should do.
- speaker: Interviewer
  text: Monday-morning quarterbacks…
- speaker: Respondent
  text: Monday-morning quarterbacking is quite an easy job. But, still, I think that perhaps the major reason the effort failed
    was that the people were too well satisfied with the honest government and, I think, rather efficient local government
    we had. No complaints, serious complaints about the form of city and county governments, and people didn't want to swap
    the known for the unknown.
- speaker: Interviewer
  text: Was this effort for consolidation, then, sort of a next step sort of thing? A number of things had been achieved,
    mergers of functions one way or another, and this just seemed to be sort of a logical next step.
- speaker: Respondent
  text: I think that's right. I believe there was and there still is a feeling that any over-lapping services ought to be
    resolved and that either the county or the city ought to be given total responsibilities in those over-lapping areas.
    We have succeeded in consolidating a great many functions of local governments, and that may be the way we will eventually
    arrive at consolidation.
- speaker: Interviewer
  text: Well, just who was pushing… Who was really behind… I know that the Chamber had established a committee, and Dr. Martin
    was chairman of a committee, and Mr. Griffith was chairman of a committee. Who was really behind this push for consolidation?
    In the end, it seemed to be a very few people, in a way, when it came down to a vote. Who was really behind? If there
    wasn't a crisis, and a lot of people seemed pretty well satisfied, who was really behind the push in the first place?
    Did they, to some extent, were they dissatisfied with what had resulted from their initiation?
- speaker: Respondent
  text: Well, I would guess it was largely the officers and the board of the Chamber of Commerce who were primarily interested
    in consolidation. Even so, I know that there were some members of that political-economic group who thought that the proposed
    charter was just too elaborate, too involved. Even some of them who gave lip service to it didn't care whether it passed
    or didn't. Did or didn't pass.
- speaker: Interviewer
  text: I know there in December, just shortly before the vote, there was a Chamber committee came out recommending a number
    of changes, especially in the representation.
- speaker: Respondent
  text: I believe that's right, but I don't believe the Charter Commission gave any heed at all to those recommendations,
    as I remember.
- speaker: Interviewer
  text: I wonder sort of how that could be. I mean, it seems that a good deal anyway of what has been accomplished in Charlotte
    and in which you played a very large part over the last fifteen or so years… The Chamber, in one way or another, has played
    a very major role in a lot of this.
- speaker: Respondent
  text: They've very definitely given a lot of leadership to progressive measures in this community for which it has received
    small thanks from a great many people. I would account for that on the basis that the Chamber, in the minds of most people,
    the average voter, is the establishment or represents the establishment. It is that bit of jealousy, antagonism, you name
    it. Just natural personal opposition in a lot of quarters to the establishment.
- speaker: Interviewer
  text: I wonder… I mean, since a lot of the officers or whatnot of the Chamber have been so important, just how it happened
    this sort of got out of hand on them? Did other interests sort of divert their attention while the commission was making
    or at least recommending all these changes? Seemed to be in a way a loss of communication between those who
