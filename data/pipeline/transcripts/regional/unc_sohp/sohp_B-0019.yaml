turns:
- speaker: Interviewer
  text: Why don't we just start Mr. Furman, by having you give me a little about the background of your family.
- speaker: Respondent
  text: Well, my family came to South Carolina in 1755 from Esopus, New York. They were members of the Dutch Reformed Church
    there. My great-great-great grandfather Wood Furman moved down here. He was a teacher and a surveyor. He was an educated
    man and he brought with him his one year old son, Richard Furman, who is the one that we all feel is the real head of
    the family that started the educational process in South Carolina. This young man had no formal education but his father
    had a good library for those days. There were all kinds of books and of all kinds of philosophies. He learned to read
    Greek and Latin and he learned a great deal about medicine. Of course, there was no formal medicine in those days practically
    at all, except that another great-great-great grandfather of mine, named Alexander Garden, was a doctor in Charleston
    and the families subsequently merged, so to speak, after one generation. Dr. Alexander Garden was a botanist and a naturalist
    in Charleston. His life was written recently by two botany professors from Virginia, called , and it's a very interesting
    book. It was published by the University of North Carolina Press.
- speaker: Interviewer
  text: I've not seen it, but I would like to take a look at it.
- speaker: Respondent
  text: Well, it's a very interesting book. He had a son . . . Dr. Alexander Garden was an old Tory; as a matter of fact,
    his properties were all confiscated after the Revolution and he went back to England and died in England. But his son,
    Major Alexander Garden, was an officer in Lee's Legion in the Continental Army and he is the one who made the connection
    with the Gibbes. And he married a Gibbes. Garden is my middle name. But this man, Richard Furman, who was my great-great
    grandfather, at the age of eighteen under the preaching of a Presbyterian minister, decided that while the family had
    joined the Church of England when they came to South Carolina . . . there being no Dutch Reformed Church down here, he
    and his mother decided that they were going to join the Baptist organization, which had hardly started in South Carolina.
    And because he said that he could find no evidence of infant baptism in the New Testament. He said that it all said, "Repent
    and be baptized," and no infant could repent because they hadn't had that opportunity to sin. That was his basis for it
    and he became a very, very prominent Baptist minister in the United States and briefly, he had a little church in Sumter
    County, in the high hills of the Santee, called the High Hills Baptist Church. He left there in 1787 and went to Charleston
    and became the pastor of the First Baptist Church of Charleston. He was so imbued with the spirit of being independent,
    because frankly, that's what most people don't realize, they listen to what a few nuts in the Baptist Church say who get
    up in these conventions and proclaim all kinds of things that they think are wrong, that they ought to pass resolutions
    against. Why, he just quietly went around tending to his own business and being very, very free. I'll give you one illustration
    of it. He was a great friend of Charles Coatsworth Pinkney . . . I don't know whether you know anything about Charles
    Coatsworth Pinkney . . .
- speaker: Interviewer
  text: A diplomat . . .
- speaker: Respondent
  text: Well, he signed the Declaration of Independence and the Constitution and his brother, Charles Pinkney, was also a
    very prominent man in Charleston. But he was a great friend of his, but he was not a member of his church. I have gathered
    many hundreds of letters from the family, some written to Dr. Richard Furman and some written by him and some of his manuscripts.
    He has a manuscript there of his sermon before Congress in 1814 and he has a manuscript of 1808 of his nominating Charles
    Coatsworth Pinkney to be President of the United States. Of course, that was very small groups in those days and if you've
    read about it, you'll understand. One of the things that always interested me was a letter to him from Charles Coatsworth
    Pinkney that said, "Dear Dr. Furman, I enjoyed your sermon very much today. I find that the bile is very bad in Charleston
    this summer and the best specific for it is Madeira wine and I am sending you over two cases. One case of old wine and
    one case of new wine. I hope that it does you as much good as it has done me. Your obedient servant, Charles Coatsworth
    Pinkney." Well, I read that one day in the First Baptist Church in Charleston and I said that I couldn't find where he
    sent it back. So many of these people now believe in prohibition, but those people believed in temperance, which is an
    entirely different situation.
- speaker: Respondent
  text: Total abstinence was not part of Christianity in any place, even from the first miracle. So, getting back, Dr. Richard
    Furman lived until 1825. He was really the leader in the field of education in this state. He sent his children to the
    College of Rhode Island, which is now Brown University. He sent some to England. His oldest son by his first wife, he
    was married twice, was Wood Furman and he was at one time the Chairman of the Faculty at the College of Charleston, which
    was one of the original city colleges. It was not denominational, it was a city college. Most of the great colleges in
    New England were all started by ministers of various denominations and the reason was because they were the educated people
    and they saw the need of education. That's why you find so many colleges, Yale and Harvard, Trinity, Haverford and all
    those colleges were colleges who were started by ministers who saw the need of education. Well anyhow, he practiced some
    medicine in Charleston during the time of the Revolution and after. His brother was Josiah Furman and he joined him and
    was active in the Revolutionary War, but they got him out of that because he was a man who could speak and they sent him
    all over this up country to try to rally the patriots away from the Tories. The Revolution was really a civil war, if
    you come down to it. You had a few Hessians and a few high generals of British, but few really British troops here. Well,
    the Hessians were really the biggest part of the British troops. The rest of them were small, just small garrison troops.
- speaker: Interviewer
  text: I've never seen the figures on that, but that would be interesting.
- speaker: Respondent
  text: Well, it's true. It's a civil war just like they are having in Angola today, no more business for any of us to be
    over there except for that economic thing of getting those minerals out of there. That's the reason that Russia is in
    there. That's the reason that they want to try to keep a hand in there from this country, if you want to come down to
    it. I think that we ought to all get out of there and let Angola develop slowly. They'll fight each other. Look what's
    happening in Ireland. I've gotten off the subject but I'll get back to it. Dr. Richard Furman had a great many children.
    His youngest son was James C. Furman. He was born in 1809 and jumping over several other members of the family who helped
    with the establishment of the little theological institution in Edgefield in 1826, Dr. James C. Furman took charge of
    it after it had to leave Edgefield and go over to High Hills of the Santee and then to Winsboro. There's a history of
    Furman University being written which you can see.
- speaker: Respondent
  text: It's being published, I think, by the North Carolina Press.
- speaker: Interviewer
  text: I think that it's by Duke University.
- speaker: Respondent
  text: Oh, it's Duke University.
- speaker: Interviewer
  text: I believe that's what Dr. Blackwell told me, but I'm not sure.
- speaker: Respondent
  text: That will have something, a lot of it, in there. I have not seen it and neither have I seen the manuscript, so I don't
    know anything about it. Well, then my grandfather, I told you, came out of the Civil War and taught in Kentucky. He came
    back here and practiced law. He then became Professor of English at Clemson College and stayed there until he retired
    in 1912. He was then seventy-two years old. He was born in 1840.
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: Charles M. Furman. He was named for his uncle, who was president of the Bank of South Carolina in Charleston, which
    is the beginning of the South Carolina National Bank now. He owned quite a lot of land and did a terrific job. When the
    Civil War came along, Dr. James C. Furman signed the Articles of Secession. Charles M. Furman wouldn't do it, his own
    brother. He said that he didn't want to break up a nation that his father had helped begin. It shows you how different
    people in families are. They had just as many differences as could be, they didn't have to be antagonistic about it, but
    they felt that they should express themselves.
- speaker: Interviewer
  text: Now, Charles Furman, your grandfather, fought with General Johnston?
- speaker: Respondent
  text: Joseph E. Johnston. He was at Greensboro when they surrendered in '65, after Appomattox.
- speaker: Interviewer
  text: And how did he feel about retiring to the North? Did he have any comments about that? Oh . . . he only spent the summer
    months up there.
- speaker: Respondent
  text: He only spent the summer up there with his youngest daughter . . . well, she's living now. She is living in Massachusetts.
    Her son is with the American Shoe Machinery Company. His name is Charles, named for his grandfather, Charles Coles is
    his name and Kitty, as we call her . . . she was my father's younger half-sister but she's only two and a half years older
    than I am. No, four years older than I am, I believe.
- speaker: Interviewer
  text: And what's her name?
- speaker: Respondent
  text: Coles. She's Mrs. Marion Coles. Well, going back now, my father was born in '67 in Sumter County and after the Civil
    War, came here with his father who was practicing law. First went to Kentucky and then came here and he went to Furman
    University . . . the reason that it was called "university" at that time was because they had a graduate school in theology
    and they had plans to make it a real graduate schools in other things so that it would be a university. That's why it
    was called a university when basically it was a college. Now, we had an accredited law school over there from 1919 to
    1932 or '33 or '34, and it was done away with by a president who was a man of great ability, but he had a lot of trouble
    financially and he blamed that for some of the financial problems they had and he did away with it.
- speaker: Interviewer
  text: Which president was this, now?
- speaker: Respondent
  text: B.E. Geer. I'm sure that it is all written in that history, although I do not know it. Anyhow, my father stopped college
    when he was a junior and started reading law. He was admitted to the bar on December 21, 1888 and in that office . . .
    I was going to take you down there, I don't know whether you have time to do it or not, is his certificate for being admitted
    to the bar. It's hanging there on the wall now. The truth of the matter was, though, that he was an energetic person and
    while he was reading law, there was a man named Stone here who owned a great deal of land outside of Greenville and he
    got him to help him sell lots off of this thing and as a result of that, he got into the real estate business.
- speaker: Interviewer
  text: Who did he sell the lots to?
- speaker: Respondent
  text: Anybody. Just any person that wanted to buy a lot to build a house.
- speaker: Interviewer
  text: This is around 1890, right?
- speaker: Respondent
  text: 1888 to 1890.
- speaker: Interviewer
  text: Were there people starting to move into Greenville?
- speaker: Respondent
  text: Well, you've asked me something there that I couldn't tell you.
- speaker: Interviewer
  text: I'm just curious about why this was occurring at this particular time?
- speaker: Respondent
  text: Well, we'll have to go back a little bit on that. There were people, children of families that were able to build
    a newer house and they bought the lots. The lots themselves were five or six or seven hundred dollars. I mean, it wasn't
    any great big thing. Father told me very often that Mr. Stone would say, "Alester, I need a little more money." So, he
    would ask him to sell a lot and he would sell it for five or six or seven hundred dollars and Father would make ten percent
    or something like that on it. I know that he told me that in 1893 he had a partner named Mr. John F. Mitchell and they
    divided twelve hundred dollars as their income for that year, six hundred dollars a piece. That was when the big depression
    came in 1893. Well, as I say, Father started in that and then he started insuring houses by corporate insurance. Of course,
    around in New England and other places, Philadelphia and all, they used to have these mutual insurance aid things where
    they just paid so much in and they all had a little plaque on the door saying that they were insured by a mutual insurance
    company. Then, the corporate insurance companies started up back in those days and he wrote insurance for these people.
    He was doing that to make money while he was reading law. Well, when he got through reading law and was admitted to the
    bar, he looked around and saw that his father hadn't done very well in the law, there wasn't much law business at that
    time, so he just decided not to practice law and to stay in
