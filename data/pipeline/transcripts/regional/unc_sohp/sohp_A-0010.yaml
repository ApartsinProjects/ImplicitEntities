source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Was that your first statewide political race when you ran for chief justice?
- speaker: Interviewer
  text: Had you held any other political office before that?
- speaker: Interviewer
  text: What prompted you to run?
- speaker: Respondent
  text: Ha. Well, I don't know. I suppose it was many factors. I'd been president of the Alabama state bar, 1965-66, and had
    started what I thought was a reform movement of courts and of the bar association... the bar profession in Alabama to
    some degree. And some things had carried on. I was interested in the courts. In modernization of the courts. Judicial
    reform for part of it. Then I suppose I'd reached a stage in my life where change was desirable. Or maybe I was a little
    tired of what I was doing. Many factors. It could have been an thing. Basically, I think it was an opportunity to see
    some of my ideas that I had advocated on judicial reform and had been advocating for a number of years... an opportunity
    to try to do something about it. Also, I was being urged by most of the lawyers of the state to run. I ran against the
    former Governor Patterson. He had announced. I had encouraged several other people myself to run. One member of the court
    at the time, the senior associate justice. He wouldn't run. And I reckon I got talked into it by several people plus the
    fact that I think it gave me an opportunity to do some things that I'd been thinking about a long time plus the fact that
    it had a little spice and zest to life as it was going after twenty-three years of practicing law. It wasn't as intriguing
    and as interesting as it had been up until that time.
- speaker: Interviewer
  text: And you've accomplished a number of those reforms you set out to accomplish.
- speaker: Respondent
  text: We feel like we got... I've been in office about three and a half years and we... we have a new judicial article.
    I reckon for Alabama it's the first constitutional revision of a major segment of the state constitution since 1901. We've
    got a complete new judicial article. That went through in January of '73. Before that we had had some legislative matters
    that... we had a pretty good legislative package. We created the department of court management. Got two bills that gave
    the court rule-making power for rules of civil procedure and for appellate rules. And pursuant to it the court adopted
    the federal rules of civil procedure with some modification. And we're in the process of adopting the appellate rules
    now. We started an effort to get the appellate courts current and they are now all current. We cleared the docket of the
    Supreme Court new term year in October of '72. And all of the appellate courts were cleared when we entered a new term
    court in '73. The Alabama Court of Criminal Appeals and Alabama Court of Civil Appeals. We did away with the JPs and the
    constitutional election in January of '72, which was the people ratifying the legislative authorization to have a constitutional
    amendment. It was in the '71 legislature. And we created at that time a judicial commission. The Alabama Constitutional
    Commission which had been created in '69 had been meeting. So they finished their work product in about April or May of
    '73. We urged the passage of the judicial article and they felt that that was perhaps the first step in their desire for
    constitutional reform and they supported it. And the judges and the lawyers and the citizens group and other people supported
    it and we got through the new judicial article. Which the Constitutional Commission had drafted over about a two or three
    year period. As well they had drafted other... a complete new constitution for Alabama. That was the only segment of it
    that has passed so far. So we've things moving. There are other details but that's the major.
- speaker: Interviewer
  text: What's the status of the rest of that constitutional reform effort?
- speaker: Respondent
  text: Well, there is still... the legislature continued it. It gave it an appropriation for two years. I had a phone call
    today. By the way, they want you to meet with them in August, get your ideas on how they could move in the other areas.
    They really just decided... they put it out. There was a lot of opposition on various vested interests that some elements,
    as there was in the judicial article. But they concentrated on the judicial article and that passed. Now the rest of it,
    they are in the process of trying to rev it up and get it going again. The commission continues. That's about the status
    of where it is right now. I suppose some of them making speeches about it but it's really... there hasn't really much
    been done since the December 18, '73 election when the judicial article was passed.
- speaker: Interviewer
  text: How is it going to change the judicial politics of the state?
- speaker: Respondent
  text: Well, it doesn't change the politics because you, in effect, still have an elected system. There was introduced...
    the Constitutional Commission recommended that there be an appointed system similar to the Missouri plan for the appointed
    system for the selection of judges. Not their retention. They did not advocate the Missouri plan retention program. But
    the legislature indicated that they did not want that changed. They had had for a number of years in Jefferson County,
    which is where Birmingham is, the largest city of the state... they had had a nominating commission where a commission
    composed of five people select three people and the governor must appoint one of the three. That was what the constitutional
    commission advocated. The legislature changed it. Then in the last days, when the judicial article... they amended on
    the floor of the house and put fifteen counties in the position that they can do it by local legislation. Prior to that
    time it had to be done by a constitutional amendment. I think it really was a unique situation. I think what they were
    trying to do is they thought that they were making the judicial article unconstitutional. There are some decisions of
    this court that say that if you put certain counties, and name them specifically or exclude them or have them treated
    differently, then that is, in effect, local legislation, should have been according to the constitutional requirements
    for local legislation. But they failed to realize you don't make the constitution unconstitutional. So as a result it
    would mean that those counties could go into a judicial selection process by legislation, local legislation, instead of
    the old route that they had to go prior to that time, which was of constitutional amendment change.
- speaker: Interviewer
  text: Basically the fifteen largest counties?
- speaker: Respondent
  text: No, just a conglomeration of people. Jefferson County. First thing the amendment was to keep Jefferson County just
    like it was. That was done. And then at the same time wanted to follow the Jefferson County approach and they had a constitutional
    amendment at the same time.
- speaker: Interviewer
  text: Judges will still be elected in Alabama?
- speaker: Respondent
  text: Yeah. There'd be no change there. The governor was afraid, opposed any change of that. He was opposed—at least his
    lieutenants were opposed to a change in the method of selecting judges. Anyway, it was amended out. We didn't... we realized
    that the constitutional commission proposal wouldn't go with. This was a compromise. To go back... just to maintain the
    status quo of the election of judges and the selection process and the appointive process. It ends up being better than
    the status quo, but it was not intentionally done. It just happened that way.
- speaker: Interviewer
  text: This is the only major piece of legislative reform in either one of the three branches of government in Alabama. Is
    that right?
- speaker: Respondent
  text: It's probably the only one that's happened since 1901.
- speaker: Interviewer
  text: Right. Why is that? There's been no executive reorganization. The only legislative reorganization came about because
    of court orders on reapportioning. How were you able to get this thing through?
- speaker: Respondent
  text: Well, we worked on it. Had a lot of support. Of course the constitutional commission had worked on it. We had a citizens
    group. We had the support of the bar association and we had the support of all sorts of... Mike worked on it like everything.
    We had parent-teachers PTA organizations fighting for it. League of Women Voters. In the campaign what did we have, about
    thirty sponsoring organizations that supported it in constitutional amendment election.
- speaker: Respondent
  text: It was probably the first time in the history of the state that you ever had League of Women Voters and on the same
    issue with Farm Bureau and major black leaders. Everybody, all the groups worked for it.
- speaker: Respondent
  text: Had labor and chamber of commerce both endorse it. We had still a lot of opposition from people... lay judges, probate
    judges, just a variety of groups that opposed it. One former governor campaigned heavily on it and lawyers and judges.
    He didn't really understand it I don't think. Jim Folsom. I think if he'd been able to understand it... he's had some
    pretty progressive ideas in the past. I don't know, it was just a whole lot of effort. We spent a lot of time on it.
- speaker: Interviewer
  text: When you ran for chief justice, was the campaign different for that office from what it would be for another office?
- speaker: Respondent
  text: Well, yes and no. You've got the problem of trying to run from it from an ethical viewpoint. And you've got the problem
    of financial contributions. To run a campaign you've got to look at it from... it's in the same sense of a political campaign.
    You've got to have the mass media and advertising. And you've got to go around, see the people and everything else. But
    you have the problem of what do you do? where you come into office in effect indebted to your supporters. And this is
    the thing, from a judicial position, that ought to be avoided to every degree. It ought not to be present. My campaign...
    the idea that they worked out in the beginning is that there would be a group that would raise money and I would not know
    how much money was raised or who the contributors were. This was the idea... shield me... this was lawyers from throughout
    the state... would shield me from being able to know who made contributions and prevent me from feeling I had any subconscious
    obligation to support people. Well, that's good in theory. Lawyers would send me checks. Hell, I'd know who sent it and
    that sort of thing. And then, of course, in my home area where I ran, citizens and other people raised money. Just a friendly
    or local pride in a native son running, that sort of thing. The end result was is this, that I ended up knowing about
    half of the people that made contributions to my campaign and about half of them that did not. Under that situation...
    really, when it got down to it, I ended up with about 90% of the lawyers supporting me in the race. So it may well...
    I have not had any qualms about deciding cases against people who supported me. I may have the idea, well, I don't know,
    this fellow who's on the other side, he may have made a much larger contribution than the other. But I tried to come in
    and divorce completely the idea of who supported me or who didn't. Moneywise, I think it's in a, such a state of confusion
    that I would not know who did or did not. In my own judgment, I would know about 50%. You do know—and this is an evil
    of the elected system—you do know the man that you, that worked, that did the legwork, that campaigned for you in this
    county and that county, and that sort of thing. So I think ours may have been a little unique in that method. I don't
    know of any other place—now you just ended up in New York for the position of the chief judge of the New York Court of
    Appeals, which is the equivalent of the supreme court of New York, a campaign where unofficial reports say that each candidate
    in that race, his supporters spent over one million dollars. Well, that's not healthy for a judicial system. I was down
    in New Orleans right after an election. I went down and made a speech to a meeting of all the judges. They elect their
    members of the supreme court by districts. And they had the two being elected from the New Orleans districts. And I understood
    there that those candidates, that their supporters must have spent $200,000 in behalf of each of the candidates. There
    was one candidate, fellow who was elected, named who was the former law partner of Mayor Landry, Boone Landry, the mayor
    of New Orleans. He was running against a fellow named Leon Sarpy who was largely a bar association and more of a large
    firm candidate. And at the same time they had Garrison running against a fellow named Marcus. I don't think in that race
    as much money on each side was spent, but probably was a substantial amount in that Marcus-Garrison race. Garrison was
    defeated. But I mean it points out the evils of the elective system. Of course there are evils of the appointed system
    and I'm not getting off into a debate between that, but you're asking me about judicial politics. And your question was
    to me about my election. But it creeps in. I mean, in all candor, you can't say that it doesn't. But you try to divorce
    it as you can and as far as I know I don't think I've made any vote or any decision that was based on any political situation
    that I know of. I mean I've tried to be honest in my voting and not to let who were my supporters and who were opposing
    me enter into it. Consciously I have. You never know subconsciously whether things enter into your mind or not. I mean
    you put it away, try to divorce it, but it's an ill of the system.
- speaker: Interviewer
  text: Among the people who urged you to run, was Patterson's record on segregation as governor an issue?
- speaker: Respondent
  text: It was with some. I ended up with support from all groups. I would think that a sizable group who were anti-Patterson
    from racial matters urged me to run. At the same time I had extremely conservative vote. I ended up in Mobile, which is
    unusual, with almost every element and segment of society and economic life supporting me. And Mobile is largely, they
    say, is largely a ticket area. So I ended up with rabid segregationists and I ended up with the bl
