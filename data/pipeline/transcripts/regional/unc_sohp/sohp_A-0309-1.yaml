collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I would like to begin by probing into your early family history and getting a little biographical information from
    you. Would you kind of bring me up to date on your vital statistics? Where you were born and so forth.
- speaker: Respondent
  text: I was born in Sherman, Texas, in 1909. My father was a city clerk in the first city manager government in Texas, and
    my mother was a second generation immigrant from England whose family had all been miners, and my husband's family were
    also miners in the United States. They met in Chicago and were married eleven years before she died. I and my sister were
    brought up by my great-aunt and great-uncle. He had a business in Sherman and my great-aunt had been a teacher in the
    first public schools in Fort Worth after the Reconstruction.
- speaker: Interviewer
  text: What was her name?
- speaker: Respondent
  text: Lua Dial was her name and his name was Preston Drury Hollingsworth.
- speaker: Interviewer
  text: Did you say that Sherman had the first city manager government in Texas?
- speaker: Interviewer
  text: That is surprising. I had always thought that that originated in Galveston.
- speaker: Respondent
  text: Well, maybe Galveston and Sherman both claimed to have been first and perhaps neither knew that the other had that
    form of government. The Hollingsworths were really the principal influence on my whole youth.
- speaker: Interviewer
  text: And were they involved in politics?
- speaker: Interviewer
  text: When did you get interested in politics?
- speaker: Respondent
  text: After I married a lawyer.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: May I tell you a little more?
- speaker: Respondent
  text: My great-aunt was one of the first graduates of the first normal school at Huntsville. Before she was eligible to
    go to Huntsville, she went to a private academy where she lived in the home of the principal and did housework and sewing
    for his large family to make her expenses. That was not because her father had never earned any money, but because her
    family had invested what they had in Confederate currency as all the loyal Texas families did at that time. She was born
    the year that the Civil War began and she was a change of life child. I remember my great-grandmother, Amanda Anderson
    Dial, who lived to be ninety-five years old. My great-grandfather, Benjamin Franklin Dial, was a general in the Army of
    the Confederate States of America and they had lived in Marshall, which was then an outpost of Anglo-American civilization.
    Many of their old friends had lived in Marshall and I have had a pretty long jump to make in my personal orientation.
    They told me that it was a shame that Mr. Lincoln was assassinated. The South would have been better off if he had lived,
    but they also told me that the Negroes would be much better off if they stayed in their place and that part of it I didn't
    believe, probably on account of my mother, whom I did know—I was ten years old when she died. Her older brother had become
    a Friends minister, so I had some Quaker influence on her side and then I married the youngest son of a miner who had
    had some experience with seeing his male relatives belong to and take leadership in local unions at a time when there
    was discord with management and activity required real sacrifice and courage.
- speaker: Interviewer
  text: This was a coal miner?
- speaker: Respondent
  text: A coal miner. In Thurber.
- speaker: Interviewer
  text: Where is Thurber?
- speaker: Respondent
  text: It is not far from Stephenville. My husband was actually born in Stephenville because they had to go to Stephenville
    to get a doctor. Thurber was a company town. There was a Thurber Coal Mine and a Thurber Brick Company and that was all
    that was there. He grew up there for, I suppose, the first ten years of his life. He moved to Fort Worth a little before
    I did and when my family moved to Fort Worth, it was coming back to Fort Worth. They lived in Fort Worth, then in Sherman
    about twenty years and came back to Fort Worth when I was eleven. So, I spent almost all of my life in which I did much
    thinking in Fort Worth. We were quite active in the Baptist Church, which is where I met my husband. He expected to become
    a Baptist minister until he went to Baylor University and began to realize what was involved in being a minister in the
    Southern Convention and decided that his outlook was already too broad to permit him to have a successful career in the
    Southern Convention. So, he took along summer off, went to West Texas and thought about it and decided that the thing
    he needed to do was to become a lawyer instead. We were already engaged and when he came back after that long exile, he
    said, "I'm going to become a lawyer," and I had to decide whether I wanted to marry a minister or marry him. It didn't
    take me long to decide that I wanted to marry him, although that wasn't easy because it didn't occur to us then that people
    got married before they were ready to support themselves and sustain a home. That meant that he had another long period
    of professional education ahead of him. After thinking it over for a few days, I said, "Yes, I think that it is all right.
    I would still like to marry you if you still want me. I wouldn't mind so much being married to a lawyer as long as you
    don't go into politics." [Laughter] Then, he did go into politics. [Laughter] With my enthusiastic support and after a
    while, he became discouraged and I never have.
- speaker: Interviewer
  text: When were you married?
- speaker: Interviewer
  text: And you were living in Fort Worth at the time?
- speaker: Interviewer
  text: And had he earned his law degree by then?
- speaker: Respondent
  text: Oh yes, he wasn't about to marry me until he had his Texas law degree.
- speaker: Interviewer
  text: So you had a long courtship?
- speaker: Respondent
  text: Oh, yes we did.
- speaker: Interviewer
  text: This was often the case.
- speaker: Respondent
  text: And then we waited a long time to start our family after that.
- speaker: Interviewer
  text: So, after he became a lawyer, how long was it before you became actively engaged in politics?
- speaker: Respondent
  text: Let's see . . . he became a lawyer in 1934 and by 1940, we had become appalled at the way the local establishment
    abused the New Deal program. They cursed it. They swore at it until they realized that they themselves had to be rescued
    by it and then as soon as it had rescued the banks and the biggest insurance companies and the largest landowners, they
    wanted it to stop there. We didn't believe that most of the people had lost confidence in the New Deal or lost their enthusiasm
    for Roosevelt. So, in 1940, in cooperation with Maury Maverick Sr., we organized our county convention for Roosevelt.
    We had not organized the precinct convention. We just took the people that the regular machine had sent to the county
    convention and turned them around so that they sent delegates who would pledge continuing support of Roosevelt without
    continuing support of Garner, who was vice president at the time.
- speaker: Interviewer
  text: Had you been an enthusiastic supporter of Roosevelt from the beginning?
- speaker: Respondent
  text: As soon as he had been elected, after the first hundred days, I was an enthusiastic supporter of him.
- speaker: Interviewer
  text: You voted in the 1932 election?
- speaker: Respondent
  text: Yes, I did. That was my first presidential election, but you couldn't tell from Roosevelt's campaign, the part of
    it that reached down to the grassroots where I lived, that Roosevelt was going to do anything very different from what
    Hoover had been doing.
- speaker: Interviewer
  text: Did you vote for Roosevelt?
- speaker: Interviewer
  text: Did you vote for Herbert Hoover?
- speaker: Respondent
  text: No. I voted for Norman Thomas. [Laughter] You're the first person I've ever told that. [Laughter]
- speaker: Interviewer
  text: You feel that there is some liability attached to that?
- speaker: Respondent
  text: Oh yes, there certainly is.
- speaker: Interviewer
  text: Do you think that there still is?
- speaker: Respondent
  text: Yes, because I tried voting outside the Democratic party once later and I keep hearing about that time. I also voted
    for Republican John Tower. He ran in a special election, as you remember.
- speaker: Interviewer
  text: Yes, in 1961.
- speaker: Respondent
  text: Yes, against Blakley, who had just run in the Democratic primary and been rejected. So, no one could say in the special
    election that Blakley was running as a Democratic nominee and we had no obligation as party members to vote for anyone
    in that special election. Tower was the lesser of two evils, in my view. I thought that a relatively impecunious teacher
    from Wichita Falls would be easier to get rid of than a millionaire from Dallas. [Laughter] In that, of course, I was
    very clearly mistaken.
- speaker: Interviewer
  text: Would you care to speculate on how many Texans could say truthfully that they have voted both for John Tower and Norman
    Thomas?
- speaker: Respondent
  text: '[Laughter] That would be interesting.'
- speaker: Interviewer
  text: To go back to that first election - I'm trying to put two and two together here - at the time that you found out that
    your husband was going to be a lawyer, you warned him not to get involved in politics, and then in 1932, you voted for
    Norman Thomas. What happened in the intervening time?
- speaker: Respondent
  text: I didn't marry my husband until 1934.
- speaker: Interviewer
  text: Was there a period of several years there when you went from a relative lack of political involvement in your early
    twenties to a time when you became fairly aware and politically conscious in your early thirties?
- speaker: Respondent
  text: Yes, but it was as a person on the sidelines. For one thing, I was a teacher and I had begun to teach in high school
    and the thing that I was most interested in was history and by that time, I had gone to graduate school at Texas Christian
    University and the man who was head of the history department was named Jack Hammond, who had also been a successful reform
    candidate for mayor of Fort Worth. I suppose that it was Dr. Hammond's campaign that first made us actively interested.
    He was also a Disciples minister and he was appalled at the conditions that leading citizens allowed to continue in the
    '30s. People actually starved to death in the hotels and rooming houses on the courthouse square, and the public hospital
    was so overcrowded that people died lying out on the grass in front of the hospital. They couldn't get in. And he went
    around preaching in as many churches as would listen to him—and that was a good many—saying that no matter how hard a
    time the rest of us were having, we were all in the same boat and local government must do more about the poorest people.
    Both my husband and I had been very poor. His father had died when he was three weeks old. I was separated from my father
    by a family quarrel after my mother died . . . we had both known extreme poverty and although we never starved after we
    were married, we lived on an extremely limited income and that didn't make us want to get over with the people that were
    safer than we were. It made us feel a part of all the people who were as insecure as we were. We felt that the New Deal
    leadership of the Democratic Party was dedicated to taking practical steps to improve the lot of the poorest people. My
    husband has been a poverty lawyer all his life. No one told him that you couldn't make a living in poverty law, and so
    he did.
- speaker: Interviewer
  text: And at the time you voted for Norman Thomas, was there much support at all in a place like Fort Worth for a socialist
    candidate?
- speaker: Respondent
  text: No. As far as I know, no organized support. It was just something that I did by myself. The only other influence that
    I can think of that moved me in that direction was that I majored in English in college and became acquainted with the
