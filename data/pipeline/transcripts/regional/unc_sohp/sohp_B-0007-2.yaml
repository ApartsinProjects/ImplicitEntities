collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Well, how long did you live in Nashville altogether?
- speaker: Respondent
  text: Well, let's see, from the time I went to Vanderbilt, and was there from 1926, I reckon, until we bought this place
    here in 1938 and started building. Moved in on Nancy's birthday the next year of 1939.
- speaker: Interviewer
  text: Well, when you were in Nashville as a student at Vanderbilt you were in the YWCA there, weren't you?
- speaker: Interviewer
  text: You were always in the YW . . . YMCA, not YWCA.
- speaker: Respondent
  text: I was the Associate Secretary of the YMCA of the School of Arts and Sciences, and Secretary over at the School of
    Religion, and I got fired . . . [Laughter] . . . from Vanderbilt because we held a meeting . . . are you interested in
    this?
- speaker: Respondent
  text: We held a meeting in protest and I went to the Dean and asked him if I could have use of the hall, the Chapel, to
    have this meeting of all the students in Nashville to protest the intervention of the western powers in China. And it
    created an absolute uproar in Nashville. Now the Chancellor at Vanderbilt, old Doctor Kirkland, who was a reactionary,
    called all the Presidents of all the colleges, white and black, together, and told the Dean to have a meeting and answer
    some of the questions we had raised at our meeting. And the Dean was furious because he said I hadn't included the Negroes.
    I said, "Dean Brown, I said all the students, and you know me well enough to know what I meant."
- speaker: Interviewer
  text: Well you had worked with Scarritt, and Fisk, and A & I, hadn't you?
- speaker: Interviewer
  text: Didn't you have an interracial student group that was fairly active?
- speaker: Respondent
  text: Oh yes. It met every Saturday.
- speaker: Interviewer
  text: Was it a large group?
- speaker: Respondent
  text: Well about 25 or 30 sometimes as many as 40.
- speaker: Interviewer
  text: What kinds of things did the group do?
- speaker: Respondent
  text: Well we didn't do much. We just talked among ourselves about our problems, and if there was anybody in trouble we
    tried to get them out, and that sort of thing.
- speaker: Interviewer
  text: So he was saying that you hadn't included the Negro students?
- speaker: Respondent
  text: That was his way out with the Chancellor because the Chancellor didn't like the School of Religion in the first place.
- speaker: Respondent
  text: He'd just as soon seen it go under.
- speaker: Interviewer
  text: So that is what you were fired for rather than protesting the intervention in China?
- speaker: Respondent
  text: Yes, that's right because Negroes came . . . in those days, the students didn't have automobiles and they came in
    street cars, and there was no intention to segregate anybody. But by virtue of the fact that they came in the street cars,
    because they came as a group, they sat as a group, and there were maybe two or three people including my wife who sat
    by a Negro, but it was written up in the Tennesseean and The Banner as an interracial meeting, not the true reason for
    it. One of the officers at the college came by and saw all these people in there and the speeches being made and he called
    the Newspapers. He beat us to the phone . . . we called them later and they said we've got the story, and it was headlined
    the next day. The Chancellor, one of the members of the faculty said "The Chancellor said he didn't mind the jackasses
    braying, he just didn't want them braying on his campus."
- speaker: Interviewer
  text: You left Vanderbilt after that, didn't you?
- speaker: Respondent
  text: I went to New York to the Fellowship of Reconciliation and then came back.
- speaker: Interviewer
  text: You then came back?
- speaker: Respondent
  text: That was it . . . I became the Director for FOR here in the South.
- speaker: Interviewer
  text: Well then when you were in Memphis did you have any contact with the Methodist Women's Missionary Council, that group
    . . . they had set up some black settlement houses in Nashville?
- speaker: Respondent
  text: Mrs. Clayton?
- speaker: Interviewer
  text: I don't know. Mrs. Clayton might have been with it, I don't know.
- speaker: Respondent
  text: Well what happened was that the Commission on Interracial Cooperation, Will Alexander, you know?
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: And Arthur Raper. Dr Will got Mrs. Ames, Jessie Ames, to organize white women to struggle for equal rights for Negroes.
    Alice's close friend in Nashville was Mrs. Tilly, I don't remember her first name and she was doing the same thing as
    far as the organization of Methodists Women was concerned as Mrs. Ames was doing generally, and they . . . the record
    is that there were 250,000 women, now I can't verify that, but that is what I have heard.
- speaker: Interviewer
  text: Louise Young was active.
- speaker: Respondent
  text: Louise was a darling.
- speaker: Interviewer
  text: She was into a lot of different things, wasn't she?
- speaker: Respondent
  text: Yes, gave me lots of encouragement, and sometimes discouragement.
- speaker: Interviewer
  text: How did she give you discouragement?
- speaker: Respondent
  text: Told me I was going too fast.
- speaker: Interviewer
  text: She worked with the YWCA Industrial Department, right?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Was that her main . . .
- speaker: Respondent
  text: 'And race. She was in the field of race and industry and so on, and she was a very intelligent woman, and the people
    at Scarritt, the faculty folk at Scarritt were, for the most part, very liberal and some of them were radical, you know
    what I mean? And, I had them, especially students, working with me in strikes and coal miners, and whenever I wanted help,
    they gave sound advice. We had what we called Aid Day, when we would take clothes and food to the miners. People would
    send us clothing, etc. from all over the country and we''d take it and distribute it. Alice kept a meticulous record of
    everything she gave everybody. So the officers who sometimes thought because they were union officers, they ought to have
    prior consideration, but she (Alice) didn''t think so. They were just another family in need, you know? She saw to it
    that everybody got their share. Whenever we wanted help, and we always needed help; it was quite a job distributing all
    the materials: food, canned food, and clothes, shoes, and we even got sets of false teeth, etc., students from Scarritt
    would help us.'
- speaker: Interviewer
  text: You were distributing that throughout the South.
- speaker: Respondent
  text: Mostly in Eastern Tennessee, at Wilder, Davidson, and Twinton, three coal mining towns.
- speaker: Interviewer
  text: Well in Wilder did you have a lot of trouble-that strike went on for a tremendously long time.
- speaker: Respondent
  text: A long . . . twenty some months, and the union President was killed, was shot, and they put a machine gun over his
    body so nobody could get to him, and he would identify his killer.
- speaker: Interviewer
  text: You eventually just had to move people out, right?
- speaker: Respondent
  text: Yes, some went to Cumberland Homestead. I spoke at a meeting at which the Chief Forester at TVA was present. I think
    the meeting was in Philadelphia, anyway, and he came to me later and said, "If I can get an appointment for you with Dr.
    Morgan . . . Arthur Morgan, TVA Chairman, will you tell your story to him?"
- speaker: Respondent
  text: '"Will you go up and talk to him and tell him what you''ve told this group." I said that by all means I would. So
    he arranged the meeting and I went up and talked to Dr. Morgan. After I told him the story of what was going on, the desperate
    need, he said, "Will you leave the room for a few minutes?" And I knew what he was going to do, he was going to call Washington
    and see if he could get some help. And he got it, and the man who selected the families is living over here in Black Mountain
    now, Dag Folger.'
- speaker: Interviewer
  text: Dag Folger?
- speaker: Respondent
  text: F O L G E R.
- speaker: Interviewer
  text: Was he with the resettlement?
- speaker: Respondent
  text: They were just beginning.
- speaker: Interviewer
  text: I see. This was one of their first efforts?
- speaker: Interviewer
  text: The fellow with TVA, Arthur Morgan, was he just a very interested person that . . .
- speaker: Respondent
  text: No, no, Dr. Morgan was a first rate engineer, and he is the one responsible for building Lake Norris, for example,
    and the dams all up and down the Tennessee Valley . . . the river, and was a very perceptive person. He was President
    of Antioch College before he went to T.V.A.
- speaker: Interviewer
  text: I see. That was after he left TVA?
- speaker: Respondent
  text: No, before, and then he went back.
- speaker: Interviewer
  text: Were the mines Wilder closed then after everyone was moved out?
- speaker: Respondent
  text: No, there were enough people left to dig the coal, but the wages were so low, had been cut, and cut, and cut and by
    the time they took out for the rent, the electricity, the shower, and other items, the poor folk had virtually nothing
    to live on. On the night that Barney Graham, who was President of the Union was killed, it was in the afternoon . . .
    Sunday afternoon, Alice and I spent the night with his wife and children, and the only light we had was a string that
    had been dipped into a Coca Cola bottle of kerosene.
- speaker: Interviewer
  text: How did you first get involved in the strike?
- speaker: Respondent
  text: Well, I knew the trouble the miners were in.
- speaker: Interviewer
  text: With the Fellowship of Reconciliation?
- speaker: Respondent
  text: Yes, and got in trouble over it.
- speaker: Interviewer
  text: That's when you broke with them, in 1934?
- speaker: Respondent
  text: That's right. The miners just simply refused to let me go out at night alone, and most of the time somebody was with
    me.
- speaker: Interviewer
  text: Well had they come to you originally and asked . . .
- speaker: Respondent
  text: No, I just knew they were in trouble and needed help and went to them. At first they didn't know whether to accept
    me or not because I could have been a spy for the company or something equally as dangerous to their cause. Well, it didn't
    take them long. They accepted me, and I was one of them. This issue the matter of my being guarded by the miners while
    working in the FOR, Fellowship of Reconciliation came up over the extent to raising angry arguments . . . well there had
    not been anything like it. The miners guarded me. Of course, none of the FOR members had been in a situation where you
    could get your brains blown out.
- speaker: Interviewer
  text: It is very easy to talk about non-violence when you were in a peaceful situation.
- speaker: Respondent
  text: Yes, and then the whole question of the extent of one's participation in the class struggle came up, and I took the
    position that I think was the correct one. That whether you liked it or not, you were already involved in it because every
    time you bought a ton of coal or a loaf of bread, you were participating in the exploitation of the workers. And I said,
    "You are involved in it just as much as I am. You don't have anybody guarding you, like I do."
- speaker: Interviewer
  text: So you resigned from their organization.
- speaker: Respondent
  text: Yes, I resigned. They offered it back to me though, later. Nevin Sayre made a special trip down to Nashville and asked
    me to come on back.
- speaker: Interviewer
  text: How much later was that?
- speaker: Respondent
  text: Oh a matter of months.
- speaker: Interviewer
  text: But you had already done something else by that time, hadn't you?
- speaker: Respondent
  text: I had this committee . . . wonderful committee, Committee on Economic and Racial Justice. Reinhold Niebuhr was Chairman,
    and Elizabeth Gilman was Treasurer. And all of them, quite a number of prominent New Yorkers, set me free to do whatever
    I thought needed doing in the South.
