turns:
- speaker: Interviewer
  text: What effect have single member districts had in Texas politics and in Harris County politics?
- speaker: Respondent
  text: Well, in Texas politics generally—and Harris County Republican Party did lead the way for this—it has given more representation
    to Republicans and other minorities. I fought very strongly for the black population here as well as for Republicans.
    However, in Harris County it has resulted in a major division between liberal Democrats. The old establishment Democrats
    have simply not been able to hold on to any of the districts. So we now have a labor-dominated delegation from Harris
    county. Now the six Republicans are the exceptions. All of the others are labor persons, and, I think you could probably
    say are controlled by labor. We have three AFL-CIO organizers in the delegation.
- speaker: Interviewer
  text: Did you win as many Republican seats as you thought you would?
- speaker: Respondent
  text: We won more than the Democrats thought we would. We lost one this time in the east end of the county.
- speaker: Interviewer
  text: Is that the only one that was lost statewide?
- speaker: Respondent
  text: Yes, in the Pasadena area. And we were very, very badly gerrymandered in Harris County. Both from a state representative
    point of view and a state senatorial. Of course, congressional also. Barbara Jordan was vice-chairman of the redistricting
    committee. The state senate seats were drawn in order that she could have her congressional seat. And the blacks did not
    get a state senatorial seat, and they certainly, by population, deserved one.
- speaker: Interviewer
  text: Do you agree with the state chairman's assertion that this wasn't really much of a loss for the Republicans?
- speaker: Respondent
  text: Of course that's perfectly ridiculous. When you have to go back fifteen or twenty years to find a time when the statewide
    Republican slate did as poorly as they did this year, it's sort of foolish to say that you did not suffer any major loss.
    And when you lose a congressional district that you've held for three terms actually—I believe Bob Price has been up there.
    It was a major loss. The problem with the Texas Republican Party is that it has always been organized from the top down.
    And that it has been run almost entirely for the benefit of the senior senator from the state of Texas.
- speaker: Interviewer
  text: There was talk a few years ago, I believe both on the part of the Republicans in Harris County and the liberal Democrats
    that single member districts would result in political realignment. The Republican Party would become the conservative
    party. The Democratic Party would become the liberal party. That the conservative Democrats would move over into the Republican
    Party. Has that happened?
- speaker: Respondent
  text: Not to any great extent. And the reason it did not happen was because of Watergate. It would have happened and it
    may yet happen. Because the Democrat state hierarchy is becoming more and more liberal, labor dominated. So that we may
    see that in the next four to five years at a state level. But we have not seen it thus far. See, we do not have a significant
    number of persons in the state legislature and no statewide Republican office holder on a state level. The major breakthroughs
    for the Republicans in the state of Texas—and somebody from out of the state may not be able to understand how very important
    the outdated commissioners' courts and county judges are. But they are indeed the dominant political factor in the state.
    And we were able, here in Harris County, and they were able in Dallas, to elect a county judge. And this is a major breakthrough
    for Republicans. Because we have now a third of the state's population that is governed, at a county level, by a Republican
    rather than by a Democrat. Remember in Harris County, electing a county judge is the equivalent of electing a U.S. Senator
    in eighteen states from a population standpoint.
- speaker: Respondent
  text: Well, it's very interesting because we only spent about $31,000 and we hit hard on issues and on organization. And
    we turned out our vote. That's how it was done. We knew how to make use of the issues that we had and we beat a sixteen-year
    incumbent here. And in Dallas the race was very similar in that they used issues and approximately $30 to $35,000, which
    for a countywide race is astounding. The sheriff two years ago—and he was running as a Democrat—used over $100,000 to
    unseat an incumbent Democrat. So for a Republican to unseat an incumbent Democrat with $30 to $35,000 is nearly a miracle.
    And we won with fifty-seven percent of the vote.
- speaker: Interviewer
  text: What is it that you do that's so different in this county than the others?
- speaker: Respondent
  text: I think probably that I give my services full-time and have had a very varied political background. And we keep an
    active precinct organization throughout the year. And the Republican Party has had good relations here with the media.
    This has made a big difference. But if I had to put the finger on one thing, I would say it was on organization. On the
    strong Republican women's clubs. And on the strong precinct organizations. We're in a period of time where organization
    is going to be far more important than money. Because money is harder and harder to come by. And certainly at a federal
    level it's going to be almost impossible for a challenger to get enough money together—with this new federal campaign
    spending law.
- speaker: Interviewer
  text: Won't that drastically affect the nature of Texas politics because of the size of the state? If you have to rely on
    organization rather than money, rather than media?
- speaker: Respondent
  text: Yes, I think it will. And if the Republican Party were well organized, they could easily take over the state. But
    the Republican Party statewide is not.
- speaker: Interviewer
  text: Is it a country club party?
- speaker: Respondent
  text: It is to me. It always has been. That's the reason I would say—other than the fact that there is a total difference
    in the approach. Meaning that I think you start at the bottom and work up. But I also think that you go to the people
    who have the votes and not to the so-called country club set, which the state party has courted.
- speaker: Interviewer
  text: If you were the state chairman, what would you do differently?
- speaker: Respondent
  text: That would be a book unto itself.
- speaker: Interviewer
  text: Would you emphasize organization?
- speaker: Respondent
  text: I would emphasize organization. I would also emphasize the small donor and I would also emphasize a total openness
    for the party, for financial records. We prepare a budget, present our audit, both to the press and the public. I would
    help people to understand what they are getting for their money and I would develop the issues on a liberal-conservative
    basis. Because Texas, even with the tremendous influx of population, is basically a conservative state.
- speaker: Interviewer
  text: Some of the people that we've talked to assert the same thing, that the party is run here for Senator Tower. And that
    the net result of that is that he doesn't really encourage other candidates to run statewide or in local races because
    it may draw finances or effort away from his campaign. What do you think of that assertion?
- speaker: Respondent
  text: I've been very open in saying that the Republican Party was run by, for, and for the benefit of Senator Tower. It
    has really been one of the things that, to me, has defeated the building of a two-party system.
- speaker: Interviewer
  text: But don't they argue that you really need a statewide office at the top first before you can build a statewide party?
- speaker: Respondent
  text: Well, if the statewide office is a federal office, it's not going to do you much good. Particularly if the statewide
    federal officeholder wants the party in his vest pocket. You will see this again, I'm afraid, through '76. I think you
    will see Tower carrying the Texas delegation. John Tower simply has not built the state party. I mean, this is very obvious.
    The fact that we've elected no statewide office on a state level.
- speaker: Interviewer
  text: Does Tower actively discourage statewide candidates in '72?
- speaker: Respondent
  text: It would have to depend on what you mean by discouraging them. He certainly gave them no support whatsoever. Remember,
    we only had five. We didn't even have a full ticket.
- speaker: Interviewer
  text: Let me put it another way. Did he actively go out to find candidates?
- speaker: Respondent
  text: No, he did not. No, he definitely did not.
- speaker: Interviewer
  text: Has he done any of that sort of activity?
- speaker: Respondent
  text: Oh, in '74 his executive director in Austin did recruit certainly relatively unknown, untried candidates that had
    no base, organizational or financial influence. And that's shown by the fact that our gubernatorial candidate got the
    smallest percentage of votes since I believe 1962. And he was Tower's handpicked candidate.
- speaker: Interviewer
  text: What's your reaction to the assertion that the Republicans could have won the 1972 governor's race if there had been
    support from both Nixon and Tower?
- speaker: Respondent
  text: There's absolutely no question about it whatsoever. The Republicans would now have the gubernatorial chair and with,
    in '74, going into four year terms, we would have held it for eight years. Another $100,000 would have elected a Republican
    governor in 1972. Or even that, had it not been for the animosity of the Committee to Reelect and Senator John Tower.
- speaker: Interviewer
  text: How was this animosity demonstrated?
- speaker: Respondent
  text: With cutting off funds where they could, and in running a separate campaign.
- speaker: Interviewer
  text: Tower-Nixon more or less ran together but did not include the candidate for governor.
- speaker: Respondent
  text: The Tower-Nixon people ran totally as a ticket. The Committee to Reelect helped finance John Tower's campaign in the
    state of Texas through the extensive boiler rooms that they had. They called out the vote for the Tower-Nixon ticket.
- speaker: Interviewer
  text: Was part of that an arrangement through which Connally could support Tower and Nixon and in effect represent Democratic
    support for Tower, but at the same time be credible by also supporting the Democratic candidate for governor?
- speaker: Respondent
  text: I don't know whether I would want to agree entirely with that. I think Connally's situation is that he is a nominal
    Republican only. He did not give any support in '72 to local or statewide Republican candidates.
- speaker: Interviewer
  text: He was still a Democrat then.
- speaker: Respondent
  text: He came over in—yes, he was heading the Democrats for Nixon.
- speaker: Interviewer
  text: Has his switch meant anything?
- speaker: Respondent
  text: No. Of course with Connally's problems . . . no, it's meant nothing to the party . . . that I see.
- speaker: Interviewer
  text: What did you anticipate would happen, before his other problems developed in the court? His switch. At the time of
    his switch how did you analyze the effect of it?
- speaker: Respondent
  text: At the time of Connally's switch, I thought his major value to the Republican Party would be in the fundraising field.
    After all, he never had an organization, so he could not bring that. And his endorsements had not been very productive
