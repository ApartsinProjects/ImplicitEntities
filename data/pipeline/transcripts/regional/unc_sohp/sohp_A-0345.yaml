collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I know that you were living in Chapel Hill when you first went to Atlanta to take the SRC job. Would you give me a
    little bit of your background, personal background? How you got to Chapel Hill, where your home was and so forth?
- speaker: Respondent
  text: Yes, I was born in Texas about 45 miles northeast to Dallas in 1901. I'll soon be 90 if I live that long.
- speaker: Interviewer
  text: What was the name of the town?
- speaker: Respondent
  text: The little town was called Caddo Mills, named for the Caddo Indians. It was settled by southern people almost entirely.
    I had two grandfathers and a great-grandfather who were pioneers.
- speaker: Respondent
  text: A North Carolina grandfather, for instance, went there in 1856. My great-grandfather went actually during the closing
    year of the Lone Star Republic, '44, I believe. They settled in a rich, black soil area, which was already sort of open
    prairie country. It was easy to get into cultivation. This was excellent soil, and they raised cotton, corn, wheat, oats,
    and some other things, but the main cash crop was cotton.
- speaker: Interviewer
  text: Were both of your grandfathers from there? I mean, they both cultivated that land?
- speaker: Respondent
  text: Yes. They were both from plantation families, one from Alabama, one from North Carolina, and had experience on the
    farm. They also had some other skills. In fact, you almost had to have several if you were going to survive in those days
    [laughter]. So the North Carolina grandfather was a preacher, a teacher or tutor, a farmer, and then, of course, like
    most of them he could do leather work, to keep the harass in repair, and maybe work on wagons and buggies. Because you
    simply had to have some of those skills. [laughter]
- speaker: Interviewer
  text: So you were a third generation Texan?
- speaker: Interviewer
  text: In that sense, that your grandfathers both migrated there from the South. That's amazing.
- speaker: Respondent
  text: Both in 1856, my great-grandfather in '44. Incidentally, I was a third cousin of Lyndon Johnson. His grandfather and
    my grandfather were first cousins. I never met him. My oldest brother knew him because he had some interest in local politics,
    but I never had the pleasure of meeting Lyndon except seeing him make speeches. We lived in a small town. I guess it had
    something like 300 people, a farming village. It had had the MK&T Railroad since the early 1880s, which gave them easy
    access to cities in Oklahoma, St. Louis, Chicago, etc., and greatly added to the possibility of marketing farm products.
    So I'd say it was a fairly prosperous little community. I don't know of anybody who was really poor, and only two or three
    people that you might consider fairly well off, not rich at all.
- speaker: Interviewer
  text: Yeoman farmers?
- speaker: Respondent
  text: Yes. There were practically no blacks in that community. I remember maybe one family. We did use some black labor
    sometimes during the cotton picking season. Somebody who had a truck—and trucks were not very big in those days—would
    organize black cotton picking teams in the county seat of Greenville, which was eight miles away. He'd drive them down
    to Caddo Mills and put them out picking cotton for various farmers. A good picker could do pretty well because, as I recall,
    it was a dollar a hundred pounds. I knew one of two of those fellows who could pick 400 pounds a day.
- speaker: Interviewer
  text: How in the world did you get from that isolated rural community all the way back over here to Chapel Hill?
- speaker: Respondent
  text: Well, that's a bit of a story. I did quite well in high school, and then two years at a little junior college at Greenville,
    our county seat. Had quite an impulse to go on and get more education. So I managed to get a scholarship to Baylor University.
    I'd been brought up a Baptist, and my father's father was one of the founders of the Baptist church there. My father,
    during all my young life, was the choir leader and one of the school's superintendents at the Baptist church. So I went
    to Baylor and did all right there. I changed my career ambitions from being a minister to being a teacher. Looking back
    on it, I can see now that I had made the decision to do pre-ministerial work at Baylor and then go to Fort Worth Seminary
    because I probably thought it was the surest way of being able to get a little help, you know, tuition and so forth, to
    stay in Baylor. Well, the Baptists were doing then what they're doing now. You know, they're shooting themselves in the
    foot. The Bible Department especially was always under attack by old J. Frank Norris, a Baptist conservative minister
    from Fort Worth. Well, I also found that my Bible courses were not terribly interesting and were taught by men whom I
    would now consider rather bigoted. Although I was brought up in a rather conservative atmosphere, I guess, my father was
    a broadminded man and had a pretty good education himself. He had gone to Baylor for a while. Both grandfathers had some
    higher education, and they had small libraries, but interesting libraries. It did not escape my notice [laughter] that
    they had books like, oh, one or two things by Thomas Jefferson, I think they had Darwin, Origin of the Species, and they
    certainly had, oh, who was the early astronomer who wrote Celestial Mechanics and stuff like that? [laughter]
- speaker: Interviewer
  text: Oh yeah, I can't call his name.
- speaker: Respondent
  text: So, I mean, these are not the libraries of bigoted [laughter] people. Well, this came to be a little more than I could
    take, and at the same time, I was trying out a course in sociology, which was brand new then. I became much interested
    in the sociology. A storm was brewing from this preacher, Frank Norris at Fort Worth, who was beginning to attack my sociology
    teacher for being not a literalist, you know, when it came to the Bible. Well, to shorten this, I finished there in '21,
    and a teacher helped get me a tuition scholarship at the University of Chicago. He had studied there. This was the coming
    place, you know, in the middle west. Everybody was talking about Chicago and what a fine place it was. I think was founded
    only about 1895. [laughter]
- speaker: Interviewer
  text: Yeah, it was not an old school, but it was in its heyday then.
- speaker: Respondent
  text: So I went there, and by this time I had completely decided to be a teacher and not a preacher. I always thought that
    was a very wise decision. Well, after the masters degree there under Park and Farris, Smalls.
- speaker: Interviewer
  text: Robert Park was sort of the preeminent sociologist at that time, wasn't he?
- speaker: Respondent
  text: Yes, he was. He had a special interest in race and ethnic groups.
- speaker: Interviewer
  text: What was his background? Did he have any southern ties?
- speaker: Respondent
  text: No, oh wait, yes. Not family but, most people don't know this and I don't think I ever heard him mention it, he became
    sort of a personal secretary to Booker Washington, and worked there at Tuskskege for several years. I strongly suspect
    that some of Washington's best speeches were drafted by Robert E. Park. I would suspect especially those famous lines
    in the 1895, what was it, Cotton States Exhibition Speech about the fingers.
- speaker: Interviewer
  text: Five fingers of the hand.
- speaker: Respondent
  text: Although, of course, Washington was quite capable of doing all that himself. Well, anyway, he had had experience as
    a newspaper man. I forget whether it was New England or in the West. Then he had had this experience at Tuskegee. I forget
    just where he got his training in sociology, if any.
- speaker: Interviewer
  text: Maybe he invented it [laughter]?
- speaker: Respondent
  text: Well, I liked him very much. He liked my work and was very encouraging to me.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: I was just there that one year. Nobody told me, you know, that you don't get a masters so easily in one year, especially
    if you're from a substandard high school background. Dean Smalls looked over my credits and decided that I should have
    had more history. So he wanted me to take on the side a course in English Constitutional History [Laughter] taught by
    Terry. I took it, and I profited by it very much. I got in that course, especially in the readings, I did a pretty good
    sweep of the making of modern England. [Laughter]
- speaker: Interviewer
  text: Did you finish the master's?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: In one year?
- speaker: Respondent
  text: One year, and I took two extra courses. Smalls wanted me to have another course in something. Oh, it was taught by—well,
    I had two courses over there—Mrs. Breckinridge and another one by Edith. . . . See, my memory is now beginning to play
    tricks on me. Edith Abbott, social statistics. So instead of the usual eight or nine courses, plus thesis, I had ten courses
    and wrote my thesis on the resurgence of the Ku Klux Klan in the postwar period. Got it all typed and submitted in time
    for graduation.
- speaker: Interviewer
  text: Got the degree, gosh, in the twelve months.
- speaker: Respondent
  text: Before I went there, I would worry considerably about this farm village boy from Texas with a weak high school background
    and probably mediocre AB background, going up there and competing with these upper Midwest, urban types.
- speaker: Interviewer
  text: You must have done all right.
- speaker: Respondent
  text: I went up there in an open air ceremony, just the social sciences, and Smalls was also Dean of the Graduate School.
    He called my name and I went up, and he twinkled his eyes, "Congratulations." He spoke in that Latin thing where they
    award the degree, and I felt like I had done pretty well.
- speaker: Interviewer
  text: I imagine you did.
- speaker: Respondent
  text: Well, and then the problem was getting a job. I won't get into the details, but it was a narrow escape. I worked at
    a big, wealthy Jewish country club, Idlewile, out south of Chicago, where you had people like the Fleishmans and Marx
    and Shafuers and Bartzes, and Libby, and. . . .
- speaker: Interviewer
  text: That was the only job you could get?
- speaker: Respondent
  text: That was it. I use to read want-ads and go to these meetings where they wanted applicants to come and listen to a
    spiel, you know. I soon got used to these and saw that they were all wanting you to travel the Middle West and send encyclopedias
    or Bibles or whatnot.
- speaker: Interviewer
  text: Was a degree in sociology just not a tradable commodity?
- speaker: Respondent
  text: The market was very low that year for some reason, I don't know.
- speaker: Interviewer
  text: How long was it before you could get a teaching job?
- speaker: Respondent
  text: Oh, I got it right at the end of the summer. Oh, I had interviews. I well remember at the close of two of these interviews,
    one from Southern Illinois and the other from Earlham College, the presidents of these colleges, they were there interviewing,
    and they said the same things to me, "Mr. Johnson, we like your record. You've got good recommendations from your professors,
    but you look entirely too young for us. You'll overcome that in time, but right now we think we just have to look for
    somebody who's a little more mature looking." Oh, I tell you, I was really in a bind. I didn't know what I was going to
    do with August coming on and no job. I guess I could have stayed on at the country club, but that was like your room and
    meals and $30.00 a month. Very pleasant because you got very fine food.
- speaker: Interviewer
  text: But you did land a job that fall?
- speaker: Respondent
  text: 'Yes, Bruce Melvin of Ohio Wesleyan called me from downtown Chicago. Said he''d tried to catch up with me, but he
    learned that I was working out in the suburbs. He was frantic to find somebody to be an instructor in sociology. He said,
    "Now, I''ve never laid eyes on you, and I''m not going to have time to run out there or for you to run downtown, but I''ll
    tell you: I''m impressed by your recommendations. Your professors all think well of you. So I''m going to make you an
    offer, sight unseen." And he did, and I took it right there.'
