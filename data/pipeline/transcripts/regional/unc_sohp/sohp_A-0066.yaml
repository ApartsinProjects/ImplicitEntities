collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: In his book, Key said the key to understanding politics is race, basically. And I wanted to know how you feel about
    that now, both in southern politics and Georgia politics.
- speaker: Respondent
  text: I don't believe that's a factor any more, that it was in 1948. It's still a factor. You know, if you look at the results
    of the elections in recent years and in 1970 there was a whole group of governors elected, none of whom, you know, were
    identified as racist or inclined toward any substantial degree of additional segregation than their opponents. In the
    election of major figures around the country at the local level, we've seen a substantial trend toward the election of
    candidates who are either black themselves or who openly profess to believe in the equal treatment of black and white
    citizens. Georgia I'd say Atlanta is not any more liberal in its attitude than, say, Thomasville, Georgia. So we've got
    a black congressman, now, and as you know Atlanta elected a black vice mayor to mayor's position. And our second largest
    city, Columbus, which is probably one of the most conservative in the state, they've got a black vice mayor who was mayor
    a good portion of this year. We've got the largest number of black legislators in Georgia of any state, I think, in the
    nation. And they are as far as I can tell completely assimilated into the legislative structure, at least to the extent
    that they want to be assimilated. I believe that any southern politician who openly raised the question of race would
    be almost automatically defeated. There are still those who appeal indirectly to the innate prejudices that exist within
    all of us. The fears of the moment, or economic competition of an emerging black labor force that might be competitive.
    These are always factors in anybody's lives, but they are not directly attributable to the racial problem. The furor of
    the busing question is one that I think really crossed racial lines. The busing issue was not a code word for racism.
    I think they both, black and white parents, to a major degree, don't like to be required to bus their small children at
    least from their own neighborhood where they have a direct input into the school structure many miles away to an alien
    environment and to a school that's out of their sphere of influence. So I'd say that the connotation of race as a political
    factor has been substantially attenuated, although it's a factor along with economic issues and others, obviously, and
    always will be.
- speaker: Interviewer
  text: Key also theorized that a preoccupation with race tends to submerge other issues and prevent development of a two-party
    structure. Is there a two-party structure in Georgia at this time, in your opinion?
- speaker: Respondent
  text: Well, there has been. That's another point that I think would be pertinent and illustrative in the question that you
    asked before. The Republicans came into Georgia in 1964 the Republican influence came into Georgia in 1964 with Goldwater.
    And Goldwater's popularity, and Bo Callaway's popularity as a congressman from the third district, and others around the
    state, was heavily based on the racial question. And there was an aberration, in my opinion, that occurred because of
    that, that resulted in a shift toward Republican Party strength. In 1968, because of the debacle of the Chicago convention,
    there was an additional strengthening of the Republican Party in Georgia. We lost several congressional seats; five of
    our top statewide elected officials defected to the Republican Party. And I'd say it was related directly to what's been
    identified as Nixon's southern strategy, which had as its base an appeal to racial prejudices in the South. Since 1968,
    in a four year period, I've been elected governor, we have now every statewide officer in Georgia a Democrat. Nine out
    of ten of our congressmen are now Democrats. Eighty-six percent of our members of the state legislature are Democrats.
    And I think that although we still have a very easily identifiable Republican Party mechanism in Georgia, the trend is
    toward the Democrats. I would predict that before your book goes to press, namely in 1974, that you'll see a trend begin
    in a similar fashion at least in Tennessee. The same thing has already happened in Florida, and I think that South Carolina
    might be moving away from the impact of Strom Thurmond's defection to the Republican Party primarily on the basis of the
    racial question. I think we've been able to absorb the traumatic and very disturbing social change of insuring the legal
    equality of our black citizens. I don't think that any responsible person in the South would want to go back to a segregated
    society. We are still trying to adapt in some areas to the new competition of black workers, when unemployment is a threat.
    Luckily in Georgia we have less than three and a half percent unemployment, which is practically zero, so there's no major
    factor in the economic competition for jobs that results from the liberated black working force. But in general, I'd say
    that the trend after a change toward the Republicans because of the race issue with Goldwater and as a result of the '68
    conventions has been toward a more enlightened attitude among the voters of the state. And I think the statistics on elected
    officials indicate this. You might already know that in the thirteen southeastern states we have ten Democratic governors,
    we've got eighty percent of all the state officials, statewide officials and members of the legislature. We've got a little
    bit more than seventy percent of all the members of Congress. And my prediction is that 1974 will show these percentages
    to be improved by the Democratic Party.
- speaker: Interviewer
  text: You don't think the South's becoming two-party competitive, as it is in the rest of the country? You don't see this
    trend continuing?
- speaker: Respondent
  text: Well, I think it already has become a two-party competitive location, but if you look at what's happened in Florida
    where you went to a Republican governor and back to a Democrat. I mean, you look at what happened in Georgia, which I've
    just described. When you look at the situation in Tennessee, which I expect to be improved. When you look at a nationwide
    trend from eighteen Democratic governors in 1970 to thirty-two now. All the trends have shown that you've got a strong
    Republican Party mechanism, probably better organized than the Democratic Party mechanism. But a very detectable reservoir
    of Democratic Party allegiance among the people that have weathered this aberration toward the Republican Party based
    on the race issue, and who have now come back to the Democratic Party as their permanent home. There are obviously some
    exceptions. In Virginia, North Carolina, and Tennessee, you have exceptions to the rule. But I would say that in Louisiana
    and Texas and Oklahoma and Arkansas, which had a Republican governor, and in Kentucky we had a Republican governor. In
    Alabama, South Carolina, Georgia, Florida, you know, you've had movements toward the Republican Party and a reverse back
    toward the Democratic Party.
- speaker: Interviewer
  text: Someone suggested what happened is that the old-line establishment Democrats were thrown out of power because people
    were just fed up with them. Then they went to a Republican governor, then reorganized, in a sense, the party structure.
    Then went back to the Democrats. And that all the southern states are going to go through that sort of a thing.
- speaker: Respondent
  text: Well, I think that has not only happened in the governors' elections, but it happened in a lot of mayors' elections
    in Georgia. All the cities in Georgia except one have gone through that process. That one exception is Augusta, Georgia.
    But this is not a matter of race or party allegiance. I think that's a separate factor, that's obviously related to it.
    And that is, to express it in very simplistic terms, that the inclination of the voters to have direct relationships with
    the candidate, rather than accepting the leadership of intermediaries who in the past have been very powerful, and who
    are sometimes referred to as the establishment. I think that frequently in the past, the endorsement in a particular county
    of a sheriff or a judge or a newspaper editor or a banker, depending on the circumstances, was almost adequate to ensure
    that the voters would follow that leadership. When I ran for governor in 1970, my opponent who was a very attractive,
    very wealthy, young, handsome candidate, who was a former governor, and who was extremely popular when he went out of
    office he predicated his campaign on the old-fashioned concept that endorsements of public figures, members of the legislature
    and others than I mentioned, was an indication to the people that he was an acceptable candidate. I think, in retrospect,
    and I had the feeling at the time, that every time he got one of these public endorsements it hurt him. Because there's
    a new freedom that exists among the at least the southern people, I think it's nationwide, which results in an inclination
    on their part to speak for themselves. And they resent major figures endorsing a candidate because they feel that this
    candidate will be obligated to the major figure in their community rather than themselves. I think the same factor was
    illustrated last year with Muskie, who started out a very popular figure. He predicated his campaign on the endorsement
    of prominent citizens. And every time he got a major endorsement, the people in the communities said, "Well, I don't want
    my governor to tell me how to vote." And they had an inclination to leave Muskie.
- speaker: Interviewer
  text: Well, does this suggest to you that we're moving back to another one-party South?
- speaker: Respondent
  text: No, I don't think so. I believe that both Democratic and Republican candidates who have been elected say, Winfield
    Dunn in Tennessee and Holshouser in North Carolina and Linwood Holton earlier in Virginia were candidates who did not
    enjoy the support of the powerful special interest groups. Who may be benevolent in nature, but who have in the past been
    the leaders, with their positions of leadership adequate to influence voters. I think those of us who either had to forego
    their support because we couldn't get it, or who wisely chose not to depend on those powerful people but to go directly
    to the voter, in every instance I can remember, the one who went directly to the voter was elected. And that includes
    George Wallace. Wallace lost the support of the bankers, the power company, the utility company, and so forth, the newspaper
    editors. Although he had been a former incumbent, he had to go directly to the people, because he lost that establishment
    support. Brewer had it, and I think that's a major factor in his loss.
- speaker: Interviewer
  text: But if the Democratic Party, for example, in North Carolina, could pull itself back together, and set someone up with
    a new face, wouldn't the same thing happen in that state that happened here and in Florida and in other states?
- speaker: Respondent
  text: In my opinion it would. I don't know whether the word "populism" is so abused and has so many connotations, I hesitate
    to use it. But to the extent that a candidate goes directly to the people themselves on an individual basis, and convinces
    them that, "When I'm elected governor, or mayor, you don't have to go through some big shot to get to me." Those approaches
    have been successful in almost every instance. There have been a couple of exceptions, which are notable, where that trend
    has been clouded by other issues. One recently in Virginia, where Henry Howell, obviously a populist figure, had lost
    the support of every congressman in the state, for instance, Democrats and Republicans. And where he was accused of being
    in favor of busing, and he was accused of many other things. He couldn't fight those particular factors.
- speaker: Interviewer
  text: Do you think the significance of that race is the fact that Howell came so close?
- speaker: Respondent
  text: I do, yes. Because he didn't have the support of Democratic Party officials. He had the open opposition of Democratic
    Party officials. And the race, unfortunately, was clouded, as I said, by three very sensitive issues, that arose pretty
    much toward the end of the campaign. One, he was accused of wanting to appeal the right-to-work law, which he denied.
    He was accused of wanting to confiscate all people's firearms, which he denied. And he was accused of wanting to support
    mandatory busing, even across county and state lines, which he denied. But he never did deny those charges adequately
    to convince the people that they ought not to be concerned about them.
- speaker: Interviewer
  text: We've seen the suggestion that Democratic candidates who take this populist point of view, and promise an open administration,
    no special interests, and so on, would have the chance in the next few years, to win back in those states like North Carolina
    what they've lost.
- speaker: Respondent
  text: Now, I said both Democratic and Republican candidates who turn to the populist view can win. But there's an inherent
    difference, in my opinion, between Democrats and Republicans. In my opinion, the basic nature of the difference between
    the two parties is that the Democratic Party is always predicating its support on the people themselves. There have been
    times that an oligarchy could arise in a state, with major corporations, power companies, other utility companies, railroads,
    and so forth, banks, you know, speaking for the people in the absence of their inclination to speak for themselves. But,
    in general, Democratic candidates there are obviously notable examples tend to go directly to the people and understand
    what the people want. The Republican Party, at the national level and otherwise, basically predicate their financial support
    and their organizational structure on the fact that a few very prominent people and very highly qualified people and very
    influential people, can be spokesmen for a vast number of citizens. And they get a lot of money from individual con
