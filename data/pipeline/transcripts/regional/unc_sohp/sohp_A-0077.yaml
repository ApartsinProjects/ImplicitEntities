source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: It was located at the time I worked with them at the Community Council of the Atlanta area, which was a social and
    welfare planning agency. And it doesn't exist anymore. So now the Information and Referral Department was moved over to
    the United Appeals office, which is the same thing. United . . .
- speaker: Interviewer
  text: But your office, this office here, is called what now?
- speaker: Respondent
  text: This office?
- speaker: Respondent
  text: Oh, this office is the Governor's Council on Human Relations.
- speaker: Interviewer
  text: And you're the director?
- speaker: Respondent
  text: Coordinator.
- speaker: Interviewer
  text: Coordinator.
- speaker: Interviewer
  text: Did Governor Carter establish that, or was it here before that?
- speaker: Respondent
  text: He established that. But he didn't hire me. See, he did not hire me as coordinator of the Governor's Council. That's
    why I was . . . I was trying to tell you something about my background. I was working with the Information and Referral
    system, and they wanted me . . . well, they gave me a title as Assistant for Human Resources, to come into the governor's
    office and handle consumer calls, you know. Because that's what my experience was in. I didn't work in the governor's
    campaign. I didn't know him at all, and I had no idea I'd end up in Jimmy Carter's office. I didn't. I just . . . my only
    involvement in politics had been working with a voter registration drive. I did some work with Mr. Hill, Jesse Hill, who
    is president of Atlanta Life Insurance Company. And he was the chairman of the All Citizens Registration Committee, and
    I used to do volunteer work with him. And I had been involved a little bit in Andy Young's campaign, but, you know, United
    Appeal is nonpartisan, so I really wasn't even supposed to have been involved in politics. So I didn't work in the governor's
    campaign, and I didn't know him. The way I got involved in his office, when they got ready to send out the invitations
    for the governor's inaugural ball, I was on my vacation for two weeks, and Reverend Fred Bennett, who is a member of Martin
    Luther King's, Reverend Martin Luther King Sr.'s church, Ebenezer Baptist Church, had been involved in the governor's
    campaign, and he requested that I come to help them organize a black statewide list of invitees to the governor's inaugural
    ball. And so I just volunteered and came up here three days, and they had all the offices set up on the third floor. And
    I met the governor's aunt, the governor's mother's sister, and she just walked me work in the office and wanted to know
    where did I work, and so I explained it to her. And she said, "Ooh, I'd just love for you to work in Jimmy's office and
    I'm going to have to tell him about you." Well, I thought absolutely nothing about it, you know, and I guess two or three
    months passed and then Hamilton Jordan, who at that time was the governor's executive secretary, called and asked that
    I come down to talk with him and the governor about possible employment on the governor's staff. And, you see, I just
    . . . I didn't think very much of it, because no Georgia governor had ever had a black person working on his personal
    staff. And I just thought that they, you know, would discuss it and that would be the end of it. And I came and talked,
    and they wanted me to come to work the next week, and I had to give a two weeks' notice on my old job. And so I came to
    work. And then for a while I did the consumer calls. I just would handle consumer calls, whether it was a telephone call
    or just a walk-in off the street. Welfare problems, eviction notices . . .
- speaker: Interviewer
  text: You mean you handled the whole caseload, not just consumer complaints, but welfare and everything.
- speaker: Respondent
  text: Oh, no. That's right. The whole thing.
- speaker: Interviewer
  text: In effect, Citizens' Complaint Bureau.
- speaker: Respondent
  text: That's right. And it was just really getting to be too much for one person, and then they brought a man in. I don't
    even remember his name. Who stayed here for almost six months and then he left. They just kind of wiped out the part .
    . . the little office that we created. Because beside doing that, I had to spend a lot of time with Hamilton trying to
    orientate them about certain people in the black community, you know. Like I arranged to have Andrew Young come in the
    office and meet Hamilton Jordan and meet the governor. They really didn't know any black people at all, and they had never
    really . . . because most of the people on the governor's staff, with the exception of a few, had worked in the governor's
    campaign, but they had never been employed, full-time employment, so they had never . . . they didn't really have a good
    working relationship with people, because they hadn't had to really deal with people. And then there were a lot of things
    that I just would have to, you know, leave to go and talk to Hamilton about who Jesse Hill is and how important it is
    that we try to find out how the governor can be involved in the black community. Because the governor impressed me, from
    being in staff meetings and from questioning me about certain things, that he had a genuine interest in having black people
    participate in the operation of state government. And I knew that if that was to be so that he really had to establish
    a good working relationship with key black people. You know, not only in Atlanta, but throughout the state. So they were
    . . . so I . . . and then it shifted, you know. It shifted from the consumer type things, because we did a survey to see
    how many states had biracial councils. And, I think of the southern states, Alabama and Mississippi were the only two
    southern states that didn't have them at the time. And Georgia. And so the governor decided . . . this was after Governor
    West had already created his biracial council by executive order. Now, Georgia . . . that's a commission now. But the
    governor created by executive order in October of 1971 a statewide Governor's Council on Human Relations that had fifty-fifty
    black and white participation. Six black and six whites who pretty much . . .
- speaker: Interviewer
  text: Who's the chairman?
- speaker: Respondent
  text: A. B. Padgett is the chairman, who is director of Community Affairs for Trust Company of Georgia. And we needed somebody
    who knew something about foundation money, because at the time we didn't know where the money would come from for the
    council. And we could have a twenty thousand dollar grant from O.E.O., and we operated on that for a year. And . . .
- speaker: Interviewer
  text: Has any effort been made to give this council here commission status, statutory status?
- speaker: Respondent
  text: Senator Warren instituted a bill during the last session that, you know, got killed in the committee.
- speaker: Interviewer
  text: How about appropriations? Could you get a state appropriation now?
- speaker: Respondent
  text: You mean how we operate now? Well, it's very difficult. We don't have a separate budget. We still have a twelve member
    board, but the staff is on the governor's personal staff. See, when I was first hired, I was paid from the governor's
    budget, and then when we created the council then they transferred my salary on the O.E.O. grant. And then when we abolished
    that, we kept two staff persons, Joyce Moody and myself, and we just transferred over to the governor's salary. Now, when
    we have to pay for travel expenses for the board members, then it all comes out of the governor's budget. So the governor's
    office is . . .
- speaker: Interviewer
  text: So it's not a separate appropriation?
- speaker: Interviewer
  text: It's all part of his operation.
- speaker: Interviewer
  text: How does the office function. I mean, what does it . . . what has it done so far?
- speaker: Respondent
  text: Well, so far we have . . . well, we have in Georgia about forty-nine, or possibly, I guess, forty-nine biracial councils.
    There are 159 counties in Georgia. And we have offered technical assistance in creating those councils. Now, only about
    twenty-five of the forty-nine are active councils where they actually have a monthly meeting and they act as a complaint
    bureau, and they . . . you know, they are more active than others. And, I mean, that's kind of . . . well, the kind of
    activities that they are involved in are not handling discrimination employment kinds of problems, and discriminatory
    problems that might happen in employment. They really act more as an information source for the community, people who
    have problems. And if there's a school problem, if there's any kind of racial problem in the community, then they allow
    both sides to come in and talk with them, and they act as a mediator. So, I mean, they are . . . it's just . . . I guess
    it's the kind of tool that's been able to open up a lot of communications in Georgia that we simply did not have before.
- speaker: Interviewer
  text: You don't have any enforcement powers?
- speaker: Respondent
  text: Well, no. I don't know of any in Georgia that have enforcement power. Even the one in Atlanta doesn't have enforcement
    power. And they're talking about it now, and I understand there's a lot of opposition to that. So . . .
- speaker: Interviewer
  text: Primarily, then, a mediation and conciliation type of function.
- speaker: Respondent
  text: Persuasion, yeah.
- speaker: Interviewer
  text: Is it effective?
- speaker: Respondent
  text: Well, see, I can't answer that yes or no, because you have to really understand the problems not only in Georgia,
    but problems on local levels. And if, you know, if you open up communications where you never had black and whites talking
    together before, then that's accomplishing something. So, you know, I . . . that's not a yes or no answer, to a question
    like that. I think there's some that have been. I think that all of them could be more effective if they had enforcement
    powers, if they had a budget, if they had adequate staff, you know, if they had more credibility. But, you know, I think
    that they are doing some good.
- speaker: Interviewer
  text: Have you done an employment survey for the state government?
- speaker: Respondent
  text: Well, the Governor's Council employs a consultant to conduct a survey for the council because we didn't have adequate
    staff. And I'll give you a copy of it before you leave. It's right there, on the side there.
- speaker: Interviewer
  text: When was that completed?
- speaker: Respondent
  text: It was completed . . .
- speaker: Interviewer
  text: December of 1972.
- speaker: Interviewer
  text: That's fairly recent.
- speaker: Respondent
  text: But also the August of 1972 . . .
- speaker: Interviewer
  text: Oh, yes. Through August of '72.
- speaker: Interviewer
  text: Has anything happened as a result of that study?
- speaker: Respondent
  text: Well, no more than the council members made some recommendations to the governor about somethings that are being implemented
    now. One was the council felt that most of the problems with getting minorities and females involved in state jobs are
    in the state merit system. And they . . . you know, you can not reach certain people, because they have to go by the rule
    of five. They choose the top five from the register. And we have made a recommendation that a proposal be established
    and submitted to the Civil Service Commission, to see if we can go from five to eight. And a proposal has already been
    established and it's already gone in to the Civil Service Commission and the governor endorsed it. The other thing is,
    they have established in the state merit system an Employee Relations Division. And it is their responsibility to assist
    each department head in designing an affirmative action plan. Now we don't have a master affirmative action plan for all
    the state government. But the Employee Relations Division have a very close working relationship with the Equal Employment
    Opportunity Commission, which is physically located here in Atlanta. And they go over in the office, and people in their
    office come over, and they review all of the affirmative action plans that have been submitted. And the report would also
    indicate the number of departments who have already completed affirmative action plans and the ones that have been acceptable
    to the Employee Relations Division. There are only twenty-two departments in state government.
- speaker: Interviewer
  text: How many of them have submitted accepted . . .
- speaker: Respondent
  text: I think at the time that the report was completed, it was about fourteen.
- speaker: Interviewer
  text: Do you know if the rest have submitted them?
- speaker: Respondent
  text: I think that the rest are working on that. Well, you know, I'm not so impressed with affirmative action planning,
    because while you are designing affirmative action plans, you might have three vacancies next week. And, you know, unless
    you are committed to promoting females and trying to bring minorities . . . and I mean to . . . you know, the law states
    that you have to deal with minorities, but I'm concerned with black people, so I need to, you know, let you know that.
    I'm not . . . but you know, I don't think that there are very many department heads in state government who are really
    committed and want to make change as far as employees are concerned. The state highway department - the new name of the
    reorganization is Transportation Department - have some nine thousand employees statewide, and they have one black at
    a pay rate of 18. Just one. I mean, now, when you look at things like that and you go and talk with department heads .
    . . because I went and talked to a department head and I said, "I understand that in February you will have eighteen new
    vacancies, and ten of them are professional positions. Would you consider, you know, really doing an active recruitment
    effort to try and get some blacks in?" And he just completely avoided the question. But, now, that's not to say that it
    helps to have them . . .
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: Oh, it must have been six months ago. It was before '74.
- speaker: Interviewer
  text: When did this council start?
- speaker: Respondent
  text: In October 1971.
- speaker: Interviewer
  text: As you look back on that period, is there progress?
- speaker: Respondent
  text: Well, I happen
