collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I wanted to ask you really what I am interested in focusing on is the end of the Interracial Commission and the beginning
    of the Southern Regional Council and your role then in the new Council. I thought that we could start back a little bit
    by talking about your involvement in the North Carolina Committee for Interracial Cooperation, how you first got involved
    in that and some of your general impressions of its activities.
- speaker: Respondent
  text: Well, that goes back to 1924, I guess, the year we came here. I think that fall I went to a meeting of the North Carolina
    Interracial Commission in Raleigh and, at least, I met some of the people involved and soon became a member. And I remained
    a member until the thing had changed its name and all, to the North Carolina Council on Human Relations and later was
    disbanded.
- speaker: Interviewer
  text: Was the state office in Raleigh?
- speaker: Respondent
  text: Yes, as far as they had one. Actually, they never had a full time secretary, because they never raised very much money.
    But for some years, they cooperated with the Virginia Commission and employed a secretary named Reynolds, L.R. Reynolds.
    His home was in Richmond and he would come down here occasionally, much too infrequently for our good. And mostly, he
    would just travel around and visit places and talk to people, and then at the annual meetings he would be there telling
    how many miles he had traveled and how many people he had seen. And he would have this card index he had made up of names,
    there would probably be several thousand names that he had collected. So, we were paying half the salary and Virginia
    the other half, but actually very little was getting done. And eventually, the North Carolina Commission decided that
    they couldn't go on with this arrangement and they felt that they were getting very little attention from him. Now, he
    had an address, an office in Raleigh. I believe that it was at Mr. Gurney Hood's office, he was on the state banking commission.
    And he would use this address for his correspondence and he would come down and send out mail, but the return reply mail
    to him might lie there for a month.
- speaker: Interviewer
  text: Guy, wasn't the name of the organization the Governor's Commission on Interracial Cooperation?
- speaker: Respondent
  text: Well, I don't think that it was ever that. The governor made the original appointments and . . .
- speaker: Interviewer
  text: The governor issued the invitations. That's it, I knew that the governor was very intimately involved.
- speaker: Respondent
  text: That was a little strategy, you might say that . . .
- speaker: Interviewer
  text: Gurney Hood, wasn't he?
- speaker: Respondent
  text: No, in the earliest days, I'm not sure that Gurney was involved. I think that he came in later, but Dr. Alexander
    was among those who thought up this notion of organizing these state commissions with a little tinge of officialism. And
    so, they persuaded the governor of the state to issue the call for the first meeting and of course, they would select
    all kinds of prominent people, white and black. And you would get this impressive looking letter . . .
- speaker: Interviewer
  text: From the governor?
- speaker: Respondent
  text: . . . with the state seal on it, signed by the governor. And this was the way that most of them got set up. And in
    North Carolina, and I suppose some of the other places, at the annual meeting, the governor would make an evening address.
    And this was open to the public and all of this had the effect of lending a little bit of official sanction to the Commission
    and making it seem respectable in a day when it was really just not popularly accepted that the races got together at
    a meeting.
- speaker: Interviewer
  text: Who was the governor of North Carolina when . . .
- speaker: Respondent
  text: Oh, when the original call went out? That would have been . . . that must have been around 1920, '21 . . . we weren't
    here then. Who would it have been? Morrison?
- speaker: Interviewer
  text: Yes, Cam Morrison.
- speaker: Respondent
  text: You could look back in a North Carolina guidebook or something. I have here, I think, down here in the basement, a
    copy of a letter from Governor Gardner, O.Max Gardner. This was much later . . .
- speaker: Interviewer
  text: That was in the late 20's.
- speaker: Respondent
  text: He was calling for prominent people to come to the annual meeting and take part in this Interracial Commission. So,
    that was one little trick we had of trying to make the thing a little respectable. Well, as I was saying, the North Carolina
    and Virginia Commissions finally stopped their arrangement and let Mr. Reynolds go. He moved to Texas and just what he
    finally did, I'm not sure. I think that he worked or tried to get a position with the Texas Commission. I believe that
    I saw him one time when I went to Texas after I had gone with the SRC. But I'm not sure what became of him. He was a genial,
    well-looking, pleasant, well-meaning man with no real idea of how to . . .
- speaker: Interviewer
  text: No idea of organizational work.
- speaker: Respondent
  text: Very ineffectual. Now, from time to time, they had projects, mostly made possible by some special grants. I think
    that the General Education Board in those days was making some grants. There was a man, Mr. N.C. Newbold, who was State
    Director of Negro Education. In those days, there was complete segregation and very little money appropriated for Negro
    schools and in fact, the high schools being almost non-existent for Negroes. It was a bit unusual to find the states getting
    worried about doing something.
- speaker: Interviewer
  text: Dr. Newbold was a very gentle person, too.
- speaker: Respondent
  text: He was very shy.
- speaker: Interviewer
  text: Extremely shy, he talked in almost a whisper.
- speaker: Respondent
  text: 'But he had a lot of sense in his heart and he was known around the country as one of the very best of the southern
    state agents for Negro education. And under his influence, since he was a kind of spokesman, you see, he was a white man,
    but he was a spokesman for the blacks. And he was the one who pushed through the legislature increased appropriations
    for Negro schools and colleges, etc. So, he gradually began to make a lot of progress in getting the appropriations improved
    for the Negro schools. Now, since he acquired a regular reputation around the country for this, he had a little standing
    with some of the foundations. And one foundation, probably the General Education Board and possibly Rosenwald and very
    possibly both of them, made little grants from time to time. Now, just to mention a few of these little things: For example,
    he had a grant to do a bibliography of the best source materials on the Negro. The idea was to get this out where librarians
    could see it and encourage them to get a basic collection on the Negro.'
- speaker: Interviewer
  text: Where did he send his kit? He prepared a kit of books . . .
- speaker: Respondent
  text: No, that's another . . .
- speaker: Interviewer
  text: Another project? Did that go to the libraries or to the public schools?
- speaker: Respondent
  text: To the libraries. That's going to be my second . . .
- speaker: Interviewer
  text: I'm sorry, I'm talking ahead.
- speaker: Respondent
  text: So, he got Dr. Edgar Thompson of Duke to collect, to assemble this bibliography and, oh, I suppose that there were
    four or five hundred entries, which I think that he based on what was in the best libraries, especially Duke and Carolina.
    And then they published this. It was a very slim little volume and I forget what it was called, but it was basically a
    bibliography of the Negro. And I suppose that it was quite useful to some of the librarians who, in those days, usually
    had very little on this subject. And especially for the Negro libraries themselves. So, that was useful. Then, another
    thing, he had a little grant . . . he and I got up this notion of a small traveling library which could be circulated
    to various schools, white and black. So, I chose the books. I suppose there were about twenty of them. They made a shelf
    about this long, and of course, his grant paid for the books and for the freight and so forth, and I got some students
    over at A&T College woodwork shop to make a nice little case . . .
- speaker: Interviewer
  text: A beautiful case.
- speaker: Respondent
  text: . . . a beautiful case of various types of woods, all nicely matched and waxed and varnished. It was like a moveable
    shelf with a handle on top. And then they built a little case with a lock on it for the traveling. You could just set
    them in this thing, close it, lock it up and it was ready to be shipped. Well, I did correspondence with a lot of schools
    and wound up with a list of those who wanted to use it. It was free, you see. They just told when they wanted it and we
    would ship it and then we would put the key to the lock in an envelope and give them the name of the next recipient. And
    supposedly, they put this where people could use the books, and put them back in and they would forward it to the next
    place. Well, this thing circulated quite a bit. I don't remember how many schools, maybe not more than ten or fifteen
    at all, and we lost very few of the books. I thought that we would lose a great many, but not many. And then, there was
    one other little project that he had a grant for, and that was to encourage meetings and contacts between white and black
    college students. And he called this the Division of Cooperation in Education in Race Relations. In addition to being
    a project of the North Carolina Commission, I think that it was also something of a project in his official office as
    state director . . .
- speaker: Interviewer
  text: He also got the cooperation of the religious groups, the YMCA, the YWCA and the Wesley Foundation and the Newman Foundation
    and then the MYF, the high school program. And this project went on for years. I remember going to Duke after we came
    back from working on the Myrdal study, and speaking on the impact of the war on the Negro. And students from A&T in Greensboro,
    from North Carolina Central and Duke and Carolina and Meredith came for this little meeting on the campus at Duke. So,
    this was a part of the continuation of this.
- speaker: Respondent
  text: Each school would select its students and Dr. Newbold's money, you see, paid for travel out of this and usually the
    host university or college would provide a little lunch, and so they would have a program. Some students would talk about
    what was going on on their campuses and then, usually, there was someone, some older person from the Commission or wherever,
    who would have something to say. And this had the effect of bringing together a lot of students from both races who might
    never have had any contact with each other otherwise. Let's see, can you think of any other projects, Guion?
- speaker: Interviewer
  text: No, I don't.
- speaker: Respondent
  text: These were the main ones, I guess. And if it hadn't been for these special things, there wouldn't have been much to
    show except for the annual meeting and an occasional district or regional meeting that would be set up.
- speaker: Interviewer
  text: What actually went on in the annual meetings? Were there meetings in between the annual meetings, or was that the
    only time that the official members actually got together?
- speaker: Respondent
  text: Unless they would set up a special regional meeting. I remember that some people would say, "Well, it's so hard .
    . . down at the coastal region, you don't expect many of these people to get to Raleigh or Greensboro or Durham, so why
    don't we set up a meeting at Greensville or somewhere like that." And there were one or two of that sort and maybe a few
    in the west.
- speaker: Interviewer
  text: How many active members were there, people who actually took an interest and worked in some way?
- speaker: Respondent
  text: Well, if it came down to that, I don't know whether you could count more than a hundred, I doubt it.
- speaker: Interviewer
  text: I doubt it.
- speaker: Respondent
  text: Sometimes at the annual meetings, especially when they were having it in Raleigh and having an evening session in
    the House, then . . .
- speaker: Interviewer
  text: Yes, and the governor would speak and then you would get a larger attendance.
- speaker: Respondent
  text: Then you might have several hundred.
- speaker: Interviewer
  text: More whites than blacks, on those occasions. But when the governor wasn't speaking and no big out-of-state speaker
    was present, then there would be more blacks than whites. And the meeting would degenerate into testimonials about discrimination,
    and this was led chiefly by the Negroes. I remember Mr. Belton especially, from . . . was it Elizabeth City?
- speaker: Respondent
  text: I'm not sure, somewhere like that.
- speaker: Interviewer
  text: I think that it was Elizabeth City.
- speaker: Interviewer
  text: Now, are these the annual meetings that you are talking about?
- speaker: Respondent
  text: These are the annual meetings.
- speaker: Respondent
  text: There would be open discussion, usually some sort of a program, somebody would speak. And of course, when they had
    the secretary, Mr. Reynolds, we . . . well, we did have Cyrus Johnson and . . .
- speaker: Respondent
  text: Well, when we had a secretary, he would make a report, of course, on his activities.
- speaker: Interviewer
  text: What was Reynolds' first name?
- speaker: Respondent
  text: L.R. I never knew what it really was. He never signed his name in any way or called himself anything but "L.R. Reynolds."
- speaker: Interviewer
  text: Was there a separate women's committee?
- speaker: Respondent
  text: No, the women were involved in it and . . .
- speaker: Interviewer
  text: But they were a minority.
- speaker: Respondent
  text: Yes, that's true. We had people like Charlotte Hawkins Brown who were pretty active.
- speaker: Interviewer
  text: What were the proportions?
- speaker: Respondent
  text: Well, I don't know, probably in the general membership, I think they would be fairly high. Probably still a minority,
    maybe forty or . . .
- speaker: Interviewer
  text: Well, Mr. and Mrs. Gurney Hood, for example . . .
- speaker: Respondent
  text: But in office holding or committee chairmen or anything like that, I don't think they . . .
- speaker: Interviewer
  text: No, they weren't. It was a male dominated organization.
- speaker: Interviewer
  text: Gurney Hood?
- speaker: Respondent
  text: Yes. He was Commissioner of Banking. And Mrs. Hood was president of the Women's Society of Christian Service of the
    Methodist Church. You see here again, the Methodist Church . . . all through the South, women took an active role and
    they were usually members of the Women's Society of Christian Service of the Methodist Church, because th
