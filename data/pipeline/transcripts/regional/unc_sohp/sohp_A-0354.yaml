collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Maybe a good place for us to begin would be for you to give me a little historical background on your family, and
    how it is that it turned out, in 1946, that a 33 year old, white guy from the deepest section of the South should end
    up writing a book like Southern Exposure. I mean, where'd you come from? What's your background?
- speaker: Respondent
  text: '[Laughter.] I hate to tell you. [Laughter.]'
- speaker: Interviewer
  text: No, I want to hear you. I'm really curious about it.
- speaker: Respondent
  text: I hate to tell you that I've already done to the tune of hundreds of hours of taping, and a lot of it is already in
    print. So that unless you prefer to get the answer on your tape, I'm able to put in your hands transcripts of other people's
    tapes that went on for hours and hours.
- speaker: Interviewer
  text: That'd cover a lot of that.
- speaker: Respondent
  text: They didn't miss a whole lot, except, of course, no end to it, no beginning and no end. None of the other people,
    Peggy Bulger for example, who will be here day after tomorrow, is doing her doctorate at Pennsylvania on the working title
    of Stetson Kennedy, Folklore in the Service of Human Rights. She's done hundreds of hours of taping, but again, with the
    focus on folklore and my use of it. She interviewed Myles Horton just before he passed, and Virginia Durr, and some other
    people. But it seems to be that there's an important story to tell in terms of some of the personalities who were sort
    of the force majeure [major force] in each case in the whole scene of, I call it, softening up the South for righteousness,
    the '30s and '40s, which, really, we were looking for chinks in the wall, and doing what we could to widen them, and raising
    standards, and clearing air, in the hope that someday it would be possible to hit the streets.
- speaker: Interviewer
  text: But why, though?
- speaker: Interviewer
  text: Yeah, why were you thinking in those terms when you were just a 30 year old man in a land full of people who didn't
    think that way?
- speaker: Respondent
  text: Well, even in high school, my classmates were saying to each other, "What got into Stet?" you know. So it happened
    early, whatever it was.
- speaker: Interviewer
  text: Do you think you know what it was?
- speaker: Respondent
  text: I think so. You know, with people asking me constantly, in retrospect, I'm aware that journalists especially want
    some magic key incident that turns you around, you know, and made a saint out of a sinner, or whatever. [Laughter]
- speaker: Interviewer
  text: Paul on the road to Damascus.
- speaker: Respondent
  text: Although there were plenty of incidents, all of my senses, all of the time, were telling me that things were rotten
    in the South, throughout the South, in the world for that matter. Not only in terms of race and apartheid, but all manner
    of injustice. I was equally concerned with all manner, and race was just one of the most gross injustices we had going.
    So that my answer, don't ask me what was wrong with me, what was wrong with the rest of the state and South and nation
    and world that was engaged in that sort of oppression of one people over another.
- speaker: Interviewer
  text: Well, not to belabor your past too much, just tell me where you were born. Just give me the basic background of your
    coming of consciousness on this issue. Where were you born?
- speaker: Respondent
  text: Jacksonville, 1916, at least one grandfather fighting for the Confederacy, mother writing papers for the United Daughters
    of the Confederacy. Family, no more, no less, racist than the norm, par for the course, southern white.
- speaker: Interviewer
  text: Middle class, upper middle class, wealthy?
- speaker: Respondent
  text: Well, farm backgrounds, but, of course, all you have to do is go back far enough and everyone was farm background,
    more or less. But my father got into [was] a retail merchant. Came from a farm in south Georgia, Statesboro, to Jacksonville.
    My mother's family was Millersville and Macon, and came to Punta Gorda, and grew up in Punta Gorda. Opened general stores,
    my grandfather did, and things of that sort. So there was that background. We're talking Depression, so that all things
    are relative. In those terms, we had like a fourteen room, southern thing with columns going up two stories and columns
    around both sides.
- speaker: Interviewer
  text: In Jacksonville?
- speaker: Respondent
  text: Yeah. But on the other hand there was a mortgage. Had a place near Asheville in the summer and a place at Jacksonville
    beach. But we had to rent them out all the rest of the time, except the few weeks that we were there.
- speaker: Interviewer
  text: Was your family religious?
- speaker: Respondent
  text: He was chairman of the board of deacons for two or three decades.
- speaker: Respondent
  text: Baptist, First Baptist, Jacksonville. And I was told that the Kennedy boys, there were eleven of them, and no girls.
- speaker: Interviewer
  text: This is your father?
- speaker: Respondent
  text: Yes. There were eleven Kennedy boys in Statesboro, Georgia, and together with their cousins, the Joneses, they built
    the first church in that county, Bullock County, Baptist Church.
- speaker: Interviewer
  text: You had ten uncles?
- speaker: Respondent
  text: Yeah, no aunts on that side of the family.
- speaker: Interviewer
  text: Did you like your father?
- speaker: Respondent
  text: They said he was too good a Christian to be in the furniture business. In those days, furniture was sold on credit,
    and young couples were coming in, holding hands, and wanting a house full of furniture, and no money and no job. Wanting
    him to set them up in life.
- speaker: Interviewer
  text: Lot of book reading go on in this house?
- speaker: Respondent
  text: And he often did. Instead of taking the furniture away from them when they were unable to pay, he would let them,
    if they had no job, ride for months. My job was collecting a dollar a week on most accounts, both black and white, so
    I got to see a lot of the South that way. What was it you asked me?
- speaker: Interviewer
  text: Did a lot of book reading go on in this house?
- speaker: Respondent
  text: We had an extensive library by southern standards, yeah.
- speaker: Interviewer
  text: Your mother?
- speaker: Respondent
  text: She was into Dickens and all of these leather bound things, including a volume of the Stetson kindred, showing that
    we're all descended from someone named Cornett Robert. I think he spelled it Studson. Landed at Situate, that's up in
    Connecticut or Massachusetts somewhere.
- speaker: Interviewer
  text: How many of you were there?
- speaker: Respondent
  text: Five. I was the oldest. I had one brother and three sisters.
- speaker: Interviewer
  text: What's happened to them?
- speaker: Respondent
  text: Well, I was already organizing for the CIL in Atlanta when he came along, that is, came of age, and he married a St.
    Petersburg debutante, and I tried to talk him into becoming a labor organizer like me. He said, "No, George, you just
    make your first million, and then you can do all the organizing you want." So he's been a real estate trust officer for
    Georgia Trust Company all his life. Of course, his children were caught up in the '60s, flower people thing, and he can't
    figure out where he went wrong.
- speaker: Interviewer
  text: Yeah. And your sisters, what about their families?
- speaker: Respondent
  text: Same sort of story.
- speaker: Interviewer
  text: Pretty much the same.
- speaker: Interviewer
  text: So you've been kind of a maverick all your life. Did you feel you were a maverick within that family structure?
- speaker: Respondent
  text: Well, I'm trying to think of some parallel. It's true that I've always felt like an alien in the land of my birth,
    so to speak, but this was in cultural terms, as well as racial or political or any of those things. But I just didn't
    like country music that much, for example. But I don't know what to say as to, when you say that someone is born into
    a system of apartheid and takes exception to it, there must be a better word than maverick.
- speaker: Interviewer
  text: Yeah. Except that's the way the system was. I mean, that is the reality.
- speaker: Respondent
  text: That was the public attitude, there's no question about that. That was the word applied, but, as I say, it's a loaded
    word. I suppose it's the fate of any one who speaks out against the prevailing injustice.
- speaker: Interviewer
  text: To be branded.
- speaker: Respondent
  text: In his own territory. That's the penalty.
- speaker: Interviewer
  text: Have you kept close ties with your brothers and sisters?
- speaker: Respondent
  text: There are articles lying on the table in there that both appeared last Sunday, the Tampa Tribune and the St. Petersburg
    Times, both referring to the fact that like forty years ago at table, one of my sisters said, "I do believe you'd rather
    be with niggers than with us." I said, "As a matter of fact, I would." And got up. They haven't communicated with me or
    me with them, really, in forty years. It's a form of internal exile which I was not the only example of that. Judge Waites
    Waring, of course, in Carolina, who rendered the first decision against the white primary, had to take his entire family
    out of the South.
- speaker: Interviewer
  text: Came back to be buried and nobody white would go to his funeral.
- speaker: Respondent
  text: Is that so, still that way, huh? I suspect my family will not be in attendance at my funeral [laughter], for what
    that's worth.
- speaker: Interviewer
  text: What kind of relationship did you keep with your mother and father until they died? I assume they're dead.
- speaker: Respondent
  text: Well, the same article I referred to mentioned the fact that when Palmetto Country, my first book, came out, it had
    just enough about the black condition for my father to say, "Good job, son, the Yankees will believe every word of it,
    and we southerners will recognize the truth when we see it." So I suppose it's typical. They were torn by a certain amount
    of pride in a member of the family publishing a book, and at the same time, concerned about family reputation because
    of the kind words I had to say about blacks. Mixed feelings, ambivalent.
- speaker: Interviewer
  text: Have you gone away for any substantial period of time to work outside this region?
- speaker: Respondent
  text: Well, born in Jacksonville in '16 and lived here until I went to Key West after dropping out of the University of
    Florida because I decided neither of us were doing the other much good. Went to Key West. I may have invented Independent
    Studies. I shipped a trunk load of books to Key West by water and then hitchhiked after them, and stayed there. Married
    a Key West girl and stayed there about five years off and on. Following that, I had several years in Atlanta, and three
    or four years in Manhattan, and then about eight years overseas, throughout Europe and North Africa. Saw most of Europe.
- speaker: Interviewer
  text: During the war?
- speaker: Respondent
  text: No, after the war.
- speaker: Interviewer
  text: In the late '40s?
- speaker: Respondent
  text: No, in 1950 I ran for the U.S. Senate here in Florida when Claude Pepper was defeated by George Smathers in the Democratic
    primary. Some friends urged me to announce as an independent, write-in candidate in the general election against Smathers.
    The NAACP's political adjunct called a state meeting and invited all of the three candidates. The other two didn't respond
    even, and I showed. They endorsed me. I campaigned on a platform of "Right Supremacy, Not White Supremacy," "Total Equality,"
    "Color Blind Candidate," thing like that. Couldn't get the Florida radio stations to broadcast my tapes, radio in those
    days. Federal communications, I appealed to them, and they finally made them play the tapes. I had the pleasure of sitting
    in Florida [laughter] gyp joints, and watching the faces when the Total Equality message came on [laughter]. It was like
    doomsday, you know. They couldn't believe they weren't drunk and hearing things. But of course, the intention was not
    to get elected but to clear the air.
- speaker: Interviewer
  text: And of course, you got tromped.
- speaker: Respondent
  text: This was under the heading of what I said earlier, what I call softening up the South for righteous. I think those
    of us who were doing that sort of thing in the '30s, '40s, and '50s hopefully made things a bit easier in the '60s when
    it began to move. Less blood.
- speaker: Interviewer
  text: In other words, your feeling would be that because this small group of people were out there doing what they did,
    that it made the in evitable clas
