source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: By way of explanation, what I'm trying to do is to write a dissertation on Charlotte politics, generally from about
    '57, the annexation of '57 to the consolidation vote. And I thought that, especially since you had been connected with
    the Observer and then had participated in the consolidation, you could introduce me a little bit to just what was going
    on. I've done some reading in the back issues of the Observer, but I'm only up to November of 1960, so, I've got a good
    deal to go through, at this point. I've done some reading about the consolidation issue. I read Dr. Schley Lyons' book
    that he wrote and I've looked through the sort of compendium book thing that Mr. Wicker put together. I thought maybe
    this afternoon, first of all, if we could get your position straight - I know that you were a newspaperman - and then
    maybe just talk generally about the Charlotte situation and then sort of specifically about consolidation.
- speaker: Respondent
  text: O.K., whatever questions you have, I'd be glad to answer. This phone is probably going to ring somewhere in the course
    of this, so can you just cut it off and pick up from there? I find it difficult to work without interruptions, frankly.
    There's no way to avoid it. Well, as I said, I went to Charlotte in 1958 with the Observer, as a reporter; and spent about
    the next two years writing about city government and perhaps more about city and county government and perhaps more about
    education than any other thing.
- speaker: Interviewer
  text: I've read a couple of sort of series things that you did about the financial problem and that sort of thing.
- speaker: Respondent
  text: Well, we did some special articles on desegregation, one in each school series…
- speaker: Interviewer
  text: In Virginia?
- speaker: Respondent
  text: Well, in Charlotte, too, that first year. And then, yes…I did, I don't know whether you've come across them or not.
    I did a series of articles, Good Lord, there must have been twenty-five or thirty of them, on growth problems. That series,
    as much as anything else, illustrates the kind of blending of activities that went on in Charlotte and the various business
    institutions in Charlotte, the Chamber of Commerce, which at that time held a position of leadership that it no longer
    holds in the community. I had been assigned by the paper to do the series. We were going through the standard kind of
    thing, some additional annexation was due. They were just getting serious about urban renewal in downtown where all those
    high-rise buildings are now.
- speaker: Interviewer
  text: Looks like New York City, almost.
- speaker: Respondent
  text: Yes, and we had just taken pictures of the mayor with the first axe on the first front porch coming down, that kind
    of stuff, the way you start all those things off. There was a lot of hope about being able not only to rebuild the city,
    but also to try to get some grasp on zoning. At that time, for example, we did not have an exclusive zoning ordinance.
    It worked, you know, each scale that you went up the ladder, you could build everything under the rule, and when you got
    to industrial zoning, you could build anything all the way back down to a private dwelling. That kind of situation. It
    never had really gone past that first round of zoning ordinances that North Carolina cities went through, most of them,
    right after World War II. That was a part of the concern. There was a good bit of concern about finances. You could project
    the city's capital needs, or the county's capital needs, particularly in the area of schools, and see that there were
    going to be some fairly serious problems if they kept sort of casually issuing bond issues.
- speaker: Interviewer
  text: There was a lot of talk about pay as you go.
- speaker: Respondent
  text: Yes. Matter of fact, I worked on one of those committees that came up with some of the ideas about pay as you go and
    for a period of about four or five years, we actually had the city of Charlotte investing more than a million dollars
    cash in capital outlay.
- speaker: Interviewer
  text: That was the Pacing Progress Committee, or something along that line?
- speaker: Respondent
  text: Uh-huh. I wrote those. Herbert M. Wayne was the chairman. He was the president of the North Carolina National Bank.
    He's dead now. If you go up on North Tryon Street, to their branch office, on the left up there just below the Golden
    Eagle South, there is a little garden, at the side of that building, which is the Herbert M. Wayne Memorial Garden. It
    was the first actual physical redoing of a piece of property in the central city. That didn't happen to be in urban renewal,
    but simply when a private business decided that, "we are going to do some small thing to make the joint look better."
    And they named it after Herbert Wayne.
- speaker: Interviewer
  text: Well, then about '60, I guess, you became the city editor of the…
- speaker: Respondent
  text: I was city editor of the Observer from '60 until '65 and did some writing, though certainly far less than I had done
    before that. And we had on the average of fifteen reporters, I spent a good deal of time working with them, supervising
    their work and trying to dig out some of these basic questions that were going along. And then I moved to the editorial
    page in '65 and that created a different kind of demand on my time, but it left me really with more freedom to get out
    in the community and work with committees and, you know, take one question and go worry it for several days rather than
    for thirty minutes, which is sort of the attention span in an average city room if you aren't being interrupted. Then,
    it was in '69 that the Charter Commission came along. And from my personal point of view, I simply saw that as an interesting
    opportunity to both sort of stop writing for a while and go out and become more of an activist in a sense of trying to
    see if it was possible to do some of the things that we had been philosophically advocating on an editorial page.
- speaker: Interviewer
  text: You had been sort of involved in it, though.
- speaker: Respondent
  text: Some of it, yes I had been involved with both of the Pacing Progress Committee things, one as I recall was in '60
    and the other was in '63. And then there was the Central Charlotte Committee, itself. And Herbert Wayne, the same fellow,
    he and I had become friends in the other group, and so I sort of got lashed into that, not as an official member, but
    as a sort of a seventh member who sat down at the end of the table and wrote it all down periodically. That was the one
    that involved the production of the scale model by A.G. Odell, Jr., the architect and just the general design for the
    central city. The proposal for the Civic Center was part of that. There was at least at one point an idea for a major
    stadium back over on the west side, just about where Fourth Street runs into Interstate 77 now, in that flat over there
    by the creek, and that kind of thing. But that first for revitalizing the central city, I think was a very practical set
    of ideas. But apparently, it was about four or five years ahead of the city. They wanted to take out the railroad tracks
    that run behind the Civic Center, for example. That track had to stay there because of a long series of negotiations with
    the Southern Railroad, and it finally occurred to Southern that they owned some of the most valuable property in downtown
    Charlotte. It had been sitting there, well, its most profitable use had been as a parking lot for years and years. That
    kind of thing. Now, some of that property has got, you know, twenty and thirty story buildings on it. But all of that
    was a part of the thing. We took the first vote in '66, I have to look up some of my dates to be sure, and check my memory.
    But in '66, we took the first vote on the Civic Center and at that time, the proposal was only for, as I recall, a million
    and a half dollars to buy the land from the Urban Renewal Project, no money for the building at all. You know, just agree
    that that was the site, go ahead and get it and have the money to buy it when the title gets cleared up. That will be
    the city's promise, and then we will see if we can get private business to come in and do the rest. We lost that one,
    but in losing that one, we gained for the first time, at the polls in that city, the approval of about $5 million for
    urban renewal in bonds, an issue which had never gone to the polls before in Charlotte. So, all of the Greenville project,
    portions of the project north of East Trade Street, on which that terrible housing project was built and a small project
    on South Boulevard where the new high-rise public housing for the elderly is located, down by Pritchard Memorial Church,
    behind the Y. All the city's share of those were approved at the same time, so, it was not a complete loss in that sense.
    But the focal point of the central city, it didn't carry. So, it was not, as I recall, until '69 that they were able to
    go back and take another whack at the Civic Center. By that time, $10 million for the building and everything else, which
    was approved. So, you know, things do change. Apparently, people in cities do occasionally make up their minds.
- speaker: Interviewer
  text: Sometimes, it takes a while.
- speaker: Respondent
  text: I don't get upset about that myself. You sort of conclude that, you know, I don't mean to liken voters to children,
    I leave that to Mr. Nixon, but you sort of are left with an impression that they didn't quite hear you the first time.
    You sort of feel like maybe you needed to go back and state the question a little bit clearer, sort of like speaking a
    second time and making a point. There's a feeling of that when you are involved in it. You have to have the nerve to go
    back, that's part of it, and that's the hard part to get politicians to do.
- speaker: Interviewer
  text: I'd like to go back a little bit and discuss some of sort of the contending groups or organizations that might be
    involved. I was sort of intrigued by your comment about how at that time the Chamber was the dominant organization, but
    it no longer is. I was wondering why that may be so, or what interests the Chamber now.
- speaker: Respondent
  text: In the 1950's and into the very early 1960's, it was frequently said that it was more important, in terms of civic
    accomplishment, for a leading businessman or anyone who wished to be an outstanding citizen in Charlotte, it was frequently
    said that it was more important to be president of the Chamber of Commerce than it was to be mayor. I think that in some
    ways, that was true. There is still, with a slight exception, here and there, and we could probably name them in both
    the courthouse and the city hall, elected officials in Charlotte, the members of the power structure are not elected officials
    in that town. Now, clearly, John Belk is an exception. You probably could argue that Milton Short is. But now, his lineage
    goes back to his father and the Mecklenburg Furniture Industries and, you know, they've been an old Charlotte family…
- speaker: Interviewer
  text: He's running for Congress.
- speaker: Respondent
  text: Same one, right. He's a member now, of th
