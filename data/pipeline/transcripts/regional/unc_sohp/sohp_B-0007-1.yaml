turns:
- speaker: Respondent
  text: . . . that one right over there. She was a real angel and after she went away I started pulling out the boxes, I knew
    they were here in the files and when I got to 80 boxes, I quit counting [Laughter]
- speaker: Interviewer
  text: Well, is the book based mostly on your own papers, the ones that are now on microfilm?
- speaker: Respondent
  text: No. I have papers that are in Chapel Hill, but others that still haven't been microfilmed. Papers from many people
    in all walks of life.
- speaker: Interviewer
  text: You have a whole . . .
- speaker: Respondent
  text: Like papers from people concerned about all the things I was attempting to do, Elizabeth Gilman, Niebuhr, Dorothy
    Dexter, and so forth and so on, that I saved out, because they are sort of personal.
- speaker: Interviewer
  text: Is there a collection of Fellowship of Southern Churchmen papers besides what you have, or are you . . .
- speaker: Respondent
  text: I've got them all.
- speaker: Interviewer
  text: You've got everything? Great. Well, why don't you start by telling us a little bit about your family, where you came
    from.
- speaker: Respondent
  text: Well, I was born in Martinsville, Virginia. That's in Henry County, just across the line from North Carolina. My mother
    was of Scotch-Irish ancestry, and my grandfather was the Manager of the John Daniel Plantation, which was partly in, if
    I remember correctly, in Amherst County about where Sweetbriar College is, and in Campbell County where Lynchburg is.
    And on my father's side . . . the Kesters lived in or around about Cologne in Germany. And they became Quakers, left Germany,
    went to England and struck up with William Penn, who in turn, got them to survey parts of Pennsylvania. Now the records
    say . . .
- speaker: Interviewer
  text: May I smoke?
- speaker: Respondent
  text: Please do because I am going to. Maybe I ought not to. [Laughter]
- speaker: Interviewer
  text: Well, don't let me tempt you.
- speaker: Respondent
  text: Matches? Half of them don't strike . . . There were two brothers who come to this country, Johannes, and Praetorius,
    and from all I can get, Praetorius was the stronger of the two brothers who came. And he signed the first written protest
    against slavery in America. He's well remembered by Quakers even today, and then I've seen a plaque, at least one plaque
    erected to him, in Philadelphia.
- speaker: Interviewer
  text: Did you know about that?
- speaker: Respondent
  text: Years ago. No, I didn't know a thing about it at the time.
- speaker: Interviewer
  text: When you were growing up?
- speaker: Respondent
  text: Didn't know a thing about it. My father, he had some Quakerism in him, but Mama was a Presbyterian, a Southern Presbyterian,
    and he joined the Presbyterian Church, became an elder and a Sunday School teacher in Church . . . and a member of the
    Ku Klux Klan, too. [Laughter]
- speaker: Interviewer
  text: Was he an active member of the Ku Klux Klan?
- speaker: Respondent
  text: Well, he was never a leader, but people relied on him, they had so much respect for him. He was the kind of man who
    rarely, if ever, signed a contract. He said, "My word is as good as my bond." And there are some people around like that
    today, too, who, if they give you their word, that is all that is necessary, and . . .
- speaker: Interviewer
  text: Were you aware of him going to Klan meetings, or being involved in disciplining . . .
- speaker: Respondent
  text: Yes, through my mother. My mother found the regalia.
- speaker: Interviewer
  text: Oh, she didn't know he was in the Klan?
- speaker: Respondent
  text: She found it, yes.
- speaker: Interviewer
  text: She didn't know it until she found the Klan regalia?
- speaker: Respondent
  text: Yes, and it nearly broke her heart. She didn't like any part of it, and I don't believe that Papa ever engaged in
    any violence. He had a fierce temper. [Laughter] It was his principle, he told you to do something once and that was all.
    You'd better do it. And for the survey of Pennsylvania, I don't think the two brothers did that much, some of the relatives
    say that they surveyed the whole state. Well, I just can't believe it. And they were given land. I guess that after all
    Penn had to give them land . . . in what is now Chestnut Hill near Philadelphia. And either Williams . . . Williamsburg,
    I believe or Williamstown, in Pennsylvania and my father was a merchant tailor, it had been the great tradition. Some
    say it goes back five hundred years to a merchant tailor. Do you know what a merchant tailor is?
- speaker: Respondent
  text: A merchant tailor is a man who makes men's clothes . . . has the whole cloth, and he fits them and puts the garment
    together and they come in for fittings to see that everything is all right, you know. And my father didn't want to be
    a tailor, but his father wouldn't have it any other way. The tailoring trade had been in the family for generations. My
    Father wanted to be an engineer and he had the mind for it. You go to Cologne today, or at least it was the last time
    I was in Cologne and you can see the names and they are all tailors.
- speaker: Interviewer
  text: They are all tailors?
- speaker: Respondent
  text: Yes, and my father wanted to be a mining engineer, but my grandfather said, "No, absolutely not, you're going to be
    a tailor." And he attended school. He went to what they called a Cutting School, in New York City, and became a first-rate
    tailor.
- speaker: Interviewer
  text: Did he have a shop in his home, or where . . .
- speaker: Respondent
  text: Before I was born they lived in Bristol, and Roanoke and finally Martinsville, and then he ran into financial difficulty
    and we moved to West Virginia; Beckley in Raleigh County. And I have a brother, who is retired, living in Florida, near
    Orlando, and a sister who has the old home place in Beckley, and that's it. I came along in 1904.
- speaker: Interviewer
  text: He was a tailor when you were born?
- speaker: Respondent
  text: Yes, he was a tailor, never anything but a tailor.
- speaker: Interviewer
  text: Beckley is a Mining community.
- speaker: Respondent
  text: That's right, and I caught on while . . . Mama inadvertently, I suppose, showed us the regalia as children. My mother
    was really an angelic woman, and I don't ever remember her whipping me. [Laughter] I couldn't say that about my daddy.
- speaker: Interviewer
  text: Were you rebellious?
- speaker: Respondent
  text: No. Well, I was when I went to college and on into seminary, and got into trouble.
- speaker: Interviewer
  text: You went to Lynchburg?
- speaker: Respondent
  text: I went to Lynchburg College and got an A.B.
- speaker: Interviewer
  text: To be a Preacher?
- speaker: Respondent
  text: That's right, and I got a certificate in Bible, and a certificate in Greek, which means you had four years of it.
    And we had some good teachers, good teachers.
- speaker: Interviewer
  text: How did you become a pacifist?
- speaker: Respondent
  text: Well, I suppose in 1923 there were about 15 boys who were selected through the YMCA, the World Student Christian Federation,
    to visit the war-torn countries of Europe, and the idea being that when we came back, we would raise money and clothes
    and get books, and this that and the other, for the European students. And David Porter, who was the National Secretary
    of the Student YMCA made a visit to the College (we were having a student meeting or something) and he asked me if I would
    be the Regional Director of the European Student Relief here in the South. And I was going to school and carrying a pretty
    heavy load, but I didn't feel like I could turn it down. So I didn't, I took it, got paid for it. [Laughter]
- speaker: Interviewer
  text: That helps.
- speaker: Respondent
  text: Yes, it helps, you bet it does. They offered me a lot more than I would take 'cause I didn't feel like I could be
    honest about it, you know, and I got a telephone and a secretary, and did a lot of traveling. And the amazing thing is
    that I asked the, had the temerity to ask the Dean if I could make a two month trip through southern colleges, Negro and
    white, telling the story about what I had seen in Europe. And we were, in several instances, the guests of governments
    . . . of France, for example. Entertained, for example, in Verdun, and the same man who took Woodrow Wilson over the battlefield,
    took us over the battlefields. I don't know, I saw the hellishness of war, and I decided I didn't want anything to do
    with it.
- speaker: Interviewer
  text: The other people, the other 23 students who travelled with you, did any of them go on to become pacifists?
- speaker: Respondent
  text: I don't know, I don't know who was that foolish.
- speaker: Interviewer
  text: So you wanted to go on a two months speaking tour?
- speaker: Interviewer
  text: What made you think of going to Negro colleges as well as white colleges?
- speaker: Respondent
  text: Well, Channing Tobias, did you know him?
- speaker: Respondent
  text: Channing Tobias and William Craner asked me if I would visit Negro colleges. They said, "You won't get much money,
    or anything else, but the Negro students ought not to be left out." So it made no difference to me. I went to the white
    colleges, where I did get money, and girls brought out fur coats, dresses and everything you could think of and gave them
    to me, and I would ship them to New York, and off they'd go to Europe, I hope.
- speaker: Interviewer
  text: Were you aware at that time of the Interracial Commission? The formation of the . . .
- speaker: Respondent
  text: I knew Alexander well.
- speaker: Interviewer
  text: Did you know him that early, in 1923?
- speaker: Respondent
  text: Dr. Will used to live right over there.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: That's right. He used to live right over there, and I knew . . . I can't be certain when it was, but I don't think
    I really knew Dr. Will well until I was at Vanderbilt, and he's an old Vanderbilt man and the Dean, Dean Brown, would
    invite him up each year to speak to us, and I got to know him fairly well. He laughed at my socialism. [laughter] He thought
    I was an absolute nut.
- speaker: Interviewer
  text: I bet. So the Dean of Lynchburg College was willing to let you take two months off from school?
- speaker: Respondent
  text: That's right, and he said "Get your assignments, and if there are papers due, you send them in, and some of the professors
    may require special work, after you return." So I went, and only one of the professors had me to come to his house every
    afternoon at five o'clock. But I made it.
- speaker: Interviewer
  text: So you organized an interracial student group at Lynchburg College.
- speaker: Respondent
  text: I certainly did.
- speaker: Interviewer
  text: Was that . . .
- speaker: Respondent
  text: That was the first one in the South.
- speaker: Interviewer
  text: Was that a YMCA?
