collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Governor, I want to read you a quote from V. O. Key about North Carolina. You've been active in North Carolina politics
    ever since Key wrote his book. And in there he said that "It has been the vogue to be progressive. Willingness to accept
    new ideas, sense of community responsibility toward the Negro, feeling of common purpose, and relative prosperity have
    given North Carolina a more sophisticated politics than exists in most southern states. The spirit of the state has not
    tolerated strident demagoguery. The spirit that has not feared to face community needs, and to levy taxes to meet them,
    has had no place for a Huey Long. The spirit that recognizes a responsibility to citizens who long were unable to participate
    in their government does not tolerate a Talmadge. The spirit that is unchained to a social and economic hierarchy of great
    tradition and authority has no place for a Byrd machine." And my question is, does the 1956 defeat of Congressmen Chatham
    and Deane for failing to sign a Southern Manifesto, the rise of Dr. Lake to a position of some influence in deciding gubernatorial
    elections, the victory last year of Senator Helms, of Governor Wallace, and my real question is, was there a misreading
    of Key in North Carolina, or have things changed? And if so, why?
- speaker: Respondent
  text: I don't think that he misread it at the time, and I don't think that that would be too far off right now. What you've
    got to remember, I'm sure Key was aware that North Carolina wasn't all one way, any more than Virginia was all one way
    for Byrd. Though at many times it looked like Virginia was. Many times we were just a few percentage points of going in
    that direction, if you'll look back at the turn of the century particularly. And it was just by luck that Aycock, who
    ran as a white supremacist, and did certain things to make the party white supremacist, nevertheless turned around and
    became a very liberal education governor, advocating the education of the blacks. Now, he could have taken a shorter range
    view. Had he taken a shorter range view he probably would have ended up in the United States Senate. He was trying, anyhow,
    when he died, but he wouldn't have been elected, most historians think. We've always had some Alabama and South Carolina
    and Virginia here, just as they've always had some North Carolina there, if you can use those terms in that way. We've
    just been luckier, because our slight majority fell on one side, whereas their majority fell on the other. And I take
    it that the other majority somehow feeds on itself, and the more you get, the more you get. The more popular it becomes.
    And then I think that's probably what happened here. The first straight-out racist campaign that I remember was the 1950
    election. The first election I remember in detail where I watched it, took part in it, observed it, from a statewide point
    of view, although I was in high school, was the 1936 campaign, which had all seeds for this kind of campaign, and yet
    none of them sprouted. You had Hoey, the conservative old hypocrite, that was the representative of the manufacturing
    forces. If there was an establishment, it wasn't much of an establishment in North Carolina. You had Sandy Graham, the
    clever legislative likable politician. And you had the rebel from out of state, the professor from Salem College, that
    had been in one term in the legislature, Ralph McDonald, who almost beat him. If ever there was a Henry Howell type situation,
    that was it. But the race issue, in my memory, never came forth from any side. They never accused McDonald of being racist.
    McDonald never raised that issue. And that, I think, would justify what Key wrote, even under that stress and strain,
    when the establishment was assaulted by a carpetbagger in the worst kind of way. We survived those kind of tensions. Then
    our elections fell back into being pretty much within the accepted framework. That is, the North Carolinians of some distinction
    running against each other, something like this last time. You had Broughton and five other... the race issue never got
    into that. Occasionally the labor business would get into it, but that's a little bit different. Broughton-Umstead campaign
    made a big thing out of Broughton's support of organized labor. And Broughton handled it by saying he was for all citizens.
    Even so, I think we kept down some of the more violent differences, just by the nature of the people. Then Frank Graham
    was appointed, and that was the turning point, just as it had been the turning point in the thirties to help Key write
    this. I think you'd have to... I think you'll find that the influence of Frank Graham and the University of North Carolina
    had a whole lot to do with shaping the leadership of North Carolina. Now, not many people would admit that, and not many,
    maybe, would observe it. But I think it's true. You can just look at the leadership... you can look at the legislative
    leadership, you can look at the governors. It was the University of North Carolina and the Edward Keter Graham tradition
    which Frank Graham picked up. Edward Keter Graham was his uncle, whose life was cut short by the flu epidemic of the World
    War One era. But he set the tone for the new University. Of course, the old University was... put out all the substantial
    leaders, too. Morrison, Kitchin, and every governor, I suppose, from the turn of the century on, was from Chapel Hill.
    And Chapel Hill, even before World War One, was the beacon of light in the South. So, I think a great deal of that. And
    then Frank Graham's picking up the liberal causes, making them less unpopular, or at least giving hope to those who otherwise
    might not have come close to some of those issues. So I think Frank Graham had a lot to do with it. Now, Frank Graham
    was named to the Senate, and it scared a lot of people, a lot of his friends. Now, how are we going to win? Well, interestingly
    enough, the Tom Pearsalls, the Battles, the Coxes in Asheville, just look around the state... all the substantial people
    that had been leaders in the legislature and leaders in politics supported Frank Graham. And he got 49.2% or 48.7 or something
    like that. And the spoiler was Robert Reynolds. So into the second primary they went, Willis Smith, virtual unknown...
    president of the American Bar Association, but that doesn't cut much ice in eastern North Carolina... legislator two or
    three terms. Kerr Scott had appointed him to some kind of state committee. He was more on Kerr Scott's side than the old
    establishment side. But they talked him into running against Frank Graham. At that time he was chairman of the board of
    Duke, incidentally. In his first speech, he talked about the socialist/communist influence. I think he made the speech
    in Elizabeth City. And talked about the Anglo-Saxon heritage. Well, that's... you know, if you were a little bit worried
    anyhow, both of those rather innocuous phrases would cause you to wonder and worry slightly as to just what he's up to...
    But he wasn't up to much. They played those issues slightly, they played more the "pinko" issue than the racist issue
    in the first primary. But all of these things could be credited back to Frank Graham's very liberal attitudes on labor
    and on race. And on everything else that amounted to anything. In the second primary, just all the fury and the hatred
    broke loose. Jesse Helms now disclaims any part in that, but he and a young lawyer named Daniel, or Daniels, from Wake
    County... I don't know what ever's happened to him... led the way of making this the race issue. Then it got to the nastiest
    campaign we'd ever had. That was the same time Nixon was running against Helen Gahagan Douglas and Senator McCarthy's
    man was running against Willard Tydings... forgotten that man's name. Those three campaigns were just the ugliest in the
    whole nation. And that was when people said, "You know, this race issue is powerful medicine." And it did win. It had
    just swept this state like a prairie fire. If I had the energy and the time and the... a little bit of resources to do
    it, I would have done something like you're doing around the state now, just to pick it up while it was still fresh. Because
    I think today that it's unbelievable that passions ran so hot, and it's... it was the... it was the lesson to those who
    would heed it, that the race issue is a terrible weapon and can be used with overwhelming effectiveness. Simply because
    there was no reason for Willis Smith to beat Frank Graham. I happen to say and think that Willis Smith was hardly involved
    in it. That it swept him up just as it swept up everybody else. I always thought he was a very decent kind of a person,
    but still the people around him saw this as winning more votes and support every day, and building up a bitterness against
    the opposition. And they used it and played it and threw more fuel on the fire, until actually, it really consumed the
    state, in that sense. Well, Willis Smith died. I always thought there had something to do with it, that he himself was
    bothered and hurt by the fact that... he had been the victim also of this kind of campaign. Now, I could be wrong, but
    I simply don't think he sat down there and plotted that out and thought it out and saw what was happening, here, under
    the pressures of the second primary. He was caught up in it. I think that's... he was quite different from Beverly Lake,
    for example, who deliberately plotted his course. Beverly Lake, parenthetically, supported Frank Graham in that election
    with, among other things, a radio speech. So Frank Graham never got back in to my election, though I was considered a
    closer associate. The reason he did, he was mad with Willis Smith, because Willis Smith had blackballed him for membership
    in the American Bar Association. And he blackballed him in the American Bar Association because he... just... he thought
    he had done something dishonest in a law case that they had been involved in. It involved a mill in Wake Forest. I know
    nothing about the details except that Beverly Lake despised Willis Smith, and Willis Smith had him be... blackballed him.
    And so he took Frank Graham out of the 1960 election by making that radio speech. Now, so... 1950 was the turning point
    in what he said. This is where we swept over to the other side and the... if I may call them this... the baser elements
    won.
- speaker: Interviewer
  text: Can I interrupt for just a minute with a question? Did that come as a great surprise to people like you, who had supported
    Graham, that there was this much force involved in the race issue? That the politics of fear, in a sense, which was at
    that time relatively new, that that was a great factor that had come... ?
- speaker: Respondent
  text: I was president of the Young Democrats and I'd gotten more involved than I should have been involved statewide. And
    I had especially gotten involved in Cumberland County, where I was new. I had been there about a year and a half, or two
    years, but I wanted to do what I could at every level. And not only did I help in the county, but I picked a precinct,
    Cumberland Mills, and learned how to work a precinct, among other things. And I knew at the end of the first primary that
    this race issue would just tear us to pieces in the second primary. We had seen enough of it, as they had seen enough
    of it. They were determined to use it, and I was just certain that it would tear us to pieces. I went down and I worked
    those... a mill village house by house. They'd voted for Willis Smith in the first primary against that communist Graham.
    In the second primary it was one of the few precincts, and probably the only mill precinct, that switched over to Graham.
    Which proves the value of close precinct organization work, I thought. Yes, I was not surprised at the second primary,
    and I was hoping against hope that we would get over fifty percent in the first primary. I was afraid of the issue. I
    kept a little notebook as I went along, about how to counteract these things, because Frank Graham was such a gentle person
    that he would not counterattack in any way. And I concluded that you had to counterattack on some other issue, and divert
    their attention from this issue. And I made a lot of notes. And when I ended up in a similar situation, the first thing
    I did was, at the beginning of the second primary, was to go to Fayetteville and get my little notebook I'd kept ten years
    earlier. And there were a lot of good points that I use. But it did turn there. The next time we had it was '54.
- speaker: Interviewer
  text: Do you recall some of those good points?
- speaker: Respondent
  text: Well, I think basically... well, I had written a lot of statements that could be used to justify being fair to people
    in an aggressive way instead of a gentle way like Frank Graham did. By that time I accused Lake of closing the public
    schools, he having made statements to that effect. I accused him of running industry away and had films and statements
    from Arkansas to prove it. I accused him of voting Republican in the last three elections. He had to take up a lot of
    time answering those things and, you know, getting off with me. He put out a leaflet saying that I'd gotten the block
    votes. This was a technique in the Graham campaign, showing the black precincts of the cities. Graham 972, Reynolds 1,
    Smith 0, and that type of thing. So he put that statement out on me, and I said that's... I got all I could get, and I'd
    have gotten them all if I could, but all you've got to do is look and see that Seawell got the black vote in Durham. He
