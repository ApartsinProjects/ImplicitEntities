collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: You attended Chapel Hill, didn't you, for college?
- speaker: Respondent
  text: Yes, I came here at the turn of the century, in the year 1900 as a student. I stayed here and graduated and I was
    always interested in writing and I went into journalism and newspaper work for a while and eventually wound up in New
    York where I stayed for quite a few years.
- speaker: Interviewer
  text: Weren't you at the London School of Economics for a while?
- speaker: Respondent
  text: No, I never went to the London School of Economics, I went to London on my own.
- speaker: Respondent
  text: I worked on an English newspaper. I was the only American on the London Daily Express.
- speaker: Interviewer
  text: Was that during the '20s?
- speaker: Respondent
  text: Yes, it was. Well, let's see, I came back from there in the fall of '25, so it must have been about 1921 that I went
    over to England on a visit and stayed there nearly five years.
- speaker: Interviewer
  text: Were you covering all sorts of things for their paper or were you . . .
- speaker: Respondent
  text: Well yes, at first, but later on when they found out that I was an American and must have a lot of good American ideas,
    they made me a kind of . . . well, an idea man for promoting the paper, boosting it and booming it and advertising and
    publicizing it in various ways. The owner of the paper was Lord Beaverbrook, who was a Canadian. He was very interested
    in American ways and all and I think that it was his influence that pushed me along. He wanted to see how it would work
    out there.
- speaker: Interviewer
  text: You were there the year that Frank Graham was at the London School of Economics, weren't you?
- speaker: Respondent
  text: Would you say that again?
- speaker: Interviewer
  text: Were you there the year that President Graham, then Professor Graham, went over to study?
- speaker: Interviewer
  text: Did you have a lot of contact with him that year?
- speaker: Respondent
  text: Yes. I saw him several times. We had some long walks and talks. That was one reason that I eventually wound up here
    in the faculty. He became convinced that there was a place for me here in the faculty and he saw to it that I was invited.
    So, I came here. This was, of course, several years after my return from England and that was just about forty years ago.
    I have been here ever since.
- speaker: Interviewer
  text: Do you remember any of the other Americans who were there that year? Lois MacDonald, who I spoke with, was there,
    do you remember her at all?
- speaker: Respondent
  text: Yes, I just remember her briefly and vaguely. I didn't make any special endeavor to meet or cultivate other Americans
    there because I wanted to see how it would be if I just subjected myself to all the phases of English life that were possible
    under the circumstances. Americans in foreign cities, I've found, tend to congregate together and really be influenced
    to avoid meeting any of the natives on that account. Well, my attitude was the opposite.
- speaker: Interviewer
  text: I understand. Now, when Frank Graham called and asked you about the trade union school at Black Mountain, that is
    something entirely different from the Southern Summer School, right?
- speaker: Respondent
  text: No. I don't remember the title, but I don't remember whether they were the same thing or not, we, in talking it over,
    just called it the trade union school or the union school, you see. It was backed by the Textile Workers Union. I don't
    think that this was the same thing as the Southern Summer School. This was more strictly labor. The Textile Workers Union
    sent the organizers there from time to time to see how we were doing.
- speaker: Interviewer
  text: Well, what was your first contact with the Southern Summer School?
- speaker: Respondent
  text: I don't remember. A lot of this, I've almost forgotten about it because it has been so long and so many things have
    happened since. Well, Mrs. McLaren . . . she was in the Southern Summer School, wasn't she?
- speaker: Interviewer
  text: She was the director, right.
- speaker: Respondent
  text: Well, I had one summer with her in Asheville. It was on the grounds of the college there. But that was a different
    thing from the textile workers school.
- speaker: Interviewer
  text: Do you remember much about Mrs. McLaren?
- speaker: Respondent
  text: Oh yes, I remember her very well.
- speaker: Interviewer
  text: What kind of a person was she, what was she like?
- speaker: Respondent
  text: Well, she was a large, gentle woman, very nice always in her manners. I would call her a typical southern matron.
    I always got along well with her and as far as I know, we were always the best of friends. Her husband was with her part
    of the time and she had two or three assistants or associates . . . we didn't get along quite so well. I mean, I didn't
    get along as well with her associates, but Mrs. McLaren was all right.
- speaker: Interviewer
  text: Do you remember any of the associates specifically?
- speaker: Respondent
  text: I can't remember their names, it has been so long. One of them was a man who became editor of the Monthly Review of
    New York. It was kind of a liberal and labor magazine.
- speaker: Interviewer
  text: The Monthly Review of New York?
- speaker: Respondent
  text: Yes, but I can't remember his name.
- speaker: Interviewer
  text: Could it have been Leo Huberman?
- speaker: Respondent
  text: Huberman, yes.
- speaker: Interviewer
  text: I had him on my list to ask you.
- speaker: Respondent
  text: Huberman, that's right.
- speaker: Interviewer
  text: He taught economics there, didn't he?
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: What was his background, or where was he from?
- speaker: Respondent
  text: I never knew very much about him. I only saw him in the lecture period when he was at the desk and lecturing for the
    benefit of the students and I just popped in to listen.
- speaker: Respondent
  text: But I never saw very much of him outside of class.
- speaker: Interviewer
  text: You said that you didn't get along with him, what was the root of . . .
- speaker: Respondent
  text: No, I didn't mean to put it quite that strongly. We just didn't have very much in common. There was no particular
    antagonism that you could put your finger on or any active dislike. We just found that we hadn't a great deal in common
    and didn't try to do anything about it. That's all.
- speaker: Interviewer
  text: Was the school set up so that outside of the formal classes you could discuss things? I mean, was there a lot of discussion
    about trade unions and economic problems?
- speaker: Respondent
  text: Oh, yes. Yes.
- speaker: Interviewer
  text: So, everyone would know each other's feelings on that.
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: I am curious to know when you were there, what the feeling was about . . . the school had been in operation for about
    ten or eleven years before. What came down as far as who had founded it and why it had been founded, what its history
    was? Do you remember anything?
- speaker: Respondent
  text: No, not much. As to the history of the thing, there wasn't very much discussion. It was more about contemporary problems
    in the labor movement and so on among the unions which took up most of the discussions.
- speaker: Interviewer
  text: I see. Do you remember Mildred Price?
- speaker: Respondent
  text: Yes, she was one of them, Mrs. McLaren's associates.
- speaker: Interviewer
  text: Do you remember anything specifically about her? She taught English, I think, didn't she?
- speaker: Respondent
  text: Yes, that is my recollection. No, I saw her, as I say, chiefly in classrooms but not much outside of that.
- speaker: Interviewer
  text: Who did you see outside, in the evenings and so on? You were fairly isolated on the campus, weren't you?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Who did you tend to talk to? [laughter]
- speaker: Respondent
  text: Well, not much of anybody. I was older than anybody else there and I had a different set of views in at least one
    respect. That is, at that time, I had just been traveling around the country with Big Bill Hayworth, the labor agitator.
    I was going to write his life and so, I traveled with him a good deal. I had a little New York apartment where he used
    to come and stay overnight when he wanted to hide, you see. So, we got along very well together and we had everything
    all arranged when he was put under indictment by the U.S. government at the beginning of the agitation about war and he
    was an anti-war man. They indicted him along with some IWW leaders and the next thing I knew, Bill was on a ship bound
    for Russia and I never saw him again.
- speaker: Interviewer
  text: So, how did this help form your view of what was going on in labor? What was your feeling after he left?
- speaker: Respondent
  text: Well, of course I felt right much let down because I wanted to use this not only as a biography but also as a history,
    there being nothing of the kind available at the time. I was all the time supposing, as I think he supposed, that after
    a visit over there in Russia, things over here would quiet down and he would return and resume where he left off.
- speaker: Interviewer
  text: Did you communicate with him by letter while he was gone?
- speaker: Respondent
  text: No, I never did. There were too many possible consequences.
- speaker: Interviewer
  text: What was the feeling among the people at the school . . . how was their view different of what was going on than yours?
- speaker: Respondent
  text: There were two schools of thought then in the labor movement. One was that what the AFL does today is going into political
    action, voting and getting out the vote and all like that. Whereas my own view and that of my better friends was that
    economic action was just as needed as political. We had a fear that labor would grow stronger on its own field, that is,
    of economics, rather than just going to the polls every couple of years and dropping a piece of paper in the ballot box.
- speaker: Interviewer
  text: Well, as far as political activity was concerned, it was a very confusing time in the late thirties. What did those
    associates of Mrs. McLaren like Huberman, what did Huberman want to do?
- speaker: Respondent
  text: Well, he was a political activist, as was Mildred Price. In fact, I would say that all the assistants and associates
    of Mrs. McLaren were political actionists. I didn't oppose that or argue against it, but I didn't think that it was strong
    enough.
- speaker: Interviewer
  text: You didn't think they were strong enough?
- speaker: Respondent
  text: I didn't think that political action was strong enough. I didn't think that it would get the results in a way that
    strong economic action would.
- speaker: Interviewer
  text: When you say strong economic action, do you mean programs like the New Deal programs that had been instituted?
- speaker: Respondent
  text: No, that's political. The New Deal was all political. Economic action implies something different from voting, you
    see. Voting doesn't necessarily come into it at all. That is, voting for the usual array of candidates that were all picked
    at a distance and unknown to you personally. What was called direct action at the time was . . . well, it might imply
    a strike or it might imply taking some . . . well, for instance, during that Lawrence strike at Lawrence, Massachusetts,
    which was one of the few that Haywood controlled or bossed at the time. He got the children sent away,
