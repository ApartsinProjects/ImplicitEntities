turns:
- speaker: Respondent
  text: Impossible is not the word I would use for it, but what I would say is when you put a team together, you use the expertise
    of each individual on the team, and you need to pull what their expertise is to the table, to bring it out. Jim Collins,
    who wrote Good to Great, an analysis of Fortune 500 companies leadership and excellence, talks about that, and I'm a firm
    believer.
- speaker: Respondent
  text: 'I''m a consensus builder, and for the people who were on my team and who I work for, I bring out and find the best
    in what they do. If it is problematic that I can avoid their limiting factors, whether their temperament or their personality,
    I''m probably not going to change that. But what I look for in each individual is what they can bring to the team in a
    positive way. A mission in the United States military, or any organization for that matter, is all about figuring out
    how to get the mission done. Nobody, whatever the mission is in our case a medical mission, is necessarily the best person
    to lead that mission because of their innate skill set, and that includes me. My innate skill set is not that of a surgeon,
    but what I bring to the table is the ability, I think, to pull the best from the people who were on the team so that you
    get the Jim Collins thing: the right people on the bus at the right time in the right position, and then let them do what
    they''re good at, or reshuffle the deck just enough so that you get a synergism.'
- speaker: Respondent
  text: We can't predict what the next disaster is going to be, where it's going to be, and what our challenges will be, but
    what you need to do is to get the best people on your team, and then figure out a way to work with them to pull out their
    best skill sets. That's the way teams succeed, whether it's a sports team or whether it's a corporate team.
- speaker: Respondent
  text: In the military it's a little different because on the operational side you may have to order people to go into battle
    who may lose their life. A military commander may have to make those calls knowing that a proportion of the people that
    he directs into combat won't come back.
- speaker: Respondent
  text: Thank goodness, for a medical mission, I don't necessarily have responsibility to that great of an extent most of
    the time, so it's not one of the things that I focus on. Rather, I focus on pulling in the skill sets of the people that
    I have for the greatest benefit. As in missions that I've had in other circumstances, I'm always looking at the people
    and what is their they bring to the team. And it doesn't matter if it's the lowest person; what do they bring to the team?
- speaker: Respondent
  text: I think there's a group of people who are lumpers and another group of people who are splitters. I didn't come up
    with this, but one of my mentors did. Lumpers are people who figure out a way to consolidate what's good around them and
    bring them together to accomplish the mission. Splitters are people who may be smarter, may have much bigger egos, who
    find ways to divide and. From my viewpoint I'm a lumper. Whenever I start a mission I want to make sure that I epitomize
    that to the people that work around me. I think you always have to be aware of people who are in it specifically for themselves;
    that's a human trait you have to be aware of.
- speaker: Interviewer
  text: I want to take you back before the Haiti mission to when you were selected to be the skipper.
- speaker: Interviewer
  text: Two years ago.
- speaker: Interviewer
  text: You had taken part in Continuing Promise, so you had some experience with the Comfort.
- speaker: Respondent
  text: While I was the commanding officer, that's correct.
- speaker: Interviewer
  text: So you were familiar with the fact that these ships are not being used for their intended purpose when they were built
    to support the Cold War, but now for humanitarian assistance. When you heard about the earthquake, how did you hear that
    this ship was going to Haiti?
- speaker: Respondent
  text: I was driving home to Annapolis and the Haiti earthquake was on the radio. I said to myself, "This is absolutely going
    to be something that the American government is going to want to get involved with." Although the initial numbers were
    very low, as the news came on at 5:30 in the afternoon and they talked about a 7.0 earthquake, I knew that we would have
    a national response to it. But my thought was that the ship wasn't ready to go. I also knew the USNS Mercy had just ventured
    up to San Francisco having an overhaul done, so they were out of pocket as well. My first reaction was maybe a gray hull
    U.S. Navy warship would go out of Norfolk. But I got a phone call from Tom Neegus, who was the commodore on our last mission
    Continuing Promise 2010. He said, "J.J., it looks like I'm going down there. We're spinning up the ARG out of Norfolk
    and possibly could be going down there. I sure would like to have you with me." I mean, this was in the first two hours.
- speaker: Respondent
  text: I said, "Well, I don't know. Our ship is down and I don't know if we could spin up, but we'll keep in touch. Good
    luck." When I got home and turned on CNN the reports were fairly sketchy. I don't know if they had anybody on the ground
    in Haiti at that moment, but the magnitude of the disaster began to kick in. Because I'd been involved with other tragedies
    and knowing how numbers are, you know that the first set of numbers they give you are almost always underestimated. I'm
    sitting there with my wife going, "I really think we might get called on this."
- speaker: Respondent
  text: She said, "Well, they've got other ships; you just came back."
- speaker: Respondent
  text: And I said, "No, I think we might get called." After seeing the news and staying up until about 11:00 that night trying
    to get as much information as I could, I decided that we were probably going to get called, and began to think of who
    I needed to contact. This was late at night. I don't know if I'd talked to the XO that night. We may have had a phone
    conversation, but we were all aware that within that first twelve hours that we were going to be going. So I got a good
    night's sleep.
- speaker: Respondent
  text: Coming to work the next morning, I thought to myself, "Who would I need to execute the mission?" I knew that the normal
    process of getting the ship underway and ready to go would all be taken care of; we'd done it for Georgia. Remember the
    Georgia mission? We'd already gone through the planning for that HCA Humanitarian and Civic Assistance mission, so I knew
    the processes that needed to go on, and I knew that the staff could probably execute those if we got the call. I knew
    that my morning was going to be filled with providing data to higher authority on where the ship was, which is what we
    always do, the MSC Military Sealift Command and ourselves.
- speaker: Respondent
  text: There was a group of people that I wanted to make sure were taken care of who might serve a purpose, and that was
    the NGOs. I knew that NGOs would be a part of this, but I didn't know how. I also wanted to make sure if we got the call
    that USAID, which is the State Department component for health care although it doesn't belong directly to the State Department,
    would be engaged. So when I got to work that morning I called up three civilians who had been on prior missions and had
    MOUs.
- speaker: Respondent
  text: One was a retired captain, Claire Pagliara, who ran the medical operations for the CP7 mission sadly, her husband
    was killed in a motorcycle accident about three weeks ago. I kept a Rolodex of people that I knew, people that I wanted
    on my team, and I called her up out of the blue. "Claire, this is Captain Jim Ware. Are you watching the news?"
- speaker: Respondent
  text: She said, "Yes."
- speaker: Respondent
  text: '"What do you think about us going to Haiti? I don''t know that we''re going to go, but if we do go down there, if
    you would come as an NGO coordinator it would be incredible."'
- speaker: Respondent
  text: I'm way out of the box here; I've "put myself on report" -- the fact of the matter is I needed somebody to coordinate
    NGO activities. She was a Navy officer with NGO experience who had an MOU because she had worked with Project HOPE although
    she wasn't working with Project HOPE at the time, nor had she intended to. But I needed somebody to coordinate that, because
    I knew that we could have hundreds of NGO civilians on board, and the most difficult thing on my last mission before this
    was the coordination piece, which fell to the DFA. I knew that if we were rapidly going to go from 50 to 1,000 people
    that I needed a coordinator, so I called her up.
- speaker: Respondent
  text: I also called up another guy, Marty I can't remember his last name. He was another guy I had in my Rolodex. He had
    been an administrator for Operation Smile on the Mercy when I was on board, and was a humanitarian. There's a difference
    between people who were just good Americans and humanitarians; everybody can't be a humanitarian; there's something in
    their heart. I saw this not only in Claire, but I saw this is Marty on the Mercy mission almost two years ago. I hadn't
    talked to the man since that time, but I knew he was a good administrator and could help with these NGOs to do the administrative
    piece for Claire if we took on NGOs. I called him out of the blue he works for the FAA, I think. "Marty, if we get NGOs,
    I'd like you to be part of the mission to help coordinate their administrative issues, such as their flights and other
    things."
- speaker: Respondent
  text: The third person I called was Suzette Steins. She's a dentist in private practice in a little town in North Carolina
    who had been on a mission with us. She's a Haitian American who spoke Creole. I called her. "Suzette, this is Captain
    Jim Ware calling from the Comfort."
- speaker: Respondent
  text: She said, "My God, Captain Ware, how are you?"
- speaker: Respondent
  text: I said, "One of the most important things we need on the mission are translators. I need somebody that can coordinate
    those people, but I don't know where I'm going to get them from. I don't know if from Food for the Poor, which was our
    last translator group, or the American Red Cross, but I need somebody who can help coordinate the translators. I don't
    know how we're going to do this, but I might need your help. Would you stand up and answer your country's call for you?"
- speaker: Respondent
  text: She says, "I don't know, but if I can, I will." She ultimately ended up saying that she would.
- speaker: Respondent
  text: Now, none of these people were sanctioned to come on the mission, but they came. I probably broke the rules in a sense,
    but I knew that they would be valuable and I knew that we take civilians on board on a lot of these missions, so I was
    just trying to lean forward and figure out the best thing to do to get them on board.
- speaker: Respondent
  text: The other person I called was the USAID person at Southern Command. I said, "I've got to have you involved on the
    ship. I've got to know what's going on on the ground in Haiti when we get there." My vision was to have a group of people
    on board who could orchestrate the medical mission to some degree from here. We didn't have to be the lead agent, necessarily,
    but I knew that the more coordination I had on our team, the better off we would be in getting NGO people on board, which
    ended up to be exactly the case.
- speaker: Respondent
  text: 'The USAID sent me two people: Clydette Powell, who I''d recommend that you speak with as part of the bigger picture;
    she''s a doctor for USAID. The other one was Rob Ferris, who had a huge part of the mission in Haiti. What ended up was
    I literally demanded that USAID send me somebody, because they never get involved with the military; they''re not comfortable
    working with the military. My personal view from my experience in the past is they think the military shouldn''t be part
    of these missions. I think it''s a money issue, but anyway I really wanted them to be part of us. We work for USAID when
    we go into these countries on these disaster relief operations. They''re the lead agent, and I fully understood that.
    That''s why I wanted to have somebody on board the ship who could give me counsel, who could be a liaison, could give
    me a window into what their organization looked like on the ground in Haiti so when we got there we could be most efficient.'
- speaker: Respondent
  text: 'There were five people who ended up coming to the ship: the three I mentioned and the two USAID people that I put
    in the medical operations planning cell, and they all arrived before we left Baltimore. Thank goodness we had about 76
    hours.'
- speaker: Interviewer
  text: At this point, you haven't gotten the word?
- speaker: Respondent
  text: Between 0900 and 1100 on the 13th, we'd began to push information forward up the chain of command on the status of
    the ship. We didn't have radiology; we didn't have an angiography suite; we didn't have supplies. The water in the aft
    of the ship was down, so none of the toilets worked in the aft. The steam wasn't up, so our sterilizers, which is very
    important for the steam, wasn't working. The electricity had been up and down, so the IT suites, which we had been changing
    over from a legacy software program that was not fleet serviceable to a fleet serviceable program called Compose, had
    been transposed to the ship, but wasn't up and running to the extent needed for a full-time operation. So from 9:00 to
    11:00 in the morning on the 13th, it didn't look like we were going to get underway. I think most of us realized that
    this was an opportunity for us to do a good job.
- speaker: Respondent
  text: I was leaning way forward. I was crossing every boundary I could cross to ensure that if we were going to get underway
    that I would have the resources we needed.
- speaker: Respondent
  text: 'At 1100 the MSC Military Sealift Command sent a message up the chain of command on the status of the ship. It was
    a red light, yellow light, green light type of report, and the medical piece was all yellow. The bottom line was that
    nothing was an absolute show stopper for the fleet, but we were not ready to go. Since the 13th of November, we had been
    under the same conditions: the electricity up and down; IT up and down; steam up and down. Although they plan on a 30-day
    period of time for repairs, things happen with contractors -- and guess what? They don''t want to pay them over holiday
    periods, because they don''t work as much, so things seemed to go from the 30-day cycle to a 45-day cycle. We went through
    the Christmas holidays and things were very slow.'
- speaker: Respondent
  text: Coming into the new year, things started to get ramped up. We were very close to being ready, and that's why we ended
