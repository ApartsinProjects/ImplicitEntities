turns:
- speaker: Respondent
  text: Hans Christian Anderson said, "Let's begin at the beginning." The beginning begins with my great grandmother who was
    born in Vincennes in 177... in Ft. Sakville rather, in 1775. She was Francoise Conoyer, daughter of French immigrants
    and was being prepared after her birth to go to Detroit to be educated. My great great grandfather was born in Troy, New
    York, of Dutch parentage and belonging to the Episcopal Church, the Church of England. He was a Captain in the Forest
    Rangers at the age of eighteen in New York Colony, New Amsterdam. When the Revolution was approaching and the Continental
    Army was being formed, he joined. Later he was captain in the Continental Army and met with Washington when he disbanded
    his army and called all his officers together. These officers formed the Society of the Cincinnati named after the great
    Roman general, who when he was retired after the Carthagenian War, said that he would rather go home and be a farmer and
    turn his swords into plowshares. They named the society the Society of the Cincinnati and every officer gave of his own
    private income the equivalent of a month's salary which became the first pension fund in the United States. John Jay who
    was Chief Justice under George Washington, President George Washington, appointed my great grandfather to be the first
    circuit judge of the Northwest Territory. He came west on horseback over the mountains and held court once a year in Vincennes,
    in Kaskaskia, Illinois, which is now extinct, and Detroit. He rode the marshes and the country with just one body servant
    and never was attacked by the Indians. When he got to Vincennes and saw this little French girl he fell desperately in
    love with her and in 1790 they were married. My great grandmother could neither write nor read but great grandfather taught
    her both and taught her sufficient law to be able to settle neighborhood disputes while he was away holding court. As
    their children grew they lived on a five acre tract outside of the fort which the government had ceded or granted to great
    grandfather. It is now a part of Burnett Heights. One day great grandfather was away from home holding court and the Indians
    were on the warpath, and the path took them right past where my great grandmother and her children were housed and the
    old brave started to climb in. He was going after their scalps. Great grandmother picked up the axe and chopped off his
    hand. It enraged and hurt him so that he fell back among his braves and that gave the soldiers a chance to come up and
    protect the family. Otherwise, I wouldn't be sitting here talking to you today. They had ten children and none of the
    boys ever left any heirs or died natural deaths. Washington Irving in his "Bonneville" stories tells the story of one
    of the sons who was in the Indian fur trade under Astor and he was chased and treed by the Indians on one of his expeditions.
    He fell down inside the tree and how they happened to know what became of him... later they found his notebook and the
    brass buttons from his uniform. So you see coming on down, their youngest daughter was Frances Sidney Vandiver and she
    married Joseph Somes, S-O-M-E-S, who had been born in Wallingford, England, and came to Vincennes in 1828 to teach medicine
    at the University of Vincennes. He was a doctor. He doctored all of the Gimbles. The first family of Gimbles lived on
    a lot right back of my grandmother's and grandfather's house and all of their children were of corresponding age so that
    I've always... The Gimbles! first store was in Vincennes. Grandfather Somes after he gave up teaching became a practicing
    physician there and lived in Vincennes for a great many years. They had ten children. My Uncle Harry was the oldest one
    and my father was the youngest one. My father was James Ellis Somes who had the appointment for Annapolis and his mother
    wept and he gave it up, went to Vincennes University and graduated as an apothecary. He later was appointed analyst of
    drugs at the Port of New Orleans right after... shortly after the Civil War. My father was born in 1848. He married Mary
    Oliver of Hopkinsville, Kentucky in 1875 and I was the younger of two daughters born to them. My older sister died when
    I was a little girl so I have always felt that I was the only child and that I have just grown up with Terre Haute. I
    can remember one amusing little anecdote. An aunt of mine was unmarried and she lived with father and mother and in those
    days they had great parties here at the Prairie House which was the Terre Haute House and one fall she went to a party
    and went home after the dance and threw her dress on the foot of the bed. Something crossed her nose. She threw it to
    one side and when she got up in the morning there was a dead mouse on the bed. So you see my memory goes back along ways
    in the civilization and the culture and comfort of Terre Haute. After I grew up I married Ray Greene Jenckes who was the
    youngest son of the Jenckes family that had come to Indiana in 1816 and had bought a great deal of land and many acres
    around the county here and in the adjoining county, among them the site of the present Highland Lawn Cemetery where my
    husband and daughter are buried within fifty feet of the spot where he was born. The Jenckes were old New England people.
    Mr. Jenckes' grandfather or great grandfather was colonial Governor of Rhode Island appointed by King George III and in
    1730 he signed a paper appointing one William Greene to be a justice of the peace and all the duties that went with it.
    William Greene became my husband's great grandfather when his father and mother were married at the home of Henry Clay.
    General Nathaniel Greene of Revolutionary fame was a son of that union. I mean the Governor and his wife. The old Greene
    Homestead in East Greenwich, Rhode Island, is now the home of the Historical Society of Rhode Island. Mr. Jenckes was
    the first miller of corn, commercial miller of corn in the United States. None of my family were particularly interested...
    they were interested in good government but not in participating and bringing it about. But after Mr. Jenckes and I were
    married and his death I was interested more in flood control and repeal of prohibition because I knew the un-economic
    side of both. Prior to 1918 when prohibition became the law of the land, a little better than eighty-eight thousand bushels
    of corn were used in Terre Haute on the river bank every twenty-four hours and anyone knows that that's a big loss to
    the farmer. And, of course, we had a good deal of farmland and I saw corn go from $1.40 a bushel down to $.10 a bushel
    and when it was .10 a bushel I was paying .05 to have it hauled to town after having paid .06 to have it harvested.
- speaker: Interviewer
  text: I think it would be interesting to know what your schooling was and what....
- speaker: Respondent
  text: I went to... I was the youngest pupil that ever entered at the time, ever entered Wiley High School. I entered Wiley
    High School when I was eleven years old. And I went there until September... I would have graduated in February but I
    stopped and went down to Coates College. I went there a couple of years and then I thought I knew enough.
- speaker: Respondent
  text: And I stopped because I was having a very grand time going to parties and things. And after all, in those days college
    educations weren't considered necessary for girls and I wanted to be a doctor. I wanted to be a professional woman and
    my family ridiculed me and everybody else did because in those days women doctors didn't have any standing and they didn't
    have a chance. So, as I said, after Mr. Jenckes and I were married I became interested... I had to become interested in
    business because I had all this farm land and I was responsible for paying the debts and paying the taxes and keeping
    things going. And you couldn't do it with the situation then. Incidentally, the Eighteenth Amendment is the Prohibition
    Amendment. The Nineteenth Amendment gave us women the right to vote. We... when the Eighteenth Amendment was presented
    to the country all of our youth was in Europe. All of our women didn't have a vote so the vote for prohibition was a very
    limited one, I mean as to the people that had the opportunity. And after all, if you had been in my position... Mr. Jenckes
    was ill for three years and I wasn't anyplace during the time prohibition was new and when I first started to see things
    I knew that it was not only an economic failure but that it was an impossible thing. And when you realize that the law
    was made for other people, not for the men who made the law, you can understand why it was a failure. And then there never
    was any penalty for buying the liquor; the penalty was all paid by the poor devil that was making the living selling it.
    (That wasn't a good one to put in there.) So then I had this farm land that was subject to overflow and while I was at
    home and my evenings were long I did queer reading for a woman at that time. I read about flood control, business, things
    of that sort. And I found that the United States Government through the Army Department, Chief of the Engineering Department,
    had the right... did own the Wabash River and that they could say what would happen to it. They were taking care of the
    Illinois River and all these rivers around and we were losing a couple of million dollars a year by floods. So I started
    out and organized the Wabash-Maumee Valley Improvement Association. I got ten thousand paid-up members when the Republicans
    decided they wanted possession of the organization and we called a meeting at the Masonic Temple here when, oh, Jim Watson,
    Charlie Greathouse, the National Committeeman of the Republican Party all came and they were fighting for the control
    of the organization.
- speaker: Interviewer
  text: This would be about what year, about what year?
- speaker: Interviewer
  text: About 1928?
- speaker: Respondent
  text: '''27. I''m sure it was ''27. Well, anyway they elected Charlie Greathouse president, Louis Stevenson, from Bloomington,
    Illinois, father of Adlai and son of the Vice-President vice-president of the organization and me, secretary-treasurer.
    Well, they didn''t know that was the job I wanted. In all river organizations the secretary-treasurer is the one that
    controls things so that was the thing I wanted. I kept still but it was one of the bitterest fights that I think I have
    ever seen witnessed politically because the Pennsylvania Railroad maintained an agent here, a man named Straus [?], their
    claim agent from Rockville, was kept here for years to fight anything that I would do to try to get navigation on the
    Wabash River. It went on. We got headquarters in the Chamber of Commerce here and the Republicans put in a chap named
    Harold Wisehart from Clinton as secretary to me and one day Mr. Wisehart disappeared with the automobile, the typewriter
    and all of the card index. He took them down to Washington to Jim Watson and, of course, that was kind of a blow. But
    nevertheless, we survived and the Army Engineers had made these surveys and the recommended that eighteen million dollars
    would cover the costs of flood control in Indiana. There were times... One year about 1927 when we had nine floods in
    fourteen months in the Wabash. And in the flood in February down in Gibson County the animals froze to death standing
    in the stalls. It went on. I kept on the fight in spite of the loss of my typewriter and automobile. Always I had furnished
    all the expense of this thing myself. I paid my own expenses. I used my car and I went through the thing without anything.
    And as I said, got a membership of ten thousand paid up members who backed me from Ft. Wayne in the northeastern corner
    down to Mt. Vernon and down in that corner.'
- speaker: Respondent
  text: The Wabash River arises in St. Mary's, Ohio, Lake St. Mary's, Ohio, and it comes down. The Maumee River flows into
    Lake Erie just opposite the opening of the Erie Canal in Pennsylvania. Now then, the idea of the Army Engineers and a
    few of us was to come up the Wabash and a fifteen mile dredged canal from the Wabash to the Maumee would carry both into
    the Maumee. The Maumee flows into Lake Erie. There'd be never any question such as the dispute as they had in Illinois
    when they were canalizing the Illinois River. When I say... Just one little digression... At that time it used to cost
    five times as much to ship a piano from New York to Chicago as it cost to ship a piano from New York to San Francisco.
    Those were the things that made our proposition... and the Army Engineers were very enthusiastic. So was President Hoover
    when he was Secretary of Commerce. He saw our plans and our blueprints. I went down to Washington to try to see Senator,
    oh, the man I mentioned a minute ago... well, I went down to see him and as I went in... he knew I was coming and as I
    went in the front door he came out the back door... or went out the back door. And he was working with the Pennsylvania
    Railroad to stop any progress or any help from the government on our Wabash. General Herbert Deakyne who was chief of
    engineers told me in his office in Washington that the Wabash River was entitled to first place for relief. It was the
    most important river in the United States at that time and that it should have taken precedence and that he had the authority
    to do anything he wanted to with it. And he was the man who authorized the survey and later helped us get the recommendation
    of the eighteen million dollars. Time went on and I didn't get much. I went to the Houston Convention that nominated Al
    Smith and presented the reclamation resolution to the resolutions committee which they accepted word for word as I read
    it to them and they promised, promised us help. Hoover promised us help. But when the Ohio River was a completed unit
    this nine foot channel and the Army Engineers chartered a boat to go from Pittsburg to Cair
