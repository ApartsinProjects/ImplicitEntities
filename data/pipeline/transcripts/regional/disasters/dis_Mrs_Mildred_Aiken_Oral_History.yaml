collection: disasters
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Where did you come from by the way?
- speaker: Respondent
  text: Indiana. A small town called Brasil, Indiana. Near Teriholden.
- speaker: Interviewer
  text: What caused you to move to California?
- speaker: Respondent
  text: My father retired and that was what we people did in those days. You retired and came to California and have chickens
    and oranges and all that sort of thing.
- speaker: Interviewer
  text: How old were you when you came?
- speaker: Interviewer
  text: Well I imagine you don't remember the Valley too well, then in 1923.
- speaker: Respondent
  text: Pretty much, yes.
- speaker: Interviewer
  text: Can you tell us a little bit about your earliest recollections. What the Valley was like. I think you said there were
    orange groves, and that sort of thing.
- speaker: Respondent
  text: Orange groves, lemon groves, which is now right in town. And Sylmar had the largest olive grove in the world. Sylmar
    was only an olive grove and it was considered the largest in the world.
- speaker: Interviewer
  text: I understand there is a family called the or named the family, who had been in that business for years. Did you know
    them?
- speaker: Respondent
  text: Oh yes, I knew them. I still do. In fact I saw one of the boys just the other day in the doctor's office.
- speaker: Interviewer
  text: I see. Can you tell us about your earliest schooling years. What sort of schools there were. Whether they
- speaker: Respondent
  text: The same school that is over here. Morningside school, I started there in kindergarten.
- speaker: Interviewer
  text: Is that right. Is it in the same building?
- speaker: Respondent
  text: The main building is still the same. The earthquake took down one building which was new when I was in the 5th grade
    I believe and it has been rebuilt but the main building is still there. Yeah.
- speaker: Interviewer
  text: Do you have any idea when that building was put up, since it has been there at least since 1923.
- speaker: Respondent
  text: No I don't. No I have no idea really. I have no idea.
- speaker: Interviewer
  text: How about the junior high and high school. Did you attend those also?
- speaker: Respondent
  text: Yes, when I went to San Fernando junior and senior high it was all in the same location, which is now the San Fernando
    junior high. And it is junior high only now. Then it was junior high and senior high. And students came from Newhall,
    Saugus, and that direction, from Sunland-Tujunga and LaCrescenta and that direction, Sepulveda and that direction and
    of course, Sun Valley, Pacoima and all that direction. They were all bused into this school.
- speaker: Interviewer
  text: I see and again we have the same building in use now that you went to junior high in.
- speaker: Respondent
  text: Well the auditorium is still there, but the administration building which was the pride and joy of the place the year
    I graduated was brand new was completely destroyed by the earthquake. And it had to be torn down. And have rebuilt considerable.
    I haven't gone over to see it. But it is looks very beautiful what they have done. So the last I know. The science building
    and the auditorium are the only buildings that are left. The rest have all been condemned.
- speaker: Interviewer
  text: I see. Were they condemned on account of the earthquake then?
- speaker: Respondent
  text: Yes. I believe so. Most of them. Now the home economics building I am not sure. But the administration building was,
    yes.
- speaker: Interviewer
  text: When we're talking about the earthquake to us that always means one particular earthquake, the one in 1971.
- speaker: Respondent
  text: Right. Absolutely. Never forget that one.
- speaker: Interviewer
  text: You say you will never forget it. Would you tell us again, you did before I turned on the tape something about your
    recollections of it. We would like to record this because I think in the future people will be very much interested in
    this Sylmar earthquake. As it's come to be called.
- speaker: Respondent
  text: San Fernando.
- speaker: Interviewer
  text: Yes. While its come to be called the Sylmar earthquake it certainly did hit a lot of other communities. San Fernando
    and even the one where I live, LaCrescenta.
- speaker: Respondent
  text: Well, San Fernando business district really took a beating. It was almost completely demolished. And we still have
    a vacant lot right in the center of town. You will notice when you drive through town.
- speaker: Interviewer
  text: Can you tell us what happened to the San Fernando Mission.
- speaker: Respondent
  text: It had damage. Now I don't know exactly how much. But it has been repaired, I understand. I haven't gone down to see
    it. Or I didn't at the time, but I understand that it did have considerable damage. Not as much as the town did, believe
    me.
- speaker: Interviewer
  text: I see, can you tell us about your house, your personal recollections of just what happened. The earthquake came about
    6:00 a.m. did it not?
- speaker: Respondent
  text: Yes and no one was up, fortunately at our house. I had four grandchildren staying the night with me. And everything
    was beautiful the next morning, other than the mess. No hysteria, they weren't upset at all. My one little grandson, although
    he has big brown eyes, as we were going down to my daughters to see how they fared, his eyes kept getting bigger and bigger
    and bigger all the way down there because we had so much destruction. The streets were torn out, the houses flattened,
    the house next door to me, the garage was completely down on the ground and I had 150' brick wall around my place, that
    was down. Many, many cracks, broken gas lines, broken water pipes, we had a in my yard down on, I didn't know at the time,
    but it was on Glenoaks. I could see flames above the trees and found out later it was the gas line that was burning and
    it was burning and it burned for considerable length of time down here and the flames were shooting very high and we had
    no water to fight it with.
- speaker: Interviewer
  text: You did not actually get any fire in your house as a result of the broken gas lines?
- speaker: Respondent
  text: No I was very fortunate. No I had a very good neighbor that came right over and turned off my gas.
- speaker: Interviewer
  text: How long was it before your water was restored?
- speaker: Respondent
  text: Seems like an eternity. I couldn't tell exactly. But we got used to bathing in a teacup practically. That sort of
    thing we would go to the water trucks, take the big plastic containers, go to the water trucks and get them filled up.
- speaker: Interviewer
  text: Can you describe what the streets looked like right after the earthquake?
- speaker: Respondent
  text: Well many of them had holes in them and many of them were up, oh maybe two or three feet in the air and it was very
    hazardous to drive, to drive anywhere you were never sure. One night, I was coming home and I was talking to some of the
    hardhats who were working. They worked 24 hours a day round and somebody came tearing down the street and he went right
    in the hole.
- speaker: Interviewer
  text: Was the street in front of your house in a condition so that you could drive over it?
- speaker: Respondent
  text: Yes, I could. It was pretty rough but it was able to ride over it and my driveway, of course, was cracked and everything,
    but I could manage the drive out. It was all torn up later and completely pulled at both ends.
- speaker: Interviewer
  text: I think you told us that you, were, hurt your feet in attempting to walk over it and then you, of all places, went
    to Olive View for first aid. Is that right?
- speaker: Respondent
  text: Right. I had never been to Olive View for first aid but my daughter and I were trying to figure what to do because
    it was still early in the morning and she said I should get my feet taken care of because I was bleeding all over the
    place and we were trying to decide where to go and somebody said how about Olive View, they have an Emergency up there,
    so we drove up to Olive View which was not the place to go that morning. It was unbelievable.
- speaker: Interviewer
  text: Can you tell us what it looked like to you when you got there?
- speaker: Respondent
  text: Well I am sure you have seen pictures of it and they don't lie. I mean they were exactly like the pictures there.
    The only thing was patients walking down the street holding each other up, helping each other. I had someone on a flat
    on his back and another patient was pushing him and I don't know exactly where they were going, but they were going away
    from the main building that had the hospital, that had really collapsed and there was a helicopter that had just landed
    when we arrived and another one was hovering and so we decided that we would get out of their way. We weren't in any position
    to help them.
- speaker: Interviewer
  text: Did the hospital look as though it had collapsed completely or were some parts of it standing?
- speaker: Respondent
  text: Oh yes, some of it was standing, the one whole section that we, it was quite amusing, there was a wheelchair hanging
    out the window or not the window but on the edge of a hall and it was just balanced there hanging and that was like there
    for, oh I don't know how long, and until they really managed to get most of the stuff out. I have pictures of that. It's
    all in books of course.
- speaker: Interviewer
  text: Is that hospital completely abandoned now or are the remains still up there or just what is its situation?
- speaker: Respondent
  text: No they blasted the remains down. They did it in two different days. It was up there one time, my granddaughter wanted
    to see it. We went up and it was really amazing, they blasted the thing and, just poof, it was down that fast and just
    a cloud of dust that huge building.
- speaker: Interviewer
  text: There's nothing there then where the hospital used to be.
- speaker: Respondent
  text: No. No. Nor at the veterans hospital. Most of those buildings are gone.
- speaker: Interviewer
  text: I see. Kathy do you have any questions about the earthquake?
- speaker: Respondent
  text: Not about the earthquake, a little later I have some questions.
- speaker: Interviewer
  text: Okay, well maybe you would like to ask them now.
- speaker: Respondent
  text: Well, what are some of your other recollections about the time that you have lived here, maybe the Valley during the
    depression.
- speaker: Respondent
  text: Well I'm ashamed to say I don't remember too much about the depression. I was one of the fortunate people that didn't
    have any problems. My lifestyle didn't change and I really couldn't say too much about it. I know people were having very
    difficult times and seeing newsreels at the theatres was about my limit to that because I really don't know too much about
    that. I know that there were very many people unemployed and actually hungry, but other than that I couldn't tell you
    because I am fortunate, I say I didn't have it first hand.
- speaker: Interviewer
  text: Did you live on a ranch here?
- speaker: Respondent
  text: No. We had When we came to town my father bought some property with one small house on it and built another house
    and then they sold that and then built another home in the middle of the three lots and they were quite deep lots. It
    was about a half acre all together and we had chickens and all kinds of berries and all kinds of flowers, fruit trees,
    walnut trees, asparagus patch, oh all kinds of things, that's what he did and he just fooled around in the yard.
- speaker: Interviewer
  text: Do you remember the time when you could look out into the Valley and look and there was nothing but land?
- speaker: Respondent
  text: Yes when, well, for quite a few years after we arrived my mother would, being an easterner, she liked canned fruit,
    peaches, apricots, we'd have special places we would go out on Sherman Way where they would grow these things and all
    of that was in chicken ranches and fruit orchards, that sort of thing. Not like it is today. We would quite often spend
    a Sunday just driving around and we would have special places where they would like to get, like apricots or peaches,
    so forth, and we would go out and buy them and bring them back and my mother would can them the following day.
- speaker: Interviewer
  text: Were there many open places in the Valley then with orchards and things and that sort of thing?
- speaker: Respondent
  text: Yes, many. I remember when they opened the tunnel on Sepulveda going over the mountain, it was the tunnel they built
    up there by the top of the hill and you would go through the mountain I don't know if it is even still there. Over Sepulveda.
- speaker: Interviewer
  text: Near Mullholland?
- speaker: Respondent
  text: I don't know exactly where the tunnel is, I don't know whether it is still there or not, since the freeways have been
    in. But I remember when it was brand new and the tunnel had just been finished. We went up there to go through it.
- speaker: Interviewer
  text: Was that in the northern part of the Valley or southern part.
- speaker: Respondent
  text: Well, that was the end of Sepulveda where it goes over the mountains into West Los Angeles.
- speaker: Interviewer
  text: I know where there is still a tunnel there now. Well, but it's at Mullholland.
- speaker: Respondent
  text: Is it at Mullholland? I don't recall, really. It was quite a tunnel. Leading up to the top.
- speaker: Interviewer
  text: It is really more than that now.
- speaker: Respondent
  text: Well yes, now but for quite a while it was quite the place.
- speaker: Interviewer
  text: This was the part of the Valley that was settled first wasn't it out here in the Northern part?
- speaker: Respondent
  text: San Fernando yes, San Fernando was where the whole valley takes its name.
- speaker: Interviewer
  text: Was there very much where Van Nuys and North Hollywood are now located when you came out?
- speaker: Respondent
  text: Well, North Hollywood was called Lankershim, and Van Nuys, well I know in high school they were our arch enemies in
    football. Oh, we had to beat Van Nuys always. And they were just little small towns, nothing spectacular.
- speaker: Interviewer
  text: Do you remember the days the P E's ran through the Valley? The red cars?
- speaker: Respondent
  text: I rode them many times when I was going to College. Many times.
- speaker: Interviewer
  text: Where did you go to college by the way?
- speaker: Respondent
  text: Los Angeles Junior College. Down on Vermont where U.C.L.A. used to be.
- speaker: Interviewer
  text: Sure quite a trip to go.
- speaker: Respondent
  text: I only did that once a week. I lived with my sister who lived in the village.
- speaker: Interviewer
  text: The village?
- speaker: Respondent
  text: Westwood village. I did not like those street cars. They would get out in the country here and they seemed like they
    were going so fast. And going around curves, I thought they were going to go over. They were weird.
- speaker: Interviewer
  text: Were they connected to wires or were they on rails?
- speaker: Respondent
  text: Just like a street car. The red cars. They went into a terminal underground downtown Los Angeles.
- speaker: Interviewer
  text: The subway terminal?
- speaker: Interviewer
  text: Can you remember the subway terminal Kathy?
- speaker: Respondent
  text: No, I never heard of it.
- speaker: Interviewer
  text: What street was that on? What hill was the subway terminal on, do you recall?
- speaker: Respondent
  text: I'm not sure. I really don't remember. We didn't go too much. That's the only time. We usually drove in, the family,
    you know. We used to always go shopping in downtown L.A. because there were no shops in the Valley that we liked.
- speaker: Interviewer
  text: Do you remember the coming of World War II and what the reaction of the Valley was to that?
- speaker: Respondent
  text: It was very wild. I was married at the time. I had a little girl at the time and another on the way. When that fateful
    Sunday came along and oh, yes, it was quite an experience. I mean war to me was something that I just got in on the tail
    end before I was a month old, when armistice was declared so I don't remember much about war until that time.
