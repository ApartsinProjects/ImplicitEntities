collection: disasters
source_url: https://archive.org/
turns:
- speaker: Respondent
  text: I think it was sometime in the summer of 1903 that we moved to Oakland. Father was 45 when he died in January, 1902.
    Mother was 41 and she had five of us boys to look after. Everett was in his 20th year, I was just 14, Ralph 11, Bob about
    6, and Mark, 4. We were living in Calistoga where father had been the manager of the Rochdale store. Everett had been
    working there with him, keeping books and clerking. He ran the store after father's death until they got a new manager
    and then stayed on at the job. Ralph and I did a little prune and grape picking during school vacation, and mother took
    in some summer vacation boarders. Ralph and I were dish washers, and we hated it; with the boarders there were a lot more
    dishes, and it seemed to me that we were always arguing as to whose turn it was to wash them. That was the worst job with
    all the greasy pots and skillets. I don't know how much money we took in, but we got along. The directors of the Rochdale
    Store helped us out, and others, too, I think. We stayed there for about a year, and then mother went on the train to
    Oakland to visit the Shains, who we had known in Fresno. She looked around for a couple of days, and then came back and
    said, "There is no chance for you boys here; we are moving to Oakland."
- speaker: Respondent
  text: We lived for about three months on 18th Street just west of San Pablo Avenue, and mother started right away looking
    for a house to buy. Mr. Shain told her it was cheaper to rent, but she said maybe it was, but she wasn't going to pay
    rent all her life. She had $1000.00 and bought a house at 531 - 20th Street for $2500.00, and we paid off the mortgage
    in about eight years.
- speaker: Respondent
  text: Everett went to work for the Rochdale Wholesale Co. in San Francisco. Ralph and I started the Emerson School at 10th
    and Alice, but only went there for a few days, for we got jobs and went to work. My first job was with Abrahamson Bros,
    at 13th and Washington, and Ralph at Kahn Bros, Department Store at 12th and Washington, as package delivery boys on our
    bikes; the pay was $3.00 a week for full time. When Bob and Mark got old enough to do it, they got as much for after school
    and Saturdays. Later on I got a job with M.J. Keller Co., the leading men's tailoring and clothing store. Then he got
    me on there, too, and we both worked there for a while. The pay was fifty cents more a week. Then I got a job with the
    Oakland Cream Depot at 18th and C. Cain. Jack Schreiner lived next door to us, and he drove a wholesale butter wagon around
    town. It was a snappy rig, a panel top wagon nicely painted red and black with a fine team of grey horses. We called on
    the grocery stores (no supermarkets then, of course) and while Jack talked to the boss I would check the amount of butter
    in the box, and they would tell me how much to put in. It was a good job, especially when I could drive the team. The
    stores didn't sell milk then; it was delivered by the dairies and creameries early in the morning. I don't remember what
    happened to that job. It seems to me that Walter Smith drove the wagon for a while; he later was the butter maker there.
    Anyhow, one day he took me to the Tivoli in San Francisco to see "Floradora", the first show of that kind I ever saw.
- speaker: Respondent
  text: Everett took me to see Mr. John Diggs at Baker & Hamilton about a job to learn the ware business. No jobs were available
    just then, but he took my name. Then I went to work for the telephone company as a messenger boy. I got acquainted with
    the head switchboard man and he was going to get me in to learn that work, but a call came from Baker & Hamilton, so I
    went to work there. They were an old, well established firm, and you knew where you were with them, but this telephone
    business, no telling whether it would amount to anything or not. Of course, I never had such weighty thoughts about it,
    working in San Francisco and crossing the bay every day, that was something. I don't think I even asked what the pay was.
    One of the fellows asked me, and when I told him I didn't know, he said, "It's $15.00 a month", and he was right. After
    six months, if you are not fired, you get a five dollar raise. It was about the first of June, 1905 that I started there,
    so I got my raise about the first of the year.
- speaker: Respondent
  text: A lot of books have been written about San Francisco of those days, and a lot more could be told. The store was at
    the corner of Pine and Davis and Market Streets, and was a four story building. Boys starting in went first into the bolt
    cellar where Capurro held forth, and where they learned about all kinds of bolts, axes, sledges, wedges, and handles for
    all such tools. We really learned about such things and this day it makes me mad when I read a story of a riot in the
    papers, and a reporter says that the men used axe handles for weapons. If you hit a man with an axe maybe you would make
    him mad, but if you used a pick handle you would probably put him in the hospital. From there to the third floor was the
    shovels, forks, etc., and some shelf hardware, then to the second, and then to the order department, and so on.
- speaker: Respondent
  text: On fishing tackle, cutlery and bicycles, this was out of bounds to all but those who worked there. The fourth floor
    was the sporting goods department with guns and ammunition, wagons, buggies, harness, etc. On the first floor was the
    tool department, sales floor and offices. The iron warehouse was somewhere near 3rd and Townsend; then there was the Sacramento
    store, and the Benicia iron works.
- speaker: Respondent
  text: The streets in this part of town were paved with cobblestones, and when the big drays moved along they made plenty
    of noise. The drays were made with low flat beds, only a foot or two above ground so heavy things could be more easily
    loaded from the sidewalks.
- speaker: Respondent
  text: We crossed the bay on the San Francisco ferries. The Key System was not built until several years later. When the
    crowds came off the boat, especially the boats that connected with the trains at the Oakland Mole, there was a welcome
    committee of the runners from the hotels and hack drivers. The hotel buses would be backed up to the sidewalk, and the
    drivers would be calling out the name of their hotel, and the hack drivers looking for fares, the competition was keen,
    and a cop was there to keep them from getting too sale. Sometimes two drivers would be trying to drag a man two ways at
    once. The city men traveled around town by horse and egg. There were not always hitching posts where they had to stop,
    they had a cast iron weight that they snapped, with the strap attached, to the bridle, and so anchored the horse. A few
    years ago some started a discussion as to what they called these weights, but I don't think they ever found whether there
    was a name for them or not.
- speaker: Respondent
  text: Sometimes we worked overtime; our regular hours were from 7:30 am to 5:30 pm, with 45 minutes for lunch. Overtime
    was about two hours, I think, and we got 50 cents for dinner. Pork and beans and a piece of pie cost about a quarter,
    so we made about a quarter on the deal. There were a lot of oyster beds in the bay then; pollution was many years in the
    future, and oysters were plentiful, cheap and good. If you missed a late ferry, there was an oyster house a block up Market
    Street where you could get an oyster stew of half a dozen fried, and sometimes you didn't hurry to catch the boat; they
    were good.
- speaker: Respondent
  text: There were other things such as Hangtown fry, which, I think, was oysters and scrambled eggs, and an Oyster loaf,
    which, I think, was a loaf of bread hollowed out and filled with meat, and other stuff. I never tried them, so can't tell
    about them. But then I forgot, I'm writing now about the time when I was getting $15.00 a month, and, of course, I didn't
    get any of that fancy food then.
- speaker: Respondent
  text: My first job at Baker & Hamilton was as weight clerk. The boss, for some reason, wanted to know the weight of goods
    shipped to our customers, so I was there at the scale to mark down the weights in a book. Right next was the nail cellar,
    that part of the cellar under the sidewalk on the Davis Street side. There were kept nails and rope. "Henry the nail slinger"
    (I don't think I ever heard his name) was in charge there. He was a little guy from the Bowery. I don't think he weighed
    over 120 pounds, but he could throw 106 pound kegs of nails all day, stacking them four high, and always at top speed.
    He took a shine to me and started to teach me to box. He was very fast, and it was not often that I could touch him.
- speaker: Respondent
  text: We had settled down in Oakland. Everett, Ralph and I were working and mother made a little money sewing, and when
    Bob and Mark got old enough they did the same. Most of what we made went into the family kitty, and mother kept us well
    fed and clothed, and paid on the mortgage. No welfare, and we were not under-privileged. It was a money thing then. Every
    month Everett bought a list of food from the Rochdale store as long as he worked there. Canned salmon was the cheapest
    meat, and we got a case of it every month, and mother knew a lot of ways to cook it, and it was good, too. Nowadays it
    is a luxury, almost. I was talking to Larry Knight a few years ago, and told of starting at Baker and Hamilton's, and
    he said, "You guys at Baker's were aristocrats; you got $15.00 to start, we only got $12.00." Norman Allinger told of
    how his mother used to make clam chowder, and when there were no clams, she made it with bacon.
- speaker: Respondent
  text: There were always a number of express wagons at the city hall plaza in Oakland. If you wanted to move you just went
    down there and hired one. In the park was a cannon, about four o'clock in the morning, and made a fine noise, and broke
    a few windows. I don't think they ever found out who did it, but they filled it with cement so it couldn't happen again.
- speaker: Respondent
  text: We had some celebrities, too, Jack London, for one. We had read some of his stories, Tales of the Fish Patrol, which
    had been published in Youth's Companion, I think. And I think he had the Snark moored at the foot of Broadway before he
    started his cruise to the South Pacific. I remember it. Everett, Ralph and I went from to see it. When I was working for
    M.J. Keller I delivered a suit to him at about 30th and Grove, but I don't remember whether he was there, or who took
    the package.
- speaker: Respondent
  text: Then there was Joaquin Miller; I think his name was Cincinnatus Heine Miller - no wonder he changed it to Joaquin.
    I remember seeing him one day on Washington side across from Keller's store, long hair, big felt hat and boots, which
    he wore at all times, I think. A number of years later I went with a crowd of young men from the First Methodist Church
    to see him. It had been the custom to have a short meeting and breakfast on Thanksgiving morning, and then go for a hike,
    and this day we went to his place. When we got there, there was no one in sight, so Harry Hollidge and I went to look
    for him. We went to the house, and as the door was open looked in and Joaquin was there in bed. We told him that he had
    callers, so he kicked off the covers, put on his hat, and was ready to go. He was fully clothed, even had his boots on.
- speaker: Respondent
  text: Then there was Borax Smith, who had made his money in the borax mines (Twenty Mule Team Borax), and then moved to
    Oakland, and was in the streetcar and real estate business. Jack London's novel, Burning Daylight, was based, in part,
    I believe, on his life. Ina Coolbrith was the Librarian, and was state poet laureate, and Robert Louis Stevenson lived
    here for a while. I don't know the dates, but there is a lot of history here.
- speaker: Respondent
  text: I don't know where the boundary lines of Oakland were when we came here. There were a number of small towns; out at
    Telegraph Ave, and fiftieth was Temescal, not really much of a town, but there were some stores and a hotel, and a cannery,
    I think. Mostly it was Italian truck gardens and dairies. I remember going out there in the butter wagon, and Jack took
    me to lunch at the Italian place. The place where I live now (480 Clifton St.) was a creamery, and a brother of Walter
    Smith was a butter maker there. Out to eastward there were Fruitvale, Dimond, Allendale, Melrose, and Elmhurst. They were
    taken into Oakland over a period of years. San Leandro was the "Cherry City" and was a good place to go in the summer.
- speaker: Respondent
  text: The main thing I remember about the amusement parks is the scenic railways, though. Why they called them that I don't
    know, for there wasn't much "scenic" about them, but they were fun to ride. There was one at Idora Park out on Telegraph
    Avenue. At the "Chutes" in San Francisco you would "shoot the chutes" in a square ended flatboat which was hauled to...
