source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: How long have you lived in the Crisfield area, and if you were born here, what was that like? And if you've retired
    here, or if you're planning on retiring here, why in Crisfield? And how has it changed since? What kind of keeps you in
    Crisfield?
- speaker: Respondent
  text: Born and raised here. I'll soon be 53, so we did move away for just a few months and came back but we've pretty much
    been here our whole life or at least in the general area.
- speaker: Interviewer
  text: Were you born here?
- speaker: Interviewer
  text: What was that like?
- speaker: Respondent
  text: Childhood was great. It was a good place. I was basically born in the 70s but kind of grew up around the 80s. It was
    good, it was a great place to live.
- speaker: Interviewer
  text: And how has Crisfield changed in the time that you've been here?
- speaker: Respondent
  text: A lot. When I was young, we had lots of stores, the economy was really good, the fishing industry, crabbing, crabs.
    You didn't have to worry about any kind of part-time jobs. It's just really different now, it's a lot slower than what
    it used to be.
- speaker: Interviewer
  text: And what kind of keeps you in this area?
- speaker: Respondent
  text: I would say family, but also, it's my home. There's something about this place that just draws you back even when
    we moved away to Pennsylvania for six months. It's hard to explain. It's just your home and you want to be here no matter
    what changes it goes through.
- speaker: Interviewer
  text: So maybe how has your business kind of changed throughout the years in Crisfield?
- speaker: Respondent
  text: It is much slower; I think I can speak for a lot of the businesses around here. We still pick up in the summer with
    tours, but I vividly remember working in this industry as a teenager and it being popping every day, like tons of people
    waiting to get into restaurants. It's not like that now. We're busy, but only about a third of what this town used to
    be in the 80s.
- speaker: Interviewer
  text: So, I'm guessing that is peak time?
- speaker: Respondent
  text: Yes. In winter time it's almost nothing, to the point you almost want to close the doors. We tried to stay open last
    year for the community just to give them a place to eat, but for the winter months it's bad.
- speaker: Interviewer
  text: What are some of your most cherished memories of Crisfield?
- speaker: Respondent
  text: High school was great. We had a lot to do, a lot of friends, and a lot of things to do around here. Crab Derbies were
    always our favorite. We looked forward to that every year. Probably summers and all the things we could do around here.
    Community-wise, the events we used to have were the best memories.
- speaker: Interviewer
  text: So, what kind of events did they have? You mentioned the Crab Derby was one of them.
- speaker: Respondent
  text: We had Crab Derby, Clam Bake, circuses, carnivals, fireworks. Every holiday there was something to do.
- speaker: Interviewer
  text: Are most of those events still around, or are some of them left?
- speaker: Respondent
  text: Some have left. We don't see the circus or carnivals anymore. Crab Derby is still around and got better last year,
    but it fizzled a little especially since COVID.
- speaker: Interviewer
  text: How do you entertain yourself in Crisfield? Do you attend any community events regularly?
- speaker: Respondent
  text: I personally don't. If there's something at the Elks or American Legion, sometimes we go. But at my age it's more
    of a slow pace and there's not a whole lot to do. If we're bored, we just go out of town.
- speaker: Interviewer
  text: So, you'd probably say there's more to do outside of Crisfield nowadays than inside?
- speaker: Respondent
  text: Yes, for sure.
- speaker: Interviewer
  text: Has there been any recreational activities, maybe outdoors or nature things, that you've come to like about Crisfield
    or that have changed?
- speaker: Respondent
  text: I don't personally do a lot of nature stuff, but we really push it for tourists. The park has gotten more attention.
    We used to go to the park for picnics and family time. I don't think they have a kids' area anymore, but they do have
    a lot of nature stuff now and we send tourists there more than when I was younger.
- speaker: Interviewer
  text: What role does the waterfront or the Chesapeake Bay in general play in recreation and social life for this community?
- speaker: Respondent
  text: If we didn't have that, I don't know what we would do. That's all we have right now with canoeing, kayaking, and people
    coming down to look at the water. Customers come just to go to the end of the dock, look at boats, or go to the beach
    area. The marina also brings a lot of people.
- speaker: Interviewer
  text: Have you noticed any changes in the land, weather, water or flooding in Crisfield in your time here?
- speaker: Respondent
  text: There's a lot more flooding than before. I only remember one time being out of school for flooding. Now there are
    days upon days off. We don't have snow days, we have flood days. Flooding has always been here but now even my yard floods
    more, and I live on the outskirts of Crisfield.
- speaker: Interviewer
  text: How has flooding impacted your personal daily life?
- speaker: Respondent
  text: Sometimes roads are flooded and it prevents customers from coming because they won't drive through it. We've had flooding
    in the building once. It stops a lot of businesses from getting customers.
- speaker: Interviewer
  text: Have you done anything to try and prepare for flooding through your business or house?
- speaker: Respondent
  text: 'Yes, when warned, we try to put things as high as possible. This building was remodeled with flooding in mind: plugs
    are higher, baseboards are plastic, concrete floors, epoxy floors to prevent mold. The remodel was done to withstand flooding.'
- speaker: Interviewer
  text: Would you say other businesses around Crisfield do the same when they remodel?
- speaker: Respondent
  text: I think many haven't remodeled lately. I know one man about to remodel is scared but plans to block and put walls
    up. He had flooding in his building too. I don't know of many others.
- speaker: Interviewer
  text: Do you see other citizens preparing for such events?
- speaker: Respondent
  text: Yes, business owners put things up high when warned. We don't get flooding in our house but secure things in the yard.
    Schools send laptops home when flooding is expected so kids can work from home.
- speaker: Interviewer
  text: Are there any storms or flooding events you remember most vividly?
- speaker: Respondent
  text: Everyone remembers Hurricane Sandy. I also remember in middle school the National Guard bringing my mother home during
    flooding. We lived near Woodson School in apartments that flood. I remember a lot of water then.
- speaker: Interviewer
  text: Could you tell us more about Hurricane Sandy?
- speaker: Respondent
  text: We lived on the outskirts and didn't have a business then, so we were fortunate. Many people lost a lot. My parents
    were flooded in and had to do many repairs. It was a scary time for the town. Many buildings were hit and sat dormant
    for a long time. This building was gutted and remodeled over 14 months, reopening in July 2024.
- speaker: Interviewer
  text: Are there areas of Crisfield not remodeling or getting left behind in infrastructure changes to prevent flooding?
- speaker: Respondent
  text: I don't know. Downtown looks terrible but was sold to Tidal Health. That used to be the hub but many buildings sit
    dormant after Sandy. Many houses now are required to be built 6 or 7 blocks high even in neighborhoods that don't flood
    much.
- speaker: Interviewer
  text: How much is it costing people to do these renovations? Does the city provide help?
- speaker: Respondent
  text: The city does not provide help. My landlord spent a lot; the floor alone was $20,000. Concrete board costs about triple
    regular drywall. There are no grants for interior renovations, only a facade grant once for exteriors.
- speaker: Interviewer
  text: Have you participated in any community events about flooding or do such events exist?
- speaker: Respondent
  text: I don't know of any events that exist.
- speaker: Interviewer
  text: What's your opinion on the increase in severe weather activities?
- speaker: Respondent
  text: I don't know. Old people said it would catch up with us building on oyster shells. I know it's climate related. We're
    a lot warmer than before. Growing up there was more snow and cooler weather.
- speaker: Interviewer
  text: Do you think climate change is something people in Crisfield actively discuss?
- speaker: Respondent
  text: In winter, yes. People at Gordon's talk about snow stories when it snows. We used to build snow forts and furniture.
    We had snow days, not flood days. This past winter had the most snow in a long time and there was chatter about that.
- speaker: Interviewer
  text: So, many people have noticed the decrease in snow and increase in flooding?
- speaker: Interviewer
  text: I'm going to transition to get more information about what the youth have to do here nowadays, because we've heard
    there's not really too much going on for the youth.
- speaker: Respondent
  text: Not at all. If you don't play sports, I think you're kind of left behind.
