collection: disasters
source_url: https://archive.org/
turns:
- speaker: Respondent
  text: My first recollections of being in this world was a place about 11 miles west of here on Newfound Creek, which is
    now in the Leicester section. My father was a farmer and I remember him finishing up a house that he started several years
    before that. And it had been built with hewn logs. And then he had hauled sawed logs to the mill about a quarter of a
    mile below our house to an uncle's house, by the name of Wright. And the logs was sawed into floor shapes and then into
    ceiling and thicknesses and weatherboarding. And the lumber was brought home and stacked in the yard. And as time went
    on, between farming and at odd times, my father dressed the flooring and tongue grooved it and finished up the house.
- speaker: Interviewer
  text: About what time was this?
- speaker: Respondent
  text: Well that would have been about, well I was born in 1874 and it must have been that I was three or four years old
    before I began to notice what - get an idea about what was going on. As time went on, the house was finished up and Father
    begin to make a better living as a farmer. Found that raising calves was one of the surest ways to get a hold of a little
    ready cash. And also, we had some level land, which he sowed in timothy and clover grass and was able to sell that, by
    hauling it to Asheville and selling it to people who kept cows and horse, which was allowed inside the city limits at
    that time.
- speaker: Respondent
  text: And as time went on, I learned about my grandparents. I learned that my great grandfather, Jeremiah Green, who was
    born in Watauga County in 1780, came to this county and located on Hominy Creek, along about 1815. And they had a family
    of 15 children, were born to the family. And my grandfather, Williams, was one of them. And when he became 18 years old,
    he had been working there on the farm with the family helping to make a living. And there were no opportunities of going
    to school anywhere, to get an education, so that he could do anything besides farming. So he decided that the best thing
    he could do was to get married and start farming, start his life. So his experience was very interesting. He went to the
    Baptist Church, after he thought up this plan. And after service, he selected, or during service, he selected a likely
    looking young lady. And after the service was over, he approached her and told her that he would like to go home with
    her, and visit with her in the afternoon. Well, the first one he picked out, didn't seem to be particularly interested
    in him. So the next Sunday, he picked out another one and proceeded in the same manner and had the same experience as
    he did on the former Sunday. But on the third Sunday, he approached Miss Patsy Morgan. And spoke to her, and she met him
    graciously and introduced him to her family and they invited him to go home with them. After lunch, usual procedure in
    young couples courting in the country at that time was to take a walk down to the springhouse. And then sit around the
    rocks around in the spring, and talk, and walk through the meadow, maybe, something of that kind. And so he found that
    she was the girl. And they married and they had some seven or eight children. Among one was Jessie Green, Jessie Marion
    Green, which was my father. He attended the local schools there, which was very scarce.
- speaker: Interviewer
  text: Were they living up on Hominy now?
- speaker: Respondent
  text: Living on Beaverdam Creek in Hominy Valley. And his father, besides farming, had built a gristmill, which ground all
    kinds of grain at that time - wheat and corn, rye and buckwheat for pancakes. And then my father, in company with one
    of the neighbor boys, went to Mars Hill College - walked out there. And in the fall, September, long about 1860. At that
    time they, secession was getting pretty hot. And Zeb Vance was making speeches all over the country against secession.
    But in December, South Carolina seceded and then North Carolina did, and Zeb Vance called for volunteers to go into the
    army. And my father and Mr. Brooks, his companion, walked into Asheville and joined up with Zeb Vance. And then in successive
    marches, reached Morganton, where the railroad had reached all the way from Raleigh. And they camped. And he was four
    years in the army. Never came home on a furlough. And from what he says, never slept in a bed during all that time.
- speaker: Interviewer
  text: Do we know whose army he was in at that time?
- speaker: Respondent
  text: Well they were in, Captain Jim Gudgers was his captain. And he finally was wounded - he went all through the Virginia
    campaign and wound up at Gettysburg and was hit in the back of the head with one of those slow mini-balls and was left
    on the field for dead. But some Catholic sisters saw him, were walking late in the afternoon, and saw him move a little
    bit, and they took him in. He soon got all right and went to Pittsburgh, Pennsylvania, where he strung wires for Western
    Union Telegraph, saving up money at that time which was gold. The only kind that was any good was gold because the Confederate
    money was no good. And he had a belt made which fit tightly round his waist, under his clothing, and came home with $500
    and in a course of a year or two, he and Miss Laura Lucinda Thrash were married in Hominy and moved to this place in Newfound.
- speaker: Respondent
  text: Now on the other hand, my mother's family, a widow woman, by the name of Yount, From Charlesburg, came into the Leicester
    section with a baby girl and found a home on Turkey Creek, which was some three or four miles out of Leicester. And lived
    there for several years. The people would come in need of a surveyor, someone to lay off their land. And they wrote to
    the University of Virginia to send them a young man to act as their surveyor. And when he came down, his name was John
    Thrash. And he brought his grandfather with him, whose name was Valentine Thrash. And in whose memory there's a plat on
    a big stone down in the yard of the Buncombe County Court House. So as time went on, he and this young girl met up together.
    He was 28 and she was 14 and they got married. And he continued to survey, working from Turkey Creek across the mountains
    into Newfound Creek for people. And every once and a while, where he saw a likely piece of land, he would survey it in
    his own name and send the state of North Carolina the plot with the amount of money that the state was selling the land
    at that time. Which as I understand, varied from .25, .35, to .50 an acre, depending on what class of land that it was.
    Now he worked his away from Newfound to Hominy Valley and located on Tom Moore's Creek. And entered the land from the
    top of the mountain west of it to the Hominy Creek. And having quite a number of children, I think 10 in all, as time
    would go on and they got married, the land was divided up and each one got a part. And my mother was born on Tom Moore's
    Creek there in 1846. And as I had said a while ago, speaking of my father, she was there when he came back from the war.
    And after a year's courtship, they were married and moved across to Newfound. Her father gave them 200 acres of land.
    Which at that time had been laying hollowed. It had been inhabited with a small log cabin and laid idle for five years
    and when they went to housekeeping in this one room log cabin, it was a pretty hard life because there was not conveniences.
    A big open fireplace for them to do their cooking in and to eat by. Eat in one corner and sleep in the other. And my father
    immediately started clearing up the land, and plighting and improving it and also in building him a house, as I previously
    stated. As time went on, my oldest brother, was six years older than I am, Nat Green who went on to be a doctor in California,
    and Gay Green who was four years older than me, who became a leading financial life in Asheville from 1900 up till - for
    50 years. Then a younger brother, Grover, who never had very good health and died at 35.
- speaker: Respondent
  text: Now the living, as I said, in the country there was pretty hard. We had a log house, which served as a schoolhouse
    and a meetinghouse for the Methodists and the Baptists - the only two denominations that were represented in that part
    of the country at that time. And on alternate Sundays, and usually they had a combination Sunday school during the summertime,
    in which the Methodists and the Baptists led on Sunday mornings. Once a month we'd have a Baptist preacher and once a
    month we'd have Methodist preacher. A lot of the time, some of the neighbors might use the opportunity to do a little
    cavorting and community work. We found that the neighbors on Newfound Creek were all good, sturdy farmers. Some of them
    had located there before the Civil War and were not of the age to go in the war, and some of them had come in afterwards.
    And their method of living was very primitive. Yes, the predominate name in that community at that time was "Cole." There
    was quite a number of Coles there. And there was one family that had several grown up and, married men, at the time I
    first remember. And I remember one of them was named Time? Cole and Jess Cole, and Bill Cole and Dave Cole and Frank Cole,
    and they were all brothers. And then there was George Washington, which was much older than the other, and he had a brother
    by the name of Joe Cole, everyone referred to him as Uncle Joe Cole. And they were very good people and raised quite a
    number of children. Some of them still live in that part of the country and others have scattered out.
- speaker: Respondent
  text: Then there was a large family by the name of Wells. Well, Uncle Johnny Wells was a Methodist preacher, and I remember
    he had cancer, attacked the right side of his face. At that time, there was no way on earth to stop it or counteract it,
    it finally eat away the right side of his face and got into his jugular vein. Well he had quite a several children, boys
    and girls, some of them had married and settled down there. But along in the early 80s there was four of them, two girls,
    and two boys that went to the state of Washington and took up land there. The government gave them 165 acres of land.
- speaker: Respondent
  text: And then there was quite an outstanding family, the Hamptons. And one of their boys was a great friend of my older
    brother, Nat. And he went to the state of Idaho, and raised nothing but wheat. And he was very successful and he would
    come back every once and a while and he would tell us how severe the winters was, and also how the summers were short,
    but land was very productive and he'd become quite wealthy raising wheat.
- speaker: Respondent
  text: And our closest neighbor was a man by the name of Plemmons. And at the time I first remember, he was the sheriff of
    Buncombe County. And I always had great respect for him because they told me he carried a pistol with him all the time.
    And I wasn't, I just didn't like pistols. I never played around them much.
- speaker: Respondent
  text: And then there was another family by the name of Shook. Daniel Shook who came from over in Haywood County - the famous
    Dutch Cove, where the whole population over there had come from Germany. There were Smathers, and Shooks and some other
    name I don't recall right now. But I dare say, those families were all prolific in those days. And they scattered out
    and inhabited the country in all directions. The Shooks were thrifty people.
