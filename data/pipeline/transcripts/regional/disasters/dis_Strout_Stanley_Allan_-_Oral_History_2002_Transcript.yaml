collection: disasters
source_url: https://archive.org/
turns:
- speaker: Respondent
  text: My middle name comes from my grandfather's middle name George Allan Strout. He was in Sebastopol, had a planing mill,
    and he had the house on Florence Avenue, the old family home which is a historical building here in Sebastopol and I had
    as a kid, I had been in that quite often. Also later on when a fellow by the name of Quail purchased the property from
    the Kimballs who, Rowena Kimball was my half aunt, my grandfather remarried and his daughter from that marriage married
    Kimball, so I have relations that have more or less stayed for a number of years. I don't remember when Quail purchased
    the property, but from the family. But Dorian Kimball and Joy Kimball, I think it was Joy, her sister, had charge of the
    property and they sold it. But in any case my grandfather had a planing mill there in Sebastopol, my father and his brothers
    all lived here and went to school, and went on to college, but while they were living here, they used to get lumber out
    at the mill and build the boats and sold them I guess to people that used the boats on the lake out there, where there
    used to be a lake.
- speaker: Interviewer
  text: Laguna Lake?
- speaker: Interviewer
  text: Lake Jonive?
- speaker: Respondent
  text: Yes, I have photos of that.
- speaker: Interviewer
  text: Did they have that damned up to make it a lake?
- speaker: Respondent
  text: No, it was a natural as far as I know it was just natural. That Lagoon used to really flood every winter.
- speaker: Interviewer
  text: But then, would it keep the water?
- speaker: Respondent
  text: Yes it would stay in there, down there on High School Road down close to Occidental Road, I think is where it was.
    It ran along there. My father didn't go to Analy High School, I guess. He went to Santa Rosa High.
- speaker: Respondent
  text: They used to ride,
- speaker: Interviewer
  text: Because they lived closer there?
- speaker: Respondent
  text: No, No, they lived on Florence Avenue. But some reason my dad went to Santa Rosa High and he rode the train, the electric
    train from here over there. My mother went to school here, in fact, I might have given the photographs to the museum already.
    I had some large about 8 x 10 photos of the school, of the whole school. Kids like when they were little, sitting out
    in front of the school. I had 3 photographs of that.
- speaker: Interviewer
  text: Which grammar school did you go to?
- speaker: Respondent
  text: That I don't know, My dad went to Mt. Vernon out there?
- speaker: Interviewer
  text: On Green Valley?
- speaker: Respondent
  text: No, no, it's out by Cunningham, that way. My mother lived out there on Baker Lane, I think it was.
- speaker: Interviewer
  text: Is there a Baker Lane out there?
- speaker: Respondent
  text: I think so, yes.
- speaker: Respondent
  text: Yea, they, they lived out there and the videotape that I have a copy of naturally, but I gave a copy to the museum
    here, has I think. My mother relates partly to that also. But the earthquake hit in April of 1906, my grandfather and
    grandmother were down in the bay area, cause he had a job down there working on the railroad bringing, they were building
    a railroad along the coast. My mother, who was taking care of her younger sister at home, when the earthquake hit; and
    this she says on her video tape "The dresser or bureau or whatever in the bedroom, worked over in the doorway and her
    younger sister couldn't get out."
- speaker: Interviewer
  text: Oh my gosh!
- speaker: Respondent
  text: And here she finally, my mother, finally I guess, climbed through a window or something and got to her and got her
    out. And they had on the back porch or in the kitchen a cooler, with cans of milk and that all spilt and she said that
    it ran through the house, out the front door and down the steps. That was kind of comical, in a way. And then when they
    left Sebastopol to go to, they went down to Oakland, they took the family cow behind my mother's brother, who was born
    in Sebastopol in 1902. He pulled on the reins on the cow, because they were in wagon anyway, and it went from here down
    to Petaluma. And they got on a boat down there in Petaluma, so hopeful. But they took the cow and all.
- speaker: Interviewer
  text: Was it a ferryboat?
- speaker: Respondent
  text: No, Yea, I guess it was a steamer Gold or one, or probably was Gold. If I remember right. That's what my mother said.
    That was a popular boat. It left Petaluma and went to the Bay.
- speaker: Interviewer
  text: So they actually had a service that went all the way?
- speaker: Respondent
  text: Yes. A regular service. So when they moved that was another kind of comical thing about how they moved in those days.
- speaker: Respondent
  text: Yes. I can't remember the year that they did this, my mother, she was born in 1888 in St. Louis Mo. When the family
    came out West working the railroad; my grandmother cooked for the railroad crew. My mother came along, because she was
    born in St. Louis. And then I was looking back on the family bible and there was a couple of curves - a brother and sister
    born in Iowa, Spencer Iowa and some other state.
- speaker: Interviewer
  text: So heading West?
- speaker: Respondent
  text: Yes, heading West. And one of my aunts Abby, was born in Sebastopol, in 1893, I think it was. And then, my mother's
    younger brother was born in 1902 in Sebastopol. So I have kind of a tie to the town, there's a street named Strout Street
    one block long. That's about it that I can think of, unless there's something else you can ask me.
- speaker: Interviewer
  text: Your grandfather, the one that had the planing mill?
- speaker: Interviewer
  text: When did he get to Sebastopol?
- speaker: Respondent
  text: That I haven't got any knowledge of. I have no idea. He was, there has been published accounts of his being the first
    mayor of Sebastopol. Now, Whether he was or not.
- speaker: Interviewer
  text: Now what was his name?
- speaker: Respondent
  text: George Allan Strout.
- speaker: Interviewer
  text: Oh that's right, you said that.
- speaker: Respondent
  text: George Allan Strout. I've got photographs of all of the boys my dad and his brothers, my grandfather on the front
    porch of the Florence Avenue. And then in another photo.
- speaker: Interviewer
  text: Something about history?
- speaker: Respondent
  text: My dad, I guess they all took pictures. My dad had one heck of a lot of photographs. Of course I got all the negatives,
    he saved them. And they're still good. Negatives are good. I ran across a picture of him and my grandmother by 2nd or
    3rd marriage, I think it was, out in front of Florence Avenue on the sidewalk in the house on the background. I didn't
    print that. Some of these negatives, I didn't make, so when you look at a negative it's kind of hard to really tell all
    the details that. But I do have all those negatives as a reminder that of those photographs that were taken. We had some
    down at the Russian River that before they built the bridge at Bridge Haven, a ferryboat went across. There are a lot
    of pictures, some of them on the lagoon. I gave them to Larry Robinson. Some years ago he was doing something about the
    environmental earth and he found out that I had some photos, so I loaned the negatives to him so he could get prints.
    But so there are a lot of photos.
- speaker: Interviewer
  text: Do you know why your grandfather came to this festival? Or why he settled here?
- speaker: Respondent
  text: No. All I know is he is buried in Pioneer Cemetery over in Calistoga and they did come through and live in Calistoga
    for a long time.
- speaker: Respondent
  text: And I think, I rather think they came basically for their health to Calistoga, because that was a spa or healings.
    This is something, I before my cousin died, we went over there and we started a search and I have never carried it out.
    We went to the cemetery, went to the family plot, hoping to find a headstone that would tell which grandmother was buried.
    My grandmother that I call grandmother was, I never did really know other than what my mother was telling me, because
    I never saw her. So I don't know who is buried in the family plot because somebody had taken the headstone or whatever;
    and I never went to the County Recorder to find out. But the plot is marked Strout and he's there for sure. Which would
    be interesting to find out. I don't know why he came to Sebastopol. I trying to remember why, evidentially he was involved
    in lumber, because that planing mill is down on, the best I can remember they tell me about it, it was down on south Main,
    I guess, on the left hand side before the road joins with that Highway 16 coming up.
- speaker: Interviewer
  text: Where it makes the Y?
- speaker: Respondent
  text: Yes. Right in that area, I think it where it was. Probably somebody has some history on that.
- speaker: Interviewer
  text: Do you think it was where the lumber mill was, not the mill but the lumberyard was, that just recently was taken down?
- speaker: Respondent
  text: Well, it might have been. Was that down in that area?
- speaker: Respondent
  text: Well, it might have been. I do know this; he built the house on Florence Avenue. It was all built from lumber that
    he milled and most of it is redwood inside. They had the first, the call it an elevator, but the first house in Sebastopol
    with a Dumb Waiter, really. From the basement up to the kitchen was a tunnel, a tube, and a rope and it had a little elevator
    and they would bring up stuff.
- speaker: Interviewer
  text: How many floors were there?
- speaker: Respondent
  text: Well, there was. The house itself was 2 floors and I think it had something up above a little bit. I got some pictures
    of the old house taken an earthquake. The water tower fell over out back of the house. But, I can remember being near
    that. It's a two story up. It had a basement. It's still there. Whether they moved it over on the property. Where it's
    setting right now, was moved east of; it more or less in the center of the lot. Well, when he bought the property, he
    moved the house over so he could build another house right next to it. He kind of built the other house so it would kind
    of look like it was built at the same time.
- speaker: Respondent
  text: Yes. So, that has ended that. I haven't been back since it's been a bed and breakfast. I gave some photos of the way
    it was in 1906. I haven't been back since. It's not a bed and breakfast it's a private residence now.
- speaker: Interviewer
  text: Is that the house that you grew up in?
- speaker: Respondent
  text: No, I didn't. I was born in Oakland. My father and my mother met here in Sebastopol. Then, I got all this at home
    too. I think they were married down there in 19 aaa, I was born in 1921, so I'll be 81 next month. They got married in,
    I think in 1917 or 1918. I guess they were probably married in the Bay Area because I was born in Oakland. Then I went
    to Fairfax. When I was a little kid and of course started school. My dad had a job with Union Oil. Went over there and
    lived in Fairfax. I can remember Fairfax as a little kid. Then we went back to Berkeley and we lived in Berkeley. I started,
    well I was six. I didn't go to kindergarten, but I started grammar school in Berkeley. And then I lived there until 1936.
    In 36 my folks moved to Santa Rosa and I went to Santa Rosa High. The same high school that my dad went to and also Robert
    Ripley was in his class in high school in Santa Rosa.
- speaker: Interviewer
  text: Oh my gosh!
- speaker: Respondent
  text: I had, in Santa Rosa High, when I went through there in 36. I graduated in 39. So 37, 8, and 9 I had a teacher, my
    dad's English teacher in Study Hall. She didn't teach, she was pretty old. But I had her for Study Hall, you see.
- speaker: Interviewer
  text: Did she remember him?
- speaker: Respondent
  text: I can't remember. I know one thing, she ruled that Study Hall with an iron fist. So that was kind of interesting,
    in that way. Then, well myself, personally, I lived after that, I lived in Santa Rosa, went to the junior college and
    then went into the Air Core was in India and China for 3 years and when I came back, I never left Santa Rosa. I've been
    there ever since. Retired 17 - 18 years ago, I guess it was.
- speaker: Interviewer
  text: So this Strout Realty, is that?
- speaker: Respondent
  text: No as far as we can tell, that Strout Realty is not a relation, but the name itself is not too common. Strout, anywhere.
    I used to go, when I would go to another town, I would look in a phone book to see if there is any Strouts. My cousin
    started a genealogy thing. He went clear back to Lisbon and that's where his father was born. No, yes. No, he wasn't born
    there. Where was his father born? Well the boys went to high school, here in Sebastopol. So my dad was born in Fargo,
    North Dakota and put, I'm trying to think, the whole family started, my cousin traced it back to Maine, and even to some
    towns where they had records of the Strouts. The genealogy, my daughter is trying to work out now. She lives in Southern
    California. She's kind of took the ball, I don't know what she's done really.
- speaker: Respondent
  text: Anyway, that's about all I can mention that I know to you about them. My dad used to bring the family up from the
    bay area from Berkeley in the summer time and we camped on the Russian River at Rio Dell. My mother, my sister and myself
    and once in a while my cousin would stay with us. Way back when we were kids, I have a photo of me and my cousin on the
    trussel there in Mirabell on the railroad. My dad would come up on weekends on the train and spend the weekend in Rio
    Dell and then get on a train and go back to the Bay Area to work. And that I can remember. I've got photographs of Rio
    Dell and that was quite a thing. A met lot of people, kids that were my age, that lived in this area and they went to
    Anlay High. So when I moved up here in 36.
- speaker: Interviewer
  text: You had contacts, here?
- speaker: Respondent
  text: Yes, I knew what people who went to Anlay High. I didn't know anybody in Santa Rosa High. Seagal was one of them.
    Rolands. I knew a lot of kids in Analy High. Olmans, in fact, Edith Olman and I ran around together; she was I think a
    class behind me and her sister was a class a head of me, Connie. Their father had an Olman processing, apple processing
    and Santa products in Graton. So we had a great time, us kids. It was great.
- speaker: Interviewer
  text: It was fun we remember?
- speaker: Respondent
  text: I don't know. What else could I say?
- speaker: Interviewer
  text: You mentioned Fairfax? You mean Marin County?
- speaker: Interviewer
  text: Oh, I lived there for a while.
- speaker: Respondent
  text: Oh were you?
- speaker: Interviewer
  text: But was the connection with oil?
- speaker: Respondent
  text: When he worked for Union Oil, he was a delivery. I don't know what year it was; they had a terrific fire up there
    in the hills. He was with his gas truck, his gasoline truck. We lived on, boy I thought I would never forget that name
    of the street, but I can't remember right now.
- speaker: Interviewer
  text: Up into the hills or right in town?
- speaker: Respondent
  text: No it more or less in town, because it was I can remember the store at the bottom. There was a car railroad that went
    up out of the, in Fairfax there. There was store. Right behind the store there was this hill and there was the car railroad
    that went up there. A regular train type thing, in Fairfax. The electric trains went in there. The orange trains, I think
    it was that ran up from San Rafael, went on to Fairfax. I think it was the end of the line. I can remember that part of
    it. That's about all.
- speaker: Interviewer
  text: They must have had fires regularly up there?
- speaker: Respondent
  text: Well yea, there was a great fire.
- speaker: Interviewer
  text: I remember when I was there vacationing.
- speaker: Respondent
  text: I can remember this, my mom was really worried about my dad. My dad was out with his truck and there was a fire and
    he's got gasoline. Anyway, that's about all I remember about it. Well I wasn't ready to start school; I was 6 or 5. And
    I hadn't been to school yet, so I wasn't that old.
- speaker: Interviewer
  text: My mother was 97 when she passed away.
- speaker: Respondent
  text: Wow! A long-lived family!
- speaker: Respondent
  text: Yes, and she wasn't even. I built the house for
