source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: So we are going to just start at the beginning, if you can tell me where and when you were born?
- speaker: Respondent
  text: I was born in 1955, and I was - the first year of my life I was actually in Havelock while my mama and Daddy built
    the house here on Harkers Island. And I grew up in a house on family land that was - that is still in my family.
- speaker: Interviewer
  text: Great, and what did your parents do for a living?
- speaker: Respondent
  text: My daddy worked at Cherry Point, Mama was a homemaker until I was out of high school, and then she went to work with
    the REA, which was the power company here in the island. Rural Electrification Administration, that is now the Electric
    Membership Co-op. She worked there, and she was a big church volunteer, school grade mother, she opened scallops some,
    but anyway she was pretty much at home.
- speaker: Interviewer
  text: And what is Cherry Point?
- speaker: Respondent
  text: Cherry Point is the Naval air rework facility in Havelock about thirty-five miles west of here. It was like the economic
    salvation of this area. Fishing was king, but after World War II, that facility was built, there was also one at Camp
    Lejeune, and many of the men - and my mama worked there before she was married - but many of the men went to work there
    and then they would quit and come home and shrimp, or fish, whatever but it became a big part of the economy of the island.
- speaker: Interviewer
  text: And do you have any siblings?
- speaker: Respondent
  text: I have a brother. He's nine years younger, and he teaches math at the local high school.
- speaker: Interviewer
  text: So, tell me a little bit about what type of kid you were?
- speaker: Respondent
  text: I was the one who tried to please everybody. I just - that what I was supposed to do. Went to church, made straight
    A's at school, tried to stay out of trouble. I was pretty boring, actually, but - that's the way I was raised, you did
    what you were told to do, didn't ask a whole lot of questions. So, it was pretty traditional for that time and this place.
    Daddy working at Cherry Point put us at an advantage over some people who were just still reliant on boat building and
    fishing, but it was still very much, with Mama not working, and Daddy's job at Cherry Point was basically unskilled labor,
    financially it was always a struggle. Speaking of Cherry Point -
- speaker: Respondent
  text: '[Helicopter sound]'
- speaker: Interviewer
  text: Yeah, helicopter - I just saw it.
- speaker: Respondent
  text: We are in the fly zone, so it will be done in a minute.
- speaker: Interviewer
  text: Okay, we can wait for a sec. So, you said you got straight A's, did you like school?
- speaker: Respondent
  text: I loved school. I - on Markers Island there was no kindergarten. I started school in '61, and it was the same twenty-five
    or thirty people every class, because there was only one first grade and one second grade. So the people, the ones of
    us who went to elementary school together, we were very close because we were together year after year, and we played
    on the same teams, were the same cheerleaders, and we were either kin, or we went to the same church, or we lived in the
    same neighborhood, or some combination of those factors. So, church on Markers Island is very complicated, there are a
    lot of churches. So - some churches were more akin to others, which is a whole other concept. But anyway, the people you
    grew up with, you just grew up with them, I mean literally. The only people who changed were the preacher's kids because
    preachers would come and go. And so, somebody might show up in the fourth grade that you didn't know, but he was a preacher's
    kid.
- speaker: Interviewer
  text: So which church did you go to?
- speaker: Respondent
  text: I went to the Methodist Church.
- speaker: Interviewer
  text: And about how big was Markers Island, how many people when you were growing up?
- speaker: Respondent
  text: Probably as a child the population was twelve, fifteen hundred, maybe twelve hundred or fourteen hundred. In the sixties
    it grew. It maxed out to maybe eighteen hundred around 1990s, 2000. Since then the population has been dropping. Because
    the price of land here, families cannot stay here. A working-class family cannot stay here, and the land is going to retirees,
    which is in a whole different price range. And that has impacted the school because there are very few school age kids
    here. In fact three years ago they had to reorganize and reshuffle the school districts, all down east Carteret County,
    because Atlantic School and Markers Island School, if it had been restricted just to its school footprint, there probably
    would have been fifty kids or less. So now it's shuffled, and Markers Island is a K-5 school, Atlantic is a K-5 school,
    and on the middle school, kids go to Smyrna. So there's a lot of bus routes moving kids across these thirty-some miles.
    So, land values have completely changed the dynamics here. But you know the school, when I was in school, there was anywhere
    from 275 to 300 children in the eight grades. And the businesses on this island, there was like eight scallop houses,
    four fish houses, five restaurants at one time, three or four motels, I mean there's less commerce on Markers Island now
    than I've ever remembered, which is really surprising to some people because there's a lot of wealth here now, but it's
    not community wealth, it's wealth that comes and goes.
- speaker: Interviewer
  text: Yeah, maybe we can talk a little bit more toward the end about Markers Island now and the community and the landscape.
    But I want to follow your path. So, one thing I'm always curious about is whether there was a point in your childhood
    where you thought about what you want to be when you grew up? And do you remember -
- speaker: Respondent
  text: Oh, always. I remember in the sixth grade - they would never allow you to do this - but in the sixth grade we had
    these little tiny posters across the front of the room and it had everybody's name, their height, their weight, and what
    they were going to be when they grew up. And at that point I was going to be a beautician. So, who knows, but school was
    the common factor on the island. Like I say, families were divided, you were either part of a family or you weren't. And
    the churches divided the community, but the school was common ground, and it was a big part of everything we did - like
    in every small rural community it provided lots of activities beyond just learning. But anyway, I ended up, this is complicated,
    but I ended up only going to school here seven years. The county school system at that time, which was, for the years
    '67, '68, and '69, that's when like gifted and talented education became a thing. The way Carteret County handed that,
    they put their whole AG resource into the eighth grade. And so the top students from the eighth grade of all the schools
    went to the high school early. We didn't skip a grade, but we went to the high school early, we changed classes, we had
    high school teachers. It was like to give us a head start, and also to get us into a classroom where everybody was operating
    on the same level. And I was the token from Markers Island. I was the only one from Markers Island, Atlantic had two,
    and Smyrna had five. Those were the down east schools. Everybody else was from Beaufort. I never quite - and I want to
    go on record - I never quite understood how the gene pool fit, but I know how the politics were. But anyway, it was probably
    the most consequential year for me in public school because all of a sudden I got with people who were more experienced,
    more well read, they were a lot of teacher's kids, a lot of kids from Duke lab, and the competition there was positive,
    but we all learned from each other. And we all still are connected in a lot of ways, because we were all in the eighth
    grade, we were in one group and we stayed as a class that whole eighth grade, and then we split into grade levels. But
    the class that I left on Markers Island - it was a very hard decision to leave Markers Island early - I'm not sure they
    ever forgave me. Because I know there has been a couple of reunions of my eighth-grade class, and I didn't get invited,
    which is a whole indicator of Markers Island. But anyway, I was glad I did. It set my course, and I ended up teaching
    gifted education when I got out of college.
- speaker: Interviewer
  text: Was it scary going there without knowing anyone?
- speaker: Respondent
  text: Oh, yeah. Because culturally, in 1968, being from Markers Island was very sub - that was a sub-culture. Because we
    didn't know people in other communities. It was long distance phone call from Markers Island just across the bridge. Now
    we had local calls to Beaufort because the phone cable came under the water, and we can see Beaufort from Markers Island,
    but Beaufort was a whole other culture. That's where all the money was, that's where all the political power was. Beaufort
    always threw off on down east, there's still - that is a wedge that is still very real. But yeah, I mean. East Carteret
    was very intimidating. Very intimidating.
- speaker: Interviewer
  text: What were you - what did you excel at in school in terms of grades? What subjects did you like?
- speaker: Respondent
  text: I loved math. But I excelled at - I would say I wasn't the smartest one in that class, which was a whole new realization.
    What I excelled at was people. And having to prove myself, because when you're from Markers Island, you had to prove yourself,
    and I learned that quick. You got to do more, you got to do it better, and you can't quit. So, I learned that quick. And
    I loved East Carteret, I was probably too social, too interested, too competitive. I should have pushed harder academically,
    but it was a great experience, and I still feel very attached to the people I went to school with. But we all scattered.
    Very few, at that time, for down east - 'cause there is down east and then there's Beaufort. I know out of my class on
    Markers Island, me and one other person were the only ones that finished college. I would say out of the eighth grade,
    the down east students, maybe five.
- speaker: Interviewer
  text: And that was pretty normal, those numbers were pretty consistent?
- speaker: Respondent
  text: Well, the different communities down east had different emphasis, different commitments to education. Atlantic, the
    community of Atlantic was totally college bound. Marshallberg, the community where my mother was from, they were committed
    to schoolteachers. Where like Atlantic had doctors, lawyers, and Indian Chiefs. Markers Island was not so much toward
    education, they were toward fishing and boat building. So, your family experience was very consequential to what you did.
    My daddy saw no need for me to go to college. I wanted to go to Carolina, and I got accepted at Carolina, but Mama wouldn't
    let me go because it was too big. So, then I really wanted to go to Appalachian, because I wanted to go to the mountains,
    but she wouldn't let me go there because it was too far. So, I ended up at Atlantic Christian College, and I hated it,
    I only stayed one year.
- speaker: Interviewer
  text: And where is that? Is that in Atlantic?
