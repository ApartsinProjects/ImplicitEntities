turns:
- speaker: Interviewer
  text: I wonder Mrs. Wilson if you would give us your name and tell us how long you have lived here in Burbank.
- speaker: Respondent
  text: My name is Verna Forbes Wilson and I've lived all my life which is 55 years.
- speaker: Interviewer
  text: Well that gives us a little idea, so we've already found out that you well to speak on the history of Burbank as you've
    seen it develop over a half century then. We wonder if you could tell us something about your education here in Burbank,
    what schools you went to, maybe you remember the names of some of your teachers.
- speaker: Respondent
  text: Well, my kindergarten teacher was Mrs. Ina and that, I went to kindergarten up through the third grade in what is
    now the administration building within Luther Burbank School. Mrs. is still living. My first grade teacher was Mrs. Pershing,
    Mrs. , Mrs. Clayton, I remember her definitely because she was the only person I saw wash a boys mouth out with soap.
    [laughs]
- speaker: Interviewer
  text: Now that's interesting, I don't think that's done at the present time.
- speaker: Respondent
  text: Well, she certainly got respect after that. The Edison School which is near, well we'll have to say Pic-N-Save, we
    always used to say Alexander's Market, Pic-N-Save is now. And at that time Edison School had been built on the remains
    of the original grammar school in Burbank and when we played hopscotch we would pick up these funny old fashioned square
    nails and use them for in hopscotch, the things you throw. [laughs] And from there I went to John Muir Junior High which
    my daughter also attended but in a different building. John Muir moved and
- speaker: Interviewer
  text: Where was John Muir at the time that you attended?
- speaker: Respondent
  text: Uh, gee, it was on Cypress, I keep getting mixed up, between Cypress and San Jose, Third and San Fernando Road. Kitty
    corner across from Burbank High School now. And it was partially wrecked during the '37 quake and that was the year I
    went to high school and it was Burbank High, at that time we were having to fit two in one of these narrow seats because
    there weren't enough seats to go around because was wrecked. [laughs] I went to Burbank High for years, graduated there
    in '39.
- speaker: Interviewer
  text: You mentioned the quake. Which one was that in particular? Was that the one we call the Long, the Long Beach quake
    was earlier, wasn't it?
- speaker: Respondent
  text: That was the Long Beach quake.
- speaker: Interviewer
  text: And it was felt this strongly in Burbank, that it wrecked building up here?
- speaker: Respondent
  text: It wrecked quite a bit of John Muir Junior High. In fact there was a third story at that time which was the art room,
    that was a nice studio, a real new studio and that was totally wrecked, had to be taken down. came down and the only part
    of the building that was open was the, how do I say it, the part towards the hill, the eastern section the two stories
    there. The rest was just a wreck. It was gradually that we refurbished it. Typically the school was tents on the ground,
    quite interesting.
- speaker: Interviewer
  text: Well, yes I'm glad to hear that because apparently in the Valley, further West, they felt it but it apparently didn't
    do too much damage. There's no accounting for what is damaged and what isn't in an earthquake.
- speaker: Respondent
  text: Well, I think sustained quite a bit of the school, because it's you know the land that rock, it's rock and roll type.
    [laughs] Land out further, where you get into the flat plain here in Burbank which is old river bed, even in this last
    quake which was worse than but there wasn't nearly as much damage.
- speaker: Interviewer
  text: I think it does depend to a great degree on what sort of land your house is on, how much you are going to feel. Well,
    tell me about this elementary school experience. You mentioned hopscotch, that raises an interesting question. What else
    did you do for fun at that time?
- speaker: Respondent
  text: Oh, well school. [laughing]
- speaker: Interviewer
  text: I haven't heard the word hopscotch in a long time.
- speaker: Respondent
  text: School was really the only place I played because I didn't have children my own age around home, I was, my parents
    were quite elderly when I was born and all my cousins were older than I. So in school we played hopscotch, we played.
    Does that sound familiar?
- speaker: Interviewer
  text: No, I'm afraid not. Do these sound familiar to you?
- speaker: Respondent
  text: Baseball, it's softball I guess. Yeah, someone's chosen pitcher, catcher, and you go on down your with your competence,
    I always ended up in, far in the outer field. [laughing] And then whoever, if you catch a ball you get to take a turn
    at base, which I never managed to do, if you hit the ball and you manage to make all the bases you can stay up till you're
    out. The best ones always stayed up and the outfield always stayed out. [laughing] It was sort of a self defeating thing.
    We had, our school ground, in those days were all dirt, you know, it wasn't black top which we played handball, we had
    handball courts, the boys usually played handball, we played oily, oily, oxen free, you ever hear of that.
- speaker: Interviewer
  text: Something familiar about that.
- speaker: Respondent
  text: You threw a ball over the top of the lunch counter, which is where we ate lunch and yelled that and everybody that
    could manage to get around where the ball pitcher was, was then free, I forget all the rest of the game. [laughs] But
    we had rings and we had slides, it was quite a nice playground, in fact it was a large playground. But funny thing for
    those days, boys and girls did not play integrated games at all.
- speaker: Interviewer
  text: No, I know, I remember that in my own elementary experience.
- speaker: Respondent
  text: We got out at different times of the day.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: The girls were let out for recess when we went in the boys went out for recess, and they went in. [laughing] We had
    lunch together, but that's all. So we really didn't have much mingling. After school I would occasionally go to a girlfriend's
    house and we'd play with her brothers.
- speaker: Interviewer
  text: Would you look back at it now, do you think that was better than our present system of more integration?
- speaker: Respondent
  text: No. [laughing] I'm a wild liberal, I'll tell you why, I ended up my career by being one of the few women at Lockheed.
    So I definitely believe in, [laughing] well integrating adult women. I think it's much better this way, I like it. The
    only thing I disagree with the present education is I don't think they start the kids off reading, writing, and arithmetic
    quite soon enough and quite as advanced. I took a first grade reader down to the third grade class at a parochial school
    and we were amazed because it was harder than the third grade reader.
- speaker: Interviewer
  text: That right.
- speaker: Respondent
  text: Burbank's first grade reader.
- speaker: Interviewer
  text: Now, you have a daughter in elementary school too. Comparing her education with yours, did you feel that you went
    faster than then she did?
- speaker: Respondent
  text: I believe that I did go faster because they expected more of us in reading, they expected more of us in many ways.
    We didn't have many of the opportunities, the outside opportunities that the children do now. We didn't go on field trips.
    Only thing we went on a field trip to was the Burbank Shop. [laughing] But I believe that we were expected to be, you
    might say, ladies and gentlemen, we weren't supposed to be little brats and perhaps maybe expecting things of children,
    you get more if you expect more, although I think she did very well in school.
- speaker: Interviewer
  text: You did feel that the discipline was stricter when you were in elementary school?
- speaker: Respondent
  text: '[laughs] Oh yeah. Definitely, although I think it was more, well, the teacher got the whammy on you when you went
    in the first day, that''s the best term I could use. The teachers were backed up by the principal, the principal was backed
    up by the superintendent, and so on. However when I got to high school everything changed. Progressive education, and
    I don''t think I learned very much in high school because when I got to college I found there was an awful lot I didn''t
    know. I learned most of my English grammar in first year French. [laughs] Just the basic stuff which I should have learned
    in high school.'
- speaker: Interviewer
  text: In high school, what did you remember what sort of courses you were most especially interested in? What did you study?
- speaker: Respondent
  text: Definitely, because I thought at that time I wanted to be a commercial artist and I would have gone on in that field
    if we didn't have to move. But we didn't, we were very poor at that time. I really enjoyed all the art courses. I did
    take four years of Latin by going an extra half year to Burbank High after graduation before I entered Glendale College,
    of course I graduated when I was just barely seventeen.
- speaker: Interviewer
  text: I'm a little interested in years of Latin myself plus some more in Virgil. Did you read Virgil then in that college?
- speaker: Respondent
  text: We, uh, yes we got into, you know, I can't remember the meaning of words except I can't remember that it helped me
    so much now in anything. It's terrible.
- speaker: Respondent
  text: Which, I believe, that was really the basic thing I got out of it, enjoying words as a, just enjoying words. Looking
    them up and seeing, and getting a hold of the dictionary, you can't put it down because you go on and on. But I had an
    excellent Latin teacher, Mrs. I think she's the only Latin teacher they ever had at Burbank High, that I know of. She
    worked there until she practically was too old to work anymore. We had also an excellent, what they'd call it in those
    days, social studies is what it was called when my daughter was in school, I can't think of it.
- speaker: Interviewer
  text: They probably just called it History and Civics then, when you were in school.
- speaker: Respondent
  text: Oh, I think they may have lost the terminology. was the teacher, and in those days, of course Communism, you didn't
    even talk about it, she was quite a rebel, she brought us in books about Russia, that's the first time I ever really had
    a in Moscow. And we learned many things that I'm afraid, if the high school principal had known we were learning them,
    he wouldn't have liked it. These are the things, I guess, progressive education in that way was good. But I really didn't
    learn the things I needed to go into my field because I found out commercial art and then going in from that I, which
    I'd say, evolved into an engineering field, I found, gee, I should have taken a lot more math, they didn't make me take
    math. [laughing] And so you had to learn all these things as you went in college. [laughs]
- speaker: Interviewer
  text: So you took engineering courses at Glendale College then, did you?
- speaker: Respondent
  text: I took, but I had to go to work, so I never even graduated from Glendale College, I went to high school, started work
    at Lockheed in '42 and quit in '46, went back in '51 and just retired.
- speaker: Interviewer
  text: Now I think you're the first lady we've interviewed who worked at Lockheed during the war. So I'm interested in knowing
    what it was like to work there during the war.
- speaker: Respondent
  text: It was noisy. [Laughs] I was one of the first two women in this department. In 1942 had some bombers, it was department
    ten. My job involved crawling inside, the first job I had, crawling inside of the Bombay and rivets, all night. And when
    I came home the first night I couldn't hear. [laughs] So it was a very interesting experience. I worked all the time during
    the war in production, I was building airplanes. I finally got to work with the, which installer, electrical, I mean,
    mechanical installer. And I quit and got married and when I went back, this is funny, I have to tell you this. I was working
    at the PXPTVUi, the first patrol, made patrol bomber, when I went back, I went back on the same boss, same job, same place
    in the plant, physical spot in the plant, as if I'd never been gone. [everyone laughs]
- speaker: Interviewer
  text: How did the men accept you as a woman worker when you first went into the plant?
- speaker: Respondent
  text: They were very nice because they treated me like I was their child. [laughing] They were very much the gentlemen,
    most of them were older, I was. I went to work. I looked very young for my age, I pig tails. [laughs] and they were extremely
    nice. I never felt out of place but of course, I guess that was because I had always, my father always wanted a boy and
    my two older brothers had died as tiny babies so I always got to work with daddy. We had a ranch and it was a working
    ranch, we raised flowers and when you raise flowers you work very hard. [laughs] So I usually spent, I go home from school
    and put on dirty clothes, work out in the yard and it meant getting on the back of a truck or things like that. So I was
    used to being around men and I think that made a big difference, I really do.
- speaker: Interviewer
  text: I didn't know whether they might show any jealousy of a woman in that type of work or not. But you never encountered
    anything like that.
- speaker: Respondent
  text: The only place I ever encountered it was when I started making as much money as they did. [laughs] and it was really
    not a jealous thing, in fact I've had, later on, I've had men who working, you might say, under me or with me and directed
    their work and there's never been a problem but I think that really approach it. You just forget that there are differences
    really and don't expect too much. A lot of women expect to be carried around on a. [laughs]
- speaker: Interviewer
  text: Mrs. Wilson, maybe you could tell us some more about your family history farther into the interview.
- speaker: Respondent
  text: Right, and that's why I brought all my little goodies. My dad came to Burbank in 1907 and his brother. They had a
    really interesting trip to Burbank because in the course of coming from Illinois, they came from Illinois where he was
    born, they were to Iowa to Mexico where they both were cowboys. From New Mexico they, this is all in a period of about
    eight years I would say, he came to Yuma, Arizona and by covered wagon, would you believe.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: And the brother and his wife and my dad who was then unmarried and the three little children, one niece and two nephews
    made this trip. I think it took them about a month which you can drive today in one day. [laughter] And that brother happened
    to have been Burbank's second mayor, Charles John Forbes.
- speaker: Interviewer
  text: Well, we're glad
