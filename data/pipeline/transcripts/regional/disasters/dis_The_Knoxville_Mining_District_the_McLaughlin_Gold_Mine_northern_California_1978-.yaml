turns:
- speaker: Interviewer
  text: Can you tell me about your early years and how you became interested in geology?
- speaker: Respondent
  text: I grew up in Eureka, Utah, a silver-lead-zinc mining town. From a young age, I was fascinated by the mining industry
    and the geology behind it. My interest was further encouraged by my family and community.
- speaker: Interviewer
  text: What was your educational background like?
- speaker: Respondent
  text: I attended Harvard Graduate School where I studied under Professor Hugh McKinstry. My Ph.D. thesis focused on using
    manganese oxide as a guide to ore in the Tintic District, Utah.
- speaker: Interviewer
  text: How did your career develop after your education?
- speaker: Respondent
  text: I started working as an exploration geologist for Kennecott Copper Corporation from 1960 to 1967. During that time,
    I developed and refined procedures for copper exploration and conducted research on leached cappings. I also traveled
    extensively in search of copper deposits.
- speaker: Interviewer
  text: What was your role at Occidental Minerals?
- speaker: Respondent
  text: I was Vice President of Exploration from 1967 to 1975. I worked closely with Paul Bailly and Armand Hammer, and was
    involved with the Gore family. It was a dynamic period with many challenges and opportunities.
- speaker: Interviewer
  text: Can you describe your time at Homestake Mining Company?
- speaker: Respondent
  text: I served as Vice President of Exploration from 1975 to 1987. Homestake was eager to find a major gold deposit. We
    made advances in exploration techniques, including mineral zoning of deposits, and classified gold deposits worldwide.
    I also researched mercury hot springs and old Homestake files.
- speaker: Interviewer
  text: Tell me about the Manhattan/McLaughlin Mine project.
- speaker: Respondent
  text: The project involved the One Shot Mining Company and Bill Wilder. We reassured Bill Wilder about his rights and worked
    on the Gamble Ranch. Environmental aspects were a major concern, and we presented Homestake to the community. There were
    delays caused by vocal opponents of mining, but key people like Gustafson, Kalk, Previdi, and Stoehr were instrumental.
- speaker: Interviewer
  text: What challenges did you face moving the project from exploration to operations?
- speaker: Respondent
  text: Determining economic feasibility was a challenge, as was getting reliable assays. We debated whether to move the project
    before or after development. It was a complex process requiring careful planning and community engagement.
- speaker: Interviewer
  text: What other ventures did you pursue?
- speaker: Respondent
  text: I became CEO of Minven from 1987 to 1995, which also meant being the Chief Environmental Officer. I was involved with
    the California Mining and Geology Board and worked on issues like the California Desert Conservation Area and the Summitville
    disaster. I also emphasized the importance of sand and gravel mining.
- speaker: Interviewer
  text: Can you describe your involvement in community activism?
- speaker: Respondent
  text: I have been active in the Capay Valley, working to preserve the environment and oppose projects like the Davis Creek
    Dam. We worked together to block approval of environmental impact reports and raised concerns about air and water pollution.
    It has been a long-running effort with many challenges.
- speaker: Interviewer
  text: What was your experience working at the McLaughlin Mine?
- speaker: Respondent
  text: I started as a metallurgical technician and mill operator. I learned a lot about safety and operations, including
    running crushers and autoclaves. I was promoted to assistant foreman and later process specialist. The work was demanding
    but rewarding, and I appreciated the training and leadership I received.
- speaker: Interviewer
  text: How did the Solano Irrigation District become involved with the McLaughlin Mine?
- speaker: Respondent
  text: In 1981, we realized we had to take notice of the mine's impact. Betsy Marchand warned us, and we became concerned
    about protecting water quality in the Berryessa watershed. We mounted legal threats to ensure Solano County was involved
    in planning and demanded fail-safe containment of tailings, daily monitoring, and future oversight.
- speaker: Interviewer
  text: What was the outcome of your involvement?
- speaker: Respondent
  text: The result was outstanding. The McLaughlin Mine became one of the cleanest mining operations. We regulated cyanide
    transport and ensured no threat to Solano County waters. We worked with water law specialists and maintained vigilance
    to protect the environment and water users.
