collection: disasters
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Mrs. Schwerin, we'll plunge right in as I told you and I'll ask you first of all about your grandparents then, who
    lived in Kansas. Is that right? And what brought them to Oakland?
- speaker: Respondent
  text: I really couldn't tell you.
- speaker: Interviewer
  text: Ok. You don't remember about the grandparents.
- speaker: Respondent
  text: My mother's grandmother died when she was eleven years old. So then he took the children himself and then they came
    out, he brought them all out to San Francisco.
- speaker: Interviewer
  text: This is your mother's father?
- speaker: Respondent
  text: This is my mother's father. And then they lived in San Francisco.
- speaker: Interviewer
  text: You don't remember why they came particularly then to San Francisco?
- speaker: Respondent
  text: No. And he and his cousins owned this stable and the name was Foley-
- speaker: Respondent
  text: No. Here in San Francisco. And they had a hearse that they used to bury people or to get them married. They had this
    one hearse with the horses. And he helped them run that for years.
- speaker: Interviewer
  text: '...what part of San Francisco did he?'
- speaker: Respondent
  text: I couldn't tell you.
- speaker: Interviewer
  text: So your mother grew up in San Francisco.
- speaker: Interviewer
  text: All right. And then your father meanwhile, he came from Kansas also.
- speaker: Respondent
  text: He came from Leavenworth, Kansas.
- speaker: Interviewer
  text: They didn't know each other, the families didn't know each other.
- speaker: Respondent
  text: No. And then my father worked for Steiger and Kerr, the people that made stoves, iron stoves. And he got interested
    in iron. So then he wanted to start a business of his own. So what he did, he started the business of his own but he worked
    in the daytime for Steiger and Kerr in San Francisco. Then he'd take the 5 cent nickel ferry across the Bay and go to
    work at night and pour iron and cast iron and cover it with dirt. And then the next day, when it got cold, he'd take all
    the dirt off of the iron and have iron. They made all these manhole covers all around Oakland.
- speaker: Interviewer
  text: Oh even then, they started out doing manhole covers.
- speaker: Respondent
  text: Yes. But of course they were rougher than they are now.
- speaker: Interviewer
  text: He lived then in San Francisco and commuted over to work?
- speaker: Interviewer
  text: '...and his family had come with him? How old was he when he came to San Francisco?'
- speaker: Respondent
  text: I couldn't tell you.
- speaker: Interviewer
  text: He was a young boy and unmarried, at any rate.
- speaker: Respondent
  text: Yes, he was unmarried. And then-
- speaker: Interviewer
  text: And then he became interested in the foundry business-
- speaker: Respondent
  text: The foundry business. So then he came over at night, and where the foundry was, at Second and Castro, was an old old,
    terrible old building, but for iron you had to have the dirt. So it didn't really matter and they did business in that
    old building until two or three years ago and then they sold it to the City. And then the City never used it.
- speaker: Interviewer
  text: They just moved to their new location.
- speaker: Respondent
  text: And they moved to the new location. That's what made them move.
- speaker: Interviewer
  text: So it was a going foundry business. Was it called the Phoenix Iron Works at that time?
- speaker: Interviewer
  text: Do you remember what it was called?
- speaker: Respondent
  text: Uh, they didn't have a name for it. They just did odd things... but when my father started it in 1901 is when he gave
    it the name Phoenix.
- speaker: Interviewer
  text: Because of San Francisco?
- speaker: Respondent
  text: No, I don't know why. Phoenix means something. It always had a picture of a man.... Then when he married he moved
    over here, Fifth and Center Street and lived with his mother and father. And they had a two-story house that my uncle
    built.
- speaker: Interviewer
  text: Oh, at Fifth and Center?
- speaker: Respondent
  text: At Fifth and Center. And then my uncle built this waterwheel, a great big water wheel that pumped water. The dogs
    would get in it and run the mill. And then the people complained that it was cruelty to animals so he had to take it down
    but that's the way they got their water.
- speaker: Interviewer
  text: You mean it was dog-powered....?
- speaker: Respondent
  text: Dog-power made it go around. Then we lived with my grandmother and grandfather for quite some time. And then from
    there we moved up to Fifth and Grove, right near Fifth and Grove. Then my grandfather up and died in the meantime and
    then my grandmother came to live with us then. Then my mother had four children and my grandmother and my father and my
    uncle Sam, he lived with us.
- speaker: Interviewer
  text: All right, so the family had gradually moved over from San Francisco. Father and his parents. And where did your mother
    and dad meet in San Francisco...?
- speaker: Respondent
  text: Well evidentially, my father was an engineer. And he worked on these engines. And for some reason or another my mother
    used to go and visit him. And they got more acquainted and more acquainted. My mother was a very jolly person and she
    was German and she was out for a good time! And so then they married-
- speaker: Interviewer
  text: What year was that? Do you recall the date?
- speaker: Respondent
  text: Gee, they were married eleven months from when I was born. So it must have been 19 [she's thinking about the date].
- speaker: Interviewer
  text: Ok, let's ask you when you were born.
- speaker: Respondent
  text: See I was born, I think they were only married about a year and a half when I was born.
- speaker: Interviewer
  text: And you were born in 1890-?
- speaker: Respondent
  text: 1894, in November.
- speaker: Interviewer
  text: In Oakland.
- speaker: Respondent
  text: In Oakland. Yeah. On Center Street.
- speaker: Interviewer
  text: At home? Were you born at home at Center Street?
- speaker: Respondent
  text: Oh yes. Everybody was born at home. And then my sister came along. And then we moved from there up to Fifth and Grove.
    And we took my grandmother with us—wasn't a very big house. But they all lived with us. And my mother took care of all
    of them. And from there we moved back to Myrtle Street.
