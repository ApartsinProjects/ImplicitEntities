- speaker: Interviewer
  text: Yes, and you felt them?
- speaker: Respondent
  text: No, we never felt them. But the one that sticks out of our minds is the Wittier.
- speaker: Interviewer
  text: The Wittier.
- speaker: Respondent
  text: And uh and the one that's in - Yucca Valley or wherever it is .... the desert area.
- speaker: Respondent
