- speaker: Interviewer
  text: How long have you resided in the Valley? Were you born here?
- speaker: Respondent
  text: We were born here.
- speaker: Interviewer
  text: How long have you resided in San Fernando Valley?
- speaker: Respondent
  text: For 39 years. My whole life.
- speaker: Interviewer
  text: Was that in the center part of the Valley?
- speaker: Respondent
  text: Around the block from each other.
- speaker: Interviewer
  text: Oh wonderful, wonderful.
- speaker: Respondent
  text: Right there uh.
- speaker: Interviewer
  text: And then uh you went through the Sylmar earthquake did you?
- speaker: Respondent
  text: 1971, yes she did.
- speaker: Interviewer
  text: And and was were you here in Northridge?
- speaker: Respondent
  text: No uh I was living at home with my parents and she was living at home with her parents.
