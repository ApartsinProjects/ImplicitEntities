- speaker: Interviewer
  text: Pretty good.
- speaker: Respondent
  text: Another one that compared to this one.
- speaker: Interviewer
  text: Yes it was. Would you like to say something.
- speaker: Interviewer
  text: Ya uhm, how did you guys. How was the after shocks last night, yesterday, Sunday?
- speaker: Respondent
  text: Oh yesterday. Well 5.3 we understand.
- speaker: Respondent
  text: And it was.
- speaker: Interviewer
  text: You were in the house here?
- speaker: Respondent
  text: I was here with my daughter and John was at a restaurant with my son.
- speaker: Respondent
  text: The restaurant was crowded.
- speaker: Respondent
  text: After church and uh we were going to go play softball and Cathie had a funeral to attend so she came back to stay
    with her daughter. And we went out towards the park to play ball but we decided to have lunch first.
- speaker: Respondent
  text: And we were in a restaurant. It was crowded. We were in a booth with six people.
- speaker: Respondent
  text: And at one point the place started to shake.
- speaker: Respondent
  text: And I looked around and I noticed that there were, we couldn't go anywhere because, first of all we're in this booth.
- speaker: Respondent
  text: It was in Van Nuys.
- speaker: Respondent
  text: Sherman Oaks I think?
- speaker: Respondent
  text: Van Nuys Blvd.
- speaker: Respondent
  text: And uh Magnolia. And then we noticed that a bus boy, he was the only one that got underneath the table.
- speaker: Respondent
  text: He had a good idea.
- speaker: Respondent
  text: And then it was over, but it was a lot of people 'honey'.
- speaker: Respondent
  text: And a lot of concerns and again the phone lines were busy. I tried to call home, but I knew she had headed home so
    I didn't know if she was here or not. So call to see.
- speaker: Interviewer
  text: Were you home?
- speaker: Respondent
  text: I was home. I was just so thankful because I was getting ready to leave and then my daughter would have been alone.
    Five more minutes more and I would've been gone. She would've been home alone. And she was playing the piano and she just
    got the courage to sit down and start playing it again. And she sat down and all of a sudden it started and the house
    sounds like a train is coming through here.
- speaker: Respondent
  text: It was so scary, ha ha. And said this had to be a 6.0 it had to be.
- speaker: Interviewer
  text: So how did you feel about your husband and your son being out there?
- speaker: Respondent
  text: I thought I forgot that they were going out for lunch and I thought they were on the softball field so I wasn't really
    afraid for their safety.
- speaker: Respondent
  text: I felt at least they'd be out in the open space.
- speaker: Respondent
  text: But I knew he would be trying to get in to us. Calling to us, make sure we were okay.
- speaker: Respondent
  text: There were so people that couldn't get through and finally the other person had a cellular phone right inside the
    restaurant and he was able to reach his wife. And then we tried a couple of times to get through and then finally we got
    through and she answered the phone and I asked her if she was okay. So rather than going to play softball we went home.
- speaker: Interviewer
  text: And that was March 20, 1994 after shock.
- speaker: Respondent
  text: At 1:20. Ya, It was pretty scary it was almost like reliving the other one but, the other one at least we... this
    one we were awake and it's daylight. It's a little easier to go through then.... the daylight.
- speaker: Interviewer
  text: Yes now tell us about the, the January 17th?
- speaker: Respondent
  text: Well that was kind of...
- speaker: Interviewer
  text: You were, you were over here, asleep?
- speaker: Respondent
  text: We were asleep and we had a which is normal for our household. We had two guests. We always have a full house, ha
    ha.
- speaker: Respondent
  text: And uh there's no school the next day and our friend James could spend the night, he broke his ankle the night before
    and he did not get home from the hospital until almost 1:30 in the morning.
- speaker: Respondent
  text: And we had specifically put him up in the bedroom in the back and him all situated and put the chair so he couldn't
    roll off the bed. Mandy had her friend Andrea here and they slept in her room. And then we were just we were knocked out
    of our beds at 4:30. We just, we were knocked out of the bed.
- speaker: Interviewer
  text: We were asleep?
- speaker: Respondent
  text: Sound asleep.
- speaker: Interviewer
  text: So where did everybody go at, did you guys all go in the hallway?
- speaker: Respondent
  text: We tried to get in the hallway.
- speaker: Respondent
  text: We tried we, we couldn't... we started running because our bedroom door was closed and he had to our armorial had
    fallen onto the bed. Which blocked his way to get through.
- speaker: Respondent
  text: And I went but I was out of sort so I went running into the bathroom and our toilet had come off the ground.
- speaker: Respondent
  text: And there was water everywhere.
- speaker: Respondent
  text: And I slipped and fell and then I realized where I was so I reached for the other door to get to the kids. And there's
    glass and everything was just flying everywhere it was it was so scary. And our daughter her room, he pushed the door
    open and grabbed both girls out.
- speaker: Respondent
  text: Ya they were.
- speaker: Respondent
  text: And threw them into the hallway.
- speaker: Respondent
  text: And they couldn't get out.
- speaker: Respondent
  text: Ya and our son was locked in his room.
- speaker: Respondent
  text: Television fell.
- speaker: Respondent
  text: His television fell and then James our friend with a broken ankle just was stuck laying in bed until it was all over,
    ha ha.
- speaker: Respondent
  text: But we stayed in the hallway until, until it stopped and then our emergency lights went on, thank God we had those.
- speaker: Respondent
  text: Ya, that was one thing that we have here...
- speaker: Interviewer
  text: Emergency lights?
- speaker: Respondent
  text: We had purchased these little lights. Do you know where it is?
- speaker: Interviewer
  text: Cause you didn't have any light?
- speaker: Respondent
  text: That's right. All the electricity about a year and half ago Avon had a special on these little round lights for emergency.
- speaker: Respondent
  text: And you plug 'em in and so all of a sudden we turn around and there were those lights and they were in every bedroom.
- speaker: Respondent
  text: So they were lighting the pathway and you pull them out. Storage.
- speaker: Respondent
  text: And you use them as flashlight.
- speaker: Interviewer
  text: Oh, that's great.
- speaker: Respondent
  text: So we were able to.
- speaker: Respondent
  text: We had to find shoes. Nobody could move.
- speaker: Respondent
  text: Ya, but we had to.
- speaker: Respondent
  text: That's important.
- speaker: Respondent
  text: Ya, that was.
- speaker: Respondent
  text: I wish everybody had that.
- speaker: Respondent
  text: I was really glad we had that.
- speaker: Respondent
  text: It was. What is it the best of ... made.
- speaker: Respondent
  text: That was a big plus.
- speaker: Interviewer
  text: Yes was this just, just luck or intuition that you bought it this week?
- speaker: Respondent
  text: We've had them for a while.
- speaker: Interviewer
  text: Oh, you have.
- speaker: Respondent
  text: They've been plugged in over a year.
- speaker: Interviewer
  text: Over a year.
- speaker: Respondent
  text: We never really used 'em.
- speaker: Respondent
  text: We never had to use them.
- speaker: Respondent
  text: Never used 'em.
- speaker: Interviewer
  text: Boy, they came in handy.
- speaker: Respondent
  text: And they came in handy.
- speaker: Respondent
  text: And we had four five of them.
- speaker: Respondent
  text: And they're back in the rooms now. We're still using 'em.
- speaker: Respondent
  text: Ya, ya. And I think they were a 1.99. They're very inexpensive.
- speaker: Respondent
  text: Ha, ha. Considering we didn't have a flashlight to seek for in the house.
- speaker: Respondent
  text: Absolutely. Ya.
- speaker: Respondent
  text: Totally unprepared. But we got our shoes on and tried, John picked James up from the bed carried him out the front
    door.
- speaker: Respondent
  text: And there were broken glass everywhere.
- speaker: Respondent
  text: You know you were just.
- speaker: Respondent
  text: You couldn't walk down the hallway. It had everything had come out the.
- speaker: Respondent
  text: And our hallway is like a picture gallery so all the frames had fallen down and broken and shattered all over the
    carpet.
- speaker: Respondent
  text: Our hallway was like a picture gallery. Now all the pictures had fallen down and broken. Glass was everywhere on the
    carpet. Everything from our linen closet had come out covering our path to get out. And as you're walking out you're looking
    at everything with our flashlight. I saw my curio cabinet. Everything in it turned over. My daughter said, 'Mom, keep
    going, get out of the house.'
- speaker: Respondent
  text: We just ran out of the house. Our neighbors were out in the street waiting for us to come out.
- speaker: Respondent
  text: We had to get the dog leashed. Fortunately he was safely with us. And we checked on the Chinese rabbit.
- speaker: Respondent
  text: We got outside okay. With all this noise, the jumble of going back and forth. The house alarm was going off, the car
    alarms going off. So all this extra noise and screaming. Our problem was compounded.
- speaker: Respondent
  text: It was like standing on a pot of boiling water. The house never stopped moving. We were out in the street. And it
    was the same thing. The earth was moving.
- speaker: Interviewer
  text: Whoo, whoo.
- speaker: Respondent
  text: Everybody helped shut off the gas, the power and everything. And then one flashlight turned into two, four and finally
    we were able to get in here and find a flashlight.
- speaker: Respondent
  text: Then we pulled the cars out of the driveway, onto the street. We didn't want to be inside the car.
- speaker: Respondent
  text: And the fire engines everywhere. We heard a lot of explosions... And ...the sky over there was.
- speaker: Respondent
  text: Orange. They had a chemical something over there in the science lab.
- speaker: Respondent
  text: The toxic fumes. And there were fires over the hills on the north side. You could see the glow from here.
- speaker: Respondent
  text: The fires were in the hills on the north side here in Northridge. No telephones, obviously. The car phone we tried
    to use and couldn't get connection to my mom. That was frustrating. So we stood out in the street with the neighbors until
    it got light. And we were still rock and rollin'. Cathy's dad came by. He had stopped by my mom's place and told us she
    was.
