collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: I would like to start, Bruce, with your childhood. What memories do you have of the family or Benham or just growing
    up in the mountains prior to the first grade?
- speaker: Respondent
  text: Well, it was all of Benham was like one big family. Everybody knew each other and but I was a little different than
    the in my raising than the others in that we lived in Clutts, which was between Benham and Lynch, and they I was insulated
    or isolated or whatever. I did not live in the coal camp. My father had purchased thirteen acres of land and built his
    own home outside of the Tri-Cities and that made me a little bit different than the rest of the kids, and but once I started
    school, I learned a lot of things that I didn't know otherwise, but I had a very good raising in my immediately family
    in respect and love and for the whole group.
- speaker: Interviewer
  text: It was quite you're right, I had not thought about that, living away from town. We were isolated, weren't we?
- speaker: Respondent
  text: Yeah, you didn't have that coal camp and this isn't a bad thing mentality or the way you raise your your microcosm.
- speaker: Interviewer
  text: Yes. It was more a matter of us being a unit, almost self-sufficient, in a way, for all those early years. Is that
    how you remember it?
- speaker: Interviewer
  text: Let's jump to grade school. Where did you attend grade school?
- speaker: Respondent
  text: I was at Benham up through the sixth grade, and then there was a consolidation of schools and Benham was going to
    be closed, and you had the choice between Cumberland and Lynch, and Lynch at the time seemed to have the better quality
    education.
- speaker: Interviewer
  text: And what year was this approximately?
- speaker: Respondent
  text: '''61 or ''62, in there.'
- speaker: Interviewer
  text: Okay. I couldn't remember when it was.
- speaker: Respondent
  text: Well, I researched that.
- speaker: Interviewer
  text: Well, now, when you were in grade school, what were your favorite classes?
- speaker: Respondent
  text: Well, I guess the and it stayed with me through high school mathematics and chemistry, once I got into high school.
- speaker: Interviewer
  text: Who were your teachers? Who were your favorite teachers? Let's ask that.
- speaker: Respondent
  text: There was one, Mrs. Rider, who was very strict but very intelligent, and you could learn a lot from her. I had creative
    writing under her and it was very good. What that's what led me in later life to write a book or two, and--
- speaker: Interviewer
  text: What grade did she teach? What subject?
- speaker: Respondent
  text: English and creative writing. And then John D. Staley was a chemistry teacher, and I walked into class chemistry class
    one day and sat down, looked at his desk, and he had three beakers on his desk. Two beakers were clear liquid, one and
    one beaker was black liquid. We came in and sat down and he just walked in the room. He picked up the black beaker and
    poured it into one of the clear beakers and it turned black. Then he took the other clear beaker that was clear clear
    beaker and poured it into the one he just poured the black into, poured in there, and it went clear again. And I said,
    "I want to know why that happens." And that got me started off in chemistry.
- speaker: Interviewer
  text: That's fascinating. And what approximately what year would this have been? Because chemistry for us, when I was in
    school, was, as I remember it, somewhere around the sophomore year.
- speaker: Respondent
  text: Sophomore or junior year, yes.
- speaker: Interviewer
  text: Was that still the same--
- speaker: Respondent
  text: same, yeah.
- speaker: Interviewer
  text: Do you remember the name of your principal?
- speaker: Respondent
  text: We had at Lynch, it was Smith. That's an easy one to remember.
- speaker: Interviewer
  text: Do did you what were you too young to know who it was?
- speaker: Respondent
  text: I don't remember grade school.
- speaker: Interviewer
  text: Yeah. Well, in grade school, did you have at that time, did you have any favorite songs? Or was that too early? [laughs]
- speaker: Respondent
  text: That's too early. I didn't have--
- speaker: Interviewer
  text: Okay. Well, now, when you did transfer to Lynch, at that time, what were the differences that you found between the
    two schools? Because you're entering junior high, seventh grade. Is that correct?
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: Okay. What differences did you find in the two schools, in their culture, in their teaching? Anything?
- speaker: Respondent
  text: Benham, the students were more domestic US. In Lynch, that's it was established by U.S. Steel Corporation. Excuse
    me. They made an effort to get foreign workers in there. [laughs] And I was told the story that they had people at Ellis
    Island, waiting for the boats to land to get people to come into Lynch, Kentucky to work, and but they had an element
    of Hungarian, Polish, a lot of European cultures that were in Lynch that weren't that big in Benham. It's different, different
    cultures.
- speaker: Interviewer
  text: To supplement your stories and this comes from some of the others that I have interviewed is would support your story
    about Ellis Island, that they literally sent cars to Ellis Island. Also that a large number of African American which
    everyone that I have interviewed that's African American steadfastly refers to themselves as Black and they came out of
    Mississippi and Alabama. So what you're seeing in Lynch is that Eastern European culture as well as--
- speaker: Interviewer
  text: the Black culture, and then, again, to supplement that story, part of it was Benham and Lynch each had Big Stores,
    the Company Stores which were fabulous, as you look back on them.
- speaker: Respondent
  text: But expensive.
- speaker: Interviewer
  text: But expensive. But the there was a great push to bring Italian stonecutters what from Ellis Island or in any way that
    they'd get them over to do all that stonework that was beautifully done. You know, you could match that with anybody's.
- speaker: Respondent
  text: Yeah, there was a lot of it, too.
- speaker: Interviewer
  text: Well, now, when you were at Lynch, what were your favorite subjects there?
- speaker: Respondent
  text: Mathematics and chemistry. Chemistry was most people have got at least one thing they're a natural at, and some people
    very more. My natural is chemistry. I really enjoyed it and it always made sense to me.
- speaker: Interviewer
  text: I am so happy to hear that because I had chemistry in high school and all we did was look at we just looked at things.
    We did not have any experiments. We had different teachers, by the way. So when I went to college, I failed five hours
    of chemistry my first semester. Thank goodness all my other grades were really good. But so you see, you are the hero
    of the family for sure when it comes to science.
- speaker: Respondent
  text: I'm glad we got that on the record.
- speaker: Interviewer
  text: Now, at Lynch, since you have such a diverse culture there, did that affect the teaching or by the teachers in any
    way? Or could you tell?
- speaker: Respondent
  text: I couldn't tell. It was equivalent across the board from my observation, anyway.
- speaker: Interviewer
  text: So really the step to from Benham from Lynch was really more cultural as opposed to academic?
- speaker: Respondent
  text: Lynch was the better quality instruction versus Benham. Not by a great extent, but just in the classes I was involved
    in.
- speaker: Interviewer
  text: Well, now, who were your favorite teachers there?
- speaker: Respondent
  text: Like I mentioned, Mrs. Rider and John Staley and one honorable mention goes to John Coppinger. He was a history major
    and he was the band director and he was absolutely excellent, a genius in what he did. We won two state championships
    in the orchestra-type music in our Class A school, which Lynch was. And, I mean, he was just excellent, and he started
    me out on a tenor saxophone and I got pretty good at it. He later started calling me his boy once I could play the sax
    well.
- speaker: Interviewer
  text: Well, the to add to the Johnny Coppinger story, his family owned a huge amount of acreage, which he donated and I
    don't remember whether he donated it to the county or the state but it's now become Kingdom Come State Park.
- speaker: Respondent
  text: Oh, I didn't know that.
- speaker: Interviewer
  text: And that was in his Johnny Coppinger's family. And do you remember Bruner Gilliam?
- speaker: Respondent
  text: Oh yes, yeah.
- speaker: Interviewer
  text: Okay. What are your memories of Bruner?
- speaker: Respondent
  text: He's a prime example of an East Kentucky mountain man, and tall, lean. One of his hobbies was going in the mountains
    and chasing rattlesnakes, and he made a sport of it out of for himself. He'd wait until mating season for snakes came
    around and go looking for dens of rattlesnakes and wipe them out. And he was a very strong man, and I was told that he
    had read the Encyclopedia Britannica from cover to cover.
- speaker: Respondent
  text: Twice? Oh, I didn't know it was twice. Yeah, that's an honor to him.
- speaker: Interviewer
  text: Oh, to fill in with your story, Bruner was also assigned to the fire tower, so he was the one that would go up to
    the fire tower and watch, and he and his grandson, Joe McCauley little Joe he would take us up to hike to the fire tower,
    and we thought that was the greatest thing in the world, and also to what is now Kingdom Come with the devil's rocking
    chair out of stone. Yes, wonderful, wonderful man. And his wife was can you remember her name?
- speaker: Respondent
  text: Fran, wasn't it?
- speaker: Interviewer
  text: No. I'll remember it. But anyway, she is the one who taught me to churn milk to make butter. Don't we have great memories?
    But your principals at your particularly in high school, did he have any impact on your future? Did he was he in any way
    one of your mentors at all?
- speaker: Respondent
  text: No, not the principals, not that I remember having.
- speaker: Interviewer
  text: What were your homework expectations by your family, by your father and mother?
- speaker: Respondent
  text: It was a live or die scenario. You do your homework. [both laugh] There's no questions, if, ands, or buts. And it
    really homework really wasn't an issue for me until I got into high school, but then it was pretty robust in what they
    expected of you on the homework side.
- speaker: Interviewer
  text: The now, you played sports. Tell what sports did you play?
- speaker: Respondent
  text: Really just football. Lynch was a big and I was told a story that some of the men that were hired at Lynch, they interviewed
    their male kids also to see which ones might be good for the football team, so--
- speaker: Interviewer
  text: I would say that's supported by others.
- speaker: Respondent
  text: The coach I had was Ed Miracle, and he was a good coach. I learned more about dealing with people playing football
    at Lynch, Kentucky with the African Americans and the other cultures in there than anything else I've done in my life.
    I've--
- speaker: Interviewer
  text: In what way, Bruce?
- speaker: Respondent
  text: Communications and understanding each other. How to communicate.
- speaker: Interviewer
  text: So being on those football field, where you're working as a team, had that kind of added benefit?
- speaker: Respondent
  text: Yes, most definitely for me, anyway, because whatever the issues were out from the football field, they you were there
    to win a game, you know, on the football field, and all these other nonessentials disappeared. And we went undefeated
    my senior year, so that was a credit to all of us.
- speaker: Interviewer
  text: It really was. What how many of your classmates would you say actually worked in the mines after graduation from high
    school?
- speaker: Respondent
  text: Not a big number. A lot of people left the area at the time because the mining industry was having its troubles about
    that time. The same applied to me. I'd say thirty percent.
- speaker: Respondent
  text: To pick a number. Yeah.
- speaker: Interviewer
  text: What were your activities I mean, what were your social activities in high school?
- speaker: Respondent
  text: Well, one of the things I don't know if anybody else has mentioned it or not but a big entertainment for us was the
    Benham Youth Center that they'd converted I think the old theater into it, and then Mrs. Bundy, God bless her, she monitored
    that and patrolled it very well. And but it was a safe place to go and I wish my kids had a similar scenario. But it's
    not the case this day and time.
