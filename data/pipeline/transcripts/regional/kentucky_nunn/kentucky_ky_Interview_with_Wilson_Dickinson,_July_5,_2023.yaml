turns:
- speaker: Interviewer
  text: So, Wilson, how are you today?
- speaker: Respondent
  text: I'm doing well, how are you?
- speaker: Interviewer
  text: Oh, I'm doing okay, yeah. You weathered the big weird storms?
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Yeah, did you get shelled for the 4th of July in Georgetown like we do in Lexington?
- speaker: Respondent
  text: Yes. You know, actually I was able to sleep last night, usually--I mean, most fourth of July is--you know, 4th of
    July already is kind of--I find to be an alienating holiday. And then when, like, there's just like all these kind of
    explosions going on all night and keeping me awake it's--
- speaker: Interviewer
  text: --yeah. The loud nationalism--
- speaker: Interviewer
  text: --(both laugh)--keeps you awake.
- speaker: Interviewer
  text: Well, I'm glad you slept, um, let's get into it. Tell me a little bit about yourself--I like to establish biography
    first, so just tell me a little bit about yourself.
- speaker: Respondent
  text: Well, I'm from Kentucky. So, I grew up in Georgetown and I live in Georgetown, um, and my only time outside of Georgetown,
    I went to school elsewhere. So, I went to school at Transylvania, across town here, for my undergraduate work and majored
    in philosophy. Um, I went to divinity school in Nashville, um, and then I went and did Vanderbilt, and then I went and
    did doctoral work in philosophical theology at Syracuse University. Um, and toward the end of my doctoral work, my dad
    was sick so I moved back to Georgetown thinking I would be kind of part of the itinerant intelligentsia and would never
    get to live here again. Um, and so we moved back while I was finishing my, um, doctoral work--so my dissertation. And
    I ended up, uh, getting some gigs at, uh, Transy. I, I taught in the philosophy department a couple years, and then I
    was the associate dean for religious life. Um, and then at a certain point, uh, there was a lack of congruence with vision
    and mission at Transy and also I had become involved--a lot of my--so as associate dean for religious life I was like
    some kind of blend of professor and pastor, and so I had kind of developed this--and, and it was a little bit before that
    that I started to getting into issues of climate and food justice. And so the model I developed there was really kind
    of about connecting academic, the kind of the wider community and the kind of--and the co-curricular around issues of
    food justice and faith. Um, and in the course of that process, I became more and more kind of embedded in that work and
    committed to it, and I wanted to kind of--in a lot of ways, give my life over to it. So I, I left there, um, my wife and
    I at the time were, were living in Georgetown already--we had, you know, moved back to Kentucky--we lived there the whole
    time. But we actually sold our house in Georgetown and one of our cars, and we moved in with my sister and my nephew and
    my mom. So, we have a multi-family household, we simplified our bills, um, and so I went about trying to figure out how
    I could organize around issues of kind of climate and food justice and have been kind of trial and error--(laughs)--doing
    that ever since.
- speaker: Interviewer
  text: (laughs)--that's awesome. Uh, how long did you teach at Transy?
- speaker: Respondent
  text: Um, I was back at Transy I think for six years. So, I was in the philosophy department for two and then associate
    dean of religious life for four or five.
- speaker: Interviewer
  text: Cool, and when did you get to Georgetown, how long have you taught there? Or--
- speaker: Interviewer
  text: --you lived there, sorry. Lex--
- speaker: Respondent
  text: --so yeah--
- speaker: Interviewer
  text: --Lex Seminary. My gosh--
- speaker: Respondent
  text: --no, no, that's--
- speaker: Interviewer
  text: --right? Yes. When did you get to Lexington Seminary and how long have you taught there? (laughs).
- speaker: Respondent
  text: Um, I guess I've been teaching there probably six or seven years. It's hard to remember because I was kind of brought
    in as an adjunct. Um, and then about four or five years ago, I was brought in to direct the Doctor of Ministry Continuing
    Education programs. Which is still a part-time staff position, so part of the adjunct-urate.
- speaker: Interviewer
  text: (laughs)--yeah. Okay--(both laugh)--com--the academy is so complicated.
- speaker: Respondent
  text: (both laugh)--yeah, that's right.
- speaker: Interviewer
  text: Yeah. And, like, what are you into other than, you know, all of your scholarly and activist work?
- speaker: Respondent
  text: Um, so I've, I've--I am the director of the Green Good News, which is really nothing more than an umbrella organization
    for a lot of disparate efforts that I'm a part of. So, part of that is rooted in food justice efforts in Central Kentucky.
    So--which is--um, I am--or, I am one of the organizers for Community Garden in Georgetown. It's a partnership between
    two churches, the, the college there owns the land. Um, and also--and, and a dinner church that I also am one of the conveners
    of. So, it's a dinner church that meets in our house, uh, it's called Green Christians--I guess is relevant for this.
    It's a small group of people committed to living our faith in ways that, um, are moving toward the ways of justice and
    joy and resiliency. Um, so there's the garden, there's the dinner church, um, initially I worked a lot with kind of different
    congregations doing classes and educational stuff around food and climate. Um, and--well--and I guess--to take one step
    back, initially I thought I would do something like a lot of the social entrepreneurial things that people do in food
    justice.
- speaker: Respondent
  text: Because I had gotten kind of plugged into some of those when I was at Transy with some of those organizations on the
    north side. Um, and actually, early on in that process I was having lunch with some friends and thinking about how to
    do this, and um, one of them--Steve Pavy--I don't know if you know him from kind of in the orbit--I think he, he got his
    PhD in sociology here. But he told me to go read a book called, uh, The Revolution Will Not Be Funded by INCITE!, this
    kind of collective of Black feminists. Um, and he was like, "Yeah, I don't think we need another nonprofit"--(laughs).
    So, so kind of early on, I shifted from that kind of social entrepreneurial--like, you know, like--let me make my own
    organization and, uh, lose all my hair trying to figure out how I'm going to pay my bills, um, by doing that. And instead,
    a lot of what I've been doing is kind of lending my energy to building some nascent networks, um, around issues of kind
    of Christian food movement and the Christian life. Um, and that's taken shape in a lot of different ways. Um, most recently--well,
    I guess my current kind of work is, uh, of this kind of collective organizing. There's an organization called Creation
    Justice Ministries, which is kind of a hub. Um, did, did Leah talk to you about that at all?
- speaker: Interviewer
  text: Yeah, a little bit.
- speaker: Respondent
  text: Okay, yeah. So they're kind of a hub from--it's a leftover from what was once the ecumenical movement, which was very
    important for me but, you know, it doesn't really exist anymore. They're kind of a leftover organization from that, so
    they're a hub of--or a bunch of different kind of progressive to liberal to mainline Christian denominations. Um, it's
    one of their kind of connector organizations. So, anyway, they--one of the things they're setting up is a series of retreats
    for pastors around issues of climate, um, and I guess they're doing it kind of in different regions or even bioregions.
    And I--and my understanding of that work is both to create a retreat, but then also to get together the kind of local
    people in the area, to connect them. Um, you--kind of that, um--kind of like the Poor People's Campaign, like, reversal
    of, like, where you do the mobilizing to start the community organizing, to start kind of bringing people together. So,
    I think they're trying to--so, so anyway, I'm part of a group that's planning a retreat, it's going to be taking place
    in Columbus, um, this coming October. And that's bringing together people in Kentucky and Ohio to, to begin to kind of,
    I guess, thicken those relationships, hopefully, and build that network. Um, another thing that I'm a part of right now
    is, um, there's this thing called the Westar Institute, which is, uh, an organization that brings scholars of religion
    together to do kind of cutting edge research. I'm kind of--I'm chairing a, a new seminar through that organization called
    the Christ Seminar, and it's on Christologies of the people. Um, and so this is--it's, it's--and so it's a group of international
    scholars, mostly people of color, um, and, and we're looking at these kind of people's traditions of Christology. We're
    kind of in some ways, um, both--I guess, centering and more deeply exploring traditions that have long existed, but also
    trying to do the public work. Because one of the Westar's kind of touchstones is doing research in the public for the
    public, and so doing kind of public work to reclaim, uh, progressive to left voice when talking about who Jesus is and
    what it means to follow him.
- speaker: Interviewer
  text: Oh, that's all awesome. So, yeah, you do a lot of cool stuff. What, um, just to backtrack a little, like, what sparked
    your passion for this? For food justice, climate justice, sustainability? It seems like you do a lot of sustainability,
    like, what sparked that passion?
- speaker: Respondent
  text: Um, yeah. I think--so--I mean some of it was just kind of waking up to the climate crisis, um, and wanting to do something
    about it, and kind of, I guess, using or following the kind of, uh, communities I was already a part of, the--what I was
    able to do. Um, another part of it was--there's, there's something, you know, tangible and beautiful and joyful about
    food, right? So I was doing--I mean--so I became interested in it and then also--and also became--started finding my footing
    in it on largely intellectual grounds. It was--I, I thought it, it was really interesting. There was a guy I--so there
    was a guy who used to teach at Georgetown named Norman Wirzba, who was kind of a--who is a scholar of this kind of intersection
    of, um, environment and theology. He teaches at Duke now. But we--we both came from this, like, the same arcane tiny corner
    of academia, and so I--kind of conversations with him and his work, um, were kind of helping this grow some. Also, I have
    some other kind of intellectual mentors, um, that were leading me in that direction. But really, I guess one of the things
    that really brought it together was teaching undergraduates. And so teaching undergraduates--and my background was kind
    of this intersection of European philosophy and theology. Um, post, post kind of, you know, the financial crisis of 2008
    it seems like students less and less were interested in these kind of, you know, let's, let's have the great conversation.
    And more of it was like, you know, like, I see my debt, you know, kind of building right now--(laughs). Why are we doing
    this? What are you doing in this classroom? And so there, there was also--like, there was a climate crisis, there was
    also kind of, like, a crisis of, like, pedagogy, and so part of it was just a desire to connect with students. Another
    part of it was that I--I mean, my--a lot of my teaching--and, and I understand my vocation and my ministry to be centered
    on issues of justice, but I felt like I was kind of doing this thing that Jane Addams talks about as the snare of preparation,
    right? It's where you get young people, you raise their awareness about all this kind of brokenness in the world, but
    then you create no avenues, um, to connect, to change, or another way of doing it. And so I kind of thought I was maybe--basically
    that if students were tuning into what I was trying to do in the classroom--it was really just a recipe for cynicism and
    apathy, right? Because it was just like, here's all these problems, and then you're just kind of stuck with them. Um,
    and so food and the kind of food justice movement was just--and for especially the Christian food movement, it's like
    this really incarnational, tangible, joyful way of, of engaging, right? And so it's all--like all this stuff, like the
    kind of food movement stuff, a lot of it is, um, very small scale to the point that, does it matter? And I think it matters
    in the way that, like, maybe this is how you start to build a movement. As you begin to taste alternatives and it changes
    and it kind of opens your imagination. And it also gives you--it's, you know, also kind of living in the ruins of liberalism
    and the kind of hegemony of neoliberalism, community and social connection is so tenuous that kind of what the food movement
    was doing was, like, giving you this kind of space to build those bonds and to build them around the ground that's like
    more, I guess, substantive and life giving.
- speaker: Interviewer
  text: Yeah, wow. You're saying all the words that I'm really into, this is phenomenal. Um, could I get you to unpack, you
    know, in your mind the Christian food movement?
- speaker: Respondent
  text: Yes. Um, so, it's basically a website. No, but there's, um--so I think around the same time, and I think it was kind
    of, uh, springing up around some of this foodie type stuff, people started wanting to connect their faith to that. And
    so that often happened in kind of community gardens. And, and, so people--and so churches started doing community gardens,
    and then people started thinking, well, what if we got outside the four walls of the church and the garden was the church?
    And that was the kind of the nexus around which the community was organized. Um, and so then those people kind of started
    connecting and start--started connecting with other people who were saying, well, what if we just--we had a farm and the
    farm was a church, and the farm was, like, this school where people were invited to also live there? And, and so all--so,
    so all these kind of different models, different ways of being church, or different ways of connecting religious communities
    with their surrounding community, kind of started rising up and--well, or started emerging. And then they started to be
    networked and there were a few, like, specific places that started networking those people. One of them that I got pulled
    into was Wake Forest Divinity School. It started, um--they were networking those people for a while, um, and for a while
    it was kind of--I mean, like some of the pieces of the food movement, it was very white, right? And so this kind of really,
    like, professional class, very specific, um, you know, almost, you know, lifestyle type thing. And I think that the last,
