collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: I understand from reading Breaking Breads that you were born in Israel, and you moved to Denmark as a child, and then
    came back to Israel later in life. In your own words, tell me a little a bit about your family origins, and where your
    parents were from, and how and when they got to Israel.
- speaker: Respondent
  text: Okay, so my parents were born in Copenhagen, Denmark before, before the war, went through the Holocaust. As many know--maybe
    people know--being saved by the Danish underground, and been moved with the fishermen to neutral Sweden. Came back to
    Copenhagen--this is--actually, they were really young, both of them. Didn't know each other, of course, at that time.
    And this is a history of the Jewish Danes, and my parents were Zionists. They came first as a--in the late in--like around
    when--there were eighteen to twenty came to Israel to kibbutz. Fell--got to know each other, fell in love, and decided
    to immigrate to Israel. This was in 1961--one year, actually, before I was born. I was born in Israel, but my parents
    really kept a Danish culture house--including furniture, food, all our traditions, and then--so it was like a Danish speaking
    house for most of my childhood.
- speaker: Interviewer
  text: So Danish was your first language or Danish--
- speaker: Interviewer
  text: --and Hebrew?
- speaker: Respondent
  text: Yeah, Danish and Hebrew, but at home, we spoke--actually, insisted until very late that we will speak Danish at home.
    And we were frequently going for visits to Denmark almost every summer vacation we spent there with--
- speaker: Interviewer
  text: --did you still have family there--
- speaker: Respondent
  text: --because we had a lot of cousins, grandparents, the whole family stay there. And because the Danish Jew weren't in
    any kind of danger, so people didn't--it was not a lot of immigration from Denmark to Israel. And at one point in my childhood,
    we went back for a couple of years mainly because my parents wanted us to connect with the Danish culture. Came back to
    Israel, did the regular Israeli routine like school, high school, did my Army service and became an officer in a special
    unit in the Army. And one maybe important point to--actually went back to Denmark, was eleven years old, and I was--I
    attended a Jewish school where actually--that's where I actually first got in touch with the kitchen because I took like
    a special course in the--like baking and cooking. And like I wasn't--
- speaker: Interviewer
  text: --was it like home economics? What was it called--
- speaker: Respondent
  text: --yeah, it was called--yeah, I don't know, what was it called? Let me think about it. I still have a--I still have
    my notebook from that time--
- speaker: Respondent
  text: --I still keep it. This was--having six, seven recipes. So I wasn't a very enthusiastic baker, but a few times a year
    I will actually take the initiative and bake some stuff so I learned at that time through all the years.
- speaker: Interviewer
  text: Anything stand out that you remember from that--
- speaker: Respondent
  text: --it looked like a--it was a croissant-shape--it wasn't a croissant, a traditional croissant, but it was croissant-shaped
    baguette, and--and filled with like butter, and sugar, cinnamon, stuff like this--
- speaker: Interviewer
  text: --sounds good.
- speaker: Respondent
  text: And another maybe important thing in my childhood was my mother was a kindergarten teacher--
- speaker: Interviewer
  text: --I read that--(laughs)--
- speaker: Respondent
  text: --and she actually were--the kindergarten were placed in our home. So coming home from school, from--and throughout
    my childhood, Friday was connected to a smell of baked challah in the house. And--
- speaker: Interviewer
  text: --how--a side from the challah, what other kinds of connections to Judaism did your parents have? Obviously, it was
    important to them when you went back to Denmark for you to go to a Jewish school. When you were here in Israel--you know,
    you're in Israel, and you're surrounded by all different kinds of Jewish culture. What kinds of things did they do at
    home a side from challah? Was--tell me about that.
- speaker: Respondent
  text: We were a very traditional Jewish family. We wasn't like what you call today religious. Like my father could go to
    the synagogue at Saturday, but he will come home and we can--we will drive and like--so we wasn't so--but Friday night,
    family sitting together, challah on the table, and the whole ceremony was--the Kiddush and the--
- speaker: Interviewer
  text: --prayer over the wine--
- speaker: Respondent
  text: --for the wine, for the challah, and the--after, of course, when we finish--we were finished to eat, we all have to
    sit and say Birkat Hamazon, and the--
- speaker: Interviewer
  text: --the blessing on the meal--
- speaker: Respondent
  text: --and living in Ra'a nana most of my childhood, so all the time the other kids were screaming from the street, "Come
    out! Come out!" They wanted over--to go to play after dinner--that's what we used to do on Friday. No, my father was very
    strict about we will have to sit all the way. So we also got a lot of family visits. At that time--let's talk more about
    when I was a child in seventies coming to Israel--flying--you don't come for a few days. When you come, you come for two
    weeks, three weeks, one month. So we were constantly having like especially grandparents, and uncles, and aunts in our
    house. So Friday was also very special. The house was also very kosher especially for the ground that my grandparents
    were really religious, could come and eat in our home and feel very comfortable. So the house was always very Jewish kosher,
    but not--never--we were never--beside the Friday evening, we were never forced to go to the synagogue, it was voluntary--"If
    you want to come with me," and--so it was a liberal, but very traditional house.
- speaker: Interviewer
  text: Yeah. And do you have--you have brothers and sisters?
- speaker: Respondent
  text: I have a bigger brother and a younger sister, yes.
- speaker: Interviewer
  text: Yeah. And what's the age gap between you all?
- speaker: Respondent
  text: My brother--my--my brother's almost five years older than me, and my sister was born a year and a half after me, so
    yeah.
- speaker: Interviewer
  text: Okay, nice. And your parents, do you know how they met? You said that they met when they were roughly eighteen?
- speaker: Respondent
  text: Actually, they met--(coughs)--I think they met--it's a little complicated to explain. They met as teenagers, they
    have a common--
- speaker: Respondent
  text: --cousin. No, they have a common--no, the brother of one grandparent, and the--another grandparent's sister, they
    married, so they actually had--they were--they're not cousins, but they have a common cousin, yeah? So I think they met
    when they were teenagers, but exactly where and how they meet I'm not sure. I just know--that's what I was telling you
    before--that my mother at one point took to Israel to kibbutz, and, actually, my father probably fell in love with her--he
    came--he came after her, but at that time, I don't know--as I remember the story, she had a boyfriend that she met here
    in Israel, but--
- speaker: Respondent
  text: --yeah, an Englishman--a Jewish Englishman. But my father won my--(laughs)-- mother's heart, and she went--they came
    back to Denmark, finished their studies at one time--or they got married, they decided they wanted to immigrate to Israel,
    so they both--from their college or university--decided to take like teacher education so they can teach. And not always
    a good decision, but, you know, my father was very worried what he will do, how he will teach because he was learning
    history and the more--and literature--and said, "Oh, I cannot learn Danish history in Israel," so he actually became a
    math and physics teacher in--
- speaker: Interviewer
  text: --wow, that's a big change.
- speaker: Respondent
  text: 'It''s important to note in my life because I saw a man that wasn''t very happy with what he''s doing in life, so,
    for me, growing up, I didn''t know what I wanted to do when I grow up, but one thing I knew: that I will have an occupation
    that I love. So this I felt was very in the front of my mind for a very long time--since I was a child with--seeing a
    frustrated teacher. (laughs)'
- speaker: Interviewer
  text: And you talk about the frustrations--(laughs)--you experienced a little bit. You described moving to Denmark when
    you were ten as a disaster--(laughs)--
- speaker: Interviewer
  text: --in the introduction. And the contrast--the language you use to describe the contrast between your beautiful home
    in Israel with the orange groves and the pool, and this tiny apartment in Copenhagen with five people and no shower. Looking
    back now, though, it seems like that was a pretty impactful experience. How would you talk about the way that your time
    in Denmark as a young child impacted you? Aside from--and I'm learning now--this amazing class that you took when you
    were eleven and--
- speaker: Respondent
  text: --yeah, I think it all was--it all happened in the summer of '73. And in September '73, there was the Yom Kippur War--
- speaker: Interviewer
  text: --yeah, I was just going to say--
- speaker: Respondent
  text: --and then my father, he took immediately a flight back to Israel although he wasn't a fighter, but he went to teach
    in the school as most of the teachers were out in the war. And so in general, I don't have very good memories--(laughs)--of
    that--of that period. I was kind of jealous I'm not in Israel when everything was going on there in the war. I actually
    wanted to be here with my friend. But just--it was so extreme--like also described in the book and what you read--between
    growing up in Ra'a nana in this weather, coming from school, throwing the bag, and was very free to go out, it was like
    a close neighborhood. And then coming to--to Copenhagen--even going to a Jewish school, you know, you're not going to
    school with the people who was your neighbors--
- speaker: Respondent
  text: --yes because you're going to a remote Jewish school. So as a child, just moving--it was a--also for my younger sister,
    we, we don't--although maybe we got something from the culture and the--we saw a lot in Denmark, but it wasn't a happy
    period. And, unfortunately, also the war started, so it's a--we really wanted to go. It was just finishing--waiting a
    year while finishing we would go back to Israel to our normal--
- speaker: Interviewer
  text: --so you were just there for one year--
- speaker: Respondent
  text: --a year and a half, yeah. After a year and a half, yeah. Something like that.
- speaker: Interviewer
  text: Kind of like a sabbatical of sorts.
- speaker: Respondent
  text: Yeah, Maybe they shortened the time after because--
- speaker: Interviewer
  text: --yeah, from the war. Did you--when you were--you know, did you--what was--I'm trying to ask a good question. (laughs)
    What was your experience as a young man, you know, being in an immersive environment in Israel where most everyone--not
    everyone--but many people are Jewish, and kind of taking that for granted, and then being in this place? You talk about
    how you'd go to Jewish school, but your colleagues are not your neighbors. And so do you have memories of what it was
    like? Obviously, the Jewish community in Denmark is different than all kinds of other places.
- speaker: Respondent
  text: I will say the Jewish community and our close family really like really helped us out, and really like--we were really
    surrounded with--the good thing about it was really like going to my grandmother every Friday, we also had a summer house
    near the beach, and we took a lot of trips to Sweden, to Norway, and--but, again, you know, three kids, sitting in the
    back of the car--(Fernheimer laughs)--fighting. No iPhones, no iPads--
- speaker: Respondent
  text: --and going for long trips. It wasn't always like brother, but in general, it was--we learned a lot, but we--I think
    we really--also because my father went back to Israel, we were really--
- speaker: Interviewer
  text: --missed him--
- speaker: Respondent
  text: --anxious to go back to finish this period, and then pushing our parents to go back the summer--the following summer
    and go back to Israel.
- speaker: Interviewer
  text: What are the foods that your grandmother made while you were there?
- speaker: Respondent
  text: It's a--it's a--food--food is a whole--maybe I will send you after--if you remind me, I'll send you a list my sister
    did once because I'm talking more about--
- speaker: Interviewer
  text: --what's her name--
- speaker: Respondent
  text: And this was a whole excitement when our grandparents or uncles would come to Israel because--so she actually described
    what they had in their suitcase--
- speaker: Interviewer
  text: --amazing--
- speaker: Respondent
  text: --so we're talking about the sixties, seventies, okay? And it's a lot around food. So, of course, Danish cheese, Danish
    smoked fish--salmon, halibut, mackerel, herring, of course--coffee, and licorice, and--
- speaker: Interviewer
  text: --black licorice or--
- speaker: Respondent
  text: --black licorice, yeah, the really strong--and she had a whole list of things. It was always--we knew exactly what's
    going to come out of the--and of the stinky--my father used to love really, really stinky cheese. And so it was a whole
    ceremony about--but I think also when we talk about food, what I--looking back to it about--okay, today's Danish food
    is really like--really high and really recognized all over the world, but I think for me, it's exactly what was in the
    suitcase. It was--and this was also, I think, it will take me until today, it's to--the connection to the ingredients,
    to the high-end ingredients. And not the complicated cooking--no, it's just--of course, they will bring, of course, the
    heavy rye breads with them. So it's just a rye bread with butter--no cream cheese--and smoked salmon. That's it--dill.
    And so it's all about the ingredients, and very clean, very straightforward. And I also remember at that time being here
    in Israel and also in Denmark, restaurant? Never heard about, we didn't go to it, never--I think the first time I went
    to a restaurant I was a teenager when I went first time to sit actually in a restaurant--
- speaker: Interviewer
  text: --and this was--
- speaker: Respondent
  text: --and we went from Ra'a nana to Tel Aviv with a special taxi to
