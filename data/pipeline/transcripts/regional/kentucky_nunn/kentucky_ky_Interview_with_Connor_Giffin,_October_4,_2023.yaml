turns:
- speaker: Interviewer
  text: Okay, so we're going to start with the, um, it's either the easiest or the hardest question I'm gonna ask, which is
    tell me a little bit about yourself.
- speaker: Respondent
  text: Yeah, probably the hardest. Uh, yeah, so I'm originally from the San Francisco Bay Area in California. Uh, I, I liked
    writing and wanted to find a way to do something with that. So, I, I looked for good journalism schools, ended up going
    to the University of Missouri for that. Uh, and at the University of Missouri, I heard about the Report for America program
    where they were looking to place kind of emerging journalists, um, in newsrooms all around the country to cover undercover
    topics. Uh, and Report for America is very similar to kind of Teach for America and AmeriCorps and some of those kind
    of programs. But, um, uh, I did get a role through Report for America and they placed me here in Louisville, Kentucky,
    uh, with the Courier Journal and I cover environment for them. I've covered environment since June of 2022 for that paper.
    Um, and part of my role there is to cover environment, energy, climate, natural disasters, some infrastructure and urban
    planning things that are kind of adjacent. It's a pretty broad beat that I've got to have a lot of fun with. Uh, and then
    part of that role was also, uh, the Mississippi River Basin Ag and Water Desk, which is basically just a big collaboration
    of environmental reporters all around the Mississippi River Basin, which includes the Ohio River Basin. Uh, and we kind
    of collaborate on stories around agriculture, water, climate, things like that, and share those all around for, for, republication
    and papers all over the region.
- speaker: Interviewer
  text: That's awesome. I have a lot of things I want to follow up on. Well, okay, a quick factual one. Um, how long is there
    a, a, sort of time limit to the Report for America position here? Like Teach for America is a two or three year?
- speaker: Respondent
  text: Yeah. So that program is, it's kind of annual. So, most people in Report for America do it for about two years. You
    do two years and there's like a check in halfway. After the first year, if either the newsroom isn't liking me or I'm
    not liking my newsroom or I want to try something else, um, you can cut ties after one year or you can renew for a second.
    I renewed for a second, so I'm in my second year now. Um, and there's an optional third year. So, I'll, I'll have the
    choice to renew. Um, I think they'll probably ask me around the end of this year, early next year, if I want to do that--
- speaker: Respondent
  text: --if they want to keep me.
- speaker: Interviewer
  text: Yeah. I won't make you go on record about whether or not--
- speaker: Respondent
  text: --(laughs)--well they, they--
- speaker: Interviewer
  text: --you like your newsroom --(laughs)--
- speaker: Respondent
  text: --they've asked me that and, uh, you know--
- speaker: Respondent
  text: --it, that's, that's something that I don't, I don't have time to really think about yet and I'll, I'll kind of feel
    it out when the, when the question comes, I think.
- speaker: Interviewer
  text: Yeah. That makes sense. Um, I want to go back much further than this, but I don't want to lose track of this question.
    So, you mentioned, you know, it's a pretty broad beat--
- speaker: Interviewer
  text: --this is one thing I wanted to talk to you about anyways. Uh, you know, in academia, one of the challenges we run
    into, as, I'm faculty, is that, nobody owns climate because it touches everything--
- speaker: Interviewer
  text: --and nobody owns environment, it touches any, everything. But functionally, you have to give it to somebody, right?
    Somebody has to teach the classes. Somebody has to confer the degrees. Somebody has to cover the stories--
- speaker: Interviewer
  text: --so how do you sort of navigate when, you know, stories seem to be traveling into a different beat or maybe you see
    something that is like not sort of technically yours, but clearly has a connection?
- speaker: Respondent
  text: Yeah. That, that's one of the challenges. It's funny that you asked that because we were just talking about that,
    um, with some of my Ag and Water Desk folks. We were kind of discussing, like, how can we as the environmental reporter,
    in most newsrooms, unless you're the New York Times or something, you don't have more than one environmental reporter.
    And so this huge beat kind of falls into one person's like, um, you know, we're the only ones in the newsroom thinking
    about climate every single day--
- speaker: Respondent
  text: --um, and we're kind of discussing like, what, how much responsibility do we have to tell our fellow reporters who
    are equally and overly invested - (laughs)-- into their thing that they're supposed to cover, and, you know, the business
    reporters and the politics reporters who spend all day thinking about their beat? You know, what is our responsibility
    to remind them? You know, I think you're, you're writing about this really important topic. Here's this angle. Here's
    how climate touches what you're writing about--
- speaker: Respondent
  text: --or here's how, you know, these things are intertwined because like you said, climate pretty much reaches every story
    that we write in some way if you, if you really follow it all the way down. Um, and so, that, that's kind of, I guess,
    kind of a hard question to answer is like, how, how much responsibility do we have to incorporate that climate angle into
    every story we write without, um, kind of beating the dead horse on it? And, and, and, uh, you know, I think, I think
    if you incorporate it into everything, it almost oversaturates the problem. But, um, yeah, that, that's the question is
    like, when, when do we cross paths on that and when do we try to keep it separate, I guess.
- speaker: Interviewer
  text: Right. Because you don't want it to become background noise.
- speaker: Interviewer
  text: Yeah. Okay. All right. Well, let's go way back. So, you're from the Bay Area, where in the Bay Area.
- speaker: Respondent
  text: I was born in the city--
- speaker: Respondent
  text: --in San Francisco, um, and then spent most of my formative years, uh, in more San Mateo County area. Um, grew up
    in Foster City for the most part and went to San Mateo High School.
- speaker: Interviewer
  text: Nice. Uh, I love that area--
- speaker: Interviewer
  text: My mom's side of the family's all like in San Francisco and North--
- speaker: Respondent
  text: --right, yeah--
- speaker: Interviewer
  text: --so we go visit every year, which is so nice.
- speaker: Respondent
  text: Yeah. My dad lives up in Marin now and that's--
- speaker: Interviewer
  text: --oh yeah--
- speaker: Respondent
  text: --gorgeous.
- speaker: Interviewer
  text: That's where, yeah. One of my aunts is in Marin. So, um, when I think of California, I think of a very different environmental
    landscape than we have--
- speaker: Respondent
  text: --absolutely--
- speaker: Interviewer
  text: --here. Right. So, were you like an outdoorsy kid or?
- speaker: Respondent
  text: Yeah. I liked hiking and camping and all those things. And I think that probably deep down was an influence in me
    trying to pursue this. Um, California is a different environmental landscape, both politically and, and, kind of their
    ambition to tackle climate questions, um, compared to places like Kentucky, um, politically. But, uh, it's also a very
    different landscape in terms of the problems they're facing. Um, you don't really hear Kentucky talking about running
    out of water as like one of our more immediate climate--
- speaker: Respondent
  text: --concerns, um--
- speaker: Interviewer
  text: --if anything, we have too much--
- speaker: Interviewer
  text: --water a lot of--
- speaker: Respondent
  text: --the time.
- speaker: Interviewer
  text: Um, and so that was kind of, that was another adjustment to make because everywhere you go there's different kind
    of first climate problems that are arriving earlier than others--
- speaker: Interviewer
  text: --mm-hmm. Do you think, um. I mean, were you, so were you paying attention to that stuff while you were living in
    California? The--
- speaker: Interviewer
  text: --sort of political piece of it and, and what was going on?
- speaker: Respondent
  text: Yeah. I mean, when I was living in California, I, I left from Missouri when I was seventeen and I, I didn't know I
    was going to even go to journalism school until maybe a year before that.
- speaker: Respondent
  text: And I had no idea I was going to be covering environment at all, um, when I, when I was living in California. Um,
    but I do remember as a kid, my parents telling me, hey, like we're not supposed to use too much water. Like, the, the
    state told us, you know, take shorter showers, don't wash the cars often, things like that. Um, and I remember, you know,
    the, the wildfires and things like that were, were in the news and--
- speaker: Respondent
  text: --things like that. Um, and so it, it was definitely something that you couldn't completely not realize was happening--
- speaker: Respondent
  text: --even as a kid. But it wasn't something I was maybe thinking of, as, uh, (laughs) as often as I am now, which is
    pretty much all the time (laughs)
- speaker: Interviewer
  text: --all the time. Yeah. But also, I think there's maybe an age element, right? As, um, this would have been in like
    the two, 2000s and 2010s, right?
- speaker: Interviewer
  text: So, I wonder how true that was that, that it was like background noise in previous decades. And I, I don't know what
    the answer is, yeah--
- speaker: Respondent
  text: --yeah, I really can't speak to that. Like I, it, like I said, it was something that as a kid you hear about and--
- speaker: Respondent
  text: --you're probably as a kid, I probably did not put too much weight on it. And--
- speaker: Respondent
  text: --it was just like, oh, politics, you know--
- speaker: Respondent
  text: --I wasn't really--(Cagle laughs)--into the news or
- speaker: Respondent
  text: --anything back then. So--
- speaker: Interviewer
  text: --yeah, I recently found a report I wrote in fourth grade about global warming that I--(Giffin laughs)--in like, that
    would have been 1994 and I--
- speaker: Interviewer
  text: --have no recollection--(Giffin laughs)--of knowing about global (laughs) warming in 1994--
- speaker: Respondent
  text: --yeah, you were a head of me in fourth grade.
- speaker: Interviewer
  text: I, I guess I, I'm sure it was a, uh, an assigned topic, yeah. Okay. So then like, how do you go from I don't know
    what I want to do to I'm going to do journalism school and I'm going to do the environmental beat.
- speaker: Respondent
  text: Yeah, I mean, I, there aren't too many things you can do with writing that will give you any semblance of a paycheck--
- speaker: Respondent
  text: --and journalism is one. Um, and so I was like, let's try that. And I, I moved across the country and started journalism
    school and, uh, liked it for the most part. Uh, it was hard, but I, you know, generally liked the feeling of what I was
    doing. And I tried a lot of beats, um, in, in school because, uh, the University of Missouri's journalism program is very
    hands on and they have you writing for, uh, the Columbia Missourian, which is the, the university run paper there. Um,
    and I working for the Missourian and I, I covered public health and safety. I covered politics, I covered, uh, a little
    bit of business. And I also covered the environment for about a semester, um, plus. And that was the beat that I felt
    the most like personal passion towards doing and that, that I felt excited to be writing about and felt like the problems
    that I was writing about and talking to sources about were really all encompassing, like we mentioned earlier. It's something
    that reaches pretty much every area--
- speaker: Respondent
  text: --um, of things. And, and, um, I, I like the feeling of writing about something that big and that important. And,
    um--
- speaker: Respondent
  text: --so I when I was applying for jobs, uh, near the end of college, that was, you know, kind of the top of my list was
    to keep doing that.
- speaker: Interviewer
  text: That's interesting that you came to it through the process of discovery, like trying out different beats, because
    I think so many people think of environmentalists as like sort of lifelong --(Giffin laughs)--you know--
- speaker: Interviewer
  text: --advocates, like you must have grown up hugging trees and--
- speaker: Interviewer
  text: --um, but no, that you can come to it, that you can discover it as an interest area.
- speaker: Respondent
  text: Yeah, I, I think it's, uh, I, I've always cared for the environment and things like that. Uh, and I think maybe it's
    a generational thing too, where it seems like younger and younger people are, are more and more realizing, you know, maybe
    how screwed we're about to be. And maybe we should start, um, uh, seeing what, what solutions are out there for some of
    the problems
- speaker: Respondent
  text: --that we are establishing. Um, and, and so I think a lot of people my age, uh, are, are probably more invested in
    finding a way to incorporate those concerns and, and, and finding kind of a purpose driven career, um, uh, towards finding
    a way to address some of that.
- speaker: Interviewer
  text: I think that's true from my experience advising students, undergraduate students in environment and sustainability.
    Do you think of what you do? Or have you like done training in solutions journalism?
- speaker: Respondent
  text: Uh, I, I would say solutions journalism is something that kind of is incorporated into any, any story that you spend
    a decent amount of time on--
- speaker: Respondent
  text: Um, there's, there, I guess there's a way to incorporate solutions journalism kind of adjacently. And then there's,
    you know, solutions journalism, like proper noun. You know, this is something we're actively putting as a top priority
    for everything we cover--
- speaker: Respondent
  text: Um, and I think sometimes it can be hard to incorporate it fully, um, just based on deadlines and kind of the pace
    of things. But I think it's something that especially in the climate beat, with any kind of long term project, it's something
    that I at least, try to find a way to incorporate an, and, and ask questions in the interviews for those projects that
    will work towards kind of reporting out potential solutions. Um, because climate anxiety and climate doom, you know, I
    think is not productive towards, um--
- speaker: Respondent
  text: --the overall problem. And, uh, solutions journalism is almost kind of a, a responsibility of people on the beat,
    I think, to kind of combat that and make it--
- speaker: Respondent
  text: --make it clear that it's, it's not we're not completely past the turnaround point on some of these things.
