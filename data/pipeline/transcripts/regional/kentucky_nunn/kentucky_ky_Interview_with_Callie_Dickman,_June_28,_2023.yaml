collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: All right, well, let's start with an easy question. Tell me a little bit about yourself.
- speaker: Respondent
  text: For sure. Um, so I am currently a student here at the University of Kentucky. I'm a rising senior, so I'm going to
    be a senior in the fall. Um, I'm from northern Kentucky, um, like the Union Florence area. Um, at UK, I'm studying a dual
    degree with environmental and sustainability studies and natural resources and environmental science. Um, so I'm just
    really passionate about the environment. I love being outside. I love nature, all of those things.
- speaker: Interviewer
  text: Has that always been true for you?
- speaker: Respondent
  text: Um, I've always loved being outside, but when I was younger and all throughout all of my schooling until college,
    I never really thought about sustainability or environmental science. Um, it was more just like, "Oh, I appreciate nature
    and I love nature, but I don't know anything really about it." Um, and I always kind of felt--I don't know--I always kind
    of viewed nature as an escape.
- speaker: Respondent
  text: I never really connected it to my life, other than just like, I like being there.
- speaker: Interviewer
  text: Were you--so you're from Union--
- speaker: Interviewer
  text: --right? So is that, like, did you live in a place that you could sort of quickly get to outside spaces? Or--
- speaker: Respondent
  text: --um, what I really liked about where I grew up, I just grew up in a suburb, pretty basic, boring little area--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --um, but I appreciated it because we could run free in our backyard and there was a fake forest. So it was like a
    little line between the houses that when I was a kid I thought was huge and there was a creek. So it was fun to roam there,
    but then it was also very nice because we lived, like, thirty minutes away from Cincinnati where we could go, like, downtown,
    feel like more city urban areas. While also then we would go down to Grant County Dry Ridge and visit my relatives who
    lived on a farm and it was more nature, more natural areas. So I felt like--I really appreciated that like, I don't know,
    the different realms and I was just able to experience it all. So I kind of got it all, and I think that really like,
    I don't know, got my mindset where it is. I'm like urban and green spaces and the connection of it all. I think it's cool.
- speaker: Interviewer
  text: The--so did you have a lot of family with sort of that, like more rural background, then?
- speaker: Respondent
  text: Um, yeah, so my mom's side was more like from the rural areas in Dry Ridge. And then my dad's side was more like the
    suburbs and the city areas. So bit of both.
- speaker: Respondent
  text: But yeah, I remember I would go visit my mom's side and I would feel like a fake little like farm girl--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --and I would just be like, I get to go live my dreams of like having a garden and horses and cows. And it was fun.
- speaker: Interviewer
  text: But then also leave at the end.
- speaker: Respondent
  text: Yes, exactly, and then go back to just like not having to take care of those things.
- speaker: Interviewer
  text: Do you have siblings?
- speaker: Respondent
  text: I have an older brother. Um, his name is Willis. He's two years older than me, and he is also studying environmental
    science. So something in the way we were raised, I guess.
- speaker: Interviewer
  text: --so I mean, do your parents, would they consider themselves environmentally minded?
- speaker: Respondent
  text: Um, I think my mom is more like environmental like policy and more about those issues. And my dad just really enjoys
    being outside. He's really into like fly fishing and kayaking and those types of things. So they both kind of have their
    own ways of like respecting and enjoying it.
- speaker: Interviewer
  text: Interesting.
- speaker: Interviewer
  text: So when you came to UK, did you know that you were going to have these dual majors?
- speaker: Respondent
  text: Um, I started with just environmental and sustainability studies, which is just ENS because I like never really heard
    about environmental science or sustainability in high school. But then when I was looking into careers and what I wanted
    to do, I was like, what am I passionate about, passionate about and like what would be fulfilling for me while, also,
    I could like give back to the world. Um, and I thought that was perfect. And I was like, this sounds interesting. So I
    chose ENS. Um, and then I did that for a year and it's a Bachelor of Arts. And in high school, I really enjoyed science
    and math. And I kind of missed that side. And I also kind of missed, um, the field work, I guess I was interested in trying
    out. So I added natural resources, environmental science, NRES, which is housed in the College of Agriculture versus the
    College of Arts and Science. Um, so then I would get the more like plant specific, like, ID skills and like field skills
    and then the more technical side, I guess. And I really liked the overlap so far between the two.
- speaker: Interviewer
  text: Yeah, so, what were you into in high school then? Like, were you in clubs? Were you doing a lot of other stuff?
- speaker: Respondent
  text: Um, in high school, I really liked music. I was in band. That was my main thing, and then I played tennis, um, but
    I just really liked hiking and I like being outside. Um, but it never really reflected like in my school. There wasn't
    like any sort of like garden club or recycling club or anything like that, um, which I always thought was like, interesting.
    I never really thought about it until now. I like look back and I was like, that really could have changed like a lot
    of things. Um, but so I never really got involved, but I remember I would go to like 4-H club or I would go to like our
    local like parks or arboretum and I was like, these are so beautiful. And so I really enjoyed those.
- speaker: Interviewer
  text: Were you in 4-H then?
- speaker: Respondent
  text: I, um, did. I went to 4-H camp once. And then we would--every once in a while, they would have like a little like
    event or just like a one-off like class or something that we would go to, but not super involved--(laughs).
- speaker: Interviewer
  text: It's interesting considering because you graduated 2020--
- speaker: Interviewer
  text: So, you would have been in high school 2016 to 2020--
- speaker: Respondent
  text: --mm-hmm [affirmative]--
- speaker: Interviewer
  text: --and that's the period where we were seeing like, you know, really massive school walkouts, like stuff being led
    by, um, like, Greta Thunberg. And I think there's this idea that, you know, a certain generation or like generations graduating
    at that point have this like, just, I don't know, like natural environmental--
- speaker: Interviewer
  text: --but no, it's a matter of your kind of--
- speaker: Interviewer
  text: --where you are.
- speaker: Respondent
  text: And I definitely like, I had like Greta's book when it came out, like No One Is Too Small to Make a Difference. And
    I remember I was really excited about that. And then I like, um, I remember like hearing about climate change and just
    like learning about it. And then, especially during COVID, when we were just stuck at home and just reading more about
    like how that was changing the world and how it was also affecting like and connected to the environment and social justice
    issues. And then I was kind of just like sitting in my room connecting it all, and I was like, oh, this is interesting.
    And then it was cool.
- speaker: Interviewer
  text: Uh, so you graduated high school into COVID?
- speaker: Respondent
  text: Yes, yes, so I did not walk senior year. I got sent home on a random day, and I, um, yeah, it was a mess.
- speaker: Respondent
  text: I remember my last day--
- speaker: Interviewer
  text: --how did that go? Yeah, tell, tell me about that last day. I'm so curious.
- speaker: Respondent
  text: Um, well, I actually had a doctor's appointment--(both laugh)--So it was like a doctor's appointment that I could
    not cancel. And it was in the morning. And I was planning on just like not going to school the rest of the day. And then
    like a few days before they announced, they were like, this is going to be your last day. And I was like, oh, so I did
    not go to school in the morning of my last day of high school ever--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --um, and then I showed up with like two hours left in the school day. And I walked in and I was like, "hey, do you
    mind if I run around and talk to all my teachers and like get all my stuff from everywhere? Because I wasn't here this
    morning." And they were like, "why weren't you here?" And I had also gotten an ear piercing that day. So I was like, my
    ear was like bloody and I had been to the doctor's appointment and then I was like running around. But it was really surreal
    just because the last hour they kind of just like let everyone sit there. And we were all just kind of like sitting there
    reflecting, especially the seniors. I remember I was in the library and I was just like, well, see you. Like, I don't
    know. I went to the band room because that's where I spent like a lot of my time being in band. Um, and I was like, this
    is crazy. And I said bye to like all my teachers and then we just left. And then I don't know--
- speaker: Respondent
  text: --we were just stuck at home. Um, and then a lot of my like senior classes kind of just like gave up. They were like,
    we don't really want to like keep going. Um, so they did like weekly check-ins or we like had a Zoom, but, and we would
    like read for class and stuff. But it was, it was definitely surreal, um, and it was very insane.
- speaker: Respondent
  text: I don't know. It all happened very fast.
- speaker: Respondent
  text: And then, um, we did like the virtual graduation and then we were able to do like a graduation ceremony. We actually
    went to the Kentucky Speedway.
- speaker: Respondent
  text: We were able to, like, do a lap and like get our diploma--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --but we couldn't like, they wouldn't let us like talk to our friends or like--
- speaker: Respondent
  text: --you know, um, so it was all very safe--
- speaker: Respondent
  text: --but it was kind of cool. I don't know--(both laugh)--
- speaker: Interviewer
  text: --I mean, who else got to graduate at the Kentucky Speedway?
- speaker: Respondent
  text: This is true. Yes, yeah.
- speaker: Interviewer
  text: So that is, well, and then you start college.
- speaker: Respondent
  text: Mm-hmm, and it was still--
- speaker: Interviewer
  text: --that must have felt, I don't know. I don't want to put words in your mouth, but I imagine if I were in your shoes,
    it would have felt very anticlimactic.
- speaker: Respondent
  text: It was, um, I know my first year I really struggled because I was--I lived in the dorms, which was nice. But I lived
    with my like childhood best friend, which was also really nice. I kind of glad like, cause we knew each other and we really
    liked each other. And I'm really appreciative of her always, um, but it was hard to meet new people. So I met like my
    first year--my only person I met in my major, um, their name is Carly and I live with her now--
- speaker: Respondent
  text: --and we're very good friends. So she's the one that like stuck, but, um, she's like the only one that I actually
    met with and connected in my major for that whole first year. Um, all my classes were online. And then it was also very
    hard learning about like the environment and like learning about climate change and like how to protect like nature and
    outdoors and also how to protect people when you can't like interact with them.
- speaker: Respondent
  text: Um, and then I also feel like a lot of, like, when you first like jump into learning about climate change, it's a
    lot of doom and gloom. Um, so that was like all thrown on me while I was like sitting in my dorm room alone, like looking
    at a computer screen--
- speaker: Interviewer
  text: --(laughs)--mm-hmm--
- speaker: Respondent
  text: --and I was like, this is not good--(laughs)--
- speaker: Respondent
  text: --um, but I got through and then the next few years like have been amazing. And I've been able to actually like go
    to classes and meet people and like engage in like positive ways. But it was definitely hard and it was definitely a challenge.
- speaker: Respondent
  text: --I'm very grateful for where I am now and the people that I've connected with because I, um, like, just in the past
    few years with like internships and jobs and like meeting with professors, I've been able to like grow so much and learn
    so many new things and have so many opportunities and get like engaged on campus and in the Lexington community.
- speaker: Respondent
  text: Um, and I feel like--like a part of me is sad because I'm like, I feel like I could have done that my freshman year
    if it wasn't during COVID. And I feel like I could have even grown even more. But also I'm so grateful for where I am
    now, and I think, you know--
- speaker: Respondent
  text: --we all got through it together.
- speaker: Interviewer
  text: Yeah. What is it? What is it that the Governor Beshear always says? Like, we'll get through this--
- speaker: Respondent
  text: --yes, yeah--
- speaker: Interviewer
  text: --we'll get through this together--
- speaker: Respondent
  text: --Just over and over--
- speaker: Interviewer
  text: --when he was doing the daily--yeah, yeah. I mean, I think that's the hard thing about regrets, right? Is like, who
    knows what it--
- speaker: Interviewer
  text: --life would look like otherwise?--
- speaker: Respondent
  text: --yes, yeah--
- speaker: Interviewer
  text: --if you're happy with where you are right now. So one last question before we talk about where you are right now.
    What did you play in band?
- speaker: Respondent
  text: In band, um, so I started in sixth grade. I played piano before that, and then when I joined band, I played flute.
    I really wanted to play saxophone and I could not for some reason. But I'm really glad I played flute. I feel like it
    was fitting for me. Um, and then so I did that all through high school. And then in marching band, I played flute for
    two years and then I was drum major for two years.
- speaker: Respondent
  text: So that was exciting, but yes.
- speaker: Interviewer
  text: Do you still play?
- speaker: Respondent
  text: Every once in a while I pick it up and goof around. But, um, and I always told myself because I was like, oh, I'll
    go to college and join a little group. Like I didn't want to do band in college because I didn't want it to be like my
    thing again. Um, but then it was COVID, so nobody was like getting together and playing--
- speaker: Interviewer
  text: --right, yeah--
- speaker: Respondent
  text: --so then I was like, never mind.
- speaker: Interviewer
  text: Especially the woodwinds--
- speaker: Respondent
  text: --mm-hmm, yes, we weren't, yeah--
- speaker: Interviewer
  text: --and the wind instruments. It's, like, you don't want to be blowing--
- speaker: Respondent
  text: --mm-hmm, yes. Very close to each other--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --um, but--
- speaker: Respondent
  text: --I really enjoyed it, and I think it's a good skill to have--
- speaker: Respondent
  text: --I love music.
- speaker: Interviewer
  text: Why? What do you love about it?
- speaker: Respondent
  text: Um, I think it's just the way it portrays emotion, and then it can also connect people li
