collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: One of the things that you had mentioned, when we were kind of midway through, was the informality of Israeli food,
    food-ways, in cuisine, and I wonder if we might start there, because I think that's a really different part of how food
    works here. Do you want to talk a little bit about that?
- speaker: Respondent
  text: Yeah, sure. First of all, I think everywhere, food, and the way people eat, reflects the character of the nation or
    culture, it's always connected, and it's always fascinating to observe that. For example, think about Italians, and their
    adoration of tradition and heritage, how it is reflected in the way they eat, it has to be very local and typical, and
    at certain times. Try to find a place to have lunch in Italy after 3 PM, for example. There are times when you eat, what
    you eat, and how you eat. Israelis are very different, as we know, and maybe it's just as it is too early to talk about
    Israeli cuisine, it may be even too early to talk about the Israeli nation, because it's something in the making, and
    changing a lot. But the informality, the directness, the lack of manners, even, is something that I think is very typical
    of Israelis. I remember when I first came here, I was a new immigrant from very polite Latvia. I would curtsey when I
    was introduced to somebody, to a grown up, at the time, I was taught to curtsey literally. Then I come to Israel, and
    they say, "You know, they address the Prime Minister by his first name." That changed, and he's walking without a tie
    on, you can just talk to him and say "Yitzhak," or whatever. But yes, there are the informalities at the very core of
    the Israeli character, and when it comes to food, well, first of all, very flexible eating hours. If you think about Tel
    Aviv, this is probably the best place to have great food in the morning, or late at night. Also during the day, but you
    can find really good food at 2 AM, which is quite unique. And the minute or the time as soon as the small plate, so tapas,
    trend hit the world, the culinary world, Israelis embraced it with great joy, because it kind of resonates with the Mezze
    culture, the Mediterranean, Middle Eastern, small plates meal, but also it's very typical of the way Israelis entertain.
    I'm sure you've been to Israeli homes for Shabbat lunch, or dinner, or during the week. It's rarely first course, main
    course, last course, it would usually be what we call in Hebrew liftoach shulchan, literally open up a table, or make
    a spread of it, lots of food that everybody's sharing. So the whole sharing thing, the whole mopping up things—you know,
    I always make fun of my husband who thinks food preserves, or anything that is kind of creamy and mousse-like, should
    be mopped up with a piece of bread—as if it's like tahini, or hummus, or labneh, or something like that. So that's that.
    The fact that sharing, breaking the tradition of a proper meal like first course, main course, last course. Large quantities,
    Israelis are very generous with their helpings, both when they entertain and when they eat themselves. And if you think
    about restaurants, then I always say you can never be underdressed in Israeli restaurants, only overdressed. Which again,
    things are changing, there are some very elegant places now, but even there, most Israeli men probably own one tie, which
    they wore at their wedding or bar mitzvah. Again, I'm exaggerating, but that's the spirit. So you're informally dressed—even
    the very elegant restaurants rarely have linen mats. They would have placemats, and then something you could have, mishmash
    silverware and dishes from the flea markets, and the kind of Bohemian chic that is very popular. So yes, all of that coming
    together is a mark of the local food culture.
- speaker: Interviewer
  text: And that kind of informality, does it translate—and you've kind of talked about it both in terms of the dress, and
    the hours, and how people eat, but also kind of what people eat? We spent the last conversation talking about some of
    those foods. I think about French cuisine, and sort of regimented kinds of techniques, and the kind of path that you work—you
    learn to make a roux, and you learn to make this, and you learn to make that.
- speaker: Respondent
  text: Yeah, but I think here we're going more to the cooking techniques, and it's tricky, because if you think about French
    cooking, it is very regimented, there are certain ways to make certain things. But if you look at the rest of the world,
    not all the world adheres to these principles, even though there are debates in most professional cooking schools, and
    that includes Israeli chefs as well. The better ones—even if they didn't go to school in France or formal culinary education—they
    definitely work in Michelin starred restaurants. So they have the basic—you need to have some basic technique, and you
    know how to do things, but what you do with those techniques, how you apply it, or how you play with it, is a different
    thing altogether. So if you think about their training, it's a mix. If you're talking about the way the food is served,
    or presentation, or flavor combinations—I think we talked about last time the fact that you're not only allowed, but encouraged
    and expected to be innovative, to be creative, to break the rules. It's funny because sometimes people don't even know
    what the rules are. But it has to have some kind of logic and system underneath, and I'm sure good chefs have that, otherwise
    it would turn out very difficult to be successful or just serve really good food.
- speaker: Interviewer
  text: But you know, I guess kind of talking about this training and things like that, we are starting to see a little bit
    of that formalization process here. If you think about some of the institutes and organizations, what do you think that
    means, or how that will shape and continue to impact the way that people think about Israeli food, food-ways, and cuisine?
    I'm thinking about the institute they're starting up north, in the Galil, and the kinds of work that Asif is doing here,
    in Tel Aviv.
- speaker: Respondent
  text: Well, there are several things happening, and they are not necessarily connected, but they probably all attest to
    the fact of our culinary progress or culinary path. Not in one particular order, but let's say in early 2000s or late
    nineties, the food revolution was started in Israel. Most or vast majority of aspiring chefs went abroad to study simply
    because there were no options in Israel at all. There were some usually how-to-cook hotel cooking schools that were kosher,
    quite dated, based on the kosher version of classical cuisine, classical French cuisine, which is not something really
    amazing. So in those days, people went abroad because there were simply no options here. Then when food became food, and
    restaurants and the whole dining culture became more prominent, really high quality cooking schools started to open up,
    and today there are quite a few. If you want to get a really solid culinary education, you can do it in Israel, with places
    like Danon or Bishulim. You mentioned the Galilee Cooking School. I'm not very familiar with exact details, but I think
    what they want to do, in addition to enabling people up in Galilee in the north to have culinary education, is to connect
    with local cuisine, local ingredients, and influences. Which brings me to Asif, which is something different. Asif is
    an organization that wants to promote research, amass knowledge and information, and engage people with various aspects
    of local food culture that can be quite not exactly mainstream. For example, the bread culture in seventeenth century
    Jerusalem. But when you are at the expedition and you read the text, you realize how relevant it is to the modern day
    to understand the contemporary local food culture. So that's more of a research body. I'm not sure if formalization is
    the right word, but yes, we're getting more because food is so popular, and because food here is so fascinating, and because
    there are all these different Israeli versus Arabic, and immigrant food versus local food, it's very interesting to explore,
    to study, and to. I'm not sure I'm answering the question exactly, but I think this is something that is definitely happening.
- speaker: Interviewer
  text: It's okay, this is the beauty and the benefit of a multi-prong interview.
- speaker: Respondent
  text: Okay, sure, so you can edit it out if you need to. Well, what I was saying—I remember when my first book came out
    in 2007, and then 2008 in the U.S., and I think one year later, in 2009, I had a group of American food writers brought
    to Israel for a food tour, which I led. And that was, for me, between me and myself, I called it the bragging tour. "Look
    at us! We can make great wine, we have proper restaurants, we make amazing olive oil, see how delicious our bread is,
    how delicious, how cheap—we're as good as anybody else." That was kind of, "Look, mommy, no hands," like you're a kid
    driving the bicycle. Today, it's not necessary anymore. People who come to Israel know that they're in for a really amazing
    culinary experience. So now the interesting question is what it is that we are cooking, and eating, and growing here,
    and how it evolves, and how it's shaped, and what is local, what is local wine, how does it taste? Wine is a really good
    example, because thirty years ago, the question was, "Can Israeli wine makers make decent wine?" The answer was, "Yes,
    of course they can." Now, let's see if they can—I remember one of the members of my group in 2008, a friend actually,
    she asked, "Yes, we had some really nice cabernet sauvignon and merlot, but if I had drank that wine in California I wouldn't
    know the difference." She was disappointed that there was no local flavor. Like in Tuscany, taste the wine and you think
    about pasta. I was almost irritated, so I said, "Wait. Give us some time, it's too early for that." But today, I think
    she would have been much more fascinated by local wines that we made, by using local, by exploring Asian varieties, by
    trying to find the wine that reflects local terroir, things that we—that's like the second stage of the food revolution.
- speaker: Interviewer
  text: Yeah, the second stage kind of coming back to that sense of locality, and there's even that—the next may come from
    Kentucky, we have that huge distillation industry, but now there's even distillation happening here.
- speaker: Interviewer
  text: I think about how Jullius Craft—
- speaker: Respondent
  text: Jullius—exactly. Wow. Have you tried some of his creations?
- speaker: Interviewer
  text: Yeah, yeah, so someone we know through our professional circles is married to someone who was connected with the distillery,
    and I can't remember exactly, I think the grandfather was maybe one of the fathers, but we brought that etrog liqueur
    last time we were here, and mainly used it for cooking and some cocktails because it was very strong. But to me, that
    kind of epitomizes this sort of local—etrog is not something you're going to find in the U.S., except for maybe in Jewish
    communities around Sukkot. And then they're so pesticide ridden you can't turn them into liqueur without also bringing
    the chemicals, but they have all kinds of flavors—
- speaker: Respondent
  text: Oh yes, they're beautiful stuff. And there are quite a few of them, and then even if you look at the cocktail scene—
- speaker: Interviewer
  text: Yeah, that's new, right?
- speaker: Respondent
  text: Well, what do you mean by new? I mean, it's been around for almost a decade, and there are quite a few places that
    won accolades. I think Imperial Bar was named the best cocktail bar in the Middle East a couple of years ago. The craft
    cocktail is not something that Israelis invented, it's a trend that was imported, definitely from maybe New York or London.
    But what they do—the ingredients they use, local herbs, and even wild edible plants, is very local. So that's another
    thing that we can see the changes.
- speaker: Interviewer
  text: Yeah, maybe I just didn't pay attention on previous trips, but I really was kind of struck in how the craft cocktail
    wave had arrived here, and this is something that was kind of like the mid-2010, 2013, like in the U.S., this is when
    this started to happen, and even impacted the bourbon industry, and helped make it much more popular. And here,
