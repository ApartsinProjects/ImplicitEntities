turns:
- speaker: Interviewer
  text: And so, Nicholas Jamerson, I'm gonna let you tell me a little bit about yourself.
- speaker: Respondent
  text: Well, I was born in Louisville, Kentucky. Raised in Eastern Kentucky, Floyd County. My early years was like Floyd
    Park, Letcher County. I'm the oldest of four children. Nicholas, Emily, Clay, and Joseph. Recently, I've been going through
    a lot of old home movies, and it's just reminded me of a lot of, like just the music that I was immersed in from just
    day one, pretty much. Um, always, always like around music. Um, and, uh, sports, sports was like--my, my grandfather played
    at Kentucky. Um, my dad was a coach.
- speaker: Interviewer
  text: What did he play?
- speaker: Respondent
  text: He played football.
- speaker: Interviewer
  text: Oh, football.
- speaker: Respondent
  text: Yeah. He was on this team.
- speaker: Interviewer
  text: Oh, wow. What was his name?
- speaker: Respondent
  text: Shorty Jamerson.
- speaker: Interviewer
  text: Shorty Jamerson.
- speaker: Respondent
  text: Wilbur Shorty Jamerson played for Bear Bryant at Kentucky.
- speaker: Interviewer
  text: Have you ever looked in the archive for anything?
- speaker: Interviewer
  text: We'll have to do that.
- speaker: Respondent
  text: Yeah, I would love that. Yeah, he went here. That's where he met my grandmother here.
- speaker: Interviewer
  text: Shorty was nicknamed for what?
- speaker: Interviewer
  text: Wilbur, okay.
- speaker: Respondent
  text: Wilbur Shorty Jamerson, because he was five nine, 160 pounds. Yeah, so, him, my grandmother, my aunt, my aunt Mary
    Osborne, they all went here, and--to UK. And I was around them, you know, when I go through, like, my family archive,
    I'm just surrounded by people of that era. A lot of aunts and uncles and great aunts and uncles and my great grandmother
    and I just feel like part of me is like rooted in that time, you know, like just this like pre-World War era of people
    that kind of, you know, essentially crawled out of the mud, you know. That, that, that's such a strong foundation of,
    of who I feel like I am is, is those kinds of people that, you know, pre capital, you know, capitalistic America, like
    they're just trying to live their life and--so much was about gathering, you know, about being together. That's the thing
    that I think when I see these videos, it's like, "Wow, we were together a lot." And there's no cell phones. There's--it's
    all just like presence. And so, I feel like I've spent the latter half of my life trying to, find that in a new way, you
    know, because they're all gone, and--
- speaker: Interviewer
  text: It's not happened naturally these days.
- speaker: Respondent
  text: I think there's just so much other distraction, so many other things going on. And yeah, I mean, it's been interesting
    because I feel like in, in the--as life has--you know, I think modern day, you--especially in small towns, and maybe it's
    always been this way of, you go to school, you get the job, you move out, you move away, and you're pursuing a job, usually
    money, you know? You know, I went to school and I moved here and I started playing music. And in the process, you know,
    the old home place in that time deteriorated and it wasn't there, it's not there anymore. And by the time I could--was
    like old enough to realize like, "Oh, shoot," you know, "Maybe I need to foster this or nurture this," it was, it was
    just too late. You know, like, the, the squatters had got it and the kudzu was, was, was, you know, eating the house and--(sighs)--you
    know, it's just like, things like that have to be preserved and it just gave me a--it's not just like life--it, it doesn't
    just happen. Like you have to show up and, like I said, nurture those things. And so, I kind of feel like I'm in this
    re--Like, I'm trying to have my version of that, you know. I'm trying to really--at this point in my life, after just
    finishing this tour and--I feel like I've been really mission-based in my life, like just really driven for what my goals
    were and what--I think it comes back to my sports background, just super driven and focused.
- speaker: Respondent
  text: But I think what has happened in that process is that--and it's always, I think, the struggle or balance of pursuing
    anything is your relationships, you know. Your relationships suffer, I think, or they can. Trying to shift to like more
    relationship-focused. And, you know, as we enter the holiday season, it's like, yeah, it's really, it's about, you know,
    like this past weekend at the get-down, it's like I was trying to soak in the people, the, the hang before and after and
    like this is the only--this is like a time that we can all be together. And, um, you know, just growing up, music, that's
    what it always was, was like we gather and we play music. It was like these things that went hand-in-hand, and I think
    like now, you know, I think I heard someone say the other day like cell phones are like cig--like the modern-day cigarette,
    like you can like just take a break on your cell phone and--
- speaker: Respondent
  text: But back then it was like, well, if you don't want to talk, you can just go over in the corner and play or, you know.
    We, I just remember watching my, my grandparents, they would pass out these like song books, so if you didn't know the
    song, you could, you could, you could follow along, you know.
- speaker: Interviewer
  text: That's brilliant.
- speaker: Respondent
  text: Yeah. Yeah, my grandmother would just set up the camera in the corner. And I have like just, I have tapes of three
    hours of there just people sitting around, playing, like, passing songs around.
- speaker: Interviewer
  text: So, those were documented?
- speaker: Interviewer
  text: Somebody documented those? That's fantastic.
- speaker: Respondent
  text: Yeah, my grandmother, she--she always had a camera and was always documenting. And I really felt like, it's so funny
    watching videos as a kid, because we're like, you know, she's just enamored by us grandkids. And, you know, then we're
    like, "Let's watch the tape. Let's watch the tape." And looking back to those tapes, it just made me feel like she, there
    was so much gravity, you know. Off air, you were talking about soaking it up and really grasping like children and raising
    kids. I felt that from her, that it was like, this is important, what we're experiencing right here. This moment is really
    important and I wanna like document this and remember this forever. And I feel like that really at my core is, sort of
    my philosophy, I guess, with songwriting, is it's a document--it's a documentation of a moment in time. And it's saying,
    hey, this moment, this feeling, this thought is worth writing down and sharing. And it all comes back, I feel like, to
    those home movies. Because, yeah. She'll have a camera up of us just, you know, all the grandkids just jumping in the
    pool. You know? And screaming and fighting at each other. And so--
- speaker: Interviewer
  text: That's fantastic.
- speaker: Respondent
  text: Yeah, I'm really thankful for it.
- speaker: Interviewer
  text: I didn't come from a family of document--documenters. And I remember, for the first time, my uncle sent us a bunch
    of film that he wanted me to digitize, because I'm the archivist and I know how to do it. And so, I get this film digitized
    from my uncle. And it was my grandfather that went through a phase where he was carrying one around. Um, never around
    when we were around that I could remember. And I'm--I digitize these things, and I'm going through it, and right there
    I saw myself for the first time. I had never seen myself until the era of cell phones on moving image. Like--
- speaker: Interviewer
  text: You know. So, none of my childhood was on that. And I'm watching this, and here I am like probably, you know, a year-and-a-half
    old.
- speaker: Interviewer
  text: And I'm just--just start weeping. It was really wild to see that. But you have the opposite. And wow, what--not to
    get nerdy on you, but what format did your grandmother shoot on?
- speaker: Respondent
  text: It was just videotape.
- speaker: Interviewer
  text: Is it the little ones or the--
- speaker: Respondent
  text: The big ones.
- speaker: Interviewer
  text: The big ones? So, you get those all digitized?
- speaker: Respondent
  text: Uh, in the process of it. I did a lot of that last winter.
- speaker: Respondent
  text: And then I thought that I'd gone through most of it. And then my dad has pulled out some new stuff. Yeah, a new layer
    of it. And you talk about seeing yourself, you know, it's--I think that, yeah, it's important, I think, to stay in touch
    with that side of yourself, your roots and your core and who you were before the world got a hold of you. And it's like
    this, I call it like achy nostalgia, where it's like, oh, man. It hurts because it's not that way anymore. A lot of those
    people aren't there anymore. But it's sweet because it's like, oh yeah, that's who I am, and that's where I came from.
    Musically, in particular, like the last week, you know, I think that I'm always trying to like stay in touch or reinvent
    my purpose of like, why do I do what I do? Because I--I've been very fortunate to have made a living doing what I do for
    fifteen years, like playing music strictly for fifteen years, and feeling pretty comfortable, you know. I don't need--I
    don't really have like a big living expense, you know, so I've--but I don't have to like really worry about work or anything
    like that. So, you know, money's not like my reason for doing a lot of the things that I do. You know, sometimes having
    a family, you're just like, "Yeah, it's a good payday. I'm going to go do it." But I feel like if you don't--and what
    I do as an entrepreneur, as someone that's outside of corporate USA, as someone who's also not trying to necessarily,
    like, pursue mainstream success. Like, I'm open to it, but I'm not like, I'm not, I'm not really like in the Nashville
    ecosystem. I've been a part of this thing in Kentucky the last twenty years of my life, trying to create something, be
    a part of something different. But with that, you know, there's no like direct return a lot of times, and it's just up
    and down. And so, it has, the process for me is like what drives me.
- speaker: Respondent
  text: And--but even then, you can get lost and, you can just get lost in it. And with these videos, I've just been like,
    like I said before, I've been seeing myself as a two-year-old. and my aunt is like talking to my great uncle, and she's
    like, "Yeah, Nicholas is in the basement playing drums, and he always asks for Kentucky music. And if it's not fast enough,
    like, he's like, 'Faster.'" And I was like, man. Like I was just, you know, I'm not thinking about anything at that age,
    I'm just like talking, and like it's pure, just--and I was like, wow. Like I was already like sort of leaning towards
    this. And it kind of goes on in the video. And it's my grandmother's sixtieth birthday. And everybody's gathering, playing
    music. And I'm just like--(claps hands)--I'm two years old, like, just clapping along and dancing. And I grab my harmonica.
    And I'm playing. And I'm like, "Faster, faster!" And just watching that, it just, I was like, wow. Like, maybe this is
    what I'm supposed to be doing. Maybe it is, and I'm not just--because I feel like I have, you know--I just always have
    to reckon with that. Of like, why am I doing this? Is this feeding my ego? Am I pursuing like these superficial things?
    And--but music has just always moved me, and, and it's always been a thing of like, that was side-by-side with gathering
    and belonging, more importantly. Of like, I just remember being in my great-grandmother's living room, surrounded by all
    these people that are this warmth of togetherness, you know, and belonging. And that's it for me. That's what I feel like
    music, at the core of it, is what I want out of it, is just the togetherness. And it's hard when it's your job, too. (laughs)
    You know? When you're also trying to make a living and those lines get blurred. And so--
- speaker: Interviewer
  text: Well, I saw you for the first time on Saturday night at The Burl. And, a couple observations; one of those was, I
    felt like, now that you said it out loud, I felt like you were up there being like, "Faster, faster--" (Jamerson laughs)
    You know, like the night. Like I felt that.
- speaker: Respondent
  text: At times for sure.
- speaker: Interviewer
  text: That's really interesting. But I also felt you were really--and I want to talk about this tour, but like--you're really
    good at working the crowd.
- speaker: Interviewer
  text: In a--you know, you see different people have different styles of doing that. And you just seem to be one of the most
    authentic crowd workers. You just, you know, you just connect. And I think that's where--I felt that, and we talked off
    camera about like, you know, me being with the old people in the back and, you know, all the people talking and, you know,
    I'm sure they were talking up front too. But I think that, you know, when you bust into Heinemann and you suddenly hear
    that sort of elevation of everyone singing along, you know, and I'm sure you feel that, that like, where like, on one
    level, this is your job, and you gotta play the hits, and how many times in your life have you played this song? (Jamerson
    laughs) But when you feel that crowd singing along, like--
- speaker: Respondent
  text: That's it. That's the stuff. Yeah. It's everything, really. Like, that's the moment that we're, like, those are the
    moments that we're, like, constantly pursuing, you know? And it is this like balance of like, I want you to meet me where
    I am, of like something new and different. But I also want to serve you. So, it's a line. It's a--but, you know, that
    song is so special to me and my family and a reminder of a sweeter time and, and also like, it's always like a special
    moment in the set for people. That song in particular, I feel like it'll probably--I don't know. I don't know what the
    future holds, but it's a special song to my family and to listeners. And it's also, I think, with music--like I said,
    it's a way to preserve memories and preserve moments. So, like to get to, to share a family song that's so personal to
    me with so many people, it's crazy.
- speaker: Interviewer
  text: All right, I have a confession for you.
- speaker: Interviewer
  text: So, I don't know if it was because I had three kids during this time period, but I completely missed Sunday Best.
    (Jamerson laughs) Like, and I'm a musician and I try to pay attention. I missed it completely. So, so, when, when I met
    you in Heinemann at the songwriter retreat, like our workshop, maybe, what, six months ago, and you played that song,
    I was like, "Who is this?" (Jamerson laughs) It was like, you just played this, you know, for, you know, forty of us,
    you know, and, and, you know, there was a moment where I was just like, oh, geez, I got to get out of here. What am I
    doing at this? This is, I'm a terrible songwriter and whatnot. But, but, but now since then, I've really dived in, complete,
    you know, the whole catalog, and it's been fun to actually track your, your, your progress in the sense of your trajectory
    of songwriting. And, but I love that like my introduction to you wasn't, you know, this star writing, you know, writing
    hits.
- speaker: Interviewer
  text: It was songwriting. And so, when I listen to everything, that's what I key in on. And I usually do that, but it was
    great that it wasn't skewed, I think, by this stardom thing.
- speaker: Interviewer
  text: So, but when, but again, and I've, you know, I've seen YouTube, uh, clips and, and researching for, for this, but--from
    the bars,
