turns:
- speaker: Respondent
  text: To define Israeli food, you can ask one thousand people in Israel, "What is Israeli food?" and you will get one thousand
    answers. And this is actually what it is because one calls Israeli food maybe gefilte fish that their grandparents brought
    from Poland, and it's very popular in Israel. And another one says it is the Moroccan fish, that spicy fish they eat on
    Friday every Shabbat. So it is, it is impossible to define it from this point of view. For me, it is the mixture of all
    of these different things and experiences and kinds of raw materials, et cetera, with a lot of vegetables and a lot of,
    lot of spices, but not at the same time, not in--(Hebrew) It is for us here, it is the ability to play with all these
    raw materials, with all the rich and huge assortment of vegetables, fruits, and herbs that we have here and that we grow
    here. This gives us a huge space to manipulate all these together to something that is suddenly a new future. But everybody
    does whatever he feels like. And I think that this is a cacophony of tastes. Some of them are very successful, and some
    of them are very pretentious without really, really any oversight. For me, it's my liberty to do whatever I want.
- speaker: Interviewer
  text: Tell me--I want to back up a little bit. I understand that you were born to German parents here in Israel in 1944,
    if I'm--what I read is not mistaken.
- speaker: Interviewer
  text: Tell me about--a little bit about your family origins and how your parents met and when and how they came to Israel.
- speaker: Respondent
  text: My grandfather-- from my mother's side was a delegate--was a delegate of the American Jews to the first, the first--
- speaker: Interviewer
  text: --Congress?--
- speaker: Respondent
  text: --Congress.
- speaker: Respondent
  text: And he was actually born in Germany. There was his father and left when he was very young. He was a musician. His
    mother was an actress and traveled and left the children in an orphan house in Germany. And so he was, he was grown up,
    and a much elder brother. And the brother went to the United States, he was a lawyer. And when he grew up, my grandfather,
    he went to United States looking for his brother and didn't find him. But he saw all the Jewish people in New York that
    were suffering--was very bad years--very bad years. He, he, he tried to go to the first Jewish Congress in order to recommend
    that they will train some people and prepare all the necessary things to bring all the poor people from the United States
    to Palestine once it is freed from the Ottoman government. He was--when they finished the Congress, he realized that the
    best thing is if he will go and live in Palestine and make the preparations to make this dream come true. He started agronomy,
    and he married a German-origin lady that was working in a bacadus bank in Jaffa. They got married, and in 1906, she was--got
    sick and had a problem in her lungs and couldn't live in Jaffa. So she moved to Germany, and there, she was living, and
    my grandfather came every Congress--Jewish Congress to Berlin. And then they had children by congresses.
- speaker: Respondent
  text: And every child who reached the age of eighteen came to live with the grandfather. With their father, my grandfather.
    My grandmother was killed in Theresienstadt in a camp. And my mother arrived in Israel in 1930. My father was born in
    Poznan.
- speaker: Respondent
  text: Poznan, it was in Poland today, it was--
- speaker: Interviewer
  text: --how do you say it--
- speaker: Respondent
  text: --as today it's Poland, it was German at the time. And in 1918, after the First World War, it was given back to Poland.
    And they were--how you put it--they were sent out as, as German from there, and he lived in Berlin for a while. And then
    he went to the first Jewish School--agriculture school in Hanover, Ahlem. And he--(Hebrew). Where were we? Yeah, so he
    was, he was studying in the first Jewish agriculture school to make Aliyah, he was a Zionist.
- speaker: Interviewer
  text: Where was the agricultural school located?
- speaker: Interviewer
  text: --(Hebrew)--
- speaker: Interviewer
  text: Hanover, okay.
- speaker: Respondent
  text: Alem, it was called. A-l-e-m--A-h-l-e-m.
- speaker: Interviewer
  text: And he came to Israel when?
- speaker: Respondent
  text: 1930 or so.
- speaker: Interviewer
  text: 1930 or so.
- speaker: Respondent
  text: A bit later after my mother came. And they worked with Jewish organizations, settlement. And they lived in the kibbutz,
    like the kibbutz that they built up.
- speaker: Interviewer
  text: Where was that kibbutz?
- speaker: Respondent
  text: It was near Kafar Yehezkel, Afula in this area. And later, he--(Hebrew)--yeah.
- speaker: Interviewer
  text: And when did they move or land?
- speaker: Respondent
  text: My brothers moved to Akko in 1934. And my parents--my mother worked in a coffee shop in Akko, and my father went every
    day to Nahariya, which was not built yet. It was just to prepare the land for the newcomers to come, and it was a swamp,
    so they had to dry it and to make all the work. And then when Nahariya was founded, they didn't have enough money to pay
    him for his work, so they gave him a piece of land. And that's how I was born in Nahariya.
- speaker: Interviewer
  text: Okay. You mentioned something interesting, one of the articles I read, that while you were growing up, your parents
    fostered other children.
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: But we have also children. But at that time, it was very complicated because the government was not there, the Israeli
    government, and children came from the war, from the Holocaust and without their parents others with some very different--difficult
    behavioral and other problems. And our house was open, so--(laughs)--
- speaker: Interviewer
  text: --so people came in and out?--
- speaker: Interviewer
  text: And how many siblings do you have?
- speaker: Respondent
  text: Today, we have actually direct contact with three of them. One of them is in Arabica, and the other one--it's children
    that we have really contact with for years, and we're celebrating the holy days together and so on. And one, Bila, is
    in Australia, and she comes and spends all her vacations at home. Before, she came to visit my mother and stayed with
    her on her vacations, and now she's coming in to visit us, which is approximately six weeks a year, she's living with
    us in Nahariya.
- speaker: Respondent
  text: And so it is kind of--and myself, we have three daughters and three girls that was grown up in our house.
- speaker: Interviewer
  text: Okay, now I understand what you mean.
- speaker: Respondent
  text: One of them came yesterday home from England for three weeks--
- speaker: Respondent
  text: --with her children. And she's coming every year and making her vacations here. She's a doctor in search of infectious
    diseases at King's College in London. So it is not, not boring in our house.
- speaker: Interviewer
  text: (laughs) I bet not. And did you have other siblings that your parents had other children?
- speaker: Interviewer
  text: Do you have other brothers and sisters?
- speaker: Respondent
  text: Two sisters, yeah, but they, they are already gone.
- speaker: Respondent
  text: Yeah, me too. (laughs)
- speaker: Interviewer
  text: Yeah. I understand that school was challenging, and that you enjoyed fishing, from the things that I read.
- speaker: Respondent
  text: Well, school was not challenging because it was not a school. I spent most of that--I have attention disorder, and
    I have very little patience for teachers, and for studying. And actually, I had an agreement with them that I will not
    disturb them from teaching, and they will not disturb me from going to sea and spending my time there.
- speaker: Respondent
  text: And I managed to stay with this agreement until I was sixteen, and then they decided that they can't control it anymore,
    and five years too late, they throw me out of school. They should've done it five years before, but they didn't. So I
    started to travel a little bit and doing all kinds of things, but I learned my own way in very, in very different--many
    different disciplines. So I have a small knowledge in a very wide range of things, and if something interests me, I'm
    going deeper into the matter. It's not--somehow it took me many years to understand that having attention disorder is
    a privilege and not a curse.
- speaker: Interviewer
  text: What, what made you finally realize that?
- speaker: Respondent
  text: When I realized it's thinking different, and it's not necessarily thinking wrong. Yeah? Because before, I thought
    that if I'm thinking different than most of the people, then I must be wrong and not them. I found out after many years
    that most people don't think, they follow. So if you think, and you have your own conclusions, and they are different
    of what the true thinkers or non-thinkers think, that doesn't have to discourage me from going with the things I believe
    in or I understand. It just matter what I believe in, is not religious, it is my understanding.
- speaker: Interviewer
  text: When did you begin to have a sense that you might be interested in things connected with food?
- speaker: Respondent
  text: It was, it was being connected to the sea, is by definition being connected to seafood and all kinds of small things
    that I found out that are edible. And mind you, it was the time of big shortage in food, and we didn't have any meat or
    eggs, and everything was in, in portions, you know?
- speaker: Interviewer
  text: Yeah, rationing.
- speaker: Respondent
  text: Yeah, rations. And it was, it was also very expensive to the, to the balance of what my parents earned and all the
    children at home. So I was finding all the shells and things that were edible and so on, and it's not--it developed, you
    know, over the years. But the real understanding of the power, the social power of food, was when I started to travel,
    and I had this bus I was cooking in and living in.
- speaker: Interviewer
  text: Is the VW bus you bought in Germany?
- speaker: Respondent
  text: I bought it in Germany, and I traveled to India with the bus. And on, on the way, I discovered the power of food as
    a social event, you know, where everybody wants to be your friend in such a situation where everybody is going for some
    smells of food from home or some tastes. And they suddenly start in the middle of the desert to cook, if not people, then
    animals will come from all holes, out of holes, and come and sniff around and see if there is any leftovers for them.
- speaker: Interviewer
  text: How old were you roughly at this time?
- speaker: Interviewer
  text: How old were you when you were cooking in the van? How old--what--
- speaker: Respondent
  text: I was--I finished my army service, and I started to travel. And I was between twenty-one--I traveled before, but it
    is actual-- it was from twenty-one to twenty five, four years I, I traveled. It's a superpower. There are two things that
    can make friends very fast. One is music, and the other is food. If you are a painter or a mathematician or whatever,
    you know, it might be interesting type of thing talk about. But to be a friend of someone who knows how to cook and far
    away from home it's something that is a privilege that only few people find. And eating in local restaurants, but also
    if you cook at home, if you invite people, and they know you're making good food, people are happy to come and taste it.
    There is something to talk about, and they, they respect much more many other things because it's also something you can
    satisfy many people at the same time. Like music, a concert, if you give a good concert, everybody who was moved by your
    music wants to meet you, wants to talk to you. And the same with the food, you know if you cook, then you have many people
    around. They want to ask you, "How are you doing this? How are you doing that? Where do you find these spices?" All, all
    of the things around it are interesting, it's not just--if you look at someone who paints very well, you can envy him
    for knowing to paint, you know? But it is more or less ended there. Music and food is something that is ongoing interest.
- speaker: Interviewer
  text: Yeah. So while you were traveling in this van all across in India, tell me about that. What kind of really inspired
    you to begin to think that food might be something you could do?
- speaker: Respondent
  text: It is not--I had to eat, and I had my van, and I had my cooking equipment with me, so it was just natural that I had
    all this bad food in the desert of Persia and so on, or in Afghanistan or wherever, Turkey and some places. If you want
    to have something that is a little bit different, and it's an adventure, and people are coming and sniffing and saying,
    "Wow, wow, may we taste this? Can we join you?" and so on. And usually, everybody who likes food, we always cook a little
    bit more than we need. But I don't know how it happened.
- speaker: Interviewer
  text: (laughs) So you have some to share.
- speaker: Respondent
  text: In my poorest, my poorest times, I still cooked more than I could eat, so there was always someone who enjoyed this.
    And I think that this is something that is binding people, like very few other things.
- speaker: Interviewer
  text: So when you came back to Israel after all these travels, what, what year was that when you returned here?
- speaker: Interviewer
  text: After traveling, when did you return to Israel, what year was it?
- speaker: Respondent
  text: I returned to Israel in '69. After my travel, I came back home on a Monday, and on Sunday, I went to a party of a
    friend. He was finishing his underservice, and a party is for my neighbor, and it was finished. It was, it was on a Friday,
    she came to the party with someone else. I told her, "I'll take you home," and she said, "No, I'm with someone else, but
    we'll meet tomorrow morning." We met Saturday morning, went to the beach which is just near our house, and we still live
    on the same street near the same scene. And then we spent the whole day together, then more on Sunday. I go to the train
    to go to army service, and when she came back on Friday, we already had the house rented on the beach, and we moved to
    live together. And I haven't offered he
