source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Would you start by just telling me a little bit about yourself?
- speaker: Respondent
  text: Sure. Um, so, for the last thirty years or so, I've been the forest ecologist at the University of Kentucky in the
    Department of Forestry. It's now called the Department of Forestry and Natural Resources. Um, and in that role, I have--my
    position there was largely research, so ecological research and forest systems. And then I also taught a course called
    forest ecology every year, um, which will probably come up in this interview. And then I was also very involved with the
    interdisciplinary undergraduate program in natural resources and environmental sciences. And I was the chair of that program
    for ten years. Is this the kind of answer you're looking for?--(laughs)--
- speaker: Interviewer
  text: I actually, at the start of every interview, like that question, because I think it's interesting when someone answers--
- speaker: Respondent
  text: --where we go, okay--
- speaker: Interviewer
  text: --an open-ended question--
- speaker: Interviewer
  text: --and I mean, you know what the focus is--
- speaker: Interviewer
  text: --that's where you're going--
- speaker: Respondent
  text: --yeah, okay--
- speaker: Respondent
  text: --okay. So I'll continue. Um, I was also, um, one of the leads on the, um, greenhouse living learning community at
    UK that only lasted a couple of years, but was an opportunity to engage students in thinking about sustainability on campus
    and in Lexington and beyond. Um, let's see, I am now retired or semi-retired. I'll be fully retired in a month or so.
    And I'm working on a couple of projects that are kind of passion projects that stem from the work that I was doing and
    sort of continue some of that work, but less in the vein of ecology research and more in the vein of, um, engaging people
    and thinking about what sustainability could look like, and certainly linking that to climate change, which has been one
    of the things I've been thinking and talking about for a really long time--(laughs).
- speaker: Interviewer
  text: And where are you from?
- speaker: Respondent
  text: Ah, I grew up in Colorado. Um, yeah, I grew up in Colorado. I grew up in Denver, actually. Uh, I, uh--I got really
    interested in environment and environmentally related things when I was in high school and, um, and so I've been kind
    of my whole life, I guess, kind of seeking a path for being able to be engaged in solutions to environmental issues and
    challenges. Um, so I lived there until I was eighteen or so, and then I went to college in several different places--(laughs)--uh,
    yeah.
- speaker: Interviewer
  text: Where did you go to college? What are the different places?
- speaker: Respondent
  text: Well, first I went to college in Maine. It was really far away from Colorado and I was trying to get far, far away.
    Uh, but then I discovered there were too many trees there and it was too cloudy and so I left, and I moved to California,
    and I took a year off. And then I moved back to Colorado and went to the University of Colorado for a year and then discovered
    that it was too large. And in the interim I worked at an outdoor school called the National Outdoor Leadership School
    where I went to people on wilderness courses for like thirty days at a time, and then I went back to Colby College in
    Maine and convinced them to give me credit for a semester of academic work because the teaching that I was doing at NOLS
    was being used by the students who came to NOLS as academic credit. So I figured if they get academic credit for what
    I'm teaching, I should get it for what I'm teaching--(laughs)--so they did that. And so in the end I graduated from Colby
    College. Yeah. Yep. Then I did a master's at, uh, Yale School of Forestry and the Environment, um, which was an amazing
    place to go to school, not because Yale is amazing, which it's very challenged in many ways, but the forestry school was
    incredible, um, and really at the time had very little to do structurally with the rest of the university. And then I
    worked for a little bit, and then I went to Cornell to do my PhD, um, mainly because I found somebody who would work with
    me to do my PhD with them, but do my PhD in Colorado. So I got to go home, uh, home and work in the mountains of Colorado
    for my PhD project--
- speaker: Respondent
  text: --which was understanding the ecology--the ecosystem ecology of a subalpine spruce fir forest.
- speaker: Interviewer
  text: And how'd you get to Kentucky?
- speaker: Respondent
  text: Right. Well, so I'm an academic--(laughs)--and so getting to Kentucky entailed, um, you know, looking for a job. And
    Kentucky was the furthest south I looked. And that year there were several jobs available and I was also pregnant. And
    so I got two job interviews, but the second job interview was in Utah and it came too late in my pregnancy for me to fly
    out there. And I interviewed first here and I was offered this position. So I've lived here for thirty some years--(laughs)--thirty
    years.
- speaker: Interviewer
  text: I wanted to ask about NOLS. Do you know, I think it's David Leemon.
- speaker: Respondent
  text: David Leemon. What did you say his last name?
- speaker: Interviewer
  text: Leemon--L--
- speaker: Respondent
  text: --oh, Drew Leemon?
- speaker: Respondent
  text: Drew Leemon.
- speaker: Respondent
  text: Does he work--did he work--does he work in Leave No Trace?
- speaker: Interviewer
  text: I don't know.
- speaker: Interviewer
  text: I know a friend that his father works--has worked for NOLS and that's how he got into--
- speaker: Interviewer
  text: --everything that he does and is now working for NOLS in New Zealand.
- speaker: Respondent
  text: Oh wow. Yeah. I--that name sounds very familiar and it sounds familiar in the context of the--so NOLS really, um,
    pioneered the Leave No Trace curriculum. You know, the whole concept of traveling in the wilderness without leaving a
    trace. And Drew Leemon, I'm pretty sure that's what he did and what he was leading. I'm pretty sure that's his name, Drew
    Leemon. Yeah. And I guess he would be my age or slightly younger. Yeah. That's crazy. Yeah. I mostly, I entirely worked
    out of the, uh, Lander, Wyoming office in various mountain ranges in Utah and Wyoming.
- speaker: Interviewer
  text: Cool. I'm pinning that for later--
- speaker: Respondent
  text: --(laughs)--
- speaker: Interviewer
  text: --of all the places that you've lived, how did you experience this type of work differently?
- speaker: Respondent
  text: Mm. Yeah, I mean, that's a really interesting question. I mean, first of all, because I've lived here for thirty years,
    that's a long time in the context of awareness about climate change. Um, yeah, but even so, I think that a lot of different
    things are kind of tied up together. And so, um, I remember when I--well, I remember when I was at Colby--I'm going to
    talk about food now, even though I don't know how--I don't know that at the time I thought food had any relationship to
    very much. I don't know if I understood that at all. But when I was at school at Colby, a bunch of my friends had a, um,
    a food co-op buying club. And so the food would come in, I don't even remember how often, and it would just be big boxes
    of stuff and we would sort through it all and then disperse it however, based on what you had ordered. So it was like
    a buying co-op. And so that was really my first exposure to co-ops. And then I moved to New Haven where Yale is, and,
    um, somebody I met there said, well, Mary, you know, you got to go to the co-op. And I'm like, okay, what's the co-op?
    And so he said, well, you know, you got to go to the co-op and sign up and become a co-op member because obviously that's
    how you should buy your food. And obviously it was how I should buy my food. And, um, so I've always been a member of
    a food co-op ever since. And, um, I was even saying to my husband the other day, you know, I can't imagine, like, what
    are the things you couldn't imagine living here if it didn't exist? And for me, it's the food co-op. And you know, food
    co-ops are constantly challenged in part because they have a particular, although somewhat dynamic model that doesn't
    fit well with our corporate model for how food is delivered to us. And so they have to continue to change to stay current
    in the contemporary, um, employment environment while adhering to a certain set of goals, which I think is very challenging.
    Um, so when I moved from New Haven to Cornell, which is in Ithaca, New York, there was a fantastic food co-op there, um,
    which had to rebuild after it was burned down. Um, but it was really a place where my understanding of what it meant to
    buy food cooperatively was solidified. And so when I came here to interview, the person who interviewed me somehow intuited
    that I needed to know whether there was a food co-op. And she took me by it and showed me there's a food co-op here. And
    so I--when I got home, I said, Rob, there's a food co-op. I think we can move to Lexington. But I also felt about Lexington
    that, um, you know, in certain ways, it would have been more comfortable to stay in Ithaca. I don't feel this way anymore.
    Um, but at the time, it felt like Ithaca was kind of thirty years ahead of us here. And my feeling about that was, well,
    we could try to live in a place that's already figured out how to embrace some of the progressive, um, values that we
    hold, or we can go to a place where we can be part of helping to contribute to those progressive values. Um, and so I
    think we came here, you know--I think--we used to say to each other that we felt like we'd moved to America. Um, and that's,
    yeah, so I think I saw this as a place that there were ways that I could become involved in things that I cared about,
    where all the issues weren't already solved. Yeah.
- speaker: Interviewer
  text: And have you seen change in that since moving here? Like are there specific things that you--
- speaker: Respondent
  text: --yeah, for sure. So I would say--first I would point to, um, UK. So I always wanted to be, um, able to participate
    in making higher education more focused on sustainability issues and topics. And so when I came here, the Natural Resources
    Program, which had a slightly different name then, had just started, and it wasn't even an official major yet. It was
    like an individualized major, individualized curriculum. And I'm pretty sure I was hired in large part because I had come
    from, um--my own major had been environmental studies. I think it was easy to see that I was an ecologist, but that I
    was also--you know, could wear this other hat. And so when I was first hired, I was hired with this expectation that I
    would contribute to that program. And I served on the steering committee for the program pretty much my entire career.
    Um, and it was brand new. And so yes, now we have this thirty plus, well, thirty year old program that's produced a lot
    of students. And those students have grown into professionals. And many of those professionals are still in our state.
    I could name some of them for you. There are people who are working on, um, you know, clearly strongly related things,
    related, you know, things related to sustainability and conservation and et cetera. So there's that. Um, other things
    I've seen change. Well, you know, for a whole mix of reasons, um, you know, the university now has a sustainability coordinator,
    which I think Shane's been in that position--I'm not sure how many years, Shane Tedder. Um, you know, it took a lot of
    work to move the university to a place where they could imagine funding a position like that. And it was the work of many,
    many people. You know, did I contribute to any of that? Who the heck knows? Certainly, um, through leadership of the Natural
    Resources Program, there was some contribution that came from me and from others doing that work. Um, I, but I think as
    a result of that, the way that sort of, uh, the climate or the culture of our university has been infiltrated by sustainability
    thinking. Um, so that's a big change. And it's significant to have that kind of change at a large land grant university
    in a state like Kentucky. Um, I think the fact that we even had a greenhouse living learning community for a short time
    that was funded by the College of Arts and Sciences and the College of Ag also speaks to this shift and this idea that
    it was really important even if they couldn't keep it going. Um, so yeah, all of that. Um, but what else do I see that's
    different? Um, changes related to sustainability. I don't know. I mean, I think that Lexington is a more interesting place
    than I moved to. I remember when I first moved here, I felt like it was a one-hundred percent sport town and that it was
    hard--If you weren't interested in basketball or football, there wasn't as much to do. Um, and not that the arts have
    any direct relationship to sustainability, um, nonetheless, I think that the infusion of arts and arts culture and musical
    culture into Lexington, the growth of that, especially visual arts, um, makes it a place that's more attractive to people
    who are likely to make the kinds of changes that push us closer to, um, living sustainably and all that that might mean.
    Um, and then I would also say that, um, although I feel that there's much work to be done, the bicycle infrastructure
    here has improved. Um, it has a long way to go, but, you know, obviously it's visible. The changes are visible. Yeah.
    I'll probably think of other things later.
- speaker: Interviewer
  text: What necessarily--what sparked your interest in climate science and climate change? Either--I'm hearing that in high
    school, you found that passion, but has it--where did that come from and how has that shifted over your career and life?
- speaker: Respondent
  text: Yeah, that's a great question. And I've sort of questioned myself on that, um, because I don't know how long ago I
    actually understood the climate was changing and we should be very worried about it. But I do remember being in my early
    twenties, so, you know, in the late sixties--the late seventies rather, the late seventies--being really frustrated with,
    um, you know, my friends who weren't interested in, um, you know, things like conserving gasoline use, energy use in general.
    And I just remember, you know, at the time I ended up in arguments with them because they were, you know, driving gigantic
    trucks and thinking it was just perfectly fine to get fifteen miles to the gallon, it turned me inside out. And so I think
    I must have known then that there was a problem with fossil fuel use and, um, and, and CO2 in the atmosphere. But I'm
    also certain that my understanding of that got a lot clearer through time, and I know that while I taught forest ecology,
    from the very beginning I had a whole section where I used as one of the very first examples in class, okay, what happens
    when climate is changing? Um, you know, what does that mean that climate is changing? And what are the different ways
