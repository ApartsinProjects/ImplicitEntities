turns:
- speaker: Interviewer
  text: So Fred, what do you have to say about the transition after the fire?
- speaker: Respondent
  text: Well, you know, very fortunately, you know, after, the, uh, the theater had been closed for, well, about four and
    a half years. So we're talking about April 1992. The city had been negotiating with a number of folks, you know, confidentially,
    behind the scenes with folks that had indicated interest in, um, operating the theater. The city wanted someone to be
    the management company for the theater. The city, you know, would do certain things as for maintenance for the building,
    but the actual day-to-day operation of the--there was no way that the, the mayor and the council wanted to be involved
    in a day-to-day operation of the theater. Too many day-to-day issues and, that they would have to do, so they thought
    that the best direction to go in was to have a management company. So they had several people that had indicated interest.
    As I understand it, it all fell a part. And then thankfully, that two local individuals here in Lexington, Howard Stovall
    and Anna Lee Scorsone, stepped up and basically, I think at that time, one would say they saved the theater because there
    was no one really interested in opening the theater. I'm sure that the city did a nationwide search to see if there was
    a, a, a company or a chain of theaters that was willing to come in and operate the theaters. Um, the, you know there was
    a lot of things to, to deal with there in the beginning of the opening of the theater because that you have two individuals
    that had never been in the theater business before. Howard and Anna Lee had ran, I would say, some several successful
    businesses, uh, during their careers. Anna Lee, she has, was with Blue Grass--BCTC and KCTCS for a number of years in
    administration. Howard operated, like I say, a couple of other businesses. The real challenge was that being closed for,
    you know, so long and then trying to get open back up again, trying to get yourself reestablished again. The public certainly
    was out there, but during this period that the theater was closed--I think it was 1990s--there was two Cinemark theaters
    came into Lexington. And they opened, I think they were both eight-plexes, I believe. One was at Lexington Green, and
    the other one was called Man o' War Cinemas or something like that, but it was the same chain. They opened two chains,
    chains, one on the east end of Lexington, which was out on North Locust Hill Drive, and the other one was at Lexington
    Green. And the theater was, as I said before, was closed at that time. So I remember attending the, the person that was
    the manager of the Man o'--of, of the two cinemas in town.
- speaker: Respondent
  text: I had recommended him for a position years ago at another theater and he had left Lex--he had worked in Lexington
    for a while at the old Lexington Mall Cinemas, and then he went to New York City and worked for a concession company in
    New York City. And then I believe he had moved on to someplace in Alabama and managed a, a, a, uh, large discount theaters
    that Cinemark had. And so I was invited to the, the opening night out to the Man o' War Cinemas. These two complexes with
    eight screens each, well, like I say, they opened in--they came to Lexington in 1990. I think it was January of 1990.
    They were able to get a good foothold in Lexington. So that was gonna make it more difficult for the Kentucky to, again,
    bounce back, if you will. We continued to do what we were doing when the theater closed. We were gonna do the Kentucky
    as a, uh, a repertory house, and I think I mentioned before, you know, that in the late seventies we started that calendar
    house, repertory house, revival house, whatever you want to call it, doing a number of films each day and those were the
    films that were some foreign films, it was some old classics, it was some offbeat films. So we picked back up in a sense
    where we left off there for the Kentucky because that had really got the Kentucky reestablished again in the late seventies.
    So we opened back up doing the same thing in the Kentucky. And then to some degree or the other, we kind of, with the
    smaller house, with the, uh--the State Theatre was closed because the city, in the purchase of the land and the buildings
    and everything, they renovated the Kentucky, but they let the State kind of sit. So, I'll go a head and mention that it,
    it was successful. I think that the city realized it was successful. And in 1996, they decided that they would renovate
    the State Theatre and get it back open. So we then had two theaters again downtown.
- speaker: Interviewer
  text: So, did they already own the State Theatre, but it just wasn't renovated?
- speaker: Respondent
  text: They, they, when they made that purchase of buying the land and the buildings, the, uh, that the State Theatre was
    included in that whole area of, of buildings there that the city purchased at the time. But at--when they did the renovation
    and the selling of bonds to renovate to Kentucky, that was not included at that particular time to do that renovation
    in the State. So the State Theatre got opened back up in 1996, and we kind of--we were continuing to do, uh, I would say
    we leaned toward the more arty side of films then. So we were still doing the, the repertory programming in the Kentucky
    with the calendars that we printed every six weeks. It wasn't long, though, 'til we got a call from our film booker, and
    the repertory houses were having issues and problems, and I think it was because that you, you--by doing a six-week calendar,
    by the time you got the films selected and your calendar printed, you could already tell that there were certain films
    that weren't gonna do very well. Also, you know, we're talking about films, thirty-five-millimeter films. The shipment
    of these films from maybe the film company, maybe even a film coming from Madison, Wisconsin to Lexington. And the cost
    of that film, it was not cheap then, whether it was being shipped by Greyhound. Sometimes I felt like that I spent half
    my time going to Greyhound and picking up cans of film, bringing them to the theater. Other repertory houses around the
    country--there were a limited number of prints of certain titles, and so these prints circulated, you know, you, you would
    get it, they'd be shipped to the Kentucky and then they'd be shipped from the Kentucky to Louisville, to the Vogue Theatre
    in Louisville. So there was quite an, an expense there. Plus, there was only a limited number of these prints and as,
    and as time it was going forward, these prints were beginning to get shabby and destroyed, and the quality of prints were,
    was not what it should be. So our booker called one day and said, you know, he operated a theater, Larry Thomas in Cincinnati,
    our film booker, he operated a theater down on Race Street in Cincinnati called The Movies. And in fact, our film booker
    now, Steve Zahn, he works for Tri-State Theatre. And he had worked for Larry at The Movies in Cincinnati.
- speaker: Respondent
  text: And, um, so that theater had closed. So The, The Movies in Cincinnati closed. I believe there was a theater that,
    uh, down in Nashville, the Belcourt Cinemas, I believe they closed. The Vogue eventually closed, maybe a little bit later,
    or was on its way out. So Larry suggested that we change our programming and that we begin to go more first run but not
    as much just playing every, maybe, commercial film, but films that were, I would say, maybe more quality films. And we
    would be very selective in what we were showing and try to stay to the art side of the filmmaking. And then the smaller
    theater, the State Theatre, would maybe play other, maybe a little bit more commercial films. But it was a, a time of
    a lot of changing with cinemas. The, uh--I think about 1998, I guess it was, that the, the cinemas at Lexington Mall,
    the, the, the theaters there, and--well, in fact, the whole mall closed by about 1999. So we lost those theaters. Um,
    I think it was ninety--1996, around the middle of the, the 1900s--or 1990s, that Cinemark opened Fayette Mall Cinemas.
    And then eventually, that, the house that they had at Lexington Green, they turned into an art house cinema for a period
    of time that really didn't, didn't work. But, uh, it was, it was a lot of changes with, probably not just Lexington, but
    in Lexington with the different theaters closing and then other theaters opening. The, uh, I think the, uh, the theaters
    at Turfland Mall went out about that time, too. I think that they closed. So it was a, it was a little bit--things were
    changing exhibition-wise in Lexington. And it was great for the Kentucky to get back open again, and it had to sort of
    reinvent itself. And so we're continuing.
- speaker: Interviewer
  text: You mentioned the bookers and the, um, film companies. Can you describe how the Kentucky works with them, how that
    works, how that whole process happens?
- speaker: Respondent
  text: Sure. The theaters need somebody to represent themselves, that you want somebody that knows the, the, the industry,
    that is trustworthy, that you feel confident in yourself, but that the movie studios feel confident in, people that they
    have worked with over a period of years. And this Tri-State Cinemas, Tri-State Theatre Booking Service in Cincinnati,
    are the people that have looked after the Kentucky Theatre for decades. There was a fellow by the name of Phil Borak that
    started that company, and he has since passed away. And there's two individuals now that purchased the, the, uh, service,
    the theater service from him and that we are still dealing with. And I mentioned that the film bookers for, if it's Paramount
    or Warner Brothers, they have built up, the tri-state people have built their reputation, too, that when they are representing
    the Kentucky Theatre and they say, we would like to play this particular film at the Kentucky Theatre, that the person
    from Warner's or Paramount or the smaller independent film companies, that they know that they can trust the people at
    Tri-State to do what that they tell them to do and by--I mean, tell them to do. Naturally, if you're gonna play a picture
    the film company is gonna tell you what the terms are for playing that picture. And they might say, well, okay, such and
    such film is gonna open on Christmas Day of 2025, and we want that picture to open on Christmas Day. And it looks like
    that you're going to play that picture for three weeks. And we don't want any shows dropped at all to do anything else.
    We want every showing that you're doing every single day to be only that picture. Now maybe at the end of the third week,
    that weekend of the third week, if it's doing X number of dollars that weekend, we might ask you to hold over that picture
    for a fourth week. So, they tell you these things up front.
- speaker: Interviewer
  text: And so the local theater doesn't have any negotiating power, it's just the way it--
- speaker: Respondent
  text: Well, our--you, your booker is representing you but, with that film company. But no, the film company is gonna tell
    you that here's this film that's available, and it's okay if you want to play it, but these are the rules that you're
    going to go by to play it. They might also ask you, well, you know, we think this film's gonna do pretty well, and we'd
    like to have two thousand dollars up front. Before you ever open the film, we want two thousand dollars. Because they've
    got confidence that you'll make that money back, but they want that film in advance. So you know all this stuff before
    you, uh, agree to playing the film. And it's--
- speaker: Interviewer
  text: How often do they ask for upfront money? Is that common, or?
- speaker: Respondent
  text: Not--well, even if you're playing a one-off picture, as I call it, like that, uh, as an example, we're playing--we're
    gonna do a program, a joint partnership with the Girl Scouts that I've been doing for years, for probably thirty years
    at least. And it's the theater provides the space, and the Girl Scouts pay for the film. And it's free admission to everyone
    that comes with a donation and--you know, warm clothing or in some cases maybe food or hygiene products, whatever--and
    it's donated to, uh, the local organization called The Nest for women and children. Well, in this parti--this coming December,
    December the 13th, for a Saturday morning show, we're gonna be playing "A Christmas Story." And the film company has asked
    for a 250-dollar advance for that film. So it's a flat fee. But on more repertory titles, you're looking at smaller amounts
    of money, like, you know two hundred, 250. Can be a lot of the Disney films are more pricey. Maybe they're up at three,
    350. Some special films might even be five hundred dollars. So you've got to be careful what you're agreeing to. You may,
    if you don't like it, you don't have to play the film. But that's film, you know, it's, that, that film is--that price
    is set. But it is important to have someone that the film companies trust, being our booker in Cincinnati, that they're
    gonna follow through, and they're representing us to the film companies, and they're gonna tell us what we need to do
    'cause they don't want to--Tri-State doesn't want to have egg on their face by representing someone that's not gonna do
    what that they've been requested to do by the film company.
- speaker: Interviewer
  text: And so the bookers know the local market, right, and help guide you in selections? How does that work?
- speaker: Respondent
  text: I think so. They have, they kind of--I guess they've got the Hollywood buzz in a sense, too. They probably know how
    the films have done at certain film festivals and what maybe the audience response was. They also, uh, there's certain
    times of year that, you know, the summer and holidays are when the most people go to movies. You never know whether a
    film's gonna do, uh--they're always looking for a blockbuster, but blockbusters don't happen that often. But there are
    pictures that during the holidays, if you--the film, the film studios know that, that a certain film that they feel like,
    well, this is gonna do well. Well, you would wanna release that picture in the summer or you would wanna release it around
    the holidays because that's the time that most people have time off--plants close down, factories close down for a couple
    of weeks. People have a little bit more free time. And so the films that you've got more confidence in--the film companies--that's
    the time of year that you want to release those films.
- speaker: Interviewer
  text: What else happened in the nineties at the Kentucky Theatre?
- speaker: Respondent
  text: Well, of course, we're back again to continuing to show "Rocky Horror Picture Show" as a staple. Of course, downtown,
    too, the last department store closed was 1990, the same year that the Kentucky reopened, Wolf Wiles closed. And, of course,
