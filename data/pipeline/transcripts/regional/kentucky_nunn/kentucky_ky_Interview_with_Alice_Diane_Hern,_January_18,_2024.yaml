collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Alice, thank you so much for being willing to be interviewed today. It has been an exciting journey that you have
    led, and as a young girl of Appalachia, more specifically Harlan County, and then a young woman who traveled the world,
    I think it's most fascinating that we include your story. I would like to begin with your full name.
- speaker: Respondent
  text: Alice Diane Hern.
- speaker: Interviewer
  text: And when and where were you born?
- speaker: Respondent
  text: I was born in Benham, Kentucky, 1944. That's it. [laughs]
- speaker: Interviewer
  text: Well, let's start with your parents' names.
- speaker: Respondent
  text: Ruth Pauline Parker Hern, and Robert Bruce Hern, Senior.
- speaker: Interviewer
  text: And did you attend the Benham school?
- speaker: Respondent
  text: I did for eleven years.
- speaker: Interviewer
  text: And what happened for the twelfth year?
- speaker: Respondent
  text: People--the mining industry wasn't apparently going to be going as strong as it had, and so there wasn't going to
    be the membership at this school. So the school closed and the students had a choice of going to Lynch or going to Cumberland.
- speaker: Interviewer
  text: And why Lynch?
- speaker: Respondent
  text: It was just offered if you wanted to pay the money. I don't know if there was money involved with going to Cumberland.
- speaker: Interviewer
  text: I don't think there was.
- speaker: Respondent
  text: Okay. And Lynch was thought by my father to be--have the better teachers after he inquired quite avidly.
- speaker: Interviewer
  text: When it comes to your education, tell me what you remember of your grade school at Benham--at the Benham school.
- speaker: Respondent
  text: I'd have to say Miss Ison and Miss Reams.
- speaker: Interviewer
  text: Who were they?
- speaker: Respondent
  text: Mrs. Ison was the first grade teacher, and of course she taught me to read and to listen and participate with all
    my little friends there in the first grade, which wasn't very many people.
- speaker: Interviewer
  text: Do you have a memory of approximately how many? I know in my graduating class, I believe we had fifty-four in Benham
    High in 1959.
- speaker: Respondent
  text: Well see we had thirty at Lynch where I went. But in first grade, I think maybe twelve at the most. A lot of attention
    could be given to us individually.
- speaker: Interviewer
  text: Well, that--
- speaker: Respondent
  text: That was great.
- speaker: Interviewer
  text: That was really a wonderful opportunity. When you were in grade school and junior high, what kind of activities did
    you or the girls have at that time?
- speaker: Respondent
  text: Pretty much being in a play was one of the things that we could do. The Tom Thumb wedding in second grade.
- speaker: Interviewer
  text: Tell us what the Tom Thumb wedding was.
- speaker: Respondent
  text: Well, they reenacted a wedding. We had the bride and groom. We had a couple of people to sing. And what else? What
    am I thinking? It was just so sweet. And they talked as if they were adults--[laughs]--being what, seven years of age?
    Yes. And so everybody got to participate one way or the other.
- speaker: Interviewer
  text: What was your role in the Tom Thumb wedding? Do you remember?
- speaker: Respondent
  text: Yes. I was one of the singers, and if I remember correctly, my father said to me, "I will sit on the back row and
    I will wave to you if I can hear you." And so out I went and I located where my father was, and I belted out this song
    because I wanted for sure for my dad to hear it. And he waved to me. And I can remember it was, I can't remember the name
    of the song, but it was "Because of you there's a song in my heart," and I love telling that story because so many of
    my friends, especially my adult friends, find it so spectacular that I went out and made such a fool of myself.
- speaker: Interviewer
  text: Well, when we talk about the Tom Thumb wedding, of course that has gone by the way, when we've had all these societal
    changes about what is acceptable and what is not. Then the concept of two little seven year olds doing a parody on a wedding.
    But in reality, at that time, in this very small community, it was a major event.
- speaker: Respondent
  text: Event, absolutely.
- speaker: Interviewer
  text: Where did--where was it held?
- speaker: Respondent
  text: The gymnasium.
- speaker: Interviewer
  text: Of the school.
- speaker: Respondent
  text: Yeah. Oh, and the last year that the school was in session, they had a reenactment of anyone who was still there that
    had been in the Tom Thumb wedding. They were going to have another one with the bride and groom, and they invited back
    everybody who had sung in it, but me.
- speaker: Interviewer
  text: '[both laugh] Was that because of your singing?'
- speaker: Respondent
  text: Could have been, but I like to think they just forgot about me. [laughs]
- speaker: Interviewer
  text: That's very good. Well, when we talk about that, were there plays and so forth that the first graders or that the
    primary school students participated in?
- speaker: Respondent
  text: You know what, now that I look back, I'm thinking more that was high school where we did the plays. Yeah.
- speaker: Interviewer
  text: Were there any girls' sports at that time?
- speaker: Respondent
  text: Oh, none. No, no. Nothing like that whatsoever. You could be a cheerleader, a majorette, or you could be, of course,
    be in the band. But that was--we were pretty much limited to that.
- speaker: Interviewer
  text: To help our audience understand the context of what we're talking about. At this point, we are talking about approximately
    what, 1950 when you started first grade?
- speaker: Interviewer
  text: And there were no televisions?
- speaker: Respondent
  text: No, just radio.
- speaker: Interviewer
  text: There were only rotary phones.
- speaker: Interviewer
  text: You lived in a town of approximately three to four thousand people, and the area was Cumberland, Benham, and Lynch.
    Cumberland was the trade area. Benham was the only captive coal mine owned by International Harvester.
- speaker: Interviewer
  text: And captive coal mining, meaning that the coal was used only for the production of International Harvester products.
    It was not coal that was sold on the open market to someone else--
- speaker: Interviewer
  text: --and then the town of Lynch, which was a US steel mining operation, and they had four to five thousand people, Benham
    three to four thousand and Cumberland was around four thousand. So that was the total population. Now, having informed
    the audience of that, tell me how much interaction there was or was not up through your junior year with students in those
    other two towns, Lynch and Cumberland.
- speaker: Respondent
  text: There really wasn't any. Sports. Everybody was avid about their sports teams winning. And you didn't even think really
    in terms of dating, or socializing in any respect. If I ended up doing so, it was through one of my mother's clubs that
    would involve daughters being brought in, you know, to do the same. But you would be polite and you would interact, but
    you wouldn't make plans to get together again.
- speaker: Interviewer
  text: That simply wasn't part of the culture. It was very closed within Benham. In terms of your social, your sports, and
    all those particular types of things. I would like to ask you, when you think back about your schooling, when you're in
    high school, what's your favorite singer?
- speaker: Interviewer
  text: No question.
- speaker: Respondent
  text: No question.
- speaker: Interviewer
  text: When you were in high school, who were your favorite teachers?
- speaker: Respondent
  text: There was Walter Dick.
- speaker: Interviewer
  text: What did he teach?
- speaker: Respondent
  text: He taught algebra, trigonometry, geometry. There was Jenny Robinette. And--
- speaker: Interviewer
  text: --and what did she teach?
- speaker: Respondent
  text: She taught typing, shorthand. And then we had two others to come there that had previously lived and gone to school
    there. One was Kenny Cole, and we were very excited about him because he was so young and he was just fun. And Patsy Patton
    came back to teach physiology and anatomy and I wasn't quite sure what all of that was, but we felt like we had to take
    that class because of her.
- speaker: Interviewer
  text: When it came to both of them, tell us about Kenny Cole and being in his class. What type of classes was he teaching?
- speaker: Respondent
  text: He taught chemistry, and we only had chemistry for one year, and luckily we were lucky to get him, and he taught just
    basic chemistry for most of the year. And then we went into a different type of chemistry where you had to give the symbols
    for salt and things such as that. And I can remember one day in particular, the class started and Mr. Cole walked into
    the room and he said, "Larry."
- speaker: Respondent
  text: Larry Flannery. He said, "Larry, how do you make antifreeze?" And Larry said, in response, "Take all of her clothes
    off!" To which the class erupted into guffaws, including Mr. Cole. [laughs] He had to compose himself to bring the class
    back to order. And of course, when we left class, everybody wanted to know what we were laughing about.
- speaker: Interviewer
  text: Well, what was Mr. Cole's response to Larry other than laughing hysterically?
- speaker: Respondent
  text: That was it. And then--
- speaker: Interviewer
  text: Did he then turn around and tell them what the answer was?
- speaker: Interviewer
  text: What did he say?
- speaker: Respondent
  text: Well, I just remember that Larry, Larry was very, a very good student, and he finally, when the class settled down,
    gave the--I keep saying symbol, but that's not the word--
- speaker: Interviewer
  text: --formula--
- speaker: Respondent
  text: --formula for what he had asked for.
- speaker: Interviewer
  text: Was it like -----------(??)?
- speaker: Respondent
  text: He probably would've been killed if he hadn't come up with the right formula. [laughs]
- speaker: Interviewer
  text: And what about Ms. Patton? Patsy Patton.
- speaker: Respondent
  text: Ms. Patton.
- speaker: Interviewer
  text: Well, now, what grades were you when these two students--faculty members--arrived?
- speaker: Respondent
  text: Probably sophomore/junior--I would say since my junior year, after the junior year, the school closed. But Ms. Patton
    just really introduced us to knowledge we had never had before in studying the human body. And I can remember one time
    our assignment was to go home and with whatever materials we wanted to use, we were to design the atom and show where
    the proton and the neutron was, and then come back and the next day, and each of us had to stand up and show our project
    and explain it. Well, there was one student in particular who was very artistic named David Hickey, and he had heated
    up hangers, metal hangers.
- speaker: Interviewer
  text: Clothes hangers.
- speaker: Respondent
  text: Yes. And he had just done a beautiful job, the best there. We also had a guy named Charles Schubert who had made his
    out of--what do you clean--pipe cleaners? Yes. And Charles' looked like he had backed out of--backed over it with his
    car. But anyway, Charles got up and showed his as well. So then Ms. Patton decided to have a contest, and we were to vote
    on who had the best. Well, now you had to remember there was this girl who was my best friend named Carolyn Cornett, and
    Carolyn's word was law. And Carolyn said to me, "Pass the word to pick Schubert's." [laughs] So I said, "Okay." So I passed
    the word. Everybody picked Schubert's. So Ms. Patton was not aware of this. So when it came time to--Hickey, just a few
    people held up their hand. When it came time for Charles Schubert's to be done, the rest of us held up our hands. So Schubert
    won, and Patsy Patton was livid. [laughs]
- speaker: Interviewer
  text: So David Hickey should have won.
- speaker: Respondent
  text: David should have won, because I mean, he really, no matter what David did artistically, he did it very well. Yes.
- speaker: Interviewer
  text: So what did that teach you about human nature, if nothing else?
- speaker: Respondent
  text: Not to count on a thing. Yeah, pretty much. [laughs] And that people will turn on you.
- speaker: Interviewer
  text: And that one person can absolutely--
- speaker: Respondent
  text: --rule the roost. Yeah. Yeah.
- speaker: Interviewer
  text: Why did Carolyn have such sway over the class of approximately how many students at this point, still thirty?
- speaker: Respondent
  text: Yes. Carolyn went to Catholic school for the first six years and then came to Benham. And there was just something
    about Carolyn that was different. There was a mischievous there--mischievousness that we came to admire, and she would
    think of things like that. I can remember Robert Wilson came up to her one day and he had had to buy some groceries for
    his mother, and he had bought some eggs, and he held one in his hand, and he said, "You want an egg?" And she crushed
    the egg in his hand--[laughs]--and we all just thought that was just too famous. And of course, Robert went after her
    and she took off running. But Carolyn just did the different things like that. And actually too, the federal boys came
    into town one day.
- speaker: Interviewer
  text: Who are the federal boys?
- speaker: Respondent
  text: The FBI, looking for stills.
- speaker: Interviewer
  text: Looking for--oh, stills--stills for making moonshine.
- speaker: Respondent
  text: And her father sent her across this field, running across this field and up this hill to warn a neighbor who had a
    still to shut it down and get out of there because the feds knew about him. And I've asked Carolyn in these later years,
    I said, "You've told your grandchildren that?" And she said, "Yeah, they think I'm nuts."
- speaker: Interviewer
  text: So, it was a colorful upbringing.
- speaker: Respondent
  text: Oh, absolutely.
- speaker: Interviewer
  text: Did you realize it was colorful at the time?
- speaker: Respondent
  text: Well, I realized she was unique.
- speaker: Interviewer
  text: Carolyn, but not necessarily that your lifestyles were all that.
- speaker: Respondent
  text: Oh, no. I just assumed mine was just like anybody else's throughout the nation.
- speaker: Interviewer
  text: I want to ask you, when you take a look now, who was most in this from grade school, we'll say forward. Who was most
    impactful on your life?
- speaker: Respondent
  text: Well, through grade school it was a girlfriend named Anna Vera Rogers. And Anna Vera could do no wrong with me. And
    I sought out her advice and thoughts on various and sundry topics
