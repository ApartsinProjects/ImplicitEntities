collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: What were the names of your parents?
- speaker: Respondent
  text: Ann Ellen Smith. Ann Smith Ellen, I'm sorry. She got married years after I was born, and my father passed away, so
    I really didn't get the chance to know him.
- speaker: Interviewer
  text: What about your stepfather?
- speaker: Respondent
  text: His name was Ben Ellen, Jr.
- speaker: Interviewer
  text: Did your mother and Ben live in Lynch, Kentucky? Did he work in the mines?
- speaker: Interviewer
  text: When I look back, I'm a child of the forties and fifties in Benham, and how many of your classmates would you say
    worked in the mines at either Benham or Lynch?
- speaker: Interviewer
  text: Where did you go to school?
- speaker: Respondent
  text: Lynch High School, and I think they called it East West School. It was, like, for the elementary, and then they integrated.
- speaker: Interviewer
  text: Then I went to Lynch High School.
- speaker: Respondent
  text: My brother and sister did the same thing, and you may have--what year did you go to Lynch?
- speaker: Respondent
  text: I graduated in '74.
- speaker: Interviewer
  text: Okay, you're younger than they are. It was Bruce and Alice Hern, but they would've been older than you--
- speaker: Respondent
  text: Older, um-hm.
- speaker: Interviewer
  text: So would not know. But how in the world did you become a female coal miner?
- speaker: Respondent
  text: I've been asked that many times. I did an interview with CNN.
- speaker: Interviewer
  text: Oh, tell me about it!
- speaker: Respondent
  text: And I don't know if y'all--I'm quite sure y'all know Bill Turner.
- speaker: Respondent
  text: And he called and asked me to do a luncheon for him, and so I did, and then I got to interview at the club, the Social
    Club, with CNN. And so I basically was telling them about my story of being a coal miner.
- speaker: Interviewer
  text: Well, tell us now.
- speaker: Respondent
  text: Okay. I started in 1977 as a coal miner. I graduated from '74. I went to college, and I ended up getting pregnant,
    so I dropped out, and so they wasn't hiring women coalminers at the time. And then, you know, they had to start hiring
    women coalminers, so my mom, Ann Ellen, she was the first woman that got called, and she didn't go. She got scared and
    didn't go. So as they was saying we needed women coalminers, I thought, hm. And I wasn't working at the time. I thought,
    well, just little odd jobs or something. I thought, hm, that sounds like pretty good money back then, you know, but I'm
    going in the coal mines, and I'm going to work just a little bit, get enough money to go to Chicago, because that's where
    my people was at, right? And so got the interview, and, you know, they asked all questions or whatever, and they hired
    me on when it's '77, and I went to U.S. Steel at the time, and I worked there till they sold out to Arch of Kentucky.
- speaker: Interviewer
  text: Oh, U.S. Steel sold to Arch--
- speaker: Interviewer
  text: As well as Benham selling to--
- speaker: Respondent
  text: I don't know if Benham sold it to Arch. I don't think--I haven't heard that.
- speaker: Interviewer
  text: There was some connection. There may have been someone in between from the Benham. Okay, so then--so U.S. Steel was
    sold to Arch.
- speaker: Respondent
  text: Yeah, and then, you know, I worked from Arch on till I got laid off, but--
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: Laid off? In '83, I think, somewhere in there. I'm not for sure.
- speaker: Interviewer
  text: How old were you when you first went into the mines?
- speaker: Respondent
  text: About, I'm going to say, probably twenty, nineteen, twenty. Yeah.
- speaker: Interviewer
  text: Nineteen, twenty.
- speaker: Respondent
  text: Nineteen, nineteen to twenty, somewhere in there, 'cause I had my son in '77.
- speaker: Respondent
  text: I had him in June, and I went working--he was like six months old when I ended up going to work for U.S. Steel.
- speaker: Interviewer
  text: Now, what was your first job?
- speaker: Interviewer
  text: In the mines.
- speaker: Respondent
  text: In the mines?
- speaker: Interviewer
  text: In the mines.
- speaker: Respondent
  text: General inside labor, they called it.
- speaker: Interviewer
  text: What did that mean?
- speaker: Respondent
  text: That means--consisting of shoveling belts, shoveling coal, hanging curtains, just odd jobs like that.
- speaker: Interviewer
  text: Tell us what hanging curtains means.
- speaker: Respondent
  text: Hanging curtains is--that's to keep ventilation. When the miner goes to get coal, like, they cut out, like, maybe
    forty feet or whatever, continues the miner, and then once that get done, they back out. And then, when they back out,
    the drill goes in and drill the top so it won't fall. So my job was to go in and ventilate that section, so when they
    go back in there, that curtain would block that dust, and go behind the curtain.
- speaker: Interviewer
  text: Now, when we're talking about a continuous miner, that is a piece of equipment that basically is just--
- speaker: Respondent
  text: Going. It's got bits, and it--they had--at the time, before they upgraded, the miner had to sit in the deck of the
    miner, and operate little gadgets, and--
- speaker: Interviewer
  text: So they were actually sitting on this--
- speaker: Respondent
  text: They were sit--
- speaker: Interviewer
  text: On this continuous miner.
- speaker: Respondent
  text: Yes. Yes, until--
- speaker: Respondent
  text: Yeah. Yeah. They was sitting on it--they would have to sit on the miner, and started up, and the miner would go forward.
    They would, like, push forward or push back, whatever which way they need to get--to get the coal out.
- speaker: Interviewer
  text: What was your reaction the first time you entered the mine?
- speaker: Respondent
  text: Well, my mom, you know, when she told me that she was--got called to go in the mines, she didn't want to go because
    she heard of rats--[laughs]--and snakes gonna be in there, and she got copped out, you know? So she really didn't say,
    "Don't go," you know what I'm saying? And I talked to a guy that had worked in the mines at the time, and he gave me a
    preference, or, like, "You could try it. You know, if you don't like it, you can always quit," or whatever. But as I got
    in there, you know, I seen where it was awesome. So I stayed.
- speaker: Interviewer
  text: Why did you think it was awesome?
- speaker: Respondent
  text: Because it's just amazing how you get trolleyed in. Some of us would--
- speaker: Interviewer
  text: When you say "trolleyed in," what does that mean, exactly?
- speaker: Respondent
  text: Okay, you can--the belt would, like, come outside.
- speaker: Respondent
  text: Well, you--well, to run the coal outside, but you could walk in, and if no coal is running you can get on the belt,
    and you can push the level, and it would take you inside. You understand?
- speaker: Interviewer
  text: I understand.
- speaker: Respondent
  text: Yeah, it would take you inside. And on--some people did that, and some people would, like, jump on the mantrip, and
    the mantrip--
- speaker: Interviewer
  text: What's a mantrip?
- speaker: Respondent
  text: The mantrip is like a car. It's like a boxcar with a driver, and has seats on each side, and the men, women would
    get in a seat and take them inside.
- speaker: Interviewer
  text: Now, it's amazing to me that you found it awesome. What--were you the first--amongst the women to be in the mine,
    or were there others before you?
- speaker: Respondent
  text: There was others before me.
- speaker: Interviewer
  text: Approximately how long had women been in the mines?
- speaker: Respondent
  text: About--I'd say about maybe a year or two before me.
- speaker: Interviewer
  text: So you're--
- speaker: Respondent
  text: And really, the reason why they still--they had to hire women, you know, they had to hire--and then they had to get
    the Black people.
- speaker: Interviewer
  text: Absolutely.
- speaker: Respondent
  text: They had to get the Black people, because, you know, wasn't no Black people, women working in the mines, and that's
    what it really boiled down to. So--
- speaker: Interviewer
  text: So it was really integration--
- speaker: Respondent
  text: Integration, um-hm.
- speaker: Interviewer
  text: And the requirement for equal--
- speaker: Interviewer
  text: Types of employment.
- speaker: Respondent
  text: Oppor--yes.
- speaker: Interviewer
  text: 'Well, that brings up a good question: were you paid equally with the men?'
- speaker: Respondent
  text: Yes. Yes. I mean, you know, some grades were higher than us, but we still got treated, you know, as our job title.
    You know--[clears throat]--the job title just said general inside labor. Might've been, I'll say, twenty dollars an hour.
    I'm just estimating. And then the scoop might've been two or three, four dollars higher. It went like that. You know,
    the miner was the highest paid in the mines anyway, regardless. And I did everything but the roof bolt.
- speaker: Interviewer
  text: When you say everything but roof bolting--
- speaker: Respondent
  text: Okay, I--in general inside labor, I went to third shift, and I serviced the miner. And service the miner was to get
    ready for day shift and second shift, and that means you shut the whole place down, and you--where they then cut the coal
    and stuff with rock dust, and there was, like, fifty-pound bags of rock dust that we had to take off the mantrip, and
    stack it in each section, and cut it open, and just-- Sorry.
- speaker: Interviewer
  text: We are--we are having a momentary pause here. [laughs] Okay, we are now recording again.
- speaker: Respondent
  text: Okay, being a general inside labor, like I said, they shut the mines--they shut the--what is it--the section down.
    And they--we had, like, about--I don't know exactly how many sections we did have. We had, like, a E heading and, like,
    a D heading. Like, maybe E heading had, like, three or four operations on that one side; D heading had probably three
    or four sections on the other side. That's like, you go to E heading and you go to D heading.
- speaker: Interviewer
  text: So are those locations?
- speaker: Respondent
  text: We was bussed. Yeah, we was bussed. We could go--we get up there, change clothes--
- speaker: Respondent
  text: Into our little section. The women--the women had their own bathhouse.
- speaker: Interviewer
  text: And what kind of clothing were you wearing?
- speaker: Respondent
  text: Work clothes, like overalls, boots, and hats, and goggles, and stuff like that.
- speaker: Interviewer
  text: Were those provided by U.S. Steel, and later Arch, or did you have to pay for them?
- speaker: Respondent
  text: The only thing they required us was the light that went on our head. [laughs] You know, we had to get our hat. We
    had to get our boots. We had to get our equipment to go to even start in the mines.
- speaker: Interviewer
  text: So you had to pay for that.
- speaker: Respondent
  text: Um-hm. Yes.
- speaker: Respondent
  text: And I don't remember if they reimbursed us or not. It's been--
- speaker: Respondent
  text: Yeah, too long--[laughter]--to remember.
- speaker: Interviewer
  text: Well, going back to E head and D head.
- speaker: Respondent
  text: D head, okay.
- speaker: Interviewer
  text: Okay. So you have gone up. You've gotten into your mining clothes.
- speaker: Interviewer
  text: Work clothes.
- speaker: Interviewer
  text: And now you are on a bus.
- speaker: Interviewer
  text: And you are headed to where?
- speaker: Respondent
  text: I'm headed to the east side, E heading.
- speaker: Respondent
  text: That's where I worked at.
- speaker: Interviewer
  text: So E head and D head just really means directions--
- speaker: Interviewer
  text: Different places--
- speaker: Respondent
  text: Different places.
- speaker: Interviewer
  text: In the mines.
- speaker: Interviewer
  text: Okay. Are these mines above ground or underground?
- speaker: Respondent
  text: They underground. So when we get to the bus, they take us up there. They have, like, a bus shack they call it, where
    you go in. They have seats in there, until the boss come get us, 'cause, see, the boss had--the fire boss--to let us know
    it's safe to go in the mines. So they would come back and get us, and we get up, and that's when we go into the mines
    and do our work. Yeah.
- speaker: Interviewer
  text: Well, you were saying that you started with U.S. Steel.
- speaker: Interviewer
  text: Now, U.S. Steel was a mine in Lynch, Kentucky.
- speaker: Respondent
  text: Yes, they was the first--that was the ones that got the mines going, U.S. Steel.
- speaker: Interviewer
  text: And do you know the names of any of the female miners before you?
- speaker: Interviewer
  text: Or with you?
- speaker: Respondent
  text: Yes, I know a few of them. One of them is Shirley Smith. It was another lady, but she was from Harlan. I can't remember
    her name. I see her face. They were--them three was up there before I got there, and Marcella Boggs.
- speaker: Interviewer
  text: Do you know what their thoughts were on working in the mines?
- speaker: Respondent
  text: You know, I never really asked, because they were already there, you know. I never really discussed--and that's a
    idea, to ask them, 'cause they--two of them live up there now.
- speaker: Interviewer
  text: Oh, are still in Lynch?
- speaker: Respondent
  text: Yeah. Well, they in Cumberland.
- speaker: Respondent
  text: Yeah. So next time I talk to Shirley and Marcella, I will ask them.
- speaker: Interviewer
  text: And ask them if they would consider being interviewed.
- speaker: Respondent
  text: Oh, okay. Okay.
- speaker: Interviewer
  text: Yeah, that would be great.
- speaker: Interviewer
  text: Because I periodically--
- speaker: Interviewer
  text: Go back home--
- speaker: Respondent
  text: Oh, okay, yeah.
- speaker: Interviewer
  text: And that would be great.
- speaker: Interviewer
  text: Well, now, you know, we're here at the East Kentucky Social Club, which is an African American-slash-Black--
