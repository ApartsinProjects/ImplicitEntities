collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: How close are you to Bath?
- speaker: Respondent
  text: It's about another seven miles. We're right on. We're at Bath County line right here. But, yeah. Yeah, it's only a
    mile away.
- speaker: Interviewer
  text: Before we get started on the Court Day stuff, tell me people always want to know who they're talking to and who they're
    listening to. Tell me a little bit about yourselves and your childhood and your history here in Montgomery County.
- speaker: Respondent
  text: Well, I was born and raised here in Montgomery County, lived in Mount Sterling all my life. My family came here in
    the very late 1700s and early 1800s, as best we can figure it out. But, um, we've just enjoyed this little town and raised
    our kids here and had--we have wonderful memories, you know, like all small towns.
- speaker: Interviewer
  text: How many kids do you have?
- speaker: Respondent
  text: We have two.
- speaker: Interviewer
  text: Two kids. And you're here--you're from here as well.
- speaker: Respondent
  text: Born and raised here. We went to school together. All through.
- speaker: Interviewer
  text: All through high school. Okay, so tell me a little bit about your family. What did they--were they farmers? Were they
    technology people? Teachers? Doctors? What did they do?
- speaker: Respondent
  text: No, my family, uh, started McCormick Lumber Company in 1880. And they located in Mount Sterling, down by the Hinkston
    Creek and by where the railroad was coming. They heard the railroad was coming to town. So they-- they saw that opportunity.
    And all lumber companies in those days would buy near a creek.
- speaker: Respondent
  text: They needed the water--
- speaker: Respondent
  text: --to run the steam engines.
- speaker: Respondent
  text: For the power.
- speaker: Respondent
  text: You know, so they didn't, you know, didn't necessarily have electricity as much as they needed. And that evolved.
    But they needed that water. So they always. You'd find them in these towns. You'll always find them down by a creek and
    by a railroad.
- speaker: Interviewer
  text: That's so--I never knew that. That's so interesting.
- speaker: Respondent
  text: So. And that was started by my great-great-grandfather.
- speaker: Interviewer
  text: Okay. What was his name?
- speaker: Respondent
  text: His name was John L. McCormick. John Leslie McCormick.
- speaker: Interviewer
  text: And so it just came down through the family.
- speaker: Respondent
  text: They're all John's.
- speaker: Interviewer
  text: Were--are you a John?
- speaker: Respondent
  text: I'm John. Our real name is John G. McCormick.
- speaker: Interviewer
  text: The third. I did not know that.
- speaker: Respondent
  text: My dad was that. His dad was that.
- speaker: Interviewer
  text: Oh, they just call you Mac? That's just your.
- speaker: Respondent
  text: Yeah. Because when--when everybody was a live--
- speaker: Respondent
  text: --it was confusing. Hey, John. Phone's for you. You know, and nobody knew who. So. my dad was Jack, and I was Mac.
- speaker: Interviewer
  text: Okay. Jack and Mac.
- speaker: Respondent
  text: And my grandfather was John. So that's how that came about. But, uh, my family history in--in the lumber business
    is. That's all we've ever done. And, you know, we've raised family. Well, it's six generations until we closed in 2011.
    So that was 131 years, we were in business. And the main reason we closed was, you know, that creek was great when we
    were needing the water. But as the town grew, all this blacktop and asphalt, all this water runoff made the creek flood.
- speaker: Respondent
  text: And then in the later 80's, we we couldn't do anything about the flood. If you live in a floodplain, you can't change
    the elevation.
- speaker: Respondent
  text: So it kept flooding us out every three years and we couldn't get insurance. So we finally just had to close because
    of our location we really needed in 1880, but hated in, you know, 2011.
- speaker: Interviewer
  text: I--I love the I love the historical value and how it changes over time. Why was--why was Hinkston Creek important
    not just to your family, but the whole town? What did it--
- speaker: Respondent
  text: Well, see, it's-- it's the low country. So, you know, years. I mean, back in the 1700s, late 1600s, this was-- there
    was a buffalo trail came through here.
- speaker: Respondent
  text: And so the herds, you know, people followed the path of least resistance.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: So the trappers and all--they would come. And Indians, Native Americans. And there was a great big Indian mound there,
    right on the corner of Queen and Locust. There was 40-foot tall.
- speaker: Interviewer
  text: Wow. Do you remember that?
- speaker: Respondent
  text: No, but Ollie McCormick, my--my uncle told me all about it. He did research. University of Kentucky dug into it.
- speaker: Respondent
  text: And everything. But it-- it got tore down and took away--
- speaker: Respondent
  text: --for some reason, nobody knows why. But it was leveled. So it would have been neat to still have that because that
    was about the Adena Indians.
- speaker: Interviewer
  text: Yeah. And that was right next to your all's lumber company.
- speaker: Respondent
  text: Yeah. So that's a little bit of history about us.
- speaker: Interviewer
  text: Well, it's--it's interesting. It's really a lot of history about Mount Sterling. That cross section-- South Queen
    and Locust-- is just so iconic. It's so historic. It's got, like you said, the prehistoric peoples. And, um, but it's
    also kind of the epicenter of Court Day and--
- speaker: Interviewer
  text: --and that's kind of where we're headed to in this interview.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: We want to talk about Court Day a little bit specifically, um, about your impact in Court Day and your involvement
    in Court Day. Now, the first thing I want to ask wasn't on the list of questions that I gave you. But why do they call
    you Mister Court Day?
- speaker: Respondent
  text: Our mayor, Al Botts, he started that. And I never did like it, but he--he always calls me that.
- speaker: Respondent
  text: Uh, just because I've been there longer than anybody, and I've been renting spaces for over 50-something years, and
    actually 58 years I've been renting spaces.
- speaker: Respondent
  text: And nobody else has lasted that long. I guess that's why he calls me Mister Court Day.
- speaker: Respondent
  text: And I've been on all the committees to help, you know, because I'm a landowner there, and I've been very interested.
- speaker: Respondent
  text: And we've always been able to make money off of it.
- speaker: Respondent
  text: You know, so it's been a-- it's been a good thing.
- speaker: Interviewer
  text: Yeah. Yeah. All right, well, before we get into to the-the Court Day as your responsibility and your impact, let's--let's
    go back to when you were a kid. What was Court Day like when you were a kid? Did you have to work Court Day because your
    family had a business there?
- speaker: Respondent
  text: No, no. Court Day was fun to us because, see, it was--my earliest memories were when I was like ten years old of Court
    Day.
- speaker: Interviewer
  text: And where did you all live?
- speaker: Respondent
  text: We lived out on, uh.
- speaker: Respondent
  text: Winchester.
- speaker: Respondent
  text: Winchester Road.
- speaker: Respondent
  text: Out there in my dad's big house. It was built in 1808. But anyway, uh, that was--and we parked cars. Man, we looked
    forward to it at ten years old. See that land around by the lumber company--nobody was set up there.
- speaker: Respondent
  text: They were all set up on the railroad tracks where they used to be.
- speaker: Respondent
  text: And--and so we--we looked at it as a money opportunity.
- speaker: Respondent
  text: You know, we parked cars for two dollars a car.
- speaker: Respondent
  text: And we had the best time. We'd get filled and stay right there and fill them again. And that--
- speaker: Interviewer
  text: So how many cars would you park?
- speaker: Respondent
  text: I think we park about 80 or 90 cars a day.
- speaker: Respondent
  text: You know, and, uh, it was good money for us. We--we'd split it.
- speaker: Interviewer
  text: Who would be doing this? You and your family or--
- speaker: Respondent
  text: No, the kids.
- speaker: Respondent
  text: My brother Kent and Denny McCormick.
- speaker: Respondent
  text: And then Dan McCormick.
- speaker: Respondent
  text: And Tom McCormick.
- speaker: Respondent
  text: So. And then, uh, Ben McCormick, who has passed now, but we'd all kind of take turns and shifts, and that's how our
    families got us to working.
- speaker: Respondent
  text: Of course we mowed yards. But, I mean, this was fun time because we didn't have to do a lot of work.
- speaker: Interviewer
  text: So there's six boys in your family? Six?
- speaker: Respondent
  text: Yeah, there was three on my dad's side and three on Ollie's side.
- speaker: Respondent
  text: My dad and Ollie had owned the business.
- speaker: Interviewer
  text: Okay. All right.
- speaker: Respondent
  text: The McCormick brothers.
- speaker: Interviewer
  text: So you all were cousins? A cousin group.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: So what would you spend your money on? Then you got [it] burning a hole in a pocket--
- speaker: Respondent
  text: We'd get to go buy the candy apples and, you know, things like that. Yeah, and buy a pet cat or--
- speaker: Respondent
  text: Yeah. You know, we sold animals back then.
- speaker: Respondent
  text: You'd buy turtles, but you can't really buy turtles now.
- speaker: Respondent
  text: It was just a lot of fun. And it gave us a little business experience, because, see, we had competition.
- speaker: Respondent
  text: Uh, there was a lot of folks that lived up on the hill.
- speaker: Respondent
  text: Black folks.
- speaker: Respondent
  text: And we--we knew them all.
- speaker: Respondent
  text: And they would come down and try to get our cars. So they'd say a dollar. We'd say two. Don't go up there. You know.
- speaker: Interviewer
  text: Yeah. (laughing)
- speaker: Respondent
  text: So, you know, I remember, you know.
- speaker: Interviewer
  text: I love that.
- speaker: Respondent
  text: That's just the way it was. It was, you know, we had to--we had to get savvy, you know, and get in there and think
    of things to say.
- speaker: Interviewer
  text: Yeah. So how many people would be coming to Mount Sterling during those days?
- speaker: Respondent
  text: You know, back then it was like 30,000.
- speaker: Interviewer
  text: Okay, okay.
- speaker: Respondent
  text: Nothing like it is-- like it has been in the past 25 years or so.
- speaker: Interviewer
  text: Yeah. Yeah. What--about what year would that have been?
- speaker: Respondent
  text: That would have been. Let's see. '64.
- speaker: Interviewer
  text: Okay. In the '60s
- speaker: Respondent
  text: I was like ten years old. Yeah. Yeah.
- speaker: Respondent
  text: And it was always cold and rainy.
- speaker: Respondent
  text: It was never like we have now. It was snowing.
- speaker: Respondent
  text: There was people. They had, uh, big metal trash cans out with fires going in them, like you see in the cities.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: That--that was-- I remember all those.
- speaker: Respondent
  text: And we like to froze. It was cold.
- speaker: Interviewer
  text: That's a great detail. I've never seen that.
- speaker: Respondent
  text: Well, you ask any of the--
- speaker: Respondent
  text: The weather has changed so much, you know.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: But we're just fortunate when we get pretty days like that because I don't--I remember the the days it snowed and
    everything.
- speaker: Interviewer
  text: Wow. Wow. So you had about 30,000 people coming in. It's a-- it's a huge crowd. It's a huge task. Where do you think
    most of these people are coming from?
- speaker: Respondent
  text: Oh they're coming from Kentucky.
- speaker: Respondent
  text: They weren't coming from far off. They were coming from Lexington and Frankfort. I remember the same people would
    come and park with us every year.
- speaker: Respondent
  text: They'd come in and say, "Good to see you boys." You know, because they knew us when we were little.
- speaker: Respondent
  text: And they kind of watched us grow up. So there was a lot of. We built a good little clientele.
- speaker: Interviewer
  text: Yeah. And they would come back year after year.
- speaker: Respondent
  text: Year after year.
- speaker: Interviewer
  text: So did you have any--uh, vendors that you-- or food that you remember? You said the candy apples and any vendors that
    you would--
- speaker: Respondent
  text: Well, my favorite vendors was the Cattlemen's, you know, when they came along.
- speaker: Respondent
  text: But that wasn't then.
- speaker: Respondent
  text: You know, it came along later.
- speaker: Respondent
  text: But, uh, the elephant ears, you know.
- speaker: Respondent
  text: People were just starting to do all that kind of stuff. So all that kind of food, of course, we had caramel apples
    and that thing and popcorn.
- speaker: Respondent
  text: And all that. So it was-- it was just--we just walked along and pay a dime for this and a quarter for that and--
- speaker: Respondent
  text: --and just walk. But the thing I'm-- well I guess we're going to get to that in a minute. But the thing I remember
    most about Court Day was, uh, all the dogs and all the animals for sale.
- speaker: Respondent
  text: See, they--they tied them-- the people that brought their animals to--they tied them to the railroad tracks.
- speaker: Interviewer
  text: You're kidding.
- speaker: Respondent
  text: Right beside the lumber company.
- speaker: Interviewer
  text: Now, they would tie them to the ties?
- speaker: Respondent
  text: They would tie them to the rails.
- speaker: Interviewer
  text: To the rails?
- speaker: Respondent
  text: And so there'd be all these coon dogs, maybe 200 of them up through there.
- speaker: Respondent
  text: And then, uh, here come the train. The train would come by twice a day.
- speaker: Interviewer
  text: Oh my goodness.
- speaker: Respondent
  text: And so they'd blow the--the train horn and people would have to get out of the way. They'd have to slow down because,
    see, the train went right through the center of Court Day.
- speaker: Respondent
  text: And that was the center--the main line was the center.
- speaker: Respondent
  text: People were set up on both sides, not like they are today, but just kind of set up in their own little group.
- speaker: Respondent
  text: But I remember the dogs and the horses and the mules and I remember--
- speaker: Interviewer
  text: Did the dogs get hit by the train or--
- speaker: Respondent
  text: Oh no, no, the train went real slow and--and that was loud, you know.
- speaker: Respondent
  text: But we'd put pennies on the track right in front of the train, and they'd run over it, and it was good times.
- speaker: Respondent
  text: But it was cold. It was cold and, you know, and smelly.
- speaker: Respondent
  text: Well, there's just, you know, after a couple of days and--.
- speaker: Respondent
  text: Well, the stockyards was down there.
- speaker: Respondent
  text: The stockyards.
- speaker: Interviewer
  text: Where were--where
