source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: Ronnie Hampton.
- speaker: Interviewer
  text: Ronnie, I know that your history has been a colorful, full life, so I think that it's probably going to be easier
    for me to just start at the beginning, but the first thing that I really want to do is ask you what it means to be here
    at the East Kentucky Social Club in 2023.
- speaker: Respondent
  text: It's an honor to be here, first of all, because I never thought, you know, it would get this far, and it has. And
    COVID had stopped it for a few years, and we didn't know if it was ever going to start again, and, with that being said,
    we're grateful to Andrea and her crew for being brave enough to step out and do this. So many people have missed it, and
    they are just grateful to see one another.
- speaker: Interviewer
  text: Without question. We have to give kudos of all kinds to Andrea Massey and her group, because they have been pivotal
    agreeing to permit me to come to talk with fellow Benham/Harlan County/Lynch folks.
- speaker: Respondent
  text: She's very good at that.
- speaker: Interviewer
  text: She is. The what is the East Kentucky Social Club? Describe that for us.
- speaker: Respondent
  text: There was back in Lynch, when coal mining was at its peak, Portal 31 was working out, and they took a lot of the younger
    men out of Portal 31 to Portal 32 mine, to top of the mountain, and a lot of the older men were still in Portal 31. Well,
    when they closed Portal 31, there were the older men with nowhere to go. There was a huge layoff, and in that layoff U.S.
    Steel decided to start tearing the houses down, and they did. There were seven camps. Number two and three were totally
    abandoned, torn away, and people had to move away. They moved away to various cities, with relatives or wherever, to get
    new starts, or to finish their lives, however, and on a trip to Cleveland, six men from Lynch—I think Otha Snow, Harry
    Snow, Sylvester Baskin, Gean Austin, and—I can't think of the other one right now—Teenie Hutton, I believe—they met some
    people that they had not seen in a long time, and they thought, you know, back then we didn't have the internet and everything.
    They were not in communication with each other, and they thought a lot of those people had died away, and found out they
    had not. And they said, "Let's not lose touch with each other," and that's created the Eastern Kentucky Social Club. And
    the first reunion was given in Cleveland.
- speaker: Interviewer
  text: About what year?
- speaker: Respondent
  text: I don't remember. I was in high school, I think.
- speaker: Interviewer
  text: That being said, when we're talking about closing Portal 31, which, for the purposes of this interview, has now been
    reopened as a tourist designate site and designation, what do you remember the approximate year that that was closed,
    or the approximate time?
- speaker: Respondent
  text: It was in the sixties, early.
- speaker: Respondent
  text: I think I moved from number three to number one in 1961, somewhere along in there.
- speaker: Interviewer
  text: Okay. I know in Benham, where I grew up and went to school, I can remember vividly the December or the fall of 1958,
    which was the first massive layoffs, approximately two to three weeks before Christmas, and it was devastating. And then
    the same thing happened again in 1959, so this follows right in that same time period—
- speaker: Respondent
  text: Exactly, yeah.
- speaker: Interviewer
  text: Of the closing of the mines—
- speaker: Interviewer
  text: And then the outmigration—
- speaker: Interviewer
  text: From Benham and Lynch entirely.
- speaker: Respondent
  text: There was nowhere to go. They had to leave.
- speaker: Interviewer
  text: Um-hm. Now, I want to touch on many different areas of your life, but first, to kind of give an outline, Ronnie, let's
    start with what was your first job after high school, or what for the first five years after high school, what did you
    do?
- speaker: Respondent
  text: I graduated from high school in 1969. I went to New York and worked for a summer in the Garment District. That was
    my first time ever leaving home for any length of time. And I came back, was going to Eastern to play football, and that
    didn't work out, so I came back to Southeast, and there I played basketball for two years. And—
- speaker: Interviewer
  text: When was this?
- speaker: Respondent
  text: This was '69 and '70. And then in '72 I went to Clinch Valley College, which was—is now known as University of Virginia's
    College at Wise, and played basketball a year there. I worked through the summers for U.S. Steel, and through the winters
    at that time, and at the end of that season I came out of college my junior year and just decided to go in the coal mine,
    and stay, and I did.
- speaker: Interviewer
  text: Now, as that was the first into the coal mine, let's just jump to that time of your life.
- speaker: Interviewer
  text: How were you first hired in coal mining?
- speaker: Respondent
  text: I was first hired as a summer worker. They were—U.S. Steel had a program that would help college kids stay in college
    by giving them a job to make money to be able to afford the college, so through the summers I would work for U.S. Steel
    on the surface. I learned to run equipment, learned to handle explosives, all of those things, and got pretty good at
    it, which, later on in my career, came to be a great help. But at the end of my third year of college, all my friends
    were in the mine, making good money, and, just to be frank with you, I got tired of eating Beanee Weenees—[both laugh]—trying
    to make ends meet.
- speaker: Interviewer
  text: The kids would say ramen noodles today—
- speaker: Interviewer
  text: But we said Beanee Weenees, for sure.
- speaker: Respondent
  text: Yeah, so I decided there's a better life for me, and I thought coal mining would do that, at that time. I had no idea
    staying in the coal mine; it was just like a transition—I'll do this for a while—but then I got married, and the rest
    was history.
- speaker: Interviewer
  text: Yes. Was your father a coal miner?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: Grandfather?
- speaker: Interviewer
  text: Give me their names, and what did they do, and where were they working?
- speaker: Respondent
  text: Okay. My father's name was Otis, and he worked at Portal 31, and he was transferred to Portal 32, to top of Lynch
    Mountain, so he was still working. My grandfather's name is Harry Snow. This is a very wonderful story, so to speak. He
    was a brakeman for the motor crew at 31 Portal, and the coal cars got bumped on him and broke his foot. He had one foot
    already half cut off. The other foot got broke, so they brought him out of the mine, and at that time there was no unemployment,
    there was no disability, there was nothing, so he and my grandmother suffered, and I think in 1960 Southeast Community
    College opened up. They offered him a job over there as a janitor, and he stayed there until he retired. His dad, Otha
    Snow, Sr., was also a coal miner, so I'm a fourth-generation coal miner.
- speaker: Interviewer
  text: So your great-grandfather.
- speaker: Respondent
  text: My great-grandfather.
- speaker: Respondent
  text: Otha Snow. We called him Pop Snow. [laughs]
- speaker: Interviewer
  text: And where did he work?
- speaker: Respondent
  text: He worked at Portal 31.
- speaker: Interviewer
  text: So you have a family history that goes back to approximately when?
- speaker: Respondent
  text: Back in the forties, have to be, or thirties, yeah.
- speaker: Interviewer
  text: It would—yes.
- speaker: Interviewer
  text: It would have to have been.
- speaker: Interviewer
  text: So your grandfather, without question, was there with pick and shovel.
- speaker: Respondent
  text: Oh, yeah, yeah. Yeah, my great-grandfather was. My grandfather was there. He talked about when they had mules.
- speaker: Interviewer
  text: I remember those days.
- speaker: Respondent
  text: Yeah. They had a mule born—
- speaker: Interviewer
  text: I remember—
- speaker: Respondent
  text: There at Portal 31—
- speaker: Interviewer
  text: I did not know that.
- speaker: Respondent
  text: Yeah, where they kept the mules.
- speaker: Interviewer
  text: So at your grandfather's time, they still had the mules.
- speaker: Respondent
  text: At the beginning of his time, but, you know, then they came in with track and rail, and the motors. So, you know,
    my great—my grandfather got a chance to come into the modern age, with the motors pulling it.
- speaker: Interviewer
  text: Let's bring that forward now to yourself. So you start working with the summers. You learn a lot of different skills.
- speaker: Interviewer
  text: A lot. So then you come back, in approximately 1971 or 2, to work full-time, is that correct?
- speaker: Interviewer
  text: Okay. Let's start there. What did you do? Give me a summary of your how many years in the coal mines?
- speaker: Respondent
  text: Forty. I was a roof bolter when I went underground. My first years was on the surface. I learned all the machinery,
    the lifts, the cranes. We changed oil in them. I learned how to handle explosives. We loaded holes. We shot explosives
    for to create high walls for the mining. So just various jobs. When I went underground, I went in as a roof bolter, and
    there I stayed until 1979. And I transferred from U.S. Steel to Department of Mines and Minerals, State of Kentucky, which
    is now known as the Office of Mine Safety and Licensing, and when I got there, I realized a lot of what U.S. Steel had
    taught me was absolutely greater than the state law at that time. So I had—I was a head of the game. I came in as a safety
    analyst, and from safety analyst I went to inspector, to accident investigator, to inspector two, to principal one, inspector
    principal one, and then to supervisor.
- speaker: Interviewer
  text: 'Question: how did you make the leap for U.S. Steel to the Department of Mines and Minerals?'
- speaker: Respondent
  text: This was a rare thing. U.S. Steel at that time was thought to be—it's going to be there. It's—you know, you—
- speaker: Respondent
  text: 'Yeah, you''ve got it made, you hooked into it. And I took a test to see if I qualified for state mine inspector,
    and I did, I passed it. And when I passed the test, they offered me a job. And when they offered the job, I didn''t know
    whether to take it or not, so I talked to my grandmother, who was very conservative. All I needed was a voice to say,
    "You don''t need to go," and I wouldn''t have gone. My grandmother—I said, "Mama, they offered me a job," and I was thinking
    she was going to say, "U.S. Steel''s going to always be here; don''t leave a good thing." But she told me, she said, "Ronnie,
    opportunity is like a bald-headed man: when it''s gone, it''s gone." And I took the job off of that, and there I stayed
    for thirty years.'
- speaker: Interviewer
  text: That is amazing.
- speaker: Respondent
  text: It was the best move.
- speaker: Interviewer
  text: How wise was your grandmother?
- speaker: Respondent
  text: Best move. Very wise, and being conservative, I never thought she would say that, you know.
- speaker: Interviewer
  text: You were counting on her keeping you there.
- speaker: Respondent
  text: I was counting on her to make me stay at U.S. Steel. All I needed was one voice.
- speaker: Interviewer
  text: Well, did you leave? Did you leave Lynch at that time?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: You stayed in Lynch.
- speaker: Respondent
  text: Didn't have to.
- speaker: Interviewer
  text: You were able to there.
- speaker: Respondent
  text: I stayed right there, um-hm.
- speaker: Interviewer
  text: Okay. Well, speaking of your grandmother, I do not think that the women of the coal camps are given nearly the credit
    they deserve.
- speaker: Respondent
  text: Not nearly.
- speaker: Interviewer
  text: So let's talk about your ancestors—
- speaker: Interviewer
  text: Great-grandmother—tell—just tell me their stories, what they did, and—
- speaker: Respondent
  text: My grandmother was born in Mississippi, Meridian, Mississippi, and she moved to Kentucky when my mother was five years
    old, and when she moved to Kentucky it started a new life, she and two of her brothers, because I think farming was all
    they had down there, and then all of a sudden these coal mines had opened in Lynch, and I think flyers went out or whatever,
    saying—and they looked at Lynch coal mines as the promised land. They were going to move and do so much better, which
    they did do better. They did do better, and they all moved in, and I don't even have to tell you that all the houses in
    Lynch, a lot of them were half houses, and families stayed on each side.
- speaker: Interviewer
  text: We called them double houses. [laughs]
- speaker: Respondent
  text: Double houses. And then there were three or four families sometimes that would stay in each half. That's how many
    families were in Lynch at that time. It was very overcrowded. Very overcrowded.
- speaker: Interviewer
  text: And this would've been approximately when?
- speaker: Respondent
  text: See, this would have been in the—in the forties. I was born in '51. That would've been in the forties, maybe the late
    thirties, early forties.
- speaker: Interviewer
  text: Well, now, when—
- speaker: Interviewer
  text: So when they came in the thirties, forties, she's coming with her two brothers. Is she—does she have a husband at
    this point? Is she married yet?
- speaker: Respondent
  text: No. No, she marries my granddaddy when she gets here.
- speaker: Respondent
  text: Yeah, he came from—
- speaker: Interviewer
  text: So he's already here.
- speaker: Respondent
  text: He came from Alabama.
- speaker: Interviewer
  text: Right. [both laugh] Right. We think of that Alabama contingent—
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Whether it's, you know, U.S. Steel, or whether it's, you know—
- speaker: Respondent
  text: Yeah, he's from Alabama, and they met, and they married. He—two—he had two kids, and she had one, and they blended
    together. And then I was born, and there we go.
- speaker: Interviewer
  text: 'Here you are. Well, now, when it comes to the women, we can start with wherever you feel like you have—the information:
    grandmother, mother. What did they work outside the home, or did they—?'
- speaker: Respondent
  text: My grandmother for a time did. She worked at the boarding house in number three to try to make ends meet, especially
    when my grandfather got hurt and came out of the mine. And I'm going to tell you this—I mean, I'm not trying to hide it—she
    worked at the boarding house. He bootlegged for a while to make ends meet.
- speaker: Interviewer
  text: That was the life.
- speaker: Respondent
  text: He bootlegged to make ends meet.
- speaker: Interviewer
  text: That was the life. Can I tell you a story? When my dad, who was from New York state, came down on his way to a job
    in Florida, and his brother, Ray Hern, was, I think, an engineer for Benham, so he stayed. They offered him this job,
    and he stayed. And at that point, that—got sidetracked. At that point, when he is here, and he goes to buy a house—and
    I won't give the names of the people, but when he bought that plot of land, the guy that he bought it from, the old home
    place, he reached over in the tree
