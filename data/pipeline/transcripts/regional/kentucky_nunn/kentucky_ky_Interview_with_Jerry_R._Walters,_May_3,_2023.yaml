collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Would you give me your name and where you were born?
- speaker: Respondent
  text: Jerry Walters, born in Benham Hospital. My parents--was Henry and Verna Walters. I have three brothers and three sisters.
    The first two were not born in Benham. The other five was all born in Benham Hospital.
- speaker: Interviewer
  text: And what year were you born?
- speaker: Respondent
  text: Nineteen forty-six.
- speaker: Interviewer
  text: That makes you younger than me, Jerry. (laughs)
- speaker: Respondent
  text: We're not counting--
- speaker: Interviewer
  text: We're in a sad state of affairs.
- speaker: Respondent
  text: We're not counting.
- speaker: Interviewer
  text: (laughs) And what's the, in terms of your history, the names of your wife and children?
- speaker: Respondent
  text: My wife is Betty Walters, from Cumberland, and we have one daughter, April Walters, who is at South Bend, Indiana.
    And three grandsons.
- speaker: Interviewer
  text: I bet you're proud.
- speaker: Interviewer
  text: (laughs) Bet you're proud. Where did you attend school?
- speaker: Respondent
  text: Grade school in Benham. And my freshman year was in, my freshman year was in Cumberland. I mean, my freshman year
    was in Benham. My sophomore year was in Cumberland and my junior year was at Lynch and I graduated Cumberland.
- speaker: Interviewer
  text: Well, you moved around. Why was that?
- speaker: Interviewer
  text: Why did that happen?
- speaker: Respondent
  text: Well, my two brothers my older--my two older brothers, you know, they were--you know, my older brother, Johnny, played
    football for four years for Benham. Two of my three sisters were cheerleaders and we lost our school at the end of my
    freshman year. And I went to Cumberland to, uh, my sophomore year and I had an opportunity to go to Lynch to play basketball.
    And that didn't work out due to other injuries and so forth. But I ended up going back to Cumberland and that's where
    I met my wife and our senior year we were high school sweethearts, I guess, if you want to call it that, yeah.
- speaker: Interviewer
  text: Where did you marry?
- speaker: Respondent
  text: We married in 1966. No, I'm sorry, we graduated in '64 and we got married in May the 7th of 1965.
- speaker: Interviewer
  text: Don't you think it's amazing that you and I can remember these dates? (laughs)
- speaker: Respondent
  text: It's amazing to me. But my wife is responsible for that particular date.
- speaker: Interviewer
  text: (laughs) That's very good.
- speaker: Respondent
  text: Memory-wise. (laughs)
- speaker: Interviewer
  text: What were your most enjoyable memories when you attended school in Benham? So, that would have been primarily your
    grade school.
- speaker: Respondent
  text: Yes, and my first year of high school, which was really the--you know, it stands out more because, as you know how
    the Benham school was laid out and, as, as you know, the Fourth of July was a big deal. You know, the company sponsored
    that and it--
- speaker: Interviewer
  text: Tell us about that.
- speaker: Respondent
  text: Well they provided--now this is to the best of my recollection. They provided a truck, they had some sorts of entertainment
    and sometimes I thought--as I recall, it was at the football field and they had a huge ice cream truck. Of course, that
    was a big deal, you know? And then, one of the other big events, and I guess this is what stays with me and still does
    is the involvement with the Credit Union. The annual meeting of the Credit Union was a tremendous social function. And,
    you know, they always managed to have--now, I didn't go to all of those but back in those days, family members--was not
    accepted early on.
- speaker: Interviewer
  text: Oh, into the meeting? Into the annual meeting or into the Credit Union?
- speaker: Respondent
  text: They were not allowed to be members.
- speaker: Interviewer
  text: Oh, all right.
- speaker: Respondent
  text: But they were allowed to attend the meetings and I remember they would always hand out a little--I call 'em handouts.
    Plus, I remember one year they gave us, everybody, silver dollars and I--and the reason I remember that so well, I got
    one that was 1900. And my dad had, like, 1912 or something and we switched those out because that was the year he was
    born. But, yeah, it was also a big event. I think they had, to the best of my knowledge--of course, this wouldn't have
    been my interest at that time but I think they had some kind of finger foods or something like that, too. But once again,
    it was a huge--or in my eyes and several others, it was a huge event.
- speaker: Interviewer
  text: When you're talking about these big events, was the July 4th event sponsored by International Harvester?
- speaker: Interviewer
  text: And so, they would then have a big to-do down at the football field.
- speaker: Interviewer
  text: Was the whole town invited?
- speaker: Respondent
  text: Pretty much, yes, yeah. I, I, I--as I recall, it was just open. You just came in as, once again, as I can recall that.
- speaker: Interviewer
  text: What sports did you play in grade school, high school?
- speaker: Respondent
  text: In grade school, I played basketball and football, which was the primary sports. Of course, I played little league
    baseball, but, and freshman football. But I made the team at Cumberland but once again, you know, we were the freshman
    there. We were the new guys as far as football goes and, yeah, my sophomore year, and it was kind of hard for me to make
    that adjustment. Some guys did it well. It was just a little more difficult for me because I was playing against what
    was the opposition, you know?
- speaker: Interviewer
  text: Well, and not only that is I remember it. We had huge rivalries between Lynch and Cumberland. Benham, Lynch, Benham,
    Cumberland. So, for you to suddenly, your freshman year, be going off to Cumberland and then to Lynch, that was huge.
- speaker: Respondent
  text: Sophomore year. Yes, it was.
- speaker: Interviewer
  text: Sophomore year.
- speaker: Respondent
  text: Yeah, but, I, I, you know, I did have, not to my satisfaction, but I did have at least one year of high school at
    Benham and my younger brother, of course, he didn't have that opportunity. I felt like you missed out on something if
    you didn't go to school at Benham, you know? I felt like you were--
- speaker: Respondent
  text: You're missing out, (laughter) yeah.
- speaker: Interviewer
  text: Who was your favorite teacher?
- speaker: Respondent
  text: Oh, my favorite teacher in high school would have been, well, it'd be a tossup between Ronnie--Walter Dick and Janie
    Robinette.
- speaker: Interviewer
  text: Both from Benham.
- speaker: Respondent
  text: That would be and, and, and that may still be my favorites all through.
- speaker: Interviewer
  text: What was your favorite song in high school?
- speaker: Respondent
  text: Well, this was my senior year and it was "A Summer Place." It was both instrumental and verbal. And that was also
    the theme of our prom. And we just went to our--I think it was our fiftieth a couple, three years ago and as I recall,
    and my memory is very poor, very bad, but as I recall, that was our theme for our prom, our senior prom.
- speaker: Interviewer
  text: Oh, those were the days. (laughs) What--did your father work in the coal mines?
- speaker: Respondent
  text: Yes. My dad started work in the late '20s, I'm not sure when, and during the Depression, he left there and went back
    to Tennessee.
- speaker: Interviewer
  text: Was this at Benham that he was working?
- speaker: Respondent
  text: Yes, that's the only mines that he ever worked at was International Harvester. And he worked, as I said, prior to
    the, the, uh Depression. And then, during the Depression, he went back to Tennessee and went back to farming and then
    immediately was one of them that was called back when they started back.
- speaker: Interviewer
  text: When they started hiring well again?
- speaker: Interviewer
  text: What about your grandfather? Was he in the coal mines?
- speaker: Interviewer
  text: Starts with your father.
- speaker: Interviewer
  text: What job did he have in the coal mines?
- speaker: Respondent
  text: The only job I know title-wise or job position was a shuttle car operator. And he lost his hand in the very early
    '60s and he retired in '62. But Dr. Schosser and some of those doctors there, they--he kept his hand but he couldn't function
    with it fully. Just could use--but, yeah.
- speaker: Interviewer
  text: Do you remember when you first went into the mines?
- speaker: Respondent
  text: 'I went--I did not go in the mine. I went to Scotia in ''95. I went and worked with the engineers outside the Scotia
    coal company and I only worked there for six months because it was a seasonal thing and we were getting coal samples out
    of abandoned mines. Wasn''t a very pleasurable job. And when it was up in December, the, the--one of the fellows I was
    working with, he chose to stay with them and I chose to go to International Harvester. [Editor''s note: The Scotia mine
    was opened in 1962 as a subsidiary of the Blue Diamond Coal Company. Walters'' date reference to ''95 is most likely actually
    1965 based on the sequence of events related below.]'
- speaker: Interviewer
  text: What did you do? You have graduated from high school. What's the next thing that you do?
- speaker: Respondent
  text: I go to Indianapolis and I work for the summer as I had done three summers prior to that. I would go there to earn
    money. As you know, the mines was, you know, you was--you were top of the line today and at the very bottom tomorrow.
    That went with coal mining. But I went the summers prior to my graduating and worked summer jobs. And I enjoyed that quite
    a bit, in Indianapolis. Older brother, Johnny, worked for the company and had prior going into the service. So, when I
    graduated, I went to McCall Corporation. After I did the summer thing up there and came back and worked at Scotia, I went
    to McCall Corporation. It was a women's magazine and they had Redbook, U.S. News, and the Reader's Digest.
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: Well, I worked in the bindery and I was real little. I graduated, I weighed 118 pounds, and I worked in the bindery.
    No. I'm sorry--in the bindery but it was with the pattern shop and they, McCall's, had patterns. And this is all--I'm
    just going from--all I did was pull together (??)--
- speaker: Interviewer
  text: I remember everything that you just talked about, the McCall's patterns--
- speaker: Interviewer
  text: --the Redbook, the Reader's Digest. Well, what prompted you to leave that and go onto something else?
- speaker: Respondent
  text: Well, the printing industry, you know, the, the--McCall's was really an experience but it was only eighteen months.
    But the longest eighteen months of my life. I was in Dayton, Ohio. And, well, some guys would've thought this was fantastic.
    But I worked in the basement. I was the only guy down there and I was doing the stitching. Those ladies were putting it
    together and you were judge, jury, and, well, you know, any time there was any kind of discrepancies and that happened
    every day. But I was looking forward to--my brother, Johnny, he called and said that he could help me out getting on it
    at Indy and I, I--and he also said if there was somebody I want to bring with me. So, I called Rod Cannon and run into
    a fella named Bud Spangler from Cumberland. He was filling the Coke machines up the day before I was going to Indy. So,
    Rod got a ride to Dayton, Ohio and he and myself and Bud Spangler went up and that started my career at Indy.
- speaker: Interviewer
  text: Well, then, when did you join International Harvester?
- speaker: Respondent
  text: September the 14th of '66.
- speaker: Interviewer
  text: What were you doing then?
- speaker: Respondent
  text: I was a machine operator in the machine department and I got a medical condition where I had to go into receiving
    and that's basically where I was at. Of course, you know, when you have layoffs and things, you'd be right back and--eventually,
    you know, most of my term--but I was a union rep. After the third year I was at Harvester, I was some form of a union
    rep and sometimes, too, during the--from the--my third year seniority until I retired twenty-seven years later.
- speaker: Interviewer
  text: What union?
- speaker: Respondent
  text: UAW, United Auto Workers.
- speaker: Interviewer
  text: Well, what was the difference between United Mine Workers and also Progressive?
- speaker: Respondent
  text: Well, now this is the best I can recall. You know, United Mine Workers obviously was the biggest. But Progressive
    was--a lot of people referred to it as a company union. And as I remember, just as in the UAW versus--the company would,
    generally, U.S. Steel would sell their contracts and International would follow by just, you know, either matching--maybe
    a couple things a little different to the best of my recollection. And, you know, that creates a difference in the--a
    little animosity between the two.
- speaker: Interviewer
  text: I've heard that. When you first started with International Harvester, do you remember what you were paid?
- speaker: Respondent
  text: 'Me, personally? I remember exactly what I was paid: $1.99 an hour.'
- speaker: Interviewer
  text: How did that rank among wages at the time?
- speaker: Respondent
  text: I was in high cotton. Yeah, it was, yeah, that was '66, of course. But, wait a minute, I said--I'm sorry, it was two-ninety-nine.
    I remember I was a penny away from--
- speaker: Interviewer
  text: Three dollars.
- speaker: Respondent
  text: Yeah, and also, that was as a labor--and I think that changed within the first month because as, you know, you took
    different jobs, they had piecework and I went to that.
- speaker: Interviewer
  text: What--how were you paid?
- speaker: Respondent
  text: Oh, I was paid by check.
- speaker: Interviewer
  text: You were paid by check.
- speaker: Respondent
  text: Yeah, always, yeah. Payroll deduction that--was soon as it became available.
- speaker: Interviewer
  text: Where did you receive the check? By mail or where did you get the--?
- speaker: Respondent
  text: Our supervisors would hand their checks out, yeah.
- speaker: Interviewer
  text: Do you have any idea whether or not at International Harvester in Benham they ever used scrip or was it always some
    form of cash or what?
- speaker: Respondent
  text: They started out with scrip and then some, then cash and then, obviously, to the checks, you know?
- speaker: Interviewer
  text: So, it was that kind of progression, yeah?
- speaker: Respondent
  text: And I remember
