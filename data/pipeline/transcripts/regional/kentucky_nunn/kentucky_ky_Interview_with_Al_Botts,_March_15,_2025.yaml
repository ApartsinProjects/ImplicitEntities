collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Well, thank you so much again for being with us today, and helping out The Post Clinic. Just to get started, can you
    tell me a little bit about yourself, your daily life as mayor, and what you love about this community?
- speaker: Respondent
  text: So, I could speak all day on that. So, a little bit about me? Well, I was born and raised right here in this community,
    graduated high school, left for twenty years, served this country as a United States Marine—retired, came home, and ran
    for office, I served as city council member for four years, and then ran for mayor, and I have served as mayor for seven
    years now. I'm on my seventh year. So, I'd like to say that I'm mayor of the finest city in the Commonwealth. I think
    this is an awesome community, a community that has a lot of nice things, but it's got a lot of great people, and a lot
    of people that do amazing things for this community that are unsung—unsung heroes every single day, so, I'm very honored
    that I'm able to represent them and to serve them and to do what I can where I'm at in this period of time to just try
    to make a positive impact in their lives and the lives of the citizens across this community and really just make it a
    better place, hopefully not just now, but for the next generation that's coming. My daily activities, you can see how
    I'm dressed. It's every day I'm, it feels like I'm running all the time. Today we're dealing with storms. Tonight I've
    got an ROTC ball that I have to go to with the students and support them in their endeavors. But every day is a challenge.
    Every day is different than the next, or the previous day. And it's just very rewarding. I also serve as a city manager,
    so I'm not just the senior elected official of the city but I'm the city manager so I'm responsible for the day-to-day
    operations of the city and that includes twenty-seven police officers and staff and eight public works and then everybody
    that serves in city hall and then a lot of what I do as mayor is just be a cheerleader for the community and to try to
    support great projects like this one in The Post Clinic and to just make sure that we are all lifting each other up and
    doing what we can, as I said earlier, in this space and time to just make sure that we're all headed in the right direction
    together, so. Did I miss anything? I know you asked me a lot there.
- speaker: Interviewer
  text: No, that's wonderful, thank you. Can you just tell me a little bit about your relationship with this Post Clinic and
    the history that you have with it?
- speaker: Respondent
  text: Well, so, most of my relationship has been with trying to help grow this clinic through my work to not only promote
    all the good that's going on here, but to help them build this new building. And then so a lot of that was working with
    federal and state partners to try to obtain the funds to build this building. It was a very long process, one that we
    hit so many roadblocks along the way, and there were some days I didn't know if we were going to get it done. They were
    doing amazing things in the building they were at, but they just needed more space in order to grow and to continue to
    serve and to impact as many lives as they can. That's hard to do when you're in cramped space. It's not ADA compliant.
    So most of my relationship has been in the capacity as mayor, just trying to work to help secure funding to get them a
    new facility. But I do have personal stories of my relationships with citizens who were able to use this facility because
    either they're underinsured or uninsured or had nowhere else to turn. And actually, we hosted an exchange student a few
    years ago. The exchange student came to town and needed a physical before he could play sports. So he didn't have a doctor.
    He's new to America. He doesn't have insurance. Where do you go? And it was pretty cool that there's a Post Clinic in
    town that will see anyone. I was able to bring him up here and he was able to get his physical for soccer and then for
    school and then be able to go chase his dream because there was a great facility like this that was able to see him on
    a very short turnaround there.
- speaker: Interviewer
  text: Mm-hmm. I guess overall, how have you seen The Post Clinic impact residents and patients, either their health or just
    overall well-being?
- speaker: Respondent
  text: Yeah, so, it's good to see, as elected officials we're here to serve the citizens we represent. And we take for granted
    sometimes in our own lives how blessed we are and how many opportunities we may have or luxuries for lack of a better
    term that we may have but there are a lot of people who struggle day to day and I've seen so many people who had nowhere
    else to turn that were able to come to The Post Clinic and to either obtain much needed health care. Maybe a lot of them
    are working, it's just the insurance doesn't cover their needs sometimes. We have Amish populations that are outside of
    the traditional insurance coverage but they're able to use this facility. I've seen people who needed a new smile, needed
    dental work, and they were able to come here and get that, which enabled them to get a job. So when you look, there's
    just so many great stories that we may take for granted. Like I said, I have health care coverage. I'm good. But for folks
    that don't have that, to have a place in their community they can turn to, I mean, this is probably one of the best projects
    I've been involved with as an elected official because of the impact it's having on vulnerable populations. So that's
    very rewarding and something that I'm very proud of that I can look at people and tell them, hey, we've got you covered.
    We've got a place that's going to be able to see you if you hit a tough patch or you just don't have anywhere else to
    go.
- speaker: Interviewer
  text: For the patients you've seen and known that have been at this health clinic, have you noticed a shift in relationship
    between patient and health care provider?
- speaker: Respondent
  text: A shift in relationship? Like in what way?
- speaker: Interviewer
  text: Mm-hmm. Or perception of health care.
- speaker: Respondent
  text: Well, I think most health care professionals are trying to make that personal connection. And the bigger the health
    care provider, the harder that is sometimes, I think. Here, I really see what they do is it's almost a family atmosphere.
    And I think that's so very important for anyone that's coming to seek health care that you think you're being treated
    like family. But I think it also helps build trust. A lot of folks that have come here have not had insurance. They've
    just not been able to see health care providers. They probably put it off, probably not had very good experiences therefore
    they just kind of didn't trust the health care system so having a Post Clinic like this that's able to see anyone and
    to give them a safe place to come and to make them feel that they're valued and that what's being provided is something
    that should have always been there for them. I think that's helped patients build trust with providers here. And for providers,
    they're all volunteers, I mean, they're coming here to volunteer their time. For a lot of them, I think they can get caught
    up and you're just seeing patients every day and you're trying to cycle people through and for them this is a place where
    they come and they are providing health care maybe in a different way than they have before. They're able to slow down
    a little bit, they're able to build a few more personal relationships so I think it's been good for not only the patients
    but for the providers that volunteer their time here.
- speaker: Interviewer
  text: Wonderful, overall, how has the clinic impacted the community, and how would you say Mount Sterling is distinct from
    other communities?
- speaker: Respondent
  text: From the impact that The Post Clinic has had? Well, not just our community, it's the communities that surround Mount
    Sterling, so I can't remember the number of counties off the top of my head, but it's over a dozen, probably, counties
    that have folks that come here to use this clinic, which was a big for us when we went to build it when we were trying
    to obtain funding. That's one of the selling points, that it's not just benefiting Mount Sterling, it's benefiting the
    surrounding communities too, by helping meet the needs of vulnerable populations in those communities. For us, this is
    one of the nice things I talk about that we have because we're able to offer something that a lot of communities are not,
    and that is a place for people to go when they don't have any other options. You have to be seen, I mean, if you go to
    the hospital, they have to see you, but there's going to be challenges of follow-on care. If you don't have insurance,
    there's going to be challenges of setting up other types of care, specialized types of care if you don't have insurance,
    so having a facility like this really just I think it's something that we can brag on in our community and that we can
    say that we're proud that we're offering this. It's also important, I think, we have stressed with our industry and businesses
    here that if they are having a hard time with providing insurance coverage or finding that place for somebody to be seen,
    that we can help. And I know that this Post Clinic has helped with certain physicals, physical exams, for folks, for particular
    type programs when they were not able to get in through a traditional type route in a quick way, I know they've been able
    to do that a few times up here. So it's really helped for the cases where they're not able to find a place for one of
    their workers to go. And then I went back, and let me go back to when I talked about underinsured. There's a lot of hardworking
    people that want to be in the workforce. They're getting insurance coverage, but that insurance coverage isn't very good.
    And I think that helps. I won't name a business, but like a business that's in an auto parts type store or whatever, you
    know, there's challenges of being able to get a good income working there an hourly income, and then there's the challenges
    of that business being able to provide health care. So when you have a place, and the health care coverage may, you know,
    they may be providing it, it's just not, you know, it may have high deductibles. Having a place like this has really helped
    the workforce and those type of businesses, that they have a place that they want to be employed, they want to get out
    and work, but the health coverage, for whatever reason, may be a challenge at those locations that they have this opportunity
    to come up here to, so, it's just a win-win for our community. It's a win for local government. It's a win for our citizens.
    It's a win for the workforce. It's a win for industry and business. It's just a good model here that I think should be
    replicated throughout the state, throughout the nation, really. We have gaps in insurance coverage everywhere. Even though
    the Affordable Care Act says everybody's going to be covered, right? Well, this place is still being, they're still seeing
    people every single day. So that's telling you that the model that's been created still isn't perfect, that there's still
    people that need to be seen. And so this has been nice for our community to say, we offer a place for you to go when you
    don't have anywhere else to go. I hope that answered it.
- speaker: Interviewer
  text: Yeah, absolutely.
- speaker: Respondent
  text: You can flip a switch on me. I can just talk all day, so—
- speaker: Interviewer
  text: No, we love it, please do.
- speaker: Respondent
  text: I don't know if I answered the question or not. If I didn't, tell me.
- speaker: Interviewer
  text: Please do. Do you have any specific stories? I know you mentioned one a little bit earlier, but any other stories
    you could share, anecdotally about this clinic?
- speaker: Respondent
  text: Now, I did mention the personal story with helping an exchange student, so that was my first encounter with The Post
    Clinic, and that was before, it might have been right before I became mayor or my first year as mayor so, when they approached
    me wanting to apply for grant funding, I'd already had a very positive experience here. So that helped me build that relationship
    early there. I had that personal experience but as I said before we'll run into people periodically that just did not
    have a place to go and we're able to say, Hey we've got you covered we've got a place for you to go, and I try to do a
    warm handoff in those cases and I want to make sure that they have somebody that can receive them here. Louise is generally
    great about that, all I'd have to do is make a call to Louise and she's going to make sure that they're taken care of
    but I've got people who work in my church that volunteer up here so there's just plenty of opportunities when I run into
    somebody that doesn't have options, I can make a phone call very quickly, which I've done, and we can get somebody seen
    up here. I did mention the one about somebody being able to get dental work and to get a new smile, for them to obtain
    employment. I mean, that's life-changing and that's happened up here, so I just think that's truly something special that
    people have a place to go. But if everything else in the regular model has failed, there's a place right here.
- speaker: Interviewer
  text: Is there anything additional you would like to add, question-wise?
