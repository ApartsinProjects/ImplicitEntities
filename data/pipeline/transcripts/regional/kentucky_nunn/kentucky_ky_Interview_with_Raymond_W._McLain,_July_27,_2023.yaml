collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: What is that noise?
- speaker: Interviewer
  text: You gave a fantastic tutorial on Carter family fold and the history of that, as well as a history of the Hindman Settlement
    School. And we started talking about Hindman Settlement School because your father moved there to be recreation director
    in 1954, moving you. You're just six months old, I think, at that point, and-- What was your earliest, what's your earliest
    memory of that time?
- speaker: Respondent
  text: I can tell you my earliest memories because I've said this a number of times. It's something I talk with students
    about. What are your earliest memories? What are your earliest musical memories? And all my earliest memories have to
    do with music. I remember riding on my father's shoulders as he danced. I remember sitting on his lap as he played the
    piano for dancing. I remember going to sleep in my bed with everybody playing music. I remember everything I remember
    from my earliest years have to do with music.
- speaker: Interviewer
  text: Isn't that interesting?
- speaker: Respondent
  text: I think so. And as I've talked with students about this, a lot of theirs are similar. A lot of their earliest memories
    are also musical memories. I remember one time Daddy had a guitar, and he never told us not to touch his instruments.
    I don't remember him ever saying that. I can't imagine those words coming out of his mouth. We knew to be careful of them,
    and we knew they were important, and we knew they were delicate, but we also could touch them. And I remember very plainly
    it being hot, sun coming in the window. I remember sundust in the air. And I went over to--he had the guitar leaned up
    against the side of a chimney, a fireplace, and I picked the B string, and it's like this--bomm--it's like this wave went
    through the--I could see--you know, it's like a special effect in a movie, it was like--vvvoooh--like that. And I thought,
    wow, that can happen. And that was an early memory. I remember--I don't know--I'll tell you what happened on my fourth
    birthday. On my fourth--I don't know when I knew I wanted to be an entertainer, but I know I knew it on my fourth birthday,
    because my parents gave me a camera, a flashlight, and it was kind of a flashlight, and it had a button on it, and you
    could--and I thought it was a camera. It was a flashlight. And when I realized it was a light, I remember shining it on
    a stage, on an imaginary stage, and introducing entertainers. And so I know I wanted to be an entertainer then, but I
    don't know if it was before that or not.
- speaker: Interviewer
  text: So you would have been about three when your sister was born.
- speaker: Respondent
  text: I was two when Alice was born and four when Ruth was born.
- speaker: Interviewer
  text: Got it. I was almost right.
- speaker: Respondent
  text: Well, maybe. I don't know, because I was born in December and Alice's birthday is in September.
- speaker: Interviewer
  text: I have Alice in '56, and Ruth in '58.
- speaker: Respondent
  text: Yeah. So they're about--More or less, yeah. They were about two years between Alice and me.
- speaker: Interviewer
  text: So what are your memories of your sisters being born?
- speaker: Respondent
  text: I don't know. My mother said, when Alice was born, I said, "oh, now there are two of us." And I don't remember a lot
    of specifics about growing up with Alice and Ruth, except that it just was the most natural thing in the world. And they
    were very sweet, and I understand that I was very mischievous. They were just--we just always did everything together.
    I mean, before cell phones and computers and before, well, even television, I was about four when we got television, or
    five, and--well, four, I think. And--well, you couldn't get a lot on it. We could get the--our first station was Channel--well,
    Daddy put the antenna way up on top of the ridge, and we lived by the creek. So it was along ways from the top of the
    ridge down to the creek. And he just ran a line down the side of the hill to the house for an antenna. And there was no
    way to know how to aim the antenna. So, our first station that you could barely see through all the snow and the static
    was WJ--WJHL in Johnson City, Channel 11, which I still have a relationship with the people at that station today.
- speaker: Interviewer
  text: Oh, that's great.
- speaker: Respondent
  text: That was our first station, and then when we could get the antenna aimed towards something, the closest station was
    WSAZ in Huntington, West Virginia. And so that was our best station. And it faded in and out, but every Saturday night--Saturday
    nights were the Saturday night jamboree on WSAZ. And it was wonderful. It was so well done. The musicians were so wonderful.
    Connie Smith sang on that station when she was 17 years old on that program. All the people on that, I mean, the dancers
    were good, the musicians were good, the band was amazing, and the singers were good. And we'd watch the Saturday night
    jamboree and eat tomato soup and soda crackers. That was Saturday. I remember that very well. And I think that probably
    influenced my life, too.
- speaker: Interviewer
  text: So children-wise, close growing up?
- speaker: Respondent
  text: Yeah. I think, as I say, my sisters were sweet and smart and good, and I was mischievous. And probably not as smart
    and probably not as gracious and graceful as they were.
- speaker: Interviewer
  text: In those early--you know--set the scene for me. Where's the house in terms of where were you?
- speaker: Respondent
  text: The first house we lived in when we got there was at that time called Recreation House. Now it's got things called
    Preece--and it's high up on the hill. We moved from that house down to Creek House. And Creek House was in a little bit
    of a bottom that sits across the creek from a big bottom, and it flooded.
- speaker: Interviewer
  text: Is that Troublesome Creek?
- speaker: Respondent
  text: Yeah, Troublesome Creek. And it flooded about twice a year.
- speaker: Interviewer
  text: The house or the creek?
- speaker: Respondent
  text: Both. Both. Yeah, Creek House flooded. The floods have gotten higher. Last year we had the highest flood. Troublesome
    Creek flooded at the highest level it ever has. But I remember other times in the early sixties once, and there were different
    times when there have been the biggest flood in history before this one. So things that we thought were out of the flood
    plain are now not. But Creek House, I'm sure when they built it, probably there was no chance it would get in the house,
    but then it did a couple times a year. When we moved out of that house, I'm not good with dates, but when I was pretty
    young moved into a house called Hillside.
- speaker: Interviewer
  text: Hillside. Describe Hillside for me, the house.
- speaker: Respondent
  text: I can send you a picture of it.
- speaker: Interviewer
  text: I'd love to see that.
- speaker: Respondent
  text: I just saw it. It's it. It's on the table in my basement. I was cleaning out some boxes yesterday at my wife's encouragement.
    She's very good at, I would be a hoarder and I would live in a horrible mess if it were not for Diane. So I found a picture
    of Hillside. I'll take a picture of it with my phone and send it to you.
- speaker: Interviewer
  text: Did the kids share a room?
- speaker: Respondent
  text: No. Well, in Creek House we did, because Creek House, there was just the living room, a bedroom, another kind of a
    room, a bathroom, and a kitchen. There was kind of a little dining area, but it was not a--Hillside was used for a lot
    of different things. I mean, there were things on different floors. A lot of the houses in Hindman, in particular, the
    settlement in particular, built about that time, about the 20s, were very similar, because they had clear-cut the forest
    at that time, as they did with a lot of Eastern Kentucky. They floated from Hindman, there was not a railroad there, they
    floated the logs down the creek when it flooded. And so they would float all the logs down the creek, but the oak was
    too heavy to float. So that green oak, they built the houses, they milled that in a sawmill--
- speaker: Respondent
  text: --a local, rough kind of a sawmill, and built the houses out of that. And the construction of it was a big board and
    then a small--if you had a lot of big boards and then smaller boards. And over time, as that green oak cured, it moved,
    and so there were some places you could see through. It was a huge house. It kind of went up the hill this way, so there
    was one floor that was at ground level, another floor that was at ground level, and there was then some stairs to an upper
    store, and there was even a basement that used to have an old coal-fired furnace in it. And the heat was radiators. It
    had fireplaces that were much more effective than the radiators. And the radiators were, I guess, a gravity system. As
    the hot water would go up, then the cold water would fall, and it would circulate that way. But it wasn't very effective,
    and it didn't--it wasn't. The fireplaces were much more effective than the radiators.
- speaker: Interviewer
  text: So what do you--you know--you talked about the Saturday nights and the tomato soup. Talk to me about what--what were
    you--what do you remember about the meals?
- speaker: Respondent
  text: Well, at that time, the Settlement School, there were 70-some students that lived there, because at that time, even
    though Knott County is not huge, the roads weren't very good. And getting from one place to another, an example I just
    was talking about recently, so it's on my mind, was Hindman and Decoy, which were not that far apart, the way the crow
    flies, but to get from - I don't know, less than 20 miles, probably. But to get from Hindman to Decoy at that time, you
    had to drive like 50 miles and go through like five different counties. Even though they're both in Knott County, Decoy
    is close to Brethitt and maybe Perry too. But you had to drive through Floyd, and I mean, the way you had to go was quite
    a trip, and it took a long time. So students that lived in Decoy couldn't come to the public high school in Hindman without
    staying in Hindman. So that's the reason students had to stay at the Settlement School, and they'd come stay through the
    week and then go home on the weekends. And when I was very young, there were dairy cattle there, they raised a lot of
    corn, potatoes.
- speaker: Interviewer
  text: The school did?
- speaker: Respondent
  text: The school, yeah. And all the students that stayed there also worked there. So everybody worked, either at farming,
    or at cooking, or at cleaning. Everybody did something. When I was in high school, I worked at the library for Harriet
    Johnson. She was the librarian at that time.
- speaker: Interviewer
  text: So when you were kids, though, going back to the young days, were you eating meals with the other students?
- speaker: Respondent
  text: Yeah, most of the meals we'd eat together. We had a small kitchen in our house, and Mother was a wonderful cook, and
    did cook, cooked every bit, I think every bite of bread that I ate until I left home, and left, I ate at somebody else's
    house or at the settlement. But in our house, she baked all the bread, and wonderful bread, everything. She had some kind
    of, she called it a nadama bread, that was cornmeal, and there was molasses in it a little bit, and it was really good.
    She made every kind of bread, all kinds.
- speaker: Interviewer
  text: But you were eating a lot of the meals with the school?
- speaker: Respondent
  text: That's right. That's right, That's right, at the Settlement School, because there were some wonderful ladies that
    cooked for everybody.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: Did I tell you about Daddy building the May Stone building?
- speaker: Interviewer
  text: No, let's talk about that, because your father, before you start, I'm just going to say, he was a force.
- speaker: Interviewer
  text: At some point, you had said that he didn't finish his thesis, because the time ran out that they give you, because
    he was so swept up with what he's doing.
- speaker: Respondent
  text: He was busy.
- speaker: Interviewer
  text: Oh, my gosh, he was busy with what he accomplished there. So one of those things was building buildings. Let's talk
    about that.
- speaker: Respondent
  text: When Daddy became the director, there were, I think he said, 13 buildings on the campus, and they were all condemned.
    And he said they should have been. And some of them had, in the boys' dormitory, there were, I think, there was like a
    shower in the basement, a big room, but I don't remember that. I think there was concrete on some of it, but I don't think
    there was concrete on all of it. There were, all the buildings, you know, had been built, I guess, when they first started
    the Hindman Settlement School, the first thing they did was build a great big building for everything. And it was everything
    from dormitories, to classrooms, to residence for the ladies that lived there, to everything, kitchen, probably, and it
    was everything, it was huge. And it burned. And they said that they learned from that.
- speaker: Interviewer
  text: When did it burn?
- speaker: Respondent
  text: Thirties or forties. Yeah. Thirties.
- speaker: Interviewer
  text: Yeah, thereabouts. Yeah.
- speaker: Respondent
  text: Yeah. It would have been in the thirties or forties. Thirties to give time to build it, and no, it might have been
    even earlier than that, because most of these buildings, I think, were from the twenties and thirties.
- speaker: Interviewer
  text: Mm-mm, okay. So they lost everything. They lost everything.
- speaker: Respondent
  text: And they said, okay, from this point on, we're going to build them apart from one another. And so, in about, okay,
    Daddy had been director for about four or five years, so the early sixties. We still, okay, I'm sorry, I'm trying to put
    it together, I'm remembering John Kennedy.
- speaker: Interviewer
  text: I have May Stone Building in '57.
- speaker: Respondent
  text: No, that's too early.
- speaker: Interviewer
  text: That's too early?
- speaker: Respondent
  text: It wasn't then. It was more like 62 or 64.
