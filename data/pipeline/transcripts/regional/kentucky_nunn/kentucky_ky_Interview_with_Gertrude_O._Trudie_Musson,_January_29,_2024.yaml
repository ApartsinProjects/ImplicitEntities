collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: I came here as a summer intern for Senator Cooper. And stayed in with him in the Senate for seven years and was supposed
    to work for another member of the Senate and decided I really didn't want to. So I--Mrs. Cooper was gonna write a book
    on gardens. So she asked me to come help her. And, she never did. But--and then he was appointed ambassador to India--to
    East Germany, and he asked me to go with him.
- speaker: Interviewer
  text: And you're originally from Louisville?
- speaker: Respondent
  text: I am from Louisville, yeah.
- speaker: Interviewer
  text: And your parents, your father was an episcopal--
- speaker: Respondent
  text: And my mother had an Irish shop at one point.
- speaker: Interviewer
  text: I read that. It was called the Shamrock House. Tell me about that.
- speaker: Respondent
  text: She started downtown, Bakery Square? Is that Bakery Square? And then she moved to--well, near the--what's the bar?
    The bar on the corner. It's a white building.
- speaker: Respondent
  text: It might not be there anymore. You might be--
- speaker: Interviewer
  text: I'm Lexington, so I don't know Louisville as well.
- speaker: Respondent
  text: What is it? Well, anyway, it's in a sort of complex on channel width lane, I think.
- speaker: Interviewer
  text: And where was your father's church?
- speaker: Respondent
  text: He was, originally at the Church of the Advent on Baxter Avenue.
- speaker: Interviewer
  text: Oh, on Baxter. Yeah.
- speaker: Respondent
  text: Where his father was. And then he, left there and he, he was also working at a little mission, Saint Thomas. And,
    he left the Advent to make Saint Thomas a member of the diocese. It was just a mission when he was going back and forth
    and preaching. And so
- speaker: Interviewer
  text: Was his father an episcopal minister as well?
- speaker: Interviewer
  text: Was his father?
- speaker: Interviewer
  text: Your grandfather was episcopal as well?
- speaker: Respondent
  text: And his grandfather was a bishop.
- speaker: Respondent
  text: I know it's a full--
- speaker: Interviewer
  text: That's amazing. That's amazing. And so what high school did you go to?
- speaker: Respondent
  text: Collegiate.
- speaker: Interviewer
  text: Collegiate. Okay. And what neighborhood did you all live in?
- speaker: Respondent
  text: We lived out in the country. I mean, then it was country, but it's not now. Brownborough Road.
- speaker: Respondent
  text: And, my grandparents had I'll show you a photograph of them actually. My grandparents had a, house and the cemetery
    was here.
- speaker: Respondent
  text: And we built behind there.
- speaker: Interviewer
  text: Oh, okay. Yeah. That was out in the country at that time.
- speaker: Interviewer
  text: Oh, that's interesting. Okay. So, you graduate from high school. Did you have an interest in politics at that point?
    Or an awareness of politics at that point?
- speaker: Respondent
  text: I think so. I, I think, I think I always was interested. I think Kennedy kind of started people my age having an interest.
- speaker: Respondent
  text: And, so, yeah, I think
- speaker: Interviewer
  text: So, you--before I get into the internship, talk to me about high school. What were some of the things that how would
    you describe yourself in high school? And what are your memories from high school?
- speaker: Respondent
  text: Well, I wasn't a student.
- speaker: Respondent
  text: But I loved Collegiate. Just loved Collegiate. And you know, the there were fourteen of us. And only one has died,
    and we still communicate with each other.
- speaker: Interviewer
  text: That's incredible.
- speaker: Respondent
  text: Yeah. It's wonderful.
- speaker: Interviewer
  text: Wow. That's fantastic.
- speaker: Respondent
  text: Yeah. Um, and, my aunt worked for Thruston Morton, and she came to talk to an assembly at Collegiate. And I was so
    you know, it so unded so wonderful to me that I--that was one push.
- speaker: Interviewer
  text: I'm sure that was a, a, a big influence.
- speaker: Respondent
  text: Yeah. And then, that push and then, of course, is as I say, Kennedy.
- speaker: Interviewer
  text: We had--we also have, one of our first oral history projects in our archive is also a Thruston Morton oral history
    project.
- speaker: Respondent
  text: Oh, really.
- speaker: Interviewer
  text: So that was one of the first that we, we did. We did a project on Fred Vincent, the Supreme Court Justice.
- speaker: Respondent
  text: Now he was Kentucky. Right?
- speaker: Interviewer
  text: He was Kentucky.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: And and Thruston Morton where there were two of the earliest projects that we have in the archive. So, okay. So your
    aunt works worked for Senator Morton Thruston Morton. And and that's an early influence. How did you get on your radar
    this idea of an internship? No. No. You've been to college first.
- speaker: Respondent
  text: Yeah, well not for long.
- speaker: Interviewer
  text: Not for long. Let's talk about that. So you went to U of L?
- speaker: Respondent
  text: I went to well--I went to Bennett in Millbrook, New York, and did not like it, so I, left much to my parents' horror.
    As you can imagine.
- speaker: Respondent
  text: And, then I went to U of L.
- speaker: Interviewer
  text: Okay. Okay.
- speaker: Respondent
  text: And didn't I never graduated until I--here at forty--I graduated from Mount Vernon
- speaker: Interviewer
  text: Oh, you did. See, I wondered about the timeline because it's well documented that you have said that, "I went and,
    I never--I went for the internship and never came back."
- speaker: Interviewer
  text: And so, so I wondered about finishing because I--yeah. Because that was your sophomore year or your junior year?
- speaker: Respondent
  text: Must have been my junior.
- speaker: Interviewer
  text: I think it was your junior.
- speaker: Respondent
  text: I was twenty when I came here and worked for him. So that's--it was probably--
- speaker: Interviewer
  text: Okay. So, so you're a political science major at the University of Louisville. So again, interested in politics, um,
    how did you how did you make the step to I'm gonna apply for an internship and, and move to Washington, DC?
- speaker: Respondent
  text: I, I'm just trying to think what, what, as I say, I think of my aunt and--
- speaker: Interviewer
  text: What was her name?
- speaker: Respondent
  text: Rose Blakely.
- speaker: Interviewer
  text: Rose Blakely. Okay. That makes sense. So
- speaker: Respondent
  text: So she spoke and I came and, I came with a, another friend from Louisville. And she got the internship with Morton.
    And this is really quite a musing. I didn't hear from Cooper. I didn't hear from Cooper. And which is now I know it's
    not unusual, but I didn't at that point And so finally, I got a letter and he said, I think I'll have a space for you.
    And I think probably my aunt kind of--because they--
- speaker: Respondent
  text: --you know, friendly.
- speaker: Interviewer
  text: I'm sure there was some, some--
- speaker: Respondent
  text: Yeah. Push.
- speaker: Interviewer
  text: --little arm twisting there a bit. So, what was your friend's name, who you went with?
- speaker: Respondent
  text: Betsy Miguel (??). It's her--Betsy Johnson.
- speaker: Respondent
  text: She's married to Randolph Johnson.
- speaker: Respondent
  text: She lives in Louisville.
- speaker: Interviewer
  text: Oh, okay, okay. So this was the person that you--she was your roommate, is that correct? While you were out there
    as an intern?
- speaker: Interviewer
  text: Okay. So this is what year?
- speaker: Respondent
  text: Sixty-five.
- speaker: Interviewer
  text: Sixty-five. Okay. So talk about your first impressions of Washington DC, you know, coming coming out for the internship?
- speaker: Respondent
  text: Well, I just loved it.
- speaker: Respondent
  text: You know, you can't help, but if you're there, be enthusiastic, excited, impressed.
- speaker: Respondent
  text: You know, it's just--
- speaker: Interviewer
  text: I mean, I remember--
- speaker: Respondent
  text: --whole different world.
- speaker: Interviewer
  text: I remember my first impressions
- speaker: Interviewer
  text: In nineteen ninety-one. It's a whole different world.
- speaker: Interviewer
  text: That's right. Okay. So so how did you all go about, like, finding a place to live and--
- speaker: Respondent
  text: At my aunt--
- speaker: Interviewer
  text: --oh, okay.
- speaker: Respondent
  text: got us a basement apartment in Georgetown.
- speaker: Respondent
  text: I mean and then, when I decide to stay on, I, got a--an apartment up at Wisconsin Avenue by the cathedral.
- speaker: Interviewer
  text: Um-hm. Do you remember where your basement apartment was that summer?
- speaker: Respondent
  text: On N and, just off of Wisconsin.
- speaker: Interviewer
  text: So you were like--
- speaker: Interviewer
  text: --this side. Right? Yeah. But but--
- speaker: Respondent
  text: Because you were the other side.
- speaker: Interviewer
  text: Yeah. You were like three blocks. Probably or three or four blocks away from my internship basement apartments--
- speaker: Interviewer
  text: --on N Street. That's amazing. So, so you have an apartment, talk about that, you know, those first impressions of
    an internship, that first day. Do you ever do you have memories of that first day?
- speaker: Respondent
  text: Yes. I do because he was coming in the door. And he, he, (laughs) I mean, I didn't know who he was. (Boyd laughs)
    You know, I really didn't. And I remember he said, "are you here to visit or to work?" And I said, "I'm here to work."
    And then, I think he dropped his briefcase or something. And I don't, I don't know, but I, I've been, of course, I realized
    who it was. And, he said, "well, you come in." And he introduced me to Bailey Guard (??) who was his AA. [Administrative
    assistant] And they took me to Senator Cooper said, well, she can just come with us to the hearing. I think it was Agriculture
    Committee. And I thought, oh my lord, I don't know what I'm doing. Am I supposed to be paying? You know, am I--is this
    gonna be like a test? You know? And, so, that was the beginning of that.
- speaker: Interviewer
  text: I mean, it it's it's interesting because I can't help but think about my own experience. And this is not about me,
    but I will say I remember going to my like, on my first day, I worked in the Senate Press Gallery, and my job was to go
    to these hearings. And I realized I didn't really understand what these were, the hearings. Like, what are they doing
    here?
- speaker: Respondent
  text: Yeah. Well, I mean, you can't expect to. You know, that's the thing. Anyway, what year was this?
- speaker: Interviewer
  text: Nineteen ninety-one.
- speaker: Respondent
  text: Ninety-one.
- speaker: Interviewer
  text: So you're at a committee hearing. And, and, and such on this first day to--walk me back, walk me through some more
    of that first day.
- speaker: Interviewer
  text: Walk me through some of the first, or, or some of the other things about that first day that you remember.
- speaker: Respondent
  text: I well, I'm pretty scared. You know, I just really don't remember, you know, I've it's, it, uh.
- speaker: Interviewer
  text: Had you been to the Senate before or the--in Washington DC on tours as a tourist at that point in your life?
- speaker: Respondent
  text: I think I've sat--I think I've been in the gallery I, I don't remember, but I'm, I imagine I--
- speaker: Interviewer
  text: And you and Betsy, you know, presumably came together and then separated to the different offices.
- speaker: Respondent
  text: Yeah. And then she, left to go back and finish college.
- speaker: Interviewer
  text: At the end of the summer?
- speaker: Respondent
  text: Yeah. And I didn't. That's when I stayed on.
- speaker: Interviewer
  text: Well, let's, let's, let's talk about that summer a little bit more. What were some of the things that you were asked
    to do as an intern?
- speaker: Respondent
  text: Probably get coffee.
- speaker: Interviewer
  text: Get coffee.
- speaker: Respondent
  text: You know, file. I, I did file.
- speaker: Respondent
  text: Which actually was sort of interesting in a way because you saw a lot of things, you know, letters or speeches or
    things like that. (clears throat) And I don't remember much.
- speaker: Interviewer
  text: Did you have much interaction with the senator that summer as an intern?
- speaker: Respondent
  text: Probably not.
- speaker: Interviewer
  text: Yeah. So as an intern, probably also not with Lorraine, his wife, either.
- speaker: Respondent
  text: No. I've forgotten--I know. She, she entertained quite a lot. I'm sure you know that, and did beautiful parties. And
    at one point, she asked me to send out invitations or, you know, I don't know, a dinner or something. And I did, and then
    I sent her a list. This is amazing. I sent her a list of who I had spoken to, and regrets and, you know, she had never
    nobody had ever done that for her. And she, so she said, "Can you come help me?" And, of course, he's he was happy to
    have that happen. You know, he--and, so that's how I got started with her.
- speaker: Interviewer
  text: So that essentially was one of the things that sort of made them realize this isn't just a regular old intern.
- speaker: Respondent
  text: (laughs) Well, I don't know about that. But--so and I don't know, how I, how he was convinced that I could stay on.
- speaker: Respondent
  text: Must have been Bailey Guard or somebody. Yeah, actually, he sent Bailey Guard to talk to my parents, and see if it
    was alright. I think that's the most amazing illustration of what he was like.
- speaker: Respondent
  text: Don't you think?
- speaker: Interviewer
  text: To have somebody talk to the parents.
- speaker: Interviewer
  text: Wow, that's amazing. What do you you do your parents ever did your parents ever talk about that conversation?
- speaker: Respondent
  text: I don't think so.
- speaker: Interviewer
  text: Because, I mean, You weren't going back to college?
- speaker: Respondent
  text: No. But I think they realized.
- speaker: Respondent
  text: You know, and my father always said, "She's the only one of my children that didn't go to college and she had the
    most exciting job."
- speaker: Respondent
  text: So they, they, you know, and of course, they loved him.
- speaker: Respondent
  text: You couldn't, not love him.
- speaker: Interviewer
  text: That's what it sounds like.
- speaker: Respondent
  text: Yeah. And, um, you know, he was a, he was somebody to really revere.
- speaker: Interviewer
  text: So it's really a tremendous opportunity.
- speaker: Interviewer
  text: Now, you know, one of the things I remember as a Senate intern that summer, was the social aspect, you know, that
    that there was that was that was pretty remarkable, that summer. What do you remember socially about being an intern that
    summer in Washington, DC?
- speaker: Respondent
  text: We didn't have I mean, I think you probably had a real group. Of--and that really, I wouldn't say that existed for
    us.
- speaker: Respondent
  text: And why? I don't know.
- speaker: Respondent
  text: Um, I, I just can't think that we had really intern activities.
- speaker: Respondent
  text: But you did.
- speaker: Interviewer
  text: Yes. We did.
- speaker: Interviewer
  text: But you and Betsy, did you, did you go out? What would you, what would you all do for fun?
- speaker: Respondent
  text: I suppose we, well, I went out with one of the elevator operators.
- speaker: Respondent
  text: Who worked on the elevators right around the corner from our office. And his office was fabulous. You came in on C
    Street. He was right at first office in the old Senate Office Building.
- speaker: Interviewer
  text: And who was that?
- speaker: Respondent
  text: Senator Cooper.
- speaker: Interviewer
  text: Oh, Senator Cooper?
- speaker: Interviewer
  text: Right. No, but I mean, who would you, who was the elevator operator?
- speaker: Respondent
  text: Frank Greer. (??)
- speaker: Interviewer
  text: Frank Greer. (??)
- speaker: Respondent
  text: Yeah, who, I think he lives in Washington State now.
- speaker: Interviewer
  text: So I've heard, you know, Betsy goes home after the after her internship, but I, but I read somewhere about a dinner
    party that you all had. Tell me about that.
- speaker: Respondent
  text: I can't really remember who, what we were having, but we had decided to have beef stroganoff. (laughs) And, of course,
    we made all this stuff. I can't, you know, I don't know how many we invited. But being from Kentucky, you know, you're
    gonna have a lot of food. And of course, we made all the stroganoff and absolute
