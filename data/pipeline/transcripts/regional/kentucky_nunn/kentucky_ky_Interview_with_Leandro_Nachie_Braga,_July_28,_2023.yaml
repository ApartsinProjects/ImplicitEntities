source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, if you can, just tell me a little bit about yourself, where you're from, that kind of thing.
- speaker: Respondent
  text: Yeah, so, I'm Nachie Braga. I'm thirty-eight years old. I've been living in Kentucky probably about sixteen, seventeen
    years with a couple breaks in there. I'm a first-generation Brazilian immigrant. My parents came here right after what
    would have been first grade for me, basically to get their college degrees. So, I did a lot of growing up in DC area,
    Maryland, and then kind of moved around a lot as a young adult. Kind of did that thing where every year you move to a
    different city, live out of a backpack, travel around. I did a lot of, I guess what you could broadly call social justice
    activism, kind of under that umbrella. So, whether that be work with the unhoused or environmental issues, a lot of economic
    justice type stuff, a little bit of labor organizing. I kind of dabbled in a lot in that lifestyle. I actually ended up
    in Kentucky as a result of that lifestyle where you're moving around, different communities would ask me to come, hey,
    teach a workshop, do a training here in this city, whatever. So, this was in 2006, early 2007. I was living in California
    at the time, around the Central Valley. It was just sort of the time to go to wherever the next place was going to be.
    So, I didn't have, I had never been anywhere in the middle of the country. I'd lived on the East Coast, lived on the West
    Coast, flyover states or whatever you want to call them, no experience. But I had a buddy from Cincinnati, an old pen
    pal, who was moving down to Lexington actually to start a community center, an info shop that was like a show venue and
    a bookstore and all these kind of different things for radical literature. So, I was going to come down and help out with
    that. As it happened, that whole operation was totally unpermitted and very, very anarchist in its orientation or whatever.
    So, the fire marshal shut us down pretty much the weekend before I got to town. So, my whole reason for being in Lexington,
    I was like, oh, okay. But I got stuck here nevertheless and got in with the punk scene around here and the kind of some
    of the DIY, the do-it-yourself organizing as far as putting together a music scene and some of the cultural expressions
    that come along with that, and some political organizing as well. And then, man, I mean, after quite a while, and we can
    talk about all these things that happened over that period of my life because that's when I started learning how to identify
    plants, doing wilderness survival training, learning about permaculture and some of these things that were ultimately
    going to lead to what I'm doing today. But yeah, Kentucky, you know, like I never had any concept of, well, I'm gonna
    go to UK eventually. You know, that was like a decade after I'd been in Lexington that that ended up happening. It was
    really surprising to me. But I ended up getting a couple professional degrees in natural resources, urban design, stream
    and watershed work. So, that has now—to the extent that I can say that I'm a professional or that I have a career, because
    this is a very strange field that I work in, we're kind of making it up as we go along. And of course, climate and ecology
    all around us is shifting so rapidly that we have to make it up as we go along. But that's kind of broadly how I ended
    up where I am today.
- speaker: Interviewer
  text: Okay. Can you say a little bit more about some of the political organizing and stuff that you were doing I take it
    around Lexington and maybe what some of that, some of the movements that that organizing was around?
- speaker: Respondent
  text: Yeah. Well, so we've seen several different generations of folks come up and different, like, for instance, Black
    Lives Matter in 2014 was very distinct from how that same movement in a lot of ways re-emerged in 2020. And there were
    different people, I think, here locally and some of the same people as well playing different roles. So, it's been interesting
    to see things like that where when I first moved to town, as I mentioned, there was that DIY punk scene that was very
    oriented towards vegan straightedge, which for those who don't know, vegan is a dietary lifestyle choice where you abstain
    from consuming animal products or using them in whatever different areas of your life, whether that be leather or shampoos
    and conditioners and that kind of thing. And then straightedge is a punk rock, kind of an East Coast hardcore punk rock
    subculture related to abstaining from drug use, alcohol, and those are kind of the primary tenets. So, this very clean,
    like, positive outlook on life, like, we are the outcast punks or whatever, so we're gonna build our own society here
    and it's gonna be egalitarian and we're not gonna eat animals and we're gonna play music and have fun together and that
    kind of thing. And there's a certain genre of political activity that grows out of that. It's very, like, it's kind of
    lifestylist, you could say. It's heavily subcultural in its orientation, but for instance, going out and finding food
    that was going to be thrown away at grocery stores and then using that food to cook meals and give it away on the street,
    whether that be to unhoused people or just whoever's walking by, usually under the banner of what's called food not bombs.
    I have a food not bombs tattoo on my neck, so I've been involved with that organization and half a dozen or more cities
    around the country, including Lexington. So, that was a lot of that kind of stuff in 2007, 2008, that was the vibe. There
    had also been recently in Lexington, just prior to my arrival, there had been an event called Reclaim the Streets, which
    is again one of these kind of banners that people use to describe a general tactic, a protest tactic, in this case being
    kind of like, we're gonna throw a spontaneous block party and it's gonna be super anarchist or whatever, which I should
    say from the outset, I'm not an anarchist, I've never been an anarchist, but I've rolled with these punk circles where
    oftentimes that's the orientation that kind of is the default for a variety of reasons. But so anyway, that was a—there
    was one of these Reclaim the Streets events in Lexington and it went very poorly, in that a few people got arrested because
    they went out in the street and tried to fight the cops and then a bunch of people didn't get arrested because they didn't
    want to be physically assaulted by the state. And so, then there was a big kerfuffle in the punk scene and a split where
    like, well we said we were all gonna go out in the street and you didn't and blah blah blah. So, that was all kind of
    simmering and happening as I showed up in town. Again, super subcultural, very niche, very radical, very ultra-left, relative
    to what the average person on the street would think of in terms of their political perspectives. And, of course, you
    had always things like Kentuckians for the Commonwealth organizing in Lexington. They were nowhere near as big as they
    are now, but they kind of represented sort of the more milquetoast liberal electoral kind of strategy. And there were
    a couple other groupings that would pop up here and there, but nothing, to my mind nothing really super significant until,
    let's say, 2014. I was involved in the founding of a group called Kentucky Workers League. I was the first chair of the
    steering committee for that group, which was intended to be an explicitly Marxist organization with a strategic focus
    in that kind of organizing. And as it turned out that was a non-viable (laughs) organization. That was a really bad experience
    for me actually in terms of having to take a step back, feeling disillusioned about prospects for radical organizing in
    Kentucky, especially in Lexington as a small town and kind of a scale of like, okay, who's out there? Who's willing to
    talk about these ideas? How serious are they? So, I regard that experiment as having been kind of an abject failure. And
    that was my last real foray into that kind of political organizing. And what's so significant about it is that the disillusionment
    that I felt from that experience led directly to my forming a company, my saying, okay, I'm gonna start an LLC because
    then I can just be dictatorial about whatever I want to do, you know, the strategy that we're gonna pursue. I kind of
    have this legal structure in place where if I want to get people to do something I can pay them to do it and we can go
    out and make these interventions. So, that kind of really shifted my strategic focus. And I became a lot more cynical,
    a lot more jaded, and I'm kind of coming out of that cloud now, which is interesting because I still have this company
    and that was explicitly set up for these reasons. But now, I'm starting to think a little more asymmetrically about, okay,
    how can we use this tool that I have now? I've been successfully incorporated and feeding myself miraculously doing permaculture
    design work for three or four years. So, that already has surpassed some of my wildest dreams. But I don't want to lose
    sight of the fact that this was always intended to be, you know, not a career per se, but a tactical choice to say, okay,
    here is a form of organization that I want to use to direct towards achieving whatever projects are important. Which at
    this period in time, climate adaptation, food sovereignty, housing, all these things that are very kind of wrapped up
    in the general sort of under the umbrella of urban ecology, we could say, have been my focus.
- speaker: Interviewer
  text: So maybe just to take a little step back here—
- speaker: Respondent
  text: Yeah, sorry, that was a lot of stuff—
- speaker: Interviewer
  text: No, it's fascinating. I'm really curious what, at least in terms of kind of timeline, where that kind of, you know,
    bit of a disillusionment with political organizing in Lexington and where that kind of lined up with, you said that you
    were at UK, right?
- speaker: Respondent
  text: Yeah, so I kind of skipped a piece there in my story, which I guess would be between the time when I came to Lexington
    in 2007 and then when I was involved with some of the organizing in 2014, there was another kind of momentous turning
    point in my life, which was, again, another cycle of disillusionment. And in particular, kind of seeing the scope of the
    issues that we're facing as a civilization and the prospects for like, okay, who's seriously politically organizing in
    a way that looks like it, something that isn't depressing (laughs), let's say, you know. I just didn't really see that.
    And so I, and this mirrors very much my stepping back from organizing later in my life. So, I've had these ups and downs
    over and over, and I think a lot of people do, where you get disillusioned and you step back and then, but you know, if
    this is really in your heart and you're gonna do this no matter what, you ultimately come back and figure out some different
    way to have that expression. But so, for me in that time, 2009, 2010, it was the—well, screw this, I'm gonna go live in
    a cabin in the woods by myself, style, you know. The thing, we've all had that thought—
- speaker: Respondent
  text: Or some version of it, you know. Oftentimes people say, well, one day I'm gonna have a bunch of land and all my friends
    are gonna be able to come live there for free and it's gonna be cool, you know. Like, we've had these ideas, we have these
    discussions, everybody is kind of sharing this general goal. And so, for me, you know, I went kind of, I leaned into that
    and said, well, then I got to learn what plants to eat. I got to learn how to make a shelter out of what can just be found
    in the woods, you know. Some of these things are a little dramatic, right, but the wilderness survival, nature awareness,
    kind of naturalist training, more informal than you might find in academia, but that's what I pursued. And it was coming
    from that place of, well, screw this, you know, obviously civilization is gonna collapse and we're not gonna fix this,
    so I'm gonna have to learn how to make medicine from what's the weeds in my backyard, or, you know. Very naive, very immature,
    very self-centered, as often you find these things that are marketed to us widely, you know, wilderness survival is a
    whole industry out there. But it was huge for me because what happens is, when you get into this stuff, you say, okay,
    I'm gonna learn how to make friction fires, I'm gonna learn how to make rope or cordage from plant fibers and all these
    things, and I was very fortunate in that the people that I learned these things from, the teachers that I sought out,
    they were very explicit about their lineage and where these skills came from, where they had learned from, and where humans,
    in terms of our ancestral history, we share this common heritage of some of these earth-based skills, or whatever you
    want to call it, so you have to start learning and become sensitive to indigenous life ways. If you're going to learn
    these skills in any kind of depth, or if you're going to become familiar with your native flora and the ethno-botanical
    kind of uses, yeah, if you're gonna do any of that kind of stuff, you start learning about indigenous life ways. And when
    you do that, you realize, and again, maybe I sound super naive here, but as a young man, having this realization that
    was very life-saving to me, that I mean, it's obvious, but indigenous people, land-based cultures, wherever they are in
    the world, they're not wilderness surviving, right? They have a fully developed culture, all kinds of dynamic interaction.
