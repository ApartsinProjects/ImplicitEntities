collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So one thing that I always wonder, you know how these Spotify's and Apple, you know, streaming music things at the
    end of the year, they deliver your--what you love the most and what you listen to the most and things like that.
- speaker: Interviewer
  text: And, you know, I had released a song like two years ago or three years ago, and my friend was giving me a really hard
    time because that song was on my, like, favorites list. Like, I had played it. Do you all listen to your own recordings?
- speaker: Respondent
  text: That's an interesting question because usually we don't, uh, so much. And we were realizing that because we also just
    released "Volume One" of "The McLain Family Band Collection". It's our first eight albums. And so cue seeing it--doing
    a little quality control. We had to listen, you know, I listened to all the tracks every second to make sure, you know,
    that the digitization had come through. Jeff Myers at Tower Studio in Lexington did a fabulous job.
- speaker: Interviewer
  text: He's fantastic.
- speaker: Respondent
  text: Digitizing them for us from, from, um, and so we had--from the original albums, which, of course, are not all available.
    And so we got to listen to them (laughs) and realized, I don't know that we had listened to them after they were recorded.
    And after you record, then you're on to the next.
- speaker: Respondent
  text: You're, you're doing shows. You're touring. You're off thinking about the next record. And you don't go back.
- speaker: Respondent
  text: You know, because you also feel like maybe you can do everything better this week than you did last week.
- speaker: Respondent
  text: And so, so we--there were some of the things I don't think we had listened to.
- speaker: Interviewer
  text: So listening to some of that old material, what surprised you?
- speaker: Respondent
  text: Well, this was material from 1970 and all through the 70s. This collection set, "Volume One", has eight albums on
    four discs. And it's all of the eight albums through the 70s. And I was impressed with how interesting it was. First,
    I was thinking, well, this will be nice for those that are interested in hearing us when we were kids. I thought, well,
    that has, has a place, I guess. And then when I was listening to it, I realized, oh, I got it. You know, there is a place
    in history. This does have things that happened that impacted music that came after it. Raymond, even as a kid was a phenomenal
    instrumentalist and, um, our father's influence with his interest in all these different styles of music and our interest
    in--with the international touring you know getting to meet musicians in other countries And there are just different
    influences than in some bluegrass presentations. So that was interesting to me. There were things that our father did
    with--on the accordion with us, which was charming. And I loved getting to hear the harmonies. Because we did harmonies
    right away. Our father was so respectful of us as we were growing up. And he felt like we could do anything. And he made
    us feel like we could, you know, we could. And we didn't think about it. We didn't think of ourselves as kids. And I realized
    that some of those, even the earliest recordings, I was slapping the bass and we were doing this interesting three-part
    harmony that had different things than, than traditional and some modal things, so me very Appalachian things, some that
    had, uh, interesting--there was one song that was going along 4/4 and then (Smith taps out a complex rhythm that the band
    shifted to) And it was fascinating to me.
- speaker: Interviewer
  text: Well, we talked last time, and I, I will say it again. I'll say it in every interview. Your father was just this creative
    genius.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: who, who, you know, we talked about your time in Washington, D.C., where you have two weeks to prepare, and we're
    going to teach you the dulcimer, and you're going to learn these songs--
- speaker: Respondent
  text: --we just did-- (laughs)
- speaker: Interviewer
  text: -you know, and--
- speaker: Respondent
  text: --we just did it--
- speaker: Interviewer
  text: --and there's this sort of-- fearlessness about him that, that sort of translated down. Do you think in some ways
    as kids, now that you've listened to these old recordings, that you almost had an advantage because there was this fearlessness?
- speaker: Respondent
  text: It was an incredible advantage. It's, I--it makes me flush. It was such an advantage. Our father's, not only musical
    background, but his fearlessness, his confidence in us. You know, and he was as humble as anybody I've met, but still
    confident. A gorgeous balance. And he made us feel like we could do things.
- speaker: Respondent
  text: That, you know, go ahead and hit that note, you know, (laughs) okay? And, "Let's do this in three parts, but let's
    add a," you know, "this right here." And he just, would--"go ahead and play a break on this." You know, oh, as a bass
    player, as a kid, bass player. "Okay, yeah, play a break on this." And then, you know, it's just, of course. And his,
    his ideas, even though he was also very true to the traditions and very respectful, incredibly respectful of the traditions.
    And so he helped us be--also be able to do as real an eastern Kentucky version of an eastern Kentucky song as there was.
    So we could do shape note singing. We could the, the--do modal pieces and a cappella ballads. And then also do things
    where we could play with orchestras and have--and feel respected in that role, too. It was fascinating.
- speaker: Interviewer
  text: Yeah, yeah. How, how--you don't--you haven't been listening to these things all your life.
- speaker: Interviewer
  text: You're diving back in and you're listening to these, talk about the emotional side of that. What, what, what--is there
    anything that's stirred up?
- speaker: Respondent
  text: Yes. So many things. When--first time, uh, I--was going to listen to them on the way to Morehead where I was teaching.
    And I thought, OK, well, I'll just pop this in and listen on my way, just QC it, um, because we had taken the albums to
    Jeff unopened. You know, we had, because there are not more of them, but we had saved a few for family.
- speaker: Interviewer
  text: So these are reel-to-reel tapes?
- speaker: Respondent
  text: Well, we have some of those, but they're in different formats.
- speaker: Respondent
  text: (coughs) So he ended up using the albums.
- speaker: Respondent
  text: So that they could be consistent.
- speaker: Respondent
  text: And, and, uh, so Jeff had digitized them. He'd--and made the files and my husband had been working with him and had
    the files--he put them on discs for me to listen to just, you know, to, to make sure that it was that we'd gotten what
    the song was, and so I was listening to it on the way to Morehead and I couldn't go in to, to my first lesson. It was
    overpowering. That history and those times were just so amazing, so wonderful. That life that we got to have--we still
    get to have. But there was nothing like those times, and you can't even explain it. And yes, it was overwhelming.
- speaker: Respondent
  text: And to get to hear my father's voice.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: I mean, who gets to hear their father's voice?
- speaker: Interviewer
  text: That's right.
- speaker: Respondent
  text: Of things you got to do together.
- speaker: Respondent
  text: Yeah, that was--
- speaker: Interviewer
  text: --I can imagine. I can imagine that that, you know, was--and, you know, the emotional question has been counterbalanced
    by the fact that, that--there's so much excitement about this that--that I think, you know, I don't know if you all quite
    realize like how excited people are going to be for this. But like Michael Jonathan, for one, you know, folk singer Michael
    Jonathan, he's been talking about this for ten years.
- speaker: Respondent
  text: Well, he is one of the reasons we are doing it.
- speaker: Respondent
  text: Because he helped convince us that other people would be interested. That it's not just, oh, here, if you're interested
    in what we did when we were kids, you know, then here. But he helped us see a perspective of this being a legacy. You
    know, this being something that will outlast all of us.
- speaker: Respondent
  text: And he said it should be, it should be all of the albums. And not, we were thinking, okay, well, we could do a best
    of. He said, not a best of. This is the legacy set. You have all--you have the set. And so we have "Volume One" completely
    done, released. It's out. And I brought you one.
- speaker: Interviewer
  text: I'm so excited.
- speaker: Respondent
  text: And "Volume Two". Goes into production Monday.
- speaker: Interviewer
  text: Fantastic. (Smith laughs) How many albums will that cover?
- speaker: Respondent
  text: It's eight on each.
- speaker: Interviewer
  text: Eight on each. Okay. And so--
- speaker: Respondent
  text: --so four discs.
- speaker: Interviewer
  text: And the span of years that that represents is Seventy to--
- speaker: Respondent
  text: --Seventy to now.
- speaker: Interviewer
  text: --to now. Okay. That's amazing.
- speaker: Interviewer
  text: This is going to be so great. I'm, yeah, I, I, I, I just can't say how excited people are going to be. You know, when
    I talk to people about, you know, and I know you guys do these wonderful shows. There's one coming up, right, at the library
    in two weeks, I think?
- speaker: Respondent
  text: Yes, it's this month.
- speaker: Interviewer
  text: I made sure I'm in town for that, um, but--
- speaker: Respondent
  text: --on Thursday.
- speaker: Interviewer
  text: You know, and so I know you feel the appreciation there, um, from the audiences that I've seen you perform to. But,
    but, there's something different, I think, when--about those old recordings that is going to--
- speaker: Respondent
  text: --well, we've always felt that live concerts and that connection is the most impactful. We've always felt that the
    connection you can have with a live audience, because it's, it's that feeling that's created and in that space and that
    moment, you get to share that moment. And that's not any other moment. This is right now. We get to do this with, together
    with the audience. And it creates an amazing space. And you can feel the vibration of the air is different in that--
- speaker: Respondent
  text: --in that live space. And, and so that's one reason that, you know, yeah, we might do something with the albums. Maybe
    somebody would be interested, but it's the live concerts.
- speaker: Interviewer
  text: The energy, you know, that the audience has, too, is--we always talk about like an oral history theory, right? That
    this interview that we're doing here, this isn't just me hitting the recorder and story gathering. This is an interaction.
    This is, you know, it's both of us are feeding into this.
- speaker: Respondent
  text: That's why you're so good at this.
- speaker: Interviewer
  text: Well, thank you. Thank you. But when the band is playing together, there's, you know, the same thing. You guys are
    collaborating and there's this vibration and, you know, sound that the physics of the whole thing--
- speaker: Interviewer
  text: --is happening. But the energy of the audience--
- speaker: Interviewer
  text: --can really just--
- speaker: Respondent
  text: --It makes a difference.
- speaker: Respondent
  text: --it absolutely makes a difference. And so we've gotten a new respect for the recordings.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: You know, our father, to help us not stress over being perfect for recordings, I think, said that it's just a document.
    It's a record of what we did at that moment. You know, you may do it better or differently next week, and that's fine.
    He said, "This is just a recording of what we did this day." You know, take the stress off. It doesn't have to be perfect.
    The goal was not to be perfect. Because if that's your goal, then it gets a little more sterile, (laughs) a lot more stress,
    and that feel doesn't happen. And so with the recordings, we always tried to have the feel. You know, we tried to do it
    more live, together, even now when there are so many capabilities, so many abilities to do things. You do your part today.
    You'll do his part next week. We'll upload it.
- speaker: Interviewer
  text: Oh, "You're in Chicago. Will you put your part down and send it to me?" (Smith laughs)
- speaker: Respondent
  text: Just upload it. But we still do it live.
- speaker: Interviewer
  text: Last time you said how wonderful it was recording at Rickey Wasson's because he has the booths with the windows where
    you all literally can see each other and it's--feels live.
- speaker: Respondent
  text: Yeah, absolutely. And we can still, you know, come in together and sing our parts and still feel that live--and some
    even in the same space because that's important in music.
- speaker: Interviewer
  text: Yes. And as the musicians, you know, I can tell you're saying, well, you know, we're thinking about the live as, you
    know, you're clearly holding the live dynamic up here. The recording is just sort of this thing that you did. But the
    recording is the only tangible way that the audience can actually recreate that moment--
- speaker: Interviewer
  text: --emotionally. And so that's what I just love, that everybody I've ever talked to, beyond the Michael Jonathans and
    the super fans that you have, have just sort of thought for a moment and thought, who--people who weren't even bluegrass
    mus--you know, fans, just thought, oh my God. The McLain Family Band. And you can see like this rush of memories coming
    back. And so I think this is going to be great. So I just can't wait.
- speaker: Respondent
  text: Well, it's exciting for us more than we expected.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: It's exciting for us. And there's a little booklet in the, in the CD set box of the four discs, and it has pictures
    of each of the albums and what was on each of the albums, and, you know, and--
- speaker: Interviewer
  text: --oh, good--
- speaker: Respondent
  text: --when and where.
- speaker: Interviewer
  text: Actual liner notes.
- speaker: Respondent
  text: And, well, it's not a story. We didn't include the story in it because that's a lot of songs.
- speaker: Interviewer
  text: Oh, Lord. Oh, my Lord, yes. (Smith laughs)
- speaker: Respondent
  text: We stuffed song--a lot of songs on each CD and so--and I actually am going to count them this weekend because there
    are a lot of songs.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: And a lot of information and writers and publishing information and how long each lasts and the studios and engineers
    and all. And it's Jodi Miller who's helped us put the package together. She's done the whole design-
- speaker: Interviewer
  text: --oh, she's been with you guys since--
- speaker: Respondent
  text: --she's done a super job.
- speaker: Interviewer
  text: She was really, really super young.
- speaker: Respondent
  text: She's done a super job.
- speaker: Interviewer
  text: She's great. Okay. Well, speaking of super exciting.
- speaker: Interviewer
  text: Um, we're going to go back to--last time, last interview, we finished with talking about, really, the fire. And the
    fire, in some ways, I know it's not exact timeline-wise, but in my mind, it kind of represents the moment for the McLain
    family that you all transitioned, beg
