collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Pastor Gaines, if you can just give us a little bit about yourself and who you are, what you do?
- speaker: Respondent
  text: Sure, I'm Richard Gaines, of course. I'm serving as the pastor of Consolidated Baptist Church for the past twenty-seven
    years now, only church I've ever pastored--
- speaker: Interviewer
  text: Twenty-seven years.
- speaker: Respondent
  text: Twenty-seven years. I say to the congregation that I had black hair when I came--(Tristin laughs)--now, it's pretty
    much all gray.
- speaker: Respondent
  text: But it's been a good journey for my family and I. I'm originally from the state of Texas. Spent ten years in Corporate
    America in various sales and marketing positions, production, and then was called into ministry in 1990, Halloween night,
    1990--
- speaker: Interviewer
  text: --Halloween night--
- speaker: Respondent
  text: --I acknowledged to the church publicly that God was calling me into ministry. So I remained with the company until
    that following summer, and left the company, and enrolled in seminary in 1991. Completed the master's program in '95,
    and was called to pastor Consolidated Baptist Church here in Lexington, Kentucky, in June of 1996, and we have been here
    ever since.
- speaker: Respondent
  text: My wife and I, my--our son has grown up here, he's twenty-eight now, and was recently called to pastor a church in
    Detroit, Michigan.
- speaker: Interviewer
  text: Wow, it runs in the family.
- speaker: Respondent
  text: I guess so. (both laugh)
- speaker: Interviewer
  text: I--you know, we're talking about COVID and those experiences, and since we've, kind of, talked about, or, you know,
    you've, kind of, talked about your, you know, professional life, can you, kind of, give me maybe just a bit of an--the
    experience of COVID for you and your--maybe--you know, maybe not too broadly, but broadly of your congregation as well?
- speaker: Respondent
  text: Sure, sure, Adam. I think it's accurate in saying we are still experiencing the effects of COVID.
- speaker: Respondent
  text: Yes. I was actually in St. Louis at a fellow pastor's retirement celebration. It was a Saturday evening, and that's
    when the nation locked down. I actually made a phone call back here to say, "Lock the church down, no service tomorrow,"
    and this is Saturday evening, about 6:00 or 7:00 p.m. I mean, it was--I can remember that like yesterday, I says, "We're
    locking down, we're not going to put people at risk." Because, at that time, people didn't really know how this whole
    epidemic was going to play out.
- speaker: Respondent
  text: And so we didn't want to put people at risk, especially our seniors who were very loyal and would have been here if
    the doors were open.
- speaker: Respondent
  text: And so we just went into protection mode until we found out more about what was going on. And so even though things
    have progressed greatly, there are still lingering effects around with our seniors as far as fellowship, with our children
    on the other end of the spectrum who missed a year and a half, two years of school, not only the academic loss, but the
    fellowship. I had to rethink how it affected them, especially because it was easy for me to say as an older person, "Okay,
    so you missed the prom, no big deal, you'd get over that." But for them at that age, that was the greatest thing they
    were looking forward to at that point in their lives.
- speaker: Respondent
  text: Even though they tend to live with their phones in their hands, I'm finding out that the missing of the fellowship
    and the interaction, one with the other, has had some deep effects on them. And we're still trying to garner some of what
    was lost during that time, and so it's ongoing. Not to mention, you know, how it affected many of our congregations economically.
    And so just a lot of dynamics that work, again, that are still being played out.
- speaker: Interviewer
  text: Sure, can you talk about that, that moment when you, you know, decided to lock down, what led you to that decision,
    what--you know? I mean just because you said you can recall that time--
- speaker: Interviewer
  text: --just to be specific.
- speaker: Respondent
  text: Well, it was--what made it even more challenging is that I was out of town.
- speaker: Interviewer
  text: Oh yeah, right, right, right.
- speaker: Respondent
  text: So I was, kind of, like Dad knowing there's danger back home, but you can't be there. You can't get to the children
    as you want to, to put your arms around them, to protect them.
- speaker: Respondent
  text: And so the only thing I could do was, again, not being aware of what the potential effect was of the pandemic and
    what we're going to be dealing with. The decision was, if we erred, let's err on the side of safety, and so we made the
    call to pull the plug on service, corporate worship and say, "We're going to--you know, we're not meeting tomorrow," which
    then immediately took us into a shift into virtual space. The good news is we had equipment already on-site, unlike some
    of our compadres in ministry who had to start from scratch. And we already had things like cameras and whatnot, and so
    we could immediately go to live stream. And then put things in place to deal with the finances, you know, cash app and
    giving online and Givelify and all those other platforms that were available for giving. And so we had to immediately
    move to get all of that fine-tuned, up and running, and just a lot of challenges. In fact, I've said, and I still believe,
    that our leadership and staff probably worked harder during that period than when things were as normal.
- speaker: Respondent
  text: Yeah, yes, sir, I believe that. I think emotionally, it was much more taxing than people are aware of, and because
    persons at home only saw the broadcast, they had no idea what went into it. There were many days when we recorded here.
    On Thursday, I would record the message for the coming Sunday morning, and it might be my wife, my son, a musician, and
    three or four other people in the sanctuary, if that many.
- speaker: Respondent
  text: And so we did what we did, and we ran it on Sunday, and the choir would come in and record songs, and the media people
    would put all that together, and voila--
- speaker: Respondent
  text: --the broadcast was there.
- speaker: Respondent
  text: Those dynamics were challenging at times, but we were able to, you know, manage through it by the grace of God.
- speaker: Interviewer
  text: Yeah, what led you--what got you there to--just to lock it down, like what? Was it something that was from other,
    you know, was it the national thing, you know, like what led you to that decision?
- speaker: Respondent
  text: It started with the national thing, but then we spoke with our mayor and some medical personnel both in and outside
    of the church. And, at that time, there were more questions than there were answers.
- speaker: Respondent
  text: And again, to err--if we're going to err, we wanted to err on the side of safety.
- speaker: Respondent
  text: The last thing we wanted was to be a place where people came, contracted COVID, and we had massive sickness in our
    midst. I didn't want to live with that possibility. So I feel like we made the best decision because that was a long journey
    in walking through COVID to--at the church, in the hospitals, in the community, events where people gathered the whole
    nine. Man, it was just a plethora of issues that we had to work through.
- speaker: Respondent
  text: But, yeah, the national statement, you know, from Dr. Fauci?
- speaker: Interviewer
  text: Um-hm, um-hm.
- speaker: Respondent
  text: And our president, of course, and other national leaders, medically and politically, state, from our governor, and
    from our city. And again, what really impacted me was talking to medical people that I had high regard for in us--in this
    community--
- speaker: Respondent
  text: --who said, "Pastor, we don't know what we're dealing with, we just don't know, and we would recommend X, Y, Z," and
    that's the way we went.
- speaker: Interviewer
  text: Wow, I'm sure that was--maybe not--I mean it was hard, but at the same time, like, one, for being away but, two, just
    having to, you know, take such drastic action quickly.
- speaker: Respondent
  text: Yeah, it was the unknown. I mean, it's one thing to battle an opponent and you know what you're battling.
- speaker: Respondent
  text: In this case, nobody knew the severity of it, if it was just going to be a bleep. I think most people thought, yeah,
    you know, thirty, sixty, ninety days, we'll be back to normal.
- speaker: Interviewer
  text: Right, yeah, I was in--my students, because I was teaching at the time, didn't want or thought we were going to come
    back after spring break, you know, were very, oh yeah, no problem, but--
- speaker: Interviewer
  text: --it's like, I don't know, you all. (laughs)
- speaker: Respondent
  text: I think a lot of people, even in church, figured at any time, we'd be back open, and I just--I couldn't see it.
- speaker: Interviewer
  text: Yeah. How did you--how was your family during this time? We talked about your son and your wife and how did you all--?
- speaker: Respondent
  text: Well, we were in the throes of it. My son was our worship pastor at the time--
- speaker: Respondent
  text: --so we went to a--he talked a lot about what he called the church has left the building. In fact, he did his doctoral
    dissertation on that topic.
- speaker: Respondent
  text: And it was really based around what he did here to shift us to virtual worship. So we were--we didn't really have
    time to "grieve," if you will, because we were concerned about producing a worship service for everybody else to keep
    them in, plugged in, at least, to some degree.
- speaker: Respondent
  text: So we were part of that busy group who, again, I thought and convinced were working harder during the pandemic than
    any time before. So it was a little different in that sense. Whereas for my wife, I think it was somewhat different because
    not only were we doing that, but I was still doing--hospital visits were allowed and so the idea of being safe, mask,
    hand sanitizers, spacing. There was always a concern, when my husband goes out, is he going to be safe wherever he's going?
    So for her, it was that dynamic that she was dealing with that most non-pastor wives weren't having to deal with. Same
    thing for her son who was here--in and out of here. And it touched our household because both my son and I eventually
    contracted the virus. I was asymptomatic, didn't have--I mean I didn't feel tired, anything, it was just locked away upstairs.
    For him, he had all the symptoms--
- speaker: Interviewer
  text: --oh, wow--
- speaker: Respondent
  text: --so I mean he struggled through it. You know, God kept him, I mean, he wasn't in the hospital or anything like that,
    but, you know, the fevers, the cough, the sinuses, you know, issues, all of that, he dealt with that.
- speaker: Respondent
  text: So it touched our household as well.
- speaker: Interviewer
  text: Sure, sure. I'm assuming he's recovered and everything--
- speaker: Respondent
  text: --oh yeah--
- speaker: Interviewer
  text: --you know, okay?
- speaker: Respondent
  text: Yeah, he's perfectly fine now.
- speaker: Interviewer
  text: Good. If--again, if this is too personal or anything, but you talked about hospital visits, what was that like for
    you?
- speaker: Respondent
  text: It was different. I won't call it a trying, but it was definitely different. Because if you were allowed to go in,
    you--you know, you had to register to the front, get the mask if you didn't have one. If you went to the room, you were,
    you know, masked up. The person you were going to see where you may--used to just handshake and even a hug, yeah, all
    of that was--you know, you were encouraged not to do those things.
- speaker: Respondent
  text: Because you didn't want to carry anything into the patients, and you don't want to pick up something the patients
    may have had.
- speaker: Respondent
  text: So it was just a totally different environment, almost like you're walking on eggshells. Everywhere you went, you
    just had to be careful, hand sanitizer everywhere, which I understand, and it was good. You know, you--I kept it in the
    car like water on the console, I kept--I had hand sanitizer there. In fact, I still have hand sanitizer in my car; I have
    it in my bag. You know, if you shook--shake hands with somebody, you--afterwards, you know. And--
- speaker: Respondent
  text: --at one time, that would have been offensive, but now, it's like, hey, I get it, I'll understand, all those dynamics.
    And then there were others who you couldn't see at all; a nurse may do a FaceTime with you or a family member. There were
    persons on ventilators. We have-- we experienced a number of deaths in Consolidated due to COVID. We have one young man
    here now who was on a ventilator for probably ten or twelve days, maybe longer, who looks as healthy as a horse now. We
    had another young man who looked as healthy as a horse who went in on a Thursday, came home--no, went Tuesday, came home
    Thursday, suddenly became ill, his wife took him back. She came home to change clothes, and before she could change clothes,
    they told her to get back to the hospital. When she got out there, he was gone. (claps)
- speaker: Respondent
  text: We had seniors in senior care facilities in our city that we could not go into their room, but the nurses would bring
    them to the window. And we would stand outside and talk to them through the window that you couldn't raise up but just
    loud enough to talk to us through the window. When you've got somebody seventy-five, eighty, eighty-five years old that's--you
    used to hugging and fellowshipping with, and they can't see even their sons or daughters except through a window outside,
    Adam, those were the difficult moments.
- speaker: Respondent
  text: When a person's passed away, there was generally a fellowship meal, and you couldn't do that. Members of the congregation
    who were well-loved, thought a lot of, typically at a funeral, you may have four hundred people there, three hundred people
    there. It's confined to fifty people, mainly just family, and so the closure that generally comes does not happen.
- speaker: Respondent
  text: Or there's no church service, it's just a graveside with a dozen people, family members, all of those dynamics emotionally
    can take a toll. So we had to--
- speaker: Respondent
  text: --we dealt with a lot of that because we had more than our fair share of funerals.
- speaker: Respondent
  text: And you add to that the healthcare disparities of the Black and brown community, we saw all of that firsthand, upfront,
    and through the whole process.
- speaker: Interviewer
  text: Yeah, I'm sure it was an emotional toll on yourself?
- speaker: Respondent
  text: Oh yeah, yeah, I can--that's probably the understatement of the year.
- speaker: Interviewer
  text: Yeah. (laughs)
- speaker: Respondent
  text: But God gives grace, I can--
- speaker: Respondent
  text: --say that.
- speaker: Interviewer
  text: Oh, how'd you deal with that if you don't mind me asking?
- speaker: Respondent
  text: (coughs) Excuse me.
- speaker: Interviewer
  text: Because I used--I mean and, like, I'm--
- speaker: Interviewer
  text: --using your words, you said you're like the father, you know, holding on to--you know, to protect his children, right?
- speaker: Interviewer
  text: And so I can imagine that, you know, losing people that you work with or I mean that you see--
