collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell us a little bit about yourself.
- speaker: Respondent
  text: I guess I will often say I am a chaotic gardener and seed keeper, and also a PhD candidate in geography at the University
    of Kentucky. I am originally from Florida. I've bounced around a little bit in my adulthood, which has been interesting.
    But I've been here in Kentucky for almost three years now. I got here in August, 2020. I moved down from Wisconsin. I
    do a lot of your typical grad student things. At this point, it's a lot of kind of like juggling multiple side gigs and
    trying to figure out maybe there's a main gig in the future. But also, I do a lot of food and seed and farm work, both
    here in Kentucky as well as kind of organizing with food and seed folks in the region.
- speaker: Interviewer
  text: So you're Floridian. Where in Florida are you from and what was it like growing up there?
- speaker: Respondent
  text: Uh, Broward County. So right in—I grew up in Plantation, right outside Fort Lauderdale. Like forty-five minutes north
    of Miami, depending on where in Miami you would be from.
- speaker: Interviewer
  text: Southeast Florida, very subject to climate change.
- speaker: Respondent
  text: Yeah. The thing about Florida especially is that if you grew up there, you're very much interfacing with the not cute
    aspects of this thing we call the environment or nature as a normal part of your life. Like there are dinosaurs walking
    around and hurricanes. Something I've been thinking about in the past several years, having now lived outside of Florida
    for my adult life, is just the weird fact that there's a major kind of early established national park that takes up a
    lot of the state, but you can't walk into it. The first time I had gone to some of the national parks out west like Yellowstone,
    I was like, "Oh, people are driving through here," and it's like a theme park. You can stop and look at stuff. But if
    you grew up in Florida, your image of nature is often like the Everglades, which is very much a space in which you need
    a certain level of know-how to even enter. I think that's where maybe a lot of the chaos comes from. My parents were very
    particular about their suburban yard, which was a year-round project because of South Florida's sun. Mowing the lawn,
    mulching, making sure everything is very controlled. Whereas my memories of my grandmother's backyard was much more chaotic,
    growing vegetables, fruit trees I grew up harvesting from. Later on you might think of it as some sort of food forest,
    but it was just my grandma's backyard with a smattering of different edible plants. As a kid, I had a square in the yard
    at my parents' house where they let me do whatever I wanted. I would try to grow an orange tree and then forget it was
    there, throw seeds in the ground, keep up with it for a bit, then get distracted, but later seasons they would pop back
    up. So I think I came up in a space with a lot of anxiety over carefully controlled garden type nature, and I think that
    is one of the central tensions in the work I do now, especially because I'm a wannabe part-time farmer with multiple sites
    across two counties and all of them are deeply messy.
- speaker: Interviewer
  text: One of my friends in grad school from Florida described it as the state that nature's always trying to take back.
    Like we're visitors here and that's very clear. So you left Florida for college, correct?
- speaker: Interviewer
  text: How was that transition, both from an educational, personal standpoint, but also that experience of no alligators?
- speaker: Respondent
  text: I went to just outside Chicago. There was a radical shift in my experience of climate and weather. You finally get
    to experience temperate seasons, whereas in South Florida it's wet season and dry season and pretty warm year-round. Being
    out there, it was like, "Oh, there's an actual season." But also it was deeply cold in the winter. Something I've thought
    about a lot in the context of climate change is how people establish what they think is normal. I get inspired by work
    that takes up concepts like socio-ecological knowledges and memory work in environmental work, thinking about what it's
    like to speak with elders who have lived on certain landscapes for decades and can articulate changes ecologically and
    socially. My impression of what was normal was already not normal. Florida is a space of environmental weirdness becoming
    even weirder and more precarious with climate change. I think a lot about the lack of an idea of normalcy and how throughout
    my adulthood I struggled going back and forth trying to settle on an idea of what is climatically normal to better understand
    what has been happening in the places where I'm at. Being in Kentucky for the past few years, I rely on people who have
    spent their lives here to clarify when things are not normal, like a bad tornado outside the expected season or floods
    happening more regularly. Doing land work now, older farm folks let me use small plots of their land and talk about the
    history and how it's changed. Older farm folks make profound generational statements about things like the drought this
    summer, giving important contextual stories and environmental histories through these anecdotes about weird rains or droughts.
    But I forgot the question.
- speaker: Interviewer
  text: About the transition.
- speaker: Interviewer
  text: The tangent is wonderful and it got me thinking about shifting baselines, that each generation gets further away from
    a prior baseline, and the way embodied knowledge is often excluded from our understanding of climate as a scientific or
    natural environmental phenomenon.
- speaker: Respondent
  text: 'Yeah, that first transition going from South Florida to Evanston was a moment where I was seeing what seasons are,
    but also had weird emotional reactions to winter. Every year of college there would be a point where through stress and
    because I had never dealt with an actual winter before, I would emotionally break down. I thought I was the problem, but
    thinking back, that was a perfectly reasonable reaction to being thrown into that environment. None of us should be working
    in the winter in the first place. There''s a strange adjustment of having to figure out how to dress yourself right every
    day, getting used to keeping track of the weather in granular ways, and weird social and cultural things. Going to a private
    elite PWI and coming from a public school in South Florida, which is deeply segregated in terms of race and class, I realized
    everyone else was much better prepared to be in that space than I was and I had to find ways to adjust and keep my head
    above water. That was a lot of people''s experience when you get into a space you weren''t supposed to be in. Those were
    the two major things that stick with me: the climate weirdness and the social and cultural weirdness intersecting where
    I was like, what is going on? What am I doing here?'
- speaker: Interviewer
  text: What ways did you find to navigate and create space and comfort and find community?
- speaker: Respondent
  text: I think I was a weird kind of turtle creature in college. I had community here and there. I was kind of a loner. I
    bounced around. I had a lot of loose strings and a few really tight strings I still keep today, which I'm grateful for.
    I remember being very intentional in the winters especially, giving up on the need to be legible to other people and just
    being like a weir...
