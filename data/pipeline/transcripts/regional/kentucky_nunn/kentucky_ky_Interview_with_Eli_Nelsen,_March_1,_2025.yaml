collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: All right, so if you could start just by telling us a little bit about yourself, where you're from, what's your daily
    routine, those sort of things?
- speaker: Respondent
  text: Um, my name's Eli Nelsen. I was one of the youngest executive chefs in southeastern Kentucky. I've been working in
    restaurants for a few years. Then my grandparents became a little ill, so I moved back to take care of them and have been
    DoorDashing in the middle of the night to make some money. I just got a job at the country club, so hopefully I'll get
    back into that routine. I'm not trying to get back to the top yet. It's weird being the big dog in a little yard, but
    up here it's a lot harder. I'm only twenty-something for a little while, so I want to have some fun for a bit.
- speaker: Interviewer
  text: Do you know chef Tanya Whitehouse?
- speaker: Respondent
  text: Where's she from?
- speaker: Interviewer
  text: She actually works at UK but used to work for Rita Michael.
- speaker: Respondent
  text: Oh really? I haven't met anyone big like that. I'm from the holler in Kentucky, deep woods. I say this with no ego,
    but it was a big deal being a head chef down there. Everyone was proud of me. But moving up here, I couldn't even get
    a job at First Watch. They probably wondered what my intention was going from head chef to an egg place. It wasn't that
    I couldn't do eggs. My name used to be Ami Mami. That wasn't the problem.
- speaker: Interviewer
  text: And how did you first hear about the Post Clinic?
- speaker: Respondent
  text: My great aunt Louise helped open it. I'm pretty sure she got the funding. I needed to go to the doctor for a physical;
    I hadn't had one in six or seven years since high school. I didn't have insurance, so they said, 'Let's go to this clinic.'
    I had bad cavities and a big hole in my teeth. They got me in, fixed everything, and now I'm kind of sad I don't get to
    come back. They were like my friends, those poor ladies.
- speaker: Interviewer
  text: How was your experience accessing healthcare through the Post Clinic?
- speaker: Respondent
  text: Great, wonderful. I walked in, did paperwork, and they took me right in. I told them what was wrong, and they said
    they could do this and that. They have both dental and medical sides. I saw Dr. Olga who took care of me. She was cool
    and used natural supplements, not pills. It was refreshing because smaller towns often have weird doctors and pushers.
    That was really nice.
- speaker: Interviewer
  text: How has your experience with healthcare been before the Post Clinic?
- speaker: Respondent
  text: Uncomfortable. I think most people can say that. Here, it felt like they actually cared. It wasn't rushed or just
    a quick fix. Usually, doctors come in, ask how you are, and leave. Here, they take time to talk and see what's going on.
    Before, I didn't even want to go to the doctor unless something was seriously wrong. Here, it was almost like therapy
    because I could talk to them. Especially the dentist, who was very cautious and tender. The head dentist worked with kids
    for twenty years, so she was very patient and kind. That really helped the whole experience.
- speaker: Interviewer
  text: Any other questions?
- speaker: Respondent
  text: No, go ahead.
- speaker: Interviewer
  text: How has the clinic impacted your health or well-being?
- speaker: Respondent
  text: Wonderfully. I've never had the relationship with healthcare workers like I have here. They remember my name, which
    is always cool. Where I'm from, if you had something serious, you had to go to Lexington, which is a 200-mile round trip.
    There, doctors just run in and out, and you don't know what's going on. Here, they are nice and talk about your real life
    problems, not just symptoms. One lady has a candle store, and we talked about making candle parties downtown. We talked
    about business, life, trials, and tribulations. That's more than I've ever gotten at any other doctor or dentist.
- speaker: Interviewer
  text: They feel more like people?
- speaker: Respondent
  text: Yeah, like we're people, not lab rats or subjects. I would come here time and time again if I could, and I will if
    I can.
- speaker: Interviewer
  text: How long have you been coming here?
- speaker: Respondent
  text: About a month ago. They broke up my visits into sections because I had certain fillings and had to be numbed up. I
    was sad when they did the last one because I wouldn't be able to come back unless something was wrong. But it was like
    therapy; they listened, were patient, gave life advice, and didn't judge. My mouth was bad because of substance abuse,
    but now it's getting better. I always had nice teeth and took pride in them. Without them, I don't think it would have
    happened.
- speaker: Interviewer
  text: Do you feel like there's a sense of community here with your relationships?
- speaker: Respondent
  text: Absolutely. I want to bring them to cookouts this summer. Mount Sterling is a community-based town with churches all
    connected. It's about helping your neighbor. Even if you're from Lexington or have messed up teeth or need a coat, they
    say, 'Come on in, we've got you.' It's comforting, especially nowadays when everything seems greedy and evil. Here, there's
    a sense of joy and happiness, even if you're getting drilled in the teeth. They make it pleasant.
- speaker: Interviewer
  text: Could you talk more about the Post Clinic's role in the community? Like partnerships with people or organizations?
- speaker: Respondent
  text: If Mount Sterling is like Corbin, the town I grew up in, they're small and most people are poor. If they make just
    enough money, they don't get insurance. So most people don't have insurance and walk around with health problems. This
    place helps anyone who isn't rich get the help they need. Kentucky has some of the poorest towns in America. People might
    have tooth or blood issues, and if it's serious, they get referred for further study. That's huge for the community. I've
    seen great things come out of it. Who can turn down a free checkup?
- speaker: Interviewer
  text: And you don't have to drive 200 miles for it.
- speaker: Respondent
  text: Yeah, I have driven that far, but I would do it again because besides being free, you get a personal experience. They
    actually care. It's not just a job because they're not getting paid much. The big doctor might get paid, but not much.
    They're doing it with a smile from their hearts, not their pockets. That's huge.
- speaker: Interviewer
  text: Any final thoughts or things you want to say?
- speaker: Respondent
  text: I feel like this is going to be wild footage. I couldn't recommend this place enough. If you're scared or nervous
    about going to the doctor, no matter how personal or awkward, these people won't judge you. They'll use discretion, laugh,
    be your best friend, or talk about your problems. Whoever you are, no matter your walk of life, race, gender, or sex,
    it doesn't matter here. I was the weird social butterfly who rocked these ladies' worlds, and they loved it. You'll get
    treated fairly and have an experience you won't forget. You'll definitely remember this place if you come.
