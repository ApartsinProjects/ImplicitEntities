collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Can you guys tell me a little bit about yourself? What are your names? Where are you from? And what's your daily life
    like?
- speaker: Respondent
  text: Uh, my name is Tanya Lintner, and I live in Frenchburg, Kentucky. My daily life is being a wife and a grandma. That's
    about it.
- speaker: Respondent
  text: I'm Bryan, her husband, grandpa. I'm from Oregon, and I just hang out.
- speaker: Interviewer
  text: How did you hear about The Post Clinic?
- speaker: Respondent
  text: Someone in town told me about it. I was uninsured. They told me to check out The Post Clinic, so that's how.
- speaker: Respondent
  text: And I found out through him.
- speaker: Interviewer
  text: What has been your experience, like, accessing health care from The Post Clinic?
- speaker: Respondent
  text: Wonderful, actually. They have done wonderful with us. They've helped us out a lot. I can't say enough nice things
    about them. You know, with him and his issues, they've been great. And he's got a lot.
- speaker: Respondent
  text: They don't know them.
- speaker: Respondent
  text: Okay, that's why I said your issues--and then with mine, yeah, they've been great. They've been lifesavers, actually.
- speaker: Respondent
  text: Yeah they, they're easy to work with, so.
- speaker: Interviewer
  text: What has your experience been like accessing health care before coming to this clinic? Have you faced any challenges
    finding or receiving health care before The Post Clinic? And are there any barriers that you face in managing your health?
- speaker: Respondent
  text: Well, before that, I worked as a CNA for twenty-five years and then when I got hurt I lost my insurance, and the insurance
    is too expensive. So they--I found out through him and they took me right in, so. And they gave me all kinds of anything
    that I need, they kind of give me information, they've helped me, like, where I was bleeding so bad they got that taken
    care of. They're angels they really truly are.
- speaker: Interviewer
  text: After losing your health insurance, did you have any experience going to, like, a major hospital before The Post Clinic
    or, you just went straight to The Post Clinic?
- speaker: Respondent
  text: No, I didn't go. Didn't go because I couldn't afford it.
- speaker: Respondent
  text: Not until it was an emergency.
- speaker: Respondent
  text: You know, it had to be bad. Then we went.
- speaker: Interviewer
  text: And then how has your experience been like before, accessing health care before coming to The Post Clinic?
- speaker: Respondent
  text: Oh, it was fine. It was just a pain, we had, you know--
- speaker: Respondent
  text: There are certain things they won't do if you don't have insurance.
- speaker: Interviewer
  text: Okay, how has the clinic impacted your health or well-being?
- speaker: Respondent
  text: Well, I came in, I was bleeding for nineteen weeks straight. They took from within a month, they had me taken care
    of to all connections. They just had, from day one, wonderful. They made calls, they had me appointments set up, and I,
    great. I don't know what to say technically, but other than they really, really did do.
- speaker: Interviewer
  text: So do you feel like, with The Post Clinic that it's easy to make appointments and see them quickly?
- speaker: Interviewer
  text: There's not a long wait?
- speaker: Respondent
  text: No. You call, they usually get you in within that week, if not that day.
- speaker: Interviewer
  text: And then how has the clinic impacted your health at all?
- speaker: Respondent
  text: Same. Yeah, they, you know, I'm diabetic and whatnot, so they make sure everything's pretty simple.
- speaker: Interviewer
  text: How has your relationship with health care providers here been different from your experiences elsewhere? Do you feel
    connected or is there a sense of community at the clinic for you?
- speaker: Respondent
  text: There is a sense of community here, and they are so pleasant, knowledgeable. They explain. They take the time out
    to explain. They ask questions. The doctor, the first time was, talked to me for almost two hours. I mean, you don't get
    that anymore. They make sure they're kind, right up to the receptionist. They know you by name, they're just wonderful.
    They don't disrespect you. They don't look down on you because you don't have insurance. The doctors have been great for
    me and him.
- speaker: Respondent
  text: When they can break it down to you and make you understand what's going on with you and take the time to make sure
    you know and what your choice and your options are, are great.
- speaker: Interviewer
  text: If you had to tell anyone about The Post Clinic, like, what would you tell them? If someone's concerned about coming,
    like, what would you say?
- speaker: Respondent
  text: I tell everyone that--
- speaker: Respondent
  text: Yeah, we tell everybody.
- speaker: Respondent
  text: I know that don't have insurance. Don't be a fool. These guys are good, and--
- speaker: Respondent
  text: They're good.
- speaker: Respondent
  text: You don't leave feeling--
- speaker: Respondent
  text: Yeah, yeah. You can come in and tell them what's wrong. I tell everybody I know, hey.
- speaker: Respondent
  text: They're good.
- speaker: Respondent
  text: We'll do whatever we can to repay that for them because they have done wonderful for me and Bryan.
- speaker: Interviewer
  text: I feel like a sense of community is the most important thing in any sensitive place like The Post Clinic.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: And what's been your favorite aspect about The Post Clinic, is it the receptionist, you know making sure that you
    [unclear], is it the doctors making sure that you--
- speaker: Respondent
  text: Oh yeah, it's a very friendly place. You come in, you feel like you know every--well, you do know everyone. It's a
    small place, so.
- speaker: Respondent
  text: Right down to the care you get. I mean, right from the time you enter your door, they're kind. They get you right
    in. The doctors take the time to check you, to find out what you're here for, and make sure you have what you need before
    you leave. Very professional, but very neighborly, too. They're just really nice people.
- speaker: Interviewer
  text: So how far did y'all commute here?
- speaker: Respondent
  text: Thirty-two minutes?
- speaker: Interviewer
  text: And you all feel like it's worth every second of the drive?
- speaker: Respondent
  text: Oh, absolutely.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Respondent
  text: They know who we are, that when we walk in the door, they make you feel like you belong.
- speaker: Respondent
  text: You feel comfortable enough to tell them what's actually going on.
- speaker: Interviewer
  text: Is there anything, any specific experiences that you've had with them that maybe has built your trust? Like, what
    have they done to build your trust to show that?
- speaker: Respondent
  text: When I come in here, I was walking--I felt like I was just out of body. I had been bleeding heavy for nineteen weeks,
    and I was at my last point when I walked in that door. Every time I left, it was a month, exactly a month. They got me
    qualified for Medicaid for one month, and they had me, I had an ablation done and a DNC done, and I haven't bled since.
    And you know what? I think that's a miracle.
- speaker: Respondent
  text: And I thank them every day. They were on the phone, had me mammogram ordered, the whole works. You can't ask for anything
    better than that.
- speaker: Respondent
  text: No, she's friendly again.
- speaker: Respondent
  text: I've been always friendly. I'm nice.
- speaker: Respondent
  text: I'm a nice one.
- speaker: Interviewer
  text: Is there anything else you want to tell us or feel like you want to share?
- speaker: Respondent
  text: It's a good place.
- speaker: Respondent
  text: It's just a good place. We're so thankful that the community has it because there are a lot of people that can't afford
    insurance right now. And they do great work here.
- speaker: Respondent
  text: I come back--so that tells you something.
- speaker: Respondent
  text: Yeah, because he's a little difficult.
- speaker: Respondent
  text: They make me feel comfortable. So that tells you something.
