collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: I like to start with a little biography, so tell me a little bit about yourself.
- speaker: Respondent
  text: Okay, well you know when I was in Chicago and I was one of these James Beard Leadership Award recipients, I began
    my short talk to the group by saying, it really isn't about me, it's about we. It's about we. And, um, I try whenever
    I'm speaking--because question--I think--I mean like by saying, I think how we ask questions is part of the problem. Uh,
    I'm talking about climate change and, uh, our country was founded upon--resided in individualism. Ain't no such animal
    as an individual, okay? And our--even our human bodies are this collection of all kinds of elements. There's more bacteria,
    more fungi, uh, you know, within--on our skin, in our systems than we would even care to think about, let alone, you know,
    care about. Um, but, um, and then part of this assault on the earth, this assault on the earth. Especially the last five
    hundred years of what I call the Newtonian, Cartesian view of the world, is because of this sense of I as a human. That
    humans are intelligent and nothing else is intelligent. And that, you know, the human species is the most important species
    and, and we're high--we're on the hierarchy, we're way up here. And over there somewhere is the environment. You know,
    not here--
- speaker: Respondent
  text: --over there is the environment and we've got to protect what's over there. Uh, that sense of I, uh, in the English
    language, we only capitalize one pronoun. That's I. If I were making a decision of which pronoun to cap--it would be we.
    We is a much larger--there's much larger truth of reality than the I. You know, and you're a scientist and scientists
    are still discovering things and what they're discovering is nothing, nothing, there's nothing really called an I anywhere.
    But we keep using it, we promote it, and then we make it part of, um, you know, the research. We say hey you come to college
    and you get to be a professor and get to write a book with your name on it, okay, about what you're interested in. You
    guys--you know nothing else. You talk about problem--solving problems and part of the problem Einstein said, he said we
    can't solve today's problems based upon the way of thinking that created them. But, universities, you know, are, are,
    are the citadel of still teaching Newtonian, Cartesian view of the world--thinking separate, okay? And then we talk about,
    we, we, we read websites saying oh we're about problem solving.
- speaker: Respondent
  text: Well, but, but if your, if your structures at universities, how you write, are still based upon these old paradigms,
    then oftentimes you're creating more problems rather than problem solutions. So, that to say, um, I regard myself as,
    um, an agrarian intellectual activist because that's who came before me. Those who came before me were similar. Agrarian,
    farming, coastal land, you know, planting seeds and having things grow and looking after animals. Agrarian intellectual,
    though meaning that even in the thralls of enslavement, even though we were said by folk to be illiterate--
- speaker: Respondent
  text: --couldn't read or write in English, we were just lazy, shiftless, you know, didn't want to do any work. When work
    slowed down it was a resistance movement, another folk story. Um, but we were very--I say we were intellectual, and we
    were brought--our family came, according to my DNA, you know, testing and all of that, came largely out of Nigeria. Um,
    but we were very skilled people, very intellectuals, had universities, had great stories of oral history and, and worked
    in--I was just reading on the New York Times, uh, recently where a lot of the European--U.S. and European countries have
    agreed to send back a bunch of these been--these, these bronze masks and all kinds of art forms, um, back to Nigeria,
    um, that were stolen or people were killed and thousands of, of these wonderful, beautiful, uh, like, you know, art forms
    or--were now--are now in the museums and throughout, uh, Europe, France, Germany, England, United States, and there's
    been an effort to get those masks to go back to, back to Nigeria, and there's some whole issues about that. But, the point
    is that well--(clears throat)--to make those masks and to do the things that you're known for in West Africa requires
    some kind of, uh, intellectual ability--so I claim that kind of a lineage. And plus you know, um, uh, our great-grandfather,
    who was for emancipation, his father died--fought in the Civil War, died in the Civil War, his mom was a single mom with
    seven kids, moved back here. But his mother inspired him to go to Berea College in 1879. And we have his transcript, he
    went there to become a school teacher and he taught school again at the school right down the street here. So we come
    out of this family, recognize the importance of education, going to college, teaching and things like that. And then activist,
    um, meaning that ,um, we come out of a family lineage of activists. Um, we had uh, we three great-grandfathers who fought
    in the Civil War. Uh, when Lincoln finally--when the North was losing the war--(clears throat)--President Lincoln decided
    to open up, uh, the fighting force to include, um, enslaved Africans. And then our folks ran to fight. Uh, and, um, then
    after the Civil War ended my great-grandparents were known as people who, used to be a, used to be a bus service, we used
    to have very good regional bus service and train service. And so down the road here about a mile is where my grandparents
    lived, down this way. Uh, anyway, but, uh, my great-grandfather was known, he would catch the bus with my mother to ride
    into the city. And sometimes, not every time, sometimes the bus would fill up with people and they would say, well, you
    know, um, uh, Brother DB, you've got to give me a seat up, the white woman here. Okay, you know, come on now, you know
    how we do this, okay. Um--(clears throat)--and he would refuse, then he would be put off the bus with my mother and they
    walked right into town. Uh, so that kind of activism. Uh, my mother was the president of CORE in 1959. CORE stands for
    the Congress of Racial Equality, one of those direct action civil rights organizations. And I was ten years old on picket
    lines and wait-ins and got, you know, cussed out, spit on, whatever as a ten year old. But my activism was there because
    my mother was CORE president, her grandfather and her were put off the bus. Three great-grandfathers fought in the Civil
    War. Two of them were part of the 114th Regiment that must have entered Camp Nelson. That's where John Fee was, and that's
    how that John Fee was the founder of Berea College, that's how that connection came for our granddad, D.B., to go to Berea
    College in 1879. But two of those great-grandfathers in the 114th Regiment were part of the regiment, I like to say, when
    I'm in, you know, they were in the regiment that kicked Lee's ass in Virginia first of all--(Komara laughs). But they
    surrounded Lee and Lee was trying to escape and maneuver himself in his larger fighting force to get back to I think Richmond,
    Virginia, and they outflanked him and, and got him surrounded and forced his surrender. Well again, two of our great-grandfathers
    were there during that battle and during that time and they were there when the surrender was, uh, was offered by Grant
    to Lee at the courthouse, they were there. And then they were shipped to Texas in April to defeat the remaining Confederate
    forces, uh, in May before General Granger got there in June. So, part of the idea of how you write history, you know,
    you read about Juneteenth as well, this white general came out on a horse and read his, you know, or number three, he
    proclaimed, y'all are free, you black folk who are here, y'all are free. That doesn't say that a month before, you know,
    eight to ten thousand black troops arrived at Galveston and defeated the Confederate forces that were there and marched
    into town a month before Granger got there. Now if you've got ten thousand black troops--(laughs)--riding into the city,
    it tells you that when white folk ain't in control no more. And, and I--(laughs)--when I spoke at Stanford I said, well
    I said, uh, when, when, when, when the people who were in the city, so all these black troops, the white folks said what
    the hell is going on? I said black folks said almost the opposite. They said hallelujah, we're free. Lord have mercy.
    Thank you Jesus. Okay, uh, but anyway, so that's who I am as a body of, of those families. But even more physical who
    I am when I try to speak and have, how much time I have, I've got a lot of time here. But I enjoy saying also I'm someone
    who come, come out of this bioregion that's at the foothills of the Appalachian Mountains. It's this land that is fed
    by the Kentucky River watershed and land that is nourished by the soil heavily mineralized in limestone rock. That's who
    I am at the physical level because the soil is what makes us. We get some air of course, we've got to have a little air,
    a little water, okay. But at that greater physical level what we become is what is in the soil here. You know, when we
    eat plants we're eating dirt, hummus, compost second hand. And, if we eat animals then we're eating soil third hand. But
    we're eating--we just eating, you know, soil, dirt, hummus, compost--that's what becomes us. I recall speaking over at,
    um, at UK some of the students who were in their master's and PhD programs in soil science--a friend of mine is a professor
    over there, he was talking. And I asked students two questions at first. I asked them who felt close to the environment--okay,
    a real simple question, who felt close to the environment. Only a few hands went up, somebody said, "well you know, I'm
    a, uh, I enjoy going camping and I go to the Gorge often to go camping." I said "wow man, incredible. Oh I'm a canoer,
    you know. I, I like to go canoeing and do that and hiking." Okay, because we view--you know, over there as the environment.
    And I asked people--it's all PhDs--I said, "well how many people breathed a few sec--a few minutes ago?" Everybody breathed.
    I said okay. I said, "how many of you all drank water in the last three or four days?" I said well yeah, water comes from
    the Kentucky River. Then I asked them who felt close to rocks. I would usually carry with me all kinds of stuff, Tibetan
    singing bowl, you know, bones, pieces of wood. And I would carry rocks with me and I might even pass them around and I
    asked people who feels close to rocks. And again, this is a class of thirty students, okay at UK, all PhDs--all really
    smart people, okay. The future leaders, future researchers, future problem solvers. I asked them two simple questions,
    who felt close to rocks? I have thirty people, then three hands went up. One person said "well you know my mother is a
    geologist. I've just grown up around rocks all my life. I have a beautiful rock collection." I said, "Wow man, what an
    amazing answer." Another person said "well you know, I love rock climbing. And you know, down in the gorges, they're,
    they're known internationally." I said "I know, I've been there a lot of times. I do rock climbing too, okay." He said
    "oh yeah, so I just love rock climbing." Then I asked them two other simple--I ask them two questions. I said "well, why
    is blood red?" And the first thing I asked people who were using it, they said oxygen. I said no, "the function of blood.
    It's to pick up oxygen, carry it to all the cells, kick in the Krebs cycle, produce ATP , ATPP." I said, "What makes blood
    red?" People said oh iron. I said oh iron, oh iron, oh iron makes blood red, okay. Then I asked them, um, "why are bones
    so hard?" People say, "typically calcium." I said "yeah, but don't trust me. What do I know? I'm just an old dumb country
    boy. I don't know much. I said go to Google. I go to, you know, and Google the bone constituents. It's about twenty-three--twenty-four--twenty-three
    minerals make up bone. But I just asked you all who felt close to rocks." We got students at UK who were studying soil
    science, talking about dirt, pulverized rocks. They didn't feel any connection with rocks. I said "if it weren't for the
    iron and the carbon hydrogen chain," I said, "as a matter of fact, hemoglobin and chlorophyll are almost the exact same
    chemical formula when you draw it out. There's one thing that's different. In hemoglobin you have iron. In chlorophyll
    you've got magnesium." I said "so we should be thankful. We should be shouting. We should be shouting. Yes, we're divinely
    close to rocks. Yes, yes, we are. And, and as a matter of fact, if it weren't for iron, we'd be a plant, okay?" Okay,
    but we don't teach that kind of stuff. What we are reading, when I read the websites, we're talking about problem solving.
    We're talking about problem solving. I mean we're using the same way of thinking that Einstein talked about to create
    the problems. So, so, I'm saying that, that, that if you can't be a student, like in this case soil science, ask the same
    question wherever I go, the same responses, okay, the same responses. Wherever I go, ask the question, that's how we're
    taught. Okay, we become experts at this Newtonian, Cartesian view of the world, which means not only assaulting Mother
    Earth, but also means assaulting women and they're connected. Okay, the devastation, you know, I'm looking at you all's
    page, okay, about climate change and the new consortium and, and whatever, okay. I read nothing in there that even mentioned
    Mother Earth. Talk about climate, like it's some non-living something--non-being--this non-entity called climate. I read
    nothing in there, when you speak to someone who's indigenous, they might begin the first page with tears. Because we are,
    we're just assaulting the mother. You know, we're devastating, we're blowing up mountain tops, you know, we're, you know,
    we've got, you know, all these, you know, changes in weather and, and, and, you know, the mother is crying and the species,
    we've already caused numerous symptoms already. There's no--I didn't read anything in there that even mentioned Mother
    Earth, first of all--(laughs)--as the mother, Edwardian science says, the earth is a machine and she is a resource to
    be mined, devastated, polluted, and she's this resource, we treat her how we want to treat her. Not the source of life,
    but a resource. And the devastation of Mother Earth is very closely, in my view, connected with how we treat women. There,
    there, there--and we can't solve one without the other. I read nothing in you all's webpag
