collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: Rutland Vine Melton.
- speaker: Interviewer
  text: What would you like to be called?
- speaker: Respondent
  text: Well, the majority of people call me Slim.
- speaker: Interviewer
  text: Slim! All right, Slim. This is great. Now, where did you get that nickname?
- speaker: Respondent
  text: Look at me.
- speaker: Interviewer
  text: That kinda tells a story, doesn't it? Oh, that is great. Well, Slim, who gave you that?
- speaker: Respondent
  text: I got really another name, now, you would never believe is they call me Get Gone.
- speaker: Interviewer
  text: Say that again?
- speaker: Respondent
  text: I got Get Gone - is my father started calling me Get Gone, because when I was a baby my mother used to--I crawled
    on one knee, and every time my father would come around and say something, I took off, you know, on my one knee, running
    from him, so he started calling me Get Gone. That's the only thing he ever called me my whole life.
- speaker: Interviewer
  text: That is a great story. That is a great story. Get Gone. I tell you what, Slim and Get Gone, you obviously were going
    to have a fun life--
- speaker: Interviewer
  text: Without question. Well, I began this project, Slim, when my father, Robert Hern, was manager of the Benham Credit
    Union--
- speaker: Respondent
  text: I remember--I remember that.
- speaker: Respondent
  text: Right there in Benham.
- speaker: Interviewer
  text: And then later, when they started the credit union in Lynch, you know, they asked him to come up and start that.
- speaker: Interviewer
  text: And at that time, were you living there when they were selling the houses to the miners?
- speaker: Interviewer
  text: Did you buy a house, or any member of your family?
- speaker: Respondent
  text: My family--my mother and father, they bought a house. Me and my pastor we had number three, because we had a camp
    called Number Three--Camp Three. That was--they had a camp called Camp Three. Me and the pastor both lived in Camp Three,
    in fact, we lived next door to each other. When they started, everybody had to move out the houses. You had to wait till
    a house got empty before you can get a house. Well, we were going one by one. The last three families from--leaving from
    Number Three. That's where the pastor live, in Number Three, and I live in Number Three, and we got a house in Number
    Five. The camps went by numbers. And we were about the last left from Number Three to Number Five. And the--all the houses
    belonged to the coal camp, belonged to the--built by, you know, The Company.
- speaker: Interviewer
  text: That's right. U.S. Steel built them, and they owned them.
- speaker: Respondent
  text: They owned them. They had the Company Store. I heard you mention about the store to the pastor. You got your food--
    you went by scrip.
- speaker: Interviewer
  text: Tell me about the scrip. Tell me about the Big Store. So, now, you were born when?
- speaker: Respondent
  text: Nineteen forty-eight.
- speaker: Interviewer
  text: Nineteen forty-eight. Okay. In 1948, was Lynch still using scrip?
- speaker: Interviewer
  text: How long did they use?
- speaker: Respondent
  text: I say I think they used it up until about--well, when I got into high school, they started using money, but it's one
    thing--you had Benham, International Harvester. You had Lynch, U.S. Steel. That scrip you can spend nowhere but in Lynch.
    You couldn't go to Benham company with that scrip. You had the Company Store. Everything in the--your toys, your clothes,
    everything was in that one Big Store, and that's called--everything by Tennessee Ernie Ford in-- [laughs] --the Company
    Store.
- speaker: Respondent
  text: The Company Store.
- speaker: Interviewer
  text: The com--owned by the Company Store.
- speaker: Respondent
  text: Store, that's--
- speaker: Interviewer
  text: That is for sure.
- speaker: Respondent
  text: Well, it was true in Lynch.
- speaker: Interviewer
  text: That--I didn't realize that scrip was being used that late.
- speaker: Interviewer
  text: That's very--
- speaker: Respondent
  text: Oh, when I got in high school, now, they weren't using scrip then.
- speaker: Interviewer
  text: Okay, by the time you were in high school, then you were talking about cash.
- speaker: Interviewer
  text: Okay. Now, when you're referring to your pastor, you're talking about Ronnie Hampton--
- speaker: Interviewer
  text: And tell me about your relationship with his church, and the name of the church.
- speaker: Respondent
  text: The name of our church is the Greater Mount Sinai Baptist Church, and the pastor and I, we grew up together. I'm three
    years older than he is, but we was right next door to each other. We played together. We fought together, fought each
    other.
- speaker: Interviewer
  text: Fought each other.
- speaker: Respondent
  text: You know, but I would listen to him when he was interviewing him about the switches when you get a whippin'. A grown
    person seen you do something wrong, before you got home your mother and father knew it. When you got home, and you--it's
    basically my mama. She asked, "What do you do?" And she tell me what the lady said--or what the grownup told, said to
    her. I said, "No, I didn't do it." "Oh," she said, "oh, she lyin', huh?" That got me a whipping.
- speaker: Interviewer
  text: That is so great.
- speaker: Respondent
  text: Yeah, my mother sent me out there to get switches, to get that whipping, to get three switches, and she wanted us
    to plait them, and you better plait them right. But, you know--
- speaker: Interviewer
  text: So you had to go get three switches.
- speaker: Interviewer
  text: And then what?
- speaker: Respondent
  text: And she would plait them.
- speaker: Interviewer
  text: Oh, she plait them together!
- speaker: Respondent
  text: Oh, yeah. See, you weren't allowed to lie. As I say, the kids--
- speaker: Interviewer
  text: No lying permitted.
- speaker: Respondent
  text: The kids nowadays, they should--they just should go back to when we was raised, when we were raised, they were more
    disciplined. We learned. Now, it's against the law to whoop a child. I don't think they ever should have made that law,
    because it's getting worse and worse and worse. I was reading the paper the other day, we had an eleven-year-old who had
    a gun. What kind of--? We didn't have that back in the day. I consider our days the good ol' days.
- speaker: Interviewer
  text: Do you know, Slim, that that has been a consistent theme amongst all of the interviews that I have done, is that the
    way we grew up in these mountains--
- speaker: Interviewer
  text: In these coal camps, we didn't know it, but we were so much better off.
- speaker: Respondent
  text: Exactly. That's what I'm talking about. Exactly. Now, you say something about somebody's child, the parents want to
    come and jump on you.
- speaker: Interviewer
  text: Different world.
- speaker: Respondent
  text: We--a different group. We didn't have that when we was coming up. And the parents told my parents I did it, I--when
    I say I didn't do it.
- speaker: Interviewer
  text: 'Tell me something, Slim: now, where did you go to school?'
- speaker: Respondent
  text: Well, we start off at Lynch. I went to school at, like I said, me and the pastor--the same school he went to, I went
    to. I think we integrated in--it was in 1965 or '64. That's when we integrated. Like, the first two years was kinda hard.
    There was a lot of fights and stuff. But eventually, when we just mingled and got together, sit together, sit down to--right
    when we integrated, we had the best football team, the best basketball team, that win championships. Everybody got together.
    And--
- speaker: Interviewer
  text: Do you think sports played a big role in that?
- speaker: Respondent
  text: A big role. A big role.
- speaker: Interviewer
  text: Because if you were playing together on the same field--
- speaker: Respondent
  text: On the same field, and the same team, you were going to win a championship. And it made us--it made us strong. And
    you know what was the main thing about it? Sports made us come together as one.
- speaker: Interviewer
  text: One of the things that Ronnie mentioned was that he had played sports with my brother, Bruce Hern.
- speaker: Respondent
  text: Okay, I know--me and Bruce was in the same class.
- speaker: Interviewer
  text: Oh, good! Here's this chance for me to find out about his life, because there were eight years' difference, so I did
    not--
- speaker: Respondent
  text: He was good people.
- speaker: Respondent
  text: We were classmates. And Bruce smart. He was real smart. He really was. But, yeah, Bruce was--he was all that. He really
    was. But we were--we graduated together.
- speaker: Interviewer
  text: That is great. Well, now, did you all play on any teams together?
- speaker: Respondent
  text: I didn't play sports.
- speaker: Respondent
  text: I played--see, the thing about it, when we was--oh, we was in school, if you didn't--if you didn't play football,
    you couldn't play basketball. Like--
- speaker: Respondent
  text: I won't get broke up. No, I wasn't gonna do that.
- speaker: Interviewer
  text: But that's interesting. I've never heard this before, that if you did not play football--
- speaker: Respondent
  text: Football, you couldn't play--
- speaker: Interviewer
  text: You could not play--
- speaker: Respondent
  text: Basketball. Ed Miracle would not let you do that. That was the--that was the coach.
- speaker: Interviewer
  text: I remember Ed Miracle, yes.
- speaker: Respondent
  text: He would not let you play basketball if you didn't play football. And I could play basketball, but--
- speaker: Interviewer
  text: Did they have baseball in those days?
- speaker: Respondent
  text: They had baseball, too. They had baseball, and--baseball, basketball, and football. Those were the main sports.
- speaker: Interviewer
  text: The--I know that the rivalries between Benham, Lynch, and Cumberland, and Harlan--oh my goodness--
- speaker: Interviewer
  text: You know, and Evarts--
- speaker: Respondent
  text: Evarts was the main one.
- speaker: Interviewer
  text: That was the main one, for sure.
- speaker: Respondent
  text: Evarts was the main one.
- speaker: Respondent
  text: Any time Evarts and Lynch played--
- speaker: Respondent
  text: There was a fight.
- speaker: Interviewer
  text: My parents wouldn't let me go to Evarts, because they'd stone the buses.
- speaker: Respondent
  text: I don't blame 'em. I do not blame 'em.
- speaker: Interviewer
  text: Well, tell me about your--tell me about your life. When you graduated from high school, what was next?
- speaker: Respondent
  text: When I graduated from high school, I got a scholarship from high school, and I went to Southeast Community College.
    And I stayed in college--I went to college for one year, but I was young. I wanted to see the world. I was tired of Lynch.
    And so I quit college and I went to New York.
- speaker: Interviewer
  text: What were you doing in New York?
- speaker: Respondent
  text: I worked at Chevrolet--Fisher Body Chevrolet.
- speaker: Interviewer
  text: Say that again?
- speaker: Respondent
  text: Fisher Body Chevrolet.
- speaker: Interviewer
  text: Really? Fisher Body Chevrolet? I didn't know they were in New York.
- speaker: Respondent
  text: Yeah, it's a place called Ossining, New York. That's where they--but that's where I lived, in Ossining. But Tarrytown,
    New York is where they had Fisher Body Chevrolet, and Ossining, I stayed on a street called--48 State Street, and right
    down the street from Ossining was the--was the jail, was the penitentiary. I stayed right up the street from the penitentiary.
    I was scared to walk by it.
- speaker: Interviewer
  text: That must have been an interesting time. Well, how long were you in New York?
- speaker: Respondent
  text: I was in New York until I got drafted.
- speaker: Respondent
  text: I went--I was there for six months. How they found out where you--where you at--so quick? They know where, you know--and
    they know how I wasn't going to college no more, and they--and my mother got a letter in the mail, and she called me in
    New York and said, "Rutland, you gotta come back home 'cause you've got to go in the service." The Vietnam War was going
    on then. And I did not want to go to Vietnam, so when I came back I went down to the recruiting station. They told me,
    said, "If you sign up for another year, you won't have to go to Vietnam." I signed up for another year to keep from going
    to Vietnam, and that was the first place they sent me after basic training.
- speaker: Interviewer
  text: Was this in the Army?
- speaker: Respondent
  text: It's in the Army.
- speaker: Interviewer
  text: So they told you that you wouldn't have to go if you signed up for that extra year--
- speaker: Respondent
  text: For the extra year.
- speaker: Interviewer
  text: And that was the first place they sent you.
- speaker: Respondent
  text: The first place they sent me.
- speaker: Interviewer
  text: How long were you in Vietnam?
- speaker: Respondent
  text: I was over there a year. That was the longest year of my life. And, you know, only thing I hate about that war--it
    got to me, but, you know, I got out of it--when you see children, when you in a ground attack, we had to pull a--what
    you called a sweep the next day, to go out and see. But when you see kids out there, they went out there because they
    wanted to be. They'd rather get killed by us than get killed by their own people. That was something that really got to
    me.
- speaker: Interviewer
  text: Why would they be killed by their own people?
- speaker: Respondent
  text: Because they want them out there to fight us.
- speaker: Interviewer
  text: They wanted the children to fight.
- speaker: Respondent
  text: Yes, right. Anyone that was old enough to hold a gun, they would put them out there. Like I said, that was the longest
    year of my life, though.
- speaker: Interviewer
  text: I'm certain it was. What was it like when you came back? Was it hard to adjust?
- speaker: Respondent
  text: It was, it really was.
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: Well, for--when you first come back, especially, like, Vietnam War, they'll send you to talk to people, you know,
    like a psychiatrist, something like that, that bring you, you know--but I'd say it took about a year to really get back
    adjusted to the, you know, civilization. But still, you think about it. But I just don't think, you know--that was a war,
    and we still didn't win it.
- speaker: Respondent
  text: We did not win that war. That was a war that shouldn't have even happened.
- speaker: Interviewer
  text: There have been a couple of our wars like that--
- speaker: Interviewer
  text: For certain. The--well, after you came back, what did you do next?
- speaker: Respondent
  text: When I came back, I was still in the service.
- speaker: Respondent
  text: I went in in '69 and got out in '71, '72, and after that I went in the coal mine, and that was my job. And, really,
    that was the only job that paid good money in Lynch, Kentucky.
- speaker: Interviewer
  text: You know, people don't comprehend today that the wages for coal mining were--with the benefits-- were really pretty
    good.
- speaker: Respondent
  text: They were, they really were. They really were.
- speaker: Interviewer
  text: And we're talking about the seventies.
- speaker: Respondent
  text: Um-hm, yeah.
