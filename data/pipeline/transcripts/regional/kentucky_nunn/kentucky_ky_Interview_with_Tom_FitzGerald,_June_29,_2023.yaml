collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Let's start with a really straightforward question. Just tell us a little bit about yourself.
- speaker: Respondent
  text: Well, I'm the former director of the Kentucky Resources Council. I was a director for about thirty-seven years. Before
    that, I was a staff attorney for AppalReD, which is the legal aid provider for Eastern Kentucky. So I was doing, had my
    own caseload, but also was doing kind of environmental specialist and backup to the different staff attorneys who were
    out in the field. And so, that's mostly it. I am, now technically, semi-retired, so I'm still working about forty hours
    a week--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --rather than sixty. But I'm having, you know, I'm having a great time because I no longer have to do a lot of the
    administrative stuff. And I don't know who it is who suggested that attorneys are good administrators or good supervisors
    because they're really not.
- speaker: Respondent
  text: But, um, but that's, you know--so I'm still working, with doing whatever folks need me to do in terms of working on
    cases and working on issues. I'm still closing out my cases. So, but that's kind of where I am. I'm a lowly adjunct over
    at the law school as well--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --started there in eighty, oh gosh, eighty-six teaching energy law and environmental law. So, um, that's, you know,
    still working on that.
- speaker: Interviewer
  text: And that's at the Brandeis School at UofL, right?
- speaker: Respondent
  text: Yeah, it sure is.
- speaker: Interviewer
  text: Yeah. But you're not originally from Kentucky, is that right?
- speaker: Respondent
  text: No, originally a New York City kid. Moved down here when I was 17.
- speaker: Interviewer
  text: How did we get so lucky?
- speaker: Respondent
  text: Oh, I don't know if it's a matter of luck, but it's a matter of, I was heading to Ohio. I took a wrong turn. No, what
    my brother, Rick, who's one of my two brothers, had been working during the late sixties for a project that a Catholic
    priest was doing up in Jackson County, Kentucky. And the priest was a guy named Ralph Beiting, who started the Christian
    Appalachian Project. And Beiting would troll the Northern Catholic universities for volunteers. And my brother was at
    Manhattan College at the time and was kind of on the outs with Manhattan because he was involved in anti-war protests,
    which didn't go over very well. So he took the opportunity to leave and to come work with Beiting. And then he would come
    home and bring me books to read. The two that I remember him bringing, one was a book by a guy named John Stacks called
    Stripping, which was a Sierra Club monograph on strip mining. And then the second was a book by Harry Caudill, his seminal
    book about the history of the colonial exploitation of Appalachia Night Comes to the Cumberlands, which was, I guess,
    was published in sixty-four. I got a copy of it, probably sixty-five. And I decided I wanted to come to Kentucky to work
    on opposing strip mining. And that eventually is what got me here.
- speaker: Interviewer
  text: Mm-hmm. Were you already invested in environmental or social justice causes?
- speaker: Respondent
  text: No, not individually. I mean, I've done a little bit of anti-war work, you know, as a teenager in New York. We had
    some Queens College kids would come over to the high schools and kind of recruit us to go to protests and do things and
    stuff envelopes, and so, but no, I was steeped in a tradition of the idea that we did owe our brothers and sisters a sense
    of service. And my mom and dad were part of a, when they were in school, the Newman Club is what it was called at the
    time, but it was kind of a social justice, religious organization that mom was involved in at Hunter College. Dad was
    a city college kid and he was just enamored with her, of course, and would follow her places. They did a little bit of
    volunteering up for the Countess de Hueck, or Baroness, I guess is what she was called, who was a white Russian who had
    left after the Bolshevik Revolution and came to New York City and started an interracial settlement house in Harlem that
    was called Friendship House. And so, my dad volunteered there, my Aunt Marion volunteered there, and this kid from Douglaston
    whose parents actually lived in France, but who was living with his grandparents named Tom Merton, came and hung out at
    Friendship House and volunteered as well. And he had a big crush on my Aunt Marion, apparently--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --before he decided to go off to the monastery and become a Trappist monk.
- speaker: Respondent
  text: But so that's my claim to fame is that Father Louis had a crush on my Aunt Marion--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --so I grew up with that sense that we did have an obligation to try to make the world a little bit better. And so
    that kind of fed into leaving New York and wanting to come down and get involved in fighting straight mine. And so I came
    down to Kentucky and worked at the Council of Southern Mountains, which was a group that had been founded as the Council
    of Southern Mountain Workers back in the early 1900s. It's kind of a charitable organization at a Berea College. And it
    became a big conduit for OEO money during the War on Poverty. And also--
- speaker: Interviewer
  text: --what is OEO?
- speaker: Respondent
  text: Oh, the Office of Economic Opportunity.
- speaker: Respondent
  text: That was the office that funneled all the war on poverty money after Kennedy was assassinated--
- speaker: Respondent
  text: --and Johnson took office. And so the, and of course, when it comes to the government, it's had a lot to do with focusing
    the nation's attention. That and Bobby Kennedy's tour of Appalachia, Johnson's tour in sixty-four of Appalachia. And so
    the Council of Southern Mountains became kind of the conduit for a lot of that money. It was then taken over by a coalition
    of activists and students from the region and became a much more progressive slash leftist organization in the late sixties
    and early seventies, right around the time that I got there. And so I worked from seventy-two to seventy-six at the Council's
    bookstore in Berea, which at the time was the largest resource on Appalachia. And we built the libraries for a number--you
    know, because it was still federal money for libraries. We built the libraries at Alice Lloyd and at Appalachian State
    down in Boone, North Carolina. And it was--so I worked there from seventy-two to seventy-six on and off while I was going
    to school by mail, mostly. You know, it's kind of a draw a sparky and win a art degree kind of--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --back of the matchbook thing--
- speaker: Respondent
  text: --but it was an accredited degree. And so I actually had paper was in school at Rhode Island while I was going--while
    I was working in Kentucky.
- speaker: Interviewer
  text: Mm-hmm. Do you have any idea--I mean, we are often so mysterious to our own selves--why strip mining caught your attention
    or grabbed that emotional investment? Why that in--
- speaker: Respondent
  text: No, no, I don't know the strip mining as much as the sense that people had been dispossessed of their land and had
    been essentially reduced to a colonial status by the forces beyond their control. I think, you know, a part of that, I
    think, came out of my own tradition, because, you know, we used to fly on--my grandfather was Irish born on one side,
    great grandfather on the other side. And Irish--you know, three quarters Irish, one quarter Western European Jew. So,
    the idea of being dispossessed of your land and being reduced to a colonial status is something that runs deep in the
    blood, I think.
- speaker: Respondent
  text: And, you know, I look back years later and realize that we never flew the Irish flag on St. Patrick's Day. We actually
    flew a flag that I didn't realize till many years after my dad had died was the flag of the San Patricios, which is the
    Irish battalion that is a battalion of Irish immigrants who were fresh off the boat, and enlisted into the U.S. Army during
    the second Mexican War and who defected to the Mexican side and fought for the Mexicans against the United States, because
    they realized, you know, they were keenly aware of what it was like to be a Roman Catholic nation that was being put upon
    by invaders--(laughs)--
- speaker: Respondent
  text: --so, it was a--so yeah, so I don't know if that was if that was it. You know, it may have been something as simple
    as the fact that injustice always seems more interesting when it's not in your own backyard, because I could have stayed--
- speaker: Interviewer
  text: --(laughs)--
- speaker: Respondent
  text: --I could have stayed and worked in Bed-Stuy for that matter--
- speaker: Respondent
  text: --you know, I didn't have to travel seven-hundred miles to fight a fight to get involved in.
- speaker: Interviewer
  text: Mm-hmm. Yeah, it's interesting to hear that you talk about it, and I think this will keep coming up maybe or I'll
    have a more cogent question in a bit, but that there's that interest or focus on the people and the people's experience.
    And one thing that I have learned from doing secondary research as part of this project is that folks who study significant
    life experiences, SLEs in psychology, sort of looking at, you know, are there patterns across people who become environmental
    activists and so on, that there's a distinction between people who self-describe as environmental activists and people
    who self-describe as climate activists, that environmental activists often attribute their work to an early passion for
    nature and climate activists often attribute their work to an early passion for people, um--
- speaker: Respondent
  text: --oh, now that's interesting--
- speaker: Interviewer
  text: --isn't it? And of course, it's not, you know, it's a pattern. It's not a truth or a one hundred percent generalizability,
    but that there's a kind of that these different motivations bring people to the work. So, your brother, I assume, was
    older, if he was in college and then bringing books back--
- speaker: Interviewer
  text: --and then you said you had a second, you have a second brother?
- speaker: Respondent
  text: Yeah, Ed was my oldest brother. They both passed several years ago. Ed was the, was a contemporary of Allen Ginsberg
    and Corso and Orlovsky and the rest of the Beats. And that was kind of the generation he grew up in. And he spent time
    in the village growing up, hanging out with some of the Beats. But Ed, Ed in the birth order, was the oldest. And he went
    up to Vermont to college, stayed there as what they now call the international student advisor. They used to call them
    foreign student advisors, but he stayed a student advisor, and then ended up in Thailand, where he taught at a couple
    of colleges there in Bangkok. He was very close to the student government that was overthrown with a CIA backed coup in
    the seventies. And a number of his students were actually murdered as part of that coup. And he had to leave the country.
    And so we--I was living in Berea. My sister, Jane, was also in Berea. And we found him a job as the foreign student advisor
    at Berea College. So he was the student advisor there for about twenty years, and then retired because of medical disability
    to Lexington and then passed away in Lexington. But, he had been very, you know, he had had students when he was at Vermont.
    One of his close students, his TAs, had a number of people in Prague during the Prague Spring, this short period of time
    before when Dubček was trying to push for independence from Russia, and then the rebellion was crushed. And Ed also had
    a good friend who became one of the close advisors in the Sandinistas. So he had kind of leftist leanings of his own.
- speaker: Interviewer
  text: That's--I'm sorry for your loss, first of all--
- speaker: Respondent
  text: I appreciate that, appreciate that--
- speaker: Interviewer
  text: --yeah, and also, I, I'm just amazed at the, you know, the sort of variety of things that you and your siblings have
    gotten up to--(laughs)--
- speaker: Respondent
  text: Well, you know, and all--
- speaker: Interviewer
  text: --and the, the connection--
- speaker: Respondent
  text: Yeah, and they are a fascinating bunch--
- speaker: Respondent
  text: You know, Jane, Jane, is the closest in age to me, just a couple of years my senior, and she was a principal of a
    Catholic grade school out in the end of Long Island, and is now working with a kind of a property management group out
    there. And lives out in Sag Harbor, which is on the northern side of the southern fork of Long Island. And so it used
    to be a whaling town. Then my other sister's down in North Carolina, where she retired, was trained as a nurse. And she
    was one of the two people--one of the two first paid employees for hospice in Louisville, which now is Hosparus in Louisville.
    But she had been involved, she's very involved in autism advocacy. Co-wrote a book on parenting autistic kids. And so,
    yeah.
- speaker: Interviewer
  text: Yeah, and she was living in Berea at one point also?
- speaker: Respondent
  text: No, she was actually in Louisville.
- speaker: Respondent
  text: Her late husband was a med student at U of L. And so she had all five kids in Kentucky for a period of time. Yeah,
    yeah. It was kind of interesting. My brother--
- speaker: Interviewer
  text: --I love that--
- speaker: Respondent
  text: --yeah, brother Rick was a family court judge. He was one of the pioneers of the concept of family court, and did
    a lot of lecturing nationally on family court. But he was one of the pioneers in Kentucky, the idea that you would have
    a unified court that would handle all of the different aspects of parental and child and family issues.
- speaker: Interviewer
  text: Mm-hmm. That's very good. I'm glad we have that--(laughs)--
- speaker: Respondent
  text: Yeah, absolutely.
- speaker: Interviewer
  text: Yeah. I love this, you know, Kentucky has this sort of gravitational pull on your family--
- speaker: Respondent
  text: Yeah, sure does--
- speaker: Interviewer
  text: --it seems like. Yeah, yeah. It's like, I really like living here. So--(laughs)--it is really, it has grabbed me as
    well.
- speaker: Respondent
  text: It is a remarkable state in a lot of respects.
- speaker: Interviewer
  text: Isn't it though? Yeah. So you, okay, so speaking of,
