collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Do you mind telling me a little bit about yourself and where you were born and raised and your date of birth also?
- speaker: Respondent
  text: I'm James David Pheasant Jr. I was born here at the Cherokee Indian Hospital. I was raised here on the Qualla Boundary.
    I started traveling and dancing when I was probably about twenty, twenty-one years old. I started traveling with Rick
    and, matter of fact, it was the first time I went to the Daniel Boone Festival, when I was twenty-one, and I'm fifty-four
    now or fifty-three. I was born in March 3rd, 1971.
- speaker: Interviewer
  text: What's your relationship to Rick, like Rick Youngblood?
- speaker: Respondent
  text: He actually, I call him dad. He's been a dad. He's been there for me quite a bit and helped me through a lot. And
    showed me more the traditional ways and some of the more, getting off the Qualla Boundary here and traveling. If I could
    tell you a story, we went to Florida and we went to do, like, an interview like we're doing here. And it was set up in
    this lady or in a big condominium place. And I pulled up, we pulled up and I said, "Rick, Rick." He said, "What's up?"
    I said, "Man, this is a big housing project!" (both laugh) And it was a condominium and I was, I was, I had never been
    off the reservation and didn't really know it, except for go to school and come back. And yeah, that's, that was my story
    about, you know, about being off the reservation for the first time and not knowing really what was out there, because
    our little town back then, you could run through it in the wintertime and there would be nobody here but the summertime,
    because we were a tourist town. It would be covered up. And we really didn't back then there weren't many jobs and our
    parents could only do so much. We didn't go get to go out on vacations and stuff like that. So when I started going to
    Daniel Boone and these festivals, that was more of my vacation to get off the reservation and see what was out there.
- speaker: Interviewer
  text: Yeah. How would you describe what the Daniel Boone Festival is if you were telling this to someone who's never been
    before? So a total stranger. How would you describe that?
- speaker: Respondent
  text: This is a place where families come because Barbourville is like Cherokee; people go off to go to work. And when we
    have our fair, people come home to go to our fair. At Daniel Boone, it's the same way, these people that went off to work,
    they come to the fair and they meet their families and they enjoy the week there. And I consider some of them my family
    up there. And it's really enjoyable relaxing just to go up there and eat a lot of chicken and dumplings, and there's chicken
    and dumplings. You can eat chicken and dumplings, beans, cornbread. My favorite up there is the chicken and dumplings,
    so.
- speaker: Interviewer
  text: I've definitely heard chicken and dumplings from an earlier interview with Rick so I appreciate hearing that, such
    an integral part of the experience.
- speaker: Interviewer
  text: So how did you get involved with going to the festival? Was it also with going with Rick? Is that how you got started?
    And then it just kind of became something enjoyable to go to, like a vacation, you said earlier?
- speaker: Respondent
  text: Yes. It's like I said, when I started dancing with Rick, we went up there for the first time, and then after that,
    I hadn't missed any years until Covid hit and I missed, like, three years. And I think last year is my first year back.
    And me and my girls come up and we enjoyed it. We come up and perform. They like to go up and ride the rides and meet
    their friends, they've met for years, they go up there and they see their friends. And like I said, they've been able
    to walk. They've been going to the fair and they met so many friends; they love it up there. They go up there and got
    two older ones that they kind of got out of the dancing life, but they kind of come back here and there, and it's just,
    the days that they want to dance is they want to go to Daniel Boone. That's just it. They go, Daniel Boone.
- speaker: Interviewer
  text: Yeah. Can you describe to us what are some of the different roles or songs or dancing that you do at the festival?
- speaker: Respondent
  text: Well, what I share is the men's fancy dance, the hoop dance, I lead the friendship dance a lot. My girls do the jingle
    dress, one does fancy shawl, and both of them could do ladies traditional. My son, he does the grass dance. My oldest
    daughter, she does fancy shawl and jingle. My nephew, you met him a while ago, Rupert. He can hoop dance, fancy dance,
    he's a talented guy. He can do it all.
- speaker: Interviewer
  text: So you're really proud of all of them?
- speaker: Interviewer
  text: Yeah. That's great.
- speaker: Respondent
  text: And we do have the little ones that dance. We don't force them out there to dance. They come out and they dance on
    their own, and they hear the crowd, and that makes them excited.
- speaker: Respondent
  text: It's like my youngest daughter last year. She was like being shy because, like, since Covid, she hadn't been out in
    front of public. And when she heard her name and the people clapped, she was ready to dance. She was ready to get out
    there and that was at Daniel Boone.
- speaker: Interviewer
  text: It's a wonderful feeling. Yeah, build, a confidence builder.
- speaker: Respondent
  text: Yeah. Then after that, she was ready to go. She was ready to get on stage.
- speaker: Interviewer
  text: Do you feel that the stage itself has changed over time since you got involved? What did you see change over, since
    you got involved when you were twenty-one? Because it sounds like from what I heard earlier, it used to be set up differently,
    and now it's set up sort of behind the courthouse.
- speaker: Respondent
  text: There's a mural painted on a building down there. When I first started, that's where we danced at. Was it right there,
    that building with the mural? And we danced there, and we were like, we pushed down here, over here, away from what was
    going on. But after the years went on, they brought us to the main stage, and pretty much a lot of people would come just
    to see us. I mean, I quote, this is something I don't know, but the concerts and stuff like that, and it's like here too,
    those concerts had nothing to do with the meaning of Daniel Boone. Just like our fair, the concerts have nothing to do
    with our culture. We bring it in, them in to share. And just like they do with Daniel Boone, it's to draw more people
    in. But the stage, when they brought it to us was for us to be on it one time and just, you know. And the clogging, the
    cloggers come up there and they dance. Y'all enjoy watching them. You got gospel singing. I love to hear the gospel singing.
    And you and but them big concerts. No, I can't. But that's not me, that's--
- speaker: Interviewer
  text: Yeah, it changed the feel of the Daniel Boone Festival over time.
- speaker: Interviewer
  text: So how do you feel that what does the festival mean to your community in your words, with all the dancers that you're
    going with? I think you may have talked about this earlier.
- speaker: Respondent
  text: The dancers that travel with us is family. We're all family. And if we're not from the Cherokee tribe, if they're
    not from our tribe, we still accept them as family because we've traveled for years together, and we all together. And
    we eat together and pray together, cry together. And when we go up there, we take pride with our dancers that come from
    here. Because this is our homeland for the Cherokees, but that also is our homeland. We can go back. Where trade it for
    cane if our Birdie and Geet Crow, they used to go up there. Walker Calhoun, his family, they went up there, wrote Geet's
    name is Richard. Excuse me, but Richard Crow. But they all went up there, and last year I was getting ready. Saturday
    morning, I looked over and I seen a family of Cherokee from, from the reservation. I said, "Well, why ain't you at our
    fair?" They said, "We come up here, we come up here to see us dance, and we also come to see the family that we met up
    here years ago." And they come up there and they still consider that's their homeland, too. And they went up there.
- speaker: Interviewer
  text: So they were also over at the festival?
- speaker: Interviewer
  text: Okay. Oh, that's wonderful. How would you say that the festival has shaped who you are? You mentioned earlier, opened
    up like a whole new world. So how did going to that festival as a vacation shape who you see yourself in this community,
    in this world?
- speaker: Respondent
  text: Well, there is one year Rick got sick and Bill come to me and said, "Can you handle it, son?" I said, "Yeah, I can,
    I can do what I have to do to, show to go on." He said, "Well, I got this for you, this for you, this for you." And first
    of all, getting up, going, doing school shows, right? Like, I ain't got a drummer, Rick's sick. So I have to go do the
    school shows without it. But I done it. I got all our dancers and some of our dancers, as they're adults, tend to be lazy,
    and they don't want to be there on time. I got to push it. Hey guys, we're set on a time. We've got to be there. We're
    professionals, let's get it done. We got it done and I wouldn't at one point, I would not be a leader like that. I would
    just kind of sit to the side and say, "No, you need to do what you got to do. He's going to be late." But right then I
    had to step up, be a leader and make sure everybody performed and was out there, right?
- speaker: Respondent
  text: And they helped me better just the lead up. Not just my kids, my nieces and nephews. Also the adult dancers. Get them,
    we're here, just do our job.
- speaker: Interviewer
  text: Yeah. So that's a proud moment. Do you remember roughly what year that might have been?
- speaker: Respondent
  text: I'm not for sure. I know Rick got, had a shoulder surgery and he got up there and it was, got staph infected. And
    pretty much he just Bill had to take him to the hospital and I think he stayed at the motel room the whole week. And just,
    we had to, me and his wife, Ramona at the time, she kept her kids going, I kept my kids going. And we kept the show going
    because we had--
- speaker: Interviewer
  text: Uh-huh. That's amazing.
- speaker: Respondent
  text: I think at that time we had three booths set up, craft booths, plus a fourth one was a cook booth. So we had to make
    sure all that was going on. And plus the dance going, the dance team gotta do their job.
- speaker: Interviewer
  text: Yeah, there's so many moving parts. I can't imagine doing that myself.
- speaker: Interviewer
  text: You said there were some school shows that you also did. Was that in the on the reservation? Was that over in Knox
    County for the school shows?
- speaker: Respondent
  text: It was at the Knox County at high school. I think me and some of the reenactment people went over there and done at
    the high school.
- speaker: Respondent
  text: And I then went into elementary. And I think, I know for sure, one year I went up a week early and me and Bill went
    around and did little shows like that for, I don't know how many schools back then, but.
- speaker: Interviewer
  text: This was before the festival or?
- speaker: Interviewer
  text: The weeks before festival?
- speaker: Respondent
  text: Yeah. It might be like two months before the festival, we went up there. It was right when school started, so probably
    about August and we went up there and I went up there and we matter of fact, Rick dropped me off because he was going
    to another show that week. And I took a bicycle and when I get done with the school shows, I rode around.
- speaker: Interviewer
  text: With all your regalia and everything?
- speaker: Respondent
  text: No, I went back to our, I was staying at Harold's. I stay at Harold's, and I'd go change and I'd jump on my bike and
    ride around the campus, ride around Barbourville, and just meet people that like the bank lady. I still can't remember
    her name. I just call her bank lady when I see her. The Hardee's that burnt down. I was, I ate there quite a bit. That
    was my morning thing there. Go eat at the Hardee's. There was a big old place, a big old chicken that stood up there,
    and we ate there. It was a gas station or something. But that was one little mom and pop place I wish was still open.
    I could go up there and, whew, man, it was good eating.
- speaker: Interviewer
  text: Yeah, you get to know the people well, yeah.
- speaker: Respondent
  text: Yeah. And when Walmart finally hit that place, it was like, shoot. Like, if it hit here, it'll be like firecrackers
    and people will be going all in there. And that's the way Walmart was up there.
- speaker: Interviewer
  text: Oh my God. Can you tell us a little bit more about the what the reenactment was like? Did you have a, how did they
    want you to do different parts? Like, did they ask you how you wanted to portray different things at the schools?
- speaker: Respondent
  text: Well, they did, they did their own little shows or talked about their weapons they carried.
- speaker: Interviewer
  text: Like the pioneer show?
- speaker: Respondent
  text: Yeah, they did their explanations of everything. And then I would come out and put on the stereo and dance my fancy
    dance, and then catch my breath for a minute. Then I'd have to explain the hoop dance. Then I'd put the stereo back on
    and do the hoop dance. And then I would sing my own little round, or friendship dance, and I'd let them on friendship
    dance. And then, this is all at the high school, when I did the friendship dance and we was in the library and man, trying
    to get all these kids together to do that dance and--
- speaker: Interviewer
  text: Yeah, it's a big circle, right? Everyone hold their hands together.
- speaker: Respondent
  text: Yeah, it's a big circle holding hands. And it's a symbolize of a never end, dying friendship. We hold our hands. And
    when we circle around, like the coil up like a snake and uncoiling. That's just the way, you know, we uncoil, we breaking
    that
