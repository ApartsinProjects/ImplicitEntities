collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So you've just finished recording an album?
- speaker: Respondent
  text: Oh we have.
- speaker: Interviewer
  text: So I wanted I want to talk about this. So-- So, so let's go back to the beginning of this album from concept. Tell
    me about, like, making the turn. okay, we're performing, we're going to do a new album. Take me back to that moment.
- speaker: Respondent
  text: Well, we're always thinking of doing a new album. I mean, that's that's a continual thing. It's not a oh, today we'll
    start. It's, it's actually we're always thinking of that. And we used to do an album a year.
- speaker: Respondent
  text: And then it--we had a time where we didn't record as much. And then we did our 50th anniversary CD called Celebrate
    Life. And so now it's--now this one is an exciting one. It's, it's kind of we don't have the name for it yet. And so we
    don't have it completely ready to, to promote and so forth because we haven't gotten quite that far. But we did get the
    recordings, our parts all done. So our files are all done, and it's so fun. And Rickey Wasson is taking care of it for
    us. And he's a super hero and so respectful of the music, and he understands the music so well. He cares about it.
- speaker: Interviewer
  text: He really does.
- speaker: Respondent
  text: And so he, he comes to the project bringing a level of expertise that we're appreciative of.
- speaker: Interviewer
  text: So, you know, you all are so experienced playing together. Um, who produces--like, who serves that role as producer
    in terms of, like, shaping things and whatnot? Is Rickey doing that or--?
- speaker: Respondent
  text: Actually, we self-produce and we've always done our own productions.
- speaker: Interviewer
  text: But--but, pr--
- speaker: Respondent
  text: --on, on intentionally--
- speaker: Respondent
  text: um, so that we have a little more in put.
- speaker: Respondent
  text: And, and lots of reasons behind that. And this time also we're self producing and it's kind of a team effort.
- speaker: Respondent
  text: We do this--all of the things we do we do together, and, um, with with great respect for each other and we do kind
    of find roles that each of us do.
- speaker: Respondent
  text: You know, to make, the make the whole thing work. Raymond, is, is--if we had to pick one person, it would probably
    be Raymond. Although he is, is part of the team and he, you know, we really all work together. And Rickey also helps,
    you know, if there's something--
- speaker: Interviewer
  text: --oh yeah--
- speaker: Respondent
  text: --if something he notices, you know, he might mention it.
- speaker: Respondent
  text: And so it's really a--it was a joyful week.
- speaker: Interviewer
  text: I bet, okay--
- speaker: Respondent
  text: --recording--it was just an absolute joy.
- speaker: Interviewer
  text: So where is the studio?
- speaker: Respondent
  text: The studio is in Clay City.
- speaker: Respondent
  text: And it's, it's part of part of Rick's Music and Electronics, um, building. Rickey Wasson also has the Meadowgreen
    Music Park that, that is so active and, um, current, um, honoring the music that has been in the past and is happening
    and in the future. Rickey also is watching the, the next generation.
- speaker: Respondent
  text: Yeah. And that's one thing that makes that particular place Meadowgreen Music Park so vibrant.
- speaker: Interviewer
  text: Yeah. My, my friend Chuck, who I mentioned before the interview, who is doing the--has been doing the research on
    this project, um, who's a great musician himself, he's been trying.--
- speaker: Respondent
  text: --Chuck Cox--?
- speaker: Interviewer
  text: --yeah, yeah, he's been trying to get me to Meadowgreen. I haven't been yet.
- speaker: Respondent
  text: Yeah, okay, well, that's where the album release is going to be--
- speaker: Interviewer
  text: --oh fantastic--
- speaker: Respondent
  text: --so I'll let you know--
- speaker: Interviewer
  text: --perfect--
- speaker: Respondent
  text: --when that is. You can come join us.
- speaker: Interviewer
  text: Okay. So, um, so you've got this album coming up, and you've--you guys have gone down there, um, to record. Did you
    stay down there or did you commute back and forth?
- speaker: Respondent
  text: No, it's close.
- speaker: Interviewer
  text: It's close. Clay City is -----(??)
- speaker: Respondent
  text: Yeah, it's close for everybody. And we're coming from different places, and so we would meet there.
- speaker: Interviewer
  text: And how much--what--walk me through the prep process of like--you had songs--how many songs did you--was--did songs
    not make the cut on the album?
- speaker: Respondent
  text: Um, we got together, the band all got together. It's, it's Raymond and Alice, and Al and Daxson and I, got together
    and decided on the songs. Put in songs that we thought would work well together with this project. And then we scheduled
    rehearsals because everybody's so busy.
- speaker: Respondent
  text: And so it's, it's tough to find spare time. Extra time. (laughs) So we have to schedule rehearsals. And so we scheduled
    some rehearsals, um, to go through and make sure we had the material completely ready and that--for recording, because
    it's different when you get a song ready for stage, it's different than when you get it get it ready for recording, um,
    there are some different focuses. And so we wanted to get them completely ready so we wouldn't waste Rickey's time and
    so forth. And, and then--and we met one day and to do--to start that process and it happened that a whole bunch of us
    got Covid.
- speaker: Respondent
  text: And so we didn't get to do (laughs) the next, the next, um, rehearsals other than on our own.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: And so then when we met at the studio, it was just fun and fresh and exciting and, and just fell into place. And I
    think it's partly because we've played together so much that even if it's a song, we haven't done a lot yet, it just fell
    into place.
- speaker: Interviewer
  text: Yeah, and you feel pretty good about it, I can tell.
- speaker: Respondent
  text: I do. I'm so excited. I'm so thrilled to--I love the recording process. I love that whole experience is exhilarating,
    um, and it's so a live and, and it's just exciting to be recording--
- speaker: Interviewer
  text: --there's a magic--
- speaker: Respondent
  text: --all the projects.
- speaker: Interviewer
  text: There's a magic to the recording stuff. I love that, too.
- speaker: Respondent
  text: Yeah, and, and Rickey's studio has big windows. Even if we're in an iso-booth and he has a center, uh, studio part,
    but we can all see each other so we can be playing at the same time, seeing each other, hearing each other. But it has
    the separation so that Rickey can work with it.
- speaker: Interviewer
  text: Oh, that's so great.
- speaker: Respondent
  text: And, and it was--it's just so exciting to be--all be there together, and it just--
- speaker: Interviewer
  text: --yeah, yeah--
- speaker: Respondent
  text: --it happens.
- speaker: Interviewer
  text: So what's your timeline? What are you thinking in terms of mixing?
- speaker: Respondent
  text: It's pretty fast.
- speaker: Respondent
  text: It's pretty fast because we'd like to have it for this fall, you know. And, and everybody's on it. And so it's not
    it's not going in a drawer waiting. You know, it's, it's, it's in process right now. Rickey's mixing and Jody Miller is
    working on the design.
- speaker: Interviewer
  text: Oh nice Jody's great.
- speaker: Respondent
  text: And, and it's going to work pretty quickly.
- speaker: Interviewer
  text: Yeah, good, oh good, I can't wait. So I can't wait for the for the release.
- speaker: Respondent
  text: We're working on the publishing and yeah getting all the rights a lot of them are, are ones that, that we've written
    and so that helps.
- speaker: Respondent
  text: Um, and then we have some friends, uh, Brink Brinkman brought us a song. And so we're doing one of his. And that's
    exciting.
- speaker: Respondent
  text: It's called "Would I"
- speaker: Interviewer
  text: '"Would I". Okay.'
- speaker: Respondent
  text: W-O-U-L-D "Would I".
- speaker: Interviewer
  text: Oh that's fantastic. Well, I'm just so happy.
- speaker: Respondent
  text: Yeah. We're, we're excited.
- speaker: Interviewer
  text: So, um, have you are these songs that you guys have performed live before?
- speaker: Respondent
  text: Uh, some of them are some of them, uh, there are fourteen, uh, fourteen songs. And so it's, it's kind of a nice and
    full and a good variety.
- speaker: Respondent
  text: Uh, there's, there's--one that Raymond wrote is "Dance in Old Kentucky". And we've done that before. And it's, it's
    fun--it's a fun one, but we--The McLain Family Band, hasn't recorded it before. Uh, and we have one called the "Down Home
    Waltz", that Buck White wrote the tune and our father wrote the words.
- speaker: Interviewer
  text: Oh, that's so sweet, fantastic.
- speaker: Respondent
  text: It's a sweet, sweet one. We have "Blow the Candle Out" that our Aunt Rosemary wrote.
- speaker: Interviewer
  text: Oh, that's so great.
- speaker: Respondent
  text: Um, and we have Kentucky Moon, and that is a brand new one, um, Raymond and I wrote just recently, uh, and, and kind
    of for this project. And there's one called "A Mountain of Memories" that is a brand new one also that we wrote. Um, there's
    uh "Down in Old Kentucky" that Asa Martin wrote.
- speaker: Respondent
  text: Um, Asa Martin was a friend, and he has a wonderful musical history back to the vaudeville days. And so we're excited
    about recording that one--having that one done. We have another one that Raymond wrote called "River City Blues". It's
    an instrumental and it's so fun, it's, it's exciting. There's "Homegrown Tomatoes" that Alice sings. That was kind of
    a special studio song because we brought our homegrown tomatoes for every session. (laughs)
- speaker: Interviewer
  text: Oh, perfect, perfect.
- speaker: Respondent
  text: Alice starts them from seed. And then she and I both grow, you know, have nice gardens. And so we were both growing
    them and they were ripe.
- speaker: Interviewer
  text: This has been a good year for those.
- speaker: Respondent
  text: It's been a great year for tomatoes. And so we had sun golds and heirlooms and so, so many wonderful--so we brought
    those and had them at the studio.
- speaker: Interviewer
  text: Okay, so you have 14 songs.
- speaker: Interviewer
  text: One of the most important decisions you make when you do an album is the order.
- speaker: Respondent
  text: It used to be more important than it is now because, because now people listen on their phones--
- speaker: Interviewer
  text: --it's, it's streams and playlists--
- speaker: Respondent
  text: --different, you know, and so it's not in sequence anymore, but people don't usually--.
- speaker: Interviewer
  text: --but do you still think about it or--
- speaker: Respondent
  text: But--oh, very much so.
- speaker: Respondent
  text: --yeah, very much so. And I remember my father working with it when we would do our albums and just planning, and
    sometimes a song would get left off because it didn't fit in, in the sequence any good place.
- speaker: Respondent
  text: And, and so we'll see, we'll see. We haven't, we haven't done that yet. We've kind of been playing with ideas.
- speaker: Interviewer
  text: So will you just being a--you know--I have a lot of your vinyl. Um, have you considered the possibility of doing vinyl?
- speaker: Interviewer
  text: So are you going to do it?
- speaker: Respondent
  text: Do you think we should?
- speaker: Interviewer
  text: I think you should. (Smith laughs) I think you should.
- speaker: Respondent
  text: Well, we do too. Um, and it's, it's interesting because we've started carrying vinyl on, you know, on the road with
    us.
- speaker: Respondent
  text: Again, we didn't, of course, because of CDs, but now it's kind of maybe shifting back to albums.
- speaker: Interviewer
  text: Yeah, I think it was like, I think they said something like last year or the year before, it was like the first year
    that vinyl outsold CDs.
- speaker: Respondent
  text: Yeah. Jesse Wells, who's touring with Tyler Childers, said that, that for Tyler, it's vinyl. Yeah. Way, way more than
    CDs.
- speaker: Respondent
  text: And our students at Morehead--they were talking about how they listen to music, and almost all of them have turntables.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: So they want to buy vinyl. They want to see the pictures. They want to see all the information--
- speaker: Respondent
  text: --yes, yes--
- speaker: Respondent
  text: --um, that vinyl offers.
- speaker: Interviewer
  text: Yeah, the only downside to vinyl is, right now, because there's such a demand, the turnaround time is really slow
    to get the vinyl out, because all of the facilities are so backlogged, because the demand is great, but there's so few
    of them left--
- speaker: Respondent
  text: --that are doing that--
- speaker: Interviewer
  text: -- that are actually doing it--
- speaker: Respondent
  text: Well, maybe there will be more if there's, you know--since there's such a demand.
- speaker: Interviewer
  text: Yeah, that's the hope. That is the hope. Well that's fantastic. I cannot wait, and if you're taking votes, I vote
    for vinyl.
- speaker: Respondent
  text: Okay. (laughs)
- speaker: Interviewer
  text: Uh, because, because--it's not my dominant way of listening to music, um--but It is treasured time for me when I can
    sort of go back to that ritual of, I'm going to pick something out, pull it off the shelf, place it work, do a little
    bit of work to, to, to get it going. And it's really nice to have that back in my life actually.
- speaker: Respondent
  text: Well, people like to have it even if they don't listen to it that way. They may, they may digitize it and have have
    it or they may stream it or, or listen to it a different way. But they like to have the album.
- speaker: Interviewer
  text: Yeah. All right, so I'm going to go back to, to life story stuff, but I did want to say that we're behind today, um,
    and we do have a hard stop at one. So we're going to do a short interview today, um, and focused on certain things, but
    I could not--not have you talk about the recording, so--
- speaker: Respondent
  text: --well, you can keep me on track, because I don't have--
- speaker: Respondent
  text: --have anything to watch it--
- speaker: Interviewer
  text: Yep, I got it, --
- speaker: Respondent
  text: --so you can just--
- speaker: Interviewer
  text: --I got it. So we, um, really got to the point. In the last interview to around 1968, we talked about Hindman up to
    Hindman. We talked about a lot of things, but we talked about the television show, which I just love. I wish there was
    a recording of of that, but I understand.
- speaker: Respondent
  text: We do too. (laughs)
- speaker: Interviewer
  text: Um, so let's talk about that pivotal thing that happened in Hindman towards the tail end, and that is the house fire.
    So take me back to that, that day.
- speaker: Respondent
  text: It was, it was New Year's Eve, 1968. And our father was Raymond, Raymond Kane McLain was in Berea as music director
    for the Berea College, uh, in the Berea Christmas Country Dance School. And it was just ending. It's the week--still going
    on--it's, it's between Chris--the day after Christmas and New Year's. It's that week always, and people from all over
    the country come to--for a dance, a dance instruction and other events all through the week.
- speaker: Interviewer
  text: And he ran it, but your grandmother was--
- speaker: Respondent
  text: --our grandMother, Bicky McClain was one of the original--
- speaker: Respondent
  text: --original ones that started that and taught there, too. And so, our father was in Berea, I mean, yeah, in Berea.
    And we, were living in Hindman in, in the, um, in Hillside with--each of the buildings on campus had a name. And so we
    lived on Hillside and, uh, it was in the evening and we were getting ready for bed. And Mother, I believe it was. smelled
    smoke and found that there was smoke coming from the laundry room. And Michael, our youngest brother, was was maybe, um,
    he was in a in a baby bed. And, um, Nancy Ann, two years older than Michael was, was young also. And so when Raymond and
    Mother and Alice and I realized that, that this was a bigger deal than we realized, you know, it wasn't you can just open
    a window and blow the smoke out. It--there was some--there was an issue. What ended up being, I believe, an electrical
    issue in the laundry room, um, because of wiring, perhaps. It was an old, old, old house. And so we got Nancy Ann and
    Michael, um, and went downstairs to the, um, to, to go out the front door. And there were some instruments because we
    had, we had, you know, had instruments from the last time we came in by the door, a few of them. Raymond got those out.
    That's the only thing we got out of the house. We were in pajamas. And so we got ou
