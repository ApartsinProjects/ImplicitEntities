source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, just to get started, I'd like to establish a little biography. So, tell me a little bit about yourself.
- speaker: Respondent
  text: 'Well, I''m sixty-three. I''ve lived in Lexington since 1990. I grew up in Ohio, and so I''m kind of a transplant.
    I worked as an engineer for twenty years in various different industries. The last place I worked at was a company up
    in Cynthiana, Kentucky that makes the little yellow sticky notes. The post-it notes. And I turned forty when I was working
    at the post-it note factory. And every ten years or so, I think it''s a good idea to just sort of check in with how your
    life is going, and is this really what I want to do with my life? And I''m working at the post-it note factory, and when
    I was younger, I always sort of envisioned that I''d be doing something--(laughs)--important with my life. And I just
    walked into the factory one day and I quit and just sort of took a giant leap into the unknown. About that time, when
    I first moved to Lexington, I didn''t know anybody here and I was trying to meet other people and make friends. And so,
    I joined the Sierra Club and we go hiking and, you know, make friends through the Sierra Club, and that was great. And
    a few years after I joined, they said, "Dave, we really need somebody to be our program chair," which is the person that
    finds the speakers for the monthly meetings. And I said, "Oh, that sounds interesting. I think I can do that." And so,
    I--every month I had to find some interesting speaker and we''d get, you know, the most interesting person you could find
    to either talk about some environmental issue or maybe just talk about, you know, their trip to Alaska and so on. And
    one month I heard about this guy in West Virginia named Larry Gibson, who was going around and talking to anybody who
    would listen about this terrible thing that was going on his mountain in West Virginia, called Kayford Mountain. And I
    said, well, that sounds interesting. (laughs) Let''s get this guy to come to Lexington and maybe he will come and speak
    at the Sierra Club about mountaintop removal, and, you know, we''ll see what this crazy guy''s talking about. So, he came
    and we had about, probably eighty or a hundred people. It was a good audience that night. And we met over at the Shriners
    Hospital on Richmond Road and Larry was very heartfelt in his talk about his mountain. He said, "You know, I grew up on
    this mountain and I used to go roam and play in all these mountains that were around my mountain. And now these coal companies,
    they''re blowing up all the mountains where I used to play as a boy, and they''re trying to get my mountain too and I
    will never sell to the coal companies," and so on. And it was a real good talk and I figured he was really exaggerating
    but we sort of established kind of a bond because he was a former General Motors employee--he worked up at the Lordstown
    plant in Ohio. And I was also a former GM person so we started talking about General Motors stuff, and we sort of made
    a connection. And I got him--his phone number and his address and I said, "Well, you know, maybe one of these days I''ll
    go to West Virginia and, you know, see this mountaintop removal for myself." Because he made it so und really bad but,
    you--know, I was sure that he was exaggerating and, you know, couldn''t possibly be as bad as what he was saying. And
    the person that brought him to Lexington was an organizer for--named Laura Foreman, and she was a community organizer
    for the Ohio Valley Environmental Coalition in Huntington, West Virginia. And so, I got on their mailing list and they
    started sending me their newsletters about mountaintop removal --(laughs)-- you know, every month. Just this incredible
    story about what was happening and what a tragedy was going on in West Virginia. So, I got kind of drawn into--(laughs)--this
    thing piece by piece. And I finally went to West Virginia. And you''re driving--you go through Charleston and then you
    go about another hour up into the mountains, and dirt roads. And you''re going up this mountain and you get to the top
    of Larry''s mountain, and oh my God! (laughs) It was even worse than I could have possibly imagined. And anybody who ever
    goes up to Larry''s mountain comes away really changed in how they look at America''s consumption of electricity. It really
    puts such a striking visual when you first see mountaintop removal. I can literally say it changed my life. And so, that
    was in ''98. And Larry and I started talking. (laughs) And Larry was a very persistent person, and he would call me frequently
    and just keep in touch with me. And later on, as--when I traveled with Larry, I found out he''s on the phone, like, all
    the time calling people --(laughs)-- and talking to them, trying to get them interested in saving his mountain. Then around
    October of 2000, there was this horrible disaster in Martin County, Kentucky. One of the furthest east counties in Kentucky.
    Where they had a massey coal slurry impoundment broke in the middle of the night, and it broke into old abandoned underground
    mines. And three hundred million gallons of this black sludge pours out into two creeks : Wolf Creek and Coldwater Creek.
    This is a very, very remote area. It''s really hard to get to. But I said, "Well, let''s go out and see this. You know,
    I''ve been to Kayford Mountain, let''s go see this coal disaster." So, Patty and I--Patty''s my partner of twenty-five
    years. And we got in the car and drove out there. And there''s fields just covered with this black toxic stuff. And Patty
    took some video and I took some pictures and came back, and we started trying to tell other people, there''s been this
    horrible disaster--(laughs)--in eastern Kentucky and nobody knows about it. And that the Lexington paper was covering
    it fairly well, but this was before YouTube. It was before, you know, the internet was in really uncommon use and there
    just wasn''t a really good way to get the message out about this disaster. And it was kind of frustrating because it was
    a huge--it is like--we''re saying, this is, you know, worse than the Exxon Valdez--(laughs)--spill. It''s terrible and,
    you know, everybody should come and see it. And so, I was writing articles for the Kentucky Sierra Club newsletter and
    we got a group of ten or twelve UK students. And the famous environmental attorney Joe Childers came out. And we all took
    pictures and tried to just get more attention to this. And finally--I think it was on Christmas Day, about two months
    after this horrible disaster, the New York Times finally ran its first story about this coal waste spill in Martin County.
    And eventually 60 Minutes did a story and Jack Spadaro became famous for his being fired for trying to keep Mine Safety
    administration from covering up the spill. But that was, that was, about the time when I quit my job at 3M. I was like,
    you know, maybe I''ll do some of this kind of type work, because this is really, really interesting to me. And maybe I
    can be an environmental activist, you know, like Lois Gibbs or Erin Brockovich, or--(laughs)--you know, one of these,
    you know, famous--or Craig Williams or one of these famous environmental people. There''s this wonderful, wonderful person
    at the Ohio Valley Environmental Coalition named Laura Foreman, who was just--(sighs)--she was just such a great community
    organizer. She was warm, she was personable, she was beautiful. People just loved her. And she was raising all kinds of
    hell in West Virginia about mountaintop removal, and--with Larry and maybe a dozen people were working on this. And they
    would have these very in your face kind of demonstrations on the lawn of the governor''s house in West Virginia. And they
    did a funeral for the mountains, which was a big parade through the downtown streets of Charleston and brought a lot of
    attention to the issue. And Ken Ward of the West Virginia''s The Charleston Gazette was writing really good stories. So,
    the whole issue was starting to gain more traction, and in the middle of one of these demonstrations, in front of the
    Army Corps of Engineers office in Huntington, Laura Foreman dropped dead in the middle of the protest. Fell over, she--her
    heart went into arrhythmia, and she literally fell over dead during the protest. And this was (sharply exhales) one of
    many, many tragedies that was yet to come in my life, in the whole campaign against mountaintop removal. Is--this is really
    hard work and it''s very stressful and it''s--it takes a real toll on the people who are involved, fighting against mountaintop
    removal. About six months after Laura passed, I got up my gumption to call the director of OVEC [Ohio Valley Environmental
    Coalition]. It was a lady named Dianne Bady. And I said, "Are you all going to hire another organizer on the mountaintop
    removal campaign?" And she said, "Are you interested?" And I said yes. And so, they--we had a meeting. And I went out
    there. And a wonderful guy on the board of OVEC named Dan Kash--who''s also passed away--told Dianne, you should hire
    this guy right away. (laughs) He''s the only one in Kentucky that''s doing anything on mountaintop removal. Something
    like that. So, I got the job. And, you know, I''m an engineer and that''s part of my personality. And I tend to be kind
    of more technical and not have the--a good community organizer needs to have really good people skills, and be really
    good at listening and talking to people, and so on. Those are not really my strengths. (laughs) But I, but I really care
    about the issue and I really wanted to help. And I thought, well, I''ll just work really, really hard--(laughs)-- and
    I''ll, you know, put my everything into this job and just do the best I can. So, I got hired. And I think they paid me
    something like twenty-four thousand a year or something like that, which I was just, I was so excited. I was--this was
    like a job of a lifetime. A dream come true : to be a community organizer working on an environmental campaign. --(laughs)--
    I was just like, wow! This is the sexiest, greatest, most wonderful job. And so, I sold my house in Lexington, and Patty
    was really sad, and I moved to Huntington. And for the next year, I just worked myself into the ground. --(laughs)-- I
    worked so hard. When I got there, the first day I walked in my office--which was Laura Foreman''s old office--and there
    was a box of stuff, like, sitting on my desk and basically a note saying, we need to organize a busload of people to go
    to Washington DC to lobby on mountaintop removal. And you need to organize this --(laughs)-- in the next three weeks,
    or something crazy like that. And I didn''t know anybody in West Virginia except, you know, Larry, really. --(sighs)--
    So, the whole process of being a community organizer is getting to know people and learning what they like and what they
    don''t like. And it''s a lot of talking and a lot of listening, and it''s very, very time consuming. You can''t just go
    into the coalfields and say, hi, blah, blah-- and get right to business. It doesn''t work that way. You have to see the
    pictures of their grandkids and get food from their garden. And, you know, it takes--you cannot possibly do a ''get to
    know you'' thing in Appalachia in less than (exhales) three or four hours. It''s--you know? --(laughs)-- And that''s just--and
    if you don''t--if you''re brusque with them, they think you''re being rude. And I''m from the city. I grew up in Cincinnati
    and I tend to get right to the point. And so, I had to, like, completely rewire my brain to, like, really slow down--(laughs)--and
    do the coalfield organizing thing. And it was exhausting. Because I had all these people I had to get to know. And they
    were wonderful. Just some of the best people. And really, a lot of these coalfield activists in West Virginia and Kentucky
    are, you know, very well-known now and respected. Like Judy Bonds won the Goldman Prize. Maria Gunoe won the Goldman Prize.
    Larry Gibson. Guy just passed away about a month ago named Julian Martin, who was a former school teacher, was funny and
    wise. Just a great public speaker. All these people. So, I''m the--(sighs)--staff person at OVEC and I''m--like, we had
    these meetings of a coalition called The Friends of the Mountains, and that was in response to an industry--coal industry
    thing called the Friends of Coal. So, we were going to be the Friends of the Mountains. So, we had people from the Citizens
    Coal Council, Coal River Mountain Watch, Appalachian Voices, OVEC, Unitarian Church (pauses) a few other groups. Ann Pancake''s
    a well-respected writer. She used to come to the meetings. Judy Bonds was--would always come to the meetings. And there
    was this guy named Lenny Kohm, and his last name is spelled K-O-H-M. And he was on staff at Appalachian Voices in Boone,
    North Carolina--which is still a really good, strong organization that''s working on a lot of environmental issues in
    Appalachia. And Lenny Kohm''s fame was he did the Arctic National Wildlife Refuge roadshow--I don''t think that''s exactly
    the right title for it. But for ten or fifteen years, he traveled around the country with a slideshow and a member of
    the Inuit from the Arctic area where they were going to do--they wanted to do the oil drilling up there. And he went around
    with a slideshow talking to church groups and Rotary clubs, and Sierra Clubs and Audubon groups and anybody who would
    listen, with this slideshow presentation about why we shouldn''t drill for oil in the Arctic National Wildlife Refuge.
    And this was a famous presentation that he did. He did hundreds and hundreds--thousands of presentations all over the
    country. And he had funding--(laughs)--to do that. And they would fly down some representative from the native tribes
    to go with him. And it made for a very compelling, you know, come to the Audubon, you know, meeting in Bloomington, Indiana,
    and there''s going to be a guy from--(laughs)--you know, the Arctic National Wildlife--you know, to talk about this controversial
    issue. And so, it was this huge thing and it went on for years. So, Lenny would come to the Friends of the Mountains meetings
    and he would often say, we need to do something like the Arctic National Wildlife Refuge roadshow for mountaintop removal.
    This is what we need to do. And we were like, --(laughs)-- great. Lenny, you''ve got all this expe'
