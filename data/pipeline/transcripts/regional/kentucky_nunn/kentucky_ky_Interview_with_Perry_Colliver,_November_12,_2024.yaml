collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself, and your family, and how long you've lived in Mount Sterling, Montgomery County.
- speaker: Respondent
  text: Well, I've lived in Montgomery County, Mount Sterling, all my life. 73 years old. We were born and raised on West
    Locust Street, approximately where the Kentucky Utility Building was at. So that's pretty much where we were raised at
    all my life, until I got out of high school and started college, and my dad built a house out in the country.
- speaker: Interviewer
  text: How many children?
- speaker: Respondent
  text: There were five of us altogether.
- speaker: Respondent
  text: No, it was four boys and one girl.
- speaker: Interviewer
  text: And then you all moved out in the county?
- speaker: Respondent
  text: Yes. After I graduated high school, started college. My dad built a house out in the country, out on Fogg Pike. And
    I was the only one that got to graduate from the city school. They all had to go to the county. They didn't like that,
    I don't think.
- speaker: Interviewer
  text: So are you the oldest?
- speaker: Interviewer
  text: You're the oldest of five. And what year did you graduate?
- speaker: Respondent
  text: I graduated in 1970.
- speaker: Interviewer
  text: So was that the last year that Mount Sterling High School was--
- speaker: Respondent
  text: No, I think it was in 76 was the last year, I believe.
- speaker: Interviewer
  text: Okay. What was, uh what was life like growing up on West Locust?
- speaker: Respondent
  text: Oh, we just had a real neighborhood. Kids would play together and outside, and we were always looking for a basketball,
    or baseball, or football where we could go. And, yeah, it was just a typical neighborhood that back then.
- speaker: Respondent
  text: You don't see a lot of that anymore?
- speaker: Respondent
  text: Kids today are content to stay inside and play on their Nintendos. And we--we had to get outside.
- speaker: Interviewer
  text: So tell me a little bit about what was down there. Like right now I'm envisioning I know the post office is there
    on the corner, but what would have been there then?
- speaker: Respondent
  text: Well, the--where the post office was at was an old tobacco warehouse, where they sold tobacco at. It was called --
    wasn't Home. It was Clay's Tobacco Warehouse what it was called. And then you had across the street from it, there was
    -- the Lanes had a Ford dealership.
- speaker: Respondent
  text: And right along or close to it was an old man that had a barber shop.
- speaker: Respondent
  text: And then on the corner of Bank and Locust, there was a Culligan Water. I reckon back then they used to have-- to put
    water softeners or treat water.
- speaker: Respondent
  text: Guy named Everett Myers run it.
- speaker: Respondent
  text: And then sometime after that, it became a liquor store.
- speaker: Respondent
  text: It called Bank Street Liquors.
- speaker: Respondent
  text: But on the other, other side was all residential, you know.
- speaker: Interviewer
  text: So from the corner of that little, I guess Sycamore-- is that Sycamore that comes down-- Sycamore over to Richmond
    Avenue, it was all just--
- speaker: Respondent
  text: All residential
- speaker: Interviewer
  text: All residential.
- speaker: Respondent
  text: It was the uh--the Christian, First Christian Church sort of backed up. They had an entrance way down there, I think,
    it was all residential areas in that area.
- speaker: Respondent
  text: Also on the south side of Sycamore Street, there was a Carnation Milk plant.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: Where the people used to bring their milk in.
- speaker: Respondent
  text: And sell it.
- speaker: Interviewer
  text: And that was where?
- speaker: Respondent
  text: That was on South Maysville, which would have been down next to the railroad tracks.
- speaker: Respondent
  text: It was south of Locust Street.
- speaker: Respondent
  text: And you can see these milk trucks coming in, and they dump their milk. And Carnation would-- had a big, great big
    tank that they put it in, stored in.
- speaker: Respondent
  text: That was down there.
- speaker: Interviewer
  text: Yeah. It's changed so much.
- speaker: Respondent
  text: Oh yes, yes, yes. People wouldn't believe, uh, if they was here in the 50s and 60s how much Locust Street and South
    Maple had changed. They used to call it Little Cicero.
- speaker: Interviewer
  text: Little Cicero. What was that from?
- speaker: Respondent
  text: Well, it was a-- it was a town outside of Chicago called Cicero was where all the bad guys hung out at. So, you know,
    Mount Sterling was sort of notorious to be a rough part of town.
- speaker: Interviewer
  text: Yeah. What, uh, what caused that? Was it just because we were wet and the county was dry?
- speaker: Respondent
  text: I think it had a lot to do with that. Uh, Mount Sterling being the only wet town in several areas, you know, you would
    get people from, uh, east of here, Menifee, Morgan County, and people from, uh, Rowan, Bath, and Carter would all come
    to Mount Sterling during those days. And it was just a-- back then people come up rough and tough and they had to--
- speaker: Respondent
  text: You know, so it was a-- we weren't really allowed to go across, uh, the Bank Street, you know.
- speaker: Interviewer
  text: As kids, you weren't. Your parents said don't go past Bank Street.
- speaker: Respondent
  text: Only time we ever went there-- in the drive thru where the--what is now The Whitaker Bank drive thru - Through there
    was a Ken's Grocery.
- speaker: Respondent
  text: And we'd--we'd go to the Ken's Grocery and buy groceries. You know, it was about the only time we ever got across
    the South Bank Street at that early age.
- speaker: Interviewer
  text: That's so interesting that, you know, to think that there's that kind of mark there, you know, like geographical landscape
    and location.
- speaker: Interviewer
  text: Um, so you grew up, you graduated what year? 1970. You graduated from Mount Sterling High School. And then what did
    you do? Did you come back here? Did you stay here and work or--
- speaker: Respondent
  text: Well, I sort of peeled around, going to college and working and, uh, 18, 19, 20 years old, you don't--I didn't really
    have a lot of vision of what I wanted to do. And I suppose I might say my dad put me in business.
- speaker: Interviewer
  text: Okay. What was your dad's business? What did he do?
- speaker: Respondent
  text: Well, in his early life, he, he did a lot of construction. He was an ironworker. And then sometime after that, he
    got into the liquor business.
- speaker: Respondent
  text: Him and another fellow went partners in the liquor store.
- speaker: Interviewer
  text: Who was his partner?
- speaker: Respondent
  text: A guy named Buster Schultz. They went into partners in liquor store for a couple, three years. Then after that, he,
    uh, he bought--at that time what was called Big Daddy's Liquors, which is on the corner of Maysville and Locust, and changed
    it to Big Red's Liquors.
- speaker: Interviewer
  text: And that was his name?
- speaker: Respondent
  text: Well, they just--everybody knew big Red. They called him Big Red.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: How did he get that nickname?
- speaker: Respondent
  text: He's red-headed.
- speaker: Interviewer
  text: He was red headed.
- speaker: Respondent
  text: He was a big guy, you know? Everybody called him Red, you know?
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: And of course, you know, with the Big Daddy, he was easy to change the placard in it. You just change it from Daddy's
    to Red's.
- speaker: Interviewer
  text: Yeah. So do you know what year he- he started that?
- speaker: Respondent
  text: 1976, we bought that property.
- speaker: Interviewer
  text: So you went into business with him then?
- speaker: Respondent
  text: Right. Right.
- speaker: Interviewer
  text: And pitched in.
- speaker: Respondent
  text: He seen I wasn't going to go anywhere in life, so he decided to put me in business in the liquor store.
- speaker: Interviewer
  text: And what was your responsibilities then? You would have been 20 years old or something?
- speaker: Respondent
  text: I was 21, 21. Uh, just basically managing and run the store at that time. We had a lot of dry counties around us.
    So, uh, bootleg or wholesale was a big business back then. You'd get bootleggers from Morgan and Menifee and Magoffin
    and would all come to Mount Sterling to buy their booze, to take back home, you know?
- speaker: Interviewer
  text: That was interesting. And you knew they were bootleggers. But to them, to you, it was a sale, right? I mean, it didn't
    matter because they were. It was legal for you to sell it.
- speaker: Respondent
  text: Yes and no. I think the federal government sort of frowned on it, but--but you could get you a federal tax license
    to sell it, and you just had to keep track of who it went to. But the federal government never come and checked it. We
    had to set up logs that you had to keep every time you sold a case of whiskey, you were supposed to write the serial number
    down on it and who it went to, but nobody ever looked at it.
- speaker: Interviewer
  text: Nobody ever checked it.
- speaker: Interviewer
  text: That was kind of a--not of a time of regulation.
- speaker: Respondent
  text: Right. But there was a lot of them around, you know. And of course, they'd come to town and spend their money and,
    you know, close the beer joints up till midnight, then go back home, I reckon. Transporting it after midnight was probably
    the best time for them to transport it, because I suppose all the police had done gone to--basically state police then--had
    done turned in at that time.
- speaker: Interviewer
  text: So tell me in 1976 walk me down Locust. Is it all just wall-to-wall liquor stores or is there other things there?
- speaker: Respondent
  text: No. There was across the corner there was a place called the Corner Poolroom.
- speaker: Respondent
  text: Which was a big hangout. And then if you walked up Maysville Street, they had just bar after bar, uh, Grace's Tavern.
    Uh, there was another poolroom called Sterling--Sterling Barnes's Pool Room. Another called C&O Pool Room. You got on
    up the street, there was a Barnard's Clothing Store. Uh, a paint store. Sterling Paint. Uh, on the other side street,
    there was-- if you come down the street--there was a--called the Alibi Club. There was a Hobbs-- was on the corner, which
    was a--like a small Walmart. Then you had the hardware store over here. Hardware Howell. You had the Oldhams.
- speaker: Respondent
  text: And there was a barber shop there somewhere. And there was a Goodyear Tire Store there. And on the corner was a uh,
    I think it was called a Tab Theater.
- speaker: Respondent
  text: There, at the bottom of South Maysville.
- speaker: Interviewer
  text: Yeah, and later became Maloney's.
- speaker: Respondent
  text: Where Maloney started at.
- speaker: Respondent
  text: And then if you went down Locust Street, of course, on the other corner was the Monarch Mill.
- speaker: Respondent
  text: Which sold a lot of feed. And, but on the other side you had uh, I think there was a guy named Clay Pendleton that
    had, like, an appliance repair shop.
- speaker: Respondent
  text: Then you had the City Tavern and the Flamingo Tavern. And just one really beer joint right after another.
- speaker: Respondent
  text: And, uh, then he got on down there was a big warehouse that was a fertilizer warehouse where they sold fertilizer.
- speaker: Interviewer
  text: That was on the bottom of Locust near Queen? Or toward Queen?
- speaker: Respondent
  text: Yeah. Yeah. It's in what they call Wilson Alley, I think, it's what they call it now.
- speaker: Interviewer
  text: Oh yeah. Okay. Yeah. Right there where the parking lot of the Downtown Athletic Club comes down.
- speaker: Respondent
  text: Yeah. Right in there. And then on the other side of that--they--in my day and time, it was a place called the K-Y
    Club, which was a big dance hall. It was, it was-- What was that old woman's name? Then there was a guy named Charlie,
    Charlie Ruark, that had a liquor store.
- speaker: Interviewer
  text: So this is like a slice of history I've never heard about.
- speaker: Interviewer
  text: No one writes about this. This is so fascinating. I had no idea that Mount Sterling had. Well, you've just named off
    at least four taverns and three nightclubs and a dance hall.
- speaker: Respondent
  text: Yeah, across from a--further back up the street there, there was another store called Trader's Liquors. And that was
    the right sort of next to the Monarch Mill. But every Court Day, they always said--they--it was just a little concrete
    block building that had a flat roof on it. And they would always have like a, a bluegrass Bill Monroe or -- go up there
    and play music. And then sort of where the uh, Health Department sat was the stockyards.
- speaker: Respondent
  text: That's where the people would all bring their stock to, to sell, you know.
- speaker: Interviewer
  text: Well, that's a good segue into our topic for today is Court Day. And of course, Locust Street is kind of exactly right
    down the middle of where our contemporary Court Day is.
- speaker: Interviewer
  text: Tell me a little bit about Court Day for you growing up. What was it like for you in the 50's and 60's?
- speaker: Respondent
  text: I can't really remember a lot of going to Court Days, because like I said, we weren't really allowed to go-- go down
    on that segment, end of town. I do know they had the stockyards there, and every now and then, we'd go down to the stockyards
    and walk to it and look at all the stock that people brought in, and always had a lot of guns.
- speaker: Respondent
  text: You know. The only story I can really remember is-- is after Court Day, you always had these dogs running around.
- speaker: Respondent
  text: And at that time, we had--our house on Locust Street had burned, and we was living up over a tavern while my dad was
    building a house.
- speaker: Interviewer
  text: Okay. What tavern was it?
- speaker: Respondent
  text: Well, it was actually a liquor store. It was called Schultz's-- had a liquor store, and we was living upstairs, and
    we had a little old beagle hound called Snoopy. He was a little beagle.
- speaker: Respondent
  text: And there was a fella out of Menifee County. I don't want to call his name, but there was a guy name of P.I. Botts
    had stopped this fella. He and this other fellow shot--shot P.I.--shot and killed him.
- speaker: Interviewer
  text: Oh my goodness.
- speaker: Respondent
  text: And he always claimed that this guy was trying to steal our beagle hound.
- speaker: Respondent
  text: And that's what people would do. They-- they'd get these dogs and they'd bring them to town and try to sell them.
- speaker: Respondent
  text: But that was--he always--he--Dad always claimed that that this fella claimed P.I. over our little old beagle hound.
- speaker: Interviewer
  text: Huh. Wow. It sounds like it was kind of rough.
- speaker: Respondent
  text: It was. Yeah, it was rough.
- speaker: Interviewer
  text: So kids and women probably wouldn't go down to Court Day.
- speaker: Respondent
  text: Not a lot. You know, I can't really remember going to Court Days myself.
- speaker: Respondent
  text: When I got--as I got older, my only interest in going to Court Day was-- I like to play pool.
- speaker: Respondent
  text: And I used to--they always had the, uh, these really good hustlers would always come through and they'd always have
    a big pool game, you know, a lot of money, you know? And it was just interesting to sit and watch them play.
- speaker: Interviewer
  text: Where would you play? Tell me the places, the pool halls.
- speaker: Respondent
