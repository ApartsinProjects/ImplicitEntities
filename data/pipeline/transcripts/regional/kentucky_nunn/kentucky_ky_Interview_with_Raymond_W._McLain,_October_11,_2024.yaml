collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So today's date is October 11th. Just trying to think how many we've done. I think this might be number five.
- speaker: Respondent
  text: Oh, really? Yeah, okay.
- speaker: Interviewer
  text: This might be number five with you. We've got two done with Ruth, and I'm about to reach out to Alice to start that.
    The goal is to get everybody up to Berea and then pass Berea at that point.
- speaker: Respondent
  text: Yeah, I think we're there.
- speaker: Interviewer
  text: You and I are there. We finished just getting to Berea in our last interview, so that's where we're going to start.
    I'm excited to start from the beginning with Alice now. But I do want to talk about the transition to Berea. One of the
    quotes you said at the end of the last interview that I thought was really interesting, and this is going to be the bridge
    to the next phase, what we're going to talk about, the performance aspect—festivals. Eventually, today we're going to
    talk about the international stuff. You said, 'We responded to invitations. We didn't seek out invitations until much
    later. We weren't trying to have a career, but it was turning into one at that stage.' Talk about that moment that was
    happening with regard to performance and—
- speaker: Respondent
  text: Well, we had friends that had invited us to do different things.
- speaker: Interviewer
  text: In the last interview, you talked about being invited to Bill Monroe's festivals. You mentioned, briefly, this thing
    in Ohio, the O'tucky?
- speaker: Respondent
  text: Oh, the O'tucks, yeah.
- speaker: Interviewer
  text: The O'tuck festival?
- speaker: Respondent
  text: That was Stanley Dezarn in Hamilton, Ohio. Or maybe Middletown—Hamilton, Hamilton.
- speaker: Interviewer
  text: So that was one that stood out. Then you just briefly mentioned Renfro Valley. I wanted to take this idea of—
- speaker: Respondent
  text: Glenn Pennington, who at different times has owned Renfro Valley Barn Dance or been part owner or maybe at one point
    the complete owner. He had a car lot in Berea, and we bought cars from him. We made his acquaintance and were friends,
    and he invited us to come play on the Renfro Valley Barn Dance, which we did and enjoyed very much. We started going regularly
    whenever we weren't on the road somewhere else on a Saturday night. We'd go to the Renfro Valley Barn Dance, and that
    was very exciting because there were still a lot of the old timers still around. Not all of them, but some. And we always
    enjoyed that.
- speaker: Interviewer
  text: Did these invitations kind of coincide? I think the Renfro Valley thing coincided with Berea and the transition to
    Berea.
- speaker: Respondent
  text: Well, yes. We were close, so it was just about fifteen miles to drive there at that point. There were a lot of things
    we did when we got to Berea that were easier than when we had been in Hindman because it was easier to travel. But if
    we stayed in Hindman, it would have become easier too because they built roads that weren't there when we lived there
    and improved roads. We were there when they built new 15 from Hazard to Campton. That cut a lot of time off a trip to
    Hazard even before the Mountain Parkway was opened.
- speaker: Respondent
  text: Now, you can go from Hindman to Hazard in a very short time, a matter of twenty minutes or something. It took much
    longer when we were younger.
- speaker: Interviewer
  text: So these friends were inviting you?
- speaker: Respondent
  text: Well, for example, when we started our television program, we talked about that at WKYH—now WYMT, I think—in Hazard.
    Very soon after that, the Goins brothers also started playing there, and Bill Gorman and the people at the television
    station said anytime I wanted to come in and run a camera or something, I could, and they needed people and I didn't cost
    them anything.
- speaker: Interviewer
  text: Yeah. [laughs]
- speaker: Respondent
  text: I was very willing. I must have been about sixteen or so because I was born in 1953, and this would have been in 1968
    and 1969 when they went on the air. I went in and was running the camera and running sound and things for the Goins Brothers.
    Melvin would say, 'Now, don't mess me up, Raymond.' I really tried hard, and they were very nice to me and helped me.
    I don't think I did mess him up. [laughs] We made friends, and he was friends with my father and my family. He was talking
    about going to Bean Blossom, Indiana, to play with Bill Monroe and to go to all these exciting places. He said, 'You ought
    to come to Bean Blossom, and you ought to come to these places.' He introduced us to Bill Monroe, who invited us to play
    not only at Bean Blossom, which we did for a couple of years, but then later all of his festivals. He had festivals at
    that time in Delaware, Colorado, California, Mississippi, Alabama, two in Tennessee, one in Kentucky in Rosine, and then
    he started another one in Jackson, Kentucky, he and Melvin did together with Cager Farler. Those were good days.
- speaker: Interviewer
  text: This is a little bit of a digression, but one thing that strikes me—we talked a little bit about this in the first
    interview—but we're kind of experiencing today a rebirth of the festival. Now there are these mega festivals that are
    enormous things like in Louisville, Bourbon and Beyond and these types of things that are happening, but bluegrass really
    kind of—
- speaker: Respondent
  text: But there really were in the 70s too. In the 80s, at the Riverfront Belvedere, there was the festival that celebrated
    Harlan Sanders' birthdays, for example. People came from California, New York, from everywhere, a lot from the Opry, and
    it was very nice. Harlan Sanders always asked for us every year, which was really an honor.
- speaker: Interviewer
  text: I mean, we think in the 60s about Woodstock and some of those other famous festivals.
- speaker: Respondent
  text: Now, they weren't mega things like Woodstock, of course, because that was so big, but Bean Blossom at that time was
    huge. There were people from all walks of life that came together. That was one of the things about those early bluegrass
    festivals. There was everybody—from every age, every cultural background, every political opinion, everything. They were
    all there together celebrating music and enjoying music. That's something that needs to happen again. I think it can,
    even with the larger festivals now. There's maybe more of a range of ages and cultural backgrounds than there were maybe
    ten years ago because the audience kind of segregated themselves. You'd have a festival where most of the crowd was older,
    or a festival where people were younger, or this was a very conservative group and that wasn't. But I think they're kind
    of coming together again, maybe around some of these larger festivals like Railbird here in—
- speaker: Interviewer
  text: Yeah, Railbird, yeah.
- speaker: Respondent
  text: Or some of these festivals again that attract everybody. I think we need to get to that, and that will help our society,
    that will help everything.
- speaker: Interviewer
  text: It'll help musicians for sure.
- speaker: Respondent
  text: Oh, it'll help musicians, it'll help the audience. Everybody needs music.
- speaker: Interviewer
  text: When you talk about Bill Monroe having all of these festivals at this time, and you talk about all this—
- speaker: Respondent
  text: At the early bluegrass Bean Blossom Festival, there was a group of people there. Daddy always talked to everybody,
    which was wonderful because it meant I got to talk to everybody too. There was a group of people there. We didn't know
    they were journalists, and they said, 'We're going to start a new magazine. It's going to be called People Magazine.'
    One of the first things they sent them to do was to cover one of those Bean Blossom festivals.
- speaker: Interviewer
  text: You're kidding.
- speaker: Respondent
  text: Well, yeah, that was fairly early on, probably early 70s or so. It really was kind of a game changer in those days.
    The festivals were because before that, when rock n roll came in, a lot of the older country musicians and bluegrass musicians
    especially had a harder time making a living. Even the Stanley Brothers or Bill Monroe couldn't always afford to keep
    his band all the time. They worked on his farm when he wasn't working on the road. There were a few hungry years for everyone
    except maybe Flatt and Scruggs, who had the folk music revival and The Beverly Hillbillies and Bonnie and Clyde and all
    that, and the groups sponsored by Martha White, which were Flatt and Scruggs, Jim and Jesse, Hylo Brown. They had at least
    some momentum from all the television appearances.
- speaker: Respondent
  text: Jim and Jesse and the Osborne Brothers going to The Grand Ole Opry in 1964, Jimmy Martin was doing a lot in those
    days, but the rock and roll era was hard on country musicians. Now, a lot of what was rock and roll would be called country
    these days.
- speaker: Interviewer
  text: Yeah, that's right.
- speaker: Respondent
  text: So this proliferation of bluegrass festivals specifically was in some ways a survival mechanism in terms of creating
    venues to go play?
- speaker: Interviewer
  text: I don't know if it was planned as a survival mechanism, but it sure helped bluegrass musicians.
- speaker: Respondent
  text: When I think about the kind of festival we're describing, I just think about bluegrass. I don't think about, of course,
    you've got things like the big Jazz Fest and some other genres that have mega things.
- speaker: Interviewer
  text: And folk festivals were very popular in those days and very important in the development of folk music and the folk
    music revival.
- speaker: Respondent
  text: Did you get folk musicians playing at bluegrass festivals, or was there a divide? Was there really like, this is bluegrass?
- speaker: Interviewer
  text: There were a lot of the folk audience that came to bluegrass festivals and the bluegrass audience that went to folk
    festivals because, for example, Newport Folk Festival hired Earl Scruggs. Interestingly, they didn't have Lester Flatt.
    They got Hylo Brown to sing with—
- speaker: Respondent
  text: I don't know why that happened. It would be interesting. Maybe in the Bill Clifton interview, there may be some mention
    of that he did with Joe Wilson.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: Bill Clifton was instrumental in helping start the Newport Folk Festival and some other folk festivals as well. There
    were bluegrass musicians involved in the folk music revival because bluegrass music had all the criteria to be accepted
    there. Not everyone did. One reviewer said Earl Scruggs' banjo style sounded like pouring thumbtacks on a tin roof. There
    were people that resented the newfound popularity of bluegrass music. Suddenly, it was staggeringly popular again. Bluegrass
    music has had some real ups and downs in history, sometimes driven by movies and television. When 'Foggy Mountain Breakdown'
    became the chase music for the movie 'Bonnie and Clyde,' everybody was all about the five string banjo, and then it waned
    a little bit. Then 'O Brother, Where Art Thou?' came out and everybody was all about bluegrass music again.
- speaker: Respondent
  text: Different ways that people hear it that all of a sudden it becomes hip. For me, it's always been hip.
- speaker: Interviewer
  text: Yeah, of course.
- speaker: Respondent
  text: It was a radical new music style when Bill Monroe invented it, but it has had ebbs and flows with popularity over
    time.
- speaker: Respondent
  text: So, you guys are this family band, and you're still really kids at this point. You're in your late teens early—
- speaker: Interviewer
  text: But bluegrass musicians were very kind to young people, all across the board. Don Reno was so nice to me. Red Smiley,
    Benny Martin, Bill Monroe, Ralph Stanley, Clyde Moody, and all these people. Bill Monroe's sidemen—Joe Stewart, Kenny
    Baker—really took us under their wings.
- speaker: Respondent
  text: So what does that mean when you say that they're nice and they take you under their wing?
- speaker: Interviewer
  text: They treated us like musicians. They didn't treat us like kids. They did the same for Carl Jackson, Jack Hicks, and
    all these people about my age coming up with me who were interested. I'm going to see my friend Blake Williams this weekend.
    He played banjo with Bill Monroe for many years. When he went to work for Bill Monroe and then played bass with Lester
    Flatt, he didn't have to learn their material. He knew it from the time he was a kid.
- speaker: Interviewer
  text: Carl Jackson didn't have to learn Jim and Jesse's material. He already knew it. Jack Hicks didn't have to learn Bill
    Monroe and Carl and Jim and Jesse's material. He knew that already. It was part of them because they were part of that
    tradition. In a way, we were too. When Don Reno asked me to play mandolin with him, I didn't have to learn 'Talk of the
    Town' or 'Remington Ride' or 'I Know You're Married, But I Love You Still' or 'I'm Using My Bible For a Roadmap.' I knew
    those songs already.
- speaker: Interviewer
  text: I didn't have to learn his material because I already knew what key it was in.
- speaker: Respondent
  text: Right. [laughs] We all knew those things.
- speaker: Interviewer
  text: Yeah. That's incredible.
