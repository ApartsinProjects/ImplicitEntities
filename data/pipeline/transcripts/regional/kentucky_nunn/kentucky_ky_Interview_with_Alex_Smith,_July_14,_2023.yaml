turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: Oh, gosh, um, uh Alex Smith, uh, son of, uh, John Michael and Lou Anne Smith, um, as you mentioned before-- hard to
    find on the internet-- not the most unique word, but--or the unique name. But, um, yeah, I've been in Lexington. I'm a
    Lexington resident. I have been in Lexington now since about 2015. Uh, I live with my partner, Rachel, over across from
    West Sixth Brewery and, um, yeah, we love our animals. We got backyard chickens, and a dog--couple dogs, and a cat. And
    we really, um, yeah, just enjoy walking around town and getting engaged in the community.
- speaker: Respondent
  text: And gosh, I think about climate change all-- the time.
- speaker: Interviewer
  text: Yeah, which is why you're here-- Because you not only think about it, but do things about it--I mean, thinking about
    it is important, too.
- speaker: Interviewer
  text: Yeah, so how does that show up in your life?
- speaker: Respondent
  text: Goodness, um, it's really changed over the years. I made a really intentional choice around 2015 to, uh, work directly
    in climate, uh, related things. I had been a software consultant and had a client who was talking to me about climate
    change consistently. She was a member of Citizens Climate Lobby and I had known about climate change before this. I'd
    worked on a solar project in school, I--in college, I graduated in 2014. I kind of explored solar, um, but didn't really
    understand kind of the, the actual kind of situation of climate change. And this, uh, client of mine had been talking
    to me about it, uh, in between, you know, work sessions and things. And, um, eventually, I just got to a point where I
    really felt like I needed to be working in that space directly. It just seemed like a really huge deal to me and it didn't,
    honestly, didn't make sense to, to not be working in it for me. Um, so, I left that job and I got solar training out in
    Colorado and have since been working directly in this space. It kind of evolved from a solutions-oriented approach, um,
    which definitely has its value, um, to really just--I think, wrestling with--I feel like, daily how it shows up to maybe
    get directly more close to your answer or to your question--um, really daily how it shows up is just really trying to
    wrestle with this--I really think, question about how we're living our lives here in, um, modernity or Western industrial
    capitalism and how fundamentally tied and connected that is to, uh, the challenges that we're facing. So, um, yeah, everything
    I buy or don't buy or eat, um, my most recent stint before my current job, uh, was greenhouse gas emissions-- and doing
    emissions inventories. So, I'm really familiar with the footprint of a lot of products and I just, I think about it all
    the time.
- speaker: Interviewer
  text: That was with Schneider, right?
- speaker: Interviewer
  text: It's hard not to once you know what you're looking for--
- speaker: Interviewer
  text: to just see it everywhere, whether that's like, thinking about emissions inventory or thinking about like, how we're
    just sort of trained to live in certain ways, or yeah. Um, I had no idea that it was like, really one person that sort
    of pushed you in this new direction. So, this client, the project that you were working on was not climate related, this
    was like sort of sidebar conversations.
- speaker: Interviewer
  text: So, given--and we'll get to this, uh, at some point, but given the work we're doing, you and I together with climate
    conversations, that's really interesting-- to know. I mean, I assume this has been on your mind as we do this--these climate
    conversations work.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: Yeah. Okay, well, let's go back a little. So, you were obviously open to that pushing, um, or open to the--becoming
    persuaded by those conversations. Um, so, how did you, how'd you get there? I guess. You're from Kentucky originally--
- speaker: Respondent
  text: (laughs) yeah.
- speaker: Respondent
  text: Yeah, I, I grew up in South Central Kentucky in Glasgow, Kentucky, Barron County. Um, I moved in eighth grade to Louisville,
    Kentucky, um, which--right, some might argue isn't Kentucky, but also is--
- speaker: Respondent
  text: um, but yeah, so I went to high school in Louisville. I never super rooted in Louisville necessarily, although that's
    where my parents are. Um, so yeah, I've been in Kentucky pretty much my entire life. I went to college outside of Kentucky,
    I lived in Atlanta for a year, I lived in Colorado for a summer, and then I came back to Kentucky and I've tried to get
    away a couple of times-- and it just, uh, it just keeps pulling me back.
- speaker: Respondent
  text: Oh, that's hard to answer. Um, most recently, I continue to feel really, um, drawn to doing this type of work here.
    Uh, I know there are a lot of different and higher paying jobs and different opportunities at other job markets at other
    areas of the world, especially for stuff that I've got experience in. Um, but there's not a ton of people doing it here
    and I don't, I don't want to, yeah, if I'm not doing it here--willing to do it here, then like who else? Like, yeah, obviously
    other people will step to the table too, but--
- speaker: Respondent
  text: I don't want to jump ship.
- speaker: Interviewer
  text: Right, yeah. I think, well, Kentucky needs that-- Anywhere needs that, right? People who are really committed to the
    place. And that's one of the things we're trying to do with this project, right? Is, is really make sense of, uh, the
    reality that people are really rooted in and care about this place and push back against kind of larger narratives, like
    national narratives about Kentuckians and about Kentucky. Um, so, are you still connected? Do you feel like to South,
    you said South Central or Southeast?
- speaker: Respondent
  text: South Central.
- speaker: Interviewer
  text: South Central, Kentucky. Um, oh, right, Glasgow. Um, are you still sort of connected down there if you're not so much
    rooted in Louisville or is it you're really a Lexingtonian now, right?
- speaker: Respondent
  text: Yeah, I--I've, I've wrestled with this question a lot. Where are my, where are my roots are exactly? I, I have most,
    they're most established in Lexington to me at this point. Um, my family moved around a lot, my dad is a doctor, but did
    his training through the army. So, they moved around a lot and when they, um--I was born pretty much at the end of his
    service time. So, my folks have, uh, my folks moved back to, uh, Kentucky shortly after I was born--when I was like two
    or three, we were in Denver at the time, but they moved back to Kentucky and have been in Kentucky since.
- speaker: Respondent
  text: But I think they lost elements of that rootedness too. They were both--they're both from Springfield, Kentucky, uh,
    but we're very intentional about getting out of-- Springfield, Kentucky. I think there's like 2000 people that are really
    small rural community, but Glasgow was like the closest they could get to family and my dad could still find work. So--but
    we didn't really feel super connected to that place. And Louisville has felt closer, it's really, it's a lot more diverse,
    which I think my parents really enjoy having lived everywhere from like Colorado, they lived in Hawaii, they lived like
    all over the country. So, Louisville has been good for them--
- speaker: Respondent
  text: but, I think I've looked for that and looked for that and trying to just set up roots in a place. I do feel really
    drawn here from like a family perspective and this place, I think it's so beautiful. Uh, there's a lot of, uh, challenges
    here with certain people and then there's also some people that are like, I found a lot of really--like people that are
    really connect with as well--
- speaker: Respondent
  text: so, it's, it's an interesting like paradox or like dichotomy, I guess.
- speaker: Interviewer
  text: Yeah. Um, so. in that upbringing, like was--were environmental issues present? Was that something you guys thought
    about or talked about in your family?
- speaker: Respondent
  text: Uh, not super heavily or consistently, but I regularly think back to this time where my dad and I were driving in
    his--he had a little red sports car, right? White man with a little red sports car, shocker. But he--we are driving and,
    uh, we got the, it's a little Miata and we got the windows down and I had taken the--I was fidgeting and had taken the,
    the Gatorade wrapper off my Gatorade bottle and it flew out the window. My dad noticed this and he pulled over on the
    side of the road and we picked up trash for I don't know how long, but that was a very much a--we, we don't litter.
- speaker: Respondent
  text: Um, so, that was--
- speaker: Interviewer
  text: That is like, not just don't do that, but we're actually going to like change our plans--
- speaker: Interviewer
  text: And I mean, obviously that was formative, it stuck with you.
- speaker: Interviewer
  text: How old were you when, when this happened?
- speaker: Respondent
  text: I was probably nine or ten.
- speaker: Interviewer
  text: Uh-huh. Did he talk to you about why you were doing this or just, we don't litter and then that's it?
- speaker: Respondent
  text: It was, I don't remember a ton of conversation about it. It was pretty self-explanatory. It was challenging because
    it was like--it was an act--I didn't like actively throw--
- speaker: Respondent
  text: the litter out. I had like left it in the floor--
- speaker: Respondent
  text: and it flew out the window.
- speaker: Interviewer
  text: Right, yeah.
- speaker: Respondent
  text: Um, so that was a little challenging, but--
- speaker: Interviewer
  text: I lost a lot of cassette tapes in the nineties that way, yeah-- (laughs).
- speaker: Interviewer
  text: There, I left it on the dashboard and it would just, yeah. Right, so I guess there's a sense of a little bit of injustice.
- speaker: Respondent
  text: It was a little weird, but looking back at it, yeah, that was, it clearly made a lot of sense and there were other
    elements. I mean, it was very much like, uh, keep things clean, take care of things.
- speaker: Respondent
  text: Um, plenty of consumerism--like we bought plenty of things and my dad, my dad's a radiologist, so we are, uh, wealthy.
    I mean, relatively wealthy. Um, so we were able to buy a lot of things that are very comfortable--I've had a very, very
    comfortable life. But, it wasn't the same type of consumerism that I saw from peers or folks of that similar thing. Like
    we, we definitely bought things, but it was, I felt like a lot more intentional. It wasn't nearly as conscious or, or
    intentional as I would be now or today or even the past several years. Um, but it was--my dad's always been about buying
    less, but buying something like that's quality and going to last and taking care of it.
- speaker: Respondent
  text: So, he's bought a lot of toys that way--
- speaker: Respondent
  text: but he also, uh, I've seen the, I've seen the man use a plastic, uh, like bladder for camping for so long that it
    disintegrate--it fell apart--
- speaker: Interviewer
  text: (laughs) uh-huh
- speaker: Respondent
  text: it fell apart from his camping gear that he had bought in like the eighties.
- speaker: Interviewer
  text: I was wearing rubber boots this morning that my mom bought in England in 1987 and they're still going, yeah--
- speaker: Interviewer
  text: Um, I fear the day they disintegrate.
- speaker: Interviewer
  text: Yeah, um, so, then let's see, high school you went to Xavier, right?
- speaker: Respondent
  text: Yeah, I went to Saint X.
- speaker: Interviewer
  text: Yeah, um, and which is in Louisville, a Catholic private school.
- speaker: Interviewer
  text: Was there any discussion of, I mean, you mentioned having kind of learned about climate and environmental issues prior
    to these conversations with the client--the software client.
- speaker: Respondent
  text: Yeah, I was thinking about this sort of recently. I didn't, I don't remember learning a ton about the environment
    or environmental science there. I do--I did have a physics teacher, I guess my junior year that, um, for lack of a better
    term was--I realized now it was a bit of a prepper-- in the sense that he was really about, he would always talk about
    how he had his farm property and he was really about getting a water source. He was really about like, I'm going to have,
    I want property with access to water. And this would have been in 2008 or nine--
- speaker: Respondent
  text: So, I remember that, but I don't remember there being like a lot of context or conversation around that necessarily.
- speaker: Interviewer
  text: So, then when you went to college Vanderbilt for--were you engineering all the way through or you knew that's what
    you wanted to do?
- speaker: Respondent
  text: Yeah, I did mechanical engineering. Um, yeah-- yeah, I never thought I actually wanted to be an engineer, but I knew
    that that was a worthwhile degree-- to get. It would open up a lot of opportunities for me. Um, yeah.
- speaker: Interviewer
  text: Mm-hmm. And what did you want to do then?
- speaker: Respondent
  text: I didn't exactly know, um, I would argue that I still don't know--
- speaker: Respondent
  text: I'm, I'm still figuring out what I want to be when I grow up. Um, but I knew that crunching numbers or, or being like
    a, a--an engineer in practice as I'd been shown was not necessarily the thing I wanted to do. Though-- I mean, before
    engineering, I wanted to be an architect or a doctor. I was, uh, advised not to-- decided to be an engineer. I was like,
    okay, that's cool. I want to be a mechanical engineer, I want to design sports cars.
- speaker: Interviewer
  text: that's cool
- speaker: Respondent
  text: (Laughs) yeah, yeah, so I took German in high school. So I was like, I'm going to take German in high school. I'm
    going to be a mechanical engineer and I'm going to go work for a German car company--they make all the nice cars. And
    then at some point along the engineering way, relatively early on, I realized that, um, which this is really immature
    and selfish, but I realized I was like, oh, as a mechanical engineer for a German car company, I wouldn't design the car.
    I would work on like the door handle--
- speaker: Respondent
  text: on said car that like hundreds of people would be working on. I was like, oh, that's, that's a lot less exciting--
    So, but reality check that I wish I would have gotten earlier in the game, but this is what it is.
- speaker: Interviewer
  text: Yeah. So, then how did you end up in software? So, um, so I think because I wasn't super clear about what I wanted
