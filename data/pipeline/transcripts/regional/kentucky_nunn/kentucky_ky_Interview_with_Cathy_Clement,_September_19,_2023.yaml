collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: Um, well, I grew up in California, so I'm not a native Kentuckian, um, but I moved here in 1989 to take a job at Eastern
    Kentucky University in the psychology department. Um, so I taught there for twenty-seven years, roughly, and retired in
    2016. My husband, uh, was at Kentucky State University, so he got a job here first, and then I followed. Um, we have two
    sons, and one lives in Houston. He's a high school teacher, and one lives in San Francisco and is a techie.
- speaker: Respondent
  text: Um, so--(laughs)--that's almost all I know about what he does--(both laugh). So, um, the year I was retiring, um,
    a friend of mine, uh, Steve Wilkins, was very involved in Kentuckians for the Commonwealth, uh, On the Table event. I
    don't know if you were around then--
- speaker: Interviewer
  text: --that was right when I was moving to Kentucky, so I was not yet--
- speaker: Interviewer
  text: --aware of it.
- speaker: Interviewer
  text: So this would have been 2016, no 2018?
- speaker: Respondent
  text: No, it was--the event, I don't know, was either sixteen or seventeen.
- speaker: Respondent
  text: So under Lisa Abbott's direction, KFTC's New Energy and Transition Team Committee, um, had this really fabulous event
    where they hosted large gatherings all over the state to get people's thoughts about the future of energy in Kentucky.
    And it was partly, I believe, in response to Obama's climate clean power plan, and the state of Kentucky refused to--the
    notion was that every state would come up with their, uh, way they were going to implement it, and Kentucky refused. And
    so Lisa and others on this committee said, "well, we'll do our own." So, they created this On the Table event. They had
    speakers from all over, but mainly they were getting people's input on what should Kentucky do. And, so anyway, and then
    they constructed this huge document that's out there--[dog barks]--uh, still, uh, available on things that should be done
    to address a just transition in Kentucky. And it was so impressive, and I thought these people are amazing. And--(laughs)--um,
    so I joined that New Energy and Transition Committee, and, so been involved with that and some things that have trickled
    out of that for the last four, five years, six years--(laughs).
- speaker: Interviewer
  text: I have a lot of follow-up questions--
- speaker: Respondent
  text: --yes, yeah, go--
- speaker: Interviewer
  text: --I want to ask from all those things.
- speaker: Respondent
  text: Yeah, yeah. Because I don't know where to--
- speaker: Interviewer
  text: Okay, let's start with--so when you came to EKU, that would have been in eighty-eight?
- speaker: Respondent
  text: Eighty-nine.
- speaker: Interviewer
  text: Eighty-nine.
- speaker: Interviewer
  text: Did you think you were going to be here this long?
- speaker: Respondent
  text: Yeah. I, I was never wanted to think much about the future, but, uh--(laughs)--
- speaker: Interviewer
  text: --(laughs)--uh-huh--
- speaker: Respondent
  text: --but, no, we did not come here with the plan of leaving, uh, you know, getting better jobs or--no. Um, yeah, I mean,
    actually--that's interesting that you ask that. I mean, the academic job market was so difficult that--and I wasn't on
    a, you know, research one career path, at least by that point. So, no, I think we figured we would stay--
- speaker: Respondent
  text: --but I will say it took a while to be, you know, to assimilate--(laughs)--into the state.
- speaker: Respondent
  text: Uh, and partly, too, was the fact that we both were commuting. So that meant I really wasn't enmeshed in Lexington
    or in Richmond. So, um, but yeah, that's funny. I never, I never applied for any other jobs and neither did Ron, I don't
    think. So, uh--
- speaker: Interviewer
  text: --yeah, yeah, as you said, it's the academic job market is so impossible, and yet there is that sense that you should,
    you know, always be keeping your--
- speaker: Interviewer
  text: --finger to the wind for the next best thing.
- speaker: Respondent
  text: And I guess partly is that everything was two jobs, not just one. So, yeah, I think we were glad to have jobs.
- speaker: Respondent
  text: And, um, you know, we had friends and, and the places--I'm from California and he's from, uh, northern Michigan. Uh,
    my sister lives in New York City. All these other places we might want to live are financially impossible. So--
- speaker: Interviewer
  text: --yeah. I know how that goes.
- speaker: Respondent
  text: Yeah--(laughs)--
- speaker: Interviewer
  text: --yeah. Uh, will you say more about that? You said it took a while to assimilate, I think is the word you used.
- speaker: Interviewer
  text: Will you say more about that?
- speaker: Respondent
  text: Um, well, I didn't pay attention to state or city politics for quite a while. I mean, I voted, and, but, um, nothing
    in much detail. Not that I would have done that if I was in, you know, whatever--it had been--I left California in 1980.
    So it was nine years since I'd been in my home state. And we had lived in New York and Massachusetts and, uh, Minnesota.
    So I didn't really have an allegiance--(laughs)--to any particular place. But, you know, certainly, um, uh, it was a different
    culture, certainly a different culture at EKU. And, you know, a lot of things were kind of upside down to me there--(laughs)--uh,
    on the campus. So, um, and learning the students' culture of, you know, for me, and I think the expectations when I was
    young is that you'll go to college and who knows where you'll end up. There was no notion that you will come home. You
    will, you know, live near your parents. And there was never any, no expectation of that. None of my siblings did that
    exactly, and, and, but I think for a while I would be surprised, you know, the students didn't want to apply to grad school
    even in Lexington. I mean--(laughs)--so, you know, just getting to understand where they were coming from--
- speaker: Interviewer
  text: --mm-hmm [affirmative], and that attachment to place--
- speaker: Respondent
  text: --yeah. And family--
- speaker: Respondent
  text: --and more than what I was used to.
- speaker: Respondent
  text: Um, so retiring was good too in that letting me get involved in Lexington and, you know, embrace it more as my community.
    Even though most of my friends lived in Lexington, oh, you know, I didn't have time to really do anything but work and
    raise kids. So--(laughs)--
- speaker: Interviewer
  text: --yeah. How were you meeting folks in Lexington then? Through like kid stuff or--
- speaker: Respondent
  text: Yeah. Um, there was two humming birds. Uh--(laughs)--they just flew off. Um, yeah, and, uh, I was very lucky that
    my--one of my best friends from graduate school got a job in my department--(laughs)--and lived nearby. So--
- speaker: Respondent
  text: Yeah, that was--
- speaker: Interviewer
  text: --the dream.
- speaker: Respondent
  text: It really was. Um, but yeah. So I met things through the kids and neighbors. Um, uh, yeah.
- speaker: Interviewer
  text: Have you all been in this neighborhood for that whole time--
- speaker: Respondent
  text: --yeah, so we, uh, almost. We lived downtown Madison Place for two years and then moved here.
- speaker: Interviewer
  text: Mm-hmm. Yeah. So, oh you're like classic Kenwick--(laughs)--resident.
- speaker: Interviewer
  text: Yeah. The OG Kenwick resident. The original, so--
- speaker: Respondent
  text: --oh, well, not--
- speaker: Interviewer
  text: --I mean, not the original, I guess--
- speaker: Respondent
  text: --no. God, I mean, I meet so many people and they'll say, oh yeah, my grandmother lived in Kenwick--(laughs)--
- speaker: Interviewer
  text: --mm-hmm, yep--
- speaker: Interviewer
  text: --yeah, when I used to live over here as a renter, I would meet people occasionally who would tell me about their
    family members who lived in my house.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Yeah, yes, but original compared to--
- speaker: Interviewer
  text: --there's so many people moving--
- speaker: Respondent
  text: --yes, yes, yes--
- speaker: Interviewer
  text: --in as much as possible, I mean, now that there's--
- speaker: Respondent
  text: --oh yeah, no. Yeah. I mean, I'm very lucky because we could not have bought the house on the salary I was making
    when I retired.
- speaker: Respondent
  text: So--(laughs)--
- speaker: Interviewer
  text: --right. Yeah, yeah.
- speaker: Interviewer
  text: --so California. Where in California are you from?
- speaker: Respondent
  text: Um, the Bay Area. So, what's now Silicon Valley--a town Los Altos, which is very near Google and all that, you know,
    Silicon Valley is a completely different place than what it was when I was there.
- speaker: Interviewer
  text: I can imagine.
- speaker: Respondent
  text: Um--(clears throat)--but my mom lived there. She died in 2017. So we went out there every year.
- speaker: Respondent
  text: If not twice a year.
- speaker: Interviewer
  text: Yeah. So you got to see all the changes over time.
- speaker: Respondent
  text: Oh yeah. Yeah. I mean, when I left, I thought, oh, I'm glad to leave. You know, I passionately love California. Um,
    but at the time, I thought, I'm glad to leave. I can't watch this anymore. I can't watch--(laughs)--you, know, I can't
    watch the environmental devastation of every orchard turning into a house, which is what I lived. I lived in a suburb
    that was in a cherry orchard. Um, so, but, you know, that was really wrong in a lot of ways. California has done so much
    to protect things. Um, but anyways, so, I forgot what you asked about.
- speaker: Interviewer
  text: Oh, just where you were from.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: Well, and you anticipated me because I wanted to ask about whether this concern for, you know, interest in, appreciation
    for all those feelings in relation to the environment, if that's something that you've carried for a long time or developed.
- speaker: Respondent
  text: Yeah. Um, my father was a big nature lover. Um, so I feel like he helped me appreciate. I mean, I just--California
    was so beautiful, and we went to the Sierras a lot. Once a year--(laughs)--he had one week of vacation a year. Um, but
    we lived close enough to go to Santa Cruz Beach. And, you know, I mean, there's so much glorious nature there. And, so,
    yeah, that's certainly. And there was a point. So, when I was in high school was the first Earth Day. And I remember that
    event. And, um, I remember a conference that some students had put together, uh, where they--I remember the opening statement
    was, "we will all be dead by 1980,"--(both laugh)--so--
- speaker: Respondent
  text: --and I think Paul Ehrlich came gave a talk--
- speaker: Respondent
  text: --at my high school, and--
- speaker: Respondent
  text: Yeah. I mean, because, you know, we were pretty close to Stanford. And, um, so there was a lot of people on campus.
    You know, now that I hadn't even really thought about this. Um, and then my--I remember I went to Oregon State my first
    two years and then transferred to UC Berkeley. And I remember I was going to maybe change my major from anthropology to
    environmental studies. But I, you know, I wasn't a very aggressive person--(both laugh)--but I ran into somebody on campus,
    an old high school friend, and I told her that. And she said, "really, that requires a lot of math and chemistry and physics."
    And--(both laugh)--I thought, oh, right. I can't do that--
- speaker: Interviewer
  text: --uh-oh--(both laugh)--
- speaker: Respondent
  text: So--(both laugh)--so, but I, you know, had I overcome those fears, I could have gone in that direction, um, I didn't,
    um--
- speaker: Interviewer
  text: --how'd you end up settling on psychology then?
- speaker: Respondent
  text: Uh, when I graduated, I think I was--I kind of just assumed I would go to grad school. And, um, I was interested in
    education and, uh, and, you know, the process of education, and I was frustrated at the time that I thought my education
    at Berkeley had not been good. On retrospect, I think there was a lot of good things about it. But at the time, I thought
    it was just all this massive memorization and regurgitation. So, I thought, I think I want to do something in education.
    I took one--(laughs)--I sat in on one education class. I don't know, I had already graduated. I can't remember the context,
    but that told me immediately I did not--(laughs)--want to do education--
- speaker: Interviewer
  text: --(laughs)--mm-hmm--
- speaker: Respondent
  text: --so--(laughs)--so, then I thought I should do develop--I thought what could be more important than developmental
    psychology? Um, you know, children's--in particular, I was interested in Piaget and--who wrote about cognitive development
    in children, and so, um, because I had read something by him as an undergrad. Anyway, so I then I decided to do developmental
    psychology. Um, and then I started a master's program at San Francisco State, but then went on to my PhD program and switched
    to cognitive psychology, which is more just adult cognition, how people think, attention, memory, and problem solving,
    and that kind of thing was my field, my research field. Um, so it just kind of evolved. And the very last few years, most
    of my research at, my research interests at EKU, um, had to do with using analogies in reasoning and how analogies can
    help people solve problems. I had done a postdoc with this woman who was real big in analogy research. Um, but then I--my
    last few years, I got interested in how people make decisions about environmental problems and environmentally responsible
    behavior.
- speaker: Interviewer
  text: Yeah. I had to stop myself from going down a Google Scholar rabbit hole and reading--
- speaker: Interviewer
  text: --all your papers--
- speaker: Respondent
  text: --well, oh I didn't--well there's not much to read.
- speaker: Interviewer
  text: No, well, more the analogy.
- speaker: Interviewer
  text: You have some of those from your earlier--
- speaker: Interviewer
  text: --publications, because as a rhetorician--
- speaker: Interviewer
  text: and I have colleagues who work with cognitive scientists--
- speaker: Interviewer
  text: on kind of rhetorical devices--
- speaker: Interviewer
  text: and their sort of overlap.
- speaker: Interviewer
  text: I have a colleague at Carnegie Mellon, this is not important for the oral history, but I think Cathy will be interested--
- speaker: Interviewer
  text: who's working with cognitive scientists on working with Alzheimer's patients to identify which rhetorical structures
    remain as kind of access to language and memory falls away.
- speaker: Interviewer
  text: And that they're finding these really interesting patterns that, you know, you go back to the ancient Greeks, some
    of the most foundational rhetorical devices that they identified for persuasion--
- speaker: Interviewer
  text: and entertainment are the things that remain when other language facilities fall away.
- speaker: Respondent
  text: Well, that's interesting.
- speaker: Interviewer
  text: Isn't that interesting?
- speaker: Interviewer
  text: Yeah. Yeah. So anyway, I saw analogy and I was like, hold on--(laughs)--I'm going to read about this, though.
- speaker: Respondent
  text: It's so interesting because I didn't one thing I didn't anticipate is how I would completely just drop--(laughs)--that
    like a hot potato when I retired--
- speaker: Interviewer
  text: --(laughs)--uh-huh--
- speaker: Respondent
  text: --I don't--uh, I just got so caught up in all this other stuff.
- speaker: Respondent
  text: And, um, I haven't thought about it at all. But as you're talking about it, that's really inte
