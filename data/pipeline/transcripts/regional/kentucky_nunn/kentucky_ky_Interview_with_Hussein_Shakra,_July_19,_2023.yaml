turns:
- speaker: Respondent
  text: So a friend of mine broke her leg. She, she fell on, like, this start of a--not a walking tour. When you go hiking,
    the start of Maslul.
- speaker: Respondent
  text: The path, yeah. She just fell a little bit and her leg got--and she broke her leg and she had, like, to do a surgery,
    and she was, like, for two months, just stuck at home. And her birthday was coming up and she wanted to, like, you know,
    celebrate and do something fun and she was going out of her mind not moving from the couch. So she asked me if I could
    help her. I'm like, "Sure, I have time. I just finished my degree. Why not? Let's do something fun." And she's like, "I'll--I'm
    going to give you some--a list. Go to this shop in the Shuk, Machane Yehuda--"
- speaker: Interviewer
  text: --the Shuk in Jerusalem--
- speaker: Respondent
  text: --the big Shuk in Jerusalem. And it's a big pastry, baking supply shop where you can find anything, and I need you
    to get me these ingredients to make something fun for my birthday. Like, I want to surprise our friends. And I'm like,
    "Okay." I took the list, went to the shop, entered my for the first time ever baking shop and I was like, "Oh, wow, what
    is happening?" It was big. It's, it's a big shop and they had a lot of everything everywhere, and I was a little confused,
    so--
- speaker: Interviewer
  text: --what part of the Shuk is it in--
- speaker: Respondent
  text: --it was in--it was--unfortunately it's closed.
- speaker: Respondent
  text: It was one my favorite shops in Jerusalem. It was--you know Pizza Flora?
- speaker: Respondent
  text: So it was in front of it. Now it's Machneyuda Restaurant. I forgot the name of it.
- speaker: Respondent
  text: --you know the Machneyuda restaurants? They have like a--
- speaker: Interviewer
  text: --a little one that's next to it?
- speaker: Respondent
  text: They have a couple of them there.
- speaker: Respondent
  text: But with different names. I don't remember the name of it.
- speaker: Respondent
  text: But it's in front of Pizza Flora and it was a pastry shop and baking supply mostly, and they used to have even classes,
    and I went inside and the shop owner, I remember she looked at me and she asked, "Hi, you look confused. Did your wife
    send you? Do you have a list?" And I'm like, "Exactly that. She's not my wife, but yes. Help me. I need this, that, this."
    And she's like, "Okay, no problem. Here you go, here you go." She gave me all the supply and mostly it was, like, fondant.
    I never knew fondant before. Fondant is like sugar paste, the thing that you do to create fun-looking cakes with that--you
    know, they look like clay, but you can eat them.
- speaker: Respondent
  text: And I went back, and on her--on the day of the birthday, I helped her make cupcakes. She was giving me, like, orders
    from the sofa and that was like doing it in the kitchen all by myself, and that was like--really, that's the first time
    I'm--I was like--
- speaker: Interviewer
  text: --that's a good friend--
- speaker: Respondent
  text: --working in this oven. Yeah, she knows she started that, and she's so proud of what she did.
- speaker: Interviewer
  text: What's her name?
- speaker: Respondent
  text: Yeah. And yeah, she gave me all the orders. I made the cupcakes. They turned really nice. And then after I finished,
    we decorated them together with fondant. We just watched a few videos on YouTube and I was, like, just amazed that you
    can use sugar paste to create all these cute little, you know, figurines that look like toys or dolls or, you know, whatever
    you want. And I was just fascinated with it, and I felt like I love--I used to draw when I was a kid.
- speaker: Respondent
  text: So it felt like you can be so creative with it, and I had so much fun that I just decided that same day, "I'm going
    to do this again." And, you know, after we celebrated and we showed all the friends what we did and everyone was so excited--everyone
    got, like, a cupcake that was special to him with, like, something that--we sculpted something that is--has a meaning
    to him, and--
- speaker: Respondent
  text: --we just saw how fun it is and how everyone is excited, so I just waited a few months, and then my nephew--my first
    nephew--
- speaker: Respondent
  text: --yeah, my first nephew had his birthday. He was celebrating three and I decided to make him this, like, double-tiered
    chocolate cake covered with fondant and with a little monkey on top and a duck on the side. And I made the chocolate cake
    from Betty Crocker's cake mix. You know, because--
- speaker: Interviewer
  text: --a staple in my house--
- speaker: Respondent
  text: --there we go. Because what do I know about cakes? Like, this is how you make cakes, right? Really had no idea.
- speaker: Interviewer
  text: Can you get--I guess you can get Betty Crocker here?
- speaker: Respondent
  text: I--yeah, you can. You can get Betty Crocker or you can get something, like, Israeli brand that is very similar to
    it. And that's how I made the cake. I brought it to my family. They--like, their jaw dropped. They were, like, so amazed.
    They never saw something like that. Fondant and sugar and, you know, working with the sugar paste was very--pretty new
    at that time, like, eleven years ago.
- speaker: Respondent
  text: Like, it was new, and it wasn't that popular, so it was really exciting for them. And then ever since, every nephew,
    every niece, almost every sibling, parents--I, like--I had to make a cake for them. Like, it's either I felt like I had
    to, I really want to, or they came and asked me--like, a niece or nephew. "Uncle, can you make me a Cinderella cake next
    birthday?" "Sure, of course, you've got it." And, you know, throughout the years, I just got better and better and better
    and better. Even the flavors and the taste of the cake got better, and it's like, you know, through time, I'm like, "I
    can't use Betty Crocker all the time. Let's, like, do a real cake." Then I understood, like, you can actually just use
    flour and sugar and you get a cake and, yeah, I was really working on the taste because I wanted them to enjoy the cake
    inside as much as they enjoyed looking at the cake.
- speaker: Interviewer
  text: When did that shift come for you? When did you feel confident enough in your abilities to begin to consider, like,
    "Okay, it's not just about the beauty of the cake, but also, like, it's got to taste good"?
- speaker: Respondent
  text: It was really fast. I think, like, two years into the baking, I was, like, not just baking the cakes or the fondant.
    I was, like, trying out, you know, some recipes here and there. I was suddenly, like, making macarons in my house, which
    are, like, very hard to make at the beginning. You need, like, to do it a couple of times to get it, and yeah, I just
    wanted to get at them. Then, like, the--
- speaker: Interviewer
  text: --you caught the bug--
- speaker: Respondent
  text: --I caught the bug, but I think the--what really caught me was the challenge of it all. It's like, "Oh, you need,
    like, to really--if you can make a perfect macaron, that means you're a good baker. So it's hard. So it's difficult. That's
    a challenge. I'll take the challenge. I'll make a good macaron." Took me, like, I don't know, ten tries, I think, or twelve
    tries, but then I got a good macaron. And then I kept making more and more, and then I, I started with the next thing,
    like something else. Cheesecake or whatever. Like, I always take something and I make it a challenge for me just to figure
    out how to make it and make it well. After three years of that, I decided, "Okay, it's time to go to a class. Like, I
    think whatever I can learn from videos on YouTube or just doing it at home from books--baking books--is not enough. I
    need someone to just give me the--(Hebrew)." How do you say (Hebrew)?
- speaker: Interviewer
  text: Oh, the tools.
- speaker: Respondent
  text: The tools, yeah. "The tools to do it at home and have, like, more confidence in what I'm doing." And I went to a--
- speaker: Interviewer
  text: --and this whole time, you're working as a pharmacist, by--
- speaker: Respondent
  text: --yeah, by then I'm a pharmacist. Then I come back. By night, I'm a baker. And most of the bakes just go to my family
    or my friends. There were some people here and there who were trying to, like, interested--I can sell them stuff. I tried
    it for a little bit, but then I, I understood it's just hard work. It's too much to like be--to work in an actual work
    and then work in the kitchen to sell cakes is not something I'm interested in. Just takes too much time. It's not gratify--
- speaker: Interviewer
  text: --gratifying--
- speaker: Respondent
  text: --yeah--as, as just doing it for nephews or families because it's like--you don't celebrate it with them. It's not
    as fun to just give someone the cake and take the money. Like, I can do that at work with drugs. So I want to celebrate
    with them. I want to cut the cake. I want to eat the cake. I want to, you know, not just baking it to give it away. I'm
    baking it for myself also, not just for, you know--I don't know. That's how I always felt. And I--there's something in
    it to give it as a gift.
- speaker: Respondent
  text: Like weddings, I--my friends started asking me to make them a wedding cake. Oh, how I love wedding cakes, oh my God.
    It is so much fun. It's--they're so tall and such a big project and--wedding cakes, they really--something you can--buy
    me? Wedding cakes. Let me make you a wedding cake. I even convinced two friends of mine to get married so I could make
    them--a wedding cake.
- speaker: Interviewer
  text: Did you? Amazing.
- speaker: Respondent
  text: Yeah, it's, like--one of them wasn't sure yet. The other was, like, ready. And then I told the other who wasn't sure,
    "Listen, if you get married, I'll make you the wedding cake." And he's like, "Oh, that changes things."
- speaker: Interviewer
  text: And so they're--
- speaker: Respondent
  text: --and now they're getting married--
- speaker: Interviewer
  text: --oh, so it's coming?
- speaker: Respondent
  text: It's coming. It might be next year.
- speaker: Interviewer
  text: I'll look for that on the blog.
- speaker: Interviewer
  text: When was--when did you do your first wedding cake?
- speaker: Respondent
  text: My first wedding cake was for a friend of mine that was actually a neighbor. She lived downstairs and we became friends,
    and she got married, and she just asked me for a wedding cake. I did, like, the silliest cake because I was still new.
    That was even before I started pastry class. I made her a, a, a double-tiered chocolate cake, white, with, like, black
    stripes, and then on top, I put two penguins, a bride and a groom, but in penguin form. Why? I don't know. I just thought
    them to be cute and I made them the penguins without them knowing.
- speaker: Interviewer
  text: Did you make them also from fondant?
- speaker: Respondent
  text: From fondant.
- speaker: Respondent
  text: I came to the--you know, to the wedding, presented the cake, and she's like, "Oh my God, that's amazing. But why penguins?
    Is it because of Jerusalem or like Haredi?" I was like, "No, that wasn't even my thought. But sure." Yeah, it was funny.
    I don't know why. But then I made another one for good friends of ours, Tia and Mar. They live here. They got actually
    married really close by in the old--in Old Jaffa--
- speaker: Interviewer
  text: --oh, nice--
- speaker: Respondent
  text: --and they really like pistachios, so I made them a chocolate pistachio cake. Yeah, it was good, and it was three-tiered
    this time. I, you know--
- speaker: Interviewer
  text: --you're upping the ante--
- speaker: Respondent
  text: --yep. And they wanted a cake that will silhouette and their, like, story, like, so I did, like, them in a silhouette
    holding each other, and then around the cake, there was, like, places of Jerusalem, like Dome of the Rock or where they
    met, the (Hebrew), the old mill. It was so pretty. I really loved it, and--
- speaker: Interviewer
  text: --and these are all on the blog or not on the blog? Just--
- speaker: Respondent
  text: --well, some of them are on my Instagram.
- speaker: Respondent
  text: On the blog, I put the recipes I work. The blog came really afterwards.
- speaker: Interviewer
  text: Yeah, yeah. That's why I was asking.
- speaker: Respondent
  text: That's all before the blog.
- speaker: Respondent
  text: I think it's what led to it eventually. But that was just, you know, starting up, just making food and making cakes
    and trying it out and, you know, just enjoying it. It was a cake actually that we couldn't cut because it was a kosher
    place and they couldn't have the cake inside and cut it. They just presented it, and then we cut it at home afterwards.
- speaker: Interviewer
  text: Right, because for students, there's complicated rules around what constitutes a kosher cake, and it's--even if all
    the ingredients are fine, if you make it in a kitchen that is not--
- speaker: Interviewer
  text: --kosher, then by definition--
- speaker: Respondent
  text: --by a man who is not, you know--I'm not Jewish, so it's also a problem because I can't turn on an oven if I want
    it to be kosher. Let's say the kitchen is kosher and I need to make a cake--I need to make something. I need a Jew to
    turn on the oven or the flame for me.
