collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, Zach, tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: So, a little bit about myself. I'm actually a student as well, not in the medical field, but in the cyber field. But
    I've been working at the hospital- I worked at the hospital last summer and also this summer as an entrance screener or
    temperature screener for COVID.
- speaker: Interviewer
  text: Tell me a little bit about your school. I don't know you're in school right now?
- speaker: Respondent
  text: 'Yeah, I go to Central Washington University, and I study in it''s called ITAM: Information Technology Administrative
    Management. And then I guess my majors are cyber security and administrative management. And then I also just got my minor
    in digital forensics and incident response so, it''s kind of a long list, but yeah.'
- speaker: Interviewer
  text: How has been balancing school and then coming and working in the summer with COVID? What does all that look like for
    you?
- speaker: Respondent
  text: It was kind of interesting at first trying to get, you know, get used to -I think any job- but getting used to everything
    was online so, you know, no in-person. So, when I first started, I was finishing up my classes, like during any free time
    I could. So, It was interesting, to say the least, but I made it work. I made it work.
- speaker: Interviewer
  text: Were there any major challenges with that?
- speaker: Respondent
  text: Sometimes time constraints. But actually, it was kind of helpful to me at first. There was a couple of us students
    who were finishing up last year and I remember when it would get slow, we would all like pull out our laptops and finish
    our essays or whatever. So, it was kind of a benefit, actually.
- speaker: Interviewer
  text: And then tell me a little bit more about your experience say, you know, checking people's temperatures first when
    COVID first started and now that COVID has been around for about a year.
- speaker: Respondent
  text: It's kind of changed, but not really. I mean, it's still, you know, fairly the same. But I'm noticing that it's a
    lot less of- when it first started it was more like there's different symptoms for COVID and we would have to go through
    and ask each individual one because people didn't know. Well, as time went on, they began to know more and more, especially
    as a lot of them are, you know, repeat visitors, I guess you could say. But it was something that we had to ask each and
    list them off and it frustrates some of them but, you know, they understood it's something we had to do. And now it's
    something that like they have signs up now that say that the symptoms so, we don't really have to like- people know it
    more. We still sometimes will ask it like if they say, Well, I have this or like this is going on. But other than that,
    it's not so- it's still in depth but not quite as lengthy.
- speaker: Interviewer
  text: Yeah, I feel like our world has gotten comfortable with the COVID language in a way.
- speaker: Respondent
  text: Yeah, definitely.
- speaker: Interviewer
  text: Do you remember the first activity or event you participated in, or that changed as a result of the pandemic?
- speaker: Respondent
  text: School mainly- that's not really hospital related. But yeah, that was the one thing that definitely changed. A lot
    of the restaurants shut down like all over campus or if they didn't shut down there was a limit and they'd only let certain
    people in. And then the gym and started slowly going down and then professors, No we don't want students in my class.
    They just kind of slowly transitioned into like shutting down or going online.
- speaker: Interviewer
  text: Okay. Yeah. I can relate to that. Definitely!
- speaker: Interviewer
  text: Yeah, do you have any stories or moments that you've shared with patients that have been meaningful during the pandemic?
- speaker: Respondent
  text: I can't think of anything that I've shared, like stories that I've shared with patients. I've had talks with patients
    that were- I don't quite remember what was said, but I remember there was always- he still comes in. There's a guy- he
    comes in like two or three times a week to some- not physical therapy, I think pulmonary or something- always comes in.
    He's always really nice to talk to and that's just, every time I see him, it's always something new. I don't remember
    what the stories are, but there was always something with them.
- speaker: Interviewer
  text: Yeah, sounds like a good interaction that you have multiple times a week.
- speaker: Interviewer
  text: Yeah. Has anything frightened you or unsettled you about working at the hospital during the pandemic?
- speaker: Respondent
  text: Not really, no. I think working at the hospital, it's even though it is or what some people think to be like a magnet
    for it, because I know if you're sick, you go to the hospital. I think that this hospital, maybe every hospital, has done
    a really good job of keeping everything and everyone, you know, protected and safe from the virus. So.
- speaker: Interviewer
  text: Yeah. And I guess to follow up on that, you know, I've chatted with a lot of people that have different opinions about
    the level of support that they've received from the hospital. I'm curious whether you could speak to whether or not you
    felt supported and maybe examples that you could point to?
- speaker: Respondent
  text: Supported in like?
- speaker: Interviewer
  text: Like safety, flexibility, maybe.
- speaker: Respondent
  text: Yeah. I think, you know, our manager has been, you know, she's really nice. Well I've only had one- I guess they've
    had multiple since I've kind of been gone partway through- but she's always really flexible and, making sure everyone
    feels safe and comfortable in their work environment. So, I don't know. That's at least for my department, I guess. But
    I feel safe.
- speaker: Interviewer
  text: Okay. We talk a lot about today in our world self-care. I'm curious what that looks like for you and if that's changed
    over the pandemic.
- speaker: Respondent
  text: A little bit. I guess self-care would be like -I don't know- I go to the gym. I consider that to be self-care. Yeah,
    it changed a lot because obviously, you know, it was nothing. You didn't have to wear masks or anything. Obviously, you
    still had to wipe your machine down when you're done with them. But now as it changed or, at least at Central, they started
    in the fall. They moved like-they spread everything out as much as they could. A lot of the- like they have an indoor
    track and they moved a lot of the machines all over the track, spread them out. Everyone had to wear masks and- you couldn't-
    there was- you were limited to how many people were in a certain spot. So, and then as COVID went on, things started slowly
    going back to normal. And now, from what I remember, it's almost back to normal, but it was a weird transition because
    it definitely hit pretty solid.
- speaker: Interviewer
  text: Yeah. Yeah, it sounds like it. Has the pandemic affected your social life both while you were in college and at home?
- speaker: Respondent
  text: Yes. Yeah. In the sense that at college everything really shut down. So, people were still meeting up, but it wasn't
    in the same way. Like there would still be a lot- I say a lot of people, but not nearly as many as what maybe would have
    normally been there. But actually, at home, because I'm in a smaller town area- I don't really- there's a few people I
    still keep in touch with here, but not really. So, working at the hospital actually, kind of, I was able to meet more
    people, I guess in that sense. Like the guy that I mentioned who always comes in every week, like I met him. Like it was
    someone that I always like, kind of like a friend, I guess. So, in that sense, it actually, kind of, like helped me meet
    new people, which is kind of cool.
- speaker: Interviewer
  text: Yeah, that is really cool. It kind of sounds like-in a weird way- the pandemic kind of gave you a social life.
- speaker: Respondent
  text: In weird way, yeah.
- speaker: Interviewer
  text: Yeah. That's really unique. Wow. All right and then has COVID affect you or your family personally?
- speaker: Respondent
  text: Not me or my family, no. Or at least not like- no one in my family got, like, infected with it, if that makes- if
    that's what you're going for. My mom used to work at the hospital; my dad's a medic so, they were obviously affected by
    it in their own ways with whatever policies they had to do. But- other than- Oh! And I guess I, you know- obviously I
    couldn't like my family-they kind of-some of them were okay with seeing each other. Others, like I just saw my aunt and
    uncle for the first time in over a year-and-a-half, like a couple of weeks ago. So, there was you know, that part of the
    family that kind of closed themselves off, but it's slowly coming back around, so that's nice.
- speaker: Interviewer
  text: Yeah, definitely. I agree with you.
- speaker: Interviewer
  text: What do you think the biggest impact of the pandemic will be for you personally in a long-term sense five to ten years
    from now?
- speaker: Respondent
  text: I think the biggest impact it will have for me is just being more conscious of not necessarily just my health, but
    the health of others. Even though I'm not going into the medical field, it's still something that I think will stick with
    me. Like even now, it wasn't necessarily something that bothered me like last year when I was first starting but- and
    I still try not to let it bother me- but when people cough, for example. Like it could just be, you know, they just they
    breathe funny or just something or just anything else. It's something that-it's in the back of my mind, like, it's probably
    not, but I don't know. So, I feeling that'll stick with me for a while, but I don't know.
- speaker: Interviewer
  text: Yeah, I definitely get that too. Yeah. If, if you had to describe your last year in three words, what three words
    would you use and why? And you can take some time to think about that; that's kind of a big question.
- speaker: Respondent
  text: Yeah, three words. Interesting. I don't know I can only think of that one. I don't know. Is it okay if I just have
    one?
- speaker: Interviewer
  text: Yeah. No, that's totally fine.
- speaker: Respondent
  text: I can only just think of interesting.
- speaker: Interviewer
  text: Can you tell me more about that?
- speaker: Respondent
  text: Yeah. Yeah, I think it was just interesting in that- change; another one. Perfect!- It was interesting in that everything
    changed just like that. Yeah, it was- no, not really- I was going to say something could be a third one but no. It was
    just, I think it was interesting in that everything changed immediately.
- speaker: Interviewer
  text: Yeah. Yeah, I completely agree with that. Just like all of a sudden-
- speaker: Interviewer
  text: Is there a particular image that comes to mind when you think about how COVID-19 has affected you over the past year?
- speaker: Respondent
  text: I just think- kind of like when like when people cough. I think because, at least in more of the stores, I think even
    here now, you don't have to wear a mask in if you don't want to; if you're vaccinated. It's only if you're unvaccinated
    they it recommend. So, I've started doing that and even then, I go in like, Is this okay?- type thing. Am I going to get
    kicked out? Or even when I see other people as, Oh, wait. They don't have their masks on! It's okay that they don't have
    their masks. Or if like kind of I didn't, it was really something I thought about when it all started. But like if someone's
    like, kind of like too close to me, it's like, oh, well, you back up a bit, but it's like, Oh, wait, no, it's fine. So
    it's like, I don't know, just kind of. I don't know. It's just an extra step to think about now for me.
- speaker: Interviewer
  text: Yeah. Yeah. Do you think things will ever go back to normal, or do you think that's your new normal?
- speaker: Respondent
  text: I don't think things will go back to normal. I mean, I don't know. We'll see. But I still think that all the, kind
    of thinking about that- at least for another year. I can definitely see myself thinking that if things continue on as
    they are now.
- speaker: Interviewer
  text: Yeah. Yeah. Do you continue to wear masks in grocery stores or?
- speaker: Respondent
  text: It depends. Typically, no. But I always look for if- I always look for if a lot of people, are going in that have
    masks, I take that as a sign. Or I always bring one with me and then a lot of those stores I go to they have like the
    signs that say, If you're vaccinated, it's not required. So, I always look for that and I'm like, okay, I should be fine.
    But I always double-checked before I go in.
- speaker: Interviewer
  text: Yeah, I kind of feel similar to you. Yeah and kind of an interesting question, do you consider yourself a health care
    worker? And if so, do you think health care workers- a lot of people have called health care workers heroes for their
    work during the pandemic- do you feel comfortable with people referring to you as a hero?
- speaker: Respondent
  text: I see it as, personally, I think more of the hero part of it is the people who are actually like in the ERs or the
    ICU or like that area. I think those are the like the true heroes. But it doesn't bother me - a lot of
