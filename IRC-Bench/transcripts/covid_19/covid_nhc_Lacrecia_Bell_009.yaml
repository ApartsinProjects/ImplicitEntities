collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you start by telling me your name and your job title?
- speaker: Respondent
  text: Sure. My name is Lacrecia Bell, and I'm a clinical nurse educator for the Duke University School of Nursing, where
    I facilitate learning experiences in the didactic, the clinical and the lab setting for primarily ABSN learners and sometimes
    master's students.
- speaker: Interviewer
  text: What brings you to this project? Why did you volunteer to be interviewed?
- speaker: Respondent
  text: Wow. What brings me to this project? This is emotional work and today is a really heavy, heavy day. At the beginning
    of the COVID-19 pandemic, there was also this uptick in the presence of racial violence. So, as a Black woman, this the
    work that we're doing to chronicle the stories and experiences are so important. I think we've all chronicled them or
    journaled them in our own way. So, to be able to do this publicly and to have record of it, I think is really important.
    So, I'm here because I believe that stories matter and diverse stories matter, and hopefully we'll be able to share this
    content with others, maybe have insights on just reflections about this time in our lives and in our worlds.
- speaker: Interviewer
  text: Absolutely. So happy to have you here. So, can you walk me through a typical day at work for you in the last few weeks?
- speaker: Respondent
  text: So, in the last few weeks, again, I primarily teach students in the clinical setting and in the lab setting. So, I
    have a group of students that I take to a clinical site on Tuesdays and facilitate those learning experiences. So, in
    the last few weeks, I've been present in the lab. So, at the School of Nursing, we've been in the lab teaching content
    there. I've also been in the clinical setting with students, helping them take care of patients in that setting. I've
    been online teaching some of my students online. So, those are primarily the things that I've been doing with work. My
    husband is a new nurse practitioner, so we've had a lot of conversations around what he's been doing as well and how things
    have been changing. I would say that I'm very happy to see that the vaccine is more widely available and that people are
    receiving the vaccine and becoming vaccinated and that the numbers of deaths are going down. So, that is it's fantastic
    to see.
- speaker: Interviewer
  text: 'What did - so, question is: are you vaccinated and what did getting vaccinated mean to you?'
- speaker: Respondent
  text: Wow. I am vaccinated and my husband was vaccinated first, so he kind of spurred me on. I think I had knowledge about
    the vaccine. I was still very skeptical about the vaccine. I used to work for pharma, and I know that there hasn't always
    been transparency in terms of the things that have happened and that they are such huge monetary gain and huge disparity
    in certain areas. So, I really thought deeply about, you know, the rapid work of developing the vaccine and the level
    of efficacy. I also thought about do we know the side effects? What is our knowledge, what kind of trials have been done?
    And we already know that there's a disparity in terms of clinical trials with people of color. So, I thought as a Black
    woman, Have there been trials of people of color? Is there anything that we need to know that I need to know to protect
    myself, to be safe? So, I thought really deeply about that but then I decided, knowing what we know about risk factor
    and what we know about those that are stratified and categories that don't do well with COVID-19, I thought, I'm a Black
    woman and I don't want to be on a ventilator and I don't want to die because of this virus. And I don't want other people
    to die because I'm not vaccinated. So, I made the decision to be vaccinated. I went with the science and believed the
    science, even though there was apprehension. And I think it's okay to say that there's apprehension with how swift everything's
    rolled out with the virus and the vaccine. But yes, I am vaccinated. That was a joyous occasion. All of the memorable
    posts happened. We had, two of our sons, were had COVID-19. One of them is a trainer, a physical trainer, and by the time
    he told us about our symptoms, he was on the tail end of COVID-19 in February. So, he just thought that he had eaten some
    bad ice cream and just happened to mention that his taste of smell and taste - sense of taste and smell - were gone. So,
    we had him get a test and he was COVID-19 positive and he recovered well. We had another son that traveled and he went
    to Pennsylvania, to Philadelphia, and he also had COVID-19 and recovered well. So, I said, Wow, you know, we have two
    members of our family that were positive for COVID and recovered. Yes, we need to get vaccinated. So, my husband is vaccinated,
    I'm vaccinated, and last week my 18-year-old found a place and she decided to get herself vaccinated alone. So, we are
    yes, we're vaccinated and it is joyous and I'm glad to be the numbers of people who believe in the science and want the
    health of our world to be better.
- speaker: Interviewer
  text: I'm so glad you were able to get vaccinated. That's wonderful. And so, is your daughter, especially. I know you all
    are healthcare workers so a little bit easier, but so glad all of you were able to.
- speaker: Interviewer
  text: So, you mentioned that your sons had had COVID. What was that experience like for you at that time, kind of finding
    that out?
- speaker: Respondent
  text: Yeah. So, really difficult. There was a lot of fear. When COVID-19 first came and we had knowledge of it, my daughters
    and I went to New York City in February of 2020 because we were traveling to see NYU. That was my daughter's dream school
    and we were going on a tour to see NYU. So, we traveled there and we came back and we had heard vaguely about a virus
    that was present in China and people were ill. And, you know, we had heard about Ebola had been present before and there
    were other viruses and we just we had no idea that it was going to be a global pandemic. So, we came back and we realized
    what we were in for. So, my son, who's a 19-year-old college student, he and I would watch the ticker tape on CNN every
    day. And we had, we were doing our epidemiologist estimates and we were at home epidemiologists, you know, deciding what
    the numbers would be and how long and when the vaccine would come and every day we had a conversation about that. So,
    that was, that was challenging. So, when our oldest son, who lives in Florida, let us know the symptoms that he was having,
    you know, my husband was in the thick of it and he was caring for patients in ICU that were very, very sick. And, you
    know, patients were getting proned and ECMO was happening. So, many things were happening for that population. So, he
    told our son very swiftly, Go get tested, don't delay, you know, make sure that you're taking care of yourself. So, we
    were on edge. The thing that was the advantage for him was that he was healthy and really didn't have preexisting conditions
    and has been a weight trainer for years. So, really knew how to take care of himself. His nutrition was intact. That was
    great. Our 24-year-old that had COVID, he too was in great condition and had been relatively healthy. So, when we found
    out about him, he was on the tail end of COVID and by the time he told us he was ready to go back to work and we were
    telling him, No, you don't need to go back, yet. So, making sure that our children knew the guidelines about fever and
    monitoring symptoms and staying safe. So, we were on edge. But we were very thankful that in terms of risk stratification
    and sequelae of events that would be bad for them, that they were in a healthy category. So, we were very thankful. We
    just wanted to make sure that even in their health and dealing with COVID, that they did not then spread it to other people
    who may not be as healthy. So, making sure they took a lot of precautions.
- speaker: Interviewer
  text: Yeah, I'm glad that it sounds like that their course was on the milder side. Fortunately.
- speaker: Respondent
  text: It definitely was on the milder side. Some GI symptoms and loss of taste and smell, but they recovered pretty rapidly.
    And, you know, we know that we don't still yet understand the long-term side effects of COVID. So, I'm very thankful that
    in this moment that they don't have any to date and they haven't reported any, but we still don't know. So, we still want
    them to continue to be safe.
- speaker: Interviewer
  text: 'Another question: what did a day at work look like for you before COVID? Or a typical day for you look like before
    COVID?'
- speaker: Respondent
  text: So, a typical day when I was in the clinical setting, definitely caring for patients, lots of collegial conversation
    with colleagues, with students. There was nothing to have an opportunity to share a potluck, to bring food into the unit,
    to be able to share in someone's arrival of new baby or going to a new job or just celebrating the day, a day of hard
    work. Lots of get togethers with colleagues. When there were patients and family members that were ill or living the end
    of their life, you could hug them and you could emotionally and physically express concern. So, touch was something that
    was present. I thought about just facial expressions. You could see people's facial expressions. You could see their smile.
    You could, you could read your lips when they were relaying information to us. All of those things were present. There
    was a sense of community. We kind of rallied around one another, and I don't think we really understood the value of that
    when COVID came. So, a typical day was filled with joy, filled with hard work, anticipation of at the end of the difficult
    day or the long days of being able to get together with colleagues and to share time and space with them and physical
    touch, whether it was a hug or a handshake or a hand on a shoulder, whatever that was. I think that was something that
    is very vital and important, especially in this profession when we are caring for humans in their most vulnerable times
    and we're rallying around other colleagues that are doing the same. So, in this profession, that human touch is so important
    in various ways, and that definitely was curtailed with COVID.
- speaker: Interviewer
  text: Can you speak to how your relationships with colleagues then changed over COVID, whether that was in both positive
    and less positive ways and close and more distant ways?
- speaker: Respondent
  text: Yeah. When the pandemic was first present again that there was this uptick racial violence. So, there were two pandemics
    that were happening. And I experienced them in a way that I know to experienced them as a Black woman. So, with five Black
    sons. So, with the murder of George Floyd, it's not ironic, but interesting that we're speaking today on the day of Derek
    Chauvin's trial today. So, today's been a really challenging and difficult day. But I think those simultaneous things,
    those simultaneous pandemics happening are really challenging. And so, it's difficult to tease out where the pressure
    was if the pressure in terms of relationships was really around this uptick in racial violence that was happening, or
    the pressure was around COVID-19 and the fears that existed. So, there were fears. There were all kinds of emotions in
    terms of what was happening in our world and how we were responding. And I think, you know, there was a sense of chaos.
    So, when the pandemic came, there wasn't a very clear directive, I think we, the CDC attempted. I think in terms of leadership,
    that there could have been some more opportunities for our country, our nation, to be better informed and to have clearer
    directives around safety and health. And so, that didn't happen. So, there was a real hubbub of fear. I remember with
    colleagues definitely not wanting to be around them. I didn't want them to get sick because of me. I was still learning
    the signs and symptoms of COVID and they were being expressed, as we kind of know. So, they were evolving and unfolding.
    So, as time went on, we became we began to know more. There were colleagues that I would walk with, a colleague in particular.
    We would hike on Saturdays, and that stopped happening. We were in a physical space in the building, at the School of
    Nursing. Sometimes we would get together in offices. There was a new directive about how many people could be in the office,
    that you weren't going to the office, and so many things were changing in terms of the work environment in the hospital,
    especially, you know, new directive about when to wear a mask. And, you know, if you were cleaning your groceries when
    they came in the door, if you were wearing one pair of shoes, if you were quarantining yourself. There were so many various
    directives in terms of how to care for yourself and to keep yourself and others well. So, definitely lots of distance
    with colleagues and just checking in to make sure that people were emotionally okay. You know, when people were not physically
    ill. There was definitely an emotional toll with the dual-duality of the pandemics that were happening. So, lots of check-ins.
- speaker: Interviewer
  text: A lot of people have called health care workers heroes for their work during the pandemic. Do you have any opinions
    or feelings about that phrase? Do you feel comfortable with people referring to you as a hero? What are your thoughts
    on that?
- speaker: Respondent
  text: Hmm. When the public refers to health care workers as heroes, I sort of hear and don't hear it. I've been immersed
