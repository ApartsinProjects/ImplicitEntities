collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Could you just start by introducing yourself to anyone who might find themselves listening? What would you want them
    to know about you?
- speaker: Respondent
  text: Well, let's see, I, I love working in the service of other people. Many of the things that I do currently are really
    just about how can I help someone thrive in the role that they're in? Part of my title is to mentor, so it's a natural,
    a natural thing that happens often. But it is something that I find great joy in and desire to continue to do, so yeah.
- speaker: Interviewer
  text: When you say a part of your role title is, as mentor, could you give me some context around that?
- speaker: Respondent
  text: Yeah, so my title with our organization, We Dignify, is Campus Mentor. Um, and so what we do is we, we mentor students
    in leadership skills for small groups on campus. We, we are a pro-life nonprofit, at the University of Illinois Urbana-Champaign
    currently. So when we're doing that, I meet with students one on one every week; I do it via Zoom, as you know, through
    this recording, but I live in California. So I do it through Zoom, but I do, I do go out to campus, once a month or once
    every other month, and so I do get some of that in person time. My, my specific role and how I came to be here is very,
    it's unique, but the mentor role itself is not unique. I'm not the only mentor on our team; I'm just the only mentor that
    does not live in Illinois. But yeah, so what that looks like is me meeting with my students once a week, and we work on
    specific things, specific skills, specific qualities, that supports what their role is. And so all of the students that
    I meet with are leaders in some capacity, so they're leading a group into, in education, or they're leading a group into
    taking action. And so what we focus on every week is usually tied to what are you doing with your group. So let's say
    if we're teaching a lesson, or we're trying to guide a discussion this particular week on "so why are you here? Why are
    you interested? Why do you want to learn about what being pro-life means or what that entails?" Then our mentoring, discussion
    or meeting will, will be related to that topic, if that makes sense. So it very much pairs with if you're leading a group
    in a specific way, then I'm going to be talking with you and help guiding you to do that the best to, the best of your
    ability, right? So, yeah.
- speaker: Interviewer
  text: Tell me a memorable story about your life during the pandemic.
- speaker: Respondent
  text: A memorable story.... So I feel like there are probably a couple, but the first thing that came to mind... So as you
    can imagine, so again, my situation is very unique in that I'm the only one that does not live in Illinois, but everybody
    else does, and typically when people are meeting with their students, you're meeting with them in the same office, in
    person, you're encountering people in the same space all the time, and it's beautiful, and it builds community that way.
    Pandemic changed that obviously, because, oh, okay, we're, we're now all meeting on Zoom or Google Meet or you know, whichever
    platform anyone was using. And so in the summertime, we have a leadership training, so we prepare our leaders for the
    upcoming school year, and that's always in person, so I'm usually flying into Illinois for that, but one of the summers,
    and I can't remember exactly if it was, it was probably 2021. My boss had an idea, he was like, well, okay, so six feet
    a part, so how do we do this? We're going to like, arrange the room so that each student is at one table, and these are
    like kind of those long rectangular tables that are typically like in conference rooms if you're doing like a classroom
    style setup. So normally, you'd have maybe three students there, but we only put one, so he said, okay, like that provides
    some and then there'll be an island between, but then when we're walking around, we're going to give each student a pool
    noodle, because a pool noodle is about six feet, so if we're going to try to make sure people are standing six feet a
    part, so as you know, to keep everybody you know, safe and protected, in addition to wearing our masks, we're gonna carry
    pool noodles. And so, you know, we just had a group of, I want to say we had like 12 students in a very large room that
    normally fits like 200 people. We had 12 students and each person had their own little like, corner or table to be at,
    and then, but as we were walking around, we would, we had these pool noodles with us. And it, it just looks so funny,
    because it's usually like business, like professional the attire, so you're usually not carrying a pool noodle if you
    are wearing that attire, but it was, it was hilarious. But also, I mean, I think it was just a very clever and innovative
    way of using pool noodles. My boss has three young children, and so I don't know, I think it, maybe that was just why
    like, normally in summers, you know, you take, you take your kids to the pool, or you put them in like your little pool
    in the backyard, and maybe that's why he thought of it. But I just thought it was a really good way to use that, and so
    there's a clear measurement of this is how far I need to be from someone else, so it's not, and I think it's a good way
    to keep it respectful because as we know, in the pandemic, it just, there are varying, varying opinions on everything
    on how we should be, what we should do, what we should be told to do or not hold to do, and if you're trying to guesstimate
    like, well, you're supposed to be this far from me, look, you're not this far from me. But if you just have a clear like,
    okay, we're gonna, we're going to level set guys like, this is how we're going to respect each other, and this time, in
    multitudes of ways, but one of them is we're going to keep our space, and it looks like this much space. And there's no
    guessing like, I don't have to guess how long this pool noodle is, I can visibly see that's how long it is, you know?
    So that was pretty memorable.
- speaker: Interviewer
  text: How did you, how did you come up with that as an implementation strategy?
- speaker: Respondent
  text: The pool noodle? That was my boss; it was definitely not me. He's, he's got some... he's our visionary, and he's got
    very creative ideas, but we were just really trying to think through, it was important to us to still have something.
    And I think that was very key for us throughout the pandemic, was, we want to make sure that our students, should they
    want to participate, because it's never forced; we're never forcing anybody to be, to be part of us, to be in a leadership
    position. It's, if you want this, and if you want, if you want to learn, if you want to lead, we're here for you. But
    we had to be very creative and how we would think about that, because essentially, we are a relational ministry, which
    typically just translates to, okay, we're going to gather in person together; it's very like community. But how do we
    do that if we can't be around each other? Or how do we do that if we need to stand far apart? Or, you know, how do we
    do that respecting that there are going to be, there are going to be people who are coming from different schools of thought
    in regards to COVID but still maintain that, like, respect of what individuals' opinions are. And so that's why we really
    had to think about okay, so for if we want to bring people into one space, because we have identified that that's going
    to be a stronger, that's going to be a stronger connection point in terms of like the, the relationships between the leader
    team, then maybe just having people on Zoom, where I think it's possible, because I, I do it all the time. I think it's,
    it's possible to make connections on Zoom but knowing our students, sometimes, you know, you just you get the, well, we're
    gonna keep my camera off and they're doing something else at the same time, you know, it's just not quite as like, engaging
    and the relationship building isn't there. So how do we, how do we be creative to make it possible without having someone
    feel like they are unsafe, or they will get sick, or, you know, it's, COVID was such a very interesting time in that...
    or it was just, it felt like a lot of people were just very afraid, and I think there was reason to be. That seemed very
    reasonable. And so it was a challenge for us as a team to think about how do we bring people together so that they can
    take in the content, we can have conversations, maybe you're just talking kind of loudly across the room, but you can
    have the conversation, and you can see a real person sitting in front of you from further away, but still, like they're
    still sitting in front of you. There's just something different about that, about being in person that is just different
    than the virtual. So, yeah, we were just thinking of different ways, and like I said, I think my boss maybe in the summers,
    I know that he usually takes his, his little, his kiddos to, to the pool. He wasn't doing that necessarily during COVID.
    They were close, but I think that they just have, they have pool noodles, like in their sunroom or in their backyard,
    or I don't know, maybe he was just thinking like, this could be an easy way so people know, this is about how far away
    I should probably stand from someone, and this, this is our, this is what we're going to do. This is the structure we're
    going to put in place to make sure we're respecting everyone's boundaries while still focusing on we're not gonna get
    like, we're not gonna get tripped up over how far do I need to be from somebody? How, am I too close? You know, and sometimes
    like those can be barriers, right? Like, if you're trying to just have a simple conversation, but you're too worried about
    where do I stand? And you can't, it's hard to have a conversation if I'm like, looking at my feet. Okay, like, am I too...
    should I, should I be closer to you? Should I be farther from you? You know what I mean? And so we wanted to just get
    those out of the way of like, here's a clear way we can define this so that we don't have to worry about where are you
    going to sit? Where are you going to stand? How close can you be to someone? How far do you need to be from someone in
    order to main safe distances so that that doesn't distract from the main reason why we were there which was, what are
    our goals this year? How are we going to lead other students? How are we going to lead other people? And how can we, how
    can we come together as a team, a leadership team? And how can we have these conversations, you know. How can we learn?
    How can we take in this information? Because sometimes the little things like get really distracting. And so we wanted
    to be able to optimize the situation for our students to be able to take all that in and to participate fully, without
    being in that fear of like, ooh, I don't want to be too close to this person right now because, because COVID is a really
    scary thing, and certainly there were students that were not able to come because there was a lot of concern with like,
    COVID. So that, that happened, you know, but for those who are willing and those who are wanting, we wanted to be able
    to create that safe space.
