source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Could you tell us a little bit more about your roles at Duke?
- speaker: Respondent
  text: Yes. So, I am a clinician educator and so my roles include being associate program director, which involves working
    with trainees who have opted to specialize and become future emergency physicians. And then I'm also the undergraduate
    education director for Marie Smith and working with medical students, including those that want to go into emergency medicine,
    but also those that just want to experience the ED, developing the clinical skills, understanding what it's like to provide
    patient care in that setting.
- speaker: Interviewer
  text: I was wondering why, what motivated you to get interviewed today?
- speaker: Respondent
  text: I wanted to be interviewed today because I want to make sure, provide a voice to what has happened over the last year,
    and it's going to mean different things for different people but to be able to capture what happened in emergency medicine
    and the challenges we faced and also the heroism and endurance and the spirit of our specialty and what allowed us to
    endure through it. But it's a fascinating time. I think it's a once in a lifetime experience and I want to make sure,
    at least through my experience, being able to share with others what happened and what it involves and what it felt like.
- speaker: Interviewer
  text: I want to kind of get a sense of what your day is looked like at various points, so I'll start with what is your day
    look like in the past, you know, a couple of weeks at work?
- speaker: Respondent
  text: In the last couple of weeks, the- what I want to share - I want to provide a historical chronology of what things
    have been like. I think in this pandemic, the experience in the ED kind of went through phases and the first phase was
    kind of the unknown phase. It's where we had just started coming across this unfamiliar foe. And the analogy I would draw
    is that imagine playing a game and you're reading the playbook at the same time, trying to figure out the rules of the
    game and how things work while you're actively playing it. We didn't have any testing. We weren't exactly familiar how
    to make confirmed diagnoses or how to separate it from the flu or other febrile illnesses. And so, it was like a time
    of uncertainty, and every day was different. We'd have new protocols, new isolation measures, new protocols of who you
    screen or not. And so, that was one of the more challenging cognitive times there where there was just so much that was
    unknown. What was interesting is in spring of 2020, last year, I think there was also like a lot of concern and fear about
    coming to ED and so our patient volumes dropped. We were worried about our patients because where did all the ones who
    were sick and needed care go? It was a bit of a mystery to us but it did allow at least a decompression in our volume
    to catch up a little bit or to have a little bit more space to try to think, to prepare and also just to kind of preserve
    our energy. So, that was phase one. Phase two, where I think there was a pivot was when we had point-of-care testing where
    rather than trying to do a lot of guesswork of who had the illness and who didn't, having to keep people in the ED stay
    homeless because we weren't sure. We had to wait 48 hours until their test came back for COVID. Now we can at least have
    a little bit more of the of the known of at least being able to detect with certain reliability of yes, this is COVID,
    this is not and taking some of that guesswork out. But there's still the complexity that COVID added was pretty, to the
    system, was a lot. Just wearing a mask every day. Having to don and doff in PPE every day adds a lot to the physical fatigue
    of the job. Bed situations were more complicated because their COVID specific and some beds that couldn't be COVID. So,
    there was still a lot of moving parts, but at least we could diagnose in the ED and deal with that. And now I think the
    third phase that we're kind of in now is the vaccination era, where now as care providers, we feel fortunate that we have
    a sense of immunity or at least some protection. It's not that we can let our guard down. We still have to be careful
    and this is still an evolving target. But I think it did add some emotional ease because we did have several providers
    who got sick and were out of work and who had symptoms all recovered okay. But I know being on the frontlines, I got a
    lot emotional charge. So, my day right now, here we are in March 2021. In some ways, as far as like what I am seeing here
    in North Carolina is clinically, predominantly what it was like pre-COVID for the most part, it feels like I am seeing
    patients with cancer, having complications, cardiovascular disease that is dominating most of what I'm seeing clinically.
    COVID is still there. It is still affecting the system, the way we dress, the way we have to, you know, within the hospital,
    things are still partitioned with COVID/non-COVID, so there's still that complexity. But as far as clinical with the type
    of clinical care, most of it is non-COVID at the at this time.
- speaker: Interviewer
  text: To go back to the first phase, are there any stories that you can think of that come to mind of times when that confusion
    and that frustration of the unknown was especially impactful and memorable?
- speaker: Respondent
  text: Yeah, there are two cases. There are two cases in that first phase before we had any testing that or just we're dealing
    with an unknown entity, unfamiliar foe that stand out. I remember when someone came to the ED who this person had known
    COVID and they were there now because they were short of breath. And I remember thinking myself, I don't know what that
    means. I don't know if they're about to go into this, fall off this precipitous cliff. And this is a sign of impending
    doom. Or is this just normal? And I just didn't have that knowledge yet. And so, I was working in the triage area where
    we're trying to decide where someone goes. And we also at that time had a tent where we're trying to take care of people
    who had COVID without bringing them into the main ED. And I just felt like I have to bring him in. Like I just I felt
    like I can't do this virtually through an iPad. This person needs to be seen and I can tell, like, there was a little
    nervousness at the time about bringing someone with COVID in the ED back at the original time, but that was the right
    thing to do. And they ended up being fine it was only afterwards that I kind of had to study and learn that, you know,
    unlike flu or other illnesses where you kind of become short of breath early on in the course, one of the clinical defining
    features of COVID in most patients on average was the shortness of breath that occurred five, seven days into the illness.
    There was a temporal separation between the on set of symptoms and on set of shortness of breath. And so, it's so interesting,
    like having just at that time, not knowing that and just feeling like what it was like to just not have that knowledge.
    Nothing I had learned, this is not something I learned in medical, this is not something I've learned in residency. This
    is something I was learning now. And so, it was very, I read a lot as much as I could for my program. I tried to take
    on some responsibility of trying to consolidate and gather information as it was unfolding, written in the day and providing
    it back. But I just remember that I felt like I had so much to learn. I remember early on before it had really come to
    the North Carolina area and it hit Seattle and in New York and Louisiana. I was so grateful for our national organizations
    to put on national conferences where I could at least hear and learn from these other ER physicians who had already experience
    at the front lines and knew. They talked about at some point you could just make the diagnosis. You would just know. You
    would just see it because it had a certain look. It had certain lab findings. And so, I was just trying to soak up this
    knowledge and now I understand, you know what they meant and what they saw. But before you just felt like you were in
    unknown territories.
- speaker: Interviewer
  text: And then you said there was a second story as well?
- speaker: Respondent
  text: Yeah, the second story was a patient who came in. Another very memorable event was during this what I call phase one,
    where we didn't have testing, where we had to make clinical judgments of who with a fever or other symptoms had COVID
    or not, was a man who came in with a surgical emergency and under normal circumstances I just remember this is somebody
    who would go right to the EOR and this person ultimately did. But without the point-of-care testing at the time, if someone
    had COVID or not like it would change the operative setting, they'd have to set it up specially and make special arrangements.
    And so, we had to make, jointly, working with the ICU and the anesthesia kind of taking a pause in time about whether
    this person was going to go right to the EOR or did we have to set the EOR for COVID precautions? And it was making a
    guess and just stall. But that's one of the things like even this patient ended up not having COVID ultimately, but we
    didn't know that at the time. But again, that, I just remember, that added complexity to the decision making in the process
    where we didn't have testing and we didn't have our definitive algorithms and pathways. And that was just a very poignant
    moment to me of like that time where we were limited and doing our best guesses and trying to just navigate, make decisions
    based off algorithms and clinical judgment without testing was a very challenging time.
- speaker: Interviewer
  text: Would you mind clarifying why taking someone to anesthesia and EOR might be even more important than critical decision
    regarding whether or not they have COVID?
- speaker: Respondent
  text: Taking someone to the EOR or doing aerosolizing procedures are considered a high-risk event. So, during that time
    before testing, if anyone came to the ED with any kind of respiratory issue or anyone who was considered acutely ill was
    considered like a high-risk kind of situation. And then we would combine that with high-risk procedures, which include
    intubation, BiPAP nebulizers. And similarly going to EOR where you're going to intubate someone or install some airway
    device just at risk of a aerosolization and contaminating the providers and contaminating the environment. And so, those
    type of settings required providers donning special equipment PAPR. It requires dedicating rooms to COVID patients. So,
    under normal circumstances, we could treat this patient in any room, but we had to set up alternative pathways and spaces
    to manage these illnesses. And the other thing is, you know, that added complexity is there. If someone got exposed to
    the flu, you'd be out for a couple of days. If a provider came down with COVID, you could be out for weeks at least. And
    so, the burden on staffing, it was intense and where we'd have to fill for each other, but not only have you got it, but
    if you're exposed to it. And so, that was kind of another threat to being able to keep the ED functioning was keeping
    each other safe. So, that's why we were had to take extra precautions for our patients and procedures in situations that
    were high-risk of exposure.
- speaker: Interviewer
  text: Are there any times where you felt like either in those early days or once COVID testing happened where numbers may
    have been higher, that the threat to having adequate staff was really especially present?
- speaker: Respondent
  text: There were definitely times during some of the peak of the pandemic where staffing felt stressed. Where we had, especially
    at the resident level, multiple members out where we have to think strategically about how we would keep the ED staffed.
    Sometimes it meant pulling residents from electives or other experiences to help staff the ED. Sometimes it meant people
    covering for each other and pulling extra shifts with the idea they would be paid back. Sometimes it has been faculty
    doing shifts unless another provider increasing their own caseload. What was wonderful is just knowing in the background
    that other services within the hospital were understanding and willing to step in and bring residents from other specialties
    to support the ED if we needed. We never got to that. There are times where it felt close to that. And so, but fortunately,
    we made it through without having to do that.
- speaker: Interviewer
  text: Can you talk about how you handled this? It seems very emotional.
- speaker: Respondent
  text: One of the biggest things as a provider, speaking for myself, but I'm sure shared by others, was fatigue. And, again,
    I think dealing, we're already dealing in a complex system that has now been made more complex because of new protocols
    and new uncertainties and just sometimes what we call dispositions, we're supposed to be complicated. So, you have a patient
    who needs to go to a facility, but they have COVID and now they can't go and now they're waiting in your ED to wait for
    this infectious course to rise. So, there's a lot of extra burden added to it. And I know nationally there was the burden
