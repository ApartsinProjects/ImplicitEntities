collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Would you tell me a story about your life during the pandemic?
- speaker: Respondent
  text: Absolutely. Um, it was a, it was a, it was a very magical time in my life. And I guess when I say magical, I mean
    that in that moment, it was very difficult. But since then, I have learned so much from it. I think a lot of times people
    ask, Well, how did the pandemic influence your life? And for me, that's not really the case. It almost feels as if I influence
    the pandemic. Right before the pandemic, in, you know, a sort of an, I guess that was like March of 2019
- speaker: Respondent
  text: 2020. Yeah, right before that time, I was really struggling with, with self. With my experience, mainly, I was really
    trying to find my place in the world. I did not realize yet that I am a transgender woman. So I was identifying as a queer
    male. I think the biggest issue in my life was finding a sense of financial stability. I was experiencing housing insecurity.
    And, although I was experiencing housing insecurity, I was I was working, you know, this traditional nine to five desk
    jockey job, and it was, it was so hard for me. Earlier in my life, I had made several attempts to you know, do this thing
    be in the corporate world and climb the corporate ladder. And when I was younger, I had enough energy to have the ego
    to be in that environment and but throughout my 20s, it feels as if, like, it really broke me down because I, I learned
    what the world and the corporate world was really, outside of my, you know, a very young 20 something year old mind about,
    about what market mechanics are, basically. And that's when I realized the difference between like creativity and intellectualism
    and that our world tends to veer more toward intellectualism, rather than helping creatives cultivate themselves and using
    creatives in a in a way that's not very abusive. So my last job was working in Ubers corporate office, and it was just
    one of the most harrowing experiences because I, I was very confident in who I was. And I know the things I was bringing
    to the table, but I was being completely overlooked and revived. And that's sort of when everything began to crumble and
    lead me into housing insecurity. But at the same time, that fall was one of the most pivotal times in my life, I, I just,
    I what was really happening is I was learning self sufficiency, and self competent because I was choosing myself over
    what everyone else expected of me. So although I was homeless, I still, I'm still believing in myself. So it was, it was
    so wild right before March of 2020, I made this commitment, I told myself, no matter what happens, I'm going to continue
    in the path of working for myself, and, you know, whatever that may be whatever that looked like, I promised myself that
    I would never go back into the corporate realm. And so that's where I've been since March 2020. And so I always say that
    the pandemic didn't really influence me, it's like, I already knew what I was capable of. And I and I, again, I started
    to understand those market mechanics. And I understood that even without knowing exactly the pandemic was, would happen,
    I felt that some sort of shift take place where everyone starts, starts realizing that the way that we're functioning
    in society and the way we are doing things, it's not sustainable at all. I'm just like, you know, something has to change
    where, or at least for me to change. And so here we are a very, very magical thing that has happened out of all of this
    sadness and trauma, where the world is completely shifting. And now I feel like, now I feel like I'm I'm leading the herd
    instead of always feeling like I'm being trampled by it. So it's a very, it's a very magical time in my life.
- speaker: Interviewer
  text: Do you remember when you first heard about COVID-19?
- speaker: Respondent
  text: Um, oh, I will never forget it. Um you can stop me if I become too metaphysical. Geez where do I start? I, I did not
    start actually studying occultism. And I'm very structured and weighed. I guess it's been on and off for the last decade
    or so. I really didn't build a structure or a basis for it until about three or four years ago. So, before the pandemic
    took place, I would sort of do these, you know, I don't know what to call these sort of prophecies or I was, I just had
    to go, I'm using my intuition. You know, I will talk to family members. And you know, I would, I would ask them why they
    treated me in a certain way, and why I did feel a motioning emotional reciprocity from them. And so throughout the conversations,
    I asked them, Okay, what's gonna happen if this happens, and like, you know, and the world gets to a point where things
    are very chaotic and unstable, and, you know, entire society as a whole and the market shifts in a way where it can't
    work for the sort of mindset that we're in right now. And I didn't know back then that was talking about pandemic. I think
    the first time I heard of it, I was kind of just like, yeah, it was very funny. I was kind of, you know, doom scrolling
    before doom scrolling was a pain because I was already in pandemic mode myself, and everyone thought I was so weird. But
    I'm just doom scrolling and I started to hear about something some viruses going on in Asia. And my heart just told me
    I remember that at least saying to myself, that's gonna blow up in a way that we've never seen before. But I also remember
    saying it sounds so awful. I also remember a voice telling me look, you're going to be good. It's going to that it's going
    to be tragic, but you're gonna be okay. Yeah.
- speaker: Interviewer
  text: I'd love to hear more about your spiritual journey and following your intuition.
- speaker: Respondent
  text: Yeah, um, like I said, it's definitely been some work that has had been going for a little bit more than a decade
    now. A friend of mine really pushed me into it, an old roommate. I would say around 2012, 2013, there became this sort
    of environment or air surrounding occultism, you know, in the media. And I think what was the most powerful for me, what
    was the Black Lives Matter movement happening at that time. Again, another time where I'm just completely undermined and
    overlooked. And, and I'm talking to different people and talking to a friend. I remember vividly dating this guy who I
    was speaking to him about the movement, and he started talking to me about how, as a white guy, he starts talking to me
    about how affirmative action is, you know, awful for him as a like those little like a white academic and like that as
    like, I, I these this is the magic though. It's, it's my faith and my confidence in knowing like, okay, this person, like,
    and I'm a person who empathizes with people, that's where a lot of my spiritual foundation sits. And so often, I will
    empathize with abuse like that. And it makes me question who I am. But again, that's been the journey up until now, where
    I'm where I am so much more confident, and can just be alone, self sufficient, independent, and my thoughts and actions,
    aside from what society is expecting of me. So yeah.
- speaker: Interviewer
  text: To the extent that you're comfortable sharing, would you say something about your experiences with health and healthcare
    infrastructure, pre pandemic?
- speaker: Respondent
  text: Re pandemic? Um. I would say that, I would say that I feel that not much has changed. Um, I kind of believe, I do
    believe that things are changing. But I, I also believe that things will get a lot worse before they get better. And maybe
    we are in one of those pitfalls. But what I say when I mean, I don't believe that much has changed within health healthcare
    as a black queer person. And again, it's this thing about our society, shifting its perspective, more toward intellectualism.
    Rather than creativity and advocacy, I think that's one of the huge pitfalls of what their medicine however, I don't feel
    that much has changed. And it really sad and tragic to me from before the pandemic to now. I think that the healthcare
    industry is now just learning. Well, you know what, I'm not sure I'm not gonna say or they are because I'm not a healthcare
    expert, but I don't know if it's that there is a learning curve to be had or if this is done purposefully, maybe both
    can be true at the same time. But it does to be seen there seem to be this. This huge lack when it comes to advocacy,
    and health care for, for black queer people specifically, because that's my experience. I'm not sure, you know, how other
    demographic reference groups feel about it.
- speaker: Interviewer
  text: Could you give an example of one such experience?
- speaker: Respondent
  text: Yes, absolutely um. I am someone who is absolutely affected by childhood abuse and trauma. And so I have tried therapy,
    and it has never had much of an effect on me. I learn more, and I heal more from my own learning, I honestly find more
    healing and to learn more lessons from the media to from, from, from academia and from the healthcare industry. And so
    as someone who is this sort of creative person who sort of needs a hands on experience, when it comes to learning, and
    this includes healthcare, I really need advocacy when it comes to health care. And so, it's there has never really been
    that my biggest issue has been this miscommunication between myself and my healthcare provider. And it's often, I guess,
    you can say no way, a lot of them have taught me grow up. Although it it's in a way that I have not really agreed with.
    Personally, I just think that advocacy would be a much better method than this hard hitting, well, you should know this.
    And so it has definitely helped helped me mature, especially as a transgender woman. And yes, that's what I mean, I, I
    I'm waiting for a time where I find a health care provider who, who can be more of an advocate. And just this administrator
    of medicine to me.
- speaker: Interviewer
  text: Pre pandemic, what was your day to day looking like?
- speaker: Respondent
  text: Pre pandemic, my day to day was, it's like those. It's almost like film, or you see some character going through this
    Monday, clock in clock out, just like, not really they're in their body experiencing something very other worldly. It
    was a very dystopian sort of feel. And I was trying to really cope with it and make sense of it and make it a reality
    for me. But it was a completely jarring paradoxical experiment or experience.
- speaker: Interviewer
  text: And were you impacted by lockdown?
- speaker: Respondent
  text: Like I said, No.
