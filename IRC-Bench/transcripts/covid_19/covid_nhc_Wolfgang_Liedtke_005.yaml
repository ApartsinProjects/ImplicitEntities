collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Hi, could you start by telling me your name and job title?
- speaker: Respondent
  text: I'm Dr. Wolfgang Liedtke of Duke University and Duke Health Systems. I'm a neurologist and I specialize in treatment
    of pain, nerve pain, especially nerve pain of the head and face. And I am a scientist physician so that I also run and
    manage a research laboratory that looks into causes and mechanisms of oral facial pain. And as such, I'm a truly bi-legged
    creature, namely a scientist physician. Mm-Hmm.
- speaker: Interviewer
  text: Can you tell me why you volunteered to be interviewed with us today?
- speaker: Respondent
  text: Because of the COVID - so, why I volunteered to be interviewed is because the COVID pandemic made an extraordinary,
    and I'd almost say, extreme impact on my life. And that, in a context of I did not have the disease, and neither did patients
    of mine have a lot of COVID, which I was afraid of when it all started. Patients did not have COVID. I did not have it.
    My family did not have it. However, my life has been turned upside down through this pandemic and I think that's an experience
    that very few people are aware of, and I want to share it for that, for that purpose.
- speaker: Interviewer
  text: That makes complete sense. So, I'm tempted just to ask you to elaborate, but if you want to, we could go in a more
    structured manner through the questions that I have. Or do you want to just tell me a little bit more?
- speaker: Respondent
  text: 'We can go ahead and I can elaborate, give you that the detail and share with everybody who cares to listen. And that
    is, I''m treating patients with chronic pain. And the amount the pain gets magnified by the COVID situation is just, I
    think, not at all known outside my practice. And it is overall in my patient group whom I care for, provide care for and
    try to help, which is a pretty select group of people who are at the end of the line in that other doctors have declared
    that there is not much that that can be done for them, and they suffer from chronic pain that can or that typically is
    debilitating. So, that is the type of patient who is coming to see me and over a period of now 15 years that I am at Duke
    University, I have been able to find ways to help a substantial portion of those. Of which I''m incredibly proud. But,
    I''d say, you know, very roughly the pandemic annihilated so much of progress that I have made over years, so much, so
    much has been destroyed through the pandemic and of note, not through a direct infection with the virus. Very few patients
    of mine were directly infected with COVID, perhaps some as we look back over recent months. But in the beginning, the
    rate was essentially zero. But the effects of living in a pandemic situation was all that it entails. It just augmented,
    facilitated and potentiated patients'' pain to enormous degrees, enormous degrees, so that requests to me: Nothing is
    working anymore. That just became, that was the tagline. Again, and again and again and over and by the power of three,
    by the power of five. Nothing is working anymore for patients whom I have carefully worked with and calibrated and equilibrated
    over years and years and years, and patients who got their lives back, who were otherwise debilitated with pain and sitting
    in the corner or lying in bed out of work, socially isolated with pain that makes them think about self-harm. People like
    that, patients like that got better and got life back. And that type of progress that I have made over many years got
    wiped out through the pandemic situation. Yet, almost ironically, without anybody getting infected by the virus. And so,
    here is a population of people who are ill, who are ill with pain to a degree that they could easily and readily be incapable
    of any gainful employment because of pain.'
- speaker: Respondent
  text: 'But, in that category, then managed to become better, totally wiped out through the pandemic situation, and it made
    me think of, What is that the driving mechanism for that? And I think the biggest impact here is that, Who is coming to
    the table? What do these patients have that they start with and then carefully or the hard fought for equilibrium that
    I managed to get them into was actually just hanging on a support mechanism that I made work and it was working, but the
    support mechanism was way too weak for a situation like this. And then the psychological mechanisms of living under a
    pandemic was all that it takes: sleeplessness, no perspective, anxiety magnified by a factor of unimaginable and no perspective,
    What will happen? Will I get the disease? Will I become ill? Will I die from COVID? Will somebody in my family get this
    disease? What will happen? What will happen in a month? What will happen in six months? That type of lack of perspective,
    not sleeping day-in, day-out, day-in, day-out, at the same time, suffering from this horrible pain. And then the pain
    comes out of the water again. Okay, what''s happening? Call Dr. Liedtke. So, I just, I worked until 2 a.m. regular, regular
    all the time, all the time. And yet, almost nobody of my patients became a victim of the virus. It''s not through infection.
    And that is when it started, my fear was patient will get infected with a high contagious respiratory virus will infect
    their head/face is infected. Trigeminal pain will get worse. That is a common experience that I know in the cold season
    people can get from respiratory illnesses, from influenza.'
- speaker: Respondent
  text: I know that. That is part of the seasonal pattern that I have experienced, where the winter can be harsh and harsher
    for patients not only through cold, but also through so interfering infections. And I was afraid that COVID would mimic
    that with its presence and, you know, spread and contagiousness. But none of that. None of that. And uh, so then recently,
    people had more COVID was definitely becoming more palpable that patients say, I had COVID, I had COVID, or some of the
    majority of patients coming to me had either themselves COVID or in their family. But that then did not lead to patients
    suffering more through that. Indeed, ironically or anecdotally, in keeping with scientific insight, COVID might make head
    face pain less severe. So, there is a mechanism how COVID disables alarm in sentinelle mechanism that we have and makes
    the system less acute and less sharp, which in a case of pain, means pain is less. And I had some patients where that
    was sort of going into that direction and when they recovered from COVID, pain came back. The real minority, and the big,
    big impact is, you know, life under the quarantine and the outlook of that and it totally derailing the successes that
    I have accumulated over so many years of hard and diligent work. And I practice medicine here from my home office. I prefer
    not to make people come to our clinics and have them wait and bring the risk from some faraway location with them just
    to see me. I prefer to see them remotely because it's just one hundred percent safe and remote medicine can be practiced.
    And what has to be done, in terms of management can all be done remotely. As an experienced neurologist, I can diagnose
    conditions I don't, you know, have to have the grips on the patient to move forward. Ideally, yes, but in this situation,
    no, I don't have to.
- speaker: Interviewer
  text: Was that your practice before or did you update your protocols when the pandemic hit? Like where you practicing from
    your home office before the pandemic as well?
- speaker: Respondent
  text: Whether I practiced remotely before the pandemic hit? I did practice remotely more than my colleagues because I accommodated
    to the need of some patients whose pain aggravated badly when traveling. And so here was a patient in Georgia or in Florida
    or in another location who would have been severely stressed through being forced to travel. And we found ways to arrange
    for remote consultations so that I had a certain level of practice in that and knew how that went. But it was born out
    of the sheer adaptation to the situation of travel stress, potently aggravating pain that was already at a level where
    you don't want any more potentiation. I was regular, I had my practice and I was a busy clinician, traveling and being
    active and present in my two clinics.
- speaker: Interviewer
  text: Can you talk to me generally about changes you maybe have had to make as you spoke about, like the frequency of visits
    front that you take from home? Any other changes in your daily protocols that you've had to make as a result of the COVID
    pandemic?
- speaker: Respondent
  text: 'Adaptation and changes I had to make during the COVID pandemic were just responding to the miserable outlook and
    to the frustrating and disheartening derailment of, you know, the carefully crafted strategies that were helping and that
    made a difference such a difference in people''s lives and that getting knocked off and knocked off one after the other.
    Just dealing with that, that''s became my daily bread and that''s the soup I had to eat. So, I had to adapt to that and
    just move forward with that and see what can I do in response to that. And it has been enormously absorbing of my energy
    and my ability to bring things to the table and to contribute. That is working with a condition where it''s at the extreme
    level in other doctors and clinics have already shrugged their shoulders and given up. It''s already a tall order. And
    then to have it all come together, like domino stones that collapse and collapse one after the other and that that goes
    on from 9am to 2am. That''s the daily bread. And then also, what''s the outlook for me? So, I did not know when the pandemic
    will end and how that will go. What will - I think there was also earlier last year on the hearts and minds of many people,
    What will be coming out of our country? That is for sure has been a factor that added to the worries, to the sleeplessness
    and to the misery. And I have fortunately retained a robust health. I have been able to sleep. I have not had anything
    physically, mentally, I don''t know, but that I have been fortunate with that. But nevertheless, it has clearly occurred
    to me in the early parts of last year. What will happen with our country. And then what will happen with our country,
    what will happen with the world? Has been something that has been on my mind on top of everything else. Well, I also did
    mention that I''m a two-legged creature, so my job is to care and provide medical care for patient with a distinct, challenging
    to treat medical condition, but on the other hand, I''m also the director of a research lab, and my job is to see that
    what we find, what we discover in the laboratory gets communicated to the outside world, meaning I have to write papers
    that other people read and appreciate and say, Hey, the Liedtke lab found the following. That is also my job, and I need
    to turn that around into a research funding money so that my colleagues, my talented colleagues who work with me, can
    be paid and that we can buy the research reagents that are necessary for them. So, there is a worry of mine: well, here''s
    the pandemic, everything is closed, labs are closed. We had a publication we said, We were very happy to have a publication
    with a journal court, Proceedings of the National Academy of the United States, PNAS, and the paper was received well.
    The revisions requested - the critique was good - and the revisions for this paper would have taken a few weeks under
    normal circumstances, but when the pandemic hit, I addressed the journal and said, Can you just cancel all of this request?
    Because I don''t know whenever I will be able to do that, and it might cost us so much time. Why don''t we publish this
    paper and we''ll put in a qualifier and say it''s COVID time and we can''t do this experiment, even though it was simple?
    And then that led to negotiation. And the end of the line is that fortunately, this paper got ultimately accepted and
    will be published. But I just learned that a few weeks ago. So, that''s where a few weeks turned into a year plus at that
    level. And if you were to lose the sources of your funding during that year of senseless waiting, you''re dead, professional.
    So, that means my laboratory existence was - the existence of my laboratory operation also faced an outlook of annihilation.
    And that is not comfortable to live with in terms of, Where are we going? So, that''s my personal impressions, but here
    I am, I''d say healthy and in doubt with, you know, time-tested, sufficient stability to come through. But how are you
    doing if you have pain that makes you feel you want to harm yourself? And that is my patient. And they did respond as
    a cohort in a way that they told me they enormously suffered through this enormously unspeakably and a tiny bit of that
    came back like, you know, the tip of the wave of a tsunami showered me. Meaning, from dusk to dawn, essentially, the only
    thing I hear, nothing is working anymore that I have built for years and years. So, that''s my perspective on COVID and
    I did want to share this with the world because I haven''t heard it. And it has barely been mentioned where, you know,
    some people made big headlines out of all, you know, patients with chronic migraine might be worse or chronic migraine,
    they don''t sleep well and then it goes down the drain. Yep, it does. But I was working with a group of patients that
    have been hit and affected by the pandemic disproportionately harder. And I say exclusively through psychological mechanism
    in combination with an underlying illness that they have. The illness they had - they do not have cancer. They do not
    have something we say, Oh, this might be fatal or - no, they had a chronic neurologic condition and they did not have
    COV'
