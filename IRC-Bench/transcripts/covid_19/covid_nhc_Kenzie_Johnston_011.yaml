collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Kenzie, for me, could you please repeat your name and your job title?
- speaker: Respondent
  text: Sure. My name is Kenzie Johnston. I am an assistant professor in the Department of Family Medicine and Community Health
    here at Duke. So, I work at the Family Medicine Residency Clinic. I work at Duke Student Health, and I'm also one of the
    team physicians for Student Varsity Athletics.
- speaker: Interviewer
  text: Awesome, thank you. And could you briefly walk me through just a typical day for you at work in the last few weeks,
    so pretty recently?
- speaker: Respondent
  text: My typical day at work in the last few weeks has been a lot more of what it was prior to the pandemic. So, now I'm
    back to seeing patients full time in our sports medicine clinic over at the Family Medicine Center. And then I'm back
    to seeing Duke students regularly at Duke Student Health. And then I'm also back to working for the athletics. So, seeing
    student athletes and also providing sideline coverage for a lot of the women's sports here at Duke.
- speaker: Interviewer
  text: You mentioned the phrase of, It's very similar to prior to the pandemic, could you tell me a little bit more about
    how your daily life differed more during the pandemic, when things might have changed?
- speaker: Respondent
  text: So, my life changed pretty drastically during the pandemic. So, I remember receiving an email that asked us to go
    get trained for PPE Personal Protective Equipment. And I was one of the first people from our department to respond and
    go to the hospital just to get trained in PPE. I remember right after my training returning back to the clinic and finding
    my medical director to let him know that I have been trained just in case he needed it. And he was very excited and told
    me, Well, yes, we're actually about to test all of the first COVID patients here at Duke in the next 30 minutes so we
    can use you. So, my life changed pretty drastically. We actually shut down an entire part of our family medicine clinic
    over at Pickens Family Medicine. We actually shut down my whole sports medicine side, moved my ultrasound machine out
    of my [in audible], and we set up a really impromptu clinic really within a couple of hours to see the first patients
    to be kept in an outpatient setting for coronavirus. And so, I was one of the few couple of providers, including our nursing
    staff, to be involved in that process. And then in the weeks following that, we continue to have our clinic really shut
    down and one complete half just the patients who had symptoms consistent with coronavirus. So, I pretty much stopped seeing
    a lot of non-coronavirus patients. I kept the family medicine, sports medicine clinic a half day a week, but most of the
    time was spent with 3000 people in our outpatient COVID clinic. And then we transitioned to opening up the first drive
    thru testing site in the back of our family medicine building at Pickens Family Medicine. We were doing that for months
    on end. Um, it's very, very different than what it was prior to the pandemic.
- speaker: Interviewer
  text: That sounds very different and very quick of a change. You mentioned that you were one of the first to get that PPE
    email and that training. How did it feel when all of those changes started to happen so quickly?
- speaker: Respondent
  text: So, it was a little bit surreal to have everything happened so quickly. I went and got training for PPE and I didn't
    really expect to have to use it so quickly. So, to walk back to clinic and then find out, Oh, actually, in the next 30
    minutes, we're going to be seeing a whole bunch of people that have been exposed to coronavirus and they're probably going
    to test positive was just very surreal. I don't know a better word to describe it. Quite shocking. And I happen to be
    the one who put in all the orders for all the tests. I also happened to be the one who started getting back all of the
    positive coronavirus tests. I think I may have been the first person in the Duke system to get an outpatient coronavirus
    test that was positive. And so, that was also very surreal, very scary. I remember being at home it was a weekend and
    they started coming into my basket and it wasn't just like I got one positive coronavirus test. It was one after another,
    after another, they were all coming back positive, and I remember just being very scared. I couldn't believe it. It was
    actually here and that we were actually seeing it here at Duke.
- speaker: Interviewer
  text: And you also mentioned kind of in addition to that initial clinic, you also had the first drive thru testing site
    in your area. How did that compare to all of those tests that you had from the clinic coming back positive? What was that
    experience like for you?
- speaker: Respondent
  text: So, after we have had our clinical COVID site set up in our building, I think within maybe one to two weeks, our chair,
    Anthony Viera, had a great idea with the health care system to set up a drive thru testing site, and we heard about the
    success of the people it had with the drive thru testing site at other places internationally and then throughout the
    country. And so, we decided to try to transition our testing to a drive thru model. And so, we actually we have parking
    in the back of our building for probably eight of us attendings. And so, we all gave up our parking spots and the health
    care system rented some tents and we actually made it happen. We had cars come in one at a time, kind of underneath our
    tent and we had a system where we take vitals on each patient that came to the drive through which they don't do anymore,
    but we were doing that the very beginning. We were swabbing the patients, giving them their quarantine, or isolation,
    forms and then sending them back out. That was a really tight location. It was nothing like the big drive thru centers
    that you see now. It was literally a parking lot that fit eight cars that was turned into the first COVID drive thru testing
    site at Duke.
- speaker: Interviewer
  text: That is a lot of changes that are pretty different from the job responsibilities you were describing earlier in the
    beginning. How have the changes that COVID has had to protocols to the way that your job works affected the way that you
    experience your job as a clinician?
- speaker: Respondent
  text: Well, that's a great question. I actually think that we as a department were, really, I don't know, able to respond
    quite well to the challenges that we face during the pandemic, and we were able to develop protocols pretty quickly, right?
    There were no existing protocols for what do you, how do you test a whole bunch of people for coronavirus? How do you
    set up a drive through testing site with pretty limited resources? And so, I'm pretty amazed at the flexibility of our
    clinics, our staff as well as our administrators. Um, so I don't know if it's really changed my job. It's made me just
    maybe more excited about the potential of what we can do as a team. Um, you know, I'm hopeful and hoping that we can,
    that we've shown that we can really provide great ideas, great structure and great care to patients. And I'm hoping that
    the health care system will continue to recognize this and support our mission to continue to provide excellent health
    care beyond the pandemic to the Durham community.
- speaker: Interviewer
  text: And just now you mentioned a couple of things like the flexibility of the staff and earlier you were saying how all
    of you work together in this pretty tight space. So, how has covered change your relationships with your coworkers and
    how you operate together as a team?
- speaker: Respondent
  text: Well, I'll speak first about my nurse. So, my nurse and myself have been working together in my sports medicine clinic
    for about a year prior to the pandemic, and she was actually one of the first non-physician providers to kind of jump
    in when all this took off. And so, she was one of the first nurses and one of the only nurses to volunteer, to help swab
    patients, to help, to put herself at risk to provide care for other people. And so, if anything, we did that together.
    We went through this together. We were both in PPE, standing in the drive thru, swabbing patients together. We both have
    small children at home. We're both moms. And so, if anything, it really just solidified our friendship, it solidified,
    it deepened us as coworkers. I think we have a really deep respect for each other. I now have a very deep respect for
    her and the belief that she's willing to go to help other people and to just be a great part of the care team with our
    family medicine clinic. So, if anything, I think that's a great example of how it's changed my work relationship. It's
    just also deepened my respect for my coworkers. Again, a lot of people have small children at home, have families, maybe
    have family members who have preexisting health conditions, and a lot of people were willing to jump in. We didn't know
    at the very beginning how serious coronavirus was going to be. We were hearing pretty serious, scary stories from Italy
    and other parts of the world. And here my coworkers were all standing up saying, You know, I'm willing to go, do this.
    I'm willing to put myself in potential danger to do what is right. And so, if anything it's just deepened my respect for
    everyone that I work with.
- speaker: Interviewer
  text: That's a great point that you just brought up of how since ya'll were one of the first responders, it was really hard
    to know the impacts that coronavirus would have later on or how dangerous it actually was. When you got those emails for
    PPE training, you were told about this clinic. What was going through your head when you were making that decision of
    how involved you would be in this?
- speaker: Respondent
  text: Yeah, so when we first got the emails and we were asked to start seeing people that may be positive for coronavirus
    and start swabbing people at the drive thru, I discussed it with my husband. You know, we thought about it pretty heavily.
    You know, I have two small kids at home. They were one-and-a-half at the time. I had twins. Um, but uh, I'm probably,
    you know, I'm in my thirties. I'm one of the healthiest people in my office. And so, I decided that I thought it was worth
    it. You know, if I got sick, I thought my chances of doing well we're probably pretty good. And you know, other people
    in my clinic who I know had preexisting conditions or were older and age, and we're also willing to step up. So, if they
    could do it, I could do it as well. And so, it was pretty scary. I remember talking to my husband about, Well, we should
    probably make a will, just in case something happens, you know, we should probably have plans just in case something happens.
    We had a whole system for how I would change out of my scrubs at the end of a clinic. So, I bike to work. I actually bike
    in like athletic clothes. At the end of clinic, I'd strip down all of my scrubs that I had changed into. I put back on
    my biking clothes. I'd keep my scrubs in a plastic bag. I'd go straight down into our laundry room when I got home, change
    again, put everything in the washing machine. So, it was a pretty elaborate process, just anything we could do to mitigate
    risk. But overall, we thought that, you know, if there were people to step up and help, we were probably a good match.
- speaker: Interviewer
  text: Something else that you've been mentioning throughout so far is that the way that you've interacted with patients
    differs already, like it's not just sports medicine anymore, you're swabbing people out of cars and things like that.
    How have your relationships with either any established or new patients changed as a result of the pandemic?
- speaker: Respondent
  text: I would say patience overall throughout the pandemic, and even as we're hopefully getting towards the end of the pandemic,
    we'll see, have been really gracious for the medical care that they've received and for just our clinic in general. If
    anything, I think my interactions with patients have been more positive throughout the pandemic. And as we get into the
    later portion of the pandemic, I think people are just more thankful for health care providers, and I think they've really
    kind of acknowledged the work that we've done and like we talked about earlier, some of the risk that we took. And so,
    I think it's created some really positive change to relationship with patients.
- speaker: Interviewer
  text: You mentioned that you've had a lot of positive experiences with patients kind of through this whole experience. Do
    you have any stories or moments that you've shared that have been particularly meaningful?
- speaker: Respondent
  text: Oh, trying to think, you know, like we talked about earlier. I'm one of the team physicians here at Duke and I take
    care of a lot of the Duke students. So, what's actually been super meaningful over the last year or so is actually working
    with students, Duke students, throughout the pandemic. So, there's been a huge mental health struggle, which I think everyone
    has been really open about talking about through the pandemic. But it's been a huge struggle for a lot of the Duke students
    and Duke student athletes. And so, I've worked really closely in the last year with student athletes in regards to their
    mental health. And I think if anything, that's been kind of the most impactful thing for me being able to hopefully be
    there for some of these students during this really difficult time. You know, no one wants their college experience to
    be what it's been through the pandemic, but they're really great kids, really resilient kids. And if anything, it's made
    me have, we talked about with patients earlier, just a deeper respect for the students on campus.
