collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, if we can start by you just telling me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: My name is Meliza Sanchez. I've been a medical assistant for the last three years. Prior to working here at CVCH,
    I worked with Confluence Health. Before being a full time medical assistant, I was more a patient services type person
    with helping with insurance, checking in patients. And now, here I'm in a more clinical setting.
- speaker: Interviewer
  text: Great, thanks. I guess my next question would be if you could walk me through kind of your day to day over the past
    few weeks - what that normally looks like?
- speaker: Respondent
  text: Yeah. So, getting in here, what we first do is prep for the day, see what our patients need. Looking at the schedule,
    what provider we're working with. Looking through the patient schedule, looking into their charts, making sure they're
    out today, what things need to be updated and just kind of going with the flow of the schedule, getting patients in rooms
    and assisting to their needs.
- speaker: Interviewer
  text: So, I guess my next question would be, what was the first activity you noticed that was COVID or pandemic specific
    - and participating in - maybe some examples would be specific meetings that you had that were in relation to the pandemic
    or changes that were made to safety?
- speaker: Respondent
  text: Well, when the whole pandemic started, I didn't work here in this clinic. I worked at Confluence Health. And I think
    the biggest thing that we did was we completely went into a shutdown. So, doors closed and it was so - it wasn't even
    gradual, it was from one day to the next. It's like, Oh, we're closing. The doors were shutting, we're locking it down,
    we're canceling our patients, and we're just doing phone visits or video visits. It wasn't even just gradually, it was
    just, Oh yeah, we're seeing patients. And now we're not. And that was just very abrupt and it was just all of a sudden
    and unexpected.
- speaker: Interviewer
  text: Wow. Yeah, I can see where that might be kind of jarring. So, what did - you mentioned that you were working at Confluence?
    How did you end up here?
- speaker: Respondent
  text: So, at Confluence Health, that's where I started kind of my medical assistant career, and they did a lot with me,
    helping me to learn phlebotomy, doing patient intake, rooming, vitals, all of that clinical setting. And I wanted more
    of that. I really liked the medical field and kind of being more of hands on with patients. And unfortunately, Confluence
    Health wasn't able to offer a little bit more of that. And Columbia - I had a friend who worked here at Columbia Valley
    and she said, Oh, we're hiring, why don't you apply? And I really like that Columbia Valley is really about helping the
    community. And all the services provided here, OB, procedures that weren't done at Confluence Health, and it's just been
    such a great learning experience. And every day is a new day and I really like it.
- speaker: Interviewer
  text: That's great to hear. So, I would like to ask about the safety measures that kind of went into keeping you safe and
    patients safe as COVID started. So, you mentioned that in the beginning, everything shut down. I guess my question would
    be, did you feel safe? Or what did that look like?
- speaker: Respondent
  text: Definitely felt - at first, I was pretty - just in shock. We didn't really believe how serious COVID really was. I
    don't know if it was just me being ignorant or naive to the whole situation, because you were like, Oh, a pandemic. It's
    2020 - or 2019 at that time - what's happening? You would hear of previous viruses - what was that one?
- speaker: Respondent
  text: Yeah, Ebola never got to us. And then you were like, Oh, COVID-19. And then it started across the country and you
    were just really like, How big is this? How serious is this? And so, when things started shutting down for us, we went
    to complete lockdown, it took me a while to kind of process like, Oh, it's pretty serious. And, you know, having Confluence
    Health being also an organization that worked with Central Washington Hospital where they would be sending reports to
    us of so many people in the ICU, so many people in the PCU, so many people on ventilators. And you kind of really got
    the idea of, Yeah, this is something that's serious. And so, I did - I felt quite safe with going to lockdown and then
    all of us, you know, masking up, taking our temperatures first thing in the morning, signing onto stations and whenever
    a coworker had any symptoms, making sure we got tested. So, yes, I did feel pretty safe with all the measures that were
    taken for not only us, but our patients as well. And we would only let patients who really needed to be in the clinic
    come inside, and if there was people with fever, symptoms, cough, we would mask up, go to the parking area and kind of
    assess them in that way. So, I think they did a really great job keeping us all safe.
- speaker: Interviewer
  text: Thank you for sharing that. That's an interesting perspective. So, I guess my next question would be - how was transitioning
    from Confluence and then to CVCH with also - I don't - I'm not sure where CVCH was as far as seeing patients and everything
    like that. How was that transition?
- speaker: Respondent
  text: So, transition from Confluence Health to CVCH - Confluence Health, when I left that position, we didn't see any patients
    with any cold symptoms or any COVID-like symptoms at all. It was just routine care. If they had any cold-like symptoms,
    we would send them elsewhere, walk-in at Confluence or just elsewhere, because the providers didn't feel comfortable with
    treating patients. And transitioning to Columbia Valley. We have a whole COVID hall. When I first started here, we had
    a COVID provider, so, it was really interesting kind of learning all this PPE, the testing, PCRs - how to order, and I
    really was looking forward to it, just because I had never, you know, tested a patient for COVID or knew how it all worked.
    And to offer that to the community I think was really great that way. The hospital wasn't just bombarded with all these
    patients or the walk-in clinics, but also the patients felt comfortable seeing a provider that they knew that they got
    their routine care from. So, I thought that was great too.
- speaker: Interviewer
  text: Yeah. Were you - did you work in the COVID hall, then?
- speaker: Respondent
  text: I did a couple times when I was in training, because they wanted me to kind of understand the flow and jump in. They
    tried to keep it to the people who - limit the people that already have the experience to not confuse anyone else. But
    yes, I did get to work on the COVID hall by myself, I think maybe once or twice. Yeah.
- speaker: Interviewer
  text: How - were you excited to be able to work in that hall or were you scared? How were you feeling about that?
- speaker: Respondent
  text: I wasn't scared. I was pretty excited. I mean, I had COVID. I had already had my COVID experience - my whole positive
    COVID experience about a year ago. At that time, it had been a couple - half a year, I think. And the people who were
    taking care of me at the time I had COVID kind of - it brought like, Oh, I'm helping someone else - or, I know a lot of
    people - or, Oh, I don't really want to go work in the COVID, because of kids - or, Just the what ifs of getting sick.
    And me, I was more like, Oh, you know, I got this. I volunteer. I can work the COVID unit type thing. I didn't feel like,
    Oh, I had the greatest power, but I was like, Oh, you know, if they don't want to, I could do it, you know? And it was
    good. I was excited.
- speaker: Interviewer
  text: Well, that's really just like a special thing for you to be able to be willing to do that, you know? You mentioned
    you had an experience with COVID. Can you tell me a little bit about that?
- speaker: Respondent
  text: Yeah. So, there's dates that I won't forget. So, on July 8th of last year - of 2020, I was diagnosed with positive
    COVID. And then, I got admitted to Lakeshore Hospital on July 13, and I stayed there from July 13th to July 19th, admitted
    on oxygen supplement. I was, for the most part, a healthy 23-year-old, no diabetes and hypertension, never smoked, no
    alcohol. And it was just - the way my body reacted was a little strange - that it needed the oxygen supplement and my
    stats were 83, and I was on antibiotics and slowly recovered and was there for six days. But I made a full recovery and
    - actually my providers were Dr. Davenport and Dr. Renaud. And then, Dr. Snyder was my discharge doctor, And she was like,
    Yeah, I remember you. You just flew out of that room. I was like, Yeah, I was excited to be out of everyone.
- speaker: Interviewer
  text: Yeah, I'm sure you were excited to be out.
- speaker: Interviewer
  text: That sounds like a very transforming experience. Yeah.
- speaker: Respondent
  text: And it was pretty scary, because then I got released on the 19th and then my dad got positive COVID and he kind of
    had it a little bit more tough, because he was hooked up to a ventilator for - he made a great recovery, too. We were
    all surprised. He was on a ventilator. He got into septic shock. They were giving him all these antibiotics. They were
    wondering if they needed like an MRI. But he was just too fragile to get him into the MRI machine. The ventilator was
    doing 90% of the work. And they were actually talking to me about getting him into a trial for a placebo antibiotic. And
    just kind of getting out of the hospital myself and then having to think about this, especially because I'm the one with
    the most medical knowledge - so, my mom was kind of looking at me towards making these bigger decisions. And then I was
    like, Well, let's kind of - I was like, The science of it - the odds of him getting off the ventilator - because the providers
    were like, You know, his lungs aren't doing the greatest. He had pneumonia. It was just a rollercoaster of events through
    the whole July month of 2020. But yeah, then he made such a great recovery and he's doing really well right now. So, we're
    very lucky. It's been a tough COVID year for my family [laughs].
- speaker: Interviewer
  text: Yeah, it sounds like it. That's a lot to manage in a short amount of time. I appreciate you sharing. You mentioned
    that you were kind of the one with the most medical knowledge. I wonder if you've had similar experiences with your colleagues
    who also have no medical knowledge - if they have had similar experiences or if you've talked to them at all about that?
- speaker: Respondent
  text: To my knowledge, my coworkers, we haven't really touched base on that. I know a couple haven't really had an experience
    with COVID, which I'm glad they haven't. But yeah, I haven't really touched base with any and seen what their stories
    are like.
- speaker: Interviewer
  text: I guess my next question would be if your your relationship with your coworkers has changed at all throughout the
    COVID-19 pandemic? I know a lot of people have mentioned it's a stressful time, and so, I just wonder if you've noticed
    any changes in relationships through that?
- speaker: Respondent
  text: Yeah, it's definitely been a stressful time. I think with the COVID units and just making changes every day, I feel
    like we've become more of a team - team workers, team players. We're always there to help each other. And if something
    changes, if we're unsure what test to run or what goes where, who needs to come in, we're just there to jump in and help
    each other. So, I think it's really helping us as team workers and team players. It's really good to see us all coming
    together. And I have great coworkers. They're amazing.
- speaker: Interviewer
  text: Yeah, that can make such a difference when it comes to coming to work. My next question would be whether you have
    any habits or things that you've picked up throughout the pandemic that you can see yourself taking going forward?
- speaker: Respondent
  text: Definitely. My biggest habit is - [in audible]. I do that at 6 feet, I don't know if you noticed. My space or when
    people try to be a little too close, I'm like, Oh, you know, six feet apart. Whether they're masked, unmasked, vaccinated
    or not, I think that's one of the habits I get. Even when rooming patients - I kind of do, you know, blood pressure cuff
    and then step back as quickly as I can and kind of give them their own personal space. I think that's one of the habits
    I've gone into, kind of keeping that six feet distance. And I find myself doing it or kind of cringing if someone is a
    little too close. I'm like, I need my personal space.
- speaker: Interviewer
  text: Yeah [laughs]. I've heard a lot of people who maintain six feet just for that. I guess my next question would be whether
    you have noticed - what do you think the biggest impact on you going forward professionally is? I know you mentioned that
    you ended up changing clinics during COVID, but I guess my next question would be, what do you think the biggest impact
    is going to be on you long term going forward? And if you don't want or you feel like you can't think of anything, we
    can move on.
- speaker: Respondent
  text: Yeah, let's move on.
- speaker: Interviewer
  text: So, my next question is, were there any ways that the community supported you or supported health care workers? Did
    you feel supported, I guess?
- speaker: Respondent
  text: Definitely. I - throughout the whole community, not just here, but just surrounding areas, Jolane, Brewster, Wenatchee
    - the whole donating masks, cloth masks. At the beginning there were groups - church g
