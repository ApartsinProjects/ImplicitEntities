collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: Well, I am a fifth generation Montanan, and I went to the University of Montana and Skaggs School of Pharmacy for
    my pharmacy degree class of 2019. And I am the director of pharmacy here at Maria's Health Care Clinic. I've been in that
    role for a year, and we serve the local population for all of their outpatient pharmacy needs. And we also serve individuals
    within the clinic and employees of the hospital that we're connected to. But yeah, we just deal with patients and whatever
    needs they have and work with them to try and facilitate the best pharmacy care that we can within this small community.
    In rural areas, in rural Montana, access to good pharmacy services are hard to come by, and so, we pride ourselves in
    providing that for this community.
- speaker: Interviewer
  text: How did the COVID-19 pandemic impact your professional life, and what about your personal?
- speaker: Respondent
  text: Well, from a direct interaction standpoint, we, as pharmacists, try to have as much communication directly face to
    face with our patients as possible. And when COVID hit and all of the uncertainty about how it was being transmitted and
    what measures could be done to help reduce the potential risk of transmission, we had options. Those options were to eliminate
    as much of the face to face interaction as possible through closing the pharmacy doors, basically as a retail pharmacy
    and just hand-delivering medications to patients while in protective gear. That was only something we were able to do
    here, because we are a low volume facility. After we had determined that there were other things that we could do and
    the risk was not as high as once anticipated, once we knew more about the disease and all those things, then we reopened
    the pharmacy doors to the public. And then at that point, you know, we had the protective barriers in place. Initially,
    we actually had - the first protective barrier cough screen, basically, that we had between us and the patients was Saran
    wrap. We had Saran wrap draped from the ceiling tiles to the backside of the point of sale computer, creating a Saran
    wrap wall between us and the patients. It was one of the most embarrassing things I have ever seen, professionally. I
    mean, the facade of safety that we were trying to create was embarrassing. It was like, You're telling me that Saran wrap
    is going to protect me from a deadly disease? I couldn't get on board with it. But we then graduated to plexiglass, which
    was much more professional. And honestly, I think that it's something that I have come to embrace because if a patient
    were to cough, I do know that it would be caught. Whatever chunks of whatever would be caught by that plexiglass. And
    that does make me feel better.
- speaker: Interviewer
  text: Yeah. So, do you still have it up?
- speaker: Respondent
  text: Yes. Yes, it is still up. And I can't imagine that it'll ever come down, to be honest. I think that's probably something
    that will remain just as a safety precaution, but also out of comfort for individuals that may or may not feel safe. And
    that's something that we've had to accommodate, is the different values and perceptions of our patients as they come in
    and how they view the risk and our reaction to that risk and what we're doing to combat whatever risk we perceive. Those
    are all things that the patients see as potentially politically driven things. So, we've had to take into account, how
    far do we go? There are people within the community that would have liked to have seen us go much further with protections.
    There are other people within the community that don't like that we had any. And those are things that we've had to deal
    with along the way. And you have to feel those interactions to see where that patient is on that spectrum of belief with
    how they view that risk or how they perceive the risk. And those are things that we've had to deal with on an individual
    basis as we've gone. But when we removed the curbside pick up only, it really did improve how we were able to interact
    with patients. And, from a safety perspective, it is much safer to just keep the patients in their car and walk out and
    hand it to them. It's really made it obvious that there's significant value in a drive up window at a pharmacy. As much
    as I hate fast food medicine, there's value there for situations such as this. If you have a sick patient, you don't want
    them coming in. If you have someone that could be sick and doesn't know, you don't want them coming in either just because
    it increases that potential risk for me, my staff and other patients that come in. So, it's been - we've learned a lot
    about how about those things determine the public's perception and then also how we somewhat benefit from them and things
    that we're probably going to take with us in the future.
- speaker: Interviewer
  text: Yeah, is there anything other than the plexiglass windows that you imagine will be staying around? Protocols or practices?
- speaker: Respondent
  text: Well, I can tell you there's some things that I hope, but I think that they're not going to happen. I think that they
    will go, and soon. And that is that, as a small retail pharmacy, we have very little pull and push with the large insurance
    companies who determine how we are able to provide care to patients. But with COVID, we have been given more freedom to
    provide care. So, for example, there are many patients that have prescription plans that have been negotiated to provide
    large chain pharmacies with far greater care capability for those patients than they allow for us, a small independent
    pharmacy.
- speaker: Interviewer
  text: Can you provide an example?
- speaker: Respondent
  text: 'Yes, absolutely. So, we have - there are many patients, where, for their chronic medications, we can only provide
    a 30-day supply for that medication. And those patients, if we try to run for a greater day supply - these are medications
    that haven''t had changes to them in some time, the patient''s going to be on them for a long time, they are low risk
    medications. We would love to be able to reduce how frequently that person has to come to the pharmacy, because that increases
    their potential compliance whether or not - they''re not running out of the medication nearly as frequently, they''re
    not hitting the gaps in between. So, what we would love to be able to do is to provide those patients with a 90-day supply
    of these prescriptions. But what happens is: the insurance company says, You are not allowed to do that. You can only
    give that patient a 30-day supply of the prescription. And if they want to get it for longer, they have to go to Walmart,
    which from Shelby, Montana, is 90 miles away. Or they have to go to Walgreens, which from Shelby, Montana is 90 miles
    away. Where they have to go to CVS, which from Shelby is 90 miles away. So, they''re saying, If a patient wants to get
    a 90 day supply, they''re welcome to do it. They either have to pay cash for it or they have to go somewhere else along
    ways off, 180 miles roundtrip. And during COVID, the insurance companies decided as a gift to us and the patients, that
    they would allow us to fill for 90-day supplies to help reduce those connections and those interactions that had potential
    risk for transmission of COVID to their patients. And so, they allowed us to run a 90-day supply for these prescriptions.
    And, in my mind, it''s something that we absolutely should be taking forward and we should be fighting for it, because
    there''s no reason why they should be able to delegate that type of care. And then they hold it over us as well. When
    a patient forgets to come refill their prescription and they miss two days off the end of it, and then they forget the
    next month and they miss two days, now that patient is non-adherent and that insurance company takes back money from that
    prescription that they had reimbursed us. So, it''s a terrible, honestly, it''s a terrible system that we have going,
    and we''ve seen a little bit of what it could have been if we were all on an equal playing field. If it really was the
    patient''s choice for where they could go to get their prescriptions filled and have good care, in which case, their decisions
    are made based on both convenience and quality of care provided. And they''re not driving to a place simply because it''s
    the only way they can get a 90-day supply of their prescription.'
- speaker: Interviewer
  text: For no real reason.
- speaker: Respondent
  text: Other than someone shook a hand behind a door that you didn't have access to. So, that's something that I really wish
    that we would be able to continue, but I'm sure that it will not be. And - but it's something, because we've seen it,
    now that we know that it's possible, I'm sure there are people and there will be people that are fighting for it. Who
    knows how long it'll take to get that kind of freedom into each pharmacy - of freedom of choice to our patients? But that's
    something that I wish that we would have, that we don't. Other than that - that was really the greatest advantage that
    we had given to us in the face of the COVID epidemic.
- speaker: Interviewer
  text: That's sounds really frustrating.
- speaker: Interviewer
  text: I mean, one thing we're learning in medical school - kind of tangentially to what we're - body systems and stuff like
    that - just how frustrating it is to be a provider of any kind and deal with insurance companies. And I haven't even had
    a lot of experience with that. But I can already feel, just talking to providers, that that's going to be a constant struggle,
    unless things change overarchingly.
- speaker: Respondent
  text: It is. And honestly, the - I would - little somewhat of a pharmacy plug, I would really encourage you to try and find
    a pharmacist that cares and that is willing to try and teach you exactly how this system works. There are very few of
    us, I think, that actually understand the billing and the intricacies of where the money's going and where it's coming
    from and why we can do what we do and why we can't do what they say we can't do. Most folks have no idea. But if you're
    able to find a pharmacist that really knows - and for them to give you that information, it will aid you enormously in
    helping your patients determine how they might be able to improve either their insurance or their pharmacy care. Both
    sides. So, one thing that you'll find with Medicare - it is a government subsidized program, but it is all privately run
    - is that it is seemingly intentionally complicated for these patients that are 65 and older to try and track down the
    appropriate plan for themselves that's going to not bankrupt them. And it is so complicated and there are so few people
    that really understand it. It's an incredibly daunting task for these elderly patients to try and figure out how they
    are to proceed in finding an insurance that's going to benefit them and not cost them an arm and a leg. There are so few
    people that can really help with that. It's unfortunate, but - and I feel like I'm one of them and I just wish that there
    were more.
- speaker: Interviewer
  text: Yeah. Well, Shelby's lucky to have you.
- speaker: Respondent
  text: Well, thanks.
- speaker: Interviewer
  text: And - maybe you talked a little bit about this already, but asking more directly. In what ways did your role as a
    physician change during the pandemic? Pharmacist - sorry.
- speaker: Respondent
  text: That's fine. Well, one of the things that we had to do was try to stay on the - I mean, we're always doing this, but
    with the incredibly rapid development and desire to have real data and real direction. We had so much misinformation,
    and the role of a pharmacist has always been to help in guiding pharmaceutical care for our providers and for our patients.
    But in these circumstances, it was even more acute, because we had such demand for it. Everybody was trying so hard to
    find something that was real in the emptiness. There was all this information, but none of it had any real substance.
    And trying to track that down through the noise was really difficult for most folks, and that was somewhere that we came
    through in trying to stay current with the data and to be able to make the updates and help our practitioners make the
    best decisions for how to treat these patients when there really were very few options. And so, we had a lot of that.
    And then, you know, helping to counsel patients in scenarios where they just received a diagnosis that at that point was
    very scary and there was so much unknown. And that's part of what made it so scary, is that these patients are like, Oh,
    man, now I've got COVID. What does that mean for me? And the doc would go through their Spiel and talk to them about their
    disease and what they needed to do and how they needed to help protect themselves and their friends and their families
    as they proceed through life and try to make it through their disease. And then, I would come in with whatever medications
    or whatever over-the-counter supplements I had for the patient to try and ease their progression through their fight with
    COVID. And then, help comfort them in their time of this, you know, unknown and fear about what they had going on and
    what they could expect and how they could help their potential outcomes. And, you know, comforting them in that time and
    giving them information - as much real information as we could, was really helpful for a lot of patients. And then, further
    than that, our role in validating the utilization of these vaccines and educating the patients as to what the vaccines
    really were and how those vaccines really were going to impact them and what realistically they should expect. And what
