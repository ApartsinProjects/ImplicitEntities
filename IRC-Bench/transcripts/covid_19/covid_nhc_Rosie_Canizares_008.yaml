collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Can you just tell me a little bit about yourself and your role as a health care provider at Duke?
- speaker: Respondent
  text: Sure. So, I am a physical therapist and my clinic is a Duke Student Wellness Center. I'm also on faculty at Duke's
    DPT Program, so I'm only in clinic half the week in pre-COVID times.
- speaker: Interviewer
  text: And can you walk me through a typical day for you during the past few weeks and maybe a second part of that reflection,
    think about how that has been different or similar compared to last year prior to COVID?
- speaker: Respondent
  text: So, I would say, again, I have a split position, so when I'm in a clinic, I'm in clinic and I don't necessarily know
    that my clinic is that much different. It's just I'm not in clinic as frequently because again, my clinic is a Duke Student
    Wellness Center and there aren't as many people on campus right now. Other than the PPE and it just being, there just
    being a lot fewer people in the building, it hasn't looked too differently. I mean, I am part of the pool testing right
    now and I wasn't last semester, but I think that's the other big change. I think one of the other things that I was able
    to do a telehealth visit, which wasn't really a thing pre-COVID. So, I would say that's been different in the past year.
- speaker: Interviewer
  text: Have there been any successes or challenges with telemedicine that you've come across?
- speaker: Respondent
  text: I think that the ability to offer telehealth visits is great. So, I do think that that's a success. It'll be interesting
    to see how long insurance reimburses for those types of coverage, because I think even initially there was an end date
    and then with the various surges, potentially those have been pushed back. And now I know that there's advocacy for those
    to not go away at all. And I think that would be great. I think that that would hopefully increase our ability to see
    a wider population and I think just even in the past few weeks, since that was your original question, is that I've still
    been able to see people even when they've been in quarantine. So, I also consider that an advantage.
- speaker: Interviewer
  text: Do you think some of these reflections you've had about the increased, maybe access to PT, is that just in your work
    or you think like for most physical therapists in the community, as well?
- speaker: Respondent
  text: I think that it is for most physical therapists. I mean, with all the benefits of telehealth, I think obviously to
    it's come to light in the past years, obviously the inequalities. And so, while it is great to be able to provide more
    access, that's not necessarily equitable either because you do need the technology in order to do that. And so that may,
    you know, just as we've learned in the past year, continue to magnify those disadvantages. But, I am the coordinator of
    Alumni Engagement at Duke's Physical Therapy School, and I've talked to a lot of our alumni and I would say the vast majority
    of people have had some exposure to telehealth at this point. So, I don't think it's unique to my situation.
- speaker: Interviewer
  text: Are there any other inequalities that have come to light through this past year, when you're thinking about the work
    you do, that have not been perhaps unexpected or really pronounced?
- speaker: Respondent
  text: I don't think for me specifically because my clinic is so specific and it being the Duke Student Wellness Center,
    because I think that in and of itself makes it a more homogenous population. I think in my other work with the school
    and just being on various anti-racism task forces and committees, all of those obviously cultural and social determinants
    of health have been magnified. I think one interesting thing that is somewhat unique is that my board certifications are
    in orthopedic and sports physical therapy, but my clinical subspecialty is actually performing arts, and I would say that
    that's one of the populations that has been the most affected by COVID. Just because, while there are some performing
    arts companies that have returned, you know, I'm not sure. I think Broadway is just now thinking about coming back. But,
    I think that's one of the more unique things that people don't necessarily think about. And just even at the beginning
    of the pandemic, thinking about marching bands, doing spit studies and the effects of that. And so, I think it's probably
    not a thing that the normal person would think about.
- speaker: Interviewer
  text: What have - I been thinking about your work working with Duke students. Do you have a sense of kind of this, the challenges
    that they're going through or kind of what their experiences have been during this really unprecedented and strange time
    to be an undergraduate or graduate student?
- speaker: Respondent
  text: I do, because again, I am on faculty at Duke's Physical Therapy Program, and then my niece is actually a freshman
    at Duke. So, I think I'm pretty in tune with them, although I feel like I'm pretty fortunate because most of the people
    who I've talked to haven't seemed to be as affected as other people who have students who are struggling a lot more. You
    know, I think that that may be one thing or just a whole train of ideas about how COVID has affected my practice, too,
    is, I think one of the good things about COVID is that mental health - there's no longer a stigma about talking about
    that and about admitting to that. I think I've always talked about the multifactorial nature of pain and just thinking
    about stress. And so that's definitely a more common conversation now thinking about COVID. I think there have been some
    injury patterns that have changed just because people's exercise routines or just activity levels have changed. Probably
    given a few more injury prevention and proper posture lectures via Zoom. But yeah, I think that just accounts for a lot
    of different injury patterns because of the varying levels of activity and changes in routine associated with that. And
    then, yeah, I mean, everything has been very interesting this year. And, I think definitely from a student's perspective,
    all of the adaptations, permanent educational perspective, as well, but then just with all the protocols and everything.
- speaker: Interviewer
  text: Do you think that your students will have kind of a different insight or view of being a health care provider, having
    started their training or have part of their training during the COVID-19 pandemic?
- speaker: Respondent
  text: That's a good question, and I have to say yes, right? Because it's pretty much affected everything, everything in
    the world. I think it's changed how health care has been delivered. We've already talked about the telehealth, we've talked
    about the PPE. I think it's going to change education as well, and it's been interesting. I actually recently talked to
    a student who started our program and then had to repeat her first year. And she was I mean, I think she has some good
    reflections just based off that, having gone through the same semester twice. And she was like, You know, you're really
    not missing that much because we are able to do most of our labs in person. And, I think just with the time saving from
    not having to transition and having to travel, you know, on a on a college campus, on a medical center campus parking
    is always an issue. So, the time it takes to transition between one thing for another does take up a lot of time, and
    I think people have just been able to be more efficient with their time and studying. I think from an undergraduate perspective,
    a lot of my undergrads are overloading just because they also feel like they have more time because it's been harder to
    be involved in club activities. So, I think they are, they're learning to adapt in that way, as well.
- speaker: Interviewer
  text: What is your perspective on clinicals - the students who are doing their clinical rotations - in hospitals and clinics?
    Do you think that they've also had a changed experience?
- speaker: Respondent
  text: Absolutely. You know, I think that's the unfortunate part is those are students who did end up getting COVID the ones
    who are on the clinical rotations. So, that's obviously going to have an effect physically, mentally. But then again,
    just even the way that health care is delivered with all the various protocols. I think there are now new pathologies
    like we don't know what the long downstream effects of COVID are going to be, having to think about whether or not it's
    safe to have the patient in clinic and those algorithms, and how frequently those recommendations change. So, yeah.
- speaker: Interviewer
  text: Did you ever have, I guess, sort of like the experience where I guess like priority wise in the earlier stages of
    the pandemic was physical therapy on the inpatient side, something that was kind of still prioritized or was it kind of
    said you can do this like virtually? And I'm also thinking in the context of, you know, when there was no visitor population
    was physical therapy an opportunity for patients alone at the hospital to have some sort of human connection?
- speaker: Respondent
  text: Sure. I can't speak directly to inpatient physical therapy since I didn't have experience in that population. I think
    that all of those people are frontline workers, right? And so, I think they, I don't think there were that many changes
    to that service other than the PPE and the visitor policy, like you were saying. But similarly, I think that just goes
    to the psychological effects. I'm sure a lot of people have talked about isolation and all that. Practically speaking
    and on a personal level, my dad actually developed acute appendicitis on his 79th birthday and was hospitalized. He was
    five days in the ICU and seven days on wards. And, that was definitely a challenge having to navigate that and, you know,
    that no one being allowed to go in. He's in Virginia and I'm in North Carolina. And when I first got the call, I wasn't
    even going to go up there because I knew that I wouldn't be able to see him. And it was supposed to be a same day procedure.
    And then when they had to open it up and it still wasn't a same day procedure, I was like, Well, I'm still not going to
    be allowed to do anything, so, there's kind of no point in going up there. And this was at the beginning of June, so still
    in the pretty early stages of everything. And then I was still like, You know, even if I go up, I probably shouldn't see
    him because of his immune system is going to be down and all of this, as a health care worker, and thinking that there
    are potentially things that I can do to see him. And so, I wasn't even sure if I would be able to see him. He when - I
    - when he went into the ICU, especially with shortness of breath, I was like, Okay, I need to go home. But, I still was
    hesitant about seeing him when I knew that he would eventually get out. But then he volunteered me to be his home health
    therapist, even though I have not had any real experience with home health. But I think just going through that experience
    again, there are other people in my family who are in the medical field, but only being able to have one person in the
    family have direct communication with that health care team is pretty challenging. And then, even like on a physical therapy
    level, trying to figure out what I needed to do for him at home and what equipment to get and just having everything come
    through second hand, like I was able, I was told second hand that he was required minimum assistance with all of his transfers
    and mobility. But once I saw him, I was like, [unintelligible] is definitely a lot different than what I would consider
    [unintelligible]. But, then I don't know if that was lost in the translation of playing a game of telephone, or if it
    was just that when he got released from the hospital, it was like 100 degrees outside and he wasn't used to moving around
    that much anyway. So, I was thankfully able to contact some of my friends at inpatient because he was, he was a lot more
    deconditioned than I was expecting, and they relayed to me that it has been hard to do like family training, patient education
    on some of those transfers just because the visitors weren't allowed in the hospital. But I think again, as a health care
    worker, like I knew that home was going to be the best place for him just because of the stigma. And, you know, I don't
    even know if it was really a stigma because the documented cases of the COVID outbreaks and longterm care facilities are
    subacute facilities. Hopefully, that answered your question.
- speaker: Interviewer
  text: I'm wondering what the communication was like when he was on the inpatient side because I've heard lots of stories
    about, you know, family members or friends trying to get information about their loved one. Was it difficult to kind of
    get a daily sense of how your dad was doing or the challenges?
- speaker: Respondent
  text: Yeah. Like I said, it was challenging because you have to designate only one person who could talk to the medical
    team. I think we had it a little bit easier just because my father is a physician who worked in that hospital for a long
    time and we still have friends who are there. And his wife's brother ended up being his ICU nurse for a couple of nights,
    so that was really helpful. But in general, I could see how especially people who aren't medically inclined at all would
    have difficulty getting information about their family members, you know, with only having the one designated person.
    That was just a lot more hoops to go through to be able to get information to coordinate when people could talk. I think
    just another interesting thing is that my dad is not good with technology at all, but it was somewhat exciting because
    on the website, it said that they could do video calls through a certain software or whatever they had. So, that was like
    literally the only time that I was able to do a video conference
