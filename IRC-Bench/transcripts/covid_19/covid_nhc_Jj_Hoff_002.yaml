collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: Yes, I'm JJ Hoff. I am a third-year resident physician and one of the chief residents at Duke University Hospital
    Emergency Medicine. Originally from New Jersey, went to Duke actually for undergrad and then spent some years as a high
    school teacher before going back to medical school in New Jersey and then back at Duke for residency.
- speaker: Interviewer
  text: What brings you here, why did you volunteer to be interviewed today?
- speaker: Respondent
  text: I think, you know, I got an email about this project, I was, you know. What brought me to want to be part of this
    project was sort of knowing that I had pretty - you know, it was definitely a front-line experience for me, and I saw
    a lot of patients in the emergency department with COVID and saw the impact of it firsthand and I think, we as residents
    have an interesting perspective in the sense that we were trainees, right? So, we're not fully released as attending physicians
    yet, we still have someone supervising what we're doing, but we're working a lot of hours and we're seeing a lot of patients.
    And so, I think the volume of people with COVID that we're seeing in the emergency department, I think residents probably
    saw a lot of those patients. And so, I think there's an interesting perspective there where, you know, people think about
    the physicians involved in there, you know, and a lot of places, they're making a really, really great salaries and that's
    great. But residents work a lot of hours, don't make a lot of money. And so, it's similar to nursing, right where you're
    putting yourself out there and exposing yourself to a deadly virus and taking care of patients on a regular basis. And
    not necessarily, you know, making a lot of money doing it, right? And so, I think that sort of lends itself to a certain
    mindset and a certain perspective that that can be a little bit different from others.
- speaker: Interviewer
  text: Yeah, I think you bring up a great point about the difference. With you being still a physician, but definitely a
    trainee and being in a really unique position in that way. So, kind of keeping that in mind and then you also mentioned
    you were chief resident in the program here. Can you talk me through a typical day for you at work in the last few weeks?
- speaker: Respondent
  text: A typical day for me at work in the last few weeks. So, if I am scheduled to work a shift, which is most days, we
    generally work eight hour shifts and that'll be from 7 a.m. to 3 p.m. and 3 p.m. to 11 p.m. or 11 p.m. to 7 a.m. So, if
    I'm working, let's say a 3 p.m. to 11 p.m. shift, typical day, I'll probably wake up around 6:30/7:00 a.m., that's when
    my one-and-a-half-year-old toddler wakes up and yells, yells for "dada" to come get him. So, I'm usually working on getting
    breakfast ready for him and getting coffee ready for me and the wife, and then hanging out with him for a few hours. And
    then, you know, usually I have, you know, 5-10 emails that I have to answer from a chief resident job status to work on
    either scheduling for our residents, the educational conference we do every week for our residents or we have ongoing
    learning and training, coordinating various meetings and things like that and might have a Zoom meeting or two to go to
    in the morning as well. And then, yeah, put my son down for a nap around noon, 1:00 and then start to get mentally prepared
    to go into shifts. So, what that looks like is throwing on scrubs, which I keep separate from other clothes and going
    to find my badge, which I keep in the garage and don't bring in the house, and my work backpack that I also keep in the
    garage and haven't brought in the house for a year and then heading off to work. And usually on a typical shift, we'll
    see, probably, you know, in an eight hour shift, we'll see 10, 15, 20 patients in eight hours and the last few weeks,
    you know, the COVID numbers have thankfully come down a decent amount, but you'll still see probably three, four or five
    of those patients may have recently had COVID or be exposed to COVID or being tested for it or actually have it. And then,
    you know, we still see a large number of patients that you look in their chart and you see, oh, they had COVID, you know,
    five or six months ago. And so, yeah, so you're kind of running around for eight hours straight, seeing a lot of patients
    taking care, a lot of really, really sick people, which we do every single day. And then you usually get out of there
    around midnight, come home, take everything off in the garage and go straight to the shower without touching anything
    or anyone. And then, yeah, and I can finally, like, settle down and breathe a little bit. It usually takes me like if
    I'm technically done with shift and signing out my patients around 11:00, it usually takes me until like two, two and
    a half hours after a shift to kind of mentally come back down to Earth and feel like I'm in a calm enough place to go
    to sleep. I sort of need that wind down time. It's very important for me, and it's especially become true over the last
    year with the pandemic. I think it's never easy to kind of turn your brain off after an emergency medicine shift, but
    it's becoming incredibly more difficult to do that, especially now with the amount of volume and the amount of really,
    really sick people we've been seeing and sort of the anxiety that comes around working in a pandemic. You know, I need
    to sort of decompress for a long time and get the wheels to stop spinning, so to speak to get to a place where I can feel
    like I'm back to a normal spot where I can relax and go to sleep is one thing, or like hang out with my kid. Stuff like
    that.
- speaker: Interviewer
  text: Yeah. No, I think it definitely see how, you know, you're kind of like in a constant heightened state where you might
    not have been, otherwise. So, I guess kind of if you can, and I know it's kind of hard since the pandemic has done something
    weird to our brains and time. If you could take me back to actually a typical day at work for you before COVID, like what
    are somethings that were very different or that stick out to you now that were normal then that would not fly now or would
    not be normal.
- speaker: Respondent
  text: The biggest, the biggest thing that we joke about all the time on shift with me and my coworkers, other residents,
    nurses and techs is that we never wear masks. I mean, like we seeing patients back before COVID. The biggest difference
    was that you almost never wore any sort of mask to go see a patient. Right? The only, the only times I can remember putting
    on a mask for when you were worried about a patient possibly having the flu. And then we would throw on just our regular
    surgical mask that you see out and about every day now. And sometimes you honestly forgot. We were supposed to follow
    all those precautions and be careful with that. But sometimes it was like, Oh, well, like, I went back in and I forgot
    about it. It is what it is. But yeah, and so, like for me now going to work, you know, I never see the bottom of my coworkers
    faces. And that's a huge, huge difference, right? The first-year residents this year, they came in July, so right in the
    middle of everything, and we literally had not seen the bottom of their faces until we saw them outside in a socially
    distanced hangout like a month or two ago, like legitimately didn't know what the bottom of their faces look like in person
    until that, and that's just very, very strange. I think a lot of the art of medicine is establishing relationships with
    your patients and the humanity in that, and it's much harder to do that when you can't see my facial expressions, right?
    And especially when you're working with COVID patients where you're in like almost a space suit situation where I'm wearing
    eye protection, I'm wearing two masks. Sometimes I'm wearing a PAPR [Powered Air Purifying Respirator] hood where I have
    the whole thing covered, a big gown and gloves and everything. And so, the humanity just disappears, right? It's so much
    harder to make that connection where you know, the most important part of our job as emergency medicine is that you have
    like 5, 10 minutes on the worst day of someone's life to establish a rapport with them and establish a relationship. And,
    you know, get them to trust you and their family to trust you. And it's so much harder to do that when they can't see
    who you are. So, that's been really striking for me. I think, you know, thinking back, we used to like eat snacks in the
    work area, in the emergency department. That's completely foreign to me now, right? Even the thought of doing that. And
    yeah, I think just even beyond that, I think it all kind of boils down to the huge difference between working pre-pandemic
    and working now is just the life the general heightened state that exists when you're on shift because you're always kind
    of on edge that there's this invisible thing that's there that is deadly and that has ravaged the world and you're constantly
    seeing sick people come in that may or may not have it. And so, it's just there's always this invisible enemy that exists
    and that you're constantly thinking about where in a pre-pandemic world it was like, I'm just in going the shift. I'm
    wearing whatever I want to wear or eating whatever I want to eat whenever I want to eat and drinking whatever, I want
    to drink and I'm not worried about some sort of existential threat to me or my family or my coworkers. So, that, that
    sense of calm, it's just gone. So, there's always there's always an underlying sort of undercurrent of anxiety at work
    now, which didn't exist before it.
- speaker: Interviewer
  text: Yeah, I think that makes total sense, and there is just so much about being in that clinical space, especially definitely
    on the front-lines. You mentioned only having 5 to 10 minutes to develop rapport with your patients, where ordinarily
    it wouldn't be that hard, but you feel that you know, the body suit, the armor that you have to wear before going in,
    right, kind of impedes that. Do you feel like you still have any stories or moments you might have shared with patients
    that despite all of that, have been really meaningful to you during the pandemic? And of course, being cognizant of HIPAA
    [Health Insurance Portability and Accountability Act], like not mentioning specific names or identifying information.
- speaker: Respondent
  text: Yeah, I mean, it's I mean, there's been some really tough moments of, you know, like I had a woman who went to her
    grandson's birthday party and then five days later got symptoms and then, like four days after that was in our emergency
    department and her oxygen saturation was 9%. But she could talk to me and was clearly very sick, and it was sort of one
    of those moments where I know and she knew how sick she was, but I know that this is not going to go well. And so, I immediately
    have to in my full on PAPR suit and everything. Get her to trust me and say, Hey, listen, I'm Dr. Hoff. You are very,
    very sick and you have COVID, and I'm concerned that we're going to need to put you on a breathing machine. Is that something
    you want? And you know, that's a ridiculous conversation to have with anybody. But to do that, you know, I just met you
    10 seconds ago and you have no idea who I am and you're completely terrified. And I think that the like, that's just a
    ridiculous set up for a relationship to begin with. Right? And so, but that's part of our job. And now I'm doing that
    where I can't sit there and hold their hand. I can't, I can't, you know, do the basic things we do to try and establish
    a relationship with someone and establish rapport with someone. And people are frantically moving in and out of the room,
    and it's loud because the HEPA [High Efficiency Particulate Air] filter is going. And it's just, it just feels like chaos.
    And it doesn't feel like a sincere moment or I can have a frank discussion with someone about this is possibly the end
    of their life. And I think that's a really powerful thing that is become part of our job. It was always part of the job
    that you would have very serious conversations and very difficult moments. But it was, you know, when it just always felt
    a little less chaotic and you finally get a little more control over it. And it felt like COVID kind of zapped a lot of
    that control that we had where someone's oxygen was 9% and they were totally healthy 10 days ago. Like that, that's not
    a very common thing, but that became very common people who might have had, you know, just a little bit of high blood
    pressure and taking medication for that. And then they catch this virus and they're dying a week later that that that
    didn't happen before. And now it's happening on the level of thousands of people. And so, it's just such a far cry from
    the emergency medicine that we all thought we were getting into in the first place. And so, I think to go back to the
    question, yeah, I think there were there were a lot of moments like that where you have to have really, really difficult
    conversations in a really impersonal fashion and that you're all feel separated by the moment and by the stuff that you're
    wearing and they're really, really crucial. So, yeah, and those things always stick with you. I mean, like I, I take pride
    in that part of the job is having difficult conversations, but it just became so much harder this past year, and it definitely
    lingers a little more when, you know, usually families have a little bit of time to process these things. And it just
    became they became so much less time for families to process their loved ones being sick. And so, you know, I think of
    having phone conversations where, you know, the conversations of, hey, you know, your husband's here. We think we need
    to put him on a breathing machine or he needs to be in the intensive care unit. Did he ever talk to you about his wishes
    around that? And they're like, no, because he was a totally normal, healthy person a week ago and like, no, I never even
