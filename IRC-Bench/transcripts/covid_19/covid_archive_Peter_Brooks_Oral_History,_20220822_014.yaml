turns:
- speaker: Interviewer
  text: Would you just start by introducing yourself to anyone who might find themselves listening? What would you want them
    to know about you?
- speaker: Respondent
  text: Oh, wow. Let's see. My name is Peter Brooks, I was born in Washington DC. And, you know, was very fortunate to be
    born into a good family. My grandfather was extremely famous. So I had the privilege of getting a really good education
    growing up, and, you know, different opportunities and stuff. But I consider myself a helper, and a visionary, and, you
    know, activist, you know, spiritual person. And I just, yeah, try to help out when I can. What master's degree are from
    New York University, undergraduate from McDaniel College. And, you know, it the, well, we'll deal with the pandemic later,
    I guess. But I used to be a college professor for many years and was a filmmaker as well. And now I teach a class and
    stress reduction for veterans, here in Maryland, pretty much work for the state. Helping people to chill out. So.
- speaker: Interviewer
  text: Tell me a story about your life during the pandemic?
- speaker: Respondent
  text: Well, you know, it was, it was a confluence of many difficult things happening. You know, my son was in high school.
    We were, were very, very traumatized by the election of Donald Trump, we just couldn't believe the American people would
    do that. And they did and sustained it for some time. So that was, that was a very difficult thing for us. And I was working
    in a, in a really dead end job. And of course, with no money, your marriage is always strained. And it was in senior living,
    I was a temporary worker. And I remember, you know, before the pandemic, one of my co workers had said, you know, like,
    what are you doing here, you know, and it really just struck me, because I didn't know what I was doing there. I mean,
    you know, the economy was crashing, it was really hard for, for people of color. You always, I always really wanted to
    do something great with my life. But it seemed like working a corporate job, you're not going to get a chance to do that.
    It's about you know, other people having that opportunity. But I always felt I had so much to share. So, you know, I was
    working in this clerical job when the pandemic hit, and it was in senior living. And I remember at the time the CPAC conference
    was going on. And some of the executives that I worked closely with had been to that conference. And sounded to me, like,
    you know, his voice was changing, like, he may have been sick. So I was panicked. I thought I really, I had been exposed
    to it. I didn't know what that meant, and everything that goes along with it. I thought it was you know, highly contagious.
    It was like the movie, you know, where the people are on the docks, and they're all getting sick and turning into something
    or whatever. And so I had said to my family, that I needed to probably isolate myself, because I felt I had been exposed.
    And I don't know, I just never went back to work after that. You know, just I don't know whether it was the way that the
    job handled it. You know, I thought, I guess they did a good job. But they were getting frustrated with me because I was
    getting so in credibly bored at the job. So that was really helpful. And what happened was I use the pandemic to kind
    of reinvent myself and do more of the things that I wanted to do. Because, you know, I was confronted with the idea that,
    wow, if I die, who's going to take care of these people, what's going to be my legacy? You know, how will I be remembered?
    What will what will I have accomplished, and so on? I started to take those questions really seriously. And I knew that
    you know, you know, sitting around pushing papers, or, in this case pushing Excel files, or what have you, you know, wasn't
    gonna get you anywhere I needed to be out and, you know, use my energy and feel like I was making a difference and doing
    important work and something significant. And so it wasn't affording me that opportunity. And then I knew also if I was
    because I'm a kind of a bold person. So if I was going to do some kind of activism or something, you know, it was, it
    was a good chance, I was gonna get in trouble. I didn't know how far you know, I was, we were extremely fortunate that
    the Trump and, and the right wing, and maybe it's not true that they were not that organized, because it would have been
    really easy to find me, you know, as a very strong anti Trump left person, I was constantly, you know, communicating in
    formation about that I see myself, my stepfather was a newspaper publisher, it really had a big impact on me, especially
    when Facebook came out, because it was like, this was that man's dream, this was my dad's dream, you know, cuz we putting
    out the paper man, it was so much work, you know, like three o'clock in the morning waiting for the color ads to come
    down and stuffing them in the paper and running them into the car, delivering them out to the places they had to go, and
    everybody running as fast as they can, finding people to get in there and do the job. And oh, my gosh, laying out a paper
    and the reporters and how many words and do have a photograph. And I mean, it's just so many things where, you know, coming
    together, it was a huge operation about, I guess, a sixth floor building, and all six floors, were just running the newspaper,
    including the printing press, which was, you know, huge, loud monstrosity. So, compared to how clean Facebook is, and
    efficient, and how you can reach specific audiences and things like that, that would have been his dream come true, I
    think he would have been horrified by the attention span. But other than that, and so I began to see that too. And I thought,
    you know, this is my generation, this is my time, Facebook is what my, you know, people came up with, or what's the most
    popular thing right now. So, you know, I'm going to leverage that it's, it's, you know, if you're, if you're going up
    in these different areas, like my dad fought in World War Two, and that was just his era. And he did, he volunteered.
    And he did that just because that's what he felt, you know, his generation was responsible for doing. So that was what
    mine was mine was to try to leverage Facebook in order to change the world. And I remember back then, before, just before
    the pandemic, I was trying to organize like Saturday classes. At the time, they were like, for business owners and marketing
    and stuff like that. And it was even then it was really hard to get people to show up to class. Of course, I was charging
    tuition at all, but But I think, you know, one of the things that pandemic did do is it, it's sort of, we all I think
    maybe maybe it's just me, but we all have a certain anxiety or fear about going to an event or social event. And I think
    we're all like halfway driving, they're like, why am I doing this, I really don't want to go I'd rather just go back,
    go back and watch TV or, or sit in bed or do Facebook. And I think in some ways, the pandemic has really exacerbated that.
    People are now less, you know, they have way more excuses to blow stuff off. You know, and they're legitimate, you know,
    my throat, so I have a sore throat, you know, and so, yeah, stay away, don't come, you know, and, you know, for an event
    planner, person with interested in social change. That's absolutely horrific. I mean, we need numbers, you know, when
    we do these things. So, yeah, so that's kind of my my pandemic story. I mean, it brought up a lot of historical trauma,
    around disease. I mean, I'm fully aware that so much of the Native American population died as a result of disease. And
    then just culture shock. And culture shock always gets me to you know, people are just like this meeting, I left people
    are just so snipey towards each other and trying to prove that they're smarter than someone else or that someone else
    has made a mistake or, or that they haven't thought this through all the way. And I thought it through and I just heard
    about it, you know, and you didn't think of this. And so that is always been really, really painful to me. And then you
    know, Even as a child, like when people when you grow up and you know, someone says, oh gosh, I just love cheddar cheese,
    and then some insurances. I can't. And that stuff is awful. It just like your feelings are so like, wow, how could someone
    feel that way about cheddar cheese, you know. And of course, that happens a lot in the arts and stuff too. But it's even
    worse online. And with the, you know, the zoom and the emails and stuff like that, that there hasn't been those social,
    like boundaries and lubricants have not really fully developed yet. of, you know, etiquette, and you know, what's right,
    and compassion and empathy. I think there are a lot harder in zoom and with the email and the technology and Facebook
    and stuff, you know, you can, you can just say stuff, the fate on Facebook is flames and all and nobody cares, because
    you're, you know, you're gone anyway or whatever. So because it is, it's like a flowing stream, it just, things just flow
    right by on Facebook. It's like watching a water. Waterfall. So, so yeah, that's pretty much my pandemic story in a roundabout
    way.
- speaker: Interviewer
  text: Do you remember when you first heard about COVID-19?
- speaker: Respondent
  text: Yeah, I was, I was in the office, I was on the computer, I was obsessed with finding out more information. I remember
    I probably called my brother, or my mother, you know, to talk about it. And, you know, I just I, I believed the hype.
    And you know, looking back, it's, it's an interesting phenomenon, how the news can, you know, just by the ubiquitous nature
    of it, it's, um, the presence can drive people to a state of panic. Versus things we don't know. You know, I often cite
    that my father moved into this area around the Great Depression in the middle Atlantic states, Maryland, Washington and
    stuff. And at the time, we never, he never heard of a tornado ever, ever. And it wasn't until, you know, the 70s that
    the first or really the 80s. Yeah, it was the, it was the 80s I think I had graduated, so probably 88 or so that we had
    a tornado in our area. And then all of a sudden, there seemed to be a lot of them. And so, you know, I would always say,
    Well, isn't this indicative of where we're going to? Now? No, it's communications, you know, tornadoes were hit before
    nobody knew. So I never, you know, I never quite went for that. I think that, you know, it was indicative, but, you know,
    the global communications, as we know, more, you know, we become more aware of the danger. And so, we're just a lot more
    frightened, you know, if a tornado is in your neighborhood, and of course, the news announces that you're in a state of
    panic, you know, should we go downstairs? Do we have the lights and data, but if there is no Facebook, if there is no
    news or radio, it's something and it tornadoes in your area, you're oblivious to it, you know, so the knowledge and getting
    information at all, can really manipulate people's emotions. And I think that happened a lot to me during COVID. Because
    like I said, when I first heard of it.
