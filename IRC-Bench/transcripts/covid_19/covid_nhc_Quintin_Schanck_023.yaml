collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: I was hoping that you could introduce yourself, your role here, and something that you like to do outside of work.
- speaker: Respondent
  text: My name is Quintin Schanck. I am the laboratory manager at Clark Fork Valley Hospital in Plains, Montana. And outside
    of work, I like to hunt and fish and do outdoor activities.
- speaker: Interviewer
  text: I thought we would start by you maybe describing what made you want to volunteer to do this project.
- speaker: Respondent
  text: What made me want to volunteer for this project is I think it's important to get the laboratory's perspective on how
    we handled the COVID-19 crisis. I think providers and nursing staff get a lot of recognition for being the heroes behind
    COVID-19. But I think the laboratory also played a major role.
- speaker: Interviewer
  text: Taking kind of a step back, what initially drew you to working in laboratories in the first place?
- speaker: Respondent
  text: I was interested in working in laboratories since my years at the University of Wyoming. I was always more interested
    in the laboratory part of my classes. In other words, just doing my science projects and things compared to the actual
    scholastic work. And so, I was really drawn to just working in the laboratory that way.
- speaker: Interviewer
  text: Could you maybe walk me through a typical day, maybe in the height of the pandemic, what that looked like for you?
- speaker: Respondent
  text: I would say a typical day during the pandemic involved a lot of I would say involved a lot of - I'm trying to look
    for the best word here, but a lot of adjusting on the fly, I guess. We had a lot of changes coming at us very routinely.
    Sometimes it was day-to-day or week-to-week and so we were having to adjust our methods, protocols and procedures very
    rapidly. And I want to praise my staff. They did a great job handling that.
- speaker: Interviewer
  text: Where were you getting - who were kind of the decision makers for those pivots?
- speaker: Respondent
  text: The decision makers for the pivots were our administration team, but also the state of Montana Public Health and the
    CDC. We were trying to stay compliant with all the different guidelines that were coming out. And I was referencing especially
    CDC and State of Montana very, very regularly, daily even.
- speaker: Interviewer
  text: Could you speak a little bit to the kind of new roles you might have had to take on as a laboratory manager during
    that time?
- speaker: Respondent
  text: Yeah, the new roles I had to take on were I had to do a lot more reporting. We were keeping a lot more, being a lot
    more attentive to our inventory of supplies. And I was putting out probably six to seven additional reports every morning
    that I wasn't having to do before. Just pretty much all COVID related or inventory related.
- speaker: Interviewer
  text: Wow, that seems to really - that sounds like a lot more to add on to your plate.
- speaker: Respondent
  text: Yeah, it was. I think I'm not the only one that had to do that, but it definitely was a big adjustment.
- speaker: Interviewer
  text: And then you spoke highly of your team just a second ago. What was that like for them transitioning into that time?
- speaker: Respondent
  text: I think for my team transitioning, it was just kind of like everybody else, just kind of wondering what was going
    to happen next. I would instruct them on protocol or something we needed to do. And then a lot of times a day later or
    a couple of days later, that protocol or procedure would change. And so, I think that they were very willing to adapt
    with the changes and understanding that it wasn't something we were just making up we were mandated to do. So, yeah. They
    did a very good job, in my opinion of handling all that.
- speaker: Interviewer
  text: Beyond just like having to pivot, which is such a significant thing to be doing, were there other challenges that
    you or your team or department were facing during this time?
- speaker: Respondent
  text: Yes. I think that the some of the challenges we experienced during this time where we had employees that were stricken
    by COVID-19. So, we had staffing challenges, we had supply issue challenges. It seemed like the major focus in the industry
    was on COVID-19 and all the resources went to the manufacturing reagents and test kits and so forth for that. And in turn,
    that left us short with other supplies. And so, that became a very big challenge trying to acquire the supplies we need
    for our routine testing as well.
- speaker: Interviewer
  text: Working in a rural hospital, do you feel like there were advantages to that during this time as well as potential
    challenges?
- speaker: Respondent
  text: I think that there were advantages and disadvantages both in that. I think the advantages are we're small. So, I think
    it's easier to adapt to change because we don't have as many people to retrain and so forth. I think we had a little bit
    of a disadvantage because it seemed like the supplies were more push towards the larger facilities, obviously because
    they have higher populations. But, and so, I felt a little bit like we were not forgotten but kind of told to wait for
    certain things until the larger facilities got what they needed.
- speaker: Interviewer
  text: Are there any examples that stand out in your mind because of this kind of bottlenecking of the resources you would
    need, that you feel like patients weren't getting the care that they needed?
- speaker: Respondent
  text: I don't think that we experienced the patients not getting the care we needed because we were very proactive when
    this started. We started our respiratory infection clinic before even some of the larger cities around us did just in
    preparation for this. So, we were very well prepared for when COVID reached our area. Of course, it had been in other
    areas in the country, you know, previously, and we knew it was coming. So, we had some heads up. But I think we were very
    proactive in getting things prepared before it actually hit here.
- speaker: Interviewer
  text: What was your perception of the support both in the community and as like a system here for you and your team?
- speaker: Respondent
  text: I think our support system here and for our team was very good. I think our administration was very supportive. I
    think our providers are very supportive and I think it was a very confusing time for all of us. And I think that we communicated
    well. We held meetings regularly and communicated very often to try to get everybody on the same line and in alignment.
    So, I think that it was very supportive, I would say.
- speaker: Interviewer
  text: Were either family or friends ever worried about you working in a health care setting during the pandemic?
- speaker: Respondent
  text: Yeah, I can honestly say that my family was worried about me working in a health care setting, especially since we
    were doing a lot of the testing and a lot of the specimen of, you know, specimen collection. So, yeah, they were nervous
    about that. I tried to reassure them that we were being as safe as possible and still are as a matter of fact. But, you
    know, that we were taking all the precautions we could, but that it was, you know, our responsibility to take care of
    patients. That's what you know, that's why we're here and that's our goal.
- speaker: Interviewer
  text: It kind of reminds me of what you were talking about, about like health care workers being heroes and sometimes the
    lab, the people who are working in the laboratory being overlooked. What do you think that's about?
- speaker: Respondent
  text: I just think that we're not as we don't have the like the lobbying position that some of the provider groups do or
    the nursing groups do. We're for the most part, most laboratorians are very tend to be very intrinsic and not willing
    to, like, throw ourselves out there in the spotlight. And, you know, so we were always a supportive role, but I think
    a very important role.
- speaker: Interviewer
  text: Thinking back just towards, like, your family and their concern, how did you deal with that?
- speaker: Respondent
  text: To deal with their concerns, I just try to be as comforting as possible and try to stay positive. I know it was a
    difficult situation, but I felt pretty confident that using the right PPE and taking the precautions that we did, that
    I was safe as I could be not knowing at the time, especially in the beginning, how contagious this was or anything. But,
    you know, we are very diligent about our PPE and our cleaning procedures. And we just tried to stay on top of everything.
    And we didn't let anybody circumvent the rules. We were very proactive about, you know, making sure that our employees
    were as safe as possible.
- speaker: Interviewer
  text: Was there any difficulty making sure that employees were really, like, abiding by the rules? Was there any kind of,
    like, mixed feelings about that?
- speaker: Respondent
  text: There were. There were there were mixed feelings. Even going back to the beginning of the epidemic, I think that there
    was a lot of political differences and people had different opinions about how this should be handled. And in the laboratory
    department that I manage, it was no different. There were certain employees that had different political views than others.
    And so, it was a little bit difficult trying to get everybody row in the same way, you know?
- speaker: Interviewer
  text: Thinking about you were mentioning that for you staying positive was really helpful for you and your family. Are there
    certain support practices that you have found helpful for your team to have?
- speaker: Respondent
  text: The support practices I think we're all based on probably the statistics that I was able to get on a daily basis of
    how the pandemic was going in our area. And we're a very rural community, so it was very slow at first and then it really
    ramped up and now it's starting to taper off again. But I think just being a good communicator and giving them the numbers
    every day was very helpful. And so, they could see, you know, how prevalent it was in our area, what the death rate was,
    etc.
- speaker: Interviewer
  text: Was there anyone that maybe said, like, I'd rather kind of just like, not think about it, put my head down, do the
    rules but that's not what I need right now?
- speaker: Respondent
  text: I think that people that don't want to follow the rules there probably were a few. They didn't express their concerns
    to me because I was trying to express the wishes of our administration and our hospital. And so, I was trying to enforce
    those rules. And but I'm sure that not every employee agreed with them or wanted to do them, but they were not that vocal
    to me.
- speaker: Interviewer
  text: I think a lot about the way that COVID has impacted people's sense of community or ability to interact with community.
    Has that been something that you've experienced during the pandemic?
- speaker: Respondent
  text: I would say my sense of community was probably - I probably earned a greater need for community. I'm a pretty private
    person, but I do like to go to social gatherings and restaurants and things. And so, for me, that was tough when we weren't
    able to do that. So, I was very appreciative when things started to open up again.
- speaker: Interviewer
  text: Thinking about people finally kind of being able to interact a little bit more. Do you mind if I ask if you've been
    vaccinated and what your thought process around that was like?
- speaker: Respondent
  text: I have been vaccinated and my thought process behind that was I want to protect myself, but I also want to protect
