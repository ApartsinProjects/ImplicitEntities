collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: Tell me a story about your life during the pandemic.
- speaker: Respondent
  text: Well, it started out pretty scared during the pandemic, because when they announced that we would begin working from
    home, it was like, very sudden, and I had to leave, I remember leaving the office and going home to get my laptop because
    I had to get someone from IT to set it up. So I could work from home. And then they sent a crazy email to where we didn't
    know, you know whether or not we're going to have jobs, even though our computers were set up. And they were just saying,
    Hey, we hope we're going to be able to still maintain business at the law firm, but if not, you know, we just won't be
    able to, but they've been going strong ever since then we, a lot of people, I caught COVID. During the pandemic, it was
    in the beginning of December of twenty nine, no 2020, after going to a funeral, went to a funeral saw a classmate there,
    we both ended up with COVID She ended up passing I was, you know, it was like the, you know, we were talking daily about
    our COVID experiences as far as like our symptoms. And then her daughter sent me a message through Facebook and said that
    she had passed. And that's scared the death out of me because you know, we were just both talking, you know, both congested,
    and I had no idea that she was going to get sick enough to go to the hospital and die. So that made me very scared. I'm
    just happy to have gotten out of the out of having COVID. Fast forward to February, got an opportunity to take the COVID
    vaccine, because both of my parents are high risk. When I took the COVID vaccine, and I remember going, I went to Albany,
    I had to go to the I think it was a military base in ALbany, it was packed. And we pulled up and then all of a sudden,
    you know, I was like no, I'm not going to do this. Something just kind of told me Don't do it. But I was in the car and
    my aunt she was like no, you got to do it. Did it, immediately got a metal taste in my mouth. Kind of felt sick. I had
    to get a bottle of water. And by the time we made it back to my one of my parents home, which was like a hour and a half
    drive from Albany. I was limping. And then you know reported everything [in audible] after limping. The next day I woke
    up and had of course I had this lump in my arm and then I noticed this blistering rash that was down my injection arm
    and I was using Benadryl it was just the sore and blustery, and then it's like it oozed, then that healed and then probably
    like a week later, I was at the ortho with my knee because my knee never got better. And given molosicam for inflammation.
    And then fast forward to my second injection, which I believe was in March, toward the end of March or at the beginning
    of April. I told them that one I took at the Delta museum told them about my reaction. And they checked my mayor's report
    and call someone who cleared me to go ahead and take the second shot, took the second shot and the next day could not
    walk and had a very high fever of like 103 just like it was when I had COVID and my mom had gotten her her second shot
    the day before me and she was fine and my mom was like 70 I think she was 72 at the time. So there she is trying to get
    me out the bed enough to where I could crawl, you know, to go to the bathroom and crawl to the kitchen so she could give
    me some soup and try to, you know, get me together. And I remember my one of my brothers having to come help me get back
    in the bed. And that lasted for probably two days because I missed two days of work, I went to get the shot on a Friday,
    and then I didn't get back to work till Wednesday, when I was able to walk, and then going forward, both knees are bothering
    me and my hips are bothering me I had swollen joints, I mean, like very swollen and my ankles were the size of a orange,
    the navel orange at any given moment. And it was very painful and still painful two, two plus years later, and went to
    the doctor's my primary care doctor finally told me last year, it was around August of last year that, you know, hey,
    I think you may have a vaccine syndrome. And he asked me not to continue all my education until I get better. So at this
    point, I'm trying to get better so I can finish my my education in law school and just, I mean, get back to my normal
    life I have not been able to work out. And over two years, I've gained at least 30 pounds. Before then I used to go to
    the gym, gym membership, walk, run, I cannot run, jog, I barely can walk I have my crutches beside me today. But I did
    get a stem cell experimental, I had to pay to get stem cell and plasma injections in my joints. So I am in week three,
    tomorrow, make week three of my recovery. Hopefully, in six to eight weeks, I'll hopefully be somewhat back to normal.
    And just trying to stay positive and not be so angry. Especially at the government. Because you know, after the fact,
    a lot of people that I know that have gotten vaccinated have either died very close friends mom died after getting the
    vaccine and she swore by it. She ended up dying with COVID. And a lot of other people in my age range have died, that
    have taken the vaccine. So I feel like wasn't that much transparency in it. I have a family member that is an epidemiologist.
    She did not take the vaccine and could not warn me ahead of time on why she felt like I should not have taken it. So she's
    pretty much trying to help me fight to get my life back. And, you know, keep me abreast of anything that she finds out
    that may be helpful in my recovery.
- speaker: Interviewer
  text: Do you remember when you first heard about COVID-19?
- speaker: Respondent
  text: Yeah, actually it was my birthday is March 13. So that was on a Friday, I was getting my, I went to my primary care
    for my yearly exam and physical. And I remember my phone just kept going off and they were talking about shutting stuff
    down and about COVID. That was the first time I actually paid attention to hear about COVID Because like everybody was
    scrambling. I had a birthday dinner and I was like I don't want to I don't want to cancel it. But everybody was getting
    scared. One of my other siblings happened to be in Puerto Rico and he had to rush back to get back to Georgia with his
    family. And I remember after we had it, we had a good time that night at dinner, and then Monday it was like everything
    was shut down on the fifth March the 15th I think it was or March 16 That was when they you know started shutting everything
    down. And I remember being scared about groceries, water, no tissue. But you know had a I'm a Sam's Club member so I had
    tissue and water to kind of tie me over but in the meantime I was like on Amazon and everywhere trying to figure out where
    I would get stuff to keep things sanitary, like Lysol they were charging $20 a can or more for Lysol could not find Clorox
    anywhere. My dad's a chemical engineer, so he told me how to mix up something that could keep us germ free. So I followed
    his directions as what as to what to mix to kind of keep us safe until we could get Clorox or anything like that. That
    was what I remember. After I was told or once I once I first knew about COVID.
- speaker: Interviewer
  text: Pre pandemic, what was your day to day looking like?
- speaker: Respondent
  text: It was wonderful. It was just like, No, no concerns just going to work, doing what I needed to do. Being let me take
    a step back, I also have, I've been diagnosed with lung COVID. So minus the brain fog, I did not have any brain fog, didn't
    have to stop to try and figure out how to spell words is kind of weird. Because you know how I felt then verses now, felt
    great, workout daily, ate healthy, was able to get out more of my friends. Now I have to see if my body's going to allow
    me to get out. So.
- speaker: Interviewer
  text: To the extent that you're comfortable sharing, would you say something about your experiences with health and healthcare,
    infrastructure, pre pandemic?
- speaker: Respondent
  text: With health, you know, 2020 vision. No, no problems at all. Everything was bloodwork wonderful, perfect weight. And
    health care has changed a lot, because a lot of the prescriptions that I've been prescribed for for my illness, I can't
    get her I have to argue with my health insurance. And I've had the same I've worked with the same law firm for like four
    years. So I'm having to argue with them and say, Hey, how dare you tell me that I can't get something or refuse to fill
    something that my doctor said that I needed. And you're not providing me with an alternative, you're just saying I can't
    get it. So that's, that's what I remember beforehand, I could get anything, like, but I noticed that they'll give me any
    kind of narcotic pill that I don't want, I can get that easy. I have tons of narcotic pills. But yeah, and I don't like
    that, because a lot of stuff I can use like to rub on my joints, they will not allow me to get it without having to pay
    three and $400 for it. So I have to go outside of my health insurance without really want it, which I'm not willing to
    do. Because I'm having to pay like $1,200 to get treatments and $400 injections, you know, stuff that I wouldn't normally
    have to pay for. So it's very expensive. It's like I'm working just to pay for my health.
- speaker: Interviewer
  text: Are you comfortable sharing any of the treatment options that you've wanted that the insurance has been unwilling
    to fund?
- speaker: Respondent
  text: One was the plasma, plasma and stem cell injections, I had to pay $1,200 a few weeks ago to get those also coming
    up, I'm going to do the, think it's called ortho risk injections for my knees. I got to pay $400 before they'll send it
    to my doctor. And, you know, basically I'm having to pay out of pocket because it's something that my insurance will not
    cover for treatment because it's considered experimental. And that's pretty much it, things that could possibly get me
    better. I'm having problems getting access to without having to spend a lot of money and to go into debt.
- speaker: Interviewer
  text: To go back to something you had said earlier. When you when you first caught COVID, at the funeral, would you tell
    me a bit about the person whose funeral it was? Who did you who did you lose?
- speaker: Respondent
  text: Yeah, I lost my nephew. He was killed by an Atlanta police officer. Kind of going to leave it at that because it's
    still an open investigation. And we're still going through it. It's been two years ago. But yeah, long story short, he
    and his girlfriend went to a club in Atlanta, one of the security guards groped her. He asked for an apology and was trying
    to defend her, security guard told him you know, wait a minute, comes out with a shotgun. Both he and the APD officer
    that was working a gig proceeded to shoot me because, I'm sorry, because my nephew down and my cousin wasn't too far away.
    But you know, it's probably a good thing that the cousin wasn't there, because it probably would have been more than one
    family member involved. And, you know, 20 he was 25 at the time Marine, you know, what, you know, work for the, for the
    country. And if that's how he gets treated when he's when he's home. So, that's his funeral we were at.
- speaker: Interviewer
  text: And would you tell me about the friend that you met up with there who also interacted COVID?
- speaker: Respondent
  text: Who, her name's, her name was Vicki Whitfill. We went to high school together. And we, you know, just been friends
    ever since high school pretty much and stayed in touch. And this is very sweet young lady. She was a nurse. But she had
    think she had gotten diabetes right beforehand and had been off of work because of her diabetes. And, you know, just decided
    to come support me at my nephew's funeral and got sick.
- speaker: Interviewer
  text: What was it like calling her back and forth when you were both sick?
