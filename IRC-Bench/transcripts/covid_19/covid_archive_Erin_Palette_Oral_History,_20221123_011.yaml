- speaker: Respondent
  text: Oh when you said this was open ended, you weren't kidding. Oh, dear. So here's the thing, I don't have much of a story
    to tell I have maybe some anecdotes. Because my experience was well, I don't know if it was different from everyone else's.
    But, Well, alright, I'm getting ahead of myself. So for people who don't know what a prepper is, I believe very strongly
    in emergency preparedness. And that involves a lot of foresight, a lot of stocking up a lot of pre gaming. In terms of
    Alright, well, what could go wrong? What will I need to have, because living in Florida, Well, we are frequently beset
    by hurricanes. And we do occasionally get tornadoes. And we frequently have fires as well that are set by lightning, Florida
    is the lightning strike capital of the United States. And so living in this disaster area, and because pre transition,
    I was an Eagle Scout, I believe very strongly in being prepared. And so the best way to be prepared for any emergency
    is to anticipate it, train for it, have the gear and the training that you need. You know, if someone is bleeding out
    in front of you, that is not the time to try to figure out how to do first aid or use a tourniquet, get this sort of training
    beforehand. And so, when the pandemic happened, most of the preppers I know, I wish I could say all of them, and I think
    it might be all of them, but I don't know for certain, but most of the preppers I know are basically yawning and going
    worst Apocalypse ever. Because we were prepared for this sort of thing. We had, well, you know, if if we are prepared
    for losing power for weeks at a time. And there are some people who are prepared for complete collapse of infrastructure
    and rule of law, then what we had was really very cushy. I have lived without power after a hurricane. It's very uncomfortable.
    And for this particular disaster. You know, we had electricity, we had Netflix, we had DoorDash where people could deliver
    food. And so it was very much a non issue for me, for my family, and for most of the preppers that I know, because we
    were prepared for so much worse. Now that said we still encountered some difficulties and some inconveniences, but for
    the most part. Well, okay, I don't want to say we were smug about it, because smugness, at least to me indicates a fair
    amount of shot in Freud. It's that haha you peons weren't prepared for this like we superior beings were. But it was more
    a case of oh, you laughed at us and you're not laughing now. So, where I lived, I live in a fairly actually it's no longer
    fairly rural, but there's a lot of wilderness in the county in Florida. Where I live, and it's a small community. And
    it's it's certainly not a bustling city. So we didn't have that urban congestion, which led to a lot of spread of the
    disease. And, where was I going with that? I hate it when I lose a train of thought. Right. Also, I am, pretty much it's
    it's not an introvert. That's the word, I'm an introvert, I don't need to go out and see people, I am pretty happy staying
    at home anyway. And so and I work from home. So it really wasn't that big of a deal. For me, I did have some concerns,
    because I live with my elderly parents who are in their 80s. And while I wasn't afraid for my health, because when I looked
    at who the disease attacked, and who was at risk, it, it seemed on paper to be the perfect Boomer killer. And everyone
    who was younger than that, unless they had a pre existing condition would be fine. They had like a 98% survival rate.
    But my parents are in their 80s. And so the elderly were at risk. And I know my father has high blood pressure and various
    other things, and he was the most at risk of all of us. And so my concern wasn't for me, it was that I would bring something
    home and infect them. And so on the rare occasions when I would go out, I would mask up and I carried a bottle of hand
    sanitizer with me. And so right before I came inside, actually, I don't remember if I did it before or after I took my
    mask off. But the point being is, before I come in, I would clean my hands and I would clean the all the surfaces on the
    car that I had touched, just because I didn't want to accidentally infect myself, and then infect my parents. But for
    the most part, it really wasn't a thing. We were inconvenienced by the toilet paper shortage. But we never really ran
    out. And we were it was difficult to get some foods. But because we were a small county, we never really ran out. Plus,
    there's the fact that viruses in general just don't do well in direct sunlight and Hello, Sunshine State. So we did very
    well, in that regard. I actually don't have the death statistics in front of me. I don't remember. I mean, we didn't escape
    completely unscathed, especially because we've got a fairly large retirement community where I live. But for the most
    part, it seemed like we were in line with the non cities of America, we had some deaths, and there was a lot of worry,
    and a fair degree of panic. But things didn't come crashing down, like a lot of people were afraid they would. And so
    I spent most of my time at home. You know, helping take care of my parents doing my writing. But because I curate a preparedness
    blog called Blue Collar Prepping thats bluecollarprepping.blogspot.com. And we have a Facebook group, and there were a
    lot of people who were worried about it. And so, I and the other people that were active in the blog and on the group,
    spent a lot of time talking to people and there would be okay, well how are you doing? How are you holding up? How are
    you doing psychologically? And I think between being prepared materially and giving people that psychological feeling
    of community, especially those who were otherwise feeling isolated. I think I helped a lot of people get through that.
    I'm not calling myself a hero. This was not a great victory. But it was a case of well, this is something that I can do.
    And so I helped some people when they were worried. And I told them like, Hey, this is what we've prepared for. You will
    be okay. Just, you know, observe hygiene. Rely on your preps. And don't panic because we've still got power. And that's
    basically how I got through the pandemic. And this is why I was so shocked when you wanted to talk to me about it, because
    in my mind, I did very little to nothing. So yeah, I've run out of steam. Ask me something.
