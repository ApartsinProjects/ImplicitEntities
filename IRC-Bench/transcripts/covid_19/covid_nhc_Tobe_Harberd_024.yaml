collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: So, if we could start if you could tell me a little bit about yourself and what you do professionally.
- speaker: Respondent
  text: My name is Tobe Harberd. I'm a family physician in Chelan, Washington, and I've been practicing here for about 12
    years. So, I do both inpatient and outpatient work, I help cover call coverage at the hospital, and I do a fair amount
    of procedural stuff as well as colonoscopies, endoscopies and surgical OB [Obstetrics]. I help teach through the University
    of Washington. I'm part of the TRUST [Targeted Rural and Underserved Track] and WRITE [WWAMI Rural Integrated Training
    Experience] program. And then I also am a faculty member with the University of Washington Family Medicine Rural Training
    Track.
- speaker: Interviewer
  text: All right. And can you walk me through what your day-to-day looks like in the past few weeks?
- speaker: Respondent
  text: So, my typical day consists of clinic, usually from 8:30 until about 5 o'clock. Generally, I'll arrive early to work
    on charts, and just administrative work. This summer, I am doing a little bit more administrative work since one of my
    partners is out on maternity leave. So, I'm doing clinic two days a week and the other two days a week I used to supervise
    the residents in the Rural Training Track. Our call rotation rotates about every four to six weeks. And so, when I'm on
    a call, then generally that day starts at 7 a.m. at the hospital till about 10 a.m. and then clinic starts after that.
    And we're on call from Friday, 7 in the morning, until the following Friday at 7 a.m. So, for seven days in a row.
- speaker: Interviewer
  text: All right. And I'm wondering if you can tell me a little bit about like the first moment that you realized that like
    COVID-19, the first, I guess the wording would be the first activity you remember participating in that was in relation
    to the pandemic?
- speaker: Respondent
  text: Yeah. So, the first notable activity from the pandemic was we were on vacation in Mexico with my family. And there,
    you know, the pandemic was getting started but hadn't really hit in the United States yet. And so, we had decided to still
    go ahead and travel. It seemed like things were pretty safe at that point but while we were out of the country on vacation
    is when things really started to develop very quickly. And so, it was a pretty stressful vacation. We weren't sure if
    we're going to be able to get home. And if so, what was that going to be like? Did we need to cancel our trip early in
    order to try and get back home? Or was it safe to even travel on the airplane? And so, it was definitely a very stressful
    situation. Certainly, pretty memorable.
- speaker: Interviewer
  text: Yeah, I'm sure. What did you guys end up doing?
- speaker: Respondent
  text: We ended up just staying until the end, because by that point we only had maybe two days left. And so, we decided
    that, Okay, we'll just go ahead and come home on our scheduled flight. And I don't think there were really any available
    earlier flights at that point anyway. And so, we stayed till the end, but they closed the borders within 24 hours of us
    returning home.
- speaker: Interviewer
  text: Wow. That's kind of scary.
- speaker: Respondent
  text: It wasn't a very relaxing vacation.
- speaker: Interviewer
  text: I'm sure. How did your work life change like after coming back from vacation?
- speaker: Respondent
  text: Yeah. So, it was very strange. When we returned from vacation, at that point, we had canceled pretty much all in-person
    visits and we were just doing phone visits. We did not have telehealth up and running yet. So, we literally were just
    doing phone calls to patients to refill medicines and follow-up on their chronic health issues or try to triage any acute
    health issues, and then we were bringing patients into the office on a really limited basis, and maybe that was like one
    or two patients out of my schedule per day. So, it went just completely switched from all in-person all day long to just
    over the phone. And so, I just remember it being a really bizarre experience. I felt like I was just sitting in a call
    center just, you know, cold calling people. So, it was strange. And I mean, we acclimated after time. We got used to it,
    but it was a big culture shock.
- speaker: Interviewer
  text: I'm sure. You mentioned that you do a lot of administrative work. I guess my next question would be what were the
    discussions going forward about, like ensuring safety for everyone?
- speaker: Respondent
  text: Yeah, so from a clinic perspective, we're pretty fortunate that we have a lot of administrative staff and our chief
    medical officer is actually the health district officer. So, we had a lot of good input from him, a lot of good guidance.
    And so, a lot of the safety measures that were implemented kind of started from the top down. And so, I think we have,
    you know, it was continuously evolving. And so, that made it a little bit tricky. But I think we did pretty good as far
    as guidance from the organization on, you know, what sort of procedures or visits were safe and how to minimize risk and
    making sure that we had appropriate amounts of PPE [Personal Protection Equipment]. And then from our perspective, you
    know, or I guess from my perspective, making sure, you know, is it still safe for our residents to be seeing patients?
    Is it safe for the students to be seeing patients? As you know, initially, a lot of those rotations and everything, you
    know, the in person portion of them came to a halt. And so, it took some time for us to kind of get back to them.
- speaker: Interviewer
  text: But yeah, that sounds like an interesting mix of things going on that you have to balance.
- speaker: Respondent
  text: Yeah, and it was constantly changing just because the guidelines were changing so quickly because this situation was
    new and continuously evolving. So, it was definitely a moving target.
- speaker: Interviewer
  text: Can you speak a little bit more about adapting to those challenges of new guidelines and also being on telehealth
    and kind of trying to navigate that?
- speaker: Respondent
  text: Yeah, I think it took a lot of flexibility on everybody's part because there was a lot of unknowns and that was pretty
    nerve wracking for folks. And so, trying to just be adaptable, knowing that when you came into the office the next day,
    the guidelines and the recommendations might be different and you need to just figure out how to kind of roll with that
    and accept it and not get frustrated because everybody was doing the best that they could with the information that they
    had. And so, remind me the second part of the question.
- speaker: Interviewer
  text: As far as like adapting to the telehealth?
- speaker: Respondent
  text: Yeah, yeah. Yeah, that was definitely different for us. And like I mentioned, we started with just phone visits and
    then our organization was pretty quick to get telehealth up and going. And so, within a few weeks, then we started doing
    a lot of telehealth visits, which seems stressful in the beginning. But once you got in and started doing it, it actually
    went quite a bit smoother than what we did envision. And really the biggest hiccup in that aspect was typically technological
    issues, you know, patients not able to log in for whatever reason or the internet going down and losing your connection.
    You have to have everybody log back in. But once they were on and you were on, the visits actually went pretty smoothly.
    And I think it was kind of surprising to us how much we were able to take care of through telehealth. And so, that certainly
    is a bit of the silver lining from the whole pandemic is that I think it really pushed telehealth to a new level and is
    much more acceptable now than it was before. It'll be much more available and acceptable.
- speaker: Interviewer
  text: All right. Jumping off of that. I guess my next question would be what do you see the long-term effects of COVID-19
    being for you professionally and then for the clinic?
- speaker: Respondent
  text: I feel like we're getting pretty close to normal now in the sense that we're allowing patients that want to come back
    in-person they're certainly able to do that. And so, we're doing all of our regular in-office visits. We still definitely
    offer telehealth and even telephone if for some reason, patients can't or don't have the equipment to do telehealth. And
    I think that's something that's going to continue on. We're going to provide that as an option for patients. And I definitely
    think it's a great option because if it's a patient that you know well and you're following up on issues, it's really
    easy to manage those over the computer and not necessarily have to have them come in and wait in the office and then wait
    in the exam room and so they can just log in from home. And I think it's much more convenient. So, I think that telehealth
    part will continue on. We're pretty much back to all of our routine procedures as far as elective procedures and things
    like that. So, I think that those will kind of settle back into normal moving forward. I think it definitely had a big
    impact on education for a lot of students and really limiting rotations during all of that. And it's taken us time to
    kind of slowly work our way out of that as students are getting back into their clinical rotations. But I think that will
    eventually kind of settle back into a bit of a more normal routine, as well. I think the one thing that will probably
    continue along with the telehealth portion is also all of our remote meetings that we do now. We realize that everybody
    doesn't need to be sitting in a conference room together all the time that you can log in remotely from wherever you're
    at to your meetings and accomplish a lot through Zoom. And I think that's been a real big convenience for folks, as well.
- speaker: Interviewer
  text: That make sense. I wonder if you could talk a little bit about maybe the long-term effects for the community. You
    mentioned education being a big thing. Maybe you could speak a little bit more about that?
- speaker: Respondent
  text: Yeah, I think, you know, unfortunately, it really hit hard as far as local businesses saw the financial impact from
    it. A lot of businesses really struggled because of having to close or having to operate at such limited capacity. And
    I think those businesses are still, you know, trying to slowly work their way back. But I think that's one of the biggest
    impacts that I've noticed. And now that the businesses are able to open back up and run at full capacity, they don't have
    employees to do that. And so, I've noticed a lot of the local restaurants are open for their regular hours because they
    just don't have the staff to cover all those hours. And so, I think that, you know, there certainly was a big financial
    impact, which, you know, a lot of folks unfortunately experience from it.
- speaker: Respondent
  text: I mean, the other part, as far as the community, too, obviously had a big impact on school and sports activities and
    things like that, and with our kids being younger and in school right now, we certainly experienced that firsthand. I
    think there is the educational aspect from college, but also from 12 and under was difficult for a lot of folks. And having
    to learn remotely from home, especially if you had two working parents, was extremely difficult. And then, you know, kids
    just seem to do really well with that routine structure. And so, taking that structure away, taking away a lot of the
    meals that were provided through school was a big impact for a lot of our local kids and so they worked really hard to
    try to keep that going. And then, although sports are certainly something that's kind of more fun for kids, it still provides
    a lot of structure for them. And I know a lot of them struggle with being able to have those regular outlets that they're
    used to.
- speaker: Interviewer
  text: Thanks. Yeah, thanks. Thanks for sharing that. My next question is, did you notice any changes in your relationships
    with your coworkers as you were trying to figure out things with COVID-19 and like managed care and all of that?
- speaker: Respondent
  text: I think there was some change in those relationships with coworkers. We're pretty close group and at least with amongst
    the medical providers. And especially because of their residency, we do a lot of activities outside of work as far as
    recruiting and dinners and getting together. And so, it was difficult for all of us to have all those activities taken
    away because we were used to being able to socialize. And so, that I think was difficult and certainly isolating. I think,
    from a health care perspective, we were fortunate in the sense that we were still, you know, we still had jobs and we
    were still getting paid. We were still coming to work and we were still interacting with our coworkers here in the office.
    And so, I think that was nice to have that ongoing social interaction. I think it could be very difficult for somebody
    who's working remotely from home and doesn't necessarily have like a, you know, a close family group or roommates or things
    like that, other folks at home. I think it could get isolating very quickly. So, and then not so much within, you know,
    necessarily the coworkers, but other social interactions outside of work because there's just a whole lot of varying opinions
    on COVID, vaccines and things like that. And so, I think, you know, on what was safe as far as activities
