collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Interviewer
  text: And so you mentioned you were a pastor what made you want to pursue a career in pastor?
- speaker: Respondent
  text: I felt a call to ministry when I was in college when I was a junior in college after working the summer before at
    a bible camp, and always had been very involved in church and in ministry and realized that's what I want to do with my
    life. So after I graduated with my bachelor's degree in zoology with teacher education, I went on to graduate work at
    Luther Seminary in St. Paul, Minnesota. And that was for four years. And then in 2002, and August 2002, it came to Boyceville.
    And the rest is history.
- speaker: Interviewer
  text: So can you talk a little bit about Boyceville, obviously, I mean, I know my fair share. But for the for the folks
    watching, they probably have never heard of Boyceville. Not that many people have.
- speaker: Respondent
  text: No. Boyceville is an incredibly small town in Northwest Wisconsin has 1083 people, I believe from our last last count.
    It is located directly due east Minneapolis, St. Paul about an hour and a half of Minneapolis, St. Paul, Minnesota, it
    is still a farming town, but majority of people will actually leave the town for work. They either go to Menomonie or
    Eau Claire or to the twin cities themselves to bigger businesses. It's a fairly close knit town, a lot of people know
    everybody and know everything about everybody. And they can tell you who lived in the house on the corner three or four
    generations back if they if you can meet the right people. Because of this, they they can be incredibly incredibly supportive.
    And you know, kind of rally together around things in a town. And it's kind of one of those places to that you can be
    gone for for a long time or you can come back and you're still kind of part of town. So you know, they don't really ever
    kind of forget you that way. Yeah, I think that said that's probably the biggest stuff has a school so we still have our
    own school. But there's not much other services in town though there are more things in town and there has been we have
    a Dollar General. We have a fitness center. You know, some of those kinds of things have kind of come into the community
    but still like if you want groceries and let's go to the dollar you're heading to the gas station or heading, driving
    15 minutes to Menomine for your groceries or basic services.
- speaker: Interviewer
  text: And as you as a pastor in the community, what is your relationship within the community look like?
- speaker: Respondent
  text: One relationship in the community is I mean besides obviously ministering to them and in all phases of life, but birth
    death marriages, all the all the things in between, um, you know, one of the one of the big things I do is just try to
    keep connection with people make connections with people whether they're young or old. I in the community besides doing
    pastoring and I done thing I like announce football games and basketball games. I work as a crossing guard I'm involved
    in in other community activities, just as to be part of the community because in a small town setting to do what I do,
    it's all about connection and relationship. People don't come to our church because we have the best program or the most
    money or fancy equipment. It's all about connecting with people where they are knowing who they are valuing who they are
    encouraging them and who they are. And that tends to, to be the main thing. Our, our church is the largest church in town,
    and has been was even the largest church in town before I arrived. But we tend to pull from a lot of different aspects
    of the town and surrounding areas.
- speaker: Interviewer
  text: Yeah, for sure. Sound like a super, super involved guy in the community. And to switch it up a little bit because-I
    at the beginning, I started talking about COVID being an active member within your community, with COVID, hitting just
    a few years ago now, what is your role in the community looked like? I mean, has it changed a lot? Are you still involved?
    Are you still getting these opportunities to be as involved?
- speaker: Respondent
  text: Well, obviously, initially, you know, in the in the first wave of COVID, obviously, we shut down like everybody else,
    school shut down, businesses shut down, we sat down, we moved to entirely online model of worship, and then actually went
    to an outside model where people were in their vehicles, and also could still watch online, we'd been prior to COVID,
    we had been doing some online stuff. And I'll always remember, there was a meeting of worship meeting a month, really
    before COVID hit where we talked about how we didn't advertise the live stream of Christmas Eve enough, and that we needed
    to make sure we did that, because we heard people like enjoyed it, because they couldn't leave families and the families
    gathered around and watched it. And so we kind of made like, maybe we should do this more often. And then obviously COVID
    hit, and we didn't have really a choice. Um, the biggest change for me, I mean, the initially was just being completely
    disconnected. You know, we, you know, everything was on, everything was online, or through phone call, or through text,
    no home visits, no hospital visits, I still unless it is end of life, cannot go into a hospital to see anybody. So you,
    you know, if you broke your leg, and I wanted to come see you, you were in the hospital, you're going to be there a couple
    days, because you had to have surgery, I can't come see you. In most cases. Same thing with nursing homes and our nursing
    home, people were very isolated, um I would do video calls with them and that kind of stuff. Now I can go into the nursing
    home because I'm vaccinated um with along with all the other restrictions. The other big change for me, and Amber, you
    will know this from your time here is I don't go into the school anymore. I've not been into the I've not been into the
    high school since 2019. To walk I would walk around in the mornings. Uh my wife is a teacher at the school for those that
    don't know, so. And I would ask permission of the administration to be able to walk into schools and, and say hi to kids,
    some of that now is because I'm doing crossing guard, but they don't want any extra visitors in the school. So other than
    for something formal, or if I'm helping my wife or something after school hours, I'm not in the building. So it makes
    it a little harder to connect with, especially with our high school kids, um, kind of have those kinds of things. The
    other thing is, you know, we is you know, we have adjusted how we do worship, we are we tend to be a little more open
    now than we were a year ago of course, with with restrictions and you know, concerns and kind of that kind of stuff, but
    I'm the biggest thing was just not being able to connect with people. And in doing so, when you did connect with people,
    it became like much longer. So like when you if you if I was on a walk outside and I saw somebody we'd at six feet a part,
    but instead of like the five minute conversation, it would be a 15 minute conversation. Because people were craving connection
    as I was too. I'm an extrovert. So to be to not be with people was a little maddening.
- speaker: Interviewer
  text: Yeah. And I, you had started to talk about um some of the different changes you had to make within your church in
    the congregation was the so you talked about you had to move online, and then you guys moved to, um, you move to doing
    the car where you did (Yeah) the outside service. Were there any other really big changes you guys made?
- speaker: Respondent
  text: Yeah. So our progression was we started with completely online and did that for really about a month. Then we went
    um outside where we were outside and online at the same time. But again, people in their cars and they were told not to
    get other vehicles for any reason. We had ushers that went around the collected offering so the interactions were very
    short. Everybody was everybody that was interacting with a car like if I went up to a car I was in a mask, and oftentimes
    we even had them keep the window up. Over time. Then we went to where we added an early 8 AM service are normal services
    at nine. The nine state outside but the 8 AM went inside and that allowed us you know once we got to a place we get 20
    to 25 people in the building We did that with social distancing moving our pews to be six feet a part, all that kind of
    stuff, we stopped passing an offering played around, we stopped, you know, we stopped sharing peace of physical expression
    of peace, they communion was all in one little thing that they would pick up on the way in and then take out with them
    and throw it out, which is also what we use for the, for the outdoor services. We did do drive to communion in which I
    would be masked and gloved and everything would be pre made, and put on a little plate and just hand it to them. And they
    would take the plate, we did that, especially on Easter and a couple of other times. As we as we got through 2020 and
    got into the into this time of year, we decided to go ahead and have in person Christmas Eve services. And normally we
    do two. And we actually did five, with a reservation system with a max of 50 people, we had our we had been able to go
    up to 50. And again, socially distance all the other kinds of things mass required at all times, no singing, which every
    once we started, we did not have communal seating, we had a song leader, I even stayed masked even though I didn't need
    to almost the entire time of this. So I was preaching in a mask and talking in a mask. And always in a mask. Even Even
    if I was 20 feet away, I stayed in a mask. Some of that was to model masking behavior in our community, which was something
    of a uphill battle early on. And it's still frankly, an uphill battle. Um, and then as things opened up and got loot,
    better, we eventually in July of this year, merged back to one service, we ended the outdoor Service came back inside,
    started again with with masks required and distancing, and no singing and eventually just removed all of the restrictions
    as we as we've gone on. And that's where we are at now, we still continue to livestream every service because people still
    want to do that. We do have people in our congregation that wear masks, I wear a mask when I'm interacting. So when I'm
    giving communion, I have a mask on. Before service after service, I have a mask on unless for some reason I have to have
    it off for some specific purpose. We also during the time, confirmation classes were all online for our youth Sunday school
    was was was virtual and was pre taped and sent out. We had no vacation bible school during, during COVID time during 2020,
    and then even in 2021. So those were some of the big, big kind of things that we we had to change. And obviously, besides
    stuff like hand sanitizer everywhere, and just being, you know, like after the Christmas services, every service, we wiped
    down every surface that somebody was at. So that meant the pew that meant door handles that meant everything you just
    we had a little team we got we get a clean team. And they would they would grab all grab stuff and clean stuff as one
    one group left, and then another group got ready to come back in. So that's kind of all the COVID prep that we did.
- speaker: Interviewer
  text: Right. And you said, you guys on Christmas Eve, you had five, like five sets of it. So then cleaning after every (YEAH)
    you probably had some (YEAH) good leaders on that clean team there.
- speaker: Respondent
  text: We did at each service kind of the ushers, and then one or two others would come in, and I would do it like, we just
    got in this habit like well, we all like took a section. So like I'd be I'd go this way and somebody would go that way.
    And somebody else would go that way. And it went, it went fairly, fairly quick that way. We also would open the doors
    up in between the services to try to vent building as best we could. And we have, okay, a track but it's not, you know,
    what you would want in these kinds of situations. So we tried to get a lot of fresh air and as much as we could in between,
    in between the services.
- speaker: Interviewer
  text: So yeah, and as someone who is from Boyceville, I knew that there was kind of a battle with mask, especially early
    on. So it's great to hear that you were, you know, using your positive role in the community and trying to, you know,
    encourage it to the best you can and to set a good example. I know you you briefly mentioned that, you know, the community's
    response to mask and stuff. So how, how do you in the actual church, though? I mean, did you did you have most most of
    the communion, they would abide by the COVID restrictions were people pretty, like pretty open to what was going on within
    the church at the time.
- speaker: Respondent
  text: Yes, I mean,
