collection: covid_oral_history
source_url: https://covid-19archive.org/
turns:
- speaker: Respondent
  text: My name is Tiffany Webber. I am an associate degree RN, not a Bachelor's RN. And I got my education here in Montana,
    actually up on the reservation at Saint Louis College is where I finished my schooling. I came to Public Health in 2018.
    I have been a clinical nurse for the last 20 years, working in hospital clinic settings, and I was roped into coming to
    public health, because there was a real need for a public health nurse here in Ravalli County. And so, I thought, Okay,
    why not? I'll give it a try. And it was a pretty big learning curve. It was a lot different type of nursing than I'm used
    to in clinic nursing. As you probably know, being a clinic person, we focus on the individual, where public health, we
    don't focus on the individual, we focus on the population as a whole. And so, yeah, it was a bit of a learning curve.
    I started out as the immunization nurse and the disease surveillance nurse, and I moved up to disease surveillance and
    emergency preparedness. And then, last year when the pandemic hit, there was a director of nursing here at the time -
    as the director of Public Health, who was a nurse - and myself, who's a nurse. And we had just brought on another third
    nurse, Kristin. And just the way things panned out, the director quit and there was no one to move up. So, I, after just
    a very short time, was moved up to director - interim director, and then last fall, I was named director after a lot of
    turmoil and search. You know, didn't really exactly want to be the director during a pandemic. But that's a battlefield
    promotion for you. I'm from here, I think that's important to note, because I think a lot of our success here in Ravalli
    County has to do with understanding our culture here in Ravalli County. And I'm from here, I'm a third generation Bitterrooter.
    And yeah, that's my story. Okay.
- speaker: Interviewer
  text: What was a typical day like at work before COVID-19 started?
- speaker: Respondent
  text: So, when I began here, there was a nurse director that was a new grad. She had been here about five years and it was
    just her. And so, I was the other nurse that worked and I wore a lot of hats. As I said, I did immunization and disease
    surveillance. And the program here in Ravalli County is not a very robust public health program. We have just a very few
    grants. And so, a typical day was - come in, check our disease surveillance logs to see if there's communicable diseases
    that we need to follow up on. Certain days a week we did immunizations, and so, I think two days a week we did scheduled
    immunizations. And one afternoon we did walk ins. And it was - gosh, now you almost have to tell people the difference
    between whether they were regular immunizations or COVID immunizations. But since it was pre-COVID, it was just regular
    immunizations, mostly people without health insurance is what we saw. And there was a lot of downtime, a lot of trying
    to figure out, you know, where we're going. The director that was here at the time was also kind of struggling to see
    where - what was the path. It seems like her and I spent a lot of time sitting down and brainstorming about what does
    our community need, where are we going? You know, public health has changed so much and that we don't go to schools anymore
    and do scoliosis checks and lice checks and that kind of stuff. We have grants that we apply for and then we try to meet
    those deliverables, you know, whatever that looks like, generating numbers. And so, we spent a lot of time just trying
    to brainstorm with, you know - so, it wasn't terribly busy and we were absolutely under the radar. Nobody knew what we
    did. You know, even the HR director at the time who hired me said, You know, the majority of us here in the county know
    about, you know, next to nothing about what you do. And with you coming on board - and I'm kind of a strong personality
    - I was told, You need to stay within these parameters. This is what is expected out of you, stay in these parameters.
    So, yeah, we were just a very insignificant piece of the puzzle back then.
- speaker: Interviewer
  text: Okay. Yeah, that feels like it's kind of going somewhere else though, with that story, so, could you talk about how
    that started to change once COVID started becoming a thing in Montana?
- speaker: Respondent
  text: Yeah, so, here in Ravalli County, we are in a bubble. I like to think of it as a bubble. You can find yourself just
    45 minutes down the road in Missoula with an absolutely different mindset, nothing at all like ours. And so, like I said,
    when I was brought on board, I was told that I have some flexibility in what programs we want to do or what we want to
    pursue, but within a certain context, because, you know, the commissioners don't want to field a lot of phone calls about
    stuff that might be making people upset. So, yeah, it was pretty limited on what we could do. And so, we were trying to
    look for things that we thought the community might need. And so, I remember kind of starting to canvass around places
    and talk to businesses and - you know, one night I went in and talked to a bartender I know that's been working here for
    years and years and years, and I'm like, What do you see? What do you think the community needs? And then it seems that
    in November I got the first HON just before I left - I went to Ireland. That's a whole other side - I lived in Ireland
    for five years and was married to an Irish guy and I still needed to go home and move my stuff over. And I was just getting
    ready to leave to go back to collect my things. And I - the first HON came about the virus out of Wuhan, China, and I
    was - I remember thinking, Oh, that's just a thing in China. I didn't give it any thought. Nobody knew that it was going
    to blow up the way that it did. And I would say here for us, the first - let's see, I would say our first case was in
    March. It was a student coming home that was in school abroad and it pretty much was met with, It's not real. The majority
    of the feedback that we got - I mean, I don't know how most residents felt in Ravalli County, but the majority of feedback
    we were getting was that it's not real, it's a hoax, you know, we don't believe in it, we're not going to do anything.
    And so, I would say - having to try and figure out how we were going to address that attitude, you know, I get it, I'm
    from here. I have that same mindset as well. I always find myself going, What's the conspiracy here, you know? And then,
    I have to say, Oh, wait, hold on. I went to college. That's right. I've got education. I can see the science. I understand.
    So, how do we meet these people halfway, you know? Because butting heads wasn't working. For us in our department, we
    had a new director and she had been in public health for many, many years, transferred from another - from Missoula down
    to here. She was from the Bitterroot. And I don't - I can't really speak to what she was going through. I think she was
    thinking she had a nice cushy job that she was going to ride out through retirement. Do you know what I mean? Because
    I just - I don't want to bash or say anything bad, I don't know what she was going through, but I will say that she absolutely
    wasn't prepared for what happened and the pressure that came with it. And so, when things really heated up in the middle
    of July, she just quit. She just quit and left us in a real turmoil. Also with that at the time - it's so funny, because
    it all centers right around this day. It all headed on this day, this very day last year - we had just done that swabbing
    clinic and the nurses were exhausted. We were just overheated. We'd all been on our feet for a long time. And the following
    day, some of us had the day off - had been given a day off, and we hadn't had it in a while. And I was one of those nurses.
    And when I came back from my day off, three of the nurses who'd come in to work that next day had quit, the health officer
    had resigned, and the director was ill. The director hadn't quit, but it wasn't long after that that she quit as well.
    And it just sort of decimated us and left, you know, me and a couple other nurses holding back, so to speak. And I've
    never been a boss. I've never been the leader of anything, you know, I've always worked for a position. So, you know,
    it was - excuse my French, but it was a shit show. Just, you know, I'm new to public health and I've only just gotten
    disease surveillance under my belt. And our emotions here for us were really high in that we spent a lot of time sometimes
    crying, if that sounds crazy. But I mean, not knowing anything about COVID. Nobody knew. We had no idea what it was going
    to do to our community. And like I said, I grew up here and when I grew up here we knew everybody. You knew everyone and
    I felt a personal responsibility to do everything I could. I mean, I knew we were going to lose people. But when you were
    seeing what was coming out of the cities - body bags and trucks full of bodies and what was happening in Europe. Meanwhile,
    on a side note, my husband was stuck in Ireland because he's an Irish citizen and it just took that all to a halt. So,
    we were separated the entire time, you know, he's over there, I'm over here. We can't get to each other, you know. And
    yeah, it was so emotional. We had to call in help, of course, because it was just me and another nurse. So, the past -
    there was a past director, who just coincidentally lived across the street from me. I just rented a house and she lived
    across the street from me. She came back to work. A retired director from Public Health, she came back to work. And a
    school nurse, who felt very compelled - we roped her in. And Kirsten, who's working for us now, she had just gotten here
    from Minnesota. We got her roped in and we worked long days, such long days, because every night you'd go home and you'd
    be thinking, Who's the one person that I can afford not to call tonight? You know, when you're tracking and tracing things?
    Sometimes you'd spend all day tracking and tracing, only to find out that you're working on the same case. Does that makes
    sense? You hear this person calls and says, I had an exposure. I think an exposure or I heard this or I have that going
    on. And then this person over here has called and this nurse is working on this. And then throughout the day, as we're
    talking to each other, we realize, you know, this is the cousin or the aunt or that the boyfriend that was visiting over
    here. And you'd realize you've been on the same case all day, just trying to track and trace - felt a little bit like
    a Nazi in the beginning, because I just couldn't let anything go, you know? If I even thought for 1 second you were exposed,
    I was going to quarantine you. And that's a hard thing for people - when you talk about your freedom, and that's at the
    heart of all of this for us in Ravalli County. I feel like this bubble is the fringe of society. We are the fringe. We
    are the wild west down here. Nobody wants to be told what to do down here. You know, people pack guns and knives and,
    you know, I feel like I spent a lot of time trying to do what was right, trying to protect my community and not get shot.
    I truly was in fear for my life sometimes. I mean, I got pepper spray, I stopped wear my badge in town, my public health
    badge. You know, we had no relationship with the sheriff's office, no relationship with our commissioners. I don't know
    why we didn't have those relationships. I was new in public health, so, I don't know why we didn't. But certainly, when
    I got moved up to director, I realized that I don't have any physical authority - of paper authority. I can call you on
    the phone and say, You've been exposed. You have to stay home. Please don't come into town. Please don't go see your grandma.
    Please don't do these things. I feel very strongly about that. And I could be talking to someone on the other end that's
    like, Well, you socialist pig. You don't tell me what to do. This is Ravalli County, you can - you know, the language!
    The hate that we got out of people. And then I'd have to go over to the sheriff's office and say, According to this statute
    right here, MC-code blah, blah, you have to help me when I ask you. You have to, or we can have you removed from office.
    We didn't do that kind of stuff, but I'm aware that that happened all across the state of Montana, which ended up resulting
    in some legislation that came up. So, I have to go to this sheriff that I don't know. I have to try and build a rapport
    and a relationship with him. You know, he doesn't know me. I mean, we do actually, we went to high school together. But,
    you know, there wasn't the rapport or the trust where, you know, if you've worked together years and years and you have
    that banter and rapport outside of work, when you come to somebody with a problem, they know you. They know you're not
    asking for something that's unreasonable. And same with the commissioners. We didn't have any rapport with them, you know,
    and they each had their role to play, you know. So, I don't know. It's funny talking about it now, because I feel like
    I never realized how much PTSD I have from the entire thing, you know, of just being so in it and so locked down. We didn't
    - me personally, did not engage in any social activities whatsoever. I sequestered in my home with my 19-year-old, who
    also didn't go anywhere. You know, I came to work and I went home and my days were long and weekends were longer. And
    when I would get home, I would be on my phone, still tracing, still answering questions, still trying to, you know, -
    and then, finally, 9:00, 10:00 o'clock at night you'd cut it off and be like, I got to sleep. I got to sleep, you know?
    I look back on it now and I realize, Well, you know, we did okay, we did all right. But there were times wh
