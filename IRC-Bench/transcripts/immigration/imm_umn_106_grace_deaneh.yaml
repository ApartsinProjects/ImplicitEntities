collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Grace. I was born on March 23, 1994 in Monrovia, the capital city of Liberia. Liberia is a beautiful country
    and it is very warm there. After the war in Liberia my Mom decided to come to the United States to get a better life.
    At that time, she didn't have money to bring me along with her. I was 11 years old at that time, so she left me with my
    uncle and he took good care of me.
- speaker: Respondent
  text: After 8 years, she came back to Liberia for me. In 2013, when my Mom came to Liberia, she bought me a jacket for me
    to wear when we traveled to the United States. I love the jacket because it has so many beautiful colors on it.
- speaker: Respondent
  text: On January 25, 2013 it was time for us to travel to the United States. I took my jacket but I couldn't wear it because
    the weather was about 90 degrees. Later, we got on the plane. In 30 minutes I started to feel cold, and my mom told me
    to wear the jacket.
- speaker: Respondent
  text: When we got to Chicago, the whole place was different. It was my first time to see snow. The weather in my country
    is totally different than the weather in the United States. In my country we have rainy season from November to April.
    Rainy season is kind of cold, like 50 degrees. You can wear pants or T-shirt and go outside. The dry season is May to
    October. You can wear short clothes because it is 90 degrees.
- speaker: Respondent
  text: After we left Chicago, we came to Minnesota. I was freezing so I kept my jacket on because it was 20 degrees outside.
    Later, we went home and I kept my jacket on for the whole night until the next day. This jacket kept me warm all the time
    and in the winter time I didn't get sick.
- speaker: Respondent
  text: I am thankful to my mom for giving me the jacket. This jacket helped me on my way to Minnesota and it is still helping
    me. I use it every winter because it is really warm and comfortable. I will continue to use it until it gets too small
    for me. Then I will keep it for a memory.
