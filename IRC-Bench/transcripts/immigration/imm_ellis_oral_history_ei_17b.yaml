collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Did your mother ever learn English?
- speaker: Respondent
  text: Not fully. She tried very hard. She could write her name, she could tell time, money, everything. She knew everything
    about that, but she never spoke fluently... I do remember that they were trying to get a lot of these women at that time
    to take classes but they said, "We're too busy with the children. We just can't take time." So this is why a lot of people
    did not learn.
