collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: This is the story of my mother, Wasana Grimsby, or by her maiden name, Wasana Kraipinit. I will be telling details
    about the journey of her life to becoming a first generation immigrant in the United States.
- speaker: Respondent
  text: My mother grew up in the northeast of Thailand in this small town called Bahn Phai. There, she lived with her large
    family of 4 siblings. Her father passed away when she was 9, so at a young age she adopted the responsibility of taking
    care of her younger siblings.
- speaker: Respondent
  text: 'She has fond memories of Bahn Phai: telling me that although it was a small town, everybody was kind. People in Bahn
    Phai were close, sharing food, tools, and toys with each other. She lived in a two story wooden house, large enough to
    fit all her siblings.'
- speaker: Respondent
  text: 'After high school, my mother left her hometown to attend university in Bangkok. There, she lived with her older sister
    in a small condo right in the heart of the city. She worked three jobs to put herself through school: selling lottery
    tickets, working at a call center, and picking up shifts around town.'
- speaker: Respondent
  text: After 7 years, she graduated from Ramkhamhaeng University with a bachelor's degree in English Literature.
- speaker: Respondent
  text: After graduating, my mom stayed in Bangkok with her sister and continued working. She would return to her hometown
    every now and then to visit her mom and younger siblings.
- speaker: Respondent
  text: In 1998, she met my dad. He was in Thailand on a business trip. They were introduced to each other through mutual
    friends and quickly fell in love.
- speaker: Respondent
  text: My mother was worried about the big cultural shift that would come with moving Thailand to the United States.
- speaker: Respondent
  text: Then in 1999, my mother made the decision to marry my father and move to Ann Arbor, Michigan.
- speaker: Respondent
  text: In 2003, she gave birth to me and my brother. We were twins.
- speaker: Respondent
  text: In the US, my mom had a few jobs as a waitress but eventually became a stay at home mom. She always took care of my
    brother and I.
- speaker: Respondent
  text: My mom tells me that everything was a learning experience for her in the US. The culture, the social life, the food,
    and even the weather was different than she expected.
- speaker: Respondent
  text: Regardless of all the new changes, my mother tells me that she feels like the US is her new home.
- speaker: Respondent
  text: I admire my mom for her resilience. Despite the large changes she experienced in her life, she forged a home anywhere
    she went.
- speaker: Respondent
  text: Here in the US, she found a community through the Thai temple and new friends who share the immigrant experience.
- speaker: Respondent
  text: Most importantly, she thinks of the US as her home because our family is here.
- speaker: Respondent
  text: To my mom, home is where the family is.
- speaker: Respondent
  text: Her story has taught me a valuable lesson that wherever I go, as long as I am surrounded by the people I love, I will
    always have a place to call home.
