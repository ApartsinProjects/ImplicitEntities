collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your journey from Laos to the refugee camp?
- speaker: Respondent
  text: Near the time that the communists came to Long Cheng in May of 1975, my father decided it was time to leave because
    of the imminent danger to our family. He moved us to the Laotian city of Vientiane, which is on the border of Thailand
    and the Mekong river. During the journey, we were delayed because the road was blocked by a military checkpoint where
    no one was allowed to pass. My mother gave birth to my younger sister, Keo, during this delay. My father invited one of
    the checkpoint soldiers to the celebration of the birth, and in return, the soldier allowed us to pass the checkpoint
    and we reached Vientiane.
- speaker: Interviewer
  text: What happened after you reached Vientiane?
- speaker: Respondent
  text: My father arranged passage over the Mekong river via boat, and we moved across the river during the night to the relative
    safety of Thailand. We arrived at Nong Khai refugee camp in Thailand, which was built because of the influx of refugees
    from Laos. We were among some of the first to arrive at the camp.
- speaker: Interviewer
  text: What was life like in the refugee camp?
- speaker: Respondent
  text: 'There were no structures built for the refugees, so we built bamboo shelters for ourselves. There was no electricity
    and no running water. The camp was divided into two sections: the Lao side and the Hmong side. Those who spoke Laotian
    were assigned to the west side and those who spoke Hmong were assigned to the east side. In front of each structure, the
    Hmong built a small bamboo shack for cooking. There was lots of space between the buildings, and we used the space for
    gardens where we grew cilantro, onions, and other vegetables. We also raised pigs and poultry.'
- speaker: Interviewer
  text: How did you get water and food in the camp?
- speaker: Respondent
  text: Besides a pond used for watering gardens, we had a well with a bucket and rope, a water tower, and a container to
    catch rainwater. We used the water from the well to bathe and wash clothes. The Thai government periodically provided
    rations including rice, tuna, sardines, and cuttlefish. We were also allowed to forage in nearby rice paddies for small
    fish, wild vegetables, bamboo shoots, and crabs.
- speaker: Interviewer
  text: Did you attend school while in the camp?
- speaker: Respondent
  text: Yes, at first I attended a Thai school outside of the camp, but eventually we were not allowed to attend that school.
    Most children attended school within the camp. During lunchtime, we would go home to our gardens, pick cilantro and green
    onions, mash them up in a mortar, and mix it with rice for our meal.
- speaker: Interviewer
  text: What was it like arriving in the United States?
- speaker: Respondent
  text: In August of 1978, my family and I arrived in the United States via airplane. We flew into the Minneapolis/St. Paul
    Airport. I was 12 at the time and spoke no English. My cousin had to show us how to operate things like toilets, electric
    ovens, microwaves, and showers, all of which we had not used before.
