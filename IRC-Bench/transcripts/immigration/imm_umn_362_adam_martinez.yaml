collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Adam Martinez. I'm a senior at the University of Minnesota. And this is my story, about tortillas at the
    breakfast table and what it's meant to me personally as a second generation Mexican immigrant growing up closer to Lake
    Superior than the Rio Grande.
- speaker: Respondent
  text: That's my brother Nick on the left. I made breakfast for us this time, but for as long as I can remember, my mom has
    always made breakfast for our family on the weekend.
- speaker: Respondent
  text: A typical breakfast in our house might be potatoes with bell peppers and cheese, bacon or sausage, and refried beans
    of course. My mom will usually make cactus and eggs for my dad.
- speaker: Respondent
  text: Yeah. Cactus. They sell it in a jar. That's cactus.
- speaker: Respondent
  text: But no matter what we have for breakfast, we always have it with tortillas.
- speaker: Respondent
  text: Are you ready for some tortillas?
- speaker: Respondent
  text: You know it.
- speaker: Respondent
  text: We usually warm them in the microwave, but on the rare occasion that my mom isn't home to keep us from making a mess
    in the kitchen, we might heat them over an open flame.
- speaker: Respondent
  text: Either way, we always cover them with a towel to keep them warm and set them out on the table for everyone to share.
- speaker: Respondent
  text: We don't use them to make burritos. That's not really necessary. We just tear the tortillas and use them to grab food
    from our plate. It's kind of like finger food. Kind of.
- speaker: Respondent
  text: I remember one time, my uncle on my mom's side of the family was over for dinner, and he asked my dad about the tortillas.
    He said, "Pablo, what's the towel for?" And my dad's reaction was like, "Are you serious?"
- speaker: Respondent
  text: I remember this because although I've never seen myself as an immigrant of any sort, I've always had an appreciation
    for the fact that not every family sets tortillas out on the table when they eat. I think that for a lot people, that's
    only when they go out to a Mexican restaurant or eat at our house.
- speaker: Respondent
  text: My dad immigrated to the United States from Mexico when he was just a kid. And although my brother and I grew up in
    a household where we didn't speak Spanish or have the same traditions that my dad grew up with...
- speaker: Respondent
  text: We love tortillas.
- speaker: Respondent
  text: You know it.
