collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: There was fighting and then the Vietnamese came and that's why we came. My story doesn't begin from the moment I was
    born. It began from the moment my parents crossed the mighty Mekong River from Laos to Thailand into Ban Vinai Refugee
    camp where they met and got married then and eventually made their way to over to the states, more specifically, Minnesota,
    where the Mississippi River would mark a new start for them.
- speaker: Respondent
  text: Upon their arrival to Minneapolis, Minnesota in 1993, my parents were trying their best to get situated in the American
    lifestyles. Without understanding English or the American culture, they found their first few months to be very difficult.
- speaker: Respondent
  text: We went to this place where they help you find full-time work. They helped us find jobs.
- speaker: Respondent
  text: Ever since I was a child, I remember seeing this. I never knew what it was, I just thought it was something that my
    mom cherished.
- speaker: Respondent
  text: 'When I asked her about it, this was what she said: When I went to school I brought these with me and I sold them
    to my friends.'
- speaker: Respondent
  text: She also told me that she made these around Christmas time as ornaments. As you can tell, the green, white and red
    represent her knowledge of Christmas, along with keeping her Hmong heritage intact with it by using the Hmong embroidered
    patterns.
- speaker: Respondent
  text: This item is important to her because it is reminiscent of her first few years in America with nothing and how far
    she has come since then.
