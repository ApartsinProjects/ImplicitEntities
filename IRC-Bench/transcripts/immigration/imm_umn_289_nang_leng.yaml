collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Nang. I am from Burma. We had to leave the country because my husband has a problem with the government.
    The government was unfair to the population. Government officials took care of themselves, but not the population, so
    we had to leave the country.
- speaker: Respondent
  text: I lived in a refugee camp in Thailand called Nu Poe. We had to live in that camp for seven years. When I was in that
    camp, we had many troubles with my family. We don't have enough food, couldn't go anywhere, and we couldn't live.
- speaker: Respondent
  text: I miss my parents, brothers, and sisters. After I had been in that camp about five years, my dad passed away. So,
    I never saw him again. I always remember my dad and I feel sad about that.
- speaker: Respondent
  text: I have been in Minnesota for one year and eight months. When I was in the refugee camp, I had friends in the U.S.
    who called my family and advised us to come to Minnesota.
- speaker: Respondent
  text: Right now, I'm not in good health. I have to go to the clinic two or three times a month. So, I can't go work. In
    our family, only my husband works. Sometimes we do not have enough to pay for rent and my medication. When that happens,
    I am very sad and worried.
- speaker: Respondent
  text: I have two daughters. They are students. I am worried about their education, too, because we don't have enough to
    send them to college.
- speaker: Respondent
  text: When I go to see my family doctor, I am always sad and cry because I want to be healthy. Since I have been in the
    U.S., I always worry about my family and my health.
- speaker: Respondent
  text: Besides my worries, I still come to school every day to improve my English skills.
