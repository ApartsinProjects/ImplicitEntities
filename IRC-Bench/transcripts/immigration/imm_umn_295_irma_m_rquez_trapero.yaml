collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Irma Márquez Trapero, I was born in Culiacán, Sinaloa, Mexico which is the capital of the State of Sinaloa
    on the west coast by the Pacific Ocean. When I was thinking about it, I couldn't figure out what was that one thing that
    kept everything together for us here and I just looked over at my counter and saw this and I said, "Actually, that, that
    is what actually helped us a lot. What really held our family together in the US was a lot of faith." I've carried this
    because although I'm not personally a very religious person, I think that in our family we had to have a lot of faith
    especially because we're in a culture and a country where for a long time we didn't feel included. And I believe that
    for us and our family it was always something valuable, having faith in all that we did because there hasn't been a situation
    where our family doesn't thank God. We've always been the type of family that's very thankful for what we've been given.
    I think that the truth is that it kept us together. Part of our survival here in the United States.
- speaker: Respondent
  text: 'When I think about my immigration story, it''s a story of survival more than anything else. It''s definitely a story
    of success, achievement. But at the end of it all, it''s a story of surviving and adjusting and moving forward. We have
    a saying: Si Dios Quiere, which you say every time you say something about the future. So, for instance, I would be in
    school and I would have practice and I would tell my mom, "Okay mom, I''ll see you later." And my mom would always reply,
    "Si Dios Quiere. If God wants to." You know, I never really connected it to church, it was always just a way of keeping
    our culture together. It definitely reminds me more of México when I think about that.'
- speaker: Respondent
  text: La Virgen de Guadalupe, for me, it symbolizes strong women. I use La Virgen in a way to just remind myself that our
    family is a family pretty much ruled and led by women. All the women in my family are such strong women and when I think
    of La Virgen, I connect the two. The reason why we're here is because my mother decided to make that decision. The reason
    why I continue education and I always strive to do the best that I could is because my mom. That has to do with why I
    look at La Virgen and pray to La Virgen because it does have that aspect of just strength and womanhood. It means a strong
    person, and I think that I've reclaimed her to be that for me. And that's why I carry this.
