collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: What is Hmong Dance? Who am I? Who are we? All I remember is dance. Dance was the only thing that kept me going… And
    the only tangible memory that allowed me to transport back into feelings. Fuzzy feelings, anxious feelings, exhilarating
    feelings, sublime feelings. Feelings that could transport me to a time of my ancestors. My Hmong ancestors.
- speaker: Respondent
  text: What is Hmong? What is to dance? What is Hmong dance? Hmong dance, are dances. Hmong dance is a cultural practice
    done by the Hmong. Hmong dance is a communal experience. Hmong dance is a performance, a representation, an exploration,
    a bodily research, an archive.
- speaker: Respondent
  text: Hmong dance is an identity formation. To practice Hmong dance is to practice culture. To practice Hmong dance is to
    preserve culture. Hmong dance comes from the vast hills of China. Hmong dance dreams from the harvests of Laotian lands.
    Hmong dance dwells in a Thai refugee camp.
- speaker: Respondent
  text: Hmong dance is also Indian, Cambodian, and Vietnamese and… Hmong dance is American. Hmong dance belongs to no one.
    Hmong dance belongs to everyone. Hmong dance is the practice of borrowing from different cultures. Hmong dance is an appropriation
    of different cultures. Hmong dance is a social movement.
- speaker: Respondent
  text: Hmong dance is the act of moving. It is continuously moving. It is an immigrant dance, a refugee dance, a survival
    dance, a negotiation of multiple identities, anti-assimilation and assimilation. It's creating traditions, and losing
    traditions. Hmong dance is not static. Hmong dance is not sustainable. Hmong dance is not practicing Hmong dance.
- speaker: Respondent
  text: Hmong dance is ultimately a product of colonialism, and ripples through the superimposed identities and lies we swallow
    and become. Hmong dance is contemporary. It's solidifying a place of belonging. Hmong dance is Asian. Hmong dance is American.
    Hmong dance is global. But, Hmong dance is American phenomenon.
- speaker: Respondent
  text: Hmong dance dissipates in transnationalism. It is displaced, and stateless. It's a search for continuity, voice, and
    equity. It's for the people, and sustains the people. Hmong dance is a courtship dance. Hmong dance is choreographed for
    the male gaze. It is mainly practiced by girls and women. It sexualizes the female body. It objectifies the female body.
    Hmong dance is patriarchal.
- speaker: Respondent
  text: Hmong dance is a commodity. Hmong dance consumes. Hmong dance disposes. Hmong dance sells. Because Hmong dance is
    entertainment. It's a competition. It's first place. It's political. It's ambiguous, invisible, famous, nostalgic, here,
    there, absent, pertinent, violent.
- speaker: Respondent
  text: Hmong dance is to be Hmong. Hmong dance is collective. Hmong dance is community. Hmong dance is finding a home. Hmong
    dance is homeless. Hmong dance is complex. Hmong dance is me.
