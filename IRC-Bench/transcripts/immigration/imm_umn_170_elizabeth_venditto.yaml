collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Elizabeth's great-grandparents, Vittoria and Michelangelo Venditto, migrated (separately) from Pietraroja, Benevento,
    Italy to New York City in the early twentieth century. At the same time, her great-grandmother Margherita Giordano migrated
    from Cassano delle Murge, Apulia, Italy to New York, while her great-grandfather Eustachio (Augusto) Cassano migrated
    from a neighboring town, Acquaviva delle Fonti, Apulia, Italy, to New York. Elizabeth's family remained in New York until
    Elizabeth left to attend college at the University of Notre Dame (2004-8) and then earned her Ph.D in migration history
    at the University of Minnesota (2008-2014). Elizabeth's research took her to Italy several times, where she reconnected
    with family members and remains in frequent contact with her cousins. Elizabeth's Italian citizenship was recognized in
    2009.
- speaker: Respondent
  text: 'Written and recorded in November 2013 Voiceover: I''m Elizabeth Venditto and my immigrant story is best told by my
    great-grandmother''s passport. Vittoria Venditto used this passport to leave southern Italy and go to New York City. There,
    she married my great-grandfather, Michelangelo, in 1914, and raised several children, including my grandfather. Around
    the same time, my paternal grandmother''s parents left southeastern Italy and moved to New York City. I grew up, nearly
    a century later, in New York''s large Italian American community. My great-grandparents all became American citizens,
    but they continued to send money and messages back to Italy for decades. After their deaths in the 1960s and 1970s, my
    grandparents still occasionally wrote to cousins in Italy. But I didn''tknow this until 2007, when I studied in Italy,
    part of an admittedly naive attempt to discover where I came from. So what did I discover? That I couldn''tpronounce my
    own last name. That I had distant relatives, who immediately embraced me as family. My family''s trans-Atlantic ties were
    reinvigorated, and the size of my family quadrupled overnight. I also discovered that the Italy my great-grandparents
    left was very different from the Italy of the 21st century. Italy had become a destination for immigrants from around
    the world. Immigrants were criticized for their race, religion, poverty, and language- the same criticisms directed at
    my great-grandparents, and their paesani, a century before. I found my great-grandmother''s passport while preparing my
    application for Italian citizenship, which was recognized in 2009. This opportunity is the product of immigration laws
    which are generous to me, a descendant of Italians, but restrictive to immigrants living in Italy today. I''ve returned
    to Italy many times as I''ve researched Italian immigration history. Now, when I return, it''s with a deeper understanding
    of Italian society and an immigration story that never really ended. When I found my great-grandmother''s passport, I
    was looking for my own story, but discovered many others. And that''s why this story is subtitled, affinché imiei parenti
    ed a mici possano capire una storia che condividono con me. Grazie. Subtitles: Sono Elizabeth Venditto e la mia storia
    dell''immigrata è raccontata dal passaporto della mia bisnonna. Vittoria Venditto usò questo passaporto per lasciare l''Italia
    ed a ndare a New York City. Sposò il mio bisnonno Michelangelo nel 1914, e allevò isuoi tanti figli, in cluso mio nonno.
    Nello stesso periodo, igenitori di mia nonna lasciarono l''Italia per New York City. Io sono cresciuta, quasi un secolo
    dopo, nella grande comunità italoamericana di New York. Nonostante tutti imiei bisnonni fossero divenuti cittadini a mericani,
    essi continuarono ad in viare denaro emessaggi in Italia. Il legame con il loro paese si indebolì dopo la loro morte.
    Eppure, imiei nonni continuarono a scrivere ai loro cugini in Italia. Io l''ho scoperto solo nel 2007, quando, nel tentativo
    un po'' naif di scoprire le mie or igini, decisi di studiare in Italia. Dunque, che cosa ho scoperto? Che non riuscivo
    a pronunciare il mio proprio cognome. Che ho tantissimi parenti che mi hanno a bbracciata subito come una della famiglia.
    I nostri legami transatlantici sono stati rinvigoriti e la mia famiglia si è quadruplicata all''improvviso. Ho scoperto
    a nche che l''Italia che imiei bisnonni hanno lasciato è molto diversa dall'' Italia del 21° secolo. L'' Italia è divenuta
    un paese d''immigrazione. Gli a ttuali immigrati in Italia sono criticati per la loro razza, la religione, la povertà,
    la lingua; in so mma quelle stesse critiche rivolte ai miei bisnonni. Ho ritrovato il passaporto della mia bisnonna mentre
    stavo preparando la mia domanda per la cittadinanza italiana, che mi è stata riconosciuta nel 2009. Quest''opportunità
    è il risultato delle leggi sull''immigrazione che sono generose per me, discendente da Italiani, ma restrittive per gli
    immigrati oggi in Italia. Sono to rnata in Italia tante volte durante imiei studi dell''immigrazione italiana. Adesso
    una conoscenza più a pprofondita della società italiana edella sua storia dell''immigrazione che non è davvero finita.
    Quando ho trovato il passaporto della mia bisnonna, stavo cercando la mia propria storia, ma ho finito per scoprirne molte
    a ltre. Questa è la ragione per cui questa storia è so ttotitolata, so that my friends and family can understand a story
    that they share.'
