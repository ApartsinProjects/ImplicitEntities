turns:
- speaker: Interviewer
  text: Can you tell me about your background and where you grew up?
- speaker: Respondent
  text: I am a Korean American adoptee. I was raised in Minneapolis and have traveled to many places throughout my adult life.
- speaker: Interviewer
  text: What do you do now?
- speaker: Respondent
  text: I am currently a principal for a middle school in San Francisco.
