collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'My name is Yeng Xiong. I arrived here in 1988. I landed in America on September 15. I was born in the town of Moos
    Mauj or Najkuemab. I was born on August 15, 1947. I don''t have much but I have this baby carrier as a keepsake. Due to
    the war, we had to move around often so I used this mainly to carry my children. We fled and I used to carry my children.
    We couldn''t stay in the country anymore. We thought it would be a good idea to try and live in Thailand. We used this
    to carry our children to a better place in hopes of giving them a better life. At that time, I had 3 children: 1 3 year
    old, 2 year old, and an 11 month old. I was worried that if my husband carried the children the baby carrier would be
    too tight and prevent him from swimming. So I put the middle child on my back and the baby behind him, one on top of the
    other. Then I carried my 3 year old son in my arms as we crossed the Mekong River. When we were fleeing we gave the baby
    a bit of opium so he wouldn''t cry. We were so afraid that the communist soldiers would hear if he cried. Although my
    baby was quiet, he kept saying "fall. Fall." It was if he was telling me he was going to fall, so I was worried and checked.
    He was still there. When we almost reached the riverbank, the current was so strong. When my husband swam back to adjust
    the baby carrier, he bumped us, and we all went under. We all went under and that why I was unaware that I had lost my
    baby. I don''t know exactly when I lost my child. I didn''t know, but my husband saw him float away. He tried to swim
    to catch him but couldn''t. He feared he would lose the other two children as well so he turned back. When he came back
    to check on the children, the middle one almost slipped out too. So he carried him in his arms and piggy backed the oldest.
    My string was tied to my husband and the oldest child was tied to me. But the middle child and the baby weren''t tied
    to either of us. When we made the string, we decided to give out the string to our many relatives. I thought it would
    be enough that the children were strapped to me with the baby carrier. But things don''t go the way you want them to.
    The baby carrier loosened when we went under the water. That''s why our baby was lost. In my heart, I feel as if I made
    a mistake and that''s why I lost my baby. If only I had tied my baby to me, I would have seen him if he slipped out. But
    I didn''t and I lost him so now I only have 10 children. My husband swam ahead and before we lost our baby, he felt something
    brush his leg. In the Hmong belief, it may or may not have been a sign of a spirit taking our baby. After some time, I
    couldn''t feel him moving so I asked him, "Why aren''t you swimming?" So he said, "Something big and rough touched my
    leg." I told him, "It must''ve been a fish. Wouldn''t I have felt it too since I am over here?" He then said, "I''ll see
    if it''s still here." And used his leg to search the water. "It''s gone." After we reached Thailand, people said he washed
    up on the river bank. I went to look everywhere and couldn''t find my baby at all. The people whose strings were cut,
    who didn''t make it, they all washed up on the bank. Only my baby wasn''t there. So I decided to move on and we went to
    Nong Khai which was far from the river. I then lived in Ban Vinai refugee camp for 8 years and had 3 more children there.
    Then, when we moved to America, I had 5 more children. In total I had 11. After my baby passed away, I never used that
    carrier again. I keep it safe and once in a while, I will bring it out to look at. I thought that if I washed it, it would
    lose the scent. Even though it''s been a long time, I still miss him a lot. If, instead, my baby was too sick to heal,
    it would have been less painful.'
