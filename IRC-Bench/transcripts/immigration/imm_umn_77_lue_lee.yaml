collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Lue Lee. I came to the United States in 1979. This is a picture of me when I was a young soldier. When
    I first joined the war, I was only 17 or 18 years old. This was a picture of the time we fought at the Plain of Jars.
    This photo was taken by a fellow soldier. Many communist soldiers died after this battle. The numbers on the photo indicate
    who is who. It identifies a few of the leaders during the battle at the Plain of Jars. This one is me. Next to me is Colonel
    Nhia Lue and next to him is Lieutenant Colonel Vang Koua. The communists retreated, we took the photo and camped for a
    night and then waited to hear our next assignments. Once we knew what the big governments were planning, we retreated.
    After the country fell, we returned home to determine the next steps. Then we left the country to come here.
