collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Amina Shire. I was born in Somalia. I came from Somalia in 2005 and I came to Kenya as a refugee. I stayed
    in the refugee camp for 10 years. Then I flew to America. First, I came to Boston. I stayed two months. Then I moved to
    Minnesota. I came to America July 23, 2013.
- speaker: Respondent
  text: When I was in Africa, I could not work. I just stayed home. And now I am working. I go to school. My life is good.
    My husband is also working and going to school.
- speaker: Respondent
  text: When I came to Kenya, we married my husband. I have four kids now.
- speaker: Respondent
  text: When I came to America, I thought there would be no Somali food but I saw everything is in America.
- speaker: Respondent
  text: The first thing I brought to America when I came from Kenya is a Muslim prayer rug. I thought I could not get it in
    America. The rug is important to me because I pray five times a day.
- speaker: Respondent
  text: There is a good life in America. Better than Africa. But I always remember my country. It has been ten years since
    I was there.
- speaker: Respondent
  text: If I become a citizen, I will try to go to see my country because I want to see where I was born. I want to see my
    family, my sisters, and brothers. I miss Somalia.
