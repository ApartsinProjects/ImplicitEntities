collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Suwon, South Korea but I studied in India when I was very young and in New Zealand during my high school
    years. Overall, I lived in India and New Zealand for about four years each and the rest in Korea. I came to the United
    States to study mechanical engineering at the University of Minnesota.
- speaker: Respondent
  text: I chose to come to the United States because of better education system and the opportunities. I arrived on the nineteenth
    of August, two thousand thirteen leaving behind my family, my friends, and everything else. I especially miss my mom's
    good foods.
- speaker: Respondent
  text: When I came to America I brought things that I needed like clothes, food, utensils, my passport, along with my American
    dream. One of the most important things that I brought with me is my wallet. It looks very fancy and I use it to put my
    cash and cards in.
- speaker: Respondent
  text: I would associate this wallet with my dad because it used to be his until he gave it to me when I needed one. The
    wallet is significant to me because it reminds me of how my dad works hard all the time to earn money for my family and
    he has been a big supporter of me.
- speaker: Respondent
  text: I didn't realize the significance of this until I got my first job last summer. While working for a software company,
    I learned how hard it was for me to work and earn money and experienced what my dad had gone through over the last 20
    years for me and my family.
- speaker: Respondent
  text: 'My dad told me when he gave me this wallet that when I grow up, graduate, and get a good job someday, I should get
    him a new and better wallet. And I guess that''s one of the reasons I came here: to study hard, get a good job so that
    one day I could buy him a new wallet and be a proud son.'
