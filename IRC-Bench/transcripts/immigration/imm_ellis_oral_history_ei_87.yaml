collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My brother took me over and wanted to give me a treat. So he said, "There are some peddlers around the street coming
    out from here. There are some tomatoes." I never had a tomato in my life. I didn't know what sort of a tomato looks like.
    (He laughs) So he gave me a tomato and I eat the tomato. I spit it out. I couldn't take it. (He laughs) I said, "What
    is this, what they give me to eat?" He started laughing, so we kept going there, no tomato.
