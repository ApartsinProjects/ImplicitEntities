collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'Hello everybody! Today I want to share with you my family immigration story. My family has four people: my mom, dad,
    sister, and me. On another day in 2019 we received a letter from the U.S. immigration that told for my family to come
    to the United States. To this day, I remember that time my family was so happy. We were excited, smiling, and crying.'
- speaker: Respondent
  text: Finally, my family's dream come true because we have to wait almost 13 years. We prepared many documents the U.S.
    immigrations need. Suddenly, they canceled my sister's documents because she was over 21 years old. Another sad news with
    my family, we were so disappointed. We cannot control anything. We just followed steps by steps the U.S immigration want.
- speaker: Respondent
  text: On June 24, 2019, my dad, mom, and me came to The United States to fulfill our dream. My family had 2 statuses at
    that time. I remember a little sad for my sister, and a little excited for a new life. When we arrived at the airport,
    the first thing I saw is the big board with the word "Welcome to The United States of America." I thought in my mind "OMG
    it's my dream here."
- speaker: Respondent
  text: Suddenly, I became worried for myself, scared of everything because my world is open and there are a lot of people
    but no Vietnamese. I looked around, I just saw the fast food, they didn't have the Vietnamese food. Everything was so
    strange with me and my family. I changed my status excited and become worried.
- speaker: Respondent
  text: I talked with myself let's calm down and you can do it because just only I in my family know English. I must take
    care of my mom and my dad. At that time, many things were happening with my family. The first thing is a different culture
    and different language. Everything is new with my immigration and my family.
- speaker: Respondent
  text: Sometimes we were thinking to give up and come back home. But we try our best and we are still here now. All the difficult
    and hardships we have to overcome so that in the future we will always remember the memory of the new flight in the U.S.
- speaker: Respondent
  text: Thank you for listening.
