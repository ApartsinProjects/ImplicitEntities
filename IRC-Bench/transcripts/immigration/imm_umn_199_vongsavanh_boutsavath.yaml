collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I'm Vongsavanh Boutsavath. I'm a refugee. I fled my country from the communist rule because it's too much suffering
    during that time of their occupation. I was General Commissioner for Rural Development. That means for rural community
    development at that time. And at the same time I taught in the Royal Lao Institute of Law and Administration. And after
    that, I became senator before the communist took over the country. I graduated from the University of Paris. Laos was
    a very poor country. I think we should improve the conditions of the people. I could not stand anymore such living.
- speaker: Respondent
  text: And then I was working for some time for the communist government. And I was thinking, in myself, to flee the country
    but I was waiting for the good opportunity. Otherwise, otherwise you would be killed. I asked the United Nations Development
    Program to recruit me as a program officer at that time. So I had been working for them for five years before fleeing
    the country.
- speaker: Respondent
  text: And the family of my sister, they too was, they lived here in St. Paul. I asked to visit them. Not to be a refugee.
    But when I come here, in the United States, of course I was thinking to go away from the communist regime. And so it's
    a good opportunity to stay forever. That's why I become a refugee.
- speaker: Respondent
  text: In 1993 very good things that people know their origins even though they are American. It doesn't matter. But it matters
    that we have to learn the history of things, as it were. I'm proud and I'm very happy. More and more the Laotians here
    recognize their origins and continue to strengthen their relationship between our two countries.
