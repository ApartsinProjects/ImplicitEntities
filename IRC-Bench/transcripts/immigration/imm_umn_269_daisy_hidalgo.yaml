collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Me llamo Daisy Hidalgo y esta es mi historia. When I was thinking about what object I should use, at the moment nothing
    came to mind. I thought to myself what object can I use, and do I have any? After a few days of thinking and talking with
    some friends and coworkers I thought of something very special that I could use. I remembered that every Christmas my
    entire family would get together to celebrate Christmas. We would honor el nino dios.
- speaker: Respondent
  text: The night before Christmas we would do this thing called pedir posada. What we would do is go around singing to different
    houses, at least the times we celebrated Christmas in Mexico we walked around our Puebla. We would sing at the people's
    front doors, asking them to let us in, and that we were coming in honor of the Virgin Mary.
- speaker: Respondent
  text: After we would go to a few houses and sing we would all go back to my grandma's house since it was closest to the
    church. We would have food prepared, and a tole for the people that followed us. Once everyone got settled in we would
    rock el nino dios to sleep.
- speaker: Respondent
  text: I guess as a little girl I did not really understand what was going on, I just knew we walked around and many times
    people had treats for the people who would be pidiendo posada. At the time the best part about that to me was getting
    all these different bags of candy. By the end of the night we would have so much candy that we would just give it away.
- speaker: Respondent
  text: El nino dios though was something very special. When my mom was in Mexico she would help my grandma out with her nino
    dios. Then we started doing our posadas here in Minnesota, of course it was different in comparison to Mexico, where the
    entire pueblo knew everyone.
- speaker: Respondent
  text: The most significant part about el nino dios was at the end of the posada we would all go around giving the nino dios
    a good night kiss, and then one of the younger kids would put the baby to sleep. It is very important to me and my family
    to keep this tradition going, especially since there aren't many people here in Minnesota that practices this. It is a
    way of keeping our beliefs and traditions going.
