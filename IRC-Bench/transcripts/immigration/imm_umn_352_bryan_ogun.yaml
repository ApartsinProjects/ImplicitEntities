collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi, my name is Bryan. I was born and I grew up in Nigeria, specifically Port-Harcourt. My life there was not very
    good but it was normal because I had most social benefits but not always enough. The crime rate there was very high and
    living there peacefully was very hard.
- speaker: Respondent
  text: I left Nigeria because of the living conditions there weren't very favorable. Like going to school was very expensive
    so it was a better option to live with my dad in the U.S. I came to the U.S. in June 2019. So basically cost of living
    is cheaper in the U.S.
- speaker: Respondent
  text: I came with my brother only. I left my mom most importantly because she wasn't eligible to come yet. And I left my
    aunts, uncles, cousins, friends, grandpa and my pets.
- speaker: Respondent
  text: I brought my good stuffs, my clothes, shoes and some traditional things which I use to remember my origins and where
    I belong. I left a huge amount of things in Nigeria because I was basically starting a new life in the U.S.
- speaker: Respondent
  text: I had mixed feelings when I was coming to the U.S. Though I heard so many good stories about America, I was sad because
    of the people and things I left in Nigeria. For example, leaving my childhood life, my childhood friends, and everyone
    in Nigeria.
- speaker: Respondent
  text: My life presently is a lot different from life in Nigeria. For example, walking on the roads of America is a lot more
    safer than the ones in Nigeria. Going to school is much more fun in the U.S. and lastly the cost of internet connection
    is cheaper.
- speaker: Respondent
  text: In conclusion, my journey to the U.S has not been easy but I hope to adapt to the life in the U.S. and get used to
    living without my mom for some time in the U.S.
