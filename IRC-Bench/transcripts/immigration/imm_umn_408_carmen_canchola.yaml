collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My grandmother's journey to becoming a United States Citizen is a tale of love and perseverance. My grandmother was
    raised in Morelia Mexico, when my grandfather went to go visit his parents he saw her for the first time. Turns out she
    was living right next door. My grandfather who was in the Air Force at the time rarely came home to visit his family.
    So within two weeks of his arrival he married my grandmother and promised her a greater way of life in America. They were
    both 19 at the time. Their marriage not only marked the beginning of a beautiful partnership but also paved the way for
    her to become a United States Citizen.
- speaker: Respondent
  text: I was told that it wasn't a difficult process but did take 2 months. Keep in mind it was back in 1951. "Paying Forward",
    was my grandparents motto. Give help to the community! They were involved with the Lions Club in Chicago, Tucson and Nogales,
    Arizona.
- speaker: Respondent
  text: Jose and Carmen Canchola, as owner/operators of a McDonald's restaurant in Nogales, organized and held a Christmas
    Party for orphans and poor children. US Customs, Community Groups and McDonald staff volunteered on Christmas Day for
    30 years. The children were transported from Nogales, Mexico on school buses to the McDonald's. They were greeted by Santa
    and Ronald McDonald. Christmas Carols were sang, Quarter pounders, fries, shakes served, Each child received presents
    and clothing from L.L. Bean, Walmart, Lisa Frank and other companies. The party grew to over 2,000 children.
- speaker: Respondent
  text: My grandmother Carmen was very proud of helping children! Growing up I lived one hour away so on the weekends we would
    always go visit her and spend Friday nights till Sunday mornings at her house. She always had company over but when she
    had five minutes of free time from talking to all the adults, she would come into the kids room and just tell us stories
    about how she was raised, the farm.
- speaker: Respondent
  text: She would also sneak in candies for us, she would also tell us the most funnest jokes that she just heard. She is
    such an incredible lady ever. All me and my cousins were fascinated by her when she would walk into the room, it was just
    this glowing soul wanting to spend time with us and we appreciated it so much!
