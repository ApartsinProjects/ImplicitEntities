collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Burma, in 2000. When I turned two years old, my family moved to a refugee camp in Thailand because of
    the civil war. We took a boat to reach the refugee camp. When we got there, it was a quiet night. We didn't hear any other
    sounds, but the sound of birds. We used wood and bamboo to build our house. We used to have a garden, and in our garden,
    we grew mustard plants, green onions and cucumber. Near our house, we grew a banana tree and pineapple. My parents were
    working on the farm.
- speaker: Respondent
  text: Life as a refugee was a bad experience because we didn't have enough food. We had to find our food by ourselves. When
    I lived in Thailand I didn't have to work at all because my parents sent me to school even though they didn't have much
    money to buy me a uniform. When I turned 5 years old they sent me to school. I really liked school because I met a lot
    of friends. We always played together. We used to jump rope on Saturday. Our school had a morning meeting where all students
    worshiped together before going to class.
- speaker: Respondent
  text: I had to walk to school every day. At school the teachers hit their students with sticks when they did something wrong
    or when they didn't do their homework. I thought they should teach students in different ways instead of hitting them.
    Sometimes I got hit when I did poorly on a quiz. They were full of anger and hatred in me when I got hit. Sometimes it
    made me hate going to school and I told my parents that I didn't want to go anymore.
- speaker: Respondent
  text: Some children have bad experience in their life because they wanted to go to school, but their parents didn't have
    enough money to pay for school or buy their uniform. What they had to do was work for their family. Some of them had to
    work away from home even when they didn't want to. Some of them worked by selling food, and some worked on the farm.
- speaker: Respondent
  text: Now I'm in America, I still go to school and my parents still work, but their work is a lot easier than in Thailand
    because they don't work on the farm like they used to. I believe that one day I can make my family proud of me.
