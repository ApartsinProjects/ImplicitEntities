collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Satvik, and though I was born in India, I moved to Bhutan just six months later. That move - my first -
    set the tone for a life that's never stood still. Since then, I've lived in Bhutan, England, Indonesia, Germany, India
    again, Finland, the Czech Republic, and now, the United States. Each place was like a new chapter in a book I didn't know
    I was writing.
- speaker: Respondent
  text: 'I didn''t always have a choice - most moves were shaped by my parents'' work or education. But with each one, I learned
    to adapt quickly: new customs, new food, new ways of greeting, new rules in classrooms, and new meanings behind simple
    things. I had to grow up fast. I had to listen before I spoke. I had to figure out who I was in a world that kept changing.'
- speaker: Respondent
  text: India is where I was born - my beginning. It's where my family comes from, and where the language and traditions that
    ground me first entered my life. But I left it before I could even walk.
- speaker: Respondent
  text: Bhutan, my first home, is where I learned stillness - a country defined by peace and simplicity. I remember misty
    mountains, quiet roads, and the comfort of knowing few people, but knowing them well.
- speaker: Respondent
  text: In England, everything was different - structured, formal, familiar but foreign. It was the first place I attended
    school, where I had to wear a uniform, queue politely, and adjust to gray skies and different spellings of familiar words.
- speaker: Respondent
  text: Jakarta, Indonesia, was bursting with energy. The streets were alive - with scooters, food carts, people. It was loud,
    friendly, full of movement. I played barefoot soccer in alleys and learned how warm and open a city could be.
- speaker: Respondent
  text: Frankfurt, Germany, was order and precision. I moved from the chaos of Jakarta to the calm of trams and punctuality.
    People gave you space. Conversations were deliberate. It was one of the hardest adjustments I made - slowing down, fitting
    in.
- speaker: Respondent
  text: Moving from Jakarta to Frankfurt was one of the biggest shifts I've experienced. In Jakarta, life spilled out onto
    the streets. In Frankfurt, everything was contained - structured, neat, on time. I had to learn to slow down, to read
    the silences, to fit in without losing myself.
- speaker: Respondent
  text: When we moved back to India, I expected to feel at home again. But I didn't - not fully. After so much time abroad,
    I had changed and so had the way I saw everything around me. I appreciated things more, but I also felt distant from people
    who hadn't moved.
- speaker: Respondent
  text: Helsinki, Finland, gave me quiet - and the space to think. It taught me that silence doesn't mean disinterest, that
    deep relationships can grow slowly and steadily, like a winter thaw.
- speaker: Respondent
  text: In the Czech Republic, I felt a growing independence. I wandered Prague's streets alone, discovering a city steeped
    in stories and history. It was a place that invited curiosity - and let me be myself without explanation.
- speaker: Respondent
  text: And now I'm in the United States, pursuing my education. It's a place that prizes individuality but also asks you
    - constantly - to define yourself. Where are you from? What's your story? Who are you?
- speaker: Respondent
  text: Living in so many places has given me a rare kind of education. I've learned how deeply culture shapes people - how
    even small things like tone or gestures can mean something completely different across borders. I've become good at adjusting,
    at observing, at reading the room.
- speaker: Respondent
  text: But even with all this knowledge, there's a quiet weight I carry - the sense that I don't fully belong anywhere. In
    India, I'm not quite local. In the U.S., I'm still the international student. And in Europe, I was often just passing
    through. Wherever I go, I'm familiar - but not fully rooted.
- speaker: Respondent
  text: I've collected so many pieces of identity, but they don't always fit into one picture. Still, I wouldn't trade this
    journey for anything. It's made me more open-minded, more empathetic, more aware. I can walk into almost any room and
    find something to connect with.
- speaker: Respondent
  text: But there are still days when someone asks me, "Where are you from?" and I hesitate - not because I don't know, but
    because there's no simple answer.
- speaker: Respondent
  text: My story isn't just about moving between countries. It's about what I've carried with me - fragments of culture, language,
    friendships, loss, and learning. It's about discovering that identity isn't always rooted in place - sometimes, it's shaped
    through motion.
- speaker: Respondent
  text: I may not belong fully to one culture. But I belong to the journey - and maybe, that's enough.
