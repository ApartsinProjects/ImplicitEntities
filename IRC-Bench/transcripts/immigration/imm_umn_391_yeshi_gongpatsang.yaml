collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My mom had a very difficult life, and the way she persevered through everything is the reason I am everything today.
    She was born in Kham, Tibet in 1969 and was forced to flee in 1985 as the Chinese Communist Party invaded Tibet and began
    its occupation of the land and took the freedom of the Tibetan people.
- speaker: Respondent
  text: She fled by foot to India, and there she worked for many years until she won the lottery of the immigration act of
    1990, allowing 1,000 Tibetan refugees into America.
- speaker: Respondent
  text: My mom left by herself because her family was too scared of the punishments that the Chinese government would give
    them if they were caught. She left behind her mother, 5 siblings, her entire childhood, and everyone and everything she
    had ever known.
- speaker: Respondent
  text: She went with smugglers and other random people that were trying to escape as well, and she eventually made new friends
    as she went throughout her journey.
- speaker: Respondent
  text: She was so scared when she first left because this was her first time being away from any family members and she had
    never left home before.
- speaker: Respondent
  text: The journey was also very scary as she had to climb mountains and avoid patrols and not get caught.
- speaker: Respondent
  text: Once she arrived to India, she had to learn to grow up and become an independent woman. She had never worked for money
    and was not familiar with a job or spending habits, and had to learn quickly as she was all by herself.
- speaker: Respondent
  text: When my mom moved to the U.S, she had help from her sponsor that showed her the way and was there for her as she transitioned
    into her new life.
- speaker: Respondent
  text: It was still very hard learning an entirely new language and how different the lifestyle was in America compared to
    India and Tibet.
- speaker: Respondent
  text: She made new friends and eventually made a life in America.
- speaker: Respondent
  text: Just because my mom had finally made it to America, it did not mean that she forgot her past.
- speaker: Respondent
  text: She came to America not just for a better life for herself, but for a better life for all Tibetan people.
- speaker: Respondent
  text: She still talks to her family on the phone almost every single day and has been an active supporter of the Free Tibet
    movement.
- speaker: Respondent
  text: She even risked her life back in 1990 when she did a hunger strike for 11 days, trying to raise awareness to the U.N.
    about the injustice in Tibet.
- speaker: Respondent
  text: My mom has beat the odds every time, has been through so much, and yet she continues to do her best to be a good parent
    and to smile every day.
- speaker: Respondent
  text: With all of her life experiences, this has inspired me to be a positive and caring person while having that same hard‐work
    ethic.
- speaker: Respondent
  text: I know that I want to be able to tell her to relax and give her time to enjoy the things she wanted to in her life.
