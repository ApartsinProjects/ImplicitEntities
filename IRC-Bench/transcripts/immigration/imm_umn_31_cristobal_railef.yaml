collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'Cristobal grew up in Santiago, Chile. In 2011, he came to live in the United States with his whole family: parents,
    brother, and sister. While Cristobal was in Chile he drank yerba mate, or as people normally called it, mate. He always
    drank mate that were not his but when he arrived to United States his father gave him a new mate cup.'
- speaker: Respondent
  text: For Cristobal, to drink mate means to remember his childhood when he went on vacation to visit his grandparents and
    other relatives. In his childhood, every single year he went to the grandparents' and uncles' houses in the south of Chile.
    In that part of the country, it's very popular to drink mate. He remembers his grandparents drinking mate every single
    day.
- speaker: Respondent
  text: The traditional form to drink mate in the south of Chile is to drink mate of one singular mate cup. In the evening,
    people meet around a mate cup to talk about life, or simple things. The traditional way of taking the mate varies according
    to the people, so you cannot say that there is a unique way.
- speaker: Respondent
  text: In Pucón, a local town where his grandparents used to live, the mate always is prepared by one person. Only one mate
    for the group, which can be served up to ten people and is complimentary part of a meeting or conversation. It is always
    served by the same person. This person decides who to give it to so that it does not follow another, and in general the
    people have to accept it from the owner.
- speaker: Respondent
  text: Each person must drink all the water or tea before returning the mate cup. So this drink matters for Cristobal means
    his connection with his roots, his grandparents in the south of Chile - specifically with his childhood and the grandparent's
    house.
