collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My maternal lineage can be traced to Scotland and England, with my 10th great grandparents moving to America during
    the late 1600s. Because my family's immigration occurred so long ago, there is not much known information about why those
    ancestors immigrated.
- speaker: Respondent
  text: During the late 1600s, thousands of people were immigrating from England so perhaps once they married, they moved
    to America together.
- speaker: Respondent
  text: My family ended up moving to the south, eventually ending up in South Carolina and were plantation farmers in the
    1800s.
- speaker: Respondent
  text: Still, not much is known about how successful they were, but farming remained the primary occupation of these ancestors
    up until the 1900s when my great grandfather moved from South Carolina to Norfolk, Virginia.
- speaker: Respondent
  text: Shortly after this move, my great grandfather enlisted in the army to fight in World War 2.
- speaker: Respondent
  text: From what I know about this more recent history, my grandmother and great grandfather were not considered to be successful,
    and sometimes living on the poverty line.
- speaker: Respondent
  text: Both of my parents were born to teenage mothers, and while this did not set them up for success, they have become
    the most successful people in my family, with my mother earning her master's degree to become a teacher and my father
    being a network engineer.
- speaker: Respondent
  text: When my parents married, they moved around a lot throughout North Carolina and Virginia until finally settling right
    by the border of the two states which I now call home.
