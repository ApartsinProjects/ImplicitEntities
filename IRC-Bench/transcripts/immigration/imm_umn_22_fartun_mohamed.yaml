collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born and raised in Somali, Mogadishu. In 1991 the civil war in Somali started. It slowly spread throughout the
    entire country. Soon there was not one place that was considered to be entirely safe. A lot of families lost their lives
    during the beginning of the war. One of those people was my mother. It put a hole in my heart that exists in my heart
    today. I could not bear with the loss of another family member.
- speaker: Respondent
  text: I came to the United States in 2004 when I was 21 years old. At the time, my husband lived in the United States and
    he sent me a marriage visa which was how I came to States. I left my home and everyone that I knew behind to come to the
    land of opportunity. I left behind six siblings, but it was my intention to bring them to the States also, after I settled.
    I could not leave them behind in that place, knowing that it was not completely safe. I left behind six siblings, five
    sisters and one brother.
- speaker: Respondent
  text: Instead of going to school like most people my age, I started working as soon as I could. My first job was housekeeping
    at hotels. The reason for that was because I needed to support my family back home. It was a burden I could not let my
    husband carry alone. Even though I worked, I still wanted to go to school. Since I worked in the morning, I started going
    to night school to learn English.
- speaker: Respondent
  text: Around that time, I started to have my children. I had three children when I went back to school to get my high school
    diploma. I was a mother of three children, worked and went to school. It was one of the hardest moments in my life. But
    it was a necessary hardship, because I knew this country, you cannot do anything without a high school diploma.
- speaker: Respondent
  text: Once I graduated high school in the United States, it felt like I finally went over a huge milestone. One of my greatest
    accomplishments at the time. I never felt so proud myself, considering the kind of hardship that was a part of my life.
    I was ambitious, and wanted to go to college, but could never find the time. So, I decided to take things one step at
    a time.
- speaker: Respondent
  text: I went and got my CDA, so I could work in the child care system and have the opportunity to work with children. Not
    only to help the children in my care, but also find ways to enrich the lives of my children.
- speaker: Respondent
  text: Today I am thirty-six years old and my life had its fair share of ups and downs. But each obstacle taught me to be
    stronger. This class is to help me take the necessary steps, so I am able to accomplish my ultimate goal. Which is to
    go to college, graduate and open the business of my dreams.
