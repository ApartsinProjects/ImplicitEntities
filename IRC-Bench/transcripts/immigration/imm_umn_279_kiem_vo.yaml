collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Kiem Vo. I am from Vietnam. I came to the U.S in December 2008. I live in Minneapolis, MN. I am studying
    English at Cedar Riverside Community.
- speaker: Respondent
  text: In Minneapolis I have many problems finding Vietnamese food. So I will tell you about my food.
- speaker: Respondent
  text: In Vietnam, there are many kinds of meat, vegetables, seafood, and they are fresh. They sold them from early morning
    to evening at the market. People bought them to cook at home every day.
- speaker: Respondent
  text: If I want to buy Asian food, I go to the market in St. Paul. I buy it, but food here isn't as fresh as in Vietnam.
    Some kinds of food are in the freezer.
- speaker: Respondent
  text: Most Vietnamese who live in the U.S. also go to the Asian market to buy food. They like Vietnamese food. It is important
    for me because I eat it for a long time. When I eat Vietnamese food, I feel good.
