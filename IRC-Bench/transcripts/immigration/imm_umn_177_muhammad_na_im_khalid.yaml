collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Selamat datang. Malaysia is a country that located in Southeast Asia. It is a culturally diverse nation which we have
    several races and ethnics in Malaysia. We have Chinese, Indian, Malay and etcetera. The assimilation of our various cultures
    is such a beautiful and unique identity for the Malaysians. Yet why am I telling about this to you? It is because the
    object that I am going to narrate really related to the Malaysian tradition. Ladies and gentlemen, I present you our unique
    tradition wear, 'songket.'
- speaker: Respondent
  text: First and foremost, let me explain to you what is 'songket?' Basically, songket is a traditional cloth for Malay.
    It is a fabric that belongs to the brocade family of textiles of Indonesia, Malaysia, and Brunei. It is actually hand-woven
    in silk or cotton and intricately patterned with gold or silver threads.
- speaker: Respondent
  text: This one particular songket is my all-time-favorite songket because it brings up mélange of good memories. Usually,
    I will wear this songket at a special celebration or festival, especially during Eid Mubarak. Eid Mubarak is a day of
    Muslim celebration after fasting for a month of Ramadan.
- speaker: Respondent
  text: Because of this songket is truly momentous for me, I wear this songket every year and I even bring this songket to
    the United States. By wearing this songket, it reminds me of all the good memories as the celebration of Eid Mubarak is
    all about happiness and bliss.
- speaker: Respondent
  text: Every year, our big family will gather at my grandparents' house and have a catch-up with everyone. Those precious
    moments are what made this songket really meaningful for me.
- speaker: Respondent
  text: At the moment when I got accepted to this university, the first thing that came into my mind is to bring this priceless
    songket. I departed from Malaysia to pursue my study at the University of Minnesota on January 10, 2014 and I arrived
    here on January 11, 2014.
- speaker: Respondent
  text: As well as me, this songket has gone through along journey all the way from Malaysia to the United States. This songket
    has definitely been a significant to my journey of migration as it is a very meaningful object that reminds me of my home
    country and my family.
- speaker: Respondent
  text: Every single time I wear this songket there, in the States, I feel very close to home. I feel connected to my family.
    I really want to introduce my culture, my tradition and my songket to the world and hopefully I could share this happiness
    and pleasure with everyone else.
