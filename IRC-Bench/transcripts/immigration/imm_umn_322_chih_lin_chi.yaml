collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi! My name is Amber. Today I'm going to talk about a family photo that I brought when I came to the United States.
    Let me give you some background about me. My Chinese name is Chi Chih-Lin. I was born in Taiwan, T'ai-chung, which has
    great landscape, a suitable temperature in the middle of Taiwan. I spent most of childhood in my hometown and then I moved
    to the capital city, Taipei, to finish my economic education.
- speaker: Respondent
  text: Before I graduated from university, I had received a text from my parents. My parents have owned a cycling factory
    in T'ai-chung, Dajia District for over twenty years. This is my decision to take over my parents' business whose mainly
    export to Japan, [in audible], and Europe. And I have to communicate with my customers by English. My English was very,
    very poor so I came to United States to take in the formal university instruction. I enrolled to Century College in Minnesota
    on July 2, 2014.
- speaker: Respondent
  text: I brought a family photo that we were celebrating Chinese New Year on 2014. Look. Family time is pretty rare because
    my family's only got two, three, or four days in a year. We make sure we do everything together. All the things we used
    to do when we were growing up. It's very valuable, very precious time.
- speaker: Respondent
  text: I have got to say I felt so frustrated in the beginning. What I mean is, I put myself under too much pressure. I was
    always afraid to communicate with anybody because I think my English is not fluency. I don't know how to talk. So, whenever
    I see my parents' photo, it reminds me what they have been work so hard. If I just give up, my parents will be very disappointed.
- speaker: Respondent
  text: My family photo who encouraged me more struggle to accept the new culture and enjoy every day gives me boundless energy
    to overcome everything. I want to be their most proud daughter in the world. Since we are far apart, I'm deeply aware
    how much I love my family. This is just a photo. But the expression is far greater than any words. This represents a journey
    and a memory between me and my family.
- speaker: Respondent
  text: In order to pay them back, I have always to work hard so they can be proud of me. And my family's photo is going to
    accompany with me to the next university in the United States.
