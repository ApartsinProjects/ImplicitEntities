collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: The origins of my family start in a small village in Andalucia, Granada, named Cuevas del Campo, in Spain. My father
    emigrated in the 1960s to Barcelona looking for work due to the industrialization of Catalonia. My mother arrived in Barcelona
    two years after my father and stayed at my father's brother Fernando and Maria Josefa's house. They lived in an apartment
    built by Spanish Construccions.
- speaker: Respondent
  text: Many people like my family immigrated during these times to the industrialized areas of northern Spain looking for
    better jobs and educational opportunities for their families. After living in La Verneda, they moved to a rented apartment
    on Alpes Street in Hospitalet. My brother Ricardo and I were born there.
- speaker: Respondent
  text: My mother's sister, Ceferina, arrived two years earlier to Barcelona and lived in La Verneda. My mother and aunt worked
    sewing clothing. They were given cut fabric and sewed by machine. They sewed ties, dresses, skirts, blouses, and jeans.
    My mother also cut and sewed clothes for my brother and me. We used to go to El Prat to bring wool and knit. Besides sewing,
    my mother took care of shopping, cooking, and making pastries the size of a yogurt container.
- speaker: Respondent
  text: Every weekend, my father drove to La Verneda to meet with his family and friends. There, they played cards and shared
    stories from the villages where their families came from.
- speaker: Respondent
  text: Every summer, my father sent us to the village by bus with the Paquillo company, which was a bus service for emigrants
    that stopped in all the villages to pick up travelers until reaching Cuevas del Campo. The trip lasted between 12 and
    15 hours.
- speaker: Respondent
  text: Since I was 10 months old, I have traveled every year from Hospitalet to Cuevas del Campo. First, we traveled by Paquillo
    buses and then by my father's Seat 650 car. Every summer of my life, I have traveled to Cuevas del Campo.
- speaker: Respondent
  text: In 1991, when I was 24 years old, I decided to participate in an exchange program called Amity Aid for teachers in
    Minnesota, United States. Since 1991, I have lived in Saint Paul, Minnesota. My mother, Sabina, came to Minnesota in 2002
    when my son Pedro was born. Since then, she has lived with me in St Paul.
- speaker: Respondent
  text: But every year, following the tradition of traveling to my parents' village, I return with my family and my son to
    Cuevas del Campo every year since my son was 10 months old. Now in two weeks, we are planning the trip again. Pedro is
    now 12 years old and my mother Sabina will turn 90 this summer of 2015.
