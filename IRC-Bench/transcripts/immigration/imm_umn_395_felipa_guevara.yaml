collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I came to the USA because my mother was an American. My grandma, her mother, went to live in Mexico when my mom married
    my dad. They had 10 children; 6 boys and 4 girls. We all lived in Mexico.
- speaker: Respondent
  text: When my older brothers grew up, they wanted to come to the USA. At that time it was allowed for children from an American
    mother and Mexican father to become American citizens.
- speaker: Respondent
  text: My mother got very sick during her last pregnancy. My grandma came over to visit and decided to take mother to the
    USA. My dad gave her permission to go, so my younger brother was born in the USA.
- speaker: Respondent
  text: Mom stayed in the USA and only went to Mexico to visit us for a month. She always got sick so she returned to the
    USA. Then she decided to bring the rest of the family to the USA.
- speaker: Respondent
  text: My older sister came to the USA, then it was my turn. It was hard for me because my dad had a small business as the
    milkman of the town. I was his helper.
- speaker: Respondent
  text: When my younger sister was able to help dad, my mom went to Mexico to bring me to the USA. She tried to cross the
    border with me after she had taught me some English words that immigration may ask.
- speaker: Respondent
  text: I was in front of the immigration officer and I forgot everything. I was not able to cross. They sent me back to Tijuana,
    Mexico, where I lived with my brother and sister-in-law.
- speaker: Respondent
  text: After a few months, I was able to get a 3 day pass to cross the border. I lived in Los Angeles, California with my
    grandma, mom, sister, and 2 brothers. I never went back to live in Mexico.
- speaker: Respondent
  text: I got married and had a family of my own; 5 children (2 boys, 3 girls) and one grandson. I got remarried and I also
    had a step son.
- speaker: Respondent
  text: After my ex retired, we came to live in Utah. My friend Ceci told me about the English class. I decided to take the
    class. It is not easy for me, but the teacher is patient and very helpful. So are the other students. I like the class.
- speaker: Respondent
  text: I have a good relationship with my brothers, sisters, family, and friends. Live one day at a time.
