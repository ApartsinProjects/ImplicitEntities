collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'Greetings. My name is Ederick Lokpez. I''ve been in Minnesota since 2003. I arrived from Venezuela. I left Venezuela
    because of political instability, economic lack of possibilities, and because I was concerned for my personal safety.
    During that period when I was working I was in a party at a friend''s house where—and I will never forget this—there were
    17 people there, and there were 12 handguns over the table, which one of them was mine. I''m looking around, and I''m
    like, ok, I''m in my mid twenties, I''m educated, I have bulletproof windows in my car, I carry a handgun, is this the
    future that I want? I don''t know if I''ll get killed when I leave my house, being hijacked or kidnapped is a regular
    thing, so I don''t want that. Oh, and by the way, I was born in Boston. I''m an American citizen. Do I really need to
    do this? Caracas, where I come from, is a 6.5-7 million people city, so and then I went to Chicago, I lived in the Loop
    area, very big, very metropolitan. I expanded my job search to Minneapolis, and I eventually got a job in a Minneapolis
    marketing agency. I came for one year. And it''s been quite a ride, it''s been a very long year, it''s been almost 13
    years, and I woke up one day with a wife, two kids, and a mortgage, and I guess I''m never leaving because my wife is
    from here. And this is a great place to live. It''s a great community, very educated place, very safe, excellent place
    to raise a family. And actually I love it, it is my adopted land. I''ve been here a quarter of my life. This is an incredible
    place. I''ve always been very fortunate in my life, and I always thought about giving back. So through this part of helping
    the corporations reach minorities, I saw the ailments: disparities in education, disparities in health care, not understanding
    how to navigate the systems. As an immigrant myself, I understand how difficult the US systems are. I decided, let''s
    help the community. So, today I founded a company called Raices Media, which means Roots Media, and we have three different
    business areas. One business area is publications. We have two magazines called Hispanic Tiempo Magazine and Vida y Deportes
    (Life and Sports) and these two magazines provide resources to the community. The other part of the business is called
    Diversity into Action, which is really the cornerstone of our business. Diversity into Action is a multicultural outreach
    organization. We do career fairs and job expos and resource events where we help minorities get jobs. We help minorities
    connect with employers, and we help minorities start their own businesses by connecting them with the right associations
    and giving them the right training and giving them the right tools. The third part is still the multicultural outreach
    for organization called Hispanic Connect, where we do marketing programs from companies to minority segments. Life has
    changed a lot from 12 years ago when I came… Turning to the future, is to continue to grow my business, continue to help
    others see their dreams, raise my kids well, get them through school, make them good people, and keep on enjoying life,
    life is great.'
