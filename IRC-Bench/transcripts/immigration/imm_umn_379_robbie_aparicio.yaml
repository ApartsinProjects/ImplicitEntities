collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: What brought you to the United States to study and play football?
- speaker: Respondent
  text: I was born in Cancun, Mexico, and I moved to Minnesota to play football and study History at Gustavus Adolphus College.
    I was drawn to college in the U.S. by the opportunity to continue playing football at a higher level. My dad, who coached
    me when I was growing up, influenced my decision a lot.
