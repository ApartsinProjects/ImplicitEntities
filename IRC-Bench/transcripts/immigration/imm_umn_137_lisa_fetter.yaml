collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My parents met and married in Saigon. The warfare was nearing their town, so they were forced to flee towards safety.
    They were voyaging to the United States, finally settling in Minnesota in 1975.
- speaker: Respondent
  text: I constantly put myself in my mother's position. What would it have been like to get married at twenty, move away
    from home, everything you knew, to a completely new country, learn a new language, and having your first child?
- speaker: Respondent
  text: Even though I don't know the whole story, I continue to navigate two cultures myself. I am the youngest of three,
    all born and raised in Minnesota.
- speaker: Respondent
  text: Growing up, I struggled with fitting in when it came to my parents being immigrants. I knew I was an odd duck but
    I couldn't grasp why I wasn't allowed to spend the night at a friend's house, why my parents didn't volunteer at school,
    nor why my parents refused to help me with my homework.
- speaker: Respondent
  text: Eventually, I used my "exotic culture" to my advantage in school. I seized every opportunity to talk about Vietnam.
- speaker: Respondent
  text: In 2004, we took a family trip to Vietnam. I got to meet my mother's family that she left behind. I created a memory
    book and I wrote to my best friend.
- speaker: Respondent
  text: When we were leaving the airport, my parents told me to go first. They wanted to see if my family would recognize
    us. They actually said "You look American. Maybe they won't know it's you."
- speaker: Respondent
  text: '"But don''t we send pictures?" Then I heard someone yell: "There''s Hạnh! She looks just like the pictures!" I turned
    to my mom. "See? I told you."'
- speaker: Respondent
  text: We made a trip to Suối Tiên. It's like a theme park.
- speaker: Interviewer
  text: Are there rides?
- speaker: Respondent
  text: One rollercoaster. Joe and I wanted to go on it, but we didn't have time. We were there for the fruit festival. There
    were really creative sculptures entirely made of fruit and rocks.
- speaker: Respondent
  text: We went to the beach, Vung Tau. Swimming in the ocean is fun until cousins throw and rub wet sand all over your body
    and shower you with gifts of seashells.
- speaker: Respondent
  text: During our break my cousins asked me "Phai chi la nguoi viet nam hay la nguoi my?" ("Are you Vietnamese or American?")
- speaker: Respondent
  text: '"Chi chua biet!" ("I don''t know yet!") We established that I am mixed.'
- speaker: Respondent
  text: I told my cousins I'll come back to visit after I marry. Ten years later, I am married. My husband also hopes to learn
    Vietnamese, and we'll visit Vietnam together.
- speaker: Respondent
  text: Now, whenever I am asked, I am first generation Vietnamese American.
