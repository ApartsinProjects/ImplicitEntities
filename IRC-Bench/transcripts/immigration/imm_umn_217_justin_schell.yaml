collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: The further back in the family you go, the less connected you'll feel to those that came before you. For the first
    14 years of my life, I knew my great grandmother Sarah. She lived about 10 minutes away from my family in Milwaukee. I
    cut her grass, we go there every Sunday night for a big Italian dinner, family holidays happened there with aunts, uncles,
    cousins, coming from across the country for Thanksgiving and Christmas, plus, there was always a tin of M&Ms for me to
    raid.
- speaker: Respondent
  text: I heard a handful of stories about great grandma Sarah from her life before I was born; that she came to Milwaukee
    from Sicily through Ellis Island, that she divorced her first husband, a poor decision at the time, that she turned down
    a marriage proposal from a known Milwaukee mobster, and that there was this song she recorded at some time in her life.
- speaker: Respondent
  text: In the last few years of her life though, great grandma Sarah was sliding into dementia, further weakening the connection
    I had with her. She died when I was 14.
- speaker: Respondent
  text: Nearly two decades after great grandma Sarah passed away, I've become a researcher about contemporary immigration
    in the United States. I've started looking at my own family history specifically that of great grandma Sarah, how Italians
    like her were viewed as outsiders; as outside the boundaries of whiteness and faced many of the same fears and prejudices
    that newer immigrant groups face.
- speaker: Respondent
  text: 'Some things that I''ve found so far: On a baptism certificate for her daughter, my grandma Tony, she is listed as
    Rosario instead of Sarah. She worked as a cosmetic salesperson during her life. Her maiden name is Sirni, which gives
    me something to go on if I travel to Sicily to find any still living relatives there.'
- speaker: Respondent
  text: 'I found her naturalization document from 1940, by then, a year when Italians were safely considered white. And I
    found out more about that record: she recorded the song in 1942 in a ''make your own record'' booth to send to her second
    husband, known to everyone as Grandpa Al, when he was serving as a cook in World War II. He wasn''t responding to the
    numerous letters she had sent him. Hearing the record, Grandpa Al''s buddies made him write back.'
- speaker: Respondent
  text: 'Yet, the music behind her voice is not from the 1940''s: my cousin Dean added some backing music in the 1980s, following
    the chords of the original song in great grandma Sarah''s vocal line.'
- speaker: Respondent
  text: Past and present generations of a family, connecting through documents and music; these discoveries and those that
    will occur down the line as I do more research are the only way I can connect to someone far enough back in my family's
    history that I never really got to know.
