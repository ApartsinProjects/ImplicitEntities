collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi my name is Maria and I'm going to talk about the special gift for my friend Alessandra. Alessandra was born in
    Fortaleza, Brazil. Brazil is a huge country located in South America. It's the only country in South America where they
    don't speak Spanish; they speak Portuguese.
- speaker: Respondent
  text: She came to the United States because her husband was transferred for a new job position and opportunity of life in
    3M. She came with her husband, son, and many dreams. She arrived to this new experience on September 3, 2011.
- speaker: Respondent
  text: She brought with her a special object from her homeland. It's a little and delicate figurine made up of clay. This
    figurine represents a musician from a famous band in Brazil, called the Pífanos. Her father got it for her at an art craft
    store.
- speaker: Respondent
  text: She shows these figurines to her friends so they can learn a little bit more about her culture and Brazilian roots.
    The Pífanos are from a city in Brazil called Recife where her father and husband were born.
- speaker: Respondent
  text: The figurines bring her back memories of her childhood because her father had many of these figurines in his house
    when she was a little girl. These musicians perform at special events such as fairs, special holidays, festivals, and
    sometimes in the street.
- speaker: Respondent
  text: They dress up in colorful traditional clothes and play different instruments including flutes, accordions, drums,
    and more. This object is special for her because it reminds her not only of her father but her whole family in Brazil.
