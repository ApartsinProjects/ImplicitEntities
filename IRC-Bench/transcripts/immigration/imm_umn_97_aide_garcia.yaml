collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi. My name is Aide. I'm from Mexico City. In 1999, I came to United States to visit my father. When I made my suitcase,
    I made sure to bring my Virgen de Guadelupe with me because she stayed by my side since I was little. All my family members
    we are Catholic, and we are believing in the Virgin de Guadelupe. I decided to bring my image of Virgin de Guadelupe because
    my mother gave it to me. I believe in her because when I need any favor, I talk to her and I know she is listening to
    me. In Los Angeles, California, my father and I went together to church every Sunday to la Placita Olvera. Every year
    in Mexico on December 12, all Mexicans celebrate the day of Virgin de Guadelupe and everybody is going to the big church,
    to La Basilica de Guadelupe for celebrating. When we went to Mexico to visit my mother and family, we're going to visit
    La Virgin de Guadelupe and the Basilica and say thank you for everything she helped us.
