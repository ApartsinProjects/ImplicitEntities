collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Paw and I was born in a Karen village called Thay Baw Boe. We moved to a Thai refugee camp in 1997 when
    I was 7 years old. My family entered a Thai refugee camp called Nu Poe, which is on the border of Burma and Thailand,
    and we were the first refugees in Thailand known as Burmese refugee people.
- speaker: Respondent
  text: My family spent 15 years in the refugee camp as I grew up. Finally, me and my parents emigrated to the U.S. on January
    28, 2012. Of course, you never forget the day you came here. And I believe that immigrating to a new country is one of
    the big opportunities and dreams for refugee people like me so we can rebuild our new life.
- speaker: Respondent
  text: It's been three years in Minnesota. When I came here, I made sure to bring my personal valuable dictionary. I believe
    this dictionary will help me in my future education. This dictionary is really important for me because I got this dictionary
    from my teacher who taught me when I was a high school student in the camp.
- speaker: Respondent
  text: I love this dictionary because this is the first gift that I got in my class and also this is the only prize that
    I own in my 12 years of student life. This dictionary is really valuable for me because every time when I open this dictionary,
    it reminds me that the result of working hard affects life.
