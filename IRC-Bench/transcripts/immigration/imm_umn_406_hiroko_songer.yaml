collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: This is the story of my grandma, or as I know her, Obachan. In late 1976, Hiroko Okushima came to the United States
    with her white American husband with very little. Mostly just clothes and jewelry, and two invaluable skills; knowing
    how to sew, and being able to speak Japanese.
- speaker: Respondent
  text: Born in post-war Itoman, Okinawa, she longed for the beautiful American life that she saw from the local movie theaters.
    Growing up near the JASDF Yozadake Sub Air Force Base, she was around American everything. American people, music, foods,
    and movies.
- speaker: Respondent
  text: To this day, there are still 32 American military bases in Okinawa, and America's influence on the island is still
    prevalent. From a young age, she felt like a black sheep in Japanese society. This was why she jumped at the opportunity
    to move to the U.S. with her husband.
- speaker: Respondent
  text: While in California, she sewed clothing for Sears and JCPenney to make money while being able to stay home and keep
    up with her duties as a housewife. Her marriage didn't work out, so she divorced and shortly after moved to Oregon.
- speaker: Respondent
  text: She continued working as a seamstress while waitressing. After having my mother, she moved with her sister and nieces
    to Hawaii. This was when her translation skills came in handy. She worked in the hospitality industry at various hotels
    in Hawaii, translating for Japanese tourists.
- speaker: Respondent
  text: In order to feed herself and my mother as a single mom, she worked multiple jobs, but a constant in her life was sewing
    for others.
- speaker: Respondent
  text: To my mother's dismay, Obachan's work in translation took her to the newly established Honda plant in Mebane, North
    Carolina. Even as she worked in translation, she would take on odd jobs making alterations, repairing and making clothes
    for others.
- speaker: Respondent
  text: After my parents met and I was born, Obachan was dead set on making nearly all of my clothing, and even cloth reusable
    diapers before it was cool to have those.
- speaker: Respondent
  text: Now, she is able to relax as she is retired and lives with us. She sews for fun now, making whatever she wants, without
    having to follow someone else's design.
- speaker: Respondent
  text: These days, she sells aprons, kitchen towels, clothes, reusable pads and hair bows, all at a local store in downtown
    Graham, North Carolina.
- speaker: Respondent
  text: The sound of a sewing machine is one of the things that makes me think of home. Obachan passed her sewing knowledge
    along to me, and it brings me so much joy that I will always be able to carry something that was important to her with
    me.
