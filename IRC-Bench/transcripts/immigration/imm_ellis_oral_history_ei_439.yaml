collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Tell me what that first night in America was like?
- speaker: Interviewer
  text: So she fed you?
- speaker: Respondent
  text: She fed, oh, yes, she fed us. (she laughs) And my Uncle Joe brought in, he brought in a pizza pie. And I, we looked
    at that and they said, "Now, this is pizza pie." And Mother said, "Oh, what is that?" This dreadful looking stuff. It
    was awful. Mother said, "Mmm." Didn't eat that. Well, we were very disappointed. When we got his back turned we put it
    out. We threw it out. But we didn't, we didn't know what it was. To eat tomatoes in a pie. That was dreadful. (she laughs)
    Then, but we did grow to love it.
