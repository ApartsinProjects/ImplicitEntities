collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born and grew up in Laos. My life was very hard living with my family there. My ethnicity is Hmong. I came here
    in 2007 by myself to the United States to get married to my fiancé.
- speaker: Respondent
  text: I brought two suitcases for myself and my traditional clothing. I left my parents and all my family members over there.
    My father passed away two years ago. I didn't see him for the last time, so I have felt very sad.
- speaker: Respondent
  text: I have lived in St. Paul since I came here. I like to live in St. Paul because there are a lot of Hmong people here
    and it is easy to go to school. It is easy to find Asian foods.
- speaker: Respondent
  text: My mom sewed Hmong clothes for me before I came here. The Hmong traditional clothes are worn for special days like
    a wedding day and Hmong New Year. The couple in the wedding should wear Hmong clothes for their party.
- speaker: Respondent
  text: We have a big celebration on Hmong New Year for three days and a lot of Hmong people wear the same clothes. The Hmong
    New Year in Laos is different from here and more fun because we celebrate outside and it is not cold.
- speaker: Respondent
  text: My mom also gave me one thing that looked like an American quarter but it was two times bigger. In Hmong, we call
    it nyiaj kis laus. The nyiaj kis laus we can use like regular money but it is important because we use it when people
    have a lot of rashes all over their body.
- speaker: Respondent
  text: We boil an egg ready to eat and break it in half and take out the egg yolk, put in the nyiaj kis laus inside the egg.
    We wrap it with a thin towel and throw it over the person's body. When finished, you will see the sudden change from white
    to black.
- speaker: Respondent
  text: If you do it a few times, the rash will be gone and feel better. That's why my life in Laos was different from the
    United States. All the things my mom gave me are valuable to me. I will keep all the things my mom gave me for my children
    in the future.
