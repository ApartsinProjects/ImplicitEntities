collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi, my name is Hung Ngo. I'm a refugee from Vietnam War. I was a South Vietnamese officer in the South Vietnamese
    navy. In 1975, the South Vietnamese government surrendered to the North. When I heard that announcement I had no choice,
    I didn't want to go to a labor camp. So I decided to escape with fifty soldiers in a small boat and went out to the sea,
    the South China Sea… We met with the U.S. 7th fleet and they rescued us.
- speaker: Respondent
  text: 'We waited for sponsor and then we went to the India Town Gap in Mainland U.S.A. At the beginning of the refugee camp
    life, it was lonely, and everything was strange: the language culture, the food, the people. You had to learn all over,
    everything.'
- speaker: Respondent
  text: I met my wife at refugee camp when we went to English class and other refugee activities. I had her at my side, actually
    she lived in the same refugee camp, so I had somebody to talk, when you need to talk to someone. That makes our friendship
    better and understand more.
- speaker: Respondent
  text: My wife tell me about her escape story, she went out to the ocean with her family, but what happened is that they
    got lost together. Only her brother was left, she don't know what happened to the rest of the family - they die in the
    ocean or went back to Vietnam. When she talked to me, she told me she was lonely and scared, and I understand.
- speaker: Respondent
  text: Then we were separated because my wife had a sponsor in Chicago and I had a sponsor in Minnesota, but we still keep
    in contact and write the letters. I went to Chicago to met her, and I asked to go back to Minnesota to me. I propose to
    her on April 1976.
- speaker: Respondent
  text: The loss of South Vietnam was really painful for me; it's a really bad memory. But I feel much better when out of
    a bad situation you still have good things, the chance to met my wife and to start a new life from the loss our country
    and we've been together until now.
