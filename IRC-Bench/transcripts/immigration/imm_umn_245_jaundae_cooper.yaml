collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Jaundae moved to America in 2008, yet she doesn't recall anything impactful from moving.
- speaker: Respondent
  text: Jaundae does remember her life in Liberia was comfortable compared to other people. She had everything she needed
    including a driver, a housekeeper, security guards.
- speaker: Respondent
  text: However, there were some struggles being that Liberia is a third world country. Jaundae didn't have a washing machine
    or dryer or a dishwasher in her house so those would be handled by hand.
- speaker: Respondent
  text: The public school system is raggedy for most children but she went to a private school that functioned like American
    schools; comparatively not as bad as other children in her country of Liberia.
- speaker: Respondent
  text: The roads are bad, being either dirt roads or pothole infested roads but there are very few good roads.
- speaker: Respondent
  text: Jaundae experienced beautiful beaches and plentiful resources but everything that makes her land of Liberia as stunning
    as it is continues to be stolen by foreigners.
- speaker: Respondent
  text: The poverty rate has been high since our second war because government officials are corrupt.
- speaker: Respondent
  text: Although, it wasn't a very hard transition for Jaundae since her family had always been between the two countries
    but there are definitely huge differences.
- speaker: Respondent
  text: It is interesting for Jaundae to live in America, because in Liberia she would be considered comfortable or middle
    to upper class but here she is considered poor and lives in an apartment complex.
- speaker: Respondent
  text: The wealth she shared with her family in Liberia did not translate well over to them coming to America, due to America's
    own wealth inequality.
- speaker: Respondent
  text: Although, that's not to say her family isn't well off in little Reynoldsburg, Ohio either. It just differs, especially
    when she was seen leaning upper class in her homeland.
- speaker: Respondent
  text: Jaundae's family experienced this wealth due to coming from a line of political importance. Her family comes from
    the 'Four Classmates of Destiny'.
- speaker: Respondent
  text: Jaundae's own great grandfather was president of Liberia twice, also known as President James Spriggs Payne.
- speaker: Respondent
  text: Yet, despite Jaundae's rich cultural ties to Liberia and her pride of being black, her great grandfather was mostly
    white.
- speaker: Respondent
  text: Although, through lineage and of course mixing, her family became to be more black African.
- speaker: Respondent
  text: Her grandma, Sarah Hanky is mulatto being German and Kru, while her grandpa, Sam Payne Cooper comes from the one-eighth
    black James Spriggs Payne lineage.
- speaker: Respondent
  text: Although, their family was born of slaves.
- speaker: Respondent
  text: Despite the turmoil of being enslaved in the past, the Payne / Cooper blood came to rise to be politically important,
    and wealthy in Liberia.
- speaker: Respondent
  text: No matter where Jaundae goes, or where her family ends up, they all carry the pride of Africa.
- speaker: Respondent
  text: Translating her love for her culture, country and origin into her art, as well as carrying around the story of her
    past to tell with anyone she meets, Jaundae is a proud Liberian, as well as a semi proud American, although it is hard
    to be proud of America.
