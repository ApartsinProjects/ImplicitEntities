collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Yo crecí en Brooklyn Park, MN. Mi vida en Brooklyn Park era tranquila. Mis vecinos eran muy ruidosos y tenían muchas
    fiestas casi todos los días. No vivía con mucha gente en mi casa solo era mi mama y mi tío. Yo no vivía en una casa yo
    vivía en un apartamento. En el verano yo iba a la piscina y al parque o a veces nada más iba a caminar alrededor de los
    apartamentos. A mí siempre me gustó vivir en los apartamentos.
- speaker: Respondent
  text: El verano de 2011 yo fui a la República Dominicana por la primera vez. Cuando yo fui, yo fui porque yo no conocía
    a mis abuelos, sí los conocía pero la última vez que yo los había visto yo tenía tres años. Ellos siempre han venido a
    los Estados Unidos pero no venían a Minnesota siempre han ido a New Jersey con mi tía y allá también viven mis tías abuelas
    y mi tío. Y también otra razón por la que fui fue porque mi abuelo había tenido una operación y había una posibilidad
    de que no viviera por mucho tiempo y mi papá quería que yo lo conociera.
- speaker: Respondent
  text: Yo fui con mi tía y con mis primos y con mi hermano. También luego mi papá llegó. A la vez las personas que yo dejé
    cuando yo me fui aunque nada más fue unas dos semanas yo dejé a mi mamá y a mi tío y a mis tías. Porque me quería ir a
    la República Dominicana.
- speaker: Respondent
  text: Cuando me fui yo sentí como que me hacía falta algo. Me sentí como que me hacía falta mi mamá y toda la familia que
    yo había dejado aquí. Yo creo que a pesar de todo lo que más me ayuda a sentirme más en casa con mis abuelos fue que ahí
    estaba mi hermana mayor y mi primo, y con mi primo puede pasar mucho tiempo pero nuestra relación de primos nunca va a
    cambiar. A él siempre lo voy a querer como un hermano mayor.
- speaker: Respondent
  text: Cuando me fui de la República Dominicana sentí como que no me quería ir porque yo iba a dejar a mi hermana, y a mis
    abuelos, y a mi tía. Otra razón por la que yo quería ir a la República Dominicana era para conocer a mi hermana mayor.
    Yo desde era chiquita siempre quería una hermana y unos hermanos. Para que yo tuviera con quien jugar a las muñecas o
    a la casita o a la escuela.
- speaker: Respondent
  text: Una cosa que me gustaría es poder hablar con mis hermanos y tratar hablar historias de chiquitos. Ahora nada más me
    quedan las historias de cosas que ahora de grandes hacemos juntos.
