collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hi. My name is Maria José Flórez García. I am from Colombia. I was born in Bucaramanga city on March 16. My ethnicity
    is Latin. I grew up in Bucaramanga. My life was busy and focused on my tennis. When I was 8, my parents were playing in
    tennis tournaments and winning and I was with them all the time watching them, and working all the time to be the better.
    They are my inspiration.
- speaker: Respondent
  text: I came to the United States on December 15, 2014, I came alone. I am in the United States to improve my English and
    study biology and looking for a scholarship for my sport. I brought my tennis rackets with me because it reminds me of
    my family and how much time I dedicated for my sport. I left my parents and my brother to follow my dreams of studying
    in Minnesota.
- speaker: Respondent
  text: When I think about my object or my treasure, I remember when my brother was my instructor and told me "You can do
    everything if you put your mind to." We won one tournament together and two bracelets. When I play tennis I use that bracelet
    and my mind plays with my memories and I travel to my past. I remember when I was playing tennis for the first time with
    him. He is my inspiration too.
- speaker: Respondent
  text: All the time my parents were saying to me "Echar pa' delante" or "Ay que guerrerarla." In English it means "keep going
    with your way" and "Try to get it." Because my parents taught me that you need to make the difference in person and your
    life. Everybody can do the same as you, but you can make something for yourself, you can overcome the obstacles in your
    life.
- speaker: Respondent
  text: Now when I am without my parents I think and remember the moments with them, but I am here and I know God has good
    things for me in the United States.
