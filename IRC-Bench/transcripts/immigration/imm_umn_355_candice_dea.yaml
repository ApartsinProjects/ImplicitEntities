collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience coming to the United States from China?
- speaker: Respondent
  text: I was brought to the United States by my parents when I was fifteen. They wanted me to have political and economic
    opportunities that I wouldn't have had in China.
- speaker: Interviewer
  text: What was it like when you first arrived here?
- speaker: Respondent
  text: When I arrived, I couldn't speak English. I was very scared and it took a while for my family to get on our feet financially.
    I had to learn how to read and write all over again, starting with the English alphabet. It was very hard to adjust and
    make friends.
- speaker: Interviewer
  text: How did you manage to overcome those challenges?
- speaker: Respondent
  text: Eventually, I got used to living in America. I was the first person in my family to go to college. I attended the
    University of Hawaii. My teachers were very patient and helped me a lot when I couldn't speak English.
- speaker: Interviewer
  text: What did your parents want for you growing up?
- speaker: Respondent
  text: My parents, especially my mother, were very hard on me. They wanted me to become a lawyer or a doctor, but I always
    dreamed of being a teacher because I love children and helping people.
- speaker: Interviewer
  text: How long have you been working as a teacher?
- speaker: Respondent
  text: I have been working as a teacher for over 15 years now.
- speaker: Interviewer
  text: How do you feel about your life now compared to when you first came to America?
- speaker: Respondent
  text: I am very grateful for where I am today. I have a loving husband and a beautiful family of my own, which I always
    dreamed of having. I am proud to be Chinese American and thankful for the opportunities my children will have.
- speaker: Interviewer
  text: Do you still have connections to China?
- speaker: Respondent
  text: Yes, I often visit China. I wonder what my life would be like if I never left. China is very different now with more
    opportunities and technology, but people still have limited rights.
- speaker: Interviewer
  text: What does America mean to you?
- speaker: Respondent
  text: America offered my family a fresh start and rights that people are fortunate to have here. The American Dream means
    that anyone, regardless of background, can change their circumstances and rise as high as they are willing to work.
