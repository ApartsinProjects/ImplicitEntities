collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Mor Lee. And I was born in Laos. I arrived in the United States in 1978. When my husband first joined the
    Secret War, he started out by transferring weapons from the village of Laj Huab. When the Americans arrived, he enlisted
    for combat in 1960. We fled together but the communists followed us and killed him. Our children fled with us; our daughter
    and two sons. One of their sons, my grandson, was killed and later photographed beside a swing where he died. He was killed
    by the communists too, just like his father and my husband who died in my arms. My husband and my children, all four of
    them, and even my son-in-law. All five of them have passed away. This pair of pants belonged to the poor child who died,
    my grandson. I want people to know how much I miss my family.
