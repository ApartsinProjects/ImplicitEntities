collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Hello, My name is Khushi Bhatt and I am a proud coconut. Window seat. Fourth of July 2017. Fireworks exploding miles
    below me. Was the U.S. really celebrating my family leaving? It seemed ironic since fireworks, originally a Chinese invention,
    were used to celebrate America's independence. Why couldn't my family be cherished the same way fireworks are? A small
    kerfuffle in our visa renewal was sending us back to a country we hadn't lived in for nine years; one my sister and I
    had never called home.
- speaker: Respondent
  text: 'We had to pack our lives up, uncertain when we''d return to familiar shores and find the sweet core of normalcy again.
    When our plane touched the tarmac in India, something felt different. My morning cereal was replaced with my grandmother''s
    curries, playdates with friends turned into Skype calls, and even my cartoon selections changed from Scooby-Doo to Chhota-Bheem.
    My Hindi skills were subpar, and I was taunted by my cousins for my American accent and low spice tolerance. My family
    jokingly called me a coconut: brown on the outside, white on the inside. My identity was comparable to a one pound island
    nut, peeled back layer by layer.'
- speaker: Respondent
  text: A few months later, we returned to the United States. I was beyond excited to start middle school and regain my sense
    of normal. I proudly walked into the lunchroom, hair oiled back like my grandmothers', and thick eyebrows like my mother's.
    I was met with scrunched faces and strange looks as I sat next to my regular group of friends. They pointed at me with
    their Hello Kitty lunch boxes and called me names. I was mocked for my "exotic" lunch, which carried generations of flavor
    from my culture, and for my accent, where every inflection represented courage, every modulation had a history of hurt.
- speaker: Respondent
  text: My identity was a paradox, I was caught between two cultures. After a long battle, with many lunchtimes spent alone,
    I understood that my identity is not defined by the cultural norms surrounding it. I realized that it was defined by how
    I peeled back the layers of my heritage. After talking to others, I unearthed that children of immigrants share this experience.
    I learned that the only way to combat these stereotypes was to talk about them, to shave them down from the jagged husk,
    revealing the fortifying water.
- speaker: Respondent
  text: So in 2020, I proudly filmed and launched the first episode of "Desi Damsels," a podcast for little brown girls with
    similar classroom stories like mine. Over the past four years, it's been our mission to help others recognize the beauty
    in their identity - coconuts and all. After amassing 35,000 listeners worldwide, being featured on NBC, and welcoming
    guests like Mindy Kaling, we aim to further our mission by being a beacon for those caught in the crossroads of two worlds.
- speaker: Respondent
  text: I unraveled the strength in speaking up for others and found that resilience, too, bears its sweet rewards. Besides
    the podcast, this tumultuous experience of picking sides encouraged me to speak out on platforms like TEDx, and I was
    even invited to share my thoughts with the Carolina Panthers. However, it is not the accolades and grand stages that bring
    me the most joy. It is receiving letters and comments from others in similar situations across the globe, who have felt
    the warmth of community and sparkle of hope through our episodes.
- speaker: Respondent
  text: 'So, at the end of the day, I stand proudly and declare myself a coconut: a fruit carried across oceans by immigrants,
    embraced by countless generations as a source of sustenance. I am a nut, every layer of me, from the resilient outer shell
    to the nourishing inner meat, holds the potential for positive transformation. The coconut is an emblem of both renewal
    and tradition, of progress and adversity. It is this symbol that has imparted upon me the strength to confront my own
    challenges and champion the path of self-driven change for others.'
