collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My father came to the United States around the time that I was born in Sofia, Bulgaria. He came over here on an F1
    Student Visa to attend the Kansas City Conservatory of Music, for a Master's degree in cello performance.
- speaker: Respondent
  text: In 1998, my mom and I had our visiting visas approved and we traveled to Missouri, intending to go back to Bulgaria.
- speaker: Respondent
  text: After living in Missouri for a year, and after my twin little sisters were born, a professor who saw him perform offered
    my father the golden opportunity to achieve a Doctorate in cello performance under her guidance in Minnesota - for free!
- speaker: Respondent
  text: Taking this opportunity meant that our family would move to Minnesota and more or less permanently abandon our life
    in Bulgaria.
- speaker: Respondent
  text: However, the prospects for my father's future music career and the sheer financial luck of this once-in-a-lifetime
    opportunity led my family to immigrate to Minnesota.
- speaker: Respondent
  text: We lived in the University of Minnesota's Commonwealth Terrace Cooperative program, which rents out housing units
    to families attending the University.
- speaker: Respondent
  text: Along with my father, my mother also sought out a higher education degree, transferring her credits over from Bulgaria
    and taking a few classes to finish her masters in history at the University.
- speaker: Respondent
  text: The neighborhood we lived in was great - there were many other immigrant families and I learned a lot from growing
    up in such a diverse community.
- speaker: Respondent
  text: This cello represents my family's journey to America.
- speaker: Respondent
  text: My father's desire to spread Balkan music led us to immigrate to the United States, and the opportunities given to
    him and my family helped the decision.
- speaker: Respondent
  text: My parents were very courageous to move their lives, especially my mother, who had a steady future where she was in
    Bulgaria, working as a tour guide in the National History Museum.
- speaker: Respondent
  text: My father and his love for music have cultivated in me a lifelong appreciation for music and performing.
- speaker: Respondent
  text: His journey and decision to pursue what he loves, despite the challenges that come with it, inspire me to find a path
    that I enjoy rather than just doing something that has an easier future.
