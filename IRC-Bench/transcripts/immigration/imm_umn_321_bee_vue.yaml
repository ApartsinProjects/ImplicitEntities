collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My legal name is Bee Vue but my elder name is Va Houa Vue. I was born in Xiengkhouang, Laos in 1954. I came to America
    in 1987. I arrived with my family. I was young and newly married. I didn't have any children yet. Traveling with me were
    my 3 sisters, younger brother and my mother. We traveled from Laos, crossing the Mekong River in 1984. Then we lived in
    Thailand until 1987 before we came to the United States. I landed in Seattle, WA, then took a connecting flight to Wisconsin,
    which became my home. Today I brought a flute with me. It is something that is always with me no matter where I go. If
    this one breaks I will replace it. I have many flutes, big and small. I leave this one here at work. The reason behind
    the flute is my life as an orphan. My father joined the secret war against the communist Vietnamese and was unfortunately
    killed at a base camp. At that time I was orphaned and devastated. I missed my parents. So, when I saw others playing
    the flute, I wanted to learn how to play it to express my sorrow. From then on, I taught myself to play and kept it with
    me at all times. Whenever I was sad or missed my parents, I would bring it out and play. I played to express my sadness,
    pain, and longing for my parents and family. All of this was expressed through the flute. This song I am playing is saying,
    "Your parents raised you well with a big family. Are you sad? My parents didn't raise me well. I am an orphan and it saddens
    me. I am going away and am leaving you behind in this world." That's what the flute is singing. These days, I am still
    playing the flute in the same manner. When I play, it makes me happy. It's a great way to express sorrow and when you're
    done you feel better. It's like going to a doctor for therapy to feel better. The flute is like that for me. The flute
    is very important to me. I was unable to bring my first flute here. We crossed the river and I dropped it. When we reached
    Thailand, I bought a new one. On our way to America, I couldn't bring it either because it broke. So, again, I bought
    a new one after we arrived. Now, I have many flutes, about 4-5 of them. I really hope that the younger generation learns
    to play this flute. It's an important part of our Hmong culture. We have musical instruments like flutes and the qeej
    that attest for our culture. I hope young people learn to play this flute. I am willing to teach anyone who wants to learn.
