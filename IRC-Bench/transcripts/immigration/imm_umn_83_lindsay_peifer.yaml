collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: This island off the west coast of South Korea has seen all the movements of my father's generation of Kims; it has
    borne witness to the suffering and trauma of a country torn in different directions and of my family being scattered to
    different places too.
- speaker: Respondent
  text: This is the home that I almost forgot as it buried itself behind the new memories of a new land as I learned to listen
    to the wind from the other side of the world.
- speaker: Respondent
  text: I have returned to this place after a 25-year separation - on the eve of the 50th year anniversary of the armistice
    of the Korean War.
- speaker: Respondent
  text: I have come to observe the changes, to pay respects to those who have died so that I can have the life I have today.
- speaker: Respondent
  text: I find myself standing within the chestnut grove my biological father planted.
- speaker: Respondent
  text: These 800 trees, only seedlings the last time that I was with them, have grown strong, tall, deeply rooted all around
    me.
- speaker: Respondent
  text: 'I am amazed at how thick these trees have grown, sharing no beginning, showing no end to their strength: 800 strong
    soldiers guarding our land, hiding its secrets.'
- speaker: Respondent
  text: I, too, like these seedlings, have grown stronger, taller, and more deeply rooted but to another world - but it doesn't
    lessen the emotion I feel, the connection I feel to this land, now that I am here looking at this island that once was
    my home.
- speaker: Respondent
  text: Standing here within the silent gaze of these wooden soldiers, I cannot see the rising hills, the organized fields
    lined with grapes, corn, and rice.
- speaker: Respondent
  text: I cannot see the ocean, nor feel her salty sting, but I can hear her voice carrying the whispers from those who have
    come before me, those who have sacrificed and toiled and plowed and fished and bled.
- speaker: Respondent
  text: Those voices reach to guide me, stretching to give me just one more minute with these soul guardians.
- speaker: Respondent
  text: These chestnut trees were my father's last goal and his success is evident as I look around me.
- speaker: Respondent
  text: They have lived on and thrived long since his death.
- speaker: Respondent
  text: I think he would be proud if he were standing here, looking at the legacy he left.
- speaker: Respondent
  text: I have to wonder, though, if he had lived, would he have returned often to wander through these branches, rest in
    their shadows, breathe in the voice of the ancestors that dance along the leaves?
- speaker: Respondent
  text: I reach out and gently run my hand on the rough bark as if it were my father's skin I am touching.
- speaker: Respondent
  text: This is the closest I will ever be to him again - his arms are now branches and his fingers are now leaves and his
    fingerprints now chestnut orbs.
- speaker: Respondent
  text: I reach my arms up to try to touch one of the chestnuts safely cocooned in its furry lime green dress.
- speaker: Respondent
  text: I am overtaken with the desire to be one of these trees; I want to dance among these branches and wear these leaves
    like a crown.
- speaker: Respondent
  text: I pull myself up to the nearest limb and climb.
- speaker: Respondent
  text: I feel the breeze more the higher I climb and I feel like I am chasing that voice, his voice, as his spirit moves
    along the branches daring me to follow, urging me to move farther and farther up.
