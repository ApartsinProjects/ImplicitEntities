collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Ali Sabri was born in Tunis Tunisia in 1959, three years after his country got independence from French colonization.
    He was born into a family of four sons and his parents. Ever since he was a little child Ali loved traveling and the tough
    economical situation of his country also encouraged him to leave.
- speaker: Respondent
  text: Ali's immigration journey began in 1981 when he went to Paris France on a student visa to study mechanical engineering.
    After two years of study he came back home to Tunisia to finish it in 1983, he finished his studies at home.
- speaker: Respondent
  text: Then after working for a while, the difficult economical situation remained the same so in 1985 Ali went to Brussels,
    Belgium on a tourist visa where he had his friend Mohsan. Ali worked there for over two years.
- speaker: Respondent
  text: In 1987 he received an invitation to go to Norway from his own brother Mohamed who was a resident in Oslo. During
    his two years stay in Norway, Ali met a Norwegian lady and was planning to marry but due to the difficult language, the
    weather and the different culture in Norway Ali couldn't adapt and didn't marry and went back home in 1989.
- speaker: Respondent
  text: In the same year he obtained a tourist visa to Canada and in 1990 Ali went there to Canada and submitted an immigration
    demand to the officials and stayed there and worked for a year.
- speaker: Respondent
  text: In 1991 Ali arrived to the United States of America, exactly in Berkeley California where he stayed with his friend
    Lotfi for 6 months and later that year he went back to Tunisia and waited for his Canadian immigration approval which
    he had entrusted some of his friends there.
- speaker: Respondent
  text: After two years of waiting Ali's friends betrayed him and didn't do the necessary tasks so his immigration file could
    be accepted.
- speaker: Respondent
  text: So in 1995 Ali went back to the United States on a tourist visa to San Francisco, California where he stayed and worked
    for five years where he met an American lady and they married but after 2 years of marriage Ali wanted to have children
    and create a family that he could settle down with but his wife at the time refused to.
- speaker: Respondent
  text: Thus Ali got divorced and stayed in the United States going back and forth from his home country to the United States.
- speaker: Respondent
  text: In 2007, Ali went back to Tunisia and married his high school sweetheart and they went back and made the United States
    of America their permanent country of residency.
- speaker: Respondent
  text: Currently Ali is living with his wife and his two daughters, Salma and Mariem in Berkeley California, about 700 feet
    away from the house that he resided in when he first arrived in 1991.
- speaker: Respondent
  text: After all these adventures across continents, Ali says that being a universal citizen was the best thing that has
    ever happened to him.
