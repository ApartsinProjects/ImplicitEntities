collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My parents tried so hard to find a brighter day for our generation. Without shoes they ran, worried and scared. They
    looked around while eating rice. They didn't need salt because sweat was salty enough. Always in danger and darkness.
    You don't want to be that loud when you don't have hope or know what will happen tomorrow. Constantly hearing a gunshot
    and seeing blood all over the place. Like you are in a world where there is always thunder and lightning and a beautiful
    sky consistently turns to dark. It always felt like you had dyed red hair because you continually saw blood around. Most
    people were killed, raped, and enslaved and most babies were killed before their first birthday. My dad helped others
    as much as he could and tried to make others feel blessed. My parents carried my big sister and big brother and all the
    pain and hardship on their backs. They didn't give up because they wanted their children to have a brighter day.
- speaker: Respondent
  text: However, in 1999 they found their way to a place called Mae Kai Kee. It was not a big place, but there was a lot of
    Karen people there. Most of our Karen people was left behind in blackness, but I really felt blessed, my family made it.
    I was born in Mae Kai Kee, then my sister BeBe Say and my brother Doh Nay Htoo was born. But fire kept coming and the
    river kept rising and flooding the houses like hurricanes, destroying everything that we built.
- speaker: Respondent
  text: Five years later all the Karen people were moving to different refugee camps. The road to our camp was bumpy and I
    thought I would never see my grandma again. When the wind stopped we was in Mae La Oon, Thailand. My heart was beating
    happy and scarier at the same time. There was nothing there, it just forest no houses. We had to scavenge for snake and
    vegetables while my dad and his friends cut tree and bamboo to build a house. They worked as a team. Everyone worked like
    ants.
- speaker: Respondent
  text: More and more Karen people came and we built a house, a school, a hospital and a church. This become our homeland
    for 7 years. We had a garden and animals. Later on our parents heard the news about America welcoming refugees to their
    country. My parents applied to come to America because they wanted us to get educated and be successful. Then our new
    journey began.
