collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: You know a lot of our cousins were too young or weren't even born yet when Ah-gong died, right?
- speaker: Interviewer
  text: What have you found out about his life that you can share with them?
- speaker: Respondent
  text: So I think from the interviews that you and I did with our moms and Uncle Tony and Uncle Peter and then also from
    reading some books about the history of the time we've sort of put together a little bit about what was going on in China
    when he was growing up and then at least some of the main big events in his life. So what we do know is that he was born
    in 1925 and when he was two years old, civil war broke out in China between the KMT and the Communists. So when he turns
    15, he's around 15 and it's 1940, this is when the war really directly affects his life. That was during the war. The
    war was between Japan and the Communists. So during the war they wanted to capture Ah Gong to serve in the military. They
    knocked on his door. And Ah Gong's father blocked the doorway. And then Ah Gong's mother told him to run out the back
    door. To run away quickly. And that's how Ah Gong left. After he ran away, Ah Gong's father.. either it was the Japanese
    or Communists.. I'm not sure, but he was killed by them after he was killed, Ah Gong wanted to come home but his mother
    told him he couldn't. What we do know though is that in 1949 the Communists really gain a lot of ground in China and essentially
    the KMT forces sort of escape to Taiwan to regroup and Ah Gong goes with those forces. When he came to Taiwan, most people
    who worked in restaurants were from the Mainland. So he was trained in restaurants as an apprentice. He went and learned
    everything. So he learned how to roast duck. Then in 1953, he meets Ahma. And so he's about 28 years old at the time when
    they meet.
- speaker: Interviewer
  text: Do you know how they met?
- speaker: Respondent
  text: Well I'll let you tell that story.
