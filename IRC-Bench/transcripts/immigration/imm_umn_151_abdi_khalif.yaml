collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Abdi Khalif. I was born in Somalia. I fled Somalia January 12, 1991 because of civil war. I went to a small
    town, Doble, near the border of Kenya. Two years later, I went back to Kismayo, the region of Jubaland, the place I was
    born. My aunt lived in Kismayo. She had a business there. She taught me how to do business. One year later, I made my
    own business. Then, seven years later, I went to South Africa. My business in South Africa was clothing, shoes, cosmetics.
- speaker: Respondent
  text: 'On November 18, 2001, I began the resettlement process in the US 2010. And I came United States January 13, 2014.
    The reason I am running Somalia and South Africa: I don''t have safety. But in the US, I have safety. I am happy in the
    US. I say thank you for the United States people, United States government.'
- speaker: Respondent
  text: 'And I like because they give me safe place, they give me everything when I come here, they said welcome to United
    States. They give me everything: the documents, everything they give to me. I want to work. I want to cover myself and
    pay my family. Now working I''m happy United States.'
- speaker: Respondent
  text: Some day, I will open a business shop. You're not working another someone. You work for your own self. You open for
    your shop any time you want. Any time you want, you close your shop. Plus you have freedom of business. Freedom of business.
