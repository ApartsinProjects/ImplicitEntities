collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Oh yes. This young woman here, she, they were examining her hair. She had it braided up so beautifully because, I
    guess, she was going to meet someone, you know. And they unbraided all her hair and evidently they found something there
    because they were clipping her hair, just cutting here and there. And she started to cry. She said, "But you're cutting
    my hair!" She says, "Well, my dear, if you want to be in America, we want to make sure that your hair is clean."
