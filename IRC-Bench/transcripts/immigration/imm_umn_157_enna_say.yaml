collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Sa La refugee camp in Thailand in 1999. At night you could see many twinkling stars, which made the
    camp a pretty place to live.
- speaker: Respondent
  text: In 2002 we moved to Mae La Oon, another refugee camp in Thailand because a bad storm destroyed our home. When we arrived
    we built a bamboo house.
- speaker: Respondent
  text: My dad couldn't find a job. Many people left their family to work for Thai people. My father wanted to stay with his
    family.
- speaker: Respondent
  text: One day his friends told him he could make a lot of money by selling drugs. My dad started drinking and selling drugs
    made by his friends. My mom tried to make him stop, but he didn't listen.
- speaker: Respondent
  text: My dad tried to stop drinking because he wanted his children to do well in school. In 2003 and 2006 my brothers were
    born, making my dad happy, so he stopped selling drugs.
- speaker: Respondent
  text: In 2010 immigration people came to our camp and told us about America. My parents didn't apply because they thought
    our family wouldn't be treated well.
- speaker: Respondent
  text: Later my parents talked with my aunt, in Minnesota. She said our family should come because there are a lot of opportunities.
    The next day my parents applied.
- speaker: Respondent
  text: After waiting 6 weeks we finally got our interview and were asked about our past and how we got to this refugee camp.
    They took everyone's picture and said you have to see if you pass.
- speaker: Respondent
  text: Our family then went to Mae Sot for X-rays and shots. The X-rays showed my parents had TB so they had to stay for
    two more weeks.
- speaker: Respondent
  text: After waiting one month our family name was put on the board. Finally in 2011, our dream and hopes came true. We are
    going to America.
- speaker: Respondent
  text: We packed and Thai people drove us to Bangkok with other families. The food on the plane was disgusting, so I just
    watched the clouds.
- speaker: Respondent
  text: After the plane arrived in Minnesota we took a taxi to our new apartment, which was bigger than our house in Thailand.
- speaker: Respondent
  text: At school I saw many Karen people plus many other races I had never seen before. Two years later I could speak some
    English and I am learning more every year.
