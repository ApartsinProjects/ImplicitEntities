collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience fleeing Romania and coming to the United States?
- speaker: Respondent
  text: My family fled Romania after my father disappeared because he was critical of the government under Nicolae Ceauşescu.
    We first went to a refugee camp in Ukraine, which was dirty and grimy, but it was all we had. After some time, we decided
    to start over in America.
- speaker: Interviewer
  text: What was it like arriving in the United States and adjusting to your new life?
- speaker: Respondent
  text: We arrived in Phoenix, Arizona, because my mother had some distant family there. The transition was very hard. I wasn’t
    prepared for the heat, the culture, the language, or the school system. My friends didn’t understand why my father didn’t
    come with us or why my accent was so strange. It was difficult to fit in at first.
- speaker: Interviewer
  text: How did you eventually start to feel more at home in America?
- speaker: Respondent
  text: My mother encouraged me to take up baseball, and that helped me make friends more easily. About a year after moving,
    I finally felt acclimated, safe, and like I had a chance to succeed. Most importantly, I felt at home.
- speaker: Interviewer
  text: What was the biggest difference you noticed between life in Romania and life in the United States?
- speaker: Respondent
  text: The biggest difference was freedom. In Romania, we lived in constant fear of being watched or followed because of
    the government. Here, I felt safe at home and at school, which was something I had never experienced before.
