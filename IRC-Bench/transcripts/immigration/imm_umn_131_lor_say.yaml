collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Lor Say. I was born in 1999. I have four siblings. Two passed away, my older sister and my older brother.
    My sister died when she was five years and my brother died when he was five months. Before my family moved to Thailand
    they were living in Burma. Because of the war, my family was afraid to live in Burma and they moved to Thailand, Karen
    refugee camp called Umphiem. A lot of Karen people have to flee to the jungle and go across the Thailand border. They
    were really afraid to go back to Burma and they found a safe place in the refugee camp.
- speaker: Respondent
  text: I was three months old when my family moved to the refugee camp in 1999. In the refugee camp we couldn't go outside
    the camp because the Thai security would not let us. I grew up in the refugee camp and used to go to school there. In
    2008 my father passed away. In 2012 my family decided to apply to come to the U.S. and we got to go to America on June
    19, 2013. My family lived in refugee camp for 14 or 15 years before we moved to the U.S.
- speaker: Respondent
  text: I had a lot of childhood friends in the refugee camp that I have to leave behind and I was crying when I had leave
    them. A lot of my relatives are still living in Thailand or Burma. I was also sad that I have to leave my dad behind when
    we came to the U.S.
- speaker: Respondent
  text: Now, I'm in the U.S and I feel free to go everywhere. I met new people and they're friendly. I went to Washington
    High School. I joined soccer and wrestling team at Washington School and I love it.
- speaker: Respondent
  text: No matter how hard my life will be, I will never give up. My goals are to graduate high school and then go to college.
    After I finish my college degree, I would like to go back to my country and volunteer there to help my people. A lot of
    Karen people are still in unsafe place. They need me and all of your help. I hope I will have a chance to go back to my
    country and help my people as soon as possible.
