collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born in Mogadishu, Somalia in 1988. I grew up in a refugee camp in Ethiopia. I got resettlement in 2009 and
    I flew to America on December 7, 2011.
- speaker: Respondent
  text: When I landed in New York, I was ready to collect my suitcase. Unfortunately, I lost one of my suitcases. I searched
    for a few minutes but it was not found.
- speaker: Respondent
  text: I started to register with the staff in the airport. They asked me what it looked like and what was inside the suitcase.
    They said do you know what color it is and how many pounds it is.
- speaker: Respondent
  text: I told them there were pictures in the suitcase. The most important thing was my picture album. I told them that they
    could recognize me in the pictures. The album had my girl's picture and my friend Barwaqo's picture. There were also some
    cultural clothes in the suitcase.
- speaker: Respondent
  text: I really felt sad at that time. After that the woman who was leading me said, "Let us take the bus." At that time,
    I was with my little girl and my sister Rahma.
- speaker: Respondent
  text: When we reached the train station, the woman said to us, "Enter the train." I asked myself, "What is this? Is this
    a station or a house?" I was confused. I had never seen a train before.
- speaker: Respondent
  text: We got rest one night in a New York hotel. Then we took a flight to Amarillo, Texas.
- speaker: Respondent
  text: After nine months I started work at a meat company in Cactus. It was hard and freezing. I worked with my knife eight
    hours standing in line.
- speaker: Respondent
  text: Also I worried about my children and how to take care of them. But I calmed down when I got my first check. It covered
    my basic needs. I felt happy because if the person is not working he or she has a lot of problems.
- speaker: Respondent
  text: One day I decided to move into Minnesota because life is better there than Texas.
- speaker: Respondent
  text: Now I have work and school thanks to the government because they play a big role in my life.
- speaker: Respondent
  text: Now my responsibility is to continue my life, education, and work to get a better life in the future.
- speaker: Respondent
  text: I think about that suitcase when I go home because my daughter's picture was in there. She is my first baby so I liked
    her picture.
- speaker: Respondent
  text: I miss all the Somali cultural clothes that were in there. I miss the injera pan I had with me. In Somali, it is called
    dawa. All that was lost.
- speaker: Respondent
  text: Since I've been in America I have taken new photos of my daughter. I found Somali clothes like hijab, diirac, dress.
    I have a new pan to make dawa.
- speaker: Respondent
  text: I feel okay about this but, if I go back to Somalia, I will get those things again and bring them back to Minnesota.
- speaker: Respondent
  text: This is important to me because I want to support and keep our culture.
