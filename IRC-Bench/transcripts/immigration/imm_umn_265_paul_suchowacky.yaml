collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience during World War II and how you ended up coming to the United States?
- speaker: Respondent
  text: In 1939, when I was 17, the Germans came into my village near Warsaw, Poland, and took me and my brothers hostage
    under a threat to kill our mother. Once abducted, I was separated from my siblings and taken to a farm in Germany to work
    for an older lady. Despite the terrible things you hear about conditions as a German prisoner of war, I didn't think it
    was so bad. The lady I worked for allowed me to go to church on Sundays and fed me really well; I was given a lot of meat.
    I even got paid for some of my work, but the pay was meager and after the war, it was worthless.
- speaker: Interviewer
  text: What happened after the war ended?
- speaker: Respondent
  text: I worked on the farm until the end of World War II in 1945. After that, I was considered a displaced person and sent
    to a displaced persons camp elsewhere in Germany. The camp was near an American army camp, likely in the American Zone
    in the southeast quadrant of the country. I hated it there.
- speaker: Interviewer
  text: Why did you hate the displaced persons camp?
- speaker: Respondent
  text: There were a few reasons. First, displaced persons were almost always on the move, sometimes by choice to stay with
    our own ethnic group, but more often forced by officers. I was in the camp for about four years, so I could have moved
    dozens of times. Second, the food situation was terrible. Germany had a minor food crisis after the war, and displaced
    persons were barely fed 2000 calories per day, which was below what a man my size and age needed. In the hunger winter
    of 1948, we were fed fewer than 1600 calories per day, mostly bland items like cabbage soup, potatoes, and split peas
    with almost no variation. It was a far cry from the meat I was used to eating on the farm.
- speaker: Interviewer
  text: How did you manage to get by in the camp?
- speaker: Respondent
  text: Some people turned to the black market to get extra money for food. I did too. The American army camp near our DP
    camp sold cigarettes cheaply, so I would buy cigarettes there and then sell them at a higher price in the DP camp. Unfortunately,
    the officers caught me and reprimanded me for it.
- speaker: Interviewer
  text: Did you have any family support during this time?
- speaker: Respondent
  text: Yes, my cousin John was stationed at the American army camp nearby. He helped me with the paperwork required to move
    across the Atlantic. In 1949, I migrated to Bayonne, New Jersey, a suburb of New York.
- speaker: Interviewer
  text: What was your life like after arriving in the United States?
- speaker: Respondent
  text: I moved in with another cousin named Pete. He encouraged me to learn English. I also met the woman who would become
    my wife, Olga Shira, who also migrated from near Warsaw. The main reason I came to America was to find more work, and
    I did. I worked various minor jobs for about a decade until 1958 when I was hired as an oil blender for Fiske Bros. Oil
    Refinery in Newark. I worked there until my retirement in 1981.
- speaker: Interviewer
  text: Looking back, how do you feel about your journey and life in the United States?
- speaker: Respondent
  text: I lived a good, long life here in the United States. I had to go through a whole lot to get here, but it was worth
    it.
