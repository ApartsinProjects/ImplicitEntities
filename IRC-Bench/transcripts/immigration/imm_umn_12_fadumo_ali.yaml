collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I left my country when I was nineteen years old. I moved to the United Arab Emirates, and we lived with my husband
    there for twenty years. In the year 2009, a financial crisis occurred in the U.A.E. After that my husband was laid off
    from his job. So we had to leave the country.
- speaker: Respondent
  text: We moved to New Delhi, India with our eight children. My children and I qualified for student visas, but my husband
    didn't. So, he went back to Somalia. My children and I stayed in India for five years. Life was so hard. We faced a lot
    of difference compared with my previous life, but my children learned many, many lessons.
- speaker: Respondent
  text: They knew that life was always changing. Many different things happened in our lives. New schools, culture, and everyday
    life. We got a lot of help from the United Nations. Since we could only live in India for five years, we moved to the
    U.S. in July 2013. That is the reason why we are here today.
- speaker: Respondent
  text: Life is not always fixed, it can change at any time. We have been here in St. Paul, Minnesota for one year and five
    months. Now everything is ok, but it will take time adjust to many different things.
