collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: What were some of the challenges Amir faced when he first came to the United States?
- speaker: Respondent
  text: One of the main issues immigrants face when moving to a new country is the struggle with the language barrier and
    culture shock. Amir felt this, but it didn't hit him as hard as it does for others. He was able to overcome this by spending
    more time here and getting used to how people interact.
- speaker: Interviewer
  text: How did Amir handle the language barrier?
- speaker: Respondent
  text: When Amir moved to California, he struggled with the language barrier and homesickness. He remembers taking a class
    at his community college and not being able to understand the American accent. As a result, he had to withdraw from the
    class because American English was too difficult to understand. To overcome this, he made friends, and together they practiced
    their English. They would work on grammar exercises and correct each other's work. After a year, he retook the class,
    with the same professor, and got an A.
- speaker: Interviewer
  text: What cultural differences did Amir notice between Malaysia and the US?
- speaker: Respondent
  text: One of the first frustrations Amir felt was with American culture. Americans are very individualistic while Malaysian
    culture is more familial and community-oriented. He doesn't think that it is a bad aspect of American culture necessarily,
    rather it is something he has noticed and isn't particularly fond of.
- speaker: Interviewer
  text: How did Amir cope with homesickness?
- speaker: Respondent
  text: Amir has a large family with six siblings and many cousins, and they would always hang out together. There is nearly
    no Malaysian food in California because the Malaysian population is significantly lower than most other Southeast Asian
    minority groups. He says that American food is dry while Malaysian food is flavorful. He still struggles with these issues
    but having friends at UC Berkeley and focusing on school helps with his adjustment. He also makes an effort to seek out
    and try new foods because while there is little Malaysian food, California does have a variety of other foods from around
    the world to try.
- speaker: Interviewer
  text: What does Amir enjoy about living in California?
- speaker: Respondent
  text: One of the things Amir enjoys about California is the weather. In Malaysia, the weather is tropical and humid, so
    you sweat a lot. In California, you do not sweat very much, so taking a shower every time you return home is not necessary.
    Amir cares a lot about the environment, so conserving water is something he enjoys. Amir also likes the transportation
    systems in the Bay Area because compared to Kuala Lumpur, the BART and CalTrain are very efficient modes of transport.
- speaker: Interviewer
  text: What are Amir's thoughts on his immigration experience overall?
- speaker: Respondent
  text: Amir has overcome a lot since coming to America. He wishes the immigration process was easier, but ultimately, he
    recognizes that this has been a positive, life-changing experience. The next step in his life is seeing his family when
    he graduates.
