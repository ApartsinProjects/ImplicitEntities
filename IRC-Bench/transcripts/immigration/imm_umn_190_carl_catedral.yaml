collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Yeah, my parents knew each other in the Philippines, but they came separately to the U.S. So my dad came - it's one
    of those crazy things where I think his mom was born in Hawaii, but they didn't know until they were like super old, so
    finally, they were like 'okay, you can come.' And then like from my mom's side, one of my great uncles was accepted into
    UCLA. So as a result of educational - like his access - he petitioned all my family to come. And then my mom, was too
    old, so she had to finish school. So my grandparents came here, and then they petitioned her. And then my mom and dad,
    you know, they knew each other there, and think they were dating ten years in the Philippines. They met each other here,
    and then they finally got married - moved to New Mexico and Phoenix.
- speaker: Interviewer
  text: Tell their story!
- speaker: Respondent
  text: Yeah, right?
- speaker: Interviewer
  text: That's a very good story actually. It's got a good hook, you know, the knowing each other for so long.
- speaker: Respondent
  text: Right! Yeah, it's interesting. You forget how interesting that is.
- speaker: Interviewer
  text: You'll tell it one of these days, for sure.
