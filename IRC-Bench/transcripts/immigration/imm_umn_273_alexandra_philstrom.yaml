collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Up until about 6 years ago, the fact that I was born in England was just a party trick. In get-to-know-you icebreaker
    activities like Two Truths and a Lie, I would always include "I was born in England" and no one ever guessed THAT was
    a true statement.
- speaker: Respondent
  text: '"But you don''t have an accent" they would say. And I would give my standard response: I came to the US when I was
    2. Mom says that I had one but that as soon as I started school in the US I lost it because I was surrounded by American
    kids all day.'
- speaker: Respondent
  text: My parents still have their accents. My Mom is from Windsor and my Dad is from a suburb of London called Bushey, so
    both have lovely British accents.
- speaker: Respondent
  text: 'I didn''t realize how much my parents'' identities were tied to their accents until I left home as a young adult.
    Mom and I went on a weekend knitting excursion organized by the Minnesota Knitters Guild: it was a bunch of knitters on
    a bus, traveling around Minnesota and Wisconsin visiting sheep farms and yarn stores.'
- speaker: Respondent
  text: 'Mom and I didn''t know anyone else on the trip. It was striking to me how every time - EVERY time - my mom spoke
    to someone the very first thing they said to her was, "Oh! Where are you from?" And mom would recite her standard response:
    "originally from England but we''ve been in Iowa for 25 years".'
- speaker: Respondent
  text: I heard mom's standard response over and over - I got sick of hearing it. I thought WHY is she always talking about
    England?? But then I realized that it wasn't her; it was the people she was interacting with.
- speaker: Respondent
  text: Every time she speaks, that identity of being British - of being an immigrant - is reflected back to her. And that
    is very different from my experience.
- speaker: Respondent
  text: Without an accent, I get to choose when I reveal that identity. I would love to have a British accent, and I am sad
    that I don't. When I hear British people on tv or on the radio - especially mothers talking to their children - it feels
    like home.
- speaker: Respondent
  text: Occasionally a phrase or exclamation will pop out, but I think that is more a symptom of being 37 and turning into
    my mother.
- speaker: Respondent
  text: Because I pass as an American, I didn't realize that being an immigrant had an effect on my life beyond being a neat
    party trick.
- speaker: Respondent
  text: Then about six years ago I started working with a new colleague and she introduced me to the idea of being a Third
    Culture Kid.
- speaker: Respondent
  text: Since then, I have recognized that it is probably not a coincidence that my best friend growing up was from an Indian
    family, that I pursued a degree in Global Studies, that I tutor immigrants and refugees, that I worked at an international
    non-profit, or that I love being friends with people different from me.
- speaker: Respondent
  text: So even though I pass as an American, my experience growing up in an immigrant family still very much shapes my life.
- speaker: Respondent
  text: Now, I'm ok with letting my choices speak to my heritage instead of an accent.
