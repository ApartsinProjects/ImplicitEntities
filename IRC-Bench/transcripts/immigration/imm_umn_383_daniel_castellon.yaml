collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your background and where you grew up?
- speaker: Respondent
  text: I am a second-generation immigrant. I was raised in Texas by my father, who is from El Salvador.
- speaker: Interviewer
  text: What was it like growing up in your family here in the U.S.?
- speaker: Respondent
  text: Growing up, my family was very close. My father worked hard to provide for us, and we always stayed connected to our
    Salvadoran roots while adapting to life in the U.S.
