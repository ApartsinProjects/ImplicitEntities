collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: This is the story of my family. I have four people in my family, my dad, my mom, my sister, and I. Our relationship
    is very close. We always have each other with everything. We have always been a united family, and we will always be there
    to support each other.
- speaker: Respondent
  text: My mom and my dad met at the school of Champerico, a rural community with many inhabitants near the sea. We live with
    my mother, after my father immigrated to the United States to give us a better life.
- speaker: Respondent
  text: We had many good and bad experiences, but the worst was living behind our family in Guatemala. They play an important
    role in our lives. Also, my older sister stayed in Guatemala because she did not want to come to the United States.
- speaker: Respondent
  text: We emigrated to the United States because the economy and social situation in my country is getting worse every day.
    That's why we made the decision with my mother to come to the United States.
- speaker: Respondent
  text: We went through all of Mexico by bus and car day and night for a week and it was very fast until we reached the border
    of the United States and Mexico to be able to be processed by immigration.
- speaker: Respondent
  text: My family changed a lot over time because people are while other pass away. We have always stayed together despite
    the circumstances. My maternal family has always been there for us and although everything changes we are always in communication.
- speaker: Respondent
  text: I want my family to know that I will always be there for them, and they will never be alone. Thanks to them I am the
    person who is fulfilling a dream of being able to be in the United States, and be able to continue overcoming new challenges.
- speaker: Respondent
  text: Remember that your family will always be there for you; even if you stumble, they will always help you get up. You
    keep going and do not stop.
- speaker: Respondent
  text: I'm grateful to my dad and mom for giving me life, and I will always make them feel proud of their son.
