collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Unity Muna. I came from a refugee camp in Thailand. I would like to tell you about my family before they
    came to America. I lived in Thailand for two years. I have one brother and one sister. They are both married. I came to
    America with my father and sister. My mother passed away, so my father is a widower.
- speaker: Respondent
  text: I have lived in St. Paul, Minnesota for ten months. I feel excited in America because I see wonderful buildings and
    bridges. I also feel very happy in Minnesota because it was the first time for me to see snow. I had to change my lifestyle
    to wearing thick coats. Sometimes I feel very bored in the winter. I don't like to go outside.
- speaker: Respondent
  text: But, I know there I also have opportunities to go to school and to find a job. I can also go to the hospital if I
    am sick and I can do many other things. If I still lived in Burma, I couldn't go to school and improve my living standards
    because the civil war often affected events in my village. So, I was not able to go to school and have a permanent job.
- speaker: Respondent
  text: I come to the Hubbs Center to continue my studies. And there will be better than in Burma. My English speaking is
    very poor. So, I need to take ELL classes so that I will get a better job in the future.
