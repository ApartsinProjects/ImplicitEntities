collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: When my family was in Burma, they had a difficult time. They grew food on their farm, but they didn't have enough
    food. Each day they had to share food and ate together in the kitchen.
- speaker: Respondent
  text: When the war started, my family had to run away from the Burmese soldiers. Otherwise they would get killed by Burmese
    soldiers.
- speaker: Respondent
  text: During the war, Burmese soldiers killed more than a hundred Karen people, destroyed the people's houses and their
    farms because they wanted to take over our land.
- speaker: Respondent
  text: But my family found a way to escape. Before they escaped, they needed money so they sold the food that they grew.
- speaker: Respondent
  text: After they escaped, they moved to the Mae La Oon camp. When they moved in Mae La Oon camp, they started getting food
    for free because people who worked in Mae La Oon camp gave them a note which allowed them to get food every month. If
    they lost it, they would not get food anymore.
- speaker: Respondent
  text: When my family moved to Mae La Oon camp, they said it was easier than Burma because they didn't have to plant a lot
    and work early every morning.
- speaker: Respondent
  text: They got free food in Mae La Oon camp, but if they wanted more food, they had to work to get money to buy more.
- speaker: Respondent
  text: In Mae La Oon camp, the amount of food you get depends on how many people are in your family.
- speaker: Respondent
  text: Then, 16 years later, my family heard that American people were going to help refugee people fill out a form to go
    to America.
- speaker: Respondent
  text: Before my family went to sign up, they tried to find out about America.
- speaker: Respondent
  text: After they found out about America, they started to apply to go to America.
- speaker: Respondent
  text: One year later, Americans started to interview my family and check out health problems at Mae Sot.
- speaker: Respondent
  text: A few months later we got to go to America.
- speaker: Respondent
  text: When my family moved to America, they started a new life.
- speaker: Respondent
  text: My family had a good life in America because they got food that they wanted to eat and free education.
- speaker: Respondent
  text: Life in America is easier than Thailand.
- speaker: Respondent
  text: They thank God a lot for blessing them to get to come to America.
- speaker: Respondent
  text: America had freedom so it was good for them to start a new life.
- speaker: Respondent
  text: If they were still in Thailand right now, they wouldn't get enough food and freedom like America.
- speaker: Respondent
  text: Also they would still have to run away from Burmese soldiers.
- speaker: Respondent
  text: So they were really lucky!!
