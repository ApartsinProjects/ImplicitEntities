collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'My name is Rodrigo Botero. I''m from Cali, Colombia. It is a small city, very warm. I lived there almost all my life.
    My education: the first university I went to was a private one, the Universidad Javeriana. Then I entered the Universidad
    del Valle for the first time. I graduated with a major in topographic engineering. I worked a little as a topographer,
    but mostly I worked as a teacher and university instructor. I''m finishing my master''s degree at the Universidad Javeriana.
    I''m working on my thesis in computer systems, and I''m applying to the PhD program in mathematics here at the University
    of Minnesota. There are a lot of reasons but the main reason is that almost all my family is here: my sisters, my parents,
    everyone is here. They wanted me to come to Minnesota. I came with my family: my wife, my son. We are living with my parents.
    Another reason is because the University of Minnesota seems like a great school and because I like the peaceful environment
    of the city. The people here are very kind. In the summer, I like all the green a lot. It''s very much like my city, Cali.
    Here in Minnesota, I''m studying English because the PhD program requires us to have a very high level of spoken English
    because we would have to teach. In the meantime, I''m waiting for a decision on my PhD application. The University of
    Minnesota was the first university that I got to know and like. I liked the environment, the people. It''s very different
    from my country. I have come here to continue my studies and get a PhD. In Colombia we have PhD programs, but in my case,
    the doors are closed for me because of my age. I''m 45 now, and in Colombia getting a PhD in mathematics at 45 is unthinkable.
    Everyone says no. In Colombia, there are a lot of problems with knowledge and with the people who control it. There are
    lots of problems. Besides, here there is cutting-edge research, expertise; here people do not have problems of any kind.
    In the future, I would like to go back to Colombia. That''s my plan. There are good job opportunities with a PhD. I would
    like to go back and work in research. Thank you very much.'
