collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: For my project, I decided to tell a story I am quite proud of, that being the story of my family, mostly with regards
    to my father and my grandmother, who are both from Puerto Rico.
- speaker: Respondent
  text: Puerto Ricans, aside from being born with US citizenship, are in many ways treated as foreigners and face many of
    the same barriers to both coming to and settling in the States, such as a language barrier, and facing ignorance and blatant
    racism.
- speaker: Respondent
  text: Through recent conversations I've had with both my father and grandmother have reflected this as well. They both feel
    that although they have been living in the States for decades, they don't necessarily feel wholly American, but they don't
    feel like they belong in Puerto Rico anymore either.
- speaker: Respondent
  text: My grandmother, more fondly known as "Mami Sonja," was born in 1954 and grew up in the projects of Guaynabo, Puerto
    Rico. The whole area was very poverty-ridden, and many, including her mother, my Mami Ana, did not even know how to read
    and write.
- speaker: Respondent
  text: Seeing how the public education system had failed so many around her, she took it upon herself to study hard enough
    to get a full-ride scholarship to the private school in the area. It was here that she started to learn English and became
    fluent by the time she was in high school.
- speaker: Respondent
  text: Even though she never imagined she would leave her island, she knew it would open up many opportunities for her.
- speaker: Respondent
  text: Growing up, she saw one of the biggest injustices done to the people of Puerto Rico, in the form of what is known
    by many as a "blood tax" on the island. This refers to Puerto Ricans being drafted into the US Army during the Vietnam
    War, despite the fact that many of them did not even speak English.
- speaker: Respondent
  text: This included two of her beloved family members, one of whom did not make it back.
- speaker: Respondent
  text: Seeing this, she joined the FUPI, an organization that was in favor of Puerto Rican independence from the US and went
    to many of their protests despite the fact that many of them turned dangerous.
- speaker: Respondent
  text: Little did she know that she would end up marrying an American soldier and moving here to Charleston with her three
    children, one of which was my father, who was only five years old at the time.
- speaker: Respondent
  text: Her passion for fighting against injustice against those who can't always fight for themselves led my Mami Sonja to
    begin working at Child Protective Services for thirty years as a case worker and an interpreter.
- speaker: Respondent
  text: And even though she has been living here for decades and serving the community, I have often seen her treated with
    much intolerance, just because of her heavy accent.
- speaker: Respondent
  text: She even told me recently that she was asked for her green card at the DMV and that she had some very colorful words
    to say to the worker.
- speaker: Respondent
  text: The next person I want to talk about is my father, who did not spend as much time growing up in Puerto Rico as Mami
    Sonja as he came to live in the states with her when he was only five.
- speaker: Respondent
  text: He told me that his first few years he spent were very hard for him because he missed his hometown of Santurce and
    his father, who was still living there.
- speaker: Respondent
  text: He used to cry every night to my Mami Sonja and told her that English was an impossible language and that he'd never
    be able to learn it.
- speaker: Respondent
  text: Despite what he may have believed at that time, he did in fact learn English with a lot of practice and the help of
    music.
- speaker: Respondent
  text: He told me that his two favorite genres growing up were hip hop and punk rock.
- speaker: Respondent
  text: 'He liked hip hop because of the storytelling aspect but he liked punk rock because it was quote on quote: "angry
    like me."'
- speaker: Respondent
  text: He liked it so much in fact, that when he was fifteen years old, he started a band called "Aggravated."
- speaker: Respondent
  text: He wrote lyrics, sang, and played lead guitar for his band and it became quite well-known in Charleston's underground
    punk scene.
- speaker: Respondent
  text: '"Aggravated''s" biggest rival band was apparently a group comprised of neo-nazis, which after making xenophobic remarks
    to my dad, it became a regular occurrence for the two bands to brawl.'
- speaker: Respondent
  text: However, after I was born five years after the formation of "Aggravated," his punk days were over and he took on a
    more domestic role.
- speaker: Respondent
  text: He often tells me what he remembers of his life in Puerto Rico, although he says many of them are starting to fade
    as he stopped visiting after his father passed away when he was thirteen.
- speaker: Respondent
  text: Both him and my Mami Sonja are proud of their heritage and have both passed on their culture and traditions down to
    me and the other children in my family.
- speaker: Respondent
  text: For every holiday, such as Thanksgiving or Christmas, we eat food that is typically eaten here in the States, such
    as turkey and stuffing, but we also always include a few Puerto Rican dishes and conversations switch back and forth between
    English and Spanish.
- speaker: Respondent
  text: It is this mix of cultures that I find to be unique and beautiful about my family and I am happy that I get to experience
    both because of them and share their stories and journeys.
