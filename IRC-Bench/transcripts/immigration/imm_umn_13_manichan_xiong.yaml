collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My given name was Ia Yang. I am 63 years old. I was born on June 15th, 1950 in the village of Muang Cha. My parents'
    name was Zam Vas Yang. My husband is Colonel Shong Leng Xiong. I am here today to tell my life story through these photos
    here.
- speaker: Respondent
  text: I'm going to talk about an aircraft like this one, that carried food and supplies to the soldiers. One of these was
    shot down and crashed beside a mountain by our farmland. There were two pilots. One of them died in the crash. The other
    pilot hurt his leg after his parachute got caught in a tree. Then, he fell down into a cavern. The search planes couldn't
    see him so, he hid for two days.
- speaker: Respondent
  text: My father developed a way to make this spoon. When the plane crashed, my father took me to go collect the steel to
    make a hoe like this and the aluminum to make a spoon for eating. We reached the cavern and saw the American hiding inside.
    He was afraid that we were communists and would kill him. I told my father, "Father, there's an American over there."
    The American then hid further in the cavern.
- speaker: Respondent
  text: My father thought the communists would be watching the area, and that if we helped, we would be killed. So, my father
    said he wouldn't go, but he would pack food, in a basket like this, and water, in a carrier like this one. Then, my father
    told me to bring the food to the American so he wouldn't die. I told the American to eat and that it wouldn't kill him.
- speaker: Respondent
  text: Since he didn't believe me, I said I will eat in front of him and drink the water to show that it wasn't poisoned.
    If I didn't die, he should eat. So, I drank a bit of water and ate a bit of food to show him that I was fine. Then he
    ate the food. His leg was really injured, so, I told my mother that his leg was injured, swollen, and he couldn't walk.
- speaker: Respondent
  text: My mother was very knowledgeable about medicine. She gave me medicine to wrap his leg. My father refused to go in
    case the communists saw and found out that we were hiding the pilot. Instead, he told me to carry this basket and this
    scythe, to cut banana leaves for the pigs. I was just a little girl cutting banana leaves, but really, I had fed the pilot
    and wrapped his leg without anyone knowing.
- speaker: Respondent
  text: When my father went to town, he contacted a police officer and explained that there was a stranded pilot at the crash
    site who needed help. At that moment, a plane landed, so, the officer went and spoke to the pilot. They asked my father
    some questions. My father described that beside our farmland, there was a jungle and a creek, and on the other side of
    the mountain was a buffalo field that belonged to my father.
- speaker: Respondent
  text: They then gave us a white cloth and told us what to do. At night, my father told me to make a fire as he supported
    the pilot's bad leg with his shoulder. Slowly, we made our way until dawn and hid in a glade of tall grass near the mountainside.
    Since it was a glade, no one would be able to see us hidden there in the forest.
- speaker: Respondent
  text: Around 9 o'clock, the plane flew overhead. Then, my father told me to lay out the white cloth. I laid it out and waved
    another cloth so that they could see us below. They hovered low above the field and dropped a rope. The American grabbed
    the rope and they pulled him up into the aircraft.
- speaker: Respondent
  text: Afterwards, the communists discovered that we helped the American. They came to our farm to kill us. My father wasn't
    home at that time and they killed my grandfather in his sleep. It was only my mother and I left. She wrapped us in a blanket
    and we both hid under the bed. There was blood everywhere while we were under the bed.
- speaker: Respondent
  text: The communists came in, kicked my grandfather to make sure he was dead, then left. We waited until morning to come
    out. There was so much blood. My grandfather loved me the most. I was with him every night and when he died, I was so
    sad. I then vowed to marry a soldier, fight the war, and kill them.
- speaker: Respondent
  text: Afterwards, my husband came to our camp to train, and then I married him. This is my husband's best friend who taught
    me how to shoot a gun. When I went to fight in the war with my husband, a pilot was shot down, so my husband and I went
    to help. He was scared that we were communist soldiers.
- speaker: Respondent
  text: My husband said, "Family, family" to reassure him and showed him our American radio. When he heard English on the
    radio, he quickly grabbed it and called a plane. We were in the jungle so the plane hovered above and dropped a rope for
    him. Halfway up, he jumped back down to give my husband a hug and a kiss.
- speaker: Respondent
  text: After he left, the next day, he called and said he had a gift. The next day, he brought two turkeys for us and said,
    "Today is Thanksgiving day. If you hadn't saved me yesterday I wouldn't be able to celebrate today, so I brought this
    meal to share with you." So, we shared a Thanksgiving meal with him.
- speaker: Respondent
  text: He's one of my greatest friends but he died in Thailand. This one here died in Laos. He didn't make it back. I believe
    that if they were alive, I wouldn't have to tell my story because they would. When I told them my story about how my father
    saved the pilot and how my grandfather died, they understood me.
- speaker: Respondent
  text: They even came to our home and thanked my father. My brothers then took them to the site of the crash, where we helped
    the pilot, and took this photo there.
- speaker: Respondent
  text: I have lived through many hardships. I am now 63 years old. If I did not tell you this story, I would take it with
    me to the grave and you would never know. So please love and respect your elders. They have suffered so much for our country
    and for us. Thank you for giving me the time to share a few words.
