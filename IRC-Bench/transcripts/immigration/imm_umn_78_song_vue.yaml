collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I am Song Vue. I am going to tell my story to my child. We lived in Laos and only ever heard our parents tell us about
    escaping from China. We never actually knew or experienced it. We were young and can't remember, either, but now we have
    experienced it firsthand. We escaped with our children, just like the elders told us about China. We ran to the jungles
    and were starving. All we ate were vegetation and roots. Wherever we went, there was no shelter. We hid and took shelter
    where we could. If we reached a cave, we would hide in the cave. It was a terrible thing, having to escape the same way
    our elders did. We didn't understand before and then we received the same fate. It's very sad. We ran until we were hungry.
    They said our country would be no more and we would suffer. People had already abandoned Laos and left to Thailand. Finally,
    my family escaped with our relatives. At that time, we escaped with 50-100 people. I can't remember. During our journey,
    it was difficult for my children. They cried a lot. I had nine children. The older children were able to carry things
    and the two oldest could fend for themselves but my two younger sons had a difficult time. For a whole day and nights,
    they cried. They cried a lot but I couldn't do anything because I carried my youngest on my back. Everyone was carrying
    something and my husband carried the rice sack. My two sons were struggling and crying so sometimes they were carried
    or their hands were held. We left Laos in May. It was planting season. All the corn and wheat was planted. The moment
    we crossed the river the moon shone brightly that night in May when we got to Thailand. We got to Thailand in 1979, May
    of 1979. We must live righteously. We were fortunate to not meet tragedy on our journey. We all arrived healthy and well.
    Heaven and Earth saw us through. They recognized the good in us and ensured our safety and health. When we got to Thailand,
    many others arrived as well. But then you think, "Well, we've arrived but will we stay or go to America?" We ended up
    staying for 10 years. People arrived and left. We didn't have a country anymore so it was time to go to a better, more
    prosperous place. So, we steeled our hearts and came. We left Thailand on September 7th but wound up in Phanat Nikhon
    for one year before coming to the U.S.. We departed Thailand from there to come to the United States. We came to the U.S.
    for a better life. That's how we prepared our hearts for the journey to this country. When we arrived, we were too old
    to learn in school. There wasn't much for us to do so we just ate what we were given. Our children were young and able
    to learn new things but we were old and no longer able to make a living. We live our lives simply. If we are fed, we eat.
    If they don't feed us, it's okay. If we are scolded, we endure it. We endure and ask for forgiveness. We came for the
    opportunity to live longer, to be able to see the world, to be able to see our children and grandchildren grow up. This
    is my story.
