collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: The United Nations has helped many refugee people in Thailand to come to the US. In 2013 my family applied for this
    opportunity. We had to wait for a while to see if they would accept us or not.
- speaker: Respondent
  text: When they accepted my family, they called us to go interview. In order to pass the interview my parents and my older
    sister had to answer many questions. Me and my little sister are under age so we didn't get to interview. They said if
    my family failed the interview we wouldn't get to come to America.
- speaker: Respondent
  text: Once we passed the interview, we had to wait 2 or 3 months. Then we had to go to Mae Sot for a medical check. We lived
    in a refugee camp, so we had to take a truck to Mae Sot. I had never ridden in a truck before, so I got really dizzy and
    threw up. It took us a day to get to Mae Sot and my family was tired.
- speaker: Respondent
  text: We had to stay in Mae Sot for a week to check our health. If we had diseases like TB, cancer, heart disease, and if
    you didn't pass the medical check you had to stay two weeks there to do follow-up. My family didn't have any health problems
    so we only had to stay there for a week.
- speaker: Respondent
  text: Once we finished checking our health we had to come back and wait for 6 months, until the UN told us that we got to
    go to America. If we failed the health test we would have to wait more than 6 months. All my family members passed the
    test so we left our camp on August 13, 2013.
- speaker: Respondent
  text: Before we went to America people who work at IOM gave my family an IOM bag. They said that we had to carry the IOM
    bag until we got to America. If we carry the IOM bag, people will know that we were refugee people from a refugee camp.
    Also if we get lost people who work in the plane would help us to find our way. So the IOM bag always had to be with us.
- speaker: Respondent
  text: We took three planes. On the first plane we flew to Mae Sot to Japan and we slept one night there. The second flight
    was from Japan to New York. We slept one night in a New York hotel. In the morning of August 22, 2013, we flew to Minnesota.
- speaker: Respondent
  text: When I was on the plane I was so dizzy and threw up. After we got off the third plane we didn't know where to go and
    the guy that worked there sent us to the place where our social worker was waiting for us. Then we met our social worker
    and he drove us to our house. This is my experience from home to America.
