collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My father has completed 22 years of education both in Canada and the United States.
- speaker: Interviewer
  text: What were some of the reasons your father decided to immigrate to the US?
- speaker: Respondent
  text: Some of the reasons why my dad decided to immigrate to the US are better scientific education and more jobs. He also
    wanted to go to graduate school in the United States.
- speaker: Interviewer
  text: How did he find adjusting to American society?
- speaker: Respondent
  text: At first, he found it difficult to learn how American society worked. To add, this was his first time living away
    from home. America turned out to be as expected though.
- speaker: Interviewer
  text: What did he notice about America that was special?
- speaker: Respondent
  text: One thing special he noticed was America's diversity in many ways.
- speaker: Interviewer
  text: Can you tell me about his family and career in America?
- speaker: Respondent
  text: He met my mom, Miriam Goodman, in America. They built their careers and family here in California.
- speaker: Interviewer
  text: Does he have any wishes or thoughts about America today?
- speaker: Respondent
  text: One thing my dad wishes about America is that life would be better if everyone wasn't so divided.
- speaker: Interviewer
  text: What does he think about the distinction made between immigrants and citizens in the US?
- speaker: Respondent
  text: My dad notices that people in today's media make a silly distinction between immigrants now and the citizens of the
    US. If you aren't Native American, you or your family was or were an immigrant at some point.
- speaker: Interviewer
  text: What advice does he give to immigrants coming to the US today?
- speaker: Respondent
  text: 'Some advice he gives to immigrants coming in today: work hard and contribute to your community.'
