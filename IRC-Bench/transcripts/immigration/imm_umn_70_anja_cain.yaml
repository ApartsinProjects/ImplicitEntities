collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: How was it living in West Germany during the time of the Berlin Wall?
- speaker: Respondent
  text: It felt very sheltered and safe. I saw American soldiers on my way to school and walking around the city. I never
    felt uncomfortable and it was just accepted as the way it was.
- speaker: Interviewer
  text: Can you tell me about your grandparents' experience with the organization building tunnels under the Berlin Wall?
- speaker: Respondent
  text: My grandparents grew up in East Berlin. My grandfather became a doctor and my grandmother started university, which
    brought them to the West. Their families were still in East Germany. One of their friends, Arin, was trying to free his
    girlfriend from the East by building tunnels under the Berlin Wall. Because of my grandparents' connection to the East
    and their desire to help, they became involved in the organization. It was illegal, and during one of their exhibitions,
    my grandmother was caught.
- speaker: Interviewer
  text: How did your grandmother get caught?
- speaker: Respondent
  text: Someone messed up and left the door open. She went to jail for a year and a half in East Germany until the West German
    Government bought her out and freed her back to the West.
- speaker: Interviewer
  text: Did your grandparents ever talk about their experience?
- speaker: Respondent
  text: No, they never talked about it other than to mention how bad the food in jail was or small things like that. The only
    time I heard them talk about it was when my grandpa told me I should be thankful about all the butter I could put on my
    bread. He said he had to savor the butter till the very last bite so that there was enough to taste.
- speaker: Interviewer
  text: What were your expectations about America before you came here?
- speaker: Respondent
  text: 'I thought what everyone thought: fast food, crime, shootings. My first trip to America was to New York, and I was
    scared the whole time.'
- speaker: Interviewer
  text: What happened on your next trip to America?
- speaker: Respondent
  text: My next trip was to the South because of my friendship with my father's sister. She played in a band with me, and
    we became good friends. When I came back to visit my aunt's family, I met my father.
- speaker: Interviewer
  text: Did you like your dad immediately?
- speaker: Respondent
  text: No, not really.
- speaker: Interviewer
  text: Can you tell me about your family after that?
- speaker: Respondent
  text: My parents had their first child in 1993 and another in 1995. In 2000, I was born and four months later, we moved
    to America. In 2002, my little brother Julius was born.
- speaker: Interviewer
  text: How was it raising children in America compared to Germany?
- speaker: Respondent
  text: I found it easy to raise children in America. There is a reverence for children here, nothing like in Germany. People
    were happy to watch a baby as their child took violin lessons from me, whereas in Germany that would be unheard of.
- speaker: Interviewer
  text: How did you feel about moving to America?
- speaker: Respondent
  text: It felt easy because I already had a family to move to, mainly my father's parents. I don't think I would have ever
    moved here if it weren't for my father.
- speaker: Interviewer
  text: How do you feel about your life here now?
- speaker: Respondent
  text: I love my life here, but I often feel like I don't fit in. No matter what, I always stand out for reasons I can't
    really understand, and that has been hard for me.
