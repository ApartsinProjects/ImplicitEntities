collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your background and how you came to start baking bread in Minnesota?
- speaker: Respondent
  text: I was born in 1955 in Mönchengladbach, Germany, a northwestern city near Holland, with my mother, older brother, and
    sister. I met my wife while hitchhiking on a trip to New Zealand, and we had our first two daughters in Berlin, where
    I loved working as an architect. In 2000, I moved my family to Minnesota, where my wife was from, to be closer to her
    family. But the recession in 2009 left me without my architecture job in Minneapolis. When I moved to Minnesota, I was
    disappointed there wasn't any good bread like we have in Germany, which inspired me to start baking bread for my family
    as a hobby while I didn't have a job.
- speaker: Interviewer
  text: How did your hobby of baking bread turn into a business?
- speaker: Respondent
  text: It wasn't until I started to receive a lot of positive feedback that it became more than just a hobby. In Germany,
    Sunday breakfast is always full of rolls from the local bakery, and there's practically one on every street. My mother
    had always baked too, so my first few recipes were hers. I started out baking at a local church and selling a few different
    breads at some local farmers markets. Then I moved to a shared space in Osseo that I worked out of for a while, until
    I got an opportunity to work with a co-op in Northeast Minneapolis and open my own bakery. Finally, in May of 2014, the
    doors to Aki's BreadHaus were opened.
- speaker: Interviewer
  text: What kind of products do you offer at your bakery?
- speaker: Respondent
  text: Now, Aki's BreadHaus makes more than fifteen different kinds of bread and almost five hundred loaves every week. People
    stop in for morning pastries and coffee in addition to their bread. Not only is the artisan bread important, but the German
    soft pretzels have been a huge part of our business and success. We sell almost one thousand pretzels every week to local
    breweries around the metro area to go with beer, just like in Germany, especially for Oktoberfest.
- speaker: Interviewer
  text: Why do you think your bakery has been so successful?
- speaker: Respondent
  text: I have always said that the number one thing that Germans miss when they move to the United States is good bread,
    and I wanted this bakery to feel like a traditional German bakery. Most of my bread you won't find anywhere else, which
    is why I think people keep coming back. The feedback has been so positive that we have almost outgrown our Northeast space
    and are looking to expand. Many of our customers are German Americans and other European Americans who are relieved to
    have a slice of home in their nearby Minneapolis neighborhood. Some customers come in every week, some even every day
    for their pretzel or loaf of bread.
- speaker: Interviewer
  text: What has it been like starting a new business from the ground up?
- speaker: Respondent
  text: Having to start a new business from the ground up has been such a struggle, but the feedback I have received from
    the community has been encouraging and makes getting up early, like bakeries do, worth it. It's amazing that the German
    heritage would be so important for my career in America. I have always been able to be true to my German self. I love
    bringing traditional German bread to Minneapolis.
