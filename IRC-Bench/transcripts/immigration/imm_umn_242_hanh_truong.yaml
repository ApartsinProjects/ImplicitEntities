collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Hanh Truong. I am from Vietnam. I came to the U.S. with my husband in December 2008. I live in Minneapolis,
    MN because my family lived here.
- speaker: Respondent
  text: The first time, I decided to study English before I went to work. In Vietnam, I sold fabric. I sold fabric 20 years
    before I came to the US.
- speaker: Respondent
  text: 'Now I want to talk about my object: Vietnamese clothes. They''re the same as Americans'' clothing for men and women.
    But in my country, the weather is hot. Warm clothes aren''t needed for everyone in the winter.'
- speaker: Respondent
  text: In the U.S., it's very cold. When I came to Minneapolis, MN I heard people tell me MN is one of the coldest states.
    The first winter, I went shopping to buy warm clothes. Now they're important for me. I like them. Although they're heavy,
    they're very nice.
- speaker: Respondent
  text: A special dress for Vietnamese ladies when they go to parties, weddings, holidays, or new years is the dress. This
    is a Vietnamese tradition. Sometimes I met Vietnamese who went to church on Sundays. They wore Vietnamese dresses.
- speaker: Respondent
  text: I remember my country. I had many memories when I was a student. I wore a white dress when I was in high school. That's
    my best time. I never forget it.
