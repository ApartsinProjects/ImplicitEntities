collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I would like to tell my mother's story about her journey to America from Vietnam. She came to America as a young girl,
    with her family like many others to escape Communism.
- speaker: Respondent
  text: Coming from a well-off family in Vietnam, along with being the youngest of the 4, she was a very energetic and extroverted
    child.
- speaker: Respondent
  text: Throughout the entire journey to America, they lost almost everything of worthy possession. From money to personal
    belongings holding sentimental value, all was lost.
- speaker: Respondent
  text: My mother and her family had only the clothes on their backs, each other for support, vital documents, and hopes for
    a brighter future.
- speaker: Respondent
  text: Growing up in the heart of Can Tho, my mother and her older siblings had almost everything they wanted. A grand home
    filled with silk beds and the best Vietnamese food, freshly cooked by their personal nanny.
- speaker: Respondent
  text: They were one of the only families in the neighborhood with a working TV so neighbors, along with their children,
    would come over.
- speaker: Respondent
  text: Her father, owning 4 different restaurants and a farm was sort of a local celebrity amongst the people.
- speaker: Respondent
  text: Life seemed grand for the family and during these innocent moments, it was vibrant and beautiful. Everyone was very
    warm and friendly to each other.
- speaker: Respondent
  text: But as the Vietcongs became more daring by the day as Communism grew, tensions within the city grew.
- speaker: Respondent
  text: Many people that lived here had very few options. Either continue to live here in Vietnam, risking their families'
    lives, or leave everything behind to start a new life.
- speaker: Respondent
  text: The Vietnam War was the major cause of my mother and her families departure of the homeland.
- speaker: Respondent
  text: My mother recalls the Communists breaking in at night into their home looking for gold and money to forcibly take
    as they knew my grandfather was one of the wealthiest men in the village.
- speaker: Respondent
  text: Most of the family gold was buried by my grandmother under the soil of the farm.
- speaker: Respondent
  text: With the thieves leaving the house empty-handed, my mother remembers the Vietcongs grabbing her baby brother who was
    only 2 months at the time and my grandmother, bringing them to prison for almost 2 years.
- speaker: Respondent
  text: During that period, my mother, along with her older brother, sisters and father went to live in Ho Chi Minh City with
    their grandmother.
- speaker: Respondent
  text: And when those two years were over, her little brother and her mother regrouped with them.
- speaker: Respondent
  text: Secret meetings and talks, every night amongst the parents and their friends happened to organize their escape from
    the country.
- speaker: Respondent
  text: With no real concrete plan and desperate to escape, they had to rely on fishermen that could sail them and 30 other
    families away from the Communist Regime.
- speaker: Respondent
  text: The large boat was not easy to get to though. My mother and her family had to use narrow tunnels, hide in cargo, and
    swim across murky rivers, avoiding any Vietcongs.
- speaker: Respondent
  text: On the night of the escape, she remembered villages scorched in flames, gun-fire echoing throughout the night, and
    the haunting screams of the villagers as their homes were ransacked.
- speaker: Respondent
  text: The traumatic effects of being forced to leave their home in Can Tho, leaving all personal possessions, including
    their nanny, still stays with my mother today.
- speaker: Respondent
  text: She remembers being at sea for almost 30 days amongst other families with everyone equally starving.
- speaker: Respondent
  text: During the several days, spoiled fruits and vegetables, dirty water, crumbles of bread was all that was served.
- speaker: Respondent
  text: She remembers many people dying on the ship from disease or malnutrition. Many being thrown overboard, including babies.
- speaker: Respondent
  text: On several occasions, the boat was boarded by pirates from Thailand robbing people of their possessions.
- speaker: Respondent
  text: At this point, her grandmother hid diamonds under the buttons of her clothes and buried other jewelry in Yucca fruits.
- speaker: Respondent
  text: She told me, people were hiding their jewelry in the big water containers on the boat and when they were caught, pirates
    would cut the containers open, leaving no water left for anybody and taking the jewelry.
- speaker: Respondent
  text: The pirates even pulled out gold fillings from several old people's teeth, including her grandmother's.
- speaker: Respondent
  text: Several of the pirates brought back young women from the boat onto theirs only to rape them.
- speaker: Respondent
  text: My mother's father was in fear for his older daughters but luckily they were left unharmed.
- speaker: Respondent
  text: The boat finally landed on the shores of Malaysia and she recalls the boat making its way to dock at a rendezvous
    point for the Americans and Canadians to pick everyone up from the boat.
- speaker: Respondent
  text: Everyone on the boat was escorted to a refugee camp in Malaysia.
- speaker: Respondent
  text: Each family member went through paperwork, received vaccines, and took pills to kill life-threatening diseases as
    almost all the survivors from the boat had carried infectious worms.
- speaker: Respondent
  text: Her family had the option to start a new life either in Europe or Canada with the wait to relocate of being only 3-4
    months but her father already had family in America as they decided to leave Vietnam much earlier before the spread of
    Communism got unbearable.
- speaker: Respondent
  text: The wait list for America however, was almost a year.
- speaker: Respondent
  text: On June 3rd, 1975, my mother and her family had arrived at the Minneapolis airport.
- speaker: Respondent
  text: They were embraced by my grandfather's family along with their sponsor to help them adjust to the American lifestyle.
- speaker: Respondent
  text: Adjustment to American customs was very hard on my mother and the family.
- speaker: Respondent
  text: Racism and prejudice was very rampant in American schools and her parents had to start over completely seeking brand
    new jobs.
- speaker: Respondent
  text: My mom's father had to work at Chinese restaurants while her mother worked long hours as a maid at hotels.
- speaker: Respondent
  text: At first, my mother remembers adjusting to the living situation as they had to live in a small apartment in a duplex.
- speaker: Respondent
  text: Rooms were shared amongst siblings with her parents having a small room.
- speaker: Respondent
  text: My mother couldn't sleep many nights because of this, along with trying to adjust to the timezone.
- speaker: Respondent
  text: She also mentions, during her youth in America, she had to get used to seeing the amount of food that was sold at
    grocery stores.
- speaker: Respondent
  text: Back in her city in Vietnam, it was very rare to see apples, and other types of familiar fruits in such great abundance
    with cheap prices because only the rich could afford such fruits and many weren't even sold in markets.
- speaker: Respondent
  text: School customs and American norms were also hard, as she did not know an ounce of English, speaking just Vietnamese.
- speaker: Respondent
  text: Eventually, it got easier for her to adjust to the American life as she made many American friends.
- speaker: Respondent
  text: It was not the same case for her older brother or sisters however, as they were so much older with Vietnamese culture
    and language too ingrained.
- speaker: Respondent
  text: Almost throughout her entire academic career, from elementary to late high-school, my mother was in ESL.
- speaker: Respondent
  text: As of today, my mother had only told me and my father her emigration story.
- speaker: Respondent
  text: I was given the permission to share her story with you and everyone else so that hopefully we can learn and grow from
    the struggles of refugees, asylum-seekers, and immigrants.
- speaker: Respondent
  text: Thank you for listening.
