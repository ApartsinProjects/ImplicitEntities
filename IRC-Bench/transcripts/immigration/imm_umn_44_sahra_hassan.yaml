collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I was born and grew up in Mogadishu, Somalia. After my primary school, I attended and graduated from Wadajir secondary
    school in Mogadishu, Somalia in 1984. When I finished my secondary school, I was sent to one year of national service,
    which was a mandate to every graduate. I was issued a national service identification card, and then I was assigned into
    an adult literacy school that was not far from my home where I was teaching Arabic language.
- speaker: Respondent
  text: This service gave me more privilege like any other student who completed the service. In 1985, instead of going to
    further my education, I decided to start my own business with the help of the Somali government. The national service
    gave me the opportunity to borrow from the bank and open up my own business which was a grocery store, called in Somali
    "bagaash." I was selling clothes, shoes, perfumes, and electronics.
- speaker: Respondent
  text: My business grew until the central government was overthrown by the rebels in 1991. Due to civil war, I left my country
    and sought asylum in Uganda. My national identification card was the most valuable thing that I migrated with me into
    Uganda. Why it is important for me? Because it is my national ID that reminds me of the lost central Somali government
    that used to hold together the entire country.
- speaker: Respondent
  text: I decided to preserve it as my own treasure and pass on to my children so that they can pass over their children too.
    When I was in Uganda, whenever I was asked to prove my identity, I used to produce it, and it helped me a lot because
    there were so many refugees from different countries.
- speaker: Respondent
  text: Why I left Uganda? The U.S.A. government gave me the opportunity to resettle in U.S. under the refugee program. However,
    when I moved to United States in 2005, I came Minnesota and I lived here since then. My national ID was one of the most
    valuable belongings that I carried to United States. It reminds me back home and our lost glory that is Somali government.
- speaker: Respondent
  text: These memories let me keep my ID forever and pass it over to my children. Therefore, this valuable object I presented
    to you is my beloved ID and thank you for all listening.
