collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Ler. I was born in Karen State in the year 2000. I was a refugee in Thailand Mae La Oo camp. In Thailand
    it was hard for my parents to get a job. My dad found a job in Thailand outside of the camp with his close friends, and
    he got caught by Thai police and they had to stay in jail for one month.
- speaker: Respondent
  text: In the early morning my dad had to work for Thai police and he also smelled the burning like a mouse or squirrel.
- speaker: Respondent
  text: In 2010 my family applied to America and I was so excited and couldn't wait for it.
- speaker: Respondent
  text: In 2011 my family came to the U.S and they had a lot of worries on our way travel to Mae Sot Thailand to the United
    States.
- speaker: Respondent
  text: I saw the faint of my little younger brother in the car because of the smell on the dirt road.
- speaker: Respondent
  text: In Bangkok, Thailand I didn't know that security had to take away our stuff in the airport, and I noticed that the
    stuff might be sent to United States before us.
- speaker: Respondent
  text: When we were in the plane I didn't like any food because it didn't taste like what we used to eat in the refugee camp.
    There was no vinegar for me in the plane and just only snack or drink. Those food smell and taste salty to me. I didn't
    eat for 2 days in the plane.
- speaker: Respondent
  text: We arrived to Hong Kong, and I was lost in the airport 1 or 2 hours. My mom was worried, and she cried.
- speaker: Respondent
  text: When we were in the United States, it was hard in the first time. I didn't want to check in to the clinic because
    we always had to.
- speaker: Respondent
  text: In 2012 my dad found his first job which was in a shampoo company, but he was only Karen guy and he was treated unfairly
    because they said my dad works slow and they kicked my dad out of the work.
- speaker: Respondent
  text: It was hard that you didn't understand English.
- speaker: Respondent
  text: After that my dad didn't want to find a job in a company. My dad had to find a way to go to school to get better English.
- speaker: Respondent
  text: If you came as immigrant from refugee camp and didn't know English you will need a helper to apply for an easy job
    for you.
- speaker: Respondent
  text: In Thailand the air smells different from United States and in U.S I had a lot of smell from a car, in the house,
    building, or people everywhere.
- speaker: Respondent
  text: The difference between U.S and Thailand refugee camp was not enough food in Karen refugee.
- speaker: Respondent
  text: In U.S I live close by the highway road.
- speaker: Respondent
  text: Right now I feel safe and comfortable living in the U.S.
