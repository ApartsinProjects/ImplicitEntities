collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Naturally, we were called "greenhorns," of course, when you start. Well but there was an awful lot of Germans work
    in that part of the, of that shop and they were quite helpful, even though we had a foreman that also was of German descent
    and he more or less called me "greenhorn." And he didn't seem to want to help me much. But most of them were willing to
    show me or ask questions, when I ask questions to help me and so I sailed through that fairly good.
