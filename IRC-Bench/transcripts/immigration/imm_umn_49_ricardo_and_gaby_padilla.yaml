collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My parents Ricardo and Gaby Padilla never thought that 36 years after being married at a church in Guadalajara they
    would be in US with their two daughters. My dad always says this phrase "It was one hell of a ride" as he explains it
    was a difficult journey, but with my mom with his side he knew everything will be okay.
- speaker: Respondent
  text: My dad grew up in Guadalajara his whole life and my mom lived Jalisco since she was a baby. Life in Guadalajara for
    my dad was very hard since he was poor and lived in a two-room apartment. He would work with his two brothers every day
    in order to get food for his family and pay rent.
- speaker: Respondent
  text: My mom lived in Jalisco. She would be like house mom by working on chores, planting her mom's garden, and caring for
    her dog. Jalisco was a ranch area so there was a lot of farms and animals around.
- speaker: Respondent
  text: When my parents got married, they decided to go to America since both my parents wanted to start a new life and later
    a family. First my dad knew in his head as well as my mom that in order to come to US they needed their citizenship.
- speaker: Respondent
  text: After my parents got married they planned on getting them to come to the US. My dad had to leave my grandparents as
    well as my mom because they didn't like the idea of going to America with no money or a place to live on their own and
    preferred they lived in Mexico since they grew up there.
- speaker: Respondent
  text: My dad struggled with what will he do in America for example how was he going to get a job? How much is rent? Will
    we even find a place? It was stressful even talking about it to my mom. My dad was worried getting the application to
    be a citizen.
- speaker: Respondent
  text: May 27, 1980, was the day my dad got his citizenship. Afterwards, the most difficult was packing for clothes, pictures,
    money, and some furniture.
- speaker: Respondent
  text: While getting to America with transportation my dad right away had to get job quickly in order pay rent and food.
    Today, my dad got a job working as a gardener and my mom is a stay-at-home mom with my dad working every day but knowing
    it was worth it after having a family to provide.
- speaker: Respondent
  text: Life today with my mom and dad in Pacoima is very good for them they don't have any fears at all and not a regret
    coming to America. My dad still works as a gardener and loves exploring downtown LA.
- speaker: Respondent
  text: My mom is a house mom paying bills and working hard to provide me and my sister to eat. My mom is now more happy to
    be living in an area near stores and a hospital than in Jalisco where there was nothing, one store in each block.
- speaker: Respondent
  text: The advice my dad always tells me is "don't give up because it hard and keep on doing it because it worth it at the
    end".
