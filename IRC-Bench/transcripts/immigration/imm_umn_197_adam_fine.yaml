- speaker: Respondent
  text: This is the story about the narrator's parents, who found love after coming from different backgrounds. The mother
    was a Moroccan Jew who had fled to Israel , and the father was a Polish Jew who had fled to the United States and met
    his wife on a trip to Israel. They moved to the United States and started a family, raising their children with elements
    of both cultures.
