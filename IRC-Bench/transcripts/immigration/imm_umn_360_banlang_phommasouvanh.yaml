collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: So I worked in Minneapolis public schools for 27 years. I loved to teach. And the students said, teacher, please tell
    me your story. I said, why don't we do a poem about it instead of just telling in prose? My name is Banlang Phommasouvanh.
    By students from Hiawatha-Howe Community School. I was born in Laos in '46 with a family of 8 kids. After school, when
    I came home, I would tutor my younger siblings. I would babysit, my mom didn't have to pay anybody. With chickens and
    pigs, so we could live. Didn't have a lot of money in a big family. My name is Banlang Phommasouvanh. From the mango,
    lychee, banana trees. From watching my mother, I learned to share and how to care for my sisters and brothers, for one
    another. My name is Banlang Phommasouvanh. I would walk a mile from my home in dry and wet weather to bring food to the
    monks and to feed the poor stranger. With a scholarship, I went to France to get my degree. When I returned the war broke
    out to become a refugee. Lots of friends die in the Mekong River crossing over into Thailand with my youngest daughter
    on my shoulder. In my arms I did hold her. My name is Banlang Phommasouvanh. Together we made it safely here. Not that
    long ago. From Thailand to America. Ten thousand miles from home. Life is full of ups and downs, but with an education,
    I know you will survive in any situation with an education. This is my song, this is my story. Never to lie, speak the
    truth only. Do not steal from anybody. Do not kill or hurt somebody. My name is Banlang Phommasouvanh. I taught ESL to
    refugees. At the meantime, I helped recruiting students—Indochinese students—to become teachers. During Clinton's era,
    the second term, before the second term, Miss Hillary came to Minnesota. I told her about the concerns of our refugees
    in our state. I helped Lao community set up Lao PTA to help Lao youth and parents to understand Americans' education system.
    Students are just like my family. I love them. I feel better when I see them succeed, when they find something they know,
    their eyes sparkle and "Ah!" What a gift I have, you know. I love that.
