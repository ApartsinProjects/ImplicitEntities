collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: 'This is a story about my family and how they came to the US. My grandparents moved to America in 1989, lived in a
    Russian neighborhood, and have learned English because their fluent languages are Romanian, Ukrainian, and Russian. My
    grandparents built their houses and stayed in them ever since they moved to America. My family learned more English and
    kind of became more knowledgeable about the places they live in, and life started to become easier for them. My family
    is very open and nice, and that is what we believe we have to do as Christians. My family members met mostly through church
    or missionary trips; there was only one family member that met through work. My family has lived in an American community,
    so they have adapted to English and can speak it pretty well. My family is influenced by things depending on whose side:
    my dad''s side is influenced by religion and church, and on my mom''s side they are influenced by holiday parties and
    having fun. That was a story about my family and their history in the US.'
