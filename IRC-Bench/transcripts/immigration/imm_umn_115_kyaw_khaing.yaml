collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: My name is Kyaw Khaing. I came from Thailand. I came to U.S. because we have a problem over there, so we have no place
    to live, and we have not enough food to eat. So, we want our life to be better in U.S. So, I can't wait for my family
    to start new life in this country, to get a good education and to be safe.
- speaker: Respondent
  text: First, we came in the U.S. and our case workers sent us to our homes. We cannot live in an apartment because we have
    six people in our household so we had to live in a house. So they allowed us to live over there, but the home rent is
    very expensive.
- speaker: Respondent
  text: Then we lived in that house for one month, and then my parents decided to find a job. After two years and then my
    father is working for the pork company and he's getting sick because he's worked for so long. The job is very over time.
    His health is very not comfortable and he sick and he cough because he had to work without compensation so he was not
    able to work for long.
- speaker: Respondent
  text: So, I started looking for a job, part-time. When I was 18, I got a job from restaurant. So I worked over there as
    a dishwasher, and cleaning, and I cleaned out the trash, those things, and I cleaned the bathroom. These were my jobs.
- speaker: Respondent
  text: On my first job, I started working over there for one year. And then the second job, I moved to the grocery store.
    I worked as a cashier. I met new people, many kinds of people, different cultures. I wanted to get more experience.
- speaker: Respondent
  text: So I like to meet with people because when I worked at my first job, I did not have to see any customers, so I just
    worked alone. It made me feel more depressed. For me, I like to talk to people and meet with people. This made me very
    happy, and made me to work more longer. So, that was my decision.
- speaker: Respondent
  text: After that, right now, I got another job for employment counselor working with Karen refugee people who've been in
    the U.S., new arrivals, so, I help them finding a job. Also, how to apply for state license, state I.D., also their household
    items, needs.
- speaker: Respondent
  text: This is important to me because I am a refugee, too, so I know how the refugees feel. I don't want them to feel like
    me in the past because it is difficult life. So if I help them, they will feel more comfortable and happy life with their
    family. So this is my hope to help them.
- speaker: Respondent
  text: In the future if we do have more new refugee people coming into the U.S., I want them to get many support and many
    benefits for them. That would be great, and they will have a happy life with their family even though they are in a new
    country.
- speaker: Respondent
  text: 'Karen refugee people who is new arrivals in the U.S. I want to say that: don''t be afraid, don''t worry, don''t give
    up easily because this is our new country, and we need to start new.'
- speaker: Respondent
  text: So don't be shy or don't be nervous if you're going to have a difficult thing or question, asking and find out some
    place that they can help you out.
