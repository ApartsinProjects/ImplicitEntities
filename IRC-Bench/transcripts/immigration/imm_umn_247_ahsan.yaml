collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: I'm nineteen years old and I want to talk about my escape. I could not live in Afghanistan because our lives were
    in danger. I have two brothers and four sisters. I'm from Kunduz; that's in the north of Afghanistan. My father worked
    as a farmer and I helped. I was in school for three years. But I had to stop going because it was too dangerous.
- speaker: Interviewer
  text: Can you tell me about the situation with the Taliban in Afghanistan?
- speaker: Respondent
  text: The Taliban have been in Afghanistan since 1994. They fight against the government, against the police, and put the
    population under pressure, sow terror, abduct people, extort and kill them. The Taliban have their own laws and they are
    responsible for the terrorist attacks in Afghanistan.
- speaker: Interviewer
  text: What happened with your older brother and the girl he met?
- speaker: Respondent
  text: My older brother met a girl at work and fell in love with her, but her family was also with the Taliban. Her family
    did not want her to marry because my family is not Taliban. That's why my brother secretly met with her. When her family
    heard about it, they broke his hand. That was a warning shot, so to speak. When the girl became pregnant, the two had
    to flee abroad. Otherwise they could have been stoned. That happened in her village with another couple.
- speaker: Interviewer
  text: What happened to your family after that?
- speaker: Respondent
  text: After that, my family was attacked and we had to flee. I was sixteen at the time. We ran in the mountains at night
    and had to be quiet. We had to hide and run when the police came. That was very difficult with my little siblings. At
    the Turkish border, the police arrived and everyone ran apart.
- speaker: Respondent
  text: I lost my family. My family was sent back to Afghanistan. I made it across the border into Turkey. I have discussed
    with my father what to do on my own and (unintelligible). My father wanted me to be safe and to go on to Europe.
- speaker: Interviewer
  text: How did you travel from Turkey to Germany?
- speaker: Respondent
  text: In a small, overcrowded boat, I then went from Turkey to Greece. I traveled to Germany by bus, train and on foot.
    First I went to a first reception center and then came to Cottbus to a youth facility.
- speaker: Interviewer
  text: What was your life like when you arrived in Germany?
- speaker: Respondent
  text: When I was eighteen, I got an apartment. During this time, I got a lot better from Germans. For me it was hard to
    be safe myself and to know that the life of my family is threatened. My younger brother was kidnapped by the Taliban and
    was supposed to go back a few weeks all night. My father has since been killed by the Taliban. My mother lives alone with
    my little siblings. That makes me sad too. I cannot help.
- speaker: Interviewer
  text: How are you coping with your new life here?
- speaker: Respondent
  text: These days, I have trouble concentrating on my new tasks here in Germany. I am glad that I was able to talk to a psychologist.
    She helped me deal with the situation. Here in Germany I can go to school now.
- speaker: Respondent
  text: Now I'm in the 10th grade and then I want to start training. But even if you speak good and do everything as the Germans
    do, you are seen as a foreigner. On the street I get strange looks and some people are angry with me. I wish that people
    understand that I am a normal person. I am thankful that I can live in safety. My goal is that people understand that
    we can live together in peace.
