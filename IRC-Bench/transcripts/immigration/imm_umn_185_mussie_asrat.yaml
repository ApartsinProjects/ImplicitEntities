collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Respondent
  text: Eritrea is a country that is located in the eastern part of Africa. Eritrea shares the border with Sudan, Ethiopia,
    and Djibouti. In Eritrea, there are nine ethnic tribes. All of them use a special utensil for coffee in a creative way.
    This special coffee maker is known as a jebena.
- speaker: Respondent
  text: Coffee made by a jebena is popular in Eritrea and surrounding countries. Serving coffee in the United States is different
    than the way you would do it using a jebena for Eritrean coffee.
- speaker: Respondent
  text: The jebena is made of clay and it has a circle base, along cylindrical neck, and a curved handle. Jebena come in many
    different sizes, colors, and designs. Some of the designs have names such as Selam, Eritrea, Asmara, and Peace. Mostly,
    people choose brown or black for color options.
- speaker: Respondent
  text: The jebena has a special place in my heart because of the fond memories it brings back. I remember when I was back
    home all my family celebrated Easter together at my house. Everyone came over and stayed for three days. My mom made coffee
    for all of us. When I see a jebena it reminds me of the memories that happened while drinking this special coffee.
- speaker: Respondent
  text: On Sundays, my family gets together after church. We eat and my mom starts to make the coffee and everyone sits around
    her and waits to be handed their cup. During this time, you often talk and laugh. It's used to keep the guests company.
- speaker: Respondent
  text: When you drink Eritrean coffee, it takes a duration of two to three hours to finish. The coffee is brewed three times.
    The first round is called "awel," the next one is called "calatey," and the third one is called "bereka." With the coffee
    comes a snack like bread, popcorn, cookies, and candy.
- speaker: Respondent
  text: The children's behavior tends to get crazy and rushed as competition for who gets more candy.
- speaker: Respondent
  text: I came to Minnesota four years ago. As well as my family and I, this jebena has traveled all the way from Eritrea
    to Minnesota. So, on Sundays after church or on holidays, my family and I can get together to laugh and eat our American
    food, but it is certain that we will pull out our jebena and start to make coffee.
- speaker: Respondent
  text: We are reminded of our homeland and that it's really not that far away. We miss the times we had there but with our
    smiles, happiness, and coffee we can make some new memories here.
