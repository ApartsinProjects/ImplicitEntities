collection: immigration
source_url: https://immigrantstories.umn.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and where you grew up?
- speaker: Respondent
  text: I was born in Virginia, raised in Texas and Mexico, educated in Ohio, and now living in Michigan. My dad always said
    he moved around a lot, but he's never called himself an immigrant.
- speaker: Interviewer
  text: What was your family's background and how did that influence your upbringing?
- speaker: Respondent
  text: My parents, Charles and Catalina, were of Mexican heritage. Their families came from El Paso, Texas. They were in
    Alexandria, Virginia because my dad was serving at an Army base nearby. We moved around a lot because of his military
    service, including to Germany and back.
- speaker: Interviewer
  text: What happened after your dad finished his military service?
- speaker: Respondent
  text: After his time with the Army was over, we moved back to El Paso where all our family was. My dad wanted to become
    a doctor, but American medical schools were either too expensive or not interested in him since he was far removed from
    his undergraduate degree.
- speaker: Interviewer
  text: How did your family handle that challenge?
- speaker: Respondent
  text: My dad looked for some out of the box options and decided the best opportunity was to move to Mexico, our ancestors'
    home, and study medical pathology there. So we moved to Morelia, Mexico when I was in middle school.
- speaker: Interviewer
  text: What was it like moving to Morelia, Mexico?
- speaker: Respondent
  text: At first, I felt displaced. It was a new language, unfamiliar customs, strange neighbors, and a longing for home.
    But it didn't take long before I made new friends, was laughing and joking in a new language, and celebrating old holidays
    in new ways.
- speaker: Interviewer
  text: How did your family’s life change after your dad finished his degree in Mexico?
- speaker: Respondent
  text: We moved back to El Paso. My dad began teaching high school chemistry while looking for jobs in pathology. He actually
    taught at the same school I went to.
- speaker: Interviewer
  text: What were your plans after high school?
- speaker: Respondent
  text: I wanted to fly planes, so I applied to the U.S. Naval Academy at Annapolis to become a pilot. I worked on my application,
    practiced for the physical exam, wrote my essay, and got a recommendation from my senator.
- speaker: Interviewer
  text: Did you end up going to the Naval Academy?
- speaker: Respondent
  text: No, I got cold feet before completing my application. I just couldn't see myself in the Navy. Instead, I went to Kent
    State University in Ohio.
- speaker: Interviewer
  text: What did you study at Kent State and what was your experience like?
- speaker: Respondent
  text: I studied computer science and business. I met my future wife, Lynne Olinger, there. I spent four years partying hard
    and studying harder, working in the library and going to football games.
- speaker: Interviewer
  text: What happened after you graduated from Kent State?
- speaker: Respondent
  text: I took the first job opportunity that came my way and worked for Ross Perot's company, Electronic Data Systems, in
    Dallas. I started training and learning my trade, but was soon moved to work in Michigan.
- speaker: Interviewer
  text: Did your wife join you in Michigan?
- speaker: Respondent
  text: Yes, she finished her degree at Kent State and then followed me to Michigan where she started her Masters in Social
    Work at Michigan State University.
- speaker: Interviewer
  text: What was your career like after that?
- speaker: Respondent
  text: Eventually, I left EDS and started doing contractual work in Michigan. It gave me more freedom to move around, but
    it was difficult working for myself without guaranteed paychecks or benefits. Luckily, my skills were in high demand so
    I was rarely without work.
- speaker: Interviewer
  text: Where did you and your wife live during that time?
- speaker: Respondent
  text: We lived in several small towns around Flint, East Lansing, and Detroit.
- speaker: Interviewer
  text: When did you decide to settle down more permanently?
- speaker: Respondent
  text: In 1993, we made the difficult decision to invest in a big, old house in Detroit. It was expensive and needed a lot
    of work, but we felt it was time to settle in one place more permanently.
- speaker: Interviewer
  text: Did you start a family after moving to Detroit?
- speaker: Respondent
  text: Yes, a year later we had our first son, Nathan Santoscoy.
- speaker: Interviewer
  text: Have you moved since then?
- speaker: Respondent
  text: No, that was the last time I moved house, but I haven't stopped traveling, both for work and leisure.
- speaker: Interviewer
  text: Do you consider yourself an immigrant?
- speaker: Respondent
  text: No, I don't call myself an immigrant, but I certainly have moved around a lot.
