  text: 'Explore This Park Explore the National Park Service Age: 37 Hometown: Biebelsheim, Rheinland-Pfalz, Germany Occupation: Deputy
    Director, German Wine Institute Reason for travel: Business'
- speaker: Respondent
  text: A Fulbright grant recipient and a well-regarded figure in the wine industry, Christian Adams was en route to San Francisco
    on September 11 for an event promoting German wines. Holding degrees in viticulture, wine making, and marketing from universities
    in Germany and from the University of California at Davis, Adams was responsible for worldwide promotion of his country's
    wines for the German Wine Institute in Mainz. A colleague recalled Adams' thoughtful manner and his depth of knowledge
    of the wine business. Adams, a resident of Biebelsheim, Germany, was survived by his wife and two children.
- speaker: Respondent
  text: '"He was unique. He was [...] so impressive because he would do anything. He, he looked to, to me for direction. "What
    do you need?" He was always ready to do whatever it took to get the job done and, and totally without ego. He was just
    unconcerned with, himself, personally, and how he might appear personally. He was just ready and willing and able to do
    anything to get the job done. Extremely intelligent and reliable, so that I knew if I had any questions, if I had any,
    needed to know anything at all, I could turn to him and he always had an answer. But, he was, again, because he was so,
    without ego or self-effacing, if you will, he would be perfectly willing to say, "I don''tknow," if he didn''tknow." [1]'
- speaker: Respondent
  text: -Carol Sullivan, colleague and friend of Christian Adams This corkscrew belonging to Christian Adams was recovered
    by the FBI in September 2001 at the crash site near Shanksville, Pennsylvania.
- speaker: Respondent
  text: '"He should be remembered with a smile and a laugh. He should be remembered as someone who was always there for the
    people that he cared about, as someone who was kind, considerate, intelligent - all of those things. But mostly, with
    a smile and a laugh." [2]'
- speaker: Respondent
  text: '- Carol Sullivan, colleague and friend of Christian Adams Each year on September 11, members of the German Consulate
    present a wreath at Flight 93 National Memorial in honor of Christian Adams.'
- speaker: Respondent
