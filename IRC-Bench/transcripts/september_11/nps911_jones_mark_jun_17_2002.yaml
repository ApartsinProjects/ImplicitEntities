collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: So, Mark, the first question I have is, when you were first aware that something was going on, what happened?
- speaker: Respondent
  text: Well, it was about 9:25 in the morning. And we set up the house a few minutes earlier. We open at 9:30 at Arlington
    House. And so, I was scheduled to be on the second floor for the first half-hour. And I walked out of the front of our
    old administration building here. And I was walking down the steps and I saw a Park Service truck come, like pretty fast
    into the parking lot. And Jan, our gardener, jumps out, and he parks really quickly right in front of the building. And
    he jumps out, and he just had this really kind of intense, horrified look on his face. And he said, you know, the World
    Trade Center was hit by a plane. And I don't remember whether he said two planes or one plane, or whatever, now. And I
    remember my first reaction - and I've been to New York, but I didn't really have any concept of, I mean, I knew the trade
    centers were towers, but I didn't really know anything about them. I didn't really know there were two of them. And my
    first reaction was, wow, that's a horrible accident, you know. And so, I walked over to the house and we set up. And I
    took up my position on the second floor. And I remember I was standing right at the top of the stairs when I heard and
    felt a big boom, which I would later learn was the plane hitting the Pentagon. And I was very, I didn't really know a
    thing about that. I was very concerned. And a little while later, the person in the center hall, Linda Kacmarcik, who
    is a former seasonal ranger here, yells up and says, "Mark, I need you." So, I come downstairs, and she was saying something
    about our museum building having not been open, and should we open it, and we didn't really know what to do about that.
    And I looked out the front of the house and I saw some smoke. And I walked out under the front portico and into the gravel
    in front of the house, at the chain where the grass is. And I just saw this billowing smoke against the blue sky. And
    she said, they got the Pentagon. And I was like, then I knew, I guess, something was happening.
- speaker: Respondent
  text: And I was just sort of in awe for a little while. And visitors, there weren't that many, but there were several around.
    And they were all looking at the same thing. And a couple of them asked me questions, if I knew anything. And I said I
    didn't, and I was actually asking them questions, whether they knew anything about what was going on. And we really didn't
    know what to do as far as operations were concerned. And a little while later, we got word that we should close down the
    house. So, we locked it up, and asked the visitors to leave. And the supervisor, Frank Cucurullo, came over a short time
    after that. And he was saying that we were going to do a security sweep. And the visitors, of course, were concerned and
    wondering what was going on. We didn't really have any answers for them. We recommended that they leave the cemetery as
    soon as they could. And we carried on with the security sweep. And it was myself, Joy Kinard, I think, was in the house
    at that time. Linda, Malcolm Willoughby, our maintenance supervisor - who else? - Keith Drews, and Frank. And we divided
    up into a couple of groups. And my group was Frank, and Malcolm, and myself. And we were checking the bathrooms and stuff.
    And I think no one, I don't know if there's any policies for things like this, security measures, and like SOPs, or whatever.
    I think - my impression was that Frank was just trying to think of "What should we do?" I mean, this is kind of new territory,
    and you don't expect for a plane to hit the Pentagon, and a plane, or two planes, to hit the World Trade Center. And he
    was, I guess, thinking, well, who knows, maybe our site could be a target, being within the cemetery, and on top of that,
    being culturally very important. And so, we were looking in the bathrooms and looking for anything suspicious. And that
    made me quite nervous. I didn't really know what I was going to do if I found something suspicious. We were like looking
    in the women's bathroom and opening up trashcans, and looking behind the toilets, looking inside the toilets, I think.
    And we didn't find anything. But we did this in the guard's room as well. And at one point, we were walking along, and
    Malcolm had with him a little like pocket radio, I guess. And so, we were hearing kind of reports. And I remember at one
    point there was a report that there was an unidentified plane coming this way. And I think she said a distance of like
    twenty miles, or something like that. And that really kind of freaked me out, because I didn't know what was happening.
    And at some point, either right after that, or right before that, we heard a big boom.
- speaker: Respondent
  text: And my first reaction was that something else had been hit. But it turned out later that that was not the case. And
    I think what that was, was someone said, the sonic boom of some jets taking off from Langley, I guess, and trying to intercept,
    either the plane that hit the Pentagon, or maybe in response to this report that was on the radio. I'm not sure. But all
    in all, very nerve-wracking. And should I keep going or - ?
- speaker: Interviewer
  text: Keep going.
- speaker: Interviewer
  text: You're doing just fine.
- speaker: Respondent
  text: All right. Well, after several minutes of this, and looking around, and checking things, and we were reasonably sure
    that we had done what we could, Frank was saying, okay, well, we need to - we can send you all home, but we need someone
    to stay. And we were discussing who was going to stay. And Keith Drews volunteered to stay. He didn't have a car, and
    that kind of made me a little concerned, because I didn't know what the metro situation was going to be. And I was like,
    well, I can leave my car. I can take the metro now. It's still running. And you can have that. He declined that. But,
    you know, he, I guess, felt like he could stay. And the rest of us, I think, appreciated that. We didn't really know what
    to do. Well, we came back here to the office, and Malcolm had a TV, a small, little TV in his office. And a bunch of us
    were huddled around that. I remember actually seeing Karen - she was pretty upset. And it was sort of interesting to see
    different people's reactions. Because Karen was visibly very upset and crying, and stuff. And Linda, who is one of the
    most easy-going people that I've had the opportunity to know was, at least on the outside, like not very affected by it.
    And it wasn't that she was inconsiderate, I think, but she just was not as shaken as Karen or most of the rest of us.
    And to have all these people huddled around this tiny TV at the same time, you know, we watched the replays over and over
    again of the towers, and the planes hitting the towers. And we'd flip back and talk about what was happening in D.C. And
    we didn't really know what to do. You know, slowly people started to go out to their cars and begin to leave. And I called
    my mom at some point while we were watching the television. And she was - I grew up in Chantilly, they live around here,
    and I was still living with them at the time, actually - and she was very relieved to hear from me, knowing that how close
    the Pentagon is to Arlington.
- speaker: Respondent
  text: And so, we made a plan that I was going to go home. And then I was thinking, you know, whether any of my other friends
    were around, and if I could do anything to help them. Because I actually happened to miss the bus that day, and I had
    my car, which I didn't usually have, which turned out to be a good thing, I think. But I called up one of my friends who
    works over in Rosslyn. And she is - we went to school together in North Carolina. She is originally from Charlotte. She
    had just moved up here like the week before that. She lives in the city. And not knowing the metro situation and things,
    I asked her if she, since I had my car, if she wanted to just come out to my place. You know, she knew my family very
    well and everything. And she was grateful for that and accepted. So, I said, okay, I'll come and pick you up. Well, driving
    out of the cemetery, you know, I went around the circle, and got on, I guess, Route 50. And it was just packed. And there
    were servicemen and women in uniform walking down the middle of the road pretty much. And it took me, you know, a drive
    that should take like five minutes, took me like twenty-five minutes.
- speaker: Respondent
  text: And finally, I got up to her place, and she was standing outside of her office. And she asked if we could also take
    one of her coworkers home, who is a secretary, probably in her fifties, and a very talkative lady, I would learn. But
    on the way home, she was very, it was very strange, because it didn't seem to be that she understood the gravity of the
    situation. And based on the stuff she was saying, she was, I don't know, I don't remember all that she was saying now.
    But you know, we took her home to her place, which was kind of on the way. But ended up taking kind of a strange route
    home, because the interstates, we thought, would be very packed. But I made it out to, toward Chantilly. And we decided
    to call some other of our friends again to see if they wanted to come over to my house, because it was about thirty miles
    outside the city and stuff. And we didn't know what their situations were. And Melissa had a cell phone, so we were able
    to contact a few other people. And one of them was a friend of ours named Scott. And he - his boss had driven him - he
    works in downtown D.C.; his boss had driven him out to a metro stop.
- speaker: Respondent
  text: And he got on the metro, but he was going in the wrong direction. And his plan was that - because I guess the trains
    weren't running through the Pentagon at that point - and his plan was to, at some point, just wait it out and switch back
    and go back toward Alexandria where he lives. And we convinced him that he should just continue out toward Vienna, and
    we would pick him up within that station. And he would just hang out with us at my house.
- speaker: Respondent
  text: And so, we met him there. And while we were waiting - I have a Camry, so I have five seats - well, four seats plus
    me - And I was looking around for anyone else I knew, because obviously, the buses were all messed up. And I wanted to,
    if I could, help anybody else out. I actually called my old scoutmaster's family to see - I know he worked down the city,
    and we occasionally ride the bus together, or I would occasionally see him on the bus - and to see if he might need a
    ride. And they said, no, he was okay. But I actually saw some other people that I recognized from my bus. And I didn't
    really know them, but I said, hey, I have my car, and do you need a ride. And a couple of them took me up on it. They
    were very appreciative. And there were like five of us, I guess - Scott, and Melissa, and then two other people that I
    didn't really know, and me - all crowded into my car.
- speaker: Respondent
  text: And we made it out to Chantilly, and I dropped them off at their various bus stops, actually. And then we went out
    to my house, and Scott and Melissa and I just sat there and watched the news, basically, the entire afternoon. And my
    mom made us dinner. And then that night, probably around 6:00 or 6:30, something like that, maybe a little later, we drove
    Scott home. And then Melissa and I went to - drove into the city to get a few of her things, and then drove back out.
    And she stayed with us that night out in Chantilly.
- speaker: Respondent
  text: And I remember driving into the city. It was really scary, because - or just different. It wasn't that I was scared
    that something was going to happen, but it was just, it was like something out of a movie. The streets were just totally
    deserted, pretty much. And you would drive around and every now and then you would see, like where I guess the National
    Guard had set up. And it was like an under-siege situation, or something like that.
- speaker: Respondent
  text: Well, we tried, after we got some of our stuff, we tried to get a Washington Post late edition for the 11th. I'm a
    historian, or I study history, and very interested in memory, and things like that. But I wanted to have kind of something
    to, a piece of September 11, if you will. And I think a lot of other people had the same idea, because we actually went
    to the Post headquarters, and they didn't have anything. They said they had actually stopped selling them there a while
    before that. But we went to all sorts of stores, and machines. And most of the machines just had the regular day's paper.
    They hadn't been stocked with the late edition. And all the stores we went to were sold out.
- speaker: Respondent
  text: But so, we were unsuccessful on that. But finally, we gave up on that and started back toward home. And we drove across,
    I guess, the Fourteenth Street Bridge. And I don't really remember why we came out that way, but we did. And I just remember
    seeing the lights, and the smoke, and like this kind of yellow, smoky haze over the Pentagon. And the smell was just really
    intense. And the thought that occurs to me now was like burning plastic. I think it was burning lots of stuff, not just
    plastic. But very memorable in that respect.
- speaker: Respondent
  text: And then we went home, and I stayed up until like 1:30 just kind of watching the news and seeing if there was anything
    new. And sitting in front of the computer. I wrote a couple of friends. I had one
