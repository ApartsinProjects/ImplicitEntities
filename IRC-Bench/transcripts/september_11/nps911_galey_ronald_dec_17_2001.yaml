collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: If you'd begin just by explaining what your role here is with the Park Police Aviation Unit, a little background about
    yourself.
- speaker: Respondent
  text: I'm assigned as a section pilot. And I have a collateral duty of budget and finance for the section. And I guess as
    seniority goes, I'm the senior pilot here.
- speaker: Interviewer
  text: Well, maybe if you just started by telling me how you first learned about the terrorist attack on the World Trade
    Center on September 11, and we'll just sort of go somewhat chronologically?
- speaker: Respondent
  text: That morning of September 11th, we were actually outside in the hangar. There were four of us cleaning the hangar,
    washing the floors. It was a nice day. The door was open. There were some people from the Uniformed Health Services from
    DOD out in the field practicing for the IMF demonstration that was coming up. So, we were all busy doing little chores
    and training. And one of the section members, and I really don't remember who, it might have been even Sergeant Stasulli
    had been watching CNN and saw, they came on with the plane hitting the World Trade Center. And he yelled at us, "You guys
    have got to come in here and see this."
- speaker: Respondent
  text: And we dropped what we were doing and came in there. When we first looked at it, we thought, collectively, we were
    thinking, well, that's a strange accident to have happened, but we didn't know it was a commercial airliner. And while
    we were still watching the coverage, the second aircraft came around. We saw that live and it hit. And it seemed to me
    it wasn't but a matter of minutes after that, I mean we just looked at each other and we knew that, you know, that we
    were going to have a problem.
- speaker: Respondent
  text: And I went back out in the hangar, actually, and heard the explosion and saw the smoke coming up from the Pentagon
    area. Right about the same time, the aircraft crash phone from National [Airport] rang. And I picked that up and the air
    traffic controller said that they had had a 757 crash somewhere in the vicinity of the Pentagon. By that time, all of
    us were scrambling getting equipment, getting ready to launch the 412s, which we did in a matter of a couple of minutes
    because from our timeline, we were probably on the scene, on the ground, 3-4 minutes after the initial impact, so that
    was pretty good response.
- speaker: Interviewer
  text: Well, tell me a little bit more. You were on Eagle One?
- speaker: Respondent
  text: Eagle One. That was myself, Sergeant John Marsh, and Officer John Dillon.
- speaker: Interviewer
  text: And you were piloting?
- speaker: Respondent
  text: Yes, I was the pilot. And John was the paramedic. And John Dillon was also a paramedic, but he was in training at
    the time.
- speaker: Respondent
  text: And when we arrived on the scene, actually, there was a lot of smoke and fire. Eagle Two had already picked a landing
    zone on Washington Boulevard and it was shooting its approach. There was some discussion in the cockpit, well, where's
    the 757? The damage, initially, didn't look that great. It certainly didn't look like a 757 had hit it. There was absolutely
    nothing that we could see that was noticeable of any kind of an aircraft on the ground at all, but there was a lot of
    fire, a lot of smoke. I could see, I saw a couple of people on fire running away from the building, initially.
- speaker: Respondent
  text: While we were doing all of that the tower called me. We were still circling.
- speaker: Interviewer
  text: But you hadn't set down yet.
- speaker: Respondent
  text: No, we were still circling, and the tower called and said that they had a report of another aircraft 20 minutes out,
    inbound, an unauthorized aircraft inbound. So, we just kind of registered that in the back of our heads and continued
    to circle. We were waiting for, we actually picked out another LZ that we could land in to pick up more patients, because
    we were getting various reports that we had anywhere from 11-20 more patients to be MEDEVAC'D. There was a lot of confusion.
- speaker: Interviewer
  text: Where were you getting those reports from?
- speaker: Respondent
  text: From fire ground information. So, it was a lot of confusion at first. And somewhere in the midst of all of the talking
    back and forth that my paramedic was doing with the ground people, the air traffic controller at National Airport or Reagan
    National Airport, advised me that, and it was just kind of like a happenstance voice, he goes, "oh and by the way, we're
    abandoning the tower. You've got control of the air space." And I'm thinking this is just what I need to do right now.
- speaker: Interviewer
  text: Explain to me a little bit about what that means?
- speaker: Respondent
  text: Well, what that means is he is literally turning over their function to me, to our aircraft. We were going to be in
    control of that air space.
- speaker: Interviewer
  text: That air space for the D.C. area?
- speaker: Respondent
  text: Yes. And I immediately asked him if the air space had been closed down, and he said yes. And he gave me a frequency
    of 125, 65 to contact NORAD. The NORAD had taken over command of the national air space. I knew that the only time that
    that happens is in a time of war. So, we were obviously at a high DEFCON level.
- speaker: Interviewer
  text: But that simplified the task a little bit better, didn't it?
- speaker: Respondent
  text: Oh, yes. Nobody was going to come in or out of the air space unless we asked NORAD for authorization to do that without
    being shot down. And that was as simple as that, other than the military, of course.
- speaker: Respondent
  text: So, the next event was that we landed, right after we had gotten control of the air space, we landed. And my, the
    two paramedics had deployed from the aircraft. Right at that time, we got another update that the unauthorized aircraft
    was about 10 minutes out. And just while we were on approach getting ready to land, there were two F-16s that came screaming
    by our aircraft.
- speaker: Interviewer
  text: There were two of them. I didn't realize there were two.
- speaker: Respondent
  text: Yes, two of them. And they had been preceded about 10 minutes before that by two others that were really high that
    I saw going across. But these two guys came in low. And apparently, they were a flight, had been a flight of four. Two
    of them peeled off to stay in D.C. and the other two went up in Pittsburgh, quite earlier.
- speaker: Interviewer
  text: But you didn't get any radio communications about them being in the area, right?
- speaker: Respondent
  text: No, NORAD didn't tell me that they were coming. But neither did I nor would I expect them to do that. They're not
    going to share everything with us. And they knew we were busy. They knew what we were doing.
- speaker: Interviewer
  text: But NORAD knew that you were there.
- speaker: Respondent
  text: Yes, right.
- speaker: Respondent
  text: My crew came back, and John Marsh advised me that no, in fact, that the only patients that were to be MEDEVAC'D had
    been MEDEVAC'D and we were to do a command and control function, but to standby, that they were still bringing people
    out. And I was thinking at the time there was no way I could do both jobs. I can't do this command and control, and also
    do MEDEVACS and rescues and whatever else they wanted. We're going need some help. And I asked John to get a hold of our
    dispatcher to contact the Metropolitan Police and ask them if they could get their aircraft up in the air. And they've
    got a smaller aircraft that wasn't capable of doing MEDEVACS and such, but they were capable of doing the command and
    control function. And they did launch their aircraft and took over the command and control function.
- speaker: Interviewer
  text: This is D.C. Metropolitan Police.
- speaker: Respondent
  text: Right. And that allowed us to do a lot more with our aircrafts, stand by for MEDEVACS, and in fact, we ended up taking
    the fire chief and a couple of other people to do a command and control function. He ran the fire ground for quite some
    time.
- speaker: Interviewer
  text: How long would you - I realize things were happening very quickly, but how long would you say that you had the command
    and control function?
- speaker: Respondent
  text: A couple of hours.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: The command and control function for the air space, probably no longer than 30 minutes.
- speaker: Interviewer
  text: Okay. But you're talking about?
- speaker: Respondent
  text: But the command and control function for the fire department lasted pretty much the entire day and some into the next
    day, actually, too. So that was pretty much it for the scene. I mean there's a lot of little whole communications back
    and forth in there. The FBI almost immediately when we got on the scene, the FBI contacted and asked us to turn on the
    microwave downlink because they were capturing the video. So, they were right on top of it. They were there almost instantly,
    and they set up a command post, which is actually pretty impressive.
- speaker: Interviewer
  text: They set up a command post there at the Pentagon.
- speaker: Respondent
  text: Immediately, well, right up the hill.
- speaker: Respondent
  text: It was in a trailer up the hill, wasn't it, Bernie, the FBI?
- speaker: Interviewer
  text: Not too far.
- speaker: Respondent
  text: Not too far. And they did that quite quickly. So really, it was very much organized chaos. The fire department did
    a wonderful job, Arlington did, of coming in and setting up their incident command structure.
- speaker: Interviewer
  text: And what kind of coordination went on there between you and the Arlington Fire Department?
- speaker: Respondent
  text: Right, we could talk to all of the fire departments. We have all of the frequencies. So, we were in contact with Arlington,
    and Alexandria, and some of the other fire departments that responded. And it was interesting that some of the ground
    fire departments couldn't talk to each other. They could talk to us and we would relay that information. So, there was
    a communications, there was a mutual communications problem there that they had on the ground, but obviously along with
    the post incident stuff they're going to address that. We had no problem talking to anyone. We had all of the frequencies
    in the aircraft.
- speaker: Interviewer
  text: So, you had started to tell me about taking the fire marshal?
- speaker: Respondent
  text: The fire chief.
- speaker: Interviewer
  text: The fire chief, excuse me.
- speaker: Respondent
  text: Well, they were having a lot of difficulty getting their equipment into the proper locations to fight the fire. As
    problematic as the fire was, it was added to by the fact that the impact of the aircraft actually went in four levels
    through the Pentagon. And it happened to be in some of the areas that they had put a steepled roof on and the fire was
    all on the roof. And they had a real difficult time doing it. And the only way he could really get a real feel for it
    was up in the air in the aircraft. So, he probably made 4-5 flights, an hour each, to position his various firemen and
    firefighting apparatus to get to the fire.
- speaker: Interviewer
  text: What was he able, I mean was he actually able to see like flames from the roof? To see?
- speaker: Respondent
  text: Oh, yes. And what helped them tremendously was the infrared unit on the aircraft. We gave him the infrared image and
    the imager was able to see through the roof and show him where the hot spots were, where the fire was underneath that
    hadn't broken out yet. And that was what he was really, really interested in, also.
- speaker: Interviewer
  text: So, a difficult situation to fly in?
- speaker: Respondent
  text: Yes, there was a lot of smoke.
- speaker: Interviewer
  text: Smoke and are there currents set off, too, by the fire?
- speaker: Respondent
  text: Not so much that, but it was, visibility was a problem. And there was a lot of concern about what kind of smoke we
    were flying through, too. I mean what we were breathing in.
- speaker: Respondent
  text: And in fact, we did find out there was a lot of hazardous materials down there burning, so.
- speaker: Interviewer
  text: So that was like the next 4-5 hours you were taking him up?
- speaker: Interviewer
  text: Were there some other missions in that time?
- speaker: Respondent
  text: There were missions for the FBI. There were missions for the Pentagon staff, itself. There were missions for just
    about anybody that you can think of that would have any concern wanting to, it was almost endless. I mean it was like,
    the FBI, the Department of Defense. We took the Army up. We were the only aircraft there for quite some time. The military
    aircraft actually didn't start arriving until late that afternoon.
- speaker: Interviewer
  text: Okay, so for about 4-5 hours. Are there any of those missions that you can talk about on the record?
- speaker: Respondent
  text: Well, yes, I mean they were, for the FBI, most of them were documenting the scene. For the Department of Defense,
    a lot of it was, again, they were documenting.
- speaker: Interviewer
  text: Documenting with video cameras?
- speaker: Respondent
  text: Right, everything. Video cameras, still cameras. Some of them were, you know, one or two of them were officials who
    just wanted to see it for themselves so they could better allocate their units. We took up the commander of the 82nd Airborne
    so he could deploy his troops around. It was just about anything you could think of to use an aerial platform for was
    used for that day.
- speaker: Interviewer
  text: Well, tell me then about, I mean you were on site then at least until late afternoon. And then what did you? Did you
    come back? I mean was that sort of it for the day?
- speaker: Respondent
  text: We had made a conscious decision that we were going to, we, the Park Police aircraft crews, we were going to do our
    mission and we were going to get the heck out of there and let the military do theirs. That there was, there was just
    not, we wanted to come back here not knowing if this was over with and stage, replenish, refuel, and make sure we were
    fresh for whatever else was coming.
- speaker: Respondent
  text: And in the middle of all of this, we'd had, we were given the heads up that we were going to have to evacuate the
    Secreta
