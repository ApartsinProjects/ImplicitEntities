collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Well we'll start chronologically. We'll start with September 11th. And if you can tell me where you were, how you
    first learned about the attacks?
- speaker: Respondent
  text: I was sitting right here in the office working on something on the computer when somebody from the branch of Law Enforcement
    Security for the department came running down the hallway and said a plane just flew into the World Trade Center towers.
    We looked around and thought, my god, that seems a little peculiar. And we have a small TV that's set up in the chief's
    office and we went in there and tried to get it working. It doesn't get very good reception, but I think we were able
    to get at least one channel, saw some of the footage that was going over the airways from the news media, and then came
    back in here and started working again.
- speaker: Respondent
  text: And then these folks came back down the hallway and said the second tower has been hit. This was really quite bizarre.
    And so, we sort of marshaled our folks. There's really only two of us. I think there may have been two or three of here
    in the hallway dealing with emergency operations, which would be myself, Major Gary Van Horn, U.S. Park Police who works
    with us, and then my search and rescue and emergency medical services coordinator, Randy Coffman. We ventured down to
    the Department of Interior hallway, Law Enforcement Security, where they have a fairly large TV. Ours is kind of small.
    We were watching that when the reports started coming in of possible additional aircraft were in the air and heading for
    places unknown, but not where they were supposed to be going. In other words, they had been taken over, hijacked, if you
    will.
- speaker: Respondent
  text: Eventually, we made our way down to the director's office. The director was in, as were several of her staff. I couldn't
    remember exactly how many. I know Deny Galvin was gone. He's the deputy, but Sue Masica was there, Dick Ring was there.
    There was a handful of us. That was about the time the third plane went into the Pentagon. We were hearing reports that
    they had ordered the evacuation of the White House. And it wasn't too long after that that basically they said that the
    District of Columbia was shut down and to evacuate everybody and send them home. Which in hindsight you will notice, I
    don't know how many people work in the District, but I think the Metro probably transports somewhere between 650,000 people
    daily into the District, and so you push a button to release those 650,000 people plus everybody else that drives, walks,
    or otherwise gets here, I would imagine just guessing maybe close to a million people trying to get out of the District
    at one time. With the communications that Major Van Horn had with U.S. Park Police, we found out that some of the roadways
    leaving the District were shut down because there were suspicious packages. For example, I think it may have been the
    14th Street Bridge was shut down, so you had traffic backed up there.
- speaker: Respondent
  text: About the time they made the call to evacuate all facilities in the District, all you had to do was try to pick up
    the phone and know that wasn't going to happen. Landlines were dead. Cell phones were dead. So, we were basically without
    any communication. Initially, while all of this was going on, we were down in the director's office so the Secretary or
    her staff gave the order to evacuate the building, send everybody home. But obviously Ranger Activities being of an emergency
    nature and mind that this is what we are trained for, and so we stayed with the director and basically started putting
    together a planner, where do we go from here? What do we do?
- speaker: Respondent
  text: And that's what we started doing and trying to establish communications. I was able to get email messages out to my
    contacts in the region, which would be the regional chief rangers. The phone lines were still dead. It was probably about
    30 minutes after the plane went into the Pentagon and running back and forth between my office and the director's office,
    that bless her heart my daughter, who was away at college, called. And in coming calls were coming in. And I picked up,
    I just happened to be in the office when she called. I said, "Lindsey, bless your heart. You called. There are no landlines
    out of the District, basically. Would you please call Shenandoah Dispatch," which is the 24-hour dispatch at Shenandoah
    National Park that we use for all critical incident reportings. In other words, if I have to make contact with anybody
    in the service, that's who I go to. "Call the dispatch operation. Tell them to call me because I can't get out."
- speaker: Respondent
  text: So, she did that, and basically, we set up a landline with my phone and Shenandoah Dispatch. Initially, we thought
    about just leaving the line open, so we knew we would always have it. In lieu of that, since I was running back and forth
    between the director's office and here, I asked them to call back on my number every 12 minutes, because there was no
    way we were getting out downstairs, so we were shuttling messages out from my office because Shenandoah was calling in.
- speaker: Interviewer
  text: That's what you meant by establishing a landline. They would call in on a regular basis.
- speaker: Respondent
  text: Major Van Horn was able to get out to U.S. Park Police dispatch, so we were getting pretty good updates from them
    as far as what was going on early on. In emergency operations, I mean we train people, and this goes back probably 20
    years, that when 10 percent of the population picks up the telephones, the system crashes. It just can't handle it. It's
    not made for that and so we proved it.
- speaker: Respondent
  text: Several of us in the building carry government emergency telephone cards. It's an access into the phone systems, which
    we all thought about, about 30 minutes or an hour later. By dialing the access code, we were able to get priority lines,
    so we were then able to start communicating from whatever phone we wanted to use in the building. So, we were using that
    down in the director's office.
- speaker: Interviewer
  text: Did that work well?
- speaker: Respondent
  text: It worked throughout the day, yes.
- speaker: Interviewer
  text: Is there an activation process for the dispatch center because I read somewhere that at 8:36 you sent a message asking
    the center to become the Park Service's "eyes and ears."
- speaker: Respondent
  text: When I made the contact with the regional chiefs, I sent the same message to Shenandoah Dispatch. Letting them know
    we had no contact. We're fine in this building, but they're evacuating the District. I made it a habit here, I was coming
    up here every 20 minutes and looking out my window to the traffic, which was at a standstill. And every 20 minutes I would
    see the same car in the same location in traffic. It had not moved. And this went on for probably an hour and a half,
    maybe two hours.
- speaker: Respondent
  text: We eventually worked our way into the basement, which seemed to be the safest place in the building, and people started
    coming back into the building because they'd given up trying to leave, which I would probably have done the same thing.
    Evacuating everyone in the District at one time, they're not going to be able to get out. We were hearing unconfirmed
    messages that because of a possibility of a threat on the Metro lines they were going to shut them down. Thank god that
    wasn't true, but had they shut down the Metro and then evacuated everybody in the city, then you've got, traffic wasn't
    moving so you've got a million people milling around in the streets throughout the District, so it was quite interesting.
- speaker: Interviewer
  text: Can you tell me a little bit more about what some of that discussion was like in the director's office? The discussion
    about what needed to be done.
- speaker: Respondent
  text: Basically, we needed to establish communications anyway that we could and Shenandoah Dispatch, that's what they're
    trained to do, and so they were able to help us to a great degree. We have what they refer to as a Continuity of Operations
    plan, what do you do when something goes awry? And these are plans that were put together in preparation for the Y2K.
    Should the computers malfunction like they had anticipated or thought there was a possibility, we would have something
    in place. They're not quite emergency operations plans, which most rangers and law enforcement folks are used to dealing
    with. You have a plan in place.
- speaker: Respondent
  text: If something goes wrong, you have step by step procedures of what you should do. And obviously, life and safety are
    a number one priority. Take care of your employees, your people, your family, whatever is necessary.
- speaker: Respondent
  text: It appeared at least outside the District with the Park Service, other than New York City, they were not as heavily
    impacted obviously because it was not close to home there. Here, it was right here. You could walk to the roof or some
    of the windows out of the building; you could see the smoke coming up from the Pentagon. And so, trying to keep your wits
    about yourself and do what had to be done. As far as I was concerned, there was no rush for us to leave the building.
    I think it's a well-built building. It's very safe, unless they stick a bomb right in the basement it's probably going
    to be here. I felt safer in the building than I did out in traffic, stuck moving nowhere.
- speaker: Respondent
  text: I think as the day progressed, the traffic finally started letting up and what I thought was interesting is when I
    come to work, I live halfway to Shenandoah National Park and come in Route 66 to Vienna. And I rode the Metro out. It
    was virtually empty. And when I leave Vienna around 5:30 or 6:00, it's usually bumper to bumper traffic, and it was almost
    like you could roller skate out. It had shut down that much. It almost reminded you of the blizzards we had in I think
    it was '96, where basically everything came to a standstill.
- speaker: Interviewer
  text: Now in the Continuity of Operations plan, is there a Department Continuity of Operations plan that the Park Service
    has a piece of, or is there a separate NPS Continuity of Operations plan?
- speaker: Respondent
  text: It's both. Our headquarters building here has a plan, as does each regional office. And they're melded together, and
    they also coincide with what the department has and there are, in this plan, you have spelled out the succession of authority.
    In other words, if the director was not here, who's next in charge? That's already been laid out. Since she was here,
    if you're going to initiate the plan, then one of the first things we do in the plan is to remove the governing body or
    the director, or director level within the department, including the Secretary, Deputy Secretary, to a remote location
    which from here would be outside the District.
- speaker: Respondent
  text: Of course, part of the problem was that everything was at a standstill traffic-wise, so it was difficult to get these
    folks out of the District. We eventually did. It was about an hour discussing what needed to be done with her prior to
    her leaving and then evacuated her to the remote location, along with the other agency heads, and the Secretary and her
    immediate staff. And then we had a separate location for the rest of the management of the National Park Service from
    this building and where they would go. And it's far enough removed to where, at least according to plan, they should be
    able to maintain communications and have everything they would need to manage the National Park Service.
- speaker: Respondent
  text: I got a group together I get it was last week to do an update of the plan. We've been going through and making notes,
    those sorts of things, and so it's out for review right now from the work group and then will be distributed amongst the
    management folks of the Park Service for input, to update it, get the new names in there if that's necessary, and make
    sure it's up to date. One of the things we have added is a, we had two new alternate work sites in the existing plan coming
    from Y2K. With the incidents of September 11th, we decided to go ahead and identify a third more remote site, should for
    whatever reason Washington, D.C. cease to exist, the management of the National Park Service will have to occur somewhere
    so we've got it located, if they approve the plan, far enough removed from here where that wouldn't be an issue and somebody
    that would be in charge of the Park Service from that location.
- speaker: Interviewer
  text: There's some, I understand that a lot of this is pretty sensitive, but just in general, are there some other major
    issues drawing out of the September 11th experience that you're addressing in the revisions of the plan, other than the
    site that you just mentioned?
- speaker: Respondent
  text: Yes, there's quite a bit of things that are in there, but to go back to 9/11, even pre 9/11, prior to 9/11 there was
    a major demonstration scheduled for the World Bank. And the World Trade Organization that was due to occur, I think two
    weekends after 9/11. So we had been using the preparation for that demonstration one of our incident management teams
    to help us plan, because the District and the U.S. Park Police were asking for additional resources and Park Rangers for
    law enforcement, for fire, and for Emergency Medical Services assistance. So, we already had sort of a working plan in
    place dealing with that. And because of that it made it easy to contact that emergency management team, an overhead team,
    and get them moving here because obviously when you have a situation like this you need to manage it c
