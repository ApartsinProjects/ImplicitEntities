collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Can you describe the National Park Service's initial response to the September 11 terrorist attacks?
- speaker: Respondent
  text: On the morning of September 11, 2001, the National Park Service had a unique perspective and role in responding to
    the tragedy. The Service's employees either witnessed the attacks firsthand or were directly involved in the immediate
    response. Every national park was affected to one degree or another. The Service quickly recognized the need to record
    and preserve the experiences and perspectives of those who had witnessed or responded to the attacks.
- speaker: Interviewer
  text: What challenges did the National Park Service face in documenting the response to the attacks?
- speaker: Respondent
  text: Many major decisions about the response operations were made in phone conversations or meetings with little or no
    written record. This scarcity of written records meant a greater reliance on oral history interviews. Memories can be
    faulty, especially after experiencing such a traumatic event, and oral accounts can sometimes be confusing or lack specific
    details. The event was unique in nature and scope, making it difficult to determine an accurate sequence of events.
- speaker: Interviewer
  text: How did the attacks impact the National Park Service and its employees?
- speaker: Respondent
  text: The attacks strained Park Service resources, highlighted vulnerabilities in security, and brought into sharp relief
    the emotional and symbolic power of National Park Service sites such as Independence Hall, the Statue of Liberty, and
    Manzanar. The events reaffirmed the importance of parks as venerated symbols of American values and culture. Employees
    struggled to come to grips with the nature and scope of the tragedy.
- speaker: Interviewer
  text: What was the goal of creating this history of the National Park Service's response?
- speaker: Respondent
  text: The goal was to foster a deeper appreciation and understanding for the way the Service and its employees responded
    to the attacks and to create a detailed historical record of this unique and significant period. It was designed to provide
    Service managers and policymakers with information useful in responding to future emergencies and to provide future historians
    with a foundation upon which they can build.
