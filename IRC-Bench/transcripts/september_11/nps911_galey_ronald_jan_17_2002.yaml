collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Respondent
  text: We had uniformed health services, doctors, and medics down here. And we were training our people in various methods
    that were going to be using during that demonstration. And at the same time, I saw - and a couple other people were what
    we call the hangar. Cleaning the hangar out. We had the hangar door open. It was a nice day. So Suely came out, and said,
    you've got to come in here and see this. A plane just hit the World Trade Center. And we went inside, and at first all
    I saw was the smoke coming out of the Trade Center, and we were discussing, you know, that's a strange accident. You know,
    we were discussing how an accident like that could have occurred, and nobody at that time had thought it was a deliberate
    act. And while we were watching TV, we saw the second aircraft come in and get the World Trade Center, and then we knew.
    And we started some further discussion as to what other potential targets might be. And the conversation led itself out
    into the hangar, and I - the time is a little bit foggy, but ten, fifteen minutes later I heard a tremendous explosion
    and looked over towards the Pentagon, and saw smoke start to come out. Right at that exact moment the emergency tower
    line rang, and I answered that. And the air traffic controller said that they had a 757 go into the Pentagon, and they
    needed us to respond to the incident.
- speaker: Respondent
  text: And I really didn't have to say anything to the crews. Everybody just knew in their hearts what had happened. And
    they were running, getting their gear, getting the aircraft cranked up. And I would estimate only about three and a half
    to four minutes passed before we had both aircraft in the air, and on the scene over at the Pentagon from the time the
    aircraft hit it. So that was pretty much the initial response.
- speaker: Respondent
  text: We decided before we even left the ground that my crew would remain in the air, the second crew would land - the second
    aircraft would land - their crew would deploy, and assess the need for further medevacs, and that type of thing. And that's
    what we did.
- speaker: Respondent
  text: I guess on the third or fourth orbit around the Pentagon, as we were getting reports from our ground people initially
    that there were going to be twenty-two patients to be flown out, and we were going to need more helicopters. We were trying
    to arrange for that. In the middle of all that, the air traffic controller called me on the radio, and said, we're getting
    so much smoke in the tower we can't function up here. And they turned the air traffic control space over to us.
- speaker: Respondent
  text: And I was told to contact NORAD from that point on, which I did. The first crew that had landed had loaded the first
    two patients on and had departed toward the burn center. And they asked us to come in and land to pick up, possibly, more
    patients. Three had been flown out by now, and we did. As I was landing, I was being notified by NORAD that they had an
    unauthorized aircraft inbound from the Pennsylvania area, with the estimated time of arrival approximately twenty minutes
    into D.C. So, we were having some discussions - crew discussions, you know, what we should do. We decided we'd take our
    chances, and stay there, and do what we came there to do. We found out that essentially everybody else that was going
    to be medevacked out died. They weren't viable patients. And -
- speaker: Interviewer
  text: You had these twenty-two that were down there - I think the number you said was - you had been told twenty-two patients?
- speaker: Respondent
  text: Twenty-two patients initially, and then eleven patients once we were landing. And of the eleven, the only three that
    were actually viable were flown out already, and the other eight were dead.
- speaker: Respondent
  text: So, from that point on, my crew, we assumed the posture of command and control of the air space around there. We lifted
    and started coordinating other aircraft coming into the area. And in the middle of that - now we're about an hour and
    a half into the scenario - the chief of the Arlington County Fire Department requested us to land so he could go up in
    the aircraft, and direct his fire units in fighting the fire, which was out of control, and being very stubborn, very
    difficult for them to get to. So, we had him in the aircraft for about another hour while he directed his firefighting
    efforts from the air. And after that we came back, refueled, and actually stayed here, because there was a lot of military
    aircraft starting to come in. Air space was getting crowded. We got two requests - one from the FBI, one from the Secret
    Service - to go back up and give them video downlink to the command center of the incident. So, we did that for about
    an hour. Then we took up some FBI agents, and some Department of Defense people out of the Secretary of Defense's office
    so they could assess the damage and such.
- speaker: Respondent
  text: And that pretty much wrapped up the immediate response for that. But for the rest of that day, we concerned ourselves
    with security - further security threats. Tracking down U-Haul vans, Ryder trucks - you can imagine. Just anything capable
    of carrying a bomb we were locating, identifying, and directing ground units into. So, they were - every truck in the
    city was stopped and searched.
- speaker: Respondent
  text: Then from that point on we started doing bridge controls. Checking under all the bridges, the approaches to the city.
- speaker: Respondent
  text: And then the Secret Service gave us a request of they wanted an aircraft in the air 24 hours a day; constantly, from
    that point on, over the top of the White - in the P56, checking on the Memorials, the White House, the Capitol. And that's
    what we did for two days. We would relieve each other on station up in the air.
- speaker: Interviewer
  text: How was that done? You'd relieve each other on station up in the air?
- speaker: Respondent
  text: Yes. One aircraft relieved the other aircraft, and it would come back.
- speaker: Interviewer
  text: Oh, okay. I thought that somehow, they were switching personnel in the air. But that's in the movies. Okay.
- speaker: Respondent
  text: So that went on for about two days. And then we started backing down slowly but surely. But we had just almost continuous
    monitoring of all the memorials, all the high - what we consider high park areas.
- speaker: Respondent
  text: Then boredom.
- speaker: Interviewer
  text: Boredom, meaning?
- speaker: Respondent
  text: Boredom meaning just constant patrols. Once an hour we were going up and checking all the river bridges, all the memorials,
    all, you know, the Pentagon, Arlington Cemetery, Mount Vernon. Just anything and everything we, or our bosses could think
    of could be potential targets for someone. And, you know, you just - your imagination, I guess, would control what the
    end of that might be. But it was - we were doing it 24 hours a day, 7 days a week for about a month. I think in that three-week
    period we flew 150 hours of flight time, which is a lot of flight time.
- speaker: Interviewer
  text: What's the usual?
- speaker: Respondent
  text: Oh, for three weeks, maybe 50 hours. So, it was three times the amount of flight time.
- speaker: Interviewer
  text: Okay. So, boredom, basically?
- speaker: Respondent
  text: After three days the adrenaline rush left you. Just tedious, repetitious patrols. Kind of boredom and frustration,
    because we really didn't know what we were looking for, or who we were looking for. The FBI had not come out with the
    list yet of suspects. Then when they finally did, we had quite a long list of vehicles and such to look for. You know,
    that helped out.
- speaker: Interviewer
  text: When did that come out? I forgot.
- speaker: Respondent
  text: That came out about two weeks into the scenario.
- speaker: Interviewer
  text: About the time it hit the papers. To keep asking the question, you said, I had this time in which you were just sort
    of doing these boring, tedious kind of patrols, and you didn't know what you were exactly looking for. Then this list
    came out that helped you sort of zero in on what to do. What happened then?
- speaker: Respondent
  text: Well, it was - we had these vehicles to look for now. I mean, we were looking for specific things. We didn't - we
    didn't find any of them. Some of the ground units found two or three up in Maryland, but we didn't locate any of those.
    But we were getting the Joint Operations Center, that's called the - nicknamed the JOC, which is located downtown, took
    over the coordination of the whole event, and all the intelligence was being fed to them, and they would feed it out to
    us. If they wanted - for instance, three days after the Pentagon attack, they called here and said, we have a report.
    We want you to go up and find three Ryder trucks coming from Richmond, headed towards D.C. They're in a convoy. We want
    them found and stopped. But that's all the information they would give us. We found them. We found them down in Quantico.
    They were stopped, identified, and as far as I know, nothing came of that. That's the type of thing we were getting every
    couple hours or so.
- speaker: Respondent
  text: The Joint Operations Center would call, and say, look, we have an orange and white Ryder truck coming down from Frederick,
    Maryland, and we think he's using 70. It's got Pennsylvania tags on it. Go up and find it. We need to have that stopped
    and checked. So, it was numerous examples of that type of thing over the next week or so.
- speaker: Interviewer
  text: Okay. Then after this - I'm sensing this to be kind of a phase in which you were sort of going out, and looking for
    specific vehicles that you were warned about?
- speaker: Interviewer
  text: Was there another phase that came after that? What happened then?
- speaker: Respondent
  text: Well, as we got further and further away from the 11th, things started ratcheting down little by little. We weren't
    doing the hourly patrols anymore.
- speaker: Interviewer
  text: When did they stop?
- speaker: Respondent
  text: They stopped about two weeks after the 11th. And we were pretty much responding to incident - or responding to requests
    from the Joint Operations Center, or the FBI, or Secret Service. I mean, we were assisting so many different agencies
    during that time. FBI, Secret Service, Department of Defense. Whoever. We're talking about the 81st Airborne, picked up
    a Green Beret Commander, because they took over some of the security at the Pentagon.
- speaker: Respondent
  text: And the reason they kept using our air assets over here is A) we're the only ones who had permission to fly in the
    air space, other than a military flight. B) we're the only law enforcement with that kind of authority that they needed.
    And I guess C) we had an aircraft big enough, and capable enough to do what they wanted to have done. So. Nobody - which
    is very unusual - no one asked who's going to pay for anything during that time, which was kind of interesting. Usually
    it's, well, who's going to pay for that? Who's going to pay for this? It was an interesting couple, two, three weeks of
    nobody cared who was going to pay for what. We just did it. I know now that they're caring who's paying for what, but
    -
- speaker: Interviewer
  text: They're caring quite a bit?
- speaker: Respondent
  text: They're caring quite a bit. But that's not my problem.
- speaker: Interviewer
  text: Was there a point - okay, you were responding to all these requests - but at the same time gradually ratcheting down.
    You sort of got to a point where you were just sort of responding to the various requests?
- speaker: Interviewer
  text: Was there a point at which you completed ratcheting down?
- speaker: Respondent
  text: 'Did we ever fall - if you''re asking, did we ever fall back into the way we operated prior to the 11th? No. Several
    things have changed permanently. Prior to the 11th we operated with a two-man crew: a pilot, and a paramedic. Now we operate
    - the aircraft goes out of here with three people on board the aircraft. We found that to be optimal. Indispensable, actually,
    for doing what we needed to do. Those are large aircraft, they''re very technically complicated, and the third person
    was proving to be invaluable. And so, we made that a permanent switch.'
- speaker: Interviewer
  text: Okay. You said you had a pilot and a paramedic. What was this third person doing?
- speaker: Respondent
  text: The third person, essentially, would be operating radios, and looking in the infrared -
- speaker: Interviewer
  text: Like searching?
- speaker: Respondent
  text: Another pair of eyes.
- speaker: Interviewer
  text: Do you still have that same crew?
- speaker: Respondent
  text: Yes Sir. Flight profiles have changed. There are things we check more carefully. Like we're still checking the river
    bridges. Still checking the river bridges, still checking memorials and parks that we just never checked before. Looking
    for any kind of - any truck that's parked anywhere near a memorial. We see it, we'll direct ground units in to check them
    very thoroughly. So that type of thing. Those things we just never did before.
- speaker: Interviewer
  text: When you're saying memorials you had never checked before, what were some of the ones you had done before?
- speaker: Respondent
  text: Well, I mean, Arlington Cemetery has been, for whatever reason, a target for mentally unstable people. They come in
    there, and try to commit suicide at Kennedy's gravesite, or the Tomb of the Unknown. And we check that with the infrared
    every now and then at the request of the Fort Myer. We checked that, and we checked a few other things, but we never particularly
    looked at like the Lincoln Memorial, the Jefferson Memorial, the Roosevelt Memorials for somebody who was purposely trying
    to blow them up. We never thought about that, you know? The Washington Monument.
- speaker: Interviewer
  text: At the Roosevelt you're just in there to swim -
- speaker: Respondent
  text: Yes, exactly. So, anything of a suspicious nature. If something doesn't look like it belongs there. It might be -
    a simple - for instance at the Roosevelt Memorial. Somebody had driven a closed-in golf cart up next to it. And it turn
