collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: How did you first learn about the attacks on September 11th?
- speaker: Respondent
  text: Actually, I had a meeting with somebody from Human Resources, Dave Davies, I think his name is, in Dick Ring's office.
- speaker: Interviewer
  text: So, you were here in Washington?
- speaker: Respondent
  text: I was here in Washington, yes. And Dick got a call from someone, I think his wife, but I'm not sure of that, and so
    we flipped on the TV and there we were. We saw the second - the live pictures of the second aircraft hitting.
- speaker: Interviewer
  text: Would you take me through those first hours? I mean what were your first actions?
- speaker: Respondent
  text: Well, really not any. We sort of finished the meeting and then not knowing what else was happening, I came back up
    here to Ranger Activities. And then as the reports began to come in it, it appeared that the Park Service might have some
    involvement here, potentially, and certainly, maybe some potential involvement on sites in New York City. I decided, you
    know, I'll go down to the front hall and see what's going on, what we're doing. So, I walked into -
- speaker: Interviewer
  text: The front office being the director's suite, okay.
- speaker: Respondent
  text: The director's corridor. So, I walked into the deputy director's office, who was on vacation. John Reynolds, the regional
    director from Pacific West was in, I guess acting for him. And the director was there, Fran Mainella, a couple of her
    special assistants, Sue Masica, Kate Stevenson. Sue is the associate for admin. Kate is the associate for cultural resources
    and partnership. I don't remember who else was in there. And they were just talking about what needed to be done.
- speaker: Respondent
  text: About that time, I think, there were some instructions about ready to come out of the Secretary's office. I don't
    remember if they were out or not. But Reynolds introduced me. I had met Fran, briefly, the week before. And Reynolds introduced
    me basically saying, and you need to check his exact words with him, but basically, he told Fran, "Here's this guy that
    does this stuff for a living. You need to pay attention to him." And so, Fran did. And we, I sort of just, she said, "Come
    on, we've got to go upstairs to the political office on the 6th floor." And I don't remember all of the sequence of what
    we did there now, but again, it was time to get organized. The Secretary wanted all of her leadership of the department,
    as well as the bureau leadership, to go out to what is called Site B, which is the USGS office in Reston.
- speaker: Respondent
  text: And so, Fran and I actually got in a car with one of the departmental guys. I can't remember his name, David something,
    but I think he's the guy that runs the department's congressional affairs. In the basement in the garage under the Main
    Interior, we started out on 18th Street there, and of course, it was total gridlock. It took about 20 minutes just to
    clear out to get to the street from the garage.
- speaker: Interviewer
  text: Can I interrupt just for clarification? Was going to Reston - was the idea that that would be sort of a safer place?
- speaker: Respondent
  text: Yes and get everybody organized. That was the Secretary's direction. At that point, I told Fran because communications
    were down, all of the cell links were just overloaded, I said, "Fran, you're going to be incommunicado from everybody
    all of the time if you do this for several hours. My recommendation is we go back in here, go back to the 6th floor and
    do what we need to do." But I said, "I think you're going to spend all of your time sitting and you won't have any knowledge
    of what's going on nor will you be able to do much."
- speaker: Respondent
  text: She agreed so we just got out of the car, walked back up there, went to the, I guess we went right to the 6th floor
    at that time, and the deputy secretary, Steve Griles, was here. And shortly after that, the department opened up an office,
    I don't even remember on what floor, but it was part of the National Business Center, a big conference room, and that's
    basically where we worked out of the rest of the day.
- speaker: Interviewer
  text: Did that become the DOI communications center?
- speaker: Respondent
  text: Yes, I think so. Well, for the first couple of days it was, yes, it was a little bit of everything. And then we brought
    in Gary Van Horn, who's the U.S. Park Police Major, he's the National Law Enforcement Specialist stationed here. He came,
    was here. I don't remember where he'd been earlier that day. But any rate, at some point in time, then the decision was
    made by the Secretary to go to what now is called Site C, which is in Shepherdstown, part of the Continuity of Operations
    backup plan. Which means that the director goes there, and which means then that typically - the director, the Secretary
    would do that, we would send our leadership under the deputy to Harpers Ferry Center, the museum facility not the park
    and where they have a space, set up there.
- speaker: Respondent
  text: I went back to the hotel. And so when Gary Van Horn took Fran, and I don't remember what time it was, late in the
    afternoon, early evening, took her to Shepherdstown, I went back to the hotel and under her direction, I contacted all
    of the associates, plus Reynolds, who was as I say the acting, and made arrangements for them to go out there to Harpers
    Ferry the next morning. I barely got that accomplished, and the call came in - I don't remember where it came from, but
    any way, that the director was coming back. So, we canceled it. Then we turned around and canceled all of this.
- speaker: Interviewer
  text: So, tell me a little bit about that Continuity of Operations plan? So, there was a pre-existing plan? Did that work
    well?
- speaker: Respondent
  text: Well, it worked reasonably well. I mean it's a little out of date. And we found, and of course, with lessons learned
    we learned is it better to keep people in this building or just to send them out into the street? There were rumors abounding
    whether the Metro was running, Metro was shut down. So, it was pretty chaotic, as you might guess. So, yes, but there
    is a plan, our bureau has a plan for this building, actually there's one for North Capital, and for AOC. Each regional
    office has one, each service center, where they're going to go in case of this.
- speaker: Respondent
  text: And our plan basically calls for recognizing that the director will go where the Secretary goes or wants her to go.
    We arrange with the Harpers Ferry Center and they have, I guess, I've not seen it, a conference room where they've installed
    extra phone line, jacks, and that sort of thing, so she can actually manage the NPS operations from out there.
- speaker: Interviewer
  text: So just, again, just so that I understand this. Is the Park Service's plan, is that a piece of the DOI continuity
    instead of separate?
- speaker: Respondent
  text: Yes, it is. They're all integrated. They're supposed to be integrated. There clearly needs to be some more work done.
- speaker: Interviewer
  text: Okay. Just to backtrack for a second, when you first went and met with the director you said that the parties there
    - the senior staff - were discussing some of the things that would have to be done. Can you just give me, I mean, obviously,
    don't talk about anything particularly sensitive, but a sense of the kinds of things they were discussing?
- speaker: Respondent
  text: Well, the main thing, we were trying to get information. But, you know, they were, "Well, we've got to find out if
    this road is open. Can you get there?" And I said, "Time out, folks. Let's stop, take a deep breath, and get ourselves
    organized and deal with it. Let's figure out the critical things that need to be done." I said, "We don't have any information
    so we're going to have to go with our best stuff. But let's not have associate directors running around trying to figure
    out what routes are open. We can get somebody else to figure some of that stuff out." So, I tried to just get them organized
    a little bit, which we did.
- speaker: Respondent
  text: And basically, shortly thereafter I said - Fran said, "We need to go upstairs." And I don't remember whether she already
    knew that or whether she got a call. I can't recall that. And so, I went with her, and then we did the - so I sort of
    lost contact with the associates and stuff for the rest of the day. I'm not quite remembering that. But basically, I was
    just with Fran the rest of the day.
- speaker: Interviewer
  text: Would you go on and talk about how your role unfolded? You assumed something of an advisory role.
- speaker: Respondent
  text: Yes, basically what I was doing there was to give her advice about how we should think about getting organized, what
    we could do, and some of that stuff. So, one of the things we did right away was call our national Incident Management
    Team together and pre-plan, and not knowing what we might need from them, but to have them on site at Shenandoah. We didn't
    want to have them here because we didn't know what you could do here. So, we tagged them up in Shenandoah just to be ready.
    So that call went out the first day. And we'd have to look at the Shenandoah logs and all to get the exact times and all.
- speaker: Interviewer
  text: Maybe just to stop at that spot for a minute. It would be very helpful to me if you could just explain a little bit
    more about the process for activating the - well, first of all, maybe just to get on the record a brief description of
    the Incident Command System.
- speaker: Respondent
  text: Well, the Incident Command System is a very flexible system designed to manage any sort of incident. It's generic
    in nature, and the NPS uses it and adopted it in 1985 for all emergency operations. It's flexible enough to expand and
    contract quickly both ways. It's basically - what it does is - the way the Incident Command team works is they get - the
    incident commander gets a delegation of authority or something. Now we just had a verbal delegation at that point in time.
    I wanted those guys pre-positioned.
- speaker: Interviewer
  text: This is from the director?
- speaker: Respondent
  text: In this case it would have been from the director, correct. But I wanted that team pre-positioned in case we needed
    them. At least I had them all in one place. I had them in short, a short time from here rather than bringing them from
    all over the country to get here. So, it made sense, until we scoped out what their need might be is to do that. So that's
    what we did.
- speaker: Interviewer
  text: And they convened at Shenandoah National Park?
- speaker: Interviewer
  text: Is that part of this operations plan that they would convene there?
- speaker: Respondent
  text: No, not necessarily.
- speaker: Interviewer
  text: How was that decision made?
- speaker: Respondent
  text: Well, based on, because the decision was based on, we didn't know what we had. We knew we might have a need, so let's
    put them someplace close, but not right here in the middle of things where we might have to move them sometime again.
    So just put them down where they're close. We talked - I don't remember. It seems to me we might have talked about putting
    them at Manassas even or something. Shenandoah has got a dispatch center and all of that. I mean to me it made more sense
    just to put them there.
- speaker: Interviewer
  text: Were there any challenges in activating the team? I've heard that, the fact that planes were grounded, getting some
    of these people in was somewhat difficult initially. Do you have any thoughts on it?
- speaker: Respondent
  text: Well, I don't remember that. I mean I'd have to go back - and probably you'd need to - I don't remember that but once
    we talked about that and got them going, I really was not in that loop much anymore. But I don't know. Brenda Ritchie,
    who is the head of communications center at Shenandoah, can probably tell you that.
- speaker: Interviewer
  text: And this delegation of authority?
- speaker: Respondent
  text: Well, we didn't have one at that point. We were just getting it ready, but that's how, ultimately, they would work.
- speaker: Interviewer
  text: But there was ultimately one, correct?
- speaker: Interviewer
  text: And if you would just explain to me a little bit about what that included?
- speaker: Respondent
  text: Well, what the delegation would include, in this case, we wrote it for Fran to sign, but it gives them her authority
    to do things. So, they were speaking on behalf, if you will, for the director. And it also gives them authority to expend
    funds. But it also, is equal to the authority is the constraints. It will also tell them what they cannot do without checking
    back with her or her designated person. And what she did was designate me as her representative to the Incident Management
    Team.
- speaker: Interviewer
  text: And does it lay out tasks or missions?
- speaker: Respondent
  text: No, it's very broad. It's very broad. That's the benefit of ICS, let the people who know how to do that do that.
- speaker: Interviewer
  text: Okay. Maybe just a little bit more about, moving into the area of communications for a minute.
- speaker: Respondent
  text: Back to the team and coming by air. Come to think about it, I think we were able to get, because the teams were nationwide,
    I think we were able to fill out the team locally pretty much with people who could drive. For example, one of the incident
    commanders is from Indiana Dunes, J.D. Swed, the other being from Colonial. And I thin
