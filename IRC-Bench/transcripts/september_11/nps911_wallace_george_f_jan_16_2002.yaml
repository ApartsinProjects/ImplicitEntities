collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: First question that I wanted to start out with is just what happened on the moment you were aware what had happened?
    What went on?
- speaker: Respondent
  text: Well, I was actually in the mall writing tickets when Sergeant Dan Beck contacted me on my Nextel and said that a
    plane had just hit one of the towers of the World Trade Center in New York. Initially, I thought somebody was off course.
    Certainly, didn't think it was a terrorist attack initially and I just kept going writing my tickets. He told me - I asked
    him was it a big plane? You really can't tell watching it on TV. So, I continued to write some tickets and within minutes
    - I didn't know what the time frame was but wasn't too awfully long - and, he calls me back. "You won't believe this.
    I'm watching TV and" he goes "another plane just slammed into the other tower." Well, then you had a good idea that it
    was a little bit more than just a freak accident. I just - I, finished up my tickets, hopped on my bike and I rode back
    here. Because we knew we'd have to - we knew there would be some security that would take place here. And, the motor unit,
    which is usually tasked with road closures, evacuations, things of that nature.
- speaker: Respondent
  text: So, I came back and, of course, I was watching it on TV and we immediately told the motors that were already out working
    the traffic thing just to stay in the downtown area and be very vigilant of the memorials and the monument. And one of
    the guys called here. He was actually parked at Swan Boat parking. And, he called because he had to go up to the shop.
    He said, Dan, I got to stay downtown. I gotta get my bike up to the shop. Literally, do you know what's going on? And,
    he says, no. I've been out on traffic all day. I don't know what's going on. Because we don't have the benefit of an AM/FM
    radio on our motorcycles, you know.
- speaker: Respondent
  text: We're outside. I said some planes have crashed into the World Trade Center in New York. And, he says, no I didn't
    know any of this. I've been out doing traffic. And, probably right when he was saying that, he goes, then he just screamed.
    A bomb just went off downtown and I said, well, where? He says it's at the FDR. Then he goes, no, no, no. It's the Pentagon.
    It passed the Pentagon. So, I hung up. Looked at Danny back and said, hey, something just happened at the Pentagon. I
    don't remember hearing it here.
- speaker: Respondent
  text: We went running outside. Well, you could see the smoke from here. We hopped on our motorcycles and we took off. And
    as we were headed over there, there was a plane circling the Pentagon. Circling the smoke that was coming from the Pentagon.
    It was a military plane.
- speaker: Respondent
  text: It looked like a C130 and not that I know what they all look like, but I just know what that one looked right. And,
    it circled a couple of times around the smoke and then it headed south. It went out of sight. And, we maneuvered our way
    through traffic. We had the benefit of two wheels. We had got up to the Pentagon - now that particular day the President
    was to fly into the Pentagon Heliport, and we were to escort him from the heliport back to the White House. That was supposed
    to happen around 11:30.
- speaker: Respondent
  text: So, we rode up to the Pentagon and the Pentagon Police just waved us through and we just circling around all the building
    until we saw where the damage was done, and it was done on the heliport side. We parked our motorcycles and it was just
    a, you know, something that you just can't imagine - the destruction. Something - I've never seen anything like it before.
    When I was in Florida, I've been in some catastrophes but nothing like this.
- speaker: Respondent
  text: And, initially I - you know, I guess because I took the phone call and the guy said a bomb just went off. I'm thinking
    this must have been a truck bomb or car. I didn't think airplane initially because there was absolutely nothing, when
    you looked at it, to indicate that there was an airplane. The plane wasn't sticking out of the Pentagon. The debris field
    was so small - that the pieces were so small, you don't think of it as being pieces of an airplane. And, across that field
    towards the helipad, there were people laying in the field and there were people running to help them. And, we just jumped
    off our bikes and I don't even know what I said on the radio. I know I made transmissions probably that it was at the
    heliport side and running up. We tried to help people that were hurt but there were a lot of people. There were a lot
    of military people around. We ran up close to the building where the fire was fairly heavy. There were probably military
    personnel in civilian clothes trying to make an effort to make a rescue effort. The fire department was just starting
    to get their hose lines into operation, and we helped the fire department pull hoses. And, we actually were prepared to
    go into the first floor of the Pentagon, the ground floor, to help with some rescue efforts. We were standing by with
    the stokes basket and, the fire department had made an initial entry. Came out. One of the firemen said there's no survivors
    in this section. And, you know these military guys that were there in civilian clothes. You're not going to tell them
    that there's no survivors. They're gonna - they want to root around through everything to look. They were very inspirational.
    I don't know the guy's name and I saw him later in the day and talked to him and I never did get his name. But he was
    the type of guy that you'd follow into the burning Pentagon. He was just that inspirational.
- speaker: Respondent
  text: One of the fire chiefs came out and said, hey listen, nobody can come in here. This structure's unsafe. It's going
    to collapse any minute. And, he says everybody start pulling back and we started to pull the hose lines back and I would
    say within two to three minutes that facade just started to crumble and just collapse.
- speaker: Respondent
  text: You know, the fire department we helped them with their hoses again because they just - they were setting up a surround
    and drown type operation. I mean this fuel - the fuel wasn't going out easy and they were just hosing it down. And, I
    don't know why came up to me. For some reason I thought it was an agent of some sort and said, listen, there's another
    plane. It's twenty minutes out. We don't know where it's going. It's a good possibility it's coming here to the Pentagon.
    So, we need to evacuate all these people that are standing around. And, that's what we did. We started to pull back. Our
    helicopter was on the ground and I ran up to the lieutenant in charge of aviation, Phil Chowa [phonetic] and told him,
    look, I don't know if you'd heard this but there's another aircraft unaccounted for possibly coming here. You want to
    get these eagles out of here.
- speaker: Interviewer
  text: Get these eagles out of here?
- speaker: Respondent
  text: The helicopters. And, then we actually got - went back to our motorcycles. They were a good 50-60-70 yards from the
    Pentagon close. Wasn't anything we - we didn't want to ride right up to, and people were starting to walk up one lane.
    You know, the building was being evacuated and we started directing the people up the parkway instead of staying and watch
    it burn we directed them up the parkway. You know, it's possible there's another aircraft in the area coming this way.
    They wanted to get as far away from the building. That's the extent of what we did at the Pentagon. We probably weren't
    there for much more than 45 minutes. Maybe tops an hour. I'd say we had to have been there - we had to arrive on the scene
    within five to six minutes. There were people still running out of the building, you know, on fire.
- speaker: Interviewer
  text: When you got there?
- speaker: Respondent
  text: I've got some pictures. I took a couple of pictures and, only a couple before we went over. These were much later
    in the day. This is when we first got there.
- speaker: Respondent
  text: That's from where we parked, and you can see the debris in the field and it just wasn't too - it really wasn't big.
    And, this was the President's - well, not the President's helipad but that's where he would have been.
- speaker: Interviewer
  text: Where he would have been. Right in the middle of all that soot.
- speaker: Respondent
  text: Yes, pretty much. There were some cars that were parked here. They were on fire. Now, later in the day, this unit
    was tasked with making escorts of cabinet officials to the undisclosed locations, outside the city. Normally, they fly
    and I don't know what happened, but, I guess, all the cabinet officials didn't make it to the helicopters and we ended
    up doing an escort up to Mt. Weber, which is - I know it's about 60 or 70 miles west of - in Loudoun County or out that
    way. We had motors. I got hooked up and that's why I have these other pictures which are later in the day. We actually
    escorted the HAZMAT, - Montgomery County's HAZMAT group - down. Anybody that needed an escort over to the Pentagon - HAZMAT
    groups that were coming into the city. We escorted them over there. So, we made a number of escorts that day for fire
    department personnel. This is all in the first day - all these pictures.
- speaker: Respondent
  text: Other than that, after we - there was hours between when we left there in the morning. We probably left the Pentagon
    area - Sergeant Beck and myself, probably about 10:30 and these - this is probably about 4:00 in the afternoon when we
    returned there.
- speaker: Interviewer
  text: This was after doing the escorting?
- speaker: Respondent
  text: And, then there were some escorts in the middle. I didn't go on the escort to Mt. Weber, Sergeant Beck did. I stayed
    in the downtown area and coordinated closures and other escorts.
- speaker: Respondent
  text: And really that's about all Sergeant Beck and I did. We just - we headed for the smoke when we saw it. Our largest
    concern at the time was to see exactly what was hit. We didn't know. Was it the Pentagon or what? And, we knew that there
    was going to be escorts from the Pentagon that day and we had to make sure that - we just wanted to see what happened
    and where was it.
- speaker: Interviewer
  text: Let me see if I can drop back a little bit here. Okay. Let me get my notes here. The - you were mentioning that when
    you got there, there was just a whole heck of a lot of destruction and you were showing me some of the pictures here,
    particularly the one of the burning. Could you talk a little - well, first of all you were mentioning that there were
    a lot of injured people that were out there.
- speaker: Interviewer
  text: That's something very much unlike, of course, the World Trade Center, where there were relatively few injured people.
    Did you describe some of your impressions at that day even by just looking at the picture?
- speaker: Respondent
  text: Well, you just can't believe it. It's just an unbelievable event. That you know what just happened in New York and
    now it just happened here and you're thinking to yourself there's got to be more. It isn't stopping right here. And, it
    just - I guess Sergeant Beck and myself - we were probably in a mild grade of shock just looking at this scene and we
    kind of looked at each other and said what do we do now? What can we do? We just thought, well, there's no traffic coming
    any more. There's no traffic to direct and people are streaming out of the building. We thought, well, probably the best
    thing to do is to head over to the actual site because you could see people down. And, you really can't pick them out
    in this picture, but they were there. And, there was a lot of superficial injuries, flying debris and some of these people
    might not have even been in the building. Probably more, probably just hit with debris after the impact. But they were
    all just in deep shock. They needed immediate attention.
- speaker: Respondent
  text: The fire department whose job certainly is rescue and emergency service, they can't be tied up with shock victims
    in the field. They got to put that fire out. They got to get on that. So, we - we did the best we could but there were
    a lot of military. It's the Pentagon. Just thousands of military people. They all have every bit the medical background
    that I have and some better that came right up and just went right to these areas and started to render aid. We helped
    people to the feet and walked them to the ambulance but - other than that it really wasn't - there really wasn't anything
    we could do. We couldn't go in the building and it's probably a good thing that that fire chief came out and said, hey
    look, this building's going to collapse. Because it did within minutes. That environment - it wasn't safe to go in without
    breathing apparatus. But people were going to do it.
- speaker: Respondent
  text: There's no doubt in my mind. I was going to make an effort and there were people a lot more determined than me. They
    were going to do it. They were going to look for their buddies that were in there. The thing that was always in the back
    of my head - even before they came up and said there's another aircraft missing. I kept looking up. You kept looking in
    that sky. I was waiting for something to happen, another plane or something else. And, I remember talking to Dan Beck
    and saying the helicopter was still in the air.
- speaker: Respondent
  text: It's flying around in the air. I said to him I hope those guys are looking for aircraft, you know, other aircraft,
    because that's what worried me the most. Not that - I know it wasn't a bomb. I mean that's what terrorism is. You know,
    here's one event. Now I'm going to get you with the second event. Here's one tower. Now I'm going to hit the second tower.
    Well, they only hit that one thing and, I mean, it's an unfortunate thing that that plane crashed in Pennsylvania because
    there's no doubt it would have been just more massive destruction in the city had they been
