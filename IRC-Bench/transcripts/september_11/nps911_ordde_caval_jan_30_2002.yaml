collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: So, my first question, Caval, is from the moment you were aware that something had happened, what happened?
- speaker: Respondent
  text: Okay. The first thing that happened is one of my coworkers came downstairs and said that a plane just went through
    one of the towers, and so we all ran upstairs in the hall, looking to see what exactly - where the plane hit, and what
    sense we could gather from that, and we was just standing there looking at it, and probably I said, "oh, maybe that's
    just someone that's trying to stunt between two towers," because here at the Statue you see all types of situations -
    you know, people try to do a lot of things, because this is New York City. So, that's what we thought. You know, I thought
    it was someone just trying to glide their way in between two towers and missed.
- speaker: Respondent
  text: And so, we looked at it for a little while, and then we ran back downstairs, and my coworkers got on the phone and
    started calling their family members - you know, did you hear this? Blah, blah, blah. And I was on the phone with my husband
    at the time, and he said to me, "it's not an accident, because the traffic is backed up, and so forth and so forth, something
    else is going on." And at the same time, I'm like, no, it can't be anything else - you know, this is New York City. It's
    crazy. We need to get used to this.
- speaker: Respondent
  text: I heard a boom, and that is the time when the second plane had hit, and we had lost all communication and power at
    that time. The cell phones were down, and everything. And at that time all the employees was running - running frantic
    in the hallways, and they was trying to tell us where to go, and it was like a - it was chaotic, because you have a sense
    of not knowing what was going on, and as human beings, we always have a need to know, and that was not the case that particular
    moment, and so finally, Cynthia said, "you know, we will meet outside," and - Cynthia who is the Assistant Superintendent.
- speaker: Respondent
  text: So, we - finally we met by the flags, by the walls, and we were standing there just looking - coworkers were crying,
    and some have family members on the other side that didn't yet - was on the 9:00 o'clock boat to come across, and they
    was wondering what happened to them. And it was just something that you just feel as you were standing there, even though
    they were trying to talk and joke about things, and stuff. You could see it was like concern on people's face at that
    moment. Okay?
- speaker: Respondent
  text: And finally, one of the maintenance staff - I think it was Walt Fleming - came and said that we was going to go back
    inside, or something like that, or get your belongings, if you have it with you. They might send us home, we're not sure
    yet. We're waiting on words, and then at that time, we walked from the flags, and we was walking around to the area where
    the staff would normally catch the boat, which is at the canopy area. And then, we were standing there and I was talking
    to our former AO, Delores, at the time, and I said to her, "wow, I'm so concerned," because my husband was on the bus,
    and the bus was close to where he works, because he works at Trinity Church, which is a few blocks down from the Trade
    Center. And she said, "oh, Caval, don't worry about it. Everything is going to be okay." And I said, "yes, I have no doubt
    about that," and at the same time the first tower came down.
- speaker: Respondent
  text: And when the first tower came down, is like at that time the employees - especially the ones that worked for the concession
    stand, some of them wanted to jump over the wall - you know, they just wanted to get off the island, and go some place,
    and at that moment, because I'm a believer that God has placed us here for reasons and purposes, I started to console
    the ones that wanted to jump, telling them it's not worth it, and one of the employees almost fainted, so I helped her
    to a bench.
- speaker: Respondent
  text: I ran back inside the building, even though I was told that we're not supposed to go in the building, to get some
    water and towels and stuff like that - just as a need of assisting - and at the same time we got word that there's a lot
    of other places that have been hit at the same time, and it's a terrorist attack. And the superintendent - Superintendent
    Dayson said that, you know, she's going to have everyone that's non-essential, who don't have EMS, who can't provide any
    type of service was going to go home, because she would prefer to know that they are safe at home, instead of being here.
    So, her concern was for her employees at this time is just get them to safety. And I don't have any of these backgrounds
    that she was naming out, and I just stood there and looked at her, and I just said I'm not going anywhere. And I said
    I'm going to help somehow.
- speaker: Respondent
  text: And so, with that I start moving - help move the stretchers that they was going to set up for the triage center -
    get the gloves all together, you know, because we was told that they was going to bring the injured - injured people here,
    and then transport them to whatever hospitals, because everything in the city is so congested. So, they start transporting
    the people here, and I start assisting them like that. But not necessarily trying to administer any type of medical, because
    I don't have that background. So, I was just handing them their water - make sure they was getting water; clearing the
    aisle so as the boats are coming in, people would not be trampling over each other.
- speaker: Interviewer
  text: Clearing the aisle? Yes.
- speaker: Respondent
  text: Clearing the outside because we was outside. So, make sure they was not all standing where the boat docks. But clear
    people away, and then we start taking - we was told that if we're going to stay we need to take name, address, social
    security, telephone number, contacts - so that we could call family members, or if someone is missing, that we'll have
    a listing of who came through the island on that particular day. So, I head that up, and I ran back inside, and I got
    some note pads, and pens, and hand them out to a few more employees that was here.
- speaker: Respondent
  text: And so, we started taking their names and stuff, forming lines. There was a few young ladies that was pregnant. One
    was just about three weeks, and you know, she said she feel like she's going to lose her baby; she's so stressed, so I
    went and I got a chair, and have her sat out - sat in some shade; give her some ice-cold water, and you know, try to calm
    her down, and then once she was calmer went back to help wherever I can. And so, that was now later on in the day, and
    the fire fighters and the EMTs, and the island was just swamped with people.
- speaker: Respondent
  text: The people was coming through with lacerations on their arms and legs, and to their face, and some people, they're
    just covered in ashes. You look at them, and you would think that you see a movie or a ghost, you know, they're so white
    with everything, and they're frantic, and babies, that heart is just racing, because the parent is running with them,
    and they themself looking at the parents, like what is going on? It seems like everyone have this sense of, you know,
    shock and disbelief, and you know, this can't be happening; this is New York. We should have the best government, and
    then you - at that time you hear people start, you know, blaming - pointing fingers, and that was not the time for that,
    but we - two of my coworkers downstairs, Linda DaVoe, and Cathy Aiello - we went back into the concessions office, and
    we started - whatever they had as far as food was concerned, we started preparing food to feed the firefighters, and the
    EMT personnels, and whoever that needed something to eat, basically.
- speaker: Respondent
  text: Because they was sitting there, just waiting for word as to how they was going to get off the island, because we couldn't
    - the bridges was closed, highways were shut down, so now people had to think, you know, because if you had to take a
    car, where you're going to drive, because I couldn't get home. I live on Staten Island. So, the bridges were closed at
    that time, and I actually stayed here up until 10:00-11:00 o'clock at night, feeding - cooking food for - cooking whatever
    was left in the kitchen to be cooked, so that these people could have something to eat, because everyone came into a joint
    effort, and I think that's one of - in the light of all the bad situation, I think that's what I would want to stay with
    me forever, is that it took a bad situation to bring everyone together, so there was a sense of togetherness, and everybody
    was working and helping each other.
- speaker: Respondent
  text: And it's like no more "this is not my job; this is your job; I don't work in the kitchen; I don't do this" - and now
    it's like you chip in wherever you could help out. That joint effort; that came through, just because - you know, of a
    bad situation. And because of - I guess, with me always wanting to help - help in whatever situation I could help out
    in, I was in the kitchen not realizing that the crew that lives in Staten Island, the Chief of Interpretation, Danny Brown,
    and Superintendent Dayson, and Cynthia Garrett, all of them got police escort home, and I was still in the kitchen, and
    so I'm calling everyone, I'm still here. How am I going to get home?
- speaker: Respondent
  text: So, finally they arranged for - one of the police officers who was getting off duty to keep his uniform on so he would
    not be stopped, and to keep my vehicle here, and to ride with him, and so I could get home at that time. So, I actually
    got home like about 1, 2 o'clock the next morning.
- speaker: Interviewer
  text: Mmhmm. Just backing up here a little bit; this was quite something. At the point where this had occurred - at first
    nobody quite believed what was going on. Surely, this wasn't - you know, this was some kind of accident, or some stunt
    man trying to fly in between the buildings -
- speaker: Interviewer
  text: And apparently that does happen a lot here at the -
- speaker: Respondent
  text: Yes. We normally - because it just was a few months prior to that a guy got caught up on the Statue - a glider, and
    he just wanted to glide onto the Statue and stunt down, taking pictures and stuff like that, so we see that here all the
    time, so that's what - the first thing that came to mind. It's like terrorist thing - from my mind - or suicidal anything,
    was the furthest thing. It was just like this is New York; we are on Statue of Liberty; this is where we are, and people
    try to do the craziest things around here. So, that's what came to mind.
- speaker: Interviewer
  text: Mmhmm. Yes. All right. Then, you all had gone over to the flagpole?
- speaker: Interviewer
  text: And then had moved over - I think you had -
- speaker: Respondent
  text: To the canopy area.
- speaker: Interviewer
  text: Right. To the canopy area, and that was an expectation for getting off the island, or some of the people off the island?
- speaker: Respondent
  text: Yes. To arrange for - because at that time the Superintendent came on the scene, and she was like, okay, now, we're
    going to have to start transporting people off of the island.
- speaker: Respondent
  text: You know, I want you guys to - she called the boat - have them radio the boat captain - whoever needs to get on the
    boat, however they need to get home, take them to the closest point so they could get home, and not be here. I prefer
    them to be off than here, and that's when we have start drifting from the flagpole, and some people had already left,
    before the bridges and stuff closed. Once the second plane hit, quite a few of my coworkers just jetted.
- speaker: Interviewer
  text: Mmhmm. Just took off?
- speaker: Interviewer
  text: Then you basically stood your ground?
- speaker: Respondent
  text: Yes. And it was funny - because - she'll be cracking on that with me, because she said, "I sent everyone home, and
    you just stood there and looked at me." I was like, you sent them because they was frantic. You sent them home because
    they was walking around like they didn't know what they was going to do. But that was not me. I'm a firm believer that
    if there's a situation where you could help, you're supposed to help.
- speaker: Respondent
  text: I didn't have what she was looking for, but I know what God have placed inside of me, and that is to give a helping
    hand, and to help the sick, and to - just do whatever you've got to do. I didn't have the EMT background, but I know I
    can hand you a glove. I didn't know if I could look in the eyes, and tell if something is in it, if I can't see it, but
    can give you a bottle of water. If you want your face to be washed, we could - I could have provide that for you, and
    so that's why I stood there and said, "well, she's not talking to me."
- speaker: Respondent
  text: And I was standing right next to her, and she was telling everyone I want everyone off the island if you don't have
    this, if you don't have that. I just stood right there, and I turned around and I was like, okay, well I'm going over
    here to get some water, and I just start running around [laughter]. That's what I did.
- speaker: Interviewer
  text: That's great. Now, about what time was this? I mean, do you sort of remember what the time - what the timeline was
    like, or was it all just happening too fast?
- speaker: Respondent
  text: The first - I think when the first plane hit, it was probably after 8:00, because my husband is supposed to be at
    work for quarter to 9:00, and he was running late, because I asked him to drop the baby off. So, he was late, and I was
    talking to him, and he was on the bus, and he was not working, and it wasn't at 9:00 o'clock. And then when the second
    plane hit, I think it was after 9:00; I'm not sure. So,
