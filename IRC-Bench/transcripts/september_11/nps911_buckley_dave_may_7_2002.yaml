source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe to start if you would just briefly explain what your position is here with the Park Police?
- speaker: Respondent
  text: I'm Lieutenant David Buckley and I'm the station commander of the Staten Island Unit of the New York Field Office.
    I'm also the, at the time of last September, I was also the commander of the SWAT team for the New York Field Office,
    which is now the Emergency Service Unit.
- speaker: Interviewer
  text: I wondered if there was a SWAT team up here. Actually, maybe you could speak, before we talk about September 11th,
    could you give me a little background on, you said it's now called the Emergency Services Unit?
- speaker: Respondent
  text: Yes, it's now called the Emergency Service Unit. Actually, at the moment, it for all intents and purposes doesn't
    exist. Since September 11 of the six people in the unit, five officers and the sergeant, four of the officers have quit
    to become federal air marshals. So, with the low staffing right now the sergeant and the remaining officer have gone back
    to patrol, and I've taken back to doing my station commander stuff full time. When we get more people, we'll select the
    people and reestablish the unit.
- speaker: Interviewer
  text: What impact has that had? I mean have there been instances since September 11th where you needed this team and it's
    not there?
- speaker: Respondent
  text: It's not that we've needed it and it hasn't been there. It's kind of an integral part of the overall protection plan.
    And we're looking to build it back up again to fill in whatever gaps there are.
- speaker: Interviewer
  text: Was this SWAT team in operation on September 11th?
- speaker: Interviewer
  text: Okay. So maybe that's one area that we can talk to about it. To start if you would just begin by telling me how you
    first learned about the terrorist attacks on the World Trade Center, what you were doing, how you found out.
- speaker: Respondent
  text: On the morning of the 11th we were in the office of Captain Lauro, Sergeant Frank Abbatantuono and I were in the office
    here. And I think someone called up. I'm not sure whether someone came in or someone called up and told us that a plane
    had hit one of the towers of the World Trade Center. So, we got in a car and drove to the overlook by the Verrazano Bridge,
    because there's a good view of the towers from there. Major Wilkins and his wife were already up there along with a couple
    of other people. I don't remember who. And you could see the tower smoking and burning. You could see the flames a little
    bit.
- speaker: Respondent
  text: And we were there a couple of minutes, maybe five minutes or so, when somebody said, "Look at that." And you could
    see coming out from behind Staten Island another airliner, or not another airliner, an airliner. And it was very low,
    just not very far above the horizon. And it flew from, well, from our perspective behind the island, right up the harbor,
    and looked like it was, looked almost like it would go up the East River. And the last minute it banked to the left and
    went right into the south tower. So, it was kind of like watching a bad science fiction movie, you know, where you think,
    gee, I wonder if I'm really asleep and dreaming all of this or if it's really happening. You could see the flames. You
    could see the flame when the plane went in and you could see the flames coming out the other side of the tower from where
    we were. So, and -
- speaker: Interviewer
  text: So, what were you thinking at that point?
- speaker: Respondent
  text: At that point just really the only thought that went through my head besides that it was very obviously a terrorist
    attack, that it was very unreal. Then somebody, I think Captain Lauro said, "Let's get going." And at that Sergeant Abbatantuono
    and I went to get back in the car to drive out to Ellis Island. I called the dispatcher on my cell phone -
- speaker: Interviewer
  text: And that was, tell me how that decision was made? That would be the first action, to drive to Ellis Island? What sort
    of discussions surrounded that?
- speaker: Respondent
  text: It wasn't much discussion. We kind of all came to the same conclusion, I think, that Ellis Island, if anything was
    going to happen further that the Statue of Liberty would be the logical target. If there was going to be another plane
    or it was going to be another attack of any sort, that the Statue of Liberty would be the logical target.
- speaker: Interviewer
  text: And at Ellis Island you would be better positioned to respond?
- speaker: Respondent
  text: To respond to anything, yes.
- speaker: Respondent
  text: I got on the telephone, called the dispatcher, and told the dispatcher to start calling in the people from the SWAT
    team. Captain Lauro, I remember, being on the radio and on the telephone giving instructions to other people, Sergeant
    Abbatantuono also. I guess right before we got back in the car, maybe a minute or so after the plane hit the tower, the
    sound of the explosion reached us. And then we drove to Ellis Island, the three of us, passing on very obviously everywhere
    we went there were cars pulled over in New Jersey on the side of the highway and people watching what was going on.
- speaker: Respondent
  text: At the point we got to Ellis I guess they had already decided to shut the place down and it was starting to be set
    up as a triage site for Manhattan. And I just, my people hadn't gotten there yet.
- speaker: Interviewer
  text: When you contacted them and directed them to come in, you had indicated that they would, to convene at Ellis Island,
    is that?
- speaker: Respondent
  text: Yes, that they should get to Ellis Island. Most of them couldn't go right to Ellis Island because they had to pick
    up equipment first, but the idea was they would eventually get there. Most of them couldn't be contacted right away. Most
    of them saw the news and came in anyway. The one person who couldn't come in was the sergeant who was at Disney World
    at the time. So, he got trapped in Florida for a few days.
- speaker: Interviewer
  text: What role were you envisioning for you SWAT team at that point?
- speaker: Respondent
  text: Just as a protection and counter any threat. Obviously, there's nothing to counter if it's an airplane. But there's
    so many other ways to get to the island and to get to the people on the island from both islands, actually. It's just
    extra armed people with better armament to prevent anything from happening.
- speaker: Interviewer
  text: Did you have difficulty? I understand the landlines were down and communications were somewhat difficult. What was
    your experience?
- speaker: Respondent
  text: Actually, the best communication seemed to be the cell phones. The telephone lines from here were down. The telephone
    lines at Ellis Island worked. And the ones at Brooklyn, I think, were kind of iffy. The cell phones worked. We usually
    had to dial a few times to get through the busy signals. The radio was not the best. I mean a lot of people on the radio.
    And even, we don't have that many people up here, but a lot of them were on the radio giving instructions. For me it was
    easier to use my cell phone, because until the SWAT team assembled, I didn't have that many people to give instructions
    to. I was going there. Lieutenant Waite took over operations here in Staten Island.
- speaker: Interviewer
  text: I imagine your SWAT team is very well-trained to respond to a variety of emergencies, but nothing like this had every
    occurred.
- speaker: Respondent
  text: Nothing like this ever occurred, and I don't know if anybody could have envisioned responding to this. Two of the
    guys got caught in Manhattan and ended up helping people off of Manhattan Island, helping them get on the boats to escape
    Manhattan Island. Two of them were coming in from Staten Island. They stopped and picked up equipment and got to Ellis
    fairly easily, if not quickly. So, it was actually probably several hours afterwards, after the incident, before we could
    really get together.
- speaker: Interviewer
  text: To get them all together.
- speaker: Respondent
  text: As a cohesive unit.
- speaker: Interviewer
  text: And then what kind of assignments were you giving them there?
- speaker: Respondent
  text: They were really, they really at that point, perimeter patrol. Perimeter patrol and we had one or two of them out
    on perimeter patrol and the rest centrally located to respond to anything that happened. And at that point we kept them
    on Ellis Island, too. Liberty Island was totally evacuated. And since Ellis was set up as the triage site and Ellis was
    the place where there were people, we kept them on Ellis Island for that day.
- speaker: Interviewer
  text: You know, it would be real helpful to me if you could just sort of walk me through those hours a little bit and just
    describe to me, you know, some of the things that you did and how you got information, and how you, there were a lot of
    people to take care of and I don't really, other than your role in giving directions to your SWAT team, I don't really
    know anything else about the role you performed there that day.
- speaker: Respondent
  text: Other than that, while I was waiting, basically I did what everybody else did. I helped carry litters off of the boats
    and helped direct people off of the boats to the spots on the island where we had set up for people to be screened for
    triage.
- speaker: Interviewer
  text: Did it go smoothly? Was it a pretty calm scene there that day?
- speaker: Respondent
  text: Surprisingly, yes. We didn't get, I mean everybody was surprised. There weren't that many injured. It seems like for
    the most part, either I guess you were dead, or you were alive, and there weren't that many people in between. We had
    maybe 3 or 4 police officers, and 2 or 3 firemen, and perhaps 1 or 2 businesspeople who came through that required medical
    attention of one sort or another. I think one of the firemen who came through was pretty badly hurt. Most everybody else
    was suffering from smoke and dust inhalation. The - but for the first couple of hours after the towers collapsed, it was,
    you know, it was a fairly steady stream of boats bringing people in. We just helped them get off of the boats. People
    still covered in dust and still really, you know, they didn't know where they were or what they were doing.
- speaker: Interviewer
  text: Yes, well how long did this process go on, of people arriving there? By that evening were things winding down and
    people were being sent on home or to the hospital?
- speaker: Respondent
  text: I don't even think it was that long. I mean I was probably there for an hour and a half to two hours. And the bulk
    of the people probably arrived in that time, if not all of them.
- speaker: Respondent
  text: After that I mean as the boats started slowing down, Captain Lauro asked me to try to figure out who of our people
    was there, because we had a captain in Brooklyn and a lieutenant out here who obviously, once they had, guys were coming
    in from everywhere, coming in to work whether they were contacted or not. They heard on the radio that this happened,
    they drove to work. When the captain in Brooklyn and the lieutenant here had enough people for these areas, they just
    started putting people in police cars and sending them to Ellis Island figuring that that's where we could really use
    them. So, we didn't know really who was there. So, it was a matter, I went inside and started making phone calls, you
    know, who did you send us? Who's working in Brooklyn? Who's working in Staten Island? Who did you send to us? and compiling
    a list so we could keep track of it.
- speaker: Interviewer
  text: Well, how, well we'll sort of go beyond September 11th to the days and weeks after. And I'm wondering how the September
    11th response has affected your other missions. I mean one big effect seems to be that you don't have your SWAT team anymore.
    But how has it affected some of the other more routine operations that, whatever those are, other law enforcement missions
    and day-to-day operations?
- speaker: Respondent
  text: Well, it's made everything harder. Just to back up a little bit, after the initial job of getting everybody triaged
    and moved from Ellis Island, what we did with the SWAT team is we went on the boats with the marine unit to be actually
    off of Ellis Island and off of Liberty Island, but able to respond quickly to anything that happened in either place.
    So that we were kind of like between the two.
- speaker: Respondent
  text: But as for afterwards, it's just made everything more difficult. Our people are working 12 hours a day, 5-6 days a
    week, and they have been since September 11th. The security considerations for what we do here, this fort was closed for
    a couple of months after September 11th only because we have the Coast Guard here and the Defense Contract Management
    Agency. And they had their security concerns which we had to be aware of as well. So, we had this place shut down into
    December, I think. We opened up shortly before the Statue of Liberty opened. We reopened the fort to the public.
- speaker: Respondent
  text: And in the meantime, we had the New York Marathon starts here. So that was instead of the twenty some odd people that
    would normally be assigned to the marathon for security, we had 46 officers, plus the New York State Police gave us two
    canine, two explosive protection dogs, to work the marathon. They came down for three days. They were a big help. They
    came down for three days and we checked the entire fort, spent two days checking the entire fort along with our canine.
    And then on the day of the marathon, worked with our canine to screen all of the trucks, and buses, and cars that came
    to the fort.
- speaker: Interviewer
  text: You said this, the route comes through here for the marathon?
- speaker: Respondent
  text: This is where the marathon starts.
- speaker: Interviewer
  text: I didn't realize that.
- speaker: Respondent
  text: Fort Wadsworth. Fort Wadsworth is where everybody gathers. And then at the start of the marathon they take the runners
    out into the bridge plaza for the Verrazano Bridge, and start the race from there. But we have, in the morning we have
    30,000 people, 30,000 plus, because we have the 30,000 runners plus the several thousand staff workers, and food service
