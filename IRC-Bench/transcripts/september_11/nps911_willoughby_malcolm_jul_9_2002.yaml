collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Respondent
  text: The first time I was actually aware of something going on, it was a little odd. I have a little pocket radio and I
    don't normally wear it, but for that morning, I was out planing doors and I was working by myself and it wasn't a noisy
    work I was doing. So, I was wearing a pocket radio and I was listening to the pocket radio. I remember that it was a really,
    really a beautiful, crystal clear day. And then I remember them coming over on the radio and saying that somebody crashed
    a plane into the tower, and they said that the plane had crashed into one of the Twin Towers, and they said they didn't
    know if it was by accident or if it was an act of terrorism. But the first thing I thought was well, it was an act of
    terrorism because it was an absolutely beautiful day and it was clear in New York, and there just wasn't any they were
    going to accidentally fly a plane into the one of the Twin Towers. So, that's when I originally was aware of something
    going on, and I can't - I think I was still over on the site side when the second plane hit the Twin Tower.
- speaker: Respondent
  text: And I came over here, and I have a little TV in my office. And I came over here around nine o'clock. I usually come
    over and take a break. I turned the TV on and, of course all the television stations were covering it. And they were showing
    what films they had of it at the time.
- speaker: Respondent
  text: So, I was actually in here when we heard the crash into the Pentagon. And it was loud enough up here that it actually
    shook the building, and it was obviously something that we weren't used to. You know, we're used to having cannons go
    off for the burials, and that sort of thing during the day, but this is obviously way out of the ordinary. And it was
    kind of funny because I guess the way the hills are it sounded like it was coming over from Fort Meyer, not from the Pentagon.
- speaker: Respondent
  text: And a bunch of us went out the back and stuck our heads out the back door here, and there were some contractors working
    in Jack Metzler's yard, I guess. And they came out the gate and were sticking their heads out the gate, and the cemetery
    guards were sticking their heads out of their buildings.
- speaker: Respondent
  text: We were all sticking our heads all out of the buildings, all looking at each other going and what was that [laughter]?
- speaker: Respondent
  text: And I guess it was shortly after that that somebody noticed that the smoke was rising over from near the Pentagon.
    And we went over there just to look and it was kind of funny because - again since I'd been wearing the radio, I mostly
    left it on and the amount of rumors running around the town was just crazy, because I remember the people saying there
    was a car bomb at the State Department, there was a fire outside the White House. And like I said, you could go out, when
    all these rumors started coming in and also when we went over to look at what was going on at the Pentagon, of course,
    all the fire trucks came through from Fort Meyer and all that. You could look out over DC and you could see there was
    not a dag-gone thing going on. I mean, there was all the black smoke coming out of the Pentagon, but there wasn't any
    smoke coming from anywhere else in sight. So, you knew all the rest of it was just rumor. But you really - with all the
    rumors flying and everything - you really did have a feeling like we were under attack. It was really kind of scary.
- speaker: Respondent
  text: Well, we were kind of - yeah, we weren't sure what we were supposed to do, if we were closing the site and what was
    going to go on. We were waiting - communications were really - they're not very good here over the radio anyway and most
    of the cell phones were all down. And we couldn't get any instructions from Headquarters.
- speaker: Respondent
  text: Now, there's another thing. I never heard anybody else say anything about this, but shortly after the plane hit the
    Pentagon, maybe half hour or so, there was a military transport plane, prop plane came flying up like between the ravine,
    yeah, between here and the Tomb of the Unknown Soldiers. And he was really low. I know what was going on then. And then
    the other thing that scared us for a while is that we heard a boom which, in retrospect, must have been a sonic boom from
    one of the planes that had scrambled. But we heard another boom. We were wondering what that was, so - But I'm trying
    to think what else went on. [Laughter]. Mostly, we just tried to get a hold of Headquarters, find out what to do. We found
    out we were closing down the site, and it was kind of interesting the way some different people reacted. One of the guys
    working for me was working in the garden. He just left all his tools out in the garden and had to leave [laughter].
- speaker: Respondent
  text: And the other guy was all upset that the one hadn't put his stuff away because he wanted to make sure everything was
    put up right and put away before he left out of here because it's, you know - So, it's kind of funny because I guess the
    younger guy was just, - I guess he was really in shock and upset and just had to get out of here. You know, he was all
    worried I guess about his family and all and -
- speaker: Respondent
  text: But some people were just like, well, you know. It - tomorrow's going to come. We have to make sure we keep doing
    things we're supposed to be doing, so I guess Frank was in charge that day, and he'd decided that once he got the notice
    from Headquarters that we could close down the site that he decided who to let go. And I told him I'd stay around for
    a while. I - you know - wasn't in any huge hurry to get anywhere and, so I decided I would hang around at least until
    the night guards came and relieved us.
- speaker: Respondent
  text: Then after that we'd leave. And so most everybody pulled out of here pretty fast. You know, they were all in a hurry
    to hit the road, and I guess they - afterwards, I found out they were all in just a huge traffic jam. But I had a completely
    different experience leaving here - around 2:30 I guess is when the night guard came in - it really was like a ghost town.
    There was hardly anybody on the road when I left at 2:30. It was very strange.
- speaker: Respondent
  text: The other thing that was weird, during the day while we were staying here, just watching the site, we had the FBI
    agents come in and - I haven't covered that part yet - and they were looking - when they heard the second plane was in
    the air, they were afraid it was coming for the Pentagon, too. So, I guess they evacuated everybody from the Pentagon
    area, including the emergency workers. And the FBI came up here and used the front of the House as a command post. And
    there was only two of them at the time, and they were just scanning the sky, looking for the fourth plane. But it was
    kind of funny because we realized then that the FBI's communications weren't really great, either. I think actually, three
    of them in total came up to the site. Two of them were in front, and one of them was somewhere else. I don't know if he
    was back over this way or where he was.
- speaker: Respondent
  text: But, suddenly, they were pulling out of here and so we asked them what was going on. And they told us that the fourth
    plane had hit Camp David. So - [laughter] - so obviously all their communications weren't so great, and they weren't getting
    all the best information either.
- speaker: Respondent
  text: It was kind of funny because I live in Frederick County. We live up on a hill, just east of the city and I called
    - we got a pretty good view from up there - I called my wife, and she goes no, there's nothing going on up here. She said
    if a plane had hit Camp David, we would have been able to see the smoke from where we were. So, again, it was just bad
    information.
- speaker: Respondent
  text: Then a little later it was kind of funny because there was a car came up just - must have been seven or eight FBI
    agents [laughter] in this one car. They were just all crammed into this car and they came up and they were looking for
    the other three that had been up here. And we said no, no, they pulled out about - I guess they came up about, 15 or 20
    minutes after they left, looking for them. So, we told them they'd left.
- speaker: Respondent
  text: And then a little later during the day and then all through the day, it was really weird. Just saw a lot of people
    walking through here, usually in uniform, sometimes not. But I guess they were just all from the Pentagon and just walking
    home because, you know, all through the day, you were just having, you know - And usually, they were by themselves. They
    weren't even walking with anyone else.
- speaker: Respondent
  text: Walking through the cemetery up towards Fort Meyer. I don't know if they had other places they had to report to or
    if they were just walking through to get towards home or, or how it worked out but…
- speaker: Respondent
  text: So that was a little strange, too.
- speaker: Interviewer
  text: So, you stayed around longer than most of rest.
- speaker: Respondent
  text: Yeah. Frank and Keith and I, I guess, were. I left - I think I pulled out of here about 2:30, two or 2:30, and then
    Frank and Keith might have been around a little bit longer. Most of the staff, I would say, probably pulled out by about
    ten or 10:30 so.
- speaker: Interviewer
  text: Well, let me backtrack here for a moment just to see if I've got things down. You had been listening to a pocket radio
    that you -
- speaker: Interviewer
  text: '- normally just normally don''t take to work.'
- speaker: Respondent
  text: Well, they usually have it here, but I normally don't wear it because I'm usually running around doing different things.
    I have to be on and off the phone. But that morning, I knew I wanted - it was a really, like I said, it was a beautiful
    day. I had about three or four doors on the site that I was just going to hand plane down. And I figured it was a really
    nice, clear, dry day. I was going to prime them. So, I figured I was going to be working by myself and doing something
    that wasn't noisy. So, I went ahead and was listening to the radio.
- speaker: Interviewer
  text: So, you had a lot of work to do and you figured because it was a nice day, and so you figured you might not be back
    in touch with the office that -
- speaker: Respondent
  text: Right. Right, exactly.
- speaker: Interviewer
  text: Okay. Then what happened was that, you were listening to it and, somebody announced that one of the planes had crashed
    into the Towers.
- speaker: Interviewer
  text: Okay. And you knew right off the bat that this was a terrorist act -
- speaker: Interviewer
  text: '- because it was a good day and they never could have made any other mistake like that.'
- speaker: Respondent
  text: Right. Yeah, it just is the first thing that popped in my mind. It was kind of funny because that is the first thing
    that popped into my mind is that they're saying well, we don't know if it's an accident or not, and I just thought, no
    way, there's no way it could be an accident, you can't accidentally fly into the something like the Twin Towers on a day
    like today.
- speaker: Respondent
  text: But the other thing was - I gotta say - is it never occurred to me that something was going to happen here. It had
    just never occurred to me. You know? I didn't start thinking - I wonder if they're going to hit the Pentagon or if they're
    going to come down and hit the Capitol - until it actually happened. I just thought all this was happening in New York,
    and it never occurred to me that it might happen here.
- speaker: Interviewer
  text: That's interesting. Because, I mean, some people sort of had a lot of disbelief when the first plane hit and oh, this
    can't be -
- speaker: Interviewer
  text: '- you know, until the second plane hit that they -'
- speaker: Interviewer
  text: '- ooh, something''s wrong here.'
- speaker: Respondent
  text: Well, you know? I have an uncle that had a plane. I used to fly around with him a lot. And so, I've had families in
    aviation and I just like - I know a fair amount about history. I knew about, I guess, it was a B-25 had hit the Empire
    State Building, I guess, in the '40s, during World War II and that was in heavy clouds. So, I mean, you know things like
    that can happen but just from flying, on a clear day like - those are the kind of days you really wish for when you're
    up in the air. They're just beautiful days. You can see forever. So, I knew there's just no way.
- speaker: Interviewer
  text: Yeah. So, you were basically, as this was going on, you heard that somebody crashed a plane into the Twin Towers,
    that this was the first plane, and when the second plane hit, you said you were, you had what? Gotten back here or were
    on site?
- speaker: Respondent
  text: I think I was still on site. I was still working when the second plane hit. And you know? Even when the explosion
    happened, I guess maybe that is the first time I really thought that - it occurred to me that something could be going
    on down here, too, because after the second plane hit, I guess, to tell you the truth, in a lot of ways, I just had -
    I guess - not a very high respect for terrorists. I thought generally they were kind of inept [laughter]. And you know,
    I guess, probably, I just didn't realize that they were going to be so organized that they could pull off what they pulled
    off.
- speaker: Interviewer
  text: So that by the time, the second plane had hit, you figured these guys are good.
- speaker: Respondent
  text: Yeah, but it - yeah. But it still didn't even occur to me. You know, to me, it was still, well, something happened
    in New York. It still didn't occur to me that it might - here would be next, so -
- speaker: Interviewer
  text: Then what happened was you got back up to the building here?
- speaker: Interviewer
  text: And it was just as soon as you
