- speaker: Respondent
  text: After six years as a police officer and detective in Fort Pierce, CeeCee Ross Lyles embarked on a new career as a
    flight attendant, completing her training in January, 2001. The busy mother of two sons and two stepsons enjoyed the travel
    opportunities of her new job and relished the time at home between flights. Her husband says Lyles was a tough, smart,
    and caring woman with a strong faith. During the hijacking of Flight 93, Lyles phoned her husband, reaching their answering
    machine. She told him, "I hope to be able to see your face again, baby. I love you. Good-bye." In a second call five minutes
    before the crash, the couple spoke and prayed together. Her husband recalls that she told him, "Tell the boys I love them.
    We're getting ready to do it now. It's happening!"
