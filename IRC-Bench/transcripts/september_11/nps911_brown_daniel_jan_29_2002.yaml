collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: '- which is from the moment you were aware of something happening of the events that occurred, as soon as you were
    aware that something was going on, what happened?'
- speaker: Respondent
  text: Well, that's a question that I knew something was going on. I didn't know exactly what was going on if that's what
    you're asking.
- speaker: Interviewer
  text: Yes, keep going.
- speaker: Respondent
  text: I knew something was wrong, but I didn't know exactly what it was. I'm remembering coming in the park, driving in.
    I drive through from Staten Island over the Bayonne Bridge into New Jersey. I had to go through New Jersey State Park.
    At the beginning of the Park entrance, of New Jersey State, they weren't allowing vehicles to go through. So, I went around
    this circle and tried to come through on another end and they weren't allowing cars to go through.
- speaker: Respondent
  text: It wasn't until I drove back around the circle, I noticed people with cameras out of their cars and standing almost
    on top of their cars, and I knew something was wrong. I didn't know what it was. It wasn't until I approached the - well,
    I had to show my credentials and got through the New Jersey State Park, and coming over the construction bridge I then
    noticed that one of the - at that time I thought it was one - one of the towers was on fire. I assumed that it was just
    a fire in one of the towers, still not knowing what had happened, because trying to call into the park all the cellular
    phone transmissions were down. So that's when I became aware of something was wrong and then I saw what people saw - what
    was wrong when I was coming over the construction bridge.
- speaker: Interviewer
  text: Keep going, then what?
- speaker: Respondent
  text: Came into the park. Then it became quite clear after you came into the park - from the parking lot my office is pretty
    close. Dropped my bags off. I believe I might have went down to the management office, picked up my radio, and found -
    I don't know exactly - remember when I can recall when I found that the plane had hit the tower, which tied into what
    I saw over at the - one of the towers on fire. Not knowing at that time that it came later on in the day that I had found
    out that two planes had - one plane had hit each one of the towers.
- speaker: Respondent
  text: I remember the radio communication from dispatch saying the towers were falling, you know. Tower one was falling.
    I decided - why, I don't know why at that time - but I decided to not watch the tower as was falling down.
- speaker: Respondent
  text: I don't know if it goes back to my premed school days or working in the emergency rooms at Harlem Hospital in pediatric
    surgery or pediatric emergency room, dealing with triage. I decided just not to watch the towers fall down, and I actually
    gave myself a different experience than other people had.
- speaker: Respondent
  text: During the course of the ensuing hours I found out what happened. I then figured out that an attack had occurred because
    it was kind of odd that two planes would hit the towers. Most of the rest of the hour to two hours - this was about 9
    o'clock in the morning, just about 10 minutes to 9 before I came - when I came into the park knowing that - then everything
    just started speeding up after that. Fire engines, you could hear the sounds from New York City. People in a panic, you
    know. I would look at staff members being extremely affected by the events that happened that day.
- speaker: Interviewer
  text: Keep going.
- speaker: Respondent
  text: What happened then, we prepared ourselves to deal with the expected onset of individuals that were affected with the
    devastation of 9/11. I remember management sending staff home. I was instructed to send nonessential staff home or at
    least got them off the island, which was a great idea at the time. To make sure that only essential staff and individuals
    that had any emergency medical or first responder training - as we were gearing up for a bigger event that day that I
    didn't even realize how traumatic it really was.
- speaker: Respondent
  text: Staff left. I remember making sure which staff of mine was getting on the boat, which staff was left that day. Find
    out where they were going. I believe that they were being let off at one of the piers in Brooklyn. Got the staff. We were
    preparing some of the triage, all of the time somewhat stunned, but I guess a mode of - I guess, I said - my emergency
    room experience, instead of not panicking. I don't recall panicking the whole time of the day during the course of the
    day.
- speaker: Respondent
  text: The staff that was left started preparing different areas for, I guess, the victims of the attack. Then I think the
    first boat arrived with victims. Then reality set in. You see people coming off the boat, gasping for air, coughing, looking
    like they had been through a snowstorm, a sugar factory, dust and everything covering their bodies. So, we're helping
    out, you know, setting up areas of chairs, again just sort of like a triage. Setting up the area for victims who were
    extremely wounded with broken arms, legs, things like that, and individuals that had respiratory problems.
- speaker: Respondent
  text: Basically, I wandered from area to area to see where I could help at, at the same time looking around and looking
    at the devastation that occurred to me, so I had some point of reality of what was going on that day. During the day helped
    out, preparing to arrive - for the arrival of, at that time, bodies. We were setting up a morgue in the back of Ellis
    Island, which really never occurred, to my knowledge.
- speaker: Respondent
  text: It was then when I went on the other side of the, I guess that's the north side of the island, saw the devastation
    of just the smoke and the sirens and just watching the smoke rise in the air. If there were two towers there, which I
    had known that they said that they both fell earlier during the day, that you couldn't see them anyway if they were still
    standing. But you knew that there was some devastation that had happened and tying in watching the people come off the
    boat, the victims come off the boat and watching that devastation and just it was horrific. I remember repeating that
    word through my mind all day. It was horrific. What a horrific sight to see.
- speaker: Respondent
  text: Later on, taking some time, going into the management office to see, to actually see a TV, finally saw it on TV what
    was going on, bits and pieces. Again, I systematically eased myself into what had happened instead of being - had this
    all thrown on me at one time. Saw the news reports, I think it was CNN then. And then, like I said, everything just kept
    speeding up during the whole day.
- speaker: Respondent
  text: It was, I think, maybe 6, 7 o'clock we had a caravan let out of the park to take us out of New Jersey State Park and
    into - the majority of us was going to Staten Island. Pretty lucky to have the park police working with the superintendent
    to have a caravan lead us out. Otherwise, we would've been stuck at Ellis Island all day, I guess maybe until the next
    morning. Watching people on the side of the road, almost like watching a parade, but we were in the parade, the traffic
    going by.
- speaker: Respondent
  text: Got home that day, that evening really. Then I really got to watch the news report and it was like, oh shit. This
    is what actually happened. I remember them showing over and over again the planes going into the towers and then I saw
    the flame which I recalled seeing earlier during the day, the towers on fire. So, I was able to make an association there.
    I think until maybe 11, 12 o'clock at night, I kept - I was lucky to be home and just thank God that I was home to be
    able to at least be with my family, still not knowing what to expect next.
- speaker: Respondent
  text: And so over and over again, I guess I was somewhat stunned watching it on TV over and over again, which allowed me
    to have a different experience watching it on TV than actually watching it live.
- speaker: Respondent
  text: And to this day, I don't know, I believe that was a good decision for me to not watch that actually happen. I just
    have a different experience. You talk to staff or individuals that do bring it up now. I have a different experience than
    they did.
- speaker: Respondent
  text: I know over the telephone talking with supervisors, my supervisors about what were the plan of action for the next
    couple of days, to make sure I stayed in touch with staff to let them - kept them apprised. So, we started working on
    different op and plans and had different angles how we wanted to approach dealing with this from the perspective of the
    staff.
- speaker: Interviewer
  text: Before we get to that, I mean that's going to be very important, could I go back over some things that you mentioned?
- speaker: Interviewer
  text: Okay, one of the themes that you have been sort of bringing up again and again is that you eased yourself into this.
    There were certain things you didn't look at, like the flames. You didn't concentrate looking at the buildings themselves,
    I'm gathering. You therefore weren't going to bother with whether there was another plane coming in or when that did happen,
    anything like that, right? You just didn't look at it.
- speaker: Respondent
  text: Well, this - both the planes had already hit the tower.
- speaker: Respondent
  text: So, it was just a matter of moments after I had actually arrived, I believe that - I can't remember recalling it,
    I think the towers went down at 9:10, 9:15. Again I'm just - it's like a matter of 20 minutes for me by the time I got
    into the office until the time that the towers actually went down. So, it's about 20, 25 minutes maybe, you know, somewhere
    in there that you just kept hearing the radio announcements. So, if your question was, I kept repeating the theme that
    I eased myself into it.
- speaker: Interviewer
  text: Well, that was - yeah. Could I get some more understanding of what you mean by that? Because that's exceedingly important
    because first of all you've mentioned that this - and track me if I'm wrong because I'm going off of a few notes and about
    what I'm listening to and I want to make sure I'm hearing things right. On the one hand it made you more effective to
    deal with what was going on. This was part of your EMS/EMT training, right?
- speaker: Interviewer
  text: And the second thing is as a result of that you got a very different experience from what other people got. Could
    I first of all go back and ask you what - how did this affect the way you operated? I mean, I think that was the first
    thing you kind of mentioned is how you operated that day that was a little different from other people, how it helped
    you or how it didn't or whatever.
- speaker: Respondent
  text: It helped me operate the rest of the day because I didn't get into a panic mode. I noticed a lot of others around
    me were extremely upset, panicking, frightened. And I just had this feeling that if I can never - I guess that's part
    of my training, like I say, working in an emergency room, that if you become panicked and unstable you can't help anyone
    else. I liken it to being on the airplane and they tell you that before you do anything else to make sure that you put
    the oxygen bag on yourself.
- speaker: Respondent
  text: So, if I can't keep myself in a stable mode, I can't help anybody else. So why I decided not to watch the towers,
    it doesn't directly correlate with me being stable for the rest of the day. I just decided not to watch that. Maybe I'm
    - subconsciously I didn't want to become as frightened and unstable by something that I didn't have any control over.
- speaker: Interviewer
  text: When you were mentioning that other people were panicking and very upset, what were they doing? What was happening?
- speaker: Respondent
  text: Crying, stunned, and just running back and forth. Like I said, I somewhat like sat back and watched where I was at
    and what I was doing and what was going on around me. Not a majority, not a lot of people were, you know, extremely upset
    and crying, but the majority of us were, you know, effectively working. But you could see that people were nervously working.
    I'll put it that way.
- speaker: Interviewer
  text: But nervously?
- speaker: Interviewer
  text: How did they indicate that kind of behavior?
- speaker: Respondent
  text: Well, if you work with individuals you know their personality. And they seemed to be more, for lack of a better word,
    I'll say erratic in terms of their running around and getting things - trying to help here and stay focused on something
    that we were all trying to help and deal with. You know, it's not something that we rehearsed. But it's something that
    here at the Statue of Liberty and Ellis Island we deal with so many different incidents and issues it was easy for us
    to handle those types of - that day - because we handle a lot of different incidents and accidents here.
- speaker: Respondent
  text: But working with some individuals, you know, that that's not their normal personality of, you know, rushing back and
    forth or sitting on the side and just looking stunned and crying or being erratic in their emotions. So that's what I
    noticed.
- speaker: Interviewer
  text: Erratic. Could you give me an example of what you mean?
- speaker: Respondent
  text: No. Other than just visually in my mind I guess erratic meaning not something that I normally notice that they're
    doing, you know, pacing back and forth or running up and down.
- speaker: Interviewer
  text: Or sitting there stunned, like you were mentioning before.
- speaker: Respondent
  text: Yeah, you know.
- speaker: Interviewer
  text: Stuff that just isn't ordinarily -
- speaker: Respondent
  text: Yeah, out of the ordinary.
- speaker: Interviewer
  text: Okay. Now thanks for bearing with me on this to dig in. I want to get a good idea of what you mean by these things.
    And my meaning of them may be one thing and yours - even just everyday words are going to be different in experiences.
    I want to make sure I get yours, not what I think they are.
