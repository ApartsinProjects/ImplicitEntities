collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: I mean as this started, I mean when you saw what was going on, what events unfolded for you?
- speaker: Respondent
  text: Like I said we were on vacation. I was with my wife and my little girl at the time, who was at the time she was 12
    months and some other family members, my brother and some good friends of ours. We had rented the house in Rehoboth Beach.
    We do this every year. And we were sort of watching the news and after the newscast, it was more of an unbelievable -
    like no, wait - this can't be happening. And then we continue watching the news and then we watched the second plane hit
    - coming in and hit. I mean it was just an unbelievable feeling. Like how can this be happening!? And then when we got
    the news of the Pentagon being hit, it was extremely disturbing because I live - my wife and I live - about a mile from
    the Pentagon. We live right over in a little border development, right near the Fort Meyer and the Pentagon. So obviously
    we were concerned with that as well, as especially the word of the fourth plane that could be headed towards the White
    House or the Capitol. Or you know, no one really knew what was happening with that. And that was concerning because within
    our operation here in the maintenance division, we do a lot of work at the White House and at times we have a number of
    employees at the White House doing maintenance work.
- speaker: Interviewer
  text: Mm-hmm. This was that day?
- speaker: Respondent
  text: That day, the 11th. Yeah. The 11th, yeah.
- speaker: Interviewer
  text: Go ahead. Go on.
- speaker: Respondent
  text: Well, basically we just stuck glued to the TV the rest of the day and didn't make it out to the beach at all that
    day. Just watching the events and obviously the newscasters and you know, trying to get some type of explanation on what
    was going on out there. So, I mean it just an unbelievable thing. And you know, being away from it all, you know, 140
    miles away, you know, I guess somewhat helped. But it was still an unbelievable sight that we were seeing on the TV.
- speaker: Interviewer
  text: Well, what happened the next day and the day after that?
- speaker: Respondent
  text: Well, basically the next couple days we would just you know, start our mornings by watching the TV and finding out
    you know, what was going on, trying to get as much information as possible from the newscasters and the reports on the
    TV. Yeah, I mean I think by being on vacation and having an opportunity to be and have the time to sit down and actually
    see the TV and to go through various newscasters, we probably got a better idea of the magnitude of things as opposed
    if you were maybe at work or didn't have the opportunity to watch things unfold. But by seeing the second plane on TV
    hit, we were able to see this whole thing unfold in front of us. So that was very upsetting.
- speaker: Interviewer
  text: Yeah, I'll bet.
- speaker: Respondent
  text: So, and then - so basically, then we returned and then I got a call Sunday afternoon on December 16th - I'm sorry
    September 16th - let me get the date right. I want to be very accurate about this. Yeah, I received a call about 4:00
    p.m. on Sunday, September 16th, from the White House and Secret Service. And what they requested is they had a load of
    what initially was fifteen to twenty of those Jersey barriers coming in because they made a decision, that day - sometime
    that day on Sunday, the 16th - that E Street needed to be closed. And that was E Street, just south of the White House,
    between 15th and 17th Street. And we do a lot of work for the White House. We support the White House. And I can tell
    you a little bit about our maintenance operation a little bit if you're interested in that.
- speaker: Interviewer
  text: Sure, yeah. If you've got anything, that would be good background of how folks were affected and things like that.
    Sure.
- speaker: Respondent
  text: But anyhow, so we do a lot of support to the White House and the Secret Service. So, I got a call. I got the initial
    call and I brought in about six of my men and we began offloading these Jersey barriers to close E Street at 17th Street
    and 15th Street. Well, the Secret Service, during that time, had - I don't know - made a decision and actually what turned
    out to be initially twenty Jersey barriers turned in to being a hundred and thirty. The decision was made during that
    evening that we would close off the entire ellipse area. So basically, what we did - we worked from about 5:00 p.m., Sunday
    afternoon to 8:00 a.m., Monday morning, straight, offloading Jersey barriers, setting them in place, blocking traffic,
    protecting all the entrance areas, that type of thing. So, it was a long day and that was directly related to 9-11, because
    even though it was five days later, I guess there was some concern about the White House in that area. So that was my
    first direct involvement coming back from my vacation to deal with that situation.
- speaker: Respondent
  text: Subsequent, we have installed Jersey barriers at the Lincoln Memorial, around the entire perimeter of the Lincoln
    Memorial and as well as the Jefferson Memorial. Those were the two areas that were I guess considered high risk for potential
    targets that they wanted to have secured. You know we've always had Jersey barriers up at the Washington Monument for
    the last couple of years and I know that's been in the news for a while, but our forces, our maintenance staff initially
    put those Jersey barriers up there. I guess it was about a year and a half ago is when we initially put those Jersey barriers
    up at the Washington Monument. And that was just in response to heightened security in the country at that time anyhow.
    We've installed a lot of snow fencing, which is a temporary type of fence in various other - the National Mall and the
    monumental core areas of downtown Washington DC and that's for more of a pedestrian control and to assist the Park Police
    with traffic control and crowd control. We've put up a lot of temporary chain link fencing also, which gives the Park
    Police a somewhat stronger barrier or a fence line for them to protect. I can't count how many miles of snow fencing and
    chain link fencing we've put up. We've probably put up ten miles of this temporary fencing.
- speaker: Interviewer
  text: Okay, you say temporary. What's eventually going to happen with it?
- speaker: Respondent
  text: I don't know. I really don't know. We were waiting on you know - we deal with the Park Police on a daily basis and
    the Secret Service and all those other entities in this area. So, what else? Our staff - just to give you a little background
    of our maintenance staff - we maintain, the Maintenance Division with the National Capital Park -Central, we have about
    260 employees.
- speaker: Interviewer
  text: Two hundred and sixty?
- speaker: Respondent
  text: Two hundred and sixty.
- speaker: Respondent
  text: 98 percent of those 260 are field related, field-oriented help. We do have administrative staff and architect engineer
    type people too. But the majority of our people are the people that are working in the field. We have carpenters, electricians,
    plumbers, masons, painters, pipe fitters, welders, sheet-metal workers; we've got people who do signs for us. I mean we
    have basically almost every trade imaginable we have in-house capability of. We also have a roads and trails crew that
    deals directly with all the roads and sidewalks and pathways. They do asphalt repair, concrete repair, catch basin work,
    that type of thing.
- speaker: Respondent
  text: Anything that deals with the roads and the road structures. We also have a grounds operation and the grounds operation
    is where we have our grounds maintenance people. We have people that mow the grass, people that pick the trash, people
    that take care of the trees, people that do the gardening, people that take care of all the flowerbeds. Basically, the
    whole gamut of grounds maintenance we handle in house too. And then we also have a branch of transportation and these
    are where our mechanics are that fix the vehicles. We have operators that run the machinery. We have specialized mechanics
    that deal with just Park Police vehicles, cruisers and motorcycles. So, it's a large work force and we do a lot of stuff.
- speaker: Respondent
  text: We have a lot of responsibility. We basically maintain National Capitol Park-Central, which consists of the National
    Mall, the monumental core; we have 153 reservations that we maintain and a reservation being a large as the National Mall
    to as small as a little triangle piece of park land up at Florida Avenue and 14th Street, or something like that. So,
    we have a big boundary line. Essentially our boundary line goes, if you start at the west side of the Capital and go north
    on First Street all the way to Florida Avenue and then Florida Avenue, that's around - and Florida Avenue kind of loops
    around - and comes back down to 23rd, 26th Street, somewhere right around there. And then we follow that all the way down
    to the Kennedy Center and then from the Kennedy Center we pick up West Potomac Park, East Potomac Park, and then we have
    some property right over here at Main Avenue and Southwest Waterfront, back to the Capital. So, it's a huge area that
    we maintain. And like I said, we have 153 reservations in that area like a Scott Circle, or a Thomas Circle, or a Washington
    Circle; it's all park land that we maintain.
- speaker: Respondent
  text: Yeah. Your building is in our park.
- speaker: Respondent
  text: Yeah. We maintain Union Station.
- speaker: Interviewer
  text: That's right. Sure, sure.
- speaker: Respondent
  text: 'We maintain - we''re going to maintain the new Japanese American Memorial. Have you had a chance to take a look at
    that yet? Yeah, that''s right at Louisiana Avenue and New Jersey Avenue. Right down the street from you: Fourth Street.'
- speaker: Interviewer
  text: Yeah, yeah.
