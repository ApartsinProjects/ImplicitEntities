collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe just to start, if you would tell me a little bit about what your role is here with the Park Police?
- speaker: Respondent
  text: I have a rather unique role in the aviation unit because I'm one of two members who are not trained as a pilot and
    not trained as a paramedic. That's the station commander, Lieutenant Cholak and myself. We're the only two persons who
    aren't pilots or trained paramedics. My role, I'm the assistant commander and I assist the commander in his duties and
    when he's not here, I fill in as the commander of the unit.
- speaker: Interviewer
  text: So, what does that involve? Tell me a little bit about it.
- speaker: Respondent
  text: It involves mostly administrative stuff, making decisions when you need a commander to make a decision. All of the
    paperwork that comes out of this unit usually passes either my desk or the Lieutenant's desk before it leaves the unit
    and goes elsewhere.
- speaker: Interviewer
  text: So that includes staffing assignments?
- speaker: Respondent
  text: It does include staffing assignments, that's correct. It includes keeping an eye out on the budget, procurement of
    property and services, just your usual administrative stuff. I guess you could classify that as typical.
- speaker: Interviewer
  text: Okay. Well, let's go to September 11 and maybe if you would just begin by telling me how you first learned of the
    terrorist attacks, where you were, what you were doing, that kind of thing?
- speaker: Respondent
  text: It's very strange. I do recall on that particular morning I was in our electric golf cart, and I was driving out to
    where our fuel trucks were, which is located about maybe 75 yards from our hangar. And I noticed, well, I was checking
    the amount of fuel in one of the fuel trucks and there was a radio on the golf cart. I remember hearing something about
    the World Trade Center, the plane striking the World Trade Center. So, I came back in and most of the crews were out cleaning
    the hangar area, the deck area, they were getting it cleaned up. And I remember saying something about the World Trade
    Center getting struck by a plane.
- speaker: Respondent
  text: Well, we all came inside, and we put the TV on to see what was going on. And as they were talking about a plane, the
    news media were talking about a plane striking the World Trade Center, I would say within about five minutes of us initially
    starting to watch this program, that's when the second plane hit the World Trade Center. And I do recall when that struck,
    then we had a conversation amongst ourselves that more than likely this was some type of attack not just a plane going
    off course and accidentally hitting the Trade Center.
- speaker: Respondent
  text: I remember some of us were saying, "Gee, we should get ready," because this is the prime area of Washington, D.C.
    for an attack. I don't know why; I just had this feeling that something was going to happen in this area. It couldn't
    have been 20-30 minutes after that, is when we got our first indication that there was an incident at the Pentagon.
- speaker: Interviewer
  text: Did that come over the radio?
- speaker: Respondent
  text: I heard it over our police radio. It sounded like some officers were stating that they thought they'd seen an airplane
    go down within the area of the Pentagon. As soon as we heard that, we immediately were running out to the two aircraft
    that we had sitting that were operational at the time. As we went out there, one of the officers apparently received a
    phone call from our crash phone line from the Reagan tower telling us that an aircraft had gone down in the area of the
    Pentagon.
- speaker: Interviewer
  text: What's a crash phone line?
- speaker: Respondent
  text: We have a direct line to the Reagan traffic control tower, so if there's ever a plane in distress, any incidents over
    at the airport, we can lift, and we'll be over there in a very short period of time.
- speaker: Respondent
  text: Well, as soon as we heard that there was in fact a crash over at the Pentagon, one of the other officers, and I'm
    not sure who it was, received a message. I'm not sure where it came from, whether it was the fire department at the Pentagon,
    the tower, but I remember hearing something about there were multiple casualties, something in the number of maybe 15
    seriously injured people who had to be evacuated, MEDEVAC'D right away.
- speaker: Respondent
  text: The crew from Eagle One, which was consisting of I believe Ron Galey, John Marsh, and John Dillon, immediately launched
    Eagle One, which is a Bell 412 helicopter. The rest of us were getting Eagle Two ready, which is the same type of helicopter,
    but we were installing a mass casualty kit which would afford us the opportunity of transporting four injured persons
    rather than the normal two.
- speaker: Respondent
  text: Eventually, we lifted and went over to the Pentagon. We were probably about, I'm going to just take a guess, maybe
    about 3-5 minutes getting off the ground after Eagle One had left, so they were there first. Even before we lifted you
    could look from out on our flight line area you could see the heavy smoke coming from towards the Pentagon. You can't
    see the Pentagon from here, but you could certainly see the directions. So, Eagle One had informed us that in fact there
    was an area of destruction at the Pentagon. They had not landed by the time we left. As we were en route over there, I
    believe we were going to be the first MEDEVAC helicopter and Eagle One was going to stay airborne to keep control of the
    airways.
- speaker: Respondent
  text: Shortly after we arrived and we landed, several of the occupants in our helicopter had taken some medical equipment
    and ran towards the building.
- speaker: Interviewer
  text: Who else was in your helicopter?
- speaker: Respondent
  text: In our helicopter, I hope my memory is good. The pilot of our helicopter was Sergeant Keith Bohn. We had a Sergeant
    Ken Burchell, Lieutenant Philip Cholak, who's the station commander, was in there. And then I believe we had either one
    or two medical personnel from a group called USUHS. Have you been explained what they are?
- speaker: Interviewer
  text: Well, no, but not the acronym. What does the acronym stand for?
- speaker: Respondent
  text: Well, that's an excellent question. It has something - they're military doctors or medical people. It's a university,
    Army university hospital medical training facility. I'm not…
- speaker: Respondent
  text: You'd have to ask Ken Burchell.
- speaker: Interviewer
  text: So, you obviously, it was not your typical crew?
- speaker: Respondent
  text: Not at all. We had, our typical crews are either a two or three-person crew. In this particular case, we had six people
    in this. So once we got over there, I remember, I believe it was Ken Burchell and Lieutenant Cholak, they had exited the
    aircraft with the two medical personnel that we have and they went over to the area where you could see the smoke and
    the damage.
- speaker: Respondent
  text: I stayed with the aircraft. I stayed outside of the aircraft. My responsibility during that particular moment was
    to secure the landing zone and to protect the aircraft from people, vehicles, or anything else that jeopardized that aircraft.
    At some point in time, I remember hearing the tower over at Ronald Reagan Airport calling Eagle One, which was still airborne
    over top of us, and telling Eagle One that the tower personnel are evacuating the tower because the smoke from this incident,
    the wind was carrying it over towards the tower and somehow it was getting into their, you could hear them when they were
    talking, kind of coughing and choking a little bit. So, they had to abandon the tower and they turned the control of the
    Reagan Airport air space over to Eagle One. Fortunately, a short time after that, all air traffic was diverted from the
    Washington area, so it didn't place a great burden on Eagle One as far as controlling all of the commercial aircraft.
- speaker: Respondent
  text: While we were on the ground, I can remember two patients being brought over to our aircraft and they were both loaded
    into the aircraft, which was Eagle Two. Eagle Two eventually left and transported the two patients to MEDSTAR, which is
    over at the Washington Hospital Center. Eagle One came down and landed, getting ready to transport whatever patients they
    needed to transport. And as they were sitting there, I remember there was another radio transmission that there was an
    unidentified, I'm not sure if I know the exact words, unidentified and unauthorized aircraft that was headed towards the
    Pentagon, which was about forty miles out. And of course, having great knowledge of what happened over at the World Trade
    Center, I think there was a lot of concern for, here comes a second aircraft coming over.
- speaker: Respondent
  text: So, Eagle One left that area and repositioned to a safe area. Unfortunately, they left me. So, I was still securing
    the landing zone. And fortunately, there was no, aircraft that was the supposed to be unidentified and unauthorized apparently
    was a friendly aircraft. It didn't pose any threat to us. But we kept that area clear, and a short time after that, I
    recall hearing that there were no other persons needing to be air MEDEVAC'D out of there. That all of the people that
    needed to be MEDEVAC'D were going to be taken in ambulances. And the only thing that we could assume is being as a possible
    threat from another aircraft, rather than keeping the patients there at the scene and getting them into the aircraft,
    they just wanted to get them out of there as quickly as possible.
- speaker: Interviewer
  text: So, describe the scene when you arrived?
- speaker: Respondent
  text: Well, when we first got there and we first set down, I'm not sure, I'm going to say timeline after the initial impact
    of the aircraft, I would say it was no longer than 15 minutes when we got there, probably within 10-15 minutes, I would
    think. What I recall most about the scene was right at the initial impact area - it didn't look that bad as far as what
    you would now see after everything caved in. I mean the walls hadn't caved in. And we were kind of looking like, gee,
    what kind of aircraft could do this, thinking maybe it was a small commuter aircraft or something. There was a great deal
    of smoke and a lot of fire. And there were a lot of people coming from the building out towards where our aircraft was,
    to I guess cross the road to get into a safe area. That was one of our big concerns. One of my responsibilities was to
    make sure nobody came close to the aircraft.
- speaker: Interviewer
  text: And describe to me again exactly where you had landed?
- speaker: Respondent
  text: I don't know the names of the roads. We landed on a roadway surface. I'm thinking it was just southwest of the Pentagon
    and we were probably about 150 yards, maybe 200 yards, from the building, itself, and we were right adjacent to the impact
    area.
- speaker: Interviewer
  text: Maybe on [Highway] 110 there?
- speaker: Respondent
  text: That's what I heard some of the people say, 110. And they're much more familiar with Virginia than I am.
- speaker: Interviewer
  text: So, were there any particular challenges in responding from your perspective?
- speaker: Respondent
  text: From my perspective, not at all. And one other thing, the people and I would there were hundreds of people that were
    leaving from the Pentagon, coming towards the helicopter, most of them were a safe distance away. But there were some
    that were coming, if nobody was there to stop them would have come quite close. And our major concern is the tail rotor
    on the aircraft. It's probably the number one hazard area on helicopters. Fortunately, our helicopter sits on skids. It's
    a fairly large helicopter. The rotor blades are usually high enough where they wouldn't come into contact with a person.
    But the tail rotor, very possible that could come into contact with someone.
- speaker: Respondent
  text: Most of the people were a safe enough distance away. Most of them looked to me like they were, had all of their faculties
    working for them. There were a few people that were in somewhat of a daze that I had to basically stand there and ask
    them to go back a little farther down that way. But other than that, to me, the thing that I recall and impressed me a
    lot is that everybody was going about their business. It wasn't like panic city. It wasn't like maybe what you'd see in
    the movies. Everybody was pretty much focusing on the job.
- speaker: Interviewer
  text: So how did this compare to some of the other responses you've been involved in?
- speaker: Respondent
  text: Well, from the responses that I've been involved in, from our standpoint, I guess we do enough training. Everybody
    just went out, got in. It's almost like we're creatures of habit. Unfortunately, sometimes that's good, sometimes that's
    bad. But in our line of work, law enforcement work, I think it's good because you don't have enough time to think. You
    just grab, get in, put things together, and off you go.
- speaker: Interviewer
  text: Right. Is there anything that you would have done differently? Is there anything that you learned from this operation
    that you'd maybe apply to another emergency in the future?
- speaker: Respondent
  text: I can't see any way we could have improved what we did. Fortunately, or unfortunately, once we got there, we were
    really prepared to transport as many people as needed. Plus, I was prepared to do whatever they wanted me to do. Of course,
    it's easy to say now, but I thoroughly had the thoughts when I was heading over there that I was going to be running into
    the building trying to pull some people out. But it just didn't happen to be that
