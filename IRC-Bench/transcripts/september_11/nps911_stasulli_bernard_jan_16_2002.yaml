collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: The first major question - the first question is from the moment you became aware of what was going on, what happened?
- speaker: Respondent
  text: Let me kind of stress from the beginning.
- speaker: Respondent
  text: We were outside. We had two crews. We were doing some work inside the hangar when we heard one of the World Trade
    Center Towers had been struck. So, when we heard that, we came in to watch it on the TV. We were sitting watching the
    TV. We could see the smoke coming from the first World Trade Center building. At that point nobody knew actually what
    had happened other than that the aircraft struck the World Trade Center. As we were watching that, a second aircraft that
    we could actually see live on TV, ended up striking the second World Trade Center. At that point, there were probably
    about four or five of us inside watching it on our large screen TV and we all looked at each other and said it certainly
    isn't an accident. It certainly looks like probably a terrorist attack.
- speaker: Respondent
  text: With that, we all looked at each other and basically everybody had the same thought. If they struck some place up
    in New York, boy D.C. would be a perfect place to hit next. So, with that in mind, we went back out and started getting
    our aircraft ready, not so much knowing that there would be an attack but just with the thought that possibly something
    would happen here in the city. And, shortly after that we heard like a slight boom noise, like an explosion of some sort.
    Then we got a call. We have some direct lines. We called a crash line to Reagan Tower which comes through directly to
    one of our lines in our telephones and it has a specific tone to it. Unlike a regular sound of a telephone ringing, it's
    got like an alarm sound to it. And it was the Reagan Tower asking us if we could fly over, they had a report of a plane
    - possible plane going down in the area of the Pentagon. We had two helicopters sitting outside. The first helicopter
    was Eagle One. That's the name of the helicopter. He immediately launched that aircraft and started toward the Pentagon.
- speaker: Respondent
  text: At this point where we were outside, you can't see the Pentagon from here, but we were looking in the general direction
    of the Pentagon and you could see a lot of black smoke throughout the sky over there. So, we figured something definitely
    went down in that direction. When that aircraft launched, as soon as they got airborne, we were trying to get our second
    aircraft equipped with what is called a mass casualty kit, which gives us the benefit of transporting four patients rather
    than two.
- speaker: Respondent
  text: Normal configuration on our aircraft is set up to transport two patients. With this kit, you can transport four. So,
    with our thinking that an aircraft that's going down, we were getting ready to transport more than the normal. More than
    what we would normally do. As we were hooking that kit up, Eagle One radioed back to us that they had just been informed,
    I believe it was Arlington County Fire Department, that they had, I believe it was eleven severely burned patients that
    needed to be air-vacced immediately. So, we were ready. We launched. We arrived to the Pentagon, I'm going to say, within
    ten minutes from the time when the Pentagon was struck. Our first helicopter arrived approximately five minutes after
    the actual act of the aircraft hitting the Pentagon. First aircraft, Eagle One, they stayed up in the air. They were,
    um, checking the entire Pentagon. The entire area they were controlling the air and we were advised to land and to start
    the evacuation of whatever patients needed to be evacuated. When I say we, I - the second aircraft was Eagle Two.
- speaker: Respondent
  text: Eagle One had a crew of three. We had one pilot and two rescue technicians in Eagle One. Eagle Two, the one that I
    was in, had two pilots. They had myself and they had the commander of the unit. And we also had two medical people from,
    I'm not quite sure, they're the uniform - let me see - they're the Uniform Services University and Health Sciences. They're
    military health people. So, we had six people in our helicopter. When we landed, it was quite a scene. There was quite
    a bit of smoke coming from the building.
- speaker: Respondent
  text: We landed, I'm going to say, approximately 150 yards from the actual impact area of the Pentagon. And, there was,
    as I stated, there was quite a bit of smoke coming from the building. There were people all over the area. There were
    a lot of people leaving the Pentagon, walking away from the Pentagon. Several people rushing towards the Pentagon. It
    looked like a controlled chaos than anything else. They weren't - the people weren't just uncontrollably. I was very impressed
    at the way the people were even handling themselves. As soon as we landed, we tried to make contact with the medical services
    people that were on the scene. Number one, to let them know that we were ready to transport anybody that they had ready.
    And, also to find out if there's any assistance that we could provide with rescuing any of the people. Shortly after we
    landed, two or three of the officers from my helicopter grabbed some backboards and started approaching the building itself.
- speaker: Respondent
  text: My responsibility at that time was to secure the landing zone and to prevent anybody from getting close to the aircraft.
    One of our danger areas is the tail of the aircraft where there's a rotor blade that's spinning and if you're not watching,
    what you can do you can possibly walk into the rotor and you're probably not going to survive that. So, that was my whole
    responsibility there. We were on the ground it seemed like a little bit more than five minutes, five to seven minutes.
    To me that's what it seemed like when our people came back and they brought, not our people but some of the rescue people,
    brought two patients out. They were severely burned patients.
- speaker: Respondent
  text: We were able to load them in the aircraft. We were waiting for more patients. We were able to take four, but they
    told us to get out of there. Get these out right immediately, these two that needed to be transported. So, the aircraft
    left and transported these two patients to the Washington - we call it the Washington Hospital Center - is where they
    took them to. It's called Med Star is a short term that we use. It's their trauma unit. I remained on the scene to secure
    the area. Our second aircraft landed and was standing by to transport any other patients that needed to be transported.
- speaker: Interviewer
  text: Was this Eagle One or?
- speaker: Respondent
  text: Eagle One, yeah. Eagle Two was the one I was in. They had left to make the transport.
- speaker: Respondent
  text: While Eagle One - as we sat there waiting for more victims to be brought to us, Eagle One had made several notifications.
    They had called several different other aviation units to respond who were able equipped to do the Medivacs. I don't know
    if you're interested.
- speaker: Interviewer
  text: Keep going. This is all important. Keep going.
- speaker: Respondent
  text: I know Med Star was contacted. They have - it's a private company that works out of the hospital. We requested their
    air ambulance to respond. Fairfax County Police, they do Medivacs. We were requested to respond and the Mountain State
    Police. The rest of these units we work quite well with and we are very aware of their capabilities. They were all requested
    to bring their aircraft out. We also requested for the D.C. Police Department to bring their aircraft to take control
    of the air. Currently Eagle One was controlling the air but they felt that they would best be needed to do the medivacs.
    When they landed, we had already called the D.C. police to send their helicopter so they could control the airways.
- speaker: Respondent
  text: A unique thing happened prior to Eagle One landing, the Reagan Tower had come over the radio and advised Eagle One,
    being as we were the only aircraft in the area at that time, that they were evacuating the tower due to the smoke from
    the Pentagon was actually being blown into their air system and they had to evacuate the tower. Of course, they couldn't
    breathe or see too well due to the smoke coming from the Pentagon. And, basically, they said that they were turning over
    the control of the Washington Metropolitan area to Eagle One, which was in 30 years I've never heard that. But that's
    a - that was very unique.
- speaker: Respondent
  text: Fortunately, though, I think as that was happening, all aircraft were ordered to land somewhere at the closest airport
    and to stay away from Washington D.C. area. I don't think it created the big problem that originally, we thought it would
    be where our helicopter was controlling all the commercial aircraft. So, I had Eagle Two at the hospital. Eagle One lands.
    Shortly after they had arrived on the scene - I slow down for you.
- speaker: Respondent
  text: After they had arrived on the scene, the tower came back and advised us that - they wanted us to get out of the area
    as they had an unidentified unauthorized aircraft that was approximately four miles out headed toward the Pentagon. Our
    first thought was, oh, here comes the second plane. And, after just watching two planes hit the World Trade Center, we
    thought maybe they're sending a second plane coming toward the Pentagon. Eagle One, after sitting there for about ten
    minutes or more, no other patients being brought out to us and there was no indication that any other patients were going
    to be brought to us, they finally made a decision to move the aircraft to a safer or to relocate out of the, I guess,
    the hit zone of the Pentagon. So, they repositioned themselves to a field maybe a quarter mile away from the Pentagon.
- speaker: Interviewer
  text: This is Eagle One?
- speaker: Respondent
  text: Eagle One. Eagle Two still at the hospital.
- speaker: Interviewer
  text: I was going to say they were at the hospital center.
- speaker: Respondent
  text: Eagle Two was coming back, just prior to Eagle Two leaving the hospital, the Reagan Tower people did inform us that
    the first plane turned out to be a friendly plane - to disregard their earlier radio transmission. After Eagle Two left
    the hospital and was coming back to the area, Reagan Tower advised us that the second plane that was unauthorized unidentified
    that was heading toward the Washington D.C. area, we can only assume that it was the plane that went down in the Pittsburgh,
    Pennsylvania area.
- speaker: Respondent
  text: They told us it was about 100 and some miles, 150 miles, out but it was headed toward Washington D.C. in the restricted
    air space.
- speaker: Respondent
  text: Eagle Two came. They landed over by Eagle One. By then other helicopters, military helicopters, had arrived on the
    scene. There were quite a few aircraft, especially military aircraft, that had come into the military area at this time.
    Once it was determined that we wouldn't be needed for any more medical transports, we just - we remained in the area for
    a short period of time and eventually we ended up getting out of the area. We came back later at the request of the FBI
    and the Department of Defense and we did quite a bit of flying over the Pentagon. We have a downlink system on the helicopter,
    which provides live time video to the ground units. Much like a I guess in the morning you see a live -
- speaker: Respondent
  text: News something, right. Only their equipment costs about $100 and something thousand. Ours is only about $30,000 so
    they have a much nicer picture than ours quality wise. But we're still one of the few helicopters in the area that can
    provide this. And, that's pretty much what we did for the remainder of the day. We flew quite a few missions for the FBI
    and the Department of Defense. Everybody was like, "I wish I could do some photo shoots for the Pentagon and monitor where
    the damage was" because you could see from the air. It's certainly a much better vantage point looking at the damage and
    the intrusion - where the aircraft that hit - from the air than you could from the ground. It was strange - when we first
    got to the ground, the damage didn't look that severe when we first got there. Shortly after we were there, then the walls
    starting caving in. When we first got there, we were wondering, "What kind of aircraft could have hit this?" because you
    couldn't see much of an impact. You just see a lot of scorching, a lot of fire and smoke and just a slight hole through
    - a crack through the wall of the Pentagon. But after we were there and then the walls starting caving in, you could see
    it pretty good - a pretty good amount of damage to the Pentagon.
- speaker: Respondent
  text: I'm trying to think what else I can add. Eventually, the D.C. Police Department did get their aircraft out there and
    they took over the controlling the airways for us as we felt we would be used better to do the transports for any patients.
    But we only ended up transporting two patients by helicopter and sometime after that we come to find out that the reason
    was - normally the serious patients, they try to triage them and get them stable and then transport them out.
- speaker: Respondent
  text: But when they got the call of this other aircraft coming, they were just throwing these people in any vehicle that
    they could to get them out of there. Because everybody felt there was a second aircraft coming so even the rescue people
    were trying to get the patients out of there as quickly as possible. Something that maybe under normal conditions they
    might not ordinarily do. They would leave them at the scene and stabilize them.
- speaker: Interviewer
  text: How many people do you estimate were - you had estimated earlier that there were a lot of burn victims. How many do
    you think there probably were?
- speaker: Respondent
  text: Personally, I couldn't
