collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: As soon as you were aware of what happened - that something had occurred, what happened, and what did you do and these
    kinds of things? Basically, what happened?
- speaker: Respondent
  text: Well, I was on the phone in the morning taking school reservations over the phone with a teacher, and that's what
    I do. And the secretary of interpretation, her name is Joan Kelly, was trying to get my attention on the phone - trying
    to get my attention like flag me down that she wanted to say something. So, I saw her that she ran out of the office and
    ran back in.
- speaker: Respondent
  text: And I saw that she sat down and after I got off the phone, I asked her what was going on. And she said that there
    was a fire in the World Trade. And I asked - she said something about a plane hit the top of the tower. And I said, well,
    we can see the view from the fuel dock - we call the fuel dock on the back side of the island - that's where we get our
    fuel from and that's why we call it the fuel dock. And I asked her if she would accompany me because I wanted to see it.
    I wanted to see what had happened. And she said, oh, I just came from there but okay. She walked me out there. I didn't
    want to go by myself.
- speaker: Respondent
  text: And I was looking at the tower, at the fire being from the first tower that hit. And right as we were out there in
    the fuel dock we heard - we heard the noise of - of an engine. It was the second plane - was coming toward our direction.
    And at that point I was confused. I didn't know if it was coming to help the fire, rescue people that were on top of the
    fire. I was confused because it was coming at full speed ahead and it was right below our heads.
- speaker: Respondent
  text: And then I saw as the plane went around the tower and it looked like it just exploded inside the second tower. And
    that's when it hit - I think everyone - that something was wrong and that what had just happened was not an accident,
    it was something that was deliberately attacking us.
- speaker: Respondent
  text: So, at that point everyone was running back and forth. They didn't know where to run. And it was chaos because we
    never had - like, we didn't know what to do. We didn't have - in the island there was no island evacuation system or anything
    - what else we can do was just listen to the radio. And listen to the directions that we had to do. So, at that point
    everyone was calling their loved ones on cell phones if they can reach them, or phones.
- speaker: Respondent
  text: And we heard on the radio that we needed to meet at the wall of honor, which was on the other side of the island.
    And we all ran to that side.
- speaker: Interviewer
  text: You ran from where?
- speaker: Respondent
  text: From our office, meaning leaving the building, because at that point everyone felt funny about being inside closed
    - being inside a building. Especially Ellis Island, which was close to the attack, and we never knew what was going on.
    And so, we just wanted to try to be safe as possible.
- speaker: Respondent
  text: So, we went to the - to the wall of honor on the other side of the island and all the whole staff was just there waiting
    to see what was next. And then from there we just waited, and we waited, and then we saw a steamboat coming towards us
    and that's when we thought, oh no, it's our turn. So, we all ran to the other side of the - the island, but it was - then
    we was told from us that it was NYPD trying to - I think it was harbor, I don't know. It was some - all we knew was it
    was an okay boat. But when we saw it coming towards us, we thought it was, you know, it was our turn. So, it was kind
    of frightening that day which I - since I don't want to think about because, you know, it brings back nightmares and things.
    And having to be in the island was, you know, scary enough.
- speaker: Respondent
  text: And then also trying to leave the island was also chaotic because we didn't have no - no ways of going home. I mean,
    there was a boat full of people from Liberty Island trying to get us to New York and I saw New York was just like a cloud
    full of smoke. Nobody wanted to go to New York.
- speaker: Interviewer
  text: Okay, well, you were saying that you had been waiting on the - on the - over by the wall.
- speaker: Interviewer
  text: And then this boat came charging toward you and you all got over to the other side of the island, where on the other
    side of the island?
- speaker: Respondent
  text: From Ellis Island all the way to - I guess towards the parking lot.
- speaker: Respondent
  text: So, it was the opposite side.
- speaker: Interviewer
  text: Okay, then you later learned that it was an NYPD boat. When did you learn that?
- speaker: Respondent
  text: Yes. One of our colleagues, his name is Vinny, he was there, and I think he had mentioned that it was an okay boat
    - it was NYPD.
- speaker: Respondent
  text: Because they didn't have any - usually they have a sign. It was just a boat, you know, a steamboat.
- speaker: Interviewer
  text: Okay, then you were mentioning a boat full of people. Tell me -
- speaker: Respondent
  text: Yeah, right after that they evacuated Liberty Island, meaning everyone that was there were taken to Ellis - well,
    not taken, they just went to Ellis to pick up more staff. They couldn't pick up - they couldn't take us - as many people
    that wanted to go to New York, but it was sad because there was so many people on Liberty Four. And I'm pretty sure they
    over went their maximum - the amount of people they are supposed to have the boat. And they were going to take other people
    to New York. And that's when I think - I just thought that was like, there's no way I'm going to get on that little boat,
    all those people. And I'm going to go to Battery Park knowing that there's an attack and there's probably people running
    all over the place and the smoke. And then right after the boat left -
- speaker: Interviewer
  text: With you on it or you not - definitely not on it?
- speaker: Respondent
  text: No, I didn't go on the boat.
- speaker: Interviewer
  text: Yeah, so after the boat left, then what?
- speaker: Respondent
  text: And I think after a couple of minutes I heard screaming. I wasn't on the wall of honor side where you can see the
    towers. I was on the other side because that's where we had ran because of the steamboat. I heard a lot of screaming and
    that's when they were saying that the second tower had fallen down. And I didn't want to see that. And a lot of people
    were screaming and yelling and looking and running. And I went to the other side of the island and then I - I didn't want
    to see that.
- speaker: Interviewer
  text: Back toward the parking lot you mean?
- speaker: Respondent
  text: Yes, back toward the parking lot. And then there were - then they wanted to move vehicles from one side to the other.
    So, I went with a friend of mine so she can move - help move the vehicles. And that's when I saw the second tower fall.
    That's when I actually saw the second one collapse. I didn't want to see it, but it was just there. I was at the fuel
    dock moving the cars from Post Three to the B and D building which was right next to the fuel dock where you have the
    best view of New York City from that side. And that's when I witnessed the other tower fall. And it was just - it was
    just too emotional. It was sad. It was - you had a lot of feelings going, you know, running through your mind and having
    people talking about the Pentagon had just gotten hit. And we were like, what are we doing here? We want to - you know,
    everyone wanted to go home, but all the bridges and tunnels were closed by then. And no one wanted to go to Manhattan.
    And you were basically stuck on Ellis Island.
- speaker: Interviewer
  text: All right, so you had gone over to move the vehicles, which you did do?
- speaker: Interviewer
  text: I mean, you got them - and you moved them to the other side of the island.
- speaker: Respondent
  text: Yes, well, we moved them from the parking lot to the B and D building - in front of the B and D - so that's not really
    the other side. That's just like giving people more access to when they come off the bridge - just giving them an empty
    space.
- speaker: Interviewer
  text: Okay. And you didn't want to see it, but you couldn't avoid seeing that part of it.
- speaker: Respondent
  text: Yeah, I couldn't, no.
- speaker: Interviewer
  text: And then at the same time you were getting news that the Pentagon had been hit.
- speaker: Interviewer
  text: And the idea was being sunk in that you were stuck on this island and you certainly didn't want to go over to Battery
    Park.
- speaker: Interviewer
  text: It wasn't going to be any better there.
- speaker: Interviewer
  text: And so, you figured you were stuck on the island. About what time was this?
- speaker: Respondent
  text: Well, I don't remember. I mean, time -
- speaker: Interviewer
  text: Well, that's okay.
- speaker: Respondent
  text: '- that day you couldn''t really much look at your watch.'
- speaker: Interviewer
  text: I understand. I understand.
- speaker: Respondent
  text: But I don't remember exactly. I mean it was -
- speaker: Interviewer
  text: Everybody is in the same situation.
- speaker: Respondent
  text: '- in the afternoon.'
- speaker: Interviewer
  text: The reason I simply ask is that some people remember one time, some remember another, and I just sort of piece the
    puzzles together that way.
- speaker: Respondent
  text: Yeah. I don't remember that time.
- speaker: Interviewer
  text: And it was you were still - and this was a still highly emotional time, right?
- speaker: Interviewer
  text: What happened then?
- speaker: Respondent
  text: Well, then they were bringing in everybody from - I guess from the New Jersey troopers and emergency service were
    conducting a triage - they were trying to get a triage here at Ellis Island. So that's when I guess most of my colleagues
    felt that if we can't do anything and we're stuck here we might as well try to help out what we can.
- speaker: Respondent
  text: So, we decided - everyone was putting on gloves and getting medical equipment because they said they were going to
    try to bring people from the other side here to help like build a triage. So, we all tried to put on gloves and to put
    on medical equipment, but then our superintendent advised us that she just wanted us - if we didn't have proper training
    to do first response, we might as well just go home. She didn't - she felt that we should have just - you know, we should
    just go home. So certain people that had that training were allowed to stay, but then the others were told that they had
    to go home.
- speaker: Respondent
  text: But we - like, me, I didn't want to go home - like, there was no way for me to go home, I mean.
- speaker: Interviewer
  text: So, you stayed anyhow?
- speaker: Respondent
  text: Yeah, I stayed because she was saying that you had to go, but there was - then I heard that there was a boat that
    took you to Brooklyn, but I've never - I guess I was late, I got the information late. I didn't get on that boat either.
    But I heard some other people got off the island via that boat that took you from Ellis Island, I do believe to Floyd
    Bennett Field in Brooklyn. I heard about that, but I was in - I guess I didn't - I wasn't told about it, or I was told
    later. But I was still stuck on the island and I had no way of going home.
- speaker: Interviewer
  text: What happened then?
- speaker: Respondent
  text: Then I - although they were bringing people in - some of them were hurt, others were okay. And that's when I was given
    the job of taking people's - well, they were giving me a pad and I was putting information about the people coming in.
    A lot of people were very emotional, crying, upset. And I was told that I was supposed to get their names, their social
    security, their date of birth, their next kin. And I was doing that, but then they wanted me to do other things.
- speaker: Respondent
  text: So, I put - I helped put up a database and I inputted mostly everybody's name that came through Ellis Island from
    New York that were hurt or near the towers.
- speaker: Respondent
  text: I did this database and that took me a while. It took me like an hour or so - an hour or two to type up all the names
    and their social security and their next kin. And then I heard the NYPD wanted the - the stats on that, and so did New
    York park police - I mean United States Park Police wanted that information. And I did that - I believe for the remaining
    of the afternoon.
- speaker: Respondent
  text: I think they also gave us lunch. And by the time I think I left the island it was like 6 o'clock. And I had a ride
    to a friend's house. And I stayed there until it was okay to go home, I guess. I think on Staten Island, Verrazano was
    opening up and we were able to go back to Brooklyn from Jersey City.
- speaker: Interviewer
  text: So, you left about 6 o'clock - went to a friend's house and then managed to get home to Brooklyn you said?
- speaker: Respondent
  text: Yes, from Brooklyn.
- speaker: Interviewer
  text: Well, backing up for just a minute on the database. How did you put it together?
- speaker: Respondent
  text: Well, I got help from the computer specialist here at Ellis Island. Her name is Jane and she was the one that programmed
    it with her knowledge. And I got all the sheets from everyone that was outside getting the information. I mean, it was
    lots of sheets. It was -
- speaker: Interviewer
  text: About how many records do you think by chance?
- speaker: Respondent
  text: I don't remember, but there - it was a lot.
- speaker: Interviewer
  text: Okay. Because some people are estimating there was as many as 2,000 people there that day. Do you figure that there
    was that many?
- speaker: Respondent
  text: Yeah, I am. But I think that's how many names I put in the computer. I mean, I'm pretty sure there were that amount
    and if I didn't get that information was because we started it late. We started getting information from the people not
    as soon as they got - it was something that was - it was really something that we weren't prepared for and people just
    thought of things and did it as it went.
- speaker: Respondent
  text: So, I'm pretty sure I didn't get all of the 2,000, but I did get a lo
