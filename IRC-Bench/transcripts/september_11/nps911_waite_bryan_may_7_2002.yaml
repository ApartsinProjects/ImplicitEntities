collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: What your role is here with the U.S. Park Police.
- speaker: Respondent
  text: I'm a field commander in charge of a shift, 10-hour shift, for all patrol activities during that time period. I supervise,
    basically, three sergeants at the time, and the sergeants supervise officers on patrol, two marine, two horse mounted
    patrol.
- speaker: Interviewer
  text: How did you first learn about the attack on the Trade Center?
- speaker: Respondent
  text: From a radio station, an FM radio station had reported that there was a fire at one of the twin towers. Report that
    a plane had hit it. And basically, just listened further and further and found that units had observed the smoke and had
    observed the collision and got everybody into gear. Most of the Staten Island people went to the Statue of Liberty to
    secure Ellis Island and Liberty Island locations. We closed down the Fort Wadsworth area and Parks in Staten Island, and
    secured Floyd Bennett Field proper. And basically, all of the marine units responded over to Ellis Island and Statue of
    Liberty Island, to help triage and bring patients from the North Cove Marina at Manhattan Island to Ellis to be transported
    to the Jersey City Medical Center.
- speaker: Interviewer
  text: So, you just drove immediately to Ellis Island?
- speaker: Respondent
  text: I drove, I was out on Highland Boulevard when I heard on the radio. I drove back to my office over here to Fort Wadsworth.
    And then we found out that, yes, all of the units had been responding to various locations.
- speaker: Interviewer
  text: Well how did, well then you had to contact your -
- speaker: Respondent
  text: I contacted my supervisors and we found out that the staff, those over here, had moved basically to Ellis Island.
- speaker: Interviewer
  text: No, but I mean then did you then contact your officers, the ones you supervise?
- speaker: Respondent
  text: Yes, I responded here, and I took care of the Staten Island operation. Basically, it was determined through the command
    staff that Lieutenant Wall would take care of the Brooklyn District, I would take care of the Staten Island District,
    and Lieutenant Buckley, Sergeant Everett Campo from here and Captain Lauro would respond to take care of activities at
    Ellis Island. So, we kind of set up three separate entities, instead of having like one operation, we had three separate
    worksites under a lockdown mode.
- speaker: Interviewer
  text: I didn't realize that. What were some of the things going through your mind, things that you know, gee, this has to
    be done and this has to be done. What were you thinking?
- speaker: Respondent
  text: Well, first we thought it was a plane accident. And we figured if this is a collision. You figure, well, it's going
    to be an injury accident. It's going to be something that really shouldn't have an impact for us per se. But then when
    the people who are on the overlook here observed the second plane, they knew it was no longer an accident. We knew it
    was a terrorist attack. Then it was a lot different. We weren't treating just one accident. We had two accidents. And
    then we had listened to the radio, the report of the Pentagon, we all realized we were underneath an attack, the United
    States was underneath an attack. So again, we thought now with all of this, across the harbor you could see the smoke.
    You saw the collapse and the ground just filled up, 30 stories with dust, go from west to east, and you said, boy this
    is not just a little accident. This was a planned, big attack.
- speaker: Respondent
  text: What's going through your mind? You figure well, we're next to a big bridge. We've got a good view of the harbor for
    commerce. The bridge could be next. So that's why eventually we started getting people off of the overlook here. It was
    unsafe because we said they had fast movers coming in. You don't know if there are other planes. An unidentified aircraft,
    they say there's a fast mover coming in. You don't know if it was the National Guard, the Air Force, or another hostile
    attack. So, we got people off of the overlook because everybody in my area didn't because we've got binoculars mounted
    for permanent display and they were able to see the collapse. So, of course, a lot of people here saw the first. If they
    were up there, they may have been up there for the second one, saw the second plane. And anybody who was up there at all
    saw the collapse and you saw the dust. And you just couldn't imagine people getting out.
- speaker: Respondent
  text: And, of course, our boats were going back and forth shuttling people out. And you were hearing stories and you were
    hearing radio transmissions. It was chaotic for the downtown people, but for us we could just watch in amazement and just
    feel. It's like, gee, could they hit here, because the bridge would be an ideal attack, knock out commerce. We're right
    next to the bridge. You could see it out the window. And again, the Statue could have been an attack. People said the
    second plane may have been to hit the Statue of Liberty. Since the first plane didn't take out both towers, maybe he diverted
    from the Statue to hit the second tower. No one really knows. So, I'm sure people at the Statue, they were more concerned
    than anybody else was, because they were at Ground Zero also.
- speaker: Interviewer
  text: Sure. So, tell me, what were some of the other things that you, I mean you obviously indicated that you needed to
    get people off of that particular site, off of the view site. What else, what other measures were you thinking about at
    that point? Were you calling in staff?
- speaker: Respondent
  text: Well, we called everybody in. At communications dispatchers were calling any available person that we could reach
    at home to respond back. The midnight people had gotten off at 8:00 in the morning, so they were on their way home or
    had just gotten home and we called them back. So, the dispatchers without little direction they did what they were supposed
    to do. They called all of the people that went home, called them back to the district and the district supervisor would
    give them their assignment, whether it would be to close the front gate. I dealt a lot with the Park Service, the Coast
    Guard, and the DLA, because DLA was very fearful of attacks. So, I worked with the Coast Guard, the Park Service to get
    Jersey barricades up. We had to close off the entrances as best as we could. It took a couple of days to get things, but
    I negotiated where we could obtain the necessary items to form a perimeter to close the back gate. We used an Army truck
    and Reserves to close the back gate, the only entrance was from the front gate. So, it took time, but during that day
    that's what we were arranging. We were arranging how to secure the place, make sure everybody had ID coming and going.
- speaker: Respondent
  text: Miller Field was utilized by NYPD for a staging area and for a possible morgue. So that day I worked 7:00 in the morning
    until 11:00 at night working with other agencies, because they needed space. And as the event grew longer, again, they
    needed more space, so they utilized the hangar for a possible morgue, but it didn't work out to be needed as a morgue.
    They had used a site, a location in Manhattan and they put them in trailers. So, it was all basically coordination, shutting
    down, making sure Great Hills was close, Miller Field was closed, and making sure Fort Wadsworth was a secure site. We
    controlled people coming in and out. We had visitor checkpoints. We had car checkpoints, so people had to show ID. If
    you drove in, you had to have your vehicle searched.
- speaker: Interviewer
  text: At what point was the fort actually closed down?
- speaker: Respondent
  text: As soon as it happened, we shut it down. You had to have a Government ID, you had to work here to have access into
    it.
- speaker: Interviewer
  text: So how smooth was that? You just indicated that you had to coordinate with a number of other agencies, Coast Guard,
    DLA - Defense Logistics Agency - how smooth was that coordination?
- speaker: Respondent
  text: It was remarkably smooth, I think. You don't have all of the assets that you think you would have available. Like
    the Jersey barricades, we don't have them sitting in a storage yard to say, "can I use ten Jersey barricades," and then
    go and find a forklift driver. So, thinking back, it took a day to get everything in place where we wanted to. We didn't
    have the supplies, but everybody was willing to help. The Reserves that got activated, they provided me with access with
    a deuce and a half, and operator for a bigger forklift. A small forklift couldn't handle the Jersey barricades that were
    over 10 feet long. The 8 footers, we had a forklift for. But again, we don't necessarily have a forklift sitting available
    for any use other than like a warehouse use. So, looking back I think everybody worked. Everybody pitched in. Coast Guard,
    they helped patrol here. They gave assistance on the 4X4 on the beach areas making sure nobody came by shore. I went up
    to the command post for the Coast Guard and I gave them one of our radios, so in case of an emergency if they had any
    tracking, they could advise us over the radio. It goes around to what we were doing, but one of the biggest things was
    the injured. Again, I had to go over to the Coast Guard station at Rosebank Station in New York and ask them to see if
    they could get me a chopper with the flight surgeon because we needed doctors over at Ellis Island. And again, that was
    coordination. They don't always have a surgeon available, or they don't know where the helicopters are that are stationed
    in New York, because the helicopters come from a different location.
- speaker: Respondent
  text: So again, I was going back and forth with different tasks all day. But again, they were willing to say, "We have a
    helicopter, what do you need now or later?" So, it worked out fine. I mean it's not like going to the cupboard and getting
    the can of soup that you needed or pasta that you needed. But everybody knew what your needs were, and you were able to
    accomplish it when they had their personnel advised. But everybody had got to get permission. You just can't get a helicopter
    automatically. I mean I know we're underneath an attack, but they couldn't commit a helicopter. But they said, "We'll
    try to get it." And again, they'd call back and say, "I've got a helicopter available." And I said, "I need these supplies,"
    because with the boat guys they said they were needing gauze pads, trauma kits. So that's where a lot of people got coordination
    through and it was.
- speaker: Interviewer
  text: But you were calling the Coast Guard.
- speaker: Respondent
  text: I went there.
- speaker: Interviewer
  text: Or physically went over there to, that's how you gave them those requirements.
- speaker: Respondent
  text: Right, because phones also went down, because when the towers went down, we lost telephone conversations.
- speaker: Respondent
  text: So, a lot of the thing was like line of sight, you had to actually talk to the person. Coast Guard activities, the
    vessel tracking system which is up here in Fort Wadsworth, they had one of our radios and they had a command meeting there
    with outside agencies to discuss shutting down the harbor, because the harbor was shut down. They had one of our radios
    for here. The station in Rockaway, the substation in New York was a little different. They didn't have any communications,
    so I had to go there in person and say, "I'm Lieutenant Waite. I'm going to have a little bit of authority. I need to
    have a helicopter at Ellis Island. I have people that need to be treated. Do you have a doctor available?" So, again,
    I used their doc to help get my people back and forth also. Get permission for my boats to come into the station, offload,
    and take other personnel up. So that's where my role is, just administrator. I was the go-to. "You make this happen,"
    I had to make it happen. They would tell me their needs and I would make it happen.
- speaker: Interviewer
  text: So, were there some real advantages in being co-located with the Coast Guard here?
- speaker: Respondent
  text: Oh, definitely.
- speaker: Interviewer
  text: It sounds like maybe there were.
- speaker: Respondent
  text: Oh yes, because they have docs here, so we could get our personnel here, because when you shut down the bridges, people
    couldn't get in and out of the cities either. So, we had people here. Our people from Jersey, they were able to get across.
    We could get them to the Statue by our own boat, or by Coast Guard boat, or by personal craft. So we don't have any dock
    space here, but the Coast Guard does. So that was one good thing with the Coast Guard here.
- speaker: Respondent
  text: The Coast Guard police also helped with the housing area here because they have something like 300-400 units there.
    So, they can help keep their people safe. And they're concerned about the safety of their family also. So, it's, NYPD,
    basically, didn't interact with us as you might imagine. It was all Park Police and Coast Guard operations at Fort Wadsworth
    because the city was involved with the other operations.
- speaker: Interviewer
  text: Well, it sounds like there were a lot of requirements and a lot happening very fast. And I'm wondering if you can
    tell me anything about how you set priorities or prioritized your requirements, I guess is a better way to put it. Can
    you tell me anything in general, what was going on in your mind or what process you used to do that?
- speaker: Respondent
  text: Well, it's sort of like it comes natural. I don't know really what, there's no check off list. You always think, you're
    always looking up. You hear planes, you always look. You don't know what's going on. You want to make sure everybody was
    off of the overlook. That was one thing, because we figured this was a threat, so we wanted people off of the overlook.
    We wanted to keep the operations for NYP, which was over at Floyd Bennett Field, so we shut down Floyd Bennett responsibility.
    But that was within Lauro's Field.
- speaker: Respondent
  text: I made sure Staten Island was safe as far as Fort Wadsworth locations for the housing and for the government tenants
    here, and just basically support for everybody who was downtown. I mean we were
