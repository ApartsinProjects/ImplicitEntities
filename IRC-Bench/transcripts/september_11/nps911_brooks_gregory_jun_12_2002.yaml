collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe the best place to start is to ask you to tell me how you first learned about the attacks on the World Trade
    Center.
- speaker: Respondent
  text: I was in a meeting with York County discussing some land exchanges, and I got a phone call saying a plane had gone
    into the Trade Center, and we were expecting the Type-1 Team to be on alert to be called out. I was pretty impressed with
    the time frame of that because I think that call was like 15 or 20 minutes right after the first plane went in.
- speaker: Interviewer
  text: Where did the call come from?
- speaker: Respondent
  text: It came from Greg Stiles, who works in Shenandoah. There is a dispatch system there, and he alerted me to that fact,
    to be prepared. And then later on during that, once we got the call we were asked to go to - Dennis Burnett got involved
    and said, "Why don't you try to get your team together and go to Shenandoah right now because we don't know what's going
    to happen in Washington?" So, they had the team activated to report to Shenandoah, which we stayed in Luray.
- speaker: Interviewer
  text: So, did you quickly get in your car and start driving out there?
- speaker: Respondent
  text: Yes, we got there - Dennis McGinnis and I were probably the first two responders on the team because Dennis lives
    there in that area. But he was also at Cape Hatteras - that's right, I remember this now. He drove up, we met, we went
    to Shenandoah, and were there that evening. Other team members - I guess if there was a mistake as far as the all-risk
    management team was concerned, we were always pretty cocky about how we could respond within 24 hours. Well, that's when
    we could use the planes. And we learned a lesson by not assuming that we could get to our locations by planes anymore.
    So we had some people driving in, and then we actually had to wait until some of the people could catch planes which,
    to me personally, as the Incident Commander, I was two to three days behind the power curve basically because I couldn't
    get my team members there.
- speaker: Interviewer
  text: It would be helpful to me if you would just give me a brief overview of how your team is made up.
- speaker: Respondent
  text: The Type-1 Team is made up of functions. We have an Incident Commander, a Planning Section Chief, an Operations Section
    Chief, a Finance Section Chief, a Logistics Section Chief, and an Information Officer, which takes over these functions.
    It works very well. The system works great. But it's also based on having the tools to work with. With this situation,
    you know, we couldn't develop a plan until we got all of our team members there which, like I said, it put us behind.
    We develop a plan. First of all, we do objectives, then we do strategies, and then we do tactics of how we're going to
    implement the incident. And we base that on the delegation of authority that's given to us, and in this situation delegation
    of authority was given to us directly by the Director. She gave us tasks on what we should do during this incident.
- speaker: Interviewer
  text: I'd actually like to go through those in just a minute. Is there anything more you want to tell me about who the other
    members were and how they were notified or anything?
- speaker: Respondent
  text: Yes. Well, that was the problem, too, and I'm glad you brought that up. My Planning Section Chief, who is Greg Stiles,
    usually is with me, but he also does some things for the Department of the Interior, so I lost my Planning Section Chief.
    I did not have a Planning Section Chief at that time until I had to eventually get one. Dennis McGinnis was my Operations
    Section Chief, and then we had Bob Howard as our Logistics Section Chief. Finance we had Kim Glass come in. Then she had
    to rotate out because we brought someone else in because we felt like the next team would be here - we've already assumed
    that this incident was going to be longer than a 14-day detail. So, we brought in Ruth Kohler as our Finance Section person.
    Information was Debee Schwarz, and I was trying to find a Planning Section Chief, which I did get, and that was Cheto.
    I've got to look up Cheto's last name. He's from Zion, which really worked well, considering that he had never worked
    with the team, and we had worked together a long time, and I didn't have my main corps together because we went in different
    directions, which I did not like, but I couldn't control that. Once we got together, I thought it worked very well, once
    we got organized.
- speaker: Interviewer
  text: So, your original team - not the team for this event, but your basic team, the positions are one-deep?
- speaker: Respondent
  text: No, we have two-deep, and that's why the other Incident Commander, J.D. Swed, he came with us because he could drive
    in. He was from Indiana Dunes. He would drive in to assist me as the deputy. But after being there a while, we all saw
    the handwriting on the wall, that this was going to go longer. So, we needed to rotate the other core team out so they
    could come back after September 21st. Once we left, we left.
- speaker: Interviewer
  text: So, 14 days is the typical rotation for an event?
- speaker: Respondent
  text: Yes. It used to be 21 days. They changed that to 14 days. But no, that's the rule now, 14 days. And I wouldn't say
    that can't be longer for all risk. All risk is - in my opinion, all risk can definitely be to 21 days. Fourteen days really
    came from fire, because of the fatigue of fighting fires. I think all risk could go longer, but the new rule was we'd
    do 14 days.
- speaker: Interviewer
  text: Okay. I understand there was also a Type-2 team, and that team was set up out at Shenandoah. Do you want to give me
    a little background?
- speaker: Respondent
  text: Yes. The Type-2 Team we brought in to go to Shenandoah because of all the communications. Shenandoah was the main
    dispatch system for everything - at that time, for us. The other thing is, we had to think logically that if something
    happened in Washington, we needed to have a backup team somewhere else to support - if we lost communications or contact,
    we needed to have someone in place at Shenandoah to take care of the situation for the rest of the National Parks. And,
    I mean, we didn't know what was going to happen, so that's the reason we had a backup plan to have another team, and that
    was a Type-2 Team from the Southeast Region.
- speaker: Interviewer
  text: When did that happen?
- speaker: Respondent
  text: That came in within, I think, a week after we had been there.
- speaker: Interviewer
  text: It was fairly soon, I recall.
- speaker: Respondent
  text: Yes, we sat down and started evaluating this thing, and once we got all our core teams together, we were trying to
    have backup systems, what we were doing, and then we were also trying to support the director on obtaining the information
    she needed from each Park. We were to do reports twice a day to see what was going on in the parks, and she wanted to
    be briefed on especially the New York parks.
- speaker: Interviewer
  text: Is there anything you can tell me about the implementation of either the Department's continuity of operations Plan,
    or the Park Service's continuity of operations Plan? I guess what I am looking for is to see if there is any connection
    between the implementation of that plan and the role of your team. Is the activation of the team related in any way to
    the continuity of operations?
- speaker: Respondent
  text: Yes. It's in the - it's in that Washington - Washington controls the Type-1 Team. The regions control the Type-2 Teams.
    And Washington will implement the plan as they see fit if they need a Type-1 plan. An observation on my part was, and
    it's in all fairness to the Park Service, was that they were moving, and all their plans were in boxes. No fault by anybody,
    but they were supposed to move, and people had things packed away, so when this incident happened, their access to what
    they needed wasn't readily there. They did have them. I'm just saying to me, that was not anybody's fault, but you go
    in everybody's office and they're saying, "We're packed. We've got to find this stuff." It's just coincidental. Like I
    said, it's nobody's fault, but it just shows that in order to be prepared, you need to be prepared, and everybody had
    packed those things away. Of course, I think of a lot of the Ranger Activities folks, they knew exactly what to do and
    they did. They implemented it, as far as I'm concerned, as far as all-risk is concerned.
- speaker: Interviewer
  text: But you mean maybe some of the other offices up there?
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: Some of the senior staff. Well, let's go on to the delegation of authority letter that the Director signed. When was
    this done, and why was it significant that she signed that letter? What's the significance of that letter?
- speaker: Respondent
  text: Well, I have to get in a notebook if you want me to.
- speaker: Interviewer
  text: Actually, I think I have a copy of the letter.
- speaker: Respondent
  text: The significance of that is in order for an incident team to come in and run an incident, you have to have someone
    that will delegate that authority for you to do it. The Director felt like this was an incident that - I have worked on
    other incidents where the superintendents have given me delegation of authority. Y2K, Deny Galvin gave me it, but in this
    situation director, this was a major, major incident and the Director was very involved, which I was very appreciative
    of. She gave me opportunities to brief her twice a day. She was there. She wanted to know what was going on, and we tried
    to provide her that information. And she made me stick with that delegation.
- speaker: Interviewer
  text: Tell me a little bit more about the delegation, and I guess the objectives that it laid out. Didn't it specify the
    specific things?
- speaker: Respondent
  text: Specific points. You've got to be financially accountable to try to do it in a safe manner, your incident. Work with
    the Department, well, support the Department in its needs as well as the National Park Service. That was one of the key
    things of the delegation, which was, you know -
- speaker: Interviewer
  text: To support the Department and the Service; is that unique? Is that something that you had encountered before?
- speaker: Respondent
  text: That's the first one that I've encountered. Yes. I'm used to supporting, you know, the National Park Service, or the
    Park. Like Y2K I was just at the National Park Service. But supporting the Department, and basically when you support
    a Department, it was based on if they needed resources, which we came to find out during the incident that law enforcement
    rangers were gold. I mean, we needed law enforcement rangers not only for the National Park Service, but specifically
    the Bureau of Reclamation, which that's where the Department would try to support them.
- speaker: Interviewer
  text: You were talking about the objectives in the delegation of authority. You indicated that this was the first time a
    delegation of authority has specified that the team would support the Department as well as the Bureau, as the NPS, and
    I'm wondering how that complicated the team's function.
- speaker: Respondent
  text: Well, we worked with the Department during Y2K - I should take that back - we supported the Department as well through
    Y2K, so at least my team had experienced working with the Department. In this situation, you know, the Y2K was more of
    a process versus an incident itself. It could have been an incident, but it, to me, was just a process that we had to
    safeguard. But this was an actual incident in which things happened.
- speaker: Interviewer
  text: And which involved dealing with resources much more.
- speaker: Respondent
  text: Right, dealing with resources. The problem I had was, as an incident commander, and Rick Gale was my advisor for the
    director, we had to be compromising to the point where when it got to law enforcement rangers, we needed to make sure
    that the parks were protected as well as the needs for the Department, which was difficult. That was tricky, because the
    Department has their needs, and they would come to me and say, "Well, we've got to have so many Rangers here," and we
    tried to do that. I would brief the Director, and the Director would make the final decisions - or Rick, I should say,
    if we were giving out too much and the parks weren't being protected. As far as I know, I thought we met their needs.
    They may disagree with that - and as well as meeting the needs for the parks. The confusion, I think, working with the
    Department was they were not that familiar with the Incident Command System. We tried to do that, and we even actually
    supported them in getting resources to create their own little ICS team over there, which, you know, that's what they
    wanted. We had a couple of meetings with Gary Allen and said, "Why can't we make a unified command system, and we would
    be under the Department's umbrella, and we would use the system." Well, he preferred not doing that.
- speaker: Interviewer
  text: Who is Gary Allen?
- speaker: Respondent
  text: He worked for Steve Calvery. I mean, he was in charge of all of this.
- speaker: Interviewer
  text: So, he is the person that you dealt with.
- speaker: Respondent
  text: Well, he and Rick more so than me. But I did have a meeting to try to explain this process to him, how we could have
