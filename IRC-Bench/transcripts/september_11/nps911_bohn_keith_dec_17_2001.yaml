collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: And maybe just if you would begin by explaining what your position is here, what's your sort of normal duty?
- speaker: Respondent
  text: My current position with the United States Park Police is I'm a helicopter pilot. I'm a pilot sergeant with the United
    States Park Police and work out of Anacostia station and fly helicopters basically fulltime. It is my fulltime job for
    them. I've been with them 18 years.
- speaker: Interviewer
  text: How did you first become aware of the attacks on September 11?
- speaker: Respondent
  text: On the morning of September 11, I was leaving work. I'd worked the previous midnight tour and I was preparing to leave
    work, already in civilian clothes. Already had known about, obviously, the World Trade Center attacks in New York. They
    were pretty traumatic and unbelievable. Was leaving work, walking through the hangar. Most of our crew was outside in
    either the hangar or the outside area when one of the crew members, Sergeant Virgil, had made mentioned about hearing
    some sort of explosion or something. We then received a phone on our drop line. We have a direct phone line to National
    tower because we're so close to them.
- speaker: Interviewer
  text: Is that what a drop line is?
- speaker: Respondent
  text: Yes, basically it's, we have a few drop lines here because of our mission, but one of them is from National tower
    because we work so closely with the airport being only a mile away from Reagan National Airport. And so, they called us
    reporting that, our first initial report is that an aircraft had crashed near the northern extreme of the airport property.
    So, we were preparing to launch a response to an aircraft crash on the northern end of the airport.
- speaker: Respondent
  text: At that point you could see the black plume of smoke from that area. You couldn't tell it was the Pentagon yet, but
    you could tell it was from the northern part of the airport there was in fact a huge black smoke cloud already coming
    up at which point my commander, Lieutenant Cholak, advised me to get suited up to prepare to go on the second aircraft
    for this mission.
- speaker: Interviewer
  text: Okay, the second aircraft being Eagle.
- speaker: Respondent
  text: Eagle Two. I was in Eagle Two. Eagle One launched out immediately with the duty crew of that day, which was Pilot
    Sergeant Galley, Sergeant Marsh, and Officer Dillon. That three-man crew launched in Eagle One immediately. The plan was
    to form a crew with what was here at the hangar, myself, Lieutenant Cholak, Sergeant Stasulli. Sergeant Virgil was in
    training nearby with a large group of Park Police for the upcoming international money fund demonstrations, the IMF World
    Bank demonstrations. There was a group of about 50 people out in front of the hangar training. Horse mounted, motorcycle
    slot and personnel. So we were going to formulate a crew for Eagle Two from that group of people that were here, utilizing
    the mass casualty kit in Eagle Two, in which we have a kit for the aircraft which allows us to carry four patients versus
    two patients. Thinking we have an aircraft crash; we were thinking mass casualties. So, we launched Eagle One immediately
    with the intent of launching Eagle Two right afterwards with the mass casualty kit in.
- speaker: Interviewer
  text: Okay. And so, compare for me the crew that you went up with, with what was a typical crew for a mission.
- speaker: Respondent
  text: We were in a very a typical crew. What transpired was in fact that I had already come off midnight getting off duty,
    so I was one pilot. Sergeant Ken Burchell is another pilot, but he was assigned to this training. I'm still an intermediate
    paramedic and Sergeant Burchell is still an EMT, so we had medical expertise. My thought was that Sergeant Burchell would
    fly and I would be his medic and take care of patients. However, Sergeant Burchell went over to the training group while
    I started the aircraft, so I basically became the pilot of Eagle Two.
- speaker: Respondent
  text: Sergeant Burchell knew that at the training group out here in front we had support from Department of Defense, which
    typically on major events the United States Park Police uses DOD medical personnel from Bethesda Naval Hospital. And so,
    he knew there were some paramedics over there from that operation, who support Park Police regularly, who are known to
    us, have trained with us. They've basically been trained on our aircraft and everything. He knew they were there, and
    he went to get them to tell them to come on the aircraft, which was a very good decision.
- speaker: Respondent
  text: So, he returned with paramedic Jason Kepp, and physician's assistant Keith Keitell. Those two medical personnel were
    obtained by Sergeant Burchell and joined us, and we also took Lieutenant Cholak and Sergeant Stasulli with us. I knew
    I wanted some extra personnel for landing zone security, thinking we were going to be going in and out of this site, whatever
    it was. And so I wanted those personnel with me so we had some people on the ground that we could maintain landing zone
    security, we could have communications with them, and I know who I'm talking to when it's one of my own to say, "Yes,
    it's okay to come in and land now," or "We're not ready," or "Here's what's going on."
- speaker: Interviewer
  text: But for a typical mission it's what, a two person?
- speaker: Respondent
  text: Our typical crew has been two. Since September 11, we've been running with a three-man crew which we would like to
    do because of the advantages it gives the operation. It's much safer and a much more capable crew to run with a three-man
    crew. On that day I launched with six, because I gathered a mixture of people thinking I had a large incident I needed
    extra personnel for both medical and for security things. And also, we had assistance on the ground from our mechanic
    who was here, Tom Greer, and he installed the mass casualty kit in the aircraft as we formed up this crew and got ready
    to launch.
- speaker: Interviewer
  text: And how easy or difficult was that to do?
- speaker: Respondent
  text: It's probably a 15-minute process, which could be done the scene, but I said, "Let's do it here," because - but we
    didn't take 15 minutes. I gave him about 5. And so, he was rushed, but we knew we had something extreme going on and then
    later we learned that it was very extreme.
- speaker: Interviewer
  text: So how many minutes after Eagle One took off did Eagle Two?
- speaker: Respondent
  text: We probably launched, I think, 5 minutes after them and actually that's how I found out what transpired. It was Sergeant
    Galley in Eagle One talking to me in Eagle Two on the air-to-air frequencies, because I was already up and running in
    Eagle Two. I got the engines started and everything was online. And he told me in disbelief that a jet had actually hit
    the Pentagon. That it wasn't at the end of the runway, it was actually now as we knew identical to the World Trade Center,
    which that picture up there as you think of it with the, our and NYPD's aircraft up there over the trade centers. And
    we knew then it was the same thing, another similar incident. Now we had a jet into the Pentagon, which as far as our
    response we could change nothing, but yet in our mind we knew it wasn't an accident. It wasn't just a coincidental accident
    at National Airport. It was an attack of terrorist nature and we were in a whole different ballgame at this point.
- speaker: Interviewer
  text: Were you also getting reports while you were still up in the air about other unaccounted for aircraft?
- speaker: Respondent
  text: Yes, a little bit later we had gotten that. After we had gone over and performed our MEDEVAC, we received information
    about the incoming fourth aircraft, which was the one that had crashed in Pennsylvania, how that one had turned its course.
    It was coming back, believed to be coming back to D.C. was the intent.
- speaker: Interviewer
  text: Okay. So, let's just sort of continue along somewhat chronologically. You're landing at the Pentagon.
- speaker: Respondent
  text: We actually then, because we had air-to-air between Eagle One, which was already over the scene, with us in Eagle
    Two they knew, Eagle One knew that we had the mass casualty kit. Eagle One was already in a command and control position
    over the Pentagon and they were down linking live time video back to command center, such as the Secret Service, the FBI,
    things like that that we attach our signal to. And so, they were already engaged in that, which was something everyone
    wanted to see, and so they were giving it to all of the federal law enforcement entities in town. They also knew we had
    the mass casualty kit in. If there were MEDEVACS to be done, we were the best aircraft to go in first. So, they cleared
    a landing zone for us and described an area where it was safe and clear for us to land on the west side of the Pentagon.
- speaker: Interviewer
  text: Is that what you mean by clearing the zone, flying over it and?
- speaker: Respondent
  text: Seeing it was pretty much empty of people. Now, of course, the Pentagon, you had an obviously a hectic thing where
    you had police and fire units rushing towards the Pentagon. You have people on foot rushing towards the Pentagon from
    the buildings like Navy Annex and Crystal City. You had all of those people rushing to the Pentagon to try and help. And
    you have an equal number of people rushing out of the Pentagon, because it's now been attacked and is on fire. So it was
    a real mix of people going both directions, but yet there was some, there was a pocket of open space that Eagle One had
    identified for us in the cloverleaf of the highway there, Route 29 at Army Navy Drive or something at the west side of
    the Pentagon, where I initially landed and deployed my people.
- speaker: Interviewer
  text: Just north of the Naval Barracks thing?
- speaker: Respondent
  text: Right, exactly. There's a cloverleaf there where the two highways intersect, and we landed in the northwest cloverleaf.
    And it actually worked out well then because Lieutenant Cholak escorted Keith Keitell, so we had a Park Policeman with
    a medical provider going together. And then Sergeant Virgil took Jason Kepp to another medical team. So, two-by-two they
    went out and Sergeant Stasulli stayed with me to safeguard the landing zone.
- speaker: Respondent
  text: I think a lot of people thought we were there to save them. There were people coming towards the aircraft and I would
    point out to Sergeant Stasulli, "Stop her." "Stop him." People obviously in various stages of disarray because they were
    -
- speaker: Interviewer
  text: You thought you were going to evacuate.
- speaker: Respondent
  text: Them, I think, some of them.
- speaker: Interviewer
  text: As opposed to a medical.
- speaker: Respondent
  text: Yes, obviously the confusion was pretty great. And so when we deployed our people, Sergeant Virgil has a long history
    of fire, EMS experience, got to what was apparently the triage center and found out there were eleven patients at that
    point who were reported to be transported by air, eleven priority one patients. And then I relayed that up to, both Sergeant
    Burchell who was telling them by radio and I was telling Eagle One by radio both, and then Eagle One started calling in
    other aircraft to assist, such as they called for the Maryland State Police. They called for MEDSTAR Hospital Center aircraft.
    They called for INOVA Fairfax Hospital's aircraft, Fairfax Police aircraft, all of these other local MEDEVAC.
- speaker: Interviewer
  text: Because they knew there were eleven and that you could only.
- speaker: Respondent
  text: Eleven at that point.
- speaker: Respondent
  text: And we could take presumably four, although we initially launched out of there with only two.
- speaker: Interviewer
  text: Tell me about that. How did that come about?
- speaker: Respondent
  text: As soon as we got there, there were patients that were ready to go and the patients we got were worthy to go. They
    were quite extremely burned. Most of the patients who were transported, at least that I saw, were burn patients. I guess
    presumably if you were in the aircraft or in the zone of the Pentagon that got actually struck your odds of survival were
    pretty limited. But if you were in those adjoining offices that burned, it was very - but it was a small number. I think
    there were thoughts on our side there would be lots of patients. There really weren't, I don't think, large numbers of
    patients.
- speaker: Respondent
  text: We ended up getting two. Both were very large patients. In the stacking litter configuration, the litters fall down
    on one another. So, when they brought us the first patient, who was very large, I told them to put that one on the primary
    side where one goes. The second patient we thought was equal in size, so then that didn't allow the second litter to lie
    flat, so the second just became unusable to accommodate the first. The third position is actually up top pretty high,
    hard to put a big patient up that high and also a tighter position. The third patient actually wasn't ready to go, yet
    packaged in a format to go.
- speaker: Interviewer
  text: What does that mean?
- speaker: Respondent
  text: They weren't properly secured.
- speaker: Interviewer
  text: Is there paperwork?
- speaker: Respondent
  text: No, there was no paperwork done. They weren't even on a backboard ready to get in the aircraft, so we made the decision
    just let's go. We had to let's launch and so, because these were very critical, those two patients.
- speaker: Interviewer
  text: And where did you take them?
- speaker: Respondent
  text: We took them to the Washington Hospital Center, which is the closest trauma center. It's also the local burn unit
    and these were straight up burn patients. I don't know what other injuries they had, but we knew they had burns.
- speaker: Interviewer
  text: Who makes that call typically about where you take patients?
- speaker: Respondent
  text: We do. Our medics on board, and between myself and Sergeant Burchell, who came through the process here of being paramedics
    first before we were pilots here, and then working with Keith and Jason, who are very known to us, we knew we were going
    to the Washington Hospital Center. We had burn patients. We knew we were going. It was a very short, probably a three-minute
    flight up there.
- speaker: Respondent
  text: But at that point, we left half of our crew there. When I launched off of the scene, I was flying, Sergeant Burchell
    was tending to one patient, and paramedic Kepp was tending to the other patient. And the physician assistant, Keith Keitell,
    Lieutenant Cholak and Sergeant Stasulli stayed on the scene to assist on the ground with further patients, patient care,
    landing zone security, because right after us MEDSTAR came in.
