collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: 'Well, Frank, the first question, as I mentioned to you before is: from the moment you were aware that something had
    happened, what went on?'
- speaker: Respondent
  text: Well, basically, I was standing at our work dock outside on the north side of Ellis Island. I was talking to the supervisory
    boat captain, and we were just standing out there talking about the boat and operations when I was facing north and Mike
    was facing south, and I saw an airplane come across from the west and it was low and it was loud. Mike turned and we saw
    it, and we saw that it was low and loud and really didn't think very much of it.
- speaker: Respondent
  text: And I watched it, both Mike and I watched it go straight into one of the trade towers. Then there was about a 10-second,
    15-second delay, and all of a sudden there was an explosion, you know, two-thirds of the way up, three-fourths of the
    way up, an explosion at the building. Both Mike and I looked at each other and it was like we weren't sure what happened.
    It was like we couldn't understand if that - it was like disbelief, you know. Did a plane really go in there, or was there
    an explosion, a fire, or something that happened to the building? It was very difficult to connect the fact that the plane
    did go into the building - did you really see that happen - and then this explosion.
- speaker: Respondent
  text: Mike stayed with the boat where he was, and I started to go inside of Ellis Island to - just to start to find out
    with our protection division what was going to go on or what was going to transpire. Word was out that - from people in
    the building - that a plane had hit, and I met with the deputy superintendent that said a plane had hit. The park police
    were saying that our Circle Line boats should be held with passengers. Should we hold that boat or not? And I said to
    just kind of stand by for a few minutes.
- speaker: Respondent
  text: And then I went back outside again to see - because a lot of the employees went outside to see things from that work
    dock area or that part of the island. And then the second plane hit. I didn't see that. You could hear it. And I immediately
    - in the back there was just a lot of people running around, employees and some contractors. And I met with - again the
    Deputy Superintendent Cynthia Garrett came outside with the news of the second plane, and I said go inside and be with
    the lieutenant. It was pretty clear at that point that something strange was happening to our environment at that stage
    of the game - that we were under attack.
- speaker: Respondent
  text: My first reaction was to stop all traffic coming across the bridge. For some reason it just seemed imperative to me
    to protect our rear guard, our flank, whatever you want to call it. As officers were trying to be dispatched to different
    areas and a lot of radio traffic, I didn't want to interfere with any of the radio traffic. So, I just informed the chief
    of protection that I had our flank. I had the bridge. And basically, what I did was stood at the bridge area, unsnapped
    the keeper of my weapon, and wasn't going to let anything come across that bridge until I was relieved, until we could
    get officers out there. In other words, we - the protection division, the operation at that time was to stabilize and
    secure our island, get people outside rather than inside at that stage of the game because of, you know, things are falling
    out of the sky. I have a better chance being outside at that stage of the game than inside.
- speaker: Respondent
  text: Within maybe five minutes I was relieved by the park police who had - we threw the gate across at what we call post
    four. And officers went out there in a car with shotguns or what have you. Went back inside and just was a combination
    of Cynthia, the Chief of Protection Chris Pappas, and myself, just directing operations and making decisions as to getting
    the staff, all staff, everyone off of Liberty Island. That's residents, etcetera, and all staff, all employees, interpreters,
    everybody. We did that.
- speaker: Respondent
  text: My wife and my oldest son came over on the boat with the staff. The staff was advised to not stay on Liberty Island
    but to make that staff run into MIO, into Manhattan, to get those people home. And we were preparing for incoming - incoming
    casualties from the various emergency services units over in New York, from the harbor unit and from the fire department;
    that - could they use us as a - as a site to bring noncritical victims to Ellis and then be transported from Ellis over
    land to the various hospitals in New Jersey, the Jersey City Medical Center, etcetera.
- speaker: Respondent
  text: So, we were preparing for that to assist in what we knew was a catastrophe in New York in the Lower Manhattan area.
    We knew that we would play a role in that somehow, just because of the water aspect. We weren't sure. Once we got our
    staff off, our staff boat was used for a few transports of people. We got our park police vessel in the water, and one
    of our other captains got our other boat operating in the water so that we still had a staff-type boat that could be used
    for our needs. And basically, that went on for the first hour.
- speaker: Respondent
  text: We organized those staff members that were staying that were based in New Jersey. We organized them as far as those
    that had first-aid skills would help with our EMS operation, those that had just other skills to help man bathrooms and
    where victims were going to be coming.
- speaker: Respondent
  text: We weren't sure what we were going to need as far as answering the phone, taking messages, logging in names and what
    have you, preparing food for people. And that's basically what transpired.
- speaker: Respondent
  text: Personally, my son goes to high school in Trinity Place in New York City, which is one block away from Ground Zero.
    And I was - when my wife saw the buildings come down on her transport from Liberty over to Ellis Island, that's when she
    became very distraught with the fact that - on the safety of our son. We didn't hear anything from him. My oldest son
    was with my wife giving her comfort, and she was just kind of like pleading that they were - that he would be okay.
- speaker: Respondent
  text: I had serious doubts. I felt that bad news was coming because the school was so, so close to the area. But at the
    same time, being a former teacher, I was kind of trying to convince myself in the faith of the school system saying that
    the one thing that schools can do is, that's get the kids out. And for fire drills and for this and that, they do - once
    somebody drops the checkered flag at a school, they get kids out. And I was trying to convince myself that they were out
    of harm's way by - they had evacuated at possibly after the first hit. Something must have been occurring prior to the
    collapse of the towers, that they would have gotten away. So, one side of me was trying to convince myself of that, and
    the other was preparing myself for a tremendous, I guess you could say, personal loss and comforting my wife and that.
- speaker: Respondent
  text: As it turned out, about two and a half hours later, around 11:15, 11:30 my son arrived at MIO at where we get our
    staff boat. He got into MIO. He called on his - they called on the radio because all cellphones were down. Most land-based
    and satellite-based communications were out. And the guards called from over at MIO that he was there. And I hopped in
    a park police patrol boat and went over there and picked him up, brought him home, brought him back to Ellis Island, which
    was pretty good. Everybody was pretty happy.
- speaker: Respondent
  text: Now he was in a - he was in a very extreme state of shock. He was noncommunicative and very skittish and very, very
    fearful.
- speaker: Respondent
  text: Our other concern is that we had our 13-year-old who goes to school in New Jersey - was in his school in New Jersey
    at a Catholic elementary school. And there was no direct impact going on over in New Jersey, but it was my intention to
    get him out of that school and bring him back to Ellis Island when I could. And I think my wife had called the school
    and everybody was stable and fine, and there was no impact.
- speaker: Respondent
  text: Once my family was reunited, in between all of that it was a matter of just organizing and helping out from a management
    side or as an assistant superintendent trying to make contact with different agencies, seeing where there were holes with
    various things. With the EMS operation, they needed this, they needed that, need to close off areas, need to have some
    people assisting people go to the bathrooms and making phone calls and directing ambulances that were staging in Liberty
    State Park, keeping a documented record. And it was more or less like field supervision of that, answering questions,
    getting things, making decisions, moving that along.
- speaker: Respondent
  text: In the afternoon, I went over and picked up my other son, brought him back. And we had to make a decision about going
    back to our home at Liberty Island.
- speaker: Interviewer
  text: This was just after you picked up your other son?
- speaker: Respondent
  text: Yeah. We were there and we stayed still working with the operation, still just being there. And the question was do
    you - do the island residents return to their homes or should we find them residences elsewhere, thinking that the - without
    a doubt that the statue was a target. And the condition of the world and where things are and that there had been attacks
    at the Pentagon, one in the airplane over Pennsylvania, and both trade towers were down, the state of the world and our
    nation at that time was kind of unstable.
- speaker: Respondent
  text: I made the decision to go back to Liberty Island. That's my home. That's where my family is. That's where our dogs
    are. It's where the pets are. It's my job. It's why I've been in the National Park Service for 27 years. That's my home.
    And the only thing I kept saying to myself was like the Hank William's song "Country Boys Will Survive," and we're going
    back home. We're not going to hide out.
- speaker: Respondent
  text: There was a debate about that between the park police and park superintendent, whether or not that was going to cause
    problems. And Diane Dayson, the park superintendent, said, "well, Frank, if that's - that's how you want to do it, then
    that's okay by me."
- speaker: Interviewer
  text: But she didn't really - she kind of wanted you off the island probably.
- speaker: Respondent
  text: Yeah, I think everybody would've felt a little bit better if they didn't have to worry about the island residents.
    My philosophy was that all of us that live out there and work at the statue, the fact that it's a target - the fact that
    it is a target didn't exist just because of 9-11. I mean, it's been there. I have - I started working at the statue in
    1981 and was there until '85 and then went to two other sites after that and came back in '98.
- speaker: Respondent
  text: The notion that the statue was a target or is a target for terrorists or even significant criminal activity was nothing
    new, you know. It was nothing new to me. And it really ticked me off from the standpoint that what was going on in the
    world as an American to say I can't go to my home because of these people - out of fear. And that pissed me off, I guess
    you could say. And my goal was to get my family back to Liberty Island, take my personal flag that my dad used to carry
    when he used to camp and backpack and hang that up outside. And then when I could, get our garrison flag up at Liberty
    Island and raise that sucker up nice and tall. So that when eventually news media and news coverage, which the statue
    was on every major media station in New York as their intro or their exit, possibly knowing that the statue was there
    giving comfort to the rest of the world, that that big old garrison flag would be up there and we were still there. Bring
    it on. Come on.
- speaker: Respondent
  text: My wife agreed with that. My oldest son agreed with it. My youngest son agreed with it. But the young lad who was
    in high school and had been down there at the World Trade Center, he was very, very, very, very nervous and very, very,
    very, very skittish about going anywhere. I think if he had his choice, he would've just balled up in a corner on Ellis
    Island and stayed there.
- speaker: Respondent
  text: But we as a family got back, got home, were there with our dogs, and with the family unit just stayed together. Stayed
    together and just comforted each other and just - just stayed together. Next day, came back in and Diane and Cynthia had
    stayed home. We had agreed that we would launch into an incident command structure. There was not a lot of need for any
    type of management, administrative-type stuff. That I would take it for a few days and under the incident-type management
    structure that we had to deal with the park police, deal with a skeleton crew of maintenance people, and just stabilize
    and move forward. So, we did that.
- speaker: Respondent
  text: By Friday at the end of the week, I felt that it would be important for the New York superintendents to get together.
    And speaking with the region and with Diane Dayson at home, we agreed to have a meeting on Friday afternoon with the superintendents
    of the New York area to assess, to see where everybody was at, to see what issues there were. Were there employees that
    had lost members in the event, status of Federal Hall, status of the New York Parks, status of even parks that were not
    directly affected by it, but did they have family members that may have been involved? To kind of assess where we were
    and for the superintendents to pull together and start to begin to think about where we're going from here, what are we
    going to be doing, where we going?
