collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe just to begin, if you would, tell me a little bit about yourself, your current responsibilities with the Park
    Service.
- speaker: Respondent
  text: Okay, I'm the chief of maintenance at Shenandoah National Park, and as a collateral duty I'm also the Operations Section
    Chief for the National Park Service Incident Management Team.
- speaker: Interviewer
  text: Would you tell me how you became involved with the team?
- speaker: Respondent
  text: A number of years ago, probably 15 or so years ago now, I was doing special events at Independence National Historical
    Park, and it kind of segued into the incident management or incident command structure. I've gotten a lot of experience
    dealing with heads of states, Presidential visits, and that kind of thing. And that kind of segued into the National Park
    Service developing national incident management teams that were using the fire model, where there's a command and control
    structure. About 1990 the Park Service committed to going with a national incident management team, and at that time I
    was one of a group of folks that were selected for subordinate positions on the team. And I started my career in logistics,
    and spent a number of years in logistics, and transitioned to operations in 1994. I'm one of the few team members that
    have gone out on every incident since Pearl Harbor's commemorative event in 1991.
- speaker: Interviewer
  text: So, the structure has been around for over ten years.
- speaker: Respondent
  text: And in a fire it's been around almost 20 years. And there's very little difference in the structure.
- speaker: Interviewer
  text: That's interesting. Actually, it would help me a lot if you would spend a few minutes just explaining how this structure
    - how it is composed and how it operates.
- speaker: Respondent
  text: Okay, it's kind of based on a military model. There is an incident commander who is kind of the General, and then
    there is staff that answer directly to him, and that would be the information officer, the safety officer. And then it
    goes into divisions and divisional responsibilities, and there's operations. Whatever is going on, those are the folks
    that apply their skills to correct whatever is going on.
- speaker: Respondent
  text: There's logistics, and the logistics section supports the operations and makes sure that you get them fed, and you've
    got lodging, and you get them to wherever they're going. There's a finance section that pays the bills and keeps everyone
    out of jail. And then there's a planning section that works very closely with the operations section to develop not only
    the next operational period plan, but looking at the strategic planning, and identifying the goals and objectives so that,
    if your objective is to put out the fire.
- speaker: Respondent
  text: You've got goals to meet that objective, and then you've got strategies to meet the objectives, and then you've got
    tactics. Tactics are the day to day or operational period tasks that the operations folks perform to find out what your
    end result is going to be.
- speaker: Interviewer
  text: And I imagine there are operational plans that are occasionally revised.
- speaker: Respondent
  text: They're revised. For the 9/11 incident, we were doing a 24-hour operational period, so we had a new plan every 24
    hours. Part of that responsibility, as the section chiefs, and all of the section chiefs are like park division chiefs,
    I guess is probably the best analogy, and they meet - we meet typically late afternoon, after you've had a chance to see
    if your tactics work for that particular day, and confirm the objectives, revise the strategies, and change your tactics
    if you need to change your tactics.
- speaker: Interviewer
  text: And how are the objectives set?
- speaker: Respondent
  text: The management team working in conjunction with the advisor agency administrator, and for 9/11 we were working for
    the office of the secretary [of the Interior]. So, someone from the Secretary's office was working with us, and early
    on, what do you want, what are our responsibilities, and from that you look at your objectives, or you develop your objectives.
    But also, the first document that we developed in partnership with whomever calls us in is the delegation of authority,
    and that simply states what the expectations are from the director of the National Park Service in this instance, to the
    team. What does she want done? What responsibilities is she passing on to us?
- speaker: Interviewer
  text: And in this instance, what did that delegation of authority say? What was the language in that delegation?
- speaker: Respondent
  text: It was pretty straightforward. They were looking at getting their arms around what was going on nationally, and the
    key element of that delegation letter was the coordination from a national perspective. So, we knew there were things
    going on in Philadelphia, and there were things going on in New York and Boston, and a number of other sites in the West,
    specifically dam security.
- speaker: Respondent
  text: What we were tasked to do was make sure that somebody was looking at everything that was going on in the National
    Park Service, so you're looking at it holistically, and making determinations as to what resources are needed where, and
    more specifically, to prioritize resources.
- speaker: Respondent
  text: You know, if you're sitting in Lake Mead, and you've got a dam at your headwaters, then, that's your focus and you
    want to apply all of your resources to that specific area. And as a national team, we're looking at a finite number of
    resources and prioritizing.
- speaker: Respondent
  text: Well, maybe we can't have 100 rangers assigned to a dam if we've got to protect the Statue of Liberty, and we've got
    to protect Independence Hall, and Old Ironsides, and wherever we had. So, it was really a matter of making sure that you're
    looking at the whole incident from a national perspective.
- speaker: Interviewer
  text: Right, but were you looking at just National Park Service resources, or were you occasionally looking at resources
    of other Interior agencies?
- speaker: Respondent
  text: We were managing Park Service resources, and the Park Service has more resources that lend themselves to this kind
    of incident, with law enforcement personnel, with emergency medical personnel, with maintenance personnel, folks that
    can operate heavy pieces of equipment, parks that have heavy pieces of equipment.
- speaker: Respondent
  text: One of the major accomplishments that this team did was for a snapshot in time, which was the end of September, for
    the director. We were able to identify all of the resources that she had at her disposal. And she was tasked to report
    that back up to the Secretary's office, who was looking at it, not bureau by bureau, but as a department.
- speaker: Respondent
  text: We went out and got the resources coming in here to contact each park, all 385 parks, talk to the chief ranger, talk
    to the chief of maintenance, and have their resources identified, if they had 10 law enforcement rangers, or they've got
    six EMTs, or they've got five equipment operators. And part of that was trying to make sure that we gathered that information
    in a logical, sequential method so that we could import that information into the facility management software system,
    which is the software that has the ability to track all of the resources.
- speaker: Respondent
  text: We work very closely with the facility management folks here and some of their folks on staff to develop the templates
    so that when we were asking the questions, we were getting information in a logical way, so that it would easily import
    into this database so that once you get a database, then you can manage it, and that was one of the key tasks, and we
    were able to turn that around in about five days.
- speaker: Interviewer
  text: Can you help me out with a chronology of those first couple of days? For example, when you were actually called in,
    how did you get the word and what kind of guidance were you given?
- speaker: Respondent
  text: I've been doing this for better than a decade, so I'm pretty attuned to current events. My father was having some
    medical difficulties, and I was in North Carolina, the Outer Banks of North Carolina checking on my folks. I was supposed
    to take my dad to the doctors, and I went out and said well, shoot, this is early Tuesday morning, and well, I'm here,
    I might as well get a haircut. And I walked into the local barber shop, and they happened to have the news on. The first
    plane had just flown into the World Trade Center, and I got to watch the second one fly in as I got my hair cut, and at
    that point I knew that there was a very strong likelihood that we would get called.
- speaker: Respondent
  text: I immediately went back to my folks. I was carrying a travel bag with me that has kind of - it's a "go-bag" where
    on short notice I can go, and the key thing that I had with me was my three ring binder that has the GETS card, which
    is the Government Emergency Telephone System card. And I immediately called the Shenandoah Dispatch, which is the national
    dispatch, and was able to confirm that they were activating the team. I gave them my location, my timeline when I would
    be able to report to Shenandoah.
- speaker: Respondent
  text: I immediately called the incident commander, Skip Brooks, and we discussed where we wanted to meet, and how we would
    proceed to Shenandoah Dispatch, and what were the - This was as they were moving the secretary, the assistant secretaries,
    and the director out of town.
- speaker: Interviewer
  text: To West Virginia?
- speaker: Respondent
  text: Yes, moving them into the bunker, and that was probably - I was in the pipeline and I was officially resourced, ordered
    at probably 11:00. So, they were having things going before even the Pentagon incident.
- speaker: Interviewer
  text: So, it happened really fast.
- speaker: Respondent
  text: Very, very quickly, because I'm at Shenandoah, I'm the division chief there, because the emergency dispatch center
    is at Shenandoah, things happened quickly, and I was tied in much more closely than you would typically have in an incident.
    Typically, it takes 24 hours to get us on the ground, and we were on the ground - we were at Shenandoah by 10:00 p.m.
    Tuesday night, and pulled together some plans.
- speaker: Respondent
  text: At that point, it was just reporting, trying to chase down rumors. Shenandoah had a Type-3 Incident Management Team
    in place.
- speaker: Interviewer
  text: What is a Type-3 Team?
- speaker: Respondent
  text: Type-3 is a local team made up of just Shenandoah National Park employees, and we kind of came in at 7:00 the next
    morning, Wednesday morning, took over for that Type-3 Team.
- speaker: Interviewer
  text: Actually, maybe this would be a good point for you to explain the other team, the Type-2, and the Type-1 that you
    are a part of.
- speaker: Respondent
  text: There is a hierarchy, and a Type-3 Team, which is the most informal, is specific to a park, and many parks don't have
    Type-3 Teams. Shenandoah is a very good-sized park for east of Mississippi and has a very competent Type-3 Incident Management
    Team.
- speaker: Respondent
  text: A Type-2 Incident Management Team is a regional team. So, the Northeast Region has a Type-2 Incident Management Team,
    and in the Incident Management System, it's broken down more into very large geographic areas, and there's an Eastern
    Type-2 Incident Management Team that is three-deep. Two of those three spots are from Southeast Region, where they have
    Southeast folks, and then one of them is from the Northeast Region. So, there are three Incident Commanders, and there
    are three operation section chiefs.
- speaker: Interviewer
  text: So, the make-up is similar.
- speaker: Respondent
  text: It's exactly the same. And they're on call, and Northeast Team was immediately requested and dispatched to Philadelphia
    to coordinate for the Regional Director. The Regional Director called on the Type-2 Team, the Regional Incident Management
    Team. They were on the ground by the 12th, and they were dealing with specifically New York and what was going on there,
    and managing the resources from a regional level, and then they were rolling information up to us.
- speaker: Interviewer
  text: How is that done? How is that coordination done?
- speaker: Respondent
  text: Most of it is done by phone or by fax.
- speaker: Interviewer
  text: But I mean, do they coordinate with their counterparts in the Type-1 Team, the national team?
- speaker: Respondent
  text: What we do is we're talking to that Incident Commander, so that's the hierarchy.
- speaker: Interviewer
  text: So, it's sort of Incident Commander -
- speaker: Respondent
  text: Reporting to Incident Commander and then - I mean, there's a lot of communication, operation section chief to operation
    section chief, but all of the formal communication is Incident Commander to Incident Commander. And the Western Team was
    activated. There was a fair number of resources on the ground by the 12th.
- speaker: Respondent
  text: One of the early tasks that we were given was the gathering of information and the collating of that information,
    and the movement of information from the field through Shenandoah Dispatch, to the director, and making sure that it was
    clear, concise, accurate information, so that she could report to the secretary, and answer the secretary's questions.
- speaker: Respondent
  text: The National Park Service kind of moved to the forefront for all of the bureaus because we've got a national incident
    management team, and we really have the resources -
- speaker: Interviewer
  text: Is that something that other Interior agencies don't have?
- speaker: Respondent
  text: They do not. They do not. Forest Service, [Department of] Agriculture, has probably eight or nine Type-1 Incident
    Management Teams, and they are specific to fire, and that's where the real distinction is. I don't do fire
