collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Maybe to just start if you'd identify yourself on the tape and tell me a little bit about what your role here with
    the Aviation Unit is and go from there.
- speaker: Respondent
  text: My name is Ken Burchell, Kenneth S. Burchell. I'm a pilot sergeant with the U.S. Park Police Special Forces Branch
    assigned to the Aviation Section here in Washington, D.C. I've been on the job about sixteen and a half years, and I served
    in patrol in District 2, the Special Weapons and Tactics Team, and here.
- speaker: Interviewer
  text: Well, maybe to just start with September 11th and where you were, what you were doing, how you first learned about
    the attacks on the World Trade Towers.
- speaker: Respondent
  text: Well, on the morning of the 11th, we were gearing up actually for the second round of demonstrations, World Bank,
    IMF demonstrations that were scheduled for I guess a week or so after that. And we had a detail of officers training,
    doing riot training in the field next to the hangar. I was actually assigned to that. I wasn't assigned to the flight
    crew that day. And my job was I was training officers how to extinguish themselves if they were hit with a burning Molotov
    cocktail. And we were pretty concerned about the threat of the rioters coming to Washington. So, there was already sort
    of a little element of tension to begin with.
- speaker: Respondent
  text: The way we first found out was that my wife called and told John Marsh, one of the rescue techs, to turn on the television.
    And she'd been watching the "Today Show" and saw the first aircraft hit the World Trade Center. And one of the guys ran
    out into the field and told us what was happening. And a bunch of us came in and we gathered around the television. And
    as we were on our way in, they said a plane has crashed into the World Trade Center. And you know, I guess like I think
    probably most pilots thought, oh well, didn't a plane fly into the Empire State Building during World War II? And it was
    a bomber, and the weather was bad, and they just flew it in, inadvertently flew it into the building. But as I recall
    the crew perished, but there wasn't a great deal of lost life.
- speaker: Respondent
  text: And as soon as I came into the TV room and I saw the scene of New York and the absolutely crystal-clear blue sky,
    I said, it's obviously not an accident. No pilot would ever fly his plane deliberately into an occupied structure. He
    would have put it in the harbor. So, we were all overwhelmed, but had our work to do.
- speaker: Respondent
  text: I walked back out into the field. A couple of minutes later another guy came running out saying, "Hey, a second plane
    has crashed in." Came in, saw that, thought my god, this is war. We're under attack. Still in shock and starting to think,
    well, I wonder if it's just going to be New York. Is it going to be, obviously, I guess waiting for the other shoe to
    fall would be a good description. So I remember going back out to the field and I was working with these mannequins that
    I was dousing with gasoline for the guys to train how to put them out and I walked back, I remember saying to one of the
    officials, the second plane has crashed in and they didn't believe it. They said, "I'll believe it when I see it."
- speaker: Respondent
  text: And a couple of more minutes go by and I hear this thud. And it really wasn't an explosion. It was like a thud, like
    a mortar round. Just a low - and I turned around and I looked towards Virginia and I could see a little arc of a fireball
    and then smoke gently flowing up, but like a straight column.
- speaker: Interviewer
  text: So, you could actually hear it all of the way over here.
- speaker: Respondent
  text: Oh, yes. And I don't know how much impact that had on the sound, whether it would have been more like an explosion,
    but it was definitely a low thud. And I started running back towards the aircraft. And as I was running through door,
    I'm yelling for the crew. I'm not sure my exact words, but the effect was let's go. The alarm went off, which was the
    crash phone from National.
- speaker: Interviewer
  text: Is it literally a phone that you pick up?
- speaker: Respondent
  text: Yes, and I'll show you. We'll ring it, but a horn goes off at the same time and it's a direct line, a hot line. And
    it goes off every morning at 9:00 for a test and periodically for in flight emergencies. So, I heard the horn go off,
    but at that point we were already moving towards it. I was going to tell the crew, point to the smoke and everybody, I
    was yelling at everybody, Hey, let's go. There's something going on." Galey apparently took that call. I don't know what
    was said on that end, but the duty crew which was Galey, Marsh, and Dillon came running out. I yelled something to them
    about I'll get the second aircraft, because I thought about jumping on the first aircraft. So, I'd get the second aircraft.
    They ran out to start.
- speaker: Respondent
  text: I saw Keith Bohn, one of the other pilots, coming out of the back and I said, Keith, let's go. We'll take the second
    aircraft. So now we had two pilots, but no medics. And in the training, in the field, and I think I might have mentioned
    it before, but we have this program with the military medics, the DOD medics. It's been in place for over a decade. We're
    very proud of this. This was like a real, we were integrally involved in forming this whole military medical support and
    wrote a class around it, teach the class around the country, something we're very proud of. Well, two of these medics
    were over in the field. I told Keith, I said, "Fire it up and I'm going to go and get the medics," something to that effect.
    So, I ran over and grabbed the two medics and ran back.
- speaker: Respondent
  text: At this point, we'd been running around a bit and everybody was pretty focused. Nobody was out of control, or screaming,
    or anything, as you'd expect. This is what we do for a living, but it still seems like, I mean there was a tremendous
    amount going on all at once. We're launching an aircraft, trying to get the second aircraft out.
- speaker: Respondent
  text: Get the medics, we bring them back. I tell them to go throw on a couple of flight suits, because they were wearing
    non fire-retardant clothes. And they ran in to do that. We started putting in the mass casualty kit. And Tom Greer, the
    maintenance supervisor, is trying to put it in. And of anybody that you want doing anything mechanical, he's the guy.
    There's no question. But unfortunately for him, we were all trying to help him which you know, I'm sure prolonged the
    process tremendously. But Keith started the aircraft. Tom's getting the mass casualty kit installed. We've got the other
    guys changing up. All of this takes two minutes, maybe.
- speaker: Respondent
  text: We launch. We take the unit commander and the XO on board. They're not trained as crew members particularly, but the
    thought at the time was who knows what we're going into and even partially trained people might, they're certainly police
    officers so -
- speaker: Interviewer
  text: And the unit commander is Lieutenant?
- speaker: Interviewer
  text: And the XO is?
- speaker: Respondent
  text: Sergeant Bernie Stasulli. So, we loaded up so now we have like the family wagon packed full of people. We launch.
    As we launch, Eagle One now given authority on the scene and circling. We launch. Almost as soon as we launch, they tell
    us there's another aircraft inbound. I don't remember how we got that in formation, but we knew right off the bat that
    there was another aircraft coming. The Eagle One crew -
- speaker: Interviewer
  text: An unauthorized aircraft. So, you have that concern.
- speaker: Respondent
  text: Right. Immediately. And we didn't really need to be told that after watching the World Trade, but nonetheless somebody
    confirmed there was something actually coming. Eagle One directed us to land to do the MEDEVACS. So, we pretty much launched.
    As we get closer, I mean the smoke is just roaring out of there. And at some point -
- speaker: Interviewer
  text: Did that make flying difficult, the smoke?
- speaker: Respondent
  text: We weren't actually in the fire. It was such a clear day it was very easy to keep our distance from it. But if we
    were approaching it from the south, we would clearly have had to avoid it. As we got closer, we were glancing around to
    see what else was burning, and frankly kind of anticipating more stuff going on. As we got close, we were glancing around
    to see what else was burning, and frankly kind of anticipating more stuff going on. As we got close, we pretty much launched,
    went straight over and landed immediately without a whole lot of fanfare. We landed on the west side of the highway there.
    Got out, kind of developed a rough plan. You know, the plus from doing this routinely is the fact we're going on a MEDEVAC
    wasn't a big drama to us.
- speaker: Interviewer
  text: And I think you mentioned to me last week that you had exercised for mass casualty response.
- speaker: Respondent
  text: No, we exercise, we respond on them. I mean we do the real deal. You know, when the school bus turns over in PG County,
    we're one of the helicopters that goes. So, we are not only trained to do it, but we actually do it. And there's a huge
    gap in between people who are trained to do something and people who actually do it. So, there wasn't a sense of great
    crises, just that the ballgame was on and everybody needed to be at the top of their form.
- speaker: Interviewer
  text: So, tell me about some of that initial planning when you landed there. How the discussion about what needed to be
    done?
- speaker: Respondent
  text: Well, we had, clearly, we wanted to keep Keith with the aircraft and running, because we wanted to be able to get
    out of there. And again, we're still thinking you know, anybody we can get away from here before that second airplane
    crashes stands a chance of living. So like half of this is rescue. It isn't just a MEDEVAC. We're not just picking up
    wounded and taking them to the hospital. We need to rescue him from here. We need to get him away from ground zero.
- speaker: Respondent
  text: So, we said that - Keith said he wanted to keep Bernie - Sergeant Stasulli - to maintain the perimeter around the
    aircraft. Lieutenant Cholack is an EMT, I am an EMT and the two medics would then go up to see, basically find out what's
    going on. We could be - and I think at this point we were thinking there'd be 800-900 injured. We'll just be ferrying
    people all day. So, let's go and establish a procedure. In my mind I'm thinking what we'll do is we'll probably set up
    a permanent LZ. We'll leave two of these guys here. All they'll do is coordinate the landing zone and we'll just start
    ferrying people back and forth to the hospitals. This will be an all afternoon deal. We'll be going to Baltimore. We'll
    be going to Richmond with burns and such, but we'll establish. We're the first aircraft in. We're going to set up how
    this is going to work.
- speaker: Interviewer
  text: The process.
- speaker: Respondent
  text: We go, we cross the roadway. People were very, I'm still - I always say how impressed I was with the people from the
    Pentagon. They were not panicked. They were alert to what was going on, but they were in the game. They were moving with
    a sense of purpose. They had stuff to do. Many of them didn't, they wanted to help. They weren't sure what to do, but
    they knew not to get in the way. They just stood there ready to go.
- speaker: Interviewer
  text: So, as I understood there was sort of movement away from the building, people who were evacuating, and also some movement
    towards the building, people who wanted to assist. Is that?
- speaker: Respondent
  text: Right, but I think they were at different times. I think at first people were evacuating the building. When we first
    got there, there were actually people, one person who came out on fire. I mean too far away from us to help, but at a
    distance, when we were landing somebody was coming out on fire. So, at that point, I think people were mostly getting
    away from the building. But in the amount of time we were there, they were also reforming up and going in to try to help
    the others.
- speaker: Respondent
  text: We crossed the roadway and walked into the debris field and actually stepped over small pieces of metal that were
    probably from the aircraft. There was a light pole that was knocked down that later I read it landed on a cab. The plane
    hit it, knocked it down, and it crashed into a cab.
- speaker: Respondent
  text: The cabbie lived, and they interviewed him. We stepped over that, walked up to the triage officer, which is the fire
    department officer who's responsible for sorting the wounded. And he recognized me and called me by my first name, and
    I said, "How many patients do you have to fly?" in other words to be MEDEVACED. And he said eleven. I was very surprised,
    but I really thought when he said eleven that was the first wave.
- speaker: Interviewer
  text: It surprised you because you expected more.
- speaker: Respondent
  text: Right. I anticipated him either saying hundreds. But I still took his eleven even though he was obviously very - appeared
    very squared away - but I still took the eleven to mean on the first load. I called on the portable up to Eagle One and
    said, "John, we have, the fire department is reporting eleven patients to go. You better get hold of Maryland State for
    more aircraft." And he said, "Okay." I said, "We'll set up to take the first group." Now remember we had the ability to
    carry four patients because we bolted in the thing that Tom bolted in before we left.
- speaker: Respondent
  text: Then at some point in this we split up. One of the military medics was actually a physician's assistant. He and Lieutenant
    Cholak went to the triage area to start sorting things out.
- speaker: Interviewer
  text: To help out.
- speaker: Respondent
  text: I went back to get, to move the aircraft, to get Keith to move the aircraft up closer to us, because we're in that
    clover leaf still which was fairly far away. Called Keith on the radio and asked him to move.
