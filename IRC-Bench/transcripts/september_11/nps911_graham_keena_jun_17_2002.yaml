collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: Okay. Keena, my first question is from the moment you were aware of what was going on, what were some of the things
    that occurred, as you were aware that something had happened.
- speaker: Respondent
  text: I was watching TV that morning. It was Tuesday. It was around 9:00 or so, and there were reports all over TV about
    what happened with the World Trade Center, so I decided to call Karen up at Arlington House, and tell her what was going
    on, and that was around 9:20 something, or so. And then, we were just talking about the World Trade Center, and she said
    she was going to turn on the radio to hear what was going on. Around 9:30 she says I have to get off the phone; I see
    Joy running. I said, okay. And so, she hung up and I hung up, and I looked at the TV, and about five minutes later or
    so there was a report on CNN that, indeed, a plane had crashed into the Pentagon, closest to Arlington Cemetery. I tried
    to call back, but I couldn't get through, because I was worried about everybody here.
- speaker: Respondent
  text: So, that was pretty much going on, and later on, as time passed there were reports that The Mall - there was a bomb
    at The Mall. There was a report that somebody discovered something at the Capitol Building. My roommate is a reporter
    for "Congressional Quarterly," and he's always on Capitol Hill, so I was worried about that. I couldn't contact him. I
    couldn't contact my friend who works at the Pentagon Building. I just couldn't get in contact with anybody. Around 10:30
    my roommate came back with a bunch of reporters, and he says that everybody decided to come to the apartment, because
    they didn't know where else to go, so they set up all their computers to keep writing the stories, and they had the news
    on all day.
- speaker: Respondent
  text: And when they started making comments, when the CNN and all the other news shows started making comments about the
    bombs being near the State Building; they made comments about bombs near The Mall area. We were all getting in hysterics.
    I know I was panicking, and finally, my roommate said stop; let's look out the window, because we live like a ten-minute
    walk away from The Mall. We saw no smoke, but we did see over near the Pentagon, the smoke coming over towards Washington.
- speaker: Respondent
  text: 'So, at that moment, I tried to call my mom, and I told her what happened, and then I couldn''t use the phone anymore
    because all the reporters needed to use the phone to make their contacts, and we all made a pilgrimage over to Safeway,
    where we ran into a lot of Congressmen and Congresswomen over there, and everybody''s buying groceries and alcohol, and
    we walked back and the reporters stayed there until around 9:00 or so, and I was quite shocked, because we were watching
    TV, and I wanted to find out: "was Arlington House going to be closed?"'
- speaker: Respondent
  text: And the bottom of the screen said, well, all Park Service are essential employees, and you had to go to work the next
    day. And that was kind of disappointing. And when I got there the next day, we were closed, there were visitors still
    coming up to the cemetery, getting upset because they couldn't come to the cemetery to visit, and we got on the hill,
    and we basically did office work, and I had to go do an errand for my supervisor. I think I had to go drop off some keys
    to one of the guards down at the bottom of the hill, and I did that. I went to the left - drove down to the left - decided
    to drive to the right coming back up the hill, closest to the Pentagon Building, and that's when it truly hit me, because
    I saw the smoke was still coming, and you saw all the damage, and I could barely drive the car, because I started crying,
    and then I finally got up here, and started crying, and Karen and I took a walk in the cemetery.
- speaker: Respondent
  text: Since then, I've - it's hard for me to talk to visitors about what happened that day, even though I wasn't there at
    the site. Some visitors are just curious, and you can tell they're very sincere about it. Some visitors are - the way
    they say, "Oh, were you here when September 11th happened?" - And those are the people that I don't want to talk to, because
    it seems like a morbid curiosity, rather than just a - you know, sincere curiosity. Everybody wants to come on top of
    the site; rather than go in the house, they want to ask where the Pentagon Building is, and some people are even disappointed
    that so much construction has already been done on the Pentagon, that they can't see the hole anymore where the plane
    is.
- speaker: Respondent
  text: So, those are things I have to work on, as far as dealing with visitors when they inquire about September 11th, and
    where can they see the Pentagon Building. And most of the time I just cut them off, and I say I wasn't here. And then
    they want to talk further, and I just smile and nod and kind of walk away.
- speaker: Respondent
  text: So, I guess my coping mechanism with the public at large is I just don't want to talk about it, and I don't want to
    go to go to mass gatherings to memorialize that day. I don't want to do anything like that. I don't want to sing patriotic
    songs, even though I love my country. I just don't deal well with the public at large, as far as grief is concerned. Anything
    else, I'm willing to deal with the public, and I love dealing with the public, but as far as grief, I don't - outward
    display of it is not my thing.
- speaker: Interviewer
  text: Mmhmm. Can I backtrack a little bit, just the pace we're going at. You said - and I apologize, because part of the
    problem is here, that messing here with equipment, and here it is betraying me in some way or another. You - where were
    you when this - when you finally first became aware of what was going on?
- speaker: Respondent
  text: I was in my apartment watching the news because Mondays and Tuesdays were my off days, back then. And watching the
    news and seeing something on CNN about the World Trade Center had been hit; then another plane had been hit - another
    plane hit the other tower, and I thought, whoa! I'm going to call Karen and tell her about this, and so basically, I was
    sitting on my floor watching TV, when all of this happened, and when the first plane hit, I just thought that - oh, well
    - that was a freaky incident. And I wasn't going to talk to anybody about it, except, you know, later in the day when
    my roommate came back or when I came back to work, and say, woah, did you hear about that?
- speaker: Respondent
  text: And then when the second plane hit, I just felt compelled to call Karen, and tell her what was going on. So, I wasn't
    at the site, but on the phone with Karen. That's when the plane hit the Pentagon, while I was talking to her. And she
    had said, "I see Joy running." Joy is another coworker of ours, and she says, "I have to go," and I was worried, and I
    kept watching TV to see what's going on, and then finally, they said the plane had hit Arlington House, closest - I mean,
    Pentagon closest to Arlington Cemetery, which to me said closest to Arlington House. And I tried to call back, but couldn't
    get through, and I guess that was a dumb move on my part.
- speaker: Interviewer
  text: How do you mean?
- speaker: Respondent
  text: Well, when she said Joy was running, when I think about it now, Joy was running because the plane had hit; she had
    heard something, and to try to get through with all the - the House was officially open at that time, but you know, you're
    not thinking about that, and all that entails, trying to get visitors out of the way. Is it that it hit the site; you
    know? Did it knock out lines? What's going on? Obviously, people wouldn't be sitting there by the phones to receive more
    phone calls.
- speaker: Interviewer
  text: They would be out there - you're saying out there working on trying to deal with what's going on?
- speaker: Respondent
  text: Yes. We're evacuating.
- speaker: Interviewer
  text: Uh-huh. Okay. So, you mentioned - that's exactly what happened when you were in your apartment watching what happened.
    Then about 10:30 - by about 10:30, you said some reporters and people had set up shop in your apartment?
- speaker: Respondent
  text: My roommate is Defense and International Affairs Reporter for "Congressional Quarterly." He spends about 60 to 70
    percent of his time on Capitol Hill. And that's where he was that morning, and I was worried about him, because reports
    just from CNN, Fox, you name it, everywhere you - you know, watched TV they were saying, oh, they're going towards the
    Capitol. Now there's one at the State Department, and on and on, so when they were talking about the Capitol Building,
    I was worried, because he was there.
- speaker: Respondent
  text: I have another friend who's a staffer for a Congressman, and I was worried about her, as well. And around 10:30 or
    so, he - I see a group following from my window, and I see - Neil is my roommate - the people - the person who's heading
    that group, and he comes in, and he says, well, we decided to walk from the Capitol Building - which was only like a 15-20-
    minute walk away from our apartment - and if you don't mind, they're going to stay here, because our boss wants us to
    report about this.
- speaker: Respondent
  text: And so, each one of them had a laptop, and they kind of set up shop, and they had their cell phones, and they were
    having bad connection problems, and so they used our line, and I could only get through a couple of calls then, and I
    called my mom and told her what happened, and I called a friend of mine, who lived in Athens, and told him what was happening,
    but basically, the whole day was them in our living room, reporting, and watching the news, and the odd thing about it,
    is we were all panicking. I was panicking, because we were so near all these buildings, and we live so close to The Mall,
    and when they're saying that - you know, The Mall is on fire; it never occurred to us to stop. It never occurred to me
    to say, wait a minute, all I have to do is peak out my window, and see that there's smoke.
- speaker: Respondent
  text: And finally, Neil calmed everybody down and said let's go outside and see. We walked outside; there's no smoke. So,
    there was a lot of rumor, and we have EPA, Department of Transportation, a whole building, all of those things, near my
    apartment, just across the little bridge, and I was worried about what if they want to hit the EPA?
- speaker: Respondent
  text: What about Department of Transportation? What if they want to take out - ? And I was just so worried because there
    were so many government buildings.
- speaker: Interviewer
  text: Where are you located, by the way?
- speaker: Respondent
  text: I live in southwest DC.
- speaker: Respondent
  text: So, I live, like I say, very close to the Capitol Building, but very - especially close to The Mall. I live - my area
    is called "L' Enfant Plaza."
- speaker: Respondent
  text: And - and then the other way I can look over into Virginia and see - you know, the Pentagon - well, in that area,
    that vicinity, and sure enough, we did see smoke coming from that area.
- speaker: Interviewer
  text: Yes. Okay. So, this was all occurring the first day?
- speaker: Interviewer
  text: You're saying by the - what happened for the rest of the day?
- speaker: Respondent
  text: Well, the rest of the day, the reporters camped out there. A couple of them were breaking down, finally, and crying.
    I mean, men and women. We walked to the grocery store when we -
- speaker: Interviewer
  text: This is Safeway?
- speaker: Respondent
  text: Mmhmm. Safeway. We realized - we walked to the grocery store around 3:00-3:30, when we realized that this was going
    to be an all-nighter to get food, because we didn't have enough food to feed about 10-11 reporters. So, we all walked
    over there, and just got food like everybody else. Oh, I - there's - who did we run into? I think it was Sylvia McKenney,
    a couple of other Congress people I could not recognize, but I recognized her, and they were all in Safeway - people just
    buying toilet paper, frozen pizzas, just anything, and there was a little convenience store across the way that was selling
    - that sells alcohol, and so everybody - man and woman, alike, you know, business suits, even poor people, just walking
    over there, and there was a long line, like out the door, people just buying alcohol. And I guess that's the only way
    you could really deal - a lot of us could really deal with it.
- speaker: Interviewer
  text: Right. So, this was from 3:30 in the afternoon until?
- speaker: Respondent
  text: Around 9:00 is when the last person left.
- speaker: Respondent
  text: Then, I was saying to Neil, so I said, I wonder if I have to go to work tomorrow, and we just had it on - oh, what
    channel was that? Channel Five? And they were listing all the agencies open, and it said that all Department of Interior
    - all National Park Service people are essential employees, which I commented "essential?" [Laughter].
- speaker: Interviewer
  text: Say what you do?
- speaker: Respondent
  text: I work in the middle of a cemetery, what could I do? And so, I had to - you know what I said, if you - it also said
    at the bottom, if you take the day off, then you would have to take a sick leave or something, which I thought was ridiculous.
- speaker: Respondent
  text: And so, I just put on my uniform, and I got on the Metro that day, and it was just extremely quiet, because the stop
    after Arlington Cemetery is Pentagon, and I realized that a lot of the people that I ride the Metro with on the Blue Line
    worked at the Pentagon, and some of these guys - military guys who got on at Rozland, were just sitting down and hiding
    their faces behind newspapers, and crying, and nobody said a word. Not one word on the entire trip on the Metro, and it
    just struck me that these military guys, especially, were weeping behind newspapers, and still had to go to work, though.
    And when I got off the Metro, that morning - this was Wednesday - I was just getting angrier an
