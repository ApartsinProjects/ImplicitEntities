collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: How did you first learn of the terrorist attacks on the World Trade towers?
- speaker: Respondent
  text: My wife called me. I was here in this office, and I got a call from my wife who said, "Turn on the television, there's
    just been an incident at the World Trade towers." I turned that on and watched the footage, the filming, on the television
    of the first tower having been struck, and while we were watching, a few minutes after, we watched the second tower being
    struck. And then, as we were trying to come to grips with that at some distance, we heard someone say that the Pentagon
    had been struck. I walked out on the balcony here and I was able to see that, to see the smoke coming up from the Pentagon
    from a distance and then walked back in and watched the footage here.
- speaker: Interviewer
  text: So, what was going through your head? What were some of the things that you thought needed to be done quickly?
- speaker: Respondent
  text: Well, from the National Park Service standpoint, I wasn't thinking that. I was thinking that we were probably not
    directly involved, and my focus was to learn more. I've been through several of these kinds of major incidents before,
    probably the most significant one was as superintendent of Everglades National Park when Hurricane Andrew came through
    - without a doubt a national disaster, while localized to one area. Over the years I've learned that the tendency is to
    run around and do something because there is a lot of energy that wants to get out. And the best thing to do is try and
    stop, slow down, and try and find out more about what's going on and confirm it. And one of the things that tends to happen
    right away in these kind of events is that solid information becomes very, very difficult to weed out from all of the
    speculation and all of the rumors and all of the second-hand or third-hand reported information.
- speaker: Interviewer
  text: All the confusion.
- speaker: Respondent
  text: The confusion tends to mount. That day, I was here with the rest of the folks in the building dealing with just trying
    to find out, learn more information. No National Park sites had been struck so in terms of our immediate need to mobilize
    to deal with an event or incident, there wasn't much to do except to try and learn more about what potential existed.
    And anything we were learning, our folks at our sites were learning in the same instance because we were watching it live
    on the news coverage and hearing probably more directly about what was going on that way.
- speaker: Interviewer
  text: Was that your primary sources of information?
- speaker: Interviewer
  text: Were the Park Police providing some information through their communication system?
- speaker: Respondent
  text: They were providing information that they were being drawn into response as a support agency, but that was information
    we were receiving that didn't require decisions at the national level. It was pretty much all the propositioned plans
    and the resources were going to work. Mostly with Park Police, it was helping to deal with traffic flow and -
- speaker: Interviewer
  text: And potential threats here in the city?
- speaker: Respondent
  text: And potential threats here in the city associated with their work around the White House. All of that is operationally
    set up and tends to crossover and go into place directly with the folks involved. So, we were getting some reports on
    how they were deploying. But mostly folks were trying to learn what was going on for the first couple of hours, from the
    9:00 timeframe until about 11:00. And then there was a determination to basically send people out of Washington, to shut
    the government down, basically send people home, which was quite a mess on that first day. And there was a determination
    to send some key - the Director and some key folks from the Department of Interior to - initially our folks were to relocate
    to Harpers Ferry [West Virginia]. And then they drew them into the National Conservation Training Center.
- speaker: Interviewer
  text: I wanted to ask you about the implementation of the continuity of operations plan and how effective the implementation
    of that plan was.
- speaker: Respondent
  text: It wasn't very effective. It was a plan that was done without a lot of actual experience and what it said was we'd
    go to NCR, National Capital Region, relocate out of this building. The continuity of operations plan, like any emergency
    plan, has got to have sound assumptions on what event it's reacting to. And if there was a fire in this building or a
    bomb threat in this building, relocating to the National Capital Region makes sense. If there's a nuclear threat to Washington,
    then you've got to leave Washington. So, having an alternate location outside the city that you could deploy to was important.
    So, having the ability to trigger a variety of responses based on the circumstances you were facing required a much more
    flexible and sophisticated plan than we had in place. That first day, we basically - I mean, I went along with everyone
    else, we were basically told just leave. In a couple of hours though - We made a couple of runs to the, as I recall, basement
    of the Interior Building.
- speaker: Interviewer
  text: The National Business Center down there? I think that's come up. No? Okay.
- speaker: Respondent
  text: There were a couple of points where we were told "get downstairs now," and everyone in the building went down into
    the cafeteria. And a lot of confusion and a lot of concern that no one knew why we were being told to head downstairs,
    and concern that it wasn't clear that there was any emergency team or procedure in place. So even for the department there
    wasn't an orderly way of handling things. There wasn't a known threat. We had some of our folks here who tried to help,
    our Director to the head of our Fire, Aviation, and Incident Management program, Rick Gale, and several others helped
    with getting folks organized to communicate down in the cafeteria with the folks in the building about what was going
    on. And there were just some basic things about communication that nobody was handling.
- speaker: Interviewer
  text: There's no public address system in this building.
- speaker: Respondent
  text: No public address system, and nobody was tagged with the responsibility - once folks said, "get everyone to the basement,"
    nobody was tagged with the responsibility of being the communications link with those folks. Ultimately, we were able
    to get that across that somebody needed to do that and to get people connected to each other. And then up to the point
    where first our Director and then Steve Griles got up and began to explain what they knew was going on and calmed a fair
    amount of consternation that was going on. And ultimately, they basically said, "Everybody get out, go home," which they
    all did. And I did as well. But from home I basically set up a conference call with several of my counterparts in the
    regional offices where we talked about what we knew was going on, and I updated them on what plans we had initially to
    operate with. I came in the following day and not a lot of folks were here. In fact, most folks were told to stay home,
    but a few of us were in the following day, operating from this building, in a skeleton crew type of operation.
- speaker: Interviewer
  text: In those first few hours afterwards were you meeting with the Director and other senior staff, maybe down in the Director's
    office or something? I just wondered what kind of guidance you might have been given by the Director in those early hours
    after the attacks.
- speaker: Respondent
  text: I don't think there was any guidance. The response in those first few hours, everybody was stunned. Everybody was
    trying to understand what implications there were. Certain with regards to their own personal safety of people at our
    location here and to trying to understand whether or not there was any information that indicated either a strike on,
    or any kind of a specific threat to, any of our areas. I don't think we had any specific information but number one, none
    of our areas were struck so we were not in response mode in those areas. And the next question was whether or not there
    was information related to imminent threats. We certainly had heard on the news that there were things about the White
    House, so there was still the area in downtown D.C. that might get hit. But we weren't hearing specific information just
    yet.
- speaker: Interviewer
  text: Were you getting information about how some of our sites in New York city had been affected - Federal Hall, Castle
    Clinton, Ellis Island, the Statue of Liberty? Where you starting to get those reports in?
- speaker: Respondent
  text: In that morning? No, it took about an hour and a half or so for us to see what was going on in New York City. Well
    we knew Federal Hall and the Battery [Park] and Castle Clinton were relatively nearby. No one expected the towers were
    going to collapse until we saw them come down. When they came down, we realized there was something serious was going
    on there at which point, we weren't getting - there was not a lot of information going out of New York City at that point.
- speaker: Interviewer
  text: Their land lines were down -
- speaker: Respondent
  text: Land lines were down. Cell phones were completely blocked. So no, there was not a lot of information flowing. We knew
    there would be affects up there, but again we had no information that there was a direct impact on our facilities. Even
    with the collapse of the towers, we had concerns, but no information. And frankly that day it was impossible to communicate
    in any normal way in and out of this city. We were able to get, because the Park Service does have an incident response
    system that we are able to organize to deal with major events.
- speaker: Interviewer
  text: Were you involved in that decision to activate that Type-1 Incident Team?
- speaker: Interviewer
  text: Can you tell me a little bit about how that decision was made and when? A little background on it?
- speaker: Respondent
  text: I strongly recommended - I had Rick Gale here as well as others from our Ranger Activities office, Dennis Burnett,
    and others. Given my experience with major incidents, my perception was that we needed a Type-1 Team deployed immediately
    to coordinate all of the agency's actions because our headquarters function was disrupted in ways that there was no orderly
    plan in place to deal with. And it was almost impossible to put any orderly plan in place. The first thing that happens
    during one of these incidents is your plan goes out the window, because it never unfolds the way you think it will. You
    usually put a plan in place for the last event and that's is not what happens next.
- speaker: Interviewer
  text: We were talking about the activation of the Type-1 Incident Team and activation of the Incident Management System.
    You were explaining how you came to that conclusion. Had you had experience with the system with Hurricane Andrew?
- speaker: Respondent
  text: We've used the incident command system on a massive scale - on an interagency basis - for years and years. Probably
    the largest example that the Park Service has been involved in is the Yellowstone [National Park] fires in 1988. We had
    twelve thousand people working on those and had literally an area command involving multiple agencies. Twelve thousand
    folks deployed fighting that fire. It grew up around the edge of the wildland fire system. It's a highly structured command
    and control system that can be scaled up or scaled down to any size event - and as we began to use it - any type of event.
    So we basically began to use it in an all-risk mode, where we can have an incident team deployed, and if an incident became
    a much more significant event, we could bring in resources from around the country, whether they be security resources
    or firefighting resources or resource management resources or oil spill resources, you name it.
- speaker: Respondent
  text: You could bring a massive number of people together drawing from all the agencies all over the country to address
    whatever you were facing and you pull it into a structure that had an incident management team that's basically trained
    in the main functions of incident management. And there are teams that are trained at a local level, at a regional level,
    and one that is able to handle national scale events, which is a Type-1, Type-2 versus a local incident team. There's
    a management team that deploys together that has trained together, works together, so they know each other. They deploy
    as a team and they handle everything from planning to operations, to the logistics associated with supplying the incident
    with whatever personal or material or support is needed, to public information, which is both information to people on
    the site as well as the press.
- speaker: Respondent
  text: So, it's usually built around a five-member team. And knowing that and the Park Service having committed to using
    it in an all-risk mode, I thought that that was the most capable tool that we could deploy quickly, where people were
    pre-trained and pre-positioned to deploy to handle just about any kind of event that occurred. And I strongly urged, because
    of the nature of what was unfolding, that we didn't have a situation with regards to how we handle relocation of our headquarters
    function, that was responding to an already known set of circumstances. So, we needed folks who could make it up and respond
    to it as they learned what was going on. We needed the ability to liaise what we were doing with the department and higher
    levels of government and that's a capability that this incident command process
