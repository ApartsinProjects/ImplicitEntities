collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: How and where did you first become aware of the attacks on the World Trade Center and the Pentagon?
- speaker: Respondent
  text: Well, it was shortly after the planes were flown into the World Trade Center. I was in my office in Main Interior
    on the 7th floor. I can't recall who it was, but someone came down the hallway to my office very excitedly and told me
    that either a plane or two planes, I can't remember if the person told me both planes had been flown into the World Trade
    Center or just the one, but that it was on television down in the office.
- speaker: Interviewer
  text: What were your immediate actions then? What were some of the first things going through your mind that had to be done?
- speaker: Respondent
  text: Well, one of the first things that initially struck me was, we've got to get our emergency response team in place
    in the event that other incidents were going to occur in and around the Washington Metropolitan Area. I went immediately
    back to my office, got my police radio that I keep in my office and turned that on, and it was very shortly thereafter
    the plane struck the Pentagon and we were receiving all kinds of reports. Initially, we tried to establish what could
    amount to a command center in the conference room on the 7th floor. But with basically everybody going in different directions,
    it wasn't feasible to establish that kind of an office at that particular point in time. It really needed to be located
    down lower in this building and all of the appropriate folks had to be contacted in order for them to go there - basically,
    the command staff of the Department of the Interior and the various bureau heads. So, there was a point in time when that
    needed to take place. And then I was very concerned for our monuments and memorials. Being a major with the U.S. Park
    Police, I went out to my police cruiser and did a very quick inspection of our monuments and memorials, physically driving
    to every one of them to make sure that all of our officers were in position in the event we were going to be faced with
    subsequent attack of some kind. I went by the Washington, the Jefferson, and the Lincoln. And I actually positioned myself
    on Memorial Bridge. And the reason I did that was because there was a very suspicious package that was on the sidewalk.
    It was a box of some kind and some of the contents had partially come out. It was quite suspicious, so I called in a suspicious
    package and had both ends of Memorial Bridge shut down until we were able to get a canine unit to respond and check that
    package out. So that took place over probably half an hour or so, maybe 45 minutes, we had to have the bridge shut down
    and divert traffic. It was on the bridge off of it, and then we had to shut it down at both ends. Once that was established,
    once we had officers on the scene and the bridge was secure, I went back to the Department of Interior and at that point
    in time we had established basically a command center down in the basement at the National Business Center conference
    room.
- speaker: Interviewer
  text: When you visited the different monuments and memorials, were you satisfied with what you saw there, the level of security
    and of awareness?
- speaker: Respondent
  text: Yes, I was. There was an immediate response by the U.S. Park Police who provide security for the monuments and the
    memorials and the downtown core area. The shift commander and the officials responsible for our operations division immediately
    stripped our districts of any additional personnel that they had available and sent them down to the monuments and memorial
    area to ensure that we had sufficient protection, and we did. And there was basically a call out to bring in officers
    on their sign off days and officers who might not otherwise be scheduled to work and had them come in. So, I was happy
    with the response there. I was satisfied. I knew we had officers responding to the Pentagon. We had a couple of our motorcycle
    officers over there right after the plane struck the Pentagon.
- speaker: Interviewer
  text: You mentioned realizing that you, not you personally but the leadership here needed to convene an emergency response
    team. Are you referring to the Type-1 Team?
- speaker: Respondent
  text: No, not necessarily the Type-1 Team.
- speaker: Interviewer
  text: Is there another emergency response team that I don't know? Who makes up that team I guess I'm asking?
- speaker: Respondent
  text: Yes, not so much the team as it is the decision makers. The decision makers within the Department of the Interior
    and the various bureaus needed to get together in a safe environment, one where there was communications, one where they
    could decide what actions they were going to take, and be coordinated as a group as opposed to certain bureaus doing certain
    things differently than the group as a whole. That did take place, fairly quickly, despite the chaos that was going on
    at the time. We had the different bureau heads. I know the Director of the Park Service was there, Fran Mainella, the
    Assistant Secretary. We had those folks available immediately. Mr. Griles was there. Brian Waidmann. All of the players
    that needed to be there were actually there to be able to make these decisions and evacuate. I mean we had to decide who
    was going to be evacuated, what we were going to do for security of this building, how we needed to get people to certain
    places. Roadblocks were put up around town. We had a major evacuation going on over at the Pentagon. Our helicopter made
    numerous emergency evacuations of personnel from the Pentagon. Those were the injured persons and the persons who'd already
    been deceased. So, we had to figure out where we were going to continue with our Continuity of Operations.
- speaker: Interviewer
  text: At what point then was the department's continuity of operations plan invoked? Or what parts of it, or is there anything
    you can tell me about the plan that isn't classified?
- speaker: Respondent
  text: Yes, I don't know at what level I can discuss what was done and how it was done. But I can tell you in general terms
    that I was very impressed with how quickly the plan came together and those folks that needed to go to an alternate location
    got there. The spirit of cooperation and teamwork was heartwarming. It was truly a team effort. We met downstairs in the
    conference room at Main Interior, decided who needed to be evacuated. The U.S. Park Police responded and made personal
    evacuations of key staffers. We had police cars that came off of the street, loaded up folks and took them, immediately,
    to another alternate location. It was decided that the bureau heads and the Department of Interior decision makers would
    relocate there. We assisted in that. The director of the Park Service, Fran Mainella, needed to go there and she was brand
    new at the time. She really didn't know me. The first time she had an opportunity to meet me was in that meeting. And
    I can recall sitting at the table with her and leaning over and asking her if she felt that she needed a U.S. Park Police
    official out there and she said, "Yes, I think I do. I'd like to have one out there." And I said, "Do you have any idea
    how you're going to get out there?" She said, "No." I said, "I'm taking you." She had her privately owned vehicle here
    and I had, of course, my police cruiser, knowing where we were going. I'd been there several times. I knew she really
    didn't know how to get there and had no real means by which to get there other than her own personal vehicle. I had her
    follow me in my police cruiser to her home and we went around roadblocks. Got her to her home, she was able to grab some
    luggage. I raced home, grabbed some clothing and some luggage. And it's funny. My wife said, "Well, you probably haven't
    had anything to eat." I said, "No, I haven't." I said, "But make two sandwiches, one for me and one for the director."
    So, she quickly made two sandwiches. I grabbed those and raced back to the Director's house. She loaded in the car and
    we were off. And we were up there quickly. And that's when certain decisions and issues were discussed. Steve Griles was
    leading those discussions.
- speaker: Interviewer
  text: Did some of those early discussions involve park closures, the decisions to close parks around the country? I understand
    that it was pretty obvious about the ones in the Northeast Region. Do you recall any of the discussions about that, what
    people were thinking?
- speaker: Respondent
  text: Well, you know part of the problem that we had to grapple with, initially, was we really didn't know what was a target.
    We had a pretty clear indication that economic centers, the World Trade Center, was a target. Pentagon - military target.
    But we didn't yet know if any of our, what I would consider, precious national icons were ever really on the list. There
    is certainly probably even more than speculation that the White House was on that list of targets. There's also speculation
    that other institutions very near to the Main Interior Building here was also on a terrorist short list of targets. But
    I don't think at that point in time we had an understanding of the terrorists' motivation and whether or not they considered
    something that we would consider precious was on their list. And I refer to such things as the Statue of Liberty, Golden
    Gate Bridge, the Arch, certain other landmarks and icons that we hold near and dear, Independence Hall, the Liberty Bell,
    I mean we just didn't know. So, initially, our response was let's increase our security at all of our areas for general
    awareness, and there were certain areas that were immediately closed down. It didn't really have a dramatic impact on
    the function of the facility, visitor centers, things like that, restricted areas that might have been open to the public
    prior to 9/11, but because of those incidents we chose a safer approach, at least initially, by restricting and/or closing
    certain facilities.
- speaker: Interviewer
  text: I have been interested in the process for determining which parks were at greatest risk and which were in that category
    of 'icon,' and I understand that the department actually developed a list in the 1990's and then of course with knowledge
    through law enforcement agencies, obviously made decisions as a combination of that. Is it your sense that there was something
    they had to work from initially?
- speaker: Respondent
  text: Well, you know it's interesting, because homeland security provided us a briefing and we had a couple of hours with
    their folks in discussing what we would consider national critical infrastructure. And we had some icons listed that didn't
    necessarily strictly meet the definition of a national critical infrastructure. And it was an interesting conversation
    with those folks because they said, "We see you have things on there that just intuitively need to be on there but yet
    did not strictly meet the definition of what our folks, meaning homeland security folks, would define as national critical
    infrastructure." And I had a piece that I presented specifically on security at the Statue of Liberty. And I think my
    argument at the time, and still is, was that what price do you place on the emotional well being of citizens of the United
    States? And indeed, if something catastrophic, horrific, were to occur at the Statue of Liberty, not only would it have
    a psychological impact, but indeed it would have an economic impact on the nation as a whole. And that, it's actually
    more, it transcends the symbol of freedom for the United States. It's a symbol of freedom for the world. So yes, it doesn't
    specifically meet the definition of national critical infrastructure but in every other sense of the word it is, and intuitively
    it needs to be listed as one of those icons that need to be protected to the highest level.
- speaker: Interviewer
  text: Just to continue along chronologically a bit. The director and other senior leaders, they returned the next day, as
    I understand it, or maybe even later that night. I'm not sure about that. Can you talk, could we move to the 12th then
    a little bit? At one point you indicated that you had some links with the Type-1 team. At what point was the incident
    team brought in?
- speaker: Respondent
  text: Okay. We were up at this other location, and I would like to say for the record the folks at this location were extremely
    accommodating for the crush of officials who descended on it. And the operation was, in my opinion, very successful. Hats
    off to Jerry Land and his group. They pulled together the resources necessary for that to be a success, and I personally
    thanked him in front of the director for his efforts in pulling all of that together so quickly. The thought then was,
    look, we've got employees who really don't yet know what to do. Well, how do we get the message out to our employees?
    Should they come to work? Should they not come to work? Is there still a continuing threat? So, we were in the process
    of trying to gather intelligence as best we could and get that mechanism kicked into high gear so that we could collect
    information, accurate information, so that we could make educated decisions. And I can remember that a lot of folks were
    prepared to spend the night, at least a night, at an alternate location. And it was quite a distance from here driving
    there. And I remember having a conversation with the director. In fact,
