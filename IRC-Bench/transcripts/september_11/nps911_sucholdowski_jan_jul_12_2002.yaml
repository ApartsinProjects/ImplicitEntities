collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: From the moment you were aware of something happening, what went on?
- speaker: Respondent
  text: I was working in the flower garden at Arlington House. I believe I was trimming at the time. It was a beautiful day.
    It was really nice, and I was kind of into my work. The skies were blue. There was nothing going on. It was pretty quiet,
    and it was around break time. It was, I am not sure exactly what time it was, about maybe twenty-five after nine, or so.
    And I got my truck and was going over to the break room to meet my friend when I heard on the radio that a plane had hit
    one of the towers in New York City.
- speaker: Respondent
  text: So, I got out of the truck, went to the men's room first to wash up, and there was a gentleman coming out. I asked
    him if he had heard anything about it. I didn't know if it was a hoax, or what, and he stated that he was a cop in New
    York City, and he would call in right now and find out if they heard anything.
- speaker: Respondent
  text: So, he called. I went into the men's room, came out, and I wanted to ask him, like I was curious if anything happened,
    and his wife was standing there, and she was pointing two, two, and I was like really confused. And he just stopped the
    phone, he got off the phone for a second, and just looked at me. He says, two planes hit the towers. Right! And I was
    really like kind of now baffled at the time.
- speaker: Respondent
  text: So, and he was speaking to the gentleman, so I went downstairs to tell my friend, Dave, that now, that two planes
    have just hit the Twin Towers in New York, and while I was taking my lunch down, and I was telling him what was going
    on, I believe it was Malcolm who came in down there and says "come on out, and come to the end of the garden. Another
    plane has just hit the Pentagon."
- speaker: Respondent
  text: And I went out there, and walked to the end of the garden, and the smoke was pouring out of there. You could hardly
    see flames. It was just completely covered with smoke and they said, they got us again. That's three that hit us.
- speaker: Respondent
  text: And it wasn't too much longer after that, that they now had us leave the mountain here, and just head down, and then
    it was mass confusion with cars, and trying to get over bridges because they were closing the bridges one after another.
- speaker: Respondent
  text: So, I did kind of get out of work early, but I didn't get home from work until like after five because I just could
    not get through the traffic. And then I just continued watching things on TV. And that's about it for me.
- speaker: Interviewer
  text: Let's backtrack a little bit.
- speaker: Interviewer
  text: Now you said you were - you started out; you were just working in the flower garden. Okay. That's part of your -
- speaker: Respondent
  text: Normal job.
- speaker: Interviewer
  text: Normal activities going on?
- speaker: Interviewer
  text: And it was a - yes, I can remember, too - it was a really beautiful day.
- speaker: Respondent
  text: Real nice day.
- speaker: Interviewer
  text: And you were basically into your work, and this was about 9:25, right?
- speaker: Respondent
  text: Something like that. It was after nine. I wasn't sure exactly what it was, but I know I go on break - about 9:30 I
    would be on break - so I was leaving to wash up and get ready for break. So, it was around that time, I was pretty sure.
    I am not sure what time it actually hit the Pentagon. Do you remember what time it hit because I talked to the gentleman
    for a while and it wasn't too much longer after that. It couldn't have been more than fifteen minutes, or so, when Malcolm
    was saying that the Pentagon was hit.
- speaker: Interviewer
  text: Yes. So, you were on your way to the break room at that point.
- speaker: Respondent
  text: Correct, and that's underground.
- speaker: Interviewer
  text: That's when Malcolm came out and said -
- speaker: Respondent
  text: When Malcolm came down there and told us.
- speaker: Interviewer
  text: Okay. You had heard the plane hit the building and you had been talking to somebody who said he was a New York cop.
    Was this here?
- speaker: Respondent
  text: Correct. Yes. He was here at the Arlington House, visiting with his family.
- speaker: Interviewer
  text: Okay. So, he was just standing around.
- speaker: Respondent
  text: He was coming out of the men's room when I was going in the men's room. So that's how we got to talk. We kind of passed
    on the steps, and I just wanted to say something.
- speaker: Respondent
  text: He was the first person that I had seen when I heard that on the radio, and I was just confused about it, was I imagining
    things, or what? And so, I just figured I would ask what the first person had seen, did they hear anything like that?
    And that's when he said he was a cop, and he had his radio and his telephone with him, and he called right up there, and
    told them, asked what was going on in New York City.
- speaker: Interviewer
  text: Okay. And so, on your way out, his wife was out there, too, and now going, two?
- speaker: Respondent
  text: Yes. She was pointing, because I was trying to ask - I was asking her, was it true, or whatever, and she pointed and
    gestured two. I didn't really know what she meant, and then she kind of turned, came over to me and said, two planes hit
    out there in New York. So, then I was really - I knew it was no kind of joke, or anything, anymore - and I kind of was
    a little upset about it then. Then I thought the end of the world was here, to tell you the truth, that they were just
    going to keep hitting us, and we were going to be all gone.
- speaker: Interviewer
  text: At this point, you knew something was really wrong.
- speaker: Respondent
  text: Definitely. Like I said to my friend, David - this was confusing because I had my lunch out, and I was taking a bite
    and everything - started to eat. And then, when Malcolm said that, like it just hit the Pentagon, I threw it in the garbage.
    So, I went up there, to the Pentagon, looked down at it, and came back, and my friend was still eating, and I just looked
    at him, and I said, how could you eat right now? Like, how could you eat at a time like this, and everything like that,
    and he just looked up at me, and he answered the question pretty unique, too. He goes, what do you want me to do? You
    know? You know?
- speaker: Respondent
  text: So, at least he figured, if he was going to be a goner, or whatever, at least he was going to go on a full stomach.
    I was the one who was going to be hungry, you know, because I just threw mine away. But it was pretty unique, and just
    hopefully it doesn't happen again anywhere.
- speaker: Interviewer
  text: Yes. So, at that point you - and this is your friend, Dave, right?
- speaker: Respondent
  text: Yes. I'm sure he wouldn't want me to mention his name.
- speaker: Interviewer
  text: That's okay.
- speaker: Respondent
  text: His first name.
- speaker: Interviewer
  text: Yes. Okay. But, at that point, the area was just in smoke. It was all smoke.
- speaker: Respondent
  text: Yes, right, a lot, a lot of smoke, an awful lot. It must have only - like probably five minutes, not even - from when
    the plane did hit it. So, it was like right in - well, it was flames, but you couldn't see flames because there was just
    so much smoke pouring out of it. And I guess, if I did stay in the garden, I probably would have seen that plane coming
    in, but I am glad I didn't because I was like right there towards the back, and that is where it came down and hit, and
    I am sure I would have looked. It would have caught my attention if I had seen a plane going that low, you know? I would
    have to look because you are used to just looking up in the sky whenever you hear anything with the planes, and whatever,
    you know? The motor sounds a little different. They are going right over you. This would have been way different, you
    know? So, I am glad I missed that part anyway. I probably would have been pretty upset about it.
- speaker: Interviewer
  text: Okay. So, at that point, you said that they had you leave.
- speaker: Respondent
  text: They told - yes, they were evacuating the whole mountain. Like they - I don't know who said it, but it wasn't too
    long after that everybody had to leave - tourists, everybody that worked there, that they had to leave. Was it the truth
    that the FBI was coming up there, or something, to overlook the city, and things like that? That's what I heard, that
    they were now setting up a command station from up here to see the city, and we all had to leave.
- speaker: Interviewer
  text: Oh. Okay. At that point, you were just on your way home, right?
- speaker: Interviewer
  text: Tell me more about what it was like getting home.
- speaker: Respondent
  text: Okay. When I leave here, when you get to the bottom of the hill, and stuff, I would just like shoot right over Memorial
    Bridge, and it would put me right into D.C., but they were coming up, and they just kept closing the bridges. So, they
    closed that one.
- speaker: Respondent
  text: And then, when you went up further, the next bridge, I don't know if it was the Key Bridge, or whatever, but they
    were now starting to close those, that bridge, and you had to just keep following the river, going further up, and it
    was people like everywhere. They were just like, you couldn't actually drive at any kind of speed because people were
    just walking out in front of you. People had the radio on. They were shouting, what's going on, that the Towers collapsed,
    and everything.
- speaker: Respondent
  text: And you were really getting more and more tense as you were going on. You just really wanted to get out of the traffic,
    get home and possibly leave D.C. entirely, and people would just walk out in front of you. Girls, with dresses on and
    everything like that, climbing over like iron fences and things. It was just like mass confusion that nobody actually
    knew what direction they were actually going in. They were all just trying to get out of the city. The people, there was,
    over here was trying to get over to D.C. and then the people that was over in D.C. and everything like that, was trying
    to get over to this area.
- speaker: Respondent
  text: Plus, they, I think they evacuated, well, the Pentagon was being evacuated, too, and they didn't take their cars or
    anything with them. So, you were putting all those people out into the streets, too. So, it was really a challenge just
    to try to make it home, and eventually I just left the truck and started walking myself, because I wasn't getting anyplace.
- speaker: Interviewer
  text: So, you left the truck.
- speaker: Respondent
  text: Yes. I had seen a parking spot on the side of the road, and just parked in it, and started walking. Traffic was just
    bumper to bumper, and everybody just kept walking out in front of you. So, you really weren't going anywhere too fast.
    So, I figured, the heck with it, you know? Might not need it anymore anyway, so why worry about it too much.
- speaker: Interviewer
  text: So, you parked your truck, and then what did you do?
- speaker: Respondent
  text: Just walked.
- speaker: Interviewer
  text: You walked where?
- speaker: Respondent
  text: Well, I just kept walking. See, I don't live too far from here. I only live on 16th Street, and stuff, and once I
    got over the bridge, and got into D.C., I drove for about a mile or so. It was a couple of mile walk home, but you know,
    that way it was, you were just happy to be just walking and getting away from everything and thinking.
- speaker: Interviewer
  text: So, you say you were thinking. What did you think about?
- speaker: Respondent
  text: I was thinking if the world was ending, and praying, you know, that it just might, just might be the end, you know,
    and where I am going from here. So, I mean, the walk was wonderful. It gave you a way to relieve your frustrations.
- speaker: Interviewer
  text: Relieve frustration.
- speaker: Respondent
  text: Yes, really tense, you know, the whole thing. I mean, you are looking down at the Pentagon, and you have looked at
    it a thousand times before, and it's burning. I mean, that's like our main source of everything, you know. That's where
    everybody that is running the country, and things, are there, and if that is going up, you know, a plane did get there,
    you don't have too much faith in anything else, of what could be happening.
- speaker: Interviewer
  text: Yes. Okay. So, you got home eventually, right? But you said, what time is it, about five?
- speaker: Respondent
  text: Around five, or so; turned the TV on, of course, and just watched it, and watched it, for hours and hours, and hours
    on end, you know, waiting for them to tell you to evacuate the area, or whatever was going to be said next, and just like
    seeing it a million and one times, the Towers collapsing, and just continuous glued to the TV. I figured that we weren't
    going to be coming back to work for a while, either. So I could just stay up real late and watch it. But there was work
    the next day.
- speaker: Interviewer
  text: So, you stayed up late to watch what was going on?
- speaker: Interviewer
  text: How late did you stay up?
- speaker: Respondent
  text: Probably around twelve or so, until I started finding out that I did have work the next day.
- speaker: Interviewer
  text: How did you find out?
- speaker: Respondent
  text: A friend called down to the White House and asked them - they worked there - and asked if the Park Service was going
    to be working, and they said, yes, everything is going to be back tomorrow. You know? Get to work. Make sure you are there
    on time.
- speaker: Interviewer
  text: So, what did happen the next day? When did you get to work and what happened?
- speaker: Respondent
  text: I stood in the back for a while and watched. The Pentagon was still burning. It was burning for a while. I believe
    it burned for a couple of days, or so. And I just like stared at it, and so, and I don't know, somebody said something
    like, you know, you still have your work to do.
- speaker: Respondent
  text: And it seemed, to tell you the truth, you know, it seemed like I couldn't really get into it because the flower garden
    just wasn't so important to me anymore. I just figured, why would I even want to waste my time, like working on this flower
    garden when people were dying and things. The fire is blazing down there. Like, shouldn't
