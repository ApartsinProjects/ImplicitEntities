collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: This is Einar Olsen on December 13, 2001. And Einar, he's the chief ranger here at the National Capital Region of
    the National Park Service. And on the day of September 11th, 2001, tell us what you heard, what you saw, and what you
    did.
- speaker: Respondent
  text: Okay, well, thank you for the opportunity, Gary. That day, September 11th, to the days prior to that we'd been having
    beautiful, late summer weather. It was very quiet, very sunny, temperatures in the mid-70s. It was just one of these days
    that we savor after having those miserable dog days, humid, hot, and hazy, the summer days here in Washington.
- speaker: Respondent
  text: That morning, about 9:10 in the morning, I was on my way, leaving the regional office, going to the District of Columbia,
    Northern Virginia Environmental Crime Task Force meeting, which was being held at the Anacostia Naval Station. And on
    my way out in the parking lot, the first I learned of this was another employee in the regional office just told me in
    passing, "A plane just hit the World Trade Center building." I go, "Boy, that's unusual." So, I was very sort of curious.
    So, when I got in the car, I turned the radio on to WTOP 1500, the all-news station here, and at that time learned that
    a second plane had in fact hit the second Trade Center building in New York City.
- speaker: Respondent
  text: So I proceeded to our meeting and when I got there, at the Naval Station, we were in a conference room and there were
    representatives from the FBI, Environmental Protection Agency, Defense Department, the various state environmental organizations
    and the Park Service. The mood was a little tense because everybody knew what happened. They knew at that point that,
    and this was about 9:30 in the morning, that there had been a terrorist attack in New York, because the odds of two planes
    hitting by mistake are just nonexistent in terms of it being an accident. So, we knew there had been a terrorist attack.
    So, things were a little on edge and we were having a hard time focusing.
- speaker: Respondent
  text: And just five minutes into the meeting, about 9:35 I believe it was, a number of pagers started going off in the meeting
    room. And one of the individuals from the Defense Department, Defense Criminal Investigator Service, left the meeting
    to make a call and he ran back in. He interrupted the meeting and he said, his words were, "They just hit the Pentagon."
- speaker: Respondent
  text: And at that time we stopped the meeting and we went out and looked out a big bay window of the Naval Station and we
    could see all of the way over into Virginia and we could see this huge mass of black smoke rising from the Pentagon. You
    couldn't see the Pentagon, but you could see the smoke. And right there and then we canceled the meeting and all of the
    agencies picked up their belongings, got in the cars, and we all raced, emergency response, back to our respective offices.
    And it was a line of vehicles racing back into downtown Washington. At that point, I immediately -
- speaker: Interviewer
  text: How difficult was it to get back?
- speaker: Respondent
  text: Well, we ran lights and sirens the whole way, so it didn't take very long. And I think the public at that point realized
    that things were happening, and people were clearing out of the way.
- speaker: Interviewer
  text: Could you give us more specific information on the location of the Naval Station from which you saw the Pentagon?
- speaker: Respondent
  text: Yes. It's located pretty much, it's right on the Anacostia River, right near, I think, it's the 11th Street Bridge.
    It's immediately south of National Capital Parks East. And the profile, the land profile in this part of D.C., is very
    flat so you couldn't really make out a top of a building in Virginia unless it was fairly high. You could not see the
    Pentagon, itself, but the amount of black smoke coming from the fuel from the plane which had exploded and was on fire
    was incredible. Not just a column of smoke, but it was spreading out like a mushroom, also.
- speaker: Interviewer
  text: Were you able to get back to the office rather quickly or was there traffic buildup already?
- speaker: Respondent
  text: Not at that point. We were going inbound to central city, so it didn't take more than 5-10 minutes at the most. And
    that's interesting because the issue of traffic would become a major issue within two hours after that. But when I returned
    to the regional director's office, we were meeting in the regional director's office sort of figuring what we should do.
    And at that point, we heard a large explosion. And the gossip at that time was that they hit the back of the Lincoln Memorial,
    which turned out not to be true. In fact, it was a sonic boom from one of the Air Force fighter planes, which had scrambled
    from Langley Air Force Base down in the very southeastern part of Virginia, which happened to get there too late.
- speaker: Respondent
  text: Not knowing that immediately though, the Regional Director decided to close the Regional Office and send everybody
    home. So a number of people in my office, the Ranger Services Division, were cleared out the regional office building,
    went back in, and that time, I advised the regional director we need to put all of our law enforcement rangers on alert
    to be available to help out. The Park Police had already started scrambling since they had the primary responsibility
    security of the monuments for downtown.
- speaker: Interviewer
  text: Was there a plan for evacuating this building and how smoothly did that work?
- speaker: Respondent
  text: Well, that's not a very big deal. You know, we've had fire drills over the years. But pretty much, there was a little
    misunderstanding as to how people would get home. A lot of people ended up walking because the traffic would become so
    bad. But we weren't so concerned about the security. We wanted to get them away from the sensitive facilities. We're not
    that far from the Pentagon. We're not that far from the monuments. I think that the regional director, Terry Carlstrom,
    just didn't want them hanging around. So, they were sent home.
- speaker: Respondent
  text: At that time, I asked the regional director to basically regionalize the law enforcement rangers, which basically
    puts them under my direct command. And so, we did that and at that point, I went to the U.S. Park Police headquarters
    next door to their command center and offered up the assistance of our rangers if they needed them.
- speaker: Interviewer
  text: How were you in contact with all of the law enforcement rangers?
- speaker: Respondent
  text: At that point, I had had no contact with them. And that would once again become a very major issue because what happened
    was, the Park Police, they said, "Yes, we do want your assistance. Would you stage some and then once you have them ready,
    we'll give you an assignment." So, our goal was to get about 15 rangers together.
- speaker: Respondent
  text: Meanwhile, around that same time, because most of the government buildings downtown had been closed, and people were
    sent home, that sort of heightened the state of tension, anxiety in the city. People were calling their friends, their
    relatives, a large number of calls coming into Washington. Now, what happened was both the land line and the mobile phone
    system became inoperable, because they were just overwhelmed. Therefore, we cannot communicate by phones at all. So, what
    I had to do then was basically go through a radio system based out of a vehicle.
- speaker: Respondent
  text: And what I did then was go to a vehicle, in the parking lot here, one of our emergency vehicles, contact our regional
    communication center which oversees all of the ranger operations in the region. And it had only become a 24-hour operation
    about six months before that.
- speaker: Interviewer
  text: And where was that set up?
- speaker: Respondent
  text: That's located in Maryland. We don't really advertise the location, but it's out in the western part of Maryland.
    And we basically put out, saying this is a regional emergency and that all of the rangers are now regionalized, and we
    requested the communication center to call all of the parks in the outlying areas where the rangers work. And basically,
    I set up a staging area at the George Washington Parkway headquarters in Northern Virginia, which happens to be not more
    than half a mile from the CIA headquarters. But it's a convenient location. It's outside the downtown area and it's easy
    to get to. It's near major roads. And that was going to be our staging area.
- speaker: Interviewer
  text: They were going to come in.
- speaker: Respondent
  text: They would come in. And it was supposed to be an emergency response. And I got that process underway and I also advised
    the communication center to call the George Washington Parkway, tell them they were going to be the staging area, and
    then be prepared to set up one.
- speaker: Respondent
  text: At that point, I told the regional director what was going on and I left the regional office, got in an emergency
    vehicle, and started fighting my way through traffic in Washington, D.C. It was horrendous. In hindsight, it probably
    wasn't a very good idea that all of the government offices and other offices which followed government policy, it wasn't
    a good idea to close them, because emergency vehicles could not get through the city. Because to get into Virginia you
    have to cross a bridge to get across the Potomac River and all of the major arteries were clogged.
- speaker: Respondent
  text: I, basically, worked my way, lights and siren, up through Northwest Washington, through Georgetown, took all of the
    back roads through Georgetown and worked my way over to the very northwest part of Washington, D.C., and into Maryland,
    and ended up crossing the American Legion Bridge on the 495 Beltway into Virginia and taking the George Washington Parkway
    south down to their headquarters. It took probably a good 45 minutes to do that and only taking the back roads made that
    possible.
- speaker: Respondent
  text: So, we set up the command, not a command center, it was a staging for all of the people, rangers to report to. The
    George Washington Parkway under Superintendent Audrey Calhoun's direction did a great job. They provided three individuals
    to help me there. They set up all of the maps that we would need. They put on the TV so we could find out what was going
    on, too, because we didn't have the full picture at that time. So, we set up the staging area. At that point, it was the
    first time I got to check in with my family and just see how things were. And told them I'm okay, but I don't know when
    I'll be in touch with you.
- speaker: Interviewer
  text: How many rangers did you get coming in?
- speaker: Respondent
  text: Well, we got 15 rangers. Within two hours, we had the 15 rangers. And they did an excellent job getting there. And
    once we had squads of 6 or 7 at a time, we basically went back to the vehicle to contact the communication center in western
    Maryland and had them call into the city. At that point, they could call from western Maryland into the Park Police command
    center and get an assignment and then relay back the same way. And we got an assignment.
- speaker: Respondent
  text: Our very first assignment was to report to the Columbia Island area of the George Washington Parkway. And the assignment
    was to check on the status of all of the children from the Pentagon daycare facility. When the attack had occurred, they
    evacuated the Pentagon daycare center, which luckily happened to be on the opposite side of the Pentagon from where the
    attack occurred at the Pentagon facility. They crossed the bridge under Columbia Island Marina, which is under Park Service
    jurisdiction, and basically, they basically just sat down in a grass field and waited there.
- speaker: Respondent
  text: There were kids and there were the adult leaders. There were about 50 people altogether.
- speaker: Interviewer
  text: Was this in the LBJ Grove?
- speaker: Interviewer
  text: So, the kids had been moved to the LBJ Grove.
- speaker: Interviewer
  text: You said that was the first assignment. And maybe I didn't follow closely enough. Where did that assignment come from?
- speaker: Respondent
  text: That came from the Park Police.
- speaker: Respondent
  text: They had, apparently, somehow had gotten word that all of the Pentagon daycare kids and some of the adult leaders
    were there and we needed to do something. We couldn't just leave them there.
- speaker: Respondent
  text: It was interesting that none of the Park Service facilities had been attacked. It was just the Pentagon, but there
    was great concern that there may be additional attacks on some of these icon facilities, such as the monuments and the
    White House, which the Park Police had responsibility for. They were overstretched and were very tapped out for law enforcement
    resources, so they needed our assistance for these various assignments that were coming up. So that was our first assignment.
- speaker: Interviewer
  text: So how many rangers did you get down at the LBJ grove?
- speaker: Respondent
  text: Well, we had seven at that time. And because they were not familiar with the geography of Washington, D.C., I led
    them down in a convoy. And at that point, the George Washington Parkway had been closed for security reasons because I
    guess it's close to the CIA. It was a very eerie feeling leaving the parkway headquarters, going in a convoy down the
    George Washington Parkway, passing various checkpoints along the way. So, it was very quiet. That's the sense I had. It
    was very quiet. Not any traffic.
- speaker: Interviewer
  text: Nobody is on the parkway.
- speaker: Interviewer
  text: Where there any Park Police checkpoints?
- speaker: Respondent
  text: They had a couple of points, yes.
- speaker: Interviewer
  text: To backtrack, where were the rangers from?
- speaker: Respondent
  text: The rangers were from the outlying parts of the region, pretty much Antietam National Battlefield, Monocacy National
    Battlefield, Harpers Ferry National Historic Park, C&O Canal National Historic Park.
