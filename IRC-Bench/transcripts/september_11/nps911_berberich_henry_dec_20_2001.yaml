collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: I'm with Henry Berberich with the Park Police. So, my first question is going to be, from the moment you became aware
    of what was going on, what happened?
- speaker: Respondent
  text: Well, it's sort of like when President Kennedy got shot, everyone knew where they were. I was at a meeting with one
    of my lieutenants with the multi-agency meeting, and they had turned on the news, and at that time one tower had gotten
    hit, and then we continued the meeting, the TV was on, and the second tower gets hit. And I basically told the US Attorney
    and the other NDP people that the pulp was we'd probably have to leave. And then within moments, the Pentagon got hit,
    and they showed it right on TV. So, myself and Lieutenant - we excused ourselves, and we went right downtown to the Washington
    Monument.
- speaker: Respondent
  text: By that time, the decision had already been made - because we didn't know when the next attack would come or where
    it would be - to secure and evacuate all the monuments and memorials. So, we brought officers down from everywhere. It
    was all of our special forces officers, and we evacuated the area around the Washington Monument, the Lincoln, and the
    Jefferson. I still remember an officer that was at the Lincoln - while we were closing the Lincoln - there was a secondary
    explosion in Arlington, and I think it later turns out to be a gas station - a secondary explosion. And we could hear
    it - not only could we see the smoke - the black smoke, just filling the air - we could - we heard the secondary explosion,
    and I mean, that just pumped up everyone's anxiety, but you couldn't tell exactly where it occurred. We thought it could
    have been on the other side - just on the other side of Memorial Bridge.
- speaker: Respondent
  text: From September 11th till now, the US Park Police has been on a high state of alert. Our patrol branch officers are
    working 12-hour shifts, and we've committed a great deal of personnel in outlying areas downtown. We've worked with NCP
    Central and President's Park.
- speaker: Interviewer
  text: NCP Central?
- speaker: Respondent
  text: Right. National Capitol Park Central and President's Park, and the Secret Service, and we refortified areas around
    the monumental core, and the White House. Since September 11th, there's been a number of extremely high alerts, based
    upon intelligence coming in, and there have been no significant events, thank God, downtown, as a result of any terrorist
    acts. We continue now on high alert, and we don't know when it's going to end.
- speaker: Respondent
  text: Again, going back to 9/11, all the key components in the Park Police response will be with first responders that did
    go to Arlington Cemetery - uh, to the Pentagon. And I know we had motor officers there, and I know that our helicopter
    was there doing medivacs. We were also - I know - we had units that played a key role in the evacuation of government
    officials, which would have included the protection of the Secretary of Interior, and I'll provide you a copy of the written
    report -
- speaker: Respondent
  text: '- that was generated from that.'
- speaker: Interviewer
  text: Great. Could we back up for a minute?
- speaker: Interviewer
  text: Okay. When you - okay, you were responding at the point, and there had been a secondary explosion there in Arlington
    - right? But moving back to that day when that was occurring, what was going on, you - this was really heightening - you
    know, everybody was just really pumping up your concern and anxiety and everything of what was going on. What went on
    from there? Just straightforward as we go on?
- speaker: Respondent
  text: 'We just collapsed. We bring all of our resources - as much as possible downtown - and we just started evacuating
    the chambers of the Lincoln, the Jefferson. So, the Washington Monument - it was good for us - the Washington was closed.
    It''s still closed for construction, so we didn''t have as critical a need, other than to evacuate a safe distance from
    the Washington Monument. To be honest with you, it was chaotic to some extent. What we really saw was that everyone wanted
    to help out, and by this what I mean is: now we have all the officers on duty; we collapsed downtown. We''re evacuating
    the monuments and memorials, and now we have officers at home that are watching TV, and the officers knew - and they were
    getting called in anyway - but we have officers that knew that this was catastrophic, and seeing the events - we called
    in all of our off-duty officers, and that first night we had officers that ended up working - oh - right through the night
    - maybe, almost 24 hours straight, because we worked as many people downtown to safeguard the monumental core. I guess
    that''s it, unless you have any other questions for me.'
- speaker: Interviewer
  text: Well, yes, if you can back up on some of these things; this is getting very interesting. I'm going to dive in here,
    and pick up on some detail if we can, because - for example, it may seem obvious that you evacuate these buildings - all
    right - it sounds like a dumb question, but I think you'll see that it's not.
- speaker: Interviewer
  text: What is involved in evacuating a building like that? What are the complications? What are the things you've got to
    watch out for? What was going on that day that made things possibly different? Maybe, maybe not. Maybe it wasn't.
- speaker: Respondent
  text: I think it was hard to communicate; for example, my little Nextel thing here - we use this all the time in communication;
    the first thing that went, the cell phones went. You couldn't call on the cell phones anymore; they got overwhelmed. So,
    we couldn't use the cell phone capacity. The second thing is the radio track was incredible on our radio, because you
    have so many different things going on at once. You have responders going through the Pentagon; you have Medivacs at the
    Pentagon; we had this emergency evacuation procedure for Cabinet members. And our - if I could back up a second?
- speaker: Interviewer
  text: Keep - yes.
- speaker: Respondent
  text: That's kind of classified information.
- speaker: Interviewer
  text: Classified?
- speaker: Respondent
  text: Getting the emergency evacuation of Cabinet members and what was done, and the procedures involved in that. So, I
    mean, we may actually have a hard time, depending on where this is going to go; yes -
- speaker: Interviewer
  text: If it's classified, it's classified.
- speaker: Respondent
  text: Well, if it stays internal, that's fine, but - yes, we're not going to go into the great detail.
- speaker: Interviewer
  text: Okay. I'll have to work on this. I cannot guarantee what - the public nature of those things. They may be public,
    and so I'll have to get back to you.
- speaker: Respondent
  text: Well, if you want to characterize that, say that we were - rather than an emergency evacuation procedures of Cabinet
    members, characterize it as - we were involved in the protection of the Secretary of Interior, and if you want to leave
    it in generics, that there's all evacuation plans on where - how to do it, and where people should go and stuff. But we
    don't want that in public domain at all.
- speaker: Interviewer
  text: Got you. It's just important to us to know, for example, that when - you know, in evacuating, say, Cabinet members,
    or the Secretary of Interior, that there were preformed plans.
- speaker: Interviewer
  text: That it wasn't easy getting these plans done, whether there were various kinds of complications, like because of the
    cell phone traffic, and the radio traffic.
- speaker: Respondent
  text: Okay. And the worst complications - and I think it will come to pass, and I don't have to get to the people involved
    in this, but what had come to pass is, the Secretary of Interior is quickly evacuated, and the rest of the plans - there
    were complications; the timing was off, and there were complications.
- speaker: Interviewer
  text: I mean, I'd expect that, because of events you were describing. The reason I'm asking is because of the cell phone,
    and things like that were going on - I mean, good grief.
- speaker: Respondent
  text: 'And there''s a whole other side to this here, and you know, the more we talk about it, the more you can remember
    now. Now, the monuments and memorials are closed. We did our evacuation, and we create our safe zones around the monuments
    and memorials, and now everyone wants out of the Washington DC area, so the roads get completely clogged going - outgoing.
    Okay? And that just created more problems, because at the time - here''s what happened: Park Police made the decision
    to close the Memorial Bridge, initially, with the Lincoln and Jefferson for fear that either a plane was going to run
    into it, or we''d have another explosion.'
- speaker: Respondent
  text: Okay? So, Memorial Bridge is closed; the 14th Street Bridge is closed because it's right behind the Pentagon, so the
    only bridge to get out of the city is the Teddy Roosevelt Bridge - initially - so traffic is at an absolute - there's
    nowhere for anyone to evacuate into Southern Virginia - into Northern Virginia, except to go across one bridge. So, the
    evacuation of the city by the civilian people was really hampered and tied to traffic; going to Virginia was nightmare.
- speaker: Interviewer
  text: What did you do? I mean, what could you do?
- speaker: Respondent
  text: Well, finally we decided to - we had to relieve pressure, so we - within an hour to reopen Memorial Bridge back up
    - to get going, and another thing that they did was - I'm not too familiar with Rock Creek Parkway.
- speaker: Interviewer
  text: I'm not all that familiar -
- speaker: Interviewer
  text: I mean, I've been there, but what happened?
- speaker: Respondent
  text: Well, Rock Creek Parkway is two-way traffic; however, during rush hour, it's converted to one-way, so as we knew that
    the city was going to be evacuated, they put in - evacuated the PM rush hour, so Rock Creek Parkway became four lanes
    outbound to get traffic out of the city going into Montgomery County. But it was just gridlocked getting out of the city.
- speaker: Interviewer
  text: For example, I was right there - you know, right out of this building. They kicked us out, and of course I noticed
    everybody was jumping straight out in the street, because at that point, I mean, they just said everybody out, and we
    were at - we waited about an hour and then hit the Metro, and of course we had no problem. And so, I'm just wondering,
    you know, you had all this traffic; you opened Rock Creek Park. You finally reopened the Memorial Bridge; then what happened?
- speaker: Respondent
  text: Well, then - then for the next couple of hours people were just flooding and leaving the city, and we just maintained
    our closures and our perimeters. We just kept everything shut down.
- speaker: Interviewer
  text: Everything shut down?
- speaker: Respondent
  text: Yes. All the monuments and memorials. You couldn't go to the Lincoln, the Jefferson, the Washington Monument. We closed,
    basically, almost the entire area from the Lincoln, all the way probably to the 14th Street - the Washington Monument
    - at least to the Washington Monument, as well as a key closure in this, too, is the left of the White House and the President
    of the United States, and both park areas - one on the north side of - this is Rock Creek Park, and the lifts on the south
    side were completely closed and heavily manned.
- speaker: Interviewer
  text: There were probably tourists and people out there. How were they handled? What did you do?
- speaker: Respondent
  text: Well, the tourists were told that the areas were being closed for security reasons, and they were given the direction
    where they had to depart, and then right behind that more Jersey barriers and more fence was - were put in.
- speaker: Interviewer
  text: I was talking to maintenance people who were talking about how to scramble like mad to put things up in the first
    period of time.
- speaker: Interviewer
  text: How did that go? How smoothly did that go? How did - what effect did that have?
- speaker: Respondent
  text: I'm not sure - I had to find somebody who was in an area nearer the White House, but I think within a couple hours
    the fence that had to get put up was put up, and it gave a good buffer around the White House. So - but it wasn't easy,
    and it took a long time to evacuate, and the public was very compliant - I kind of laughed, but normally when you make
    a closure and inconvenience people, the people get mad at you - you create a detour. Well, since 9/11, and it continues
    to this day, that the public is well-aware of the need for security, and very much comply when they come, and if an area
    is closed for security reasons, we really don't get any complaints from people, because they know it has to be done. Everything's
    changed. They changed all the rules on us.
- speaker: Interviewer
  text: Wow. Good. About what time of the day was all this going on? I mean, this seems like it was a very rapid set of responses
    with the closure of this traffic, and everything like that. What time of the afternoon or morning or whatever, was all
    - you know, you - closing the Memorial Bridge, reopening the Memorial Bridge - when was all that - when did all that happen?
- speaker: Respondent
  text: Well, I think the incident happens - what, at 9:09 or something?
- speaker: Respondent
  text: Yes. I would say that probably by 10:00 o'clock, we were pretty secure in evacuating downtown, and probably by about
    11:00 o'clock in the morning, people started really leaving the city, and that's when the Rock Creek Parkway change took
    place, and then we saw the pressure that was getting put because of the closure of Memorial Bridge, so we opened - reopened
    - Memorial Bridge up to get people out of city, and that went on for hours. That went on for three, four - well into getting
    dark - and by that time, by 7:00 o'clock at night, we had the majority of US Park Policemen working; everyone was called
    in from home. All of our midnight people came i
