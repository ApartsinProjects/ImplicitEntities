collection: nps_911
source_url: https://www.nps.gov/subjects/oralhistories/
turns:
- speaker: Interviewer
  text: 'Okay. My first question would be: as soon as you were aware of what happened, what went on?'
- speaker: Respondent
  text: Well, I didn't know that it was a plane that had hit the building. One of the staff people came in from maintenance
    and said the building was on fire. So, we went outside and went back inside to get the radio and found out that a plane
    had hit it. So, my co-worker and I went back out again and as we went outside, and we were standing there, we with binoculars
    saw some of the bodies or people jumping. That was a horrific thing to see.
- speaker: Respondent
  text: The other thing is when we were standing there the second plane flew to our right. And I saw that plane and I realized
    that he was headed for the building, because you could tell. And I wanted to stop him. I wanted to grab him and pull him
    back. And then when it did hit the building, you saw this great big orange fireball. And my feeling was, oh, those poor
    people, they're dead. And then we all just grabbed each other and cried because it was just so horrific.
- speaker: Respondent
  text: And later on, we were evacuated from the building and this speedboat came up while we were standing by the flagpole.
    And it was full throttle. And after seeing the plane hit the building, we swore that that speedboat was filled with explosives
    and that it was headed for us. And he didn't seem like he was going to stop. So, we all just ran to the right, away from
    it. And with that park police came out - the boat came out - and stopped that speedboat.
- speaker: Interviewer
  text: Which boat was this that came out and stopped it?
- speaker: Respondent
  text: The park police - you know, the U.S. Park Police. They stopped the boat, spoke to them, and then turned them away.
    But I was terrified for my life at that particular moment. And the relief that they turned the boat away, I can't explain
    it.
- speaker: Respondent
  text: But later on, we were watching the buildings going and we saw the second building go down. And then we saw the first
    one later on. And I was sitting outside, and if you looked off towards Staten Island, it was a beautiful day. It was a
    very, very soft breeze. It was like the breeze just caressed my cheek. It was like a light touch of a person. And you
    looked over to Staten Island and the water was glistening. It was beautiful. And then you turned around - and it looked
    like nothing had happened.
- speaker: Respondent
  text: And then you turned around to Manhattan and there was the black smoke, the buildings were gone.
- speaker: Respondent
  text: And it was like, if you had seen the movie Independence Day, you felt like you were in a movie and you could walk
    outside and that wouldn't be real. It was so surreal. You just couldn't believe that it actually happened.
- speaker: Respondent
  text: And I tried to call one of my friends. And she actually - I couldn't get through to her. The frustration of trying
    to tell her that the building had a hole in it, that's what I said to her. The building has a hole in it. And she kept
    saying, yeah, yeah. She said she was on the phone with an insurance company and she'd get back to me later. It didn't
    sink into her either until a friend came into her house and made her turn on the TV.
- speaker: Respondent
  text: So those were the kinds of things that happened then. But then later on the nonessential people were sent home. And
    I stayed on the island and I worked with the people who were there. There was a triage area and then there was an area
    where people from, I would liken it to refuges, from Manhattan, were brought in and we took their names, addresses, and
    the people who they wanted us to contact to let them know they were okay.
- speaker: Respondent
  text: And then I had a chance to talk to some of them. Some of them had no shoes on. They just - some of them had just what
    they had in their hands wherever they were. And one woman from the American Family Immigration History Center stayed with
    us. And she told me of an incident where - her name is Katherine Taylor, she told me of an incident where this family
    of four children and a husband and wife got out of the hotel - I think it was the Marriott - or whatever by the World
    Trade - with just what they had on. And they got out just in time before everything was collapsing around them. And she
    said the stories that they had - the people that she spoke to - had a lot of stories to tell. That one stuck in my mind.
- speaker: Respondent
  text: There were people looking to go home to pick up their children from daycare. And they didn't know how they were going
    to go home. People were stunned. Some were crying. Some were just like in blank stares. And I just wanted to - you felt
    like you wanted to make it all better for them and you couldn't. But that was the way it was that day.
- speaker: Interviewer
  text: These were the refugees you're talking about?
- speaker: Respondent
  text: Well, they - they brought in people from Manhattan who were either seriously hurt or who were just being evacuated
    from the Manhattan. A lot of them were down by the Battery and they stopped the Staten Island Ferry for a while. You could
    see that the ferry wasn't running back and forth across the harbor.
- speaker: Respondent
  text: And later on, I found out that they were taking people out of Manhattan.
- speaker: Interviewer
  text: Yeah. Keep going.
- speaker: Respondent
  text: But they were only taking - bringing back emergency people to Manhattan. They weren't bringing any people into Manhattan,
    civilians I should say.
- speaker: Interviewer
  text: So, the boats here were taking people off of this island? Or, I'm sorry, I'm not following.
- speaker: Respondent
  text: No. No. When you look out, you know, you can see Manhattan. You can see Staten Island. You can see the orange ferryboat
    that you're used to seeing going back and forth. All these things are a part of that day. And the Staten Island Ferry
    actually stopped running that day until they started bringing in emergency personnel.
- speaker: Respondent
  text: The other thing is that people who were here, we took their names, a whole bunch of us took their names and I collected
    them, and I gave them to another person to put into the computer. Then these people who came on the boat, that boat, were
    put into another area so that another boatload could come in. But we segregated the list by boat. And this is where Katherine
    Taylor was. She was over in the area where these people were pushed over to, before they were transported by bus to Liberty
    State Park in Jersey.
- speaker: Respondent
  text: Some were taken to Brooklyn. Later on, they were offered boat transportation to Brooklyn. But on the whole, a lot
    of them were taken over to Liberty State Park.
- speaker: Interviewer
  text: Okay. Just to make sure I have what you're describing right so I don't misunderstand. I wasn't there -
- speaker: Respondent
  text: Yeah, I know.
- speaker: Interviewer
  text: '- and I''m still putting these things together. What you''re saying is there were different kinds of people came
    onto the island or came onto the Ellis Island.'
- speaker: Interviewer
  text: And some of them were injured.
- speaker: Interviewer
  text: And they went to the triage.
- speaker: Interviewer
  text: Okay. And some of them were people who had simply been evacuated from Manhattan.
- speaker: Interviewer
  text: From Battery Park and that area.
- speaker: Interviewer
  text: And of all of these people, you basically took down their names, social security numbers, phone, addresses, and what,
    which boat they came in on and that kind of thing?
- speaker: Respondent
  text: Well, we would put down the time they came.
- speaker: Interviewer
  text: And the time they came.
- speaker: Respondent
  text: Yeah, rather than the particular boat.
- speaker: Respondent
  text: We would put down the time that they were transported over so that someone else was keeping a list of - I guess of
    the boat - which boat was coming in at what time. So, we didn't know - say it was Circle Line was bringing people over
    or the fire department or the New York City Police were bringing people over. We got them from all kinds of different
    ways. Different boats were coming in. I couldn't see all the boats. I mean, you saw them, but you didn't see who they
    were. You just saw the people coming in. And we had quite a few people. It was families together. I guess, sometimes it
    was 50 to 70 people at one time.
- speaker: Interviewer
  text: How many people total do you figure you worked with?
- speaker: Respondent
  text: They said we got about 700 people. I just didn't count. I just kept going. It's just something you don't have time
    to count.
- speaker: Interviewer
  text: I understand. I just wondered if you had some sort of feel for what it was?
- speaker: Respondent
  text: Well, all I can say it was a lot of people. And it was just kind of getting them and moving them along so that they
    could be taken care of. Some of them - there was one mother who had a little girl who had a heart condition. She didn't
    need triage really. But what they did was they set her down near us. And so, we kind of kept an eye on her and so that
    if anything happened, the EMTs and the EMS people who were here from Jersey and our own people could help that child.
- speaker: Respondent
  text: And there was a man, I think he was homeless. He was wrapped in a blanket and he was kind of dirty. Now we usually
    look at homeless people and say because they're dirty, they're homeless. But he could have been from the explosion - not
    the explosion but the implosion - of the buildings that he got all this soot all over him. You couldn't tell.
- speaker: Interviewer
  text: Yeah. He could have been homeless, but he could have just looked like he was at that point.
- speaker: Respondent
  text: Yeah. Exactly. Exactly. But what amazed me is how - how we all pulled together. How we all did a job. And everybody
    kept busy. It was like Armark opened up and there was one person who opened up everything. Tons of water were coming from
    Armark. Liberty Café gave us -
- speaker: Respondent
  text: It's the A-R-M-A-R-K. It's the food concessionaire here.
- speaker: Respondent
  text: And has the gift shop. And I believe it was the manager of the gift shop who opened up the food part and did the cooking
    and along with our staff, some of the women from admin were making sandwiches for the people. So, they made it for the
    staff and then they also gave it to some of the people coming in as the day went on. But it's amazing how everybody just
    pulled together. Nobody said well, I'm not park police or I'm not National Park Service. They just - it just meshed.
- speaker: Respondent
  text: It was like we were all one, which makes me think of the United States as being all one at times. You know, we surprise
    people - as a nation we surprise people. I've seen that before. But - so that was that day.
- speaker: Respondent
  text: The only way I got home, because I live on Staten Island, we had to have police escort - to take us over the bridge.
    We went around roadblocks and things like that. And at least I got home.
- speaker: Interviewer
  text: About what time did you get home?
- speaker: Respondent
  text: We left here at 6:30. And I had the chance to talk - they were police officers from the Bronx. They had a variety
    of length of service. And these were the police officers that I was talking to - were brought in to deal with the bodies
    that were supposed to come. They were the ones who would take and identify them or try to identify remains. Like they
    are still doing now, these were the units or the people from the different units that work with this. They were detectives.
    They were sergeants. They were men. They were women. Some women had 18 years' service, some had only 2. But it was a variety
    of people from the police department that were here.
- speaker: Interviewer
  text: Oh because you mentioned you were talking to the Bronx people.
- speaker: Respondent
  text: It's New York Police. Some came from the Bronx. And this is the New York Police. So, there was a variety of people
    they were waiting to be sent to the area that was going to be used for a morgue, which was - I imagine, and I was told
    - was behind the buildings towards the dock.
- speaker: Interviewer
  text: Right. Whatever happened on that?
- speaker: Respondent
  text: I don't know. I didn't get to follow that one up. I was just so busy with the other people.
- speaker: Interviewer
  text: So, most of your time was spent getting people registered, that kind of thing?
- speaker: Respondent
  text: That kind of thing. And then I wound up picking up garbage. Whatever needed to be done is what we did that day. There
    was a lull. And people weren't coming in so I grabbed some garbage bags and just started picking up the stuff that was
    left behind so that if more came in it wouldn't be totally a disaster for them. At least it would look nice for them,
    you know.
- speaker: Interviewer
  text: Kind of look nice -
- speaker: Respondent
  text: So that it made them feel a little more comfortable. That someone cared enough, you know. Sometimes mess makes it
    worse for you. So, if you can find a place where it looks clean - like a haven so to speak.
- speaker: Interviewer
  text: That's what I was wondering, so that the people would be put more at their ease. That there would be a little more
    order to things -
- speaker: Interviewer
  text: Or did people tell you to do something?
- speaker: Respondent
  text: No, no, they asked me to do the names. And then when I got a lull, I jumped in to do whatever was necessary. And then
    I had time - that's when I had time to sit down with these police officers in between the boatloads that came in as well
    as after the boatloads stopped. That was later in the afternoon that it started to dwindle down. And then they just kind
    of closed it up and the triage was moved off. But they had ambulances coming in from Jersey City. I saw EMS people from
    all over. From all different towns in Jersey, they were here. There were so many different places.
- speaker: Interviewer
  text: Am I right, people were describing just whole scenes in which ambulances were just lined up for -
- speaker: Respondent
  text: Yes, exactly.
- speaker: Interviewer
  text: '- for quite a ways?'
- speaker: Respondent
  text: Yes. They were. They came over the bridge and we had to move our cars so that they could have access in the parking
    area. But also, when I went
