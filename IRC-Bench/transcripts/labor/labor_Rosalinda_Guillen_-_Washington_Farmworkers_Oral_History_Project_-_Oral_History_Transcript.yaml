collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: 'I want to start by getting you to talk about the history of your own family. So tell me: They worked as farmworkers.
    Did they ever own land? Tell me about them. Who was your dad? Your mom?'
- speaker: Respondent
  text: It was very complicated. My dad is basically-- my dad was a Tarascan indigenous person from Zacapu, Michoacan, who--
    the Guillens from Zacapu, Michoacan, were farmworkers who work their -- you know, they were like ejido' type of farmers
    and farmworkers. Yeah. And it appears from listening to my father's stories that they were always in leadership. And so
    my father's father, my grandfather Lorenzo Guillen-- No, no, my father's father was part Irish. His mother was half Irish,
    and half indigenous. So, my grandfather, I have a photo of him. He was beautiful, but he ended up being like a forest
    ranger type of person in Mexico in his community there and municipality. He was in charge of protecting the forests. So
    he worked the land but also he was in charge of protecting the forest and of course, a lot of the indigenous people were
    cutting wood in the forest to sell to use for themselves, and it was my father's job to try and stop that. They were not
    happy with that. When my father was eight years old, several of the men in the village killed my grandfather in front
    of my father. They killed him with machetes and stopped the forest work there, because they needed the wood. So that had
    a huge impact on my father and his mother -- he was living-- the family was living in Zacapu and his mother was Texan.
    So she came from a landowning family in Texas, not by any means big, hacendados, but I think they were at one point. But
    after the Mexican - American War, they lost their land and they ended up with just a very small piece of land that they
    grew cotton in. But still, they had land, they had their own land. And she was from Texas, which in Mexico at the time,
    which was like what-- in the 1920's? Mexicans from the United States were considered gringos. So my grandmother could
    not speak Spanish. And she was in this indigenous village in Zacapu, Michoacan, a very unpopular woman.
- speaker: Interviewer
  text: Did they speak Purépecha in that village?
- speaker: Respondent
  text: Yes. They did. They spoke Purépecha and Spanish and she could speak neither. She-- they also saw her as a very, I
    guess, upper class person and I have photos of my grandmother and she was. She was a very elegant woman. She didn't act
    elegantly. She looks very humble and like a peaceful, calm woman. But they didn't like her because she was a gringa. And
    she, of course, she was with my father and there was a lot of jealousy among the women that he had gone and married a
    gringa, and so when my grandfather was killed, it became very difficult for my father. He became the head of the family,
    the whole village ostracized my grandmother. Then, they could do it more openly because my grandfather was no longer there,
    she didn't have a man. She had a lot of men bother her. My father used to say he knew that she was raped. But the women
    didn't call it that, and the community didn't call it that. She then became-- had a bad reputation as a "loose woman"
    because the men were like, on her all the time, and it was very difficult time for my father. He was affected a lot by
    that. He then became the caretaker of the family and to get her out of there, she had several brothers that were still
    in Texas. So in Texas, her brothers made a marriage arrangement for her and they brought the man to Mexico and he came
    and got her and they married her off in Texas. And that's how my father left Michoacan and came to Texas with his siblings,
    and she married this Texan Mexican. He was a farmworker in the United States, and their family began the migrant circuit.
    My father, at the age of ten, then became a farmworker working as an adult male with this stepfather of his whom he always
    hated. And they worked-- he worked the whole family, they traveled all over the United States working in the fields. It
    was a really difficult time for my father until the age of fifteen, I believe. Fourteen or fifteen, my aunts tell me,
    my father left the family. He refused to work with his stepfather anymore. And he left the family and worked on his own
    with other young men who had similar circumstances. He traveled and did the migrant circuit but with another group. I
    mean, in those years they traveled in groups, right? Families, caravans, he traveled with another group. But he traveled
    and made money so that he could live his own life away from his stepfather, who apparently was really cruel to him. Then
    he helped support the families. So he would in a subversive way, I guess, he would send money to his mother and to his
    sisters to make sure that they had what they needed, because the stepfather was not-- he kept the money. He spent it for
    the family, but the family was all women, right? It was his sisters and his mother. So he took care of them, and continued
    working in that way until he met my mother. I believe Mom was like 21 or 22 years old when she and Dad got married, and
    she's a couple of years older than him so he must have been around twenty-seven or so when they got married. He knew my
    mother since she was, I guess, to hear her story-- She first met my father when he was fourteen, although he never knew,
    because he didn't pay attention to my mother. But then he met her again when she was in her twenties, when she was eighteen
    or nineteen or something, and they fell in love and they ended up getting married. And that was in Coahuila. So my mother
    grew up in Coahuila, which is a, you know, another state on the other side of Mexico. And she grew up basically an orphan.
    She was abandoned by her family when she was-- where her father-- her mother died when she was four, and her father abandoned
    her and her siblings. And they-- she lived in the streets in Rosita-- Yeah, yeah, it was a coal mining area. She lived
    in the streets until she was eleven years old, taking care of her brothers and sisters. And then an aunt took her in,
    which also traumatized my mother a lot other than the fact that she was already homeless, you know, because she was forced
    to abandon her brothers and sisters. So it's very similar stories of her and dad, right, where he was forced to abandon
    his family in order to take care of them. And my mother was forced to abandon her brothers and sisters that she'd cared
    for all this time. So they had like this very simple-- (cries) I always get emotional.
- speaker: Interviewer
  text: Nueva Rosita?
- speaker: Respondent
  text: Well, I think for us, it's like we've grown up with them and we've seen the effects of that kind of orphan childhood,
    you know, because my mom has been working as an adult since she was what? Four, right. Since she was abandoned, and her
    father was in and out of her life. I met him, actually met her father one time when I was like, five years old. I remember
    him, he was a very-- he was a white man, very light skinned. I think he was Basque, although my mother won't say so. Now
    that I see Basque people, he really looked Basque. He had green eyes, light skin. My mother was dark, but she's got two
    sisters who are very light skinned and have green eyes similar to him almost blonde hair. But my mother's mother, my grandmother,
    was really indigenous. I have-- We have a photo of her, and she looks like she's Kickapoo or Apache or something like
    that. She's very, very dark, straight haired, very indigenous woman. And then she's sitting next to-- she's got my mother
    on her lap because she's the oldest, and my grandfather sitting standing next to him, and she's sitting, and he's like
    this Spaniard-looking type of man. It's just a different couple. So, and again, you know, the same thing happened to my
    mother. She and my dad wanted to get married, and when they got married, her whole family disowned her, because she married
    a gringo cuz he was from Texas. So it was just like the same thing. It was really difficult for both of them to make their
    life together, but they did. They bought a piece of land in Coahuila, and they tried the migrant circuit. My dad continued
    working in the fields in the migrant circuit while married to Mom, but he wanted her to go with him, and she didn't. But
    she did one time, and she went in-- She went with him in the migrant circuit that goes up into Minnesota and Wisconsin.
    It was a disaster. It was a disaster. But she did live with him in Texas several times when he was working in the railroad.
    There was a couple of years, and that's where I was born and Elida was born. He was working in the railroads in Texas.
- speaker: Interviewer
  text: Why did he buy a piece of land and Coahuila, a piece of land just to live on or to farm or what kind of land?
- speaker: Respondent
  text: It was a land to live on. He bought it for my mother, because after the disastrous migrant circuit where she went
    with him, she absolutely said, "There is no way I am going to go back to that country again. I will not go with you."
- speaker: Interviewer
  text: Why was it disastrous?
- speaker: Respondent
  text: They worked picking apples and cherries, something some tree for I think it was cherries in Wisconsin, and I have
    the names of the towns that she told me. They made good money, and they had a car so they drove-- with that money that
    they made, they bought a car. They had driven up with families, but they ended up making enough money to buy their own
    car and so, plus a little bit of extra and then we're headed back to Coahuila, you know, where mom wanted to go back and
    visit her family in Texas and you know the border, they were heading back to the border. And they had all their money
    in the car and all their stuff. And before they left, I think it was Wisconsin. They stopped at a gas station and in a
    rural area. And I don't know what happened. But dad still doesn't know what happened. But their car exploded. The car
    burst into flames. And Elida was an infant then. He ran into the car. I was on my mother's arms. And Elida was in the
    car. He ran, grabbed Elida out of the car, and the car exploded. And they lost everything. They lost everything. They
    were left in this town with nothing except their two babies. And because of the time that it was, it was around 1953 maybe
    '52. They were scared because of the racism and farmworkers everywhere-- Dad always talked about that, no matter where
    they went, they encountered the racism, the attacks, they had to hide when there was there was large groups of white men,
    they would all hide to make sure they didn't see them because, you know, there was beatings and things could happen, right.
    I mean, he talked about hangings, lynchings of Mexicans, so they were really scared. And they looked at the gas station
    and the guy in the gas station, of course, came out running. And he came out running to them and Mom and Dad didn't know
    what to do, how they were going to protect-- Dad was looking how am I going to protect my family now from this guy, and
    but the guy wanted to help them and so he took them inside, and he got on the phone and Dad thought he was gonna call
    the police and he told mom, "Let's get out of here, he's calling the police. We don't want to be with the police." But
    he didn't he called other people in town. And they came and they helped. I mean, and they put Mom and Dad up. They fed
    them. You know, they gave them money. They gave them clothes. And they gave them money for Mom and Dad to get a bus and
    get back to the border. And it was amazing. Dad said he'd never encountered white people that were so nice to them, and
    he always told us that story, or at least me. I don't know if my brothers and sisters remember. It was his story to try
    to guard us from- about racism, that it exists. It's bad. It's almost all over the place. But you know, every once in
    a while you find these white people who are not that way. And you have to learn how to get along with them, because it's
    not 100%. And you have to understand that what racism does to people, but you have to have friends that are white, because
    there are good people. And this is-- that was his story to show. He didn't think it was going to turn out good, but it
    did. Well, kind of good. So after that, Mom said, "No more. I'm not going back. It's too risky. We've got our daughters
    with us." He saw the life on the road with the labor camps and no living conditions, you know, no living spaces. And so
    they gathered enough money together. I don't know how, I'll have to ask Mom where they got the money. But they bought
    a little piece of land in Coahuila for mom to stay and live on while he was working in the fields in the United States.
    And so she ended up farming that little piece of land. It was like an ejido, now that I know about that, because she planted
    corn, beans, cabbage, lots of other vegetables one time, even watermelons. I remember even eating watermelons. She became
