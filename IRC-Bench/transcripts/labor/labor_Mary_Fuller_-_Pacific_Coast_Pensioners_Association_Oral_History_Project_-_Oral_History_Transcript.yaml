collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Where did your parents come from? Tell me something about your parents' background.
- speaker: Respondent
  text: My parents are both from Canada. They migrated down here, or came down, in 1951. I have two older sisters and an older
    brother who are Canadian, but they have since taken their papers out and they're U.S. citizens, and then a younger brother
    and sister who were born down here in the U.S. with me.
- speaker: Interviewer
  text: How come they came down here from Canada?
- speaker: Respondent
  text: I think work opportunity. They both were in the military, the Canadian Air Force. My dad was an electronic technician
    and I think it was a better work opportunity down here.
- speaker: Interviewer
  text: But if he was in the Canadian military, how could he just come down here?
- speaker: Respondent
  text: When he got out of the military, when they both got out, when they were both discharged.
- speaker: Interviewer
  text: So, they were a military family. Were they politically involved in any way, or interested?
- speaker: Respondent
  text: I don't think so. I don't know for sure, but I don't think so.
- speaker: Interviewer
  text: Unions at all?
- speaker: Respondent
  text: No. I believe I probably am the first in a union. Since then my brothers were in unions, and my sister was in a union,
    but not as strong as the ILWU.
- speaker: Interviewer
  text: Where is it that they settled in Seattle?
- speaker: Respondent
  text: In north Seattle, in Shoreline. That's where I grew up is Shoreline.
- speaker: Interviewer
  text: What's it like growing up in the 50s and 60s in Shoreline.
- speaker: Respondent
  text: Well . . . very white. [chuckles] There wasn't a lot of racial mix up there. Just a Leave-It-to-Beaver-type family.
    Went to school, came home. Dad had a piano. He used to play the piano and we'd sing around the piano. It was a very good
    upbringing. Six kids in the family, so we had a lot of people to play with.
- speaker: Interviewer
  text: And your dad was doing electronics?
- speaker: Respondent
  text: Yes, he was an electronic technician.
- speaker: Interviewer
  text: What was your schooling like?
- speaker: Respondent
  text: Well, I went to school in Shoreline there and high school, Shoreline High School. Typical public school. I graduated
    and went to a couple years of college, but never graduated college. I went to work.
- speaker: Interviewer
  text: Where did you go to college?
- speaker: Respondent
  text: Shoreline Community College.
- speaker: Interviewer
  text: What kind of work did you do before you came into the ILWU?
- speaker: Respondent
  text: After I graduated, I got hired by Mitsui O.S.K. Lines, and I worked for Mitsui O.S.K. Lines for about four years.
    I used to work directly with the Port of Seattle, the people in the Port of Seattle, and one of the bosses at the Port
    of Seattle, Frank Clark, was going to hire some people, and he told me, "Mary, put your application in." So, I did, and
    I went to work for the Port of Seattle. I think it was about eight years at the Port of Seattle, something like that,
    when in 1980, they opened up for women to become longshoremen.
- speaker: Interviewer
  text: What did you do for the Port of Seattle?
- speaker: Respondent
  text: I worked in a warehouse. I worked directly with the longshoremen and with the clerks. I was the one that got all their
    paperwork ready for them. And I worked with Customs. I was kind of the go-between between the longshoremen and Customs
    or the clerks and Customs. When they had to take women in 1980, the guys - and I feel real good about this - some of the
    guys came to me and said, "Mary, put your application in." So, I did, and when I got interviewed, the guy from the PMA
    and the guy from the union - the guy from the PMA really didn't say anything. It was Joe Weber. I don't know if you know
    who Weber is. But the guy from the union, he just looked at me and he says, "Do you think you can do the job?" And all
    I told him is, "I'll give it 110 percent. I'll do everything I can." He says, "Okay."
- speaker: Interviewer
  text: Who was that, do you recall?
- speaker: Respondent
  text: Bob Lindsey. I think he is deceased now. I think he's gone.
- speaker: Interviewer
  text: What was your first day on the job like?
- speaker: Respondent
  text: Scary. [laughing] It was scary. They kept giving us Fisher's Flour Mill, because that was the worst job, and it was
    throwing 50-, 60-, 70-pound sacks. The first night after I went home, I didn't think I was going to survive. I thought
    I was going to die. [chuckles] Seriously. I had muscles I didn't even know existed. But I got myself up the next day and
    went back down to the hall again, and there I was at Fisher's again the next day. You just ... 've always been a stubborn
    person. If someone tells me I can't do it, I'm going to do it.
- speaker: Interviewer
  text: Did anybody tell you you couldn't do it?
- speaker: Respondent
  text: Mm-hm. A lot of people told me I couldn't do it.
- speaker: Interviewer
  text: Tell us about that. Give us some detail about that.
- speaker: Respondent
  text: Well, when we first started down there, when the women first started down there, the guys didn't want us there. They
    didn't want us there. But I found out that if you put your 110 percent in, and you show that you're really trying, those
    guys were great. I also learned that it's a lot easier to drive a truck than it is to throw 50-, 60-pound sacks of flour,
    sugar, whatever it is, and so I taught myself how to drive a truck. Some of the guys, I don't think ever came around,
    but most of them did. When they saw that the women were really putting their 110 percent in and really doing a good job,
    then they would. I could tell you stories about jobs that I worked with guys and the first time "No, I'm not working with
    a woman." Well, we were in a warehouse and I said, "You just sit on that bowl and you bring the boards to me. I'll load
    them up." I loaded them faster than he could take them and put them away. So the next night we're there, he says, "I want
    her as a partner." Because he didn't have to get off the forklift. [laughing] And so "I want her as a partner," that's
    all you had to do was just do your job.
- speaker: Interviewer
  text: Any particular incident that you recall? There are sometimes guys who will not come around. Do you have any stories
    behind that kind of experience?
- speaker: Respondent
  text: Oh, yeah. I've had lashing bars thrown at me. Guys just refusing to work with me and go off and do their own thing.
    But I'd say 99 percent of the bosses would back you up. The one time I'm thinking of, this guy, I was lashing with him
    and he didn't want to work with a woman. He did not want to work with a woman, so he started throwing lashing bars. I
    just got down and went up in the bow of the ship, sat on a rope. The foreman came and found me and he says, "What are
    you doing?" I said, "Well, I'm not working in there. It's dangerous." He says, "What's going on?" I told him and he says,
    "Okay, fine. Stay here." He went back and told the other guy, "You've got the bay. You do it." Which was really nice.
    A lot of the bosses were really good.
- speaker: Respondent
  text: My own personal opinion is if you got in there and you were doing the job, and you didn't give anybody any grief and
    you just stood your own ground - I can swear like a longshoreman now, I tell you what, and nobody gave me grief. I think
    I was pretty well respected down there, but it's because I did my job. And I loved the guys.
- speaker: Interviewer
  text: How long were you in Local 19?
- speaker: Respondent
  text: Seventeen years.
- speaker: Interviewer
  text: Were you active at all in the local?
- speaker: Respondent
  text: I tried to be. I went to the meetings, but that's kind of where the hard part was. I couldn't ... it was hard to advance
    myself because everything was so congested and there were so many people. I wanted to drive crane, but I couldn't even
    see the crane board in my lifetime down there, so that's when I transferred to checkers. I drove all the other equipment.
    I had some strad training, I drove truck, I did everything but I couldn't get into the crane. There was just too many
    people. Then the body was starting to break down after 17 years of jumping up and down on the containers. And we did so
    many things that were unsafe back then that they wouldn't even tolerate now. [laughing]
- speaker: Interviewer
  text: That's about 1997 that you retired?
- speaker: Interviewer
  text: What was your favorite product to work?
- speaker: Respondent
  text: Longshoring?
- speaker: Respondent
  text: Gosh, I liked them all. Lashing was my least favorite.
- speaker: Respondent
  text: Because it was heavy. The three high bars were really hard for me. The two high bars were okay and the turnbuckles,
    but the three high bars were hard. The best? When I first started, when I was younger, I liked working the apple ships
    because you were there for a week or so, and you were working with the same guys, and that's that camaraderie that you
    have that we don't find so much anymore. You were working with the same guys and you knew how they worked, and it was
    like a big family. Now, not so much.
- speaker: Interviewer
  text: What was the worst product, the one you disliked the most?
- speaker: Respondent
  text: The lashing. I did like - I had my combination license and I drove for what they call hook transfer. It was longshoremen
    driving the trucks in between the piers. I got my combination license and I did that, and that was fun because we worked
    as a group. There were about six or seven of us that would go. That's another thing. Another story is when I went and
    got my combination license, and SSA signed a waiver for me - so I had never driven a truck but I passed the written test,
    I had my combination license. The dispatcher and the business agent at the time found out I had my combination license,
    so when I went in - pegged in for a job - they said, "Here, you've got this job." I says, "I've never driven over the
    road yet. Can I go with someone?" They said, "No, you can't. You take the job or you go home." I says, "Give me the goddamn
    job." I took it, and I almost blew the truck up, but I did learn how to drive. [laughing] That was fun because the guys,
    we would break together. It would be like a caravan, there would be four or five of us, and we would just kind of watch
    out for each other.
- speaker: Interviewer
  text: Did anybody help you, like "Here's how you drive this thing"? Did anybody give you any lessons?
- speaker: Respondent
  text: No, I just got in myself and did it. [chuckles] I tried to teach other people how to do it, but there were some people
    that just mechanically couldn't do it. In fact, when I was working for the Port of Seattle - before I quit there and before
    I started longshoring, I knew I was going to longshore so I had put my thing in to retire, to quit - and the chief supervisor
    there would tell me, "Okay, there's a chassis in row 34, slot three. You can use that chassis." So I'd go jump in one
    of the trucks at my break time or lunchtime and I'd go out and practice. So by the time I got into the union, I did know
    how to drive truck, but it was because of the guys down there being so good to me.
- speaker: Interviewer
  text: What about some of the other women? What was their experience who went in with you in 1980?
- speaker: Respondent
  text: Kristi and Cindy, who are here with me to this. Oh, god. Gretchen, I think Gretchen's still working. Bobbie, and Bobbie
    has passed. I don't know. There was about 12 of us that got in in 1980. We all did pretty good. And you find this in men,
    too, there are workers and there weren't workers. A couple of the women would take the real easy jobs or they wouldn't
    work. I just took a job and did it. But for the most part, I think the first 12 women were workers, and we were pretty
    well respected. I think we set the bar for the women coming behind us pretty high.
- speaker: Interviewer
  text: When did you retire? Did you retire fairly recently?
- speaker: Interviewer
  text: Were you 62 at that time?
- speaker: Respondent
  text: No, I retired on a disability because I have two replaced hips - actually, I've had three replaced hips - I've broken
    my ankle, I've smashed fingers. The body was just falling apart.
- speaker: Interviewer
  text: Were all these accidents on the job?
- speaker: Respondent
  text: Oh, yeah. Smashed fingers ... well, the hips were just from wear and tear. But the ankle, smashed fingers, cuts ...
    but it was the hips and the climbing. Of course, when I started, we did things that they don't do anymore. You climb up
    the side of the container, you're up on the container, they bring the can over your head. They don't do that. You jump
    down from container to container, and if the guys can do it, sure, I can do it. [chuckles]
- speaker: Interviewer
  text: How did you hurt your ankle?
- speaker: Respondent
  text: I broke it at work. I think I stepped down ... I was driving strad at the time. I came out of the strad, and instead
    of coming down and turning around and coming down backwards, I was on the last step and I jumped down and it just twisted.
- speaker: Interviewer
  text: Do you remember how you hurt your fingers?
- speaker: Respondent
  text: I got this finger smashed at Matson. I got it caught between a cone and a truck tire when they brought the container
    down, but I had my hand where it shouldn't have been. And I never did that again! [laughing] It didn't break it, it just
    smashed it in. It still...
- speaker: Interviewer
  text: Still acts a little funny?
- speaker: Respondent
  text: Yeah. It's still out of shape and everything, but it works.
- speaker: Interviewer
  text: Were you at all involved in the 2002 lockout? Do you remember the big lockout?
