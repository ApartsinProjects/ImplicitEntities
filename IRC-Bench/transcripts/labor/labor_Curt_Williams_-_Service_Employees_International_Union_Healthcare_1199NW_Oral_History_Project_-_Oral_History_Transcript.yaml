turns:
- speaker: Interviewer
  text: Tell me a little bit about your background, your family, where you grew up and how that got you started on this organizing
    path.
- speaker: Respondent
  text: I grew up in Baltimore, Maryland. My father was a doctor. I was very politicized. Went to Oberlin College. Got politicized
    there. I did a variety of winter terms when I was in Washington, D.C. - Americans for Democratic Action and some other
    internships that politicized me. When I got out of college, I went to work for ACORN, which is a community organizing
    group in Brooklyn, New York. Then I moved back home to Baltimore and got a job with 1199, the union. My family was a political
    family, so we did talk a lot about politics.
- speaker: Interviewer
  text: What was that like, growing up with a political family. How did that characterize your education?
- speaker: Respondent
  text: I actually was in a fairly wealthy family. I went to private schools, but at the same time, I'm old enough that I
    remember when [Martin Luther] King was shot and when Robert Kennedy was shot and the Civil Rights movement riots. I was
    in a fairly privileged private school and I was alienated from that and really happy to be able to go to a college where
    it felt a lot more real, and where we were having real conversations. [Ronald] Reagan got elected my sophomore year, I
    think, and that was a horrible moment. That's what woke me up also. The Watergate trials was the other thing. The hearings
    were something that also had woken me up to our institutions being a little shaky.
- speaker: Interviewer
  text: Can you tell me a bit about your experience in college? You said it was more real. Did it open you up to organizing
    more? What did that look like, both in college and once you started working for ACORN?
- speaker: Respondent
  text: In college, I think, the events that I remember the most were people being arrested at the South African embassy in
    the fight around apartheid, and trying to get the college to divest. There was also the PATCO strike. PATCO had a location
    right near Oberlin so we went out to the picket line. It just felt like the world was going in the wrong direction with
    Reagan, and I wanted to do something meaningful. After college, most people were figuring out where they were going to
    go, and I chose New York. I had friends who were familiar with ACORN and I went and interviewed with them. They had a
    great organizer who was leading their program. He taught me how to house visit and build leadership and commitment and
    agitate. You had to be pretty political because you made no money. I would buy bus tokens or subway tokens and save my
    money for meals and rent. I sort of ran out of money, and that's part of the reason I left New York was it's a pretty
    expensive place to live.
- speaker: Interviewer
  text: What was your role in ACORN, and what was your experience throughout? How did your roles shift?
- speaker: Respondent
  text: My role was just to be a door knocker and an organizer, and to build community groups. I got to know people in Bed-Stuyvesant,
    Brownsville, New York, and East New York. Our best group, in some ways, was in East New York. My job was mostly to knock
    on doors and to take the leadership as the lead organizer, put together small meetings of willing community members, and
    then take part in actions, or help the members take actions. We were pretty new in New York, so we were more trying to
    find the right campaign, and hadn't quite found the right one yet.
- speaker: Interviewer
  text: Was there a transformative moment, either before or during the time you were organizing, that really sticks out in
    your mind as being the moment where you wanted to dedicate your life to organizing?
- speaker: Respondent
  text: I wouldn't say there was, actually, in Brooklyn. It made me stay in the movement, to some extent, but it was really
    hard, and we didn't get lots of success. They just didn't have a process where they could pay the organizers enough, so
    I just couldn't live there. You can't live in New York on $100 a week and sustain it for long.
- speaker: Interviewer
  text: What was the transition out of ACORN like, and what did you do next?
- speaker: Respondent
  text: I moved home to Baltimore because I was out of money, and I went to work for the first African American candidate
    to run for mayor in Baltimore. Baltimore is really a Southern city in a lot of ways and they'd had the same very popular
    mayor, [William Donald] Schaefer, for a long time. Racism in Baltimore is really pretty extreme. It's a very divided city.
    So, I jumped at this opportunity, and did a lot of research. Got to know Billy Murphy a little bit. He lost - lost pretty
    badly - but after the election, I applied to 1199, which was a well-known union in New York City, and I heard about them
    when I worked for ACORN. They saw that I'd worked for Billy Murphy and they were a union that was born out of the Civil
    Rights movement, and, amazingly, hired me. It was a good transition to 1199 in Baltimore. They wanted to start a new organizing
    department, so I was the first new organizer they hired.
- speaker: Interviewer
  text: How was your experience with SEIU or 1199 compared to your experience in ACORN? How were the strategies different?
- speaker: Respondent
  text: It was much more about a workplace rather than a neighborhood. It was some of the same skills. You needed to identify
    leadership, you needed to ask agitational questions, you needed to be a good listener. There were very useful skills I
    learned at ACORN that were helpful with the organizing. The hard part was to get workers to talk to you as they're driving
    out of the nursing home. Our strategies were a little weak in those days, so we'd stand out front and try to talk to people
    and meet with people, and then meet with them at the Denny's later. So, it took a little while to get some campaigns going,
    but once we got them going, it was pretty lively.
- speaker: Interviewer
  text: What are some of the campaigns you've worked on that stand out the most and why?
- speaker: Respondent
  text: We organized a nursing home outside of Annapolis. That was my very first campaign and I had no idea how difficult
    management fight back could be in the workplace. I thought that we had the election won, for sure, but people stopped
    talking to me. I kept fooling myself, thinking they were for the union because of earlier experience with them. So, I
    lost my very first campaign. Then we ran it again because management committed to [unintelligible] and won the campaign,
    but never negotiated a first contract, which was sad. Then we had some other campaigns in Baltimore, and in Washington,
    D.C., we had a couple of big campaigns. The biggest success I really had was organizing the social workers who worked
    for the City of Washington. They had a big mental health hospital, St. Elizabeth's, so they had about 500 social workers.
    It was a big group. We organized them and bargained their first contract. That felt really good. It was also a moment
    where the union was going through all kinds of political upheaval because there was a merger with SEIU. At 1199, they'd
    been independent, and when we merged with SEIU, our local was one where there was a contentious fight about whether to
    go to SEIU or to go to AFSCME [American Federation of State, County and Municipal Employees]. My time there ended with
    that fight. We won, going to SEIU, but I remember I worked two months straight. [Unintelligible] exhausted by the end
    of it. Shortly thereafter, I was recruited by the organizing institutes to help out with trainings. I heard about the
    Steelworkers wanting to hire some organizers, and after eight years in Baltimore, I really wanted to try to go reinvent
    the labor movement again with the Steelworkers and see if we could get something going with another group of organizers
    who were excited about that vision as well.
- speaker: Interviewer
  text: What was your experience with the Steelworkers like, and what was your role?
- speaker: Respondent
  text: I was hired to be the organizing coordinator for a district that covered Michigan and northern Ohio, a very industrial
    past. You could tell they'd had a heyday and were on the downward slope on the other side of it. We started organizing
    a mini-mill. We were trying to organize a mini-mill in Monroe, Michigan, which was a target right in their sweet spot.
    I got a lot of interns to come up to the organizing institutes. These were young students who wanted to be organizers.
    We had about 10 of them and we went and house visited all these folks from North Star Steel. We got to a bare majority,
    about 51, 52 percent. I didn't think it was ready to go to an election but the district director, who was a very charismatic
    guy but not a terribly progressive guy, just wanted to run it anyway. Didn't want to hear anything I had to say about
    management's campaign or any of that, and thought he could convince people because of his charisma. He never really came
    down and did much with it, and we lost the campaign pretty bad. That was a tough one. Then about six months later, we
    had a big campaign in the western part of the state at a meat packing plant. We had a wonderful Latino organizer. It was
    a Latino workforce and then an Asian workforce. They were all recent immigrants. Incredibly hard work. Exploitive work.
    People really got injured at this place. We got a good majority, and the district director that I told you about earlier,
    Harry Lester, sent out some organizers that he hand-picked. They showed up in Lincoln Town Cars, and they didn't really
    want to organize, and they didn't want to work the hours, so there was some contentious back and forth with them after
    a couple of days. Harry called me back to Detroit and said he needed to have a one-on-one meeting with me. The long and
    the short of that meeting was that he told me that these were marginal people and we don't want to organize them - it
    was an incredibly upsetting meeting - and he said he was going to pull the resources. I said, "We're not leaving. We're
    going to run this campaign." We had an election in two weeks. I got the international union in Pittsburgh to send me some
    people. It was terrible. We lost the election by 40 votes. We could have won it if Harry hadn't done this. That was a
    very politicizing event for me. I could never work for him again and I left. I didn't leave the Steelworkers, so they
    gave me a choice to move to Houston or move to Seattle. I moved to Seattle and we organized an aluminum smelter down in
    Vancouver, Washington, with organizing institute interns. This was the biggest organizing drive the Steelworkers had won
    in 20 years - 570 workers or something like that - at [Benalco?]. I went to the convention about a month and a half after
    that in Pittsburgh. They tried to run an initiative on the convention floor that would ban organizers who came from college;
    that you would have to be hired off the shop floor in order to be hired into an organizing job for Steelworkers. After
    winning this big campaign - the biggest one they'd won in a long time - it was where this reaction to people like myself
    and this new wave of organizers - there was just a real bummer. While Lynn Williams, who was the president at the time,
    was great, and he fought it off, and was very eloquent in resisting it, it didn't bode well for the future. We tried to
    organize US Air and some other things, and I was on the road all the time. I'd be on the road for 10 days and home for
    two or three. I was in a new marriage and it wasn't working out so well. We had a big campaign in Utah, I remember, and
    that was very tough. The Mormon Church got involved and people all of a sudden stopped talking to me. We lost that campaign.
    We had a [bike? fike?] group in Kent that we won. It was a little here, a little there. Then we had these big campaigns
    with airlines that didn't go so well. My wife got pregnant and I didn't want to be on the road any more. I was coming
    home. And 1199 here, I was familiar with because I'd worked for 1199 in Baltimore. I came to work in 1995 for 1199 here
    in Seattle.
- speaker: Interviewer
  text: You mentioned something about the Steelworkers campaign about how organizing jobs were coming from people who were
    in the shop, or how they were campaigning for that? How has your perspective been influenced by the fact that you had
    been an organizer pretty much since college? How has that perspective influenced your work?
