source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: All right, so what was your life prior to joining the Rainbow Coalition? Did you grow up in Washington state, or did
    you move here? When and why?
- speaker: Respondent
  text: I grew up in New York, in the suburbs of New York City, went to high school, lived there with my family through high
    school, spent my first year of college at Columbia University in New York City in 1970-71. And then I transferred from
    there to Antioch College in Ohio, Yellow Springs, Ohio, and attended college there for the three remaining years and graduated
    from college there. And upon graduation, I moved to Seattle. And the reason I moved to Seattle at that time was I had
    been in Seattle. Antioch College has a work study component, so you study for usually two semesters or two quarters or
    three quarters out of the year, and then one or two quarters out of each year, you're off campus doing internships. And
    I did one of my internships in Seattle. I majored in elementary education. I did one of my internships here in Seattle
    in 1973 and really liked this part of the country, and I liked that there was a lot of young people and a youth movement
    kind of thing going on here at the time. And so when I graduated from college, I moved to Seattle to live and to seek
    employment as a high school--or actually at that time, I was planning to be an elementary school teacher. So I moved here
    in 1974 after graduating from high school, or college, I'm sorry.
- speaker: Interviewer
  text: Were you involved in electoral politics prior to the Jesse Jackson campaign?
- speaker: Respondent
  text: Yeah, I was. And actually, when I was growing up, I was the oldest of four children. My parents were active in the
    Democratic Party in Nassau County on Long Island in New York State. My father when I was in fourth grade, I think, or
    sixth grade, was elected to the New York State Legislature as a democratic, what they call there an assemblyman state
    representative, and he served in the state legislature for ten years. During that time I was growing up, it was Civil
    Rights Movement and the anti- Vietnam War movement were growing and and becoming very active. So my last couple of years
    of high school, I got more politically involved, mostly in protest politics against the Vietnam War, primarily. But because
    of my my parents' involvement in electoral politics, I learned a lot about how electoral politics works and how state
    government works. And so I was not particularly supportive of that form of political activism myself as a young person,
    but knew enough about it to help inform some of the things I was doing in high school and in college. When I was in college,
    I continued to be active in the anti- Vietnam War movement, moreso in the one year I was in New York City than three years
    I was in college in Ohio, although there was a major US Air Force Base just a few miles from where I went to college.
    So we did--I was involved in regular protests outside the gates of the Wright-Patterson Air Force Base near Dayton, Ohio.
    And then when I moved to Seattle in 1974, in the summer of 1974, I continued to be involved to some extent, although at
    that point, the Vietnam War was--the US involvement and and primary responsibility for the Vietnam War was coming to an
    end, largely due to the anti-war movement that had been going on for at least six or eight years leading up to 1974. And
    then, so after I moved to Seattle, I was here for a little while, then I started getting involved in in ternational liberation
    solidarity movements. There were groups of activists in the Seattle area working on Central America solidarity for liberation
    movements like in Nicaragua and El Salvador. I got involved in that and then through that work, I eventually became a
    part of a group that did a lot of work, a lot of anti-racist organizing in Seattle. There was one organization that I
    was a part of for a number of years called the National Anti-Racist Organizing Committee. The Ku Klux Klan was active
    in the state of Washington and the state of Idaho, mostly Eastern Washington, but active and present, and that organization
    that I became a part of did a lot of or ganizing and educational work about the existence of the Ku Klux Klan and another
    white supremacist right wing organization, the name of which I just forgot, but that was organized primarily in Idaho.
    So we did a lot of work just to inform people about the existence and the threat that those organizations posed, and did
    some counter protests. I didn'tespecially get involved and that group that I was a part of didn't do much in terms of
    electoral politics, other than to try to lobby elected officials to take stands against the racist white supremacist organizations,
    and also to get elected officials, Congress people, in particular, to get the US to end its support of fascist dictatorships
    in the Philippines and in Nicaragua and El Salvador. And also at that point, we started to get involved in the anti-apartheid
    in South Africa work, and that became a focus of the work that that that group, the National Anti-Racist Organizing Committee,
    did. There became a Seattle anti apartheid network that developed in the late 1970's and throughout the 80's, that did
    protests and divestment campaigns, where we lobbied the state in vestment fund and University of Washington system and
    state Congress and state legislators to divest from in vestments and companies and corporations doing business in South
    Africa. And we did weekly protests, there was a South African consul who conducted business out of his house in Madison
    Park neighborhood, and we did weekly picket lines and protests and civil disobedience in front of his house every Sunday.
    So as a part of that work and through all of that basically anti-racist, anti imperialist, pro-liberation work that I
    was a part of, we in teracted with elected officials and candidates running for office throughout the late 70's and 80's.
    And that really laid the foundation for, I think, for the the work that I was involved in, and a lot of other people were
    involved in, to be involved in electoral politics and to be involved in the formation of the Washington State Rainbow
    Coalition in 1984.
- speaker: Interviewer
  text: Yeah, so about that. When did you join the Rainbow Coalition, which you talked a little bit about, and what was the
    Rainbow doing at that time that made you want to join?
- speaker: Respondent
  text: Well, I was part of the group of people that helped start the Rainbow Coalition, and like I said, it came out of other
    work that I was involved in, and a lot of other progressive young people and people of color were involved in, in the
    Seattle area and across the state of Washington also. And you know, focusing on, like I said, anti-apartheid work related
    to South Africa and pro-liberation, pro-democracy, anti-fascist dictatorship, organizing and civil rights activism in
    the Seattle area and connecting with other groups doing similar work in other parts of the state of Washington and peripherally
    and somewhat involved in electoral politics. And in 1984 when Reverend Jesse Jackson announced that he was going to run
    for president, the group of activists that I was a part of saw that as an important opportunity to get involved in his
    campaign and support his campaign and establish an or ganization in the state of Washington to support his campaign, because
    his his progressive, pro-democracy, anti-racist politics that were the foundation of his candidacy for presidency were
    in line with the work that we had been doing. And so I was a part of a group of activists, a multi racial group of activists,
    some of whom were already involved in in Democratic Party electoral politics in the state of Washington, and some of whom
    hadn't yet gotten into those structures, but we formed the Washington State Rainbow Coalition early in 1984 to support
    Jesse Jackson's campaign for presidency, and stayed as an organization through that campaign, got involved in electoral
    politics with other candidates running for office in the state of Washington, found our own candidates to run for some
    of the offices, and then continued through and were part of the Jesse Jackson 1988 campaign for president.
- speaker: Interviewer
  text: Yeah. So what role or roles did you play, yourself, in the Washington State Rainbow Coalition, and what kind of activities
    were going on while you were involved?
- speaker: Respondent
  text: Okay, well, I was part of a group of people that were strategizing what were the best ways to get Jesse Jackson's
    message, his political left, progressive, anti-racist, unity-building message out to the voters in the state of Washington
    in both the '84 and '88 campaign. And the state of Washington was one of the states in the United States that did precinct
    caucuses to elect delegates to look to the congressional district, the state candidate conventions, and the national convention
    for the Democratic Party. So we got involved in the Democratic Party where we lived. So I joined the 37th Legislative
    District Democratic Party, as did a lot of us, wherever we lived in our district, Democratic Party organizations. We got
    ourselves well versed in the process of getting people to run for precinct in the precinct caucuses representing Jesse
    Jackson's presidential campaign and also the process that was a stage, you know, three or four stage process of getting
    delegates who were committed to Jesse Jackson for president, elected at every level up to the state convention, and then
    ultimately to the National Democratic Party Convention. So, in 1984 campaign, I was one of the people that was helping
    organize the running of candidates, people who were part of their precincts and their legislative districts to come to
    those meetings, those conventions, and declare that they supported Jesse Jackson. That's how votes were counted, and then
    run for delegate representing Jesse Jackson, from the precinct, the legislative district, to the congressional district,
    to the state convention, and then ultimately to the Democratic National Convention. So in '84 we kind of laid the groundwork,
    and we learned the system, and we got people elected as delegates, and we also did a lot of or ganizing to spread the
    political message and the political platform that the Rainbow Coalition and the Jesse Jackson campaign we're running on.
    So I worked on that. We were part of the platform committee for the Democratic Party at the legislative district and at
    the state conventions in '84. In 1988, we were a lot more effective because we had the next three years to build the Washington
    State Rainbow Coalition, get more involved in state Democratic Party and legislative district and congressional district
    Democratic Party organizations, get ourselves positioned to run those organizations and get elected to of fices within
    those Democratic Party structures, primarily for the purpose of promoting the progressive politics of the Rainbow Coalition.
    And in the course of doing that, we built an unprecedented, I guess, multiracial organization. Prior to that, there was
    limited participation by the Black community in the Seattle area and statewide by communities of color in electoral politics,
    just because of the disenfranchisement and the lack of effort to recruit and even to promote politics that meant something
    to people of color. And so the Rainbow Coalition's politics mobilized a lot of people of color and across the state to
    get involved. And so we had a multiracial coalition of activists, all ages, male and female, young and old, working to
    promote those politics within the Democratic Party. In 1988, we went even further, and we--well, for one thing, we were
    able to get almost a majority of the delegates, so we were about somewhere between 45 and 48% of the voters in precinct
    caucuses and legislative district, congressional district conventions supporting Jesse Jackson's presidency. So we had
    about 45% of the state delegates to the National Convention in 1988 committed to Jesse Jackson for president, which for
    a state like Washington state, with a less than 15% statewide population of people of color, was a success that made a
    big impression, a big impact on Democratic Party politics in the state. And we also had people, myself included, working
    on developing the state Democratic Party platform. So we had people in meetings. We had people in writing platfo
