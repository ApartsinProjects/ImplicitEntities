collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Can you spell your last name?
- speaker: Respondent
  text: M, c, capital L, E, O, D.
- speaker: Interviewer
  text: Okay. Well, can you tell me when you were born and where you were born?
- speaker: Respondent
  text: I was born on September the 22nd 1946 in Oklahoma.
- speaker: Interviewer
  text: What were your parents doing for work at that time?
- speaker: Respondent
  text: At that time my mother was, when I was actually born, she was single. And she got married to my stepfather the next
    year, and he was kind of a sharecropper and then he stopped that and started working as a janitor. His first job was the
    Turner Turnpike, and helped put that across the state of Oklahoma. And then he became one of the workers in one of the
    restaurants which was—I don't recall the name of it right now, but they used to be all up and down the Turner Turnpike.
    I don't know whether they even have them anymore.
- speaker: Interviewer
  text: What was it like growing up in Oklahoma?
- speaker: Respondent
  text: 'Very crowded, isolated out in the country; we grew up in rural county. We was five miles from the closest store.
    And so growing up every other year I would have a brother or sister. So when it got to we having nine of us it was quite
    extended. And growing up with my stepfather—he came to be my stepfather—he had this family, they was kind of like laughing
    all the time, but I found out later the reason they was laughing all the time: They was drinking all the time. You know,
    but they seemed to have fun. You know, and I didn''t sure feel like that on the inside, even as a young kid. I was reminded
    several times that that''s not your dad by his brothers and sisters, and, you know, occasionally they''d be used the word
    bastard child, you know, growing up, which I still didn''t understand what all that stuff was, and—But I know that I felt
    bad, so it must have been about me. You know, so I didn''t couldn''t tell, one way or another, whether it was directly
    at me or this was just the way they was and, come to find out later on as growing up—That''s just the way they was: just
    kind of a dysfunctional family. But together as a whole...'
- speaker: Interviewer
  text: How does that make you feel?
- speaker: Respondent
  text: 'Well, at that time, I felt very...different. I had the last name that was different from my brothers and sisters.
    So I felt different but it was never talked about in the household. My mother grew up in a household where she was born
    out of wedlock. So her stepdad used to hold that over her head all the time. So my stepdad and my mother didn''t come—it
    didn''t happen. But I knew it was there because I felt it, you know, I felt a difference of family at large versus the
    family that my mother got married into, versus her mother, which was my grandmother. It was two different, you know. And
    the, just growing up kind of feeling like: Oh OK. And—But I always wanted to get to that place where I had this laughter
    in my life, you know. And even though I kind of didn''t like the people, didn''t think they liked me, I felt that they
    had something—laughter about them.'
- speaker: Interviewer
  text: What's it like growing up in the community outside? That is, you know, was there segregation? What relations existed
    with the white folks? What was your experience there?
- speaker: Respondent
  text: Very much, you know, and we didn't pay too much attention. We knew it there, so we grew up in it. I remember the next
    door neighbor down about three miles away, he had this big cattle ranch and my dad usually would have four, five cows
    like that. And the cow would have a calf and, and that neighbor that lived down the way he would come by and he said,
    "Oh, I'll give you $20 for that cow and calf." Well, my dad will let him have it! To me, I thought—I didn't understand
    it at that time, but that was the way that they got credit at the banks and the stores is by the neighbors', right, doings,
    you know, the white neighbors. And other than that, it was, I went to school with most of them eventually, but I just,
    it was different. I felt better on that part than I felt on the inside part as far as the family because you kind of know
    where you was and stuff.
- speaker: Interviewer
  text: Are you saying that there was, like, this white guy was sort of taking advantage in some way?
- speaker: Respondent
  text: Yes, I—That's the way they lived down there. Yeah, it was. From the way I looked at it, it was different. I didn't
    have no way of basing it on some because I was in it myself. When I was old enough to leave and come back I seen just
    how different and how wrong that was. I was—I was very—But they lived that way.
- speaker: Interviewer
  text: Was it like an implied threat? If he didn't—If you're—
- speaker: Respondent
  text: No, I don't—
- speaker: Interviewer
  text: If you didn't sell the cow, would something happen?
- speaker: Respondent
  text: 'I don''t even think they even give it a second thought. They just did it. They just did it. And for me, I just didn''t
    understand why. As myself and my brothers and sisters grew up, we was kind of outspoken about "Why is this happening?
    What''s this about?" And so: "Well, you don''t—You don''t want to know." You know—stuff like that you would always be
    kind of shuttled off, not getting in a deep conversation about stuff that goes on, what''s going on.'
- speaker: Interviewer
  text: Did you go to school with white kids?
- speaker: Respondent
  text: Um-hm. Yeah, I started off with a Black school that was from one to five and then we separated and went to a white
    school, and it was kind of different. It was like we was there on one side of the wall and they was on the other side
    of the wall, and then we got to know each other. And for some reason, we kind of—We fit in, we fit in. And we didn't have
    too much troubles or anything like that. Had a little—a few scuffles here now but it wasn't nothing that—
- speaker: Interviewer
  text: What kind of scuffles? How did that happen?
- speaker: Respondent
  text: You know, when you're playing ball or just horsing around or something like that, or somebody might challenge somebody.
    It wasn't too much fighting or stuff like that. It was just standing toe to toe fist fighting. And "Okay, I got enough"
    and that would be it, you know—When we grew up, it wasn't about pulling out an Uzi or a knife or something; that would
    be it. So that was okay. It was okay. I wasn't too good at school. I didn't find out that I had dyslexia until I was in
    my 40s. I could read stuff back better than I can forward. And time to time would sign my name backwards. And I didn't
    understand that that's why I felt like I was different, that I didn't belong. I was different. Nobody explained that,
    no test was given for that kind of behavior when you're coming up in the country, rural area.
- speaker: Interviewer
  text: Did you go to high school down there?
- speaker: Respondent
  text: 'Yeah, I went to high school. I didn''t complete it, though, because at that time I was playing ball and everything
    like that and then I got introduced, prior to that, I got introduced to this elixir: hot water with bourbon and sugar
    in it, you know. And that''s what you would cure colds and stuff with. You would have the bourbon and "hot toddy" they
    would say. Well, when I had that I felt relief. I felt like I was okay. I was laughing, I was laughing inside and the
    world was different. So that was— So when I went to school and stuff and started doing sports and stuff, you know, teenagers
    get together and you smoke cigarettes. You go steal a bottle or somebody older''d buy you a bottle. And that seemed to
    be alright. That''s where the laughter came from. I know now where the laughter come from for my in-laws. They had—It
    must be that! You know. I couldn''t tell whether it was or not but I know it made me feel good.'
- speaker: Interviewer
  text: So if I understand it, it finally made you feel better the way they seem to be functioning in a better, happier way?
- speaker: Respondent
  text: Yeah, I never was, I guess that being in recovery, I think that's what started off my alcoholism in that particular
    area, you know, finding something to get out of myself.
- speaker: Interviewer
  text: Yeah. We will come back to that, obviously. Do you go to California at that point? Or when did you come West?
- speaker: Respondent
  text: I came to the West in 1961, I believe. And I was getting into a little trouble.
- speaker: Interviewer
  text: What kind of trouble?
- speaker: Respondent
  text: The real trouble was I would be driving people's cars and running stop light signs, and then I had a situation where
    I cashed a check, I didn't know what was going to work. I took this check and I wrote "$10" on it and they cashed it,
    you know, and I did that two or three times and they caught me, you know. And it was sort of like, "Oh!" Well, everybody
    knew everybody. So they just called my grandfather and said, "We got your grandson down here." Well, I didn't, I didn't
    know. Right today, they still have a checkbook in most banks in Oklahoma, where you can just go in, and if you got an
    account in there, you just make out a check and take it to the counter and cash it. I didn't know. I'm young, I didn't
    know. Right after that, when I was about 17, they said, "Well, maybe you should send him to California to live with his
    uncle." And part of that—I didn't find out until later on that part of the embarrassment and the shame and possibly me
    getting sent to prison or getting killed or something like that. They probably took that into consideration, you know.
    So I—By this time, I was kind of moving into that area. Like they say, when you growing up smelling under your armpits,
    you know, you're growing up, you know, you get facial hairs and stuff like that. Teenager, you know, So, that's one of
    the things.
- speaker: Interviewer
  text: So you come out in 1966—
- speaker: Interviewer
  text: Sixty-one you came to live with—sorry with your—
- speaker: Respondent
  text: With my uncle.
- speaker: Interviewer
  text: With your uncle.
- speaker: Respondent
  text: Yeah, he drove. He came down, and put some stuff in the car, and came back, and I've been out here ever since.
- speaker: Interviewer
  text: What was your uncle doing? What was his work?
- speaker: Respondent
  text: He worked for Laguna Honda Hospital. He was an orderly or a nurse out there I believe. And the lifestyle that I had
    left in Oklahoma, I found with him. Him and his roommate, which all of us were about six years apart. And we went as brothers
    and we drank a lot and had a lot of women over, you know. And I'm still not 20 yet. But it was a different life. I'd never
    known any life like that. I came from Oklahoma with these long sideburns, talking about like I do now, like I'm from the
    south. And it was great. Great.
- speaker: Interviewer
  text: And this is San Francisco, right?
- speaker: Respondent
  text: San Francisco, yeah.
- speaker: Interviewer
  text: Okay. When you're in your early 20s what work were you doing?
- speaker: Respondent
  text: My early 20s, I came to California and the only thing I did was when I got there I started at a printing service company
    down on Bush Street. Used to be named Copycats. And we would deliver various stuff all over the downtown areas. And, and,
    you know, you used to have to be on the bicycle. Well, I couldn't ride a bicycle that good, so I would park mine to the
    side and just walk. Well, I learned about that, and then after about a year of that, a couple years, and I moved across
    the street to Copy Service, where I became a cameraman and I did body layouts for Macy's and Christmas edition stuff like.
    So that was basically it, until I became a longshoreman in 1969.
- speaker: Interviewer
  text: There was no union? Was there a union shop?
- speaker: Respondent
  text: No, no, no. No, it was just a job and prior to that, I would go to the carwash and I might wash a few cars. It was
    very limited money when I got there for the first several years.
- speaker: Interviewer
  text: And when did you encounter the ILWU?
- speaker: Respondent
  text: Nineteen sixty-nine.
- speaker: Interviewer
  text: Nineteen sixty-nine. Okay. They took people in in 1969. How did you manage to rig that?
- speaker: Respondent
  text: Well, I was told by this lady friend that I was with. And her ex-husband was a longshoreman. And he said if you gave
    me $300 he'd get me on. Well, they had a lot of stuff going on back there. But if they didn't pick me, he would give it
    back. So I gave him $300. And I got picked.
- speaker: Interviewer
  text: Really? Did you ever get your 300 back?
- speaker: Respondent
  text: No, if I didn't get picked, I would get it back. And then the next six years, I wanted my $300 back! Because I didn't
    work!
- speaker: Interviewer
  text: Oh, you didn't work?
- speaker: Respondent
  text: No. I came in as a B Man. From '69 to '75, we had very limited work. We probably worked three days out of the year,
    on a couple of years. It was—They hired us to work container freight stations and—
- speaker: Interviewer
  text: Let me ask you something. Who is the person who asked you for 300 bucks to set you up?
