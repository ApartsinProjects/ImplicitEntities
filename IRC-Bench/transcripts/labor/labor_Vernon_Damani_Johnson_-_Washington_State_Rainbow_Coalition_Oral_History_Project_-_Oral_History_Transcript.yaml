source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Okay, so what was your life story prior to joining the Rainbow Coalition? Did you grow up in Washington state, or
    did you move here, and why?
- speaker: Respondent
  text: I grew up in the state of Ohio and lived there until I was twenty-five years old. I moved to Washington in 1977, but
    then I went to graduate school at Washington State University from 1977 until 1984, and in the meantime, I moved to Seattle.
    There's a story there, but I did not grow up in Washington. I moved here.
- speaker: Interviewer
  text: Okay and then, were you involved in electoral politics prior to the Jesse Jackson campaign?
- speaker: Respondent
  text: No, I voted, but I was not otherwise active in electoral politics.
- speaker: Interviewer
  text: All right, when did you join the Rainbow Coalition, and what was the Rainbow doing at the time that made you want
    to join?
- speaker: Respondent
  text: I guess I joined it--you know, of course, it grew out of, you know, a grassroots social movement style of politics.
    And so when you say join, that doesn't mean, like, dues paying member joined? Does that mean the moment when I started
    to engage in activism? Sometime in probably 1985 or six, when I--well, you know, there's two parts of the story. So I
    was a Jackson delegate to the Spokane County Democratic Convention in 1984 when I was living there before we moved to
    Seattle. And I was aware, I knew Jesse Jackson was running in the primaries, I went to my caucuses, and we had enough
    people to elect one Jackson delegate to the county convention. I was it. And so I went to the Spokane County Convention,
    and, you know, there were numbers of people there who were interested in supporting who were Jackson delegates from the
    PSN caucuses, and I ended up rallying the Jackson people so we could maximize, you know, our numbers to get delegates
    to the state convention. So if that kind of mobilization on the spot is which you could call becoming a part of the Rainbow
    Coalition, then that was it, and that would have been the spring of 1984. Now, I knew nothing, because the mass movement
    around the Rainbow in 1984 was all on the western side of the state, and I knew nothing about it. I became aware of the
    fact that it was going on, and I did not know any of those people then, but I was active in Spokane County politics as
    a Jackson delegate.
- speaker: Interviewer
  text: And so what role or roles did you play in the Washington State Rainbow Coalition, and what were the organization's
    activities while you were involved?
- speaker: Respondent
  text: So, you know, of course, I met Larry Gossett when I moved to Seattle. The Rainbow people were among those who were
    protesting at the South African consulate in Seattle in 1985-6, you know, pushing for economic sanctions against South
    Africa. And they would rally there every Sunday afternoon. And we got wind of it, and me and my wife started to go. And
    at that time, we didn't know people, but you know, Larry was one of the people who was leading those demonstrations, getting
    arrested at the consulate for trespassing and all of that. And sometime along in there, I must have, when I recognized
    who he was, introduced myself to him, and also to people like Robby Stern, who was a labor organizer in King County and
    Washington state politics at the time. So I got to know those kinds of people in the period of 1985-86. And your question
    was something about, so what activities did I undertake? What was that question again?
- speaker: Interviewer
  text: Yeah, what was your role and the organization's activities?
- speaker: Respondent
  text: So then, when Jesse Jackson ran for president again in 1988, by that time, I was teaching at Western Washington University
    and living in Bellingham, and we were all, you know, waiting to see was Jesse going to run again, all of this kind of
    stuff. And, you know, if he was going to, I was going to be a supporter. And I knew Larry and all of these people. And
    so I actually invited Larry up to speak--and I taught political science at Western Washington University until 2021--to
    speak to one of my classes, and that evening, we organized a dinner meeting with some of my colleagues to introduce them
    to the Rainbow Coalition. And so that would have been 1987 or so. And then when he ran the next year, there was nothing
    really organized, but there was all of this, you know, buzz and speculation about Jackson's second run. And one of my
    colleagues who had met Larry Gossett the previous year said, "Hey, you know, let's just organize a meeting for people
    interested in Jesse Jackson's campaign and see what happens." And that would have been because the caucuses were in March
    of 1988 we used to have like a Super Tuesday, and Washington was a Super Tuesday primary, because it was a caucus held
    the same day. And so this would have been very early, probably January of 1988 and we organized a meeting. It's hard for
    me to exactly recall, but you know, fifteen or twenty people or so showed up, and we knew that the caucuses were coming
    up pretty rapidly, so we started to meet weekly. And I would say that, you know, by the middle or toward the end of February,
    we had thirty, forty people showing up to the meetings and, you know, trying to, you know, because caucuses is very kind
    of complicated business, training people, like this is what's going to happen, and some strategies for how to handle your
    business and so forth. So that's what we were doing. So that would be over the winter months leading up to the caucuses
    in March of 1988, so now we're actively organizing as Jackson campaign Rainbow Coalition activists.
- speaker: Interviewer
  text: Awesome. How long were you involved in the Rainbow Coalition, then?
- speaker: Respondent
  text: Now that previous question also had to do with offices and all that. What?
- speaker: Interviewer
  text: The previous question was, what role did you play and what were the organization's activities?
- speaker: Respondent
  text: Okay, so subsequently, I mean, we got half the delegates from Whatcom County to the Democratic convention. And if
    we had known how to play our strategies right, because actually, the majority of the people who showed up to caucus in
    Whatcom County that year were Jackson people, but you know, at the county level, there's all kinds of horse trading that
    happens, and our people weren't experienced. But anyway, we had half the delegates, and my wife and I were--Rebecca Johnson
    was whose name should also be mentioned, because we were both Jackson delegates to the Washington state convention. That
    year, and we went to Olympia for the convention, where the Jackson forces had 40% of the delegates. So we were a large
    contingent, and we demonstrated not in a, you know--I mean, we weren't trying to disrupt the meeting, but we demonstrated
    for about fifteen to twenty minutes in the halls that day to illustrate the importance of Jackson supporters to the Democrats'
    efforts that year. So by that convention, which was in June of 1988, we were a movement in the state of Washington. And
    so I was on the advisory committee somewhere between, you know, by the caucuses and into the summer and so on. I was on
    the advisory committee for the Jackson campaign in the state of Washington. So just, you know, an ad hoc thing that existed
    really through the convention. Of course, Jackson did end up supporting Michael Dukakis as the Democratic nominee that
    year, but, you know, he kept the movement going through the convention. So I was on the advisory committee, and then subsequently
    after that, was on the steering committee of the Washington State Rainbow Coalition for several years into the early 1990's,
    and then also, you know, was one of the founders, of course, of the Whatcom County Rainbow Coalition.
- speaker: Interviewer
  text: Awesome. So how was the Washington State Rainbow Coalition structured? How were decisions made and new members recruited
    or chapters formed?
- speaker: Respondent
  text: Well, and you know, you'll get a better answer to that question from probably any number of other people that you
    might interview, because we did build a statewide organization and movement. I mean, we had people in, you know, Yakima
    County. We had people in Spokane, I can't--probably the Tri-Cities, I don't really remember, but we had a presence east
    of the Cascade mountains. And then we had people all up and down the I-5 corridor, from Vancouver to Bellingham and Whatcom
    County. But, you know, the fulcrum of the organization, was still centered around Seattle, King County. And when you talk
    about things like how was it organized, and all that kind of stuff, Larry Gossett is the person who can answer those questions
    the best. What I will say is that we had a--I was on the steering committee which had people from all around the state,
    which met, I think quarterly, like four times a year. And I'm just trying to think what else to say about that. And then
    so, those local chapters which, would've had eight or ten or so, I would say, around the state, they all met regularly.
    And when we had our--I'm trying to remember how often we actually had statewide meetings--at those steering committee
    meetings, in which there would be fifteen to twenty or twenty-five people from all over the state, were moments when the
    local issues that were part of the Rainbow agenda that were pertinent to those localized groups, they would tell you what
    kinds of issues they were working on and what they needed support on, and also looking for, you know, strategies and approaches
    to how to do the work. And so, that's kind of, you know--it was loosely organized, and we did have--and again, you know,
    you talk to Larry Gossett and those kinds of people who actually really organized all this stuff--we had a founding convention
    of the Rainbow Coalition. Of course, it had been going on as a social movement since 1984, but that would have been in,
    I think, 1989 over the winter. I remember because there was like a foot of snow on the ground in Olympia, where the convention
    was held. There was quite a bit of snow, and it was like over President's Day weekend, so it was a three day weekend for
    a lot of people. So it was in Olympia. I remember all of those things very distinctly. And of course, it was a wholesale
    kind of a convention with workshops and stuff on the various dimensions and issues and stuff. I was a panelist in one
    of the workshops, I'd have to look back into my curriculum vitae to say exactly what we were talking about that day. But
    before the weekend was over, we elected officers, and so it became a much more formal nonprofit organization at that point.
    And of course, Larry Gossett was elected president. And you know, again, I could rattle off the people who had the other
    offices and so forth, but you can get that information someplace else. But through all that time, I was a steering committee
    member.
- speaker: Interviewer
  text: Awesome. Can you talk a little bit about what communities did the Rainbow organize in, and a little bit about the
    demographics of the coalition and how it approached race, gender, and sexuality impacting the Rainbows organizing?
- speaker: Respondent
  text: So that question has more than one part, so let's take them--so ask me the first question again.
- speaker: Interviewer
  text: Yeah, so what communities did the Rainbow organize in?
- speaker: Respondent
  text: Well, so, you know, the Rainbow agenda was--Jesse had a very clever chant, and I didn't have time to look over the
    questions. "Black, white, yellow, brown, boom, boom, boom, the Rainbow's in town," something like that, you know. But
    the point is that we organized--when you looked, certainly statewide. And one of the stories to tell, you know, I can
    tell my part of the story, and others will tell it, was that the Washington State Rainbow Coalition was the most organized
    branch or chapter of the Rainbow Coalition in the country. I think there's probably no question about that. It was in
    a stream of the kind of grassroots, progressive organizing that had been happening, particularly around Seattle, King
    County, since the 1960's. So people like Larry Gossett, who was, you know, associated with and now seems, you know, he
    was a former Black Panther; Roberto Maestas, who was a teacher at Franklin High School and a very strong Chicano Movement
    activist; and Bernie White Bear, who was the Native American activist when they created the Daybreak Star Center there
    in--what's the name of the
