source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Jimmy, can you outline the positions that you held in the MUA?
- speaker: Respondent
  text: Yes. Have we got enough time? I was a delegate - I joined in 1962 the, then the Waterside Workers Federation. I became
    a delegate in 1964. I was secretary of the Patricks committee in 1967. Then the president of the Port Committee, which
    is a rank-and-file committee in 1969. I was elected a vice-president of the Sydney branch of the Waterside Workers in
    1970. In 1978 I was elected an organizer, what they call a vigilance officer - I had to be vigilant! Which is an organizer
    today or they call a business agent. Then I held the position of the president of the branch and then I became the secretary-treasurer
    of the branch and that is the highest position you can hold. I held that position until I retired in 1998. Before we merged
    I was the national president of the Waterside Workers Federation and we merged with the seamen in 1993 and I became the
    first president of the Maritime Union of Australia. I held that position until I retired in 1999. During that period I
    was a board member of the Maritime Workers Credit Union, which is originally the Waterside Workers Credit Union for 22
    years and I was a member of SARF - Stevedoring Employees Retirement Fund, director of that retirement fund for 12 years
    until I retired in 1999.
- speaker: Interviewer
  text: Did you talk with Ron yesterday about the merger in 1993? Did you cover that?
- speaker: Respondent
  text: Yes, yes. Not to the extent - I thought - I didn't tell you in my opinion it was our most successful merger. It was
    something that we were striving for but nobody wanted to take the cudgels up until the 1980s. The latter part of the 1980s
    we got really going on the issue and I was then the national president of the Waterside Workers and involved right up
    to the eyeballs in the amalgamation. It was a pretty tough discussion because the seamen wanted all that they had and
    we wanted all that we had. But knowing that wasn't going to happen in the end we had what we consider a very good amalgamation.
    There was a couple of little hiccups after that but other than those little hiccups it has been a wonderful merger in
    my opinion, it's been wonderful.
- speaker: Interviewer
  text: When you say the seamen wanted what they wanted, the longshore wanted - what did each side want?
- speaker: Respondent
  text: There were different rules. Each one had its own set of rules particular to their own industry. We had what we called
    a Disciplinary Committee, believe it or not. We had our own discipline to take it away from the employer, where the seamen
    didn't have any discipline. All the disciplinary procedures was done either on board the ship or with the ship owner.
    So there was all - we had to cover that. There was bringing the finances together. We had, I think, a little bit more,
    but that didn't matter. There were major issues and minor issues that in the end - the rules were the important part.
    We finally reached agreement some months before the amalgamation 1st of July '93. We overcome them hurdles and we never,
    ever had an argument about the rules ever since that period of time.
- speaker: Interviewer
  text: Why couldn't you each keep your same work rules separately?
- speaker: Respondent
  text: Rules are different, especially financial rules. They had a different way that they financed. We had a different way
    of how we got finances. So we had to work out a way of ensuring that they both came together to ensure that in the end
    we were getting - everyone was paying the right dues and everyone was paying in the right manner. Of course, we were going
    through, excuse me, a phase of electronic deductions - because it used to be over-the-counter. The seamen were still doing
    theirs over-the-counter while we were doing ours by electronic deductions. The seaman had rolling funds on the ships and
    those rolling funds were monies that were used for mainly political purposes, to be involved in political activity, to
    be involved as a second arm of the union and the wharfies never had that. We didn't get that until a couple years after
    but we found out - and I'll deal with that later about how the international question has come in and involved the rank-and-file
    better by using of these finances. They had their own finances, we had our own finances; put them together they merged
    beautifully.
- speaker: Interviewer
  text: The question of internationalism is sort of key with the ILWU and with the MUA. Can you talk about how that sort of
    came about? I know that you were dogsbody for Bridges in the 1960s. I think you covered some of that yesterday.
- speaker: Respondent
  text: We covered that yesterday.
- speaker: Interviewer
  text: What comes after that? What did you not cover yesterday coming up to Big Bob?
- speaker: Respondent
  text: We spoke yesterday with Ron about when Harry became the president of the ILWU in the 1930s there was an immediate
    response from their now general secretary Jim Healy who was elected in 1936. Of course, they didn't know one another before
    Harry left to go on his journey overseas but there was a rapport that I know of in the 1940s. As I said yesterday to Ron,
    excuse me, there was a number of issues or a number of conditions that no doubt flowed from the West Coast of America
    to Australia. We dealt with that yesterday, that pickup sentence about pensions and about credit unions, etc. Then international
    conferences started to take place but they were mainly officials that turned up, it was the officials that went. It was
    either Jim Healy and somebody else that traveled. And, of course, traveling in those days is nowhere near like traveling
    today. We dealt with that. But there were conferences. We had conferences in - we had what we called the All Ports Conference
    that started in 1941 and still goes on today, we call it the National Conference - every four years now. I know that the
    ILWU had their conferences every so many years - I think it is every three. Normally the federal officials attended those
    particular functions. What happened as rolling on over the years, more than one of the officials went but not many rank-and-file
    people went. It wasn't the done thing, mainly, I think, because of cost. Costs were fairly prohibitive in those days.
    That was a determining factor. In the Seamen's Union, a lot of rank-and-file people - because of their rolling funds that
    were used, as I said, mainly for political purposes. They got together, the rank-and-file got together more overseas than
    what the wharfies did. That all changed and changed for the better since the amalgamation and more so since Paddy Crumlin
    has become the National Secretary. In fact, in 1995 we attended the conference in Liverpool. I attended. I took my office
    manager who had spent near 40 years in the office, is a wonderful, wonderful person, administrator in the office. She
    was my secretary and office manager. And I took a rank-and-filer. That was the first time in my living memory that even
    the wharfies, even though we were members of the MUA, that we took a rank-and-file person to a conference. Then when Paddy
    become the National Secretary then it was prolific. Every time there were conferences overseas, no matter where it was,
    the rank-and-file - in fact, they outnumbered the officials and that was very pleasing to see because if more than one
    goes and you go from more than one area then every area will find out what is going on in other ports throughout the world.
    That's been sort of a - like all the boys went over to the big demo in France - I can't think of the name of the city,
    when they were talking about seaman throughout the world on these flags of convenience ships doing the work of dockers,
    longshoremen, and wharfies. The way they went overseas - I'd love to tell you the name of the city but I can't. Anyway
    they knew - we got to know what warfare was by virtue of the attack upon the demonstrators. I think it was Le Havre, I'm
    not sure. Then they come at them with batons and tear gas and we'd never experienced that in Australia, even though we'd
    had a lot of demonstrations and a couple of people were killed in the 1917 dispute, I think it was the '14 dispute. We
    had never been attacked with tear gas. We were attacked by the coppers with batons but never that. Every young person
    that went overseas was learning and by learning, coming back and showing - and learning those experiences or giving those
    experiences back to the rank-and-file of people on the job.
- speaker: Interviewer
  text: Were you accused of being communist sympathizers in Liverpool and other places?
- speaker: Respondent
  text: Oddly you should say that. I asked David Crockroft - no, I didn't ask. I was the national president of the union and
    in Australia, in Sydney we were asked to take international guests out for dinner, which I did. There were about 14 or
    15 of us. I was requested by the National Secretary, Johnny Coombs, "Let's not start talking about Liverpool." Anyway,
    as it turned out, I didn't ask the question but David Crockroft was the general secretary of the ITF and it was a couple
    of years after the dispute had started. He was asked a question - no prompting from me but it was a wonderful question
    - "Why didn't you support the Liverpool dockers?" His answer was, "Well, the union didn't support them. It was an illegal
    stoppage." The chap persisted. "Irrespective if it was illegal, all strikes under capitalism are illegal according to
    them, why didn't you support them?" He said, "Ah, they're being led by a rabble of Marxists." The hairs on my back went
    up a bit and I politely asked him, "Who were the Marxists?" He named one. I said, "There's a committee of about 20 and
    you've named 1. I don't understand how you can say they're being led by a rabble of Marxists." To answer your question,
    Ron, they always try that. This was a bloke not of us, this was a bloke who was in charge of the International Transport
    Federation which we had been a member of for many, many years and raised millions of dollars by virtue of the flags of
    convenience ships not being paid. The crews on these ships if they were praying people or hoping people, they used to
    hope and pray they could go to Australia because once they got to Australia they knew they could get help from us in support
    of them - from the ITF too - and we used to give them their back pay. I'm not talking in hundreds, I'm not talking in
    thousands, I'm talking in tens and sometimes hundreds-of-thousands of dollars' worth of back pay. They were so grateful
    and they still are today. "I hope the ship goes to Australia because we know we are going to get a fair go." Yeah.
- speaker: Interviewer
  text: Jimmy, you mentioned that at the time of Liverpool you engaged with Big Bob, that Big Bob was over there, you guys
    were doing something. You mentioned that at lunch time. It seemed like an important connection.
- speaker: Respondent
  text: I went over to the first International Conference in 1996, in February. They called an international conference. The
    person who was representing the ILWU then, in fact, was an ITF inspector. I won't mention any names in case I get him
    into trouble. Within a short period of time, I think it was in 1997 another international conference was held and Willie
    Adams turned up. I was a guest speaker speaking on the platform to thousands of people who were there in support of the
    sacked Liverpool dockers and he was in awe of what we were doing but he was there representing the ILWU and that is when
    the ILWU first got involved. I am not sure if Big Bob - Bob wasn't then the president of the International Longshoremen
    Warehouse Union and neither was Ray. I'm nearly sure that Willie was there, they came up about a year later. Then they
    fully supported Big Bob and Ray, and continuing with Willie, supported the dockers in Liverpool. They wouldn't cross a
    picket line. So 500 of these Liverpool dockers were sacked and not one of them ever got their job back, no one, because
    this was because of no support from their own union by a bloke by the name of Bill Morris who later becomes Sir Morris,
    and who is now Lord Morris. I will leave it to your own imagination how he got that, a sir and a lordship. They call it
    the 400 pound door in Parliament House. The lords go through the door, sign on and go back straight out through the other
    door and they get 400 pounds for doing that every time Parliament sits. So he is being duly paid for what he didn't do
    to support the sacked Liverpool dockers.
- speaker: Interviewer
  text: I hate to stay on the Communist Party line but were you personally ever accused of being involved with the Party?
- speaker: Respondent
  text: Oh, yes. Yes. No, not only accused, for a period I was a member of the Party. Big Jim Healy, the first communist leader
    of the Waterside Workers Federation, and E. V. Elliott, Eliot V. Elliott was the first communist secretary of the Seamen's
    Union. Let me tell you, that's when things started to happen in both the seagoing and on the wharves in Australia with
    their leadership. Not only were they, after them many, many communists, left-wing ALP people got together and formed unity.
    It just wasn't the communists, it just wasn't the socialists, it was the left of the good left and of the left of the
    Australian Labor Party. In fact in the 1950s people from the Australian Labor Party if they were seen associated with
