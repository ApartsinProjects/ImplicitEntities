collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: All right, so to start What is your name and can you spell it out?
- speaker: Respondent
  text: Larry Gossett. L-A-R-R-Y G-O-S-S-E-T-T is my slave name.
- speaker: Interviewer
  text: And how old are you? What's your birth date?
- speaker: Respondent
  text: February 21, 1945, and I had the privilege and the luck to be born in Seattle, Washington.
- speaker: Interviewer
  text: What gender, if any, do you identify with? What are your pronouns?
- speaker: Respondent
  text: He and him. Nothing else.
- speaker: Interviewer
  text: And what race or ethnicity do you identify as?
- speaker: Respondent
  text: African American. Black.
- speaker: Interviewer
  text: All right, so what was your life story prior to joining the Rainbow Coalition? Did you grow up in Washington State
    or move here? If so, when and why?
- speaker: Respondent
  text: I was born in Washington State, and I lived here all my life, except for the 15 months that I was a VISTA volunteer,
    and at that historic juncture 1966 to '67, I had the privilege to be assigned by the National VISTA office to New York
    City, where I worked for nine months in the Lower East Side of Manhattan, and then five months I worked in Harlem, the
    northern part of Manhattan Island, the all Black part of Manhattan Island. And that experience of living in New York City
    as a VISTA volunteer, I have identified as the signature experience of my life. I radically changed, so much so that when
    I returned to Seattle on September 15, 1967, my mother and youngest brother Patrick had come to pick me up at the airport.
    I got out before they got there, and when they walked up, both of them walked right by me. They had no idea who I was
    until I said, "Mama!" and then she recognized my voice. So I left a Negro college student from the University of Washington
    and came back a revolutionary Black Power young advocate, activist, and I changed my name to Aba Yoruba. I adopted an
    African name when I was in Harlem. So I was a radically changed individual. But other than that, I've always lived in
    Seattle, yeah. I returned to the University of Washington, where I graduated in 1971 as the first student ever to get
    a certificate. I got a degree in history, but I got a special certificate from the University of Washington indicating
    that I was approved to be an African American history teacher. So I believe that answers your question.
- speaker: Interviewer
  text: Yes. And so can you talk a little bit about your involvement in electoral politics or that radicalization that you
    mentioned prior to the Jesse Jackson campaign?
- speaker: Respondent
  text: Yeah. In 1968--I'm considered one of the nineteen founders of the University of Washington Black Student Union--I
    drove the car. I drove a car from Seattle to San Francisco State University in Northern California on April 12, 1968.
    We organized the Black Student Union on January 6, 1968, and then we went to the West Coast Black Student Union Conference
    in April of '68, where the keynote speaker at the Black Student Union Conference was Bobby Seale, the Chairman of The
    Black Panther Party for Self Defense. The Panthers had not dropped the "self defense" yet. But he had a mesmerizing impact
    on the twenty-three African Americans that went down to the BSU conference, and we fell in love, most of us fell in love
    with the Black Panther Party as a result of that interaction with Bobby Seale at San Francisco State College. And he invited
    us the next day to come to the funeral Lil' Bobby Hutton, the first Black Panther to be killed by a police officer in
    the United States, he was killed in a conflict with the police a few days before we started our conference. But as a result,
    he invited us to come to Lil' Bobby Hutton's funeral, and we all jumped in our cars, about 120 Black student union activists
    from California and Washington and Oregon, and we went to his funeral. And most of us, I would say, were extremely impressed
    or fell in love with the Black Panther Party. And when we got back to Seattle, the young folks in our group--I mean, I
    was young, I was 22--but the 18, 19, 20 year olds, had just begged Bobby Seale to come to Seattle and authorize the founding
    of a Black Panther Party chapter in Seattle, and he was so impressed with our enthusiasm. I know he had a lot of things
    to do, but he said, "Yes, brothers and sisters, I will come up to Seattle. Of course. I'll bring a couple other Panthers
    with me." And they came on April 18, 1968, and Seattle, Washington, became the first city outside the state of California
    to organize a Black Panther Party. So by April 18, April 19, we had two revolutionary Black youth groups going on in Seattle.
    They were the Black Student Union at the University of Washington and the Black Panther Party for Self Defense being the
    first chapter outside of the state of California to be established. Of course, soon after that April 18 meeting, Bobby
    was all over the country organizing Black Panther chapters. But we were proud. We were proud to be the first. Also, I
    had been selected to be the Chairman of the Seattle Alliance of Black Student Unions. People that supported me and been
    the chapter, so my primary responsibility after the founding of the Black Panther Party was to organize BSU's, Black Student
    Unions, all over the State of Washington, mostly in Seattle, the greater Seattle, mostly in King County. And we had about
    seven or eight Black student unions organized by the time we decided that we wanted to take over the University of Washington
    by sitting in President Charles Odegaard's office and demanding that a program of Black Studies be created and the recruitment
    of Black, Latino and Native students and poor white students. We became the first Black student organization in the country
    to demand poor whites have a more flexible opportunity to enter the University of Washington. And then, after our sit-in,
    because of the pressure of low-income Asian students, we added Asians to the folks that we were demanding the university
    open its doors to. I think I should give one or two facts about the University of Washington in '68. The University of
    Washington in 1968 was 107 years old. There were 32,400 students on campus, only 73 of us were Black. That was .003% something...
    And that might not even be enough zeros, it might be .0003% and it had never been any higher. So essentially, the University
    of Washington was an institutionally racist environment, and that they had very few non-white students on the campus,
    particularly African Americans. Had about 250 to 300 Asian students, but no Black. It was even worse for Latin Americans,
    there was only six. And it was even worse for Native Americans, there was only four on the entire campus, two of whom
    became immediate--two Native American sisters and one Chicano brother joined the Black Student Union because there was
    no infrastructure, nothing that they could-- I mean, two Indians could talk to one another. They were both Upward Bound
    students, that's how they got to the UW. And then Jests--I can't remember Jesus! last name right now. He was the only
    Latino that, you know, we were able to find, even though we were told that there were four or five others on the campus,
    and he joined the Black Student Union. So that's how we got started. We had the sit-in in Dr. Odegaard's office on May
    20, 1968. He made a commitment to recruit more minority students. He made a commitment to establishing a Black Studies
    Program. He made a commitment to setting up a tutorial office to help ensure that many of our Black and other minority
    and poor white students would be able to compete academically with the other students so that we could graduate. And then
    the final demand was that the university established a cultural program. That manifested itself to become the Ethnic Cultural
    Center on 41st Street, I believe, and Brooklyn Avenue and across the street, the Ethnic Cultural Theater, where Third
    World students could reflect themselves through art, you know, acting, singing, all kinds of stuff. And then the Ethnic
    Cultural Center, where the Black Student Union, MEChA, the American Indian Association, and some Asian student groups,
    all of us started using that Ethnic Cultural Center as a meeting place, the BSU had a room there, etc. And then after
    that, I stated I started working for the Office of Minority Affairs and recruiting. My job was to be the supervisor of
    Black Student Division. In three years, we recruited 1400 Black students to the University of Washington, and Emile Pitre
    told me that in 2020, that was the largest amount of Black students ever recruited to the university in a three year period.
    I didn't know that. So we were very proud of that historic fact, reality. After I worked in the Office of Minority Affairs
    until June of 1973, I wanted to return back to the community, so I returned back and became a consultant to the Central
    Area Motivation Program. CAMP is the oldest anti-poverty program in the City of Seattle, and it existed on 18th and Cherry
    Street at the time. Its the old firehouse, if you want to go by and see it. So that was the first anti-poverty agency,
    funded through the Office of Economic Opportunity that was begun in 1964. And in 1973, the fall, they hired Larry Gossett
    as a consultant to help them organize youth-oriented programs. You dig what I'm saying? All over, not only Seattle. I
    organized the CAMP Youth Services Department. We organized youth all over the county. That was our job. But the centerpiece
    of our organizing was in the Central Area, amongst low-income Black youth. And we, you know, we were pretty successful
    at that. And then by 1979--I came in '73--in '77, '78 somewhere in that, the executive director of CAMP resigned and they
    started advertising in January of '79 for a new executive, and I was fortunate enough to be selected. So from 1979 to
    1993 I was the executive director of the Central Area Motivation Program. And finally, it was in that historic period
    of time, 1983 to be precise with you, that I and several other younger community activists got calls from the late great
    Reverend Samuel Barry McKinney, the pastor at Mount Zion Baptist Church, the second oldest Black church in all of Seattle,
    and the biggest-- or one of the two biggest churches, Black churches in Seattle at that time. The reason that he called
    me, he said that he had just gotten a call from Jesse Louis Jackson, and Jesse wanted to organize a political vehicle
    through which he could run for president of the United States of America, and he definitely wanted a chapter in Washington
    State, and he only knew Reverend McKinney, so he called him. Reverend McKinney reached out to me, reached out to-- I was
    working, you know, I was the head of the largest predominantly Black anti-poverty program in Washington State at that
    time. And he reached out to other pastors. He reached out to the Black Panther Party. He reached out to as many groups
    as he could think about. He reached out to El Centro de la Raza. I don't know if you've heard of El Centro? So he called
    Roberto Maestas and asked him to get involved. And that's how I recall the Rainbow Coalition-- He called in '83, he's
    going to run in '84. So we started--I think we were one of the first groups, grassroots citizen groups, to be organized,
    because November of '83 is before the campaign started in '84. So we got ourselves together, laid a foundation. He said
    he wanted it to be multiracial. He told us a little bit--Jesse Louis Jackson told Reverend McKinney a little bit about
    the concept of a Rainbow Coalition. But I don't remember him telling us what I learned historically later that the concept
    of the "rainbow"--and I think this is important for me to share to whoever will become the audience of this tape--it is
    historically and politically accurate that the concept of a Rainbow Coalition was begun by Fred Hampton, who in 1968,
    '69, somewhere in there, became one of the key leaders, if not the key leader, of the Chicago chapter of the Black Panther
    Party. He was killed by the County prosecutor, the county-- Excuse me, the Chicago prosecutor, the Chicago police chief,
    and all the powers that be. They were very fearful of the rise of this charismatic nineteen year old Black Panther Party
    leader called Fred Hampton. Fred Hampton was conscious beyond his years and knew that the Black Panther Party needed to
