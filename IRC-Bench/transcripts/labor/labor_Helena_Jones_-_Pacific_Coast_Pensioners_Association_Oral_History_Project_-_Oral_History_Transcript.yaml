collection: labor_history
source_url: https://archive.org/search?query=labor+oral+history
turns:
- speaker: Interviewer
  text: Tell me a little bit about your experience growing up in Long Beach.
- speaker: Respondent
  text: My parents moved to Wilmington in 1942, and I've lived my entire life in Wilmington, which is the heart of the harbor,
    the port town. I still live there today. Grew up in the sixties. I was a sixties kid. I was the baby of six.
- speaker: Interviewer
  text: What do you mean, you were a sixties kid?
- speaker: Respondent
  text: I grew up in the sixties, you know. Born in 1960. My short childhood was in the sixties. Great time.
- speaker: Interviewer
  text: I'm familiar - that your sister had physical challenges. Can you outline your experiences around that a little bit?
- speaker: Respondent
  text: 'When I was born, my seven-year-old sister got juvenile rheumatoid arthritis. She suffered for 53 years with that
    disease, and she passed away last year. I know we spoke before. Having a sister with disabilities made me the person I
    am today: responsible, taking care of somebody, the 24-hour job.'
- speaker: Interviewer
  text: Want to describe it a little bit about what you did to help her? I think that does fill out -
- speaker: Respondent
  text: Everything from feeding her, to bathing her, lifting her, dressing her, pushing her around in the wheelchair. Everything.
    The arthritis was so bad, it got to the point where she couldn't even lift her arms.
- speaker: Interviewer
  text: Why do you say that made you the person you are?
- speaker: Respondent
  text: Being the baby and the last of the kids at home, she needed so much help with everything. She was the first child
    in America to have total hip replacement, so she was able to walk again. She just needed constant care. My mom was so
    tired that I was the next one there to help her. I know that through her illness I became a really responsible person.
    I even drove her places when I didn't even have my license. To Cal State Dominguez. She got her master's degree from there.
    So I would drive her because my mom was like, "Go ahead and just take the car. Go ahead and take her." She had a little
    electric cart, and it had a big motor, a big battery. I would get that out of the car, and the battery, and get her to
    university. She might have been crippled, but she was everything but crippled.
- speaker: Interviewer
  text: You had several brothers as I recall.
- speaker: Respondent
  text: I had three brothers, and two sisters.
- speaker: Interviewer
  text: What did your dad do for work?
- speaker: Respondent
  text: He was a structural steel ironworker, and he was the owner of A-1 Erection in Wilmington, California. My brothers
    and my father did take part in the building of the Vincent Thomas Bridge and the Gerald Desmond. That list can go on and
    on.
- speaker: Interviewer
  text: Where'd you go to high school?
- speaker: Respondent
  text: Mary Star of the Sea, a Catholic high school in San Pedro, California.
- speaker: Interviewer
  text: What'd you do after high school?
- speaker: Respondent
  text: I joined my first union, the Retail Clerks Union, Union 770 in Harbor City. I joined at 18 years old, which was kind
    of a big deal because, you know, you could work part-time for the grocery store, but to be a journeyman. It was kind of
    a big deal to be able to get that status, to get into the union. I did that for a couple of years while I went to college.
- speaker: Interviewer
  text: Where did you go to college?
- speaker: Respondent
  text: Harbor College in Wilmington. Then my brothers came to me. They were taking women into the predominantly male -
- speaker: Interviewer
  text: Before we get to that, let me ask you. Were you drawn to a union job to begin with, and why? As a retail clerk?
- speaker: Respondent
  text: It's a better paying job, and it's organized labor. There's benefits, and just to seek a higher level job than just
    working a part-time fast food place. When I was in college, I thought about being an accountant. I went and spoke with
    a professor there, trying to figure out what area I was going to go into. I was already working for the grocery store.
    He asked how much I made. He said, "You know, you make as much as I make, almost." Which was really sad. He goes, "If
    you don't know what you're going to do, stick with that." Then I was later addressed with joining another union.
- speaker: Interviewer
  text: Were there discussions of unions when you were growing up?
- speaker: Respondent
  text: Oh, yes. My father was a union - my whole house came from a very strong union family. My father's company, he didn't
    have to be union worker but he was a union company. He hired union ironworkers.
- speaker: Interviewer
  text: He was an ironworker himself.
- speaker: Interviewer
  text: So he started out as -
- speaker: Respondent
  text: He started out - he came to California from Nebraska in 1938, and he went into the oil fields. He did come onto the
    docks for a short period of time. But as an oil driller, he made a little bit more money, so he did that instead.
- speaker: Interviewer
  text: Ok, let's go back to where you made the transition to the ironworkers. So what happened with your brother? Did something
    happen with your brother?
- speaker: Respondent
  text: In 1981, I remember he came to my bedroom and knocked on the door. I was a single mother of a little girl. He said,
    "Hey, they have to take women. The Supreme Court passed that women have to be taken into the males' workplace. Don't tell
    anybody I told you, but, if we're going to take women, it might as well be you." I said, "How much are they paying an
    hour?" Because I grew up with ironworker benefits. He goes, "Almost ten bucks an hour." I go, "Where do I go?"
- speaker: Interviewer
  text: What were you making as a retail clerk?
- speaker: Respondent
  text: I think six dollars an hour. And so this was almost ten. Of course, I had to go to an apprentice program for three
    years' college at Cerritos College two nights a week, plus work full time. But it took a little while for the union to
    place me because they didn't know where to put a girl. I was the first female ironworker of all the southern California-Nevada
    area. They didn't know where to put me, so it took a little while. They put me at Champlin Oil Refinery there in Wilmington.
    It's now in Vallejo. I worked there for one solid year. With about 5,000 men on the job, they wouldn't even let me on
    the job; they put me in a boneyard for three months by myself. I mastered the torch, and I made shims all day. All day
    long, just made shims. The little steward, which was a World War II vet, he would come and have lunch with me every day
    and tell me all kinds of great stories. Finally, at the end of three months, my general foreman came out. He told me to
    get in the truck, and I got a little scared. Just like, 'where are we going?' He took me out a little ways and pulled
    a bridge belt out, a Klein bridge belt that he had ordered brand new, small size. He gave me that bridge belt, and he
    goes, "I know where to put you today. I'm going to put you in a gang." He drove me to the top gang, which is the raising
    gang. I got out of that car, and I'm going over to the big boys, the ones that raise the iron. The elite group. They wouldn't
    even look at me. I'm like, "Hi guys!" [waving] One thing I really remember is, the foreman goes, "You ever been on the
    E ride at Disneyland?" "Sure." He had me get in the basket that the ironworkers had made of iron. I was in there with
    a big ironworker, and he goes, "I want you to help him." He shot me up in a crane, right into the top of the building.
    He had a giant impact gun. Now, how am I going to help this 6 foot 5 guy? So I'm just holding the impact gun. That was
    my first experience, and I was in the raising gang, which was the perfect place because there was no chit chat going on.
    It was all business. If I would have been in another gang, there would be too much time on the hand with being one of
    the only girls on the job. It was kind of interesting where they put me.
- speaker: Interviewer
  text: It is interesting. A lot of women I've talked to who were construction workers hit difficulties at some point with
    the guys. Some guy would say things that were inappropriate and so forth. Did you have any of that?
- speaker: Respondent
  text: I would go into the outhouse, and there would be a different drawing every day of things that I was doing with everybody
    on the job. Eventually it got so bad that they gave me my own outhouse with a padlock. So I could have a 'clean' outhouse
    without all these drawings. Plus - one time I took a marker out. And you could tell. "So, she was with me," or whatever.
- speaker: Interviewer
  text: Your name was on there?
- speaker: Respondent
  text: Yes! Yes, all kinds of terrible things. These detailed drawings of women's parts and things. I remember I put on there,
    "Oh, you wish," or something. "That's not what I saw," or whatever. You had to take it; you were in their world. I got
    to say, the ironworkers, most of the time, they respected me. Probably because of my father having his company. My father
    was retired when I got in. My father didn't even talk to me for six months when I was doing this job. He was so upset!
    That his daughter was going to work down there. Later on my mom told me, the reason why he was so upset is he thought
    that somebody was going to rape me or something like that. I was like, 'what?!' He was so worried. But we became the best
    of the best because I ended up welding with my father. He had a big yard down by Local 13 in Wilmington. We would go down
    there and make things together. It was just grand. It was really cool.
- speaker: Interviewer
  text: How long did you do that?
- speaker: Respondent
  text: Three years, and right when I turned out of the journeymen, I actually got top of the class. I was the top of my class
    in the ironworkers program. Being the only woman, you have to strive to be the best. I remember I could climb iron - which,
    I think about that now. We had a test climbing that I-beam, just with your feet and hands. Flipping my leg up on top of
    there. I remember the teachers just looking. The guy who was doing it with me couldn't do it. They go, "Oh, that's really
    good. She's up there and you're not." So I turned out three years later. I got my journeyman's book. Then I put my application
    in. They were taking applications in 1984; they were going to take a big group, 350 people at the waterfront. Out of almost
    30,000 applicants, I was the number one girl, scored. Back then it was on a scoring, college. Almost everything they required,
    I had because I had those three years of college. Safety, rigging, just everything they were asking for. I was told that
    later, that I was the number one girl picked. What an honor that was.
- speaker: Interviewer
  text: Yes, really. Why did you decide to switch from the ironworkers into the longshore?
- speaker: Respondent
  text: Growing up in Wilmington around these docks, I got a K-card in 1978, right out of high school. You can call it a K-card
    or a B-number; it was B 6377. I would get all the extra clerking. I'd call up in the morning to a phone number, "Is there
    any work today?" They'd say, "Yeah, go down to so-and-so, so-and-so." I remember going down to my first day. I'm sitting
    on the guy's forklift - an outside driver, a Teamster, not even a longshoreman. I'm just sitting right with him. I don't
    know any better. I'm 18 years old. He's driving around all day, with me on his little forklift. I learned later, you don't
    do that. You're the clerk; you go over here. So I'm over here on this guy's forklift, right next to him, all day long.
    He's probably loving life. I didn't know any better. That was the start of down there, and I always wanted to be down
    there.
- speaker: Respondent
  text: It was right by the house, and you can work inside and outside, and it's such a beautiful job. If you work out of
    the hall, you can work when you want to work. So with my little girl, if she was sick, and I was a single mom, you can
    just call up and go, "Replace me today." Or just not go. I can be a mom and also make a living at the same time. I don't
    think there's another job that you can do that.
- speaker: Interviewer
  text: How did you learn that much about the longshore union before? Even when you're young, 18, and also later on. How does
    the culture get transmitted?
- speaker: Respondent
  text: I had a family friend that knew I was out of high school. He was dispatching at the time. He called up, "What are
    you doing? Get your shoes on. Get dressed. Get down to" - there was a dock in Wilmington. I said, "To do what?" "You're
    going to go to work. I know you're out of school, and I need someone to take this job." That's what started it. Then when
    I get down there, it was checking - I was into numbers and all those things. I just loved that. So then I put my application
    in. Actually, the Golden suit came out, and they sent me the court papers. It said for myself to go down and come to
