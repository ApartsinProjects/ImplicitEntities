collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Why involved?
- speaker: Respondent
  text: Well I came from a very conservative family. Texas was so—but I never understood that until I was a senior in college.
    The schools were segregated by law and so my reaction to that was that it was kind of insulting. So that was sort of my
    orientation. My mother was a single mom so I had a lot of church... so I came out of this southern liberal tradition.
    But I was raised by my grandparents until I was twelve. My grandfather was a sheriff, very, very traditional, so I kind
    of got both sides. So I went into the University of Texas with all of these things happening to me... and then the church
    was a very strong influence too. So I got to the university, I went to junior college two years and then my mother, I
    guess I should say this too, my mother worked for this guy who owned this chain of movie theaters in south Texas. He was
    a Christian Scientist, and he employed the only Mexican who was in a management position. So she had this working relationship
    with this black guy who was a good friend of hers, so that was very important because Mexican Americans and blacks...
    The Latinos went to school with us but at the same time socially it was very taboo to mix. So I had that happen to me.
    Then when I went to the University I wanted to join a sorority, but I didn't get into the sorority I wanted. So I got
    involved and became active in the Y, the YWCA, and the Y was sort of a holdover from the social central gospel theology,
    and of course the Y helped women, provided housing for them and helped them to get jobs in offices. So those two things,
    and then it was integrated. At that point the University of Texas was integrated but the housing was not. So in the Y
    I met most of the black students and then I lived at the Christian... '59 and went back to school in the spring of '60.
    I had taught public school a semester then I went back to school. I went back to get my masters in English. So I had by
    now become a national student Y officer. In these regional meetings in the national Y meetings they were liberal so they
    had these sections of study—one was on peace, one was on race, one was on meaningful workplaces. So I got all this training
    and started training thinking about this stuff. I met a lot of black kids, and I got it on a personal level. So I was
    already very involved with all this stuff. So I got into the sit-ins from Connie Curry who went out recruiting for her
    southern student relations group. She got a big grant through the national student association and it was for Connie to
    recruit, I think she took sixteen southern student leaders over the summer and went to a human relations seminar which
    was run by the national student association. She was recruiting me to go to that, but when I met her she told me all about
    the sit-ins and I remember we sat in this restaurant in Austin and cried while she was telling me about the sit-ins. So
    I was well into it by then. And then we had a woman who was chairperson of the Y, a black woman... I didn't sit in, I
    can't remember who sat in... So then that summer that I went to Connie's seminar which was in Minneapolis Saint Paul for
    students. And afterwards I went to (inaudible). Well Connie can tell you more about what the seminar was like. But it
    was pretty regional oriented. It really captured the mind of the south, a lot of close relationships and anthropology,
    and just a lot of stuff targeted at race relations in the south. And then at the conference the big debate at the national
    student congress was whether to support the sit-ins, and I was on this panel of southern white students to talk about
    the sit-ins. Well I gave this big speech and it was a matter of whether we had the vote, so all the sudden I was like
    this heroine. From that I sort of got swept into this liberal caucus which was this thing that Al Haber organized at the
    congress to support the liberal sides of issues at the National Student Conference. And that's where I met everybody.
    That's basically where the people who formed SDS found each other. So Tom Hayden was there and Al and a lot of people.
    I'm blanking out. So there was sort of a movement to draft me to run for national vice president of NSA and Tim Jenkins
    was there who's a black guy (inaudible). But I thought it would be better if Tim ran. Important for a woman to run. Black
    man to run. So he went on to lead and that gave him some leverage and he later argued stuff, training for some of the
    SNCC orientation. Then I went back to the University of Texas and Connie and Jane Stembridge and Ella Baker were organizing
    the Atlanta the second SNCC meeting, and called and said I should come and they sent me some money. So I already knew
    a lot of SNCC people because they had come to the NSA meeting to try and get support for their activities. McDew who was
    the first chairperson was in Connie's Seminar so I knew Chuck very well. So I already knew quite a few people. I don't
    think it occurred to me that it would be. It just seemed important for a woman.
- speaker: Interviewer
  text: How did you know Ella Baker?
- speaker: Respondent
  text: I think I had met Ella somewhere around the Y stuff, but I'm not sure. At Christmas I went to see Tom in Ann Arbor
    and we put together a food drive and a fund-raiser for SNCC. The food was for farmers and people who were registering
    to vote in western Tennessee. And then on spring break I drove up from Texas and he drove down from Michigan with all
    this food. These trucks full of stuff and we took it to these people. And then I accepted... At the midterm I took a teaching
    assistantship at the University of Illinois and went up to run the Y. I thought I would be closer to Tom. That shows you
    how parochial I was. It was hours away from Ann Arbor. Then we got engaged. The Y offered me a job in the beginning of
    the fall working for Ella, traveling to southern campuses (inaudible). So Tom and I got married in the fall in Austin.
    That summer we spent in New York (inaudible) SDS ran this (phone rings). So then we went to Atlanta. We did this study
    group and we went to the conference. So I was working for Ella and traveling. So I would go on campuses like a black campus
    and go to the meetings and I would recruit people for race relations workshops. So it was all very sort of underground.
    So we got to Atlanta and then was when Bob's southern Mississippi efforts were just blowing up. And we knew all these
    people because Tom was speaking and I was traveling. So I knew all the SNCC people. And we were having a lot of meetings
    and we were just like (inaudible). There wasn't much staff and Ella was there all the time. So it was really like the
    Y was there but doing SNCC stuff. I was taking the minutes of all the meetings. I guess Bob was (inaudible). So we did
    the Freedom Rides to Albany always there. And Tom and we sat in the courtroom. I can't remember if Tom was with us. We
    were both pretty much living on my Y salary because Tom was the SDS secretary.
- speaker: Interviewer
  text: Were you there when the Port Huron statement was drafted?
- speaker: Respondent
  text: Yes, yes I was. But I'm trying to remember when that was. I think it must have been '62. But we both really involved
    with both. Then we stayed in Atlanta that year I did my stuff and traveled with the Y. And that summer I think we might
    have gone back to New York. I think we both went to the NSA conference. Tom went back to school that fall of '62 and we
    went to Ann Arbor but then I left. That fall there was a SDS national convention and I stayed in (inaudible), and then
    I went back to Atlanta and started getting paid by SNCC. I had actually been on the staff before but I was getting paid
    by the Y. That much but I did get an apartment. And I got the title of northern coordinator and what I did was organize
    the Friends of SNCC on campuses and sent out mailings and press releases. I put together Friends of SNCC materials and
    I helped get a lot of personal contacts up in New York and Chicago. So I did that and then Bob was sitting at the (inaudible)
    and he had a big plan to do this literacy project in Mississippi which was designed to create self-instruction. And I
    was an English major so I thought this was my kind of project. Doris Dorby, Heren O'Neil, John O'Neil, me, and this white
    guy from somewhere in the northeast, and this philosophy teacher. So I went to Mississippi and started getting paid by
    this literacy project. Helen, and Doris, and I lived in this house. It was standard operations for SNCC and it was called
    the Freedom House and we stayed there until '66. So I was there for the beginnings of the Freedom Love and all that. After
    the literacy project we organized the summer.
- speaker: Interviewer
  text: You weren't present at this meeting?
- speaker: Respondent
  text: No. I think Elaine was there. You know, Elaine Baker would be a good person to talk to. Elaine was teaching at Toogaloo
    and she wasn't in SDS, but she's just really a good person to talk to. She came down with a bunch of people from Radcliffe
    and Harvard to be the summer staff at Toogaloo College in '63, '64. She kind of got drafted to help with some stuff on
    the summer project. Those were the women who were all at the literacy house. Elaine was at the meeting in Jackson. But
    Elaine wrote this memo that Mary King and I wrote. Elaine was in that too. In fact I think she wrote that for SDS.
- speaker: Interviewer
  text: The first memo?
- speaker: Respondent
  text: Yeah. Yeah. And I think Emmie Schrader was involved in that too. We put it together in the literacy house. I always
    remember it as this group effort, but I sent out my very first... when Sarah was writing her book, Mary found me and said
    this woman is writing this book she really wants to talk to you. So I read this and I thought... and Sarah had originally
    thought that Ruby Doris wrote the memo. But I knew I wrote part of it but it seemed to me like a whole bunch of us worked
    on it. So I sent out a mailing to everybody that was at Toogaloo and said, "Do you remember this memo? Here's a copy of
    this thing. Did you write part of this?" Nobody ever responded. So then Mary wrote a book and she had her version of how
    it all happened. But now Elaine is back, who hasn't even thought about all this stuff. That all this history has been
    written, or anything. It's so funny when people write these books. I read Mary's book in first draft and Tom's in first
    draft. People don't know anything. Nobody remembers anything, so they just pad it. You read these books and you think
    I could never write a book like this, they remember all this stuff. But no, nobody remembered anything. We can't even
    remember how we supported ourselves, and it's hysterical. Sounds like this is the way it really was. People just patch
    it together. They go around and ask other people. Or they send drafts to other people and ask them to fix it, and they
    do. I mean I wrote tons of Mary's stuff and Tom's. So historians are reading some of this and getting the totally wrong
    idea. But it wasn't what happened. That's why we have to write this book. Get everyone to write their own story. But anyway,
    that's why it would be good to talk to Elaine. I can never understand about it is just hysterical. And then you read it
    and it she doesn't even know that memo because it was Mary who... it was about all that stuff in Atlanta, and Mary wasn't
    in Atlanta. She was in Mississippi. And nobody was telling her all this stuff because people weren't talking to each other
    in the fall of '64. I mean black people weren't talking about it. Interview black women and get any information. But Elaine
    was at the meeting, at the Atlanta meeting, and that's where we got all the information. So this memo says oh, this and
    this, and this happened, because she was there so that's where all of this came from. I could never figure that out. I
    mean you couldn't go around.
- speaker: Interviewer
  text: In her book, Mary said that this all started because the two of you, and Dorothy were talking about the second class
    citizenship of women.
- speaker: Respondent
  text: Well a lot of people were talking about it. I wasn't just us. Well you see the Y, the YMCA was a women's organization.
    So Mary and I both had experience in a women's organization, where it was run by women. Sarah's notion of safe space is
    quite good. I think what happened was that we had safe space.
- speaker: Respondent
  text: I think that. But we were all into it at the Toogaloo literacy house that was really where it started. Here we were,
    five or six young students living there all who were talking about deep stuff. Elaine came up with the draft. You should
    talk to her. I have something that she wrote about it that's very specific about what led her to that, but I don't think
    I should talk about. But you could ask her about it. Now I think it's true that Elaine drafted it. It was probably just
    to get it off our chests and get it out in the open. I think it said, "Hey, happening." It was sort of a nightmare. I
    don't think it was meant to solve anything. I was more concerned about what we were going to do next. That was more where
    I was. Look at what's happening.
- speaker: Interviewer
  text: How did you see the future of SNCC at that time?
- speaker: Respondent
  text: Well, we didn't know what to do. I didn't know what to do. I had just finished running this challenge and it was over,
    so it was like, now what am I supposed to do? And that's what I saw was wrong with SNCC at the time. But in retrospect,
    I don't think that's all it was. That wasn't a problem who worked in Mississippi, just southwest Georgia. I don't know
    why we kept all that Mississippi staff. We had just done the Mississippi summer project and that was over, and we just
    had the Challenge which had failed. So did we really want to keep doing voter registration? Plus, the summer project was
    over, so all of the logistics and all the work that was involved just trapped folks.
