collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: So how did you get involved in the civil rights movement?
- speaker: Respondent
  text: Well, I was born into it. Flagstaff was very small in those days, a remote Northern Arizona town. With some saving
    graces, but the saving graces were particularly the wilderness areas around it. It was racist as hell. There were signs
    on restaurants, "No Indians or Dogs Allowed". One really low-brow movie theatre would take in anybody as a viewer, but
    others insisted that certain groups of people sit in the balcony, etc, and so on. You couldn't view Flagstaff as a traditional
    Southern racial complex, because you had all sorts of exceptions here and exceptions there. But the basic ethos of the
    place when I grew up there, - and that's really as I say where I did grow up, - was just plain racist as hell. And so
    [I was] born into it, lots of prejudice, lots of discrimination, a small Black community. I was just starting high school
    when a white man named Oliver Wood, - who'd been on a drunk one Saturday night, - was going home and was driven out of
    his house by his wife, who was enraged at his drinking, and instead of going after her, he went down on the South side
    and shot down a Negro minister and his deacon in cold blood. Killed them. He was never taken into custody. There were
    other things that occurred. Navajo Indians particularly were singled out for very discriminatory treatment, forced on
    to chain gangs to fix streets and shovel snow, - it's a heavy snow fall area. Mississippi was characterized by a total
    segregation complex. This applied to much of the South, - it wasn't just Mississippi, as you know. A place like Flagstaff,
    it was more of a border South type thing. As I say, one movie theatre would admit anybody. My parents were very active
    in social-justice endeavors. It didn't make them particular popular in some quarters, but they really didn't care, fortunately.
    And I grew up in that tradition. One man that they worked very closely with was the principal of the small Negro grade
    school. He was Wilson Riles, who later went to California and became State Superintendent of Public Instruction. When
    we knew him in Flagstaff, he was certainly a colleague of my parents.
- speaker: Interviewer
  text: When you say a Black elementary school, were they legally segregated, two separate school systems?
- speaker: Respondent
  text: Yeah, the elementary school thing was as far as Blacks were concerned. They had one school system, but they had a
    separate elementary school for the Black kids.
- speaker: Interviewer
  text: What about the Indians?
- speaker: Respondent
  text: They could go to school anywhere, and this held true for others, - Chicanos. This didn't mean everything was sweetness
    and light. What it probably meant is that there wasn't enough money to build a whole bunch of schools, or the zeal to
    do it, as far as that goes. But Black kids, until 1954, went to a small Black elementary school, and Wilson Riles Sr.
    was principal of that school. In other schools, it was pretty well mixed. The high school was very well integrated. But
    none of this necessarily meant that the beloved community was right around the corner, because you had a lot of police
    brutality, a lot of brutality from some of the sheriffs and deputies, very unequal patterns of quote "justice" unquote.
    Restaurants that were closed, one restaurant would serve Native people & Chicanos, but wouldn't serve Blacks. Another
    restaurant would serve only Anglos. At that particular point, you had a federal law, which wasn't repealed until about
    1954, which prohibited the sale of alcohol to Indians. And so you had a big bootlegging thing going on and payoffs to
    law enforcement officers.
- speaker: Interviewer
  text: It does sound familiar.
- speaker: Respondent
  text: It was an interesting atmosphere, you know, to grow up in. Some of this is captured in the, - not really that far
    away - situation in Silver City, NM, by the excellent film Salt of the Earth. I went into the Army, and I got out of the
    Army in due course, - served a full hitch honorably. There's no particular point even going into it except that I got
    out early in 1955, and at that point I was just turning 21 years old. I had volunteered when I was 18, and I was barely
    21. And things had changed. One sign of that was the fact that [after Army discharge] I joined what was left of the old
    IWW, - Industrial Workers of the World [also known as the "Wobblies"], - and remained a member of that from the beginning
    of 1955, when I joined it about the time I got out of the Army, all the way through until 1961. By that time most of the
    old time IWW was pretty much gone. But what weren't gone were a lot of old timers with whom I had spent a great deal of
    time listening. And they had lots of fascinating things to tell me, and they had a great many lessons to give. At the
    same time, I was involved going to school and things of that sort.
- speaker: Interviewer
  text: So you started going to college after you got out of the Army, on the GI Bill.
- speaker: Respondent
  text: That's right. I had done a little bit beforehand, but not very much. So it was mostly after I got out that I was on
    the GI Bill. I became involved very quickly with the Mine, Mill, and Smelter Workers Union, which needed committed volunteer
    help, and then at various points I worked as what's called a "development miner," which involves basically starting new
    mines. I can't say that my career as a development miner was particularly noteworthy, but I did know a good deal about
    the use of explosives, and still do. So I went to school, worked at various things, including development miner, and did
    a lot of volunteer work for Mine Mill, a union with which I maintained a very close relationship all through many epics,
    until it merged with the Steelworkers' Union in 1967, - a merger that many of us are sorry occurred.
- speaker: Interviewer
  text: A few Mine Mill locals in California merged with the ILWU.
- speaker: Respondent
  text: And the Falconbridge local in Sudbury, Ontario, nickel mining, remained independent for years, and then eventually
    went into the Canadian Auto Workers, but still maintains a Mine Mill identity. I think to sort of pull this together,
    before I went in the Army I'd been a great forest firefighter in Northern Arizona, lying about my age, I was 18 when I
    was 16, 18 when I was 17, and so on. It was after I got out of the Army that things began to come together in what I'd
    call a homegrown radical vision. For that I'm indebted to the IWW and to its offspring, the Mine Mill Union.
- speaker: Interviewer
  text: After getting a masters' degree in Sociology, what was your first college teaching job?
- speaker: Respondent
  text: I went off to my first college teaching job at Wisconsin State College at Superior. It was run by a Texan "Bircher"
    by the name of Jim Dan Hill, who was a commander of the Wisconsin National Guard, and somebody who certainly was out of
    the dinosaur era. I knew a great deal about organizing techniques and things of that sort. I'd learned a lot. In Wisconsin,
    I met Eldri and we were married as I was finishing my year there, and I say my year because I tried to organize the AFT
    (American Federation of Teachers). And when General Hill suspended student government and did some other things, I helped
    organize the students and we had a big fight. The fight saw me non-renewed, not surprisingly. It also saw me marry Eldri
    at the end of that year. And the fight also saw General Hill told that he would only two more years there, and then he
    would have to leave into some sort of arranged retirement. At that point it was the spring of 1961, and we read about
    the Freedom Rides, - which of course were major national news. At the same time we read a little about the Tougaloo library
    sit-in, where nine kids from a college I'd never heard of, - Tougaloo College, - sat-in at the white-only library in Jackson,
    and were arrested. We began to get interested in what was obviously happening in the South, and I wrote to an acquaintance,
    Glen Smiley of the Fellowship of Reconciliation (FOR). I knew that organization and respected it because Wilson Riles
    had been a member of that in Flagstaff in the old days. I wrote to Glen Smiley, who was the top official of FOR, and I
    said to him we're interested in going South, maybe to teach at a Negro college, what would you suggest? And he wrote right
    back, he knew who I was, and he was very cordial. He had been involved in the Montgomery bus boycott with Martin King,
    and knew the South well. He was a Southerner, a white Southerner. And he said there are two colleges that I'll suggest.
    One is Claflin College in South Carolina and one is Tougaloo in Mississippi. He said at either one of those it will get
    as rough as it could ever get, - something to that effect. So I wrote them both. Claflin was full up in social sciences,
    Tougaloo needed me, and we went there. And so we arrived in Jackson.
- speaker: Interviewer
  text: Tougaloo is a bit north of ...
- speaker: Respondent
  text: Yeah, the town of Jackson has expanded and I don't know if there's much distance any more, but there was then. And
    Tougaloo had informally incorporated at least as a village in its own right. I don't think it was even incorporated as
    a town, but just a village with a college there, - about five miles north of Jackson. And the county line split the campus,
    - you read my post (A Magnolia Tale) about going to get the license plate. Most of the college happened to be in Madison
    County [the rest is in Hinds County]. The sheriff of Madison was fully as bad as Lawrence Rainey that's the best way to
    put it. And Madison county had a close relationship with Neshoba County. When I went there I didn't know a hell of a lot
    about the South. I had a few relatives on my mother's side who'd been sprinkled around through it, mostly in Alabama,
    one or two in Mississippi, but they hadn't stayed there forever. Eldri knew nothing about it. You know, we got there on
    the first day of September 1961, and it was ungodly hot and humid. Furthermore, I couldn't seem to understand anybody,
    - white or Black, - and it took about four or five days before I was able to do that. You may have had that experience.
- speaker: Interviewer
  text: I know exactly what you mean.
- speaker: Respondent
  text: We were, however, greeted very cordially by students and those faculty who were there at that point, the school year
    hadn't quite begun. And by Dr. Borinski, who was very much a fixture. Borinski was prominently featured in the excellent
    PBS film From Swastika to Jim Crow.
- speaker: Interviewer
  text: Is he one of the ones who had come from Germany?
- speaker: Respondent
  text: Yes, he was a Jewish refugee who was fortunate in making it out. A very good friend, we remained good friends until
    his death in the early eighties. Joyce Ladner was a special friend of his, as were many others. Borinski was Chairman
