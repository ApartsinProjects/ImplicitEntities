turns:
- speaker: Respondent
  text: آج مسلمان ملکوں کی اکثریت استعماری طاقتوں کی سیاسی غلامی سے نجات حاصل کر چکی ہے۔ لیکن بیسویں صدی کے ایک نئے عفریت
    نیم نوآبادیاتی نظام نیو کلیئر ازم کے پنجے میں پھنس چکی ہے۔ دنیا کی دونوں بڑی طاقتیں اور ان طاقتوں کے ایجنٹ مسلمان ملکوں
    کے ذرائع وسائل معاش کو اپنے قابو میں رکھنا چاہتے ہیں اور ساتھ ہی ان کی یہ کوشش بھی رہتی ہے کہ ملکوں کی سیاسی دانش خواب
    اور اور مسکن حکمتوں سے نیم بے ہوشی کی حالت میں رہے مبادا ان کی قومی انا اور شعور کی آنکھ کھل جائے۔ اللہ کا شکر ہے کہ اہل
    اسلام اور ان کے سوچنے سمجھنے والے افراد کی ذہنی مایوسی اور شکست کی کیفیت اب وہ نہیں ہے جس کا نقشہ حضرت علامہ مشرقی نے
    آج سے قریبا ات سی پرختن کھھنتا تیا گا۔ وہ جانتا ہے کہ بساط سیاست پر کس مہرے کو کون سا مہرہ کس کے ہاتھوں شکست دے گا۔ ان
    کے موجودہ مصائب وآلام کا ذمہ دار کون ہے؟ ان پر حکومت کرنے والے لوگ کون ہیں؟ ان کی پالیسیوں کا بین الاقوامی سیاسی کشمکش
    میں کیا کردار ہے؟ ان کا عرصہ حکومت کیا ہے اور اس عرصہ حکومت کے طول یا اختصار کی وجوہ کیا ہیں؟ مقامی طور پر کون کون سے
    مفادات کہاں کہاں کس کس کے ساتھ اشتراک کر رہے ہیں؟ نعروں کے پیچھے حقائق کیا ہیں؟ اور ان حقائق کی نقاب کشائی کب اور کیونکر
    ہوگی؟ بلاشبہ آج بھی اقتصادی، ثقافتی، تعلیمی، سیاسی دباؤ کی مختلف صورتوں کا مسلمانوں کو سامنا ہے اور اس دباؤ سے نکل جانے
    کی ہمت اور حوصلہ بھی ان میں موجود ہے البتہ اس کے لئے جن طریقوں اور وسیلوں کی ضرورت ہے ان کی فراہمی میں ابھی وقت لگے گا۔
    استعمار سے نجات پانے کے جدید سیاسی طریقوں سے ہمارے ماضی کے اکثر بزررگ آگاہ نہیں تھے اور اگر کوئی صاحب دل ودماغ رہنما ان
    طریقوں کو استعمال کرنے کا مشورہ دیتا تھا تو انگریز سے نفرت کو جزو ایمان تصور کرتے والے حلقے ایسے رہنماؤں پر کفر گہرے لگا
    دیتے تھے۔ انگریز شناسی کے ذریعے آزادی کی جنگ جیتنے کی راہ ہموار ہوئی تو ان مجاہدین کا تمسخر بھی اڑایا جانے لگا جو جدید
    وسائل جنگ سے آگاہ نہیں تھے۔ لیکن ان کے خی وسائل سے بھی زیادہ منسلک تھا۔ جنگ آزادی کے ایک بڑے مجاہد شیخ الہند مولانا محمود
    الحسن نے جزیرہ مالٹا میں ناقابل بیان مصائب وشدائد برداشت کیے۔ انہیں ایک تہہ خانے میں اوندھے منہ لٹا کر کمر گرم گرم سلاخوں
    سے داغی جاتی اور ان سے مطالبہ کیا جاتا کہ آزادی ہند کی جدوجہد ترک کر دو۔ آپ ظلم سہتے رہے لیکن ان کی ثابت قدمی میں کوئی
    فرق نہ آیا۔ رہائی کے بعد بھی مالٹا میں ایام اسیری کے تشدد کے اثرات ان کے جسم پر باقی رہے۔ فوت ہوئے آپ کی میت غسل کے لئے
    تختے پر لٹائی گئی تو دیکھنے والوں نے دیکھا کہ ہڈیوں پر گوشت نام کو نہ تھا۔ یہ مشتے نمونہ ازخروارے ہے۔ مسلمانوں میں کئی
    اکابر پیدا ہوئے جنہوں نے غلامی کی زندگی بسر کرنے سے بغاوت کی اور انگریز کی جیلوں میں زندگی کا بیشتر حصہ گزار دیا۔ یہ باغی
    روحیں تھیں۔ عمر بھر استعمار کے ساتھ پنجہ آزما رہیں لیکن ان کی سیاسی کامیابیوں اور ناکامیوں کا حالات اور مقدر کے علاوہ
    ان کے مزاج واطوار پر بھی انحصار رہا اور ہمارا رویہ بھی یہ رہا کہ ان شخصیتوں میں سے اگر کسی نے کوئی دوسرا سیاسی راستہ یا
    موقف اختیار کر لیا تو ہم نے اپنی تفرت اور تاپسندیدگی کے نیزون پر اس کے آباؤ اجداد کو بھی اٹھا لیا۔ دیریند کی کسی ایک یا
    چند شخصیتوں نے ایک خاص وقت میں سیاسی کم نگہی کا ثبوت دیتے ہوئے کسی مختلف سیاسی موقف کا اظہار کر دیا تو ہم دیوبند کے حسین
    احمد مدنی کے ساتھ ساتھ مولانا محمود الحسن کے بارے میں بھی کلمہ خیر کہنا نامناسب خیال کرنے لگے۔ ابوالکلام آزاد کانگرسی
    سیاست کے سحر سے نجات حاصل نہ کر سکے اور یہ بھی تسلیم کہ وہ اپنی مخصوص سیاسی وابستگیوں اور وفاداریوں کی بنا پر برصغیر کے
    مسلمانوں کی وہ خدمت سرانجام نہ دے سکے جس کی توقع شروع شروع میں ان کی ذات سے مسلمانوں کو تھی۔ لیکن کیا یہ نہایت ضروری ہے
    کہ کانگرس کا ساتھ دینے کے جرم میں ہم ان کے علم وفضل کا ذکر کرتے ہوئے جھینپیں اور ان کی قربانیوں قید و بند کے بارے میں
    لکھتے ہوئے شرمائیں۔ لوگ کہتے ہیں کہ تاریخ کسی قوم کو معاف نہیں کرتی۔ لیکن پاکستانی قوم ہے کہ تاریخ کو معاف نہیں کرتی۔
    اپنے قومی مشاہیر کو معاف نہیں کرتی۔ ماضی کی غلطیوں اور کوتاہیوں کو معاف نہیں کرتی۔ معاف کرنا درگذر کرنا دوسروں کو بھی
    برداشت کرنا اختلاف کرنے والوں کو زندہ رہنے کا حق دینا یہ سب اعلیٰ ظرفی کی خصوصیات ہیں۔ یہ خصوصیات فرد میں ہوں تو وہ بڑا
    انسان ہوتا ہے قوم میں ہوں تو وہ بڑی قوم ہوتی ہے۔
- speaker: Respondent
  text: ہمارے بعض رہنماؤں نے آزادی کی لڑائی میں بھر پور حصہ لیا۔ لیکن انہیں لیگ کی سیاست سے اختلاف رہا اور اس کی پالیسیوں
    سے ان کا براہ راست تصادم بھی رہا اور ہم ان رہنماؤں کی سیاسی غلطیوں کو آج بھی معاف کرنے کے لئے تیار نہیں ہیں اور ان کی
    قومی خدمات کا اعتراف کرنے میں ہمیشہ بخل سے کام لیتے ہیں۔ اس قسم کی شخصیت علامہ عنایت اللہ مشرقی کی بھی تھی۔ وہ ایک اعلیٰ
    درجے کے ریاضی دان اور عالم قرآن تھے۔ یورپ میں اس عہد کی نیم سیاسی، نیم عسکری تحریکوں کی کامیابی نے ہی ممکن ہے انہیں اس
    تجربے کو ہندوستان میں دہرائے پر آمادہ کیا ہو۔ انہوں نے خاکسار تحریک کو عسکری بنیادوں پر منظم کیا اور چپ وراست کی دھمک
    سے انگریز حکومت کو چیلنج کیا۔ علامہ صاحب آئیڈیالسٹ تھے، جذباتی تھے، غصیلے بھی تھے، اپنے علم وفضل کا احساس بھی تھا اور
    اس وقت کے بعض دوسرے علمائے اسلامی کی طرح مغرب زدہ جناح کی قیادت کو تسلیم کرنے کی بجائے اپنی قیادت ہی کو آگے بڑھانے کی
    کوشش بھی کرتے رہے۔ مسلم لیگ کامیاب ہو گئی خاکسار تحریک ناکام ہو گئی اور سیاست میں ناکامی سیاسی لیڈر کی کمزوریوں کو تو
    تاریخ کے صفحات پر ثبت کر دیتی ہے جبکہ خوبیوں کو محو کر دیتی ہے۔ حقیقت تو یہ ہے کہ مشرقی کی شخصیت کا ابھی تک کسی نے غیر
    جانبداری سے تجزیہ کیا ہی نہیں۔ علامہ مشرقی ایک حساب دان اور سائنس دان تھے اور سیاسی تخمینوں میں بھی ایک سائنس دان کے ذہن
    اور تجزیاتی انداز کو استعمال کرتے تھے۔ عصری سیاست میں ان کے اکثر تخمینے ناکام رہے جبکہ وفات کے بعد ان کے بہت سے تخمینوں
    کی صداقت بھی واضح ہوئی۔
- speaker: Respondent
  text: 'بیسویں صدی کے دوسرے اور تیسرے حصے میں مسلمانوں کی خانہ ویرانیوں کا نوحہ انہوں نے ضرور لکھا۔ لیکن ساتھ ہی مسلمانوں
    کے روشن مستقبل اور غلبہ اسلام کی پیش گوئی بھی کی۔ ان کی نوحہ گری کی غرض محض جذبات غم کی تسکین نہیں ہوتی تھی۔ وہ اس فن
    کے ذریعے مسلمانوں میں آزادی اور عظمت حاصل کرنے کا عزم اور حوصلہ پیدا کرتے تھے۔ مثلا علامہ صاحب تذکرہ میں یوں رقم طراز
    ہوتے ہیں: "اگر آج اس کی پرورش بربادی کے سپرد اور اس کا ہر گوشہ خرابی کا امین بن چکا ہے۔ اگر اس کی بد طالعی اور خانہ ویرانی
    افسانے دشمن کے شکر خند قہقہے بن رہے ہیں۔ اگر اس کی بے آبروئی اور فاقہ مستی کا ماجرا شرمندہ بیان اور روکش تشہیر نہیں رہا۔
    اگر آج اس کی ذلت اور مسکنت کی چوٹ جگروں کو فگار اور سینوں کو پاش پاش نہیں کرتی۔ اگر بے حسی کے موت آفریں زہر نے آج اس کے
    ہر فرد کو بے پروائے سعی اور بے گانہ عمل کر دیا ہے۔ اگر افلاس کی غیرت اور بے حرمتی کی آن آج اس کو محنت کش چارہ گر ہونے
    نہیں دیتی۔ اگر اس کی نعش جاں سپار پر آج ایک سچا ماتمی اور نوحہ گر موجود نہیں؛ نہیں نہیں۔ اگر اس کے عزاداروں کی آسماں رس
    فغاں اس کے یخت خوابیدہ کو جگا نہیں سکتی۔ اگر اس کے یتیموں کے دلفگار آنسو اور بھک منگوں کی جاں گداز آہیں فرش زمین میں شگاف
    اور سقف آسمان میں سوراخ نہیں کرتیں۔ اگر اس کے پس ماندگان کی محشر انگیز سینہ کو بیاں اللہ میاں کے عرش کو متزلزل نہیں کرتیں۔
    اگر خدائے پاک کی غیرت اور شان عفو زمین پاش سجدوں اور فلک شگاف دعاؤں کے باوجود جوش زن اور متحرک نہیں ہوتی۔ اگر محبوب خدا
    اور حبیب ملت نبی صلی اللہ علیہ وسلم کی شفاعت بھی امت کے حق میں کارگر ہوتی نظر نہیں آتی۔ نہیں، نہیں، اگر خود امت اپنی مجرمانہ
    غیر مستحق اور شفاعت کی یقینا نااہل ہو گئی ہے اور آسمانی اور زمینی بلائیں آج ہر طرف سے اس کے اجڑے ہوئے جھونپڑوں کو ڈھونڈ
    ڈھونڈ کر ویران کر رہی ہیں تو اس کی وجہ ہی ہے کہ مسلمان قزان کے مقاصد سے قطعاً اور اعمال ختالحہ کے اصلی مفہوم سے کوسوں
    دور جا پڑے ہیں۔"'
- speaker: Respondent
  text: 'مجرمانہ ظاہر پرستیوں کی بدولت مسلمانوں پر طاری ہونے والی ذلتوں اور مسکنتوں کا اس زور دار انداز میں ذکر کرنے کے بعد
    علامہ مشرقی امیدوں، امنگوں، ولولوں، روشنیوں کا پیغام بھی دیتے ہیں فرماتے ہیں: "اور تو قانون خدا میں کوئی ردو بدل ہرگز
    نہیں پایا جائے گا۔ اس قطعی استدلال کی بنا پر علامہ مشرقی گذکرہ میں اپنے اس ایمان کا اعلان کرتے ہیں کہ قانون فطرت کی کوئی
    مضر حقیقت اسلام کو فنا نہیں کر سکتی۔ مسلمانان عالم کا روئے زمین پر بالآخر بطور ایک غالب عنصر کے رہنا لازم و ضروری ہے۔
    اور جب تک زمین وآسمان اور کل کائنات موجود ہے یہ صورت قائم ہو کر رہے گی۔ اگر موج در انتک کے تاتطتاوں ات کی شر انکرڑی ہے
    ننظارو این کسی سے اق ادا کر تا کر و دا دکائی اون فارضی نے عالی یرس شراان کے نی عتثتثارت ارات کے دباؤ نے ایک غیر مانوس
    صورت نمایاں کر دی ہے جو ہٹ کر رہے گی۔" اور آج رفتار عالم نظر پر نظر رکھنے والا ہر فہمیدہ شخص جانتا ہے کہ مستقبل میں مسلمانوں
    اور مسلمانوں کے روشن خیال عزائم کا کردار ایشیاء، افریقہ، یورپ کے گلی کوچوں ہی میں نہیں علم وتحقیق اور دانش وفہم کے اداروں
    میں بھی موضوع سخن ہے اور وہ دن دور نہیں جب مسلمان ممالک دوسروں کے سیاسی اور عالمی مفادات کی تکمیل کا ذریعہ بنیں گے اور
    خود اپنے نظامات وعل کی اشاعت کا ترغیب اور انحالرت کے دکھوں کا مداوا بنیں گے۔'
- speaker: Respondent
  text: 'علامہ مشرقی صاحب کی سیاسی آراء میں سانحہ مشرقی پاکستان خاص طور پر نمایاں ہے اور قیام پاکستان کے چند سال بعد ہی آپ
    نے اس کی علیحدگی کے عل کی تعئیل کے لئے کی فلت کا یق کا تیا و حوران کن کد فک درالبت قکلی ان کے حسابی تجزیوں کا سیاستدان
    عام طور پر مذاق اڑاتے تھے۔ لیکن ان کی لاہور میں مئی کی ایک تقریر ملاحظہ فرمائیں۔ پاکستان کے دو ٹکڑے جو چودہ سو میل دور
    ہیں اور مشرقی پاکستان کے متعلق ہندوستان کے کمانڈر انچےف نے ابھی ابھی اظہار کیا ہے کہ اس کو زیادہ سے زیادہ ایک ہفتہ کے
