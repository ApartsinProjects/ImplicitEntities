collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Let me just ask you whether in 1961 when you went into McComb you were aware that you were moving into an area of
    the state where white resistance was likely to be the most violent or whether it was a matter of being invited in and
    going?
- speaker: Respondent
  text: Well I don't, I am not conscious of as early as '61 having that distinction in mind. And I am not sure in light of
    later events that it is correct. You know that that is the area where white resistance is most, or was likely to be most
    violent. But basically I went, you know, at Amzie's suggestion with no real idea about a distinction in geographical areas
    in Mississippi. I didn't have in my mind then the distinction the cotton economy and the small farm owning subsistence
    kind of economy that you would find in the southwest part of Mississippi. It is true however that when he had got started
    in McComb and people came in from Walthall county and Amite county, the people in McComb did indicate and very strongly
    that Amite county was an area, a county where we would encounter violent opposition.
- speaker: Interviewer
  text: I guess that went from the local black leadership that we were working with to... he was the son of the person who
    owned the local paper there, the McComb Enterprise?
- speaker: Interviewer
  text: Interviewed me a... Because he had talked to me, you know, couple of times, when we were just starting out. I guess
    we had been there about a couple of weeks when we took some people down to register. He came down and we talked with him.
- speaker: Respondent
  text: So that is true, that is within that area, the whole southwest area of Mississippi, they identified themselves, people
    there identified themselves Amite county as a particularly deeply violent center of resistance. As opposed to say Walthall
    county. So it wasn't just the rural areas as opposed to McComb, but particular pockets at least in people's minds.
- speaker: Interviewer
  text: Yes. I misspoke on the question. I was thinking of southwest Mississippi as an entity. Would that apply do you think
    as being the toughest place to crack in Mississippi? Or is there a distinction that should be made?
- speaker: Respondent
  text: Well, I came to make a distinction between what seemed to me be more organized violence as opposed to local hit and
    miss violence. But I am not sure now. I think probably evidence might be looked for which might indicate that clearly.
    But most or all of the violence in Mississippi was organized and dealt with through the political administration and the
    various organized citizen's groups. So it became very clear that the highway patrol was an arm of the resistance, that
    is that their function was to track, keep a close guard on civil rights activity. That certainly was clear when you took
    people to register and it was the highway patrol that interceded.
- speaker: Respondent
  text: And it seems to me it was only the failure of the highway patrol to effectively deter coming to the courthouse, that
    is when we had that incident where I was arrested and there was that call to the Justice Department and the case came
    to nothing. I refused to pay the fine and all that. So then the next time we had the violence done by a local citizen,
    Billy Caston, who was nevertheless connected up to the political apparatus. Billy Caston who was connected with Earl Hurst
    who was a state representative in terms of some kind of blood relation.
- speaker: Respondent
  text: I think looking back that if the highway patrol had been able to deter or if they might have continued with that,
    they thought it would be effective.
- speaker: Respondent
  text: But that it was only when that was clearly not going to be effective because then you had to contend with the Justice
    Department that it moved to this next level. You know I was-- Taylor Branch was in here last week, I don't know if you
    know of him?
- speaker: Respondent
  text: I think in my mind anyway that moved it.
- speaker: Respondent
  text: He is a journalist based out of Washington and is writing a book on King and dealing with the United States as a whole
    in the era which King lived in, took off from '54 to '63, about the same period that you are talking about.
- speaker: Interviewer
  text: But he did some research at the Johnson Library and there is an interview there with-- that is with President Johnson
    Library with Paul Johnson. Have you seen that?
- speaker: Respondent
  text: Yes, I have that. Amazing interview. I sort of interpreted that man as just absolutely crazy or senile when he was
    giving it, but really revealing in terms of just the intransigence of the moderate Paul Johnson. What was his angle?
- speaker: Interviewer
  text: Well, he was particularly struck by the conversation around the murder of Schwerner, Goodman, and Chaney and the pretty
    much out and out statement by Johnson that he knew of the plans, but that to take these workers out of the jail and to
    work them over. But that the plans had gotten, gone wrong.
- speaker: Respondent
  text: I don't recall that, it might have been... I am sure that I would, I think I would have had I...
- speaker: Interviewer
  text: Well, he was saying that he was, apparently the guy, the interviewer went over this point with him a couple of times
    and asked him is this what you are saying. Are you saying that you actually knew ahead of time that they were going to
    take these boys out because what he was saying was that the plan was to rough up Schwerner.
- speaker: Respondent
  text: Right, I had heard that.
- speaker: Interviewer
  text: But then it went, it got, you know, a stray because one of the patrolmen, whoever it was, was drunk or whatever and
    went too far. But the idea that at the level of the government that this was taking place... And it also reminds me of
    something that one of the writers that came through told me in 64. His name, a novelist?
- speaker: Respondent
  text: The plan got, went...
- speaker: Interviewer
  text: Johnny Hershey?
- speaker: Interviewer
  text: I just saw something that Hershey did in the paper.
- speaker: Respondent
  text: But he lives up there in the same...
- speaker: Interviewer
  text: Oh, Robert Penn Warren?
- speaker: Interviewer
  text: He wrote that article on "Two for McComb," and you know the book. And when he came through and interviewed he was
    telling me that he had just come from Johnson's office and Johnson had this huge mounted picture of me in his office,
    this big blown up photo.
- speaker: Respondent
  text: I think I have heard that.
- speaker: Interviewer
  text: But it seems that-- I mean the thing is that it seems that in Mississippi the opposition was really organized at the
    state level. And so therefore the distinction between southwest as being the hardest versus the velvet really-- I am not
    sure of what value that is.
- speaker: Respondent
  text: It is a good point I think. Back to Governor Johnson one of the things that I found in the Johnson, Lyndon Johnson
    library is that Lyndon Johnson was courting Paul Johnson throughout this period '64-'66. Just records of telephone conversations,
    letters, sending him copies of pens that Johnson used to sign various bills. I have a theory that once it was possible
    for the national administration to hook up with the state administration on a level where they could talk, then it became
    much more difficult for civil rights forces-- this is sort of '64-'65-- to act because the ground had really shifted.
- speaker: Respondent
  text: It was one thing when you were dealing with a (doss) Barnett who the candidates thought they could deal with and couldn't,
    and another thing to deal with the Johnson or his successors, who understood each other-- the two Johnsons did. And all
    the while I found in both the Kennedy and Johnson Libraries that Eastland and particularly Stennis were instrumental in
    at least in terms of discussions that went on. I don't know what the discussions were, but Stennis during the Kennedy
    administration would be called in times of every crisis. He was making comments privately on things like school desegregation
    in the mid-sixties, "Well you have done okay up until now, but don't push it any further." While his public stance of
    course would be that of an opposition. It was interesting going through the logs of Johnson's office during Atlantic City.
    And as you know the man was obsessed by the Challenge, although he doesn't even mention it in his memoirs. Of the people
    he was calling. Eastland. Richard Russell. Connally. Everybody in the entire southern tier of the democracy. In all of
    this I don't have any record of his ever having contacted any movement leader or any black leader surrounding the challenge.
- speaker: Respondent
  text: So I, although I don't see a link up in terms of organized violence on the federal level, I think that once you get
    to the point where you have a cooperative relationship to a degree between state and federal authorities then it becomes
    a lot stickier. And then I see for example the federal government move to defeat SNCC after the election, after Atlantic
    City. You see Doug Dinn who was a Greenville attorney who was related to Johnson really taking the lead and undermining
    SNCC, Redding Carter coming in, Aaron Henry making the switch. And you have a whole new alignment that is the service
    of the Democratic party. I have made that speech. What do you think about that as a whole thesis?
- speaker: Respondent
  text: Well, yeah, that was clear I think at the convention. That there was a move. The thing that the movement was going
    for it, particularly before, up until the convention was a unity among the black population about the program and the
    goals. And that was shattered at the convention. Also I think that there was a basis for a different kind of unity emerging
    after the convention. But that was taken over by the group that you just mentioned, the people that the federal government
    was interested in working with in the state. Which I don't think just included the state administration, but also included
    certain foundations and the churches. All people who were associated with the administration during the civil rights struggle
    and really formed the coalition that put forth say the March on Washington in '63 and was the backbone of the civil rights
    bill. Those groups prior to '64 did not have an avenue for working in the state.
- speaker: Respondent
  text: And pretty much whatever they wanted to do they had to do through the movement if they wanted to have any presence
    there at all. But it was after '64 that these groups saw that there was an opening for working directly with black people.
    And they moved in to do that.
- speaker: Respondent
  text: They didn't move in-- there wasn't in their idea a movement idea. That is the movement idea I think would have been
    to pull together the core base around as a statewide organization around the various poverty programs. The Head Start
    programs, the economic programs, and so forth. And try to build a grassroots organization which would really run these
    programs. But that was-- we were cut off from that. I mean those programs were started before we even knew about them.
    People had moved in and set up, you know, the arrangements and everything. And we were presented with just something that
    is already started and going.
- speaker: Respondent
  text: So there clearly was a move to bypass the movement in this shifting of the terrain into the programs. That was at
    the time very disconcerting because it involved people that we had worked with.
- speaker: Interviewer
  text: Al Lowenstein?
- speaker: Respondent
  text: No Al, no. Because Al was not involved in that too much. Lowenstein is a valid case in point because John and I were
    friends. We had met, he was up at Harvard at that time. We had met through his roommate who was Guido Goldman.
- speaker: Interviewer
  text: Whose name keeps coming up in...
- speaker: Respondent
  text: I don't know much about him.
- speaker: Respondent
  text: Well, Guido was a very close friend of Belafonte. And I met Guido first at a fundraiser that Belafonte gave at his
    house, which was quite early, it was right after McComb. And I guess Guido through his father had a lot of contacts. Because
    his father was a I guess big figure in the whole Jewish international movement and Israel. And I guess if I understand
    right he did negotiate at the reparations with Germany. So Guido had wide contacts and was interested in helping the movement
    and because he was around the same age there was some understanding. And John and he were rooming together. And John also
    had contacts.
