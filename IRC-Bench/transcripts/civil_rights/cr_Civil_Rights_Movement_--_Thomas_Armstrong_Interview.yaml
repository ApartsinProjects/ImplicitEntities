collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: I guess I should start by saying that I was born in 1941, in Jefferson-Davis County, Mississippi, a small rural town
    in an all Black community known as Lucas. That community was developed, created by free slaves in order that they would
    have less contact as possible with Caucasian in the area. That was the reason for the startup of that particular Black
    community. My dad was a logger. My mom was a housewife. Dad owned three or four log trucks. He hired individuals from
    the community to work with him. Evidently, he paid them fairly decent wages. I don't know exactly what those were, but
    everybody was eager to be employed by him. So, we had a fairly decent life, financial life in a segregated state, as much
    as possible for Blacks at that particular time. So, I really didn't necessarily want for anything growing up there. My
    first encounter with segregation was at a Dairy King ice cream establishment in a small town nearby in Prentiss, where
    my high school was located. I loved the blues. I listened to the blues too late one night and missed my bus to school,
    which was five miles away. So, I caught a ride into the little town of Prentiss. The gentleman dropped me off in front
    of an ice cream parlor. I walked up. In Mississippi, at 9:30 in the morning, it's hot already. I walked up there with
    an arm full of books and asked for a vanilla ice cream cone. The gentleman looked at me and said, "What's the matter,
    boy? Can't you read?" I said, "Of course," I have all these books here. He said, "Read the sign up there." The sign said
    white only. He took his thumb and pointed around to the side window and said, "Go around there." So when I walked around
    there, there was a 50 gallon metal garbage can half filled with garbage, swimming with flies and so forth. I immediately
    turned and walked the last 1/4 mile to school. My cousin at that time was principal of that high school. I waited outside
    his office and explained to him what happened to me. He simply stated, "Don't worry too much about it. We simply will
    not frequent that establishment anymore." That's my first indication of overt segregation; knowing about it, discussing
    it with family, and so forth. That was a mark in my path to fighting for civil rights at that particular time.
- speaker: Respondent
  text: I left there and went up to Tougaloo College in Jackson, Mississippi, which was approximately 60 miles from my home,
    enrolled there. After my first semester there, a classmate of mine and myself attended what we call a mass meeting in
    Jackson, Mississippi at that time. Just coincidentally, a young man by the name of Medgar Evers was moderating that meeting.
    So, he was speaking of how, two years prior, 1956, the Circuit Court of Mississippi had arbitrarily eliminated or deleted
    many, many names from their voter roles. He requested Tougaloo College students to help him replenish those roles. So,
    he read some names. I recognized, when he got to my county, Jefferson-Davis, I recognized a few names he read off. So,
    I thought I had no choice but to go out, do what I could to help get them back on the voter rolls. So, I joined up with
    him. It was difficult. It was dangerous. The way it worked was, Medgar would contact our pastors in the 84 counties of
    Mississippi. They would set up voter registration meetings. So, he would contact students at Tougaloo College and give
    us dates, and names of pastors, and locations. We would meet the pastors and go from there. The meeting was under cover
    - clandestine. Many, many times, half the conducting those meetings, explaining to Blacks in Mississippi the voter registration
    process, we would take them down to the Circuit Court office, but most times we would let them go themselves. Because
    if we went, the circuit clerk took offense to that. Many times, we would be beaten up or whatever the case might be. So,
    they would have less trouble if they went alone. Now, you have to remember that less than 95%, I should say more than
    95% of the people we took there were not allowed to vote. We had to, I guess you might say, there was a voter registration
    application that you had to complete. That application indicated that you had to interpret one of Mississippi constitutions
    segment. You could never interpret that to the likes of the circuit court. No matter what you said, you failed. There
    were one or two people in the community who were allowed to vote. Many were not well educated at all. The well educated
    individuals in the community, most likely were not allowed to vote. The lesser educated one, if the clerk wanted him to
    vote, he allowed him to vote.
- speaker: Interviewer
  text: Sure. This is fantastic. I do have some questions I want to ask you, but I don't want to interrupt your narrative,
    so please continue.
- speaker: Respondent
  text: There are many people, including some civil rights individuals who felt that Blacks did not do enough to prepare their
    cause during that particular time, '60s Civil Rights era. However, we feel, as well I particularly feel, that we started
    to progress in the arena of civil rights with the return of our World War I and World War II veterans. We had two World
    War II veterans in our community; Avery Toney and Curtis. In fact, Curtis lived only about 1,000 yards from my house.
    These gentlemen participated in the Battle of the Bulge, and that was a combination of, really, battles. Curtis participated
    in four major battles there, and Avery Toney, six major battles during the Battle of the Bulge. What's interesting about
    that is they survived. They came back to Mississippi, to our community, our counties, and were not allowed to vote, and
    were ridiculed for their efforts, or their attempts to vote. But those two gentlemen took that courage that they had during
    World War II, brought it back to us, the young people in our community, and demanded from us that we use that courage
    to try to take our people, Black people in our community a step forward in a society of a better tomorrow. We did. We
    did what we could. That, all of that led me to civil rights. I don't think - in fact, I know - I didn't tell my parents
    when I first joined up with him. But when I did discuss it with them, they felt, my mom, she was a mother. Mothers were
    fearful for their kids to get involved. Also, simply because people who were doing what I was doing, and my classmates
    were doing, were getting beaten up and some were killed doing that. We had a few of our, just to mention a couple of our
    martyrs at that time; Reverend George Lee, Lamar Smith, and Medgar Evers, of course. But Reverend George Lee was from
    Belzoni, Mississippi. He was killed May 4, 1955, a few days prior to the murder of Emmet Till in Mississippi at that time.
    But he was a minister. He had a printing press. He was a pastor of a church. He used that printing press and his pulpit
    to promote voter registration. The founders, the fathers of Belzoni met with him once and demanded that he remove his
    name from the voter's rolls and he refused, so he was murdered. Lamar Smith, just 30 miles from my hometown was killed
    in the town of Brookhaven, Mississippi. I think it was approximately 2:00pm in the afternoon, in broad daylight on the
    lawn, holding a fist full of absentee ballots. Three gentlemen who were accused of that particular murder; one leaving
    that scene covered in blood; were never convicted. They were charged, but they were never convicted. There were at least
    12 witnesses to that particular murder, and it has never been, really, no conviction as of today. It was a terrible time,
    living in Mississippi at that particular time. We felt that we had to do something. It was time for - we had waited too
    long. We had waited too long, really. Our fore parents and so forth, they had to wear that mask in public, and pretend
    they were something that they were not. The embarrassment of that led, also, to our participation, the younger generation's
    participation. Seeing our parents walk down the street, having to get off the sidewalk when a Caucasian passed, and were
    subject to ridicule at the same time; that was very motivating to us. That's up to that point.
- speaker: Interviewer
  text: Let me jump in with a question, and it relates to what you've been talking about. I have read you used the word "terror"
    to describe growing up in Mississippi, which is a very profound word. You were the same age as Emmett Till -
- speaker: Respondent
  text: Oh, yes. Same age.
- speaker: Interviewer
  text: From an early age, that stepping out of line, as it were, could easily result in torture and death.
- speaker: Interviewer
  text: For the young people who watch this recording, who have no first-hand experience from the '60s, can you give us a
    sense of the fear? The mindset that you had to live with and internalize every day, in order to make it through that dark
    time in Mississippi?
- speaker: Respondent
  text: Yeah. As we said before, it was a difficult time during that particular period. It was something that we had to deal
    with. As I look back at it now, and also then, it reminded me of the 1705 laws that were put in place to control slaves
    at that particular time. Those laws regulated every aspect of slave life. Those laws stayed in place. The remnants of
    those laws remained in place all the way up to the passing of the Civil Rights Act. So, get off the sidewalk when you
    approach white. If you wanted to purchase shoes in the local store, draw your footprint in a sheet of paper and give that
    to the clerk. Blacks could not participate in court proceedings unless it was sanctioned, I'm sorry, but whites at that
    particular time. You could not vote, at that time. There were a lot of things, interracial marriages were bad, at that
    time. We had to live with constant fear. That's the best way of putting it. Because someone else, even though they were
    not with you, it was their ideas and their philosophies that controlled your life. You did not control your life. So,
    that's one of the things that we had to deal with.
- speaker: Interviewer
  text: I was just going to ask about Medgar Evers. You got to know him, I assume?
- speaker: Respondent
  text: Oh, yeah. I worked with him for more than two years, yeah.
- speaker: Interviewer
  text: He was killed in June of '63, I believe. Can you speak to the impact that his death had on you?
- speaker: Respondent
  text: I can speak more to the impact of his life. Medgar Evers was the greatest man that I had ever known, even to this
    day. In fact, I used to tell my dad that I thought Medgar was braver than him. But my dad would turn, look at me and smile
    and say, "Yeah, but he doesn't have to live with you. I do." Medgar Evers, he was field secretary for the National Association
    for the Advancement of Colored People, a civil rights organization known as NAACP. He solicited members for that organization,
    throughout the state. But he did it undercover. Everyone thought that he was an insurance salesman, selling insurance
    when he met with Blacks in various areas, and on plantations, when he'd talk to them about the NAACP activities. But he
    was really trying to get members for the NAACP. Medgar, he was a man of his word. We felt that he knew everybody in Mississippi.
    Every pastor in Mississippi, every preacher in Mississippi, Medgar knew most of them. At that time, less so than now,
    churches were leaders of the movement during that particular time. Not so much today. But Medgar, he was killed because
    he wanted you and I to have the freedom and the right to work, the right to vote. Today, in Jackson, Mississippi, his
    home, there's a federal post office building that bears his name, and so does the 689 foot vessel, bear his name today
    because of the work that he did in the civil rights movement.
- speaker: Interviewer
  text: Did you have any optimism, as you got involved to affect change, did you have any optimism that you could change the
    hearts and minds of Southern segregationists?
- speaker: Respondent
  text: Man, are you kidding? Yes, sir. We thought we could change the world. We thought we could change the world, as individuals.
    It was difficult, but when you walked up to that roadblock and found out that you really couldn't, alone. Yes, we were
    very optimistic. We spoke of, internally, we spoke of times to come that Blacks would be presidents of this country. So,
    we were looking forward to what we called "freedom" at that particular time.
- speaker: Interviewer
  text: Tougaloo, I know, was really the center point for civil rights in Mississippi. Since you were there, could you speak
    a little bit to the impact that the civil rights movement had on the student body at that time?
- speaker: Respondent
  text: Tougaloo was an oasis. We liked to say it was an oasis in the middle of a sea of hate. Tougaloo College was the only
    place that interracial groups could go and meet, and converse. Any other place, it would be considered as breaking the
    laws of the state of Mississippi. Because integration, you see, was banned in Mississippi. It was not tolerated & unlawful.
    So, Tougaloo College, you felt free when you were there. Just ironically speaking, when you were away from Tougaloo College,
    let's say you were a student there, and you were away, maybe at home on the weekend. When you came back, and your bus
    came back, and the bus stop was 1/4 mile from campus's gate. The bus driver would let you out. That 1/4 mile, you would
    run to get in the gates of the campus because you were vulnerable on that stretch of the roadway. So, once you got on
    the campus, once you got through that gate, you let out a deep sigh, a deep breath of complete satisfaction at that time.
- speaker: Respondent
  text: Across but that was due to student participation in religious protests at the time. Tougaloo College students, along
    with other students, of course, opened up various religious organization to the worship by Blacks. On Friday nights, we
    would meet at the chaplain's home on campus, and we'd discuss what protests we were going to participate in Saturday morning,
    on Sunday, in Jackson. Many of those protests were religious, what we'd call "religious protests."
