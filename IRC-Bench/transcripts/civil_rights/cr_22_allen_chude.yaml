source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Can you tell me about your family heritage and early childhood experiences?
- speaker: Respondent
  text: I was born in 1943 and grew up in Solebury, Pennsylvania. My family had a strong legacy of activism, especially on
    my maternal side. My great-grandmother, Mary Barton Luckie, was politically active, and Lucretia Mott was a role model
    in our family. We were raised in the Episcopal faith, which influenced my early life significantly.
- speaker: Interviewer
  text: What was the community like where you grew up?
- speaker: Respondent
  text: Solebury was a small town with a predominantly white population. There were strong racial attitudes and limited socialization
    between different religious groups. My father worked in a unionized job, but he had a complicated attitude towards unions.
    The community was politically conservative, and McCarthyism was a significant influence during my childhood.
- speaker: Interviewer
  text: How did your early experiences shape your views on race and activism?
- speaker: Respondent
  text: Growing up near Revolutionary War sites gave me a sense of history and struggle. My family’s political background
    and Episcopal faith instilled values of justice and equality. However, I became more aware of racism and social injustice
    later, especially during my time working at the Church of the Advocate in North Philadelphia and as an exchange student
    at Spelman College.
- speaker: Interviewer
  text: What was your experience like at Spelman College?
- speaker: Respondent
  text: Spelman was a predominantly Black college in the South, and I was one of the few white students there. It was a profound
    experience that challenged my understanding of race and privilege. I took courses with Staughton Lynd and engaged deeply
    with the Black community. Conversations about interracial marriage and nonviolent protest were common, and I developed
    a personal commitment to pacifism and social justice.
- speaker: Interviewer
  text: How did you become involved with the Mississippi Freedom Summer in 1964?
- speaker: Respondent
  text: I was recruited through connections with the Student Non-Violent Coordinating Committee and other activist groups
    at Spelman. After attending a SNCC conference and hearing John Lewis speak, I felt compelled to join. I had to get my
    parents' permission to participate, and I prepared by traveling to Western College for Women in Ohio before heading to
    Mississippi.
- speaker: Interviewer
  text: Can you describe your work and experiences during Freedom Summer?
- speaker: Respondent
  text: I taught at a Freedom School in Holly Springs, Mississippi. The work involved educating Black children and adults
    about their rights and history. It was dangerous, especially after the murders of James Chaney, Andrew Goodman, and Michael
    Schwerner. We lived in challenging conditions, and local activists like Rita Walker and Ivanhoe Donaldson were vital to
    our efforts. Music and community gatherings were important for morale.
- speaker: Interviewer
  text: What impact did Freedom Summer have on you personally?
- speaker: Respondent
  text: It was transformative. I faced hostility from white communities and sometimes alienation from my peers. Speaking at
    Ole Miss and interacting with local police were intense experiences. The cost of activism was high, but it deepened my
    commitment to civil rights and social justice.
- speaker: Interviewer
  text: How did your activism evolve after Freedom Summer?
- speaker: Respondent
  text: I moved to New York, married Robert L. Allen, and became involved in anti-war activism and the women's liberation
    movement. I worked with The Guardian and connected with early feminist organizers like Shulamith Firestone. Consciousness-raising
    groups and discussions about race, class, and gender became central to my work.
- speaker: Interviewer
  text: Can you tell me about your involvement with women's liberation groups?
- speaker: Respondent
  text: I helped form the group Sudsofloppen in San Francisco after moving there in 1968. We focused on consciousness-raising
    and addressing issues like abortion, sterilization, and racial diversity within the movement. There were tensions and
    disagreements, but we worked to create spaces for women to share and analyze their experiences.
- speaker: Interviewer
  text: What were some challenges you faced in the women's movement?
- speaker: Respondent
  text: There was a lack of leadership and role models, and sometimes the movement struggled with issues of race and class.
    Lesbians faced discrimination even within feminist groups. Defining womanhood and addressing reactionary responses from
    society were ongoing challenges.
- speaker: Interviewer
  text: How did your personal life intersect with your activism?
- speaker: Respondent
  text: I raised a mixed-race son, Casey, in San Francisco, balancing motherhood with activism. Community support and childcare
    were crucial. I also joined Union WAGE, which focused on working-class women's rights and the Equal Rights Amendment.
    My personal experiences deeply informed my political work.
- speaker: Interviewer
  text: What role did memory and personal narrative play in your work?
- speaker: Respondent
  text: Personal memory is vital for documenting the history of movements. It helps preserve the nuances and emotional truths
    that official histories often miss. Writing Free Space and co-authoring Reluctant Reformers were ways to capture these
    experiences and analyze the dynamics of social movements.
- speaker: Interviewer
  text: Can you share about your trip to Cuba with the Venceremos Brigade?
- speaker: Respondent
  text: In 1972, I traveled to Cuba with the Venceremos Brigade. We worked on a farm and hiked Pico Turquino. The trip was
    eye-opening, offering insights into international solidarity and revolutionary struggle. It reinforced my commitment to
    global justice.
- speaker: Interviewer
  text: How do you view the legacy of the civil rights and women's liberation movements today?
- speaker: Respondent
  text: The movements laid important groundwork, but many struggles continue. It's essential to combat white supremacy and
    sexism both personally and societally. Remembering and learning from past activism helps inform current and future efforts
    for justice.
