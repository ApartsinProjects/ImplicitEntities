source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: I was a migrant worker.
- speaker: Respondent
  text: In the early '60s when my dad could get up in the morning, go to work with my dad in the field, picking cotton in
    the early morning because in Texas, the best time you could pick cotton is early morning.
- speaker: Respondent
  text: We will go back to the migrant worker and then we'll run into the story, you know.
- speaker: Respondent
  text: But the road mark for us in Texas, you know... We were competing at that time - our injustice - like the people from
    Mexico were coming because they would work for less money. You know, there was a problem. We were Mexicans, they were
    Mexicans too, but they think that they would do it for less money. And we did, you know, because... I mean, in a way I
    blame them, in a way I don't blame them. But they never seemed to - most of the people from Mexico - they didn't really
    move up in Texas at that time. They didn't really follow Chavez.
- speaker: Respondent
  text: Because in Mexico they don't pay those people not even a dime, so they come to Texas and make 50 cents an hour and
    that's big money for them. So that's the only thing we would tell them. We never really got into fights. We tried to boycott
    them because, for example we would go to a farmer and he would pay us - to pick 100 pounds of cotton - 2 dollars. And
    people would come from Mexico would do it for less money. That was a problem in the 50s and 60s, you know. They were going
    to farms and they would do work for less money, you know but -
- speaker: Interviewer
  text: So where in Texas were you?
- speaker: Respondent
  text: Texas, my ... I was raised there; my brothers were raised there too, you know. And back in the early 60s, my father
    and mother got sick, you know. So, I had to work in the farm, you know. I had to go... We used to hop in those trucks
    and just go out in those fields and work because there was no, there was no food stamps or, no benefits that we got now.
    So, it was a different life. It was very - it was very nice because you work in the fields with those people that are
    from Texas and Mexico too, and things started changing because they gave us a raise. They raised it to a dollar an hour
    back in the early 60s. We used to pick the first cent. One day I didn't go to school - one morning I didn't go to school,
    so I worked 10 hours a day for 7 days picking watermelons. And they gave me a check for 70 bucks. It was the biggest check,
    and they paid me that money and I took it to my mother, and she was so happy.
- speaker: Respondent
  text: So that was it for us. It was one of the good things in the 60s you know and then, the migrant workers, you know,
    there was no work in Texas. So, my decision, when my mother and father got sick... My brother was young, Lupe and Roy
    they were really young. And it was, like I said it was really hard because we came into a new house, and there was no
    water, running water, no lights. We would just sleep in one bed in the winter time. My father used to go out there for
    some wood for the fire and bring it in to keep us warm. We used to go to the city for water, to take baths. Sometimes
    we would just go to the river. But it was a good life because all my brothers and my father and mother were alive, so
    it was.
- speaker: Respondent
  text: One time this truck driver, Arnidez, and my older brother came up to Michigan and he told us there was a lot of work
    up there in the summertime. So one summer, they were coming down here again, and they were coming to Ottawa, Michigan.
    So, I told my father and mother that we had to go because you know, we can't stay here no more, because there's no work
    for us. So, we all hopped in the trucks, there were two big trucks, all migrant workers got in the trucks. We came in
    trucks. As a matter of fact, we passed through South Bend back in 1966. And I was only 16 years old, you know. My father
    was sick, my mother was sick. So, in a way, when we passed through South Bend, I knew that someday I was going to live
    here. My brothers would stay here. They were going to die here too, you know? So, we came to Michigan as migrant workers.
    They were the best years of my life, In Michigan. We had a lot of time over there. We worked and were paid a dollar an
    hour at that time, you know. We were working picking cucumbers, apples, etc. But they were the best years because, to
    begin with, my brothers were alive, Lupe, Roy, Alvinio, and my whole family was alive.
- speaker: Respondent
  text: We came up North as migrant workers to make a better living for us. But then we came in - well my uncle, uncle Raymond
    who was staying in Plymouth. He was a migrant worker too, but he settled down in Plymouth in the early 60s. So, he told
    us, 'Hey why don't you come over here and stay with us you know. And, we said okay - Then our uncle Rudy was set up in
    Detroit. He said, "Would you like to come to Detroit?" And I said, "Well, I don't know." So, I went to check out Detroit.
    But it was too, too wild in Detroit, so we settled in Plymouth, back in the early 60s.
- speaker: Respondent
  text: But we stayed in Ottawa, Michigan for the summer. I think we worked, myself my brother and my mother. I think we worked
    for 18 months and we earned about 500 dollars, at most 550 all in a summer. And we bought our first car, when we came
    to South Bend. When we passed through South Bend, I see this red Nova car. And I told my father 'Hey look, that car is
    nice. It was a '64 Nova red convertible. So, when we came- when my mom went and picked me up when we came to Plymouth,
    that car was still there. So, on my way back to Michigan again, I talked to the guy, and we bought the car. We drove it
    back to Michigan. I wasn't sure if we came back from Ottawa, Michigan to Plymouth for a little while. We did for three
    months or so. So, what I did, was stay here in South Bend. My mother and brothers didn't like it, so they went back to
    Texas. So, my... then maybe not even 6 months later, my mother and brother decided to come back to us. So, we stayed here
    in South Bend. And, at that time there wasn't that many factories that hired Mexicans. Or Tex-Mex, which is what they
    called us, you know. And... I was lucky enough to start one of the foundry commons there was a lot of... I think they
    were paying about 2.10 an hour at foundry commons.
- speaker: Interviewer
  text: Do you remember about what year that was?
- speaker: Respondent
  text: It was 1967, 1967. 2 dollars and 10 cents was much better than 50 cents or a dollar back in the... working in the
    fields for that kind of money. So, I stayed here. And then another year went by. In 1969, I started working for Ally,
    you know. At that time, I think there were only... at that time maybe I wanna say about 10 Mexicans working there around
    that time in 1969, when I started working for Ally. And... we joined a UAW, United... Union for American Workers... UAW,
    UAW. And I was a member for 30 years there. And my brother thinks that he wanted to quit school - he was only 17. So,
    he told me one thing he wanted to do was get a job there. So, I said 'okay I'll get you a job there.' And I got him a
    job there and he was, when they hired him, he was so happy. You know he was only 17 at the time, Roy. And urn, as a year
    went by -
- speaker: Interviewer
  text: How did he get his job if he was only 17?
- speaker: Respondent
  text: I told Roy, I told him to forget his wallet at home. I said, "Don't take your wallet." When you go to personnel, just
    go up to the lady, just talk to her like 'Oh, you look nice.' She was kind of a heavy-set lady; her name was Michelle.
    She was a real nice lady. But just tell her how good she looks, and she'll go for it. So, and they viewed my records,
    so and we were lucky that they liked me. So, he got a job here. You know because, he told them 'oh I forgot my ID' he
    started working. And two months later he was 18 so they couldn't say anything about it. But he worked and like I said
    to us... you know.
- speaker: Respondent
  text: But during that time, when I worked for Ally, I was able to get a lot of people jobs there through the years. And
    this is not like in Chicago or other places, where a lot of Mexicans would take advantage of other Mexicans planning to
    charge them money to get them a job. Like in Chicago, back in the days, Back in the days, if you don't pay somebody $400,
    $500 they won't get you a job. Or you have to give them 10% of your check every time you got paid. That's how they get
    you a job in Chicago, back in the days. Here in South Bend, I gave maybe 100s of people jobs in that time. And still some
    of those families, you know, still stay here in South Bend, and still raise a family because Ally was a good place to
    work. I mean they treat us fair. The plant manager down there was named Ray Cook. He was married to a Mexican lady, and
    he helped us to bring on justice for the Mexicans. He, he used to run a convenience store. But he was a very fair man.
    We would have a lot of guys from Studebaker, back in the days, that didn't like Mexicans, or Tex-Mex or whatever you want
    to call us.
- speaker: Respondent
  text: So that's kinda... We used to fight, well not really fight but we used to really argue with them because they didn't
    want to give us the good jobs, they would always give us the dirty jobs. But as time went by, Ray Cook helped us a lot
    too you know, he was a boss. He was a fair boss. So really, we were more like a family there, you know, because he was
    married to a Mexican lady. And he was a very nice guy. You know and... through him, I was able to hire... I was able to
    hire a lot of Mexicans, you know, through him. Because I told him these people need jobs, you know. But besides that,
    you know... there were a couple times we marched downtown for Chavez at that time I was not a migrant worker no more.
    I did my share as a migrant worker back in the 60s. But that's the reason we left Texas, because there was no future on
    the fields. I mean it was fun, but there was no money, you know. You made 50 cents an hour and that ain't nothing. A dollar
    ain't nothing. Because you had no benefits, no sick time, you know so...
- speaker: Respondent
  text: I was able to come up to Michigan, then like I said before, to South Bend... Yeah, I don't think there was much injustice
    for me. I don't think for a Mexican really there is up here... It's what you do for yourself really because... I don't
    really see too much injustice here in South Bend. I mean, they treat you the way you are really, I mean. I had no problems
    with the police, no problems with anybody. As long as you did your work, you know. Some people make it hard; some people
    want to make fights.
- speaker: Respondent
  text: Like I feel sad for myself or whatever, you know. But I was lucky to work with a lot of Germans, Hungarians, and Polish.
    A lot of my friends are white and blacks, you know. But... it was nice, those 30 years I'll never forget Ally like I said
    went down in history and proud that we had our first president from the local, Ramon Rodriguez, and he was the very first
    president of the Local 5 back in the 70s. And he helped a lot of people too, Ramon Rodriguez. You know but... besides
    that, you know, we just... we worked on a lot of stuff, but we didn't really lead a lot of marching because most of my
    staff was working in the factories, we were working 7 days a week, 14 hours a day. We worked, you know, a lot. So, there
    was no time to march because I think I did my share in the past.
- speaker: Respondent
  text: I mean, we helped a lot of people to get jobs here to get on the field because they would come around here, and they
    stayed in South Bend looking for better jobs. So, I would help my migrant workers to come to work with Ally. That's how
    I helped my cause. You know, some people say they think of that, but what I'm saying is once you help those people again,
    you know I'm grateful that they're still around, you know some of them are still living. But we did much here. I mean
    in the Latino and we bought the biggest bands from the whole country to South Bend because there was no entertainment
    for the Mexican Americans until then. We started in the 70s. Now it's but at that time there was no entertainment for
    the Mexicans.
- speaker: Interviewer
  text: What kind of bands did you bring?
- speaker: Respondent
  text: We had... well most of it was Tex-Mex and some from Mexico, you know. We had the biggest bands in Texas. We had, you
    know, well, Ramon Ayabla, we had them, you name them. You know, La Mafia was in Texas. La Sombra, Selena. We had a lot
    of you know, Joe Brago, Freddy Martinez, Freddy Record from Corpus Christi. South Bend will go down in history as one
    of the capitals of the.. .we brought the music here to South Bend. A lot of big groups, they never heard of South Bend
    until the day I booked them. They say, "Where the heck is South Bend?" 'Well you said Notre Dame', well you know, that's
    where South Bend is, Notre Dame. It was really fun because people in Texas they would come over here especially the bands,
    and then we would start talking about the old days. They were talking about the music because I wanted to bring some of
    the big bands from my hometown, my home and bring them to South Bend. And I was able to in the 70s, and 80s, and 90s,
    we brought La Chola Amelia, Freddy Martinez, because he came there from Corpus Christi. We brought Joe Brago, Carlo Miranda,
    Carlo Hernan, San Josuna, and Selena when she was only 15. So, we had done. I mean I never did it for the money, we just
    did it for the music because music is in the heart. My mother was a singer, my grandfather was a singer, my aunt was a
    singer, so it runs in our blood. My two brothers, Lupe and Roy, they loved to dance, and they were big dancers. And me,
