collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: I'd like to start this morning with a question that's very broad, and that is, tell me about your growing up in Chapel
    Hill, what it was like, when you were born and where you grew up, and your family and the schools.
- speaker: Respondent
  text: Bob, I was born in Chapel Hill, I was born on Hillsborough Street, which most blacks referred as Windy Hill. And Windy
    Hill was, well, to enter Windy Hill, you had to go through the white community. And to exit Windy Hill you had to go through
    the white community. And it was just a segment of black homeowners that lived on Windy Hill. Chapel Hill is somewhat unique
    because what it did, it manifest people of the same economics being together. And we had a lot of interactions with the
    people that lived in the neighborhood, which would be classified in today's terms as poor white people. And they were
    friends, we looked after one another, they were pretty supportive in their role, and some of these friendships is lasting
    friendship. But, it's carried on. And then again, you had some extremists, where it wasn't nothing to get up and see a
    KKK written in the middle of the road, sayin' "Get the hell out, niggers." That was a pretty common practice in that time.
    But that's somewhat the environmental condition that you lived under. Schooling, I went to Northside, that was the elementary
    school. And I guess my first two years we had so many students that they had to send us to school in shifts. You had one
    group would go for a half day in the morning, and another group would go for a half day in the afternoon. We didn't have
    the benefit of having the full day of the education. But we had dedicated teachers. And they would make sure there was
    a learning process in place. And they had high expectations for our students. So that was quite helpful. And then there
    was a relationship between the teachers and the parents. The teachers would go and make home visits to the students, and
    visit with the parents, and let the parents know what the expectation for that school year would be for the students.
    After elementary, going to Lincoln, and Lincoln was somewhat, about two and a half miles from where I lived, and we walked.
- speaker: Interviewer
  text: No school bus.
- speaker: Respondent
  text: No school bus. We walked to Lincoln every morning, and we walked back in the afternoons. And in the process, we would
    always have to pass by Chapel Hill High School, which was located on Franklin Street, and then there was the elementary
    school there too, in order to get to Lincoln, which was located on Merritt Mill Road. And it would always phase in our
    mind, wouldn't this be a lot better, if we could attend this school, rather than have to walk down to Lincoln. But Lincoln
    High School, under the guidance and direction of Mr. McDougle, at the time, who was the principal, but he's also, he was
    a surrogate father figure. Not only was he concerned about you at school, he was concerned about you and your well-being
    after school. And he would follow it up. And it was a great relationship that you had. He was a disciplinarian, which
    he didn't allow people hangin' out in the hall. You didn't have a hang-out in the hall, without an excuse. And he would
    enforce these policies. And then he would make sure that he was supportive of the teachers, and making sure that the assignments,
    and that he had a working educational environment that was conducive for all students to learn. Even though we might not
    have had the best materials and I guess we were getting some of our books which was passed down from the white Chapel
    Hill High School to Lincoln. We were getting secondary books. But it was still, we were still able to utilize the resources
    that we had to make and progress in those conditions. As I relate to the football program as well as the band, under Clark
    Egerton they were one - and Mr. Bell - one of the best bands in the state. They drew praises every time they performed.
    The same thing with the football program, and I was fortunate enough to play football at Lincoln for three seasons, and
    I was captain of the last state championship football team, in 1961. We were fortunate enough to win two state championships
    during my three-year tenure on the football team. And what it boiled down to, it boiled down to makin' the best out of
    the resources that you had. A lot of times we would practice, and would practice late, and the coach would have to pull
    his car up there and shine his lights so we could see what we were doin' at night, during the course of the practice.
    We weren't fortunate enough to have lighted fields that we could practice under, and also the turf that we would practice
    on was just about clay. Red clay. And we made use of that, and we took those disadvantages and made them into advantages,
    where we were able to excel. A lot of my classmates and former football players went on to play college ball. Some went
    on to coach at the college level. And it inspired the inspiration where we figured that we were motivated, we could do
    just about whatever we wanted to do, if we worked hard enough at it. I would always look, as I would walk down the corridors
    of the hall in Lincoln, and I could still hear some of the teachers speakin' now. Giving guidance, giving direction, giving
    praise, and all the motivation that we would need to be excelled as students and as students and athletes, and I always
    use this tool now as a parent, and dealin' with my kids. Lettin' them know that if they work hard, and if they pay the
    price, they can be just about whatever they want to be. And it has been a working tool for me. I use it on the job, I
    have a number of employees that I supervise, and I try to give them the same type of motivation. What we call it, the
    old school motivation. And it has been a successful project. What Lincoln means to me, Lincoln is a home away from home.
    This staff is surrogate parents. They dealt with you, they were firm, but they were fair. And they gave you the type of
    inspiration which made you want to succeed. There were no low expectations; they made every student feel that if you're
    proud of yourself you can succeed. And this is what benefited me the most. The community as a whole at that time, everybody
    lived in one area. That was the black community. It was strong. The church was strong. The church provided the guidance
    and direction, and they were supportive of the school. And I can recall when we played football out here at Lyons Park
    in Carrboro, we would have just as many white spectators as we would black. Because everybody come that want to see Lincoln
    play, because they know Lincoln exemplified an excellence in sports. And you would look up there, and the stadium would
    be packed. Every time. And Chapel Hill is a unique place. We had our strength. Strength number one has always been the
    school. We had the church, we had the community, and then we had the community center. And that has always been a successful
    project for us.
- speaker: Interviewer
  text: Tell me about your parents, if you would, Fred.
- speaker: Respondent
  text: My father, really, he was employed with the university as a janitor. My mother, she did housework, and maid work for
    people in the community. Their education, both of them had finished high school. And I think at that time high school
    was eleventh grade, equivalent to eleventh grade education. And, but they were inspiring people. My mother was more the
    head of the household than my father. She was the one that made sure that we would sit down there and we would make sure
    that our homework was done, and she lacked patience in some ways. Because she didn't have the patience for not knowing.
    She expect for you to know, she dwelled on that, and it wasn't nothing to get whippin's. In this day and time they would
    call it child abuse. And I think in the time that I came about they would call it, it would be child abuse if you didn't
    get the disciplinary support that you need to be functional in this system. And so, they were great people. My father,
    he passed in 1975, and my mother's still living.
- speaker: Interviewer
  text: You have brothers and sisters?
- speaker: Respondent
  text: I have three sisters. One of my sisters has, all of them have finished school. All of them have finished college.
    One of them has a law degree. All three of them have their masters'. The whole works.
- speaker: Interviewer
  text: What was your neighborhood like? Did you play in the streets, or did you go to the Hargaves Center, the community
    center for recreation after school?
- speaker: Respondent
  text: Well, we did both of them. I think number one, it was quite common to come down to Windy Hill and you would see us
    playing football. We had an open field, we'd be playing in the open field. We had a basketball goal already set up, we'd
    be playing basketball. And then occasionally in the spring and summer of the year we would venture over to Hargraves.
- speaker: Interviewer
  text: You had mentioned that home visits were made from Northside teachers. Were home visits made from the high school teachers
    as well?
- speaker: Respondent
  text: Uh, yes, we had - R.D. Smith, you said, to take shop. And he would definitely, he was a firm believer in keepin' in
    touch and contact with the parents. And not only that, he would come and he would expect you to be present too.
- speaker: Interviewer
  text: You had mentioned that your principal, C.A. McDougle, was like a surrogate father, and you said something about he
    would follow up. Could you expand on that more? What did you mean by his following up?
- speaker: Respondent
  text: Well, Mr. McDougle was one that, like I said, he was a strong disciplinary person. He, it wasn't nothing for him to
    be standin' in the class as the teacher's instructing the students, you know. He would attend the classroom, sometimes
    sit down there. And he'd make sure that the information that you should be receiving that you were receiving, and do just
    an overview of the participation of classes. And if for some reason you didn't exemplify the learning attitude, it wasn't
    nothing for him to call you in the office and talk to you about it. Sit down one on one. And also, this helped too, because
    it gave him an opportunity to appraise the teachers and their presentation and how they was presenting the subject matter
    to the students.
- speaker: Interviewer
  text: He was really an activist - he was in the classroom, he was in the hallways.
- speaker: Respondent
  text: He was in the hallways - he was a one-man team there. They used to call him Mr. Mac. And he was the one that really
    kept the school in terms of running, and made sure that we had what we need to operate. And also he was primarily responsible
    for making sure that we had a learning environment in the school system.
- speaker: Interviewer
  text: When you finished Lincoln, did you go on and get any further information?
- speaker: Respondent
  text: Yes, I went to North Carolina, I played football at North Carolina A&T, where I received a BS degree, and as a matter
    of fact, I was instrumental in the boycott in '62-'63, where we desegregated the Woolworths. Also played football with
    Jesse Jackson - he was on our football team too.
- speaker: Interviewer
  text: Can you tell me, did you go to A&T on scholarship? And if you did, how did you get that scholarship?
- speaker: Respondent
  text: I went to A&T on a football scholarship. And I got that on the merits of my participation on the field, as well as
    my academics.
- speaker: Interviewer
  text: Did you feel that the teachers, did you have a counselor, who helped you with going on for secondary education, or
    is it something you just did on your own?
- speaker: Respondent
  text: Well you know, I was blessed to have two strong coaches. And both of our coaches assimilated the father images. Bradshaw,
    he was my coach at junior year, and he was just like a father to us, you know. Sometimes we might be in a study class,
    and he would take us out of study class and put us in the gym and we would shoot basketball, he'd have you working on
    your deficiency in terms of the game. Also he would give you words of encouragement. He would try to seek out scholarships
    for you and everything like that, and get you in school to make sure that you are traveling on the right path. Peerman,
    who came in my senior year, was a dynamic coach. We just named the Chapel Hill football stadium after him and Coach Calter,
    who was the head coach out there at Chapel Hill High at that time. So both of them were dynamic people, they gave us the
    leadership, and they took a personal interest in our well-being and our well-development.
- speaker: Interviewer
  text: When you were growing up and playing sports at the high school, were you playing in a league that had schools that
    had the same number of students, or did you play up a level, against schools that were a different class? Like they were
    3A, 2A, 4A schools.
- speaker: Respondent
  text: Well, we played by student population, we would have been classified as a 2A school. But we played in a 3A division.
    We also played some 4A teams. We played Hillside, teams like that at times. And we, like I say, we excelled. We played
    schools higher caliber, and it presented some good rivalries. And good times.
- speaker: Interviewer
  text: How did you do against these schools that were 3A and 4A?
- speaker: Respondent
  text: Well, we played in 3A division, even though we, student population would have been probably a 2A school, but we were
    classified as 3A. We won championships there. At 4A, we probably, we probably had a split with Hillside, 2-2, at that
    time. Small thing probably I'd like to mention in terms equipment, special football equipment. We received a lot of our
    equipment from Carolina - we had a pretty good relationship with Carolina at the time. And we would get shoulder pads,
    helmets, hip pads, knee pads, stuff like that from them. And uniforms, we generally we were able to purchase our uniforms
    through fundraising and other things, other events. But Carolina was quite helpful. Even the trainers of Carolina football
    teams. Sometimes we'd encounter some injuries, where we'd need to have a whirlpool or something like that, and the athletic
    trainer from Carolina would let us come down there, sit in the whirlpool or hot [unclear] or whatever. So they worked
    with us on that.
- speaker: Interviewer
  text: Was Morris Mason involved in any of that? [unclear] recovery from injuries?
- speaker: Respondent
  text: I think Morris was behind it. It's always good to have somebody on staff that you know and who can relate to some
    of the problems that we were experiencing. And especially when you're talking about lack of resources. He was behind it,
