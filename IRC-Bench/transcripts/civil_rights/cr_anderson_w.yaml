collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: You were, as a child and young man, a very ambitious and active young person. You graduated high school at age fifteen?
    I know you came up in Americus, Georgia. Can you talk a little bit about the world of Americus, Georgia when you were
    growing up?
- speaker: Respondent
  text: 'I very often compare the conditions under which I grew up and that of Martin Luther King, Jr. Because we were barely
    170 miles apart. We both experienced the same conditions. Americus was a small farming community with perhaps five, six
    thousand people. The primary industries were farming, peanuts, cotton, and some pecans. My parents were somewhat educated
    compared to others. My father finished high school and started college at Morehouse College, the most prestigious college
    for black men in the United States, probably in the world, but we don''t know whether or not he ever graduated. That was
    not important. The important thing was he went to college, which was probably a singular accomplishment because very few
    blacks, especially males, had the opportunity to go to college. My mother was a high school graduate and taught school
    as a high school graduate because she was one of the most educated people in town. She went back to college after my youngest
    sister started school. She would go to college in the summer at Albany State, which became historic. She taught during
    the school season. It took her twenty years, but she got her B.S. degree, a major accomplishment because no one in the
    Anderson family had ever gone that far in college. So my household recognized the value and importance of education and
    stressed that to the three of us. I had one brother and one sister. It was not even a discussion in my home: you were
    going to college. We didn''t care what you studied. You could study farming, singing, whatever, but you were going to
    college. The town of Americus itself was defined by segregation and discrimination. There was no integration. The school
    system was totally separate. You could not have a sandwich in a lunch counter. There were no public transportation vehicles
    of any kind. Facilities were totally segregated: gas stations, department stores, schools. It was almost like two worlds
    in one: a black world and a white world. I guess I did not complain much because I did not know any better until later
    when I volunteered to go into the Navy. Looking back, how could you tolerate those conditions where a white boy would
    say, ''Nigger get off the sidewalk, you''re where I want to walk,'' and I would get off the sidewalk and let him have
    it? How could you tolerate conditions where in your school system you never got a new book, only used books that had been
    written in and sometimes torn up? There was a movie house in town, totally segregated. Blacks had to sit in the ''buzzard
    roost'' up high and enter through a separate entrance. Those were the conditions that existed and were tolerated if not
    accepted, certainly not liked, primarily because we did not know any other way. I tried to figure out a way to get out
    of that situation. Number one, I elected to go to college. My brother preceded me and had gone to Morehouse College also.
    I went to Fort Valley State, probably attracted more by the opportunity to play football than to get a good education,
    which was secondary. But somewhere in the back of my mind, I always wanted to be a doctor, so I knew I had to get a college
    education if I was going to be a doctor. I went to Fort Valley for two years and then World War II broke out.'
- speaker: Interviewer
  text: How did your family afford to send you and your brother to college?
- speaker: Respondent
  text: They couldn't. It did not cost like it costs today. The tuition, room, and board at Fort Valley State College was
    twenty-five dollars a month. I worked to earn any extra money I had. I worked as an assistant mail carrier, in the cafeteria
    part-time, and I drove for the president. The president of Fort Valley State College was Horace Mann Bond, father of Julian
    Bond, a renowned educator. He was writing about education for blacks throughout the South. He selected me to be a driver
    when I was sixteen. I had a license and was driving for the president, taking care of his two children, including Julian
    Bond. I did not realize the advantage I had over millions of other blacks because I was in the presence of Horace Mann
    Bond, one of the premier black educators in the United States, who traveled throughout Georgia, Alabama, and Mississippi
    studying education for blacks.
- speaker: Interviewer
  text: Did you travel with him?
- speaker: Respondent
  text: I traveled with Horace Mann Bond. I drove for him. There was no public transportation, no airplanes, and bus transportation
    was very limited. So any place we went, I drove.
- speaker: Interviewer
  text: When the war broke out, what happened next?
- speaker: Respondent
  text: 'When the war broke out, I was home on the weekend. Americus is only about seventy miles from Fort Valley State. When
    the Japanese attacked Pearl Harbor, the local newspaper, the Americus Times-Recorder, had a front-page headline and came
    out with an extra. People were shouting on the street corners, ''Extra, extra! The Japanese attacked Pearl Harbor!'' I
    felt personally attacked. I was living in a society that was totally segregated, with discrimination everywhere. I was
    hated, threatened by Klansmen, but when the Japanese attacked Pearl Harbor, I felt as though they had attacked me and
    my family personally. The next day I tried to volunteer for the Army. I was fourteen. My mother stopped it. She said no.
    So I could not get in. But as I approached sixteen, she finally decided I was going to get in the military one way or
    another, and I volunteered for the Navy. I did not know what I was volunteering for. I just wanted to get into the military.
    I would have been a Tuskegee Airman if they''d have taken me. Since I couldn''t be a Tuskegee Airman because my mother
    wouldn''t sign, I went to a recruiting station and said I wanted to join. They said there were two branches: Army and
    Navy. I had heard about the Army and seen them crawling under barbed wire getting shot at, and I said I didn''t want that.
    Let me have the other one. They said that was the Navy. I said I''ll take it. Then I was told there were two branches
    of the Navy: the seaman''s branch and the steward''s branch. I didn''t know anything about either. I just wanted to get
    in the military and get at those Japanese who attacked my home. The stewards took care of the captain''s quarters, did
    the cooking and cleaning. I said, ''Stop right there. I don''t care if the other one is shoveling horse manure. I am not
    joining the military to be anybody''s servant. I''ve had that.'' So I became a seaman.'
- speaker: Interviewer
  text: Let me take you back for a minute to this feeling you had after Pearl Harbor that you felt personally engaged by this
    war question despite living in a sharply racially segregated world. Any reflection on that sense of identification amidst
    such a difficult context?
- speaker: Respondent
  text: I equate that to the response of some slaves when they were told the Emancipation Proclamation had been signed and
    they were free. They said, 'Free to do what? This is the only home I've ever known. This is the only family I've ever
    known. Old master takes pretty good care of me. I'm not going to leave this freedom.' So as bad as segregation and discrimination
    were, it was the only home I knew. So yes, I was willing to take up arms to protect a society that would enslave me.
- speaker: Interviewer
  text: Tell me about any recollections of your time in the service that really stand out, maybe in a way that's racially
    inflected.
- speaker: Respondent
  text: I look back now and knew it was by design, though I did not recognize it initially. My company was the last all-black
    company to go into the United States Navy. There were seventy-five in my company, and not a single member had less than
    a high school education. That was unprecedented. I was sixteen years old and didn't know about the economic, cultural,
    or educational climate, but I learned later everyone in my company had at least a high school education. We were the most
    educated company in the United States Navy. We were a test. I don't know who orchestrated that test, whether the secretary
    of the Navy or someone else. We integrated a battalion, the first black company to integrate a battalion at Great Lakes
    Naval Training Center. We excelled because our parents instilled in us that we had to be better. You could not be just
    as good as whites; you had to be better. Everyone in my company excelled. After basic training, I was home on leave and
    had tonsillitis. Today you'd get a shot of penicillin and go back to work, but then the doctor came to see me at home.
    I had a high fever and sore throat. The doctor could have called the naval base to say I was not able to travel, but I
    stayed for two weeks. When I got back to Great Lakes, my company had shipped out and went into the Seabees, the construction
    workers. I was relieved and happy I missed my tour of duty. I was put on private duty and sent out to fight the Japanese
    anyway. I was put on a ship and made part of the Seventh Fleet under Admiral 'Bull' Halsey. We stopped in the Hawaiian
    Islands for a few days, then dropped me off in the Philippine Islands down in Leyte Gulf. I think they forgot about me.
    The war had just recently ended, but the word had not gotten out to all the remote islands. There were Japanese soldiers
    in the palm trees with a sack of rice and a gun, told to stay there and shoot everything that came near. There were still
    some found in those trees even a year after the war ended. Just before we got off the ship, the captain said there was
    a shortage of hospital corpsmen and anyone with any background in medicine should report to the deck. I had two years
    of pre-med and reported. He said I was going to hospital corps school.
