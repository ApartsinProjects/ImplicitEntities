collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: During 1964 I was in Chicago. We were meeting with support groups trying to get the Mississippi Freedom Democratic
    Party's challenge and support going because it was going to come before the Democratic Convention in Atlantic City in
    August. Then I went to Los Angeles. I went to Sacramento and met, worked up and down the coast with the governor about
    support. At that time it must have been Governor Brown. In fact, he had a U, was working for SNCC in Mississippi. So he
    was sort of linked in, whether he liked it or not, to it. And we met with some legislators and some state senators and
    representatives and delegates to the convention. So they went on record supporting the challenge and instructing their
    delegates to vote to unseat the Mississippi white Democrats. And I went up to Salem, Oregon and Seattle, Washington, the
    whole coast thing for the challenge. And I came back to Atlantic City from Los Angeles.
- speaker: Interviewer
  text: What happened in Atlantic City?
- speaker: Respondent
  text: Basically, I wasn't in on all that was going on in Atlantic City, but from talking to people who were right involved,
    like Bob Moses and others, the challenge that picked up a great deal of support, much more than people had expected it
    to in terms of the Democratic party bosses who sort of try to run the party, was that they were confronted with a real
    dilemma. How do you not alienate the South by expelling the Mississippi so-called Democrats? At the same time how do you
    make the Democratic party not look that bad in the eyes of black people. Knowing what I know now, I can see what was going
    on, but at that time I couldn't see all that. Now I know a great deal more about the country and I know a great deal more
    about politics. But at that time when a lot of that was going on, a lot of us didn't know all those ramifications. Joe
    Rauh was very interested mainly in some other jive like that and I think there would be some thing to get a compromise
    where I think two people would be seated on the floor and there were votes for the Mississippi Democrats and the white
    people. And there would be some votes for the Freedom Democrats. The MFDP people rejected that, which I think was appropriate
    and proper to do. Basically what happened, a lot of backroom stuff was going on and people trying to compromise.
- speaker: Interviewer
  text: What was your assessment of the effect that had on the attitudes of people in SNCC?
- speaker: Respondent
  text: Well, I don't know. I think that a large number of people in SNCC were pissed off, that's the first thing. Secondly,
    I think it helped them to better understand the nature of the Democratic party, and both parties in this country. The
    feeling of a more independent party direction that would have been laid if the Democratic party had accommodated it, I
    think people have been separating for that like the MFDP. They are now to some extent. If you check around the country
    now, and I know enough people who used to work for SNCC, you'll find a large number of us, if we're involved in the Democratic
    party, it's not really in the same sense. It's either to the left or people are involved in independent or reform politics.
    There are a lot of ex-SNCC people doing that. I think the challenge and the whole thing had a lot to do with them seeing
    what needed to be done. That's my view, anyway.
- speaker: Interviewer
  text: SNCC started out of the sit-in movement, and yet over a period of a year or two, it became political in the sense
    of getting involved in voter registration and moving in that direction. What can you remember about what was happening
    during that period, and how did that change come about? Who and what kind of influences led the organization in that direction?
- speaker: Respondent
  text: It was in early two conferences a year, I guess, in terms of large conferences. The Coordinating Committee itself,
    which was composed of twenty-five or thirty people from around the country, met at least once a month. I remember the
    meeting that I think had a lot to do with the direction. I was at the meeting held at a place called Mount Eagle, Tennessee,
    which was where Highlander Folk School was outside of Chattanooga. At that time Charles Jones and Chuck McDew, primarily,
    these are the ones I remember, had been in touch with Harry Belafonte and some people in New York, Bobby Kennedy, some
    other people and foundations who wanted to put some money into voter registration in the South. Then there was Diane Nash,
    Jim Bevel, and myself who probably were arguing against that position. We were arguing against getting involved in voter
    registration because we thought it was sort of a by-off or buy-out. At that point we were very suspect. I thought personally
    that voter registration was too passive. We had been doing a lot of nonviolent direct action kind of things. By that time
    most of the lunch counters in the South had been desegregated. That's where the big thrust was. There was some mopping
    up to do in the little towns and little places. As I recall there were still a lot of us that were interested in days,
    back and forth and back and forth. Until what finally came out of it was that Diane Nash was sort of the coordinator for
    direct action. Charlie Jones was the coordinator for voter registration kind of thing. It was like both things were going
    on at the same time. Those people who wanted to do direct action could go do that. Those who wanted to do voter registration
    could go get involved with that. That's when I think the whole thing started happening. Then Bob Moses went to Mississippi,
    Amite County and Sunflower County and other places up in the Delta with Amzie Moore and he said that we ought to be involved
    in Mississippi in voter registration. And that's how I think the thing started going. Some staff people went over to Mississippi
    and started working. There were some arrests and it got hot and heavy. So gradually the shift started moving in terms
    of the whole organization direct action in terms of sit-ins, it was still going on because as late as '63 I remember we
    went in Atlanta and we had a sit-in at the lunch counter. There was a whole big arrest thing and Dick Gregory was down
    there. We were having a conference and we sat in the streets and that kind of stuff. So, I think that's my analysis when
    it started happening. Then as we got involved with voter registration, it really became much more dangerous and much rougher
    than sitting in lunch counters. The organization tried to move in that direction. Plus they were moving in the area of
    trying to help people with economics in terms of cooperatives and stuff like that. That was being pushed too at that time.
    So I think that's how it started.
- speaker: Interviewer
  text: Now after the summer project in Zinn's book and in other books written about that there seems to have been a relapse.
    After the challenge failed, after many of the things happened, there was kind of a reassessment of everything. Now were
    you involved after that summer?
- speaker: Respondent
  text: Well, after that summer in September I went to New York. I was the director of the New York office, which was our
    largest fund raising office because during the summer that office raised almost $600,000 for the organization. I think
    we raised a little over a million dollars that year to operate on and run the organization. Donaldson was in out of New
    York, but I think he was in Atlanta, Virginia, he was all around, over the damn place. He was working in New York too,
    in terms of some fund raising; but he wasn't working directly in the New York office. I was working there, and we had
    about nine or ten other full-time staff people working. I met Ivanhoe, he was all over the place.
- speaker: Interviewer
  text: What seemed to be the changes in policy during that period?
- speaker: Respondent
  text: Well, part of what was happening was that, that was right after the three people got killed, and a lot of the projects
    in the South, a number of the college students because they were brighter and because they had more understanding of what
    was going on, invariably moved to the front in terms of leadership. If you were to go back and examine the project city
    by city you would discover that generally speaking you had a black cat, a woman that was like the Project director, say
    Hattiesburg or Vicksburg or Greenwood or Greenville. But most of the work and most of the real decision and most of the
    push was with white people, with white students, and white people who had come down. So a number of us were very disturbed
    and concerned about that. So then after the summer I would say out of the thousand people that went down over a period
    of time, more than a thousand, but at any one time there were about a thousand people that we knew about plus about another
    two or three hundred just wandering around that nobody knew about that was all over the state. They were wandering everywhere.
    And it was good in terms of the visibility it put on the state and opened it up. But after the summer I would say about
    anywhere from one-third to fifty percent of these who had been there wanted to stay. And that created some problems for
    a number of reasons. Many of the people that wanted to stay were white women. And there was a lot of shit going on with
    that, that was upsetting some of the blacks in town because most of the white women were relating to the black men, so
    naturally most of the black women in the town got upset because all these black men for the first time I guess had an
    opportunity to relate to a white woman. There was a lot of harassment around it but basically as long as it was in the
    black community nobody did anything about it. White women could relate to black men and they could go walk on the streets
    together. The cops didn't like that but as long as you just stayed over there with the Negroes, fucking around downtown.
    So that caused some problems, so we were reassessing that, what it is we could do to... plus psychologically people were
    drained. That was a big push. All that summer there was a lot of voter registration stuff going on, killings, a lot of
    jailings, people getting beat, a lot of pressure was on, and the country was up. I think this was right before the '64
    Civil Rights Act, I guess that's when it was. So anyway, that was happening and King was over somewhere in Georgia or
    Alabama, I don't know where he was. It was just sort of a down time, down period. But the big problem was reassessing
    the role of white people, and the whole thing. The same thing was true with our staff. The SNCC staff had grown to about,
    at its peak during the summer I think we were paying either subsistence or something, almost 150 to 200 people. We had
    a big staff, people all over the country, everybody was working for SNCC. It was like a massive army. Those who didn't
    work ain't got paid for volunteers, you see. When we first started the SNCC staff was predominantly black, 95% black.
    I remember Bob Zellner and Dorothy Zellner were among our first, in fact we had what you call our white field secretary,
    they would go to white campuses in the South and try to deal with white people and black field secretaries would be dealing
    with blacks. So when we started, our staff was 95% and increasingly got to be 40% blacks until it got down to I think
    during the height of it in '64, I was looking at some of the names the other day, I would say it was about 50%, or maybe
    60% white. And so we were concerned about that too, and how it was you deal with the whole white black thing. And it caused
    some very serious problems. The problems manifested themselves I think then it looked like they were black and white problems,
    but they were really philosophical because we had some ferocious battles. They weren't physical, but ideological battles.
    In fact, we met in Atlanta at the end of the Summer Project in October or November where all the staff came together for
    a whole week and it was rough. It was either in Atlanta or Jackson. At that time we had what we called the structure and
    non-structure people. That is, there were some who said we need to tighten up the structure. We have some very definite
    lines of direction and lines of authority and responsibility, as well as some problematic thrusts because at that time
    people were just wandering all over. Some people were wandering in and out of the organization. Some worked, some didn't
    work, you know, that kind of thing. Then other people who said well we ought to do just what we want to do. Let's be free,
    and be this and be that. Most of the people who were saying let's not have much structure were white people, but it wasn't
    really white, it was like most of them were from the North. The Blacks who were supporters of that were from the North.
    Those Blacks who were from the South, like myself and others, basically opposed that position. So, we hassled it out,
    back and forth, back and forth. Those from the South were for the structure, for some type of direction, some type of
    discipline, that is if you worked for the organization, you ought to have some basic things you have to do. Because what
    happened, during the summer a lot of white people had brought into the organization a different kind of life style. They
    worked the day, half the day if they wanted to work. Drugs started to be introduced I think at that point, particularly
    a lot of marijuana, not hard drugs or anything like that. So the organization had a lot of vitality still. We could mobilize
    and move from Atlanta to Jackson in a day. We had cars coming from everywhere, people coming in. But things were moving
    in sort of a different little way, then they had been. So differences philosophically. We voted certain things that gave
    us structure. Jim Forman, Ivanhoe was involved in that, John Lewis, a whole bunch of people, I don't know their names
    now. Most of the black staff people were involved with what we called the structure people and the non-structure people.
    We had some very tough arguments. That was in '64, then the organization started moving on to some other things. I came
    here in '65, the head of the Washington office. I think it must have been April.
