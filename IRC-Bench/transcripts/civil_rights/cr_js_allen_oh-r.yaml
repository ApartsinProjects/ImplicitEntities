collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: Well, when they first come for meetings, whatever you call it, I reckon one person called it a project or something.
    Well anyway, when it first started we had mass meetings, meetings called mass meetings. We had them at some of the churches,
    not all of the churches because some of the people wouldn't let us go in their church. Turner's Chapel CME, Wesley's Chapel
    ME, Turner's Chapel AME. And we would just go every night to the meetings, you know, different ones would come in. Sometime
    it would be Martin Luther King, sometimes it would be some of our people around here like Mr. Jordan's father. I don't
    know what Mr. Jordan's father, all I know is Mr. Jordan, I don't know his first name.
- speaker: Interviewer
  text: David Jordan?
- speaker: Respondent
  text: Sometimes it would be somebody like him. Sometimes it would be somebody like Lawrence Guyot. He might speak sometimes.
    Also we had Hubert Humphrey come and Senator Diggs. We just had quite a few. Medgar Evers, he would come to the meetings.
- speaker: Interviewer
  text: What was he like, what was Medgar like?
- speaker: Respondent
  text: Medgar was an NAACP man.
- speaker: Interviewer
  text: Did you like him?
- speaker: Respondent
  text: Medgar Evers? Oh yes, we really liked him.
- speaker: Interviewer
  text: Why did people like him so much?
- speaker: Respondent
  text: Why did they like him? Well, one of the main reason they liked him was for what he stood for. The NAACP, you know,
    was always getting something that helped the colored people. Not only colored people, just to help people, poor people
    really. And so that was one of the main reasons why we liked Medgar Evers. I never had no close talk with him but we would
    see him at the meetings and he would speak there on different things.
- speaker: Interviewer
  text: Was he a good speaker?
- speaker: Respondent
  text: Yes, he was. He was real good. Well, the next thing the marching started. When the marching started the dogs started
    to bite. Reverend Tucker, he was pastor at Turner's Chapel the AME church, and they marched downtown--now I was at work
    that day so I don't know exactly where the dog bit him at but I know they had a dog up there and the dog did bite. And
    then that brought in more people from different parts, like Washington, Colorado, I can't think of that other place. We
    had a lot of students in here, I can't think of the name of that school, I had better not try to tell that. People would
    just come in. We had ministers, white ministers. We had a lot of white people come in from California, just different
    places. You know we all marched. We were marching around the courthouse one day and I was in the march. I have always
    been scared of dogs.
- speaker: Interviewer
  text: You were scared of dogs?
- speaker: Respondent
  text: I am still scared of dogs. But you know, whites, they would be looking at us, you know. And one man was sitting up
    in his truck and he had a dog in his truck and I said, "You reckon he is going to sick that dog on us?" And they said,
    "No, he isn't going to turn that dog loose." But I was really afraid of the dog, but he didn't turn the dog loose on me.
- speaker: Interviewer
  text: Was he a policeman or just someone in town?
- speaker: Respondent
  text: No, just somebody in town. Had one of those great big old dogs on the back of his truck. I guess he had him tied.
    I didn't know because I was too scared to try to see.
- speaker: Interviewer
  text: When you were marching do you remember who else was marching? Was there somebody leading the march? Did you march
    in those first marches?
- speaker: Respondent
  text: No, the first march was when Reverend Tucker got bit, those marches. That is when the dog, you know.
- speaker: Interviewer
  text: You said you were working then, where did you work?
- speaker: Respondent
  text: I was working different places. I worked for some Greenwood families.
- speaker: Interviewer
  text: In their houses?
- speaker: Respondent
  text: Yes. But after I marched they let me go because they really didn't want you marching. And I was also working at the
    Presbyterian kindergarten.
- speaker: Interviewer
  text: Presbyterian kindergarten?
- speaker: Respondent
  text: That was my main job, Presbyterian kindergarten.
- speaker: Interviewer
  text: Was that white children or black children?
- speaker: Respondent
  text: White. Well, they just let me go after the march, so they just didn't want you if you got in a march. Some of them
    didn't and some of them did. So that is one of the things that happened. And I had two boys stay with me a whole-- well
    I think it was three months-- the whole summer.
- speaker: Interviewer
  text: You had two people stay with you?
- speaker: Respondent
  text: Yes. Bill Hodges and Bob Masters. I think Bob's name was Robert. He was Robert Masters. But they both were from New
    York. I have a letter-- I guess I can find it. I don't know if I can or not. I should have got this stuff together before
    you come out here. But I had a letter here from Bill-- I don't think I am going to find it. And they stayed with us the
    whole summer and they would march, you know, around to different places, kind of sort of boycotting so they could try
    and see if they would hire some black people.
- speaker: Interviewer
  text: Were you married at that time?
- speaker: Respondent
  text: My husband was named Reverend Allen and at that time he had a barbershop over on Johnson Street.
- speaker: Interviewer
  text: He was a reverend?
- speaker: Respondent
  text: Yes. And when they were trying to get people to write their names on the piece of paper so they get them registered.
    He didn't have his own place, he rented the place.
- speaker: Interviewer
  text: The barber shop?
- speaker: Respondent
  text: Yeah. And somebody didn't like it and they threw a brick through there. And after they threw the brick the man he
    was renting from told him that he would have to go. Now you can read the letter--now I think I don't know that might not
    be-- I have got some more but I don't where they at. But that one I tried to keep because that one is from New Orleans
    ain't it.
- speaker: Interviewer
  text: Right, sure is. That is a nice letter.
- speaker: Respondent
  text: Let Steve see it I didn't show it to him.
- speaker: Interviewer
  text: Okay. Did your husband preach somewhere, was he pastor somewhere?
- speaker: Respondent
  text: Well, he had a church at one time but he didn't have one then. He was just a barber, he just cut hair. Of course he
    preached sometimes for different people but he didn't have.
- speaker: Interviewer
  text: Was he Methodist or Baptist?
- speaker: Respondent
  text: Baptist. He was Baptist.
- speaker: Interviewer
  text: When you decided to take on these two fellows for the summer. How did you decide to take on Bill and Bob Masters?
- speaker: Respondent
  text: Well, we went to a mass meeting and they were asking, telling that these children were coming to town and they were
    here to help us and they had to have a stay place. And they wanted to know who was afraid to take them and who wasn't
    afraid to take them home. So I took Bill and Bob. But I fed beaucoups of them. Bill and Bob would always brag and tell
    about my cooking. I cooked a cabbage, they just loved cabbage.
- speaker: Interviewer
  text: They loved the cabbage?
- speaker: Respondent
  text: Yes, chinamen and everything come and eat at my house. Yes sir, they had a big time eating. We would go to church
    together on Sunday.
- speaker: Interviewer
  text: Where were you going to church at that time?
- speaker: Respondent
  text: Well, sometimes we would go over to my church, my church is Baptist, but my children belong to the Methodist Church
    that Reverend Tucker had on Walthall Street, Turner's Chapel. We would go there quite a bit.
- speaker: Interviewer
  text: What kind of man was Reverend Tucker? Can you describe him for me? What was he like?
- speaker: Respondent
  text: Oh he was about Steve's build-- I don't know if he was quite heavy as Steve. Just a nice, fine-looking young he was
    young, he was a youngster.
- speaker: Interviewer
  text: Reverend Tucker was young?
- speaker: Respondent
  text: Oh yeah, he was, I believe he was somewhere in his thirties, he might have been in his middle thirties or close to
    it. I don't think he was older than that but he could have been, you know, but he didn't look it. He was a Methodist,
    Turner's Chapel.
- speaker: Interviewer
  text: Did you like him?
- speaker: Respondent
  text: Oh yes, everybody liked him. So we just--I don't know-- well they would put you in jail. They didn't put me in there.
    Now one day my daughter Ann and her friend, my friend's daughter, they arrested two of her boys, something like that.
    Sent them to the county farm.
- speaker: Interviewer
  text: What were their names?
- speaker: Respondent
  text: I believe it was Queen and Harris because Velma wasn't here.
- speaker: Interviewer
  text: What were their names?
- speaker: Respondent
  text: Queen and Harris. Now their last names was Brooks.
- speaker: Interviewer
  text: Oh Brooks, okay. My daughter was Juanita and their sister was Rebbecca. Juanita said-- I was at work that day but
    she said they told them to break up or else go to jail so she and Rebbecca they came on back home, you know, but Queen
    and Harris they just stayed on the picket line. They had an old black bus. We called it Black Annie. They would put you
    in it and take you on to the county farm or somewhere or the jail house. Bob said, he told me, when they arrested him.
    Bill would wear some of the pins, you know, they would have a different pin representing different things. And they said
    whenever they would arrest him they would take the pin off and stick him with it.
- speaker: Respondent
  text: Bob said when he was in there, when they started singing the freedom song, "I Won't Let Nobody Turn Me Around," they
    said the other ones that weren't in it said they would have knives and they would draw knives. Now that is what they told
    me. He told me, "I didn't know they put you in jail with knives." And I said, "They don't." And he said, "Yes, they do."
    I said, "How do you know?" And he said every time he started to sing they would draw knives on him.
- speaker: Respondent
  text: That old TV what you saw out there in the store room, we had it on the day they found the three boys where they buried
    them. Bill and Bob were-- I was cooking dinner-- and they was watching TV and when that announcement came on they called
    me, "Come here Mrs. Allen. They done found the boys. They found them in Philadelphia."
- speaker: Interviewer
  text: In the dam.
- speaker: Respondent
  text: Dug with one of those road diggers, you know. They was buried.
- speaker: Interviewer
  text: Do you remember Dick Gregory coming to town?
- speaker: Respondent
  text: My goodness I remember. Dick Gregory was on that march when Tucker got bit by that dog. Dick Gregory was there, sure
    was.
- speaker: Interviewer
  text: What did you think of him? Had you ever heard of him before?
- speaker: Respondent
  text: Oh no, I had never heard of Dick Gregory but I thought he was just wonderful.
- speaker: Interviewer
  text: Why? Why did you think he was so wonderful?
- speaker: Respondent
  text: He was so great, you know, so great. Bob Moses too. Did you know Bob Moses?
- speaker: Interviewer
  text: I have met Bob. Did you know Bob well?
- speaker: Respondent
  text: Yeah, I know Bob. Bob was here some few years ago visiting a girl that go along with my children named June Johnson.
    Do you know June?
- speaker: Interviewer
  text: I know of her, right? Did you see Bob when he was here?
- speaker: Respondent
  text: I went to see him, I went to see him. Stokley Carmichael.
- speaker: Interviewer
  text: What can you tell me about Bob, what do you remember about Bob?
- speaker: Respondent
  text: Well, I don't know, Bob was so quiet. He could make speeches and he could just tell about you need to be brave and
    stand up and be counted and don't be cowing down and things like that. Bob didn't do too much talking.
- speaker: Interviewer
  text: It seems that everybody I talk to really likes Bob?
- speaker: Respondent
  text: Bob was a fine person.
- speaker: Interviewer
  text: I am trying to find out what exactly about Bob people really liked.
- speaker: Respondent
  text: One thing about Bob, you know, Bob was so interested in the Movement and he knew how to handle it, knew about telling
    you how to do to try to keep out of so much danger. And then we had another boy called Dickie, I don't know what Dickie's
    name, I think Dickie's name was Frey. Do you know him?
- speaker: Interviewer
  text: Dick Frey. I know the name.
- speaker: Respondent
  text: Well, anytime poor Dickie was marching they would put in jail. Every time. I believe he stayed in jail more than he
    did on the picket line. James Moore-- you have met James Moore?
- speaker: Interviewer
  text: I have met James Moore.
- speaker: Respondent
  text: Yeah, he was marching and they turned the water hoses on him from the fire trucks, you know, and knocked him down.
    And it was cold, it wasn't hot, it was cold.
- speaker: Respondent
  text: And Lawrence Guyot do you know him? Willie Peacock?
- speaker: Interviewer
  text: Tell me about Willie Peacock? What do you know about Willie Peacock.
- speaker: Respondent
  text: Oh, he was a singer from back yonder. He sang all those songs. He has a beautiful voice. And he could sing, he would
    sing all those songs. We had one song, "We ain't going to let nobody, we are going to let no jail house, we ain't going
    to let no sheriff turn us around." You know, we just put all that stuff together. We would pat our hands and jump up and
    holler.
- speaker: Interviewer
  text: Do you know Sam Block?
- speaker: Respondent
  text: Oh yes, Sam Block. I think it was Sam Block, Willie Peacock, and I don't know if Bob Moses was in that or not. But--I
    didn't see that now-- but they were talking about they got in behind those boys. They tried to hem them up like they did
    James Chaney and Mickey Schwerner and them, over there on Maclaurin.
- speaker: Interviewer
  text: In the office there?
- speaker: Respondent
  text: No, they were in a house there somewhere doing whatever. That was before I even learned about them. You know, they
    were here getting things organized. That is what they were doing. Somebody tells me that those boys had to walk the tops
    of the houses to get out of the way. That is what I heard. Now I didn't see that, but I am just saying what they said.
    But I do know one night but somebody shot at Sam Block a
