source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Can you tell me about your work with the Southern Conference Educational Fund in North Carolina?
- speaker: Respondent
  text: I joined the staff of SCEF as its Field Organizer in late Summer, 1963. Jim Dombrowski asked that I be based near
    the Eastern Seaboard part of the South, and encouraged North Carolina. We moved into an all-Black neighborhood at Raleigh
    and set up shop. From there I traveled into various Southern places of civil rights significance, spoke in a few Yankee
    settings such as the annual meeting of United Negro College Fund up in New York, had - with Ella Baker as my fine colleague
    - a splendid "Western trip" into the Midwest and Southwest. A year later, I did a shorter solo run in the Mountain States.
    On the Virginia Southside, I spent a week assisting Moses Riddick in his successful run for a key Nansemond County office
    - against the Byrd Machine. I traveled to various arenas in the Deeper South. And then I got to Halifax County in the
    Northeastern Carolina Black-Belt, initially taken there by the intrepid Rev. A.I. Dunlap, who had been a major figure
    in the hard-fought 1963 movement at Danville, Virginia - well to the northwest.
- speaker: Interviewer
  text: What was the focus of your work in Halifax County and the Black Belt region?
- speaker: Respondent
  text: 'In very early 1964, I launched a major SCEF-sponsored project: cracking the rigidly segregated, thoroughly repressive,
    Klan-infested northeastern North Carolina Black Belt - containing some of the most poverty-stricken counties in the United
    States. This hard-core region had been isolated from the main currents of the Civil Rights Movement. Our SCEF Director
    - Jim Dombrowski - backed us to the hilt; as did the SCEF President, the Reverend Fred L. Shuttlesworth. Valuable support
    was provided by Ms. Ella J. Baker, a nationally known Black activist and Special Consultant to SCEF, who had herself grown
    up in that particular locale. The editor of the SCEF newspaper, The Southern Patriot, Ms. Anne Braden, provided valuable
    regional and national publicity for us. Up North, the SCEF fund-raiser, the Reverend William Howard Melish, was extremely
    helpful. We started with Halifax County. Opposition was tough and violent. With hard work - at one point I spoke to over
    120 community meetings in 90 days - boycotts, non-violent demonstrations, and litigation in Federal courts - and, in time,
    political leverage - we were increasingly successful. And then we moved across the Black Belt, county by county.'
- speaker: Interviewer
  text: Can you describe the impact of your organizing efforts in the Black Belt?
- speaker: Respondent
  text: Clyde Appleton led the singing at our large and historic Black Belt conference ("Civil Rights and Anti-Poverty") at
    Indian Woods Baptist in Bertie County, early March 1965, which drew about 1,050 people from 14 Black Belt counties - plus
    several from some outlying areas. Ella Baker was keynote speaker. Our organizing work area broadened greatly as we moved
    into adjoining counties. The region we covered was very wide, from Littleton in Halifax County to Windsor in Bertie County,
    about sixty miles straight, and from Severn in Northampton County to Enfield in Halifax County about thirty-five miles
    straight. We had a big impact on voter registration and political participation in the area.
- speaker: Interviewer
  text: What challenges did you face during this work?
- speaker: Respondent
  text: Opposition was tough and violent. We faced daily death threats, abuse, and the virulent hatred of local white people.
    The region was Klan-infested and thoroughly repressive. We had to use boycotts, non-violent demonstrations, and litigation
    in Federal courts to make progress. It was a hard fight on several fronts, but we had strong backing from SCEF leadership
    and national civil rights figures like Ella Baker.
- speaker: Interviewer
  text: How did local political figures respond to your movement?
- speaker: Respondent
  text: In late 1964, during our intense fight, I got a surprise telephone call from former State Senator Lunsford Crew, representing
    the state Democratic Party. He was from Roanoke Rapids in northern Halifax County. He wanted to do business directly with
    me, suggesting that if the Halifax Movement would agree to support the Democrats, especially at the state level, he could
    guarantee concessions from official leaders of Halifax County. I told him we didn't function that way and that he would
    have to come directly to a meeting of our about 36 County Chairmen. He accepted, and after a meeting where we presented
    a shopping list of demands including anti-Klan action, acceptance of surplus commodities, participation in the Food Stamp
    plan, desegregation, and minority hiring, he met our demands. We agreed to support the Democrats, and they won. The opposition
    honored the agreement we reached.
- speaker: Interviewer
  text: What was the significance of the voter registration efforts you helped organize?
- speaker: Respondent
  text: With our help, thousands of eastern North Carolina Blacks registered to vote for the first time since disenfranchisement
    in the late nineteenth century. In the 1980s, those voters helped send two Black men to the North Carolina Legislature.
    In 1992, they sent Eva Clayton, a Black woman, to Congress where she served for many years. Our voter registration drive
    was a key part of breaking the fierce Southern wall of resistance and setting the stage for the Voting Rights Act and
    the election of Black people to local, state, and federal legislative bodies.
- speaker: Interviewer
  text: Can you share any personal stories or reflections from your time working in the movement?
- speaker: Respondent
  text: I first saw John Salter on a 1963 television newscast being mercilessly pummeled by a group of white men during a
    Black student demonstration in Jackson, Mississippi. A few months later, he appeared in my rural, eastern North Carolina
    community, where we Black people were staging our own demonstrations. Originally from Flagstaff, Arizona and part-Indian,
    he was young, intense, smart and completely committed to social justice. Salter's civil rights record, his obvious sincerity,
    and his willingness to take on the local racists soon won over the most skeptical among us. For over a year, he worked
    in our community, facing daily death threats, abuse, and the virulent hatred of local white people. With his help, we
    initiated a countywide voter registration drive, and when local officials set up obstacles, he convinced a battery of
    topnotch lawyers to challenge the county board of elections in court. Our side won. John drove with us the morning six
    of our children, including my own six-year-old daughter, integrated the local white school. He found lawyers and financial
    support, and we successfully battled the school officials and politicians who tried to kill our movement by firing Black
    teachers. John Salter is remembered for his selfless leadership and courage and as a man deeply and passionately opposed
    to injustice.
