collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: What would you expect from Negro leadership - any impression of that?
- speaker: Respondent
  text: My name is James Cresswell. To me, a leader should be one who thinks of all humanity in such a way that he'd rather
    think that he is approved by everyone. Therefore I think in Mississippi that the Negro leaders are not up to par as they
    should be.
- speaker: Interviewer
  text: Would you want to be more specific about where they've failed here in your opinion?
- speaker: Respondent
  text: In my opinion, in the boycotting of different various supermarkets, I feel my personal belief is that I feel that
    Reverend L.T. Smith one of the local civil rights leaders is using his store as a place to gain profit for himself, without
    trying to benefit humanity, as I said before.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: My name is Alec Sanders. In respect to the question about Negro leadership, I think we need more leadership in the
    smaller communities, especially in the state of Mississippi, and in the areas of teaching and in religious leadership.
    I feel that we fail in these areas - small areas in the immediate community, where incidental education goes along with
    formal. In many cases, we find ourselves falling short after coming to college and seeing a broader perspective of life,
    as compared to our provincial areas. And to work in this area i.e. improved leadership in small communities is the place
    where we would really begin to solve the problem. To begin with - well, we - if you will permit me to use a trite expression
    - the leaders of tomorrow - are being made now. If we could get better religious leaders, teachers, principals, administrators
    and businessman in smaller areas, some improvements could perhaps be made and future leaders will be better prepared.
- speaker: Interviewer
  text: If anyone wants it, there it is.
- speaker: Respondent
  text: My name is Della Burt. First of all I would like to say that I expect a Negro leader to guard the mass with their
    best interest in mind, and also in the field of education. Because the Negro is struggling for his rights and so forth,
    I feel that we should have Negro leaders who will help us in the field of civil rights and education so we will be qualified
    at that time.
- speaker: Interviewer
  text: Well, Miss Burt, it is sometimes said that the mass as you call it, has been ahead of leadership. The leaders seem
    to have moved in and used the direction already manifested in the mass. The mass has not been passive in the recent years,
    waiting for leaders. They have provided the energy, and the leaders have stepped into a moment created by the mass unplanned
    for them - such as Montgomery. That is, no one planned Montgomery situation. Then leadership used it.
- speaker: Respondent
  text: Yes, I think that that is true too. But in this case, as in the Montgomery case, the mass undoubtedly was very strong,
    as there were leaders in the mass. And at this time the leaders really came out. It was a - the mass supported the leaders,
    and in this way the leaders came out to help guide the mass into what they had intended to do.
- speaker: Interviewer
  text: They emerged from a spontaneous action?
- speaker: Interviewer
  text: They didn't plan the action - they emerged from the action - just as out of the troubles here, which were spontaneous,
    I gather. The leadership might have emerged in this direction or that direction - of course, in a mass action always leadership
    does emerge. This was spontaneous. Who wants to talk?
- speaker: Respondent
  text: I am Jacqueline Sharpe, and I think that in your smaller cities in the South, where you need leadership, you find
    none. I mean, you find some, but it's not on the same basis that you find it in the larger cities, say, for instance,
    Jackson. You would find more leadership in Jackson than you would find in the smaller cities - my home town, for instance
    - Grenada, Mississippi. I think that our leaders need to make themselves known. I think that they are either afraid of
    losing their jobs or being outcasts or something. That we really need more leadership and - what in leadership I look
    for - people that I can look up to in cases of emergency, to confirm statements, to answer my questions and in general
    to always - there is always someone you can go to and know that you will receive some response, either pro or con.
- speaker: Interviewer
  text: Is this changing in the smaller places in Mississippi now? Is it changing?
- speaker: Respondent
  text: Well it's - within the last past five or six months I think that the Negro leadership is becoming more prevalent than
    it has been previously here.
- speaker: Interviewer
  text: What about the educational program for registration - has that had any marked effect?
- speaker: Respondent
  text: In your larger cities, yes, and in your smaller cities, I would say it's about the same.
- speaker: Interviewer
  text: You see no signs of leadership beginning to emerge in the smaller places?
- speaker: Respondent
  text: In my home town I've found that there has been none.
- speaker: Respondent
  text: Well, I find that the leadership is coming into the small communities from the outside. Now, we have had for a long
    time, people in a given community who were willing to say house or feed leaders who would come from the outside, and they
    themselves, not having the educational level that is needed, the intellectual insights into the key problems, having had
    no real formal education in these things and no understanding of really what's going on - the workings of them - that
    they would foster a program in helping others to carry on the work that they should be prepared to do themselves, and
    in this way I think that in cities and towns like Grenada, Greenwood, etc., - the leadership is coming from the outside
    and trying to train leadership within the communities.
- speaker: Interviewer
  text: Did that happen?
- speaker: Interviewer
  text: What is your home town?
- speaker: Interviewer
  text: By the way, speaking of Greenwood, since I've been there - some years ago - people of Greenwood, what do you make
    - any of you - of the mistrial - how do you interpret it?
- speaker: Respondent
  text: This is my interpretation -
- speaker: Interviewer
  text: Let's have it.
- speaker: Respondent
  text: At first, there was a great bit of anxiety on my part, going through the trial - the daily trial - and I'd expected
    a clear verdict, not guilty. And to have this sort of opinion coming finally out of the trial, was a little encouraging
    to me. And perhaps at the next trial he will get a not guilty verdict, but this was -
- speaker: Interviewer
  text: Do you think this was rigged?
- speaker: Respondent
  text: Yes - I would like to think so. It's -
- speaker: Interviewer
  text: I mean, if it really was rigged merely for the purpose of seeming to the outside world -
- speaker: Respondent
  text: It went so smoothly - and to have the prosecuting attorney say that he had not received threatening phone calls -
    everything had gone so smoothly - and this would seem to indicate a very good legal and public front maneuver.
- speaker: Respondent
  text: There's so much happening that you can't find logical reasoning for it - really, you can just about say anything about
    it, because you really don't know.
- speaker: Interviewer
  text: No, we don't know.
- speaker: Respondent
  text: And you can form your own opinion about it because so much is undercover that was going on.
- speaker: Respondent
  text: And I think that I was greatly embarrassed by the gross immorality of a key figure, coming up and shaking a man's
    hand who was on trial.
- speaker: Interviewer
  text: Yes - it is rather strange, isn't it.
- speaker: Respondent
  text: Yes - that's immoral, to me.
- speaker: Interviewer
  text: Unusual in a courtroom, anyway.
- speaker: Respondent
  text: To have the high priest come in and -
- speaker: Respondent
  text: I think, too, on occasions before the trial, he has had opportunities to write or get letters, just through the outside
    - through the news media here - many of the editorials and the local papers have mentioned favorable comments for this
    man, which gives rise to a suspicion in the execution of his case. Of course, as many others here, I thought that it would
    be a flat not guilty verdict, and of course there were other possibilities, such as being decided mentally incompetent
    or temporary insanity. All of these things can come into your mind, but never had I suspected a hung jury.
- speaker: Interviewer
  text: Let's assume, just for the moment, that it was rigged, that it was planned and acted out as a little drama - what
    would that imply? That hasn't been the case in the past, has it?
- speaker: Respondent
  text: Well, I would like to think of why.
- speaker: Interviewer
  text: Let's assume that it was rigged - then what is the meaning of that side?
- speaker: Respondent
  text: It means that our system of justice will have to be revamped, especially on this level.
- speaker: Interviewer
  text: Well, why would they take the trouble to rig it? They have never tried to rig in the past - never bothered to rig
    it in the past.
- speaker: Respondent
  text: You must remember that Mississippi is very much so - much more than we have seen within the last few years, and to
    have this case, with the tension and the pressures that are now coming to bear, and to not sort of appease a certain community,
    you see, would give rise to numerous demonstrations that they have not had before.
- speaker: Interviewer
  text: You mentioned appeasement - what would the local community or part of the local community, the Mississippi community,
    or the outside world in this case?
- speaker: Interviewer
  text: Both. That is, there is a part of the Mississippi community to be appeased - is it just the Negro community or part
    of the white community too - that needs appeasement that way - any of you?
- speaker: Respondent
  text: Let's look at it this way - certain things that they would do, let us say, with the - a few weeks ago - last week,
    I believe, they sent one hundred thousand five hundred dollars - something like that - to Washington - to defeat this
    bill, and a few days ago the mayor was on TV asking for additional funds to build additional compounds to hold the prisoners
    that they are expecting during the summer months I'm sure. All of these things are pointing toward a rise in. Of course,
    to me, to send a hundred thousand dollars away when you need it at home, and you're asking the legislature to give you
    more money -
- speaker: Interviewer
  text: We need it at home to build more compounds with.
- speaker: Interviewer
  text: Well, where were we when we knocked off on the other - back to the trial, I guess. Let me try this statement on you,
    to see how you respond to it. James Baldwin said in his last book that the Southern mob which we find Little Rock a few
    years ago or in New Orleans more recently, does not represent the will of the Southern white majority. This is said by
    many people - some deny it. What do you think about it?
- speaker: Respondent
  text: Well, I would not venture to say no or yes to the question. However, from living in the South I find that in many
    cases each one individual is afraid of the other. They're holding onto a dead past, and if I forsake this past my neighbor
    is going to ridicule me, and this is the sort of thing has been expressed in massive actions, not so much because of the
    individual convictions, I think, but more because of outside forces. This is being manifested I think a little bit more
    in the South as - you know, we have two parties in our last election, which is a thing that never happened in Mississippi,
    not in recent years.
- speaker: Interviewer
  text: You think, then, that there is some possibility of that being true - that the actual cutting edge of segregation does
    not represent the will of the majority?
- speaker: Respondent
  text: I dare say yes.
- speaker: Interviewer
  text: It does not - that intimidation and conflict of loyalties of various kinds prevents any resistance to segregation,
    is that it?
- speaker: Respondent
  text: Yes, this is what I am saying.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: Me? Well, I don't - as you say, this cutting edge, well, it's just like the majority - I don't think it represents
    the majority - that's the impression that they want the outside to get, I think.
- speaker: Interviewer
  text: They want to act as though they were - present the idea that they are the will of the majority but you think they
    are not really?
- speaker: Interviewer
  text: Well, what prevents the majority, then, from exerting some sort of pressure? Do you agree with our last speaker?
- speaker: Respondent
  text: Yes - if I do, what will they think of me? And if I don't, it's just their personal convictions. I think the thing
    is a dead limb that they pass back and forth - everybody - they're either - they're going on with the program or don't
    say anything.
- speaker: Respondent
  text: I tend to go along with the editorial about three years ago in Ebony Magazine where the white majority was discussed
    and pointed out that there are many people who didn't agree with the bombings, the lynchings, and the harassment of Negroes,
    but because of the well organized forces of certain groups, such as the Sovereignty Commission or the Citizens Council,
    and the sort of police state in which you live, you find yourself, that people are just afraid to speak out and that as
    they weigh the cost of speaking out over and against their personal losses, they say, well, I have more to lose than,
    say, a Negro would if he spoke out, you see.
- speaker: Respondent
  text: Well, in this case I think the silent majority - those people who are - sit back and watch these things going on and
    do not side openly with the Negro, it's just as bad as looking at somebody being murdered and don't try to stop them when
    you can help them. And I feel that the silent majority is just as guilty as those people who openly speak out against
    the Negro and their dislike for the Negro. It's something like silence is consent. But I feel the newspapers - the Southern
    newspapers - play this up big. I think they - they're for the purpose of selling and know
