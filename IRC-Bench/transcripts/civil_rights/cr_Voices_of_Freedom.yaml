turns:
- speaker: Respondent
  text: 'He was read down that day. Shortly after the visit with Kennedy, Pohon E walked in, sitting in his office, and he
    was like everybody at that time: Kennedy and all of us concerned about the poor and what was happening to civil rights
    and the Commies. I''m not selling away from it; about what we were going to do next. And I told him that Bobby Kennedy
    said he ought to bring the poor people to Washington. And as simply as Bobby Kennedy had said it, King instinctively felt
    that was right and treated me as if I was an emissary of grace here, or something that brought him some light. Out of
    that, the Poor People''s Campaign was born.'
- speaker: Respondent
  text: Wull Rutherford, a black Chicago native and skilled public relations man who had spent much of his adult life abroad,
    had organized the Friends of SCLC in Europe in 1966. In the summer of 1962, King appointed him executive director of SCLC.
- speaker: Respondent
  text: The staff was really quite busy and quite involved in things when Dr. King looked up and in his reasoning—I'm paraphrasing,
    of course—he said, 'Fine, we now have the right to vote. Fine. We can go into any restaurant, any hotel, any place we
    want to in America, but we don't have the means. So what good does it do for people to go to any restaurant in the world
    if you don't have the money to pay for a meal?' So, he says, we've got to attack the whole issue of poverty and economic
    deprivation. And that was his thinking, his reasoning for pushing for a Poor People's Campaign. It becomes obvious when
    this has to impact on people that have been fighting to get people registered and into polling places, people who have
    been fighting to get education, people who have been fighting for the right to go into public accommodations, the idea
    of attacking something as vast and as amorphous as poverty, of course, was not appealing. So I'd say that basically almost
    no one on the staff thought that the next priority, the next major movement, should be focused on poor people or the question
    of poverty in America.
- speaker: Respondent
  text: Andrew Young was by this time executive vice president of SCLC.
- speaker: Respondent
  text: SCLC was always a battle of egos. We were like a team of wild horses. Each one had very strong opinions and their
    own ideas about the way the movement should go, and Dr. King encouraged that. And our meetings were loud and raucous,
    and he sat quietly by until we fought issues out, and then he would usually decide. James Bevel wanted to keep us in northern
    cities in a movement to end slums. Hosea Williams felt as though we should stay in the South and do voter registration.
    Jesse Jackson was beginning to develop Operation Breadbasket, which was an attempt to organize nonviolently to get jobs.
    I was probably more inclined to stay south, because people forget that SCLC at that time had a budget of less than a million
    dollars.
- speaker: Respondent
  text: SCLC board member Marian Logan also was not enthusiastic.
- speaker: Respondent
  text: When I first heard about it, I was really very apprehensive. I thought that as it began to develop, as I heard about
    how it was developing, it was becoming much too big and unwieldy for us to be able to handle. And also, considering the
    tenor of the times, I wasn't sure that we could be a success. I wasn't sure that Congress, and the powers that be in Washington,
    D.C., would be welcoming—'cause it wasn't like '63, which was such a glorious march, and glorious day. This bringing of
    poor people to the seat of government was like throwing it in their faces, and I don't think too many of the officialdom
    of Washington was gonna take that with any great grace. So I had many reservations about it.
- speaker: Respondent
  text: In early December, King announced, without specifics, SCLC's intention to bring poor people of all races to Washington
    around April and to 'stay until America responds.' Plans remained to be formulated.
- speaker: Respondent
  text: People who necessarily had been attuned to the problems of the black poor in America at that time. Someone has to
    have someone to lift the window. After the young people left at the end of the summer of '64, the problems were still
    there. They were different. Things were changing. We had begun to make a difference. But there was so much suffering that
    remained to be alleviated. So one was trying to find new ways to capture the imagination and attention of the American
    public. Therefore, I went to see if I could get the senators to see that it was still bad, and indeed was getting worse
    in many ways, and that hunger was growing, even though we had the right to vote. The cost of that for many is that they
    got kicked off the plantations and lost that little bit of money, and as it was, that they had had to survive. And so
    we had to put another means in place.
- speaker: Respondent
  text: I told the committee, please come and see for yourselves, because they didn't quite believe me when I talked about
    how the conditions of life, the poverty, was getting worse and the people really didn't have enough to eat in Mississippi.
    So they came, and Bobby Kennedy came with them, and while they were there to examine the impact of the poverty program
    on Mississippi blacks and whites, I used it as an opportunity to tell them about growing hunger in the Delta. And they
    were shocked and, happily, one or two of the senators agreed to stay over and to go up in the Delta to see for themselves
    whether it was true that people were starving. Bobby Kennedy agreed to be one of those senators.
- speaker: Respondent
  text: I was very moved by what Bobby Kennedy did when we went to visit a black family in Cleveland, Mississippi. Without
    cameras because he was Bobby Kennedy, some newspapermen had come along. We went inside a very dark and dank shack. It
    was very filthy and very poor, and when we walked through from front to back together, there was in the kitchen a mother
    who was scrubbing in a tub, washing clothes. There was a child sitting on a dirt floor. And there was very little light
    there, and he put down on his knees and he tried to talk to the child and get a response from the child. He kept poking
    or feeling the child and living to get some response. And I remember watching him in near tears, because I had this complicated
    feeling. I was moved by it and wondering whether I would have gotten down on that dirty floor. But deeply respectful that
    he did. He could do almost anything after that and I trusted him from that time on, past as a human being. And then he
    went out to the backyard where the reporters were waiting. And he was correctly angry. But from that moment on, I knew
    that somehow he would be a major force in trying to deal with hunger in Mississippi for children.
- speaker: Respondent
  text: Later that summer, after watching President Johnson announce the government's military response to the civil disorders
    in Detroit, Robert Kennedy told an aide, 'We're over. The president is just not going to do anything more. That's it.
    He's through with domestic problems, with the cities. He's not going to do anything. And he's the only man who can.'
- speaker: Respondent
  text: In August, with urban uprisings still sweeping through America's inner cities, Marian Wright visited Kennedy at his
    Virginia home, Hickory Hill, on her way back to Mississippi.
- speaker: Respondent
  text: 'It was a gorgeous day and he was lounging out around the pool at Hickory Hill, and we went through our usual small
    chat about what was going on. And when I was leaving, he had also told me I was going to stop back through Atlanta and
    see Dr. King. He said, ''Tell him to bring the poor people to Washington.'' That it''s time for some visible expression
    of concern for the poor. I had been expressing to him my frustration that hunger was still going on, and obviously he
    was still frustrated that the Agriculture Department was so slow in doing something about it or the Johnson administration
    was hesitant to move, so he thought that there really needed to be some push, some national visible push. But it was a
    very simple suggestion: Tell Dr. King to bring the people to Washington.'
- speaker: Respondent
  text: This was a period of white reaction and backlash. It was a period when the war was becoming a much more divisive force,
    where the problems of black and poor people were being left behind and people thought they were annoyances, and we'd had
    a lot of violence in northern cities. And Martin King was really depressed. One of the things I always remembered about
    him from my early student days was how he was able to share his uncertainties, share his not knowing what to do next.
    I remember his Founders' Day speech when I was a senior at Spelman College, when he talked about taking that one step
    even if you can't see the whole way and how you just have to keep moving, even if...
- speaker: Respondent
  text: From nonviolence, so he was being attacked for being in support of the strikers. King recognized the chance to link
    the movement of a Dun rt Foo ul pamby. Not willing to really fight back. Not willing to use force against racism. On the
    other hand, he was being attacked by Lyndon Johnson, and even by the Hubert Humphrey liberals, for going too far to the
    left; for being in the midst of the movement, for taking part in the April 1967 demonstration at the war in New York.
    And I had the feeling that his sense was that the number of people who really supported him now had really sunk very much.
- speaker: Respondent
  text: Within that context, we then talked about the Poor People's Campaign. In a sense, the Poor People's Campaign was certainly
    a repudiation by Dr. King of his opposition to the war, but it was an attempt to then go back and refocus on basics, and
    perhaps more important, to mobilize a mass movement.
- speaker: Respondent
  text: The state of preparation for the poor people's march was very hectic.
