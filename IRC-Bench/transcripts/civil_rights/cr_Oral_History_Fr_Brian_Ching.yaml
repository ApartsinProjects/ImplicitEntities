turns:
- speaker: Interviewer
  text: And Father Brian, where do you live?
- speaker: Respondent
  text: So, I currently reside at Pangborn Hall, which is part of the broader community of priests and brothers of Holy Cross
    at Notre Dame.
- speaker: Interviewer
  text: OK great, and could you describe a little bit about your life before the pandemic?
- speaker: Respondent
  text: Sure. Prior to the pandemic, I was the rector of the Basilica of the Sacred Heart. I was actually living at Old College
    Undergraduate Seminary, which is a household formation for undergraduate men here on the Notre Dame's campus. So life
    was pretty normal, full college life, you know. We had ten guys in the house doing their things doing, you know, we had
    a full football season right before the pandemic, so navigating that. This is my first year is rector, so it's just sort
    of trying to come to understand the fullness of everything that goes on in the Basilica in the course of a normal year.
    And then of course, our men in formation were just trucking right along with their usual classes, and common prayer, or
    common table, all those sort of things.
- speaker: Interviewer
  text: Can I ask you to say a little bit more about that role as rector? So does that mean you're - my understanding is that
    it means you're responsible for all the programming that happens? They're basically in charge of what happens at the basilica,
    is that accurate?
- speaker: Respondent
  text: Yes. So as rector of the Basilica, you're responsible for the overall kind of vision, as well as providing schedule,
    and kind of feel - vibe might be good word of the liturgical experience of the Basilica, as well as maintenance requests
    and projects, like keeping the floors clean, making sure the windows stay in their places. A whole gambit of things. Obviously
    there's a great staff. But the rector exercises oversight over the Basilica in that matter.
- speaker: Interviewer
  text: And Father Brian, when you first learned about COVID-19, what were your initial thoughts and some early experiences?
- speaker: Respondent
  text: Sure. I think we first learned about COVID in about January of 2020, and there was still kind of an over there sort
    of thing. And those realities had happened before. I mean, I at least have lived through each one - H1N1, and a lien flu,
    and there have been Ebola Africa. So there's certainly been outbreaks of significant disease in other parts of the world
    that have made news here in the United States, but never really impacted our lives in the same way. And I think that those
    very initial first weeks, we kinda assume that this would be just another one of those things. You know, a pandemic or
    an endemic that would hit a particular region and hit it hard. Certainly, a source of great concern and angst, but at
    the same time, something that is still a little bit foreign, or would've stayed little bit foreign to our experience.
    That being said, I was actually in London on a business trip when the whole world sort of came to grinding halt. So, I
    was a seminarian studying at the seminary in the archdiocese of Westminster, London, itself. It was the spring break here
    in at Notre Dame, so I went to visit him and literally I think two days into that trip, was when we got called up the
    universe was going to shut down, that all the study abroad students were being recalled. It was convenient in that I was
    able to take the seminarian back with me, so I wasn't traveling alone and a little bit of like frequent flyers helped
    make that trip home much easier. And that's I think the first moment where we really sort of realized this was gonna be
    a very significant, monumental occurrence kind of like fleeing the UK. The concern was you're gonna get stuck there and
    the orders gonna get shot and all those sorts of things. So, we're trying to, like, exit United Kingdom in 24 hours.
- speaker: Interviewer
  text: Wow. Well, and then how did your life change in the early pandemic with your various communities that you're part
    of? You know, spiritually?
- speaker: Respondent
  text: Sure. We became a lot more like hermits, I certainly did. All of the seminarians went and stayed home, so they did
    not come back from spring break. But because I've been in Europe, I was in quarantine, like one of the first ones for
    14 days right after coming back. And in an empty house, and it was, you know, people were kind enough to drop off food
    and things like that, so we became just a lot more individualized. You know, so much for us and our life at Holy Cross,
    so much of our life is communal. Going to prayer together, and eating together, and all of a sudden, we were doing all
    of those things alone. And especially for both those first few couple weeks you figured, sort of bread and bear it to
    get through it and at some point, it'll all come back to normal again. And I think that was like the attitude. I mean,
    phrases like "two weeks to stop the spread down, we'll get through it together", and at some point it became clear that
    was not to be the case. And that led to some longer term thinking about how we were going to live our religious life as
    best we could, but in a manner that was safe and conscious of everyone's health and well-being.
- speaker: Interviewer
  text: And how did you make some of those early decisions?
- speaker: Respondent
  text: So those were not entirely mine, those are part of our overall religious Community. So obviously, with respect to
    the Basilica, but the primary one was that we suspended all in-person masses. That was a significant shift, I mean, the
    outbreak of the pandemic was the second or third week of lent. So we were really gearing up for Easter, and so we suspended
    in-person mass. We kind of moved to having things livestreamed. Thanks be to God the mass of the Basilica on Sundays have
    been televised for like 15 years, so it was a convenient shift there, it's a relatively easy shift to live-stream our
    masses. And so all we have is an empty church with maybe 20-25 of the Holy Cross religious, who are here on campus. We
    can figure that we constituted a particular household. But, you know, we spread out six feet a part. Luckily the Basilica
    is a large space, and we were able to kind of spread everyone throughout the church. We did Easter that way, we did holy
    Thursday and Good Friday that way. I think we allowed a couple of folks from the campus ministry staff to come in, and
    do things like sing and the readings. So that was a market shift that our liturgical life, which is so much focused on
    kind of nursing others, to a really big move strictly to online format. And then our common life, we prayed together in
    common, again very, very spread out six feet a part. We did things like, you know, up until that point, we just have a
    stack of prayer books, and you would just pick one up and walk into the chapel and use it. And all of a sudden everyone
    got assigned their prayer work. Everyone got assigned to a hymnal. And now looking back on some of those things seemed
    a little bit ludicrous, now given what we knew, that's how the way we encountered those moments. So there's like just
    a very odd sort of trying to make this work, you know. Our common table went to a much larger space. I think we took over
    a common space here on campus, we sat 3 to a table. It's just, it's hard to have a conversation every day. But just like
    it makes choosing your seatmates very important. And you know, I think Notre Dame food services was great, but all the
    food came in kind of pre-packaged. The kitchen staff would kind of like set it out and leave, and we would come in and
    pick them up, and sort of eat out of these plastic containers. Famously, everyone was using plastic utensils for those
    first four or five months, which was entertaining and frustrating all at the same time. I think everyone went through
    4-5 knives or forks for dinner just because, you know, that's what they had. The food was interesting, you know, it was
    clear that we were the only group of people eating on campus on a regular basis. So like whatever was in storage is what
    we got fed, so we had some pretty nice meals. Clearly there are some pretty nice events that on the books and being planned
    that they had ordered food for. But yeah, that was sort of an adjusted reality. We were used to sitting down and having
    a family style meal with 6-7-8 to a table, and now it's sort of three and pre-packaged, spread a part, and that was hard.
    It was especially hard for some of our older men, for whom this feels like massively traumatic stuff.
- speaker: Interviewer
  text: How did it feel for you?
- speaker: Respondent
  text: You know, it was for what it was me. Not ideal, not great, but at the same time, just grateful to be able to have
    a supportive group of people around, you know. Any number of my friends who had graduated and were still sort of living
    in the professional world, and were kind of on their own and stuck in their own apartments, and kind of had to exist their
    entire lives through Zoom, and phone calls, and texts. So at least I was able to see other people each day, you know,
    that was really a great blessing. Go out for a walk, or go out for a walk with friends even. You know, so there was a
    glimmer of hope there, that even in the midst of a lot of different life, just immense gratitude that we still had those
    basic structures of common prayer and common table, and just communal life. Though different, we're at least existing,
    so there's a deep breath here for that.
- speaker: Interviewer
  text: And what was the biggest challenge for you in 2020?
- speaker: Respondent
  text: Sure, I mean so there are a lot of practical, logistical challenges. I had, you know, eight kids worth of stuff in
    the house, and they were all home and, you know, they're trying to figure out how to get that back home to them. A significant
    challenge was tending to our students' needs, my students' needs. At the college seminary, their life was very, very different.
    They're used to living in very tight and cramped quarters, and that creates a sense of community and kind of stuck togetherness
    that they were just not experiencing. So they were, you know, we tried our best to sort of get together via Zoom once
    week, or something along those lines, but kind of helping them encounter the pandemic in a healthy way. It was a big challenge,
    you know, you could only have so many of those conversations online. You could only do so many of those things via Zoom.
    And you know, they were certainly not in great shape. It's hard for them to go from the college experience, back home
    to mom and dad, and all of a sudden like family dynamics row back in play, and the independence you once knew and loved
    does not bear anymore, not only because of the pandemic, because your parents are your parents and all those sorts of
    things. There's just a lot of care that needed to happen that was just very hard to find.
- speaker: Interviewer
  text: And regarding communication in the early pandemic, you spoke to this a little bit already, but is there anything else
    you'd like to say about that? Like, how did the early pandemic and the lockdown affect your communication with your work,
    with family members, with friends?
- speaker: Respondent
  text: You know, there are a couple of different things. There's like a scale of my families from New York City. I don't
    get back very often, so my communication with them had been primarily via you know, phone calling, text message, for 14
    years now. So that did not look all that different, you know, and my parents who have recently retired, but really just
    their life during the pandemic really did not look much different from their life prior to the pandemic, because their
    just enjoying life as kind of retired homebodies. And that was the repose, and I'm grateful to them, grateful that they
    had already been in that mode and so that didn't look all that different. Seminarians. with colleagues, that was a very
    different reality. Luckily, Zoom had been an existing thing. I think part of being in the academic world was that we had
    already used technologies like Skype, and Zoom, and video conferencing, so it was a less dramatic switch to using those
    technologies in a more substantive way. So lots of e-mail, lots of phone calls, or a lot Zoom meetings. I'm just trying
    to figure out what those technologies could do, and then what those technologies couldn't do, in terms of like the pastoral
    care of someone. Just being in someone's presence and being a listening ear, like that looks very different on the screen
    and than it does in person. Trying to make those adjustments on the fly, it was a little bit challenging but we got there
    in the end.
- speaker: Interviewer
  text: And in 2020, what were your responses to some of South Bend's policies and practices on quarantining, and masking,
    and then eventually the vaccine rollout?
- speaker: Respondent
  text: Sure. You know, it's funny. We were sort of in an isolated reality here on campus, and a lot of ways the campus reality
    was even stricter than some of the South Bend reality at times, you know. And a side from a couple of daring trips to
    the supermarket, we yeah, we kind of kept the campus pretty tightly. So the benefit of living on campus was that - I should
    say, the downside of living on campus would be my encounter with a broader South Bend community was not as kind of intense,
    or as strong. So now certainly friends or colleagues who lived in South Bend, I heard about a lot of those things from
    them. But my ability to sort of witness those was a little bit mitigated. That being said, I think South Bend seemed to
    do relatively well in the end as a whole, seemed to do you know, there was at least somewhat consistent messaging regarding
    masks, vaccination, and quarantine. There were certainly gripes and grumbling because they're not fun, or convenient.
    For the outright hostility that was witnessed some places was relatively, at least in my experience, relatively muted.
    Everyone was, especially in those early months, was sort of in the more "let's just stick together to get through this"
    kind of mindset mentality, you know. That certainly changed in the walls as time went on. I think people just got tired
    of some of those things, and those inconveniences became to take a significantly heavier toll, as they kind of prolonged
    themselves. But especially those first few months, yeah it was relatively kind of a positive expe
