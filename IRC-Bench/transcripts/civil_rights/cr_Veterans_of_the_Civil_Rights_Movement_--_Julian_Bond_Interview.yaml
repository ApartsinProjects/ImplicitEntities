collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: I was wondering when that moment was for you?
- speaker: Respondent
  text: I don't know if this is the first moment of racial consciousness, but I remember this moment. I can't remember how
    old I was, but probably four or five. I had been some place on the train with my mother, and we were walking through the
    Nashville train station. We were walking through the white section of the Nashville train station, and a man, a policeman,
    came up to my mother and said, "Niggers aren't allowed here." She said, "Are you calling me a nigger?" I don't know if
    it was because she was very fair skinned and might have been white, although she didn't appear white to me, or if it was
    her manner with the policeman. He was just taken aback. He didn't say anything else, and we just kept on going. That was
    the first memory I have of there being some category of people I belonged to. Before then, I thought I was just a boy.
    But after that, I knew that I belonged to this category, and there was something connected with it. So that's my first
    memory.
- speaker: Interviewer
  text: Do you remember much about your time in Nashville?
- speaker: Respondent
  text: Well I never lived in Nashville. My mother was from Nashville, and so we spent a lot of time there because her mother
    and her grandmother lived there, grandparents lived there. So we spent a lot of time there in the summers. It was kids
    stuff. I remember going to Bible school, which I hated. My grandmother had been married to a man who was a florist, fairly
    well-to-do. So they had a big house with a big lawn, big yard, and a goldfish pond shaped like a figure eight. I remember
    being crazy about that. The place was big enough so they had a guy hired to mow the lawn. He was always finding marbles,
    and he would give me the marbles. So I remember that. That's the, those are the only - Yeah, I do. Also, my step - I can't
    remember the relationship with this man, I think he was my godfather - was a druggist and he owned a drugstore. He would
    let the employees make all these fabulous concoctions. Super sundaes with all kinds of chocolate syrup and ice cream.
    Price's Drugstore. So I remember that.
- speaker: Interviewer
  text: Where did you live before Pennsylvania?
- speaker: Respondent
  text: For the first five years of my life, I lived at Fort Valley, Georgia, which is a small town near Macon. It is the
    home of Fort Valley State College. My father was the president of the college. So I grew up there. Spent the first five
    years there.
- speaker: Interviewer
  text: You mentioned Bible school. Did you grow up going to church?
- speaker: Respondent
  text: Yes, but I don't have any memories of it. I don't think I cared for it particularly. The idea of sitting still for
    an hour or more and having some guy say something to you, and then people got up and sang songs, which I didn't know or
    didn't understand. I didn't enjoy the experience. When we moved to Pennsylvania when I was five, my father was also the
    president of the college, and we lived next door to the church. We had to go to church. [Laughter] He was the president.
    People expected him to go to church. So I remember going there, and I also remember not liking it. Just not caring for
    it. Dressing up, confinement. I was not a bad kid, but I just couldn't sit still for an hour. I didn't like it.
- speaker: Interviewer
  text: I know your father was a prominent educator. I was wondering how your childhood differed or how that influenced your
    childhood, made it different?
- speaker: Respondent
  text: Well, what it meant was that in this small world of the college campus, my father was the most important person. He
    was the president. He was in charge. So everybody worked for him. I didn't get the sense that I was therefore important,
    but I knew he was important. I knew that other people deferred to him in this little world, this small world. Very much
    like American University. A campus not much bigger than American University's campus. But it also meant that I had this
    world as my playground. This was a men's college when I was there; it's co-ed now. But I had the run of the gym. I had
    the run of the dormitories in the summertime when the students were gone. I was in and out of the rooms. I could play
    with the stuff they left behind when they went away for the summer. They just took their clothes and books, and everything
    else was trashed and left behind. There was a barbershop on the campus where I got my hair cut. It was growing up in this
    self-contained world where you were protected from all of the outside world. It was as if you lived only at American University
    and never went to Washington. It's this closed world, and a very pleasant world because everybody's nice, everybody's
    friendly. Not very many other children. The family lived next door - the man was the dean, and he had two daughters -
    one older, one my age. There was another dean who had three children - an older daughter, a son my age, and a younger
    son. There were kids in the village nearby, but it was far enough away so that I went to school with them, but they weren't
    playmates. They were too far away to be playmates. So I had a fairly small circle of playmates. Probably just enough to
    field one baseball team. We didn't have anybody we could play against.
- speaker: Respondent
  text: Not many playmates but I had, I think, a normal childhood. I played games. I played cowboys. I played in the snow.
    I did all those things.
- speaker: Interviewer
  text: There weren't as many playmates but with the ones that were there you just did things. So your house was right on
    campus?
- speaker: Respondent
  text: Yes, it was the biggest house on campus. It was the president's house.
- speaker: Interviewer
  text: Also I remember when your mother came and spoke to class. She was talking about all the figures that she met that
    came through the campus. I was wondering what ones you met?
- speaker: Respondent
  text: Well, you have to remember that at that time, almost every prominent black person who made speeches or went around
    would come to a place like Lincoln University. They wouldn't go to the University of Pennsylvania or Penn State. Nobody
    would invite them there. So they came to Lincoln. They came to black colleges. Lincoln was one of the most prominent.
    So I saw Walter White, who was head of the NAACP. I saw Paul Robeson, the great singer. I have picture of me sitting on
    his knee while he sings to me. Earlier when we lived at Fort Valley, I have a picture of myself with Dr. DuBois. So sort
    of a "who's who" in black America came by this campus. Singers, civil rights figures, prominent personalities, almost
    anybody and everybody came to Lincoln University. I said we lived next door to the church. The church had both an auditorium
    and a regular church, you know a regular - .
- speaker: Respondent
  text: Sanctuary. Yes, that's what they called it. Sanctuary. These people would speak either in the auditorium or in the
    sanctuary. It was just great because it was like living entertainment at least once a month, maybe once a week on Friday
    or Saturday nights right next door to your house. So you got dressed up - and I didn't mind that. I went over next door,
    and Paul Robeson would sing to you. Then after it was over, there would be a reception at our house. I'd run around, get
    in my mother's way with my brother and sister. So it was fabulous.
- speaker: Interviewer
  text: Are there any ones you remember in particular, that stand out in your memory?
- speaker: Respondent
  text: Well, I remember Robeson, probably because I have this picture to remind me. The picture is I'm sitting on his lap,
    and my sister and the young woman from next door are standing behind us. He's singing a song. It was called "Four Insurgent
    Generals." It's a Russian folk song. He had this deep voice, and that voice vibrated through me. I can remember that he's
    singing in my ear while the picture is being taken. It's a fabulous experience. I can remember that. I don't remember
    these other people. I remember when Walter White came. Walter White was the head of the NAACP for many, many years, and
    he was extremely fair skinned. He looked white. But I knew he was a black guy. When he pulled up to our house, he was
    in a big, black shiny car escorted by two Pennsylvania state troopers on motorcycles with big leather boots. I thought,
    boy, this is an important guy. This guy's really something. So that was impressive to me as a kid. Other figures came
    through, but I don't remember their names.
- speaker: Interviewer
  text: What effect did this have on your life, all these famous figures?
- speaker: Respondent
  text: Well, I think it opened me up to a world outside of this narrow, campus world. Of course, living in my parents' house,
    my father and mother were educated, sophisticated people. They opened my world up far beyond the normal world of, I think,
    a black kid growing up in the '40s and '50s. But being on this campus opened my world up and exposed me to people and
    to things and events, all kinds of things that I never would've seen. Albert Einstein. I met Albert Einstein. I have no
    memory of this, but my parents told me about it. So I've come to remember it.
- speaker: Interviewer
  text: Then you went to a Quaker School. A little bit in Pennsylvania. I was wondering how that influenced your views of
    that school? I know the Quakers are pacifists.
- speaker: Respondent
  text: Yes, well the first thing to remember is that I was living in a community where they had one-room schools. They were
    segregated when we got there. Black school on this side of the street, white school on this side of the street. My parents
    filed a lawsuit. They closed this school, and all the black kids come over here. So I went to one-room schools until I
    went to high school. Before I went to high school, I never went to a school with an indoor toilet. I went to schools with
    outhouses. The local high school was, I think it was called, the Lower Oxford Township Consolidated High School. It just
    couldn't have been a very good school. Small, Pennsylvania town, just couldn't have been a very good school. So my parents
    wanted me to get a better education. So they had already sent my sister, who is older, to a prep school in Massachusetts.
    I don't know if it was I didn't want to go so far away, or what it was, but anyway, they chose this school near Philadelphia
    called the George School, a co-ed Quaker school, and I went to school there. It was a wonderful school. It was far superior
    to the kind of education I could've gotten at a public school. It was small. It was intimate. It was a Quaker school,
    and it exposed me to Quakerism and to nonviolence in a way that never would've happened had I gone to a public school.
    So it gave me an early introduction into nonviolence. Now I have to say I never thought that I could use this in any way,
    never clicked in my mind. But when the civil rights movement came along, years later, I had this foundation that most
    of my colleagues didn't have.
- speaker: Interviewer
  text: Are you a pacifist?
- speaker: Respondent
  text: I was then. I thought I was then. But not now. But I thought I was then. Because when the movement began and the sit-ins
    began and all of us embraced the idea of nonviolence at the demonstration, most of us also embraced the idea of nonviolence
    in our daily lives. So for a number of years, I thought of myself as a pacifist. As I say, I don't now. It's not really
    something I had big intellectual thoughts about. But it seemed tremendously attractive to me at the time. So yeah, I was
    a pacifist then.
- speaker: Interviewer
  text: Getting back to your youth, I was wondering if you have memories of when your father filed the school desegregation
    suit?
- speaker: Respondent
  text: No. No. I would've been five years old. No, I don't. I have learned a little bit about it now. What happened is he
    filed the suit. Before the suit could come to trial, the school board knew that they couldn't sustain this legally, and
    so they just capitulated. They just gave in.
- speaker: Interviewer
  text: Did you experience discrimination when you were in Pennsylvania?
- speaker: Respondent
  text: No. I never went to the all-black school. It closed before I entered the first grade. I never had any problems with
    any of my classmates or schoolmates or the teachers. I was just a happy-go-lucky kid going along. As I say, I lived in
    this little protected world, almost never went out of it except to go to the nearby town of Oxford, which was segregated.
    I can remember while I was living in Lincoln, that some Lincoln students went to the movies in Oxford and sat downstairs
    instead of sitting up in the Jim Crow gallery. There was a big to-do. I don't think they were arrested, but it was a big
    to-do. The movie integrated. But it caused a lot of tension between the town and the school as there always is tension
    between town and gown. Always those people up there, those people up here. I remember somebody shot at our house. I was
    sitting on our front porch - this house had a big wrap-around porch - with my sister and my brother and my cousins who
    had come to spend some time with us in the summer. We heard this [loud clap] and then [smacked fist with his hand] another
    noise right away. Somebody shot and hit one of the columns of the porch. I don't think we realized at the time what the
    potential danger was. It could've been us. It could've killed us. But we just [were like], "Whoa, what was that?" and
    later just saw this bullet hole.
- speaker: Interviewer
  text: Do you know what the shooting was a result of?
- speaker: Respondent
  text: I think it was connected to this tension between the school - here you have this school of 400 black men in the middle
    of this rural county in Pennsylvania, forty-five miles from Philly. At the time, that was an hour and a half away - and
    the community, much less sophisticated than the school, so tremendous tension between the two. So it probably was related
    to just that tension, that feeling of tension there even though the school had been there for a long, long time.
