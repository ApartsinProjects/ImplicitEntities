collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: When and where were you born?
- speaker: Respondent
  text: I was born in the Bronx, New York, on July 14, 1933.
- speaker: Interviewer
  text: When and where have you attended school?
- speaker: Respondent
  text: Well, I attended school in the Bronx until the eighth grade, when my family moved to Asbury Park, New Jersey. I went
    to high school there, and after that I went to Douglass College. Then I completed my education up till that point.
- speaker: Interviewer
  text: And where is Douglass College?
- speaker: Respondent
  text: It's in New Brunswick, New Jersey, near where I live now.
- speaker: Interviewer
  text: What did you study?
- speaker: Respondent
  text: I was an English major.
- speaker: Interviewer
  text: So, your undergraduate degree was a B.A. in English?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: And did you later acquire advanced degrees?
- speaker: Respondent
  text: Oh, yes. Later, I acquired an M.A. in English education from Hunter College of the City University of New York, and
    then still later, I earned a doctorate in English and American literature at New York University.
- speaker: Interviewer
  text: Let me just ask you a little bit about your parents. And, I guess, the reason that I find out about people's parents,
    especially in regard to the civil rights movement, is I'm always curious if people had to step outside the support of
    family in order to be involved in civil rights. Some people do. Some people get a lot of support from their families.
    And I think it's of historical importance, you know, to look back at great things people have done and see if they had
    to have enough courage to really be, you know, in, I guess, opposition to their family support. So, I'd like to know who
    were your parents, and what did your mother and father do as you were growing up?
- speaker: Respondent
  text: My father was August Adickes. And, my mother was Edythe Oberschlake Adickes, both of them children of German immigrants
    except my mother's mother had been born here. But they were from a much larger community of German-Americans, German-born
    people in New York City that has been completely dispersed except maybe for small sections in Brooklyn and part of the
    Bronx. And then, there used to be, I think that's also gone, too, a community in Yorkville, Manhattan, but I think all
    those communities have died out. And Germans have, you know, just dispersed. They are not a significant population in
    New York any longer. I was an adult. I wasn't a student when I participated, so that I had been on my own for quite some
    time, and the decision was not made in--. I didn't consult my parents when I made the decision. I think my mother was
    somewhat more in favor than my father. Neither of them expressed opposition, I think, knowing that it was probably pointless.
    But I think my mother, who was generally the more socially concerned parent, my mother understood and was sympathetic.
    Concerned for me, but understood why I was participating in it. My father didn't say much, but he certainly didn't express
    support, but he didn't express opposition.
- speaker: Interviewer
  text: So, he was, maybe, value neutral about it.
- speaker: Interviewer
  text: Do you have any siblings?
- speaker: Respondent
  text: Yes, I have a sister. It's her birthday today, in fact. She's two years and three months younger than I am.
- speaker: Interviewer
  text: Happy birthday to your sister. Would you mind just telling us--?
- speaker: Respondent
  text: Joanne Adickes Walker.
- speaker: Interviewer
  text: All right. And, how old were you when you participated in Freedom Summer 1964?
- speaker: Respondent
  text: I was thirty-one.
- speaker: Interviewer
  text: Thirty-one. You had been teaching a while, and I think I'm correct in remembering that you had taught in Harlem.
- speaker: Respondent
  text: That's right. I was teaching.
- speaker: Interviewer
  text: How did you reach that decision to--? See, that seems a little unusual to me that you would do that. It seems like,
    maybe, you were already thinking in terms of being of service in education.
- speaker: Respondent
  text: 'Well, teaching in Harlem was simply: that''s where the job was; that''s where I went. But I certainly became aware
    of the situation of my students in New York City. And the civil rights movement was not active. I would say to my students,
    for example, "Well, why don''t you think about going to City College?" That was a branch of City University, and at the
    time, there was no tuition charge. They could have gone to college free, because for about 137 years that was a tradition.
    The first branch of City University was City College; later there was Hunter. And later there were others. And until nineteen
    sixty--I''m not sure when it stopped: 1968 or 1970--there was no tuition. You could go to college free. And that''s why,
    I mean, Supreme Court justices, there are so many significant academics and achievers in this society who got their degrees
    at City College, for example. And City College is right in Harlem, but they had no models. There was nothing. I could
    not influence them. They would have to hear that from a black person who had gone to City College and said, "Hey, why
    don''t you go?" Later, they did. Later, there was open enrollment, and students from the schools came in, but they came
    in underprepared. And not having come from homes where there was the leisure to support an intellectual life, they were
    not able to deal with the challenges in many cases, and of course, that provided a backlash. And now of course, there
    is no longer open enrollment. There are efforts to cut back on all the remedial programs that were established to bring
    these students up to speed in their skills. That struggle is still going on. Now, it''s being headed by a Puerto Rican
    member of the Board of Regents of City University in New York which is somewhat ironic, certainly, in the eyes of many
    of the students involved. So, that struggle is still going on. Tuition is charged. It''s still a bargain, but that was
    such a great beacon. You know, there was the torch of the Statue of Liberty, and then, there was City College and Hunter
    College and City University, where you could go and study and get a degree and lead a different life.'
- speaker: Interviewer
  text: You might have to work part-time to support yourself, but you didn't have the burden--.
- speaker: Respondent
  text: Most of them did. Most of the students did work, but still, I mean, they had car fare; they had living expenses; they
    had books to buy. But that you get your tuition, that you didn't have to pay tuition. I think that's a terrible loss,
    and a terrible social loss.
- speaker: Interviewer
  text: You refer to open enrollment. I don't know what that is.
- speaker: Respondent
  text: That is the situation that enabled any graduate of a New York City high school to go into college. Now, maybe not
    a senior college, a four-year college, but they could go into a two-year college.
- speaker: Interviewer
  text: So, it didn't depend on their grade-point average?
- speaker: Respondent
  text: On their grade-point average, yes.
- speaker: Interviewer
  text: Or their score on a standardized test like the ACT or the SAT?
- speaker: Respondent
  text: Yeah. Right.
- speaker: Interviewer
  text: That was a great opportunity. I wish that were true in every state in the United States today.
- speaker: Respondent
  text: Well, it used to be. I mean the land grant colleges, that was what they were designed for. Of course, originally,
    they were designed to educate farmers to be better farmers and women to be teachers, but that was a tradition. That's
    why state universities are still way below the costs of private institutions.
- speaker: Interviewer
  text: Right. So, what year did you begin teaching?
- speaker: Respondent
  text: Nineteen sixty.
- speaker: Interviewer
  text: Were you right out of college?
- speaker: Respondent
  text: No. No, I had been out a number of years doing other kinds of work.
- speaker: Interviewer
  text: What did you do in those intervening years?
- speaker: Respondent
  text: 'Oh, I was a secretary mostly, in those years. I graduated at a time when there were "help wanted, male" and "help
    wanted, female" jobs. There was clear--. I mean, discrimination was legal, and I remember in college, my senior year,
    I went into New York City with a close friend who is now an outstanding Shakespeare scholar, and we went looking for jobs,
    and we went into one employment agency and blithely, when they said--. We filled out these applications, you know: "Can
    you type?" Well, hardly, you know. What, thirty words per minute or something like that. And, can you take shorthand?
    And the owner or manager of this agency followed us into the hall, screaming at us, "You liberal arts majors are all alike!
    You think you can get a job without knowing how to type and take shorthand! Well, you''re crazy!" And, I found, you know,
    when I did get out in the working world, well, there was very little I could do. And it was really depressing. And finally,
    teaching--. I didn''t want to be a teacher. Teaching was the only thing that made sense because unless you had a mentor
    or someone who could get you--. Someone you were connected to, a family friend who could get you a decent job, there was
    very little you could do. It was really very tough.'
- speaker: Interviewer
  text: That was nineteen six--?
- speaker: Respondent
  text: Well, this was in the late fifties. And 1960. Well, it was still the same in the sixties, you know, in the early sixties,
    when I went into teaching. And it certainly didn't seem like a waste of time. I realized what I was doing meant something
    to other people.
- speaker: Respondent
  text: And I liked it. I got to like it. I wasn't very good at first, but I got to like it and care about my students.
- speaker: Interviewer
  text: OK. So, you had worked as a secretary, and that was frustrating. And so you thought about teaching and did teaching,
    went where the job was, and got concerned about your African-American students and the opportunities for them.
- speaker: Respondent
  text: Yeah, and there were some things going on in New York at the time. I mean, all this, my eyes were opened to it. You
