collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Respondent
  text: Well, I think of course, we organized it in 1960. It came into being in the fall of 1960. The initial meeting in April
    of '60 and then subsequent monthly meetings throughout the summer. One of its first concerns was to work with the people
    who were in the black belt area. This was predicated upon the concept that there was a need to develop indigenous leadership.
- speaker: Respondent
  text: Whereas in the initial stages the overall pattern of sit-in protest, there was before 1961 quite a discussion going
    on about a dual thrust. In fact, there was a possibility that there would be two different groups. One that would emphasize
    direct non-violent action and the other that would engage itself in voter registration.
- speaker: Respondent
  text: One of the early thrusts in that direction stems from some direct contact with persons who had been thinking along
    the lines of political organizing, one of which was Tim Jenkins who at that time was serving the NSA as its national civil
    rights director, national activities. And he had been a party to a discussion with some old people in Virginia about the
    question of registration and the vote.
- speaker: Respondent
  text: He began to pool around him persons like Chuck McDew, Charles Sherrod, and Charles Jones and they began a series of
    discussions with persons outside the South. One for many was Harry Belafonte, and then as part of the protest, these fellows
    on several occasions were at the Department of Justice.
- speaker: Respondent
  text: They asked questions about some aspects of discrimination and I think their first meeting or subsequent meetings with
    Bobby Kennedy who was then the attorney general. They tried to sell them on the idea of voter registration as being the
    salvation and this generated a good deal of resistance in SNCC because it had full of the earmarks of an implementable
    concern on the part of the Kennedy forces who were sure of getting voting strength in the South by having Negroes register
    to vote.
- speaker: Respondent
  text: It was more that than their concern for breaking down the barriers of discrimination. I think this indicates something
    of their earlier stages. However, I think it also ought to be borne in mind that when the issue was posed as to whether
    the group should go into voter registration or continue direct nonviolent action, there were those, especially Charles
    Sherrod, who felt that you couldn't possibly engage in community organizing in the deep black belt areas without eventually
    running into the problem with the law.
- speaker: Respondent
  text: And if you went into political education you'd still run into problems with the law and you'd still have to have mass
    action, demonstration. So I think that the realities of the situation demonstrated to the young people that there was
    no need for a great division between voter registration and mass direct action.
- speaker: Respondent
  text: When they first thought of getting into Mississippi in the summer of 1960, Bob Moses was in Atlanta. Apparently he
    had made an agreement with people of New York representatives of SCLC to go down and do volunteer work. But when he arrived,
    no one in SCLC had made any plans for him.
- speaker: Respondent
  text: I was serving then as the executive director of SCLC on my way out and so he and I struck up a relationship with James
    Forman who was serving as the secretary of SNCC that summer and out of this he had some opportunity to learn a bit more
    about the South because I had certain experiences over a long period of years.
- speaker: Respondent
  text: And because there was a fall plan for the conference of SNCC. One of the desires was to reach the Negro youngsters
    in Mississippi, Louisiana, and Alabama. And so he undertook a trip part of which was to Mississippi and he was put in
    touch with a person like Amzie Moore.
- speaker: Respondent
  text: Amzie Moore who had been talking since, as far as I know, since 1950 something this whole big concept, the need for
    organizing political action in the Delta seemed to have inspired Mr. Moses and he decided to go back to Mississippi in
    summer of '61.
- speaker: Respondent
  text: He was committed apparently to teach the winter of '60-'61, but in the summer of '61 he came back and went into Mississippi,
    went to McComb, Mississippi and this was the beginning of the efforts. He was followed by other young people, John Hardy
    who was perhaps as a result of an attack on him by a registrar was the basis of the first real suit on the Mississippi
    registrar and some of the other kids like Charles Jones went down to McComb.
- speaker: Respondent
  text: And as you perhaps have heard the McComb story, this developed into a program of voting resistance and the need for
    a national telephone line. Bob stayed there. Others went to Southwest Georgia. And the pattern for voter registration
    and political education which was one of interests which Chuck McDew should be credited with emphasized this from the
    beginning.
- speaker: Respondent
  text: He indicated he was not just interested in organizing people to register to vote, he was interested in organizing
    for political action.
- speaker: Interviewer
  text: Shall we go into the...?
- speaker: Respondent
  text: '[inaudible]'
- speaker: Interviewer
  text: Well, you weren't involved in... you say in '64 was...?
- speaker: Respondent
  text: Jan. '64 no, I wasn't, you see, I never was based in Mississippi. I was called in frequently in workshops, consultations
    etc. but I was not based there.
- speaker: Respondent
  text: And in the organization, the concept of organizing the MFDP or organizing the Freedom Vote really emanated from SNCC
    at regular monthly meetings or periodic meetings because while Bob first got into Mississippi for political action there
    were others who believed the idea they called 'Move on Mississippi'.
- speaker: Respondent
  text: This was a massive movement. They had set up headquarters in Jackson, Mississippi. Diane Nash at the time, John, Jim
    Bevel and Paul Brooks and I think Bernard Lafayette all had in mind a pushing at the nonviolent, direct action.
- speaker: Respondent
  text: So with these two forces already to function in Mississippi you had a great deal of discussion about SNCC and the
    progress from 1961 with the first efforts which were made in the fall. Bob's continuing staying in Mississippi, helping
    out I think with such things as a political campaign which was on a normal level with Rev. R. L. Smith I believe, in Jackson.
- speaker: Respondent
  text: And this spread from one thing to another and then there was the freedom vote that was held in '63. So personally
    I wasn't there. I was set to go in but the way it was, the exchange of discussion with the young people and of course
    their relationship with the people in Mississippi, perhaps you can divine that one of the major emphasis of SNCC from
    the beginning was that of working with indigenous people, not working for them but trying to develop the capacity for
    leadership.
- speaker: Respondent
  text: And they had a lot to do with decisions that were made prior to the formation of anything like the FOP or Freedom
    Fund. Well I don't think you can really pinpoint in that way because I think there are youngsters who came into SNCC at
    that point who were people who were dedicated to the concept of the rights of others.
- speaker: Respondent
  text: And whereas maybe they may have picked up the phrase of indigenous leadership from something I can't say, I would
    not disclaim, I think that there is very little that is original in human expressions and it's true that all my life my
    concern has been that the most important things should be the development of people to take care of themselves, you see,
    I never believed in the strong leader.
- speaker: Respondent
  text: Because the strong leader exalts and produces a weak following so that I think, so if I had any influence I think
    it lodges in the direction of the leadership concept that I believe in namely that leadership shouldn't be centered, it
    should instead of having what you call a leader centered group you have a group centered leadership. Now do you get the
    difference?
- speaker: Respondent
  text: That the major concern is that of the group and instead of trying to develop a symbolic leader you try to make all
    the difference possible in the group so that you can develop leadership in the group.
- speaker: Interviewer
  text: The spring of '64 you were working here in New York for SCEP?
- speaker: Interviewer
  text: There was one question I wanted to ask before you go on. You mentioned Kennedy and I wonder did he follow up at all
    to help the voter registration and besides?
- speaker: Respondent
  text: Well, from what I understand, he was instrumental in persuading certain groups in New York that they could contribute.
- speaker: Interviewer
  text: That it was legitimate?
- speaker: Respondent
  text: Yes, it was legitimate.
- speaker: Interviewer
  text: In what way?
- speaker: Respondent
  text: No, not just a question of contributing to SNCC. There was an organization formed, something called the Leadership
    Conference, what was it called, this fellow Steven Curley who just got killed a few days ago, he and some others had begun
    a series of meetings with heads, personally of the NAACP, the Urban League, the SCLC, SNCC etc.
- speaker: Respondent
  text: This came about to a large extent I think because in the initial stages of the Mississippi front, especially in 1962
    and '63 Bob Moses and Dave Dennis of COFO had conceived of the plan of trying to develop a sort of united front.
- speaker: Respondent
  text: And they were trying to do this because to involve such as the local NAACP and to avoid the usual wrangle of who gets
    the money. They proposed an umbrella organization which was called COFO and out of the COFO concept and you see there
    were a number of conferences.
- speaker: Respondent
  text: I think I went with Bob once to talk to someone in the NAACP but there was correspondence with the top level of the
    NAACP and with other persons and so in the process and of course, Kennedy was interested in developing all the possible
    political support he could in the South.
- speaker: Respondent
  text: And so in the process I'm sure he used his influence on such persons as heads of foundations or monied people which
    gave them the right to make this kind of contribution. As you know, tax exempt basis anything that contributes to political
    action is not so easily exempted.
- speaker: Respondent
  text: I think that is the possible answer. As far as I'm concerned, I know that's about all the help he gave. I've heard
    that he helped in persuading these people, this could happen and I do know that the speed with which it happened was greater
    than the usual speed that you get in applications for exemption.
- speaker: Interviewer
  text: And the other two things I wanted to ask, you talked a few minutes ago about, you said that SNCC realized after McComb
    the need for national help and I wondered you just talk about it, how they conceived of mobilizing the nation and also
    the second thing, that, which I guess was part of the reason for bringing in the whites for the freedom vote.
- speaker: Interviewer
  text: And maybe you can talk about the problem of the freedom vote. I know there is a lot of discussion about whether to
    bring in whites and all that stuff, way back you know and if you could talk about those two things.
- speaker: Respondent
  text: Well, as far as the national help, the national help of course, the first efforts were in the direction of financial
    help because there was need for money and where else can you get it except outside of the South. That holds true even
    now.
- speaker: Respondent
  text: And of course, I think there is another factor here that has to be considered, namely the degree to which people were
    sort of romantically or otherwise attracted to what was happening to the South.
- speaker: Respondent
  text: I think you could never underestimate the fact that up until say from the late 30s until then you had had primarily
    a silent generation. People who had not been accustomed to protest. People who had not voiced their opinion. They had
    been under the impact of the McCarthy period.
- speaker: Respondent
  text: And when these Negro students began to submit themselves to all kinds of physical violence, intimidation and the things
    spread as it did with such rapidity, it became a sort of a magnet for the rest of the country.
- speaker: Respondent
  text: So it wasn't just a question of developing a national support it was also a question of providing opportunities for
    that drive on the part of young people and others who had social vision, especially to the North and the West, to help
    with something.
- speaker: Respondent
  text: So that was the first stage. Now as far as the whites getting involved, there were some few white students involved
    from the beginning.
- speaker: Respondent
  text: As you know, one of the outstanding, if you don't know you can find it by looking it up, one of the most outstanding
    student stir in efforts to Nashville, Tennessee, and I think all the... I believe that was his name, he was one of the
    first who was badly beaten and he was white.
- speaker: Respondent
  text: And there were several other whites who had participated in different sit-in demonstrations and so what you had then
    was all right in the pattern of involvement and a higher degree of desire for involvement.
- speaker: Respondent
  text: And so in '63 when the idea of the freedom ballot was conceived in Mississippi, in fact before that time even, you
    had white students from the North and other parts of the country seeking an affiliation with SNCC, so they were there.
- speaker: Respondent
  text: And when Mississippi began to have reaction to Mississippi, you had people coming in and I think he had some interest
    in being involved in different levels, and he involved some students attracted people out in Berkeley, I believe it was
    Berkeley, so it wasn't a question of our staying calm.
- speaker: Respondent
  text: At that stage it was a question of absorbing people to what we thought we could absorb. That was in '63.
- speaker: Interviewer
  text: There is a question here that talked about takeover and reorganize people, they just couldn't, it was physically impossible.
- speaker: Respondent
  text: Well, the first, I am sure this was true because they did not have the experience. I am sure, and also it had something
    to do with the fact that those who were already organizers or project directors had some concern about the extent which
    they would relinquish their roles.
- speaker: Respondent
  text: And I understand that in the November '63 election that they did have some trouble about whites taking over but this
    I can understand too.
