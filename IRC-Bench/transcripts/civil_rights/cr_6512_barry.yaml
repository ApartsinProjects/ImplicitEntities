collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: Marton, how do you think the decision to protest politics in 1961 was made?
- speaker: Respondent
  text: Well, I think there were a number of factors involved. Number one, I don't think any of us had any idea that this
    would be called protest politics. In SNCC in 1961, some of the Freedom Rides were going on in Mississippi, and a number
    of us were involved in the freedom rides, some on the rides and some organizing the rides at various places. And I was
    in Jackson and others organizing local Mississippians on the ride. Parallel to that, you have to remember these things
    had been along a time, the fact that Bob Moses, in the spring of '61, had gone to Mississippi and traveled around the
    state and talked to people like Allie Mone and Curtis Bryant in McComb. I'm not sure he talked to Steptoe first, he might
    have, but he talked to Curtis, then probably went over to Amite County and talked to Steptoe.
- speaker: Respondent
  text: So there were two things going on, the freedom rides, which were a little later in the spring and early into the summer,
    and Bob's feeling or trying to get something going in McComb, Mississippi. Now, it's also parallel with the fact that
    in terms of SNCC, we were moving from one kind of group to another, as we were moving from a basically college coordinating
    group, student coordinating group, to the full-time workers who were working. Before the spring, there were no workers
    at all, well, we had one girl, Janice Pemares, I guess, who worked at that time, maybe Ed King, no Ed King wasn't working
    by then. So you had about three or four things going in the summer, and in August there was a big debate between a lot
    of people in SNCC, particularly Bob, Chuck, Charlie Jones, Tom Jenkins, Ella Baker, Diane Nash, myself, Charles Gerard,
    and a few other people.
- speaker: Respondent
  text: The way the thing filled up at that time was that if you read actually you can get a lot of this from Diane Nash's
    book, from other books, he talks a little bit about that summer, he doesn't go into as much detail as to what happened
    in the larger sense, but generally he covers that. There was a debate between those of us, and I was on the other side
    at that time, who voted not to get involved in voter registration because we thought this was an attempt by the administration
    to kill direct action movements. At least I thought that anyway, and others that you had talked to later. Charlie Jones,
    I guess, and Tim Jenkins were probably the biggest pushers of the other side of getting involved in voter registration.
    Diane and myself were on the other side about direct action. This went on for three or four days, very intense debates
    and discussions.
- speaker: Respondent
  text: So I guess what was finally decided was that the two would be on—direct action would go on, and voter registration
    working out. I think that it's very unlikely from my point of view that anybody had any idea about what would come out
    of voter registration work in terms of the kind of organizational that finally came out of it. It really was an attempt
    to use voter registration as an organizing method. And the course was uncharted and unclear, as far as I'm concerned.
    I'm almost sure that this was true of everybody involved. The first thing began in August of 1961 in McComb, and Bob was
    riding down there, Reggie Robertson was there, and John Hardy. What happened was that you had Bob, and Reggie and John,
    both of them were working on voter registration, and I left Jackson to go down, supposedly because of these two differences,
    to organize direct action campaigns around public accommodations.
- speaker: Respondent
  text: I went down and we got some people—Curtis Hayes, Hollis Watkins, Brenda Travis, and a couple more people—to sit in
    at a lunch counter. And I think that this probably helped voter registration in a sense because we had a mass meeting
    around that lunch counter thing. We were also involved with talking about voter registration, about going down. On a number
    of occasions I went down to the courthouse in Liberty, so it wasn't really that sharp a demarcation as I see it. So this
    was the kind of thing that happened, and the idea then, it seemed to me, was just to get people to go down and try to
    register—just what I would call grassroots activity, in the sense that it was dangerous to go in any kind of an organizational
    way, just to say, you know, so and so and so will come down and try to register to vote, and Mrs. so and so and so, will
    you come down and try to register to vote.
- speaker: Respondent
  text: No attempt at that time, I don't think, to organize them in any kind of a formal way. Then this action was really
    the incipient phase of building up the grassroots organization, and it wasn't done with specific planning as far as the
    future was concerned. I know I didn't—we didn't see this.
- speaker: Interviewer
  text: 'Well, as far as I know, I mean I''m just speaking from my own perspective, and I assume this is probably true of
    the other people who were involved, sitting down as a leadership plan kind of thing for a number of reasons: one, this
    whole area was new to everybody in terms of who was working at that time, where we were going. So it was just a first-stage
    thing, just getting people involved. The bulk of everybody''s mind was an idea that you got to organize them into something,
    but we certainly weren''t as sophisticated. I mean we hadn''t had the experience, we in that area as we are now hadn''t
    learned, so I''m not so sure that even now we would have organized them any different. We might have, might, I don''t
    know. The idea then was just to go down and register.'
- speaker: Respondent
  text: I'm sure in the beginning this kind of thing went on, coupled with other things in McComb for the fall of '61. Up
    in Walthall County, it spread down to Amite County, next to Pike County where McComb is, and here and there were a few
    spotty attempts up in the Delta. I mean it spread to—John Hardy was around Cleveland, where Amite Moore lives. It's the
    same kind of basic thing, just at that time in 1961 it was a movement in itself to get people to go down and register
    or attempt to register; a lot of them weren't allowed to.
- speaker: Respondent
  text: I think it probably started—and I can't think what began to develop because of the attempts of people to go down—was
    a sort of strengthening at the grassroots level, in a sense. Most of the people who were going down were working people,
    and sharecroppers, farmers, and millhands, and domestics, and that was—you could never get teachers to go down. Very seldom
    could you even get ministers to, sometimes. So I hear this to us this was the beginning, I think it was the beginnings
    of a sort of grassroots movement in a sense.
- speaker: Respondent
  text: There weren't the—and again, it was very unclear. I mean it was very unclear then where it was. It probably was much
    more clear to probably where we were going, Bob Moses than so. Because I mean he certainly helped to chart a lot of these
    courses, in the sense that a lot of the ideas were adopted by the group, and they weren't mine or anybody else's. It just
    happened that you agree once you hear them, they sound so exciting, you agree with them. So I think that in terms of Mississippi
    politics the one person who charted that course would be Bob, and anybody else—sometimes we all agreed with him, sometimes
    we didn't. But I would attribute most of them to Bob Moses in terms of ideas, to his work.
- speaker: Respondent
  text: Like I think the whole parallel structure thing—I first heard it from him. He was the first person who talked about
    that. And it was in the winter of '62, I think, the first started talking about expanding that whole concept of getting
    people across the state active in voter registration work. And he just—he began to travel a great deal. After the McComb
    thing, of course, there were a lot of other things happened in McComb too, beatings, kids out of school, 114 students
    were expelled because of their activity or they quit. And that's when Moses and Charlie Jones and others were there. And
    so everybody was involved with that.
- speaker: Respondent
  text: There were a couple of voter registration campaigns stopped for a time. I mean there were others who certainly did
    a lot in terms of the kids. But after that, in the winter, that whole concept of organizing spread to other parts of the
    state.
- speaker: Interviewer
  text: Excuse me, you mean the winter of '61, not the winter of '62-'63?
- speaker: Respondent
  text: Yeah, I'm talking primarily about the winter of '61-'62. A lot of these things are sort of buried in my mind, but
    I'm talking at this point of the flow spread. Because by the summer of 1962, we had people working all over the state
    at that time.
- speaker: Interviewer
  text: This would be in Greenwood, and Rattlesburg, and McComb, and Jackson, and Reville, and up in the Delta, largely though,
    the program wasn't very militant or very different from any other program.
- speaker: Respondent
  text: Yeah, I think that by the summer of '62 we had people working primarily in the Delta and down in southwest Mississippi,
    in Amite County, Pike County, Walthall County, Greenwood, up in the Delta, Morel County, Washington County, all those
    places. And again, the activity at that time was just basically a usual, it was just other program as such, in the sense
    that people have had—Negroes have had voter registration campaigns for the last ten years. Basically the program wasn't
    that different, the part it was done was different. Mississippi made it different in the sense that this was militant
    and radical concept in Mississippi—white people certainly interfered with the Negroes just to slow down and try to register
    to vote. So this was a building program, I think, in itself, because it was building new concepts.
- speaker: Respondent
  text: And so at that—I am calling that point to say that this was the kind of things that went on for I guess a year and
    a half across the state, just nothing but just getting people to go down and register. In some instances, like in Bolnea
    County that came in later though, you had organizations that were formed or—McComb, you had—we formed something called
    the McComb Freedom Movement, I think. I don't remember the name of it.
- speaker: Interviewer
  text: I can check that out for you, because I have Tom Hayden's book also.
- speaker: Interviewer
  text: One thing though—apparently there were a series of meetings that went on from October to December that clarified more
    what was to be done in direct political action. Can you talk about that?
- speaker: Respondent
  text: Well again, in September—this is in the fall of '61, right? For instance, we had a meeting in Jackson in September.
    You still had this problem of differences in SNCC about direct action and about political activity. And so anything was
    clarified, it was clear the people who were advocates of, I say, the voter registration were explained, and then trying
    to convince us of the validity of that approach. And those of us on the other side were trying to explain why we didn't
    think that approach was a valid thing to use at this time.
- speaker: Respondent
  text: And so what eventually happened, Charlie Jones was supposed to be the director of voter registration, and Diane Nash
    was the director of direct action. Both were supposed to work in Mississippi. Diane had the idea that was called 'Move
    on Mississippi'—organizing two or three thousand people in Mississippi that would just raise hell throughout the state
    in terms of direct action, public accommodations. And on the other hand, I think these debates clarified and sharpened
    our vision because that way these voter registration people had to plan out a little bit more where they were going a
    little bit, because in order to explain or try to argue with us the validity of it, they had to think about what those
    meant.
- speaker: Respondent
  text: So every meeting, every month we had a meeting. There were, I'm sure, a number of smaller meetings between, say, Charlie,
    or Tim, or others, but this was going on. So I mean, I don't know, it wasn't—it was different in a sense where a group
    of people set together and said, this is what we're going to do, and therefore they go, that people did this, but they
    did it because they had to do it, in the sense that they ended their concept in a sense, you see, so this is a different
    kind of thing.
- speaker: Respondent
  text: That was a larger meeting. They had to decide. But see, I still don't think that that method—great deal or long-range
    planning about what this meant in this context of Mississippi. The only thing I think that came out of that which is the
    basic idea that Negroes in the state don't have power or maintain power, they are disorganized, are powerless, and that
    by organizing people to register to vote we think that we can get some of this power. And that was the basic concept.
- speaker: Interviewer
  text: Then this would mean that both groups within SNCC were really looking to attack what might be called the white power
    structure, and what was decided on was to continue both programs rather than to do one or the other, right?
- speaker: Respondent
  text: I mean, I think there wasn't any basic disagreement among the groups about who you were going to attack in terms of
    the white power structure. The disagreement was whether we were going to stay and do direct action, which we thought was
    the best thing to use, or whether we were going to use voter registration, which some of them thought was, as I said earlier,
    an attempt by the administration to stop all of the movement. And so as a result, both continued.
- speaker: Interviewer
  text: Then this might be called the incipient stages of political democracy as it appeared later on. That all the meetings
    were fully participated in by all members, and no minorities were hurt, a majority decision.
- speaker: Respondent
  text: Yeah, I think so.
