collection: civil_rights
source_url: https://www.crmvet.org/nars/
turns:
- speaker: Interviewer
  text: OK JUST TO KIND OF GET THINGS STARTED HERE, WE'D LIKE TO ASK YOU WHEN YOU MIGHT HAVE FELT THAT YOU WERE PART OF SOMETHING
    A LITTLE BIT LARGER. A - A BROADER MOVEMENT, RATHER THAN JUST BEING AN INDIVIDUAL DEALING WITH -
- speaker: Respondent
  text: Well, I guess I first got the impression that we were caught up in what was happening nationwide when the SNCC representatives
    came into Albany. And they sort of infiltrated the community. And all of the organizations in the community, social, civic,
    religious organizations and sort of became a part of us. And recognizing that these were all outsiders, and in a small
    rural town like Albany, Georgia, we just weren't accustomed to outsiders coming in, so that you began to get the impression
    that you were a part of something bigger with all of these outsiders infiltrating our small town community.
- speaker: Interviewer
  text: ONE OF THOSE OUTSIDERS WAS A YOUNG MAN NAMED CHARLES SHERROD. WHAT DID CHARLIE LOOK LIKE IN THOSE DAYS?
- speaker: Respondent
  text: Well, Charlie looked like the typical college kid, who had been caught up with the excitement of the time. He was
    very dedicated, very well motivated and nothing would suit him better than to make a reputation for himself and his organization
    and Albany looked like the perfect place to do that.
- speaker: Interviewer
  text: WAS THAT YOUR REACTION OR WAS THAT THE COMMUNITY'S REACTION?
- speaker: Respondent
  text: I believe collectively that was our reaction. He was received very well. He was a very dynamic individual - presented
    himself very well, spoke fluently, and I think the community at large kind of perceived him as being a person who was
    assuming a position in life that would somehow enough, somehow sooner or later make an indelible imprint not only on Albany,
    but on the nation. He seemed to be destined for that.
- speaker: Interviewer
  text: TELL ME ABOUT THE FORMATION OF THE ALBANY MOVEMENT.
- speaker: Respondent
  text: The Albany Movement was sort of a - a spontaneous thing. The name itself speaks eloquently to that spontaneity. What
    else is going to be called a movement? What happened was, as a result of this catalyst, and the catalyst was of course
    the SNCC students coming in, as a result of that catalytic reaction in the city of Albany, a number of the civic and social
    organizations sort of got together and - and decided all in one night - the people in the community apparently are ready
    for whatever is happening. We are their leaders. And we are not ready for what the people appear to be ready for. So we
    decided at that time it would be better for us local leaders to, give some direction to whatever is happening than for
    these outsiders to, to give that direction. So we decided at, at that first meeting that was held at the home of Dr. Ed
    Hamilton, a dentist, we decided then that we representatives of the established civic and social organizations of the
    city of Albany should bind ourselves together. And we should become a part of what was happening, because the people apparently
    are ready for a change, and we their leaders have not taken the lead in this endeavor. And so after, a good deal of conversation
    about well, what shall we call ourselves? And naturally we tossed around all sorts of names, but when the word "Albany
    Movement" or the words "Albany Movement" were spoken it sort of took hold at that time. And we never looked at any other
    names.
- speaker: Interviewer
  text: YOU HAVE TO TELL ME, HOW DO YOU PRONOUNCE THE NAME OF THAT COMMUNITY DOWN THERE?
- speaker: Respondent
  text: You've got to call it Albany. If you were from New York you'd call it something else, but in Georgia, it's Albany.
- speaker: Interviewer
  text: TELL ME, WHAT WAS ALBANY LIKE IN THOSE DAYS?
- speaker: Respondent
  text: Albany was a typical small town in Georgia. Well, Albany was not as small of course as many towns. Albany at that
    time had nearly 50,000 people. So it's not small by, by rural Georgia small town standards where the population may be
    as low as 500. But I'm saying that Albany was a semi-rural community and a lot of the industry was at least in part dependent
    upon farming. The, there was very little industry. It was a rather close-knit town in that people knew each other. It
    was a totally segregated town. Blacks held no positions in any of the stores downtown as salespersons, clerks or what
    have you. Of course, there were no black policemen, blacks held no political office. As a matter of fact they weren't
    even called blacks. They were called negroes by the ones who were more liberal and benevolent, and they were called more
    unsavory things by others. You couldn't say that it was a community where you could experience racial harmony. The interplay
    or interaction was non-existent. And most of the people who had lived in Albany all of their lives had sort of come to
    accept things as they were. Or at least there was no outward expression of opposition to things as they were. So Albany
    was not unlike thousands of other towns of that size or smaller, dotted throughout the south, where you had a total segregation
    of the, of the races. You had a community that was, that, primarily was dependent upon the farm industry to some extent
    or another. You had a community that blacks who were employed were employed in the service industries with very few professionals.
    The only professionals you could find would be school teachers, ministers and a very few doctors. At the time that the
    Albany Movement started there was fortunately a black lawyer. This was a rarity of course in a town of that size in Georgia.
- speaker: Interviewer
  text: I HAVE TO TELL YOU THAT LAURIE PRITCHETT SAID IT WASN'T ALL THAT SEGREGATED. THEY HAD A CATHOLIC MAYOR AND A JEWISH
    JUDGE.
- speaker: Respondent
  text: Well, when I speak of segregation, I don't speak in terms of segregation by religious origin, or for that matter,
    so far as ethnic background is concerned. When I speak of segregation I'm speaking in terms of segregation between black
    and white. The Jews could change their names and be integrated into the society. There were others who merely needed to
    change their name to be accepted. It was a bit more difficult for a black to be accepted. So when I speak of total segregation
    I mean segregation based on race - or color. Not religious.
- speaker: Interviewer
  text: GIVE ME SOME SENSE OF WHAT LED UP TO THE DECISION TO CALL IN DR. KING.
- speaker: Respondent
  text: Well, when the Albany Movement was organized, we did draft a purpose for the organization. The purpose was to seek
    a means of desegregating the city of Albany. We drafted the petition to present to the City Council of Albany. And I took
    that petition to the City Council, and I went to the City Council meeting to get a response to our petition. The Council
    conducted its business as usual on that evening, and Mayor Asa Kelley, who chaired the Council announced that the meeting
    was about to adjourn, whereupon I asked for a hearing. And this was granted. And I asked about our petition. I said, we
    have petitioned the City Council to set into place some mechanism whereby we can seek means of desegregating the City
    of Albany. And we gave all the reasons why we felt as though this should be done. Well, Mayor Kelley said that we discussed
    this in the executive session of the City Council and we determined that there is no common ground for discussion, and
    did not deem it appropriate to have it as an agenda item. Adjourned. Before I left I said it is regrettable. This is not
    in the best interest of Albany. And I left. The next day the local newspaper, The Albany Herald, edited by our friend
    Mr. Gray, who may at that time have been State Democratic Chairman, had on the front page of his newspaper that the Albany
    Movement demands complete and total desegregation of the City of Albany. And it went on to relate the, the event of my
    attending the City Council meeting and storming out, he described it as storming out of the meeting, indicating that this
    was not in the best interest of Albany. And I might add that he put in that same article, not only my address, but my
    phone number with my complete name. This led to a series of events that just coincided with the arrival of the Freedom
    Riders. They came into Albany on a Sunday. I can remember very vividly. Needless to say they were arrested as they got
    off the train. And that night we had a meeting of the Albany Movement at which time we decided that we would not let these
    people stay in jail alone, we would fill up the jails. That next morning, at breakfast, I was advising my wife and my
    kids that their father and husband would very likely wind up in jail before the week was out, because the Albany Movement
    had decided that the best way to respond to first ignoring the petition of the Albany Movement, and secondly to arresting
    these Freedom Riders, the most appropriate response would be mass demonstrations. And I said, "I'll probably wind up in
    jail, and I want you kids to understand, why this is being done." You have to understand that going to jail was probably
    one of the most feared things in rural Georgia. There were many blacks who were arrested in small towns in Georgia never
    to be heard from again. We have every reason to believe many of these were lynched. So going to jail was no small thing.
    It was nothing to be taken lightly by any black. Because there were all kinds of horror stories of atrocities that had
    been suffered by blacks in jails. Well, as it turned out we had going at the same time sit-ins at the local bus station.
    My wife happened to be one of those participants at the bus station. But on this Monday morning following the arrests
    on Sunday, we met at a church, and we started a march downtown, and we were going to walk around the courthouse and go
    back to the church. We made it around the first time and I was at the head of the line with my wife. But after we made
    it around the first time not getting arrested I went on to my office, but the group went around a second time to make
    this impression that we are united behind these people that you have unjustly arrested. But the second time around they
    were arrested. And some 700 were arrested before they stopped.
- speaker: Interviewer
  text: OK I THINK WE'RE STILL WAITING TO FIND OUT WHAT LED TO THE DECISION TO BRING IN DR. KING.
- speaker: Respondent
  text: That's what did it. When we got to the point that we had this many people in jail -
- speaker: Interviewer
  text: I'M SORRY SIR, COULD I HAVE YOU START THAT AGAIN. I WAS MESSING WITH THE LENS.
- speaker: Respondent
  text: When we had this many people in jail, we had a meeting of the Albany Movement that night and we all recognized that
    we had no experience in what we were doing. We had never been involved in mass demonstrations, mass arrests. We had no
    provisions for bonding. No provisions for taking care of families of people who were in jail. And recognize that this
    was not a select group. These were common, ordinary, everyday people, housewives, cooks, maids, laborers, children out
    of school. We had made no provisions for these people going to jail because we did not anticipate the mass arrests. So
    we concluded that night that we are into something that really we need some expert help in, someone who has had the experience.
    And I knew Dr. King from years earlier. My wife and Dr. King had been high school schoolmates, and my wife's brother and
    Dr. King were classmates and very close friends at David D. Howard High School here in Atlanta. And I indicated that I
    felt that I knew Dr. King well enough that if I were to call him he would come down and help us. Needless to say, there
    was not total agreement initially with issuing this call. Because recognizing that now SNCC was on the scene and by virtue
    of the Freedom Riders coming through CORE was on the scene, and they did also have established organizations. They wanted
    to protect the integrity - integrity of those organizations. We also recognize that to the extent that they received some
    publicity it helped to further their cause and they would be able to raise money to continue their activities. But anyway,
    we were able to get unanimous decision of the Albany Movement to call in Dr. King. So that night I tracked down Dr. King.
    I don't remember where he was at the time. But I called him personally. And he, he merely asked of me if this is the desire
    of all involved. And I said, "Yes it is." And he asked that I send him a telegram to that extent. And I did. And the telegram,
    I indicated on the telegram all the organizations that were represented now in the Albany Movement. And he responded to
    that call.
- speaker: Interviewer
  text: I WOULD LIKE TO SUGGEST SOMETHING TO YOU THAT ANDY YOUNG HAS SUGGESTED THAT PERHAPS WHEN DR. KING CAME IN HE WAS REALLY
    TO JUST EXPECTING TO GIVE A SPEECH ONE NIGHT. SPEAK AT THE CHURCH, AND THEN SUDDENLY HE WAS DRAWN INTO DEMONSTRATING THE
    NEXT DAY AND GETTING ARRESTED. HE GOT IN DEEPER, FASTER THAN HE EVER EXPECTED TO.
- speaker: Respondent
  text: If I was to say that this was the first major spontaneous civil rights movement in America, you can believe that that's
    factual. Neither Dr. King, nor Abernathy, nor Anderson, or Andy Young or anyone else involved had experienced such spontaneity.
    So Dr. King, right, he came there with not even an overnight bag or a toothbrush. Responded to my call, and I do not anticipate
    that he expected to get as intimately involved with the Albany movement as he did. It was infectious. Contagious. And
    even Dr. King could not resist it.
