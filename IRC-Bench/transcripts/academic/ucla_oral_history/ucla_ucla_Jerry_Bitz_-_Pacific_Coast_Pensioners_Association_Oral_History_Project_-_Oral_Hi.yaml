collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Jerry, can you give us your name, the date of your birth, where you were born and what local you were in?
- speaker: Respondent
  text: Sure. My name is Jerry Bitz and I was born in Portland Oregon, June 26, 1941. I joined the waterfront as a casual
    in August of 1959. And I then became a Class B person in 1964 and became a registered A longshoreman in 1968.
- speaker: Interviewer
  text: Great, can we roll you back a little bit?
- speaker: Interviewer
  text: Tell me a little bit about growing up in Portland.
- speaker: Respondent
  text: Actually, I didn't grow up in Portland, I lived in the suburbs. We actually lived in Shorewood, Oregon, which is 18
    miles south of Portland. So we commuted to Portland every day. And when you're a casual you commute every day and then
    you commute back home to the evening if you didn't get a job.
- speaker: Interviewer
  text: Were your parents involved in the union as well?
- speaker: Respondent
  text: Yes, my father was a longshoreman. He worked nights - Gang 25 on the night side. And so we got to endure the 1948
    strike. And then we were actually we're in one of the medical magazines, our whole family, there's six kids. We were one
    of the first families, we were featured in the magazine with our dental health care with our dentist, way back. I think
    I was probably 11 or 12 when that picture was taken, something like, I'm not exactly what date.
- speaker: Interviewer
  text: You said you were involved in the '48 strike. What do you remember from the '48 strike?
- speaker: Respondent
  text: That we were, you know, we knew our dad had a good job and made good money but during the '48 strike there were very
    little benefits, you just struggled along and you showed up at the picket lines and did what you needed to do. And I know
    that our church brought us food baskets and I went and hid in my room when they came. But then I'm kind of proud of it
    now because it's so amazing that how beautiful the waterfront has treated our families through the histories.
- speaker: Interviewer
  text: How come you hid in your room?
- speaker: Respondent
  text: We weren't - we're not used to accepting charity. You always worked for what you got and they brought this huge basket
    and it just kind of humbled you that other people still think about you and help you.
- speaker: Interviewer
  text: You go to high school around here?
- speaker: Respondent
  text: I went to Tigard High School, graduated in 1960. Yes.
- speaker: Interviewer
  text: Did you go into the military after that?
- speaker: Respondent
  text: No, I did not. I started in 1959 and I signed up for the draft and got married in 1963. And I guess as being married,
    I guess that made me not eligible, I'm not sure why. But I was signed up for everything for it but I did not serve in
    the military.
- speaker: Interviewer
  text: And how did you decide to get work down on the waterfront?
- speaker: Respondent
  text: Well, my dad took me down there and I was dressed up pretty nice. It was August of 1959 and we went to the hall and
    they needed people and I got a job that day and I was dressed up nice and I said, "Dad, I can't work in these good clothes."
    We were making like $2.00 an hour or something. He said, "That's alright. You can buy anything you need when you're done
    working." And so, my first day I was dressed a little better than most on the waterfront.
- speaker: Interviewer
  text: Do you remember the first day? Can you tell us about it?
- speaker: Respondent
  text: Yes, I can. I worked in a guy's gang, a guy named 'Teacher,' and he was kind of a cantankerous old guy. We were rolling
    55-gallon barrels up in the wings and the sun was beating down on the deck and it felt like it was 150 degrees but I was
    happy. I thought I went to heaven. It was amazing. As bad as the job was, it was beautiful.
- speaker: Interviewer
  text: Why do you say that?
- speaker: Respondent
  text: Well, I've grown to appreciate it more because of my involvement in the union over the years and you know, we - the
    comradery between the men and the different things that we - we'd work hard all day, we argue all day, and then we go
    fishing and do everything together. It was just an amazing family that we got to join as a part of the ILWU.
- speaker: Interviewer
  text: Do you know sometimes there have been arguments that people will give you a hard time the first day, not show you
    things, did you have anything like that?
- speaker: Respondent
  text: No. You know there were different old timers that - I think it was tough love. They wanted you to learn it right because
    on a waterfront it was very dangerous and if you didn't do it right, you might not be here, so. I was treated very well
    through the whole - my 42 years on the waterfront. I just feel blessed to be a part of it actually.
- speaker: Interviewer
  text: What product did you work that was the most difficult, the most unpleasant?
- speaker: Respondent
  text: Well, hides is always a nasty one because you had stack them a certain way. And you had to put dunnage in between.
    And you had to cross-tie everything. And then if you worked hides more than one or two days they weren't too friendly
    with you when you went to lunch because the restaurant people sure didn't want you in there. And then you'd come back
    from lunch and those hides were so slimy that all the work you'd done, the dunnage would slip and you had to restack everything
    that you had done prior to lunch - well not everything but a portion of it. But that's probably one of the most obnoxious
    or annoying jobs. I mean there's so many beautiful jobs on the waterfront because the good thing about it was you had
    another choice. So there's nothing really bad on the waterfront.
- speaker: Interviewer
  text: What was the best one?
- speaker: Respondent
  text: The best one? Aw, gee. The best job? There's a lot of beautiful functions that we're involved in like tipping over
    the lumber in Vancouver. But it's hard to say what was the best job because there's so many different - you get to drive
    the brand new cars on the autoships, you get to drive the cranes loading containers, I mean how many people get to experience
    that same thing? The variety is so much, it's so huge that the average guy doesn't get to experience anything near what
    longshoreman does.
- speaker: Interviewer
  text: When you say you got to work lumber, how did you do that?
- speaker: Respondent
  text: Well when we first started we hand-stowed the lumber piece by piece. And then eventually they started banning it up
    and then you had those old hard-tired lift machines. And it was pretty difficult. And then later on in the years we started
    stuffing containers at container freight stations and then they were loaded aboard the vessel in the containers. So it
    evolved by mechanization, you know, over the years so each job got just a little bit better by mechanization.
- speaker: Interviewer
  text: You mentioned driving cranes. Were you a crane driver?
- speaker: Respondent
  text: I was - let's see. Actually I was a crane trainer. I never did take a crane plug but I always - if they needed somebody
    I would drive cranes on scrap at Schnitzer. I've driven cranes on containers. I've driven cranes loading logs out of the
    water. I've driven the bulk cranes where they clam oar out of the vessel. So, like I've said, I've been very lucky to
    try a little bit of everything.
- speaker: Interviewer
  text: How did you learn how to drive cranes?
- speaker: Respondent
  text: Well, you just got up there behind those old timers and some of them, if they thought you were halfway competent,
    then you got stuck and you were there. But there were some amazing guys that were very good about training. And then eventually
    they had crane training and stuff later on in the years. But a lot of it was, you know, the old steam winches and stuff,
    and you took those on cold days because it was so doggone cold out there on deck it was kind of nice to sit in that steam
    bath.
- speaker: Interviewer
  text: You were a winch driver too?
- speaker: Respondent
  text: Well, you just did whatever they asked you to do. I was not an "official" winch driver but when you run out of the
    guys you step up to the plate and take over.
- speaker: Interviewer
  text: Do you remember the first time you did that?
- speaker: Respondent
  text: I remember the old steam winches and you had a hatch tender and two drivers just for one gear. So it was pretty amazing
    and you wanted to make sure you were in coordination with your partner. But, there's so many things the longshore people
    do and did that it just - when you're young you just want to try everything and that's the way I felt. I wanted to learn
    as much as I could. So yes.
- speaker: Interviewer
  text: Wow. Did you get active in the union politics at all?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Can you tell us about that?
- speaker: Respondent
  text: I started in 1978 as a caucus delegate. I went to San Diego and it was adventure. I couldn't believe - we were across
    the court from the Hawaiians Hospitality Room and it went 24/7 and I didn't realize until later until I was active in
    a convention in Portland how they operate and how they take care of their own and - but, it just fascinated me the way
    that they hosted for their own members and took care of everybody.
- speaker: Interviewer
  text: What other offices did you end up running for?
- speaker: Respondent
  text: Let's see, I was President of Labor Relations. B.A. occasionally, that was for Local 8. I was a longshoreman for 33
    years at Local 8 and then nine or ten years I was at Local 40 as a clerk and a super cargo.
- speaker: Interviewer
  text: You said you were president. You were president of. . . ?
- speaker: Respondent
  text: Of Local 8 and Local 40.
- speaker: Interviewer
  text: You were president of both Local 8 and Local 40?
- speaker: Respondent
  text: At different times, naturally. [laughs]
- speaker: Interviewer
  text: What you remember about being president about Local 8? And why did you run for office to begin with?
- speaker: Respondent
  text: Well, actually the first time I ran for office I ran for earnings clerk because I wanted to know the people because
    those are the ones who register everybody's jobs and where they went and everything. And I wanted to learn and back when
    I started it was 1,500 registered longshoreman in Portland and then about 400 B men, I think, something like that. But
    I didn't know I was running against God, and I ran and that was my agony of defeat, I got beat badly.
- speaker: Interviewer
  text: Who were you running against?
- speaker: Respondent
  text: '[? Shadow Duland?] He was a unique guy. I don''t even know why I even ran against him, I just wanted to learn. But
    then I think later on I made - I think I first started out as LRC for a while and then I ran for president and stuff like
    that.'
- speaker: Interviewer
  text: What do you remember from your presidency in Local 8?
- speaker: Respondent
  text: Oh, man. What did I learn?
- speaker: Interviewer
  text: Issues? Major beefs?
- speaker: Respondent
  text: Oh yes, you know, there was a lot of beefs.
- speaker: Interviewer
  text: Arbitrations? Whatever.
- speaker: Respondent
  text: Yeah, we had arbitrations. We had a unique one. We had the - Chinese cargo came into Portland and a foreman was upset
    at one of our longshoremen and he threw a two by four, and he didn't mean to hit him but he hit him. So we went to arbitration
    and the arbitrator ruled in our favor that the area around him was hazardous to the longshoreman. And they couldn't believe
    they lost. But it was one of the most memorable arbitrations that I ever was involved in.
- speaker: Interviewer
  text: That's interesting. You remember the '71 lock out - excuse me, '71 strike?
- speaker: Interviewer
  text: What did you do during that time? Were you in office at that time?
- speaker: Respondent
  text: No, I didn't. But Harry told us from the very beginning that it doesn't look good and if you guys want what you want
    then you're going to be on strike. And so I listened to him very diligently and I put money away and it's a good thing
    it didn't go much longer than it did because I think I was on my last account when they finally settled the strike. I
    helped in the - we had a food kitchen or a food pantry on the bottom of the hall on 17th and Gleeson, that's where the
    old hall was, and it was fun. We went out and got food and stuff and gave it to everybody and I got to be a part of that.
    But I wasn't active as a union officer at that time.
- speaker: Interviewer
  text: Did you do picket duty?
- speaker: Respondent
  text: Oh sure, I was proud to do it. That's fine.
- speaker: Interviewer
  text: Do you remember any details from it?
- speaker: Respondent
  text: I don't, not very much. I know it was long. It was along 121 days or something to that effect.
- speaker: Interviewer
  text: Was that the Taft-Hartley injunction?
- speaker: Interviewer
  text: Okay. When again did you go over to Local 40?
- speaker: Respondent
  text: In 2000's, I think. No, it was before that, 1998, I think.
- speaker: Interviewer
  text: How come you decided to do that?
- speaker: Respondent
  text: It took me that long to figure out it was a lot easier to write down '40 ton' than to move it by hand and so I thought
    that's - and I was very good friend with Larry Clark and have a lot of admiration for. He was a good guy. And he kind
    of asked me to transfer, which was a good move I think. I got to learn another aspect of the waterfront and so it was
    very good.
- speaker: Interviewer
  text: And you ran for office in Local 40?
- speaker: Respondent
  text: Yes. I was on LRC and I was president and dispatcher for quite a while - until I retired actually, I was dispatching.
