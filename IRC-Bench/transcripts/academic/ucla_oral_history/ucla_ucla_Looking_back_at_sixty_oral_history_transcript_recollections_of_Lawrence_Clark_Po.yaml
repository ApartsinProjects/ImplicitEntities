- speaker: Respondent
  text: With the third, fourth and fifth grades behind us, we became enchanted with Indian life and lore. Reading the books
    of James Willard Schultz and Ernest Thompson Seton's Little Savages stimulated our imaginations, and we made the groves
    and wilderness areas of the southeastern part of South Pasadena into our own hunting and stalking preserve. Our two closest
    friends in those days were Roger Weldon and Pat Kelley, who were also loyal members of our tribe.
