collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: It is a matter of record that you were born on the fifth of December, 1897, in Columbus, Georgia. Do you want to start
    out with a few details about your childhood and what it was like?
- speaker: Respondent
  text: Well, I guess one of the truest things I ever heard, which would apply to my childhood, was what Dwight Eisenhower
    said. He said, "I suppose we were poor, but we didn't know it." You know it's a very true thing. My father didn't make
    much money. In this small town, there was nobody in my family that had ever had anything to do with writing. My father
    was a coppersmith, at the railroad, Central of Georgia. I can't think of how I ever got around to the idea of writing,
    except that I wanted to be a newspaperman. I think that must have come up. That seemed to be within the possibilities
    of my life. But I wanted to be a newspaperman because I saw a picture of Richard Harding Davis in his war correspondent's
    outfit, and that looked to me like the kind of life I'd like to lead. A lot of kids are influenced by what they read.
    One thing was, I would have liked to have gone to Yale, because of Frank Merriwell. And I know many boys who thought they
    - Jed Harris - he went to Yale because he read Frank Merriwell. Right now, Jed can give you the line-up of the Merriwell
    team at Yale or at that little prep school they went to before they got to Yale. I've always been for Yale ever since,
    against Harvard. Just like in England I'd be for Cambridge against Oxford. Somehow there's that kind of thing. That's
    the right kind of guy. In this town you'd be for UCLA and not for SC, for some reason. I don't know why these things are
    so.
- speaker: Interviewer
  text: I notice there are a lot of jokes on Harvard in several of your films.
- speaker: Respondent
  text: Oh, there were one or two. I remember, well, Frank Mankiewicz, his sister, Joanna, fell in love with a fellow in New
    York, and everybody was against this guy. Joanna wanted to marry him. This was twenty years ago. Frank said, "Now look,
    the only person marrying this guy is Joanna. She's the only one to be pleased. I'll go to New York."
