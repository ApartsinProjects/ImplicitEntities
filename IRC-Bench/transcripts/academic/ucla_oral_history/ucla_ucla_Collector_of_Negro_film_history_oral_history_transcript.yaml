collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and education?
- speaker: Respondent
  text: I was born in Colorado Springs, Colorado. My mother died shortly after my birth, so I spent much of my childhood in
    the care of Mrs. Nancy Turner, who was employed in the De La Vergne and Kirkwood households. I lived with my father, my
    two brothers, and my sister for less than three years. In 1899, the De La Vergne family sent me to the Hampton Institute
    in Virginia, from which I graduated in 1904. It was an unhappy experience because I was unprepared for life in the South,
    which was based on attitudes and mores uncongenial with my background.
- speaker: Interviewer
  text: What did you do after graduating from Hampton Institute?
- speaker: Respondent
  text: After graduation, I went with my father to Oklahoma, then Indian Territory, and settled in Tulsa. There, I launched
    the first of my many enterprises by publishing a Negro weekly, the Tulsa Guide, first issued in June 1906. It was the
    first Negro paper in the territory and included local news as well as information on Negro opportunities in Oklahoma through
    a column called the Colored Immigration Bureau.
- speaker: Interviewer
  text: How did your career progress after Tulsa?
- speaker: Respondent
  text: From Tulsa, I moved to Muskogee, which was the federal headquarters for Indian affairs in the territory. I went into
    the real estate business by establishing the Johnson Investment Company. I found the climate in Muskogee more favorable
    than in Tulsa, which was my reason for moving there. Later, after statehood, I felt conditions in Oklahoma had changed,
    so I moved north to Omaha, Nebraska. In 1913, I became the first Negro employee in the U.S. Post Office in Omaha.
- speaker: Interviewer
  text: How did you become involved with the Lincoln Motion Picture Company?
- speaker: Respondent
  text: My connection with the Lincoln Motion Picture Company began in 1916. The company was organized in Los Angeles in 1915
    by my brother, Noble M. Johnson, who was an actor with the Universal Film Company. The company aimed to produce and distribute
    photoplays of and by Negroes. I was asked to become the general booking and publicity manager with headquarters in Omaha.
    I arranged the first showings outside California in several small Omaha neighborhood theaters owned by whites but catering
    to a Negro clientele, followed by a showing in Kansas City.
- speaker: Interviewer
  text: What was your role in expanding the distribution of Lincoln films?
- speaker: Respondent
  text: The favorable response and growing demand led to rapid expansion. I rented a room, obtained secretarial help, and
    devoted my mornings to Lincoln's business while maintaining my post office job in the afternoons and evenings. I established
    six branch booking agencies in different geographical areas with two traveling salesmen on the road. This was the first
    national booking organization of Negro films.
- speaker: Interviewer
  text: Can you tell me about the films produced by the Lincoln Motion Picture Company?
- speaker: Respondent
  text: 'The company made five feature films: The Realization of a Negro''s Ambition, The Trooper of Troop K, The Law of Nature,
    A Man''s Duty, and By Right of Birth. By Right of Birth was based on a story I wrote and was the reason I permanently
    left Omaha for Los Angeles to supervise the making of the film. I continued to live and work in Los Angeles as a post
    office employee while remaining with the Lincoln organization until it disbanded in 1923.'
- speaker: Interviewer
  text: Why did the Lincoln Motion Picture Company close down?
- speaker: Respondent
  text: There were several reasons. My brother Noble had to resign as president due to pressures from the Universal Film Company
    where he was under contract. Effective distribution channels were lacking, and there was a lack of solid financial support,
    aggravated by the unavailability of normal distribution methods. All these factors contributed to the closing of the enterprise.
- speaker: Interviewer
  text: What did you do after the Lincoln Motion Picture Company ended?
- speaker: Respondent
  text: I continued to express my interest in the contributions of Negroes in motion pictures and other walks of life. From
    1923 to 1927, I established and ran the Pacific Coast News Bureau, which disseminated Negro news of national importance
    at rates lower than those of the national press associations. The service was subscribed to by most leading Negro journals
    in the nation, and my releases often appeared under the nom de plume George Perry.
- speaker: Interviewer
  text: Can you tell me about your collection related to Negro contributions in films?
- speaker: Respondent
  text: I began collecting materials on Negro contributions in films around the time I joined the Lincoln Motion Picture Company.
    The collection contains correspondence, notes, clippings, pictures, and various documents relating to the history of Negro
    actors and film companies. Over the years, I have continued to add to it, producing a body of material probably unique
    in bringing together information not found elsewhere. It includes original documents, samples of Negro newspapers from
    the 1920s, press sheets, photographs, books, notes, articles I wrote, and an extensive collection of clippings filed by
    individual, production, or film company.
- speaker: Interviewer
  text: What is the significance of your collection?
- speaker: Respondent
  text: One of the achievements of the collection is its identification of many Negro actors who were not credited on the
    screen or who, even if credited, would not otherwise be known as Negro. It provides orderly access to accumulated facts
    on the careers of individuals who were not preserving such materials themselves. The collection is housed as the George
    P. Johnson Negro Film Collection at the UCLA Library's Department of Special Collections and is available for research.
