collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Mr. Lautner we generally start our interviews with some questions or insights into your family background. So, if
    it's OK with you, we'll start this interview in the same way.
- speaker: Respondent
  text: That's fine. I think it's of interest, what went in with the family - The inheritance does have an influence, but
    I also believe, as an architect, that environment has an influence, too. But anyway, specifically, my mother was Irish,
    and my father was German or Austrian, and both of their parents came directly from Europe. Fortunately or unfortunately
    I am just about fifty-fifty, so I haven't been able to be a completely free, wild Irishman or a completely mechanical
    German. But I've had these controls.
- speaker: Interviewer
  text: That gives you the best of both worlds.
- speaker: Respondent
  text: Yes, I guess it is a - It can be a pretty good combination. Also my mother was a painter, and she painted all her
    life. And my father was a professor. My father was really an exceptional student. He was brought up on a farm in northern
    Michigan by his family who came from Austria. They came by the Erie Canal, by boat, which is interesting. I didn't know
    how they got there till just a few years ago. So, instead of a wagon train, they came all the way by boat to northern
    Michigan.
- speaker: Interviewer
  text: From New York?
- speaker: Respondent
  text: From Austria.
- speaker: Interviewer
  text: From Austria. Oh, that is impressive.
- speaker: Respondent
  text: That was a sensible, normal way, when you had some goods and so forth to carry, you know. Anyway, on the farm he didn't
    get to high school, or he didn't get to school until he was about fifteen or something like that. Didn't get to school
    at all. He did eight grades and high school in one or two years, then he went to the University of Michigan. Before that,
    he was a rail splitter, like Abe Lincoln. So, he's an unbelievable man. Then he went to the University of Michigan and
    graduated Phi Beta Kappa in 1893; was a champion hammer thrower and other things. Then he went to Europe, and he spent
    eleven years in different European universities. The University of Paris, Gottingen, Leipzig, Heidelberg, Geneva, all
