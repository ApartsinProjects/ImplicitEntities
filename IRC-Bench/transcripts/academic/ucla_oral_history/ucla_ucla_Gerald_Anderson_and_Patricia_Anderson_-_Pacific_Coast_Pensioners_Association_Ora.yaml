collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: This is the story that I have of it, that he sided with John. There was a big argument with the head of the union
    in 1949, between the Seattle branch and the San Francisco branch, and the president of the union threw twenty-one Seattle
    sailors out, and your father amongst them, before signing a letter asking for a free and unfettered trial of Shaun Maloney,
    and he refused and he canceled their cards. And then he gradually let them back in one at a time. And in 1950--it was
    1949. And in 1952, he personally signed and sent their able-bodied seamen's card to your father, asking him to come back
    into the Sailors' Union, and bygones be bygones. And so he did, he went back. He still wasn't in the longshore union,
    so he went back to sea. And in his interview that I have, he said, "I love the sea. It was everything for me to be at
    sea, and I went back and tried it for a year." And so he did.
- speaker: Respondent
  text: This was Shaun you're talking about or my dad?
- speaker: Interviewer
  text: No, I'm talking about your dad. They would never let Shaun Maloney back into seamen's union. You know his record.
    He was expelled from the Teamsters, and he was expelled from the Sailors. Maybe the only one that got for life in both
    cases. The twenty-one names on that letter--The boss let them come back in one or two at a time. And as I said, Lee went
    back for a year. And did he ever talk about it?
- speaker: Respondent
  text: No, I know that after he made the pool that he went back sailing every year.
- speaker: Interviewer
  text: He went back on a ship that he loved, the--
- speaker: Respondent
  text: It's probably on that piece of paper.
- speaker: Interviewer
  text: It's the Island Mail?
- speaker: Respondent
  text: The Island Mail, alright.
- speaker: Interviewer
  text: No, it's not on here. Oh, I got it right here, yeah. I know these ships. Don't ask me how and why I know them, but
    I know his love of the sea. And I've read in his interview, and I've written in several places and I just want to make
    sure he never talked. Did he ever talk about being expelled from the Sailors' Union?
- speaker: Respondent
  text: No, he talked about some of the other guys being expelled, but I--
- speaker: Interviewer
  text: Did he talk about going to sea when he was sixteen, seventeen?
- speaker: Respondent
  text: Yeah, he talked a little bit about it.
- speaker: Interviewer
  text: It was much more to him than going to school or anything?
- speaker: Respondent
  text: Well, he--when he first started, I think he was working for the Coast and Geodetic Survey.
- speaker: Interviewer
  text: Yes, he was.
- speaker: Respondent
  text: He really enjoyed that.
- speaker: Interviewer
  text: He was a surveyor.
- speaker: Respondent
  text: Yes, to help build the lighthouses on the coast, and I don't know--
- speaker: Interviewer
  text: He was a teenager.
- speaker: Respondent
  text: He was a teenager, yeah.
- speaker: Interviewer
  text: How did he get a job as a surveyor?
- speaker: Respondent
  text: Well, it was wartime and, you know--
- speaker: Interviewer
  text: Oh, yes it was,
- speaker: Respondent
  text: You know, he--I understood he lied about his age. But, you know, I mean, in 19--what was it, 41?
- speaker: Respondent
  text: He was born on 1922. So he was pretty young.
- speaker: Respondent
  text: I was surprised that he could pass for whatever the legal age was. But he told me about some of the trips he went
    on with the Coast and Geodetic Survey building lighthouses, and he really enjoyed it. My dad always liked, when I knew
    him, liked to build things.
- speaker: Interviewer
  text: It would be interesting to get his record out of the Sailors' Union in San Francisco, that's where their records are
    kept. And I think also that it might be amongst Shaun Maloney's collections, University of Washington. He had a lot of
    material to and from Lee.
- speaker: Respondent
  text: Is that right?
- speaker: Interviewer
  text: Yes. And they're maybe halfway through organizing it, it's on the internet. So you can at any time take a look and
    see where the name Lee Anderson comes in the Shaun--or in the--yeah, in the Shaun Maloney collection. And he never got
    in trouble again, did he?
- speaker: Interviewer
  text: None that I know of. He never had any occasion to--
- speaker: Respondent
  text: Well, he talked about one time he was on a ship, I don't know where it was, but they went ashore, and he got shot
    the leg.
- speaker: Respondent
  text: I don't know what the reason for was, if he was raising Cain or... One time he said that he got shot in the leg, and
    that's about all he said. I can't remember--I know that he got a yellow jaundice.
- speaker: Respondent
  text: Yeah, sickness and I don't know what that year was or if it could be in connection with him getting shot in the leg.
    I don't know. All I know is that he had--he was in the Marine Hospital for quite a long time.
- speaker: Interviewer
  text: He got sick?
- speaker: Respondent
  text: In Seattle, yeah.
- speaker: Interviewer
  text: Records would be there for Sand Point.
- speaker: Interviewer
  text: Again, I just wondered it's sort of--he didn't last the being--the week he got dismissed--the Sailors' papers say
    it, anyway--that he sent a letter to the SUOP asking for a trial. And they never did give him a trial.
- speaker: Respondent
  text: So it's my dad you're talking about?
- speaker: Interviewer
  text: Yes, I'm talking about your father. And they never were--it was never--the case was never concluded, except that Maloney
    and one of the others was awarded $75,000 for not getting their trial, but the case was--and he had to pay it--but the
    case just lay in limbo for these two or three years. And then it has--the last chapter of the book is really about these
    four, the four people Lee, Shaun Maloney and John Mahoney, yeah, and Dick Moork. And they were connected in the Socialist
    Party, I believe much less than the other people. He's very quiet about it. He believed that people should vote out the
    ownership of the railroads and all the major means of production should be run by the people in them but not to have it
    all revolutionary, but to have the American public vote for that to happen.
- speaker: Respondent
  text: In knowing my dad, he was somebody that would stand behind somebody he liked at work. Yeah, I mean, in all the union
    decisions that I'm aware of, when he was in International Longshore and Warehouse Union Local 19, he stood behind Shaun,
    he stood behind Dick Moork. And do you know somebody named Sam Rosenberg?
- speaker: Respondent
  text: Sam was involved in it, too. He--Sam was the business agent, but that was it about, I would say--
- speaker: Respondent
  text: Older than the '50's. He was--well, he was the year after I got in.
- speaker: Respondent
  text: Yes. He said--
- speaker: Interviewer
  text: He was a very unusual man.
- speaker: Respondent
  text: Yeah, he was, but he was from the East Coast.
- speaker: Interviewer
  text: Yeah, and he's the man who went to the apartment houses and hotels in the strikes and asked them to postpone the due
    date of the rent or put them--get them food and run a bill until they could go back to work. Sam Rosenberg did that. And
    that's what he's chiefly known in the union for, but I--the only ones that I--of the twenty-one, maybe I know the names
    of ten of them. And Harry the Horse--I don't know if you've heard that name?
- speaker: Interviewer
  text: Sailor Smith, I don't remember, Howard Smith was his real name. And half of them went to Tacoma and half to Seattle,
    half of them were AF of L and half were CIO.
- speaker: Respondent
  text: Was Bill Lacey involved in Seattle?
- speaker: Interviewer
  text: Yes, he doesn't seem to be in the--his name is not amongst the twenty-one, and I was told he was back on the East
    Coast.
- speaker: Respondent
  text: He sailed on the East Coast, yes.
- speaker: Interviewer
  text: Yeah, and he was--he wasn't here when the arguments started. Now, when did you go join the union?
- speaker: Respondent
  text: I joined the union in 1966, September of 1966, and I worked as a casual. And there was some controversy about this
    because I was a member of the fishermen's union and I was going to Alaska fishing when I was eleven years old.
- speaker: Interviewer
  text: In the summer.
- speaker: Respondent
  text: In the summertime. And I was with my dad and my uncle Walt and some of people my dad and my uncle grew up with and
    stuff. I was basically a dishwasher in the first year I went.
- speaker: Respondent
  text: Tell them about Ike.
- speaker: Interviewer
  text: A scullion.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: That's what they call them.
- speaker: Respondent
  text: That was in 1959, and I was in Juneau, Alaska, at the Red Dog Saloon, with Eisenhower inaugurated, Alaska is a state.
    And my dad and my uncle and some of the other crew members were sitting at the bar, all of a sudden the swinging doors
    flew open, "Here comes Ike, kids!" I mean, the bar says, "There's Ike!" Eleven years old, big deal, you know? I've actually
    done a document showing that I was in the Red Dog in 1959 with Eisenhower.
- speaker: Interviewer
  text: Oh, that's wonderful.
- speaker: Respondent
  text: It was quite an event for me to see Alaska become a state, and you had to be careful walking on the sidewalks because
    there was a few Native Indians laying on the sidewalk who were drunk and stuff, but it was quite a sight to--I'll never
    forget that I was lucky that I was there.
- speaker: Interviewer
  text: They--I don't know how long they kept that up, but if business on the waterfront was slight, then they could go fishing.
    And if the business on the waterfront was slow--or was fast, if there's a war, like the Korean War or something, they
    didn't want him to go, but it worked out. In fact, they even had to pay some of the money they earned on that--when they
    went fishing--to the union. He had a varied career.
- speaker: Respondent
  text: You know what I did? I fished in Bristol Bay. Are you familiar with a guy named Auggie Mardesich?
- speaker: Interviewer
  text: Oh, yes, senator.
- speaker: Respondent
  text: Yes, Auggie bought a surplus army transport ship that was a freezer ship and he converted into a freezer ship and
    he took gill netters to Bristol Bay. And my dad and my uncle sailed on it and worked on it while it was being out there,
    then they fished for him and then once the season was over, they put the boat back on and he came back down. But you know,
    that's a short season up there, so he wasn't gone a long time. But I know when--I remember, you know, he used to go in
    the summertime with his brother.
- speaker: Interviewer
  text: He had to ask the membership, and his name went up on a stop working meeting agenda, and the local add new vote, approval
    or disapproval of him going fishing. He couldn't--and I don't know how many times he asked, but I saw his name three or
    four times requesting permission, and it was granted. And even, you know, going on one more step he was a night business
    agent, and there usually were a lot of-
