collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: In 1850 my grandfather came to San Francisco from Kiel in the state of Schleswig-Holstein. His father was a cabinet-maker,
    or a custom furniture-maker, called Tischlermeisters in those days.
- speaker: Respondent
  text: He felt that he was being oppressed by the German domination of Schleswig-Holstein which at that time was under Danish
    government. He could see no future in this situation, as he told it to me when I was a boy. So when he heard of the gold
    rush in California, he thought, "Well, that's the coming land." So he left Kiel in 1849 and landed in San Francisco in
    January 1850, coming in around the Horn. He had another brother who left home at the same time, who went to South America
    where he joined the forces of a South American liberator. The two brothers never heard from each other after that.
- speaker: Respondent
  text: After my grandfather got to San Francisco he went up to the mines to look the situation over and found that gold rush
    life was very difficult. He decided to make an easier living and came back to San Francisco where he saw the need for
    a hotel or rooming house, and we find in the Wells Fargo Library in the old San Francisco directories that John C. Lutgens,
    who was my grandfather, was, in 1852 or 1853, a lodging-house keeper at an address given in that directory.
- speaker: Respondent
  text: Later he went into the hotel business and ran the New Orleans Hotel, on Post Street between Kearny and Grant. At that
    time he sent back to Hamburg for the girl he had met after leaving Kiel. They were married in San Francisco.
- speaker: Interviewer
  text: What about her family?
- speaker: Respondent
  text: Her family I know nothing about. Her name was Johanna Niepah. She died early in their life, in childbirth with their
    seventh child. He kept on in the hotel business and built the old Union Hotel in Sonoma. It recently was razed and the
    Bank of America has a new bank on that spot. At that time the cornerstone of the old building was found. My grandfather
    went from Sonoma to Ukiah where he was again in the hotel business. Then he came back to San Francisco and was the secretary
    of the Franklin Hospital, which was then known as the German hospital. He had charge of the hospital plan it carried on.
- speaker: Respondent
  text: My mother's folks came from southern Germany. My grandfather's name on that side was Backer. He was a baker, and worked
    in San Francisco in the Winkle bakery, which was on Sutter Street above Grant Avenue. My grandfather Backer met a daughter
    of the Winkles and married her. My mother was born of that marriage. My grandfather Lutgens passed away in 1904. He had
    seven children.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on the fourth of April 1893 in San Francisco. My father was born in Sonoma. I went to my first school in
    San Francisco. We lived over on North Beach at Filbert and Leavenworth streets. My father at that time was working with
    a hardware concern in San Francisco, Miller, Sloss, and Scott. My early days in San Francisco went to about the fourth
    grade when we moved to Sonoma, where my folks had a small ranch.
- speaker: Respondent
  text: When we were in San Francisco I went to a kindergarten on Greenwich Street and then to the Sarah B. Cooper primary
    school.
