turns:
- speaker: Interviewer
  text: Okay, Mr. Soriano, we'll begin our interview at the very beginning with some background on your family.
- speaker: Respondent
  text: Okay. Well, my family was really a very - Oh, what will I say? My mother was--didn't know how to write or read, number
    one. And in those days, you know, she came from a family of eleven children. Eight survived, something like that. There
    were seven daughters and one son.
- speaker: Interviewer
  text: Where was your mother born?
- speaker: Respondent
  text: Was in Rhodes. It was part of Turkey then.
- speaker: Interviewer
  text: She was born in Rhodes?
- speaker: Interviewer
  text: What was her name?
- speaker: Respondent
  text: Was Rebecca, or we used to call her Bohora. In the Hebraic language, Bohora means the first born female, the oldest
    born woman. Bohor is for men. Any first born is called Bohor, and Bohora--also because of Spanish Jews, you see, she was
    a Spanish Jew - and therefore, Bohora, for the feminine. Meaning first - the oldest daughter.
- speaker: Interviewer
  text: Well, did she get to Rhodes, then, because of the--
- speaker: Respondent
  text: From the Inquisition.
- speaker: Interviewer
  text: '- expulsion of the Jews -'
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: --from Spain.
- speaker: Respondent
  text: That's right. Her grandparents came to Rhodes.
- speaker: Respondent
  text: The way all the parents came, they were all in the Mediterranean basin. So it happened that I was born because of
    that. In there.
- speaker: Interviewer
  text: Your father was at--?
- speaker: Respondent
  text: My father was also there. His grandfather came from Bayonne, the southern part of France, you see, Basque country.
    Also expelled from Spain. My father was quite a scholar. I better close this door because it's a mess with those tourists
    going to Angel Island.
- speaker: Respondent
  text: Okay, we continue. We were talking about my mother, wasn't it?
- speaker: Interviewer
  text: Yes, we were.
- speaker: Respondent
  text: And then my father, I told you that he was - his grandfather came from Bayonne, southern part of France. And this
    is the tragedy of these damn persecutions, as you know what happened to all the Jews in Germany and the same thing in
    Spain. This is the tragedy of these uncivilized human beings who think they have to have scapegoats to do their dirty
    activities instead of loving humanity and loving people. And as you were observing my photograph there, of that little
    girl I told you, that she came to the door and she wanted to have a photograph with my beret. She's adorable. Already
    a woman at the age of nine.
- speaker: Interviewer
  text: With a beautiful smile.
- speaker: Respondent
  text: Absolutely superb. And intelligent, sensitive. She plays the piano and cello. I mean, piano and violin. And, just
    recently I met another girl by the name of Hillary. She lives in Pomona with her mother, and father's a pilot, I told
    you. And I went-- I saw her. I said, "Most marvelous face." I get fascinated with faces, as I am fascinated with blossoms
    or with excellent music or the ballet for that reason, you see. But not with stories. I love life in complete lucidity,
    as life is. And to me that represents something that I relate to. Anything else, fairy tales, stories, don't appeal to
    me because they don't mean anything to me. That's somebody else's concoction, and why should I worry about that, you see.
    Now, this little Hillary was so sweet, and I went to her and I said, "What a beautiful child! Who are you?" And she gave
    me her name. Her mother told me she's in one of the schools for talented children, for gifted kids.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: Yes. And we became very good friends. And then they came over here, she wanted me to go to have dinner with them at
    night. But I said, "No thank you, dear. I can't." But they were so sweet. And they came over here and sat down and I said,
    "Oh, so beautiful." I say, "I wish I could keep you here." And the mother said, "It won't take one second; she'll stay."
    [laughter] And she came and hugged me. I mean, imagine that lovely child, and is just the opposite of what we're trying
    to make nowadays because of all these horrible things that happen. We tell the kids, "Now, don't go near somebody. Don't
    talk to anybody," you know.
- speaker: Interviewer
  text: Well, that's-- Of course, that's a double-edged danger -
- speaker: Interviewer
  text: '- because you lose-- The children must be protected. On the other hand, they are losing that ver'
