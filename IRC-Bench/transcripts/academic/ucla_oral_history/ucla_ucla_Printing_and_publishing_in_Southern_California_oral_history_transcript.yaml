source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and your boyhood in South Pasadena?
- speaker: Respondent
  text: My father was Mossom George Ritchie and my mother Effie Palmer Ritchie. I was born in Los Angeles in 1905 and grew
    up in South Pasadena. I attended elementary school there and graduated from South Pasadena High School.
- speaker: Interviewer
  text: What was your education like after high school?
- speaker: Respondent
  text: After high school, I entered Occidental College in 1924. After my freshman year, I was admitted to Stanford University.
    Following my sophomore year at Stanford, I attended the University of the South at Sewanee, Tennessee, but then returned
    to Occidental College where I received my BA degree in 1928.
- speaker: Interviewer
  text: How did you become interested in printing and book production?
- speaker: Respondent
  text: I developed a keen interest in fine printing and the art of book production early on. After graduating from college,
    I initially decided on a career in law and matriculated at the University of Southern California's School of Law in 1928.
    But within a year, I realized law was not for me. During that time, I discovered The Journals of Thomas James Cobden-Sanderson
    in a bookstore, and his philosophy of independent creativity inspired me to pursue a career in the graphic arts.
- speaker: Interviewer
  text: Did you receive any formal training in printing?
- speaker: Respondent
  text: Yes, I sought advice on bookbinding but was told there was little hand binding done in the U.S. Then I asked about
    printing and was told the best printers on the West Coast were John Henry Nash and the Grabhorn Brothers in San Francisco.
    Encouraged by them and by Jake Zeitlin and Bruce McCallister in Los Angeles, I studied printing at the Los Angeles Trade
    Technical School during 1928 and 1929. My tutor James Hallack was very supportive.
- speaker: Interviewer
  text: What were your early printing experiences like?
- speaker: Respondent
  text: I had access to the printing equipment at the Trade Technical School and also set up my own press in a rented studio
    at Clyde Browne's Abbey San Encino in Highland Park. I printed small booklets of poems by Carl Sandburg, Archibald MacLeish,
    Leonie Adams, Robinson Jeffers, and others. They were mostly pamphlets that could be printed quickly, but I found the
    work very satisfying and fun.
- speaker: Interviewer
  text: What else were you doing during this time?
- speaker: Respondent
  text: I worked at Vroman's Bookstore in Pasadena until late spring of 1930. In my spare time, I worked with my press and
    read widely about printing history and contemporary printers. I became particularly interested in the Paris printer and
    book designer Francois-Louis Schmied.
- speaker: Interviewer
  text: How did you get the opportunity to study with Francois-Louis Schmied?
- speaker: Respondent
  text: My aunt in Michigan was joining a European tour and wanted my mother to accompany her. My mother persuaded me to join
    them, so I got a leave of absence from Vroman's and went to Europe with them in early June 1930. When the tour returned
    to Paris, I decided to stay and pursue my ambition to apprentice with Schmied. I had a letter of introduction and eventually
    succeeded in becoming his apprentice.
- speaker: Interviewer
  text: What kind of work did you do at Schmied's atelier?
- speaker: Respondent
  text: I did a variety of tasks including cutting woodblocks, pulling the handpress, teaching English to Schmied's daughter,
    and helping bottle the autumn wine. It was a rich experience that strongly influenced my later work.
- speaker: Interviewer
  text: How did your experiences in Paris influence your career?
- speaker: Respondent
  text: My time at Atelier Schmied deeply shaped the development of the Ward Ritchie Press, which I established in 1932. The
    skills and philosophy I absorbed there guided my approach to printing and book production throughout my career.
