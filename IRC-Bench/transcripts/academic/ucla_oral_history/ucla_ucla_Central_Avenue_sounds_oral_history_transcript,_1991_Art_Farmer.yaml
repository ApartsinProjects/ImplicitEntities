collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Okay, Art, we'll begin our Central Avenue recollections. But perhaps since you came to Central Avenue in your teens,
    maybe you can begin talking about your beginnings, your roots before L.A.
- speaker: Respondent
  text: Yeah. Well, I was born in Council Bluffs, Iowa, in August 1928. And my family moved from Council Bluffs to Phoenix,
    Arizona, when my brother and I were four years old. And then when we were around the age of sixteen we came to Los Angeles
    on a summer vacation, and there was so much musical activity here that we just decided to stay here.
- speaker: Interviewer
  text: No kidding. That's what did it?
- speaker: Respondent
  text: Yeah. We had one more year to go in high school, which was fortunate. And we just didn't want to go back to Phoenix,
    to Phoenix High School, because we knew that we wanted to be professional musicians, and this was where it was happening.
- speaker: Interviewer
  text: How did your music start? At what age?
- speaker: Respondent
  text: My music started before I started to go to school, actually, because my mother used to play the piano for the - My
    grandfather was a minister, and she used to play the piano in the church. We lived in the parsonage, and I used to go
    to the church with her in the afternoons when she was practicing the coming week's hymns. And after she would play, well,
    then I would get up on the piano and I would try to play, too. I thought all you had to do was just put your fingers on
    there and music would come out. [laughter] So that was my introduction to music.
- speaker: Interviewer
  text: So this was early. You're just a few years old.
- speaker: Respondent
  text: Yeah, maybe three or four years old or something. And then when I started elementary school, then I started to study
    the piano. A piano teacher would come by the school once a week and give the kids lessons. That was my first study.
- speaker: Interviewer
  text: Was that something you wanted to do then? Your mother didn't have to force you into it?
- speaker: Respondent
  text: No, no. She never had to force me. I don't know why; there was just something that seemed very attractive about music.
    She never had to say, "Come and practice your lessons," no.
- speaker: Respondent
  text: No. I never felt it took that much. It wasn't a chore. I didn't realize how much work it actually took. It was just
    fun to me.
- speaker: Interviewer
  text: Was Addison also playing then -
- speaker: Interviewer
  text: '- and as interested as you?'
- speaker: Respondent
  text: He wasn't quite as interested as I was, but it was the - Actually, in reality, it was the tradition of black, what
    we would call middle-class or some kind of middleclass families to have a piano. Well, not only middleclass but almost
    - There was a piano in houses in the United States. This was before the days of television, you know. Most houses had
    a piano, and somebody could play something on the piano.
- speaker: Interviewer
  text: People had to entertain themselves then.
- speaker: Respondent
  text: Yeah, right. Yeah, that's the way it was. You'd play the boogie woogie, somebody'd play the boogie woogie. And always
    some kid had to practice piano. You heard about that. "Practice your lesson, now." [laughter] So it was common. But I
    think I was the most interested at that time. And then later on, a few years later, somebody - We had an extra room that
    we rented out, and there was a man who just happened to have a violin in his trunk. And he said, "Well, I have this violin
    here. Maybe you might like to have it." And I said, "Sure, thanks."
- speaker: Interviewer
  text: He gave it to you?
- speaker: Respondent
  text: Yeah, he gave it to me. It had a little hole. A rat had gnawed a hole in it by the F hole for some reason, but that
    didn't mean anything. [laughter] And this was during the time of the WPA, so the WPA had all kinds of people employed,
    you know. Teachers teaching people - I remember going to an art school where you could learn how to sculpt and paint.
- speaker: Respondent
  text: Yeah. In Phoenix.
- speaker: Respondent
  text: And there was a man teaching the violin. I had lessons from him. He was in the neighborhood, and he gave me lessons
    on the violin. So I played that for about a year, maybe a little longer. And I also studied in the public school, the
    violin. I remember when our class graduated from grammar school, I played the march for the students to march in.
- speaker: Respondent
  text: Just me with my violin. [laughter] So that was the first instrument. Then there was a church there, a Catholic church,
    that had a very active priest, and he organized a marching band in the church. And I wanted to be in the band. I couldn't
    play the violin in the band, so I wanted a horn, but there were no horns available. The only horn that was available was
    the bass tuba. So I said, "Okay, I'll take that one."
- speaker: Respondent
  text: And I played that for about a year. Then Pearl Harbor came, and guys started being drafted, and other horns became
    available, so I shifted to trumpet. Actually I shifted to cornet at the start, because that was open, and it was in the
    same key as the tuba and the fingering was the same. So that's how I -
- speaker: Interviewer
  text: So it was kind of a pragmatic choice, then.
- speaker: Respondent
  text: Yeah. I played that for maybe a couple of years. Then I bought a trumpet and started playing with a little school
    band around Phoenix, Arizona, and going out and listening to the dance bands when they came through on their one-nighters
    and got to meet some of the people.
- speaker: Interviewer
  text: What kind of music were you interested in then? I guess probably in your early years it was probably formal training?
- speaker: Respondent
  text: Well, formal training -
- speaker: Interviewer
  text: And church music?
- speaker: Respondent
  text: Well, church music, but my main - That was - I realize that the formal training, like everyone who starts on the instrument
    - If you have any kind of teacher, you start with the same things that the classical players start with. But my main interest
    at that time was swing music, you know, the big bands, dance bands. That was what really grabbed me.
- speaker: Interviewer
  text: Who did you like?
- speaker: Respondent
  text: Well, what we heard on the radio the most was Harry James and Benny Goodman. We heard quite a bit of Duke Ellington
    and heard Stan Kenton and - let's see - Jimmie Lunceford. As far as the trumpet, Harry James had the most exposure. And
    I certainly liked him; I thought he was a great player. I hadn't heard Louis Armstrong at that time.
- speaker: Interviewer
  text: Not at all?
- speaker: Interviewer
  text: No records?
- speaker: Respondent
  text: Well, no, I hadn't. I hadn't heard any records when I was in Phoenix, and he didn't get any exposure on the radio
    like other people did for one reason or the other. Harry James, of course, was a very fine player, so he was the first
    one that I was really made aware of. But then, let's see, Artie Shaw's band came through on a one-nighter, and Roy Eldridge
    was working with him.
- speaker: Respondent
  text: I met him, and he was a wonderful person.
- speaker: Interviewer
  text: Were you playing cornet then when you - ?
- speaker: Respondent
  text: Yes. He was a wonderful guy. He came by - No, no, what happened, the band came in town a day early. I was playing
    in a little club, and he came by there, and he sat in on the drums first. And then he went to his room and got his horn
    and brought his horn back and played. And then the next night, well, at the dance hall, the Artie Shaw band played the
    first dance from nine to one, and then our band played from like two to five, because there was a thing then called the
    swing shift, where there would be a dance held for the people who were working on what is called the swing shift at night
    - where they would get off at midnight. They would get off from work at midnight and then they would go to a dance. So
    we played then. So the guys from Artie Shaw's band, they stood around and listened to us.
- speaker: Interviewer
  text: You guys must have been the best band in the area.
- speaker: Respondent
  text: We were the best because there wasn't any other one. [laughter] Of course, we really thought that we were great, you
    know, but we didn't know. But these guys were standing around listening. At that time I thought they were listening in
    awe, but when I look back on it I figure
