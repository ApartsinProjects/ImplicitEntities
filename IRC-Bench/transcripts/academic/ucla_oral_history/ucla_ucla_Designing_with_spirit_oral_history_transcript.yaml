source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early education and exposure to art?
- speaker: Respondent
  text: I was schooled in Vienna and then enlisted in the army. After World War I, conditions in Hungary were difficult. I
    entered the Staatliche Akademie der Bildenden Künste in Stuttgart but eventually quit school and began working for the
    architect Fritz August Breuhaus in Cologne. Later, I worked for Leo Nachtlicht in Berlin-Wilmersdorf.
- speaker: Interviewer
  text: What influenced your preference for small architectural firms?
- speaker: Respondent
  text: I preferred small firms because they allowed more creative freedom. I began working as a freelance furniture designer
    in Vienna and later moved my office to Stuttgart. I contributed to the Weissenhof exhibit and designed an apartment for
    an exhibit in Düsseldorf. I also won a competition held by the Meissen Royal China Manufactory in Dresden.
- speaker: Interviewer
  text: How did you get into interior design?
- speaker: Respondent
  text: I felt influenced more by the city of Vienna itself than by any particular movement like the Secessionists or the
    Bauhaus. One of my early projects was the Max Bleyle House, which led me into interior design. I also worked on the Robert
    Weir apartment and designed gloves for the Jeittele glove company.
- speaker: Interviewer
  text: Can you tell me about your work in California?
- speaker: Respondent
  text: After moving to Los Angeles, I worked on several projects including the Bullock's Wilshire department store interior,
    the László House in Beverly Hills, and the Crenshaw movie theater. I also designed homes in Pacific Palisades, Bel-Air,
    and Holmby Hills. I was involved in remodeling the Brentwood Country Club and designing the Beverly Hills Hotel Rodeo
    Room.
- speaker: Interviewer
  text: What was your approach to designing homes?
- speaker: Respondent
  text: I believed in adapting each house to the client and the site. I emphasized functional quality and often incorporated
    innovations like movable partitions and skylights. I also valued the open plan concept, avoiding too many divided rooms
    to maximize space and light.
- speaker: Interviewer
  text: How did you handle issues with clients who did not want to take your advice?
- speaker: Respondent
  text: That was always a challenge. Sometimes clients insisted on their own ideas, which could compromise the design. I tried
    to educate them on the importance of good design principles, but ultimately, I had to respect their wishes while doing
    my best to maintain quality.
- speaker: Interviewer
  text: Can you discuss your views on the International style and Le Corbusier?
- speaker: Respondent
  text: I had a low opinion of Le Corbusier and the International style. I felt that some of their designs lacked warmth and
    were not particularly suited to the local environment or client needs. I preferred designs that were more functional and
    responsive to their context.
- speaker: Interviewer
  text: What innovations did you bring to ranch house design?
- speaker: Respondent
  text: I developed one-room houses with movable partitions to allow flexibility. I also emphasized the use of skylights and
    open plans. My designs were featured in publications like Sunset magazine and House Beautiful, and other architects began
    copying some of my ideas.
- speaker: Interviewer
  text: Have you been involved in any legal actions regarding your designs?
- speaker: Respondent
  text: Yes, I have initiated lawsuits against builders who copied my plans without permission. I also dealt with issues where
    companies used my house designs in advertisements without authorization. Protecting intellectual property in architecture
    is important to me.
- speaker: Interviewer
  text: What are some of your notable projects in the later years?
- speaker: Respondent
  text: I designed the Mondavi Winery and continued working on houses with movable partitions and skylights. I also designed
    apartments for clients like Shirley MacLaine and her husband. Additionally, I was involved in low-cost housing projects
    across the country before returning to more expensive single-family homes.
- speaker: Interviewer
  text: How do you view the relationship between art and architecture as you have aged?
- speaker: Respondent
  text: I believe that artists' work tends to improve as they get older. Experience brings depth and refinement. In architecture,
    this means better understanding of space, function, and aesthetics, which I have tried to incorporate throughout my career.
