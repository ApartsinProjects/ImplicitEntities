source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood and early influences?
- speaker: Respondent
  text: I grew up in Redondo Beach and Athens-on-the-Hill. My parents were very supportive, and I started painting and building
    things at a young age. Meeting Norman S. Chamberlain was a significant influence on my early development as an artist.
- speaker: Interviewer
  text: What was life like on the beach during your youth?
- speaker: Respondent
  text: Life on the beach was vibrant and full of energy. There were rumrunners and beach-front gangs, and the amusement zone
    in Redondo Beach was a central part of the community. It was a unique environment that shaped much of my artistic vision.
- speaker: Interviewer
  text: How did your relationship with Norman S. Chamberlain impact your work?
- speaker: Respondent
  text: Living and working with Norman Chamberlain exposed me to European influences and other local artists. He was a mentor
    who helped me refine my skills and broaden my perspective on art.
- speaker: Interviewer
  text: What was your educational background?
- speaker: Respondent
  text: I attended UCLA for three years and earned a B.A. in engineering. I also studied at the University of California,
    Berkeley, and spent a year at the Chouinard Art Institute. Additionally, I received private instruction from Norman S.
    Chamberlain.
- speaker: Interviewer
  text: Can you describe your career before becoming a full-time artist?
- speaker: Respondent
  text: I worked as a tool and die maker at EMSCO Derrick Equipment Company and North American Aviation Company from 1934
    to 1942. Later, I was a tool design engineer at various companies including North American Aviation, Hughes Aircraft,
    and Rocketdyne until 1958.
- speaker: Interviewer
  text: When did you transition to being a full-time professional artist?
- speaker: Respondent
  text: I became a full-time professional artist and art teacher in 1958 and continued in that role until 1987.
- speaker: Interviewer
  text: What are some of the key periods or themes in your artwork?
- speaker: Respondent
  text: My work spans several periods including amusement zone paintings and drawings in the 1920s and 1930s, Big Sur and
    Marine paintings in the 1940s, the Barrington series, light machines and mobiles, first assemblages, Navaho paintings,
    and many others. I also explored psychedelic art, box assemblages, and the Whiskey Marine series later in my career.
- speaker: Interviewer
  text: How did your experiences in Mexico influence your art?
- speaker: Respondent
  text: Living in Mexico deeply influenced my assemblages and paintings. The culture, imagery, and symbolism from Mexican
    cemeteries and folk art became integral to my work, especially in pieces like Soup Bone Fetish and La Reyna.
- speaker: Interviewer
  text: Can you talk about your involvement with the Native American community?
- speaker: Respondent
  text: I moved to the Navaho reservation and was influenced by Navaho myths and legends. I also engaged with Hopi culture
    and artists like Otto Semptewa and Carl Gorman. These experiences enriched my understanding of traditional versus progressive
    Native American art.
- speaker: Interviewer
  text: What role did assemblage play in your artistic expression?
- speaker: Respondent
  text: Assemblage was a way to create poetic and protest art using found objects. It allowed me to explore aesthetics of
    junk and meditate on themes like time and mortality. Pieces like Piece of Pieces from the Sea and the Gameless Game exemplify
    this approach.
- speaker: Interviewer
  text: How did your engineering background influence your art?
- speaker: Respondent
  text: My engineering experience informed my understanding of structure and mechanics, which is evident in my mobiles, light
    machines, and assemblages. It also helped me incorporate scientific and technological themes into my work.
- speaker: Interviewer
  text: What was your perspective on the Los Angeles art scene in the 1950s and 1960s?
- speaker: Respondent
  text: The L.A. art scene was dynamic but also had its challenges. There was an art 'syndicate' that influenced opportunities.
    I had opinions about critics and the divide between Funk art and the 'L.A. Look.' I also worked with galleries like Silvan
    Simone and knew artists like Edward Kienholz and Wallace Berman.
- speaker: Interviewer
  text: Can you describe your teaching experience?
- speaker: Respondent
  text: I taught at various institutions including the Valley Center of the Arts, Palos Verdes Community Arts Center, Barnsdall
    Art Center, and Angel's Gate Cultural Center. Teaching was an important part of my career and allowed me to share my knowledge
    with many students.
- speaker: Interviewer
  text: What are some of your notable exhibitions?
- speaker: Respondent
  text: I had one-man exhibitions at galleries such as Willard Hougland Gallery, Silvan Simone Gallery, and Stables Gallery.
    I also participated in group exhibitions at the Pasadena Museum of Art, Los Angeles County Museum of Art, and internationally
    in places like London, Sweden, and Belgium.
- speaker: Interviewer
  text: How do you view the relationship between your art and Jungian psychology?
- speaker: Respondent
  text: Jungian psychology influenced my use of symbols, fetishes, and power objects. It helped me explore deeper meanings
    and archetypes in my assemblages and paintings, connecting personal and collective unconscious themes.
- speaker: Interviewer
  text: What projects or series were you working on in the 1980s?
- speaker: Respondent
  text: In the 1980s, I worked on the Belgian boxes, Pun boxes, The Interior Castle construction, The Fool playing card castle,
    Marine series boxes, Whiskey Marine series assemblages, and Firaskew construction.
