turns:
- speaker: Respondent
  text: In 1906 when we were living at 1141 West 21st Street, Los Angeles, I attended a public kindergarten at the Norwood
    Street School and later a private German kindergarten. At the latter school one day the group was asked the origin of
    various articles such as honey, from the bees; eggs, from the hens, etc. It came my turn. "Where does milk come from,
    Robert?" I innocently replied, "From the Fishes." Los Angeles was still a country town then and Dr. Charles W. Fish, our
    family physician, supplied the neighbors with milk from the cow he kept at his residence at Union and 23rd Streets.
- speaker: Respondent
  text: When we moved to 1700 South Western Avenue, in 1907, I attended public grade school at the 24th Street School for
    a few weeks. My parents then entered me at Harvard Military Academy, directly across the street from our home. There was
    no first, second or third grade at Harvard, so I started off in the fourth grade at the age of seven, in September, 1908.
    I graduated from grammar school in June, 1913.
- speaker: Respondent
  text: My mother and I spent the balance of the year 1913, from June to December, on a trip through Europe. After a few weeks
    in London, we were joined by my father's sister, Mrs. May Viven, the widow of Captain John L. Viven, a regular army officer.
    We were also joined there by Mr. and Mrs. Walker, Mrs. Walker's sister, Mrs. Hattie Malloy, and the Walker daughter, Ethelwyn.
    We visited my father's cousin, Col. H. Torrens Kenny, II in Folkestone. He had been a colonel of the Twelfth Lancers in
    India. The Colonel spoke Russian and Hindustani. I last saw him in 1938 on one of his annual visits to New York City.
    He was then 80. He made it a point to invite me to Russian and Hindu restaurants where he could display his linguistic
    ability.
- speaker: Respondent
  text: In August 1913, we toured England, Scotland and Ireland with the Walk
