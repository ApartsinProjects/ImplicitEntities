collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Don, can you tell me where you were born and when you were born?
- speaker: Respondent
  text: I was actually born in California. Turlock, it's in Central Valley, in 1944, September 17th.
- speaker: Interviewer
  text: Okay, what were your parents doing at that time?
- speaker: Respondent
  text: Actually, my dad used to do contract work and bale hay, and that thing. And my mom, well about the time I was born
    - because I'm not totally sure because my dad and mom divorced when I was like, four years old. I don't remember too much
    in terms of what she was doing.
- speaker: Interviewer
  text: Okay. What countries in Europe did they come from? Do you know?
- speaker: Respondent
  text: Actually, do they have to be Europe? My dad's parents came from Australia.
- speaker: Interviewer
  text: Australia? No it doesn't have to be Europe. I guess it can't be.
- speaker: Respondent
  text: But as far as my mom, I'm not totally sure because they were here since basically they started settling the United
    States, so which one they really came from, I'm not sure. But we're basically Irish, and English - probably over there.
- speaker: Interviewer
  text: Yes. What's it like growing up in Turlock, California?
- speaker: Respondent
  text: Actually when you're young, it's great because you get to basically - it's all farm stuff for kids you know, hunting,
    fishing, you do all this stuff. It was wonderful. I mean, we worked our ass off for our dad, driving tractors and hauling
    hay and stuff, but it was all fine, you know? It was just something you did.
- speaker: Interviewer
  text: Yeah. Did you go to school in Turlock and all that?
- speaker: Respondent
  text: Up until the middle of high school, we moved up to Bay Area, when I was 14, 15 years old - and came down to south
    of San Francisco, about 25 miles.
- speaker: Interviewer
  text: Okay, why'd you move down there? Do you know why your dad moved down there?
- speaker: Respondent
  text: Well actually, it was because of the business he was in, there was too much seasonal. So winter time we starved, and
    summer time we had all kinds of money. So he got a job - he went into construction up there, so we moved up there.
- speaker: Interviewer
  text: So you moved there. What town was that?
- speaker: Respondent
  text: Redwood City.
- speaker: Interviewer
  text: Oh Redwood City, yeah. And you go to high school there?
- speaker: Respondent
  text: Yeah, a couple of years. Actually I quit, when I was 16, I went to work as a carpenter apprentice, and when I was
    17, I joined the navy.
- speaker: Interviewer
  text: When you were 17 you joined the navy?
- speaker: Interviewer
  text: Uh, is this about the time for Vietnam?
- speaker: Respondent
  text: Actually, it's kind of weird because I did four tours to Vietnam, Vietnam never started until after I got out - supposedly,
    if you look at the record book. But yeah, Vietnam was definitely on.
- speaker: Interviewer
  text: Okay. What did you do in the navy?
- speaker: Respondent
  text: I was basically a diesel mechanic and it was repair on a fleet tug. So we drove there and take stuff in. I did the
    - basically the engine room, maintenance on the refrigeration, that sort of thing.
- speaker: Interviewer
  text: Yeah. How come you went to navy? Did you select navy for a specific reason?
- speaker: Respondent
  text: I guess actually it would be kind of a double - it was always something everybody always talked about, join the navy,
    see the world, sort of thing. My brother was also in the navy so, you know, it just sort seemed like the right thing to
    do.
- speaker: Interviewer
  text: Yeah. What'd you do when you got out of the navy? What year did you get out?
- speaker: Respondent
  text: I got out in the beginning of '66.
- speaker: Interviewer
  text: Anything spectacular in the navy that you recall? Any action, firing of guns or God-knows-what?
- speaker: Respondent
  text: Well, yeah but, that's tough to tell. When we'd go to Vietnam, we took the barges up the river with all this stuff
    for when they're doing something, we go through. And we got shot at a couple of time by snipers, we had to pull stuff
    out, but we never really saw any action. It was kind of like going to the movies. You'd see the rockets off at a distance.
    One time we were tied up in Saigon, and they'd get some guys come off a boat, there's a fight, five of us were watching
    it. And the guy goes into the water - so there was nothing real outstanding in terms of it, because like I said, it's
    not quite real.
- speaker: Interviewer
  text: Yeah, did you have, do any shore duty? Not shore duty, but were released to go on shore at all, during the Vietnam
    tour?
- speaker: Respondent
  text: Oh yeah. You could go, you went into different towns, you know the things you could go over, mostly bars and stuff.
    And then, we did a lot of - we'd actually follow Russian trawlers and we had radio jamming equipment on the back. Sometimes
    they'd stop and we'd have everyone go in, and go swimming and get back on the thing. So we just had, we'd spending the
    time going up the rivers, or sometimes we'd stop down, when you left there we'd always go - they'd take - Hong Kong for
    R&R, we'd stop in Hawai'i on the way for break and stuff like that.
- speaker: Interviewer
  text: Oh, so you did see a little of the world?
- speaker: Respondent
  text: Oh yes. We went to the Philippines - we always went to the Japan, Philippines, Hong Kong, Vietnam, Guam, Hawai'i.
    And then actually when we're in Japan one time, I took the train and went up to Tokyo, and stuff like that.
- speaker: Interviewer
  text: Oh yes, okay. So you did see a little something when you were there, besides a little something other than a tin can.
    What kind of vessel were you on?
- speaker: Respondent
  text: Fleet tug. Ocean-going tug that I spent the whole time on, and actually it was interesting, because the whole crew
    changed four times while I was on there. Basically I stayed there until the time I got out of boot camp until the time
    I got out. Which apparently is unusual.
- speaker: Interviewer
  text: How - where did you go and what year?
- speaker: Respondent
  text: Well, let's see, it would have been '61?
- speaker: Interviewer
  text: Yes, in that range.
- speaker: Respondent
  text: Because I went in just when I turned 17, I was born in at '44. Yeah. '61.
- speaker: Interviewer
  text: And you got out in '66?
- speaker: Respondent
  text: Yes, I got an extended four months because of - I think it was the Kennedy assassination, they extended everybody.
    I was actually due to get out on September 16th, and they had the extension that went into effect midnight the 15th. And
    they had already transferred me over to get off. I went over there and the guy looked down and he says, "I'm supposed
    to get out the 27th. I got to stay, you got to - "I says, "You're talking one day!" And he says, "It don't matter, get
    back to the ship." And they were leaving to Vietnam that weekend so I got to ride to Vietnam and then got off, and flew
    home.
- speaker: Interviewer
  text: You didn't want to stay for 20 [the military retirement plan] ?
- speaker: Respondent
  text: Oh no. You know, that wasn't my thing, I was glad to get out when I did.
- speaker: Interviewer
  text: Yeah, I was in the army and I had the same response. What'd you do next?
- speaker: Respondent
  text: Well I got out, I went to work for Montgomery Ward in the warehouse. And then I went to work - I changed and went
    to work - it was kind of an aerospace thing, they did this - they kind of fused glass and melded together for satellites
    and stuff for the government. I worked there for a while, and then my uncle called me one day, and says, "You want to
    go work on the waterfront?" I said, "What do they pay?" Then I said, "Yeah, I'll go."
- speaker: Interviewer
  text: Okay. What did you do in Montgomery Ward? You worked at the warehouse. Was that a Local 6 ILWU?
- speaker: Respondent
  text: No, that was not union. Montgomery Ward was not union.
- speaker: Interviewer
  text: I wonder how they escaped, but they managed.
- speaker: Respondent
  text: '[shrugs] Well, in the sixties it wasn''t...'
- speaker: Interviewer
  text: I mean, a lot of stuff was ILWU and Local 6 in those days.
- speaker: Respondent
  text: No, but not this. This was down - the warehouse, it was basically me and this old lady that priced the tag. That was
    it. There was no, it wasn't just a big - it was just a warehouse for that store.
- speaker: Interviewer
  text: Where was it located?
- speaker: Respondent
  text: Redwood City.
- speaker: Interviewer
  text: Okay, away from San Francisco. Maybe that explains it to some degree. Okay, so what year was it when you were going
    to the Waterfront?
- speaker: Respondent
  text: I went in the Waterfront in '67.
- speaker: Interviewer
  text: You heard they were - so you're in the class of '67 group, the big group, the large group?
- speaker: Interviewer
  text: Is that where you met Jim Brown?
- speaker: Respondent
  text: No, I actually didn't meet him for a long time after. It's kind of funny. I owned a bar with another longshoreman.
    And then I got out and then he got out, it ended up I had the bar myself, for a couple of years, and then I sold it to
    another longshoremen, Jim Brown - no, Jim Fowler, and he sold it to Jim Brown. So Jim and I never met until then. That
    was in the seventies.
- speaker: Respondent
  text: Early seventies. And then just in terms of the bar - because it was right across the street from the hall, and so
    it - Jim and I started somehow working together and became good friends after that.
- speaker: Interviewer
  text: That's interesting. What's your first day on the job like? As a longshore worker?
- speaker: Respondent
  text: Actually, you know, nothing exceptional about it as I remember right. I ended up going on a coffee ship and you know,
    I'd spent half my life hauling hay so it was no big deal. We worked it and stuff so it was, you know, just kind of a normal
    day.
- speaker: Interviewer
  text: Nothing spectacular to it, nothing you recall for it, huh? That's interesting.
- speaker: Respondent
  text: Not really, no. First day was, you know. The more interesting was that kind of the idea of just going to hull and
    get your job. But in those days, like the coffee, you know which, they left that kind stuff for the B-man. You go there
    and it was good for a week, you know? Because you had to dig all the way down, make the palettes and stuff. And we didn't
    normally work, you work hour on and a half hour off. So you get your break and, you know, to me that was fine. So you
    know -
- speaker: Interviewer
  text: What products did you find arduous, or difficult or unpleasant?
- speaker: Respondent
  text: Well, I mean, you know, when we're doing hides, it gets a little bit smelly, but as far as, in general, other than
    that, it was no big a deal. The only - the one I used to dislike, I guess I should say, they used to do these big sheets
    of like, sheet metal, sort of thing. And they'd be up, they put the wires on them and you'd pick them up and if they did
    them wrong or they'd bump something, it would slip off, and you kind of could wear yourself out just staying out of the
    way from things slipping and stuff. So after a little bit I tended not to go over where the steel dock was, you know,
    in the beginning when they did that, until later on.
- speaker: Interviewer
  text: Have you heard much about unions became you came into the ILWU? It's your first union job, as far as I can tell.
- speaker: Respondent
  text: Well it was, yes. Yes and no. You hear about them all the time you did the thing - my dad was a union carpenter and
    my uncle was a union plumber. And you know so, yeah I heard about it, but it wasn't something that was a, big deal sort
    of thing until - like I said, when I got the job, basically the thing I asked my uncle was the pay because at that time
    I was married, had a baby and a baby on its way, so I was more interested in doing, taking care of the family. I learned
    most of what I knew about unions after I got there.
- speaker: Interviewer
  text: Yeah. I was going to ask you, you know, what, if you can recall, what your impression was when you first engaged with
    or meet the ILWU culture? You know, it's a whole world view.
- speaker: Respondent
  text: Oh you know what I'll tell you, it's a totally different life. Normal thing, you go down there, and all of the sudden,
    the people are totally different from what you think in terms of normal people. One of things that kind of stood out is
    you had the guys down there that, you know, spent a lot of time imprisoned, guys that just - it was different in general.
    But it was interesting, you know. And most of them were great guys, they were nice - other than, the old-timers who didn't
    want you doing certain things. But I actually was real comfortable being there. But it was more, it was kind of different
    in terms of the people and the way you get the jobs, you go up, you got to figure it out, so you had to adjust to that,
    but you know, that was okay.
- speaker: Interviewer
  text: I'm also thinking of the union's politics too. Its social justice causes and all the left-wing, right-wing squabbles
    and so forth. I don't know if that's the right word but -
- speaker: Respondent
  text: Well actually, it probably is, but you know, really, I think probably the biggest thing on a lot of that stuff - some
    of that stuff you're for it, or you go against it. But it's like, you go to the meetings, and people would get up there
    and they are talking. Okay what the hell are they even talking about this for? And you sit there and it's just kind of
    something that made the union meetings go on longer and stuff, and you're going,
