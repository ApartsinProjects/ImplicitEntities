collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Okay, Bill, shall we start at the beginning? Where you were born?
- speaker: Respondent
  text: Well, I'll think back to I would say five years of age when my mother first took me to school.
- speaker: Interviewer
  text: Where was that at?
- speaker: Respondent
  text: The kindergarten in Kansas City, Kansas. And I'll do as much as I possibly can, you know, straight through.
- speaker: Respondent
  text: This was in Kansas City, Kansas. My mother would take me to school right along with my sisters and brothers. I'm from
    a large family. I have two sisters and two brothers, two older and two younger. I'm the middle of the family.
- speaker: Interviewer
  text: Brothers are older or sisters are older?
- speaker: Respondent
  text: I have an older brother and an older sister and a younger brother and a younger sister - and I'm in the middle - so
    we had it pretty rough from the very beginning. It's always been tough, as everybody would say. But my father was kind
    of good at drinking. I can always remember that. He had a habit, but he made a living, a very basic living. I didn't ever
    really get to know my father because he wasn't around.
- speaker: Interviewer
  text: What did he do to earn a living?
- speaker: Respondent
  text: He was kind of like a mechanic and just did little odds-and-ends jobs, but he did have a steady job. At that time
    $20 a week was quite a bit of money, seemingly.
- speaker: Interviewer
  text: When was this? What year?
- speaker: Respondent
  text: Oh, this goes back - If I'm sixty-five and I was five years old - I was born in 1925, February 28 - that would mean
    1930 that I could start relating to my livelihood and so forth. So in 1930, if you want that particular year, all of this
    started in my mind's eye. I can remember a few years maybe prior to that, like before going to the kindergarten and the
    first grade and so forth. But it all started there in my mind's eye. My father, even when I was at the age of five years
    of age, was able to play the saxophone. He played a few songs, and that inspired me. I liked the sound of it. So many
    years passed - I would say about five years. I was ten years of age. I took a stab at taking the horn out of the house,
    because we were all offered an opportunity to study music at the Dunbar Elementary School in Kansas City. So I asked Mom
    if I could take the horn out. She said, "Yes, but your father had better not find out." And I did, I sneaked it out. It
    was so heavy. I was such a little guy at my youthful age.
- speaker: Interviewer
  text: Was it tenor or alto?
- speaker: Respondent
  text: It was alto. Later on he found out that I'd been blowing it, because the reed was wet. I had never thought that that
    would be a giveaway. He said, "I knew somebody had been blowing the instrument, but it's okay." He said, "You take care
    of it, and it will be okay." I was happy that we got that behind us. In the meantime, my lessons were quite strange. They
    were like ten cents an hour, and there were about sixty people who would stand in line for this one teacher to teach individually.
- speaker: Interviewer
  text: Was this a private teacher or at school?
- speaker: Respondent
  text: A schoolteacher. He would only come once a week, and I'd take a lesson for ten cents and maybe get to see him twice.
    The time that I spent with him was a few seconds, because he was trying to get around to sixty people or more in the one
    hour with all of the instruments that everybody plays. So he knew quite a bit. He was good. His name was Carl Brown. I'm
    sure he's long gone. But it was kind of nice and fun. I was lucky. On the way home from school, about three in the afternoon,
    there was a WPA organization - band members, older guys, adults. It was more or less a work project they had in this little
    church house on I think it was Fifth Street, Fifth and Cleveland in Kansas City. This big band of people would be playing,
    and I couldn't stand it, I had to nose my way in. I opened the door to this church, stood in the back room. Nobody said
    anything to me. I had the horn in my hand, in the case, naturally. And no one said anything. I'd stand there maybe an
    hour. I had to get home, but I'd just stand there listening, hanging around. So one day, after about a week or so, the
    conductor called me up. He didn't know my name, but he wanted to get my attention, so he gave me a nickname. I won't state
    the nickname. [laughter]
- speaker: Interviewer
  text: Why not? [laughter] Why not?
- speaker: Respondent
  text: He said, "Come up front." So I did. He gave me a name, and from that day on my name in Kansas City has been that name
    that he called me. I can't get out of it. Even now certain people who knew me when I was a child call me by this nickname.
    And I won't reveal it to you. [laughter] Anyway, he told me, "Go over there, take your horn out. Sit with that fat fellow
    over there." He was speaking of a fellow by the name of Virgil Hill. Virgil was good enough to make a living at it. He
    played in nightclubs, and he was in this band just doing a little reading. I could tell it was mediocre, but he was able
    to make the project band. There were about forty members in this band, by the way. They had tuba, a bass fiddle. They
    had two or three French horns. They called them peck horns at the time. They were actually mellophones. That was more
    popular for that kind of a band.
- speaker: Interviewer
  text: What kind of music?
- speaker: Respondent
  text: All kinds. Concert, we had pop, opera music, we did some Puccini. We did a whole bunch of things. Carmen. I remember
    playing that back there. We did mainly marches like "Semper Fidelis."
- speaker: Interviewer
  text: Oh, yeah, John Philip Sousa marches.
- speaker: Respondent
  text: We did all those marches. "Washington Post" and "Bourbon Street Parade," all kinds of songs of that nature. But I
    was lucky enough to get the opportunity to sit with this fat fellow, Virgil Hill. And he said, "Just look over my shoulder.
    Take your horn, and when you feel you know your way around, just start blowing." So I learned something there, just watching
    the notes. And I would take the music home. They'd let me take it home and practice it. I was so busy and interested in
    it that I didn't learn to play football or basketball or baseball -
- speaker: Interviewer
  text: This was really your life?
- speaker: Respondent
  text: I did a little bit of it, but not enough to really get to like it. I was pretty strong also. I could wrestle very
    well. I could lick anybody my age. My oldest brother would be helping me out, and I got pretty strong.
- speaker: Interviewer
  text: So nobody was going to tease you for not playing football. [laughter]
- speaker: Respondent
  text: Yeah, I didn't learn to play football. Made jeeps. I flew kites, and wagons. Mainly, my thing was bicycling. I became
    quite a cyclist. I could stand on a bicycle going down the street with no hands and actually steering it with my foot
    hooked around the seat in back - The foot was actually on the fender and leg hooked around the seat in front, the left
    foot in between the two designed bars up front right behind the handlebar. And I was able to stand and cycle without any
    hands. I could turn it, and I never fell.
- speaker: Interviewer
  text: Great sense of balance.
- speaker: Respondent
  text: No hands, you know. But I wouldn't dare think of doing that now. [laughter] That's impossible. I don't know how I
    ever came to doing such.
- speaker: Interviewer
  text: Yeah, you know no fear back then.
- speaker: Respondent
  text: Anyway, it was kind of nice. I was able to do such as I'd show off to my friends. I was quite athletic. I learned
    how to do a backward flip in the air, and I could leap over twelve of my friends side by side on their knees on concrete.
    I'd take a running - You know, a run and leap over all of these guys and tuck my head under and roll over to a stand.
    But I was into that kind of thing. And then, to get on with the story as it unfolds, that is, about the age of twelve
    I ran into Louis Whitworth, who was in this big band, the WPA band. He was playing first clarinet and had been studying
    with a symphony player in Kansas City, Missouri. He was quite good. He was the best around on clarinet. So that whole
    band, knowing that I was interested in playing clarinet - I'd learned how to play the saxophone part in the band, and
    I didn't think it was challenging anymore, so I asked if I could have a clarinet. They all chipped in without any question
    and bought a clarinet for me.
- speaker: Interviewer
  text: Really? Everybody in the band?
- speaker: Respondent
  text: Everybody in the band. They willingly did it, knowing how much progress I'd made with the saxophone in such a short
    time reading, because I'd take my part home. I came back, and I was getting stronger all the time with that. So Louis
    Whitwor
