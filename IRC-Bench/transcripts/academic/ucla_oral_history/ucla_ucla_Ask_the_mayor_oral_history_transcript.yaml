turns:
- speaker: Interviewer
  text: Well, let us start with your youth, where you were born. And could you tell me something about where you were born,
    who you were born to, and when you were born?
- speaker: Respondent
  text: Well, I was born in University Place, Nebraska, which is now-- University Place was later incorporated into Lincoln,
    so you can say Lincoln, Nebraska, but it was University Place, a suburb.
