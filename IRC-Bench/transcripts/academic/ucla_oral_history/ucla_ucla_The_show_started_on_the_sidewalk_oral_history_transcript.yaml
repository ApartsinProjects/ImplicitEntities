turns:
- speaker: Interviewer
  text: I'd like you to tell us something about your family background, where your parents are from.
- speaker: Respondent
  text: All right. My father was born in Springfield, Missouri, in 1865, and my mother was born in Portland, Oregon, in 1870.
    She was a very little girl when her family decided to go to Chicago. It was just after the Chicago fire. They traveled
    partway by covered wagon and partway on the new railroad that had just been partially completed. After being in Chicago
    for a short while and subject to the ravages of the Chicago fire, my mother's parents, whose name was Stiller, decided
    to buy a furniture store. The furniture store was named Goldstein's and had a very handsome sign over the front entrance.
    They found it would cost too much to change the sign, so instead of being called the Stiller family, they were known in
    Chicago as the Goldsteins. My mother went through school under the name of Hattie Goldstein, but their name was Stiller.
    When I was in business outside the United States, it was the custom in Latin America, probably still is, to use the initials
    of the mother's family name at the end of your surname. Therefore, I was known as Charles Lee S., but in the United States,
    it is S. Charles Lee. Both of my parents had an extreme reverence for integrity and morality. Although they were not severe
    church people, they, of course, never denied their religion and they were meticulous that every move they made reflected
    their character as being beyond reproach. My father was a traveling salesman for a wholesale ready-to-wear business. In
    those days, the traveling salesmen would take quite a few trunks of their samples and travel to different cities. In the
    case of my father, he traveled to the West Coast, which was pretty wild in those days, took my mother along, who was a
    perfect thirty-six, and used her as a model. When he would get to a town-- which were, in many cases, were rather small
