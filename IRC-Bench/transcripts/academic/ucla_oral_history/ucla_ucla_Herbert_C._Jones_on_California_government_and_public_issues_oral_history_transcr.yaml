collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: I know that you were born in Iowa. Did you stay in Iowa very long?
- speaker: Respondent
  text: I was there just during infancy in fact I have no recollection of Iowa. My father was a professor at Penn College,
    a Quaker college, at Oskaloosa. Then he went to Germany and studied at the universities of Bonn and Muenster for about
    3 years. Then when he came back, he became principal of the high school in Colorado Springs, and then from there he went
    to Nevada where he was president of the University of Nevada in the late 80s and early 90s. From there we came to San
    Jose. Our family came to San Jose because there were a number of Quaker families here, some of whom had attended Penn
    College when my father was an instructor there. But from the time of my grammar school education, the completion of that
    clear on through high school and college, we have been in San Jose ever since.
- speaker: Interviewer
  text: What was your father doing here?
- speaker: Respondent
  text: He was in business. He had retired from the educational work and was in business, in investment and financial adviser.
- speaker: Respondent
  text: I got here about the time there was quite a political upheaval in this county. The year I graduated from high school,
    my brother, who was two years behind me, was part of a migration of—oh I guess 150 high school students who had graduated
    from San Jose High School and went over to Santa Clara High School. The boys marched through the streets of San Jose chanting
    'Left, left, Johnny McKansia got left.' I went to Stanford that fall but my brother was part of the group that went over
    to Santa Clara.
- speaker: Interviewer
  text: At that time one of the political leaders in San Jose was Johnny McKansia?
- speaker: Respondent
  text: Yes, he and J. Ray were the leaders of the political organization here. The Board of Education here had fired a Latin
    teacher, Professor L. R. Smith, who was very popular; it was looked upon as a political move to fire him and that caused
    the migration to Santa Clara. There was organized then in this county what was called the Good Government League.
- speaker: Interviewer
  text: By the Hayes brothers?
- speaker: Respondent
  text: Yes. That was J. O. Rayce and K. A. Sayre. They were at the head of the movement. I was quite impressed by that movement.
    A few years later came the Progressive movement throughout the nation.
- speaker: Interviewer
  text: What was your father's politics?
- speaker: Respondent
  text: He was a Republican; he was a member of that Good Government League. In fact he was a delegate to the famous Republican
    convention in Santa Cruz in 1906. He had a kind of innate idealism in politics. That's what prompted him to make the slip
    he did in support of the candidates he did in local politics.
- speaker: Interviewer
  text: You think you've been more conservative or more liberal than he?
- speaker: Respondent
  text: I think more interested in politics than he was. I think he leaned more to business. In our case I don't think that
    either generation would have departed very much from the other, although I've seen numerous instances where in one family
    the younger generation assumes a mental attitude of their parents believing they are so progressive or revolutionary.
    I've seen that in at least one case where the other thing is true. They go quite an on a conservative. An outstanding
    example of loyalty to the older generation is the McClatchy family, owners of the Sacramento Bee. The original McClatchy
    founder of the paper had a liberal forward-looking outlook. His sons, C. K. McClatchy and J. S. McClatchy, loyally carried
    out his policies. Later still the family of C. K. McClatchy, the third generation in the ownership of the Bee, have likewise
    maintained the slant of the founder. In only one respect, so far as I know, have they departed from the views of the elder
    McClatchy. He was a supporter of Henry George's 'Single Tax' theory. The present generation of the family do not espouse
    this principle of taxation. Incidentally the profit tax by the government accomplishes practically the same results as
    the 'Single Tax'.
- speaker: Interviewer
  text: When you went to college, did you want to be a lawyer very early, or was that a rather late decision?
- speaker: Respondent
  text: That decision was made the summer just before I entered college. I graduated from high school; I had come to no decision.
    But there was a man by the name of Mr. Dougherty who was the bookkeeper or cashier at the Vendome Hotel. He'd known our
    family in Nevada and he used to come out and visit us Sunday afternoon, and after I graduated from high school on the
    occasion of one of these visits he asked me what course I was going to take in college. I said, 'Well I'm not decided
    yet.' He said, 'If I had my life to live over again I'd be a lawyer.' He said, 'I think there are broad opportunities
    there.' It was his talk that of course influenced me to take the law course.
- speaker: Interviewer
  text: What kind of lawyer did you want to be? Did you think of it as a springboard for politics? Or did you want to make
    money?
- speaker: Respondent
  text: Well it was the idea of going into a profession for the purpose of earning a living, just as a doctor or an engineer.
    So I didn't think of it then as a springboard for politics.
- speaker: Interviewer
  text: You weren't messing with influencing politics, I guess, at the age of seventeen?
- speaker: Respondent
  text: No, I think that most young men of that age, high school and college age, have a certain idealism. And I know in one
    of my classes in political science I wrote on or talked on the political boss—pretty immature or naive. I had the idea
    that it was easy to get rid of the political boss. I didn't appreciate then that he was the product of a system I hadn't
    studied Bryce's American Commonwealth sufficiently.
- speaker: Interviewer
  text: What did you do as president of the Republican Club at Stanford? What sort of activities did the club participate
    in?
- speaker: Respondent
  text: I don't know whether the boys deserve so much credit for their political interest. They were more or less capitalized
    on by the Republican Party managers. In the big rallies, the final rally of the campaign in San Francisco or here in San
    Jose, the managers wanted the enthusiasm and noise of a friendly audience so they'd get several hundred college boys.
    We had summer rallies here in San Jose in the old Garden Theatre. Some of the California boys came down and Stanford boys,
    and the management, you see, welcomed the enthusiasm and noise, so they cultivated all these political clubs.
- speaker: Interviewer
  text: I see. Were you for Pardee when he ran for governor?
- speaker: Respondent
  text: Yes, I was on his platform. I remember Pardee was very gracious—we had a meeting in the old Victory Theatre here in
    San Jose. He was a candidate for government. I was surprised that I would have a little time on the platform to speak
    for the Stanford Republican Club, which I did. That's when I first met Pardee who afterwards became Governor. In those
    days even in the county, elections were on a party basis, not a nonpartisan. All the candidates traveled to get votes
    under the Republican banner or the Democratic banner, and there were meetings in the schoolhouses and locales throughout
    the county and all the different candidates of the party would appear to gather, but it was a Republican ticket or a Democratic
    ticket. And sometimes they would hire a little window dressing outside of the candidates themselves, they'd get some political
    blinder from San Francisco and they'd sometimes have a college boy I traveled around the county here at those elections.
- speaker: Interviewer
  text: Did you see anything underhanded at that time? I knew that the SF was still in control pretty much at that time; were
    you aware of that?
- speaker: Respondent
  text: Well, I was aware of it in a general way but the upheaval had not come then and to be perfectly frank we didn't pay
    much attention to it; it was the excitement of the political campaign and being given a little recognition by the party
    manager that appealed to us.
- speaker: Interviewer
  text: Didn't Pardee run against Lena?
- speaker: Respondent
  text: Franklin K. Lane, a Democrat.
- speaker: Respondent
  text: I've forgotten who the Democratic candidate was but at that time it was before I had much of an insight into the control
    of the state by the political machine. You liked the color and the excitement and your family was Republican, so that
    was what made you Republican. That was the idea. Like most young men I went to the church of my parents and belonged to
    the party of my parents.
- speaker: Interviewer
  text: After you studied that preliminary to law, you did go to law school and you must have graduated from Stanford, weren't
    you?
- speaker: Respondent
  text: Yes, my class...
