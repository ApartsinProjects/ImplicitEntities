collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Gerry, let's begin with where you were born, what the environment was like, your early musical influences, how you
    got interested in music, things like that.
- speaker: Respondent
  text: Okay, here we go. I was born in New York City on May 12, 1922. I went to all the schools, PS 68, PS 24, Frederick
    Douglass Junior High School, which is PS 139, and the High School of Music and Arts, which La Guardia started.
- speaker: Interviewer
  text: Is that the performing arts high school in New York now?
- speaker: Respondent
  text: No, it was - That's where it is now, I think, but at that time it was the High School of Music and Arts.
- speaker: Interviewer
  text: How did you end up there?
- speaker: Respondent
  text: My English teacher in junior high school suggested that I go there. I wanted to go to Townsend Harris, which was an
    elite school in New York, but you had to be almost a brain to go there. And she advised me that I did not have the brains
    to go there. [laughter] She said, "They started this new school up on Convent Avenue. It's for musicians, and that's where
    you should be." So I took her advice and got in. Only, they had so many piano players that I had to take another instrument,
    and I chose bass violin. Why? I don't know. But I did.
- speaker: Interviewer
  text: Had you ever played it before?
- speaker: Interviewer
  text: Did they have an audition or something?
- speaker: Respondent
  text: No. It didn't make any difference. You had to choose another instrument, because everybody that went there played
    piano. Most of the students were piano players, and they had to form a symphony orchestra. So I took up bass violin, and,
    surprisingly enough, I became very good at it. In fact, I was the first-chair bass player. [laughter]
- speaker: Interviewer
  text: But your love was piano, after all?
- speaker: Respondent
  text: Yeah, but it didn't matter. There were piano players so good up there that it was a shame.
- speaker: Respondent
  text: Yeah. Oh, yeah.
- speaker: Interviewer
  text: Any names you remember from then who we might know now?
- speaker: Respondent
  text: Well, not - I remember most of the guys - Like Shorty Rogers, he came after me. Shorty Rogers went to Music and Arts.
    There was a young man, Sid Garris, a little ahead of me. He was one terrific violinist. I think he came out here and became
    a president of MGM or something. And Brock Peters also went there. It was a different name, and I won't tell you that
    name, because I don't think he wants to remember it at all. [laughter] But, let's see. Anyhow, it was quite a school,
    and most of the kids who went there did very well for themselves.
- speaker: Interviewer
  text: Really? Musically, you mean?
- speaker: Respondent
  text: Musically, yeah.
- speaker: Interviewer
  text: When did you start playing?
- speaker: Respondent
  text: When did I start playing? Well, my mother had me taking lessons when I was four years old, which, you know, that was
    ridiculous. But that's what she wanted. I remember my first teacher was a lady by the name of Margaret Murray. She brought
    me along till I got pretty good. And I went to a gentleman by the name of Carl Diton, and that was a struggle, because,
    at that time, Mr. Diton's favorite pupil was - How can I forget? Now I've got to wait till it comes back to me.
- speaker: Interviewer
  text: Well, we'll get it in later.
- speaker: Respondent
  text: Yeah, and he used to - Calvin Jackson. That was his star pupil. Anytime I'd go to take a lesson, he would tell me
    how Calvin did. [laughter] You know, I loved him for that.
- speaker: Interviewer
  text: Calvin Jackson was older than you were, then? Or were you guys about the same age?
- speaker: Respondent
  text: Oh, yeah. He was older than I was. Yeah.
- speaker: Interviewer
  text: Much older than you?
- speaker: Respondent
  text: And Mr. Diton stayed with me, you know. He let me make a fool of myself. I learned quite a bit from him. But it was
    all classical music, you know.
- speaker: Interviewer
  text: Strictly classical, your training?
- speaker: Respondent
  text: All classical, yeah. And this went on it seemed like for years until I found out I couldn't make a living in New York
    playing classical music. There just was no place for us at that time. So I got into jazz. While I was at Music and Arts,
    Benny Goodman used to come up with Teddy Wilson and Gene Krupa, and they'd play little concerts for us.
- speaker: Interviewer
  text: They came up to the school and played?
- speaker: Respondent
  text: Up to the school, yeah. The gymnasium was packed whenever they came, you know. You almost had to know somebody to
    get in.
- speaker: Respondent
  text: At that time, Teddy Wilson was my favorite piano player. I said he was the greatest thing that ever happened, until
    I heard Art Tatum. [laughter] That changed everything. And I got to meet Art, and Art got me my first job. He got me a
    job with Stepin Fetchit, of all people. I went on the road with Stepin Fetchit one summer. I was about seventeen years
    old.
- speaker: Interviewer
  text: Good beginning, though.
- speaker: Respondent
  text: Yeah, well, you know, I thought I was hot stuff. but I really didn't know anything. [laughter]
- speaker: Interviewer
  text: Well, that's not bad for a seventeen-year-old.
- speaker: Respondent
  text: Well, yeah, but, you know, it was like background music. And I'd help him with his act a little bit, you know. He'd
    do little funny things.
- speaker: Interviewer
  text: When you were a kid and you had this straight, classical training, were you listening to jazz on the side? I mean,
    when you were away from your teacher -
- speaker: Respondent
  text: I was listening to it, but not thinking of getting into it.
- speaker: Interviewer
  text: Really? You never played it on your own time?
- speaker: Respondent
  text: Well, this came a little bit later on when I found out, if you played the parties, the little girls would flock around
    you. That's when I started to take an interest in piano. [laughter] And before, I really couldn't care less.
- speaker: Interviewer
  text: They didn't want to hear Chopin or - ?
- speaker: Respondent
  text: The guys were out in the street playing stickball, and I was upstairs practicing. It used to gripe me. And I practiced.
    Mom got me up a half hour before I had breakfast, and I'd go to school. When I got home for lunch, another half hour.
    And then, when I got home, three or four more hours.
- speaker: Interviewer
  text: That much playing?
- speaker: Respondent
  text: Yeah. I was practicing, and she made sure that I did it.
- speaker: Respondent
  text: Now I wish I had worked harder at it, but you never know where you're going.
- speaker: Interviewer
  text: That was pretty hard for a young kid. That's four hours a day. Wow.
- speaker: Respondent
  text: Yeah, while all the kids are outside playing, too. Yeah. Actually, I wish I'd have done eight hours a day, because
    that's what it takes to really become a good musician. But it worked out pretty well. I got lucky, and I learned a few
    things.
- speaker: Interviewer
  text: Was there anybody else in your family who played music? Or was this just sort of your mother thinking that you really
    should master this?
- speaker: Respondent
  text: Well, all my people were church people, and my mother played piano. So I naturally had to play piano at church, too.
    And I had a cousin that was a whiz on the violin. His name was Romaine Brown. He died a few years ago. He was the top
    violinist at Music and Arts. We both went to Music and Arts. But he ran into the same problem; he couldn't make a living
    playing classics. And so, next thing I knew, he was playing piano. But he sang and did a- He was more of an entertainer
    than a real piano player. He died a few years ago. But he was one hell of a violinist. He was in a group they had in New
    York at the time called the New Friends of Music. This was a classical group. They got a lot of acclaim.
