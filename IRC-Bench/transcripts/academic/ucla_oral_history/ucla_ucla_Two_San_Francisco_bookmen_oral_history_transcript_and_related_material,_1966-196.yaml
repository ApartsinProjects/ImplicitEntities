collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: I was very much interested in reading the autobiographical memoirs of your father, John Howell.
- speaker: Respondent
  text: You can see in them all the people with whom he had worked in one way or another, in all the different fields of activity
    that were a part of his life. Many of the people were related to the book world, but not all of them.
- speaker: Interviewer
  text: Helen LeConte, who is Professor Joseph LeConte's daughter, told me that her father said of your father, "How could
    that bad boy have grown into such a respectable man?" Apparently he had a college reputation for pulling tricks.
- speaker: Respondent
  text: My father's middle initial was G, and he was known as Johnny "Good-Boy" Howell.
- speaker: Interviewer
  text: Who called him that?
- speaker: Respondent
  text: I think his contemporaries in high school. He prepared for medicine, as his autobiography shows. It did not please
    him. This also points up the fact that very few people in the rare book world ever prepare for it. They come in from some
    other field.
- speaker: Interviewer
  text: In his autobiography he said, "I had always loved books." and that was his only explanation for going to Paul Elder's,
    even at a cut in salary from his previous position.
- speaker: Respondent
  text: He dropped into Paul Elder's, found it interesting, and he went right in to it. His activity with the publishing of
    the Berkeleyan identified him with the book world. This was in a sense carrying on his father's publication of a newspaper
    in Healdsburg, the Russian River Flag. His father, my grandfather, in 1868 bought and changed the Democratic paper into
    the Republican paper. It had distinction in northern California. He ran it until 1876. My grandfather's brother [Saul
    Sylvester Howell] was a scholar and a professor at a university in Iowa. He came out with Warren Olney. Their wives were
    sisters. I have the diary that Saul Sylvester Howell kept. He was an intellectual. The two Howell families and the Olney
    family lived in this one house in Healdsburg which is still standing. My grandfather and his brother Sylvester had intellectual
    interests and did publish this paper. They struggled along with it and sold it at a good price, but then went into the
    money brokerage business. I don't know much about that. I don't know about my grandfather's activities after that.
- speaker: Interviewer
  text: Your father mentioned that he went to college and helped pay his own way.
- speaker: Respondent
  text: He did work his way through college. My grandmother had a ranch up in Coifax where my father lived for a year. People
    came there for a vacation. One of the most distinguished visitors was David Starr Jordan. There must have been many others--Charlie
    Keeler. I guess he was Berkeley's poet laureate.
- speaker: Respondent
  text: My father's activity with Paul Elder had a lot to do with the Elder publications. He brought in his younger brother,
    Ray, who was attending the University of California. My father managed Paul Elder's in San Francisco after the fire, while
    Ray, John Henry Nash, and Paul Elder were trying to keep a publishing activity going with headquarters in the East. Paul
    Elder's publications began even before my father was there. It was Morgan Shepard first. Elder and Shepard. Shepard later
    went on to found John Martin's Magazine. I was brought up on that. I suppose that ran into the 1920's. I suppose that
    Paul Elder's was the most important place for the gathering of interesting literary people in San Francisco. They were
    then publishing books by contemporaries who lived here. They published the Cynic's Calendar, which seemed to be their
    best seller. There was Ethel Watts Mumford, Oliver Herford, and Addison Mizner; all of them left this area to go East.
    Also Gelett Burgess, Will Irwin and Wallace Irwin left. These were all people who were active in writing in the early
    days of Paul Elder's.
- speaker: Interviewer
  text: Was your father well acquainted with them all?
- speaker: Interviewer
  text: Did he keep up his friendship with them after they left here?
- speaker: Respondent
  text: Some of them. Some of them came back. I remember the visit of Gelett Burgess, who came back after the years.
- speaker: Interviewer
  text: What was Gelett Burgess like?
- speaker: Respondent
  text: He was a short, fat man with a pleasant way about him. I can not say much more than that.
- speaker: Interviewer
  text: I did not realize until I read your father's autobiography how close a relationship he had with Charles Field.
- speaker: Respondent
  text: Oh, Charles Kellog Field was a very delightful and lovable man. He was one of the great members of the Bohemian Club.
    He was the best man at my father's wedding. He and my father tried to put over a humor magazine, after their years at
    college. My father graduated in 1896 and Charley Field in the first class [at Stanford]. The magazine was called Josh.
    Charley Field was the editor and my father was the publisher. My father also was carrying on the publishing activity that
    he began with the Berkeleyan. I have seen numbers of it; I have never seen a complete file of it. Charley Field was a
    cousin of Eugene Field and of Roswell Field. He was late to the wedding, and the lights went out during the time the service
    was scheduled. It was a good thing that Charley Field was late as usual, or the lights would have gone out during the
    service if he had come on time.
- speaker: Interviewer
  text: Do you remember him?
- speaker: Respondent
  text: I remember Charley Field very well as a man with a very decisive way of speaking. When I first came [into the business]
    in 1932, he had long been in the East carrying on the radio program, "Cheerio," He often made visits to the West though,
    and he kept up a long correspondence with my father.
- speaker: Interviewer
  text: What did he look like?
- speaker: Respondent
  text: He was a very thin, tall man with a very fine aquiline nose.
- speaker: Interviewer
  text: Was he a particularly convivial man?
- speaker: Respondent
  text: Yes, I think one could say that. He is known as the most typical Bohemian in the Bohemian Club. My father did not
    become a member of the Bohemian Club until 1922. He could not afford it, but he enjoyed the friendship of all the literary
    figures of the Club. His first publication was the Bohemian Club Grove Play by Rufus Steele, which was The Fall of Ug.
    That was the only publication of a [Bohemian Club] play that was published outside of the Club. Rufus Steele was one of
    the most beloved members of the Bohemian Club. Later on, I think, he was the editor of the Christian Science Monitor.
    He was very close to my father in the early days before the war.
- speaker: Interviewer
  text: Was your father a Christian Scientist from the time he was young?
- speaker: Respondent
  text: He was brought into it by his older sister and by his mother about 1900, I think. He did read at the First Church
    of Christ Scientist during World War I. He knew all the leaders in the movement throughout the country. They always came
    to see my father when in San Francisco. Many were members of the board of directors and publication committee. For many
    years he was the Berkeley representative for advertising for the Christian Science Monitor.
- speaker: Interviewer
  text: In his years with Paul Elder, did Elder put much emphasis upon rare and old books?
- speaker: Respondent
  text: Yes, they always had rare and old books. They had many departments, more than one can realize. I don't understand
    what they all were. Old catalogues do exist. Besides old and rare books and sets, and new books, they had paintings and
    drawings, and art objects. I believe they took on thirty people at Christmas time. My mother worked there. On her way
    to England she stopped off and worked one Christmas. She met my father, fell in love with him, and the two were married
    in 1905. I have heard that story many, many times.
- speaker: Interviewer
  text: Did your father spend more time on the publications of Paul Elder's than on the other affairs of the shop until he
    started traveling for the company?
- speaker: Respondent
  text: He, as I understand it, was general manager from shortly after he started there until 1912. He was working right under
    Mr. Elder. He was always "Mr. Elder." My father was always "Mr. Howell." My father said one time, and I think he partially
    meant it, that if Mr. Elder had ever called him "John," he probably would never have left Paul Elder's in 1912. My father
    quotes in his memoirs that Gertrude Atherton passed them on the street and spoke of the "young Mr. Howell and the correct
    Mr. Elder."
- speaker: Interviewer
  text: Was Mr. Elder quite a formal man?
- speaker: Respondent
  text: Yes, very formal and aloof.
- speaker: Interviewer
  text: Was your father's first association with John Henry Nash at this time?
- speaker: Respondent
  text: Yes, this is when they became associated, when Nash was first with the two Taylors. My father introduced Mr. Nash
    to two men who became the greatest patrons of the book that we have seen. One was William Andrews Clark, Jr., and one
    was Charles W. Clark; they were my father's best customers when he started in business for himself. This was particularly
    true of Charles W. Clark, who lived here. They are well known as being the sons of Senator Clark of Montana. The catalogue
    of the Charles W. Clark library, Volume I, carries my father's name as publisher. After that John Henry Nash's name began
    to appear. That is typical; John Henry Nash took over and ran things. He took everything to himself. Nash knew everything
    and knew best how to run everything. How their misunderstanding came about--my father gave Harry Nash all of his printing.
    Since Harry Nash had such fine ideas, we had three grades of stationery. Harry Nash bought books from my father. Harry
    Nash took over the printing of the Ruth St. Denis Pioneer and Prophet, and Ted Shawn, her husband, who was a very close
    friend of the Howell family, hadn't very much money. He owed my father a lot of money, about $8,000. The book was to be
    a $7.50 book, but with John Henry Nash it became such an expensive book that Ted Shawn and Ruth St. Denis were years paying
    off the bill. Harry Nash could not be told very much about how things should be done. He was used to printing books for
    people where the cost was unimportant. I have a correspondence somewhere between my father and Harry Nash. My father claimed
    quite correctly that he was being charged exorbitant prices for the printing of stationery; Henry Nash said that he was
