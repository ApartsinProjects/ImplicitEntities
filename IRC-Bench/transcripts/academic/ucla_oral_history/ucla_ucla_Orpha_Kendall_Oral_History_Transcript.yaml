collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Orpha, we've been trying to get together to do this for a long time - so finally! It's sort of a gray, snowy day outside;
    and up Black Canyon it is so beautiful here. Not much has been written or said about Muriel MacGregor, the person; and
    you're about the only one left who knew her personally and who could throw some light on Muriel, the person. How about
    starting at the beginning, which is always a good place to start. When did you move to Estes Park?
- speaker: Respondent
  text: I moved to Estes Park in October of 1961, and we were living over at the Black Canyon Ranch, over at Dr. Myers.
- speaker: Interviewer
  text: Now, is that where the Black Canyon Restaurant is now?
- speaker: Interviewer
  text: All right. Was it a restaurant or a ranch?
- speaker: Respondent
  text: It was a restaurant. It was a dude ranch.
- speaker: Interviewer
  text: A dude ranch, O.K.
- speaker: Respondent
  text: They had horses there and cabins and things, but we were building condos.
- speaker: Interviewer
  text: I see. That was the purpose. Your husband Orval is a contractor,
- speaker: Respondent
  text: Yes, and we lived on the ranch, and he was building the condos that winter.
- speaker: Interviewer
  text: Now, approximately how far is that? We're overlooking Black Canyon right now.
- speaker: Interviewer
  text: The restaurant?
- speaker: Respondent
  text: About a half mile.
- speaker: Respondent
  text: And at that time the MacGregor property surrounded Dr. Curry Myers' property. What is Black Canyon Hills was MacGregor
    property. It was divided up in '57, I guess, and the relatives got fifty-seven acres of our Elk Pasture, we call it. But
    I met Muriel because she kept cattle up there, and the fences were down. I fixed fence day after day trying to keep the
    cattle in, and so one day I decided I'd just bring them back over here. I knew who she was and where the cattle belonged,
    but I hadn't met her. So, I was coming down the road behind the cattle, and this old Ford pulled up beside me. She said,
    "Are these your cattle?" I said, "No." And she said, "Where are you going with them?" I said, "I'm going to take them
    home. They belong to Miss MacGregor." Muriel MacGregor probably I said - although I never called her Muriel to her face.
    Everybody else did, so I'm sure that I said that they belong to Muriel MacGregor and that I'm taking them back over to
    her place. And she said, "Well, I'm Muriel MacGregor, and those are my cattle. What I want to know is why you didn't just
    call the police instead of taking the cattle home?" I said, "I never thought to call the police when cattle are out. I
    come from a farming community, and when you see stock on the road, you put it in - you don't call the police." She said,
    "Well, anyone else would have called the police." And I could hardly believe it.
- speaker: Interviewer
  text: That's rather indicative of her frame of mind at that point.
- speaker: Respondent
  text: That's right, and she was right! Anyone else would have.
- speaker: Interviewer
  text: Because they did,
- speaker: Respondent
  text: Yes, I found out afterwards that I was the oddball.
- speaker: Interviewer
  text: This was in 1961 in the fall?
- speaker: Respondent
  text: Yes, about the first of November when the cattle were getting hungry and the grass was getting poor over there. So
    I brought them in, fixed a little fence here, then I stayed, and she took me back. She drove me back. And, of course,
    I'd heard all the stories that there were to hear about her, being a newcomer and so close.
- speaker: Interviewer
  text: What kind of stories?
- speaker: Respondent
  text: Oh, how she carried dead calves around in her car. I'll have to admit I did look to see whether there were any dead
    calves in the car. There weren't. She was a very soft-spoken woman. I thought, "Well, you know, maybe I should forget
    these stories and just find out what she's like because it seemed like just going back - maybe I spent fifteen minutes
    with her - and, oh, she thanked me profusely for bringing the cattle in. I thought well maybe she isn't quite as bad as
    the stories, you know. So, every time I would hear something I'd think about this soft-spoken lady who had taken me back
    and how quiet she was. And, then, we were looking to rent something else, and there was an ad in the paper of a house
    to rent. It was on Evergreen Lane, and I thought it would be real handy. It was so close to my husband's work.
- speaker: Interviewer
  text: Yes, now where is Evergreen Lane?
- speaker: Respondent
  text: It's right where - just past Otie Whiteside's.
- speaker: Interviewer
  text: Off of Highway 36?
- speaker: Respondent
  text: No, it's just right down here.
- speaker: Interviewer
  text: Oh, you mean almost adjacent to MacGregor Ranch.
- speaker: Respondent
  text: Just on the other side, and it was just almost straight across from the entrance to the Black Canyon Restaurant. So,
    I called about it, and the lady said that she would meet me there at a certain time. It was Miss MacGregor. But the house
    wasn't what we wanted. It wasn't large enough. We still had a son at home then, and this was a one-bedroom house with
    a sleeping porch. The sleeping porch was strictly summer. It's what we call the Aunt's House. Well, Miss MacGregor just
    wanted us to rent that house so bad. She would have done whatever she had to so that we could rent it. I realized from
    that that she was very lonesome.
- speaker: Interviewer
  text: She was reaching out for friendship.
- speaker: Respondent
  text: Yes. So, I started running over when I had time. It wasn't on a daily basis, but maybe once or twice a week.
- speaker: Interviewer
  text: Did you rent that house, or did you rent elsewhere?
- speaker: Respondent
  text: No, we did not. We rented elsewhere. I also had my mother-in-law with me at that time. Before that winter was over,
    we did; and so I needed more room. So, we bought a house out on High Drive. But as I'd come to town, I'd run out and see
    how things were going over at the job. Then, I'd come out over here. So, by spring it was almost a daily thing. I'd stop
    and bring her mail from the mailbox on the corner. She was crippled up real bad, and she'd had a stroke.
- speaker: Interviewer
  text: Now, this was in 1964?
- speaker: Respondent
  text: Sixty-four and the spring of '65.
- speaker: Interviewer
  text: She was born in 1904, so she was 60,
- speaker: Interviewer
  text: About 60 at that point, we'll say,
- speaker: Respondent
  text: She was a heavy woman, and she'd had a stroke that affected her left side so it was hard for her to get around. By
    the spring--
- speaker: Interviewer
  text: Prior to the time you had met her, she'd had a stroke?
- speaker: Respondent
  text: About fifteen years before. She told me that--
- speaker: Interviewer
  text: About age 45?
- speaker: Respondent
  text: Uh-hm. She told me that she had fallen in the road one night on the ice. She was at the cabin out by Mary's Lake and
    hurt her hip, but afterwards the doctors said that it had been a stroke.
- speaker: Interviewer
  text: It had been a stroke that had dropped her,
- speaker: Respondent
  text: And that's the reason she couldn't get over it.
- speaker: Interviewer
  text: It does seem young, doesn't it?
- speaker: Respondent
  text: It was. So, by the spring she was wanting me to take her to the chiropractor down in Loveland. We didn't have one
    at that time. So, I started taking her once a week. My son had gone to service by then, and he was in Vietnam - was getting
    ready to go to Vietnam, I guess; and she kept up on the news and always visited about him, you know. Then, we had some
    grandchildren, and she visited about the grandchildren.
- speaker: Interviewer
  text: Did you used to bring the grandchildren out to the ranch?
- speaker: Respondent
  text: Yes, we had one grandchild that was living here in town, a granddaughter, and she came with me often. Miss MacGregor
    liked her, and she'd show her things that she did when she was a child and how her swings hung in the tree. She really
    enjoyed her. We also had two grandsons, but they were in Greeley. And that summer I had them, and Miss MacGregor enjoyed
    them, I thought maybe it was just because Carrie was a little girl, you know, that she had more in common with her, but
    she enjoyed the boys also. In fact, she had a horse here then. The horse's name was Winnie.
- speaker: Interviewer
  text: Winnie? W-i-n-n-i-e?
- speaker: Respondent
  text: And that horse must have been thirty years old. It was so sway-backed you didn't even have to worry about the kids
    falling off. Just like a natural seat, but I'd put the kids up and let them ride around. Miss MacGregor just practically
    lived in the car by that time because--
- speaker: Interviewer
  text: Because she couldn't....
- speaker: Respondent
  text: I'd come out in the morning and put her in the car and help her to the car. I didn't put her in, you know, but I'd
    help her to the car. Then, I'd come back in the evening and help her into the house.
- speaker: Interviewer
  text: So, during the day, then, did she use her car to drive around the ranch?
- speaker: Respondent
  text: Yes, she did, and at that time we still had the Fish Creek property that was pasture and the McGraw Ranch property
    and the property of John Hayden. So it's a half day's job anyhow to drive around to those pastures. So, she would just
    drive around to the different pastures and watch the cattle. That's where some of the stories got started that she just
    couldn't stand to see her cattle out in the pasture because she had about eight hours to spend in the car. It was just
    as nice to sit out there where the cattle were as it was here. Then, she was there if anything went wrong. She couldn't
    get out of the car any longer to work on fence. There are people that tell that they saw her in the last few years out
    there fixing fence, but they didn't ever really see her fixing fence after 1965. Because she wasn't able to get in and
    out of the car. Because she wasn't able to get in and out of the car alone.
- speaker: Interviewer
  text: From this hip injury or from the stroke?
- speaker: Respondent
  text: Right. She dragged her left foot so badly that she wore out that shoe about every two weeks.
- speaker: Interviewer
  text: Every two weeks? Incredible! What would she do for shopping then?
- speaker: Respondent
  text: I did all the shopping. She called Richardson's for her groceries, and they delivered them.
- speaker: Interviewer
  text: Now, this was a grocery store?
- speaker: Respondent
  text: Yes. It's now Riverside Grocery Store. Riverside Market I guess they call it.
- speaker: Interviewer
  text: Oh, over by--
- speaker: Respondent
  text: Over by Fun City.
- speaker: Interviewer
  text: By Fun City. All right. And they did deliver?
- speaker: Respondent
  text: Yes. They delivered until the time she died. They were still delivering groceries, a man named Barney that still works
    there.
- speaker: Interviewer
  text: Do you know his last name?
- speaker: Respondent
  text: I don't know his last name. I should, but I don't. But he delivered groceries to her for at least three years. Then,
    Mr. and Mrs. Richardson had a son named J. Bruns.
- speaker: Respondent
  text: Bruns, and he delivered groceries. He was a friend of my son. We had two sons in town, and he was a friend of theirs.
    He delivered groceries to her. But anyone who delivered groceries to her, anybody who came to do anything, me included,
    never got farther than the back porch. She'd come to the back porch, and they would bring the groceries in. She would
    take them in and put them away.
- speaker: Interviewer
  text: When she was in the house, did she ever use a wheelchair, or did she ever have one?
- speaker: Respondent
  text: She had one, but after she had had the stroke in 1970.
- speaker: Interviewer
  text: Later on, I see.
- speaker: Respondent
  text: In those years she used canes, two canes. There was always a lot of talk that she carried a gun, and I think that
    maybe people saw her at a distance with her canes - that's the only thing I can think of because there weren't any guns.
- speaker: Respondent
  text: There wasn't a gun, but she just walked with those two canes. She got from the car to the house fairly well by hanging
    on to the side of the house, but then there were three steps. She couldn't get up those three steps, or she couldn't get
    down them. So, that was where I had to help her.
- speaker: Respondent
  text: And she couldn't get in and out of the car alone because this left leg was just useless. I had to put her in the car
    so I know that she had no control over that leg and could not manage it. So, I took her to the chiropractor for about
    a year, I suppose. Then, he said, "You know, if I'm giving you relief, fine, but I'm not helping the problem at all."
    She was getting so heavy that it was hard on me getting her into the car. So, she would go occasionally when the pain
    got too bad. She would have me take her down, but not on a regular basis any more.
- speaker: Respondent
  text: There were people that lived here on the ranch that knew her. Virginia Denning knew her. Her parents rented a cabin
    from her. She spent summers here.
- speaker: Interviewer
  text: Boyce was her maiden name, wasn't it?
- speaker: Respondent
  text: Right, and there were quite a few of those children, I think. And you say that Virginia Boyce's parents had rented
    a cabin here on the ranch?
- speaker: Respondent
  text: Yes, they rented the Quiner house.
- speaker: Respondent
  text: Quiner, Q-u-i-n-e-r. I think for about ten summers. And she talked a lot about the Boyce children, although Virginia
    was gone and married by that time, Ann Boyce was Virginia's mother. She was still coming to the ranch when I first came
    here although Virginia, of course, was married and not here.
- speaker: Interviewer
  text: All right, you have mentioned more than once about the stories you have heard about Muriel, Do you want to elaborate
    any on that and as to why these stories existed?
- speaker: Respondent
  text: You know, I honestly don't. Yes, I'll elaborate, but I honestly don't know why the stories existed. There was a story
    that she went out to the mausoleum and sat and talked to her parents. That one I remember about first-hand because my
    parents - my mother had died not long before I met Miss MacGregor; and when we'd go to Loveland, I'd go to the cemetery,
    I did this on a regular basis, you know, and one day she said, "Mrs. Kendall, do people think you're crazy because you
    go to the cemetery?" I said, "I don't know; I don't really care, you know." And she said, "Well,--"
