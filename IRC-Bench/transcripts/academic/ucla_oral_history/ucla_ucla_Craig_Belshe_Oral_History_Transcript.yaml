turns:
- speaker: Interviewer
  text: Why did you choose to move to Estes Park?
- speaker: Respondent
  text: I came to Estes Park back in the mid-'70s to be the manager of Stanley Park Pool, the pool that used to be located
    where Stanley Park is now, right where the youth center is now. There was a swimming pool there and I was working for
    both the recreation district and the school district. Interestingly enough, I came to town . . . the reason I came was
    there was a tragedy the year before where there was a child who was a middle school child who had drowned in the pool
    during school time. It was a major tragedy in the community and there was a lot of upheaval going on at the pool. I had
    graduated from college and I was working as a substitute teacher down in the Denver area and was looking for opportunities
    and I applied for the position up here and, frankly, I didn't think I'd ever get the job - there was a lot of tension
    and a lot of pressure on related to this position, related to what had happened the year before. Quite frankly, I was
    the only one who'd had the qualifications. They were looking for somebody that had a teaching license and also somebody
    that had pool experience and I had spent summers during the time I was in college managing a swimming pool. So I had both
    pieces of experience. I interviewed for the job with a variety of people - I interviewed with the superintendent of schools
    at the time. Herb Wanger. I also interviewed with the high school principal, a gentleman named Gordon Rudle, and interviewed
    with a gentleman named Bob Deers, who was the head of the recreation district. And after I interviewed, I didn't hear
    anything for about two weeks, and frankly, I didn't think I got the job. And then I got a call and had the job offer and
    I moved to Estes Park.
- speaker: Interviewer
  text: How old were you at that time?
- speaker: Respondent
  text: I was 22 years of age. And the first place that I lived . . . and I came into town and was looking for housing and
    I moved into a place that was right when you're coming into Estes, right as you're coming across . . . right before the
    causeway. I lived in a single-room . . . essentially, a cabin. It had a main living room area and just a small bedroom
    and a little kitchen area. I just came to town and I did not know a soul. I didn't know anybody. First . . . when I came
    into town, the first week I came into town, I got a note in the mail from George Hix, the president of the bank, welcoming
    me to Estes Park. I didn't know anybody. No connections at all.
- speaker: Interviewer
  text: So that was 1976, is that correct?
- speaker: Interviewer
  text: So let's take a walk down Elkhorn Avenue in your mind's eye in 1976. Let's just walk down Elkhorn and tell me what
    you remember.
- speaker: Respondent
  text: I really remember the wintertime more than I do the summertime, going down Elkhorn Avenue at that period of time,
    because it was so much different as far as just the downtown area and the configuration of downtown. It was before the
    Lawn Lake Flood and the downtown area looked so much different. And quite frankly, Estes Park at that period of time was
    a summer tourism industry and there wasn't the shoulder season of winter going on at all. Downtown in the wintertime,
    predominately in the streets . . . the streets . . . the windows in the shops would be newspapered, white-painted over;
    they were closed down. There was nothing going on. And as a young person, at 22 or 23 years of age, when I ... I would
    walk out of the Wheel Bar at 9:00 on a Friday night and look up and down the street, literally, and not see a soul. It
    was so much more of a small town atmosphere. The town, in 1976, there was more connections ... it was a little bit smaller
    and it seemed like it didn't take very long where you'd get to see the same people over and over and start to make connections
    right off the bat. But the downtown area, particularly as it looks physically, was completely different than it looks
    today.
- speaker: Interviewer
  text: And so returning to Estes Park, as you did this morning, how is it different today?
- speaker: Respondent
  text: It's so much busier. The increase - traffic flow, people, the number of people who are visiting Estes Park - that
    stair-stepped literally every single year where it would continue to get busier and busier. To the point in time that
    when I lived here, I would not go downtown very often in the summer unless I was going downtown for something specific
    because it would be so busy and crowded. I was very relieved when the bypass was built over by the hospital to bypass
    around the downtown area because at one point in time, I was living out in the High Drive area, and if I was going out
    of town to do anything I always had to drive through town and it was getting to be more and more cumbersome to get through
    town because of just the increased traffic flow and the number of people. And frankly, it's so much busier and more active
    . . . and more beautiful, too, as far as the buildings and the structures and the shops, the street designs, the stoplights,
    the light ways, the directional things. It's so much more sophisticated than it was back that many years ago.
- speaker: Interviewer
  text: Let's talk a little more about your career with the school. You had many positions with the school system. As you
    said, you started as a teacher, you ended up being a principal of the middle school and the high school and the intermediate
    school at various times. What changes did you see in the school system from . . . during your career, for both good and
    bad?
- speaker: Respondent
  text: There were a lot of things that changed in the school district. The high school . . . when I came to town in 1976,
    the high school had just been opened the year before. It had just opened in 1975 and so it was a brand new facility. And
    I was teaching at the middle school when I was first teaching in the school district. Because the year after I came with
    the Stanley Park Pools, in the middle of the winter that year, there was an agreement, interestingly enough, very similar
    to what we're going through now in Estes Park. There was an agreement between the school district and the rec district
    about operating costs. And at that period of time, the recreation district owned the pool and the school district was
    contributing expenses related to revenue. Well, a bond issue had gone ... or, a mill levy override issue had gone to the
    taxpayers in November of that first year that I was here and the taxpayers didn't pass it. And that had never really happened
    to the schools in Estes Park before so they ended up having to start to cut back on expenses. So what happened - the pool
    closed. And that was my job. So I was under a contract for the rest of that year and so they put me to work at the middle
    school teaching physical education at the middle school, and that was the position I held for about six years. At that
    period of time, in the school district, literally all of the teachers in the school district lived in Estes Park and lived
    in the community area around Estes Park. And over a period of time, particularly with the increased cost of housing you
    saw in the Estes Park area, it became more and more difficult for young teachers to come to Estes Park and live here.
    So the biggest change that I saw over a period of time was that there was a real community feel to the school district
    when I first came, and that was becoming eroded over a period of time because more and more of the people that were working
    in the school district were literally driving from Longmont or Lyons or Boulder. I had . . . when I was the high school
    principal here in Estes Park, I had staff members that lived in Fort Collins, Boulder, Loveland, Longmont, and Lyons -
    all the way across the Front Range areas. And they were driving up here and they would drive up for one of two reasons
    - either they had a spouse that was working a different job where they were at in the valley or, quite frankly, they couldn't
    afford the economics of moving into the housing market in Estes Park. So that was a huge change that happened and I think
    the schools lost a little bit of that . . . you were more a part of it when you lived here and you knew all the children
    and worked here rather than just driving up and doing my job for the day and driving back down. So that was a big change
    that I saw. Another change that I saw probably had to do with finances. When I first came to the Estes Park schools in
    the late '70s, basically there was a . . . seemed to be a lot of income as far as coming into the school district. And
    if you wanted something - you wanted something to work into your program, you wanted some kind of supply material, you
    wanted to have something for your program - pretty much all you had to do was ask. And then what happened in the 1980s
    is there was a change statewide in the state funding of schools and they got into an equalization formula. Before that
    period of time, the tax-wealthy towns and communities had a lot more resources in their schools, and if you had a poor
    tax base in your school or community, you had a hard time supporting your school and resources. Well, there was state
    equalization that happened - that they wanted children all over the state of Colorado to have the same kind of benefits.
    And that really had a little bit of a negative impact on Estes Park. We stopped receiving state equalization because we
    were receiving lots of property taxes here and all of a sudden, going through the '80s, I think the district went through
    a lot more financially difficulty than it did when I first came in the '70s.
- speaker: Interviewer
  text: Is there one accomplishment or a few accomplishments that you look to when you think back on your career here that
    you're most proud of?
- speaker: Respondent
  text: You know, I had an interesting thing happen to me when I was leaving. I received a recognition the last year that
    I was here in Estes Park, and it was a national-level recognition for principals. And that was probably the most incredible
    experience that ever happened to me as a person. Because what happened is that by nature of the Internet and information
    resources and things going out, people received this news that I received this recognition. And I heard from students
    from back in the '70s and '80s and literally coast to coast—kids that I had not seen for 25 or 30 years that I had contact
    with when I was probably 22 or 23 years old. I would get letters from them, I got e-mails from them, I'd hear about their
    families, about the kind of impact that I might have had on them during the period of time they were in school. So I think
    in terms of my time here in Estes Park, in schools they always say that you basically are touching the future, and it's
    kind of a cliche that people talk about. I had that impact come back to me and it has been the most dramatic impact in
    my life because I heard from all these students that I hadn't seen in a long, long time and heard how well their lives
    were going and what was happening with them. It was absolutely the biggest impact in my life.
- speaker: Interviewer
  text: About the time that you left, there was some trauma at the school. The superintendent was indicted and arrested and
    convicted - and imprisoned, actually, in 2005 - of embezzlement. And about the same time, the middle school bookkeeper
    was also arrested for theft and embezzlement. Do you have any reflections that you'd like to share about that period of
    time at the school?
- speaker: Respondent
  text: It was a really difficult period of time in the school. Even leading back before the embezzlement situation happened
    with the superintendent, that superintendent had really been bought out of his contract by the school board. There were
    some very difficult working years where there was a poor relationship between the board of education and the superintendent
    of schools. And that had really made the working conditions, particularly for the administrative staff in the district,
    to be increasingly more difficult. There were board members that were at odds with the superintendent over his operating
    style and his management style. And the last couple of times that his contract was renewed, it was renewed on a split
    vote, where he would be barely renewed into his contract. So there were some members of the board that really completely
    disagreed with the philosophy of the superintendent at the time and wanted to see him out. And what ended up happening
    ... it's interesting, what ended up being his undoing. What happened was that the last time he had his contract renewed,
    it was on 3-2 vote in his favor. There was a board member at the time, Gail Fray, who was a long-time teacher in the school
    district and had retired in the school district, and her husband, Ray, became ill and they had to move to Longmont. So
    he had to resign her position on the board and then the board ended up appointing another person. A few months after the
    board made that appointment, the power on the board split; it slid the other direction from being 3-2 in favor of the
    superintendent to 3-2 against the superintendent. And so he ended up leaving. So long before the embezzlement ... he was
    gone from his position as superintendent before the embezzlement was uncovered. They found that out after he was out .
    . . after they'd removed him from office and they had a temporary interim superintendent that was there. So the working
    relationship between the superintendent and board had a really negative and debilitating effect on the school district
    that was permeating, and that was going on for a few years. In terms of the impact on me personally, I think it was certainly
    the impetus that made me start to think about making changes in my career and looking at other opportunities. Because
    it was becoming increasingly more ... it didn't have the same kind of atmosphere and environment to work in that it did
    when I was working most of my years in Estes Park. There were a lot of changes going on in the district and I had made
    a decision that it was probably best that I moved along so they could go along and move in the direction that they wanted
    to move.
- speaker: Interviewer
  text: While you were here, you were a member of many community and school organizations; really part of the community. You
    volunteered for many activities. Which of those kinds of things were the most meaningful to you, and why?
- speaker: Respondent
  text: Well, I've had to think about that a little bit. I think a couple of organizations that I was involved with - that
    would include the Parents and Community for Kids; that'd be PaCK. And then the Bobcat Athletic Club, the BAC'ers. I was
    on the initial boards that formed both those groups that are still going on today. So when you see an organization that
