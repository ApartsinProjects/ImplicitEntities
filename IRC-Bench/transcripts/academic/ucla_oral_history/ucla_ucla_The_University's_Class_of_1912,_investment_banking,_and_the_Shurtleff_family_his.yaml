collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Would you like to start with your early days, maybe thinking of you?
- speaker: Respondent
  text: I was born in Nevada City, California, in 1887. My father died when I was very young, and in 1897 my mother moved
    with me and my two sisters to Berkeley. As a youth, I helped support my family and my own education.
- speaker: Interviewer
  text: What was it like growing up in Berkeley at that time?
- speaker: Respondent
  text: It was quite different from today. I remember walking through what we called the 'sewers of Berkeley,' which were
    really just open ditches. Life was simpler, but we had our challenges.
- speaker: Interviewer
  text: How did you get involved with the University of California?
- speaker: Respondent
  text: I attended the University and was very active there. I worked as a business manager for the campus newspaper, The
    Daily Californian, which helped me save some money for after graduation. I graduated in 1912.
- speaker: Interviewer
  text: What were some of your experiences at the University?
- speaker: Respondent
  text: I enjoyed campus life, including playing in the Mandolin Club. I also had great respect for many of the professors
    who guided me. Those memories remain fresh even now.
- speaker: Interviewer
  text: How did your career in investment banking begin?
- speaker: Respondent
  text: In 1914, along with Charles Blyth, Dean Witter, and George Leib, I helped found Blyth, Witter, and Co., which later
    became Blyth and Co., Inc. It grew to be one of the nation's leading investment banking firms.
- speaker: Interviewer
  text: What was the business environment like during your career?
- speaker: Respondent
  text: It spanned two world wars, the Great Depression, and the prosperous post-war expansion. We were just trying to make
    a living, but we played a role in financing the development of California's public utility industry and other enterprises.
- speaker: Interviewer
  text: Can you share an example of a significant moment in your career?
- speaker: Respondent
  text: During the Depression, I traveled to our branch offices and required them to clear their inventories just before the
    1929 stock market crash. Other firms suffered severe losses because they were still loaded with inventories. It was sheer
    luck, but it saved our firm.
- speaker: Interviewer
  text: What do you think were the keys to your success?
- speaker: Respondent
  text: Hard work, integrity, and respect for the structure and people of society. I believe the greatest rewards come from
    being productive and creative.
- speaker: Interviewer
  text: After retirement, what interests did you pursue?
- speaker: Respondent
  text: I compiled and published a major genealogy of the Shurtleff family. My family continues to interest me profoundly.
- speaker: Interviewer
  text: Looking back, how do you feel about your life and career?
- speaker: Respondent
  text: I have many fond memories, from watching my mother pay with a bag of gold dust to working in a view-filled skyscraper
    office. It was a unique era, and I feel fortunate to have been part of it.
