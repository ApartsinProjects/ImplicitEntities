source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your maternal ancestors, the Estudillo family?
- speaker: Respondent
  text: My maternal ancestors, the Estudillo family, were Spanish settlers who came to California at the end of the eighteenth
    century. Much of my childhood was spent on the Santa Margarita y Las Flores ranch in northern San Diego County, operated
    by my aunt Jane Magee. I grew up with the traditional adobe ranch house architecture of my ancestors, which I constantly
    drew upon for inspiration in my own designs.
- speaker: Interviewer
  text: What was the process of proving land ownership after California's annexation?
- speaker: Respondent
  text: After California's annexation, proving land ownership was a complicated process. Families like mine had to provide
    documentation and go through legal procedures to establish their claims. It was a challenging time, but it helped shape
    the way land was managed and developed in California.
- speaker: Interviewer
  text: Can you describe your extended family in California and the Las Flores Ranch?
- speaker: Respondent
  text: My extended family was quite large and well-established in California. The Las Flores Ranch was a significant part
    of our heritage. It was a working ranch with traditional adobe buildings, and it played a big role in my understanding
    of functional ranch architecture. The ranch was also the place where Ramona got married, which is a notable family story.
- speaker: Interviewer
  text: How did your paternal grandfather and father influence your upbringing?
- speaker: Respondent
  text: My paternal grandfather, Charles E. May, and my father, John Clifford May, were important figures in my life. Growing
    up in San Diego, I was surrounded by Irving Gill houses and other architectural influences. My childhood home had a basement
    and a particular layout that left a strong impression on me. I never quite felt I could please my father, and my brother
    Henry was more focused on making money. These family dynamics influenced my path and interests.
- speaker: Interviewer
  text: What were your musical interests as a youth?
- speaker: Respondent
  text: I was very interested in music and even led a popular jazz orchestra in the 1920s. We had regular radio broadcasts,
    which was quite an accomplishment at the time. I initially planned for a musical career before turning to design and building.
- speaker: Interviewer
  text: How did you begin designing and building furniture and houses?
- speaker: Respondent
  text: After withdrawing from college, where I primarily took business courses, I started designing furniture. Meeting real
    estate developer R. C. Lichty gave me the opportunity to design and build a home in the Talmadge Park section of San Diego
    in 1932. From there, I designed and built over fifty homes in San Diego for various clients.
- speaker: Interviewer
  text: What was your experience moving to Los Angeles and working with John A. Smith?
- speaker: Respondent
  text: In 1937, oilman John A. Smith invited me to move to Los Angeles and establish a joint partnership to construct homes.
    This was a pivotal moment in my career. I built numerous homes for individual clients and developed projects like Riviera
    Ranch and Sullivan Canyon Ranch in West Los Angeles, as well as Woodacres in Santa Monica.
- speaker: Interviewer
  text: How would you describe the California ranch house style you developed?
- speaker: Respondent
  text: I just built one kind of house, one style. The California ranch house style integrates outdoor and indoor living,
    drawing on the Mediterranean heritage of Spanish and Mexican California. I favor single-floor dwellings, natural materials,
    and room arrangements that connect indoor spaces with patios, courtyards, and gardens. The floor plans reflect the way
    people live in California, emphasizing ease and comfort.
- speaker: Interviewer
  text: What innovations did you bring to your house designs?
- speaker: Respondent
  text: I developed new flooring, heating, cooling, lighting, and wall systems. I was the first home builder to use the pullman
    lavatory. Along with my partner Chris Choate, we designed the nail-on sash and experimented with modular and prefabricated
    construction after World War II.
- speaker: Interviewer
  text: How did you view the architectural profession and other architects?
- speaker: Respondent
  text: I have a low opinion of some internationally renowned architects and their theories. For me, building design and construction
    should always focus on ease and comfort of living. I reject formal symmetry in favor of flowing designs arranged around
    the needs of the people who live in the house.
- speaker: Interviewer
  text: Can you talk about your experience with legal issues related to your designs?
- speaker: Respondent
  text: I have initiated lawsuits against builders who copied my plans without permission. For example, I had a lawsuit against
    Fletcher Jones. I also helped other architects with legal problems related to unauthorized use of designs. Protecting
    architectural copyright is important to me.
- speaker: Interviewer
  text: What are some of your notable buildings and projects?
- speaker: Respondent
  text: Some of my better-known buildings include the Mondavi Winery and offices in Napa County, the Sunset Magazine and Book
    buildings in Menlo Park, the Saga office complex also in Menlo Park, and Hotel Cabo San Lucas in Baja California. I also
    designed private homes like the Frederic Blow house in Los Angeles and my own home, Mandalay, in Los Angeles.
- speaker: Interviewer
  text: How do you approach designing houses for clients?
- speaker: Respondent
  text: Each house needs to be adapted to the client. I believe the architect should examine the site before building to maximize
    space and functionality. I also consider ways to dispose of garbage and other practical aspects. The goal is to create
    a home that fits the lifestyle and needs of the people living there.
- speaker: Interviewer
  text: What are your thoughts on open plan living and movable partitions?
- speaker: Respondent
  text: I favor open plans that are not divided into many small rooms. Movable partitions allow flexibility in how space is
    used. This approach helps bring outdoor living indoors and creates a more comfortable and adaptable living environment.
- speaker: Interviewer
  text: Can you describe your involvement with low-cost housing?
- speaker: Respondent
  text: I was involved in designing low-cost housing across the country. There were challenges with building regulations,
    but I aimed to create affordable homes without sacrificing quality. After working on low-cost housing, I returned to designing
    more expensive single-family homes.
- speaker: Interviewer
  text: What are some unique features you've incorporated into your houses?
- speaker: Respondent
  text: I've included features like skylights, walk-in refrigerators, indoor swimming pools, and various heating methods.
    I also designed a music room and collected antique furniture. These elements contribute to the comfort and individuality
    of the homes.
- speaker: Interviewer
  text: How do you see the evolution of your designs over time?
- speaker: Respondent
  text: My designs have evolved to include larger living rooms and more open spaces. What once seemed big, like my Mandalay
    house, now seems not big enough. I continue to develop ideas like one-room houses with movable partitions to meet changing
    needs.
