collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Tell me something about your youth and your parents. Where did your parents come from?
- speaker: Respondent
  text: My parents divorced when I was a little, little baby and I was raised by my aunt and uncle in Everett, Washington.
    They were Greek immigrants and I had a wonderful home and a wonderful life there.
- speaker: Interviewer
  text: Did you grow up in Everett?
- speaker: Respondent
  text: Yes, I grew up in Everett my entire life, my 74 years.
- speaker: Interviewer
  text: Can you spell your name?
- speaker: Respondent
  text: B-U-C-K-L-E-S.
- speaker: Interviewer
  text: Tell me a little bit about your youth. What was it like growing up in Everett?
- speaker: Respondent
  text: A very nice community. I had a lot of fun. Played sports as a youngster. As I grew into my teens, my uncle was a shoemaker
    - he had a shoemaker's shop - and he also cleaned the Everett Trust and Savings Bank, and I would go there after school
    and help him clean the bank, which was very interesting. It did keep me out of playing sports in high school, except I
    did wrestle in high school.
- speaker: Interviewer
  text: What division?
- speaker: Respondent
  text: 112 pounds, and I can't say that anymore. [laughing]
- speaker: Interviewer
  text: Your uncle and aunt were raising you?
- speaker: Respondent
  text: Yes, they raised me.
- speaker: Interviewer
  text: What was their background? Were they involved in unions or politics or anything like that?
- speaker: Respondent
  text: No. Like I say, he was a shoemaker, and he did belong to the union. I believe it was a culinary union, because I know
    when he died in 1977 at the age of 88, we had to go to the AFL-CIO union hall in Everett, and he had a $500 death benefit.
- speaker: Interviewer
  text: If he was a shoemaker, how come he was in the culinary union?
- speaker: Respondent
  text: I believe it was a culinary union. I'm not positive. But it was some little union that he paid monthly dues to. We
    never even knew that it was there.
- speaker: Interviewer
  text: Did he talk about union issues?
- speaker: Respondent
  text: No, not much. But you have to remember, Everett was a milltown. It had like five mills, and they all were union, so
    Everett was really a union town.
- speaker: Interviewer
  text: Were your youth friends involved in unions, in the mill unions?
- speaker: Respondent
  text: Their parents were.
- speaker: Interviewer
  text: So it was kind of your growing up, in a sense?
- speaker: Interviewer
  text: Where did you go to high school?
- speaker: Respondent
  text: I went to high school at Everett High School and graduated in 1961. Number one in the state in football, by the way.
    [laughing]
- speaker: Interviewer
  text: But you didn't play football?
- speaker: Respondent
  text: No, I didn't play football.
- speaker: Interviewer
  text: Any military experience?
- speaker: Respondent
  text: Yes, I served in US Army from 1962 to 1968. But I was a reservist six months. That was during the Vietnam thing, so
    we were on standby and meeting three weekends a month.
- speaker: Interviewer
  text: What was your military occupation specialty?
- speaker: Respondent
  text: At that time, bridge building.
- speaker: Interviewer
  text: Where did you do basic training?
- speaker: Respondent
  text: Fort Ord, California for two months, and my last four months was at Fort Knox, Kentucky.
- speaker: Interviewer
  text: Is that where they taught you how to build a bridge?
- speaker: Respondent
  text: No. Actually, I was in the tank brigade, which was interesting.
- speaker: Interviewer
  text: How did you go from being a tanker to a bridge builder?
- speaker: Respondent
  text: When I came back home to Everett from Kentucky, the reserve unit was a bridge company, so that's what we went into.
- speaker: Interviewer
  text: What was your feeling about the war in Vietnam at that time?
- speaker: Respondent
  text: Confusing I guess would be the best word for me. My best friend, and more like my brother, went through OCS and became
    a second lieutenant and then a captain, and went over to Vietnam and spent two tours of duty over there. In fact, he just
    got back from Washington, DC they had a reunion of all the officers and Vietnam vets.
- speaker: Interviewer
  text: I'm thinking more about the politics of the 1960s. Did you have any perspective on whether the war was a good idea,
    a bad idea?
- speaker: Respondent
  text: No, I didn't. I didn't think it was bad. I know at one time we had to build a bridge over the Seattle Coliseum - they
    had a big fountain there. I don't know if you've been to Seattle at the Fair there and they had a big fountain, and we
    built bridges over these fountains. But people were marching with signs and calling us "killers" and all these things.
    We tried to explain to them I was working at Scott Paper Company at that time, but I was a weekend warrior more or less.
- speaker: Interviewer
  text: You say you worked for Scott Paper Company at that time?
- speaker: Respondent
  text: Yeah, when I got out of high school, I went in and worked for Scott Paper Company for two years and went to Everett
    Junior College at that time for two years. I left there in 1964 and went to Anchorage, Alaska. My uncle owned a construction
    company up there and I worked construction til 1967, the start of it. I came back looking for a job and that's where I
    started my longshore career.
- speaker: Interviewer
  text: Any union activity when you were up in Alaska?
- speaker: Respondent
  text: Yes, had to pay union dues up there as a laborer.
- speaker: Interviewer
  text: Was that the Laborers' International Union?
- speaker: Interviewer
  text: What did you think about that union? What did you think about your union experience in Alaska, if there was one.
- speaker: Respondent
  text: It's not like our union, because they came and got the dues but it wasn't like we went to a union meeting. In fact,
    I never did go to one and I didn't know anything about it. I was 22 then, I think.
- speaker: Interviewer
  text: It is very different from our union.
- speaker: Respondent
  text: Yeah, they just wanted the dues and it wasn't about strengthening your union or keeping the jobs. But construction,
    in those days, was very, very heavy up in the Alaska territory. We worked over in Kenai, Big Lake, and Anchorage at Elmendorf
    Air Force Base.
- speaker: Interviewer
  text: What were you constructing?
- speaker: Respondent
  text: We were building officers' quarters at Elmendorf Air Force Base. Then we went from that job to piledriving, putting
    in transform towers, and the Cook Inlet, from Mount Alyeska to Homer.
- speaker: Interviewer
  text: Then you come back to Everett in 67. Then what do you do?
- speaker: Respondent
  text: Not much. I had a lot of money from Alaska and I really wasn't looking for a job, but all of a sudden it dawned on
    me - I came back in January, and in about March or April - I've got to go back to work. I was drawing unemployment. I
    wanted to go back to work, but I didn't know what I wanted to do. A friend of mine said, "Why don't you come and play
    fastpitch softball with us?" I was a pretty good softball player at that time, so I went back and was playing for a different
    team, and he said, "No, you need to come and play for the longshoremen." So he introduced me to the business agent, dispatcher,
    and he asked me if I wanted to play and I said I was already playing. He said, "That's fine." So I went to about five
    or six dispatches and never made a job and couldn't figure out why. I finally got the message that if I wanted to be longshoring,
    I'd better go play second base for the longshoremen. So, that's what I did. I went to play second base, and we had a great
    team. Went to state four or five years in a row. Great experience. That's how I started my career. Actually, my first
    job was on May 28, 1967 on the Kanoshima Maru, the number one hatch, which was a log ship. In those days, logs came in
    one or two at a time exactly how they grow, and my first day on the job, I thought, I had to go over the top of the hatch,
    down the ladder, shaking all the way down. The first loads that came in, like I say, the trees came in as they grew, and
    banging all over the coaming of the ships. And I'm thinking, whoa, do I really want this job? [laughing] But I stuck with
    it and it's the greatest thing I ever did.
- speaker: Interviewer
  text: That first day, how do you know what you're supposed to do on the job?
- speaker: Respondent
  text: At those times, in the older days on the log ships, they had six men in the hold, but they put three down at a time.
    They had what they called a bull machine up there. You'd take a log and you'd wrap the sling around it, tighten it up,
    and then put it through a shackle, roller shackle, up to the deal. And the guy would pull it and the log would suck it
    back or suck it forward. That's how you did it in those days. Not like modern days, where you take a bundle in, you boom
    down, you get it where you want it. That's why we had to bull everything, wires and shackles, and there was noise and
    wires breaking and popping.
- speaker: Interviewer
  text: How did you figure out what to do the first day? Did somebody tell you?
- speaker: Respondent
  text: Yeah, the two guys I worked with. I worked in a Port Gamble gang, in fact, and the two guys just said, "Stand by,
    kid, and we'll show you." They showed me and then they'd say, "Grab a hold of that wire and bring it over here and put
    it in the old snatch block." And that's how I learned.
- speaker: Interviewer
  text: About how many loads would be done a day at that time?
- speaker: Respondent
  text: Well, nowadays they can do a full load log ship, which are bigger than the old days, in four or five days. I worked
    on the White Cross for 31 days to complete that. Yeah, it took a month to unload that.
- speaker: Interviewer
  text: Was there any danger to that work?
- speaker: Respondent
  text: Oh, yeah. Lots.
- speaker: Interviewer
  text: How so? Can you explain it?
- speaker: Respondent
  text: Just wires busting, logs rolling. Even nowadays, it's dangerous. Now they come in with bundles and you've got to cut
    wires and bands. Some of the younger guys aren't careful. I learned to get careful real quick. But I think the older days,
    you saw more injuries - more broken legs, more cuts, gashes, whatever. Now, with the tonnage and the weight they're bringing
    in, I think you see more deaths, and I think that's proven up and down the coast in all our industry.
- speaker: Interviewer
  text: Did you ever get hurt on the job?
- speaker: Interviewer
  text: How did that come about?
- speaker: Respondent
  text: 1982, I had a bundle break on me, and all the logs just took off like this. I just went flat, just waiting for a log
    to roll on me, but it didn't. But I had two vertebrae that were injured and I had back surgery in 1982. In 1992, I slipped
    on a log and another one tightened up on my knee. I had knee surgery. In 1985, something snapped, and I forget what it
    was, I got this [left] shoulder, so I had shoulder surgery.
- speaker: Interviewer
  text: Did you work just logs?
- speaker: Interviewer
  text: What other kind of cargo?
- speaker: Respondent
  text: Back in the old days, when I started on the log ships, working the log ships, they also had a lot of pulp. We had
    Weyerhaeuser, a lot of 450-pound bales of pulp. We used to have hooks and stow them and wing them up. Winging them up
    means rolling or picking them up, the four corners of these 450-pound bales, and just keep building them up, building
    them up, and do the wings and up in the trunks. Then we worked what they called fletchers, which are 12 x 12 raw lumber
    that are anywhere from 10 to 40 feet long. Those are all hand-stowed.
- speaker: Interviewer
  text: How do you hand-stow fletchers?
- speaker: Respondent
  text: You seen PVs, flipping them over and keep rolling them and rolling them. It was a good job. It's just a good job.
    It was a lot of fun in those days because everybody worked together. It made a stronger union. Everybody saw each other.
    Modernization and mechanization took over and you kind of separated where you didn't see everybody every day like you
    used to.
- speaker: Interviewer
  text: Any other kind of cargo that you worked that you recall?
- speaker: Respondent
  text: Oh, module homes, we loaded a lot of module homes. But we were mainly - at certain times, we'd have like nine log
    ships in the port at one time. The fletchers, the pulp, we had steel.
- speaker: Interviewer
  text: Did you work along steel?
- speaker: Respondent
  text: Not a lot in Everett, but we did work some, yeah.
- speaker: Interviewer
  text: What's that like?
- speaker: Respondent
  text: Dangerous. Slippery. Of course, if a piece of steel hits you, it's not just going to bruise you, it's going to hurt
    you. And we used to do a lot of ingots, aluminum ingots, which was, I thought, one of the better jobs.
- speaker: Respondent
  text: Because they just landed them. They'd bring them in and just land them right down. The ingots might be maybe this
    wide, this tall, and they were kind of like a T shape, like this. There would be like six of them in a row, and they'd
    pick up all six of them and land them down in there. And after the first floor - because they'd be different sizes or
    whatever - we'd put down dunnage and level it out for the second floor to come on in.
- speaker: Interviewer
  text: Before we go on to something else that I was going to ask you about, Everett has a long tradition of labor activity
    going back to 1916, that period of time. Did you know very much about that? Did you hear much about it?
- speaker: Respondent
  text: No, not a lot about it until I got kind of in the union, and started coming to San Francisco and reading things in
    the libraries and stuff. But I didn't know a lot about it, no.
- speaker: Interviewer
  text: When was that? When did you start to get active?
- speaker: Respondent
  text: Mainly in about 1986 when I became a caucus delegate.
- speaker: Interviewer
  text: Going back just a little bit, there was a strike in 1971. Do you remember the 71 strike?
- speaker: Interviewer
  text: What do you remember of that?
- speaker: Respondent
  text: Well, no work. [laughing] A
