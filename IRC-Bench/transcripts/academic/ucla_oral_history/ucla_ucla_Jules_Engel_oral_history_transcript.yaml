source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood and how you first became interested in art?
- speaker: Respondent
  text: I was born in Budapest, Hungary, and came to the United States when I was thirteen years old. I began painting in
    a hard-edged geometrical style while I was a high school student in Evanston, Illinois. I already had a very definite
    idea that, for me, going out and drawing landscapes or still lifes was not quite the idea of what drawing or painting
    should be. My feeling was that if I took an empty piece of paper and drew a line or two on it, even if I put a circle
    in a square on the paper, that could be a drawing, and that should be enough.
- speaker: Interviewer
  text: What happened after you graduated from high school?
- speaker: Respondent
  text: Immediately after graduating in 1937, I came to Los Angeles. I worked briefly for Charles Mintz Studios, then apprenticed
    at Walt Disney Studios. I was assigned to work on Fantasia, choreographing the Chinese and Russian dance sequences for
    the Nutcracker Suite section. In these sequences, I innovated the use of black-background animation. I was then selected
    to do color continuity and color keying on Bambi. However, I was not happy with the restrictive creative environment at
    Disney and left to join the armed services after the United States entered World War II.
- speaker: Interviewer
  text: What did you do during the war years?
- speaker: Respondent
  text: I spent the war years assigned to Hal Roach Studios in Culver City, making training and educational films for the
    Air Force Motion Picture Unit.
- speaker: Interviewer
  text: What was your career path after the war?
- speaker: Respondent
  text: After the war, I went to work for the newly formed United Productions of America (UPA). I began as a designer but
    by 1950 I had become art director for all UPA productions. I teamed up with Robert Cannon to create Gerald McBoing-Boing,
    Madeline, Christopher Crumpet, and Jaywalker, plus a feature film starring UPA's Mister Magoo character. We changed the
    look of commercial animated filmmaking by adapting artistic concepts of contemporary artists like Dufy, Duchamps, Matisse,
    Kandinsky, and Klee.
- speaker: Interviewer
  text: Can you tell me about your work after leaving UPA?
- speaker: Respondent
  text: In 1959, I left UPA to open a commercial animation studio called Format Films with Herb Klynn. I produced and art
    directed the Academy Award-nominated film Icarus Montgofier Wright in 1960, from a script by Ray Bradbury. Then I went
    to Paris in 1962 and directed The World of Sine, featuring the work of French cartoonist Sine; this film received France's
    'La Belle Qualite' award.
- speaker: Interviewer
  text: What can you tell me about your film Coroaze?
- speaker: Respondent
  text: Coroaze was made in the French town of Coroaze in 1965. It is one of my most impressive nonanimated films. It utilizes
    high contrast black and white photography to outline the sculptural volume in my view of the medieval townscape. Stills
    are freely incorporated, sometimes in direct antithesis to the movement on the screen, but more often to indicate the
    ambiguity between the photograph and the filmed image of an empty street. The camera seeks out human activity to determine
    the status of its images. My painterly eye dwells upon the tiled rooftops and the strong horizontals of the stone steps.
    By rapidly shifting camera angles and recomposing these objects, I was able to draw 'graphic choreography' from them.
    Coroaze won the highest award given by French film critics, the Prix Jean Vigo.
- speaker: Interviewer
  text: Did you work on any stage productions?
- speaker: Respondent
  text: Yes, while living in France, I co-produced and co-directed with Raymond Jerome the stage production of Antoine de
    Saint Exupéry's The Little Prince, which ran for several seasons in Paris, Rome, and Brussels. I also designed the sets
    for Le Jouex, an avant-garde play produced in Paris.
- speaker: Interviewer
  text: Have you made films about other artists?
- speaker: Respondent
  text: Yes, I have made several films on artists and their work. In 1966, I directed a study of Spanish sculptor Miguel Berrocal
    called The Torch and Torso. I directed a film for Tamarind Lithography Workshop called The Look of the Lithographer in
    1968. Other films on art and artists include American Sculpture of the Sixties (1968), New York 100 (1967), and Max Bill
    (1976).
- speaker: Interviewer
  text: Can you describe your experimental films?
- speaker: Respondent
  text: I did not intensively explore my ideas for experimental films until the 1960s. My most 'painterly' films were made
    in the 1970s. Films like Landscape (1971), Accident (1973), Train Landscape (1973), Shapes and Gestures (1976), Rumble
    (1977), Fragments of Movement (1977), and Wet Paint (1977) are pure abstractions exploring movement potentials of lines
    and masses, optical conflicts, color and depth illusions, color-field concepts, and the single line. I call these films
    paintings in motion or 'graphic choreography.' My emphasis is on developing a visual dynamic language independent of literature
    and theatrical traditions, demonstrating that pure graphic choreography is capable of its own wordless truth.
- speaker: Interviewer
  text: What is your role at the California Institute of the Arts?
- speaker: Respondent
  text: Since 1969, I have been chairman of the Department of Animation/Experimental Film at the California Institute of the
    Arts. I emphasize the cross-fertilization between painting and filmmaking in both my teaching and creative work. I have
    taken more from the painting world into the film that I've been doing, rather than the other way around. When we talk
    about animation, we have to realize that we're talking about painting in motion.
