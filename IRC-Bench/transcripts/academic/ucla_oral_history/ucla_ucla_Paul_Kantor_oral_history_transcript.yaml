turns:
- speaker: Interviewer
  text: Well, in spite of your reluctance, I'd like you to tell me a bit about your family background, Mr. Kantor.
- speaker: Respondent
  text: My family background. I don't know what you mean, "family." My parents? I'm not interested in that; I'm not interested
    in discussing it. I could tell you I was born in New York in 1919 and went to school there, have a degree with a major
    in psychology and a minor in education. I have a brother. My parents were just average bourgeois people, first-generation
    Americans. I left New York City at the beginning of World War II. I went back. I was in the U.S. Navy during the war,
    discharged, came back, came to California, and have been here ever since.
- speaker: Interviewer
  text: I'm going to try and back up a little. Where did you go to school?
- speaker: Respondent
  text: Brooklyn College, got out in 1939.
- speaker: Interviewer
  text: Did you take any art courses?
- speaker: Respondent
  text: Yes. Just regular art courses. Around that time there was the Associated American Artists, who were dealers in New
    York and still are dealers for graphic material. They started a big program of publishing and selling graphics for the
    masses, I guess, five dollars and ten dollars, matted. Artists like Hopper, the Soyer brothers, any of the American artists
    who at that time were quite popular. They were black and white lithos most of the time. And it kind of appealed to me,
    the whole idea at that time, but I didn't have ten dollars to spend on a piece of paper. At the same time, 1936 I think,
    the New York Post was giving out coupons for subscriptions, coupons that you collected each day that you cut out of the
    paper; and with enough coupons and fifty cents or a dollar, you got a big reproduction of a Van Gogh painting. But those
    were very tough times, and I was a kid, and my parents had no money, and art was ...
- speaker: Interviewer
  text: '... a luxury?'
- speaker: Respondent
  text: '... a luxury, in that sense, for me. Mr. Hitler that time, in 1938, was busy selling the great paintings out of the
    German museums in Bern.'
- speaker: Interviewer
  text: Did you have any contact with New York museums? Did you visit any museums?
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: Brooklyn Museum, Metropolitan Museum.
- speaker: Interviewer
  text: What did you like to look at?
- speaker: Respondent
  text: 'Didn''t matter. As a kid I don''t think it really matters what you look at: it''s just a matter of art is art, and
    the century really doesn''t matter. It all appealed to me.'
- speaker: Interviewer
  text: What about galleries? Did you ever visit them?
- speaker: Respondent
  text: At that time? No. No, because galleries were commercial enterprises, and it never occurred to me. If I couldn't afford
    a five-dollar or ten-dollar lithograph, how am I going to afford anything else? So I never went. I doubt if there were
    many galleries at that time, anyhow. There were some, but not, you know ...
- speaker: Interviewer
  text: Did you have any friends or acquaintances who were artists?
- speaker: Respondent
  text: No, not really. As kids, everyone draws and paints and stuff, but the school system soon knocks it out of them, takes
    away all their initiative, tells them how to paint, makes little stereotypes and so on.
- speaker: Interviewer
  text: Did you yourself draw and paint as a child?
- speaker: Respondent
  text: Yeah, all the time. But ...
- speaker: Interviewer
  text: '... not any more?'
- speaker: Respondent
  text: No, well, I realized, you know, as a child it's a very honest expression. As an adult it's very complicated, and you
