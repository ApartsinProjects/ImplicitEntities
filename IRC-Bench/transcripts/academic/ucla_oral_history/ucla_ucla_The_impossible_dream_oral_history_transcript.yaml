collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your boyhood in Calvert, Texas, and Summerton, Arizona, and your move to Los Angeles in 1922?
- speaker: Respondent
  text: I was born in Calvert, Texas, and spent some of my early years in Summerton, Arizona. In 1922, my family moved to
    Los Angeles. It was a big change, but my parents encouraged me to pursue education despite the obstacles we faced as minorities.
- speaker: Interviewer
  text: What was the ethnic composition of the neighborhoods you lived in Los Angeles, and how did that affect your schooling?
- speaker: Respondent
  text: The neighborhoods were quite diverse but segregated in many ways. I was aware early on of the obstacles and discouragement
    experienced by minority students. Teachers and parents pushed us to overcome these challenges.
- speaker: Interviewer
  text: How did you discover your athletic talent and develop leadership potential during your high school years?
- speaker: Respondent
  text: At Polytechnic High School, I found that athletics was a way to build confidence and leadership. I ran for Boys League
    presidency, which helped me develop organizational skills and a sense of responsibility.
- speaker: Interviewer
  text: What was your experience like during your first year as a UCLA student?
- speaker: Respondent
  text: My first year at UCLA was eye-opening. I was fortunate to have mentors like Adaline Guenther, who provided ethical
    guidance. UCLA had a policy against racial discrimination, which was encouraging, but there were still challenges.
- speaker: Interviewer
  text: What led you to decide to enter the Los Angeles Police Academy?
- speaker: Respondent
  text: I wanted to serve my community and saw the police force as a way to make a difference. However, I was aware of the
    racial discrimination against black candidates within the LAPD.
- speaker: Interviewer
  text: Can you describe your assignments with the LAPD and any experiences with racial discrimination?
- speaker: Respondent
  text: I was assigned to various divisions, including the juvenile division and detective bureau. Despite my efforts, I encountered
    discriminatory practices that limited opportunities for black officers.
- speaker: Interviewer
  text: How did your mother influence your values and career?
- speaker: Respondent
  text: My mother had great trust in my judgment and instilled strong religious and ethical standards. She was involved in
    church and community affairs, which shaped my commitment to service.
- speaker: Interviewer
  text: Tell me about your courting of Ethel Arnold and your social life as a black student at UCLA.
- speaker: Respondent
  text: Courting Ethel was a significant part of my life. The black student population at UCLA was small, but we supported
    each other. Off-duty, I stayed active with the LAPD juvenile division and community activities.
- speaker: Interviewer
  text: What were some of your promotions and transfers within the LAPD?
- speaker: Respondent
  text: I was promoted to detective and later worked in the administrative vice detail. I also helped create the office of
    public information, which was a new police-community relations program.
- speaker: Interviewer
  text: How did you work to rebuild the reputation of the LAPD following the ouster of Mayor Frank Shaw?
- speaker: Respondent
  text: We focused on improving community relations and addressing discriminatory practices within the department. It was
    important to regain the trust of the black community and other residents.
- speaker: Interviewer
  text: What was the black community's attitude toward the LAPD during your service?
- speaker: Respondent
  text: There was a lot of skepticism and mistrust due to past discrimination and misconduct. We worked hard to change that
    perception by integrating officers on assignments and improving communication.
- speaker: Interviewer
  text: How did you handle being labeled a 'troublemaker' within the LAPD?
- speaker: Respondent
  text: I accepted that label because I was pushing for necessary changes. It was important to stand up for fairness and equality,
    even if it meant being seen as difficult.
- speaker: Interviewer
  text: Can you discuss your involvement in political activities and your decision to run for city council in 1963?
- speaker: Respondent
  text: I became involved in politics to represent my community better. The 1963 campaign was challenging, but I had grassroots
    support and prominent backers. It was a chance to make a real difference.
- speaker: Interviewer
  text: What was your brief law career like, and how did it relate to your political work?
- speaker: Respondent
  text: I worked briefly with Charles Matthews, which gave me legal insight that was helpful in my political career. It also
    helped me understand the legislative process better.
- speaker: Interviewer
  text: How did you experience the Zoot Suit riots and their aftermath?
- speaker: Respondent
  text: The riots were a painful reminder of racial tensions in the city. They underscored the need for better community relations
    and fair treatment for all citizens.
- speaker: Interviewer
  text: Can you describe the tenures of LAPD chiefs you served under and significant changes during William Parker's tenure?
- speaker: Respondent
  text: I served under Chiefs Hohman, Horrall, Worton, and Parker. Parker's tenure brought significant changes, some positive
    and some controversial, especially regarding civil rights and police practices.
- speaker: Interviewer
  text: What were the black community's perceptions of Sam Yorty and Norris Poulson?
- speaker: Respondent
  text: The community had mixed feelings. Some saw them as not fully supportive of black interests, which motivated me to
    seek office to provide better representation.
- speaker: Interviewer
  text: Who were some participants in your 1963 city council campaign?
- speaker: Respondent
  text: I had support from community leaders and organizations like the California Democratic Council and the Committee for
    Representative Government. Their backing was crucial.
- speaker: Interviewer
  text: How did you create a different type of representation on the city council?
- speaker: Respondent
  text: I focused on communicating directly with my constituents, addressing their concerns, and being accessible. It was
    about building trust and responsiveness.
- speaker: Interviewer
  text: What community problems did you bring before the council and administrative departments?
- speaker: Respondent
  text: Issues ranged from housing and employment to police misconduct and civil rights. I worked to improve conditions across
    various districts, not just my own.
- speaker: Interviewer
  text: How was your rapport with other city council members?
- speaker: Respondent
  text: It varied. Some were supportive, others less so. There were sharp differences, especially with Mayor Yorty, but I
    always aimed to work collaboratively when possible.
- speaker: Interviewer
  text: What was your role in establishing the Board of Grants Administration and Human Relations Commission?
- speaker: Respondent
  text: I helped establish these bodies to improve oversight of funding and promote better race relations in the city.
- speaker: Interviewer
  text: Can you discuss your participation in the civil rights movement and the United States Civil Rights Committee?
- speaker: Respondent
  text: I was actively involved, advocating for equal rights and justice. The Watts riots and their aftermath were pivotal
    moments that highlighted the urgency of our work.
- speaker: Interviewer
  text: What was your opposition to LAPD conduct during the Watts riots?
- speaker: Respondent
  text: I criticized excessive force and discriminatory practices. It was important to hold the department accountable and
    push for reform.
- speaker: Interviewer
  text: How did you work to consolidate city and county agencies?
- speaker: Respondent
  text: I supported efforts to streamline services and improve efficiency, which also helped address community needs more
    effectively.
- speaker: Interviewer
  text: What were some significant issues discussed by the city council during your tenure?
- speaker: Respondent
  text: Budget concerns, the convention center, mass transit, oil drilling at Pacific Palisades, the minibus program, and
    consumer affairs were all major topics.
- speaker: Interviewer
  text: Why was there a need for a Mexican-American representative on the city council?
- speaker: Respondent
  text: The Mexican-American community was underrepresented, and their issues needed a strong voice in city government.
- speaker: Interviewer
  text: How did you develop your reputation as 'antipolice'?
- speaker: Respondent
  text: That reputation came from my criticism of discriminatory practices within the LAPD and my advocacy for reform, which
    some in law enforcement saw as opposition.
- speaker: Interviewer
  text: What motivated your decision to run for mayor in 1969?
- speaker: Respondent
  text: I wanted to lead the city toward greater equality and better governance. The mayor's office was the best platform
    to effect change.
- speaker: Interviewer
  text: Can you describe your campaign staff and finances during your mayoral run?
- speaker: Respondent
  text: I had a dedicated team and raised funds largely through grassroots efforts. We faced well-funded opponents but stayed
    focused on our message.
- speaker: Interviewer
  text: Who was your primary opponent, and what role did Democratic power brokers play?
- speaker: Respondent
  text: Tom Rees was my main opponent. Some Democratic power brokers were hesitant to support me initially, but I worked to
    build broad coalitions.
- speaker: Interviewer
  text: How did you respond to Yorty's campaign of racism and fear?
- speaker: Respondent
  text: I remained determined and focused on positive messages. I refused to be drawn into divisive tactics and instead emphasized
    unity.
- speaker: Interviewer
  text: What was the political atmosphere of the mid- and late 1960s like?
- speaker: Respondent
  text: It was turbulent, with civil rights struggles, anti-war protests, and social change. It required patience and resilience
    to navigate.
- speaker: Interviewer
  text: How did you support Eugene McCarthy in the 1968 presidential primary?
- speaker: Respondent
  text: I supported McCarthy because of his anti-war stance and commitment to social justice, aligning with my values.
- speaker: Interviewer
  text: Can you describe your four-year campaign for the 1973 mayoral election?
- speaker: Respondent
  text: It was a long, demanding campaign with active supporters and expert strategists like David Garth. We focused on building
    popular appeal, especially in the black community.
- speaker: Interviewer
  text: What were your memories of election night in 1973?
- speaker: Respondent
  text: It was a moment of great joy and relief. The victory was a testament to the hard work and faith of many people.
- speaker: Interviewer
  text: How did you approach appointing deputy mayors and other staff?
- speaker: Respondent
  text: I chose capable individuals like Manuel Aragon and Maurice Weiner to help run the city effectively and represent diverse
    interests.
- speaker: Interviewer
  text: What were some major issues facing you as the new mayor?
- speaker: Respondent
  text: Rapid transit development and potential labor-management problems were among the top challenges.
- speaker: Interviewer
  text: How did you handle financial disclosures requested of staff appointees?
- speaker: Respondent
  text: We complied fully to maintain transparency and public trust.
- speaker: Interviewer
  text: What was your stance on the proposed rapid transit system and Proposition A in 1974?
- speaker: Respondent
  text: I supported the rapid transit system as essential for the city's future, and Proposition A was a key part of funding
    it.
- speaker: Interviewer
  text: How did you manage city budget cuts and LAPD reductions?
- speaker: Respondent
  text: We had to make difficult decisions to balance the budget while trying to minimize impact on essential services.
- speaker: Interviewer
  text: What programs did you implement to improve community relations?
- speaker: Respondent
  text: Open-house and area day programs were designed to increase staff access to the mayor and improve communication with
    residents.
- speaker: Interviewer
  text: How did you respond to the Arab oil embargo and energy conservation issues?
- speaker: Respondent
  text: We promoted energy conservation measures and worked with citizens' commissions to address the crisis.
- speaker: Interviewer
  text: What frustrations did you experience with the strong-council, weak-mayor form of government?
- speaker: Respondent
  text: It limited my ability to implement changes quickly, requiring constant negotiation and coalition-building.
- speaker: Interviewer
  text: Can you discuss the RTD bus strike and your response?
- speaker: Respondent
  text: The strike disrupted transit services, and we worked to mediate and resolve the conflict as swiftly as possible.
- speaker: Interviewer
  text: What was Frances Savitch's campaign for city council like?
- speaker: Respondent
  text: She ran a strong campaign, and I supported efforts to bring new voices into city government.
- speaker: Interviewer
  text: How did you handle replacing Harbor Commissioner Terence Matthews?
- speaker: Respondent
  text: We sought a qualified replacement who could manage the port effectively and address community concerns.
- speaker: Interviewer
  text: What efforts did you make to install a Mexican American representative in the Fourteenth District?
- speaker: Respondent
  text: I supported candidates who could represent the Mexican American community and worked to ensure fair elections.
- speaker: Interviewer
  text: How did you ensure freedom for your staff to back political candidates of their choice?
- speaker: Respondent
  text: I believed in allowing staff to express their political views freely, even if they differed from my preferences.
- speaker: Interviewer
  text: What federal dollars did you secure for local programs?
- speaker: Respondent
  text: We obtained funding for the Office of Small Business Assistance and various housing and redevelopment projects.
- speaker: Interviewer
  text: Can you discuss the offshore oil-drilling issue and the design grant for the people-mover?
- speaker: Respondent
  text: We debated offshore drilling carefully due to environmental concerns. The design grant helped advance the people-mover
    project to improve transit.
- speaker: Interviewer
  text: How did you report to the city council and the public?
- speaker: Respondent
  text: Transparency was key. We provided regular updates and sought input to maintain trust.
- speaker: Interviewer
  text: How did you deal with complaints of police misconduct?
- speaker: Respondent
  text: We took complaints seriously and worked to improve accountability within the department.
- speaker: Interviewer
  text: What was the Pacem in Terris conference about?
- speaker: Respondent
  text: It was a conference focused on creating a Marshall Plan for cities to address urban challenges.
- speaker: Interviewer
  text: How did you address unemployment among minority youth and voter apathy?
- speaker: Respondent
  text: We developed programs to create job opportunities and encouraged civic engagement to combat apathy.
- speaker: Interviewer
  text: What happened with the defeat of black candidates in 1978?
- speaker: Respondent
  text: It was disappointing, but it highlighted the ongoing challenges in political representation and the need for continued
    effort.
- speaker: Interviewer
  text: What were your concerns about affirmative action?
- speaker: Respondent
  text: I supported affirmative action as a necessary step toward equality but recognized the complexities involved in implementation.
- speaker: Interviewer
  text: How did you implement the CETA program?
- speaker: Respondent
  text: We used CETA funds to create job training and employment opportunities for disadvantaged populations.
- speaker: Interviewer
  text: What was the post-Watergate press environment like?
- speaker: Respondent
  text: There was increased scrutiny and demand for transparency, which affected how we communicated with the media.
- speaker: Interviewer
  text: Can you explain redlining and its impact?
- speaker: Respondent
  text: Redlining was a discriminatory practice that denied services to certain neighborhoods, contributing to economic disparities.
- speaker: Interviewer
  text: What was your experience greeting foreign dignitaries and visiting other countries?
- speaker: Respondent
  text: It was an honor to represent Los Angeles internationally and build relationships that benefited the city.
- speaker: Interviewer
  text: What was your role as cochairman of the Democratic National Convention in 1976?
- speaker: Respondent
  text: I helped organize and lead the convention, promoting unity and the party's platform.
- speaker: Interviewer
  text: Did you receive an invitation to join Jimmy Carter's cabinet?
- speaker: Respondent
  text: Yes, I was invited but ultimately decided to continue serving as mayor.
- speaker: Interviewer
  text: How do you evaluate Carter's presidency?
- speaker: Respondent
  text: It had its successes and challenges. I supported many of his policies but also recognized areas where more could have
    been done.
- speaker: Interviewer
  text: What influenced your decision to run for reelection in 1977?
- speaker: Respondent
  text: I wanted to continue the progress we had made and address ongoing issues facing Los Angeles.
