collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: 'Family background: Father''s family from Lithuania, mother''s from Poland--Mother stricken with trachoma - Maltz
    family: life in Williamsburg, N.Y. - Move to Flatbush--Family atmosphere--The neighborhood--Learning to fight.'
- speaker: Respondent
  text: Early schooling - Hidden polio - Father's fortunes take upswing with building boom; builds foundation to weather Depression
    - Brothers' careers--Erasmus Hall High School--Summer camp and dramatics--Theater-going in New York City - Father's illnesses.
- speaker: Respondent
  text: Father's illness and its effect on the family - Newly a wakening interest in books.
- speaker: Respondent
  text: 'Thoughts on high school - Columbia University: applies, is rejected, then finally accepted--Contracts mononucleosis;
    leaves school to recuperate--Returns to Columbia--Philosophy with Irwin Edman--Friendship with Kenesaw Mountain Landis,
    Jr., Jules Eisenbud, Beryl Levy.'
- speaker: Respondent
  text: Beryl Levy, Milton Katims, Ben Maddow - Thoughts on modern poetry--Philosophy excludes study in other fields - Laboratory
    mishaps - Metaphysical questions - English with John Erskine--Toys with idea of writing--Writes short stories and first
    novel--Peter Odegard - A lesson in bad teaching - Advantages of a background in philosophy - State of Maltz's political
    consciousness--Great Books with Mortimer Adler and Mark Van Doren - Trip to Europe with brother - Effects of the Depression
    on young Maltz.
- speaker: Respondent
  text: 'Idea of writing play about uncle in prison--Impressions of prison life--Writes novel during last year at Columbia:
    reflection of Maltz''s aversion to terrorism and injustice--Accepted at Yale School of Drama.'
- speaker: Respondent
  text: 'George Pierce Baker--The nature of the Yale drama school--Influential instructors: Alexander Dean, Donald Oenslager,
    John Mason Brown--Well-rounded and technical theatrical training - Playwrights studied; emphasis on O''Neill and Ibsen--Brecht.'
- speaker: Respondent
  text: 'Suspense versus surprise--Empty symbolism - First certain encounters with acquaintances'' homosexuality - Comments
    on class (family) consciousness - George Sklar, Elia Kazan, and Alan Baxter - Exposure to radical thought during meeting
    at Charles Recht''s - Hanging out at speakeasies--Family themes in playwriting--Aesthetic differences of opinion - Play
    is submitted to Group Theatre: Harold Clurman, Lee Strasberg, Cheryl Crawford--Father has stroke: Maltz leaves school
    - Sklar and Maltz begin work on Merry Go Round.'
- speaker: Respondent
  text: Collaboration with George Sklar - Tours U.S. Steel mill, effects of Depression--Rumors of Nazi atrocities--Merry Go
    Round submitted for production - Pinker-Morrison Agency scandal - Jed Harris - Michael Blankfort and Walter Hart agree
    to produce play at Provincetown--Favorable reviews - Flack from Tammany Hall--Play moves uptown; harassment continues--Play
    closes after six weeks - Lessons learned.
- speaker: Respondent
  text: Uses pseudonym - The Leblang Agency - Merry Go Round sold and made into film Afraid to Talk--Wolfgang Langoff and
    Deutsches Theater.
- speaker: Respondent
  text: 'Langoff, cont''d. - Plays as films - Opportunities for new playwrights; then versus now---Merry Go Round reviews
    - Sklar and Maltz: brief stint with Paramount Pictures--Problems in adapting Dashiell Hammett to screen - Leaves L.A.
    and begins work on novel Bury the Dead (unpublished) --Visits Boulder Dam: working conditions--Chicago funeral march--Unemployed
    organizations--Sklar and Maltz return to N.Y. to work on Peace on Earth--Plans for the Theatre Union.'
- speaker: Respondent
  text: 'Widespread union strikes and violence: Gastonia, Harlan County - Depression atmosphere: background for radicalization--Appeal
    of the Communist party - Reading Marxist literature; a new breed of philosophy - Interest in Soviet Union: myths and misconceptions
    - Soviet film.'
- speaker: Respondent
  text: Graduates of American and European universities compared--Passage of time, then and now.
- speaker: Respondent
  text: 'Sexual attitudes - Prudishness in theater--Bonus march in Washington, D.C. - Unemployed Councils and the hunger march
    on Washington - Michael Gold--Scottsboro boys--Political milieu: social fascism and Hitler''s rise to power.'
- speaker: Respondent
  text: International relations between Socialists and Communists - Nazi book burnings - Roosevelt and the New Deal - Growth
    in artistic activity - Labor struggles for elementary rights--Angelo Herndon court case - Death of father and mother -
    Sklar and Maltz write Peace on Earth for Theatre Union - Organizing Theatre Union - Charles Rumford Walker and the Theatre
    Union Executive Board - Good and bad resource materials on left-wing theater in the thirties - Theatre Union advisory
    board--Agitprop theaters.
- speaker: Respondent
  text: Agitprop theater in Europe and the U.S. --Goals of Theatre Union--Innovative policies --Peace on Earth opens to disastrous
    reviews--Emergency measures--Sklar and Paul Peters write and produce Stevedore - Slanted history.
- speaker: Respondent
  text: 'Stevedore - Sets out on trip - Strike in Toledo, inspiration for Private Hicks - General labor picture at the time--Pittsburgh
    steel mill union organizing--"Good-By"--Library, Pennsylvania--Communist-led unions - Black Pit - Farmers'' situation
    in Sisseton, South Dakota: vigilante violence--Shares speakers'' platform with Ruby Bates.'
- speaker: Respondent
  text: 'Begins writing Black Pit--Harry Bridges and the longshoremen''s unions--Elected to board of Dramatists Guild--Sailors
    of Cattaro - Clifford Odets and Waiting for Lefty - Elia Kazan--Production of Black Pit: controversy over content, flak
    from Left - Political background on World War II.'
- speaker: Respondent
  text: France and Britain's appeasement of Nazi Germany--Misconceptions about the Communist party in the thirties - Theatre
    Arts Committee and League of American Writers--Reports on the Soviet Union--First American Writers Congress - Theatre
    Union negotiates to produce Brecht's Mother - Maltz develops relationship with Margaret Larkin - Sexual mores, past and
    present - Writes Private Hicks for a play contest - Joins Communist party in 1935.
- speaker: Respondent
  text: American Communist party in the thirties and forties--Mechanics of joining - Party functions - Difficulty finding
    time to write - Turns from playwriting to fiction - Private Hicks wins New Theatre League contest - Plight of antifascist
    demonstrator, later inspiration for Pride of the Marines.
- speaker: Respondent
  text: Dalton Trumbo on the Communist party - Theatre Union production of Mother; conflicts with Brecht--Communist party's
    relation with Theatre Union--Avert financial catastrophe by presenting Albert Bein's Let Freedom Ring--Short stories--Theatre
    Union opens Bitter Stream--Theatre Union moves to new location.
- speaker: Respondent
  text: 'Political background of 1936: Spanish civil war.'
- speaker: Respondent
  text: 'Impact of Spanish civil war on U.S. - Further description of Brecht - Writing techniques - Myth of the lonely writer--Maxim
    Lieber--Communist writer''s relationship with Communist party: censure and censorship--Hollywood Communists and John Howard
    Lawson--So-called party censorship versus self-censorship.'
- speaker: Respondent
  text: Self-censorship - Moscow trials--Goes to Detroit to get material for The Underground Stream--Sitdown strikes in automobile
    plants--"Bodies by Fisher" and "Marching Song."
- speaker: Respondent
  text: Sit-down strikes--A Long Day in a Short Life - Grebb--AFL and CIO conflicts--Communist influence in unions - Returns
    to N.Y.--Theatre Union opens "Marching Song" to bad reviews--Forced to fold - Other left-wing theaters - Historical writing.
- speaker: Respondent
  text: 'Proletarian literature - "Man on a Road" - Lost works of literature--Migration of European intellectuals into U.S.:
    Franz Weiskopf, Egon Erwin Kisch, Otto Katz, Karl Billinger - Second Congress of League of American Writers--Work begins
    on The Underground Stream--Teaches class in playwriting at N.Y.U. - Thoughts on social fascism.'
- speaker: Respondent
  text: Social fascism in the twenties and thirties preserves split in German working class; paves way for Hitler fascism.
- speaker: Respondent
  text: 'Other contributing factors - Songs of the Left: Spanish civil war influence - Ralph Bates - Lini DeVries--Germans
    invade Austria--Rise of nazism binds U.S. leftist with USSR - Soviet position against anti-Semitism - League of American
    Writers aids exiled writers - "Happiest Man on Earth"--Finishes play Rehearsal - The Way Things Are published by International
    Publishers--Gambler''s aspect of a writer''s life.'
- speaker: Respondent
  text: More on the life of a writer - Lini DeVries and the work of the U.S. Public Health Service in New Mexico - Moves to
    Sunnyside - Class for writers continues--Munich Pact, 1938 - Invasion of Czechoslovakia and defeat of Spanish Republicans
    - Rise of anti-Semitism in U.S. --Coughlinism--Equality magazine.
- speaker: Respondent
  text: 'Equality--Articles - Writers Conference in the Rocky Mountains: Edward Davidson, Eric Knight, Norman Corwin, Carl
    Van Doren, Burges Johnson - Nazi-Soviet Nonaggression Pact - Ties with Soviet Union--U.S. Communist party takes isolationist
    position in World War II - Collaboration with Dashiell Hammett on article.'
- speaker: Respondent
  text: 'The Underground Stream is published - Writing fiction vs. playwriting--Articles for Equality - Sklar and Maltz invited
    by Hollywood Communist party to do revised Peace on Earth--Back to Boulder and on to Queens--Making ends meet - Research
    into black history for "The Piece of Paper" and projected novel - "The Happiest Man on Earth" made into short film by
    MGM - Joins Sklar and Blankfort in Hollywood: works on This Gun for Hire for Frank Tuttle and Paramount - Ill-suited for
    California weather - Germany invades Soviet Union - Movie studios in the forties.'
- speaker: Respondent
  text: 'Problems of writers writing for films - Dudley Nichols - This Gun for Hire - Adapting other writers'' works vs. original
    work - Answering charges against Communist film writers - Cecil B. De Mille--John Howard Lawson: his influence, benign
    and malign - Pearl Harbor and the internment of the Japanese - The Man on Half-Moon Street - This Gun for Hire is released.'
