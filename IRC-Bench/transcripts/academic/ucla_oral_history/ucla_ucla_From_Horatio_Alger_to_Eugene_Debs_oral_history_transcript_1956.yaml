collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Where had your grandfather lived before he came to California?
- speaker: Respondent
  text: Philadelphia. When he was a young man there, I think he was connected with Smith, Kline and French, a company which
    still exists. They wholesaled chemicals and medical supplies. He came out to California in the Gold Rush.
- speaker: Interviewer
  text: Do you know how he happened to go to work on the Sacramento Union?
- speaker: Respondent
  text: No, I don't. I presume in the early days there were not many trained newspaper people in California at the time and
    anybody who had an education could fit into the work. And as the newspaper grew, his experience grew and he became, perhaps,
    a pretty good editor. He was the city editor of the Sacramento Union.
- speaker: Interviewer
  text: That was the paper that Mark Twain and Henry George worked on?
- speaker: Respondent
  text: Yes, it was a crusading paper. We have a letter by Mark Twain written to my father many years later recalling the
    days on the Union and what fine men the proprietors were and how courageous they were in advocating reforms.
- speaker: Interviewer
  text: What sort of reforms? Along the Henry George single-tax line?
- speaker: Respondent
  text: Probably not. In those days in many people's minds the Southern Pacific was the enemy of the public because it was
    monopolistic, had things pretty much its own way and ran the politics of the state. At least, that was the feeling of
    the anti-railroad people. It was that group that elected Newton Booth Governor of California as an anti-railroad man.
    He was Booth Tarkington's uncle. Politics then was very much as it is today. Hiram Johnson's father, Grove L. Johnson,
    was an Assemblyman in that period. Later he was classified as pro-railroad. My grandfather was also in the legislature.
    It was in the '70s. It's one of the stories in the family - I can't vouch for it - that in a way he was responsible for
    keeping the capital in Sacramento. There was an attempt to move it to Benicia and of course the Sacramento people were
    against it. When the matter came up in the Assembly for voting, my grandfather was to make the speech favorable to Sacramento.
    He had taken the precaution to put on a pair of hip boots and wade into some mud nearly up to his waist. When it came
    time to speak, he got up on the platform. He apologized for his appearance and explained he'd just been down to look over
    the new proposed site for the capital in Benicia. According to some people, that was what kept the capital in Sacramento.
- speaker: Interviewer
  text: Those were the days when the Workingmen's Party was becoming...
- speaker: Respondent
  text: It was the Union Party - a reform party - or at least the party of protest.
- speaker: Interviewer
  text: Did your grandfather do anything else in politics beside serve in the legislature?
- speaker: Respondent
  text: No. He ran unsuccessfully for the Senate against Leland Stanford.
- speaker: Interviewer
  text: You mentioned that a great-uncle had been an abolitionist. Was this due to his Quaker connections?
- speaker: Respondent
  text: Probably. His name was Passmore Williamson. There is a book about him. I forgot the name of it. Oswald Garrison Villard
    gave him the name of it later and I've tried to get a copy of it.
- speaker: Interviewer
  text: Did you know Mr. Villard?
- speaker: Respondent
  text: I met him a number of times and had correspondence with him. His grandfather, William Lloyd Garrison, and Passmore
    Williamson were contemporaries and when my great-uncle went to jail for his underground railroad activities, Garrison
    and Whittier came to his defense.
- speaker: Interviewer
  text: This must have been in Philadelphia?
- speaker: Respondent
  text: Yes. As I know the story, Uncle Passmore was Secretary of the Anti-Slavery Society. It was his duty to go to the boats
    and trains and meet the colored people, and explain that under Pennsylvania law they were free. If the slaves wanted to
    escape, they would help them. In the case that made trouble, it happened that the slave and her two children belonged
    to a Southern Senator. Through his influence Uncle Passmore was arrested and tried under the Federal law and sentenced
    to nine months in jail.
- speaker: Interviewer
  text: Something to be proud of. Was your great-uncle more active after that?
- speaker: Respondent
  text: Well, I don't think he had much chance afterwards. But he had helped to organize the first Republican convention,
    the one that nominated Fremont. The war soon followed.
- speaker: Interviewer
  text: Your father was born, I take it, in California?
- speaker: Respondent
  text: No, he was born in Philadelphia, but was brought here when he was two years old, across the Isthmus.
- speaker: Interviewer
  text: Did your father then follow in your grandfather's footsteps in politics and in newspaper work?
- speaker: Respondent
  text: Well, he went back to Philadelphia to study law at the University of Pennsylvania. Then he came back and was soon
    elected to one of the smaller judgeships. Then he went back East again, taking the family with him.
- speaker: Interviewer
  text: Do you know why he left? He was a judge.
- speaker: Respondent
  text: Partly to administer a family estate.
- speaker: Interviewer
  text: So then Philadelphia was the scene of your childhood?
- speaker: Respondent
  text: That's where I went to school. I left when I was about twenty-seven and came back to California.
- speaker: Interviewer
  text: I'd like to know some more about your father there in Philadelphia, what his interests were. You say he was a lawyer?
- speaker: Respondent
  text: He was a lawyer. He was interested in writing. As a family, one might say we were readers. But not in the sense people
    are today; we didn't devour books. There weren't so many to devour. It was the New England group we looked up to in those
    days.
- speaker: Interviewer
  text: Who? Henry Wadsworth Longfellow?
- speaker: Respondent
  text: Whittier and Lowell and Edward Everett Hale, Emerson, Julia Ward Howe, Margaret Deland, Oliver Wendell Holmes, Mary
    E. Wilkins, Thomas Bailey Aldrich, William Dean Howells, Henry James. As I recall some of the people in their books, their
    adventures were largely struggles with their consciences.
- speaker: Interviewer
  text: And that's the sort of thing you grew up with?
- speaker: Interviewer
  text: Did you attend a church when you were a boy?
- speaker: Respondent
  text: My father's mother's family had been Quakers, but my grandmother went over to the Unitarian Church. We weren't what
    you would call a very churchy family. Part of our life, I think, was made interesting by the contact with the church.
    My father was president of the local Unitarian Association, which often had interesting speakers. I still hold the vivid
    image of Julia Ward Howe rising to full height and leaning on a cane reciting the stirring "Battle Hymn of the Republic."
    Her presence and her deep resonant voice made a lasting impression. She might well have been a character from Hawthorne's
    The Grey Champion. Emerson's brother spoke once. And Booker Washington. I recall one of the stories he told. He and a
    friend were travelling through the South. One night they came to a little shack where they had to put up for the night.
    In the morning the colored lady gave them their breakfast and as she poured their coffee she asked the other man if he
    wanted long sweetening or short sweetening. Puzzled, the other man decided on long sweetening. So she took her finger
    and dipped it in a little jar of molasses and whirled it around in his cup. When she asked Mr. Washington which he wanted,
    he decided on short sweetening. She took up a lump of sugar, bit a piece off and dropped it in his coffee.
