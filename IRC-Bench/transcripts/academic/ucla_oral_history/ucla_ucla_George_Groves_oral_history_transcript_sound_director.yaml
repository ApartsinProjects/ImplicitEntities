collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: We'll start from the beginning with the beginning. First of all, of course, my name is George Groves. I was born in
    England in a manufacturing town about twelve miles from Liverpool called Saint Helens, which is famous mainly for being
    the home of Beechams Pills. When I was a small boy, the father of the great conductor, Sir Thomas Beecham, was the Mayor
    of Saint Helens. As a small boy, I had a pretty fair musical education. My father was a musician. He was interested in
    brass bands, of which they have quite a lot in England. At a very early age, as my parents told me, I tried to play the
    trumpet, and later, the French horn, I think this is of some interest, because in later years it controlled the work that
    I finally went into.
- speaker: Respondent
  text: I got a scholarship to a grammar school called Cowley School, which is equivalent to an American high school. While
    I was there, I used to take my trumpet to school and learned, for instance, to transpose B-flat trumpet to play with the
    piano for singing lessons which you know, is quite an advanced thing for a young boy to do.
- speaker: Respondent
  text: Before I completed the number of years I was supposed to be at this grammar school, it happened (and a lot of these
    things just happened) that the trumpet player in the local theater got sick. Now I had played with amateur orchestras
    and bands as a youngster, and in desperation I suppose, they called my dad and said, "Can young George play the show tonight?"
    And I played the show in the local theater, which had a vaudeville house and a very "hard grind" place - two shows a night
    and a matinee on Monday and so on. I played the show and stayed. They kept me on as first trumpet in this theater.
- speaker: Respondent
  text: 'They had a matinee every Monday, so I had to skip school every Monday afternoon. This was accepted for a while until
    finally the Headmaster of the school objected. So I quit school and had a private tutor. Eventually I entered into competition
    with other boys for scholarships to the University. I competed with the boys in school and did pretty well. I won an engineering
    scholarship to Liverpool University. Now, here again, accidental things happened. My scholarship was called an open scholarship:
    I could actually choose the subject that I would take. It was a question whether I should take Medicine or Engineering.
    Like most young kids, I really didn''t know what I wanted to do. I don''t think one child in a hundred or a thousand actually
    knows what he wants to do. If they did, and worked towards that goal, they would be great successes. Oh, I visualized
    myself some day building bridges or doing some big engineering something or other, I don''t know what. I chose to take
    Engineering and specialized (or majored) in Communications Engineering.'
- speaker: Respondent
  text: I don't know how it is in school here, but in England you enter school and the first year you take an over-all course--in
    Engineering School it's a lot of mathematics, and physics. As you go through each year, you gradually funnel down to the
    thing you are going to specialize in, I finally got down to Communications Engineering. In the meantime, during summer
    vacations, to help pay expenses, I played the trumpet and also the French horn in theaters in Liverpool, Saint Helens,
    and other towns where I was called upon to play.
- speaker: Respondent
  text: Now, in Liverpool University it was common, as in most universities in England, that if a man had a degree in Engineering
    or Physics or one of the sciences, they would endeavor to place him in some form of employment. He didn't have to go out
    and find for himself. I came out with what is known as an Honors Degree - a Bachelor of Engineering Degree with first
    class honors. This means that I got high grades in the school examinations. I was finally located by the University in
    the Peal-Connor Telephone Company in Coventry.
- speaker: Respondent
  text: I had specialized in transmission engineering. Now this is the transmission of intelligence, not power engineering.
    A transmission engineer in our terminology is a man who is an engineer in speech circuits, you see. The power engineer
    is concerned with the transmission of power for lighting, the operation of machinery, and so on.
- speaker: Respondent
  text: Transmission is generally accepted as the engineering concerned with the transmission of intelligence - speech - and
    this is a form of study that I specialized in at school. As a result of that, I went to a telephone factory, where they
    manufactured telephone equipment, radio equipment, and equipment that transmits intelligence. This was the Peal-Connor
    Telephone Company in Coventry, a branch of General Electric Company.
- speaker: Respondent
  text: Now, I had a desire to come to the United States because, to my young mind (and I think I was probably correct), the
    United States was the foremost country in the world in the development of the telephone, and broadcasting, and the transmission
    of intelligence by speech in one form or another.
- speaker: Respondent
  text: I wrote to the Western Electric Company, the General Electric Company, and Westinghouse, and received replies back
    from them to the effect that, since I was an alien on foreign soil, they could not offer me employment. However, from
    the Western Electric Company, I received a letter telling me that their Director of Research was in England at the time,
    and would be very pleased to talk to me if I would take the time to visit him in Manchester. I did; I talked to him, and
    he told me that they couldn't offer me employment, but if I ever showed up in the United States they would be very happy
    to do what they could in the way of advancing my education and training.
- speaker: Respondent
  text: Primarily I wanted to get to the States and go to work for some research organization like the Bell Telephone Laboratories
    in New York, and I eventually succeeded in doing this.
- speaker: Respondent
  text: And after some interviews with the personnel people and the various department heads in the Bell Labs, they asked
    me what I would like to do. I was still pretty indefinite, so I was placed in the Research Service Department. This was
    a department that was concerned with budgeting of various scientific projects in the labs, the design and construction
    of transatlantic telephone cables and other big things, plus the research work that was going on in the business of making
    phonograph records and reproducing them through amplifiers and loud-speakers. It was practically a natural thing that
    I should drift into it. It was not by design. I just happened to be there.
- speaker: Respondent
  text: I had no idea that they were going to make talking pictures when I went into the Bell Labs at all. I never dreamed
    of it any more than anybody else in the world did, outside of a few engineers in the Bell Labs. So I just happened to
    fall into it, and, as I say, my training and background, one way or another, made me quite well-suited for it.
- speaker: Respondent
  text: This also turned out to be a very good location for me because it gave me an opportunity to tour around the labs and
    observe the operation of a lot of departments. I had a job putting in some demonstration equipment in the science building
    in Washington, and so I got an over-all look at Bell Labs.
- speaker: Respondent
  text: While I was there, research on the telephone was progressing - improved transmission characteristics of the telephone,
    improved transmission and reception of speech, and the development of loud speakers. As a by-product of all this, and
    of studies on speech and hearing, came the system of electrical recording of records, called the Orthophonic Phonograph,
    which was adopted by the Victor Company. This new method replaced the old acoustic method just using speech waves to drive
    some actuating device which would record grooves in a record, like Edison did. Previous to this development, phonograph
    records were made by talking into a horn - it was an acoustically-powered recording system like the old Edison Phonograph
    system, a little more refined than that, but nevertheless the whole recording system was actuated by voice power. Just
    by sound waves.
- speaker: Respondent
  text: It so happened that, while I was working in the Bell Labs (I was there for two years), I met people who were interested
    in music, and I played with quite a few orchestras in New York. One was an orchestra at the Germania Club that met in
    the Academy of Music Building in Brooklyn. These were all German businessmen, wonderful musicians, who would get together
    an orchestra of about fifty or sixty pieces, and I played with them. I played with a group of men who used to meet at
    their various homes and play chamber music. And I played with the American Orchestral Society which met every Sunday morning,
    I believe. I played with an Orchestral combination at City College in New York which met in the middle of the week under
    the direction of a man named Christian Kriens. That was an orchestra of over one hundred pieces. So I was quite involved
    in music in New York not professionally, but just for fun. Eventually, I organized a small orchestra amongst the employees
    in the Bell Labs and conducted it - we had a lot of fun.
- speaker: Respondent
  text: This was in 1925. I was in the Bell Labs from 1923 to 1925. I had just received my two-years-service certificate from
    the Bell Labs when I was transferred to Warner Brothers. The engineers in the Bell Labs put on a demonstration of the
    synchronized motion picture and a synchronized disc (phonograph record) for various motion picture executives, and finally
    it was demonstrated to Mr. Sam Warner, one of the Warner Brothers, who died some years ago. Sam came to New York and saw
    this demonstration of synchronized sound and picture in the Bell Labs. He thought it was a wonderful thing, and a contract
    was drawn between Warner Brothers and the Bell System to go into the exploitation and the making of talking pictures.
    It was a very simple demonstration of synchronized sound and picture - somebody dropping something on a table and making
    a noise so that you could see distinctly that the sound and picture were synchronized.
- speaker: Respondent
  text: I was transferred from the Bell Labs and to the Warner organization, virtually as part of the equipment that went
    along. It was a "package deal" so to speak. They provided Warners with the original wax-recording machine and the microphones
    and motors to drive the camera and the recording machine together, and keep them in synchronism. It was all pretty crude
    by our present standards, but nevertheless it worked. A Chief Engineer named Mr. Watkins, who also happened to be an Englishman,
    was in charge of the project. We were all, as I say, "the package," more or less, turned over to Warner Brothers to get
    this thing going.
- speaker: Respondent
  text: The first efforts at making synchronized sound pictures took place in the old Vitagraph Studios in Brooklyn. Warner
    Brothers owned those particular studios. Out we went to the old Vitagraph Studios and installed the first equipment that
    was used to try and make some kind of a commercial product of synchronized picture and sound.
- speaker: Respondent
  text: This was pretty much a shell of a studio and in our own rather crude way we tried to acoustically treat the place
    so that we would get some semblance of decent recording. We got carpets and felts and hung them around these very "live"
    stage walls to cut down reverberation and echo and proceeded to make some experimental short subjects.
- speaker: Respondent
  text: The recording machine was a wax recording machine, typical of the equipment used in the phonograph industry by Victor
    Company and others. The camera was an open camera, very noisy, and driven by a motor, instead of by a hand crank, through
    a flexible drive shaft. The camera motor was electrically interlocked with the motor that drove the recording machine,
    and in this way, we started with the first efforts of recording sound and picture.
