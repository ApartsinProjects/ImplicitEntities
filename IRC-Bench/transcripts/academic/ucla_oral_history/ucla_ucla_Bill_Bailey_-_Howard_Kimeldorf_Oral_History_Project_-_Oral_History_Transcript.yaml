collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: So, Bill, why don't you start by just telling me your involvement, how you got into the maritime industry.
- speaker: Respondent
  text: Well, I started out going to sea when I was about 15 years old, 14 and a half, 15 years old, and that was back in
    '28, '29. I remember getting on a ship in New York, as an ordinary seaman working for $30-35 dollars/month. From then
    I just went on other ships; I pursued it, kept on going with it. I spent some 23 years on the sea before I involuntarily
    gave it up. Because I got screened off the waterfront. I was a sea-going guy, although during the war I said I was an
    engineer, all during the war, no problems there. But it was just during the Korean War, when they came up, that they passed
    the screening bill. The right-wing unions had a hay day; they got rid of all the left-wingers they wanted. All they did
    was hand us over to the Coast Guard. Coast Guard said, "We'll take care of it from there." That's what happened.
- speaker: Interviewer
  text: Why did you go to sea? Wasn't that awfully young?
- speaker: Respondent
  text: I come from a family of dire poverty. It would have been just as well had I got into any industry that had a kitchen
    in it where they fed you. You know, I was growing - that's what I needed, someplace where there was meals there waiting
    for you. I remember trying to do part of the [in audible], that area. I even tried to join the marines. Everything was
    for hunger. It was a sad set-up. But I do remember trying to join the Marines. It looked like I was going to make it.
    The doctor put me up on the desk, and he says - no, that was the Navy guy. The Marines guy said, "Take a walk. Walk over
    to that corner there. Oh, no, you're flat-footed. We can't take you." That was just like that. I went down. So, I says
    ok, son of a bitch, I'm going to make it somewhere, so I went to join the Navy. Or, try to join the Navy. Everything was
    working fine. Heart, lung, eyesight, hearing; everything was perfect. The doctor says, "Hey, I don't like the way you're
    walking there. Something's wrong there. Walk some more." I walked. He said, "You must have had polio when you were a kid."
    I said, "Yeah. It left one leg half an inch shorter than the other." He says, "I'm sorry, but we can't take you." God!
    I was so disappointed, you know? It was two o'clock, and I knew that, if they would have accepted me then, they would
    have sent me to a camp someplace. I would have had my supper waiting for me. Hunger and food was a reality. I had no money
    floating around, no jobs. Jobs were impossible to get. Be as it may, in a sense I'm glad that I didn't get into either
    one of the outfits. I'm glad now that I didn't even go to the army. The army was the last resort. The hell with the Coast
    Guard. In them days, they wasn't taking anybody in. They shut the door and said, "that's it, no recruits, we don't want
    'em. We're overloaded.' You know, people trying to get in to get a meal, more or less, or some security.
- speaker: Interviewer
  text: Were you old enough to join the service?
- speaker: Respondent
  text: Hell, no, I was doing all sorts of ages. Pulling out brothers' birth certificates, lying like a son of a bitch. I'd
    tell them I was 21; I was only 15. But that's the name of the game. It didn't make any difference to me. As far as I was
    concerned, I wasn't doing anything unscrupulous. I was just trying to preserve myself.
- speaker: Interviewer
  text: So you shipped out of New York -
- speaker: Respondent
  text: Yeah, I walked down until I could get a ship. I covered every single ship in the New York harbor including foreign
    ships. I went aboard English ships hunting to try to get a job. Ships like the SS Minnetonka, the SS Minnewaska sailing
    into London or something like that. The engineer would say, "But you're a Yank! We can't take you. If you was over there,
    maybe we could take you. If you was in London we could probably grab you. We can't take you. We got all kinds of cousins
    on the dock there trying to get a job. Guys who had jumped ship or been in the hospital here, stuff like that. Trying
    to get home, back to England. No, we can't do it. We have to take care of our own people first." That's when I started
    hearing "my own people first," which you didn't hear too well in them days. 'Course now you're hearing it more in this
    period. "Take care of our people first." "Our people," who the hell are "our people"? But, anyhow, I couldn't just say,
    "Hey, man, I'm starving to death. Just give me a job." Be as it may, I didn't get nothing, and I ended up on the last
    ship on the waterfront in New York harbor. Pier 1, way the hell down the Battery. You familiar with New York?
- speaker: Interviewer
  text: A little there.
- speaker: Respondent
  text: Well, Pier 1 used to be an excursive pier where the overnight boats used to go up to Albany [New York]. It was also
    the outfit called the New-Tex Line, oh, way back. They ran little steamers, freighters down to Texas. General cargo down
    there into Houston [Texas] and Galveston [Texas]. Then went over to the sulfur ports, [?Shreveport?] [Louisiana] and Sulfur
    City [Louisiana], Texas City [Texas] places like that. Load up with bulk sulfur, and took that all the way up to Baltimore
    [Maryland]. Then came down from Baltimore to New York [New York], cleaned the hold out, and loaded up with general cargo
    again. So, I just happened to go aboard the ship, I guess the mate had an argument with an ordinary seaman. I don't know
    what the beef was, but he fired him. I just happened to be at the right place at the right time. I stood there lying like
    hell. Told them I was an experienced seaman; I'd been on all Seven Seas, including the Dead Sea, I could do anything on
    his ship, blah blah, I'm 21 years old, and I've already been on so many ships, this and that. And I started naming them,
    including Belgian ships, English ships, and everything. The guy just said, "Yeah, ok, come on back at five o'clock and
    six o'clock take over the gangway watching." From then on, I had a job as an ordinary seaman. The whole myth of going
    to sea, the whole mentality you had built up in the mind - going to sea would solve all your problems - it just didn't.
    Because it only solved them momentarily while you was a board the ship. After you stepped ashore, the problems were still
    there. Housing, hunger, family disputes, the hell of life. They were all taking place all over again. As long as I was
    on the ship, I had my three meals a day and a certain amount of security. But once I got off the ship, back to the old
    problems again. It's like, before you got on, you have a beef with the wife. You figure, ok, I'm shipping out now tomorrow
    and it will be all squared away. So when you come back, it'll be a new honeymoon. But you didn't solve the problem. You
    only intensified them. Well, you had a honeymoon for a couple of days. Bang, out would come the problems again, whatever
    they were. So it was a question of you trying to solve these things. If you don't solve them, you're screwed. You know,
    it's a pretty sad ending.
- speaker: Interviewer
  text: Was it a union ship that you were on?
- speaker: Respondent
  text: No, in them days we didn't have a union. That's why you went with your cap in your hand, bumming a job to the engineer,
    or the mate, or the steward. "I could work harder than the next guy. I could do a better job. I'm more experienced." You
    didn't say you'd work for less money, but you'd say, "Hey man, I can take anything you've got to hand me." And put up
    a front for the interview. You're strong and healthy. Of course, they're going to take your young muscles and no brains
    over some guy who's 70 years old, no matter how much experience he has, because he couldn't handle the load, and so on.
    But after you make your first trip, you learn an awful lot. I used to believe that, as soon as the ship got at sea at
    night time, they'd put out all the lights and drop the anchor. I mean, ships never sailed at night! How can they see?
    You'd have to be crazy! They only sail during the day.
- speaker: Interviewer
  text: How did you adjust on that first trip, being -
- speaker: Respondent
  text: I was pretty seasick right off the bat. Everything went wrong. I remember being up on the forecastle head watch. He
    said to me, "You get up the forecastle head, spot the lights." Well, if the weather is calm, and you're up on the forecastle
    head spotting lights - are you familiar with the set up?
- speaker: Interviewer
  text: A little bit.
- speaker: Respondent
  text: Well, you see a light to port, way off on the horizon, and, bang, you got to the bell, bong! One bell. The mate will
    holler after he spots the light himself. The bell is to draw his attention to it, and you're telling him, bang, one bell,
    across to port. He looks out to port, "Ok!" Now, then, if you see a light off to starboard, bang bang! Two bells. He'll
    come out and look. Or a light straight ahead, three bells. But you're supposed to at least report them to draw his attention
    to it. It was freezing leaving New York harbor that time. It was cold, and I was unfamiliar with it. It started to sway
    up and down. The winches, there was also the anchor winch, a combination anchor winch and holds the line, drawing in all
    the ropes that you tied up the ship with. Pulling it all aboard, and you use that winch. Well, the cylinder drumhead for
    that was nice and warm. Anything above the desk was cold, East Coast winds coming down from Nova Scotia, Jesus Christ,
    biting into me, and I was sitting there freezing to death. So, all of a sudden I says to hell with the lights, and I come
    over to where the heat drew me to, the cylinder head. I found a burlap bag, and I set it up on this cylinder head. Like
    I said, the steam was shut off, but the heat had been so terrific that it just kept that cylinder head hot for a long
    time. So, I sat down on it, and I felt real good. All of a sudden, I put my head down. Next thing, [makes snoring sounds]
    I'm sound asleep. Lights all around me. Different ships coming and going. From what I hear - a sailor told me later on,
    he said the mate was all, "Where the hell is that dumb son of a bitch down there in the first place? I bet he's asleep
    down there! The hell with him. Let him sleep." Anyway, I woke up at midnight. The other ordinary seaman was coming to
    take over the watch. I learned a lot on that ship. Made me a little more comfortable and more secure on the next ship.
    Like I say, the more you travel, the more habits you learn - good habits - and how to reject the bad ones. But unions
    did come on later on, much later. That was from the MWIU, the Marine Workers Industrial Union.
- speaker: Interviewer
  text: When did you become affiliated with them?
- speaker: Respondent
  text: That was about 1932, I guess.
- speaker: Interviewer
  text: So you'd been sailing for about 4 years.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: What attracted you to the Marine Workers Industrial Union?
- speaker: Respondent
  text: 'A series of things. The first trip to sea, I had ran into a Wobbly down in Houston. They''d do it the same as we''d
    done it, the Marine Workers. They''d come aboard the ship whenever they get a chance and hand out literature. He had come
    aboard, and I was one of the guys he ran into. He handed me a copy of the - what was it, The Transport Worker? The Wobbly
    paper. Emblazoned on a part of it was the preamble: "The working class and the capitalist class have nothing in common.
    They''re in one terrific, constant, 24 hours-a-day struggle." All that stuff, and explaining what the capitalist class
    does and what the working class should do. How they eventually set themselves up in power with the machinery to end exploitation
    of man against man, and all that stuff. So, I mean, I read half of it, and, all of a sudden, somebody called me to do
    something. The guy was trying to talk to me. He starts telling me, he says, "Don''t forget now, you''re a class member."
    I couldn''t understand what he meant. Class? He asked me a couple questions, how much wages I get. I told him I was getting
    $37.50. He said, "You should be getting twice that much." It was a haphazard type of discussion. Nothing was ever resolved.
    I just took the paper, thanked him politely for it. Later on, after we was at sea, on our way home back up the coast,
    I had a chance to read the paper again. I liked the preamble. After I found out what the hell he meant by "class."'
- speaker: Interviewer
  text: So, you were politically naive beforehand?
- speaker: Respondent
  text: But when it was explained that a class is somebody who has nothing but his bare hands and his labor power. That's
    the class you belong to; you ain't got nothing else. The other owns the means of production; they own every goddamn thing.
    They can determine if you're going to have beefsteak tonight for supper or dead cat. That's the power they got. Starve
    you or feed you or what. Turn around and turn it up. But, as long as you're a member of the working class and you don't
    unite yourself with other members of the working class, you're useless. I mean, you're nothing. You're constantly going
    to be exploited and stepped on, and abused and so on. So the job is to weld the class together for fighting position.
- speaker: Interviewer
  text: Can I stop you for one second?
- speaker: Respondent
  text: Yeah, sure.
