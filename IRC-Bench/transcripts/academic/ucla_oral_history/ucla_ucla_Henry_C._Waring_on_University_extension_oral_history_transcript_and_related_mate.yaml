collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: I might just talk a moment on the 1932 committee study. This came about from a study made in 1947-48 of Extension's
    financial policy in relation to state support and the fact that that study raised certain questions in the Regents' minds.
    The idea being that the 1947-48 study primarily proved the assumption that University Extension needed a definite financial
    policy for its basis of support in order to continue operation. But it did not make any suggestion as to what the basis
    should be or what the amount should be, or anything of that kind.
- speaker: Interviewer
  text: This first committee then didn't really put forth any specific ideas at this point.
- speaker: Respondent
  text: It just justified University Extension's position in the University family and the idea that University Extension,
    in order to continue to operate on a sound basis, needed some finances.
- speaker: Interviewer
  text: Before then what had happened?
- speaker: Respondent
  text: Well, going back to 1912, the Regents announced a policy at that time which in effect said the costs of administering
    the work of the University Extension be included in the budget of the University as presented to the state legislature
    for the years 1913-15 in the amount of $30,000. The financial support thus proposed was then included in the University
    budget, and this was based on the Extension Division's administrative costs, as they called it then. Although it's not
    clear, I think that the real basis was that the Regents felt that the state should cover the basic administrative costs,
    and the adult population of the state, who were availing themselves of the educational opportunities of this service,
    should pay for the instructional costs. And at this time University Extension was just really beginning, and it was very
    small. So this was set at $30,000 for the biennium. And special legislation was then enacted in Sacramento appropriating
    these specific funds.
- speaker: Respondent
  text: Subsequently, as Extension grew, and I haven't got the exact date, this was changed to $30,000 a year instead of per
    biennium. It was some time after World War I, I believe. Probably. I'm not up on this.
- speaker: Respondent
  text: Then as Extension continued to grow, the president, Sproul, from time to time supplemented these state funds from
    University funds, or from other funds he received from the state. In other words, in the total appropriation which the
    University asked for was included additional funds for University Extension. But the $30,000 was a separate special bill
    appropriated.
- speaker: Respondent
  text: And then it was not until, well, I would say probably 1930, or along in there, that a number of these special appropriations,
    or special bills, introduced each year or each biennium to the state legislature, were all abolished and it was decided
    to request all the University's funds in one bill.
- speaker: Interviewer
  text: Including Extension's?
- speaker: Respondent
  text: Including all of Extension's.
- speaker: Interviewer
  text: Is that what happens now?
- speaker: Respondent
  text: Yes. Our appropriation is included in the overall University Extension request.
- speaker: Interviewer
  text: Whom do you plead your case before for your budget?
- speaker: Respondent
  text: Well, we plead our case to the president to include what we ask for in the University request for appropriations in
    Sacramento. Then this, the total University request, is submitted to the Regents for approval, and then from there it
    goes to Sacramento through the department of finance, who make recommendations to the governor, etcetera.
- speaker: Interviewer
  text: Why do they lump all this together?
- speaker: Respondent
  text: I think this was a plan to fight one battle instead of half a dozen battles. It was decided that it was better to
    get one amount, including all of our requests, instead of having various little side issues of small size appropriations.
    And then this also was taken into account. Everybody knew what the total amount was that the University was asking for
    — not this amount plus this amount plus this amount.
- speaker: Interviewer
  text: The 'Oh no, not that again' sort of thing?
- speaker: Respondent
  text: Well, now to get back to the '53-'54 reports.
- speaker: Interviewer
  text: That was when this question came up again. When it became necessary for you to get your slice of the pie from the
    whole University budget.
- speaker: Respondent
  text: So it was decided. This was discussed at a Regents meeting and the president was instructed to appoint a committee
    to study Extension finances. At this time the president suggested that I go to visit six or eight major extension services
    to study not only university extension financial problems and their budgeting procedures but to also discuss with the
    financial head of the parent institution what their policy was regarding finances at university extension. And I was chosen
    because of my background in the accounting office and the cashier's office and at Extension.
- speaker: Respondent
  text: It was about 1951 or '52 when I took a trip and visited Minnesota, Wisconsin, Michigan, Penn State, Virginia, Nebraska,
    and Washington to try and determine if there was an official policy, or any policy, as to the basis of the university,
    the parent institution's support of their extension services.
- speaker: Interviewer
  text: These were all state universities now?
- speaker: Respondent
  text: Yes. These were all state universities.
- speaker: Respondent
  text: What I discovered was that there wasn't any policy. [laughs] All extensions, as far as I could find out, just 'growed
    like Topsy.' And, of course, each one had developed some sort of a level of support. For example, Wisconsin, which was
    highly developed, had around fifty percent, while some of the other schools...
- speaker: Interviewer
  text: You mean fifty percent state aid?
- speaker: Respondent
  text: Fifty percent state support. While at Penn State they were eleven percent. I don't know whether you want to get into
    this — there were a number of reasons for this. In Penn State, in Michigan, and Wisconsin, the state does not have their
    own system of junior colleges. In these states the extension services are operating a series of junior colleges throughout
    the state. Penn State was operating about six or eight; Michigan about four in various locales throughout the state —
    they gave one or two years of college training. In Penn State — Penn State had no freshman year at Penn State University,
    or Penn State College as it was then. All of the work done by Penn State in the first year of college was done through
    education centers throughout the state operated by university extension.
- speaker: Interviewer
  text: Did they also operate adult education at these centers then?
- speaker: Respondent
  text: Yes, they also had adult education centers there too. The centers were used in the daytime for what we would call
    junior college work — the first or second year of college. It was in-resident service there — I mean resident training.
    And then the centers were used in the evening and late afternoon for adult education, conferences, institutes, and workshops,
    etcetera.
- speaker: Interviewer
  text: Oh, and these were operated and administered by the mother institutions?
- speaker: Respondent
  text: They were operated by the extension service at the parent institution and the extension service also operated the
    junior colleges in the daytime. They operated the junior college and this was in their budget. Penn State even had their
    own gymnasium and football teams in the junior colleges. They were operating through university extension at Penn State.
- speaker: Interviewer
  text: So extension then included both adult education and regular full-time students.
- speaker: Respondent
  text: High school graduates.
- speaker: Interviewer
  text: Do you think there's ever any chance that something like this might happen in California?
- speaker: Interviewer
  text: Right now they're going through this tremendous study for reorganizing junior colleges and state colleges and the
    University systems.
- speaker: Respondent
  text: But I don't think that with the junior college system and the state college system developed to the point that it
    is, that the Regents of the University will ever take them over.
- speaker: Interviewer
  text: If they do take them over, do you think they will give them to Extension? Is there much chance of that?
- speaker: Respondent
  text: I wouldn't think so. They're too large. It is too large a system. Now you take Penn State, without all its junior
    colleges, if I remember correctly, its budget was below $200,000. While University Extension in Berkeley, even at that
    time, was running $2,000,000. The only extension service — this is in '52-'53 — which was larger than University of California
    Extension in terms of financing was Wisconsin. Wisconsin had a very elaborate and a very comprehensive extension service.
- speaker: Interviewer
  text: Well, doesn't that include agriculture too? Isn't it all put together?
- speaker: Respondent
  text: No, it is not. But they are tied in fairly closely with ag extensions. The fact is, the unusual thing about Wisconsin
    is that the extension service has county representatives — just like ag extension has. They are sometimes, as I recall,
    joint appointments — ag extension and university extension the same person. But this is one of the ways in which they
    have done a great deal in getting out throughout the entire state. And the extension representative, county representative
    — whatever you want to call them — are used greatly to help influence the state legislature. When the university gets
    in trouble or the university extension gets in trouble, word gets out.
- speaker: Interviewer
  text: They have a real grass-roots movement then.
- speaker: Respondent
  text: Grass-roots movement right then and there. And as I said, Wisconsin has probably done the greatest job in adult education
    in that they had done the greatest job of educating their administration and their legislature.
