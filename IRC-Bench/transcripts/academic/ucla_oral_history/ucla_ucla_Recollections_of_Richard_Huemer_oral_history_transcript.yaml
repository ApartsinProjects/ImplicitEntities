collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Just to start with, I'll ask you when you were born.
- speaker: Respondent
  text: I was born in Brooklyn, January the second, 1898, the turn of the century.
- speaker: Interviewer
  text: And you first started to draw at the age of four.
- speaker: Respondent
  text: Yes. If you'll pardon a turn of the century pun - I first started to draw my breath at the age of one minute. I became
    interested in animation when I was about ten years old, and I used to animate little figures in notebooks, and flip them,
    little figures of boxing, or athletic events, and that really was the first animation I ever did. I got the idea from
    little photographic animation books that were current at the time. Incidentally, that's where Winsor McCay got his ideas
    to do animation, I understand from his son, whom I met, while we were working on a Disney picture. There had been a fire
    in the drugstore in the neighborhood, and they found numerous of these little flipbooks, which were about three inches
    square, and you flapped them, and you saw a little scene. I suppose they had been films. They used to give them away in
    drugstores as an advertisement.
- speaker: Interviewer
  text: Were you scribbling in your own school notebooks?
- speaker: Respondent
  text: That's right. Imitating them. I was the local high school cartoonist. I went to Morris High School in the Bronx, and
    Alexander Hamilton in Brooklyn. And in both cases I drew cartoons for the annuals, and wherever cartoons were needed for
    bulletin boards. I always liked to draw, in other words.
- speaker: Respondent
  text: 'The first film I ever saw was the Nelson-Ganz fight, which was at Coney Island. It was a film of the fight, of course.
    They had signs outside of these little restaurants, which said, ''Basket Parties Welcome.'' Which meant that you could
    go into these places, which were filled with tables, and my father would order a glass of beer or coffee, and hot dogs
    for us kids, and we would open our sandwiches and eat them, and they would project these strange movies. One of which
    was the Nelson-Ganz fight, and I''m sure we saw some of Lumiere''s and other French producer''s pictures then. In shocking
    Dink color, some of them were. Animated cartoon movies were done then by somebody nobody ever mentions: Wallace Carlson.
    He did something called ''Dreamy Dud.'' And I saw those about 1914 at the local theaters in the Bronx.'
- speaker: Interviewer
  text: This is after Winsor McCay?
- speaker: Respondent
  text: About the same time. I saw his 'Gertie the Dinosaur' at the Cretona Theater in the Bronx; and I was therefore able
    to recreate it later on a Disney TV show, where we reenacted McCay's performance including the picture 'Gertie' which,
    of course, as you know, still exists.
- speaker: Interviewer
  text: What were your reactions to these films?
- speaker: Respondent
  text: 'We didn''t have the expression then but if we had, I would have said I ''flipped.'' I really was sold on animated
    cartoons. Involvement with live-action films seemed out of reach. Especially as I liked to draw. I spent about a year
    at art school: Art Students'' League, in New York City. I studied under Bridgeman, the famous anatomy teacher. Really
    was famous. Didn''t rub off much on me though.'
- speaker: Interviewer
  text: What did you do, just sketch nudes and things?
- speaker: Respondent
  text: 'Yes, that''s right. Studied anatomy and painted a little. But I always wanted to be a cartoonist. Up in Fordham,
    where I lived, almost every day I passed a sign on the door of the building opposite the university, which said, ''Raoul
    Barre: Cartoonist.'' And this intrigued me to no end, and I walked up the stairs, and I walked into the animating business.
    When Raoul Barre looked up from his desk and said, ''What can I do for you?'' in his strange Canadian brogue, I said,
    ''I would like a job.'' He said, ''You would like a job?'' I said, ''Yes.'' He said, ''Go to the next room and sit down,
    they''ll put you to work.'' It was as simple as that. And they put me to work at something that was called tracing.'
- speaker: Respondent
  text: This was about 1916 and they were doing Mutt and Jeff cartoons. I had to quit high school to go to the League, that's
    how much I wanted to be an artist, and now I was quitting the League to go into cartooning. I was abandoning the fine
    arts. They already had the cell system, but it was not the way it's done today, which is the cells opaqued, to fit over
    the background. Our cells were used to contain the background and whatever lines on a scene were not 'disturbed' by the
    character. All the action was carried on the paper. We inked on paper, with very flashy techniques, in the imitation of
    Heinrich Kley, once in a while. And I would take a series of cells that fitted over the paper to complete the picture.
    If the character walked in front of an object, the drawings that it took for him to pass that object had to have whatever
    he 'disturbed' drawn on that drawing. That's where the tracing came in, we traced that thing in the background onto those
    five or six drawings while he was passing the object. And then that went on celluloid and stayed there, because he wasn't
    disturbing it anymore. But he was walking in front of something else now, and then that had to be traced. In other words,
    we broke the scene down into little groups of areas that were disturbed, so that we could trace those onto paper. The
    foreground stuff was on celluloid, and the ceiling would be on celluloid - which was never disturbed. So it took about
    three celluloids, I think that's the most we used. And then with the paper, you had your complete frame. I was doing the
    tracing, from the background that somebody laid out. I didn't do it very long; in three weeks, I was animating. That's
    how easy it was in those days.
- speaker: Respondent
  text: The staff consisted of about five animators, and about five or six tracers. Actually, there weren't more than fifteen
    people at the studio, Barre made one film a week, that never ran over 450 feet. And, believe it or not, it cost about
    a thousand dollars. And that's what he got for it, about a thousand dollars. The most he ever got was 1500 dollars.
- speaker: Interviewer
  text: How did you get your promotion?
- speaker: Respondent
  text: By asking for it. And the genial Frenchman said, 'Why not?' He was a very fine gentleman. Animation in those days
    was not a difficult art. If it moved, it was good. Actually, the novelty carried it. The business got into trouble when
    the novelty wore off, and the people expected to see gags, and better animation and better ideas. Which, of course, Disney
    eventually succeeded in doing.
- speaker: Interviewer
  text: How funny were these films at the time you wandered in?
- speaker: Respondent
  text: 'As we used to say in those days, as funny as a crutch. This was an expression. They weren''t funny, actually. They
    really weren''t. We got very few laughs. I can remember taking my family to see some bit of animation I was particularly
    proud of, and, just as it went on, somebody behind me said, ''Oh, I hate these things.'' We actually didn''t consider
    the audiences as much as we should have. We did things more or less to please ourselves. It was as though we were enjoying
    ourselves, doing what we liked, what we thought was funny. It was just not understandable to audiences, very often. We
    were given a portion of the picture, over a very rough scenario. Very, very sketchy, no boards like we have today, nothing
    like that. The scenario would probably be on a single sheet of paper, without any models, sketches, or anything, you made
    it up as you went along. You were given a part of the picture, and, you did what you wanted. If it was a picture about
    ice skating, you took a scene of somebody on ice skates, and you used your own gags, and made it all up. We had some famous
    people who came later on to Mutt and Jeff: Milt Gross was one of them, and Gregory LaCava worked up there a while, and
    men from the magazines like Nankeville.'
- speaker: Interviewer
  text: How were these stories written?
- speaker: Respondent
  text: We all helped. We'd spend an evening talking about it. And that's all
