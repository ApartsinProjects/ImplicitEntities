collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: The first question we always ask is, when and where were you born?
- speaker: Respondent
  text: A little town twenty miles from Selma called Snow Hill. It was a little town of-- I don't know how many people, but
    not very many. It was a farm town.
- speaker: Interviewer
  text: What year was that?
- speaker: Interviewer
  text: Who are your parents?
- speaker: Respondent
  text: George and -
- speaker: Interviewer
  text: I have Mims here.
- speaker: Respondent
  text: Yeah, that was my mother's maiden name.
- speaker: Interviewer
  text: Georgia Mims. Do you know much about each of their families, where your father's family was from and your mother's
    family was from? Anything about that background?
- speaker: Respondent
  text: No. Because of the French name Purifoy, I guess the family eventually came from Louisiana, probably. But I have no
    recollection of that. Nobody ever told me actually where we came from or where my parents were born. I never thought to
    ask.
- speaker: Interviewer
  text: When did your parents pass?
- speaker: Respondent
  text: My mother died around 1940, and my father died around 1943.
- speaker: Interviewer
  text: What was their educational level?
- speaker: Respondent
  text: They were farmers, sharecroppers, as the case was. If I can recollect well, my mother went to the eighth grade, but
    my father had little or no education whatsoever. I think my mother taught school in the summertime in Selma. That was
    twenty miles, as I said, from where I was born.
- speaker: Interviewer
  text: Do you have any brothers and sisters?
- speaker: Respondent
  text: Yeah. There were thirteen of us. I only remember eight, two brothers and six sisters. Among the six sisters there
    were twins. We were a rather close-knit family from the time I can remember. I was looking over some old stuff I wrote
    some time ago, and I started to write my life story. I didn't get very far on it, but I wondered if you'd be interested
    in me reading that into the machine in our spare-- You know, maybe tonight or sometime.
- speaker: Respondent
  text: It's rather lengthy. I would like for you to thumb through the material and see if you think it's the right quality
    for what you want. I wasn't sure.
- speaker: Interviewer
  text: Well, it's not just what we want. It's also what you want or what you think is important. What you would like the
    world to know about you.
- speaker: Respondent
  text: It's mostly about me and my relationship in the family unit, my early childhood experiences in school and my relationship
    to the community.
- speaker: Interviewer
  text: Well, those are some of the things that we want to talk about today. After this first session, we can stop and look
    through it and maybe if there are some other things that you want to add we can add that in later.
- speaker: Interviewer
  text: You were talking about your family, and you said that you were a pretty close family. Was there any one or another
    person with whom you were particularly close? A brother or sister? Was there any extended family living with you, or it
    was just your parents and your brothers and sisters?
- speaker: Respondent
  text: No, it was just immediate family. I was first attached to the twins, but since--
- speaker: Interviewer
  text: You should give us their names too, as you remember.
- speaker: Respondent
  text: Mary and Rose were their names. And my youngest sister, who is younger than I am--in fact she's the last one of us--I
    became attached to later more than the twins because I felt I had to protect her, being male and all, in addition to the
    fact that I had to take her to school for quite a while.
- speaker: Interviewer
  text: Where did you fall within the order?
- speaker: Respondent
  text: I was the second to the last one. Actually, I was the third to the last one, because I remember my mother had one
    child who died. So I was the third to the last. My kid sister was the second to the last, and the one who died was the
    last one of us. That's the line in which the eight living sisters and brothers now take place. The others I don't quite
    remember, except my two brothers, which makes ten of us, I guess. No, six sisters and myself makes seven, and my two brothers
    makes nine, and the one who died makes ten. They are the ones who I remember best. And there was probably one other who
    died at the age of eleven or twelve, which I don't recall very clearly. So it was ten members of the family that I have
    recollection of, and the other three I do not.
- speaker: Interviewer
  text: What about the community in Snow Hill? What was the community like? What were the people like? What kinds of things
    did you do? I'm sure you had a lot of work to do around the farm, but also what--?
- speaker: Respondent
  text: Well, I was under three years old when we moved to the city, Birmingham, Alabama. I don't remember too much what happened
    in the country except picking cotton. I trailed behind the family as they picked cotton. I got in the way for the most
    part and was often sent home on a blind mule and had to wait at the door until somebody came to get me off. But I don't
    have very many recollections of what was taking place in the country.
- speaker: Interviewer
  text: As a child, do you remember it as a particularly hard life?
- speaker: Respondent
  text: Well, life was hard, but I had no consciousness of that. In reflection, I can sense that we were extremely poor, but
    it wasn't emphasized. It was obvious, but we weren't denied the things that the family could afford to provide for us.
    So therefore, and for many other reasons, I had little or no knowledge of absolute poverty. I mean, that's what we were
    living in, but I had little or no knowledge of that. I recall once we moved to the city and being three or four years
