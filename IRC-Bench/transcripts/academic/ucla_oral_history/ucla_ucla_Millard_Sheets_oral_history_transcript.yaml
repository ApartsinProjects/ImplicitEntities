source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and how you became interested in art?
- speaker: Respondent
  text: I was born in Pomona, California, and raised by my maternal grandparents and aunts on a ranch. From the age of three,
    I began to draw and was deeply involved in sports, Boy Scouts, and the YMCA. I took art lessons from a neighbor and had
    a perceptive teacher in junior high. I also attended monthly criticism sessions with professional artists Theodore Modra
    and Clarence Hinkle.
- speaker: Interviewer
  text: What led you to attend the Chouinard Art Institute?
- speaker: Respondent
  text: Although I planned to enroll at Pomona College, I was persuaded to study at an art school where professional-level
    courses were available. So I became a student at Chouinard, commuting daily on the Red Car. I took courses in drawing,
    painting, and design, but developed a strong interest in watercolor painting, sometimes skipping classes to paint in picturesque
    locations.
- speaker: Interviewer
  text: How did your career progress after your studies at Chouinard?
- speaker: Respondent
  text: At the end of my second year, I was advanced to instructor, specializing in watercolor painting and teaching delineation
    to architects. In 1928, Dalzell Hatfield approached me for representation at his gallery, leading to a successful one-man
    exhibition in 1929. That same year, I won the Davis Prize, which allowed me to travel extensively in Central and South
    America and Europe.
- speaker: Interviewer
  text: Can you describe your experiences traveling and working in Europe?
- speaker: Respondent
  text: I visited major museums and monuments in France, Germany, the Netherlands, and Spain, drawing and painting continuously.
    In Paris, I was admitted to the Autumn Salon and worked in a lithography studio. I ended my trip early to return to Los
    Angeles to marry Mary Baskerville, an art student at UCLA.
- speaker: Interviewer
  text: What teaching roles did you take on after returning to Los Angeles?
- speaker: Respondent
  text: I held part-time teaching positions at Stickney Art Institute, the University of California at Berkeley, the University
    of Hawaii, and Chouinard until 1935. In 1931, I became affiliated with Scripps College, initially invited to paint a mural,
    then appointed to teach for a year, which led to a 23-year tenure as chairman of the art department.
- speaker: Interviewer
  text: How did your relationship with Professor Hartley Alexander influence your work at Scripps College?
- speaker: Respondent
  text: Professor Alexander was a senior philosopher concerned with educating artists in a liberal tradition. I attended weekly
    discussions at his home for over five years and implemented many of his concepts in the art program at Scripps.
- speaker: Interviewer
  text: What were some of your achievements in developing the art facilities at Scripps College?
- speaker: Respondent
  text: I worked to build new studio facilities, which were ultimately realized through three large gifts from Mrs. Florence
    Lang and the establishment of a Fine Arts Foundation. I introduced the MFA degree, expanded the faculty and student body,
    and emphasized courses in drawing, painting, design, sculpture, architecture, and ceramics, including popular summer sessions.
- speaker: Interviewer
  text: Can you tell me about your role at Otis Art Institute?
- speaker: Respondent
  text: In 1954, while recovering from a horseback riding injury, I was consulted on the development of Otis Art Institute.
    I argued for a dramatic overhaul to produce a professionally sound program. I served as acting director and then full-time
    director from 1955 to 1962, expanding the physical plant, hiring new faculty, requiring advanced standing for students,
    emphasizing the MFA degree and liberal arts courses, and introducing a gallery program.
- speaker: Interviewer
  text: How did your work in mural painting develop?
- speaker: Respondent
  text: Although I painted murals early in my career, my work in this field accelerated in the mid-1950s when I became involved
    with Howard Ahmanson in designing offices for Home Savings. The success of these designs, which included architecture,
    landscaping, and decoration, led to over forty offices throughout California. I established an artistic workshop employing
    mosaic makers, stained glass makers, mural painters, and architects.
- speaker: Interviewer
  text: What are some of your major mural commissions?
- speaker: Respondent
  text: In 1962, I won a competition to design a mosaic mural for the Detroit Public Library illustrating great periods of
    learning. In 1965, I designed a mosaic mural for a dome in the National Shrine in Washington, D.C. I also created tile
    murals representing civilizations of man and California history for the Los Angeles City Hall annex. My most monumental
    commission is a 9,000 square foot granite mural for the University of Notre Dame library facade, unveiled in 1963.
