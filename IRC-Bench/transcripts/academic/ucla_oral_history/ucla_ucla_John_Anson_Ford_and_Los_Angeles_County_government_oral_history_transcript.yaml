source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: You know, Mrs. Dixon, that many people never read a book through, but often confine themselves to scanning the first
    pages, or the introduction. With this in mind I want you to be patient while I try to summarize some of my official acts
    which might be called "highlights" of my public service. I will refer to a memorandum which I have prepared.
- speaker: Respondent
  text: One of the down-to-earth things that I accomplished which I regard as outstanding was my taking the initiative in
    cleaning up and transforming the County's big purchasing Department. This took more than two years before I could get
    a majority of the board to join in discharging the purchasing agent.
- speaker: Respondent
  text: It's quite a revealing story - a corns to oaks, one might say. It began with a complaint that came to me while I was
    a freshman supervisor. The General Hospital kitchen and dining room was serving low-grade, and deteriorated, and even
    rotten food to the patients, according to reports that came to me privately, and the doctors were getting high-grade meats,
    etc. To ferret this out quietly, I asked Clifford Clinton, the Clifton Cafeteria owner, to make a private investigation.
    He did and his report not only created a sensation, but also earned the bitter enmity of a lot of the old gang, including
    Mayor Frank Shaw who had recently left the Board of Supervisors to become mayor.
- speaker: Respondent
  text: This startling beginning of an exposure rapidly extended until we found that not only was the General Hospital food
    pretty rotten and the needless waste enormous, but the agency that bought these food supplies, namely the County Purchasing
    Agent, was also dispensing the same miserable provisions to tens of thousands on county relief (we were dispensing so-called
    charity "in kind" instead of in cash). The climax of all this, months later, led to the overwhelming recall of Mayor Shaw
    in a bitter violent campaign which saw Clinton's house badly damaged by a bomb. The reform of the Purchasing Department
    was the beginning of a new era for the county.
- speaker: Respondent
  text: Another business reform was my exposure of the "patent paving" racket. County and city, too, were paying excess prices
    for a so-called "patent" formula that shortened the period in which paving would harden. The formula was not a secret
    and I exposed this costly misrepresentation that had lined the pockets of politicians.
- speaker: Respondent
  text: These and several similar official acts alerted the public and likewise "warned" politicians so that the political
    atmosphere around the county began to change for the better.
- speaker: Respondent
  text: I wonder if it is immodest and unfair to claim that I shared in a wakening the public to greater support for cultural
    things? Ida Koverman, my loyal friend and secretary of MGM's Louis B. Mayer, and I went together to Sacramento and got
    a law passed that made possible this new cultural era. The new law which we "lobbied" legalized county expenditures for
    music and the other performing arts. Up to then the supervisors had been appropriating only a few thousand annually, via
    a "legal subterfuge," namely through the Chamber of Commerce. From then on, we steadily expanded financial support of
    the Hollywood Bowl (its programs and its fine parking lots and other property), the Pilgrimage Play, the Philharmonic
    orchestra, and in due time more than twenty neighborhood orchestras.
- speaker: Respondent
  text: The County Music Commission, which I initiated with supervisor Smith, has carried on this program magnificently. And
    long-range contracts in which the county shares have made possible the beautiful Music Center.
- speaker: Respondent
  text: 'Acquiring several county parks, enlarging and improving several others, and stepping up the county recreation program
    all were important, I think. I initiated the purchase of these fine parks: Plummer, in West Hollywood; Athens Park, 12428
    South Broadway; West Hollywood Park, 647 North San Vicente; John Vinson Ford Park, 8000 Scout Avenue, Bell Gardens. Parks
    enlarged or improved largely on my initiative include Alondra, Belvedere, Hancock, and City Terrace.'
- speaker: Respondent
  text: As far as the local government was concerned, I was the initiator of the purchase and program development of the State
    and County Arboretum in Arcadia, the Descanso Gardens in La Canada (plus three arboreta branches), and the State Historical
    Monument (Olvera Street and adjoining forty acres).
- speaker: Respondent
  text: Similarly, I initiated Fort Moore Pioneer Memorial and with the help of Mrs. Norman Chandler, Mrs. Cuzzins Davis,
    and other citizens, by our personal appeals we secured funds from the City Council, the Department of Water and Power,
    the Los Angeles Board of Education, and the head offices of the Church of the Latter Day Saints to supplement the county
    appropriations, making a total of nearly $700,000. I know of no other case of such local cooperation.
- speaker: Respondent
  text: When I became supervisor in 1954, a modest beginning had been made by establishing probation camps in the mountains
    for delinquent boys. I shared actively in greatly expanding this program. Because of my many visits to these camps, including
    one of the oldest, namely Tapia in the Malibu mountains, one of the largest live oaks in this county, located in that
    park, was named the "John Anson Ford Oak" and marked with a beautiful boulder bearing my name, etc.
- speaker: Respondent
  text: In the Depression, earnest imaginative women brought to the county the idea of collecting used toys, rehabilitating
    them, and loaning them from established "branch toy libraries" to needy children who had few playthings. With my help
    and that of these dedicated women we greatly expanded the Toy Loan library so that scores of handicapped people were employed
    in a rehabilitation workshop which literally repaired, painted, and restored thousands of toys and dolls, while scores
    of volunteers manned the branch libraries. Total circulation of these toys has run into more than two million.
- speaker: Respondent
  text: I am called the "father" of the County Human Relations Commission. Its influence inter-racially has been tremendous.
    It has been copied widely.
- speaker: Respondent
  text: Following an effort of the Board of Supervisors (an effort I opposed) to give away Otis Art Institute, I organized
    a board of governors for the school and in due time helped secure Millard Sheets as director. He lifted the academic standard
    so that the school was granted the right to confer degrees. Concurrently, I was securing one appropriation after another
    for the removal of the old Otis mansion in which the school had originally been housed; and for the erection of three
    new buildings, representing an investment of about one million dollars. The time when it was touch-and-go for the fate
    of Otis Art Institute is almost forgotten, but every day the school is continuing to enrich the cultural life of California
    and the Southwest.
- speaker: Respondent
  text: I took the initiative in the Supervisors appointing a clean, courageous district attorney, William B. McKesson, on
    the death of his predecessor. Three times before we had been faced with the same heavy responsibility. One of these selections,
    which will remain nameless, had, I firmly believe, gravely betrayed his public trust. So I tried to make up for past misjudgments
    by lobbying for William McKesson. Without my effort, another man with a strong political and special interest background
    probably would have been elected. McKesson knew the law, having been a judge; he knew social problems, having been on
    the Youth Authority; and he knew the hidden influences in the county. Personally, he strongly supported decency and right
    and aimed to have the same standards observed by his large staff of deputies.
- speaker: Respondent
  text: On my initiative the Supervisors set up a committee which has developed into a Department for the Affairs of the Aging.
    This was one of the first governmental efforts of its kind and it has been widely copied.
- speaker: Respondent
  text: In my day the total number of county employees reached 40,000. I initiated various ways of formally recognizing length
    of service for these faithful workers.
- speaker: Respondent
  text: The John Anson Ford Breakfast was started by me immediately after my election in 1934. Thirty to seventy-five citizens
    and friends met every Saturday morning to hear my reports on county business, with occasionally an outside speaker. Believe
    it or not, I carried this club for ten years every Saturday morning.
- speaker: Respondent
  text: Any summary of highlights should include my two unsuccessful political campaigns for the United States Senate, inspired
    in part by Hiram Johnson's arrogant isolationism, and for mayor of Los Angeles, inspired by the record of a corrupt and
    murderously vicious administration against which few seemed ready to protest. Senator Johnson was so strongly entrenched
    that I had little chance of success, but I was gratified at the substantial vote in my own county.
- speaker: Respondent
  text: In the fight for mayor, I had no metropolitan newspaper support; my campaign funds were very limited. My defeat undoubtedly
    saved me from a torturing experience, for evil was far more strongly entrenched than I knew. Only months of subsequent
    courageous exposure by Clifford E. Clinton (who financed his own barrage of radio programs and who risked his life for
    clean government - his home was badly damaged by a bomb) made possible the ousting of Mayor Frank Shaw and the election
    of Judge Fletcher Bowron as mayor.
- speaker: Respondent
  text: 'The results of these two defeats were: My campaign for U.S. Senate Democratic nomination against Hiram Johnson: Cross-filing
    was in effect. In Los Angeles County the vote was Johnson, 172,345; Ford, 104,700. Date August 27, 1940. State totals:
    Johnson 507,389; Ford 175,110.'
- speaker: Respondent
  text: 'My campaign for Mayor of Los Angeles against incumbent Frank Shaw: Shaw 171,415; Ford 144,522. Date: May 4, 1937.
    One year later Shaw was recalled and Fletcher Bowron was elected and served twelve years.'
- speaker: Respondent
  text: Fiestas de Las Americas - founded by me to promote an intercultural membership and programs Latin American in character.
    After two or three years the organization faded out. Several close friendships continued long after.
- speaker: Respondent
  text: Monument to Democracy - to be erected near or in the Los Angeles Harbor as a companion statue to the Statue of Liberty
    to commemorate the second centennial of the Declaration of Independence (1976), over 400 feet high featuring a black man,
    white man, and brown (or yellow) man, each with upraised arms supporting a translucent globe of the world. Lighted from
    within.
- speaker: Respondent
  text: A Condominium Church - I proposed that five small struggling churches in the East Hollywood area of different denominations
    sell their properties and jointly build a "condominium cathedral" with dual membership - each member retaining his denominational
    membership, plus a condominium membership. The five pastors (each retaining his denominational status) to serve jointly,
    taking turns at preaching, thereby giving more time to "field" services.
- speaker: Respondent
  text: The New Outlook, a pocket magazine financed by Hyman Lishner, M.D., seeking to interpret a broad non-denominational
    philosophy. I served on the editorial board. The enterprise had very limited success and finally folded.
- speaker: Respondent
  text: United Church Brotherhood, partially successful in creating an inter-denominational fellowship among Protestant men.
    I served as president for a time. Subsequently it erred in seeking to promote candidates for local office, with unhappy
    results. The Brotherhood no longer exists.
- speaker: Respondent
  text: All Nations Fair, or Festival - this annual event had a sporadic history with two or three moderately successful celebrations,
    after which the idea petered out. No longer a Supervisor, I could not give it effective guidance. The Fair sought to coordinate
    some 20 or 25 organized groups of immigrant residents representing their respective native lands. Each group appeared
    in native costume and presented colorful native dances with appropriate music. Exhibition booths displayed native arts
    and crafts, and in separate booths native foods were served. We borrowed the idea from the International Institute, which
    found that it had grown beyond its bounds. But the County effort finally petered out after I left the board.
- speaker: Respondent
  text: Year after year, I was a lone vote against hundreds of thousands voted for the All-Year Club. There was more politics
    than sound business in the program. Since my retirement, budget stringencies have finally forced the Supervisors to drop
    this item.
- speaker: Respondent
  text: While I was the first in the state to initiate a public housing project, I never felt that the County Housing Authority
    really put its heart into this sorely needed undertaking. The members of the local authority seemed to feel that they
    were encroaching on free enterprise. I never could get a real liberal Authority appointed.
- speaker: Respondent
  text: Theodore Payne Foundation for propagating California's fast disappearing wild flowers. This project founded by an
    idealistic horticulturalist and nurseryman was given
