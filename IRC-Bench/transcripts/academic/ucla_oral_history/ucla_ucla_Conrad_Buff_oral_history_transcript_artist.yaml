source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: In the extreme northeast part of Switzerland there is a canton called Appenzell, and the people there are of a distinctly
    different racial origin than in the rest of Switzerland. My cousin, who is a historian, tells me that he thought they
    immigrated from the Adriatic coast, maybe in the pre-Roman days, or they might have even been descendants of the Huns
    and might have traveled into Switzerland into the high forest lands. In those days, everything was of course covered with
    pine forests, and they must have had hard times at first, raising enough crops and cattle to make a living.
- speaker: Respondent
  text: But it went on until the Reformation came and the country was split in two, in part Catholic and part Protestant.
    Now the people that inhabited the Protestant part are rather practical people. The whole people are short in stature,
    something like the Japanese. The Protestants are, as I said, practical business people, and at the same time they had
    sort of a strange stubbornness about them and a sense of humor that's quite known all over Switzerland. All the jokes
    in Switzerland pertain to the people of Appenzell because they are so different than the rest of the population.
- speaker: Respondent
  text: The people who are Catholics live in the higher mountains, and they're of a slightly different temperament. They're
    happy-go-lucky. They're the friendliest people in the world. When you go into a store there, everybody welcomes you, not
    because you're going to spend money, but because they like people. They like to sing, and they're not very practical.
    They have in many ways a bad reputation for being slovenly and life-loving, but they manage to get along and they always
    have jokes about each other.
- speaker: Respondent
  text: 'For instance, one of the jokes: one man from the Protestant town went over into the high country, the Catholic part,
    and he saw a laundry line before a house. The woman was hanging up the laundry and he thought it was rather dirty laundry,
    and he said to the woman, "Isn''t it wonderful when you go traveling - you always learn something new!" She said, "What
    did you learn?" He said, "I learned that you can hang out laundry before you wash it." That was one of the jokes.'
- speaker: Respondent
  text: But these Catholic people love to dance. Sometimes they'd dance way into the morning and they'd get pretty rough.
    A friend of ours who has come over, a woman, Trudl Schoop - you have heard of Trudi Schoop? Well, she lived up there in
    Appenzell sometimes (I think she was teaching in the Pestalozzi village), and she said that she attended some dances there
    that were the roughest things that she had ever seen. They were wilder than the dances in the Congo. And that's going
    pretty strong.
- speaker: Respondent
  text: But the country is really beautiful - from my village, which lies very close to the city of Saint Gall, only about
    three or four miles away. But the civilization is entirely different. From Saint Gall, you move uphill for about an hour
    and then you have the most magnificent view of the country toward Germany, Lake Konstanz and the lower part of the canton
    of Thurgau and Saint Gall. To the east you see the mountains of Vorarlberg, and to the west, the southwest, the mountains
    of Switzerland, the high snow-covered mountains. The villages are on hills, and from one hill you can see five different
    villages on different hills, a deep canyon in between. On a clear day you can hear the church bells from the villages,
    and they do have church bells. They have better church bells in that part of Switzerland than any place else I've seen
    in Europe.
- speaker: Respondent
  text: I don't know. They just took a pride in it. They're a musical people, not in the sense of classic music, but in the
    sense of folk music, and I think that they always like the sound of bells. Now in Italy, the bells are miserable. You
    just hear "bang, bang, bang." But here you usually have five bells - the biggest one weighs about five tons. It takes
    two men to ring it. It's called the "male" bell. Then comes the "female" bell which is slightly smaller; then come the
    "boy and girl" bells which are slightly smaller, and then the two "baby" bells. They're all tuned to a chord, I-III-V
    usually. All these villages have these same number of bells, and it's really beautiful on a clear day. It no doubt helped
    me form my general impression of life.
- speaker: Respondent
  text: I used to go up there and look over Lake Konstanz and wonder what country was down below. My father would tell me
    that there was a wonderful country down there where they could grow wheat and grapes. Up in our part we could only grow
    apples and pears and grass, nothing in the gardens to speak of. All the vegetables had to come from down in the Rhine
    Valley below. So I always wanted to go down to the low country to see. My father was down there once, and he brought an
    ear of wheat that I thought was the most wonderful thing I had ever seen, that grass could grow that big. One day I was
    allowed to visit some friends of my father during school vacation down in the lowlands - I could spend two weeks there
    on the farm, and that was one of the most wonderful experiences I had in my life. But I'm jumping ahead of the whole thing
    there.
- speaker: Respondent
  text: In the middle of the last century, there lived in one of the valleys a roofer with his family. He had four sons and
