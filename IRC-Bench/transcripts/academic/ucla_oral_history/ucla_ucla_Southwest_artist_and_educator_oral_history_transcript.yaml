collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: I thought to begin with this afternoon, Annita, we would discuss your early life. To begin with, when were you born?
- speaker: Respondent
  text: Well, that was quite a long time ago. October 2, 1894 in Huenerae, California.
- speaker: Interviewer
  text: How long had your mother and father lived in Huenerae?
- speaker: Respondent
  text: They didn't live there; they were just down on a fishing trip. They had wonderful fishing there off of the wharf.
    It wasn't a town; it was just a few houses, and they rented a little house just to have a picnic. And I just came; that's
    all.
- speaker: Interviewer
  text: You came unexpectedly.
- speaker: Respondent
  text: Probably sooner than they expected. Anyway, I was born there. They really lived in Saticoy, which, again, was just
    a small place. At that time, any of those places around Ventura County could have gone on and might have enlarged and
    might have become something.
