collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Were you born on Mount Hamilton?
- speaker: Respondent
  text: Well, in principle I was. I was the third child, and my mother and father and two children were living on the mountain.
    My mother went to San Francisco for the purpose of having me, and when she was well enough in normal process, she came
    back on the mountain with me. That's how. So in effect I was born on the mountain, yes.
- speaker: Interviewer
  text: And this is 1899?
- speaker: Interviewer
  text: And you said you had two older....
- speaker: Respondent
  text: Brothers, yes. Wally was born in 1895 and Doug in 1896. A year and a half apart.
- speaker: Interviewer
  text: And then did your parents have any younger children?
- speaker: Respondent
  text: No. Just the three boys. They're both living.
- speaker: Interviewer
  text: Oh, that's good. How many children were on the mountain during the years that you lived there?
- speaker: Respondent
  text: It varied, but perhaps school-age it ran from as low as nine to as high as fourteen. Something like that.
- speaker: Interviewer
  text: So you always had enough playmates, but no over abundance?
- speaker: Respondent
  text: Oh, but it was enough. We had wonderful times, and I've jotted down some of those things.
- speaker: Interviewer
  text: Good. We'll probably get into those right away. I was wondering, did you ever mind living on the mountain? Did you
    ever feel isolated?
- speaker: Respondent
  text: No. Now in hindsight as an adult it was, of course, as you know, it was a very isolated life. But we didn't know it
    as children. We thought it was the be all and end all. About once a year, sometimes perhaps twice, we had the rare privilege
    of going to San Jose, 25 miles away, but that was in the day of the horse stage; it came every day taking seven hours,
    brought the mail and brought the supplies every weekday, and visitors Saturday nights to see through the telescope. The
