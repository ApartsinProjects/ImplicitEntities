collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Respondent
  text: The contractors, particularly on public works jobs, University of Washington, Port of Seattle, were employing a proportionate
    or appropriate number of minorities in construction work, and raised issue to the point where it came to a head at the
    University of Washington campus, when we were building that big underground garage in the center of the campus. And one
    morning, he and about fifty or sixty others, I don't know how many total, dumped a bulldozer and truck a few other things
    into the big lot out there and stop the work. Ben McAdoo, an architect good friend, came to campus that morning and said,
    stop, do something. My God, the police are coming and there'll be bloodshed. What we did was finally shut down the job
    to avoid bloodshed, and held arguments contractors later on about that, we closed it down. And then after that came the
    discussion with the contractors. I forget what Terry called his organization then, wasn't United Construction.
- speaker: Interviewer
  text: CCA [Central Contractors Association].
- speaker: Respondent
  text: Yeah, CCA organization and started having conversations with the Contractors Organizations. The Associated General
    Contractors. Dan Ruthford, R-U-T-H-F-O-R-D, was the man who negotiated, sat in for a number of meetings. Tyree [Scott]
    was raising questions about the Port of Seattle about the construction work out there. Dick--
- speaker: Interviewer
  text: Page. No, no. Dick--
- speaker: Interviewer
  text: Dick [?Pord?], yeah.
- speaker: Respondent
  text: Dick [?Pord?] who's associate manager of the airport, myself, Tyree, Ruthford, and Jim Wilson. It was the legal University
    had any number of meetings. I can't remember how many, of trying to get the unions to agree to employ appropriate number
    of people in the program to let people come in as apprentices, and give the minorities a fair shake at construction work.
- speaker: Interviewer
  text: I thought he said, piss off and then left. Well, that's what I got, quoted.
- speaker: Respondent
  text: The University of Washington, was the first one to agree, and called attention to all the contractors and the flaws
    in their contract, but said that they would put the thing with the program, federal program they signed under, would get
    fair, equal employment, and started reporting and gave copies every week to Tyree, of the number of minorities in each
    of the trades on the campus each week. Didn't resolve all the problems, because we had another time down to Health Sciences
    when Howard S. Wright, I think was a contractor down there if I remember correctly. Tyree came in one morning at about
    five o'clock with fifty people, locked up the job, closed the gates. Myself, Jim Wilson, Rutford, sat in there 'till one
    of the construction shacks down there 'till, I think, 8:30 in the morning to four in the afternoon, policemen all around
    the project, finally worked out an agreement that was satisfactory. Tyree, these people, they took our word for what we're
    going to try and do, got the message out and went back to work, and contractors had did their best. The biggest problem
    was unions who really weren't willing to give ground and Ruthford and I got the Chamber of Commerce, Jim McCurdy, then
    president of the Chamber of Commerce in the act. Got to the point where we all went back, I think goes back once or twice.
    Oh yeah, we've met a number of times in the governor's office, too, in Olympia, with the governor, the unions, minorities,
    probably fifty-seven contractors, all sitting in a room. I remember one meeting where Austin St. Laurent walked up, got
    up, walked out. Governor told him to stay. He said, "No, I got an appointment in Seattle." Told the governor--didn't say
    to go to hell, but almost you could almost read it that way. Took him, and seven members of the union walked out with
    him. Yeah, but he told the governor, no uncertain terms. He had another date and he was gone out. He left, seven members,
    seven union leaders left with him. That's a kind of an awkward situation. We went to the governor's office. We went to
    Washington, DC, Department of Labor. We met with [Arthur] Fletcher and [George] Shultz.
- speaker: Interviewer
  text: Do you have any minutes on that detail during the meetings?
- speaker: Respondent
  text: I don't think, I didn't think I wanted to keep any, but we met Shultz and Fletcher back in Washington [DC]. [H.W.]
    McCurdy was there, Conrad and Ruthford and, oh, we went, a couple times. One of the trips, the governor sent Jim Dolliver,
    his first hand assist, went back with him. What we were trying to do was get the Department of Labor to set up some money,
    $250,000-$300,000 from the Department of Labor to Seattle for a training program. I'm going over a lot of things. We went
    to court. Remember the judge, Lindsay was his name?
- speaker: Respondent
  text: Lindberg was very fair and very good, and put them on notice and told the unions what they had to do, and we tried
    to get the money out of Washington [DC]. The Labor Department backed her two or three times. I remember one meeting where
    they referred us down to second or third level people, and Ruthford and I, and Tyree, and who else,? Three or four of
    us. McCurdy was there too, met with the people trying to put a program together. I think these were two or three guys
    down there representing the department, and I think they--I don't know, I've always assumed, guessed they were ex-union
    leaders, all white. One of them said to us, because I was being pretty hard on the others, "We don't care what Mr. Fletcher
    or Mr. Schultz say, you people have to realize, the policies are set down here. Mr. Shultz, Mr. Fletcher, just enunciate."
    I well remember that. From there, we kind of got unhappy because we couldn't get anywhere, so we called up the guy in
    the Nixon administration from Seattle.
- speaker: Interviewer
  text: '[? Alterman?]?'
- speaker: Respondent
  text: No, John Ehrlichman, and went over to see him. And we got into the White House. He wasn't there, but that former quarterback
    of the University of Washington Huskies who worked as his right hand met with us and Ehrlichman got called off to another
    meeting by the President just as we got there. And Todd Hallin, H-A-L-L-I-N, met with us, and we've spent about two or
    three--we spent an hour going over the whole thing with him, and he promised to try to get Ehrlichman to do something
    with the Department of Labor. We weren't sure that was really going to happen. We hoped it would, we weren't sure. We
    got a tour the White House, got to see the president's office, the old day room, and all this stuff, and the Cabinet Room.
    That was nice, but we weren't sure anything would happen. So then we called up [Warren] Magnuson's office and told him
    over the telephone our problem. We were in the White House, we weren't sure we were getting anywhere. So about 3:30 in
    the afternoon, we were invited to Magnuson's office, we met in the Senate Appropriations Committee Room, and Maggie had
    Scoop [Henry Jackson] there. He called up all the people in the house, all seven members, and they were all there, except
    I don't think Tom Kelly was there, he sent his first assistant, and think we had about four or five. We're all there.
    Scoop was there, and so was [?Meads?], and got to stop and think of all the names.
- speaker: Respondent
  text: Kelly was not there, but Brock Adams was there, I think [Tom] Foley was there. We had them all, I think two of them.
    I think, we had five people's house and represent the other two. And we stayed an hour and a half, went through the whole
    thing, Tyree spoke his piece, we spoke ours, told the whole damn story. And finally, Maggie said to Scoop, "We all better
    send a telegram to the Department of Labor and tell them, get on, we want to make this money available to Seattle." I
    think Scoop said, "[?Cotto?], my routine is going to get unhappy with us." Maggie and Scoop, Maggie said, "To hell with
    it. It's time we did something to straighten this mess out." And so all seven members of the House and Maggie and Scoop
    signed a telegram drafted right while we were there, sent a telegram to Shultz that night, telling them they want to make,
    what was it? $250,000, $300,000 available. And went over there, which was pretty good I thought. Maggie was just superb,
    got all the money, listened to Tyree, other times we did something, and they all went along. Funny how Scoop and all the
    others waited until he made his position before anybody say anything, but he did it. You got to have great respect for
    the old guy. A lot of people say he's a Wheeler Cleaner, maybe he is, [?my God, I'll be damned?], Maggie goes with the
    people.
- speaker: Respondent
  text: Well he did. He went with him against the unions. And they didn't like it out here, Austin St. Laurent, my old friend
    who I see him from time to time, and fought with vigorously on this issue. But we did it, and we got the telegram, and
    we got a promise of money out here. I don't think the damn money really ever--but Lindberg and the House and Senate people
    and Chamber of Commerce and whatnot, we put tremendous pressure on that goddamn Central Labor Council. Boy, did we, every
    way we could, and they finally gave some ground to the point where Tyree got some people into apprenticeships, and I kept
    that University of Washington, hired a guy out there. We got [?warrior?] out there now, you've probably met him. Big,
    tall, six-foot four. He's Black, able. He's out there. And before him, I had hired old General [?Rusk?], retired army
    general, and he got the best seats loud and clear. And he acted like a general running these god damn contractors. And
    he was a tough old bastard, sixty years old. He used to go around make a physical inspection. And for a while, I told
    Tyree, "Send somebody with him if you want to." But they got to trust old General [?Rusk?], and the old guy really put
    the heat on those contractors to the point where our reports were right on the money. We had the people, none of the other
    contractors had any qualified minorities working on jobs. We had them all on the campus. We, that's what was going on.
    We had all the people who were minorities in the trades and Black, probably working the worst jobs in the universe. We
    didn't--I was going to tell those, I was going to tell him, I just said, "You guys, I told someone, I told them all, you
    guys, I know 'em all. You have them here, or you got a problem, because you signed a contract with us, and that federal"--what
    you call it, clauses in there?
- speaker: Interviewer
  text: Executive Order.
- speaker: Interviewer
  text: Executive Order.
- speaker: Respondent
  text: 11246. You guys signed that now, god damnit, you live up to it, because that's what we agreed to. The university agreed
    to that. Now, you guys got to do it. That's part of the game. And I don't care if you can't find trained minorities or
    not, you get them out here and train them. By God, they did. They got people in there. I never had trouble with Tyree.
    I liked him. He had more courage in that little body he has than 90% of the people I've known on this earth. I respect
    him. I think he's intelligent. I think he's been fair with the contractors, and he did his damnedest just to keep the
    thing from blowing into violence. He had his own tires ripped, his own people were fighting him for a while. He had rocks
    thrown through his windows of his office. He never gave up. He stayed in there, and he tried to keep it even, he didn't
    try to create any violence. He did his best to bring attention to the problem, he didn't have to go to jail. The minorities
    are in the trades today. He opened the gate, nobody else would have had the mentality. If it hadn't been for Tyree, those
    construction trades would probably just, the door would be shut just as tight as it was. That really sums it up, I guess,
    because I saw that.
- speaker: Interviewer
  text: Okay, let's go back to maybe point by point confrontation with the CCA and university. I think the first confrontation
    was when they--I don't know what date, I don't have a date, the chronological order.
- speaker: Respondent
  text: In April sometime.
- speaker: Interviewer
  text: Now, how did the university respond to that specific incident?
- speaker: Respondent
  text: Well, we were concerned as hell, because if we closed the job down, I had to tell the president what to do, [Charles]
    Odegaard at the time. I knew if I closed the damned jobs down, the contractors would lay it on us and shut the job down
    and give us all hell. So we wrote them a letter, and I forget what it was, and you can probably find that letter out there.
    We wrote the contracts, quoting the job order to them and what they were supposed to do and better live up to it. I forget
    how it was, and it's their responsibility to maintain peace and whatnot on that job. I did my best to do in such a way,
    they couldn't come back on us with a change order for a million dollars. You understand I'm talking about? We're delaying
    and stop each other try to hang it on them. At the same time, I didn't want to
