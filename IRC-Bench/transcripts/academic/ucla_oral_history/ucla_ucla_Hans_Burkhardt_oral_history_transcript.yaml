collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: We've decided we're going to try and proceed somewhat chronologically, so I'm going to begin by asking you to tell
    me about where you were born and when, and a bit about your background.
- speaker: Respondent
  text: All right. I was born in Basel, Switzerland, December 20, 1904. My father left when I was three years old, for New
    York. And my mother, when I was six years old, died. I had two sisters, and we were brought up in the orphanage in Basel.
    And during that time, especially during the wartime, things were very bad. We never had enough to eat--we were very, very
    poor all the time--but we learned how to work and appreciate things in life, especially the better things, because there
    never was enough food. Even after the war, conditions were very bad in Switzerland. But anyhow, in school, I always liked
    to draw, and I saw paintings in the museum which I liked - mostly the romantic paintings, because they didn't look like
    nature; it was a creation of something which I admired. I liked [Arnold] Boecklin and [Ferdinand] Hodler, especially Hodler.
    I liked the more progressive artists, even without knowing too much about art.
- speaker: Interviewer
  text: That's interesting.
- speaker: Respondent
  text: And then, if somebody would have given me a few colored crayons or a little bit of watercolors for a Christmas present,
    that would have been the greatest Christmas present I ever received. I never had anything until when I learned my trade.
    After this, the first two weeks' salary a friend of mine borrowed, and I never got the money back; that was my first lesson.
