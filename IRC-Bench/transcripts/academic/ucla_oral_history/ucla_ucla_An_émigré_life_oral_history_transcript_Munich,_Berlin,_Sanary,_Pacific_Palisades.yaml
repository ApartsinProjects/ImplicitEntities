collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood in Munich?
- speaker: Respondent
  text: I was born in Munich and grew up there. My family was involved in banking and merchandising. My father had a dry goods
    shop and we had a two-horse carriage for country rounds. I was an eager student and very independent and inquisitive.
    I was also quite athletic and won many prizes in gymnastics competitions.
- speaker: Interviewer
  text: What was your experience with Jewishness and anti-Semitism during your childhood?
- speaker: Respondent
  text: My family was part of the German-Jewish movement toward reformism and assimilation. However, I remember the anxiety
    caused by events like the Dreyfus affair and the Kichinev pogroms. I often got into scuffles because of the casual anti-Semitism
    from my playmates.
- speaker: Interviewer
  text: Can you describe Lion's family background and upbringing?
- speaker: Respondent
  text: 'Lion came from a wealthy family that made their fortune in margarine. His father supervised the family factory. But
    his upbringing was deeply Orthodox Jewish. Every Friday, his father would ''sell'' the factory to a Gentile accountant
    to observe the Sabbath. Lion had to manage two educations: the classical German school during the day and Orthodox Jewish
    studies early in the morning. This double education took a toll on his health and spirit.'
- speaker: Interviewer
  text: How did Lion's upbringing affect him personally?
- speaker: Respondent
  text: He was the eldest of nine children and faced great expectations. The pressure robbed him of his childhood and health;
    by his late teens, he had a stomach ulcer and had abandoned his Orthodox faith. Despite this, Jewishness remained a central
    theme in his later writings. He rebelled against his family wealth and set out on his own.
- speaker: Interviewer
  text: What was Munich like culturally during your youth?
- speaker: Respondent
  text: Munich was a small provincial town but had an extraordinary concentration of creative genius. It was a vibrant cultural
    and intellectual center, somewhat isolated from the largely Catholic native population. Artists and writers formed a self-sufficient
    community. The city had been home to figures like Henrik Ibsen and August Strindberg in the previous generation.
