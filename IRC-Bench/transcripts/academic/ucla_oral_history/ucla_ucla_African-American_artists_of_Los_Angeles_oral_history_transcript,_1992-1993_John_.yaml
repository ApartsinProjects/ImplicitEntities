collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: So the first question we always ask is, when and where were you born?
- speaker: Respondent
  text: In Los Angeles, California, March 18, 1933.
- speaker: Interviewer
  text: And who are your parents?
- speaker: Respondent
  text: John Thomas Riddle, Sr., and Helen Louise Wheeler.
- speaker: Interviewer
  text: Okay. Do you have any siblings?
- speaker: Respondent
  text: Yeah. I have an older sister, Joanne Tyler Jefferson, Judy Keeling, and a brother, Paul Anthony Riddle.
- speaker: Interviewer
  text: Okay. Do you know much about your grandparents and your family background?
- speaker: Interviewer
  text: Could you talk a bit about that?
- speaker: Respondent
  text: Well, let's see. On my mother's side, they lived in Bakersfield, California. That's my earliest recollection. Although
    my mother was born in Indiana, in Bloomington, we used to spend every summer in Bakersfield. That's a town about 115 miles
    north of Los Angeles, up Highway 99--used to be 99 in those days. It was always a pleasurable trip, and we would stay
    for the whole summer. When I was young, I didn't realize my mother and father were actually getting a summer's vacation
    from us; we thought we were getting away from them. But I think, now that I have kids, they got the better deal. [laughter]
    We always went up there usually for Thanksgiving. And my grandmother, Emma, she could cook. I mean, like everybody says
    grandmothers could cook. But she actually catered for restaurants and hotels right out of her kitchen. And it was always
    interesting. I don't want to associate it with food and swimming and just eating grapes and having a good time, but--
    I had an Uncle George who was divorced and he had been in World War II and he had turned into an alcoholic. But he was
    like the classic "black wino" philosopher. I mean, he would sit and drink wine in the backyard and talk until he fell
    asleep. I slept out under the grape arbor with him in the summer, and I'd always listen to him. He had a lot of wisdom,
    but he had no respect. And he had a lot of frustration and--
- speaker: Interviewer
  text: You mean no respect for himself or other people?
- speaker: Respondent
  text: Well, I mean, the fact that he was an alcoholic, he probably didn't have the greatest respect for himself, because
    that's a form of suicide. But he didn't get respect from the other people in his family because they were embarrassed
    by the fact that there was an alcoholic in the family. He was kind of like a laughingstock. But because I was always out
    there with him at night, and he would tell me different things-- I mean, he had a lot of wisdom. But it's kind of like
    the street preachers. You hear them out there, and everybody's walking along about their own business. Nobody really pays
    much attention to what they're saying. And yet some of them could be geniuses if we stopped and listened.
- speaker: Interviewer
  text: It seems like every black family has one. And it's usually the case where they were really ambitious but, because
    of their race or because of something like that, their dreams were kind of thwarted and so they end up being really self-destructive.
- speaker: Respondent
  text: Yeah, that's true. I remember my grandfather [in audible] Drisdom-- I don't know how many times my grandmother had
    been married, because my mother was a Wheeler and so was-- My Uncle George was a Wheeler. But my Aunt Suzy, who lives
    in Los Angeles--she's Suzy Johnson now--she was a Pinkney, and her brother Oliver, who is deceased, he was a Pinkney.
    And Mr. Drisdom, who was my grandfather that I remember-- So at least there's three names there. So she must have been
    married at least three times.
- speaker: Respondent
  text: But he worked at the railroad. And he had like a drawer full of those pocket watches where the lids pop open. He had
    a whole drawer full, and I always used to just be amazed to look in that drawer and see twenty or thirty of those really
    nice watches. I don't know if they all worked or not, but that's one of my memories. Just like I had a memory of how she
    had this chicken coop, my grandmother, and she raised chicks, and she cut off the chickens' heads when it was time to
    eat them and wrung their necks, and they would flop around in the yard. And we'd all look like, "Wow!" Chickens without
    heads trying to get that last flight. You know. So I remember those kinds of things. It was always hot, dry. Then when
    I got older, I used to go up there and spend the summer. But she used to say, "Well, you're too old to sit around. You
    have to go to work." And we'd go work in the fields. The worst job imaginable. And I used to wonder then how did black
    people work in the fields for nothing, because I was making like five dollars a week and that was nothing. It was hot
    and long hours and picking onions and being-- Picking onions in 110 degrees and crying because you had to cut the tops
    off of them. And having so much onion juice and dirt on your hands, you couldn't wipe your eyes. You'd just be out there,
    "Boo hoo." And then people would take those onions home at night. I didn't want to see an onion. I think the last time
    I spent the summer there, I was eighteen going on-- maybe, nineteen. And I came back to L.A. and went to school that fall
    and met Carmen Garrott, who I married and am still married to. We've been married thirty-nine years, now. But that's another
    part of the story.
- speaker: Respondent
  text: Now, on my father's side, they had twelve kids. He's right in the middle. He was about number six. But I think the
    most interesting thing is, his father was a preacher, tall, about six foot five. I remember he had white hair and he stood
    as straight as a stick and he was real thin. And his name was C. Morton Riddle. And his wife--what's her name? I can't
    think of my grandmother's first name; she was just Grandmother Riddle. I know her name but I can't think of it. They had
    a little bit of everything in their family. They had a communist, I mean, which is really weird. One of my father's brothers
