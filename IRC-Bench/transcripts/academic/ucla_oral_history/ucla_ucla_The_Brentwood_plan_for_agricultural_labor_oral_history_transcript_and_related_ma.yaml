collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: I thought we'd start with the beginnings of the Brentwood plan. I believe the whole thing started with the trouble
    in 1934. This was before you were sheriff?
- speaker: Respondent
  text: Yes. The sheriff of Contra Costa County, whom I succeeded, had been sheriff for forty years, and of course more or
    less operated in horse and buggy style. He was a wonderful gentleman, perhaps the best sheriff we ever had, but the transition
    had not taken place yet when I was elected.
- speaker: Respondent
  text: In 1934 there was the birth of a new group of labor people trying to organize groups that heretofore had not been
    taken into unions, and one of them was the initial effort made to organize the fruit pickers. There was infiltrated into
    the early movement, of course, certain communistic elements and certain people who were more or less red in nature, and
    this whole idea of striving to get a better wage and striving to get better conditions for the fruit workers was the initial
    move in the state of California. It culminated in a series of riots, at Brentwood.
- speaker: Interviewer
  text: Are you saying that this was the first organization activity and that it began right in the Brentwood area?
- speaker: Respondent
  text: Yes. This was the first that I know of.
- speaker: Interviewer
  text: In the fruit season of 1934?
- speaker: Respondent
  text: Yes, which would be July 1934. It culminated in a series of riots and very bad feeling, and that culminated in a series
    of incarcerations by certain peace officers in a cattle corral or series of cattle corrals in the vicinity of the apricot
    fruit farms in Brentwood. Of course, this aroused the people, and in particular the agitators, who were known at that
    time. Some had national connections and were in the files of the peace officers. And of course this repercussion moved
    over into the fall campaign. I fell heir to some few votes because of it and because the peace was not kept, and to my
    surprise I was elected by an almost two to one vote, over a man who had been in this office for ten terms, or forty years.
- speaker: Interviewer
  text: That was Sheriff Veale.
- speaker: Respondent
  text: Sheriff R.R Veale, Richard Rains Veale. He had been sheriff for forty years.
- speaker: Interviewer
  text: He must have been very old, wasn't he?
- speaker: Respondent
  text: Yes, he was quite an old gentleman.
- speaker: Interviewer
  text: Did he want to retire?
- speaker: Respondent
  text: No. He was a peace officer at heart and had devoted almost all his life to it. He had no hobbies of any kind, no way
    of exercising the energies of man, and therefore within a few years after losing the office of sheriff he passed away.
- speaker: Interviewer
  text: Was this organizing group the Cannery and Agricultural Workers Industrial Union?
- speaker: Respondent
  text: Well, that would be generally the name that I would think of. It probably got its birth right there in the embryo
    stage, probably out of Stockton or San Francisco. I wouldn't know exactly, but it was what you would call a disorganized
    organization. They had absolutely no prior knowledge of what to do in matters of that sort and they had no pattern to
    use from what I could see.
- speaker: Interviewer
  text: Were conditions particularly bad in that year for the pickers?
- speaker: Respondent
  text: Well, the wages in California were bad all during those many early years. I had been a picker in the Livermore valley
    area of grapes and prunes and almonds, way back from 1898 till the time that I left for Richmond, California, in 1915,
    and the conditions were very very bad those years. We used to get about a dollar a day for a twelve-hour day, or $30 a
    month. No field workers ever got a decent wage. Of course, I had been not only a picker but a small farmer with my dad,
    and I had seen both sides of the picture - the farmer's side and the picker's side. I came well equipped to cope with
    situations exactly like this.
- speaker: Interviewer
  text: I wanted to get a little biographical information from you. Where did you come from?
- speaker: Respondent
  text: Mother was a blue blood, born in Hamburg, Germany, and Father was a peasant, born in Denmark. Mother came here with
    her uncle. Her father was the postmaster of Hamburg, and she came here with her uncle to Chicago about 1891 in preparation
    for the World's Fair in 1892. Germany took over Denmark in 1870, and when Dad was nearly twenty years of age he didn't
    want any of this military conscription by Germany; he got on a saltpeter boat somewhere along the German river near Hamburg.
    He came out of the province known as Schleswig-Holstein, and he then went as far as Chile and absconded from the vessel.
    He then worked his way over a period of several years to North Carolina and there stayed the customary period to get his
    first papers. At the time that he did the judge said, "You are now to be an American citizen and you should have an American
    name."
