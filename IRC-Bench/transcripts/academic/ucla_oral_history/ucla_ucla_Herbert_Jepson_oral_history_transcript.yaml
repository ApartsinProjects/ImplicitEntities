turns:
- speaker: Interviewer
  text: Can you tell me about your childhood influences on creativity?
- speaker: Respondent
  text: I was raised in rural surroundings until the age of five, then in Glendale. My father was a nurseryman and tree-moving
    contractor, and he gave me freedom to roam the hills and fields around Glendale. He also let me use his woodworking tools,
    which stirred my curiosity and helped me develop my capabilities while exploring the artistic dimensions of natural materials.
- speaker: Interviewer
  text: How did your early schooling affect your interest in art?
- speaker: Respondent
  text: When I entered public school, I encountered a traditional educational approach based on reward and punishment, which
    caused me to lose interest in learning. It was a bitter memory because it contrasted sharply with the spirit of inquiry
    and exploration I experienced at home. Only my early fascination with drawing sustained my sense of identity and creative
    urge.
- speaker: Interviewer
  text: What was your experience like at the Chouinard Art Institute?
- speaker: Respondent
  text: I received a tuition scholarship to Chouinard in 1926, where I met fellow students Millard Sheets and Don Graham.
    In my third year, I was chosen as a teaching assistant to F. Tolles Chamberlin. When Chamberlin resigned, Mrs. Nelbert
    Chouinard asked me to continue instructing the class. By 1929, I had some recognition as a fine artist, winning second
    prize in the California Water Color Society Show. I also painted circus carnival banners at night and on weekends. Mrs.
    Chouinard decided to keep me on the faculty for another year, and I taught drawing classes three days a week and night
    classes for student trainees sent by Walt Disney.
- speaker: Interviewer
  text: What happened after your teaching contract at Chouinard was not renewed?
- speaker: Respondent
  text: In 1930, when my contract was not renewed, I focused almost exclusively on commercial art. I designed and constructed
    furnishings for outdoor miniature golf courses and later opened a custom-made furniture business in Beverly Hills, which
    unfortunately failed due to competition from mass-produced items. Financial problems were compounded by my marriage and
    the birth of my first child.
- speaker: Interviewer
  text: How did your time at the Chicago Art Institute influence your career?
- speaker: Respondent
  text: In the summer of 1933, while in Chicago on an unsuccessful business venture, I decided to attend the Chicago Art Institute.
    I also visited art departments in the Midwest to assess their educational methods. I wrote to Mrs. Chouinard about my
    expanding interest in art education, and she invited me to teach at Chouinard again, which I did at the end of 1934. I
    was stimulated by continued contact with my first drawing teacher, Lawrence Murphy, and visiting teachers like Hans Hofmann,
    Alexander Archipenko, and David Siqueiros.
- speaker: Interviewer
  text: What was your role during World War II?
- speaker: Respondent
  text: During World War II, I joined Lockheed Corporation as a toolmaker in 1942. I proposed and designed several time-saving
    devices, for which I received bonuses and was promoted to senior tool designer in the tool engineering department. This
    extra income allowed me to seriously consider opening my own art school.
- speaker: Interviewer
  text: Can you tell me about the founding of the Jepson Art Institute?
- speaker: Respondent
  text: In 1945, I established the Jepson Art Institute in cramped quarters across from the Otis Art Institute and near Chouinard.
    We started with only three instructors, but the student body and faculty grew rapidly, requiring a move to larger quarters
    on Seventh Street. Distinguished faculty included Rico Lebrun, Howard Warshaw, William Brice, and Guy McCoy. I guided
    the institute according to my philosophy of open, experimental education, making it a fertile ground for emerging artists
    in Los Angeles.
- speaker: Interviewer
  text: What challenges did the Jepson Art Institute face?
- speaker: Respondent
  text: Although I was an adept administrator, able to resolve faculty conflicts, increase enrollment, and publicize the institute,
    bureaucratic issues with the Veterans Administration, financial problems from my divorce, and declining enrollment due
    to the Korean conflict eventually forced me to close the institute in 1953.
- speaker: Interviewer
  text: How did your career progress after closing the Jepson Art Institute?
- speaker: Respondent
  text: After a brief association with the Kahn Art Institute, Millard Sheets invited me to head the drawing department at
    Otis Art Institute. I stayed there for four years but left abruptly in 1958 because I did not receive a salary increase.
    I then rejoined Chouinard and remained there for twelve years, enjoying working with a young, vibrant faculty of former
    students.
- speaker: Interviewer
  text: What was your experience like teaching at Chouinard during that period?
- speaker: Respondent
  text: I was enthusiastic because the faculty included talented former students like Robert Irwin, Richards Ruben, Fred Hammersly,
    Robert Chuey, John Canavier, and Milly Rocque. I felt Chouinard was more interested in expanding art vistas, while Otis
    was too focused on practical application. Notable students during this time included Tom Wudl, Joe Goode, Larry Bell,
    Charles Arnoldi, Guy and Laddie Dill, Edward Ruscha, and Douglas Wheeler. I also produced a film called The Art of Drawing,
    which captured one of my class sessions and was distributed throughout the U.S.
- speaker: Interviewer
  text: What did you do after Chouinard became the California Institute of the Arts?
- speaker: Respondent
  text: When Chouinard became CalArts and moved to Valencia in 1970, I left the staff and worked in my studio across from
    MacArthur Park. I experimented with formed plywood sculpture. After three years, I took my family to London, where I researched
    scientific journals for clues to an organic basis for human creativity and pursued my hobby of collecting baroque bozzetti,
    especially those of Gian Lorenzo Bernini.
- speaker: Interviewer
  text: How did you continue your involvement with art education after returning from London?
- speaker: Respondent
  text: Upon returning to Southern California, I gave guest lectures and talks to university classes taught by my former students.
    I also began writing a book on art education focusing on the importance of stimulation and awareness to creative activity,
    especially the role of developmental growth and brain cell health. I view creativity as a process measured by one's commitment
    to expanding creative energies and believe that art education should stimulate the whole physical and imaginative being.
- speaker: Interviewer
  text: What is your philosophy regarding contemporary artists and creativity?
- speaker: Respondent
  text: I feel most contemporary artists do not foster inclusive, unitary views of themselves and do not engage actively in
    the rigorous, self-rewarding discipline of art as an extension of themselves. I believe truth, artistic or otherwise,
    lies not in what a person has achieved but in their innate potential for growth, change, and further realization.
