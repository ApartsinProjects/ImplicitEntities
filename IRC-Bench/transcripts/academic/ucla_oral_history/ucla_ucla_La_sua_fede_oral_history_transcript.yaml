turns:
- speaker: Interviewer
  text: Mrs. Castelnuovo-Tedesco, we were talking about your early years in Italy. You were born in the town of Prato. When
    were you born?
- speaker: Respondent
  text: I was born March 22, 1895. My father's name was Alfredo Forti.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: My mother's name was Giuseppina Vivanti, born in Senigaglia, Marche.
- speaker: Interviewer
  text: You were telling me earlier about your father and your grandfather, about their factory. Could you discuss that again,
    the wool factory that they had in Prato?
- speaker: Respondent
  text: Yes. My father's father was a very gifted man. He founded a woolen factory together with his brother Giulio, and they
    became very well and very famous with this. They constructed some plaids of all kinds, so beautiful. Then when they were
    made, they were put all together and sent to certain agents in England and put some -
- speaker: Respondent
  text: '- [in audible]'
- speaker: Respondent
  text: Labels, and then sent all over the world. You know, at that time, they didn't have electricity. They didn't have electricity
    at the time; so the factory was built near the river Bisenzio, which was going down from the Apennines to Prato. I remember
    very well this little factory, which became then bigger and bigger. And it was the water of the river - I don't know how--which
    made the machines run.
- speaker: Interviewer
  text: I see. It generated power.
- speaker: Respondent
  text: Yes, gave the power to the machines to work. I remember this very well. We were very little children, and we were
    walking around sometimes, once in a while. We were frightened to walk around those machines, because they were very--
    The river was called Bisenzio.
- speaker: Interviewer
  text: The factory was quite successful? You said your grandfather was quite successful.
- speaker: Respondent
  text: Yes. Si. They were quite successful. As a matter of fact, when my father and [his] younger [brother] took on the factory,
    they were already wealthy and very gifted, and they went on. Then they built another factory closer to - because at that
    time they started to have electricity and so forth--so closer to Prato. This little factory by the river was still working--I
    don't know - in different ways. But they built another factory, much bigger, in the plain of Prato, closer to Prato. And
    this went on until my father [died].
- speaker: Interviewer
  text: When did your father join the business? When he was a young man?
- speaker: Respondent
  text: Yes, he must have. Yes, yes.
- speaker: Interviewer
  text: He knew he was going to join the business?
- speaker: Respondent
  text: Oh, he started early, no doubt. But at first, of course, he had been to school. He was very gifted and loved literature
    and poetry very much. I remember during vacation he was teaching us with some poetry and reading us Italian classics and
    so forth. This I remember very well. We were very young.
- speaker: Interviewer
  text: And your mother?
- speaker: Respondent
  text: My mother was also listening. So she was reading also. My mother also had some brothers. One was very gifted as a
    doctor. He was a good doctor and became a psychiatrist at the last - Well, at that time psychiatry didn't exist much;
    it was when Freud came out. But he was a kind of pupil, let's say. This was one of my mother's brothers.
- speaker: Interviewer
  text: Did you have any brothers or sisters?
- speaker: Respondent
  text: Oh, many, many, many.
- speaker: Interviewer
  text: Did you? Who were they? How many were there?
- speaker: Respondent
  text: Well, I had a sister, older sister than [me], who married also a musician, composer, very gifted. He was a removed
    cousin from Bologna. He married my oldest sister.
