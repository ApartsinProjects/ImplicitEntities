collection: ucla_oral_history
source_url: https://archive.org/search?query=ucla+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me when were you born and where you were born?
- speaker: Respondent
  text: I was born in Victoria, British Columbia on July 22, 1926.
- speaker: Interviewer
  text: Where were your parents from? What country did they come from?
- speaker: Respondent
  text: My father was born in the Ukraine. He was brought to Canada at two years of age in 1899. My mother was born in Arbroath,
    Scotland. She came to Canada - she was 18 - around 1921. One of those things that happened. They were married on March
    17, 1924. 'Course, they told us kids for years that they were married in 1923. For obvious reasons!
- speaker: Interviewer
  text: Sure. Now what did your dad do for work?
- speaker: Respondent
  text: He was a laborer. He grew up on a wheat farm in Saskatchewan, and he went overseas with the army in the First World
    War. He was fortunate; when he was a child, he lost the first two joints of these two fingers. And so, he couldn't pull
    the trigger of a rifle. He was in the headquarters branch. When he came back to Canada, he applied and he became postmaster
    in Insinger, Saskatchewan. He joined the Naval Reserve, and they came out to Victoria for their annual training. He did
    what sailors do. And so, he resigned from the post office and came out and married my mother. He was working in construction,
    and he was in Oregon. One day the immigration agent came and said to my mother, "You're illegal here. Back to Canada."
    So they came back to Canada. My brother was born in Oregon. And we grew up in Canada. One of the warts in my life is that
    we moved to Vancouver in 1935. My father was a scab in that lengthy strike. As they say, don't blame the son for the father's
    transgressions.
- speaker: Interviewer
  text: Of course! Well, what did your dad tell you about the strike? You were about ten years old at the time. You were a
    youngster.
- speaker: Respondent
  text: I remember the machine guns on the docks and so on. But he never talked about it. My younger brother married the daughter
    of a longshoreman. Now, her father scabbed in '35. In the '23 strike, his job was to sit in the field across from the
    president of the union's home with a rifle.
- speaker: Interviewer
  text: Jeez. What was he supposed to do with the rifle? Was he supposed to take a shot at him? Or was he just supposed to
    watch him, or what was he supposed to do?
- speaker: Respondent
  text: If anybody came after him, they would have shot them. He would have shot them in those days. Anybody that came after
    the president, you see. He was protecting the president of the union.
- speaker: Interviewer
  text: Ok. In '23?
- speaker: Respondent
  text: Yes. Then we come to 1935. He had a wife and child. And you think of the pressure that must be on them. People like
    he and my father and many others. You can't condone it, but you can understand it.
- speaker: Interviewer
  text: Now, what pressure do you mean? You mean the pressure of the Depression?
- speaker: Respondent
  text: Yes, there's no other work. So, if they went out on strike and got blackballed, they had a problem. Even as late as
    1966, I was fighting to get some of these guys' time reinstated. And we were successful in it.
- speaker: Interviewer
  text: You're talking about guys who scabbed in '35?
- speaker: Respondent
  text: That were blacklisted. Yes.
- speaker: Interviewer
  text: Yes. I thought I remembered there was an effort to kind of forgive and - if not forget, forgive - in 1959, when the
    Canadian area was consolidated. After they won the '58 strike. Everyone was going to get pensions. Are you saying that
    wasn't quite the case at that time?
- speaker: Respondent
  text: No, it did change. There was nothing officially said. But times change, you see. By '58, I had five years on the waterfront.
    I walked the picket lines in that '58 strike.
- speaker: Interviewer
  text: Right. Let me roll you back a little bit to your youth. Is there anything else you remember of the 1935 strike? You
    mentioned you saw the machine guns.
- speaker: Respondent
  text: We moved here in October of '35. We went to live up in the Dunbar area of Vancouver, which is a little higher class
    than the working people. I'm not sure why I had to fight, whether it was the strike or my Ukrainian background. For the
    three months we lived up there, I had more than one fight.
- speaker: Interviewer
  text: And you're not sure whether it was because your dad had scabbed in '35, or whether it was because you were Ukrainian?
    Do I understand you to say that?
- speaker: Respondent
  text: That's right. Because in those days, the word "honky" indicated Ukrainian. We were honkies.
- speaker: Interviewer
  text: Did your dad speak - well, he came here young. He spoke English, didn't he?
- speaker: Interviewer
  text: But it didn't matter?
- speaker: Respondent
  text: I didn't know that he had an accent until I was an adult. I heard him on the phone one day, and I realized that there
    was a little accent in there. But Ukrainian was not mentioned in our household. My mother insisted we were Scottish. [laughs]
    You know, for all those obvious reasons. Forced marriage, and it wasn't a good one. They persevered. Oh, they fought like
    cats and dogs when we were kids, but they kind of mellowed as the years went by. But, you see, my life up to that point
    makes a whole book in itself, I think.
- speaker: Interviewer
  text: In what sense?
- speaker: Respondent
  text: Well, in 1942 on the first of February, my buddy and I went up to City Hall, put our hands on the Bible, and swore
    that this was our 16th birthday. Because in Canada during the war you had to have a registration card if you were 16 and
    older. So we got our registered card, which means we could work legally. I put it in my wallet, and after a couple of
    weeks I noticed that the bend in the wallet was fraying the edge of the card. The "2" of 1942 disappeared. So I went down
    and I joined the Navy. They called me in and I was sworn into the Navy on March 25th, 1942.
- speaker: Interviewer
  text: How old were you at that moment?
- speaker: Respondent
  text: 15 years and 8 months. I knew that they would phone my mother, and she would be happy to get rid of me. It was one
    less mouth to feed. I'd been in a week, and I get called up to the commanding officer's office. He's sitting there very
    grim. He looks up and he says, "How old are you, Copan?" Well, I knew that he knew. So I just said the truth, "I'll be
    16 in July." "What do you think of the Navy?" I'd been in a week. "Looks good to me." "Ok, get outta here and keep your
    mouth shut." And so I was in the Navy. There was only one problem. I couldn't go to sea.
- speaker: Respondent
  text: 'You had to be 19 to go to sea. And even my Navy age, I was only 18. They shipped me up to Prince Rupert Island, and
    it took me about six months to figure it out. I applied for a gunner''s course. Came down to Esquimalt British Columbia,
    took the course, went east with my class, and wound up on a minesweeper. Most Canadian minesweepers at that point were
    doing escort work. What we called the triangle run: Newfoundland, Halifax, the eastern U.S. Some interesting things there.
    In September of ''43, we went into Curtis Bay, which is a suburb of Baltimore, for a refit. Now, they kept six seamen
    and six stokers on the ship. We worked 4 on, 8 off, and 24 off. Well, in a situation like that, you can work things out.
    We had two days times in Washington, DC. Another time we had three days in New York City. As I say to many Americans,
    I say, "Did you ever walk up the steps of the Senate building? I did!" I hooked up one night with a bunch of American
    sailors. Around midnight one guys says, "You know, my ambition always has been to go up the steps and knock on the door
    of the Senate building. I''m gonna do it right now." So we all went up and knocked on the door. Then we walked down, of
    course. But, we have done it.'
- speaker: Interviewer
  text: Yes, yes. What did you see on the minesweeper? What was happening on the minesweeper? Any action, activity? Junior
    vessels, or any of that?
- speaker: Respondent
  text: By then, they were staying away from the east coast of the U.S. In early '42, it was a turkey shoot. They never thought
    to dim the lights of the cities. The ships were silhouetted, and the torpedoes were - But then they put blimps up, and
    that made a world of difference. If we were going in a convoy, the moment we crossed that line, we knew the blimps were
    up there. We felt different.
- speaker: Interviewer
  text: You felt safer?
- speaker: Respondent
  text: Oh, yes. We had two rescue operations. One of our stokers fell overboard. You wonder how an engine room guy can fall
    overboard.
- speaker: Interviewer
  text: That's quite a trick!
- speaker: Respondent
  text: What happened - there was a leak in the engine, drip, drip, drip. So they put a bucket under it. We changed watch
    at twelve o'clock. So the guy going off watch would take the bucket up, go back and dump it over the stern, put the empty
    bucket at the top of the ladder, and the guy going on watch would take it down. There isn't a hard railing around the
    stern of a minesweeper. There's just a post with wires. They lean them down when you're in port so they can work. Then
    they're supposed to put them up when you go to sea. Somebody forgot. This guy went to dump the bucket of oil, and he followed
    it. He came up, and he hollered. The fellows on the bridge said that they actually heard him holler. The officer of the
    watch was real sharp. He immediately said, "Stop engines. Hard a port. Call the captain. Away lifeboats." I came up. It
    just happened that a signalman who was closer to the boat had jumped into the lifeboat. He said, "Copan, you understand
    this more than I do. Get in here." He jumped out, and I got in. We couldn't find him. We could hear him. He was getting
    desperate, and the skipper - he gambled. He turned the searchlight on, and spotted him. We went 'round. Being the bow
    oar, I shipped my oar. And I reached for him. He grabbed my arm, and I'll tell you, you couldn't get tighter with a vice.
    But he was all slimy with oil. Fortunately, it was summer, and I was just in trousers. I was bare this, but I was smeared
    with oil getting him into the boat.
- speaker: Respondent
  text: The other incident, when we came out of Curtis Bay, we were escorting a single tanker up to New York City. We were
    going to have four days in New York City. About three o'clock on Wednesday morning, I was asleep. But the bosun piped,
    "Away, lifeboats crew!" Well, I knew what that was. I was up there, and I jumped in the boat. There was a - the Americans
    called them "patrol boats." They were made, in Canada, of wood. They ran on gasoline. There was a storm building up. He
    ran out of gas, and the wind had taken his aerials off. He was putting up flares. So we went around, and we never did
    put the lifeboat in the water. Skipper figured it was too rough. So we fired a line and put a tow line on him. As we were
    going into the mouth of the Hudson, a big Navy tug came out and took over the tow. Instead of us getting four days, we
    were told to go to Halifax. One of these southern storms that build up 35, 40 foot waves. We came up to Halifax on Friday
    morning. We were supposed to pick up Sambro Light, which is the guide to go into the minefield. We couldn't find it. We
    spent from 10 in the morning to 11 at night, and that storm was building. You see those pictures of 35 foot waves? I hung
    to a stanchion and watched them and more or less prayed, "Turn back, turn back!" But they finally, in Halifax, decided
    we couldn't make it through the night. They opened the gate. You knew that there was a gate over every harbor? It turns
    out that's the only time the whole Second World War that the gate to Halifax was opened to let a ship in. We made history
    on that one. The Germans mined the course through our minefield. The assumption is that they submarined in after a merchant
    ship. Then they sent in a mine-layer, and on his way out they laid 65 mines. Two ships hit mines.
- speaker: Respondent
  text: Here again, we got screwed. We were in Boston. We were supposed to be there for three days. I was on the watch from
    midnight to 4 a.m., on deck watch. I pulled one of my little things as I tend to do. I was on watch on the ship, and the
    old man had to be on the shore. Along about 12:30am, I hear footsteps coming down. Here's the skipper with a girl on his
    arm and another couple. You pipe, "Admiral support." For some reason, I walked over, and, as soon as he came aboard, I
    saluted and piped him aboard. And I thought, 'I'll hear about that.' Well, I did, but not in the way I expected. About
    20 minutes later, the captain's steward came out. He's got a little glass like this, and he said, "The old man said not
    to put too much rum in it because you're still on watch, but he said, 'Give this to Copan.'"
- speaker: Interviewer
  text: That was a funny way to hear. Not what you expected.
- speaker: Respondent
  text: Yes, and about an hour later a fueling barge came by. The officer on it hollers up, "Get your officer of the watch.
    You guys are sailing at 11 o'clock." I said, "We're not sailing. We're here for three days." "Get the officer of the watch."
    "Yes, sir"
