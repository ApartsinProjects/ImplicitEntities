collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: This border on the Book Club of California's Quarterly News-Letter cover - I have a 1949 issue here - you did the
    design?
- speaker: Respondent
  text: Yes. I don't think it's original at all. I remember taking it from something, but I did the drawing in pen and ink.
    The color is from a linoleum cut.
- speaker: Interviewer
  text: It's from linoleum?
- speaker: Respondent
  text: The color is. As were so many things. Like the color plates for Naval Sketches and things of that sort. And of course
    Grabhorn's reproductions of Japanese prints.
- speaker: Interviewer
  text: Did you do the color blocks for the Japanese prints?
- speaker: Respondent
  text: I did many on the first volume.
- speaker: Interviewer
  text: Shall we go back to the beginning? To when and where you were born?
- speaker: Respondent
  text: Well, I was born in Spokane in 1907, went to high school there, and worked for a short time after high school.
- speaker: Interviewer
  text: Were you interested in art as a young fellow?
- speaker: Respondent
  text: In high school I took a few courses, yes. I did drawings, some paintings and crafts. I did some copper work, with
    etched designs, and went on to etching a plate from which I printed a Christmas card. I think that was a project for someone.
- speaker: Interviewer
  text: I gather you grew up in a not too affluent household?
- speaker: Respondent
  text: It wasn't. I remember working at a very early age. I did all sorts of things, carrying two newspaper routes a day
    and mowing lawns and shoveling coal in the fall and snow in the winter. There were always lots of things to do, ways to
    keep me out of doors. I certainly wasn't alone in doing these things. My friends were doing the same things.
- speaker: Interviewer
  text: What did you work at after high school?
- speaker: Respondent
  text: I worked for the Federal Reserve Bank for a while. And then I worked for a short while in the advertising department
    of a bank. I suppose that was my first taste of what we call commercial art now, because I remember making a design for
    a billboard. Later an advertising concern such as Foster & Kleiser took it over and made something out of it, but I remember
    making a start on it anyway. Then in 1927 I decided to come to California and live with an aunt near Moraga, which was
    a possible solution to my getting away and going on to study.
- speaker: Respondent
  text: I had wanted to go to Chicago to the Art Institute, but that was an idea that wasn't to come about. It's probably
    just as well. I lived out at Moraga and commuted to the art school for a couple of years and then...
- speaker: Interviewer
  text: This was the California School of Fine Arts in San Francisco?
- speaker: Respondent
  text: Yes. And then I moved to the City and lived over here on Union Street, continued school for a while, and then went
    to New York for a year.
- speaker: Interviewer
  text: How long were you at the California School of Fine Arts? How long did you study there?
- speaker: Respondent
  text: It was a little over two years.
- speaker: Interviewer
  text: This was when Squire Knowles and all those people were there?
- speaker: Respondent
  text: Yes. Squire was there. I remember meeting Valenti Angelo because he lived near me and I was interested in his painting
    and not too much aware of his working at the Grabhorn press. I don't know whether he had really left the press or not.
    I lived on Kacondray Lane, and Valenti was on Leavenworth.
- speaker: Interviewer
  text: Were you particularly aware of there being fine printers around at that time?
- speaker: Respondent
  text: No, no, I wasn't aware of that.
- speaker: Interviewer
  text: You were simply interested in art?
- speaker: Respondent
  text: I was interested in the graphic arts and painting, studied fresco and tempera and encaustic and other mediums with
    Ray Boynton, who was a master. He was a friend of Diego Rivera, of course, had been to Mexico, and worked in these mediums
    there.
- speaker: Interviewer
  text: What was Boynton like?
- speaker: Respondent
  text: Well, Ray was a very, very wonderful person. He liked the outdoors and certainly was devoted to his work. He never
    went anywhere without making sketches or drawings, and of course many times he made a painting. And after I started to
    study with him and got to know him we used to go out quite a bit. He used to take me up the coast, and at one time to
    Yosemite and up to Donner Pass when he did drawings for George R. Stewart's book, Ordeal by Hunger.
- speaker: Interviewer
  text: You took classes from him and then you went out and worked with him informally?
- speaker: Respondent
  text: Yes. And then we worked together on the Federal Art Project, too. He did murals for the Modesto Post Office and I
    helped him with those. Then, of course, he was engaged in the Colt Tower project along with all the rest of the gang.
    That was a very, very exciting time when all of that was going on.
- speaker: Interviewer
  text: What was your part in the Colt Tower murals?
- speaker: Respondent
  text: Oh, I did two of the full standing figures. Not important, I must say.
- speaker: Interviewer
  text: What are they?
- speaker: Respondent
  text: One is a banker and the other is Michaelson, who invented the Interferometer. They're isolated tall, vertical figures.
- speaker: Interviewer
  text: And then did you work on some of the others, too, other people's?
- speaker: Respondent
  text: No, I didn't do actual painting for them. I was with Bob Howard when he had a studio at Sansome and Jackson at the
    time. I remember working on a ceiling design for the tower that I think Bob was in charge of.
- speaker: Interviewer
  text: How long a period was the Colt Tower period?
- speaker: Respondent
  text: I don't know how long we were actually working on the Tower. It was quite a while. But, of course, the projects -
    the Treasury Relief Project first - let's see, I started in December of '34 and it lasted until August in '37. Then I
    was transferred to the Federal Art Project, which went to November, 1939.
- speaker: Interviewer
  text: What other notable murals, then, did you work on?
- speaker: Respondent
  text: Oh, I did a small mural for the Sebastopol Post Office.
- speaker: Interviewer
  text: Is it still there?
- speaker: Respondent
  text: Yes. It's ancient - or rather, very dated.
- speaker: Interviewer
  text: What others?
- speaker: Respondent
  text: Oh, that's about all. I was on an assignment to visit CCC camps in 1934. We traveled up the coast to the border and
    made some drawings. I made some prints from them later on. It was in 1934 that I learned about the Grabhorns, and I later
    went in to see them.
- speaker: Interviewer
  text: Let me go back to this period, and make sure that we have everything important. You worked with Mr. Boynton on what?
- speaker: Respondent
  text: On murals for the Modesto Post Office.
- speaker: Interviewer
  text: Anything else?
- speaker: Respondent
  text: No. Those were done over in Berkeley, I think in the stadium.
- speaker: Interviewer
  text: Are they still at Modesto, do you know?
- speaker: Respondent
  text: I think they're still there.
- speaker: Interviewer
  text: What were the subjects of the murals?
- speaker: Respondent
  text: One subject was agriculture and there was a composition with miners.
- speaker: Interviewer
  text: And the Sebastopol?
- speaker: Respondent
  text: Sebastopol was chickens and apples, of course. [Laughter]
- speaker: Interviewer
  text: It must have been a great period.
- speaker: Respondent
  text: It was. For many reasons it was one of the nicest periods of all, I think, because to begin with we were young. We
    didn't have children yet, and living on next to nothing didn't seem to bother us. Of course, after we got on the federal
    project it was wonderful. We had lots of money. I mean, $94 a month, I'm sure, was lots more than many were making. Prior
    to that, fifty cents a day used to do very nicely, you know. You didn't need much. And living in North Beach - I always
    found North Beach a wonderful place to eat for very little. You could get a lot for ten cents.
- speaker: Interviewer
  text: Then you became aware of the Grabhorns in what year?
- speaker: Respondent
  text: Thirty-four.
- speaker: Interviewer
  text: And was this your first interest in printing as such?
- speaker: Respondent
  text: My first interest in printing was actually in the period prior to that, when I did a lot of freelance work in various
    fields. I designed and built furniture, and my wife was working for - and also my sister - for Alice Arnstein on Sutter
    Street, a gift shop, and I used to do work for them. So it was through people I met there that I was given a job for a
    mural at Mt. Zion Hospitals I remember that was through Mrs. Walter Haas. That was a long time ago. It was a children's
    mural, children playing, a decorative design. And then another interesting project I had which brought in some money at
    the time was making furniture for the Sigmund Stern Grove.
- speaker: Interviewer
  text: You made it or you designed it?
- speaker: Respondent
  text: Both. Mrs. Stern, of course, was Mrs. Haas's mother, and it was through Mrs. Haas I guess that I got that job. At
    that time, I met Mr. Gelber and Mr. Lillenthal, and I used to do things occasionally for them. I also met Dorothy Liebes.
    She had me design large ram's heads for one of her looms. A friend carved them in wood.
- speaker: Interviewer
  text: What kind of things did you do for Gelber and Lillenthal?
- speaker: Respondent
  text: Oh, special things, usually special cards that customers wanted. Engravings.
- speaker: Interviewer
  text: You were not doing reproduction at that time, were you?
- speaker: Respondent
  text: Some of them I printed, but it was before I had a printing press. I used to do them on a letterpress. The next press
    I got after that was a copper plate press, which was good for etching and copper engravings, but I also did linoleum cuts
    on it. I mean, individual hand printing.
- speaker: Interviewer
  text: When did you get the copper plate press?
- speaker: Respondent
  text: Oh, that was probably about '35, or not long after I started to work on the government projects.
- speaker: Interviewer
  text: But before that you had done other reproductions?
- speaker: Respondent
  text: A little bit. It wasn't until 1939 that I bought the Colt's Armory that I have now.
- speaker: Interviewer
  text: How did you become interested in the Grabhorns?
- speaker: Respondent
  text: Well, to go back, we had this trip up the coast as part of a Treasury Relief Art Project. We had stopped by Scott
    Bar, which was a placer gold mining town, to see some friends we had met here in San Francisco. Particularly, the Ford
    brothers, who had some gold mines and were working some old drifts. And they said, "Why don't you come up here and camp?
    It's a wonderful place, with good fishing, swimming and of course gold mining." I enjoy fishing and outdoor life, so after
    returning to San Francisco we decided to do just that. My sister and her husband, and my wife and I went to Scott Bar
    and stayed there in the summer of '34 - the time of the bloody waterfront strike. My brother-in-law sold his copy of the
    Grabhorn Leaves of Grass to finance their part of the trip. I think he got $2.
