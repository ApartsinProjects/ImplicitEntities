collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your early years and family background?
- speaker: Respondent
  text: I grew up in a family that valued creativity and education. My parents encouraged me to explore art from a young age,
    and I was always interested in drawing and painting.
- speaker: Interviewer
  text: What led you to study art at UC Berkeley?
- speaker: Respondent
  text: I was drawn to UC Berkeley because of its strong art program and the faculty there. I wanted to develop my skills
    and learn from experienced artists and teachers.
- speaker: Interviewer
  text: Who were some of your influential teachers during your studies?
- speaker: Respondent
  text: Lea Miller and Duke Wellington were very influential. They encouraged experimentation and helped me find my own voice
    in art.
- speaker: Interviewer
  text: How did your teaching career begin?
- speaker: Respondent
  text: I started teaching at the University of Wyoming, where I was part of a community of artists. It was a great environment
    to grow as both an artist and educator.
- speaker: Interviewer
  text: What was your experience teaching at the University of Washington?
- speaker: Respondent
  text: At the University of Washington, I worked with many talented colleagues and teachers. It was a stimulating place that
    pushed me to explore new ideas, especially in color and design.
- speaker: Interviewer
  text: Can you describe your approach to teaching design at UC Davis?
- speaker: Respondent
  text: I aimed to create a non-structured curriculum that encouraged creativity and exploration. I wanted students to engage
    with the visual world and use found objects and copying machines as part of their design process.
- speaker: Interviewer
  text: How did you incorporate new technologies like copying machines into your art?
- speaker: Respondent
  text: The photocopy machine became a major tool for me. I would copy images from magazines or textiles, manipulate them
    by adjusting colors or re-copying multiple times to create unique textures and patterns. It was a playful and serious
    way to explore creativity.
- speaker: Interviewer
  text: What role did humor and play have in your creative process?
- speaker: Respondent
  text: Play and humor were essential. They kept the creative process lively and helped me cross boundaries between art and
    everyday life. Even mundane tasks could become part of the creative act.
- speaker: Interviewer
  text: How did the political climate of the late 1960s affect your teaching and students?
- speaker: Respondent
  text: Students were very engaged with social issues and wanted their creative work to have purpose. I helped them see that
    art and creativity were fundamental and transcended politics, providing essential expression and meaning.
- speaker: Interviewer
  text: Can you share how your travels influenced your artwork?
- speaker: Respondent
  text: Traveling exposed me to different cultures and art forms, which enriched my work. For example, images from Egypt,
    Monet's gardens, and Hawaiian dancers found their way into my textiles and collages, blending diverse influences.
- speaker: Interviewer
  text: What was your philosophy about the relationship between art and life?
- speaker: Respondent
  text: I never drew a line between art and life. Creativity is part of everyday experience, whether making a xeroxed announcement
    or a textile piece. Art is created by the human hand and spirit in all aspects of life.
