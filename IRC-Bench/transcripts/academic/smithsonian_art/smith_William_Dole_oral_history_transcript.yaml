collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: What gave you the notion of creating works of art?
- speaker: Respondent
  text: Beautifully illustrated magazines, traditional artists' tools, and books by F. Hopkinson Smith. An impressive boyhood
    trip to Chicago. Vanity Fair. Olivet College and its celebrated visitors. Joseph Brewer's collections of art and art books.
    Bay Area artists, 1940s. Working in several mediums concurrently. Solo exhibition at Santa Barbara Museum, 1951. Diminishing
    work with oils. A collection of antique Japanese papers, first work in collage. A second collection of antique papers,
    this time in Florence. Beginnings of collage as a favored medium.
- speaker: Interviewer
  text: How did the collage tradition influence or justify your work?
- speaker: Respondent
  text: 'Discovering, then abandoning collage for descriptive (landscape) images: making something look like something else
    can get awfully cute. ''Memos'' of an office ''landscape.'' A more materials-oriented approach. Procedures. Works: Ad
    Hoc, Haybarn, Strata Data, Bibliophile, and others. The qualities of various papers. Printed or written words as compositional
    elements.'
- speaker: Interviewer
  text: Can you tell me about the galleries and dealers you worked with?
- speaker: Respondent
  text: Geddis-Martin (Santa Barbara), Duveen-Graham (New York), Edith Halpert's Downtown Gallery (New York), Bertha Lewinson
    (Los Angeles), Esther Bear (Santa Barbara), Rex Evans (Los Angeles), Jodi Scully (Los Angeles), Staempfli Gallery (New
    York), Springer Gallery (Berlin), Sagittarius (Rome), Antonio Souza (Mexico City), Neil McRoberts (London). Also, Kurt
    Schwitters's work.
- speaker: Interviewer
  text: What can you say about Schwitters and other collage artists?
- speaker: Respondent
  text: Schwitters' scale. The collage work of Pablo Picasso, Georges Braque, Max Ernst, Anne Ryan, Alberto Burri, Jean Varda,
    Joseph Cornell, and Saul Steinberg.
