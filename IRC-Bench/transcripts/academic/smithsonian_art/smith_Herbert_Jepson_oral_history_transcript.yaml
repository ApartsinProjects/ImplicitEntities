collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood influences on creativity?
- speaker: Respondent
  text: I was raised in rural surroundings until the age of five, then in Glendale. My father was a nurseryman and tree-moving
    contractor, and he gave me freedom to roam the hills and fields around Glendale. He also let me use his woodworking tools,
    which stirred my curiosity and helped me develop my capabilities while exploring the artistic dimensions of natural materials.
- speaker: Interviewer
  text: How did your early schooling affect your interest in art?
- speaker: Respondent
  text: When I entered public school, I encountered a traditional educational approach based on reward and punishment, which
    caused me to lose interest in learning. It was a bitter memory because it contrasted sharply with the spirit of inquiry
    and exploration I experienced at home. Only my early fascination with drawing sustained my sense of identity and creative
    urge.
- speaker: Interviewer
  text: What was your experience like at the Chouinard Art Institute?
- speaker: Respondent
  text: I received a tuition scholarship to Chouinard in 1926, where I met fellow students Millard Sheets and Don Graham,
    who later influenced my career. In my third year, I was chosen as a teaching assistant. When my teacher resigned, Mrs.
    Nelbert Chouinard asked me to continue instructing the class. By 1929, I had some recognition as a fine artist, winning
    second prize in the California Water Color Society Show. I also painted circus carnival banners at night and on weekends.
- speaker: Interviewer
  text: What happened after your teaching contract at Chouinard was not renewed?
- speaker: Respondent
  text: In 1930, when my contract was not renewed, I focused almost exclusively on commercial art. I designed and constructed
    furnishings for outdoor miniature golf courses and later opened a custom-made furniture business in Beverly Hills, which
    unfortunately failed due to competition from mass-produced items. Financial problems were compounded by my marriage and
    the birth of my first child.
- speaker: Interviewer
  text: How did your time at the Chicago Art Institute influence you?
- speaker: Respondent
  text: In 1933, while in Chicago on an unsuccessful business venture, I decided to attend the Chicago Art Institute. I also
    visited art departments in the Midwest to assess their educational methods. I wrote to Mrs. Chouinard about my expanding
    interest in art education, and she invited me to teach at Chouinard again in 1934. I was stimulated by continued contact
    with my first drawing teacher, Lawrence Murphy, and visiting teachers like Hans Hofmann, Alexander Archipenko, and David
    Siqueiros.
- speaker: Interviewer
  text: What was your role during World War II?
- speaker: Respondent
  text: During World War II, I joined Lockheed Corporation as a toolmaker in 1942. I proposed and designed several time-saving
    devices, for which I received bonuses and was promoted to senior tool designer. This extra income allowed me to seriously
    consider opening my own art school.
- speaker: Interviewer
  text: Can you tell me about the founding of the Jepson Art Institute?
- speaker: Respondent
  text: In 1945, I established the Jepson Art Institute in cramped quarters across from the Otis Art Institute and near Chouinard.
    We started with only three instructors, but the student body and faculty grew rapidly, requiring a move to larger quarters.
    Notable staff included Rico Lebrun, Howard Warshaw, William Brice, and Guy McCoy. I guided the institute according to
    my philosophy of open, experimental education, making it a fertile ground for emerging artists in Los Angeles.
- speaker: Interviewer
  text: What challenges did the Jepson Art Institute face?
- speaker: Respondent
  text: We faced bureaucratic issues with the Veterans Administration, financial problems resulting from my divorce, and declining
    enrollment due to the Korean conflict. These challenges ultimately caused me to close the institute in 1953.
- speaker: Interviewer
  text: What happened after the Jepson Art Institute closed?
- speaker: Respondent
  text: After closing the institute, I had a brief association with the Kahn Art Institute, then was invited by Millard Sheets
    to head the drawing department at Otis Art Institute. I left Otis abruptly in 1958 due to disappointment over salary issues
    and rejoined Chouinard, where I stayed for twelve years.
- speaker: Interviewer
  text: How did you find your experience at Chouinard during your second tenure?
- speaker: Respondent
  text: I was enthusiastic because I encountered a young, vibrant faculty of former students, including Robert Irwin, Richards
    Ruben, Fred Hammersly, and others. I felt Chouinard was more interested in expanding art vistas, whereas Otis was too
    focused on practical application. I also produced a film called The Art of Drawing, which captured one of my class sessions
    and was distributed nationwide. I found more satisfaction with this association because students were searching for new
    directions and ideas rather than accepting academic authority unquestioningly.
- speaker: Interviewer
  text: What did you do after Chouinard became the California Institute of the Arts?
- speaker: Respondent
  text: When Chouinard became CalArts and moved to Valencia in 1970, I left the staff and worked in my studio across from
    MacArthur Park. I experimented with formed plywood sculpture. After three years, I took my family to London, where I researched
    scientific journals for clues to an organic basis for human creativity and pursued my hobby of collecting baroque bozzetti,
    especially those of Bernini.
- speaker: Interviewer
  text: How did you spend your time after returning to Southern California?
- speaker: Respondent
  text: I worked as a guest lecturer, giving talks to university classes taught by my former students. I also began writing
    a book on art education focusing on the importance of stimulation and awareness to creative activity, especially the role
    of developmental growth and brain cell health. I view creativity as a process measured by one's commitment to expanding
    creative energies and believe art education should stimulate the whole physical and imaginative being.
- speaker: Interviewer
  text: What is your philosophy on contemporary artists and creativity?
- speaker: Respondent
  text: I feel most contemporary artists do not foster inclusive, unitary views of themselves and do not engage in the rigorous,
    self-rewarding discipline of art as an extension of themselves. I believe truth lies not in what a person has achieved
    but in their inborn potential for growth, change, and further realization.
