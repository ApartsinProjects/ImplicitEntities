collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: What had he been doing before the opening of the Veterans' Building?
- speaker: Respondent
  text: He showed me the Galka Scheyer show in Oakland, in 1927 or 1928, when he was working for the Oakland Museum as elevator
    boy and general cleanup man - and student at Arts and Crafts, where we both were studying. He took me in the back room
    and showed me the Blue Four, which I had never heard of, obviously; I was having a rough time learning who Cezanne was
    at that point.
- speaker: Interviewer
  text: This whole thing of Galka Scheyer bringing the Blue Four to the United States - who was she, and why Oakland?
- speaker: Respondent
  text: She was desperate to get some money.
- speaker: Interviewer
  text: She was a German?
- speaker: Respondent
  text: Yes. She was from Germany, at least, and had Jawlensky, Kandinsky, Klee, da Blau, and Richter, and who was the other?
    There were four. At any rate, that was my introduction to that kind of art, by John Humphrey in 1927 or 1928. Then we
    both quit our other kinds of jobs - I was doing architectural interior work designing. We went back to art school, in
    our mid-twenties, at the Fine Arts in San Francisco (now called the Art Institute).
- speaker: Interviewer
  text: You talked about being born on the day Cezanne died.
- speaker: Respondent
  text: No, the same year--1906.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Long Beach. But that's not really fair, because I should have been born in San Francisco. My mother and father, as
    kids, came out of Seattle, missed a boat, the trunk was late, got the next boat. The boat they should have picked up went
    down with all hands aboard off the Point Arguello. They came to San Francisco on the next boat, and they weren't allowed
    to land because there was no city. Father had a friend there, I was to be born there--I was getting ready to be born.
    So father says I could hear the earthquake thing, but I couldn't see it.
- speaker: Interviewer
  text: You mean really?
- speaker: Respondent
  text: Yes. The city was in ruins when they arrived. The ship came in and was sent over to Oakland because there was no San
    Francisco. So I ended up in Long Beach, where there was another friend. Long Beach, then, was the size of Sausalito, maybe.
    We left shortly afterwards, so I don't know anything about that area.
- speaker: Interviewer
  text: Why were your parents just arriving?
- speaker: Respondent
  text: They had come from the East, around, to work in California.
- speaker: Interviewer
  text: To do what?
- speaker: Respondent
  text: My father was in woodwork - cabinetmaking. He did things for Gumps.
- speaker: Interviewer
  text: California was just a good place to go to?
- speaker: Respondent
  text: Yes, just to get away from the families of all kinds. My father was from Europe. Mother wanted to get out of the Middle
    West. So they stayed out here the rest of their lives. He did things for Gumps later--beautiful furniture and ship models.
- speaker: Interviewer
  text: Were you the first child?
- speaker: Respondent
  text: Yes, the first child of three.
- speaker: Interviewer
  text: When did your artistic bent start showing?
- speaker: Respondent
  text: Mother says it started before I could talk, because I used to scratch in the sand and make drawings. She said friends
    would comment on this --that I was always drawing in the sand. I wouldn't know about this. It has nothing to do with vanity
    or ego, because I was not aware of this. But it started very early. In grammar school I was drawing, and by high school
    I knew exactly what I wanted to do--be an artist. So I did the things that kids do in high school.
- speaker: Interviewer
  text: Your parents obviously didn't discourage it?
- speaker: Respondent
  text: Not really.
- speaker: Interviewer
  text: They didn't throw up the usual arguments about it not being practical?
- speaker: Respondent
  text: They had other difficulties. I wasn't the difficulty; they had it with each other. My dad went back to Europe [laughs].
    I met him some years later and found he was a fascinating man. He was painting and drawing and writing poetry, as a more
    or less illiterate man, but they were beautiful, or primitive things. So I never really knew him when I was in high school.
- speaker: Interviewer
  text: So they weren't focused on you?
- speaker: Respondent
  text: They were so busy getting mad at each other that we could do what we wanted to. But that broke up, fortunately for
    both of them. They each lived happier lives thereafter.
- speaker: Interviewer
  text: Did you find some good training down there? Or where did you go?
- speaker: Respondent
  text: I came up here for late grammar school. At that time I lived with my father, in a hotel, of all places, at Fifth and
    Market. I lived out in Golden Gate Park during the day when he was working, haunting the museums and things in the park.
    Then we moved to Berkeley. Grammar school started, high school, scholarships to art school, Arts and Crafts.
- speaker: Interviewer
  text: You were really good, to get a scholarship.
- speaker: Respondent
  text: That was from high school. I'd won a few prizes there. My first one-man show was while I was in high school, at the
    Oakland Museum.
- speaker: Interviewer
  text: Who was the curator there?
- speaker: Respondent
  text: Clapp. The show had something to do with schools, and traveled all around the country. It never came back; I never
    saw the things again.
- speaker: Interviewer
  text: What are your memories of the Oakland Museum and that whole Society of...
- speaker: Respondent
  text: Let me finish off the school thing, because at that point I was in high school, and then Arts and Crafts for a short
    while; then working for five years trying to earn money to go to school straight through, which was idiotic, I guess;
    then to art school.
- speaker: Interviewer
  text: What kind of work did you find?
- speaker: Respondent
  text: 'I worked for the Emporium Capwell Corporation, designing interiors and architectural things. I found I couldn''t
    save that much money, and went to art school in San Francisco and paid down a full year''s tuition. I was interviewed
    two weeks later by Lee Randolph, the director, and was asked why I was there and what I wanted to do. I was frightened:
    why would he ask me in the office - the big boss? I was going to night school and day school; so we went from eight to
    twelve o''clock at night about every day. There was a bunch of us doing that. This was the Depression time--1930. After
    a short talk, he asked how I''d like to be his monitor in the painting class for one of the teachers, and he gave me back
    my check for the year''s tuition. So it didn''t cost me anything to go to school from then on. We also worked in the cafeteria,
    where I met my wife. She was on desserts, and I was on salads. She was in painting and I was in sculpture.'
- speaker: Interviewer
  text: That's why you're such a pro here.
- speaker: Respondent
  text: I've been doing things ever since.
- speaker: Interviewer
  text: That's a fantastic story for many reasons. During the Depression I guess there weren't a whole lot of choices of things
    to do, but to be going to school day and night to be an artist seems like one of the more optimistic things done.
- speaker: Respondent
  text: I've always known that this is what I wanted to do. If there had been no depression, I just would have been a little
    bit ahead of time. But in working I learned a lot of things that kids coming out of high school at that age didn't know.
    So I eventually found out I wasn't that far behind. I still worked at night all the time.
- speaker: Interviewer
  text: Who was the wonderful man?
- speaker: Respondent
  text: He was a very adequate bit of a shop manager. Stackpole, whom I came very close to, was there; Diego Rivera was there
    doing his fresco, living in Stackpole's studio. Shortly after being Stackpole's assistant I was allocated to Diego Rivera
    for a year, to take care of his studio and teach Frieda Kahlo how to shop in North Beach, and to grind color for Diego
    and keep track of his phone calls.
- speaker: Interviewer
  text: A real apprentice.
- speaker: Respondent
  text: Yes, a real apprentice kind of thing, with both Stackpole and the Stock Exchange at that time, and huge granite jobs,
    and Diego Rivera. It was very much fun. Henri Matisse was here at that time, twice, on the way to Tahiti and back again.
    A number of us older fellows were incorporated into the art world. We washed windows or waited on tables to be at parties
    or Europe where there were artists from the East involved. It was one way of getting us to be kind of part of the 'team,'
    although we were students. It was a very healthy, warm, wonderful thing.
- speaker: Interviewer
  text: When artists from the East came, who were the idols? Were they just more advanced than anything that was here?
- speaker: Respondent
  text: I didn't understand the first part of that question. Artists would come through from the East Coast. Arnold Blanch
    taught at the school in the City for a while at that time. Matisse was only a guest, and was in and out for a couple of
    weeks.
- speaker: Interviewer
  text: Did West Coast artists always feel there was something to learn from East Coast artists?
- speaker: Respondent
  text: West Coast artists, in this sense, were all Paris oriented. All of them commuted. All of them had worked in Paris,
    many of them for many, many years. They didn't think of themselves as West Coast artists at all. This was merely their
    home and a place to work. Some would work a while and go back to Paris or Italy, very much like Worth Ryder did from up
    here. So they were very much a part of the art world, which at that point was Paris oriented --some Berlin, some London;
    no Tokyo; and practically none in San Francisco, which turned out many people in the creative fields, all of whom had
    to make money elsewhere. Most of my work still is east of the Hudson River, because I happen to have had a gallery there
    for twenty years.
- speaker: Interviewer
  text: In about 1935, when the museum was gotten under way by Grace Morley, was when the West Coast style became the thing,
    wasn't it?
- speaker: Respondent
  text: Yes. Before that, students from here would all go on to New York. You sort of work in an art school in the United
    States someplace; then you go to the Art Students' League or to New York and get your journeyman's card, as it were. Then
    you would go to Paris or go to Europe and get your master's card, as it were. You'd come back, and you were an artist!
    Of course, that changed in 1945, violently - very good, too.
- speaker: Interviewer
  text: Mrs. Salk talked about how she studied in San Francisco with, I believe, somebody named Olga Mandelbaum Ackerman and
    a person named Julie Heincman?
- speaker: Respondent
  text: These were all names that were long before my time. It was during that period of working at the art school in the
    early thirties--1931, 1932--where I met Helen Salz because I worked for Ralph Stackpole, and they were old friends. She
    and her husband would come down to Ralph's studio, where Diego was working. I knew her as an older artist - one of the
    older crowd. Albert Bender and all those people would come to Ralph's studio. Ralph's studio at that time was a focal
    point. It was a sort of Cite Bar of the West Coast. After work people would come in for a glass of wine and would sit
    and talk. Piazzoni would even come down and say hello to Ralph - old, old friends. Piazzoni sponsored Ralph in Europe
    as a kid.
- speaker: Interviewer
  text: It was a nice, tight community?
- speaker: Respondent
  text: The implications of the word 'tight'... it wasn't that, but it was a very close community, because it was so tiny.
