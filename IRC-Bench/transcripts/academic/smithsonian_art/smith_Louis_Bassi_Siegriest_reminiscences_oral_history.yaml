collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Let's start, Mr. Siegriest, by discussing your family background -- what were the names of your parents?
- speaker: Respondent
  text: My mother's name was Emilia Bassi. She was born in San Francisco, from Italian descent. Her father was Guiseppi Bassi,
    and her mother's name was Maria Bassi. I don't know the year when they came here. It was 1850-something. They came to
    San Francisco and were married in San Francisco, and then went to Virginia City.
- speaker: Interviewer
  text: Your parents, you mean?
- speaker: Respondent
  text: My grandparents. That's how I became fond of Virginia City, through hearing them talk about it - not my grandparents,
    but my mother and father, because they died a year before I was born, but the family used to talk about Virginia City.
    So I always made my way to Virginia City to sketch and paint in that territory.
- speaker: Interviewer
  text: What was it that drew them to Virginia City; were they in mining?
- speaker: Respondent
  text: Well, it was like all the other people at that time; it was the gold, I guess. My grandfather was an amalgamater,
    whatever that is, I really don't know. It had something to do with the processing of gold. And they lived -- actually
    they didn't live in Virginia City. They lived in Gold Hill, which is a suburb of Virginia City. They had a boarding house,
    so I understand, and must have made a little money because they came to San Francisco and purchased property which is
    now where the Bohemian Club is at the present day. My mother inherited that property, but it was a few days before the
    earthquake when she sold it, I think, for $2400. It's worth a couple of hundred thousand dollars today, I imagine, that
    property.
- speaker: Interviewer
  text: Sure, it must be.
- speaker: Respondent
  text: But $2400 was what she sold it for.
- speaker: Interviewer
  text: What were your father's parents, what were they like?
- speaker: Respondent
  text: My father was from New York, a German Swiss, my father was born in New York. His parents had a mill, that weaved cloth.
    And then there was a panic in the 70's, and they lost their money and they moved to Virginia, went on a farm in Virginia.
    So my father spent his teenages in Virginia. He got tired of farming, and he took off. They were building the railroad
    that ran up into Seattle or thereabouts.
- speaker: Respondent
  text: Northern Pacific, I think it was. So he went up there to get a job on the railroad, and he didn't like it. It was
    too hard work, I guess. So he and three other fellows hiked from Minneapolis all the way to Vancouver, Washington through
    the woods. And that's how he came out this way. He got to Vancouver, and then he took a boat -- worked on a farm in Vancouver
    to make enough money to get passage to San Francisco. And he came to San Francisco and finally met my mother and married
    here. He worked on the streetcars -- horsecars - here at that time, and then he went into the oil business. It was some
    kind of fly-by-night oil field in the northern part of the state here in which, that I hear, what money my grandparents
    left me he sunk it all in this oil well, about ten thousand bucks.
- speaker: Interviewer
  text: And that flew by night? [laughter]
- speaker: Respondent
  text: That flew by night, yes.
- speaker: Interviewer
  text: Both San Francisco and Virginia City were about the two biggest cities on the West Coast or in this part of the country,
    at that time,
- speaker: Respondent
  text: Well, at one time - I mean, before that, Virginia City was larger than San Francisco.
- speaker: Interviewer
  text: That was back when your mother's family was there?
- speaker: Respondent
  text: I imagine so. I don't know the exact dates, but in the 50's I think it had forty some thousand in Virginia City. San
    Francisco was, I think, thirty some thousand.
- speaker: Interviewer
  text: What did your father do after he was in oil?
- speaker: Respondent
  text: Oh, then he went into making an acetylene gas machine which provided lights for homes. He did that for, oh, I guess,
    twenty years, until electric lights put him out of business. He didn't do a thing after that. They had some property here,
    which was enough to - the income of it that he - He retired. [laughter]
- speaker: Interviewer
  text: Did they have any interest in art at all?
- speaker: Respondent
  text: Not my father. My mother, I think, would have been an artist. She used to like to draw plans of homes. She was always
    sitting down drawing plans of houses and even the exteriors, sketched out. I know when I started to draw, why, she always
    encouraged me because she liked it herself. If it wasn't for her, I possibly wouldn't have been an artist.
- speaker: Interviewer
  text: Were you the only child in the family?
- speaker: Respondent
  text: No, there was another boy. He was drowned in Alaska. He went to Alaska when he was 24, and he was drowned in Alaska.
- speaker: Interviewer
  text: What kind of childhood did you have? Can you tell us something about the way you were brought up?
- speaker: Respondent
  text: Well, it was like most middle-class families. It was a very good family life we had. Everything was quite easy - things
    went on very well.
- speaker: Interviewer
  text: Where did you spend your childhood, here in Oakland?
- speaker: Respondent
  text: Right across the street, where I was born.
- speaker: Interviewer
  text: All your life, you've been here, then.
- speaker: Respondent
  text: I've been here all my life -- When I was 20 or 21 I went to Seattle, and I was there for two and a half years. I was
    married in Seattle. And then I came back here and went to Texas. By that time I was interested in commercial art. I had
    to make a living because I was married, so I got interested in commercial art. There was a job offered in Texas so I went
    there and worked for a year. All this time I wanted to go to Chicago because the best commercial art was done in Chicago
    at that time.
- speaker: Interviewer
  text: I'd like to trace back a bit part of this time. When did you first become interested in art?
- speaker: Respondent
  text: Well, ever since I was a kid, I always drew. I wanted to be a cartoonist. I mean I started out that way. I was interested
    in cartoons, and while I was going to grammar school -
- speaker: Interviewer
  text: Here in Oakland.
- speaker: Respondent
  text: In Oakland.
- speaker: Interviewer
  text: What school?
