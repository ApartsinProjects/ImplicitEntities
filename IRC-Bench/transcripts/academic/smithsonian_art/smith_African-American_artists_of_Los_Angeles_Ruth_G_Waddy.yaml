collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: Ms. Waddy, could you tell us when and where you were born and also give us your full name?
- speaker: Respondent
  text: I was born in Lincoln, Nebraska, January 7, 1909, and my full name is really Willanna Ruth Gilliam. Willanna was my
    first name because my mother-- I was the oldest, the first child. My mother's first name is Willie, and her second name
    was Anna. But when I went to school, the children called me "Banana!" So I asked her if I could go by my second name,
    Ruth. She said yes. From then on I was Ruth Gilliam. Now, when I got married I didn't want to drop the maiden name, so
    I go by Ruth G. Waddy.
- speaker: Interviewer
  text: I see. And what's your father's name?
- speaker: Respondent
  text: John Moses Gilliam.
- speaker: Interviewer
  text: Do you know when they came to Nebraska, approximately? Had they been--?
- speaker: Respondent
  text: They had been married four or five years prior to my mother becoming pregnant with me, and they were in Butte, Montana,
    at the time, near the time of my-- And she became pregnant with me. But my father was very suspicious of staying there
    because there were no African-Americans in Butte, Montana, at that time. So he decided to move to Lincoln. And another
    thing, my father always liked to buy wherever he lived. He liked to buy his house and some land around it because he was
    a strong believer in gardening for, you know, tomatoes and peppers and things like that. He liked to have vegetables.
- speaker: Interviewer
  text: Is that what he did for a living?
- speaker: Respondent
  text: No. He was a waiter. That's how he happened to know the Northwest of the country so well, because he did what many
    African-American men did in those times--run on the road. But he was not a porter, he was a waiter.
- speaker: Interviewer
  text: This was on a train?
- speaker: Respondent
  text: Yes. On trains.
- speaker: Interviewer
  text: Did your mother work also?
- speaker: Respondent
  text: No. My mother never worked. In fact, when I was a baby until-- Well, when I was born, I had two younger sisters, Margaret
    and Gladys. Margaret is about a year and three months younger than I, and Gladys is almost three years younger than I
    am. Gladys was born in 1912. Margaret was born in 1910. She was a middle sister; Margaret was the middle sister. And Mama
    hired - It was during the period of a lot of immigrants coming to the United States--when the immigrants came to the States,
    I mean, a lot of them from Europe. My mother knew how to speak German, so she hired-- They had a German help, you know,
    to help my mother do the--
- speaker: Interviewer
  text: How did she happen to know how to speak German? Do you know?
- speaker: Respondent
  text: Well, my mother seemed to be very well educated, although she was an only child. Her mother died in childbirth. She
    was raised by her grandparents.
- speaker: Interviewer
  text: Was she educated abroad, do you know?
- speaker: Respondent
  text: No. She was born in Fort Scott, Kansas.
- speaker: Interviewer
  text: Same place as Gordon Parks.
- speaker: Respondent
  text: But she was raised and she talks about Leavenworth, Kansas. I guess that's where she met my father. I don't know.
    Maybe so, because I know the Gilliams had property in Leavenworth. I never asked her, and when I thought about asking
    her she was gone. But she must have come from a sort of upper-class family because she put-- In those days, young women
    had hope chests. A hope chest meant that you put away things in preparation for your wedding, your future home.
- speaker: Interviewer
  text: Like linens and china and things like that.
- speaker: Respondent
  text: Yes, yes. She put quite a store by sterling silver and linen tablecloths and very fine things. We always had a dining
    room and a linen tablecloth, and each of us had our own napkin and napkin ring with our names on it.
- speaker: Interviewer
  text: Oh. Did she play the piano?
- speaker: Respondent
  text: Yes, she did, and she sang. She had a beautiful singing voice, but none of us inherited that. But we did inherit a
    love for grand opera. She sang grand opera.
- speaker: Interviewer
  text: Where did she sing? Just locally?
- speaker: Respondent
  text: I know that she sang in Leavenworth, Kansas, because my uncle-- My father, on the other hand, there were eight in
    his family, girls and boys. Uncle Elijah often remarked that it was strange that none of us had the voice my mother had.
    So it must have been in Leavenworth, Kansas. And where else, I don't know. She never did say. When I thought about asking
    her about those things, she wasn't here--she had died.
- speaker: Interviewer
  text: What year did your mother die?
- speaker: Respondent
  text: I don't remember. I don't remember dates of-- I remember when my father died, because I was graduating from the eighth
    grade. I was thirteen years old. I remember that. But I don't remember my age.
- speaker: Interviewer
  text: So he died before your mother?
- speaker: Respondent
  text: Yes, many years before.
- speaker: Interviewer
  text: Did you know much about your father's family background?
- speaker: Respondent
  text: Yes. Uncle Elijah wrote a sort of mini-autobiography for his daughter, and I have a copy of it someplace. Uncle Elijah
    was the youngest of the eight children. My father was next to the oldest of the boys, anyway. I remember Aunt Jane, my
    mother saying that she was sort of a disciplinarian. She never had any children, though. Uncle Henry did. Uncle Henry
    was the oldest boy, and he had some children, but I don't remember how many. My father, since he ran on the road and he
    liked the Northwest, when my mother and he were married, that's where they lived. In those days, there weren't very many
    African-Americans in that part of the country. That's why it was a German immigrant who hadn't learned how to speak English
    yet. That's why my mother hired her, I think.
- speaker: Interviewer
  text: I see. So what kind of education did your parents try to give their children? Did they try to give you music lessons?
- speaker: Respondent
  text: Yes, yes, my mother did, because, of course, being in music, she thought it was important. I remember we had a cardboard--
    We didn't have a piano at first. The keys were cardboard, and we had to practice on these cardboard keys. And it was numbered,
    you know. The keys were numbered E, F, G, A, B, C. Let me see. I think there were six of them. The C starts, C, D, E,
    F, G, A, B, C. A, B, C are the higher ones up. And then after a while we got a piano. I liked the piano. Some woman heard
    me play once, and she offered my mother-- This was after my father had died. She said that she would see that I became
    a concert pianist if my mother would let her take me. But Mama said no, because she had heard stories about white people
    taking children, and they were actually enslaving them to work for them, you know, for years and years and years. So she
    said no. But I played for the church, and I played the pipe organ for the church. I liked the pipe organ because the pipes
    are for the keys where you do your footwork.
- speaker: Interviewer
  text: How long did you continue to play the piano? All your life or did you stop at some point?
- speaker: Respondent
  text: Oh, I can't play the piano now.
- speaker: Interviewer
  text: So it was mostly classical music then, or was it--
- speaker: Interviewer
  text: No jazz, right?
- speaker: Respondent
  text: But my youngest sister played jazz.
- speaker: Interviewer
  text: What did your mother think of that?
- speaker: Respondent
  text: She didn't think anything. It was quite acceptable then. Not as acceptable as it is now, but it wasn't, you know,
    forbidden.
- speaker: Interviewer
