collection: smithsonian_art
source_url: https://www.aaa.si.edu/collections/oralhistories
turns:
- speaker: Interviewer
  text: First, could you tell me a little bit about when and where you were born and where you grew up?
- speaker: Respondent
  text: Yes. I was born in Pasadena--I still live there--almost sixty years ago.
- speaker: Interviewer
  text: Have you lived there all your life?
- speaker: Respondent
  text: Off and on for most of my life, yes, I've lived in Pasadena.
- speaker: Interviewer
  text: What schools did you attend?
- speaker: Respondent
  text: I went to Luther Burbank Grammar School, Thomas Jefferson Grammar School, and then we moved to Altadena from Pasadena.
    We lived there for the next twenty years, I guess. And I went to Elliot Junior High School, Charles W. Elliot Junior High
    School in Altadena. And then - I was a very bad student - a very poor student - and I went through high school at a little
    school for those who weren't smart enough to make it through public school called University School, which was in Pasadena.
    That's how I managed to get through high school.
- speaker: Interviewer
  text: Where did you go then?
- speaker: Respondent
  text: Well, as I said, I was a pretty bad student, and the only thing I'd ever shown any talent in was a little bit of artwork.
    Teachers usually liked my artwork in grammar school, watercolors and crayons and so on. So I had sort of always thought
    that I would be a commercial artist. So when it came time to go to college--which my father, of course, wanted me to do
    although I was ill-prepared--I chose art school, because I thought it would be easy and because I could qualify and get
    in, whereas in a regular college I probably could never have gotten in. But he went along with that, and I went to a place
    that's still going called Woodbury College. This was right about at the end of the war and it was filled with GI students,
    and they had expanded their facilities to accommodate them.
- speaker: Interviewer
  text: Where's that located?
- speaker: Respondent
  text: It was on Wilshire Boulevard near Figueroa Street at that time. I don't know where it is now. It may still be there.
    And they had a commercial art department, which was not very good I don't think at that time. But I was pretty young.
    I wasn't twenty years old when I started at Woodbury. And it was probably--because I was so young--better to go there
    than one of the better art schools when I was only that age. Later on I went to Art Center, which was then way out on
    Third Street. An old girls school. I went there for a semester and I was drafted. After the Korean War I went to Chouinard,
    and that was the best school. I went there when they were at the very peak of their ability as an art school, I would
    say. The teachers and Mrs. Chouinard, who had made the school, were still all there and in their prime, and I was lucky
    enough to be there. Although, at the time, I didn't really realize-- It was later on, when I look back. So I got a pretty
    good art school education, if not any other kind.
- speaker: Interviewer
  text: Well, later on we'd like to talk a little more about Chouinard, but could you just mention some of the teachers you
    had there?
- speaker: Respondent
  text: Yes. I think the most influential teacher I had was a man named Don Graham, who taught drawing and composition. He
    taught from an entirely different point of view than most other teachers. He always talked about something you didn't
    understand. And he would either drive you nuts or you fell in love with him. He really went after the very hard, difficult
    things of art - if you want to say art--and to get students to do these difficult things rather than just copying or whatever,
    which most of the teachers would settle for. And he was a very-- I never saw any of the artwork he'd ever done himself,
    but he was. I guess, a man who was born to be teacher. He knew art very well, backwards and forwards, and he could teach
    it. So I learned a lot from him. Then there was a man named William Moore, who was - I think he was an interior designer
    by profession, but he taught color and design and he was a magnificent teacher. He had a system that was sort of based
    on cubism, although he never used the word nor did he want you to use the word. But a lot of it was based on cubism, and
    he had a system of understanding colors and making designs. He never wanted you to draw with the pencil. You always had
    to paint the color you wanted on a piece of paper and then cut it out and paste these pieces of paper into some sort of
    design. It was really very, very instructional. I learned a great deal from him.
- speaker: Interviewer
  text: So that was good training for a book layout.
- speaker: Respondent
  text: I suppose so, yes. Of course, I had had some interest all the time in art school in layout and advertising, but I
    never took that. I wanted to be an illustrator, a magazine illustrator. So I wasn't really ever-- Although I was still
    interested in printing and designing and that sort of thing--and I did take some advertising courses--my prime interest
    was illustration.
- speaker: Interviewer
  text: I was wondering-- The name Don Graham rings a bell in something I was reading about Disney Studio, Didn't he give
    classes at Disney later on?
- speaker: Respondent
  text: Right. Not later on - I think it was earlier. I think when Walt Disney wanted to do Snow White, he felt that his people
    were not adequately schooled in drawing. They were more like people who had come along and picked up animation, and were
    not really very good draftsmen. They could move things around and be funny, but they couldn't draw very well. And he felt
    that they weren't going to be able to make Snow White unless he had some of his artists better trained. So he hired Don
    Graham from the Chouinard Art School to teach his people part-time. This was, I think, in the early thirties. This might
    have been as early as 1931 or '32, I believe. And Don Graham himself told me that it was an amazing thing for him to be
    thrown into this cartoon world. He himself had been steeped in the traditions of the Renaissance. That's what he loved,
    the Renaissance masters--at that time, anyway--and here he was in the world of animated cartoons! And he said he had learned
    more from them, probably, than they learned from him. [laughter]
- speaker: Interviewer
  text: What would you say was his influence on the style of Disney Studios? Actually, we're sort of skipping all over the
    place, but--
- speaker: Respondent
  text: I really don't know because I was never in one of his classes at Disney. When I arrived at Disney in 1955 he was writing
    a book, which later came out much edited, called the Art of Animation. That came out around '57 or '58, and he was at
    the studio at that time part-time, working on the book in a room he had there where he had access.
