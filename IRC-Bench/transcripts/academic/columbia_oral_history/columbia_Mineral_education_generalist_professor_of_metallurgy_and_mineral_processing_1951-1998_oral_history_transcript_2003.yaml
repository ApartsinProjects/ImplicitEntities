source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and education?
- speaker: Respondent
  text: I was born and raised in South Dakota. My family was pioneer stock, and we experienced the Depression, drought, and
    grasshoppers, which taught us self-reliance. I attended the South Dakota School of Mines & Technology starting in 1941,
    then returned after World War II in 1946 to complete my degree.
- speaker: Interviewer
  text: What kind of work did you do during your summers while in school?
- speaker: Respondent
  text: I worked at the Homestake Mine during the summers. One of my jobs was 'walking feed' at the stamp mill, which involved
    feeding ore into the mill. I also learned a lot working at the counter-current-decantation pilot plant, which was a valuable
    hands-on experience.
- speaker: Interviewer
  text: How did your military service fit into your education and career?
- speaker: Respondent
  text: I served in the military from 1942 to 1946 during World War II, which interrupted my studies. I was involved in combat
    in Europe. After the war, I returned to college to finish my degree, which was important for my career in mineral processing.
- speaker: Interviewer
  text: What was your experience like working at Climax Molybdenum Company?
- speaker: Respondent
  text: I started as a laborer on the 'Moly Hill' and later worked in an unusual plant designed to recover trace minerals.
    I also served as a water-plant foreman, which gave me good experience that helped later when I went into teaching.
- speaker: Interviewer
  text: Can you describe your transition into teaching and graduate studies?
- speaker: Respondent
  text: I became an assistant professor of mineral engineering at the University of Washington from 1951 to 1953. Then I pursued
    graduate studies at MIT from 1953 to 1957, earning my Sc.D. There, I learned the procedure of research and deepened my
    knowledge in mineral processing.
- speaker: Interviewer
  text: What kind of research did you do at Kennecott Copper Corporation?
- speaker: Respondent
  text: I worked in the research laboratory in Salt Lake City, serving five divisions. My research included work on chrome,
    manganese, columbium/niobium, and tin. I also had adventures in Guyana and worked on appropriate technology in Thailand.
    I was involved in designing a dry plant for final concentration and explored natural zeolites.
- speaker: Interviewer
  text: How did your career develop at Pennsylvania State University?
- speaker: Respondent
  text: I headed a department and broadened research activities. I recruited faculty from around the world and focused on
    environmental pollution control, which was a new concern at the time. I taught mineral processing from 1968 to 1998, emphasizing
    problem discipline and hands-on laboratory work, especially flotation.
- speaker: Interviewer
  text: What were some of the key research projects you worked on?
- speaker: Respondent
  text: I worked on coal flotation to separate out pyrite, quantification of hydrophobicity, and oxidation. I researched zeolites
    for beneficiation and ion exchange properties, developed methods to increase oil recovery from shale, and found ways to
    neutralize acid mine drainage. I also worked on improving gravity concentration and flotation of copper ores.
- speaker: Interviewer
  text: Can you tell me about your involvement with professional organizations and awards?
- speaker: Respondent
  text: I was active in the Engineering Foundation, the National Academy of Engineering, and the American Institute of Mining,
    Metallurgical, and Petroleum Engineers. I received several professional awards and was involved in mining history, photography,
    narrow-gauge railroads, and music as avocations.
