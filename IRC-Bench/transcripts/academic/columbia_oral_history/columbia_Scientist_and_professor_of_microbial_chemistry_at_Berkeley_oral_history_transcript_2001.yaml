source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early education and how you became interested in biochemistry?
- speaker: Respondent
  text: I started at Stanford University in 1926, initially interested in botany, but I soon became fascinated by chemistry.
    I completed my Ph.D. in chemistry there in 1933. During that time, I worked as a research assistant and developed a strong
    foundation in the biochemical sciences.
- speaker: Interviewer
  text: What influenced your decision to work with Cornelius van Niel at the Hopkins Marine Station?
- speaker: Respondent
  text: Van Niel was a remarkable scientist and teacher. I was drawn to his approach to microbiology and biochemistry, especially
    his work on photosynthetic bacteria. Working with him at Hopkins Marine Station from 1931 to 1935 was a formative experience
    that shaped my research direction.
- speaker: Interviewer
  text: How did your Rockefeller Foundation fellowship in Delft contribute to your research?
- speaker: Respondent
  text: The fellowship allowed me to work at the Microbiology Laboratory in Delft, where I studied methane-producing bacteria
    and learned enrichment culture techniques. This experience broadened my understanding of microbial metabolism and experimental
    methods.
- speaker: Interviewer
  text: What was your role when you joined the University of California in 1936?
- speaker: Respondent
  text: I became an instructor in soil microbiology at the Agriculture Experiment Station. My work involved studying soil
    bacteria and their biochemical processes, which laid the groundwork for my later research in microbial biochemistry.
- speaker: Interviewer
  text: Can you describe your research involving radioactive tracers?
- speaker: Respondent
  text: Yes, in the 1940s, we began using radioactive carbon-14 tracers to study enzymatic synthesis of sucrose in living
    cells. This was one of the earliest applications of radioactive tracers in biochemistry, and it provided valuable insights
    into metabolic pathways.
- speaker: Interviewer
  text: What was the significance of your work on vitamin B12?
- speaker: Respondent
  text: In 1959, my team discovered the vitamin B12 coenzyme, the active form of vitamin B12 involved in vital chemical conversions
    in the body. Mapping out its metabolic reactions helped clarify its role in building body tissue and contributed to understanding
    diseases like pernicious anemia caused by B12 deficiency.
- speaker: Interviewer
  text: How did your research impact the field of biochemistry and medicine?
- speaker: Respondent
  text: Our work on vitamin B12 and microbial metabolism helped build a foundation for much of what is known today about metabolism
    and its role in health and disease. It also influenced the development of treatments for certain metabolic disorders.
- speaker: Interviewer
  text: What was your experience like collaborating with other scientists such as Sam Ruben and Martin Kamen?
- speaker: Respondent
  text: Collaborating with Sam Ruben and Martin Kamen was very productive. They were pioneers in the use of radioactive tracers,
    and working together allowed us to advance our research significantly, especially in tracing biochemical pathways.
- speaker: Interviewer
  text: Can you tell me about your teaching and mentoring at Berkeley?
- speaker: Respondent
  text: I taught courses in soil microbiology and biochemistry, emphasizing a comparative approach inspired by van Niel. I
    enjoyed mentoring students and fostering their interest in microbial biochemistry and metabolism.
- speaker: Interviewer
  text: What do you consider your most important scientific contribution?
- speaker: Respondent
  text: Discovering the vitamin B12 coenzyme and elucidating its role in metabolism stands out. It was a breakthrough that
    connected microbial biochemistry with human health and disease.
