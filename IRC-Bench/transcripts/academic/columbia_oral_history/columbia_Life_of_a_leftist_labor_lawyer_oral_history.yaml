collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: What can you tell me about your early life and background?
- speaker: Respondent
  text: I was born and raised in the Bronx, New York, under circumstances only a notch above genteel poverty. My parents were
    Jewish immigrants from Poland who met and married while employed in the garment industry in New York. They were politically
    conservative; my father voted Republican because he wanted to be 'a good American,' and my mother was more or less apolitical.
    My father's lifetime occupation was primarily that of a garment cutter, but he also tried his hand in business, operating
    a small 'mom and pop' store without success.
- speaker: Interviewer
  text: How did your family end up in Los Angeles?
- speaker: Respondent
  text: A prolonged strike in the New York garment industry caused my father to go to Los Angeles seeking work, and the family
    emigrated to that city in 1929. So I, a product of the Bronx schools, became a college student at UCLA.
- speaker: Interviewer
  text: What was your experience like at UCLA?
- speaker: Respondent
  text: Bingo! A new and utterly different way of life opened up before the astonished brain of this 19-year-old New Yorker.
    The Great Depression was beginning, and there was a new intellectual atmosphere around places like college. I picked Political
    Science for my major, already with the idea in mind of becoming a lawyer, with Philosophy as my minor. Some of my professors
    were lively souls who would take the side of the underdog at every opportunity, be the subject anti-ROTC or unemployment
    or that bright New Deal idea, Social Security.
- speaker: Interviewer
  text: Did you get involved in any clubs or groups during college?
- speaker: Respondent
  text: Yes, I became a member of the Social Problems Club, which was barred on campus but welcome across the street at the
    YWCA. I met all kinds of people, many of whom grew prominent in California Leftism, including Aubrey Grossman, who later
    was to become one of my first employers and still later one of my clients.
- speaker: Interviewer
  text: How did your political views develop during this time?
- speaker: Respondent
  text: By the time I graduated from UCLA, the tone of my life was already firmly set. I was a Leftist and was determined
    to become a lawyer.
- speaker: Interviewer
  text: What did you do after graduating from UCLA?
- speaker: Respondent
  text: I got a scholarship in graduate school at Columbia University, first studying international law—the Spanish civil
    war was the hot issue of the late Thirties—and then shifting to a regular law course. In college, I earned almost all
    of my living expenses with side jobs, first of the menial variety; in graduate school, I did research for the author of
    a legal-political essay—things like that. I also met and was influenced by other Leftists, people like Carol King, the
    famous immigration lawyer.
