source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early interest in microbial genetics?
- speaker: Respondent
  text: Yes, I became interested in microbial genetics during my graduate studies. It was a fascinating field because it combined
    genetics with microbiology, allowing us to understand the fundamental processes of life at a molecular level.
- speaker: Interviewer
  text: What led you to focus on recombinant DNA research?
- speaker: Respondent
  text: My postdoctoral work at Yale exposed me to bacterial plasmids and gene mapping, which sparked my interest in DNA recombination.
    The potential to manipulate DNA opened up new avenues for research and applications.
- speaker: Interviewer
  text: How did your collaboration with Stanley Cohen begin?
- speaker: Respondent
  text: We met at a plasmid meeting in Hawaii in 1972. Our complementary expertise led us to collaborate on experiments involving
    prokaryotic and eukaryotic DNA, which eventually resulted in significant breakthroughs in recombinant DNA technology.
- speaker: Interviewer
  text: What were some of the challenges you faced regarding biohazards?
- speaker: Respondent
  text: There was considerable concern about the safety of recombinant DNA research. We had to address potential biohazards
    seriously, which led to the establishment of NIH guidelines and the Asilomar Conference in 1975 to discuss safe practices.
- speaker: Interviewer
  text: Can you describe the formation of Genentech and its early goals?
- speaker: Respondent
  text: Genentech was formed in 1976 to commercialize recombinant DNA technology. Our early goals were to demonstrate the
    technology's potential by producing somatostatin and later human insulin, recruiting talented scientists, and establishing
    joint ventures with pharmaceutical companies.
- speaker: Interviewer
  text: How did your academic work at UCSF relate to your involvement with Genentech?
- speaker: Respondent
  text: While I was involved in founding Genentech, I decided not to participate directly in its research to avoid conflicts
    of interest. However, my academic work laid the foundation for the company's scientific direction.
- speaker: Interviewer
  text: What impact did recombinant DNA technology have on the scientific community?
- speaker: Respondent
  text: It revolutionized molecular biology by enabling precise manipulation of genetic material. This led to rapid diffusion
    of the technology, new research tools, and the birth of the biotechnology industry.
- speaker: Interviewer
  text: How did you approach safety and ethical concerns in your research?
- speaker: Respondent
  text: We took safety very seriously, establishing biosafety committees and adhering to strict guidelines. Ethical considerations
    were also paramount, especially given the public interest and potential risks involved.
- speaker: Interviewer
  text: Looking back, how do you assess your contributions to science and biotechnology?
- speaker: Respondent
  text: I believe my work helped establish recombinant DNA technology as a fundamental tool in biology and medicine. The collaboration
    with Cohen and the founding of Genentech were pivotal moments that bridged academic research and commercial application.
