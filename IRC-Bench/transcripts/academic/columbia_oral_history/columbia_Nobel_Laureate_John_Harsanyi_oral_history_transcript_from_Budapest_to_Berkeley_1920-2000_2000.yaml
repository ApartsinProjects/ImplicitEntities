collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and education in Budapest?
- speaker: Respondent
  text: I was born in Budapest in 1920. My parents were Jewish but converted to Catholicism before I was born, so I was raised
    as a Catholic. My main interests were in mathematics and philosophy. However, due to the political uncertainty of the
    time, I earned a degree in pharmacology so that I could work in my father's pharmacy.
- speaker: Interviewer
  text: What was your experience during World War II?
- speaker: Respondent
  text: During World War II, I was drafted into a forced-labor unit after Germany occupied Hungary. Near the end of the war,
    while waiting at a crowded railway station to be deported to a mine, I removed my sweater with its yellow star and walked
    away. A guard stopped me and asked what I was doing there. I told him I was there to visit one of my Jewish friends who
    was going to be deported, saying it was important to stand by our friends in their time of need. The guard let me go.
    Of the workers in the forced-labor unit, only I and three others who jumped from the train survived.
- speaker: Interviewer
  text: What did you do after the war?
- speaker: Respondent
  text: After the war, I remained in Hungary and earned a doctorate in philosophy from the University of Budapest. I was an
    assistant professor of sociology at the university until the late 1940s, when my views clashed with those of the Communist
    government. I quit my job and returned to work in my father's pharmacy.
- speaker: Interviewer
  text: How did you come to leave Hungary?
- speaker: Respondent
  text: In 1950, I escaped over the border to Austria with my future wife, Anne, and then traveled to Australia. I married
    Anne three days after arriving in Sydney.
- speaker: Interviewer
  text: What was your academic path in Australia?
- speaker: Respondent
  text: I went to the University of Sydney at night to earn a master's degree in economics and became a lecturer in economics
    at the University of Queensland in Brisbane in 1954. However, I felt I could not be effective in my field from Australia.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: In 1956, I enrolled in the Ph.D. program in economics at Stanford University and studied under Kenneth Arrow, a future
    Nobel winner in economics. I then returned to Australia to teach economics at the Australian National University from
    1958 to 1961.
- speaker: Interviewer
  text: How did your career progress after returning to the United States?
- speaker: Respondent
  text: I taught at Wayne State University in Detroit from 1961 to 1963. In 1964, I went to the Haas School at Berkeley as
    a visiting professor and became a full professor in 1965. I was appointed a professor in the Berkeley economics department
    in 1966.
- speaker: Interviewer
  text: Can you tell me about your contributions to game theory?
- speaker: Respondent
  text: Before I developed my procedure for dealing with game theory players with incomplete information, I was asked in 1964
    to be one of ten game theorists to advise the United States Arms Control and Disarmament Agency on negotiations with the
    Soviet Union. The ten advisers said they could not help because both players had too little information about the other
    side. I made the theory work when rivals did not know much at all about what the other planned to do by assigning probabilities
    to the possible moves of the players and the outcomes.
- speaker: Interviewer
  text: What impact did your work have on economic theory?
- speaker: Respondent
  text: My work allowed people to think systematically about markets in which there were a small number of players who had
    access to different information. For a large set of circumstances, game theory is the way people think today. My work
    was instrumental in making economic theory fit the imperfect world in which we live.
