collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early childhood in Berlin and your family's move to Los Angeles?
- speaker: Respondent
  text: I was born in Berlin in the early 1930s. My family moved to Los Angeles in 1938 to escape the growing dangers in Germany
    under Hitler's regime.
- speaker: Interviewer
  text: What was your experience like during World War II?
- speaker: Respondent
  text: During the war, I was involved in intelligence work. I trained at Camp Ritchie and was assigned to various locations
    in Europe including Britain, Paris, Belgium, Luxembourg, Germany, and Scotland.
- speaker: Interviewer
  text: How did your education progress after the war?
- speaker: Respondent
  text: I attended the University of Southern California and then Harvard Law School. At Harvard, I was involved with the
    Law Review and had the opportunity to learn from many distinguished professors.
- speaker: Interviewer
  text: What was your experience like working as a trial lawyer?
- speaker: Respondent
  text: I joined McCutchen, Doyle, Brown & Enersen in 1952 and worked there until 1976. I handled antitrust litigation and
    worked on cases involving companies like Shell Oil, Greyhound Corporation, and Lucky Lager Brewing Company.
- speaker: Interviewer
  text: How did you become a federal district judge?
- speaker: Respondent
  text: I was appointed as a federal district judge in 1976. It was a significant transition from practicing law to serving
    on the bench.
- speaker: Interviewer
  text: What were some of your early experiences as a judge?
- speaker: Respondent
  text: My first cases included a bank robbery case. I focused on improving jury instructions and managing the court's docket
    efficiently.
- speaker: Interviewer
  text: Can you discuss your role as Director of the Federal Judicial Center?
- speaker: Respondent
  text: I served as Director from 1990 to 1995. The Center focuses on judicial education and research. We worked on improving
    facilities and personnel management during my tenure.
- speaker: Interviewer
  text: What are your thoughts on the role of expert witnesses in the courtroom?
- speaker: Respondent
  text: Expert witnesses play a crucial role, but their testimony must be carefully scrutinized to ensure it is reliable and
    relevant to the case.
- speaker: Interviewer
  text: How do you view the changes in the federal judiciary over your career?
- speaker: Respondent
  text: There have been many changes, including increased case management techniques, the rise of alternative dispute resolution,
    and evolving approaches to complex litigation.
- speaker: Interviewer
  text: What advice would you give to new judges or lawyers?
- speaker: Respondent
  text: Focus on fairness, efficiency, and clarity in the administration of justice. Always remember the mandate to secure
    the just, speedy, and inexpensive determination of every action.
