collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early interest in science and engineering?
- speaker: Respondent
  text: I was interested in electrical, mechanical, and astronomical things from childhood. I enjoyed radio engineering and
    was always tinkering with things.
- speaker: Interviewer
  text: What was your educational background like?
- speaker: Respondent
  text: I earned bachelor's and graduate degrees in physics from the University of Toronto. During the war, my studies were
    interrupted, but I continued afterward and completed my Ph.D. in atomic physics.
- speaker: Interviewer
  text: How did you come to work with Charles Townes?
- speaker: Respondent
  text: I met Charles Townes while on a postdoctoral fellowship at Columbia University. We collaborated on microwave spectroscopy
    and later on the development of the laser.
- speaker: Interviewer
  text: What was the atmosphere like at Bell Labs when you were working on the laser?
- speaker: Respondent
  text: Bell Labs was a very stimulating place with a lot of pressure but also great resources. We worked hard on superconductivity
    and then on the optical maser, which became the laser.
- speaker: Interviewer
  text: Can you describe the moment when the laser was first demonstrated?
- speaker: Respondent
  text: It was an exciting time. Ted Maiman built the first working ruby laser, and we published our results shortly after.
    It was a breakthrough that opened many new possibilities.
- speaker: Interviewer
  text: What motivated you to move to Stanford University?
- speaker: Respondent
  text: I wanted to focus more on research and teaching. Stanford offered a great environment for both, and I was able to
    build a research group in laser spectroscopy.
- speaker: Interviewer
  text: How did you approach teaching and mentoring students?
- speaker: Respondent
  text: I enjoyed teaching and tried to motivate students by showing them the excitement of discovery. I believed in telling
    stories and making science accessible.
- speaker: Interviewer
  text: What are some of the ethical considerations you faced in your research?
- speaker: Respondent
  text: I was always aware of the implications of funding and military involvement. I believed in using science for peaceful
    and beneficial purposes.
- speaker: Interviewer
  text: Can you share a memorable anecdote from your time demonstrating lasers?
- speaker: Respondent
  text: I used to demonstrate the laser's pinpoint selectivity by shooting a 'ray gun' laser through a transparent balloon
    to pop a dark Mickey Mouse balloon inside without damaging the outer one. It was a fun way to show how precise lasers
    can be.
- speaker: Interviewer
  text: How did winning the Nobel Prize affect your career?
- speaker: Respondent
  text: It was a great honor and brought recognition to our work. It also helped in securing funding and support for further
    research.
- speaker: Interviewer
  text: What advice would you give to young researchers today?
- speaker: Respondent
  text: You don't need to know everything, just one thing that isn't known. Focus on that and pursue it with passion.
