source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early interest in physics and how you came to study it?
- speaker: Respondent
  text: Well, I was always interested in science and mathematics from a young age. During my schooling, I found physics particularly
    fascinating because it explained the fundamental principles of how the world works. This led me to pursue physics at Harvard,
    where I studied from 1932 to 1936.
- speaker: Interviewer
  text: What was your experience like studying physics at Harvard during that time?
- speaker: Respondent
  text: It was a very stimulating environment. I had excellent teachers and was involved in lab work, including proton diffraction
    experiments. The education was rigorous, and it really helped me develop a strong foundation in both theoretical and experimental
    physics.
- speaker: Interviewer
  text: After Harvard, you went to Cambridge on a Henry Fellowship. What was that experience like?
- speaker: Respondent
  text: Yes, I spent a year at Cambridge in 1936-1937. It was an incredible opportunity to work at the Cavendish Laboratory
    with some of the leading physicists of the time, like Marcus Oliphant and Chadwick. The environment was very collaborative,
    and I gained a lot of insight into nuclear physics and experimental techniques.
- speaker: Interviewer
  text: How did your move to Berkeley come about, and what were your early impressions of the Radiation Laboratory and Ernest
    Lawrence?
- speaker: Respondent
  text: I moved to Berkeley in 1937 to begin graduate studies. The Radiation Laboratory was a very dynamic place, led by Ernest
    Lawrence, who was a remarkable scientist and leader. His enthusiasm and vision for building large cyclotrons to explore
    nuclear physics were inspiring. The lab was very innovative and had a strong sense of purpose.
- speaker: Interviewer
  text: Can you describe your work as a graduate student at Berkeley?
- speaker: Respondent
  text: I worked on the beta-ray spectrograph and was involved in isotope production using the 60-inch cyclotron. It was exciting
    to be part of cutting-edge research, and I learned a great deal about experimental methods and instrumentation.
- speaker: Interviewer
  text: What was the atmosphere like at Berkeley compared to Cambridge?
- speaker: Respondent
  text: Berkeley was more focused on large-scale experimental apparatus and had a more practical, engineering-oriented approach,
    whereas Cambridge was more traditional and theoretical. Both had their strengths, but Berkeley was very much about pushing
    the boundaries with new technology.
- speaker: Interviewer
  text: How did World War II affect your work and the lab?
- speaker: Respondent
  text: The war brought many changes. Research shifted towards projects with military applications, including electromagnetic
    separation of isotopes for the Manhattan Project. We also worked on building the 184-inch cyclotron. There was a strong
    sense of urgency and collaboration, but also moral questions about the use of atomic weapons.
- speaker: Interviewer
  text: Did you have any personal reflections on the moral implications of the bomb?
- speaker: Respondent
  text: Yes, it was a difficult issue. Many of us struggled with the consequences of our work. I had religious views that
    influenced my thinking, and I believed in the importance of considering the ethical dimensions of scientific research.
- speaker: Interviewer
  text: After the war, how did the lab and your research change?
- speaker: Respondent
  text: Postwar, there was a transition back to fundamental research, but with new accelerators like the electron synchrotron.
    The lab expanded, and we formed research groups to explore various aspects of high energy physics. It was a period of
    growth and reorganization.
- speaker: Interviewer
  text: You served as chairman of the Department of Physics from 1955 to 1962. What were some challenges you faced?
- speaker: Respondent
  text: One major challenge was faculty hiring and retention, especially balancing the needs of different subfields. We also
    dealt with the loyalty oath controversy and adapting to new technologies like computers. Managing the department's growth
    while maintaining high standards was a constant task.
- speaker: Interviewer
  text: How did the loyalty oath controversy impact the department?
- speaker: Respondent
  text: It was a tense time. Some faculty members were opposed to the oath on principle, and it caused divisions. The department
    had to navigate these issues carefully to maintain unity and uphold academic freedom.
- speaker: Interviewer
  text: Can you tell me about the undergraduate curriculum and any changes during your tenure?
- speaker: Respondent
  text: We worked on revising the Berkeley Physics Course to keep it current and effective. We also developed upper division
    courses and honors programs to provide more opportunities for students. There were changes in the academic calendar as
    well, including a switch to the quarter system and then back.
- speaker: Interviewer
  text: What about graduate education and support for students?
- speaker: Respondent
  text: We focused on admission criteria, financial support, and examinations to ensure quality training. There was concern
    about the time it took students to complete their Ph.D.s, so we looked at ways to improve efficiency. We also began to
    address issues of diversity, including women and minorities in the department.
- speaker: Interviewer
  text: How did faculty governance and social life evolve during your career?
- speaker: Respondent
  text: Faculty governance remained important, with committees like the Committee on Committees and University Welfare playing
    key roles. Socially, clubs like the Faculty Club and Section Clubs provided venues for interaction. These helped build
    community and support among faculty.
- speaker: Interviewer
  text: What was your involvement with the Academic Senate and its activities?
- speaker: Respondent
  text: I served on several committees, including those on academic freedom and educational policy. The Senate was crucial
    in representing faculty interests and maintaining governance traditions. We also dealt with controversies like the Free
    Speech Movement and ethnic studies programs.
- speaker: Interviewer
  text: How did the Free Speech Movement affect faculty and the university?
- speaker: Respondent
  text: It was a turbulent period. Faculty leadership was tested, and there were debates about academic freedom and the role
    of the university. The movement brought attention to important issues but also created tensions that had to be managed
    carefully.
- speaker: Interviewer
  text: Finally, can you share your thoughts on retirement activities and emeriti affairs?
- speaker: Respondent
  text: After retirement, I remained active in emeriti associations and committees focused on faculty welfare. We worked on
    issues like mandatory retirement age and confidentiality of personnel records. Staying engaged helped maintain connections
    and contribute to the university community.
