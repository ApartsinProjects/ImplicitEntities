collection: columbia_oral_history
source_url: https://archive.org/search?query=columbia+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your family background and early education?
- speaker: Respondent
  text: I came from a financially poor family in Modesto, California, but originally from the remote western mountains of
    Colorado. I began studies at the University of California, Berkeley, during the early days of the Great Depression. However,
    due to financial difficulties, I had to return home and attend Modesto Junior College.
- speaker: Interviewer
  text: How did you manage to return to Berkeley after attending Modesto Junior College?
- speaker: Respondent
  text: Unbeknownst to me, several of my teachers took up a collection and financed a scholarship to send me back to Berkeley.
    That support allowed me to continue my education there.
- speaker: Interviewer
  text: What were some of your achievements during your time at Berkeley?
- speaker: Respondent
  text: I graduated in 1937 with the University Medal, which is the campus's highest student honor, awarded to the top graduating
    senior at the University.
- speaker: Interviewer
  text: Can you describe your early professional career after graduation?
- speaker: Respondent
  text: My first professional position was with the General Electric Company. There, I displayed a knack for identifying new
    and critically important fields, developing innovative solutions, and making significant professional contributions. This
    pattern continued throughout my career.
- speaker: Interviewer
  text: What were some of your research contributions at General Electric?
- speaker: Respondent
  text: I worked on microwave components, traveling-wave and backward-wave electron tubes, quantum electron devices, and integrated
    optics. My early work led to advances in understanding and operating microwave circuits and triodes, as well as traveling-wave
    tubes, which are still used today in communication satellites.
- speaker: Interviewer
  text: Did you collaborate with anyone notable during your time at General Electric?
- speaker: Respondent
  text: Yes, I collaborated with Simon Ramo in developing the pioneering textbook on microwaves. Several editions later, Fields
    and Waves in Communication Electronics remains a classic.
- speaker: Interviewer
  text: When did you join the faculty at Berkeley, and what was your role there?
- speaker: Respondent
  text: I joined the faculty in electrical engineering at Berkeley in 1946. Over the years, I held various positions, including
    University Professor Emeritus, the first engineer ever appointed to this special status at all nine University of California
    campuses.
- speaker: Interviewer
  text: Can you tell me about your research and teaching focus at Berkeley?
- speaker: Respondent
  text: My research included advances in microwave circuits, electron tubes, high-frequency electrical noise in electronic
    devices, lasers, fundamental quantum electronics, and producing very short pulses to study fast processes in materials
    and chemistry. I also guided graduate students and developed group research with other professors.
- speaker: Interviewer
  text: What honors and awards have you received throughout your career?
- speaker: Respondent
  text: I have been honored with more than twenty major awards, including the National Medal of Science presented by the White
    House in 1992, the Founder's Award of the National Academy of Engineering, the Medal of Honor of the IEEE, and the Lamme
    Medal of the American Society for Engineering Education.
- speaker: Interviewer
  text: Have you been involved in any advisory or governmental committees?
- speaker: Respondent
  text: Yes, I served on numerous advisory groups, including the Department of Defense's Advisory Group on Electronic Devices,
    NASA's Science and Technology Advisory Committee for the Apollo Program, the National Science Foundation Committee on
    Research Applied to National Needs, and others.
