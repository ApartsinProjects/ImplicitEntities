collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name.
- speaker: Respondent
  text: My name is Toyokichi Oka.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Wakayama City.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on April 26, 1894 (Meiji 27).
- speaker: Interviewer
  text: What was your father doing?
- speaker: Respondent
  text: In Japan he was a farmer, and in America he was growing strawberries and grapes in Florin.
- speaker: Interviewer
  text: When did your father come to America?
- speaker: Respondent
  text: He came to America in 1900 (Meiji 33).
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was 16 years old.
- speaker: Interviewer
  text: Did you come here with your father?
- speaker: Respondent
  text: No, I didn't. I came here in 1910.
- speaker: Interviewer
  text: So your father came here alone.
- speaker: Respondent
  text: Yes, he did. And I came here alone, too, called by him.
- speaker: Interviewer
  text: Then, you had been brought up by your mother until you were 16 years old.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had one brother and two sisters. My older brother, who had been in Los Angeles, died this year.
- speaker: Interviewer
  text: Is that right. When you were in Japan, were your grandparents living?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Was your mother working?
- speaker: Respondent
  text: Yes, she was working on the farm which belonged to our family.
- speaker: Interviewer
  text: What was the religion of your parents?
- speaker: Respondent
  text: It was Tenri-Kyo.
- speaker: Interviewer
  text: Tenri-Kyo? Oh, that's rare, isn't it? Were your grandparents living with you together in your house?
- speaker: Respondent
  text: No, they were not. They were living near my house, though.
- speaker: Interviewer
  text: Who was the educator of you when you were young?
- speaker: Respondent
  text: It was my mother.
- speaker: Interviewer
  text: Did you learn a lot of things from your mother?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What do you remember?
- speaker: Respondent
  text: Being a Tenri-Kyo believer, every morning and evening she went outside, looked up to the heaven and prayed to the
    God of Heaven, "May the children grow up upright and honest. May my husband in America live safe without an accident."
    This is what I can't forget. She prayed loud. And this is one of the reasons why I became a Christian. She let me know
    that God exists.
- speaker: Interviewer
  text: Do you remember any happy events happened to you when you were young?
- speaker: Respondent
  text: A happy memory was that I used to swim all day long when it was summer or a warm day since I liked swimming very much.
- speaker: Interviewer
  text: How about going fishing?
- speaker: Respondent
  text: I didn't go fishing. I played tennis, too, and I was a champion. Swimming and tennis were my sports.
- speaker: Interviewer
  text: Do you have any sad memory? or was there any experience that you got in trouble?
- speaker: Respondent
  text: Being in trouble? I didn't experience any particular trouble as such.
- speaker: Interviewer
  text: Have you felt lonesome?
- speaker: Respondent
  text: I had an elder brother with whom I used to play together. He had left for America three years before I did, so I felt
    lonesome then having lost a playmate since the rest were two sisters. I was rather a quiet child, therefore I didn't have
    so many friends to play with, of course I had some good friends.
- speaker: Interviewer
  text: What did you do when you played with friends?
- speaker: Respondent
  text: We did swimming or played tennis since we were 13 years old or so, but before that, when I was really young, I don't
    remember what I used to play. I have attended a swimming school for 8 years. There was the swimming school at the Kino
    Kawa River which was close to my house. In the summer time, this school used to have about 1,000 students. I learned various
    techniques of swimming there, and used to play by myself or with my friends in the water like a Kappa (a water imp).
- speaker: Interviewer
  text: How far did you go to school?
- speaker: Respondent
  text: In Japan? I went to school for 8 years in Japan. In our days, they were called Jinjoh 4 years school and Kotoh 4 year
    school (an advanced school). Before coming to America, I had been attending a private school of the English language.
    I came to America when I was almost 17 years old -- I was in the end of 16-year-old in Kazoye Doshi (a Japanese way of
    counting one's age which comes to one year more than the Western way). That is, I was almost 16 years old when I came
    to America.
- speaker: Interviewer
  text: Do you remember about the teachers of the schools?
- speaker: Respondent
  text: There was one thing that I can't forget -- which a history teacher said. He had returned from America, and was a Christian,
    though I hadn't known it then. He was 23 years old then. He said, "Japanese ancestors came from Judea." "Amaterasu Ohmikami
    who came before Jimmu Tennoh Emperor (the first Emperor of Japan) came from Judea and the words such as 'Yakkorasa' are
    from Judea." "The Japanese clothes also came from Judea. Our long Kimono and Obi, too." I think it was quite a bold thing
    for those days.
- speaker: Interviewer
  text: Was he a Japanese history teacher?
- speaker: Respondent
  text: Yes, he was. He said, "Amaterasu Ohmikami came to Japan from Judea. He flew over Okinawa so the natives in Japan interpreted
    him as a wing from the heaven. So did the Jimmu Tennoh Emperor." "The elder brother of Jimmu Tennoh Emperor passed away,
    and was enshrined in the Kampei Taisha Shrine in Japan. There are 7 Kampei Taisha Shrines in Japan. He conquered the natives
    called Kumaso who were doing bad things. Thus the Japanese people have a strain of Judea's blood in their veins." He said,
    "Of course there are so many bloods mixed in us, but the origin was Judea's blood." It was quite a bold speech for the
    time, so I can't forget.
- speaker: Interviewer
  text: Was it a town or a village where you grew up?
- speaker: Respondent
  text: It was a village in the suburbs of the city. There was a river named Kino Kawa, and my village was just next to a
    bridge of the river. It is now a Cho (a town), and called Kitajima-Cho of Wakayama City.
- speaker: Interviewer
  text: Do you remember anything happened in the village?
- speaker: Respondent
  text: I don't remember any particular happening in the village.
- speaker: Interviewer
  text: Do you remember about a war?
- speaker: Respondent
  text: About the World War I? Yes, I do. It was very impressive to me. At that time, I was in Vacaville. Everybody broke
    down from the flu one after another, and they were short of helpers. I was selected by the Mii Kyokai (Methodist Church)
    in Vacaville to go to help the sick people. First they had been put in a big tent, but it became so cold that a church
    of white people was selected to be a temporary hospital. And I went to this hospital to help them. But I caught the flu
    having a temperature of 105° F, and was hospitalized there, where I realized for the first time in my life how hell looked
    like. It was a horrible place with people crying and shouting. By then I had already had a belief in Christianity. I opened
    the Bible and stayed calm unable to fall asleep with the fever of 105° F and the people's noises. This was the time when
    I faced my death. Already 15 people had passed away, and the people at the church were saying that I would be the 16th
    to die. I had a very painful time then, but I didn't cry or shout and stayed calm. So a nurse said, "This person has a
    Holy Spirit over him." On November 11, the day the War ended, a bell was tolled. A nurse said to me whose temperature
    suddenly went down from 105°F to normal, "The fever is gone, so you can go home now. Moreover, we have no more war." I
    can't forget how I was happy at that time. Anyway the World War was over. Then I went to church, since I couldn't walk,
    I crawled. All my hair fell out of my head because of the fever I had. So you can imagine how bad I was. I think I was
    lucky enough to survive. Facing death, I deeply thought about the problem what I had to do if I were dying. Every detail
    of my past was flashed back like a movie film; what I was doing, or what I did and so on. And I was worried thinking that
    I had not done anything good at all although I had not done anything bad, either. I prayed, "God, please let me stay here
    on earth for a little longer. I, at present, am not worth coming up to your side. And I will do my best for people." The
    next day, suddenly, my fever was gone. I thought this was God's deed, and I would not forget it even today.
- speaker: Interviewer
  text: You mentioned that what you had experienced were flashed back like a film, do you remember the things flashed back?
- speaker: Respondent
  text: They were what I gave trouble to people, what I couldn't be kind to the others, what I spoke ill of people, and other
    various things of my past. The first came the deeds what I had done without faith, the second came what I had done without
    love, that is, although I hadn't caused trouble to people, I hadn't positively made efforts for them. I can't tell you
    all now, but various experiences of my past were flashed back to me. Even the things I hadn't been able to recall before
    came up to my memory then. That's why I think that we have to have not only faith but also love. Having faith only will
    not do.
- speaker: Interviewer
  text: When you were in Japan, did the Russo-Japanese War break out?
- speaker: Respondent
  text: Yes, I have experienced the war. When the war was over, the whole village was buzzing with the news. I was only 10
    years old or so, and walked around the village carried on my mother's back with a Japanese flag. People were saying, "Japan
    won the war! Japan did. And Russia lost."
- speaker: Interviewer
  text: I don't remember about the Sino-Japanese War.
- speaker: Interviewer
  text: Were there a lot of people killed in the war?
- speaker: Respondent
  text: I don't remember. I think a lot of people were killed, but I was too young to remember, being 10 years old or so.
- speaker: Interviewer
  text: Do you remember anything else about your childhood?
- speaker: Respondent
  text: I was taken to Honzan (the Central Buddhist Temple) by my mother when I was at the age of 10 or so to listen to sermons
    by a priest who was from the Imperial family. This meeting was held for three days and three nights, and the place was
    full of people, who was saying with tears in their eyes, "Thank You! Thank You!" after the sermon. Although I didn't understand
    it, being too young, I thought that the sermon must have been very thankful and blessing. Then on the way back, when I
    was running on a bridge, I saw a lot of people who had attended the sermon meeting were drunk drinking and singing loud,
    forgetting the sermon. Seeing them, I thought, "Oh, religion is blessing itself. It's just like the time when..."
