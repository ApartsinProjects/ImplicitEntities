source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: If that is the case, it would be far better for you to talk with the real farmers for they are the ones who have the
    vast experiences of life. I have experienced very little and you will probably not benefit from talk with me.
- speaker: Respondent
  text: Yes, we have interviewed farmers and will continue to do so.
- speaker: Interviewer
  text: Please state your name.
- speaker: Respondent
  text: Kohana Sasaki.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Miyagi prefecture, in the town of Sendai.
- speaker: Interviewer
  text: What was your maiden name?
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: On Tagan 1st in the 31st year of Meiji.
- speaker: Interviewer
  text: What would that be in the Western calendar?
- speaker: Respondent
  text: That's 1898.
- speaker: Interviewer
  text: So you turned 89 this year?
- speaker: Respondent
  text: That's correct. I am 80 years old.
- speaker: Interviewer
  text: What type of family were you born into?
- speaker: Respondent
  text: I did not come from a very good family. My father was an ordinary government official. I was raised in Sendai.
- speaker: Interviewer
  text: Was your father a prefectural official?
- speaker: Interviewer
  text: What kind of work was he involved in?
- speaker: Respondent
  text: Predominately in the police department.
- speaker: Interviewer
  text: Was he a police officer?
- speaker: Respondent
  text: Yes, he was at one time.
- speaker: Interviewer
  text: Was your father a strict disciplinarian?
- speaker: Respondent
  text: Yes, he was very strict. For example, when we went to our father to receive money for school tuition, we had to kneel
    politely at his feet and bow reverently to him and say, 'I receive this (honorable) money.' The strongest impression I
    still have of him is the time he gave me his first advice upon my graduation from Ochanomizu school and I was just about
    to enter my teaching profession. He said to me, 'one, never forget on (obligation). You may forget the on which is given
    to you, but never forget the on which you accept. Two, now that you are to become a teacher, never mistake your teaching
    position - separate your personal life from your professional duty.' He gave me these two advices.
- speaker: Interviewer
  text: Please elaborate on the second advice.
- speaker: Respondent
  text: 'The second advice meant that I should not neglect my teaching - I taught high school students - to attend to my personal
    life. I should not, he said, take leave from my teaching just to attend to a personal matter. I must discriminate in my
    mind my work which is a public matter and my personal life. My father taught me these two important matters. During my
    school years when I returned home from Tokyo, my father insisted I pay my respects to my kindergarten teacher even before
    I changed my clothes or would send me to attend to some other business. I had to pay my respects, then, to my grammar
    school teachers, then to the Jogakko teachers. In those days, graduates of the Jogakko were allowed to attend a prefectural
    post-Jogakko to train to become grammar school teachers. I had to pay my respects to my teachers there as well. Finally
    at the end, I was allowed to return home and change my clothes. My father was a stern man. Here''s another example of
    my father''s sternness: his grandchildren came to visit him during the summer vacation. They would want to go swimming
    and would ask him for a ride to go swimming. These young children did not like to walk, but my father would say to them,
    ''why do you think you have feet?'' So these small children were made to walk to the beach. They would later say, ''I
    don''t want to go to Grandpa''s place.'' He was a stern disciplinarian who was not satisfied until everything was in order.'
- speaker: Interviewer
  text: Do you remember being scolded when you were young?
- speaker: Respondent
  text: I was scolded only once that I remember. I was babysitting my younger sister and she stuck her fingers into a stove.
    She burned herself and I was scolded for that incident. That was the only time. I don't remember ever being scolded since.
- speaker: Interviewer
  text: What was your mother like?
- speaker: Respondent
  text: My mother passed away when I was 10 years old.
- speaker: Interviewer
  text: Do you remember your mother?
- speaker: Respondent
  text: No, I really do not remember my mother. However, I do remember one time I went out to get medicine for her while she
    was ill. Also, I remember being anxious every time I came home because I was afraid I would see a scroll written 'Kichu'
    which means 'death has occurred in this house.' I would worry whether I would see this scroll on our front door or not.
    My mother was ill for some time so I do not remember her too well. However, she was a gentle lady with a beautiful voice.
    Her voice was very beautiful.
- speaker: Interviewer
  text: How many siblings do you have?
- speaker: Respondent
  text: I have 3 elder brothers, 2 elder sisters, and one younger brother and one younger sister. I have 7 brothers and sisters.
- speaker: Interviewer
  text: There were 8 children in your family?
- speaker: Respondent
  text: That's correct. We had a large family - many people did in those days.
- speaker: Interviewer
  text: Were you one of the younger children?
- speaker: Respondent
  text: Yes, I was the 3rd youngest.
- speaker: Interviewer
  text: What do you remember about your childhood?
- speaker: Respondent
  text: About my childhood? What would you like to know about my childhood?
- speaker: Interviewer
  text: Would you tell us about the time you were in kindergarten?
- speaker: Respondent
  text: Oh, I see. We had a white bear rug in our zashiki (living room) when I was little. When my father went out, my elder
    brother would wear the bear skin rug and put a lit match in his mouth. He would put the match in his mouth because this
    would make his mouth look large. He would frighten me like that. He would do that every time our father and mother went
    out. He'd always put the white bear skin rug and scare us.
- speaker: Interviewer
  text: Did you have good brothers?
- speaker: Respondent
  text: Yes, they all were. My sisters were very nice also. We all got along well together.
- speaker: Interviewer
  text: Did all your brothers and sisters go to school?
- speaker: Respondent
  text: Yes, we all completed our education. My brothers entered the engineering field. All three of my brothers were involved
    in engineering work.
- speaker: Interviewer
  text: Did they go to college?
- speaker: Respondent
  text: Well, yes, but this was in the old days so they did not go to a university per se, but received degrees from technological
    schools - they were called upper technical schools. That was the level of their education.
- speaker: Interviewer
  text: You graduated from Ochanomizu, so did that make you one of the more educated ones in your family? Well... how many
    years did you go to grammar school?
- speaker: Respondent
  text: 'I went for 8 years. In my generation, the educational system was a little different: jinjo (compulsory education)
    was 4 years, koto shogakko (upper grammar school) for 4 years, and koto san-nen (higher upper grammar school) for one
    year for those wanting to continue their education to enter normal schools. That''s 9 years all together. I then went
    on to Jogakko (girl''s high school). I went in as a 3rd year student, 3 years of schools was concentrated into 2 years.
    Therefore, I went to Jogakko for 2 years. Then I entered the higher normal school (Ni-bu).'
- speaker: Interviewer
  text: What is Ni-bu?
- speaker: Respondent
  text: Ni-bu course of study was for those who had graduated from Jogakko and were planning to teach in the grammar schools.
    Also, each prefecture had a prefectural normal school and one could enter these schools upon graduation from compulsory
    grammar school - that is, to have completed 4 years of school and then receive teaching training. There were two types
    of normal schools in my time.
- speaker: Interviewer
  text: You did go to Ochanomizu, right?
- speaker: Respondent
  text: Yes, that's correct.
- speaker: Interviewer
  text: When did you go to Ochanomizu? Was it later on?
- speaker: Respondent
  text: Yes. Attendance to Normal School required 2 years of obligatory service. I worked at a model school called Nona Kita
    Jinjo Koto Shogakko (Nana Kita Common Higher Grammar School) located about 2 Li north of Sendai. The school still exists
    to this day. I worked there for two years.
- speaker: Interviewer
  text: What was your major at the Ochanomizu school?
- speaker: Respondent
  text: I was a Home Economist.
- speaker: Interviewer
  text: Is that what you graduated as?
- speaker: Interviewer
  text: What was the above grammar school you just mentioned?
- speaker: Respondent
  text: A higher school.
- speaker: Interviewer
  text: What do you remember about your life at that time and around your grammar school years?
- speaker: Respondent
  text: Let's see. I remember Yonekura Sensei who was an excellent music teacher and he took a special liking to me. Then
    there was Ishihara Sensei who had a donut-shaped haircut, very close to his head. He played the organ and taught us the
    song, 'Nara no Miyako.' The Sensei's name was Kishi Ishihara. There is a phrase in the song, what was that... oh, yes,
    a phrase that goes, 'kishi no sakura!' or something similar to that. Our teacher's name was in the song so if we didn't
    sing it properly he would make us sing it over and over. I asked him why we had to make such a special effort to sing
    that song. He scolded me for that. I remember that. In grammar school we always had to go to school - no matter what the
    weather was like, raining, windy, in any kind of weather. When it rained hard, my elder brother carried me on his back
    to school. I could never be absent from school even if I had a headache. My father always made me go to school. If we
    didn't go, he would scold us. I went to school without an absence or tardiness for 8 years. I received an award from the
    prefecture for this. The award was a calligraphy box with a design of Sendai hagi with a moon peeping through it.
- speaker: Interviewer
  text: A Sendai hagi?
- speaker: Respondent
  text: A Sendai hagi is different from an ordinary hagi (bush clover). There is fur around the edges of the leaves. That's
    a Sendai hagi.
- speaker: Interviewer
  text: What did you do for fun while you were in grammar school or in junior high school?
- speaker: Respondent
  text: Well... there wasn't anything especially fun in grammar school? Well... What did you do for play? We're talking about
    the old days so there really weren't anything we did for fun. We played oterama, mari, oni-gokko. I would have a tangerine
    box decorated and play house with it. I'd get 10 match boxes and make drawers from it. I got my elder brother to write,
    'calligraphy notebook' on the box and I would put them in my doll box. The old tangerine boxes in my days were about this
    tall and this wide. Small. I put my belongings that I just mentioned and my dolls in it. That's about the extent of what
    I did for fun. We didn't have any special things to play with in the old days.
- speaker: Interviewer
  text: Did you have friends near your home?
- speaker: Respondent
  text: Yes, I did. I would have nohaga (nanny?) make me obento and my friends and I would go into the green fields and eat.
    I liked doing those things. This was so many years ago so I don't remember very well.
- speaker: Interviewer
  text: Did you have undo kai (track or physical education) meetings?
- speaker: Respondent
  text: Yes, we did. In the old days, all the grammar schools in Sendai met together and had an annual match at Miyagi no
    Hara. Miyagi no Hara is now an expensive housing area, but in my days Miyagi no Hara was famous for its beautiful hagi
    (bush clover) and it's been written about in the Manyoshu. When the suzumushi (type of cricket) starts to chirp the radios
    would broadcast their sound. Miyagi-no-hara was a beautiful and large green field. All the grammar school students of
    Sendai would gather here and have their annual physical education matches.
- speaker: Interviewer
  text: How many schools participated?
- speaker: Respondent
  text: There were many schools in Sendai so I don't remember the exact number of grammar schools in Sendai. Perhaps about
    15 schools.
- speaker: Interviewer
  text: How was your Koto school (higher grammar school) years? What do you remember of those years?
- speaker: Respondent
  text: I always studied in those days. We had a heater called a nkan. We put fire in the nkan and cover it with a futon (bedding
    or blanket) and take it to the room to study with. I don't remember doing much of anything but studying in those days.
    I rarely went to the movies. I went to the movies only when we had guests visiting us from the countryside. I do not have
    any particular memories of that period.
- speaker: Interviewer
  text: What is an nkan?
- speaker: Respondent
  text: It's a heater. It's about this big with a frame. We put fire inside it. There's a hole on the top and a latch in the
    front. We put futon on it and we got warm by it while we studied.
- speaker: Interviewer
  text: Is it like a small kotatsu (Japanese style heater)?
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: You must have done well in school.
- speaker: Respondent
  text: No, it didn't.
- speaker: Interviewer
  text: Where did you go after junior high school? Did you go to the normal school?
- speaker: Respondent
  text: Yes, I went to the Ni-bu of the normal school.
- speaker: Interviewer
  text: How many years did you go to Ni-bu?
- speaker: Respondent
  text: I went for one year.
- speaker: Interviewer
  text: Was this located in the same area?
- speaker: Respondent
  text: Yes, in Hachiman district of Sendai.
- speaker: Interviewer
  text: Was it fun there?
- speaker: Respondent
  text: Well... We had to live in a boarding house even though some of us lived in Sendai. I don't have any special memories
    of this time in my life. I just studied all the time. That's all I did. I do not have any special fond memories.
- speaker: Interviewer
  text: How old were you when you went to the Ni-bu of the Normal school?
- speaker: Respondent
  text: I was 18 years old.
- speaker: Interviewer
  text: In those days you weren't allowed to have boyfriends, were you?
- speaker: Respondent
  text: Oh, my goodness, no. Absolutely not.
- speaker: Interviewer
  text: 18 years old children in America now already have boyfriends and girlfriends.
- speaker: Respondent
  text: Yes, that's right, but I never thought of the opposite sex at that time in my life. Not at all.
- speaker: Interviewer
  text: Did you go to Ochanomizu after this?
- speaker: Respondent
  text: I went to study music at what is now called Tokiyamatsu in Tokyo for a short time. This is where the Hitachi people
    attend. I studied under Miss Suzuko Mi who wrote the song, 'Mashiro-ki Fuji'.
- speaker: Interviewer
  text: Were you thinking of becoming a singer?
- speaker: Respondent
  text: No, that was not the reason. A teacher at the normal school suggested that I study music for a while. The teacher
    came to talk with my father and he gave his approval. My father said that if this was what I wanted to do it was alright
    with him. So, I studied voice for a short while.
- speaker: Interviewer
  text: How was it? Did you enjoy it?
- speaker: Respondent
  text: Yes, I liked singing.
- speaker: Interviewer
  text: Did you graduate from that school?
- speaker: Respondent
  text: 'No, I just practiced voice delivery and took voice lessons just for a short while. I stayed with Otsuki Sensei, the
    composer of that song, what was that song called? It goes like this: ''watashi no yoji wa nandakke...'' His name was Otsuki
    Teiji. I went to Tokiyamatsu every day from this house and studied voice. At times, we went to see concerts of Nobuko
    Hana, Kintaro Shimizu and other artists.'
- speaker: Interviewer
  text: Did you have good times?
- speaker: Respondent
  text: Yes, I did. This was the first time for me to be in Tokyo. I had studied all the time until then and I really enjoyed
    my life in those days.
- speaker: Interviewer
  text: What did you think of Tokyo? Did you feel like it was a big city?
- speaker: Respondent
  text: Oh, yes. Of course Tokyo was quite different from...
