collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What were your parents doing before the war?
- speaker: Respondent
  text: Farming, I guess.
- speaker: Interviewer
  text: And were you the youngest out of all the sisters?
- speaker: Respondent
  text: I was the third [eldest].
- speaker: Interviewer
  text: And your parents, were they Issei?
- speaker: Respondent
  text: My parents were Issei from Kumamoto.
- speaker: Interviewer
  text: Where were you living before the war?
- speaker: Respondent
  text: San Luis Obispo.
- speaker: Interviewer
  text: I haven't heard of many Japanese Americans who lived in San Luis Obispo. I haven't met a lot of families who were
    from there. Was it a small community?
- speaker: Respondent
  text: It wasn't a really small community. We had a Japanese school.
- speaker: Interviewer
  text: And did you go to that school?
- speaker: Respondent
  text: I think I did [laughs]. It's too long ago.
- speaker: Interviewer
  text: Do you remember the day Pearl Harbor happened? And do you remember hearing about it?
- speaker: Respondent
  text: Oh yes, oh yes, uh huh. I was for Japan and against Japan, you know. But I remember Pearl Harbor.
- speaker: Interviewer
  text: Do you remember how your parents reacted to it? Your mother and your stepfather.
- speaker: Respondent
  text: I think most of us felt like, shikata ga nai, it can't be helped. Or, what can we do about it, you know?
- speaker: Interviewer
  text: Do you remember if there was any kind of backlash after that happened? Were people still kind to your family?
- speaker: Respondent
  text: I knew I was wondering how the hakujin would feel towards us. But there was no animosity. I didn't feel afraid.
- speaker: Interviewer
  text: And what were you doing as a young woman at this time? Were you going to school or helping your family?
- speaker: Respondent
  text: I was already 25 years old so I wasn't going to school.
- speaker: Interviewer
  text: You weren't married by then, were you?
- speaker: Interviewer
  text: Grandma had a boarding house and sold tofu, remember? My grandma would make tofu and she would go around selling the
    tofu.
- speaker: Respondent
  text: I drove all over to the different houses and sold the tofu.
- speaker: Interviewer
  text: Do you remember what it was like when you were told to pack up and leave after Pearl Harbor after the Executive Order?
- speaker: Respondent
  text: Well I know, I never celebrated Christmas 'cause I'm Buddhist. Well, my mother and I didn't know where they were going
    to send us. So we didn't know whether we should take clothing for cold weather or warm weather. That I remember, so. But
    it was shikata ga nai, you know? We just had to do what they told us to do, that's all.
- speaker: Interviewer
  text: Do you remember anything important you had to leave behind?
- speaker: Respondent
  text: Well, I know we were renting the place, so we didn't have to worry about that. But I don't remember anything special.
- speaker: Interviewer
  text: Mom, tell her, you spent your 25th birthday on the train going to Poston. I think she just went direct to Poston.
- speaker: Respondent
  text: Yeah, that I remember, that's right. Well everything was shikata ga nai, you just had to take what happens, that's
    all.
- speaker: Interviewer
  text: What else do you remember about the train ride going to Poston?
- speaker: Respondent
  text: Well, I just remember going through looked like desert part but then that's about all. Just sort of wondering, well,
    just - wherever they take us.
- speaker: Interviewer
  text: When you got to Poston, what were some of your first impressions of the camp?
- speaker: Respondent
  text: Well, all I saw was cots and there were bales of hay or something, straw, that we were supposed to fill the mattress
    like, for our mattress. That I remember. We just took it, couldn't be helped, you know. No point in complaining [laughs].
- speaker: Interviewer
  text: So do you remember the block you were in with your family?
- speaker: Respondent
  text: Block Three. Well I know that we had our bathrooms, to take a shower it was communal, you know. So those who were
    shy waited until 1 or 2 o'clock in the morning to go. I was old enough, thought what the heck. When you get older, you
    have, oh heck, it honestly doesn't bother. We're all alike.
- speaker: Interviewer
  text: Did you make friends in camp?
- speaker: Respondent
  text: Oh yes, oh yes. That was fine, you know, making friends in camp. Now I don't know whether those friends are friends
    from camp or after I got there [in California]. It's all mixed up.
- speaker: Interviewer
  text: Did you work in camp?
- speaker: Respondent
  text: Seems to me, I know for a while I had to see that the mothers got their milk for their little kids. I don't remember
    much - oh my. It's too long ago.
- speaker: Interviewer
  text: What happened with going to Cleveland? How did you end up going?
- speaker: Respondent
  text: I went there because my friend was in Columbus. So I thought I'd go to Columbus but by the time I left, she had left
    Columbus so I just saw that well, Cleveland looks close by I'll go to Cleveland.
- speaker: Interviewer
  text: Out of all of your sisters, were you the only one to leave Poston?
- speaker: Respondent
  text: By then my youngest sister was with her husband. And I was the next. Toshi, one sister was in Hawai'i. And the oldest
    was with her husband - he was a Kibei/Issei. So we were just separated.
- speaker: Interviewer
  text: So it was basically just your mom and your stepfather in camp.
- speaker: Respondent
  text: By then, I guess. Oh yeah, he was there. I know he had something to do - I knew he had quite a lot of education in
    Japan but we weren't close. So he had something to do with regarding schooling I suppose. My mother was with her friends.
    She took advantage of it, she had her close friends and she enjoyed herself. She was able to do things with them so, ah
    things sort of floated, it didn't matter what was going on.
- speaker: Interviewer
  text: When you actually left for Cleveland, what did you end up doing?
- speaker: Respondent
  text: Well, I got a job sewing at Joy Lingerie.
- speaker: Interviewer
  text: Did you already know how to sew?
- speaker: Respondent
  text: Oh yeah, oh yeah. I had gone to sewing school before camp. Japanese sewing school, yeah. That's where my Japanese
    improved. It wasn't like what I learned at home, it's a little more refined [laughs]. I kept my mouth shut for a good
    two weeks, just listening.
- speaker: Interviewer
  text: Can you still speak it?
- speaker: Respondent
  text: In Japanese? In a way, yes. I watch my words when I'm talking with somebody that's from Japan. But then, ah, they
    know I'm Nisei. They accept me as I am.
- speaker: Interviewer
  text: So you went to another college in Cleveland?
- speaker: Respondent
  text: I - what should I say. It was a period where I didn't use my shorthand typing so that's why I had to catch up on my
    typing so that's why I had to go there. Well I wanted to be a stenographer. So I was for about 20 years. Had the same
    boss, yeah.
- speaker: Interviewer
  text: That doesn't happen anymore. that's very rare.
- speaker: Respondent
  text: It was a real nice boss. He used to dictate letters to me and then take off before I typed them out. So I would sign
    it - initial his name. It worked. He trusted me.
- speaker: Interviewer
  text: Can you talk about meeting your husband? Did you meet him in Cleveland?
- speaker: Respondent
  text: No. He was in the service.
- speaker: Interviewer
  text: He was in the 442.
- speaker: Respondent
  text: Well we had a boarding house, so if they had any leave they would come and stay overnight and go back to the - wherever.
    So that's how he came to
- speaker: Interviewer
  text: So you knew him from San Luis Obispo. Were you corresponding all throughout the war?
- speaker: Respondent
  text: Yes, but he was Kibei. So I always guessed that he had somebody write for him but I never asked him.
- speaker: Interviewer
  text: He was born in Penryn, Loomis. His parents went back to Japan and he came back as a young man on the boat and got
    a job farming. Then the war came and he was drafted.
- speaker: Interviewer
  text: How old was your husband when he went into the service?
- speaker: Respondent
  text: All I know is we were the same age.
- speaker: Interviewer
  text: So he was in Europe during the war?
- speaker: Interviewer
  text: Did he ever talk about his experience and what he went through?
- speaker: Respondent
  text: I know that he was in France. But he survived it, he came home.
- speaker: Interviewer
  text: Where did you meet him again?
- speaker: Respondent
  text: Well he came to where I lived because he had no family. He was Kibei, his family was all in Japan so he just showed
    up one day. Yeah, where I lived, 'cause he had no family.
- speaker: Interviewer
  text: Did that surprise you? Did you know he was coming back?
- speaker: Respondent
  text: Well no. One day there he was.
- speaker: Interviewer
  text: Were you happy to see him?
- speaker: Respondent
  text: Well yeah! More surprised though. I don't think there was any engagement period. There was a Buddhist minister right
    in camp so yeah, I remember, he came and I don't remember any ring or anything.
- speaker: Interviewer
  text: And her best friend stood up for them - Mitzi Yokoyama.
- speaker: Respondent
  text: My mother made friends with our neighbor, the neighbors were hakujin. I really marveled 'cause my mother didn't speak
    good English but she spoke broken English, became friends with the hakujin neighbors. She was very outgoing, so we became
    good friends.
- speaker: Interviewer
  text: What happened to your stepfather? Did he pass away?
- speaker: Respondent
  text: Yeah, he passed away in camp. I never knew my grandfather, or stepgrandfather. When mom was pregnant with me my grandma
    came to live with us 'til I was three years old. So I spoke nothing but Japanese. So off and on, my grandmother would
    live with her older sister Toshi in Los Angeles.
- speaker: Interviewer
  text: Your mom sounded like she was a pretty independent lady.
- speaker: Respondent
  text: Oh yes, oh yes. She said when she left Japan she had a choice - do you want to go to Hawai'i or America? And she said,
    "If I'm gonna go far away I want to go far far away." So she came to America, not Hawai'i. She had a lot of spunk [laughs].
- speaker: Interviewer
  text: And when she came to California did she get off in San Francisco? Or how did she end up in San Luis Obispo?
- speaker: Respondent
  text: I wonder. I know they all embarked in San Francisco. I don't know.
- speaker: Interviewer
  text: So you were raised in Cleveland?
- speaker: Respondent
  text: Yes I was born and raised in Cleveland.
- speaker: Respondent
  text: Church was just the gathering place for all of us. That's where we went on Sundays.
- speaker: Interviewer
  text: How many children did you have?
- speaker: Respondent
  text: Just Nancy.
- speaker: Interviewer
  text: How long did you live in Cleveland?
- speaker: Respondent
  text: Until, I don't know. Until we came here, huh?
- speaker: Respondent
  text: My dad was a glazier, he installed mirrors, he cut mirrors in residences, glass. And Cleveland weather - in the wintertime,
    tornadoes and snow and blizzards and all this stuff. And I went two years at the University of Cincinnati and I came home
    and Dad said, "Find a college in California to transfer because we want to move back." So I chose Sacramento State and
    I graduated in '69 and in '71 they moved to Newark. It was his occupation. Also the fact that their company that they
    worked for was not union and he would install huge storefront windows. The next day some guys would throw acid on the
    window because they were not union so it kind of, you know.
- speaker: Respondent
  text: So he got tired of that. And he did the same job when he got to California?
- speaker: Respondent
  text: Yeah, they were here a week or so and right away Dad got a job. So they were living in an apartment so Dad said, "Find
    a house, find a house." And he and a partner went into partnership in Niles, Fremont area. So he had that - ask my mother
    how long he had the glass shop.
- speaker: Interviewer
  text: How long did your husband own the glass shop?
- speaker: Respondent
  text: Until we - I don't know. Ten years or more, I think. But I don't remember how long.
- speaker: Respondent
  text: She took care of the office. She and his partner's wife took turns in the office.
- speaker: Interviewer
  text: What was the name of the store?
- speaker: Respondent
  text: The Glass Shoppe.
- speaker: Interviewer
  text: Did he start that business himself or did he take it over from somebody?
- speaker: Respondent
  text: Bob was there already and so my husband became a partner. Yeah.
- speaker: Interviewer
  text: Were you happy to come back to California?
- speaker: Respondent
  text: Oh yeah, oh yes. California was home to me.
- speaker: Interviewer
  text: And where was your mother living?
- speaker: Respondent
  text: She was living with Auntie Kay. She lived most of the time with my mom's oldest sister, Toshii. In L.A.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: When you received the redress and apology letter in the late '80s, what was your feeling when you received the redress?
- speaker: Respondent
  text: I don't remember. We did get an apology, huh? Eh, it didn't mean much I guess. I remember getting something but evidently
    it didn't mean much to me because I don't remember.
- speaker: Interviewer
  text: By then did you just feel that time in your life was over?
- speaker: Respondent
  text: Yeah, that's gone. No point in griping, getting mad about that, you know.
- speaker: Interviewer
  text: Do you remember what your feelings were when your parents received redress?
- speaker: Respondent
  text: I think I was glad because they suffered a lot. They suffered a lot.
- speaker: Interviewer
  text: Did you ever feel that it interrupted your life in any way?
- speaker: Respondent
  text: Oh yes that's something that happened to me, and so what? Yeah it's like anything else that's upsetting, there's no
    point keeping it in your head and getting upset about it. So shrug and forget about it.
- speaker: Interviewer
  text: And did your dad ever talk about his experience in the service?
- speaker: Respondent
  text: I don't really recall that he talked about you know. But I remember we moved to the suburbs of Cleveland. And my dad
    would come home and he would say, "Oh I met these people, these guys." They were at a gas station or something and they
    were bothering the owner and he looked at them and he spoke German or whatever, you know, my dad and they dissipated.
    He knew different languages I think.
- speaker: Interviewer
  text: Did your husband speak different languages?
- speaker: Respondent
  text: Well, just Japanese and English.
- speaker: Interviewer
  text: Because Nancy is saying maybe he spoke German and there were some people were bothering a gas station owner.
- speaker: Respondent
  text: Oh he did say some French. I don't know what it was. Probably his girlfriend's name. [Nancy laughs].
- speaker: Interviewer
  text: How did you find out he had a girlfriend in France?
- speaker: Respondent
  text: I think, in tuition [laughs].
- speaker: Interviewer
  text: Did you ever feel like your dad came home with any residual PTSD? Or he was okay?
- speaker: Respondent
  text: He was okay, I don't think there was any.
- speaker: Interviewer
  text: How many years were you married?
- speaker: Respondent
  text: Gee. 25 [years]?
- speaker: Interviewer
  text: When did your dad pass?
- speaker: Respondent
  text: February 2, 1995. He was 76.
- speaker: Interviewer
  text: Did you ever go visit Japan?
- speaker: Respondent
  text: Yes, we went a couple times, huh?
- speaker: Respondent
  text: She went with my dad maybe four times. And then when my dad died, his dying wish was that my mom take Stacy and me
    to Japan to see his folks. So we went in '97.
- speaker: Respondent
  text: Mom gave Stacy a college graduation present that she go to Japan, but not with her boyfriend but with her mother.
    So we went in 2007.
- speaker: Interviewer
  text: So you've traveled quite a bit.
- speaker: Respondent
  text: Yes, I was lucky. We went to India, too.
- speaker: Interviewer
  text: Do you feel that you are 101?
- speaker: Respondent
  text: After 100 who counts? [laughs]
