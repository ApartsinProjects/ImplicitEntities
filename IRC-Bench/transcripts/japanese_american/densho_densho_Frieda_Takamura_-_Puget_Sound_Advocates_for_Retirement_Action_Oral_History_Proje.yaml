collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Totally! And tell us a little bit about your family history, like maybe start with your grandparents, perhaps. Tell
    us where they were from, a little bit about their background, and anything that you feel is important as it pertains to
    your life, your grandparents, your parents.
- speaker: Respondent
  text: Well, I have, obviously, two sets of grandparents. On my mother's side, they--Well, both of them are Japanese. My
    father, though, was Japanese American, and there's a big difference there. But anyway, so my mother's side of the family
    is from Japan, still in Japan, never left Japan. She was born in Japan and then became a naturalized citizen--US citizen--when
    I was in high school, I think, there about. My father's family were immigrants to Hawaii, and so his mother and father
    both emigrated to Hawaii--let's see I'm trying to think--in the early 1900s. And so my grandfather came over to work as
    a tailor in Hawaii. And then my--that's again on my father's side. My grandmother's family, they were there as field workers,
    you know, in the sugarcane factory and pineapple--I mean, sugarcane fields and pineapple fields. But she, interestingly
    enough, was born in Hawaii, but then sent back to Japan for finishing her education. And then so she was in Japan and
    my father's family--my grandfather's family, and her family knew each other and he needed a spouse, and so she became
    a picture bride for him.
- speaker: Respondent
  text: And then, so they got married now, like I said, early 1900s, and he had a tailor business on Oahu and had nine children,
    of whom my father was the third son. And so in Japanese American culture, it's very important to note generations. So,
    you know, I'm getting warm... (laughs)
- speaker: Respondent
  text: So anyway, so my--they ran a tailoring business on Oahu, in Hawaii, and as I was saying, my mother--my dad's family's
    parents, were Issei, or first generation, which made my father second generation. And because in our culture, in Japanese
    American culture, it's very important to delineate what generation you are in this country, in the US. My father was the
    third son, and of course, in many ways in today as well, boys are certainly more, you know, considered more important.
    And so he was the he was--no, he was the second son. I'm sorry, he was the second son. His older brother went to--well,
    they all grew up there, but then when he was ready for college, he was--and this was before World War I--he was sent back
    to Japan for his college education, because the system was considered to be more superior in Japan. And then my father's
    older, oldest sister, was sent back to Japan for her finishing school. And then the war broke out, World War II. And so
    he was there during the bombing of Pearl Harbor, he was already like 21 or 22. And he had wonderful, well, not wonderful,
    but stories, you know about that whole time. But what it ended up doing, of course, was separating the family, you know,
    where the two oldest were in Japan and the all the other siblings were in Hawaii. My father and his next younger brother,
    of course, were very, very anxious to prove that they were good Americans. So of course, they went into the military.
    My father was part of the MIS, so the military intelligence. MIS--the Military Intelligence Service--where he became an
    interpreter--well, a translator--for the American forces, you know, of Japanese messages because he was bilingual. And
    then my uncle, his younger brother, was part of the--no, hundredth battalion, I'm sorry, But these are all parts of, you
    know, Japanese American history that is very important, because of the need for all of us to prove that we were good Americans.
- speaker: Respondent
  text: And then the six sisters all remained in Hawaii because they were much younger. And so my father was stationed in
    the Pacific Theater, if you will, and then when the war ended, he was sent to Japan as part of the occupation, under General
    MacArthur. And while there, he did a lot of translating, you know, for the Japanese and for the Americans, back and forth,
    and at that time, found out his older sister, the one who had been trapped in Japan, in essence, when the war started,
    he was able to locate her through an interpreter, a Japanese interpreter, and the interpreter was a newspaper reporter,
    who had been educated, ironically enough, in New York, but he was Japanese, he went to NYU, I think, had gone back to
    Japan because of the war, as well. But he was able to, you know, coincidentally find out that he was married to his older
    sister.
- speaker: Interviewer
  text: (Gasps) Oh wow.
- speaker: Respondent
  text: And so, you know, but they could not fraternize with the locals at that time. You know, the US forces couldn't. And
    of course, he looked like all, you know, the Japanese, but always in uniform, you know, US uniform, and all that. So,
    that's how my grandmother, my father's mother, found out that her oldest daughter was alive and well in Japan. You know,
    so there's just kind of a family story that's, yeah.
- speaker: Interviewer
  text: That's a great story.
- speaker: Respondent
  text: And then in the meanwhile, his older brother had actually become part of the kamikaze unit. He was a college student,
    so they were drafting everybody, you know, into the war effort, and he eventually died in Okinawa. So we never got to--I
    never got to meet him and my grandma, you know...
- speaker: Interviewer
  text: It sounds like your family is very well educated, like everyone went to college?
- speaker: Respondent
  text: Well, that was the expectation, you know (laughs), except for the girls who were younger, you know, as it was, and
    also, because during the wartime, it just was not feasible. But yeah, it was a very, very high priority. So the first,
    let's see, 3-4-5 of the nine, went on to college.
- speaker: Interviewer
  text: That's great.
- speaker: Interviewer
  text: Where were your grandparents and the younger siblings living during World War II? Did they remain in Oahu?
- speaker: Respondent
  text: Yeah, they were in Honolulu. No, none of the Japanese--I can't say none--most of the Japanese were not put into concentration
    camps during World War II, mainly because there were so many. And I swear, if all the Japanese Americans or the Japanese
    were incarcerated, the whole island would have collapsed (laughs) because there was just so much infrastructure that the
    Japanese, some Japanese Americans, were supporting and maintaining.
- speaker: Respondent
  text: So yeah, they were in Hawaii for the duration. Now, there were Japanese Americans who were incarcerated in Hawaii,
    but my family wasn't important enough. (laughs) You know, because they weren't teachers, they weren't religious leaders,
    they weren't considered to be important enough.
- speaker: Interviewer
  text: Oh, so in other words, teachers and other leaders of the community, Japanese American in Hawaii, were interned?
- speaker: Respondent
  text: Many, many of them.
- speaker: Interviewer
  text: Many of them were interned.
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Were they interned on the islands or were they brought back to the mainland?
- speaker: Respondent
  text: Yeah, but there's--In fact, it's interesting because right now they're opening--they're just now starting to put together
    the camp where they were held in Hawaii, on Oahu, so it's an untold history, if you will.
- speaker: Respondent
  text: And of course, most of the young Japanese American men were in the military, fighting for the US, you know, all over
    the world. So, yeah, it was a tough time that I think, helped to shape certainly the characters and, you know, what are
    the values of family and, ironically, that this country, the US, meant so much when such injustice was happening, yeah.
- speaker: Respondent
  text: So for me, you know, as really the--and my mother, I should say, because she was Japanese, did not go through that,
    right, because she was Japanese. She went through many of the trials and tribulations of being in Japan during the war,
    but that was a whole--another story in itself. But in my family, we were always told that we were Americans first. And
    we would always never embarrass our people, meaning all Japanese, by being bad citizens.
- speaker: Respondent
  text: Yeah, so...
- speaker: Interviewer
  text: Tell us a little bit about your mother and where she was during this period of time. Or, you know, like where she
    was--sounds like she was a field worker?
- speaker: Interviewer
  text: No, your mother was not. Then her parents were field workers?
- speaker: Respondent
  text: No, my father's mother's.
- speaker: Interviewer
  text: Oh okay. So your father's mother was a field worker. Yeah.
- speaker: Interviewer
  text: So tell us about your mom, your mother.
- speaker: Respondent
  text: Well she, like I said, was, you know, in Japan the whole time. She was from a family that were mainly laborers. Her
    father died when my mother was, like, 10 years old, very young. And she had about four siblings, and so it was incumbent
    upon my grandmother on her side to work to support her children. And so, I mean, she was just--when she and my dad met,
    I think she was, like, in housekeeping at one of the military barracks, you know, because they hired a lot of the local
    folks. And so that's how they met.
- speaker: Interviewer
  text: Yeah. Did she talk much about the war and what it was like, living in Japan during that time, because, as many of
    us found out later, you know, in our adult life, the Japanese people suffered greatly during World War II.
- speaker: Respondent
  text: Right, big time. And she--Yes, I mean, that's, you know, in a word. She used to tell stories about how there was so
    little food that the young people, she included, would go up into the mountains and into the country to grab, gather apples,
    so that they could bring it back to the city, you know, where--that's what they survived on, because there was just so--there
    was nothing.
- speaker: Interviewer
  text: Right, yeah.
- speaker: Respondent
  text: And so when the Americans came in, you know, everybody was nervous, you know, what kind of--because, of course, I
    mean, Japan being imperialist--imperialistic in Korea, in China, in, you know, across Asia, they didn't know how the Americans
    were going to be. But as it turned out--and I think my dad always used to say, the transition was smooth because of people
    like my dad, who spoke both languages, and who knew both cultures. You know, the example he used to give was, they took
    over a lot of the nobility and rich people's homes, the US Army did, to use as headquarters, to use his offices, you know,
    whatever. And Japanese homes, especially the, you know, the finer homes all had tatami mats, you know, the straw mats
    that were the floors. And of course, in Japan, you always take your shoes off, you know, before you go into a home. And
    so these officers American officers, US Army officers would come in and want to go into the homes with their shoes on,
    but it was people like my dad who said no, you can't do that. If you're going to do that you've got to cover all the tatami
    floors.
- speaker: Interviewer
  text: So he taught the Americans Japanese culture?
