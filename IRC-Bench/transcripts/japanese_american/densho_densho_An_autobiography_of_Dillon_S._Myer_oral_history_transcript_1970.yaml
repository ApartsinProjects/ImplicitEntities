collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: Like many Americans, my interest in and curiosity about my family's history lay dormant until my later years, when,
    unfortunately, no one of an earlier generation is left to question about the family tree. From the scanty information
    available, I know that my father's great-great-grandfather was a German tutor, who left Germany with his wife and two
    sons for the United States. One can only conjecture that this was in the middle or late eighteenth century.
- speaker: Respondent
  text: According to family legend, their ship - a sailing vessel, of course - was wrecked somewhere off the coast of Maryland
    and the father and mother were lost, along with the gold that they had. The two boys reached shore, and being destitute,
    they bound themselves out, a customary procedure in those days. The duration of their servitude is unknown; in fact, the
    interim history is unknown to me until my Grandfather Myer and his brother migrated from Allegheny County, Maryland, to
    Licking County, Ohio, during the early eighteen thirties. In 1834 they bought farm lands on the banks of what is now Buckeye
    Lake.
- speaker: Respondent
  text: The land was owned by the U.S. Government and the sheepskin deed bearing that date was signed by President Andrew
    Jackson. A portion of the land purchased at that time is still a part of the John Hyson Myer estate and the sheepskin
    deed is still a Myer keepsake. The land is now owned by the third generation heirs of my father, John Hyson Myer.
- speaker: Respondent
  text: My Grandmother Myer was Mary Oldaker. She was born in Virginia in the upper part of the Shenandoah Valley which is
    now a part of West Virginia, in 1818, and she and her family moved to Ohio by horseback when she was just a girl. We still
    have some of the antique dining room chairs in the family that were brought to Ohio by horseback. My Grandmother's father
    and my great Grandfather Oldaker was a millwright and evidently traveled about to build mills and mill wheels in different
    locations.
- speaker: Respondent
  text: My Grandmother married Jacob Myer, my Grandfather, at age forty-two. She was his second wife and she must have been
    several years younger than he was. My father, an only child, was born in 1861 when Grandmother was forty-three years old.
    His father Jacob Myer died in 1866 when Dad was only five years old. My widowed Grandmother was left with a young son
    and a farm to look after. It seems that portions of the farmland were still swampy and undeveloped. At the time my father,
    a young man, took over the management, debts had accumulated due.
