collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: When my younger sister was around 1 or 2 years old my father came to America alone. A few years later when I was around
    6 years old my mother came to America.
- speaker: Interviewer
  text: Why did your father quit his job at Miyajima?
- speaker: Respondent
  text: I think he wanted to come to America. His brothers told him that his parents did not want him to go so far away, but
    as he was young and eager, he decided to come to America.
- speaker: Interviewer
  text: Did he work for about 5 years after coming to America?
- speaker: Respondent
  text: No, he worked here until I came here. During that time he went back to Japan once, and stayed there for about half
    a year.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: I came to America in 1919.
- speaker: Interviewer
  text: Were you 15 years old then?
- speaker: Respondent
  text: I was 16. I came here as a yobiyose. I had graduated from junior high then. I wanted to come to America, and my mother
    wanted me to come and help my father and let him go home, as she had 5 children.
- speaker: Interviewer
  text: Did your father leave Japan when he was 23 years old?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Did your mother come to America with him?
- speaker: Respondent
  text: No, she didn't.
- speaker: Interviewer
  text: Did they have 5 children by then?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: They married young, didn't they?
- speaker: Respondent
  text: Yes, they did. No, that was not so. There were two children in Japan. After my mother came here 2 children were born.
    She took them back to Japan with her. After that another one was born in Japan, so altogether there were 5 children.
- speaker: Interviewer
  text: Was your mother in America for a while?
- speaker: Respondent
  text: She lived here for about 5 years.
- speaker: Interviewer
  text: What did you do while she was in America?
- speaker: Respondent
  text: My sister and I lived with my grandmother. My mother took two children who were born in America with her to Japan.
    Then another one was born in Japan. That made five brothers and sisters.
- speaker: Interviewer
  text: Do you remember the time your mother wasn't with you?
- speaker: Interviewer
  text: Were you lonely?
- speaker: Respondent
  text: Yes, of course I was. When I saw my friends with their mothers I longed for my mother. My grandmother used to say
    when grandfather scolded me for doing something bad, "Don't say such thing. His mother is in America, so be kind to him."
- speaker: Interviewer
  text: How much education did you have?
- speaker: Respondent
  text: I graduated from junior high school after finishing grammar school.
- speaker: Interviewer
  text: Did you have good time at school?
- speaker: Respondent
  text: I had fun at school, but as my parents were not with me I felt lonesome when I saw my friends bring their parents
    to literary exercise or other meetings at school. That is why I wanted my mother to go back to Japan and take care of
    my brothers. In those days there were many such people. Fathers left mothers and children in Japan, and went to America
    to work. When they made some money they went back to Japan. In those days there was no such people as permanent settlers.
    It was the same with us. There was no such freedom as owning land in America in those days.
- speaker: Interviewer
  text: What was your father doing in America?
- speaker: Respondent
  text: He worked in a laundry.
- speaker: Respondent
  text: In Berkeley. He lived in Berkeley for a long time. I lived in Berkeley from 1919 till the war started. I never lived
    in any other place.
- speaker: Interviewer
  text: Did your father send money from America every month?
- speaker: Respondent
  text: Yes, he did. Some people who were living with their mothers in Japan were pressed for money as their fathers did not
    send money from America. When I heard such stories I thought they were terrible fathers. My father was a very religious
    man. He was already a member of the Free Methodist Church in 1919, so as soon as I came to America he took me to the church.
- speaker: Interviewer
  text: Did you come here alone when you were 16 years old?
- speaker: Respondent
  text: Yes, I came here alone.
- speaker: Interviewer
  text: What kind of a country did you think America was then?
- speaker: Respondent
  text: I did not have ambition to seek my fortune. I just wanted to work hard. I was only 16 then. I wanted to study English,
    so after my father went back to Japan I worked as a schoolboy in a white family for about 6 years. I went through much
    hardships. I became ill once and was hospitalized. I did not have any relations but my guardian took care of me. The master
    of the house where I was staying as a schoolboy was kind to me.
- speaker: Interviewer
  text: When you were in Japan did you think America was a good country?
- speaker: Respondent
  text: Yes, I thought it was a good place as father used to tell me that Americans are good people. I was not scared to come
    here.
- speaker: Interviewer
  text: What was your impression of America after you came here?
- speaker: Respondent
  text: When I came here there was exclusion, so I had a hard time. I felt inferior at school. There were very few Japanese
    at school age in those days. There were only 2 or 3 Japanese in a grammar school in Berkeley. Some teachers were good
    to us.
- speaker: Interviewer
  text: Where did your ship leave from?
- speaker: Interviewer
  text: Did you go to Kobe by yourself?
- speaker: Respondent
  text: My mother took me to Kobe. I cannot forget that time. My mother and her sister who lived in Korea saw me off. When
    the ship left she could not bear to see me off, so as soon as the gong sounded the departure she disappeared. I looked
    for her but I could not find her. Later I found out that she left as it was too painful to see me off. I was not the only
    one; everyone in those days had the same kind of experience. My mother is deceased, but as a father I still think about
    that time.
- speaker: Interviewer
  text: Was that in 1919?
- speaker: Respondent
  text: Yes, it was March in 1919. I came on board the Korea Maru, of Toyo Steamship Company.
- speaker: Interviewer
  text: Did the ship go to Yokohama from there?
- speaker: Respondent
  text: It went to Yokohama.
- speaker: Interviewer
  text: Where did it go from there?
- speaker: Respondent
  text: It came straight to San Francisco. I think it took about 18 days.
- speaker: Interviewer
  text: What do you remember on board the ship?
- speaker: Respondent
  text: As I was young, and as it was the first long voyage for me I enjoyed it. There were many young people on board the
    ship. There were many women going to America as picture brides.
- speaker: Interviewer
  text: Weren't you about the youngest one?
- speaker: Respondent
  text: In those days 16 or 17 years old was very young.
- speaker: Interviewer
  text: Did you talk to picture brides?
- speaker: Respondent
  text: Yes. They were older than I. They were over 20 years old. They were wondering what their lives would be in America,
    and what kind of men their husbands would be. From that respect I had my father in America although my mother and sister
    were in Japan, so I made the voyage with a hope.
- speaker: Interviewer
  text: Did anything interesting happen on the ship?
- speaker: Respondent
  text: There were 2 or 3 young men. In those days the ship did not have much facilities, so it was not a very enjoyable voyage.
- speaker: Interviewer
  text: How was the food?
- speaker: Respondent
  text: Food was pretty good.
- speaker: Interviewer
  text: Didn't you get seasick?
- speaker: Respondent
  text: I did not get seasick as I was raised at Miyajima by the sea.
- speaker: Interviewer
  text: Did you go fishing when you were in Japan?
- speaker: Respondent
  text: Yes, I used to go fishing with my grandfather. As I told you before, my father was a religious man and sent us money
    promptly every month so we could make a living. My mother used to say, "Thanks to your father we can make a living, and
    send you to school." When I heard about some families not being able to make a living as their fathers disappeared and
    did not send money, I could not understand why.
- speaker: Interviewer
  text: Did you go to Angel Island after the ship arrived at San Francisco?
- speaker: Respondent
  text: Yes, I did. I met my father after many years then.
- speaker: Interviewer
  text: About how many years you didn't see him?
- speaker: Respondent
  text: He went back to Japan once and stayed for about half a year. I don't remember well but I think I had not seen him
    for 7 or 8 years since then.
- speaker: Interviewer
  text: How did you feel when you met your father in America?
- speaker: Respondent
  text: To tell the truth, I was a bit bashful as I hadn't seen him for a long time. Father was a strict man, and I was scolded,
    so I wondered if he was still strict.
- speaker: Interviewer
  text: What kind of experience did you have on Angel Island?
- speaker: Respondent
  text: There wasn't anything difficult in the process of landing. I just thought I came to a strange place.
- speaker: Interviewer
  text: Were you kept there overnight?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Were there Chinese there, also?
- speaker: Respondent
  text: Yes, there were.
- speaker: Interviewer
  text: Were they with you?
- speaker: Respondent
  text: I don't remember if they were with us or not.
- speaker: Interviewer
  text: Did your father come and pick you up?
- speaker: Respondent
  text: Yes, he did, and I landed right away.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: My father went back to Japan after 3 to 4 years, and I worked as a schoolboy.
- speaker: Interviewer
  text: Did you live with your father during that time?
- speaker: Respondent
  text: Yes, I did until he went back to Japan.
- speaker: Interviewer
  text: Did you go to school after that?
- speaker: Respondent
  text: Yes, I did. My father told me that I cannot learn English staying with him, so I should live in a white family and
    study English. He took me to the white family where he used to work. He did not have education as he had many brothers
    and sisters. He had to support the family so he knew hardships.
- speaker: Interviewer
  text: Did you go to school working as a schoolboy?
- speaker: Respondent
  text: Yes, I did. As a schoolboy I got up in the morning and cleaned the house, and prepared breakfast for the family. After
    the master went to work I washed dishes, packed my lunch and went to school.
- speaker: Interviewer
  text: Did you learn how to cook?
- speaker: Respondent
  text: Yes, I did. My father taught me how to cook, saying that to learn how to cook is part of the training to be a schoolboy.
- speaker: Interviewer
  text: How did you feel when you first lived in a white family?
- speaker: Respondent
  text: It was not a happy life at first. People born in Japan felt ashamed to work in somebody's house, and I felt so, too.
    I did not feel good to clean the house or the toilet, so I remember crying once in a while. In those days all young people
    who came to America and wanted to study lived in white families. They all worked hard.
- speaker: Interviewer
  text: Did you make any mistake in the white family?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What kind of mistake did you make?
- speaker: Respondent
  text: I didn't know how to cook. At one time I threw away the bones from the roast, not knowing that the bones were used
    to make soup with. My father came and told me that it was a mistake that my mistress didn't tell me, but at such a time
    I should ask if I should throw away the bone or not. I learned to cook in a short time.
- speaker: Interviewer
  text: Did you learn English fast?
- speaker: Respondent
  text: It took me a long time to learn English. I lived in the white family to learn English fast. My master used to tell
    me, "Your father let you work in my house to learn English, so if I don't understand anything be free to ask." As soon
    as I came home from school, the mistress used to teach me English from the alphabet. At that time I thought Americans
    are kind people as they teach me English for hours free of charge.
- speaker: Interviewer
  text: Were they young people or old people?
- speaker: Respondent
  text: Both. They were young people in their 30s. While I was in school for 6 years I changed jobs 4 or 5 times. Some homes
    were good and some were bad, but most of the homes I worked were good. The reason was that the homes my father found jobs
    for me were Christian families. In those days everybody had hard times. When I see young Japanese come to church I tell
    them, "You are lucky to be able to speak in Japanese. People before you paved the way for you. In my days people who came
    before us were men with families who came here to work and not to study."
- speaker: Interviewer
  text: Did you feel helpless when your father said he was going back to Japan?
- speaker: Respondent
  text: Yes, of course I felt helpless. But on the other hand I remember my mother asked me to send my father home as my brothers
    would feel inferior if father was in America for a long time. People in those days worked hard.
- speaker: Interviewer
  text: Were you around 20 when your father went back to Japan?
- speaker: Respondent
  text: I was not 20 yet.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I worked as a schoolboy for 6 years. I went till the second year in high school. In those days not many Japanese went
    to high school, and Niseis born in America were not old enough to go to high school. That is why I had very lonely school
    days, but there were some white people who were good to us. In those days there were 14 or 15 Japanese in Berkeley High
    School. I quit school and worked. Before that I attended a technical college in Oakland for about half a year to study
    automotive engineering, and worked at an automobile company for about half a year. When I was 26 years old I went back
    to Japan and married my wife.
- speaker: Interviewer
  text: Did you save money while you worked as a mechanic?
- speaker: Respondent
  text: I worked as a mechanic for 6 months and saved money. Then I went back to Japan and brought my wife back with me.
- speaker: Interviewer
  text: How did you find your wife?
- speaker: Respondent
  text: My father picked her. In those days not everybody could come to America.
- speaker: Interviewer
  text: What year was it?
- speaker: Respondent
  text: It was 1931.
- speaker: Interviewer
  text: Did you go back to Japan and bring your wife with you here?
- speaker: Interviewer
  text: Wasn't it around the Depression?
- speaker: Respondent
  text: Oh, yes it was. When I came back from Japan I could not find a job as the automobile company discharged its employees
    because of the Depression. Then I worked as a truck driver of a dry cleaning store.
- speaker: Interviewer
  text: Was it a white cleaner?
- speaker: Respondent
  text: No, a Japanese cleaner. Then I worked as a truck driver of a wholesale nursery delivering flowers to department stores
    in San Francisco. I think I did that for about 3 months.
- speaker: Interviewer
  text: Did the work last only 3 months?
- speaker: Respondent
  text: I changed to another job after 3 months. Shortly after that I started my own cleaning business.
- speaker: Interviewer
  text: Were there many Japanese in cleaning business?
- speaker: Respondent
  text: Yes, there were many Japanese in laundry and cleaning business.
- speaker: Interviewer
  text: What year did you start the cleaning business?
- speaker: Respondent
  text: I worked in a cleaners for about 3 years. Then I started the business with a partner. A few years later the war broke
    out.
- speaker: Interviewer
  text: Was the cleaning business pretty good?
- speaker: Respondent
  text: It was during the Depression, but it was better than other business. After the war broke out we leased machines and
    building in which we invested money, and went to camp.
- speaker: Interviewer
  text: What kind of headaches did you have while you were in dry cleaning business?
- speaker: Respondent
  text: The building belonged to a white widow, but the partner and I built the building.
- speaker: Interviewer
  text: How was the business?
- speaker: Respondent
  text: There was the Depression, but the business was not too bad.
- speaker: Interviewer
  text: What kind of worries did you have as a dry cleaner?
- speaker: Respondent
  text: As we used gasoline, and as the shop was in downtown Berkeley we had to be careful. Some neighbors complained, and
    I didn't blame them.
- speaker: Interviewer
  text: Was the shop in the Japanese neighborhood?
- speaker: Respondent
  text: No, it was in the white neighborhood. There was no Japanese.
- speaker: Interviewer
  text: Did you get persecuted by the whites in the neighborhood?
