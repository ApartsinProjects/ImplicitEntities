collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: My name is Jiro Oyama. Jiro is "second son" and Oyama is "big mountain." I was born in Boyle Heights, East Los Angeles
    in the year 1925. We moved about three times within Boyle Heights before the war. So we were basically very permanent
    to that area. And I have a picture here of my graduation from First Street Elementary School. I thought that the general
    population of the Boyle Heights area was largely Mexican American and Caucasian but that's not true. When you look at
    the picture, Asians represent a good number of students in my class.
- speaker: Respondent
  text: I graduated there 12 years of age and then went on to Hollenbeck Junior High School, and then into Theodore Roosevelt
    High School for my ninth and tenth grade. When I was 16 years of age, the war started. Our family had a grocery store
    with a liquor license right next to the high school football field. And this was remarkable. The grocery store was bought
    by my mother from the money from her insurance policy on her husband. She used that small amount of money to put a down
    payment to purchase the grocery store under my older sister Minnie's name, since under California law only a U.S. citizen
    could own the title.
- speaker: Interviewer
  text: Can you tell us more about your parents and who your siblings were?
- speaker: Respondent
  text: Both my parents were born and reared in Fukushima-ken, Japan. That's in the northern part of Japan. My father was
    born in 1888. He was about four years younger than my mother who was born in 1884. They were raised in Japan, of course.
    My father left Japan for Hawaii in 1907 for some kind of work, probably involving farm work. My mother was a schoolteacher
    who accepted a job offer to teach Japanese language at a Buddhist temple in Hawaii in 1911. And they met while she was
    a teacher of Japanese in this Buddhist temple. The temple itself was formed in 1908 so it was a fairly new Buddhist temple.
- speaker: Interviewer
  text: Is this on Oahu?
- speaker: Respondent
  text: On Oahu. And they met and married in 1916 and had two daughters, Renko, the oldest one and Minnie, who was two years
    younger. The family moved to California, first in San Francisco for short time but because of the weather conditions moved
    to sunny Southern California and most of their lives was spent in Los Angeles. Shortly thereafter my elder brother Iwao
    who later changed his name to Vance was born.
- speaker: Interviewer
  text: So you were the youngest?
- speaker: Respondent
  text: I'm the youngest. I'm the only survivor of the whole family right now. I'm 94 years of age now. Everyone has passed
    away.
- speaker: Interviewer
  text: I know. It's hard to be the youngest and watch that happen. So when they moved to L.A., what did your parents end
    up doing?
- speaker: Respondent
  text: What happened was my father, when he migrated with his family to Los Angeles, he was not a "jack of all trades" but
    he had assorted jobs. Until finally he was able to latch onto a restaurant located in central Los Angeles at the 7th Street
    market which was a food distribution center. He had a restaurant in that vicinity and had it for a number of years until
    well, he must have closed his shop or something because prior to his death, he served as a cook or chef on a fishing boat.
    So he took a job on a fishing boat and when he returned to land I guess he was ill, and he went home and passed away there
    after being bedridden for about six months.
- speaker: Respondent
  text: So he was not too much of a businessman, but he supported the family. In 1934, when I was nine years old he passed
    away and so my mother had four children and herself to support during the Depression days. She had enough money to put
    some money down on purchasing the grocery store in 1938. We had it for about three years; developing and investing our
    time and installing fruit stands. My brother was a temporary butcher, and managed the meat section.
- speaker: Respondent
  text: He started to go to UCLA as a freshman when Pearl Harbor happened, but before Pearl Harbor, he was cutting up the
    meat each day before going over to UCLA. And my oldest sister Renko was 17 when my father died, but shortly thereafter
    she wanted to go to junior college. And the thing I remember about that is there was a neighbor who lived in a house close
    by and he was pretty well-off because he had a car. Few Japanese Americans had a car at that time. So my mother had to
    get some money for an application for junior college for my sister, Renko, and they turned her down.
- speaker: Interviewer
  text: How come? Why is that?
- speaker: Respondent
  text: 'Well, in retrospect, the family was wealthy and we were on the low class of society: four children with a mother
    trying to survive. My mother used to buy grocery things on credit sometimes. She used to run up bills and had difficulty
    repaying. And she took a job of selling cosmetics. After her husband passed away she supported the whole family by her
    cosmetic sales job. She worked for a company that had the same name as Oyama, no relation.'
- speaker: Respondent
  text: Then in 1938 she put a down payment on the grocery store and from that, we had three years in which the whole family
    was involved and the oldest daughter started to work. She wanted to go to junior college, but she had to work and at that
    time didn't have enough money to pay for the application.
- speaker: Respondent
  text: So my mother went to this neighbor and asked. It's almost like you can dream about, how this wonderful neighbor wife
    was happy to see this person come begging for some money. She was turned down [laughs]. And this is what my other sister
    told me, that that was a great disappointment.
- speaker: Respondent
  text: But to me as a youngster at that time, it is retained about how your family is treated when you're youngster. That
    doesn't leave you. And anytime I used to pass by the house I used to see them washing their car. I didn't have a very
    good experience towards that particular family. They had two or three children and they were wealthy and they were employed
    - their father owned the shops and they owned a car. So they flirted with the upper class of this low class neighborhood.
- speaker: Interviewer
  text: Were they Japanese American?
- speaker: Respondent
  text: Yeah, they're Japanese American. I forgot the name, now [laughs]. But it was something that stays with you. After
    my father died, we moved to a house on 2621 East Second Street. And I remember that the owner of that house on Second
    Street came over with her boyfriend, a tall six foot guy who was from Texas. She came and she was demanding payment for
    rent. And I was a youngster, maybe 10 or 11 years old. I was hiding in one of the closets near the room.
- speaker: Respondent
  text: And I saw my sister Renko, she was maybe 18 or 19, I guess then. She was standing firm. She says, "Well, you go ahead
    and call the police and evict us," or something to that effect. She wanted to stand up for our mother and the family.
    And I'll always remember that point of my lovely sister. You know, went out of her way to defend her mother like that
    against this big tall, husky, Texan. And she's just, tiny person compared to him. And that never left me and this image
    of money and owing things. I hate that concept. I hate to get any money and be indebted to anyone, whether it be a company
    or anyone. And that's a philosophy that I hold to this day. I try to influence the kids not to go overboard and borrowing.
    Gee, I get off track.
- speaker: Interviewer
  text: This is actually good because it brings us to Pearl Harbor. So your father's gone and it sounds like your sister's
    becoming the head of the household. So what do you remember about the day Pearl Harbor happened?
- speaker: Respondent
  text: It happened two years after my older sister got married. So we had my younger sister, my brother, and me. My second
    sister, Minnie, was managing the grocery store. And my brother is starting to go at that time to UCLA. And I was about
    16 years old.
- speaker: Respondent
  text: 'So on Pearl Harbor, we used to close the store on Sunday afternoons. And I remember receiving notice that on the
    radio there was an attack on Pearl Harbor, and nothing in detail but they''re talking about the Japanese: "The ''Japs''
    attacked Pearl Harbor." And the next day was Monday and I was concerned about what happened. During that time, all Japanese
    Americans must have been worried, too because it was their mother, father''s country that did this attack. So I went to
    school and all I remember now is that we stood on the football field. All of us. And we were listening to the President
    of the United States. The thing that struck me to this day I don''t forget is that "day of infamy." I had never heard
    the word "infamy." But that would describe the Japanese attack. A day of infamy.'
- speaker: Respondent
  text: And as I was standing there, I was looking around to see, realizing that everyone was concerned about the attack,
    that they would be looking at me. I didn't consider other Japanese, too. It was me that was to blame. That was that inherent
    assuming of the responsibility for your mother's country. That I remember about putting my head down and trying to fend
    off presumably people that would say bad things about me.
- speaker: Respondent
  text: That was what I remember. But going back to the store later on, from that time on, of course, our lives were completely
    changed. The customers that used to come to the store, some of them just quit completely. So we lost customers and there
    were new customers that were coming. I mean, a few. And it turned out to be that they were probably trying to compensate
    for those people. Certain people take sympathies or they show it in some odd way, but they may come to a store that they
    would never go to with a nearby Safeway available, but they would go out of their way to show that they had some sort
    of empathy. And I'll never forget that duality of people in a mass like that. The response is not all negative or all
    positive.
- speaker: Respondent
  text: I have a flyer, the Executive Order 9066. I was reading that before I came over here. And I was looking at the instruction
    of what we could do or not do. And where we should report. My god, I didn't read that 9066 when it came out, but in retrospect,
    preparing for this I thought, what was the thoughts that were evoked by the Pearl Harbor and how did it affect the family?
    And of course, that set of directions were very very forthright.
- speaker: Respondent
  text: Japanese ancestry. It's not whether you're a citizen or not, it's Japanese, you are told not to assemble or certain
    streets you could not use. You have to meet at a certain place. If I read that and I said oh my god. That would be hard
    to comply with anything. But to have people like me born and raised this country, innocent of anything but being subject
    to that. Well our response was, we knew that somewhere along we're going to have to report and we're going to be able
    to only take certain things.
- speaker: Respondent
  text: So we started immediately to try to get rid of things. And you couldn't sell it 'cause it was evident that news got
    around that you could buy cheap things from these "Jap houses." So it was a very hectic time between that and the actual
    evacuation. But just to think, they tell you, you should only carry enough clothing and things that you can carry in two
    suitcases. And I was a young kid like that. My mother and the family were all considering or thinking about where to buy
    - you're concerned about these little niceties, about what you should carry. You didn't know where you were going. You
    really didn't know what the future would hold for you. And that's a thing that's utterly strange for someone like me who's
    raised to think you're American. I would never want to go through that, I would never want anyone to go through that exposure,
    where the government itself is telling you what to do, divest yourself of any rights you have. It's inconceivable.
- speaker: Respondent
  text: And to this present day when you have people being treated that way from another country just because of a border.
    The philosophy, the belief of that president that we have, is something awful. It's not learning from an experience that
    we all know is wrong. And that's what's really scary.
- speaker: Interviewer
  text: I'm wondering about your mom because she lived on Oahu. Do you remember how she responded after the attack and did
    she say anything to you?
- speaker: Respondent
  text: 'I don''t remember anything she said to me. I think in my way, I think maybe your ears are not open to anything. You''re
    so scared of everything that you don''t consider how other people are taking it; it''s yourself. And the thing that''s
    etched in my mind was there were a few Korean people that had restaurants or other things like cleaning shops or something
    in Boyle Heights. But I know walking along the street sometimes you would come across some Asian person. And it''s either
    Chinese or Korean that had a badge: American flag and a flag of maybe another country. But anyway, they had an American
    flag. Said, "I am an American." And phew, I used to see that and say, "Why can''t I wear that?" That would be deception
    to say.'
