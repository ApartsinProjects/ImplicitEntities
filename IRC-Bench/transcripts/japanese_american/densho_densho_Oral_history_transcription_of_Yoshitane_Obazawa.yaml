collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Did many people come to America from Nagano Prefecture?
- speaker: Respondent
  text: It was also called Shinshu.
- speaker: Interviewer
  text: What was the occupation of your family?
- speaker: Respondent
  text: My father came from a family of Shinto priests, and so was my mother. They could not make living as Shinto priests,
    so they farmed, also. My father was a school teacher. When the first normal school was established in Nagano prefecture,
    he took a test as he could write 1 to 10 in numerals, and passed the test. My grandfather was a teacher of a temple school,
    and taught Chinese literature. Hachimantaro Yoshhiye was the god of our shrine. In Hachiman shrine in Kamakura, the body
    of Hachimantaro Yoshiiye is enshrined. It is said that a part of his body was brought to our shrine and is enshrined there.
    During the Civil War there was Hiraga Genshin, a retainer of Takeda Shingen. He is the ancestor of our family. Later he
    became a priest. After I became a Christian I thought he must have been like a priest in the Bible.
- speaker: Interviewer
  text: Was there a shrine on your premises?
- speaker: Respondent
  text: Yes, there was. Inside the house was enshrined the charm from the Grand Shrine of Ise. As Japan is a country of many
    gods, it was said that the god of New Year would come on New Year's Day, so we had a separate place for the god of New
    Years.
- speaker: Interviewer
  text: What was the duty of a priest?
- speaker: Respondent
  text: As my father was a teacher and worked away from home, and my brother worked at a post office, I could not eat breakfast
    until I recited a Shinto ritual prayer on the first and the 15th of the month, and on other holidays from the time I started
    going to school.
- speaker: Interviewer
  text: Did the neighbors come, too?
- speaker: Respondent
  text: No, just our family. My house was away from other houses. There was a temple a little ways from my house. The Buddhist
    priests recited prayers early in the morning on the 1st and the 7th of the month. I could hear the sound of drums. These
    things were just rituals. I remember praying to unknown gods.
- speaker: Interviewer
  text: Does the priest write the Shinto ritual prayer himself?
- speaker: Respondent
  text: There is a prayer written, and the priest reads it. When I was a child I had to recite the prayer before meals. I
    was hungry so I recited the first part of the prayer in a loud voice, skipped the middle part and saying the last part
    ended it by clapping hands. My mother would say, "You said your prayer fast today", but I was so hungry that I started
    eating without answering her. I grew up without knowing the meaning of the prayer.
- speaker: Interviewer
  text: How old were you when you started that?
- speaker: Respondent
  text: I think I started it when I started going to school.
- speaker: Interviewer
  text: Did you continue doing that?
- speaker: Respondent
  text: My mother died when I was 12 years old, I remember doing it till then.
- speaker: Interviewer
  text: When your mother died, was the funeral in Shinto style?
- speaker: Respondent
  text: Yes, it was. Even though my father was a Shinto priest, we had a Shinto priest come from outside. Buddhists do not
    serve fish at the funeral, but we served fish to guests who came to the funeral. It is the custom of the village that
    the members of the family do not work in the kitchen, so the neighbors cooked for us.
- speaker: Interviewer
  text: Did your father officiate other funerals?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: How about weddings?
- speaker: Respondent
  text: I do not remember my father officiating weddings as his main job was a school teacher.
- speaker: Interviewer
  text: What do you remember about your school days?
- speaker: Respondent
  text: When I was in grammar school, I lived only about 5 minutes' walk from the school. One day I played hookey from school
    with two of my friends, and sat in the sun in front of a store selling ginseng. While three of us were sitting, one decided
    to go to school. When he went to school the teacher asked him where two other boys were, so he told the teacher that we
    were hiding. The teacher came looking for us but he did not find us. When we saw the teacher walking down the street,
    we ran to school. My father was a school teacher, and my grandfather was a teacher of a temple school. This teacher had
    learned Chinese literature from my grandfather before he attended a normal school, so I was not scolded although my buddy
    was scolded. In those days grammar school was 4 years, and junior high school was 4 years. The 3rd and the 4th grades
    were together. One day no teacher came to our class till the end of one period. A teacher came and told the pupil to go
    home. When we left the classroom we shouted, "We are not coming to school since the teacher do not come to the class."
    The teacher told us to come back to the classroom. The athletic teacher who was teaching a school in the neighboring village
    heard about it and came to our class. He asked who the class president was. Not knowing that the class president was the
    village master's son he hit him, and made everyone go home. The next day 3 of us representing the whole class went to
    the village office protesting the fact that the athletic teacher hit the class president. The village master came out
    and settled the argument. The following year when we went to the high school, I found the same athletic teacher teaching
    there, and I felt embarrassed. That is the recollection of my grammar school days. I only remember bad things.
- speaker: Interviewer
  text: Didn't your father stay home?
- speaker: Respondent
  text: My father was away from home in those days.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: Her father was a Shinto priest, also. I was the second son, and when I was born I was given the name of my mother's
    family. There were four daughters but no son in her family, so they took husbands. There were no son born to them, so
    they gave me the name Yamaguchi. After my mother died, and my grandfather died, a boy was born to my aunt. They lived
    in the mountain. When I was in the second year of high school my name was changed back to Obasawa. Then I came to America.
- speaker: Interviewer
  text: Till what grade did you go in high school?
- speaker: Respondent
  text: I was the second graduate of the high school.
- speaker: Interviewer
  text: How many years did you go to school by the time you graduated from high school?
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: I liked school. I was the third from the top out of 53 pupils when I graduated from high school. There were 8 classmates
    still alive by 1975.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: In November 1907.
- speaker: Interviewer
  text: How old were you then?
- speaker: Interviewer
  text: What made you decide to come to America?
- speaker: Respondent
  text: In those days two students could attend the Dobun Shoin in Shanghai at the expense paid by the prefecture. As I graduated
    third from the top, the principal of the high school told me to take an exam. There were 16 high schools in Nagano Prefecture,
    and there were some who failed the test the year before, too, so there were 24 candidates. I did not pass the test. In
    those days people came to America as they thought something good will happen when they come to America.
- speaker: Interviewer
  text: What kind of a country did you think America was?
- speaker: Respondent
  text: I came to America thinking that money grows on trees. I came to America to study, but I did not have any definite
    idea what I wanted to study.
- speaker: Interviewer
  text: Did you think it would work out somehow if you came to America?
- speaker: Respondent
  text: Yes, I did. People on board the ship were saying that there are gold nuggets in Alaska. I said if I picked 2 or 3
    nuggets I would have enough money to study. Then another man said he would pick up about 10 gold nuggets and go back to
    Japan. When I came to America I wanted to go to Alaska, but a man who had been there before told me that I should not
    go there because I would become "headless." I did not know what he meant by "headless", but later I found out what he
    meant. In those days it took about a month to go from Seattle to a cannery in Alaska by a boat. As they did not have anything
    to do on the boat they gambled. The foreman who took the men there let them gamble. They knew what to do, so they let
    the people win on the way going there, but on the way back they won. By the time they came back to Seattle the people
    would lose everything they earned, and became "headless." Actually many people became "headless."
- speaker: Interviewer
  text: Where did your ship leave from?
- speaker: Respondent
  text: From Yokohama.
- speaker: Interviewer
  text: Did you go to Yokohama alone?
- speaker: Interviewer
  text: Was there a physical examination before you left there?
- speaker: Respondent
  text: There was an eye examination for trachoma.
- speaker: Interviewer
  text: Did you pass the eye test without any trouble?
- speaker: Respondent
  text: Yes, I did. I had epidemic ophthalmia before, so I received treatment from a doctor in town, and I also went to Takasaki
    for a treatment.
- speaker: Interviewer
  text: Did you come to America soon after you graduated from high school?
- speaker: Respondent
  text: As I took the test and failed, I was thinking about coming to America. My brother's friend who was a principal of
    a grammar school asked me to teach Japanese history and geography, and for about half the time teach baseball. As I had
    learned Japanese history and geography in high school, it was not hard to teach them. After I taught baseball my school
    won the championship among the grade school in the province. When we came back from the game the parents greeted us in
    the village. That night a victory party was held, and we were forced to drink sake. As we drunk sake on empty stomach
    we got drunk, and 2 other teachers and I slept in the night duty room. There was one hard bread which Japanese soldiers
    brought home after winning the Russo-Japanese War, so three of us ate it to keep off hunger till morning as we had not
    eaten supper the night before. Next morning we went around the homes of the members of village assembly apologizing for
    being drunk. They were the ones who made us drink, but we had to apologize. Japan is that kind of a place. When I came
    to America, the villagers gave me a farewell party.
- speaker: Interviewer
  text: How long did you teach that school?
- speaker: Respondent
  text: I taught from May to October, that is 6 months. My salary was 10 yen a month. That was pretty good for a substitute
    teacher because those who graduated from a normal school used to get 14 yen a month.
- speaker: Interviewer
  text: What do you remember about your voyage?
- speaker: Respondent
  text: We slept on bunk beds. Before we landed we were given physical examinations for syphilis or other diseases. Many people
    got seasick and didn't eat until after passing the meridian. It took 18 days, but many people stayed in their bunks for
    the first 10 days.
- speaker: Interviewer
  text: Were the passengers all men?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Weren't there any women passengers on board?
- speaker: Respondent
  text: No, there wasn't. The passengers were all young men from around 18 to 20. It was 7 or 8 years later that women started
    coming to America.
- speaker: Interviewer
  text: What else did you do on board the ship?
- speaker: Respondent
  text: We had showers on the ship. After we felt better we walked on the deck and dreamed about what to do in America, and
    talked about finding gold in Alaska. Everybody was building castles in the air.
- speaker: Interviewer
  text: Where did you land?
- speaker: Respondent
  text: In Seattle.
- speaker: Interviewer
  text: Didn't you go to Alaska?
- speaker: Respondent
  text: No, I didn't as I was told not to go there. I stayed at a rooming house managed by a church. A man who came to America
    half a year before me told me that church would find me a job free of charge, and if I went from the church, the employer
    would trust me. I went to church with no intention of becoming a Christian. I went to church to take advantage of the
    church. The church managed a rooming house to teach gospel to those people. The pastor and the elders encouraged me to
    be baptized, so I was baptized without knowing anything about Christianity. It was much later that I thought it was God's
    will that I joined the church so that I won't get into temptation being separated from parents and living as I pleased.
- speaker: Interviewer
  text: What church was it?
- speaker: Respondent
  text: Methodist church. In those days it was called the Methodist Episcopal Mission. Later it was called the Methodist Church.
- speaker: Interviewer
  text: How long did you live in Seattle?
- speaker: Respondent
  text: I stayed there until the war broke out. I worked in the neighboring ranches, and also picked hops. Those who did not
    work in canneries did farm labor. Also some people worked as laborers on the Northern Pacific Railway and Great Northern
    Railway. When I came here in November of 1907 that kind of work was finished. Those who came here around August could
    work there.
- speaker: Respondent
  text: This is my first experience. There were about 4 double beds in one room, and I slept on one of them alone. When I
    woke up there was a man sleeping on the same bed. Lying down on the bed he told me that he worked 35 days in August and
    35 days in September. I thought he talked strange as there are 31 days in August and 30 days in September. Later I found
    out that they figured 10 hours as a day, so if they worked 350 hours a month that was the same as working 35 days. Much
    later, around 1920 the work hours became 8 hours a day. Around the time I came here, people looked for a job in which
    they had to work on Sundays because if they don't work on Sundays they don't get paid. There was such a time.
- speaker: Interviewer
  text: Could you speak English in those days?
- speaker: Respondent
  text: I thought I could speak English, but they didn't understand me. A man who came here before me found a job for me.
    The day after I came here I went for the interview of the job. My job was to start a fire in the kitchen in the morning.
    I had never worked in the kitchen in Japan. Furthermore, in those days in Seattle they burned firewood in the stove. Later
    I found out that I had to crumple some newspaper into balls and put some small pieces of wood on it and light the paper.
    I did not know it, so I just burned some newspaper but the firewood did not catch fire. When the wife of the house came
    up she found the house filled with smoke.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I worked as a schoolboy and attended a grade school, but I spent all the money I brought from Japan, so I went to
    help my friend who was growing strawberry on Vashon Island from around April to August. From September I attended a grade
    school on Vashon Island. I worked at a home of an elderly couple whose son was a lawyer in Seattle. My job was to milk
    two cows in the morning and in the evening, and gather eggs from about two dozen hens. There was a grade school in front
    of the house. The house was standing on 20 acres with many fruit trees, cows and chicken. I was paid $2 a month with room
    and board for working in the morning and in the evening, and attended a school. In the falls there were baseball tournaments
    between our school and the neighboring grade school. Older pupils around 12 and 13 played, and even the principal and
    I joined the game. While I was playing the game, the time came for me to milk the cows, so I said I had to go home to
    milk the cows. A teacher sent a messenger to my home saying that I could not come home to milk the cows that evening.
    When I finished the game and went home the master asked me if our team won the game, so I told them that we lost. The
    following week we played in the neighboring village, so I told my master that I would not be home to milk the cows. Had
    I stayed there, my English would have improved. A man who came here with me had just grammar school education. He worked
    for the railroad, and for about the first 3 months he could not send any money home as he had to buy clothes and other
    things, but from about the fourth month he sent $25 which was about 50 yen a month to Japan. My brother was working at
