collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: How old were you when you came to America?
- speaker: Respondent
  text: I was 19 years old.
- speaker: Interviewer
  text: How much education did you have in Japan?
- speaker: Respondent
  text: I had 8 years of education in Japan.
- speaker: Interviewer
  text: Were your parents in Japan?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He was a farmer.
- speaker: Interviewer
  text: Was he a strict man?
- speaker: Respondent
  text: He was rather a strict man.
- speaker: Interviewer
  text: How about your mother?
- speaker: Respondent
  text: She was a gentle woman.
- speaker: Interviewer
  text: What do you remember about your parents?
- speaker: Respondent
  text: I don't have any special memory of them.
- speaker: Interviewer
  text: What was the religion of the family?
- speaker: Respondent
  text: It was the Zen sect of Buddhism.
- speaker: Interviewer
  text: Were they devout Buddhists?
- speaker: Respondent
  text: No, they weren't.
- speaker: Interviewer
  text: Did your father own the farmland?
- speaker: Respondent
  text: Yes, a little, but most of the land was leased.
- speaker: Interviewer
  text: What kind of a village did you grow up in?
- speaker: Respondent
  text: Most villagers were farmers.
- speaker: Interviewer
  text: Were there festivals?
- speaker: Respondent
  text: Yes, there were village festivals.
- speaker: Interviewer
  text: Were they fun?
- speaker: Respondent
  text: It was fun to get some spending money and go out to play.
- speaker: Interviewer
  text: What was most fun?
- speaker: Respondent
  text: As I grew up in a poor family I didn't get much spending money, so it was fun to get spending money and go out to
    play.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were 5 boys and I was the fourth from the top.
- speaker: Interviewer
  text: Do you remember about your schooldays?
- speaker: Respondent
  text: As I liked school and as I was healthy I was one of the two out of 53 pupils who attended the school for 6 years without
    missing a day.
- speaker: Interviewer
  text: What kind of subjects in school did you like?
- speaker: Respondent
  text: I liked math and calligraphy best. I think I had good grades. I did not become a president but I became the vice-president
    of the class.
- speaker: Interviewer
  text: What kind of games did you play at school?
- speaker: Respondent
  text: We had physical education, and I liked to play on iron bars.
- speaker: Interviewer
  text: Did you like fishing?
- speaker: Respondent
  text: Yes, I liked it very much. After I came from school I threw down the books and went fishing. There were many in the
    neighborhood where I could fish.
- speaker: Interviewer
  text: What kind of fish could you catch?
- speaker: Respondent
  text: I caught carps, catfish and eels.
- speaker: Interviewer
  text: Did you eat them?
- speaker: Respondent
  text: I took them home and ate them.
- speaker: Interviewer
  text: Were there hills?
- speaker: Respondent
  text: They were far away. It was 1 ri to a hill and 1 ri to the sea. They planted barley after they harvested rice. They
    raised two crops a year.
- speaker: Interviewer
  text: Were there harvest festivals?
- speaker: Respondent
  text: I never heard of them. There were festivals but no harvest festivals.
- speaker: Interviewer
  text: Didn't you go to the sea?
- speaker: Respondent
  text: No, it was 1 ri to the sea. For excursion from the grade school we went to the sea and played there.
- speaker: Interviewer
  text: When did you graduate from the junior high school?
- speaker: Respondent
  text: I graduated when I was 15 years old.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I got on board a ship as an apprentice seaman for about 6 to 8 months. There was a man in my neighborhood who was
    on a ship and he got me the job. I carried food, washed dishes and sometimes washed seamen's clothes. When I had spare
    time I studied about the ship to become a seaman.
- speaker: Respondent
  text: When I was 18 I became a quartermaster of this 3,500 ton ship. That is why I can read the compass and the chart.
- speaker: Interviewer
  text: How long were you on the ship?
- speaker: Respondent
  text: Until I came to this country when I was 19 years old. During that time I went home once when I was 17 years old to
    see my mother for about 3 days. I haven't been back home since as I would lose my permanent residence here then.
- speaker: Interviewer
  text: How was the life on the ship?
- speaker: Respondent
  text: It is the lowest kind of life. I have no objection to the profession, but as the life on the ship is monotonous people
    gamble. When the ship arrive in a port they go to brothels, and they drink. I was disgusted with that kind of life, so
    when I was around 18 I decided to come to this country. As I had relatives here I was planning on having them summon me
    as a yobiyose, but since around 1918 yobiyose was not allowed, so I had no way but to jump the ship. I jumped from the
    ship when it arrived in Seattle.
- speaker: Interviewer
  text: Did you swim from the ship?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: How far did you swim?
- speaker: Respondent
  text: It was tied up at the pier, so I went under the pier and landed far away from the pier.
- speaker: Interviewer
  text: Were you scared then?
- speaker: Respondent
  text: Of course I was. I had about $30 which I exchanged at Diaren, but I lost it while I was swimming, and I was penniless
    when I landed. I was drenched to the skin when I landed. It was around 4 O'clock in the morning. A Japanese man whom I
    met on the street took me to a hotel. People of the hotel was kind. There was a young man who had just come from Japan,
    so I went to Montana with him to work on the railroad.
- speaker: Interviewer
  text: Did those people know then that you jumped from the ship?
- speaker: Respondent
  text: Yes, they did. As I was wet, the manager of the hotel lent me some dry clothes and dried my clothes for me. When I
    left for Montana the man who found me put my clothes in a suitcase.
- speaker: Interviewer
  text: What was your first impression of Seattle?
- speaker: Respondent
  text: I did not go outside. I stayed at the hotel for about 2 days, and then went to Montana. I worked in Montana for a
    year.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: It was railroad work of the Great Northern and Northern Pacific.
- speaker: Interviewer
  text: What did your work consist of?
- speaker: Respondent
  text: The main job was to clean the ashes in the engine. Troy, where we stayed was in between White Fish and Spokane. When
    the train came from White Fish we cleaned the ashes in the engine and turned the engine around in the roundhouse. Then
    it went back to White Fish. When the train came from Spokane we cleaned it and extinguished the fire. Then we turned it
    around in the roundhouse. Sometimes we cleaned the oil burners. Then the train that came from Spokane would go to White
    Fish, and ones that came from White Fish would go to Spokane.
- speaker: Interviewer
  text: Cleaning the ashes must have been hard work, wasn't it?
- speaker: Respondent
  text: Yes, it was hard.
- speaker: Interviewer
  text: Didn't you breathe in the ashes?
- speaker: Respondent
  text: No, because we were on top of the engine and cleaned from the opening of the fire box. When we held a handle and shook
    the engine the ashes fell down. Two or three months later I became an oil boy as I could speak English.
- speaker: Interviewer
  text: Where did you learn English?
- speaker: Respondent
  text: I learned it on the ship as we used English on the ship.
- speaker: Interviewer
  text: Was the ship an American ship?
- speaker: Respondent
  text: No, it was a Japanese ship, but the names of tools were in English. We read the compass in English. As I wanted to
    become a mate in the future I studied an English reader. I could not pronounce words well but I could read and write a
    little. That is why I became an oil boy. I worked on the railroad for a year.
- speaker: Interviewer
  text: What other kind of work did you do beside the work of an oil boy?
- speaker: Respondent
  text: I cleaned the ashes.
- speaker: Interviewer
  text: Were you afraid you might be caught when you jumped off the ship?
- speaker: Respondent
  text: Yes, I was. The owner of the hotel was from Hiroshima and was a very kind man. He told me that he did not have a passport
    from Vancouver, but he came to Seattle by the help of an immigration officer. The man whom I met on the street that morning
    did not seem to be a legitimate man. He went out at night and was on his way from a club or something when he saw me.
- speaker: Interviewer
  text: Did you think you would meet a Japanese?
- speaker: Respondent
  text: When I came to deliver a ship that was built in Japan I stayed at Milwaukee Hotel in Seattle before.
- speaker: Interviewer
  text: Then you knew the way around here, didn't you?
- speaker: Respondent
  text: Yes, I had a little knowledge of the city.
- speaker: Interviewer
  text: You were only 19 then. You were bold, weren't you?
- speaker: Respondent
  text: I think I was bold as I was young. If I was older I could not have done such a thing. I think I was reckless rather
    than bold.
- speaker: Interviewer
  text: Did you think you would find a way once you landed?
- speaker: Respondent
  text: Yes, because I knew there were Japanese stores and hotels. When I met this man he told me that there would be a change
    of policemen's shifts so he would take me to a hotel.
- speaker: Interviewer
  text: You were wet then, weren't you?
- speaker: Respondent
  text: Of course, I was. One restaurant was open and people were working inside, but nobody saw me. If I were caught I would
    have been sent back to Japan.
- speaker: Interviewer
  text: How far was the hotel from there?
- speaker: Respondent
  text: The hotel was only about a mile from the bay where I landed, but the place where I met this man was only about half
    a mile from the hotel.
- speaker: Interviewer
  text: Did the owner of the hotel protect you?
- speaker: Respondent
  text: Yes, he did. The following day his wife took me and a young man who came once to a train depot and told us not to
    bow as people could tell we just came from Japan if we bowed.
- speaker: Respondent
  text: I worked on the railroad for a year and saved around $800. At first I was going back to Japan after I saved the money
    but I thought I was not in a hurry so I had better learn English while I was here. I quit the railroad job after a year
    and went to Seattle. I worked in the daytime and attended a night school, which was only 3 nights a week. Then a friend
    told me that at the Japanese and Chinese Mission which is on the basement of the First Presbyterian Church they teach
    English free, so I started going there. On Sundays and Thursdays they taught us Bible, mainly the Old Testament from 7:30
    to 8:30. At 8:30 we assembled and sang hymns. They gave us small pocket Bible and made us memorize the Bible verses. At
    the end we prayed the Lord's Prayer and went home. As I continued that for a long time I learned a lot about the Old Testament.
    At first there was no Presbyterian Church. A few years later, a famous pastor, Dr. Mark Matthews helped build the Japanese
    and Chinese churches. Since then they started teaching Bible at the night school of the Presbyterian church.
- speaker: Respondent
  text: I quit the railroad work after a year and came to Seattle in the summer of 1920. When I saw many cars I wanted to
    become an auto mechanic, so I worked as the mechanic's apprentice without pay at Ikeda brothers used car business. At
    that time I was staying at the Buddhist Church for $6 a month with breakfast and supper. Once a week they gave us clean
    sheets so we changed our own sheets. I ate lunch at work.
- speaker: Respondent
  text: The older Mr. Ikeda was the elder of the Japanese Congregational Church, and the younger brother was the deacon. From
    the following Sunday after I started working I attended the Congregational Church. In those days there were 3 services
    on Sunday; the morning worship service, the Christian Endeavor in the afternoon and the evangelical meeting in the evening.
    On December 19, 1920 I was baptized by Rev. Abe. Since then I have been a Christian.
- speaker: Respondent
  text: I worked at Ikeda Co. for about 10 months without pay. By the end I was getting about $10 a month as spending money.
    As I could not stay at the Buddhist Church I stayed in a rooming house nearby. After 10 months my savings was getting
    low, so I quit Ikeda Co. and became a driver of a Japanese grocery store, and sometimes I drove trucks for a transport
    company. As I could not speak English well I became a chauffeur of about 3 white families to learn to speak English. Gradually
    I could converse with the white people better.
- speaker: Interviewer
  text: When I was 25 years old I got married. I knew my wife's aunt. At that time my wife was learning etiquette in Oregon.
    Her aunt brought her to the church and introduced her to me and asked me to marry her. I told them that I did not have
    a passport, but they said that did not matter. They asked me if I was going back to Japan some day, so I said I would,
    but I have not been back yet. My parents died and my wife's aunt passed away, too. We were married in March. At that time
    I was working at a white family. In July of that year her father in Oregon became ill and needed help, so I quit the chauffeur's
    job and became a farmer.
- speaker: Interviewer
  text: About how many years did you work as a chauffeur?
- speaker: Respondent
  text: I think I stayed at that family for only about a year.
- speaker: Interviewer
  text: Did you get married at the church?
- speaker: Respondent
  text: Yes, we were married at the Congregational Church with my pastor officiating the wedding.
- speaker: Interviewer
  text: What do you remember about the time you worked as a chauffeur?
- speaker: Respondent
  text: I had to have a good reference in order to get a good job as they were rich families. At first I started from a cheap
    work. In the first house I went to were a deaf old lady and her sister. I worked there for about 4 months. I had to wash
    clothes and waited at the table but I put up with it as I needed the reference. For a while after that I could not find
    a job so I worked as a driver for a grocery store. The second family I worked at was a Jewish family. He sold Warner Brothers
    pictures to Seattle area. He liked Japanese. My salary at the first family was $35 a month, but he paid me $60 a month
    at first and raised it to $70. The third family was Mr. & Mrs. Jenkins. They had a house in Seattle but sold that house
    and lived in a summer house at Three Tree Point between Seattle and Tacoma. I drove Mrs. Jenkins to Seattle every day,
    and Mr. Jenkins drove his Lincoln. He was a boilermaker at a shipyard.
- speaker: Interviewer
  text: Were you married then?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Where did your wife stay?
- speaker: Respondent
  text: She worked as a salesgirl at Furuya Company in Seattle. Mr. Furuya liked her so much that he took her father's place
    in our wedding. Before he opened his store in the morning he used to gather his employees and had a pastor come and talk
    to them.
- speaker: Interviewer
  text: About how many employees were there?
- speaker: Respondent
  text: I think there were 20 to 30 employees.
- speaker: Interviewer
  text: Was it including the employees at his bank?
- speaker: Respondent
  text: I think bank employees were not included. It was just the store.
- speaker: Interviewer
  text: Did your wife come from Japan?
- speaker: Respondent
  text: Yes, she came here in 1918 when she was about 16 years old. After she came here her father told her to study English,
    but she didn't, saying that she would go back to Japan soon. That is why she still doesn't understand English.
- speaker: Interviewer
  text: Did you work as a chauffeur altogether about a year?
- speaker: Respondent
  text: No, I worked almost 2 years as a chauffeur. The reason why I quit the job was that when my Jewish boss went to New
    York for a month he wanted me and the maid to stay in the house without pay. It was all right with me, but the maid did
    not like the idea and said, "Let's quit", so I did.
- speaker: Interviewer
  text: It wasn't funny then, was it?
- speaker: Respondent
  text: If I was not found by the Immigration Office for 5 years I could get a permanent residence, and 5 years had passed.
    If I did not go abroad I had no worry of getting sent back to Japan. That is why I enjoyed life.
- speaker: Interviewer
  text: Did you have any funny experience or made mistakes?
- speaker: Respondent
  text: When I washed clothes at the first house I was scolded by the lady for washing the underwears and pretty clothes together.
    I didn't know because she did not tell me.
- speaker: Interviewer
  text: Was the chauffeur's work very busy?
- speaker: Respondent
  text: It was quite easy. The more I get paid the easier the work was as they were rich people.
- speaker: Interviewer
  text: Do you have any other recollections about the time you worked as a chauffeur?
- speaker: Respondent
  text: I don't have any special recollection.
- speaker: Interviewer
  text: Then things went smoothly, didn't they?
- speaker: Respondent
  text: Yes, they did. At one time I caught cold at the Jewish house. Mrs. Brin said, "I will fix you tonight" and made me
    a glass of lemonade. Then she said to her husband, "Mr. Brin give me the stuff in the closet." It was dry in those days
    and there wasn't any liquor, but she got a bottle of whiskey from the closet and put some in the lemonade, and told me
    to drink it and go to bed. Before I went to bed she gave me 2 Aspirin. The next morning the cold was gone.
- speaker: Respondent
  text: I stayed at the white people's house while I worked as a chauffeur, but I did not crave for Japanese food. I ate everything.
- speaker: Interviewer
  text: Didn't you get homesick?
- speaker: Respondent
  text: No, I didn't.
