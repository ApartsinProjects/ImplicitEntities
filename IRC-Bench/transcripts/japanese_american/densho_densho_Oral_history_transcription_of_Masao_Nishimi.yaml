collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Are you Nisei?
- speaker: Respondent
  text: No. I'm Issei.
- speaker: Interviewer
  text: Are you from Japan?
- speaker: Interviewer
  text: I'm not Issei in a real sense. It was called upon. I don't know too much about the old days.
- speaker: Interviewer
  text: Don't worry. At first, I'll ask you about the times in Japan. Then, the time when you came here, your experiences
    after you came to the United States, the camp life and the post-camp days. I'll ask you about these things in chronological
    order. I'd like you to speak slowly. Can we see the past?
- speaker: Respondent
  text: I know general things, but I don't know anything complex.
- speaker: Interviewer
  text: Don't worry. Let's see. First of all, let's start with your...
- speaker: Interviewer
  text: Masao. Which part of Japan are you from?
- speaker: Respondent
  text: Wakayama-ken.
- speaker: Interviewer
  text: Wakayama-ken in Japan. Oh. How many brothers and sisters did you have?
- speaker: Respondent
  text: I had three brothers and two sisters. There are two left now—my brother and myself. Only two are left. Everybody else
    is gone.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: 1899. How old are you now?
- speaker: Respondent
  text: I'm 74 now. In less than half a year, I shall be 75 from December the 1st.
- speaker: Interviewer
  text: I see. Talking about your home, what were your father and mother?
- speaker: Respondent
  text: My father was a carpenter. He built ordinary homes, too; however, he was a shrine carpenter in those days. I hear
    that he was a carpenter who specialized in temple or shrine architecture in Japan. He came to the United States. He didn't
    come to the United States directly. He had gone to Australia. In Australia, he had been waiting for a chance to come to
    the United States. There was an American military post there, and some type of job was available on board. Being a carpenter,
    he had taken his tools with him. He reached San Francisco. He would have been permitted to land in San Francisco. Not
    knowing that, he tied his tools with a rope and cast them overboard. Tying his clothes on his head, he swam from the offing
    to the pier. The military boat didn't anchor at the pier, but anchored offshore.
- speaker: Respondent
  text: He swam and got there. Then, he saw one Japanese person coming. He asked the man about Fourth Street, where Japanese
    people used to live. I assume he went there. It was such a long time ago.
- speaker: Interviewer
  text: What year was it?
- speaker: Respondent
  text: It was his first time. It was before my birth. It was five years before I was born.
- speaker: Respondent
  text: Then, in 1894 or 1893 or 1894—it could be before that. Your father came to San Francisco.
- speaker: Interviewer
  text: I don't know too much in detail, but I hear that he landed in San Francisco and got a job with the railroad company
    as a repairman or something. He had beriberi—do you know beriberi?
- speaker: Respondent
  text: He had it. He recuperated at San Pedro Hospital for a while. After a few years—a year or two, I'm not sure—he went
    back to Japan. He returned to Japan once. Next time he came, he came to the United States directly. While he was back
    in Japan, my elder brother, I, and my younger sister were born. Let's see... he left for the United States after a three-
    or five-year stay.
- speaker: Interviewer
  text: What was your father's motivation in coming here?
- speaker: Respondent
  text: Well, our village was so small that not too many jobs were available there. He had to find some way to get an income—by
    any means. My mother's family had some kind of boat in the old days.
- speaker: Interviewer
  text: Were they fishermen?
- speaker: Respondent
  text: No, they weren't. It was a cargo port.
- speaker: Interviewer
  text: A cargo boat?
- speaker: Respondent
  text: It was big. What was it called? It was in Japan a long time ago—from Osaka.
- speaker: Interviewer
  text: A transport ship?
- speaker: Respondent
  text: A transport ship. Kaiyo-Maru. Tenyo-Maru. It was Tenyo-Maru. I knew it when I was little. It sailed on the TIVE. It
    transported cargo to Osaka and from Osaka to somewhere else. They had that type of business. He came to the United States
    because he had to find a way to get an income. After he came to the United States, I understand that he didn't practice
    carpentry. When I came here, he was working with an orange and lemon company, owned by white people. There, he was driving
    nails on packing covers because he was a carpenter.
- speaker: Interviewer
  text: What type of person was your mother?
- speaker: Respondent
  text: She was born as the first daughter of the Sekidos. She had a younger sister and a younger brother. Her younger brother
    went to a school of pharmacy in Osaka to become a pharmacist upon his graduation from elementary school. I don't know
    how long he attended there. One summer, he suffered from beriberi and died on the way back home in the train. Only two
    daughters were left. Since my mother had already been married, her younger sister married an adopted groom who succeeded
    to the Sekido family.
- speaker: Interviewer
  text: Was your mother a gentle lady?
- speaker: Respondent
  text: She was a nice lady. In addition, she was rather business-minded.
- speaker: Interviewer
  text: Business-minded?
- speaker: Respondent
  text: Her family—my grandfather and grandmother—were business people. They were fond of business.
- speaker: Interviewer
  text: Did you still remember anything that you were taught by your father and mother in Japan?
- speaker: Respondent
  text: For over ten years, I never knew my father at all; until I came to the United States. When I came here, I was sixteen
    years old. I met him for the first time then. I had never known him before. I didn't learn many lessons from him.
- speaker: Interviewer
  text: What about your mother?
- speaker: Respondent
  text: It was a long time ago. I don't think she explained anything to me in detail. Anyway, she was a nice, gentle lady.
- speaker: Interviewer
  text: What about your school?
- speaker: Respondent
  text: Yes, yours.
- speaker: Interviewer
  text: Talking about school, I graduated from an elementary school in our village.
- speaker: Respondent
  text: How long? Six years?
- speaker: Interviewer
  text: I wonder how far I went. I may have gone as far as the second grade of the higher elementary school.
- speaker: Interviewer
  text: Is that so?
- speaker: Respondent
  text: Then, I attended a business school in Osaka. There was a school called Meisei Business School. I'm not sure if it
    is still there or not. It was a Catholic school. I was attending there. In the meantime, my father stopped sending money
    for my tuition fees. My elder brother had come here already by that time.
- speaker: Interviewer
  text: He to the United States?
- speaker: Respondent
  text: To the United States. While I was attending school, he stopped sending money. Instead, he wrote me to come to the
    United States, enclosing papers for my passport. I left school in the middle of the term and came to the United States.
- speaker: Interviewer
  text: Do you remember anything about your school days in Japan? What was fun to you?
- speaker: Respondent
  text: Nothing was particularly fun for me.
- speaker: Interviewer
  text: Anything sad?
- speaker: Respondent
  text: Nothing in particular. While I was attending the school I've mentioned before, I wanted to become a diplomat. I dreamed
    about it, thinking that if I learned English, I would be able to go to some foreign countries and the United States. At
    the same time, I was interested in business. I took after my mother. I was inclined toward business. I attended business
    school of my own free will.
- speaker: Interviewer
  text: Do you remember your friends or teachers?
- speaker: Respondent
  text: One teacher at the elementary school was old, but he was a nice person. He had asthma. He commuted from a distant
    place. He came to school. It was either before my departure or when I returned to Japan for the last time—I visited him
    without knowing whether or not he was there. He had already died by then. The other teacher was commuting from a closer
    place. He was young. Six years ago, when I returned to Japan six years ago, I went to see him. I had visited him before
    I left for the United States. I knew the place, but it had developed so much that it looked different from before. I asked
    the neighbors and was told that his son, son-in-law, was a practitioner there. I visited the doctor and saw him in an
    unkempt condition. His white outfit was dirty. I wondered why he looked so unkempt although he was a doctor. Then, I said
    I came to see Mr. Suematsu. I visited him in November. I was told that Mr. Suematsu had died a few months before. One
    month after Mr. Suematsu's death, his wife died. So, he was downcast and looked unkempt. It felt very sorry for him.
- speaker: Interviewer
  text: What do you mean by a good teacher?
- speaker: Respondent
  text: Well, he was somewhat kind. He was kind away from school as well.
- speaker: Interviewer
  text: Two teachers?
- speaker: Respondent
  text: Two teachers.
- speaker: Interviewer
  text: What was your family religion?
- speaker: Respondent
  text: In Japan, what was it? It may have been the Yen sect. I don't really know.
- speaker: Interviewer
  text: Were you raised in a town or a village?
- speaker: Respondent
  text: In a village.
- speaker: Interviewer
  text: What kind of village was it?
- speaker: Respondent
  text: It was a quiet town and village. A lot of people were from the village.
- speaker: Respondent
  text: So, they established the Tawara Villagers' Association in the United States.
- speaker: Interviewer
  text: The Tawara Villagers' Association. What was it all about?
- speaker: Respondent
  text: The Tawara Villagers'—
- speaker: Respondent
  text: Here in the United States.
- speaker: Interviewer
  text: Village—here?
- speaker: Respondent
  text: Here. It was something. Almost one person from each family in the village came to the United States.
- speaker: Respondent
  text: A few persons came from some families. Fathers and children came. There was almost a ratio of one person per family.
    There weren't enough means for making a living in the village. You couldn't rely on farming alone. So, people went abroad.
    If not abroad, people went to other places like Osaka or Tokyo. People who could afford it attended school.
- speaker: Interviewer
  text: Not being a farmer, did your father own any land?
- speaker: Respondent
  text: He didn't own any land. When he returned—it's previous to pic. When he returned, he bought some.
- speaker: Interviewer
  text: I see. Were there any wars when you were in Japan? The Sino-Japanese War or the Russo-Japanese War?
- speaker: Respondent
  text: Well, which was first, the Sino- or the Russo-Japanese War? The Sino-Japanese War, wasn't it?
- speaker: Interviewer
  text: I’d say it was the Russo-Japanese War which occurred when I was little. I remember I joined a procession with lanterns.
- speaker: Interviewer
  text: When you left Japan, your father was here.
- speaker: Respondent
  text: Yes. He was here. When I applied for my passport in Japan to come here, I was a minor. My passport said I was to be
    accompanied by my mother.
- speaker: Interviewer
  text: You were young then.
- speaker: Respondent
  text: I was young.
- speaker: Interviewer
  text: Were you sixteen years old?
- speaker: Respondent
  text: Since I was sixteen—it was in 1916—I hadn't become seventeen yet. Though the passport said I was to be accompanied
    by my mother, she made up a reason not to come. I came by myself.
- speaker: Interviewer
  text: Why couldn't your mother make it?
- speaker: Respondent
  text: She had planned it that way from the beginning.
- speaker: Respondent
  text: She didn't intend to go, but couldn't have gotten my passport otherwise.
- speaker: Interviewer
  text: Didn't your mother want to come here?
- speaker: Respondent
  text: She could have been better off if she had come here. As a matter of fact, my younger sister and everybody else came
    here. Since my father had been here, my mother had a hard time bringing up the children all by herself.
- speaker: Interviewer
  text: What had you imagined about the United States?
- speaker: Respondent
  text: I had thought it would be a wealthy country. Not knowing that I would actually be coming, I had wanted to come. I
    had a hope.
- speaker: Interviewer
  text: What type of people were on board the boat?
- speaker: Respondent
  text: In those days, people who had returned to Japan to marry were on board going back to the United States with their
    wives. There were some people from our village on board.
- speaker: Interviewer
  text: The people you had known?
- speaker: Respondent
  text: Yes, the people I'd known.
- speaker: Interviewer
  text: Then, you weren't lonely.
- speaker: Respondent
  text: No, I wasn't lonely.
- speaker: Interviewer
  text: Did you stop in Hawaii?
- speaker: Respondent
  text: I stopped in Hawaii on the way here.
- speaker: Interviewer
  text: You stopped there overnight?
- speaker: Respondent
  text: Yes. I stayed there overnight. It was all right to stay in Hawaii, but I went to a hotel run by the Japanese. It wasn't
    a gorgeous hotel. It was a two-storied wooden building with railings. There was a hallway right outside the room. There
    were railings and a patio there. I saw a noisy crowd of people in the patio. I wondered what had happened. They thought
    I was an alien. They mistook me for a thief.
- speaker: Respondent
  text: I don't know. Coming to me and talking to me, they found out that I spoke Japanese. They realized they'd made a mistake.
    Such a thing actually happened. A alone person—there.
- speaker: Interviewer
  text: Did various things occur on the ship?
- speaker: Respondent
  text: Not too much on the ship. I went on board at Kobe. It was called Shugyo-Maru. We arrived at Yokohama. From Yokohama
    I went to Tokyo to see a relative who was also my senior at school. He was attending a school of pharmacy in Tokyo. I
    left my belongings on the ship. I came back. I went to Tokyo by myself, but I couldn't see him after all. I was lost in
    Tokyo. Though I asked a policeman about his place, I couldn't make it. After all, I couldn't see him. I had no choice
    but to come back to Yokohama. When I came back, either the front or the back of the ship—the entrance had been changed.
    It had been changed. I tried to go there. I had bought some fruit at Kobe and went on board with it. Everything had been
    stolen. The porters must have stolen it. It may have been the crew. Before departure, a shop was set up in the ship. They
    sold things to us. Though it wasn't compulsory, the shop was meant for us to buy. Such things happened on the ship.
- speaker: Interviewer
  text: Was anybody on board going because of a picture marriage?
- speaker: Respondent
  text: Well, maybe.
- speaker: Interviewer
  text: You were young then.
- speaker: Respondent
  text: I didn't know. I didn't realize. Maybe there was.
- speaker: Interviewer
  text: How did you feel when you saw the United States for the first time?
- speaker: Respondent
  text: I didn't feel anything special in Hawaii. Reaching San Francisco, I was amazed at the tall buildings. After landing,
    we were put on Angel Island overnight for a physical examination. I passed it all right.
