collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Whom were you most influenced by?
- speaker: Respondent
  text: I think it was my mother.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was a simple and honest farmer. She could not tell jokes or flattery.
- speaker: Interviewer
  text: What kind of games did you play when you were young?
- speaker: Respondent
  text: We did not play games like young people nowadays. We enjoyed fishing in the stream. In the country we did not go to
    dance or movies or go hiking with friends like they do in the city, much less 50 or 60 years ago.
- speaker: Interviewer
  text: Did you work after you finished school?
- speaker: Respondent
  text: I stayed at a house of my relative who was a carpenter for about a year. As I was coming to America in about a year
    my grandfather thought I should not be idle during that time, so he asked this man to let me stay there.
- speaker: Interviewer
  text: Was the carpenter's work hard?
- speaker: Respondent
  text: Yes, it was. We had to work from early in the morning. That did a lot of good for me.
- speaker: Interviewer
  text: Why was it?
- speaker: Respondent
  text: I could not sleep late but had to get up promptly in the morning, and serve my seniors. I don't mind getting up early
    in the morning now.
- speaker: Interviewer
  text: What kind of work did you do then?
- speaker: Respondent
  text: Not much of a work except taking orders here and there.
- speaker: Interviewer
  text: About what time did you get up in the morning?
- speaker: Respondent
  text: I don't remember what time but it was quite early. I think it was around 5 or 5:30 in the morning.
- speaker: Interviewer
  text: Do you remember anything about the carpenter's work?
- speaker: Respondent
  text: No, there isn't anything in particular.
- speaker: Interviewer
  text: Were you trained much?
- speaker: Respondent
  text: I was strongly built for my age, so I could do a man's job when I was young. At school I was a naughty boy and was
    strong in Sumo. I think I was the third strongest in Sumo in our school. The first and the second strongest men have already
    passed away.
- speaker: Interviewer
  text: What kind of subjects did you like at school?
- speaker: Respondent
  text: I didn't have any subject I specially liked.
- speaker: Interviewer
  text: Do you remember your teachers?
- speaker: Interviewer
  text: Were there good teachers?
- speaker: Respondent
  text: Yes, there were. A young teacher named Mr. Kobayashi from Osaka instructed me well in Sumo. It has become an old dream.
- speaker: Interviewer
  text: What did you learn from your mother and grandparents?
- speaker: Respondent
  text: They didn't tell me what to do.
- speaker: Interviewer
  text: Didn't they teach you about attitude or what is important for a person?
- speaker: Respondent
  text: No, they didn't teach me anything like that.
- speaker: Interviewer
  text: Whom did you learn those things from?
- speaker: Respondent
  text: Since I came to this country I followed examples of others and according to my experience or through books I learned
    what I should do.
- speaker: Interviewer
  text: Did you learn about Sonkoku Ninomiya in school?
- speaker: Respondent
  text: Yes, I did. What impressed me most was Masashige Kusunoki's instruction to his son at the time he went to the battle
    at Minatogawa. He said, "A lion kicks its 3-day-old cub down the cliff to try its strength. You are already 11 years old
    now. Realize what I say, and after I die gather the men and defeat the enemy." He meant to teach his son that when a man
    is in a very bad situation he should not be discouraged but should rise up. That was the teaching that impressed me most.
- speaker: Interviewer
  text: Did that teaching support your morale?
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: It was the Zen sect.
- speaker: Interviewer
  text: Were your grandparents religious people?
- speaker: Respondent
  text: The people in olden days were all very religious. They did not let us cook meat in the house. They offered cooked
    rice at the family altar before we could have breakfast.
- speaker: Interviewer
  text: What kind of village was yours?
- speaker: Respondent
  text: It was a very quiet and peaceful little village. We lived 18 blocks from the beach. The school, village office and
    the post office were all on the beach. We commuted to school every day walking 18 blocks with our lunch.
- speaker: Interviewer
  text: Was it fun?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Could you fish in the sea?
- speaker: Respondent
  text: Yes, we could. It is a tourist resort now. There were 18 blocks to the sea, but we lived closer to a river. There
    were sweetfish, carp and eel in the river. In summertime we went to the river after school and fished.
- speaker: Interviewer
  text: Were there any disasters in the village?
- speaker: Respondent
  text: There was no earthquake, but there was a big forest fire and a few houses at the foot of the hill were burnt. I was
    very scared then. That was about the only thing that happened.
- speaker: Interviewer
  text: Do you remember about any war?
- speaker: Respondent
  text: I was very little at the time of the Russo-Japanese War, so I don't remember anything.
- speaker: Interviewer
  text: You must have heard about America from your father. What kind of country did you think America was?
- speaker: Respondent
  text: I didn't know anything about America. I only imagined that it was a big and rich country as people came back to Japan
    with fortune.
- speaker: Interviewer
  text: Didn't your father write anything about America?
- speaker: Respondent
  text: No, he didn't much.
- speaker: Interviewer
  text: Did he send you money?
- speaker: Respondent
  text: Yes, he did at New Years and at Bon.
- speaker: Interviewer
  text: Did your mother farm?
- speaker: Respondent
  text: Yes, she did.
- speaker: Interviewer
  text: Did you know you were coming to America?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Did you want to come to America?
- speaker: Respondent
  text: Yes, I did. I was bored staying in Japan so I wanted to come to America.
- speaker: Interviewer
  text: Did many people come to America from your village?
- speaker: Respondent
  text: Yes, they did. Many came here in those days but most of them went back to Japan. Six or seven people are still here.
- speaker: Interviewer
  text: Did those who went back to Japan return home in glory?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: What did they do after they went back to Japan?
- speaker: Respondent
  text: Some farmed and some moved out of the village as it was hard to live in the village.
- speaker: Interviewer
  text: Did you want to go back to Japan in glory?
- speaker: Respondent
  text: I did not have a definite ambition.
- speaker: Interviewer
  text: Did your father summon you when you were 17?
- speaker: Respondent
  text: Yes, I was a 'Yobiyose'. In those days there were immigrants and non-immigrants. Students and 'yobiyose' were classified
    as non-immigrants. I came here as a non-immigrant.
- speaker: Interviewer
  text: Was there difference in treatment between immigrants and non-immigrants?
- speaker: Respondent
  text: Yes, there was.
- speaker: Interviewer
  text: How were they different?
- speaker: Respondent
  text: Immigrants were discriminated as immigrants. Non-immigrants were treated differently.
- speaker: Interviewer
  text: What port did you sail from?
- speaker: Interviewer
  text: How did you feel when you left Japan?
- speaker: Respondent
  text: I did not have any special feeling.
- speaker: Interviewer
  text: Did you feel lonely?
- speaker: Respondent
  text: No, I didn't. Four or five days after we left the ocean was so rough that I was afraid the ship might sink as it was
    a 6,000 ton small ship.
- speaker: Interviewer
  text: Were you with your mother?
- speaker: Respondent
  text: No, just myself alone.
- speaker: Interviewer
  text: Didn't your mother come with you before?
- speaker: Respondent
  text: No, she didn't. She came to America with a relative who was here, and went back to Japan.
- speaker: Interviewer
  text: Were there all kinds of people on board the ship?
- speaker: Respondent
  text: Yes, there were.
- speaker: Interviewer
  text: What kind of people were there?
- speaker: Respondent
  text: There were some people who drank and some who gambled.
- speaker: Interviewer
  text: Were there picture brides?
- speaker: Respondent
  text: Yes, there were.
- speaker: Interviewer
  text: Did you have a chance to talk with them?
- speaker: Respondent
  text: As I was young I would rather go around than talking with them.
- speaker: Interviewer
  text: Do you have any recollection of the days on board the ship?
- speaker: Respondent
  text: Nothing special except the sea was rough and the ship rocked. We stopped at Vancouver at first. I still have the impression
    of that time.
- speaker: Interviewer
  text: How was it?
- speaker: Respondent
  text: Vancouver looked very pretty from the ship. There was lawn along the beach. The houses were painted white and red.
    When I looked at the scenery from the ship it looked like a picture. That was the first time I saw a foreign country so
    I was impressed. From there we went to Seattle and landed there.
- speaker: Interviewer
  text: Did you get a physical examination?
- speaker: Respondent
  text: No, I didn't. I just had my eyes examined.
- speaker: Interviewer
  text: Didn't you get a physical examination in Japan?
- speaker: Respondent
  text: No, I didn't. As I was told that they are strict about eyes, I went to an eye doctor and had them checked, but my
    eyes were not bad. There was no examination when I landed.
- speaker: Interviewer
  text: Could you land at Seattle right away?
- speaker: Respondent
  text: I stayed at the Immigration Office for 2 or 3 days, and landed one by one.
- speaker: Interviewer
  text: What did they check at the Immigration Office?
- speaker: Respondent
  text: An examiner made us read a piece of paper written in Japanese. I think they tested our academic attainment.
- speaker: Interviewer
  text: Did Japanese give that test?
- speaker: Respondent
  text: No, an American. Of course there was a Japanese interpreter. I read that paper, and that was the only examination.
- speaker: Interviewer
  text: What kind of place did you stay for 2 or 3 days?
- speaker: Respondent
  text: We were put inside a wired fence where we could not get out freely.
- speaker: Interviewer
  text: Did you feel uneasy?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: When did you meet your father for the first time?
- speaker: Respondent
  text: I took a ship from Seattle to San Pedro. When I arrived there my father came to greet me.
- speaker: Interviewer
  text: How did you feel when you saw your father for the first time?
- speaker: Respondent
  text: I don't remember how I felt. I have a vague memory.
- speaker: Interviewer
  text: Did you call him, 'Otohsan' (Dad) right away?
- speaker: Respondent
  text: It was not easy.
- speaker: Interviewer
  text: What did your father say to you?
- speaker: Respondent
  text: I don't remember now.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: We went to Japantown and stayed there one or two nights. Then we went to San Pedro.
- speaker: Interviewer
  text: How did you feel when you saw the hill?
- speaker: Respondent
  text: I thought it was a terrible place. From the following day I started working using horses. We were clearing the land
    then, so we dug out rocks, put them on horses and took them to the field. Those days were better than now.
- speaker: Respondent
  text: Because there are too many Japanese gathered in town, and they do not have good reputation. In those days we worked
    hard.
- speaker: Interviewer
  text: About what time did you start working?
- speaker: Respondent
  text: As soon as it became light, and we worked late at night. In those days farmers' wives worked wearing same clothes
    as men's. You cannot see such a sight even if you wanted to.
- speaker: Interviewer
  text: Who cooked?
- speaker: Respondent
  text: The housewives did.
- speaker: Interviewer
  text: How many partners did your father have?
- speaker: Respondent
  text: Just one partner and himself. In those days Japanese farmers at harvest season used mostly Mexicans, as there were
    not enough Japanese.
- speaker: Interviewer
  text: What did you do during the summer?
- speaker: Respondent
  text: We had to pick the fruits during the summer.
- speaker: Interviewer
  text: Didn't you have water in the summer?
- speaker: Respondent
  text: No, we didn't. At that time we cultivated and prepared the land for planting.
- speaker: Interviewer
  text: You were farming in a large scale, weren't you?
- speaker: Respondent
  text: Yes, we were.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: About a year. Then I moved around.
- speaker: Interviewer
  text: What did you do then?
- speaker: Respondent
  text: I picked oranges. There were orange ranches where Japanese boss gathered 20 to 30 farm laborers. There is no such
    place nowadays but in those days there were many such camps especially in Riverside. I worked at such a place.
- speaker: Interviewer
  text: Did your father let you go?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: About how much did you get paid working at an orange ranch?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: Were there many single men then?
- speaker: Respondent
  text: Yes, they were all single.
- speaker: Interviewer
  text: Did single men gamble in those days?
- speaker: Respondent
  text: Yes. Those who gambled led fast lives. There was a gambling house named 'Tokyo Club' in Japantown in San Pedro.
- speaker: Interviewer
  text: How long did you work at orange ranches?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: Did you work 4 to 5 years?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: How was the life in such a camp?
- speaker: Respondent
  text: We get up early in the morning, eat breakfast and start working around 8 o'clock. We come home in the evening, and
    eat supper. We repeat that kind of daily routine.
- speaker: Interviewer
  text: Did you work from Monday to Saturday?
- speaker: Respondent
  text: Yes. We didn't work on Sunday.
- speaker: Interviewer
  text: What did you do on Sunday?
- speaker: Respondent
  text: Nothing much. I cleaned my room or washed clothes or went shopping in town.
- speaker: Interviewer
  text: Did you go out to see movies?
- speaker: Respondent
  text: Very seldom. I don't think I had the time.
- speaker: Interviewer
  text: What were you doing during the Depression?
- speaker: Respondent
  text: I had a little grocery store on Washington Blvd. In those days when I took the checks the customers gave me to the
    bank they...
- speaker: Interviewer
  text: How long did you manage the store?
- speaker: Respondent
  text: About a year or two as business was dull.
- speaker: Interviewer
  text: What was your sentiment towards the white people then?
- speaker: Respondent
  text: I was not particularly friendly nor hated them.
- speaker: Interviewer
  text: Have you ever been excluded as an individual?
- speaker: Respondent
  text: After the war broke out I had such an experience in Colorado. When I went to a restaurant there I was not served.
    That is about the only such experience.
- speaker: Interviewer
  text: Until then you have never been excluded as an individual?
- speaker: Respondent
  text: No, because I belonged to a church, and the white people who go to church were not that kind. I heard that many people
    were excluded.
- speaker: Interviewer
  text: What kind of thing did you hear?
- speaker: Respondent
  text: Some people were called 'Jap'.
- speaker: Interviewer
  text: When did you start going to church?
- speaker: Respondent
  text: Around 1924. In those days there was night school at church, so I went there and studied English. Not like today the
    Japanese community was very small. When we went downtown we never went to Broadway or Hill Street because Japanese were
    not served there, so we went to Japantown or Main Street. The places Japanese went was limited. I think the Japanese community
    before the war was more religious. Nowadays young people have places to go and play so they do not go to church.
- speaker: Interviewer
  text: Were there many Japanese women around the time you started going to church?
- speaker: Respondent
  text: Yes, there were. The immigration law came in effect in 1924, so before 1924 many Japanese women came here.
- speaker: Interviewer
  text: What was the hardest thing when you first came here?
- speaker: Respondent
  text: That was when I became ill.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: When I was 23 years old I suffered periostitis.
- speaker: Interviewer
  text: How long did you suffer from it?
- speaker: Respondent
  text: It changed my life, so to speak. Since then I could not do any rough work.
- speaker: Interviewer
  text: Were you hospitalized?
- speaker: Respondent
  text: Yes, I was. I think it is hard to start having faith unless we experience suffering.
- speaker: Interviewer
  text: What did you do about the doctor's and hospital expense when you became ill?
- speaker: Respondent
  text: My friends who came from the same village paid them for me.
- speaker: Interviewer
  text: What did you do for recreation in those days?
- speaker: Respondent
  text: I didn't do anything. Only once in a while I had picnic with the Kenjin Kai (Prefectural Association). In those days
    every year the Japanese Training Fleet came here. At that time we reserved Lincoln Park and all the Japanese gathered
    there and entertained the sailors.
- speaker: Interviewer
  text: Did you belong to the Japanese Association and other organizations?
- speaker: Respondent
  text: I just belonged to the church.
- speaker: Interviewer
  text: Did you just belong to the church?
- speaker: Respondent
  text: Yes, that was good because those who were associated with the Japanese Association were arrested when the war broke
    out. Those who taught Japanese Language School were also arrested by F.B.I. I did not belong to any of those organizations
    but still F.B.I. came to see me but I was not arrested. I think there was a misunderstanding.
- speaker: Interviewer
  text: How did you learn English?
- speaker: Respondent
  text: I learned it at night school.
- speaker: Interviewer
  text: Did you go to school soon after you came here?
- speaker: Respondent
  text: No, after I started living in town and started going to church.
- speaker: Interviewer
  text: Did your father continue to farm for a long time?
- speaker: Respondent
  text: He went back to Japan not long after that.
- speaker: Interviewer
  text: Did he leave behind a loan then?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: Did you give up your grocery store during the Depression?
- speaker: Respondent
  text: Yes, I sold the store.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I got into shoe business. I was in that business the longest.
- speaker: Interviewer
  text: Were you in that business till the war broke out?
- speaker: Respondent
  text: Yes, it till the war started, and after the war I started the shoe business here again. While I was in the camp I
    was in charge of a manager.
- speaker: Interviewer
  text: Were you successful in shoe business?
- speaker: Respondent
  text: I can't say I was successful. I just made a living.
- speaker: Interviewer
  text: Did you marry?
- speaker: Interviewer
  text: Did your wife pass away?
- speaker: Respondent
  text: No, we are divorced.
- speaker: Interviewer
  text: Was it before the war?
- speaker: Respondent
  text: No, after the war.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: Soon after we came back from the camp after the war.
- speaker: Interviewer
  text: Did you manage the shoe store all by yourself?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What kind of headaches did you have as a cobbler?
