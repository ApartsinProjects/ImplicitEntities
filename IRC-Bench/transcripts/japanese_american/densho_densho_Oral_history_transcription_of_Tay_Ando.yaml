collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name.
- speaker: Respondent
  text: My name is Tay Ando. It was Teiichi but my name shortened to "Tay" when I received my U.S. citizenship.
- speaker: Interviewer
  text: What part of Japan did you come from?
- speaker: Respondent
  text: I came from Aichi Prefecture.
- speaker: Interviewer
  text: Do you remember some happening while you were in Japan?
- speaker: Respondent
  text: I guess because of my old age, I do not recollect very much.
- speaker: Interviewer
  text: Did you attend school?
- speaker: Respondent
  text: I did not attend school at all.
- speaker: Interviewer
  text: Were there schools then?
- speaker: Respondent
  text: There were but it was hard for poor people to attend.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In 1883 (age 92 now).
- speaker: Interviewer
  text: What did you do to play when you were a child?
- speaker: Respondent
  text: I don't remember well but I think we prayed without toys.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I was adopted and I do not know whether I had any brothers or sisters.
- speaker: Interviewer
  text: What did your father do for a living?
- speaker: Respondent
  text: He did a little farming.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: I think it was around 1910.
- speaker: Interviewer
  text: What made you decide to come to America?
- speaker: Respondent
  text: I just wanted to come.
- speaker: Interviewer
  text: Did your family make arrangements for you to come?
- speaker: Respondent
  text: No, they did not help me. I came on my own.
- speaker: Interviewer
  text: Did they have anything to say about it?
- speaker: Respondent
  text: I was already away from home so they didn't know about it.
- speaker: Interviewer
  text: Where did you arrive in the United States?
- speaker: Respondent
  text: I arrived in New York. I wanted to get into a school there if I could but it wasn't easy so I came to California to
    farm.
- speaker: Interviewer
  text: How long did you stay in New York?
- speaker: Respondent
  text: About one year, I think.
- speaker: Interviewer
  text: Did you go to a school?
- speaker: Respondent
  text: No, I couldn't. I just had enough money for traveling.
- speaker: Interviewer
  text: What part of California did you come to?
- speaker: Respondent
  text: I came to Livingston.
- speaker: Interviewer
  text: Did you know anyone here?
- speaker: Interviewer
  text: Did you know about the "Yamato Colony" (Japanese settlement in Livingston, Calif.)?
- speaker: Respondent
  text: I think I knew about it.
- speaker: Interviewer
  text: Was it pretty well established when you came?
- speaker: Respondent
  text: I think the "Yamato Colony" was started around 1908. When I came, there were some grapes in the field but the sandstorm
    was so severe and the grapes were covered with sand. There was no work here so I went to work in the Fresno areas. I had
    to repay some money I borrowed in Japan before I came. I must say that all I had was my body when I came to America.
- speaker: Interviewer
  text: How long did you work in the Fresno area?
- speaker: Respondent
  text: Only during the grape picking season.
- speaker: Interviewer
  text: Did you buy any land here?
- speaker: Respondent
  text: I never bought land. I did labor work.
- speaker: Interviewer
  text: Was Mr. Miyajima here when you came?
- speaker: Respondent
  text: I think he died in San Francisco about the time I came here.
- speaker: Interviewer
  text: Have you met him?
- speaker: Respondent
  text: I think I met him a couple of times but I don't remember him very well.
- speaker: Interviewer
  text: Did he start this Colony?
- speaker: Respondent
  text: He was from Chiba, Japan and I understand that immigrants from Chiba were grouped together in one area.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I had no special skill so I worked and worked as a laborer. I bought 20 acres which was a dairy farm and operated
    it.
- speaker: Interviewer
  text: How many years was it after you arrived here?
- speaker: Respondent
  text: In 1918. I remember that because it was just about the time World War I ended.
- speaker: Interviewer
  text: How long have you been married?
- speaker: Respondent
  text: It's about 60 years.
- speaker: Interviewer
  text: What year was it that you got married?
- speaker: Respondent
  text: I think it was 1915.
- speaker: Interviewer
  text: Were you here then?
- speaker: Respondent
  text: No, I wasn't settled yet. I rented a place from Mr. and Mrs. Okue.
- speaker: Interviewer
  text: Mr. Okue started the "Yamato Colony" did he not?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Please come and join us.
- speaker: Respondent
  text: I suffered a stroke and my memory is not good after that.
- speaker: Interviewer
  text: I understand that you came in 1916. Are you from the same part of Japan as Mr. Ando?
- speaker: Respondent
  text: No, I was born in Nagano Prefecture, Japan but I moved to Tokyo before school age.
- speaker: Interviewer
  text: When you came to America, were you shocked?
- speaker: Respondent
  text: Yes, I was. I know nothing of farming.
- speaker: Interviewer
  text: I heard this part of the country was very hot and an awful place to live. Was it?
- speaker: Respondent
  text: Yes, it was a very hot place. Now I like it here.
- speaker: Interviewer
  text: What was your husband doing when you came?
- speaker: Respondent
  text: He was farming.
- speaker: Interviewer
  text: Did you own any land in the "Yamato Colony"?
- speaker: Respondent
  text: Yes, I bought a share from Mr. Okue. I had 60 acres in the "Yamato Colony". My son operates it now.
- speaker: Interviewer
  text: What did you grow?
- speaker: Respondent
  text: I grew grapes because grapes mature fast. I had some peach and almond trees also.
- speaker: Interviewer
  text: What sort of hardship did you go through?
- speaker: Respondent
  text: Number one, was that I did not have much monetary resources.
- speaker: Respondent
  text: When we were young, we were able to cope with hardships even if we didn't have money.
- speaker: Interviewer
  text: Did you suffer lack of food?
- speaker: Respondent
  text: We never went hungry.
- speaker: Interviewer
  text: What time did you go out to work in the mornings?
- speaker: Respondent
  text: There was no set time. When it became daylight, we got up, ate breakfast and went out to work.
- speaker: Interviewer
  text: It was early in the morning, was it not?
- speaker: Respondent
  text: Yes, we had to get out early because it got so hot during mid-day.
- speaker: Interviewer
  text: What did you do out in the farm?
- speaker: Respondent
  text: There was so much to do out in the farm. After I suffered a stroke, I can't do anything.
- speaker: Interviewer
  text: When you were young, did you go out to work around 6:00 A.M.?
- speaker: Respondent
  text: Yes, at 6:00 A.M. we were already out working. I had never been on a farm before I came to America. I didn't even
    know how radishes grew. I don't think I did a good job.
- speaker: Interviewer
  text: What did you do at noon?
- speaker: Respondent
  text: We came home to eat lunch.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: We have five. One son and four daughters. Somehow, we were able to send all our children to college which we are proud
    of.
- speaker: Interviewer
  text: How did you do during the 1943 Depression?
- speaker: Respondent
  text: It wasn't easy. We had hard time buying feed for our horses and paying interest on the mortgage. I think the mortgagor
    was kind and waited for our payments.
- speaker: Respondent
  text: Because of the prohibition we didn't have income from our grapes. We couldn't sell grapes.
- speaker: Respondent
  text: We weren't successful but we were able to make a living.
- speaker: Interviewer
  text: After that (depression) did it improve?
- speaker: Respondent
  text: After World War II, things got better.
- speaker: Interviewer
  text: What did you think when "Pearl Harbor" was bombed?
- speaker: Respondent
  text: When I heard it over the radio, I was shocked because I did not think feelings between the United States and Japan
    were that bad. Nowadays, the war is not between man and man. It is production versus production. Some Americans took advantage
    of the situation for their own gain but I think the U.S. Government treated us fair. I didn't think it was right to evacuate
    us from our homes. However, for some Japanese who were having difficulty making a living at the time were happy to be
    in camps. For us, it was not good. I had planted grapes and we were beginning to have income from it. That was sad for
    us.
- speaker: Interviewer
  text: What did you do with your farm equipment and household furniture at the time of the evacuation?
- speaker: Respondent
  text: Farm equipment was lost but we put household furniture in this house, locked it up and left.
- speaker: Interviewer
  text: Did someone operate your farm?
- speaker: Respondent
  text: Some of us Japanese got together, hired a foreman and had him supervise the operation of our farm. We received some
    profit so it wasn't too bad but if we had operated it ourselves during this time, we would have made a good profit.
- speaker: Interviewer
  text: Which relocation center did you go to?
- speaker: Respondent
  text: We went to Amache, Colorado.
- speaker: Interviewer
  text: Did you go to an Assembly Center?
- speaker: Respondent
  text: Yes, we went to Merced Assembly Center and then to Amache, Colorado.
- speaker: Interviewer
  text: What did you think of the center?
- speaker: Respondent
  text: The relocation center was much better than the Assembly Center. Some people from Los Angeles area, who were just barely
    making a living, didn't want to leave the center when it was ready to close. We relocated to the eastern part of the United
    States after staying in the center a little over a year. We did not have to worry about food but I thought we would be
    spoiled by easy living. My children were already out.
- speaker: Interviewer
  text: Were your children grown then?
- speaker: Respondent
  text: Yes, three were graduates of colleges and two were in college. One graduated from an eastern college during the war
    and the younger son graduated from Stanford University after we returned to California. To have been in a camp during
    the war hurt us mentally and financially.
- speaker: Respondent
  text: We were in Boston after we left camp. We still associate with our caucasian friends we made while we were there. I
    don't think everything was bad during the war.
- speaker: Interviewer
  text: What did you do in Boston?
- speaker: Respondent
  text: We did housework for a very nice family.
- speaker: Interviewer
  text: Did you work while you were in Amache Camp?
- speaker: Respondent
  text: Yes, I worked as a sanitation man, cleaning bathrooms and toilets. I took a job that others did not want.
- speaker: Interviewer
  text: You are to be commended.
- speaker: Respondent
  text: I didn't want to get lazy and mentally dull in the camp. I was just about 60 years old. From Boston, I came back here
    to California before the war ended in January 1945. Our second daughter, who was employed in New York, came back with
    us. Someone shot at our house the night we returned and we still have some of those marks. We told our daughter to come
    to the back room but she stayed in the front bedroom because she wanted to see who was shooting. We were shot at a few
    more times after that. Caucasian friends around here had an idea who was doing it. He (an Oklahoman) left the community
    before long.
- speaker: Interviewer
  text: The war ended in August but did you return in January?
- speaker: Respondent
  text: Yes, others returned almost a year later. We heard of the German surrender, the A-Bomb in Japan and the Japanese surrender
    after we returned here. Some returned as soon as they could but many did not return to the west coast until the war was
    over.
- speaker: Interviewer
  text: How did you feel when Japan lost the war?
- speaker: Respondent
  text: I thought it was natural. I didn't like the Japanese Military. If they knew their strength, they should not have fought.
- speaker: Interviewer
  text: Were Mexicans good toward Japanese?
- speaker: Respondent
  text: For some Mexicans, the return of Japanese was not a benefit to them.
- speaker: Interviewer
  text: What type of people do you hire as laborers?
- speaker: Respondent
  text: I use anyone who asks for work but mostly Mexicans.
- speaker: Interviewer
  text: Do you use Filipinos?
- speaker: Respondent
  text: There aren't very many Filipinos around here now. They are a little too smart. They aren't as obedient as Mexicans
    are. One good thing about Filipinos is that they don't have backaches and are good at stoop labor.
- speaker: Interviewer
  text: When you first arrived in Livingston, did you hire Japanese?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: Weren't there any single Japanese men around here then?
- speaker: Respondent
  text: We had to hire them from Stockton and Fresno. When we hired Japanese, we had to try like that.
- speaker: Interviewer
  text: Didn't anyone hire Japanese?
- speaker: Respondent
  text: Some farmers hired Japanese from Sacramento for packing grapes because they were good at it. We packed ours. Later
    on, a Growers Association was organized. We brought our grapes there to be packed and shipped. Japanese laborers were
    very short-tempered. I believe there are hardly any Japanese laborers now.
- speaker: Interviewer
  text: What part of Japan did you come from Rev. Takarabe? Many Japanese from Wakayama and Hiroshima Prefectures were here.
- speaker: Respondent
  text: Hiroshima people were a little more patient than Wakayama people.
- speaker: Interviewer
  text: You must have worked hard.
- speaker: Respondent
  text: Yes, we worked hard as there was nothing else to do. My hands got crippled like this from shoveling. I used to play
    the flute but I cannot do it anymore because my fingers can't play the notes.
- speaker: Interviewer
  text: Wasn't it hot here in those days?
- speaker: Respondent
  text: Yes, I came here on July 16th and it was 116 degrees on that day. It was really hot.
- speaker: Interviewer
  text: Was the wind strong?
- speaker: Respondent
  text: The wind was strong but it was cooler when it was blowing.
- speaker: Interviewer
  text: Was it like a desert here?
- speaker: Respondent
  text: Yes, it was. We cultivated a small area at a time and gradually enlarged our farm. Because of Japanese, this land
    has opened up for farming. The government brought some war veterans to Delhi near here, gave them all kind of help but
    they failed and went away. The Japanese worked diligently. The ones without education worked hard but lacked something.
- speaker: Interviewer
  text: Did you do something together as the "Yamato Colony"?
- speaker: Respondent
  text: We had the church.
- speaker: Interviewer
  text: It was a colony but were you individual farmers?
- speaker: Respondent
  text: Yes, we were. Some brothers farmed together. Today, Nisei brothers farm together on a big scale. I have only one son
    and wished I had more.
- speaker: Interviewer
  text: What do you wish to convey to the younger generation?
- speaker: Respondent
  text: I don't tell the Niseis how hard I worked because it sounds like bragging but the Isseis worked under many handicaps.
    I am amazed we came this far. I think the worst handicap was language. We couldn't talk business.
- speaker: Interviewer
  text: Do you think you were cheated at any time because of language handicap?
- speaker: Respondent
  text: I don't think there was any in this area. There might have been some elsewhere. We owned our land and there were no
    leases involved.
- speaker: Respondent
  text: When we were making contracts, we were not aware of some clauses.
- speaker: Interviewer
  text: Was Mr. Bumberger a reliable man?
- speaker: Respondent
  text: He was a businessman. I think he was honest. He charged enough from people who had money but didn't receive any from
    the poorer people. He made a lot of money but I don't think he did anything illegal.
- speaker: Interviewer
  text: Mr. Ando, do you go to church?
- speaker: Respondent
  text: I did when I was younger but I don't go at all now. Who is doing the Radio Ministry? I listen to it and I know Mr.
    Osuke Takigawa, who spoke.
- speaker: Interviewer
  text: What does the growers association do?
- speaker: Respondent
  text: They buy materials for us and they do the shipping for us.
- speaker: Interviewer
  text: Do they still do it now?
- speaker: Respondent
  text: Yes, they are doing a reliable business.
- speaker: Interviewer
  text: How many families are there in this association?
- speaker: Respondent
  text: I don't know how many there are now. I am the only early settler living here now. Other Isseis who are here now came
    later than I. The earlier ones have all passed away.
- speaker: Interviewer
  text: Are many Issei women left?
