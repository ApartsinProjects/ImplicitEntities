collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Your name, please?
- speaker: Respondent
  text: Mrs. Tomi Osaki.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: Kudayama, Wakayama prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on November 5th, in the 25th year of Meiji (1890).
- speaker: Interviewer
  text: How old are you?
- speaker: Respondent
  text: I'm eighty-five.
- speaker: Interviewer
  text: Do you remember any events or things that happened during that time in Japan?
- speaker: Respondent
  text: I remember the war between Russia and Japan, but I cannot remember the Sino-Japanese war. The only thing I do remember
    from that event is that I went to welcome with a little Japanese flag the soldiers returning back to Japan after conquering
    Rojum. I was living in Japan, and teaching at Mie public high school when World War broke out. I had heard about the war
    in Manchuria, but never knew much about it; it never impressed me at all.
- speaker: Interviewer
  text: What were the things that you enjoyed most while you were in Japan?
- speaker: Respondent
  text: Well, I enjoyed a lot of things in Japan, but the best of all was that my mother let me learn whatever I wanted, because
    I was the only child. I also enjoyed playing the violin on the bank of Kinokawa river under the beautiful moonlight. The
    tone of the violin echoed all around, harmonizing with the murmur of the stream of the river. The most unforgettable thing
    was when I went with my mother on a picnic and we brought onigiris and pickles with bamboo skin, and picked up some Yomogi
    and wadatsumi. I cannot remember anything sad or awful, because I didn't get any serious illness in Japan.
- speaker: Interviewer
  text: What's your educational background?
- speaker: Respondent
  text: I went to the Jinjo elementary school and then I entered the Kyoritsu University for women.
- speaker: Interviewer
  text: In which classes were you interested most?
- speaker: Respondent
  text: I was very interested in the Philosophy class of which Prof. Nakajima was in charge. I also respected Mrs. Ayako Takahashi.
- speaker: Interviewer
  text: Why do you respect her?
- speaker: Respondent
  text: Although she was eighty, she was in good health. I respected her because I had been taught many good things by her.
- speaker: Interviewer
  text: Could you give us any examples?
- speaker: Respondent
  text: For example, I learned about thriftiness from her. She never wasted even a piece of paper. She cut a piece of paper
    into two and cleaned her comb with this other half and scrubbed the handrail of the sliding door with it, and burnt it
    for bath. Another example was that while others went to a summer house on hot days she usually got up at four in the morning,
    watered the plants in the garden, washed the faded clothes, and put them away for the next year and so on. She did all
    of this before the sun rose and got hotter. These experiences gave me valuable ideas when I brought up my children, even
    though I felt it was pretty hard for me to keep on doing those things myself.
- speaker: Interviewer
  text: Who did you respect most among the teachers you had been taught?
- speaker: Respondent
  text: Professor Hachiro Kitayama, he was a noble man, and Professor Tokio Aoki.
- speaker: Interviewer
  text: Tell me, how did the students look like in your school?
- speaker: Respondent
  text: The students wore Kimono and shoes at that time. We could get into school with our shoes on.
- speaker: Interviewer
  text: Which were your favorite books at that time?
- speaker: Respondent
  text: Holotogisu and Konjikiyasha. They were so interesting that I could stay up all night reading them.
- speaker: Interviewer
  text: Are there any episodes you can remember during your school days?
- speaker: Respondent
  text: At my mother's suggestion I went to see every teacher to show my faith and gratitude after the graduation ceremony.
    This impressed the principal of the school, who suggested that I should become a teacher. I started teaching in the Tono
    Elementary school system in April of that year. My starting salary was six yen a month at that time. Besides my teaching
    there I prepared to take an examination for a junior high school teacher. I purchased the books from Tokyo for that examination.
- speaker: Respondent
  text: I taught there for one year, because I was really anxious about becoming the junior high school teacher by all means.
    I transferred to the school in Kuroyama where I taught there for three years and studied more for the examination. A few
    days before I took the examination I wanted to see my luck by pulling a lot, because I would be embarrassed if I failed
    the examination. It showed me a good luck such as 'a dragon ascending to the heaven'.
- speaker: Interviewer
  text: What does it mean?
- speaker: Respondent
  text: This means that one will marry in one's middle age, a big change would happen during middle age, and that one could
    see exalted personages in advanced age. I didn't believe it after all. However, I married at twenty-eight and became a
    Christian during middle age, and was invited to the Gosankai and Togugosho by the Japanese princess and was also given
    a decoration. When I told others about the lot I pulled, they didn't believe it. They said that that must be a coincidence.
    But I believed that there were many mysteries in the world.
- speaker: Respondent
  text: I remember that the emperor passed away at this time, and I went to Nijubashi to send off his funeral carriage as
    a representative of the school. General Nogi and his wife followed the emperor to the other world a little after the emperor's
    death.
- speaker: Interviewer
  text: What did you do after you had passed the exam for the junior high school teacher?
- speaker: Respondent
  text: After mastering the credential courses, I taught at the Tsu-Jogokko in Mie prefecture. I was also a proctor there.
- speaker: Interviewer
  text: How were the students there?
- speaker: Respondent
  text: Most girls came from rich families, and they were excellent students, including both Takahashi and Kawashima sisters
    who are living in San Francisco now. Sister Kawashima, who is Mrs. Koda's younger sister, was nominated to the fifth order
    of Merit.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: It was in 1920.
- speaker: Interviewer
  text: Was it after or before your marriage?
- speaker: Respondent
  text: After my marriage.
- speaker: Interviewer
  text: How did you get married?
- speaker: Respondent
  text: My marriage was a sort of arrangement between my father's and husband's friends because they were the ones who arranged
    the meeting between Mr. Osaki, now my husband, and me.
- speaker: Interviewer
  text: What made you come to America?
- speaker: Respondent
  text: One day when I was teaching at the Tsu high school I received a letter in which my friend mentioned Mr. Osaki. They
    said that Mr. Osaki was here from America to look for a bride. They also said that Mr. Osaki came from a good family which
    was descended from a family (Kamei-Han) of high position in the Federal period. When Mr. Osaki went to America he was
    only nineteen years old, and stayed over there for seventeen years. He was an honest man and hard worker. He also owned
    a pear farm in America. My friend then asked me to come to Osaka and meet Mr. Osaki there. I asked my mother to let me
    go and meet Mr. Osaki. She agreed to let me meet Mr. Osaki in Osaka but not to let me go with him to America.
- speaker: Interviewer
  text: What did you do then?
- speaker: Respondent
  text: I went to meet him in Osaka. I talked to him about my mother's indecision. He said that he had to go back because
    he had to meet his obligations of his farm. But he would come back to Japan in three to five years.
- speaker: Interviewer
  text: Did you decide to marry him at that time?
- speaker: Interviewer
  text: When did you make up your mind?
- speaker: Respondent
  text: Then we met each other several times in Osaka. I could not feel this at the beginning, but I found that he was very
    gentle and I felt that he loved me very much by the way he talked. After three weeks I made up my mind to marry him.
- speaker: Interviewer
  text: When did you marry?
- speaker: Respondent
  text: We married at my father's friend's house on October 21. The marriage ceremony was almost the same as today's ceremony.
    I remember that a little boy and a girl in red and white Kimono poured omiki, Japanese sake, in the cups.
- speaker: Interviewer
  text: Did you come here right after your marriage?
- speaker: Respondent
  text: No. I stayed in Japan for seven months after I had married. Then we came over here.
- speaker: Interviewer
  text: How did you come to San Francisco?
- speaker: Respondent
  text: When I came to San Francisco with my husband, we took the late ship by way of Seattle. We paid thirty dollars to the
    captain for our passage.
- speaker: Interviewer
  text: How was the situation on the way to San Francisco?
- speaker: Respondent
  text: The ship was crowded. Most of the passengers were from Kagoshima and were coming to marry. At this time many marriages
    were arranged by exchanging their pictures. Consequently, many girls married without much knowledge of their husbands.
    There was always danger for girls to decide to marry this way, because some boys lied about their pictures or professions.
    I know that some girls jumped overboard on the way.
- speaker: Interviewer
  text: What happened when you arrived at San Francisco?
- speaker: Respondent
  text: A month later we arrived here. I became pregnant and gave birth to my first son.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: I have three children, two boys and a girl.
- speaker: Interviewer
  text: What else happened?
- speaker: Respondent
  text: When we went to Tahoe, we received a telegram that my mother was in critical condition. I got ready to go back to
    Japan right away. However, I had to wait for three days until the ship came in.
- speaker: Interviewer
  text: How was your mother's condition when you got to her?
- speaker: Respondent
  text: I arrived in Japan on September 3rd, but I could not get to her before she died, and her funeral had been prepared.
    I cried all night beside mother's body.
- speaker: Interviewer
  text: Did you come back to San Francisco right after the funeral?
- speaker: Respondent
  text: No. After everything was settled I wanted to take my children to see my husband's younger brother in Fukuoka. We went
    to Hamada, Osaka, Kyoto, Nara, Nikko and Mt. Fuji.
- speaker: Interviewer
  text: How old were your children at that time?
- speaker: Respondent
  text: My oldest son was nine, the younger was six, and my daughter was four.
- speaker: Interviewer
  text: How did you make your living here?
- speaker: Respondent
  text: My job had been completely changed from teaching. I worked at my husband's farm as a kitchen helper for a while. It
    was very hard and laborious work. When I cooked even simple foods such as kimpira, I had to cook a lot.
- speaker: Interviewer
  text: How many hours did you work?
- speaker: Respondent
  text: I worked all day long from three o'clock in the morning, taking care of three children, washing and ironing, etc.
    I sometimes wanted to go back to Japan because the life was so hard here, but I put up with it as the family should be
    together all the time. My husband, Osaki, quit his farm when the economic depression struck every country in the world
    in 1929 to 30.
- speaker: Interviewer
  text: Did you mean that you were out of jobs?
- speaker: Respondent
  text: Yes, but just at that time I started teaching at a Japanese school which had been started in Holland. I decided to
    go there to teach Japanese. I thought that I could teach in my way there as a new school usually wasn't so strict at the
    beginning. I taught Monday through Friday for thirteen years. I saw some of my students I taught there at the testimonial
    dinner which was held recently.
- speaker: Interviewer
  text: What was your impression of Americans?
- speaker: Respondent
  text: Mrs. Moray was the first American I met in my school days. She was a missionary and was very kind to us.
- speaker: Interviewer
  text: Did you do anything with Americans here?
- speaker: Respondent
  text: When I came here I tried to teach flower arrangement to some Americans, but I had a hard time making myself understood
    to them because of my language problem. It took me a long time to overcome this difficulty.
- speaker: Interviewer
  text: How have people here treated you as a Japanese?
- speaker: Respondent
  text: In the school in Holland, we, Japanese and Chinese, couldn't sit together with Americans in the classes. So, I changed
    schools, because that wasn't matching with my doctrine. Then the war broke out, and I received the order that we had to
    leave home to the concentration camps. An inspector from the F.B.I. came to school and looked at everything written in
    Japanese. For this reason I lost all the letters I had received from my mother.
- speaker: Interviewer
  text: Please tell me how you spent your time in the camp?
- speaker: Respondent
  text: During my stay in the camp, I gave lectures at the 'Seicho no Ie' every night as I believed in the group. I was very
    pleased to teach whatever others wanted, even though the children didn't like it. I had about three hundred people in
    my class and taught them how to make dry flowers, etiquette in everyday life, Mizuhiki manufacturing, etc.
- speaker: Interviewer
  text: How about your children?
- speaker: Respondent
  text: Our oldest son, Wayne, was majoring in business at the University of California and also studied construction through
    correspondence school. Our younger son and daughter were in high school and my daughter got acquainted with a man in the
    camp, who is now her husband.
- speaker: Interviewer
  text: When did you leave the concentration camp?
- speaker: Respondent
  text: In December, we left the camp for Holland.
- speaker: Interviewer
  text: Did you stay there for long?
- speaker: Respondent
  text: No. We moved again to San Francisco so that Wayne could keep on studying there.
- speaker: Interviewer
  text: Did you experience any discrimination against you?
- speaker: Respondent
  text: At first agitation to expel the Japanese was severe everywhere. However, our honesty and diligence were recognized
    by people here gradually. Still, many Japanese could not live in their own houses because these houses were already occupied
    by black people even though they belong to the Japanese.
- speaker: Interviewer
  text: After you settled down, how did you make your living?
- speaker: Respondent
  text: After Minister Shigeru Yoshida's authorization by signing a document, I opened the Kimmon Gakuen with thirty-two pupils.
    I devoted myself to education here with a small salary about $50.00 to $70.00 a month. Of course, money was not important
    for me. I believed that what I taught others would remain with them forever.
- speaker: Interviewer
  text: What did your husband do?
- speaker: Respondent
  text: My husband did gardening jobs and Wayne helped him whenever he had time out of school.
- speaker: Interviewer
  text: How is your situation now?
- speaker: Respondent
  text: My son has his own business and employs several Americans.
- speaker: Interviewer
  text: What do you think about your son's success?
- speaker: Respondent
  text: We believe that this success is due to others' warmth and generous help.
- speaker: Interviewer
  text: What is your religion?
- speaker: Respondent
  text: I am a Christian.
- speaker: Interviewer
  text: Is Christianity your family's religion?
- speaker: Respondent
  text: No, my family's religion was Shingon-Shu.
- speaker: Interviewer
  text: Could you give me any reasons why you made the decision to become a Christian?
- speaker: Respondent
  text: I hesitated to become a Christian at first because of my family's religion. However, I really wanted to become a Christian
    because...
