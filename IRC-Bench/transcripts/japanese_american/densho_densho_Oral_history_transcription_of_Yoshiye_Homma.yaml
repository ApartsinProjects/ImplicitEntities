collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I was young when these wars occurred so I have no recollections.
- speaker: Respondent
  text: A happy event was the time when I was in girls high school and had a pleasant relationship with teachers. Sufferings
    are far in the past and I have no recollection.
- speaker: Respondent
  text: Religion of family was Buddhist.
- speaker: Respondent
  text: Before I became a Christian, I heard rumors about it and thought it was a good religion.
- speaker: Respondent
  text: Depending on my brother and my uncle who were in New York, I got married and came to America.
- speaker: Respondent
  text: I graduated high school.
- speaker: Respondent
  text: The reason why I came to America is that I got married.
- speaker: Respondent
  text: I came to America on May 5, 1919 by way of Hawaii. Japanese in Hawaii at that time did not seem to be affluent society,
    I thought. Just being there not one day, I can't say for sure.
- speaker: Respondent
  text: The ship was Korea Maru. The passengers were mostly picture brides, Chinese and many other nationalities. It was my
    first time on a ship. It was a very rocky and frightening experience.
- speaker: Respondent
  text: America, quite different from Japan, was magnificent with San Francisco's tall buildings. I thought it was a good
    country. In America, my husband's father ran a poultry farm so we helped with the business.
- speaker: Respondent
  text: My impression of America was that it is a very good place. American immigration officers were very kind and good to
    us when I first arrived in America.
- speaker: Respondent
  text: My father-in-law's business was poultry farming, but I could not understand English. So in order to learn English
    and American ways, I worked for a very wealthy American family.
- speaker: Respondent
  text: At that time, I was in California. Japanese then could not buy land. My father was doing good business on poultry
    farm so I helped him.
- speaker: Respondent
  text: A sad experience that I recall is that up to my time of marriage I had never worked before. It was a very trying time
    for me to work on the farm. My family life was rather complicated and I wanted to make it more harmonious and peaceful.
- speaker: Respondent
  text: At that time I got acquainted with Mrs Miyoshi and I took my children to Sunday school and read the Bible and held
    services. Those days I spent with Mrs Miyoshi in Sunday school were the most unforgettable and enjoyable time of my life.
- speaker: Respondent
  text: Mrs Miyoshi was a very earnest prayer and whenever I had vexing problems I poured out my heart and chagrin to her
    and together we prayed so that even now my recollection is very dim.
- speaker: Respondent
  text: I had more sufferings than I had funny ones. Having never worked before, I was slow, and I was very troubled, but
    Mrs Miyoshi prayed for me and I received God's strength.
- speaker: Respondent
  text: My husband came to my village to marry me. The wedding ceremony was held at Oyashiro. He came after me so it was not
    a picture bride wedding.
- speaker: Respondent
  text: I was homesick being so far away from home. When I went to live with an American family, I thought of home and got
    homesick but after I returned to the poultry farm and was kept very busy I forgot about it.
- speaker: Respondent
  text: In order to get used to American way of life, I went to work for an American family to learn English. I had never
    worked before but my employer was very kind and I didn't have too much trouble.
- speaker: Respondent
  text: During those days in California, Japanese could not own land. Since my children were small and could not use their
    names, we brought land under the name of our trusted friend's daughter.
- speaker: Respondent
  text: Many Japanese were objects of discrimination but we were not discriminated as much. At first I learned English by
    working in an American family.
- speaker: Respondent
  text: I wanted to go to school to learn English but because we lived in the country and could not drive a car I was not
    able to go to school.
- speaker: Respondent
  text: As in Japan, the head of the family took care of all the expenses so I did not have my own income to speak of but
    I did not experience any inconvenience.
- speaker: Respondent
  text: Our first house we bought in Sacramento for $35,000. No one helped us to purchase the property. We purchased the entire
    poultry farm from a man who owned a poultry farm.
- speaker: Respondent
  text: I took care of the children and family life and was very busy so I had no time for hobby or entertainment. Just going
    to Sunday school with Mrs Miyoshi was my only pleasure.
- speaker: Respondent
  text: As my children grew up they were able to help and also they were able to drive me to Sunday school. That was my most
    pleasant memory.
- speaker: Respondent
  text: Since my family life was difficult, there was much suffering for me, but this suffering was alleviated by prayer and
    in suffering I found strength.
- speaker: Respondent
  text: I did not send my children to school.
- speaker: Respondent
  text: I was young during World War II days so I have no recollection.
- speaker: Respondent
  text: In order to apply for citizenship, I went to a segregated school but due to busy life at home, I could not go very
    long and since I did not have much opportunity to speak English, I am not very versed in English.
- speaker: Respondent
  text: I became a Christian in 1923. Mrs Miyoshi came to my house and asked me to send my children to Sunday school. I sent
    my children to Sunday school without knowing what it was all about.
- speaker: Respondent
  text: I heard the good news about God and with this I thought I could save my family so I learned to drive and took my children
    without fail every Sunday to church.
- speaker: Respondent
  text: During depression, prices all went down. Eggs sold for 12 cents a dozen.
- speaker: Respondent
  text: It was very hard to make a living, but I was thankful that somehow we were able to keep going.
- speaker: Respondent
  text: After marriage, I decided to stay permanently in America.
- speaker: Respondent
  text: Our business was poultry farming and we were notified of the evacuation and had to dispose and settle the affairs
    within one week. It was right in the middle of egg laying season but we had to sell all the eggs and began loss.
- speaker: Respondent
  text: Attack on Pearl Harbor - we wondered what will become of us and were worried. When we received the notice from the
    Japanese Association to evacuate within a week, I felt like crying. It was hard just to leave everything and go.
- speaker: Respondent
  text: Although we felt very uneasy we had to leave our property and business in care of our American friend who later sold
    the poultry farm very cheaply.
- speaker: Respondent
  text: My children were at that time - Yoneo, 19; Don, 18; two more daughters.
- speaker: Respondent
  text: Since I did not attend American church, I have no comment, but I know that American churches were very kind to Japanese.
    In Idaho, many evacuees went to American churches, were baptized and entered the faith.
- speaker: Respondent
  text: We were sent to Tule Lake. The camp was better than I anticipated and the food was good. We received clothing and
    those who worked received $6.00 every month and I thought that the American government treated us decently.
- speaker: Respondent
  text: My most vivid memory of the relocation camp is my mission work among the Japanese in camp.
- speaker: Respondent
  text: Some Japanese thought that Japan won the war and there were many who opposed America. Christians tried to calm them
    but many did not heed us so after ten months we left camp and came to Salt Lake City to join Mrs Miyoshi who was already
    in Salt Lake City.
- speaker: Respondent
  text: As long as we live in America, we should be loyal to America.
- speaker: Respondent
  text: My feeling when put into camp was that of loneliness, but the family was together so in spite of being lonely, I felt
    easy in mind.
- speaker: Respondent
  text: In the midst of good treatment by the government, we lived in camp.
- speaker: Respondent
  text: As to problem of loyalty, I think Nisei, as long as they are Americans, should be loyal to America.
- speaker: Respondent
  text: I had many interests - I studied English, flower arrangements and took part in other activities, but my most important
    work was mission work.
- speaker: Respondent
  text: Rev Kawashima told me that it would be better if I set aside my personal interests and that preaching the gospel was
    more important. So I carried his satchel, in a manner of speaking, and I visited the families whose sons were in the army,
    one by one.
- speaker: Respondent
  text: I made visitation to hospital, Abe B. patients. Those mission work remain in my memory.
- speaker: Respondent
  text: At relocation center, everyone had to work. At first I washed dishes but that interfered with my going to church and
    also my mission work so I gave it up and I cleaned the washrooms in the mornings so I can attend church and had time for
    mission work.
- speaker: Respondent
  text: There were many churches in the center. I delivered the weekly bulletins for my area, house by house, and even gave
    them to Buddhists who would read them.
- speaker: Respondent
  text: Church life was in earnest, everyone gathered together, gave testimonies and prayed, and many received the Holy Spirit.
- speaker: Respondent
  text: My children were of high school age so they received high school education.
- speaker: Respondent
  text: In camp, my time was spent entirely on church and mission work. Through it my faith grew and I feel God's strength
    stronger than before.
- speaker: Respondent
  text: We left Tule Lake October of 1942. We felt that life in camp was not conducive to good living so we moved to Salt
    Lake City where our friend Miyoshi's were.
- speaker: Respondent
  text: Our only experience was in poultry farming so we wanted to try again and left camp.
- speaker: Respondent
  text: We had difficulty in finding a poultry farm but we fortunately found one, a small poultry farm nearby Mrs Miyoshi's
    place, so we moved there.
- speaker: Respondent
  text: As to education, my daughter went to New York to attend university there.
- speaker: Respondent
  text: My second daughter came back to Sacramento and entered university. My two sons, we wanted to train them in poultry
    farming.
- speaker: Respondent
  text: Our American friends came to our aid so we did not experience much suffering.
- speaker: Respondent
  text: As a Christian, my hope is to follow the cross and God's will, building of his kingdom but because of my physical
    condition I cannot do as much as I would like to do but I want to serve God in any way I can.
