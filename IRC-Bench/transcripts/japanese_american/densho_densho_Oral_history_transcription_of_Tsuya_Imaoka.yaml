collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What part of Japan are you from?
- speaker: Respondent
  text: I am from Nagasaki, Japan.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in Meiji 18 (1885) and I am 90 years old now.
- speaker: Interviewer
  text: You are very healthy, aren't you?
- speaker: Respondent
  text: Yes, I am. I was using reading glasses until last year but I found out that I could read without glasses and also
    thread a needle. I sew or knit every day.
- speaker: Interviewer
  text: Did you attend school while you were in Japan?
- speaker: Respondent
  text: I had some education in Japan. My father was a calligrapher and he also wrote poems. Many village people came to study
    under him. I learned from him also.
- speaker: Interviewer
  text: Was your father a very stern person?
- speaker: Respondent
  text: Yes, old timers were pretty stern. He served under the Saga area feudal lord. My grandfather on my mother's side also
    served the lordship.
- speaker: Interviewer
  text: How was your mother?
- speaker: Respondent
  text: She was the daughter of a person who served the lordship.
- speaker: Interviewer
  text: Was she strict?
- speaker: Respondent
  text: She was a very gentle person but strict in her teachings.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: There were four of us. I had an elder brother and two elder sisters. I was the youngest child.
- speaker: Interviewer
  text: Do you remember anything about your family?
- speaker: Respondent
  text: My father was a village master and didn't help the farm at all. I remember that my mother had to worry about the farm.
    I was young and didn't know well but I think they had other people operating the farm on the sharecrop basis. My father
    was always writing.
- speaker: Interviewer
  text: Did you have fun as a child? Did you play with other children?
- speaker: Respondent
  text: We didn't mingle with other children. We played with our cousins and relatives. When I think about it now, I feel
    embarrassed. Families who served the feudal lord were considered in the higher society.
- speaker: Interviewer
  text: What you have learned from your parents, has it helped you through your life?
- speaker: Respondent
  text: Yes, it has.
- speaker: Interviewer
  text: In what way?
- speaker: Respondent
  text: I am thankful for the education I received from them. My parents were very strict. My brother went to another town
    to attend school. My father would get very upset if my brother wrote letters to my parents carelessly or without respect.
    My mother intervened and asked my father to forgive him because my brother was probably very busy and had to write in
    a hurry so he made some mistakes.
- speaker: Interviewer
  text: When you were young, did you learn about Sontoku Ninomiya (a scholar)?
- speaker: Respondent
  text: I probably did but recently my memory is not good.
- speaker: Interviewer
  text: What was your parents' religion?
- speaker: Respondent
  text: They were 'Zenshu' Buddhists. My father went outside every morning and prayed toward all directions (east, west, north
    and south). Next, he went to the well and prayed to the God of Water and then he came inside the house and worshipped.
    When I was 16 years old, a friend came and asked me to go to the Buddhist Temple with her. I went to my parents for permission
    but my father said I was still a young girl and I owed my life to God and that I did not have to go to the temple to worship
    the dead. I had to tell my friend I had something to do and could not go with her. My father's word made me ponder about
    religion. I thought at the time, the most important God was the 'God of Air.' I didn't believe in any religion until I
    was 47 years old.
- speaker: Respondent
  text: My husband passed away when I was 47 years old leaving 5 children with me. I was born as the youngest child of the
    family and I was physically weak. I never thought I could come to America. My grandfather was a doctor and there were
    many doctors among the relatives. They told me if I took it easy I could live any place and they thought coming to America
    was alright. After my husband passed away, a friend told me that I had to take care of myself and stay healthy to raise
    my 5 children. She told me there was a class on nutrition. Since I had small children and could not go out in the evenings,
    she arranged to have the lecturer come to my home. The person that came was the Rev. Nagaki. He is a Seventh Day Adventist
    minister and has a church in Mt. View now. He taught me the Bible and I became a Seventh Day Adventist. Since then I have
    become very healthy and am still living.
- speaker: Interviewer
  text: I want to go back to the time you were in Japan. Was there any special happenings in your village while you were there?
- speaker: Respondent
  text: I can't think of any special happening.
- speaker: Interviewer
  text: Were you in school at 16?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: There weren't many attending school then, were there?
- speaker: Respondent
  text: The school just opened about that time and very few attended.
- speaker: Interviewer
  text: Do you remember how many years there were in the grade school?
- speaker: Respondent
  text: I think it was 4 years and I went 4 years of high school. I learned more from my father. More students came to my
    father than to the schools.
- speaker: Interviewer
  text: What did you like the most in school?
- speaker: Respondent
  text: I don't think I had any preference. When I first attended the school, the teacher asked if anyone could count up to
    one sen (one cent). I told him I could so he made me start counting. I started ichi-rin, ni-rin, san-rin, yorin (4/10
    of a sen). The teacher interrupted and said I should say shi-rin instead of yorin. I went home that day and said to my
    father 'tadaima' (means I have come home. We had to say this as a courtesy). He asked me what I learned that day. I mentioned
    about the shi-rin. He scolded and hit me so hard I started crying. My mother wondered what had happened and started calming
    down my father. I was swollen but the next day, my father took me to school, met the principal and another teacher and
    he mentioned to them that there is no shi-rin. Since then they started to say yo-rin instead of shi-rin. My father was
    not a person to hold back. He taught us the way to live our lives.
- speaker: Interviewer
  text: Do you remember the Japanese-Chinese War or the Japanese-Russian War?
- speaker: Respondent
  text: I remember the Japanese-Chinese War. I was still young then.
- speaker: Interviewer
  text: How did you come to America?
- speaker: Respondent
  text: I was married in Japan and my eldest son was born there. My husband was in America working for the government. Since
    it was hard for him to make many trips to Japan to see us, he made arrangements for us to come to America.
- speaker: Interviewer
  text: Was your husband a representative of the Japanese Government?
- speaker: Respondent
  text: No, he worked for the U.S. Government. He came to America earlier to study and later got this job. He returned to
    Japan to get married then came back to the U.S.A. again.
- speaker: Interviewer
  text: Did you know him?
- speaker: Respondent
  text: No, I didn't. My elder sister was in the city of Nagasaki and she is the one who made arrangements to have him meet
    me. Later we got married and my eldest son was born in Japan.
- speaker: Interviewer
  text: Were your parents against your marriage to a man who was working in a foreign country?
- speaker: Respondent
  text: No, they weren't because they thought he had a good position.
- speaker: Interviewer
  text: Was the marriage done with the understanding of the parents of both sides?
- speaker: Respondent
  text: No, his parents were deceased.
- speaker: Interviewer
  text: What part of Japan was he from?
- speaker: Respondent
  text: He was from Iyo (Shikoku Island).
- speaker: Interviewer
  text: Where was he working in the United States?
- speaker: Respondent
  text: He was in Seattle, Washington.
- speaker: Interviewer
  text: He must have had a good knowledge of English.
- speaker: Respondent
  text: Yes, he was very efficient with the English language. He graduated from a school in this country.
- speaker: Interviewer
  text: What school did he graduate?
- speaker: Respondent
  text: I do not know what school it was.
- speaker: Interviewer
  text: When did you come to Seattle?
- speaker: Respondent
  text: I came in 1915.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I must have been close to 30.
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I think I was 25. My eldest son is 65 years old now.
- speaker: Interviewer
  text: What did you think America was like?
- speaker: Respondent
  text: I didn't think much about it. I was teaching sewing at home before I came to America.
- speaker: Interviewer
  text: When you first saw Mr. Imaoka, what did you think of him?
- speaker: Respondent
  text: I didn't have any comments.
- speaker: Interviewer
  text: Was he handsome?
- speaker: Respondent
  text: No, he wasn't handsome. I had heard of America and wanted to come if my parents approved. We didn't do anything against
    our parents' wishes those days. I think it was because we learned this in our moral training lessons. I worried about
    my health but I am still living at this age. I owe it to God. He gave me everything I needed. God sustains all living
    creatures and I thank God for everything.
- speaker: Interviewer
  text: Did you live in Seattle when you first came to America?
- speaker: Respondent
  text: Yes, all of my children except the eldest were born there.
- speaker: Interviewer
  text: What was your impression of Seattle?
- speaker: Respondent
  text: I thought it was a nice place. I owe it to my husband.
- speaker: Interviewer
  text: How did you feel when you first saw caucasians and black people?
- speaker: Respondent
  text: In those days, I didn't see any black people.
- speaker: Interviewer
  text: How did you feel toward caucasians?
- speaker: Respondent
  text: I didn't feel any difference from other people. There were many Japanese immigrants. I tried to be nice to them.
- speaker: Interviewer
  text: While you were traveling on the ship to Seattle, do you remember anything?
- speaker: Respondent
  text: I was seasick all the way and stayed in a hospital room.
- speaker: Interviewer
  text: Did you feel any inconvenience when you came to Seattle? Did you have any hardship?
- speaker: Respondent
  text: I didn't have such a hard time.
- speaker: Interviewer
  text: How was your English?
- speaker: Respondent
  text: I couldn't speak English at all and I still can't speak it.
- speaker: Interviewer
  text: Wasn't it inconvenient when you went shopping?
- speaker: Respondent
  text: There were many Japanese stores and I didn't have trouble shopping. When English was necessary my husband was there.
- speaker: Interviewer
  text: Did you have any financial difficulty?
- speaker: Respondent
  text: Not especially.
- speaker: Interviewer
  text: Where did your husband pass away?
- speaker: Respondent
  text: In Mt. View, California in 1950.
- speaker: Interviewer
  text: How long did you live in Seattle?
- speaker: Respondent
  text: We left Seattle in 1924. We lived in Mt. View until 1938 and then moved to Oakland.
- speaker: Interviewer
  text: After your husband passed away, how did you make a living?
- speaker: Respondent
  text: The older children worked as school boys and school girls and attended school. They did all sorts of jobs. Husband
    had a life insurance but that wasn't much. The children did without many things they wanted. My brother in Japan (Kyoto)
    wrote and told me to return to Japan with the children as he wanted to help us. However, after discussing the matter with
    the children, we decided to stay in America. All my children worked their way through school.
- speaker: Interviewer
  text: You must have had a hard time then, did you not?
- speaker: Respondent
  text: Yes, we went through quite a hardship.
- speaker: Interviewer
  text: What did your husband do in Mt. View?
- speaker: Respondent
  text: He passed away soon after we came there. He was 56 years old. When we were in Seattle, he often took the children
    to fishing, sailing, and etc. I have 31 or 32 grandchildren and great-grandchildren now.
- speaker: Interviewer
  text: Where were you when Pearl Harbor was attacked?
- speaker: Respondent
  text: I don't remember well anymore. My memory was pretty good until a few years ago. A daughter says Mrs. Imaoka and a
    son moved to Sacramento when the war broke out.
- speaker: Interviewer
  text: What camp did you evacuate to?
- speaker: Respondent
  text: My son and I went to Walerga Assembly Center and then to Tule Lake War Relocation Center.
- speaker: Interviewer
  text: Did your son go into service from Tule Lake?
- speaker: Respondent
  text: Yes, he did. That was before the Tule Lake Center became a segregated center. After it became a segregated center,
    I went to Topaz W.R.A. Center.
- speaker: Interviewer
  text: When you were asked about your loyalty, did you say you were loyal to America?
- speaker: Respondent
  text: Yes, my children were born over here.
- speaker: Interviewer
  text: Did you think it was alright for your son to serve in the US Army?
- speaker: Respondent
  text: I thought he should go if he was taken in.
- speaker: Interviewer
  text: Did your neighbors say anything?
- speaker: Respondent
  text: No, they didn't.
- speaker: Interviewer
  text: Were you a Seventh Day Adventist then?
- speaker: Respondent
  text: Yes, I was. I have been a member almost 45 years.
- speaker: Interviewer
  text: Were church members close together as a group?
- speaker: Respondent
  text: No, we were scattered.
- speaker: Interviewer
  text: Were there any trouble in Tule Lake?
- speaker: Respondent
  text: There probably was but I stayed out of it and didn't even talk about it.
- speaker: Interviewer
  text: You were in Topaz for a while, how long?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: Were you with your mother?
- speaker: Respondent
  text: The daughter was married and her family was sent to Minidoka W.R.A. Center.
- speaker: Interviewer
  text: Were you over 60 at the time of the evacuation?
- speaker: Interviewer
  text: Did you have a hard time during the war?
- speaker: Respondent
  text: I may have but I don't remember. Her daughter says the hardest time was right after her father passed away and right
    after they came out of the relocation centers. While in camp, her mother was active visiting people and doing evangelistic
    work.
- speaker: Interviewer
  text: What did your husband die of?
- speaker: Respondent
  text: He died of a hemorrhage.
- speaker: Interviewer
  text: You must have been shocked.
- speaker: Respondent
  text: Yes, I was. My brother sent me some money from Japan.
- speaker: Interviewer
  text: Your children were quite grown when your husband died, weren't they?
- speaker: Respondent
  text: The youngest was 9. I forgot all the hardships and I thank God for now. I just hope I stay well enough so that I will
    not be a burden to my children.
- speaker: Interviewer
  text: Do you remember any other old-time stories?
- speaker: Respondent
  text: I don't think too much about the past. I try to be faithful to my religion.
- speaker: Interviewer
  text: The Sanseis are now interested in their Japanese background. Do you think it is a good thing?
- speaker: Respondent
  text: Yes, I do think it is a good thing.
- speaker: Interviewer
  text: Do you want to convey anything to the future generations?
- speaker: Respondent
  text: I think they should learn good manners and etiquette. We were taught very strictly about our manners.
- speaker: Interviewer
  text: Do you think manners and etiquette are important?
- speaker: Respondent
  text: Yes, they are.
- speaker: Interviewer
  text: Anything else? The old-timers say it is good for a person to go through hardship.
- speaker: Respondent
  text: I think persons who went through hardship have endurance. Children's education has to start when they are very young.
    We must learn how to get along with people and etc. I am old and I don't have much to say anymore.
- speaker: Interviewer
  text: Where did you return to when you left camp (W.R.A.)?
- speaker: Respondent
  text: The daughter says her husband, a chiropractor, couldn't find office space in Sacramento so they went to Los Angeles.
    Mrs. Imaoka has been living with them since. They are in Sacramento now.
- speaker: Interviewer
  text: Have you worked outdoors since you came to U.S.A.?
- speaker: Respondent
  text: No, I haven't because I have a weak heart. You can't tell from outside whether I have a weak heart or not.
- speaker: Interviewer
  text: Were your parents tall?
- speaker: Respondent
  text: No, not that tall. (Daughter says her mother was 5 ft. 1 1/2 inches tall).
- speaker: Interviewer
  text: If anyone wants to hear this tape, is it alright to let them hear this?
- speaker: Respondent
  text: Yes, it's all about myself and not about others.
- speaker: Interviewer
  text: We want to summarize the Issei stories and publish books. Can we have literary rights to these tapes? Do you want
    us to use a fictitious name or your real name in the event we use your story?
- speaker: Respondent
  text: Please use my real name.
