collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Can you describe a typical day growing up in Los Angeles? What were your parents doing and what was your family like?
- speaker: Respondent
  text: My father was a journalist working for the local Japanese vernacular newspaper. And my mother was a housewife. We
    lived in Boyle Heights, which is typical L.A. community.
- speaker: Interviewer
  text: And were they both Issei?
- speaker: Respondent
  text: Yes from Yamaguchi-ken.
- speaker: Interviewer
  text: Did they meet before they moved to the United States?
- speaker: Respondent
  text: Yes, yes. It was one of those fixed marriages.
- speaker: Interviewer
  text: Do you feel they were they happily married?
- speaker: Interviewer
  text: So your father, what kind of journalism did he do?
- speaker: Respondent
  text: He was the editor of the Japanese vernacular newspaper, the Sangyo Nippo.
- speaker: Interviewer
  text: I see. So a very educated man.
- speaker: Respondent
  text: I guess so if you can manage a newspaper, right? Mostly a paper for the farmers, the local farmers in that area.
- speaker: Interviewer
  text: So then you grew up in L.A. How many other siblings did you have?
- speaker: Respondent
  text: I had four but they're all deceased. And I was the last one, a menopausal child, nine years late. The next sister's
    nine years older than I am.
- speaker: Interviewer
  text: And so you had two sisters or how did it break down?
- speaker: Respondent
  text: They're all girls.
- speaker: Interviewer
  text: Would you say that you grew up fairly comfortable in Boyle Heights or, you know, you lived a pretty comfortable life
    before the war?
- speaker: Respondent
  text: I would say it's a typical Japanese life, I think. You're going to school constantly. Grammar school. And then as
    soon as I come home, we'd go to Japanese school five days a week. Everyday.
- speaker: Interviewer
  text: So you are fluent then?
- speaker: Respondent
  text: Enough to get by I would say.
- speaker: Interviewer
  text: Did you mostly speak to your parents in Japanese?
- speaker: Respondent
  text: Yes. That's how we communicated because they couldn't speak English.
- speaker: Interviewer
  text: And so right before Pearl Harbor in 1941 you were how old?
- speaker: Respondent
  text: I was 10-years-old. I don't remember much.
- speaker: Interviewer
  text: Do you remember the day at all?
- speaker: Respondent
  text: You know, all I remember was everyone was hovered around the radio. And then we had to put up sheets for, I guess
    at night, you know, couldn't have any lights on. That really stuck in my mind.
- speaker: Interviewer
  text: In case there were air raids?
- speaker: Respondent
  text: I thought, oh, that's all I remember is putting up the sheets.
- speaker: Interviewer
  text: Did you feel afraid? Did you kind of understand that?
- speaker: Respondent
  text: I had no idea. I was just there.
- speaker: Interviewer
  text: And were your four sisters still living there?
- speaker: Respondent
  text: No, I was the last one. Nine years later. The last one came so they all had their own families. They were all gone
    out of the house.
- speaker: Interviewer
  text: So just you and your parents right at the house. And do you recall anything that your parents might have said or how
    they reacted after?
- speaker: Respondent
  text: I have no recollection.
- speaker: Interviewer
  text: So when do you start remembering the kind of memories that involve going to the assembly center or camp? When do the
    memories kick in for you?
- speaker: Respondent
  text: I still remember vividly the horse stables, that really struck me. And then to see the grandstand at Santa Anita.
- speaker: Interviewer
  text: What do you remember about having to live there?
- speaker: Respondent
  text: Well, I saw some of the older adults making camouflage nets right at the grandstand. I remember that. And then more
    stables, of course. [My family was in] the regular stable. I still remember, Avenue 68. And a blue mess hall. And it's
    interesting, we went on a tour after this, when we returned and we passed that same mess hall. And where we used to go
    where the jockeys go now. And they still use that mess hall. I remember that vividly. And I still remember apple butter
    to this day, I think because that's all we had. Apple butter on toast is what they fed us.
- speaker: Interviewer
  text: And how about your sisters and their families? Were you together?
- speaker: Respondent
  text: They lived in Detroit, the oldest one.
- speaker: Interviewer
  text: Did your other two live in Los Angeles still?
- speaker: Respondent
  text: One lived in Buffalo, New York. Her husband was a translator. So International Institute was what it was called in
    Buffalo, Japanese translator. And then the next sister, the third one, I guess she was next. [Masako], she was with me.
    We're nine years apart so I can't recall.
- speaker: Interviewer
  text: Going back to a little bit, what happened to your home and all of your possessions?
- speaker: Respondent
  text: I have no idea. I can't remember anything. I was quite young. I don't know.
- speaker: Interviewer
  text: But you were probably renting a house or something?
- speaker: Respondent
  text: Oh yes, I'm sure.
- speaker: Interviewer
  text: And so then, going to Rohwer. Do you remember the train ride out there?
- speaker: Respondent
  text: I remember that, it's very vivid. It took 10 days just to go to Arkansas. We'd always have to stay on the side tracks
    and wait for the regular train to go. And it was interesting. My older sister wanted - she's crazy, but she wanted to
    get postcards and get off in Texas. And they were there with the rifles and they wouldn't allow her to leave. She was
    weird. She just had to get a postcard. You know? She thought she was on a tour! She's going across the country.
- speaker: Interviewer
  text: And what else about the train ride? Was it uncomfortable?
- speaker: Respondent
  text: Well, we sat up all the time. We couldn't, you know [lie down]. We'd have to be on the side tracks and wait for the
    regular trains to go by. We were just low priority, so we'd be waiting. Constantly waiting. It was a long trip, ten days.
    I thought they treated us like cattle. Really. That's what it boils down to.
- speaker: Interviewer
  text: And you had no idea where you were going?
- speaker: Respondent
  text: Well, no, I was too young. I just remember, "Oh, train ride!"
- speaker: Interviewer
  text: So you kind of felt protected, you didn't feel any fear at this point?
- speaker: Respondent
  text: No, at this point it's just a fun ride. You know, joy ride.
- speaker: Interviewer
  text: And so when you got to Rohwer, what do you remember about it?
- speaker: Respondent
  text: The humidity, and the mosquitoes. There were a lot of forests, really in the forest. I mean, you could see trees all
    over.
- speaker: Interviewer
  text: What did you end up doing for fun? Did you make friends there?
- speaker: Respondent
  text: We were all in blocks, so we were with our age group. I was active in the Girl Scouts. That's what they had for us
    at my age group.
- speaker: Interviewer
  text: What were some of the things you did as a Girl Scout?
- speaker: Respondent
  text: I can't recall [laughs]. It was just to get together with our peers. The girls were very nice. The leader ended up
    in Cincinnati. She was very nice, was Japanese. I remember her very well. I knew that we lived in the last block in that
    area near the forest. A wooded area.
- speaker: Interviewer
  text: That's why Arkansas was so different than the other camps because it was wooded, everything else was desert.
- speaker: Respondent
  text: And our Block 7 happened to be the corner. The last block in the area because one through seven and then backtracked
    to twelve.
- speaker: Interviewer
  text: And what was the food like? Do you remember the food?
- speaker: Respondent
  text: Just the fact that we had to eat in the mess hall. And what bothered me was we lost that whole family unit because
    the children would sit with their friends. You know, that was really lost. I think that was sad because we were a very
    close knit family and we all of a sudden lost that.
- speaker: Interviewer
  text: You weren't sitting with your parents anymore?
- speaker: Respondent
  text: Oh, no. I don't know why, but I guess I miss that. You know, it's a tradition that we had that was gone.
- speaker: Interviewer
  text: Did your parents work in camp?
- speaker: Respondent
  text: My father was a block manager. So he had a lot of responsibility.
- speaker: Interviewer
  text: Was he bilingual?
- speaker: Respondent
  text: Well, to a certain extent. He could just sort of get by in broken English.
- speaker: Interviewer
  text: 'So there are four of you then in Rohwer: Masako, yourself, your mom and dad?'
- speaker: Respondent
  text: Oh, yes. Yes.
- speaker: Interviewer
  text: Were you close with your sister?
- speaker: Respondent
  text: Yes, I was the spoiled one because I was the last menopausal child coming in. Nine years later, They spoiled me, and
    I don't remember too much.
- speaker: Interviewer
  text: Your parents had all daughters.
- speaker: Respondent
  text: Isn't that strange?
- speaker: Interviewer
  text: Yes. My father was so upset when I came along, he just went out and got drunk that day. Because he was really looking
    forward to a boy. You know, they [the doctor] determines the sex. And he goes, "It's his fault" [to Sets' dad].
- speaker: Interviewer
  text: Out of five, and they never had a boy.
- speaker: Respondent
  text: And you know, in the Japanese culture, women don't count. Back then, it was very different.
- speaker: Interviewer
  text: Chinese culture is that way too.
- speaker: Interviewer
  text: Do you remember anything about school in camp?
- speaker: Respondent
  text: Well, I remember our desks were made of logs. I still have a picture.
- speaker: Interviewer
  text: And do you remember that teddy bear you had? That was the one you took to camp, huh?
- speaker: Respondent
  text: My Panda bear? That's the same one I have [laughs].
- speaker: Interviewer
  text: And it looks really old obviously. I was going to take it to the dry cleaner to see what they could do with it. I'm
    kind of scared it will fall apart, but it is in pretty good shape.
- speaker: Respondent
  text: It still has eyes.
- speaker: Interviewer
  text: Do you know who gave it to you?
- speaker: Respondent
  text: You know, my father bought it one night. We used to go out a lot on weekends and go to the movies. And then we'd always
    stop at a drugstore because my father had to have his cigar. And I saw it there and he bought it for me. I still remember
    that. Oh, it was near the Orpheum Theater back in L.A., downtown.
- speaker: Interviewer
  text: That's really that's amazing. You should keep that though as a family heirloom.
- speaker: Respondent
  text: Right. Yeah. I really can't believe that it's traveled all the way, you know.
- speaker: Interviewer
  text: So you started junior high in camp?
- speaker: Respondent
  text: Something like that. My first impression was [it was the] first time all the Japanese were together, no whites that
    were there, they were all Japanese. I think I was more impressed with the idea of the area. Find all these Japanese not
    in Little Tokyo, but in the wooded area. And we sat in these log desks in alphabetical order.
- speaker: Interviewer
  text: And you were there for all three years in camp?
- speaker: Respondent
  text: Yeah, until the war was over.
- speaker: Interviewer
  text: Even though you were too young at the time, knowing what you know now about the loyalty questionnaire, what are your
    thoughts about it?
- speaker: Respondent
  text: Well, I feel that everything happened because of the color of my skin, the way we look. And I think that impressed
    me more so when I went to the South, because that's where there's really discrimination. And I grew up there.
- speaker: Interviewer
  text: When you say South -
- speaker: Respondent
  text: In New Orleans, I lived in New Orleans for 15 years.
- speaker: Interviewer
  text: Oh, this is after camp.
- speaker: Interviewer
  text: Why New Orleans?
- speaker: Respondent
  text: My father was somehow in the shrimp business. He couldn't speak English, couldn't write English, so he wrote in characters.
    And he somehow was accepted by this Chinese man who was so kind to us. And he invited him to come there from Rohwer to
    New Orleans. So we were in the shrimp business. I lived in New Orleans for 15 years.
- speaker: Interviewer
  text: That's fascinating. I have never heard of somebody relocating to the South after.
- speaker: Respondent
  text: That was unusual. But I love the South. They're a different breed.
- speaker: Interviewer
  text: Segregation and all that was still happening, right?
- speaker: Respondent
  text: 'Oh yes. We were considered white. Very interesting. Because the public restroom: White and colored.'
- speaker: Interviewer
  text: And what were you able to use?
- speaker: Respondent
  text: White. That was sort of interesting. I thought, okay, colored. No way. It is definitely black. It's very prevalent
    even to this day.
- speaker: Interviewer
  text: And then buses.
- speaker: Respondent
  text: Yes, They sit in the back. We would be sitting in the back, and they told us to come to the front. It was interesting
    for me to go through that. That was in the early stages.
- speaker: Interviewer
  text: Who would tell you to move to the front? Who would say that to you?
- speaker: Respondent
  text: All the other ones who were sitting on the bus. But I don't know if they were white or, most of them were white. The
    blacks wouldn't say, they're not vocal. It's very sad. And they'd keep to themselves and they were more comfortable that
    way, too, to keep it to themselves. I mean, you go to a public restroom. Definitely we were considered white.
- speaker: Interviewer
  text: Did you experience any backlash? Even though you were considered white in the segregated South, did you experience
    any kind of discrimination from either side?
- speaker: Respondent
  text: Not at all, not at all. They considered us white.
- speaker: Interviewer
  text: Even after the war?
- speaker: Respondent
  text: Even after the war. They had never seen Japanese. And they thought we were Chinese. But they don't have many chop
    sueys because it's almost all French cooking down there. So they don't get the restaurants. People go to New Orleans to
    eat southern food. [laughs] It's a beautiful city though. I loved it. And people are so different.
- speaker: Interviewer
  text: In what way?
- speaker: Respondent
  text: They're very kind to us. Really different from Californians. Californians are selfish. They think of themselves, go
    forth and go ahead, you know. But the South, they're very hospitable, they think of you. They're friendly. I loved it.
    I could live there all the time. As it was, I lived there fifteen years.
- speaker: Interviewer
  text: So how did your father get this job right after camp?
- speaker: Respondent
  text: He was a journalist like I said, and very good in writing Chinese characters. He was befriended by a Chinese man who
    was in the shrimp business. And he told him, "Come here to New Orleans." So we went, he really befriended us. I say this
    really with a sense of - he was so nice to us that even when I left there because my father passed, he found out why I
    was going back to Los Angeles, he said, 'I have property here. We could bury him here in Louisiana.' He was willing to
    let me bury him there. That's how nice he was to us. I thought that was sort of a nice gesture. He didn't have to say
    that.
- speaker: Interviewer
  text: Do you remember his name?
- speaker: Respondent
  text: C.D. Hoy. He's no longer alive, of course. He had two sons and they were very kind to us, too.
