collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When did you leave Japan?
- speaker: Respondent
  text: As I don't remember well, but I think it was March of 1914.
- speaker: Interviewer
  text: From what reason did you leave Japan?
- speaker: Respondent
  text: To get married.
- speaker: Interviewer
  text: Was Mr. Iijima in America?
- speaker: Respondent
  text: As I met him at a church in Matsuo. Later he went back to Japan. For some reason I could not come to America, so I
    quarrelled with my sister who was in Hawaii. In the meantime our house was burned down by a fire. His parents came from
    far away to ask me to become his son's bride, so my older brother finally gave in. I came to America with a promise that
    we would go back to Japan in about 3 years.
- speaker: Interviewer
  text: Were you a Christian then?
- speaker: Respondent
  text: Yes, I belonged to a Christian church in Azabu.
- speaker: Interviewer
  text: Where did you go first when you came to America?
- speaker: Respondent
  text: At San Francisco. I was not baptized yet, so a missionary told me to be baptized. I told him that I was not ready
    for it, but he told me that my brother who was in the theological seminary in San Anselmo said I was ready and he wanted
    me to be baptized. I was baptized around April 30.
- speaker: Interviewer
  text: When you left Japan were there anything you wanted to do in America?
- speaker: Respondent
  text: I don't know myself how it happened, but I had trouble with a marriage. I had a child, so I wanted to go back to Japan.
    I wanted to go to school when I came to America, and correspond with her. Rev. Watanabe's wife was teaching English at
    YWCA, so my brother asked her to teach me English, but I could not go there. I was supposed to have gone back to Japan
    after 3 years, but I couldn't do so. A little later my brother came to see me on his way to a church in Seattle. Things
    were not going on well, so he thought it was better for both sides and for my child that I went back to Japan. I was going
    to do so but I couldn't, and I let the matter slide. That child's daughter graduated from Aoyama Gakuin and came to college
    here a few years ago. Her husband's father is a minister.
- speaker: Interviewer
  text: What did you do at San Francisco?
- speaker: Respondent
  text: I heard that he had a big store, so I thought he was doing well. But when I came here I found out that he was in milk
    delivery business. Rev. Koga's father and my brother were good friends. Rev. Koga went back to Japan on the same ship
    I came to America. My husband was a Christian, but was a Catholic.
- speaker: Interviewer
  text: When you came here did you help the store?
- speaker: Respondent
  text: My husband delivered milk from 5 o'clock in the morning. In those days there were no automobiles, so he went to the
    wholesale milk dealer by horse drawn cart and delivered milk before people got up. The store was very small. As everything
    was so different I had a hard time. I said I wouldn't do anything until my husband lets me go to church, so I went to
    church every Sunday.
- speaker: Interviewer
  text: Did you stay in San Francisco until the war broke out?
- speaker: Respondent
  text: No. He was selling candies besides milk. He went to a candy maker's and learned to make candies with a plan to start
    a candy company like Morinaga in Japan, but it did not work as he planned. He made candies and ice cream and sold them.
    He kept on saying that we were going back to Japan, but we did not get to do so.
- speaker: Interviewer
  text: Why were you planning on going back to Japan after 3 years?
- speaker: Respondent
  text: I left my child in Japan, so I planned to go back to Japan after 3 years, but it did not work out as I planned, and
    I could not go to school after 3, 4 or 5 years. Some people learned English at YWCA before joining their husband in the
    country, but I did not have such freedom.
- speaker: Interviewer
  text: Did you go to different places in California from San Francisco?
- speaker: Respondent
  text: I had been healthy and I had never been sick, but as I worked too hard I became ill. The doctor told me that the climate
    in San Francisco was not suitable for me and I should move to Sacramento or to Southern California. I would get rheumatism
    if I stayed in San Francisco. I had arthritis, so when we made money at the time of the Exposition we sold the store and
    moved to Sacramento. When we moved to Sacramento my husband did not have a job, so I told him to go to school and study,
    and I will do the housework, but he did not do that. He had injured his knee when he was young.
- speaker: Interviewer
  text: When did you start the beauty shop?
- speaker: Respondent
  text: Mrs. Hirasawa had a beauty shop and told me to be a beautician. Also Mrs. Toriumi asked me to help her with sewing.
    Both were my friends so I did not know what to do, but Mr. and Mrs. Miyakawa told me that I should learn to be a beautician.
    When I told them that I didn't have the money, I raised money by selling raffle tickets and bought Mrs. Hirasawa's store
    for $1,000. In that way I opened a beauty shop in Sacramento without a license. My husband did not have a steady job so
    we could not make a living. At one time my brother sent us about 20 copies of the book he wrote, so we sold them and had
    money for about a week. My husband and a few other members always gathered at Mr. Ishizaki's house and criticized pastors.
    As we had an old Ford they all got in our car and went around, and we could not make a living. As I would have been fined
    for operating a beauty shop without a license I attended a beauty college while operating the beauty shop. Then I went
    to a beauty school in San Francisco and learned Marinaro system by using electricity. Before that I learned sewing for
    a while. When I came to America I wanted to learn English and typing so that I could go back to Japan and work at some
    company as my marriage to Iijima did not go well. However, I went to the beauty college and received a diploma as a beautician
    and a hairdresser. Hence I was interested in removing hair, but there wasn't any teacher here so I studied it through
    books. As my English was poor, I was afraid if I could pass a test. But when I took a test on manicure special I barely
    passed it. Then I took a test on electro and manicure and passed it with the score of 97%. I was the only Japanese among
    about 300 people who took the test. I was bashful when I was praised. I was not good at making money; so even with good
    income I did not have a permanent machine. I waved hair with heat instead of electricity, so not many people wanted permanent.
    However, I made $6 for fence line one hair. Japanese wouldn't spend such money, but I had American customers once in a
    while.
- speaker: Respondent
  text: For a while I sold insurance. A man who is in insurance business in Salt Lake City now recommended my husband to sell
    insurance as he was not working, but he did not do well so I had to sell it. As I did not drive I had to go with my husband,
    and while he was talking I wrote down the information.
- speaker: Respondent
  text: My early days in America was such a confusing one. I went to San Francisco with an intention of going back to Japan,
    but I came down with fever. I cried as I thought God still wanted me to stay here. At that time Rev. Inori was a seminary
    student, and was staying at the church. He knew my older brother who had a math school in Tokyo, so he cooked breakfast
    for me. When Mr. called my husband in Sacramento telling him that I had to be hospitalized with swollen adenoid he rushed
    from Sacramento to take me home.
- speaker: Interviewer
  text: What were you doing when the war broke out?
- speaker: Respondent
  text: I had the beauty shop here.
- speaker: Interviewer
  text: What did you do when you had to go to the relocation camp?
- speaker: Respondent
  text: I stored the equipment in a government storage. Around March of 1940 I spent much money and remodeled the beauty shop
    and put new furniture in so that it would be more comfortable for the girls to work there. After that the war broke and
    I heard that we might not be able to buy any more material, so I spent more money buying materials. Then I received the
    last letter from my husband who was helping Dr. Kagawa in Japan telling me to go back to Japan. I did not have time to
    sell the store and catch the last ship to Japan, so I sent a letter to him telling him that I would not go back to Japan.
    I don't know whether he received the letter or not. Our son Sammy did not want to go to Japan as he did not speak Japanese
    and could not go to a school, but he told me to go back to Japan alone if I wanted to. As he was my only son and was still
    in high school I did not have any intention of going back to Japan.
- speaker: Respondent
  text: As for our belongings I did not know what to do with them. I wanted to store them in government warehouse as it was
    free, but some people who did not trust the US government said that the government would not return our belongings. It
    was close to March 24, the deadline for the relocation. Mr. Miyamoto offered to make arrangements for me to put my belongings
    in the warehouse, but as my relations in Los Angeles wanted me to go there I didn't have time, so I finally sold the store.
    After spending a lot of money I sold the store for only $500. I spent about $700 buying new equipment and spent much money
    in buying materials. Except for $3,000 in insurance I didn't have much money on hand.
- speaker: Respondent
  text: Sammy took a course in aeronautics at junior college, that helped. In those days Japanese could not get in the Air
    Force, but a pastor in Marysville helped him get Sammy in the Air Force. After taking the Basic training he was stationed
    at Travis Air Force Base. At that time I injured my foot, so he was allowed to come home over the weekends. After I sold
    the beauty shop I went to camp, but I did not stay there too long.
- speaker: Interviewer
  text: Which camp did you go to?
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: Less than a year.
- speaker: Interviewer
  text: How did you feel when you went to the camp?
- speaker: Respondent
  text: I was not mad everyone was together, but I felt pitiful. It could not be helped, everyone had to bear it. My husband
    was in Japan, and wrote me and told me to go back to Japan but I could not. My niece met her husband at the University
    of California, and then they went to Cleveland and graduated from a school there.
- speaker: Interviewer
  text: How long did you stay in Cleveland?
- speaker: Respondent
  text: I did not go to Cleveland. I went to Saginaw, Michigan. I stayed there a little over a year. Then my niece had to
    move because of her husband's job. We moved to Chicago and Sammy got a job there working till 4 o'clock. He attended a
    night school there.
- speaker: Interviewer
  text: Did you come back to Sacramento right after the war ended?
- speaker: Respondent
  text: The war ended when I was working at a factory in Chicago. While we were in Michigan my son received I-A so we thought
    it was hard for him to get a job, but he got a job as soon as we went to Chicago. I was going to stay in Chicago for a
    while, but some people told me to come back to Sacramento as my beauty shop was for sale. Even if I wanted to buy it I
    couldn't if I didn't have the money. I thought all the furniture I bought were in the shop, so I came back from Chicago.
    At that time Sammy was staying at Marysville, and met me at the station. Next morning he went to Travis Air Force Base
    in Fairfield and became an assistant to an instructor.
- speaker: Interviewer
  text: Did you buy back the beauty shop?
- speaker: Respondent
  text: Yes, I did. But all the new furniture I bought when I remodeled the shop were gone, and just junk was left. Before
    the war I had about 4 girls working for me, but after the war I did not have enough furniture and the wages were higher,
    so I worked alone or hired a helper sometimes. Had there been no war I would have made money. The other day I went to
    have a will made as I had not been feeling well, but I was told that unless I have real estate I did not need a will.
    You should mention in your will how you want your funeral. I have already written that I want my funeral not to be a sad
    one but that God's will be shown through my death.
- speaker: Interviewer
  text: Do you remember anything that happened in the relocation camp?
- speaker: Respondent
  text: I taught Sunday School in the camps. My son played a portable piano, but as his legs were long the piano was pinched
    and he had to hold the piano down with one hand. My niece played a piano at the church in the hospital. Her in-laws were
    not Christians so they scolded her for doing that. After my niece's family left the camp they wrote to us often urging
    us to leave the camp as it was not good for Sammy, so we left. I worked as a nurse's aide in the hospital so we were given
    enough medicine and food and were treated well.
- speaker: Interviewer
  text: What did you miss most in the camp?
- speaker: Respondent
  text: There were many churches in the camp, but there were many non-Christians. Rev. Ogi was our pastor.
- speaker: Interviewer
  text: Did everyone have to go to church?
- speaker: Respondent
  text: Everyone should go to church, but they didn't. Some people became unruly. Those who behaved unruly were sent to Tule
    Lake.
- speaker: Interviewer
  text: What do you mean by acting unruly?
- speaker: Respondent
  text: They said bad things about the camp, and started fights. Christians did not do such things. People in our block wanted
    to sell beer so they took votes to get permission from the office. I was working in the kitchen then. One morning when
    I went to the kitchen they told us to vote in order to get permission to sell beer. It was Sunday and the Sunday School
    children were there, so they made the children put their ballot in the box. I told them it was wrong to do such a thing.
    When I told the children it was wrong to do such a thing they said that they did because those men told them to do so.
    That is why when we left the camp the people in the kitchen said that we were going to be prostitutes after we left the
    camp. Dr. Muramoto's wife who had been with me since she was in Sunday School saw us off. When we left the camp we were
    frightened. Togasaki brothers were in the camp.
