collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Qoshiozu-cho, Yonago-shi, Tottori-ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on June 1, 1888. I am eighty-seven (87) years old now. It has been sixty-nine (69) years altogether since
    I came to the United States. Father of one son and one daughter, and I have two grandchildren. My son runs a fruit ranch
    in Linden, Stockton.
- speaker: Interviewer
  text: Do you remember the wars that Japan was involved -- the Sino-Japanese War, and/or Russo-Japanese War, for example?
- speaker: Respondent
  text: In 1894 when I was in the second grade or so, I remember we had a flag procession to celebrate our victory in the
    Sino-Japanese war. At the Peace Conference which followed the war, China was pressed to yield Shanghai and Hong Kong to
    Great Britain, to France, and to Russia for ninety-nine (99) years; those very cities that Japan gave back to China from
    Spanish rule. Japan vexed at it. The Russo-Japanese War was around 1904, when I was in the third grade in Jr. High school.
    As the Russian Baltic-fleet made its way around the southern tip of Africa, passed Singapore, sailed through the Sea of
    Japan, and finally heading for the final destination of Port Arthur, the Japanese Navy destroyed the Russian fleet with
    Admiral Togo as the Commander-in-Chief. With the arbitration effort from the U.S., the war ended at that point. It was
    a total victory for Japan. When the salute-guns roared in the clear blue sky over the Sea of Japan, I climbed up the Mount
    Takao of the Shimane Peninsula, and with a telescope I sighted a dim view of the Japanese fleet in the distance. On the
    following morning, the flagship Mikasa, the battleship Hatsuse, and a few cruisers anchored off the coast of the Kyuhin
    Peninsula. Watching them fire the victorious twenty-one-salute shots was just a spectacle. Representing the city of Sakai,
    the mayor, the school principal, city councilmen, and others got on board the flagship Mikasa to welcome Admiral Togo
    and the other high-ranking officers, and then they were led to the port at Sakai so as to have a rest at an elementary
    school in the city. All of us pupils from the elementary and the Jr. high schools of the city celebrated the occasion
    with a lantern parade at night. Also, fireworks were displayed. The pupils were allowed to visit the battleships offshore.
    World War I started in 1914, and the U.S. joined in 1917. At that time I was in Stockton working on a farm raising beans,
    corns, barley, and others. I remember supplying horses to the military. There were some Japanese people who volunteered
    to the military and worked on the battleships as cooks or as cargo-shipping personnel. I was working on a farm in Stockton
    at the time of the Manchurian Incident as well. Japan tried its best to develop Manchuria that she borrowed from China
    for ninety-nine (99) years by sending in a lot of immigrant settlers across the sea and constructed railways, encouraged
    various industries -- agriculture, manufacturing industries, commerce and businesses -- and also built hospitals and schools.
    Japan made her investment in a wide range of fields in Manchuria. It was due to the ambition of Russia that the Incident
    broke out.
- speaker: Interviewer
  text: Do you remember happy moments and sad moments while in Japan?
- speaker: Respondent
  text: Athletic meets and excursions while I was in school, celebrating the New Year's Day in best clothes, and visiting
    shrines with some pocket money on me at the time of festivals... those were the happiest times I had. As to sad moments
    and hard times, I don't remember much.
- speaker: Interviewer
  text: Do you remember the Great Kanto Earthquake?
- speaker: Respondent
  text: I was already in the States then. I remember sending care packages to Japan through the Red Cross.
- speaker: Interviewer
  text: What was your family religion?
- speaker: Respondent
  text: Our family was on Zen-shu sect. Since people in Japan paid respect to the Shinto god, regardless of their own religion,
    there was a Shinto altar in every home. Our family did the same. Occasions that we celebrated are the New Year's Day,
    Kigensetsu (National Foundation Day), Niiname-sai (Labor Thanksgiving Day), spring festival for the sowing, and autumn
    festival for the harvest. It was customary in autumn to offer the first harvest rice to the Shinto god.
- speaker: Interviewer
  text: Did you hear about Christianity while you were still in Japan?
- speaker: Respondent
  text: 'One day on my way to school -- I walked to school for about two and a half miles every day -- I saw an English missionary
    from Yonago all pushing her bicycle which had a flat tire on her way. I felt sorry for her. When I was in Jr. high school,
    I used to go with five or six friends of mine to a Christian church in Yonago-shi to learn English conversation. At that
    time a missionary from England, Rev. B. B. Buxton was in Matsuye-shi doing his evangelical work and also teaching English
    at a Jr. High school there. His colleague, Mr. Welkin was then at a mission-post in Yonago-shi, and for the English lessons
    he used to make us read the English Bible in turn. The verse of the first chapter of the Gospel according to John: "In
    the beginning was the Word, the Word was with God. The Word was God," I cannot forget that verse. One of my friends, by
    the name of Mr. Mosa Shinoda, received baptism and later became a minister. Incidentally, it was the time when receiving
    baptism was quite a difficult thing to do.'
- speaker: Interviewer
  text: When you first came to the U.S. how was your family and the society at large back in Japan?
- speaker: Respondent
  text: Father was a treasurer of Ooshinozu-cho and owned a lot of farm land. He was an independent farmer at the time. I
    was the oldest son of the family and had three sisters and remember my grandmother was living with us. Besides that, since
    my family had housemaids and butlers it was quite a big family. As to the Japanese society at that time, it was right
    after the Russo-Japanese War and the national economy was thriving. Also, the military men were at the height of their
    prosperity.
- speaker: Interviewer
  text: How much education did you receive in Japan?
- speaker: Respondent
  text: 'Eight years in elementary school, five years in Jr. high school. I also finished English Reader and Grammar Book:
    VIII (No. 8).'
- speaker: Interviewer
  text: What was your main reason for coming to the U.S.?
- speaker: Respondent
  text: I came here to study.
- speaker: Interviewer
  text: When did you leave Japan and land in the U.S.?
- speaker: Respondent
  text: In June of 1906 I left the port of Kobe. Thirteen days later I arrived at Victoria Island and changed to another port
    from there to come to San Francisco. It was right after the great earthquake hit the city. Houses were all destroyed,
    fires swept the city, debris and bricks were all over the place. And so there was really nothing left to be seen in the
    city. It was the time of anti-Japanese sentiments, and I had tomatoes and eggs thrown at me in the streets.
- speaker: Interviewer
  text: Did you stop over at Hawaii?
- speaker: Interviewer
  text: What kind of people were on board with you?
- speaker: Respondent
  text: A majority of them were immigrants. There were some white people, too. I came with four friends of mine. A minister
    was on board, too.
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Respondent
  text: Ten-yo-maru, six thousand (6,000) tons.
- speaker: Interviewer
  text: What are your memories of the voyage?
- speaker: Respondent
  text: I practiced English conversation while on the ship.
- speaker: Interviewer
  text: Before you left Japan, what did you have in mind about the U.S. and also what did you want to do?
- speaker: Respondent
  text: A great nation, a country of democracy, a Christian country - the place where I wanted to study. I also wanted to
    make some money.
- speaker: Interviewer
  text: What was your first impression when you landed?
- speaker: Respondent
  text: I had an impression that it was a civilized country. Another thing that struck my eyes was that there was a whole
    variety of different races in this country. White people looked to me as very tall, big, and great. Another impression
    I had was about the material wealth of this country.
- speaker: Interviewer
  text: Do you recall anything particular at the immigration office?
- speaker: Respondent
  text: They treated us in a gentleman-like manner.
- speaker: Interviewer
  text: When you came to the U.S. what did you do first?
- speaker: Respondent
  text: I entered a class of sixth graders at a grammar school in Oakland. I became a school boy then and worked for a white
    family.
- speaker: Interviewer
  text: What did you think of the way white people treated you?
- speaker: Respondent
  text: To make me do some work they used to shout at me, "Hey, you!" That made me feel so wretched and miserable that I used
    to cry in bed at night.
- speaker: Interviewer
  text: What are some of the sad moments as well as happy moments in those days?
- speaker: Respondent
  text: I missed my family and my friends back in Japan so much that I often wept by myself. Also, it made me feel helplessly
    miserable to do the house work which I had never done before. Other than that, I really don't recall much about anything
    except to say that probably my mind was occupied with my everyday study and with the kind of hope I held for the future.
- speaker: Interviewer
  text: When would you say it was that you felt settled in the U.S.?
- speaker: Respondent
  text: In January of 1929, my brother and I bought some land on July 9th that same year, our oldest son was born. Perhaps
    that was when.
- speaker: Interviewer
  text: How did you find your wife?
- speaker: Respondent
  text: I went back to Japan in 1924, and my father helped me find a wife then. It took the form of a so-called arranged marriage,
    and in our case the arrangement was made with the agreement of both of us as the final step. First of all, our go-between
    visited the bride's family with betrothal gifts. About a week later we had the traditional Japanese wedding ceremony at
    my father's house.
- speaker: Interviewer
  text: How was the wedding ceremony?
- speaker: Respondent
  text: Relatives of our families, about thirty of them altogether, came to congratulate us. We had a reception party at the
    same time. For our honeymoon trip, we went to Matsuye-shi with my mother and brothers, where the Santin-Olympics had been
    held at that time.
- speaker: Interviewer
  text: Do you have some memories about the picture marriage?
- speaker: Respondent
  text: In 1910 or so, the Gentleman's Agreement between Japan and the U.S. was signed which opened the way to the "picture"
    marriages. Around the time of World War I I heard there came some seven hundred brides to the States. In those days, as
    the ships from Japan arrived, the grooms would get on the ships with the pictures of their brides in hand and would look
    for the right ones that matched the pictures.
- speaker: Interviewer
  text: Have you experienced any homesickness?
- speaker: Respondent
  text: For the first few years I missed my parents, brothers and sisters, my friends, and my hometown back in Japan. I missed
    them so much that I often cried.
- speaker: Interviewer
  text: What kind of hardships did you experience to get used to the American life?
- speaker: Respondent
  text: I studied in school and worked for a white family so as to practice the English conversation.
- speaker: Interviewer
  text: Do you have any experiences of being discriminated and/or humiliated?
- speaker: Respondent
  text: Migration from Hawaii to the mainland U.S. was banned and our going to school was restricted to only a few schools.
    Schools were not completely open to us. In Oakland, for example, it was only Grant school that we could go to. After the
    passage of the Alien Land bill in 1920 in California, we could not lease any land which made it very difficult for us
    to work in agricultural field. We helped those Hawaiian-born people obtain their citizenship status and worked on a farm
    in partnership with them.
- speaker: Interviewer
  text: How did you learn your English?
- speaker: Respondent
  text: I studied up to the Reader Book VIII in Jr. high school in Japan. I also used to read the Bible to learn English conversation
    from the missionary at the Christian church in Yonago-shi. Once in the U.S., I was enrolled in the sixth grade of Grant
    school in Oakland and studied there for three years.
- speaker: Interviewer
  text: How much income did you make in the first few years here?
- speaker: Respondent
  text: I was a schoolboy the first year and made a dollar-fifty ($1.50) a day. In the second year I was taking care of medicines
    at a white physician's office, where they paid me a dollar seventy-five ($1.75) a day. Then in the third year, I became
    a chief cook for the white family and was getting paid forty dollars ($40.00) a month plus room and board.
- speaker: Interviewer
  text: Did you buy a house? Wasn't there any problems then?
- speaker: Respondent
  text: When we bought the farm it had a house on it.
- speaker: Interviewer
  text: What did you use your land for?
- speaker: Respondent
  text: My brother and I jointly bought an eighty-acre land. It was two-hundred dollars ($200.00) per acre. We used it for
    farming.
- speaker: Interviewer
  text: Did any organizations help you at the time of purchasing the land, such as JACL, Kenjin-kai, churches, Japanese Consulate,
    farm organizations and others?
- speaker: Interviewer
  text: What are your hobbies and favorite pastime activities?
- speaker: Respondent
  text: I play baseball and used to play pitcher and outfielder. I also played tennis a lot. I won the first prize trophy
    at a tennis tournament while we were in the Manzanar Camp.
- speaker: Interviewer
  text: What are some of your reflections on bringing up your children?
- speaker: Respondent
  text: I was glad to have my successors.
- speaker: Interviewer
  text: Did you send any of your children to Japan?
- speaker: Respondent
  text: No. It's best for the children that their parents bring them up.
- speaker: Interviewer
  text: Do you have memories of W.W. I? Any contributions to it?
- speaker: Respondent
  text: Around 1910 until 1914, I was farming in the Stockton Delta area. I didn't make any special contributions or anything
    like that. I was just working on a farm raising beans, corns, barley and other crops that were short at the time of the
    war. I recall supplying horses to the military.
- speaker: Interviewer
  text: Do you have any memories of segregated schools and Japanese schools?
