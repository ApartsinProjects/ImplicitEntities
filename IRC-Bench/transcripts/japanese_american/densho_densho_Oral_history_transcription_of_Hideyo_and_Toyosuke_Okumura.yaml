collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where is your birthplace?
- speaker: Respondent
  text: It is Hiroshima.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in February 1887. My wife was born in Feb., 1891.
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I am only 87 years old.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Toyosuke Okumura.
- speaker: Interviewer
  text: What about yours, Mrs. Okumura?
- speaker: Respondent
  text: My name is Hideyo Okumura.
- speaker: Interviewer
  text: Where were you born Mrs. Okumura?
- speaker: Respondent
  text: I was born in Miho, Hiroshima.
- speaker: Interviewer
  text: When did you leave Japan, Mr. Okumura?
- speaker: Respondent
  text: I left Japan in 1912 and came here.
- speaker: Interviewer
  text: Did you come to America to work?
- speaker: Respondent
  text: Of course. I didn't come here to gamble.
- speaker: Interviewer
  text: Did you come alone?
- speaker: Respondent
  text: Yes, I came here alone at first.
- speaker: Interviewer
  text: Did you have friends over here?
- speaker: Respondent
  text: No, nobody special although there were many people here from my native village. When I came here I didn't have any
    friends. I went to Hawaii and stayed there for 12 years. Then I came here.
- speaker: Interviewer
  text: Did you come to America in 1924, then?
- speaker: Respondent
  text: Yes, I did. It was at the height of exclusion. I was doing business then.
- speaker: Interviewer
  text: What kind of business were you in?
- speaker: Respondent
  text: I was in grocery business.
- speaker: Interviewer
  text: When did you come here Mrs. Okumura?
- speaker: Respondent
  text: I came here about 4 years after my husband did.
- speaker: Interviewer
  text: Were you married before you came here?
- speaker: Respondent
  text: We were married and had a child. I brought him with me.
- speaker: Interviewer
  text: How was the life in Hawaii?
- speaker: Respondent
  text: I managed a store at first, then I worked as a teacher of the Japanese Language School before I came here.
- speaker: Interviewer
  text: What kind of work did you do after you came here?
- speaker: Respondent
  text: I could not find a job so I packed fruits.
- speaker: Interviewer
  text: Where did you work at?
- speaker: Respondent
  text: In Sacramento. We lived in Sacramento for over 30 years.
- speaker: Interviewer
  text: Did you start a business here?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What kind of business?
- speaker: Respondent
  text: I was in restaurant business for 4 to 5 years. After I quit the business I packed pears.
- speaker: Respondent
  text: He hired people and grew grapes also. He did all kinds of work.
- speaker: Interviewer
  text: What do you remember well about the time you first came here?
- speaker: Respondent
  text: I had a contract of growing grapes hiring 30 to 40 Japanese.
- speaker: Interviewer
  text: What were the hardest things?
- speaker: Respondent
  text: I didn't experience any hardships.
- speaker: Interviewer
  text: Were you ever in trouble?
- speaker: Respondent
  text: No, I only missed my wife. After my wife joined me she cooked with one helper.
- speaker: Interviewer
  text: Were you a contractor?
- speaker: Respondent
  text: Yes, I was. I had a contract with a company.
- speaker: Interviewer
  text: Was that in Sacramento?
- speaker: Respondent
  text: No, it was in Lodi.
- speaker: Interviewer
  text: Did you hire about 30 people?
- speaker: Respondent
  text: I had 30 to 40 helpers.
- speaker: Interviewer
  text: What kind of employees did you have? Were they Japanese or Mexicans?
- speaker: Respondent
  text: They were Japanese.
- speaker: Interviewer
  text: They were Isseis, weren't they?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Were those Isseis single or married?
- speaker: Respondent
  text: There were some who were married and some were single.
- speaker: Interviewer
  text: Did you own a camp?
- speaker: Respondent
  text: Yes, I did.
- speaker: Respondent
  text: I cooked and sometimes I went out to pick.
- speaker: Interviewer
  text: Wasn't it hard to cook for about 30 people?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: About what time did you get up?
- speaker: Respondent
  text: They went out to work by 7 a.m. so I got up about an hour earlier.
- speaker: Interviewer
  text: Did you cook 3 meals a day?
- speaker: Respondent
  text: Yes, I did. I also prepared Japanese style bath. I had a hard time.
- speaker: Interviewer
  text: What was hard for you?
- speaker: Respondent
  text: We had hired people there were some trouble.
- speaker: Interviewer
  text: Did you cook rice?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Were there any incidents?
- speaker: Respondent
  text: Nothing special happened.
- speaker: Interviewer
  text: What is your religion?
- speaker: Respondent
  text: It is Buddhism.
- speaker: Interviewer
  text: Is it the Shinshu Sect?
- speaker: Respondent
  text: Yes, it is.
- speaker: Interviewer
  text: Did you leave Japan to do business here?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Were you sent here from a company?
- speaker: Respondent
  text: No, I was on my own. My relative had a big store in Hawaii hiring 4 or 5 employees. I managed a liquor store. A relative
    asked me if I would like to quit the liquor business and teach a school, so I did.
- speaker: Interviewer
  text: Were you a teacher in Japan?
- speaker: Respondent
  text: No, I became a teacher after I went to Hawaii.
- speaker: Interviewer
  text: How much schooling did you have in Japan?
- speaker: Respondent
  text: I went to a high school.
- speaker: Interviewer
  text: Not many people attended high schools, didn't they?
- speaker: Respondent
  text: In those days few people graduated from high schools.
- speaker: Interviewer
  text: Were you the oldest son?
- speaker: Respondent
  text: No, I was the youngest.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had 5 brothers and sisters.
- speaker: Interviewer
  text: Didn't your parents object when you told them that you were going overseas?
- speaker: Respondent
  text: No, they didn't. I put in an application to go overseas without telling my parents, brothers nor my wife. Three days
    later the passport was issued and surprised my wife. Then I told my parents and brothers that I was going to Hawaii.
- speaker: Interviewer
  text: How long after you received your passport did you leave Japan?
- speaker: Respondent
  text: I left Japan about 6 months after I received the passport. Until then I worked at the Quartermaster.
- speaker: Interviewer
  text: Was Hawaii different from Sacramento?
- speaker: Respondent
  text: I didn't think it was much different as there were many people from the same native village.
- speaker: Interviewer
  text: Have you ever been excluded?
- speaker: Respondent
  text: No, not particularly. In those days you could not transfer from Hawaii to America.
- speaker: Interviewer
  text: Could you come here because you were in business?
- speaker: Respondent
  text: Yes, I came here to start a business.
- speaker: Interviewer
  text: When you went to Hawaii in 1912 were there all kinds of people on board the ship?
- speaker: Respondent
  text: There were 14 people who had American citizenship. I was the first one to land when the ship arrived. Ones with citizenship
    landed later.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I thought it was a nice country.
- speaker: Interviewer
  text: In what way did you think it was a good country?
- speaker: Respondent
  text: In Hawaii my salary was $14.50 a month. I helped with bookkeeping on the side so I did not have to pay for food. When
    I came here the wages were good.
- speaker: Interviewer
  text: About how much was it?
- speaker: Respondent
  text: A laborer used to earn $1.50 to $1.75 an hour. In Hawaii the wages of laborers were very low in those days. At school
    I received $24.50 a month.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Respondent
  text: We have 5 children. I brought the son who was born in Japan with me. When I went back to Japan to visit my mother
    I had a baby there. Two children were born in Hawaii, and one was born in America.
- speaker: Interviewer
  text: Do you know many picture brides?
- speaker: Respondent
  text: Yes, there were many picture brides, and only a few who came here as married couples like us.
- speaker: Interviewer
  text: Mr. Okumura where did you learn English?
- speaker: Respondent
  text: I don't speak English well. I learned it by myself.
- speaker: Interviewer
  text: How long did you operate the camp in Lodi?
- speaker: Respondent
  text: Until the war broke out.
- speaker: Interviewer
  text: Were you living in Lodi when Pearl Harbor was attacked?
- speaker: Respondent
  text: I was living here and was working in Lodi. When the war broke out the money in the bank was going to be frozen, so
    we called George home from Berkeley and changed the account in his name. Soon after that we left the camp and went to
    Chicago.
- speaker: Interviewer
  text: Didn't you go to camp then?
- speaker: Respondent
  text: We were in the camp. When we could go out of the camp we went to Colorado and stayed there for 3 to 4 months. Then
    we went to Chicago where our oldest son who left the camp earlier was managing a boarding house. We stayed in Chicago
    for about 3 years and made some money before we came back here.
- speaker: Interviewer
  text: How did you feel when Japan attacked Pearl Harbor?
- speaker: Respondent
  text: We were scared as we didn't know what would become of us. We went to Walerga and then to camp. People who waited to
    go back to Japan went to Tule Lake. Most young people went to Chicago area. As we managed a boarding house in Chicago
    about 50 to 60 men stayed in our boarding house and I cooked for them. It was so hard that I became very tired. A WRA
    sent people who were looking for a place to live, so our boarding house was full of young men. The boarders paid the rent
    in advance, so we used that money to buy food. People of Chicago were very kind to us. They told Japanese not to go back
    to California where people exclude Japanese. We would not have come back to California if my wife did not become ill because
    we had paid downpayment on a house in Chicago. She became ill because she worked too hard. We lived in Chicago for about
    3 years.
- speaker: Interviewer
  text: Did you find jobs for the boarders, also?
- speaker: Respondent
  text: No, just boarding. People worked in shifts. There are about 3 shifts so people came in and out keeping busy. When
    people came back at night I told them to warm up their food and eat. I became very tired. My son-in-law is a doctor but
    he told me to see another doctor, who told me that I was too overworked, so if I took it easy I would become well.
- speaker: Interviewer
  text: Did the F.B.I. agents come?
- speaker: Respondent
  text: Yes, they came every day, even during the night to investigate. I felt sorry for young men who had to go to work in
    a couple of hours.
- speaker: Interviewer
  text: Did you go to Camp Amache?
- speaker: Respondent
  text: Yes, we did.
- speaker: Interviewer
  text: Did you stay there for about a year?
- speaker: Respondent
  text: No we did not even stay there for half a year. We left there in about 3 months.
- speaker: Interviewer
  text: Did you have trouble in your children's education?
- speaker: Respondent
  text: They went to school in Chicago.
- speaker: Interviewer
  text: Where did your oldest son go after graduating from Berkeley?
- speaker: Respondent
  text: He went to Chicago and attended universities there.
- speaker: Interviewer
  text: Did the F.B.I. investigate George?
- speaker: Respondent
  text: He requested exemption from draft in Japanese Army, so that is why they investigated him.
- speaker: Interviewer
  text: Did the F.B.I. know that he requested exemption from draft?
- speaker: Respondent
  text: Yes, they found it out in the record of the Japanese American Association. I felt sorry for the young men who had
    to go to work especially those who worked at night when the F.B.I. kept asking questions.
- speaker: Interviewer
  text: Where were you at the time of Depression?
- speaker: Respondent
  text: We had a camp in Lodi. Some people who did not have jobs could not pay utility bills, so they asked us to lend them
    money. We could find work all right. Our son used to work in a cannery when he didn't work in Lodi.
- speaker: Interviewer
  text: Weren't you questioned about loyalty in the camp?
- speaker: Respondent
  text: No, we weren't. I was questioned by F.B.I. as I taught school but as I had not done anything wrong they let me go.
- speaker: Interviewer
  text: Did your sons go into service?
- speaker: Respondent
  text: Yes, one did. The oldest son did not go, but the younger one did.
- speaker: Interviewer
  text: Weren't there any Japanese who opposed Nisei going into service?
- speaker: Respondent
  text: That was in the camp. My son went into service from Chicago. He went back to University after he got out of the service.
- speaker: Interviewer
  text: What year did you come back here?
- speaker: Respondent
  text: About 3 years after the war ended.
- speaker: Interviewer
  text: Then there weren't any trouble when you came back here, weren't there?
- speaker: Respondent
  text: No, there weren't. We bought this place, and have been living here since.
- speaker: Interviewer
  text: Didn't you have any trouble when you bought this house?
- speaker: Respondent
  text: No, I didn't. We could not buy the house in our name, so we bought it in George's name.
- speaker: Interviewer
  text: What did you do after you came back here?
- speaker: Respondent
  text: I grew grapes by contract and also worked in the cannery.
- speaker: Interviewer
  text: How long did you continue doing your work?
- speaker: Respondent
  text: Until I was about 70 years old. I have not been doing anything since.
- speaker: Interviewer
  text: Did you associate with the white families?
- speaker: Respondent
  text: No, we didn't.
- speaker: Interviewer
  text: Japanese experience much hardships, but what do you think was the hardest experience?
- speaker: Respondent
  text: I did not experience any hardship. I think I had a pretty good life. We had our furniture stored in Lodi when we evacuated.
    After we went to Chicago, the government shipped our furniture to Chicago.
- speaker: Interviewer
  text: What did you do with your belongings when you evacuated?
- speaker: Respondent
  text: We stored them at a white boss's place in Lodi.
- speaker: Interviewer
  text: Did they all come back when you came home?
- speaker: Respondent
  text: No, the government sent them to Chicago while we were there.
- speaker: Interviewer
  text: Many people had their belongings stolen but you were lucky, weren't you?
- speaker: Respondent
  text: Yes, we were. He was the boss of the company.
- speaker: Interviewer
  text: What was the hardest experience for you, Mrs. Okumura?
- speaker: Respondent
  text: That was when I became ill. After we came back here from Chicago I did not do anything so I became well.
- speaker: Interviewer
  text: You have many grandchildren, don't you?
- speaker: Respondent
  text: We have 18 grandchildren, and 6 or 7 great grandchildren.
- speaker: Interviewer
  text: What do you want to teach Sansei and Yonsei?
- speaker: Respondent
  text: I would like to tell them not to be extravagant but be frugal.
- speaker: Interviewer
  text: Do you think Sanseis are doing well?
- speaker: Respondent
  text: I think they are doing better than Niseis.
- speaker: Interviewer
  text: What do you think the Isseis had the most difficulties in?
- speaker: Respondent
  text: Many Isseis had difficulties in earning their livelihood as they could not find jobs.
- speaker: Interviewer
  text: Why did you go to Chicago from the camp?
- speaker: Respondent
  text: Our oldest son left the camp earlier and went to Chicago. He asked me to go over there and manage a boarding house,
    so we did.
- speaker: Interviewer
  text: You had quite an easy life compared to others, didn't you?
- speaker: Respondent
  text: Thank goodness.
