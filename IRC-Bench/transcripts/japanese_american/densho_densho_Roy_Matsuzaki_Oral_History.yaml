source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I come from a family of five sisters and three brothers. And of course my mother and father, they came from Fukui,
    Japan. They immigrated and came here in about 1920 to San Francisco. And from San Francisco they went to Sacramento county
    and they became farmers. I was born in a little town called Florin. It's out in the country and I grew up there before
    the war days and then I was evacuated from Florin, Elk Grove.
- speaker: Interviewer
  text: Can you describe what a typical day was like for you before the war?
- speaker: Respondent
  text: I was still a youngster before the war. Every Friday night we would go see movies, a Japanese movie. In a little town
    called Florin. This is where my mother and father took me. This is how I got interested in the samurai warriors, so after
    we came back from the movies we would play sword fights with the kids. So for my family it was typically working on the
    farms. And things like that.
- speaker: Interviewer
  text: And you were living in a mostly Japanese community?
- speaker: Respondent
  text: Well there was sort of a Japanese community - the property all along there were Japanese. Somehow, we all bought property
    or we leased property there and we were all able to communicate together. But when we came back it was all gone.
- speaker: Interviewer
  text: Do you remember the day of Pearl Harbor?
- speaker: Respondent
  text: Yes, I think I was nine or ten years old when Pearl Harbor was attacked. My brother was in the United States Army.
    And he was visiting us at the time and we had a radio going on and over the radio it says that Pearl Harbor was attacked.
    And also that all the military men will be subject to coming back to the camp. So he had to go back to the military. I
    didn't know where Pearl Harbor was.
- speaker: Interviewer
  text: Do you remember what your brother's response was?
- speaker: Respondent
  text: No. My brother didn't respond but my mother and father says, "Gee, nihon to amerika mo senso hajimeta." That means
    that Japan had started the war. So they knew that it was coming on. But after the announcement, I guess everybody went
    into hiding.
- speaker: Interviewer
  text: Were your parents afraid that they were going to be targeted or be watched?
- speaker: Respondent
  text: Well no, they weren't. But they knew there was a lot of stuff against us, you know. During that time things happened.
    Somebody shot a rifle, a shotgun, through our front bedroom door. At the time we weren't sleeping, but my brother and
    I were sleeping in that room and we vacated after. But the BBs, it landed at the half of the window. It didn't take the
    whole window. But that was a terrible thing. So you know, people were after us. I mean, they didn't want us around. They
    made acquisitions and threats and things like that. So I couldn't believe those things were happening. Maybe it was the
    best thing that they sent us into the camp, to protect us.
- speaker: Interviewer
  text: You feel like maybe something would have happened?
- speaker: Respondent
  text: Right. You never know what American people would do to us. I mean, they froze our assets, they froze our bank account,
    they restricted us to five miles traveling time and things like that. They made sure we wouldn't be an asset to Japan.
    They made sure we pulled our shades down on the trains and it was terrible.
- speaker: Interviewer
  text: Did your parents talk to you at all about what they thought was happening?
- speaker: Respondent
  text: Well they kind of knew something was going on. But they didn't exactly know they were going to be put into camp. But
    you know, they were kind of worried about what's going to happen. A lot of families changed locations from here to there,
    because they knew the government wouldn't touch this area so they kept moving in land. But then when 9066 was made executive,
    we all had to go. I mean it was a forced evacuation. To me, I didn't know what was going on, you know. But my mother took
    me to the department store and bought me some new clothes. I said, "Hey, this is pretty good!" I was wondering why she
    was buying me some new clothes. To take them along with us, you know.
- speaker: Interviewer
  text: Were your parents leasing the land and the home?
- speaker: Respondent
  text: Well yeah. We had to sell just about everything we had. We were trying to get rid of our refrigerator, our washing
    machine, and whatever we had in the household and stuff like that. But you know, even my mother and my father heard the
    FBI are going to come. She had Emperor Hirohito's picture. I mean she came from Japan so she burnt that up. And she burnt
    a lot of the stuff she had from Japan up. My father he had a samurai sword. He buried it into the garage, he wasn't going
    to turn it in, you know. And I think my brother had a revolver. He buried that along with the sword. That way they won't
    be able to capture it but they were told to turn that in. But he was a hardhead. He wouldn't want to turn his sword in,
    you know. That was his prized possession. We weren't determined to ask anybody to look after our stuff, you know. I guess
    our family thought, "Hey, we won't be coming back." So we just bolted up our home and that was it, you know. And we just
    left it. But according to my sister, the property was a lease property.
- speaker: Interviewer
  text: I like that your father wasn't going to hand over his sword to the FBI.
- speaker: Respondent
  text: He would rather get rid of it. You know, if he can't have it, they can't have it.
- speaker: Respondent
  text: I didn't know that he buried it until we came back. We went back to our old house and he asked the owner if we could
    borrow a pick and shovel. He was willing to give it to my father - and I didn't know that he buried it. But it was all
    rusty anyway. You know. You couldn't use it. I mean he saved the saber of it. Because he used his sword to promote his
    teaching. He used to teach this Japanese sword dance called kenbo. I don't know if you've heard of that.
- speaker: Interviewer
  text: Wow. So he was an instructor, a teacher?
- speaker: Respondent
  text: He was an instructor. So when he went to camp, he was an instructor in that sword dance. Of course he didn't have
    a sword, but they made a wooden sword and it's done with, do you know shigin singing? So he had something to do at camp
    while we were there.
- speaker: Interviewer
  text: Can you tell me what you remember about going to the assembly center and living there?
- speaker: Respondent
  text: It wasn't a pleasing day. My sister had to drive us to the little town called Elk Grove where the train was waiting
    for us. We had a dog and unfortunately the dog followed us halfway to the stop. And we told him, "Go back!" And it was
    a sad thing to leave a dog. We don't know what happened to him after we left, you know. So my sister dropped us off, at
    the train station, and she took the car and left it at the garage. We don't know if she sold it or if she just left it
    there. I think she just left it there. Besides, my father had to register us among the people going into the assembly
    center, and then after we registered, we had to board this train with the military. And then we boarded this train to
    the Fresno assembly center. We were there for four months. I couldn't believe it because after the train ride, I boarded
    this bus. And we were driving into that gate. I saw the barbed wire fence. I said, "What the heck is this?" I couldn't
    believe it. In the nighttime they would check and see if we were all in the barracks. A head count, every 10 o'clock,
    someone would come making sure if you're still there.
- speaker: Interviewer
  text: Really? One of the guards would come around?
- speaker: Respondent
  text: One of the guards. But when I looked outside I saw searchlights and guard towers. I couldn't believe it. It was a
    prison. I mean, we were locked up. For what reason, you know?
- speaker: Interviewer
  text: That must have been the moment that it hit you. That you knew, even as a child, something bad was happening.
- speaker: Respondent
  text: Right. But to me, I couldn't understand what was going on. I mean, they gave us the proper care. I mean they gave
    us shots because of disease and of course they took care of my teeth. I mean the government took care of the family. We
    weren't threatened to do anything. I went to school, first time I had milk. I didn't have milk at home. You know those
    were precious stuff. And we didn't have bread. But then when I went to school they gave us cookies and milk I mean they
    took care of the children there. Fresno assembly center was just like a county fairground. It wasn't as bad as some of
    these racetracks, where they had horses and animals. The assembly center were nice and clean. I mean the floor was clean,
    the condition was pretty good. It wasn't as bad as these people who lived in horse stalls. I mean it was terrible, the
    smells there. We lived in nice barracks, you know.
- speaker: Interviewer
  text: So that was better for you. How about your siblings - where are you in the lineup of your siblings?
- speaker: Respondent
  text: I'm next to last, among the eight. I have a younger sister, still living in Gilroy. And I have a sister in law a couple
    of years older, who lives in Sacramento. So there's only three of us left. All of my sisters and my brothers have passed
    away. I mean, they ran into sickness or ill health or something like that. I'm still surviving, I'm in my 80s. I mean,
    you know, I was nine or ten years old. For statistics, I'm losing a lot of my friends. My father passed away when he was
    62. My mother was 64. So they weren't able to see us grow up into a dulthoods.
- speaker: Interviewer
  text: Do you think the stress of camp and what happened to your parents, do you think that played a role?
- speaker: Respondent
  text: I'm sure a lot of that was blamed on the internment part. To me, it didn't affect me. The internment was something
    I learned about and something I knew that happened. And I just wanted to forget about it. My mother and my father never
    told about it. They said it's in the past.
- speaker: Interviewer
  text: Did you ever ask them, when you got a little older?
- speaker: Respondent
  text: Well, yes and no. You know, I waited to ask them because I knew how they went through it. I knew the problem that
    existed. I know what they went through. And I knew what was the cause of it. My mother used to say when she was at camp,
    "Well, this is pretty good!" They give you a roof over your head, they fed you three meals a day. And even paid her. I
    mean, you can't beat that! We entered the camp right after the Depression. And coming from a poor family, we ate morning,
    noon and night, rice. Bread was a luxury, believe me. I mean, I never had the luxury of butter, milk and bread when I
    was a child. I think I ate rice morning, noon and night. And most of the stuff came from our farm. So it wasn't exactly
    what we were looking forward to but hey, going into a camp and being treated like this was exceptional. Something different.
    I mean, my mother and father couldn't believe it, you know? I mean, he was fed. Well he was an alcoholic but when he went
    into camp. He got sober for four years, believe me. But when he came out, he was right back on. That's what killed him.
    He was an alcoholic, you know. But I knew my parents were going through, you know. The only thing I can tell you what
    the benefit was for my mother and father was that my father always wanted to borrow money from the company where he provided
    strawberries and my mother would go to the grocery store and signed up for groceries. I mean she didn't have the money.
    So she had to go grocery store to purchase. Well, when we came back, the owner of the grocery store brought out his books
    and says, "I need to be paid back." And my father's company wanted to be paid back. But did you know, they couldn't touch
    us, because the statute of limitation ran out? You cannot collect anything from these evacuees. Hey, we went in with nothing,
    we came out with nothing. So how are you going to be able to collect money from them? So, that was the only thing that
    was a plus for my mother and my father. We were able to write off our debt.
- speaker: Interviewer
  text: They got lucky in that way.
- speaker: Respondent
  text: They got lucky in that way. But trying to find a home and trying to find a place was difficult.
- speaker: Interviewer
  text: So let's transition to you going to Jerome first. What happened when you left Fresno and went to Jerome?
- speaker: Respondent
  text: Gee, when I went out of Fresno, I thought this was one of the exciting things of my life. You know, we got to ride
    the train for four days and four nights. And I was able to see the whole countryside. You know this is great. You know,
    I never saw the United States. But we stopped at New Mexico. And the guards let us out, to stretch our legs. And the people
    from New Mexico asked us, "What tribe are you from?" They thought we were Indians. You know, high cheekbones. They probably
    thought we were Indians being transferred across the United States. I mean, believe me, that's what they asked us, because
    they thought we were Indians. But going from Fresno to Jerome was long days. I mean, I don't know if I took a shower or
    took a bath but it was four days and four nights. When we hit Jerome, I couldn't believe it. Across, all these barracks!
    So we were able to choose one barracks and from there we picked our barracks, I mean they picked our barracks for us and
    so we moved in. And when we moved in, it was home for us for a while. For another year and a half until they closed Jerome
    up. And in Jerome, I got to hunt fireflies. As a kid, you know, catching things. And Jerome had chiggers tick-like insects
    and so they
