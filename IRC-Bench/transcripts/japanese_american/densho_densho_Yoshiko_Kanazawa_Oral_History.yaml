collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Pasadena, at home.
- speaker: Interviewer
  text: And what was a typical day for you before the war?
- speaker: Respondent
  text: I don't remember a single day. But I remember some of the things we did. School was very important to me. I went to
    the same school that my sisters and brothers had gone to, so all the teachers knew me. And I typically, what I really
    enjoyed was going to the library. And in fact, when I was reading my first grade teacher's comments, she had commented
    that I had helped the classroom a lot with my library books. So, that was very important to me. On the weekends in the
    summer, we had a tent and we would go to the beach, set up this big tent and there were only certain beaches we could
    go to. And one of them was Redondo Beach. And then another one was at the bay in San Pedro. And then we had several uncles.
    We would visit them on the weekends, too. My father was a gardener and my mother was a stay-at-home mom. She did a lot
    of sewing for us, and we didn't have a lot of money but they made everything stretch. They were very frugal. I remember
    my father just had one pair of good shoes and he kept them shiny all the time.
- speaker: Interviewer
  text: So they were Issei?
- speaker: Respondent
  text: They were, and they were both from Ehime-ken on the island of Shikoku.
- speaker: Interviewer
  text: And when did they both come to the U.S.?
- speaker: Respondent
  text: My father came first in 1919. And he went to Spokane. He worked on the railroads and he made enough money that he
    could go back to Japan and, I think the marriage was arranged, but he married my mother who lived in a nearby village.
    They both lived in seaside towns. Very charming places. I have visited them, or visited their grave there. They wanted
    to be buried in Japan.
- speaker: Interviewer
  text: So you kind of had a typical upbringing?
- speaker: Respondent
  text: Yes, that's right. And I had just started Japanese school. And we would go to the zen temple in Los Angeles in Little
    Tokyo.
- speaker: Interviewer
  text: Interesting. So what do you remember about the day Pearl Harbor happened?
- speaker: Respondent
  text: You know, I don't remember exactly. But my father talked about it enough that I do have memories from what he told
    me and not from what I remember. But my sister went out to tell him - he was working out in the yard - that the Japanese
    had just bombed Pearl Harbor. And he said in Japanese, "No. Something like that would never happen. You must have heard
    it wrong." or "That's not right. Japan would never do that." So my sister went back in the house, she heard more about
    it, went back out to tell my dad it really did happen. And so he came in the house and started talking on the phone to
    his friends and found out it was really true. And he felt that the people in the army, who didn't really know what a country,
    how great of a country America was. How large! And here was tiny Japan, attacking America. And he could not believe that
    they would have done something like that. He felt that the people in the Navy knew what the rest of the world was like.
- speaker: Interviewer
  text: I see. In the Japanese Navy?
- speaker: Interviewer
  text: So he was just shocked?
- speaker: Respondent
  text: Totally, totally shocked.
- speaker: Interviewer
  text: Did he get a sense that there was gonna be some backlash because of that?
- speaker: Respondent
  text: Yes. They felt like our lives were going to change. They didn't know how it would change. But they knew something
    would happen.
- speaker: Interviewer
  text: And so it happens and Christmas passes, and you know it's kind of this strange, maybe foreboding feeling that something
    is about to change for your family.
- speaker: Respondent
  text: That's right. And there were people who had short wave radios and they would get the news from Japan. And I know the
    people in Japan felt very encouraged that the attack was so successful. So if you see any Japanese programs that show
    the Japanese after Pearl Harbor, they were doing their bonzais.
- speaker: Interviewer
  text: That's interesting because, you know, you would think there are so many people that migrated from Japan to the U.S.
    that they had relatives, and you just wonder what those families were feeling.
- speaker: Respondent
  text: That's right, yes. My father had a lot of family and my mother had all of her family in Japan. Yeah. And they were
    very concerned about what would happen to us.
- speaker: Interviewer
  text: Right. So when Executive Order 9066 came out, what were some of the things you remember that started to happen?
- speaker: Respondent
  text: You know my mother had a brother who was in the Japanese Army. And she had some pictures of him and they went through
    their albums, finding his pictures, and then throwing them into the fire. And my uncle had already been taken from his
    family. He lived in San Pedro and had a three-story house and the FBI claimed that he was signaling the Japanese ships
    from his porch on the third floor. So, he had already been taken away. We knew that something would happen. My mother
    started sewing a duffle bag for each of us and then she sewed heavy bathrobes for us for each of the kids. Because there
    had been rumors that we were going to a very cold country. Then there were rumors that we were going to a dry desert area.
    So my father bought goggles for us. So they were getting prepared. He was also making arrangements of what we would do
    with our belongings. He was a gardener in Pasadena and he had served those people well for many years. The ones who had
    large homes said, "You can keep your things in our house. We have extra room or a basement where you could keep your things."
    So we didn't have to sell off our things like a lot of people did. We were living in a rented house and our owner lived
    right behind us. And he had told my dad we could leave things with him too. So my dad arranged to leave his truck there,
    because we would use that until the very end. And then the mattresses that we slept on, he said we could keep those in
    his house, also. So we didn't have to sell off things. That was a good thing.
- speaker: Interviewer
  text: Did you experience some kind of discrimination or anything right up until you left?
- speaker: Respondent
  text: I did not. But maybe because all my friends were younger, too. I didn't, but my brothers and my sisters and my parents
    may have felt something. Yes.
- speaker: Interviewer
  text: And you mentioned that you hadn't finished first grade?
- speaker: Respondent
  text: Yes, that's right. I was in the first grade - and I think I've told you that - my teacher wrote me a letter.
- speaker: Interviewer
  text: Do you want to read from it?
- speaker: Respondent
  text: 'Okay, it''s very torn up but my mother must have kept it for me: My dear Yoshiko, Your letters have thrilled the
    children. We all are so glad to hear from you. We have a new boy, John. And a different one named Bruce. And she writes
    that Mary Frances has the measles. Just telling me about the children in the class. And then we had started to make a
    little village. And I had made the church out of blocks and wood. And she said there is a bell in the church now. And
    then she says: Thank you for your letters, and tell your mother and father I thank them for their kind letter. So I just
    thought it was very nice that she would take the time to write me a letter. She must have felt kindly towards me to do
    that.'
- speaker: Interviewer
  text: Were you the only Japanese American student?
- speaker: Respondent
  text: One of a few, yes.
- speaker: Interviewer
  text: You were lucky in a sense that everyone around you was supportive.
- speaker: Respondent
  text: And wanted to help you.
- speaker: Interviewer
  text: Yes that's right. And the people, my father's clients, had all been so kind to us.
- speaker: Interviewer
  text: So, you finally have to leave. Where did you go and what were the conditions like in the assembly center?
- speaker: Respondent
  text: The assembly center that we went to was in Tulare. And it was a fairground. It was right next to Highway 99. We could
    see the cars whizzing by. I remember the fence because people, my parents and other people told us, "You can't get close
    to the fence or they're gonna shoot you." So that was a fear that I carried. And when we first got to the assembly center
    we had to wait in a long line and everyone was given a smallpox and a typhoid fever shot. And of course, having both of
    them at the same time, I had a reaction and I ran a high fever for a few days. And here we were in this strange place.
    I remember that. I remember being very clingy to my mother. I just stayed by her all the time.
- speaker: Interviewer
  text: And you were living in barracks?
- speaker: Respondent
  text: Yes. Fortunately I was in a barrack and not in a horse stall like many families had to live.
- speaker: Interviewer
  text: So when did you actually leave the assembly center and head to Gila River?
- speaker: Respondent
  text: That was in September. We went from Tulare to Gila, Arizona. And I remember stopping at Union Station in Los Angeles.
    And I knew where that was because whenever my family went from Pasadena to Little Tokyo in Los Angeles, we always passed
    by the Union Station. So I remember wanting to peek because we had to keep our shades down on the train, and I really
    wanted to peek, but I knew I couldn't because there was a soldier walking back and forth with his rifle. So I didn't dare
    take a peek. And I can't remember if they fed us, or what they did. I just can't remember any of that.
- speaker: Interviewer
  text: That must have been really hard to go back towards your home.
- speaker: Respondent
  text: Yes. That was a very traumatic experience for me. And then we got to Phoenix, we got off the train and I can't remember
    whether we were put on a truck or a bus. But I remember the long ride, and it was desolate. It was a desert. I mean it's
    not like Phoenix is today. And so I just didn't know where we were going and neither did my parents. We got to the camp
    and it wasn't quite ready. So what I remember are these ditches with water running through them and they weren't covered
    yet. So they had planks that you had to walk across in order to get to the bathroom. I was six and a half and to me, it
    was too frightening to walk across the plank so I used a little chamber pot in our barrack and didn't want to go to the
    bathroom. I had to go take a shower there but my mother held my hand tight, took me across.
- speaker: Interviewer
  text: And at this point, you had all older sisters?
- speaker: Respondent
  text: Yes, two older sisters and two older brothers.
- speaker: Interviewer
  text: So were they responsible for looking after you? Or was it mostly your mother?
- speaker: Respondent
  text: You know at times it was my sister who was very close in age to me, she did a lot for me. But I think I stuck with
    my mother the most.
- speaker: Interviewer
  text: And did your parents ever tell you what was going on or talk to the kids, even though they were so bewildered? Did
    they ever say anything to you?
- speaker: Respondent
  text: In the camp itself it was more the idea of shikata ga nai and the idea that America was at war. They wouldn't be treating
    us like that, if we had not been at war with Japan. And so it truly was a shikata ga nai, so just try to endure, gaman.
    That's what I heard from them. They didn't blame the American government and make us feel hateful towards the government.
    It was just, "Let's just make the best of this."
- speaker: Interviewer
  text: And that is the common story from so many, especially Issei.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: What else do you remember, in camp?
- speaker: Respondent
  text: You know when we first got there before school was organized, I remember a fun time because all the kids in the block
    - there were about 12 or 14 barracks in the block - played together. And we would play capture the flag and half the kids
    would be on one team and the other half on the other. Or kick the can. And so there was a real camaraderie. I remember
    that as a happy time. And then when school started I was very excited about that because I missed the end of first grade.
    And so I was very excited about starting second grade. And then on top of that my cousin, who lived in the next block,
    she was a sophomore at Berkeley when she was sent to the camp. And she became my second grade teacher. And so she would
    be preparing flashcards and various lesson plans. And she would tell me what she was doing and I would study her flashcards.
    So later she told me, "You were the smartest one in the class! You always raised your hand and knew all the answers."
    And I thought, well sure, because I had a head start. But I loved school.
- speaker: Respondent
  text: I did, I loved school. And I've met many people through the museum who would tell me, "Oh I was in second grade too
    and I don't remember going to school." I don't know if it was a bad experience they had or what. But it was such an important
    part of my life. And my father became a chef in the camp. He was in the block right next to me. And the authorities did
    give us permission to eat at his kitchen. So I enjoyed that. I felt like I was eating his food.
- speaker: Interviewer
  text: And had he cooked before? Was he a good cook?
- speaker: Respondent
  text: He learned! [laughs] He had to learn.
- speaker: Interviewer
  text: And was your cousin the only Japanese American teacher that you had?
- speaker: Respondent
  text: I don't know about that. But I had her until she was able to leave the camp and she got to go to college at the University
    of Chicago. So she moved away. And then we had Caucasian teachers - these were people who came and taught in the camps.
    They had living conditions better than what we had, but they did live in the camp also. There was one who was very kind
    and the other was a very strict teacher. I don't know if she would have been that way wherever she was teaching. But she
    was quite strict. And then for a short time I had a young man who had just graduated high school there in the camp and
    he was teaching our fourth grade class. He had all these mimeograph sheets of tests that he would time us and test us
    and they were on all the math facts. I always felt when I came out of the camp what good training that was.
- speaker: Interviewer
  text: What other memories of camp stayed with you throughout the years?
- speaker: Respondent
  text: You know, I had a very good friend. My parents knew her parents. She and I used to put on little talent shows. And
    we would charge the kids in the block maybe five cents or something to come to our talent show. I don't know what we did,
    sang or danced or something. That was a lot of fun. And one story that my father told me but no one else in the family
    remembers is when Eleanor Roosevelt came to our camp. She visited my father's kitchen and he had just baked some biscuits
    and he gave her one of his biscuits, and she really liked it [laughs]. So I like to tell that story. He didn't tell me
    lies, so I feel like it must be true.
- speaker: Interviewer
  text: I am sure it was true! Just a very small exchange but it meant a lot.
- speaker: Respondent
  text: Right. That's right. It did mean a lot to him. And then I had a little sister who was born in the camp. And she added
    a lot to my life. Because I had been the youngest and I was so happy to have a younger sister. She was born at the hospital
    and my father and I walked to the hospital, and the authorities had arranged for us to have a car that drove us back to
    our barrack. And that was the only time I rode in a car in the three and a half years that I was in the camp. So I remember
    that. And then I remember my little sister crying because it was so hot and uncomfortable and my father would walk her
    around the camp, patting her back and saying his Buddhist chants. And that's how he would put her to sleep. So we still
    laugh about that because she remembers that.
