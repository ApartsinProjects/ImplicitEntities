collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I was the oldest daughter. There were 2 sisters and 3 brothers, but my father loved me the most. They are still alive.
- speaker: Interviewer
  text: Are all of them still alive?
- speaker: Respondent
  text: Yes, they are. My father loved me the most. I don't remember being scolded by my father. I remember my younger brothers
    and sisters being scolded for doing something naughty.
- speaker: Interviewer
  text: Was your father a farmer?
- speaker: Respondent
  text: Yes, everybody was a farmer.
- speaker: Interviewer
  text: Did he farm in a large scale?
- speaker: Respondent
  text: He was a middle sized farmer.
- speaker: Interviewer
  text: About how many tans (about .245 acres) did he have?
- speaker: Respondent
  text: I think he had nearly 1 cho which is about 2 acres in America.
- speaker: Interviewer
  text: What do you remember about your father and mother?
- speaker: Respondent
  text: When I was little my father used to pick me up from school if I was late. I used to walk about 2 and a half miles
    to school, so when I was late my father used to pick me up from school as I had to walk around the edge of a hill. As
    I was the oldest, my father used to make me do everything. He didn't have much education, so he made me write letters
    or write names on gifts. I also helped with farming. Since I was little my father taught me things and made me work. The
    night before my 20th birthday I got married.
- speaker: Interviewer
  text: How much schooling did you have?
- speaker: Respondent
  text: I had 8 years of grammar school and 2 years of continuation school. Altogether I had about 10 years of schooling.
- speaker: Interviewer
  text: Do you remember about your grammar school days?
- speaker: Respondent
  text: Until the 4th grade there were not many subjects, but after the 5th grade geography and history were added.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: I liked school the most. I wanted to go to a high school, but as the farming was busy I had to help my parents, so
    I could not go. I barely finished junior high school. In the meantime the continuation school was opened, so I went there
    for 2 years and learned sewing. In my days most people quit school after 4 years of grammar school. Only those who wanted
    to become teachers or somebody went to higher schools, but ordinary farmers did not send their children to schools.
- speaker: Interviewer
  text: What do you remember about your school days? Were there excursions?
- speaker: Respondent
  text: Yes, we had excursions and athletic meets. Sometimes we had literary exercises.
- speaker: Interviewer
  text: Did you participate in anything?
- speaker: Respondent
  text: I participated in literary exercises all the time. I did some reading, demonstrated math, told stories or sang songs.
    I was very little. I am still little, but I was smaller when I was a child. The teachers loved me and let me do all kinds
    of things.
- speaker: Interviewer
  text: How did you play when you were in grammar school?
- speaker: Respondent
  text: We bounced balls and played a game of jintori (a game to take the enemy's camp).
- speaker: Interviewer
  text: Was your house near the sea?
- speaker: Respondent
  text: No, it was about 3 and three quarters miles from the sea.
- speaker: Interviewer
  text: You couldn't go fishing then?
- speaker: Respondent
  text: No; I did not go fishing.
- speaker: Interviewer
  text: How did the girls usually play in those days?
- speaker: Respondent
  text: We played with dolls and handballs.
- speaker: Interviewer
  text: What else do you remember about your school days?
- speaker: Respondent
  text: I don't remember anything special.
- speaker: Interviewer
  text: Were there any riots in the village?
- speaker: Respondent
  text: No, nothing like that happened. My saddest memory was that a teacher who taught me for many years left as she was
    transferred to another school. The day before she left I stayed with her till evening without going home. She was transferred
    to a normal school which was a promotion for her. Her name was Mori, a famous Samurai line. Her parents died so she was
    teaching school to support her grandmother, a brother and a sister.
- speaker: Interviewer
  text: Was that teacher a man?
- speaker: Respondent
  text: A woman teacher. I did not want to part with her so I stayed with her till evening. When I was walking home late in
    the evening I met my father who was coming to pick me up worrying about me.
- speaker: Respondent
  text: On one Empire's Day (Feb. 11) we had to set up the hall for a ceremony, but leaving the work to men, about 3 girls
    visited and talked with the teacher. She was glad to see us, but she scolded us for being lazy and not working. At one
    time I had measles on the day of the athletic meet. I did not like to be absent from school, so I went to the athletic
    meet in spite of the fever. In the midst of the meet I fainted. It used to make my parents worry. Until I was 4th grade
    the school was nearby, but after I became 5th grade I had to walk about 2 and a half miles. There were no cars then like
    today.
- speaker: Interviewer
  text: Did you walk to school alone or with your friends?
- speaker: Respondent
  text: I walked to school with 2 or 3 friends.
- speaker: Interviewer
  text: Was there a hill near your house?
- speaker: Interviewer
  text: Were there any fruits?
- speaker: Respondent
  text: There were no fruits.
- speaker: Interviewer
  text: Weren't there any nuts?
- speaker: Respondent
  text: There were chestnuts, persimmons, plums and citrons.
- speaker: Interviewer
  text: What do you remember about your mother?
- speaker: Respondent
  text: My mother did not like to go out in public as she thought she was too old. She did not want to work in the field as
    she was ashamed for being old, so after I became older than 25 I worked for her. Actually she was only about 50, but she
    said she was old. My father died at the age of 61.
- speaker: Interviewer
  text: Was your father a strict man?
- speaker: Respondent
  text: Yes, he was quite strict, but he never scolded me.
- speaker: Interviewer
  text: Did your brothers and sisters all go to school?
- speaker: Respondent
  text: Yes, they went till 8th grade.
- speaker: Interviewer
  text: Your father must have been a big farmer to send all the children to school.
- speaker: Respondent
  text: He had about 2 acres, and he worked hard.
- speaker: Interviewer
  text: What did he grow?
- speaker: Respondent
  text: In those days rice and wheat were the main crops, and he grew enough vegetables for us to eat. We got just rice which
    was left over after we set aside as our staple food, and used it to pay the tax. We did not go out and work, so farming
    was hard. Those who did not have land worked away from home.
- speaker: Interviewer
  text: What did you do after you graduated from grammar school?
- speaker: Respondent
  text: I went to grammar school for 8 years, I could have gone to a girls' high school after the 6th grade. There was a girls'
    high school in Hiroshima City. I went to the continuation school. My friends who had time went to girls' high school.
- speaker: Interviewer
  text: What do you remember about the junior high school?
- speaker: Respondent
  text: We had athletic meets, literary exercises and exhibitions in which we exhibited our handicrafts. We had excursions
    about once a year. In those days we walked everywhere so we could not go too far. We went to Kure, the Naval port, and
    Itsukushima, one of the three most picturesque places in Japan. When we walked to Itsukushima my feet were hurting.
- speaker: Interviewer
  text: What did you do after you graduated from the junior high school?
- speaker: Respondent
  text: I stayed home and helped my parents and practiced sewing.
- speaker: Interviewer
  text: How old were you when you graduated from junior high school?
- speaker: Respondent
  text: I was 15 years old.
- speaker: Interviewer
  text: Did you stay home for 5 years after that?
- speaker: Respondent
  text: Yes, I helped my parents at home for 5 years. In the meantime I learned sewing and etiquette which a girl should know.
- speaker: Interviewer
  text: On your marriage, how was your husband picked?
- speaker: Respondent
  text: My husband was a far relation of mine. I heard that he came to America when I was 7 years old. He married once, but
    his wife died about a year later. At that time I was still a child.
- speaker: Interviewer
  text: Was that in Hiroshima?
- speaker: Respondent
  text: He was in America, and he sent for a picture bride but she died. A few years later he went back to Japan to see his
    parents. At that time his parents advised him that he should be married before he went back to Japan. He married me and
    we came here in 1917. That was 60 years ago.
- speaker: Interviewer
  text: Then your husband was back in Japan when he married you, wasn't he?
- speaker: Respondent
  text: Yes, he went back to Japan and got married.
- speaker: Interviewer
  text: Did you have an interview with your prospective husband?
- speaker: Respondent
  text: We did not have an interview as we lived nearby, although I never met him before.
- speaker: Interviewer
  text: Did you want to get married?
- speaker: Respondent
  text: I was thinking about coming to America, so as I could come to America, and as he was a far relation I decided to get
    married without any worry. My husband was much older than I was.
- speaker: Interviewer
  text: How much older than you was he?
- speaker: Respondent
  text: He was 16 years older.
- speaker: Interviewer
  text: Then he was 36, wasn't he?
- speaker: Respondent
  text: Yes, he was. I was only 20 and did not know anything about America. But as I said I wanted to go to America, I was
    told that there was a man who was back from America, so he would ask this man.
- speaker: Interviewer
  text: Who said that? Was it your father?
- speaker: Respondent
  text: My husband's uncle said that. He was married to my aunt. I heard they told my husband to marry me.
- speaker: Interviewer
  text: Did you meet him before you got married?
- speaker: Respondent
  text: I met him a short while before we got married.
- speaker: Interviewer
  text: You have met him before, haven't you?
- speaker: Respondent
  text: No. We lived close by but he left home when I was a child.
- speaker: Interviewer
  text: Did you see him when he was back from America?
- speaker: Respondent
  text: Yes. On my way to a sewing class one day I met him on the road. I was told that he was the man who came back from
    America.
- speaker: Interviewer
  text: At that time you were not engaged, weren't you?
- speaker: Respondent
  text: No, we weren't.
- speaker: Interviewer
  text: When your marriage was arranged, what kind of a person did you think he was?
- speaker: Respondent
  text: As I didn't know anything about him. I agreed to marry him as he was a far relation and as he was going to America.
    Nowadays people associate with each other for a while before they get married, but in olden days some people got married
    without seeing each other when their parents or go-between arranged their marriage.
- speaker: Interviewer
  text: Didn't you have an interview before marriage?
- speaker: Respondent
  text: No, we didn't.
- speaker: Interviewer
  text: Was your marriage all arranged?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: What kind of a place did you think America was then?
- speaker: Respondent
  text: I didn't have any idea what kind of a place America was.
- speaker: Interviewer
  text: You wanted to go to America, didn't you?
- speaker: Respondent
  text: Yes, I did. I wanted to go without knowing what kind of a place it was.
- speaker: Interviewer
  text: What kind of marriage ceremony did you have?
- speaker: Respondent
  text: An old fashioned Japanese wedding.
- speaker: Interviewer
  text: How does it go?
- speaker: Respondent
  text: We hold it at home. We invite relatives and friends and matchmakers. We exchange 3 nuptial cups 8 times.
- speaker: Interviewer
  text: Who conducts the ceremony?
- speaker: Respondent
  text: The matchmaker does. He drinks out from the nuptial cup and gives it to the groom who gives it to the bride. The ceremony
    takes a long time if we do it formally. Usually we simplify it. As we were coming to America, we invited our relations
    and friends to the wedding.
- speaker: Interviewer
  text: Did you go on a honeymoon after the wedding?
- speaker: Respondent
  text: No, we didn't. We stayed there for a month after the wedding as we had to make arrangements for the passage.
- speaker: Interviewer
  text: Where did you live after you got married?
- speaker: Respondent
  text: We stayed at my husband's house.
- speaker: Interviewer
  text: How was the life at your husband's house?
- speaker: Respondent
  text: There was nothing special. His mother and brothers and sisters lived near my house and I knew them well, so I stayed
    there without reserve. We stayed there only while we made arrangements to come here. We had to go to government offices,
    so we were quite busy, but we helped the family a little. My husband had leased 10 acres for 3 years, and went back to
    Japan after the first crop. He went back to Japan in January, and came back to America in April of next year.
- speaker: Respondent
  text: My husband was good at calling pheasants by blowing a whistle. At one time my uncle called a pheasant and shot it
    but he missed it. Then my husband called it and tried to shoot it, but he shot his hand instead. He was hospitalized for
    a month, but his hand was crippled. All his brothers were in the Army. He was the oldest, but he was not drafted because
    of his crippled hand. The Russo-Japanese War broke out the year he took a physical examination for draft. That year he
    went to Hawaii, and from there he came to America. The war broke out when he was going to Hawaii, so some men were called
    back to Japan from Hawaii. As he had a crippled hand he was exempted from military service.
- speaker: Interviewer
  text: I am surprised your parents let you go. You were the oldest daughter.
- speaker: Respondent
  text: My mother tried to stop me as she did not want to let me leave, but I wanted to come to America, and since he was
    a relative others thought they didn't have to worry, and told me I could go. My mother was the one who did not want to
    let me go, but when I went back to Japan after 5 years, she was still well.
- speaker: Interviewer
  text: Where did you go after you got your visa and passport?
- speaker: Respondent
  text: We went to Yokohama. At that time the ships were crowded with picture brides and other passengers, I had no trouble
    passing the tests for eye diseases and hook worms, but as the ships were crowded we had to wait in Yokohama for about
    a month.
- speaker: Interviewer
  text: About how many times did you miss the ships?
- speaker: Respondent
  text: About 3 times.
- speaker: Interviewer
  text: Did you stay at a hotel?
- speaker: Respondent
  text: Yes, we did. It cost us much money to stay there for a month, but if we went home we would miss another ship, and
    we had to pay the train fare, so we stayed there. At that time my uncle who was a doctor was in Tokyo for research, so
    we went to see him. In those days many people from Okinawa were going to Brazil as government contract immigrants, so
    we booked passage on a ship going to South America. It was an old ship, and it was very slow. They fed us rice boiled
    with barley so that we wouldn't get beriberi. We were on board the ship for 18 days before we arrived at San Francisco.
- speaker: Interviewer
  text: What was the name of the ship?
- speaker: Respondent
  text: It was Seiyo Maru.
- speaker: Interviewer
  text: What do you remember about the voyage?
- speaker: Respondent
  text: There wasn't anything special. We did the same thing every day.
- speaker: Interviewer
  text: Did you look on the ocean, young people?
- speaker: Respondent
  text: Yes, I looked on the ocean. The passengers were all from Okinawa so they were clothed differently. Their kimonos were
    made of nice material, but the style was like that of Japanese grammar school children; short kimono with short sleeves
    and obi tied in front.
- speaker: Interviewer
  text: Did you talk to them?
- speaker: Respondent
  text: No, I couldn't, because they spoke different dialect. It seemed that they went to school to learn standard Japanese,
    but they talked in their dialect. The ship's crew were angry, and told them to use the standard Japanese.
- speaker: Interviewer
  text: Were there many brides?
- speaker: Respondent
  text: There were young couples.
- speaker: Interviewer
  text: Were there women, too?
- speaker: Respondent
  text: Yes, they wore short kimonos with short sleeves and obi tied.
- speaker: Interviewer
  text: Were they going as brides?
- speaker: Respondent
  text: Yes, they were. There were some who were accompanied by husbands.
- speaker: Interviewer
  text: Did anything interesting happen on board the ship?
- speaker: Respondent
  text: Nothing interesting happened.
- speaker: Interviewer
  text: Was there a storm?
- speaker: Respondent
  text: No, there wasn't.
- speaker: Interviewer
  text: Did you stop over in Hawaii?
- speaker: Respondent
  text: No, we didn't. The ship did not dock in the harbor as they were afraid some government immigrants might jump off the
    ship. It was anchored about one mile offshore, and only some people could go ashore by a barge. They did not let everybody
    go ashore. Some Hawaiians brought some bananas to the ship to sell. My husband bought a bunch as they were cheap, but
    they did not get ripe before we arrived at San Francisco, so we ate only one and left the rest on the ship.
- speaker: Interviewer
  text: Did you go to Angel Island after you arrived at San Francisco?
- speaker: Respondent
  text: Yes, we did.
- speaker: Interviewer
  text: Where did you go first after the ship came into San Francisco Bay?
- speaker: Respondent
  text: Angel Island.
- speaker: Interviewer
  text: What did you do there?
- speaker: Respondent
  text: They examined us for eye disease and hook worms. After we passed the examination they took us back to San Francisco
    by a boat, and we went to the hotel.
- speaker: Interviewer
  text: How long did you stay on Angel Island?
- speaker: Respondent
  text: We passed the examinations, so we could leave right away. People who had eye disease or hook worms had to stay on
    Angel Island until they got rid of them.
- speaker: Interviewer
  text: Did you land at San Francisco right after that?
- speaker: Respondent
  text: Yes, we did. We stayed overnight at a hotel, and went to our camp by train.
- speaker: Interviewer
  text: Where was your camp?
- speaker: Respondent
  text: It was at Woodbridge, near Lodi. We stopped at Asahi.
