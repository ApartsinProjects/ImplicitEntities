collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Minejiro Shibata.
- speaker: Interviewer
  text: Minejiro. Does "mine" in "Minejiro" mean the peak of a mountain?
- speaker: Interviewer
  text: What part of Japan are you from?
- speaker: Respondent
  text: I'm from Shizuoka.
- speaker: Respondent
  text: Shimizu in Shizuoka.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In 1905, or Meiji 35.
- speaker: Interviewer
  text: Then, are you seventy-one years old now?
- speaker: Respondent
  text: I'm about seventy-one and a half years old.
- speaker: Interviewer
  text: What kind of family are you from?
- speaker: Respondent
  text: We're farmers.
- speaker: Interviewer
  text: Farmers. Didn't you fish?
- speaker: Respondent
  text: We owned a boat, but we didn't fish too much. Three partners were co-owners of a boat for fishing tuna. We couldn't
    make too much profit. Farming was our main source of income. We rushed to the beach and fished whenever we saw fish, so
    we weren't real fishermen.
- speaker: Interviewer
  text: How old were you when you came to the United States?
- speaker: Respondent
  text: In 1919, when I was in my eighteenth calendar year.
- speaker: Interviewer
  text: In your eighteenth calendar year?
- speaker: Respondent
  text: In May, when I was eighteen.
- speaker: Interviewer
  text: Do you remember anything that had happened in Japan before you left?
- speaker: Respondent
  text: Yes, I remember it roughly.
- speaker: Interviewer
  text: What kind of events occurred?
- speaker: Respondent
  text: I remember the "rice-riot" best. The families which had a large crop of rice were all burned out. In short, it was
    a so-called riot there. Those families with a pile of rice sacks had them cut at the bottom, and burned by other people.
- speaker: Interviewer
  text: Did the villagers burn it?
- speaker: Respondent
  text: No. There were two nearby towns and some townsmen did it. In those days, the price of rice as a whole was raised very
    high, and the poor had a hard time. I don't know who burned it but I'm sure that the poor took their revenge on the rich
    and set the fire. I went to see the ruins of the fire. The place was still smoking.
- speaker: Interviewer
  text: Is it called the "rice-riot"?
- speaker: Respondent
  text: Yes, but I don't remember it clearly, but I'd say it was in 1915. It was a hard period.
- speaker: Interviewer
  text: It was a terrible period, wasn't it?
- speaker: Respondent
  text: The poor had a hard time because of the higher price of rice. We farmers didn't suffer too much, for we had yams,
    wheat and rice on our own farms. Those poor townsmen such as those couldn't afford enough rice. They bought only one sho
    of rice at a time, so the term "buying one sho of rice" was used as a pronoun of the poor.
- speaker: Interviewer
  text: Do you remember anything else?
- speaker: Respondent
  text: I remember the days when farmers had a hard living. When I was a boy, farmers had little cash. They ate the products
    from their farms. My parents never bought a toy for me when I was a child. I had a small knife, and made my toys with
    it. Even now, I make almost everything by myself. I was surprised that the children in this country can't make anything
    by themselves.
- speaker: Interviewer
  text: How far did you go in school?
- speaker: Respondent
  text: I graduated from high elementary school, which is a junior high school here. There were no schools near my house,
    so I walked three or four miles a day in order to get to school.
- speaker: Interviewer
  text: What do you remember about the school?
- speaker: Respondent
  text: I remember it very well.
- speaker: Interviewer
  text: What do you remember?
- speaker: Respondent
  text: I remember that I didn't study hard at school.
- speaker: Interviewer
  text: What was fun at school?
- speaker: Respondent
  text: Fun at school... when I was fourteen or fifteen years old, I helped my parents water the vegetables every morning
    in the summer season before going to school. I felt so hungry before getting to school that I ate my lunch on the way
    to school. Since I didn't have anything to eat during the lunch time, I bought some roast sweet potatoes or dried persimmon
    at the cost of twenty or thirty sen. I never stole anything from anybody. I was taught not to steal, and I have been impressed
    by that lesson since my childhood.
- speaker: Interviewer
  text: What was your family religion?
- speaker: Respondent
  text: Our family religion was Buddhism — the Zen sect.
- speaker: Interviewer
  text: The Zen sect?
- speaker: Respondent
  text: When I was in Shimizu, I didn't know it was the Zen sect. I learned that after I came here. Our village as a whole
    wasn't too religious. No villagers went to the temple to listen to the sermon given by the priest. The priest was born
    and raised in our village. As we knew him since his childhood, we didn't put any special importance on his sermon. Besides
    that, people don't usually want to listen to a young preacher. The son of the priest came back to the village and succeeded
    his father. He was one of my classmates. We went to school together.
- speaker: Interviewer
  text: Do you still follow Buddhism?
- speaker: Respondent
  text: No. I'm not too enthusiastic about religion. I hate to tell you this, but I've never listened to a minister at church.
    I believe I don't need anything if I don't trouble and bother people. I'm the third son in my family. Not even the eldest
    son went to the temple for a funeral service or something.
- speaker: Interviewer
  text: Did you hear about Christianity when you were in Japan?
- speaker: Respondent
  text: I heard the term, but I never attended any church. I don't recall such a thing as Christianity in my childhood.
- speaker: Interviewer
  text: What motivated you to come to the United States?
- speaker: Respondent
  text: My brother was here, and he motivated me to come here. He came here seven or eight years earlier than I. Since he
    couldn't lead a good life in Japan, he went to Venice, London and New York. He decided to remain in the United States,
    which was his purpose from the beginning.
- speaker: Interviewer
  text: Your brother?
- speaker: Respondent
  text: Yes, my brother. He called my father and mother, and my mother called me here. It's a complicated story. At that time,
    it was hard to obtain an immigrant's visa unless you had good backing.
- speaker: Interviewer
  text: Did you stop at Hawaii?
- speaker: Respondent
  text: Yes, I did. I think I came on the Saibei Maru.
- speaker: Interviewer
  text: Did you stay in Hawaii for a long time?
- speaker: Respondent
  text: No. Stopping in Hawaii overnight, the ship went directly to San Francisco.
- speaker: Interviewer
  text: Did you arrive in San Francisco?
- speaker: Respondent
  text: Yes, I did. In those days, not too many ships came to the Los Angeles Harbor.
- speaker: Interviewer
  text: Was it in 1919?
- speaker: Respondent
  text: Yes, it was in May of 1919.
- speaker: Interviewer
  text: What kind of people were on board?
- speaker: Respondent
  text: Almost everybody was an immigrant.
- speaker: Interviewer
  text: Immigrant. Were there many ladies on board?
- speaker: Respondent
  text: Yes, there were, but not too many ladies, because it took a long time to get to the United States at that time.
- speaker: Interviewer
  text: Do you remember anything about the days in the ship?
- speaker: Respondent
  text: Eating was the only thing I did in the ship; I didn't know anybody. I stayed on the bank (gate) most of the time.
    The lice bred in the ship, because we couldn't take a bath too often. I can never forget that.
- speaker: Interviewer
  text: Wasn't it terrible?
- speaker: Respondent
  text: The food served in the ship wasn't especially good. I didn't mind whether it was good or not. Even when I was in Japan,
    I couldn't eat anything sumptuous. I came with peace.
- speaker: Respondent
  text: I felt at ease.
- speaker: Interviewer
  text: Because you were taught by them?
- speaker: Respondent
  text: There were a lot of lice in the ship. I was on deck every day, and with tears, I watched other ships sailing in the
    distance. I didn't have any friends or acquaintances to talk to. It took fourteen or fifteen days to get here.
- speaker: Interviewer
  text: What was your first impression of the United States?
- speaker: Respondent
  text: I thought here a beautiful country.
- speaker: Respondent
  text: I arrived around March and stayed on the Angel Island for three or four days in order to go through the immigration
    procedures. I was released after that.
- speaker: Interviewer
  text: How did you feel on the Angel Island?
- speaker: Respondent
  text: The wooden walls were covered with wire nettings. Chinese people drew letters and carved them on the walls. I was
    amazed how delicate those letters were. They served Japanese food, but it wasn't too good. If we paid, we could eat American
    food. I don't recall clearly what I ate.
- speaker: Interviewer
  text: Did you have to pay for the food?
- speaker: Respondent
  text: I paid twenty-five cents for the American food.
- speaker: Interviewer
  text: Did you pay for the Japanese food?
- speaker: Respondent
  text: No, the Japanese food was free but it wasn't good. I remember one American dish with diced beef. It was red and looked
    delicious, but it wasn't as good as it looked. I still remember that dish.
- speaker: Interviewer
  text: How did they treat you at the Immigration Office? Did they treat you well or bad?
- speaker: Respondent
  text: They treated us neither too well nor too bad. I didn't care about the treatment, for I didn't have to pay for anything.
    The only thing I didn't like was the bathroom. There were a lot of toilet bowls side by side without any doors. I, being
    Japanese, couldn't stand it.
- speaker: Interviewer
  text: Did you have a physical examination?
- speaker: Respondent
  text: Yes. They took our feces and examined it. They also examined us to see if we had a skin disease. That was all they
    checked for.
- speaker: Interviewer
  text: What did you think about Caucasians when you saw them for the first time?
- speaker: Respondent
  text: I thought them very great with their large bodies and pointed noses. At that time there weren't as many blacks as
    whites.
- speaker: Interviewer
  text: How did Caucasians treat you?
- speaker: Respondent
  text: They didn't treat me bad in particular.
- speaker: Interviewer
  text: Did you have a bad experience with Caucasians?
- speaker: Respondent
  text: I didn't have any in San Francisco, but I had a bad experience after I came here.
- speaker: Interviewer
  text: Was it later?
- speaker: Respondent
  text: Yes. Since I'm short tempered, I have fought against the whites with a stick. I hated to be looked down on. Whenever
    the whites looked down on us I got really mad. They called us Japs. They must have thought us something like a dog.
- speaker: Interviewer
  text: In those days did anything joyous happen to you?
- speaker: Respondent
  text: After landing, I took a train from San Francisco to Los Angeles. The train took me to the SP station but not the Union
    Station. The SP station located at Sixth and Central Avenue was separate from the Union Station. When I got off there,
    someone came to meet me. I was very happy.
- speaker: Interviewer
  text: Did you come to Los Angeles directly?
- speaker: Respondent
  text: Yes, I did, after four or five days.
- speaker: Interviewer
  text: Hadn't you experienced any hardship at that time?
- speaker: Respondent
  text: No, I hadn't.
- speaker: Interviewer
  text: Was it later that you had a hard time?
- speaker: Respondent
  text: Yes, much later.
- speaker: Interviewer
  text: You had just arrived here at that time.
- speaker: Respondent
  text: I came to Terminal Island. Do you know the place?
- speaker: Interviewer
  text: Only Japanese people lived there? No English was heard or spoken there?
- speaker: Interviewer
  text: Did you go to Terminal Island directly, right after you came here?
- speaker: Respondent
  text: Yes. The whites working at the cannery came to Terminal Island only when there was a catch of fish during the daytime.
    Since the Japanese outnumbered the whites, the whites didn't say anything bad to us.
- speaker: Interviewer
  text: Many Japanese people?
- speaker: Respondent
  text: They felt quiet because they were afraid of being thrown into the ocean if we got mad. I felt good.
- speaker: Interviewer
  text: Would you tell me about Terminal Island?
- speaker: Respondent
  text: The people on Terminal Island had lived in Port La Sail, around the Santa Fe area, up until three or four years before
    I came. They moved to Terminal Island, because the canning company built houses for the employees. Those houses weren't
    made of plastered walls, but just wooden walls. But life wasn't too bad there, for we had a Japanese store and we didn't
    hear any English.
- speaker: Interviewer
  text: Did you go on a fishing boat?
- speaker: Respondent
  text: Yes. I was a fisherman. I started to fish from May in the year I came. I earned some money during the summer season;
    I don't remember how much I earned, though.
- speaker: Interviewer
  text: As Fall wasn't a good season for fishing, I went to the downtown area.
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: I went to downtown Los Angeles to attend school. I went to school, but I couldn't learn English very well.
- speaker: Interviewer
  text: Did your best to memorize English?
- speaker: Respondent
  text: Yes, but when I got up in the morning, I couldn't remember anything. English is really hard. Listening to it for a
    while, I could learn it. I couldn't learn so well at the time. I went back to fishing the following summer, and earned
    from a thousand to fifteen hundred dollars.
- speaker: Interviewer
  text: Was it in the summer?
- speaker: Respondent
  text: Yes. I came back here in the fall. Not being able to afford to stay in a hotel, I worked as a schoolboy. I washed
    dishes in exchange for meals and fifteen dollars a month. In this way, I was able to pay my way through school. I hear
    a schoolboy can get seventy-five or eighty dollars a month today; at that time, I got only fifteen dollars a month.
- speaker: Interviewer
  text: Was it in Los Angeles?
- speaker: Respondent
  text: Yes. It was in Hollywood.
- speaker: Interviewer
  text: Did you go to high school?
- speaker: Respondent
  text: No. I didn't go to high school, because I couldn't understand English.
- speaker: Interviewer
  text: Was it an English school?
- speaker: Respondent
  text: Yes. The American schools at that time had a system for non-English speakers which was called ESL without any grades.
    Not only foreigners but also white students with low grades went there.
- speaker: Interviewer
  text: How long did you lead such a life?
- speaker: Respondent
  text: I was in Hollywood for a half year and returned to Terminal Island after that. I wanted to attend high school, but
    I stopped studying along the way. Some of my friends graduated from the University of Southern California. They overworked
    themselves in studying and taking care of their parents, younger brothers and sisters. They died of a disease. Unless
    you are super healthy, it's impossible for you to go through college without any support.
- speaker: Interviewer
  text: How long did you live on Terminal Island?
- speaker: Respondent
  text: I went back to Terminal Island after that, and fished there. Instead of spending money, I and a few others saved four
    or five thousand dollars to build a fishing boat together in 1924. Our boat was among the biggest in those days. We went
    beyond Mexico to catch tuna.
- speaker: Interviewer
  text: How big was your boat?
- speaker: Respondent
  text: It was eighty-six feet long.
- speaker: Interviewer
  text: Eighty-six feet long?
- speaker: Respondent
  text: Yes. We heaped eighty or ninety tons of tuna on the boat. It was a big boat. Most of the boats at that time were small.
- speaker: Interviewer
  text: Was tuna the only kind of fish you caught?
- speaker: Respondent
  text: No. We fished everywhere then. Other fishermen with smaller boats caught a lot of sardines all the time.
- speaker: Respondent
  text: Yes. They piled twenty-five tons of sardines all over the deck.
- speaker: Interviewer
  text: Besides sardines, what else did you fish?
- speaker: Respondent
  text: We caught "katsuo" in the summer.
- speaker: Interviewer
  text: What do you call "katsuo" in English?
- speaker: Respondent
  text: Bonito. We don't see it any more these days. We also caught the fish called "bunsen" in Japanese. In 1919, there were
    a number of "bunsen" all over the Los Angeles.
