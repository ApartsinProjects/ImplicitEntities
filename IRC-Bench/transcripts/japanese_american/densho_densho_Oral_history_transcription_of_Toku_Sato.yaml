collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: 'I was raised in a very traditional and well known family in the village. You know the life of a wife in that kind
    of household was very apt fickle: a oseen my mother suffer a lot. There are so many things which she had to worry about.
    So I didn''t like that kind of life.'
- speaker: Respondent
  text: Ever since I was 14 or 15 years old, I wanted to come to America, because I didn't want to live in such a poverty-stricken
    Japan. It's really strange, but somehow things worked out the way I wanted.
- speaker: Respondent
  text: My mother used to say, "Just because you live close leas to parents it won't assure a happy life. There are lots of
    people who had real hard time because of x. So it might be better for you to marry a very straight and serious person
    even though he might have to go far away. It seems as if he doesn't have much money, but he will do well, to feed you."
    When I said that to my husband, he said, "You were a fool, that's why you came to the place like this." [laughs]
- speaker: Respondent
  text: Well, a man who just graduated from a college wouldn't have much money. At that time Mr. Itano just graduated from
    U.C. Davis in Agriculture.
- speaker: Respondent
  text: You see it turned out to be true when my mother said, "He will be able to feed you." She said, "You are very healthy,
    so why don't you go to America." My mother had foresight because she suffered a lot in such a traditional family.
- speaker: Respondent
  text: When we visited Japan last time, we didn't even tell anybody about our visit, so that they would not make any big
    celebration. So my brothers were working at universities. They were really surprised to see us.
- speaker: Respondent
  text: Well, I listen to my mother's opinion and somehow it worked out okay. However, I wasn't enthused about coming to America.
    My mother knew that I was a very independent woman and could not adjust in that kind of traditional household where women
    had to say, "Yes, Yes," and did whatever was told to them.
- speaker: Respondent
  text: Japanese in-laws used to be very difficult to get strong with.
- speaker: Respondent
  text: I used to live in Isleton. Our children had to go to a segregated school. There was such a school in Florin. They
    say those Nisei who went to segregated schools had very heavy accents.
- speaker: Interviewer
  text: When I went to visit Livingston, someone said that once a Nisei resident came from Florin area and because of the...
- speaker: Respondent
  text: Well, when my son went to a public school, a teacher held out a pair of scissors and asked his class, "What is this?"
    My son said, "I know. It's hasami (scissors in Japanese)." He didn't know how to speak in English very well at that time.
- speaker: Respondent
  text: Elementary school. Even though it was not a segregated school, there were many Japanese and Chinese children and very
    few Caucasian children. They were learning such elementary language as "Open the door," and "Close the door." It was very
    funny. However, they had a good teacher by the name of Miss Edna. It's her first name, I think and I wouldn't know the
    rest.
- speaker: Interviewer
  text: I heard a white person who taught Nisei children saying that when they drew pictures, they drew a large battleship
    with a large Japanese flag and a small battleship with a small American flag. [laughs]
- speaker: Respondent
  text: When we entered the concentration camp, people in Sacramento wondered whether or not all the young people in Isleton
    were Kibei. I said, "Oh, no. My son doesn't know Japan at all." Then they said, "Why is it that everybody speaks such
    good Japanese?" So I said, "Well, everybody went to a segregated school, so they know lots of words which I even don't
    know. However, they were very poor in English.
- speaker: Respondent
  text: You know the principal at Lincoln Elementary school was a woman, a very strict person. If boys didn't mind themselves,
    the only thing teachers had to say was, "I'm going to send you to the principal." Then they would shrink away. Her name
    was Miss [unintelligible].
- speaker: Respondent
  text: There were many poor Japanese people at that time. Miss Harter once asked Mrs. Masaki if she could get assistance
    for those poor Japanese people. But they did not want to receive any assistance from the government. Miss Harter wanted
    Mrs. Masaki to carry this message, but they refused to accept it. No Japanese accepted welfare at that time.
- speaker: Respondent
  text: At that time there was no social security, so when the husband died, the family had nothing to depend on. The children
    were still small and they were really poor. Even then, they would not accept any assistance. At that time women couldn't
    go to work as freely as we did in recent years.
- speaker: Respondent
  text: There were those who had to send their children to Japan, because otherwise they would not be able to work. Rev. Kato
    was sent back to Japan when he was three years old. Especially when their mother died, the father could not take care
    of them.
- speaker: Respondent
  text: When their father died, then the mother could raise her children somehow. But when their mother died, the father could
    not take care of them.
- speaker: Respondent
  text: Kiyoshi and Dorothy went through similar experience because their mother died soon after Dorothy was born. She was
    only 2 years old then. When I went to her funeral, their family friend, Mrs. Endo (I think it was her name) held her.
    It was the time when she could not understand that her mother had died. She had a round cute face, and she was looking
    around all over the place. I think Kiyoshi knew what was going on.
- speaker: Interviewer
  text: Mrs. Washizu, you have three children, right?
- speaker: Respondent
  text: All my children went to high school. However, Miyoko graduated from a Jr. College. My son is working for the Post
    Office.
- speaker: Interviewer
  text: How about you Mrs. Itano?
- speaker: Respondent
  text: My oldest one is Harvey (PhD and MD) and then Dean who is a lawyer and manager of Guild Savings and Loan. The third
    one, Masashi, is a pathologist in Long Beach Memorial Hospital. Sometimes I forget what my children are doing and I get
    embarrassed. My daughter graduated from college as a dietitian.
- speaker: Respondent
  text: All my children (three) are dentists now, because my husband was a dentist.
- speaker: Interviewer
  text: Mrs. Miyake?
- speaker: Respondent
  text: I have three children, one boy and two girls. My son is a college graduate. He wanted to become a teacher, so he went
    to a college in Minnesota. But he became an engineer. Helen was going to a junior college but we were evacuated, so she
    learned sewing in Chicago. The oldest daughter went to UC Berkeley.
- speaker: Interviewer
  text: Mrs. Mizobe?
- speaker: Respondent
  text: I have two daughters, Toyoko and May. Toyoko is the older one. Both went to Jr. College. Toyoko was in college when
    we were evacuated.
- speaker: Interviewer
  text: Mrs. Hiraga?
- speaker: Respondent
  text: I have 8 children. They all graduated from colleges. George went to a college in Los Angeles. He is a diplomat and
    now he is stationed in the Philippines. Second one is in Los Angeles. He is a minister turned social worker. He went to
    college in Minnesota. He went to Japan and then went to Seminary. Willie went to School for architects. Now he is doing
    work which deals with building bridges and developing land. Shirley went to a junior college. The rest of girls went to
    high school. All were married.
- speaker: Interviewer
  text: Mrs. Miyasaki?
- speaker: Respondent
  text: I have three daughters and a son. The oldest one, a daughter, soon as she graduated from Jr. College. The next one
    graduated from high school and was sent to Japan to attend Seishin Jogakuin (Women's College). As soon as she came back,
    the war started. The third one was attending a Jr. College when the war started, so she didn't get to graduate, but she
    went back to college after they got married. My husband died when Dan, my son, was in college. One more year to go. He
    was attending a dental college in Chicago.
- speaker: Interviewer
  text: Mrs. Takatsuki, you don't have any children, right?
- speaker: Respondent
  text: Yes, that's right.
- speaker: Respondent
  text: I guess I have the most children. My children liked school, so they all wanted to go to school.
- speaker: Interviewer
  text: They told me that Nisei did very well in school, why?
- speaker: Respondent
  text: You see, we had nothing to improve ourselves, because of discrimination, however, there was one thing we could do
    which was to send our children to school. You know that they had to be a lot better than white people to get a job. If
    they were equal, then Nisei would have no chance. However, I didn't have to tell my children to study. I did tell them
    to study Japanese, though.
- speaker: Interviewer
  text: How about other people?
- speaker: Respondent
  text: This is the way I feel. Nisei are Americans. Their mothers stayed home. However, nowadays both parents work and children
    are left alone at home. So this might have something to do with their grades being lower than those of Nisei. I also think
    that children (Japanese-Americans) now are used to too much luxury. Issei were very poor.
- speaker: Respondent
  text: Friends are also an important factor, too. If kids had good friends, then all was OK. Japanese lived in a small area,
    so everybody knew what they were doing. Even school teachers knew children's situation.
- speaker: Respondent
  text: That's right. They didn't have too many white children as their friends.
- speaker: Interviewer
  text: Why Nisei study so hard?
- speaker: Respondent
  text: Of course parents encouraged them very much. I think parents wanted them to become better educated and more recognized
    by the society than Issei were. I think this was the real wish which was behind parents' mind.
- speaker: Respondent
  text: You see, Issei came to the place where they could not speak the language and had no rights. We even could not buy
    land, because we did not have citizenship. Issei knew that they couldn't advance very far, but they really wished that
    at least their children can be successful.
- speaker: Respondent
  text: However, even if some of them graduated from college, they could not get jobs. I knew there were those who said, "What
    are you talking about! Even if you graduated from college, you can't even get a job. There is no use going to school."
    There are some people like that. Besides, if their kids worked at a farm, or a fruit stand, they could make money immediately.
    Take Imagawa, for instance, even though their children graduated from college, they couldn't get jobs. But they still
    sent their children to school. They were really interested in education.
- speaker: Respondent
  text: There was a time like that. If they thought about immediate income, going to school was a waste of time. For example,
    I knew a Nisei who graduated from Harvard University, but the only job he could get was a job as a delivery boy at that
    time.
- speaker: Respondent
  text: In one way of looking at it, because of the war, Japanese Americans were forced to relocate and expose to many more
    areas of America. That's why people in the East began to recognize Nisei's ability.
- speaker: Respondent
  text: It's very important to do well in school, but I have never told my children "not to get behind others." I have been
    reading "Purine Tomo" ("Friends of Housewives", a magazine for housewives) for a long time. There were many good articles
    in there. Some of them, particularly those of Hanis, Motokota, were good.
- speaker: Respondent
  text: She often quoted from the Bible. Once, she was asked by an interviewer where she got the idea about her school. She
    replied, "I got a hint from the Bible." She said, "You should teach children not to be defeated; It's OK when they win.
    But if he/she gets defeated, then surely worries will bear a grudge against others. I would like to say, 'Do your best!'
    If you do well, then you'll be very happy. Even if you lose, you can see yourself. At the same time you can sympathize
    with others who perhaps do well. You should never insist on winning. Otherwise you would not be able to be kind to others."
- speaker: Respondent
  text: However, Japanese parents said, "Don't get defeated!" quite often. I used to hear it very often. They would say, "Makeruna"
    (don't get defeated).
- speaker: Respondent
  text: However, soldiers of 442nd must have put up maximum effort because they heard "Makeruna" from their parents.
- speaker: Respondent
  text: However, I feel that this comes from Nisei's patriotic spirit for America.
- speaker: Respondent
  text: It's true. It's not just that they loved their own country. Nisei say that by words, but they sure cooperated with
    the government and showed their patriotism by actions. I think Nisei are very honest.
- speaker: Respondent
  text: Much the same way. It's not just Japanese who taught patriotic spirit. Americans also taught their children the spirit
    to love their country. I was still at Tule Lake, and Masako was in Minnesota when we had to decide whether or not we should
    go back to Japan. So we wrote to her about it. Then she said, "Mother, if you want to go back to Japan, you could do that
    anytime you want. However, even if I'm alone, I would like to stay here and serve America." This was her letter to us.
    For the first time I felt that American children were indeed taught the spirit of patriotism little by little in the schools.
    It comes from the fact that they sing national anthems, do other things at school. It is a very gradual process. It's
    not because she went to the East; but because she attended American school. That's how I feel.
- speaker: Interviewer
  text: Mrs. Sato, how did you educate your children?
- speaker: Respondent
  text: Well, you know I didn't understand anything, so I just let them...
