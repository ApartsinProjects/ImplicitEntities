collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: First of all, would you tell me your name?
- speaker: Respondent
  text: My name is Mitsumori Nisuke in Japanese way, put in English it should be Nisuke Mitsumori.
- speaker: Interviewer
  text: What are the Chinese characters for your name Nisuke? Are they jin (hito) and tasukeru?
- speaker: Respondent
  text: Yes, the first part is hito but the character for suke is not tasukeru but ho.
- speaker: Interviewer
  text: Would you write it for me?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Yamanashi prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on February 15, 1888. In Japanese way I was born in the twenty-first year of Meiji.
- speaker: Interviewer
  text: Would you tell me about your family and your father's occupation?
- speaker: Respondent
  text: My family did farming for generations.
- speaker: Interviewer
  text: What was the size of the land your family had?
- speaker: Respondent
  text: It was large enough for my father to do farming. Sometimes he used somebody's field, too.
- speaker: Interviewer
  text: Can't you remember the size of it?
- speaker: Respondent
  text: Let's see. I think it was about seven or eight cho, which must be about two and a half acres.
- speaker: Interviewer
  text: Do you remember what kind of a person your father was?
- speaker: Respondent
  text: He was a serious country farmer.
- speaker: Interviewer
  text: Are you the oldest son?
- speaker: Respondent
  text: No, I am the second one. I have an older brother who is six years older than I. I was born when he was six years old.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was a daughter of a farmer in the countryside. I would say she was a typical ordinary peasant's wife. She was
    also a very stern mother and used to spank us immediately after we did something wrong.
- speaker: Interviewer
  text: What is your educational background in Japan?
- speaker: Respondent
  text: In those days there were four years in elementary school and another four years for middle school. I finished those
    eight years of schooling. Most of them did not go as far as I did. When I started going to school, there were about 30
    students in each class. However, by the time I started middle school, there were only eight or so students left in the
    class.
- speaker: Interviewer
  text: What kind of subjects did you study?
- speaker: Respondent
  text: We learned everything that was required in those days.
- speaker: Interviewer
  text: What were they?
- speaker: Respondent
  text: Japanese, arithmetic, calligraphy, reading, ethics, art, science, history, and geography. We had to study everything
    required in middle school in those days. However, since I liked to study very much, I was not satisfied with what we studied
    during the day and attended a night school. There I learned Chinese history and Chinese classics. I went to a scholar
    of Chinese classics, famous in the village and he taught me these subjects.
- speaker: Interviewer
  text: You must have really liked to study.
- speaker: Respondent
  text: Yes, I did like to study. So, what we learned in school was rather easy for me.
- speaker: Interviewer
  text: Do you remember about your teachers? What kind of teachers did you have in elementary and higher schools?
- speaker: Respondent
  text: Sure, I do remember about my teachers. I particularly remember four teachers. Mr. Higuchi was a teacher in elementary
    school, who was a priest and a very serious person. Mr. Kaneko was our principal. After Mr. Kaneko left, Mr. Shinohara
    came. He showed an interest in me as a student. According to the custom of our school, an honor prize was not given to
    any student when they graduated. Although they gave an honor prize up to the third year in middle school, they did not
    honor any fourth year graduating student with the idea that everyone should be equal. However, this teacher (Mr. Shinohara)
    decided to give me an honor prize because he thought that I was extraordinary and would become a useful person in the
    future. When I went back to Japan to visit last October, my nephew found that certificate of my honorary prize, which
    my brother had kept somewhere in the house and told me what a great person I was. I guess I studied hard during my school
    days and my teacher recognized it, too.
- speaker: Interviewer
  text: What kind of things do you remember most in your life in Japan?
- speaker: Respondent
  text: When I was in Japan?
- speaker: Interviewer
  text: Yes, when you were little.
- speaker: Respondent
  text: I cannot remember anything in particular when I was little.
- speaker: Interviewer
  text: How about after you were grown up?
- speaker: Respondent
  text: Let me talk about the days after I graduated from school. Since my family was poor in those days, I could not go on
    to a higher school which is equivalent to senior high school today after I finished middle school. There was only one
    person in the village who went to higher school. It was rather costly to go to higher school. However, I wanted to go
    to normal school since it was prefectural and the tuition was free. But a person had to be eighteen years old to go to
    normal school. Thus I was preparing myself to go to normal school. However, the war between Japan and Russia started in
    the meantime. Since I did not like to be drafted, I decided to come to the United States, giving up the idea of going
    to normal school. It was when I was seventeen years old. Even to get a passport to come to the United States one had to
    be eighteen years old. So, I waited and applied for it as soon as I became eighteen. Thus, I was in Japan only until I
    became eighteen. I don't seem to remember anything in particular of my life in Japan.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: My family was Buddhist. Although when my mother was sick a Tenrikyo priest came and prayed for us. The priest suggested
    that we should change a doctor for mother. My mother became better thanks to this priest. Drawing lots, he decided that
    we should get a doctor from the northern direction. The new doctor was a herb doctor. The medicine this doctor gave to
    my mother was very effective and she got better soon. The Tenrikyo priest told us what a grateful thing it was that my
    mother became healthy again. Since then my mother came to believe in Tenrikyo. However, the rest of my family were not
    interested in it. In general, we did not have any particular religious interest.
- speaker: Interviewer
  text: Have you ever heard about Christianity in Japan?
- speaker: Respondent
  text: Yes, but only once. There was a high school student in the village who had been influenced by Christianity. He talked
    about Christianity when he was back in the village during the summer vacation and I went to hear him once.
- speaker: Interviewer
  text: Would you tell me about the time when you were leaving for the United States?
- speaker: Respondent
  text: In those days anybody who wished to come to the United States was considered as an unpatriotic person, although most
    of the youth then seemed to have shared the feeling that it was nonsensical to remain in the country. Anybody when he
    became eighteen received a physical examination for conscription. In March everybody was stopped from leaving the country
    because a physical examination was conducted from March 15 until July. They said that every citizen should participate
    in the war between Japan and Russia and all the eighteen years old were kept indoors. Therefore I thought I had to leave
    as quickly as possible and applied for a passport immediately after the New Year's Day. I must have received my passport
    in two or three weeks because I could leave Japan in February.
- speaker: Interviewer
  text: Did they issue you a passport quickly?
- speaker: Respondent
  text: Yes, they did in those days. It was still good then.
- speaker: Interviewer
  text: What year was it?
- speaker: Respondent
  text: I think it was 1905. Thus, I came to the States. I did not have any particular idea of what I would like to do in
    the States. I had a vague idea that something would work out once I came over here.
- speaker: Interviewer
  text: You didn't come here as a student, did you?
- speaker: Respondent
  text: No, I came here in the form of business inspection. In order to come here as a student, one had to be a graduate of
    high school.
- speaker: Interviewer
  text: Did you go to Hawaii first?
- speaker: Respondent
  text: I stopped over there on my way here.
- speaker: Interviewer
  text: What kind of people were aboard the ship which you got on?
- speaker: Respondent
  text: I was surprised to find so many people aboard. There was a large group of young people of my age immigrating to Hawaii.
    Since I was a countryman, I first thought that all the other people were already speaking English. I did not seem to understand
    what they were talking. I guess I did not understand them because they were speaking to each other in their own dialect.
    Those from Kyushu spoke Kyushu dialect and the people from Hiroshima spoke Hiroshima dialect. Quite a few people were
    from Kyushu, Hiroshima and Tohoku, but there were only a few from Yamanashi -- myself and two other guys. They all spoke
    in groups, but I really did not understand them at all.
- speaker: Interviewer
  text: Were they all men?
- speaker: Respondent
  text: Yes, only men. There were no women. I think they hadn't had succeeded enough to get wives from Japan yet. They were
    still working. It was probably five or six years later that people started bringing their wives back from Japan. A person
    had to work in the United States at least for three, four years even to make money for the expense of going back to Japan.
    Those who made money must have gone back to get their old lovers or to find somebody for their wife. There were a lot
    of people who could not go back to Japan to get their wives. Thus, the system of picture bride was born. They decided
    their wives through the exchange of pictures.
- speaker: Interviewer
  text: Do you remember how big the ship was?
- speaker: Respondent
  text: It was about 6000 tons, called geiikubd(?).
- speaker: Interviewer
  text: Do you remember any incident that happened on the ship?
- speaker: Respondent
  text: I don't remember anything, I think there was not any incident which remained in my memory.
- speaker: Interviewer
  text: What kind of a country did you think the United States was?
- speaker: Respondent
  text: Our neighbor's young son also went to the States, so I used to ask his family what the United States was like, how
    the wealthy people were, whether I could study over there, etc. I heard that the United States was a huge country and
    very rich and that it is the country where one could act as he wished. Although I had not been to the country, I thought
    it was really a nice country by listening to people and looking at some pictures. I don't know the reason, but I anyhow
    longed for this country. It might have been that I felt I had to get out of Japan as soon as possible because the war
    started. This must have strongly urged me to come to the United States.
- speaker: Interviewer
  text: What part of the United States did you come first?
- speaker: Respondent
  text: It was San Francisco.
- speaker: Interviewer
  text: What was your first impression of San Francisco?
- speaker: Respondent
  text: My first impression was bad. It was just about the time when Japanese started coming into the country. Japan won the
    war with Russia and made Port Arthur fall. Port Arthur was considered then as the strongest port in the Orient and Japan
    took this impregnable military port which protected Russia all those years. Japan began to occupy a part of Russia in
    October and it was perhaps on New Year's Day that a big celebration on the victory of the war was held in Japan. I think
    Americans started thinking that Japanese were crazy. There was a fear among Americans -- particularly among government
    officials and press people -- since such a small country as Japan successfully fought against a big country, Russia and
    even fell that impregnable Port Arthur. Particularly a Los Angeles paper, Chronicles (?), used to write about bad things
    about Japanese and suggested that the United States should not let such dreadful people enter the country. This must have
    been the very beginning of anti-Japanese movement. It was March or April of 1905. When I landed, a man from a Japanese
    inn was at a port to meet me with a one-horse carriage. As we went along, we were bombarded with abuses such as Japs,
    lewd, etc. They even picked horse-dung on the street and threw them at us. There was a gang of scoundrels who came to
    treat Japanese roughly as soon as they heard Japanese entered a port. They were like radical teenagers today. There were
    a group of fifteen to twenty youngsters who shouted, "Let's go. Japs have come." We rushed to the inn, avoiding to be
    hit. Thus, I received an impression that this was a terrible place. This was my very first impression of America. I was
    baptized with horse-dung.
- speaker: Interviewer
  text: Did such an incident happen again frequently?
- speaker: Respondent
  text: Some young people from Yamanashi prefecture who were working for the Nichibei Times in San Francisco came to the inn
    to meet me and asked me what I was going to do. I answered to them that I would do anything if there were a job. They
    suggested me to come to their newspaper office. They thought there would be some job for me in the office. My job there
    was to set for the paper. I did this work for three months. At that time Americans' feeling toward Japanese was already
    bad in general and we were advised not to walk alone during the day and not to go out at night. Particularly it was dangerous
    after the school was over. I never went out at night and even during the day I tried to avoid the streets where American
    youngsters might be. I felt very insecure not economically but physically. Another thing I remember is those incidents
    in which young Japanese who worked for the paper came back to the office beaten up. There were some delivery boys and
    others worked in the office. Sometimes we rejoiced each other by the fact that we were not hit that day. It happened frequently
    that some of us were beaten on the street. Thus, I began to think that San Francisco was not a good place to stay. I also
    started to think that my job at the Japanese newspaper company was not something I should hold on to as my career.
