collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: Hanayo Inouye.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Hiroshima-ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In 1902. So, I'm seventy-two years old now.
- speaker: Interviewer
  text: Will you tell us something about your parents?
- speaker: Respondent
  text: My father came to the U.S. about four times in all. As he came back to Japan, he spent five years or so each time.
    Therefore, I grew up in a relatively comfortable, trouble-free family. Also my family could afford a nurse for me until
    I was five years old, well, wages were low in Japan.
- speaker: Interviewer
  text: He was a successful man, then?
- speaker: Respondent
  text: Yes. For various reasons, the Alien Land Bill for one, he came back to Japan and stayed for five years each time.
    He was there to build a new house and buy some land and so on. Mother was working on the farm with my grandfather. When
    my father came to the States for his first time, he became a schoolboy; attending children of a rich white family to and
    from their grammar school. Because of that he could speak very good English. Since a lot of people from Japan in those
    days did not speak a word of English, his bilingual ability was especially useful in helping the people find jobs. My
    husband, now deceased, was one of those people who were helped by my father, and used to say that he never thought of
    marrying a daughter of the man who used to help him find a job. He also used to tell us that my father was a very gentle
    and kind person to everybody. Here's another incident where my father was helpful. One time a friend of ours was coming
    back to Japan with his son. People on the ship soon started some sort of gambling. And, this son of his lost every penny
    he had earned in the U.S. Because of that he jumped into the ocean. His death was later notified to his family back in
    Japan. However, since it was in English, nobody in his family understood what it said. Then, my father, being back in
    Japan at the time, went over to this family and interpreted the letter for them. I still remember that.
- speaker: Interviewer
  text: In what part of the States did he live?
- speaker: Respondent
  text: All over the state of California. It turned out good that despite the low salary he became a school-boy, when he first
    came to the U.S. He learned what average school children from the first grade up are supposed to learn, and he used to
    say that that was why his English pronunciation was so good.
- speaker: Interviewer
  text: When was it, do you know, that he was here in the States?
- speaker: Respondent
  text: 'He was back in Japan one time, and was married then. After the first baby—that''s my older sister—was born, he again
    came to the States and worked for about five years. He was a very gentle man, and died young. Because of his good penmanship,
    he was asked by many people to write letters and notices for them and to record the names of guests at such occasions
    as funeral and wedding services. That made him well known in the village and the people respected him for that, which
    was probably one of the reasons that he was elected village-councilman when he came back to Japan permanently. At the
    time when he heard the news that the second baby was to be born, he had a plan of his own in mind: If it was a boy, he
    would invite him to the U.S. when he grew to a certain age, and then later he would come back to Japan together with his
    son. However, since the second baby happened to be me, a girl again, his plan did not come true. When my sister and I
    were still young, we spent few years with our father. He was with us only when he came back occasionally. Speaking of
    my family, I have one older sister, one younger sister, and two younger brothers.'
- speaker: Interviewer
  text: Do you have some other recollections about your father?
- speaker: Respondent
  text: From my own experiences here, I can tell that American farmers have less dirty things to handle in their daily life
    compared to the Japanese farmers. You see, when I was still young, the farmers in Japan used to make rounds early in the
    morning in the nearby cities, collecting human feces for fertilizer in their fields. Although my father was a village-councilman,
    needless to say he was not receiving enough salary for that to support the whole family. Farming was his main source of
    income. When I come to think of the point that he knew for himself how the American farmers lived, I cannot but admire
    him for coming back to the village to be a farmer there again. I still remember having a bull pull a cart—every farmer
    family kept a bull in those days—with barrels of human feces on it, I used to wait for him to come around at the foot
    of a steep slope which we had to cross to get back to our place. I couldn't do it just by myself. Before, he impresses
    me in that he did come back home to work on the farm despite the fact that he knew for himself the kind of life that the
    American farmers enjoyed. I also remember that we had a big storehouse, where my family kept unhulled rice. As the time
    came when my father had to pay land-tax, for example, he would hull certain amount of rice and sell it so that he could
    get cash. That's how he made taxes and other payments.
- speaker: Interviewer
  text: What is your educational background?
- speaker: Respondent
  text: My parents encouraged me to go to school. In fact my family was capable, if I wanted, to send me even to a college
    as in the case of one of my brothers who went to the then University of Tokyo. Anyway, after six years in elementary school
    I went to high school for two years. There I learned lots of things that women at the time were supposed to know, such
    as sewing, flower arrangement, and so on. I didn't like those very much, to tell you the truth. I liked, instead, singing
    songs, doing all kinds of sports, and playing.
- speaker: Interviewer
  text: What did you do after your school? Helped your family?
- speaker: Respondent
  text: Yes, that's right. When I was a little girl, I was raised by my aunt, my father's younger sister. She had a son. Her
    husband and the son were also in the U.S., and sending money to support her. Now, having raised me since I was very little,
    she didn't want me to marry a total stranger to her when I became of age. She wanted to be close to me even after my marriage,
    which is not at all an unusual feeling for any parent in those days. Although her son was younger by one year than I was,
    her passions for me were so desperate that she announced, when I was seventeen, that I was going to marry him. An official
    wedding ceremony as far as she was concerned was to be followed later on. She and my parents so decided without really
    consulting me. Their plan was to bring her son back to Japan at the age of twenty, and after getting married we were to
    come to the U.S. together. However, when he became twenty-one, he sent a letter to her mother—my aunt, that is—saying
    that he was working at a salmon cannery with his father, but he could not follow his father's path because he hated that
    work, and that he was going to go to school, and therefore, he would not be coming back to Japan for some time. That's
    what his letter said. Now, if I had to wait for him to come back, and not quite knowing when he would, I had to worry
    about getting old. Then, my aunt even suggested to adopt someone to marry me so that she could keep me within her reach.
    The idea was soon discarded, though.
- speaker: Interviewer
  text: What happened then?
- speaker: Respondent
  text: In that year Mr. Inouye came back to Japan looking for his wife-to-be. Picture-marriage had been practiced for some
    time, but it only produced a lot of troubles with those couples, so some time later it was banned. It was all right, however,
    to come back to Japan, get married, and bring a bride to the U.S. And that's what Mr. Inouye had in mind. When he came
    home—both of us come from the same town—I learned that he was a very honest and serious man, and his family was doing
    very well. I always wanted to come to the U.S. then. There were some people who suggested, and helped, that I marry him.
    So we were married, although the age difference was big. My aunt naturally was the last one to agree to our marriage.
    You see, she was even considering adopting someone to marry me, as I told you before. She cried and cried, as you can
    imagine. But, a lot of people talked her into the agreement at last. She really couldn't insist on her idea of marrying
    me to her son, because she didn't know for sure when he was coming back.
- speaker: Interviewer
  text: How old were you when you were married?
- speaker: Respondent
  text: I was twenty-one, and Mr. Inouye was forty-one. Because of the age difference, some of my relatives along with my
    aunt were opposed to our marriage. They said I was too young for him. Well, to me he was a fine man, and a man who made
    his fortune on his own. As a matter of fact, the Inouye's are a very, very well-to-do family back in our hometown now,
    owing to his hard work. Indeed he was even able to build a house on our wedding.
- speaker: Interviewer
  text: I'm sure you were glad to marry Mr. Inouye.
- speaker: Respondent
  text: Well, I was, but at the same time half of myself, so to speak, was so worried about my aunt. Well, I was glad in a
    sense that a long-cherished dream of mine had finally come true, you know, the dream of going to America.
- speaker: Interviewer
  text: After getting married, you came over here right away, isn't that correct?
- speaker: Respondent
  text: Yes, that's right. Our wedding ceremony was on July 28th, and on August 15th we were already on our way to the U.S.
    We landed at San Francisco, and then came to Elk Grove around September 21st or so, I recall. When we got there, the whole
    place was nothing but vineyards. Now there is a park, a high school, and a lot of houses.
- speaker: Interviewer
  text: How was your voyage to the U.S.?
- speaker: Respondent
  text: We came on the Ten'yo-maru. On the way to Yokohama from Kobe, where we boarded, the sea was so rough that I became
    awfully seasick, which truly made me think that I was going to die. After all it was my first experience to be on such
    a big ship. Although I was all right after Yokohama, a lot of people suffered from a severe case of seasickness all the
    way. They threw up whatever they had eaten, and because of that they were having a hard time even to stand up on their
    own feet, you know. I can't forget how much I hated to go to a bathroom, for it was way upstairs and every time I had
    to climb up steep steps to get there trying desperately not to fall off. Oh, it was really scary. Another thing that bothered
    everyone on board was the smell of paint. No such problem exists anymore, though.
- speaker: Interviewer
  text: What kind of people do you remember were on the same ship with you?
- speaker: Respondent
  text: Well, people like us, you know, who got married in Japan and coming over to the U.S. This was in 1922. At that time
    the picture-marriage was not allowed anymore. Like I said before, you could go back to Japan and bring your wife with
    you. Anyway, all I could see from the ship was just the blue sea, day after day. I kept wondering when in the years the
    voyage would be over. So, I was truly relieved when I saw seagulls flying over us. I was really glad to see them.
- speaker: Interviewer
  text: Do you recall any incidents or happenings while on board?
- speaker: Respondent
  text: Not particularly, other than that a lot of people got seasick. You see, our beds were on racks. Well, one time someone
    asked for a comb, so I let her use mine. Then, when I combed my hair with it later, it became so itchy all over my head.
    There wasn't a good facility to wash my hair in the ship, so no sooner than we landed, I rushed to a drugstore, and took
    care of it. It was lice from her hair. The sanitary situation on the ships in those days was very poor.
- speaker: Interviewer
  text: You talked about racks. Where, then, did your husband sleep?
- speaker: Respondent
  text: He was in the men's section. Men slept in one section, and women in another, it was separated. We could spend daytime
    together, but we were separated through the night.
- speaker: Interviewer
  text: When you got to San Francisco, how long did you stay there?
- speaker: Respondent
  text: About three days in San Francisco, and then we headed for Oakland. Now there is a bridge over the bay, but at the
    time we crossed it on a ferry-boat. From Oakland we came to Sacramento by train.
- speaker: Interviewer
  text: What was your first impression of Elk Grove?
- speaker: Respondent
  text: For some time I just kept wanting to go back home. Home is home and I thought at the time that where I was born was
    the best place for me to be. However, I think I began to like it here for its vastness of the land, and for the fact that
    a day's work meant a day's earning. Back in Japan I never had to work for a living myself, and therefore, working for
    money was kind of foreign to me. Well, speaking of money, it reminds me a little bit of my childhood. When I was still
    very small, I used to say to my father that I was going to be a very patient person when I grew up. It was my favorite
    pastime to go into the wood.
