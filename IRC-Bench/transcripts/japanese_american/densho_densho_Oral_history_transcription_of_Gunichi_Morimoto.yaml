collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Hiroshima Prefecture as the first son of a poor farmer. My father had been in Hawaii as an immigrant
    to grow sugar beets. After he went back to Japan he married my mother and I was born as their first son.
- speaker: Interviewer
  text: When did your father go to Hawaii?
- speaker: Respondent
  text: It was before I was born in 1897, so I think it was around 1895 or before. In those days the contract of immigrants
    was 3 years, so after 3 years was up he went back to Japan and married my mother and I was born. As it was a poor farming
    family, no matter how he tried the living was hard, so before I could sit up he changed his mind and went to Canada. I
    did not hear how he entered America from there but after a year or two he came to America. I hear that in those days among
    the immigrants with 3-year contract to grow sugar beets those who were the heirs of their families or those who had to
    support their parents returned to Japan, and those who did not have much savings came to America.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: My father was an illiterate farmer who just made his living by working. Although he was the oldest son he did not
    have enough money to become an heir because the family was poor. His mother was a step-mother and had complicated relationship
    with his surroundings. I think he had no other way but to go abroad to work.
- speaker: Interviewer
  text: About how much land did he own?
- speaker: Respondent
  text: He owned a little less than an acre. As it was a hilly countryside we did not produce as much crop as the sunny place.
- speaker: Interviewer
  text: What did he grow?
- speaker: Respondent
  text: Mostly rice, and during the winter he grew wheat.
- speaker: Interviewer
  text: Did your grandmother (father's mother) die?
- speaker: Respondent
  text: Yes, she did. My father went to Hawaii with his wife, but they were separated there. I hear that in those days young
    men who immigrated to Hawaii lived together in a big camp where there was no order. When my father went back to Japan
    alone he remarried and I was born. Father was already 42 years old then. In those days there were no women around his
    age available in Japan so he married my mother who was 20 years younger. That is why the family was complicated. When
    father was 42 years old he went to Canada leaving his 21 or 22 year-old wife and his son behind. The life of Japanese
    farmers during the Sino-Japanese War (1894-1895) was very poor although the rich people and landowners were well-off.
    Because of long war Japan had to spend money on armaments so the government had to collect tax accordingly. That is why
    the common people had hard times. I think my father left home because of that. But when he came here he found out that
    the immigrants, especially the Asian immigrants met with strong rejection. In those days most Japanese immigrants who
    went overseas to work were poor and did not have education, but when they came to America they did not have time to learn
    English.
- speaker: Interviewer
  text: About how many years did you live with your father?
- speaker: Respondent
  text: When my father's brother who was in Hawaii on sugar beets contract went back to Japan and married, my father left
    home and went to Canada. From Canada he came to America and 5 years later, around 1904 he called my mother. I was 7 years
    old then. I lived with my uncle and his wife and my grandmother. As the living was hard my uncle wanted to come to America,
    but in those days it was hard to come to America as too many immigrants moved from Hawaii to America. Therefore my uncle
    went to Hawaii as a contract immigrant and from there he came to America. Then his wife, grandmother and I were left behind
    in Japan. After my mother came to America in 1904 she gave birth to two daughters. First my grandmother died, and my uncle
    called his wife to America so I had nowhere to go to. Fortunately I had finished my compulsory education so I came to
    America.
- speaker: Interviewer
  text: You were brought up by your grandmother, weren't you?
- speaker: Respondent
  text: Yes, I was brought up mostly by my grandmother. She loved me very much.
- speaker: Interviewer
  text: Was your grandmother a nice person?
- speaker: Respondent
  text: She was a very nice person. It was the second marriage for both my grandfather and grandmother. My grandfather's first
    wife died after my father was born, so my father was the step son to my grandmother. My grandfather's second wife gave
    birth to a son and two daughters.
- speaker: Interviewer
  text: Were you ever scolded by your grandmother?
- speaker: Respondent
  text: Yes, I was, but she loved me very much. She told me old stories and religious stories.
- speaker: Interviewer
  text: Do you remember what kind of stories she told you?
- speaker: Respondent
  text: She said, "I hear a time will come when a man can fly, and by that time there will be many people. Also, a time will
    come when delicious fruit will grow on 3 feet tall trees, but the people will not be able to pick the fruits and eat them."
    I heard that kind of stories. Now that I am 80 years old I think about what she told me and wonder how people in her days
    thought about airplanes which they did not have in those days in their village and predicted the hard living condition
    in the future. When I walked hitting grass by the roadside grandmother used to say; "It is said that a child 7 or 8 years
    old hate grass by the roadside. I saw you hitting the grass by the roadside as you walked. If you do that you will be
    cursed by the grass." I was brought up listening to such stories by my grandmother.
- speaker: Interviewer
  text: Do you remember anything else your grandmother taught you?
- speaker: Respondent
  text: She said, "Don't pick all the persimmons from the trees but leave one for the birds to feed on. Even though you grew
    them yourself they are not all yours." She always warned me not to waste rice as it takes long time to grow them.
- speaker: Interviewer
  text: You were influenced by your grandmother, weren't you?
- speaker: Respondent
  text: My father left me before I could sit up and my mother left me when I was 7, so I depended on grandmother until I came
    to America when I was 13 years old. Since I was 11 or 12 years old I ran errands for the family. I also went out to sell
    rice and barley.
- speaker: Interviewer
  text: How did you go about selling them?
- speaker: Respondent
  text: I put them in a basket and carried the basket on my back. I took them to a store and exchanged them for things we
    needed such as shoyu and tofu. We did not have to buy vegetables as we grew them.
- speaker: Interviewer
  text: Do you remember about your mother before she left you when you were 7?
- speaker: Respondent
  text: As my mother was busy farming outside and grandmother stayed home and took care of the household, I don't remember
    about mother well. Most children are brought up by their mothers, but I wasn't.
- speaker: Interviewer
  text: How many years did you go to school?
- speaker: Respondent
  text: I came here as soon as I finished 6 years of compulsory education.
- speaker: Interviewer
  text: What do you remember about your schooldays?
- speaker: Respondent
  text: My schooldays went smoothly. In those days there was no uniform, so I went to school in kimono with other children
    of the village. The moral sentences were the most important subject in those days. Also the physical education was very
    strict. When boys become soldiers by teachers they cannot dilly-dally, so since we were school kids we were scolded if
    we were slow and lazy. We were lucky if we were not beaten.
- speaker: Interviewer
  text: What subject did you like best in school?
- speaker: Respondent
  text: I did not have any special subject I liked. As there was no men in my family I had to run errands after I came home
    from school, so I did not have much time to study. I think my school record was average.
- speaker: Interviewer
  text: What did you enjoy most at school?
- speaker: Respondent
  text: I enjoyed the excursion and the athletic meet the most.
- speaker: Interviewer
  text: Were there school trips in those days?
- speaker: Respondent
  text: I think our excursion was the same as the school trip now.
- speaker: Interviewer
  text: The 6th graders go on 2 to 3 days trip nowadays. Did you have that kind of a trip in those days?
- speaker: Respondent
  text: We made only a one-day trip in those days. We just went to tours for study. We were not in condition to make trips
    in those days.
- speaker: Interviewer
  text: What did you play after school?
- speaker: Respondent
  text: 'After boys came home from school they were told to go in the wood and gather firewood, or go out and cut the grass
    or bring in the hay. The girls had to baby-sit. The only time we played with friends were on holidays or at festival time.
    I remember the following song: "Don''t cry baby when the evening comes For the fire in the stove will die out." The meaning
    of the song is; The mother is cooking supper and the baby is crying. If she tends to the baby, the fire in the stove will
    die out. It sings about her predicament. In those days there were no gas or electricity to cook with. They burned brushwood
    in the stove. They did not cook rice, but barley which took 2 to 3 hours to cook. The little child followed mother or
    grandmother around all day so she is tired and want to go to bed, but mother has to cook supper. If she tends to the child
    the fire in the stove will die out. This is a song about a farmer''s wife''s predicament.'
- speaker: Interviewer
  text: Did anything happen in your village such as earthquake or war when you were little?
- speaker: Respondent
  text: I don't remember anything happening before I was 7 years old. I remember when I was 7 or 8 years old I visited my
    neighbor who was wounded in Russo-Japanese War and was in an Army hospital in Hiroshima. On the way home I strayed from
    my grandmother and cried. We walked about 5 miles to Hiroshima and walked back home.
- speaker: Interviewer
  text: Were there any horse or ox at your house?
- speaker: Respondent
  text: As we did not have any men in the family we did not have horse or ox. We had a neighbor bring an ox and help us. We
    did not use horses in those days. When I was about 10 years old I was sent out to get grass for the ox after school. Children
    in those days did not have time to play after school.
- speaker: Interviewer
  text: What else do you remember about your childhood in Japan?
- speaker: Respondent
  text: I don't remember much about my childhood.
- speaker: Interviewer
  text: Were you lonely or were you happy?
- speaker: Respondent
  text: I did not feel lonely or happy. I had friends in the neighborhood so I was not lonely, but in those days the life
    was hard for my friends and neighbors so we lived in small way. We did not buy much food, and there were only a few stores
    that sold food.
- speaker: Interviewer
  text: Did you have enough to eat when you were little?
- speaker: Respondent
  text: We had enough to eat, and I went to school with packed lunch.
- speaker: Interviewer
  text: Did you come to America all alone?
- speaker: Respondent
  text: I was told to come to America in Spring of 1910. I had just finished 6 years of compulsory education then. In those
    days we could not come to America if we had eye disease. In Japan in those days we burnt firewood in the house to cook
    rice and barley and burnt wood in the fireplace to get warm, That is why the house was filled with smoke which was bad
    for eyes. When I had my eyes examined I was told that I had trachoma, so I failed the examination. A year before that
    my grandmother died leaving my uncle's wife and her two daughters and myself behind. Then my uncle summoned his wife,
    so she left her two children in the care of her relations and came to America. She did not have trachoma, but I had to
    have my trachoma cured I stayed in Hiroshima and went to a doctor's office for treatment. When my eyes were almost cured,
    I caught another eye disease from other patients. As it took so long I thought about giving up going to America, but I
    was told to take my time and get it cured. Finally I came to America in December of 1910. In those days there was no pier
    in Kobe, so we took a row boat to the ship. It was a small ship about 6,000 ton. In those days I did not know how things
    were in America as the letters I received from America were written in classic Japanese style which I could not read.
    I was told to go to Seattle as the physical examination at the Immigration office in San Francisco was stricter, so I
    went to Seattle. It took two weeks to get there.
- speaker: Interviewer
  text: How were it on board the ship?
- speaker: Respondent
  text: The ocean was not too rough, but the air in the ship smelled bad with the smell of disinfectant and food as I was
    used to living in fresh air. As I was used to eating fresh vegetables and fish, the two weeks on the ship was hard for
    me. In those days we could not send a cable telling people to pick me up until the ship came within 300 miles from the
    shore. That reminds me that when I was in Japan only 3 or 4 houses on the main street in Hiroshima had electricity. Even
    after I came to America only the main street in Woodland had electricity.
- speaker: Interviewer
  text: Were you alone on the ship?
- speaker: Respondent
  text: Yes, I was, but I was with other passengers. In those days the picture marriage had started but only a few people
    came. It became popular after 1913 or 1914. Most passengers were married people who had wife and children in Japan.
- speaker: Interviewer
  text: What did you do on board the ship?
- speaker: Respondent
  text: I stayed in bed most of the time because I didn't have anything to do.
- speaker: Interviewer
  text: Did you have good appetite?
- speaker: Respondent
  text: I ate 3 meals a day but just to stay alive as they were not tasty as our home cooked meal. A week before I got on
    board the ship I had to stay at a temporary residence. During that stay they examined my eyes and passport.
- speaker: Interviewer
  text: Weren't you lonely?
- speaker: Respondent
  text: No, I wasn't as I was excited. I was lonely after I came to America as I did not have friends.
- speaker: Interviewer
  text: Did you make friends on board the ship?
- speaker: Respondent
  text: I became friend with a young man from Kyushu and two other young men from the same county. The ship left from Kobe,
    stopped at Yokkaichi and went to Yokohama, where it stayed for 2 days to load the cargo. We 3 young men landed at Yokohama
    and walking down the street we saw a rickshawman say something to a white man. Then this white man said "No" shaking his
    hand. A man who was about 3 years older than I said...
- speaker: Respondent
  text: As I grew up in a family with no men, I had to do a man's job such as selling and buying things. In those days rice
    was 12 sen, wheat was 8 sen, barley was 6 sen and sake (rice wine) was 24 sen for 1 sho (about 14 quart). At the age of
    13 I already knew how things were.
- speaker: Interviewer
  text: What kind of country did you think America was before you came here?
- speaker: Respondent
  text: After I landed at Seattle I stayed at Fujii Hotel. My father had his money robbed, so he borrowed money from a Chinese
    neighbor and came to meet me. The master of the house where he worked as a gardener told him that he would help my father
    if he got in trouble, so father was confident. The immigration officer did not say anything to him, but he told the man
    who came to pick up the passenger who came with me that he would let the man land if he paid him $50. This man went back
    home and borrowed $50 to pay the immigration officer. It was like that in those days.
- speaker: Interviewer
  text: Did you take a physical examination when you arrived at Seattle?
- speaker: Respondent
  text: Yes, I had an eye examination and had my passport checked at the Immigration office.
- speaker: Interviewer
  text: How many days did you stay there?
- speaker: Respondent
  text: I stayed there for about a week until my father came to pick me up. While I was there, a Japanese man who did something
    illegal was arrested and was waiting to be sent back to Japan. He explained to us how things were in America. I felt sorry
    for him, but we were fortunate to have met him.
- speaker: Interviewer
  text: What did this man do?
- speaker: Respondent
  text: I don't know what he did as I was still a child. I think he had some relationship with a woman or something.
- speaker: Interviewer
  text: Did you know about America when you were in Japan?
