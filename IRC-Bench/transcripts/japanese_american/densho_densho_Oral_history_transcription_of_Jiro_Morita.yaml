collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me where you were born?
- speaker: Respondent
  text: I was born in Katase, Izu, Shizuoka-Ken, Japan.
- speaker: Interviewer
  text: When were you born?
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: 80 years old.
- speaker: Interviewer
  text: Do you remember of any war while you were growing up in Japan?
- speaker: Respondent
  text: Yes, I remember the war between Russia and Japan. I remember that my relative went to fight in the war and that Japan
    won. And I remember that the peace treaty was signed in Newport, Rhode Island and the president of the U.S. was Roosevelt.
- speaker: Interviewer
  text: I understand that you were in the U.S. Army during WWI. Were you a citizen of the U.S.A?
- speaker: Respondent
  text: No, I was not a citizen, I was studying at Cal-Tech. The institution was turned over to the U.S.A Army so I volunteered
    myself to be in the Army and kept on my studies. We drilled and being an engineer, we learned how to build bridges and
    etc.
- speaker: Interviewer
  text: You were a student at Cal-Tech at the time. What were you majoring in?
- speaker: Respondent
  text: Electrical Engineering.
- speaker: Interviewer
  text: Was it unusual for a Japanese to be in college at that time?
- speaker: Respondent
  text: Yes, I was the only one. In my days, among caucasians only 8% or 10% went to high school. They quit school when they
    finished grammar school and went to work because jobs were available.
- speaker: Interviewer
  text: Did you go to high school?
- speaker: Respondent
  text: Yes, I graduated Pasadena High School in 1915.
- speaker: Interviewer
  text: How old were you when you came to U.S.A.?
- speaker: Respondent
  text: I was 16 years and 10 months old.
- speaker: Interviewer
  text: When you were in Japan, do you remember of any earthquakes, tidal waves or plagues?
- speaker: Respondent
  text: Not a big one. Since I got married, there was a big earthquake in Tokyo.
- speaker: Interviewer
  text: What was the religion of your family in Japan?
- speaker: Respondent
  text: I would say partly Buddhism and partly Christian.
- speaker: Interviewer
  text: Would you explain that?
- speaker: Respondent
  text: My father was not quite a Buddhist nor not quite a Christian but my aunt was a Christian, I heard Christian sermons
    while I was in high school in Japan near Shimoda.
- speaker: Interviewer
  text: Did you have contact with a lot of Christians then?
- speaker: Respondent
  text: No, once in a while I went to a church in Shimoda.
- speaker: Interviewer
  text: Did you hear from missionaries?
- speaker: Respondent
  text: I think it was from a Japanese minister. Our high school invited Buddhist priests and Christian ministers. Shimoda
    was the first port opened to Americans. That's the reason we received Christian religion earlier than most people in Japan.
- speaker: Interviewer
  text: When you left Japan in 1909 as a teenager, what was your family situation like?
- speaker: Respondent
  text: My father was here in America already. He studied at Keio University (Keio Gijuku then) but when my grandfather lost
    money in shipping business, he decided to quit school, come to America and make some money. Grandfather lost his ships
    in a big storm and was in debt.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: Yes, I had an older brother, a younger sister and a younger brother.
- speaker: Interviewer
  text: Did they come to the United States?
- speaker: Respondent
  text: No, I'm the only one. My grandfather was a scholar, my father studied in a college and my older brother was attending
    college. I being the second son, I thought I should come to the United States and start on my own.
- speaker: Interviewer
  text: In Japan, did you go to grammar school and high school?
- speaker: Respondent
  text: Yes, I completed grammar school and attended high school but I left when I had a year more to go.
- speaker: Interviewer
  text: What grade did they put you in when you came to America?
- speaker: Respondent
  text: I spoke a little English so they put me in the 7th grade. I went to grammar school one and a half years.
- speaker: Interviewer
  text: From there, did you go to high school? They did not have junior high school then.
- speaker: Respondent
  text: Yes. The reason I was able to converse some in English was because I studied under a man and a lady English conversation
    teacher in Tokyo in preparation to come to this country.
- speaker: Interviewer
  text: Did you learn English in Japan? Was it formal English?
- speaker: Respondent
  text: Yes, it was formal English.
- speaker: Interviewer
  text: Did you find it hard to converse when you came here?
- speaker: Respondent
  text: No, not that hard because when I was young, my brother and I went to the Yokohama pier and talked to foreigners. The
    day after I arrived in America, I think it was a Saturday in the month of February, I played baseball with new friends
    I had made. At the grammar school, I ran the 100 and 200 yard dash for the school. I was right in there. I had lots of
    fights with other boys but I wasn't scared.
- speaker: Interviewer
  text: Why did you fight with them?
- speaker: Respondent
  text: They were big and I was small but they picked on me. I didn't take it sitting down.
- speaker: Interviewer
  text: The reason you came to America was to join your father who was here already, When was this?
- speaker: Respondent
  text: In January 1909.
- speaker: Interviewer
  text: Did you come via Hawaii?
- speaker: Interviewer
  text: Did you have chance to do some sightseeing in Hawaii?
- speaker: Respondent
  text: Not much. I was on the "Shunyo Maru" the best steamship at that time. I had an introduction from a relative who was
    with another ship company to the captain of "Shunyo Maru" and was treated very well on the ship.
- speaker: Interviewer
  text: Do you remember how many were on the ship?
- speaker: Respondent
  text: Quite a few landed in Hawaii. About 6 of us men came over to the U.S. The rest were picture brides.
- speaker: Interviewer
  text: Did Hawaii impress you?
- speaker: Respondent
  text: No, only that I noticed people were swimming in the winter and divers went after the nickels and dimes we threw from
    the ship.
- speaker: Interviewer
  text: Didn't you want to get off at Hawaii?
- speaker: Respondent
  text: No, I had someone waiting for me here.
- speaker: Interviewer
  text: Do you recall the type of people who were on the ship?
- speaker: Respondent
  text: The immigration law was already in effect and only students and merchants were able to come.
- speaker: Interviewer
  text: Was this a regular passengers ship?
- speaker: Respondent
  text: Yes, it was one of the best passenger steam ships.
- speaker: Interviewer
  text: Do you recall any incidents that happened on the ship?
- speaker: Respondent
  text: Don't recall anything particular but they made me wear a coat and tie to eat at the second class dining room which
    I didn't like.
- speaker: Interviewer
  text: Did you have to do that to eat in the second class dining room?
- speaker: Respondent
  text: Yes. It might have been the first class, I'm not sure.
- speaker: Interviewer
  text: How did the ladies dress?
- speaker: Respondent
  text: There weren't any with us.
- speaker: Interviewer
  text: Then you were the only Japanese second class passengers?
- speaker: Respondent
  text: Yes. I don't know whether I was on the first or second class.
- speaker: Interviewer
  text: Then the other Japanese were third class passengers weren't they?
- speaker: Respondent
  text: Yes. I was in there, too, but they came after me.
- speaker: Interviewer
  text: How many weeks did it take you on the ship to come here?
- speaker: Interviewer
  text: What kind of thoughts ran through your mind while traveling?
- speaker: Respondent
  text: I thought I had to work my way through when I came to America but I would be able to make it.
- speaker: Interviewer
  text: Did you have other relatives besides your dad here?
- speaker: Respondent
  text: My uncle was here. My dad returned to Japan in the spring of 1911. I came to Pasadena in August of the same year.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: Nothing definite, I had some ambition.
- speaker: Interviewer
  text: Did you land in San Francisco?
- speaker: Respondent
  text: Yes, and I had to study very hard. Someone I knew who was about 2 years ahead of me in Japan was still studying in
    the 5th or 6th grade in grammar school. I was ahead of him over here and I had to study that much harder.
- speaker: Interviewer
  text: Were you impressed by the buildings?
- speaker: Respondent
  text: Yes, but San Francisco was still torn down. Fairmont Hotel was the only big building that was up.
- speaker: Interviewer
  text: Was this after the earthquake?
- speaker: Respondent
  text: I came in 1909 but the buildings were not reconstructed as yet.
- speaker: Interviewer
  text: When you came off the ship, do you recall how the immigration officer treated you?
- speaker: Respondent
  text: There weren't many of us so we didn't have to wait very long.
- speaker: Interviewer
  text: Were they courteous to you? Did you talk in English and were they surprised?
- speaker: Respondent
  text: I don't know. I think I used some English.
- speaker: Interviewer
  text: Was your father in San Francisco?
- speaker: Interviewer
  text: Did you live with him?
- speaker: Respondent
  text: No. I lived with a friend of my father and within few months, I got a school boy job with a caucasian family and went
    to school from there. Others did the same.
- speaker: Interviewer
  text: Before you came, you had your mind made up that you were going to go to school.
- speaker: Respondent
  text: Yes, that's it.
- speaker: Interviewer
  text: In San Francisco, how did white people treat you?
- speaker: Respondent
  text: I made a lot of friends in school, especially the younger children because I could protect them from the bigger ones.
- speaker: Interviewer
  text: Did you know Judo?
- speaker: Respondent
  text: Yes, once I threw a boy over my shoulder. The teacher asked me why I did it. I did it because the other boy picked
    on me first and started the fight.
- speaker: Interviewer
  text: Did they leave you alone after that?
- speaker: Respondent
  text: Once, I had to take three boys all at once, one under my foot, one on my back and one in front. The teacher came and
    stopped it. That's one I wouldn't take anything from anyone.
- speaker: Interviewer
  text: Did any of the boys invite you to their house?
- speaker: Respondent
  text: Yes, one fellow did. These incidents didn't happen very long. Within few months, I was everyone's friend. I was invited
    to participate in the track meet representing their school.
- speaker: Interviewer
  text: Until what age did you go to school? Did you go to a high school in San Francisco?
- speaker: Respondent
  text: I went to Royal High School in San Francisco one month. Then I moved to Pasadena, because my uncle lived here. I graduated
    Pasadena High School in 1915.
- speaker: Interviewer
  text: Did you apply to Cal-Tech after that?
- speaker: Interviewer
  text: While you were single, did anything special happen?
- speaker: Respondent
  text: I note I took on girls once in a while. On graduation night, about a dozen of us went to a soda fountain to have ice
    cream and soda. The waiter didn't wait on me. Others asked why and his reply was that they didn't serve Japanese. Then
    the whole gang left the place because they were prejudiced against me. I was their friend, I was in the senior ball and
    all of the activities with them. They couldn't stand such action.
- speaker: Interviewer
  text: Did you attend church at that time?
- speaker: Interviewer
  text: Was it a Japanese church?
- speaker: Respondent
  text: Yes, usually I went to a Presbyterian Church on Madison and Colorado streets but it's torn down now.
- speaker: Interviewer
  text: Anything else while you were attending school?
- speaker: Respondent
  text: I remember there was a graduation beach party and a dance was going on but I didn't know how to dance. There was a
    Japanese student from another school and he was from Hawaii. He wanted to be introduced to my girl friend so I did. I
    sat out but I could have danced if I wanted to.
- speaker: Interviewer
  text: Was she a Japanese girl?
- speaker: Respondent
  text: No, she was caucasian. When I was at Los Angeles Junior College for a while, I played tennis with the team. Girls
    from Pasadena High School were there all pulling for me. I was just a regular guy.
- speaker: Interviewer
  text: Did fellows resent your going out with white girls?
- speaker: Respondent
  text: No, they laughed and tumbled around. I mingled with everybody. I think if you sit back and be alone, they'll pick
    on you. If you mingle with everyone, I think that solves the problem right there.
- speaker: Interviewer
  text: During the time you were in school, were you working?
- speaker: Respondent
  text: I was working.
- speaker: Interviewer
  text: Were you pretty good financially?
- speaker: Respondent
  text: Financially, I used to save one hundred dollars a year. That's equivalent to one thousand dollars today. In four years,
    I saved $400.00 to go to college.
- speaker: Interviewer
  text: What sort of work did you do?
- speaker: Respondent
  text: I was able to cook so I got more salary than other school boys. If they got $2.00, I got $4.00. During summers, I
    did gardening work, I got room and board with it so I saved quite a bit.
- speaker: Interviewer
  text: Did you work for a white family? Did you cook American food?
- speaker: Respondent
  text: Yes, I did. When I was attending Los Angeles Junior College, I worked at the home of the city attorney. When I told
    them I had to leave because the place was too far from school, they asked me to stay two weeks longer to teach the new
    boy how to cook. That family was very strict. They had children of high school age. They were not allowed to call me by
    my first name. They had to call me Mr. Morita.
- speaker: Interviewer
  text: In other words, they didn't want their children to boss you around.
- speaker: Respondent
  text: Yes, they were told to respect me because of age and more advanced in school. That happened most everywhere I went.
    They gave me the front door key while the Japanese women house worker had to enter from the back door. When they had guests,
    I sat at the dining table with the rest of the family. They said I was part of the family.
- speaker: Interviewer
  text: Were these families religious people?
- speaker: Respondent
  text: Yes, I went to church together.
- speaker: Interviewer
  text: When you were approaching graduation at Cal-Tech, what was in your thoughts?
- speaker: Respondent
  text: Before graduation, I had to work to get more money. I went to the newspaper publisher "Examiner" to put an advertisement
    for work. They were helping veterans but told me they couldn't find a white collar job for me. There was prejudice there.
- speaker: Interviewer
  text: Was it the Los Angeles Examiner?
- speaker: Respondent
  text: Yes. Instead of going back to Cal-Tech, I went to work in a grocery store in Los Angeles. I think I worked about one
    year and then went on my own.
- speaker: Interviewer
  text: You were living in Pasadena. How did you get to L.A.?
- speaker: Respondent
  text: There was what we called P.E., the red car.
- speaker: Interviewer
  text: How did you meet your wife?
- speaker: Respondent
  text: She is my cousin but not related by blood.
- speaker: Interviewer
  text: Was she here or in Japan?
- speaker: Respondent
  text: She was in Japan.
- speaker: Interviewer
  text: Was it "baishaku" (arranged by go-between)?
- speaker: Respondent
  text: Parents arranged it while we were young and we ended up that way.
- speaker: Interviewer
  text: Was she from your home town?
- speaker: Interviewer
  text: Was this arranged before you came to this country?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Was the wedding performed here in Pasadena?
- speaker: Respondent
  text: No. The ceremony was held in Japan and we were married in Seattle. I went to Seattle to meet her.
- speaker: Interviewer
  text: What kind of ceremony was it in Seattle?
- speaker: Respondent
  text: We went to a minister and got married.
- speaker: Interviewer
  text: You probably had lots of friends who married picture brides. Do you recall any stories?
