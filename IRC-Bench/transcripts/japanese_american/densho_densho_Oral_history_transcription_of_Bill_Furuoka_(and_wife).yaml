collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Stockton. It's still there, Woodword Island in the delta.
- speaker: Interviewer
  text: How many brothers and sisters?
- speaker: Respondent
  text: Two brothers one is Japan and one in this country and two sisters.
- speaker: Interviewer
  text: What was your father doing?
- speaker: Respondent
  text: He was a farmer, but passed away in 1932, long time ago. He was farming in the Island. That's why I was born there.
    I was 16 years old then. I was 3 years old when my parents went back to Japan and left me there. I stayed in Japan for
    8 years. I came back here when I was 8 years old. Then I went a grammar school. Meanwhile, my father died when I was just
    about graduating from Jr. high. So I couldn't go to high school. I was the oldest one in the family. I had 2 brothers
    and 2 sisters, so I had to work. So I have been working ever site then I was 16 years old. Then, in 1940 we got married,
    right before the war.
- speaker: Interviewer
  text: Do you remember the Depression?
- speaker: Respondent
  text: Oh, yeah. You see, right in the Depression time my father died, in 1932. So you see, like me, I never worked full
    time before for my father, even though I worked after school. But when I worked for Hakujin (white man), well, I worked
    very hard. Besides, even if I was 16 years old, Japanese 16 years old was not that tall. I was around 5 feet 3 and 110
    lb. So I had to work 10 hours to get 8 hours pay. Hakujins were very smart, too, you know. The reason was that I was young
    and it was the time of depression and everything was very bad. One good thing was that they knew Japanese were good workers.
    That's why Japanese had more jobs. Other nationalities had tough time getting jobs. So that's why I had a job, even though
    it was low wages. It went up to 20¢ an hour later on. It was very cheap but what are you going to do. We had work, so
    we did well.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: I worked at farm, vineyard. In winter time we pruned and in spring we did hoeing and cultivating, and summer time,
    irrigating. All those jobs. Big ranches used to keep workers all the time. So as far as eating is concerned, we weren't
    that bad off.
- speaker: Interviewer
  text: How many brothers and sister did you have?
- speaker: Respondent
  text: I have 2 brothers and one sister. However, I have one brother and one sister in Japan also. We had to support them,
    too, not all the time but frequently. We had to send money to them.
- speaker: Interviewer
  text: People were very poor then?
- speaker: Respondent
  text: Yes, of course. Everybody was poor at that time. Only people who did well, were those big land owners. Rest of us
    were very poor. First, before 1932 they elected Roosevelt as the President. They opened up places where people lined up
    in long lines. Well, about that time Vineyard began to do well. Till then lots of grapes were left on the vine. It's no
    good for vine, you know, so we had to knock them off to the ground. When Roosevelt came into his offices grapes turned
    into money, at least a few dollars. In 1936, we began to do well, fairly well. At that time things began to get better
    gradually. He created WPA and others.
- speaker: Interviewer
  text: Do you know anyone who had hard time eating everyday?
- speaker: Respondent
  text: You mean Japanese? Yeah. Reason was that some people had little kids and no help from them. In many cases husbands
    were very old and wives were very young. So things were really tough for them.
- speaker: Interviewer
  text: How did they survive?
- speaker: Respondent
  text: Well, you know for lots of people, like one of our own family members, they couldn't buy bread for lunch. So they
    took nigiri (rice balls) to school. This family had lots of girls and no boys. You know girls needed dresses, but no dress
    for them. They didn't have shoes sometimes. It was the same way with hakujins, too. There were those who came from Dakota.
    Rich people here were okay, but poor ones came over here to California and tried to make a go of it. Those people were
    new at farming. Farming is a lot different there. But orientals knew how to do things. The only thing those hakujin had
    was pull, their relatives. Some had it okay, but many had hard time.
- speaker: Interviewer
  text: Was there any Oklahoma and Arkansas people?
- speaker: Respondent
  text: Yes, they start coming after 1932. They first came to Bakersfield and Fresno area. Then they start coming North to
    here. You heard a lot movie, "Grapes of Wrath"? story of Oklahomans? It was just like that. Today, maybe a few years ago,
    it would be Mexicans. They used to pile up in one car-- they were dirty because they couldn't take bath for so many days.
    They lived in shacks. Well, you know Japanese lived like that before 1930 who lived in hakujin farmers' bunk house which
    had no ceiling. In those days the health Dept. had nothing to do with you, you know. It had no floor, it was a dirt floor.
    Hakujin didn't want to spend too much money, they had to take care of their own house. Japanese, too, they didn't want
    to invest in houses, because as soon as they made money they were going back to Japan. That's where they made mistake,
    I think.
- speaker: Interviewer
  text: Did you say you lived in Japan for 10 years?
- speaker: Respondent
  text: No, I lived there for 8 years. My father made a huge money at one time with potato. He went back to Japan. He was
    going to stay there, but farming there was not like the farming here. Meanwhile my uncle and aunt said, "Go back to America.
    Well, take care of your kids, so send us money." So my father's folks decided me to stay there, and my other brother with
    my aunt's side. We were separated. Meanwhile immigration to America was getting tougher and tougher to go back. So they
    said, "You better call back your sons." I was 12 years old when my mother came back to get us. When I came back, I had
    a sister and a brother. My sister said, "Are you going back to Japan again?" My mother said, "No, no. He is the one came
    back with us." Our brothers and sister are all separated. It's a heck of a deal. But before you see my folks wanted to
    go back to Japan and have some kind of house and some kind of thing.
- speaker: Respondent
  text: Right after the war (1922) things were good. It was at the peak in the United States. After that it was down hill,
    till it was 1929 to 1932. It was a real depression time. He did well, in 1922, but after that he lost everything and couldn't
    farm anymore. So he worked for somebody. He was a good driver of a team of horses. In those days ranches and orchards
    around here were still using horses for cultivation, no tractors. So that's why he was hired for driving horses. He stayed
    here and couldn't go back to the Island. That's how he lost everything.
- speaker: Respondent
  text: After I came back, I had no choice. I had to work, just work and work. I was around 19 or 20 years old when a white
    man asked, "You boys are good workers. How about renting a vineyard instead of working for somebody?" That man started
    me. However, at that time I had no money to rent. So this man's company financed it for me. This company paid money for
    me to get going. It wasn't sharecropping. It was a cash crop. The company wanted grapes. That was the only reason, see.
    This company wanted grapes to sell all over the country. That's why they gave me money to grow crops. Lots of people did
    that. But also lots of people lost money this way, too. But you see, a minute the company lose money, they cut you off.
    They can't risk their money. Evidently I was really lucky, you know. So then my acreage increased. At that time when the
    war started, I owned a property in Lodi. I was 23 or 24, but I owned 150 acres and 350 acres rented. I was doing well
    with my brother. We bought a property in Acampo. The following year we made money and bought a new car. First time in
    my life I made that kind of money. So I bought a new car. I took it to Los Angeles. It was just about 10 days to 2 weeks
    before Pearl Harbor.
- speaker: Respondent
  text: I went to Terminal Island, to see a little ship. They let you go through it. There were lots of people there. They
    didn't know that there was going to be a war. They were making battleship there. In order to go to Terminal Island, you
    must take a ferry boat. There was no Disney Land or Marine Land you see, but we went through Griffith Park and Hollywood
    Bowl. Anyway we had a nice sightseeing trip, first time in my life. We came back and following Sunday about 8 o'clock
    in the morning I heard the news that Japan attacked Pearl Harbor. That's it. That was the cause for our downfall. There
    were something going on and we were scared heck, because they might attack us, you know. We had only very small amount
    of people Japanese people here. In a few days I heard that FBI's picked up so and so. There was an organization called
    Heimusha Kai. Everybody donated to it, even Nisei. I did. They had a record and everything. FBI's wanted to see that.
    You can't deny that. We didn't say we were aiding the Japanese soldiers, but we said this was the aid to soldiers' families.
    So that's why the United States Government didn't say anything about it. Japan was fighting in Manchuria at that time.
    Anyway, they had a record there. Then somebody said that all the Kibei were going to be picked up. It was just a rumor,
    see. They figured that they were from Japan so they might be disloyal to the United States. Well, all kinds of rumors
    started. But they didn't do it. I thought I was going to be picked up on the account of the Heimusha Kai, but they picked
    up only the top guys.
- speaker: Interviewer
  text: When were you married?
- speaker: Respondent
  text: In 1940. It was before we bought a car. When we went to Los Angeles, our first son was born already. That year (1941)
    was a good year for farmers. We made money. I bought my car and then the war started right away. I couldn't even sell
    my car because they froze the sale of cars. Then I had a tractor which I couldn't sell to anybody. The United States had
    what they called War Board. As soon as the war started, the local War Board controlled all the tractors and who needed
    them, you see. So I couldn't sell it to anybody. Besides, they put freeze on price, too. They were not making them anymore.
    I bought it for $2,500. The government gave me exactly what I paid for. I used it for 6 months, that tractor. They froze
    the price. My car, well, I had to sell it. But I could sell it to people with priority, farmers who need a car. It just
    so happened that my old boss had an old car and he needed a new one. So he applied for it and he got it. But I couldn't
    sell it to John or Dick or anybody else. I got a good price for it, though. I kept everything at a white man's basement.
    He kept it for me. I got everything back. When I came back from the camp, I got everything back.
- speaker: Interviewer
  text: How did you come to know each other?
- speaker: Respondent
  text: Well, we were family friends. We were from Hiroshima Ken and we associated with them. So, that's why we knew each
    other.
- speaker: Interviewer
  text: Did you date with her?
- speaker: Respondent
  text: Before we got married? Oh, yeah, we got to get to know you know. By the time you dated her, you knew you would be
    married sooner. Oh, yeah. That's why we went out. In those days you don't go out with anybody. Yes, but we did go out
    together before we were engaged. Yes, but in group, though, with two or three boys with two or three girls. We went to
    show or something. But not just two of us together.
- speaker: Interviewer
  text: Who did make the decision that you should be married?
- speaker: Respondent
  text: My family. I had my mother and a brother. Three of us talked over and decided on it. In those days you almost had
    to marry people from the same Ken. It was really hard to get marry in those days. Both had to be sort of the same kind
    of family, also. Our families came from the same area, so they can check each other's family background, if they wanted
    to. It's very interesting though in those days. In any case war got started.
- speaker: Interviewer
  text: Before you go to another area, I would like you to tell me about sumo wrestling.
- speaker: Respondent
  text: You mean when I was young? It happened around 1934, maybe it was 1926. I was around 20 years old. In those days we
    had sumo team in all the areas, Lodi, Stockton, Sacramento, Vacaville, Isleton and others. They were sponsored by Seinen
    Kai. Sumo was pretty popular in those days. So every 4th of July Sacramento sponsored a tournament. Lodi sponsored it
    around vegetable time, because we had money during that time. Vacaville sponsored it during fruit time, because they had
    money during that time. Then you must go. If you don't send your team, they wouldn't come to ours. So we belonged to a
    league and got a trophy. In those days Issei sure liked sumo. Honest! It was really popular. Parents were really crazy
    about it. That's the truth. That's why everything went good. Everybody joined in and helped. It was true with baseball
    also. The baseball in Lodi is shut today. No one is interested in it. You can see major league on TV, so they aren't interested
    in our own. Before we didn't have TV, local teams were very popular. We used to go to Vacaville, Isleton on Sundays. So
    we used to have big games. Sumo was the same way. We also had an annual tournament in San Francisco at Kin Mon Gakuen.
    We used to send 5 regulars from each district to this big event. Before they came up to this big event, each local district
    had their own tournament to select local representatives. They also gave ranks. If you knocked off 5 or 6 others, then
    you would become a blackbelt. When you knocked off 4 or 5 blackbelt, then you would become 2 dan. You could advance only
    at those big events. So they had this annual tournament. It was pretty popular. It lasted from early in the morning to
    late in the afternoon, till about 9:00pm.
