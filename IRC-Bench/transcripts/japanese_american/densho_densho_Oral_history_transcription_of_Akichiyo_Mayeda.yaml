collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Your name is Akichiyo Mayeda. Where did the name Akichiyo come from?
- speaker: Respondent
  text: My father liked to read books. My older sister died at her birth, then I was born. He wanted me to live for a long
    time so he named me Akichiyo. Aki (autumn) and Chiyo meaning a thousand years. In those days such long names were popular.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: In 1902 on February 1.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Wakayama Prefecture.
- speaker: Interviewer
  text: Was it a fishing village?
- speaker: Respondent
  text: No it was farming village. We were near Koyasan.
- speaker: Interviewer
  text: You told me the other day that people from fishing villages are rough.
- speaker: Respondent
  text: Yes, their speech is rough, and they are hot tempered, so people are afraid to hire them.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: My father owned a weaving factory. When I grew up he quit as my mother did not like it, and became a farmer.
- speaker: Interviewer
  text: About how many people worked in the factory?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: Was it a big factory?
- speaker: Respondent
  text: There were a few sheds where they worked. We hired people to make the basic weave. Then we take them to different
    weavers and have them weaved. I was the only girl among four brothers so I was spoilt. My mother used to say that the
    boys are all quiet and mind her, but I am spoilt and don't mind her. I came here in January 1920.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: My father was a teacher of a temple school long time ago. Then he went into business when we were growing up. In those
    days many people did not know how to read or write, so they gathered them in the temple and taught them. My father was
    a teacher of the temple school, so there were hakama (pleated skirt) that teachers wore in our house when I was little.
- speaker: Interviewer
  text: Was your father a strict man?
- speaker: Respondent
  text: No, he was not strict. My grandmother didn't have a daughter so she loved me, and did not let my parents scold me.
    That is why I was spoilt. My parents were worried about me as I was too spoilt.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: There was no school when she was little, so she just learned sewing before she married my father. When she got married,
    my father was doing the business, but my mother didn't know how to sew the skeins. As she was born and raised as a farmer's
    daughter she did not know such thing. Her father died when she was 14 years old, and her mother had to raise four daughters.
- speaker: Interviewer
  text: What about your schooling?
- speaker: Respondent
  text: I graduated from junior high school. My father said, "This girl is spoilt and not bright, so there is no use sending
    her to a high school. She seems to be good at sewing, so I will let her become a sewing teacher." After I graduated from
    the junior high school I studied sewing.
- speaker: Interviewer
  text: Was the grade school 6 years?
- speaker: Respondent
  text: It was compulsory for 6 years, then junior high was 2 years.
- speaker: Interviewer
  text: Do you remember about your schooldays?
- speaker: Respondent
  text: I don't remember well.
- speaker: Interviewer
  text: What was most interesting?
- speaker: Respondent
  text: Playing with friends. I did not have a sister, so I liked to bring girls from neighborhood and play. When my relations
    visited, they used to bring me beautiful material to make obi. I brought little girls home and made aprons and obi for
    them. My parents were surprised and said I was a fool.
- speaker: Interviewer
  text: Did you sew since you were young?
- speaker: Respondent
  text: I was studying to be a sewing teacher. Around that time my husband went to Japan to take a wife. My husband's father
    came to America when my husband was 2 years old, so my father helped him when he was little. My father liked him as he
    was gentle, so he made me marry him.
- speaker: Interviewer
  text: Were you 18 then?
- speaker: Respondent
  text: I was 17 years and 2 months old. I was still a child going to school. I did not want to come to America, but my parents
    decided on our marriage without asking me. We were related. My parents decided, and I was sent to America.
- speaker: Interviewer
  text: Did your parents know your husband's parents?
- speaker: Respondent
  text: Yes, they knew each other.
- speaker: Interviewer
  text: How old was your husband when he came to America?
- speaker: Respondent
  text: I don't know how old he was, but he was young. There were two children; my husband was two years old, and his sister
    was four. My husband's father came to America leaving 2 children home.
- speaker: Interviewer
  text: Did you have a wedding in Japan?
- speaker: Respondent
  text: Yes, we were married in Japan, and then came here.
- speaker: Interviewer
  text: How did you feel when your parents told you to marry this man?
- speaker: Respondent
  text: In those days it was popular among young girls to come to America as picture brides. I didn't know America, but I
    used to see the pictures of America through the viewers. The houses were all nice brick houses, so I thought all the houses
    were made of bricks. I was surprised when I came to America. When we arrived in San Francisco my father-in-law brought
    me a suitcase full of clothes, and my husband and his father dressed me. They put me in a corset which was much longer
    than the modern ones. I thought it was very uncomfortable. Then they put a dress on me. After that they took me to stores
    to buy a hat and shoes. When we went to the hat store, a salesgirl was laughing at me. I found out that I had my skirt
    on backward, so they fixed it for me. Then they brought me to Sacramento.
- speaker: Interviewer
  text: How long did you stay in Japan after the wedding?
- speaker: Respondent
  text: At that time there was a regulation that a man who came back to Japan to take a wife could stay there only 20 days.
    That is why we got married as soon as the arrangement was made, and left there 4 or 5 days after the wedding.
- speaker: Interviewer
  text: Did you want to come to America?
- speaker: Respondent
  text: I wanted to come to America because I heard that women do not have to do anything but to sit on chairs and watch men
    work. It was altogether different when I came here, and I had a hard time.
- speaker: Interviewer
  text: You left Japan 4 days later. What year was that?
- speaker: Respondent
  text: It was 1920. We saw the New Year (1920) on the ship. We landed in January of 1920.
- speaker: Interviewer
  text: How was it when you left Japan?
- speaker: Respondent
  text: It was good as all my friends saw us off. In those days when someone was going abroad, the whole village saw her off
    at the station and shouted "Banzai."
- speaker: Interviewer
  text: Weren't you lonesome?
- speaker: Respondent
  text: I didn't feel lonesome because I thought America was a nice place after seeing the pictures of beautiful brick houses.
    I was a child so I didn't have any ideas. When I came here I was surprised. We came from San Francisco to Sacramento,
    and then took a taxi from Sacramento to our house. My husband was growing strawberry near Perking. There were 40 to 50
    Japanese farmers around there all growing strawberry. Our house was a black house which was like a hog pen. When the taxi
    turned from a big road to a small street I saw a pretty house painted white with a red painted roof. I thought it was
    our house, but the taxi went past it and stopped in front of the little black house. I stayed in the taxi wondering if
    that was a house for people to live in. Then my husband came and told me to get off. When I got off of the taxi many neighbors
    came out to see me saying, "The bride is here."
- speaker: Interviewer
  text: Did you live in that house with your husband and his parents?
- speaker: Respondent
  text: Yes, my husband and his parents; four of us lived there. In those days there were only 2 or 3 families out of about
    50 Japanese families who had in-laws living with them. Most of them were just couples who were living free from cares.
    A spoilt girl like me had to live with in-laws. My father-in-law was a very stubborn and bossy man, so I had a hard time.
    I had every day a headache all the time, and wanted to commit suicide. I asked my husband to send me back to Japan as
    I could not live in such a place, but my husband told me to be patient. There was nothing else to do but to die, so for
    3 years I tried to find a way to commit suicide. In those days farmers used to draw water from a pit which was about 20
    to 30 feet deep by motor. I don't know how many times I stood by the pit to jump inside, but as there was a motor in it
    I might be injured instead of dying, so I decided not to jump in. Then I thought about getting run over by a train, so
    I watched the trains go by. About 2 years after I came here, I walked through the hay which was almost as tall as I was
    to get to the train track. I thought nobody saw me, but when I almost reached the train track my husband saw me and came
    after me on a bicycle. He caught me and brought me home. Three years after I got there, a prosperous time came after the
    World War I and my father-in-law made some profit. My mother-in-law who was a sensible woman thought if her husband stayed
    there he would make young couple's life miserable, so she took him to Japan. After that everything was all right.
- speaker: Interviewer
  text: In what way did he give you a hard time?
- speaker: Respondent
  text: In many ways. I arrived here in January. From around March he hired a few people and started hoeing. Around May the
    strawberries started coming out. I had to work the same as men. I was still a child, and there wasn't anybody to talk
    to, so I talked to some hired help. He scolded me saying that I bother other people's work, so if I want to play, go somewhere
    else and play. He was a boss so he did not work, but he scolded me for talking to the hired help.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: We were growing strawberry, so we started hoeing from March. I had to do the same kind of work as men. When 11 o'clock
    came I had to take an hour off and come home to cook. In those days there was no gas like today, so I had to make fire
    in the furnace by burning rice. It was a home-made furnace so it smoked a lot. I had to boil water, cook rice and side-dish
    for 10 people in one hour so I was busy as I was not used to it. I cooked with tears, sweat and black face. I did it for
    3 years during the busy season in the months of May. By the first part of June we harvested the first crop. Then we let
    the hired helps go, and just the members of the family picked strawberries which came out little at a time, and sold them.
    In those days everybody around there lived like that.
- speaker: Interviewer
  text: You were talking about the noodle the other day. Will you tell me about it again.
- speaker: Respondent
  text: It was a hot day in May so my mother-in-law told me to cook some noodle. I forgot to ask her anything as she was not
    near me. I just said "o.k." and ran to the house. My father-in-law scolded me because I looked like a child running in
    a short dress. I came home to cook the noodle, but I didn't know how much to cook. The farmers in the country buy noodle
    by boxes, so we had a lot. There were ten people, so I thought if I cook 20 bundles, each person can eat 2 bundles so
    it should be enough. When I started the noodle cooking burned on the bottom no matter how much water I added. I took the
    burnt noodle out and put it in the bucket and added some more water until the bucket was filled with burnt noodle. I was
    afraid my father-in-law would scold me, so I decided to feed the noodle to the chicken. I ran to the chicken yard before
    anybody came home, and dumped the noodle in the yard. The chicken flapped their wings in joy and made a big noise. My
    father-in-law happened to be taking a break behind the chicken yard, and when he heard the noise he stood up to see what
    was going on. I was never so surprised in my life than that time. He looked angrily at me but didn't say a word. I would
    have felt better if he said, "Did you burn the noodle?". I felt real bad. I took just the good part of the noodle and
    served it. I also cooked some rice for people who didn't like noodle. The hired hands all ate just the rice saying, "We
    want to eat the noodle, because if we don't, the young bride will be scolded by Grandpa, but we cannot eat it as it smells
    burnt." My father-in-law was an old-fashioned bossy old man. He did not have a watch, so I was afraid sometime he forget
    the time and I don't have enough time to cook. One time I started to come home without telling him. I was only about 5
    minutes early, but he scolded me saying, "It's too early yet!" As I was spoilt, I had a hard time and had a headache every
    day. I thought about dying for 3 years. It was good that he went back to Japan, or I would have killed myself by getting
    run over by a train.
- speaker: Interviewer
  text: Did you write about those things to Japan?
- speaker: Respondent
  text: For about half a year after I came here I used to write letters once in a while. Somebody who lived near our house
    went back to Japan and saw my parents, who told him that they received letters from me saying that I was lonesome. This
    person told it to my in-laws after he came back to America. I was scolded and was forbidden to write letters to Japan.
    If I wanted to send letters to Japan, I had to have it censored, so I did not write any more letters as it was too much
    trouble. Old people were stubborn so I had a hard time. Other people may have been poor, but they just had worry about
    making a living, and if they worked they could manage to live, but they didn't have worry about being bullied. It was
    my fault too, as I did not have good sense.
- speaker: Interviewer
  text: It was a spiritual hardship, but did you have any physical hardship?
- speaker: Respondent
  text: After we harvested the strawberry the work was not too hard as we did not have hired hands. At grape harvest time
    I used to go to work at Mr. Umeda's who used to live near our house in Japan. I was glad to get out and worked for about
    2 months as I didn't have to see my father-in-law. It was like going on a vacation, and I felt cheerful. Mr. Umeda told
    jokes. Women cleaned the grapes on the table in the barns and men brought the grapes from the orchard. I liked to work
    with many people because it was pleasant. I didn't want to stay home, but I had to bear it with tears. In those days many
    people had hardship, but not many people knew the hardship with in-laws. My father-in-law was especially hard to please,
    and I was not smart enough to know how to please him, so I was always scolded.
- speaker: Interviewer
  text: How old was your father-in-law?
- speaker: Respondent
  text: He was still young. My mother-in-law was 50 years old, and he was 6 years older than she was, so he was 56 years old.
    Nowadays that age is still considered young, but he used to say, "If an old man like me can do this, it is not hard for
    young people like you."
- speaker: Interviewer
  text: Did you try to get run over by a train once?
- speaker: Respondent
  text: I thought no one was watching me when I almost reached the railroad track, but my husband must have seen my head over
    the hay.
