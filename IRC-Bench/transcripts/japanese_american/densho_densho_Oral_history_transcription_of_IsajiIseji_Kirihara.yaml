collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I thought I could make money in America, so I decided to come to America and make money.
- speaker: Interviewer
  text: Did you know anybody in America?
- speaker: Respondent
  text: No, my friend said he would go to America with me, so we came here together.
- speaker: Interviewer
  text: Why did you choose America?
- speaker: Respondent
  text: I read about Lincoln, and I thought as America was a country of freedom I wanted to come to America.
- speaker: Interviewer
  text: Didn't you have any relatives here?
- speaker: Interviewer
  text: How did you make arrangements to come here?
- speaker: Respondent
  text: They didn't want me to stay home either, so my father gave me permission.
- speaker: Interviewer
  text: Before you came here what kind of a country was America?
- speaker: Respondent
  text: I thought America was a rich and free country.
- speaker: Interviewer
  text: Did you leave Japan when you were 20 years old?
- speaker: Interviewer
  text: Where did you leave from?
- speaker: Respondent
  text: From Yokohama.
- speaker: Interviewer
  text: Did you stop over in Hawaii?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What kind of thing do you remember about the voyage?
- speaker: Respondent
  text: We didn't have much to do on board the ship.
- speaker: Interviewer
  text: Did you make friends?
- speaker: Respondent
  text: I made a few friends but I never became too intimate with anyone.
- speaker: Interviewer
  text: Did many Japanese come to America in those days?
- speaker: Respondent
  text: Yes, many Japanese came here.
- speaker: Interviewer
  text: Did you come here in 1902?
- speaker: Interviewer
  text: Where did you land?
- speaker: Respondent
  text: I landed in San Francisco. From there I went to Alaska as Oisoya Hotel found a job for me there.
- speaker: Interviewer
  text: Was there a strict inspection when you landed?
- speaker: Respondent
  text: Yes, there was.
- speaker: Interviewer
  text: Was there a physical examination?
- speaker: Respondent
  text: Yes, there was.
- speaker: Interviewer
  text: Did you come here as an immigrant?
- speaker: Interviewer
  text: Could you land here without knowing anybody here?
- speaker: Respondent
  text: I told them that I knew somebody here.
- speaker: Interviewer
  text: How long did you stay in San Francisco?
- speaker: Respondent
  text: Just a few days, and then I went to Alaska.
- speaker: Interviewer
  text: How did you feel when you landed at San Francisco?
- speaker: Respondent
  text: Everything looked different from Japan.
- speaker: Interviewer
  text: What did you do in Alaska?
- speaker: Respondent
  text: I worked in a salmon cannery.
- speaker: Interviewer
  text: Was the work very hard?
- speaker: Respondent
  text: I did not think it was hard. The work was to put salmon in cans.
- speaker: Interviewer
  text: Were many Japanese working there?
- speaker: Respondent
  text: Yes, many Japanese were working there. We worked under Chinese contractors. Chinese contractors hired Japanese and
    took them to Alaska. After many years Japanese recruited people to go to Alaska.
- speaker: Interviewer
  text: How long did you stay in Alaska?
- speaker: Respondent
  text: About 6 months.
- speaker: Interviewer
  text: Did you work during the summer?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Do you recall anything about Alaska?
- speaker: Respondent
  text: Someone died in Alaska, so we gathered and held a memorial service.
- speaker: Interviewer
  text: Weren't you a Christian then?
- speaker: Respondent
  text: No, I wasn't.
- speaker: Interviewer
  text: I don't know many Isseis who went to Alaska, but were there many Isseis in Alaska then?
- speaker: Respondent
  text: Yes, there were quite a few. They were all young men who went there to make money, so they gambled at night.
- speaker: Interviewer
  text: Did they gamble among themselves, or did they go to gambling houses?
- speaker: Respondent
  text: They gambled among themselves, so they had fights too.
- speaker: Interviewer
  text: Were there people who lost a lot of money?
- speaker: Respondent
  text: In those days we went to Alaska with a contract of $140 for a trip. We received $40 in advance to get ready, and received
    $100 when we came back. They did not have much money so they could not bet too much, but they played hanafuda (Japanese
    playing cards) every night, and ended in fights.
- speaker: Interviewer
  text: Wasn't $100 a lot of money in those days?
- speaker: Respondent
  text: Yes, it was a lot of money.
- speaker: Interviewer
  text: How much did one meal cost in those days?
- speaker: Respondent
  text: There was a 10¢ meal in San Francisco. If we paid 15¢ we could eat a good meal and satisfied young people. We could
    even have a meal for 5¢.
- speaker: Interviewer
  text: About how much did they charge at a boarding house?
- speaker: Respondent
  text: I don't remember, but it was not much.
- speaker: Interviewer
  text: Was it about 50¢ a night?
- speaker: Respondent
  text: I think it was around 50¢ a night because we did not make much money.
- speaker: Interviewer
  text: Do you have any recollection of Alaska?
- speaker: Respondent
  text: I don't remember anything special.
- speaker: Interviewer
  text: About what time did you start working in the morning?
- speaker: Respondent
  text: We did not start working too early in the morning, but as the sun was up till around 8 o'clock, we worked late at
    night.
- speaker: Interviewer
  text: Was it a work that required strength?
- speaker: Respondent
  text: No, it wasn't. It was odd jobs such as moving cans from here and there.
- speaker: Interviewer
  text: Did you have any experience with fish before?
- speaker: Interviewer
  text: Was it the first time?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Did you learn it right away?
- speaker: Respondent
  text: Yes, they had various odd jobs, and there was no definite job.
- speaker: Interviewer
  text: Whereabouts in Alaska was the cannery?
- speaker: Respondent
  text: I think it was at a place called Naknek.
- speaker: Interviewer
  text: Did you go to any other place in Alaska?
- speaker: Respondent
  text: No, I stayed at one place from the beginning.
- speaker: Interviewer
  text: What did you do over the weekends when you didn't have to work?
- speaker: Respondent
  text: I went fishing or walked around.
- speaker: Interviewer
  text: Was there a Japanese town?
- speaker: Respondent
  text: No, there wasn't. I heard that people went to Juneau which was a big city, but we did not go there from our place.
- speaker: Interviewer
  text: Did they bring you back by a ship when the work was finished?
- speaker: Respondent
  text: They brought us back to San Francisco by a ship.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: It was the first part of November and there was no farm work.
- speaker: Interviewer
  text: Where did you go from San Francisco?
- speaker: Respondent
  text: I went to San Jose, and stayed there for a while and planted onions. After that I dug up grapes and planted prunes.
    There was a Japanese boss on the Westside of San Jose. He gathered many Japanese men, and when some farmers wanted some
    help he took the men over there.
- speaker: Interviewer
  text: About how many people were there?
- speaker: Respondent
  text: I think there were 14 or 15 people there.
- speaker: Interviewer
  text: How long did you stay there?
- speaker: Respondent
  text: I think I stayed there 2 or 3 years and went here and there. Then I decided to do some housework, so I went to town.
- speaker: Interviewer
  text: Which town did you go to?
- speaker: Interviewer
  text: Did you find a job there?
- speaker: Respondent
  text: There was an employment agency, so I went there and got a job as a dayworker. After I saved some money I started a
    cleaning business.
- speaker: Interviewer
  text: Where was that?
- speaker: Respondent
  text: In Oakland.
- speaker: Interviewer
  text: Did you start the business alone?
- speaker: Respondent
  text: Yes, by myself.
- speaker: Interviewer
  text: Did you make money?
- speaker: Respondent
  text: I think I made some money.
- speaker: Interviewer
  text: About how many years did you do that?
- speaker: Respondent
  text: I think I did that for about 3 years. After I made some money I went to Japan to bring my wife here.
- speaker: Interviewer
  text: Who found your wife for you?
- speaker: Respondent
  text: After I went back to Japan I visited my relative and told him that I wanted a wife to take back to America. He told
    me that there was a girl at such and such place, so I went to see her.
- speaker: Respondent
  text: Japanese people are fast. If parents tell you to marry someone you obey them.
- speaker: Interviewer
  text: Did you come back here with your wife that year?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: I think it was 1913.
- speaker: Interviewer
  text: Where were you at the time of the great earthquake?
- speaker: Respondent
  text: I was in San Francisco.
- speaker: Interviewer
  text: Were you scared then?
- speaker: Respondent
  text: Yes, but I was single then and was living with a man from Yamanashi Prefecture. When the earthquake shook the house,
    we hid under a bed. A man came back from downtown and told us that there was great confusion downtown. The stores threw
    out merchandise and told him to take them, so he brought home a whole bunch of things. He was a dishwasher, so we went
    out and ate at the restaurant where he worked.
- speaker: Interviewer
  text: Where did you live in San Francisco?
- speaker: Respondent
  text: I think I lived on Eddy Street. It was near the Golden Gate Park.
- speaker: Interviewer
  text: Wasn't there a fire around there?
- speaker: Respondent
  text: Yes, there was. We were far away from the fire so we were not burned, but we went to see the fire. Market Street was
    crowded with cars hauling wounded people.
- speaker: Interviewer
  text: Didn't you get any damage then?
- speaker: Respondent
  text: We had our belongings in one kori (wicker suitcase) so we could move around. A man from Yamanashi Prefecture had an
    art object store, so we went to help him carry merchandise out. Once we left home we could not go back home, so we slept
    in a park. The Red Cross or some kind of organization distributed bread and other food, so we ate them.
- speaker: Interviewer
  text: About how much money did you spend when you went home to take a wife and came back here?
- speaker: Respondent
  text: I think I spent about $300. There was a Japanese laundry near my place. A couple from Yamanashi Prefecture worked
    there. They had a baby, but they could not work with the baby, so they wanted me to take the baby to Japan to have the
    grandmother take care of the baby. They paid the passage which was around $70, so it did not cost me too much for the
    trip. I think I spent about $300.
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I was 31 or 32 years old.
- speaker: Interviewer
  text: How old was Mrs. Kirihara?
- speaker: Respondent
  text: She was 19 years old.
- speaker: Interviewer
  text: Did you sell your laundry when you went back to Japan?
- speaker: Respondent
  text: No, a friend of mine, Mr. Okubo who was in Oakland took care of my business, so I went back to my job when I came
    back to America.
- speaker: Interviewer
  text: How long did you stay in Oakland?
- speaker: Respondent
  text: I stayed there till I moved here in 1919.
- speaker: Interviewer
  text: Were you in cleaning business until then?
- speaker: Respondent
  text: Yes, I was. After I quit the business I worked as a dayworker.
- speaker: Interviewer
  text: Why did you quit the business?
- speaker: Respondent
  text: I did not make much profit from the cleaning business.
- speaker: Interviewer
  text: What kind of daywork did you do?
- speaker: Respondent
  text: Such as cleaning houses, washing and ironing clothes.
- speaker: Interviewer
  text: Did you make more money doing that?
- speaker: Respondent
  text: Of course, I made more money that way.
- speaker: Interviewer
  text: What did you do with the machinery used for laundry business?
- speaker: Respondent
  text: I sold them to other people. A good friend of mine, Mr. Hoshiyama was in Livingston, and asked me to come to the country.
    I said I was not good at farming, but he told me not to worry and come to the country as it is a better place to raise
    children. I came here following his advice.
- speaker: Interviewer
  text: Did you know Mr. Kyutaro Abiko?
- speaker: Respondent
  text: Yes, I did. Mr. Hoshiyama was from Niigata Prefecture, and Mr. Abiko also was from the same prefecture. There was
    a man named Mr. Tanji working for the Nichi-Bei newspaper. He bought land in Livingston, so Mr. Hoshiyama bought land
    here, too, with his help.
- speaker: Interviewer
  text: Did you buy land here because of that reason?
- speaker: Respondent
  text: Yes, but I did not have money, so I bought it by yearly installments.
- speaker: Interviewer
  text: How many acres did you buy?
- speaker: Respondent
  text: I did not buy this land at first. I bought 20 acres which my brother James has now. Mr. Kashiwase next door had 40
    acres. Mr. Shimanouchi of the Nichi-Bei Times bought 20 acres of Mr. Kashiwase's land, and I bought the remaining 20 acres.
- speaker: Interviewer
  text: Do you know Mrs. Hayashi well?
- speaker: Respondent
  text: Yes, but I did not know her at first. She was the wife of Mr. Giichi Minejima, the first village master of Livingston.
    The Minejimas used to live here, and the Hoshiyamas lived behind here.
- speaker: Interviewer
  text: You came here in 1919, did you not?
- speaker: Respondent
  text: Yes, we did.
- speaker: Interviewer
  text: What year was this village started?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: Did you come here about the same time as the Okuyes?
- speaker: Respondent
  text: They came here before we did. In those days Livingston and Loomis were the only two Japanese colonies. Japanese used
    to go to places where there were work carrying blankets on their backs, and when the work was finished they moved to other
    places. Thinking that Japanese will never advance in that way Mr. Abiko bought land to let Japanese live there and built
    a Japanese colony. Mr. Okuye came from Japan on inspection tour and liked it here, so he settled here. He brought money
    from Japan and bought land here. He said that Livingston is a great place as people grow grapes but do not sell them for
    wine. There was Mr. Naka who grew figs. Mr. Okuye held home meetings and led newcomers from Japan to Christianity.
- speaker: Interviewer
  text: Was this place developed when you came here?
- speaker: Respondent
  text: It was not developed yet. When we walked on the road a cloud of dust rose. Even when we went to the neighbors we got
    lost. Sometimes chickens were buried under the sand.
- speaker: Interviewer
  text: Was it windy?
- speaker: Respondent
  text: It was very windy, and the dust storm blew for about 3 days. There was no irrigation in those days.
- speaker: Interviewer
  text: You couldn't work when the strong wind blew, couldn't you?
- speaker: Respondent
  text: We couldn't work, and couldn't even cook rice. The house was made of thin boards, so sand came in the house, and the
    house was full of sand.
- speaker: Interviewer
  text: Was it hot?
- speaker: Respondent
  text: It was hot but there was no cooling system like now. The only place to cool off was under the trees.
- speaker: Interviewer
  text: What other hardships did you have when you first came here?
- speaker: Respondent
  text: We did not have money so we had to borrow money. If we had income of $2,000 from 20 acres we could make ends meet.
    But there was war and the Depression, so we could not even buy rice. The bank would lend money to corporations but not
    to individuals, so people asked the corporations to buy rice for them. In those days Japanese could live if they had rice,
    shoyu and miso.
- speaker: Interviewer
  text: What were you growing then?
- speaker: Respondent
  text: Mostly grapes. At present I don't hardly grow any grapes. I have changed to almonds and peaches.
- speaker: Interviewer
  text: What kind of difficulties did you have in growing grapes?
- speaker: Respondent
  text: When we planted grapes we had to make markings. Some people unraveled sacks and made ropes which they used for markings.
    However, when it was hot the rope would stretch and made the lines crooked. We used such a silly method. Nowadays we do
    not do such things as making rope out of sacks for markings.
- speaker: Interviewer
  text: Were they gunny sacks?
- speaker: Respondent
  text: Yes. Now we use wire with lead on the end, so they do not come out.
- speaker: Interviewer
  text: Were there rabbits around here?
- speaker: Respondent
  text: When we caught them, we made a feast out of them.
- speaker: Interviewer
  text: Were there many rabbits around here?
- speaker: Respondent
  text: Nowadays we do not see many of them. Nobody eats them now, but in those days friends brought hare when they caught
    them.
- speaker: Interviewer
  text: Were they jack rabbits?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Was your crops ever been damaged by rabbits?
- speaker: Respondent
  text: Yes, as there was no other food.
- speaker: Interviewer
  text: Did you have difficulties during the Depression?
- speaker: Respondent
  text: Yes, we did.
- speaker: Interviewer
  text: How did you tide over the Depression?
- speaker: Respondent
  text: We could not pay the water bill as usual, so we made a 10-year plan. We also asked the mortgage company to postpone
    the payment of the land as much as they could.
- speaker: Interviewer
  text: Did you have enough to live on?
- speaker: Respondent
  text: No, we didn't.
- speaker: Interviewer
  text: Were there any Japanese around here who did not have enough to live on?
- speaker: Respondent
  text: Everyone managed somehow. Not like now, people were friendly to each other, and used to get together and talked. If
    someone needed something we shared. Nowadays people are not needy, so they don't care about other people.
- speaker: Interviewer
  text: Could you sell grapes then?
- speaker: Respondent
  text: No, we couldn't, so we took grapes to Lodi and sold them for $2.50 a ton.
- speaker: Interviewer
  text: About how much do they usually cost?
- speaker: Respondent
  text: About $30 to $40 a ton. It is over $100 a ton now.
- speaker: Interviewer
  text: Did you still sell them?
- speaker: Respondent
  text: We did not have any other income, so we had to sell them.
- speaker: Respondent
  text: A man named Mombock took care of all the land owned by Japanese around here. When we left here we were not sure if
    we could come back here or not. However, things got better because of the war, and people who had land made much money
    as they could sell their crops with good price. Those who lived here had to return the land to Japanese when we came back,
    so they tried not to return the land. Some Japanese who came back here early were threatened by being shot at.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I thought Japanese started a grave thing.
- speaker: Interviewer
  text: Did you think danger might come to you?
- speaker: Respondent
  text: 'I didn''t think so but after the Pearl Harbor attack, the white people passed by shouting in loud voice: "Japan have
    attacked Pearl Harbor."'
- speaker: Interviewer
  text: Have you ever been given a hard time by the white people before then?
- speaker: Respondent
  text: No, I never had such experience here.
- speaker: Interviewer
  text: Were you given a hard time anywhere else?
- speaker: Respondent
  text: Yes, when I was...
