collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Do you, Grandma or Auntie Michi, do you remember anything about the 20s? You know the quote, "the way we think of
    the 20's right now," little flappers and things like that? Do you remember?
- speaker: Respondent
  text: We used to have dresses like that - the 1920s style dresses.
- speaker: Interviewer
  text: Yes, they were only eight and ten. We were always dressed alike until we went to high school.
- speaker: Respondent
  text: Oh really? Wow and what do you remember?
- speaker: Respondent
  text: In high school we had to dress alike because it was uniform.
- speaker: Interviewer
  text: You guys were in some movies.
- speaker: Respondent
  text: Oh yeah. My dad, I told you, was a jack of all trades. He was also an actor so he appeared in many of the Sessue Hayakawa
    pictures. Sessue Hayakawa was a well-known Japanese actor in Hollywood in those days, and so we would appear as kids.
    In one film I appeared as a boy and went to Big Bear Lake for location.
- speaker: Interviewer
  text: And would you guys talk in them? Or were they silent?
- speaker: Respondent
  text: Silent picture in those days and then when Sessue Hayakawa picture appears on the theater, we had to go to - dance
    or whatever up here on stage.
- speaker: Interviewer
  text: What do you guys remember about the '50s or '60s?
- speaker: Respondent
  text: Your auntie making those huge mohair dice.
- speaker: Respondent
  text: Angora dice to hang on the windshield - fluffy, knitting.
- speaker: Respondent
  text: They were like 25 cents a ball. Ten grams of angora.
- speaker: Interviewer
  text: Twenty-five cents? And was the Super Yarn Mart as fun as it was when we were little?
- speaker: Respondent
  text: No, we worked a lot harder.
- speaker: Respondent
  text: We used to work when we went.
- speaker: Respondent
  text: Well we didn't -
- speaker: Respondent
  text: Dessa went to work too. And Dessa worked at Bullocks' too, stock girl.
- speaker: Interviewer
  text: And what about the '60s? JFK?
- speaker: Respondent
  text: Vietnam War. We used to have bumper stickers on our car, "Make Love Not War."
- speaker: Interviewer
  text: You did? On the Barracuda? Did I tell you I went to the airport in a Barracuda? When Andy and I went to the airport?
    My little brother Dave he has a Barracuda.
- speaker: Respondent
  text: Your sorority?
- speaker: Interviewer
  text: No, Andy's fraternity brother, but I was a little sister. He was my little brother and he has a Barracuda. The gas
    tank doesn't work, the speedometer doesn't work, nothing works, but he loves it. He loves it so much, he thinks it is
    the greatest thing. I go, "Do you ever run out of gas and he says, "Yeah, all the time, you know, I run out of gas all
    the time," but he loves that car and it's so old, it's so neat. I said my mom had a Barracuda too, cause my dad used to
    drive around in it.
- speaker: Respondent
  text: I told him, your mom got the car, Auntie didn't get the car. Don't feel bad.
- speaker: Interviewer
  text: But I paid for half.
- speaker: Respondent
  text: I paid for the whole thing sweetheart.
- speaker: Interviewer
  text: But Dad said that he used to - you'd let him use the car, and then all of his fraternity brothers would be like, "Oh!
    You got the 'Cuda!" They would all drive around in it. Over and over. He never told me that.
- speaker: Respondent
  text: Sorry. Sounds like fun.
- speaker: Interviewer
  text: It won't be the first thing he didn't tell me.
- speaker: Interviewer
  text: Do you want to go to bed Grandma? Are you getting tired?
- speaker: Interviewer
  text: Sorry. So you weren't a hippie?
- speaker: Respondent
  text: Yeah, she's getting around pretty good.
- speaker: Interviewer
  text: She's pretty fast.
- speaker: Interviewer
  text: I remember being in Dessa's wedding. Remember getting fitted, going to that place over and over. Trying to get in
    the dress.
- speaker: Interviewer
  text: I remember. How old was I then?
- speaker: Interviewer
  text: Jefferey was three.
- speaker: Respondent
  text: 1971, four.
- speaker: Interviewer
  text: So I was four. I remember the wedding. I still have that dress.
- speaker: Interviewer
  text: Pretty in Japanese.
- speaker: Interviewer
  text: I thought that was the most beautiful dress.
- speaker: Respondent
  text: Yeah, that was nice.
- speaker: Interviewer
  text: Oh, that was so cute.
- speaker: Respondent
  text: That's one of the things I have in my house. I just saw it the other day.
- speaker: Interviewer
  text: No, I knew you had the dress. I was just going to say. I have a bunch of stuff over there. I remember kinda a lot.
    I mean. It doesn't seem like it. It's all kinda blurry.
- speaker: Interviewer
  text: Yeah. I remember when we moved, I should tell my mom this but when we moved from here and my mom was saying, "Say
    goodbye to Kachan, you're not going to live next door to her anymore," you know and -
- speaker: Respondent
  text: Do you remember me riding up with you and Brownie.
- speaker: Interviewer
  text: You know what I remember? I remember riding up and we stayed in a hotel along the way and I remember you were the
    last one to fall asleep and I was falling asleep and all I could see was your cigarette glowing - and I was getting so
    worried like, oh no, what if, you know, it burns a hole? I was so worried.
- speaker: Respondent
  text: Oh gosh, here we drive up in Fumi's little Datsun with that Siamese cat. I'm telling you for 400 miles that cat was
    going, "roar."
- speaker: Interviewer
  text: He was the worst.
- speaker: Respondent
  text: All the way up.
- speaker: Interviewer
  text: Oh, I remember when Riggy took the kitty, MiMi, that was traumatic.
- speaker: Respondent
  text: Take up some short course to get a job. So I could get some money to go to school.
- speaker: Respondent
  text: In 1917 or 1918.
- speaker: Interviewer
  text: 1918, somewhere around there.
- speaker: Respondent
  text: Because your uncle had just lost his money.
- speaker: Respondent
  text: He went to Tulsa. So I went to an automobile school. National Automobile School. So I graduated from the school. Then
    I looked for mechanical work. In the garages. Very greasy and dirty. I didn't want to go into that job because I'm not
    presentable. Always greasy. I gave up my mechanical work. I got to finish the school, but I didn't keep it up. I couldn't
    get enough money. So the only thing to do is to follow uncle to Oklahoma. There's no other way of me making a living to
    go to school. So I followed him to Tulsa - no I didn't go to Tulsa - I went to Water City, Oklahoma, where he had oil
    wells. Over there, then he had a small hotel and a gift shop. The gift shop was only this big - front of the living room
    area. He didn't pay me any wages. Income was the main worry of myself so that's when I got the job in Columbia and that
    was so hard so I changed to cotton picking job. That's how I came to go to Tulsa to Uncle's store. Uncle told me to go
    to Sand Spring Park where they have summer games, shops and games and so I had ping pong games there. Then I was a [in
    discernible] customer. Anyway, I had a ping pong game for two seasons. Didn't make too much money. I think I did make
    some money maybe, but I didn't get any money.
- speaker: Interviewer
  text: You were saying that you made $3 a week doing the -
- speaker: Respondent
  text: Lumber yard. I made quite a bit of money, not quite a bit of money, but not enough to get by.
- speaker: Interviewer
  text: Where did you live?
- speaker: Respondent
  text: In Tulsa I went to Tulsa Business College - but without income it's not fun. Then meantime I happened to see a Japanese
    fellow who came from Chicago. And he worked for a family there, very rich, wealthy family by the name of Travis. I think
    the Travis Corporation is still in Tulsa. And he said, "Why don't you work in Travis Family when I'm working." He said
    I will make big money, I make as much as $75 to $100 a month there. That's wonderful, so I said, "Get me a job there.
    I'll work there for $75." So I went there and they liked me. Innocent boy. I worked for $75 for about six months, that
    didn't get me to school. The purpose was to go to school. See? I was farther and farther away from dental college. I should
    have stayed in Los Angeles, you know? Stayed as a schoolboy and make $3. I may get later on. Anyways, to go to National
    Automobile School I was working for family too, schoolboy, and then I had $7 a week, there are many ways to make money.
    I made $3, then I got to $4, then I am making $7. But that my idea of making money was very, very poor. It very regimental
    and I could not make money.
- speaker: Interviewer
  text: So when you made $75 a month -
- speaker: Respondent
  text: That was in Tulsa. So since I worked six, seven months, but I began to think, gee, this won't get me to anyplace near
    to dental college?
- speaker: Interviewer
  text: You still wanted to go to dental school?
- speaker: Respondent
  text: Yeah, so I said as soon as I speak with Uncle I don't think I get to any place. So I was worrying what could be done.
    So that this friend of mine got me this job for $75 they build this school. "Come to Chicago. I am going there myself.
    They have lots of dental colleges in Chicago. You don't have to stick to one job or one school." So I followed him to
    Chicago.
- speaker: Interviewer
  text: Driving? You drove? Did you drive there?
- speaker: Respondent
  text: No, no. There were no automobiles there. Very few automobiles. Travis had seven cars for himself. That was very unusual.
    But anyways, we took train from Tulsa to Chicago and in Chicago he said, "The best way is to get a schoolboy job. Tell
    them that you have experience in butler. You waited on tables in Tulsa, in Travis Family and you did very well so you
    can call yourself 'butler'." Looked for a job as a butler. I got a job in a family, and I went to drive and I wait on
    table and everything in the house. In the morning I serve breakfast, wash dishes then go to school. I was going to art
    school then. I tried to see just how that would work out. Art school $20 a month and I was getting $7 a week there. And
    with driving and waiting on table. $7, every couple three months, I run out of money, so I asked the lady to loan me money
    she loaned me $5 or $6 each time I run short. So actually, the thing is $7 a week and I pay $20 for school so I only have
    $1 left. So I walk to school, quite distance, about 20, no 17 blocks.
- speaker: Interviewer
  text: Where was the school? Do you remember where the school was?
- speaker: Respondent
  text: Yeah. Art Institute.
- speaker: Interviewer
  text: Is that on Michigan?
- speaker: Respondent
  text: Yeah, on Michigan Boulevard.
- speaker: Interviewer
  text: I went there. I went to the museum.
- speaker: Respondent
  text: Nice, nice school. Anyway, I go there for a while. Then this friend of mine -
- speaker: Interviewer
  text: Same friend?
- speaker: Respondent
  text: Yeah, you know, you stay in this school no matter how long you stay there, you're an artist and artist is a very poor
    business. You may make money sometimes, selling your painting, but you never can tell when you will sell your pictures.
    So he said, "Come along, I'll show you what artists do." So Sunday, I went to Central Park on Michigan Boulevard near
    Art Institute.
- speaker: Interviewer
  text: Then $7 a week job and paying $20 a month for school wasn't very encouraging so went to see art exhibit and those
