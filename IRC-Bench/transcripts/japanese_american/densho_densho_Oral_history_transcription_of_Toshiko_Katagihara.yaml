collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: My childhood, in all honesty, was not an easy one. My mother passed away when I was two years old, and my father,
    unable to properly care for two very small children, was forced to separate the family. My younger brother was sent to
    live with his father's side of the family, and the burden of caring for my upbringing was placed upon my maternal grandmother.
    Life, as I recall, was extremely difficult.
- speaker: Interviewer
  text: What was your father's occupation?
- speaker: Respondent
  text: My father was a principal of Yamabuki grammar school in Yamabuki-City. He had instilled in me the importance of an
    education, but this was a luxury which we simply could not afford.
- speaker: Respondent
  text: Following my mother's death, my father traveled extensively throughout Japan, eventually establishing a residence
    in Nara, where he remarried.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: Ten years old. This was not, however, to be a permanent residence, for my father departed for America to pursue his
    own education soon thereafter. My step-mother was a dedicated and strong woman who managed to maintain the house and eventually
    sent for my brother and me to join her in Nara. The knowledge that our family would once again be reunited and the promise
    of an education heightened my excitement.
- speaker: Respondent
  text: To a little girl of 12 whose world extended only to the surrounding mountains, the trip to Nara was awe inspiring.
    Taking the train for the first time, I realized the true limitation of my development and the wide gulf that must be overcome
    in order for me to find a productive position in the world.
- speaker: Respondent
  text: Although the promise of an education was not immediately realized, at the age of 15, I entered Giei Gakko in Gose
    where I was to spend the next four years in intensive study. At the conclusion of the fourth year, I was able to graduate
    with honors. The entire process of acquiring an education was an extremely pleasant experience and wonderful memories
    remain with me to this day. Through the efforts of an especially considerate instructor, I was able to obtain a teaching
    post in an elementary school. First, as a student and later as a teacher, my direct association with education was to
    continue for another four years.
- speaker: Respondent
  text: My relationship with my father was, at best, quite formal. Because of the circumstances which resulted in our separation,
    I was never able to fully understand this man. I did, however, hold him in high esteem, therefore, when news of his return
    from America was communicated to me, I immediately resigned my teaching post to be with his family once again.
- speaker: Respondent
  text: The reunion was joyous, of course, but there was one news which came as quite a shock. During his stay in America,
    my father met several young students who, like himself, were there to get an education. Apparently an arrangement of marriage
    was made between one such student and myself. The idea of an arranged marriage may sound awkward to people of today, but
    in the early 1900s this was an accepted custom in Japan. Following a brief period of courtship, we were married.
- speaker: Respondent
  text: In May 27, 1915 a daughter was born. After the birth of our daughter, my husband once again departed for America leaving
    us in the care of his mother's household. In contrast to my childhood days this was a rather easy going and relaxed period.
    This household was rather well-to-do and the hardships of my childhood were foreign to them.
- speaker: Respondent
  text: This did not, however, ease the pain and anxiety of a young bride and mother who was separated from her husband. My
    mother-in-law, recognizing my lonesomeness, urged me to join my husband in the United States, and promised to care for
    my daughter. This was perhaps the most agonizing decision of my life. As much as I hated to leave my daughter, I realized
    that a wife should be at her husband's side, and hoping that the separation from my daughter would be a very brief one,
    I left for the United States with great reluctance.
- speaker: Interviewer
  text: In what year was this?
- speaker: Respondent
  text: In September 19, 1915.
- speaker: Respondent
  text: Upon my arrival in the United States, I was greeted by my husband and his friends. At a welcome party afterwards,
    I made several inquiries concerning the possibility of attending a nearby church. A young man immediately stood up and
    offered to take me to the church the following Sunday. This young man was baptized only a week before, and from that time
    until his death in 1973, his family acted as a constant guardian for my family. His name was Yohei Tanaka.
- speaker: Respondent
  text: At the church, I was introduced to Mr. who took the trouble to painstakingly outline the meaning of the Bible until
    I was able to fully master the meaning of the scriptures. I was baptized into the faith later that same year.
- speaker: Respondent
  text: Reunited with my husband, accepted warmly by new friends, and baptized into a new faith, the first year in America
    was a time of great happiness. Unfortunately, my happiness was not to last. An incident arose the following year which
    drastically altered the course of my life. Personal problems between my husband and I reached a point where a permanent
    separation seemed to be the only answer. Following his return to Japan, my life was, quite frankly, shattered. My emotional
    state was in such disarray that often thoughts of ending my life raced through my mind.
- speaker: Respondent
  text: During this crucial moment in my life, I had an occasion to run into Mrs. Michiko Fujita in a nearby park. She was
    quite amazed at my personal appearance, and expressed great concern. She informed me that a minister from Japan, Rev.
    Kiyama, would give the sermon the coming Sunday and urged me to attend. It is my belief that my meeting with Rev. Kiyama
    that following Sunday represented my rebirth. Until that time, in spite of my efforts to master the holy Bible, I did
    not really understand the true meaning of my commitment to my faith.
- speaker: Respondent
  text: The title of his sermon was "THE JOY OF BELIEF IN JESUS CHRIST." The scripture was taken from JOHN 3:16, 'For God
    so loved the world that he gave his only son, that whoever believes in him should not perish but have eternal life.' I
    recognized the shallowness of my faith and made a commitment to seek redemption and rectification in the eyes of the Lord.
- speaker: Respondent
  text: This event brought to an end the first phase of my life and ushered in a period of both hardship and great personal
    development. As I look back on my 86 years of existence, this period is perhaps the most memorable. It was during this
    period of trial that I was able to discover the true meaning of life and find comfort and direction that would guide me
    for the rest of my life.
- speaker: Respondent
  text: My most immediate and pressing problem was to find some way to support myself. Assessing my personal skills and the
    employment picture, I came to the conclusion that designing and sewing offered the most promising future. At that time
    European designs were particularly in vogue and I was fortunate to obtain an apprenticeship position with Mr. Gammier,
    a French designer of considerable fame. Mr. Gammier was an excellent teacher and under his close tutelage, my skills were
    refined and polished. It was his estimation that two years would be required for me to fully master the intricacies of
    the art, and as he promised, at the end of my second year, he urged me to open a shop of my own.
- speaker: Respondent
  text: Mr. Gammier had, by this time, received numerous offers of employment from the motion picture industry in Southern
    California, and his acceptance of this employment offer signaled the termination of his business in San Francisco.
- speaker: Respondent
  text: Although, at his instance, I gave great consideration to opening my own shop, I reluctantly reached the conclusion
    that the atmosphere of racial antagonism toward Japanese residents was so strong that it did not warrant my taking this
    option. Mr. Gammier understood the reasons for my decision and quickly secured a position for me as a table manager with
    Madame Alma. I was warned that Madame Alma was an extremely difficult person to work with, but I did not find this to
    be the case. I found her to be an extremely hard working, dedicated, and warm human being. Our working relationship was
    characterized by mutual respect and admiration, and I am proud to say that Alma was a friend.
- speaker: Respondent
  text: In the 1920s, the Japanese community in America, due to the historical nature of Japanese immigration to this country,
    was overwhelmingly male dominated. Talk of marriage was brought up on several occasions, but I did not give serious consideration
    to this matter until I was introduced to Dr. Gett Har. He was a doctor only recently graduated from dental school. His
    future was somewhat uncertain at that time and it seemed as though marriage was out of the question. We were, however,
    deeply in love, and with the generous moral support from our friends and particularly the wise counsel of Dr. Sturge,
    the marriage arrangement was finalized.
- speaker: Respondent
  text: Dr. Sturge was a source of great inspiration and faith to both young and senior members of the church. His dedication
    to the faith was evident in everything he did, and through him we received the protection and guidance of the Lord. Our
    command of the English language was rather poor, and in spite of Mr. Tomioka's valiant effort at interpretation, it often
    prevented us from understanding everything. Dr. Sturge said. There was, however, no misunderstanding the beauty and eloquence
    of this man. Although 50 years have passed, I can still recall vividly the Bible session conducted by Dr. Sturge. Following
    his usual meticulous review of Corinthians 13, he was overcome by pain and forced to retire to his room. Two days later,
    he was dead.
- speaker: Respondent
  text: His passing left a great void in both my heart and the church. The circumstances of his birth was never made clear
    to me, but there is no mistaking the glory of his work.
- speaker: Respondent
  text: 1941 was a memorable year, in many ways, for residents of Japanese ancestry in America. With the patrol of war in
    the Pacific, racial intolerance once again erupted and contaminated the society with its filth. After a few months of
    uncertainty, it became evident that hopes for an even-handed treatment of Japanese-Americans was not to be realized. Tears
    of shame were shed in abundance as the orders implementing the relocation program separated my family from my friends.
    The coming years would seriously test my faith in the promise of American life. How was it possible that in a nation founded
    by immigrants fleeing political and religious intolerance, such actions could be justified? Although I do not now harbor
    and did not then harbor feelings of bitterness, the evacuation was a cause of great sadness and disappointment.
- speaker: Respondent
  text: My husband and I were taken first to Tanforan racetracks and later relocated to Camp Topaz deep in the flat desert
    of Utah. The desert climate was a drastic change from the mild environment of San Francisco, and all the residents of
    the coast experienced a difficult period of adjustment.
- speaker: Respondent
  text: I was assigned a teaching post in the camp sewing class and my husband found himself assigned to the camp infirmary.
    Perhaps the most memorable moment of our camp experience was the brilliant evening sunset which all of us would gather
    together and admire.
- speaker: Interviewer
  text: After the war where did you reside at?
- speaker: Respondent
  text: My husband and I found temporary lodging in the Sturge Building.
- speaker: Interviewer
  text: What happened to the home you lived in prior to the war?
- speaker: Respondent
  text: We discovered that our homes were occupied and our properties lost. We shared the living quarters with eight other
    families who met with similar fate. It was here that Mrs. Maruoka and I were appointed as the church leaders. We were
    the first women to be so honored. Needless to say we took great pride in this position. Ten months later, we were able
    to rent a house and my husband reopened his practice.
- speaker: Respondent
  text: The next six years were years of withdrawal and rebuilding. Life was hard but remarkable in many ways. Then, in 1952,
    after a brief period of illness, my husband passed away. He was a man of quiet dignity with strength and compassion in
    just the right proportion. His influence upon my development was vast, and my love and respect for him without end. His
    passing was a great blow to me, but he had given me the strength and courage to carry on.
- speaker: Respondent
  text: Perhaps the most memorable and profound legacy of my husband was given to me one evening over the dinner table. The
    previous week, I had secured a position with Ransohoff's of San Francisco. The employment picture for Japanese had improved
    considerably since the end of the war, and I went to Ransohoff's with great excitement and anticipation.
- speaker: Respondent
  text: My hopes were somewhat dimmed the first day when I was assigned as an assistant to a lady of rather questionable temperament.
    Her name was Mrs. Mateno, and she was in charge of the department. Although she praised my work, she was such a difficult
    person to work with that at the end of each day I seriously contemplated the termination of my job. At the end of the
    first week, I gathered my things and decided to quit. My husband listened to my explanation that evening, and when I had
    exhausted the story he replied in a quiet voice, 'You can become arrogant at times.' With that simple statement, I realized
    instantly exactly what had taken place.
- speaker: Respondent
  text: I had, until that time, taken great pride in my ability to handle new and often threatening situations, and somehow
    overcome the obstacles facing me. In my relationship with other people, I cannot recall a single moment when I was forced
    to raise my voice. It was my belief that by treating others with respect and consideration, they would in return react
    in similar fashion. This sense of tolerance and understanding was one of the casualties of the war, and my husband's gentle
    reminder was sufficient for me to realize the change I had experienced. Thoughts of quitting were immediately discarded.
- speaker: Respondent
  text: The following Monday, when I reported for work, Mrs. Mateno was surprised and delighted. She took me into her office
    and told me that I was the first assistant ever to report to work for a second week. She admitted that she was a difficult
    person to work with, thanked me profusely, and asked for my support. If it were not for my own revelation the day before,
    I could have believed the change in this person's behavior. I was simply delighted. Until my decision to return to Japan,
    Mrs. Mateno was a close and dear friend. The gentle reminder of my husband has stayed with me to this day, and has shaped
    my actions ever since.
