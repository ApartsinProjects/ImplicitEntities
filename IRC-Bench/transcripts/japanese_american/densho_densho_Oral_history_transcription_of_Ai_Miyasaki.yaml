collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1892.
- speaker: Interviewer
  text: Do you remember the many wars?
- speaker: Respondent
  text: Russo-Japan War? Russo-Japan War, World War I, Manchuko War.
- speaker: Interviewer
  text: Do you remember about the Russo-Japan War?
- speaker: Respondent
  text: At that time we dressed as nurses and participated in a program.
- speaker: Interviewer
  text: This was when the soldiers returned to your town?
- speaker: Interviewer
  text: In your town? Everyone gathered at that time, the various generals -- Do you remember General Nogi?
- speaker: Respondent
  text: General Nogi lost two sons in the war. With his wife, they committed suicide, to follow Emperor Meiji's demise.
- speaker: Interviewer
  text: You were too young?
- speaker: Interviewer
  text: World War I?
- speaker: Respondent
  text: I remember, but just know that it happened.
- speaker: Interviewer
  text: Manchuko War?
- speaker: Respondent
  text: Manchuko War ... There were many tragedies. I remember at Nikoryo that the Japanese were massacred.
- speaker: Interviewer
  text: How did you feel toward the Chinese?
- speaker: Respondent
  text: I do not remember too much in detail, but my mother looked at nozokimegane (stereoscope) of the scenes of the massacre
    and wondered, "If my child was there, how terrible it would be," and cried.
- speaker: Interviewer
  text: Nozokimegane -- what is it?
- speaker: Respondent
  text: Someone brings it. You look at pictures through glasses. Like binoculars.
- speaker: Interviewer
  text: What were your pleasures, sadness, worries, sufferings while you were in Japan?
- speaker: Respondent
  text: The pleasant period in Japan was while I was a student.
- speaker: Interviewer
  text: What kind of things happened? What kind of living did you do as a student?
- speaker: Respondent
  text: When I was a student, I went to school with my friends, climbed mountains, went backpacking, athletic meetings...
    I was always under my parents' care, and had no economic worries. Since I had no worries, I was happiest then.
- speaker: Interviewer
  text: How far did you advance in your education?
- speaker: Respondent
  text: Jo gakko (girls' high school).
- speaker: Interviewer
  text: At that time, not many went as high as Jo gakko (girls' high school).
- speaker: Respondent
  text: Only 4 or 5 went to kohtoh sho gakko (junior high school), and even fewer went as far as jo gakko (girls' high school).
- speaker: Interviewer
  text: Kohtoh sho gakko (junior high school), then jo gakko (girls' high school). How many from your town?
- speaker: Respondent
  text: From my town, to chu gakko (high school), about 3. There were 50 or 60 in my class in the sixth grade. There were
    more if you consider all the schools. There were other schools where the people went to, but to jo gakko (girls' high
    school) it was few.
- speaker: Interviewer
  text: There was only one sixth grade class in your school? And there were 60?
- speaker: Interviewer
  text: Three people. Is it every year only about three, from my town only three?
- speaker: Respondent
  text: Was there the one school in your town?
- speaker: Interviewer
  text: Sho gakko (one grammar school). Kohtoh sho gakko (junior high) was in another town. We walked about 2 ri (4 miles)
    to the kohtoh sho gakko (junior high school).
- speaker: Interviewer
  text: You must remember the different things that happened. Tell me about your teachers?
- speaker: Respondent
  text: I played tennis. I was a tennis player. The teacher took me to the other schools for matches. The teachers were kind
    to me. I have pleasant memories.
- speaker: Interviewer
  text: Who do you remember most among your teachers?
- speaker: Respondent
  text: My homeroom teacher was Oniku sensei. Kohtoh (junior high) 7th grade. Physical education teacher was Ishida sensei.
    History was Sakuma sensei. Each teacher had separate subjects.
- speaker: Interviewer
  text: What is the comparison between teachers in Japan and America?
- speaker: Respondent
  text: Japan's teachers were close to us, friendly, and played together, talked and told us sermon.
- speaker: Interviewer
  text: What did you do the first thing in the morning at school?
- speaker: Respondent
  text: We did not have morning assembly like there was later on. We went direct to our classroom. Then our homeroom teacher
    comes.
- speaker: Interviewer
  text: Did you change your classroom?
- speaker: Respondent
  text: The classroom is one room, but the teachers change and come to us.
- speaker: Interviewer
  text: Did you eat lunch together?
- speaker: Respondent
  text: We brought our own lunch.
- speaker: Interviewer
  text: Did the teacher eat with you?
- speaker: Respondent
  text: That is unusual. We ate among friends. We ate out in the school yard where people did not see us easily.
- speaker: Interviewer
  text: When did school start in the morning?
- speaker: Respondent
  text: Then you walked 2 hours before then to school.
- speaker: Interviewer
  text: As I must have walked more than 14 hours to school.
- speaker: Interviewer
  text: Then, to and from school, you walked for about 4 hours.
- speaker: Interviewer
  text: When was school dismissed? In the afternoon?
- speaker: Respondent
  text: After 3:00.
- speaker: Interviewer
  text: Did you do any sports?
- speaker: Respondent
  text: I played tennis or kicked football.
- speaker: Respondent
  text: It was scary. We hurried home. It was dark. I got chapped all along here.
- speaker: Interviewer
  text: Did you wear kimono when you played tennis?
- speaker: Respondent
  text: No. I wore kimono.
- speaker: Interviewer
  text: When you played tennis, did you wear geta?
- speaker: Interviewer
  text: Do you remember the Tokyo earthquake? Tsunami or illness?
- speaker: Respondent
  text: At Japan, pleasure, sadness.
- speaker: Interviewer
  text: About sad things or sufferings?
- speaker: Respondent
  text: My older brother died. That was sad.
- speaker: Interviewer
  text: How was the funeral?
- speaker: Respondent
  text: At that time, for funeral, we made flowers at home. An organized group who lived in an area near came and made preparations
    for us.
- speaker: Respondent
  text: At the yard. No, not the yard, outside the house, outside.
- speaker: Interviewer
  text: When I suffered, it was when I became sick seriously.
- speaker: Respondent
  text: It was a serious illness, almost died.
- speaker: Interviewer
  text: When was it? When you graduated from the Jo Gakko (girls' high school)?
- speaker: Respondent
  text: Three months. I completely lost my hair.
- speaker: Interviewer
  text: From fever?
- speaker: Respondent
  text: Yes, because of fever.
- speaker: Interviewer
  text: How were the doctors? Were they competent?
- speaker: Respondent
  text: The town's young men put me on a door slab and carried me to my home. The four men carried me home. The town doctor
    sent me to the hospital the next day. I did not get any anesthetic and had a major operation. He removed a bone. I was
    weak.
- speaker: Interviewer
  text: It must have hurt.
- speaker: Respondent
  text: It did hurt, I remember. Maybe I got a local anesthetic. Otherwise, I would not have been able to bear it. I remember
    hearing the doctor drop a pair of scissors.
- speaker: Interviewer
  text: What was your home religion?
- speaker: Respondent
  text: Buddhist, Shinshyu.
- speaker: Interviewer
  text: I asked your birthplace.
- speaker: Respondent
  text: Yes. Kumamoto, Kamimashiki gun.
- speaker: Interviewer
  text: Close to Kumamoto City?
- speaker: Respondent
  text: About 4 ri east of Kumamoto City.
- speaker: Interviewer
  text: Had you heard about Christianity in Japan?
- speaker: Respondent
  text: When I was hospitalized, a Christian visited me often. I was pleased, and my parents were pleased. "When you recover
    from the illness, you should be a Christian," my parents said. I myself thought of going to church when I recover, but
    finally never did.
- speaker: Interviewer
  text: What was the reason? Was there no church?
- speaker: Respondent
  text: There was. In Kumamoto City.
- speaker: Interviewer
  text: You had difficulty getting there?
- speaker: Respondent
  text: Yes, I learned hymns while I was in hospital.
- speaker: Interviewer
  text: Was the person who visited you a minister?
- speaker: Respondent
  text: My school friend, the older brother.
- speaker: Interviewer
  text: They taught you hymns?
- speaker: Respondent
  text: Yes. I did not think them as hymns.
- speaker: Respondent
  text: When I came to America, I was guided by God in my heart. At that time, God's seed of love was planted. Strange, is
    it not?
- speaker: Interviewer
  text: When you came over to America, how was your home?
- speaker: Respondent
  text: When we came, my home was happy. Older brother was a school teacher. He died but by the time I was ready to come was
    fine.
- speaker: Interviewer
  text: Your home and father's work?
- speaker: Respondent
  text: My older brother's school, two boys and one girl? Four boys and I was the only girl. My father said that the estate
    will be divided into four sections, so we should all go to school.
- speaker: Interviewer
  text: He took over?
- speaker: Interviewer
  text: Is the pawn shop still there?
- speaker: Respondent
  text: He did not want to handle the pawn shop, so he passed it to my uncle.
- speaker: Interviewer
  text: Your brothers, what are they doing?
- speaker: Respondent
  text: My younger brother next to me went to Osaka and is a director in a construction company. The one in Okayama, Kojima
    Sho Sen Gakko, a marine academy. He wanted to be a seaman, but before he graduated, he died.
- speaker: Interviewer
  text: You were not living in your town?
- speaker: Respondent
  text: It was peaceful. Any incident ever happen?
- speaker: Respondent
  text: My father was a progressive man. "Up to now the farmers never had any hobbies or pleasure and ended their lives,"
    he said.
- speaker: Interviewer
  text: What did he grow?
- speaker: Respondent
  text: Mostly vegetable garden... awa (millet), ta (rice?), mugi (wheat). My father as I said was progressive.
- speaker: Interviewer
  text: What was your father's education?
- speaker: Respondent
  text: Father was Teragoya (private school, elementary). His family was of shi zoku (warrior nobility). A person who is here
    from our town told me that father was different. When he was young, she was average. Her ways were simple. Not much schooling.
    If she were alive she would be over 100 years old.
- speaker: Interviewer
  text: Reason for your coming?
- speaker: Respondent
  text: I wanted to go to a big country where it was free. I desired to find a husband whom I could help and work with.
- speaker: Interviewer
  text: It was high. Just like the young...
- speaker: Respondent
  text: It was so high, everyone suffered when it came to my...
- speaker: Interviewer
  text: When I talked it over with my parents about my...
- speaker: Interviewer
  text: Did you correspond with Mr...?
- speaker: Respondent
  text: No. That was to place a picture marriage.
- speaker: Interviewer
  text: How did he come?
- speaker: Respondent
  text: Just came. No. My friend came to visit me to spend the day. On the way home, on the bridge...
- speaker: Interviewer
  text: Of the bridge and talked with the mayor on the bridge?
- speaker: Respondent
  text: Yes. A young man was approached for women who had graduated. Would recommend policemen or marry an officer. He came
    to seek my hand and he...
- speaker: Interviewer
  text: The story spread throughout the town?
- speaker: Respondent
  text: And we went to another town. Stood in the middle.
- speaker: Interviewer
  text: Desire to go to the mayor?
- speaker: Interviewer
  text: Not talk for long?
- speaker: Respondent
  text: At evening, I was telling my family about Tokudomi-san and the old man and a young man whom I met on the bridge and
    talked. And here they came.. the three. We gave them sake and tea and talked. That was the miai, but I had no knowledge
    of it. I was casual about looking at him, and he looked me over. My marriage was a miai marriage.
- speaker: Interviewer
  text: What did you think when you saw the young Miyasaki-san?
- speaker: Respondent
  text: He was so quiet and did not say a word that young man! I conversed with the mayor for he was kind to me. But not with
    him. He was a handsome man. He was light complected. I did not think about whether I liked him or not, because I did not
    know their purpose of the visit as being a miai.
- speaker: Interviewer
  text: So they talked. How long did they stay?
- speaker: Respondent
  text: Not long. Miyasaki did not drink and the old man did not drink. The elderly man was Miyasaki's father. Not the real
    one but second father. I was supposed to go to Hawaii, so did not think any more about the visit. Then, the word came
    that he wanted to marry me. My father refused and explained that I was to go to Hawaii, but he said that he just had to
    marry me.
- speaker: Respondent
  text: If he could not marry me, he was going back to America alone.
- speaker: Respondent
  text: The mayor approached my uncle, and asked him to work out a plan to influence my father to change his mind. So my uncle
    came to move my father, saying that the mayor came pleading to me.
- speaker: Respondent
  text: Miyasaki's home was good. The mayor was very earnest about America a single man. Can't something be done? I did not
    care.
- speaker: Respondent
  text: My uncle told my father. Father was moved slightly.
- speaker: Respondent
  text: He brought money back. Would he not be a good man?
- speaker: Respondent
  text: My father went alone to meet. For he could not.
- speaker: Respondent
  text: Father went and said about my situation and asked, "What will you do?" The teacher said that both men are of good
    home (family).
- speaker: Respondent
  text: Father was moved and decided.
- speaker: Respondent
  text: I was given to him, because...
- speaker: Respondent
  text: My uncle said that he would...
- speaker: Respondent
  text: The question was, who will go?
- speaker: Respondent
  text: Miyasaki on a pretense, father came to look you over again.
- speaker: Respondent
  text: He asked, "You?"
- speaker: Respondent
  text: I heard that there was a woman to give her to Miyasaki. So accordingly, my uncle went to see each other, me to be
    your prospect.
